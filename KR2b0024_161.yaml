body:
  text: 建炎以來繫年要録卷一百六十一宋李心傳撰紹興二十年嵗次庚午德金海陵煬主亮天二年春正月甲申金國賀正旦國信副使西上閣門使劉針辭行國信使殿前右副都㸃檢完顔兖以病不能入見命醫官趙琦送至境上金主亮亦遣天使趣之兖歸至北廷而卒此據苖耀神麓記丁亥太師尚書左僕射秦檜趨朝有挾刃於道者遮檜肩輿欲害之傷行程官數人一軍校奮而前與之敵衆奪其刃遂擒送大理寺驗治則殿前司後軍使臣施全也自罷兵後凡武臣陳乞差除恩賞檜皆格之積百千員無一得者客行朝餓且死者嵗不下數十至是全以所給微而纍衆每牧馬及招軍勞而有費以此怨忿遂潜携刃伺檜出乞用兵因而鼓衆作過若不從則害檜壬辰磔全於市至是每出則列五十兵持長梃以自衛此以熊克小歷及林泉野記參修野記又云檜以此激軍中使無鬬志人人思亂甲午以普安郡王第三子惇為右內率府副率正侍大夫華州觀察使提舉台州崇道觀假恩卒恩初見建炎三年是時不知為何官於此始見于日歷故表出之己亥承信郎閣門祗候幹辦御輦院劉允升為修武郎閣門宣贊舍人庚子敦武郎光州光山縣尉兼主簿都飛虎除名廣州編管坐受商人貨物縱令渡淮及被差捕賊不即迎敵致令出界故也癸卯諸路經界文字令戶部措置結絶未經界處委轉運司并守臣仍限一季少傅寧逺軍節度使領殿前都指揮使職事楊存中封恭國公監察御史湯允恭面對言古有金作罰刑蓋先王不忍之心民知有誤俾出金以當其罪後世著在律文有罰銅之條自一斤至百有二十斤而止陛下仁覆四海視民如傷前後欽恤之詔深切著明比來州縣或有杖罪與徒勒令納錢乃得免少數十百緡多一二千緡格之律文則罰溢於罪又收在别歷吏得為姦望敕州縣凡罪人當罰毋多令納錢以濟妄用及是進呈上曰自有常法於是申嚴行下丙午兩浙轉運判官曹泳言右承務郎李孟堅省記父光所作小史語涉譏謗詔送大理寺初光在貶所常作私史孟堅間為所親左奉議郎新諸王宫大小學教授陸升之言之升之訐其事遂命泳究實申省及是進呈上曰光初進用時以和議為是朕意其氣直甚喜之及得執政遂以和議為非朕面質其反覆固知光傾險小人平生蹤跡於此掃地矣升之山隂人也日歷紹興十九年十月壬戍左奉議郎新淮西提㸃刑獄司幹辦公事陸升之充諸王宫大小學教授恐即緣訐此事得遷當考右承議郎利州西路安撫司書寫機冝文字吳援為右朝散郎直祕閣通判利州賜三品服援自興州入對故有是命二月戊申朔將作監丞李嚴老面對乞戒諸縣令佐毋得分鄉自至村落催科詔申嚴行下嚴老邦彥子也少傳領殿前都指揮使職事楊存中乞以大禮所得親屬封號為故女孺人換一道號許之後贈冲妙錬師己酉顯謨閣直學士常同卒於海鹽縣庚戌軍器監丞齊旦面對乞春月禁民採捕秦檜曰正為孶育之時上曰此係利害乃下之刑部既而本部言春月在法不許採捕若止科違令之罪恐難禁止今欲犯者杖八十從之旦夀光人也初右朝請大夫路彬提㸃廣西刑獄公事代還言靜江府昭州夏稅折布錢最重於諸州蓋自都督行府一時措置折納價錢比舊增及一倍以上廣西地瘠民貧百姓艱於輸納道逺不能赴訴今寇盜寧息海內晏清自冝蠲减是日秦檜奏事畢上諭曰路彬言折布錢因張浚增及兩倍可令户部看詳裁减戶部言二郡歲撥上供布九萬二百八十一匹欲於見納價上三分减一每匹折納錢一千從之上又曰昨令監司守臣任滿並以民事奏陳彬可除職名與見闕監司以示激勸彬奏疏以正月丙午降出上諭大臣除彬職名在二月戊午今併書之壬子權戶部侍郎宋貺言契勘經界本意務要革去侵耕冒佃詭名挾戶逃亡死絶虛供抵當差科不均鄉司走弄二稅之弊使民有定産産有定稅稅有定籍後來緣以畫圖供帳分立土色等則均任苖稅轉生姦弊遂致久不能結絶今欲乞令轉運并守臣恪意措置須管革去逐件情弊使田産稅賦著實依限一切了辦如州縣尚敢遷延出違日限從本部申奏朝廷乞賜放罷若轉運不切督責亦乞黜責所有每路差本所幹辦官一員前去說諭催督措置及諸路所差覆實官限指揮到並罷從之庚申詔海外四州軍昨令與免經界緣土産瘠薄應稅租仰並依舊額施行時瀘南沿邉安撫使馮楫亦抗疏論其不便於朝於是瀘叙州長寧軍皆得免瀘南免經界事日歷不見降旨年月當考按江陽志三邑稅賦額祥符年雜色二千九百石慶元年雜色九千五百石不知何時所增也右朝請大夫路彬直祕閣利州路提㸃刑獄公事辛酉右武大夫合州刺史兼閣門宣贊舍人侍衛馬軍司統領官黃宣等二十四人並添差諸路鈐轄兼都監至將副罷從軍用主帥成閔請也丙寅初作玉牒所辛未集英殿修撰知廣州薛弼升敷文閣待制乙亥直徽猷閣廣西路提㸃刑獄公事方庭實卒丁丑閣門請自今北使在廷非侍從而嘗借官出使免起居如見充接伴即依所借官叙位從之是月安南進馴象十三月庚辰金主使龍虎衛上將軍侍衛親軍馬步軍都指揮使完顔思恭翰林直學士通議大夫知制誥翟永固來報登位遺上金注碗二綾羅三百良馬六水固檀州人宣和六年進士也癸未端明殿學士簽書樞密院余堯弼參知政事給事中兼侍講權直學士院巫伋為端明殿學士簽書樞密院事乙酉尚書禮部員外郎兼玉牒所檢討官王曮守起居舍人兼權直學士院日歷不書曮權直此據本院題名丙戍參知政事余堯弼為賀大金登位使鎮東軍承宣使知閣門事鄭藻假保信軍節度使副之合行事并支賜推恩並依未裁减已前正旦生辰使例以堯弼有請也𠡠令所奏定諸州公使庫月支供給令帥臣毋過二百緡下至外縣監當十緡凡八等仍先支外縣該載不盡者比附定數舊例數少者不在增添之限從之戊子觀文殿學士左通奉大夫提舉萬夀觀祕書省兼侍讀秦熺為特進加大學士充觀使制曰上宰特髙百執既有舊班真儒並出一門豈非亨㑹故事前宰相官至使相已上始降麻至是以熺視見任宰臣特令鎖院庚寅北使辭行權尚書禮部侍郎陳誠之兼侍講太常少卿兼權吏部侍郎張把罷以侍御史曹筠劾其附㑹李椿年也右正言章厦論太常寺主簿權吏部員外郎葉綝頃為李光所私及光抵罪常懷怏怏又嘗私親舊將受其賄賂望賜罷斥以清華轍從之丙申詔責授建寧軍節度副使昌化軍安置李光永不檢舉右承務郎李孟堅特除名峽州編管先是孟堅以小史事繫獄至是獄成光坐主和議反覆後在貶所常出怨言妄著私史譏謗朝廷意在播揚僥幸復用及與趙士㒟於罷政後往來交結孟堅亦為父兄被罪責降怨望朝廷記念所撰小史對人揚說故有是命於是前從官及朝士連坐者八人徽猷閣直學士致仕胡寅坐與光通書朋附交結譏訕朝政龍圖閣學士提舉江州太平興國宫程瑀坐初除兵部侍郎日以縑帛遺光且貽書云比來無知愚皆以視前為戒可為嘆息徽猷閣待制提舉江州太平興國宫潘良貴坐嘗以團茶寄光光貽良貴書其别紙云仲暉不敢作書患難至能出一隻手乎仲暉樓照字也良貴答書曰參政患難至此極矣更以道自處仲暉别紙已付之但恐時未可耳直祕閣宗頴坐嘗寄光書云孤寒寡援方賴鈞庇忽聞逺適豈勝惶駭本欲追路一見失於探伺不果如願寶文閣學士提舉江州太平興國宮張燾左承議郎新知邵州許欣左朝奉大夫新福建路安撫使參議官賀充中左奉議郎福建路安撫主管機宜文字吳元美坐各與光相知密熟書劄往來委曲存問意光再用更相薦引詔寅特落職瑀良貴頴並降三官燾欣充中元美並降二官戊戍上謂大臣曰近有人上書陳農田利害農者天下之大本可即施行是日內降詔曰昨李椿年乞行經略初欲去民十害遂從其請今聞寖失本意可令戶部逐路選委監司一員逐一看詳應便於民者依已經界施行其乖謬反為民害事目並日下改正具申省部日後以當否取㫖黜陟間遣御史前去訪察庚子余堯弼辭行詔巫伋兼權參知政事徽猷閣直學士知平江府周三畏落職與宫觀差遣初常同既卒三畏遣通判府事蘇師德越境往祭且賻錢二千緡祭文有云姦人在位公棄而死師德同女壻祭文其子新遂安尉玭所草也侍御史曹筠因奏三畏頃為大理卿鞫勘嶽飛公事猶豫半年不决朝廷特加抆拭終不懷安乃與師德隂相交結若不亟去有害治道於是師德送汀州編管而玭勒停玭勒停在四月癸亥壬寅右正言章厦奏右承議郎致仕胡寅天資凶悖敢為不義寅非胡安國之子不肯為親母持服士論沸騰此其不孝之大罪也寅初傅㑹李綱後又從趙鼎建明不通鄰國之問其視兩宫播遷如越人視秦人之肥瘠後來梓宫既還皇太后獲就孝養寅自知前言狂率乃隂結異意之人相與睥睨作為記文以為今日仕進之人將赤族而不悟此其不忠之大罪也伏望陛下為宗廟社稷長慮特賜威斷詔寅責授果州團練副使新州安置寅建明使事已見紹興六年五月寅申明追服事己見紹興十年七月右承事郎劉堯勛直祕閣堯勛光世少子也甲辰户部侍郎宋貺言訪聞州縣近因經界將額管苖稅均於未開墾荒間田土上一例起催致人戶無從輸送往往逃移失業望委諸路轉運司將見虛增苖稅日下往催從之乙巳上書秦檜父故玉山縣令敏學墓碑首曰清德啓慶之碑命詞臣王曮撰文以賜上謂檜曰近日邉境絶無事行移簡少民得休息殊為可喜户部言常平職在興農田水利今州縣墟岸多損田畝多荒欲委諸路常平官措置興修不得因而擾民將來取㫖升除從之是月金主亮詔中外臣庶皆令直言朝政闕失與軍民利害如有可採自應得用其或不當弗加之罪茍能裨補公私别議旌賞初東昏王亶之被弒也亮身預其謀及是事定當時同謀者亮皆以弒逆之罪加之曹國王宗敏者屬最尊亮忌之既為所殺納其妃於宫中梁國王宗弼開國有勳惟一子韓王亨亦以無罪死左副元帥薩里罕有戰功亮詐為書俾人誣告并其子御史大夫沙津殺之夷其家夏四月丁未朔司農卿湯鵬舉直顯謨閣知婺州直祕閣兩浙轉運判官曹泳升直徽猷閣知明州時鵬舉送北客未還也庚戌右朝散大夫知揚州榮嶷為兩浙路轉運判官既而侍御史曹筠言嶷本與趙鼎從遊甚密緣嶷在僞楚時有所汙染被謫甚重鼎猶未敢援引今朝廷俾守維揚已為闊略又引至行朝豈不惑四方之觀聼望賜罷黜以慰公議詔嶷還舊任王明清揮麈録稱髙宗與嶷有霸府之舊秦檜屢欲加害而不從或可修潤入此詳見紹興十一年九月王俊首張憲謀叛注壬子詔自今沒官田土更不許人承佃並撥歸常平司與見興修水利田一就措置用户部請也既而本部又請在城市空間官田及户絶房廊白地亦令常平司拘收從之後㫖在是月戊午乙卯安德軍節度使開府儀同三司知大宗正事士夽充萬夀觀使任便居住以老病自請也擢其子右奉議郎不微直祕閣己未起居舍人兼玉牒所檢校官王曮言本所見修玉牒切見靖康二年太師秦檜入狀軍前乞存趙氏社稷兼在軍前與莫儔爭辨以全家保天族并在中京代上皇作書與國相建明和議等大節並已修入玉牒外所有元降下推戴事跡乞備録全文關送國史日厯所照應施行從之辛酉封普安郡王女為碩人用宗室緦麻親任節度使封女例也己巳上謂大臣曰久雨不致妨農否民田須常瀦水冝令州縣修陂湖之利以備缺雨灌溉既又命每季具施行次第申省庚午宣政使明州觀察使提舉洪州玉隆觀馮益卒癸酉左朝奉大夫新知廬州吳逵言兩淮之間平原沃壤土皆膏腴冝榖易墾稍施夫力嵗則有收而莫加工茅葦蘙塞望置力田之科募民就耕淮甸賞以官資闢田以廣官莊自今嵗始今欲江浙福建委監司守臣勸誘土豪大姓赴淮南從便開墾田地歸官莊者嵗收榖五百石免本戶差役一次七百石補進義副尉至四千石補進武校尉並作力田出身其被賞後再開墾及元數許參選如法理名次在武舉特奏名出身之上遇科場並得赴轉運司應舉從之熊克小歷稱在武舉人之丄去特奏名出身五字蓋誤也乙亥衡州編管人宗杲移臨江軍以其長惡不悛聚徒貶所撰造飛語肆為譏謗也是月金主亮誅太傅領三省事晉國王宗本及尚書左丞相兼中書令越國王唐古辨領燕京行臺尚書省事楚國王秉德判大宗正事衛王宗義東京留守代王宗懿等先是秉德嘗燕宗本家海州刺史烏爾衮言國王有福似趙太祖秉德喜其後秉德出領行臺省事欲在外說誘軍民使宗本為內應辨嘗為宗本言內侍張彥善相人亦言太傅當為天子宗義言太傳正是把太祖大家計人宗本遂與尚書省談史蕭玉謀即圍場弒亮玉以告祕書監蕭裕裕以聞故皆坐死宗本太宗晟之子宗懿宗本兄秉德宗維孫也據金人誅蕭裕詔云宗本太宗之子又誅宗本等詔云某有兄東京留守遂擢裕尚書左丞參知政事而汴京行臺廢兩國編年有天德三年遷都詔云用併尚書之亞省㑹歸機政於朝廷故增入自金太祖旻起兵即以尼瑪哈烏舍羅索逹蘭薩里罕之徒繼為將相惟羅索在兵間以病死後尼瑪哈首罷兵柄憤恚而亡逹蘭固新薩里罕之徒相繼誅而旻晟子孫勦戮幾盡以金人誅宗本等詔書及金國雜書參究修立張棣金國志誤以宗本為尼瑪哈已辨之見建炎元年注五月丁丑右朝散大夫彭合知臨江軍還言清江縣民輸苖米每石加耗七斗乞蠲免從之上謂大臣曰合任縣官嘗為監司列薦今可與監司知州差遣乃以合知永州庚辰詔申嚴諸軍差承接文字使臣之禁賞錢千緡有官人轉一官許人告初講和罷兵之次歲言者論艱難以來諸郡及監司例遣使臣於行在劄探比來邉境寧謐自應罷此乃但改作承受妄說虛傳為害甚大詔臨安府覺察收捕上幸學之年五月又詔諸軍都統制下承接文字使臣並令歸軍至是樞密院以為言故申其禁癸未特進觀文殿大學士萬夀觀使秦熺為奉安中興聖統禮儀使先是起居舍人兼玉牒所檢討官王曮等紀上中興之蹟以進號中興聖統己丑奉安于景靈宫天興殿之西以玉牒殿未成故也禮畢太師尚書左僕射提舉編修玉牒秦檜率百官拜表稱賀自檜再相每進書必下左藏庫𣙜貨務取金繒以進謂之禮物此禮不知起於何時臣嘗恭讀乾道宣諭聖語云此乃秦檜諂諛所為故因事附見當求它書考其年月辛卯熺言先期隂雨是日雲霞絢綵晴日麗天兹誠上穹垂祐望宣付史館從之曮時兼權直學士院草檜加恩制曰大風動地不移存趙之心白刃在前獨奮安劉之略檜大喜王明清揮麈後録云王曮為少蓬權直禁林秦檜之加恩取此聨入制詞中翌日即除禮部侍郎案學士年表曮是時實為起居明年二月乃除禮侍明清誤記也癸巳减汀州上杭武平二縣今年上供錢銀之半連城清流二縣减三分之一以守臣右朝奉大夫張昌代還有請也甲午金國賀生辰使副侍衛馬步軍都指揮使完顔思恭翰林直學士翟永固見于紫宸殿思恭等來報亮代立既出境就遣來賀甲辰祕書少監湯思退言近玉牒所關到太師秦檜推戴趙氏事跡竊意師臣謙不伐功特以事干玉牒姑具大槩其餘間關執節之久本末未能備盡望令檜詳録奏聞宣付史館庶得備言廣記以詔無窮且以知聖朝得一忠義大臣成效如此上謂檜曰思退乞以卿靖康事跡詳記為别録以示天下後世可依所奏檜謙退久之上曰不然無以使後代知卿忠義簽書樞密院事巫伋曰秦檜忠義大節天下所共知然要當屢書不一書使後世奸臣賊子聞風悚懼上然之乙巳左承議郎汪應辰通判靜江府應辰初入館以論事去至是凡十年六月丙午朔詔修國子監先是太學録周麟之面對論上庠敝漏弟子員滋多几席不足容之非所以崇嚴奉而廣教育故有是㫖丁未上曰近有進士上書言兼併之家多請射侵漁民田冝嚴立法秦檜曰比刷逃戶田宅並令歸官正以暗消此弊上曰善戊申右正言章厦乞令州縣收納二稅有出剩之數並附赤厯不許擅撥歸公使庫仍令監司覺察從之己酉感德軍承宣使提舉萬夀觀梁邦彥守本官致仕從所請也癸丑太師秦檜以進書加恩辭不受詔封其次孫女令人秦氏為永嘉郡夫人甲寅徽猷閣待制知台州蕭振始至官初海寇聚衆連年其勢益熾至是犯台之臨門寨章安鎮故命振為守振抵官奏乞殿前司水軍統制王交同捕許之交至振謂之曰濵海之門數年苦賊若能勦除願悉兵力戰以寧一方倘或敗事振當奏劾交即具艦入海與賊逆敵果敗其衆餘黨散去振以數千緡犒交士卒為之奏功郡境遂寧王交明年三月辛亥自右武大夫和州團練使荆湖北路兵馬都監升帶福州兵馬鈐轄不知此時為何官也丙辰壽國育聖夫人王氏卒王氏上乳母也輟視朝五日追封福壽國夫人賜帛二千匹錢萬緡為葬費戊午出內府錢十五萬緡付兩浙轉運司創皇城司寨三千間限一季畢庚申捧日天武四廂都指揮使武信軍承宣使新江南西路兵馬鈐轄李橫移東路橫寓居信州適貴溪魔賊竊發守臣左朝散大夫李柳檄橫統弓兵以備䇿應遂獲安堵柳又遣離軍人拱衛大夫果州團練使添差東南第五副將孫青統兵出戰旋至撲滅乃詔青釐務而帥臣王晌劾柳及知縣事左奉議郎葉顒右朝散大夫提舉常平茶鹽公事權提刑張昌不能覺察致賊嘯聚並免官仍削二秩顒仙游人也李柳等降罷在是月己丑癸亥特進觀文殿大學士萬壽觀使兼侍讀秦熺以進書恩遷少保其子直敷文閣塤堪並升直顯謨閣左朝請郎何大圭直祕閣大圭進聖德頌故有是命初大圭之削籍也張浚為之保叙至是以短卷譖浚於秦檜士論薄之日歷紹興二十八年正月丙戍朱倬劾大圭章疏稱因譛浚得職名丙寅大理寺少卿許大英面對論川廣奏按往復淹滯乞委憲臣考察丁卯左朝散郎康寧知瓊州還乞諸郡重辟疑獄奏按並專人齎投詔並令刑部看詳己巳直祕閣王湛知閬州還乞申嚴法禁守令勸農不得輒用妓樂宴集賔客上謂大臣曰蜀去朝廷逺凡事多奉行滅裂可令有司立法是月金主亮詔河南民衣冠許從其便是夏故相趙鼎之子右承事郎汾奉鼎喪歸葬于衢州常山縣時李光之獄始竟而守臣左中奉大夫章傑與鼎有宿憾傑知中外士大夫平時與鼎有簡牘往來至是又携酒㑹葬意可為竒貨乃遣兵官同邑尉翁䝉之以搜私釀為名馳往掩取復疑䝉之漏言濳戒左右伺察之䝉之書片紙遣僕自後垣出密以告汾趣令盡焚篋中書及弓刀之屬比兵官至一無所得傑怒方深治䝉之而追汾與故侍讀范冲之子仲彪拘於兵官之所䝉之母訴于朝太師秦檜咎傑已甚詔移䝉之蘭溪尉下其事于浙東安撫司事遂息傑客魏掞之慨然以書噍傑長揖而歸傑亦不害掞之建陽人少有大志師事籍溪胡憲䝉之安原闕人也秋七月丙子上諭大臣曰近進士鄧楷上疏論諸軍强刺平民為兵非便自今冝令毋得招刺歲終具闕額申樞密院於諸路招填之戊寅右正言章厦言陛下敷德善鄰協和海㝢是宜內外小大之臣咸懷忠良共享升平之盛士大夫尚有懷姦自狥時肆謗訕如近日吳元美之徒者未盡屏斥是致營營鼓惑羣小欲望睿斷凡異意詆誣之人迹或彰露必嚴行竄殛庶為小人之戒從之己卯大理少卿李如岡面對乞令監司守臣舉縣令之有治績者量行旌賞辛巳上謂大臣曰昨已有㫖但未見具名來上可戒令奉行庶為令者知勸民間受惠癸未皇叔安德軍承宣使司知大宗正事士夽為昭信軍節度使保寧軍承宣使提舉佑神觀藍公佐卒公佐奉祠居平江其妻碩人王氏忽生鬚數莖長寸許未幾公佐與王氏繼亡相去才七十日此據洪邁夷堅甲志乙酉左中奉大夫知衢州章傑罷以侍御史曹筠論其貪墨不法也筠又言國子監主簿吳龜年教其鄉人郭詠上書隂懷異議意不可測罷之丁亥太府少卿徐宗說面對乞令州縣按月權且放行宗子孤遺請給以俟換給文歷詔戶禮部同大宗正司看詳自南渡後宗子散居四方言者慮其詐冒故令具譜牒於所在召保自陳更給新歷紹興五年四月降㫖八年六月展限一年至是舊歷未至者甚衆乃命川廣福建荆湖再展一年餘州半年八月辛未施行己丑左朝散郎福建路提㸃刑獄公事孫汝翼言泉漳汀三州近經草寇民多逃移乞將三州諸縣不以己未打量均稅一切權行住罷俟盜賊寧息日申取朝㫖施行從之以何白旗初平故也汀在深山窮谷中兵火之餘舊籍無存者豪民漏稅常賦十失五六郡邑無以支吾于是計口科鹽大為民間之患三州免經界元降指揮不甚詳此據淳熙中王回奏議修入日歷紹興三十年二月癸丑右武大夫耿洪以獲何白旗之功轉一官未知事在何時去年五月丁酉劉寶等功賞恐或相關但耿洪乃受成閔節制非寶所部耳淳熙十四年四月丙申汀州經界乙未左朝散大夫知資州楊師錫代還入見上問四川有橫斂否師錫曰自和議息兵以來皆無之師錫又言有司奉行經界失當將肥瘠田畝更不分假及將市居丈尺間隙之處便作屋後空地非元初均稅本意望戒逐路監司將貧下戶最低土色合减稅數均在侵耕冒佃豪彊等人名下有未均去處自可將逐鄉蹙零就整之數用與補填上詢問久之後二日遂令諸路看詳改正如先詔詔在三月戊戍師錫彭山人也丁酉右朝奉大夫知廬州吳逵言土豪大姓就耕淮南荒田者欲除種子外九分歸佃戶一分歸官三年後歲加一分至五分止嵗收二熟者勿輸麥每頃别給二十畝為菜田不在分收之限仍免科借差役戶部看詳如所請從之己亥戶部員外郎陳相面對乞戒飭有司不得苛取商稅詔申嚴行下相合肥人也八月甲辰朔詔特進提舉江州太平興國宫和國公連州居住張浚移永州浚自去國至是幾十五年退然若無能為者而四方之士莫不傾心健將悍卒見之者必咨嗟太息下至兒童亦知有張都督每使者至金國其國必問浚今安在降授左朝散郎南安軍居住孫近移處州降授左中大夫歸州居住万俟卨移沅州左中大夫江州居住李若谷移饒州左中大夫興國軍居住假拂移南康軍降授左奉議郎筠州居住李文㑹移江州而自若谷已上皆提舉江州太平興國宫如故用尚書省檢舉也右朝奉大夫王躍特降三品勒停坐前知雷州日趙鼎李光貶責經過躍排辦迎送收置物色專差人賫送過海通往還及遣候兵往光處私役故也躍紹興二十三年十二月丁亥編管丙午保信軍承宣使提舉萬壽觀曹勛許便居以勛引疾有請也丁未直敷文閣知盱眙軍畢良史卒戊申詔改建大理寺先是監察御史湯允恭面對言今朝廷盛明百司一新獨大理獄湫隘非便乃命改建以其地入景靈宫尋用寺丞石邦哲言增創使院併其家居之仍嚴其出入之禁在今年九月朔今併書之刑部員外郎章燾面對乞申嚴法禁病囚非凶惡者召保責出或聼家人入侍從之庚戌右朝請郎幹辦諸軍審計司龔鑒知盱眙軍乙卯宰執進呈大理少卿李如岡疏論州縣以力役征科逋缺訴訟等事擾民乞戒飭上曰前後轉對上封事如此陳述者甚多第恐州縣滅裂不能恪意奉行可如所奏行下丙辰端明殿學士提舉江州太平興國宫何若薨先是衢州言若疾亟乞致仕上驚歎久之曰莫己云亡真可惜也此人似不能言者其實胸中開廓可喜及是秦檜進呈若恩數欲依謝克家例檜曰克家從僞楚為吏部侍郎建炎間任參知政事以言章罷及朱勝非再相首薦歸經筵意望再入政府以人言不得留遂進封事言陛下用一人言召臣以一人言去之臣恐四方有以窺陛下其不知聖度包容盛德又不知己之罪如此上曰朕即位之初黃濳善汪伯彥言從張邦昌者多矣當時務闊略且欲安反側彼乃自不知其罪檜曰陛下灼知忠逆之實如天之遍覆神竒臭腐俱蒙帝力而不自知也遂贈若五官例外賜帛五百匹量給葬事皇叔故融州觀察使士筏贈開府儀同三司追封潤國公筏卒已踰歲始用大宗正司請而命之戊午左太中大夫提舉亳州明道宫曽開復祕閣修撰致仕從所請也先是開已卒于衢州上覽奏謂秦檜曰當北使張通古等在館議歸疆休兵之時開與李彌遜等不止異議察其用心罪不容誅檜曰陛下兼愛南北斷以不疑徽宗卜永固之安太后遂慈寧之養兹為天下之逹孝初開彌遜與王庶等為不臣之逆說訹胡銓上書狂悖陛下獨語臣曰朕初無黃屋心今橫議若此據朕本心惟當養母耳臣踧踖不知所措孟子言舜盡事親之道貴為天子不足以解憂今人臣出仕或親在逺不聞願棄官歸養者故知陛下聖孝惟舜為然千百世相望一人而已於是除開職名致仕其贈官推恩並停己未秦檜進呈前侍從見在謫籍人上曰聞莫儔孫覿尚在近地此輩宜令逺去言官自合論列蓋朝廷清明忠邪判白姦臣逆子固當屏迹也辛酉權尚書禮部侍郎兼侍講陳誠之均州觀察使知閣門事錢愷為大金賀正旦使副起居舍人兼權直學士院王曮武節大夫和州團練使權知閣門事趙述為生辰使副述嘗在遣中以病免至是復命之初東昏王亶之世皇太后嵗遺費摩申后禮物巨萬及亮代立遂削此禮誠之入北境預為遜詞諭之金人竟不敢言及還上嘉之壬戍徽猷閣待制提舉江州太平興國宫潘良貴卒甲子資政殿學士提舉臨安府洞霄宫韓肖胄薨於紹興府肖胄明典故多識前言往行與其弟直祕閣膺胄尤相友愛後諡元穆丙寅上謂大臣曰近宣州布衣史敦仁上書言州縣多收水腳錢等事冝付户部看詳此亦民間之害不可不禁止也既而户部乞每石依元㫖收百錢數外輒增者抵罪從之庚午詔戶部申嚴舊制監司郡守毋得令子弟親戚部綱以宗正丞王葆轉對有請也辛未祕閣修撰新知荆南府韓求卒癸酉左武大夫平海軍承宣使兼閣門宣贊舍人建康府駐劄御前破敵軍統領趙萬添差洪州兵馬鈐轄萬本劉超部曲去為盜後復來歸從軍凡十九年是月洋州言真符縣民宋仲昌妻一産三子本人姓符國號生子之日適值天申節實皇帝紹隆景命子孫衆多之祥詔付史館九月甲戍朔上因言宣州米腳錢事謂大臣曰此蓋州縣並緣為奸不恤百姓朕今日所以休兵講好者正以為民耳若州縣不知恤民殊失朕本意上又曰國家設常平倉正為儲蓄以待水旱賑濟冝令有司以陳易新不得妄有侵移若臨時措畫假貸積榖之家徒為虛文無實效也辛巳詔川蜀諸縣鄉村民戶家業並用本名所管稅色物料依見今州縣衮折則例併紐稅錢舊例鄉村以典買田産升降至是左朝散大夫楊師錫知資州代還論今田價比昔倍貴或賣田及半則所推價貫已盡戶下遂無等第差役科配比之創買人戶極為不均故有是命甲申降授左承事郎福建安撫司主管機冝文字吳元美除名容州編管元美嘗作夏二子傳其略云天以商代夏是以伊尹相湯伐桀而聲其割剝之罪當是時清商飈起義氣播揚徑風四掃宇宙清廓夏告終于鳴條二子之族無小大少長皆望風隕滅殆無遺類天下之民始得安食酣寢而鼓舞於清世矣夏二子謂蠅蚊也其鄉人進士鄭煒得之持以告本路提㸃刑獄公事權福州孫汝翼汝翼惡之抵煒罪煒怒走行在訴元美譏毁大臣秦檜從尚書省下其章元美家有濳光亭商隱堂煒上檜啓亭號潛光蓋有心於黨李堂名商隱實無意于事秦他皆類此檜進呈上曰元美撰造謗訕至引伊尹相商伐桀事其悖逆不道甚矣可令有司究實取㫖至是法寺言元美因與李光交結言事補外心懷怨望遂造二子傳指斥國家及譏毁大臣以快私忿法當死上特宥之汝翼已移知荆南府亦降二官元美卒於貶所煒二十五年十二月壬子編管元美二十六年七月癸亥追復元官乙酉侍御史曹筠言學校科舉必欲得真賢實能而近來考試官多以私意取專門之學至有一州而取數十人士子忿怨不無遺才之嘆欲望特垂戒飭其有不公令監察御史出院日彈劾庶合士心從之丙戌詔金國人使自今於淮隂縣取接令本路轉運判官沈調如法修蓋館舍以金人言人使合於近便處山東邳州路取接往來故也丙申詔曹筠附下罔上可罷侍御史日下出門筠罷未見事因當考自建炎初劇盜范汝為竊發於建之甌寧縣朝廷命大軍討平之然其民悍而習為暴小遇嵗饑即群起剽掠去歲因旱凶民杜八子者乘時嘯聚遂破建陽是夏民張大一李大二復於回源洞中作亂安撫使仍歲調兵擊之布衣魏掞之謂民之易動蓋因艱食及秋乃請於本路提舉常平公事袁復一得米千六百斛以貸民至冬而取遂置倉于長灘鋪自是歲斂散如常民賴以濟草寇遂息議者謂掞之所請乃古社倉遺意使諸鄉各有之則緩急可以無憂而民之從亂者鮮矣冬十月丁巳監察御史湯允恭為殿中侍御史甲子拱衛大夫同知觀察使胡悈提舉佑神觀悈初得外祠王居正以姦黨駁之命遂格至是秦檜以京祠處之戊辰右迪功郎安誠除名惠州編管誠嘗為故相朱勝非所辟勝非之薨也誠自作齊文訕及朝政為郡守所發刑寺鞫實乃有是命庚午參知政事余堯弼簽書樞密院事巫伋請自今朝參退依典故權赴太師秦檜府第聚議從之時檜以疾在告故也十有一月甲戌詔右武大夫忠州團練使提舉台州崇道觀趙子彥特許久任俸賜如總管盱眙縣尉夏俊罷以使人過淮俊輒引惹生事故有是命乙亥汝州觀察使提舉佑神觀朱孝章為永慶軍承宣使孝章淵聖皇后兄也自訴二十五年未嘗進秩乃特遷一官癸未國子監李琳面對言本監經史未備乞下諸州有本處起發從之初徽州布衣汪大圭嘗伏闕上書押歸本貫至是更名復來上書欲舉前事為有司所獲壬辰詔免真决送二千里外州軍編管癸巳大理評事黃子淳面對乞將州縣耕牛科於民者悉行出賣所租斛斗一切蠲免詔户部看詳十有二月丁未大理寺丞莫濛面對乞進納流外出身人不許注諸州曹官詔吏部看詳取㫖集英殿修撰張公濟卒丁巳左朝奉郎監尚書六部門鍾世明轉對論富室乘農民之急貸以米榖使之償錢而又重取其利乞令止償本色從之庚申詔使人到闕賜宴等自今並須豐潔如稍滅裂其主辦官吏並置重法辛酉殿中侍御史湯允恭言自設民事律以來士大夫多為舞文健訟所持而縣令闕員往往無可入者望將民事被罪之人分定公私贓罪定斷詔吏部看詳迄不行二十六年正月戊辰除民事律甲子秦檜始朝詔肩輿至宫門命二孫直寶文閣塤直寶謨閣堪掖以升且命毋拜上甚喜曰且得與卿相見檜頓首謝上曰瑞雪應時可喜又使人在途並無須索足見省事己巳金國賀正旦使正奉大夫祕書監兼左諌議大夫蕭頥中大夫尚書禮部侍郎翰林待制兼行太常丞王競見于紫宸殿競陽安人曽祖尚恭熙寧間仕至光祿卿是月敷文閣待制知廣州薛弼卒是歲宗室子賜名授官者十有六人諸路斷大辟二十有五人金主亮稍習經史慕中國朝署之尊密有遷都意是歲因下詔求直言而上書者多謂上京僻在一隅官艱于轉漕民難於赴訴不若徙燕以應天地之中與亮意合乃遣尚書左丞相張浩右丞相張通古左丞蔡松年調諸路夫匠築燕京宫室皇城周九里三十步其東為太廟西為尚書省宫之正中曰皇帝正位後曰皇后正位位之東曰內省西曰十六位妃嬪居之又西曰同樂園瑶池蓬瀛栁莊杏村皆在焉其制度一以汴京為凖凡三年乃成浩遼陽人也建炎以來繫年要録卷一百六十一建炎以來繫年要録卷一百六十一金人地名考證薩里罕原書作撒離喝誤改見卷十一沙津原書作沙只即金史之沙祗並誤今改正唐古原書作同古誤改見卷一百六十烏爾衮原書作烏慮幹誤今改正尼瑪哈原書作粘罕誤改見卷一烏舍原書作兀室誤改見卷一羅索原書作婁宿誤改見卷一逹蘭原書作撻懶誤改見卷一費摩原書作裴磨誤改見卷一百十八
