body:
  text: 建炎以來繫年要録巻八十九宋李心傳撰紹興五年五月甲戌朔賜尚書禮部員外郎任申先進士出身王明清揮麈録靖康初李伯紀薦任申先賜對欽宗問以燕事即批出賜進士出身自是進用按申先靖康初以布衣召入遂補京官未嘗賜出身也乙亥上初謁太廟時章懐皇后忌前一日禮官請上服袍履欵謁畢還内易忌前之服從之太廟主管内侍八員吏卒一百五十八人時享以少牢祫享以太牢承節郎余祐之乞納覃恩所進一官為故祖母顧氏換一孺人封號詔特從所請祐之奉新人生三年併失父母顧氏自誓不嫁鞠育祐之鄉父老上其節行於朝未及封而死丙子直秘閣知潯州范直方行尚書刑部員外郎左廸功郎張嵲特改左承事郎嵲光化人熊克小歴云嵲襄陽人也今從曽慥百家詩序早從陳與義學詩以薦召對遂除秘書省正字嵲入館在七月壬申徳慶軍節度使趙仲温提舉臨安府洞霄宫任便居住南班近屬去屬籍而稱姓前此未有當考故遼彰武軍節度使馬堯俊特贈右武大夫貴州團練使以其子拱衞大夫忠州團練使欽援宗祀赦書有請也欽初乞比附換贈中原官品吏部侍郎晏敦復等言未見干照恐難慿用乞詳酌與贈一近下遥郡名目以慰逺人故有是命丁丑右廸功郎万俟卨言攝亷州助教成藻並補下州文學言在東都以白衣充大晟府製撰滿嵗得官藻朱勔館客嘗為越州司儀曹事以罪廢至是依討論例改授而言者論朱勔父子為東南之害至今人怨未弭藻為其門客得官入仕則其為人不待論列而可知乃詔藻不許再叙庚辰吏部員外郎周秘面對上曰自令臣僚轉對甚有所補由此擢用者亦多縱有不當亦不欲責罰恐人不敢論事秘歴城人也祠部員外郎林季仲嘗言臣之事君猶子之事父也子之事父情話而無嫌臣之事君亦直言而無隠盖天叙有典君臣父子皆天也内之事父外之事君其道一而已矣以唐虞三代之盛當時臣子若無可言者而賡歌之章告戒之辭惴惴然惟恐政治之不克終如曰無若丹朱傲又曰無若商王受之迷亂荒於酒徳哉舜聖人也成王賢君也何至於是以其平居相戒如家人之禮雖或過甚不以為嫌耳陛下勵精圖治自朝至於日中昃訪問群臣亹亹不勌凡國疵時病吏蠧民艱二三執政暨臺諫之臣當自悉言之矣又令百官以次面對從容而咨問之尚慮四方之逺不及聞知乃延見監司郡守兼聼而廣納焉下至州縣一命之微草莱一介之賤賜對於廷殆無虛日是宜眀目張膽輸忠竭誠盡言於不諱之朝也議者謂崇飾虛言指摘細故姑為文具者尚多有之至或專事導諛曲相怡悦冀得所欲則私計畢矣還視朝廷無一分顧藉心嗚呼陛下負群臣乎羣臣負陛下乎臣愚欲望陛下因羣臣奏對之際察其似此者而罷黜之但使直聲日聞乃治世之事也季仲所上䟽不得其月日因上諭且附書之更湏詳考命潼川路轉運司嵗織綾十萬匹赴行在為官告度牒之用辛巳輔臣奏事趙鼎曰昨日得㫖擇日降制除防禦使瑗為節度使封國公出就資善堂聽讀臣退而與孟庾沈與求商量皆仰賛陛下為宗廟社稷大慮謹令有司卜今月二十六日吉惟陛下裁擇上曰可與求曰此盛徳之事也而陛下斷自聖心行之不疑此自古聖賢之所難也臣知天佑陛下子孫千億受歴無疆矣上曰朕年二十九未有子然國朝自有仁宗皇帝故事今未封王止令建節封國公似合宜以朕所見此事甚易行而前代帝王多以為難鼎曰自古帝王以為難陛下行之甚易此所以莫可跂及也然陛下春秋鼎盛而為宗廟社稷大慮如此臣等是以知神靈扶持子孫千億也此事甚大陛下既已見透臣等更無復措辭不勝幸甚上曰藝祖創業肇造王室其勤至矣朕取子行下子鞠於宫中復加除拜庶㡬仰慰藝祖在天之靈庾曰陛下念藝祖創業之難而聖慮及此帝王所難能之事也初張浚之未出使也上嘗以語鼎浚庾與求曰此子天資特異在宫中儼如神人朕親自教之讀書性極彊記鼎先得㫖於行宫門内造書院屋一區欲令就學有司以圖來上凡建屋十有六間從約也至是書院成上曰只以書院便為資善堂俟除授訖命儒臣為直講翊善悉如資善故事左朝奉郎林叔豹提舉江西茶鹽公事叔豹請奉祠許之給事中廖剛言臣嘗謂國不可一日無兵而兵不可一日無食今諸将之兵被於江淮不知㡬萬數初無儲蓄之備日待哺於東南之轉餉東南之民已不勝其困矣可為之救此患者莫若屯田朝廷亦嘗行之於淮南及今閲數秋曽未聞其有補豈措畫之方勸相之誠有未至乎何其效之遲也臣願有説於此昔郭子儀以河中軍嘗乏食乃自耕一畝将校以是為差於是士卒皆不勸而耕是嵗河中野無曠土軍有餘糧史傳所載不可誣也以此知在主将加意而已夫子儀之事固不可以彊大将然自偏禆而降獨不可勉之以身率乎陛下誠詔之曰将校有如郭子儀之躬耕者朝廷當加旌賞彼亦必以為榮而胥勸矣此一説也昔漢之盛時力田者與孝悌同科臣觀比年行兵之賞以功遷資者動以萬計誠詔之曰每耕田一頃與轉一資彼以執耒之安方之操戈之危豈不特易此賞誠行萬頃且不難得将無不耕之田矣此二説也臣又聞諸葛亮據武功分兵屯田耕者雜於渭濵居民之間而百姓安堵軍無私焉今江淮之民流離失業者甚衆頋未有以安集之耳誠詔之曰假爾種糧復爾賦租雖有士卒不汝侵擾凡主将之可恃如此則彼有轉相勸率負耒耜而来者矣此三説也若夫貪尺寸之功為僥倖之舉與夫覘彼之所為而輙務勝之抑末也臣恐或為所欺反自取困弊耳非計之得也願陛下虛心而加擇焉詔都督行府相度措置忠訓郎閤門祗候何蘚特遷修武郎赴大金國軍前奉表通問二聖賜金帶一裝錢千緡官其家二人蘚灌子也灌已見建炎元年正月辛夘時右僕射張浚奏遣蘚至雲中見金帥故有是命都督行府言今日之急莫先財賦若按籍可考則無容失陷自兵火後來成法廢弛州縣凡有移用漕司不能盡察漕司凡有支使户部不能盡知因致州縣肆為侵隠失陷錢物為害不細欲諸路收支現在錢物今後分上下半年縣具數申州州類具同本州之數申漕司如係常平茶鹽司并提刑司錢物即依此申所𨽻置籍本司總一路之數作旁通開具聞奏付之戸部考察登虧仍詔守臣通判今後嵗終及替罷并開具管下諸縣并一州収支見在數目申尚書省其初到任即具截日見在依此供申送部亦行置籍以備移用庶㡬稍革陷失之弊詔户部依此行下左中大夫李芘卒壬午尚書禮部員外郎任申先試秘書少監監察御史許摶試禮部員外郎左承議郎陳康伯提舉江南東路茶鹽公事康伯初見紹興元年十一月癸未詔江浙四路共造五車十槳小船五十仍以貼納鹽袋錢五萬緡為造船之費時已造十三車九車戰艦而言者以為緩急遇敵追襲掩擊湏用輕㨗舟船相参乃復為之甲申上諭輔臣曰昨路允廸奏到所記聖語見揚州駐蹕時人才凡冗宜遭變故今行在人才皆可觀趙鼎曰陛下以人才為意中興可復天下幸甚尚書禮部侍郎唐煇兼權兵部侍郎殿中侍御史張絢入對面奏諸郡守臣紀交孫恭邵彪王仰馮晉胡紡鄭疆劉無極八人非才詔並罷時神武中軍統制楊沂中遣士卒五十餘人運怪石置之太平樓酒肆絢遇諸途奏言今邊境多虞百姓艱食陛下方且卑宮菲食焦勞於上一花一石屏去不顧痛革京都侈靡之弊奈何軍中不能上體聖意乃敢公然運石以為酒肆㳺觀之美豈獨訓練士卒之時不當勞以無益之役而衆目所觀傳播四方亦非美事此風漸不可長兼臣近見村民多取花株竹栽市街貨賣若不嚴加止絶亦有棄本逐末之患欲望特降指揮令體問今日運石因依重加行遣以絶後來仍乞下臨安府令禁止村民貨賣花竹庶㡬陛下勤儉之徳不待家至户曉而侈泰之俗一變而為樸素實艱難之先務詔禁止沂中坐罰金沂中罰金在是月庚寅内侍武翼大夫果州團練使黃克柔落致仕提舉亳州眀道宫任便居住詔夀國夫人王氏慶國夫人呉氏各増封為六字仍依禄式支破請給二人皆上乳母也初池州民崔徳全不能事母及死罵母不塟其弟徳聰潜𦵏之徳全怒持刃逐徳聰徳聰奪其槍連刺之乃死有司當徳聰處斬憲臣以為情實可矜乃上其事尚書省請梟徳全首論徳聰絞刑從之是日張浚至潭州初浚自建康西上而樞宻副都承㫖沿江制置副使馬擴自武昌召歸乃以為都督行府都統制浚行至醴陵獄犴數百人盡揚太遣為間探者安撫使席益傳致逺縣囚之浚召問盡釋其縛給以文書俾分示諸寨曰今既不得保田畝秋冬必乏食且餒死矣不若早降即赦爾死數百人驩呼而徃浚至長沙賊首黃誠周倫先請受約束然誠等屢嘗殺招安吏士猶自疑不安浚遣制置使岳飛分兵屯鼎澧益陽壓以兵勢賊大驚遂定出䧏之計乙酉秘書省正字李彌正轉對面奏見存西北之兵嵗久銷减乞令州郡募東南民兵教習以壯國威禦盗賊萬一朝廷有警亦可募以調發上曰朕自知南兵可用向有五百人皆平江人在張俊軍中徃徃率先犯陣其不可用者但未教習耳彌正又因口陳大臣進退之易實害治體國朝自祖宗體貎大臣陛下即位以來恩意尤篤上曰祖宗體貎大臣禮意甚厚與庶僚不同此朕家法每奉以周旋如鄭文公雖一國之君進臣不以禮退臣不以道為詩人所譏彌正又陳古者創業中興之君必有謀臣任專責重憂勤逸樂與之終始今人之才雖不敢逺望古人願陛下捨短取長擇忠實可仗者推腹心以任之則事功可見就緒上曰善若無一二腹心之臣孰與謀議詔禁銷金翠羽為飾用吏部員外郎姜師仲請也右朝請大夫主管江州太平觀李仲孺知泰州丙戌左朝奉郎新通判洪州李椿年幹辦諸司審計司椿年既除官再得召見論今日之弊甚大者有三一曰銓選之弊員多闕少二曰食貨之弊錢輕物重三曰所司之弊吏强官弱吏部有銓試盖所以汰其不才者也不才者徃徃多作縁故以幸免之臣愚以謂稍清入仕之流莫如除免試之令應初到部之人試而後得調試而不中亦不得調殿一年而再試於格合免試者只許陞名次或占射差遣雖貴如宗室戚里公卿子弟亦不得免焉不由試選者雖殘零及破格闕亦不得注應未試者不許堂除及舉辟差遣其免試已授差遣者竢到部合試而所謂試者必嚴為法而遴選之如此則有甄别而不至於太冗矣員多闕少非所患也物重謂何耕植者寡而無以生之故也錢輕謂何費用者廣而無以藏之故也井田之法壊而㳺手者衆其已久矣加以軍興天下之民死於賊者十之八九幸而存者不入於兵則入於浮屠捨其常産不耕而食不蠶而衣是以物艱而重也錢之行世也方其平時取有常制用有常度不藏於公帑必藏於私家矣及乎軍興轉餉之資賞錫之給軍器之費取之百端用之百出隨歛而隨散之私家公帑皆不得其藏矣是以錢易而輕也臣愚以謂今日討賊戡亂兵不可去汰其無能者可也兵不貴多貴乎精况無能之兵本吾農也方今淮甸荒地千里莫適為主少貸而予之耕植則彼得所處而吾去冗食之蠧矣度牒勿鬻可也或曰朝廷鬻度牒嵗得錢數百萬軍儲是賴奈何罷之乎臣應之曰度牒所得之錢非由天降非由地出不過歛於民間而已夫欲斂於民間盍亦以我所有易彼所無變而通之低昻在我胡為不得何至以度牒為歛而因以失吾農哉汰去冗兵罷鬻度牒而又盡變通之利制低昂之權然則物重錢輕非所患也所謂吏强官弱者非吏撓權之罪官不知法之罪也眀乎法則曲直輕重在我而已吏豈得而欺乎今之士大夫以為法家者流而莫之學也在今初入官人有銓試銓試有斷案盖慮其不知法也然銓試者或亦以縁故而免試斷案者亦非素習不過臨時轉相傳寫而已求其眀法十百中無一焉法既不眀臨民遇事不能自决吏始得以弄法而欺之曲直輕重惟吏所為强弱之形於此可見臣愚以謂欲官皆知法而吏不得以欺莫如嚴銓試之法禁傳寫之弊應入官人必由銓試試者必以斷案不以斷案者不考考而不入等者不得調如是則在官者皆知以法繩吏矣吏强官弱非所患也臣究觀今日之弊無大於此三者望陛下斷而行之以幸天下椿年又口奏度牒事以為今一嵗所鬻不下萬數是嵗失萬農也積而累之農㡬盡矣非生財之道也昔越之報呉男女不以時嫁娶父母有罰生男女者有賞今則反是上首肯之乃下其章命吏户部同措置然軍事方仰給卒不能止也日歴今年五月丙申吏部侍郎晏敦復等申明京朝官西北流寓無差遣不縁罪犯未能到部見年二十五嵗已上之人並許差嶽廟一次亦恐與此不許免試陳請相妨當考左奉議郎劉長源充諸王宫大小學教授長源成都人以薦對而有是命故追復顯謨閣待制李景直更與致仕恩澤一名景直嘗為工部侍郎崇寧末應詔上書論時事坐奪官流新州而死靖康初録其子至是其家有請特許之詔中書舍人胡寅論使事辭㫖剴切詳眀深得論思之體令學士院降詔奨諭時既用尚書右僕射張浚議遣問安使何蘚入雲中寅上䟽言女真者驚動陵寢戕毁宗廟刼質二帝塗炭祖宗之民乃陛下之讎也頃者誤國之臣自知其才術不足以戡定禍亂而又貪慕富貴是故譸張為幻遣使求和以茍嵗月九年於此其效如何彼之一身叨竊爵位而去曽何足道而於陛下聖徳國家大計虧䘮多矣所幸陛下智勇日躋灼然獨見於邪言久惑之後奉将天討罪狀劉豫再安國歩漸圖興復天下忠臣義士聞風興起各思自効以佐丕烈譬如人行萬里登車出門又如枝梧厦屋初正基柱存亡治亂寔係此時今乃蹈庸臣之轍踐已失之謀犯孔子之戒循魯莊之事忘復讎之義陳自辱之辭臣竊為陛下不取也或謂不少有貶屈其如二帝何臣應之曰自建炎丁未至於紹興甲寅所謂卑辭厚禮以問安迎請為名而遣使者不知㡬人矣知二帝所在者誰歟見二帝之面者誰歟得女真之要領者誰歟因講和而能息敵兵者誰歟臣但見丙午而後通和之使歸未息肩而黃河長淮大江相次失險矣臣但聞去年冬使者還言豪長貼服國勢奠安形於章奏傳播逺近曽未數月而劉豫稱兵犯順矣女真者知中國所重在二帝知中國所恨在刼質知中國所畏在用兵則常示欲和之端増吾所重平吾所恨匿吾所畏而中國坐受此餌既久而後悟也天下其謂自是改圖必矣何為復出此謬計耶茍曰姑為是耳豈有修書稱臣厚費金帛而成就一姑為之事也茍曰以二帝之故不得不然則前效可考矣况嵗月益久敵情益閟必無可通之理也臣嘗思之陛下與女真絶則臣下無所得而人主為義舉若通和則利歸臣下而人主受其惡故凡願奉使通和皆身謀非國計也陛下可不據孔子之論而决此䇿乎茍為不然以中國萬乗之尊而稱臣於外國則宰輔而下皆其陪臣也借使女真欣然講觧以一将軍數萬衆駐兵泗水之上願陛下面相結約㰱血而退不知陛下何以待之陛下試加採擇或合聖意即以此讎當復無可通和之義明降指揮寢罷奉使之命䟽奏上嘉納命宰相趙鼎召至都堂諭㫖仍賜詔奨諭寅又上表言天下有至公之心有正直之論違正論拂公心以行其邪説雖當時不悟及事已敗世已陵遲然後悔之則無及已姑以近事眀之方王安石得志託大有為之説大有為之説者孟子之言也豈不美哉當時元勲舊徳皆以祖宗舊法不可變改安石斥之為流俗而其説盛行自今觀之其所謂大有為者乃所以召亂其所謂流俗者皆賢才也使神祖照之於司馬光辭樞宻副使之時而退王安石罷新法則尚有崇觀之亂乎及蔡京秉政託繼志述事之說繼志述事者孔子之言也豈不美哉當時忠臣義士皆以新法害民蔡京名之為謗訕而其說盛行自今觀之其所謂繼志述事乃所以遂其私意其所謂謗訕者皆忠言也使上皇照之於陳瓘論列之時而退蔡京復元祐則尚有宣靖之禍乎天下之理一是一非出於是則入非出於非則入是理不並立人無两存此人材邪正之所由分而國家治亂之所由判自古如此豈惟今哉女真入犯以來和戰两議肇於孝慈在位之日两議不决馴致北狩自今觀之其不可與和亦易見也而和議之説不息非特通和女真又欲通和劉豫和之一字寔懐二心以國與人亦所不恤豈不過甚矣哉原其所本起於耿南仲昌言之正猶王安石大有為之論蔡京繼志述事之説而尊主庇民疾讎殄惡不欲和者亦猶司馬光不以王安石為然陳瓘不以蔡京為是八年於此正論不勝監觀前事識者憂之尚賴陛下險阻備嘗照知情偽於和議事皆已試用了無功效此䇿不足中興斷自宸𠂻舍非從是遂嚴降詔㫖罪狀反叛聲罪致討一振國威豈於女真尚肯通使臣姿禀素愚誤以文字上簡聖知擢置綸闈仍使獻納適覩何蘚之事恐和説復行國論傾危士氣沮䘮所繫不細遂具陳奏陛下憲天聰眀灼見忠志曲賜褒諭以來衆言使天下忠義之士皆知陛下雪耻復讎之意用賢才修政事厲兵選将駸駸北向以為迎二帝之實大計一定邪説不行中興可期宗社之福豈獨㣲臣忝竊恩詔以為今日美談而已户部奏諸路殘破州縣守令勸民墾田及抛荒殿最格其法墾田増及一分郡守陞三季名次累及九分遷一官虧及一分降三季名次九分鐫一官縣令差减之縣具墾闢實數月申州州季申監司増虧十分者取㫖賞罰丁亥尚書右司員外郎周綱直寳文閣知婺州從所請也戊子左朝請大夫湖南北㐮陽府路制置司參議官陳子卿主管台州崇道觀右承奉郎李若虛充湖北㐮陽府路制置司參謀官若虛已見時祠部員外郎林季仲嘗因轉對論幕官之賢否繫将帥之成敗選用賔佐不可不慎今三四大帥統重兵於外能懐忠赤共濟艱難固無盧從史之事矣獨未知賔佐皆如孔戡否也近時文士鄙薄武人過甚指其僚属無賢不肖謂之從軍雖有賢如戡者徃徃未必屑就文武一道也何至如是之區别哉欲望陛下遴選老成練逹之士徃佐諸将稍優禮秩以寵其行遲以嵗月不見闕遺擢居清要以示激勸使之身在幕府心係朝廷出有禆賛之益入有榮進之望上可以鞏固王室下可以保全功臣非小補也惟陛下留神幸甚季仲此奏不得其年月今且附此俟考己丑參知政事兼權樞宻院事提領措置財用孟庾進知樞宻院事時右僕射張浚往江上視師庾之除浚初不與乃上䟽言如此則臣不當在相位矣上以手劄諭之直秘閣主管台州崇道觀向子忞知衡州景福殿使宣州觀察使黃冕落致仕除入内内侍省都知冕在蜀中屢召而未至也文林郎許聰贈宣教郎官一子聰知楚州録事參軍為金所殺故録之庚寅趙鼎奏事因言李沆作相時每奏祥瑞湏雜以水旱螟蝗文字進呈憂國愛民之心如此上曰王旦賢相也東封時都無一言如天書降殆難考驗但朝廷内外得人四民安業則為上瑞辛卯左從政郎嚴州壽昌縣令臧梓特改合入官令再任以两浙轉運司奏其治狀有實也上曰若得賢令尹如此一方皆受恵趙鼎曰一縣生靈數十萬縣令得人則人人安業上曰然朕區擇監司守令政欲安百姓也事祖在四月乙夘壬辰詔張浚視師江上今延日久可召還行在令學士院降詔左從事郎新福州州學教授黃衡特改左宣教郎以薦對也尋以衡為秘書省正字左朝請郎魏良臣主管台州崇道觀詔諸路沿海州縣應有海船人户以五家為一保不許透漏海舟出界犯者籍其資同保人减一等時金齊於沿海諸州置通物場以市南物之可為戎器者商人往者甚衆多自平江之黃魚垜頭易水手以去故譏察之乙未監察御史謝祖信守殿中侍御史時方治紹聖大臣誣謗之罪而祖信與章惇家連姻上面諭以朕排浮議而用卿祖信頓首謝上語以今年九月丁亥祖信乞罷御史劄子修入故寳文閣待制馬黙加贈二官為少傅以其子直秘閣純言黙係元祐從官首先入籍之人故也黙單州人元祐戸部侍郎黨籍待制已上第七人單州居住丙申太常丞莊必彊言自廵幸以來祠祭所須惟責辦於駐蹕州郡故酒取於沽脯求於市肆非所以交神眀乞自今幣帛下左藏取撥其他禮神之物並令户部計一嵗之直下臨安府委通判專掌無得賖舉於民從之秘閣修撰新知鎮江府兼沿江安撫司公事劉寧止陞右文殿修撰趣之鎮寧止言本府控扼大江為浙西門户乞撥常州江隂軍及平江之崑山常熟二縣𨽻屬本司庻防秋之際長江一帶號令歸一可以固守從之丁酉尚書右僕射張浚提舉詳定一司勅令參知政事沈與求同提舉初置提舉官也左中大夫知潭州充荆湖南路安撫使席益為端眀殿學士荆湖南路制置大使兼知潭州益既以罪黜至是岳飛為荆湖制置使中書乃言湖南見屯大軍全賴帥臣協濟理宜増重事權故有是命中書舍人胡寅言設官分職凡以為民此治世之道士大夫之守也兵興以来衣冠轉徙失所者衆於是開奏辟之路置添差之闕廣宫廟之任増待次之除所以恵恤之者亦厚矣而奔競日昌不安義命方在責籍則乞叙雪已得叙雪則乞祠禄已得祠禄則乞差遣已得差遣則乞改替已得改替則乞近闕已得近闕則乞見闕已在見任則乞超擢攀縁進取肩摩輦下士風之弊莫甚此時人以私計不便為言豈有體國在公之念曲徇其意則闕少員多勢難均及漠然弗頋則造為譏謡有害政道伏見舊法已有差遣及方在貶謫者不得輙入國門所以杜貪躁清仕路存綱紀也伏望眀詔宰執舉行成憲有馳騖不悛者仍委御史臺覺察弹奏從之寅又言近來書命多出詞臣好惡之私使人主命徳討罪之言未免玩人䘮徳之失伏望申命外制之臣以飾情相悦含怒相訾為戒褒嘉貶黜務合至公詞貴簡嚴體歸典重詔以付中書後省戊戌殿中侍御史張絢言伏見今年正月指揮應沿江諸帥捍禦戰敵金人大軍立到竒功及統制官等内有未曾給到料錢文歴之人並令戸部特行出給今後因戰敵金人立到竒功人亦依此然比來諸軍保眀到竒功之人止是開姓列名不曽詳具立功之狀雖朝廷依所申出給文歴往往輿議不平多謂冐濫甚非陛下激勸戰士之本意謂宜依倣古制凡将士立功有卓然竒偉者並令逐軍着實申奏朝廷指其出戰之處叙其鬭㨗之功所獲俘馘之數實有多寡所獲器甲鎧仗實有㡬何大小輕重纎悉圗狀先經聖覧即下有司或差宻院檢詳或委檢正都司各令親加參考而吏輩勿預其事差别髙下等第優劣㧞其尤異者具名申於三省取㫖付之户部然後出給文歴以寵其勞則賞當其功人人知所激勸矣臣取㑹太府寺給過竒功文歴除劉光世下靳賽等七人岳飛下徐慶等二十一人係已給歴外見有光世下再保眀到劉琪等六十三人張俊下保眀到張宏等四十人見到本寺出歴未曽給付欲望俯采臣言立為定制仍将光世俊見出歴人未得放行乞自日下便令逐軍子細着實開坐所立之功申上朝廷以俟參騐眀白一併出給庶㡬有功者益知所勸惰怯者自知激昂人皆務立竒功則敵人雖强不足畏矣䟽奏詔三省委都司檢正樞宻院委檢詳如絢請左朝散郎主管華州雲臺觀王瓘充川陜宣撫使司計議軍事用呉玠請也是日岳飛至鼎州之城外置寨列艦飛素有威望而軍律甚嚴乃先遣潭州兵馬鈐轄楊華入賊招安華未降時為賊魁以寛厚得衆遂與故部曲潛結楊太黨謀殺太以降時大旱湖水涸如深冬賊益懼己亥貴州防禦使瑗為保慶軍節度使封建國公制畧曰眷求屬籍早毓宸闈迨兹就傅之初式舉出封之典學士孫近所草也宗正少卿兼直史館兼侍講范冲充徽猷閣待制提舉建隆觀兼史館修撰兼侍講資善堂翊善起居郎兼侍講朱震兼資善堂賛讀仍賜震五品服初上面諭鼎以二人除命鼎以冲親嫌為懇上不從鼎退不復批㫖孟庾沈與求奏其事遂親筆付出制曰朕為宗廟社稷大計不敢私於一身選於屬籍得藝祖七世孫鞠之宫中兹擇剛辰出就外傅宜有端良之士以充輔導之官博觀在廷無以易汝冲徳行文學為時正人乃祖發議嘉祐之初乃父納忠元祐之末敷求是似尚有典型頋資善之方開史館經筵姑仍厥舊朕方求多聞之益爾實兼數器之長施及童䝉綽有餘力蔽自朕志宜即安之時張浚在潭州聞建國公當就傅亦薦冲震可備訓導朝論以二人為極天下之選或謂浚繇此與鼎始有隙趙鼎事實云一日上語鼎曰欲令貴州防禦使出閤選官教之且就禁中置學館便建資善堂庻㡬正當所差官亦有名仍一依皇子建節除國公鼎乃與同列議選范冲朱震為翊善朝論以二人為極天下之選上亦嘗謂鼎曰前日臺諌因對語及資善之建皆曰如朱震范冲天生此二人為今日資善之用可謂得人矣然是時建資善及命官與出閤之日適張浚在外故憸人得以間之始見疾矣按浚行状載上語已云不乆當令就學又時政記亦云上嘗語臣鼎浚曰此子天資特異云云則浚無容全不知但封拜之日浚適在軍中亦猶韓琦富弼相失云爾朱勝非閒居録云鼎以姻家范冲及朱震兼資善為鼎交結近闥恐非其實方疇稽山語録曰疇嘗問趙鼎曰秦相嘗謂議論公者専以資善堂藉口不知何也鼎曰秦㑹之陷善類之計也某為張徳逺所知同升廊廟所謂相照以心者况當時資善嘗與徳逺共議初無異論徳逺安得此言哉㑹之却説鼎云丙辰去國之後徳逺以此議論鼎専以建國其實是㑹之欲以此陥善類却借徳逺為辭耳徳逺必不如此也疇又問曰不知公當初嘗與張相議論資善堂事本末如何鼎曰某與徳逺同秉政時上一日宣諭宗子某入資善堂聴讀卿等可擇一老成士人為翊善某被㫖之後退至中書沉思未得其人間徳逺以筆書掌中覆之案上云某已得其人矣公試團㸔鼎曰得非范元長乎徳逺以掌中元長姓名相示其議遂定明日同進呈乞以范冲充翊善㑹之不知所従来如此妄意冲是鼎薦入資善堂不出徳逺之意撰造此説盖欲併中吾二人其用意不淺也按此時浚在行府無縁同進呈疇所記必誤武功大夫貴州刺史提舉江州太平觀楊公恕給真俸以隨龍恩也詔以盛暑命諸路監司分徃所部慮囚前二日進呈行在踈决上問外路如何趙鼎曰臣記毎年夏熱時令提刑司催决獄事自渡江後不曽舉行上曰大理等處禁繋無㡬當行之諸路令無淹延刑禁庶暑中不致罪人疾病也自是遂為永制庚子尚書左僕射趙鼎言臣與范冲正係姻家然臣罷簽書樞宻院退歸山間冲始有召命去年春再有㫖促冲赴闕亦在臣未還朝之前自此冲毎有除命臣必再三陳免冲超除次對適在臣待罪宰相之日冲之文學行誼陛下所知前後除擢雖出聖意然四方萬里安能戸曉必謂臣以天下公器輙私親黨崇觀僥倖之風不可不戒其漸伏望追寢成命優詔不許知䖍州韓昭奏周十隆已就招詔多方撫存仍官其首領昭球從子也辛丑右司諫趙霈乞自今贓吏委有屈抑方許理雪如詞理稍渉虛妄重行竄斥詔刑部勘當立法申省壬寅左從事郎李誼復為樞宻院編修官誼初坐漏洩朝事被斥至是訴其枉故復之事祖在紹興二年十一月是月詔殿前司軍人與百姓相犯並送大理寺根治此以紹興十四年九月十五日刑部状修入
