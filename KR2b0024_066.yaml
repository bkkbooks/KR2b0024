body:
  text: 建炎以來繫年要録卷六十六宋李心傳撰紹興三年六月甲申朔兵部侍郎兼權吏部侍郎鄭滋言兩淮殘破之餘遺民無幾請併州縣省官吏以寬民力詔帥司相度以聞徽州童子林國佐九嵗能誦書詔免解賜帛自是遂為故事是月鄒庭聞林次勘八月饒州卓興九年五月饒州王文明十年九月饒州晏章十一年五月饒州江安國定國十二年三月饒州鍾逺四月饒州章林十二月張嵓叟嵓卿十二年五月福州陳丕顯十二月饒州朱授十五年正月饒州寧百拱四月潘汝功十二月饒州戴松戴槐二十八年三月福州莊大成八月饒州孫才三十年茹億年八月張逵皆免解一次惟晏章兼習步射能變陳勢故永免文解焉按二年至三十年童子求試者三十六人內授官者三人已見二年三月癸丑八月庚戍今年三月丙寅左武大夫榮州防禦使神武後軍統制巨師古除名廣州編管初師古以所部屯揚州淮南宣撫使韓世忠令移屯泗上師古稱疾不出世忠怒劾之詔統領官髙舉將其軍還行在熊克小歷韓世忠欲令聽其節制師古不伏世忠劾罷之按日歷今年四月癸巳得旨令師古聽世忠節制非世忠欲之而師古不伏蓋不肯屯泗上克恐誤也乙酉詔以臨安獄多淹滯命察官一員詣府監視決遣事大者趣之婺州進士張志行賜號沖素處士志行東陽人以學行為鄉里所推大觀中數舉八行不就浙東宣諭朱異言于朝故以命之志行年幾七十矣詔自今給降空名官告綾紙令官告院各立字號吏部置籍其書填官司限一月申部注每年仍具已未書填總數申部用權侍郎鄭滋請也自渡江來所降度牒甚衆而無其籍至是始申明之丙戌復置六部架閣庫自崇寧間何執中為吏部始建議置吏部架閣官其後諸曹皆置凡成案留部二年然後畀而藏之又八年則委之金耀門文書庫人以為便迄宣和再置再省至是都官員外郎蘇良冶奏復之遂命末廳郎官兼良冶建請在四月辛亥十五年七月又復閣官丁亥同簽書樞密院事韓肖胄工部侍郎胡松年入辭肖胄言今大臣各徇已見致和戰未有定論然和議乃權時之宜以濟艱難他日國步安強軍聲大振理當别圖今臣等已行願毋先渝約或半年不復命必别有謀宜速進兵不可因臣等在彼間而緩之也肖胄母文安郡太夫人文氏聞肖胄當行為言韓氏世為社稷臣汝當受命即行勿以老母為念上聞之詔特封榮國太夫人以寵其節文氏彥博孫也肖胄等奏左朝請郎祕書丞環中為左朝議大夫充書狀官從之文氏進封在戊子命提舉修內司楊公弼更作行官南北臺門戊子資政殿學士提舉臨安府洞霄宫許翰薨于吉州翰以今年七月丙辰轉官致仕七月辛巳贈官日歷附傳乃在去年誤也度支員外郎權監察御史胡蒙宣諭浙西還上命蒙先以御寶手歷及所申明利害進册來上是日入見蒙出使七閲月所按吏八人二年十二月庚戍海監丞董兖三年二月承節郎長洲添差縣尉丁諧保義郎監湖州稅務趙庠之三月甲子承節郎添差監震澤稅務趙公遜四月壬辰浙西提舉茶鹽公事夏之文五月丁巳昌化令黃壽並放罷取勘左文林郎王闈五月丁卯行遣薦士六人三年四月丁未左朝奉郎知吳縣宫聲右通直郎知晉陵縣曽仍五月戊寅左朝奉郎知崑山縣俞彥興右朝散郎知常州俞俟庚辰右承直郎知於潛縣樓璹並遷官九月壬申布衣李杞補官論者以為蒙所言皆吕頥浩風指也後半月擢蒙為右司員外郎蒙除右司在甲辰庚寅宣撫處置使張浚奏捷且請俟過家上冢畢順水赴行在上曰賴敵自退兩蜀無虞吕頥浩曰臣深以為憂今強敵敗散皆陛下聖德所致所有張浚更取旨上曰可速其來王似盧法原督使趣赴任仍降詔撫存蜀中并興元金洋問民疾苦時似已至司治事而行在未知也是日德音熊克小歷作曲赦蓋誤降川陜鬬殺情輕死罪囚釋流已下吳玠關師古將士令宣撫司第功以聞王彥特放罪復往金州控扼應歸業人户積欠稅役等皆蠲之四川得解舉人願赴南省者給進義副尉驛劵自軍興後創行法度科斂見為民病非軍須所急者仰以便宜一面住罷夔峽州縣權免商稅及力勝一年時浚方論却敵之功將佐幕官皆以便宜遷秩起復鎮西軍節度使涇原秦鳯經略使知秦州陜西都統制吳玠為利州路階成鳯州制置使寶文閣學士右通議大夫參議官程唐進秩一等徽猷閣待制參贊軍事權宣撫判官劉子羽升寶文閣直學士洪州觀察使金均房州鎮撫使王彥進保大軍承宣使兼宣撫司參議榮州防禦使熙河蘭廓路馬步軍副總管統制熙秦軍馬關師古為秦州觀察使落副字榮州團練使環慶路馬步軍副總管同統制軍馬楊政為明州觀察使知慶陽府兼節制成鳯州軍馬康州團練使秦鳯路馬步軍副總管統制和尚原軍馬吳璘為榮州防禦使知秦州兼節制階文州軍馬朝請大夫直祕閣通判鳯翔府陳逺猷為左朝議大夫饒風之敗宣司賞功他書皆不見王彥行狀云敵自褒斜遁去樞相張公以為敵雖深入而亡失士馬之多前此未有實同敗衄而卒保全蜀者繄諸將勤力棄過録功用黜陟聖旨進秩行賞有差授公保大軍承宣使公獨不受士益重之劉子羽墓志敵由商於犯金州涉春遂遁去還興元然張公已困於讒公亦被罪也是嵗除寶文閣直學士據此則子羽除寶直當在此或除宣判時朱勝非所謂張浚以便冝除官至雜學士殆指此也日歷今年八月丁未程唐轉官回授九月丙子楊政陳逺猷轉官同日成州團練使田晟升郢州防禦使皆用饒風關功賞十月庚子有旨吳玠已除利州路階成秦州制置使而功迹記玠加檢校官除制置使皆併繫於饒風退師之後蓋宣司便冝所授以不見本月日故因浚赴召牽聨具書之更須詳考彥辭不拜王彥不授官似為朝考有放罪指揮宣司因不敢奏行狀恐飾説耳頥浩又遺浚書曰即未可去蜀第留宣司當為開陳如所請浚不顧既而法原亦至閬州浚遂與子羽及參議官左通議大夫王庶主管機宜文字兵部員外郎馮康國鼎州團練使提舉江州太平觀劉錫俱東以左承議郎李良臣提點降賜庫良臣掌庫以明年四月十九日良臣申明劉錫等借金銀狀修入武經郎閣門祗候知長寧軍甄援權隨行幹辦此據明年五月十九日甄援乞換給狀罷朝議大夫知瀘州蘇覺提舉成都府玉局觀而以唐為瀘南沿邊安撫使知瀘州唐之除日歷不見瀘州知州題名覺罷唐到皆在此月四年四月癸未唐自知瀘州落職奉祠邠州觀察使永興軍路經略使郭浩知興元府本府知府題名浩今年七月到任未知浩此時為何官題名稱彰武軍節度使蓋誤直祕閣潼川府路轉運副使兼隨軍轉運副使張深知夔州日歷深以今年八月癸未用浚奏改知夔州尋又以左朝散郎利州路提點刑獄公事馮楫權樞密院計議官與偕行楫權計議官據紹興三年九月十二日楫論遂寧府絹估劄子繫銜如此他書蓋無有也日歷紹興八年正月十九日御史中丞常同劄子伏見楫諂事張浚僅同㒒𨽻頃嵗浚罷宣撫還朝楫無以為佞乃作疏頭抄斂屬官監司郡守錢物以獻於浚取於它人者多而自取者少幕中不平紛爭而止三月六日辛卯臣僚上言近嘗彈論馮楫之罪已蒙施行四川自靖康以來七年上供皆因軍興諸處截用楫獻䇿於浚再行科斂會朝廷訪聞降指揮而罷蜀人畏之切骨按同所云皆此時事今並附此其有無當考隨軍轉運副使張澄統本司西兵赴行在權主管軍馬據澄明年五月十四日乞繳隨軍物色狀修入熊克小歷四年四月先是張浚令宣撫司隨軍轉運使張澄統本司兵萬人出蜀詔趣至行在據日歷今年九月乙亥浚具到將帶本司兵馬四項數多者止五千人統押官亦無澄名數內有五千人又已得旨遣還此所云統本司兵萬人恐誤今修潤附此當考良臣綿竹人也中興聖政是日上謂吕頥浩等曰為法不可過有輕重然後可以必行而人不能犯太重則法不行太輕則不禁姦朕嘗語徐俯異時宫中有所禁切令之曰必行軍法而犯者不止朕深惟其理但以常法處之後更無犯者乃知先王立法貴在中制所以決可行臣留正等曰法為天下平也不可得而重不可得而輕惟其當而已矣故法之立也固已服人之心於未抵罪之前而又哀矜惻怛不忍以行之則下知有恥而義足以禁其非也茍惟不然加之極刑有死而已人茍自棄則死非其悔奈何以此懼之哉國家仁恕為治惟熙寧用事之臣制重祿以行倉法至於一錢以上坐徒劉摯謂徒為暴刑難正其罪蘇軾譬之子弟有銖兩之過父兄施斤鈞之罰皆謂其不可行也法嚴而不可行無乃有悖於事情有不合於先王之法乎法不可行而存之無乃有害於民有纍於國體者乎視宫中禁切之令雖軍法無益則吏祿之法冝用中制然後決可行也辛卯沿海制置使仇悆罷壬辰江南東西路宣諭官劉大中言建昌軍軍學教授李彌正玉山縣丞張絢清修亷潔文學過人詔並進一官赴行在彌正彌遜弟絢丹陽人也左朝奉郎直龍圖閣李膺知虔州坐令鹽商獻納贍軍錢為提舉官所劾下吏當罰金詔膺奪職貶秩一等佐吏九人抵罪有差賜王似宣撫處置副使印從其請也癸巳監登聞鼓院廖邦傑罷以侍御史辛炳論其移疾廢朝也此為洪擬言闕政事寶文閣待制提舉建州武夷山沖祐觀陳戬卒甲午神武前軍統制兼淮南宣撫司都統制王􅊛為荆南府潭鼎澧嶽鄂等州制置使時鼎冦楊么復犯公安石首二縣先五日命湖南安撫使折彥質會荆鄂潭鼎統制官辛太崔邦弼任士安杜湛之衆往討之彥質數請濟師乃命􅊛總舟師以行遣忠鋭第一將崔增神武後軍統領髙進以所部五千從􅊛又命韓世忠劉光世各以舟五百與之仍持五月糧以行凡湖南北兵並受􅊛節度時知嶽州范寅敷遭內艱以䇿干湖南安撫使折彥質一議戰兵大略謂楊么初起有寨二十舟三百九十兵八千餘人今首尾五年其數必倍然糧倉闕乏器械鮮少官軍之一可當其十今約水陸各萬人可以取勝一水軍萬人探聞鼎州見管正義兵八千揀點精鋭可得五千潭州帥府若選五千兵可足備禦不必逺召荆鄂之兵矣二議戰舟云賊有車船如陸戰之陳兵鰍頭船如陸戰之輕兵官軍亦當用此今以水軍萬人分五軍每軍二千人用車船二隻每隻容正兵二百五十人將佐梢工百人鰍船三十隻每隻容正兵五十人并棹夫押隊共八十二人各令附帶錢糧多集矢石其行常與鰍船一進一郤進必有所取却必有所誘亦計之上者也三議兵器云賊有鐃鈎拓義竹為之柄若以快刀芟其頭刃彼無能為矣其勝賊之具弓矢為上鈎鎗次之手刀又次之又擇十人為牌炮手使居前列牌以衛我師炮以擊賊徒四議棹夫云戰兵恃其各善汨沒則緩不及事當使戰士亦諳棹夫之能則必安而可用今所責甚重棹夫冝與戰士同賞仍使士卒汰其不能便令乘載人兵習其擊刺使戰士習熟波濤若履平地何賊之不勝乎五議形勢云嶽州抵接賊寨比諸州最近如潭州遣發及會合荆鄂舟師皆合經由于此但專令潭州攻討么賊舟師進發皆由于嶽而嶽屬他路况嶽有土人可募以為前鋒者緣本州闕乏不能集事乞將嶽州依舊𨽻湖北路其討殺楊么事干本州者權令帥司節制於上供米內支撥一萬石六議錢糧云昨湖南帥司會合嶽州荆南兵馬令各帶錢糧就行支遣各緣闕乏乞專委湖南漕臣一員權兼充湖北轉運司專切應副七議時月云攻討水賊須自十月霜降水落之時港汊分隔則易為擒又當分築甬道安置炮坐多發巨石攻其附近八議攻討云武陵辰陽縣界鼎江南岸有夏誠劉三楊么下水北上林等寨各據陸向水維舟岸側其鼎州見與夏誠賊寨對壘而賊於鼎江南北分布寨柵二十所嶽州去賊武陽口等寨甚便止一日可行故鼎州為陸兵之地嶽州為水兵之地如使陸兵萃于鼎州攻討夏誠楊么以禦其前繼使水軍進自鄂州以乘其後使腹背受敵進退無據賊將安往彥質以聞詔下其議命王􅊛行之已而􅊛請招安金字牌上曰近來盜賊踵起蓋黃潛善等專務招安而無弭盜之術髙官厚祿以待渠魁是賞盜也么跳梁江湖罪惡貫盈故命討之何招安為但令􅊛破賊後止戮渠魁數人貸其餘可也乃給黃榜十道自么及黃誠劉衡周綸皮真并近上知名頭領不赦外脅從之人一切不問如徒中自併進投首當議優與推恩遣崔增髙進及帶錢糧在此月丁酉彥質奏寅敷八議在戊戍􅊛請金字牌在七月壬戌今牽聨書之熊克小歷詔統制官巨師古以兵二千亦隨􅊛去誤也日歷王􅊛所申有云統領官髙進等下官兵二千餘人並係巨師古下舊人各願隨􅊛前去克不詳考之耳其實師古此時已勒停編管不在軍中克誤甚矣訓何俌龜鑑我髙宗之所以區處羣盜者又有道焉聖嘗曰招安非良法命之以官是誘之使盜不若移此以賞捕盜立功之人是聖意之主於討者然也又曰凡今日奪攘縱暴之侣皆異時忠義四方之人應能開心易慮散歸田里罪犯勿問是聖意之主於招者然也他日謂宰執曰民窮為盜多緣守令不良以擾之若安其田里肯為盜乎又宣諭江西平盜之䇿惟曰擇憲帥以壓服其心任守令以勸課其業蠲科役以優足其力是又不招不討思以弭盜而使之無盜寧非萬世之龜鑑乎考功員外郎胡蒙言州縣之職令尤近民人之才否固不因京官選人而增損但選人在官日淺苦未練歷又多投合上位應副寄居意在干求必於改秩惴惴然惟懼忤物安能抗徑節任直道以行己乎欲自今已往萬户已上縣盡差京朝官每三五員再赴都堂審察然後頒降敕命則冗散疲懦者必汰而天下宰令皆得材能之士不待督責而相先於政績矣事下吏部後不行徽猷閣待制李正民知吉州以軍行故嵗中科率民錢至百餘萬緡宣諭官劉大中奏請黜之正民先以應辦軍儲遷一官至是寢其命丙申詔皇叔右監門衛大將軍士蓐赴行在士蓐為金所執至河北遁還東都之再陷也士蓐復沒于金及是渡淮南歸士蓐襄恭憲王宗愈孫也濮王生宗愈宗愈生房陵公仲暉仲暉生士蓐詔江浙諸州絲帛及折帛錢並以七月中旬到行在有不足者守二並行竄黜用户部請也丁酉詔武顯大夫閣門宣贊舍人知濠州寇宏遷一官再任仍賜金帶己亥罷沿海制置司以海舟三百付明州守臣李承造總領和州防禦使制置副使張公裕同總領仍命公裕居定海縣以總領海船所為名左武大夫福州觀察使辛道宗再追一官坐頃在軍中受賄補官不實也庚子給事中黃唐傳言陛下將以武遏亂略而所用非所試願詔有司稍復武選之格酌三嵗科舉取人之數以三分之一待武士互保應舉如文士法其程試先以射藝決去取次以兵䇿第髙下中第者注縣尉它日有統兵官闕並先選武士事下兵部論者以為非急務遂不行辛丑進士歐陽凱士特送洪州編管凱士嘗上書論時事前四日上諭輔臣曰頃上書人間有狂妄者朕多留中不欲置罪今凱士狂妄之甚若不懲戒且慮扇惑羣聽亦害政之一端也可以其書付從官議罪來上仍宣示臺諌議上故斥之右奉議郎知彭澤縣楊汝明追三官許參選俟轉至承議郎止汝明宣和初以上書得官實納粟也吏部引陸知微例為言故有是命時方審量濫賞而以左右司領之吕頥浩當國時有所縱舍左司員外郎王岡輒持不可曰管仲奪伯氏駢邑三百飯蔬食沒齒無怨言何謂也法者天下公共之法大臣行法與衆棄之尚誰怨前日論甲黜三官且至乙矣輒貸不問今日復論丙如甲公秉國鈞於天下具瞻之地不平謂何而怨始有所歸矣頤浩矍然王岡事據孫覿撰墓志增入不得其時按史岡以今年五月除左司頥浩罷乃去故因汝明追官附此但覿以為討論宣政誤恩却誤此時已罷討論濫賞但令吏部審量耳是日都省批狀諸路私煎盜賣鹽並依通州已得科罪用提轄榷貨務都茶場張純請也時吕頥浩更淮南鹽法亭户私貨者不以多少杖脊配嶺南雖赦不宥事見去年十二月會淮東提舉茶鹽郭楫言非亭户而與軍民交易者未有明文事下𣙜貨務於是純言亦合一等科罪頥浩奏從之至是浙東提刑司申明亭户盜賣刑名純言上件指揮雖緣通州管下有犯臣僚起請諸路亦合一體施行頥浩不復奏陳徑以批狀行下自是斷配日多民間破家蕩産不可勝計矣頥浩批狀事日歷不載今以紹興三年十月十一日臣僚上言并刑部勘會狀增入狀云紹興三年六月十八日都省批狀指揮本月十八日也非亭户一等科罪指揮在今年三月癸亥今并附此更不别出壬寅端明殿學士宣撫處置使司參議官張深知成都府充本路安撫使初深以老疾丐免張浚命深五日一赴司視事會成都闕守有詔浚具名奏差浚承制授深至是申命成都續記深以五月八日至成都中侍大夫忠州防禦使荆南鎮撫使解潛言已滿三年請罷去詔令再任甲辰翰林學士綦崈禮上昭慈聖獻皇后改諡議尚書右司郎中王珩為宗正少卿填復置闕日歷及都司玉牒所題名珩除宗卿皆在此月蓋自建炎三年以奉常兼宗卿至此始除珩也日歷十月庚戌復置宗正少卿一員十二月內户部相度狀並同疑行罷後又不除人至庚戌乃降旨耳祕書省著作佐郎孔端朝守都官員外郎徽猷閣待制知臨安府盧知原充都督府參謀官直祕閣兩浙轉運副使梁汝嘉升直龍圖閣知臨安府以左司諌唐輝言知原為政乖繆也章再上詔知原以本職奉祠知原以是月癸丑提舉江州太平觀今附此詔舒蘄黃三州仍舊聽江南西路安撫大使司節制及應副錢糧先是淮西安撫使胡舜陟乞節制三州人馬許之趙鼎言江西與淮西相接今三州撥𨽻淮西萬一上流有警則沿江一帶並無軍馬應援故有是旨乙巳左朝奉郎監尚書六部門孫藎轉對言自靖康軍興以來議和好則忘備禦之方言拒敵則絶通和之議閲時既久屢失事機天下至今憤痛屬者再遣樞臣銜命出疆臣恐和戎之議未成防秋之備遂弛敵情不測事當過慮望密戒邊臣中申嚴戒律詔付沿邊守帥初韓世忠之軍建康也詔江東漕臣月給錢十萬緡以酒稅上供經制等錢應副至是劉光世移屯又增月樁錢五萬六千緡轉運判官直祕閣劉景真等告乏于朝詔通融應副自吕頥浩朱勝非並相以軍用不足創取江浙湖南諸路大軍用樁錢以上供經制係省封樁等窠名充其數茶鹽錢蓋不得用所樁不能給十之一二故郡邑多橫賦於民大為東南之患今江浙月樁錢蓋自紹興二年始月樁錢諸書不見事始日歷十七年八月上諭秦檜卿未還朝朱勝非等創起月樁按史檜以去年八月免勝非代之五月勝非丁憂七月起復明年九月罷起月樁未知的在何時以事考之當是今年四月除二宣撫時今因江東漕司申明附此或可移附四月丙午詔內外從官各舉宗室一人以備器使先是右承事郎知大宗正丞謝伋條上宗室五事曰舉賢才以強本支更法制以除煩苛擇官師以專訓導繼封爵以謹傳襲修圖牒以辨親踈始岐獻簡王仲忽為宗官多所建白論者謂立法太嚴自渡江後南班宗室才六十三員學官久闕襲封之典遂廢宗正有寺無官故伋言之時己用伋議復置宗正少卿因有是命惟襲封不行用伋議復宗卿據今年十月己亥王珩罷少卿劾疏云爾右朝請大夫王唐右奉直大夫李昕並通判荆南府用鎮撫使解潛請也此又與前此鄭作肅建言守臣辟通判指揮相妨當是用元置鎮撫司專法也丁未詔即駐蹕所在學置國子監以學生隨駕者三十六人為監生置博士二員時中書舍人黃龜年入對上奏言雖車駕東巡庠序在逺而博士之官未命養教之士未充殆為闕典遂命禮部條具其後進呈上曰學校固教化之原然當治戎飭備之時為之則近於不急乃命留俟焉上語在七月戊寅江東宣撫使劉光世引兵發鎮江時淮南宣撫使韓世忠屯登雲門光世懼其扼已改途趨白鷺店世忠遣兵千餘襲其後光世覺之乃止既而光世奏世忠掠其甲士六十餘人且言世忠身為大將當國家多事之時正宜謹慎共濟大事而乃不循法度強奪戰兵若非臣彈壓嚴切必致兩軍相挺上貽聖憂樞密院言近兩軍申奏各有互招過官兵詔同都督孟庾體究發還如無實迹行下逐司照會上尋遣使和解仍書賈復冦恂事賜之日歷七月丁巳劉光世奏臣六月二十六日統率軍馬離鎮江故附此日光世所奏甚譸張而熊克小歷乃云世忠猶欲以兵襲其後蓋為光世諱也今參酌附見是日沂王㮙駙馬都尉劉彥文在五國城告變金人遣使按問金人初欲邀二帝過河駙馬都尉蔡鞗力辨其誣彥文等坐死金人尋以潘致堯所持奉兩宫金銀藥石來上上皇見之流涕謂羣下曰荷天眷命未忘趙氏中興之主出而繼焉今日信至可謂幸會惟藥材留以備用餘皆分賜從行親屬官吏王若沖北狩行録云癸丑六月二十四日沂王㮙駙馬都尉劉彥文首告謀反金國蔡鞗是日聞之於莘王植駙馬都尉宋邦光徑令徐中立聞逹太上驚悸未以為然翌日遣鞗渡河以詢虛的既濟則千户貝勒安塔哈者已陳兵河濵二逆解發往彼帳前矣盡得所陳之詳鞗歸太上即令率親屬及一行臣僚合議除白鍔以病不能出餘皆預焉先此已聞有不測之議至是人皆聳栗鞗曰吾儕前日不死國難二帝播遷已有愧於前人不意逆黨出於至親至愛之間捐軀報效正在今日鞗身以貫髙自處願諸公盡力以徇急難少有退避者神明殛之言辭慷慨坐皆泣下莫不懷奮發直前之心至七月中旬彼遣兩使前來勘問太上遣植同鞗往見來使堅欲太上渡河對辨又遣徐王棣宋邦光再往至則尚執前議乃請淵聖行及信王榛駙馬都尉向子扆內侍王若沖同往鞗實從之再三力懇彼使方許明日至行宫之東鞗所寓之地而引問焉羣臣力拒往反詰問三日之間二賊氣折自承誣枉案上復遣前使以諭太上一面處置太上曰二子悖逆雖陳誣告天倫之屬豈忍為之使曰若如此自有宣命並死之使歸鞗上疏乞深自悔禍以畏天戒太上嘉納之戊申武功大夫髙州刺史樞密院準備差使王林以所部充御前中鋭第十將林劉光世部曲也忠鋭第九將史康民薦其才自承州召還而有是命己酉神武副軍都統制嶽飛自虔州班師此以紹興四年四月二十五日大理寺劄子修入庚戌尚書左僕射吕頥浩提舉修國史時未有日歷中書舍人張綱請用祖宗故事命大臣典領起居郎孫近在祕府亦以為言至是始命頥浩尚書吏部郎中川陜撫諭周隨亨卒于閬州詔贈直龍圖閣官其家三人賜銀帛百匹兩令宣撫司致其柩隨亨贈官在九月丁丑壬子右宣教郎王忠民至行在宰相吕頥浩簽書樞密院事徐俯見之皆拜舍于政府忠民上疏力辭新命且言臣為大金舉兵故自上大金國主三表為辨理乞還二帝本心報國非求名祿上不許忠民以告置于櫝中藏之七寶山下既見所奏留中力懇求去遂依商虢鎮撫使董先于軍中罷澧州嵗貢竹簟癸丑賜潭州度僧牒二百為修城之用潭州自為敵所破城壁皆壞李綱以為汗漫難守請截三分之一未及成而綱去至是安撫使折彥質言于朝詔監司相度其後諸司言潭州城圍二十二里九步西臨大江東南兩壁並依山勢不可裁損惟北壁地皆荒間欲截去城地七里半新城圍計十四里半有竒奏可後亦不克成諸司再奏在十月庚戍自陜西既陷買馬路久不通至是榮州防禦使知秦州節制階文軍馬吳璘始以茶綵招致小蕃三十八族以馬來市西馬復通蓋起於此於是宣撫司承制授蕃官趙繼志武翼郎閣門宣贊舍人七年正月丙戍降告川陜宣撫司以三泉縣為大安軍王明清揮麈前録太祖立極之初西蜀未下益州三泉令間道馳騎齎賀表率先至闕下上大喜平蜀後詔令三泉縣不𨽻州郡遇慶賀許發表章直逹榻前紹興初四川制置司建言升縣為軍失祖宗之指矣按宣司升軍以今春敵騎至三泉而止故因以為控扼非因直逹表章之故明清誤也以武臣种友知軍兼縣事文臣為判官兼縣丞此據紹興七年閏十月三日吳玠劄子修入是夏金人所命知慈州劉慶破丹州義士孫韓於山寨降其卒三千人盡殺之建炎以來繫年要録卷六十六金人地名考證安塔哈原書作按打曷即金史之按打海並誤今改正
