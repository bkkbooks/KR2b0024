body:
  text: 建炎以来繫年要錄巻一百五十七宋李心傳撰紹興十有八年嵗次戊辰金熈宗亶皇統八年春正月按是月庚申朔戊辰左奉議郎諸王宫大小學教授林大鼐為太常寺主簿仍兼秘書省校勘書籍大鼐初為舉子嘗答策言秦檜靖康忠義之節檜時閒居永嘉見其文黙識之至是稍獲薦用大鼐初見紹興十三年十二月己巳上幸天竺寺遂幸玉津園庚午入内東頭供奉官康諝還所寄資為左武大夫和州防禦使帶御器械諝尋改宣政使諝改使額在二月癸巳丁丑太常博士駱庭芝罷先是参知政事段拂聞趙鼎死於海南為之歎息秦檜怒殿中侍御史余堯弼將按拂罪先奏庭芝宻與執政私交漏泄機事遂罷之自是拂不安於位矣左承議郎張闡添差通判泉州自秦檜専國朝士為所忌者終身以添倅或帥幕處之未甞有為郡者辛巳命權戸部侍郎李椿年同看詳諸路監司郡守條具裕民文字壬午殿中侍御史余堯弼入對論參知政事叚拂滅弃人倫頃為小官身對賔客嘗使其父執爨具食官於行朝隂交非類濫居政府漏洩機政伏望薄行流放以清表著乙酉右正言巫伋入對論建炎間建康通判楊邦乂仗節死難叚拂遂攝倅事恬不知愧躐居政府乃與小臣私交漏泄政機又嘗語典謁者曰我豈是執政伏望亟賜竄逐戊子輔臣進呈上語及人材因謂秦檜曰士専謀身國家何頼勵世磨鈍惟在進賢退不肖檜曰此乃致治之要上曰但審其賢否而進退之則人自知勸沮矣二月癸巳上諭大臣曰兩浙漕司舉人聞有勢之家行賂假手濫占觧名甚喧士論今貢舉鎻院在近可令禮部立賞許人告捕甲午詔假手者許就試舉人告獲取㫖補官仍賜出身乙未参知政事叚拂罷為資政殿學士提舉江州太平興國宫用臺諫奏劾也章再上尋落職興國軍居住簽書樞宻院事汪勃兼權参知政事丙申布衣鄭樵為右廸功郎以經筵官秦熺等言其學術也福建安撫使薛弼言近㫖統制將官離軍添差州都監已上並依見任人切詳諸軍將官係因功或年勞不拘大小使臣一時陞補即與祖宗差注將副格法不同切慮貟數太多繁紊軍政欲將元在軍中係大使臣充將官有朝廷宣劄人並支破釐務請給人從免令干預職事從之己亥入内東頭供奉官楊公恕還所寄資為武顯大夫帶御器械壬寅左朝請大夫監尚書六部門張頡面對乞令諸路災傷檢踏官不得於税户止宿及接見賔客詔户部看詳甲辰左中大夫知太平州范同引疾請奉祠詔復左太中大夫令終任庚戍入内東頭供奉官王晋錫幹辦内東門司左朝請郎吕延年知蘄州代還言自五季之亂江南李氏窮兵暴歛害虐生民乃於江西一路稅苖數外倍借三分上應軍須至開寳八年李煜圗籍歸本朝而當時官司但名為沿納盖謂事非本朝剏立特循沿李氏舊法也積嵗既久而官司又以沿納一項錢米支移折變故里巷之民銜怨李氏之聲猶在也仰惟陛下憂民疾苦如痛在躬欲乞行下江西漕司如委見本路田産歩畆所載稅苖倍於他路即取㫖量與裁定仍乞將沿納一項錢米特免支移折變詔户部取索諸路色目一體看詳申省辛亥吉陽軍奏責授清逺軍節度副使趙鼎卒詔令歸𦵏壬子右承事郎監登聞皷院徐璉面對言自昔帝王必有佐命之臣功銘鼎彛侑食清廟以勸萬世國家逺稽三代肇造原廟凡在佐命輔弼皆繪像廟廷以示報功之意陛下紹開中興復崇原廟如祖宗之制而累朝配饗輔弼不過十餘人今其家之子孫必有繪像存焉望詔有司訪求摹於景靈宫廷之兩壁詔禮部討論三月壬戌詔政和八年已前實得兩觧貢人不限年並特與奏名許就殿試到省一舉見年五十五以上者令本貫保眀申部内開封府國子監舉人召見任京朝官二員保奏並結除名罪當議特與推恩王明清揮麈錄餘話云靖康之亂文字散失不存南渡之後禮部老吏劉士祥者大為姦利士子之桀黠者相與表裏云某嵗曽經省試下合該年免既下部則士祥但云省記到因而僥倖遂獲恩者不知其數壬申名行宫之南門曰麗正北門曰和寧丁丑上謂大臣曰聞殿前司招軍多誘致鄉民及負販者恐其失業可令吳璘楊政招流民之失所者補其闕庚辰上初詣太一官以宫成故凡一百七十楹既而禮部侍郎沈該等言鑾輿詣宫皎日晴霽車駕還内雨澤復作有此祥應望宣付史館從之禮部奏下在五月辛酉壬午資政殿大學士提舉萬夀觀兼侍讀秦熺知樞密院事一日太師秦檜問𠡠令所刪定官胡寧曰兒子近除外議如何寧曰外議以為公相必不襲蔡京之迹寧寅弟也熊克小歴稱寜為祠部郎官按寧此時為選人克盖誤也克又稱寕對云云於是檜怒以日歴考之寕引對改官在此後七日則檜未應怒今不取中興聖政吕中大事記曰以其子熺為樞宻欲以代居相位而兩府合為一矣甲申右武大夫保寧軍承宣使兩浙西路馬歩軍副都總管王安道落階官為宣州觀察使以觧帶恩也時安道之父繼先有寵秦檜使其夫人王氏與之叙拜為兄弟往来甚宻趙甡之遺史云繼先遭遇在紹興中冠絶人臣諸路大帥承順下風莫敢少忤其權勢之盛與秦檜埒張去為以下猶不足道又曰秦檜與其妻黨皆貴盛者非檜薦舉之力乃檜請陞遷繼先宗族及吳益宗族官職故繼先及中宫亦請陞遷秦氏王氏之官職也甡之此説或因秦熺王安道相繼除擢而言且附此當考乙酉詔私擅渡淮及招納叛亡之人並行軍法後詔津載及廵防人故縱與同罪失察者減一官後詔在二十九年二月己丑右朝散大夫秦亘知峡州紹興二十六年十月癸亥周方崇奏亘守安豐以𣙜場貨獻權臣按日歴亘去年十二月壬辰自安豐代還入對或可附此事也丙戌權尚書禮部侍郎沈該兼直學士院是月貢院言博學宏詞科武進尉周麟之婺州州學教授季南夀合格詔並與堂除自是恩始殺矣麟之海陵人南夀龍泉人也夏四月戊子朔日有食之隂雲不見詔付史館己丑右迪功郎𠡠令所刪定官胡寧特引對遂命改京官寕改官日歴不書今年五月戊辰以右承務郎除太常丞故附見此庚寅上䇿試正奏名進士于射殿先是權吏部侍郎知貢舉邉知白上合格舉人徐履等上問以欲起晉唐之陵夷接東漢之軌迹及柔道所理當有品章條貫右迪功郎董徳元䇿言晉之失不在于虛無失於用兵故耳唐之失不在于詞章亦失於用兵故耳東漢固無如是之失也陳孺䇿言今日中興之盛以言乎内治則大臣法小臣亷百姓遂其衣食萬物䝉其豐年以言乎外治則講信修睦中外交懽邉鄙無虞五兵不試東漢之事未足慕也願申飭邉郡守臣俾兩相撫輯庻㡬邉隙不生逺人益服此品章條貫之一助舉人王佐䇿言王羲之言隆中興之業政以道勝寛和為本盖譏當時不務息民保國而欲以兵取勝也杜牧有言上䇿莫如自治盖譏當時不計地勢不審攻守而徒務為浪戰也況陛下今日任用真儒修明治具足以鋪張對天之宏休揚厲無前之偉績則光武之治不足深羡權禮部侍郎兼直學士院沈該初考權户部侍郎李朝正覆考工部尚書詹大方詳定乃奏徳元第一孺次之既而以故事遞降遂擢佐為首賜佐以下三百三十人及第出身履永嘉人徳元吉水人佐山隂人也按紹興二十三年十二月鄭仲熊劾王佐章疏稱佐曩縁大樹本非廷魁以上三人皆係有官遂致僥冒按此舉第四人乃莫汲當求他書參考庚子左中大夫知樞宻院事秦熺罷為觀文殿學士左通奉大夫提舉萬夀觀兼侍讀提舉秘書省熺言父子共政理當避嫌故有是命仍詔熺應干恩數請給等並依見任宰臣例立班在右僕射之次辛丑徽猷閣待制邵博卒于犍為縣乙巳特奏名進士俞舜凱等四百五十七人武舉進士柯熈等七人特奏名一人賜第授官有差於是始以將仕郎易京府助教舜凱婺源人也癸丑敷文閣直學士知建康府晁謙之罷先是左承議郎方雲翼自禮官罷歸後起為江東安撫司參議官檜念之薦于謙之雲翼干擾不已謙之怒其無厭以書白之㑹雲翼代還檜以問雲翼雲翼愕然曰王庶之子比過金陵晁館之于宅堂者四日雲翼甞勸晁不當㽞在宅堂恐有詭謀晁即日津發前去雲翼固知其言太深然不料其隂憾雲翼至于此也檜黙然即諭殿中侍御史余堯弼堯弼乃奏謙之險薄躁競時無與倫趙鼎負滔天之惡投畀遐裔乃隂與交通書問絡繹王庶詭詐乖僻世所共棄謙之實其辟客毎慕其為人庶之子至今往来請求不絶朋姦稔惡日懐怨望志在動揺國是故有是命日歴方雲翼紹興十五年三月癸未除江東安撫司參議官十一月丁未改添差通判宣州建康志謙之以十五年四月到任直徽猷閣方庭實提㸃廣南東路刑獄公事左朝請大夫新知徽州趙士㣓為江南東路轉運判官丙辰皇叔安徳軍節度使同知大宗正事權主奉濮安懿王祭祀士夽開府儀同三司以司宗十年也顯謨閣直學士知平江府鄭滋知建康府滋再守平江政事多弛兩浙轉運判官湯鵬舉宣言欲按之始秦檜舉進士滋為南省參詳官至是檜因鵬舉應辦北使寓書于滋稱門生鵬舉見之幡然更奏其治狀遂有是命後旬日又陞顯謨學士滋進職在五月戊辰是月慶逺軍節度使知襄陽府張澄始視事襄陽平地當江漢之衝環以大堤嵗久為水所圮澄始相葺之度民不可勞而江夏諸將私田占籍境内者倍于編户澄乃諭使出力修堤皆欣然聼命既成比舊增髙周廻數十里民䝉其利五月辛酉權禮部侍郎兼直學士院沈該言國家乗火徳之運以王天下望用故事即道宫别立一殿専奉火徳配以閼伯而祀以夏至從之後建殿于太一宫名明離癸亥直秘閣兩浙轉運判官湯鵬舉入内内侍押班李珂幹辦内東門司王晉錫各進秩一等以太一宫成故也甲子命有司繪配饗功臣像于景靈宫廷之壁皇武殿韓忠獻王趙普周恵武王曹彬大定殿司空中書門下平章事諡文惠薛居正樞宻院使諡元懿石熈載鄭武恵王潘美熈文殿尚書右僕射平章事諡文靖李沆魏文貞公王旦山南東道節度使同平章事諡忠武李繼隆美成殿沂文正公王曾許文靖公吕夷簡簽書樞宻院事諡武穆曹瑋治隆殿魏忠獻王韓琦魯宣靖公曾公亮大明殿韓文忠公冨弼重光殿温文正公司馬光承元殿魏文定公韓忠彦凡十有六人皆取諸其家惟熈載家累索不至乙丑詔嵗以成都潼川府利州路稱提錢十萬緡對減四路激犒錢三分之一初鄭剛中改四川宣副之嵗始命三路茶鹽酒課及租佃官田應輸錢引者毎千别輸三十錢為鑄本又得其贏十八萬緡有竒至是以備軍費三路稱提錢凡四十三萬七千緡鑄錢本二十四萬七千緡外餘十八萬四千六百九十道二百九十一文入帳此據總領所財賦冊權尚書吏部侍郎邉知白提舉江州太平興國宫右正言巫伋論知白闒葺躁進頃宰平江外邑干郡將鄭滋舉狀不獲近縁接伴經由乃窘以人使事百端騷動挟私宿怨故有是命戊辰保康軍節度使提舉佑神觀吳盖為昭慶軍承宣使宣慶使清逺軍承宣使入内内侍省押班張見道為景福殿使以從幸太一宫特推恩也右宣教郎監南雄州保昌縣溪塘鎮周芾特追三官昭州編管芾嘗上書論事坐狂妄黜及至官自言以上封切直屏棄守臣奏之下大理鞫治有是命壬申工部尚書詹大方言近充賀大金生辰使自入境待遇使人甚厚及至大金闕廷供張飲饌一一精腆臣已戒一行官吏不得過有須索竊慮後来三節人或有不識大體責辦供應妄生語言望嚴行戒飭庶㡬鄰好脩睦永久不替詔今後使副及三節人並具知委狀申尚書省右武大夫閤門宣賛舍人賀仔除名横州編管仔嘗為利州路兵馬都監至是詣都堂訟鄭剛中功績尚書省奏其欺罔乃有是命癸酉以太一宫齋殿後隙地為景靈宫道院乙亥殿中侍御史余堯弼言今歡盟既固聘問之使安行無虞而恩澤所加不減于舊鄰國聞之其謂我何望裁抑適中以堅鄰好詔禮部參酌如所請奉使賞賜例見紹興十二年五月乙未並注于是賜物及賞各減半七月庚辰降㫖丙子金主使龍虎衛上將軍㑹寧尹蕭秉温昭武大將軍充東上閤門使申奉顔来賀天申節始燕射於玉津園自是遂為故事癸未保信軍節度使龍神衞四廂都指揮使添差兩浙東路馬歩軍副都總管李顯忠落軍職降授平海軍承宣使提舉台州崇道觀本州居住先是金使甞言顯忠私遣過界詔令分析㑹顯忠上恢復之䇿於朝秦檜怒乃奏顯忠不遵禀聞止用申狀故有是命此以日歴及顯忠行狀趙甡之遺史參修遺史云李顯忠聞其妻周氏在黄龍府作繡工遣三人往取之共許金千兩各人奏補承信郎三人果至黄龍府用籠床去其裹隔盛周氏載之以車遂逹江南三人皆喜曰太尉更有妹在燕山府願復取之是時楊存中亦遣人取其故妻止于平江用别宅居之以再娶趙氏不容其来也金人使来因奏今講和乃有臣僚多以金銀遣人来取其家属恐大金皇帝聞之不便上乃責顯忠落節鉞宫祠存中以顯忠獨被責而已無罪遂賂遺顯忠不已且稱其才宜復用而顯忠亦閑居七年徐夢莘㑹編載此事于紹興十四年正月不知北人以十四年春来言此事至此始行遣邪或甡之所記年月差誤也孫覿撰楊存中妻楊國夫人趙氏墓表云夫人歸楊氏時少師猶未著内籍未幾四方盗起夫人擕諸幼于兵戈中間闗百難渉閲數載卒保其家而少師亦還朝典軍為大將則趙氏非存中貴後所娶與甡之所云不同當考甲申罷四川宣撫司徽猷閣待制知成都府權宣撫司職事李璆為徽猷閣直學士四川安撫司錢糧符行中直秘閣知䕫州直寳文閣汪召嗣守太府少卿總領四川財賦軍馬錢糧専一報發御前軍馬文字武當軍節度使宣撫司使都統制兼知興元府楊政改充御前諸軍都統制直龍圖閣知潭州陶愷卒直龍圗閣主管台州崇道觀劉昉復知潭州右朝請郎廣南西路轉運判官方滋直祕閣知静江府上嘗須龍腦為藥而内庫偶闕求之秦檜檜取一匣進之至上前唘緘而匣内有書題名銜乃滋送檜者誤不掲去上以為御前所未有此以趙甡之遺史本語附入乙酉龍圗閣直學士知静州張宗元提舉江州太平興國宫從所請也六月丁亥朔尚書左司貟外郎韋夀成權工部侍郎夀成不及拜而卒癸巳上謂大臣曰毎嵗决獄聞憲臣第遣屬官代行徒為文具可令親往所部具所决名件申尚書省權尙書户部侍郎李朝正罷以殿中侍御史余堯弼奏其嘗遣小吏從左帑市絹也詔自今嘗被偽楚明受偽命之人不得輙至國門時左從事郎亷布入都調官右正言巫伋奏布乃張邦昌之壻覆載所不容而無忌憚若此望賜處分故有是㫖布初見建炎三年二月右朝奉郎鄭靄為䕫州路轉運判官左朝奉郎楊椿為䕫州路提㸃刑獄公事靄驤子也秦檜與之親厚故超用之新除軍器監丞康與之與外任宫觀與之甞稱秦檜之命往鎮江市玉帶又從都統制王勝借金上聞遽罷之甲午上諭大臣曰郡守條上便民事可委官㸔詳有可采者即行之庶不為虛文也戊戌直秘閣秦堪秦坦並陞直敷文閣以檜辭太一宫使加恩乃有是命顯謨閣直學士康執權抗章請老詔遷一官致仕己亥上曰近布衣上書多言縣令非理科率朝廷自和議以後未嘗有取于民可申嚴約束庚子秦檜奏令監司郡守常切覺察上曰自今有作事過當及年老昏繆者並與宫祠庶㡬不為民害直寳文閣淮陽轉運副使錢端禮陞直龍圗閣知婺州甲辰用太常寺主簿兼權祕書省校勘書籍林大鼐議始築九宫貴神壇於東郊壇二成髙三尺方十有原闕尺按宋史九宫神壇再成第一成東西南北各百三十尺再成東西南北各一百尺俱髙三尺上為小壇九縱廣皆八尺髙尺有半嵗春秋二仲祀以少牢禮如感生帝乙巳敷文閣待制知臨安府趙不棄守尚書工部侍郎尚書右司郎中宋貺權户部侍郎直祕閣兩浙轉運判官湯鵬舉陞直敷文閣知臨安府直祕閣陸宰卒丙午賢妃潘氏薨妃元懿太子母也在妃列二十二年至是薨丁未上諭輔臣曰近有布衣上書請行三舍法恐未暇及此其有言民事者宜付户部可行者即行之戊申士民曹溥等千三百人進表請上尊號上不許癸丑大理少卿許大英面對乞戒飭監司不依條限廵歴及朝廷耑委輒遣官代行者比司互察詔申嚴行下乙夘上曰祕府見求遺書古蹟四川不經兵亂可委諸司尋訪仍令提舉官毎月趣之左奉議郎新知江州吳秉信罷秦檜怒鄭剛中不已遣太府寺丞宋仲堪即江州置司究其隂事殿中侍御史余堯弼奏秉信乃剛中心腹之人昨者乗間親至川陕士論多有指議恐江州官吏觀望必不能協心盡公為害非細故秉信遂罷建炎以來繫年要録巻一百五十七
