body:
  text: 建炎以來繫年要録卷二十五宋李心傳撰建炎三年秋七月按是月丁丑朔戊寅詔諸路州軍試經撥放度牒及聖節恩例等並權住此事日厯不見今以紹興二年二月十一日祠部申請狀增入己卯詔東京宗室並移䖍州大宗正司用知大宗正丞洪子陽請也庚辰尚書吏部貟外郎鄭資之送吏部與監當以往湖北措置防江不職故有是命辛巳韓世忠軍還執苖傅劉正彥苖翊詣都堂審驗畢磔于建康市梟其首正彥臨刑瞋目罵傅曰苖傅匹夫不用吾言遂至於此時張逵苖瑀及傅二子先己死議者欲孥戮之大理少卿王衣奏曰此曹在律當誅顧其中婦女有雇買及虜掠以從者儻殺之未免無辜上矍然即詔自傅正彥妻子外皆免衣厯城人也建炎復辟記二凶伏誅在六月己酉趙甡之遺史在六月癸丑臧梓勤王記在六月壬戌三書不同按此乃吕頥浩在相位所行梓所記不應有誤而勤王記復云二十有六日而主上反正又百有三日而傅正彥伏誅以日計之則二凶之誅當在七月辛卯不知何以前後又自不同今從日厯及㑹要王明清揮麈後録云苖劉獻俘檻車幾百兩先付之大理獄將盡尸諸市叔祖子裳請對云云上矍然曰卿言極是朕思慮所不到子裳衣字也日厯建炎四年六月丙子內殿進呈上曰昨日大理寺上殿朕不識王衣昨日方見之頗似淳朴據此則誅二凶之時衣未嘗請對可知或者嘗入奏言之而明清誤記耳今略刪潤令不失實直祕閣京東轉運判官張自牧兼京東制置副使自牧至行在陳復山東定中原之䇿朝廷信其說遷官除職又捐金帛付之自牧至揚州聞金人南侵遂不行詔江東西漕臣李尚行張琮並兼皇太后進發隨軍應付命池州募忠義勇敢萬人充守禦詔宣和皇后父安禮封普安郡王親屬與承信郎三十名以后受册推恩也日厯無此今以紹興二年十月二十一日吏部勘㑹狀修入癸未武勝軍節度使御前左軍都統制韓世忠為檢校少保武勝昭慶軍節度使賞平苖劉之功也上遣使賜世忠金合且御書忠勇二字表其旗幟又封其妻梁氏為護國夫人制曰智略之優無愧前史給內中俸以寵之將臣兼兩鎮功臣妻給俸皆自此始慶逺軍節度使捧日天武四廂都指揮使御營使司都統制平冦前將軍主管侍衛步軍司公事范瓊為御營使司提舉一行事務時瓊自南昌入見故以命之瓊除都統制未見本月日或可附今年三月韓世忠除提舉事務之後除授宜州觀察使御營使司後軍統制辛企宗為御營使司都統制企宗道宗兄也自陜西携所部由興洋赴行在再遷都統制韓世忠張俊皆不服乃命世忠俊改御營為御前知樞密院事張浚奏乞降夏國書二封一如常式一用敵國禮又奏今雖遣使大金緣尼瑪哈多在雲中乞別降尼瑪哈書大金國表兩本付臣行所有禮物俟到司相度詔直學士院汪藻草書如浚奏臣家藏雜書一編號國史拾遺者雜記紹興和戰時文字其中有請和詔略云頃罹邦禍缺止緣亟徇於民心有失先資於大國今則盡携臣屬逺竄蠻荆念守禦以圖存師徒莫振欲跳奔而求免封域已窮故因元帥而缺所冀宅中而受命無煩涉逺以勞師未知此即藻所草耶或又它人作也今姑附此或可削去龍圖閣直學士提舉萬壽觀兼侍講兼權直學士院詹乂引疾丐祠上嘉其恬退詔升徽猷閣學士提舉杭州洞霄宫殿中侍御史王庭秀知筠州右司諫趙鼎行殿中侍御史先是庭秀論吕頥浩除擬不公故有是命右正言吕祉奏曰朝廷今日緣論大臣移一言官明日緣論大臣罷一言官則後日大臣行事有失誰敢言者願陛下以言章示大臣使之自省置身無過之地如或不悛黜之何惜甲申詔曰朱勝非顔岐張澄路允迪當軸處中荷國重任而不能身衛社稷式遏凶邪方逆臣亂常之日恣其凌肆以紊機衡夫危而不持顛而不扶孔子以為焉用彼相昔馮道厯仕數代常為宰輔惜身安寵以免於時坐視廢君易主如同行路而歐陽修以為為臣如此愧斷臂之婦人今二凶既誅典刑斯正勝非之徒盍議其罰於是勝非自觀文殿大學士知洪州落職提舉亳州明道宫岐落資政殿學士依舊提舉南京洪慶宫允迪自資政殿學士淮西制置使落職提舉江州太平觀澄自資政殿學士江州路制置使坐朋附二凶責授祕書少監分司西京衡州居住給事中江浙制置使周望試兵部尚書兵部題名望自太常少卿除蓋誤御前左軍都統制韓世忠訟統制官武略大夫閣門宣贊舍人王德擅殺其將陳彥章下臺獄殿中侍御史趙鼎按德當死上以其有戰功特貸之鼎言德緣兵敗自慙而忌世忠之功故殺其將且德總兵在外而擅殺不顧此風一長其禍有不勝言乃詔德除名彬州編管小厯云編置德于江州蓋承林泉野記之誤今據四年五月辛亥劉光世為德奏功狀參注集英殿修撰知廬州胡舜陟請身守江北之地以護行在且言今淮南羣盜大者數萬小者數千欲以本州鄉兵將兵及所降劉文舜之衆共二萬人仍更招羣盜須得數萬結之以威足以捍敵若其養兵之物與夫屯泊訓練戰陳之方則俟面奏上壯其言擢舜陟徽猷閣待制充淮西制置使熊克小厯云舜陟自祕撰除待制按日厯舜陟今年五月戊子已除集英殿修撰克誤也寶文閣直學士權邦彥知江州兼本路制置使始東平失守論者欲重謫之上以邦彥束身歸朝父母妻子皆致淪沒與它棄城官吏不同故止削二官而復有此命邦彥降官日厯不載據邦彥檢舉狀在此月辛巳今併書之尚書兵部侍郎李㑹充徽猷閣直學士知廬州集英殿修撰江西轉運副使王子獻知洪州子獻建陽人也奉直大夫尚書司門郎中徐俯主管亳州明道宫俯已見建炎元年三月辛卯召徽猷閣待制知東平府吳給赴行在道梗不能至乙酉言者論備江之䇿宜以鐵索為沈綱橫鎖江岸以防浮江順流之舟以木為臥柵密藏於岸步之下使戰艦不可得而入此二者用力甚少而收功甚大詔付水軍制置司金左監軍完顔昌至山東京東路安撫使劉洪道與宫儀閻臯棄濰州去昌移屯濰州臯至蕭縣為權知萊州張成所敗衆皆潰散臯獨與麾下數十人泛海歸于朝廷儀引其衆犯密州不能入乃屯於州南盤石河去州八十里洪道攻青州拔之執金所命知州向大猷張成既敗閻臯之衆㑹金人漸入州境成遂以城降金人罷成以叛臣吳銶知萊州時奉議郎知萊陽縣解致明以冦至遁歸成奏其盜用庫金詔提刑司劾治而成已叛矣吳銶初見二年十月癸亥解致明事日厯無之紹興二年七月二十日大理寺申建炎三年七月十一日權知萊州張成奏知萊陽縣解致明盜用上供銀入已避罪遁竄奉聖㫖令提刑司取勘十一日丁亥也故附見此致明後以宣諭朱異奏雪調官按此條史繫甲申日丙戍慶逺軍節度使捧日天武四廂都指揮使御營平冦前將軍權主管侍衛步軍使司提舉一行事務范瓊入見初瓊在江西右正言吕祉首奏其罪且進取瓊之䇿乃召瓊赴行在瓊駐軍南昌徘徊觀釁詔監察御史陳戩趣其入覲瓊未拜詔先陳兵見戩且剝人以懼之戩不為動徐曰將軍不見苖劉之事乎願熟計瓊乃朝服北向謝恩遂引兵趨闕既至未肯釋兵及入見面奏乞貸左言等朋附苖劉之罪且言自祖宗以來三衙不任河東北及陜西人今殿帥闕官乞除殿前司職事又言招到淮南京東盜賊十九萬人皆願聽臣節制上怒知樞密院事張浚奏瓊大逆不道罪惡貫盈臣自平江勤王凡三遣人致書約令進兵瓊皆不答今呼吸羣凶布在列郡以待竊發若不乘時顯戮他日必有王敦蘇峻之患上許之右僕射吕頥浩曰臣與瓊舊有嫌隙不敢獨任其事願付張浚浚退與集英殿修撰權樞密院檢詳文字劉子羽謀子羽已見元年四月甲子夜鎖吏于浚府中使作文書皆備丁亥朝退僞遣御前右軍都統制張俊以千人渡江若捕它盜者因召俊瓊及御營副使劉光世赴都堂計事使俊將其衆甲以來瓊從兵滿街意象自若食已頥浩等相顧未發子羽坐廡下遽取寫敕黃紙詣前麾下曰有敕將軍可詣大理置對浚數瓊罪瓊愕眙遂以俊兵擁縛付大理使光世出撫其衆曰所誅止瓊耳若等固天子自將之兵也衆皆投刃曰諾於是復以八字軍還付武功大夫忠州防禦使新知洮州王彥八字軍𨽻瓊事祖見二年十月癸亥而餘兵分𨽻御營五軍頃刻而定熊克小厯載瓊下大理寺在壬辰蓋誤壬辰乃獄上降㫖之日今從日厯附丁亥中興聖政大事記曰蓋自宣和末羣盜蜂起建炎以來祝靖薛廣党忠閻瑾王存之徒雖皆招安而淮寧山東河北之盜皆擁兵數萬拱州之黎驛單州之漁臺亦有潰卒數千趙萬襲常州張遇焚真州丁進犯壽春柔仲據襄陽戚方犯鎮江楊勍犯處州劉超據荆南王闢犯房州崔增犯太平州張用據桂陽軍趙延夀犯德安軍皆隨滅隨起甚而范瓊召見亦不肯釋兵則天子之兵皆盜矣所幸事變興而人才見保護聖躬勝非之力居多倡義勤王張浚之力居多故一月而除二凶而范瓊之謀逆浚又與劉子羽謀之府中之文字夜成廡下之黃紙旦出瓊遂就擒三大奸既除而內盜始息矣是日元懿太子敷薨太子病未瘳有鼎置于地宫人誤蹴之仆地有聲太子即驚搐不止上命斬宫人於廡下少頃太子薨年三歲詔輟五日朝殯金陵之佛寺恭福帝姬薨追封隋國公主上皇第三十四女也薨年四嵗詔江西兩浙揀正兵土兵各六分之一赴行在戊子端明殿學士簽書樞密院事鄭㲄薨于位年五十㲄執政甫百日上甚悼之謂大臣曰朕喪元子猶能自排遣㲄訃至殆不能釋也常賻外特賜田十頃第一區以撫其孤己丑資政殿學士朝奉大夫王綯參知政事朝奉大夫試兵部尚書周望同簽書樞密院事望不加職綯不進官吕頥浩失之也後四日乃進綯中大夫望除端明殿學士綯密奏川陜重地張浚不可專任宜求同德之人協贊之御營使司同都統制辛企宗提舉御營使司一行事務詔減民間所增役錢時已汰新置射士遂減之其後復撥已增錢赴行在事祖見元年六月乙亥撥錢在紹興五年三月癸未合併書之庚寅鄉貢進士李時雨上書曰臣竊聞皇太子服藥不痊仰惟陛下丁陵夷困厄之㑹方兹嘗膽又致輟朝此天禍之於陛下亦已極矣然事之既往夫復何言而承嗣之道理不可後又况國家當憂勤危急之際宗廟社稷之所繼統生靈之所係屬敵國之所觀望不於此時權時制宜為之謀畫臣恐天下之心未大安也為今之計欲乞暫擇宗室之賢者一人使視皇太子事以係屬四海增重朝廷俟陛下皇太子長成畀之東宫則以一王封視皇子亦不為嫌也伏望陛下斷以不疑而力行之逺惟仁宗皇帝在位四十二年無所繼統晚年聽言遂進英廟于濮安懿王之宫蓋不以一己為私而以天下為念可謂萬世之賢君矣陛下法此前規使社稷有所統屬天下幸甚若以為陛下春秋鼎盛未可以擬仁廟繼立之事則是大誤國計也時雨仁壽人黨人新之子以其父上書入籍訴于朝吏部擬將仕郎鈔未下書奏詔前降給還恩澤指揮更不施行日下押出國門久之時雨以䇿干張浚于閬州遂以為忠州文學建炎以來言儲嗣者蓋自時雨始時雨補官在紹興元年今併書之辛卯詔諫院别置局不𨽻後省許與兩省官相見議事元豐初用唐制置諫官八貟分左右𨽻兩省至是始復之如祖宗之故升杭州為臨安府壬辰詔范瓊就大理寺賜死時大理少卿王衣奉詔鞫瓊瓊不伏言者又論瓊逼遷上皇擅戮吳革迎立張邦昌等事章下大理衣具以責之瓊稱死罪衣顧吏曰囚詞服矣遂上其獄詔用臺諫三章責瓊為單州團練副使衡州安置章再上乃賜瓊死其親屬將佐並釋之獄吏殺瓊瓊猶不肯吏以刀自缺盆插入呌呼移時死其弟及三子皆流嶺南罷內香藥庫以其物歸左藏甲午張用與馬友分軍用屯確山麥且盡衆皆乏食乃議復往山東友請以所部㳂淮巡綽用識其意許之友以本部兵數萬去自分為七軍用與曹成李宏屯光州境內沿淮劄木寨為久駐之計初京城失守統制官閻瑾遁去留其壻劉紹先以兵數千屯光州守臣任詩厚遇之詩在光四年頗得其用故自靖康以來諸郡多破而光獨得全乙未尚書主客貟外郎謝亮假太常卿權宣撫處置使司參議以將遣使西夏也日厯乙未謝亮差充張浚下屬官今以紹興元年二月庚寅亮自叙狀參修丙申詔兩浙路守臣兼制置安撫使者非緣軍旅毋得妄用便宜令御史臺譏察用言者請也丁酉鑄三省樞密院銀印朝奉郎監諸司審計司崔縱為中奉大夫右文殿修撰假工部尚書充奉使大金軍前使武節郎閣門宣贊舍人郭元明為武顯大夫忠州刺史副之縱臨川人也時金左副元帥宗維自東平還雲中右副元帥宗輔自濱州還燕山留左監軍昌守山東地上慮其再至復遣使議和朝奉郎劉誨直顯謨閣知楚州王明清揮麈第三録云誨以直祕閣出使使還除直顯謨閣知楚州制云昨將使指之光華備歷征途之險阻既分憂於凋郡仍進直於清班制詞汪藻作見本集中日厯乃以誨為直祕閣當考言者請以江心凡有沙磧要害之地多置寨柵每柵以卒五百人戰船十艘為率從之戊戌直龍圖閣沿江措置副使劉寧止添差江淮荆浙制置發運副使從衛往洪州庚子中書舍人汪藻試給事中仍兼權直學士院尚書左司貟外郎李正民起居郎綦崈禮太常少卿李公彥並為中書舍人崈禮公彥仍召試公彥已見二年九月壬辰尚書駕部貟外郎胡寅守起居郎禮部貟外郎富直柔試起居舍人富直柔除郎才兩旬復有此命直柔尋遷右諫議大夫直柔之遷日厯與後省題名皆不載諫院題名在今年七月中大夫韓肖胄行尚書左司郎中朝請郎御營使司參議官李承造守右司貟外郎承造仍與太常少卿柳約並兼權御營使司參議肖胄忠彥孫忠彥琦子元符末左僕射約臨安人也肖胄之除日厯不載都司題名在此月故因承造除命併書之承奉郎吳若試尚書考功貟外郎奉議郎張誾守駕部貟外郎朝奉郎周離亨為尚書金部貟外郎鄂州㸃校上供錢物尚書户部侍郎宣撫處置使司參贊軍事湯東野試工部侍郎兼知建康府時建康寓治保寧僧舍而浙江制置使韓世忠屯蔣山逐守臣顯謨閣直學士連南夫而奪其治寺殿中侍御史趙鼎言南夫緩不及事固可罪然世忠躬率使臣排闥而入逐天子之京尹此而可為無不可為者矣願下詔切責世忠而罷南夫仍治其使臣之先入者此為兩得上曰唐肅宗興靈武諸軍草創得一李勉然後知朝廷尊今朕得卿無愧昔人矣乃降南夫知桂州而以東野知建康府戍兵故皆羣盜喜攘奪市井東野峻法繩之不少縱民恃以安建康志東野到任在六月熊克小厯亦係此事於六月末今從日厯係七月庚子日厯不書除工侍此以附傳及本部題名參修但本部題名在六月當考熊克又以東野為兵部侍郎蓋誤中書舍人董逌充徽猷閣待制逌為宗正少卿官省而罷旋入西掖至是才踰月也逌益都人初見建炎元年三月今年五月戊子除江東提刑其除舍人日厯題名皆失之知樞密院事御營副使宣撫處置使張浚以親兵千五百人騎三百發行在此據紹興三年九月乙亥浚奏到隨行兵數修入賜度僧牒二萬紫衣師號五千為軍費此據紹興四年九月趙鼎乞添賜度牒狀增入度牒二萬道此時為直二百二十萬緡朱勝非間居録云浚出使賜錢百五十萬緡與此不同當考上賜川陜官吏軍民詔曰朕嗣承大統遭時多故夙夜以思未知攸濟正賴中外有位悉力自效共拯傾危今遣知樞密院事張浚往諭密㫖黜陟之典得以便宜施行卿等其念祖宗積纍之勤勉人臣忠義之節以身徇國無貽名教之羞同德一心共建隆興之業當有茂賞以答殊勳自王􅊅謝亮之歸朝廷聞鄜延經略使曲端欲斬王庶疑其有反心乃以御營使司提舉一行事務召端端疑不行權陜西轉運判官張彬勸端不聽議者喧言端反端無以自明至是浚入辭以百口明端不反時明州觀察使劉錫親衛大夫明州觀察使趙哲皆在浚軍浚辟集英殿修撰知秦州劉子羽參議軍事尚書考功貟外郎傅雱兵部貟外郎馮康國主管機宜文字武功大夫忠州防禦使王彥為前軍統制彥將八字軍以從太學博士何洋閣門祗侯甄援等俱從行康國將行往辭臺諫趙鼎謂之曰元樞新立大功出當川陜半天下之責自邊事外悉當奏禀蓋大臣在外忌權太重也是日浚軍行屯雨花臺時東京米升四五千留守杜充既還朝副留守郭仲荀以敵逼京畿糧儲告竭遂率餘兵赴行在充先行至江寧鎮與浚遇屏人語久之而别辛丑朝奉郎陳恬直祕閣主管西京嵩山崇福宫恬堯叟元孫堯叟閬中人祥符中為樞密使相少力學屏居陽翟躬耕養母往來嵩少間上皇聞其名詔為祕書省正字奏祠去避地還蜀大臣薦其賢至是復召恬以老疾求去未幾卒于桂州中奉大夫知滁州向子伋請罷民兵復巡社專保鄉井毋得調發守隘從之尋命聽守臣節制子伋敏中元孫也詔進士陳大川程百之並補迪功郎大川百之未見初朝廷以靳賽為淮東馬步軍副總管屯揚州已而復叛招撫使王􅊅與遇于興化縣􅊅軍不整為賽所乘大敗制書金鼓印文皆為賽所得􅊅僅以身免壬寅詔迎奉皇太后率六宫往豫章且奉太廟神主景靈宫祖宗神御以行百司非預軍旅之事者悉從以參知政事李邴端明殿學士簽書樞密院事滕康並為資政殿學士邴權知三省樞密院事康權同知三省樞密院事凡常程有格法事及四方奏讞吏部差注舉辟功賞之屬皆𨽻焉奏讞事四年二月丙申還行在惟軍旅錢榖除拜則總於行營如故仍命龍神衛四廂都指揮使建武軍節度使楊惟忠將衛兵萬人從行熊克小厯上以金將入邉方遣兵守淮及控扼江上未有順動之意壬寅詔云云按日厯六月乙亥上已降御筆及此事今但以臨行申諭諸路耳今於六月乙亥七月壬寅各隨事書之庶見本末宣武軍節度使東京留守杜充為中大夫同知樞密院事兼宣撫處置副使吕頥浩張浚薦之也仍命充總兵防淮賜錢八十四萬緡為軍中四月之費時奉使洪皓等未至雲中完顔弼請侵江浙左副元帥宗維許之大理寺言范瓊已賜死詔宣撫使司參議軍事劉子羽諸治獄官吏各進秩一等獄卒及軍士與勞者賜銀帛各有差乙巳詔户部供錢絹各二萬貫匹銀萬兩隨從皇太后以備支費后性儉約有司日供千緡而止及是將行斥賣殿庫絹二千匹以充費上聞之謂大臣曰朕事太后與所生無異近市得衣絹數十匹即先分獻飲食亦然今往南昌未有還期除綿自禁中分納外餘可令趣辦之命江西閩廣荆湖團練槍仗手峒丁以備調發詔淮南沿江民間水手小舟並委守令籍其姓名俟有探報其巡檢各部赴江岸與本處地分同備戰守優給錢米候事定日放散時沿江雖置巡檢而朝請郎通判池州郭偉言濱江之民皆善操舟萬一敵騎掩至所謂巡檢勢力單弱不能拒敵則沿江習水之人必為敵用故有是㫖吳國長公主入朝以易元吉畫玉管筆小玊山為獻上諭以朕平生無玩好長主厚費致之殊可惜復還之山東盜郭仲威初與李成同在淄州金人入淄成先往泗上仲威乃引兵至淮陽軍欲與其民貿易既而圍之仲威之衆才數百乃取下邳八鄉之民雜于軍中凡四月至是城陷仲威入城大掠取强壯以充軍京西南路招捉副使王俊掠汝州京西北路制置使翟興聞之親往招俊既入境命塞井夷竈以困興興至城下俊欲出兵擊之興曰吾以好意來而俊敢爾命攻之將士應時登城俊引其衆遁歸繖蓋山興按轡入城秋毫無犯百姓皆安堵後三日引兵至繖蓋山俊出戰興又敗之建炎以來繫年要録卷二十五
