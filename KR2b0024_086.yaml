body:
  text: 建炎以來繫年要録卷八十六宋李心傳撰紹興五年閏二月乙巳朔祕書省校書郎許摶守監察御史宗正少卿直史館范冲祕書少監朱震並兼侍講左朝請大夫提舉亳州明道宫程瑀復徽猷閣待制除名勒停人孫覿叙左奉議郎是日雨雹丙午手詔卿大夫奉法守公克勤庶務令尚書省給黃榜於六部門曉諭大理少卿張礿試大理卿祕書省著作佐郎熊彥詩兼都督府主管機宜文字丁未張浚往江上視師詔百官出城餞送時浚既行邉而趙鼎居中總政事表裏相應鼎於是以政事之先後及人材所當召用者密條而置諸座右一一奏禀以次行之鼎謙冲待士犯顔敢諫權幸請謁內降差除一切格止鼎素重伊川程頥之學元祐黨籍子孫多所擢用去贓吏進正人時號為賢相翕然有中興之望鼎嘗入見見自外移竹栽入內奏事畢亟往視之方興工於隙地鼎問孰主其事曰入內髙品黃彥節也鼎即呼彥節責之曰頃歲艮嶽花石之擾皆出汝曹今將復蹈前轍耶勒軍令狀日下罷役翌日鼎入對上改容謝之自趙鼎謙冲待士已下並據林泉野記增入黃彥節事王明清揮麈録有之明清自云見彥節親言則此事必不妄朱勝非秀水間居録云趙鼎起於白屋有鄙朴之狀一旦得志驟為驕侈以臨安相府為不可居别建大堂環植花竹坐側置四大爐日焚香數十千使香煙四合謂之香雲按彥節所言則人主移一竹栽鼎尚以為不可豈有身建大堂環置花竹之理耶端明殿學士簽書樞密院事胡松年以舊職知宣州免謝辭以松年引疾有請也𠫭知政事沈與求兼權樞密院事龍圖閣直學士樞密都承㫖折彥質試尚書工部侍郎仍兼都督府參謀軍事左朝奉大夫通判明州李文淵遷一官金之入犯也命文淵居許浦鎮措置防扼海道故賞之紹興府牢城人劉相如特補承信郎相如初見建炎十年二月以相如自訴鄞上之功乞委以邉政故也既而言者論相如前後詐稱官資雕造僞印無所不至乃罷之戊申以雨雪放公私僦錢五日寶文閣待制新知湖州李光言明越之境地濵江海水易泄而多旱故自漢唐以來皆有陂湖灌溉之利大抵湖髙於田田又髙於江每旱則放湖水溉田潦則决田水入海故無水旱之災凶荒之歲也本朝慶歷嘉祐間民始有盜湖為田者三司使切責漕臣其禁甚嚴圖經石刻備載其事宣和以來創為應奉始廢湖為田自是兩州之民歲被水旱之患臣自壬子歲入朝首論兹害䝉朝㫖先取會餘姚上虞兩邑廢置利害縣司供具自廢湖以來所得租課每縣不過數千斛而所失民田常賦動以萬計遂䝉獨罷兩邑湖田其會稽之鑑湖鄞之廣德湖蕭山之湘湖等處其類尚多州縣官往往利為圭田頑猾之民因而獻計侵耕盜種上下相䝉未肯盡行廢罷臣謂二浙每歲秋穀大數不下百五十萬斛蘇湖明越其數大半朝廷經費之源實本於此伏望聖慈專委漕臣乘此暇豫之時遍行郡邑延問父老考究漢唐之遺制檢舉祖宗之成法應明越湖田盡行廢罷內有積生茭葑淺澱去處許於農隙量差食利户旋行開撩稍假歲月盡復為湖非徒實利有以及民亦以仰副陛下勤恤勸戒之意其諸路如江東西墟田蘇秀圍田各有未盡利害望因此東作之時遍下諸路監司守令條具以聞毋為文具詔諸路漕臣躬親前去相度利害限半月申尚書省己酉詔户部措置撰集紹興會計録用殿中侍御史張絢奏也絢言國朝有景德會計録又有皇祐會計録至治平熙寧間皆有此書其後蘇轍又倣其法作元祐會計録雖書未及上其大略亦有可觀皆所以總括巨細網羅出納凡天下賦入之數官吏之數養兵之數條章各立支費有限謹視其書上下遵守此作會計録之本意也臣伏見朝廷數年以來財賦寖虛用度滋廣廟堂責之户部户部責之漕臣漕臣責之州州責之縣縣責之民而止民力既困膏血將竭則如之何正宜盡括歲入之厚薄因計歲出之多寡分其品目列其名色總貫旁通載之圖册揆考之間如運諸掌斯可以裁减浮費增益邦財官之冗者可罷則罷之吏之冗者可省則省之兵之冗者可汰則汰之然則會計之書在今日艱難之時尤為先務也伏望明詔大臣選委詳練財賦之官俾倣景德皇祐等書撰集成録且自紹興元年至四年為率以每歲所出入之數列之於前却以今歲計之除預借已支費外總計見今歲入實有之數合計若干復自日下至歲終凡官吏之費養兵之費及應干合用錢物通計若干名曰紹興會計録量入為出既可以見有無之實絶長補短斯可以制裁損之宜上以備乙夜之覽觀下以吝有司之出納庶幾國用有制斂不及民故有是命其後户部第具去歲收支數以聞而已川陜宣撫司奏四川上供銀帛乞依舊留充贍軍俟邉事寧息如舊上曰祖宗儲積內帑本以備邉陲緩急之用今方隅多故軍旅未息宜從所請此盧法原未卒前所奏也前月末已書法原卒故此削其名武功大夫康州刺史江東宣撫司右軍正將趙祥領貴州團練使始録建昌之功也將士皆第賞有差而江西制置司𠫭謀官侯慤以搜掘民間窖藏及乾沒良家子女之陷於軍間者為侍御史張致逺所按閏二月丁巳詔憲臣究實遂不預賞詔賜揚州錢萬緡為興葺官府之用從浙西安撫使葉煥請也煥又請免本州商稅一年且奏左迪功郎陳琦主管機宜文字皆許之既而言者論前後辟官皆先審量有無罪犯而琦嘗以狂妄上書責不赴琦初見紹興二年煥帥一路寄任不為不重中外親知豈無賢者而首辟其表弟名𨽻丹書國事安在乞飭諭吏部自今外司辟舉官屬本司審量到事理皆須子細勘當稍有違礙即行報罷許别選辟其吏部行遣鹵莽併乞付有司根治庶幾因此一事稍振紀綱詔罷琦令大理寺取索吏部公案看詳申尚書省琦罷在閏月丙寅庚戌手詔戒飭諸路州縣官以間者前臨大敵奉命不䖍偷盜自若自今式訛爾心務盡忠赤仍令監司守二各榜治所左通直郎李彞知涪州右司諫趙霈言彞靖康之末緣差括金銀日與洪芻等同婦人飲燕王府投諸四裔誠不為過豈宜付之民社命乃寢辛亥詔權於濠州等處置市易務以通商貨各行事令提㸃司條具申尚書省時淮南殘破常賦無所入州縣經費不充故有是㫖其後嶽州潭州亦如之嶽州四月戊辰守臣張觷建請潭州八月庚午都督行府建請徽猷閣待制新知江州程昌㝢改兼管內安撫使自紹興初置江西沿江安撫司命江州守臣兼領至是樞密副都承㫖馬擴已為江西沿江制置使故改命焉命三衙兩浙江湖閩廣諸路帥臣依條捒放廂禁軍提刑覺察違者重行竄責以樞密院言其中多有疾病怯弱不堪征役之人坐費錢糧理宜措置故也詔兩浙東路州縣昨因淮南軍興應副軍須事務見被取勘官吏並與免勘日歷不及西路當求别本參考要見與張致逺所論科席屋錢事有無相妨壬子輔臣奏遣中使往溫州奉迎太廟神主事上曰朕以宗廟在逺心常歉然今奉迎神主至行在當行朝謁之禮沈與求曰古者征伐載木主以行今雖戎輅在行九廟未復然因時草創一行朝謁之禮亦足以仰慰孝思上曰祖宗故事唯景靈宫則有薦獻太廟則爇香而已大禮必簡所以尚嚴也直徽猷閣提㸃淮南兩路公事張澄乞以特恩當遷一官回授出嫁母李氏加封從之詔湖廣福建路見任選人權不許展考以吏部言員多闕少待次者衆故也除名勒停人李德昭叙舊官德昭以朝奉郎知建州坐以上供錢餽遺本路宣撫副使韓世忠有司以盜所監臨不入已當私罪徒故扺罪及是再遇赦而復之德昭未見元斷月日據檢舉狀在紹興二年九月已前甲寅詔繳到諸處借補公據人已經朝廷看詳不合收使者並令賞功房毁抹乙卯御筆參知政事孟庾沈與求並兼權樞密院事時庾自桐廬還行在與求乞交割密院職事與庾兼權上批所奏付出輔臣進呈上顧趙鼎曰已與卿議定令𠫭知政事並兼權樞密院矣鼎曰樞密非古也自五代時以郭崇韜為使國朝因而不改故三省樞密院分為二途仁宗朝富弼作諫官時陜西用兵弼建議乞令宰相兼樞密院事宰相吕夷簡辭之再三後卒從弼議宰相兼樞密院自夷簡始也臣既以宰相兼治院事而參知政事之臣並令兼權則事歸一體前人謂樞密院調發軍馬而三省不知三省財用已竭而樞密院用兵不止此誠至論上曰往時三省樞密院不同班進呈是以事多不相關白然朝廷論議豈有帷幄二三大臣不與聞者手詔曰朕惟監司外臺耳目郡守承流宣化惠養吾民其委任重矣間者朝廷輒輕以假人將何以使吏民聳然聼服朕甚恧焉繼自今其慎選擇勿狃於故常勿牽於私昵重以纍國其已除授人亦銓量而去留之或資序已深屢更此選雖無顯過而才非所宜當處之外祠稍優其祿庶幾稱朕求治責成之意而士亦無失職之嘆仰三省常切遵守侍御史張致逺言今監司郡守即唐按察使刺史之職名存實亡稔習寖久縣令有過守倅不容不知而監司發之守倅無預焉郡守有過監司不容不知而臺諫論之監司無預焉各私其私初無忌憚民事之不理德澤之不流無足怪也臣愚欲以按發欺庇為有司殿最若一縣被按於監司則罪一州一州被按於臺諌則罪一路事無間於久近而併坐去官罰不求於甚重而斷以必行其有激濁揚清無所顧避者亟褒寵之利害相關彼此相形自非庸暗之甚其肯忽於身謀而甘為欺庇之事願陛下留意詔刑部立法申尚書省詔武節大夫榮州刺史兼閣門宣贊舍人新知洋州都督府提舉親兵柴斌已給料錢文歷指揮勿行時有詔沿江諸帥及神武中軍將佐因捍禦金人嘗立竒功者並給真俸既而中軍以扈蹕之久士罕戰功請將佐至軍滿歲武藝精强人亦給歷許之斌始自川陜從張浚出蜀暫𨽻中軍故因以為請議者言神武中軍未嘗出戰而輒依江上竒功之人公論不以為然今都督府使臣又援中軍體例既開此端展轉援比法令可廢有功者解體不以為恩無功者僥幸以為得計臣竊為陛下惜之疏奏故有是命左奉議郎主管江州太平觀張延壽直顯謨閣亦以赦叙也既而言者論延夀頃為御史甘心媚竈每遇休沐即與辛永宗兄弟出妓燕飲乃罷之詔諸路提刑司申行諸州禁囚病死人歲終計分斷罪之法以尚書省言治獄之吏專事慘酷待其垂死皆託以病患殺之亦未嘗依條視驗醫治理合申嚴故也今年六月乙巳所書可𠫭考除授左朝奉大夫許中特降三官勒停中前帥廣西坐市買方物不如價被劾至是獄具刑寺當中公罪杖該赦原并去官勿論趙鼎進呈特有是命丙辰詔諸路提舉常平併入茶鹽司內無茶鹽司去處仍令提刑兼領以户部舉行張致逺奏也左朝散郎張燾左承議郎新兩浙東路提㸃刑獄公事劉一止並直顯謨閣燾等坐秦檜纍斥去至是用赦而除之詔吏部通判闕二十五處取作堂除時諸路郡守自四川淮南及分鎮地分外堂闕九十八部闕二十七諸州通判自四川及分鎮地分外凡武臣知州與北使經由之地並由堂選在部者四十八闕而已至是尚書省又以堂除無通判窠闕為言故有是㫖焉樞密院言已令江西趙詳廣東韓京福建申世景王進會合招捕䖍寇緣逐項軍馬未有統轄切慮緩急各分彼此無所統一詔詳等並權聼所到路分帥司節制詔襄漢州軍先因盜賊并僞齊占據日劫掠殘殺等罪一切不問元劫人見在者許其家經官識認驗實給還即撫定後來再有違犯者令所屬治罪用樞密院奏也樞密院言近來進奏官輒擅報行朝廷邉極差除事務詔除定本外擅報及録與諸處劄探人者並重作施行賞錢二百千許人告又詔主行崇政殿親從堆垜子人漏泄見聞事亦如之右朝奉大夫徽猷閣待制知江州程昌㝢轉一官以昌㝢言建炎中知蔡州在任實及半年乞依元降指揮推到任賞也尚書兵部侍郎兼史館修撰王居正言四庫書籍多闕乞下諸州縣將已刋到書板不以經史子集小說異書各印三帙赴本省係民間者官給紙墨工賃之直從之右武大夫廉州刺史張杞領建州觀察使杞為淮東宣撫司壕寨官江北之役韓世忠假把遙郡三官俾持書幣往金國軍前議事得其報而歸至是申命而把子敦武郎敷亦援奉使官親屬例特進四官敷進官在是月癸亥上又召把對於禁中遣還戍丁巳皇叔眉州防禦使知西外宗正事士樽為鄧州觀察使士樽領外宗正滿三歲無遺闕以例遷也詔諸路轉運司將歸業人户合納租稅並令依限輸納仍開具自賊退之後已增收租稅數目申部以慿比較賞罰尚書省言比來盜賊屏息民皆安業逐年各有增添稅數多為有力之家冒佃鄉司通同隱庇致不盡歸公上故條約之右承務郎錢日新言招安楊么利害詔赴都督府使喚福建路轉運判官鄭士彥言坑冶盡廢物料貴湧計用錢二千四百而鑄千錢其本路舊額合發新錢二十八萬四百千省本司與提㸃司歲認其數見今不住起發縱有拖月日不猶愈於鼓鑄之折本欲望詳酌伺邉事息日施行從之是日武功大夫川陜宣撫司後軍中部將牛皓與金人遇於瓦吾谷死之時右都監薩里罕與僞熙河經略使慕容洧欲犯秦州宣撫副使吳玠遣諸校分道伺敵皓行至瓦吾谷與金將呼善遇皓所部步卒不滿二百乃下馬與戰謂其衆曰吾所以捨馬者欲與若等同死也敵見皓異於他人欲招之皓罵而死承信郎髙萬旋罵旋戰遂與武功大夫熙河路部將任安宣撫司隊官忠翊郎秦元承節郎薛琪張亨皆死於陳敵顧萬尸曰真健兒也後贈皓安皆翊衛大夫官其家五人贈萬等皆三官録其子皓福津人也己未故迪功郎李東贈宣教郎官一子東監楚州軍資庫金人入犯被害故録之庚申詔進納授官人願貼納金銀錢米轉行至承直從義郎者許徑赴户部陳乞下所屬倉庫細納申朝廷給降付身以尚書章誼言庶幾快便人人願納也詔應州縣辟差官成考解罷不曽被受朝廷付身者許理為任辛酉都督行府奏招捕水賊楊太等約束時張浚以建康東南都會而洞庭實據上流今寇日滋壅遏漕運格塞形勢為腹心害不先去之無以立國然寇阻重湖春夏則耕耘秋冬水落則收糧于湖寨載老小於泊中而盡驅其衆四出為暴前日朝廷反謂夏多水潦屢以冬用師故寇得併力而我不得志今乘其怠盛夏討之彼衆既散一旦合之固已疲於奔命乂不得守其田畝禾稼蹂踐則有秋冬絶食之憂黨與攜離必可招來乃以便宜命荆潭鼎澧嶽州將逐寨先出首人多方存恤首領申行府授官餘人給以間田貸之種子乂命湖南安撫司統制官任士安以兵三千屯湘隂保護湘江糧道統制官郝晸屯橋口王俊屯益陽舊縣吳錫屯公安崔邦弼屯南陽渡馬津步諒留潭州其鼎州官兵令程千秋分撥緊要屯駐應諸校招收到人數比附出戰獲級例推賞其招收人報所屬給種授田務令安業候黃誠楊太周倫公參了日當議蠲免租稅補授官資仍給黃榜下任士安等軍及嶽潭鼎州撫諭保義郎唐開特換右迪功郎開獻國朝會要三百卷詔進一官自言本諸生故有是命郴州編管人劉絳許自便絳正彥叔父坐纍久竄至是自言正彥乃同堂弟之子故釋之壬戌降授左朝請大夫耿自求為尚書左司員外郎右承務郎任申先守禮部員外郎左中奉大夫樊賔行屯田郎中自求初以趙鼎薦為都督府隨軍漕至是召用之朱勝非言自求結孟昌齡等事見今年七月壬辰免審量濫賞注賓嘗抗疏論營田利害以為荆湖江南與兩浙上腴之田彌亘數千里無人以耕則地有遺利中原士民扶擕南渡不知其幾千萬人則人有餘力今若使流寓失業之士民許佃荒間不耕之田則地無遺利人無遺力可以資中興之業賔初見紹興元年五月詔都督府簽㕔行移文字如都司體式用本府請也進士王諒特補下州文學諒以客從仇悆為淮西安撫司書寫申發機密文字用守禦功補官是役也官吏軍將轉補官資者六百十三人而衙校進奏官皆預焉癸亥檢校少保光山軍節度使同知大宗正事士㒟自會稽來朝留彌月再召對加檢校少師遣還士㒟加官在三月壬午朝辭在戊戌今並書之紹興十二年三月辛亥万俟卨論士㒟薦趙鼎作相事或可修掇附此詔行宫留守司官吏各與减一年磨勘降授龍神衛四廂都指揮使建武軍承宣使神武前軍統制王􅊛權主管侍衛馬軍司公事初上在平江侍御史張致逺手疏論􅊛乖謬乞同諸將召歸上納其言命􅊛全軍駐鎮江府而以親兵赴行在既至數日乃有是命明州觀察使權主管殿前司公事劉錫奏􅊛臣之友壻慮於軍政有嫌詔不許回避􅊛請除在外宫觀上命以不允答之然臺諫方交章論其罪已有廢之之意矣祕書省正字李公懋乞依校書郎例遇恩封叙許之宣和間汪藻為校書郎以內殿宴食在通直郎之上乞封叙後來者皆援以為比公懋言校書郎正字共係一班故特許焉録故鄧州觀察使錢若水元孫希一為將仕郎始用元年明堂赦恩也廢漣水軍為縣𨽻楚州以知縣兼軍使甲子龍神衛四廂都指揮使平海軍承宣使權主管侍衛馬軍司公事蘭整充兩浙東路馬步軍副都總管紹興府駐劄乙丑詔見任令丞簿尉未經交割離任不許從軍中辟置及兼帶軍中幹辦事務專委監司覺察殿中侍御史張絢言近縣官贓汚懼罪者往往干諸將為官屬一踐軍門則監司無從按發宿姦巨蠧多以此為得計故條約之命湖南帥司遣使臣持金字牌旗榜兼程至雷州招安海賊陳感感有舟數十與官軍戰統領官余鑄陷焉廣西提㸃刑獄公事董弅親往督捕且言感乞降金字牌招安雖未足信乞速賜指揮故令河南就近遣之太平州編管人范燾許自便燾坐詆誣昭慈聖獻皇后逺斥至是始釋之罷都司官簽貼詞狀事祖在四年五月以尚書省言都司事繁虛費日力故也丙寅殿中侍御史張絢乞於經筵讀三朝寶訓上曰可從其請上又曰祖宗故事朕嘗省閲然宫禁間事亦有外朝所不知者朕昨日見毛剛中所進鑒古圖乃仁宗皇帝即位之初春秋尚幼故采古人行事之迹繪而成圖便於省閲因以為鑒也朕頃駐蹕會稽一日過昭慈聖獻皇后殿中聞昭慈言哲宗皇帝初即位宣仁聖烈皇后謂帝年幼寢處起居不離宣仁卧內至納后始歸本殿宣仁保祐之功如此而姦臣誣罔輒生謗議可為痛憤趙鼎曰是時范祖禹劉安世以宫中買乳媪事上疏極諫以為似聞後宫有當就館者宣仁令宰相吕大防宣諭聖㫖曰無此事前日買乳媪乃先帝一二小公主尚喫乳也祖禹等方知其詳上曰近見范冲為父祖禹作家𫝊嘗進來亦載此事蓋宫禁間事外人多不能知也中書門下省請創宫觀添給以處見待闕及未有差遣願就宫觀之人內嘗任都司以上及帥臣職司依第二等知州任監察御史以上及知節鎮州雜監司依第三等知州即曽任都司郎官以上人仍充提㸃宫觀省諸路帥司官屬員並令帥臣舉辟更不堂除從之詔江東浙西路各造九車戰船十二艘浙東造十三車戰船八艘時王􅊛自荆湖得二巨艦以歸故命三路漕司倣其制為之又令江浙荆湖福建諸路憲司督諸州歲額弓甲及物料人匠赴軍器所用樞密院請也都督行府關就差起復祕閣修撰淮東宣撫司𠫭議官陳桷兼行府隨軍轉運判官許辟屬官二員如發運司條例關送尚書省指揮從之先是右僕射張浚至鎮江召韓世忠親諭上㫖使舉軍前屯楚州以撼山東世忠欣然承命浚遂至建康撫張俊軍至太平州撫劉光世軍軍士無不踴躍思奮浚以諸路軍馬所用錢糧當從督府總制故悉以上佐兼之行府關三省指揮自此始前已有關送尚書省事今此則徑用便宜除屬吏而但關尚書省出敕又差不同故復記其始丁卯詔足食足兵今日先務户部尚書章誼可専切措置財用𠫭知政事孟庾提領資政殿大學士秦檜言金人便於弓矢乞多造强弩神臂弓以備攻討上曰檜雖在宫祠不忘朝廷右司諫趙霈言今天下之弊正患縣令之非其人願罷去注授格法盡歸堂選應內外侍從官各舉有才德堪充縣令人歲有限員赴都堂審察訖始除此職舉得其人者有賞不得其人者有罰見任及待次有貪汙苛刻者悉汰逐之癃老罷懦者或改以外祠或處以監當理作親民資序如是一二年間所在臨民之政必有可觀民豈有不被其澤者輔臣進呈上曰比己降詔慎擇監司郡守然縣令於民尤親亦宜遴選令侍從官歲舉五人如何沈與求曰昨者陛下駐蹕會稽亦嘗降詔令內外侍從官各舉三人堪充縣令者中書籍記以備採擇聖意非不美也然所舉多不得人往往並緣詔令以私親舊至於有罪又不加繆舉之罰似未足以稱陛下責實之意上曰檢舉以行賞罰乃中書職事茍若此則詔令為虛文而已趙鼎曰莫若監司郡守舉治狀顯著者稍加擢用其尤無良重置之法或足以示勸懲詔右奉議郎江東宣撫使司幹辦公事黃覽追奪已轉一官覽以張俊奏功增秩而殿中侍御史張絢言覽被辟之時敵騎已去數日且身在江西未嘗至本司供職望賜追奪仍降指揮如諸軍官屬更有辟差在敵人巳退之後推賞在未到軍中之前者並限一月自首特與免罪止奪今來所轉一官如敢隱匿却致覺察得實即於元官上再行貶秩庶人知自奮實中興之要務從之命廣東提㸃刑獄公事郭孝友同帥司會合申世景趙詳韓京王進人馬招捕䖍寇時孝友自禮部員外郎補外未行仍趣令之任右朝奉郎新添差通判處州趙夀别與差遣夀彥若孫也朝廷以其祖故録用之御史張絢言元祐之臣名𨽻黨籍者陛下臨御以來辨别邪正明訂是非復其職名則恩加於泉壤世其祿仕則澤及於子孫天下至公之論也若乃創立添差之例則臣以為不然蓋石刻名臣故家尚多展轉援例何時可已故有是命詔川陜宣撫司近上謀議官一員權管宣司職事應干軍馬權行節制别聼朝㫖以都督府主管機宜文字楊晨言盧法原疾病故也時宣撫副使吳玠在軍前聞之檄取其印𠫭議官直徽猷閣范正已等行本司事不肯與正已命內外諸軍除沿邉及調發赴軍前並聼玠節制外餘委逐軍統制官循撫彈壓玠忿之金房鎮撫使兼本司同統制王彥有衆七千在渠州正已令彥往䕫州路照管關隘玠以其不先白已大怒三月丁丑行遣除授龍神衛四廂都指揮使建武軍承宣使權主管侍衛馬軍司公事王􅊛提舉江州太平觀免謝辭初􅊛既除騎帥而侍御史張致逺奏􅊛之罪惡不在辛企宗下而善交結則過之豈聖意以為􅊛提兵寖久軍衆未有所𨽻姑示眷留行遣自有次第耶臣竊謂􅊛提兵雖久侵剝少恩其下多厭苦之故每出輒有潰散者此可驗也然别選制將事干衆情明正典刑貴於早斷臣願陛下速與大臣計之免致譊譊重干聖聽契勘三衙之職寄任尤重陛下倘以􅊛兵未有所𨽻不可遽議罷黜即乞且改授職事速選制將往領其衆仍自睿斷正􅊛典刑雖外國聞之亦當畏服臣緣慮此曲折故未敢顯然論奏併乞睿察殿中侍御史張絢奏􅊛之敗師誤國擢髮莫數其罪即欲上章論列深恐聖意已有所處兼􅊛之兵馬未有分𨽻定所臣以此二者未敢顯陳但􅊛之過惡非他人比况陛下方經理邉事正賴賞罰嚴明乃克有濟若捨􅊛而不問更加除命非臣所敢聞也兩日來外間公議不容籍籍可畏尚慮九重深邃未知輿情臣故略舉大體上徹宸聰伏望斷自乾剛將􅊛部曲早行分撥速罷􅊛新除職任明正典刑庶幾內振朝綱外警將士恢復之功在此一舉帷睿明勿疑特加省察右司誎趙霈奏􅊛素無武藝不間戎律偶緣遭遇濫竊兵權建炎間為河東經制敵騎將至乃擁兵自衛避地入蜀使州陜之民聞風震恐陛下貸之而弗誅責其後效而􅊛不務循省以贖前愆方杜充之守建康也􅊛聞敵至不復應援而引兵先遁直趨閩中其罪一也方扈駕離永嘉也􅊛持軍無律不能統御而致潰散為盜毒流東南其罪二也及出師討楊么曠日持久攻取無策而崔增吳全之軍遂致陷失其罪三也比詔回軍鎮江中外欣悅皆謂陛下必欲正其罪狀重置典憲今􅊛以輕騎造行朝曽未數日忽有侍衛馬軍之命士論喧閧滋不能平邇者陛下以諸軍捍江有功既已優加賞典今􅊛有三罪獨置而不問是有賞而無刑恐非所以示勸懲也伏乞斷自聖意重加竄斥􅊛聞亦奏辭新命乞在外宫觀乃詔權主管侍衛步軍司公事邉順兼權馬軍司公事而以􅊛兵萬五千人𨽻淮東宣撫使韓世忠後三日乂從􅊛奏罷軍職戊辰左宣教郎敕令所删定官金安節入對安節上三事其一請専任理財之臣大略謂天下所急惟兵與食國家本兵之地任歸宥密軍旅之政皆自此出既得其要矣唯財用所總則委之户部廟堂之上無有専其任者於足食之計未可謂得也夫奉行法令稽考簿書以謹有司之職者户部之所能也若乃調國用之盈虛察計臣之能否謀畫陛下之前而施之天下則户部有不得而與者矣自軍興以來公私率皆匱急臣謂今日之計宜求幹實之士明於財計者使居錢穀之官久於任使勿亟遷徙核兵數省吏員節賜豫罷浮費又専置一職以大臣領之如樞密之處本兵使修其政以足財用凡內外錢穀官之長皆得察其勤惰考其殿最而黜陟之常令財賦所出轉輸所由悉在目中如指諸掌國家有征伐戍守之事則參畫於一堂之上而兵食兩足以成陛下恢復之功焉昔司馬光以財用窘乏欲救其弊請以宰相領總計之職而思所以救補之術自謂當時之務莫急於此况在今日其二論行在職事官堂除猥冗大略謂朝廷除授與銓選異吏部所掌者有司之法爾法所當得則與之人之才行不暇悉也方吏員衆之日許用將來逺闕其勢當然無可言者至於朝廷除授則略資格先簡拔當以人才為意豈可茍遂其私而長奔競之習哉當今內外差遣出於堂除者尤為猥冗而行在為甚寺監丞而下有一官而除代至於四五人者計其蒞官之期或在十年之後是豈堂除之本意哉或謂居是官者率多遷徙未嘗終更雖久且近則是示人以躁進而使不安其職業也其又可乎遂使趨競之士不安義命僥幸一時得以為後圖既得之後復歎滯淹假以求進奔走干託無時而已夫朝廷之上當激厲士風使人知自重庶幾他日不負國家任使今乃若此安可循習而不革哉前日之失不可追改臣願陛下訓敕大臣自今以始應在內差遣有不待見闕而進擬者亦須已授人到任然後除代仍各量其才行使稱厥職以重朝廷選任庶幾授受之間不至太濫人絶覬覦稍息奔競是亦厚風俗之一端也其三論士風不競不恤國事自為身謀願招股肱耳目之司察其趨向考其勤惰而升黜之以風天下翌日趙鼎等進呈言安節奏疏語言有未習知國體者上曰人才要當長養成就之使見聞習熟則知國體矣乃取其第二奏行下又旬日以為司農寺丞安節歙縣人也安節奏議集載此第二劄云臣願陛下訓飭大臣自今以始應在內差遣有不待見闕而進擬者亦須已授人到任然後除代日歷所載乃止云明詔大臣銓量而存留之二書所載不同今從奏議安節除寺丞在三月辛巳詔江浙湖廣福建等路各置路分總管一員於帥府駐劄應訓練教閲調發等事並繫銜申奏如陜西河東北三路例以樞密院言武臣內近有立功并官序資格已髙之人别無窠闕故有是命登州文學吳敦禮特許𠫭選敦禮以布衣為沿海制置使郭仲荀遣往髙麗伺敵中事得其報以歸故録之宣慶使康州防禦使入內內侍省都知梁邦彥武功大夫文州刺史入內內侍省押班陳永錫各進遙郡一官以樞密院言自敵犯淮甸至車駕回臨安府本省計發過金字牌文字一千二十三封即無稽滯理宜推恩故也已已𠫭知政事孟庾言準勑差提領措置財用今乞以總制司為名専察內外官司隱漏違缺行移如三省體式應本司措置事件依例進呈得㫖關申尚書省仍鑄印以賜諸路係省錢出入舊經制司每千收頭子錢二十三其十上供其十三州縣及漕計支用庾請增十錢四月己未又請收耆户長雇錢抵當四分息錢轉運司移用錢勘合朱墨錢常平司七分錢茶鹽司袋息等錢四月癸亥又收人户合零就整二稅錢免役一分寬剩錢又收官户不减半民户增三分役錢四月辛未又收常平司五文頭子錢八月乙酉並令諸州通判諸路提刑司拘催其後東南諸路歲收總制錢七百八十餘萬緡而四川不預焉大凡東南諸路經總二司錢歲收一千四百四十餘萬緡四川歲收五百四十餘萬緡左承議郎顔為追毁出身以來告勑除名勒停展三期叙坐前守嚴州犯自盜贓當徒六年也大理評事李洪李志行並改合入官初洪等自言建炎二年春試刑法入第三等上乞依條改秩吏部言無案牘可考令召本司官一員結除名編置之罪委保詣實許之中書舍人劉大中言有司當守法何至為一僥冒之人委曲求改官之路恐人人援此作僞生姦何所不至翌日輔臣進呈趙鼎曰古者以刑弼教宜崇奬之上曰刑名之學其廢久矣不有以崇奬之使人競習則其學將絶沈與求曰法家者流雖别一科然人命所係不可不重此選乃令吏部重别取索有無的實干照事遂寢三月己卯吏部申明給據事恐因此是日經筵開講自上視師暫輟講讀至是復之庚午尚書左司員外郎王俁直祕閣添差兩浙轉運副使李謨各進秩一等上之視師也俁以漕司職事往紹興府明台溫處州刷錢帛而謨先往平江樁辦錢糧至是本司以為言故賞及焉辛未右宣教郎知婺州金華縣孫緯為宗正丞填復置闕用少卿范冲奏也自建炎初宗正移司而屬籍諸書中道散佚無有知其法者冲言緯諳曉編修次第遂以命之緯沂州人也侍御史張致逺言中外諸軍屠酤成市日奪官課重載絡繹不稅一錢回易悉據要津逃亡更不開落凡所侵擅皆云製造軍器臣取紹興四年逐軍認造器甲考之全然不多而度支細計歲內降給凡一百二十萬緡朝廷又歲歲拋買如羽毛箭簳打造甲葉箭頭之類動以千萬計算工董役無日少休不知所造幾何逐時分給諸軍及樁留之數又不知幾何也器械非如他物今日之事孰急於此惟有司全不曾㑹計遂使諸軍坐收厚利伏望睿斷速命兵工部將軍器所與諸路諸軍纍歲已造之數諸路已買到物料并見買未到之數視其多寡度其緩急别為之區處若諸軍願自造則量其所用應副價錢而諸路工役拋買可罷軍器所亦可省若併就軍器所則張官置吏専司措置仍於諸軍下抽取人匠不必更令認造事既歸一自無橫費願陛下姑聼臣言務寬民力詔工部詳度申尚書省詔荆南府歸峽州荆門公安軍歲貢上供更與免二年用鎮撫使解潜請也分鎮指揮免上供三年今已二年故潜有請壬申上謂輔臣曰昨范溫帶來京東民兵比效用請給春秋特支衣絹一匹昨日中軍引見頗有藍縷者朕出內帑絹二千匹賜之趙鼎等曰陛下內帑縑帛之數非承平比每推以賜將士此盛德也上曰朕宫中未嘗妄費雖內帑所有不多専用以激犒將士而已詔六院官左藏庫監官並依舊堂除户部尚書章誼請諸州縣抵當物貨並限一年不贖檢估從之去歲以調兵始令諸路依舊質當金銀匹帛等每貫月收息錢三分滿十月不贖者並沒官已而兩浙西路提㸃刑獄兼提舉常平朱締乞依紹聖舊法以二年為準許之誼謂即今州縣與昔日事體不同恐難以積壓本錢守待二年故有是命州縣復置抵當庫日歷不載今因誼申請遂書之締所奏在今年二月己亥然史亦不書今附此當求去年降㫖月日别書之詔右承奉郎徐度令中書舍人試策一道左迪功郎胡珵左朝散郎主管江州太平觀錢葉新授太常博士張宧並召試館職左朝奉郎新提舉浙東常平茶鹽公事汪愷左承議郎新通判潭州王棠並與升擢差遣度處仁子宧守兄也自詔復十科薦士而龍圖閣直學士汪藻薦度及棠資政殿學士葉夢得薦愷及度顯謨閣待制提舉亳州明道宫葛勝仲薦珵宧棠沈與求為龍圖閣直學士薦葉胡交修為給事中薦愷故有是命已而度除太府寺丞珵除祕書省正字宧除祕書郎葉除諸王宫大小學教授珵除正字葉除宫教並在四月乙卯宧除祕書在八月度改除正字在七月愷除江南西路轉運判官棠知江隂軍三月辛巳中興後士以十科薦用者自此始命經制福建財用章傑市耕牛千頭賜韓世忠為淮東屯田之用選軍校部送十不失一者遷資給賞所失過分者抵罪仍責償之是日神武中軍春大閲詔户部賜錢萬緡充激犒癸酉右朝議大夫主管江州太平觀徐康國叙中散大夫用刑部檢舉也殿中侍御史張絢奏康國嘗投進銷金屏風及刷剗州縣羡餘二事以為康國當艱難之時剝下以媚上虐民以希功望賜寢罷以為監司之戒命遂格是月真陽縣觀音山盜起攻剽鄉落舉人吳琪竄去琪妻談氏與鄰婦數人俱被執談在衆中頗潔白盜欲妻之談詬之曰爾輩賊也官軍旦夕將至將為虀粉我良家女何肯為汝婦盜强之不已至於捶擊愈極口肆罵為所殺此據洪邁所作傳修入傳以為今年閏二月事故附此月末建炎以來繫年要録卷八十六金人地名考證薩里罕原書作撒離喝誤改見卷十一呼善原書作虎山即金史之胡山並誤今改正
