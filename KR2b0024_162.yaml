body:
  text: 建炎以來繫年要録卷一百六十二宋李心傳撰紹興二十有一年歲次辛未德金海陵煬王亮天三年春正月按是月癸酉朔辛巳皇叔和州防禦使士􅱰為建州觀察使以積閥遷也癸未輔臣奏事畢上曰廬州守臣吳逵上便民五事論淮南復業之民宜寬恤涵養未可遽理租賦起上供其令户部展年收之庚寅夜雪癸巳將作監主簿范彥輝面對言州縣凡遇科催急於星火或寄外廊而專事侵偷或任攬納而專給虛鈔鈔簿不銷致多掛缺間遇州郡催督嚴緊遂於民間多端掊率上户則敦請赴縣待以酒殽而科借之中下之户不與朱鈔故已納稅賦勒令再納又最其下細民則搜刷丁錢詭立名項曰補虧曰失收曰復撑曰排門或入老不除或已除再籍臣聞祖宗朝行丁錢之法率三丁共敷七百七十文今一丁不下二丁而浮費稱是乃更重疊不已斯民破家竭産不得自存遂以進丁為諱於是子生不舉循習成風豈不辜陛下好生之意欲望申戒監司郡守應縣分催科至終限未及分數去處令本州差官下縣監催須管及分方得離縣如出違終限經兩月本州不差官下縣監催者自是本州失時檢察即不得更行追理如是則不惟州縣事辦且免書吏侵欺而細民無摧剝之苦矣從之甲午鎮東軍承宣使知閣門事幹辦皇城司鄭藻為保信軍節度使領閣門事藻於顯肅后為最親以使北還而有此命左宣義郎曹筠知衢州筠自御史斥去㑹衢州闕守上諭秦檜曰臺諫無大過惡當優假之以來言者於是用筠乙未秦檜奏除潭廣帥臣上曰廣東帥臣及諸路提舉市舶官皆當慎擇茍非其人則措置失宜海商往往不至又曰布衣步孝友上書言丹陽練湖堙塞艱於漕運可諭漕臣修治丁酉詔翰林局醫生并奏試人並令試經義十二道以六通為合格與補翰林醫學舊制以宰執初除轉㕔恩例試墨義三十道至是以奏試人不通文義故改法焉戊戌少保昭化軍節度使醴泉觀使駙馬都尉潘正夫以郊恩封和國公庚子敷文閣直學士提舉佑神觀米友仁卒二月壬寅朔𠡠令所刪定官魏師遜面對論比年逺邇豐穰而郡縣因米直之賤乃於輸納之時令民以苖米折錢捨其所有取其所無民必又下其直以糶所費何止一倍是豐年適為之病也望申敕州縣仍令監司覺察民户越訴從之師遜江寧人也癸卯殿中侍御史湯允恭論舉人假手之弊詔許同舉人陳首取㫖免省丁未詔知郢州喬大觀州學教授徐維並衝替自今不得與堂除大觀坐對維及右中奉大夫通判州事魏彥純進士朝公裔妄造語言謗訕朝政維坐冒法與大觀用妓樂飲宴親聞謗訕事在有司猶敢傲慢相與濟惡下本路帥司核實乃有是命是日輔臣進呈上謂秦檜曰趙鼎所引用多非其人檜曰范冲中間修哲宗皇帝實録委有妨嫌上曰祖宗時不委當時遷謫官修史恐有謗言以欺後世也直祕閣知靜江府方滋升直敷文閣知廣州左朝散郎廣南西路轉運判官陳璹知靜江府初朝廷命廣西帥臣即橫山寨市馬於羅殿自把大理諸蠻嵗捐黃金五十鎰白金三百斤錦二百絁四千亷州鹽二百萬斤而得馬千有五百匹良馬高五尺率直中金五鎰他以是為差每五十匹為綱選使臣部送至行在及建康鎮江府太平池州諸軍不顛斃于道則有賞先是亷州之鹽分令欽橫賔貴潯梧藤象栁容等州轉至橫山倉然諸州科民則苦富民差吏則雜私販往往陷沒留滯至璹始令官支腳錢選使臣運鹽若及十萬斤即與部良馬一綱至行在廣馬事以熊克小歷修入但克以為紹興十九年十二月事則甚誤也壬子詔行在官私僦舍錢並减半違者坐以違制之罪拘其業入官癸丑又詔白地錢亦减半甲寅夜雨雹乙卯詔諸州各置惠民局初軍器監丞齊旦面對乞令州縣合藥散民上恐不能遍及故命户部舉舊法行之仍命毋多取利權尚書户部侍郎宋貺落權字仍兼權知臨安府大理少卿李如岡權尚書吏部侍郎秦檜生辰如岡為百韻詩以獻檜喜乃有是命此以紹興二十七年三月周方崇論如岡章疏修入右中奉大夫直祕閣提舉台州崇道觀王安道卒壬戌直顯謨閣知婺州湯鵬舉升直龍圖閣知潭州詔端明殿學士簽書樞密院事巫伋充大金祈請使保信軍節度使領閣門事鄭藻副之請歸皇族等事癸亥伋等辭行日歷只書巫伋鄭藻奉使大金朝辭進對而無使名李攸拜罷録稱巫伋充大金祈請使亦不云所請何事惟紹興三十一年五月二十日館伴使何俌等劄子載北使王全上殿口奏云帝曽遣祈請使巫伋等來言及宗屬及增加帝號等事而趙甡之遺史所載又差詳語在今年九月末所書巫伋使還并注祕書省著作佐郎林機守尚書禮部員外郎甲子徽猷閣待制李正民卒乙丑太府少卿徐宗說言方今經費所賴之大者經總制錢物為先舊守臣樁發嵗終按其殿最賞罰後慮守臣侵用遂專委通判拘收令提刑司催督又立定對行賞罰條格近來人物繁庶酒稅日增宜其所收之數倍多而反不及前日蓋緣對行賞罰之後州縣無緣肯供最少之數是致合推賞之人例皆不得其賞自是人人坐視而不恤比較之法徒為文具望令知通同共樁辦通判專行拘收樁發以立定賞格知通均受庶幾人利其賞錢物不致失陷詔户部措置己巳處州編管人王騰移送婺州編管以騰擅離貶所上書狂妄欲起兵端故也王騰本末未見當考庚午敷文閣待制提舉江州太平興國宫張宦卒是月集英殿修撰提舉江州太平興國宫魏矼卒于衢州自秦檜用事士大夫平日少失其意禍輒不測當始議和時矼與檜異論檜嘗欲除近郡矼遜辭不就奉祠十餘年寓居常山僧舍一室蕭然卒免於禍焉初趙鼎既謫居嘗謂其客左奉議郎方疇曰自鼎再相除正府外所引從官如常同胡寅張致逺張九成潘良貴吕本中魏矼皆有士望異日决可保其無他疇曰願公徐觀之其後諸人流落之久雖死不變疇乃信服三月壬申朔右朝請郎侯恪知歸州代還言巴東興山二邑舊無酒禁止令民户送納麴錢昨緣招置義兵遂官創兩務今義兵久已放散乞復舊法上曰四川酒課昨緣軍興張浚用趙開創置隔槽今既罷兵可令户部取索措置乙亥户部侍郎宋貺言諸州多員外置官費耗寖廣重困民力望日下並罷上曰此不惟耗公家且為民害宜令户部禁止戊寅上謂大臣曰聞大金有詔去尊號前此士庶屢嘗有請朕却而不受秦檜曰盛德之事他國亦知師丁亥上曰州縣多催理積缺民間重困朕頃在京東親覩其害可令户部照年分蠲放既而户部請自紹興十一年至十七年諸色拖缺錢物除形勢及公吏鄉司與第等以上上有力之家未納數外並與放免從之戊子忠訓郎閣門祗候王德霖為武翼郎閣門宣贊舍人德霖進子特録之庚寅直寶文閣主管台州崇道觀秦塤直顯謨閣秦堪並進職二等提㸃佑神觀以扶掖檜入朝特推恩也堪除直天章閣而以稱呼不便為辭乃升直龍圖閣堪升職在是月丁丑壬辰太常博士丁婁明面對言邇來諸路司間有以縣令之貪殘者按劾以聞尋罷黜矣未見有以政績優異敷奏于朝者望申飭監司詳加考察嵗具殿最以聞詔申嚴行下中亮大夫建寧軍承宣使殿前司右軍統制嶽超落階官為利州觀察使以職事修舉特遷之也癸巳右朝請大夫榮薿知襄陽府左朝散郎撫州州學教授宋朴充諸王宫大小學教授朴當塗人好左道每與方士遊摳密院統領丁祀薦之秦熺力加引拔於是檜驟用之此以葉義問章疏修入丁酉監察御史林大鼐面對言祖宗於字人之選其格尤密比者改官者多作丞關升者多作幕職今尚左知縣闕一百三十五侍左縣令闕一百一十二合入者既擇祿而不願未應入者願宣力而無由至於鹽場侍左見有三十餘闕久榜不銷祗為監司郡守差權官之竒貨願並與破格差注一次詔吏部措置既而吏部乞以淮寧知縣等三色闕共一百三十七與破格差從之吏部奏下在六月甲戌吏部所奏稱臣僚劄子乞將知縣縣令鹽埸共二百七十八闕破格差注一次即指此三色也熊克小歷節夫鹽場一項今稍詳之戊戌宗正丞王葆轉對言陛下修德睦鄰感召和氣年榖屢豐今常平司既不能因時糴買以廣蓄而州縣秋苖乃高立米價抑民納錢望嚴折錢之令講平糴之方庶幾農末不病詔付户部夏四月甲辰起居舍人權直學士院王曮權尚書禮部侍郎以使還遷也權尚書兵部侍郎王㑹落權字乙巳祕書少監湯思退試起居舍人權直學士院權尚書禮部侍郎兼侍講陳誠之權刑部侍郎韓仲通並落權字端明殿學士知宣州楊願升資政殿學士以願首修中興聖統故也己酉閬州觀察使帶御器械潘端卿降授郢州防禦使端卿不赴後殿起居為閣門所彈故有是命庚戌禮部侍郎知貢舉陳誠之等言考到博學宏詞科合格人下等左迪功郎監潭州南嶽廟莫冲左迪功郎臨安府錢塘縣主簿葉謙亨詔並與堂除冲歸安人謙亨麗水人也壬子武德大夫和州團練使知閣門事趙述落階官以述自言元勳普之孫供職殿陛餘三十年且使北來還以例遷也閏四月辛未朔左朝散郎孟處義提舉淮南東路常平茶鹽公事癸酉上諭大臣曰三衙闕額令諸州揀選補填江上諸軍令具闕數申樞密院先是禁止諸軍毋得擅自招刺故上訓及之甲戌秦檜奏以直顯謨閣知撫州李莊提舉福建市舶上曰市舶委寄非輕可令莊赴闕禀議然後之任左朝散郎王揚英知秦州揚英自尚書郎斥去意望還朝㑹秦檜久病乃上書薦熺為相於是檜以郡處之此以王圭劾揚英章疏修入丙子上策試南省舉頭鄭聞已下于射殿制策曰朕惟祖宗創守之宏規舉可掩迹三五然而中遭厄運變起弗圖蓋許國之臣無幾而自為謀者總總也今朕承中興之運任撥亂之責所賴於有官君子為至切矣顧狃於聞見小慧相先謂了官事為癡謂履忠信為拙以括囊為深計以首鼠為圓機子大夫讀先聖之書通當世之務其為究復何灑濯可以格舊俗何陶染可以成美化明著于篇副朕延佇且以觀子大夫入官之志舉人趙逵對策略曰君臣父子之間天下真情之所在陛下以神器之大方與元老大臣協謀比德以緝熙中興之功而百執事之人因循舊習不與聖人同憂蓋自藝祖即位尊禮趙普以為社稷臣重其權信其人雖一時舉職如雷德驤不能間也顯然示天下以好惡之所在磨以嵗月而天下之士洗濯自新風俗一變承平日久士為曲學阿私之計而風俗壞尚賴祖宗之澤未逺廊廟大臣有質正不撓者出身捍難作多士之氣以摧折倉卒之變維持至今此道不墜今陛下已尊任其人矣是宜明諭天下以好惡所在而又有以振厲之若既知其為小人確然不惑無使得千廟堂之正議願陛下尊其所聞每進一人惟其癡惟其拙每退一人惟其深計惟其圓機則天下之士庶幾稍知向方儻尤不悛陛下赫然震怒治其尤者一人夫誰敢不服然臣尚有私憂過計者慮陛下尊所聞之不堅異時或有言今之癡者為真癡今之拙者為真拙今之深計者為有德今之圓機者為有謀而陛下疑雖聖主在上賢臣輔相臣不敢謂安靜之福如今日詳定官擬逵第五上覽策謂有古文氣乃擢為第一遂賜逵等四百四人及第出身先是潼州府路提㸃刑獄公事楊椿被檄考四川類省試策問方今君臣同德之懿因論漢文帝不任賈誼為公卿等事舉人張震答策言文帝屈己和親而誼欲以表餌繫單于此不適時之論又言主上淵默思治上天眷佑為生賢佐一德之誠克享天心椿定為榜首檜大善之及唱名震居第四聞開封人世右職逵磐石人震什邡人也己卯宰執進呈進士洪毅上書乞根究轉運司所收諸州補發綱梢糧米及禁止三衙减尅軍錢又言轉運司市馬草支錢不及下户而有彊取之擾曰可問漕司每年補發米數禁止三衙毋得减尅其馬草令户部同漕司措置行下諸路一體行之洪嘗入太學為內舍生乃詔免文解一次壬午尚書户部侍郎兼權知臨安府宋貺罷右正言章厦論貺市井小人初無才術左藏庫自去年闕乏支遣不行乃以臨安府公使激賞贍軍三庫那錢物支遣又不勘虛實令軍人自往漕司支散及令捉事使臣於諸倡家强買婦人貺章惇甥壻惇以誣罔宣仁之故得㫖子孫不得與行在差遣而貺嘗假章俸錢數萬緡乃辟其子為酒官又每於省府事輒曰此非貺意嫁怨於上斂恩於己此最害治之大者望賜竄責以為姦邪之戒故貺遂罷甲申左承事郎簽書平江軍節度判官㕔公事王佐左承事郎簽書鎮南軍節度判官㕔公事董德元並為祕書省正字自秦熺後進士第一人甫除官即入館至是始復舊制焉乙酉右通直郎李若朴知德安府若朴與何彥猷並為大理寺丞坐議嶽飛獄不合斥去至是十年始守邉郡彥猷尋通判洪州而卒彥猷五月丙辰除洪倅未知卒在何年隆興元年正月以右奉郎特贈二官丙戌右朝奉大夫傅寧知沅州還言湖南北之俗遇閏嵗則盜殺小兒以祭淫祠謂之採生望令逐路監司帥臣嚴責巡尉如一任之內紏察採生七人依獲强盜法推賞因事發覺則巡尉坐失捕之罪庶幾其弊可革從之戊子特奏名進士昌永等五百三十一人武舉進士湯鷽等六人授官有差永宣城人也辛卯上謂大臣曰錢塘江石岸毁裂每潮水漂漲民不安居其令漕司同本府修治如闕役於三衙錙重內借差熊克小歷誤在五月癸巳尚書兵部侍郎王㑹充敷文閣直學士知湖州甲午太府少卿徐宗說遷太府卿尚書駕部員外郎陳相為樞密院檢詳諸房文字戊戌尚書屯田員外郎張子儀直徽猷閣主管佑神觀五月庚子朔右宣教郎樞密院編修官兼權實録院檢討官周紫芝知興國軍紫芝不知何時權實討非進士出身人為史官前此未有故出之右宣教郎幹辦諸軍糧料院楊逈充樞密院編修官乙巳封巫山神女為妙用真人戊申徽猷閣直學士四川安撫制置使兼知成都府李璆卒己酉直祕閣馬純落職依條致仕令汀州居住純自福建罷歸寓居諸暨縣而右正言章厦論純常出怨言輒議時政每㑹賔客往往多言朝廷政事得失竊恐逺近傳播有誤耳目望加屏竄庶為姦雄異意之戒故有是命辛亥右朝奉大夫知大安軍張輔世代還言四川惟利州一路創置義士悉於保丁內選充而文其手就令土豪官領之土豪官率多邀求而又州縣力役嵗無虛月今朝廷清明邉燧不驚望放歸田畝庶幾服田力穡各安其居詔制置司相度申樞密院時知洋州宋莘亦論義士免家業錢民間物力偏重遂罷之太學録兼權祕書省校勘書籍周麟之改充𠡠令所刪定官壬子右朝請郎湯沂知劍州代還論劍州稅草自祖宗時止輸本州至紹興五年添屯將兵漕司將稅草應副支遣而於民間重科草佑腳錢望賜除免如川路有米腳錢處亦乞依此施行事下户部而户部言未見當時如何收納前後亦無許行收納條法指揮欲下總領所看詳從之甲寅右朝奉大夫楊朴知榮州還論縣官替罷率於所部以借夫為名而取其直縣之大者至四千緡其次亦不下三二千緡州官替罷往往亦托縣官為之民間不勝其苦而無敢訴者蓋起獄追究則所費又數倍於所出夫馬之直而州縣或捃以他事遂致破蕩資産望申嚴約束仍許越訴詔申嚴行下戊午金主使翰林學士崇政大夫知制誥兼太子少詹事劉長言昭毅大將軍殿前右衛充龍翔軍都指揮使耶律䕫來賀天申節檢校少師奉國軍節度使御前諸軍都統制知興州吳璘檢校少保武當軍節度使御前諸軍都統制知興元府楊政定江軍節度使殿前都虞候鄂州駐劄御前諸軍都統制提領營田田師中並為太尉璘等建節皆十年御劄以其守邉安靜故有是命乙丑秦檜奏欲令國子監復刻五經三傳上曰其他闕書亦令次第雕板雖重有所費亦不惜也六月癸酉上曰近有進易說者以為易非卜筮之書自古以易筮春秋多載其事易有聖人之道四卜筮乃其一豈可以易占為非秦檜曰陛下精於易道非臣等所及武翼郎閣門宣贊舍人幹辦御輦院劉允升為右武郎幹辦皇城司甲戌詔淮南諸州將請佃田土年限已滿之人根括包占頃畝依已降指揮起理二稅用户部請也先是言者論淮南田上昨來官司急於人之歸業請佃不究頃畝多寡止慿所乞遂給與之其間皆是擇膏腴廣包占故租稅所取無幾近年田野加闢年榖屢登而為農者坐享厚利乞依舒州已得根括指揮令民户五家為甲限一季自陳結無隱匿罪狀官司制籍如出限或所陳不實致有人告即差官打量出給告人仍追積年租稅入官本部看詳欲依所乞故有是命舒州根括指揮據臣僚劄子稱在紹興十九年未見月日當考丙子祕書省校書郎葛立方為尚書考功員郎孫仲鼇為司勳員外郎庚辰左宣議郎知衢州曹筠充集英殿修撰辛巳詔大理寺三衙及州縣嵗支官錢合藥以療病囚先是大理寺丞謝邦彥面對有請事下户部本部乞大理寺京府節鎮並支錢一百緡餘州六十緡三衙各五十緡大縣三十緡小縣二十緡至是行下甲申武節大夫榮州刺史閣門宣贊舍人幹辦皇城司潘邵提㸃佑神觀乙酉敕令所刪定官魏師遜面對乞申敕郡縣毋得擅催倚閣積缺詔申嚴行下丁亥左朝奉大夫楊朴言竊覩紹興十七年聖詔以軍興以來四川重斂令宣撫總領兩司取索承平時常賦名色軍興後權所增益參酌措置自後宣總兩司嘗减激犒錢及對糴米各五分四川之民䝉被陛下德澤矣然尚餘糴本水腳錢激賞絹等皆軍興後權所增益者尚未曽减欲乞詔制置總領兩司更行參酌措置若有可减即行分數裁减以寬民力户部言即不見得當時如何增添前後亦無許行增添條法欲下四川總領所及逐路漕司看詳措置申省從之戊子中書門下省檢正諸房公事陳䕫言宣州布衣史敦仁上書陳獻利害尋引問本人書內引援經史多不知出處顯是假手虛妄詔臨安府差人伴歸本州委知通究實申尚書省庚寅右內率府副率愈改賜名愭甲午上謂大臣曰南班宗室非正任者請給殊薄用度多不足生日合賜禮物近權住支今當取索放行昨已嘗賜犀帶及服羅矣大理評事莫濛面對論諸郡重征商稅又以民間日用之物置場𣙜賣止資公庫無名妄用其為民害莫甚於此乞令監司檢察按劾從之秋七月庚子上謂大臣曰漕司米綱多差本司使臣往往作弊致濕惡腐壞可依祖宗法差在部短使人庶有顧籍壬寅集英殿修撰知衢州曹筠為敷文閣待制四川安撫制置使兼知成都府太府少卿總領四川財賦軍馬錢糧汪召嗣直龍圖閣都大主管成都等路茶馬監牧公事直祕閣都大主管成都等路茶馬監牧公事符行中守太府少卿總領四川財賦軍馬錢糧行中嘗欲增簡州鹽策以其事屬雅州軍事推官李燾燾力拒之張浚謂有臺諫風燾丹稜人初第進士調華陽簿未上讀書龍鶴山之巽巖㑹詔舉賢良張浚見其所著五十策善之然不果薦丁未秦檜奏勿稅商販柴米上曰甚善臨安自减定物價之後盜賊消矣詔皇太后視物微昏召行在醫官并草澤醫治有效者有官人進秩五等賜錢二萬緡白身人賜錢外比類補官丁巳宰執進呈諸州招填禁軍闕額數上曰凡闕額須令補足此祖宗所極留意者也又奏茶鹽法成書上曰法已定當令久逺遵守往時隨事變更雖可趣辦目前日後入納稀少非善訃也己未安德軍節度使開府儀同三司權主奉濮安懿王祠事士棣薨追封通化郡王諡孝敏以其子右奉議郎不羈為直祕閣庚申以修天章閣神御殿成詔兩浙轉運司官吏减勘年有差壬戌京西路轉運判官李宏罷先是知郢州喬大觀坐謗訕抵罪而宏不按發之殿中侍御史湯允恭因言宏行能無取吕本中得罪名教而宏附以為重其識趣可知大觀妄造語言肆意謗訕宏職當按廉不以上聞失職已甚乃復交通私書傳意掩覆故有是命左中奉大夫淮南路轉運判官沈調充江淮荆浙福建廣南路都大提㸃坑冶鑄錢癸亥吏刑部言應官員曾擅行科率及因害民之事被罪情理深重者更不注知通知令差遣內有所犯情輕之人具因依申取朝廷指揮始用湯允恭之言也是月遂寧府言自十七年至二十年嘉禾瑞麥嵗産不絶凡一百有六八月按是月戊辰朔庚午大理少卿章燾面對言年榖豐登望委官就江湖臨流之地置場收糴以備委積詔户部措置辛未太師尚書左僕射提舉詳定一司勑令秦檜等上重修江湖淮浙京西路茶鹽勑令格式二百六十卷上曰是書纎悉備載若能遵守久逺之利也壬申揚武翊運功臣太傅鎮南武安寧國軍節度使充醴泉觀使咸安郡王韓世忠為太師致仕是日世忠薨于賜第年六十三始世忠得疾上飭太醫馳視問訪之使相屬于道將吏問疾卧內世忠曰吾以布衣百戰致位公王賴天之靈得全首領卧家而沒諸君尚哀其死邪世忠少時為省倉負米之役慓悍絶人不用鞭轡能騎生馬駒家貧無生業嗜酒豪縱不拘繩檢呼為潑韓五有日者席某嘗言世忠當作三公世忠怒其侮已痛毆之年十八始𨽻軍籍挽强馳射勇冠軍中其制兵器凡今跳澗以習騎洞貫以習射狻猊之鍪連鎖之甲斧之有掠陳弓之有克敵皆世忠遺法嘗中毒矢洞骨則以强弩拔之十指僅全四不能動身被金瘡如刻畫晚以公王奉朝請絶口不言功名自罷政居都城高卧十年若未嘗有權位者而偏裨部曲往往致身通顯節鉞相望嵗時造門類皆謝遣獨好浮圖法自號清凉居士于時舉朝憚秦檜權力皆附麗為自全計世忠於班列一揖之外不復與親逮薨有詔選日臨奠檜遣中書吏韓瑊以危語脅其家於是其家辭而止賜朝服貂冠水銀龍腦以斂賻銀帛三千匹兩追封通義郡王其子直敷文閣彥直直祕閣彥朴彥質彥古皆進職二等孫右承奉郎梃杖並直祕閣賜五品服又命睿思殿祗候徐伸護葬事世忠追封在是月癸酉降㫖臨奠在丁丑其家辭免在庚辰諸子孫進職在二十三年三月丙申今聨書之二十七年九月乙巳二子五孫又各進一官乙亥皇叔嶽陽軍節度使知西外宗正事士樽開府儀同三司充萬夀觀使任便居住右正奉大夫宋貺令徽州居住時貺罷居平江而右正言章厦再論貺寄居輔郡交結妻黨章惇之家意欲動搖國是故有是命寶文閣學士提舉江州太平興國宫梁揚祖卒贈特進龍圖閣學士賜其家銀帛三百匹兩辛巳左朝請大夫兩浙路轉運判官趙士㣓直祕閣壬午太府寺主簿錢端英面對論州縣多移易常平錢乞戒敕詔申嚴行下端英愕子也甲申直龍圖閣提㸃佑神觀秦塤升祕閣修撰同安郡夫人秦氏封小國夫人以秦檜進書加恩也塤言見習舉業所有進職太高實於應舉相妨乞追寢不許中書門下省檢正諸房公事陳䕫武功大夫惠州刺史權知閣門事蘇曄充賀金國正旦使副樞密院檢詳諸房文字陳相武節大夫吉州刺史權知閣門事孟思恭充賀生辰使副戊子將作監主簿孫祖夀面對乞開導臨安城中溝渠以泄積水從之祖夀廣陵人也辛卯詔皇叔昭信軍節度使知大宗正事士權主奉濮安懿王祠事乙未成忠郎柴大有為右宣義郎監周陵廟以大有自言當世襲也丙申權尚書禮部侍郎王曮罷以殿中侍御史湯允恭言其怨望也乃以曮知衢州九月戊戌朔大理寺主簿丁仲京面對論贍學公田多為形勢之家侵占請佃望提舉官覺察上謂大臣曰緣不度僧常住多有絶産其令户部併撥以贍學既而本部乞令提舉司置籍拘管其無𠡠額庵院亦依此施行從之庚子命日歷所重修宰輔拜罷録用禮部員外郎林機請也然亦不克成事祖見九年三月丙戌辛丑大理卿許大英乞申嚴舊制令監司郡守遇有按發官吏並具職位姓名申吏刑部大理寺置籍承勘官司凖此庶幾刑部之人不致窘礙從之是夜雷癸卯敷文閣直學士知紹興府俞俟引年告老詔遷一官致仕乙巳左朝散大夫汪待舉知處州還論本州蠶鹽丁鹽之賦輕重不同蠶鹽以田畝計自以舊稅之後厥賦為輕丁鹽以民身計自以舊額折絹之後厥賦為重乞將所進之丁於第五等以下人户用其舊額均敷户部乞如所請自今添丁止均納見認之數不得溢額從之戊申尚書考功員外郎兼權中書舍人葛立方罷以右正言章厦論其輕恣也己酉右朝請郎吕稽中知邵州還言近取天下係官之田盡付常平官措置此養民之本然湖南㳂邉連接廣西一帶間田甚多或為兼并之家占據阡陌而其租稅終不入官田野小民未必䝉被恩惠若令輕立租米廣召百姓耕佃每夫止給五十畝或有輕赦罪人無家可歸亦許依數承佃寬間之田遂可開闢收其所輸糴其贏餘可以寬州縣之用詔户部措置丙辰直祕閣兩浙轉運判官趙士㣓知臨安府直龍圖閣知潭州湯鵬舉知紹興府丁巳增築景靈宫用韓世忠賜第為之前殿五楹中殿七楹後殿十有七楹齊殿進食殿皆備焉期年而畢戊午詔文武官緣川陜便宜及雜功遷轉當追减官資之人其父母封贈並免釐正以司封員外郎王葆面對有請也己未左承事郎周麟之為祕書省正字庚申右正言章厦試右諫議大夫左承事郎魏師遜充樞密院編修官是月簽書樞密院事巫伋自金國使還徐夢莘北盟㑹編云巫伋鄭藻以祈請使副使于金國闕下引見畢內殿奏公事惟正使巫伋得入金主問所請者何事伋首言乞修奉陵寢金主令譯者傳言自有看墳人伋第二言乞迎請靖康帝歸國又令譯者言不知歸後甚處頓放伋第三言本朝稱皇帝二字又令譯者傳言此是你國中事當自理㑹伋唯唯而退待辭而歸趙甡之遺史曰巫伋作祈請使而無祈請之辭投書而已議者謂不識字之承局可優為也冬十月丁卯朔司勳員外郎權國子司業孫仲鼇面對論近制士人願入上庠州縣次第勘驗於貢舉無違礙及非殿舉屏斥之人給據赴補真良法也今就試之士未必皆由本貫往往隨其所寓託稱逰學甚者詭名冒貫設巧求據兹弊不革士將輕桑梓而弗顧棄行檢而弗修欲望且停將來上庠補試略倣舍法詔天下嚴郡庠之補月書季考精察其行藝或一嵗或間嵗遴選一二尤異者升之上庠充弟子員其道逺貧不能行者官給路費如貢士續食事下禮部看詳後不行戊辰殿中侍御史湯允恭試司農卿司農少卿宋仲堪為尚書左司郎中詔忠州團練使知金州節制屯駐御前軍馬李耕令赴行在奏事金州闕令吳璘選差權官具奏耕守金州凡四年己巳監察卿史林大鼐為殿中侍御史庚午吏部郎中沈虛中面對論州縣官到選批書間有不圓之患乞以前後條式鏤板領降俾吏無邀索官無留滯從之虛廣德人也辛未武功大夫吉州團練使兩浙西路兵馬鈐轄樞密院統領丁祀充江南西路馬步軍副總管祀久幹辦秦檜府故升差焉甲戌上幸太傅醴泉觀使清河郡王張俊第壬午制拜俊太師以其姪龍神衛四廂都指揮使清海軍承宣使添差兩浙西路馬步軍副都總管子蓋為安德軍節度使餘子弟遷官進職者十有三人幹辦府武功大夫高凖制轉行右武大夫管轄親兵濠州團練使顧暉除防禦使皆異數也子蓋建節在十一月癸丑子弟已下遷官在十一月戊申今併書之是日秦檜進奏上曰龔鑒守盱眙頗靖檜曰朝廷報對境文字鑒有不放心處少來申明百官有司於所職若皆如此留意則無不濟矣癸未秦檜奏臨安給丐者錢米自嵗十一月為始上曰此事所濟甚大苦寒之時貧者遂得以活也普安郡王時在藩邸每遇天寒雨雪淹久都下居民有甚貧而無所得食者必命輟俸米以賑之嵗以為常此以張闡所進聖德事蹟附入承節郎閣門祗候劉伉為武翼郎閣門宣贊舍人伉才人兄也甲申詔光州已置𣙜場合行事並依盱眙軍例己丑責授寧逺軍節度副使袁州安置韋淵復少師昭慶軍節度使萬夀觀使平樂郡王甲午宰執進呈大理正張􅤡面對乞禁止州縣差公皂下鄉州用木匣遞送文書下縣縣令承帖人付之鄉村上曰朕頃在河朔親見此弊宜申嚴舊法禁止右朝請大夫王伯淮知臨江軍代還言清江縣有苖稅錢四十餘貫苖米四百餘石人煙田産並在筠州高安縣上項苖稅在經界法謂之窵佃在鄉村謂之包套未經界之前尚可追理經界既定兩縣各隨産經量承認本鄉元額稅苖則清江有稅無田高安有田無稅又兩縣一時結局清江不免以無田之稅增均於元額之田高安即以無稅之田减均於元額之稅是高安得偏輕之利清江得偏重之害矣望下本路究實改正詔委本路轉運判官盧奎先是淳化中建筠州之瀟灘鎮為郡割高安之兩鄉以𨽻之繇是有交鄉窵佃之弊伯淮資深子奎邵武人也乙未降授郢州防禦使帶御器械潘端卿復閬州觀察使是月左中奉大夫王居正卒秦檜之初相也居正時為修注嘗白上以檜作相前所言皆不讎檜憾之及檜專國居正畏禍屏居常州時事一不掛口檜猶奪其職奉祠十餘年至是卒加封吳將甘寧為昭毅武惠遺愛靈顯王廟在富池十有一月戊戌左承議郎主管台州崇道觀程敦厚直徽猷閣敦厚獻紹興聖德詩極言和議之效又獻秦檜詩有誕生聖相扶王室之語尚書省勘㑹敦厚用意可嘉乃有是命此以日歷及敦厚文集參修戊申樞密院編修官魏師遜諸王宫大小學教授宋朴並守監察御史庚戌參知政事余堯弼罷右諫議大夫章厦殿中侍御史林大鼐共劾堯弼傾邪貪鄙交通三衙結諸州將朝廷有大議論則閔默無言請貶之以清政府詔堯弼充資政殿學士提舉江州太平興國宫尋落職斬有䕃人惠俊以指斥乘輿法寺鞫實故有是命壬子詔諸路公私房廊白地錢並减半乙卯右朝請大夫黃子游知池州還言農田水利所係甚重比緣兵火之後陂塘例皆廢壞官司未遑修治故旱嵗則高田無以灌溉霖潦則下田無以泄水殊為可惜望敕諸路提舉官措置修治上謂大臣曰聞陂田多為人侵占可令有司措置毋妨衆用翼日進呈上曰須常平官得人若監司得人事無不濟近時監司多端坐不出提㸃刑獄職在平反尤當遍臨所部宜戒飭之子游實孫也丁巳進義副尉劉允中棄市以上書希求恩賞指斥乘輿及謗訕朝廷法守鞫實故抵於法辛酉詔申嚴鞫條令應重罪大情已明其餘輕罪並免追究以大理寺丞郭唐卿面對有請也壬戌司勳員外郎兼權國子司業孫仲鼇論諸州教官選補不公講說課試多廢乞嚴加督責詔刑部立法十有二月脫干支司封員外郎王葆言民多銷銅錢為器利率五倍乞禁約詔申嚴行下壬申夜雷己卯皇叔潭州觀察使士嵰特降一官士嵰士樽弟以再娶故宗子安上妻劉氏為大宗正司所劾也庚辰雪時上以雪未應期遣人禱太一祠雪遂作辛巳秦檜奏事上曰昨晚便得雪甚可喜檜曰陛下至誠昭格如此當率百官拜表稱賀熊克小歷稱辛巳雪壬午宰執奏事蓋各差一日癸未户部員外郎李濤面對論近置諸州惠民局慮四逺藥方差誤望以監本方書印給從之論官面對正欲聞朝廷之利害天下之休戚今以權姦在位不言當春禁樵捕則言惠民局藥方差誤所言僅及此而稍涉時政則噤不敢發口是則果何取於論對哉言路不通國事從可知矣丁亥秦檜言臘雪應期中外共慶去年臘中三日雪果大有秋上曰自此二麥可望不惟時豐疫病亦自消矣戊子詔徑山寺僧清言杖脊刺配廣南逺惡州牢城以撰造偈頌鼓惑士衆至有指斥語法當絞特貸之己丑親衛大夫利州觀察使馬擴卒庚寅大理寺丞范彥輝面對論州縣獄吏例置私名貼書一切付之鞫獄謂之欵司凡老姦停廢與閭閻惡少能弄筆者悉聽為之人之死生悉命於此輩欲望專委監司守臣嚴行覺察須用試補限以嵗年無過犯則如在京補官法詔刑部看詳後不行辛卯大理司直栁大節面對言江浙之間物直貴甚榖賤傷農迹其所以良由征稅之重望詔有司裁定則物價自然低平詔申嚴行下壬辰清河郡王張俊言葬妻乞下常州差人修整道路上曰此止可差廂軍不得擾鄉民朕自議和以後人民安居無復前日饋運之勞故不欲差夫秦檜曰陛下今日所以當天意正在此也癸巳金主使驃騎上將軍殿前右副都㸃檢烏珠魯定方太中大夫右諫議大夫祕書少監蕭永祺來賀來年正旦是嵗宗室子賜名授官者十有八人諸路斷大辟二十二人詔臨安府民户見推排等第依在京例與免日歷無此今以紹興二十六年十月十八日凌景夏劄子修入未知在何月日也關外四州收營田五分租凡二十一萬七千餘石金主亮下詔議都燕京詔曰昨因綏撫南服分置行臺時則邉防未寧法令未具本非永訃只是從權既而人拘道路之遙事有嵗時之滯凡申欵而待報乃欲速而愈遲今既庶政惟和四方無侮用併尚書之亞省㑹歸機政於朝廷又以京師粵在一隅而方疆廣於萬里以北則民清而事簡以南則地逺而事繁深慮州府申陳或至半年而往復閭閻疾苦何由期月而周知供饋困於轉輸使命苦於驛頓未可時巡於四表莫如經營於兩都眷惟金燕實為要㑹將因宫廟而創官府之署廣阡陌以展西南之城勿憚暫時之艱以就得中之制所貴兩京一體保宗社於萬年四海一家安黎元於九府咨爾中外體豫至懷將軍等每名各支喝賞銀絹九匹兩詔後宰執列銜者九人其稱皇弟太尉領三省事樞密使秦國王則亮之弟亢起復特進參知政事滕國公則蕭裕也此以兩國編年修入金中有板行翰林直學士趙可文集載其所撰都人進義何公墓碣云天德三年展都城或薦公於用事者於是東阡西陌線引綦布其制蓋皆出於公焉天德三年則今年也建炎以來繫年要録卷一百六十二建炎以來繫年要録卷一百六十二金人地名考證烏珠原書作兀术誤改見卷一
