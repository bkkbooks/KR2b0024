body:
  text: 建炎以來繫年要録卷一百二宋李心傳撰紹興六年六月丁酉朔上謂趙鼎曰朕於宫中親種一方稻數日雨既霑足昨日令人驗之頓長四寸半真可喜也詔提舉淮南鹽事蔣璨提督措置控扼海道事務先是分海舟八十艘屯通州之料角故命璨領之己亥權尚書吏部侍郎晏敦復試給事中兵部侍郎胡世將兼權吏部侍郎𢃄御器械錢愐兼權樞密副都承旨直龍圖閣知建州魏矼充祕閣修撰以中書言其政績也庚子大理少卿張匯等言獄空詔嘉奬仍免表賀十三年穴月戊申二十二年五月乙未二十六年四月戊午二十九年正月丙辰三十年四月丙寅三十一年五月庚辰並同此匯河南人也辛丑詔湖北安撫司統制官覃敵見管水軍官兵等並撥𨽻侍衛步軍司癸卯尚書右司員外郎樓照守左司員外郎樞密院檢詳諸房文字范直方為左司員外郎仍兼都督府推行賞功文字詔龍圖閣直學士提舉江州太平觀汪藻續次編類元符庚辰以來詔旨初藻守吳興被旨編輯未就而去會史館初置乃用修撰官綦崈禮言罷之至是修撰范沖言失今不就事浸零落可惜乃先進藻一官是月庚子令接續編類加賜史館修撰飱錢官給筆劄賜飱錢在七年三月今併附此左中奉大夫集英殿修撰提舉台州崇道觀李友聞卒友聞子儔俅既臣劉豫皆仕為要官朝廷不奪其祿養冀招來之此以紹興四年十二月詔書修入友聞家居七年年八十餘乃卒甲辰給事中吕祉試尚書刑部侍郎充都督行府參議軍事以張浚言調法大軍移屯淮南乞選從官前來參議軍政故也詔新除給事中晏敦復不候受告令日下供職此乂與近日言者建請相妨左宣義郎左時充樞密院編修官時自敕局改官當罷去故以樞屬處之此又與今年四月己酉石公揆請相妨既而省待次員乃以為御史臺主簿八月壬寅顯謨閣待制新知鄂州王庶知荆南府兼荆湖北路經略安撫使荆南屢為盜殘庶與士卒披荆棘致材用治城隍繕府庫廨舍畢修陶瓦為民室廬闢市區如承平時流庸四集而喜曰公可恃我其安於此矣庶曰府庫未充也乃下令有欲吾田者肆耕其中吾不汝賦有能持吾錢出而得息者視其息與去之日多少授其職有差武吏爭出應令未幾還輸其息府庫大充得以養兵遂成軍隱然為雄藩乙巳集英殿修撰提舉台州崇道觀程俱左中奉大夫提舉江州太平觀黎確並復徽猷閣待制左從事郎新饒州州學教授孫雄飛為樞密院編修官俟左時到任成資日上雄飛自館職罷去遄又用之此亦與石公揆建請相妨直徽猷閣知荆南府薛弼為湖北京西宣撫司參謀官武顯大夫湖北京西宣撫司幹辦公事于鵬知鄧州皆用嶽飛奏也右朝奉大夫曽慥為京西路轉運判官兼宣撫司隨軍轉運慥以親年髙辭不赴夜地震丁未趙鼎奏前夕地震上曰知之上天譴告朕極憂恐鼎曰坤德宜安靜今震動不寧皆臣等輔佐無狀向緣地震吕頥浩嘗罷政上曰頥浩之罪非為此卿等但當與朕協力修政事用答天譴耳祕書省正字兼史館校勘喻樗面對言自三代云逺學校貢舉之制一切茍簡故蘇軾有言自政事論之則䇿論詩賦均為無用誠篤論也臣伏見進士之外有博學宏詞以表制詔書布檄針銘記贊頌序為十二目實為有用之文然法須命官方許召試彼一命之士既有職業則文藝之習比之舉人不能精専欲望明詔天下應舉人有願兼應宏詞科者於科詔到後以所業上之縣縣上之州州察其性行溫厚鄉評無玷者以姓名文字保明上之禮部禮部上之朝廷朝廷降學士院或後省看詳文字典重議論淵源者報禮部赴試西北人在行朝無州縣可以保明者令清望一二人薦舉其程試之法略如見行條法所取人數臨時取旨裁定申選者免省試行之數年將見人材輩出文章爾雅可備朝廷選用事下禮部後不行是日沿海制置司水軍統領修武郎嚴安雅廣州水軍統領右儒林郎范德沖以舟師與海賊鄭廣戰於新會縣之三竈山賊乘風衝突兩軍俱失利官軍多死安雅等皆坐貶官八月己未行遣戊申趙鼎請下詔求言上曰甚善朕歷考前世故事當避正殿減常膳今則所御止一殿而常膳至薄若更減損亦無害鼎曰此皆文具也應天消變之道恐當専修人事庶幾可召和氣但即今費用浩大科斂益煩此傷和氣之大者也臣等日夜不勝惴恐而才綿薄終恐上負委使又進呈軍器所事上宣諭軍器所初緣李志道措置得有法至今整齊因言志道夜間著帽而寢中夜起治事左手運籌右手書計不差毫釐是亦人妖鼎曰惟其如此便非國家之福禮部尚書李光引疾求去罷為端明殿學士知台州權户部侍郎王俁兼權禮部侍郎己酉手詔曰朕以菲德奉承大統遭時艱厄敵偽相挺軍旅方興賦役重困寤寐恫矜未知攸濟乃六月乙巳地震朕甚懼焉政之失中吏之無良怨讟滋彰乖氣致沴坤厚之載搖動靡寧變不虛生緣類而應永思厥咎在豫一人凡內外臣庶有可以應變輔朕之不逮者其各悉意以言毋諱朕躬毋悼後害州郡守長近民之官宜為朕惠養凋瘵安輯流亡察寃繫禁苛擾毋倚法以削毋縱吏為姦惟兹卿士小大協恭各祇乃事以副朕寅畏天地側身銷變之意遣內侍往淮南撫問右僕射張浚仍賜銀合茶藥以浚將渡江巡按故也浚以為東南形勢莫重於建康實為中興根本且使人主居此則北望中原常懷憤惕不敢自暇自逸而臨安僻居一隅內則易生安肆外則不足以號召逺近係中原之心遂奏請聖駕以秋冬臨建康撫三軍而圗恢復浚又渡江撫淮上諸屯屬方盛暑浚不憚勞人皆感悅時防秋不逺浚以方略喻諸帥大抵先圖自守以致其師而後乘機擊之遂命淮西宣撫使劉光世自當塗進屯廬州與韓世忠張俊鼎立又遣權主管殿前司公事楊沂中進屯泗州軍聲大振此以浚行狀增修但熊克小歷繫之五月恐太早日歷浚奏已擇定六月中旬渡江前去淮甸巡按不得其日故因遣中使遂書之武功大夫貴州團練使閣門宣贊舍人王淵令先次額外供職淵者降授宣慶使德慶軍承宣使仍之養子自言仍嘗提藩邸府事昨從上皇北狩未回乞用隨龍官子孫恩例先次供職故也權中書舍人董弅言閣門官係三十員為額不聞其有廢事今淵欲創員外闕以遂其私臣未見其可望寢前旨不行仍乞自今應官司毋得陳乞額外創添員闕其自行陳乞額外官者重置典憲輔臣進呈上曰弅所論甚善大抵僥幸之門不可開開則不能復閉矣遂已進呈在是月甲寅右朝議大夫主管台州崇道觀謝亮卒庚戌紹興府嵊縣令錢墌對移餘姚縣丞墌馭吏嚴邑吏二百餘人訟其過於府中一夕逃去言者論吏強日久兹實亂階不可不治而墌不能潔已徒務淫刑逄其盛怒論決之際渠水為赤恐難在任望下本路憲司究實擇清強官對移如有贓狀自當按法施行至是憲臣劉一止奏墌到官半歲所決遣吏民二千七百餘人而士民之言以為墌愛民不擾皆詣本司借留乃命承勘官司照會辛亥張浚遣中書門下省檢正諸房公事兼行府咨議軍事張宗元來奏事壬子上御正殿踈放臨安府等見禁輕刑以大暑故也甲寅給事中晏敦復繳江東帥臣葉宗諤修建行宫畫一録黃上曰敦復所論如何趙鼎曰近日民間多事若緩為之亦無傷上曰極是要當以愛惜民力為先他時巡幸粗庇風雨足矣於是鼎未欲上幸建康故對語及之事祖在今年五月丙戍按朱熹撰張浚行狀云公力陳建康之行為不可緩朝論同者極鮮蓋有所指也觀文殿學士知紹興府孟庾提舉臨安府洞霄宫從所請也命太常少卿何慤往都督行府撫問上召對而遣之左迪功郎祕書省正字朱敦儒改左承奉郎敦儒入館未幾上特引對而有是命直徽猷閣知鎮江府李謨升職一等時都督行府在鎮江而謨應辦無闕故陟之權川陜宣撫副使邵溥言本司提點諸房文字王偉隨軍調發軍馬計偹錢糧措置戰守首尾九年又措置茶鹽酒息錢三千餘萬制造軍器二百餘萬類試舉人二千餘人一切了畢已便宜轉行貴州刺史詔許換給當制舍人言據上項所陳果皆成績則帥臣將佐監司郡守之事也提點文字使臣何預焉且此數事若有不及當行責罰則提點文字使臣必不預顯見欺罔朝廷冒昧官爵乃命依條回授白身陳佃特補右奉議郎張浚之撫師川陜也佃以言邉防利害授初品文階又以往關外軍前撫諭之勞改京秩至是行府關送尚書省指揮既易真命遂以佃知廣安軍七月乙酉乙卯觀文殿學士知溫州秦檜改知紹興府武節郎閣門宣贊舍人添差江州兵馬鈐轄寇宏知黃州詔交子務官吏依己降指揮並罷初用臺諫及近臣議改交子為糴本關子而𣙜貨務提轄官魏彥弼言本務受納錢物浩瀚若押印關子委與職事相妨乞且令交子務印造朝廷從之言者論自巡幸以來凡用見錢關子並係本務印造而彥弼避事妄有陳請乞勒令分析於是遂罷丁巳上諭大臣曰雨不妨事否趙鼎曰若得晴亦不妨事上曰田中雨過多猶可車水決堰盡人力料理若旱則更無可擘畫大率豐年自古難得所以春秋書有年大有年蓋喜之也况今日公私匱乏望歲之心尤為切至是日營田官王弗候對上望見之曰少間當子細諭弗令竭力久任若一二年間營田就緒庶幾可以少寬民力朕知此已久昨在會稽嘗書趙充國傳以賜諸將但上下不能奉承由是且已若早做得數年即今已獲其利鼎曰為國根本之計莫大于此中興聖政臣留正等曰務農之要有二一曰審天時二曰盡地利太上皇于斯二者兼舉而無遺修水旱之備所以審天時也立營田之官所以盡地利也紹興之初兵拏未解調度百出取給于民其力困矣故思有以寬之始者蓋嘗以屯田望諸將惜其不能奉承也肆主上休兵以來博採羣議遣使講求兵之屯田者責之將帥民之營田者責之守臣兩淮荆襄膏腴之地墾闢幾遍行之數年殆見公私兼濟倉庾盈溢羊祐十年之積蓋有不足道矣右司諫王縉言臣聞應天以實不以文近者乙巳地震陛下深自警懼特降手詔告誡中外務在恤民隱銷變異誠意至矣臣竊見浙江船渡使臣阻節往來回易收息籠及柴薪物價為之頓增嗟怨之聲或干和氣欲望特降睿旨浙江船渡宜責邉江巡檢回易宜取商旅情願民瘼既除變異自銷矣詔追使臣送大理治罪回易強市者使臣停官時觀文殿大學士朱勝非奉祠居湖州欲以三事應詔而未敢遽上見縉疏遂止前二日縉入對嘗奏疏論地震駐蹕之所豈非天心仁愛著隂盛之戒女子小人則逺之外國盜賊則備之是皆隂類也又言陛下即位十年軍政未立國用未節宜詔大臣參酌祖宗舊制每歲出納之數而裁酌之抑僥幸以靖衆志薄賦斂以寬民力為長久之計疏留中不出江西制置大使李綱亦列八事奏上朱勝非秀水間居録是月地震手詔求言勝非欲以三事應詔而未敢遽上有自行朝至湖者為勝非言大臣無所論勝非始不信後數日邸報論地震一疏云應天以實不以文今浙江監渡使臣阻節往來諸軍回易擅增物價能去二害則和氣可召災異自消此應天之實也於是降旨追使臣送獄立法禁回易強市勝非歎駭纍日更不敢奏時趙鼎作相植黨如山無敢言者勝非所云即縉降出之疏也戊午詔兩淮沿江守臣並以三年為任用右朝奉大夫都督行府同措置營田王弗請也弗入對論軍興以來兩淮殘破尤甚賴朝廷寬恩未加賦役故零丁殘民漸有生意望陛下念殘民撫存之急察郡守數易之弊將兩淮及沿江守臣並以三年為任無事不許更易庶幾流移漸歸耕稼滋廣數年之後有以助朝廷調度之費豈特一方之幸也輔臣進呈上曰朕昔為元帥時嘗見州縣官説及在官者以三年為任猶且一年立威信二年守規矩三年則務收人情以為去計矣况今止以二年者乎雖有葺治之心蓋亦無暇日也弗所論甚當當如此施行上論及治體因曰治天下之道在乎必賞與必罰而已刑固不可淫以逞也然茍有罪豈可不以刑威卿等於此且更留意鼎曰近時贓吏雖不能依祖宗時一切棄市然近亦數杖脊刺配且如殺人者死古今常法比年皆從貸例而臣等亦多酌情依斷聖人以謂罪疑惟輕既無所疑何為而貸貸一有罪則犯者愈衆而善人咸被其禍七月甲戌有旨沿江州軍係太平江池鄂嶽州興國軍中興聖政史臣曰刑期於無刑聖人之心也治不能無刑聖人之不得已也昧其不得已之意而謂刑可輕焉貸一贓吏而天下之貪者無所勸縱一姦民而天下之暴者無所懲犯法滋多賊民愈甚以是為仁適以害仁也帝者之世兹用不犯于有司者明于五刑之功也非去刑而能使民不犯也王者之世遷善逺罪而不自知者殺之利之之功也非去殺而能使之遷善也然則姑息之為治其亦不仁之甚哉髙宗之意蓋欲以殺止殺者歟遣金部員外郎霍蠡往嶽飛軍前催督錢糧以飛言本軍糧乏故也忠翊郎湖南制置大使司親兵左部統領軍馬裴鐸遷一官兼閣門祗候用吕頥浩奏也先是郴衡桂陽草盜紛起頥浩遣鐸與統制官步諒招捕悉平之吉川盜王權既受嶽飛招安復自軍中亡命聚衆數百人為寇鐸擊破之權棄仗遁去鐸本馬擴部曲以勞板授至是正命之鐸十二月乙未補正己未祕書省正字李誼守監察御史誼特被引對論吏之臧否係乎人君之好惡其從違常係乎人君之賞罰嘗考漢書循吏傳六人而五人出於宣帝酷吏傳十二人而八人出於武帝唐書循吏傳十五人而出於武德貞觀之時者半酷吏傳十二人而出于武后之時者亦半以是知吏之為治皆視上之趨嚮爾願詔諸路監司舉劾部內守令政績之善否其有蔽賢容姦者皆當坐以違制之罪詔下其章翌日遂有是命武功大夫果州團練使淮西宣撫使司提舉一行事務李鑄除名邵武軍居住以宣撫使劉光世劾其竊弄事權蠧害軍政也七月丁丑降詔奬諭庚申右宣義郎趙侁為太府寺丞侁抃孫也朝廷以其世而用之湖北路提舉茶鹽常平公事范寅秩言茶鹽之利常平之法專一應副國家大計州縣不得擅用比因盜賊纍年為害如本路州郡𠂻私移用或申畫朝旨特免監司支取朝廷一時取撥免年限或二年或三年有至限滿又展年限及有一面擅行支用錢米盡淨申乞朝廷除破提舉官縮手坐視不敢誰何欲乞自今後兩司錢物應申畫展限及除破并通融本州支用及截撥并一面支取指揮並乞行下本司核實保明收支的確下落委實要用及無可樁還再行申明方許依應從之寅秩建陽人也直祕閣知真州趙尚之左朝散郎通判真州季洞並罷洞仍降一官二人不相能交訟其不法都督行府言二人别無贓汚若令根治徒使干連之人無辜坐獄故有是旨辛酉皇伯左中大夫充集英殿修撰提舉臨安府洞霄宫令懬為閬州觀察使安定郡王詔以曾布記熙寧市易本末及紹聖以來奏對語録真迹送史館先是布子直寶文閣紆上布三朝正論事見去年四月庚午趙鼎奏令紆親賫布真迹赴行在八月己酉俄除知信州令其子右奉議郎惇代賫赴闕八月丙寅既又改紆知衢州九月丁亥未上而紆卒十月戊辰至是始以其真迹上之紆言先臣以直道事三朝知無不言自紹聖以來大臣報復元祐私怨倡為傾搖廢立之議而蔡京蔡懋等附會增飾致滔天之謗上及宣仁聖烈皇后獨先臣每事極論痛伐賊謀故於宣仁終不能遂其姦計至元符之末太上皇帝踐阼欽聖獻肅皇后垂簾之初親於簾前稟問本末欽聖聖語力辨謗誣至云寃他娘娘豈有此意親書記録首尾具全欲望聖慈宣之外廷付之史官考驗真迹修定信書除四十年蔽蝕之妖正千萬世是非之實詔付史館仍遷惇一官賜銀帛百匹兩八月戊戌軍器監丞黃祖舜特引對乞堂除縣令上謂大臣曰祖舜謂郡守朝廷知所選任矣獨於縣令皆付之銓曹專用資格差注今若且委之郡守使得澄汰無狀者亦庶幾也此論有理其甄擢之熊克小歷稱吏部郎官黃祖舜乞堂除縣令按祖舜今年七月始自監丞遷屯田郎官克恐誤翰林學士朱震言竊見陛下念虔州之民屢干邦憲選任郡守使牧其民固已得治虔州之策矣臣謂虔民弄兵其説有二越人徑悍其俗輕生見利必爭有犯必報農事既畢則徑度潮梅循惠四州驅掠良民剽劫牛馬此其一也自軍興以來守令多非其人政令苛虐科斂無藝小民無告橫遭荼毒互相扇動遂萌姦心徒黨浸多乃成巨盜原其本意豈願屠戮自取滅亡良由吏失其職奉法不虔激之使然罪至不赦此其二也凡虔之民均是人耳烏有不可治者臣願詔孫佑令到任條具本州及諸縣官吏有貪墨無狀巽懦不職無益於民者一切罷去聼佑選擇慈祥仁惠之吏忠厚願慤之人異時治迹顯著者咸以名聞朝廷優加奬勸或令再任宿弊盡去人樂其生雖誘之為盜亦不為矣臣又願陛下詔樞密院令於潮州安泊一軍以斷賊路今韶州已有韓京一軍賊度嶺欲冦南雄英韶等州則有所畏憚矣如别置一軍屯於潮州姦盜之心自息於冥冥之間不待誅鋤勦絶而老盜宿姦心知其不可為矣至於本州掌兵之官亦乞選用立功邉徼有名于軍伍者為之如是而三年不治者未之有也時新除守臣孫佑方入辭未去乃以付佑焉侍御史周祕言臣近見川陜宣撫司屢以糧運不繼聞於朝廷而四川總制財用趙開亦稱所運糧斛盡已起發臣不知其孰是也今漕司之所較者惟船運之費而已且以成都一路言之自水運至軍前用錢四貫三百可致米一石若使稅户自陸路般運則每石所用三倍於水運之直若值農時民間雇人般運則其所用又三倍於稅户自運之費水運稍逺其行雖遲而所費至少陸運稍近其行雖速而所費至多宣撫司欲其速至則必以陸運為便總制官欲其省費則必以水運為便此大將之所以有言而漕臣之所以自辨也臣以謂大將為陛下統率大兵則軍食闕絶固其所當慮漕臣為陛下臨治一路則民力凋瘵亦其所當惜然就利害而熟計之不有百姓則何以養兵不節所費則何以活百姓今既設漕臣使専饋運則但當責錢糧之辦足不當問般運之遲速但當前告以期限不當取之於倉猝協濟國事在此而已欲望聖慈特命川陜宣撫司預計一年之費分為四限令總制財用官常於一季前應辦其水陸般運悉從民便庶不誤於軍期亦稍寬於民力詔制置大使席益相度聞奏壬戌顯謨閣直學士左承議郎提舉江州太平觀陳與義左朝奉郎充集英殿修撰傅嵩卿左朝請郎守起居舍人董弅並試中書舍人與義仍兼直學士院兼侍講不俟受告供職故事職事官同日除者以寄祿官為序弅奏與義嵩卿皆故從官乞依宣和故事以除目為序上許之弅奏在七月己巳與義嘗為給事中服金帶至是更服舍人服上諭曰朕當以卿為內相左朝請大夫陳公輔行尚書吏部員外郎用范沖薦對也左奉議郎江東宣撫司主管機宜文字張體純罷體純初為張浚所辟今年四月癸卯吏部審量當敦減殿中侍御史石公揆言體純以助軍補官上書赴殿試便宜改官皆不由格法畏避討論遂𨽻名軍中望罷之令浚改辟上曰當如所請豈有不容於朝廷之人而可為大將幕屬邪於是體純依例追四官改正出身而體純在浚軍中如故體純追官改正出身日歷無此明年正月十八日體純自右承務郎用淮西宣撫司功賞轉官癸亥尚書右僕射同中書門下平章事兼知樞密院事都督諸路軍馬南陽郡開國公張浚加食邑一千户食實封肆百户浚出按淮甸故降制加恩焉時浚密遣人至燕山回知道君不豫淵聖貽書金帥求絹浚遂奏臣近得此信不勝痛憤願陛下剛健有為成敗利害在所不恤况孝悌可以格天推此心行之臣見其福不見其禍也趙鼎奏得浚書云建康入納鹽錢甚盛上曰沿路既安商賈放心來往鼎曰亦緣久不變法上曰法既可信自然悠久蓋自立對帶法二年不變故比之常歲增也左從事郎范如圭為祕書省正字如圭建陽人也故太子中舍知封州曹覲賜諡忠肅故右贊善大夫知康州趙師旦賜諡莊愍皇祐中儂智髙入冦二人皆身捍賊而死曽開在廣東援五年十一月詔書為之請至是賜之日歷六月十三日廣東經略司奏乞為二人賜諡無帥臣姓名按連南夫今月十二日方辭免不允則曽開所請也甲子詔自今委保舉人避親牒試不實者許人告保官先降一官然後取勘合負罪犯用四川制置大使席益奏也舊法見任官子弟去本貫二千里及監司守二有服親門客與婚姻之家皆牒赴轉運司别試七人而解試一人後多冒濫亦有以賄得者前舉成都路漕司就試者三千餘人解四百四十人潼川路漕司就試者二千餘人解三百人益請於朝故有是命詔自今諸州流寓舉人每十五人解一名不及十五人令本路漕司類聚附試仍不拘路分召文臣二員結除名罪委保所保不得過三人用國子監請也事祖見建炎四年五月建炎以來繫年要録卷一百二
