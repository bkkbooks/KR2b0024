body:
  text: 建炎以來繫年要録卷一百七十九宋李心傳撰紹興二十有八年嵗次戊寅三金海陵亮正隆年春正月按是月壬戌朔己巳殿中侍御史王圭言殿前馬步軍三衙強刺平民為軍詔禁止先是殿前司闕額數千人詔三衙分月招補而所遣軍士利其例物往往驅掠市人以充數民以樵採魚蝦為業者皆不敢入行在至有招刺輦官者自行在至衢婺數州道路之間商旅不行逺近大擾圭為上言外郡寄招之兵人材亦略可使皆民間之無家可歸者出於所願但州縣吝費所招不多今若以三衙招兵之資付之寬為期限何患不集上謂大臣曰招軍一事士大夫往往以為不切事宜殊不知聖人思患預防若暗失軍額何以為先事之備但當措置約束毋令擾人足矣於是詔三司毋得遣人於外路招刺違者統制以下官皆抵罪是月壬申既而殿中侍御史葉義問亦奏其事且言不當強提輦官是月乙亥詔殿前司究治乃吐渾押官潘勝所招也權刑部侍郎陳正同等請決杖降資是月己酉義問言輦官最為親近比於足蹙路馬之芻萬萬不侔今刑部官吏以輕刑處之附下不恭孰大於此詔正同罰銅十斤二月癸巳行遣詔皇后從母張氏特封平樂郡夫人録其夫周師古為忠翊郎庚午龍圗閣學士四川安撫制置使兼知成都府李文會復端明殿學士集英殿修撰知平江府蔣璨升敷文閣待制時諸將掠人為兵補軍籍率用大舟往來漕河無人處道遇強壯少年束縳鉗梏之惡少利其資通為囊槖因閉柵中無脫者璨盡得其姓名窮治株究捕置諸法遂絶至是璨又言收簇到錢七萬餘緡乃有是命壬申詔以御前激賞庫錢七萬緡賜殿前司造平江府牧馬瓦屋諸軍舊有廄屋數千區茨以茅竹嵗一更葺而財與力皆出於民至是命本府以係省錢改造才及二千五百間而已守臣蔣璨請出內帑錢佐其費上諭大臣今據間架支錢付逐軍自蓋庶可即集如户部闕錢從內庫支既又以五萬二千緡益之屋成可支數世州人歡呼相率詣北禪寺作佛事以報上恩右司諫朱倬言近制命官捕鹽纍及萬斤改京官蓋全火者類非貧弱捕盜者既畏其威衆或得其賂故多縱而不言圗升斗者類皆沿海單弱之民其勢易制其貧無賄捕盜者利其纍及之數而必取之故百發而百敗獄訟滋彰犯法者衆誠可憐憫又既獲改秩二十年後皆得任子尤為僥幸望復祖法户部乞纍及萬斤者減磨勘年從之事祖見二十七年六月己未直龍圗閣知撫州凌景夏知襄陽府乙亥左承議郎知興化軍樊光逺為福建路提點刑獄公事己卯上詣景靈宫朝獻畢遂幸延祥觀玉津園壬午詔州縣折納二稅並依時價不得輒有增加時將作監主簿葉顒面對論閩中豆麥皆土産所有而州縣遞年折納之數比之時價不啻一倍故有是旨罷廣南十州嵗科黃河紅藤錢二千九百餘緡是日雷癸未右內率府副率愭為右監門衛大將軍榮州刺史詔池州都統司遣御前軍千人赴江西帥臣分布駐劄嵗一替用本路安撫使折彥質請也彥質去年十二月得祠此奏乃其所上太學博士周操守尚書吏部員外郎祕書省校書郎張孝祥守禮部員外郎詔户部員外郎莫濛同浙江江東淮南漕臣趙子潚鄧根孫藎檢視逐路沙田蘆場先是言者謂江淮間沙田蘆場為人冒占嵗失官課至多故命濛等按視既而殿中侍御史葉義問言近有獻沙田蘆場陛下遣使及委三路漕臣同視用為經久之利且免嵗糴馬料誠為利國便民但奉行之人不恤百姓名為打量多逼縣官逐急按圗約紐唯務增數以希進用且如三路遼繞不能一一著實於有力之家初無加損而貧民下户已受其苦若因小利如此擾之必致逃移坐失稅額因極論之不報子潚秦康惠王後洋孝靖公令奧子也左朝請郎知滁州徐度為江南東路提點刑獄公事殿中侍御史王圭言成都府路轉運判官王揚英貪冒茍得嘗薦秦熺為宰相謀國不忠左朝散郎新知眉州陳夔性資權譎乍賢乍佞方其求知趙鼎則飾詐以自髙及其諂附秦檜則詭道以求合至乃執其私幹同於厮役後為檜厭鄙遂決意逐之望賜罷斥以厭士論詔並罷甲申上諭大臣曰比既詔監司刺舉守令而監司賢否勤惰將使誰察之宜為立法乃詔監司貪惰不法臺諫自當彈奏其治狀顯著之人令臺諫侍從三人以上公共推薦三省考察取旨乙酉權尚書兵部侍郎兼侍講楊椿試給事中祕書省正字兼實録院檢討汪徹行校書郎國子正劉望之行祕書省正字左儒林郎馮方行國子正左迪功郎李石為太學録方言蜀中纍次裕民有減額有放欠昨蕭振等所奏惟及減額而已未及放欠也蓋蜀中州縣以前多有虛額積年那兌借實補虛以至今日遂成漏底乞自今年為首據實理贍軍錢物充當年分窠名起發事下户部不果行其後王之望始行之殿中侍御史葉義問言淮東提舉常平茶鹽公事朱冠卿貪賄凶戾詔放罷自今永不得與監司差遣右中散大夫新知嘉州王弗為成都府路轉運判官左朝請郎知夔州周執羔復祕閣修撰丙戍直祕閣主管台州崇道觀何大圭落職右正言朱倬言大圭凶暴狠傲専事挾持寄食李綱綱死而毆其弟其在削籍也張浚為之保敘浚失勢則以短卷譖之於秦檜由是躐直蓬山時目為秦府緝事故有是命司農寺丞朱夏卿總領淮東軍馬錢糧夏卿勝非子也太府寺丞鄭知剛提舉兩浙東路常平茶鹽公事既而知剛入辭上以其老病增劇諭大臣曰監司非養疴之地可改授一差遣遂以為江南東路安撫司參議官知剛改命在四月戊戌忠訓郎興州駐劄御前中軍第一正將吳挺為右武郎兩浙東路兵馬都監兼御前祗應挺璘愛子故召之初殿前司奏乞令平江府標撥收買民田為牧馬寨地既許之矣給事中賀允中言此田皆極上腴民間豈肯輒賣乞以係官荒間白地與之詔所占如非稻田令府司優償其直丁亥將作監主簿葉顒行司農寺丞戊子殿中侍御史葉義問言州縣每嵗出郊勸農置酒宴會其實擾人乞罷置酒之禮户部請自今止許守令出郊仍以仲春望日不得因而飲酒從之己丑詔建康府駐劄御前諸軍都統制王權給真俸左朝散大夫知楚州孟處義為淮南路轉運判官直祕閣湖北轉運判官羅孝芬言湖北州縣比嵗殘破亡失版籍乃有以丁增稅者每一丁受種七斗或丁多田少或有丁無田槩責其入甚為民患况姦猾之民以隱匿而獲輕免貧懦之家以無資而受實害乃有增賦至二十餘倍者人有亡歿稅無蠲除安有措置若是而民不流徙望許人自陳令監司核實改正從之庚寅上謂輔臣曰聞閩中民户輸納苖米每斛為錢八千有諸同知樞密院事陳誠之曰近嵗有之上曰閩中米斛幾何誠之曰三千上曰使此錢悉以助國猶恐有傷於民况資州縣妄費乎其令以實直取之詔給舍分書制敕並依自來條例左正言何溥言右朝請大夫龔鑒淫侈貪婪其罪略與曹泳相似望正典刑詔停官桂陽監居住秦檜之當國也鑒弟右通直郎釡鋈専為檜營産業殘虐擾人湯鵬舉與之連姻置不問至是殿中侍御史葉義問論之皆停官釜郴州鋈南安軍居住釡鋈二月甲辰行遣辛卯諸王宫大小學教授祝公逹知大宗正丞湯思退薦之也二月按是月壬辰朔癸巳給事中兼實録院修撰賀允中等請重修徽宗大觀以前實録以秦檜領史院等所修疏略故也從之寶文閣學士知建康府張燾升端明殿學士丙申同知樞密院事陳誠之為知樞密院事先是誠之因奏事上曰卿文人讀書乃知兵務如此之熟遂進用之詔端明殿學士折彥質特賜荆湖田十頃彥質世家陜西屢經竄謫上知其生事素薄故有是賜資政殿學士知宣州樓照提舉臨安府洞霄宫從所請也乙巳尚書工部侍郎兼侍講兼直學士院王綸同知樞密院事資政殿學士提舉臨安府洞霄宫魏良臣知宣州資政殿學士左中大夫知婺州張綱告老遷左太中大夫復致仕興化軍布衣鄭樵特補右迪功郎先是王綸在經筵與侍讀官同薦其學行上召對遂以命之其所著史書令有司給札繕寫投進丙午給事中楊椿中書舍人周麟之並兼權直學士院太常少卿孫道夫權尚書禮部侍郎道夫使北還奏金主詔關輔買馬等語上顧問甚悉翌日遂有是命後殿曲謝上諭曰卿自小官已為朕知第趙鼎與張浚相失後凡蜀士仕于朝者皆為鼎沮抑不然卿二十年前登從班矣去冬周方崇罷去禮侍闕而卿使未還朕特留以待卿有己見可數求對己酉權尚書吏部侍郎凌哲兼侍講壬子左朝奉郎提舉江州太平興國宫章厦知婺州中書省言右承議郎王著王曉皆王會兄弟慿恃權勢恣為不法昨從罷黜公議未平今乃輒敢造朝干求差遣詔並令吏部與逺小監當日下押出門癸丑少傅寧逺軍節度使領殿前都指揮使職事恭國公楊存中遷少師以積閥十年也左太中大夫提舉江州太平興國宫湯鵬舉罷宫觀右太中大夫徐宗説降授右中散大夫南康軍居住殿中侍御史葉義問言宗説乃秦檜管莊之上客鵬舉以其子廷直嘗用宗説薦狀特不再論時遣廷直往湖州見宗説探問事端又以赴部改官為名窺察時政故有是命廷直仍押出國門直祕閣計有功知眉州顯謨閣直學士提舉江州太平興國宫劉才邵卒三月辛酉朔日有食之隂雲不見宰相欲率百僚稱賀御筆日月薄蝕乃上穹垂戒而有司以隂雲不見欲集班拜表稱賀殊非朕寅畏天威之意令毋得稱賀翌日宰執共贊所降詔語上曰朕德薄不足以格天隂雲蔽日蓋偶然耳至於時雨雱霈此乃可喜也壬戌起居郎劉章權尚書工部侍郎起居舍人王剛中試起居郎左朝奉郎洪遵試起居舍人遵免父喪與弟邁皆召於是遂進用之甲子殿中侍御史王圭試太常少卿福州童子莊大成七嵗能誦經史書上諭輔臣曰朕即位以來童子以誦書推恩者多矣未聞有登科名顯者何也詔免解罷之丙寅左朝奉郎史才言家貧仰祿乞在外宫觀差遣詔才提舉江州太平興國宫既而殿中侍御史葉義問言才貪叨嗜利富冠一州今乃以欺君之請探伺從違以希復用命遂寢是日雷丁卯玉牒所上三祖下仙源積慶圗祕書少監曽幾等上神宗寶訓一百卷辛未殿中侍御史葉義問言堂吏因事被賞循轉官資要必立為限制使之積勞而後序升則爵賞不濫曩者權臣當軸専徇私恩超遷躐進有失祖宗立法之意臣竊見宰相提領修書而堂吏號供檢者以十數修書局凡四曰日歷曰玊牒曰實録曰勑令所謂供檢者或一身而兼數局今所進二書是一身而轉二官將來進書又復遷官嵗嵗如此何有限極夫修書定令國家榮典是特儒臣編摩之力為供檢者足未嘗一到局手未嘗筆一字而每月過局錢與非次犒勞已極優厚且又循轉重併何其濫耶蓋被賞既濫則官資必崇官資既崇則奏補必廣又况茶鹽場務每嵗增羡皆被賞恩公論籍籍以謂名器輕與莫甚於此知而不言臣則有罪欲望特降睿旨下三省參酌祖宗成法抑其太濫立為定制端自近始則僥幸之門息矣詔三省樞密院人因進書並減半推賞仍不得兼兩局如轉至朝請大夫即依限員法不得轉行寄資丙子宰執進呈殿中侍御史葉義問言宰執侍從薦引人才須先赴都堂審察乃令上殿上曰天下人才若非宰執侍從薦引朕亦何緣盡識俟召到並令引對不須審察但臨時除授足矣近來士大夫以內任為榮以朕觀之正當以民事為重或監司郡守有闕可擇行在官更迭補外其外官有奉法循理實惠及民者亦須召擢庶幾內重外輕之弊可以漸革乃詔今後侍從以上薦引人才並須文行相副治績昭著務得實才以副詳延之意丁丑太尉定江軍節度使鄂州駐劄御前諸軍都統制兼提領營田田師中開府儀同三司以三省言師中除太尉已及八年及有捕徭賊功當遷也上疑其未當因曰統兵官遷轉非其他比設有未當則人不服朕每於此等恩數茍非所當得雖減一年磨勘亦必不與卿等更熟議之戊寅詔曰設官分職民事為先古者二千石位次九卿公卿闕則選所表而用之祖宗以來郡守闕多選諸臺省至分遣朝行以治劇邑非曽歷親民不得為清望官重民事也朕式稽古訓為官擇人均治內外可今後侍從有闕通選帥臣及第二任提刑資序曽任郎官以上者卿監郎官闕選監司郡守之有政績者並須治狀昭著及有譽望之人卿監郎官未歷監司郡守者令更迭補外在內官除詞臣臺諫係朕親擢餘並須在職二年方許遷除庶內外適均無輕重之偏職業修舉有久任之效以副朕重民事之意三省同共遵守己卯左銀青光祿大夫守尚書左僕射同中書門下平章事兼監修國史提領編修玊牒所沈該以進書恩遷特進該辭不拜左宣教郎洪邁為祕書省校書郎欽州編管人康與之坐與土人交爭移雷州編管壬午尚書右僕射湯思退辭免充進書禮儀使遷官許之自是以為例左朝請郎范彥輝知安豐軍癸未浙東提舉常平茶鹽公事邵大受浙西提舉常平茶鹽公事謝伋請復諸州支鹽倉從之近嵗皆就場支鹽至是始復舊制浙西得旨在丁亥今聨書之甲申內藏庫言湖婺州所起綾羅率紕薄不堪三省擬欲退換上曰此皆民所輸納若郤回其物未必及民必致重擾朕不欲如此第令薄懲兩州受納官可矣熊克小歷載此事在正月庚午今從日歷左文林郎陳孺為祕書省正字殿中侍御史葉義問言孺本曹泳所薦乃罷之孫罷正字在四月丙午乙酉詔自今諸州知通拘收無額上供錢並俟任滿日方許陳乞推賞先是常州起無額錢萬餘緡而有未起折帛錢九萬五千餘緡江婺州亦如其數權户部侍郎徐林論其移易官錢以希賞故條約之丙戌左武大夫和州防禦使兩浙東路馬步軍副總管劉綱知鼎州丁亥司農卿湯允恭總領四川財賦還入對言全蜀之地初置宣撫則許便宜行事就立總領則有措畫指揮二者出於軍興多與條法不相照應望令逐司條具下勑局看詳頒降從之然不果行左朝散郎林安宅為廣南東路轉運判官左朝請大夫張泰定知藤州還言廣西諸州每遇農隙點集土丁教習武藝誠得三代寓兵於農之意但民散居山谷去州城逺者數百里又且教習一月道塗勞費望只就本縣委令丞按閲詔帥司看詳申樞密院戊子左朝奉郎提舉江州太平興國宫宋朴左朝請大夫提舉江州太平興國宫沈虛中並罷宫觀朴令於徽州虛中筠州居住時二人皆奉祠里居殿中侍御史葉義問併奏二人阿附秦檜之罪且言朴肆為怪誕布衣芒屨與擔夫同羣俚唱街談有識駭異虛中不量過惡僥求宫祠復希進用望竄之逺方乃有是命虛中今年二月壬午得祠故追復敷文閣直學士洪皓再復徽猷閣直學士以其子起居舍人遵言復職未盡也尋賜諡曰忠宣五月庚申賜諡潼川府路提點刑獄公事王之望言前備員轉運判官奉詔看詳措置經界利害乞將本路不均甚處選見任官五員農隙月分分詣諸縣逐鄉受接人户詞狀其所訴元初打量步畝定驗土色不當增減稅數至五七分以上者會集衆户如推排法互相指決以衆證為定不伏者再為界量若是未經界買賣田業不曽推收及隱寄詭名之家自當歸併而非經界不均致輕重者更不受理逐縣經界所立稅有溢於舊額者以額外之數與增重人戶通融均減伏蒙取旨依申如有人户論訴去處照應前後指揮施行自紹興二十七年後選差清強官分詣經界不均縣分裁正其詞訟不多去處只就本縣委官緣本司所立狀式關防周密杜絶弊幸無所容姦以致詞訟不煩據所委官申皆只就縣受狀不曽下鄉亦不曽追集百姓多是以逐處溢額稅數與偏重人户對減民間亦少相指決雖間有被決增稅之家亦情願承受别無爭執以此田畝並不曽復行界量未結絶間之望蒙恩就除提點刑獄公事遂申尚書省乞就憲司結絶於今年三月以前並已了畢溢額稅色紐計錢四千八百五十餘貫莊租麥四石有竒對減稅重人户五千六百八十五户用人户科決狀推排減偏重稅八十九户增偏輕稅一百六十六户已出榜曉示百姓認定供輸其普州安嶽縣不均最甚初行經界日縣令張寧大為姦弊走移稅額比及三年虧官二十五萬七千餘貫依聖旨除放自紹興二十四年至今又虧一十二萬四千餘貫紹興二十三年縣官以闕乏之故分詣諸鄉巡門驅斂村民不堪其擾結集山谷間抗敵官吏幾致生事遂令將新舊稅簿互相參校於所增減取其酌中分數通融裁正凡新稅之增於舊稅者以所增十分為率減其七分新稅之減於舊稅者以所減十分為率復其六分其增減不及二分者仍以舊稅為正郤收漏户二千七百餘戶補足舊稅外於租額尚有贏餘又張寧經界之初既失稅額恐嵗入不敷則擅增折變以補之今一切蠲除悉依古例伏望特賜詳酌仍廣行采訪如别無違戾乞行下州縣遵守施行若今後官吏士民尚敢扇搖欲復行舊稅以疑誤百姓者乞從所屬具事因申奏重置於法庶幾逺民得以安業從之夏四月乙未權尚書刑部侍郎陳正同為敷文閣待制樞密都承旨大理少卿楊揆權刑部侍郎右朝奉郎直顯謨閣韓彥質行光祿寺丞丙申詔文臣中大夫至朝奉郎武臣武功大夫至武翼大夫正侍至武翼郎見無身自蔭補人者同陳乞致仕亡殁在出勑前而不曽犯入己贓及私罪徒者許蔭補即亡殁在致仕後或已致仕而未亡殁之人但不犯入己贓即許蔭補用權吏部尚書王師心請也舊法惟贓罪不許任子紹興新法併及私罪徒師心以為拘礙者多故有此請自是犯私罪徒之人皆得以遺恩任子矣司農卿湯允恭權尚書兵部侍郎勑令所刪定官杜莘老為太常寺主簿甲辰福建轉運判官趙不溢奏南劒州禁軍作閙上曰治軍與治民不同又事有雖大而可濶略雖小而不可貸者顧其情如此耳此豈可姑息自今有犯但當行法更須精擇守臣使任其責乙巳殿中侍御史葉義問言端明殿學士知湖州汪勃貪縱不治所愛吏盜庫中錢帛以萬計勃悉使他人代償之詔勃提舉江州太平興國宫既而提刑司究治吏盜庫金有實又得勃在州買婢不償直及到官以來市銀至三百七十餘鋌義問力論其貪鄙遂奪職六月庚寅落職權工部侍郎劉章言賀金國正旦生辰使下三節人從每先推賞多懷慢易望依使副例俟回日推恩從之左朝奉郎潼川府路提點刑獄公事王之望直祕閣為成都府路轉運副使降授左朝散郎邵博卒于犍為縣戊申領殿前都指揮使職事楊存中言四川茶馬司買馬官所買馬率多駑下乞令本司所差取馬統領官往宕昌寨監視買馬詔止就興元府取押日歷無此今以七月二十八日戶工部勘當狀修入左朝請郎新通判吉州鄧柞為廣南西路轉運判官柞召對乃有是命左奉議郎洪適知荆門軍適至官首奏便民四事大抵以均敷茶額錢所出甚於常賦茶商執害民之柄而託吏為姦民力重困官田以附種為名而不稼納租麴引失立法之意而重疊出鏹大禮代他州之貢而多方取辦乞罷行之又荆門自兵火後學校廢弛遇大比則附試江陵解額五才得一適力請於朝由是軍得自解發額亦稍增其舊左朝請大夫主管台州崇道觀魏安行知閬州未上改吉州七月庚申改命辛亥左朝請郎通判荆南府都民望為監察御史左宣教郎主管台州崇道觀劉珙知大宗正丞民望以德化人與珙皆召對乃有是命甲寅左宣教郎劉儀鳯為諸王宫大小學教授用趙逵薦也詔吉陽軍編管人曹泳令本軍常切拘管譏察不得令出城及賔客書問往來仍月具存在申尚書省乙卯左正言何溥奏直祕閣知秀州韓膺胄郡事不理乞罷之詔膺胄名臣之後宜稍優異可與在外宫觀理作自陳丙辰詔諸路盛暑慮囚並依政和指揮四月下旬檢舉以三省言川廣道逺每俟行下已過六月故也雷州編管人康與之移送新州牢城五月庚申朔三省請以堂除諸司屬官闕三十五處送部對換通判教官闕歸堂從之時侍從監司所薦京官例升通判有出身人除教授故三省重其選而有是請也癸亥權兵部侍郎湯允恭言蜀帥任重每遇替移簽廳攝事而官屬或係選人州縣觀望亦多滅裂乞自今制置闕令提舉茶馬官權又闕以總領財賦官權從之初成都府錢引務三嵗一兊界而新舊之際有損失不至者號為水火不到錢率數十萬緡總領所轉運司屢爭之權禮部侍郎孫道夫因請以為稱提本錢詔茶馬司點檢既而總領所言此錢係科撥入帳應副贍軍之數若樁充本錢慮於大軍嵗計有虧詔仍舊後旨在明年正月己巳今併書之後苑子景仙越墻入禁中為盜事覺領殿前指揮使職事楊存中以宿衛不嚴乞貶斥詔放罷嚴州遂安民江大明等作亂犯衢州官軍獲之是日以聞上曰既已獲賊賞宜速行若稍緩即失信於人無以示勸既又奏賞事上曰土豪賞太輕宜加一等朕於賞典必務從厚不然無以勸功又不可濫若厚賞而復濫尤非勸功之道也甲子詔將作軍器監胥長自入役通及三十年出職補將仕郎乙丑尚書駕部郎中張宗元試將作監監察御史馮舜韶為尚書駕部員外郎丙寅言者請罷州縣酒官止賣萬户酒上曰此事難行若可改作豈至今日丁卯左從事郎南安軍軍學教授林栗行太學正為近臣所薦上召對而命之栗福清人初見紹興十三年六月戊辰户部員外郎莫濛檢踏措置浙西江東淮南沙田蘆場還入對正月癸未所書葉義問論沙田事或可移附此更須詳之庚午權户部侍郎徐林奏版曹調度闕乏上謂大臣曰祖宗以來所用亦廣未聞不足今朝廷無他浮費於經費中又務從約而有司每告乏何也孔子曰百姓足君孰與不足藏之於民猶外府也為今之計但更當裁節不可取之於民沈該曰近來調度雖非有餘然未至太乏蓋有司私憂過計耳遂詔內外臣僚請給不得陳乞免行借減雖已奉旨聼户部執奏不行時武臣援例給真俸者衆故條約之詔軍器所江浙福建諸州所發民匠皆遣還仍令諸州以嵗額上供軍器輸內軍器庫自來年始日歷無此指揮今以七月五日工部申明狀修入辛未改光州為蔣州光化軍為通化軍光山縣為期思縣金太子光瑛年十二善騎射嘗射獐獲之金主亮以薦太廟日歷改州軍名不載其故以紹興三十一年十一月汪公奏劄考之乃是避敵人之名耳甲戌宗正少卿楊偰乞將取應宗子比府監進士理年免舉上曰此自有成法遵守可也祖宗以來若可行不至今日矣禮部請升朝官已上經恩合陳乞服色雖犯私罪徒而用官或蔭減及會赦降理為私罪杖笞之人情理稍重者並與放行服色從之丁丑起居舍人洪遵乞以經筵官除罷及封章進對燕會錫豫講讀問答等事悉行編録以邇英記注為名從之自是年秋講始乾道二年十一月壬子又有祥曦殿記注罷淮東沙田蘆場覆實指揮令依舊右武大夫成州團練使武糾卒戊寅金國賀生辰使驃騎上將軍殿前司副都點檢蕭恭副使中大夫尚書工部侍郎魏子平見于紫宸殿時泉州觀察使知閣門事石清為館伴副使飲醉慢易乃詔特與外任日下出門子平宏州奉聖人中進士第纍遷太府監魏子平事以金國翰林直學士趙可所撰墓志修入志云正隆元年授太府監三年三月充國信副使使于宋四年權右司郎中今日歷所書乃云工部侍郎則是北人亦借官也趙甡之遺史云石清在館因酒與使客人從有語特與外任日下出門壬午大燕集英殿雨作改燕垂拱殿甲申帶御器械張彥攸充送伴副使時右武大夫榮州刺史張説迓使客還被旨送伴辭不行乃改命彥攸丙戌北使蕭恭魏子平入辭置酒紫宸殿以雨故復就垂拱殿時金主亮決意南攻子平還入謁首問以南方事且曰汝謂蘇州與大名孰優子平曰不可比亮曰何謂也子平曰宫室車馬衣服飲食人之所美也江湖地卑濕舟船以為居魚蝦以為餉夏服蕉葛猶不堪其熱以此言之殆不侔矣亮不納此亦據趙可所撰子平墓志修入書之以見金人南牧之意久定非率然也直徽猷閣主管台州崇道觀陳璹卒是月金主亮坐薰風殿召吏部尚書李通翰林學士承旨翟永固左宣徽使敬嗣暉翰林直學士韓汝嘉四人謀欲再修汴京而徙居之為南侵之釁通嗣暉皆言此正合天時亮喜永固汝嘉曰燕京甫成帑藏已乏民力未蘇豈可再營汴邑江南通好嵗幣無門遽興征伐亦恐師出無名亮怒曰非汝所知揮之使去於是皇懼以為不免既而召翰林應奉文字綦戩講漢書亮怒稍解翌日擢通尚書右丞嗣暉參知政事永固因請老亮許之戩膠東人少被掠亮特賜及第此以宋翌金亮本未張棣正隆事迹參修但翌繫之八月耳綦戩事迹以范成大攬轡録修入六月己丑朔權吏部尚書王師心言被旨同六部長二將差役舊法并臣僚前後申請指揮看詳來上今看詳到合用見行條法并續降指揮三十八件乞鏤板頒降外餘湯鵬舉二十六年六月辛未樓照二十六年十二月丙午黃楷二十七年十二月丙申建請及舊降析户後惟許户頭歇役指揮二十七年二月乙酉四件與法意相妨並勿行如鄉村地狹上户稀少不及十大保處即以比近地里併為一都選差或有不均令常平司按劾從之先是大理少卿金安節言差役之法行之已久前後刪修申明亦既審備惟近嵗臣僚有請將歇役六年者便與未曽充役之家比並物力再差雖意在恤下使之適平而講求未盡尚有可議蓋民間物力其相逺者或不啻千萬而相邇者或止於一二議者乃獨取其相去百倍者而言之是舉其相逺而遺其相邇者也焉得為通論乎臣今取其相近者言之且如十家物力甲户萬緡自乙而降以百緡為率差而下之至第十家猶為九千餘緡也若歇役六年便與未差之家比並物力再差則是役常周環於八户以上而九千餘緡者永不及也其不均孰甚焉今之當授者以都保正副為重詳其本法係通選保內物力最高者充若依法選差自不及下户如都保內可選者尚多理當差盡而止豈可置而不差便將歇役六年比並物力使之再充乎夫物情不齊事理非一臣愚不敢任一己之見持一概之説而議之欲望聖慈申命有司博詢詳議以求至當使行而宜之衆志咸愜仰副陛下天覆海宇一視同仁之意遂命師心等看詳至是行下左從事郎楚州州學教授劉度為太學博士辛卯權尚書戶部侍郎榮薿與權兵部侍郎湯允恭兩易薿仍兼提領諸路鑄錢詔殿前馬步軍司江上諸軍自今每三年一次選軍兵年四十以下少壯有武藝人申樞密院取旨升㨂初命嵗一揀至是革之右武大夫成州團練使帶御器械劉允升落階官知閣門事榮州團練使階成西和鳯州兵馬都鈐轄御前中軍統制知成州吳拱加龍神衛四廂都指揮使右武郎兩浙西路兵馬都監御前祗候吳挺帶御器械壬辰入內修武郎蔣堯輔除名不刺面配新州牢城堯輔為永佑陵都監以不法屬吏當死上因謂輔臣曰朕待內侍加嚴故比前犯法者少以此知人主之於臣下以嚴御之者乃所以愛而全之也直龍圗閣錢端禮知撫州癸巳禮部言自今諸州保明到童子乞試者欲依祖宗典故並送國子監試驗訖如合格者送中書宰執聚廳舍人挑試又合格者取旨推恩從之近嵗童子請試者但試於郡司而已上既以為言於是立法名眉州青神縣中巖山龍潭慈姥神祠曰慈濟是日流星晝隕丙申詔以盛暑遣翰林醫官四員遍詣臨安府城內外診視居民合用藥於和劑局應副俟秋涼日罷言者奏荆湖沿邉知縣間有差武臣去處每民間詞訴率令人吏代判一縣之政假手刻木欲乞並差文臣吏部言逐處接近蠻徭若行改置文臣慮恐無人彈壓兼邉逺民事絶少欲自今更注保義郎已上經任識字人川廣定辟差依此從之是日嘉陵江水溢入興州城壞棧道利州大安軍皆被水己亥尚書吏部員外郎李紘改户部員外郎總領湖廣江西財賦湖北京西軍馬錢糧時紘兼權檢正不樂補外殿中侍御史葉義問劾其交結堂吏後七日遂罷之辛丑詔户部科降兩浙轉運司收糴馬料錢令以的實窠名支破時行在及鎮江府嵗用大軍馬料八十餘萬行在六十五萬鎮江府十六萬二千其四十三萬石以營田夏稅兌糴及轉運司管認餘三十八萬石本司置場收買而户部降本錢四十四萬緡豫之轉運副使李邦獻等言所降本錢內有未可指擬錢十二萬緡故有是旨昭慶軍承宣使池州駐劄御前諸軍都統制嶽超丁母憂詔起復甲辰樞密院都承旨陳正同言諸路奏讞死囚例多降配非是上曰刑罰非務刻深欲當其罪若専事姑息廢法用例則人不知畏非所以禁暴戢姦卿等可諭刑部官常令遵守成憲宋史全文史臣曰言刑以不殺為仁言法以撫摩茍安為得策世言俗士信哉南劒言兵變上曰此但可行法福州請寬海盜死上曰此姑息耳不惟是也以招安為非弭盜之法以姑息為非御軍之法淵乎哉聖人之慮也丁未淮南路轉運判官孫藎罷坐奉行措置沙田滅裂也壬子皇叔保寧軍承宣使知西外宗正事士街為崇慶軍節度使癸丑武功大夫福建都巡檢張佐特遷右武大夫先是海冦劉臣興作亂帥臣沈調遣佐率諸將捕獲之戮其魁三人故有是命餘進秩有差龍圗閣學士羅汝楫以憂去未免喪而卒特贈右通議大夫初有詔用刑殘酷責降之人並毋得堂除止令吏部與逺小監當差遣元旨十二年正月壬子行下行之十餘嵗議者以為無一定之格事下刑部刑部請今後命官挾私將無罪人收禁非理致死若自以杖捶人及違法決罰罪人或獄具非理施行各致殘疾已上並謂自犯曽經有司勘斷之人皆為殘酷從之於是得免者衆矣甲寅詔浙西江東沙田蘆場官尸十頃民户二十頃以上並增納租課其餘依舊仍置提領官田所掌之不𨽻户部乙卯祕閣修撰知福州沈調升敷文閣待制直祕閣知廣州蘇簡升直徽猷閣以措置海冦靖盡也建炎以來繫年要録卷一百七十九
