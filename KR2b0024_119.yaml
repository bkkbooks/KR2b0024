body:
  text: 建炎以來繫年要録卷一百十九宋李心傳撰紹興八年夏四月丙辰朔輔臣奏以尚書比部貟外郎周聿刑部貟外郎周三畏並為大理少卿上曰須仁恕老成者為之宣政間作此官者皆觀望以成獄事深可戒也龍圖閣待制鄧襄追奪職名先是有詔襄弟直龍圖閣齊直徽猷閣髙並奪職而御史中丞常同論襄以父洵仁秉政而叨侍從如鄭修年等之比詔落職同又言如此則是襄本當得職名因臣僚論列降黜將來却有可復之理乃改為追奪焉己未太常少卿蘇符言徽宗皇帝顯肅皇后至今未聞諱日乞權於聞哀日依祖宗忌辰禮例建置道場行香從之右從政郎張祁特改右宣教郎上以其兄邵久使未歸故引對而有是命尋以祁主管官告院庚申輔臣進呈言者請選文武臣子弟有材武者充衛郎上曰掄材正當如此朕親加教督彼必樂為之也可速條具先是蔡京為政嘗置三衛郎皆用世族之子弟後劉豫亦倣為之故言者以為請後不果行焉直祕閣新廣南東路轉運判官劉子翼罷御史中丞常同論子翼兄弟姦險昨守撫州竭倉庫所儲獻之督府而軍糧不繼幾至生變故罷章再上詔奪職是日初置户部和糴場於臨安其後又增於平江嵗糴米六十萬石十八年閏八月甲子詔平江一場臨安二場共糴此數辛酉右宣教郎湖北京西宣撫使司𠫭議官李若虛為軍器監丞壬戌命樞密副使王庶暫往沿江及淮南等處措置邊防詔曰朕臨遣樞臣協濟軍務按行營壘周視山川乘斯閒暇之時經畫久長之利凡爾監司群帥郡縣之官各盡乃心以康庶事儻或弛慢失職已令王庶密具以聞先是御史中丞常同言今去淮益逺邊民多不自安宜遣重臣出按兩淮田荒縱民耕之勿收租稅數年之後百姓足而國用足矣至是上命庶行視東關且調諸路兵預為防秋計因以同奏付庶行之時保成軍節度使殿前都虞候楊沂中怒其統制官吳錫收繫之獄户部侍郎向子諲力言於庶謂錫可用庶奏釋之使統兵屯淮西丙寅庶辭上戒以張俊待諸將多用術數且狎昵自取輕侮吕祉以傲肆自大取敗皆可為戒上因論王伯之道不可兼行當以三王為法今之諸將不能恢復疆宇他日朕須親行不殺一人庶幾天下可定庶奏以大理少卿周聿尚書金部貟外郎朝謙之並主管機宜文字軍器監丞李若虛樞密院計議官方滋左承奉郎通判臨安府朱敦儒並為樞密行府咨議𠫭軍謙之任城人也自酈瓊叛張俊擅棄盱眙而歸諸將稍肆庶素有威嚴臨發勞師於都教場軍容嚴整庶便服坐壇上自楊沂中而下悉以戎服步由轅門庭趨受命拜賜而出莫敢仰視自多事以來所未有庶辟官屬奏下在是月戊辰改幹辦公事為咨議在丙子今併書之熊克小歷稱三衙大將而下雖身任使相悉以戎服庭趨按此時行在統兵官無為使相者克小誤也丁卯協忠大夫華州觀察使權主管侍衛步軍司兼馬軍司公事解潜落階官為宣州觀察使龍神衛四廂都指揮使權主管馬軍司公事户部侍郎李彌遜權刑部侍郎曽開給事中吳表臣張致逺中書舍人勾濤吕本中奏建州進士劉勉之學有淵源行可師法閩中士人無不推仰伏望特賜録用詔召赴行在勉之建陽人少得易象之學於譙定又嘗從劉安世游故本中率同寮論薦焉己巳尚書刑部侍郎曽開試禮部侍郎左迪功郎楊光嶷上書論三國形勝攻守詔循一資庚午徽州布衣王悱獻孝經解義詔賜帛三十匹辛未少保鎮南軍節度使醴泉觀使成國公吕頥浩固辭兩鎮及遷官之命且言本朝自有國以來文臣未嘗除授兩鎮在昔兩朝定䇿如韓琦四朝大老如文彥博皆不敢受况臣何者乃越彛章望改授一階官詔許免定江軍節度使既而頥浩又辭少傅許之頥浩許免少傅在七月癸巳壬申祕書少監兼崇政殿說書尹焞留身求去時已詔焞免兼史事四月甲子上曰待與卿在京宫觀焞力辭且云士人若不理會進退安用所學翌日上以諭輔臣參知政事劉大中曰焞所學淵源足為後進矜式班列中若得老成人為之領袖亦是朝廷氣象乃以焞直徽猷閣主管萬夀觀留侍經筵癸酉徽猷閣待制新知承州胡寅試尚書禮部侍郎兼侍講尋又兼直學士院徽猷閣待制知明州仇悆充徽猷閣直學士知潭州丁丑户部侍郎李彌遜言祖宗之法有便於國利於民可行於今者發運一司是也其制始於太宗淳化間而備於仁宗皇祐之後大槩不過權六路豐凶以行平糶之法然今日之冝比昔少異不必盡循舊制當師其意損益而行之臣愚謂當於經費之外給糴本數百萬緡復置一司廣行儲積分毫不得取供近用三年之間當有一年之蓄臣謹條具發運司建置廢罷及今日可以依倣置使之因伏望特加聖覽參酌利病斷以不疑而力行之不勝幸甚詔吏户部條具申省戊寅詔尹焞解論語書成特賜六品服己卯詔上殿人曹匯與改合人官匪未見庚辰翰林學士兼侍讀朱震乞在外宫觀趙鼎之免相也自劉大中范冲林季仲吕大中已下皆相繼補外震獨居近侍如故至是震乞祠之章以謂夙夜自竭圖報上恩不敢雷同上辜任使知臣者以臣為守義不知臣者以臣為守株自非陛下斷而行之則如愚臣黜已久矣今則大明垂照公論漸伸既俊乂相率而在官則支離豈煩於攘臂不許朱勝非秀水閒居録稱震聞劉大中參政即病纍章求去詆誚鼎與大中當是指此詳見今年六月戊寅注辛巳太常少卿蘇符言今嵗當行祫享而在諒暗內乞用熙寧故事移就來年孟冬從之壬午命翰林學士朱震知貢舉是嵗增參詳官二貟翌日禮部言參詳官左司貟外郎程克俊㸃檢試卷官左宣教郎黃豐嘗考太學秋試乃命官代之祕書省著作佐郎朱松守尚書度支貟外郎校書郎徐度為都官貟外郎前數日上召二人入對而有是命癸未詔三衙管軍依舊通輪內宿惟殿前都虞候楊沂中許選統制官一貟代之諸班直宿衛親兵並聼節制是月徽猷閣直學士王倫見金左副元帥魯王昌於祁州時韓世忠嶽飛吳玠軍各遣間招誘中原民金得其蠟彈旗榜出以語倫曰議和之使既來而暗遣姦諜如此君相紿且不測進兵耳倫言所議靖民乃主上之意邊臣見久而無成或乘時希尺寸為已勞則不可保主上决不之知若上國孚其誠意確許之平則朝廷一言戒之誰敢爾者諸帥相視無語熊克小歷附此事於今年春末又云逹蘭烏珠皆在祁州按張匪莭要紹興八年夏逹蘭自東京北歸祁州留烏珠大托平嘉守東京克所云差不同今移附四月仍去烏珠字更當求它書參考五月按是月乙酉朔丙戌祕書郎錢秉之錢觀復並為尚書户部貟外郎樞密院編修官鄭剛中為考功貟外郎將作監丞吕弸中為駕部貟外郎弸中好問子觀復平江人趙鼎所薦也後旬日以弸中提舉福建茶事弸中補外在是月戊戌秉之霸州防禦使晦曽孫紹興四年十一月特㫖改官左朝請郎何鑄行祕書郎秦檜薦之也翌日上問鑄何如人檜曰曽除諸王宫教授上因曰朕為親王時見翊善等到宫學只講書一授茶湯而退不欵留一日令具酒食以待張勸賈安宅與之從容論文次日主管內侍見白云鄆王諸宫無此例恐不便自後更不復講此禮宫中雖欲與儒士講習不可得深以為恨詔曹覲趙師旦耿傳忠節昭著可尋訪其家録用存恤按覲師旦之後久已不見此似為耿自求也戊子監察御史張戒入對因言諸將權太重上曰若言跋扈則無迹兵雖多然聚則強分則弱雖欲分未可也戒曰去嵗罷劉光世致淮西之變今雖有善為計者陛下必不信然要須有術上曰朕今有術惟撫循偏禆耳戒曰陛下得之矣得偏禆心則大將之勢分上曰一二年間自可了戒曰陛下既留意臣言贅矣戒又曰國家機事小臣不敢知然備貟御史義當憂國王倫使事如何上曰去嵗上皇訃至朕若不遣使天下謂朕何因令倫與金四太子言河南之地大國既不有與其付劉豫曷若見歸既而金人廢豫遣人齎四太子書來言當歸河南及梓宫淵聖太后四太子者乃朕使金時素所識也戒曰中原萬里之地金竭兵力十年取之一日無故復還此非堯舜不能載籍亦無此事陛下為金棄中原何意上曰不能守戒曰金據中原久矣山東陕西皆傳檄聼命以臣觀之金蓋能守上曰和議成否姑置勿論當嚴設備爾戒曰去嵗淮西之變失精甲四萬張浚用吕祉誤國至此但祉欲得簽樞耳然亦緣將相不和頃者國威稍振外却金人內平湖冦乃趙鼎張浚協和之時上曰時鼎與浚協和如兄弟戒曰去嵗若非浚逐則鼎未去必不令浚遽罷劉光世而用祉也光世雖號為怯然纍世將家豈祉書生可比上曰浚但惡光世湛於酒色戒曰此亦將之常也己丑禮部侍郎曽開兼權直學士院時禮部侍郎兼侍講直學士院胡寅以父憂免故命開代之左宣教郎王居修為太常丞庚寅詔衢州布衣柴宗愈與免文解一次宗愈獻中興聖統大略謂夏少康漢光武可為標凖周宣王漢宣帝晉元帝唐元宗憲宗可為鑑戒後省奏其言有補故録之辛卯降充徽猷閣待制提舉江州太平觀黃叔敖卒詔追復徽猷閣學士直顯謨閣新知䕫州馮康國丁母憂癸巳詔起復仍趨往吳玠軍前撫諭乙未祕閣修撰知建州魏矼權尚書吏部侍郎祕書省正字范如圭兼史館校勘御史中丞常同奏寶文閣學士知潭州劉洪道踈狂誕妄徽猷閣待制知靜江府胡舜陟凶暴傾險並罷之洪道仍奪職丙申詔韓愈昌黎集中有佐佑六經不抵牾於聖人之道者許依白虎通說文例出題以取士用翰林學士知貢舉朱震等請也震尋以疾出院遂卧家不起丁酉端眀殿學士江南西路安撫大使兼知洪州李光升本路安撫制置大使御史中丞常同言徽猷閣待制劉子羽狷浮刻薄傾險殘賊自其父時奴事童貫及張浚用事以狂誕不根之說感動之遂居上幕専權妄作排斥異已生殺廢置在其一言但知有浚不知有陛下浚在川陜下視朝廷而子羽號為腹心專主富平之戰使浚一舉而喪師三十萬失地六十州罪一也斬趙哲之後既赦諸將自慕容洧以下方列告於庭而子羽曰爾等頭亦未牢洧遂首以環慶兵叛金人乘之因以大潰其後諸將揭榜僞境自以不負朝廷專數浚與子羽之罪罪二也浚以聖㫖便冝一切稱制改𠡠肆赦無復人臣之禮子羽身在幕府實為謀主罪三也浚憤陛下差王似為副而自差子羽與程唐為判官子羽被受不疑遂行宣判事罪四也教浚於梁洋敗亡之際兵將普轉十官資使之邀留於朝罪五也興元川陜之咽吭王庶為守積穀至百餘萬石教義勇六萬人正兵萬餘人城壁一新子羽嫉其功譛庶於浚而已代之至郡未幾聞敵騎有侵蜀之意即盡散積聚縱火城中遂為邱墟罪六也朝廷知子羽之罪召赴行在次年乃始出蜀聞浚過江南又至信州迓之已而徑歸不復造朝罪七也力勸浚以報怨復讎大興軍事加賦橫斂欲以川陜已行之事施於江淮罪八也既以次對守泉所至謗罵朝廷詆毁言路罪九也泉州之政貪殘凶橫無所忌憚聞浚既敗憤躁不已遂肆毒於平人公私騷然罪十也伏望盡奪官職投畀四裔以禦魑魅詔子羽落職直祕閣専一總領明州海戰人船張自牧罷初以許翰薦補官亟用為京東制置副使自牧至揚州逗遛不進會敵騎渡江而罷至是奉祠家居復陳守海道之䇿故以命之右正言李誼言自牧論兵蓋靖康郭京之徒今付以舟師恐倉卒有警為國生事乞依建炎三年已得㫖追還自牧見帶官資職名詔自牧依舊主管台州崇道觀戊戌知廬州劉錡奏使臣張括等三人自言在西京關師古手下師古遣來申奏朝廷乞赦其罪自效來歸上曰昨背叛從僞之人若能束身自歸無功者朕以不死待之若能立功自效即隨髙下推賞趙鼎秦檜退而歎曰大哉王言此漢光武之略也詔內侍羅亶竄海島永不放還亶為景靈宫幹辦官有營卒章青告其語言指斥溫州以聞乞送御史臺治罪上命本州鞫實刑寺擬私罪徒勒停上曰亶素凶悖不逞無可恕者當竄海島仍令發卒護送之溫州以去年十二月己酉申到庚子直徽猷閣淮南東路轉運副使蔣璨升直寶文閣知揚州詔州縣鄉村五等坊郭七等以下貧乏之家生男女而不能養贍者每人支免役寬剩錢四千守令滿替並以生齒增减為殿最之首劉大中之為禮部尚書也嘗有是請事下户部措置去年十二月庚申而久不之報至是大中執政乃檢會取㫖行之十五年五月改給米辛丑徽猷閣待制提舉江州太平觀胡安國上遺表詔賜銀帛二百匹兩時已除安國雜學士致仕然未受命也已而翰林學士朱震奏安國正義直指風節凛然時晚歸衡山講道自樂遭遇聖明學遂顯行蓋其功不在先儒之下去年有㫖召其子寅於永州寅過衡山安國已病徘徊不進欲留侍疾安國勉令如期而發手作書遺臣曰寅巳促令上道矣其書俱在安國義不忘君有如此者夫昔人有一節可稱猶褒之以諡列諸史傳况安國孝於親忠於君好學不倦安貧守道身死而言立可不飾其終乎伏望下太常禮官特賜以諡用為儒林守道之勸乃諡文定後數月詔曰安國所進春秋解義著百王之大法朕朝夕省覽以考治道方欲擢用遽聞淪亡可撥賜銀帛三百匹兩令湖南監司應副葬事賜田十頃以給其孤朱震乞賜諡劄子今年七月丁酉行下今併附于此賜田指揮在八月十二日乙丑而日歷不載故備記之以補史闕朱勝非秀水閒居録云胡寅者凶慝躁進之士也趙鼎薦之詞掖朝士皆畏之以行詞乖繆衆論不容乃稱父安國老病逺在湖湘乞歸省於是差知永州寅携妾居婺州久之不去有朝士范伯奮貽書責之寅以妾臨蓐為辭伯奮復曰妾産與父疾孰重寅訴于鼎改知嚴州鼎旋罷纍月復相欲召寅議者以不省父止之復除永守星夜南奔未及到家召命已下比見其父疾困不能言寅留數日將行告之安國攬衣垂淚而己寅至行朝除禮部侍郎又兼經筵又直學士院尚未踰月安國凶問果至寅匿之佯為父書與交黨翰林學士朱震言久疾垂死寅欲免君命以時事尚艱遣之使行欲蓋而彰度其死時寅尚猶在路耳按安國以去年秋除京祠兼侍讀欲行㑹遭論而止則寅除嚴州時安國未病也寅赴嚴州一年後安國尚有書誨之令作三年計此豈病中所言耶蓋勝非將再相時安國嘗駮其同都督之命指其不能死節等事故勝非以此憾之恐其言失實今不取壬寅集英殿修撰提舉台州崇道觀張燾試尚書兵部侍郎燾召還詔閣門不隔班引對上慰勞久之曰卿去止緣張滉燾曰臣頃者備貟後省茍有所見事無大小不敢不盡愚忠如內侍王鑑乃陛下親信委任之人其擅置御莊事臣尚論列不敢有隱豈有宰相親兄自賜出身者公論不與之臣若不言豈惟負陛下亦負張浚上曰卿交游且盡忠若此事主可知因問朕圖治一紀于兹而收效蔑然其弊安在燾曰自昔有為之君未有不先定其規模而能收效者臣紹興初始䝉召對首以治道當先定其規模為言于今七年矣所謂規模者臣未見其有一定之說臣竊觀方今朝廷施設之方朝令夕改其事大體重不可輕舉者莫如六飛之順動往者前臨大江繼又退守吳會曽未朞年而或進或却豈不為敵人所窺乎此無他規模不素定故也陛下之所朝夕相與斷論國是者二三大臣而已而一紀之間命相之制凡十有四下執政遞遷者亦無慮二十餘人非規模不定任之不一責之不専致此紛紛乎日月逝矣大計不容復誤願陛下以先定規模為急規模既定未有治效不著上歎息曰此誠方今急務朕非不欲立定規模緣宰輔數易未有定論耳遂擢燾兵部侍郎右朝散大夫提舉江州太平觀劉子羽責授單州團練副使漳州安置御史中丞常同之以十事論子羽也上批出子羽可白州安置趙鼎奏子羽之罪誅殛有餘第章疏中論及結吳玠事今方倚玠禦賊恐玠不自安乞且奪職上曰聞張浚之黨日夜冀浚復用子羽尤甚不重責何以懲姦鼎力請上乃許落職後一日同復言子羽之罪竄於遐荒未為過舉今尚從寬典得非以吳玠之故優假之乎玠忠義勇烈知事上之義聞朝廷以公議竄子羽豈無郭子儀與渾瑊之喜疏入遂謫漳州猶以其母老不欲逺竄也右宣教郎吕用中為尚書駕部貟外郎時其兄弸中外補故以用中代之丁未命吏部貟外郎范同假太常少卿接伴金國人使武功大夫髙州刺史帶御器械劉光逺假吉州團練使副之先是徽猷閣直學士王倫既見魯國王昌昌遣使偕倫至北地倫見金主亶首謝廢豫然後致上㫖金主始密與羣臣定議許和至是遣倫還且命太原少尹烏凌阿思謀太常少卿石慶克來議事思謀金人始與徽宗通好海上所遣之人今再遣來示有許和意樞密副使王庶條上淮南耕種等事上曰淮南利源甚博平時一路上供內藏紬絹九十餘萬其他可知劉大中曰淮南桑麻之富不减京東而魚鹽之利他處莫比今荒殘可惜上曰以此知淮甸不可不措置葺理中興聖政史臣曰唐史臣謂睢陽遮蔽江淮以全財用為中興之本今之議強兵者必本於豐財議豐財者必本於成賦荆蜀之輸入於王府者無幾而江浙閩廣民力告病未有瘳者淮甸利源宜在所經理以寖還全盛之舊况欲置邉州於度外乎邊隅未靖之時髙宗猶不忘經理如此况今邊鄙不聳之時乎湖北京西宣撫使嶽飛聞庶行邊遺庶書曰今嵗若不出師當納節請間庶稱其壯節熊克小歷於此即書分移張宗顔劉錡軍事恐太早今依日歷附六月乙亥直顯謨閣江南西路轉運副使徐林為司農少卿趙鼎之免相也林自都司補外至是復召之戊申端明殿學士知建康府章誼提舉江州太平觀以誼嘗引疾有請也資政殿學士提舉臨安府洞霄宫葉夢得為江南東路安撫制置大使兼知建康府兼行宫留守司公事章誼得祠日歷不載此據建康知府題名命刑部貟外郎李彌遜馳勞北使於平江翌日上謂輔臣曰館待之禮冝稍優厚若事有商量早遂休兵得免赤子肝腦塗地此朕之本意也趙鼎曰若用兵不知所費多少比之館待之費殊不侔矣上又曰昨日士㒟對勸朕留意恤民朕諭之云只為休兵未得不免時取於民如月樁錢之類欲罷未可若一旦得遂休兵凡取於民者悉除之上慨然歎曰當時若無軍旅之事使朕専意保民十數年間豈不見效鼎與秦檜同對曰陛下為此言神明感格必有平定之期矣中興聖政臣留正等日語有云造次必於是顛沛必於是言仁者之用心必於其平居間暇之時語默動靜之間不忘乎是可也臣觀太上皇帝凡所論議一語一言未嘗不以休兵息民為之指歸蓋惻然常若疾痛之在其身非僞為之者嗚呼仁哉嗚呼聖哉己酉録故御史中丞孫覺之孫衍為下州文學中書舍人吕本中言衍學有本原逄時多故未嘗少屈舊族子弟能守家學終久不變如衍者少故特録之庚戌閣門祗候趙環為閣門宣贊舍人環普元孫也宗子趙不懼江夏郡王孫也自僞地來歸詔補承信郎辛亥改命徽猷閣直學士王倫充館伴使初命權吏部侍郎魏矼館伴右武大夫榮州防禦使知閣門事藍公佐假慶逺軍承宣使副之矼言頃任御史嘗論和議之非今難以専對秦檜招矼至都堂問其所以不主和議之意矼具陳敵情難保檜謂之曰公以智料敵檜以誠待敵矼曰相公固以誠待敵苐恐敵人不以誠待相公耳檜不能屈乃改命焉既而又辭遂命給事中吳表臣而倫往來館中計事日歷止書有㫖改差王倫充館伴使一句更無首尾今以紹興正論增入熊克小歷稱表臣為太常少卿蓋誤時左宣義郎王之道亦遺矼書有國家自靖康以來失於議和致兩宫北狩萬乘東巡百姓墮於塗炭逮今十有四年尚不覺悟復縱王倫賣國引賊入家頃年章誼孫近使金餘人盡留南京惟誼與近得至軍前禀議今金使之來自合用此例留餘人於韓世忠軍中令其使副造朝不惟有以褫金人之魄而奪之氣亦足以示朝廷之尊乃若和議則有九不可而一可父母之讎不共戴天自徽宗皇帝寧德皇后上仙雖云厭世其實殺之又况淵聖之與六宫尚困沙漠此不可和一也彊敵之性非盟誓可結二也和所以息兵而輿議乃爾蓋傷弓之心猶思靖康之覆轍而懼其復蹈三也金立劉豫於濟南嵗責幣三百六十萬緡豫奉之未嘗少有失墜一旦乘其不虞以計廢豫今又欲和是以劉豫畜我四也今從金之約而遂罷兵則非特不能保其不叛盟又恐朱克融之徒變生不測從之而兵不可罷則不能不於養兵之外橫賦重斂嵗供貢幣其勢必至陳勝吳廣之起於秦青犢黃巾之起於漢為禍殆有甚於此五也頃年以來諸將非不進兵終不能取淮北尺寸之地或暫得之復旋失之正使舉大河以南盡還朝廷度其力能保有之乎六也今得河南之地不足以立國而金藉此求和則必天地以要我自此以後雖復軍聲日振有敢議恢復之事哉七也今天下之權不在廟堂而在諸將諸將擁重兵據要地偃蹇自肆倘從金盟而不與諸將議使金誠和猶恐自疑而至於潰敗萬一挾詐是使諸將得以有詞而不出兵矣八也主上以休兵為重固不憚臣事金人且以金為君則其使蓋同列也若金使如李義琰之言倨慢無禮不知朝廷何以待之九也然則所謂一可者孰可今金誠欲還二帝六宫與祖宗之故地為德於我而無所事賄夫誰曰不可為今日計當以此意明告使者而俾復命焉茍其不從是金無意於盟我何罪也吏部員外郎范同論贓吏翻異不移前勘乞并初勘共不得過三次上曰官吏犯贓既已斷罪多進狀訴雪何也此來尤多趙鼎曰意在僥幸改正然須更令體究劉大中曰在法雖許訴雪却合再勘得委實無罪須罪元勘官吏若所訴不實合别科妄訴之罪秦檜言當送刑部上可之壬子徽猷閣待制提舉江州太平觀王居正知溫州癸丑召親衛大夫利州觀察使知鼎州馬擴赴行在金使烏凌阿思謀初入境問擴所在王倫奏思謀乃海上結約之人與擴相熟乞召赴行在恐須使令故有是命御史中丞常同言近故知閣門事潘永思家以財興訟本臺牒送大理寺後得㫖踈出緣事干內侍梁珂乞仍付寺結案上即批同奏如所請劉大中曰陛下初不欲繫無辜今因臺臣所論而從其請仰見陛下未嘗容心上曰臨安府勘到永思幹人郭夀之用過錢三千緡餘七人各認一二千緡既無文約必是夀之妄攤可除夀之外餘並免於是趙鼎以下退談上之明曰此一事勝踈决多矣蓋時盛暑方㳙日踈决故也是月開封府太康縣雨冰龜數十里首足卦文皆具此據松漢記聞記聞又云戊午夏熙州野外濼水有龍見三日初於水靣見蒼龍一條良久即沒次日見金龍以爪托一嬰兒兒雖為龍所戲弄略無懼色三日金龍如故見一帝者乘白馬紅袍玉帶如少年中官狀馬前有六蟾蜍凡三時方沒郡人競往觀之相去甚近而無風濤之害熙州嘗以圖示劉豫豫不悅趙伯璘曽見之按豫去冬已廢當此時正在上京熙州何為圖示之記聞必誤建炎以來繫年要録卷一百十九建炎以來繫年要録卷一百十九金人地名考證逹蘭原書作撻辣誤改見卷一烏珠原書作兀术誤改見卷一托卜嘉原書作撻不也誤改見卷五烏凌阿原書作烏陵誤改見卷一
