body:
  text: 建炎以來繫年要録卷四宋李心傳撰建炎元年夏四月庚申朔金左副元帥宗維退兵淵聖皇帝北遷尚書右僕射兼中書侍郎何㮚同知樞密院事兼太子少傅孫傅資政殿學士簽書樞密院事張叔夜御史中丞秦檜尚書兵部侍郎司馬朴從朴光兄孫也城始破朴詣軍前納欵逮將北還朴遺書二帥請存趙氏金人憚之挾以北去靖康野録云金人欲立司馬朴朴云吾祖有大功德於前朝朴不才安敢作此纍吾祖之德朴有死而已按它書金人未嘗有立朴之議今不取初淵聖皇帝以肅王樞熟敵情僞欲與俱王泣曰逺使乍歸不願離膝下請甚確遂以祁王模侍行此據曹勛北狩聞見録帝在軍中頂青氊笠乘馬後有監軍隨之自鄭門而北每過一城輒掩面號此據孤臣泣血録三國謀謨録亦有之其進序云編成此書以代嘗膽之苦庶幾㑹稽之耻未忘東門之役必報今從之初敵縱兵四掠東及沂密西至曹濮兖鄆南至陳蔡汝潁北至河朔皆被其害殺人如刈麻臭聞數百里淮泗之間亦蕩然矣邦昌委范瓊交割城池敵留檄書數百道具言志在弔民本非貪土并述邦昌以死辭避不獲之意使邦昌傳諭四方金檄書云宋之道君少主后妃以下並已北遷應文武百官僧道耆老軍民共議薦舉堪為主者一人却准文武百僚僧道耆老軍民同知樞密院事孫傅等狀乞自元帥府推擇賢人永為藩屏又乞於軍前選立太宰張相公以治國事者行府㑹驗本官乃去年同康王為質者也既許尋舊好之後夜犯營寨即時破滅以其敗盟遂臨京城將欲進攻本官哀泣曰身為宰執出質軍前而不意犯於不虞罪當萬死然主上年少蒞事日淺蓋由姦臣所誤且乞緩其攻擊因遣使語其少主趣迎使人泣而謝罪及至和成洎從軍北行以北州縣或有不降每欲進擊必自求哀往往有可愍之意及重兵再舉又乞遣使理㑹雖威之鋒刃不避也欲引而南進曰豈有大臣躬親出質不能戢兵以致交惡而同敵人忍觀其伐主也頭可斷身不可去城破之後驛召而至語及廢國之際號泣劈踊涕泗交流告乞再造既不見容或以腦觸柱或以首投地幾至自絶乃知忠孝剛毅出於其倫忽聞共戴果得此人然恐難奪其志洎在京百官差到翰林學士承㫖吳幵翰林學士莫儔賫狀勸請曰聞建邦立都必立君長制國御俗允賴仁賢恭以大金皇帝道合三元化包九有矜從諸夏俾建列藩契勘雖不許存立趙氏既擇賢人以主兹土則於國於民為幸亦已深矣伏惟太宰相公名髙今古學通天人位冠冢司身兼衆美碩德偉望早羽儀於百工嘉謀赤心久勤勞於三事敢望以蒼生為憂而不以細行自飾以機政為慮而不以固避自嫌上體大金擇立存撫之意下副國人推戴為主之望及别狀申行府今文武百僚僧道耆老軍民共請太宰相公以治國事竊慮别有辭讓伏望元帥府更賜敦請本官早從輿望尋請知樞密院事漢軍都統制劉侍中彥宗禮部侍郎劉思應奉御前文字髙慶裔同詣具道其由勃然奮怒曰國雖破在臣子之分豈容聞此由以先有防備不獲自絶而閉目掩耳背立偃蹇終不為聼但罵文武百僚曰以諸公畏於兵威置我於賊亂之罪寧甘心死於此不可活矣耻後世被以篡奪之名也然行府以軍國務重不可久曠尋録申奏今降到寶冊備禮以璽紱册命為皇帝以授斯民國號大楚都於金陵自黃河以外除夏國新界疆場仍舊世輔王室永作藩臣其間志氣屹然不動雖多方勉諭以事在已然雖死無濟何如就册用救生靈猶不飲食纍日幾至滅性遂擁迫入城乃有在京官僚僧道耆老等共集勸請於天㑹五年三月初七日方受册命諸路軍民各令知悉二帥之在城下也遣人於民麥地內分立牌令諸蕃部刈之至是諸路兵稍進自以輜重繁多恐不得歸乃為北渡先是邵溥應副城南蕃官頗昵言左副元帥宗維主謀者有髙慶裔劉思右副元帥宗傑主謀者有劉彥宗棟摩國王凡謀事者即預事其有密謀也各馳馬於空逈無人之境盤旋數刻而後返若衆議則不以髙下皆環坐一室畫字于灰可否立定不復聞語其密如此資政殿學士提舉醴泉觀路允迪為觀文殿學士佑神觀使太僕少卿陳冲權太僕卿都水使者陳求道權太僕少卿簽書樞密院事曹輔請罷政不許鄜延經略使張深駐軍潁昌㑹其斥堠騎得吳革所遺陜西制置使錢蓋礬書言二聖幸青城邦昌僣立趣使進兵深得書召副總管劉光世及諸將計事趙甡之遺史曰張深行次魯山聞張邦昌即僞位召光世及諸將議事深對將士曰諸公好事在目前以所持扇左右倒衆莫敢應往往偶語出異論光世乃遣使臣王默張景等將漢蕃弓手一百人騎賫狀前去招安盜賊俾深罔測光世密諭之曰聞康王領大元帥駐兵京東汝等當詣元帥府分明投下文字而回金人既退兵深與光世進至朱仙鎮默景得元帥府劄子二道一云仰劉光世將所部軍馬速赴大元帥府一云仰張深將所部回興仁府只於本府駐劄及差使臣劉宗偕來深得劄子失聲惶懼光世即辭去以所部至濟州光世乃遣使臣王默等賫狀詣元帥府先是敵破潁昌焚掠無遺及是其去才數日也李觀靖康勤王紀行録云三月乙卯聞金人尚有留潁昌者戒嚴而進丁巳次潁昌府敵騎聞大軍至即去城中盡為瓦礫積尸滿地按此時金人將欲退師非因西軍而後去也今不取是日江寧軍亂先是資政殿學士宇文粹中守江寧驕倨不法其官屬多相從燕飲馭下殘酷軍校周德因人心之怨夜鼓衆作亂執粹中囚之殺通判府事奉直大夫王章東南第五將閣門宣贊舍人王宗韓司録事朝奉大夫王巖等十一人江東轉運判官朝請大夫薛良顯為亂兵所傷而去官屬之不死者皆遁德等遂焚舟船掠財物嬰城自守公私為之一空此事當見於欽宗實録而不書今以建炎元年七月十三日江東提刑司奏狀修入但變亂所起不能詳耳北盟㑹編貢士周紫芝上書宇文粹中之守建康臣生東南親見其事傲睨慘毒無所不至黥徒數百以誅元帥為名至於害及平民血流滿野拘繫囹圄如鞫囚徒粹中身為大臣屈首下賊處之恬然不能抗罵以死偷活須臾下汚士類上辱朝廷日歷建炎二年十月庚子江東轉運司奏中大夫徐疇等狀迪功郎安誠以諂媚得親於宇文粹中出入其家朝夕無間江東帥司舊無主管機宜文字粹中特以誠故創置凡府政大小悉决於誠粹中之喜怒豫奪惟誠所使又擅破將兵充白直及與倡優往還凡所惡之人輒誣以重罪故周德等結衆作亂又紹興二年十月十四日臣僚上言靖康末宇文粹中知江寧府方東京圍閉之時粹中為大臣不能投𬒮赴難惟事燕飲以夜繼晝衆情共怒兵士周德因之為變今並附此或可修潤增入辛酉邦昌降手書曰天下承平幾二百載百姓安業豈復知兵乃者姦臣首結邊難招致禍變城守不堅嗣君皇帝越在郊野豫以還歸橫見推迫有堯舜之揖讓無湯武之干戈四方之廣弗通者半年京城之大無君者三月從宜康濟庶拯艱危此文據僞楚録及鄧肅劾顔博文疏修入肅疏又云至於廟諱更不復顧蓋濮安懿王諱也欽宗實録所載海內承平至終究逺圖乃邦昌撫諭四方手書耳非赦文也肅在城中當得其詳但僞楚録係赦書於初四日恐誤今用其文而移其日庶不抵牾沈良靖康遺録云初四日邦昌肆赦略云可大赦天下諸道勤王人兵當國家危急不能進援京師失守乃欲偷安雖無誠節亦已勤勞宜歸本貫别聼中㫖此恐非邦昌本文今不取可依下項應手書到日昧爽以前罪無輕重常赦所不原者並特釋放遣官省視陵寢諸州天慶觀天寧節仍舊行香官吏並與推恩勤王之師令管押歸元來去處存恤諸處宗室除放租稅招免賊盜等事令禮部遍牒施行赦與覃恩同但改赦字為手書而已時四方勤王兵大集吳幵莫儔為邦昌謀令散還諸路故僞赦首及之其文祕書省著作郎顔博文所草也初江淮發運司遣吳樞者至京師探事王時雍薦上殿見邦昌陳利害具言在外兵數請遣使止之辭語不順邦昌乃授樞文林郎用其䇿選郎官為四方密諭使侍御史黎確嘗陳三事勸邦昌罷東南貢獻以收人心有憂勤恭儉過於前王之語又請邦昌修德以應天及邦昌求奉使止勤王者確請行遂奉邦昌手書擁黃旗以詣趙野黎確事以紹興二年三月癸丑江躋論確章疏及紹興八年十月己卯張燾乞遣追奪確職名奏狀修入確邵武人野甥也邦昌又遺范訥范致虛錢蓋翁彥國劉光世等手書計事其書略云國家之變千古未聞昧陋所遭可謂竒禍又云幸今敵騎已退道路可通即遣使東州具伸夙志其書外題云付某人又內云邦昌上某官仍用內侍省印僞楚録云邦昌以手書與翁彥國等俱有止兵問勞褒用之詞皆斥其名仍用國寶按趙甡之遺史邦昌與彥國書封皮云付翁彥國其中仍云上端明中丞書云國家之變千古未聞昧陋所遭可謂竒禍誠以保存廟社拯救生靈使京城免於焚蕩以濟逺圖其心明於皎日今幸敵騎已退道路可通即遣使東州具伸夙志想在端明必諒此心今差李左司賫手書具道曲折惟中外相與戮力共濟艱難迄成康功以永丕祚是所望於公也初夏薄暑軍務良勞未晤間更惟尚謹邦昌上聞朱勝非秀水閒居録云趙子嵩等㑹於襄邑邦昌皆以手書與之豫時留守南都亦得一封其外用內侍省印不書名內只一幅云國家之變可謂非常昧陋所遭亦云竒禍又稱豫堅守南都力保鴻慶宫其末叙時令云某上據此則録所云用國寶等語皆非也今不取元帥府統兵官劉浩孔彥威張換以下仍各進官五等此據欽宗實録附入權左司郎官李健乞使翁彥國遂與奉議郎陳戩偕行又遣水部郎官李革京畿提㸃刑獄公事汪長源使張深劉光世戩松溪人彥國甥壻革深鄉人長源光世客也李觀紀行録四月庚午邦昌遣李革汪長源以太后之命勞軍為名先遣人通耗深怒囚來人於軍中按諸書四月庚午元祐皇后方垂簾聼政革等出使蓋在此前觀所記恐誤欽宗實録稱以汪湘使光世又與觀所云不同亦當考發運副使向子諲在亳州邦昌遣其甥劉逹賫手書以往子諲不啓封而焚之械繫逹於獄遣使勸進於王邦昌手書至虹縣縣令已下迎拜宣讀如常式武尉徐端益獨不屈膝而走事定子諲言於朝易文資端益金華人也向子諲徐端益事並據王明清揮麈録附入然明清云子諲時為淮漕又云遣官奉表勸進於河北皆小誤今删潤令不抵牾遣武義大夫同恩李興潘謹燾持僞尚書省劄子往濟鄆等州訪尋康王所在令逐州守臣等具軍法文狀申省劄子不書年後有王時雍李回二押字按馮澥時為左丞不知何以不書劄子若澥元不供職與吕好問相類則後來何以坐事僞朝謫官當考徽猷閣待制提舉醴泉觀權直學士院詹乂罷從所請也先權直學士院中書舍人孫覿令日下供職元帥府以檄書諭四方自京都受圍不通朝命參議官耿延禧髙世則建請布檄諸路以定人心王然之命延禧面草檄以行是日敵營始空其行甚遽以勤王兵大集故也華人男女驅而北者無慮十餘萬營中遺物甚衆祕閣圖書狼籍泥土中金帛尤多踐之如糞壤二百年積蓄一旦掃地凡人間所須之物無不畢取以去皆宦者國信所提舉鄧圭導之命范瓊領兵出城搜空得金人所遺寶貨表段米麥羊豕之屬不可勝計又有遺棄老弱病廢及婦女等至是皆遷入城敵之圍城也京城外墳壠發掘略遍出尸取槨為馬槽城內疫死者幾半物價踴貴米升至三百豬肉斤六千羊八千驢二千一鼠亦直數百道上橫尸率取以食間有氣未絶者亦剜剔以去雜豬馬肉貨之蔬菜竭盡取水藻芼之以賣椿槐方芽採取唯留枯枝城中猫犬殘盡遊手凍餒死者十五六遺胔所在枕籍時河東北宣撫使范訥屯雍邱真定府路馬步軍副總管王淵為先鋒是晚方遣三十騎抵城下邦昌遣人持帛勞之且令諭訥速來議復辟事淵福津人也壬戍邦昌置修城司命權户部尚書邵溥總領其事副元帥宗澤引兵次大名府澤得金所掠人始知二帝北去澤聞之謀引兵渡河據賊歸路而對壘諸寨一夕解去澤號慟即自臨濮引兵趨滑州及是抵大名城下欲帥師渡河而勤王之兵無一人至者又知張邦昌僣立擬先行誅討乃將所部復還屯衛南是日徽猷閣學士京西北路安撫使知潁昌府何志同徽猷閣直學士知淮寧府趙子嵩徽猷閣直學士江淮等路發運使兼經制使翁彥國按實録去年十一月甲戍已除彥國寶文閣直學士充經制使募兵入援不知此時何以尚帶徽猷閣直學士當考都水使者榮薿同盟於淮寧之教場初永昌陵既復土司天監苗昌裔私謂內侍王繼恩曰太祖之後當再有天下太宗大漸繼恩與參知政事李昌齡謀立燕懿王之子冀康孝王惟吉事泄以貶死熙寧中昌齡孫逄為臨沂簿與方士李士寧導懿王之曽孫右羽林衛大將軍秀州防禦使世居謀不軌復坐誅子嵩在邸中習聞其說至是適天下大亂子嵩傳檄中外語頗不遜時彥國在夀春聞敵漸還引兵至陳與子嵩㑹二人爭長子嵩曰周之宗盟異姓為後彥國曰我奉王命入衛公陳守耳子嵩方築壇告上帝殺三牲㰱血而推盟主未定先是敵犯潁昌志同棄城走去年十二月丁丑至是引所部亦至曰大元帥康王在濟州吾輩何主盟之推乃同上書帥府然彥國卒為誓文行登壇㰱血之禮云志同執中子薿諲孫也執中龍泉人政和中太宰諲任城人熙寧户部副使按趙子嵩移檄事它書不見獨王明清揮麈録餘話有之其略云藝祖造邦千齡而符景運皇天祐宋六葉而生眇躬果如所言則子嵩真亂臣賊子矣恐未必爾然明清所云遣鄭㲄置獄京口究治情得上不欲暴其事以他罪竄之則亦不為無據實録載子嵩盟文云敢告衆士金人再犯京闕侵侮暴虐人神共憤聖天子屈已議和猶未退師曠日持久包藏禍心宗社危辱王命隔絶天下臣子各奮忠勇誓不與俱生今諸道之師大集於近輔凡我同盟毋狥私毋懷異毋觀釁戮力合謀共安王室以效臣節三軍之士視死如歸千萬人惟一心進則厚賞榮於家邦退則重刑殺及妻子有渝此盟神明殛之皇天后土太祖太宗實鍳斯言按此時子嵩已知大元帥在濟州而盟文略無一字及之亦可怪也胡寅封事黃潜善鄭㲄小人本無逺見自南都以至維揚誅竄之刑疑忌之意相尋繼見足明當時皆有是說今且云傳檄不遜更俟考詳明年二月戊寅行遣癸亥邦昌請元祐皇后入居延福宫敵之始退也權領門下省吕好問謂邦昌曰盍舉欽聖故事乎邦昌曰敵去未逺請俟踰境好問曰何可緩也邦昌乃集百官赴文德殿降手書曰余世受宋恩身相前帝每欲舍生而取義惟期尊主以庇民豈圖禍變之非常以致君臣之易位既重罹於羅網實難逭於刀繩杵臼之存趙孤惟初心之有在契丹之立晉祖考殊迹以甚明載惟本朝開創之圖首議西宫尊崇之禮號同母后國繫周朝兹為臣子之至恭以示邦家之大順恭惟哲宗元祐皇后聰明睿智徽柔懿恭雖嘗即瑶華崇道之居亦既奉欽聖還宫之詔久棲神於靖館積系望於綿區今二聖已遷山川方震是用祗伏掖庭之次恭陳舊國之儀揭丕號以正名開别宫而移御幅員時乂庶臻康濟之期京邑既安更介洪長之祉宜上尊號曰宋太后御延福宫時后在兄子通直郎忠厚所邦昌又密上后書具述復興之事此據秦湛回天録后皇恐不知所以避之不免翌日入居西宫蔡絛國史後補云延福宫國初號西宫蓋周太后嘗居之故邦昌用此故事王明清揮麈録云后在孟忠厚家垂簾儀衛忽突入第中后皇恐不知所以按后此時雖入居西宫尚未垂簾也明清所云小誤今刪潤附入元帥府檄至京師邦昌命開封府榜諭士民都人讀之莫不感動遣權吏部尚書謝克家往山東迎大元帥先是吕好問謂邦昌曰公宜遣使推戴康邸則城中便為功臣若先為諸道所推則城中即叛臣矣為功臣為叛臣在此一舉豈可少緩邦昌以為然王時雍謂邦昌曰今如騎虎勢不得下後日噬臍無悔也宜熟慮之徐秉哲亦贊其言邦昌不從乃止此以秦湛回天録沈良遺録參修尚書右司員外郎宋齊愈請致仕不許門下侍郎耿南仲在軍中率羣僚勸進王避席嗚咽掩面流涕辭遜不受使臣鄭安自金回傳淵聖皇帝齧血書襟詔略曰宋德不興禍生莫測不幸用非其人兵未抵京而衆先潰使道君皇帝而次全族驅質復聞宗社亦非我族涕淚橫流衛士潜歸播告四方忠臣義士奮心一舉猶可為朕報北轅之耻也王讀之痛哭江淮發運副使向子諲遣將官王儀統勤王兵至城下徽猷閣直學士知淮寧府趙子嵩聞金退師與發運使翁彥國引兵之襄邑北道都總管趙野河東北宣撫使范訥亦以所部來㑹時從事郎范塤為蘄州司儀曹事率郡兵勤王子嵩因遣塤與承事徐文中偕至帥府請進發大軍移屯南京且言國家之制素無親王在外者主上特付大王以大元帥之權此殆天意今若稍有猶豫則事去矣兼恐四方姦雄乘變而起猝難平定望大王遵故事以天下兵馬大元帥承制號召四方旬月之間可傳檄而定塤鎮曽孫也鎮成都人熙寧翰林學士子嵩引兵事據家狀在四月四日故附此其所上書當在此時今牽聨書之金左副元帥宗維還軍次鄭州此據范仲熊北記甲子邦昌遣閣門宣贊舍人蔣師愈承務郎程巽王府內知客蔡琳賫咨目詣王曰邦昌伏自拜違已而北去所遭禍難不可備詳昨自臘月二十日還闕正月十五日到城方知國家禍變之酷主上䝉塵於郊二月七日又聞金帥之令遷二帝太子太上皇后妃嬪帝姬宗室近屬劫質敵營既而又欲焚燒宗社洗蕩生靈俾推戴異姓方免屠毒尋奉御筆付孫傅等令依元帥指揮方為長計無拘舊分以速咎纍於時公卿大夫號慟軍前以救君父邦昌哀號劈踊以身投地絶而復蘇敵執成命終莫肯回度非口舌可爭則以首觸柱求死不能又緣甲士防虞晝夜監守雖欲引繩揮刃赴井蹈河皆不可得豈謂城中之人相與逃死乃嫁大禍臨於一身變出不圖死安足惜忽劉彥宗等齎城中文字與吳幵莫儔俱至邦昌訶責彥宗又罵城中百官為自免計逼人以首惡之名使邦昌有兵定與大金相抗不共戴天彥宗等語塞邦昌因不復飲食六七日垂死而百官陳述禍福謂事已至此雖臣民盡死莫能回二帝之遷惟有從權庶幾保全宗社可為後圖若堅持一節以就死地恐上纍二帝豈得為忠臣乎邦昌身為宰輔世荷大恩主辱而不能死復何面目以見士民然念興復之計權以濟事故忍死於此幸兹敵騎已還道路可通故遣賫此以明本心今則社稷不隳廟主如故袓宗神御皆幸存全伏維殿下盛德在躬四海系望願寬悲痛以幸臣民續次别差謝克家等間道齎御寶一紐詣行府當别貢陳初夏方暄更乞倍保珍重邦昌無任瞻望激切之至四月五日邦昌惶恐咨目上覆康國大王殿下師愈已見二月乙亥是日李興潘謹燾至濟州元帥府以趙子嵩為寶文閣學士元帥府參議官東南道都總管何志同等皆屬焉欽宗實録云先是趙子嵩與翁彥國以師勤王相推為盟主適何志同以潁昌兵至曰大元帥康王總兵濟州盍赴麾下聼命何主盟之有子嵩言於康王曰志同等雖各擁兵不相統一乞令聼子嵩節制王承制除子嵩寶文閣學士充參議官東南道都總管耿延禧中興記云子嵩是除蓋王有所聞并載淮寧與翁彥國爭長事二書不同按淮寧之盟以壬戌而參議之除以甲子相距才二日王在濟州無容即知之或者二人未盟以前爭為盟主而王已有所聞也今併附此更須參考初房州文學傅亮以所募兵數千人入援亮募兵事祖見去年六月壬戌道陳蔡間羣盜紛然皆為亮所破因以便宜假亮通直郎為統制官率之以行亮自朱仙鎮直抵青城左副元帥宗維後軍大驚狼狽而去邦昌遣使召亮亮曰二聖北狩大元帥康王未還城中遣使為誰欲斬之僞使遁歸亮馮翊人也簽書樞密院事曹輔遣太學録楊願上書帥府太學生汪若海陳抃等繼至權領門下省吕好問監察御史張所亦遣人以蠟書來上願已見二月甲申若海已見正月丙午書中有言士大夫趨向者王悉焚之以安反側而命願等為元帥府屬官耿延禧中興記云吕好問為邦昌權門下侍郎先遣彈蠟言圍城中及朝廷短長監察御史張所尤甚上命取蠟炬并舉人所上書中害士大夫者併焚之按好問等所上書謂之言城中事可也謂之害士大夫則非也今略刪潤其語庶不失實諜報京城見修守禦之具王曰果如此則諸道兵必人人爭先以屠吾民乃命耿延禧草書貽諸道帥未得近京城已至城下者毋得趣入又檄諸道二月六日以後所受僞詔文移等勿行初童貫自太原遁歸遣武功大夫和州防禦使馬擴募兵於真定㑹擴與安撫使劉韐之子直祕閣子羽有違言或譛擴有叛意韐囚之靖康元年正月癸巳及真定破擴自獄易服奔出竄西山之和尚洞元年十月丁酉時兩河義兵各據山寨屯聚自保衆推擴為首與金人相拒或一日十數戰然新集之衆兵器甲胄非良至是擴與敵挑戰擴騎無甲遂重傷仆地為敵所執乙丑百官朝太后於延福宫邦昌始不坐迎陽門於內東門聚三省樞密院官議事中書舍人李擢權直學士院元帥府遣從事郎劉默迎資政殿大學士李綱於湖北初綱既召還連謫寧江軍節度副使䕫州安置綱去年九月戊寅除觀文殿學士知揚州庚寅落職宫觀十月癸巳朔散官建昌軍安置庚申再謫寧江城欲破始復職領開封府閏十一月甲午綱行至長沙聞命遂自長沙與龍圖閣學士湖南安撫使郭三益偕率本路兵入援三益嘉興人也王聞綱來承制盡復綱故官且貽書曰方今生民之命急於倒垂諒非不世之才何以協濟事功閣下學窮天人忠貫金石想投袂而起以副蒼生之望即命默持書訪綱焉默初以綱守禦司奏補官初有傳金人以郭藥師為樞密使留兵萬五千以衛邦昌者王憂之乃遺宗澤趙子嵩等書諭以受賊付託之人義當征誅然慮事出權宜未可輕動澤復書略曰自古人臣豈有服赭袍張紅蓋御正殿者况邦昌改元肆赦又挾孟氏以令天下欲散諸路勤王之兵其篡亂踪跡無可疑者自古姦臣初未嘗不謙遜而中藏禍心况惡狀彰著如此今二聖二后諸王皇族悉渡河而北惟大王在濟天意可知宜早正天位興復社稷以傳萬世不可遲疑牽於不斷惟大王圖之丙寅邦昌令寺觀建聖夀節道場至壬申罷侍御史胡舜陟言於邦昌曰臣竊見陛下正位宏逺非出本心外迫大金兵火之威內念黎元塗炭之苦故自踐阼以來謙虛抑畏起居命令不敢同於至尊今大金已反其國而君臣大義豈可一日而廢苐恐姦言熒惑謂大金為可恃謂天位為不可失謂自古有亡必有興此皆輕慮淺謀不識禍福之機者也本朝自祖宗以來恩德在人至深至厚九州四海豈有一夫不心懷趙氏者今勤王之師雲蒸霧集皆為趙氏而來豈肯從吾號令閉門拒之有同兒戲伏望即降指揮正其名位請元祐皇后垂簾聼政於內陛下以太宰治事於外特遣大臣往迎康王明以此事播告將士孰不欣然恱服此萬世一時也伏惟採擇狂愚而加意焉按舜陟入文字在馬伸之前實録不載而汴都記僞楚録有之但僞楚録附此書於初四日蓋誤今依汴都記附初七日更俟考詳東南道總管趙子嵩以朝奉郎趙令儦通判廬州子嵩聞張邦昌家在廬檄馮詢令存恤又以令儦幾察之子嵩即為書告王請捕誅邦昌子母以絶姦心又言自圍城以來朝命隔絶乞下諸路州軍自今凡有事宜並申大元帥府豫决如有姦詐僞冒文字皆無得施行近京州縣嘗經敵人焚掠者宜捐其稅又言范訥為宣撫使逗撓自營罪狀明白况大元帥已開府則宣撫使自當結罷又言金人見據都城勢力漸回理宜速營江寧府以備緩急乞早行措置淮南荆浙盜賊恐乘釁據有形勢之地益難制禦宗室忠翊郎叔向聚衆數千屯青城入至都堂叱王時雍等曰當速歸政太后不然縱兵與汝輩相周旋朝野僉言云四月五日劉光世趙叔向自潁川至按光世自華隂徑如京東未嘗至城下也泣血録叔向初七日至城下今從之叔向魏悼王曽孫城破日潜出之京西聚衆至是自潁昌而來是日蔣師愈等至濟州邦昌又遣韋賢妃弟拱衛大夫忠州防禦使構當軍頭引見司淵及邦昌甥直祕閣吳何持書遺王稱臣具言封府庫以待大王顔子曰子在回何敢死邦昌所以不死以君王之在外也先是邦昌遣謝克家持寶來或者謂邦昌自為楚則賫大宋寶來彼蓋無用者耳既而聞邦昌迎太母等恭順狀王始不信召吳何而賜之酒錫賚甚渥乃遣成忠郎黃永錫持書答邦昌略曰今奉來教備陳終始有伊尹之志逹周公之權然後知所期之不繆又曰九廟之不毁生靈之獲全相公之功已不愧於伊周矣答書全文云某咨目上太宰相公閣下天降大禍不使某前期殞滅而使聞君親之流離見宗族之蕩覆肝心摧裂涕淚不禁窮天下之楚毒不足以為喻便欲引繩伏刃而二聖之鑾輿未復四方之兵馬方集將士忠憤責以大義故飲泣忍死力圖奉迎今河北河東忠義之兵數踰百萬諭使邀迎率皆響應蚤夜以覬聞人音而矍然念與相公去嵗同處敵營從容浹月自謂知心故比來之事聞流言而不信士夫將佐亦皆云爾今奉來教備陳始終有伊尹之志逹周公之權然後知所期之不繆天或悔禍可冀二聖之復也所諭遣謝克家之意讀之愕眙失措其何敢承願皆緘藏內府責在守者俟鑾輿歸而上之九廟之不毁生靈之獲全相公之功已不愧伊周矣某方身率士卒圖援父兄願相公協忠盡力奉迎二聖復還中都克終伊周之志某身膏敵手受賜而死矣方寸潰亂修謝不能多及何烈靖康革史康王屯兵濟州遣報使來為宰相王時雍以下撒書殺之蓋傳聞繆妄今不取案撒書二字未詳丁卯謝克家以大宋受命之寶至濟州王慟哭跪受命汪伯彥司之邵溥神道碑云金索大宋皇帝之寶溥紿以隨葬乃得全今且附此俟考碑以為大宋皇帝之寶其文與史不同蓋誤且貽書諸道帥臣具言邦昌恭順之意毋得擅發一人一騎入京城書後王親批數語或命耿延禧代書焉遂以謝克家提舉一行事務自濟州還京師趣辦儀物副元帥宗澤言敵騎渡絶已使人焚河橋訖王乃檄兩河諸將邀擊敵兵迎還二聖此據中興記監察御史馬伸言於邦昌曰伏見金人侵逼劫二帝北行且逼立相公使主國事相公所以忍死就尊位者自信敵退必能復辟也忠臣義士不即就死城中之人不即生變者亦以相公必立趙孤也今敵退多日吾君之子已知所在獄訟謳歌又皆歸往相公尚處禁中不反初服未就臣列道路傳言以謂相公外挾强敵之威使人遊說康王且令南遁然後為久假不歸之計一旦喧閧孤負初心望速行改正易服歸省庶事取太后命而行仍速迎奉康王歸京日下開門撫勞勤王之師以示無間應內外赦書施恩惠收人心等事權行拘收俟立趙氏日然後施行庶幾中外釋疑轉禍為福不然伸有死而已必不敢輔相公為宋朝叛臣也自邦昌僣立凡言事者皆用君臣之禮至伸始移書稱太宰相公書入邦昌命一切改正陳留潰散戍兵李忠率衆入和州清水鎮濠州巡檢及定逺界土豪許氏徐氏金氏槍仗手遮境拒之殺李忠是日開城門戊辰邦昌召侍從官議事晚降手書曰以身徇國嘗為質於軍前忍死救民姑從權於輦下幸外兵之悉退方初志之獲伸載惟遭變之非常本以濟圖於有永今則保存九廟全活萬靈社稷不隳衣冠如故奉迎太母實追少帝之玉音表正萬邦猶假本朝之故事蓋以敵方退舍師未渡河尚虞殿後之師或致回戈之舉據今間探漸已北轅既禍亂之稍紓豈權宜之敢久延福宫太后宜遵依欽聖憲肅皇后詔㫖上尊號曰元祐皇后入居禁中緣未審康邸行府所在軍國庶務不可曠時恭請元祐皇后垂簾聼政以俟復辟豫位冡宰實總百工誓殫朴忠以輔王室惟天心之悔禍啓帝胄之應期二帝雖遷賴吾君之有子多方時乂係我后之在斯邦其永孚於休豫亦有辭於世是書既出中外大恱追還諸路赦文并毁所立宋太后手書不用秦湛回天録云三月二日延寧宫火元祐皇后倣徨無所歸步入相國寺中前軍器少監孟忠厚家三月末女真有去意吕公即謂邦昌曰宜速尊崇元祐太后邦昌乃定議上尊號曰元祐皇太后四月四日聞張邦昌手書乃改曰宋太后吕公曰此事發端於豫若云宋太后則人心疑懼必以豫謀為非遂以疾在告不與其事是晚孟忠厚密携邦昌上元祐皇后劄子來具述復興之事乃知前日之事或有教之者畏逼故也五日元祐皇后入居延福宫吕公又啓邦昌歸政事邦昌曰以軍退未逺欲俟别日吕公曰時不可失至九日申未間遂召百官太后以是日入禁中權門下侍郎吕好問步自紫宸殿趨延福宫白元祐皇后言不當謙遜以濟大計有司以儀衛進后入宫邦昌率從官迎拜於道元祐皇后以尚書左丞馮澥為奉迎使權右丞李回副之又遣兄子權衛尉卿忠厚持手書遺王汪伯彥中興日厯丁卯謝克家來歸玉璽孟忠厚賫太母手書至王受寶讀書訖居二人以客禮耿延禧中興記云克家忠厚同賫大宋之寶來上按太母書中有百辟建言請權聼政之語則忠厚出京當在戊辰後不應丁卯已至濟州况忠厚與澥回同受命而澥回以壬申出京城丁丑方至帥府則忠厚亦當相踵而至今從實録附注濟之父老請王即位於濟州幕府羣僚耿南仲等㑹於麟嘉堂議未定宗室承宣使仲綜等曰汪伯彥中興日厯作中綜實録因之按仲綜後知大宗正事而卒伯彥所記字誤今從耿延禧中興記昔晉安帝䝉塵大將軍武陵王遵承制行事今二帝北狩王不當即位宜衣淡黃衣稱制不改元下書誥四方參議官耿延禧髙世則引唐肅宗故事折之仲綜議屈㑹副元帥宗澤言邦昌久在敵中范瓊亦是草澤中起恐其隂與敵結未可深信南京乃藝祖興王之地取四方中漕運尤易又有自敵寨脫歸者道二帝語云可告康王即大位為宗廟社稷計王慟哭由是决意趨應天汪伯彥中興日厯云有自敵寨遁歸者衣裏蠟書上皇御筆二字曰即真謹按玉牒所書上皇御筆乃八字曹勛所進北狩聞見録甚詳伯彥誤記也欽宗實録四月戊辰曹勛自河北軍前竄歸詣大元帥府進太上皇帝御衣上有御劄曰可便即真來救父母此尤差誤勛以五月離燕山府七月至南京李綱建炎進退志中亦載此事與勛所録同史臣承伯彥之書不深考耳二帝聖語見耿延禧中興記今年四月癸亥及七月丙辰所書可參考仲綜潞恭憲王後滕康孝王宗旦子也潞王元佐生平陽恭懿王允升允升生宗旦己巳權知樞密院事兼權領尚書省王時雍權門下侍郎吕好問權中書侍郎徐秉哲權尚書右丞李回權同知樞密院事吳幵權簽書樞密院事莫儔奏乞各還舊職奉面㫖依仍且兼權見領職事實録己巳王時雍等六人皆請罷權領三省樞密院職事元祐皇后不許按邦昌雖以初九日降手書而后十一日始聼政史臣誤也今從僞楚録於是時雍撒蓋去韀呵從稍减幵儔又請免兼權樞密院職事從之給事中韋夀隆乞罷奉面㫖依舊徽猷閣待制奉祠權開封尹周懿文奏徐秉哲已依舊開封尹竊恐亦合還大理卿職事奉面㫖可依舊權開封尹見權執政官並免簽書舊職尚書兵部員外郎唐恕乞致仕不許恕淑問子淑問江陵人介子元祐左諫議大夫崇寧初為華容令不能奉行茶法忤使者謝病免歸靖康初許翰薦用之是日邦昌僞赦至太康縣東南道都總管趙子嵩傳檄諸路不行權左司郎官李健等持手書繼至發運使翁彥國得之不發遣使白王子嵩獻書於邦昌曰人臣委質事君義命而已見得思義見危致命人臣之常節議者籍籍謂劫請傾危之計閣下或與聞之不然何金人曲折拒孫傅之請卒以與閣下蓋必有定論矣子嵩亦疑是說自聞閣下入居境中躬受金册子嵩結集大軍立壇㰱血専意致討三軍之士千萬人惟一心踴躍奮迅期得閣下而甘心焉今兵既大集忠憤難遏亦可畏已忽李健陳戬持書至翁中丞有反正之心羣情尤疑或引馮瀛王語曰公此舉由𠂻乎子嵩獨謂殆天誘閣下為斯舉也傳曰有伊尹之志則可無伊尹之志則篡也伊尹猶不可况其下者乎閣下前日迫於敵威不得已而從之今敵既逺去則當避而歸之正豈不本末明白哉既出至誠便當斷以不疑不可猶豫速出居相府易服自貶親書示於軍中哀鳴以請帥府使三軍曉然知閣下前日權於濟難實不忘於吾宋子嵩等亦按兵城下以待大元帥之命若遲疑不决則三軍必曰以天下之師誅天下之逆非子嵩等所専也閣下老母垂年伶俜一夫身將五十必不肯為滅族之計其深照之迫於宗社大計肝心潰裂言不成文子嵩又遺王時雍等七人書大略云諸公平日所學自謂過人今相與亡人之國稽首僞朝居之不疑方且自謂佐命功臣此與唐六臣何異聞張公有反正之意古人權以濟事遂立殊勳惟識事機知禍福者能之儻彼遂久假不歸諸公願為王偉源休亦所自擇庚午元祐皇后御內東門小殿垂簾聼政邦昌以太宰退處資善堂侍從官以上詣祥曦殿起居元祐皇后畢邦昌服紫袍金魚犀帶獨班歸兩府幕次沈良餘録云邦昌自稱太宰總百揆猶襲曹馬故事入朝不趨贊拜不名靖康野録云孟后垂簾邦昌稱監國太師皆誤今不取邦昌僣立至是凡三十二日不御正殿不受常朝不山呼見百官稱豫不稱朕不稱聖㫖至於禁中諸門悉緘鎖題以臣邦昌謹封承議郎權諸王宫記室徐偉逹權膳部員外郎偉逹新城人也此據偉逹紹興三年六月乙未乞改正受僞命狀修入尚書禮部侍郎兼侍讀談世績卒世績既得歸邦昌命權直學士院世績稱疾堅卧不起邦昌知不可奪遂已後贈延康殿學士諡端潔辛未監察御史姚舜明齊之禮太常博士華初平乞致仕不許時四方勤王之師漸集道路稍通京城內都巡檢使范瓊揭榜云探報金人後軍尚屯滑州界上仰四方客旅未得輕出見者訝之壬申以明逹皇后園陵為敵所發遣監察御史張所按視陵寢汴都記云明逹墓為敵所發掘露尸取棺板以為營柵今從實録先是左副元帥宗維軍行過永安遣人詣昌昭二陵致祭而去禁止諸軍毋得劫陵廟器物此據三國謀謨録至是遣官按視之權尚書吏部侍郎王琮罷為右文殿修撰知鄧州紹興日厯載琮劾疏稱王時雍除琮鄧州令為時雍搬家歸蜀當考祕書省著作郎劉岑直祕閣知鄭州岑述曽孫述德清人熙寧初嘗為侍御史時從聶昌出使未還也濟州守臣張存率官吏士民勸進王不許此據紹興四年六月五日存子右迪功郎鏜乞推恩狀修入副元帥宗澤聞京城反正復為書貽王言今日國之存亡在大王行之得其道與不得其道耳所謂道者其說有五一曰近剛正而逺柔邪二曰納諫諍而拒諂諛三曰崇恭儉而抑驕奢四曰體憂勤而忘逸樂五曰進公實而退私僞澤謂所親曰怨結王之左右矣不恤也癸酉權尚書左僕射張邦昌率在京百官上表勸進太常少卿兼權起居舍人汪藻為表文曰二帝出郊既䝉塵而未返九祧乏祀將攝祼以為名使生靈相顧以無歸雖溝瀆自經而奚益輒慕周勃安劉之計庶幾程嬰存趙之忠王不許殿中侍御史胡唐老知無為軍監察御史姚舜明知衢州王俁知江州甲戍元祐皇后告天下手書曰比以敵國興師都城失守祲纒宫闕既二帝之䝉塵誣及宗祊謂三靈之改卜衆恐中原之無統姑令舊弼以臨朝扶九廟之傾危免一城之慘酷乃以衰癃之質起於間廢之中迎置宫闈進加位號舉欽聖已行之典成靖康欲復之心永言運數之屯坐視邦家之覆撫躬獨在流涕何從緬維藝祖之開基實自髙穹之眷命歷年二百人不知兵傳序九君世無失德雖舉族有北轅之釁而敷天同左袒之心乃眷賢王越居近服已徇羣臣之請俾膺神器之歸繇康邸之舊藩嗣宋朝之大統漢家之厄十世宜光武之中興獻公之子九人惟重耳之尚在兹為天意夫豈人謀尚期中外之協心同定安危之至計庶臻小愒漸底丕平用敷告於多方其深明於吾意先是侍御史胡舜陟上疏請后降詔諸路使知中國有主康王即位有日以破亂臣賊子之心吕好問言今日布告之書當令明白易曉不必須詞臣遂命太常少卿汪藻草書御封付御史臺看詳然後行下大元帥府約束自三月八日以後稱中㫖面㫖事並勿行差到官不許上凡事並申帥府豫决以徽猷閣待制北道副總管顔岐為元帥府參議朝議大夫滕康宣教郎周望並為記室岐復子復奉符人兖公四十八世孫仕至中書舍人康宋城人望真陽人也是日李綱檄至京師乙亥命禮官討論車駕將至國門臣僚前路奉迎至大慶殿儀資政殿學士提舉醴泉觀路允迪為奉請車駕進發使左諫議大夫范宗尹副之文武百官再上表勸進於王復不許初京城既破武略大夫光州刺史郭京自宣化門南遁事見去年閏月丙辰引所部六甲神兵二千人至襄陽府屯洞山寺欲立宗室為帝陜西制置使錢蓋西道都總管王襄統制官張思正等止之不聼思正乘間㑹兵執京囚之至是以聞實録云京北路安撫司言收復襄陽府擒郭京初京敗引兵潜遁破襄陽據之至是就擒按趙甡之遺史載此事頗詳而實録差略今從遺史既而思正持京以獻道為劇盜李孝忠所奪思正刺京殺之思正殺京在五月辛卯今併書之思正始以隨州觀察使將兵援河東軍敗坐停官道州編管未行孝忠京百司健兒京城破隨衆奔萬勝罔得脫與其徒張世等十人聚衆為盜是日金人陷陜州武經郎權知州事种廣死之初范致虛既敗還敵併兵攻陜諸帥皆遁去敵圍城九日而陷武經郎監在城酒務統領軍馬劉逵戰死敦武郎兵馬都監朱辨成忠郎監甘棠驛孫旦悉遇害後贈廣武翼大夫雄州防禦使逵等皆官其家一人此事當見於欽宗實録而不書今以劉逵家乞推恩狀修入狀稱靖康二年四月八日金人攻陜州至十六日城破乙亥十六日也逵紹興四年二月辛卯依辨旦劄與恩澤一資廣六年十月丁未加贈正使遙防今并附見丙子溫州觀察使京城內都巡檢使范瓊為龍神衛四廂都指揮使兼四壁都巡檢使録京城彈壓之功也東南道都總管趙子嵩等獻書王府大略言京城事體既已反正顒望大王入主社稷以安生靈遲疑未發事久變生不可不慮或聞議者以謂京師已經殘破不可復入止欲即位軍中便圖遷徙子嵩愚慮深為未然今禍變非常姦僞未戢欲致中興當謹舉措置理宜先入京師謁宗廟覲母后明正誅賞降霈四方若京師果不可都自可徐議所向子嵩等前乞移軍南京當時敵未退事勢與今日不同訪聞趙野范訥不戢其下縱令虜掠人心胥怨又兩軍時有分爭萬一行府入南京二軍必趨帳下恐有郭汜李㴶之變伏乞徑還京城早定大計以副人望初邦昌僞赦既為子嵩等所格李健因留太康縣以狀審於王時雍邦昌具遣使奉迎次第以堂帖報之子嵩取以白王因有是請丁丑尚書左丞馮澥權尚書右丞李回奉元祐皇后手書至濟州文武百官三上表勸進王答以俟入京城躬謁宗廟若鑾輿未還即撫定民庶權聼國事副元帥宗澤檄至京師戊寅尚書兵部員外郎唐恕知復州命中書舍人張澄措置排辦行在所至程頓事務直龍圖閣東道副總管權應天府朱勝非至濟州勝非邦昌友壻也械繫邦昌使者以兵來衛先是金分兵犯應天府勝非惶懼易衣逃匿民間皇皇㑹宣總司前軍統制嘉州防禦使韓世忠將官楊進引所部擊破之勝非復出視事民心稍安此據中興姓氏録勝非傳勝非南都翊戴記曰靖康元年冬勝非除東道副總管到南都三日都總管胡直孺提兵勤王竭本道財榖甲兵以自隨所餘羸卒僅三百人而食才支旬日既而敵執直孺以犯應天府縱火逼城為效用邵曇射中敵帥之目墜馬而死乃增陴浚隍益修守備躬擐甲胄與士卒同食余夜宿城上凡數月敵攻圍之計百出度而應之敵不能犯南京遂安按勝非此言不無飾說今不取世忠膚施人少年善鬬嘗犯法當死簽書彰武軍節度判官公事建陽陳豫惜其勇白經略使釋之始隸延安兵籍此據孫覿撰豫墓志已而為王淵部曲從討西夏方臘及山東河北諸盜屢有功至是以其軍赴帥府遂衛王如南京趙子嵩傳檄京師己卯侍御史胡舜陟言宗澤文字稱康王未忍歸朝欵謁宗廟竊恐謙虛退託未忍遽當大寶此去濟不逺乞遣京城父老僧道往濟迎請并令百官勸進以見推戴迫切之誠庶幾車駕早至闕下從之成忠郎黃永錫自京師回庚辰王發濟州命張換孔彥威劉浩丁順等悉以其軍從晚次新興店鄜延路馬步軍副總管劉光世引所部兵來㑹王以光世為五軍都提舉先是光世與經略使張深自潁昌進發次尉氏夜被帥府之命令光世領本部赴行府而深總大軍屯興仁深不自安遣屬官李觀先以兵籍來上遂自興仁如南京實録庚辰康王次新興張深劉光世自陜州至此蓋承汪伯彥中興日厯所書出李觀紀行録深以此月癸未至南京伯彥實甚誤簽書樞密院事曹輔資政殿學士路允迪右諫議大夫范宗尹至自京師辛巳通直郎知安陸縣陳規為朝奉大夫直龍圖閣知安德府賞守城之勞也時盜党忠戰敗遁去規招王存降之詔授存武翼郎而規有是命其官屬進士韓之美等皆授官有差東南道都總管趙子嵩等奏疏元祐皇后大略言陛下已垂簾聼政恐諸路先聞二帝北遷易姓改國忠義憤發兵革四起其間或假討逆之名竊據郡縣使宰臣至誠本心終不能白况其家屬在外或致踈虞伏望速下明命詔諭四方以臨朝遣使迎立康王庶幾人心安帖姦宄自消是日王次單州守臣中大夫王㬇率官吏郊迎東南道都總管趙子嵩延康殿學士何志同以所部兵來㑹㬇圭孫也圭華陽人元豐尚書左僕射壬午王至虞城縣先是陜州既陷西道副總管孫昭逺用其屬韓武張延齡計止河東綱於河池藉以募兵得數千人時西道都總管王襄尚留襄陽聞四方勸進遂㑹王於虞城實録壬午王至虞城西道總管王襄孫昭逺以所部兵來㑹此誤也按昭逺家傳昭逺此時尚在陜西王即位始召之蓋史臣承汪伯彥之誤而不深考爾癸未王至南京駐軍府治大元帥府榜近者金師深入奄及郊畿京都失守二聖播遷欲立異姓覆我宗社賴大臣因時權宜濟此艱危以存九廟保全生靈實社稷之大計乃心可嘉深慮官吏士民尚懷疑慮曉諭各令知悉甲申王率僚屬詣鴻慶宫朝三殿御容哭移時詔備車駕法物仗衛等詣南京迎請康王百司庶務各分其半龍圖閣直學士知揚州許份請王即位於揚州不許份將子也將候官人崇寧門下侍郎是日張邦昌詣南京見王且待罪中書舍人李擢太常少卿汪藻同行元祐皇后遣宗室士㒟乃了切押圭寶因密護之士㒟濮王曽孫郇康孝王仲御子也乙酉王時雍徐秉哲奉乘輿服御自京師至張邦昌繼至伏地慟哭請死王以客禮見且慰撫之右武大夫忠州防禦使屈堅為金人所殺初金人破陜府堅引所部救之圍解堅為敵所執堅曰始吾所以來為解圍也城茍全吾死何憾叱使速殺之後贈三官録其家五人丙戍元祐皇后遣內侍邵成章以乘輿服御來上尚書司門員外郎宋彥通為右文殿修撰元帥府以兵馬元帥顯謨閣待制汪伯彥副元帥徽猷閣待制黃潜善並為本閣直學士參議官樞密直學士耿延禧為龍圖閣學士徽猷閣直學士董耘落直字親衛大夫明州觀察使髙世則落階官為越州觀察使中興記伯彥等遷職在四月晦今從中興日厯丁亥詔政和海行法非御筆修立者許引用初議者請參用嘉祐元豐法以俟新書之成奏可去年九月丙子尋詔祿令用嘉祐斷刑依元豐至是復有此命此事欽宗實録不書今以光堯㑹要趙伯總奏狀增入據建炎日厯京東西路提刑司申明乃垂簾日指揮也起居郎胡交修為集英殿修撰知湖州交修宿孫也宿晉陵人治平樞密副使司農少卿權戶部侍郎胡思乞罷權職許之國子祭酒董逌率太學諸生詣南京勸進門下侍郎耿南仲兵馬元帥汪伯彥副元帥黃潜善進呈赦書事目常赦所不原者咸除之張邦昌及應干供奉行事之人一切不問凡命官流徙者悉放還罪廢者皆復故官職故事登極赦書不及惡逆而士大夫貶責者以次量移叙用至是南仲等一以邦昌僞赦為凖議者咎之此為李綱議赦令張本朱勝非秀水間居録云主上登極恩視前為厚者不欲令赦恩薄於僞赦故也參議官趙子嵩請一切放常平與係省積缺幕府有難之者王從其請即命著於赦文此據子嵩中外遺事初敵陷晉絳將及同守臣天章閣待制唐重度不能守開門縱士民使出自與殘兵數百守城以示必死敵疑有備遂不復渡河重募人間道抵京城久乃得逹王時雍授以官使歸報及是至同州具言二帝北狩王統兵在濟南重即移檄川秦十路帥臣各備禮物欲往軍前奉迎且招其友人成都府路轉運判官趙開入關計事開安居人也先是尚書吏部員外郎華亭衛膚敏奉詔逆髙麗賀靖康登極使者㑹京師陷膚敏以幣易銀帛得六千匹兩厚貺其使而移文遣之是月末髙麗使始離樂賔館凡留明州百三十餘日云初上皇行至邢趙之間金右副元帥宗傑請觀打圍遂遣郭藥師奏謝上皇曰天時如此非公之罪藥師慚而退燕王俁以絶食薨於慶源境上斂以馬槽猶露雙足上皇道中苦渴摘桑椹食之此並據曹勛所進北狩録至真定入自東門市人皆哭過河十餘日謂管幹龍德宫閣門宣贊舍人曹勛曰我夢四日並出此中原爭立之象不知中原之民尚肯推戴康王否翌日出御衣三襯自書領中曰可便即真來救父母并持韋賢妃信命勛間行詣王邢夫人亦脫所御金環使內侍持付勛曰為吾白大王願如此環早得相見并見吾父為道無恙賢妃已下皆哭上皇又諭勛曰如見康王苐奏有清中原之䇿悉舉行之毋以我為念又言藝祖有誓約藏之太廟誓不殺大臣及言事官違者不祥又宣諭嘗密賜王馬價珠犀合子及王嘗啓決河灌金人為驗勛陽翟人父組宣和中以閣門宣贊舍人為睿思殿應制建炎以來繫年要録卷四
