body:
  text: 建炎以來繫年要錄巻九十四宋李心𫝊撰紹興五年冬十月庚子朔賜宰相趙鼎銀帛五百匹兩對衣金帶一子六品服鼎力辭進書轉官故用元豐舊制而有是賜殿中侍御史謝祖信試宗正少卿詔户部鏤板下江浙荆湖旱傷州縣奉行寛恤指揮御史劾其違者竄責先是禁屠以禱晴而併及雞鴨右諌議大夫趙霈奏疏稱誦上徳以為齊宣王不忍一牛之比患在州縣不能推廣徳意而加實恵於民故有是㫖中書舎人胡寅讀疏笑曰諌職乃及此乎聞金中統兵有號龍虎大王者脫或入犯當以雞鴨諌議拒之熊克小歴載此事於今年六月又云時詔禁屠以禱雨霈言自来止禁猪羊而不及鵞鴨請併禁之皆小誤此事非霈違請兼霈六月間亦未為諌議也左朝奉大夫陳堯臣罷宫觀追奪所叙一官堯臣以表謝上有云孟軻豈畏於臧倉武叔何傷於夫子殿中侍御史王縉劾其不恭故黜辛丑詔四川沿邊州縣城寨官及一時應副軍期並委宣撫司選差其堂除併本路窠闕皆從舊制用都督行府請也壬寅秘書省著作佐郎張九成轉對上諭曰朕妙選天下士而省殿榜首皆卿門人九成頓首謝九成言我宋得天下以來其相𫝊家法臣輙斷之以一言曰仁而已仁之發見尤在於刑獄陛下臨御以來毎以省刑為急州縣小吏亦知仰體聖意毎於其情可憫其法可疑未嘗不敷奏以廣陛下好生之徳而案牘既多棘寺理官倦於披閲必求小故中以深文天意難欺人命至重陛下有恤刑之意而理官無致主之忠原其用心出於不逮臣愚欲計理官若干人立為定數凡天下獄案來上序其先後輪次看詳凡活㡬人並减磨勘庶㡬力有所分心當専一足以仰副陛下愛民之意事下刑部後不行九成所奏以是月甲辰送部左修職郎監懷安軍清酒務何伯熊為左承事郎充勑令所刪定官左宣教郎潼川府路兵馬都鈐轄司幹辦公事李弼直為太常博士二人皆蜀人弼直宣和間官太學坐主張元祐學術送吏部至是並召對而命之尚書右僕射張浚引疾乞奉祠其言有曰臣寖叨委使獨荷簡知不懲妄作之愆數至煩言之及詔不許仍趣赴闕浚引疾必有故當考是日上遣中使以所書車攻詩賜輔臣翌日趙鼎等奏謝上曰朕觀鴻鴈車攻乃宣王中興之詩今境土未復二聖未還當與卿等夙夜勉勵以内修外攘鼎曰陛下游神翰墨之間亦不忘恢復臣等敢不自勉武節大夫楊子儀為環慶路兵馬鈐轄用川陜宣撫司奏也子儀父可昇守慶陽為金所殺故録之詔川陜宣撫副使邵溥同提舉買馬官趙開措置即永康軍威茂州置場以茶博馬俟就緒日起綱赴行在其後開言三郡蕃部自來不係産馬地分兼威茂山路險惡仍隔繩橋即無馬路且去成都最近所以道路更不開廣令人馬通行兼威州後蕃有路接連熈河蕃部切恐茶貨轉至後蕃蹋開生路引惹邊事溥因言探報慕容洧常有窺伺疊宕州侵犯川蜀之意雖未悉虛實不可不過為隄備議遂寝溥以明年二月丙寅奏至甲辰右朝奉郎新除廣南西路提㸃刑獄公事范正國罷正國初自廣西漕召歸既對賜三品服以為江東轉運判官四月庚戌正國憚其難乞守郡後旬日改嚴州未行復有是命九月乙丑中書舎人胡寅言陛下加恵元祐勲賢之族既昭雪其黨錮之寃又錄用其子孫以至公之義照臨百官風勵天下非為利也凡預錄用者所宜激昂節行思不辱其父祖以稱陛下之意而乃乗時僥倖犯義營私無所不至外臺耳目之寄率勸列城非鮮亷寡恥者之所宜處也昔者純仁生存之時所得恩澤先及異姓次及疎族比其薨謝子孫尚多未命世以是髙其徳今正國陳乞先世恩澤凡四資盡欲官其諸子之在襁褓者而親兄之子年已長大貧窶不能自存反不及焉其行已處事如是亦可謂不肖子矣夫陛下以義行而正國以利報何其輕上施蔑大徳乎此而不正餘風相傚亦非所以恤故家之門户彰勲賢之遺烈也疏奏詔正國與宫觀是日經筵開講故事秋講以中秋前開及冬至罷至是以親試舉人故却日焉乙巳監察御史周葵守殿中侍御史詔廣東鹽以二分即本路通商餘一分官賣充漕計廣東鹽舊從官賣其後許通商於荆湖南北及吉州至是復有此命尋又増鈔錢為二十萬緡八年六月庚申所書可參考丙午復髙郵縣為軍以知縣兼軍事戊申殿中侍御史王縉請嚴義倉之法應州縣納到米數並别厫樁管不得擅有支動其有支移折變及就便輸納去處並通計一縣合收之數截留下户苗米於本縣送納上户折變數多願就納本色者聽從便庶㡬有以備水旱之變趙鼎進呈因言湖南江西嵗旱田畝災傷今秋成之際民間已闕食恐至來春大飢欲令常平司多方廣糴以備賑濟上曰朕聞江湖嵗歉夙夜為憂常平法自漢以來行之乃是救荒之政祖宗専用義倉賑濟最為良法比年多有失陷可降指揮申飭有司稽考之乃以縉所奏付户部後不行己酉罷宫觀月破供給錢自蔡京用事始剏祠官供給庶官依本資序降二等學士已上不降王黼繼相已除其法紹興令復舊至是除之都督行府言五馬山車股寨忠義首領沙真遣其徒趙元來白事乃補進義副尉令復徃撫諭書此以見五馬山寨猶在沙真其姓名又與趙甡之所記中山殺陳亨伯之人同當考庚戌尚書右僕射張浚入見浚既平湖賊遂自鄂岳轉淮東西㑹諸大将議防秋之宜直至山陽偽境震動上勞浚曰卿暑行甚勞然湖湘羣盗既就招撫以成朕不殺之仁卿之功也浚頓首謝曰䝉陛下誤知使當重任故臣得効愚計趙鼎沈與求曰湖湘既平則川陜血脉通矣他日遂可漸為恢復之圗詔浚母慶國太夫人計氏進封蜀國兄直徽猷閣滉賜紫章服賜浚銀帛千匹兩親屬二人六品服一人承務郎上親書周易否泰卦賜浚浚奏自古小人傾陷君子莫不以朋黨為言夫君子引其類而進志在於天下國家而已其道同故其所趨向不同曽何朋黨之有惟小人則不然更相推引本圗利禄詭詐之蹤莫可跡究故或為小異以彌縫其事或内外符合以信實其言人主於此何所决擇而可哉則亦在夫原其用心而已臣嘗考泰之初九㧞茅茹以其彚征而象以為志在外盖言其志在天下國家非為身故也否之初九㧞茅茹以其彚征而象以為志在君則君子連類而退盖将以行善道而未始忘憂國愛君之心焉觀二爻之義而考其心則朋黨之論可以不攻而自破矣臣又觀否泰之理起夫人君一心之微而利害及於天下百姓方其一念之正其畫為陽泰自是而起矣一念之不正其畫為隂否自是而起矣然而泰之上六隂已盡復變為陽則君子在外而否之所由生焉否之上九陽已盡復變為隂則小人在外而泰之所由生焉當今時適艱難民墜塗炭陛下若能日新其徳正厥心於上臣知其将可以致泰矣異時天道悔禍幸而康寜則願陛下常思其否焉上嘗召對便殿問所宜為且命以所聞見置䇿來上浚承命條列以進號中興備覽凡四十一篇莫不備具上深嘉歎置之坐隅言者謂州縣之間任職最劇而與民最親者莫如縣令理宜慎擇而委任之然銓部注擬之法悉限以資格雖貪懦鄙朴之人一或應格則大官大邑得以自擇今之大邑户口之衆財賦之廣其實一郡也任非其人而望賦役清平閭里安帖豈不難哉欲望朝廷行下逐路監司守帥條其逐路邑之最劇繁而户口至多者三五處朝廷遴選清平明察之人如前日預十科之目者徃為之稍優其祿廩而略其細故任滿日别考其治狀而褒擢之以為能吏之勸實恤民利國之要術也詔吏部措置辛亥皇叔檢校少師光山軍節度使同知大宗正事士㒟入對士㒟至平江省墓過國門故也癸丑保義郎朱聰充都督府水軍統領初聰率其徒數百人掠濱海州縣詔以承信郎招之聰不滿意知泉州連南夫恐其逸去以便宜補聰武節郎聰喜乞以所部海舟三十屯鎮江故有是命甲寅手詔撫諭江淮諸大帥尚書右司員外郎何慤與太常少卿董弅兩易以慤引張浚親嫌故也右廸功郎陳淵充樞密院編修官給事中廖剛中書舎人胡寅朱震權户部侍郎張致逺言淵乃瓘之諸孫有學有文通逹世務自瓘在時器重特甚垂老流落困於饑寒負材未試善類嗟惜少加任使必有可觀故有是命左朝散郎何鑄充諸王宫大小學教授鑄餘杭人也武翼郎閤門宣贊舎人文廣以與平湖冦之勞遷武略大夫乙卯端明殿學士荆湖南路安撫制置大使兼知潭州席益為資政殿學士成都潼川府䕫州利州路安撫制置大使兼知成都府先是川陜宣撫副使吳玠與都轉運使趙開不咸玠疊以饋餉不給訴於朝開亦稱老病求罷故命益徃帥詔以益前執政序位在宣撫副使之上逐州兵馬並𨽻大使司如邊防𦂳切大事即令宣撫司處置其調發𨽻都督府逐州兵馬𨽻大使司十一月丁亥降㫖觀文殿大學士提舉西京嵩山崇福官李綱為江南西路安撫制置大使兼知洪州初張浚之謫福州也綱亦寓居於福二人相見除前隙更相厚善至是數於上前言其忠趙鼎嘗為綱辟客亦為上言綱才器過人故有是命綱辭上手書敦諭有曰朕之用卿審矣卿宜以安社禝為己任勿間中外勉為朕行不必數有請也綱請過闕入覲上許之朱勝非秀水閑居錄云李綱拜相再閲月御史張浚黄潛善所引力攻綱至貶海南浚出使陜蜀富平之役追還薄譴俾居福州而綱自南遷回亦寓是州焉先是綱百計求復用富於財交結中外不效及浚至綱謂此竒貨財可以傾心結納浚亦自云深悔前日之言相與歡甚紹興四年冬金齊合兵犯淮泗朝廷震恐宰相趙鼎者嘗失身於偽楚初無敢薦者而浚獨薦為言事官鼎徳之至是乗急變召浚復秉樞機召命下綱贐行百餘奩皆珍異之物又以論時事疏托之浚至行在即日進綱疏且降語奨諭明年敵退鼎左相浚右相並兼都督即起綱帥豫章許其入覲又日李綱靖康初以右丞充御營使謀刼敵砦失利罷政遂興伏闕之變京城大亂淵聖大懼除綱知樞密院事綱堅卧不出衆益亂淵聖益懼於是賜予無度晝夜絡繹擁集門巷行路不通有人約計物價不啻百餘萬緡三月太上皇歸自江浙以綱為迎奉使上皇畏之羣閹尤畏之日加重賜隨行珍竒既盡至觧御服犀帯賜之宸翰褒嘉其實懇告聞者扼腕至於拜綱宣撫使徃援太原賜予金二萬兩他物稱此由是綱之私藏過於國帑多矣乃厚自奉養侍妾歌童衣服飲食凡資身之具極於美麗毎饗賓客殽饌必至百品毎出道路厨𫝊常至數十擔其居福州也張相浚自福被召贐行一百二十合合以朱漆縷銀裝飾様製如一皆其宅庫所有也按浚綱初不相咸其後相好當以國事而勝非直勢利之交詆之恐非其實上賜綱親筆在十二月癸丑綱乞赴行在奏事在明年正月丁亥鎮南軍節度使開府儀同三司提舉臨安府洞霄宫吕頥浩為荆湖南路安撫制置大使兼知潭州頥浩未之鎮上賜親筆趣行徽猷閣直學士知洪州兼江西安撫制置使胡世将試尚書兵部侍郎樞宻院檢詳諸房文字陳昻直顯謨閣知信州直秘閣新福建路提㸃刑獄公事范直方為樞宻院檢詳諸房文字徽猷閣直學士新知西外宗正事趙子淔為江南西路都轉運使顯謨閣待制提舉江州太平觀李迨為兩浙路都轉運使始用張致逺之言也直龍圗閣新知江州向子諲為江南東路轉運使直徽猷閣添差兩浙轉運副使李謨知鎮江府丙辰尚書禮部貟外郎許摶知撫州從所請也丁巳秘書省正字喻樗面對言今嵗省試所得二百人其間嘗業於太學者殆百二十人今學校漸廢非長育人材為久逺之計欲望姑即府學増養之員嚴補試之法擇學行有文之士一二人以為教官其餘諸路亦遴其選令帥守擇士之頴異者具以名聞陛下訪之近臣随材褒賞庶㡬海内嚮風人材軰出事下禮部未及行詔商販米斛徃旱傷州縣者所過免收力勝税時江東漕司以為請故右諌議大夫趙霈奏除之故文林郎范正平贈直秘閣予一子官正平純仁長子也以忤蔡京故陷黨籍不出仕終身為選人正平餘官第五十五人戊午布衣陳得一造新厯成賜號通微處士官一子中書舎人朱震以監視之勞進秩太史局官吏推恩有差詔川陜類省試合格第一名依殿試第三名例推恩餘並賜同進士出身特奏名人令宣撫司置院差官試時務䇿一道以道逺舉人赴殿試不及故也左從事郎饒廷直特改左宣義郎通判泰州廷直為袁州司法參軍以宣諭官薦對而有是命延安府進士雷粲特補下州文學己未進士晁戩特補下州文學以嘗有掩殺石陂盗之勞也庚申故承議郎吳儔贈直秘閣官其家一人儔育孫也名在黨籍用其家請而賜之儔餘官第三十九人直秘閣添差通判平江府史願進職一等願燕人嘗著金人亡遼録行於世已見紹興元年四月庚辰史願為江東宣撫使張俊辟客上召對而有是命吏部侍郎劉大中乞以修書一官囘贈其祖瑾詔贈瑾右承務郎辛酉中衛大夫成州觀察使江南東路馬歩軍副都總管劉光烈復為帶御器械前此已除劉光逺代光烈而日歴但於此日書帶御器械劉光烈放告謝未知何日冄除也光逺此月丁夘差知蘄州右奉直大夫川陜宣撫司幹辦公事安邡為成都府路轉運判官邡惇子惇新眀人崇寜同知樞宻院事王似所薦也宣撫司以便宜㧞授至是命之日歴十二月二十二日辛酉安邡除成都府路轉運判官而本司題名邡以今年八月五日到任則是宣撫司所差也按此時宣司久已罷便宜之命而尚除監司盖蜀中去朝廷逺命令多不奉行耳邵愽撰邡墓誌云通判成都府府尹為宣撫副使薦充幹辦公事遷成都路轉運判官亦不云何年所除今併附此更俟考詳吏部侍郎兼詳定一司𠡠令晏敦復請三公三少三省長官俸給並依嘉祐禄令宰臣所請則例修立從之先是政和禄格比嘉祐所給増多故本所以為請壬戌上諭輔臣曰比類得二聖安報朕當親筆詔諭四方使知朕朝夕不忘二聖之意庶㡬人人感奮遂降手詔諭天下徽猷閣待制提舉江州太平觀姚舜眀卒甲子祕閣修撰都督府諮議軍事郭執中為徽猷閣待制樞宻都承㫖兼都督府參議軍事乙丑淮東宣撫使韓世忠奏偽齊遣沂海州等簽軍攻犯漣水軍世忠遣統制官吉州刺史呼延通等引兵擊殪之所脱無㡬上曰中原赤子為豫逼脅死於鋒鏑良可憫也可令収拾遺骸埋瘞設水陸齋追薦仍出榜曉諭使彼知朝廷矜恤之意乃賜通袍帶将官拱衛大夫貴州刺史王權已下金椀仍以通為果州團練使權領果州團練使餘将士推恩有差武功大夫忠州團練使新知邵州楊珪母太宜人郭氏特贈感義郡夫人以中書言郭氏在偽齊獨令珪還朝歸正郭氏拘留死於偽地故也丁夘右宣教郎䕫州路提㸃刑獄公事蘇符賜同進士出身守尚書司勲員外郎殿中侍御史王縉言初出官人監嶽廟理資任若便許用舉主闗陞及年限磨勘不惟僥倖太甚兼恐偷惰茍且習以成性乃所以壊人材非所以成之也欲乞應初出官監嶽廟人年未及格並不理資任選人候釐務書考纔許薦舉釐務實給三考無出身通理四考纔許用舉主闗陞承務郎以上釐務磨勘一依舊法自後未經𠫭選人并父祖見任通判以上及宫觀通判請給者更不差監嶽廟所貴人知自勉異日可􅊀選用詔除用恩例除乞外更不許差餘依見行條法武功大夫髙州刺史劉光逺知蘄州兼淮南西路兵馬鈐轄仍免迴避劉光世戊辰直寳文閣新知衢州曽紆卒己巳詔前宰執所舉京官状不理為職司時言者論宣諭所薦即得遷官替罷召對間被陞擢而執政所薦止可充一人之數亦倒置之甚矣至於任嶽廟之人朝廷初以員多缺少姑使之就禄今也有求前執政舉状五章而改官者亦可謂濫矣今相度欲以前執政所舉改官人易以司馬光十科之目嵗薦五員無則闕之被薦者中書籍記姓名以備選擢庶㡬上以重大臣之薦下以革濫進之弊都省勘㑹所乞難行但罷前宰執理當職司而已詔兩浙轉運司計本路嵗當給職租實數權行収糴一次毎石給省錢五千以上供錢償其直時兵食増廣故户部奏行之是月祫享太廟祖宗並為一列不序昭穆謂之随宜設位以廟之前楹廹狭故也右朝奉大夫新知普州喻汝礪上言言蜀罷國也左無秦隴以為隱蔽右無襄鄧以為垣墉昨者金人驅兵約齎深入和尚原險要之地已屬之於秦矣金引兵下清泥嶺薄仙人闗前眺鐡山我無東北蜀之飛鳥不踰河池則惴惴之蜀豈不甚病也哉鐡山属興州河池属鳯州正當川陜兩界尚賴陛下英武之威吳玠等極力拒守敵遂引去夫所謂和尚原者鳯之東境距寳雞縣纔兩驛抵鳯翔不能百里我若屯兵其間則可以下窺秦雍而於函洛之路未絶也所謂仙人闗者興之東境距利州纔七驛自利抵劍門闗百里而贏今我退守仙人闗則蜀之險要所失過半敵既到仙人闗習知山峡隘險難以進兵必相與籌量别生計䇿他日分兵數道並進一軍自階成趨文政鄧艾由隂平路一軍自梁洋經米倉山入巴閬往年敵自興元攻米倉山欲入巴州一軍自均房由逹州山路入䕫峡此開元時涪州進茘支路其山後距子午道甚近復以一二千人攻仙人闗以綴吳玠勢分形散所備皆急一處破壊則在處震蕩此其可憂一也臣嘗日夜深計而苦思之謂可以擣敵之虛解蜀之紛者特有襄漢一條路耳日夜跂望朝廷威令一振兵力復全亟命偏師出襄鄧間可以直擣商虢徑薄秦雍此觧蜀一竒也今廼傳聞李横跳去李成已據襄陽則襄漢路斷何由挿手復聞李成經理襄陽稍有科條歸附漸衆耕闢亦多使年嵗間勢且張大則必引兵侵蝕荆渚荆湖道路便復隔絶江吳巴蜀離而為二庸蜀之人雖係心於朝廷其何能以自逹此其可憂二也夫一里之險而動千里之權者地利也然敵至仙人闗暫攻而不久留者何也艱於糧故也若使秦中治廢邑聚散民字孤恤老以益其衆耕田疾作以益其粟則得吾地而可守矣入吾境而可留矣偽齊之力未暇大舉然必嵗踐吾境者何也政以困我故也輕師以索戰而使吾有大兵久駐之勞約齎以深入而使吾有犇命轉輸之苦吾所以待之者不過斂兵依嶮而已非有以逆撃之也不過尾賊出境而已非有以厚勝之也如此數年蜀之財力俱盡此髙熲平陳之䇿也是其可憂三也爰自緫領司行鹽酒之䇿失羌夷之和於是叙州諸羌攻陷諸寨官吏殱夷百姓奔遁若使金人摶其胷諸羌掎其背四川老孺何所遺死耶况黎雅石泉所在諸羌山谷聮綿徑道秦隴倘使金人乘諸羌懐怨之隙啗以金帛約以攻我不知何以禦之此其可憂四也臣雖至愚於此有二䇿焉其一則經理興元其二則措置荆襄漢中之地嶮塞沃野土壤膏腴物力浩廣髙祖因之以基漢業徳宗資之以復唐祚昔人以為蜀之股臂也今則城池邱墟屯戍荒圮宣司雖復差官然亦但為文具守臣之寄處也既無保境附衆之心士伍之暫習也又無専軍必守之計緩急之際果可恃乎願陛下擇文武能臣以為之相險要塞谿隧環壘塹設屯守平居則重闗錯守以捍其衝有事則諸屯併力以壓其入蜀之所以備敵者特仙人闗一軍耳文武之衝朝天之險米倉之隘非有别也以制敵之不意也借使金人盡銳力攻前軍毁敗事勢差跌别無後繼不知何以遏之乎宣司諸人慮患不逺敵来則憂敵退則以為四川恢然無復事矣論功差賞以縻其財差官除吏以售其私於此大莭未嘗痛講而候吏已報敵騎之復来矣日者和尚原至仙人闗退舎失地凡五百里臣愚不知宣撫司亦復状其實以聞朝廷乎側聞陛下昨者却宣司之請寝移司之議臣竊壮之願陛下命文武重臣鎮撫江陵跨吳蜀要害之衝窒李成并吞之謀専楊么舟楫之利亟於此時治兵荆楚使川蜀一軍當秦雍江陵一軍拒襄鄧劭耕勸戰招徕流庸俟以嵗月稍復就緒然後六騑濟江以為雍容駐蹕之地於此可以捄援川蜀覆蔽吳㑹出軍宛洛通車三秦是則荆楚之地天所以假歸途而濟中興者也若不趣行經理一為敵有則巴蜀其能久存乎吳越其能久無事乎議者必曰今解潜已在江陵王􅊛已在長沙又何以别遣重臣臣愚以為解潜兵力衰單王􅊛孤軍逺客兵力衰单則勢寡怯而不足用孤軍逺客則懐去就而不盡死願眀詔大臣差其人素能御衆有威信方略者然後付以此寄使之重兵精甲坐扼襟要繕治城壘訓耕峙糧楊么不攻而自困矣李成不戰而自蹙矣汝礪此書據文集及文譜皆云今年所上但書中所言李成楊么二事以史考之么今年六月方破則汝礪在蜀十月間容有未知而岳飛去年五月収復襄陽距此時已五百餘日乃復不知何也若以為去年十月所上則未應繫普州銜且附此俟考偽齊劉豫令民鬻子依商税法計貫百而収其筭偽知青州李儔罵右丞相張昴口可溺豫批理合誅戮尚念儔昨係江南守臣随軍歸附特與寛貸追五官與虢州盧氏添監
