body:
  text: 建炎以來繫年要録卷一百四十四宋李心傳撰紹興十有二年嵗次壬戌二金熙宗亶皇統年春正月案是月乙未朔壬寅詔建國公出外第可依親賢宅差提㸃官并都監直祕閣賜緋魚袋張子顏子正並進二官升直敷文閣右承奉郎賜緋魚袋張宗元為右宣義郎直祕閣宗元樞密使俊孫也俊自鎮江還朝行府結局乃乞罷機務章四上不許時俊所部在建康未有所付俊薦本軍統制清遠軍節度使王德可典軍乃以德為建康府駐劄御前諸軍都統制熊克小厯於此併書田師中除鄂州都統恐誤師中之除在三月丁未今别附本月日趙甡之遺史附德正除在今年十二月壬申案建康一軍兵最多不應許時無主帥今具附此當求它書參考癸卯上謂大臣曰朕於宫中無嗜好惟好觀書考古人行事以施於政凡學必自得乃可用第與古人㸃姓名何所益也中興聖政史臣曰稽經以出治猶按醫以治病也造之不深則醫或至於殺人而治或至於害天下帝王之學尤貴自得深造之則默而識矣左右逢原則神明生焉入內內侍省押班藍圭為內侍省副都知右武大夫密州觀察使衛茂實為昭宣使入內內侍省押班茂實改使銜在乙卯徽猷閣直學士提舉亳州明道宫廖剛上表還政詔進一官致仕樞密行府奏升天長縣為軍割盱眙招信兩縣隸之仍於盱眙縣置𣙜場熊克小厯五月丙申詔於盱眙軍置𣙜場誤也蓋是日户部狀云近承指揮於盱眙建置𣙜場而克誤以為事始耳兼盱眙升軍在五月辛丑克重疊差誤乙巳詔大理少卿薛仁輔持心不平用法反覆祕閣修撰知宣州李若虛附麗罪人好惡自口可並罷仁輔之罷必是議嶽飛獄不合當考戊申御史中丞万俟卨大理卿周三畏同班入對以鞫嶽飛獄畢故也尚書省乞以飛獄案令刑部鏤板遍牒諸路有進士智浹者汾州人知書通春秋左氏傳好直言飛以賓客待之飛初下吏浹上書訟其寃秦檜怒併送大理獄成浹坐決杖送袁州編管云此以趙甡之遺史參修但甡之稱飛死浹上書訟飛之寃則恐誤蓋浹與飛同結案也令略修潤令不抵牾浹降旨編管在去年十二月晦日其行遣當在此時今日頒降獄案附書之敷文閣待制知徽州朱芾祕閣修撰李若虛並落職芾仍罷郡右諫議大夫羅汝楫論二人頃嘗為嶽飛謀議官主帥有異志而不能諫至於若虛則又公肆欺罔昨飛方用師於京西若虛遽自軍前還朝謂敵人不日授首矣而所憂者他將不相為授伏望並賜黜責故有是命先是祕閣修撰提舉洪州玉隆觀薛弼為飛參謀官與飛厚秦檜之間居永嘉也弼舊遊其門万俟卨又善之繇是無一詞纍及飛之在鄂也有左朝奉大夫王輔者嘗知彭山縣以贓敗遂依飛軍中飛亦厚待之至是輔遣其子孝忠上書指飛為姦凶隂合檜意檜喜由是脫罪籍尋擢知普州輔上蔡人也大理寺丞何彥猷李若朴並罷右諫議大夫羅汝楫論比間嶽飛之獄已具朝廷召寺官聚斷咸以飛之罪死有餘責獨二人喧然力以衆議為非務於從輕故黜之趙甡之遺史稱何彥猷李若朴謂飛罪當徒二年已見去年十二月癸巳注甡之又稱周三畏有豈惜大理卿之語然獄成之後少卿薛仁輔罷去而三畏遷刑部侍郎後八九年乃始被論則此語未必有也更須詳考中書言専差到三省樞密院吏人六名行遣制勘文字參照案牘委得平允頗見究心詔各轉一官資中書吏行遣制勘文字前此未有故出之詔升安豐縣為安豐軍以夀春霍丘六安三縣隸之遂以武經大夫忠州團練使知夀春府孫暉知軍事庚戌詔建國公就外第加檢校官郡王令吏禮部太常寺討論祖宗故事申尚書省取㫖右朝請大夫知鎮江府兼沿江安撫使劉子羽復徽猷閣待制樞密使張俊以子羽料敵及治行聞故有是命辛亥增福建鈔鹽錢十萬緡以鬻鹽增羡故也武經大夫御前忠鋭第五將兼樞密院提轄軍兵劉通知天長軍通當是劉實之弟壬子顯謨閣學士知洪州梁楊祖為尚書兵部侍郎丁巳武節郎兼閣門宣贊舍人新兩浙東路兵馬鈐轄王安道罷安道繼先子始以僥冒補轉故殿中侍御史胡汝明論之上曰艱難以來諸路將兵尚多闕額而見在者又不練習止充雜役甚非置將招兵之本意今和議雖成充嚴武備可督諸路招填將兵至於將官亦須擇人前者多以子弟及堂吏為之安能稱職乎人才各有所長子弟堂吏使子為將是違其所長非用材之地也戊午資政殿學士提舉臨安府洞霄宫富直柔落職坐前守泉州誤殺流罪因也法寺富直柔係第四從官減外罰銅十斤案奏特有是命録事司户參軍各追一官勒停通判職官衝替典史分配嶺南事初在去年五月庚申屯田員外郎劉無極祕書丞孫汝翼並罷以御史中丞万俟卨言無極者孫近之黨而汝翼者范同之黨刺探時政竊議於外必欲近同復用以逞其私故也庚申宰執奏事上曰今議和既定淮南漸可理又須於近江種田畝築城都庶不為敵資若廣為儲蓄非特足以禦敵爾吏部尚書兼侍讀資善堂翊善吳表臣兼權直學士院起居舍人張廣守起居郎尚書右司員外郎楊願試起居舍人將作監丞李若谷為尚書屯田員外郎資政殿學士提舉臨安府洞霄宫孫近落職御史中丞万俟卨論近頃帥紹興與士㒟交通甚密及近執政或得禁中密語往往漏之方諸帥還朝並置右府近遂唱為議論不合之詞欲深結將帥之私恩及聞烏珠屯泗之始嶽飛就鞫之初則每對賓客喜生面顔故有是命左中大夫樞密行府參議官郗漸知宣州尋又除直祕閣漸除職在是月癸亥右奉議郎浙東沿海制置司參議官措置料角斥堠馮由義知和州辛酉起居舍人楊願兼權中書舍人端明殿學士知台州胡交修卒癸亥左通議大夫孫近責授左朝散郎祕書少監漳州居住以万俟卨論其謪輕也左中大夫充祕閣修撰添差通判平江府史願充敷文閣待制知鼎州右承議郎新軍器監丞張子儀為右朝奉郎皆用樞密行府結局推恩也其餘文武官屬十二人並進一官選人改京官二月乙丑朔直徽猷閣添差䕫州路安撫司參議官王良存先次放罷以嘗為嶽飛隨軍漕故也軍器少監鮑琚檢察拘收前湖北京西宣撫司錢物還行在後六日擢琚為尚書右司員外郎丙寅左朝奉大夫知大宗正丞段拂行尚書祠部員外郎以宗室士夽薦其才識故有是命戊辰尚書右司郎中莊必彊左司員外郎錢葉並罷以言者論二人皆范同所汲引隂懷異議惟恐同不復用故也己巳上謂大臣曰征戰之事各有地利北敵騎兵雖中國所不能及若要馳騁於江淮恐未易得志孫權偏霸一方而曹魏竭天下之力終不能渡江晉室微弱而苻堅百萬之衆敗於淝水拓拔魏雄據中原而歷六朝衰亂終不能奄有江表自非大無道如孫皓者豈能致北兵之得志乎今但修政事嚴武備北兵雖强不足畏也尚書考功員外郎鄭朴為右司員外郎庚午婉儀張氏薨輟視朝二日贈賢妃葬城外延夀院其弟閣門宣贊舍人莘進秩三等仍官其二姪本閣官吏遷官有差初建國公之少也育於妃所及是吳婉儀收而併視之與崇國公璩同處雖一食必均焉此以紹興三十二年四月丙午宣論聖語修入入內西頭供奉官黃彥節除名枷項送容州編管彥節嘗為嶽飛軍中承受後轉歸吏部飛憐其貧遺錢三千緡且薦為睿思殿祗候上不許飛死乃抵罪辛未上謂大臣曰詩書所載二帝三王之治皆有其意而不見其施設之詳太祖以英武定天下仁宗以惠愛結天下此朕家法其施設之詳可見於世者也朕當守家法而求二帝三王之意則治道成矣中興聖政秦檜等曰陛下英武如太祖惠愛如仁宗其致中興必矣詔建國公瑗出外第初命福建漕臣即李綱家市兩朝所賜犀玉帶至是綱妻越國夫人張氏以玉帶二通犀帶一來上詔以錢萬緡償之丁丑保慶軍節度使建國公瑗為檢校少保進封普安郡王時年十六王天性忠孝自幼育宫闈起居飲食未嘗離膝下上尤所鍾愛熊克小厯云上與皇后尤所鍾愛蓋因張闡聖德事蹟所云也案此時憲聖慈烈皇后初封婉儀闡所云乃追書之耳克不考詳是以小誤令將憲聖保祐事依宣諭聖語先附此月庚午更不別出制下日者尤若訥私謂祕書省正字張闡曰普乃並日二字有合乎易所謂明兩作離之象殆天授也己卯殿前都指揮使楊沂中賜名存中監察御史陳時舉為尚書考功員外郎賜昭慶軍節度使開府儀同三司韋淵浙西田通舊為五十頃臨安府房緡日二十千先是淵陳乞恩數二十餘事又乞賜田五百頃許賣酒上皆不從至是有司詢故例於䕫州觀察使陳仲堅乃得其實故有是賜焉是日川陜宣諭使鄭剛中左中大夫四川轉運判官兼宣撫司參議官李觀與金大使鎮國上將軍沁南軍節度使烏凌阿贊謨副使奉政大夫行臺尚書吏部郎中孟某相見置酒於百家村先是詔宣撫副使胡世將遣近上參議官從剛中至界首約官商議具奏至是剛中觀與閣門祗候宣撫司幹辦公事范之寧偕至鳳翔境上贊謨等亦以檄來言坐都元帥府指揮可計㑹江南差來官從長相度交割今欲自鳯州分界先二日二月丁丑之寧至寶雞縣與贊謨議相見之地贊謨言欲至鳳州相見之寧曰宣諭已過二里矣二里在和尚原之北議不諧而罷剛中檄贊謨云元得指揮只是商議仍須取㫖即無便許交割之文竊詳交割與商議事理大段不同未審令來欲於何處分界消與不消商議贊謨回牒陜西地界既未指揮須先商議即無便交割之理所有該稱何處分界亦候相見臨時計議至是贊謨與剛中相見首謂階成祐鳯商秦六州當還上國剛中與論久之贊謨曰階成祐鳯倘未見還當先還我商秦二州須以大散關為界剛中願示公文當奏取㫖贊謨出檄云已差交割官矣剛中持不可贊謨曰講和而不退和尚原兵馬何也剛中曰割地之㫖朝下兵晚退矣贊謨又欲遣人於大散關立界堠剛中觀不從各上馬去世將具奏曰臣竊觀和尚原及商秦州險地之要並係川蜀緊要門户若為金國所占委有利害已具奏陳未準回降指揮伏乞檢㑹深賜酌速降處分臣謂薩里罕等前年冬帶領軍馬五萬攻打和尚原本司遣兵捍禦薩里罕為見有備不敢入險復回長安去年春珠赫貝勒萬衆侵犯商州地名洪門芍藥等處本司遣兵殺退去年冬薩里罕欲復秦州本司遣兵捍禦薩里罕相視秦州高險城守嚴備重兵在後不敢攻打退遁前去以此可見和尚原秦商州三處金人屢欲窺伺終不得志正係控扼川口必守之地若為金國所占萬一有警委難枝梧利害至重乞賜詳酌辛卯世將奉詔令與剛中照吳玠劉豫所管地界分畫世將乃言秦州元不係吳玠地分合自秦州南以吳玠元管界至分畫商州元不係吳玠所管分合自商州南以吳玠元管界至分畫和尚原方山原兩處昨自建炎四年係吳玠創立山寨原不係劉豫所管地分界至令來合行保守臣已牒鄭剛中照應分畫去訖和尚原係川蜀緊要門户比之秦商二州所係利害尤重臣已纍具論奏乞賜速降處分疏入詔世將具兩奏不同因依時金人必欲得和尚原故有是命烏凌阿贊謨事以費士戣蜀口用兵録修入張滙節要言烏凌阿思謀為沁南軍節度使不知思謀即贊謨名祐州即岷州金避阿固達名改之令依國書修入壬午輔臣進呈殿中侍御史胡汝明論監司不按吏上曰朝廷分道置使正欲譏察州縣可申嚴行下若州縣贓汙不法而監司不能按致臺諫論列者當併黜之中興聖政史臣曰君天下者寄耳目於臺諌而又以其視聽之遠者寄於監司內外相及故能承上後世憂州縣無狀至乃朝出御史暮遣觀風以督守令若非所督於監司者彼何憚而不拱視哉丙戍上曰學校風化之原不可緩也上又曰福建所買牛第二綱可發來臨安借與人户朕聞民間乏牛皆以人耕田其勞可憫朕令畫以人耕田之象置於左右庶不忘耕穡之艱難漢文帝每下詔必曰農者天下之本若文帝可謂知民事之本矣龍神衛四廂都指揮使保順軍承宣使鎮江府駐劄御前諸軍都統制解元升充侍衛親軍馬軍都虞侯元韓世忠部曲也至是代將世忠之軍故擢之丁亥言者請自今鞫獄必差經任人上曰文學政事在孔門中自是兩科令士方離科舉未親民事遽使之鞫獄安能盡善也其從之戊子金主亶大赦自來亡命投在江南人見行理索候到並行釋罪其職官百姓軍人並許復故先是簽書樞密院事何鑄知閣門事曹勛至金國見亶於春水開先殿具陳上意力加祈請伏地者再鑄不能言亶令起之曰先朝已如此行豈可輟改勛反覆懇請語甚切至亶首肯數四大帥傳命使之歸館尋有館伴張鈞來言皇帝及國王見使人所言甚喜次第有恩也是晚館伴耶律紹文楊仲修至館又傳金主命早來使人上殿所請宜允仍出回書示之許還梓宫太后且遣鑄等還金主赦文據紹興講和録烏珠所上第七書修入熊克小厯載何鑄見金主於春水開先殿力加祈請伏地者再大帥烏珠傳命使之歸館有館伴使張鈞來言皇帝及國王見使人所言甚喜次第有恩也以講和録所載烏珠七書考之自去冬及今春烏珠皆在軍中但遣鑄往北地今略刪潤附入更須詳考初奉使徽猷閣待制洪皓既至燕金主聞其名欲用為翰林直學士皓力辭至是赦文復令南官換授皓請於參知政事韓昉乞於真定或大名養濟為逃歸計昉怒遂換中原副留守再降為承德郎留司判官趣行者屢矣皓迄不就職活適撰行述云宇文虛中既換金官欲扳先君分譴乃力薦於金庭辭獲免虛中為詳定禮文使始造赦其文復及換授先君詆於金相韓昉云云昉怒虛中贊其決遂換副留守又降承德郎其後金議遣奉使人各還其鄉因赦及之先君實以饒州聞故在遣中案還奉使赦在十三年六月庚戍則換官赦即今年也故附於此日行述稱韓昉為金相他書皆無之臣嘗從故給事中范仲藝家見金中印行翰林直學士趙可文集有代人作上京慶元宫碑序云太祖武元皇帝睿德神功碑實故參知政事韓昉之所作則眆此時為執政也今略修潤書之己丑吏部尚書兼資善堂翊善吳表臣權禮部尚書兼資善堂翊善蘇符權禮部侍郎陳桷郎官方雲翼太常丞丁仲京博士王普主簿蘇籍並罷坐討論典禮並不詳具祖宗故事専任己意懷姦附麗故也惟太常少卿施坰居職如故此奏坰何以不連書當考坰三月甲寅兼權禮部侍郎雲翼永嘉人先是表臣等奉詔討論普安郡王進封典禮與大臣所議不同故黜臣嘗以此事問於符之孫宣教郎植亦不能知其詳林泉野記云初趙鼎議立普安思平二郡王為皇子秦檜不欲宗强勸上曰鼎欲立皇子待陛下終無子也宜俟親子乃立案表臣本鼎所薦所謂附麗或指此也然上意固自屬普安久矣鼎亦未嘗乞立恩年野記蓋小誤辛卯給事中知貢舉程克俊等言博學宏詞科右丞務郎洪遵敕賜進士出身沈介右從政郎洪適並合格遵適弟介德清人也秦檜以所試制詞進讀上曰是洪皓子邪父在遠能自立此忠義報也可與升擢差遣上又言遵之文於三人中為勝遂以遵為祕書省正字介適並為敕令所刪定官自中興以來詞科中選郎入館自遵始遵除正字在五月庚辰今聨書之是日鎮江府城外火延入城中遂及大軍倉燔米麥四萬斛芻六萬束公私室廬被焚者甚衆守臣劉子羽坐貶秩時太平州池州蕪湖縣亦皆大火市井一空壬辰知閣門事鄭藻等奏普安郡王朝班乞與禮部太常寺御史臺同討論申尚書省詔合立本官班又詔普安郡王上下馬侍班幕次及合與不合諸處朝謁燒香等事並令所屬指定御史中丞万俟卨等奏當於宗室正任閣子內侍班太尉之後行馬太常少卿施坰等奏不應詣諸處朝謁燒香提㸃皇城司錢愐等奏合於宫門外上下馬並從之三月案是月甲午朔乙未詔普安郡王朝朔望國子監丞何許罷先是御史闕官許嘗特被引對而不果用至是言者疏其罪且謂因諂事劉大中薦於趙鼎故黜之己亥給事中兼侍讀權直學士院程克俊兼資善堂翊善祕書少監兼崇政殿說書秦梓兼贊讀以崇國公璩未出閣故也庚子樞密院編修官趙衛大理司直錢周材並改合入官為普安郡王府教授壬寅王出閣就外第命宗室正任已上送之周材江寧人御史中丞万俟卨兼侍講右諫議大夫羅汝楫兼侍讀案任盡言論秦檜云每除言路必與經筵蓋録乳臭之雛實忝金華之講案此時秦梓實兼崇政殿說書又不待熺勸講之日矣中書舍人兼侍講兼實録院修撰王鉌卒賜其家銀帛百五十匹兩丁未龍神衛四廂都指揮使定江軍節度使御前統制田師中陛充殿前都虞侯鄂州駐劄御前諸軍都統制張俊力薦師中代掌嶽飛軍先數日上諭輔臣曰朕欲面委師中營田之事儻區處得宜地無遺利便可使就糴以充軍賦軍賦既足取不及民則免催科之擾輸送之費可以少寬民力若乃規其入以供公上非朕所欲也既又賜師中銀帛萬匹兩為犒軍之費至是特降制命之師中至武昌軍中初不伏統制官傳選李山郭青輩往往乞罷去撫諭久之稍定上諭輔臣語在是月壬寅賜激賞銀絹在甲辰今並附此徐夢莘北盟會編云師中專務結托內侍以為助故能久其權武安軍承宣使御前統制權鄂州都統制王貴添差福建路馬步軍副都總管罷從軍詔兩淮漕臣嚴切禁止私渡過淮之人毋得少有透漏日厯無此令以五月二十七日淮西轉運司乞差渟州通判狀參入侍衛親軍馬軍都虞候雄武軍承宣使御前統制關古卒於建康府贈昭化軍節度使諡毅勇己酉都亭驛成庚戌左承事郎趙衛左宣教郎錢周材並為祕書省校書郎兼普安郡王府教授二人之始除也上皆召見改京秩至是又申命之權工部尚書莫將刑部侍郎周聿自京西割地還行在時金人遣李成以兵行境上邊民驚擾紹興講和録皇朝又書即日春和伏惟鈞候起居萬福某前日遣人往泗州上狀續次津發耶律溫今必皆達府下近據邊界申報合具咨稟唐鄧界上緣李驃騎將軍帶甲軍到來民户不知多有驚移陜西隴城寨將官王吉帶領軍馬於沿坊鎮等處行劫孳畜驅掠户口殺害人民致使相近去處皆不安帖切慮引惹生事致傷和好敢望嚴賜約束實為幸甚兼告指揮泗州今後有書信即為收接發納庶得情懇即逹不致留滯向暖切冀倍保鈞重不宣尚書右司員外郎鮑琚總領鄂州大軍錢糧先是琚奏嶽飛軍中利源鄂州并公使激賞備邊回易十四庫嵗收息錢一百十六萬五千餘緡鄂州關引典庫房錢營田雜收錢襄陽府酒庫房錢博易場共收錢四十一萬五千餘緡營田稻榖十八萬餘石詔以鄂州七酒庫隸田師中為軍須每年收息錢共五十八萬餘緡餘令總領所椿收準備朝廷不時支遣其屯田仍委師確措置應副左承議郎江南東路提㸃刑獄公事陳確追二官勒停先是言者劾宣城令費介有贓事下提刑司究實確言嵗月深遠無以照驗言者論確與介俱為孫近之黨故責之辛亥上謂大臣曰朕兼愛南北之民屈己講和非怯於用兵也若敵國交惡天下受弊朕實念之令通好休兵其利溥矣士大夫狃於偏見以講和為弱以用兵為强非通論也宗正丞江邈為監察御史邈公望從子也公望建德人元符末諫官上召對而命之詔齊安郡王士㒟令建州居住御史中丞万俟卨再論士㒟貪狡險忍朋比姦邪其初罷也語人曰士㒟於後宫有姻家之契而於陛下為近屬之尊去闕之日嘗䝉陛下賜銀千兩又嘗密賜親劄慰諭再三以示非久復用之意又語人曰士㒟嘗薦李綱相矣嘗薦趙鼎相矣又嘗薦孫近執政矣今居衢州賓客日盈其門談論之間無不詆訕時政使陛下不許交通之㫖徒為虛文伏望稍加黜責以靖國論乃詔都省檢舉宗室謁禁行下有犯令御史臺宗正司按察官劾奏徐夢莘北盟㑹編云士㒟欲救解嶽飛漏其語或聞之以告秦檜檜令臺臣言士㒟有不執心責建州拘管而死甲寅太常少卿施坰兼權禮部侍郎祕書省校書郎程敦厚兼權禮部郎官乙卯上御射殿引試南省舉人何溥已下是舉兩浙轉運司秋試舉人凡解二百八人而溫州所得四十有二宰執子姪皆預焉溥永嘉人也朱勝非秀水間居録云東南諸州解額少舉子多求牒試於轉運司每七人取一名比之本貫難易百倍秦檜於永嘉引用州人以為黨助吳表臣林待聘號黨魁名為是官實操國柄凡鄉士具耳目口鼻者皆登要途更相扳援其勢炎炎日遷月擢無復程度是年有司觀望所薦溫士四十二名檜與參政王次翁子姪預選者數人前輩詩云惟有糊名公道在孤寒宜向此中求今不然矣丙辰起復端明殿學士川陜宣撫副使胡世將薨於仙人關世將疾亟命官屬㑹計軍馬錢糧鎧伏文書等召宣諭使鄭剛中至卧內面授之剛中辭以使事有指不敢當世將曰朝廷萬里公以近臣出使適丁斯時茍利於國家者以意可否之而後白於朝云何不可也將卒剛中下令凡宣撫司細務令僉㕔自行惟事干軍政者取決上嘗問近臣以世將邊狀曰少日當僉樞處之訃聞拜資政殿學士致仕恤典如執政戊午修武郎侍衛步軍司統領軍馬田邦直知光州辛酉秦檜等賀上以皇太后有來期先是徽猷閣待制洪皓在燕先報太后歸耗上諭檜曰皓身陷敵區乃心王室忠孝之節久而不渝誠可嘉尚皓之二子並中詞科亦其忠義之報也士大夫茍能崇尚節義天必祐之祕書省正字張闡何若並為校書郎闡自以儲材之地無力可陳惟國家大利害可因事納忠時諸大將恃功邀爵賞有過則姑息又兵布於外而禁衛單寡闡上疏極論厥後往往行之司農少卿王賞兼實録院檢討官是日直顯謨閣都大主管川陜茶馬監牧公事馮康國卒建炎以來繫年要録卷一百四十四
