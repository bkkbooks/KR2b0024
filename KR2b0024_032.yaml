body:
  text: 建炎以來繫年要録卷三十二宋李心傳撰建炎四年三月癸卯朔孔彥舟入鼎州鍾相之反也鼎州孤危官吏軍民計無所出乃迎彥舟入城以拒相時宣撫處置使司主管機宜文字傅雱權湖北制置使以本司便宜之命授彥舟翊衛大夫康州防禦使荆湖南北路捉殺使就平之此據紹興元年二月辛卯彥舟奏狀修入彥舟過澧州而澧州之民有應相者彥舟為所攻喪甲而走僅以身免及入鼎慮復有應相者遂屠其城取其民八九悉㸃為兵時京西南路提㸃刑獄公事直祕閣李允文以宣撫司察訪使在鄂州聞相叛遣統領官武義大夫安和率步兵入益陽統制官武功大夫張崇領戰艦趨洞庭武顯大夫張竒統水軍入澧口三道討之此據趙甡之遺史及傅雱李允文奏狀參修熊克小厯云湖北帥司檄本路捉殺官孔彥舟權副總管領兵往鼎捕鍾相蓋誤此時解潜未來唐慤已去程昌㝢四月方權湖北實無帥臣又彥舟亦未為捉殺官乃雱便宜假授克不細考耳是日完顔宗弼去平江府時敵之後軍泊吳江縣下臨太湖石岸險狹統制官陳思恭以兵邀之金人舟亂不整思恭小捷而退熊克小厯云敵過吳江思恭以舟師邀於太湖擊敗之幾獲烏珠此據張匯節要所書也以趙甡之遺史考之乃不然錢穆收復平江亦無此事當更詳考甲辰張俊至自崑山乙巳巨師古至自洞庭李貴魯珏郭仲威皆至自常熟初羅索既陷陜遂與其副薩里罕長驅入關宣撫處置使司都統制曲端聞敵至遣右武大夫忠州刺史涇原路馬步軍副總管吳玠及統制官張中孚李彥琪將所部拒之於彭原店熊克小厯作自原店蓋因張匯節要所書也吳玠功績紀趙甡之遺史皆作彭原店今從之端自擁大兵屯於邠州之宜祿以為聲援敵乘髙而陳羅索引兵來犯玠擊敗之薩里罕懼而泣金人因目為啼哭郎君既而敵師復振官軍敗端退屯涇州敵亦引去端劾玠違節降武顯大夫罷總管復知懷德軍宣撫處置使張浚素竒玠尋擢玠秦鳳副總管兼知鳳翔府時當兵火之餘玠勞來安集民賴以生始青溪嶺之戰玠牙兵皆潰事見二年四月及是玠治兵秦鳳諸潰卒復出就招玠問訊再三搜索非是者五六人斥遣之餘悉斬於逺亭下去秦州十里軍中股栗自是每戰皆效死無復潰散者矣丙午御史中丞趙鼎言敵騎始還當俟浙西寧靜及建康之寇盡渡江然後回蹕萬一敵去未逺或作回戈之期何以待之於是行計稍緩丁未詔發運副使宋輝誘說兩浙州軍儲蓄之家借助米斛以備巡幸是日陳思恭自烏墩至平江初郭仲威既入城即領府事時金人焚劫之餘金帛錢榖尚多餘民自外至者輒執而掠之窮問瘞藏之物民益寃憤良久周望自遁所乃出領兵之吳興初望奔太湖失其宣撫使印敵既退募善沒者於湖中求得之上聞平江失守命望往常州襲敵師以功贖過是役也平江士民死者近五十萬人得脫者十之一二而已上嘉陳思恭太湖之功尋擢思恭右武大夫忠州團練使己酉張浚言大食獻珠玉已至熙州詔浚遣赴行在右正言吕祉言所獻真珠犀牙乳香龍涎珊瑚梔子玻璃非服食器用之物不當受上諭大臣曰捐數十萬緡易無用珠玉曷若愛惜其財以養戰士遂命宣撫司無得受仍加賜遣之何俌龜鑑寶器異物即命碎之內府珠玉即命投之螺鈿什物悉皆銷毁幄帟文繡一切屏去銷金鋪翠則有禁龜筒玳瑁則有禁真珠文犀則有禁廣州貢珠則罷交址獻羽則罷川蜀錦繡則又罷且作損齊以自誓而上謂宰執曰捐數十萬緡易無用珠玉曷若惜財以養戰士吾君之儉何如也時浚率步騎數萬人入衛至房州遇德音知敵騎退乃還以本司參議官直祕閣王以寧代程千秋為京西制置使使圖桑仲假以便宜又以宣義郎御營使司𠫭議官王擇仁知襄陽府節制京西軍馬擇仁初為浚所按與前知永興軍郭琰俱繫獄既而釋之以寧開封人政和中自小校換授建炎初以樞密院編修官出知鼎州為浚所辟以寧至襄陽見仲方彊乃卑辭假道而去引其兵屯潭州擇仁孤軍不敢進亦屯留均州由是仲益無所憚王之望記西事曰張浚歸自秦亭士馬甚盛至房陵畏桑仲而不敢近乃以王以寧為制置使王擇仁節制軍馬步騎十萬措置漢上以寧至襄陽乃卑辭假道而去擇仁孤軍不敢進頓於均州後其將王闢叛去復潰而亡於是西師之東下者星散盡矣仲知浚畏已而西師之易與也益亡所憚矣按浚初引兵入援聞敵退而歸非畏仲也以羅索之勇烏珠之鋭而浚不之畏豈果畏仲邪至於以寧不留襄郢而之長沙則真畏仲者今採取附見庶不抵牾浚請除荆䕫諸帥是日詔復朝議大夫葉宗諤直龍圖閣知鄂州中大夫知䕫州張上行知荆南府朝議大夫成都府路提㸃刑獄公事蘇覺知䕫州㑹浚已除吏三人卒不行浚以李允文節制鄂州六月甲午宗諤别與差遣浚以解潜知荆南六月丙子上行别與差遣浚以韓迪知䕫州九月庚戌詔依己行事理今並附見初河東制置副使解潛靖康末坐覆師貶及是在浚軍中浚以潛知荆南府令王以寧所部統制官王宗尹柴斌受其節度又遣秦鳳第十將關師古將兵二千五百人馬千匹隨之師古隴干人也時浚遣本司主管機宜文字尚書兵部貟外郎馮康國來奏事詔進康國二官以為荆湖撫諭使上令康國諭浚遣西兵屯荆南以為行都聲援辛亥康國辭行潛除荆南不見本月日據浚今年九月所奏云臣在房州遣關師古隨解潛往荆南故附於此壬子金人犯常州守臣右文殿修撰周杞聞敵至棄城走宜興縣敵遂入常州癸丑祕閣修撰唐慤坐失荆南落職日厯此日又書鄭望之落職不知望之原除何職也甲寅權知三省樞密院事盧益至行在詔趣令入對先是上諭吕頥浩曰朕初不識隆祐皇太后自建炎初迎奉至南京方始識之愛朕不啻已出宫中奉養及一年半朕之衣服飲食必親調製今朕父母兄弟皆在逺方尊長中唯皇太后不惟相别數千里外加之敵騎衝突又兵民不相得縱火交兵五六日乃定復爾驚擾當早遣大臣領兵奉迎以稱朕朝夕慕念之意上語在是月癸卯遂命益與御營使司都統制辛企宗帶御器械潘永思偕行朝奉大夫林把除名連州編管坐提㸃福建路刑獄日與成忠郎吕熙共殺張政也事見三年五月己亥時言者以為政本誘執苖傅把懼分其功而殺之遂以把屬吏法寺奏把熙謀殺人當斬詔貸死免决刺熙配惠州牢城而杞有是命承信郎詹標初手執傅及是亦坐獄標辭不伏而死獄中把十月己亥放還標紹興九年六月丁亥贈官把遺事稱知建州某人與當軸為姻讒於當軸下把獄此蓋指吕頥浩當考丁巳命從官舉可備監司者金人至鎮江府浙西制置使韓世忠已屯焦山寺以邀之降其將鐵爪鷹李選選者江淮宣撫司潰卒也完顔宗弼遣使通問世忠亦遣使臣石臯報之約日㑹戰世忠謂諸將曰是間形勢無如金山龍王廟者敵必登此覘我虛實乃遣偏將蘇德將二百卒伏廟中又遣二百卒伏廟下戒之曰聞江中鼓聲岸兵先入廟兵繼出敵至果有五騎趨龍王廟廟中之伏喜先鼓而出五騎振䇿以馳僅得其二有一人紅袍玉帶既墜復跳馳而脫詰二人者即宗弼也既而戰數十合世忠妻和國夫人梁氏在行間親執桴鼓敵終不得濟復使致詞願還所掠假道世忠不從益以名馬又不從時左監軍完顔昌在濰州乃遣貝勒托雲趨淮東以為宗弼聲援宗弼至京口不得其日按世忠碑云相持四十有八日而趙甡之遺史世忠以四月丙申敗於建康逆數之其初與宗弼相遇當在三月戊申己酉之間據諸書宗弼以三月癸卯去平江壬子陷常州則到鎮江又必在壬子之後數日以時計之疑是三十八日今且附此當求他書𠫭考己未上詣開元寺朝辭九廟神主宰執百官皆扈從自渡江至是始有此禮是日上御舟復還浙西初上在龍翔主管亳州明道宫薛弼見吕頥浩請平其直以鬻官産頥浩從之上在溫彌日所費多仰焉弼永嘉人嘗為光祿寺丞熊克小厯云駕留溫每日所費不資皆取足於鬻産之直按正月二十八日省劄子契勘已支與溫州度牒一千五百道變賣訪聞溫州祇候臨幸於四縣科納見錢一十二萬貫米二萬石草一百四十萬斤麥豆稱是僧道每人科納買度牒錢三貫文近又科配均糴二萬石有旨令本州分析奏聞據此則溫州科擾不一所謂取足於鬻産之直恐無此理今略修潤附入庚申詔昨金人侵犯州縣其投拜官除知通别取㫖外餘並罷內統兵官以衆寡不敵致有潰散理宜矜恤可特放罪仍舊統押人馬時朝廷恐將士潰散者衆乘亂為變故貸之辛酉上御舟發溫州晚朝執政登舟奏事上曰張浚措置陜西極有條理荐人用士持心向公張俊辛永宗皆言陜西將帥往往服浚謀略呂頥浩曰陛下雖失之杜充復得之張浚王綯曰張守嘗語臣浚好謀有大志嘗招諸將至臺講論用兵籌策今果能行所言真不易得上復言浚用孫渥代辛興宗按王擇仁等罪稱善者久之御營前軍將官楊勍叛勍本知濟南府宫儀裨將儀死餘衆𨽻前軍統制王􅊅􅊅自溫州還至天姥寺勍率其徒復叛􅊅遣統領官林閏等追之將官武節郎李在與戰為所殺壬戌御舟次章安鎮故朝請郎張耒贈右文殿修撰故朝散郎朝補之朝奉郎黃庭堅宣德郎秦觀皆贈直龍圖閣耒宛邱人元祐起居郎黨籍餘官第四人黃州安置補之任城人元祐吏部郎中餘官第三人責處州監酒庭堅分寧人元祐著作佐郎餘官第二人宜州編管觀髙郵人元祐館閣校勘餘官第一人橫州編管王明清揮麈第三録云建炎初贈黃魯直秦少遊朝無咎張文潛俱直龍圖閣文潛生前自起居舍人出帶此職甚久亦有司一時稽考之失也按史耒乃贈右撰不知明清何以云然豈非初贈小龍而後覺其誤乃復改命如靖康之於范仲淹邪明清所云必有所據姑附於此更俟詳考又詔故右司諫江公望監察御史常安民各官子孫二人時方褒録元祐忠賢以耒等四人為黨籍餘官之首而參知政事范宗尹言公望安民論事徑切故首及之公望建德人事徽宗為諫官餘官第九十八人南安軍編管安民臨卭人事哲宗為御史餘官第十八人責監衢州稅江常八月丁丑再贈官集英殿修撰知福州程邁以應副行在錢物有勞遷徽猷閣待制已而言者以為祖宗特重職名未嘗妄豫今邁不能仰體德意裒斂貢獻民不堪命當治其罪而反加以次對之職望亟賜改正仍詔大臣自今監司郡守應辦軍期有勞依祖宗舊制止進階官俟有大功顯著間加職名庶幾人益知勸上以為然遂寢其命乙丑上次台州松門寨宰執奏事吕頥浩因言此行未審且駐㑹稽為復須到浙右上曰須由蘇杭往湖州或如卿所奏往宣州朕以謂㑹稽只可暫駐若稍久則人懷安而不樂屢遷頥浩又曰將來且在浙右為當徐謀入蜀上曰朕謂倚雍之彊資蜀之富固善但張浚奏漢中止可備萬人糧恐太少兩浙若委付得人錢帛猶可泝流而西至於糧斛豈可漕運頥浩曰若苐携萬兵入蜀則淮浙江湖以至閩廣將為盜區皆非國家之有矣上曰當益進上流用淮浙𣙜貨鹽錢以贍軍費運江浙荆湖之粟以為軍食王綯曰議者但知輕議晉元帝還都建鄴不能恢復中原而多言入蜀便殊不知自秦用張儀至本朝遣王繼恩下蜀者八矣取輒得之不勞再舉則亦未可謂之便也范宗尹曰臣謂若便入蜀恐兩失之據江表而徐圖關陜之事則兩得之决擇取舍不可不審上曰然既而浚復上疏言陛下果有意於中興非幸關陜不可願先幸鄂渚臣當糾率將士奉迎鑾輿永為定都大計上不許詔賜故資政殿學士許景衡家所僦溫州官屋一區上因言朕自即位以來執政中張慤第一忠直至誠遇事敢言無所回避其次則景衡若郭三益則善人而已是夕風順御舟與宰執以下諸船先後行不相見第聞探者唱云御舟在前探者亦不知御舟遇淺幾覆尚未至也既而宰執入港復回丙寅臺諫官亦皇遽回船至港口始迎見御舟丁卯右文殿修撰廣東轉運副使趙億言本路地瘠民貧倉廩皆竭乞宗室自遙郡刺史以上俸給人從並减半從之時大宗正司避敵自䖍州移廣州故億以為請紹興八年四月庚申臣僚上言新知袁州江少虞為廣州通判㑹大宗正言以南班宗室避盜遷於嶺外少虞身為倅二為見敵兵渡江附㑹運副葉宗諤沮辱皇族不支請給乃反鼓唱廣人興起保甲白晝操戈謀害宗屬一日殺宗司親事官四人尸填通衢一城驚皇幾至生變賴鈐轄范寥喻以逆順罷歸保甲始得無事今附見此當求他書參考戊辰湖北捉殺使孔彥舟擊鍾相敗之彥舟既入鼎州時出兵與相戰勝負略相當彥舟得賊黨不殺惟斷其指及耳鼻縱之出曰汝父有神能為汝續則再來相得之惡其彰己之妄而養之密室自是其黨亦生疑心彥舟乃聚竹為筏又陽為好詞若將避相者而隂遣人投其軍中謂之入法相信之不為備彥舟乃乘筏夜渡而使入法之人為內應大敗之相棄妻子竄入山谷為農人范顔所擒彥舟乃執相及僞后伊氏僞太子子昂並檻赴行在僞將相及用事之人皆梟首相少子子義逃去與其徒居洞庭湖鍾相之敗趙甡之遺史繫之三月戊辰熊克小厯繫之四月癸未按日厯傅雱奏狀云三月二十六日辰時遂破巢穴生擒鍾相戊辰二十六日也或者相以戊辰之日敗癸未之日生獲亦未可知今從捷奏附此己巳戚方陷廣德軍初方既為劉晏所破乃引兵欲趨宣城道過廣德入其郛朝奉郎新通判真州權通判王儔迪功郎權簽書軍事判官李唐俊文林郎宿州司户參軍權司法潘偊文林郎權知廣德縣韋績迪功郎權丞蔣䕫與權軍事皆死後贈儔二官唐俊等皆京秩録其家一人日厯及諸書皆不載此事按王儔及潘偊家乞恩澤狀云建炎四年正月二十七日故繫於此日厯韋績先贈宣義郎紹興三年五月庚申與一子將仕郎蔣䕫先與一子下州文學三年八月又引李唐俊例贈宣教郎王儔紹興四年正月乙卯贈朝請郎與一子恩澤潘偊同日贈承奉郎與一子下州文學儔家陳乞狀云四年正月准廣德軍權軍事牒權本軍通判偊家陳乞狀云知通以下並遭殺戮按廣德知軍周烈去年十一月已為金人所殺未知此時權軍為誰當考辛未上次定海縣顧縣為金人所焚惻然曰朕為民父母不能保民使至如此王綯曰陛下留杜充提兵四萬守建康留周望提兵二萬守平江非輕棄江浙而逺適南方不幸充望不稱任使乃至如此吕頥浩因言承平之久士多文學而罕有練逹兵材可濟今日者上曰前此太平朝士若乘馬馳騁言者必以為失體才置良弓利劍議者將以為謀叛綯曰大抵文學之士未必應務有才者或短於行自非陛下棄瑕録用則舉世無全人矣是月朝奉郎季陵充徽猷閣待制知臨安府陵去位數月即復職知溫州又除中書舍人皆不赴范宗尹力薦其才乃有是命修武郎劉綱為武德郎閣門宣贊舍人綱位子也此以紹興四年三月二十五日綱乞批鑿官告狀修入狀稱建炎四年三月在淮甸與金人對壘間准降到告敕稱綱父子忠義勤勞諸書皆無此恐是閭勍便宜書填亦未可知當考是春金左副元帥宗維右監軍希尹右都監耶律伊都皆在大同右副元帥宗輔在析津府即燕京遣貝勒托雲率衆圍楚州守臣趙立乘城禦之不能下進圍揚州初敵陷山東左監軍完顔昌密有許封劉豫之意㑹濟南有漁得鱣者豫妄謂神物之應乃祀之既而北京順豫門下生禾三穗同本其黨指言以為豫受命之符乃使豫子僞知濟南府麟賫重寶賂昌求僣立大同尹髙慶裔左副元帥宗維心腹也恐為昌所先乃說宗維曰吾君舉兵止欲取兩河故汴京既得則立張邦昌後以邦昌廢逐故再有河南之役方今河南州郡官制不易風俗不更者可見吾君意非貪土亦欲循邦昌之故事也元帥盍建此議無以恩歸它人宗維乃令希尹馳白金主晟晟許之宗維遂遣慶裔自河陽越舊河之南首至豫所𨽻景州㑹官吏軍民於州治諭以求賢建國之意皆莫敢言曰願聽所舉慶裔徐露意以屬豫郡人迎合敵情懼豫權勢又豫適景人故進士張浹等遂共舉之慶裔至德博大名一如景州之故既至東平則分遞諸郡以取願狀而已慶裔歸具陳諸州郡推戴之意宗維許之張滙節要云劉豫之立或謂本鄧州叛臣張剛中獻䇿於慶裔慶裔以三班奉職酬之復以為已見獻於尼瑪哈非也金人犯山東止以邦昌為名不易官制風俗者其議素已定矣不然達蘭豈敢擅許於人耶劉豫揣意求於金慶裔懷私屬於豫其所由來漸矣非自剛中始也滙久在敵中當得其實今從之遼東漢軍萬户韓常與太行義士石子明戰於真定西山胭脂嶺為所敗千户劉慶餘炮折其脛由是解軍職換靜江軍節度使後除知慈州初金太祖旻起兵以萬户比都總管千户比節度使百人長比刺史皆親押劄子授之謂之御畫及罷從軍對此換授其後燕雲諸民兵千户百人長但以家業或丁數定之軍還則但為庶民或就軍中受代則復為一散軍而已非御畫之比矣蔚州民劉黑龎造妖起兵既而獲之金人因捕黑龎害及數縣夏四月按是月壬申朔癸酉詔軍興後江西州縣嘗經殘破之家並與蠲今年夏稅既而從衛三省樞密院取皇太后旨并秋料未輸者皆捐之言者以為政令不一而吏不知所從遂寢其令癸酉指揮日厯不載以今年八月二十六日丙申臣僚上言修入中大夫徽猷閣待制知明州劉洪道中大夫直祕閣知臨江軍吳將之並罷仍各貶秩二等坐敵至失守也洪道依舊充御營使司參贊軍事言者因奏顯謨閣待制知袁州王仲薿投拜之罪乃責仲薿為欣州團練副使潮州安置日厯仲薿與將之同章疏而不見行遣紹興五年四月九日刑部檢舉狀稱仲薿坐留汪伯彥不赴貶所及知越州日起發花石責授散官蓋隱之也諸書皆無行遣本日今因章疏附見或可附八月甲申黃敦彥停官時降授宣教郎直祕閣向子忞知明州甲戌上御舟至明州之城外御史中丞趙鼎言吳越介在一隅非進取中原之勢荆襄左顧川陜右視湖湘而下瞰京洛在三國必爭之地宜以公安為行闕而屯重兵於襄陽以為屏翰運江浙之粟資川陜之兵經營大業計無出此願詔張浚未可長驅深入姑令五路各守其地犄角相援可也乙亥上發明州丙子次餘姚縣海舟大不能進詔易小舟仍許百官從便先發京西南路提㸃刑獄公事李允文轉運副使陳求道請幸鄂州不許允文又奏欲以所部往䖍州詔速還襄陽己卯觀文殿學士提舉亳州明道宫朱勝非為江西湖南北宣撫使鄂州置司勝非時在湖南辭未肯受命也勝非此除日厯不載但於六月丁亥書昨除江西荆湖南北宣撫使指揮更不施行按沈與求明年十月劾勝非章云四月七日除宣撫使故繫於此日庚辰李允文所遣統領官安和敗鍾相餘黨於湘隂獲其將裴宥癸未上次越州駐蹕州治直龍圖閣都大提領水軍㳂江措置副使朱芾罷仍奪職以言者論其諂事蔡京父子在江州輕率自肆也其所部海舟悉令統制官張道統押赴行在初浙西制置使韓世忠與完顔宗弼相持於黃天蕩而貝勒托雲圍揚州朝廷恐守臣張績力不能支許還屯京口績不為動敵乃趨真州績金壇人也時托雲軍於北宗弼軍於南趙雄撰世忠神道碑云烏珠軍於南逹蘭軍於北誤也是時逹蘭止在濰州遣兵來援張滙節要所記甚悉今從之世忠以海艦進泊金山下將戰世忠預命工煆鐵相連為長綆貫一大鈎以授士之驍捷者平旦敵以舟噪而前世忠分海舟為兩道出其背每縋一綆則曵一舟而入敵竟不得濟乃求與世忠語世忠酬答如響時於所佩金鳳瓶傳酒縱飲示之宗弼見世忠整暇色益沮乃求假道甚恭世忠曰是不難但迎還兩宫復舊疆土歸報明主足相全也吕頥浩聞敵窮蹙乃請上幸浙西且下詔親征以為先聲而亟出鋭兵策應世忠庶幾必擒烏珠參知政事王綯亦言宜遣兵與世忠夾擊上納之甲申下詔親征御史中丞趙鼎言臣在溫台屢言當俟浙西寧靜及建康之寇盡渡江然後回蹕今遽有此舉必以韓世忠之報敵騎窮蹙可以剪除耳萬一所報不實及建康之衆未退回戈衝突何以待之時有妖人王念經者聚衆數萬反於信州之貴溪鼎言饒信魔賊未除王􅊅潰軍方熾陛下遽捨而去兹乃社稷存亡至危之幾也直龍圖閣知潭州向子諲落職放罷坐敵至失守也既而中散大夫荆湖南路轉運副使賈收奏子諲督兵巷戰之勞且言子諲已收潰兵復入城治事上亦以子諲與其它守臣望風逃遁事體不同乃復令知潭州以責後效子諲申命在五月癸酉今併書乙酉御史中丞趙鼎為翰林學士自建炎初置御營使本以行幸總齊軍中之政而宰相兼領之遂專兵柄樞密院幾無所預吕頥浩在位顓恣尤甚議者數以為言上自海道還鼎率其屬共論頥浩之過㑹鼎復駮親征之議頥浩聞之乃移鼎翰林鼎引司馬光故事以不習駢儷之文不肯就職是日戚方圍宣州方初自廣德軍去引兵犯宣城守臣李光遣兵馬監押吕執中賫書招之方佯受招實欲攻城也執中覺其詐僅得脫歸有衙前石振者為方所執且告以城中虛實方乃鼓行而前及是至城下光盡徙城外居民入城時有建康潰散班直百餘人在城中光因以其首王逸為統制令州官寓客分守城壁僧道居民皆執仗登城方攻之不克光令一吏僞具守臣威儀登城招方與語方訴以糧乏遂出米肉銀幣犒之方睥睨不已王逸曰賊非退也且未可解嚴更當謹備方果伐木為攻具遂圍城矢注如雨城中皆負户而汲先是諸邑民兵聚於城中寧國民兵尤壯悍每以手炮擊賊賊甚苦之然亦未退江東宣撫使劉光世遣前軍統制王德討王念經於貴溪道出鄱陽㑹淮西都巡檢使劉文舜為李成所敗渡江寇饒州圍城甚急守臣顯謨閣直學士連南夫以蠟書請德解圍德引兵赴之壓壘而陳文舜氣褫請舍兵聽命德僞許其降誘文舜入城執而誅之丙戌御史中丞趙鼎右諫議大夫富直柔等言昨晚聞諸道路以謂殘寇在升潤之間車駕欲親御六師為追襲之舉萬一已渡浙西而敵騎起襲我之計能保其必勝乎詔據李光等奏鎮江建康等處金人已節次渡江劄與臺諫官照㑹此或趙鼎未徙翰林時所上也但今日降出耳范宗尹稱不必與臺諫官校是非蓋指吕頥浩劄下照㑹事前此未見故特表出之熊克小厯盡去前後又止書李光奏鎮江建康金人悉已遁去一句其失本指多矣戊子韓世忠奏捷上曰金人侵犯以來諸軍率望風奔潰今嵗如世忠輩雖不成大功皆纍獲捷若益訓卒繕兵今冬金人南來似有可勝之理朕觀自古恃衆而敗如尋邑昆陽之戰者多矣范宗尹曰臣觀自古臨敵取勝皆有先定之謀惟光武之敗尋邑東晉之敗苻堅並非謀畫全是天意前此兵將望風奔潰而今嵗皆能力戰此天意似稍回更願陛下修德庶幾天意必回則天下之事不難為矣乃出世忠奏命尚書省以黃榜諭中外時敵衆十餘萬世忠碑云烏珠自臨安勒三十萬騎北還按此年大帥不出衆帥分兵一犯兩浙一犯江湖一犯川陜恐其衆不能如此之多今但云十餘萬衆俟考而世忠戰士才八千完顔宗弼求登岸㑹語世忠以二人從見之宗弼語不遜世忠怒引弓且射之亟馳去詔涇原路第七正將向亶令所屬械赴宣撫處置使司軍前依法行遣用張浚奏也亶從統制官秦公楚拒金人於百通城公楚戰死亶引衆遁去懼罪走行在故浚以為請焉庚寅御史中丞趙鼎為吏部尚書鼎力辭翰林因卧家不出詔以鼎剛毅有守不可使去朝廷故有是命鼎不受辛卯罷福建鈔鹽令轉運司官搬官賣仍嵗發鈔鹽錢二十萬緡赴行在𣙜貨務助經費以淮浙鹽場復通故也紹興八年十月壬辰所書可參考詔李鄴家書令越州給付李邴時邴坐鄴投降亦奪資政殿學士言者乞罷四川𣙜鹽𣙜酤以安逺民自同主管川陜茶馬兼宣撫司隨軍轉運使趙開變茶酒法怨詈四起至是開復議更鹽法言者遂奏其不便且曰如謂大臣建請務全事體必須更制即乞劄與張浚照㑹施行詔以其章示浚時鹽法未行事得暫止而酒課已為軍食所仰浚訖不為之變也日厯云言者乞罷四川𣙜鹽𣙜酤按改鹽法在紹興二年九月此時尚未行當是方有此議或者浚請於朝言者遽及之而暫止耳今略刪潤修入熊克小厯附此事於甲申恐誤壬辰言者奏陛下即位以來灼見禍亂之源痛思懲艾故於元祐黨籍屢下詔㫖特加追叙欲以竦動四方觀聽甚盛舉也止緣使逐家各自陳乞故或子孫零落不能申請或子孫雖在而誥敕散失至有誥敕具在而為有司以微文沮抑者致使往往未被贈典雖如吕公著吕大防韓維蘇轍顧臨梁燾張舜民范祖禹王古輩尚未霑昭洗之澤其他可不言而知也臣私竊恨之夫名預黨籍率皆一時之望所厯官職衆所共知不容少有僞濫而特命追復又非尋常之比謂宜誥命從中而下使異數齊頒四方改觀豈以有司微文沮格邪欲望睿斷俾三省條具不必更待逐家陳乞疏奏詔依德音許本家自陳而已甲午皇兄右監門衛大將軍忠州防禦使安時赴行在賜銀帛五百匹兩安時孝詒子也孝詒益端獻王子靖康末以淮康軍節度使押赴軍前乙未分行在𣙜貨務官吏之半於臨安府置司丙申通議大夫守尚書右僕射同中書門下平章事兼御營使吕頥浩罷先是趙鼎復辭吏部尚書之命且攻頥浩之過章十數上頥浩乃求去上宣還之前一日頥浩入見畢靣東而立不預進呈上諭王綯等曰頥浩功臣兼無誤國大罪與李綱黃潛善不同朕當眷遇始終不替是夕遂召給事中兼直學士院汪藻草制罷頥浩制略曰占吏員而有虧銓法專兵柄而幾廢樞庭下吳門之詔則慮失於先時請浙右之行則力違於衆論遂罷為鎮南軍節度使開府儀同三司充醴泉觀使後二日復詔中外以頥浩倡義勤王故從優禮焉時王綯與頥浩論頗同乃纍章丐免於是范宗尹攝行相事遂留㑹稽無復進居上流之意矣詔三省樞密院同班奏事是日浙西制置使韓世忠及完顔宗弼再戰於江中敗績宗弼既為世忠所扼欲自建康謀北歸不得去或獻謀於金人曰江水方漲宜於蘆場地鑿大渠二十餘里上接江口舟出江背在世忠之上流矣宗弼從之傍冶城西南隅鑿渠一夜渠成次日早出舟世忠大驚金人悉趨建康世忠尾擊敗之敵終不得濟先是宗弼在鎮江世忠以海舟扼於江中乘風使篷往來如飛宗弼謂諸將曰使船如使馬何以破之將軍韓常曰雖然見甲軍則自遁矣宗弼令常以舟師與戰舟多沒常見宗弼伏地請死宗弼貸之乃揭榜募人獻所以破海舟之䇿有福州人王某僑居建康教金人於舟中載土以平板鋪之穴船板以櫂槳俟風息則出江有風則勿出海舟無風不可動也以火箭射其篛篷則不攻自破矣一夜造火箭成是日引舟出江其疾如飛天霽無風海舟皆不能動世忠舟師本備水陸之戰每舟有兵有馬有家屬有輜重及是敵以火箭射其篛篷火烘日曝人亂而呼馬驚而嘶被焚與墮江者不可勝數所焚之舟蔽江而下敵鼓櫂以輕舟襲追之金鼓之聲震動天地統制官右武大夫成州團練使孫世詢武功大夫吉州防禦使嚴永吉皆力戰而死世忠與餘軍至瓜步棄舟而陸奔還鎮江聚兵㳂江避兵之人往往取其糧食亦有得軍儲銀帛者宗弼乃得絶江遁去後贈世詢五官永吉四官仍並為承宣使録其子世詢開封人也趙雄撰世忠碑載此事但云風弱帆緩敵得以輕舸渡去全不載世忠敗績及金人火攻等事蓋諱之也孫覿作世忠墓志云敵乘南風縱火抗舟師差近事實今從沈與求劾范宗尹章疏趙甡之遺史及中興姓氏録世詢傳修入之中興大事記張俊以孤軍敢與金戰而有明州城下捷陳思恭邀擊於吳縣而有太湖之捷牛臯邀擊於荆南而有寶豐之捷嶽飛邀擊於荆南而有靜安之捷而韓世忠捷於鎮江敵勢尤為窮蹙雖海舟無風天時未順而頥浩固請幸浙西下詔親征兵勢稍張而敵自是不敢復過江矣丁酉御筆趙鼎依舊御史中丞鼎即出視事戊戌出米七千斛賜明州民居為敵所焚者降授朝議大夫徽猷閣待制御營使司參贊軍事劉洪道落職提舉亳州明道宫坐失明州再責也時宜州觀察使浙東馬步軍副總管張思正亦降充武功大夫康州刺史韶州居住思正之貶日厯不載此以紹興元年七月二十三日刑部檢舉狀修入狀云緣臣僚上言為與劉洪道失守明州故併附於此未見本日己亥詔户部侍郎葉份兩浙轉運副使陳谷瑞同往湖州措置催督錢糧赴行在以吳興獨不被兵故也日厯載元降指揮止云在浙西措置今以五月己酉臣寮上言增入先是宣撫使周望已用便宜添差朝請大夫李弼孺為轉運副使又遣朝散大夫蔡伸於鄉村括糴而不償其直論者以為言於是弼孺與伸皆罷御前右軍都統制張俊為浙西江東制置使以所部收招羣盜命後軍統制陳思恭𨽻之且令兩浙宣撫使周望以其兵屬俊自劉光世韓世忠外諸將並受節度時世忠雖已奏捷而自常潤來者皆云敵於蔣山雨花臺各劄大寨抱城開河兩道以護之及穴山作洞為逃暑之地而采石金人已渡復回者纍纍不絶給事中兼直學士院汪藻言今且五月比常年敵已去月餘今反去而復回其欲留建康明甚請及五六月我師便利之時㑹諸將與世忠一舉掃除使之終身不敢南向雖聞近遣張俊提兵過江節制浙西人馬以為策應此固陛下長算也不知俊果有慨然立功之志乎望專遣使臣數人賫宸翰兼程至襄鄧荆湖以來迎張浚軍令分數萬人順流而下敵人見上流之師突然而至必破膽奔潰此制敵一竒也如其不然八九月間氣候稍凉彼得志矣機㑹一失雖悔何及於是張浚已西歸而藻蓋未知也藻所上疏不得其日但云今且五月又云世忠奏捷近二十日當是五月初間今因遣張俊行附見辛丑詔比年爵賞失實名器寖輕自今將帥監司毋得乞空名告敕如實有功保奏推賞大臣出使亦如之詔諸路曽經殘破州軍發解舉人以靖康元年就試終場人數為率紐計取放日厯不書此據紹興元年六月十日禮部奏駁宣州發解附試人狀修入是月尚書户部侍郎李逮為江浙諸路發運使此據本部題名宣撫處置司節制軍馬李允文承制以直龍圖閣知蔡州程昌㝢權知荆南府初昌㝢之離蔡也以統制官杜湛統領官邵宏淵等將蔡兵三千自隨至漢陽時羣盜縱橫允文以便宜檄昌㝢權湖北帥事昌㝢因以湛權馬步軍副總管時公安石首松滋澧陽諸縣皆為賊所據而賊首李令戎屯松滋之尹店市於是昌㝢遣湛渡江擊賊又遣迪功郎崔嗣義將兵五百復取公安軍昌寓即板授嗣義承務郎久之詔補正其吏士推恩有差昌㝢為李允文檄權荆南此據紹興六年五月十三日滕膺乞改正狀修入狀稱允文幹官富誼受昌㝢金銀等物轉與允文當考杜湛渡江在今年五月乙巳崔嗣義補正在紹興四年三月壬戌金人犯江西者自荆門北歸留守司同統制牛臯潛軍於寶豐之宋村擊敗之京西捉殺副使王俊以臯為武功大夫和州防禦使充五軍都統制建炎以來繫年要録卷三十二建炎以來繫年要録卷三十二金人地名考證烏珠原書作兀术誤改見卷一羅索原書作婁宿誤改見卷一薩里罕原書作撒離喝誤改見卷一貝勒托雲原書作孛堇太一誤今改正伊都原書作餘覩誤改見卷一尼瑪哈原書作黏罕誤改見卷一逹蘭原書作撻懶誤改見卷一
