body:
  text: 建炎以來繫年要録卷七十一宋李心傳撰紹興三年十有二月辛巳朔起復直祕閣知嶽州范寅敷罷以制置使王􅊅言寅敷在任之日每遇賊至一味退避僥求起復至今未到故也壬午左文林郎玉山縣丞張絢為左宣教郎尋除祕書省正字用劉大中薦也絢已見六月壬辰其除正字在此月丙申今併書之初監察御史劉大中自江南還言虔饒兩監二年所鑄新錢才二十萬緡而用本錢十二萬緡吏卒之費又二十三萬緡得不償費望減併官吏癸未從之時鑄錢一千用銅二斤八兩鉛一斤十兩炭五斤大中以為費多故有此請熊克小歷吏部郎官劉大中言云云蓋據日歷所書其實大中此時已為御史蓋前是言之而吏户工部於此方勘當申上克歷因誤也武翼大夫吉州刺史統制鼎州軍馬杜湛為湖北路兵馬副都監修武郎閣門祇候添差統制軍馬彭筠充東南第八將筠本與劉超合有進士咼輔者為張用所掠後輔入筠軍中與進士路居正勸筠立功歸朝時超據澧州程昌宇遣兵擊之不勝輔等令筠以藥紙為書陳破賊計密遣安鄉縣監稅劉汝舟持詣湖西乞掩殺超昌宇亦遣使臣魏章賫蠟書報之超為筠所襲敗走筠以所部詣昌宇降昌宇有戰士鄉兵合九千餘人用湛為總帥至是昌宇奏湛屢立竒功筠臨敵宣力故皆擢之既而録輔之勞亦以為連州文學咼輔補官日歷不書據紹興五年六月十三日輔乞改正狀其補官在四年五月甲申韓肖胄偕金使入境後二日至泗州肖胄先行自天長徑赴行在是日大食進奉使蒲亞里至廣州夜為盜所掠其徒死者四人乙酉忠翊郎閣門祗候知漣水軍統制軍馬丁祀遷一官令再任是日臨安火後二日又火燔民居甚衆宰相朱勝非引咎乞罷政不許丁亥右通直郎添差簽書靜江軍節度判官廳公事張企曹通判欽州企曹義豐人覺近屬也自言無鄉可歸故録之戊子左迪功郎泉州州學教授許摶右迪功郎范伯奮並特改京官皆用近臣薦對也尋以摶為祕書省正字摶除正字在丙申己丑左宣教郎添差通判湖州趙子稱直祕閣賜五品服詔四川諸州犯私茶鹽人並不用赦蔭原免初呂頥浩因通州鹽畫旨而𣙜貨務張純又請批狀行之東南諸路至是左朝請大夫成都府路提點刑獄公事何慤言所降指揮為專置提舉茶鹽司路分本路即非專司去處總領四川財賦趙開以白宣撫司且言恐官吏觀望全不禁戢宣撫處置副使王似盧法原以便宜從之言於朝故有是命自是天下茶鹽皆用重法矣慤資陽人也辛卯拱衛大夫宣州觀察使樞密院凖備將領閻臯為江西兵馬都監先是詔以臯所部隸神武右軍故有是命監察御史魏矼言大理獄囚已上未報者八十餘人詔刑寺官就刑部早入昏出限三日聚斷上省壬辰詔諸路監司令三省選擇差除自今臣僚差遣並不得自具闕乞差時御史建言祖宗朝除用監司必擇纍任知州通曉政事實有政績或久任省府推判練逹老成之人故使按察吏治發摘姦伏薦舉人材撫存百姓無有不宜若有本路利害就委措置無有不當選任既重公論咸服海內清平朝廷省事皆由乎此近年任用太易以一路耳目之寄付新進望輕之人或未歷親民或少年輕鋭或起於罪戾欲使政事修舉姦宄消伏難矣望令中書慎簡聰明公正之人𠫭之衆論書之于籍以待有闕按籍除授絶請求之私去待闕之弊如此則諸路使者皆得人而事無不集矣疏入上諭輔臣曰今奔競之風未息每有一闕必致干乞宜明戒諭毋得具闕乞差庶修士檢然循習已久終不能革也右迪功郎新監廣州置口場鹽稅吳伸再上書請伐劉豫且言今兵權所付不過二三人其有道家所忌則趙括之徒可憂其有戰勝而驕則武安君之禍可戒又言古人師克在和今陛下將士雖衆孰講亷藺之歡則將帥之賢愚不卜而可知也今之主將無非營私背公蠧國害民之徒廣回易擅𣙜酤所至州郡則恣無厭之求民力為之耗減廣收無用之兵以益請糧之數則財賦之得失不卜而可知也今國家所賴者止知有西北之兵不知有東南之士又况諸軍無非潰亡之徒子女既足金帛亦豐邊境暫寧則偷安以干廪食至於臨敵豈不潰亡此士卒之能否不卜而可知也今重兵皆在江南而輕兵獨當淮右萬一敵人掠我淮甸對壘江旁縱未南渡兩軍相持積以嵗月必有存亡夫金人雖強尚不足慮劉豫雖微其禍可憂臣以為先擒劉豫則金人自定金人之計陛下知之詳矣今又割中原以假劉豫是并吞之謀已兆而危亡之禍將及豈可不為之計今使命將至不可中輟萬一厚有需求臣願陛下陽許隂違俟其還報乘其不疑一怒親征劉豫可擒也癸巳詔修蓋殿宇迎奉祖宗神御赴行在用祠部員外郎兼權太常少卿江端友議也先是端友建言太廟典禮三事大略以為宗廟社稷者天子之所守出命令頒爵賞皆告廟而後行天子巡狩猶載遷廟之主以行示有所尊固未有逺寄於郡國不復近天子之居者也今雖國步未平然天子之居豈可無宗廟社稷禮曰君子將營宫室宗廟為先今臨安宫室略備矣欲乞行宫門內修創太廟務令近古質素不必華飾約用屋五十間不過費萬餘緡而使宗廟神靈依陛下而安所繫豈不甚重又伏見御名祝版稱嗣皇帝竊謂嗣字非所宜稱唐肅宗復兩京告廟祝文稱嗣皇帝顔真卿曰上皇在蜀可乎亟命易之今日之事誠大類此又本朝故事並用三公奉册寶而宰臣執政官攝之以重其事今太尉不得為三公自上攝下名實不相副亦合從舊事下吏禮部太常寺討論至是吏部侍郎陳與義太常少卿唐恕禮部員外郎郭孝友等言國家自渡江以來講武修備期於恢復蓋恐不常厥居故因府治殘破之餘而居之而宗廟神主則往溫州奉安意可見矣不知端友之意謂今日定都於臨安乎將俟天下平定而别議定都所在乎是未知朝廷深思微旨權時之宜徒為此紛紛也太上皇帝遭時艱厄明詔內禪故靖康之間宗廟祝文已稱嗣皇帝逮二聖北行陛下應天順人遂登大寶其視肅宗靈武之事大不相侔竊謂稱嗣之義於禮無嫌不必改作若謂自上攝下名實不相副則本朝大禮親祠輅車執綏乃是太僕之職而有用從官攝者此類甚多未足為輕重時朱勝非方主和議乃白上營宗廟於臨安而以攝三公奉册惟祝文稱嗣如故端友建請在十月戊申今聨書之甲午詔李橫翟琮董先李道牛臯並聼嶽飛節制以圖後效仍令橫等即江州屯駐初橫之在襄陽也嶽飛遣統領官張憲招之不從及橫自黃州渡江飛聞之疾馳往洪州後橫一日至橫已𠫭趙鼎矣飛責橫不相從之意橫引罪而已於是道臯已在江州飛皆用為統制就將其軍惟橫等留南昌如故熊克小歷於今年七月書詔橫駐洪州按日歷十一月庚午詔橫等江北擇地為寨十二月壬午詔橫權於舒蘄州界屯駐至此始命移屯江州不知克何所據而云爾也乙未詔初磨勘改官人許注外路教官著為令中興聖政宰執進呈差沈昭逺催軍糧事上曰差官數有言者蓋常賦自有轉運司官茍不職自當别選能吏豈可每每差官催督乎至於因事差官出外自祖宗時有之亦不得俱廢也臣留正等曰天下之事以安靜為利以騷動為害此不可不察也安靜而事集則於事所當為之外不復有餘事矣騷動而事集則於所當為之外其弊未易數也且天下常賦治之者有常職以常職而治常賦取足而止寧有他費哉茍為不然而差官以督之彼承天子之命挾勢以恐動州縣酷者肆虐貪者妄取從吏又倚其勢以為姦其所至之患甚於常賦雖能辦集常賦之外又不知其費之幾何此其所以為利害也太上皇帝不從言者差官之請而謂常賦自有轉運司可謂深明利害之所在矣若夫因事差官必有所不得已者亦豈聖意之所欲哉時焉而已爾知樞密院事張浚言荆南屯駐大軍竊慮闕乏臣已於隨行贍軍鹽內支十萬斤付解潛為軍費詔浚毋得更擕蜀鹽過界有害鹽法仍令浚星夜赴行在所至州具到發日聞奏鎮江建康府江東宣撫使韓世忠遣幹辦公事聞人武子來奏事上召對世忠言本司近收到曹成李宏馬友劉忠王方等諸頭項數萬人全無器甲緩急遇敵恐誤國事詔令軍中造甲千副其工料之直以浙路度牒真州𣙜貨務見鏹金銀中半給之丙申尚書吏部員外郎兼祕書省著作佐郎虞􅀈試左司員外郎左宣教郎魏良臣守尚書都官員外郎用席益薦也良臣九月甲寅改官丁酉故延康殿學士通義大夫趙遹追落職名遹始卒於夀春府至是其家援故事以遺表恩為請許之給事中胡交修言瀘南開邊之禍遹為之首稽之公憲宜在褫奪望追削舊職以謝瀘南無辜之民且為開邊誤國者之戒故有是命其遺表恩勿行戊戌顯謨閣直學士知池州陳規充龍圖閣直學士知廬州右朝議大夫新知嶽州夏廙改知池州右朝奉大夫劉願知嶽州右朝散大夫李倫清知太平州召徽猷閣待制知廬州胡舜陟赴行在詔借撥廣西常平免役場務抵當黃金四百七十兩白金八十兩錢五十萬緡赴衡州提刑司别庫樁管非奉朝旨毋得取撥再得旨奏知不行按此句文義疑有脫誤李綱之為廣西宣撫使也剗刷廣西苖役羡錢得七十八萬餘緡米十七萬餘斛未及津置而罷至是提點刑獄公事董弅言於朝故有是命國學免解進士孫掞特補下州文學以從軍之勞也己亥詔自今冬祀夏祭祈榖雩祀正配位並用犢從太常請也自巡幸以來常祀天地以少牢至是輔臣請復太牢以祭事既行博士王普言故事惟大享明堂用太牢乃止用犢普賓子也辛丑樞密院計議官沈昭逺守尚書戶部員外郎先是昭逺以左從事郎與左迪功郎錢圻並為計議官簽書樞密院徐俯薦於上皆召對改京秩俯以九月癸酉薦二人己卯引對庚辰改合入官今併附此前一日俯被旨以圻昭逺並為尚書郎俟有闕乃授而以右承務郎簽書保寧軍節度判官廳公事陳正同右迪功郎監華州西嶽廟吕用中代之昭逺歸安人父千左朝奉大夫圻景祥子正同正彚弟用中好問子也千景祥故以上書入籍而圻昭逺皆以談經嘗為太學博士故俯薦用之於是樞密院徑關中書議者不以為是此為明年正月丙子劉大中乞申敕三省密院差除事祖壬寅簽書樞密院事韓肖胄言昨蒙誤恩擢參右府俾使強敵仗國威靈既已復命竊惟宥密之地當任賢傑豈宜因事輒以假人伏望除臣一在外宫觀差遣詔不許令幹辦內東門司王柔宣押赴都堂治事詔江西大帥司遣官迎奉諸陵帝后位牌赴行在河南鎮撫使翟琮之南遁也依趙鼎於江西故鼎得而上之癸卯以神衛剩員多闕命行在職事官依數給錢自行雇募至今以為例此以四年正月十二日都省批狀增入甲辰詔南班宗室新第仍舊以睦親宅為名乙巳詔三衙管軍月廪並依統兵戰守官例支破丙午殿中侍御史常同言今諸路待闕監司近百人其間凡庸闒冗之尤者請為陛下數之新福建提刑成大亨諂事權貴為戶部郎中催浙東上供豫期趣納為國斂怨淮南轉運副使郭康伯性資邪佞嘗至省門伺堂吏而揖之淮南久不除漕權臣喜之特為復置新廣南提舉市舶林仲堪貪鄙不亷嘗權南劍州楊勍冦至先盜取庫藏之物焚之而遁新江西提鹽章億行同駔儈嘗與兄弟爭財首建析居之議宗黨莫不鄙其所為新提點坑冶鑄錢唐棣黃潛善之客也在揚州與貴近為狹斜之友自運屬除祕丞士論不齒新廣東提鹽蔡向性貪而刻向在浙東率斂錢物無數今又付以此任故態復作矣新湖南提鹽盧宗訓堂吏之家性資凶暴除目之下士夫傳笑謂流品自此不分矣福建提鹽李承邁本假女謁交通權臣新廣西提鹽胡升浮薄晚進因婦翁黃潛善擢為編修官潛善誤國得罪天下豈容其壻尚玷選擢新湖南運判林叔豹自登第即遊梁師成之門以校正太清樓書籍改官頃任御史陛下灼見其朋附逐之提點坑冶鑄錢陳遜向緣童貫特薦改官諂事權臣即得見闕職事曠廢浙西提鹽張願新浙東提鹽鄭僑年皆監當資序願懵不曉事嘗除大理正即以言罷僑年乃崇觀間大臣子年少癡騃此十餘人所為大略如此今乃玷一路之重寄豈特不足以鎮服州郡生靈受弊當不少矣伏望併賜罷黜庶使四方漸有澄清之期於是大亨等十三人皆罷是日金使李永夀王翊至行在永夀等驕倨自肆朝廷患之命右文殿修撰都督府𠫭議官王倫假吏部侍郎即館中與之計事倫為翊道雲中舊故翊不為禮少頃詔賜永夀等衾褥傳旨勿拜倫曰上嘉公輩逺來特命倫相勞此殊恩也宜拜以謝永夀等始拜日歷國信所申王倫賜被褥等傳宣聖旨免拜人使直身立有旨賜生餼依已賜被褥等禮例則是館中未嘗拜也與王倫行述所云差異今且兩存之丁未直龍圖閣知鼎州程昌宇以掩擊王善劉超之功升集賢殿修撰時王􅊅已去昌宇亦將所部還鼎州右儒林郎王氛特改京官氛雲弟也吏部侍郎陳與義言自艱難以來選人用恩賞改官者甚多用舉主改官者甚少欲自今磨勘改官人從上收使五員外有賸數從本部行下所舉官司令再舉庶幾少寬士人平進之路從之戊申右從政郎淮東宣撫司幹辦公事聞人武子特改京官初江西統制官傅樞赴行在而所部在虔州制置使嶽飛移其軍往江州屯駐樞與飛故有隙其弟統領官機與飛軍統領官王貴亦不平機單騎赴洪州軍行至長步其右軍部將元通率其徒千餘人遁去進犯英州掠范瓊女而去又圍南雄州事聞詔本路帥司招捕趙鼎奏戮機詔貸死送飛軍前自效四年四月乙巳既而通受廣東經略使季陵招安通明年三月丁卯可參考己酉金國元帥府議事官安州團練使銀青光祿大夫李永夀朝散大夫尚書職方郎中王翊入見宰執分立御榻左右工部尚書胡松年假吏部侍郎王倫立於東朵殿神武右軍都統制張俊神武中軍統制楊沂中帶御器械劉光烈韓世良立於殿西壁俊等皆裹巾戎服佩劍永夀等先進書於殿下見畢升殿傳語館伴使副趙子畫楊應誠同上國書匣乃朝廷自造幣帛亦預蓄以待之此二事據今年十一月乙丑館伴所畫一修入永夀請還偽齊之俘及西北士民之在東南者且欲畫江以益劉豫既退命客省官賜酒食於殿門外辭亦如之其從者七人亦許至殿門賜翊金幣皆如永夀之數殿中侍御史常同言先振國威則和戰常在我若一意議和則和戰常在彼靖康以來分為兩事可為鑒戒上因從容語武備曰今養兵已二十萬有畸同曰未聞二十萬兵而畏人者也庚戍徽猷閣直學士樞密都承旨章誼升龍圖閣學士中書舍人孫近守給事中時議遣大臣使金而參知政事席益以母老辭上問可代者益薦誼才故有是命是嵗金元帥府右都監宗弼引兵攻和尚原拔之時宣撫處置副使王似盧法原同在閬中乃分陜蜀之地責守於諸將自秦鳯至洋州以利州路制置使兼本司都統制吳玠主之屯仙人關金房至巴逹以鎮撫使兼本司𠫭議同都統制王彥主之屯通川文龍至威茂以降授武略大夫知綿州兼綿威茂州石泉軍沿邊安撫使劉錡主之屯巴西洮岷至階成以熙河路馬步軍總管統制熙秦軍馬關師古主之屯武都先是敵決意入蜀遂犯和尚原統制官吳璘以無糧不能守拔寨棄去失和尚原史及吳玠碑志皆不載惟胡世將奏議云紹興三年冬吳玠失和尚原鄭剛中所奏亦云和尚原自紹興四年以後便是劉豫管守不係吳玠地界故附於此日歷紹興四年十一月八日吳玠奏紹興二年冬臣又與劉子羽議和尚原距川蜀地逺終恐糧道不繼難以持逺遂於川口仙人關側近殺金平修置山寨既下原又得子羽成州及梁洋軍馬併力控扼按此則和尚原之失不在今冬玠自奏不應有誤意者在今年春夏之間饒風交兵之際耳吳璘神道碑云三年敵戰饒風時王駐兵和尚原敵欲道原下王以兵迎擊皆敗而走遷榮州防禦使知秦州詳此當是璘棄和尚原而歸宣撫司因令守秦州耳或可移附今年六月庚寅所書璘遷官時劉錡為四川沿邊安撫日歷不書紹興二十年七月二十二日吏部狀四川制置司申契勘紹興三年內宣撫司分道措置守禦綿州知州帶綿威茂州石泉軍沿邊安撫司公事今來軍事寧息合行罷去有旨依未知錡兼四州安撫的在何月日今因事遂書之當求綿州知州題名修入海冦黎盛犯潮州焚民居毀其城而去盛登開元寺塔望吳氏故居問曰是非蘇內翰藏圖書處否麾兵救之民賴免者甚衆初迪功郎王寵既陷偽齊屏處村落間不復仕進至是劉豫聞其名令赴京擢用寵稱疾不行者經嵗州郡強遣之寵至京終不受偽命而去寵宜川人也紹興十年改官監登聞檢院戶部奏兩浙路主客戶二百一十二萬餘口三百五十六萬餘廣東路稅客戶六十一萬餘口一百七萬餘湖北路主客戶十四萬餘口十四萬餘建炎以來繫年要録卷七十一
