body:
  text: 建炎以來繫年要録卷一百五十宋李心傳撰紹興十有三年九月乙卯監察御史李澗為尚書司封員外即戌午復寧逺萬寧宜倫三縣為吉陽萬安昌化軍並免𨽻瓊州仍以軍使兼知倚郭縣事庚申直祕閣湯鵬舉為淮南東路轉運判官甲子徽猷閣直學士提舉萬壽觀權直學士院洪皓出知饒州時金人來取趙彬輩三十人家屬詔歸之皓曰昔韓起謁環于鄭鄭小國也能引誼不與金既限淮官屬皆吳人留不遣蓋慮知其虛實也彼方困于䝉古恃強以嘗中國若遽從之彼將謂秦無人而輕我矣若恐以不與之故致渝盟宜謂之曰俟淵聖皇帝及皇族歸乃遣秦檜大怒皓又言王倫輩以身徇國棄之不取緩急何以使人初檜在完顔昌軍中軍圍楚州久不下欲檜草檄諭降有錫納者在軍知狀皓與檜語及簽事因曰憶鍚納否别時託寄聲檜色變而罷翌日侍御史李文㑹即奏皓頃事朱勔之壻夤緣改官以該討論乃求奉使比其歸也非能自脫特以和議既定例得放歸而貪戀顯列不求省母若久在朝必生事端望與外任檜進呈因及宇文虛中事上曰人臣之事君不可以有二心為人臣而二心在春秋之法皆所不赦乃命黜皓尚書吏部侍郎魏良臣戶部侍郎沈昭逺並罷良臣與秦檜里舊一日言於檜曰昨日不寐偶思得一事非晚郊祀如遷客之久在遐方者可因赦內徙以召和氣檜曰足下今為何官良臣曰備員吏部侍郎檜曰且管銓曹職事不須胡思亂量侍御史李文㑹即奏良臣卑凡昭逺朋附乃以良臣知池州昭逺知袁州大理寺丞李頴士面對論州縣斷獄蔽訟贖金之弊變成罰金多至數百緡人為破産願詔監司亷察按劾從之乙丑左朝奉大夫祕閣修撰主管台州崇道觀趙子稱守本官職致仕丙寅給事中兼修玉牒官楊願言本所見修玊牒合載靖康末推戴趙氏事竊慮太師秦檜有當時建議文字可見本末望令抄録封送本所照用從之丁卯吏部請以川廣轉運司京官使臣選人逐色差遣各置定差簿二面一留本部一納御史臺先是言者欲以四選逐色闕置總簿而本部言難以檢察乃分京官闕七選人闕十使臣親民監當闕凡二焉御史中丞兼侍講羅汝楫試吏部尚書左司諫詹大方論祕閣修撰主管佑神觀張邵奉使無成嘗與其副不協持創戕之其辱命為甚若置而不問恐逺人聞之必謂中國無賞罰望改授外祠乃以邵主管台州崇道觀已而邵又遺秦檜書言金有歸淵聖及宗室諸王意當為遣使迎請於是檜寖怒之戊辰上謂大臣曰諸處有癃老廢疾之人依臨安例令官司養濟窮民無告王政之所先也兵部尚書兼侍讀資善堂翊善程瑀充龍圖閣學士知信州瑀稱疾乞奉祀乃命出守國子司業兼崇政殿說書髙閌兼資善堂贊讀己巳吏部尚書兼侍講羅汝楫進兼侍讀太府寺丞張子儀面對言淮甸湘濮屢經殘破戶口未復望精選守令優其祿秩假以嵗月寬其文法優游自盡其才三嵗考察以戶口登耗為升黜之典詔淮東京西監司嵗終取州縣所增戶口數申尚書省庚午詔故兵部侍郎司馬朴忠蹟顯著特贈兵部尚書賜其家銀帛三百匹兩以洪皓言其死節也朴後諡忠潔辛未輔臣進呈衢州布衣柴翼益所進春秋尊王聚斷上曰朕已嘗觀但編成門類從後立說無甚意㫖大率說經才穿鑿即不足觀矣左朝請大夫知嘉州楊軝直祕閣軧上書言和戎之利權中書舍人劉才邵奏軝排斥姦言辨明國是有補治道故褒擢焉壬申尚書右司郎中梁辨稱疾乞奉祠上曰士大夫有操守安分而以疾乞去者甚可惜不比奔競之人朕嘗觀寶訓太宗朝士人有奔競躁進者必痛抑之抑奔競則亷恥之道興乃除直龍門閣主管洪州玊龍觀癸酉左朝奉郎知建昌軍李長民言宣和以前應知通令佐升銜並帶主管學事自軍興以來學校之教中輟今和議既成儒風復振謂宜依舊結銜以示聖朝偃武修文之意從之丙子敕令所删定官王晞亮祕書省正字潘良能宗正寺主簿孟處義並與外任侍御史李文㑹言晞亮之於趙鼎良能之於李光處義之於汪藻皆潛植黨與窺伺朝廷動息密通私書相繼不絶僞造事端唱為異說喧傳四方實傷國體望賜罷黜以一內外之心天下幸甚乃以良能通判江州晞亮蒲田人也丁丑詔寶文閣學士知成都府張燾依所乞提舉江州太平觀徽猷閣待制李璆知成都府王明清揮麈録餘話祖宗以來帥蜀悉雜學士以上方為之李璆復次對制閫成都自是蜀帥職始殺矣曹筠王剛中是也按紹聖間鄭雍守成都不帶職政和間周燾上帶待制非自璆始紹興後蕭振符行中亦以次對為之不但曹王二人璆初以次對守成都後四年乃升雜學士為制置使明清所記皆參差不合燾在蜀時有詔宣撫司納契丹降人燾謂胡世將曰蜀地狹安能容且不監前朝常勝軍乎世將奏寢其事蜀自用兵和預買布匹折估錢二引民已病之至是轉運司迫餉軍增至三道成都一路總七十四萬七千有奇燾言昨降度牒二千稱提錢引數適相當願以此代輸從之初燾開府適當歲旱大發積粟以賑饑民撫存黎雅蕃部禁戢貪吏開修渠堰蠲落江田稅遣獄訟修文翁舊學時與諸生講論經㫖政無不舉蜀人大悅徽猷閣待制提舉江州太平觀葉煥卒戊寅祕書省正字洪皓添差通判台州洪遵添差通判常州適遵以奉親自列乃有是命辛巳戶部員外郎張漢彥罷漢彥與龍圖閣秦梓善侍御史李文㑹奏漢彥詐作梓書遺臣以别紙譖毁他人上玷朝廷有傷士體故罷壬午徽猷閣待制知卭州馮楫為瀘南沿邉安撫使知瀘州冬十月甲申朔直祕閣新知邵州何麒落職主管台州崇道觀道州居住麒連為李文㑹所擊上疏訴之秦檜奏麒所言不實上曰此事果實亦不可行宜重加竄責以為士大夫誕妄之戒丙戌太師尚書左僕射秦檜為郊祀大禮使參知政事万俟卨為禮儀使吏部尚書羅汝楫為儀仗使戶部尚書張澄為橋道頓遞使禮部侍郎兼權直學士王賞為鹵簿使故事合祭天地于南郊謂之郊祀大禮元豐分南北郊改曰冬祀建炎初郊不改及是賞等既審于上始草郊杞儀注上之戊子右宣教即新監行在藏西庫曹泳添差通判秀州泳彬五世孫秦熺婦兄也始以武易文故有是命己丑太師尚書左僕射提舉詳定一司勑令秦檜等上國子監太學武學律學小學敕令格式二十五卷權尚書吏部侍郎江邈充集英殿修撰提舉江州太平觀尚書司勳郎中陳康伯為軍器監康伯與秦檜有舊及在朝路淡然無求檜嘗稱其清重焉庚寅祕書丞兼國史院編修官嚴抑轉對言國朝㑹要仁宗時自建隆修至慶歷神宗時自慶歷修至熙寧而後來尚未編集事無所考望命儒臣續而為書抑又言渾儀之制祖宗所留意渡江以來缺然無有乞下太史局重創詔禮部及天文太史局並條具申省初上自海道還臨安之次嵗嘗命有司製渾儀以木樣進既而中寢故抑言及之壬辰詔親衛大夫貴州防禦使知䕫州范綜令再任乙未奉安祖宗帝后及徽宗皇帝顯肅皇后神御于景靈宫太師秦檜為禮儀使先是遣官自海道奉迎至行在上曰此事至重朕甚慮之及聞出陸朕心始安前一日上乃詣承元承順殿告遷至是步𨗳出行宫北門執政使相南班宗室迎拜訖前𨗳至景靈宫參知政事万俟卨吏部尚書羅汝楫戶部尚書張澄分詣三殿行禮時庶事草創乃建萬夀觀于櫺星門內十七年四月始改作戊戌詔川陕諸州秋試舉人並用六月前鎖院先是成都府路安撫張燾乞就春月發揮庶使得解舉人可赴行在省試禮部言自來發解年係三月降詔故改用夏季焉己亥上諭大臣曰自今宗子許於所載入學令與寒士同處第别作齊仍選士人為長諭庶盡變積習文行皆可取也庚子上詣景靈宫行欵謁之禮辛丑亦如之甲辰給事中兼修玊牒官兼侍講楊願權直學士院顯謨閣學士提舉江州太平觀汪藻落職永州居住右司諌詹大方論藻始遊蔡京之門終為王黼之客前日在朝異議者皆藻之所為今復居近地陰遣耳目刺探微密務為扇搖望令逺方居住以示懲戒之萬一故有是命直寶文閣充江浙荆湖福建廣南路都大提㸃坑冶鑄錢韓球過闕入見升直龍圖閣丙午保信軍承宣使提舉萬夀觀邢孝揚為賓德軍節度使丁未左承議郎權京西路轉運判官蔡安强直祕閣知襄陽府始用文臣也是月湖州言長興縣民華小九取肝以療父疾詔旌表門閭十有一月癸丑朔左正議大夫提舉台州崇道觀王仲薿復顯謨閣待制致仕仲薿始坐江西降敵失官後復故秩至是獻紹興聖德頌于朝且遣秦檜書有云黃紙除書久無心於夢寐青氊舊物尚有意於陶鎔書未報而仲薿卒權中書舍人劉才邵因言其所進頌既進歸美之實而權制典雅真得家法之傳乃有是命王明清揮麈録餘話王仲薿豐甫建炎初知袁州金人犯江西坐失守削籍後秦會之再入相會之仲山壻也豐甫以啓懇之會之為開陳詔復元官奉祠放行奏薦時豐甫崎祿已為通議大夫不問職名所以譖孫皆奏京秩年八十餘卒按日歷紹興六年七月仲薿以上其父圭神道碑復左中大夫奉祠是時趙鼎當國秦檜未再相不知何時再復元官當考詔今年郊恩封贈封叔並令命詞給告以祕書郎張闡轉對有請也戊午上服袍履乘輦詣景靈宮行朝獻之禮遂赴太廟宿齊己未朝饗太廟禮畢上服通天冠絳紗袍乘玉輅齊于青城庚申日南至合祀天地于圜丘太祖太宗並配自天地至從祀諸神凡七百七十有一設祭器九千二百有五鹵簿萬二千二百有二十人祭器應用銅玉者權以陶木鹵簿應有用文繡者皆以纈代之初備五輅惟玉輅並建旗常餘各建所載之旗青城用蘆席絞屋為之飾以青布不設齊宮以黑繒為大裘蓋元祐禮也禮官以行在御街狹故自宮徂廟不乘輅權以輦代之禮畢上不御樓內降制書赦天下何俌龜鑑過宗廟則必有敬心見墟墓則必有哀心桐宮為自怨自艾之地郊祀見基命宥密之意今景靈之輪奐一新圜丘之規制一定風景雖殊山河頓異固不能不起秋風黍離春日蒲栁之嘆然天子建國宗廟為先祭祀之典天地為重鳴條之師正可告於皇天孟津之舉亦可類於上帝則郊祀之舉亦未害也丁卯秦檜奏前日䝉附出御書尚書來日欲宣示侍從官不惟觀陛下書法之妙又令知陛下聖學不倦如此上曰朕之性與人異無事則靜坐觀書所得甚多又曰朕觀古之人君有嗜殺人者蓋不能養性故多恣暴大率知足更無事貴為天子誰能制之若不知足更為侈靡未有不亂如唐明皇是也檜曰陛下聖德如此三代顯王何以加諸時上所寫六經與論語孟子之書皆畢檜因請刋石於國子監仍頒墨本賜諸路州學詔可檜記於篇末略曰天降下民作之君作之師自古在上則君師之任歸於一致堯舜之世比屋可封此其效也陛下天錫勇智撥亂世反之正又於投戈之際親御翰墨書六經以及論語孟子朝賢從事為諸儒倡堯舜君師之任乃幸獲親見之夫以乾坤之清寧世道之興起一人專任其責所為經綸於心表儀以身者勤亦至矣所望於丕應者豈淺哉詩不云乎思皇多士生此王國王國克生維周之禎臣願與學者勉之呂中大事記所幸聖心無欲君德無玷檜雖使人上聖德頌而上萬幾之暇專意經術親書石經命儒臣紬繹其說祁寒隆署略無倦色又作損齊置經史古書於其中以為燕坐之所且為之記其講學不輟也己巳福建轉運司進錦樣上諭輔臣曰儻可備禮物之用亦無庸逺取苐須令官給其直毋使及民恐閩中又生此一擾也詔諸州將舊贍學錢糧撥還養士監司常切覺察毋得他用仍各具養士及錢糧數申省以右朝奉郎劉子翼知信州還有請也除名人葉湍瓊州編管永不放還湍以事編置南雄州而守臣劉掄奏其興訛造謗乞不以赦宥特竄遐陬故謫之葉湍本末當考庚午給事中楊願假禮部尚書充大金賀元旦接伴使容州觀察使知閣門事兼權樞密副使承㫖曹勛副之及還就充送伴自是以為例願等就充送伴在明年正月朔降㫖今併書之勛權密㫖日歷不見本院官屬題名在十四年而無其月恐誤癸酉太常博士劉嶸轉對言國之大事在祀昨自南渡草創未能備物凡遇大小祀祭並權用奏告禮一籩一豆酒脯行事此在當日固未遑議今時方中興容典未備如日月五帝且不得血食神州感生亦削去牲牢風雷蠶農盡寢其禮簡神瀆禮於是為甚望明詔有司講求祀典凡不可闕者並先令復舊其他以次施行從之甲戌入內東頭供奉官睿思殿祇候鄭幵除名衡州編管左武大夫武勝軍承宣使侍衛步軍司統領張守忠降二官以守忠與幵交通而幵受守忠賂遺也丙子詔北使往來並於盱眙軍鎮江平江府賜燕遺內侍蒞之戊寅侍御史李文㑹論户部員外郎勾龍庭實仕於公朝而不知尊主之義望罷黜以清朝列上曰可與外任此人是川人大率川人多學蘇軾如江西人盡學黃庭堅上因說及梁師成蘇軾文字首尾都記得此人雖是內侍却讀書只是不合干預朝廷事如薦引士大夫皆非所當為內侍引用人才最害政之大者此等人便當重置於刑歷觀諸古內侍薦引人才未有不致於亂者乃以庭實知眉州十有二月癸未朔日有食之詔避殿減膳是日隂雨不見太師秦檜率百官上表稱賀自是如之逮檜薨乃止甲申徽猷閣待制李正民提舉江州太平觀金人之叛盟也正民為淮寧守以城降時孟庾路允迪皆已奪官而正民未及貶比歸以舊官見至是得祠丁亥尚書禮部侍郎兼實録院修撰兼侍講兼權直學士院王賞知利州侍御史李文㑹論賞外示朴野心實傾邪程敦厚子壻也而賣之勾龍庭實何麟腹心也而人莫知之情厚貌深如此而他豈易測伏望速賜斥逐以厲百官故有是命庚寅太師秦檜以瑞雪應時率百官詣文德殿拜表稱賀自是嵗如之迄今不改起居舍人兼權中書舍人劉才邵兼權直學士院辛卯詔民間所用私鑄當二毫錢悉毁之違者抵罪自不及百錢以上皆許告賞時江右私鑄甚衆上諭輔臣令嚴行禁止公私毋得用壬辰樞密院編修官魏元若權太學博士臨安府府學教授林大鼐權國子正左迪功郎新浙西安撫司準備差遣陳䕫權太學録用司業髙閌請也夔大鼐皆永嘉人也癸巳詔試中監學生依嘉祐故事給綾紙用左朝請大夫新知永州熊彥詩請也彥詩言主上登用直儒載興太學監帖之制似可復行秦檜進呈上曰學校者人才須素養太宗皇帝置三館養天下士至仁廟朝人才輩出為朝廷用檜曰國朝崇儒重道變故以來士人雖陷敵者往往能守節義乃教育之效也上曰然三代之季學校不修故當時士人多無名節今日若不興崇學校將來安得人才可用耶祕書丞嚴抑言本省藏祖宗國史歷代圖籍舊有右文殿祕閣石渠及三館四庫自渡江後權寓法慧寺與居民相接深慮風火不虞欲望重建仰副右文之意於是建省於天井巷之東以故殿前司寨為之上自書右文殿祕閣二榜命將作監米友仁書道山堂榜且令有司即直祕閣陸宰家録所藏書來上何俌龜鑑藏書求書制禮作樂使不於此而汲汲焉則將踵漢人馬上安事之陋習而守殘補缺重為來世之嘆昧東都熙洽之儀容而播鼗于河海亦豈盛世之事矧祕書三館書籍經史凡所謂典章文物者盡入于金也哉是日賜喜雪御筵于尚書省初復故事也甲午以郊禮畢恭謝景靈宫乙未亦如之又命內臣恭謝萬夀觀神御丁酉哲宗修容魏氏薨贈婉儀右宣教郎權敕令所刪定官巫伋靣對請增太學弟子員詔增二百伋句容人也己亥奉國軍以節度使金房開逹州安撫使金州郭浩來朝命坐賜茶皇兄寧逺軍承宣使權主奉益王祭祀安時為寧國軍節度使起居舍人劉才卲試中書舍人兼權直學院宗正少卿假拂權尚書庚子權尚書禮部侍郎兼資善堂翊善秦熺權尚書刑部侍郎周三畏並落權字詔故左朝請大夫右文殿修撰崔縱例外官其家一人以尚書省言縱奉使異域身亡理宜優恤故也癸卯有司進呈賜北使弓矢上以其不精工命出內庫所造者賜之翌日諭大臣曰此朕自指教雖軍中人亦未必能之賜豫使人不能觀美兼器械之良亦可使逺人知所畏服甲辰武德郎楊庭特換右通直郎庭政子以川陜宣撫司策試如式也乙巳太師秦檜辭生日賜宴詔曰以不世之英值難逄之㑹其始生之日可不為天下慶乎宜服異恩無守沖節檜每生日四方獻夀者金玉為不足至于搜盡世間之希竒以為侑錫賚踵至賜教坊樂佐酒一日伶人作雜劇之戲熺笑聲微髙檜目之不語少頃檜起更衣久而不出其夫人王氏使人候之乃在一室中默坐論者謂檜歎其不足以相副也嗚呼深哉自檜每生日已下並以趙甡之遺史本文修入權尚書禮部侍郎假拂兼實録院修撰丙午侍御史李文㑹言金國遣使禮意至厚宜嚴戒有司討論舊典精加補緝以稱陛下和好之誠從之己酉大金賀正旦使副左金吾衛上將軍右宣徽使完顔曄祕書少監馬諤見于紫宸殿金主遺上金酒器六事色綾羅紗縠三百假馬六匹自是正旦率如此例曄金主大父行也故事北使跪進書于殿下自通好後金使每入見捧書升殿跪進上起立受書以授內侍金使道其主語問上起居上復問其主畢乃坐曄等既見上謂秦檜曰今汝使人來大體皆正其他小節不足較觀金人之意和議必須堅久檜曰所以然者由陛下御得其道上曰非卿學識過人堅主和議安得如此臣謹按紹興三十二年張忠建乾道七年為為凌阿天錫淳熙八年賀生辰人使皆爭進國書事而日歷載徐嚞待罪狀但云請近上臣僚受書而已熊克小歷乃云忠建欲以舊禮受書楊萬里撰虞允文碑又云天錫進書跪不肯起要我以故事所無之禮皆不得其詳龔頤正撰范成大行狀又云隆興再和名體雖正失定受書之禮上帝悔之乾道六年五月遷公起居郎充祈請使公密早奏具言啓書有曰抑聞附請之詞欲變受書之禮出於率易要以必從然亦不云舊禮如何今以日歷㑹要大懷忠入見儀注及朝公忿敗盟記參考之進書之儀大略如此故掇取附見以補史闕若遂略而不書則後世將謂有不可書者故當記其實也或可移附紹興三十年二月初詔户部尚書張澄館伴北使是禮久不講澄知舊制入國門前一日班荆館賜宴既至驛賜被褥紗羅翌日臨安府書送酒食又翌日乃朝客省賜茶酒垂拱殿晏退賜茶器翌日賜生餼從例折博游上天竺寺賜香及齊筵冷泉亭酒果除夕賜內中酒食風藥花餳正旦殿賜茶酒大臣就驛御筵遇立春賜夀盤幡勝三日客省簽賜酒食內中酒食江下觀潮四日宴射賜酒果弓矢例物五日大宴集英殿六日朝辭賜衣帶銀器臨安府書送贐儀大臣就驛賜宴密賜金銀翌日行賜龍鳯茶金鍍銀合又翌日班荆館賜宴遂為定式其後上以使人市買方物恐或擾民每北使至館即出內庫錢萬緡付都亭驛遇使人市物隨即取償自是以為例出內庫錢付驛事不見于他書今以三十六年七月癸亥宣諭聖語修入按日厯澄受命館客乃在十四年五月不知熊克小厯何以繫之此年姑附此更須詳考惟敵使朝謁稱謂乃與伴使往來視京都舊儀則有不同焉日厯紹興三十二年三月六日接伴使洪邁等奏接佯變更舊例十四事三月七日閣門客省奏北使朝北禮儀三月二十五日館伴使徐嚞等奏館伴更改近例十四事並詳見本年月此不别出又詔歲幣銀絹令淮南漕臣盱眙軍等臣遣官過淮交割事畢取㫖推恩于是所遣官六員各減二年磨勘日厯無此今以紹興三十三年六月甲子申明指揮修入是歲宗歲子賜名授官者十有五人諸路斷大辟八十八人關外初行營田凡一千三百餘頃初申嚴淮海銅錢出界之禁而閩廣諸郡多不舉行于是泉州啇人夜以小舟載銅錢十餘萬緡入洋舟重風急遂沉于海官司知而不敢問此據湯鵬舉義附入二十六年五月甲子再降㫖申嚴金主亶初頒皇朝新律其法千餘條大抵依倣中朝間有創立者如毆妻至死非用器刃者不加刑他率類此徒自一年至五年杖自百二十至二百皆以荆決臀仍投之逺使之雜作惟僧尼犯姦及强盜不論得財不得財並處死則與古制異矣建炎以來繫年要録卷一百五十
