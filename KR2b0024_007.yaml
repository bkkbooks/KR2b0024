body:
  text: 建炎以來繫年要録卷七宋李心傳撰建炎元年秋七月己丑朔溫州觀察使樞密院都承㫖王􅊛為河東經制使通直郎直祕閣傅亮為副使詔諸路常平司見在金銀並起發赴行在龍圖閣學士提舉鴻慶宫兼侍讀耿延禧知宣州延禧與李綱不協自京城使還以父老乞去故有是命朝請郎李積中知襄陽府奉直大夫趙岍知平江府朝請郎周杞知常州積中南昌人宣和未為宗正少卿坐元祐黨送吏部至是再用之岍髙密人也庚寅命御營使司都統制王淵討軍賊杜用都巡檢使劉光世討李昱御營使司左軍統制韓世忠前軍統制張俊分討魚臺黎驛亂兵自宣和末羣盜蜂起其後勤王之兵往往潰而為盜至是祝靖薛廣党忠閻瑾王存之徒皆招安赴行在凡十餘萬人李綱為上言今日盜賊正當因其力而用之如銅馬緑林黃巾之比然不移其部曲則易叛而徙之則致疑正當以術制之使由而不知乃命御營司委官分揀凡潰兵之願歸營與良農願歸業者皆聼之所發至數萬又擇其老弱者縱之其他以新法團結擇人為部隊將及統制官而其首領皆命以官分𨽻諸將由是無叛去者獨淮寧之杜用山東之李昱河北之丁順王善楊進皆擁兵數萬不可招而拱州之黎驛單州之魚臺亦有潰卒數千為亂綱以為專事招安則彼無所畏憚勢難遽平乃白遣淵等率所部分往討之時李昱犯沂州守臣某閉門拒守以官妓十人遺之昱乃去至滕縣掠民董氏女有美色欲妻之董氏罵昱而死昱自費縣引兵圍長清光世遣其將喬仲福追擊斬之既而用為淵所殺餘悉殄平丁順者嘗為滄州兵馬鈐轄王善者為雷澤尉皆以罷從軍不得志事見五月甲午楊進者進初見四月戊寅以其才為淵所忌懼罪亡去號沒角牛兵尤衆又李孝忠既破襄陽擾京西諸郡綱以京城都巡檢使溫州觀察使范瓊反側不自安因命瓊討孝忠使離都城且示以不疑之意瓊乃將所部赴行在既而丁順等皆赴河北招撫司自效盜益衰辛卯籍東南諸州神霄宫田租及贍學錢以助國用從禮部請也尚書兵部侍郎董耘試兵部尚書熊克小厯在己丑本部題名在辛卯今從日厯右諫議大夫宋齊愈罷初齊愈既論尚書右僕射李綱之過㑹朝廷治從逆者之罪言者論齊愈在皇城司首書張邦昌字以示議臣由是罷諫議大夫下臺獄制曰所幸探符之未獲奈何援筆以遽書遺毒至今造端自汝或曰齊愈論綱不已故綱以危法中之趙甡之遺史曰宋齊愈新除諌議大夫是時李擢為給事中擢與齊愈在圍城中皆非純臣擢謂齊愈為諫官必論已必得罪且曰先發制人乃不書黃而繳駁之曰昨三月初王時雍等在皇城司聚議乞立張邦昌拜大金詔畢書議狀時雖時雍亦恐懼不敢填邦昌姓名而齊愈奮然大書張邦昌三字仍自持其狀以示人四座無不驚駭齊愈自言從二月在告不出欺誕若此今除諌議大夫當是陛下未知其人邪佞而朝廷未有人論列更乞聖裁遂罷諫議大夫令王賔根勘按日厯齊愈以今年五月戊戌除諫議大夫而擢以五月甲寅除給事中在其後半月不知何以録黃方過後省兼擢以六月癸亥坐僞楚事責湖南去此已踰月不知所繳何以方下甡之所記恐或有誤也然齊愈除諫議時擢已為中書舍人或者當時有論列而不行至是李綱方檢舉將上亦未可知姑附此更求他書考正之承務郎諸王府贊讀江端友試尚書兵部員外郎端友休復孫也休復南昌人嘉祐中修起居注按史端友無前銜此據邵伯溫辨誣所載端友上欽宗書增入隱居京城東郊躬耕蔬食素有髙行蔡京欲辟之不能致靖康初上書論事後用吳敏薦授官至是召用徽猷閣待制知平江府鄭滋責授祕書少監分司南京筠州居住坐圍城時日事燕飲為轉運判官顧彥成所劾也滋建德人彥成邵武人或曰李綱之罷行營使也滋當其責詞頗肆醜詆故彥成以私書言之於綱復下彥成體量而有是命二年八月辛未改正甲午按原本缺甲午日查十月六日壬戌陸藻卒注云見七月甲午宜於此處補入龍圖閣待制知杭州葉夢得復龍圖閣直學士奉議郎李邴朝請大夫提舉西京嵩山崇福宫陸藻並復徽猷閣待制邴鄴兄藻侯官人也大觀中嘗為給事中靖康初坐避事奪職至是始復之是日案二年四月丁卯注士珸於甲午入洺州則是日為甲午無疑皇叔右監門衛大將軍貴州團練使士珸以義兵復洺州初士珸從上皇北狩次洺州城東五里與諸宗室議欲遁還據城謀未就而敵圍已合同行皆散去無一人留者士珸得蹇驢跨之西馳夜半為盜所奪徒步疾走遲明抵武安縣憩於張氏酒肆語其人曰我皇叔也縣官聞之俱來謁資以衣冠鞍馬得少壯者百餘人從至磁州舍於州治乃召集議軍以解洺圍不旬日得兵五千人歸附者至數萬以王江李京將之先是直寶文閣知洺州王麟自將勤王兵千人至大名既而以母老求去上疑其有異志然卒遣之及金人遣萬户伊埒圍洺州麟帥軍民以城迎拜軍民怒併其家殺之趙甡之遺史云金人圍洺州以知州王麟是童貫舊屬官遂於城下呼為王姑丈間其民心軍民信之殺麟全家與此不同今據耿延禧中興記修入獨餘統制官韓一在城中士珸至邯鄲而統制官李琮亦以兵會時金兵未退士珸夜半傅城下力戰破其寨翌日入城部分守禦金人力攻之士珸勵將士以火炮中其攻具以計生獲其將領乃解圍而去士珸岐簡獻王少子岐簡獻王仲匆濮王孫澶淵郡王宗冶子天資警敏方童稚凛然如成人至是才弱冠也此據士珸附傳及建炎三年正月河北東路制置司捷報參修傳云至邯鄲朝廷亦遣李刺史兵來㑹未至而李兵叛去遂收其散亡得六千餘人自將之據史李刺史失其名而捷報云不期又有都統制軍馬李琮等兩項人兵共議起發則李刺史即琮也琮非朝廷所遣當是河北義兵自詭王命者今略刪潤趙甡之遺史云金人自京師回經由洺州境內軍民劫之得南班宗室士遂留為知州甡之所云即士珸也乙未溫州觀察使京城內都巡檢使范瓊為定武軍承宣使御營使司同都統制徽猷閣待制知密州郭奉世統兵勤王久而不至詔本路諸司尋訪以聞此為杜彥據密州張本奉世行遣未見當考求附書之丙申詔諸路米綱以三分之一輸行在其餘悉赴京師先是汴河上流為盜所决閉塞久不合綱運不通乃責都水使者陳求道榮薿為散官仍領監事與提舉京城所內侍陳良弱董治之再踰旬而水復故時京師軍民方闕食故命濟之仍以空舟載六曹案牘及甲器赴行在舊京師米升三百及是始平朝奉郎曹大同落致仕提舉淮南西路刑獄公事大同宣和七年七月除膳部員外郎未知何時致仕直龍圖閣江淮發運副使向子諲言去嵗閏月劉順賫到淵聖皇帝蠟詔令監司帥守募兵勤王臣即時鏤板遍檄所部非不勤至而六路之間漠然無有應者間有團結起發去處類皆兒戲姑以避責而已非有救灾弭難之誠意也惟淮東一路臣親率諸司為之粗成紀律然諸司猶有占吝錢物不肯應副略不念君父幽處圍城之中臣當時恨無利創以加其頸今京城既已失守二帝既已播遷夫復何言然竊謂儻置賞罰而不行則臣恐今日已後金人復為邊患陛下復欲起天下之兵而諸路玩習故常恬不知畏則朝廷何恃以協濟艱難哉願明詔大臣按劾諸路監司昨承蠟詔指揮廢格不勤王者與夫號為勤王而滅裂者悉加顯黜以為將來誤國忘君之戒詔諸路提刑司究實以聞日厯臣僚上言無姓名以事考之則子諲也戊戌正議大夫欣州觀察使張換為河北制置使詔京東帥司相度自登萊至海州置斥堠熢燧等事先是朝請郎知海州魏和言海州至登萊最近而登州與金人對境近聞金人於燕山造舟欲來東南望造戈船修樓櫓依登萊例屯兵二三千人以備緩急許之至是和代還復有此請直祕閣知恩州趙子昉貶秩三等仍奪職坐河决所部也東都宣武卒杜林謀掠成都以叛伏誅時淮甸秦隴皆用兵蜀人洶懼林本山東羣盜後戍成都乘是與其徒二十九人謀招集亡命大掠成都驅民之東川由中水出峽南奔以應金兵自夏及秋計議已定至是會于城南漢昭烈廟將乘夜襲官船取器仗部分未發廟祝馬古與其子信覺之馳詣府告變兵馬都監陸世修等率吏士捕斬之後録古等功以為承信郎初平陽府吏張昱坐法黥既而亡歸聚衆數千㑹慈州無守軍民共議迎昱入州權領州事金人屢犯其境皆不攻徑過至是以昱為閣門祗候知慈州俄金人復引兵來攻慈無城不可守昱遂率其衆出奔金人陷慈州撫定而去此據趙甡之遺史金國通問使傅雱發東京此據雱通問録日厯於此月壬辰方書雱借官出使恐誤是日淵聖皇帝自雲中至燕山府居于愍忠寺趙子砥燕雲録淵聖七月初至自雲中七月上旬二聖相見戊戌初十日也故附此日己亥詔省臺省寺監官减學官館職之半三年四月庚申又减以常平事歸提刑司紹興八年十二月復市舶事歸轉運司三年五月復罷諸州分曹制掾縣户不滿萬勿置丞堂吏磨勘止朝請大夫出職止為通判宰執子弟任待制以上者並罷執政官减奉錢三之一京官奉祠者亦如之先是宰臣李綱言艱難之際賦入狹而用度增廣當內自朝廷外至監司州縣皆省冗員以節浮費上命中書省條具至是行下自蔡京用事子孫皆至大官其後宰相鄭居中劉正夫余深白時中諸子悉以恩澤為待制雜學士故綱有此請然未及行二年二月辛酉行遣居中開封人正夫西安人深閩縣人也尚書吏部員外郎衛膚敏守衛尉少卿膚敏自明州還朝事祖見今年四月末上書伏矯制之罪上嘉賞之膚敏言屬者金犯汴京乘輿保金湯而居固善然知今雖棄去秋必復來而尚嬰孤城此大臣不知變之過也今兩河諸郡幸皆堅守臣謂宜陰以帛書許其世封使人知自愛不為賊有其陜西山東淮南則令增陴濬隍訓齊其人而擇大臣以鎮撫之可也尚書言浙江民間有釣魚船謂之釣槽其船尾濶可分水面敞可容兵底狹尖可以破浪糧儲器仗置之簧板下標牌矢石分之兩傍可容五十卒者面廣丈有二尺長五丈率直四百緡請下浙江諸州募豪民入中每十五艘授迪功郎從之顯謨閣學士知越州翟汝文貶秩二等先是汝文用赦放民租為四十萬緡言于朝未報事見今年六月末兩浙轉運判官侯官吳昉以淮南軍衣不足詰汝文汝文􅊾昉言宣和七年登極赦文應州縣有合寬恤事許逐路帥臣一面施行訖奏今來漕司乃敢故違抗拒君命未欲奏劾昉訴于朝故貶徽猷閣待制知平陽府髙衛坐棄城落職衛安陽人也辛丑詔曰朕權時之宜法古巡狩駐蹕近甸號召軍馬以防金人秋髙氣寒再來犯界朕將親督六師以援京城及河北河東諸路與之决戰已詔奉迎元祐太后津遣六宫及衛士家屬置之東南朕與羣臣將士獨留中原以為爾京城及萬方百姓請命于皇天庶幾天意昭答中國之勢寖彊歸宅故都迎還二聖以稱朕夙夜憂勤之意應在京屯兵聚糧修治樓櫓器具並令留守司京城所户部疾速措置施行時李綱入朝月餘邊防軍政已略就緒獨車駕行幸未有定所綱間為上言今縱未能入關猶當適襄鄧以示不忘中原之意選任將帥控扼要害使今冬無虞車駕還闕天下之勢遂定而近議紛紜謂陛下將幸東南果然臣恐中原非復我有上曰但欲迎奉太后及六宫往東南耳朕當與卿等留中原綱再拜賀因乞降詔上乃命綱草詔頒之兩京焉右正言鄧肅請竄斥邦昌僞命之臣右司諫潘良貴亦言宜分三等定罪上以肅在圍城中知其姓名令肅具奏肅言叛臣之上者其惡有五一曰諸侍從而為執政者王時雍徐秉哲吳幵莫儔李回是也其二曰諸庶官及宫觀而起為侍從者胡思朱宗周懿文盧襄李擢范宗尹是也其三曰撰勸進文與撰赦書者顔博文王紹是也今紹已投嶺外而撰赦文者止令分司亦何私於博文哉其四曰事務官者金人已有立僞楚之語朝士集議恐不能如禮遂私結十友作事務官講冊立之儀搜求供奉之物悉心竭力無所不至其五曰因邦昌更名者何昌言昌辰是也已上數等乞定為叛臣之上置之嶺外所謂叛臣之次者其惡有三其一曰諸執政侍從臺諌稱臣於僞楚及拜於庭下者是也所謂執政者馮澥曹輔是也所謂侍從者其餘已行遣矣獨有李㑹尚為中書舍人所謂臺諫者洪芻黎確等及舉臺之臣是也當時臺中有為金人根括而被杖者四人以病得免其餘無不在僞楚之庭矣其二曰以庶官而升擢者此不可勝數乞委留守司按籍考之則無有遺者其三曰願為奉使者黎確李健陳戩是也已上數等乞定為叛臣之次於逺小處編管時王時雍徐秉哲已先竄乃詔責授昭信軍節度副使吳幵移韶州責授寧江軍節度副使莫儔移惠州太中大夫盧襄通直郎提舉杭州洞霄宫范宗尹朝奉郎朱宗責成欣祁三州團練副使襄衡州宗尹鄂州宗嶽州並安置中大夫提舉成都府玉局觀馮澥朝請郎試中書舍人李㑹並降三官為祕書少監分司南京澥成州㑹筠州居住故尚書工部侍郎何昌言追貶隰州團練副使通直郎新通判南劍州何昌辰除名永州編管朝請大夫黎確朝散郎李健尚書虞部員外郎陳戩並與逺小監當承議郎侍御史胡舜陟朝散郎新知無為軍胡唐老奉議郎守殿中侍御史馬伸朝散郎監察御史齊之禮朝請大夫新知衢州姚舜明宣教郎新知江州王俁皆降二官撰勸進文及事務官令留守司具姓名申尚書省唐老舜明俁皆坐嘗為臺官伸嘗請邦昌復辟而不自言故例貶秩日厯六月乙亥胡舜陟胡唐老姚舜明王俁各降二官有誥詞而于此又書之按此月所書比前為詳今從之吕本中雜記曰鄧肅前一年因李綱進得官時又用汪伯彥薦為右正言故傅㑹綱意專以圍城為言既而潘良貴又乞分三等誅罰觀文殿學士提舉杭州洞霄宫耿南仲龍圖閣學士新知宣州耿延禧坐父子主和並奪職仍以延禧提舉江州太平觀用鄧肅再疏也日厯南仲落職於此日五月癸亥兩書之蓋誤詔江寧府因軍變走避官並放罷壬寅侍御史胡舜陟充祕閣修撰知廬州舜陟嘗論宰相李綱之罪上不聼舜陟因求去㑹言者論其嘗事僞庭乃命出守日厯五月壬子胡舜陟除祕閣修撰知廬州七月壬寅降授宣教郎守侍御史胡舜陟特授祕閣修撰權發遣廬州按五月壬子舜陟未降官今附七月時淮西盜賊充斥廬人震恐日具舟楫為南渡計舜陟至修治城池建樓櫓戰棚具藺石布渠答又增築東西水門疏决壅潰因濠壘以備衝擊繇是廬人始安起復朝請郎王圭言金人攻城多是數處併攻如攻東者妄稱西壁已破攻南者妄稱北壁已破俟喧囂不定即乘隙登城又金人多用黑旗上城務令守人奪取以惑衆金人多拋大炮宜用囊盛麩糠布於敵樓則炮不能害又女墻頭宜各置木椎一具遇敵登梯以椎擊之不費矢石詔下其說使㳂邊知之圭真定人金之入汴也圭方持喪率衆數萬保山寨屢與敵角聞上登極自山寨間道來歸故起復之徽猷閣待制提舉亳州明道宫王資深卒資深朐山人事上皇為中書舍人卒年七十八寶文閣學士知江寧府兼江南東西路經制使翁彥國卒此據劉䝉自辨狀日厯無之癸卯尚書右丞吕好問充資政殿學士知宣州初好問與李綱論事不合㑹鄧肅奏僞命臣僚其言事務官頗及好問侍御史王賔亦上疏極論好問在圍城中方淵聖拘於敵營宜以蠟書至元帥府取兵而反勸進懷二挾姦無大臣節况嘗汙僞命不可以立新朝上手札賜綱曰好問心迹與餘人不同言者所不知仰尚書省行下好問慚力求去且上疏自理曰昨金人圍閉邦昌僣號之時臣若閉門避事以潔其身實不為難况臣於邦昌未入城之際曾乞致仕重念臣世受國恩異於衆人親受賢者之責身任宗社之重故忍恥含垢逭死朝夕不避金人滅族之禍遣人衝圍賫書於陛下而又畫謀奉迎幸而天佑神助得覩今日中興之業則臣之志願畢矣向若金人網羅得臣之書而臣之謀畫萬一泄露則臣之一身與臣之家族當如之何區區之忠皇天后土知之宗廟社稷知之陛下又知之臣之心跡顯然明白今若不速自引退使言者專意於臣而忘朝廷之急則兩失其宜疏入乃有是命好問家傳云好問罷政在七月己酉而日厯於六月癸未七月癸卯兩書之考其前後當是癸卯得㫖而已酉出告耳延康殿學士提舉南京鴻慶宫許翰守尚書右丞靖康中李綱與翰同在樞府知其賢至是力薦于上謂翰外柔內剛學行純美謀議明决宜在左右參决大政上亦喜其論事遂用之日厯翰除命於此及八月甲子兩書之蓋誤是日腰斬通直郎宋齊愈於都市齊愈初赴獄以文書一縑囊授虞部員外郎張浚曰齊愈不過逺貶它時幸為我明之此李㑹勸進張邦昌草藁也時御史王賔劾齊愈未得實聞齊愈有文書在浚所遽發篋取之賔密諭㑹妄自㭊而證齊愈且歸議狀事於王時雍齊愈引伏法寺當齊愈謀叛斬該大赦罰銅十斤情重取㫖黃潛善等頗營救之上曰使邦昌之事成置朕何地乃詔齊愈探金人之情親書姓名謀立異姓以危宗社造端在先其罪非受僞命臣僚之比可特不原赦議者或以為寃熊克小厯云賜齊愈死按詔㫖云依法定斷非賜死也張栻私記云張邦昌之挾敵以僣也在金營議已定宋退翁自㑹議所歸道遇鄉人問之曰今日金所立者誰退翁疏書邦昌姓名於掌以示之而李丞相以為退翁自㑹議所即取紙筆書邦昌姓名造端謀立丞相與王賔又密諭李㑹使妄自㭊而歸其事于退翁丞相竟匿㑹勸進藁而執其章論退翁死李公旋罷相齊愈按欵云軍前遣吳幵等將文字稱廢淵聖皇帝齊愈孫傳等在皇城司集議遂到本司見衆官及桌上有王時雍等衆議推舉張邦昌狀草齊愈問王時雍舉誰時雍云金人令吳幵來密諭意舉張邦昌今已寫下文字只空著姓名又看得金人元來文字聲說請舉軍前南官以此參驗王時雍語言即是要舉張邦昌齊愈恐違時别有不測為王時雍說吳幵密諭張邦昌亦欲早圖了結齊愈輒自用筆於紙上書張邦昌姓名三字欲要于舉狀內填寫却將呈時雍其時時雍稱是又節次遍呈在坐元集議官齊愈言道張邦昌衆官看了别無言語齊愈令人吏依紙上所寫於已寫選官元空缺姓名以治國事舉狀內填寫張邦昌姓名三字後别寫申狀係王時雍等姓名時雍看了分付與吳幵莫儔將去其狀內無齊愈姓名所有齊愈寫張邦昌片字即將毁了並無見在收得王時雍等元議定推舉狀草歸家初䝉勘問時雍懼罪隱伏不招再䝉取㑹到中書舍人李㑹狀軍前遣吳幵等傳大金指揮選擇異姓是日在皇城司聚議匆有右司員外郎宋齊愈自外至見商量不定即於本司㕔前寫文字吏人桌子上取紙一片上寫張邦昌三字遍呈在坐相顧失色莫敢應其所寫姓名文字係宋齊愈自將却㑹即時起去又根取到元狀草子再勘方招按齊愈所坐乃首書張邦昌姓名而㑹所草乃空名議狀又當時已根取到元狀草至獄而此云綱匿其藁蓋誤記也齊愈死小厯及諸書在此月壬子日厯在癸丑按壬子張浚已入臺無容不辨案欵降㫖在癸卯今從之三年十一月丁未追復吕中大事記曰宋齊愈之罪當從王時雍等之例貶而竄之可也何至是耶洪芻陳冲王及之死綱尚救其死而獨不救宋齊愈綱於是失政刑矣中興之初大臣有一事之當理則足以興起人心有一事之稍非亦足以抑遏人心此所以來張浚之疏也浚素與齊愈友而又潜善客也以潜善而忌李綱是以小人而忌君子也以張浚而攻李綱是以君子而攻君子其可乎豈非張浚初年之見耶甲辰衛尉卿孟忠厚充徽猷閣待制提舉迎奉元祐皇后一行事務尚書司封員外郎楊邁㳂路計置糧草濟渡舟船承議郎新通判荆南府程千秋丁父憂後九日湖北提刑司檄千秋權不拘常制起復此據紹興六年八月一日臣僚論千秋不該蔭補狀修入乙巳手詔京師未可往當巡幸東南為避敵之計來春還闕令三省樞密院條具合行事件時執政黃潛善汪伯彥皆欲奉上幸東南故有是詔李綱留之因極論其不可且言自古中興之主起於西北則足以據中原而有東南起於東南則不足以復中原而有西北蓋天下之精兵健馬皆出於西北委而棄之豈惟金人乘間以擾關輔盜賊且將蜂起跨州連邑陛下雖欲還闕不可得况治兵勝敵以迎還二聖哉夫江之險不如河而南人輕脆遇敵則潰南方城壁又非北方之比陛下必以建康為安臣竊以為過矣為今之計縱未能行上策當適襄鄧以係天下之心夫襄鄧之地西鄰川陜可以召兵北近京畿可以進援南通巴蜀可以取貨財東逹江淮可以運榖粟山川險固民物淳厚願為今冬駐蹕之計俟兩河就緒即還汴都策無出於此者上乃收還巡幸東南手詔令綱與執政議之丙午綱及潛善等議於上前綱曰今乘舟順流而適東南固甚安便但一去中原勢難復還夫中原安則東南安失中原則東南豈能必其無事一失幾㑹形勢削弱將士之心離散變故不測且有後艱欲保一隅恐亦未易臣誠不敢任此責上乃許幸南陽以觀文殿學士范致虛知鄧州修城池治宫室又降鹽鈔錢帛付京西南路轉運副使范之才儲糧草且漕江湖綱運自襄漢蜀貨出歸峽以實之遷户部侍郎黃潛厚為本部尚書提舉巡幸一行事務膳部員外郎陳兖掌頓遞虞部員外郎李儔調芻粟直祕閣江淮發運副使李祐為隨行轉運使日厯李祐今年五月乙未除京東漕未見遷發運使時日將以秋末冬初啓行之才雍孫兖堯佐曾孫儔錢塘人父友聞集英殿修撰祐清臣子也雍河南人天聖中樞密副使堯佐閬中人景祐中平章事清臣莘縣人崇寧中門下侍郎同知樞密院事張慤言户部財用惟東南嵗運最為大計自治平嘉祐嵗以前輪發運使一員在真州催督江浙等路糧運一員在泗州催促自真州至京糧運自姦臣誤國變祖宗轉般倉良法以來每嵗失陷糧斛不可勝計望依舊法責發運司官分認逐季地分各行檢察催促從之丁未詔兵部郎官太常寺官各一員內侍二員詣京師奉迎所藏太廟神主赴行在劉觀行狀云公𨗳駕朝鴻慶宫面陳藏木主事上嗟惻遂就命公如京師發木主赴行在除中書舍人按日厯及太常寺題名觀以今年四月遷中書舍人此時周望翁彥深為太常少卿行狀恐誤也先是上命京城留守宗澤移所拘金使於别館優加待遇澤謂二聖在金必欲便行誅戮恐貽君父憂若縱之使還又有傷國體莫若拘縻於此俟車駕還闕登樓肆赦然後特從寬貸及是詔下澤上奏曰臣不意陛下復聼姦臣之語浸漸望和為退奔計營繕金陵奉元祐太后仍遣官奉迎太廟木主棄河東河西河北京東京西淮南陜右七路生靈如糞壤草芥略不顧惜又令遷金使别館優加待遇不知二三大臣於金人情欵何如是之厚而於國家訏謨何如是之薄也臣之朴愚必不敢奉詔以彰國弱此我大宋興衰治亂之機願陛下察之陛下果以臣言為狂請投之逺惡以快姦賊詔答曰卿彈壓强梗保護都城深所倚仗但拘留金使未達朕心澤猶不奉詔澤遺事云公奉詔即出八人縱之且上表謝按傅雱通問録雱以今年十一月使還奏乞釋金使詔可明年宇文虛中出使至汴澤在病告虛中始釋之遺事誤也今不取又請上回鑾表曰臣聞禹之行水行其所無事所謂無事者非泊然無所為於事也無事而已夫禹䝉天錫洪範九疇知水有潤下之性且親見堯有洪水滔天績用弗成之患遂因水之性而順道之故天下免乎昏墊而奠厥攸居兹無他皆堯用禹之力也臣竊聞將士籍籍皆願陛下歸京師云京師是衆兵駐劄之本根也商旅籍籍皆願陛下歸京師云京師是天下賈販之要區也農民籍籍皆願陛下歸京師云京師是天下首善之地也士大夫懷忠義者籍籍皆願陛下歸京師云京師是陛下朝宗之域也臣前在臨濮兵寨中實憂羣臣無逺識見恐贊陛下去維揚金陵又見京城有賊臣張邦昌僣竊與范瓊輩擅行威福無所忌憚所以曾暫乞駐蹕南都以觀天意以察人心仰䝉聽從臣誤被宸恩差知開封府事今到二十餘日按原本作五十餘日北盟㑹編作二十餘日查澤於六月十七日到東京七月十九日奏到行在具奏時原止二十餘日今從之物價市肆漸同平時每觀天意眷顧清明每察人心和平逸樂且商賈農民士大夫之懷忠義者咸曰若陛下歸正九重是王室再造大宋中興也臣竊料百僚中唱為異議不欲陛下歸京師者不過如張邦昌等奸邪輩陰與敵人為地耳臣願陛下體堯禹順水之性順將士順商旅農民順士大夫之懷忠義者早降敕命整頓六師及詔百執事示謁欵宗廟垂拱九重之日毋一向聽張邦昌姦邪輩陰與敵人為地者之語不勝幸甚臣之少也猶不如人今年六十九矣眷眷血誠恨其學問荒鄙不能以激切忠義之辭仰動天聽臣不勝涕泣痛怛之至詔賜澤襲衣金帶尚書虞部員外郎張浚為殿中侍御史上見浚雍容靜重即欲用之黃潛善又稱其賢遂有是命新除中書舍人劉珏至泗州上書論時事大略言聞金人尚有屯河北者萬一有數千騎猝然而南或趣宋亳則於六飛豈能無警乞早賜行幸候至來春復還京師此萬全之策西兵驍勇異於它卒今車駕將巡幸正宜留以為用竊聞先遣西兵二萬往江寧府屯駐臣竊又疑之又二聖播遷正宜內講攻守之具外示謙屈之體乞今後詔令不必指斥金人亦可緩其侵犯江寧既不建都乞止令改建兩殿庶幾不至擾民車駕如幸東南所有西京以來舟船乞並令東下萬一金人窺伺不得藉以為用時李綱建議營南陽而珏未知也詔明達皇后明節皇后應干典禮並依溫成皇后故事施行二后皆上皇後宫追冊之初悉用后禮至是始釐正之己酉徽猷閣待制錢伯言試尚書吏部侍郎本部題名在六月罷四道都總管初李綱請於陜西京東西河北東路各置制置使假以便宜使逺近相應援上然之遂罷四總管而置諸路制置使時西道都總管孫昭逺初至河南府調陜西河北義兵合萬人柵伊陽使民入保㑹罷四總管昭逺改除京西北路制置使日厯不書置制置使月日今因罷四道都總管附見起復朝請郎王圭為直祕閣提振民兵庚戌詔諸兵已令八月會行在後期者必誅無赦癸丑衛尉少卿衛膚敏言今汴都蹂踐之餘不可復處睢陽駐蹕咸以為宜但城不髙池不深封域不廣不足以容千乘萬騎而又逼近河朔敵易以至况我斥堠不明烽燧不謹萬一奄至將如之何建康實古帝都外連江淮內控湖海負山帶海為東南要㑹之地伏望觀察時變從權慮逺趣下嚴詔夙期東幸别命忠勇大臣總領六師留守京邑願詔有司分築堡寨扼江之險又行清野於河北山東諸道則可以伐彼之謀而沮其南牧之志俟軍聲國勢少振然後駕還中都則天下定矣時上雖用李綱議營南陽而朝臣多以為不可中書舍人劉珏亦言當今之要在審事機愛日力為急自金北歸已再踰時陛下中興亦既數月矣而六飛時巡靡所定止攻戰守備闕然不講臣聞近臣有欲幸南陽者南陽密邇中原易以號召四方此固然矣然今日兵弱財殫陳唐諸郡新刳於亂千乘萬騎何所取給南陽城惡亦不可恃夫騎兵金之長技而不習水戰金陵天險前據大江可以固守東南久安財力富盛足以待敵於是汪伯彥黃潛善皆主幸東南故士大夫率附其議吕中大事記曰李綱請營南陽宗澤請幸京城汪黃請幸東南三者不同言京城之䇿為上况宗澤數月間城築已增固樓櫓已修飾壟濠已開浚寨柵已羅列義士已團結蔡河五丈河皆已通流陜西京東西河東北盜賊皆已歸附又非靖康戰守無備之比失此一機中原絶望矣周之失計未有如東遷之甚也然李綱之請又在宗澤規模未成之前故其謀請先幸襄鄧以係中原之望西鄰關陜可以招兵北近京畿可以進援南通巴蜀可以取財貨東逹江淮可以運榖粟候兩河就緒即還汴京亦可也而汪黃侍髙宗以乳嫗護赤子之術曰上皇之子殆將三十人今所存惟聖體不可不自愛重故建為幸東南之䇿不知我往敵亦往上如揚州而敵亦至揚州上如鎮江而敵亦至鎮江行幸所至即為邊面譬如泉流不知所届矣乙卯改府州靖康軍為保成軍以守臣折可求言其犯年號也可求德扆五世孫自國初以來世襲州事德扆其先雲中人仕至永安軍節度使初李綱請改刺西北潰散之卒以為新軍既行之矣六月丁亥至是上批有害軍政宜罷之綱復力爭事得暫止丙辰河北招撫使張所河東經制使王􅊛副使傅亮辭行先是李綱建議遣所亮措置兩河所六月丁亥除亮七月己丑除乃白上賜所內府錢百萬緡為半年之費給空名告千餘道又以京畿卒三千人為衛將佐官屬許自辟置一切以便宜從事所入見條上利害上喜賜五品服遣行時起復直祕閣提振真定民兵王圭尚在南都綱奏用為宣撫司參謀官使佐所所請置司北京招諭山寨民兵俟就緒日渡河先復懷衛濬州及真定次解中山之圍給地養民為兵如陜西弓箭手法亮􅊛入辭上賜􅊛器甲袍帶亮五品服且豫亮兵萬人及蜀綱之在陜西者亮請置司陜府許之初靖康之割兩河也所為御史獨建言以蠟書募河朔民兵入援士民喜故所之聲滿河朔所募兵事見去年十一月己丑耿延禧中興記云有使臣楊剛中賫蠟書募兵河北者乃張所建言委剛中兄弟起兵初不受帥府節制起民兵帛書末云招集民兵保義郎閣門秪候楊剛中提領監察御史張所都大總領右僕射何㮚上喜而遣之知㮚所輕聼妄舉如此汪伯彥中興日厯云上在相州曰閣門祗候楊剛中兄弟賫𣙜貨務兌便鹽錢空名關子三十萬緡往洛州募士所差劄子係何㮚張所總領其後止募得五百人妄稱萬人皆以諸山水寨保聚民兵姓名收為虛數錢關子所存無幾按延禧伯彥皆與李綱異論者恐未必然姑附此俟考亮西人習古兵法綱與語謂可為大將即奏用之上猶以亮前疏為言疏見五月戊申日按亮疏見甲午綱曰亮所言但欲激陛下歸京師耳况言徑氣直乃關陜氣習之常不足深責上乃召見而遣之亮言今經制使所得兵才萬人皆盜賊及潰散之兵未經訓練難以取勝陜西正兵及弓箭手皆精鋭舊以童貫賞罰不當隱於民間每應㸃集者皆其家人也今厚資給以募之并將家子弟不旬日可得二萬人與正兵相表裏其勝可必度州縣可復即復之綱以為然遂命亮募兵令陜西京西漕臣悉力應付所亮既行兩河響應門下侍郎黃潛善疾綱之謀建議遣河北經制使馬忠節制軍馬俾率兵渡河忠除經制使已見六月乙丑有雄州歸信縣弓手李成者以勇聞河朔間積功為本縣令及雄州失守成妻子在城中為亂兵所殺成以衆數萬來歸纍官忠州防禦使河北京東都大捉殺潛善以成為可用令將所部與忠同搗敵虛欲使敵釋兩河之圍以自救綱曰今日士怯兵弱恐未可深入且忠在靖康中雖嘗宣力其後官崇志滿不肯决戰屢至敗衄宜不足以任此責莫若令與所協力潛善固執上卒從之綱復奏以河北制置使張換為副於是權始分矣換除經制已見七月戊戌王明清揮麈後録云政和問置西城所西北之人不堪命皆去而為盜其後如曹成張遇鍾相李成之徒皆其人也按張遇真定府馬軍也曹成拱聖役卒也鍾相鼎州土豪也李成歸信縣弓手也其為盜悉在中原既亂之後與西北公田事不相干蓋方滋誤記之明清又弗深考耳無按此注但引王明清之言而方滋之說蓋傳寫脫誤工部員外郎李士觀言江池饒建四州監嵗鑄錢百三十三萬餘緡淮南等九路十七州嵗造上共軍器亦百餘萬件多未輸者望令發運司委官催督從之閣門宣贊舍人曹勛自燕山間行至南都以上皇所授御劄八字進入上泣以示輔臣事祖見今年四月末詔華國靖恭夫人李氏杖脊配軍營李氏既以宫人私侍張邦昌及邦昌還東府李氏送之有語斥乘輿上聞命留守司同御藥院官即內東門推治李氏辭服上曰邦昌敢居寢殿姦私宫人此其情可見李綱曰邦昌既僭位號此乃細故耳上由是深罪邦昌有誅之之意矣上因言王時雍迫逐上皇之狀綱曰邊事少定當再議之丁巳詔慰撫東南諸路先是經制使翁彥國被㫖修江寧城池宫室彥國言所賜錢不足用事見五月辛卯李綱白上益以淮浙鹽錢四十萬緡且令因陋就簡不事華壯時彥國方暴賦橫斂而兩浙轉運判官吳昉助之為虐人不堪命至有擊登聞鼓以訴者黃潛善汪伯彥以彥國女為綱弟維婦因密啓之時彥國已卒而朝廷未知前一日上批彥國昉騷擾東南並落職與宫觀令學士院降詔慰撫命未下而江寧奏彥國卒綱為同列言昉無職名可落又奉祠太優至是進呈綱曰上以彥國已亡因貼改所畫㫖而獨罷昉且降詔慰撫東南仍起復直龍圖閣趙明誠知江寧府兼江東經制副使明誠挺之子也挺之膠西人崇寧右僕射日厯明誠明年正月己亥除知江寧府而建康知府題名明誠以元年八月到任按江寧要地無緣彥國死半嵗方除帥臣蓋日厯差誤今附此中書舍人權直學士院朱勝非言舍渠魁而責支黨臣所未諭請正彥國罪不從勝非行狀云用勝非言卒正彥國罪按彥國追削在十一月庚子汪藻當制中興玉堂制草蠔勝非草此詔亦云彥國尋己物故昉即罷黜與李綱進退志合今從之日厯罷昉降詔慰撫東南乃在八月己未通問使傅雱等至鞏縣即檄河陽具舟守臣張巨以國號不同拒不納雱曰主上以皇弟康王勉徇羣臣之請即皇帝位嗣大宋正統金人曰黃河以南知有張楚而已不知有宋也雱曰張楚乃國朝大臣皇帝即位命五日一赴都堂參議大事使人之來張公實預其謀巨乃馳使禀命于雲中凡九日而還自河陽至雲中一千八百里四日到五日回雱乃得濟是月賜故武功大夫淄州團練使廣南西路兵馬都監知融州李拱家銀帛百匹兩錢百千以拱領兵入援京城死於敵也此據㑹要賊史斌據興州僭號稱帝斌本宋江之黨至是作亂守臣向子寵望風逃去先是子寵在州設關隘甚備陜西士民避難入蜀者皆為子寵所扼流離困餓死於關隘之下者不可勝計斌未入境子寵棄城先遁斌遂自武興謀入蜀成都府利州路兵馬鈐轄盧法原與本路提㸃刑獄邵伯溫共議遣兵扼劔門拒之斌乃去蜀賴以安法原秉子伯溫雍子也建炎以來繫年要録卷七
