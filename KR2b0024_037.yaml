body:
  text: 建炎以來繫年要録卷三十七宋李心傳撰建炎四年九月庚子朔滁濠鎮撫使劉綱言本軍闕食事屬危急詔建康府賜米二千斛仍毋得渡江時綱已率所部自采石濟江屯於溧陽其徒乏食往往抄掠以自給辛丑建康府路安撫大使兼知池州吕頥浩請兵五萬人分屯建康等處內建康府萬五千人太平州萬人池州二萬人饒州五千人除參謀官劉洪道見管崔邦弼及李貴等兵約五千人韓世清約六七千人外乞朝廷貼足付臣使喚昔王翦伐燕謂非六十萬人不可終如所料杜充以五萬人祇守建康猶不免敗事况本路上下近千里多是緊要渡口今臣乞兵五萬委為不多又言劉光世有部曲約二三萬人其勢稍强乃可彈壓烏合之衆今臣素無部曲非得知兵政統制官及正兵二萬人難以鎮服衆心乞以神武前軍統制王􅊛所部前軍及諸將巨師古顔孝恭自𨽻又請招捕水冦邵青崔增及賜諸軍衣甲詔賜樞密院見甲千副本路上供經制錢四十萬緡米二十萬斛餘從之頥浩將行見上言臣自去國不知金人之實聞已渡淮北去然金人多詐而難測臣比經四明見朝廷集海舟於岸下是必為避敵之備夫避敵固當預辦然禦敵之計尤不可緩臣仰料聖駕萬一避敵不過如永嘉及閩中耳望鑒去嵗敵騎追襲之事選兵二萬分為二項一項浙西一項浙東或據水鄉或扼山險邀而擊之使將士戮力如四明城下之戰則無不勝矣萬一今冬敵不渡江則願宰執預為之計俟來夏則遣兵北向分二萬由海道趨文登以搖青齊分二萬由淮陽趨彭城以撼鄆濮蓋金人用兵深忌夏月我必乘其忌而攻之故大暑用兵臣前後屢陳此計然安危治亂之要尤在人主能察方去冬金人分三路追襲廷臣皆以航海為非陛下斷而必行故至今帖然無虞夫難得易失者天之時難成易敗者人之功臣願陛下惜分隂汲汲圖之近臣有獻計者必參以行事而驗其是非則人不難知矣此陳蕃所謂成敗之幾在察言也願留聖意起復左武大夫忠州防禦使閣門宣贊舍人秦鳯路兵馬鈐轄陳思恭知階州兼㳂邊安撫使充神武後軍統制壬寅劉光世奏淮南諸鎮郭仲威潰散薛慶身亡趙立不知存亡嶽飛見在江隂軍不見赴鎮劉綱以所部渡江赴行在散在南北岸作過金人見留承州臣遣王德渡江過邵伯埭擒敵軍四百餘人詔光世以所俘赴行在既而德自天長引兵趨承州不得入斬所部左軍統領官劉鎮而還此據光世奏云得九月八日申到在此後五日不知以何日斬鎮也癸卯通泰鎮撫使嶽飛以所部入泰州甲辰太上皇后鄭氏崩于五國城年五十二滁濠鎮撫使劉綱在建康論者喧言綱且反綱束身赴行在自明㑹吕頥浩亦乞綱自𨽻范宗尹奏令綱以萬人聼頥浩節制上曰朝廷始行藩鎮當令遵禀號令唐室之衰不以他事秪是藩鎮跋扈爾既而言者請遣綱還鎮設逗遛不行則置之典刑乃詔頥浩俟過防秋遣發自今諸鎮撫使毋得擅離本鎮綱又言世居泗州所領之衆類多土人今泗州𨽻趙立而令綱以所部歸濠滁則人各思歸勢必離散詔招信縣特割𨽻濠州詔頥浩遣發在是月戊申招信𨽻濠州在是月丙午右文殿修撰李光充徽猷閣待制知臨安府成忠郎閣門祗候建昌軍兵馬監押蔡延世為承務郎權通判軍事先是延世攝軍事守城有功江西福建諸司上其事從衛三省樞密院為之易文資延世審于朝因有是命延世守城事見去年十一月甲戌趙甡之遺史稱以延世為通直郎賜五品服蓋誤今從日歷乙巳詔劉光世嶽飛趙立王林犄角逼逐金兵渡淮時左監軍完顔昌兵圍楚州已百餘日鎮撫使趙立一日擁六騎出城呼曰我鎮撫也首領驍將其來接戰南寨有二騎襲其背立手奮二槍俱墜地奪雙騎將還俄北寨中遣五十餘騎追立立瞋目大呼人馬俱辟易明日立三幟邀戰立以三騎應之伏發立中飛矢奮身突圍以出敵益攻之中奉大夫守中書舍人致仕李公彥貶秩三等坐敵至乞致仕為殿中侍御史張延夀所劾也於是侍從郎官已下自洪州遁去者皆降一官丙午岢嵐軍人王師昊伏闕上書乞見上謂輔臣曰朕於檢鼓院進狀日加省閲是須伏闕何邪靖康間士庶伏闕至於進退大臣所謂倒持太阿此風不可長遂下越州獄既而師昊坐怪妄惑衆送鄰州編管上謂范宗尹曰朕大開言路言有可採至命以官言或不當雖斥朕躬亦不加罪至於狂誕不免略須禁止卿等宜以此意諭士民師昊行遣在是月戊午戊申言者請將從衛三省樞密院自離建康以至章貢凡所行事無問大小悉詔都司檢正再行看詳有踰格法一切改正外其間有委實立功之人與從權招安之事所當激賞而不可已者令具因依取㫖别行旌寵從之是日劉豫僭位於北京初軍民聞豫至殺金人閉門以拒豫豫擊而降之遂即皇帝位國號大齊王之道書稱金立劉豫責嵗幣三百六十萬緡他書皆無此疑非其實大赦僞境赦文略曰朕風猷寡陋家世側微昔也壯年久林泉而是樂今焉晚節豈軒冕之為心雖非虞舜之明揚幸無成湯之慙德僞齊録僭位赦文門下自前朝失御率土無依內離民心致蜂起弄兵之盜外開邉隙來鷹揚問罪之師山川靡寧干戈互動耕桑廢業壟畝彌望而荆榛老幼逃生廬舍多為之灰燼原野厭乎流血溝壑填于殘骸兵火連年不休亂離自古所少言之流涕念及痛心嗟赤子之無辜冀皇天之悔禍宣命亟班于上國節制特設于東州顧朕何人誤成此位自念風猷寡陋家世側微昔也壯年久林泉而是樂今焉晚節豈軒冕之為心屢乞退間竟無成命提綱五路空殫夙夜之勞歷試朞年蔑著錙銖之效雖近地稍形于康又而逺民未免於飢荒方圖自效而歸敢有懷它之望顯冊之既申命要在必從避辭者凡四章無所不至使命愈加乎敦迫軍民不容乎遁逃至于屬部之州列奏樂推之牘此豈人事致爾實有天數存焉知便安難遂于己私則吉凶宜同于民患當天造之草昧念王業之艱難恭授冊儀尚循墻而欲避勉膺位號若負刺之不遑雖非虞舜之明揚幸無成湯之慙德已于天㑹八年九月九日即皇帝位國號大齊布告中外尚念世道交喪國俗益訛貪頑未變于餘風詿誤多罹于憲網力期化洽深軫哀矜宜布湛恩與之更始可大赦天下於戲臨深履薄何以當付託之隆拯溺救焚何以慰來蘇之望尚賴公卿宣力士庶協心共贊眇冲以臻康泰按方圖自效而歸下原本脫三句今據北盟㑹編補入豫既立復還東平以宣奉大夫張孝純為尚書左丞相朝議大夫李孝揚權尚書左丞朝散大夫通判濟南府張東權尚書吏部侍郎兼右丞孝揚已見元年十一月戊子東初見二年正月庚子豫子麟為太中大夫提領諸路兵馬兼知濟南府時金以前知越州李鄴知和州李儔顯謨閣直學士鄭億年臣豫豫以儔為監察御史億年為工部侍郎初孝純在雲中金左副元帥宗維將避暑謂孝純曰公于此無治生事俟秋當還公鄉里又顧留守髙慶裔曰如有人負張公錢物當督還之蓋宗維與豫密約已定人莫知也至是宗維遣人送孝純歸祈請使資政殿學士宇文虛中以詩送之孝純將渡河欲自濟南歸滕縣主者曰當與公共至東平節制司某得回檄公可歸矣既行則孝純兄弟諸姪競逺迓之至汶上豫已僭立遽宣麻拜僞相孝純昵于親愛懼于還金遂喪晚節豫降南京為歸德府改東京為汴京升東平府為東京去淮寧潁昌順昌興仁夀春府名復舊州名以其弟益為北京留守豫自以生景州中興姓氏録先是崇寧間望氣者言景州阜城縣有天子氣甚明命開河于新邑斷其王氣其後張邦昌與劉豫僣位皆阜城人也按邦昌乃永靜軍東光縣人與此所云不同當考守濟南節制東平僭位大名遂起四郡强壯為雲從子弟應募者數千人豫又置三衛官曰翊衛曰親衛曰勳衛以士大夫之子為之二年升一等滿六嵗則試以弓馬合格人出官奉議郎簽書博州判官㕔公事劉長孺獻豫書備陳祖宗德澤勸以轉禍為福豫怒追其官囚之百日長孺終不屈豫後復官之長孺不從而止初敵騎之南牧也士大夫皆避地朝奉郎趙俊獨不肯避曰死生命也避將安之豫以俊為虞部員外郎辭疾不受以告畀其家卒却之如是再三豫亦不復强凡家書文字不用僭號但書甲子後三年卒是時本朝宗室南渡不及者尚散居民間豫募人索知承務郎閻琦匿不以聞為人所告豫杖之死承直郎姚邦基知尉氏縣秩滿不復仕屏居村落間授徒以自給長孺耀州人俊宋城人邦基蜀人也庚戌三省言去嵗出師以京西盜賊充斥及湖南北分治軍器揀選將士故許逐路並聼宣撫司節制今本司於秦州駐劄道里遙逺緩急恐失機㑹合依分鎮指揮從之初宣撫處置使張浚之西行也得㫖便冝黜陟既而浚遣主管機冝文字傅雱使湖南參議官李允文使湖北亦以便宜付之由是二人得以自恣至是宰相范宗尹言宣撫司所遣官如有合從權措置事自合申聼本司詔禁止違者重置典憲詔官秦觀子孫一人觀官止宣德郎以元祐黨人特有是命統制官薛成有衆二千屯婺州詔以其兵𨽻神武左軍吉州司法參軍林大任請以官易僧許之此據㑹要修入辛亥右武大夫吉州刺史東京提舉龍德宫王球除名勒停送大理寺劾治球初見元年六月丁亥球既渡江所盜上皇寶器服玩事露上見之感愴流涕欲遂戮之大理卿王衣啓于上曰球誠可殺但儻非其隱匿則諸物悉為金得無從復歸天上矣上乃宥之方勺泊宅編云王球為龍德宫提舉官眷遇特厚丁未春淵聖皇帝已幸青城上皇密遣球裒宫中器用得萬金鎔為二百鋌藏廢井中甃之以石謂球異時國有艱窘自發之上狩淮南球進之有㫖輸行在方具舟㑹宫中舊卒有知其端者恐球潛載以遁詣開封府陳告尹欣然召球諭以兵須正急此機不可失球度力不能奪因盡輦致持符歸報朝廷初不加譴其後范丞相當國疑球與尹乾沒下大理鞫治球竟廢死按上在淮甸京尹乃宗澤杜充球既得符而歸則後來何以坐罪王明清録云籍球家得寶玩及古玉印數十衣嘗摹其文據此則球所坐乃竊寶玉非盜庫金兼此獄本衣所鞫明清衣從子冝得其詳方勺傳聞之詞未必實也今不取癸丑言者論近世銓衡之官法守不立自京黼用事有詣堂求吏部闕者判一取字雖已注人亦奪豫之甚至部有佳闕密獻之以自效為寒逺患踰二十年望明戒吏部長二自今堂中或取部闕者並須執守毋得供報從之按八月壬申方降㫖非堂闕並還部今甫踰月不知何以復有此請也當考甲寅賜御史臺主簿韓璜進士出身璜宗武子也宗武故相績子元符末祕書丞嘗知上蔡縣富直柔薦璜于上將用為言官故策試中書而有是命言者論近州縣之吏贓貪頗衆欲望應官員犯入已贓許人越訴其監司守令不即按治並行黜責庶使舉刺之官不敢坐視贓吏既去民皆樂生從之此以紹興五年四月三日刑部狀修入乙卯罷中書門下省檢正官以范宗尹言兩省所行文字並是已經看詳勘當成熟事件其檢正二員乃成虛設故也紹興四年三月丙午復置中書門下省檢正諸房公事蘇遲直龍圖閣知泉州顯謨閣待制知洪州髙衛為徽猷閣直學士知鄂州兼本路安撫使令直祕閣知鄂州李允文依舊還宣撫處置使司供職時張浚聞朱勝非宣撫湖北乞罷允文還司而朝奉郎知嶽州袁植亦疏允文妄作生事以白御史臺中丞富直柔等言於朝故有是命允文不受丙辰復增左右司郎官為四員尚書禮部員外郎劉棐為起居郎吏部員外郎趙子畫為左司員外郎侯延慶為右司員外郎朝請郎趙子恭充樞密院檢詳諸房文字棐宋城人子畫燕懿王後渤海公世禕孫與子泰皆士㒟所薦也燕王生昌州團練使惟固惟固生宣城公從審從審生世禕世禕生令簽令簽生子畫朝散大夫毛隨行尚書司封員外郎隨江山人以薦得召見隨言今冬嵗躔于斗牛吳越之㑹漢志嵗星所在國不可伐金必不南渡然禦敵上策莫先自治願保天險修戰備權宜定都不為輕重以繫四方之觀聼則士氣日壯乃有是命是日金左監軍昌犯楚州守臣右武大夫徐州觀察使楚泗州漣水軍鎮撫使趙立死之前一日昌大進攻具臨城翌日填濠將進立率士卒禦之忽報敵近城矣立笑曰將士不用相隨吾將觀其詭計且令其匹馬隻輪不返上城東門未半飛炮碎其首趙甡之遺史云炮中立股骨折而死今從王銍所作立傳左右馳救之立猶曰吾終不能與國破敵矣令舉致三聖廟中聲言疾病祈禱使賊不悟言終而絶年三十七然人聞其死知城必陷失聲巷哭不可止衆以參議官程括權鎮撫使以守敵益攻之戊午詔舒蘄光黃鎮撫使李成具析擅舉兵渡江因依申尚書省成既叛命遣其副都統武略大夫閣門宣贊舍人馬進自黃州渡江由大冶縣犯興國軍守臣朝請郎李宜不能拒趙甡之遺史作李儀按日歷宜以紹興元年五月庚子坐容縱賊兵安泊罷去蓋此宜字開門納之進入城不殺掠如官軍焉同知三省樞密院事李回聞成叛乃奏鄂州李允文擅截成綱舟故有是命仍令鄂州日下發還時降授承議郎新知巴州馮楫在嶽陽守臣袁植令楫草書遺成說以忠義成不聼按宋史繫丁巳日賊趙延夀號趙不忙延夀紹興元年五月就招自稱武翼大夫忠州刺史不知是正官否以衆犯德安府鎮撫使陳規誘之入城與語將官辛選欲執之規不可曰今即失信後可必其無冦乎時撫諭使馮康國在德安將發規諭延夀俾就招延夀詐諾規識其意明日餞康國于城南延福寺㑹未集規遽興僧舍衆莫測俄報延夀劫延福寺規即入城守延夀乃退已未上曰昨韓世忠進一馬髙五尺一寸云非人臣所敢乘朕答以九重之中未嘗出入何所用之卿可自留以為戰備時世忠妻和國夫人梁氏言積俸未支三省奏近惟隆祐皇太后殿下所積供奉物計直供支潘賢妃勘請已不給上曰將帥朕所委用當厚恤其家可特豫之餘人毋得援例熊克小歷世忠妻夫人未支積俸詔以隆祐太后殿下供物給之他不得援例既而賢妃位亦乞勘請不允克所書差互蓋三省所奏以為隆祐所積供奉物當支賢妃既不勘請則梁氏不應陳乞克乃誤以為以隆祐殿物賜世忠妻也隆祐供奉物八月戊戌御藥院奏令供納本色真珠物帛等並定價錢于左藏庫供支依奏此事見日歷克實差互宣撫處置使張浚承制以集英殿修撰王倚知利州直徽猷閣劉民瞻朝議大夫井度為利州路轉運副使朝議大夫新知䕫州蘇覺提㸃利州路刑獄公事民瞻長社人度亮采子也亮采淮寧人元祐殿中侍御史是日金均房安撫使王彥及桑仲戰於平麗縣之長沙平敗之仲既陷均房有窺蜀之志擁衆犯金州白土關彥以官軍保長沙平仲故為彥部曲以書請曰仲于公無所犯願假道入蜀以就食耳彥語寮佐曰吾知仲之為人能馭士卒輕財善鬬然勇而無謀決為諸公破之乃遣統領官門立為先鋒立鏖戰不勝馬陷淖其子璋馳過立呼之璋不應而去立罵賊不絶口而死人心震恐時官軍才二千糧且不繼或請少避賊鋒彥曰今敵在陕西若賊至安康則四川腹背受敵矣敢有言避賊者斬遂率同統制王宗尹相為犄角士皆爭奮賊張步騎六道並進彥執旗大呼麾士士殊死鬬自辰及酉賊大敗追至竹山縣而還仲遂據房陵仲之未敗也王闢在房州與仲遙為聲援至是彥遣人招闢闢遂降彥欲造其營衆不可彥曰我以誠待闢闢雖詐何能為遂肩輿至闢營闢大驚與其黨皆聼命張浚承制以彥為左武大夫闢後腰斬於興元府日歷九月二十九日張浚奏王彥破賊桑仲招撫王闢了當特轉行左武大夫詔依已行事理疑是本司出宣劄之日未必此日降㫖也當考庚申詔起居郎劉棐以祕閣修撰出守以御史中丞富直柔論其宿負也辛酉武顯大夫閣門宣贊舍人承州天長軍兵馬鈐轄主管鎮撫司公事王林知承州代薛慶也廢天長軍為縣𨽻揚州盱眙軍為縣𨽻泗州自是諸鎮撫使稍因事併廢矣御史臺主簿韓璜守監察御史迪功郎新徽州州學教授王居正入對居正江都人季陵為中書舍人嘗舉自代范宗尹又薦之得召見居正上仁祖十事參以今日所宜行各有論著上甚喜以居正為承奉郎尋除太常博士居正除博士日歷不書本寺題名在今年十月今併附此是日神武副軍統制官李捧統領官王民以所部合三千人與建賊范汝為戰為所敗官軍皆潰捧等遁去與其軍相失壬戌御史中丞富直柔請罷新除右司員外郎侯延慶而用直龍圖閣蘇遲為都司范宗尹曰都司宰屬如大藩帥臣猶得自辟置屬官蓋資贊畫之益遲雖名德之後然不可任都司上曰臺諌以拾遺補過為職不當薦某人為某官趙鼎曰惟可論薦臺屬張守曰亦須得㫖乃可薦上曰然起復直龍圖閣新知興元府張上行移知秦州上行未至興元道病卒僞齊劉豫下詔求直言僞齊録九月二十二日奉聖㫖辭避無術竟當重任䝉逺近官吏士庶耆老湊集稱慶顧以無能副衆勤誠惟極愧惕念時當草昧事極艱難臨政之初若涉大水浩無津涯更冀官吏軍民耆老凡有所見直陳無隱庶補昧陋其圖永濟癸亥知樞密院事宣撫處置使張浚以都統制劉錫及金人戰於富平縣敗績初浚既定議出師幕客將士皆心知其非而口不敢言唯諾相應和㑹上亦以敵聚兵淮上命浚出兵分道由同州鄜延以搗敵虛時權永興軍路經略使吳玠已得長安而環慶經略使趙哲收復鄜延諸郡浚乃檄召熙河經略使劉錫秦鳯經略使孫渥涇原經略使劉錡各以兵㑹合諸路兵四十萬人馬七萬以錫為統帥浚又貸民賦五年金錢糧帛之運不絶於道所在山積浚貸民賦事據王之望西事記他書皆無之之望嘗總蜀賦所云必有據浚親往邠州督戰金左副元帥宗維聞之急調完顔宗弼自京西入關與羅索㑹官軍行至耀州之富平金人已屯下刲縣相去八十里而羅索方在綏德軍衆請擊之浚不可乃約自㑹戰金人不報書凡數往羅索乃自綏德軍來移軍與官軍對壘親率數十騎登山以望我軍曰人雖多壁壘不同千瘡萬孔極易破耳浚猶遣使約戰金人許之至期輒不出兵以為常浚以羅索為怯曰吾破敵必矣幕客有請以巾幗婦人之服遺羅索者諸路鄉民運芻粟者絡繹未已至軍則每州縣自為小寨以車馬為衛相連不絶錫合諸將議戰玠曰兵以利動今地勢不利將何以戰宜徙據髙阜使敵馬衝突吾足以禦之秦鳯路提㸃刑獄公事郭浩亦曰敵未可爭鋒當分地守之以待其弊諸將皆曰我師數倍於敵又前阻葦澤敵有騎不得施何用他徙將戰命立故將曲端旗以懼敵羅索曰彼紿我也是日也羅索選三千騎蓐食令珠赫貝勒率之囊土踰淖徑赴鄉民小寨鄉民奔亂不止踐寨而入諸軍驚亂遂薄我軍錡身先士卒禦之自辰至未勝負未分敵更薄環慶軍他路軍無與援者㑹哲擅離所部將士望見塵起驚遁軍遂大潰哲旗牌未及卷衆呼曰環慶趙經略先走至邠州乃稍定金人得勝不追所獲軍資不可計張浚行狀云金尼瑪哈益兵二萬聲言取環慶公遂決䇿問罪敵大恐急調大帥尼瑪哈等由京西路星夜來陕右以九月二十間與尼瑪哈等㑹按張滙節要諸書尼瑪哈時在雲中未嘗親入關行狀誤以羅索為尼瑪哈也熊克小厯云右監軍烏珠與羅索同行亦誤烏珠紹興二年春末始除右監軍克不詳考耳趙甡之遺史叙此事云諸軍驚亂浚乘騎急奔諸軍皆潰是時浚止在邠州甡之亦誤今並不取自渡江以來除拜臺省等職事官率受堂帖即視事論者以為如此則比及給舍封駮朝廷用人之失已形而士大夫進退亦且失據望候其受告乃許蒞事甲子從之此似劉棐侯延慶事紹興元年九月壬寅右諌議大夫曽統建請同此乙丑建言者論昨劉光世等解到降羌分𨽻五軍出入自如更無疑阻竊惟推赤心置其腹中固陛下盛德事然非我族類其心必異今所降單寡若不足慮或來者稍衆猝有不虞之變一夫奮臂可為寒心國家前日招納已蹈郭欽江統所論之失今日不可不思魏徴所爭議者以為戒也欲望睿慈更與執政大臣熟議别有以處之詔令諸軍常切覺察丙寅賜劉光世銀帛二萬匹兩為渡江賞軍之費先是光世麾下有言光世將提兵過江而幕客沮之其意遂緩簽書樞密院事趙鼎聞之以書抵光世曰參謀諸公久在幕府必能裨贊聰明共饗富貴固不可輕舉妄動重貽朝廷之憂亦安忍坐視不救滋長賊勢留無窮之患上聞之曰諭諸將當如此是日趙延夀焚郢州按宋史繫戊辰日戊辰金左監軍昌急攻楚州破之初趙立之入城也有徐州軍民老弱僅數千而勝兵居半又有楚州將兵二千四縣民兵約五千共不滿萬人圍城初有野豆野麥可以為糧後皆無生物有鳬茨蘆根男女無貴賤斸之後為水所沒城中絶糧至食草木有屑榆皮而食者徐州將士殘暴席勢凌楚軍二州衆不相能立善彈壓使各效其所長無敢校私隙其後忿䦧日聞敵諜知之然猶深忌立疑其詐死不敢動無何守者稍怠徐人多潰圍而去敵用降人衛進言専攻北壁凡四十餘日至是乃陷始立走人詣朝廷告急上命浙西安撫大使劉光世督淮南諸鎮往援之東海李彥先首以兵至淮河扼敵不得進髙郵薛慶至揚州轉戰被執死光世前軍將王德至承州其下不用命維揚郭仲威按兵天長隂懷顧望獨海陵嶽飛屯三墩僅能為援而亦衆寡不敵敵知外援絶攻圍益急立家屬先死于徐其赴鎮以單騎入楚後得女子習書者使侍左右讀軍中書記城陷俱沒立為人木彊不知書其忠義蓋出天性善騎射容貌甚壯不喜聲色財貨月俸給皆取其半與士卒同甘苦每戰擐甲胄先登有退却者必大呼疾馳至其側捽而斬之衆畏服亦樂為用其視金人如仇每言及必嚙齒而怒常戒士卒惟以殺金人為言且曰若不幸城陷必當備巷戰及城陷州人扶傷巷戰惟民兵奪門而出首領萬五石琦蔚亨號千人敵皆得全自金犯中國所過名城大都多以虛聲脅降如探囊取之如冀州堅守踰二年濮州城破巷戰殺傷略相當皆為敵所憚而立威名戰多咸出其上是役也敵鋭意深入㑹張浚出師關陕完顔宗弼往援之又立以其軍蔽遮江淮故敵師亦困弊而止議者謂立之功雖張巡許逺不能過云趙甡之遺史立以己未之日死城以甲子之日陷今從王銍所作立傳及日歷附傳甡之又云立一妻一姝一女年十餘嵗男子方總角或遭拘掠或被殺害皆盡與附傳所云不同今從附傳日歷亦有立親妹乞存恤狀當是已歸人而同入楚州也內侍武功大夫蘇淵夜殺一妻二妾既而自裁上疑其二子預知下越州獄窮治既而憐其家無主亟諭大臣釋之是月顯謨閣待制知筠州商守拙卒初海州淮陽軍鎮撫使李彥先在韓世忠軍有李進彥者犯罪流嶺南道為防送者所釋亦投世忠軍中世忠之潰於沭陽也彥先入海聚衆後有兵數千與進彥分統之至是進彥纍官武節郎閣門宣贊舍人為海州兵馬鈐轄及楚受圍彥先以舟師䇿應趙立與之刺臂為義兄弟城陷之日彥先舟師猶在北神鎮淮河中前後扼於金人不得去金以舟船併力攻彥先彥先所乘舟下碇石急收不應敵擊之彥先與其家皆死時進彥在東海縣招集彥先餘衆後渡海至秀州之金山遂受吕頥浩節制趙甡之遺史云進彥渡江至平江之許浦遂受劉光世招安按日歷紹興元年三月一日樞密院勘㑹李進彥人船已到秀州此云許浦恐小誤蘄黃都巡檢使韓世清既至黟縣上命以所部屯池州世清有衆萬餘江東安撫大使司參謀官劉洪道以軍儲不給令世清移宣州屯駐建炎以來繫年要録卷三十七建炎以來繫年要録卷三十七金人地名考證珠赫貝勒原書作折合孛堇誤今改正尼瑪哈原書作黏罕誤改見卷一烏珠原書作兀术誤改見卷一羅索原書作婁宿誤改見卷一建炎以來繫年要録卷三十七
