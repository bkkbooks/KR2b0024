body:
  text: 建炎以來繫年要録卷五十四宋李心傳撰紹興二年五月庚申朔日北至祀皇地祗于天慶觀之望祭殿始用牲玉自政和行方澤之祭改設皇地祗位于壇南方北鄉至是將命大臣侍祀禮官請如舊制為位于北方南鄉從之禮官奏請在閏月庚戌辛酉兵部尚書兼侍讀權邦彥充端眀殿學士簽書樞密院事邦彥獻十議以圖中興其一謂宜以天下為度進圖洪業恢復土宇勿茍安于東南其二謂駕御諸將宜威之以法而限之以爵其三謂宜命講讀之臣於所論説之外取纍朝訓典及三代漢唐中興故事日陳于前以裨聖學其四謂宜監觀傷善妨賢之讒偷合茍容之佞市恩立威之姦懷諼罔上之欺聽其言察其事則忠邪判矣其五謂愛民先愛其力寬民先節其用又謂朘已俸以佐國用當自宰執始又謂分閫而屬大事類非偏裨之所能為必得賢大將然後可又謂制置一官宜可省也合令沿江州縣各備其境內而總之以漕帥上自荆鄂江池下至采石京口講之有方委之有人防秋上䇿也又謂宗室中豈無傑然有人望可以濟艱難贊密勿留宿衛者願求其人置諸左右又謂人事盡則天悔禍否則恐天未欲平治也不可獨歸之數吕頥浩與邦彥善乃薦用之給事中程瑀言邦彥不可用不聽邦彥在樞管又言宜乘機者三祖宗德澤在人人心不忘王師一興諸路響應一也內則淮海之賊騎悉往西北以虛其南外則林牙等侵入患在腹心以牽其北二也近覘者報敵兵疲於浚河之役而守淮之兵皆持梃之農夫三也譬諸奕爭先而已安可隨應隨解不制人而制於人者哉然疆理淮堧以連下邳藩屏荆漢以通上流指顧隴蜀以成建瓴東下之勢亦䇿之次也翊衛大夫泉州觀察使神武右軍前部副統制魯珏特貸死命追毁出身以來文字除名勒停免真決不刺面配瓊州本城收管珏前在京東掠取良家子且賊殺不辜為人所告下臺獄當斬上以珏纍立戰功特貸之其三子並留右軍仍令臨安府遣官兵自四眀市客舟由海道護送樞密院言據探報敵人分屯淮陽軍海州竊慮以輕舟南來震驚江浙緣蘇揚之南海道通快可以徑趨浙江詔兩浙路帥司速遣官相度控扼次第圖本聞奏詔迪功郎荆湖北路提舉茶鹽司幹辦公事高佑贈承務郎與一資下州文學以為鍾相所殺特録之也詔神武諸軍御前準備差使使喚使臣不能馬步射者並放罷發歸刑部户部侍郎黃叔敖請江東西路今年上供米並赴建康府饒州寄厫以候行在取撥非奉朝旨雖安撫大使及諸統兵官毋得擅支如違取旨竄責漕臣不舉者與同罪從之檢校少保捧日天武四廂都指揮使建武軍節度使江西兵馬副都總管楊惟忠薨惟忠之討趙進也即軍中得疾還洪州一日而死安撫大使李回收其軍𨽻本司以統制官傅選胡友所部四千人為前後軍又命親衛大夫鼎州團練使祁超將餘兵五千充本司統制此據今年七月六日李回所奏增入惟忠起行間兼長戰守宣政間在陜西頗有威名及從上至東南官崇志滿不肯盡力聲譽日衰薨年六十六後諡恭勇偽齊劉豫聞桑仲死遣通直郎張珖持敕書至隨州招李道使臣彭義至鄧州招李橫時橫留别將蔡立知鄧州二人皆不受且執其使以聞詔嘉奬據李道申偽檄以五月二日到李橫申以五月三日到辛酉初二日也故附於此其後陳規言於朝六月壬子降詔奬諭八月甲辰三人各進二官壬戌降授中大夫朱勝非復左宣奉大夫提舉萬夀觀兼侍讀吕頥浩薦之也勝非以前宰相侍經筵不帶職名亦非故事癸亥吕頥浩出師以神武後軍及御前忠鋭將崔增趙延夀二軍從行百官班送趙甡之遺史頥浩出師在壬戌今從日歷甡之又云頥浩以新創置忠鋭十將偕行按日歷閏月三日有旨吕頥浩進發其神武忠鋭統制將佐不許出城辭送則忠鋭決非偕行也又忠鋭初止七將此月二日乃命第八將趙琦而第六將單德忠先已從申世景在閩中此云十將亦誤矣第四將邵青五月壬午揀併元只在臨安蓋第一將崔增第二將趙延夀實從頥浩行餘人不與甡之不深考耳甲子武節大夫果州刺史兼閣門宣贊舍人襄鄧鎮撫使司都統制知郢州霍眀權襄陽府鄧隨郢州鎮撫使司公事權知襄陽府聽吕頥浩節制其郢州令軍中統制官同舉可以服衆者權知具名聞奏朝廷始聞桑仲死故就命之翌日遷眀武功大夫遙郡團練使仍賜詔書奬諭不知眀已敗矣詔觀察使以上許薦可為將帥者二人樞密院置籍以備選用言者論今正右武之時雖二三大將嘗立竒功而取富貴矣竊恐隱約之中尚多竒士願詔管軍臣僚及都統制官與夫內外侍從監司郡守各舉所知有謀略精深武藝超卓者具名來上陛下親屈帝尊問以恢復之計果得其人則不次用之庶幾豪傑並出故有是旨乙丑進士及第張九成為左宣教郎簽書鎮東軍節度判官廳公事九成兩浙路類試為第一用升甲恩特遷之直龍圖閣知臨安府宋輝升祕閣修撰仍賜三品服直徽猷閣兩浙東路提點刑獄公事徐天民罷先是上聞常州科斂害民遣度支員外郎胡蒙往究其實未奏天民自知常州改命御史中丞沈與求奏朝廷號令之出要當使民信之而已方體究其罪乃加除擢賞刑錯亂民其信乎朝廷示人好惡如此儻使胡蒙稍懷觀望豈肯以實達於陛下之前四方聞之謂朝廷陽為寬恤之言隂縱掊克之吏欲使其知禁勸蓋亦難矣况天民掊克蠹民為浙西諸郡之最嘗致無錫縣之民不勝誅求之苦致有自斷其腕聲寃訟庭者亦有自溺于井者天民庇而不發今又付之廉按之權責之澄清之任未見其可乃罷天民令提刑司治罪忠訓郎韓遹為閣門祇候知孝感縣初孝感闕令久鎮撫使陳規聞遹在復州之湖中召使為尉以兼邑事遹去縣十餘里臨河築壘以捍賊未幾有告遹謀叛者規謂之曰亂離以來州郡不為賊破者獨德安耳孝感德安之喉襟使吾無以制汝則不汝付也汝胡為反遹叩頭請死規曰吾保汝人言若是復遣還邑才兩日遹斬謀亂者數人以獻規上其功於朝故有是命丁卯罷兩浙轉運司回易庫以言者論其苛細也戊辰言者奏盜賊竊發州縣所不能免要在居官任職之人或先事以折其姦或乘微以戢其暴如火始燃隨即撲滅昨范汝為嘯聚回源初不過四十人不時討殺遂致賊得為計日以滋蔓至煩朝廷遣將出師僅能得其死命而遺黎之不遭賊者十無一二蓋不勝酷昨者宣撫司所上功狀動以千萬計朝廷既捐賞以豫之顧一時養寇遺患有如前所云者豈可以置而不問望陛下以臣章付外議當時帥臣監司郡守縣令之罪特出威斷施行庶為盜發所臨謬懦不及事者之戒詔本路轉運司體究申尚書省時建州守臣朝奉大夫韓珉已罷去於是又降二官珉降官在九月庚午己巳詔侍從官知州於本路安撫大使用申狀前宰執即書檢庚午嶽飛奏破曺成于賀州詔飛不以逺近襲逐如成肯自新一面從長措置直徽猷閣劉民瞻提點夔州路刑獄公事自建炎以來川陜帥臣部使者皆張浚版授至是稍以勑除浚尋徙民瞻成都府路轉運副使成都漕司題名民瞻以今年九月三十日到任賜江東安撫大使司折帛錢十萬緡為修行宫之費時李光言建康自一都會望朝廷略示經略之意故有是命辛未詔左文林郎趙子稱令赴都堂審察子稱初見建炎元年十月時集英殿修撰知南外宗正事令懬奉詔選宗子伯琮伯浩入禁中伯浩豐而澤伯琮清而癯上初愛伯浩忽曰更子細觀乃令二人並立有貓過伯浩以足蹴之伯琮拱立如故上曰此兒輕易乃爾安能任重耶乃賜伯浩白金三百爾罷之後四日以子稱為左宣教郎此以日歷及王眀清揮麈録舊諱參修熊克小歷云上以子稱之子生有聖質育于禁中又云賜名伯琮臣謹按阜陵藩邸舊諱從王從宗至紹興三年二月壬寅除防禦使然後改賜名去伯字克誤也明清云伯浩後終于溫州兵馬都監東海軍使葛玥以舟師至淮岸為海州漕船所邀吕頥浩言賊船雖不能多載騎兵然乘秋初北風南來錢塘江上震驚行朝乃詔溫台州募海船土豪杭越蘇秀州措置斥堠壬申以霖雨不止命刑部郎官及諸路憲臣窮督獄訟蘄黃鎮撫使孔彥舟言劉偽已遷汴京金人留戍甚寡人苦科役日望王師土豪人户尚有團結保險堅守不降者誠能拜相臣為大元帥宿重兵於淮南要害之地以為根本指揮諸鎮分道進兵將見天戈所指州縣望風降順因民所欲籍以為兵不必乞師於神武取民所餘資以為糧不必仰給於縣官河南之地指日可定而京城孤立矣一旦會合輻輳城下而劉豫唾手可擒也伏念臣昨任東平府鈐轄統領巡社鄉兵屢戰獲捷京東軍民粗知姓名見今所部將士又多東北人皆曽隨臣出入行陳習知山川不煩鄉導伏望聖慈假借名目稍重事權使臣獨當一路自光之蔡迤邐進兵詔賜勑書嘉奬仍令就都督府計議太學博士詹公薦自東京遁歸行在詔吏部與見闕差遣甲戌給事中程瑀為尚書兵部侍郎瑀以親年髙求去後三日除龍圖閣待制出守已而復留之瑀復為給事中在此月辛巳乙亥福建江西荆湖南北路宣撫副使韓世忠言自來全無纎毫生事欲以錢三萬八千緡市新淦縣所籍賊徒田宅慮有違礙詔以賜世忠丙子權尚書吏部侍郎廖剛試給事中大理卿章誼權吏部侍郎剛尋以憂去右朝散大夫趙元裕行太常丞元裕黨人彥若子也彥若青州人元祐侍讀學士通習典故坐父故間廢四十年至是添差簽書昭慶軍節度判官祿薄不能贍請于朝召赴行在遂命之時元裕年幾七十矣初朝廷以福建江西荆湖宣撫使孟庾自溫州趨湖南故命湖廣宣撫使李綱由汀道州之鎮至是綱言祖宗朝宣撫使以執政為之近張浚孟庾為宣撫皆見執政如臣起廢典藩亦冒使名兼庾己領湖南北韓世忠副之今又除臣湖南借使諸處盜賊一司欲令招納一司欲令討捕不知何所適從諸州錢糧一司欲令支用一司欲令樁留不知如何遵稟以至節制諸將辟差官吏行移措置皆有所妨望詳酌事宜眀降處分使有遵守綱又言自建昌虔吉至衡潭約一月程自汀道州三倍今曺成在連賀非重兵不可行又福建等路宣撫司經由江西及荆湖路分逐路州縣錢米先次剗刷拘收理當通融應副所有朝廷支降并他路所輸錢糧銀帛官告度牒餘剩之數乞並樁留撥付本司詔綱先往廣東置司捍寇俟庾世忠撫定盜賊畢赴潭州仍令庾等班師曰度量合用錢糧數外並留與綱綱請取撥所至州縣錢四十萬緡米二千斛為一嵗之用又請移行所部帥臣監司州縣並用劄子皆從之於是曹成已為嶽飛所破遂就韓世忠招安而朝廷未知也蘭州文學王隲坐饋馬進錢糧昭州編管事見建炎四年十月己邜丁丑責授中大夫余深復特進朝廷聞深已死故用赦復之給事中程瑀言深姦謀隂賊實蔡京之腹心今一赦盡復元官則京儻未死官亦可復也夫曠蕩之澤雖曲示於寬恩然眚災之赦難施於巨蠹乃詔寢前命寢命在此月丁亥初尚書左僕射都督江淮荆浙諸軍事吕頥浩總師次常州而其前軍將武節大夫榮州團練使趙延夀所部忠鋭軍叛于吕城鎮是日叛兵過金壇縣奉議郎知縣事胡思忠率射士迎敵為所敗賊以槍刺之思忠曰寧殺令毋掠藏庫殺平民賊怒逐之至市河思忠溺死浙西安撫大使劉光世遣前軍統制王德追叛兵至建平縣及之盡殱其衆後贈思忠三官録其家一人於是頥浩稱疾不進熊克小歷附此事於七月又云頥浩行未至丹陽縣後軍叛去皆誤也日歷五月二十五日都督府申趙延夀下潰兵在廣德軍作過二十六日右司諫方孟卿言臣昨晚聞吕頥浩所帶前軍自常州以來逃竄六月七日鎮江府申有都督府前軍人馬在吕城鎮作過據此則非後軍也叛去之日不可得而知按張縝申明胡思忠死事狀云五月十八日有過軍在市殺人即指此事故附見於此思忠六月丙申贈官己邜武功大夫康州刺史閣門宣贊舍人樞密院統制山東忠義軍馬范溫升忠州團練使偽齊劉豫自去冬起登萊密三郡之兵犯福島寨失利而去遂廣造戰艦又送旗榜偽赦欲間衆心溫收繫其使至是以聞且乞賜糧舟自募商人販米許之初御前除戎器而浙東諸州所遣民匠困於工程多以暍死上知之詔給齎糧遣還故郡俟秋深乃集庚辰詔江東西路各糴米十萬石於建康府饒州樁管應副行在及防秋使用自巡幸以來軍儲嵗計多仰浙西而平江湖秀之産倍於他郡至是久雨三州中下之田率皆淹沒而上田所損十亦二三議者恐所入必虧故於江南增糴是日臨安府火彌六七里延燒萬餘家火之始熾也神武右軍都統制張俊仗劍登屋督所部救之不能止最後修內司搭材兵至火乃熄於是臨安府守臣兵官及三衙管軍皆坐貶秩時浙部淫雨害稼御史中丞沈與求因推言災異謂徽嚴水泉暴湧漂及城郭廬舍臨安火延居民至萬餘家天變異常同時而見可畏也陛下當於行事之際思其所未至者加之以誠夫畏天不以誠則巫祝雖具近於致瀆愛民不以誠則詔令雖繁終於失信用人不以誠則讒間日進將以疑似而逺正人聽言不以誠則阿諛日聞將以忌諱而惡直士追祖宗之法而不以誠則不無背戾惇骨肉之親而不以誠則不無猜嫌薄宦寺之權而不以誠則雖名為裁抑而桀黠之輩不除正宫闈之化而不以誠則雖外示朴素而奢靡之習猶在願陛下加意而行則天地感格隂陽和平災異之生顧為福耳上嘉納焉徽嚴水災於史不見特與求章疏中及之故附於此壬午武功郎閣門宣贊舍人御前忠鋭第四將邵青充紹興府兵馬鈐轄揀其所部精鋭千三百人𨽻神武中軍保靜軍承宣使髙世則提舉萬夀觀溫州供職故追復龍圖閣直學士曽肇贈龍圖閣學士諡文昭以黨籍故也肇南豐人故相希弟元符末翰林學士待制以上第二十五人汀州安置詔泛海往山東者行軍法諜報劉豫於登密淮陽造舟論者恐賈舟為偽地所拘則橰工柁師悉為賊用故有是旨癸未御史中丞沈與求言金若來侵當由武昌建康兩路而來其造海舟慮為虛聲以懼我議者多欲於眀州向頭設備使敵舟得至向頭則已入吾腹心之地矣臣聞海舟自京東入浙必由泰州石港通州料角陳貼通明鎮等處次至平江南北洋次至秀州金山次至向頭又聞料角水勢湍險一失水道則舟必淪溺必得沙上水手方能轉掉况敵人捨馬不能有所為若用舟行一舟所容幾馬彼不為此不過分遣京東簽軍乘舟以懼我耳儻於石港料角等處拘收水手優給庸直而存養之以待緩急之用彼亦安能衝突望分撥耿進李彥進水軍擇人統之似為利便詔以付都督府仍令江東浙西大帥司海舟並聽督府使喚既而吕頥浩言料角等處去金陵遼逺緩急恐失事機彥進見𨽻劉光世軍中乞就委光世措置從之委光世在六月丁酉三省請於行在别置作院一所令諸軍匠各造器甲並申朝廷支撥後以御前軍器所為名仍𨽻工部日歷不載此據會要增修會要云𨽻工部在五年三月而此年六月六日工部侍郎韓肖胄己申眀看驗等事則是元𨽻本部也三十年七月黃中又有申眀不知何時不𨽻本部尚書左僕射吕頥浩言前左承議郎范同儒學知兵望起復故官主管都督府機宜文字從之同初見元年二月甲申上臨軒踈決繫囚自是遂為故事户部請諸路上供絲帛並半折錢三千如兩浙例兩浙折帛已見建炎三年三月壬辰許之是時江浙湖北夔路嵗額紬三十九萬匹浙東路上供八萬淮福衣八千浙西上供九萬二千淮衣六千江東上供九萬八千淮福衣二萬七千江西上供五萬二千淮福衣萬五千湖北上供三百夔路上供三百已上皆有竒江南川廣湖南兩浙絹二百七十三萬匹浙東上供絹四十三萬六千淮福衣五萬三千天申大禮八千浙西上供三十八萬一千淮福衣十三萬八千天申大禮八千江東上供四十萬六千淮福衣十三萬九千天申大禮八千江西上供三十萬五千淮福衣六萬七千天申大禮八千以上四路皆有竒淮東天申大禮四千九百五十淮西大禮三千七百湖南天申大禮四百廣東天申大禮四千六百廣西天申大禮六千五百西川天申大禮萬三千東川上供萬一千天申大禮萬六百夔路上供二萬二千天申大禮七千利路天申大禮八千三百四川宣撫司截三路綱三十萬匹又科激賞絹三十三萬匹皆不𨽻户部東川兩浙湖南綾羅絁七萬匹東川綾二萬六千三百浙西八千七百西川七千八百浙東四千六百皆有竒婺州羅二萬湖南絶三千成都府錦綺千八百餘匹段皆有竒江淮閩廣荆湖折帛錢蓋自此始川絹川布已見建炎四年乙未東南絹三年十月庚寅廣布五年末可參考詔行在權官並罷惟户部刑寺許長二指差見任人兼權時言者論州縣權官之弊以為屢降約束而監司帥臣未必奉行者蓋由朝廷不自信其説有以啓之於是自省郎已下權攝者並罷是日始聞都督府前軍叛詔浙西大帥司遣兵趣捕之乙酉承議郎葉斐除名鄰州編管坐授范汝為偽命知建州也丙戌詔置修政局時尚書左僕射吕頥浩既督軍於外右僕射秦檜乃奏設此局命檜提舉而參知政事翟汝文同領之又以尚書户部侍郎黃叔敖為參詳官起居郎胡世將太常少卿王居正為參議官尚書右司員外郎吳表臣屯田員外郎曽統兵部員外郎樓照考功員外郎張觷並為檢討官置局如講議司故事差提舉官已下在六月辛卯今因置局遂書之熊克小歷云參詳參議官皆以侍臣為之按差參議官時世將未為舍人居正未為左史克蓋誤也仍詔侍從臺省寺監官監司守令各書所見言省費裕國強兵息民之䇿監察御史劉一止言宣王內修政事者亦修其車馬器械之政而已如緩其所急先後倒置何修為哉今不過薄言獄訟與官吏遷除土木營造之務未見所當急也工部侍郎韓肖胄應詔言天下財賦窠名舊悉𨽻三司今户部惟有上供之目而已問諸路所總窠名於戶部戶部不能悉問諸郡所總窠名於漕司漕司不能悉失一窠名則所入亡矣積以嵗月所亡至多願詔諸路漕司括州縣所入所出可罷罷之可併併之立為定籍簡眀可考漕司總諸州户部總諸路以視出納則無陷失矣且經費之大莫過於養兵今諸兵軍人亡而冒請者甚多財如江河難實漏巵願立諸軍核實之法重將帥冒請之罪優給告賞斷在必行則兵數得實餉給不虛省費裕國此其大者艱難以來正兵散於四方流為盜賊故軍籍日削願倣康定治平弓手義勇之制申以選練教習之法即有緩急俾佐行陳或令保守蓋人有顧藉則進必死敵退不潰散矣生民之不得休息為日久矣常賦之外迫以軍期吏緣為姦斂取百端復為寇所逼逐田桑失時寇去歸業未容息肩催科之吏已呼於門使何所措手足乎願詔郡邑招集流散官貸之種俟三年收始責其賦置籍書之以課殿最強兵息民此其先者世將應詔言兵衛寡弱乞以神武五軍並建都副統制以分其勢益增三衙精卒為萬乘扈衛以備非常居正應詔言省費尤切大略謂今有司以數路之所出欲盡為向者一百七十三年之事不忍暫廢非所謂知時變夫不知隨時以省事而乃隨事以省費故今日例有減半之説究其實未始不重而徒示人以弱如國初嵗舉進士不過數十今至四五百人此其費亦大矣然御試之日臣備員考官有司給燭半挺曰此省費也嗚呼其亦拙矣他皆類此臣願詔大臣論定若非禦寇備敵與恤民之事一切姑置則費省而國裕矣司勳員外郎張燾請復置御營司分諸將為六軍命大臣大將為使副各典一軍以收兵權舉淮南之地分置重鎮使自戰自守又乞躬行實德以率百官曽統言於檜曰丞相事無不統何以局為檜不聽右文殿修撰季陵應詔言國家承平日久純以文治其弊極矣自軍興以來朝廷所降類多誥牒非強以與民則莫售師旅所須最先糧草非強取於民則莫給民之倍費己莫能堪又况重役暴斂有不可勝言者故民之流亡終莫能救甚可痛也今之為監司守令者亦太巧矣監司移文於郡守則曰不得騷擾科率郡守移文於縣令則亦曰不得騷擾科率舊例和買無本可支者久矣新行和糴能償其直者幾何一遇軍興事事責辦有不足者預借來年之賦又不足者預借後年之賦雖名曰和乃強取之雖名曰借其實奪之上下相籠専以智詐此文弊之極也今之為兵將者亦少恣矣衣食不取其飽暖而取其豐美器械不取其堅利而取其華好務末勝本初無鬭心賊至則偽言退保賊去則盛言收復遇敗則千為一遇勝則一為千此亦文弊之極也臣願陛下用夏之忠以革誕謾兼商之質以去華侈守此為修政之本庶幾其有瘳乎今乘輿服御之費十去七八百官有司之費十去五六至此而無益於國者軍政不修而軍太冗也張浚一軍以川陕贍之劉光世一軍以淮浙贍之李綱一軍以湖廣贍之上供之物得至司農太府者無幾矣計行朝每月官吏之費寡而軍兵之費多是竭天下之財秖足以養兵兵籍日衆財用日窘國日削民日貧厥咎安在議者非不知此意謂兵為大事艱難之際恃以恢復當盡節浮費唯兵是圖其意誠美殊不知欲強兵者正不在冗食也為今之計儻能一舉而空敵軍暫費暫勞皆不足恤若猶未也當為長久之慮無徇目前至於大壞而後已今相臣將臣同司兵柄嘗汰羸卒矣嘗置營田矣茍利於國知無不為節制之師固無可議然偏裨逺去紀律漸踈臣所目擊者試言其略凡稱統領兵數不多家口隨行般挈勞重一聞賊至擇其精鋭護送老小其用以自隨者秖辦走計耳此當議者一也家糧口劵贍給無餘虜掠婦女軍中多有養既不足寧免作過此當議者二也所至州軍邀求犒設稍忤其意公肆劫持守令憚於生事竭取於民而奉之此當議者三也詭名虛劵隨在批請死亡逃竄開破不眀枉費官物誰敢檢察此可議者四也悠悠之徒或假關節或行賄賂寄名軍籍覬冒功賞用命之人安得不怨此可議者五也事類此者未可悉數願詔有司専意講求革其因循以作士氣如此則軍政立矣詔江東西諸州上供絲帛並於建康府吉州樁管非朝旨而擅用者依軍法用三省請也丁亥左朝奉大夫中書門下省檢正諸房公事仇悆充集英殿修撰沿海制置使尋命悆兼領福建兩浙淮東諸路序位視發運使舉官如兩浙漕臣諸路非沿海州軍皆許按察悆請置司平江之許浦鎮又辟右承奉郎王安道充本司參議官皆從之悆兼領諸路及許按察在六月戊申申明舉官及奏辟王安道在六月癸丑申眀敘位在七月庚申吏部言近旨寺監丞已下令本部依格注擬其間有應堂除及専法奏辟者未有該載詔𣙜貨務都茶場仍舊堂除御史臺檢法官主簿令本臺自辟其寺監丞以下及檢鼓等六院官並還吏部自吕頥浩再相用堂後官張純為𣙜貨務場使更鹽法故獨重其職焉熊克小歷吕頥浩之長天官也嘗請寺監書局以上依舊堂除餘悉歸吏部按日歷今年閏四月二十四日吕頥浩等劄子云云蓋其為相時所陳非吏部建請也劄子又云寺監丞法寺官乞令吏部按格法注擬其後吏部申明乃留太常國子丞博以上克所書寺監書局以上依舊堂除亦誤今不取初宣撫處置使張浚以淮鹽未通乃通大寧鹽於京西湖北至是秦檜聞其事下堂帖禁之其後浚復通蜀鹽於荆南詔不許詔止在三年四月己丑今併書戊子手詔用建隆故事行在百官日輪一人専對令極言得失先是詔省臺官限半月各述利害條具以聞而御史中丞沈與求言臺諫係言事官遇有職事非時入對不在輪對及條列之限乃命釐務官通直郎以上如初詔後詔在此月己丑六月辛亥左宣奉大夫新除提舉醴泉觀兼侍讀朱勝非復觀文殿學士知紹興府資政殿學士知紹興府張守提舉醴泉觀兼侍讀初右中奉大夫兩浙轉運副使徐康國自溫州奏發宣和間所製間金銷金屏障等物上命止之而康國己津送至行在御史中丞沈與求奏曰陛下勤儉德侔大禹漢文帝已下不足道也康國不識事君之禮尚習故態欲以微物纍盛德乞用廣陵故事斥而焚之仍顯黜康國眀示好惡且為小人希旨之戒詔屏障令臨安府毁棄康國特降二官日歷戊子日事俱不詳今以與求附傳及奏議增入宣撫處置使張浚承制以拱衛大夫貴州防禦使熙河蘭廓路馬步軍副總管統制熙秦兩路軍馬關師古為榮州防禦使建炎以來繫年要録卷五十四
