body:
  text: 建炎以來繫年要録巻一百七十七宋李心傳撰紹興二十有七年五月乙丑朔太府寺丞劉天民守尚書吏部員外郎左朝請大夫知韶州傅雱罷以殿中侍御史王珪奏其悖慢貪黷也丙寅敷文閣直學士左承議郎四川安撫制置使兼知成都府蕭振特轉左朝奉大夫落直字上以振治蜀有聲執政請進一職遷四官上曰四川善政前有胡世將今有蕭振振蠲减重賦蜀人安之近薦武帥又皆得人可除直學士吏部尚書陳康伯請罷兼措置户部財賦許之戊辰上謂輔臣曰今四方無事當以民事為意監司郡守不可不得其人輔臣進呈湖南轉運司奏右通直郎知長沙縣常禋名臣之後修潔自持束吏愛民衆所稱譽詔進禋一官俟任滿與陞擢禋同子也己巳建武軍承宣使殿前司選鋒軍統制許世安添差兩浙西路馬歩軍副總管罷從軍仍給真俸寜國軍節度使殿前司右軍統制李顯忠為選鋒軍統制右武大夫忠州防禦使輔逵充殿前司右軍統制詔兩省官並禁出謁遇休沐及賜告許見客用兩省請也庚午秘閣修撰新知福州沈調言福建諸縣舊有忠義社各隨鄉村多寡團結推擇豪右衆所畏服者以為正副量置槍杖器甲之屬以故盗賊屏息民以為便今為官司科率騷擾甚失本意乞令守臣覺察帥憲司舉按調又言福建路産鐵至多客販徧於諸郡而官監坑冶絶然稀少今若盡令中賣入官則無所用縱之則利不歸上深為可惜乞令轉運司措置申省從之壬申上謂沈該曰頃蜀中嵗貢錦繡帟幕雖民之幼女亦追以供役作其擾如此朕令止之蜀人極喜近又减四川民輸至一百二十餘萬民力必稍寛矣癸酉左朝散郎趙不茹知化州還論廣西部馬使臣每嵗五六十員例選閑居之人率以前任俸給為凖各人支七月嵗費錢四萬餘緡自今乞以見任使臣部送又言化州係産鹽地分自紹興九年漕司立額令本州官賣二分鹽計七十二萬餘斤民以為苦望從其便奏皆可遂以不茹行將作監丞鹽事以六月乙巳行下右奉議郎福建路安撫司幹辦公事留觀德為太府寺主簿興化軍免解進士彭與進所著周易解義及神授圖太極歌詔特補下州文學乙亥左宣奉大夫尚書左僕射同中書門下平章事兼提領編修玉牒所沈該為左銀青光禄大夫以進書推恩也初朝廷以蜀道逺命舉人即宣撫制置司類省試行之既久議者或以為不能無弊欲罷之悉令赴南省事下國子監權尚書兵部侍郎兼祭酒楊椿曰蜀士多貧而使之經三峽冐重湖狼狽萬里可乎欲去此弊一監試得人足矣遂請選差清彊有才行郎曹以上一人徃莅其事仍令監司守倅賔客子弟力可行者赴省餘不在遣中是日宰執進呈詔付禮部其後本部乞士人願赴南省者給驛劵選官不行餘從之二十九年七月乙酉孫道夫再建請太府寺丞鄧深面對論近嵗士風卑弱習於浮偽寖以成風稱呼太過書問太重請謁太數乞嚴為法禁從之丙子左奉議郎杜師旦特勒停送道州編管右正言凌哲論師旦事曹泳為入幙之賔貪汙狂怪故有是命丁丑詔孟庾追復端明殿學士左宣奉大夫路允廸追復龍圖閣學士左通議大夫庾既得歸廢為民而死或言允廸在汴京不食卒故皆復之己卯左從政郎新明州州學教授郟次雲入見奏請守令闕則擇清望官臺閣闕則擇郡邑循吏為之上謂大臣曰朕用人正欲内外適平如監司守令治狀顯著不必一一召來當增秩賜金且令久任遂以次雲行國子録辛巳左朝奉大夫胡棣行太府寺丞棣自四川茶馬司幹辦公事召還論四川選人已放散舉主伺候告命之人多冐干諸司奏辟妨才肆姦詔禁止遂有是命癸未金國賀生辰使正議大夫守禮部尚書耶律守素中靖大夫太常少卿許竤見於紫宸殿乙酉詔民戸已充保正副後來析戸而再當充役者其戸頭許歇役餘戸物力髙者即為白脚依舊輪差日歴無此今以王師心等㸔詳狀修入二十八年六月己丑不行己丑尚書工部員外郎樊光逺知興化軍從所請也庚寅詔錢塘仁和知縣依兩赤例並堂除京朝官任滿無遺闕與陞擢差遣辛卯禮部太常寺言每嵗大祀三十六除天地宗廟社稷感生帝九宫貴神髙禖文宣王等已行外其餘並乞寓祠齋宫立春日祀青帝朝日出火東蜡權於東門外長生院赤帝黄帝權於南門外淨明寺白帝夕月納火西蜡權於西門外惠照院黒帝權於北門外精進寺皆用少牢備樂舞而神州地祗以精進地狹祀熒惑以與赤帝同日皆權於惠照院行之神州當用犢而亦用少牢盖權禮也自紹興以來大祀所行二十有三而已至是侍御史周方崇以為言乃悉復之左從政郎主管吏部架閣文字王淮充樞宻院編修官六月丁酉戸部侍郎林覺言民間納稅錢丁鹽紬絹乞以第五等所輸自一文以上令折見錢仍共鈔庶以便民上謂宰執曰朕嘗思之合零就整此固甚善十戸共鈔官司先給由子與鈔頭若即時鈔入則十戸無擾不然恐鈔頭收藏由子不肯齎出比至官催𦂳急衆戸不免再納此貧民所以重困卿等可措置令經久便民然後行之左朝奉郎潼川府路轉運判官王之望改提㸃本路刑獄公事戊戍罷臨安府左右廂主管公事官以侍御史周方崇言其徇情曲法人多嗟怨故也敷文閣學士四川安撫制置使兼知成都府蕭振卒振再守蜀凡二年時利州舊宣撫司有積緡二百萬守者宻獻之朝下制置司取撥振曰此所以備水旱軍旅也一旦有急是又將取於民請於朝留其半此據成都記撥錢在二十六年今因振卒附見比卒蜀人思之甲辰宰執進呈秘書省著作佐郎黄中轉對言仰惟神宗皇帝即位之初勵精求治嘗慮萬事之㡬不能徧燭首舉舊章毎遇起居日俾百僚轉對陛下勵精庶政無異於神宗之用心故百僚轉對至今行之未嘗廢也然而二十年間大臣專恣好佞惡直一時習尚徃徃以言為諱凡所建明不過毛舉細故以塞責而已如神宗皇帝所以詔告丁寜者盖未之有也伏觀陛下邇者詳延多士咸造在廷親灑宸翰以求忠讜侈靡之飾朝聞而夕棄之盖已著躬行之效矣陛下之所以責望於布衣者猶若此則其所以責備於縉紳士大夫者固不論而可知也臣謂陛下宜追述神祖之意特降詔書申飭在位自今以徃應轉對之官有所開陳要在竭誠盡忠切於治道毋得蹈常襲舊攟摭細微以應故事然後陛下觀其人擇其言而為之虛心訪問俾得以盡其情實積日累月庶幾有補於萬一則舊章不為虚設矣上覽疏曰中所論極當朕方欲與卿等相度特降指揮大抵轉對之法恐朝政闕失民間利病有不得上聞者皆當論奏自秦檜當國轉對之名雖不廢而所輪者不過大理寺官數人攟摭細微姑應故事而已初無鯁切有及於時事者如此則繆悠之談何補於國今中所言頗合朕意可令士大夫知之乙巳有錢及之者上書乞差遣上疑其心疾以問輔臣沈該言其意渉侮慢乞送汀州居住上不許曰外間不知謂以切直之言得罪非所以廣言路也姑與一閑慢差遣如何該持不可乃止丁未右朝請大夫通判鎮江府施垓提舉廣南東路常平茶事用李琳薦也戊申知樞宻院事湯思退守尚書右僕射同中書門下平章事左從政郎南康軍都昌縣丞李薦入對論諸郡遣官徧行屬縣常賦之外誅求寛剰錢動以萬計乞行禁止從之以薦行太學正薦周麟之所舉也江南東路轉運判官葉義問乞以僧道絶産得㫖贍學之田召人請佃從之紹興二十一年十月六日降㫖贍學己酉詔西北流寓及東南人寄居滿七年或産業及第三等已上者並不得注授舉辟本處差遣以國子監丞朱倬言士大夫多用開封户貫守官鄉里逞私者衆故也徽猷閣待制提舉江州太平興國宫黄唐傳卒庚戌詔故責授中大夫余深復特進觀文殿大學士故追復中大夫黄濳善再復觀文殿大學士左光禄大夫官子孫各三人故責授中奉大夫薛昻復特進資政殿大學士官子孫二人既而左司諫凌哲言深昻朋附蔡京濳善為相誤國今盡復三人恩數恐政刑失平忠義解體詔以濳善嘗任副元帥特復元官官一子權中書舎人趙逵草制畧曰雖秉政無可書之績而事君有不移之忠原情以觀於法當叙濳善既復官深昻之命遂寢後詔在七月戊辰今併書之辛亥戸部侍郎王師心奉詔舉左朝奉郎新知嚴州羅孝芬氣節剛正學術深醇十月甲申除秘書丞左承議郎新秀州州學教授唐堯封蚤以文行著於鄉評四任教官恬靜有守六月戊子除軍器監主簿堯封金華人也保寜軍承宣使節制御前軍馬知金州王彦丁母憂詔起復壬子戸部侍郎王師心言荆南為上流重地而兵力寡弱舊例鄂州嵗遣御前軍千人戍其地欲增戍二千以示形勢上以荆南乏財不許熊克小歴云王師心為荆南帥嘗奏乞分鄂渚重兵留屯以示形勢從之其所云與日歴不同今不取甲寅尚書戸部侍郎王師心試給事中中書舎人兼侍講權直學士院王綸試尚書工部侍郎起居郎趙逵起居舎人周麟之並試中書舎人逵入謝上諭曰朕所以用卿卿既知之朝有闕政無鉅細宜助朕也又謂近臣曰趙逵純正可用逵登第踰六年而典外制自中興後所未有太府少卿徐林權尚書刑部侍郎秘書郎唐文若為起居郎著作佐郎王剛中試起居舎人乙卯尚書左司員外郎葛立方權吏部侍郎尚書兵部殿前侍衛馬歩軍司言離軍將士類得添差州郡無以給欲自今大郡毋過百人次郡半之小郡三十人為額從之丙辰秘書省著作佐郎黄中為尚書司封員外郎故右朝散大夫楊淵追復右中奉大夫其家援例乞恩不已故復之事祖在去年閏十月癸卯戊午初命太廟冬饗祭功臣臘饗祭七祀祫饗兼之用太常博士張庭實請也詔太學月試並依貢舉條制鎻院考校仍毋過十日議者以國子博士何俌多私親舊故有是㫖俌踰年卒罷俌明年六月辛卯罷己未少保瀘川軍節度使太一宫使榮國公錢忱遷少傅忱告老乃有是命詔命官捕獲私茶鹽依賞給各遞增一等於是全火七千斤累及萬斤皆改京秩議者以為濫二十八年正月壬申不行辛酉故責授昭化軍節度副使周望追復龍圖閣學士左中大夫官其家二人自秦檜死左司諫凌哲請追復大臣死於貶所者朝論初指趙鼎王庶等數人沈該湯思退為相遂併取先得罪於國者而追復之哲復爭以為不可乃止壬戌秘書丞楊邦弼校書郎陳俊卿並兼普安恩平郡王府教授俊卿為學官多所禆益一日普安郡王習毬鞠俊卿微誦韓愈諫張建封書以諷王即誦全文不遺一字俊卿退而喜曰王聰明而樂從諫社稷之福也鼎州觀察使隴右郡王趙懷恩添差成都府兵馬鈐轄秋七月乙丑秘書省校書郎陳俊卿言人之才性各有所長稷契臯陶垂益伯夷在唐虞之際各守一官至終身不易此數君子者苟使之更來迭去易地而居未必能盡善况其餘乎今也監司帥臣鮮有終其任者逺者一年近者數月輙已遷徙州縣百姓送徃迎來之不暇其為勞費不可殫舉以至内而朝廷百職事之官亦無肯安其職業為三數年計者徃徃數日待遷視所居之官有如傳舍雖有勤恪之人宣力公家於人情稍通綱條稍舉已捨而他去後來者或未能盡識吏人之靣知職業之所主則又遷矣因循嵗月積弊既久是以胥吏得以囊橐為姦賄賂公行而莫之誰何如此而望職業之舉難矣哉夫爵禄名器人所奔趨必待積勞而後遷以明持久而難得則人各安分不敢躁求若開驟進之門使有僥倖之望則人人懷茍且之心無首公之節其自為謀則得矣朝廷何賴焉臣嘗讀國史見太祖朝任魏丕掌作坊十年劉温叟為臺丞十有二年太宗朝劉䝉正掌内藏二十餘年陳恕在三司亦十餘年此祖宗用人之法也望與執政大臣參酌立為定論其監司帥守有政術優異者或増秩賜金必待終秩而後遷擢至於朝廷百執事之官亦當少湏嵗月俾久於其職然後察其勤惰而陞黜之庶幾人安其分盡瘁於國無有過望而萬事舉矣詔三省行下遂以俊卿為著作佐郎丙寅左朝請郎新通判邵武軍鄭知剛入對乞天下繁劇知縣並令從官保舉監司守臣别薦都堂籍記以次差除上以諸縣至衆恐不可行丁卯以知剛行宗正寺主簿知剛周麟之所薦也左承議郎新主管南外敦宗院葉顒行將作監主簿顒賀允中所薦也戊辰詔减諸路監司屬官員左司諫凌哲請諸郡無通判處守臣有闕而次官係選人者令監司選鄰郡倅或見任京朝官暫權從之己巳詔諸添差官非格法及元降㫖許差者並罷庚午給事中王師心言鼎澧歸峽産茶民私販入北境利數倍自知戾法不顧因去為盗由引錢太重貧不能輸故抵此望别創憑由輕立引價既開其衣食之門民必悔過改業而盗自消矣上覽䟽謂宰執曰茶鹽禁𣙜本為國用所需若財賦有餘則摘山煮海之利朕當與百姓共之姑遵舊制可也熊克小歴載師心建請於今年六月末又云上然之乃與日歴所書全不同至於此日所書上語則又去其首尾盖克本故相王淮門下士而書成之時淮尚為左相故於師心事多所縁飾也今並正之戸部侍郎林覺言國朝慶歴以來嵗鑄錢一百八十餘萬緡其後亦不下百萬如前年猶得十四萬緡去年猶得二十二萬緡而提㸃司官吏徒糜禄廪朝廷罷之殊快人意但付之漕司日久亦未有涯議者以為諸路物料有無不等運司不相統轄無以通融鼓鑄欲出尸部錢八萬緡為饒贛韶三州鑄本委各州通判主管漕臣徃來措置今嵗權以二十三萬緡為額即不得復以舊錢代發從之熊克小厯稱所鑄權以五十萬緡為約誤也據王珪所論乃是用本錢八萬緡而約鑄新錢二十三萬緡除本外止得十五萬緡克不細考耳右朝請大夫江南西路轉運判官黄仁榮知衢州右朝奉大夫荆湖北路轉運判官楊沂移江西路上覽除目曰監司守臣席未及煖已輙更易不惟迎送勞費而官吏軍民於政教獄訟亦莫知所適從自今悉令久任辛未下詔戒敕汙吏左宣教郎王佐為秘書郎癸酉下詔戒飭監司郡守舉劾守令毋得觀望當路挾情徇私有賞有罰朕當信而别之甲戌直秘閣知臨安府榮薿權尚書户部侍郎直秘閣兩浙轉運判官張偁知臨安府詔両學自今嵗春季試補弟子員遇省試年即以孟夏立為永制乙亥龍圖閣學士新知潭州李文㑹為四川安撫制置使兼知成都府朝廷聞蕭振卒故也時文㑹在瀘南未去乃就用之仍詔例外賜振家銀帛五百匹兩丙子中書舍人周麟之言國朝以東西二省為維持政本之地政令之罷行失當人才之進退非宜在中書則舍人得以封繳在門下則給事中得以論駁皆於命令未行之前而救正之爰自近嵗事與舊違當軍興時則以事干機速不可少緩及休兵之後用事者又任私意廢棄成法故有所謂報者有所謂中入報者有所謂尚先行者有所謂入己者皆成定例詔㫖一頒敕劄随降所謂給舍但書押已行之事而已甚非祖宗分省設官之意望申明舊制凡命令之出並經両省或無封繳即皆畫時行下以復祖宗之成憲從之丁丑右中奉大夫權尚書户部侍郎榮薿特降二官時新城縣令馮世亨以贓罪為漕臣所按世亨自刎仁和縣令楊績亦以贓聞侍御史周方崇言薿前為守臣挾情狥私皆不按發故貶秩壬午詔成都府每嵗合起川馬更不發來行在分𨽻江上諸軍嵗凡六千匹内鄂州建康鎮江府各三分池州一分令逐軍差官兵取押丙戌御藥院言永祐昭慈等攅宫帝后生辰酌獻所用鋪翠縷金花乞以藥玉葉漆金紙代充從之時上禁銷金鋪翠甚嚴自禁中始侍御史周方崇言自陛下更化以來招選異能不間逺邇既令侍從各舉所知朝奏暮召賢才坌至獨旌聘之禮闕然未講尚慮其間有仕不遂志懐才高卧者有累上不第焚棄筆硯自逸者有道足以尊君智足以庇民而甘心於山巔水濵漁樵耕築之下者望倣先朝故事命諸郡守臣考士民之譽訂鄉里之評以名上聞命監司帥臣審核真偽備禮延聘從容詢訪随才録用詔禮部檢照典故申尚書省右承議郎張祁知楚州丁亥左承議郎新秀州州學教授唐堯封入對論帝王之徳莫大於生萬民陛下偃兵睦鄰與民休息好生之徳莫大於此竊慮將帥之臣封疆之吏妄生事端寖虧大信望賜申飭上曰卿王師心所薦也俟與卿别改差遣可其奏翌日以堯封行軍器監主簿金部員外郎緫領淮西江東軍馬錢糧方師尹言諸郡應副大軍錢糧多違期限有悮支遣自今有違其監司守臣乞擇其尤者按劾以聞重賜黜責從之辛夘進呈成都府奏雙流知縣馮邦光罪案上曰近年監司郡守按劾官吏跡状明白方坐以罪恐一二年後人人又乞改正自謂一時觀望以求僥免此不可不慎也八月甲午朔上諭宰執曰昨日卿等繳到宋㬇所上徽宗賜㬇手詔朕已恭覧葢徽宗内禅之美逺過堯舜而一時小人外庭如唐恪聶昌耿南仲内侍如邵成章張藻王孝竭輩輙為妄言以惑淵聖之聼父子之間幾於疑貳至宋㬇李綱奉迎徽宗還京綱先歸具傳徽宗之意而後淵聖感悟兩宫釋然今觀手詔并得綱題識皆朕昔所親見者朕朝徽宗於龍徳宫嘗聞親諭云朕平生慕道天下知之今倦於萬㡬以神器授嗣聖方築甬道於兩宫間以便朝夕相見且欲髙居養道抱子㺯孫優游自樂不復以事物攖懐而小人希進妄生猜間不知朕心如此嗣聖在春宫二十年朕未嘗有纎芥之嫌今豈復有所疑耶此皆當時玊音外庭徃徃不知沈該等曰昨日臣等既得竊觀徽宗詔墨今又親聞陛下宣諭此實堯舜盛徳之事因以知李綱題識葢實録也翌日該等又乞宣付實録院上曰朕為人子何可不暴白其事使天下後世知之既而又親筆書於詔後宣示宰執三省擬直徽猷閣京西轉運副使霍蠡陞直寳文閣知潭州同知樞宻院事陳誠之言蠡有風力必能為陛下辦事但京西難得其人聞左朝議大夫知鄂州熊彦詩久諳軍中事可以除代上曰蠡歴官多年在京西尤鎮静彦詩累任郡守此二人皆可用朕思今天下無事惟在留意監司郡守卿等皆持公心商𣙜人才朕謂雖未盡得人將見十得七八矣誠之曰臣獲與廟堂末議雖迂愚無取至於進擬人才實不敢萌私意上曰朕用卿為執政已及一年卿見朕聼斷之際曽有一毫私意否誠之曰陛下無私如天地臣夙夜奉承實千載之遇也乙未參知政事湯鵬舉知樞宻院事丙申權禮部侍郎楊椿面對言成都府舊有太祖皇帝御容在新繁縣重光寺葢太祖平蜀蜀人感不殺之仁肖天日之表而謹事之紹興改元太宗真宗仁宗英宗神御來自終南山遂權宜奉安同為一殿然郡縣卑陋情文簡略望特下禮官講求典故檢㑹福州及本府見行儀制而折𠂻之詔可後遂詔本府别加營繕嵗時遣府通判侍祠右朝議大夫宋㬇復徽猷閣待制提舉江州太平興國宫制曰朕懐先皇帝坐見於牆食見於羮矧今親奉其雲漢之章哉㬇實以手誥來上載覧泫然嗟嘆無窮嗚呼思先帝而不復見得見汝輩甞所歎異者葢庶幾焉手誥謂爾為孝子為忠臣此士大夫之至行也復汝故職汝其知所以自勉哉㬇蔡攸妻弟也自靖康中斥去至是三十年丁酉詔重修宗學用宗正丞吳景偲請也壬寅龍神衛四廂都指揮使清逺軍承宣使御前諸軍都統制兼知興元府姚仲為保寕軍節度使右正言凌哲乞諸路縂領所舉改官人依憲漕等司例磨勘更不逐旋申明取㫖從之熊克小歴載此事於今年十一月末又謂哲為吏部侍郎時所請實甚誤也今從日歴甲辰皇姪和州防禦使居閎為利州觀察使以積閥遷也右朝請郎知郢州錢受之罷先是霍蠡在京西劾受之謟事王庶嘗為樞屬力賛其謀沮壊和議今領邊郡不知悔過久處邊境必致生事故受之遂罷從義郎閤門祗候王彦昇貶秩二等坐不毁銷金服飾為女奴所告故也丁未左朝散郎張闡提舉兩浙路市舶是日以御䟦徽宗皇帝手詔宣示百官于尚書省宰執宿衛戊申朝退使相侍從兩省臺諫知閤禮官南班宗室騎𨗳宰執騎從至敷文閣奉安庚戌資政殿學士提舉臨安府洞霄宫程克俊薨後諡章靖辛亥詔諸路換給不盡僧道度牒並納禮部用三省請也上曰昨權禮部侍郎賀允中上殿朕問即今僧道之數允中言有僧二十萬道士纔萬人朕見士大夫奉佛其間議論多有及度牒者朕謂目今田業多荒不耕而食者猶有二十萬人若更給度牒是驅農為僧且一夫受田百畆一夫為僧即百畆之田不耕矣佛法自東漢明帝時流入中國終不可廢朕亦非有意絶之正恐僧徒多則不耕者衆矣壬子左朝散郎知巴州蘇欽令再任以利路諸司言其治行也丙辰詔荆南㐮陽府光随州安豐軍合起内庫錢帛自紹興十四年至今年皆蠲之丁巳尚書司封員外郎黄中兼權國子司業戊午右朝奉郎知光化軍任寳臣特勒停以在任不職故也右承議郎通判蘄州方扔知光化軍任寳臣不職事當考己未詔左承事郎王十朋係親擢進士第一人尚待逺次可特添差簽書鎮東軍節度判官㕔公事右奉議郎宋汝為卒汝為棄妻子亡去至是十年卒于青城縣開先觀年六十汝為未病以後事託其友人監永康茶税王槐孫後月餘乃死槐孫為𦵏之青城山中槐孫序子也乾道元年四月丁未推恩庚申詔置提領諸路鑄錢官於行在其户部申請指揮更不施行先是殿中侍御史王珪再上疏論鑄錢司不可廢因陳六事大略以為提㸃司本錢見存者嵗為三十餘萬緡何必給户部錢為本韶州錢監乆廢興復甚艱兼物料不足又漕司毎嵗上供錢物尚不能如期今以鼓鑄委之力必不給議者以為鑄錢司費多得寡毎用十七錢而得一錢殊不思先王制無用之貨以通有用之財乃國家利權所在豈可計其費而為之又今錢多䦨出於外國不知嚴禁况自罷泉司以來於國計未有加損兼本錢各有科目與户部財計殊不相闗望専置一司責以舊額詔工部侍郎王綸權户部侍郎榮薿㸔詳七月甲申時知樞宻院事湯鵬舉以珪言為不然且言恐坑冶司省罷官在此倡為異論願陛下專委之轉運司必能就緒上令與三省議尚書左僕射沈該等請命侍從或卿監一員領其事許置官屬二員從之遂命薿提領二十八年八月辛丑改命壬戌大理少卿陳章卒特賜其家銀帛百匹兩是月金主亮試進士于廣樂園命書畫局直長鄭子𣆀雜試舉人中子𣆀利州阜俗人後徙大定中天徳三年進士第實第三甲第一人亮嘗令賦詩大見稱賞故有是命及啓封子𣆀中第一於是躐階三等授翰林修撰同知制誥范成大攬轡録云鄭子𣆀字景純大定人楊建中榜第三人是年試天錫智勇正萬邦賦授翼城丞除書畫局直長貞元四年亮令再試復状元及第是年試不貴異物民乃足賦亮特命為翰林修撰以金國翰林直學士趙可所撰子𣆀墓誌考之名字鄉里事迹官位並同但誤以第三甲為第三人及以正隆二年為貞元四年爾成大出疆不乆而金之公之卿侍從舘閣一一得其履歴之詳如此故具載九月戊辰左朝散郎兩浙西路提㸃刑獄公事金安節守大理少卿左朝散郎知大宗正丞喻樗為尚書工部員外郎國子監丞朱倬提舉兩浙西路常平茶鹽公事己巳詔自今内除監司辭日並引對故房州觀察使王􅊛追復建武軍承宣使制曰朕追復故臣之官非必有功也無有小大咸洗濯之􅊛昔者不善總師屢致奔潰有司言状法當削官既歴多年丹書猶在其復元秩慰汝九原太學博士陳天麟罷侍御史周方崇言天麟陞堂說書至禹貢篇輙及今日焚翠羽罷銷金語言淺俚諸生不覺閧堂失笑至於私試所考中詩賦多落韻者故黜之庚午詔自今太學私試學官考校失當者令禮部按劾以聞詔選人陳乞致仕雖亡殁在出敕前並聼改官用吏部請也左宣教郎張戒主管台州崇道觀戒坐趙鼎累斥去凡十九年至是得祠辛未故右廸功郎張懋特贈右承務郎與一子下州文學懋為欽州靈山尉捕兇賊死癸酉參知政事張綱罷為資政殿學士知婺州以綱引疾有請也監登聞檢院范岡言國朝著令貧無𦵏地者許以係官之地安𦵏今火𦵏之慘日熾事闗風化理宜禁止望申嚴法禁仍飭守臣措置荒閑之地使貧民得以収𦵏從之乙亥尚書省言諸軍重役人數漸多詔諸路州軍强盗應配廣南及逺惡州者並依舊法更不配填諸軍其逐軍已配到人令戸部量行増添請受開具申省丙子敷文閣待制致仕林乂落職以右司諫凌哲言乂附㑹故相遂得進用今告老而歸凌駕州縣無所不至故也殿中侍御史王珪言常平賑糶所以抑兼并濟貧弱毎嵗禾稼未登或小有水旱民方艱食富人閉糶以規厚利若官糶少損其直則閉糶之家不能乘人之急而價自平其利為不小也臣竊見諸州郡毎嵗輸納秋租自装發綱運之後倉廪一空所存止有常平義倉斛斗軍糧吏俸及揍發上供不足之數皆取給於此所在成例是名為常平而專以備州郡急闕至飢民艱食則坐視而無以賑之殊非立法之意前日州軍委官盤量所欠動以數萬計其間如借兌耗折雖責之分限補填終不可得亦恐見存之數未必皆得其實也近聞福建有貴糶之處父老訴之州郡冀欲賑濟而郡官占吝不發米價頓増人多困斃此其意以欲留為州郡急闕之備而已願委諸路提舉官徧廵諸州躬親閲眎以知其實有遇合賑濟而州郡占吝不發者許人户越訴監司互察臺諌按劾以聞如中下之州所積不多賑贍不足則令提舉司以一路有餘之處通融取撥以應其乏免致流離轉徙此亦古者移粟就民之意從之戊寅吏部尚書兼侍讀陳康伯參知政事詔淮南京西湖北路州軍自紹興十四年至二十七年合起内蔵庫綢絹錢帛可並與蠲免日後合起發數目令逐路提刑轉運司官親廵所部度量事力開具的實合發納分數以聞自來年始先是諸路乆逋内蔵庫紹興甲子以後合發上供錢帛工欲悉與蠲之以諭宰執沈該等言昨䝉聖諭仰見陛下恭儉愛人茍有以寛民力雖内帑數百萬不惜天下幸甚上曰昔唐元宗有云朕雖瘠天下肥矣大哉王言此所以致開元之治也朕有取焉朕約於奉已内帑未嘗妄費一金邉郡所欠固多然户口未復責輸實難可悉與蠲免己卯給事中王師心兼侍讀户部言諸路州縣人户買撲場務停閉去處甚多今相度欲除見欠官錢物及見充吏人貼司廵檢司土兵軍員之家外其餘不以有無拘礙並許實封投状承買候界滿無欠少聼依條接續上曰坊場名課朝廷所仰補助嵗計若不以有無拘礙庶幾接續不致敗闕宜從之中書門下省言兩浙諸州紹興三十三年至二十五年揍額錢拖欠數多其錢係轉運司將日生酒税錢樁發縁逐年所入不常是致拖欠詔與减放一年揍額錢事初當考庚辰右朝奉大夫主管台州崇道觀趙善繼直秘閣善繼前守贛州始修城至是城成故有此命辛巳給事中兼侍讀王師心權吏部尚書權禮部侍郎兼實録院修撰兼侍讀賀允中守給事中癸未顯謨閣直學士康執權落致仕知泉州尋詔執權年老閔勞以事可除龍圖閣直學士提舉江州太平興國宫執權進職在十月辛亥敷文閣待制王俁卒夜雷甲申起居郎唐文若知邵州侍御史周方崇論文若為人狂誕故罷左朝散郎新知嚴州羅孝芬為秘書丞用王師心薦也乙酉秘書少監劉章為起居郎右朝散大夫新知漢州于霆入辭上曰蜀中地逺卿至官有民間疾苦利病一一奏來仍須速行不宜緩也丙戌侍御史周方崇試尚書禮部侍即丁亥尚書倉部郎中黄祖舜守右司郎中吏部員外郎王晞亮守左司員外郎考功即中潘莘為樞宻院檢詳諸房文字秘書省校書郎葉謙亨言祀典散秩天子大蜡八而今為四風雨農蠶皆不用牲祭夏后氏乃曰大禹而斥其名若此類未易殫述望酌景徳故事命禮官及秘書省取祭祀之式考訂潤色勒成一書目曰紹興正祠録以為彛制從之詔宜州不係團結土丁毎年見納身丁米並與免納以廣西諸司言與團結土丁一例輪流差在沿邉戍守合依體例免納故也己丑中書門下省檢正諸房公事兼權樞宻都承㫖陳正同權刑部侍郎兼職如故左朝散郎范如圭提舉江南西路常平茶鹽公事用賀允中薦也如圭入對乞推原徽考禁不舉子孫之意行漢胎養法上曰徽宗皇帝天性至仁昆蟲草木皆被徳澤當如卿所奏遂有是命庚寅户部言贍軍酒庫併歸本部所有長貳推賞指揮乞不施行從之左朝奉大夫直秘閣致仕鄭南陞秘閣修撰南鬲兄政和初嘗為國子司業至是年九十有三三請加奨故有是命辛夘宰執進呈均州守臣吕游問言本州城下邉接漢水放生去處公庫嵗収魚利錢補助天申節進銀自金州以來宻布魚枋上下數百里竭澤而漁無一脱者乞禁止上曰均州貢銀不多而經營至此必是别無窠名可辦且放生池雖有法禁亦細民衣食所資姑大為之防豈能盡絶今自官中竭澤採捕以供誕節其亦不仁甚矣可如所奏左朝請郎新提舉兩浙西路常平茶鹽公事朱倬朝辭入對即日除右正言建炎以來繫年要録巻一百七十七
