body:
  text: 建炎以來繫年要録巻六十一宋李心傳撰紹興二年十有二月丁亥朔詔閩盗范忠竊發令神武前軍左部統領申世景御前忠鋭第六將單德忠以所部二千速捕之毋致滋長如不即撲滅其帥守監司及應干捕盗官並重寘典憲既而處州復告急乃命忠鋭第一將張守忠以精兵二千㑹之權聽守臣宋伯友節制賊遂平世景以勞自武功大夫加榮州刺史忠初見十二月戊寅世景除遥刺在明年正月甲戍初婦人易氏為亂兵所掠後在劉超軍中久之從商人張德易嘗見同掠内人頗能言宫禁事遂自稱榮德帝姬宗室成忠郎士倫送之至荆南時朝請郎茍敦夫通判府事鎮撫使觧潜以敦夫女嘗在宫掖俾驗視之茍氏以為然潜遂遣官部送至行在過衢州其從者怙貴執辱官吏一郡騷然守臣汪思温曰是亦一徐王也上命崇國夫人王氏等驗認果詐遂與赴大理易呼曰我與主上親同氣何無手足情耶至是大理奏獄成詔易杖死德黥𨽻瓊州士倫敦夫並除名敦夫漳州茍氏千里外編管臣謹按榮德帝姬道君皇帝長女在東都降曹晟靖康䧟金皇族數云晟死於燕京公主嫁錫庫國王已死見在大金皇后後位居住是明易之妄也今併附此黃州布衣吳伸上書曰臣竊觀陛下有孝弟之大德而二帝之問不通敵國之陵不已土地之封日削國用之富不饒盗賊之鋒未戢此五者其故何哉臣竊謂今兩國之難未觧鼎峙之形已分使者雖數十輩金帛雖數十萬能免偽齊之盗乎此遣使之無益明矣陛下忍小耻太過示小敵太怯視疆塲太輕任藩屏太易寄託非人而土地之産多曠姑息太厚而殺戮之威不張此五者雖國之急務然猶未足為陛下之輕重臣復見國勢如累卵之危生靈有塗炭之厄臣曉夕為之寒心不識陛下欲復祖宗之故業乎止欲為東晋之南據乎臣竊謂復祖宗之故業則陛下有萬世垂統之基若止如東晋之南據則不過有百年之世祚然尚恐土地日削社稷日危亦未必安於百年也說者必曰朝廷頼偽齊以為藩籬以捍金人臣竊為不然外敵之患患在手足中國之患患在腹心不識偽齊今不為盗能保其子不為盗乎能保其孫不為盗乎不識偽齊俟金人既定之後去僣偽之大號還土地之故疆乎為復割據中原久假而不歸乎若曰臣無伐君則武王何為而并天下若曰國可並立則隋髙何為而滅叔寳縱使劉豫止欲割據豈不為姦雄開基又况自古南北雌雄之勢但見以北并南未聞以南并北者也臣竊聞立國之所以重者三太學本籠絡天下之英雄今悉罷去而劉豫乃為學校以延多士今諸軍士卒皆河北山東人邇來如劉光世軍中一月之糧或闕其半各懐去心而豫大張形勢廣示富饒省刑薄斂彼思鄕之人聞此豈不動心南北往來商賈如織厚増其利售我物貨關市無征阜通無禁朝廷事無巨細往往皆前期而知此無它從商賈之便者然也誘陛下之英賢則謀謨可得而䇿誘陛下之士卒則戰鬬可得而用誘陛下之行旅則國之虚實可得而知矣凡此三者悉有離心則陛下國勢日以孤危臣又聞金人重兵悉趨陜西志在吞蜀萬一不幸蜀有變動彼將順流而下水陸並進則陛下豈可復有乘桴之行乎偽齊有實無聲若即伐之如摧枯拉朽爾不亟平之非特為子孫患臣恐為陛下憂也臣觀東南之地本非帝王之都歴考古今未有卜世之久者况吳越之地形勢尤薄萬一未復神京而建康古都亦可暫駐鑾輿無久居於海隅也臣觀自古帝王之興兵權未嘗重假於人今陛下親御之衆不如藩鎮之多臣竊憂之願陛下簡治甲兵躬行天罰若猶豫不斷金人得蜀必復立僣偽割據成國陛下土地止有東南因循茍安恐成大禍願陛下以歸命侯長城公之言為戒也臣又見近日㳂邉州軍多用武臣為守或起於卒伍或招於賊徒毒心不改逆謀猶存近置安撫大使正如唐之節鎮文臣為之則不知兵者有焉武臣為之則貪汚寡謀者有焉設有㓂至皆是提重兵以自衛臣竊觀周以同姓之親而昌唐任異姓之權而亡為陛下計莫若以㳂邉之郡十州之地建一諸侯以同姓之親者主之且耕且戰足為屏翰金枝玉葉布在四方足以伐敵國之謀絶亂臣之望臣前言願陛下伐齊者策之上也不得已而建諸侯者策之次也捨此二者復有秘策當俟對天顔而後面陳非紙筆得以盡也臣竊見酈食其與唐儉為死間事與今日頗相契合陛下以臣言可採臣願為食其唐儉出使偽齊謀說将定陛下興師從而伐之臣雖遭鼎鑊之烹猶生之年也臣竊自料臣死有三陛下怒臣狂愚之言而殺之通衢臣亦死陛下用臣狂愚之言而遣之死間臣亦死陛下不聼臣言它日或如王蠋自經於木枝臣亦死有此三者必死之道臣願為聖宋之鬼不忍為異國覊旅之民也伸書凡六千餘言其大指如此䟽入詔赴都堂審察遂以伸為将仕郎伸補官在十二月乙邜戊子直龍圖閣主管江州太平觀辛炳為侍御史趣赴闕己丑百姓張本杖脊送千里外州軍編管坐念詩譏諷及談說本朝國事為戱也庚寅廣東經畧司言海賊柳聰已受招詔補承信郎充經畧司海上捉捕盗賊聰為盗久有舟數十徒黨數百人往來廣福雷瓊欽髙南恩諸州境上至是愈熾帥臣汪伯彦言已遣官說諭歸業故有是命㝷又官其徒七人然聰居海中出没如故久之乃定明年四月己酉其徒七人並補官四年二月戊戌廣東經畧使季陵申自汪觀文招諭桞聰了當目今無餘黨今併附見辛邜尚書祠部員外郎鄭作肅為監察御史直徽猷閣淮西廵撫使郭偉權知廬夀春鎮撫司公事偉将至廬州上奏言權鎮撫使王亨嘗受偽命欲閉門拒之上命神武後統制巨師古将兵與偉㑹而御前忠銳第一將崔増以忠鋭二千潜舟由巢湖以入遂執亨奏至乃有是命左從事郎王之道特改左宣義郎以和州鎮撫使趙霖言其保全濡須之功也之道初見建炎三年十月左朝散郎新知江陰軍趙詳之言陛下甄别亷汚以示天下然州縣之吏猶聞抵冒以干典憲今犯贓之人搢紳所不齒赦令所不宥計贓綢絹不滿十五匹絞其法禁非不重告戒非不明也然未聞立按察官之法臣乞為法制著於令甲諸監司按察官計部内州縣之數視舉官法於部内有犯入已贓不因按發因事罥罣每一人降一官或展磨勘三人加等至於貪贓狼籍所犯數多取㫖竄黜将見持節按察之官仰承風㫖加意督責必不容貪汚之吏叨在部属而亷慎之風馴可致矣事下刑部詳之又奏乞令經筵官兼講諸史上諭大臣曰朕觀六經皆論王道史書多雜覊又載一時捭闔辯士曲說遂不行癸巳禮部尚書洪擬請依元祐法兼用詞賦經義取士已而御史曽統以為未須兼經可止用詞賦上曰古今治亂多在史書以經義登科者類不通史吕頤浩言均以言取人第㸔所得人材如何耳臣嘗見太祖皇帝與趙普論事書數百通其一有云朕與卿定禍亂以取天下所剏法度子孫若能謹守雖百世可也上曰唐末五季藩鎮之亂普能消於談笑間如國初十節度非普謀亦孰能制輔佐太祖可謂社稷功臣矣甲午御筆申嚴銷金之禁上因覽韓琦家傳論戚里多衣銷金事且聞都人以為服飾者甚衆故禁之觀文殿學士知潭州充湖南安撫使李綱罷初綱為宣撫使請擇人攝所部守貳理為資考朝廷從之又乞所差權官到任其吏部先差下人雖到更不放上内有材能之人别行辟置劉棐為右司諌言此乃藩鎮跋扈之漸若久任之將使軍民獨知有綱不知有陛下知有宣使不知有朝廷非國之利非綱之福䟽入不報棐又言綱靖康中力主邢倞結伊都之議又令姚平仲夜刼敵栅遷迫之禍皆自綱發之不報棐又言綱與吳敏誣上皇欺淵聖謂宣和傳授出於已意寄居福州招納賄賂移文江西増益制書事見七月庚午方命矯制不恤國事章四上右諌議大夫徐俯亦奏劾綱至是檢㑹棐奏以綱提舉京西崇福宫命吏部尚書沈與求為龍圖閣學士湖南安撫使兼知潭州仍詔綱俟與求至乃罷綱嘗言荆湖之地自昔號為用武之國今朝廷保有東南制御西北當於鼎澧荆鄂皆宿重兵使與四川襄漢相接乃有恢復中原之漸未及行而綱廢棐䟽稱翟汝文任執政日面奏李綱與臣同寓福州招納賄賂受統制官辛企宗米三百石陛下嘗諭汝文畏綱黨終不肯遵奉聖訓當考言者論通州嵗支鹽二十萬袋近浙西安撫大使司統制官喬仲福王德市私鹽倣官袋而用舊引貨於池州人不敢問今嵗縁此支鹽僅三萬袋有害鈔法尚書省言茶鹽之法朝廷利柄自祖宗以來它司不敢侵紊今養兵大費多仰鹽課若将佐容縱侵紊非獨妨客販即養兵大費必闕乃詔光世詰仲福與德之罪後有犯者捕送臺獄重行貶竄夜行在臨安府火燔吏工刑部御史臺及公私室廬甚衆乙未旦乃滅賜神武中右軍忠銳第五將馬歩軍修内司救火卒三千人錢各一千令戸部出米二千斛賜民之不能自存者丙申吕頤浩等上䟽待罪上曰朕一夜宫中恐懼不寒而慄應令寛恤賑濟等事卿等可速條具施行乃降親札曰惟天降灾彰朕失德當與卿等共思所以謝天譴其勿有請時吏部案牘悉為火所焚乃詔應陳乞遷官任子者但有官私印押文字一件可以照驗即許召保陳乞用侍郎權尚書席益請也益建請在此月辛丑太常博士趙霈言國家以宋建號用火紀德今駐蹕以來未舉大火之祭望詔有司舉行從之詔省浙東㳂海制置司時言者以為浙西㳂海制置使仇悆置司許浦鎮别無措置但責廵尉分地而守州縣官皆可任此事然控扼山東海道尚為不可廢者吕源在浙東尤為端閑乃詔源俟來春結罷其海舟令明州守臣兼領尋命悆移司定海縣併浙東領之此月丁未䧏㫖丁酉右諫議大夫徐俯入對上面諭俯有合奏禀事不拘早晩及假並許入俯嘗勸上熟讀漢光武紀上書以賜之曰卿近進言使朕熟㸔世祖紀以益中興之治因思讀十過未若書一遍之為愈也先以一巻賜卿雖字惡甚無足觀者但欲知朕不廢卿之言耳戊戌詔臨安民居皆改造蓆屋毋得以茅覆盖行宫皇城周回各徑直留空三丈毋得居左宣教郎洪興祖為秘書省正字興祖擬兄子也常為太常博士以内艱去及是與左承事郎孔端朝左文林郎張炳左從事郎周林四人俱召試上覽策謂大臣曰興祖所論讜直切中時病當為第一遂與端朝並除正字而炳林令吏部與諸州學官秘閣修撰提舉亳州明道宫衛仲逹卒是日端明殿學士江東安撫大使趙鼎始至建康視事時参知政事權同都督江淮荆浙諸軍事孟庾太尉江南東西路宣撫使韓世忠皆駐軍府中軍中多招安强冦鼎為二府素有剛正之風庾世忠皆加禮兩軍肅然知懼民既安堵商賈通行焉己亥淮西廵撫使郭偉罷集英殿修撰知江州胡舜陟復徽猷閣待制廬州壽春府鎮撫使兼知廬州朝論以偉擅執王亨懼其生事故命舜陟守之仍令御前忠銳第一将崔増暫權廬州舜陟明年三月到官右朝請郎知徽州孫佑直秘閣知江州兼㳂海安撫使佑北海人也龍圖閣學士新知潭州沈與求力辭湖南之命且言不習軍旅必致敗事乃以與求知常州時龍圖閣直學士折彦質在廣西即以彦質為湖南安撫使兼知潭州仍令李綱俟彦質至乃罷與求猶稱疾不已遂以本職提舉江州太平觀免謝辭熊克小歴十一月己巳沈與求除知潭州與求乞祠改提舉太平觀按此時李綱未罷克盖誤也尚書右司員外郎李與權言今兵勢稍振然所試亦不過鋤平冦盗羣饑烏合之衆而已若不簡練恐未能以臨大敵望用古今上中下駟之法立為三等壮勇武藝精熟者為上壮勇可教藝者為中僅能披戴者為下賜賚請給各視其等如此則上兵得逞不混於不能者之間中兵欣羡亦復勤於訓習下兵執役不増招其額非獨省費亦激勸之道詔神武諸軍相度後不果行詔八路轉運使除攝官及應辟人外其闕並權歸吏部候邉事寧息取㫖以本部言貟多闕少故也庚子秘閣修撰知臨安府宋煇罷以殿中侍御史曽統再䟽論其救火無術罪戾至多又受入内東頭供奉官符輔之請求縱釋私酤故也仍以輔之送大理寺先是宗子不同寓居餘杭縣煇遣兵掩捕得私醖旋又釋之及究治煇自言與輔之不相識盖右修職郎新鹽官縣令刁廱與不同親厚以書嘱簽書寕海軍節度判官㕔公事李勤責出之於是追輔之二官降勤二官廱一官並衝替仍劄煇照㑹輔之三年正月乙亥行遣今併書之煇四年三月己未落秘撰廱四月壬辰改正詔斬江西兵馬副鈐轄張中彦于潭州用帥臣李綱奏也中彦事已見十月壬寅辛丑給事中賈安宅試尚書工部侍郎中書舍人胡松年試給事中太常少卿黃龜年為起居舍人故右武大夫寕州觀察使知陜州李彦仙贈彰武軍節度使故起復静難軍承宣使知慶陽府楊可昇贈感德軍節度使張浚言可昇詐降以誤敵事竟卒為所害故録之晁公遡撰彦仙傳乃稱彦仙仕至拱衛大夫寕州觀察使與宣撫司奏状不同今從奏状詔諸路制勘公事徒罪已下並令宣諭官酌情斷遣以聞四川分鎮路分令宣撫鎮撫司遣官結絶以權刑部侍郎章誼言諸路制獄二百餘逺者數年不决干繫日久故有是命明州奏髙麗國遣知樞宻院事洪彛敘等六十五人來貢詔起居舎人黃龜年接伴而吏部侍郎席益館之髙麗人不至熊克小歴於十二月甲辰書髙麗遣人入貢盖誤髙麗人實未至也壬寅左承議郎張致逺主管台州崇道觀從所請也宣撫處置使張浚即成州置院類試陜西發解進士得周漢等十三人浚承制賜漢進士出身餘同出身癸邜以聞詔令尚書省給黄牒趙甡之遺史姚岳京兆人避地入蜀張浚欲收陜右士夫心紹興初觧試令陜右流寓進士盡作合格類省試亦如此惟雜犯黜落一二人而已岳為榜首由是陜右流寓進士三十餘人皆過省按宣撫司所奏岳乃第十一人非榜首甡之恐誤然所云流寓進士盡作合格理容有之今附見此更求它書参考右朝散郎李元瀹充御史臺檢法官用殿中侍御史曾統奏也時臺中全闕長貳上特命統辟之甲辰詔張浚罷宣撫處置使依舊知樞宻院事徽猷閣直學士知䕫州盧法原為龍圖閣學士川陜宣撫處置副使與王似同治事先二日命駕部員外郎李愿往川陜撫諭因使持詔召浚還朝且令浚與参賛公事劉子羽主管機宜文字馮康國俱還仍以親兵千人䕶送時法原奉祠居蜀浚承制以法原代韓廸言于朝閲四日遂有是命時詔浚于國有功久勞於外令學士院降詔召赴樞庭仍命學士撰蠟書十通付宣撫副使王似書填賜諸叛将書略曰昨宣司參議劉子羽弄權用事不通人情今已召張浚還朝更命王似無復嫌隙其早自歸浚聞乞祠不許賜叛将詔語楊氏編年有之它書盖無也降詔召似在丁未令學士撰蠟書在戊申今併書之詔李綱未罷宣撫使已前刷下二廣錢物令湖南安撫司取撥應副支用先是綱遣官剗刷廣西常平一司帑藏得錢七十八萬餘緡米十七萬餘斛金銀八千餘兩朝廷以湖南殘破之後慮乏軍儲故令取撥焉日歴有此指揮今以明年三月四日都省勘㑹指揮増入其所刷錢數以明年十二月廣西提刑董弅具到數附見尚書省言諸路寺觀常住田多荒閒詔僧道能措置種蒔及税租無拖欠者並差撥住持是日上謂大臣曰近引對元祐臣僚子弟多不逮前人亦一時遷謫道路失教元祐人才皆自仁宗朝涵養燕及子孫自行經義取士往往登科後再須修學所以人才大壊不適時用乙巳吕頥浩言近遣郎官孫逸督上供米於江西聞已起三綱則三十萬之數可集矣上曰所補不細江西漕臣必待遣官趣之則失職為可責朕面諭都轉運使張公濟俾先理常賦若常賦不入反務橫斂非朕恤民之意也觀文殿學士知廣州汪伯彦罷右諌議大夫徐俯言伯彦公議不與衆惡所歸軍民不悅付之方面必致悞事故伯彦遂罷右金吾衛上将軍提舉西京崇福宫朱孝孫卒訃聞贈開府儀同三司孝孫淵聖后兄也靖康中自節鉞換授己酉尚書吏部郎中周隨亨充川陜撫諭官與李愿偕行各進一官賜白金五百兩仍命随亨宣押王似盧法原赴撫司治事庚戌孟庾自建康來朝樞宻院計議官李誼與逺小監當坐漏泄朝廷機事故也先是誼奉詔徃青龍鎮未還有㫖詔從官至都堂集議㑹常州進士李觀國上書及其事輔臣召問謂從誼得之故有是命此以紹興五年三月一日臣僚上言修入奏稱誰以十月二十五日差往青龍鎮幹事十一月十一日侍從集議十八日誼方回誼回時觀國已上書矣集議事日歴全不載不知所議云何當求它書𠫭考詔福建轉運司移福州提刑司移建州以言者論漕計在以鹽課應副諸郡福州瀕海之地置司為冝故也時轉運判官徐宇以建州殘破不欲居乃以私書遺吕頥浩言其事頥浩進呈遂兩易憲漕之地焉元降指揮已見七月辛巳按日歴此日行遣止作臣僚上言今以明年十月癸邜言章増入徽猷閣待制提舉臨安府洞霄宫季陵知廣州先是恵州有狂男子聚衆數千僭名號作亂朝廷責帥司收捕陵入境宻諉叛人曽衮令以功贖罪不旬月擒之属吏請奏功陵曰討賊帥職也惟補衮承信郎充歸善廵檢而己辛亥司封員外郎鄭士彦言國以兵故强兵以教故精國家承平時禁軍教法甚嚴况今艱難而諸州往往冗占以將迎為急務教習為虚文望詔有司申嚴故事毎州選兵官專主嵗終較其精粗而賞罰之詔以付諸路帥司右文殿修撰江淮荆浙都督府參謀官盧知原充徽猷閣待制知臨安府泗州得偽齊宿州牒有犯廟諱御名者邉吏審於朝三省奏若行退回恐往復稽滯乃命以黄紙覆之㐮陽鎮撫使李橫敗偽齊于揚石店遂復汝州先是偽河南尹孟邦雄發永安陵此㩀熊克小歴鎮撫使翟琮憤不能平思出竒以擒之知虢州董震亦與偽將先宻謀以所部應琮時㐮陽糧乏横不能軍乃引兵而北敵自入中國少能抗之不意其猝至悉潰而去橫至汝州城下守將武德大夫彭玘以城降熊克小歴載李横復汝州在明年三月盖不知其進兵月日也日歴載横㨗奏云十二月二十五日敗偽齊于揚石店故繫此日熊歴又云横軍中乏食朝廷所給皆州縣虚樁之數按此當是明年還軍後事此時㐮陽乃分鎮地分朝廷未嘗有所給也今不取是日金人攻商州初左副元帥宗維在雲中使陜西經略使薩里罕裒五路叛兵與偽齊四川招撫使劉䕫並進辛炳劾張浚䟽稱王萬年叛去此時在軍中盖誤萬年即王喜也此時為拱衛大夫威州刺史宣撫使統領軍馬其時秦鳳路副總管吳璘以兵駐和尚原敵懼不得進欲以竒取蜀乃令叛將李彦琪駐秦州窺仙人關以要吳玠别將以㳺騎出熙河綴關師古而大軍由商於馳入師古與别將遇敗之薩里罕至商州斥堠将望風退走守將邵隆度不能守即退屯上津日歴三年三月十九日宣撫使奏金人以十二月二十五日自長安引兵趨金商辛亥二十五日也關師右以是月十三日己亥敗金于熙秦今附見此更不别出壬子尚書左司員外郎張綱請命郡邑月具禁囚存亡之數結罪申提刑司嵗終較其多寡量行賞罰從之癸丑左朝奉大夫張錞追二官勒停永不得與知州差遣錞守太平州坐軍變故有是命甲寅参知政事孟庾同都督江淮荆浙諸軍事落權字言者論淮南多閑田而耕者尚少今安撫鎮撫使陳規措置屯營田深得古者寓兵於農之意望倣其制下之諸路詔湖北江東西浙西屯田令帥臣劉宏道韓世忠李回劉光世措置都督府總治詔都轉運使移司常州進士汪大圭張致平伏闕上書論時事三省言靖康初曽因姦臣鼓唱太學諸生伏闕致京城紛擾理當懲戒乙邜詔近年未嘗因言責人惟伏闕事不可不戒可令臨安府挾歸本貫大圭徽州人致平成都人也徽猷閣待制提舉江州太平觀耿延禧復龍圖閣直學士延禧上䟽自訟為蔡京徒黨王賔鄧肅所攻故有是命丙辰慶逺軍節度使醴泉觀使邢煥薨于行在上將臨其喪言者以為駐蹕吳越以來持重戒謹有所不出至於肺腑恩澤之侯豈足以勤乘輿况方春不冝臨弔乃止加賜銀帛二千匹兩以其弟閤門宣賛舍人藎臣添差浙西兵馬鈐轄令湖州量給葬事後諡恭簡煥三年十一月追封是日知鼎州程昌㝢令兵馬副總管杜湛率將士冐雪入沅江縣境盡焚賊寨奪舟取糧熊克小歴鼎冦楊么衆至數萬是月詔鼎澧鎮撫使程昌㝢遣兵討之按此時鼎州已罷分鎮克所云誤也是冬䖍賊謝逹犯恵州圍其城守臣左朝奉郎范漴聞賊且至募鄕豪入保子城城外居民悉委以㗖賊逹縱其徒焚掠獨葺蘇軾白鶴故居奠之而去漴遂盡取賊所殺居民首以效級州人怨之此以洪邁夷堅志及明橐劾范漴章修入但邁以為逹䧟州城與橐所奏不同恐誤蘇軾白鶴故居亦在城外邁不細考耳初偽齊進士薛笻嘗詣金國上書言事金人執之以歸偽齊笻至汴京復以醜言訐豫欲令繫頸以組與大臣同詣闕下臣子之義雖死猶生或得以全其宗族若夫緩一時之誅忘終身之患他日受擒與妻子磔身東市悔無所及豫大怒欲斬之偽齊張孝純救解得免此據偽齊録張孝純上本朝書増入不得其年孝純書在五年之秋而又云召笻至門下者二年故参酌附此年末是嵗宗室賜名命官者十有八人大理寺言斷大辟三百二十四戸部奏兩浙路主戸一百八十萬三千六百二十四口三百三萬四千七百六十九客戸三十一萬八千四百四十八口五十三萬三千六成都府路主戸八十萬八千八百六十一口二百三十四萬七千四百一十七客戸三十二萬一千六百二十八口九十二萬一千六百一十九建炎以來繫年要録巻六十一金人地名考證伊都原書作餘覩誤改見巻一薩里罕原書作撒離喝誤改見巻十一錫庫原書作習古誤改見巻三十五
