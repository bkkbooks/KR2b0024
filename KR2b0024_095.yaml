body:
  text: 建炎以來繫年要録卷九十五宋李心傳撰紹興五年十有一月庚午朔初置節度使已下象牙牌其法自節鉞正任至橫行遙郡第其官資書之于牌御書押字刻金填之仍合用制造一留禁中一降付都督府相臣主其事緩急臨敵果有建立竒勳之人量其功勞先次給賜以為執守自軍興以來皆宣撫使便宜給劄補轉至是都省有此請焉詔諸路州縣出賣户帖令民間自行開具所管地宅田畝間架之數而輸其直仍立式行下時諸路大軍多移屯江北朝廷以調度不繼故有是請焉賣户帖事以日厯考之全不見其始但於本年十二月六日甲辰載立定價錢指揮按十二月二十三日都省劄子有云其十一月一日已降自行開具指揮更不施行則是元旨在此日也以意度之當是都省不許報行故日厯所遂不見事祖耳席益奏狀亦云十一月五日已後指揮共八項並為出賣户帖事今掇取附見本日已而中書言恐騷擾稽緩乃立定價錢應坊郭鄉村出等戶皆三十千鄉村五等坊郭九等户皆一千凡六等惟閩廣下戶則差減焉期一季足計綱赴行在十二月甲辰即旱傷及四分以上權住聼旨十二月甲辰此項日厯不載以四川制置司申眀狀修入其錢令都督府樁管非被旨毋得擅用十二月癸丑時州縣追呼頗擾乃命通判職官遍詣諸邑當面給付民户十二月壬戍其兩浙下戶展限一年十二月甲子內諸路簿籍不存者許先次送納價錢俟將來造簿畢日給帖焉十二月乙丑指揮餘見六年二月庚子中書門下省奏中書舍人胡寅所言六事一曰清中書之務大略謂宰相大臣陛下之所委任以圖中興之丕烈者也而兼總六曹有司之事受詞訴閲案牘走卒賤吏一有所求皆得自逹窮日之力不得少息皆細故也而政事堂與州縣無以異矣頃者刀筆之吏偷安之人竊據此地勞心畢知於簿書期會之間謂稱職在是無足深怪餘風尚在久弊未革此天下所以疑中興之無效也望陛下詔宰執大臣選補六部長史凡有格法者一切付之使得各舉其職法之所不載者事之所不可行也六部無得為人申請破壞成法如是則大小詳要不相奪倫中書之務清有司之事治文移奏報各從簡省廟堂之上可以志其逺者大者久長之䇿恢復之功庶乎可冀矣二曰議學校之制大略謂自軍興以來布衣韋帶之士失其常産因無常心棄毛錐而説劒上封事而覔官泯泯紛紛儒風掃地謂宜稍增教授員闕慎擇老成名士以充其選仍詔守臣留意學校加以嵗月必有可觀則凡鄉舉遊學之科居處飲食之制生徒多寡之額師儒殿最之法皆在所議如合聖心即乞睿斷詔大臣施行三曰重縣令之任大略謂宜籍中外已為臺省寺監官依倣漢制分宰百里俟有詔績不次升擢則又增重事權優假其禮借以服色厚給餼廩凡軍馬屯駐本縣者許之節制其經由者悉用階級則又據諸路縣分户口賦所入分為三等上等自朝廷除授中等則自吏部注擬下等令帥司監司同共辟奏立為定額不得差互則又用宋元嘉致治之法以六期為斷革去三年成任兩考成資與堂選數易之弊則又立四條為三等縣考課之法曰紏正稅籍曰團結民兵曰勸課農桑曰敦勉孝悌俟及三年考其績效已就緒者就加旌賞未有倫者嚴行程督皆無善狀則黜汰之則又命從臣各舉二人之能任者亦刺舉二人之姦贓者皆籍於中書俟考按功實以次施行如是縣令之選重仁人君子有愛民利物之心者皆舉其職矣四曰京官必厯親民大略謂近來由判司簿尉初改官人及初為京朝官而實不曽厯親民差遣者例皆不肯參部便欲直為通判作威勢黷貨賄為民之害無所不至望詔大臣嚴守格法不輕除授其已除未赴者亦乞别作施行庶幾息僥幸之風勵人材之操五曰監司郡守並以三年為任大略謂近嵗監司郡守更易頻數雖使絶人之才居之號令未及信於民而已報除代矣望眀詔大臣凡前宰執侍從官為州郡未滿三年不許除代其庶官知州及轉運使副判官提點刑獄候到任一年方差替人其餘凡係堂除者除代以兩人而止仍皆以三年為任如此則官有宿業之士功緒可稽士息競奪之風廉恥可立乃中興急務也六曰除監司回避户貫之禁大略謂周制興賢出長入治後漢熹平間朝議以州郡相黨人情比周乃制婚姻之家及兩州人士不能對相監臨近年指揮監司郡守不得除用土人違周公之訓蹈熹平之失出於當時用事大臣私意非良法也夫得賢才使臨本邦知利害尤悉愛百姓尤切不賢不才者雖在他方以非吾土為害滋甚矣不擇人而繆於立法此與三互同為後世笑也望眀詔大臣蠲除近禁盡心選授惟務得人有功則賞有罪則罰詔三省措置立法其在內窠闕并樞密院差除依此後頗有所施行然不盡用也辛未趙鼎奏昨蒙降出李大有上書言及機權事上曰此涉兵機不欲付外看詳昔張齊賢上書獻收河東之策太祖皇帝怒甚至裂其奏擲之於地及左右侍立之臣既退徐收其奏密授太宗曰他日取河東出兵運糧當用齊賢策未幾河東平擢齊賢至宰相沈幾如此當為萬世法按李大有紹興四年九月為檢正官卒于位此又别是一人疑布衣上書當考諸王宫大小學教授劉長源面對論今臺諌官闕而不除者過半乞命兩禁各舉一員籍其名於禁中參考行實有闕即除上曰已令學士舉堪充人矣日厯未見此指揮不知是何月日長源又請擇文臣剛方有守才堪御史者為軍正每軍置一員令専紏諸軍之不法者月申樞密院類聚一季進呈上因舉田穰苴斬莊賈等事長源又言劉豫之害大於金人上曰却退金人則劉豫無援自不足慮矣宗正司上仙源慶系屬籍總要詔丞孫緯進秩一等諸吏賜帛有差壬申右朝奉大夫新提舉荆湖南路常平茶鹽公事王弗提舉都督府糧料院弗初見紹興二年二月癸酉川陕宣撫副使吳玠奏遣其子來奏邊事先一日玠乞俟防秋畢入對詔答不許上諭輔臣曰玠比嘗請入覲今又遣其子來奏事可謂得事君之體玠握兵在外纍年乃能周慎委曲如此良嘉也尚書省言歸朝官選人多注不釐務差遣監司守倅薦舉所不及欲令厯任無過負者三考循一資至承直郎厯五考改宣教郎著為令從之十一年九月十八日衝改詔應守臣守禦臨難不屈死節昭著不以官品髙下並令帥司保奏特與賜諡用中書請也右迪功郎監眀州鶴鳴買納鹽場周孚先賜同進士出身添差臨安府府學教授孚先臨晉人常從程頥學既用積舉得官著作佐郎張九成等言孚先問學淵源操履方正久遊庠序士論推服欲望朝廷處以師儒之職使為後學矜式庶幾盡其所長少補教化故有是命閣門宣贊舍人潘永思兼幹辦御前忠佐軍頭引見司故徽猷閣直學士郭思特賜四官為銀青光祿大夫思己見建炎四年十月以其家有請也此又與今年六月丙寅劉大中建請及勑榜朝堂指揮相妨大中此時為吏部侍郎乃無一言當考甲戍知房州晉隲轉一官再任以中書言騭招軍治城招集餘民至四千餘戶墾田及六分以上理宜褒賞故也左從事郎充西外敦宗院教授毛逢特改左承務郎與淮南沿邉近見闕通判逢初以薦者召赴都堂審察而大臣奏其言邊防利害可採遂以逢通判揚州此又與今月庚午胡寅第四劄子陳請相妨寅為舍人不論列當考乙亥祕書少監潘良貴守起居郎和靖處士尹焞為右宣教郎充崇政殿説書令川陕宣撫司加禮敦遣赴行在所制曰先王之道具存方册非得深純篤厚之士傳其師學敷繹於前則道固隱而不彰矣朕博求碩儒發眀治要聞爾安貧樂道淡然無求執德不回久而益固是用縻以好爵列之經闈勉從弓招副朕虛佇進士顔邵特補右修職郎卓右迪功郎彥輝下州文學初上聞真卿之後有居溫州者命守臣推擇以聞得邵等三人而彥輝則真卿十一世孫也上謂大臣曰人有一死或輕於鴻毛或重於泰山在處死為難耳真卿在唐死節可謂得處矣况今艱難之際欲臣下盡節可量與推恩以為忠義之勸况仁祖時曽命顔似賢以官自有故事既命以官遂命邵卓監潭州南獄廟罷吉州𣙜貨務都茶場會要武經郎閣門宣贊舍人監南劔酒務許約充淮西宣撫司將官用劉光世請也偽齊遣諜者吳順至夀春為府司所獲械送闕丙子詔免罪於臆前大刺吳順發回四字而遣之後有犯者視此丁丑池州州學教授葛騏罷初上召騏入對而殿中侍御史王縉言騏貪贓姦濫之迹不可汙赤墀之地乃并罷之詔興化軍守倅兵官並罷令提刑司治罪先是軍士七人作亂殺人縱火所禁六百餘家兵官懼遁去兩軍校闔營門諭士卒毋得從亂市人執而戮之右諌議大夫趙霈以為言故罷其軍校令憲臣核實申省戊寅降授右承奉郎劉默通判揚州默知天台縣坐發守臣朝公為受賕特旨編管至是言者論默以一縣令為大臣所怒羅織煆錬宜其無力而其坐止緣防秋犒設官吏土豪酒食之費以為入已倍贓紐計才十五千而已以公為之罪觀之默之寃可知詔與改正故有是命默七月丙戌得旨改正今并附此辛巳右朝散大夫新知袁州蔣璨提舉淮南鹽事填創置闕其常平茶事依舊𨽻茶點司以淮南鹽貨倍增故也孫覿撰璨墓志稱知通州就除提舉淮南東西路茶鹽事蓋誤壬午詔川陕宣撫副司邵溥遣參議官一員往諸寨傳宣賜燕自統制官已下至將校並坐使臣軍校皆犒之癸未上謂大臣曰邦計匱乏茍有一毫可以節省亦當行之朕宫人僅給使令然昨日亦搜檢三十人出之趙鼎曰節省之道始於宫庭此陛下盛德也甲申翰林學士兼侍講孫近試吏部尚書兼權翰林學士尚書刑部侍郎兼直學士院胡交修充翰林學士尚書左司員外郎王俁權戶部侍郎右司員外郎張宗元為中書門下省檢正諸房公事起居郎潘良貴兼權中書舍人自渡江宰輔已減俸三之一至是趙鼎等復請於內權減二分從之於是行在官吏俸祿皆權減六年四月復舊乙酉顯謨閣直學士知平江府李光試禮部尚書試尚書工部侍郎都督府參謀軍事折彥質試兵部尚書徽猷閣待制知靜江府李彌大試工部尚書給事中廖剛試刑部侍郎權兵部侍郎吕祉試給事中起居舍人任申先試中書舍人仍兼直史館國朝詞臣進不由科第者林攄顔岐及申先而已祕閣修撰都大提舉成都府熙河蘭廓秦鳯等路茶事兼提舉陕西等路買馬監牧公事専一總領四川財賦趙開為四川都轉運使都大提舉茶馬兼川陕宣撫使司參議開嘗論總領財賦於四路漕計或不相關宜正其名使知有所統屬張浚是之故有是命丙戍詔荆襄川陕見宿大兵措置事宜委任至重雖已除席益制置大使而調發節制𨽻在督府可令張浚往視師仍詔諭諸路議者謂梁洋沃壤數百里環以崇山南控蜀北拒秦東阻金房西拒興鳯可以戰可以守今兩川之民往往逃趨蜀中未敢復業墾闢既少多屯兵則糧不足以贍衆少屯兵則勢不足以抗敵宜以文臣為統帥分宣撫司兵駐焉而以良將統之遇防秋則就食綿閬如此則兵可以備援而民得安業詔宣撫副使邵溥吳玠擇二郡守臣相度初玠苦軍儲不繼於興元洋鳯成岷五郡治官莊屯田又調戍兵治褒城廢堰民知灌溉可恃皆願歸業詔書嘉奬别路漕臣郭大中言於玠曰漢中嵗得營田粟萬斛而民不敢復業若使民日為耕則所得數什倍於此矣玠用其言嵗入果多已而玠復欲陸運召諸路轉運使持户籍至軍中溥曰今春驅梁洋遣民負糧至秦州餓死十八九豈可再也且宣司已取蜀民運腳錢百五十萬其忍復使陸運乎既上疏立以便宜止之卒行水運大中亦白玠曰利路幸小熟請以本司緡錢就糴徐責兩路僦船之直以償玠從之大中又患水運亡失以策誘賈販省費十之五邵溥郭大中事皆不得其日因論者言梁洋事遂牽聯書之吳玠奬諭詔書在十二月丙午是嵗也四川收錢物總三千六十餘萬緡支四千六十餘萬緡以宣撫司趲剩錢補其闕而玠一軍所費為二千三百七十萬緡權尚書户部侍郎張致逺試給事中祕閣修撰劉寧止權户部侍郎致逺在版曹嘗奏疏言比年士大夫專意營私不恤國事幾習為常殊不知國之安危乃一家之興替民之利病乃一家之休戚故寧負詔旨而不負權勢之請託寧緩貢賦而不緩親故之劵給寧闕軍餉而不闕公使之饋遺冗員當省方且創置窠闕以私辟舉攝局當罷方且差出僚屬以徇干求賣官田則巨室租賃而謂不可行撲酒務則以官吏廢併而多為之説姦贓不按發以善應副為有才簿書不鈎考以便移兊為得計脫有急緩上不過告訴朝廷以求支降下不過厚斂百姓以紓己責或謂凋殘之餘末易料理顧在人何如耳夫人各有心陛下縱欲富國強兵大有為於天下臣固知其未可也此固士大夫之過其實亦循沿之失人才不甚相逺九官猶各終一職孔子亦三年有成今既不因任又不持久信之不篤責之不專有功未必賞有罪未必罰或旬日或數月或期嵗輒罷去幸而亡他故僅書二考亦罷去其政事著於時惠實孚於衆者亦罷去若罪未至於害治而功或足以贖過者亦罷去居常岌岌然朝不謀夕則亦茍目前營私橐為去計而已矣伏願陛下亟命大臣採一時公議類前日薦章銓量去留凡有使任各當其才才得試以久待以信責之專力務省節眀禁僣侈自宫禁始自朝廷始員額可減者減之司屬可併者併之毋顧小害毋徇人情毋溺浮議毋玩嵗月爰詔卿士百辟各安職守各體國事各重民力使州縣無妄用歸其餘於監司監司無妄用歸其餘於朝廷朝廷無橫費日積月聚惟軍須是慮內外相視如一家上下相視如一人如此而後境土可復二聖可還中興之業可致也後七日乃命下詔戒諭監司守令餘令三省措置降旨在是月癸巳左朝散郎樓照守尚書右司員外郎照坐秦檜纍久斥至是始用之尚書工部員外郎都督府主管機宜文字楊晨改祠部員外郎晨自川陕使還乃有是命宗正少卿謝祖信罷為直祕閣知吉州戊子中書舍人胡寅充徽猷閣待制知邵州初寅既論不當遣使上賜詔書褒諭而尚書右僕射張浚自江上還奏使事兵家機權不用其説乃遣承節郎都督行府帳前準備差使范寧之與問安使何蘚偕行寅復奏疏言其無益者八有害者二大略謂庚戍而後不遣使金兵亦不來及癸丑而後日遣使則勾引金人入國曽不旋踵前所遣使皆侍從之臣聞其入金境晝夜驅馳略無禮節及見尼瑪哈坐受欺紿匆匆而歸况何蘚一使臣何能任覘國之事萬一金人臨以兵威肆其迫脅必不能唶舌就死則反以我之情告之是自敗也金人之所大欲者誰不知之既有滅宋之心使劉豫眀日就亡今日亦必赴救而况豫賊祈哀乞援秋髙草熟來犯何疑去冬下詔罪狀劉豫眀其為賊今豫豈肯容吾使人之逹於金所謂無益皆此類也獨有一説使陛下難處者以二帝為言耳然自建炎改元以來使命屢遣無一人能知兩宫起居之狀謦咳之音者况今嵗月益久金必重閟惟懼我知之今以金為父兄之讐絶不復通則名正而事順他日或有異聞在我理直易為處置若通使不絶則金握重柄歸曲於我名實俱喪非陛下之利也使或有知二帝所在一見慈顔宣逹陛下孝思之念雖嵗一遣使竭天下之力以將之亦何不可之有其如艱梗悠邈必無可逹之理乎以此揆之則以二帝為言者理無難處也臣聞善為國者必有一定不易之計正其大義不徼幸以為之今日大計只當眀復讐之義用賢才修政事息民訓兵以俟北向更無他策倘或未可惟是堅守若夫二三其德無一定之論必恐不能有為至于何蘚之行非特無效決須取辱臣所見如此豈得以張浚有言而自抑也寅既與浚異論乃以父病不及侍迎乞守湖南小郡故有是命詔荆湖南路提點刑獄公事馬居中衡陽縣令仇頴並勒停知衡州裴廩除名髙州編管初廩用頴策調夫築城凍死者二千餘人而城卒不成上聞之謂大臣曰虐用其民如此宜重置典憲以為妄作之戒有功則賞有罪則罰所以示勸沮也趙鼎曰雖置廩於極典何以酬此二千人無辜性命欲且除名勒停編置嶺外上曰可既而三省勘會諸司元奏乃穎建議而廪贊成其計詔廪免編管頴更降二官後旨在十二月甲寅右迪功郎吳敦禮賫詔賜髙麗還特遷右從事郎登仕郎柴安逸許理選限安逸周世宗族孫用眀堂赦而録之辛邜資政殿大學士提舉萬夀觀兼侍讀張守知平江府守引疾丐奉外祠故有是命祕書省正字石公揆守監察御史壬辰殿中侍御史王縉言竊見去年冬間總理財計之臣以贍養大兵急闕建議預借坊場一界淨利錢朝廷不得已而從之宣州諸邑又催當限錢類皆勾集禁繫豈有既已預借又催當限錢不惟重併苛擾實害坊場之法望令提舉司究實按治從之詔私販川茶至偽界十里內提獲犯人並從軍法透漏州縣當職官吏以下減一等癸巳親從官趙勝歸自金國備言二聖萬福上悲咽不自勝曰勝向在太上皇帝處今其逺歸具言二聖久在漠北苦寒之地居處衣服飲食百種皆闕為人子弟不能拯父兄之難深自悲傷今朕所居宫室及一飲一食之間念及父兄痛入骨髓上嘻噓泣下趙鼎等曰陛下孝友之思如此臣等無以自效死有餘責然金人恃其強悍不久當衰願少寬聖慮強于自治天必悔禍二聖終有還期中書舍人朱震言珍州在涪州之南山路險絶舟車不通居民所輸不過斗粟地利物産悉歸敵人而吏祿軍須州縣之費取足於夔路願詔有司廢罷州額以蘇夔路之民詔川陕宣撫司一面措置後不果罷故右文殿修撰知汾州張克戩定諡忠確克戩耆孫靖康末以死事贈延康殿學士沿海制置使仇悆奏應沿海州縣有舟之家五家為保遞相覺察隱寄盜贓如有違犯並依保伍法如能自陳或徒中反告及他人捕緝並優立告賞從之甲午權中書舍人潘良貴繳方州殺人奏案不當上曰殺人者死此古今不易之法然情有可憫許具奏此祖宗好生之德苐恐州縣之吏受賕出入略加約束可也乙未徽猷閣待制新知邵州胡寅改充集英殿修撰寅上奏辭新命且言自來繇詞掖補外必須在職一年仍非罪譴乃膺次對之選蓋所以昭示恩禮不輕除授祖宗故事不可違也臣頃掌贊書才踰半年不能請止以逭刑誅論臣庇賤則恩禮非所施考臣怨仇則刑誅不可免疏三上乃有是命顯謨閣待制兩浙都轉運使李逮言陛下深眀治體加意所重既遴外臺之選復行銓量之令冝乎綱紀肅然也奈何諸路監司尚有不副委任之意者此無他銓量之令雖行而督責之方未至也夫監司所以振舉綱紀者法令也近年以來循習積弊不守法令者久矣差權官有專法也或違法而徇情求補人吏有定額也或溢額而養浮冗破兵級有著令也或廢令而供私役以至公使錢踰嵗賜之數頭子錢非合支窠名虛費妄用姦蠧百出有不可勝言人皆知法令所不當為也而監司公然為之其循習積弊不守法令如此豈能為陛下振舉綱紀乎昔者薛宣為御史中丞嘗論部刺史不循守條職蓋漢御史府有大夫為其長有中丞為其屬執法殿中外總部刺史臣愚欲望陛下略倣漢制委臺臣分察諸路監司差官補吏占破兵級支用公使頭子錢等事今日以前先令改正今日以後許令紏劾以聞其有違法被黜甚者仍令吏部籍記姓名永不除授監司差遣庶執按察之權者皆務先自治而後治人綱紀無不振舉矣其於治體非小補也詔御史臺常切覺察逮又言祖宗以來宅都大梁嵗漕東南六百餘萬斛而六路之民莫知運動之方且無飛挽之擾蓋所運者舟所役者兵卒故也今者駐蹕浙右大兵乘江諸路漕運地里不若中都之逺而公私苦之何也蓋以所用舟船大半取辦於民間往往鑿船沈江以避其役至於抱認折欠監錮填納為患非一此衆所共知也伏見江浙路如溫眀虔吉州等處凡祖宗以來所置造船場今官吏具在皆坐縻廪祿略不舉職蓋緣逐州近將合支錢物材料工匠等轉易他用欲乞特降處分委逐州守臣措置物料拘收兵匠隨宜打造仍官自裝籠須管依年額數足如錢物闕少許取撥本處轉運司移用錢相兼支用逐旋團結募兵卒主挽使臣管押依自來押綱條例支破請給每綱以十分為率量留力勝二分裝載私物除不得運禁物𣙜貨外免收力勝所謂本綱官物不容少欠如違勒令備償庶幾害不及民可以漸復漕運舊制詔工部措置詔賜故直祕閣楊邦乂家吉州田二頃以其妻曽氏言子孫幼少未有食祿之人乞賜優恤也詔出內帑絹三千六百匹綿萬兩賜親賢宅諸宗室上諭大臣曰時寒如此令戶部支則恐傷經費故苐從內帑趲那給之丙申徽猷閣待制提舉江州太平觀胡安國言臣聞古者不以名為諱堯典稱有鰥在下曰虞舜則堯舜者固二帝之名周公以諡易名於是有諱禮然臨文不諱嫌名不諱二名不偏諱載在禮律其義眀白孔子作春秋凡書周魯事雖婉其文至於名諱並依本字春秋為尊君父而作仲尼豈不恭者書法如此義亦可知自漢以來此義不行臣子習為諂諛而不知恭順之實忌諱既繁名實愈亂本朝沿襲漢唐故事未暇盡革恭惟陛下天縱聰眀既尊春秋之書以新聖德冝用春秋之法以斷政事即有撥亂反正之功臣所纂修繕寫進本援引他經子史之類欲乞應犯聖朝廟諱不可遷避者依太常博士王晳所進春秋解例並依監本空闕點畫於淵聖御名亦不改易本字覆以黃紙庶幾名實不亂上遵春秋之法亦以消臣子諂諛之端向孟軻氏欽王之義眀恭順之實詔如所請仍令疾速投進丁酉詔預借民户和買紬絹二分止令輸見緡毋得抑納金銀除頭子錢外每千收縻費錢毋得過十文用殿中侍御史王縉請也縉又言去冬已預借和買今聞復有二分指揮向來收縻費錢每千有至百錢者今既納見緡自無虧剝不合更收市利從之詔江西帥憲司覺察漕司及州縣毋得重疊催理旱傷民户苗米初朝廷以江西旱傷最甚命四等以下户苗米聼輸其直而户部言下户之內多有豪民隱寄詔漕司分析仍與逐州協心體國拘催本色斛斗殿中侍御史周葵言恐漕司及州縣官規免罪戾一例將人户委係旱傷而未納價錢者催理本色或雖有些小旱傷去處而已納價錢者重疊催理致陛下命令不信於民而百姓重有騷擾為害不細故有是旨荆南府歸峽州荆門軍安撫使王彥言已標撥營田八百五十餘頃自蜀中市牛千七百以授官兵詔彥更切多方措置右朝散大夫謝亮知通州言者奏其罪命遂寢詔罷催稅户長復以村疃三十户為一甲輪差甲頭一名催稅先是長沙丞吕希常建言大保長於一保之內豈能家至户到催促不前則監繫破産詔諸路轉運常平司相度利害至是廣東諸司以為便遂推行之事祖見元年十月江浙荆湖福建廣南路提點坑冶鑄錢趙伯瑜乞減鑄錢每千錢重四斤五兩比舊減半斤許之時坑冶盡廢伯瑜訪得諸監有古渣淪浸入地漸生礦末乃淘掘成銅品合鼓鑄焉右通奉大夫祕閣修撰程唐提舉江州太平觀與理作自陳唐復職年月未見建炎以來繫年要録卷九十五金人地名考證尼瑪哈原書作黏罕誤改見卷一
