body:
  text: 建炎以來繫年要録巻一百十八宋李心傳撰紹興八年嵗次戊午元金熈宗亶天眷年春正月戊子朔上在建康尚書左僕射趙鼎率百官遥拜淵聖皇帝於南宫門外退詣常御殿門進名奉慰以上在諒闇故也賜淮西將士宴于本軍以帥臣劉錡主之庚寅集英殿修撰提舉江州太平觀王俁落職用侍御史石公揆再䟽也辛夘金國宣義郎總管府議事官楊堯弼廸功郎楊憑獻書左副元帥魯王昌右副元帥瀋王宗弼論和議三策上策還宋梓宫歸親族以全宋之地責其歳貢而封之中策守兩河還梓宫下策以議和欵兵重邀歳幣出其不意舉兵攻之僥倖一旦之勝又言今宋使以梓宫為請萬一不許大軍縞素遮道當此之時曲在大金而不在宋昌後頗用其言壬辰詔浙西制置大使吕頥浩暫赴行在奏事時上將還臨安而建康留鑰未有所付趙鼎以頥浩之政長於彈壓故奏用之癸巳言者請今後從官作守不許衝見任人趙鼎曰祖宗以來待從官如此上曰若遇從官無異庶官宰執無異從官則非朝廷之體陳與義曰人臣何有重輕但堂陛之勢不得不存秦檜曰嚴堂陛乃所以尊朝廷也熊克小歴稱壬辰宰執奏事云云盖差一日是日起居舍人勾龍如淵直前奏事先是奉使王倫之還言金人廢劉豫之謀自已使人發之如淵言倫迎梓宫問諱日使指也梓宫未還諱日猶秘而一言之合遂使廢豫此其可信哉上曰不然倫奉使時朕嘗以此意諭之渠果能游説亦未可知如淵皇恐謝甲午秘閣修撰兩浙轉運使向子諲陞徽猷閣待制充都轉運使丙申給事中充史館修撰傅崧卿充徽猷閣待制提舉江州太平觀以御史中丞常同論其隂險也同又言自姦臣用事以來沮抑言路喜怒好惡一出私意䑓諫章䟽多不報行朝廷命令既無所因而言事之官亦被緘黙之謗陛下既以更正其非而近者言章所論尚循前例請之再三然後報出或加節貼文理不通殆非所以明是非公賞罰肅紀綱廣言路也道揆法守不冝分彼此之嫌進賢黜姦當共守至公之道言章若實使天下知朝廷議罪之當若其不實亦使被罪者異時得以自明欲望特降處分隨事劄下報行以稱陛下無偏無黨之意從之右中奉大夫陳古知興元府古後不赴改用田晟戊戌詔復幸浙西以二月七日起發上因諭趙鼎曰建康諸官司及百官𪠘舍皆令照管他時復來幸免更營造以傷民力鼎等奏已令建康府拘收且言若金人遂以大河之南歸我當且駐蹕建康以俟經營上曰羣臣上殿多論建都事蒲贄謂當擇險要之地勾龍如淵謂在脩徳而不在險以二人之論校之如淵為勝矣左中大夫參知政事張守充資政殿大學士特遷左通議大夫知婺州仍加恩從優禮也初上將還臨安而守謂建康自六朝為帝王都江流險闊氣象雄偉且據要㑹以經理中原依險阻以捍禦強敵可為别都以圖恢復毎對必為上言之及將下詔東歸守與趙鼎議于都省不合又謀諸朝上顧守曰何如守曰昨日都省已與趙鼎言之矣陛下至建康席未及煖今又廵幸百司六軍有勤動之苦民力邦用有煩費之憂願少安於此以繫中原民心鼎持不可守引疾求去故有是命詔席益起復資政殿大學士四川制置大使遣内侍往宣押之任益固辭不起己亥詔右朝請郎廣南東路轉運判官林師説職事脩舉令再任辛丑左宣教郎張絢復為殿中侍御史監察御史李公懋求去除荆湖北路提㸃刑獄公事偽齊武顯大夫知壽州宋超率軍民来歸閤門宣賛舍人知壽春府孫暉以聞上曰此事於朝廷無毫髮之益但如人子來歸為父者豈可却而不受然已遣使人與金議事可下沿淮不得擅遣人過淮招納引惹事端乃命淮西帥臣劉錡入朝處超等竢畢復還合淝趙鼎事實曰金既廢豫鼎宻遣諜者散之沿淮一帶誘其守將由是壽亳陳蔡諸郡率其部曲來歸者相繼不絶兩月間得精兵萬餘西馬數千朝士相謂曰前日大作措置未進一歩潰亡者五六萬衆今不動聲色自致士馬如許之盛可謂過人矣熊克小歴繫此事於去年十二月末徐夢莘北盟㑹編亦於去年十一月書劉錡来朝恐誤是日偽知蔡州劉永壽殺烏嚕貝勒率城中遺民來降永壽為淮西安撫使烏嚕副之永壽以小隙劾其罪金人移烏嚕同知徳州未幾忽報烏嚕以女真兵三千來蔡者提轄白安時請永壽南歸永壽不從曰朝廷若賜我死當死之安時恐其謀泄即拘永壽勒兵以待之烏嚕引衆入城不為備安時乗勢盡殺之遂驅城中軍民來歸湖北京西宣撫使岳飛遣統制官張憲等徃接納之城中人往往有還北者此據徐夢莘所編夢莘又云安時授武功大夫髙州刺史日歴未見且闕之今年八月戊辰張節夫以招誘永壽之故改京官壬寅考功員外郎方庭實為禮部員外郎左承事郎陳橐守司勲員外郎右武郎同知閤門事潘永思為右武大夫潘同字永思尋卒癸夘徽猷閣待制致仕蒋瑎卒瑎之竒子中進士第事徽宗為大司樂卒年七十六手書遺奏使其子上之書無一字欹傾亦無一語及私者乙巳趙鼎言士大夫多謂中原有可復之勢冝便進兵恐他時不免議論謂朝廷失此機㑹乞召諸大將問計上曰不須恤此今日梓宫太后淵聖皇帝皆未還不和則無可還之理參知政事陳與義曰用兵須殺人若因和議得遂我所欲豈不賢於用兵萬一和議無可成之望則用兵所不免上以為然丙午寶文閣待制知鎮江府曾開試尚書禮部侍郎觀文殿學士知婺州孟庾提舉臨安府洞霄宫御史中丞常同言庾少號博徒奴事王黼昨為行宫留守士卒怨憤幾致生變今守婺州郡政不理乃詔庾奉祠而同章不下同又上兩䟽卒行之龍圖閣直學士提舉江州太平觀范冲知婺州冲力辭不赴左正言辛次膺直秘閣提㸃荆湖南路刑獄公事次膺論左中大夫王仲嶷與直秘閣王㬇之父在建炎中皆嘗投拜㬇不當與郡仲嶷不當復官二人樞宻使秦檜妻黨也檜力營救次膺乃併劾之曰是將有蔽朝之漸時檜議復遣王倫使北請和次膺力言國耻未雪義難請好面陳及上䟽者六七不從乃以母疾求去故有是命宗正少卿馮檝直秘閣知劔州以御史中丞常同論檝諂事張浚有同僕𨽻浚罷宣撫還朝檝乃作䟽頭抄斂属官監司郡守錢物以獻於浚故出之丁未召徽猷閣待制新知眉州邵溥赴行在上謂趙鼎曰朕於知名士大夫皆欲識之獨未識溥故召既而溥以疾不至乃除提舉江州太平觀居犍為右朝請郎髙公繪辭奉使所遷官改除直秘閣是日宰執大閱張俊軍馬于城西翌日趙鼎奏噐甲精明照耀廣川軍馬之盛至於如此皆陛下留意所致上曰前日俊來奏事具言近來軍中製造兵噐已無遺功朕因諭之國家之力亦盡於此矣但欠一事爾俊曰不知欠何事朕曰所欠力戰而已俊悚息對曰他日若遇敵臣當盡死以報國家戊申尚書兵部侍郎兼直學士院兼侍講胡世將為樞宻直學士四川安撫制置使兼知成都府上聞席益已去因問刑部尚書胡交脩孰可守蜀者交脩曰臣從子世將可用遂有是除時趙鼎亦不欲世將居中故也自重兵聚關外以守蜀而餉道險阻漕舟出嘉陵江春夏漲而多覆秋冬涸而多膠紹興初剏行陸運調成都潼川利州三路夫十萬縣官部送激賞争先倍道而馳晝夜不息十斃三四至是交脩言養兵所以保蜀也民不堪命則腹心先潰尚何保蜀之云臣愚欲三月已後九月已前苐存守關正兵餘悉就糧他州如此則給守關者水運有餘分戍者陸運可免上乃命學士院述交脩意詔宣撫副使呉玠行之己酉故承議郎李新特贈朝奉郎新已見建炎三年七月新元符末為南鄭丞上書論方今之弊權綱不在人主責任不及宰相朋黨之風熾䑓諫之職輕士不素慮而出土木之役興財利之臣進西南亡備以虞倉卒之變内外相䝉而有衰㣲之漸坐是入邪上尤甚籍停官覊管至是始録之壬子徽宗皇帝小祥不視朝癸丑侍御史石公揆直龍圖閣知撫州以病自請也甲寅集英殿修撰提舉江州太平觀任申先為徽猷閣待制致仕申先居秀州以疾亟告老趙鼎引故事以次對處之殿中侍御史金安節言申先險惡之性根著于心而狠戾之色見于面目考其自服韋布以至齒縉紳居州里以及在朝廷無一善可稱而驩兠共鯀之惡則兼而有之望賜追奪以為兇人之戒不報而申先已卒矣日歴正月甲寅秀州奏集英殿修撰任申先風疾發動乞守本官致仕有㫖任申先已除徽猷閣待制特轉一官致仕而不見除待制之日秀州去建康不逺今申先止繫修撰銜則其除命只在此𢾗日間也安節劾䟽亦不見其本日䟽中有云豈冝通計年勞復以峻職畀之當是朝廷引此故事降㫖今掇取附見更湏求他書參考増入乙夘詔拱衛大夫忠州團練使新江南西路兵馬鈐轄馬欽令疾速之任欽本𨽻淮西軍欽初見建炎四年五月戊申劉光世為宣撫使以欽為親兵副統制及張俊代為宣撫使欽與俊有隙上聞之御筆有此授俊堅欲留之上諭俊曰卿必欲留無害萬一欽病死人必謂卿殺之於卿便乎俊悚然謝曰臣慮不及此新除四川制置使胡世將乞四路漕司差注不當從吏部下本司依法究治仍許士人赴本司陳訴從之金主亶既免䘮改元天眷楊氏編年紹興七年金主烏竒邁死二太子之子亶襲位改元天眷誤也今不取乃立費摩氏為皇后夏國主乾順遣武功郎穆齊好德髙麗國王楷遣衛尉少卿李仲衍奉表賀正金主改燕京樞宻院為行臺尚書省以三司使杜充簽書樞宻院事劉筈並簽書省事時左副元帥魯國王昌右副元帥瀋王宗弼皆在監軍薩里罕屯長安右都監布爾噶蘇屯鳯翔以新取河南陕西故也以兩國編年松漢記聞㕘修二國賀表記聞不書其年然俱附于費摩氏謝表之後而夏國表中有更新謹始之語則必改元之年故附著諸此二月丁巳朔尚書兵部侍郎王庶試兵部尚書庶自京南入對奏曰今十年而恢復之功未立臣請言其失盖在偏聼在欲速在輕爵賞是非邪正混淆誠能有功則賞有罪則罰其誰不服茍委其權於大臣而非其人則身受其欺而國罹其禍昔漢光武以兵取天下不以不急奪其費不知兵者不可使輕言兵他日又見口陳手畫秦蜀利害上大喜之即日遷尚書武顯大夫宋超為淮南西路兵馬都監戊午右武大夫開州團練使知廬州主管淮西安撫司公事劉錡對于内殿錡言淮北兵歸正者不絶今歳合肥度可得四五萬衆翌日上謂趙鼎等曰朕每慮江上諸將控扼之勢未備若上流有警岳飛不可下則江池數百里邊面空虛得錡一軍遂可補此闕矣鼎曰更湏措置荆南事若就緒則沿流上下形勢相接不同前日矣上曰如此經營人事既盡若功有不成則天也左廸功郎䕫州州學教授李昌言應詔撰成中興要覽十篇自始至終行之將永享治安措斯民於仁壽之域不止恢復疆土而已詔本州取索實封投進詔四川制置司属官右修職郎韓詔右廸功郎閻夏並先次轉一官仍與支賜以道里遥逺故也日歴無此今以紹興十一年六月一日吏部状修入自後都漕司及成都帥司属官亦用此例李迨張燾庚申少保鎮南軍節度使判臨安府兼行宫留守吕順浩為少傅鎮南定江軍節度使充江南東路安撫制置大使判建康府兼行宫留守仍命中使符輔之宣押之鎮頥浩之除日歴不載但於初七日書勘㑹建康府已除行宫留守今以㑹要修入刑部尚書胡交修權臨安府行宫留守此除日歴亦不載入直龍圖閣知建康府張澄為集英殿修撰知臨安府先往措置澄受命星馳而至不數日前所闕者率皆辦焉戸部尚書章誼權知建康府誼除日歴不載但於是月己卯正除始書之建康知府題名章誼二月四日到任即此日也時吕頥浩以疾辭召故趙鼎奏用之秀水閑居録稱趙鼎以一執政死二從臣事見六月丁丑并注太常少卿吕本中試中書舍人資正殿學士冨直柔知衢州壬戌湖北京西宣撫使岳飛乞増兵上曰上流地分誠闊逺寧與减地分不可添兵今日諸將之兵已患難於分合末大必折尾大不掉古人所戒今之事勢雖未至此然與其添與大將不若别置數項軍馬庶幾緩急之際易為分合也飛又奏為荆湖北路轉運判官夏珙陞職鄂州守臣趙士瑗鄧州守將韓適均州守將格禧進官上曰可作直㫖行下監司守臣朝廷所用不當令盡歸大將乃詔珙士瑗職事修舉珙陞副使再任士瑗直秘閣適禧措置宣力皆進一官徐夢莘北盟㑹編八年三月韓世忠岳飛来朝日歴全不見恐此即飛來朝所請當求他書參考詔建康府曽得觧舉人並與免文解一次是日六宫先發上召淮西宣撫使張俊至宫中從容與論邉事俊曰臣當與岳飛楊沂中大合軍勢期於破敵以報國家上諭之曰卿能如此甚副朕意然此乃卿之所職朕更有一二事戒卿朕來日東去卿在此無與民争利勿興土木之功俊悚息承命俊見地無磚面再三歎息上曰此事非難但艱難之際一切從儉庶幾少紓民力朕為人主雖以金玉為飾亦無不可若如此非特一時士大夫之論不以為然後世以朕為何如人主也癸亥上發建康府殿前都虞候楊沂中主管侍衛歩軍兼權馬軍司公事解潜以其軍從是日次東陽鎮詔行宫留守司合行事並依西京體例自孟庾秦檜兩為留守皆得行尚書省常程事故申明焉甲子上次下蜀鎮殿中侍御史張絢乞車駕所過州縣量免租稅上曰自古人主所過皆有蠲復當議使實惠及之又絢乞疏决上曰此事則不湏父老望幸之意不可不有以慰之若罪人有罪無可恤也乙丑上次鎮江府丙寅徽猷閣待制提舉江州太平觀胡安國充寶文閣直學士賜銀帛三百匹兩安國以衰疾乞致仕上將許之乃詔以安國解釋春秋成書進職加賜翌日詔安國進一官致仕命未下而安國卒矣安國風度凝逺言必有教動必有法燕居獨處未嘗有怠慢而與人談論氣恬詞簡若中無所有性本剛急晩更冲澹年寖髙加以疾病而謹禮無異乎平時家居食不過兼味病中值歳大旱所居岑寂膳羞不可致子弟或請稍近城郭便藥餌安國曰死生有命豈以口體移不貲之軀哉雖轉徙屢空取舍一介必度於義少從游酢謝良佐鄒浩游與向子韶曾開唐恕朱震情義最篤又嘗曰四海神交惟君曼一人君曼者清河劉奕也震被命召問出處之宜安國曰世間惟講學論政則當切切詢究若夫行已大致去就語黙之機如人飲食其飢渇寒温必自斟酌不可决諸人亦非人所能决也故其出處自崇寧以來皆内斷於心自登第逮休致凡四十年在官實歴不登六載雖數以罪去其愛君之心逺而逾篤由中興以來諸儒之進退最合於義者安國與尹焞而已戊辰上次吕城鎮己巳上次常州庚午上次無錫縣辛未上次平江府右正言李誼論非次闕不當改為集注上曰士大夫覊旅之中必使待集注僉以為不便又聞受闕者所費極多何以責其清亷先是御史中丞常同以為言故上有此論趙鼎曰比聞一縣令居官無過將代去乃集諸吏以情告之曰我在此無俸餘今當赴調而無以為資吏裒三百緡賂之上曰祖宗時贓吏多棄市朕欲法之以禁姦贓若情理如此則又可憐也鼎曰竢至臨安議定取㫖其後令都省榜部門約束而已常同奏䟽及榜部門並在三月甲辰行下甲戌上次呉江縣乙亥龍圖閣直學士四川都轉運使李迨罷用川陕宣撫副使呉玠奏也迨與玠以職事間積不相能㑹給軍踰期利州營婦遮其馬首悖詈迨不自安乃求去及是玠章亦聞趙鼎奏曰二人不咸如此萬一呉玠更失體則朝廷難處迨累奏乞祠且從之上曰迨在帥府朕熟知其為人性實不通然能任怨乃奉公吏也可且與宫祠時議應副玠軍須或言冝付之四路漕臣或言冝總之制帥右正言李誼言蜀都五十四郡歳贍玠軍近四千萬緡四路漕臣各自為家豈能通其有無况又權輕安能與之抗衡而抑其冗濫帥臣雖重而體貎不可削乃令兼領錢榖則必坐受覊縶彼方且約其期㑹斥其逋欠帥臣之威亦少損矣又帥臣與主兵之官尤不可不和兩者皆非所責則都漕之職豈可闕乎李迨雖究心所職不避仇敵然其人少恩喜與物忤今必得忠智之士知開闔之權識取予之方然後為得望早求其人而用之無可疑者時宣撫司參議官右文殿修撰陳逺猷已兼四川轉運副使乃命直秘閣主管四川茶馬張深兼權副使與逺猷共事秘書省正字兼權左司郎官孫道夫嘗言四川自來元無都漕自宣司以隨軍漕兼總領財賦俾措置茶鹽酒息通融贍軍今都漕司但四分歳數以付西路而已非有所措置願罷之以寛民力不從張深攝大漕日歴不書四川都運司題名李迨以今年三月十八日替張深以今年三月十八日到必同日降㫖也李誼孫道夫所言未見本日權附此俟考丙子上次崇徳縣丁丑上次臨平鎮戊寅上次臨安府留守刑部尚書胡交修升幄奏事畢上還宫己夘百官純吉服用太常議也上服淡黄袍如故戸部尚書權知建康府章誼充端明殿學士江南東路安撫大使兼知建康府兼行宫留守司公事朱勝非秀水閑居録曰先是戸部尚書章誼禮部尚書劉大中翰林學士朱震皆可遷執政趙鼎知吕頥浩必不赴乃請以誼權守建康洎頥浩改命誼遂即真悒悒得疾兩月卒庚辰少傅鎮南定江軍節度使充江南東路安撫制置大使兼知建康府兼行宫留守成國公吕頥浩充醴泉觀使免奉朝請頥浩見上于平江力引疾求去故有是命壬午尚書工部侍郎兼侍講趙霈充徽猷閣直學士知袁州以御史中丞常同論霈頃任遺補遂長諫垣汲引羣邪中傷善類故也先是徽宗几筵還行在而霈迎拜不及自劾待罪上欲黜之趙鼎救而止後二日同即䟽其罪霈乞奉祠詔如其請同又論頃年田如鼇上書力排善類乃霈隂與之謀使其自請而去不知何以待之霈聞復辭職名乃除顯謨閣待制霈改待制在是月辛夘秘書少監蘇符試太常少卿仍兼資善堂賛讀秘書郎尹焞試秘書少監仍兼崇政殿說書秘書省校書郎李良臣為工部員外郎甲申中書舍人李彌遜試尚書戸部侍郎是月殿中侍御史金安節以家艱免三月按是月丙戌朔丁亥廣西經略司奏得安南都䕶府牒當道郡王薨謝今有遺進表章及綱運詔使人免到闕就命直龍圖閣本路轉運副使朱芾充弔祭使賜絹布各五百匹羊五十口麵五十石酒五十瓶仍以勅書諭其嗣子天祚安南與廣西諸司通問訊其王不列銜而列其將佐數人有稱中書侍郎同判都䕶府者印文曰南越國印安南行移體式以范成大桂海虞衡志増入他書未嘗見也己丑皇叔祖濟州防禦使知南外宗正事仲儡為檢校少保嚮徳軍節度使封嗣濮王仲儡景王宗漢子生長富貴而性不慧既封入見至榻前則慟哭上驚問故曰見十五哥言我王似上皇上問為誰曰姓馮上曰馮益邪仲儡曰是也上由是不樂顯謨閣待制知福州張致逺試給事中中書門下省檢正諸房公事林季仲直龍圖閣主管洪州玉隆觀以御史中丞常同言其貪惏邪佞也季仲嘗因對上奏曰臣聞古語有曰乳彘搏虎伏雞搏狸夫彘非虎之敵雞非狸之敵其能搏之者發於感憤之誠也金人肆為貪虐以吞噬中夏自今觀之誠強矣然中原之地尚數千里帶甲之士無慮百萬亦何至如是之弱哉嘗試號於衆曰金人殺而父兄係而妻子燔而廬舍奪而財寶是為不共戴天之讎必思有以報之則俯仰之間氣必百倍以此衆戰誰能禦之今世之説者不然曰天命如此其如彼何而釋老報應之説又從而蠱之縉紳士大夫率以為然往往束手受囚引頸待刃為之甘心焉嗚呼能洗是耻猶有餘耻能雪是寃猶有餘寃若歸之命而聼其自然可謂善自寛矣且人事盡而後可以言命四裔交侵必因小雅之廢小雅之廢命耶人耶外攘彊敵必由政事之修政事之修命耶人耶如以命而已矣則賢才不必求政刑不必用將帥士卒不必選練車馬器械不必修備以待命之將興斯可也故李泌以謂君相不可言命惟當修人事而已矣呉王闔廬之敗也謂其子曰夫差而忘越王之傷而父乎卒能破越於夫椒越王勾踐之敗也喟然嘆曰吾終此乎卒能滅呉於姑蘇區區呉越激於感憤猶能以危為安以亡為存况以天下之大億兆之衆乗其怒心而為之何遽不為福乎建炎二年冬䝉恩召赴揚州聞諸道路未知信否且云陛下中秋對月酒初行愴然泣下乃命徹酒臣以是知陛下之心無一日不在北也舉斯心以感衆人之心赫斯怒以激衆人之怒養以沉潜待時而動則克復宗社取舊物以還中原夫亦何難之有臣未填溝壑庶幾或見之季仲此䟽不得其日因罷去附見既而同又請黜季仲職名以戒作偽之士季仲坐奪職季仲奪職在是月丁酉庚寅禮部尚書劉大中參知政事兵部尚書王庶充樞宻副使庶為尚書時嘗論制外國之道在於愛民周文王問太公以為國太公曰愛民而已兵書無不本諸愛民者今縉紳無一言及民者何也敵之强弱吾無與也顧在我者何如耳古之已衰而興者未有不由於威令行紀綱立既盛而衰者未有不由於威令不行紀綱不立求古之言不若論今之事羣臣有言慮合聖心者願畧煩文為簡易與之反覆圖成敗上嘆曰大臣之才也遂拜樞宻副使庶私念軍不可専専則難制兵不可驕驕則不用命賞罰不可不公不公則人不服今此可為乎我於爵賞不濫人多以我為吝於罪無所貸人多以我為刻今此可行乎辭其位者三不聼遂論江西淮南廣東盗發四十餘軰出於凍飢冝蠲平賦役治部使者守令貪虐以慰安其心且曰負陛下恩徳壞陛下天下者彼則去矣陛下為宗廟社稷主何所之乎其言激切類此辛夘詔刑部増郎官一員大理寺増丞二員直秘閣新知劔州馮檝落職御史中丞常同再論檝以為四川自靖康以來七年上供皆為軍興諸處截用檝獻䇿張浚再行科歛㑹朝廷訪聞降㫖而罷蜀人恨之切骨故黜之故静海軍節度使特進檢校太尉兼御史大夫安南都䕶上柱國交趾郡王李陽煥贈開府儀同三司追封南平王壬辰樞宻使秦檜守尚書右僕射同中書門下平章事兼樞宻使前一日趙鼎留身奏事上曰堂中必無異議者又曰秦檜乆在樞府得無怨望否鼎曰檜大臣必不爾然用之在陛下爾况自有闕是夕鎖院制下朝士皆相賀惟吏部侍郎晏敦復退而有憂色曰姦人相矣給事中張致逺秘閣修撰魏矼聞之皆以敦復言為過其後乃服三省奏台州有匿名書稱常平官李椿年刻薄等事欲率衆作過言頗不遜上曰兵火以來官物多失陷懼官檢察若稍留心便生誣毁此必州縣吏所為萬一作過當遣兵勦殺後卒無事左宣敎郎監西京中嶽廟李寀守監察御史寀自祠官召對上䟽言營田之法可謂備善然奉行峻速或抑配豪戸或驅迫平民或强科保正或誘奪佃客給以牛者未必可用付以田者或瘠鹵難耕由官府有追呼之勞監荘有侵漁之擾鬻已牛而養官牛耕已田而償官租種種違戾不可槩舉其間號為奉法不擾者不過三數縣而已盡江淮西路以紹興六年秋收計之雜色稻子共三十一萬餘石公家所得纔十一萬餘石使皆正出田畆亦少資助軍食奈何皆奪民之力哉盖營田上䇿冝行軍中乃古人已試之效今以閑田付之有常賦之民官吏希賞畏罰其患彌甚欲望申飭有司無閑民則闕而不置使江淮之民安土樂業均被實惠詔領營田監司約束左宣義郎知常州無錫縣許忻為秘書省校書郎忻以再召對故有是命甲午左中大夫參知政事陳與義罷為資政殿學士特遷左太中大夫知湖州仍加恩與義本張浚所引故稱疾而有是命與義在政府未滿歳也詔建國公聼讀尚書終篇本閣及資善堂官吏以下並减二年磨勘先是翊善翰林學士左朝奉大夫朱震賛讀左奉議郎太常少卿蘇符皆用例進秩已賜告復改命之自是恩始殺矣日歴書此事殊無首尾按震去年十一月戊辰轉左朝散大夫符轉左承議郎已有告詞㑹要贈官門紹興八年六月翰林學士左朝奉大夫朱震贈四官日歴八年十一月甲辰左奉議郎試起居郎蘇符乞免充國信計議副使以此知二人嘗改命也方疇稽山録所稱趙鼎罷相後論鼎者専以資善堂藉口及林泉野記所云秦檜不欲宗强等事恐可移附此叚中書舍人吕本中兼侍講直寶文閣知湖州宇文時中移知遂寧府從所請也起居舍人勾龍如淵言戸部非擘畫財賦之地冝置一使以總諸路蓋諸路漕臣權勢分但覺一路利害若一使總之則能通有無審虛實為朝廷乆長之計又言此事當以戸部長貳判諸道水陸度支轉運等使為名如蘇如洪可以置司若以外官為之則事必掣肘不能乆矣上然之詔平江府曽得解舉人依臨安建康府例免文解一次以鄉貢進士陳長方等言自建炎以來四經廵幸故也丁酉中書舍人勾濤兼史館修撰尚書左司員外郎范直方進秩二等以直方自川陜撫諭還故也先是潼川兩路歳輸糴本水脚錢一百八十三萬餘緡直方與大使司共議减三分之一又奏州縣官治状以右朝奉大夫知榮州史煒為首㑹煒又為近臣所薦上命召之二事日歴皆不見减水脚事以紹興十年井度申宣司状修入史煒事以邵溥所撰煒墓誌修入煒明年十月癸酉差知全州既而殿中侍御史張絢劾直方自為宰属私有附麗間諜廟堂乃復以直方直秘閣主管洪州玉隆觀己亥制授故南平王李陽煥嗣子天祚静海軍節度使安南都䕶封交阯郡王其階勲及檢校官憲銜食邑功號皆如陽煥初封故事日歴無此今以㑹要修入辛丑太常少卿蘇符言景靈宫神御見在温州將來四孟朝獻乞此附國朝諒隂故事行在設位分命大臣行禮從之尚書吏部員外郎蒲贄知簡州比部員外郎鄒柄知台州以御史劾柄貪饕而贄諂事張浚也柄尋卒趙鼎奏柄貧甚無以歸𦵏忠賢之裔理冝優恤乃賜其家百縑賜帛在五月戊申不知柄以何日卒也秘書省著作佐郎髙閌為尚書祠部員外郎李彌正為都官員外郎仍並兼史館校勘校書郎胡珵朱松並為著作佐郎秘書省正字徐度為校書郎左承事郎汪應辰為秘書省正字詔龍圖閣直學士提舉江州太平觀汪藻賜飡錢如史館修撰右從政郎李景山特改右宣義郎景山濟州人為江州司理參軍先是黄州獲漁人二十餘人以為强盜其後誣服者十三人斬二人首餘悉流之逺郡朝廷聞其枉命景山劾之皆平人也上命江東提㸃刑獄公事韓膺胄覆實與景山同故有是命此據㑹要壬寅詔故相韓忠彦配饗徽宗皇帝廟廷用從官議也張浚之未去也請命從官詳議至是卒行之事祖在七年九月己未左朝奉郎潘良貴試中書舍人良貴初免䘮故申前命甲辰徽猷閣待制兩浙都轉運使向子諲試尚書戸部侍郎用御史中丞常同薦也子諲言安民固圉必資儲蓄江西冝於洪州置糴於江州置轉般倉以給淮西湖南於潭州置糴於鄂州置轉般倉以給襄漢湖北於鼎州淮東於真州仍多造船則遣戍出兵無往不利又言今天下急務在考兵籍究戸版故汰老弱升勇健創簿正名使諸軍上帳於兵部諸將上帳於樞府著鄉貫書事藝季申嵗考所以除詐冐也凡詭名挾戸典買推招進丁退老分烟析生田畆升降貨殖盈虛必以時覆實所以革欺弊也此其大略爾推而行之則在乎人焉監察御史閭邱昕守尚書右司員外郎先是詔用右司員外郎馮康國為直顯謨閣知䕫州因命康國往呉玠軍前計事故以昕代之康國之補日歴不載都司題名亦闕之日歴此月十三日戊戌新知䕫州馮康國申乞添差路分都監一員則康國之除必在此前矣今因事附書之俟考尚書兵部員外郎張戒守監察御史用中丞常同薦也戒之除日歴亦闕兵部及御史䑓題名並在此月今因閭邱昕改除附書之當求它書考其本日戒之待次嚴陵也同與戒遇問之曰諸將權太重張丞相既失今當何以處之戒曰兹甚不難但當擢偏禆耳呉玠既失而曲端受死楊沂中建節而張俊勢分自然之理也同大喜曰此論可行既而同被召首薦戒焉御史中丞常同言蜀漢之師艱於運糧從古已然今呉玠屯師興利而乃取糧西川水陸漕運是民力未有息肩之期也玠頃年講營田于漢中亦諸葛亮分兵屯田之意朝廷嘗降詔奨諭之矣願陛下再以璽書存問大意謂兵不可不養糧不可不足而財匱民困亦不可不䘏今日蜀中糧運在趙開為都漕時其數幾何在李迨為都漕時其數幾何自講營田以来積榖幾何减損餽運之數復幾何俾制司都轉運司同宣撫司條具以聞庶幾逺方軍實朝廷得以盡知然後寛民之道可得而議詔呉玠馮康國同共條畫聞奏丙午趙鼎奏近積雨恐傷蠶麥欲詣天竺寺祈晴上曰朕於宫中亦養蠶一箔要知農桑之候乆雨葉濕豈不有損也丁未詔江浙州縣回蹕所嘗過者民間欠紹興六年歳終税賦皆除之詔小使臣因泛濫及應奉祇應有勞等補授名目之人雖已經關陞不許注授親民等官靖康元年十一月九日指揮泛濫補官若自来祗應應奉有勞之人並在武舉等人名次之下不得通比分數仍先注逺地差遣若用諸般恩數亦不許入近地差使至是又有此命其指揮日歴不載今以紹興十年九月二十一日臣僚剳子修入戊申右正言李誼言金人入居汴都西北之民感恩戴舊襁負而歸相屬於路此殆天所以興吾宋臣願於淮南荆襄僑建西北州郡分處歸正之民給以閑田貸以牛具使各遂其耕種之業而又親戚故舊同為一所相愛相恤不異於閭里將見中原之人同心效順敵人之謀當不攻而自屈矣詔諸路宣撫司依累得㫖措置尚書右司員外郎薛徽言試左司員外郎降授左朝散郎主管台州崇道觀王次翁為兵部員外郎次翁秦檜所引也己酉右正言李誼言川陜换給付身自紹興三年至今凡二千三百七十八員所轉官資共計一萬六千三百一十四資有自選人而為員郎者有自借官而為遥刺者有自副甲頭而至於横行者有自白身而至於大使臣者夫張浚得専黜陟僅踰三年而遷補如是其衆議者以為是非紛揉虛實混并不可不審也望自今後换給真本除軍士外其餘文武官員並令吏部長貳郎官更加考覈如是冐濫尤甚即乞重與折减詔吏部措置熊克小歴載此事於去年九月壬申盖不詳考也庚戌尚書戸部員外郎薛弼直龍圖閣知荆南府尚書兵部員外郎程克俊守右司員外郎福建路轉運判官范同為吏部員外郎辛亥端明殿學士知福州折彦質奏諸州起發禁軍弓弩手乞發回趙鼎曰昨得㫖呼楊沂中到堂商量欲朝廷應副錢物招收填闕可以乆長使用諸州弓弩手欲節次遣還上曰甚善鼎曰此亦是感召和氣之一端上曰然觀文殿大學士知宣州朱勝非提舉臨安府洞霄宫從所請也壬子故朝散大夫滕康劉珏並追復龍圖閣學士癸丑殿中侍御史張絢稱病乞閑慢差遣上不許劉大中曰絢實病陛下當從所請况絢臣所薦今在言路臣備執政不無妨嫌上曰絢佳士必不附麗可降㫖不允直祕閣主管江州太平觀張九成試宗正少卿制曰朕於敦厚亷退之士知之惟恐不盡用之惟恐不至庶幾丕變貪儒之俗而一洗澆薄之風向之論者曾不恤此顛倒白黒務逞其私以迎合一時之好惡朕既堲讒説而逺壬人則名節之士冝其復用矣爾以深厚之詞蚤魁多士止足之操嘗致為臣風節凛然士林推重宗卿之貳其選甚髙庶使天下之士靡然向風以自振㧞於茍賤不亷之地豈無助歟録故天章閣侍講胡瑗之孫滌為下州文學用湖州諸生請也是月宣州觀察使淮南東路馬歩軍副都總管董􅌈卒建炎以來繫年要録巻一百十八建炎以來繫年要録巻一百十八金人地名考證烏嚕貝勒原書作兀魯孛堇誤今改正烏竒邁原書作吳乞買誤改見巻一費摩原書作裴磨即金史之裴滿並誤今改正薩里罕原書作撒離喝誤改見巻十一布爾噶蘇原書作㧞束誤改見巻二十八
