body:
  text: 建炎以來繫年要録卷九十九宋李心傳撰紹興六年三月戊辰朔初收官告綾紙錢以尚書省言新法綾係専一織造費用倍多故也禮部尚書李光兼權刑部尚書時臨安府多火災或頃刻爇千百家右諫議大夫趙霈建言請峻其刑名庶火初作衆亟撲滅事下刑部立法光不奉詔乃抗論天災譴告人君宜修德以厭之不當濫及無知之民朝廷謂刑部有司也抗疏為非而諫官之論當略為施行起居舍人兼權中書舍人董弅白執政曰二者之論俱不過使兩易之則各為舉職矣二疏不得其日今因光攝刑部附書之四月戊午光罷權是月癸亥霈徙官此事必在三四月間也日歷全不載當求他書參考徽猷閣待制知揚州葉煥引疾乞奉祠以煥提舉江州太平觀煥守揚才一年川陕宣撫副使吳玠言本軍錢糧闕乏張浚乞令都轉運使趙開躬親前去應副仍詰開違慢從之右通直郎知撫州劉子翼特遷一官以江西諸司言子翼自到任後發過嶽飛軍糧五萬餘斛錢二十四萬餘緡又勸誘人户樁備賑糴米三萬餘斛故有是命子翼子羽弟也金均房州管內安撫使柴斌乞名民軍曰保勝先是王彥移鎮荆南盡將其部曲以行惟存禁兵數十人而已斌始集三州保甲結成陳隊每人免家業錢自五千至三十千止號保勝軍又請招必勝禁軍三千人以實邉面皆許之斌乞招禁軍在三月壬申今併繫此月己巳少保武成感德軍節度使淮南東路兼鎮江府宣撫使韓世忠為亰東淮東宣撫處置使兼節制鎮江府徙鎮武寧安化楚州置司檢校少保鎮寧崇信軍節度使湖北亰西南路招討使嶽飛為湖北亰西宣撫副使徙鎮武勝定國襄陽府置司時朝廷鋭意大舉都督張浚于諸將中每稱世忠之忠勇飛之沉鷙可以倚辦大事故並用之是日李綱入辭退上疏言今日主兵者之失大略有四兵貴精不貴多多而不精反以為纍將貴謀不貴勇勇而不謀適為敗擒陳貴分合合而不能分分而不能合皆非善置陳者戰貴設伏而直前使敵無中斷邀擊之虞皆非善戰者按原本四條止載其二今據奏議補入願眀詔之使知古人用兵之深意非小補也朝廷近來措置恢復有未盡善者五有宜預備者三有當善後者二今降官告給度牒賣户帖理積缺以至折帛博糴預借和買名雖不同其取于民則一而不能生財節用核實懋遷一也議者欲因糧于敵去年春吕頥浩嘗有此奏而不知官軍抄掠甚于冦盜恐失民心二也金人専以鐡騎勝中國而吾不務求所以制之三也今朝廷與諸路之兵盡付諸將外重內輕四也兵家之事行詭道今以韓世忠嶽飛為亰東亰西宣撫未有其實而以先聲臨之五也且中軍既行宿衛單弱肘腋之變不可不虞則行在當預備江南荆湖之衆盡出敵或乘間搗虛則上流當預備海道去亰東不逺乘風而來一日千里而蘇秀眀越全無水軍則海道當預備假使異時王師能復亰東西地則當屯以何兵守以何將金人來援何以待之萬一不能保則兩路生靈虛就屠戮而兩河之民絶望于本朝勝猶如此當益思善後之計綱又言今日之事莫利營田然淮南兵革江湖旱災之餘民力必不給謂宜令淮南襄漢宣撫諸使各置招納司以招納京東西河北流移之民明出文榜厚加撫諭撥田土給牛具貸種糧使之耕鑿許江湖諸路于地狹人稠地分自行招誘而軍中人兵願耕者聽則人力可用矣初年租課盡畀佃户方耕種時仍以錢糧給之秋成之後官為糴買次年始收其三分之一二年之後乃收其半罷給錢糧此其大槩也不然徒有營田之名初無營田之實何補于事詔都督行府措置其後頗施行之綱營田議以是月戊辰行下今後附此其奏恢復未善等事必在到洪州之後今且因除二宣撫遂書之𠡠令所刪定官左時面對言國家經費之大藉于鹽者居多入納之法雖詳而未免乎壅滯者法屢改而無以取信于商賈故也今之商賈本多而利寡納久而請遲法更于上人疑于下所以間有不通之弊願詔有司自今毋或輕議改法詔户部申嚴行下詔浙東州縣守令勸誘上户廣行出糶如糶及三千石已上之家依已降㫖等第補官若有頑猾上户依前閉糴之人亦仰斷遣仍令提舉官躬親檢察尚書省奏婺州積米之家乘時射利閉倉遏糴緣此細民轉致艱食偷生為盜故有是㫖未幾殿中侍御史周祕入對論發廪勸分古之道也臣但聞其勸分矣未聞其迫之也今止令州縣勸誘猶懼其抑勒若更許之以斷遣則彼將何所不至臣恐州縣官吏不復問民之有無而専用刑威逼使承認姦貪之吏因得濟其私而善良之民或有被其害者矣乘時射利閉糴待價富民好利之心固多如是然而為守令者茍能布宣陛下之德意感之以至誠動之以利害再三諭勉使各以不費之惠自周其鄰里鄉黨彼宜無不從者其或不從則亦守令之政教約束不素行于其民也欲望再降指揮専委諸路提舉官遍詣所部戒約守令多方勸誘務令民户樂從或因今來酌情斷遣指揮輒有分毫騷動並令提舉官奏劾從之三月丙申行下庚午詔南劍州學春秋釋奠就祭陳瓘祠堂用給事中張致逺請也降授右迪功郎新樞密院編修官陳淵依所乞改監潭州南嶽廟辛未言者請命館職編纂前古中興君臣事迹有資于治體者分以篇目總為一書寫之御屏置之便殿萬幾之暇得以參驗古今鑒戒美惡從之後不克成詔去嵗旱傷及四分以上州縣所負紹興四年已前錢帛租稅皆除之執政初議倚閣及進呈上曰不若盡蠲以寬民力乃有是命五月癸酉米斛事可參考又詔旱傷四分地分闕食民户盜劫米穀食物之屬不曾毆傷人罪至死者聽知通酌情减等刺配俟麥成日如舊各降𠡠付本州遵守仍不下司集英殿修撰知湖州方孟卿充徽猷閣待制提舉江州太平觀從所請也拱衛大夫惠州防禦使知全州劉逺知雍州趙鼎因論廣西買馬司空有所費而實無補欲相度止令雍州知州専領留屬官一員主管錢物上曰朕于諸事每思慮必盡昨計算餘杭監牧一歲支費無慮二萬緡自可收買戰馬百五十匹卿等更可商量時已命左承議郎范直清提舉廣西買馬後三日遂以逺同提舉買馬令直清與逺協力措置焉故朝議大夫周中特贈中奉大夫直祕閣官其家一人中從弟户部員外郎聿訟中濰州死事狀于朝事見建炎二年正月下成都府路兵馬都監閻臯保眀如所請故褒録焉日歷載此狀聿繫比部員外郎銜臯繫江西兵馬都監銜蓋是二人未改除時所上也故左迪功郎章之邵贈左宣義郎之邵政和中以上舍得官老于選調至是有㫖召察未及用而死給事中呂祉等請特與贈官以為抱義修潔者之勸乃有是命詔總制司官候三省除執事日取㫖以沈與求去位故也自是不復除壬申罷潼川府路歲織官告度牒綾以轉運司告乏故也癸酉祕閣修撰四川都轉運使趙開升徽猷閣待制先是川陜宣撫副使吳玠數言軍前糧乏水運留滯緣軍食少闕所繫至重緩急生事愈害百姓詔開躬往軍前極力措置水運如委遲緩不能接濟見今急闕即隨宜從長措置仍令制置大使席益常切催督翌日開有是命蓋朝廷之意欲以解間隙趣應辦也熊克小歷載開除待制在今年正月又云先是詔開親至軍前又令席益趣開行皆誤也按日歷此月戊辰有㫖令開親至軍前應副至是止令益催趣糧運耳李燾撰開墓志稱忠獻奏詰公違慢又詔席大光趣公亦止謂催趣糧餉克蓋小誤尚書吏部員外郎徐林守右司員外郎祕書省著作佐郎張九成守著作郎祕書省正字兼史館校勘王蘋守著作佐郎直祕閣知鼎州張觷升直徽猷閣觷引疾乞祠而都督行府言其勞效乃命進秩焉左朝奉郎范同為福建路轉運判官詔川陕宣撫司以禮敦遣和靖處士尹焞赴行在焞始被命召自言昨于靖康中纍被召㫖以疾力辭誤䝉告命賜之美名聽其退處兼以所習迂濶之學施之事功無一可者願賜寢免以安愚分故有是命起居舍人董弅言謹按直徽猷閣程芾素不為士大夫所齒嘗除湖南漕乃于廣西監司權知賀州又于新任部內詭請官田千餘畝使久佃之人一旦失業望正典刑以威貪吏詔芾罷官祠芾今年二月丙寅與祠以修注而按吏頃所未有故著之殿中侍御史周祕入對論四川漕司注授不遵法令孤寒之人無緣得祿雖已令制置大使覺察謂宜先絶其弊源欲令每遇季月終刷具應使之闕于孟月首出榜令在部人集注一次更從朝廷取見四路合辟窠闕行下曉諭其監司違法差置權官占據合榜窠闕乞重加責罰仍許徑赴大使司陳訴具漕臣姓名申奏如此則藏匿闕次妄稱奏辟之弊可以盡革上嘉納謂祕曰蜀中利害久無人論及今日方見此章乃詔諸路運司遵守如有違戾令制置大使司按奏日歷于一日內兩載祕此章而章疏及所降指揮又多寡不同今參取書之太常丞華權面對言行在輪對官已經召對及既嘗輪者乞令吏部㑹問如偶無已見願輪以次官者聽之蓋天之降才不同使其智識過人遇事輒發時可以上裨聰眀者顧對雖數而不嫌儻效一官而僅足且留于百執事之間以各展其所長庶幾輪對不為文具從之乙亥詔江東宣撫司統制官趙密巨師古軍並權聽殿前司節制時都督張浚在淮南謀渡淮北向惟倚韓世忠為用世忠辭以兵少欲摘張俊之將趙密為助浚以行府檄俊俊拒之謂世忠有見吞之意浚奏乞降聖㫖而俊亦禀于朝趙鼎白上曰浚以宰相督諸軍若號令不行何以舉事俊亦不可拒乃責俊當聽行府命不應尚禀于朝復下浚一面専行不必申眀慮失機事時議者以為得體至是浚終以俊不肯分軍為患鼎謂浚曰世忠所欲者趙密耳今楊沂中武勇不减于密而所統乃御前軍誰敢覬覦當令沂中助世忠却發密入衛俊尚敢為辭耶浚曰此上䇿也浚不能及此以熊克小歷修入但克繫于今年八月浚入奏之後蓋不知其日月也按日歷今年二月二十日戊午有㫖楊沂中赴都督行府使喚三月八日乙亥有㫖趙密權聽殿前司節制此事正與克所云相合但其後世忠兵未出而金重兵犯淮西反以沂中𨽻俊蓋臨機區處非夙議也故表而出之以補史闕丙子親衛大夫寧州觀察使韋淵落階官提舉萬夀觀上之即位也淵以覃恩遷遙郡至是積十年才落階官焉拱衛大夫同州觀察使致仕胡悈追三官勒停悈坐私酤抵罪當罰金案奏特有是命是日四川制置大使席益至成都府益未至成都道奏兩蜀去秋荒歉乞米一二萬石専充濟糴詔趙開除應付吳玠一軍歲計糧來外將其餘寬剩米斛付益又言四川土禁軍自來懦弱屯駐京軍亦非精鋭屯駐既久所存無幾臣嘗乞郝晸焦元李建陳元等軍馬未䝉俞允乞别撥一項精鋭軍馬前來并許臣招收軍中兵將逃避之人漸增軍數樞密院言招收逃亡有害軍政但許召募效用三百人而已益乞賑濟米以是日奏至乞招軍在後六日癸未今併書之己卯右朝請郎新知筠州陶愷送吏部與監當差遣愷既補外上謂近臣曰愷論事言皆劫持雖灼見懷姦以其議及祖宗未欲行出言者復奏愷所言劫持懷姦誠如睿㫖觀其文理紕繆固不足道而迹其情狀有不可貸者今輒具前後聞見以證其說元祐之初哲宗皇帝即位是時天下士民言新法不便者以千萬計于是進用司馬光呂公著等逐蔡確章惇之徒除去新法盡復祖宗之舊終元祐九年天下太平洎紹興九年殿試進士李清臣撰䇿題其略曰恭惟神宗皇帝憑几聽斷十有九年禮樂法度所以惠遺天下者甚備朕思述先志夙夜不忘畢漸對䇿曰陛下亦知有神宗皇帝乎既唱名畢漸第一于是紹述之論始興吕大防蘇轍范純仁相繼引去章惇蔡卞始用事厚誣宣仁欺罔哲宗以神宗為名劫持上下盡逐忠良羣小畢進矣逮太上皇嗣位之初首召范純仁等忠義之士流竄而尚存及一時正人公議所屬者悉皆召用章惇以䇿立之際獨建異議竄責嶺表蔡卞等亦皆去位曾未踰時紹述之論復興曾布蔡京用事亦以神宗皇帝為名劫持上下姦人情僞如出一律方其召范純仁等曾布乃為建中之論以此改元蓋小人知其當退遂欲雜用紹聖之臣兼行紹聖之政此說既行則復出為惡得以肆其姦持大中至正之論以濟朋比傾邪之術卒如其計也蓋自紹聖之後每為小人所勝必假神宗皇帝為名始于建中終于大亂此已事之驗可為痛心疾首者也恭惟陛下聰眀稽古憲章祖宗洞見是非真僞之實深究治亂興衰之源更修信史垂示萬世而愷乃以為未能平黨與未能修政未能用人愷何者而敢為此言是欲以一身為羣姦先驅鼓惑天下之聽嘗試朝廷庶幾僥幸萬一焉自愷有此言善類為之不安士大夫莫不疑惑以謂既付之民社未必以其言為非也伏望陛下眀正典刑揭示好惡為小人漸進之戒前二日輔臣進呈上曰所論甚詳自當便與行遣又曰久不聞如此議論忽然聞此甚可怪折彥質曰此乃國論不可不察小人嘗試朝廷之意若好惡小不眀則便出為惡趙鼎乞送吏部與合入差遣上曰是亦輕典至是輔臣再進呈鼎奏曰愷係州縣資序恐用以牧民非宜欲送吏部與監當上曰甚好鼎因言愷乃節夫之子節夫為蔡京死黨力主紹述之說彥質曰小人姦邪自有源流詔嶽飛疾速兼程之鄂州措置軍馬左朝散郎勾龍如淵行祕書省校書郎如淵𨗳江人也右通直郎通判臨安府袁復一進秩一等左迪功郎添差臨安府府學教授周孚先特改左承事郎復一無錫人與孚先皆引對而有是命庚辰宣政使貴州防禦使提舉台州崇道觀陳宥為內侍省押班主管溫州景靈宫奉迎所辛巳詔天章閣萬夀觀祖宗帝后神御見在溫州令幹辦官黃彥節迎奉赴行在惟聖祖像留溫州如故既而中書言恐內侍沿途騷擾止命本州遣近上兵官迎奉焉後㫖在是月乙未檢校少師奉寧保靜軍節度使川陕宣撫副使吳玠易鎮保平靜難興州置司樞密副都承㫖馬擴兼沿海制置副使擴自鎮江將殿前司䇿選鋒軍赴行在遂有是除詔自今初磨勘改官人不許堂除通判差遣用殿中侍御史石公揆請也時見任通判百五十員待闕者乃有二百八十九員公揆以為僥幸冗濫且非舊制故有是請端眀殿學士提舉華州雲臺觀張深卒壬午太常諡故贈安化軍承宣使劉鎮曰剛愍鎮守真定與金人巷戰而死癸未左中奉大夫直祕閣閻旦降二官取勘旦為成都府路轉運副使怒府吏喬升㑹王似薨旦攝府事以旋風棒擊之至死川陕宣撫副使邵溥以便宜罷旦成都運司題名旦以去年八月一日放罷言于朝上曰若以軍中法而馭吏則安用三尺此事雖朕亦不敢趙鼎退立曰陛下好生之德天下共聞乃有是命既而殿中侍御史石公揆劾旦違拒詔㫖不肯落銜旦坐奪職旦奪職在四月庚子詔臨安府官屬减年磨勘指揮勿行先是以行宫之勞第賞而文武當受賞者百有餘人御史石公揆言其太濫周祕又乞令守臣核實折彥質奏外議頗不以行賞為然命遂寢降授右武大夫果州團練使趙秉淵令赴江東宣撫司軍前自效秉淵以掠和州水寨之罪當逺謫至是乞以功贖罪張浚許之甲申給事中張致逺充顯謨閣待制知台州致逺以母老乞奉祠章四上乃命出守既而以海冦鄭廣未平改知福州致逺移郡在是月戊子時言者論福建帥憲曾楙呂聰問捕冦無方又言聰問無檢身之操趙鼎進呈乃詔楙纍乞宫祠可提舉江州太平觀聰問令致逺密切究實事遂已詔命官諸色人捕獲凶惡彊盜未經結録已前在獄身死更不理為推賞人數先是惠州獲盜四十二人而獄死者三十四憲司以為吏受賕煆鍊致脅從之人拘囚至死遂變換情詞以為正賊乞今後未經結斷在禁身死者二名當一名吏部尚書孫近等言如此恐貪冒賞典之人計囑獄司愈將平人非理致死其弊益深故有是請仍乞將惠州獄官貶秩衝替自今彊盜獄死及五分以上官吏比附嵗終禁死及一分科罪不以併討失减詔惠州元勘獄官貶秩衝替餘從之乙酉進呈李彥所探事宜趙鼎奏兩日併得陵寢神御器物此必在天之靈深有望于陛下者上愀然久之右朝奉郎四川都轉運司幹辦公事王咨為陕府西路轉運判官殿中侍御史石公揆言咨為總領司屬官専務掊克以茍進身豈可居外臺耳目之寄乃降二秩罷之咨尋卒咨五月己丑降罷洪邁夷堅甲志云永康軍導江縣人王咨者以刻核彊鷙處官紹興五年為四川都轉運司幹辦公事被檄𣙜鹽于潼川路王躬詣井所召民强與約率令倍差認課當得五千斤者輒取萬斤又約來嵗所輸不滿額者籍其資王心知其不能如約規欲沒入之使官自監煎既復命計使以鹽額倍增薦諸宣撫使擢為利州路轉運判官未幾死按史咨今年方除陕西運判與邁所記差不同蓋是時宣撫司除監司帥臣亦未嘗盡奏也丙戌上不視朝後二日趙鼎等問聖體上曰前夜已覺目痛偶探報叢集又新令范冲校陸贄奏議有兩卷未曾看過三更方看徹比曉目遂腫痛不能出鼎曰陛下勤于政事如此天下幸甚右朝議大夫直寶文閣任詩落職降二官罷宫觀右朝議大夫䕫州路轉運副使韓固罷先是朝廷聞詩帥䕫無治狀詔俾奉祠五年十月癸巳詩亦奏轉運判官王肇銓選不公乃降肇二官放罷令帥司拘留取勘今年正月庚子至是制置大使席益言䕫路帥漕皆非其才三人不和動相叱罵詩素病狂易専事貪苛望行罷黜輔臣進呈上曰蜀去朝廷逺號令久不及官吏無復知畏遂有是命庚寅故承議郎贈直龍圖閣龔夬加贈右諫議大夫與恩澤以其家有請也直祕閣知大寧監龎修孺落職放罷修孺方待次言代者穆亶未上而亡乞之任亶聞自言詔貶修孺二秩右司諫王縉劾其躁妄故黜之是日江西制置大使李綱始領使事于金溪縣綱請蠲災傷州縣三等以下户四年積缺又乞錢十萬緡為營田本上皆許之洪州月費軍儲米五千斛錢六千餘緡而倉庫之見在者米四斛有竒錢五百千而已綱具聞于朝乃命都漕司應副一月此並據綱行狀辛卯京東淮東宣撫處置使韓世忠奏捷上因語及世忠將所得青徐州土兵弓箭手皆放歸甚善朕思之不若更與數百錢令去此事雖似非急務然使中原之人知朝廷恩意縱被劉豫父子驅率亦豈肯為之盡力顧趙鼎曰卿可作書速諭張浚右諫議大夫趙霈請戒諭臺諫之臣糾按姦弊先是吏部令史有隱匿過名遷補者為御史臺所察事下大理而御史私呼大理吏諭意繫者不伏詔移臨安劾治臺史二人皆坐特㫖編管霈奏恐百司緣此慢易臺綱浸輕乞加戒諭上從之入內東頭供奉官陳成之追二官成之為熙河蘭廓路提轄揀中保寧指揮避難入蜀寓居嘉州及張浚罷歸成之復出行陕西之祿至是為權宣撫副使邵溥所劾故有是命成之已亡去求之不獲久之復自歸職如舊紹興九年往陜西撫諭即此人也按此條文義疑有脫誤壬辰詔四川災傷州縣委實檢放人户所納户帖錢權與倚閣一半災傷至重去處全閣俟秋成日催理時制置大使席益言去年十二月六日聖㫖節文諸路旱傷去處令轉運司審實如委及四分以上權住給賣臣自入界以來百姓遮道陳訴困窮皆稱去秋旱傷田畝所收多者不過四五分少者才一二分又緣官中糴買壅遏米榖價例踴貴無從得食盡有菜色又去秋西川水潦東川旱暵即今粒食昂貴斗米錢兩貫利路近邉去處又增一倍民人饑流死者相枕籍于道見行賑濟臣契勘四川災傷如此自合權住給賣今轉運司並不遵用上文審實却一概行下殊失聖心臣訪聞得蓋緣蜀民自來不曉陳訴災傷是致州郡漕司不曾依條檢放間雖有檢放去處並不以實臣又契勘四川贍軍十年民力困弊計其生理蕩散何啻旱傷四分以上縱不災傷亦合比附旱傷四分去處奏請權住給賣何况民方饑死見行賑濟而不得比于旱傷四分䝉被寬恤之令臣若不言朝廷何由得知四川水旱之實有司便文徒務推行使逺民重困嗟咨怨恨上纍國體所繫非輕故有是㫖癸巳趙鼎言近史院編類元帥府事蹟有可疑者如言王雲行李中有短項頭巾百姓知其果叛上曰雲死後宗澤方遣客司齎兩頂畨頭巾來云得之雲行李中是時耿延禧髙世則皆在坐雲亦孜孜為國豈可誣衊以此又言黃潛善遣張宗入京密結王時雍上曰此事亦不然黃潛厚一日驟來見朕哽噎不能言再三叩之乃云二聖已去張邦昌僭立朕是時更無分毫主意同與見耿南仲商議往招潛善潛善既到即檄諸路共力勤王當時處置皆是潛善張宗見存自可問也折彥質曰大抵人情喜宗澤而惡潛善故耳上曰潛善誤國固有罪然事之是非亦不可不公乙未左通議大夫提舉江州太平觀王庶知鄂州初庶召還未見先獻論十六篇論時事其論行法令略曰人主威權之出至于殺戮事關軍政儻罪狀眀白當守之不移不可奪于好惡使逺近窺測動搖國事論先計後算略曰臣伏見頻年數易將相用兵制敵初無成算輕動則喪師退守則失地臨機倉卒僥幸一勝此非朝廷萬全之計願任一二同心之臣責其功效假以嵗月使廟算先定然後兵再出而亂可平矣論賞罰曰人主之馭臣鄰惟在賞罰賞當則功勸罰當則罪服至于擾攘之時此柄尤不可不謹比年以來爵賞失于濃厚愚者茍得為心貪婪不已無復激勸傑猾者較功揣已豈無不自信之人伏望審信賞必罰之㫖以圖興復論行法令曰法令者立國之大本人主之至權近者朝廷以四方未平務從含貸而臣下寖成驕慢法令不行于軍旅沮落于方嶽幾何而不陵遲望眀敕中外執憲之臣振起綱條以折姦雄之漸論虛實用度曰今天下自經兵火以十有三四之土地十有二三之耕牧供十有六七之軍旅數倍平日之官吏雖使天雨鬼輸無由得足一有凶歉何以支持願解絃更張以圖興復論敵人强弱曰金人僥幸立國十有餘年二太子羅索等數人零落殆盡尼瑪哈竊有其權土地濶逺金玉子女盈積自以為非天崩地陷無復可憂喪兆漸萌陛下欲雪大耻正在今日論擇相曰陛下臨御以來拔以為相者十人矣而在位多不久何相之衆而去之速願慎謀厥始益加禮貌且推赤心置其腹中無令小人伺其隙論戰守曰用兵之道不過戰守兩端而已交鋒接刃以决死生者戰也增陴浚隍效死勿去者守也國家內外養兵無慮百萬未嘗聲金鼓于行陳聞敵之至即曵兵而走豈知所謂戰未嘗修城郭立宗廟聞敵之至則委而去之豈知所謂守或謂金人得古人用兵之道竒正無常變化不測所向無前安可以戰所攻必克安可以守臣謂金人用兵亦豈善哉特以我不善故彼為善以陛下之神武託社稷之威靈以今日天下之兵戰亦可守亦可何所往而不可論政事本末曰政有小大事有本末今天下之言政事者莫不以兵為先臣竊謂兵雖不可去然非所先也君君臣臣父父子子兄兄弟弟夫夫婦婦四民安其業萬物遂其性是乃政事也今能修其政事則夲氣實而邪氣不能入彼外敵不待攘之而自攘矣論兵曰大抵用兵之說有三兵貴合不貴離兵貴精不貴衆兵貴速不貴久反此非惟不能成功未有不敗亡其數出易動乍勝乍負最兵家之大忌論形勢曰立國必處形勢之地今天下十失七八所謂咽喉腹心上流者皆為敵人所有區區吳蜀乃一肢爾自古吳以夀春荆襄為上流蜀以漢中金洋為咽喉今襄陽千里蕭條有兵不能自養梁洋田壠邱墟置之不復為慮兼梁洋可戰可守乃天下脊願早定大計勿使狂夫據之乃有噬臍之悔丁酉詔于皇城內修蓋天章閣以奉祖宗神御後以親征未及行武功大夫知商州充金均房三州都統制格禧知均州王彥之棄金州也宣撫司遣禧以所部戌之及柴斌為安撫使以禧權均州至是申命是春僞齊劉豫再開貢舉得邵世矩一云邵光規以下六十九人改眀堂基為講武殿于其地造戰船僞開封尹鄭億年為吏部兼禮部侍郎殿前都指揮使許清臣兼開封尹金太宗晟之后以病卒諡曰眀德皇后建炎以來繫年要録卷九十九建炎以來繫年要録卷九十九金人地名考證羅索原書作婁宿誤改見卷一尼瑪哈原書作黏罕誤改見卷一
