body:
  text: 建炎以來繫年要録巻一百四十七宋李心傳撰紹興十有二年冬十月辛酉起復右奉議郎添差提舉兩浙路市舶胡彦國候令任滿日令再任從所請也壬戍詔修臨安城詔張憲妻子分送封州程江興化軍居住癸亥右朝請大夫福建路轉運副使陳敏識主管台州崇道觀坐昨任江東漕臣職事廢弛專務迎合應副縻費官錢故也徽猷閣待制提舉江州太平觀陳公輔卒甲子呉國長公主乞為其子潘長卿粹卿落階官上謂宰執曰合落階官此趙鼎之失凡事須得中乃可行鼎以魯國大長公主子為使相似太過呉國長公主之子不落階官似不及朕嘗問之鼎乃以錢潘二家子弟賢否為對此其失也既而奏魯國大長公主復援粹卿例乞除其子錢愷正任上亦許之言者以為互相扳援非先朝舊制命遂寢錢愷事在十一月乙未乙丑上謂大臣曰天下幸已無事惟慮士大夫妄作議論擾朝廷耳治天下當以清浄為本若各安分不擾朕之志也詔中外臣民自今月丙寅後並許用樂初以梓宫未還故輟樂以待迎奉至是太母還宫將講上壽之禮故舉行焉秘書省校書郎何若守監察御史丙寅權攢徽宗皇帝顯肅皇后于㑹稽之永固陵懿節皇后祔陵在昭慈聖獻皇后攢宫西北五十步周地二百二十畆并林木為錢三千八百緡有竒其後昭慈永祐二攢宫歲用祠祭錢八千四百餘緡修繕錢五千緡悉以紹興府當輸内幣錢供其費右諌議大大夫羅汝檝言比者王庻有道州之敗而通判州事孫行儉鼎新行衙為庶安泊之所郡守慮其累已止之不從其無忌憚甚矣望將行儉罷斥仍令庶不得占行衙居止庻以平一方嗟怨之氣詔行儉送吏部與廣南監當差遣餘如奏而庶死乆矣汝檝所言葢守臣田如鼇發之胡銓䟦戒諭和議詔書稱春陵守臣如鼇劾樞密王公庶葢措此也辛未右承事郎監潭州南嶽廟賜緋魚袋劉堯佐堯仁正平並直秘閣主管台州崇觀道三人光世子若孫也光世以皇太后還宫自永嘉力疾入見故有是命乙亥翰林學士兼侍講資善堂翊善程克俊充端明殿學士簽書樞密院事秦檜之除太師也克俊草其制詞有曰廟算無遺固衆人之所不識征車逺狩惟君子以為必歸檜大喜之詔川省宣撫司都統制楊政令本司津遣赴行在奏事丙子尚書刑部侍郎周聿罷以言者論聿頃被命出使託疾遲留故也權尚書禮部侍郎兼侍讀兼實錄院修撰王賞兼權直學士院御史臺主簿李澗為監察御史資政殿學士提舉醴泉觀兼侍讀鄭億年充資政殿大學士提舉臨安府洞霄宫從所請也仍賜田二十頃恩數視執政時中書舍人楊愿出使秦檜因以寧國軍節度使開府儀同三司張中孚靖海軍節度使張忠彥還金國此據徐夢萃北盟㑹編凡士大夫北留者家屬悉遣此據宇文虚中行狀惟億年得留焉丁丑太師尚書左僕射魏國公秦檜進封秦魏國公用蔡京故事也檜辭不拜太傅樞密使廣國公張俊進封益國公戊寅追封皇太后曽祖贈太師惠王韋舜臣為廣王祖贈太師徳王子華為福王父贈太師魯王安禮為兗王母秦越國夫人宋氏為陳魯國夫人詔成都府路轉運司收買川錦二十萬緡潼川府路轉運司收買青絲樗蒱綾三十萬緡準備禮物使用右武大夫相州觀察使李愕等四十四人推恩有差以扶䕶梓宫萬里勤瘁故也庚辰左朝奉大夫提舉江州太平觀何鑄責授左朝奉郎秘書少監徽州居住時殿中侍御史兼權侍御史江邈論鑄之罪謂鑄日延過客密議朝政以欲緩岳飛之死上誣聖政以破和議為能以孫近李光范同之論為是而又以已在言路未甞論列數人之罪為賢嗚呼岳飛反狀中外共知而可緩其死乎和議為今日明效大驗如此嚮使陛下持論不堅無一徳之臣可以倚仗而為鑄等數人之所搖則和議決不復講而陛下豈復有色養之懽乎伏望將鑄逺竄遐荒使與同惡之人均其廢放故有是命起官舍人權中書舎人程敦厚草責詞極其醜詆至有家本書佐行同穿窬之語云詔諸路常平使見賣官田並令見佃人増租三分如不願増者許人剗佃後詔轉運提刑司官田亦如之後詔在十二年二月辛酉二十一年九月戊戍所書可攷辛巳起居舍人程敦厚兼侍講直秘閣淮南東路轉運判官紀交陞直敷文閣知楚州省鎮江府沿江安撫司熊克小厯行庚辰蓋誤詔廣西欽㢘雷高化州所産鹽並令官賣内鎮州所收錢赴鄂州軍前交納先是有㫖罷二廣官賣鹽後又詔廣西鹽八分客販二分官賣充漕計至是欽州鹹土生發嵗産鹽三十餘萬斤論者以為商人不通請復官賣許之而廣東轉運判官范正國代還亦言本路上供及經費皆仰賣鹽息錢客鈔既行遂或闕乏望令本路軍屯駐軍馬去處許依客人買鈔請鹽各就本州出賣所得息錢專充軍費庶免上煩朝廷應副實為利便不從正國奏請在十三年四月辛酉壬午太傅醴泉觀使福國公韓世忠進封潭國公太保萬壽觀使雍國公劉光世改封楊國公工部員外郎蓋諒罷以潼川路漕司言其奉使川陜所至輙受供饋故也直徽猷閣知撫州張洸移知永州詔非泛假日令百司諸路休務如舊以權禮部侍郎王賞等言令來邊事平息故也癸未秘書少監秦熺兼崇政殿説書詔車輅院復置官吏甲申皇太后生辰燕于慈寧宫始用樂上壽丙戍右朝奉大夫荆湖北路轉運判官榮薿為成都府路轉運判官紹興十一年九月癸邜注王明清所云秦檜深恨薿屢欲加害事恐可修潤附此故内殿崇班李從約特贈武翼大夫故妻永嘉縣君劉氏追封安人以皇太后初因從約入宫故也丁亥敷文閣直學士提舉萬壽觀兼侍講直學士院資善堂翊善秦梓陞兼侍讀右武郎幹辨御輦院呉益帶御器械詔福建專置提舉茶事官一員置司建州先是建州嵗貢片茶二十餘萬斤省額凡二十一萬一千斤葉濃之亂園丁亡散遂罷之建炎二年以市舶官兼茶事上祀明堂于臨安始命市五萬斤為大禮費紹興四年已而都督府請如舊額發赴建康召啇人持往淮北檢察福建財用章傑以片茶難市請市米茶許之轉運司言其不經乆乃止既而官給長引許啇販渡淮及興𣙜場遂取臘茶為𣙜茶本今年六月尋禁私販官盡𣙜之上京之餘許通啇官収息三倍今年九月及是將鬻建荼于臨安始别置提舉官專一買法是月川陜宣撫副使鄭剛中自河池移司利州舊宣撫司率居綿閬之間及胡世將代呉玠就居河池然饋餉不繼人以為病至是已罷兵剛中乃還居益昌以省費既而剛中欲移屯一軍都統制楊政不從剛中呼政語曰宣撫欲移軍而都統制不肯剛中雖書生不畏死也聲色俱厲政即日聽命十有一月己丑朔檢校少傳崇信軍節度使萬壽觀使張浚以赦恩封和國公時政寓居長沙益屋六十楹以奉其母万俟卨為中執法論浚卜宅踰侈至擬五鳯建樓秦檜白遣屯田員外郎吳秉信以事至京湖有所按檢庚寅詔特引對秉信造浚見其所居不過中人常産可辦反以檜意密先之歸而奏其實事遂寢日厯十一月庚寅有㫖吳秉信令閤門引見上殿甲午屯田員外郎吳秉信前去京西等路幹辦公事引見進對不知何事也朱熹撰張浚行狀云檜既外交仇讐罔上自肆惡嫉正論諱言兵事自以為時已太平日為浮文侈靡愚弄天下獨忌公甚中丞万俟卨希檜㫖論卜宅僭擬至倣五鳯建樓上不以為然檜遣朝士吳秉信以使事至湖南有所案驗且以官爵誘之秉信造公見其居不過中人常產可辨不覺歎息反密以檜意告公而歸且奏其實檜黜秉信案日厯秉信今年十二月己未遷密院檢詳此時使尚未四所謂以官爵誘之者是也然秉信十四年二月除右司員外郎其制詞云庀官樞省之聫案視湘潭之境勤勞靡憚詳練有聞後一十餘日又遷起居舍人則非使還即被黜矣其年五月樓炤罷言者指秉信為照黨罷右史知江州不知僖何以云爾且附此更須詳攷龍神衛四廂都指揮使平海軍承宣使兩浙東路馬步軍副都總管蘭整卒辛邜詔自今宰執初除及轉㕔銀帛並全賜敷文閣直學士知臨安府俞俟提舉江州太平觀從所請也壬申左中大夫參知政事万俟卨資政殿大學士左朝奉郎提舉臨安府洞霄宫鄭億年並進秩二等昭宣使吉州防禦使入内内侍省都知宋唐卿為宣政使福州觀察使以按行覆按攢宫故也二司官官屬四十有二人各進官一等選人無資可循人改合入官集英殿脩撰兩浙路計度轉運使王㬇陞敷文閣待制知臨安府太師秦檜故母秦國夫人王氏追封秦魏國夫人以檜辭兩國之封乞回授也左朝散郎黄逹如言太后回鑾梓宫還闕茲為盛事望宣副史館仍令詞臣作為歌詩薦之郊廟然後褒功罰罪大明黜陟將前日異論沮論者明正典刑其力主和議者重加旌賞庶上慰徽宗二后在天之靈少紓太母留滯抑鬱不平之氣詔禮部侍郎兼實錄修撰王賞編修副史館逹如建陽人甞知南雄州以贓罪為提㸃坑冶官韓球所按代還奏事乃上此奏焉熊克小厯以逹如為左朝奉大夫蓋誤直敷文閣兩浙轉運副使張匯直秘閣兩浙西路提㸃刑獄公事張叔獻各進職一等右宣教郎両浙東路提㸃刑獄公事吕用中右朝請郎提舉兩浙東路茶鹽公事王鈇並直秘閣以孟忠厚言應辦無闕故也于是總䕶頓遞二使官屬皆遷官有差癸巳太傅樞密使益國公張俊為鎮洮寧武奉寧軍節度使充醴泉觀使奉朝請進封清河郡王初太師秦檜與俊同主和議約盡罷諸將獨以兵權歸俊故俊力助其謀及諸將已罷而俊居位歲餘無請去之意檜乃令殿中侍御史江邈論其罪邈言俊據清河坊以應䜟兆占承天寺以為宅基大男楊存中握兵于行在小男田師中擁兵于上流他日變生禍不可測上曰俊有復辟功無謀反之事皆不可言㑹樞密使孟忠厚竣事還朝而邈又言俊之過俊乃求去位遂有是命熊克小厯稱侍御史江邈數言俊之遏葢承林泉野記之誤邈此時第以殿中權侍御史邈劾俊語據趙甡之遺史増入當求全章書之尚書户部侍郎張澄權本部尚書熊克小厯依本部題名繫之去年十一月而于此月己亥又書之葢重疊差誤左司員外郎李椿年言經界不正十害一侵耕失稅二推割不行三衙前坊場户費供抵當四鄉司走弄稅名五詭名寄産六兵火後税籍不信爭訟日起七倚閣不實八州縣隠賦多公私俱困九豪猾户自陳税籍不實十逃田税偏重故稅不行且言臣聞平江歳入昔七十萬斛有竒今按其籍雖三十九萬餘然實入二十萬耳詢之土人其餘皆欺隠也皇考按覈實自平江始然後行之天下則經界正而仁政行矣上謂宰執曰椿年之論頗有條理秦檜曰其説簡易可行程克俊曰比年百姓避役正緣經界不正若行之誠公私之乆利也乃詔專委樁年措置椿年請先往平江諸縣俟其就緒即往諸州要在均平為民除害更不増税額從之熊克小厯于此書两浙轉運副使李椿年言云云葢李椿年實自都司上此奏乃除浙漕爾甲午三省行首司言秦檜依舊魏國公緣係三公合行鎻院降制詔止令尚書省給降勅命其告更不别給左朝散郎黄逹如為監察御史尚書左司員外郎李椿年直顯謨閣為兩浙路轉運副使乙未檢校少保保成軍節度使開府儀同三司兼領殿前都指揮使職事楊存中為少保錄復土之勞也國朝故事未有以保傅為管軍者論者惜之侍衛親軍軍馬都虞候保順軍承宣使鎭江府駐劄御前諸軍都統制解元為保信軍節度使錄迎扈之勞也元不及拜而卒詔孟庾家屬移信州居住丁酉左朝散大夫直秘閣知盱眙軍沈詔貶秩一等坐擅報北牒故也詔尋以憂去戊戌進士出身趙公傅特補左修職郎以公傅援紹興八年彥端例有請也自是遂為故事己亥詔太學養士權于臨安府學措置増展先是言者屢請復太學以養人才上以戎事未暇至是謂宰執曰太學教化之源宜復祖宗舊法程克俊曰東晉設學于鼎沸之中今兵息矣興學正其時也秦檜曰乆有此議今當舉行之乃命禮部討論取㫖言者請申嚴貶謫人不得輒入國門之禁令御史臺常切覺察按劾從之詔皇太后囘鑾士人曽經奉迎起居及獻賦頌等文理可采者令後省看詳申省取㫖時獻賦頌者千餘人而文理可採者僅四百人大理正呉㮚頌曰輔臣稽首對揚聖志惟斷乃成願破羣異有司奏為第一左承議郎知眞州張昌次之詔有官人進一官進士免文觧一次于是吳縣范成大亦在數中㮚江寧人成大雩子也庚子命内侍王晉錫作崇政垂拱二殿時言者請復朔日視朝之禮而行宫止一殿故改作焉崇政以故射殿為之朔望則權置帳門以為文徳紫宸殿按射則以為選徳䇿士則以為集英垂拱以故内諸司地為之在皇城司北辛丑言者論陛下斥逺姦邪與腹心之臣一徳以定大計大功巍巍超冠古昔臣愚慮前日不得志之徒未即丕變作為不靖有害治功伏望屏置逺方終身不齒詔榜朝堂敷文閣待制知鎮江府劉子羽提舉江州太平觀以右諌議大夫羅汝檝論其專任私意變亂是非也先是子羽言和好本非乆逺計宜及閒暇時修城壘厲器械備舟檝以俟時變秦檜始以復職非出己意不悦至是益怒諷汝檝論其罪遂罷歸和衆輔國功臣太保䕶國鎭安保静軍節度使充萬壽觀使楊國公劉光世薨于行在年五十四詔贈太師輟視朝二日贈銀帛二千匹兩子孫甥姪進官者十四人又東幹辦内東門使李存約主葬事上臨奠諡武僖光世疾革援例乞免其家差徭科斂上亦許之中書舎人張廣持不可乃止光世早貴其為大將御軍姑息無興復志論者以此咎之光世乾道八年追封安城郡王開僖元年又封鄜王熊克小厯載光世薨在今年正月蓋林泉野記之誤而克又因之壬寅秦魯國大長公主薨于行在年八十六公主上曾祖姑也故事舉哀成服時以具慶之朝故不講但輟五日朝諡曰賢穆紹興二十九年閏六月己夘加明懿二字丙午詔責授清逺軍節度副使趙鼎責授嚮徳軍節度副使王庶今赦更不檢舉寳文閣待制提舉亳州明道宫曾開徽猷閣直學士提舉江州太平觀李彌遜並落職先一日右諌議大夫羅汝檝入對言陛下近可臣僚之奏以前日異論者明正典刑此誠今日先務然方和議之初譏謗紛然往往出于庸愚無知不足深誅其間懐姦以害成挾衆以求勝者在宰執則趙鼎王庶在侍從則曾開李彌遜是四人者同心併力鼓率其黨必欲力沮是事而後已是宜明正其罪可也然開與彌遜尚以美職食祠官之祿失刑為甚伏望特加貶斥以快公論鼎庶見在謫籍依近降赦文恐合量移乞免别行竄徙姑令有司勿復檢舉故有是命權中書舎人程敦厚草制曰方同惡而相濟肯信君子以為必歸逮寧親而解憂是宜國人皆曰可殺時庶已死而秦檜未知也恊忠大夫宣州觀察使御前統制趙密落階官為龍神衛四廂都指揮使主管侍衛歩軍司公事密張俊愛將也俊薦用之徽猷閣待制致仕尹焞卒于紹興府年七十二上知其貧特賜錢三百緡捧日天武四廂都指揮使昭信軍承宣使王勝為鎭江府駐劄御前諸軍都統制初張俊在行府以事憾勝責送建康軍中自効時王徳權管軍事俊謂徳與勝素不協必殺之徳見之喜曰我為王夜叉汝為王黒龍非我二人誰可相親者乃厚待之俊罷樞密勝潛至行在見韓世忠㑹觧元卒遂有是命王勝除月日厯不載徐夢莘所編在此月故于解元致仕日書之夢莘又云勝潛至行在見韓世忠世忠藏于家一日世宗具筵㑹召醫師王繼先飲燕酒行世忠出勝拜繼先為父繼先見上言勝可大用遂有都統制之命丁未徳慶軍節度使提㸃皇城司先大金報謝副使錢愐特起復秘書省正字范雩為校書郎兼玉牒所檢討官初除檢討官也左承事郎陳誠之為秘書省正字舊制廷試第一人厯任回始得館職至是秦熺已為秘書少監故誠之亦有是除熊克小厯載此事于十三年二月葢據本省題名也然題名乃以供職日為始非初除之日克小誤戊申右宣教郎王㑹幹辦行在諸軍糧料院㑹㬇弟也庚戍少保樞密使信安郡王孟忠厚罷為少傅鎮潼軍節度使判福州忠厚使山陵還言者引故事論列而有是命王明清揮麈後録云元符末章子厚為永㤗山陵使子厚專權之乆人情鬰陶有曽誕敷文者作詞略云草草山陵職事厭厭罷相情懐謂故事也紹興間㑹稽因秦㑹之為固位之訃廼除孟仁仲為樞密使以代其行仁仲不悟其機事竣猶入國門㑹之怒諷言路引以論列出典金陵左承事郎張戒時勒停右諌議大夫羅汝檝論異議之人尚有偶逃憲網者張戒是也按戒最為趙鼎所厚鼎既深詆和議戒巧相迎奉茍可以沮是事者無不為也未幾鼎罷相陛下灼見其姦亟行罷黜遂徃依岳飛于江夏則其趨操可知故黜之十有二月己未朔上謂宰執曰秦熺論唐文皇之文華漢文帝之文實程克俊曰聖人之文與衆人異陛下聖學高妙施行治具得斯文之傳矣秦檜曰堯稱文思舜稱文明禹稱文命而周文王世世相傳止于此上曰然給事中兼侍講李易充敷文閣待制提舉江州太平觀以疾自請也司農卿總領淮東軍馬錢糧胡紡罷右諌議大夫羅汝檝論紡頃守江隂日奴事董旼等三人因得韓世忠幕下幹辦見世忠被召為樞密乃發數人之私殿中侍御史江邈亦按論紡奴事大帥官屬賴以為地他日事異又極力擠之不啻仇讐故罷汝檝所云蓋旼與温濟耿著也樞密院檢詳諸房文字王師心為尚書右司郎中尚書屯田員外郎吳秉信為樞密院檢詳諸房文字秉信使京湖未還也將作少監米友仁為尚書屯田員外郎友仁芾子也芾淮陽人嘗為禮部貟外郎上愛芾書蹟嘗刻石為十巻友仁浮沉州縣數十年紹興以後纔被除擢焉此據曽百家詩選引庚申右奉議郎直秘閣方滋落職以言者論滋頃因常同為中丞日密薦之于趙鼎遂得書局自為秀守凡遇遷客必欵延厚遇以結其他日復用之懽故也鄉貢進士董自任永免文解充太學録自任永豊人獻所著春秋總鑑于朝起居舍人程敦厚言其論盟于宋暨齊平之類皆得聖人之遺意有出於先儒之表者故録之辛酉言者乞復武舉詔送兵部太府寺丞向子固直秘閣知旴眙軍措置𣙜場後二日賜子固三品服童子張巖叟九嵗其弟巖卿七歳能誦書詔並免解一次仍以束帛賜之癸亥權工部尚書莫將充敷文閣學去知明州甲子上曰朕以財賦養天下士大夫以天下公器處天下士大夫要使人盡心職業朕何愛爵禄哉丙寅上常服秦魯國大長公主第臨奠詔子孫皆進官一等孫四人曽孫三人𤣥孫一人並補京官仍令台州應副葬事己巳監察御史黄逹如為尚書吏部員外郎時江浙等路都大提㸃坑冶鑄錢韓球奏逹如贓狀明白錢物數多詔處州取勘是月辛酉逹如辨數不已乃有是命庚午禮部乞太學養士權以三百人為額上曰太學師儒之官雖選經術當先徳行要使士子化之以厚風俗太常博士劉燦乞隨宜修剏禖壇事下禮部後築于臨安府城之東南少傅新判福州信安郡王孟忠厚與觀文殿學士江南東路安撫制置大使知建康府葉夢得兩易時海㓂朱明連嵗作亂環閩八郡皆被其毒乃詔夢得挾御前將士便道之鎮詔福州故相余深家所藏監書令憲臣説諭投進取㫖推恩明州言州民楊慶紹聖中六次取肝割乳以療父母詔旌表門閭辛未武顯大夫江南西路兵馬鈐轄劉光時知利州酈瓊之叛也光時為所刼以去劉豫用為大名府副總管以復疆得歸壬申太師秦檜等上重修六曹寺監通用敕令格四十七巻申明六巻看詳四百十巻詔頒行之癸酉龍神衞四廂都指揮使䕶國軍承宣使御前統制兼樞密院都統制李顯忠為保信軍節度使兩浙東路馬步軍副都總管顯忠在池州引疾求去故有是命顯忠時年三十有二侍衛親軍步軍都虞候安遠軍承宣使建康府駐劄御前選鋒軍統制王進為池州太平州駐劄御前諸軍都統制代李顯忠也進為都統制不恤士卒惟厚結王繼先及諸内侍士卒皆不喜之此據徐夢莘所編附入乙亥將仕郎毛公亮獻徽宗皇帝御書百軸詔小璽宸翰皆人偽為之可令大理寺根治景福殿使奉國軍承宣使入内内侍省押班邵諤為延福宫使宣政使徳慶軍承宣使入内内侍省押班衛茂實為宣慶使皆以郡亭驛成推恩也丙子左朝請大夫主管台州崇道觀熊彥詩知永州彥詩坐趙鼎客閒廢累年及是秦檜除太師彦詩以啟賀之有曰大風動地不移存趙之心獨刃在前獨奮安劉之䇿檜喜由是稍復録用己卯太傅醴泉觀使潭國公韓世忠奏先䝉賜到田土并私家所置良田歳百數萬石願以三年所収之數獻納朝廷以助軍儲不許上謂秦檜曰唐藩鎭䟦扈蓋由制之不早遂至養成今兵權歸朝廷朕要易將帥承命奉行與差文臣無異也端明殿學士川陜宣撫副使鄭剛中言陜西買馬見今止是宕昌一處茶馬司見差官在彼買發秦茶司自復置以來未嘗一到誠為虛設欲併入川司管幹所有官吏並随司減罷從之敷文閣待制提舉江州太平觀李易卒于秀州訃聞詔本州賜錢三百緡庚辰大理卿周三畏權尚書刑部侍郎左奉議郎高閌守國子司業左從事郎關注為太學正始除學官也閌坐趙鼎客乆廢至是再用之上覽除目曰朕一無所好惟閲書作字自然無勌尚書史記孟子俱寫畢尚書寫兩過左傳亦節一本注錢塘人也直秘閣新通判湖州秦棣充集英殿修撰知湖州壬年詔宿衛親兵非祖宗法可罷内有三路人並改刺充皇城司親從親事官癸未以太師秦檜生辰錫宴于其第檜辭不許自是歳為例徽猷閣待制知静江府胡舜陟提舉江州太平觀先是降授武顯大夫吉州防禦使知邕州俞儋以贓為廣西轉運副使吕源所按事連舜陟故舜陟乞祠也甲申尚書兵部侍郎兼侍讀程瑀兼資善堂翊善丁亥詔輦官以千人為額是歲宗室賜名授官者二十四人諸路斷大辟二十四人河決濟州惟金鄉縣獨存金人移州治縣此據洪邁夷堅乙志附見乙志又載風捲金鄉縣事甚怪今不盡載之初陜西連歲不雨至是涇渭灞滻皆竭五穀焦槁秦民無以食爭西入蜀川陜宣撫副使鄭剛中以誓書所禁不敢納皆散去餓死其壯者北人多買為奴婢郡邑蕩然矣此據洪邁夷堅乙志建炎以來繫年要録巻一百四十七
