body:
  text: 建炎以來繫年要録巻一百三十六宋李心𫝊撰紹興十年六月甲辰朔宰臣秦檜言臣聞徳無常師主善為師善無常主協于克一此伊尹相湯咸有一徳之言也臣昨見達蘭有割地講和之議故贊陛下取河南故彊既而烏珠戕其叔達蘭藍公佐之歸和議已變故贊陛下定弔民伐罪之計今烏珠變和議果矣臣願先至江上諸路師同力招討陛下相次勞軍諭如漢髙祖以馬上治天下不寜厥居為社稷宗廟决䇿于今日如臣言不可行即乞罷免以明孔聖陳力就列不能者止之義從之少師京東淮東宣撫䖏置使韓世忠為太保封英國公少傅淮西宣撫使張俊為少師封英國公武勝定國公節度使開府儀同三司湖北京西宣撫使岳飛為少保並兼河南北兩路招討使日歴獨不載岳飛除命盖秦熺削之也今以㑹要及玉堂制草増入徽猷閣直學士知臨安府張澄試尚書戸部侍郎直寳文閣兩浙轉運副使蒋燦陞直龍圖閣知臨安府武功大夫忠州團練使知商州邵隆兼管内安撫司公事右修職郎新樞密院計議官王湛為右宣義郎上得邊報急召湛至内殿遂命改京官湛以五月壬寅内引今併書之去年三月注邵隆令湛論三京事恐可移附此樞密院降檄書下諸路宣撫司罪狀烏珠薩里干令頒之河南陜西諸路檄書曰盖聞好生惡殺天道之常厭亂喜安人心惟一順天從衆者昌逆天違衆者亡亘古迄今理有不易金人自靖康以來稱兵内侮蕩覆我京都邀留我二聖長驅深入所至焚㓕殆無遺類殘忍不道載籍靡聞前歳忽遣人割還河南故地皇帝深念一紀之間兵拏怨結祸極凶殫南北生靈肝腦塗地許其睦修因以罷兵庻㡬休養生息各正性命仰合于天心既遣行人往議事因使方入境兵已濟舟託為捕賊之名紿我守彊之吏掩其不備襲舊都信義俱亡計多反覆惟彼烏珠號四太子好兵忍殺樂禍貪殘隂蓄無居之腹心為倡亂之首戕殺叔父擅奪兵權既不惜壯士徤馬之喪亡又豈念羣黎百姓之困苦雖外以遺毒于中國實内欲窺圖其厥家天理靡容是將假手人心擕貳必識所歸如彼骨月至親一旦自相魚肉雖爾腹心勲舊豈能自保始終如生熟女眞契丹奚霤渤海漢兒等離去父母妻男捐棄鄉土養種衣不解甲二十餘年死於行陣者首領不保斃於暴露者魂魄不歸爰自謀和始圖休息炎方盛夏驅北復來兵端一開何時始已河東河北京東三路皆吾本朝赤子偶䧟敵中皇帝宵旰不忘日思拯救今者既困暴歛復遭簽發室家田里不得保聚身犯鋒鏑就死何辜三京五路之人方脱囚奴初沾恩澤既未終大事且復憂永淪罪在一人謀己之私毒被寰宇兆民之衆皇帝若曰朕為人父母代天君師兼愛生靈不分彼此㘴視焚溺痛切在躬况彼出師無名神人共怒而我師直為壮將士一心所向無前何往不克本欲為民而弔伐豈忍多殺而示威誓與中外蠲除首惡期使南北共享太平幕府遵奉指揮應南北官員軍民如能識運乘機奮謀倡義生擒烏珠或斬首來歸者大則命以使相次則授以節鉞各賜銀絹五萬匹両良田百頃宅第一區至如薩里干資性貪愚同惡相濟昨在同州已為李世輔擒縳摶頰求哀僅脱㣲命尚敢驅率其衆復犯關陜有能併擒献者推賞一如前約其有鄉黨豪傑忠義舊臣雖遭廹脅之㓙威豈忘國家涵養之大徳糾合戮力建立竒功髙爵厚禄上所不吝前愆往咎一切滌除聖意不渝有如皎月天地鬼神實鍳臨之檄書到日上下寮采逺近兵民遞相告諭共赴斯期富貴之報澤及子孫忠義之名光于史冊悉乃心力其克有勲此檄日歴㑹要皆無之今以四川宣撫司案牘修入丙午詔諸軍今次功賞自節度使至横行天下並空以臨軍給授不待報明申請不礙止法並與轉行仰將佐士卒各思奮勵用命殺敵以赴功名之㑹給事中兼侍講馮檝充徽猷閣侍制提舉亳州明道宫初金人背盟秦檜以其言不讎甚懼一日謂檝曰金人背盟我之去就未可卜前此大臣皆不足慮獨君鄉袞未測上意君其為我探之明日檝入見曰金人長驅南下勢須興師如張浚者且須以戎機付之上正色曰寕至覆國用此人檜聞之喜曰適觀天意檝必被逐即引疾求去乃有是命趙之遺史云金人叛盟檝見秦檜曰金人欲舉兵南下公踈于用兵宜早召張浚以督諸將檜曰善公當來早上殿薦之次日檝上殿奏曰金人南來朝廷未有應之之䇿惟疾召張浚都督諸軍爾上乆知張浚敗事乃曰朕雖亡國不復見張浚檝大沮乃乞宫祠遂罷去先是僧圜浄者寓居王繼先後圃中禪學甚髙檝逕謁之談禪移時繼先欣欣然欲見之檝不交一談繼先方慿恃恩寵勢熖熏灼譛大慚逐其僧而逐之按檝素附和議以其去春所上書觀之恐不能然今從王明清揮麈後録明清又云檝與檜言已必被遂願乞瀘州以為畫繡至晚批出興外任遂除待制知瀘州師瀘南者十三年此却不然按檝奉祠遄即得郡先卭後瀘明清所記不審鎮潼軍節度使開府儀同三司新知明州信安郡王孟忠厚復為醴泉觀使尚書左司員外郎范濬罷知南劍州此必有故當攷寳文閣直學士提舉江州太平觀梁汝嘉知平江府既而殿中侍御史羅汝檝論海西道可虞乃以汝嘉兼浙江沿海制置使汝嘉兼制置在是月乙丑右朝奉即新知河南府仇畬復徽猷閣待制明州兼沿海制置使畬言敵情從來詭詐乘間陟險必出我不意今舟船廢壊畧盡望申飭州縣恊力赴功其或怠忽不䖍從臣按劾許之丁憂人盖諒起復左朝請大夫行司農寺丞武畧大夫威州團練使李貴陞登州防禦使貴州兵平䖍吉筠諸盗招降首領百餘人脅從者六千餘人故有是命丁未罷建康府行宫營繕戊申龍神衛四廂都指揮使濟州防禦使東京副留守劉錡為鼎州觀察使樞宻院副都承㫖沿淮制置使時敵衆圍順昌已四日乃移寨於城東號李村距城二十里錡遣驍將閭充以銳卒五百募土人前導夜刼其寨至軍中氈帳數重朱漆奚車有一師遽被甲呼曰留得我即太平不聼竟殺之是夕天欲雨電光所燭見辮髪者殱之甚衆既而報都元帥越國公宗弼親擁兵至先是宗弼在龍徳宫得告急之報即索靴上馬麾其衆出京頃刻而集過淮寜宿一宵治戰具備糗糧自東京往復一千二百里不七日而至錡聞宗弼至近境登城㑹諸將佐東門問䇿将安出或謂今已屡㨗冝乘此勢具舟全軍而歸錡曰朝廷養兵十五年正欲為緩急之用况已挫敵鋒軍稍振雖多寡不侔然有進無退兼敵營近三十里而四太子又來援吾軍一動彼敵追及老少先亂必至狼狽不惟前功俱廢致敵逐侵両淮震驚江浙則平生報國之志反為悮國之罪不如背城一戰死中求生可也衆以為然欲求命錡呼帳下曹成等二人諭之曰吾遣爾來間事㨗有後賞第如我言敵必不殺我今遣錡綽路置汝隊中汝遇敵必墜馬使為所得敵師問我何人則曰太平邊子帥喜聲色朝廷以兩國講好使守東京圖逸樂耳已而遣探騎果遇敵二人被執烏珠問對如是烏珠喜曰可蹴此城耳遂下令不用負鵞車砲具行翌日錡行城上見二人逺來心知其歸即縋上敵械二人以文書一巻繫于械錡取焚之錡夜刼敵寨乃初二日乙巳登城㑹諸将乃初五日戊申今併書之熊克小歴載錡丁未㑹諸将盖差一日直秘閣知廬州李仲孺為淮南西路轉運副使専一應副劉錡李顯忠王徳雷仲軍馬錢糧詔令廸功郎權虹縣李諷主簿右廸功郎曹伯達並改京秩仍更轉二官縣尉秉義郎崔彦文監酒務承信即陳卞並除閤門祗候其餘見任寄居官各轉一官資以其焚天眷三年文榜抗拒金人故也時武功大夫貴州團練使司知宿州劉綱行至符離而舊守景祥以城叛武功大夫貴州刺史應天府路兵馬都監王存挺身南歸綱不能禁乃改知泗州仍知虹縣𨽻之日歴綱改知泗州在閏六月三日乙亥恐悮當是前六月三日丙午己酉四川宣撫使胡世将命都統制吴璘楊政之以書遣右副元帥薩里罕約合戰其畧曰璘等聞之師出無名古之所戒大金皇帝與本朝和好復歸河南之地朝廷毎戒諸路安静邊界不得生事丁寜惻怛無所不至諸路遵凛朝廷約束不敢毫髪有違今監軍忽舉偏師侵暴疆埸人神共憤莫知其故璘等身任將帥義當竭誠報國保捍生靈已畢大軍約日與監軍一戰兵法敵加于己不得已應之謂之應兵兵應者勝璘等不為無辭薩里罕於是遣呼紐即君以三千騎直衝我軍都統制李師顔等以驍騎擊之走呼紐入扶風縣守城薩里罕别遣軍䇿應不能勝而退師顔等攻扶風㧞之生擒金兵一百七十人首領三人别遣禆將又擊鳯翔西城外敵寨薩里罕怒自戰于北通坊列陣二十里許統領姚仲等戰力破之殺獲尤多先是上聞敵兵渡河以御扎賜世將令率厲將士保捍關隘有能建立竒効卓然出衆雖王爵節鉞亦所不吝又賜吳璘楊政郭浩田晟詔書諭㫖仍命世將給付焉百通坊之㨗㩀宣撫司申以六月二十二日得報未見本日是日金都元帥越國王宗弼入泰和縣庚戌工部尚書廖剛與外任仍放謝辭初劉昉陳淵之罷也剛言嘗薦二人自代人嘗于榻前引薦二人乞罷黜詔放罪剛因已致仕又自言有冝去者六不許㑹剛以事積忤秦檜右諌議大夫何鑄等即共劾剛謂昉淵已力薦導獨以為賢幸朝廷之有警復肆以譊譊以感紳故有是命尋以剛為徽猷閣直學士提舉亳州明道宫剛放罪在四月戊辰乞致仕五月辛巳除奉祠在六月己未今聨書之徽猷閣待制提舉江州太平觀李彌大復顯謨閣直學士致仕時彌大已卒矣壬子祕閣修撰新陜西轉運使薛弼為尚書左司員外即是日金都元帥宗弼攻順昌府先是宗弼親至城外責諸將用兵之失衆曰今者南兵非昔之比國王臨城自見宗弼見其城陋謂諸將曰彼可以靴尖趯倒耳即下令來早府治㑹食諸軍所得玉帛子女聼其自留男子長成者皆殺之折箭為誓以激其衆平明敵併兵攻城凡十餘次府城惟東西兩門錡出兵應之敵又敗退烏珠自將牙兵三十往來為援皆帶重甲三人為伍貫韋索號鐡騎馬左右翼號拐子馬悉以女真充之前此攻所難下之城並用此軍故又名長勝軍時敵諸帥各居一部衆欲擊韓軍錡曰擊韓雖退烏珠精兵尚不可當也法當先擊烏珠烏珠一動則餘軍無能為矣時叛將孔彦舟酈瓊趙榮背騎列于陣外有河北僉軍告官軍曰我軰原是佐䕶軍本無闘志惟兩拐子馬可殺故官軍皆憤時方劇暑我居逸而彼暴露早凉則不與戰逮未申間彼力疲而氣索錡忽遣數百人開西門敵方來接戰俄以𢾗千人出南門戒令忽喊但以短兵極力與戰統制官趙樽韓直皆被数矢戰不肯已錡追屬扶歸士殊死鬪入敵陣中斫以刀斧至有奮手捽之與俱墜于濠者敵大敗殺其衆五千横屍盈野烏珠乃移寨於城西掘塹以自衛欲為㘴困官軍之計是夕大雨平地水深尺餘錡遣兵刼之上下皆不寧處乙邜順昌圍解都元帥宗弼之未敗也秦檜奏錡俾擇利班師此㩀郭喬年順昌破敵録修入喬年云遞到御筆云云其實宰相所擬也錡得照不動至是宗弼不能支乃作筏繫橋而去宗弼至泰和縣卧兩日至陳州數諸将之罪自將軍韓常以下皆鞭之於是復以葛王褎守歸徳府常守許州翟將軍守陳州宗弼自擁其衆還汴京自是不復出師矣何俌龜鑑敵之犯我順昌也靴尖趯城之語此豈可聞也哉劉錡實當之觀其鑿舟而沉示無去意背城借一死中求生或以神臂強弩而邀擊或以刀斧入陣而奮捽卒至八字軍徼利先擊烏珠之謀定而鐵浮屠之兵已懼矣是役也敵欲捐燕以南棄之其孰使之畏也丙辰樞宻院檢詳諸房文字陳正同主管官告院呈正表並罷坐與廖剛比朋變亂是非故也是日湖北京西宣撫司統制官牛臯及西人戰于京西敗之戊午詔將士戰死者贈官推㤙如故事軍士重傷不任征役者廩給終其身右承事郎監潭州南嶽廟陳鼎降一官放罷日下出門鼎權監都進奏院上言敵於今日敗盟乃朝廷之福未敗則他日之禍有不可支持願乘此早為自治之䇿秦檜怒其言因論鼎藉廖剛為地求易差遣故有是命俄又送吏部以鼎知徳興縣已未徽猷閣待制新都大提舉川陜茶馬公事張宗元提舉醴泉觀兼詳定一司勅令宗元之官至酇陽遇敵而歸故改命感徳軍節度使開府儀同三司充萬夀觀使髙世則為景靈宫使判温州主奉本州神御是日樞宻院都統制郭浩遣統制官鄭建充等集鄜延環慶之兵攻金人於醴州敗之復醴州三京招撫處置使劉光世進軍和州辛酉順昌㨗奏至徽猷閣待制新知潁昌府陳橐知處州橐請追還職名不許詔賜三京招撫司都統制李顯忠所部將官拓㧞忠等六人金帯以嘗有戰功故也時招撫處置使劉光世奏顯宗𦵏其父乞官與之費詔以賜萬緡中書舍人林待聘言陛下多顯忠之自歸而憫其家禍不待殊功著顯而置高位曩邊警亟聞誠顯忠竭盡之秋也而計奪于聲懼形于色屈指命日以䇿川陜之䧟安在其謀且勇兵才二千行迨宿泗什七亡之安在其得士心緡錢十萬以為軍資盡且復丐又三倍所求無厭必驕且望願寝其賜從之是日川陜宣撫司奏㨗上以親札賜胡世將曰石壁去河池不及十程料北敵有窺川之意卿須明逺斥堠勉勵將士要是慮常敵在先仙人關雖險切不可因循縱敵稍近也壬戌詔敵人侵犯河南己决䇿用兵所冝經理財用以贍軍旅帥守諸司自當體國協濟大計可將應見管錢物量留經費外盡數起發有能率先應辦當加以擢如隱占不實必寘于法並謂在官錢物不得因縁擾民朱勝非秀水閑居録紹興十年秦檜為相下令云舉兵擊敵須備犒賞計畝率錢徧天下五等貧民無得免者所歛號吉賞而兵未嘗舉百姓尤以未怨與此指揮全不同詳見今年九月辛丑並注端明殿學士僉書樞宻院事樓炤以父右通政大夫居明卒去位徽猷閣待制致仕賈安宅卒安宅以八年正月致仕甲子命齊安郡王士㒟權主奉濮安懿王祠祀先是瓊㳟惠王薨大宗正司議襲封者得武徳即士鼘朝議以其卑官不可驟拜乃命士㒟焉是日權祖管鄜延經畧司公事王彦拒金人於青溪嶺却之初右副元帥薩里罕既破鳯翔與都統制吴璘楊政夾河而陣璘駐兵大蟲嶺薩里罕自登西原覘之曰善戰者立於不敗之地此難與争乃引去自涇原路欲趨邠於是樞宻院都統制郭浩統右䕶軍及鄜環之師在邠州三水縣涇原經畧使田晟遣統制官曲汲秦弼拒敵于青溪嶺宣撫副使胡世將謂浩素非臨行陣之人難以責成即遣彦及統制官楊從儀程俊向起鄭師正曹成等分道而出與敵戰蒿谷吳頭麻務屯之間金人屡敗留千户五人守鳯翔薩里罕自將越兵攻青溪汲弼不能當戰敗棄青溪走世將命晟召汲斬於軍前以徇彦率兵迎金人戰盤堠兎耳敗之金人去復還屯鳯翔乙丑詔國學進士項充旌表門閭充龍泉人少養於兄洵美及長請以家資盡與其兄州上於朝故旌之直秘閣荆湖北路提㸃刑獄公事向子忞罷先是江西漕司負月樁錢詔總領官曽慥劾罪子忞行部取漕吏釋之慥言於朝故罷既而子忞上疏訟慥與新除左司郎官薛弼表裏中傷子忞坐奪職子忞奪職在七月己未子忞再使湖北先聲入境姦吏望風解印綬者數十人湖北營田舊以抑配百姓人不聊生有破産不能償者日號訴於馬前子忞為訊究其便利可行者使遵守之罷一切抑置者逺近鼓舞時岳飛兼營田大使無敢忤其意者至是飛亦喜以為當然子忞按部所至立大榜於前云乆負抑屈州縣不理者立其下於是積年無告之寃咸得伸雪平生好論人物無所忌諱嘗與胡安國談當世士安國頗稱秦檜靖康時事子忞曰與檜同時被執軍前鮮有生者獨檜𢾗年之後盡室航海以歸非大姦者有是乎安國子寅初猶以為過後乃信服子忞再以毁去自是閒居十九年初命司農少卿李若虛往湖北京西宣撫使岳飛軍前計議至是若虛見岳飛於德安府以靣得上㫖兵不可輕動宜且班師飛不聼若虛曰事既爾勢不可還矯詔之罪若虛當任之飛許諾遂進兵丙寅武翼大夫文州團練使閣門宣贊舍人河南府路馬歩兵副總管孫揮上將佐死事於朝詔贈官推恩有差左從政郎張闡為秘書省正事闡因轉對論三事其一請廣求人才任将相練士卒則徽宗梓宫可還母后淵聖可歸毋專屈己和戎使權不在我二曰臣比自温歴處婺浹旬再值雨雹麥秀者偃桑萌者落盖恐懼修省以召和氣其三論官冗曰兵火後户不滿千户設官乃十餘人州不滿萬戸而官至百餘人塲務及官兵十員無學校而置教官無軍士而置將領駐泊鈐轄之屬及員外署者不在焉昔漢光武併省四百餘縣吏員十置其一唐憲宗用李吉甫言省冗貟八百吏千四百漢唐中興宜以為法上奨諭曰非卿不聞此闡轉對不得其日以疏申言桑麥事考之恐今年夏秋間所上也且初因除附見之湖北京西宣撫使統領官孫顯及金人戰于陳蔡間敗之是日行營左䕶軍都統制王徳至順昌府初上命淮西宣撫司張俊遣徳以所部授劉錡俊既不樂錡而徳復懼撥𨽻劉光世軍遷延未行建康留守葉夣得諭曰徳朝廷頒賞格能立竒功者使相節度皆即軍中書告舊未聞也且劉錡名素出君下今自奮報國君能救錡則可謂竒功矣徳遂行未至而敵以去徳以數千騎入城與錡相見俄復還廬州郭喬年順昌破敵録云錡方被圍時遣价求援於朝得報已差行營左䕶軍統制王徳引率全軍來援十二日金人既退之後徳方移文來問敵勢動息二十三日邜時以數騎到城下錡邀入共飰食以憇囘又數日上申時出門遣人致意曰不果奉别今且復囘又數日傳聞申樞密院某己解順昌圍矣方敵在城下得遞到御筆劉某擇利班師錡以方應敵未敢輕動敝退後十日又被㫖先發老小還住鎮江遂津發老小輜重並被傷之士舡載而行以統制官杜杞焦文通兩軍防䕶東下又聞徳申宣撫司云某以全軍裏送劉太尉老小出潁河矣丁邜上謂大臣曰朕躬履艱難乆於兵事至於器械亦精思熟講昨造大鏃箭諸軍皆謂頭太重不可及逺又造鋭首小鎗初亦為以未然其後用以破敵始服其精利今劉錡軍於順昌城下破敵正用此鎗也戊辰右朝請大夫主管台州崇道觀李弼儒復直秘閣充三京招撫處置使司參謀官左朝㪚即知通州趙詵之罷㘴申明移治事渉張皇后也左朝奉郎新應天府路轉運判官曽䋖之知州是日川陜宣撫司都統制楊政所遣左部統領官曹成自汧陽襲金人於天興縣敗之庚午龍神衛四廂都指揮使鼎州觀察使樞宻使都丞㫖㳂淮制置使劉錡為武泰均節度使侍衛親軍馬軍都虞候前一日上諭大臣曰用兵之際賞罰欲明錡以孤軍挫敵鋒烏珠遁去其功卓然當便除節鉞即日降制既用遣中使撫問上賜札有曰卿之偉績朕所不忘時韓世忠與劉光世張俊與錡皆不相能御史中丞王次翁言曰臣問世忠之與光世因言議而隙俊之於錡因措置而揆竊恐錡保一孤壘光世軍處窮獨俊與世忠不肯急援願遣使切責因用郭子儀李光弼以忠義泣别相勉者以感動之時諸将驕而次翁彈擊不避方乞斬呼延通時上勞之曰卿有李勉之風矣京東淮東宣撫使韓世忠遣制官王勝率背嵬将成閔化北伐遇金人於淮陽軍南二十里水陸轉戰掩金人入沂河死者甚衆奪其舟二百熊克小歴載此事於辛未小誤按世忠申在六月二十七日庚午今附本日是日國子監丞髙頴守尚書工部員外即此㩀本部題名資政殿學士致仕馮澥薨資政殿大學士福建路安撫大使張浚言臣竊願自羣下决囘鑾之計國勢不振事機之㑹失者再三向使敵出上䇿還梓宫歸兩殿供須一無所請宗族隨而盡南則我德敵必深和議不㧞人心懈怠國勢寖微異時釁端卒發何以支持臣知天下非陛下之有也今幸上天警悟敵懐反覆士氣尚可作人心尚可囘願因權制變轉禍為福用天下之英才據天下之要勢奪敵之心震我之氣措置一定大勲可集繼聞淮上有警連以邊計奏知又條畫海道舟船利害上嘉浚之忠遣中使奨諭浚時治海舟至千艘為直指山東之計以俟朝命閏六月癸酉朔權尚書户部侍郎晁謙之移工部侍郎時廣東提舉茶鹽公事晁公邁權市舶以貪利為大食進奉使滿亞里所訟詔監察御史祝師龍大理寺丞王師心徃廣州劾治謙之引嫌乞閑慢差遣故有是命於是公邁坐免官而顯謨閣待制知廣州張致逺因亦罷去師心金華人也公邁之罷在甲戌致逺之罷在戊寅右承務郎王寵監登聞鼓院先是樓炤言寵不為偽齊之節既命改京秩遂有是命寵丹州人先見紹興三年按日厯寵此月十一日改官乃命除檢院之後且附此必有一誤當求他書攷証之是日四川轉運副使井度始受命度言成都潼川兩路對糴並脚錢折納米今運至魚闗計闕二百萬緡無所從出乞每石復理十千宣撫副使胡世将從之世将又以便宜命陜西轉運副使霍蠡兼權主管川陜茶馬公事知鳳州閻大任權陜西轉運判官又増本司激賞錢為一百萬十餘緡此事皆未見本月日因書井度到任權附此俟攷先是諜報疊州蕃首結南渴聚衆三千欲犯隴州世将乃以統制官邵俊知鳳州制置秋防原守禦仍檄都統制楊政備之甲戍都省言觀文殿學士東京留守孟餘資政殿學士南京留守路允廸並已投降敵人殊失為臣之義詔庾允廸追見任官職庾家屬送漳州允廸家屬送全州並居住右通直郎添差通判衢州張汲罷仍居綿州令衢州發卒䕶送直秘閣知太平州秦梓移常州丙子詔三衙管軍及觀察使已上各舉智勇猛才畧堪將帥者二人不拘資格尚書吏部員外郎錢葉復為監察御史鎮梓軍節度使開府儀同三司醴泉觀司信安郡王孟忠原知婺州資政殿學士知紹興府韓肖胄提舉臨安府洞霄宫從所請也資政殿大學士江南西路安撫制置大使兼知洪州張守移知紹興府權吏部侍郎周綱自韓世忠軍前計議還入見戊寅上曰敵人犯境諸軍不免調發盛夏劇暑朕䕃大厦御絺綌猶不能勝其熱將士乗邊暴烈日被甲胄毎念熏灼之苦如切朕躬可降詔撫問慰勞之左奉議即胡寅充徽猷閣直學士知永州直秘閣新京畿路轉運副使李伯逹為廣州西路提㸃刑獄公事左朝㪚大夫万俟卨為京湖南路轉運判官辛巳涇源經畧使田晟及金人戰於涇州敗之初右副元帥薩里罕既為王彦所却事見六月甲子遂自鳯翔悉兵攻涇州晟據山為陣乘敵壁壘未定奮兵掩殺自已至申連戰皆㨗奪其戰馬兵械甚衆金人敗走癸未左朝㪚大夫新除荆湖南路轉運判官万俟卨秘書丞楊愿並為監察御史甲申上曰諸將進兵所在克㨗正恐狃於屡勝士浸以驕可下詔飭其嚴飭行伍明逺斥堠蓄力養威以俟大舉勿爭尺寸之利期以殄滅强敵而己上又曰金雖外國茍知効順何以多殺為馬欽等初歸朕貸而不殺劉光世屢以為言既而女直契丹燕人來歸者甚衆光世方悟朕意至今諸軍往往收以為用今交兵之際正宜多方撫納使知内嚮左朝㪚即新㳂海制置使司參議官王安道直秘閣提舉淮南東路茶鹽公事兼措置料角斥堠安道除職在癸未今聨書之武功大夫果州團練司洪州兵馬鈐轄殿前司左翼軍統制申世景提舉台州崇道觀罷從軍用主帥楊沂中請也是日田晟及金人再戰於涇州敗績初金人既為晟所破㑹偽將引敵入取間道繞出晟所駐山後大呼擊晟而晟所領兵有舊嘗從偽者望風驚潰惟右䕶軍萬人與敵鏖戰中傷死敵者什一然無一人遁者宣撫使副胡世將具以實聞且罪在先是世將以敵鋒鋭甚意晟不能獨當檄兩都統令呉璘守河南楊政如涇州䇿應政遣統制樊彦率兵以往統制王喜繼之未至而晟以政自劾失律世將不之罪諸軍請斬彦喜以徇世將下令彦代命追奪在身官爵喜降十官皆押赴本軍自効金人雖幸勝晟亦殺傷過當而還自是歸鳯翔不復戰以兵攻陜西諸鄉城守未下者河南糧食垂盡世將亦離河池登仙人原山寨為防秋之計保儉以自固矣趙甡之遺史田晟及金人戰于陘州敗績將戰晟命軍中卷旂而出衆怪之陣未合而遁盖甡之得于所聞不如接戰之詳也今不取乙酉徳音降陜西路雜犯死罪囚釋流已下此據紹興講和録日歴無之右武夫夫髙州刺史新鄜延路馬歩軍副統管劉光逺陞忠州團練使知真州保義即閣門祗候劉釗為武修即右廸功郎王義賔為右承奉即釗弟也又與光逺希賔皆自順昌來奏事既對遂有是命是日川陜節度使司胡世将奏姚仲鳯翔之㨗事見六月己酉又具言吳璘身死士卒楊政奮不顧家功効顯著不先賜以旌賞無以激勸將帥又言郭浩素非親臨陣敵之人難以責成臣以差吳璘充陜西諸路節制軍馬同田晟同去青溪與浩並無相妨浩言本司文移畧不照恤臣以為大敵在前文移之間不得以觀望逗遛之言嚴行督責上下速赴事在即非不相照恤慮浩不切體任國事至重妄生疑忌亂有申陳有誤事機先是浩亦以解圍耀州徑申樞密院朝廷以三將權任相敵遂俱賞之丙戌寳文閣學士川陜宣撫副使胡世將陞端明殿學士定國軍承宣使知秦州兼行營右䕶軍都統制同節制陜西諸路軍馬吳璘武康軍馬宣撫使知興元府兼川省宣撫使司都統制楊政彰武軍承宣使知永興軍兼樞密院都統制節制本路屯駐右軍䕶軍馬兼制節陜西諸路軍馬郭浩並為節度使璘鎮西軍政武當軍浩奉國軍三人皆自龍神衛四廂都指揮使申充侍衛親軍歩軍都虞候時政丁母憂制起復改起復在是月丙申詔曰敵人不道荐肆凶殘王師所臨無往不克㨗奏繼至俘獲踵庭尚虞狃吾屡勝之威忽彼不虞之戒天下本吾一家豈貪尺寸之利敵人亡在朝夕必有殄㓕為期咨爾六師咸體朕意熊克小歴載此詔在二十六日戊戌今從日歴尚書戸部員外郎曽慥為太府少卿慥總賦京北就陟之也詔秘書即鄭轂與外任遂以轂知臨江軍此必有故當攷是日淮西宣撫司都統制王徳復宿州張浚既初得合淝聞敵宿亳間命統制官趙密出西路密引衆徑去蘓村水時漲三尺渉六晝夜乃達宿城與敵遇敗之而徳率衆自夀春趨宿州夜半破敵營降其守武異大夫閤門宣贊舍人馬秦丁亥手詔釋順昌府流以下囚再復民間租稅二年在城守禦官各進一官戊子龍圖閣直學士知順昌府陳規充樞密直學士録守城之勞也既而規言敵人敗盟臣倉皇措置数日之間守具畧備而劉錡將士毎出毎㨗致敵不敢逼近府城此皆錡之功臣何力之有望追寝成命詔不許郭喬年順昌破敵録云初破金人陳規送酒十數石門首犒戰士才一杯而已再追敵後市户以麺一萬六千餘斤猪一百口來獻随即分俵諸軍人不過得麺半斤肉𢾗兩至第二戰錡不免諭規畧與犒勞官軍但告示人給粟一石及赴倉又只得腐麥五斗者甚多及事定規又首具奏乞推恩本府守城官屬且鼓率將佐犒賞戰士方遂致成功鑄保明奏之將士頗為之不平按規守順昌正當金人根括錢帛之餘朝廷蠲免税租之始未成一嵗而戰士二萬不致乏糧斯亦難矣若責其厚賞犒軍恐無此理今不取右文殿修撰四川轉運副使陳逺猷致仕此據本司題名未知其故當考己丑資政殿學士江南東路安撫制置大使兼知建康府葉夢得陞資政殿大學士京東淮東宣撫處置使韓世忠遣統制官武功大夫閤門宣贊舍人郭言儀左武大夫貴州團練使韓彦成來奏事上引對先是世忠圍淮陽軍未能下或有獻計决淮水以灌其城者上諭秦檜曰决水所及京東民田必有被其害者檜曰陛下聖度兼爱如此宜無敵于天下也上語在是月辛邜是曰金人遣兵襲永興軍兵馬鈐轄傅忠信於華州之山寨忠信率将官盧士閔張寳拒破之時以忠信等自㧞來歸各進三官忠信領華州觀察使士閔遙郡刺史寳閣門制贊舍人忠信等遷官日歴不載林待聘外制集有之日歴今年七月己未奏㨗不知何時遷官或即胡世將便冝所授也壬辰湖北京西宣撫使統制官張憲傅選及金将韓常戰于潁昌府敗之復潁昌甲午顯謨閣待制樞密都承㫖周聿自張俊軍前計議還入見丙申張憲復淮寕府先是韓常既敗走宣撫使岳飛遣統制官牛臯徐慶䓁與憲㑹憲等與常戰于淮寕府又敗之常引去飛以勝㨗軍統制趙秉淵知府事丁酉特進提舉臨安府洞霄宫趙鼎責授左中大夫秘書少監分司西京興化軍居住初鼎罷郡歸紹興上書言時政秦檜忌鼎復用乃令御史中丞王次翁劾鼎頃以失職去位既罷泉州一向北來已至紹興逼近行朝隂幸有警規圖復用門下黨與往來於臨安選造事端鼓惑衆聴以揺人心雖鼎詭計姦謀善自彌縫莫可指其迹狀亦有顯戾於法而有實迹者靖康之末鼎隂結王時雍受偽命為京畿提刑一也鼎以元樞都督荆襄未㡬拜相遂罷都督而乾没官錢十七萬緡二也臨安府前後闗借什物三千餘件盡掩有之三也鼎在紹興偶士㒟祇謁陵寢續除辛永宗京畿提刑相繼來朝鼎已致情懇又親書簡扎求哀士㒟四也伏望按鼎之罪顯置於法後旬日次翁又言聞鼎之徒黨獻謏於鼎者咸曰特進者宰相所帶之官階今鼎雖曰謫降而官階尚是特進則是天子不罷鼎之相矣左揆虛位待鼎補衮是以日久覬覦姦計百生右諌議大夫何鑄亦再疏論之乃有是命朱勝非秀水閒居録云堂饌自艱難以來至為菲薄鼎増厚十倍日有㑹集其後鼎坐臺疏落職守泉累章數千言而乾没都督府錢十七萬緡竊用激賞庫錢七十餘萬緡掩有臨安府什物三千餘件乃章中一事命下人皆謂鼎必辨而不辨也按勝非所云恐失其實今不取湖北京西宣撫使司統制官郝晸張應韓清克鄭州是日京東淮東宣撫司都統制王勝克海州先是韓世忠命勝率統制官王權王升等攻海州守將王山以兵逆戰去城六十里與官軍遇敗走夜二鼓勝以舟師傅城北山乘城而守勝命諸軍分地而攻火其北門軍士周成先入生執山父老請裒金帛以犒軍勝不受世忠毎出軍必以秋毫無犯軍之所過耕夫皆荷鋤而觀戊戌左武大夫果州團練使知陜州呉琦兼管内安撫使是日淮西宣撫使張俊克亳州初三京招撫使劉光世聞酈瓊在亳州遣使臣趙立南京進士蔡輔世同往招之及門門者問故立鄙人無謀乃言劉相公遣我持書來招酈太尉守者以白瓊不啟書而焚之械送獄既而縱之至是光世引軍還太平而俊以大軍至城下都統制王徳已下宿州即乘勝趨亳州與俊㑹瓊聞之謂葛王裒曰中興遺史但云三路都統即葛王也夜义公來矣其鋒未易當請避之遂率衆遁去俊軍至城下父老列香花迎軍俊引兵入城時俊軍威甚盛而智謀勇敢頼徳為多徳亦先計後戰故未甞敗己亥樞密直學士知順昌府陳規知盧州武泰軍節度使沿淮制置使劉錡兼權知順昌府時秦檜將班師故命規易鎮淮右先是上賜錡空名告身千五百命書填將佐之有功者錡復繳上謂不若自朝廷給之為榮至是始具功狀以聞凡統兵官之立功者皆以上所賜椀帶予之其有過者則杖責之斥為士伍敵之始至也游奕軍統領田守忠正將李忠恃勇深入皆手殺數十人而後死錡厚加優恤遂以犒軍銀帛十四萬匹兩均給將士軍無私焉於是錡方欲進兵乗敵虛而檜召錡還徽猷閣待制洪皓時在燕山密奏順昌之役敵震懼喪魄燕之珍寳悉取而北意欲捐燕以南棄之王師亟還自悞機㑹可惜也順昌破敵記曰王山言金國見只有烏珠主兵權先是舉國内兵盡赴祁州大閲舉所閲之兵盡隨烏珠南下烏珠之在順昌也三郎君破于陜西亦來告急是時南宋若更有一項兵乗此而來敵可擒也飛何俌龜鑑敵至宿亳王徳得以破其營敵至潁昌岳得以殺其將或㨗于鳳翔或捷于寳雞或捷于扶風又皆呉璘楊政保蜀守蜀之功而敵之回軍直趨濠州我諸將得以聨兵制之當是時也無一人不勇無一戰不勝葢不止有一月三捷之告非敵至此不善戰也直以我師正鋭所向無前吾觀敵帥告烏珠曰今者南兵非昔日比而敵兵望見王師且曰此順昌旂幟也亟退避之除兇雪恥此葢可乗之機也撫機不發何為也耶入吕中大事記烏珠敗盟入犯不惟劉錡以八字軍直敵陣大捷于順昌而李寳捷于興仁姚仲等捷于鳯翔牛臯捷于京西孫顯捷于陳蔡曹成捷于大興縣王勝成閔捷于淮陽揚從儀捷于寳雞縣王貴姚政捷于頴昌府王俊捷于東路口邵俊王貴捷于淮陽呉璘捷于陜州韓世忠捷于泇口楊沂中捷于拓皋而岳飛捷于郾城乗勝逐北兵至朱仙鎮距京東四十五里矣洪皓燕山之奏謂順昌之役敵震懼喪魄欲捐燕以南棄之又謂敵以厭兵朝廷苦乗勝進擊再造猶反掌耳葢誠然也而秦檜主罷兵和議已定矣庚子責授左中大夫秘書少監興化軍居住趙鼎再責清逺軍節度副使潮州安置先是右諌議大夫何鑄言近者臺臣論鼎姦凶四事皆古今大臣所無而其間甚害者有三焉其前二事則大逆不道之罪也若鼎實無之則臺臣當扺妄言誣人之誅若鼎實有之耶今猶秩以中大夫之崇資處之興化之善地臣恐罰不足以當罪疏奏詔鼎降左朝奉大夫移漳州御史中丞王次翁又言鼎兩為宰相義當同國休戚乃敢纔聞邊警喜見顔間繩以漢法當伏不誅之道責以春秋當坐誅意之罰今朝廷雖再行貶責然朝奉大夫之視中大夫品秩不至相遼漳州之比興化軍尤為善地以此示罰人將玩刑鑄奏再上遂有是命林泉野記云敵背盟鼎上書言時政檜方専朝大忌其能心欲殺之諷中丞王次翁誣言其罪責授朝議大夫分司南京召武軍居住又令次翁誣以聞敵敗盟甞有幸言上亦每御鼎言語切直責授清逺軍節度副使潮州安置制畧曰朋姦罔上惡殆並於共兠専制擅權罪實侔於陽李按此時林待聘程克俊王鈢並為舍人而林待聘外制集無鼎責詞不知果何人所行也淮西宣撫使張俊既破亳州遇大雨士皆坐于水中俊遂引軍還夀春留雄勝軍統制官宗超守亳州以兵千人與之民皆失望初武功大夫忠州團練使楊珪守濠秩滿度淮居宿州聞金人入犯即走京師上書獻取江南之䇿越國王宗弼不用復還宿州張俊軍至宿亳間珪又為平戎書以獻俊知其干宗弼不中乃與歸殺之塗中以逃亡聞掲榜石人捕之建炎以來繫年要録巻一百三十六
