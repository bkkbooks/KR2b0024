body:
  text: 建炎以來繫年要録卷一百五十八宋李心傳撰紹興十有八年秋七月壬戌太尉安慶軍節度使提舉萬夀觀邢孝揚特許任便居住以孝揚引疾有請也甲子御史臺主簿陳䕫諸王宫大小學教授曹筠並守監察御史䕫永嘉人初見十三年時二人俱引對䕫乞申嚴內外謁禁筠乞戒𠡠守令務在安靖於是二人同命䕫奏劄以是月己巳行下筠奏劄以是月癸酉行下今聨書之乙丑右朝奉大夫新江西轉運判官賈直清乞於縣官中選有出身人兼縣學教導上謂大臣曰州縣選官教導乃教化本原將來三年科場亦有人材可備採擇乃令禮部參酌如所請八月壬辰行下壬申右承事郎韓彥古直祕閣彥古世忠少子也癸酉皇叔光山軍承宣使知西外宗正事士樽為嶽陽軍節度使甲戌尚書禮部侍郎周執羔右司員外郎權中書舍人吳㮚並罷以殿中侍御史余堯弼論執羔送伴北使至平江輒生事㮚急躁好罵故也入內內侍省押班張見道升延福宫使見道與其養子內侍省押班去為並為景福殿使去為請以解帶一官回授見道上許之丁丑殿中侍御史余堯弼守侍御史右正言巫伋守右司諫仍並兼崇政殿說書尚書祠部員外郎陳誠之試國子監司業祕書省著作佐郎兼普安恩平郡王府教授王墨卿守起居舍人戊寅言者乞令州郡建閣以藏宸翰上以其勞民不許癸未敷文閣待制提舉江州太平興國宫張嵲獻紹興中興復古詩詔嘉奬嵲尋卒甲申直敷文閣知臨安府湯鵬舉言陛下獨任一德臣以偃干戈皇華交贄結轍於道而沿流諸邑或尚存苃舍以待使人望詔有司下所經由程頓並令修建庶幾賓至如歸從之限今冬畢八月丙戌朔右朝散大夫知鎮江府榮嶷知揚州龍圖閣直學士提舉江州太平興國宫李逮卒丁亥刑部員外郎張燾面對乞闢太學增弟子員詔禮部看詳降授武功郎韋訊復達州刺史添差兩浙東路馬步軍副總管崇慶軍節度使致仕葉夢得薨於湖州贈檢校少保戊子樞密院編修官林機祕書省校書郎劉章並為著作佐郎兼普安恩平郡王府教授己丑左宣義郎何逢原充樞密院編修官辛卯刑部郎中李如剛轉對乞諸路憲臣不親行踈决者令帥漕紏舉以聞詔申嚴行下如剛濟南人也閬州觀察使知閣門事何彥良卒癸巳權禮部侍郎沈該乞四川類省試合格不赴殿試人第一等並賜進士出身餘人同出身從之自行在吳中蜀士不就廷試榜首率依第三人推恩講和後稍稍來奉大對是舉類試策問古今蜀人材盛衰之故而德陽何耕對策極論蜀士狥道守節無心於世引楚相子文三仕三已之說為證又言李固無大雅之明哲卒陷於跋扈將軍之手議者固己少之若相如作封禪書蓋孟子所謂逢君之惡楊子雲作美新以媚賊又蜀人所羞道有司定為榜首秦檜見其州里大惡之曰是敢與張德逺為地耶㑹耕以後至乞推恩檜批送禮部措置該喻其意即言今舉有試中髙等之人為見先有已降等第推恩名色及慮御試却中底甲往往在路遷延日月才候試畢便自陳為病趂赴不及顯屬太優檜入熟狀畫可自是遂為故事丙申端眀殿學士簽書樞密院事汪勃罷勃為言者所攻以親老乞歸養詔依舊職提舉江州太平興國宫丁酉工部尚書詹大方為端眀殿學士簽書樞密院事尋權參知政事權尚書禮部侍郎兼直學士院沈該充敷文閣待制知潼川府詔劉媫妤祖母太孺人唐氏特封永嘉郡太夫人右武大夫果州觀察使兩浙東路馬步軍副總管馬秦卒於婺州特贈三官恤其家甚厚庚子監察御史張把面對乞州縣之吏有政績者令監司郡守考核聞奏不得令士民飾詞妄有舉留從之戊申左中奉大夫知郢州趙叔涔代還乞令諸路總領官及都統制增闢營田庚戌詔户工部立法賞罰叔涔又言陛下即位以來用人多矣其間或持兩可或専征戰政出多門競持異議故投艱弭亂略無寧嵗賴上獨斷登用耆德専任一相坐致丕平望以今日得人専任之效宣付史館癸丑簽書樞密院事詹大方進呈上顧秦檜曰此卿之功也朕記卿初自金歸嘗對朕言如欲天下無事須是南自南北自北遂首建講和之議朕心固已判然而梗於衆論久而方决今南北罷兵六年矣天下無事果如卿言檜頓首謝曰和議之諧斷自宸𠂻臣奉行而已何功之有刑部尚書兼權吏部尚書周三畏罷以侍御史余堯弼論其兼領二曹一切要譽歸怨朝廷也甲寅國子司業陳誠之權尚書吏部侍郎大理卿韓仲通權刑部侍郎先是幕士張問自言羣盜夜入其室縱掠而去詔臨安府追捕甚急積五六月連逮百餘人獄具而復有告真盜者乃改付大理獄仲通曰輦轂之下有行剽者詔獄推治而不得主名吾固惑之其母太令人劉氏曰吾見閭閻不肖子竊父之財母蔽昵不告紿以為盜者多矣試物色求之仲通悟翌日以耳目追跡其人與常所往來通行飲食之家凡所告失亡一日盡獲無秋毫之漏於是問妻與子以誣坐論如律而百餘人者破械縱去囹圄遂空此據孫覿撰劉氏墓志增入覿稱以此擢仲通刑部侍郎而今年九月癸巳余堯弼劾范詢章疏稱閻大鈞之獄賴寺卿守正不得曲法則仲通之遷未必以此也或謂仲通與秦檜之給使丁祀深交祀引之也閏八月庚申秦檜奏兩國通和農民安業墾田漸廣户部財賦粗足支用乞免江浙湖南今年和糴和糴事初見元年年末上大喜曰朕向在河朔見民以為苦朝廷所降本錢州縣往往移用不以時給縱有給處又為吏多端乞取十不得一二今幸時和嵗豐軍儲粗足朕豈已而不已也中興聖政史臣曰漢孝宣光武生長民間其知民疾苦宜也髙宗以諸王總戎河朔周知民間纎悉利害雖即位二十年猶能歷歷及之此明主之所難也親衛大夫忠州刺史鄂州駐劄御前選鋒軍同副統制梁興卒興自太行山率其徒奔嶽飛於江夏從軍凡十年壬戌左中奉大夫趙叔涔知湖州右朝散郎曽惇知鎮江府左太中大夫知太平州范同薨癸亥詔復資政殿學士致仕甲子遂命臨安平江府淮東西湖北三總領所嵗糴米百二十萬石有竒用户部請也浙西凡糴七十六萬石行在省倉三界三十五萬五千臨安平江府場各二十萬淮西總領所十六萬五千湖北淮東皆十五萬石時行在嵗支凡三百三十八萬石有竒而江浙荆湖上供米綱才三百萬石故糴之三總領所舊不立額及是比行下丙寅左奉議郎黃祖舜主管南外敦宗院戊辰權禮部侍郎陳誠之請太學生入學五年不與薦及公試不入等者除其籍從之改行在熟藥所為太平惠民局己巳直祕閣江南西路提㸃刑獄公事林大聲罷右司諫巫伋論其總賦淮東措置乖方及為江東漕妄費官錢故也孫覿撰大聲墓志云公治財知取豫在户部稽考諸酒庫積贏錢數十萬在總領按尺籍移軍實杜吏謾復得贏錢十萬於時權貴人用事納四方之賂鬻買官爵門如市矣一時向慕奔走爭先黃金白璧明珠大貝象犀錦綾竒怪之物車連轂舟銜尾相屬於水陸之道連晝夜不絶或謂公所涖緡錢有羡盍致其餘無為獨醒也公曰吾起諸生擢名第嵗月推遷遂躋省寺又欲以貨耶竟無所獻㑹有告公部內葉圭作詩語涉譏謗者坐是貶一秩罷歸按紹興二十七年王圭劾大聲降官乃稱將漕江東縱子弟受賂不法有訐之相府者移江西憲與覿所云全不同以日歷考之大聲降官在紹興二十一年八月其罷歸已久覿實謬誤庚午大理寺丞孫敏修面對乞兵級犯罪及强盜同火七人已上並作情重法輕奏裁詔刑部看詳壬申命起居舍人王墨卿武經大夫惠州刺史兼閣門宣贊舍人蘇曄賀金主正旦權尚書禮部侍郎陳誠之武經大夫吉州刺史權知閣門事孟思恭賀生辰甲戌秦檜進呈禮物數上曰朕觀金國和意甚堅自講好以來於今七年未嘗非理有所邀求朕每遣使必戒約三節人毋得生事蓋所以固兩國之歡期於與民休息而已丙子集英殿修撰知福州薛弼言本州亢旱既而大雨忽傳侯官縣有竹實如米老稚採取所得幾萬斛饑者賴以濟此蓋明天子聖德所感上相燮理之效實為中興上瑞伏乞詳酌施行詔付史館戊寅詔川廣荆湖應奏獄案以副本申提刑司别奏令刑部以奏狀先到者約法先是大理正元龜年面對論逺方獄案不無遺滯乞立法至是施行湖州言保義郎林昌朝四世同居詔旌表門閭太學博士王之望知荆門軍以葬親有請也辛巳大理寺丞周埅面對請縣令滿三年無公私過從本郡保明推賞詔刑部看詳後不行壬午右朝奉大夫主管台州崇道觀張昌提舉江南東路常平茶鹽公事癸未執政進呈監察御史陳䕫論州郡嵗以常平米廪給貧民今多移用乞令監司覺察上曰此誠仁政所先比年州縣奉法不䖍或侵支盜用而監司失於檢察或賑濟無術而僻逺窮困之民不得均被其惠非所以稱朕矜恤元元之意宜令户部措置詔入內內侍省聽喚使臣自今以六十人為額甲申勒停人降授武功大夫辛道宗房州羈管時道宗寓居嚴州侍御史余堯弼奏道宗移居近地窺伺朝廷隂為不靖望斥之逺方故有是命左朝請郎賀允中添差福建路安撫司參議官允中嘗為福建提刑見謂稱職秦檜以其不附已復令入帥幕以抑之乙酉詔自今奉使下三節人過界與北人博易者徒二年使副不覺察與同罪初福建路自創竒兵而䖍梅草冦不敢復入境至是悉平詔以巡檢陳敏所部竒兵四百及汀潭戍兵之在閩者並為殿前司左翼軍即以敏為統制官留戍其地神武中軍舊止三部自楊存中職殿嚴始增為五軍又置護聖踏白選鋒䇿選鋒游奕神勇馬步凡十二軍時江海之間盜賊間作乃分置諸軍以控制之如泉之左翼循之摧鋒明之水軍皆𨽻本司總七萬餘人由是殿前司兵籍為天下冠存中又制諸軍戎仗以克敵弓雖徑而士病蹶張之難乃增損舊制造馬黃弩制度精密彼一矢未竟而此三發矢紹興二十九年又置破敵軍九月壬辰大理寺丞郭唐卿面對乞諸路提刑司詳覆獄案內有應奏者徑行繳奏毋得再下本州庶幾獄無留滯詔申嚴行下丙申司農寺丞周莊仲面對言行在嵗支軍糧百五十萬石惟中下兩界厫房不多遇春冬凍涸綱運不行則有不繼之患望添造十厫共容三百萬石非凍涸不許移用嵗月滋久則以新易陳戊戌詔户部措置莊仲武仲弟也己亥右武郎兩浙西路兵馬鈐轄曹涭帶御器械甲辰侍御史兼崇政殿說書余堯弼試御史中丞丙午端明殿學士簽書樞密院事詹大方薨特贈一官為左中奉大夫異數也丁未右司諫兼崇政殿說書巫伋試右諫議大夫己酉余堯弼兼侍講辛亥巫伋兼侍講壬子監察御史張把試祕書少監是月金主亶遣兵部尚書蕭裕為廉訪使遍至諸路詢問疾苦自郡守以下皆究其治狀而升黜之時國嗣未立亶以其從弟北京留守岐王亮為尚書左丞相亮故宋王宗幹子而太祖旻孫也頗矯飾盜名密有包藏窺伺之意以胙王元者亦太祖旻之孫以次當立因河南叛兵有妄稱皇弟者亮誣以語相符合實與結連遂殺之以金人誅蕭裕詔廢亮詔參修熊克小歷云元地居嫡長按亶乃是嫡長孫元或是梁宋國王宗秀之子然雖長而非嫡也冬十月乙卯朔𠡠令所刪定官盛師文面對乞遵天聖嘉祐詔令將諸路見有丁錢不許折變並令均納見錢其第五等以下人户依紹興德音減免其半詔户部看詳取㫖丙辰御史中丞兼侍講余堯弼為端明殿學士簽書樞密院事兼權參知政事監察御史曹筠守殿中侍御史戊午監察御史陳䕫兼崇政殿說書乙丑上曰前日內教武藝至精挽强中的者比去嵗多百人更一二年愈加精熟必增多於今日丁卯上曰紹興府守臣林待聘輕費誕謾宜亟罷免其財賦令户部經理於是以待聘提舉江州太平興國宫戊辰尚書工部侍郎趙不棄請補外除敷文閣直學士知紹興府時紹興諸邑旱荒民多流散而户部奏本府苖米及常平義倉有欺隱者十二萬餘石經總制錢五萬餘緡顯見林待聘輕費妄用不守廉隅乃命不棄經理焉庚午直龍圖閣知婺州錢端禮劾右承事郎知義烏縣徐時誨不法上曰知縣乃銓注員多難辨直否但治行者優擢罪惡者重責則咸知勸懲因此可以得人才矣辛未右朝請郎通判安豐軍魏持進秩二等以捕紅巾賊首李洪有勞也久之守臣右朝請大夫劉將亦進一秩將轉官在明年三月丁未壬申土謂輔臣曰昨已減諸州月樁錢要當盡罷庶蘇民力檜即諭户部侍郎李樁年宋貺以經制錢贍軍然月樁錢卒不罷丁丑左朝請郎知巴州馮忠恕提㸃成都府路刑獄公事忠恕汝州人在巴州時提舉茶馬韓球議加茶賦球號令風發下莫敢持議忠恕度不可與爭即自為奏巴州自趙開已一再增今不可復增茶亦如五榖有凶年遇水旱當榷以實奏下球不敢恨制置使李璆兼治成都嘗費常平倉米五萬石異時使者以其近臣置不問忠恕按督得其狀立督趣入之庚辰龍神衛四廂都指揮使永州防禦使知荆南府王瑋卒辛巳皇叔泉州觀察使知南外宗正事士珸為平海軍承宣使以勝任而遷也十有一月乙酉朔祕書少監張把言感生帝之祀尚寓招提祭以酒脯望復用牲玉升為上祀從之丁酉保信軍承宣使提舉洪州玉隆觀曹勛提舉萬夀觀令台州津發赴行在戊戌上謂大臣曰來年正旦皇太后慶七十可令禮官檢㑹國朝典故以聞祕閣修撰知䖍州曽慥移知荆南自渡江以來荆南多命武帥至是闕人上命秦檜以諸路副總管姓名來上檜曰江陵重地所係非輕恐更有可選之人蓋檜欲慥也上曰可遍詢三衙主帥庶得其人不誤委寄後旬日上諭檜曰荆南重地不可不慎擇今疆場安靜宜用文臣乃以命慥焉進呈兵官姓名在十月癸未上諭檜在十月壬辰己亥新州編管人胡銓移吉陽軍編管先是太師秦檜嘗於一德格天閣下書趙鼎李光胡銓三人姓名時鼎光皆在海南廣東經略使王鈇問右承議郎知新州張棣曰胡銓何故未過海銓嘗賦詞云欲駕巾車歸去有豺狼當轍棣即奏銓不自省循與見任寄居官往來唱和毁謗當塗語言不遜公然怨望朝廷鼓唱前說猶要惑衆殊無忌憚於是送海南編管命下棣選使臣游崇部送封小項筒過海銓徒步赴貶人皆憐之至雷州守臣王躍廉得崇以私茗自隨械送獄且厚餉銓是時諸道望風捃托流人以為竒貨惟躍能與流人調護海上無薪粲百物躍輒津置之其後卒以此得罪庚子左朝散郎王曮依舊尚書禮部員外郎以其進頌忠誠可嘉也敷文閣待制提舉江州太平興國宫周綱卒壬寅左朝奉大夫提舉江州太平興國宫桂陽監居住鄭剛中再謫濠州團練副使復州安置用右諫議大夫巫伋再疏也癸卯降授左奉議郎知真州洪興祖復左承議郎以赦叙也先是州殘於兵民之瘡痍未復興祖始至即上疏請復一年租從之明年再疏又從之自是流民漸歸遂誘溫户墾荒田至七萬餘畝丁未龍神衛四廂都指揮使雍州觀察使董先添差兩浙西路馬步軍副都總管平江府駐劄初嶽飛既死先自武昌召還為步軍司統制先與管軍趙密不協於是離軍領殿前都指揮使職事楊沂中憐其才贐遺甚厚具奏乞𨽻本司朝廷以三衙不許互換陳乞不許壬子左承議郎兩浙西路提㸃刑獄公事吳傳罷以户部侍郎宋貺接伴北使還劾其病不任事也十有二月乙卯朔上謂大臣曰聞紹興飢民有渡江者可令臨安優給路費遣還時明越秀潤徽婺饒信州皆旱民多流散上命有司發粟減賦至是復令常平官親往賑給之毋致失所復連州連山鎮為縣丙辰詔四川命官付身如未經換給並不許奏辟及權攝差遣先是止禁定差至是都大提舉茶馬韓球以為言故有是命集英殿修撰提舉江州太平興國宫江邈卒己未詔復敷文閣待制致仕庚申敷文閣直學士知宣州秦棣卒官給葬事棣在宣城州之何村有富民釀酒棣遣巡檢將吏士捕之夜半圍其家民疑其强盜也即擊鼓聚鄰里共執之走訴諸棣棣怒取民及其子孫三人用麻繩通纒其體自肩至足然後各杖之百及解縳三人皆死其慘毒如此丙寅詔提舉常平官分遣屬吏賑濟流民且貸其春耕之費先是詔復民租十之八而和糴尚存海鹽丞丁安義語其令曰嵗飢常賦且不充不應復有和糴使上官怒安義當以身任之檄屢至安義抗論反覆卒賴以免丁卯布衣孫堯佐上書乞嗣安定郡王與濮王之封詔大宗正司具名聞奏尚書省批狀四川營田就委都統制檢察措置耕種將每年所收斛㪷除分給官并樁留次年種子外盡數報總領所拘收充減免成都府路對糴米十二萬石之數舊營田事𨽻宣撫司及司廢乃有是命此以紹興三十三年二月十八日工部狀修入狀稱承紹興十八年十二月十三日指揮而日歷不載蓋都省批狀也戊辰饒州進士張闡上書乞將四等五等下户紹興十七年已前拖缺冬苖及諸色官物已倚閣者即與蠲放未倚閣者即權倚閣上謂大臣曰如實無可納徒有追擾亦足矜也乃付户部既而户部乞諸路災傷及五分處下户次十六年租稅除形勢外並與蠲放十七年分倚閣如違當職官重行黜責仍令憲臣覺察從之户部奏下在是月丁丑己巳大理評事莫濛面對論四方之民雲集二浙百倍常時而河渠為甚急宜命守臣因農之隙濬其堙塞庚午上諭大臣曰可使漕臣募夫濬治因以濟接飢民則公私兩利矣濛歸安人也壬申故迪功郎謝濬特贈右承務郎官一子濬為隴水尉捕賊死故録之是日宰執進呈經界事訖上曰諸州月樁錢昨已例減要當盡行除罷秦檜即諭户部侍郎李椿年宋貺以經總錢措置贍軍中興聖政史臣曰大臣苟有以厚民力固人心雖人主不自言固當奮然以身任之月樁之為害上至於再四言之而州縣倚樁辦之名因之以巧取至於今尚存亦足為一時用事者愧矣不惟是也月樁窠名本出於經總制罷月樁而以經總制錢贍軍此若有意於奉行者而月樁未罷校終嵗經總制之入擇其最者必於州縣取盈焉又非聖上勤恤斯人之意矣夫減月樁免和糴罷免行錢推仁聖之心使天下一日帖帖就安雖瘠已可以肥天下無愛也曹泳輩無所忌憚逞其殘民之術且直為此欺誕大化更行首正三苖之竄宜哉丁丑太常博士林宰左承議郎主管官告院章厦並為監察御史時上召二人入對而厦請戒監司守令奉行賑濟乃有是命厦奏札以是月己卯行出今併附此庚辰金主遣金吾衛上將軍殿前右副都㸃檢召守忠昭武大將軍同知宣徽院事劉君詔來賀來年正旦君詔唐盧龍節度使守恭八世孫也父宏遼寧昌軍節度使金人俾知咸州同平章事此以金國翰林直學士趙可撰君詔之子宣德軍判劉某墓志修入名南劍州晉司空張華廟曰應靈是嵗宗室子賜名授官者二十有三人諸路斷大辟三十二人建炎以來繫年要録卷一百五十八
