body:
  text: 建炎以來繫年要録卷十一宋李心傳撰建炎元年十有二月丙辰朔詔朕朝夕延見大臣咨訪庶務羣臣進對隨事盡言退閲四方奏牘少空則披覽載籍鑑觀前古獨於講學久未遑暇念雖羽檄交馳巡幸未定亦不可廢其以侍從四員充講讀官萬幾之暇就內殿講讀先是御史中丞王賓乞開講筵上納其言故有是旨王賓乞開講筵此以紹興十三年正月二十四日王普所奏修入詔諸路轉運司類省試以待親䇿先是諸州發解進士當以今春試禮部會國難不果上以道梗難赴乃命諸路提刑選官即轉運司所在州類省試每路選官六員臨期實封移牒漕臣一員監試不得干預考校仍用省額統計率十有四人而取一人省試之有類蓋自此始丁已詔朕罔好遊畋有以鷹犬輒稱御前者流海島朝請郎王翿為兩浙路提點刑獄公事戊午詔省臺寺監百司官各有存留在京員數如全闕官止差一員通管職事見權官並罷以言者論留守司違法差權官數多又便文往諸路倍請添給故也其已給者皆追還之此又興三年二月張澄劾二相章疏所云全不同當考庚申起居舍人衛膚敏試右諌議大夫辛酉詔應焚劫州縣令監司巡歷一嵗再遍具所措置以聞將考其當否而升黜之初命侍從監司郡守各舉所知一人至是悉令赴都堂審察除應待報人外皆罷之白身人送中書省試䇿一道取旨三年二月丁卯推恩是日御營使司都統制王淵入杭州初淵至秀州下令治兵十日乃行杭賊陳通等聞之為備稍緩及是淵與統制官張俊馳至城下傳呼秀州趙龍圖來通出不意遂出迎淵慰勞之後二日乃諭以朝廷遣賜告身令通等祗授通等皆喜淵俊入州治命軍士分守諸門通等三百人立于譙門之外淵召其首三十人至庭下遽執之通呼曰已受招安何為乃爾淵曰我受詔討賊不知其他遂執其餘黨於門外悉要斬之凡百八十餘人百姓皆相賀俊取杭州角妓張穠以歸淵誅陳通在此月癸亥今從日歷附辛酉入城之日壬戌資政殿學士京東東路經略安撫使兼制置使知青州曽孝序為亂兵所殺先是臨朐土兵趙晟聚衆為亂孝序付將官王定兵千人捕之大衄而歸孝序令毋入城且責以力戰自贖不則將議軍法定自知不免乃以言撼敗卒奪門斬關而入孝序度力不能制因出據廳事瞋目罵賊遂與其子宣教郎訏皆遇害年七十有九詔贈五官為光祿大夫諡曰威龔頥正中興忠義録作威愍會要無愍字癸亥金人至汜水關初左副元帥宗維聞上幸維揚乃約諸軍分道來侵宗維自河陽渡河攻河南十二月入西京右副元帥宗輔與其弟宗弼自滄州渡河攻山東眀年春陷青濰陜西諸路選鋒都統羅索與其副薩里罕自同州渡河攻陜西明年正月戊子陷長安薩里罕者金主晟從弟也撒離喝或作撒里曷今從金國詔本撒離喝為晟從弟不見於他書眀庭傑吳玠功績記云紹興二年春國主弟撒離喝犯梁洋按晟弟撒也先死故知為從弟注按薩里罕賽音名今改正姑存原時西京統制官翟進扼清河白磊帶御器械鄭建雄守河陽敵不得濟宗維乃屯重兵於河陽北城以疑建雄而隂遣萬户尼楚赫自九鼎渡河背攻南城南城遂陷建雄遂潰西京留守孫昭逺既罷西道都總管所調西師以非所隸悉引去昭逺數以洛無城池而強敵對境侵軼之狀聞于朝且遺其子書曰今日捍禦甚難若假一嵗庶幾可保吾四男二女今不復念要為忠義死耳乃遣驍將姚慶拒之於偃師縣軍敗慶死之昭逺知城危即命其將親衛大夫王仔奉啓運宫神御間道赴行在既而金人大入昭逺引餘兵南去翟進率軍民上山保險宗維據汜水引軍東命尼楚赫分軍犯京西先是知階州董庠以勤王兵入援潰散無所歸東京留守宗澤以庠知鄭州澤聞金兵入境遣將劉逹援之未至庠棄城走是日尼楚赫至鄭州不入城而去遂徑如京西中原大震甲子徽猷閣待制提舉亳州明道宫邢煥為光州觀察使用右諌議大夫衛膚敏疏也先是膚敏上疏論三事一曰守法度二曰慎爵賞三曰正紀綱何謂守法度本朝列聖莫不盡循祖宗之法后族戚里不得任文資恐撓法而干政也欽聖憲肅之父向經嘗為尚書郎矣乃改授貴州防禦使逮至崇觀宣和間姦臣秉政戚里內侍公然請託內降御筆日以十數三省奉行文書而已故皇后之父至為太師帝女之夫乃作侍從其他妃主之家如王羲叟之徒亦登從班錢端義之徒並為寺監其他不可以數舉前此所以産亂招禍者實基於此固陛下所親見也是宜痛掃崇觀之積弊悉復祖宗之成憲而乃者邢煥除徽猷閣待制孟忠厚除顯謨閣直學士士大夫莫不驚駭比來又降中旨王羲叔與郡王羲叟除太府寺丞以片紙録闕親屈宸翰以行之於是物議大喧以至相視失色陛下若欲敦椒房之重奉太母之歡則當撫其家可也時有賜賚可也若以公朝爵位私之則不可也惜夫大臣無有如杜衍者執之以為不可致使陛下不得已屈法以從之豈能不仰纍聖政哉伏願斷自宸𠂻改正煥及忠厚官職悉從舊法及罷羲叟差遣且重立法禁以止絶干求請託之門庶幾惟新之政醇而無疵矣何謂慎爵賞人君之於慶賞所以厲世磨鈍者也比年以來羣姦擅朝近習用事戚里道流干政撓法固有不繇科舉而命官賜第者又有虛作隨軍治河因權幸保奏而改京秩者又有因賄賂權幸而傳宣賜帶因父兄秉政無出身而得貼職者前此臣僚論列固已降指揮悉行追奪矣而有司奉行不虔其僥幸得官及改秩者不唯未有褫奪往往以赦恩而轉行者多矣至於帶職名服章服者皆如是故朝廷之命不行於下也害治之大孰甚於此願申命有司悉行檢舉一洗而去之庶幾爵位重於朝廷而天下知所勸矣何謂正紀綱比年以來人或玩法將相侍從出典州郡多以貴傲自恃監司欲振舉其職業往往違戾而不肯從又將領之於士卒平日黷貨恣行侵削不復眀階級之法至簡省其教閲養成其驕惰少有責罰則悖慢無禮無所不至或至殺州將掠居民而無所畏憚朝廷旋即招安而命之以官此何理也又宗室承寇盜侵軼之際誣州縣與賊通因而殺之此又不可長也願特降睿旨今後監司規畫事理可行而諸州違戾不從者重加之罪若士卒違犯將帥所統之官則申明階級之法使斷者不疑若殺州將掠居民者不許行招安之䇿必孥戮而後已庶為將來之戒也至於處宗室於外非祖宗之舊制始於崇觀間耳其在外也至於椎牛釀酒窩藏竊盜甚則有羣殺人之事今若日給錢米而散處於東南庶不為蘇常二州之蠧至於聚衆殺人則當重置于罪不可以皇族而貸也此三者皆當今之切務而不可移者惟陛下加誠意而留聖念天下幸甚疏入上以隆祐太后故未忍奪忠厚職名乃詔歷考祖宗朝后父無任文臣侍從官者朕欲尊依舊制以復祖宗平治之時豈可以近親違戾彛憲邢煥可特換光州觀察使於是膚敏所言數事皆次第行之羲叔開封人其兄女為龍德宫媫妤宣和末纍遷户部侍郎殿中監靖康初省羲叔之母隆祐太后女兄弟也故至是復有此命日歷紹興元年六月四日隆祐上仙特恩數內親姨之子通直郎王羲叟等並轉一官按宋史職官志靖康元年罷殿中省六尚局詔入內髙品趙舜輔揚州兵馬都監徐洪並日下監押出門乙丑諫官衛膚敏言比來王羲叟除命旨自中出用御寶以行下既不由宰臣之進擬又不由銓部之差注議者咸謂因戚里佞幸干請而與之舜輔及洪初不由臺臣之彈奏又不由部使者之紏劾議者咸謂因近習讒譖而逐之此二事者若甚微而所繫於國體者甚大前此所以召亂致禍者皆由於此在今日不可不戒願特詔有司自今除授并行遣有罪之人並須經由三省及宰執進呈方得施行或有干求請託乞御寶以行下者並重置于法令御史臺覺察以聞庶幾政事之本一出朝廷而天下治從之丙寅張遇寇江州守臣承議郎陳彥文視事始十日固守不下遇引去江淮制置使劉光世截其後軍破之彥文絳曽孫絳莆田人故右諌議大夫政和間嘗為顯謨閣直學士丁卯詔諸路都總管司走馬承受公事使臣依舊法𨽻屬帥司先是政和中改走馬承受為亷訪使者其權與監司均敵朝廷每有所為輒為廉訪所雌黃樞密院藉以搖宰相靖康初復舊尋命且依見行條法施行及是樞密院以為言乃復舊制戊辰右諫議大夫衛膚敏上疏論營繕工作內降錫賚等四事時先朝嬪御皆至行在乃建承慶院以處之又置升暘宫以治兵器及服御所須之物於其間而使內侍典其役上在禁中下有司取金幣或母后戚里之家有所干請間以內批御寶行之膚敏言此數事各有所因蓋非得已而議者閧然以為禁中修造復興御前生活復作宫中費用復廣內降指揮復出蓋護視工役屬之內侍而除授不由中書此人言所以籍籍也望以承慶營繕之役付之揚州升暘造作之事歸之有司特降明詔戚里內侍有所干請過例者勿復降出違礙者勿復進呈申明三省每奏執案此句疑有脫字其服御之用則令有司依故事共進其錫賚之費則朝廷量功效支賜如此則籍籍之論不戒而自孚矣給事中劉與亦奏疏論內降營繕二事上皆嘉納之熊克小歷略載此事於十一月末按膚敏十二月五日方除諌議大夫繫之前月者誤也與十一月三日已除給事中而克以為中書舍人亦誤克又載膚敏奏語云其有戾祖宗之法者許大臣執奏大臣不正救者顯黜之按此乃汪藻撰膚敏墓志中所云與本奏不同今不取仍依日歷附此月戊辰但十一月乙巳已先有奏執內降等指揮此時膚敏未為諌官或者因與先建言而黃潛善等不能遵用然膚敏三奏全不云已有此指揮不知何故今附此更須詳之也金人圍棣州守臣朝奉大夫薑剛之率軍民拒守圍城一十有七日不拔而去此據紹興三年正月剛之妻管氏陳乞贈官狀增入是日羅索渡河拔韓城縣初京兆府路經略制置使唐重在關中以將官曲方為沿河安撫使方老而繆統兵屯韓城日以飲酒蹴鞠為事未嘗治軍政也時河東經制使王􅊛在陜府遣人渡河劫寨羅索遂自慈隰引兵而南重遣兵馬都監武功大夫貴州刺史劉光弼賫金帛至河上犒師光弼至華州聞敵逼河遂留不進羅索至河中府官軍扼蒲津西岸羅索患之夜潛由上流龍門清水曲履氷渡河方猶飲酒以告者為妄羅索出龍門山並河而南距韓城四十里方始覺之乃引兵遁去光弼聞之不歸長安而走邠岐間先是武功大夫榮州團練使陳迪自瀘南安撫司走馬承受公事還行在重以敵兵逼近奏留迪提舉軍馬措置民兵以備敵又有嘉州軍事推官王尚被檄過岐下重辟尚主管機宜文字留長安時京兆餘兵皆為經制使錢蓋調赴行在重度敵且入以書别其父克臣曰忠孝不兩立義不茍生以辱吾父克臣報之曰汝能以身殉國吾含笑入地矣重聞敵已濟復移書成都漕臣趙開屬以身後見者皆義之光弼光世弟尚青神人也日歷建炎元年六月二十五日癸未中侍大夫明州觀察使陳迪召赴行在紹興五年十一月八日丁丑陳昌諤狀父迪在武功大夫榮州團練使瀘南安撫司走馬承受公文事在任召赴行在十二月內到永興軍制置使唐重與諸司奏充提舉永興路兵馬措置民兵今併附此按迪以死事故宣撫處置司便宜加贈橫行遙察而日歷乃誤以為生前官職書之今不取庚午除名勒停人李志道復內客省使保慶軍承宣使添差入內內侍省都知志道憲養子憲祥符人元豐中為熙河制置使志道名犯上嫌名以字行按志道名彀宣和末為檢校少保慶逺軍節度醴泉觀使直保和殿靖康末坐典炮失職有旨俟解嚴日逺竄至是復用之右諫議大夫衛膚敏言志道在上皇朝用事最久其弄權怙寵勢可炙手一時逹官貴人多出其門撓法害政以亂天下其惡不在童貫談稹梁師成之下今縱未能竄逐奈何用赦復之上亟寢其命志道寢命在是月癸酉今併書之壬申直龍圖閣知秀州趙叔近罷仍奪職以直龍圖閣朱芾代之時叔近既招降杭冦陳通而言者論其嘗受賊金由是免官拘繫於郡著此為明年秀州軍變張本芾益都人也癸酉詔諸路贍學錢令轉運司拘收許移用甲戌羅索侵同州守臣直祕閣鄭驤死之先是驤聞上幸維揚上章請自楚泗汴洛以迄陜華各募精兵鎮守有急則首尾相應庶幾敵勢不得衝決奏上不報至是敵及韓城驤帥兵扼險擊之師小却敵乘勝徑至城下通判以下皆遁去驤獨曰所謂太守者守死而已翼日同州門閉驤赴井死日歷附傳云城陷敵知驤威名堅逼使降驤慷慨言曰吾窮五月之力不能為朝廷守死命也卒不屈遂死之趙甡之遺史云秦檜當國驤之親屬為檜客情意深密驤以死節贈通議大夫猶以為未足又録其抗聲拒敵之節加贈及諡驤赴井時金人猶未傅城初無固守及抗拒之節可謂詭冒矣按驤附傳甚美乃秦熺為祕書少監時所修驤子靄最為檜所厚故也日歷驤死在二十一日丙子疑丙子是城陷之日今依遺史附甲戍軍民猶上城守禦而喧亂無法羅索呼城中人與語衆推承節郎前知沙苑監周良良立青蓋於城上金人諭令趣降良曰茍無殺戮當聼命索許之即授良定國軍節度使知同州惟遣十數騎入州學取書籍而歸餘無所擾州人感驤之義斂而葬之後贈樞密直學士諡威愍吕中大事記曰祖宗百年禮義亷恥之化其所以涵養士大夫者至深逺矣然以熙寧以來羣小相師滅理窮欲六十年矣士大夫甘為之役心志潰爛不可收拾宜其禍變危迫而皆不知以為憂敗衄迎降而皆不知以為恥棄君叛父奉賊稱臣而皆不知以為辱也而兩河之帥守主將其為睢陽許逺顔真卿者不可勝數是雖人之秉彛不容泯沒亦祖宗所以涵養斯人之澤也所可惜者朝廷規模不立措置乖方當建炎之初河北惟失真定等四郡河東惟失太原等六郡其他固在也胡舜陟四鎮之説不行乎前李綱招撫經總之事復沮于後故當時無連衡合從相援之勢金兵方盛又非一州之所能敵既破一州又取一州使忠臣義士守孤城以待盡非金殺之也實朝廷殺之也觀除徽言奏使土豪復故地使之世襲而金憚之則胡舜陟李綱之計不行豈不惜哉同州既陷河東經制使王􅊅之軍潰亂不能整先是閣門祗候張昱棄慈州奔􅊅􅊅乃留昱治陜而率衆由金商西入蜀州縣震恐欲閉關拒之利州路提點刑獄公事張上行破衆議迎􅊅屯興元府且供其衣糧時叛賊史斌僭號興州將攻興元府􅊅遣統制官韋知幾統領官申世景領兵拒之復興州此據申世景功狀附見但日歷載于今年七月丁巳實甚誤矣此時王􅊅未離南京也既而􅊅留屯久軍餉不繼成都府路轉運判官趙開等乃率兩川民間助軍錢以佐之又以便宜截用遞嵗應輸陜西河東三路綱川陜屯西兵自此始率助軍錢及截三路綱據紹興間劉長源奏議增入他書蓋無有也奏議云建炎二年春河東制置司兵始至蜀蓋􅊅以今冬入蜀而明年春始取糧于內郡耳今併附見初直龍圖閣知黃州趙令􅍲奉詔修城及是始畢會張遇自江州西上招令􅍲出城相見且酌酒飲之令􅍲一舉而盡曰固知飲此必死願諸君勿殺城中軍民遇大驚曰酒誠有毒然先以此試公耳更取毒酒潑於地地裂有聲羣盜皆重令􅍲之器識乃引軍東去未幾丁進及羣冦來犯令􅍲皆擊却之乙亥命守令勸農賑乏罷借及獻助錢物監司察官吏不如詔者重黜之丙子詔侍讀官於所讀書內或有所見許讀畢具劄子奏陳用翰林學士朱勝非請也宣政使昭慶軍承宣使容機落致仕與外宫觀機淵聖隨龍內侍也圍城中乞致仕至是復起中書舍人汪藻既草詞而右諫議大夫兼侍講衛膚敏言自古宦官用事未有不為國家患者帝王作興當搜求賢俊以自輔如晉起謝安于既廢唐用李靖於已老故命下之日識者交慶未聞有求閹宦於間退之中而進用之者况機爵尊祿厚方時艱危則引身而去王室再造乃有媒進之心徇利不忠孰甚於此命遂格膚敏嘗入對因及崇觀政事上曰崇觀以來所以變亂祖宗之法者皆由宰臣持祿固寵惟恐忤上皇之顔色也故於政事未嘗少有可否所以致前日之禍自今當以為戒親衛大夫寧州觀察使知東上閣門事韋淵言橫行五司尚未遵元豐舊制乞併引進司歸客省東西上閣門合而為一以省冗費從之遂命淵同管客省四方館閣門公事丁丑詔宗室歸朝官添差者勿罷已去任者復還之始議以軍興悉罷州縣添差官以紓民力至是惟二者得留戊寅言者請以臺諫論奏繫國之治亂民之休戚有禆今日政事可以為鑒誡者陳諸黼扆之側詔自來年正月為首置簿令大臣擇其已施行者編寫進入京西轉運副使李茂誠請令諸路撫諭官點檢忠義巡社從之己卯詔自今年五月以前非専奉朝旨及五月朔以後借補之人並拘收付身其有繫盜賊招安者命帥司驗實以聞自軍興諸路帥臣監司率以便宜借補官資議者以為濫故也是日尼楚赫陷汝州初金右副元帥宗輔既渡河議先攻汴京且分兵趨行在而東京留守宗澤增修守禦之備城外千里無糧可因敵擾瀕河州郡諸將請斷河梁嚴兵自固澤笑曰去嵗城破正坐此爾尚可襲其軌乎命統制官劉衍趨滑州劉達走鄭州各率車二百乘戰士二萬人且戒衍毋得輕動極力保護河梁以俟大軍北渡金人聞之夜斷河梁而遁完顔宗弼乃遣使告左副元帥宗維謂獨力難攻宗維將輟西京之行併圍汴京既而知澤未可圖遂已時孫昭逺既棄河南去西京殘民無主乃開門出降宗維入西京未見本日當求他書修附以叛臣李嗣本知河南府自屯西京大內與澤相持嗣本者燕人宣和末以都統制守代州宗維入代義勝軍執之以降因為金用金人既陷汝州將兵挾京西北路提點刑獄公事謝京以遁金人擊殺之州民王氏二婦為金兵所得擁置舟中遂投漢江以死尸皆浮出不壞此據陳恬手記軍校王俊收集潰兵後據繖蓋山有衆數萬庚辰詔除京畿東西河東北陜西等路依元降指揮置巡社外後來增置路分並罷以言者論州縣追呼點集致農民失業殊乖朝廷立法本意故也給事中劉珏試尚書吏部侍郎右諫議大夫衛膚敏試中書舍人仍兼侍講初膚敏受命才兩旬言事至十數黃潛善等忌之會膚敏論孟忠厚未已殿中侍御史張浚按原本作張俊今從宋史改亦言忠厚才氣中常無聞士路况論思之官天子所藉以補朝廷之闕失非重德宿望有功在人豈可輕以除授今葭莩姻親無故得之孰不解體珏言忠厚與邢煥皆為戚里陛下因臣僚論列易煥以廉察之秩而釋忠厚不問臣嘗究觀歷世之君眷私后家以撓法者比比皆是未有能隆恩於諸母之黨而行法於中宫之家如陛下者然臣竊謂憲度者祖宗所以維持天下列聖奉之而不敢違者陛下欲承隆祐太后之意而拂於祖宗之法臣恐非所以為孝也忠厚與煥均以外戚而被超擢均以文資而得法從今一則易為亷察一則尚仍舊授豈惟煥之不服天下聞之亦必悵然不平臣恐非所以為公也蓋漢以祿莽閻梁亂天下唐以武韋楊氏撓王政故祖宗深監於此未有后之姪而為法從者雖韓琦之子嘉彥本文資也神祖既令尚主則授以右列况肯與之法從乎論者如以髙遵惠嘗權侍郎向宗旦嘗歷卿寺則有説矣考遵惠宗旦之世業則髙瓊向敏中乃將相之家而遵惠宗旦又宣仁欽聖之疏屬也論其資歷則遵惠宗旦皆登進士第乃其後來自以材奮非緣二后之恩寵也忠厚烏得援以為例哉疏入詔邢煥朕之后父即令換武忠厚繫隆祐太后之親兼前朝太后父亦有任文臣者宜體朕優奉太后之意書讀行下於是潛善等以上意諭珏珏堅持不可膚敏奏昔司馬光論張方平不當參知政事自御史中丞除翰林學士光言臣言是則方平當罷若以為非則當貶今兩無所問而遷臣臣所未諭臣不肖固不敢望光但事有近似故輒援以言之况忠厚乳臭小兒目不知書一旦以外戚子擢之從班撓纍聖之法害中興之政此臣所以不能自已也願陛下察臣所言是非而行之若臣言是則當罷忠厚法從之職臣言非則當正臣妄言之罪詔朝廷以次遷除非繇論事膚敏力辭時珏亦論户部尚書黃潛厚當避親乃以潛厚為延康殿學士提舉醴泉觀同提舉措置户部財用潛厚之除日歷於九月丁未書之按是時珏雖建言其實未嘗改命故日歷於今年十一月載通東南監事潛厚猶繫舊銜至明年正月壬辰乃繫新銜耳但史失其月日而熊克小歷於明年正月附書之亦誤户部題名潛厚改除在十二月故且附此俟求其本日膚敏既移官遂與珏俱謁告不出徽猷閣待制提舉西京嵩山崇福宫楊時試尚書工部侍郎時年七十五矣時入見建言自古聖賢之君未有不以講學為先務者上深然之熊克小歷時之除在丙子今從日歷中書舍人劉觀試給事中觀嘗言今日之患在中國不在外敵在朝廷不在邉鄙在士大夫不在盜賊天下之人皆以尼瑪哈斡里雅布兩人者為吾中國之患臣獨以為非也尼瑪哈斡里雅布生大漠之北足未嘗踐中國之地目未嘗識中國之人所以能為吾患者中國有以來之也今不治中國而欲治外敵不治朝廷而欲治邉鄙不治向之士大夫而欲治盜賊臣竊以為過矣日者郡縣之間有不肖之人乘時射利進其身於朝廷人皆知其汙佞蠧國害民為天下毒孽久矣朝廷曽不加罪往往百姓盜賊共起而攻之至掠其家奪其財執而戮諸市曰此宣和誤國之人也夫朝廷不戮而使百姓盜賊得以誅之國柄倒置主命下移如此而欲治外敵邉鄙盜賊豈不難哉臣願陛下委諫官御史取崇寧以來叨餮冨貴最亡狀之人編為一籍已死者著其惡未死者眀其罪且曰此以開邉用兵進者也此以花石應奉進者也此以三山河賞進者也此以刻剝聚斂進者也此以交結宦官貨賂權幸進者也如此之類列為數十條槩其罪惡疏其名氏有司鏤板播告天下與衆棄之如此外敵聞之莫不畏盜賊聞之莫不服然後忠賢安於朝而太平中興之業可得而定今不早正其罪使晏然自以為得計陛下踐阼踰半嵗臣謂緩急先後之序幾且失矣疏奏上嘉納遂命臺諫具名以聞三省樞密院參酌省臺各録副本不許堂除及任守令後不果行日歷載此事於二年二月庚午按二年正月辛亥巳有衝改指揮不應許建請乃在其後觀奏狀云陛下踐阼踰半嵗則非明年所上明矣今因觀改除參酌附此俟考武翼大夫閣門宣贊舍人丁進特放罪仍遷二官進既去夀春東京留守宗澤遣使招進進遂納欵澤以便宜補授言於朝招進充京城四壁外巡以所部赴京城四面屯駐初溫杭二州上供物寄留鎮江其間椅桌有以螺鈿為之者守臣龍圖閣直學士錢伯言奏發赴行在上惡其靡亟命碎之通衢癸未直龍圖閣提舉杭州洞霄宫張忞復右文殿修撰除名人魏伯芻復朝奉大夫忞金壇人嘗為中書舍人伯芻開封人故省吏也王黼用為徽猷閣待制提舉在京𣙜貨務宣和末為蔡京所廢至是並用赦復之乙酉詔百官言闕失詔曰自今服采在職其各悉心極言凡言動舉措之過差暨軍旅財用之闕失人情之逆順政事之否臧號令不便於民法制無益於國若時施設咸得指陳切至而有根原忠鯁而無顧忌亟當奬擢昭示勸旌中興聖政臣留正等曰忠言之于國猶脈理之於身也脈理通而後身安忠言用而後國治否則首足不相為用君臣不能無異意矣漢髙祖唐太宗俱以能聽言而開創大業武帝奢縱能容一汲黯武后淫虐能容一狄仁傑而不至於亂亡言之有益於人之國也如此太上皇導臣使言委曲開諭無所不至三紀之間博謀兼聽見於施設者不可勝紀間有逆耳咈意之論自敵以下受之所不能堪者亦欣然聽用而不拒非甚盛德其何能爾中興之功有光前代端自是而致之帶御器械張俊自杭州移兵討蘭溪僧居正破之是月奉議郎張守為監察御史守晉陵人宣和末為是官以憂去至是免喪復用初建卒張員等既叛統制官朝請郎王淮雖駐兵城下未能破賊有軍校魏勝者獨不從亂頗能調護其黨至是有詔招安貟等聼命守臣張動提舉常平公事王浚明皆坐失職罷去會淮持喪乃起復故官知建州使之撫定而以勝為承信郎權本州兵馬監押時貟等雖開門然軍情猶未定也淮之除史及諸書不見日歷明年正月丁亥詔持服人王淮前降起復知建州指揮更不施行故附見於此是嵗御史臺檢法官王鄰為監察御史鄰及張守之除並據御史臺記保靜南渭永順州畨人彭儒武等詣澧州獻方物以道路未通且令回洞此以紹興四年四月二十二日湖北安撫司奏狀修入建炎以來繫年要録卷十一
