body:
  text: 臣恭惟髙宗皇帝受命中天功德巍煌布在方册而廣記備言有裨一朝巨典則惟臣心傳撰次建炎以來繫年要録首為成書臣當拜手稽首伏讀竟編其間大綱目固非可一二數竊謂大駕初南駐廣陵者年餘天步方艱昃食不暇乃於斯時開經筵召楊時臨軒策士汲汲惟恐後其緝熙聖學扶持道統通天下言路以迓續我宋無疆大歷服實始於此臣載惟藝祖皇帝肇造區夏親平淮南後因御營作章武殿臣既改築而新之中興舊事故老相傳雖有能倣佛者然文不足證也乃以臣所藏蜀本繫年録二百卷刋于州治與臣傅良所述建隆編並傳云寶祐元年嵗在癸丑秋八月既望資政殿大學士光祿大夫兩淮制置大使兼淮南東西路安撫使知揚州軍州事兼管內勸農營田屯田使馬步軍都總管兼提領措置屯田専一措置提督修城節制本路河南屯戍軍馬兼兩淮屯田大使臨海郡開國公食邑二千一百户食實封三百户臣賈似道恭跋
