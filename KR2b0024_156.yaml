body:
  text: 建炎以來繫年要録卷一百五十六宋李心傳撰紹興十有七年嵗次丁卯金熙宗亶皇統七年春正月按是月乙丑朔丙寅丹陽隱士蘇庠卒年八十有三丙子御筆諸軍統制將官已添差諸州都監已上人並令釐務戊寅秦檜奏已行出上曰諸將乍離軍中若請給減半恐失所也己卯手詔曰朕惟軍興二十餘年黎元騷動故力圖罷兵以冀休息今疆場無虞流徙有歸四境之內舉獲安堵朕心庶幾焉尚慮監司郡守不能深體朕意致或刻削苛細進獻羡餘失朕愛民本㫖自今敢有違戾仰御史臺彈劾監司各許互察部內犯而失按必與併坐布告中外咸體朕意左朝議大夫李椿年權尚書戶部侍郎專以措置經界椿年既建經界之議㑹以憂去有司因稍罷其所施行者及是椿年免喪還朝復言兩浙經界已畢者四十縣其未行處若止令人戶結甲慮形勢之家尚有欺隱乞且依舊圖造簿本所差官覆實若先了而民無爭訟則申朝廷推賞如守令慢而不職奏劾取㫖從之癸未敷文閣待制知婺州吳表臣知池州魏良臣皆乞奉祠上曰州郡之職懦弱者多不治事有才力者多妄作惟適中為難得於是二人並升敷文閣直學士提舉江州太平觀丙戌詔禮部立定天申節燕設則例下諸路遵守上以州縣因緣擾民且多殺物命故有是㫖丁亥右諫議大夫汪勃論內侍省押班趙轍強占民居詔與在外宫觀戊子秦檜奏已行上曰逐一內侍則人自知畏矣己丑詔近免稅米而所過尚收力勝錢其除之其餘稅則並與裁減上因言薪麵亦宜免稅商旅既通更平物價則小民不致失所矣熊克小歷云戶部米已免稅而所經稅務尚收力勝錢非朝廷寬民之意欲行下禁止從之按日歷是月丁亥上宣諭宰執米稅已免諸處却云力勝收稅可令有司措置己丑户部狀凖聖㫖措置云云蓋此事乃出自上意非戶部建請克實誤也辛卯上諭大臣曰孟饗詣景靈宫及東朝中宫不時出入已給禁衛人錢米毋令臨安應副恐擾及市民左迪功郎陳介言國家頒降鄉飲酒儀式而諸郡所行踈數不同望令三嵗科舉之年行之於庠序即古者三年大比飲酒於序之意也國子監言唐人亦止行於貢士之嵗欲依介所請如願每嵗舉行者聽從其便從之壬辰端眀殿學士簽書樞密院事李若谷參知政事御史中丞何若為端眀殿學士簽書樞密院事癸巳資政殿學士提舉萬夀觀兼侍讀提舉祕書省秦熺加大學士二月乙未朔右諫議大夫兼侍講汪勃試御史中丞監察御史巫伋守右正言左朝散郎符行中為尚書戶部員外郎總領四川宣撫司錢糧初四川都轉運司之廢用宣撫副使鄭剛中請也既而復以太府少卿趙不棄總領宣撫司錢糧剛中與之不協不棄頗求其隂事秦檜聞之乃奏以行中代不棄俟行中至利州令不棄赴行在行中南城人也李燾撰朝公武墓志云階成岷鳯四州併屬利路為經略使者當更名有㫖令安撫司倣雄州安撫司例措置申樞密院一府愕眙莫知其原公時在都轉運司乃從旁為言此景德三年故事顧與今事不類宣撫使即用公言奏析利州路為東西俾先為經略使者分領之由此益重公而幕下士皆忌其後宣撫使緣它故重貶議者或咎公憾彼不相知有所報復蓋非也公武仲之子此時為總領四川宣撫司錢糧所主管文字戊戌上謂大臣曰比聞州縣折納稅絹每匹有至十千者恐傷民力可令戶部措置庚子大理評事張棣面對論銓試之制惟以經義詩賦為榜首而有出身試律者遂居其下非所以右寒畯而左膏粱望令通融考校詔禮部立法辛五宰執進呈臨安府減定官私房緡上曰公私須令均一天下事皆當如此甲辰上齊於內殿時將祀高禖乃以太師尚書左僕射秦檜為親祠使乙巳上親祠青帝於東郊以伏犧高辛配普安郡王終獻又祀簡狄姜嫄於壇下牲用太牢玉用青幣放其玉之色樂舞如南郊之制禮畢御端誠殿受賀己酉封才人劉氏為媫妤庚戌封感義郡夫人郭氏為和國夫人辛亥改造殿前司寨為瓦屋用領都指揮使職事楊存中奏也南渡初諸營皆覆茅結舍焮火屢驚故存中以為請成州團練使韋謙為德慶軍承宣使貴州刺史帶御器械韋讜為慶逺軍承宣使並提舉萬夀觀壬子上謂秦檜曰陳亡恩澤自今不須裁定可依祖宗法事祖未見後宫劉氏為紅霞帔甲寅皇叔揚州觀察使同知大宗正事士夽為安德軍承宣使以職事修舉特遷之也丁巳御前軍器所言嵗中造軍器三百四十四萬餘件詔賞之辛酉參知政事李若谷罷為資政殿學士提舉江州太平觀以御史中丞汪勃論其不忠不孝也三月按是月甲子朔丁卯給事中兼實録院修撰兼侍讀兼直學士院假拂為翰林學士捧日天武四廂都指揮使寧國軍承宣使鄂州駐劄御前左軍統制牛臯卒前一日都統制田師中大㑹諸將臯遇毒而歸知其必斃乃呼親吏及家人囑以後事至是卒或謂秦檜密令師中毒之聞者莫不歎恨己巳上謂秦檜曰人材難得惟在賞罰勸沮卿可選用所知若協濟國事得三五人即庶僚胥化其不靖害治者顯黜勿貸庶知懲畏檜曰仁宗皇帝時高若訥等在朝久相攪擾至嘉祐間韓琦歐陽修協恭贊助方成太平之治上曰仁宗皇帝即位之久灼見治道檜又曰陛下領元帥府日備見官僚情僞至如敵情亦是親到其營盡得要領故應酬如神不差毫髮當出身犯難之時乃宗廟社稷之託實天啓聖衷非偶然也辛尚權尚書刑部侍郎錢周材為中書舍人兼權直學士院乙亥端眀殿學士簽書樞密院事何若引疾罷提舉江州太平觀若執政才四十四日丁丑直祕閣知光州鄭絪代還乞令國子監裒集上即位以來惠民愛物手詔編類刋印成書守令陛辭門謝日人賜一帙從之己卯翰林院學士假拂參知政事辛巳秦檜奏州縣和買率以二月起催非便上曰二月間蠶猶未生使民何以應辦檜奏須依舊限上可之詔自今使回並計程赴行在時權戶部侍郎邊知白賀金國正旦還已渡淮久之未至上慮其擾人乃有是命壬午御史臺檢法官余堯弼司農寺主簿宋敦朴宗正寺主簿張杞並為監察御史把浮梁人也甲申中書舍人權直學士院錢周材兼實録院修撰祕書省校書郎沈介面對言陛下勤恤民隱於郡邑近民之吏尤所注意守二縣令以民事抵罪者不復任以親民聖恩宏覆天下幸甚臣愚竊謂郡邑之吏朝夕奉行莫匪民事一有詿誤無復自新而又元降指揮罪無定名有司承用者不為之區别凡涉民訟一切坐之其於輕重之差公私之辨類或未盡欲望詔加刋定凡侵漁百姓以抵贓私者蔽以前令其或雖緣民事罪止公坐則自如常律庶幾仰稱陛下愛民慎罰之意事下刑部看詳後不行乙酉太師尚書左僕射魏國公秦檜以郊恩徙封益國公自是建旄封國之在北者皆改命時有乞置益國公官屬者檜雖不行亦不加罪焉此以趙甡之遺史附入當求他書考詳丙戌上謂大臣曰聞物價翔貴居民不易冝諭版曹同府曹措置取㫖丁亥權尚書吏部侍郎王循友提舉成都府玉局觀以右正言巫伋劾其迎勞使客所過受賂每與娼妓䙝狎故也中書舍人兼權直學士院兼實録院修撰錢周材兼侍講監察御史王鎡守尚書右司貟外郎戊子安民靖難功臣太傅醴泉觀使清河郡王張俊移節靜江寧武靖海軍揚武翊運功臣太傅醴泉觀使咸安郡王韓世忠移節鎮南武安寧國軍權尚書户部侍郎邊知白移吏部侍郎資政殿學士提舉江州太平觀李若谷落職江州居住以御史中丞汪勃論若谷諂事張邦昌之黨又往宗澤處以僞楚年月改秩故也直龍圖閣主管台州崇道觀高世定升祕閣修撰世定自通判眀州纍為部使者至是復遷之詔諸軍招置效用未有升進格法自今到軍三年無過者與轉一次帶甲用一石弓力十二矢中半上垜者年雖未及凖此八矢上垜者倍之至承信郎理磨勘年如常法庚寅權尚書吏部侍郎錢時敏充敷文閣待制提舉江州太平觀辛卯秦檜奏以敷文閣直學士林待聘知婺州上覽除目曰士大夫有專於為已而不肯任事但當與之祿食使之不失所而已檜曰陛下處士大夫如此仕而不知許國得不少愧乎中興聖政史臣曰不事其事雖奪之食不為過而聖人有不忍焉何也以為奪之則遂絶之也豫之則所以幸其自新也愛惜士類當如此權尚書工部侍郎徐琛乞補外罷為敷文閣待制知眀州直寶文閣主管台州崇道觀錢端禮為淮南路轉運副使兼淮南東路提㸃刑獄公事是月金人與䝉古始和嵗遺牛羊米豆綿絹之屬甚厚於是䝉酋鄂掄貝勒乃自稱祖元皇帝改元天興金人用兵連年卒不能討但遣精兵分據要害而還此據王大觀行程録按録稱嵗遺牛羊各五十萬口米豆共五十萬斛絹三十萬匹綿三十萬兩恐未必如此之多今削去其數第云甚厚更俟詳考夏四月按是月甲午朔丙申減諸路免行錢三分之一用户部請也丁酉權尚書吏部侍郎林乂充敷文閣待制知建州從所請也乂與秦檜有舊引至侍從不協物望然頗勤於所職人亦稱之己亥御史中丞兼侍講汪勃為端眀殿學士簽書樞密院事辛丑改築萬夀觀前後殿掌觀內侍二人道士十一人吏卒一百五十五人道士嵗費錢七百九十二千米百二十石監察御史余堯弼進殿中侍御史右正言巫伋兼崇政殿說書自秦熺兼侍讀每除言路必與經筵朝廷動息臺諫常與之相表裏焉吕中大事記人君起居動息之地曰內朝曰外朝曰經筵三者而已執政侍從臺諫皆用私人則有以彌縫於外朝矣又隂結內侍及醫師王繼先闖微㫖於內朝矣獨經筵之地乃人主親近儒生之時檜慮其有所浸潤於是以熺兼侍讀又以巫伋為說書除言路者必預經筵以察人主之動息講官之進說而臣無復天子之臣矣右朝奉郎蘇䇿為福建轉運判官庚戌上謂秦檜曰近覽左迪功郎吳適所進大衍圖辨證易中差誤可令祕書省看詳如或可采卿更審詢其人當處以庠序之職權刑部尚書周三畏落權字尚書比部貟外郎王㑹試軍器監甲寅皇太后朝景靈宫少師平樂郡王韋淵見后出言詆毁詔殿中侍御史余堯弼即其家鞫治淵具伏誣罔後六日責寧逺軍節度副使袁州安置二十年十一月淵復官丙辰敦武郎製造御前軍器所監造官馬元益特勒停送桂陽監編管元益上疏乞出秦檜奏其語言狂妄擬編置上曰真宗皇帝澶淵之盟敵人不犯邊塞今者和議人多異論朕不曉所謂止是不恤國事耳若無賞罰望其為國實難自今用人冝求靖共之操如其不然在朝廷者與之外任外任者置之間散間散而又不靖者加以責罰庶幾人知勸懲不至專為身計卿所進呈行遣馬元益正得此意賞罰既行數年後可望風俗丕變矣端眀殿學士提舉萬夀觀兼侍讀何鑄使北還以葬母乞去遷資政殿學士知徽州鑄出使乃議天屬事馬元益上書當是因鑄之還而有請但未見其書當更考詳直龍圖閣新知衢州韓球都大提舉四川茶馬監牧公事左朝奉郎知衢州張嵲為敷文閣待制丁巳拱衛大夫忠州防禦史殿前司左軍統領邵宏淵為荆湖北路兵馬鈐轄以從軍久願罷軍務也先是宏淵嘗從後軍統制張淵捕盜於閩中宏淵質直而喜功淵惡不用且恨其嘗對衆折已杖之百斥為士伍宏淵之客鍾鼎走行在上書為辨曲直秦檜怒送鼎福州州學聽讀熊克小歷云秦檜新創聽讀之名羈鼎於福之郡學按張浚當國時耿錫已坐伏闕上書送紹興府學聽讀非檜所創克誤也領都指揮使職事楊存中言於朝乃有是命鼎蜀人也己未詔責授清逺軍節度副使吉陽軍安置趙鼎遇赦永不檢舉右修職郎石恮追毁出身以來文字除名勒停特免真决送潯州編管初鼎貶潮州守臣徐璋為之治第且饋餉之恮時為録事參軍數與鼎相見及是恮代歸而璋已卒守臣左朝散大夫翁子禮發其事下大理鞫實鼎坐不自省循請託州郡借人抄書因令幹官顧湜囑恮供給書寫人於是恮違法大收人户鹽錢節次應副使用又嘗為子預恮公事改易情欵又受璋饋送八百餘緡璋又盜官錢為鼎蓋造第宅通計一萬餘緡紐絹三千六百餘匹故有是命此以日歷本文修入胡銓跋戒諭和議詔書云是時王鈇吕應中經略二廣皆望風捃托恮以為竒貨於是潮守徐某訐奏丞相趙鼎帥臣劉昉隂中丞相張浚云云按此時翁子禮實知潮州蓋子禮訐其事銓誤以為徐璋也初右奉議郎通判處州宋汝為既渡海來歸久之有告敵人汝為嘗以蠟書來言敵中機事敵久捕不獲㑹有知汝為已南遁者至是以姓名來求遣汝為時在紹興知行必不免一夕遁去雖家人無知者一子南強數嵗與其妻錢氏皆為有司所拘汝為即潛行入青城山中以醫卜自給更姓名曰趙復前實録院檢討官邵博識而憐之青城令楊高為營菴於布金院之傍且授以官田數十畝汝為躬耕山下數赴人之急由是人多重之五月癸亥朔上謂大臣曰川廣綱馬至鎮江軍中宜令本府及淮南漕司撥官地美水草處牧養只數年間便見蕃息此軍政所當留意甲子武經大夫達州刺史帶御器械李珂為內侍省押班乙丑拱衛大夫利州觀察使殿前司左軍正將李懷等十四人並差諸路兵馬都監至正將罷從軍用主帥楊存中請也是日雨雹丙寅上謂大臣曰近有布衣陳福建鹽法利便朕惟祖宗成法利於民者自當永久遵行儻或未便須議損益也己巳徽猷閣直學士提舉江州太平觀洪皓責授濠州團練副使英州安置皓丁內艱既終喪復遂祠請於是直徽猷閣王洋知饒州而左奉議郎陳之淵添差通判二人與右承議郎通判州事李勤積不相能勤幸以訐進告皓有欺世飛語洋之淵皆與聞之殿中侍御史余堯弼即奏皓造為不根之言簧鼓衆聽幾以動搖國是望竄遐裔洋之淵亦乞置之典憲詔罷洋之淵而皓有是命辛未敷文閣待制新知宣州秦棣過闕入見癸酉升敷文閣直學士中書請令軍中㨂退人耕江淮京西官逃田以自贍從之三十一年正月戊寅所書可參考乙亥祕書省校書郎兼提舉祕書省編定書籍官沈介守尚書司勳員外郎祕書省正字兼提舉祕書省編定書籍官湯思退守司封貟外郎辛巳金主使龍虎衛上將軍殿前右副都㸃檢完顔卞寧逺大將軍東上閣門使大圭來賀天申節卞金主兄弟行也辛卯寶文閣待制提舉江州太平觀趙思誠卒六月乙未詔金國使人見辭並設氊於庭下宰臣使臣亦如之丙申上謂秦檜曰雨澤稍頻細民不易檜曰前日蒙宣問常潤江南闕雨臣弟棣赴宣州新任近得本州申報雨已霑足上曰此時多雨陂塘有所瀦蓄秋或旱乾可備灌溉農夫有豐稔之望甚可喜也丁酉中書舍人兼權直學士院兼實録院修撰兼侍講錢周材罷殿中侍御史余堯弼論周材嘗對衆館職有徽宗實録難修之語詆毁不恭故有是命太常博士葛立方太學正孫仲鼇並為祕書省正字既而提舉祕書省秦熺奏以二人並兼編定書籍官從之熺奏辟在是月辛亥己亥尚書右司員外郎王鎡為中書舍人兼權直學士院乙巳殿中侍御史余堯弼奏權尚書工部侍郎嚴抑日逰執政之門此時汪勃假拂執政祕書省正字張本進不由道所校書籍悉皆舛誤於是二人並罷戊申太學博士王之望面對論舉人程文或純用本朝人文集數百言或作歌頌及用佛書全句舊式皆不考建炎悉從刪去故多犯者望申嚴行下從之甲寅左承議郎朱圯知德安府還入見乞將刑統律文內有犯本朝廟諱御名及音同者並易以他字詔禮部擬定乙卯宰執進呈眉州防禦使殿前游奕軍統制成閔招降到福建賊徒等第補官上曰銷弭盜賊當為逺慮若但招安補授恐此輩以嘯聚為得計是啓其為寇之心今已招到且依所乞可劄下諸路日後不許招安丙辰靜江軍承宣使提舉江州太平觀劉錫卒丁巳宗正少卿兼權兵部侍郎趙子厚罷以御史余堯弼言子厚往任小官荒於酒色今乃不自揆度每閲除目則不平之色形於面顔故也戊午檢校少保保慶軍節度使普安郡王瑗徙常德軍節度使檢校少保保大軍節度使恩平郡王璩徙武康軍節度使於是少傅孟忠厚少保楊存中皆徙節鎮之在南者秋七月甲子大理少卿張柄罷以御史余堯弼論其鄙暗怠忽也饒州刺史知金州節制屯駐右護軍馬李耕升忠州團練使再任乙丑詔臨安府更置庫造祠祭法酒舊取水於西湖上以軍民環居渠流混濁乃命别醖焉戊辰左承議郎添差通判嚴州秦昌時提舉兩浙東路常平茶鹽公事右通直郎添差通判袁州劉伯英提㸃荆湖南路常平茶鹽公事昌時檜兄子也伯英為檜所喜在湖南創造宅堂至飾以塗金衙前盜用官課者皆納其女而釋之人不敢問己巳太府少卿趙不棄自蜀中還入對上謂秦檜曰不棄必深知四川財賦計今調度給足則軍興以來凡所科敷並可蠲罷朕所以休兵講好蓋為蘇民力耳如其不然殊失本意壬申武泰軍節度使知荆南府劉錡提舉江州太平觀從所請也錡鎮江陵凡六年癸酉敕令所奏諸遭喪應解官而臨時竄名軍中規免執喪者徒三年所屬知情而為申請起復者減二等先是上數論大臣以為有傷風教者至是立法徽猷閣直學士左奉議郎胡寅引疾告老詔遷一官仍舊職致仕甲戌左朝奉郎新通判潼川府朝公武知恭州趙不棄薦之也庚辰詔資殿學士四川宣撫副使鄭剛中令赴行在奏事太府少卿趙不棄權尚書工部侍郎徽猷閣待制知成都府李璆權四川宣撫司職事初秦檜以不棄與剛中有隙遂召之而以符行中代總軍儲其實不樂剛中也剛中頗覺之私謂人曰孤危之跡獨賴上知之耳檜聞愈怒剛中在蜀六年事或專行其服用往往踰制不棄還朝頗文致其事故剛中遽罷右正言巫伋奏右朝散大夫知利州元不伐撰造行在言語自云出入奧密事皆誣誕扇惑逺方詔除名夔州編管尚書禮部貟外郎王曮主管台州崇道觀以殿中侍御史余堯弼論其躁進也癸未詔李璆符行中同共參酌措置減放四川科敷錢物先是鄭剛中為宣撫副使上命剛中與總領司參酌措置剛中言四川財賦利源大者無過鹽酒曽不知鹽酒之法已是窮盡惟有扶持講究隨事救助尚可枝梧儻更增添其法立壞鹽與酒既不可更改自餘言利便者皆蔽守一端不盡見四川久逺利害惟有取用度名色更行撙節及軍中可以裁減事件隨宜措置庶幾便見實效今先次減省本司官吏及將人馬可以䟎移頭項更令向裏就糧以減水運腳費并應有舊例合支錢物隨事裁損仍參照本司向來所入窠名錢物今已併屬總領錢糧所拘收舊係本司樁積備邊在贍軍嵗計之外其逐項窠名嵗計錢引五百八十一萬五千道如䝉取撥應副嵗計即可對減增添窠名寬省民力疏奏乃有是命甲申江東安撫司乞遣官拍試效用上曰今三衙諸軍教閲不廢故武藝皆精秦檜曰承平時亦自閲習今御前呈引激賞分眀故諸軍爭勸也乙酉左承議郎李觀民知濠州代還入見言陛下信任一德之臣修講鄰好力偃戎兵而民免於塗炭者七年於兹頻嵗有秋人皆樂業伏願戒飭邊臣毋致少有生事庶幾仰承德意之萬一從之丙戌秦檜奏以左朝散大夫謝尋知潮州上曰凡除郡守莫須到堂否檜曰例須參辭上曰今既休兵正以民事為急卿冝更加詢審如昏耄無取者不若只與宫祠左朝請郎提舉江州太平興國宫張廣卒訃聞詔復敷文閣待制致仕熊克小歷云廣疾革請老丙戌上曰此吾中興詞命之臣詔除敷文閣待制致仕此據汪藻廣墓碑所書也其實廣復職在九月己巳克誤於其卒日書之爾王明清揮麈録餘話稱廣求休致先除次對帥南昌與日歷所書不同當考丁亥右朝奉大夫鮑貽遜卒戊子行營右護軍都統制吳璘改充御前諸軍統制兼知興州璘改都統銜諸書不載王綸撰神道碑言在此年今因移郡併書之八月丙申檢校少師嶽陽軍節度使提舉佑神觀王舜臣薨壬寅大理正周贊幹辦諸軍審計司章服並罷服金華人殿中侍御史余堯弼論二人官於行朝隂與外交凶險之謀略無顧忌故有是命癸卯責授清逺軍節度副使趙鼎卒鼎在吉陽三年故吏門人皆不敢通問廣西經略使張宗元時遷使渡海以醪米饋之太師秦檜令本軍月具鼎存亡申尚書省鼎知之遣人呼其子汾謂之曰檜必欲殺我我死汝曹無患不爾誅及一家矣乃不食而卒年六十三四方人聞之有泣下者乙巳直祕閣知臨安府沈該為尚書禮部侍郎權工部侍郎趙不棄充敷文閣待制知臨安府丙午召龍圖閣學士知紹興府詹大方為工部尚書戊申以該為賀大金正旦使閣門宣贊舍人蘇曄副之大方為賀生辰使閣門宣贊舍人容肅副之上覽不棄除目因曰朝廷於臨安不免時有所須如御膳米初日供今則月一取之庶吏不敢緣此擾民也左朝請郎主管台州崇道觀施庭臣卒丙辰詔自今百官應轉對而以病告者並俟疾愈日上殿時秦檜惡聞人言百官當面對者多稱疾不入上怪之故有是命丁巳秦檜因論及月樁錢上曰卿未還朝時朱勝非等創造月樁朕每以為非理屢與宰執言終未能大有所蠲減卿可從長措置庶寬民力後二日檜奏近令監司郡守不得獻羡餘今聞乃資妄用乃詔諸路監司郡守將寬剩錢物樁管每季具數申省聽候撥充月樁其不係月樁路分依此通融科撥檜曰陛下志欲減免田租實盛德之事今自月樁錢始戊午寶文閣直學士賈讜卒己未賔德軍節度使提舉萬夀觀邢孝揚為太尉易鎮安慶軍録出疆之勞也寶文閣學士王㬇提舉萬夀觀㬇知平江府以疾請奉祠而兩浙轉運判官湯鵬舉奏其應辦國信每事豐腆並無遺闕乃有是命㬇至行在數日卒贈右銀青光祿大夫賜銀絹五百匹兩例外官子孫一人官給葬事九月按是月壬戌朔乙丑秦檜奏殿前步軍司乞招安到海寇分𨽻諸軍上曰海賊若竄須當捕之仍令常加存恤毋使為民患戊辰隨州觀察使張思正卒於台州己巳減四川科敷虗額錢嵗二百八十五萬緡用宣撫副使鄭剛中總領官符行中奏也於是減兩川市估錢五分之一布七十三萬匹每匹估二千有半今共減三十六萬五千餘緡䕫路鹽錢六分之一大寧監四分鹽一百三萬七千餘斤本路六十井鹽四十八萬五千餘斤舊每斤三百錢今減五十共減七萬六千緡坊場河渡淨利抽貫稅錢十分之四元額十一萬八千今減四萬六千餘緡又減兩川米腳錢四十二萬緡十六年十二月已減三十二萬時行中得宣撫司降賜庫見樁米一百萬石乃命行中酌度對糴分數均減均減對糴米指揮在是月癸酉今聫書之壬申武經大夫和州團練使內侍省押班李珂為入內內侍省押班景福殿使安德軍承宣使帶御器械張去為為內侍省押班甲戍右朝散郎直祕閣吕托除名梧州編管秦檜追恨頥浩不已使台州守臣曺惇求其家隂事㑹托嫂姜氏告撫蒸其庶弟之母送獄窮治托懼罪陽瘖乃以衆證定罪於是一家破矣葉義問劾曺惇章疏稱惇守台州訐頥浩家隂事按日歷惇十四年六月差知台州十八年七月丁酉以右朝散郎權發台州回進對此時蓋未滿也乙亥户部具到江東西諸州月樁錢二十二萬七千餘緡信州五萬四千宣州四萬九千徽州五萬八千撫州二萬五千江州萬緡筠州南安軍各六千臨江軍四千建昌軍二千皆有竒上曰科敷之纍富者猶不能堪下户何所從出若計諸州羡餘以減月樁誠寬民力秦檜曰指揮之下百姓想皆歡欣鼓舞上曰朕備嘗艱難知細民闕乏雖百錢亦不易得故不欲妄費或有餘財即命樁留以待緩急庶幾臨時不致失措丙子資政殿學士四川宣撫副使鄭剛中罷先是殿中侍御史余堯弼奏剛中天資凶險敢為不義専與異意之徒合為死黨妄用官錢縱使游士搖唇鼓舌變亂黑白四川有都轉運司蓋總四路財計以贍軍須也俾乘間上書併歸宣司則是制軍給食通而為一雖密院户部不得如此祖宗維持諸路之計於此掃地不知剛中封靡自植欲以何為總領司建置之意蓋與諸路一體剛中怒形於色不容總司舉職朝廷不得已為之易置則又揚言以為已能自古跋扈藩鎮敢如此否章未報堯弼又奏剛中奢僭貪叨妄作威福罔上不忠敗壞軍政五罪乃有是命仍令剛中於鄂州聽㫖其隨行軍實令湖廣總領所交割具數申省軍兵令都統制田師古拘收押還本司十二月甲寅行遣丁丑從義郎禹圭除名萬安軍編管圭盜用庫金懼罪走北界為泗州押還法當死特貸之己卯安南請入貢詔經界司受而答之癸未執政進呈大理正章燾面對乞命監司郡守察縣令之賢否上曰令最親民不能一一銓擇不職而後治之百里已受其弊有治狀者當議擢之庶其知勸實惠及民矣甲申中書舍人兼權直學士院王鎡兼侍講殿中侍御史余堯弼兼崇政殿說書乙酉右承務郎監尚書六部門康與之為軍器監丞丙戌詔江浙見輸折帛錢太高慮民難出令紬帛各減價每匹江南六千兩浙七千和買六千五百綿每兩江南三百兩浙四百自眀年始先一日秦檜進呈諸路監司守臣自今所部縣令治狀顯著保眀奏聞上曰當今正以惠飬百姓為先務檜曰如民間折帛錢太重理冝蠲減上曰朕久有此志祖宗時每縑價直八百官司乃以一千和買民間既免舉債出及絲蠶收成之後並皆樂輸趙鼎張浚為相時乃創折帛之請令人户折納見錢殊為非理不知今折納若干檜曰當令戶部取見實進呈上曰若隨逐路色額減納錢數非唯可蘇民力且使知朕所以休兵之意至是行下吕中大事記檜雖諭江浙監司暗增民稅幾倍而上則減諸路月樁錢減四川雜征弛夔路酒稅除永道等州身丁錢出內帑絹帛代輸丁錢減江浙折帛錢其愛民之寬自若也是月金主亶出獵至隂山之北打圍遂至大同府冬十月辛卯朔日有食之隂雲不見熊克小歷在十一月朔蓋誤癸巳代州防禦使荆湖南路馬步兵總管王瑋為永州防禦使充龍神衛四廂都指揮使知荆南府秦檜之留守臨安也瑋為留守司統制故薦對而命之直祕閣知盱眙軍畢良史升直敷文閣再任左朝奉大夫通判瀘州程敦臨為利州路轉運判官敦臨眉山人與秦檜有太學之舊故躐用之丙申户部侍郎李椿年言州縣多侵用封樁錢物至有倉庫寓於民舍僧寺者欲望特下明詔遣御史巡察州縣按其所不如法者重加黜責仍令監司先期整頓所部修飭倉庫舉行詔令取見封樁錢詣實保奏將來遣使按察稍有違戾亦當一例坐罪不以去官赦降原減詔如所奏令户部差官癸卯詔建太一宫於行在自駐蹕以來嵗祀十神太一於惠照僧舍言者以為未稱欽崇之意乃作宫焉熊克小歷在十二月癸卯蓋誤右正言巫伋論州縣奉行詔條違戾不稱陛下愛養元元之意望令以前後詔書編次成册置之㕔事常切遵守翌日上謂大臣曰朕屢降寬恤指揮而守令不能奉承安得惠及百姓可如伋奏仍令監司按劾以警慢吏甲辰秦檜進呈殿前馬步三司管軍扈衛十年取㫖推恩上曰往日將帥出戰立功時有遷轉今休兵日久如已建節者固不較計其它豈無升進之望當有以繫其心且使後來者知勸丙午舒州觀察使帶御器械潘溫卿為寧國軍承宣使吳國長公主請以溫卿該恩回授二秩轉行一官乃有是命丁未詔太常少卿嵗以春秋二仲薦獻紹興府山園陵攢宫季秋令監察御史按視以殿中侍御史余堯弼援舊制有請也戊申慶逺軍節度使提舉江州太平興國宫張澄知襄陽府時左朝議大夫知襄陽府陳桷引疾求罷後旬日復桷祕閣修撰奉祠己酉少保寧逺軍節度使領殿前都指揮使職事楊存中為少傅用扈衛十年推恩也祕閣修撰知溫州趙不羣升右文殿修撰再任以浙東提㸃刑獄公事林師說奏其治狀也右朝散大夫閻大均追一官勒停鼎州編管先是大均守渠州代還鄭剛中掌宣撫司機宜文字及是至行在為剛中乞祠且言宣司財賦大均與尚書省令史李師中善師中以朝廷行遣次第告之秦檜廉知下大理究治故有是命師中追二官南雄州編管壬子秦檜奏四川命官因罪停降遇恩該叙復者見係宣司施行欲收還省部上因論蜀人仕宦多不出蜀中自今冝量與東南差遣庶逺近人情無彼此之間丁巳集英殿修撰知福州薛弼通判州事左朝奉郎衛蒙亨右朝奉郎林充各降一官先是進士鍾鼎以上書訟邵宏淵押送福州聽讀鼎禱弼求依所親於永福弼聽之至是鼎復來行在尚書秦檜怒弼以為不切拘管故有是命協忠大夫果州防禦使太平州駐劄御前前軍統制雷仲卒戊午降授鳳州團練使添差荆湖南路馬步軍總管辛永宗再貶秩一等坐嘗為人請求補官不當也己未錢塘縣言龍山院降甘露詔付史館庚申左宣義郎敕令所删定官曹筠充諸王宫大小學教授筠當塗人政和末秦檜自金陵游學京師至當塗㑹大雨水橋斷不能進筠適居墟中為人訓子弟即入白主人延入飯之止檜宿焉其後筠以纍舉得官調台州録事參軍老病不任事守臣張稱劾之筠急以懇檜念其故遂召用之十有一月按是月辛酉朔壬戌上諭大臣曰諸郡災傷冝令留意檢放不可茍取一時租稅致民逃移難以復業熊克小歷在十二月壬辰蓋誤癸亥大理寺丞范洵面對乞州縣獄囚並令獄官令長親加勘訊縱吏考鞫者重置典憲詔申嚴行下甲子詔三路市舶司自今蕃商所販丁沉香龍腦白豆寇四色各止抽一分先是十取其四朝廷聞商人病其重也故裁損焉丙寅太師尚書左僕射提舉詳定一司敕令秦檜上紹興常平免役敕令格式四百九十九卷詔鏤版頒之右武郎添差兩浙西路兵馬鈐轄劉懋帶御器械懋媫妤父也丁卯權禮部侍郎周執羔請復賜新及第進士聞喜宴於禮部貢院從之自軍興廢此禮至是乃復龍圖閣直學士提舉江州太平興國宫葉份上表告老詔遷一官致仕份尋卒戊辰左奉議郎史才為國子監主簿才鄞縣人也眉州防禦使殿前司游奕軍統制成閔以捕福建盜賊功遷宣州觀察使於是其將佐武顯大夫張寧武翼郎周虎臣敦武郎金鼐等三十六人並進一官鼐湖州人以資授官寧為秦檜看閣子故亦遷焉己巳執政進呈大理寺丞范洵面對乞州縣吏人犯罪不許引用通計條上曰法律所載非不該備然情僞日滋亦須隨時損益可令有司看詳壬申禮部侍郎周執羔言文臣遇郊改轉服色內四川便宜轉授之人如止是末後付身未曽換給而以次真命官資應得赦文即乞放行所貴邊逺士大夫不致留滯從之熊克小歷初四川宣撫司得便宜補官皆預給敕牒至是㑹萃令吏部換給秦檜疑其未實多格不行吏部侍郎周執羔言於檜以謂朝廷本許以一切不宜失信乃從之克所云蓋據執羔行狀與日歷差不同按執羔此時以禮部兼權吏部侍郎或即此事也乙亥資政殿學士知徽州何鑄提舉江州太平興國宫從所請也丁丑右正言巫伋言選人改官銓法注知縣蓋舉詞皆云堪充親民任使祖宗立法之意止要為民擇官而比來改秩無意作縣多干堂除則是與舉詞已相違矣望令吏部並注知縣不惟親民之官得人亦可革奔競之風上曰銓曹自有成法可令遵守左奉議郎洪適右朝散郎通判濠州曽恬並罷適通判台州與守臣曽惇不相能恬公亮孫少嘗尊事楊時謝良佐劉安世陳瓘得存心養性之學及為大宗正丞秦檜專政士方求媚以取要官而恬自守無所詘殿中侍御史余堯弼論適姦險彊暴得自家傳在台州貪墨踰濫恬縱脫不檢自謂趙鼎門人常懷怨望遂黜之既而恬又坐擅興工役貶秩恬眀年六月丁酉降官許及之撰恬行狀云通判台州將終更忠宣有英州之謫台守與公不相能公嘗行縣至黃巖令以繫囚十數輩匿堂廡間詭以獄空告公坐㕔事聞大呼聲即詰視諸囚囚皆呌號稱寃因備其事申諸司歸白守守以為不關白長官撰彈文迎秦意秦諷言官上之坐免官戊寅左承議郎姚邦基主管台州崇道觀丙戌徽猷閣待制提舉江州太平興國宫何慤卒丁亥右朝奉大夫提舉福建路市舶曹泳為兩浙路轉運判官戊子諸王宫大小學教授林天鼐葉綝並兼權祕書省校勘書籍官用提舉官秦熺請也是月金主亶復歸上京十有二月辛卯朔詔諸州見管編配命官及事干邊界情理重害之人各仰遵守見行成法不得擅行移放令提刑司常切檢察用刑部請也寶謨閣待制提舉江州太平觀張致逺卒乙未左奉議郎章厦主管官誥院厦宣城人也右承議郎新通判衡州張棣知新州右承奉郎陳適知昌化軍先是秦檜擬除廣西郡守上曰廣東西闕官自來多是權攝如海外州軍監司巡歷不到朕每以為慮自今闕官處可早與除丙申初賜百官喜雪御筵於秦檜第翌日上謂檜曰雪後便覺寒非唯有豐稔之望來嵗疫癘亦必消弭可為農民之慶也永州防禦使許世安為嚴州觀察使以解帶恩也右承議郎劉子翬卒子翬既奉祠盡棄人事獨居一室意有所得則筆之於書四方學者多從之至於得微疾即入謁家廟泣别其母遍以書告訣素所與往來者召其兄子珙付以家事指示葬處中外孤遺人人為計久逺既已則復與學者講說修身求道之要作訓誡數百言彈瑟賦詩淡然如平日居兩日而沒年四十七其所著有聖傳十論等書皆行於世己亥大理少卿許大英面對乞令諸州法司吏人只許檢出事狀不得輒言豫奪詔申嚴行下癸卯婺州進士施諤進中興頌行都賦各一首紹興雅十篇詔永免文解徽猷閣直學士提舉江州太平興國宫周祕卒乙巳右宣教郎添差通判溫州高百之直祕閣百之世則子也百之女為秦塤婦其除職所因未見當考丙午封秦熺妻建康郡夫人曹氏為和國夫人熺女令人秦氏為同安郡夫人丁未左承奉郎林機右承奉郎周紫芝並為樞密院編修官敦武郎閣門祇候張昻充東南第十四將戊申右朝散郎主管官誥院陳大方罷時吏部郎官闕大方以例暫兼㑹當奏事誤書權吏部侍郎殿中侍御史余堯弼論其鄙俗不忠故罷大方瓘孫已見庚戌直龍圖閣都大提舉川秦茶馬監牧公事韓球始至成都自趙開以來每茶百斤除其十勿算球至官遂盡取園戶加饒之茶增為正額有一場而增至二十萬斤者民知輸官不補所得於是起為私販夔茶自祖宗以來不𣙜禁政和中有司請賣引議者以民夷不便罷之球又𣙜忠達州茶即渠合廣安軍置場賣引嵗以八萬斤為額然商人以利薄不通第以引錢敷民間耳民甚苦之二十六年六月乙亥二十七年十一月陳請可考辛亥封紅霞帔陳氏為永嘉郡夫人癸丑左朝奉郎檀倬卒甲寅資政殿學士鄭剛中落職提舉江州太平興國宫桂陽監居住先是殿中侍御史余堯弼再論剛中抗命偃蹇遲留不行四川自建炎之後惟知宣撫之尊蓋以去朝廷逺能自立威福故也方今中興總攬權綱之時而剛中乃爾怙權傲慢伏望亟賜竄責以為臣子不忠之戒右正言巫伋復論剛中四罪以為騶導擬於乘輿賄賂溢於私帑暴無名之斂以重困吾民造不根之謗以恐動逺俗既被召命不即引道而密遣爪牙窺伺朝政故有是命堯弼章疏十一月己酉降出伋章疏十一月甲戍降出右朝請大夫兩浙東路提㸃刑獄公事林師說罷殿中侍御史余堯弼論師說於職事之外招致背國異議之屬列在僚佐自云廣中逐客有送我百韻詩又云趙相未可量實於國事非便上曰人心不同豈能盡知但當試用若有肯協濟國事自須進擢如意懷二三狙詐謀身者不免斥去以示好惡則士風偷薄庶幾少革故師說遂罷丙辰金主使金吾衛上將軍殿前左副都㸃檢完顔宗藩安逺大將軍充東上閣門使吳前範來賀來年正旦宗藩金主亶從父行也中書舍人兼侍講兼權直學士院王鎡卒自是不復除舍人也丁巳權尚書吏部侍郎邊知白兼權直學士院尚書刑部員外郎吳㮚為右司貟外郎是嵗宗子賜名授官者二十二人諸路斷大辟三十五人言者論㑹稽士大夫家藏野史以謗時政於是李光家藏書萬餘卷其家皆焚之金主亶遣使挾相士下兩河諸路選民間室女得四千餘人皆令入宫建炎以來繫年要録卷一百五十六建炎以來繫年要録卷一百五十六金人地名考證鄂掄貝勒原書作熬囉孛極烈誤改見卷一百五十五蒙古原書作蒙兀誤改見卷九十六
