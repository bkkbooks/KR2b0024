body:
  text: 建炎以來繫年要録卷二十一宋李心傳撰建炎三年三月己卯朔詔金人已退當進幸江寧府經理中原庚辰中書侍郎兼御營副使朱勝非守尚書右僕射兼中書侍郎兼御營使勝非自平江還朝以晡入見是夕鎖院故事命相進官三等至是勝非特遷五官為宣奉大夫熊克小厯勝非拜相在庚辰日厯在己卯按勝非間居録亦云三月一日至臨安以晡入見則降制必在初二日也勝非自記當得其真今從之初金人攻泰興縣有嚴起者率軍民拒之賴以免者甚衆詔授保義郎閣門祗候金人分兵侵江隂至夏港距城八里而近守臣胡紡遣統制官王換等拒敵且謂承事郎簽書判官㕔公事李易曰吾曹有死城郭之義公母宜勉之少避易歸告其母蔣氏蔣氏曰我去則汝决不肯堅守願與汝同死生聞者感泣既而金人以潮生有備亦引去此以鄭純所作序及胡紡祭文易紹興十一年八月癸未陳乞加封狀參修序以為建炎庚戍三月二日事故附於此日降授右武大夫和州防禦使馬擴應詔上書言前日之事其誤有四其失有六始者任用非才不能乘機拓境取侮敵人敵既退師略不為備陛下乘時御極不知西據蜀險就六路形勢力治兵戰以圖恢復反使翠華淹處淮甸甘蹈覆轍泥於請和使勢力日益窮蹙此四誤也金既入敵童貫遁歸京闕被圍遽割三鎮復隳信誓其實無能其後金人既自界大河而我不能倚以為固信王脫於拘囚結集忠義所得壯勇不啻數十萬顒望王師相為䇿應奈何羣言譛沮禁止渡河反使金人簽軍南渡既連陷大名東平略不為備遂使金人乘勢蹂躪此六失也按北盟㑹編載擴疏二千餘言此係莭文竊料金人逺來人馬疲乏且自爭玉帛子女飽其負載兼淮西仍多民兵彼顧前無利計後有害又有江北不及渡者西兵與諸軍潰卒往往奪路㑹合於范瓊敵又睥睨金陵鎮江守把舟船而天雨連降平地水發道塗泥濘馬步俱不能進是以敵心頓沮不思渡江以迫大駕此皆上天眷祐有宋許陛下得以圖維臣今輒以機速利害畫為三䇿願陛下幸巴蜀之地用陜右之兵留重臣使鎮江南委健吏以撫淮甸破敵人之計回天下之心是為上䇿都守武昌襟帶荆湖控引川廣招集義兵屯布上流扼據形勢密約河南諸路豪傑許以得地世守用為屏翰是為中䇿駐蹕金陵備禦江口通達漕運亟製戰艦精習水軍厚激將士以幸一勝觀敵事勢預備遷徙是為下䇿若貪顧江湖陂澤之險納探報之虛言緩經營之實績倚長江為可恃幸敵人之不來猶豫遷延候至秋冬使敵人再舉驅集舟楫江淮千里數道並進方當此時然後又悔是為無䇿纍數千言皆切事機是日日中有黑子按宋史繫己卯朔辛巳尚書右丞葉夢得罷夢得初執政上諭之曰今日兵食二事最大當擇大臣分掌門下侍郎顔岐等頗疾之乃語知杭州康允之曰上欲以次對授公而為左丞沮止允之怒與其將曹英謀以為陳通餘黨在者三千餘人聞夢得秉政不自安皆謀為亂上不信岐等證之夢得與朱勝非舊不相能勝非入相首言夢得議論不協㑹杭州士民上書訟夢得過失有及其閨門者是日上批夢得深曉財賦可除資政殿學士提舉中太一宫兼侍讀提領户部財用充車駕巡幸頓遞使夢得執政凡十四日而罷辭不拜遂徑歸卞山朱勝非秀水間居録云初四日留身奏葉夢得方除執政才旬日何為遽罷上曰提領財用亦有例余曰頃在揚州張慤以中書侍郎兼此事至於自作酒肆人以為非體遂罷上曰數日來尚書論夢得知杭州過失三四十封其間進士姓周人及其閨門其言可駭恐臺諫聞之不便姑罷政事且留他在此待降出書本令卿看余曰果如此夢得豈敢復留上曰待他有請却與一郡夢得果請除帥江西尋降出士民所陳三十七書歸堂按此所云與其行述全不同然勝非初相執政罷免無容不知趙甡之遺史稱勝非言夢得議論不協今從之夢得除帥江西諸書皆無此事恐是明受中指揮姑附此當求他書𠫭考同知樞密院事盧益守尚書左丞未拜復罷為資政殿學士提舉西京嵩山崇福宫益之罷日厯不書似因張􅊹論二相疏中及之故也當求他書參考嚮德軍節度使御營使司都統制王淵同簽書樞密院事仍兼都統制淵自平江赴行在既對遂有是命諸將多不悅者淵輕財好義家無宿儲每曰朝廷官人以爵使祿足代其耕也若切切事錐刀愛爵祿我何不為大賈富商耶尚書吏部侍郎兼直學士院孫覿試户部尚書資政殿學士同簽書樞密院事江淮兩浙制置使吕頥浩為江南東路安撫制置使兼知江寧府自乾德以來輔臣以本職典藩者惟吕餘慶郭逵及頥浩樞密院編修官秦梓改宣教郎以其弟檜久在金特優之也禮部侍郎充御營使司參贊軍事張浚言江北之地其勢須變為藩鎮然後可守乞詔宰執詳之俟金人畢退即便施行江南一帶非依重鎮擇近上文武臣寮守之許以便宜行事恐不能堅守乞早賜措置時朝士張虞卿等十九人上疏亦以藩鎮為言朱勝非奏宜倣藝祖初議權時制宜行在為京師淮北為藩方淮南為郡縣㑹多事不果行虞卿齊賢逺孫也齊賢寃句人淳化中宰相熊克小厯以虞卿為建安人而洪邁夷堅甲志云虞卿齊賢裔孫居伊陽今從之小厯又云倉部郎中張虞卿等乞建藩鎮按日厯虞卿以今年四月戊午除虞部員外郎此時勝非已去矣當建言時未為倉部克誤也勝非間居録亦不云虞卿為何官今闕之俟考浚又請㳂江要害州軍置强弩營選州禁兵縣弓手為之仍專置軍器提舉官募公私匠人以除戎器乃命諸路憲臣措置製造赴行在命學士給舍輪日於禁中看詳臣民章奏條上仍不用內侍輪送止實封往反以言者建陳欲免交結之弊故也尚書金部郎中李逮員外郎髙士佃為主管車駕巡幸隨行左藏庫錢物官兩浙轉運副使劉誨為主管車駕巡幸錢糧官徽猷閣直學士江淮等路發運使梁揚祖落職提舉亳州明道宫揚祖既不渡江又不赴行在故貶尚書左司員外郎葉份充祕閣修撰江淮等路制置發運副使兼提領措置行在茶鹽壬午詔新除簽書樞密院事王淵免進呈書押本院公事初扈從統制武功大夫鼎州團練使苗傅自負世將有勞以淵驟得君頗觖望起復武功大夫威州刺史劉正彥常招降劇盜丁進等以賞薄怨事見二年十月又淵既薦正彥後􅊾取其所豫兵事見二年二月己卯正彥執不遣以此怨淵上在維揚宣政使金州觀察使入內內侍省押班康履頗用事妄作威福諸將多疾之及幸浙西道吳江左右宦者以射鴨為樂比至杭州江下觀潮中官供帳赫然遮道傅等切齒曰汝輩使天子顛沛至此猶敢爾耶有中大夫王世修者能甫兄子也靖康末知滎澤縣以守禦功改京秩遂為傅幕賓世修常疾閹宦恣橫為尚書右丞張􅊹言之澄不納世修退為劉正彥言之正彥曰君言甚忠當與君同去此輩俄聞淵入宥府傅正彥以為由宦者所薦愈不平遂與世修及其徒王鈞甫馬柔吉張逵等謀先斬淵然後殺內侍鈞甫柔吉皆燕人所將號赤心軍議已定此以王庭秀閲世録修入朱勝非間居録云正月間王淵自揚州發大船十隻皆是囊槖杭人指言淵去年平陳通等先令供郡中冨民所寄贓物既盡誅之悉取其家資又以所供文字一一追來違拒者亦殺之所取不可勝計今船中皆其物也內侍官搬家舟亦數十隻相繼到此頗不循理彊占民居彊市民物衆皆怨憤不能平及聞車駕渡江諸軍潰亂張逵建議誘說諸軍曰王淵為都統制不能捍賊致此狼狽前日先發金玉百船來便有不守揚州之意今車駕幸杭州王淵必來行見杭州又似揚州矣若能殺淵而取其物及取內臣家計可人人致富衆人共為之朝廷必不能遍罪姦謀蓋自此始是日宰相朱勝非留身奏事言王淵除命諸將有語乃令淵依執政恩例不與院事行在録云壬午傅正彥請對是日王淵罷朱勝非復辟記云勝非言王淵除命諸將有語臣記武臣作樞有免進呈書押故事今淵既兼都統制於武臣尤有利害臣欲依故事免之仍罷其兼管庶弭衆論上然之按是時諸老將皆不在杭州必傅正彥云云而勝非有此請也今掇取附見傅等即部分兵馬且使人告淵以臨安縣境有劇盜欲出兵捕之康履之從者有得小黃卷文書卷末字兩行曰統制官田押統制官金押履問此何謂也曰軍中有謀為變者以此為信號從之者書其名於前履密以奏上命履至都堂諭勝非使召淵為備勝非問知其謀否履曰略知期以來早集於天竺寺方諭其意田即苗也金即劉也詐言謀於城外以誤淵使遣部曲出外耳履去勝非即召淵告之日暮淵遣一將將精兵五百人伏於寺側此以朱勝非間居録修入是夜城中驚惶居民杜門不敢出俗號為沙魘人皆通夕不寐癸未神宗皇帝忌百官行香罷制以檢校少傅奉國軍節度使制置使劉光世為檢校太保殿前都指揮使百官入聽宣制傅正彥令世修伏兵城北橋下俟淵退朝即捽下馬誣以結宦官謀反正彥手斬之遂遣人圍康履家分兵捕內官凡無鬚者皆殺傅揭榜於市曰統制官苗傅謹伸大義播告天下民庶官吏軍兵等邇者大金侵擾淮甸皆緣姦臣誤國內侍弄權致數路生靈無罪而就死地數百萬之金帛悉皆委棄社稷存亡懸於金人之手今此大臣內侍等不務修省尚循故態為惡罔憸使民命皇皇未知死所進退大臣盡出閹宦賞罰士卒多自私門金人去住罔測朝廷安然坐視又無措置即日兩浙之民遂有維揚之禍嗟爾士庶興言及此寧不傷感朝廷微弱未能明正典刑天其以豫為民除害應大臣罪惡顯著及內侍官等並行誅戮期爾士庶一德一心共圖中興之業慎無生疑以致後患本為生靈别無所希爾等若獲安居傅等赴死未晚昭示此心誠貫白日宜相訓告以信萬方正彥既斬淵即與傅擁兵至行宫北門外衛士出刃以指其軍傅正彥遂陳兵於門下中軍統制官吳湛與傅等通為囊槖被甲持刃守宫門宫門亟閉時尚書右丞張澄方留身曲謝康履遽前奏有軍士於通衢要截行人履馳馬獲免上召朱勝非等告之勝非曰吳湛在北門下營專委伺察非常今有報否上曰無報俄而湛遣人口奏傅正彥手殺王淵以兵來內前欲奏事上大駭愕不覺起立行在録云是日夜漏未盡四刻而聞變按朱勝非復辟記輔臣奏事已退又王淵退朝而被殺則必非夜漏未盡時今不取勝非曰既殺王淵反狀已著臣請往問之及門吳湛迎語曰人已逼門不可開勝非澄遂與門下侍郎顔岐簽書樞密院事路允迪急趨樓上傅正彥與鈞甫柔吉世修逵等介胄立樓下以竿梟淵首勝非厲聲詰問專殺之由吳湛引傅所遣使臣入內附奏曰苗傅不負國家止為天下除害耳於是從官皆在學士直舍有一閹走入學士院自剄不死卧前厠知杭州康允之見事急率從官扣內東門求見請上御樓慰諭軍民不然無以止變俄獨召允之入日將午上步自內殿登闕門蓋杭州雙門也百官皆從權主管殿前司公事王元大呼曰聖駕來傅等見黃蓋猶山呼而拜上憑欄呼傅正彥問故傅厲聲曰陛下信任中官賞罰不公軍士有功者不賞內侍所主者乃得美官黃潜善汪伯彥誤國至此猶未逺竄王淵遇敵不戰因交康履乃除樞密臣自陛下即位以來立功不少顧止作遙郡團練使臣已將王淵斬首中官在外者皆誅訖更乞康履藍圭曽擇斬之以謝三軍上諭以內侍有過當流海島卿可與軍士歸營傅曰今日之事盡出臣意三軍無預焉且天下生靈無辜肝腦塗地止緣中官擅權若不斬履擇歸寨未得上曰知卿等忠義已除苗傅承宣使御營都統制劉正彥觀察使御營副都統制軍士皆放罪傅不退其下揚言我等欲遷官第須控兩匹馬與內侍何必來此上問百官䇿安出有朝散郎主管浙西安撫司機宜文字時希孟者曰中官之患至此為極若不悉除之天下之患未已上曰朕左右豈可無給使希孟曰年長者悉除之擇十五嵗以下者供灑掃之役可也軍器監葉宗諤曰陛下何惜一康履姑以慰三軍上不得已命吳湛執履捕得於清漏閣仰塵上衛士擒至閣門履望上呼曰大家臣死矣何獨殺臣遂以付傅等即樓下腰斬之梟其首與淵首相對希孟君卿子也君卿巨鹿人終環州刺史履既死上諭傅等歸寨傅等因前出不遜語大略謂上不當即大位將來淵聖皇帝來歸不知何以處上命朱勝非縋出樓下委曲諭之傅請隆祐太后同聽政及遣使金人議和上許諾即下詔書恭請隆祐太后垂簾權同聽政百官皆出門外傅正彥聞詔不拜曰自有皇太子可立况道君皇帝已有故事張逵曰民為貴社稷次之君為輕今日之事當為百姓社稷又曰天無二日衆皆驚愕失色百官復入言傅正彥不拜上問故衆莫敢對時希孟獨曰有二說一則率百官死社稷一則從三軍之言通判杭州事浦城章誼叱之曰此何等語也三軍之言豈可從耶上徐謂勝非等曰朕當退避但須禀於太后勝非言無此理顔岐曰若得太后自諭之則無辭矣上乃令岐入奏又命吳湛諭傅等曰已令請太后御樓商議是日北風徑甚門無簾帷上坐一竹椅無藉褥王庭秀閲世録云上御金漆椅子今從趙甡之遺史既請太后御樓上即立楹側不復坐百官固請上曰不當坐此矣太后將出殿門宫中人牽衣號慟后曰一足出門事不可測今與汝等别少頃太后御黑竹輿從四老宫監出宫太后不登樓內侍報上密語上曰太后欲出門諭諸軍如何執政皆以為不可曰方有此請若為邀去奈何勝非曰必不敢臣請從太后出傳道語言可觀羣凶之意遂肩輿出立樓前見傅等執政皆從之王庭秀閲世録云太后乘竹輿至樓上命儀鸞司設帷垂簾置坐不能具止坐輿中傳㫖又肩輿至門下按朱勝非復辟記云太后乘小輿至不肯上勝非時為宰相必得其真今從復辟記傅正彥拜於輿前曰今百姓無辜肝腦塗地望太后為天下主張后曰自道君皇帝任蔡京王黼更祖宗法度童貫起邊事所以招致金人養成今日之禍豈關今上皇帝事况皇帝聖孝初無失德止為黃潜善汪伯彥所誤今已竄逐統制豈不知傅曰臣等已議定豈可猶豫后曰待依所請且權同聽政傅等抗言必欲立皇子后曰以承平時此事猶不易况今强敵在外皇子幼小决不可行不得已當與皇帝同聽政正彥曰今日大計已定有死無二望太后早賜許可后曰皇子方三嵗以婦人之身簾前抱三嵗小兒何以令天下敵國聞之豈不轉加輕侮傅正彥號哭固請后不聽傅正彥呼其衆曰太后不允所請吾當解衣就戮遂作解衣袒背之狀后復呼之曰統制名家子孫豈不明曉今日之事實難聽從傅曰三軍之士自早至今未飯事久不决恐生他變顧朱勝非曰相公何無一言今日大事正要大臣果决勝非不能對顔岐自上前來奏曰皇帝令臣奏知已决意從苗傅所請乞太后宣諭后猶不允傅等語言益迫太后還入門上遣白以事無可奈何須禪位王庭秀閲世録云太后復上樓上白事於竹輿前言無可奈何須禪位朱勝非復辟記云太后回亦不登門只於廊廡置竹輿今兼採二書修潤附入蔡惇直筆云太后一行至臨安府車駕繼至㑹禁衛素怨殿帥王淵內侍康履又宰臣黃潜善汪伯彥勸上永駐蹕揚州衛士懷土日思還京逮金人暴至急幸浙西乃留御營半軍駐鎮江府以防敵渡故從駕衛兵差少時苗傅劉正彥先統兵屯臨安衆軍聞車駕臨幸營地饋餉必有相妨乘禁衛有怨忿心軍情疑二時歸朝官王鈞甫馬柔吉有異謀勸傅正彥率兵挾上誅王淵康履內侍輩隂圖不軌先報御龍直謀叛詐王淵彈壓淵出就馬上中槍而死禁衛求見康履履出被殺遂聚譟於行宫門宰相朱勝非出見傅正彥乃出檄文示勝非且言軍叛傅等欲平之勝非乃言皇太后在洞霄宫諸公當奏禀一聽太后處分時昭慈聞軍變乃乘小轎至宫門前有一卒擊􅀈約衆曰太后娘娘軍衆乃投戈山呼昭慈召傅正彥問之對大軍有言至此昭慈面諭是他官家有太子待老婆與他管事乃抱登門捲簾示衆且言官家已內禪用黃背心衣太子背軍中咸呼萬嵗人心帖然昭慈遂垂簾聽斷按此所記事迹多差不與諸書合蓋惇得於傳聞今不取勝非泣曰逆謀一至於此臣位宰臣義當死國乞下樓面詰二凶上曰凶焰如此卿往必不全既殺王淵又害卿將置朕何地乃揮左右稍却附耳曰朕今與卿利害正同當為後圖圖之不成死亦未晚遂命勝非以四事約束傅一曰尊事皇帝如道君皇帝故事供奉之禮務極豐厚二曰禪位之後諸事並聽太后及嗣君處分三曰降詔畢將佐軍士即時解甲歸寨四曰禁止軍士無肆劫掠殺人縱火如遵依約束即降詔遜位傅等皆曰諾上顧兵部侍郎兼權直學士院李邴令草詔邴請上御札上即所御椅子上作詔曰朕自即位以來强敵侵凌逺至淮甸其意專以朕躬為言朕恐其興兵不已枉害生靈畏天順人退避大位朕有元子育德東宫可即皇帝位恭請隆祐太后垂簾同聽政事庶幾消弭天變慰安人情敵國聞之息兵講好上書詔已遣人持下宣示二凶勝非至樓下呼傅幕屬將佐問之王鈞甫進曰二將忠有餘而學不足耳宣詔畢傅正彥麾其軍退移屯祥符寺時己未刻上亦徒步歸禁中軍士退去尚喧呼於市曰天下太平也是時諸門皆傅等以甲士守視不聽人出入方事之未决也康允之奏恐軍士乘勢攘殺乞出門慰撫乃見傅正彥告以故正彥以一甲馬二十甲士授之允之周行井衢杭人賴以安堵上既還內宰執從至殿門勝非呼典班髙琳附奏今夕宰執內宿上獨召勝非至後殿垂簾太后見勝非號泣上曰康履曽擇凌忽諸將至於馬前聲喏或倨坐洗足使諸將立於前此皆招禍之事也勝非曰履擇必有所求求而不得則怨矣上曰此事終如何勝非曰王鈞甫輩皆其腹心適嘗語臣云二將忠有餘而學不足此語可為後圖之緒上曰朕來早不出太后御殿勝非曰來日當降赦蓋羣凶既殺王淵又劫掠意必望赦然他日勢可行遣豈復論此今當召李邴就都堂草赦庶可共議上曰卿自為之如何勝非曰當宣召學士內宿令御史臺集百官宣讀一如平日庶羣凶不疑勝非又奏母后垂簾須二人同對臣有獨奏事不可形於紙筆者豈可與他人同之欲降㫖以時事艱難許臣僚獨奏太后曰彼不疑否勝非曰乞自苗傅始仍與其徒日引一人上殿以弭其疑勝非退太后語上曰賴相此人若汪黃未退事已不可收拾矣他日傅等入對太后勞勉之傅等皆喜由是臣僚獨見論機事賊亦不疑矣是日上移御顯忠按史作顯寧寺寺宰執百官侍衛如儀內人六十四人肩輿以從傅等遣人伺察恐匿內侍故也上移御之日趙甡之遺史在十二日庚寅王庭秀閲世録在十六日甲午惟朱勝非間居録云是日上幸别宮繼有㫖以睿聖為宫名與日厯合蓋自上移御之後百官未嘗朝至庚寅始往朝謁而外人乃知因誤記耳日厯云以杭州顯靈寺為睿聖宫按顯靈寺已為尚書省王庭秀云上出居顯忠寺寺即劉正夫第故間居録云正夫賜第也伺察中官事亦據庭秀所録附見甲申太后與魏國公垂簾朱勝非稱疾不出太后命執政詣其府勝非乃出是日上徽號曰睿聖仁孝皇帝以顯忠寺為睿聖宫留內侍十五人餘諸州編置制曰朕以幼冲之資承𫝊序之休比者大國侵凌奄至淮甸太上睿聖仁孝皇帝以權宜之計駐蹕吳江深慮敵人指為釁隙興師內侵結禍彌深濫使無辜肝腦塗地上畏天戒下失生靈發於至誠匪由勤請退避大位傳於眇躬隆祐太后德厚母儀道侔坤載練達國家之務深得臣庶之情恭請垂簾同聽政事衆志既定寶祚維新宜霈湛恩以宥多辟可大赦天下詔曰王淵身為都統制車駕駐蹕維揚金人輕兵前來並無措置斥堠不明致倉猝南渡士民肝腦塗地宗廟傾危及交結內侍康履等並已正典刑令尚書省出榜曉諭以言官多闕命侍從共舉可為臺諫者二員尚書右丞張澄兼權中書侍郎尚書兵部侍郎兼權直學士院李邴為翰林學士起居郎張守試中書舍人仍兼權直學士院太常少卿季陵為起居郎朝請大夫黎確守太常少卿監察御史王庭秀為殿中侍御史直龍圖閣知杭州康允之升徽猷閣待制朝奉郎兩浙轉運副使劉䝉加直祕閣朝請郎兩浙路提舉市舶吳說為尚書金部員外郎兼提舉市舶說錢塘人也䝉說之除日厯不載此據王庭秀閲世録增入以無月日因允之遷職附見朝請郎兩浙轉運副使范冲守宗正少卿承奉郎添差兩浙轉運判官劉寧止試左司諫二人皆不受寧止歸安人嘗為吏部員外郎直龍圖閣王琮為兩浙轉運副使琮初自鄧州罷寓居杭州至是張澄薦其才而有此命詔有司月以錢米廪給司馬光之後端明殿學士提舉醴泉觀黃潜厚樞密直學士巡幸提㸃一行錢糧頓遞官錢伯言並罷仍奪職起復定國軍承宣使帶御器械鄜延路馬步總管御營平寇左將軍韓世忠為捧日天武四廂都指揮使御營使司專一提舉一行事務都巡檢使世忠此除日厯及碑志皆不載季陵外制集有制詞按世忠實代劉光世當在此時今因張俊除軍職遂書之更須參考武寧軍承宣使帶御器械秦鳳路馬步軍副總管御營前軍統制張俊為捧日天武四廂都指揮使仍命俊以三百人赴秦鳯二千人付統制官陳思恭一千人付將官楊沂中留吳江把隘餘令以次統領官管押赴行在瀛海軍承宣使駙馬都尉韓嘉彥卒諡端節丙戌常德軍承宣使幹辦皇城司主管禁衛孟忠厚乞裁節本家恩澤如有夤緣干請並令三省執奏御史臺彈劾以聞太后詔曰宣仁聖烈皇后同聽政時外家不任要職亦不干預政事天下至今歌詠盛德况以凉薄當兹艱難尤宜戒慎仰學士院降詔戒敕忠厚以下不得輒與朝政交通貴近務循退靜以保家族仍不得於私第謁見宰執如有職事即赴都堂禀白可令三省以詔書榜示是日赦書至平江府禮部侍郎節制軍馬張浚聞有赦慮時方艱危事變莫測諭守臣祕閣修撰湯東野遣親官至前路發封以告少頃東野馳來曰事變矣袖以視浚時府中軍民已知有赦浚謂東野苐登譙門宣有㫖犒設諸軍一次內外乃定浚遂走人入杭伺其實時右司員外郎黃槩兩浙轉運司幹辦公事吕托亦遣進武副尉魏傳賫蠟書遺浚及吕頥浩言傅等叛逆之詳東野金壇人槩依政人托頥浩子也京東東路安撫使劉洪道失青州乃率官吏奔仰天陂寄治士民多從之者丁亥端明殿學士東京留守杜充為資政殿大學士節制京東西路恩數視執政殿前副都指揮使武康軍承宣使東京副留守郭仲荀為昭化軍節度使以登極恩也趙甡之遺史二人之除在此月庚寅今從㑹要附九日丁亥榮州防禦使京西北路安撫使知河南府專一保護陵寢兼控扼河陽楊進為汝州觀察使進之除日厯不載季陵外制集有制詞首句云朕以眇躬嗣承大統蓋明受覃恩故且附見郭仲荀之後當求他書考其本日中書舍人沈晦試給事中承議郎季質復為起居舍人徽猷閣待制知濠州連南夫升顯謨閣直學士知江寧府御營都統制司參議官王鈞甫為右文殿修撰馬柔吉王世修張逵並直龍圖閣鈞甫見朱勝非勝非問前日樓下言二將學不足如何鈞甫曰如劉將手殺王淵是也勝非曰上皇待燕士如骨肉一旦兵難卒無一人能效力者古人言燕趙多竒士但虛語耳鈞甫曰不可謂燕無人勝非曰君與馬參議皆燕中知名人嘗獻䇿欲滅契丹今金人所信任多契丹舊人若能渡江則先為所取必矣當早為朝廷協力鈞甫唯唯而去據勝非間居録乃初九日事故附於此江東制置使吕頥浩至江寧舍館未定忽奉內禪詔赦遂㑹監司議皆莫敢對孫覿撰李謨墓志曰明受詔赦至建康官吏聞赦皆失色獨吕頥浩怡然自若謨時為江東漕白之曰樞省大臣盍召天下兵以除君側之惡頥浩左右視接以他語謨曰王室在難如救焚之急公不應躊躇在衆人後方議行而張浚􅊾書至後二叛伏誅頥浩第功進右丞相按勤王之舉張浚唱之頥浩和之二人不謀而同浚平江實録亦云收頥浩九日書云云足知非躊躇也蓋頥浩是時未敢誦言誅之故接謨以他語爾覿嘗為頥浩所斥又志文出於吕氏家破之後是以妄詆訾之要非事實故不取退謂其屬官李承邁曰是必有兵變承邁曰詔詞有畏天順人之語此恐其出於不得已也其子抗侍側曰主上春秋鼎盛二帝䝉塵沙漠日望拯救豈肯遽遜位於冲幼乎灼知兵變無疑矣頥浩即走人入杭伺賊并寓書於張浚劉光世痛述國家艱難之狀别以片紙遺浚曰時事如此吾儕可但已乎承邁清臣孫嘗通判雄州避亂南渡頥浩引用之時有自杭州賫傅等檄文至平江者浚讀之慟哭乃决䇿舉兵夜召兩浙路提㸃刑獄公事趙哲告以故令哲盡調浙西射士以急切防江為名使湯東野密治財計戊子召端明殿學士王孝迪為中書侍郎資政殿學士盧益為尚書左丞後二日詔孝迪益並充奉使大金國信使武功大夫忠州防禦使辛道宗武功大夫永州團練使兩浙西路兵馬都監鄭大年副之孝迪下蔡人靖康初嘗為中書侍郎及時再用有進士黃大本者江湖浪人也舊為蔡絛客二凶將遣使朱勝非以金在江北恐挾此而來乃建言未知敵帥所在宜先遣小使㑹大本上書求試用乃以為承奉郎假朝奉大夫直祕閣賜金紫進武校尉吳時敏為秉義郎閣門祗候假武義大夫閣門宣贊舍人並為先期告請使以行朱勝非間居録云三月十五日二凶堂白曰某等日前有二劄子乞改年號移蹕建康未䝉施行昨晚再入奏今納副本余曰聞平江勤王所乎皆云聞之馮康國來頗知其詳今若往建康諸軍相遇如何二凶不語余問執政皆曰必不靜余曰如此則又是一重變二凶曰若不動江上防秋如何余曰此則已有愚見正要與諸將議定某欲以見任官職乞充都節制使乞於行在諸軍中取二萬人至平江更揀一萬人將至江上於建康上下分布屯守以為藩籬相度事宜徐議行止正彥曰建康用武之地願得從行留苗統制防護行在余曰公豈可行適來說平江相遇必不靜正慮諸將不相下某獨往必無事二凶唯唯復曰遣使議和不可緩余曰已議定朝夕行雖聞敵寨有在揚椘之間者未知其將何在須先遣小使尋訪報信二凶又曰年號莫須早改人言建炎多盜炎字是兩火况亦只是虛名無甚利害余曰既無利害何必改正恐後却有利害遂退食後與執政聚議因問早來二將白事某應答無錯否皆曰無錯惟年號事彼似不曉余曰遣使議和雖是樓前假託之言若無以塞之亦慮藉口惑衆今後外召二使先遣一小使報信如何皆曰善遂擬定召王孝迪盧益密院准備差使中差小使次日早朝奏陳批㫖班退留身奏言昨日二凶到堂催幸建康改年號遣和議使事適已得㫖尚有曲折更合條陳移蹕事已如此答之彼恐奪其軍必不敢復言年號亦不曽許太后曰再有奏狀方待降出三事中惟年號稍輕若全然不從却恐别致生事余曰賊已無能為反正事今則人人能言之朝夕王世修等來必見底裏惟遣使事極有可慮太后曰豈能便和余曰今敵騎留於江北秋冬必謀渡江近日事彼必探知若遣使金必僞許挾二凶之變皆害反正其將奈何太后泣曰老身豈能處置如此難事天若未絶吾宋相公必有謀畫余曰事誠可憂然不必煩涕泣臣曽深慮昨與執政共議託以不知金帥所在先遣小使即臣之謀也太后曰吾未曉卿但說余曰所召二使皆在近處見行在親遭事變未必敢來必有辭免遣人來朝廷體問臣當語使力辭先遣小使擇一可委人到江訴吕頥浩等曰朝廷硬差來實不願往乞留軍中頥浩等必欣然留之如此則名為遣使其實不行可以杜塞二凶之謀免墮金人之計太后喜曰天生相公救此患難已而盧益果遣人來問召意余諭使力辭孝迪不辭而來依舊除中書侍郎遣迪功郎胡樞充小使密誡之至平江果不行按此時杭州尚未知張浚舉兵兼浚亦未以勤王所為名而日厯所載孝迪等除命乃在初十日戊子其出使乃在十二日庚寅又小使乃是黃大本吳時敏亦非胡樞不知勝非何以差互如此太常寺奏准禮例當避御名太后詔曰皇帝御名語稱易犯令太常寺禮官别討論以聞詔宗室有才能者令三省擢用趣召張邦昌親屬赴行在朝請郎李㑹試給事中通直郎范宗尹集英殿修撰提舉杭州洞霄宫滕康並試中書舍人㑹初除御史中丞至是改命李㑹除中丞日厯不載季陵外制集有制詞云念此渡江之擾居多戀闕之誠又云思得其人起自廢籍按張澄二月己巳自中丞除執政三月壬辰鄭㲄方除中丞㑹除命必在此時但未得其月日當考祕閣修撰知西外宗正事令慮為御營使司參贊軍事直龍圖閣王世修對簾前是日御營前軍統制秦鳯路馬步軍副總管張俊以兵至平江府俊初屯吳江縣傅等以其兵屬趙哲使俊之鳯翔此月甲申降㫖㑹統制官辛永宗自杭乘小舟至俊軍具言城中事將士洶洶俊諭之曰若等無譁當詣張侍郎求决侍郎忠孝必有籌畫至是俊引所部八千人至平江平江人大恐㑹浚被省劄召赴行在令將所部人馬盡付趙哲浚披衣起坐不能支持頃之湯東野倉皇直入浚問知其故浚知上遇俊厚而俊純實可與謀事諭東野亟開門納之一軍遂定浚語俊曰太尉知皇帝遜位之由否此蓋苗傅等欲危社稷言未訖泣數行下俊亦大哭浚諭决䇿起兵問罪俊泣拜且曰此事須侍郎濟以機術勿令驚動官家浚哽噎首肯移時辛永宗趙哲至為浚言傅每事取决王鈞甫馬柔吉傅素乏心機而劉正彥輕踈聞公舊識鈞甫乞先以書離間二人然後徐為之計永宗道宗弟也浚用其說即同趙哲馳入張俊軍撫諭且厚犒之人情大悅浚以蠟書諭吕頥浩劉光世起兵狀又命俊先遣精兵二千扼吳江己丑制曰朕以眇末之資膺付託之重隆祐太后仁施四海德盛三朝恭請垂簾同聽政事稽日月有臨之義式符久照之明合天人並受之功更保無疆之厯其以建炎三年三月十一日為明受元年先是王世修見朱勝非勝非諭曰國家艱難可謂功名之秋古人見幾而作能易亂為治轉禍為福在反掌間耳亦有意於此乎世修喜曰世修無意從軍因循至此朝廷若有除授固所願也勝非曰尋常等級序進所以待常士若能奮身立事雖從官可即得世修益喜於是為之往來傳道㑹傅乞改年號劉正彥乞移蹕建康勝非留身太后諭以二事勝非曰移蹕豈可遽議金近在江北㳂江皆未有備秀水間居録十三日余留身奏曰六人者已引遍奏對何如太后曰問勞勸勉皆如卿言苗傅劄子乞改年號劉正彥劄子乞移蹕建康待降出文字余曰移蹕豈可遽議金人皆在對岸㳂江並無准備臣前離平江有兵四千餘人不敢擁兵赴召並留與張浚後來王淵歸却令張俊去將得千餘人去余聞吕頥浩張浚紏集勤王兵馬即是此數更有續添人如劉光世部曲共不過萬人此時正賴他外援聲勢苗傅等一軍恰有二萬五千人在杭州歇泊日久舟楫器械甚備若移蹕相遇必致交戰萬一勤王以人少不利則賊勢益張既在道路姦謀叵測按此時馮轓未至行在吕頥浩張浚奏疏亦未到兼浚雖密有此意猶未敢誦言誅之杭州何以遽知恐勝非所記不審太后曰何以却之勝非曰俟降出文字朝廷且與判收徐議區處可也后曰且審慎處置此是第一次理㑹事勝非曰臣近欵二凶皆凶愚無英氣鈞甫世修皆有悔意未敢深詰但以利動之約其再來后遽曰如何勝非乞屏左右后曰惟張夫人在此勝非問何人后曰張夫人年髙習事官品亦尊嘗教哲宗道君讀書朝廷文字皆經其手禁中事莫不預知即今往來睿聖宫卿但奏事勝非曰主上反正已有端緒二凶之力至此竭矣向張逵建議誘說諸軍掠取王淵及諸內臣家人人可以致富及犯悖之後所得不副所聞人有悔意數日來小校有遁去者此皆傅所親統領官張昕言之乞因張夫人密奏主上昕秦州人本王淵部曲後在傅軍中以正彥手殺淵極銜之秀水間居録云臣期以旬日復辟必有次第乞因張夫人密奏主上按此時凶焰方張外兵未集恐未可期以旬日或不是此日所奏今且附此更須詳之也又二日傅正彥至都堂申言二事勝非以移蹕為不可秀水間居録載勝非語二凶恐與平江勤王所兵相遇事已見此月初十日戊子注按此時馮轓方持書至行在張浚等亦未以勤王所為名疑勝非諭二凶不在此日今且削去俟考傅趣遣使勝非曰已議定朝夕行傅曰人言炎字是兩火故多盜乞早改元勝非以奏太后曰三事中惟年號稍輕若全然不從恐别生事㑹世修再至勝非與語因論二將所陳如改元等事未得請頗以為言語未畢內批傅第三奏云可改元明德或明受勝非以示世修曰已從請矣世修曰乞姑留此奏明日降下俟還軍中為言已論改元事庶於世修無疑勝非以為然至是降制勝非間居録載內批於十六日又云後兩日改元而日厯繫之十一日己丑不知勝非何以差互按史今年三月小盡而勝非間居録張浚復辟記皆作三十日書之是以多參差不齊今以諸書互考繫其的日但日厯於己丑既全載詔書而十八日丙申又書改元明受却是據間居録所云其重叠差誤如此保靜軍承宣使樞密都承㫖邢煥告老章六上詔煥提舉萬夀觀煥罷日厯不載附傳云明受改元六上章求致政不得其本日故因改元附見未必在此日也朱勝非間居録三月二十一日馬擴除都承㫖煥之罷必在此前當求他書附其本日既而煥復求去改提舉江州太平觀煥遂居忠州遣奉議郎通判湖州張燾賫詔書撫諭江浙燾不受中書舍人黃唐傳罷為徽猷閣待制奉祠入內東頭供奉官馮益幹辦皇城司日厯紹興三年二月一日皇城司奏契勘辦皇城司馮益於建炎三年三月十一日供職十一日己丑也故附此但未知苗劉擅命時益何以得之當考尚書禮部侍郎節制平江府常秀湖州江隂軍軍馬張浚言臣伏覩睿聖皇帝親筆伏讀再三不覺涕泣臣竊以國家禍難至此皆臣等文武之臣不能悉心圖事補報朝廷致使土地侵削人民困苦上負睿聖之恩下失天下之望今睿聖皇帝以不忍生靈之故避位求和固為得䇿然臣自有說不敢不具陳其詳臣竊以當今外難未寧內寇並起正人主憂勞自任馬上求治之時恐太母以柔靜之身皇帝以幼冲之質端居深處責任臣僚萬一强敵侵陵不肯悔禍則二百年宋朝社稷之基拱手而遂亡矣臣愚不避萬死伏乞太母陛下皇帝陛下特軫宸慮祈請睿聖念祖宗委託之重思二帝屬望之勤不憚勤勞親總要務據形勝之地求自安之計抑去徽名用柔敵國然後太母陛下皇帝陛下監國於中撫靜江左如此則於國家大計似為得之如以臣言為然乞下有司率文武百僚祈請施行臣契勘睿聖皇帝方春秋鼎盛而遽爾退避恐天下四方聞之不無疑惑萬一别生他事併乞睿斷詳酌施行先是苗傅等以省劄趣浚行浚戒湯東野趙哲各密具奏稱金未退盡及靳賽之衆窺伺平江若張浚朝就道夕敗事浚亦奏今張俊人馬乍回平江人情震讋若臣不少留彈壓恐致敗事浚欲奏請上復辟張俊辛永宗趙哲共議恐傅等自疑罪大不容别生姦謀請以計欵之浚用其䇿自遞發奏狀并以其副申尚書省乞率文武百官力賜祈請又以手書遺傅正彥言太母垂簾皇帝嗣位固天下所願向所慮者宦官無知時撓庶政今悉戮其無狀者最快人望惟睿聖退避一事若不力請俾聖意必回與太母分憂同患中興之業未易可圖二公忠義之著有如白日若不身任此事人其謂何浚愚拙死生出處當與二公同之前密州州學教授邵彪見浚于軍中浚問䇿安出彪曰以至順誅大逆易於反掌顧公處之何如耳浚曰張俊指天誓地願以死援君父之辱韓世忠有仗節死難之志二人可倚以辦事惟浚士卒單弱恐不足以任兹事然吕樞密屯兵江寧其威望為人所信向且通亮剛决能斷大事當為天下倡劉光世屯軍鎮江兵力彊悍謀議沉鷙可以倚仗浚皆馳書往矣彪曰兵貴神速吕樞密在數百里外奈何浚曰吕樞密睹事明而剛决聞國家之難必先衆倡義而起何患不速是日吕托書至江寧頥浩執書以泣曰果如所料事不可緩矣再發書與張浚及諸大將約㑹兵臧梓勤王記云發書張浚張俊劉光世韓世忠約起兵按俊以初十日至平江府此時頥浩在建康未必知其來兼世忠在山東潰散未還不應與之相約今但云約諸大將庶不失實時議論不一人情洶懼江寧士民知頥浩起兵議留頥浩頥浩乃􅊾主管侍衛馬軍司公事楊惟忠留屯江寧府以安人心且諭惟忠以傅等計窮恐挾至尊以遁由廣德渡江當日夜為控扼之備惟忠以為然庚寅百官朝謁於睿聖宫慶逺軍承宣使御營使司都統制苗傅為武當軍節度使起復渭州觀察使御營使司副都統制劉正彥為武成軍節度使傅之制曰憤嫉姦慝大刑既正於國章扶奬阽危嘉績遂書於廟社正彥之制曰屬邊隅之震擾慨國步之阽危首陳大義之公亟斷巨姦之戮刑章昭著國祚妥安時學士李邴與中書舍人張守並直禁林然大詔令多邴所草也檢校太保殿前都指揮使奉國軍節度使劉光世為太尉淮南制置使捧日天武四廂都指揮使定武軍承宣使權同主管侍衛步軍司公事御營平寇前將軍范瓊為慶逺軍節度湖北制置使傅正彥素憚劉光世又知其與韓世忠張俊舊不平欲間之使為己用而瓊素跋扈至是乃引兵屯淮西故首擢之龍神衛四廂都指揮使建武軍節度使節制江南東路軍馬楊惟忠加檢校少保召呂頥浩赴院供職命頥浩以其兵屬惟忠尚書禮部侍郎充御營使司參贊軍事節制平江府常秀湖州江隂軍軍馬張浚試禮部尚書以所部赴行在御營中軍統制官吳湛權主管侍衛步軍司公事湛與二凶合領中寨於宫門前建請除執政侍從外餘人悉於中軍寨門下馬使悍卒持挺呵問人皆畏之殿中侍御史王庭秀再上疏言於朝由是少戢光祿大夫提舉南京鴻慶宫黃潜善正議大夫提舉西京嵩山崇福宫汪伯彥並責祕書少監潜善衡州伯彥永州並居住置行在都茶場出賣茶引紹興二年閏四月又置務場于建康資政殿學士同簽書樞密院事江淮兩浙制置使兼知建康府吕頥浩言臣契勘自崇寧以來內侍童貫談稹互掌兵柄二十餘年基禍流毒遂令徒黨為害近聞將相大臣勦戮內侍誠可以快天下之心紓臣民忿怒之氣但方今彊敵乘戰勝之威諸盜有蜂起之勢興衰撥亂事屬艱難豈容睿聖皇帝退避大位而享安逸伏望太后陛下皇帝陛下不憚再三祈請睿聖皇帝亟復皇帝位親總萬幾從此以往屏絶內侍近習之人褒賞立功將帥之士然後駕幸江寧以圖恢復如此則宗廟社稷有無疆之休將相大臣有無窮之福不然必恐天下禍亂不可勝言臣年六十疾病衰殘目覩今日之事實社稷存亡安危之所繫不敢愛身謹泣血雨淚而拜封章伏望聖慈俯賜聽納仍傳檄諸軍將又遣其屬敇令所删定官李承造至鎮江趣劉光世起兵承造承邁弟也先是張浚欲遣辨士持書說二賊使無他圖以待諸將之集念無可遣者夜分不寐浚客遂寧馮轓素負氣節聞之慷慨請行且曰事成預竊名不成不過死是日頥浩所遣書至浚發書知頥浩已有定謀復大喜再發書報以所部軍馬數及舉事次叙浚知傅等所恃獨赤心軍㑹燕人張斛與其弟觷自傅軍中間行至平江為浚言此軍無負朝廷意特王鈞甫等以術驅役之然斛觀將士之情往往惴恐非堅附苗劉者二賊聞風聲鶴唳皆以為大兵至安能成事初上既渡江同知西外宗正事士從自髙郵軍招潰卒屯興化縣時淮南東路提㸃刑獄公事裴廪薛彥國在一洲上士從招二人為參謀官言於朝乞假江淮制置使上從之士從聞髙郵賊李在往楚州遣統領官不側乘虛掩襲至嶽廟下遇紅巾百十皆殺之取其衣僞稱在黨行至草市行伍不整歡噪殺人在覺之出兵迎敵不側僅以身免晉寧既陷金人返軍趨鄜州權鄜延經略使郭浩駐兵境上金人遂陷鄜州辛卯張浚遣馮轓赴行在浚為咨目具以請主上親總要務事禀朱勝非及與傅正彥書勉以事當改圖不宜固執兼致書馬柔吉王鈞甫大略云浚與二公最厚聞苗廣道劉子直頗前席二公事每計議而行今日責在二公浚初聞道路傳餘杭事不覺驚疑繼聞廣道子直實有意於宗社大計然此事不反正終恐無以解天下後世之惑浚遂備奏兼檄報諸路且約吕頥浩劉光世㑹平江時傅以堂帖趣張俊赴秦州任命趙哲領後軍哲不敢受又以付統領官陳思恭浚召思恭審問思恭言惟張俊總此軍日久思恭豈能從人為亂浚皆令具以報是日張浚檄至江寧壬辰右諌議大夫鄭㲄試御史中丞㲄嘗面折二凶朱勝非言於太后故有是命朱勝非間居録十五日晚朝留身奏言自事變以來今十餘日能為朝廷之助者從官中惟兵部侍郎直學士院李邴諫議大夫鄭㲄邴舊為內翰今乞再除㲄乞遷御史中丞太后俱以為可復奏曰遭此異變士大夫在朝廷者固是不幸然須䝉耻奮忠義共濟艱危如中書舍人林遹刑部侍郎衛膚敏皆杜門不出坐觀成敗是何用心臣所以欲稍遷二人以為激勸按日厯邴初六日已先除學士與勝非所記不同未知孰是徽猷閣直學士提舉西京嵩山崇福宫曽楙為翰林學士楙不受尚書刑部侍郎衛膚敏移禮部侍郎膚敏至杭州已屬疾聞變慟哭舟中即請老不許請就醫秀州許之大理卿商守拙試尚書刑部侍郎起居郎季陵試中書舍人尚書右司員外郎葉三省為起居郎朝奉郎袁植宣教郎張延夀並為監察御史植正功兄宣和中嘗掛冠去至是復用日厯不書植自何官除御史馮擑諫議集有代植與李成書云植無狀之迹前此姦邪用事時固嘗休致矣昨自休致中䝉恩再除監察御史云云正功已見二年七月延夀舒城人也是日又除劉範殿中侍御史陸震施埛左右正言未見前銜俟考按日厯及後省題名三省以今年三月除左史明年六月罷而季陵集繳梁揚祖發運使除命奏狀乃云起居郎綦崈禮兼權給事中不知左史何以併除三員崈禮今年七月除中書舍人後省題名乃略不載全不可曉中書舍人林遹充徽猷閣待制在外宫觀遹閩縣人二凶之亂遹首請納祿故有是命遹除中舍及罷日厯皆不載後省題名書罷不書除以未見本日故因季陵除命遂書之按朱勝非間居録論遹杜門不出即是此日不知何時得祠也武功大夫忠州防禦使王彥致仕彥疾愈自真州渡江苗傅等以彥為御營司統制彥曰鴟梟逆子行即誅鋤乃欲汙我即稱疾力辭不聽彥乃佯狂乞致仕許之兩浙轉運副使王琮言本路上供和買紬絹嵗為一百七十萬匹有竒請每匹折納錢兩千計三百五萬緡省以助國用許之東南折帛錢蓋自此始紹興二年五月甲申所書可參考御營都統制司參謀兼提㸃選鋒軍馬王鈞甫請令江浙四路分造弓弩共二萬枝赴行在先成者推恩從之初命尚書右司員外郎黃槩為直龍圖閣四川水陸制置發運使專一總轄上供錢物置司遂寧府以四川名使始此至是槩發行在槩此除日厯不載王剛中續成都記云建炎三年三月黃槩除四川都轉運使而無其日馮楫臨安録云十五日黃槩起發赴四川都轉運使故且附此當求他書參考制置使劉光世遣丹陽知縣案知縣下原本脫其姓名如江寧報李承造之約添差兩浙轉運判官劉寧止自常州至鎮江自鎮江至江寧議勤王事是日張浚被㫖以所部赴行在浚奏辭新命且遺傅等書云朝廷屢差官交割張俊人馬所遣官皆畏避生事不敢任責浚度將士久從張俊且人率强悍捨俊無以彈壓欲紿賊使不致疑癸巳馮轓至杭州館馬柔吉所遂詣都堂見朱勝非且以請主上親總要務事白之勝非唯唯且云公復見他官否轓告以張浚致書二將令轓親至轅門與論逆順遂謁二人于軍中劉正彥語傅曰張侍郎所論正與初議同既而引轓與柔吉及王鈞甫同坐謂轓曰公必張侍郎腹心人此事幸勿廣傳御營司遣統制官俱重持詔書至平江撫諭軍民且代張俊重至平江謂俊曰胡不速之官此正騎鶴上揚州也安問人主俊以告張浚浚與辛宗道謀作飛書置其座側若將士將殺之者重倉皇失措浚陽使入寓節制司以避之初御營平寇左將軍韓世忠既走鹽城縣收散卒得數千人聞上渡江以海舟還赴難至是次常熟張俊聞之馳見禮部侍郎張浚喜躍不自持曰世忠之來此事必辦浚與俊更相慶慰即遣使召之辛道宗見浚扣以發兵之期且曰陸路措置固善萬一賊邀車駕由錢塘轉海道將何以為計浚驚愕未定道宗言家有青龍海船甚衆若載兵由海道趨錢塘出賊不意破之必矣且無後虞浚異其言遂以道宗為節制司參議官專一措置海船仍具奏言近收間報有海舟數十自通泰來切慮賊情狡獪徑犯錢塘臣已委辛道宗措置海船捍禦庶二賊不疑初江淮制置司前軍統領官王德自真州渡江入江寧府有衆數百復渡江至和州㑹閣門祗候張昱自陜府棄城引兵南走知和州張縝聞昱至大懼德曰此易與耳是旦昱率其親兵犯西門以入德與其弟青挺槍刺昱墜馬殺之盡降其衆甲午太后詔曰吾以菲德託於東朝同聽大政蓋順權宜義非獲已今大臣乃以吾逮事泰陵於屬為尊欲加吾以太皇太后之號蓋名有循而失實禮有變而從宜今外侮憑凌國勢削甚顧兹不德損之又損尚懼無以答天心定民志豈可用承平故事以自尊大三省樞密院其明諭吾意勿復有請詔文書應奏者並避隆祐太后父名貶內侍官曽擇等於嶺南傅使人捕得擇等詔貶擇昭州藍圭賀州髙邈象州張去為亷州張旦梧州先是御史中丞鄭㲄言臣竊惟黃門官官之設本以給事內庭供掃除而已俾與政事則貪暴無厭付以兵權則慘毒不已皆前世已行之驗也故宦官用事於上則生民受禍於下匹夫抗憤處士橫議力不能勝然後羣起而攻之衆怨所集故其被害亦莫之救皆其自召之也本朝懲厯代之失祖宗以來不任以事崇觀之間始侵事權搖毒肆虐天下不勝其忿靖康之初羣起而攻之者庶民也建炎以來此徒復熾睿聖皇帝倉皇南渡江北生靈莫知所歸扈從之臣涕泣扣頭流血乞權駐蹕鎮江㑹兵聚糧以援淮甸以渡兵民睿聖俞允羣臣鼓舞方分事以治之際內侍陳恐動之言即時南來官吏兵民顛仆道途江北民庶號天無告怨怒所鍾駐蹕未安羣起而攻之者衆兵也今陛下即位之初太后垂簾共政當原宦侍所以招禍之由痛革前弊蠲汰而清除之然後內外協安伏望聖慈特賜睿㫖凡內侍之處大內及睿聖宫者並令選擇純實謹願椎朴之人勿任以事惟令掌門䦨備掃除而已官髙職隆曽經事任招權納寵者屏之逺方輕者補以外任俾無浸淫以激衆怒則賞罰之柄自朝廷出而國勢尊矣仍告諭都統制官苗傅等自後軍法便宜止行於所轄軍伍其他有犯當具申朝廷付之有司明正典刑所以昭其尊君親上之禮而全其臣子忠義之節也疏留中不出擇行一程傅復追還斬之曽擇等行遣日厯不載今以王庭秀閲世録修入庭秀時為臺官必得其實也録以為三月十六日事故附于此日厯鄭㲄奏疏亦在十六日當是㲄知擇等被執而上此疏也趙甡之遺史載此事於初九日丁亥恐誤是時㲄未為中丞若擇等行遣果在此前則㲄疏中不應又有屏之逺方之語今並繫此庶不抵牾按史亦繫丁亥日御營都副統制苗傅劉正彥詣都堂欲分所部代禁衛守睿聖宫尚書右丞張澄以為不可固止之傅等又欲挾上幸徽越朱勝非曲折諭以禍福且以忠義歸之傅乃已時傅正彥日以殺人為事每至都堂傳呼滿道從以悍卒行者皆避之馮轓再見傅正彥于軍中從容白之曰轓為國事而來今已再日未聞將軍之命願一言而决今日之事言之觸怒立死于將軍之前不言則他日事故愈大亦死於亂兵之手等死耳孰若言而死使將軍知轓非茍生者自古宦官亂政根株相連不可誅鋤誅必受禍東漢末年事可考而知也二公一旦為國家去數十年之患天下䝉福甚大然主上春秋鼎盛天下不聞其過豈可遽傳位於襁褓之子且前日之事名為傳位其實廢立自古廢立在朝廷不在軍中二公本有為國之心豈可以此負謗天下少頃傅按劒瞪視曰金人之意在建炎皇帝令主上當極太母垂簾將復見太平天下咸以為是如張侍郎處侍從嘗建立何事而敢梗議轓曰太母深居九重安能勒兵與金從事天下自有清議太尉幸熟思傅益發怒正彥見轓辭色不屈即與王鈞甫馬柔吉引傅耳語遂諭轓曰侍郎欲復辟此事固善然須面議詞語甚遜翊日即遣歸朝官宣議郎趙休與轓偕還遺張浚書約浚至杭面議同簽書樞密院事吕頥浩以勤王兵發江寧初傅等以詔召頥浩赴行在命以所部付楊惟忠頥浩知其意才以羸弱千餘人授惟忠自將精兵萬人討賊至是發江寧而府中揭榜尚空年號按頥浩以帥守赴行在故例當是漕臣攝府事未知即李謨否建康知府題名中不見俟考其屬請以族行頥浩不許但與其從子擢俱使掌文字之職頥浩躬擐甲胄據鞍執鞭誓衆士皆感勵師次句容驛頥浩援筆記起師之日且大書建炎之號諭縣令採石刻之以堅將士之心先是張浚三遺劉光世書諭以勤王且遣參議軍事楊可輔至鎮江趣之光世不報是日張浚被朝㫖領張俊人馬從浚所請也節制司幹辦官楊晟惇請多出文榜開諭杭州軍民使之自新浚從之初保義郎甄援在城中竊録明受詔赦及二凶􅊾書以出至餘杭門為邏者所得苗傅命斬之援笑曰將軍方為宗社立功奈何斬壯士傅嫚罵且詰其故援曰今誤國姦臣多散處於外願賫將軍之文紏忠義之士誅漏網以報將軍耳傅意解正彥曰此未可信即使人拘之居數日防禁少緩援更衣踰墻而出至是見張浚于平江援詭言嘗更服見睿聖皇帝于别宫上謂曰今日張浚吕頥浩必起兵劉光世韓世忠張俊等必竭力相輔語令早來詞㫖甚切浚微察其意不復窮問即遣詣張俊軍俊與其將士聞之皆感慟浚遂令援遍往韓世忠劉光世諸軍宣諭援明辨善為說詞諸將人人自以為上所倚望感泣爭奮繇是士氣甚振援事迹云劉苗之變經三日援遇馮轓于市謂之曰今凶焰方熾公以布衣掉三寸舌忠則忠矣恐力不能回徒死無益援將連衡外援速趨近境使知有所畏然後公以大義責之庶其悔禍自請反正轓深然之遂握援手至舟中酌酒而别按二凶以三月癸未作亂後十日轓乃至杭中此時援已被拘矣况轓實館馬柔吉所亦不在舟中援所記本末如戰國說士之辭恐不能無飾說今不盡取平江實録援至平江在十七日乙未而援事迹在甲午今從之乙未責授祕書少監衡州居住黃潜善再責鎮東軍節度副使英州安置降授中奉大夫錢伯言責軍器少監分司澧州居住祕閣修撰江淮發運副使吕源除名邵武軍羈管時御史中丞鄭㲄論潜善與汪伯彥均於誤國而潜善之罪居多今同以散官竄謫湖南伯言與黃願皆棄城源與梁揚祖皆擁兵而遁今願羈管揚祖落職而源伯言未正典刑故有是命言者論伯言未已遂責海州團練副使永州安置伯言永州之貶日厯不書此以紹興二年九月二十七日刑部檢舉狀修入按伯言乞宫祠狀稱明受年而刑部檢舉以為兩浙轉運副使劉寧止所奏據日厯寧止此月甲申已除左司諫或是未遭變時所奏後來檢舉行遣亦未可知以不見本日故附此當考通議大夫黃潜厚責授祕書少監分司道州居住以殿中侍御史王庭秀論其賣官售寵也詔申嚴諸路民兵火甲之令以迪功郎吳樞薛倞言其可以備盜也仍令提刑司㸃檢是日吕頥浩引兵至丹陽劉光世引部曲來㑹金部郎中李逮自鎮江馳至偕行丙申韓世忠以所部至平江初世忠在常熟舟中聞張浚遣人來被甲持刃不肯就岸取浚及統制官張俊所遺書遣人讀之世忠乃大哭舉酒酹神曰誓不與此賊共戴天舟中士卒皆奮世忠見浚曰今日大事已成世忠與張俊以身任之願公毋憂世忠欲即進兵浚諭之曰事不可急投鼠忌器急則恐有不測浚已遣馮轓甘言誘賊矣熊克小厯云始王淵識韓世忠於微時待之絶等至是世忠奮發討賊尤力按世忠雖王淵舊將然其人忠誠最著故首有便去救官家之語及臨平之戰身在前行皆緣國事非但感王淵疇昔之恩而為之復讎也今不取賊張彥寇和州統領官王德聲言往廬州即日進發行三十里彥衆稍息飲酒大醉德伺知之率數百人徑入彥之衆不能執戈彥與數十騎遁去至宣化為人所殺德又并其軍先是朱勝非在於平江嘗以蠟書招德劉光世又以告身數通及所被服戰袍細甲等遺之德遂將所部自采石渡江光世得之其軍復振朱勝非間居録云劉光世下統制官王德張和尚二軍合攻和州城垂破蠟九先至德軍是夜德併殺張和尚而歸林泉野記云金人陷揚州光世兵潰至建康止百餘人德引衆四百至和州時張育據城以檄招德德不肯應育率衆來攻德德盡以兵伏草中育至無所見往來提㸃德與弟青王世忠躍出斬其首餘衆請降德入城撫育家室及諸賊將皆如親舊莫不歸心俄而賊張和尚來寇致書曰昔張育殺我骨肉我來復讎德以書譬釋不聽乃斬育家人遣送其首又曰此是育一家耳必盡以育一軍首來乃退德集諸軍告之故咸願死戰賊敗和尚為鄉兵所殺盡降其衆德乃引所獲兵十萬濟江見光世分為六軍軍聲復振此所云與間居録全不同野記所稱張育即前知慈州張昱也張和尚即張彥也按劉光世部曲雖散恐不止百人而德所降亦安得有十萬今並削去庶不失實遂趨平江以德為前軍統制光世因言苗劉逆狀德曰救亂之軍當百舍一息請先率輕兵由桐川趨餘杭出其不意則擒二賊易於反掌光世以諸帥之議已定遂不從丁酉馮轓與趙休偕至平江張浚得二賊書率皆不情之語其中云茍可安社稷利國家救生靈息兵戈傅等當聽命馬柔吉王鈞甫亦同致書浚得之即欲擕親兵至杭與賊面决張俊韓世忠皆告以賊知主盟在公勢必加害願勿聽吕頥浩劉光世書至皆報以軍行是日吕頥浩帥師次常州與守臣周杞約治兵扼其險要先是文林郎監常州倉趙雋之聞變請於把率宗室數十人詣秀州見權兩浙提㸃刑獄公事趙子璘請團結兵民勤王子璘不從事遂止把因命雋之措置大軍錢糧以俟頥浩趙雋之事以紹興四年六月丙戍嗣濮王仲湜所奏修入戊戍御營平寇前將軍韓世忠以所部發平江初苗傅聞世忠自海道還以都統司􅊾命世忠屯江隂世忠至平江即詭為好詞報傅以所部殘零人馬不多欲赴行在傅大喜許之是日張浚大犒世忠及張俊兩軍酒五行罷浚引諸將至府園屏左右問曰今日之事孰逆孰順衆皆曰我順彼逆浚曰若迷天悖人可直取浚頭顱歸賊聞以觀察使求即日冨貴矣不然一有退縮當以軍法從事衆皆諾初沭陽之潰世忠部曲皆散幾不能軍浚以其兵少命前軍統制張俊以統領官劉寶二千人借之平江實録云世忠軍先發更益以張俊甲軍千人而世忠碑云張俊遣兵三千人勤王二書不同今從勤王記朱勝非間居録二凶言韓世忠自江北敗歸部曲無百人却于張俊處借得雜兵五七百人恐非其實世忠發平江舟行不絶者三十里甲士盡載其上軍勢甚振浚慮傅等以僞命易置乃令世忠偏將張世慶搜絶郵傳凡自杭來者悉投之水中己亥募民入錢五萬緡補通直修武郎用兩浙轉運副使劉誨請也降授右武大夫和州防禦使馬擴復拱衛大夫利州觀察使充樞密都承㫖兼知鎮江府俟條畫防秋事畢之任先是朱勝非令擴至傅正彥軍中察人情向背故復用之是日張浚復遣馮轓入杭移傅等告以禍福使之改圖先是傅又遺浚書云朝廷以右丞待侍郎伊尹周公之事非侍郎其孰當之請速赴行在浚報書曰自古言涉不順則謂之指斥乘輿事涉不順則謂之震驚宫闕至於遜位之說則必其子若孫年長以賢因託以政事使之利天下而福蒼生不然謂之廢立廢立之事惟宰相大臣得專之伊尹霍光之任是也若不然則謂之大逆族矣凡為人臣者握兵在手遂可以責其君之細故而議廢立自古豈有是理也哉今建炎皇帝春秋鼎盛不聞失德於天下一旦遜位似非所宜浚豈不知廢置生殺二公得專之蓋其心自處已定言之雖死無悔嗚呼天祐我宋所以保佑皇帝者厯厯可數出質則金人欽畏而不敢拘奉使則百姓謳歌而有所屬天之所興孰能廢之願二公畏天順人無顧一身利害借使事正而或有不測猶愈於暴不忠不義之名而得罪於天下後世也初浚發書及所措置事皆託他詞未敢誦言誅之傅等雖聞大集兵猶未深信得此書始悟見討奏請誅浚以令天下始張俊所部統領官安義隂與傅合欲代俊而奪其兵乃斷吳江橋以應賊浚即令韓世忠屯秀以伐其謀世忠至秀稱病不行造雲梯治器械傅等始懼先是祕書省正字馮楫嘗與直龍圖閣黃槩軍器監葉宗諤密議欲說二賊令自請復辟宗諤以為然因市小舟欲見浚於平江而不得出有承議郎直祕閣范仲熊者冲之子也嘗為河內丞陷金得歸舊厚王鈞甫馬柔吉二人諷顔岐薦上殿除吏部員外郎楫問仲熊以鈞甫柔吉之為人仲熊曰鈞甫疏柔吉直楫曰因此說二將可乎仲熊曰軍中氣盛未可庚子楫再扣之仲熊曰可矣近日遣人出問卜是必有所疑也辛丑內降詔書略曰永惟內禪之初恭奉太上之㫖責躬避位事理甚明訪聞有侍從掌兵之官不能曉授受本末弗計宗社安危輕易以惑人心遷延而違詔命惟爾將帥士民各宜體悉期救無虞傅等聞張浚將起兵乃下是詔新除捧日天武四廂都指揮使定國軍承宣使韓世忠為定國軍節度使依前御營使司提舉一行事務都巡檢使新除捧日天武四廂都指揮使武寧軍承宣使張俊為武寧軍節度使知鳳翔府二人皆以深曉內禪大義不受張浚詿誤故有是命此以日厯及張浚復辟記林泉野記參修詔新除禮部尚書張浚隂有邪謀欲危社稷責黃州團練副使郴州安置令平江府差兵級防送經由行在赴貶所中書舍人季陵當制有輕脫寡謀之語時兩宫音問幾不相通太母忽遣小黃門至睿聖宫白曰張浚早來不得已郴州安置上方啜羹不覺覆羹於手初傅得浚手書即請黜浚右僕射朱勝非沮止之至於五六及是傅等至都堂見勝非具言浚見詆為逆賊所不能堪如吕樞密則曉事意欲殺浚勝非見其悖甚恐生他變謂之曰罷張兵權而以付吕樞密必無事矣傅意稍解遂有郴州之命朱勝非間居録云三月二十日上下人情翕然和同軍民皆言當反正二十一日王世修至云軍中已定便可下詔余曰事固定亦當速為之然迎請車駕須有禮儀及奏章書詔之類先與執政定議又須擇一吉日大抵事垂成當內急而外示間暇公自此每日來相見余思之二凶雖已聽順未曽于都堂顯白指揮迎請合有章表二凶亦須自作一狀語執政皆曰善方議擇日忽平江傳檄指名二凶之惡來人以數十本傳城中二凶得之忿怒蓋自遭變故五日而得鈞甫八日而得世修半月事定二凶雖不敢違中心不無疑懼洎得此􅊾便作事端欲遲留迎請大事六人相從出􅊾文曰某等前日之請欲和金人以息兵革本期人使回見得敵情如何别作商議無何大使不來小使不通方聽朝廷指畫今勤王所傳􅊾直以某等為逆賊實不能堪欲率本軍徑至平江與諸人理㑹了却來迎請庶顯本心及欲先作一􅊾以答之傅聞勤王所於民間率斂錢物不可勝計以犒設為名恣行分受朝夕飲㑹無憂國之心既言大軍已集何不來韓世忠向自江北改歸部曲無百人却於張俊處借得雜兵五六百人作前軍來秀州意欲反正後自以為功掩其前過今已多日恐人議論故作此􅊾且做行遣又聞此檄出張浚之意辭氣忿戾與常日不同余大駭且難為答辭沉思而諭之曰公等方以此檄為非却作檄文報答朝廷在此而軍中以檄相罵國亂可知矣二統制可謂名將世家與起行伍不知事體者不同先太尉所為各如何能遵家法即是報國二凶稍有悅色傅曰乞朝廷回此􅊾余曰何必回既知是張侍郎之意渠便可罷以兵樞付吕樞密必無事矣世修進曰􅊾文詆罵實不堪朝廷若行遣張浚為軍中雪耻勝如答􅊾文也且吕樞密極曉事又是執政官余曰今晚奏太后取㫖行遣於是衆退晚朝具奏太后亦大駭曰事已成觸動後怎奈何批㫖罷浚禮部侍郎按此時平江未有􅊾書當是傅等得浚二十一日所遣書有大逆之語而為此說也世修所謂吕樞密曉事者蓋頥浩奏牘中深斥宦官之罪故有此言若􅊾書則頥浩為首無由罪張而稱吕勝非所記必誤張浚復辟記云傅等得臣責問手書立乞誅臣以令天下宰相朱勝非力沮其事至於五六遲留凡七日始有郴州之命此得其實但以日計之亦復參差今且刪潤修入鄭㲄章疏亦稱浚坐私書被責與復辟記同今附在後初傅正彥日至都堂議事御史中丞鄭㲄奏疏言臣訪聞朝廷近日差除行遣多出御營都副統制苗傅劉正彥之意二人出入都堂殆無虛日昔王淵康履之交結黃潜善汪伯彥之自謀皆以謂舉天下不能動搖殊不知人怨神怒禍變之起易于反掌今廟堂之上請託干與行而不疑者必以謂兵之强足恃是未之思也嬴秦王莽非不强也陳勝一呼秦不及支昆陽一敗莽卒授首其足恃乎祖宗之德澤垂二百年今雖潰兵散卒為盜未有一民奮臂其間者戴宋之德不可忘也惟順民心共尊王室乃可長久望戒諭將帥之臣無以私請干與朝政先是傅使其黨建言凡臺諌章疏乞露名行下蓋欲言者懼二凶不敢斥言其罪㲄疏入不出㲄見太后請降付三省后乃出其章示傅正彥傅正彥銜之按㲄此疏以甲午上未知何日降出今因論張浚事附見及是又請留吕頥浩守金陵張浚不當貶太后令㲄至都堂與宰執議朱勝非等唯唯㲄再上疏言浚特以私書與傅正彥往來切磋而為忠義今峻責之是堅天下之疑心以動四方之兵也日厯載此疏于十六日甲午尤誤不報㲄遂遣所親奉議郎謝嚮嚮初見二年七月丙戍變姓名為賈人至平江具言城中事令遲重緩進使賊自遁無致城中之變浚然之或曰乞露名行下臺章時人以為范仲熊請也王庭秀閲世録云仲熊與王世修張逵王鈞甫馬柔吉皆締昵五日之事仲熊實與聞按仲熊嘗為朱熹所取恐必不然以馮楫臨安録考之仲熊固與軍中迹熟然必不至與其逆謀今不取御營都統司統領官苗瑀參議官馬柔吉以赤心隊及王淵舊部精鋭駐臨平以拒勤王之兵朱勝非間居録云十六日王世修見余于私第詰旦早朝留身且奏世修語是日午間二凶到堂曰聞韓世忠領千餘人來秀州出言不善余曰出何言二凶曰欲屠戮杭州一城人今欲遣統領官苗瑀將三千人拒之于崇德縣余曰瑀是何人傅曰舍弟見充軍前將官極驍勇平日不伏世忠願去對敵設使交兵必擒世忠來余大笑曰公等何言之誤也世忠誰家將所部誰家兵豈可茍聽少年輕鋭之言而不顧國家大利害乎平江勤王兵馬甚盛聞此中寧靜朝廷經畫軍中聽順故遲遲其來借使瑀能勝世忠大軍必繼進彼此疑阻玉石俱焚矣少頃瑀至問何故欲出兵為國生事瑀曰世忠向日揚州統兵四萬餘人運糧十餘萬石三軍戰馬往往奪去行至淮陽軍聞金兵南來不戰而潰近日將四千餘人自蘇州界渡江來敗事如此自當誅戮尚敢妄言毁辱諸將瑀實不平欲往擒之余曰國事既平方可正罪彼方稱勤王遽遣兵擊回即賢先有罪矣瑀曰若突至城下豈不驚擾余曰朝廷當任責賢無慮左右報已迫晚朝遂揖退按張浚復辟記世忠以十八日丙申至平江二十一日己亥起發而已於十七日聞世忠至秀州必誤記疑勝非與二凶詰難不在此日又勝非既不許其出則瑀與馬柔吉何以復在臨平此事當考然韓世忠扼秀州張俊前軍在吳江賊氣沮矣時節制司參議官辛道宗總舟師與統領官陳思恭亦自華亭進發張浚又親作蠟丸書云不得驚動三宫聖駕浚書名張俊亦書名募人賫赴管軍左言等八人慮傅等因大軍之入或有他變書皆未達是晚馮轓至臨平馬柔吉見之曰君尚敢來邪昨旦張侍郎有書來詞不委曲二公大怒且發兵出杭矣轓曰張公無他意大率欲規正故不得不激切柔吉意少解夜二鼓柔吉與轓俱縋入城翌日與傅等議于軍中王世修不可欲拘轓不遣浚繆為書遺轓云浚近發苗都統書論列睿聖皇帝事反復數百言適有客自杭來知二公於朝廷社稷初無不利之心甚悔輕易未識體察否然浚無他也欲此忠義大節終歸二公無使他人為之㑹見望致意傅初謂有他謀發書無異詞遂大喜轓由是得免壬寅尚書左丞盧益罷為資政殿學士提舉西京嵩山崇福宫初議遣益出使朱勝非諭使力辭遂有是命益行述云時政府欲損禮求和於金益奏如封冊正朔之文割地稱臣之禮犒軍嵗幣之數建都屯兵之所事大難悉從願據形勝嚴守備為自治計庶中興之業日隆而將士之體不解執議不回因責授梅州安置翌日上省察復其官熊克小厯附此事於益初罷政時而日厯無之季陵外制集又有路允迪責授散官英州安置制詞略云習知敵情嘗講和戎之利往將使指庶收存魯之功豈謂股肱翻成項領未知此時否今並附見當求它書考證之詔募人尋訪登聞檢院御封函以渡江遺棄故也迪功郎吳若言今渡江而東敵勢方張天未悔禍借有韓白之勇决蕭張之沉鷙亦未可遽為進據中原之語惟當行阻江固守一䇿耳阻江之術莫如木栅可以速就侵水際一二丈以大木為柱而鋭其上小木支撑交格乎其間鋭上則敵不能踰支撑交結則我於其內可以施弩而敵不可入侵水際一二丈植之則渡水登舟者無所措其手足且木雖大小相格而勢不相並順風縱火者所不能焚羣木植立相扶炮車所不能壞更使厚踰於丈則敵之長槍俱廢矣但須㳂江可渡處一一為之只此一事當用浙西民力十分之一乞毋暴其說先遣使泛諭民出財助國財既入則官自募工庀材而急成焉詔㳂江諸州相度尋以若為承奉郎若初為諸生嘗勸張邦昌使諫上皇以花石之擾邦昌不聽乃言於邦昌之夫人鄧氏鄧氏愕然曰吳郎風邪何忽如此靖康初除太學正上疏論宰相吳敏徐處仁之罪坐斤去及是以與邦昌連姻故召若初見二月戊午其改官未見本日今附書之熊克以若為晉陵人趙甡之遺史云案此注末有脫句是日吕頥浩軍行至平江之北先是頥浩以所部萬人發江寧府道募得三千人與俱熊克小厯云頥浩至平江府兵凡三萬人誤也今從臧梓勤王記至平江之北四十五里張浚乘輕舟迓之道遇小舟得郵筒屏人發封乃浚郴州謫命蓋賊以浚限截往來文字故更遣使臣自湖州轉遞以來浚得之恐將士觀望不盡力呼書吏曰朝廷趣赴行在為我申即日起發浚見頥浩相與對泣以大計咨之頥浩曰事不諧不過赤族頥浩曩諌開邊之失幾死宦官之手承乏漕挽幾陷窮邊之域近者倉卒南渡舉室幾喪今日為社稷死豈不甚快耶浚壯其言頥浩即召其屬官李承造於舟中草􅊾而浚為潤色之臧梓勤王記頥浩以己亥至平江之北庚子至平江張浚復辟記頥浩以二十四日宿平江之北二十五日至平江二書不同凡差三日梓所記恐誤按梓序云以頥浩私記事跡并張浚李承造邵彪勤王記參照編類內有日月差異處親禀頥浩得其次序然今以諸書互相參考則浚責郴州之命在二十三日辛丑若頥浩果以庚子至平江則浚責命尚未下安得舟中已見郵筒也今從勤王記初苗傅聞韓世忠在秀州取其妻梁氏及其子保義郎亮于軍中以為質朱勝非聞之乃好謂傅曰今當啓太后招二人慰撫使報知平江諸人益安矣傅許諾勝非喜曰二凶真無能為矣此以勝非間居録修入但間居録繫之十七日恐誤今依日厯附二十四日壬寅日厯稱世忠妻在杭世忠使人召之傅不與張浚復辟記云傅質世忠家屬以太母命遣其妻往世忠所囑之還朝二書復不同以事考之勝非所記當得其實今從之太后召梁氏入見封為安國夫人錫豫甚渥后執其手曰國家艱難至此太尉首來救駕可令速清巖陛梁氏馳出都城遇苗翊於塗告之故翊色動手自捽其耳梁氏覺翊意非善愈疾驅一日夜㑹世忠于秀州俄而傅等遣使以麻制授世忠世忠曰吾但知有建炎豈知有明受斬其使焚其詔又遣使持麻制授張俊俊械以送獄馮轓又說王鈞甫曰此事若了在他人公何以贖過鈞甫頗以為然五丈河舟師卲青素為盜甚得其徒之心亂後聚舟往來淮上至是入泗州城掠其金帛而去青濟南人也癸卯太后詔睿聖皇帝宜稱皇太弟領天下兵馬大元帥復封康王皇帝稱皇太姪監國御營都統制苗傅副都統制劉正彥並賜鐵劵時傅正彥聞勤王兵大集意甚懼呼馮轓議復辟轓知其可動即見朱勝非白云今國步艱難當以馬上治之今日之事當以淵聖皇帝為主睿聖皇帝嘗受淵聖詔為大元帥宜仍舊少主為皇太姪太后垂簾時有持服奉議郎宋邴等數人上書亦如轓意勝非令轓與傅正彥計之傅正彥許諾即日遣張逵與轓詣都堂勝非猶疑之未敢應劉正彥王鈞甫聞之趣傅詣都堂見勝非鈞甫與馬柔吉佐其言勝非大喜答以二太尉有意如此宗廟社稷之幸勝非晚朝遂以太后命召傅正彥鈞甫轓同對傅正彥言今日之事安國家恤生靈禦强敵若便此三者臣萬死不辭鈞甫言傅正彥忠有餘而學不足轓奏言如對勝非語又請褒傅正彥如趙普故事太后勞傅等且許之少頃趣召百官宣太后詔略曰敵人以睿聖皇帝不當即位兵禍連年今宜稱皇太弟領大元帥皇帝稱皇太姪監國太后臨朝聽政退避大位務在息兵此詔語據王庭秀閲世録制出在庭愕然御史中丞鄭㲄殿中侍御史王庭秀欲留百官班論之而臺諌惟㲄等二人遂不果時大雨百官冒雨朝上於睿聖宫勝非等奏事議論幾數刻上曰必若此傳之後世豈不貽笑哉張逵退謂苗傅曰趙氏安矣苗氏危矣王世修亦以為然傅遂易初議張浚復辟記云二十六日集百官議在列無不鼓舞是日遂降詔四月一日復辟臣謹按王庭秀閲世録二十五日集百官宣詔翌日乃用庭秀等言改為處分兵馬重事二書不同是時庭秀為臺官其所記必審今從之閲世録又云宣制畢乃朝睿聖宫而趙甡之遺史云百官朝睿聖宫謂復辟矣既至宫乃請上為大元帥及宣詔百官失色臣謹按鄭㲄奏疏云昨日宣示詔書班退詣睿聖宫云云與庭秀所記合今從閲世録進士馮轓特補奉議郎守尚書兵部員外郎賜緋更名康國康國補官日厯不戴季陵外制集有制詞朱勝非間居録云三月十四日張浚在平江遣進士馮康國持奏并申都省乞主上貶損位號柔服金朝康國參曰本蜀人張侍郎相從多年今蒙勤王所差賫奏狀余曰想見平江傳報不一今得賢來見城中次第可以歸報翌早簾前留身奏言張浚遣進士馮康國持奏狀來太后曰已見狀申無事昨夜降出余曰奏狀固無事意欲令康國偵伺城中浚僚屬甚多不遣遣布衣來且康國自言與浚皆蜀人相從日久或欲成就官爵耳太后曰有何功勞便要官爵余曰昨夕思之賊氣已讋大事有緒所乏者英威正當張大外援今召康國引對太后面加慰勞優與恩數二凶知外援之盛康國回賜浚優詔使平江知時事之順中外合勢事乃易圖太后曰與何官余曰乞授通直郎仍除郎官賜緋章服太后曰甚好明日引對悉與之除兵部員外郎遣回按此所云則康國除命當在十六日也是時大事未定安得便除官馮楫臨安録云康國奏知太后大元帥事訖有㫖除郎官此得其實蓋康國兩至杭州其引對除郎在再來之日而勝非誤記於初來之時耳熊克小厯繫於十四日壬辰蓋承秀水録之誤臧梓勤王記云四月壬子進士馮轓授京秩此尤差誤今並不取祕書省正字馮楫至都堂見朱勝非言聞大計已定士大夫皆能言惟恐軍衆尚有疑阻勝非曰何自知之楫曰過計耳欲入其軍傳道朝廷之意以諭衆勝非曰大計巳定諸軍初無疑阻若擅入營寨生事當收君下獄楫懼而退復因康國求至平江與張浚計事勝非不許自當收君下獄已上並據勝非間居録修入楫所著臨安録云楫說與康國昨日請為大元帥已移得兵權固善矣然名尚未正并猶在睿聖宫何似我與你同往說賊復辟我有䇿可以回之康國曰極力止此何可進矣當回報張侍郎令圖之楫曰只恐張侍郎未必有䇿我却有箇䇿須見侍郎方可言你如白朝堂令許我出見張侍郎朝廷今已信你未必信我蓋前來楫嘗以此意撼張右丞渠不領解又曰朱丞相欲詣府第禀事丞相云纍日頭昏不在府第見客有事只就此說楫見衆宰執同坐此語如何漏泄語出即殺身遂已今你言已有驗說我同往丞相必從則來早便報來次日早等不至食後方來云朝堂不肯是日吕頥浩張浚議進兵韓世忠為前軍張俊以精兵翼之劉光世親以選卒為逰擊頥浩浚總中軍光世分軍殿後遂以勤王所為名頥浩浚傳􅊾中外曰恭惟宋有天下垂二百年太祖太宗開基創業真宗仁宗德澤在民列聖相傳人心未厭昨因內侍童貫首開邊禍遂致敵騎厯嵗侵陵逆臣苗傅躬犬豕不食之資取鯨鯢必戮之罪乃因艱難之際敢為廢立之謀劉正彥以孺子狂生同惡相濟自除節鉞專擅殺生仰惟建炎皇帝憂勤恭儉志在愛民聞亂登門再三慰勞而傅等陳兵列刃凶熖彌天逼脅至尊倉皇避位語言狂悖所不忍聞大臣和解而不從兵衛皆至於掩泣詔書所至逺邇痛心駭戾人情孰不憤怒顧惟率土何以戴天况傅等揭榜闤市自稱曰豫祖宗諱名曽不回避迹其本意實有包藏今者吕頥浩因金陵之師劉光世引部曲之衆張浚治兵於平江韓世忠張俊馬彥溥各率精鋭辛道宗永宗陳思恭總率舟師湯東野周杞據扼險要趙哲調集民兵劉誨李逮餽餉芻糧楊可輔等參議軍事并一行將佐官屬等同時進兵以討元惡師次秀州四方響應用祈請建炎皇帝亟復大位以順人心今檄諸路州軍官吏軍民等當念祖宗涵養之恩思君父憂廢之辱各奮忠義共濟多艱所有朝廷見行文字並係傅等僞命及專擅改元即不得施行敢有違戾天下共誅之建炎三年三月二十四日朝奉大夫權發遣常州兼兩浙西路兵馬都監周把新除左武大夫觀察使兩浙路提㸃刑獄公事趙哲祕閣修撰知平江府兩浙西路兵馬鈐轄湯東野寧武軍承宣使帶御器械秦鳳路馬步軍副總管御營前軍統制張俊起復定國軍承宣使帶御器械鄜延路馬步軍總管御營平寇左將軍韓世忠試尚書禮部侍郎充御營使司參贊軍事張浚新除檢校太保奉國軍節度使殿前都指揮使制置使劉光世新除資政殿學士同簽書樞密院事江淮兩浙制置使吕頥浩臣謹按印本􅊾書係三月二十四日吕頥浩勤王記云己亥草􅊾書壬寅傳􅊾內外壬寅二十四日也張浚復辟記云二十四日草􅊾書二十六日傳檄內外二記復不同蓋浚誤以此月為大盡故差一日其實二十四日壬寅草􅊾書二十五日癸卯乃傳發爾遣迪功郎王彥覺持檄諭江寧府迪功郎洪光祖諭越州修武郎張復諭湖州逺方入遞傳發又遣統制官張道率兵三千人屯湖州安吉縣以分賊勢光祖丹陽人也初頥浩至平江張浚見之涕泣曰主上待我輩厚今日惟以一死報國日夜望樞密之至以為盟主頥浩慰勉之是日劉光世亦以所部至平江光世見張俊相與釋憾傅計不行張浚復辟記云初苗傅為光世與韓世忠張俊嘗有語言之隙屢行間諜意令光世為己用而俊世忠三人盡釋憾交歡傅計不行按光世至平江時世忠已在秀且二人終身未嘗釋憾交歡浚不應誤但其上此計時三人者並為大將不容不如是言之耳今略刪潤令不失實先期告請使黃大本等過平江吕頥浩問上起居狀大本反稱美傅等且告言廢立之謀乃械以送獄事平釋大本以為貴池丞朱勝非間居録云二凶趣遣使勝非白太后以先遣小使仍密留於勤王所太后喜已而遣迪功郎胡樞充小使密戒之至平江樞遣人賫狀來云為勤王所拘留文字亦取去余令遍呈二凶自此使議遂息勝非所云胡樞又與日厯不同而臧梓所記乃云進士二人借官則似指大本及吳時敏也更須詳考宫儀圍安邱縣權知密州杜彥引兵救之其徒李逵吳順皆不從曰儀衆甚盛未可與戰彥曰見敵不擊何以威衆遂行至潑石橋與戰大敗彥盡喪其步軍儀忿之遂屠安邱縣彥還密州逵順責其喪軍拒不納彥欲引去而馬軍皆有家屬在城中出言紛紛逵開門納之乃殺彥梟其首逵遂領州事甲辰御史中丞鄭㲄殿中侍御史王庭秀抗疏論睿聖皇帝不當改號㲄言探聞得詔書之意乃遣閣門宣贊撫諭將臣韓世忠歸道世忠之語稱須得太后陛下詔睿聖皇帝為兵馬大元帥方不進兵朝廷大臣進議以謂若為大元帥則當稱臣不欲以子臣父遂併降今上皇帝為皇太姪睿聖皇帝乘正統嗣天位已二年矣一旦尊而為太上皇以太子嗣位太后陛下垂簾同聽政雖出倉卒之間於禮猶順今遽降而為大元帥則內外百官曰將曰相昔日所臣事者今則與之比肩事主矣稽之於古無所取法行之於今實逆天道今欲如唐之睿宗以太上皇聽大事如舜既禪位命禹徂征有苗為法天下孰以為非伏望收還昨日手詔命將相百官請睿聖皇帝以太上皇聽國之大事陛下仍舊與今上皇帝同聽政以安人心若詔書頒行則天下聞之無君矣貢賦不入倡義而起兵者皆是也雖有智者不能為謀庭秀言女真侵陵我國將帥之臣不能北向發一矢乃假其聲勢脅制朝廷願還前詔宣召百官儼列儀衛詣睿聖宫恭請皇帝還御治朝總攬權綱有異議者即戮以徇如迅雷之發不及掩耳俄頃之間大事定矣是日早㲄獨對為太后言今既降位號則乘輿服御亦皆降殺豈將易赭服紫耶退與庭秀復上疏力爭午刻疏入太后召㲄與宰執同對簾前㲄乞次召庭秀太后諭曰今日之事且因百僚論列大臣商量欲令睿聖皇帝總領兵馬耳㲄等奏曰臣不知其他但人君位號豈容降改聞之天下孰不懷疑雖前世衰亂分裂之時固未有旬日之間易兩君一朝降兩朝位號者也太后曰必中丞未嘗見諸人文字相公可同至都堂視之既至朱勝非自於青囊出宋邴等所上書以示㲄庭秀㲄等力言昨日詔書不可宣於外必召變勝非與執政顔岐王孝迪路允迪皆在坐尚書右丞張􅊹獨曰若以五日時事勢豈爭此名位耶澄欲行出㲄等共止之夜王世修亦詣朱勝非府爭之事遂止乙巳制曰朕以幼冲仰膺付託今承太母慈訓及覽宰執侍從內外將帥奏陳謂睿聖仁孝皇帝頃自靖康之初實總元帥之重早緣推戴繼遂纂承比以强敵侵陵生民荼毒深自損抑發於至誠既退處於别宫以釋言於大國惟淵深之命孰敢廢而臣庶之願不可違若止仍太上之稱何以慰天下之望今恭依太后聖㫖請加上太上睿聖仁孝皇帝處分兵馬重事馮康國以問朱勝非曰勿與較其實一也日厯此詔在二十八日丙午恐不應遲留如此按馮楫臨安録馮康國以二十七日回平江則下詔當在先今從王庭秀閲世録附二十七日太后詔勿避父名罷孟忠厚提舉巡幸一行事務朝請郎陳戬為監察御史御營前軍統制張俊以勤王兵發平江殿前都指揮使制置使劉光世繼之吕頥浩與張浚餞於門外登樓閲兵器甲鮮明士氣鋭甚聞行在已有復辟之議復辟記二將出師在二十八日今從勤王記案聞行在句語意未完當有脫句是日勤王所􅊾至湖州新除資政殿學士提舉中太一宫葉夢得行舟碧瀾堂下召守臣梁端通判州事張燾及寓客龍圖閣直學士許份徽猷閣直學士曽楙徽猷閣待制致仕賈安宅等謀之夢得欲與端等共為一檄調諸縣射士勤王而留平江檄書不發安宅曰時已後矣此事豈可欺人直祕閣主管南京鴻慶宫曽紆聞之亦勸端張榜趣用建炎年號於是夢得引兵次平望以俟吕頥浩張浚之至欲與俱燾亦從之㑹舟師壅隔不得前夢得乃止時已召楙為翰林學士安宅為吏部侍郎二人皆不赴楙除學士在此月十六日安宅之除日厯不載四月十一日得㫖别與差遣足明除命在三月也大率史於僞楚及明受兩次差除多不盡載今有可考者具書之其辭受是非則稽之以事而可見不必沒其實也傅遣兵三千屯湖州之徑路曰小林以扼援兵來路又調兵於輔郡端用紆計械繫其使者不與兵紆布子也曽紆賈安宅葉夢得事用紆墓志及紆所撰辨猶豫記并紹興三年正月賈安宅分析狀參修苗傅屯兵小林亦以紹興三年十月甲申御史臺與鄭大年改正復官狀修入丙午尚書禮部侍郎御營使司參贊軍事張浚同知樞密院事翰林學士李邴御史中丞鄭㲄並為端明殿學士同簽書樞密院事邴嘗見管軍王元密令出禁旅擊賊元懦怯不能從於是朱勝非留身奏邴㲄近遷人皆知其助朝廷之故今諸軍已定乞並除執政顯示中外太后曰可勝非曰自來執政除命出自禁中臣不敢擬進太后曰待批出勝非曰仍須處分日下供職午間內降如所請浚不受張浚除同知朱勝非間居録無一字及之蓋二人不相能也日厯浚之除在四月庚戌按浚自撰復辟記云三十日奉聖㫖除臣同知樞密院事其實二十八日除二十九日受命但浚以為大盡故差一日也日厯㲄之除在甲辰邴之除在丙午秀水録在二十六日甲辰二書不同今從趙甡之遺史並附丙午是日吕頥浩張浚以大軍發平江丁未宰相朱勝非召苗傅劉正彥至都堂議復辟事熊克小厯載此事於二十七日乙巳蓋因朱勝非間居録所記也按日厯四月一日宰執奏狀稱臣等三月二十九日請召苗傅劉正彥等到都堂諭以睿聖皇帝當還尊位苗傅等一皆聽從則在二十九日丁未矣以馮楫臨安録考之亦是此日或者勝非移此事於張浚未發平江之前以城中先有定議不待外兵之逼也但奏牘所載差互不同爾若勝非調護曲折蓋已悉書之靡有遺佚惟此一事勝非分作四日甲辰宰執聚議乙巳召二凶赴堂丙午王世修持奏狀赴漏舍丁未下詔朝别官今依奏狀併於二十九日丁未書之庶不失實傅正彥之反也王世修實為之謀畫及外兵至憂懼乃急請復辟以自解此據日厯前一日執政聚議召二凶顔岐李邴猶慮其不至及是勝非令行首司發帖子召傅正彥世修及王鈞甫馬柔吉張逵詣都堂㑹祕書省正字馮楫見傅于軍中且貽傅正彥書大略謂今張樞密握兵在平江遣馮郎中來請上為大元帥意在於復辟而後已也元帥姑為皇帝主兵之漸耳兵權既歸睿聖皇帝然後下反正之令太尉能違之乎如不可違是使他人有復辟之功而自處以廢君之罪如或違之近則張樞密逺則杜充王庶張深張嚴楊進李彥仙杜彥蓋進之徒咸起問罪之師可亦一一為建節旄便能已其事乎太尉結睿聖一人之怨是與天下為讎也與天下為讎則召天下之兵也宜矣昨馮郎中乞太后賜太尉誓書鐵劵太尉勿謂受太后誓書鐵劵便可保無虞也太尉結怨於睿聖皇帝儻未復辟上猶在睿聖宫何解皇帝之怨惟太尉自請反正而得皇帝親賜誓書鐵劵則無後患矣太尉儻從不肖之請當為宰相言之若出外則許提兵而行若欲在朝亦不解今日軍政皇帝賜誓書鐵劵之外更請御筆赦太尉擅誅內侍之詔盡置內禪之事而不言使天下無得而疑太尉宰相必能為太尉辨之也如此身亦可全名亦可保不然則浹日之間必制於他人之手矣傅正彥唯唯此據馮楫臨安録遂詣都堂勝非語之曰反正事已定日迎請朝廷百官皆有章奏公自可别作一章傅面頸發赤慚恧無語回顧正彥正彥起曰前日所請本為和金今使命雖不通未嘗更遣遽請反正前後事體相違勝非責之曰和金之使既無路可通况事已彰露州縣誰不知之且勤王之師未來者使是間自反正耳前日王淵不當作樞密人情猶能如此今日之事孰為輕重不然下詔率百官與六軍請上還宫公等六人置身何地平時為將帥者皆賴國家官爵號令故能使人一旦是非曲直既分雖三尺童子皆知去就將校軍士必不能誑惑正彥却立不對傅長吁曰獨有死耳勝非以二將反覆責世修世修以言逼傅傅不能答勝非乃令堂厨具飯命世修即廡間草奏持歸軍中自准備將已上皆書名已上據勝非間居録修入間居録又云余語執政曰已備下昨夕先與老母别矣諸公曰何謂也余曰他日當知之親兵將官徐建者引首屢探堂中余曰此即下䇿所用之人也是日宫中堂門皆密為備二凶若敢不從闔兩重門盡行勦戮然後單騎至諸寨招附儻或見害其為死所不亦大乎不敢遽如此者慮既誅之後招附既定固無事萬一更有變亂不可知耳諸公皆曰非所及也執政晚朝至漏舍世修持軍中請復辟奏狀納勝非勝非進皇太后極喜曰吾責塞矣勝非即召詞臣張守至都堂與李邴分作百官章三奏三答及太后手詔與復辟赦文皆具馮楫臨安録云楫說二賊頗有見從之意遂往都堂要以此事禀宰執到客位有榜云侍從而下皆不見為二賊先已在堂內議復辟事所以不見客移刻二賊出朱丞相亦出楫近前白丞相有緊急事拜禀丞相云只今晚朝可來幕次說楫隨後到宰執幕次有七人同坐楫禀宰執云早來公面說苗劉自請皇帝復辟二賊已聽從惟是許其四事乞相公為辦之丞相云四事謂何楫云一許其皇帝賜以誓書鐵劵二許其在朝則不解軍務三許其出外則提兵而行四許以皇帝親書赦其擅誅內侍之詔其餘縷縷說之之辭逼朝未能盡言丞相云只今便取决於太后楫遂退按此所云與間居録全不同今附此更須參考直龍圖閣王世修為尚書工部侍郎朱勝非間居録云三月十六日王世修見余于私第余謂曰賢能辦此便取㫖除六部侍郎詰旦早自留身具奏世修語太后曰若能成功何止侍郎雖執政亦可除也二十八日世修特奏狀來余奏曰事已成世修先許除從官欲令次日除工部侍郎晚朝引見面賜金帶使來早立本班以示迎請之人太后欣然從之據所書世修除侍郎當在二十九日今附此日厯在四月一日同簽書樞密院事吕頥浩制置使劉光世禮部侍郎張浚平寇左將軍韓世忠御營前軍統制張俊等言契勘都統制王淵不能備禦金人致乘輿南渡結連內侍躐除樞管近有統制官苗傅劉正彥被奉聖㫖將本官及內侍誅戮委屬允當外有建炎皇帝以避敵遜位一事臣等竊詳建炎皇帝即位以來恭儉憂勤過失不聞今天下多事之際乃人主馬上圖治之時深恐太母垂簾嗣君皇帝尚幼未能戡定禍亂臣等今統諸路兵逺詣行在恭請建炎皇帝還即尊位欲望聖慈特降睿㫖令百官有司早行祈請建炎皇帝復位或與太后陛下同共聽政庶幾人心厭服可致中興時頥浩浚大軍已次吳江張浚復辟記三十日次吳江縣按是年三月小盡當是二十九日丁未浚誤記也臧梓勤王記丙午離平江府丁未次秀州而復辟記次秀州在四月一日二書亦不同按復辟記常誤進一日四月以後即不差今參酌二記附此王世修聞之遣人至軍中云上已處分兵馬重事止王師屯秀俾頥浩浚以單騎入朝頥浩奏曰臣等所統將士忠義所激可合不可離願提軍入覲傅等計窮益懼日厯三月二十九日聖㫖召李綱總領六路弓兵入援王室按此時綱尚責海南行狀中亦無之當考是晚苗傅劉正彥復至都堂見朱勝非請詣睿聖宫見上謝過勝非難之不得已白於上傅正彥自知罪大疑不得見憂懼失色抵宫門日已晡矣睿聖皇帝開門納之且令衛士掖以升殿傅正彥請降御札以緩外師上曰人主親札非所以取信其取信於天下者以有御寶今朕退處别宫不與國事用何符璽以為信自古廢君杜門省愆豈敢更預軍事傅等巽請上乃賜韓世忠手詔曰知卿已到秀州逺來不易朕居此極安寧苗傅劉正彥本為宗社始終可嘉卿宜知此意遍諭諸將務為協和以安國家傅等退以手加額曰乃知聖天子度量如此遂遣杭州兵馬鈐轄張永載持詣世忠世忠得之謂永載曰主上即復位事乃可緩不然吾以死决之傅等大恐是月迪功郎張邵應詔上書言今中原未復非保東南無以為陛下之資非據建康無以鎮東南之勢錢塘僻在海隅其地狹恐金人聞之謂我棄江淮而退有如遣間諜誘盜賊啖以髙爵連衡抗我則江淮之間又生一敵也就令能保錢塘彼將出豫章九江涉當塗京口數道並進南扼饒信北攻蘇秀弛我援兵梗我糧道無處自處誠非持久之便願陛下遣能臣相視江北諸州要害築堅城而守之若彭門青社京師曹濮與夫關中川口之地亦宜有以大鎮撫之俾扞蔽益多而東南全矣邵歷陽人也朝奉郎知婺源縣孫把應詔上書言五事一曰金人背盟雖戴天履地共有枕戈之怒然人主之行異布衣匹夫見辱拔劔而起不忍忿忿試之一擲則大事去矣二曰宣政大臣為天下害以誤社稷其徒諱弗言專斥太上皇傷天子之孝三曰建炎初政開廣言路憸人射利賣直釣名作為謗書詆誣盛德傳信四方以為口實此犯上作亂之由不可長四曰兵將驕蹇伺寇至奔散為盜不可使宜益募民為兵兵無常刑其權在將孰云吳兒不可用耶五曰國蹙民窮徴發如雨人不堪命宜罷省諸不急以濟軍興杞晉陵人書奏㑹近臣有言其才者乃召赴行在孫覿撰杞墓志云詔公馳驛入對未至而乘輿幸建康新將相用事所施置皆不與公言合於是辭疾不果行按把所上書前三事如此則不果行宜矣金人陷京東諸郡時山東大饑人相食嘯聚蜂起巨寇宫儀王江每車載乾尸以為糧時當兵火之餘又有河决之患州郡互不相救金再攻青州守臣京東東路安撫使劉洪道力不能守率餘兵二千棄城去金人以前知濵州向大猷知青州時右副元帥宗輔左監軍棟摩乘勢盡取山東地惟濟單興仁廣濟以水阻尚存焉洪道在仰天陂遣其將崔邦弼往安邱縣求援於宫儀儀發兵迓洪道别為一寨以處之日過聽議事徐州武衛都虞候趙立聞金兵北歸知城中弛備鼓率殘兵邀擊于外斷其歸路奪舟船金帛以千計軍聲復振立盡團鄉民為兵誓以平敵退者必斬叔父扆後期至立謂曰叔以立故亂法何以臨衆促命斬之士皆感厲遂復徐州衆推立為長東京留守杜充承制以立為武德大夫閣門宣贊舍人言於朝詔授立忠翊郎權知徐州事立乘瘡痍之後撫循其民恩意周至召使復業井邑一新金左副元帥宗維聞上渡江徙濟南叛臣劉豫知東平府充京東西淮南等路安撫使節制大名開德府濮濱博棣德滄等州而以其子承務郎麟知濟南府自舊河以南皆豫所統也賊馬進號花衲襖為楊進餘黨所敗將殘兵數百自宿遷之虹縣歸李成建炎以來繫年要録卷二十一
