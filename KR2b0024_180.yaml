body:
  text: 建炎以來繋年要録巻一百八十宋李心傳撰紹興二十有八年秋七月按是月戊午朔己未詔築皇城東南之外城命領殿前都指揮使職事楊存中莅其事増展出故城十有三丈計用三十餘萬工凡民居所占以隙地償之每楹賜錢十千為改築之費庚申初定江西諸州部載上供米綱賞格用直敷文閣新江西轉運副使李邦獻請也先是江西上供米自二十一年至今未起者七十萬餘石已起未至者一百六萬餘石㑹邦獻辭行奏事上命併綱促行期以半嵗邦獻言江西米運其弊有五若不别行措置實恐有悞朝廷指擬之數一則部綱不得其人及支錢米作弊百端二則官綱舟船㓕裂不堪乗載三則水脚糜費等錢不足四則不曽措置摺運逺邇輕重不均五則卸綱處乞取太重斗面太髙不除擲颺折耗所以失陷數多甚則篙梢侵盗因而逃竄舟船乆繋岸下至於沉溺損壊乞募土豪及子本客人装載許将一分力勝搭帶私物所過捐其税如不願請船脚錢者二萬石無欠少補進義校尉三萬石加一資依軍功補官法如土豪客船不足許選差見任京官選人大小使臣一萬石一千里以上無欠失减四年磨勘二萬石减六年三萬石轉兩官止庶㡬米運通快盡革乆弊户部奏如邦獻請仍募有家業及得所押物數不曾充役及犯徒刑之人其自備人船每石三千里水脚錢三百文命官仍許募寄居待闕官二千里以上推賞如邦獻所乞之數土豪客人少欠三釐以下與依格推賞如三釐以上補足乃聴命官欠三釐展三季磨勘欠五分衝替副尉以下勒停從之詔太尉劉錡今年遇大禮許奏補文資壬戌閤門祗候劉汜為江南東路兵馬副都監從其叔父錡之請也甲子右正言朱倬言四川郡守之官其舟輿器用之直多至五六千緡少亦三四千緡罷亦不損望詔有司立法自今並以贓論從之丙寅詔諸州申到上供綱觧並令太府寺籍定毎半嵗擇其稽違之甚者申户部所屬曹分根治以户部員外郎莫濛言起綱官司虛申綱觧致有稽違程限十數倍者故條約之戊辰詔自今監司按發公事應推鞫者依法不得送置司州軍如所犯稍重即申朝廷委鄰路監司選官就本處推究州軍按發官吏即申監司委鄰州官時左正言何溥言監司郡守以私忿按吏理亦有之省部間或移送他司徃徃妄意窺測盡行闊略而實有罪者因以幸免乞為之條禁故有是㫖己巳殿中侍御史葉義問言權户部侍郎林徐營私黨吏不顧財用大計詔放罷庚午詔美人馮氏才人吳氏可令歸本家逐便辛未左正言何溥言近朝廷擇取教授通判之闕于部以為堂除臣獨惜夫士大夫之才有長於為邑者而置之無用之地使百里之民不見由求卓魯之政甚可歎也望用建隆天聖故事擇大縣闕為堂除仍借五品服優其廪給俟終更甄擢之上謂沈該曰此事湏熟商量朕謂天下事治其末者不若治其本縣令末也監司郡守本也若監司郡守盡得人則縣何患不得人卿等為朕擇監司郡守足矣既而吏部請依故事遇堂除知縣下本部取闕供給視諸州簽判餘如溥所請從之戊寅祕書郎王佐祕書省校書郎兼實録院檢討官葉謙亨胡沂並為尚書吏部員外郎祕書省著作佐郎兼普安恩平郡王府教授楊邦傑陳俊卿並為著作郎起居舍人洪遵面對論鑄錢利害大略謂今錢少多為銷毁作器用而南過海北渡淮所失至多自罷提㸃官復置屬官二員無異監司而鑄錢殊未及額亦冝多方措置上諭大臣曰遵論頗有可採前後銅禁行之不嚴殆成虛文銅器雖民間所常用然亦可以他物代之今若自公卿貴戚之家以身率之一切不用然後申嚴法禁冝無不戢者己夘上出御府銅器千五百事送鑄錢司遂大歛民間銅器其道佛像及寺觀鐘磬之屬並置籍每斤収其筭二十文民間所用照子帶鑻之類則官鬻之凡民間銅器限一月輸官限滿不納十斤已上徒二年賞錢三百千許人告自後犯者私匠配錢監重役其後得銅二百萬斤右通直郎知臨安府鹽官縣劉士開幹辦行在諸司糧料院士開阜民子也上疏自訴父祖被遇先帝特録之庚辰上出御製郊祀天地宗廟樂章十三首示輔臣辛巳權尚書吏部侍郎兼侍講凌哲引疾求補外除敷文閣待制知台州壬午國子祭酒周綰權尚書吏部侍郎祕書少監曽㡬權禮部侍郎直祕閣楊庭陞直顯謨閣以其母崇國夫人南氏有請也於是庭弟成忠郎㢘等十人並進官癸未詔進奏官每郊四人出職諸道進奏官凡八十有一人每郊從上出職三人帶補有過已雪者一人祖宗舊典也紹興十四年減半及是復之此據㑹要甲申權吏部尚書兼侍讀王師心充顯謨閣直學士知紹興府從所請也給事中兼實録院修撰兼侍講賀允中權吏部尚書允中在黄門多所駮正先是三衙刺兵改易軍分及牧馬營地占奪民田大将有囬授其子而轉閤職及中貴人遷秩不應法或免試補官特差之類允中繳論不一嘗因對論君子小人之異允中言君子志在尊君則不能無忤小人志在悅君故第為詭隨此不可不辨也上稱美乆之允中又言聞陛下欲闢御苑以近某人園果乎上曰誰為此言允中曰臣既有聞不得不奏也上曰卿言甚忠繼有所聞宜悉以奏左朝散郎沈介試祕書少監尚書司封員外郎黄中守國子司業乙酉詔諸路没官田並令出賣時所在州縣閒田頗多舊許民請佃嵗利厚而租輕間有增租以攘之者謂之剗佃故詞訟繁興右奉直大夫知温州黄仁榮請鬻之則訟自息户部言昨寺觀常住絶産已樁充養士亦望如仁榮所乞從之右奉議郎知復州何榘言湖北路所賣茶引嵗有常額其間户口繁庶去處年額不多是致小商私販以規利兼有人煙户口未及前時而引數頗多科及保正甚者不問貧富以丁口一例科抑詔提舉司参酌人户多寡通融措置母得科敷榘㮚弟也八月戊子朔詔置國史院修神宗哲宗徽宗三朝正史端明殿學士四川安撫制置使兼知成都府李文㑹薨己丑詔諸路風水災傷州縣並令提舉官檢放苖税而賑貸其不給者用監察御史任古請也辛邜權吏部尚書兼實録院修撰兼侍講賀允中進兼侍讀權禮部侍郎孫道夫權工部侍郎劉章並兼侍講時上将祀南郊道夫言神祖時執政以國用不足乞罷郊賜司馬光贊之而王安石執不行臣謂将來郊禮宜伸光之議許兩制侍從皆辭錫賚宗室刺史以上减半節用自貴近始以風示天下上曰朕在宫中衣服飲食皆從儉約道夫曰陛下可謂於禹無間然矣壬辰殿中侍御史葉義問守侍御史癸巳起居郎王剛中試中書舍人起居舍人洪遵守起居郎尚書禮部員外郎張孝祥試起居舍人乙未增瀘州觧額三人眉漢嘉卭簡忠涪資叙昌西和州遂寧府石泉永康長寧軍仙井監觧額各二人以逐路轉運司言皆以終場百人以上取放一人故也丙申祕閣修撰知紹興府趙令詪權尚書户部侍郎初議者以淮東積鹽命提舉官吳巘措置至是巘言本路催煎場一十九共管竈四百五十二今諸倉積鹽三百七十四萬石欲省竈八十四减嵗額鹽五十二萬石有竒度嵗収尚三百三十萬石如每年支及六十萬袋則可将積鹽三十萬石帶支期以十年支發盡絶從之戊戍尚書右僕射提舉實録院湯思退等上徽宗實録一百五十巻以左僕射沈該為禮儀使進官賜銀帛如提舉官例該不受實録自八年秋開院至是踰二十年乃成官吏進秩者四十有八人减磨勘年者一百四人遷資者六十三人犒賜銀帛共八千餘匹兩舊秦檜所進自元符三年至大觀四年至是冄加增潤然猶多疎略云上御垂拱殿進呈訖奉安于天章閣又以小本進入禁中先是輔臣以實録成書請擇日稱賀上顰蹙久之曰莫可以不賀否輔臣再奏禮當拜表第罔極之恩深惻聖懐若免稱賀亦所以稱孝道上乃從之庚子命尚書右僕射湯思退監修國史權吏部尚書賀允中中書舍人周麟之兼同修國史吏部員外郎葉謙亨楊沂秘書省校書郎汪澈並兼國史院編修官時左僕射沈該與思退並以監修國史為名而該監修日厯思退監修正史熊克小厯於七月丙子書置國史院及思退監修又七月甲申書賀允中兼同修國史並誤辛丑延福宫使清逺軍承宣使入内内侍省押班張見道落階官提舉萬夀觀免奉朝請右武大夫成州團練使廖虞弼為樞宻副都承㫖權尚書户部侍郎湯允恭卒權尚書兵部侍郎兼提領鑄錢榮薿充敷文閣待制提舉江州太平興國宫薿嘗入見上問以鑄錢事薿曰已令兩屬官分行諸路責以如額翌日上謂大臣曰如此措置殆成虛文當先㑹每嵗所出銅料所用木炭所役工匠皆㡬何然後可以責辦薿不自安乃求去故有是命壬寅三省請選官二員徃嚴饒州措置鑄錢仍命户部侍郎趙令詪提領上可之乾道二年二月庚子設饒贛兩司尚書省勘㑹張浚已服闋詔特進觀文殿大學士和國公張浚落職提舉江州太平興國宫依舊永州居住直敷文閣劉堯仁為祕閣修撰主管佑神觀以堯仁乞臨殿推恩也癸邜左通奉大夫守尚書右僕射同中書門下平章事監修國史湯思退以進書恩遷左正奉大夫乙巳武信軍承宣使荆湖北路馬歩軍副都總管李横令再任用安撫使劉錡請也丙午中書舎人權直學士院同修國史周麟之入見論徽宗實録所載之事多渉國體與今日政令相闗凡副本之在有司者冝謹其藏不許諸官司闗借及臣僚之家私自傳寫庶可以嚴宗廟尊朝廷即日拜麟之尚書兵部侍郎兼直學士院太常少卿王珪既出臺引疾求去除直敷文閣知舒州丁未加封唐栁州刺吏栁宗元為文恵昭靈侯庚戍起居郎洪遵兼權中書舎人樞宻院編修官王淮諸王宫大小學教授任質言並為祕書省校書郎太常寺主簿杜莘老為太常博士仍兼籍田司千畝皆上腴而嵗取甚薄耕者行賕以争利吏每於嵗首歩頃畝視賕之薄厚為予奪疆畝所接皆苦之至是舉故事請度田莘老曰是無盈縮安用度乃立表大書於四境且籍耕者賦耕田有定數吏縮手不得肆旁近民感悦至今賴之辛亥中書舍人王剛中兼史館修撰掌修哲宗徽宗寳訓祕書少監沈介兼編修官詔立愍節廟於順昌縣以祠范旺癸丑知大宗正丞陳棠乞依故事擇祖宗諸王之後各以年長者一人權奉祠事不行時行在南班宗室才十一人皆濮王與吳益王諸孫而祖宗諸王之有後者惟商恭靖王周恭肅王二人而已甲寅夜地震九月按是月丁巳朔戊午左奉議郎前通判静江府朱良弼言廣西自嘉祐間憲臣李師中帥臣余靖奏團結訓練土丁以備邉其後熈寧紹聖大觀以來修為成法每嵗農隙分之州縣更畨教閲一月而罷百餘年間壓盗鎮蠻既免戍役之勞又少供饋之費庶㡬三代寓兵於農之意比年州縣視為虛文祖宗良法幾廢望飭攸司約束州縣恪意奉行上謂宰執曰良弼善論事可與廣中合入差遣庶使士民知勸王綸曰如此雖陞等亦何害上曰然延福宫徳慶軍承宣使入内内侍省副都知衛茂實専切提舉皇城所延福宫使安徳軍承宣使張去為充入内内侍省押班辛酉太學博士唐堯封罷先是國學私試第七人詩賦失韻諸生以為言侍御史葉義問奏其事乃罷堯封甲子國子正馮方改差主管户部架閣文字仍下詔誨諭諸生砥節厲行其有不率者長貳具名以聞尚書右僕射監修國史湯思退言故追復顯謨閣學士汪藻嘗纂元符以來詔㫖比修實録所取十盖七八深有力於斯文詔贈藻端明殿學士諸子與堂除熊克小厯於此叚書未㡬徽宗實録成思退上之按實録已於八月戊戌進呈在此前二十六日克盖差誤重修朝射垂拱三殿成乙丑直敷文閣知臨安府張偁特遷一官詔右宣教郎趙慶孫與改正過名慶孫少孤自西京将母南渡秦檜當國言者以慶孫嘗為趙鼎所薦奏慶孫不能事毋停官至是自訴於朝刑部符慶孫母姪浙東安撫司参議官黄子游問状子游言慶孫孝養周至嘗為近臣列薦于朝故有是命丁邜右奉議郎幹辦行在諸軍審計司朱商卿右朝奉郎提轄行在文思院吕靖並兼提領鑄錢所措置官商卿贛州靖饒州措置商卿勝非子靖恵卿曽孫也己巳資政殿學士知宣州魏良臣移知潭州初右奉議郎環周以大理寺丞面對論太湖地低杭秀蘓湖四州民田多為水浸請復導諸浦分注諸江詔兩浙漕臣按視至是轉運副使趙子潚敷文閣待制知平江府蒋璨等言太湖者數州之巨浸而獨泄以松江之一川冝其勢有所不逮是以昔人於常熟之北開二十四浦疏而導之楊子江又於崑山之東開一十二浦分而納之海三十六浦後為潮汐沙積而開江之卒亦廢於是民田有淹沒之憂天聖間漕臣張綸嘗於常熟崑山各開衆浦景祐間郡守范仲淹亦親至海浦浚開五河政和間提舉官趙霖又開三十餘浦此見於已行者也今諸浦湮塞又非前比總計用工三百三十餘萬錢三十三萬餘貫米十萬餘石縁平江積水已兩月未退望速行之乃詔監察御史任古本路提㸃刑獄公事徐康覆視既而古至平江又言常熟五浦通江委是快便若依子潚所請以五千人為率來嵗正月入役月餘可畢又言平江四縣舊有開江兵二千人今乞止於常熟崑山兩縣各招填百人從之既遂出御前激賞庫錢平江府上供米如其數用正月庚申興工環周建請在紹興二十四年九月乙丑詔責授建武軍節度副使南安軍安置鄭徳年奪所賜田二十頃以右正言朱倬論其嘗事偽庭獻其謀議也庚午寧江軍承宣使提舉台州崇道觀潘長卿卒辛未户部奏銅錢出界罪賞諸以銅錢與蕃商博易者徒二年千里編管二貫流二千里二十貫配廣南出中國界者遞加一等三十貫配逺惡州許人捕凡經由透漏廵捕州縣知通縣令丞鎮寨官市舶司官吏帥臣監司之在置司州者並减犯人一等故縱者與同罪不以去官赦降原减命官獲三十緡者進秩一等餘人賞錢五百緡其他以是為差左正言何溥言直祕閣利州路提㸃刑獄公事許大英起自法家深文刺骨乆任理卿専以大臣指意為獄擠陷無辜不可勝數奉使一道専務營私詔大英主管台州崇道觀右朝請大夫新知道州汪若海直祕閣知江州初若海自圍城中首至帥府後坐累沉廢累年至是入對以靖康末所與曹輔書獻于朝詔若海係元帥府補官特有是命甲戍給事中楊椿等言在法公使器用陳設有闕以不係省頭子錢修置係謂監司郡守比來州縣官屬例皆置造從物供帳所費不貲乞行禁止詔監司守臣不得華侈餘妄費官錢及科率吏民者坐贓論令監司覺察初吏部續降書成事祖見十年十二月乙未行之既久至是權尚書賀允中復言於成憲不無沿革吏得以舞文望以舊制及續降㕘訂異同立為定制庶免用例破條從之後二年乃成三十年八月丙辰進呈乙亥直祕閣提舉江南西路常平茶鹽公事范如圭提㸃利州路刑獄公事如圭辭改主管台州崇道觀十二月壬辰改命右朝請郎知蘄州宋曉言在法按吏郡守不得而専乞自今所部官吏有實犯牒通判同銜具奏如所見不同或守臣增加罪状及於法親嫌應避限二日具事因回報仍先申尚書省庶姦贓之吏有所畏憚給事中楊椿等以為可行乞令有司立法從之丁丑御史臺主簿沈樞為監察御史賜直祕閣知盱眙軍楊抗三品服戊寅領殿前都指揮使職事楊存中言本司見造戰船乞置虎翼水軍一千人駕放從之熊克小厯在壬午右廸功郎李耆言自經界之後税重田輕終嵗所入且不足以供兩税今又配州縣買銅民力愈困矣况江西州縣多用私錢舊錢百重十一兩新錢百重五兩有竒若毁舊錢千以鉛錫雜之則可鑄二千五百是以贛吉等州比屋私鑄一路且以萬户言之户日銷千錢是日毁萬緡也民既銷錢而盗鑄官又抑民毁錢而更鑄得不償失徒弊百姓費邦財願詔諸監錢姑仍舊嵗計坑冶所入銅錫興鑄諸路委提刑兼主其事户部嵗終課其殿最則事省而民安矣自户部提領鑄錢而分州縣科買銅錫民多毁錢為銅以應命故耆言如此書奏詔提領鑄錢司措置約束耆袁州人也左朝散大夫劉岑復祕閣修撰提舉台州崇道觀左通直郎主管户部架閣文字馮方為御史臺主簿葉義問薦之也左朝請郎孫仲鼇卒己邜封宫正張真奴為永嘉郡夫人户部奏言者論監司守令害民事件乞監司知州月給例罷非舊例冊所有而輙受者以贓論諸縣宴集責辦吏人者以受所監臨財物論邑官借貸於民者以非法擅賦歛論從之然終不能革也直龍圖閣知撫州錢端禮乞奉祠詔端禮主管台州崇道觀庚辰中書舎人兼史館修撰王剛中充龍圖閣待制四川安撫制置使兼知成都府先是權禮部侍郎孫道夫言中外籍籍皆謂金人有窺江淮意不知達聖聴否上曰朕待之甚厚彼以何名為兵端道夫曰興兵豈問有名願陛下預為之圖又言成都帥陛下不可不擇宜求才可以制置四川者二三人常置之聖度上云當儲人以待緩急之用剛中亦言禦敵最今日先務之急盍先自擇将帥蒐士卒實邉儲備軍械加我數年國勢富強彼請盟則為漢文帝犯邉則為唐太宗上壮其言㑹西蜀謀帥宰執謂宜得文武威風識大體者上曰無逾王剛中矣遂有是命又令道夫以蜀中利害語之仍詔都大主管茶馬公事許尹兼權制置司公事竢剛中至日罷時太常博士杜莘老因轉對亦論金将敗盟宜飭邉備且曰勿恃其不来恃吾有以待之上稱善再三又諭曰卿意親朕知卿忠赤辛巳皇叔建州觀察使知濮安懿王園令士輵為昭化軍節度使嗣濮王士輵士俴弟起居舎人張孝祥兼權中書舎人權刑部侍郎兼詳定一司𠡠令楊撰言被㫖修吏部條例本所取㑹到續降指揮計五千件而刪定官止五員恐難辦集望於大理寺權暫差官五員不妨本職同共刪修從之癸未三省言平江紹興府湖秀州被水欲除下戸積欠恐侵嵗計乞令戸部開具上曰止令具數使於内庫撥還朕平時無妄費内庫所積正欲備水旱耳本是民間錢却為民間用復何所惜耶甲申起居郎洪遵言臣幸得以記注陪侍經幄每先朝書歴經筵官講讀畢許留身奏事而修注官未嘗有奏事者皆云近例如此且聮名一歴不應别為二體許依講讀官奏事遵又言自紹興九年至今起居注未修者殆十五年乞令兩省除見修按月進入外餘未畢者每月帶修兩月皆從之右文林郎鄧昂上書論關外營田利害大略謂營田創始之初十分收五嵗約十八萬石有竒所餘五分今當盡取其寛鄉之田宜更添人力又漢中多濕田不宜禾麥因其卑濕修為稻田則所收無虛嵗又諸荘牛少凡遇疫損卒難補填宜益牝牛以資蕃庶詔王剛中李澗措置然關外營田多為諸大将所擅後不果行慶元六年十月王寧措置可參考乙酉權戸部侍郎趙令詪言州縣義倉米積乆陳腐欲出糶及水旱災傷檢放不及七分去處亦許賑濟左僕射沈該等言義倉米在法不應出糶糶之恐失預備上曰義倉嵗以三之一出陳易新何至侵損上田自有髙下必俟通及七分則當賑濟處絶少矣飢民何由得食卿等可別行措置武翼大夫趙廓幹辦皇城司廓宻子已見冬十月丁亥朔祕書少監沈介為賀大金正旦使閤門祇候宋直温副之國子司業黄中為賀生辰使閤門祗候辦御前忠佐軍頭引見司李景夏副之名新南門曰嘉㑹戊子左承議郎虞允文為祕書丞允文知渠州地磽民貧而常賦之外又行加歛流江一邑尤甚允文奏罷之凡六萬五千餘緡此㨿楊萬里所撰允文墓碑増入按日歴所載渠州科敷事乃今年五月五日潼川提刑王之望申明得㫖下制置司措置此月庚子再下王剛中相度與碑所云不同或者允文既聞于朝而又申提刑司也且附此更須詳考沈該薦其才召對允文獻言謂君道有三曰畏天曰安民曰法祖宗時論韙之又論州縣科需尋詔監司約束監司約束科需事以是月乙夘行下今併書之允文仁夀人已見紹興二十六年三月左朝散郎提舉江州太平興國宫周葵直龍圖閣知太平州右朝請大夫向子忞知道州初上作損齋舁去玩好置經史古書其中以為燕坐之所且為之記權吏部尚書賀允中請以賜羣臣庚寅上謂宰執曰允中嘗於經筵問朕好道之意朕謂之曰朕之所好非世俗之所謂道也若果能飛昇則秦皇漢武當得之若果能長生則二君至今不死朕惟治道貴清淨故恬淡寡慾清心省事所謂為道日損期與一世之民同躋仁夀如斯而已當降出碑本以賜卿等朕又惟比年侈靡成風如婚祭之類至有用金玉器者此亦不可不戒於是降詔諭中外如上㫖宋史全文史臣曰在易之損六五君位也其辭曰或益之十朋之龜弗克違元吉履尊以損則益之者衆所以元吉也然則自損之道祗其所以為益歟辛夘左朝散大夫傅雱卒壬辰户部言諸路出賣沒官田乞以價錢七分上供三分充常平司糴本先是兩浙轉運副使湯沂乞令諸路常平司乗時糴米至原闕糶賣左正言何溥言諸郡常平侵耗無㡬請鬻官田以充本錢故户部有請焉明年六月壬寅所書可參考大理正章岵言荆湖大稔米升不過六七錢望遣使就糴戸部請出見錢關子乳香套共二十萬緡付轉運司收糴應副鄂州戍軍嵗用其鄂州嵗計米於建康府椿管從之起復右武大夫忠州團練使殿前司摧鋒軍統制兼知循州張寧為廣南東路兵馬鈐轄右武大夫閤門宣贊舎人殿前司左翼軍統制陳敏為福建路兵馬鈐轄他職皆如故以在戍所日乆故優之也初永州土豪張巨泗者多聚溪峒人及亡命椎埋為姦交結監司郡縣吏人相為表裏敷文閣待制樞宻都承旨陳正同之守邵州也有告巨泗遣其徒掠人於境上正同窮治之巨泗亡去正同言於朝詔憲帥兩司根捕至是數嵗獄乃成大理言當以赦免刑部以情重裁奏朝議特旨編配正同奏祖宗著令持杖強盗及資給亡命者皆不以赦原請論如律詔可始正同怒巨泗誣以殺人衡州軍事判官李椿奉檄鞫其獄有告巨泗行盗者未嘗與告者辯對未嘗逮同徒亟追證則告者無其人同徒者旋斃于路矣細閲其牘竄易殆盡偶得一證所誣以為同徒者是夕在他州有佐驗竟直之椿永州人也此以椿行状附見但不知是何年月事更當詳考之乙未權尚書吏部侍郎張綱兼史館修撰丁酉詔右奉議郎髙百之已降與在外宫觀指揮更不施行百之既奪職去位其母楚國太夫人周氏以舊恩訴于朝上許之奉祠給事中楊椿封還錄黄言陛下緫攬權綱前日權臣子孫自知不容屏息跧伏乃今取秦塤婦翁而授以差遣恐除目一傳中外解體上為寢其命戊戌樞宻副都承㫖廖虞弼入見詔虞弼不安分守僥求無厭可提舉台州崇道觀日下出門己亥權尚書禮部侍郎曽幾充集英殿修撰提舉洪州玉隆觀近嵗權侍郎補外例得待制侍御史葉義問言侍從補外所除職名之大小皆因敭歴之乆近比年遷擢不常浸乖履歴非遴選之意望明詔大臣參酌舊典此月丁未降出㑹㡬以老乞奉祠乃除修撰自是以為例初烏江縣尉王公衮之母𦵏山隂其冢為盗嵇泗徳所發在法發冢開棺者死而紹興府法官當泗徳按問欲舉减等又以其妄引平人加役流公衮手殺盗事聞其兄吏部員外郎佐請納官以贖公衮之罪事下給舎至是給事中楊椿等言公衮殺掘冢法應死之人為無罪納官贖弟佐之請當不許故縱失刑有司之罪宜如律制曰給舎議是於是公衮降一資佐仍舊職紹興府官吏皆坐失出之罪既而守臣顯謨閣直學士王師心上䟽待罪詔釋之尚書省檢㑹莭次行下四川制置等司措置條具减鹽酒課息錢前制置蕭振等陳乞二十八年五月十六日行下渠州科敷潼川提刑王之望申今年五月初五日下復西川錢監前劔東莭推麴靖成都運判許尹十二日去年四月月九日下酒官酬賞八月八日下取㑹四川宣司便宜及緫所措畫指揮三月二十七日下關外營田鄧昂上書已見九月二十七日蠲减四川正稅役外科歛䕫路提刑楊朴奏二十七年二月二十四日下乞令錢引務差官賫新引就䕫州與本路民戸兊界知遂寧府程敦臨奏二十七年三月十八日下捐蜀中鹽井虛額去年四月十七日下已見拘四川銅器七月二十八日下令四川諸州人户買隔槽及清酒務麴分認官錢承莭郎程世威奏十月四日下論錢引兊界收貫頭錢數多及西川布估錢太重左宣教郎王國光奏十月十三日下皆未報凡十四事詔王剛中與諸司公共相度以聞務令軍民兼濟庚子四川安撫制置使王剛中辭行辛丑詔監司帥守以下私役軍匠者坐贓論以右朝奉大夫晏崇古論其擾民費財也癸夘左朝奉大夫兩浙西路提㸃刑獄公事徐康右朝奉郎提舉兩浙西路常平茶鹽公事謝伋右太中大夫敷文閣待制知平江府蒋璨並特降一官時徳清令范直大長洲令張靖皆有贓為侍御史葉義問所按詔詰監司守臣之失察者康伋璨皆繆為按牘以聞由是貶秩既而兩浙轉運副使趙子潚湯沂敷文閣待制知湖州李琳皆上章引罪上特命釋之義問又奏康等三人罪大罰輕不足以戒欺罔詔璨提舉洪州玊隆觀康伋並罷直大等行遣以庚寅餘人放罪以乙巳三人罷以戊申今併書之庶首尾易見初有旨盡鬻諸司官田而議者以為恐見佃人失業未賣者失租至是侍御史葉義問力言今盡鬻其田而立為正稅田既歸民稅又歸官不獨絶欺隠之弊又可均吏役之法一舉而四得之矣時浙東提㸃刑獄公事邵大受亦申明三事乞承買官産者免物力一年至三年已給賣後不許執鄰取贖舊六十日輸錢不足者錢没官别召人投買今倍其日皆從之甲辰詔川峡四路轉運司毎季差使臣一員持定差文字赴吏部限十日給降付身有不當者申尚書省即非理沮難者當抵罪漕吏及使臣輙歛定差人糜費者以贓論先是毎路皆以候卒持闕状入都自軍監已下俱有定直小官有費錢數百千者工部侍郎兼權吏部侍郎劉章言如此何以責其㢘莭上以為然故有是旨後不果行皇姪利州觀察使居閎降授郢州防禦使時修太廟殿室告遷祖宗神主而居閎不赴故有是命丁未詔監司郡守補發舉官状者不得過前執政官一年合舉官之數以司勲員外郎任文薦言補發重疊也舊兩浙漕司嵗舉京官四十員至是亦减十員戊申顯謨閣直學士知紹興府王師心言本府崇奉昭慈永祐兩攅宫嵗用錢萬三千餘緡係省之入不足以給詔於上供經總制錢内支癸丑故進士楊居中執中並特贈右承事郎二人存中弟也建寧之陷死焉至是存中乞以大禮所得親屬門客二官為䘏典上特命錄之十有一月丁巳朔出内庫錢三萬九千餘緡付户部代平江府常湖州水災下戸積欠租稅戊午直敷文閣知臨安府張偁陞直顯謨閣都官員外郎楊倓進秩一等皆以修外城畢工故也召御前中軍統制知成州吴拱赴行在左正言何溥言比嵗奉使所辟官屬多募人代行市井狡獪之徒冒法私販有傷事體望重立賞告從之自来年始辛酉詔大禮金銀錢帛並减半供進翌日沈該等言近蒙聖恩捐内庫錢代三郡積欠以寛民力今所進又减半深恐錫賚之際或不足用上曰大禮支費朕半年前預立定格無分毫濫比之前郊才及十之五該曰陛下恭儉出於天性豈前代帝王所可跂及壬戌左正言何溥言臣恭聞祖宗朝每遇大赦則置㸔詳編置罪人一司命官典領以重其事盖置司㸔詳則責任専推類施行則事體一日者用事之臣輙以私意禁錮士類屢經恩宥而不敢檢舉天下扼腕陛下躬攬之初痛革其弊盪瑕滌穢與之更新其表表在人耳目者固已生復故官而死加榮號矣臣尚慮有身落幽逺而弗克上通家坐窮空而無以自列抱寃沉滯籲天莫聞願舉故事選清切公明臣僚二人取索諸色官員士人罪犯案巻置司㸔詳其應該赦移放者一面施行内有可疑申三省取旨仍責限了絶詔俟赦降取旨左朝奉大夫成都府路提㸃刑獄公事錢堪知江州右中散大夫成都府路轉運判官王弗提㸃本路刑獄公事右朝散大夫知蜀州路允修為成都府路轉運判官允修嘗漕東蜀以贓汙為李迨所按一斥㡬二十年及守蜀州無善状堪弗皆其姻家置不問又交薦之乃有是命癸酉定江軍承宣使同知大宗正事士籛請宗室京官如選人例免銓試武臣見監當者並釐務吏部請補官三年年及二十五者免試注官從之己夘冬日至合祀天地于南郊赦天下故事每遇大禮則命近臣㸔詳編置罪人所犯或放或徒秦檜用事士大夫貶責者雖屢赦不移至是用何溥言壬午命權吏部尚書賀允中刑部侍郎楊揆檢舉自是遂為永制既而侍御史葉義問言頃嵗傅㑹及告訐之人嵗月未深理情難恕不應一例移放從之義問所奏在十二月庚寅今併附此權禮部侍郎孫道夫因入對面奏今合祭天地奉祀宗廟悉復承平舊典加以闢道山求遺書修太學育人材文治既舉自此願訓𠡠将相増修武備以為不虞之戒又奏仁宗景祐初采古兵法及舊史成敗為神武祕略以賜邉臣訓廸有方故一時爪牙有古良将風願下文館重加讎正徧賜将帥以繼仁祖故事豈無曹瑋王徳用狄青之徒為時出乎時金人叛盟有端而中外疑信未决道夫獨憂之故因議論之際數以武事為言焉十有二月丁亥朔名江州太平興國宫新建本命殿曰申福敷文閣待制樞宻都承㫖陳正同知平江府起居郎兼權中書舍人洪遵兼權樞宻都承㫖初命諸路招三衙闕額軍兵而左中大夫敷文閣待制知福州沈調所招額溢樞宻院擬轉左太中大夫該辭上不許給事中兼權直學士院楊椿當草答詔奏曰招軍之勞薄上宰之兄有嫌此賞一行當有强刺良民以希進者上以先降推賞指揮不聼該再辭許之熊克小厯載此事於今年正月盖誤己丑權尚書刑部侍郎楊揆充敷文閣待制知鎮江府仍詔以鎮江重地選用從官故特除待制庚寅尚書兵部侍郎同修國史兼直學士院周麟之試給事中右司郎中黄祖舜權刑部侍郎尋命祖舜代楊揆看詳移放罪案十二月乙未武徳大夫吉州刺史内侍省押班李存約與宫觀差遣從所請也慶逺軍承宣使提舉江州太平興國宫安定郡王令衿薨贈開府儀同三司壬辰右廸功郎劉芮守大理司直芮摯孫初見紹興六年五月芮以近臣薦對乃有是命左從事郎查籥主管户部架閣文字籥江陵人也甲午祕閣修撰劉堯仁試軍器少監延福宫使慶逺軍承宣使入内内侍省押班李珂提舉萬夀觀免奉朝請宣正大夫安慶軍承宣使陳琠卒特贈建寧軍節度使乙未詔閤門宣贊舎人特差兩浙西路兵馬鈐轄御前祗應劉炎令再任炎筦禁中市易因通北賈大為姦利焉己亥恭謝太一宫時敷文閣待制陳正同楊揆補郡未辭特命隨班對御茶酒辛丑上謂大臣曰近州縣官吏曽經臣僚論列而監司郡守失於按發雖已行遣一二其餘待罪者皆放恐公然容庇姦贓之吏無所忌憚壬寅詔自今量其輕重必行責罰不許待罪詔出御前錢修葺睦親宅及重建宫學殿宇凡一百七十一區延福宫使崇慶軍承宣使内侍省押班王晉錫為入内内侍省押班丁未太學録劉甄夫武學諭葉懐忠等以皇太后新年八十率兩學生上表稱賀詔才人劉氏進封婉儀責授寧逺軍節度副使栁州安置李光復左朝奉大夫任便居住以赦叙也祕閣修撰知綿州吳援陞右文殿修撰充四川安撫制置使司㕘議官戊申前國學生台州編管人黄作池州編管人詹淵許自便以賀允中等看詳取㫖也庚戍左宣教郎鄭丙行太學録丙長樂人也辛亥詔大金使副依宰相上下馬及於麗正門外西廊北從第一至第三間為待漏幕次左武大夫昭慶軍承宣使帶御器械董仲永武功大夫吉州刺史帶御器械吳亢並為内侍省押班初盡括公私銅器而端明殿學士知建康府張燾請聴民凡以錢三斤易磬一斤至是權户部侍郎兼提領鑄錢司趙令詪請以為鑄錢本許之壬子金國賀正旦使正奉大夫工部尚書蘓保衡副使定逺大將軍太子左衛率府率阿克展等入見保衡雲中人也此據范成大攬轡録癸丑右承事郎守軍器監丞吳撝特遷右承議郎仍賜三品服撝拱弟已見甲寅左奉議郎張堅乞以大禮所得妻封號囬授所生母李氏故事羣臣父在者不得以恩封妾母上特許之堅綱子已見是嵗宗室訓名二十有一人刑部斷大辟四十七人賜道人黄元道號逹真先生元道成都民家子生得中風疾遇異人而愈自是言人休咎或中能啖生肉上召見御製贊賜之此㩀洪邁夷堅丙志御前諸軍都統制兼知興元府姚仲言興元府洋州諸縣各有以前保丁内選到人材少壮堪出戰入差充義士臣已於數内摘揀到三千人團結隊伍教習武藝及欲於附近大安軍巴蓬州差撥保丁以備般運軍糧從之自朝廷與金約和罷兵議者乃奏罷利路諸州義士至是仲聞金有意敗盟欲為戰守備乃奏復之議者亦謂興洋舊有義士萬餘皆驍勇可用祗是免身丁差役之類初不費有司錢糧望下本路帥司檢照舊來簿籍條例依舊収充以時教閲無令州縣别致騷擾以備緩急使喚此正古人寓兵於農之意奏可始王庶立法義士每丁蠲家業錢二百千部轄使臣蠲六分科歛及是諸縣民間所餘家業不多科買軍糧草料苦於偏重仲乃命視舊法止蠲其半部轄使臣三分之二衣甲兠鍪神臂弓箭官給其它應軍中所用皆自為之軍行日支糧二升有半每六十五人為隊管隊二人押擁隊二人旗首三人縣立三部都副部轄管轄各一人於是合五郡所籍為二萬一千七百餘人惟興洋大安至今不廢已上並㨿閭蒼舒興元記修入未得其月日故且附年末但記并取張浚為江淮宣撫使時奏乞募義士槍弩手劄子聨書之則誤也罷義士奏請在紹興二十二年五月辛亥初皇太后苦目疾國醫不能療詔募草澤療治臨安守臣張偁以蜀人皇甫坦名聞坦夾江人善風鑒上召對問何以治身坦曰心無為則身安人主無為則天下治上引至慈寧殿用其術后疾良已上大喜厚賜一無所受因俾持香禱于青城山既還復召見問以長生乆視之術坦曰先清諸欲莫令放逸丹經萬巻不如守一上歎曰真人也為書清虛二字以名其菴舍繪其象於禁中焉此據嘉定甲乙志修入建炎以來繫年要録巻一百八十建炎以來繫年要録巻一百八十金人地名考證阿克展原書作阿典誤今改正
