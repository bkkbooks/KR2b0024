body:
  text: 建炎以來繫年要録卷一百四十三宋李心傳撰紹興十有一年十有二月乙丑朔上謂秦檜曰和議已成軍備尤不可弛宜於沿江築堡駐兵令軍中自為營田則斂不及民而軍食常足可以久也仍修建康為定都之計先宗廟次大學而後宮室丙寅上謂大臣曰三代之世士大夫盡心禮法鮮有異端之惑自漢明帝金人之夢佛法流入中國士大夫靡然從之其上者惑於清靜之説而下者惑於禍福之報殊不知六經廣大靡不周盡如易無思無為寂然不動感而遂通天下之故與禮正心誠意者佛氏清靜之説果有以勝之乎至若積善之家必有餘慶積不善之家必有餘殃與夫作善降之百祥作不善降之百殃者即佛氏禍福之報也士大夫不師六經而盡心佛説殊為可笑丁卯徽猷閣待制提舉江州太平觀劉洪道責授濠州團練副使柳州安置御史丞万俟卨論洪道汙穢貪墨嶽飛初為制置使洪道足恭以媚之飛罷宣撫使命下之日洪道聞之失色頓足抵掌淚閣眼眶倡為浮言簧鼓將士幾至變生故有是命於是洪道得罪而終身不復庚午右承奉郎直祕閣主管台州崇道觀賜緋魚袋韓産直特遷右奉議郎直敷文閣以世忠罷政推恩也右奉議郎鄧名世特勒停坐擅寫日厯故也久之卒於家壬申上謂宰執曰晉平吳之後天下混一武帝又勤於政事宜若可見太平而旋致禍亂天地分裂何也秦檜等方思所以對上曰禮可以立國君臣上下如天地定位不可少亂武帝字呼羣臣又以珊瑚株助臣下以侈靡相勝廢禮如此其能國乎癸酉秦檜言考之經傳人君莫難於聽納上曰朕觀自古人君不肯聽納者皆因有心或好大喜功或窮奢極欲一實其衷則凡拂心之言皆不能入矣若清心寡欲豈有不聽納乎朕於宮中觀書寫字之外並無嗜好凡事無心故羣臣之言是則從非則否未嘗惑也試尚書工部侍郎莫將權本部尚書往唐鄧州分畫地界先是詔刑部侍郎周聿充京西路分畫地界官應千指置委案此下當有脫文樞密都承旨鄭剛中充陜西路分畫地界官應千指置委川陜宣撫司照南北誓書文字子細分畫不得差錯主事此指揮據蜀口用兵録修入日厯無之至是又遣將焉甲戌川陜宣撫副使胡世將言竊聞朝廷見與金國議和邊事漸向寧息所有元降便宜黜陟指揮伏望收還從之乙亥簽書樞密院事充大金報謝使何鑄等至軍前金國都元帥宗弼遣鑄往會寧且以書來索北人之在南者因趣割陜西餘地紹興講和録金帥上第四書冬深想惟動止萬福今月十一日使來伏承手削且聞事大之勤良可嘉尚所進誓表即時津發赴闕今兹大事已定然而其間有一二未究者須至塵浼表云北人見行發遣北來三十五人止是近日因渡淮樵牧偶被掠者殊非昔年逃亡及兵火隔絶之人恐是有司姑徇人情尚為濡滯也審議使副蕭毅等在江南時已蒙定論據諸路所有北人各於逐處沿邊州城就近交割望早為依應所論盡數敦遣過界唐鄧二州想已差官趁此月下旬到彼以備交此外據陜西地界其間或有犬牙相攙處亦請依元約於明年正月下旬差官於本朝合干人員至鳯翔府會合以憑同去行踏至日别有計議自今日以往既盟之後固當使民各安其業已遣濠州招信盱眙等縣新附口數千連其家資並復本土外有未曾發遣人數今已盡分付去人應江南商賈隔在淮以北者已指揮所屬刷會候供到人數亦便發歸所有海州泗州并漣水軍今威流移在南百姓比及新正切望發過淮北庶不廢一年耕作之計惟裁之所有淮上大軍使之自諸道班還昨以吳璘竊窺關陜以此有副元帥提兵鎮撫亦專人使之斂退恐欲聞知時寒切冀慎重專此布聞不宣是日朝廷亦遣莫將周聿往割唐鄧又命鄭剛中分劃陜西以劉豫吳玠元管地界為準紹興講和録皇朝答書季冬極寒伏惟釣候起居萬福整軍安民悉賴全德特承悉書佩荷記存垂諭大事已定若國公以生靈為念他人豈能辨天下幸甚北人敢不如命今就先次津發耶律溫等餘當節次發遣唐鄧二州已遣尚書莫將侍郎周聿於前月十一日星夜前去交割陜西地界亦已差樞密都承旨鄭剛中同宣撫司官前去趁明年正月下旬計議海州泗州漣水軍在南百姓見今根刷發過淮北先蒙遣還濠州楚川招信盱眙等縣户口又許根刷應江南商賈隔在淮北者亦便發歸卑情豈勝感激恐遣人在路遲滯今專發書計會泗州差走馬人傳到府下伏冀照察向春候漸和切望倍保鈞重不宣己卯上謂大臣曰有帝王之學有士大夫之學朕在宮中無一日廢學然但究前古治道有宜於今者要施行耳不必指摘章句以為文也士大夫之學則異於此須用論辨古今以為文最不可志於利學而志於利則上下交征未有不危國者詔監當資序人勿除郡守其已除未上者令吏部具名罷即嘗任監察御史以上者聽時祕閣修撰劉阜民新知委州吏部言阜民故從官許之任戊子直祕閣新知溫州秦梓試祕書少監兼崇政殿説書梓檜皆引嫌辭上不許右承務郎韓彥質彥朴並直祕閣二人皆世忠子也癸巳嶽飛賜死於大理寺飛既屬吏何鑄以中執法與大理卿周三畏同鞫之飛久不伏因不食求死命其子閣門祇候雷視之至是万俟卨入臺月餘獄遂上及聚斷大理寺丞李若朴何彥猷言飛不應死衆不從於是飛以衆證坐嘗自言已與太祖俱以三十嵗除節度使為指斥乘輿情理切害及敵犯淮西前後親受札十三次不即策應為擁兵逗遛當斬閬州觀察使御前前軍統制權副都統張憲坐收飛雲書謀以襄陽叛當絞飛長子左武大夫忠州防禦使提舉醴泉觀雲坐與憲書稱可與得心腹兵官商議為傳報朝廷機密事當追一官罰金詔飛賜死命領殿前都指揮使職事揚沂中蒞其刑誅憲雲於都市參議官直祕閣于鵬除名送萬安軍右朝散郎孫革送尋州並編管仍藉其資流家屬於嶺南天下寃之飛死年二十九初獄之成也太傳醴泉觀使韓世忠不能平以問秦檜檜曰飛子雲與張憲書雖不明其事體莫須有世忠怫然曰相公莫須有三字何以報天下乎飛知書善待士且濟人之貧用兵秋毫無犯民皆安堵不知有軍至今號為賢將何鑄紹興十二年八月丙寅周三畏三十年三月庚子李若朴何彥猷十二年正月戊申皆得罪飛二十二年十月戊申追復元官諡忠愍又改武穆嘉泰四年五月癸未追封鄂王並各見本年月王俊首狀大理寺案欵今具載之左武大夫果州防禦使差充京東東路兵馬鈐轄御前前軍副統制王俊有俊於八月二十二日夜二更以來張太尉使奴厮兒慶童來請俊去説話俊到張太尉䘖令虞候報覆請俊入宅在蓮花池東面一亭子上張大尉先與一和尚澤一點著燭對面坐地説話俊到時澤一更不與俊相揖便起向燈影黑處潛去俊於張太尉面前唱喏坐間張太尉不作聲良久問道你早睡也那你睡得著俊道太尉有甚事睡不著張太尉道你不知自家相公得出也俊道相公得出那裏去張太尉道得衢婺州俊道既得衢州則無事也有甚煩惱張太尉道恐有後命俊道有後命如何張太尉道你理會不得我與相公從微相隨朝廷必疑我也朝廷交更番朝見我去則必不來也俊道向日范將軍被朝廷賜死俊與范將軍從微相隨俊元是雄威副都頭轉至正使皆是范將軍兼係右軍統制同提舉一行事務心懷忠義到今朝廷何曽賜罪太尉不須别生疑慮張太尉道更説與你我相公處有人來交我救他俊道如何救他張太尉道我這人馬動則便是救他也俊道動後甚意思張太尉道這裏將人馬老小盡底移去襄陽府不動只在那駐劄朝廷知必使我相公來彈壓撫諭俊道太尉不可動人馬若太尉動人馬朝廷必疑嶽相公越被罪也張太尉道你理會不得若朝廷使嶽相公來時便是我救他也若朝廷不肯交相公來時我將人馬分布自據襄陽府俊道諸軍人馬如何起發得張太尉道我劫掠舟船盡裝載步人老小令馬軍便陸路前付俊道且看國家患難之際且更消停張太尉道我待做你安排著待我交你下手做時你便聽我言語俊道恐軍不伏者多張太尉道誰敢不伏傳選道我不後俊道傳統制慷慨之人大夫剛氣必有肯伏張太尉道有不伏者剿殺俊道這軍馬做甚名日起發張太尉道你問得我是假做一件朝廷文字起發我須交人不疑俊道太尉去襄陽府後面張相公遣人馬來追襲如何張太尉道必不敢來趕我設他人馬來到這裏時我已到襄陽了也俊道且如致襄陽府張相公必不肯休繼續前來收捕如何張太尉道我有何懼俊道若蕃人探得知必來夾攻太尉南面有張相公人馬北面有蕃人太尉如何處置張太尉冷笑我則有道理待我這裏兵才動先使人將文字去與蕃人萬一枝梧不前交蕃人發人馬助我俊道諸軍人馬老小數十萬襄陽糧少如何張太尉道這裏糧盡數著船裝載前去鄂州也有糧襄陽也有糧可喫得一年俊道如何這裏數路應副錢糧尚有不前那裏此少糧一年以後無糧如何張太尉道我那裏一年已外不别做轉動我那裏不一年交蕃人必退我遲則遲動疾則疾動你安排著張太尉又道我如今動後背嵬逰奕伏我不伏俊道不伏底多又道遊奕姚觀察背嵬王剛張應李璋伏不伏俊道不知如何張太尉道明日聚廳時你請姚觀察王剛張應李璋去你衙裏喫飯説與我這言語説道張太尉一夜不曾得睡知得相公得出恐有後命今自家悶都出嶽相公門下若諸軍人馬有語言交我怎生制御我東西隨人我又不是都統制朝廷又不曾有文字交我管他們有事都不能管得知三更後俊歸來本家次日天曉二十三日早衆統制官至張太尉衙前張太尉未坐衙俊呌起姚觀察於教場亭子西邊坐地姚觀察道有甚事大哥俊道張太尉一夜不睡知得相公得出太尉煩惱道破言語交俊來問觀察如何姚觀察道既相公不來時張太尉管軍事節都在張太尉也俊問觀察道將來諸軍亂後如何姚觀察道與他彈壓不可交亂恐壞了這軍人馬你做我覆知太尉緩緩地且看國家患難面道罷各散去更不曽説張太尉所言事節俊去見張太尉唱喏張太尉道夜來所言事如何俊道不曽去請王剛等只與姚觀察説話交來覆太尉道恐兵亂後不可不彈壓我逰奕一軍鈐束得整齊必不致得生事張太尉道既姚觀察賣弄道他人馬整齊我做得尤穩也你安排著俊便唱喏出來自後不曽説話九月初一日張太尉起發赴樞密行府俊去辭張太尉道王統制你後面麁重物事轉换了著我去後將來必共將這悶一處你收拾等我呌你重念俊元係東平府雄威第八長行日本府闕糧諸營軍兵呼千等結連俊欲劫東平府作過當時俊食祿本營不敢負於國家又不忍棄老母遂經安撫司告首奉聖旨補本營副都頭後來即遇金人侵犯中原俊自靖康元年首從軍旅於京城下與金人相敵斬首及俊口內中箭射落二齒奉聖旨特換成忠郎後來並係立戰功轉今來官資俊盡節仰報朝廷今來張太尉結連俊别起事俊不敢負於國家欲伺候將來赴樞密行府日面詣張相公前背告又恐都統王太尉别有出入張太尉後面别起事叛臨時力所不及使俊陷於不義俊已於初七日面覆都統王太尉訖今月初八日納狀告首如有一事一件分毫不實乞依軍法施行兼俊自出官以來立戰功轉至今來官資即不曽有分毫過犯所有俊應干告敕宣劄在家收存外有告首呼千等補副都宣繳申外庶俊忠義不曽作過不敢負於國家謹具狀披告伏候指揮刑部大理寺狀準尚書省劄子張俊奏張憲供通為收兵飛處文字後謀反行府已有供到文狀奉聖旨就大理寺置司根勘聞奏今勘到龍神衛四廂都指揮使閬州觀察使髙陽關路馬步軍副都總管御前前軍統制權副都統節制鄂州軍馬張憲僧澤一右朝議大夫直祕閣添差廣南東路安撫司參議官于鵬右朝散郎添差通判興化軍孫革左武大夫忠州防禦使提舉醴泉觀嶽雲有蔭人智浹承節郎進奏官王處仁從議郎授福州専管巡捉私鹽蔣世雄及勘證得前少保為武勝定國軍節度使充萬夀觀使嶽飛所犯內嶽飛因探報得金人侵擾淮南前後一十五次受親札指揮令策應指置坐觀勝負逗遛不進及因董先張憲問張俊軍馬怎生地言道都敗了回去便指斥乘輿及向張憲董先道張家韓家人馬你將一萬人蹉踏了及因罷兵權後今孫革寫書與張憲令措置别作擘畫令看訖焚之及令張憲虛中探得四太子大兵前來侵犯上流自後張憲啇議待反背據守襄陽及把截江兩頭盡劫官私舟船又纍次令孫革奏報不實及制勘虛妄等罪除罪輕外法寺稱律臨軍征討稽期三日斬及指斥乘輿情理切害者斬係罪重其兵飛坐擁重兵私罪上定斷合決重杖處死看詳嶽飛坐擁重兵於兩軍未解之間十五次被受御筆並遣中使督兵逗遛不進及於此時輒對張憲董先指斥乘輿情理切害又説與張憲董先要蹉踏張俊韓世忠人馬及移書張憲令指置别作擘畫致張憲意待謀反據守襄陽等處作過委是情理深重敕罪人情重法輕奏裁張憲為收嶽雲書令憲别作擘畫因此張憲謀反要提兵僭據襄陽投拜金人因王俊不允順方有無意作過言并知嶽飛指斥切害不敢陳首并依隨嶽飛虛申無糧進兵不得及依于鵬書申嶽飛之意令妄申探報不實及制勘虛妄除罪輕外法寺稱律謀叛絞其張憲合依絞刑私罪上定斷合決重杕處死仍合依例追毁出身以來告敕文字除名本人犯私罪絞舉官見行取會候到別具施行嶽雲為寫咨目與張憲稱可與得心腹兵官商議擘畫因此致張憲叛除罪輕及等外法寺稱敕傳報朝廷機密事流二千五百里配千里不以蔭論赦刺配比徒三年本罪徒以上通比滿六年比加役流律官五品犯流以下減一等其嶽雲合比加役流私罪斷官減外徒三年追一官罰銅二十斤入官勒停看詳嶽雲因父罷兵權輒敢交通主兵官張憲節次雇令得腹心兵官擘畫致張憲因此要提兵謀叛又傳報朝廷機密惑亂軍衆情重奏裁嶽雲犯私罪徒舉官見行會問候到别具施行于鵬為犯虛妄并依隨嶽飛寫咨目與張憲等妄説嶽飛出使事并令張憲妄供探報除罪輕外法寺稱敕為從配律五品犯流罪減一等其于鵬合徒三年私罪官減外徒二年半追一官罰銅十斤入官勒停情重奏裁于鵬犯私罪徒舉官見行取會候到别其施行孫革為依隨嶽飛寫咨目與張憲稱指置擘盡等語言并節次依隨嶽飛申奏朝廷不實除罪輕外法寺稱律奏事不實以違制論徒二年律供犯罪徒減一等其孫革合徒一年合追見任朝散郎一官官告文字當徒一年勒停情重奏裁孫革犯私罪徒舉官見行會問候到別具施行王處仁為知王貴申朝廷張憲背叛漏泄供中嶽飛并説與蔣世雄法寺稱敕傳報漏泄朝廷機密事流二千五百里配千里應比罪敕配比徒三年本罪徒以上通比滿六年比加役流官當準六年王處仁合於比加役流私罪上斷合追見任承節郎並厯任承信郎共兩官官告文字當徒二年據按别無官當更合罰銅八十斤入官勒停情重奏裁王處仁犯私罪流舉官見行會問候到別具施行蔣世雄為見王處仁説王貴申朝廷張憲背叛事於嶽飛處覆除罪輕外法寺稱傳報漏泄朝廷機密事流二千五百里從減一等其蔣世雄合徒三年私罪上斷官減外徒二年半合追從義郎秉義郎兩官官告文字當徒二年餘徒二年更罰銅十斤入官勒停情重奏裁蔣世雄犯私罪從舉官見行會問候到別具施行僧澤一為制勘虛妄并見張憲等待背叛向張憲言不如先差兩隊申軍防守總領軍使衙并欲為張憲詐作樞密院劄子發兵過江及要摹拓樞密奏印文除罪輕外法寺稱律謀叛者絞從減一等其僧澤一合流三千里私罪斷合決脊杖二十本處居作一年役滿日仍合下本處照僧人犯私罪流還俗條施行情重秦裁智浹為承嶽雲使令要將書與張憲等並受嶽雲金茶馬令智浹將書與張憲等共估錢三百二貫足除罪輕外法寺稱律坐贓致罪十匹加一等罪止徒三年為非監臨主司因事受財七品官子孫犯流罪以下聼贖其智浹合徒三年贓罪贖銅六十斤情重奏裁小貼子據貼黃稱契勘嶽飛次男嶽雷係同嶽飛一處送下今來照證得嶽雷别無干涉罪犯緣為嶽飛故節飲食成病合依條召家人入侍就令兵雷入侍看覷侯斷下案內人目所有嶽雷亦乞一就處分降下小貼子稱所有僧澤一合下本處依絛施行又小貼子稱契勘數內于鵬見行下湖北轉運司根究銀絹等四百萬合下所屬照會候根究見歸著日即乞依今來所斷指揮施行乂小貼子稱看計嶽飛張憲所犯情重逐人家業并家屬合取自朝廷指揮拘籍施行看詳嶽飛等所犯內嶽飛私罪斬張憲私罪絞並係情重王處仁私罪流嶽雲私罪徒並係情重蔣世雄孫革于鵬並私罪徒並係情理稍重無一般例兼奉聖旨根勘合取旨裁斷有旨嶽飛特賜死張憲嶽雲並依軍法施行令楊沂中監斬仍多差將兵防護餘並依斷于鵬孫革王處仁蔣世雄除名內于鵬孫革永不收敘于鵬送萬安軍孫革送潯州王處仁送達州蔣世雄送梧州並編管僧澤一決脊杖二十刺面配二千里外州軍牢城小心收管知浹決臀杖二十送二千里外州軍編管嶽飛張憲家屬分送廣南福建路州軍拘管月具存亡聞奏編配人并嶽飛家屬并令楊沂中俞俟其張憲家屬令王貴汪叔詹多差得力人兵防送前去不得一并上路嶽飛張憲家業籍沒入官委俞俟汪叔詹遲一抄劄具數申尚書省餘依大理寺所申並小貼子內事理施行出榜曉諭應緣上件公事干涉之人一切不問亦不許人陳告官司不得受理所王明清揮麈録餘話云明清壬子戚任寧國得王俊首嶽侯狀於其家次年明清入朝始得詔獄全案觀之嶽侯之坐死乃嘗以自言與太祖俱以三十嵗為節度使以為指斥乘輿情理切害及握兵之日受庚脾不即出師者凡十五次以為抗拒詔命初不究將在軍君命有所不受之義又云嶽飛與張憲書通謀為亂所供雖嘗移緘即不曾逹繼復焚之亦不知其詞云何且與原首狀子無干涉煆鍊雖極而不得實情的見誣罔孰所為據而遽皆處極典覽之拂膺倘非後來詔書湔洗追褒則沒地銜冤於無窮所可恨者使當時推鞫酷吏漏綱不正典刑耳王俊者初以小兵途中告反而轉資晚以禆將而妄訐主帥遂叨富貴驛卒疑奴一時傾險不足比數考其終始之間可謂怪矣首狀雖甚為鄙俚之言然不可更一字也趙甡之遺史云先是飛自襄城回軍也在一寺中與王貴張憲董先王俊夜坐移時不語忽作聲曰天下事竟如何衆皆不敢應憲徐言曰在相公處置耳既退俊握先及貴手曰太尉太尉適來聞相公之言及張太尉之對否先與貴曰然及俊告飛使子雲通軍事因言郾地路中之語追先赴行在時雲與憲已伏誅矣秦檜語先曰止有一句言語要爾為證了只今月使可出仍差大理官二人送先赴大理寺并命證畢就今日摘出繇是先下大理寺對吏即伏吏問飛飛猶不伏獄吏稍侵之飛戚動仰天者移時索筆著押癸巳飛死于獄中梟其首市人聞之悽愴有墮淚者初獄成丞李若朴何彥猷謂飛罪當徒二年白于卿周三畏三畏逐白于中丞万俟卨卨不應三畏曰當依法三畏豈惜大理卿耶冇王輔者投書于秦檜具言飛反狀已明檜以書付獄卨辛致飛于死既而卨彈若朴以其兄若虛昔為幕中參議故欲黨庇之耳彥猷傳會若朴由是二人皆罷此云郾城路中之語據俊元首狀乃無之不知何故又云雲憲已伏誅董先方下大理寺與飛對辨恐亦誤今併附此更須參考也何俌龜鑑飛起于效用平居憂國無所不為征討出師慷慨勇往隆冬按邊上有非我忠臣莫雪大恥之諭盛夏出師上有暑行勞動朕念之不安之語東下赴援而上有委身狗國竭節事君之歎力疾先馳而上有國爾忘身誰如卿者之褒帥襄陽而克復襄陽鎮湖北而坐制湖湘焚蔡州之積奪虢州之糧而又倡率三軍指示方略自李寶曹州之戰以至張憲臨潁之戰凡五十戰每戰必捷敵人相告謂撼嶽飛兵難吁當時有如飛者數十輩布置邊庭是直所謂萬里長城者而檜乃屏棄之曽不甚惜何耶綸昔趣覲彼之所以逗遛不進者蓋亦事機垂成為可惜也莫須有三字強以傳會欲加之罪其無辭乎千載而下每念嶽武穆之冤直欲籲天而無從也鷙鳥盡良弓藏狡兔死良狗烹此為不能保全功臣者説也況鷙鳥猶未盡而狡兔猶未死者哉呂中大事記飛之死尤不厭衆心飛忠孝出于天性自結髮從戎凡厯數百戰內平劇盜外抗強敵其用兵也尤善以寡勝衆其從杜充也以八百人破羣盜五十萬衆于南薰門外其破曹晟也以八千破其十萬衆于桂嶺其戰烏珠也于潁昌則以背嵬八百于朱仙鎮則以背嵬五百皆破其衆十餘萬敵人所畏服不敢以名稱至以父呼之自烏珠有必殺飛而後可和之言檜之心與敵合而張俊之心又與檜合媒孽橫生不置之死地不止万俟卨以願備煆鍊自諫議而得中丞王俊以希旨誣告自遙防而得廉車姚政龎榮傳選之徒亦以阿附並沐纍遷之故傳會其事無所不至而莫須有三字世忠終以為無以服天下飛死世忠罷中外大權盡歸于檜于是盡逐君子用小人矣是月給事中兼直學士院林待聘以母憂去位待聘去位後省題名在十二年十二月蓋誤直祕閣主管台州崇道觀呂抗卒初從事郎傳偉文從朱辨出使為金人所拘求應舉自免金人許之偉文屏居村落間授徒以自給至是卒偉文臨江人也徽猷閣待制洪皓在燕山是冬密奏敵已厭兵勢不能久異時以婦隨軍今不敢攜矣朝廷不知虛實卑詞厚幣未有成約不若乘勝進擊再造猶反掌耳所取投附人只欲守江南歸之可也獨不監侯景之禍乎欲復故強報世讎則不宜與胡銓封事此或有之彼知中國有人益生懼心張浚名動殊方可惜置之散地並問李網趙鼎安否左太中大夫提舉江州太平觀范沖卒于婺州是嵗始命川路上供羅復輸內藏庫其後綾紗絹悉如之廣西買馬嵗額一千五百匹至是徽猷閣待制胡舜陟為經略使買馬至二千四百匹金主亶改元皇統案蔣芾逸史云髙麗日厯壬戍年改皇統壬戌紹興十二年熊克中興小厯改皇統元年在十四年據紹興講和録蕭毅所持烏珠書已稱皇統元年又王大觀行程録稱皇統八年嵗次戊辰戊辰紹興十八年逆數之當以今年改元為正蔣熊皆誤建炎以來繫年要録卷一百四十三建炎以來繫年要録卷一百四十三金人地名考證烏珠原書作兀术誤改見卷一
