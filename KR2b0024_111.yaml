body:
  text: 建炎以来繋年要錄巻一百十一宋李心傳撰紹興七年五月按是月壬戌朔甲子直龍圖閣知建康府張澄言臨安建康均為駐蹕之地而財賦所入多寡殊絶本府所得僅支半年不惟軍儲窘乏兼慮闕於供億以速罪戾欲望許依駐蹕近例𠫭酌應副詔與權免分撥二年乙丑上與輔臣論淮西事因曰兵無不可用在主將得人耳趙奢用趙兵大破秦軍而趙括將之則大敗樂毅用燕兵破齊而騎刼代之則為田單所敗豈不在主將得人乎秦檜曰陛下論兵可謂得其要矣初劉光世之罷也以其兵𨽻都督府而檜與知樞宻院事沈與求意以握兵為督府之嫌乞置武帥䑓諫觀望繼亦有請乃以相州觀察使行營左䕶軍前軍統制王德為都統制德光世愛將故就用之王德為淮西大將日歴全不書據張浚行狀以為浚在廬州時秦檜等所除而日歴于此日載上論淮西事在主將得人則必是此日議差除然不見除目六月九日王德奏准樞密院劄子奉聖㫖除左䕶軍都統制乞追還成命不允六月九日己亥去此月乙丑凡二十五日徳此時在淮西不應被受如此之遲日歴五月二十三日甲申後殿進呈臣浚等奏事上方議諸軍置副二十八日己丑詔殿前司等並許差都副統制以前後指揮𠫭考之則徳除命必在乙丑已後癸未已前但未知的在何日耳今因上語附見當求他書繫其本日鄭克撰呂祉行狀乃稱七月除王德都統制益誤矣丙寅詔四川制置大使席益趣遣所募西兵初命益於團集人内選三路少壯人二千兼家赴行在專充扈衛益言已遣統押官顔漸部兵千一百人出峡故命趣之元降㫖揮未見日歴紹興五年十二月七日乙巳檢㑹今年十二月四日已降指揮顔漸下軍兵使臣民兵義兵効用等並撥𨽻步軍司顔漸差充湖南安撫司使喚此時席益方去湖南當是漸不之潭州而從益入蜀也此事已附其年十二月庚子丁夘詔江西制置大使李綱趣捕䖍吉諸盗時以山賊周十隆等未息命江西統制官李貴往討之左司諫陳公輔言䖍民素號凶惡方承平時亦自嵗往廣南刼取財物率以為常自國家多事乘此擾攘徒黨愈熾然此弊亦起於朝廷容忍太過凡有盗賊盡是招降所謂渠魁者例皆不誅且寵之以官此豈足以奪姦䧺之氣又况䖍賊實非他處之比若不痛加誅殺未必肯止但令向前破蕩早見撲㓕不可更議招降必謂弄兵潢池皆吾赤子不欲多殺亦當誅其首領而脅從者量與釋放庶使頑民知懼不敢復肆凶惡而盗賊可息故有是㫖戊辰金部員外郎宋棐請詔中外臣寮採訪勇力權畧之士不時薦舉以備采擇從之棐莆田人也兩浙轉運使向子諲奏修練湖初鎮江府呂城夹岡地勢髙乆不雨則運河涸而漕舟艱子諲命属官李澗考唐韋損劉晏故事建言置斗門二石䃮一以復舊跡度費萬緡今冬可畢從之澗江寧人也庚午侍御史周祕入對言臣聞兵法曰上下同欲者勝故自古用兵之勝者皆以其志同敗者皆以其意異唯將帥諧和士卒輯睦戰勝攻取無往而不利矣方今外侮未已僣叛未平朝廷必欲小戰以練師頻勝以積威則以輕兵出近地時有不得已者矣然上下之欲不可不同雖帷幄之中已有定謀而心膂之臣豈無所見茍其所見或有不同畏朝廷之威而言不敢盡有怯懦之嫌而事不敢辭口順心違但以疾故為遷延之計如此者雖强之使行必不能成功矣願陛下於命將之際先授以所任之事使自揣其可否或於廟謨有所未喻則姑與之往復問難俾其胷中曉然見勝於未戰之前然後遣之庶幾上下同欲不至於敗仰副陛下孜孜治兵之意壬申詔禮官條具舉行文宣武成王熒惑夀星岳瀆海鎮農蠶風雷雨師之祀用太常博士黄積厚請也文宣王以春秋二仲并從祀凡九十八武成王及從祀凡六十三皆用兩少牢熒惑以立夏其禮與文宣王皆如感生帝夀星用秋分岳瀆海鎮用四立日及夏季之土旺先農以孟春先蠶以季春之已日風師以立春後丑日雷師以立夏後申日自夀星以下皆用酒脯積厚又言太常定諡率以行狀銘誌為憑多不得實又僥倖寵靈之人類戒子孫毋請諡故惡諡不行望自今臣僚陳乞遺恩即命太常移史官采其始終定諡從之上以積厚論事可採遂以為尚書比部貟外郎積厚除比部在乙亥今併降㫖除郎之日直祕閣都督府書寫機宜文字計有功陞直徽猷閣提㸃潼川府路刑獄公事時張浚在廬州遣有功赴行在前二日引對有功嘗獻所著晉鍳上曰朕乙夜觀之且為艱難之戒又面問著春秋防㣲之㫖對曰婦笑於齊六卿分晋此書之所為作也上首肯之有功以母老求去乃有是命浚引親嫌力辭䟽累上詔仍舊職有功仍舊職在六月癸巳癸酉起居郎樓炤請命有司講究屯田鼓鑄市舶常平四事一曰募民以耕而兵無與焉是以墾闢未廣今縱未能使甲士從田於其中擇所謂不入隊者十取三四使之因田致糓以省大費何不可之有二曰鑄錢一司坐費糧食今銅料不繼鼔鑄日稀謂宜廢罷俟數年之後銅料稍多即令逐路運司措置鼓鑄似亦為便三曰蕃舶不至盖官吏侵漁之故宜擇心計之臣示逺人之信明賞以激勸立法以關防則所入必豐羡四曰常平之法豐則貴取饑則賤與今諸道間有豐凶之不齊宜擇人使之兼總數路以通其州縣豐凶盈虛而斡旋之庶有贏貲以給軍用詔户部侍郎梁汝嘉王俣條具約確利害申省後不果行甲戍徽猷閣待制提舉江州太平觀胡安國提舉萬夀觀兼侍讀疾速赴行在殿中侍御史石公揆奏今以詞賦經義取士而考校者患不能兼通陞黜安能得實今嵗科場望令諸路轉運司取詞賦經義兩等各差考官從之丁丑左朝請郎何鑄主管台州崇道觀鑄初以選為諸王宫教授需次兩省至是乞祠也戊寅賜川陕宣撫副使吳玠知興元府王俊知洋州楊從儀詔書奬諭以張浚言玠命俊等部兵修築梁洋廢堰就緒也上因謂秦檜等曰治天下湏恩威賞罰並行若有恩而無威有賞而無罰何以為治朕自即位以来未嘗以私怒降一人官所以言此者葢姑息之風不可長也楊沂中朕當日撫綏之過於子弟去年淮西有警朕親筆戒之若不便進當行軍法沂中震恐承命遂以成功檜曰陛下英武如此中興不難致矣既而給事中兼直學士院胡世將請因此風厲諸將帥各務究心水利措置營田仍命利路監司候成熟日具梁洋渠堰所溉頃畆所増租税覆實以聞將俊與從儀並加旌賞以為忠勞之勸從之世將所奏在是月甲申己夘廣西進出格馬上曰此幾似代北所生廣西亦有此馬則馬之良者不必西北可知上因論春秋列國不相通所用之馬皆取於國中而已申公巫臣使吳與其射御教吳乘車則是雖吳亦自有馬今必於産馬之地而求之則馬政不修故也詔禮部討論大火之祀先是行在多火災言者論國家實感炎德用宋建號康定間因古商邱作為壇兆以閼伯配大火之祭多事以来地陷賊境望詔有司即行在所每建辰戍出納之月設位望祭從之用酒脯六月壬辰討論奏上殿中侍御史石公揆論左朝散大夫新知廣德軍王擇仁左朝奉大夫新知永州熊彦詩右朝請大夫新知江州趙伯璆等八人皆罷公揆言擇仁頃在河東之幕欲奪官長之權自擁潰卒殘金破商刼盗居民無所不至彦詩乃王時雍愛壻今自京官二年而為正郎以至典司祠曺機宜都督府極其要選不知朝廷何以愛其材獨不念圍城之事乎伯璆素無才行昨奉苗劉薦為郎官衆所鄙棄故並罷存此以見王擇仁金商間事及伯璆明受除郎因依當各附本年削此叚壬午知舒州周方文遷一官再任以宰臣張浚言其治郡有方也時浚自淮西還行在留𠫭謀軍事兵部尚書呂祉居廬州以䕶諸將始浚往視師㕘知政事張守遺書戒以毋輕改軍政浚不從賜龍圖閣直學士四川都轉運使李迨詔書奨諭以其能裁抑冗濫以寛民力故也先是詔迨以每嵗收支之數具旁通驛奏去年八月丙午降㫖既而迨言本司案牘簿籍竝皆不全紹興四年所收錢物計三千三百四十二萬餘緡比所支計闕五十一萬餘緡五年收三千六十萬餘緡比所支計闕一千萬餘緡皆以宣撫司攅剩錢及次年所收登帶通那應副六年未見收數支計三千二百七十六萬餘緡今年所收計三千六百六十七萬餘緡比所支計闕一百六十一萬餘緡紹興五年鹽酒息錢最増然以支數増多終是應副不足是致六年大叚窘廹頓増起之數後来已難繼侵用過之數後来又難補逐月拖欠大軍折估及梓䕫路糴本水脚計司坐此取怒大將實非其罪也然今来七年帳内收數係是額管納收之數遞年有虧無増其支數係是按例實支之數遞年有添無减若将来取數稍虧支數稍添則不待来年便有闕少自来遇嵗計有闕即添支錢引補助支遣紹興四年添印五百七十六萬道五年添印二百萬道六年添印六百萬道成都運司及大使司各半見今泛料太多引價减落本司縁此不曽添印去秋畫㫖上供及該説不盡諸窠名錢竝許拘收通融應副除封樁禁軍闕額等錢五項折計錢引七十萬道已指數科撥外細數見去年九月庚辰見凖户部符催督總制司錢大使司拘收提刑司常平司錢物充稱提錢竝與本司通融取撥指揮相妨既不敢添印錢引又别無窠名錢物可以補足所闕錢計宣撫司但責應辦大使司乃責以蠲减勢相矛盾尤難措置即今嵗計見憂不足設若將来緩急調發嵗計之外别有支費委是無從辦集切慮必致誤事兼嵗收錢物因有上供進奉土貢三路綱坑冶課利等窠名錢物共計一千五百九十九萬係四川舊額所管嵗入之數其勸諭激賞増敷役錢助軍頭子錢免支移米脚錢秋税上出納地理脚錢鹽酒増息錢等課名錢物共計錢二千六十八萬係軍興後来所増嵗入之數今比舊額已増過倍取于民者可謂重矣若計司不卹更増賦斂民力困竭事有難測此亦朝廷所當深慮矣臣嘗竊讀劉晏傳見史臣稱晏理財謂亞管蕭是時天下嵗入緡錢千二百萬而筦𣙜居其半今四川區區一隅之地𣙜鹽𣙜酒嵗入一千九十一萬過於劉晏所𣙜之數多矣并諸窠名錢已三倍劉晏嵗入之數於大軍嵗計闕一百六十一萬彼以一千二百萬貫贍六師恢復中原而有餘今以三千六百萬貫贍一軍屯駐川陕而不足然則拖欠折估糴本水脚之類豈計司之罪乎議者皆謂軍中支費冗濫臣初亦疑之近因檢察乃得其實且如折估錢一項每年計錢引一千三百一十七萬以上件折估錢十貫折米一石為率約計米一百六十八萬見今每年應副正色米九十七萬七十九萬係水運八萬石係就納九萬九千石係就糴通估錢所折米共二百六十五萬本司不見得宣撫司即今官兵實數止有紹興六年朝廷遣使取㑹到諸頭項官兵共計六萬八千四百四十九人决無一年用二百六十五萬石米之理其折估錢不止是官兵坐倉折估灼然無疑據諸處糧審院供到折估錢名色除官兵各有身分料錢已係隨折估錢過勘外官員有驛料折估錢厨料祿粟米贍家錢供給錢月犒錢旬設錢支糧錢添支絹錢軍兵有坐倉折估錢攛槍又貼射錢添支食錢鹽米紙筆錢草估錢共十二項但縁官員有驛料折估軍兵有坐倉折估故特以折估錢總之又有諸帥諸將公使錢人吏作匠請給錢竝係於按月折估錢内應副是致此一項已用劉晏嵗入之數應副不足此議者所以謂其支費泛濫也又諸頭項官兵數内官員一萬七千七員軍兵五萬七百四十九人宣撫司上項官員數内有入隊有不入隊兩等近據閬州本司簽㕔具到閬州屯駐官兵一萬七千九百三十一人其官員内有不入隊使臣三百三十人軍兵内有不入隊敢勇効用義兵弓箭手共五千八百七十八人訪聞不入隊人數除輜重火頭合破數目不多外餘盡是繫名冗占之人所有諸州屯駐官兵去處本司近備坐攅具旁通朝廷累行㑹問竝不報應未見的確不入隊人數官員之數比軍兵之數約計六分之一軍兵請給錢比官員請給不及十分之一即是冗濫在官員不在軍兵去年宣撫司屢以拖欠軍兵折估錢聞之朝廷趙開亦縁此而罷然臣契勘本司去年應副折估錢逐月差官剗刷但縁萬數浩瀚不能如期起發了足若宣撫司將撥到錢先支軍兵次支使臣後支將官雖有拖欠必不闕事葢自將官以上每月請俸大叚優厚故也然欲脅持計司則湏以拖欠軍兵坐倉折估為辭此乃宣撫司屬官為主將所畫之䇿朝廷不可不知也臣近到軍前經由綿劍利州大安軍興州皆属屯駐軍馬去處間有軍兵陳訴拖欠折估錢至於衣賜則所在皆有支散不盡數目糧食亦有探支過一兩月或一兩旬者足見軍前衣糧寛剩也然計司雖知冗濫力不能裁節雖知寛剩亦未敢除减但日夕憂懼嵗計不足此朝廷不可不知也蜀人所苦於折估錢猶未為甚其所甚者糴買般運也盖縁糴買不科敷則不能集事茍科敷則不能無擾般運事稍緩則般户獨受其弊或稍急則稅户皆被其害紹興四年六年兩次支移陸運至軍前死損人夫甚多勞費猶不足道也欲省漕運莫如屯田近因興元府洋州守臣脩築堤堰特降奬諭蜀人皆知德意在此然臣會問屯田等事皆不報止有紹興六年朝廷遣使取會到陕西路屯田頃畆共六十莊計田八百五十四頃七十九畆當時已種七分以上今年耕種既遍又有増墾頃畆不少漢中之地自古沃野訪聞屯田盡係膏腴且據前項頃畆㑹計每畆除出種糧止以三石為率約收二十五萬餘石若將一半樁充自来不係水運應副去處嵗計米一半對减川路糴買般發嵗計米亦可少寛民力兼臣近體問得利路興元府洋州陕西路岷州夏麥大熟皆可就糴除興元府洋州已委利路轉運副使勾光祖措置就糴五十萬石外岷州縁宣撫司属官異議措置未得若屬官肯於岷州就糴二十萬石兼用營田所收一半之數十二萬石三項共計五十七萬石每年水運應副閬利州以東嵗計米五十八萬石願得此三項嵗計足矣可以盡數蠲免川路糴買般運此乃恤民之寔惠守邊之良䇿朝廷所當留意者也不知務此但責應辦今之所入三倍劉晏而猶不足雖晏復生亦不能辦况如臣者豈敢望晏之萬一能保其不敗事誅責計臣雖不足道然四州生靈休戚所繫朝廷所宜動念也裁節冗濫措置糴買臣累有奏陳未凖回降指揮今輒復陳本末是皆臣之職事也不敢隱黙茍避譴訶伏望聖慈特賜睿察迨此䟽關全蜀大計故止削去錢物畸零數目外並全載之不得其本月日且因奨諭詔書附見奏中言累凖朝㫖不許添印泛料又言近因梁洋守臣修築堤堰特降奨諭又言裁節冗濫累有奏陳未凖回降梁洋奨諭事已見此月十七日戊寅不許添印汎料指揮在此月二十八日己丑以事考之迨此奏必在今年六月以後未被受今此奨諭詔書之前當求他書考其本日癸未左武大夫宣州觀察使王公亮知閤門事甲申張浚奏江東宣撫使張俊遣㕘議官史愿来議修城事上曰昨内殿引愿入對問軍中教閱曲折因使告俊每隊五十當増旗頭一人常巻之以待用每遇出戰旗以簸揚而壊洎收軍而退或無以寓三軍之目於是植所増之旗則衆無惑矣時上方議諸軍置副浚奏曰此亦旗頭之副上以為然先是浚自淮西歸以除王德為不便奏論之左䕶一軍皆故羣盗驕悍自恣而統制官中侍大夫武泰軍承宣使酈瓊素與德不叶光世以瓊屢立竒功待之與德等瓊聞德為帥不自安乃以瓊為副都統制瓊除左護軍副都統不見本日張浚行狀云秦檜等奏以王徳為都統制即軍中取酈瓊副之公俱以為不然奏論之按日歴所書議諸軍置副在浚還朝之後則二人非並除也殿前司等處置副統制指揮在後五日己丑或可移附彼日詔以時暑命行在所及行宫御史各一員慮諸獄囚諸路州軍令監司分詣右朝散大夫呂錫山依舊知果州錫山大忠子也大忠大防兄紹聖寳文閣直學士寓居於蜀上召之錫山辭不至集英殿修撰知衢州董弅提舉江州太平觀從所請也初命學士院䇿試行在所及行宫樞宻院都統府効士五十三人得陳夀昌等十人合格詔優等授官平等免文觧一次餘皆賜帛罷之武功大夫貴州刺史提舉江州太平觀鄭諶卒乙酉手詔自今内外臣寮薦士或不如所舉及罪當并案者必罰毋赦上以薦舉法壊甚者以子弟姻戚互相薦論至犯吏議則僥倖首免故條約焉尚書省言自来立法太重不能必行乃詔自今犯贓私罪者舉主逓降二等其以子弟親戚互薦者令䑓臣察之監察御史趙渙乞令侍從至職事官不限資序各舉才堪大縣者一人俟三二年之間按其治狀同其賞罰詔行在所侍從官限一月通舉二十人丙戌右宣教郎知劔州梓潼縣侯臨令再任以士民舉其政績也丁亥中書言諸路監司除授依祖宗法即不避本貫詔如故事仍止避置司州戊子詔皇太后三代特封贈一次姪誠忠郎謙訊各進七官為閤門宣賛舍人以后初正尊號故也左從政郎荆湖南路提㸃刑獄司檢法官王湛特改合入官以薦對也湛已見去年十月辛酉己丑張浚奏論史事因言紹聖以舊史不公故再修而蔡卞不公又甚每持一已褒貶之語以騁其愛憎今若不極天下之公則後人將又不信上曰謂之實錄但當錄其實而褒貶自見若附以愛憎之語豈謂之實錄上又曰今日重修兩朝大典不可不慎浚曰敢不恭承聖訓自趙鼎去位有言神宗實錄改舊史非是者故浚奏及之日歴己丑後殿進呈臣浚奏史館事云云其上又必湏别有言語餘見六月末并注名徽宗皇帝神御殿曰承元時未有殿而禮官言明堂前一日太廟朝饗當用原廟殿名為樂曲之名乃命學士院撰定焉此乃黄積厚為博士時所請詔殿前司行營右護軍後䕶軍竝許置都副統制日歴不載中前二軍當考中書言四川錢引近来印數多慮害成法詔禁止令制置大使司覺察如違重寘典憲四川錢引舊書放兩界為二百五十一萬餘緡至是通行三界為三千七百八十餘萬緡故條約焉庚寅尚書右僕射張浚言臣先備員川陕宣撫處置使切見和静處士尹焞縁叛臣劉豫父子廹以偽命焞經渉大河投身山谷自長安徒歩趨蜀﨑嶇千餘里乞食問路僅獲生全臣嘗延請至司與之晉接觀其所學所養誠有大過人者紹興甲寅春被命還朝盖嘗以焞姓名逹之天聼今陛下博採羣議召寘經筵而焞辭免新命未聞就道伏望聖慈特降睿㫖令江州守臣疾速津遣初焞行至九江㑹諌官陳公輔請禁伊川學焞復辭曰學程氏者焞也浚乃顯言其學行請趣召之焞猶不至熊克小歴畧載此事於今年正月末又云浚顯言其拒偽之節焞乃就職益誤矣江州去建康不逺而焞以九月上旬方及國門至此已百餘日况其間一再辭新命至閏月上旬方趣令供職是時浚得罪已乆非因此奏而遂就職也今不取是月汴京無雲而雷有龍起撼宣德門㓕宣德二字偽齊陷隨州劉豫以進士張浃為偽皇子府凖備差使浃景州人初見建炎四年春末六月辛夘朔改諡惠恭皇后曰顯恭壬辰右承議郎新知楚州韓元傑罷坐前守濠州日其兄元英私往宿州而不以聞也時元英已奔劉豫豫用為户部貟外郎癸巳祕書少監蘇符言史館見重修哲宗皇帝實錄元祐政事屢致分更尤當盡付天下公論非符所宜𠫭預望改除一閑慢差遣三省勘㑹元豐紹聖指揮係令祕書省長貳通修日歴詔劄與符照㑹左司監陳公輔入對面奏興復之䇿因言衆論謂南兵不可用上慨然曰赤壁之役曹操敗於周瑜淝水之戰苻堅敗於謝元北人豈常勝哉越王勾踐卒敗吳王兵强諸國亦豈北方士馬邪日歴六月己酉後殿進呈陳公輔劄子比縁奏對興復之䇿云云按公輔此月戊申進對劄子即其日所上則得上語乃癸巳面對之日也故附於此詔建康府守臣遇有奏禀事許非時上殿直祕閣京東淮東宣撫處置使司𠫭謀官王㬇罷以樞宻使秦檜引親嫌有請也龍神衛四廂都指揮使平海軍承宣使權主管行宫馬軍司公事蘭整罷軍職提舉台州崇道觀以墜馬有傷故也命主管歩軍司公事邊順兼權甲午四川制置大使席益遣左朝奉郎本司主管機冝文字趙子琇奉表起居因統所選衛兵赴行在上引對及還賜益詔書奨諭又賚以銀合茶藥毬文帶象簡子琇燕懿王後東平侯令鏗子也賜益詔書等以是月戊申降㫖乙未罷江淮營田司以直徽猷閣淮東轉運判官蒋璨直祕閣淮西轉運判官韓璡直祕閣江東轉運副使俞俟直顯謨閣兩浙轉運副使汪思温竝兼提領本路營田仍督責州縣當職官接續措置提領官樊賔王弗俟結局還行在先是議者數陳營田之害上命樞宻院計議官李宷按視頗如議者所云中書乃言自置營田司數年已有成效但路分闊逺難以周遍若不專委帥漕就近措置深慮卒無增廣郤致廢弛成法故有是㫖三省又言恐州縣觀望乞命帥漕察其稽違與增廣者而賞罰之從之後㫖在是月壬寅丙申御筆史館重修神宗皇帝實錄尚有詳畧失中去取未當恐不可垂信傳後宜令本館更加研考逐項貼説進入以竢親覽先是祕書著作郎何掄面對乞刋正新錄訛謬前三日命掄兼史館校勘是月癸巳至是批出掄所言張浚意也輔臣進呈上曰史官公心去取方可以垂信萬世知樞宻院事沈與求曰神宗一朝史至今紛紛未定此蓋史官各以私意去取指為報復之資故乆而未就但能公心實錄庶可傳信趙鼎行實云初因臣僚上言裕泰二史是非失實始命官重修鼎去國之後有言其非者乃降御筆改修又鼎事實稱御筆乃宰相擬定見今年七月戊寅并注戊戌權主管侍衛馬軍司公事劉錡兼都督府諮議軍事錡時以所部戍廬州故也詔四川制置大使司津遣隱士張大檝赴行在大檝龍水人隱居翠㣲巖知天象嘗倣唐制為盖天圖謂可置之几案及備軍幙中候騐因為木式以獻席益為上之乃詔大檝併賫所藏天文祕書赴行在己亥德慶軍節度使充萬夀觀使韋淵為昭慶軍節度使開府儀同三司壬寅詔徽猷閣待制新除提舉萬夀觀兼侍讀胡安國累上章引疾可與便郡以右司諫陳公輔等有言也乃以安國知永州倉部郎中兼權大理少卿薛仁輔言比年以来法官寖闕斷刑官十四員而應格者無三數人試刑法官恩例增重而每年中選者無一二人加以數嵗恐遂曠官望詔有司討論祖宗設法科之制於京西荆湖淮南江西每路量立明法科觧額以收遺才詔刑部條具申省甲辰武功大夫鳳州團練使殿前司選鋒軍統領吉俊降二官俊所部修武郎于輔私役軍士俊杖之死主帥楊沂中劾于朝故有是命乙巳知樞宻院事沈與求薨于位特輟視朝二日贈七官為左銀青光祿大夫即湖州賜田十頃上将臨奠之其家辭而止與求再執政僅數月未及有所建明後諡忠敏詔宣撫司屬官自今毋得選羌人丙午攝太尉張浚率羣臣為大行太上皇帝請諡於南郊先是江端友為禮官建議攝太尉名實不正乞改用三公奉冊至是浚復攝是官失之也既而浚亦以為疑乃命禮官討論其事後遂改為攝太傅七月壬戌降㫖戊申兵部尚書兼都督府㕘謀軍事吕祉往淮西撫諭諸軍祉初在建康每有平戎之志張浚大喜之浚以劉光世持不戰之論欲罷之𠫭知政事張守以為不可浚不從守曰必欲改圖湏得有紀律聞望素髙能服諸兵官之心者一人乃可浚曰正為有其人故欲易之也時祉亦自謂若專總一軍當生擒劉豫父子然後盡復故疆及光世罷乃命祉先往淮西直祕閣詹至聞之遺浚書曰吕尚書之賢固一時選然如此軍恩威曲折卵翼成就恐不得比前人兼此軍今已付王德德雖有功而與酈瓊輩故等夷恐其下有不能平者願更擇偏禆素為軍中所親附者使為德副以通下情會祉還朝而瓊與其下八人列狀訟德于都督府且乞囘避都督府謂德為直寢不行瓊等又訟于御史䑓德亦言瓊之過乃召徳還建康以所部一軍𨽻都督府復命祉往廬州節制之祉將行賜以鞍馬犀帶象笏撫諭甚寵皆非從官故事中書舍人張燾見浚言祉書生不更軍旅何得輕付浚不從祉又辟都督府凖備差遣陳克自隨資政殿學士葉夢得與克厚謂之曰吕安老非馭將之才子髙詩人非國士也淮西諸軍方互有紛紛之論是行也危矣哉亦弗聽祉克皆留其家以單騎從軍右司諫王縉請於都督府属官中選知兵者助祉謀議且留軍中撫循訓練以通將士之情不報此以趙甡之遺史熊克小歴詹至王縉墓誌張燾行述㕘修小歴稱瓊等列狀都督府以訟王徳之過而張浚行狀稱訴于御史䑓今從之徐夢莘北盟㑹編云酈瓊狀王徳之罪于朝徳宻知之遂赴行在上問之徳具言諸將驕暴恐别生患上愕然遂命德以本軍入衛熊克小歴云德亦訟瓊等之過乃召德以本軍還為都督府都統制按今年九月二十四日德申薛死事狀猶繋左䕶軍都統制銜與克所云不同今且云𨽻都督府庶不差互詔以欽廉邕州去嵗大水米踊貴令本路常平官蠲賦稅賑飢乏其公私欠負皆停之右承議郎直祕閣新提舉荆湖兩路常平茶鹽公事張叔獻貶秩一等坐前為江西提刑不覈實殘破州郡逃亡人户蠲减上供錢雖該恩免特責也此未知與五年三月丁丑叔獻申江州隠匿上供事有無相關更竢考詳己酉皇叔檢校少師光山軍節度使同知大宗正事士㒟開府儀同三司士㒟嘗因對勸上留意䘏民上曰朕以兵戈未息不免時取於民如月樁之類欲罷未可一旦得遂休兵凡取於民者當悉除之時建康有積欠左藏庫錢帛乞免輸上曰建康兵火後遺民無幾朕何忍更取積逋耶可竝除之因謂輔臣曰朕嘗諭趙鼎宣和以前宰輔非其人費用無節誅求無藝四海之民困於科斂不得安業朕嗣位以来思與之休息又以邊事未靖軍費之資取辦於諸路者尚多斯民之災如此儻他日兵寢朕當一切蠲罷雖租賦之常亦除一二年朕之此心天地鬼神實照臨之張浚等曰陛下聖志如此天必助順民之休息固有期矣他日更在陛下選用大臣推行德意上曰然事亦在朕秦檜曰陛下聖志既定人誰敢違因論及唐太宗不能去封德彛上曰唐太宗用封德彛宇文士及朕常以為恨既知其奸佞猶信之不疑陳與義曰古人謂去佞如㧞山浚曰太宗所謂惡惡而不能去也命𠫭知政事陳與義撰顯恭皇后諡册文吏部尚書孫近兵部尚書吕祉篆三諡寳詔顯肅皇后外家有服親各遷官有差左宣教郎田如鼇主管亳州眀道宮理作自陳如鼇為御史坐上䟽詆張絢等斥去及是復之辛亥祕書省校書郎兼史館校勘張嵲守著作郎左朝奉郎李良臣為校書郎良臣已見紹興三年六月良臣自蜀召歸上召見而有是命賜龍圖閣直學士汪藻銀合茶藥以其纂緝詔㫖之勞也壬子左通直郎林安宅主管西外敦宗院安宅舊為宣諭官朱異所薦至是始命之安宅初見三年七月甲寅左朝奉郎四川制置大使司主管機宜文字趙子琇再入對言四川財賦自茶鹽𣙜酤與夫常賦之外可以供公上之求者經度措置固已曲盡在今無復理財之術但有惜財之術爾望明詔主兵者念民力之已殫應泛濫不急之費當自有以蠲减典計者知戍兵之乆勞凡大軍經費之湏務求所以贍給如此則兩司相通皆能贍軍䘏民同濟國事詔川陕宣撫副使吳玠都轉運使李迨措置後五日擢子琇提舉荆湖北路常平茶鹽公事時川陕贍軍錢闕迨遣官屬分行三路召三等井户量增貼納錢上等每百斤增千錢中等七百錢下等三百錢自是為例而子琇未知也子琇奏下在是月丙辰除命在丁巳今因引對遂書之李迨增貼納錢在此月而不得其日今附子琇奏䟽之後熊克小歴云上殿官趙子琇頗知蜀中事云云葢不詳其本末也丙辰尚書省請申命舉人程文許通用古今諸儒之説及自出己意但文理優長即為合格從之乙夘執政進呈左朝奉大夫蒲贄乞駐蹕江陵上曰荆南形勝自古吳蜀必争之地冝諭王庶益濬治城塹招徕流移練兵積粟為悠乆之計張浚曰庶在荆南頗有治行元係雜學士猶未復舊職上曰可還舊職使悉心府事上又曰蜀中多士幾與三吳不殊近日上殿如李良臣蒲贄極不易得因論士人各隨所習如蜀中之士多學蘓軾父子江西之士多學黄庭堅浚等曰大抵耳目所接師友淵源必有所自贄閬中人浚在閬州引為宣撫處置司主管機宜文字至是自知彭州召入後六日遂以贄行尚書兵部員外郎左司諫陳公輔權尚書禮部侍郎降授左朝散郎致仕王次翁令再任秦檜之再召也道由婺州時次翁居于婺與檜遇至是起居郎樓炤為檜言次翁甚貧兵部尚書呂祉等奏次翁天資孝友履行清修年未六十浩然求退召寘朝列必有可觀故有是命次翁去年四月方除湖南大制司𠫭議官不知何時致仕熊克小歴云樓炤為秦檜言吕頥浩次翁郡人也頥浩再相而次翁困一至此檜笑曰非其類也遂落致仕以兵部郎官召之按紹興三年秋頥浩在相位次翁自廣西漕召還㑹頥浩免相次翁亦乞祠而去比頥浩再起又以上幙辟之與克所云全不同當考又次翁此時雖落致仕旋又得祠明年三月方除兵部郎官克不詳考耳丁巳吏部尚書兼侍讀兼史館修撰孫近引疾乞奉祠張浚等皆言近之賢宜留朝廷張守曰聞近信命甚篤以為自此當有災故亟求去位上曰此安足深信隂陽技術惟卜筮最為近古古人精于術數故無毫髪差今人能如是乎君相造命固不當言命况近時日者尤不足信朕未嘗問也己未給事中兼直學士院胡世將權尚書禮部侍郎吳表臣竝兼侍講詔囘易庫撥𨽻都督府權户部侍郎王俣仍舊總領其事務苛細者皆除之是夏金左副元帥魯國王昌等以内起大獄各不之草地避暑太師領三省事晋國王宗維乞免官為庶人以贖尚書左丞髙慶裔之罪金主亶不從斬慶裔于會寧市慶裔臨刑宗維與之哭别慶裔曰公早聽我言今日豈至此葢慶裔嘗教宗維反也山西路轉運使劉思河東北路轉運使趙温訊坐累當誅東京留守宗隽與温訊善匿其斷命以俟赦乃得免其餘連坐甚衆皆宗維之黨金中雜書云烏竒邁即位十年儲位久虚尼瑪哈利于㓜主易制隂謀立阿固逹之孫而慮烏竒邁將以子為嗣乃創建三省首除烏竒邁之子為尚書令阿固逹次子固倫貝勒録尚書事尼瑪哈陽尊二人而處身於下左揆立二太子之子為皇太子丙辰年烏竒邁死皇太子即位尼瑪哈隂謀既成後以烏竒邁之子尚書令者封宋王阿固逹次子録尚書事者封秦王置兩人于閑散尼瑪哈遷太傅領三省事拜都元帥内外之政皆出于己金主十二年少守虛位而已秦宋二王方悟尼瑪哈之術丁巳春因群聚㑹所謂宋王者以所受封王之命擲于尼瑪哈前歴吐胷中積憤尼瑪哈深被沮毁包羞忍辱亟歸私第感疾不起是年十月二十一日死國政復歸秦宋二王遂去尼瑪哈腹心之人殺左轄髙慶裔山西漕使劉思黜與左揆烏舍右轄蕭慶為庶人尼瑪哈用事日凡所施設俱廢罷宗隽太祖旻第六子富勒呼也宗隽所居官必復租稅甚得蕃漢間心然時有酒過及除東京留守金主亶𠡠令止飲道有渤海僧以杯酒獻者即命敲殺之建炎以來繫年要録巻一百十一建炎以來繫年要録巻一百十一金人地名考證烏竒邁原書作吳乞買誤改見巻一尼瑪哈原書作粘罕誤改見巻一阿固逹原書作阿骨怛誤改見巻一固倫貝勒原書作骨盧勃極烈誤今改正烏舍原書作兀室誤改見巻一富勒呼原書作蒲路虎誤改見巻九
