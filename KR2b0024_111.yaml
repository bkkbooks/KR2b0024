body:
  text: 建炎以來繫年要録卷一百十一宋李心傳撰紹興七年五月按是月壬戌朔甲子直龍圖閣知建康府張澄言臨安建康均為駐蹕之地而財賦所入多寡殊絶本府所得僅支半年不惟軍儲窘乏兼慮闕於供億以速罪戾欲望許依駐蹕近例𠫭酌應副詔與權免分撥二年乙丑上與輔臣論淮西事因曰兵無不可用在主將得人耳趙奢用趙兵大破秦軍而趙括將之則大敗樂毅用燕兵破齊而騎劫代之則為田單所敗豈不在主將得人乎秦檜曰陛下論兵可謂得其要矣初劉光世之罷也以其兵𨽻都督府而檜與知樞密院事沈與求意以握兵為督府之嫌乞置武帥臺諫觀望繼亦有請乃以相州觀察使行營左護軍前軍統制王德為都統制德光世愛將故就用之王德為淮西大將日歷全不書據張浚行狀以為浚在廬州時秦檜等所除而日歷于此日載上論淮西事在主將得人則必是此日議差除然不見除目六月九日王德奏准樞密院劄子奉聖㫖除左護軍都統制乞追還成命不允六月九日己亥去此月乙丑凡二十五日德此時在淮西不應被受如此之遲日歷五月二十三日甲申後殿進呈臣浚等奏事上方議諸軍置副二十八日己丑詔殿前司等並許差都副統制以前後指揮𠫭考之則德除命必在乙丑已後癸未已前但未知的在何日耳今因上語附見當求他書繫其本日鄭克撰呂祉行狀乃稱七月除王德都統制益誤矣丙寅詔四川制置大使席益趣遣所募西兵初命益於團集人內選三路少壯人二千兼家赴行在專充扈衛益言已遣統押官顔漸部兵千一百人出峽故命趣之元降㫖揮未見日歷紹興五年十二月七日乙巳檢㑹今年十二月四日已降指揮顔漸下軍兵使臣民兵義兵效用等並撥𨽻步軍司顔漸差充湖南安撫司使喚此時席益方去湖南當是漸不之潭州而從益入蜀也此事已附其年十二月庚子丁卯詔江西制置大使李綱趣捕䖍吉諸盜時以山賊周十隆等未息命江西統制官李貴往討之左司諫陳公輔言䖍民素號凶惡方承平時亦自嵗往廣南劫取財物率以為常自國家多事乘此擾攘徒黨愈熾然此弊亦起於朝廷容忍太過凡有盜賊盡是招降所謂渠魁者例皆不誅且寵之以官此豈足以奪姦雄之氣又况䖍賊實非他處之比若不痛加誅殺未必肯止但令向前破蕩早見撲滅不可更議招降必謂弄兵潢池皆吾赤子不欲多殺亦當誅其首領而脅從者量與釋放庶使頑民知懼不敢復肆凶惡而盜賊可息故有是㫖戊辰金部員外郎宋棐請詔中外臣寮採訪勇力權略之士不時薦舉以備采擇從之棐莆田人也兩浙轉運使向子諲奏修練湖初鎮江府呂城夾岡地勢髙久不雨則運河涸而漕舟艱子諲命屬官李澗考唐韋損劉晏故事建言置斗門二石䃮一以復舊跡度費萬緡今冬可畢從之澗江寧人也庚午侍御史周祕入對言臣聞兵法曰上下同欲者勝故自古用兵之勝者皆以其志同敗者皆以其意異唯將帥諧和士卒輯睦戰勝攻取無往而不利矣方今外侮未已僣叛未平朝廷必欲小戰以練師頻勝以積威則以輕兵出近地時有不得已者矣然上下之欲不可不同雖帷幄之中已有定謀而心膂之臣豈無所見茍其所見或有不同畏朝廷之威而言不敢盡有怯懦之嫌而事不敢辭口順心違但以疾故為遷延之計如此者雖强之使行必不能成功矣願陛下於命將之際先授以所任之事使自揣其可否或於廟謨有所未喻則姑與之往復問難俾其胸中曉然見勝於未戰之前然後遣之庶幾上下同欲不至於敗仰副陛下孜孜治兵之意壬申詔禮官條具舉行文宣武成王熒惑夀星嶽瀆海鎮農蠶風雷雨師之祀用太常博士黃積厚請也文宣王以春秋二仲并從祀凡九十八武成王及從祀凡六十三皆用兩少牢熒惑以立夏其禮與文宣王皆如感生帝夀星用秋分嶽瀆海鎮用四立日及夏季之土旺先農以孟春先蠶以季春之已日風師以立春後丑日雷師以立夏後申日自夀星以下皆用酒脯積厚又言太常定諡率以行狀銘志為憑多不得實又僥幸寵靈之人類戒子孫毋請諡故惡諡不行望自今臣僚陳乞遺恩即命太常移史官采其始終定諡從之上以積厚論事可採遂以為尚書比部貟外郎積厚除比部在乙亥今併降㫖除郎之日直祕閣都督府書寫機宜文字計有功升直徽猷閣提㸃潼川府路刑獄公事時張浚在廬州遣有功赴行在前二日引對有功嘗獻所著晉鍳上曰朕乙夜觀之且為艱難之戒又面問著春秋防微之㫖對曰婦笑於齊六卿分晋此書之所為作也上首肯之有功以母老求去乃有是命浚引親嫌力辭疏纍上詔仍舊職有功仍舊職在六月癸巳癸酉起居郎樓照請命有司講究屯田鼓鑄市舶常平四事一曰募民以耕而兵無與焉是以墾闢未廣今縱未能使甲士從田於其中擇所謂不入隊者十取三四使之因田致穀以省大費何不可之有二曰鑄錢一司坐費糧食今銅料不繼鼓鑄日稀謂宜廢罷俟數年之後銅料稍多即令逐路運司措置鼓鑄似亦為便三曰蕃舶不至蓋官吏侵漁之故宜擇心計之臣示逺人之信明賞以激勸立法以關防則所入必豐羡四曰常平之法豐則貴取饑則賤與今諸道間有豐凶之不齊宜擇人使之兼總數路以通其州縣豐凶盈虛而斡旋之庶有贏資以給軍用詔户部侍郎梁汝嘉王俁條具約確利害申省後不果行甲戍徽猷閣待制提舉江州太平觀胡安國提舉萬夀觀兼侍讀疾速赴行在殿中侍御史石公揆奏今以詞賦經義取士而考校者患不能兼通升黜安能得實今嵗科場望令諸路轉運司取詞賦經義兩等各差考官從之丁丑左朝請郎何鑄主管台州崇道觀鑄初以選為諸王宫教授需次兩省至是乞祠也戊寅賜川陕宣撫副使吳玠知興元府王俊知洋州楊從儀詔書奬諭以張浚言玠命俊等部兵修築梁洋廢堰就緒也上因謂秦檜等曰治天下須恩威賞罰並行若有恩而無威有賞而無罰何以為治朕自即位以來未嘗以私怒降一人官所以言此者蓋姑息之風不可長也楊沂中朕當日撫綏之過於子弟去年淮西有警朕親筆戒之若不便進當行軍法沂中震恐承命遂以成功檜曰陛下英武如此中興不難致矣既而給事中兼直學士院胡世將請因此風厲諸將帥各務究心水利措置營田仍命利路監司候成熟日具梁洋渠堰所溉頃畝所增租稅覆實以聞將俊與從儀並加旌賞以為忠勞之勸從之世將所奏在是月甲申己卯廣西進出格馬上曰此幾似代北所生廣西亦有此馬則馬之良者不必西北可知上因論春秋列國不相通所用之馬皆取於國中而已申公巫臣使吳與其射御教吳乘車則是雖吳亦自有馬今必於産馬之地而求之則馬政不修故也詔禮部討論大火之祀先是行在多火災言者論國家實感炎德用宋建號康定間因古商邱作為壇兆以閼伯配大火之祭多事以來地陷賊境望詔有司即行在所每建辰戍出納之月設位望祭從之用酒脯六月壬辰討論奏上殿中侍御史石公揆論左朝散大夫新知廣德軍王擇仁左朝奉大夫新知永州熊彥詩右朝請大夫新知江州趙伯璆等八人皆罷公揆言擇仁頃在河東之幕欲奪官長之權自擁潰卒殘金破商劫盜居民無所不至彥詩乃王時雍愛壻今自京官二年而為正郎以至典司祠曺機宜都督府極其要選不知朝廷何以愛其材獨不念圍城之事乎伯璆素無才行昨奉苗劉薦為郎官衆所鄙棄故並罷存此以見王擇仁金商間事及伯璆明受除郎因依當各附本年削此假壬午知舒州周方文遷一官再任以宰臣張浚言其治郡有方也時浚自淮西還行在留𠫭謀軍事兵部尚書呂祉居廬州以護諸將始浚往視師參知政事張守遺書戒以毋輕改軍政浚不從賜龍圖閣直學士四川都轉運使李逮詔書奬諭以其能裁抑冗濫以寬民力故也先是詔逮以每嵗收支之數具旁通驛奏去年八月丙午降㫖既而逮言本司案牘簿籍竝皆不全紹興四年所收錢物計三千三百四十二萬餘緡比所支計闕五十一萬餘緡五年收三千六十萬餘緡比所支計闕一千萬餘緡皆以宣撫司攢剩錢及次年所收登帶通那應副六年未見收數支計三千二百七十六萬餘緡今年所收計三千六百六十七萬餘緡比所支計闕一百六十一萬餘緡紹興五年鹽酒息錢最增然以支數增多終是應副不足是致六年大假窘迫頓增起之數後來已難繼侵用過之數後來又難補逐月拖缺大軍折估及梓䕫路糴本水腳計司坐此取怒大將實非其罪也然今來七年帳內收數係是額管納收之數遞年有虧無增其支數係是按例實支之數遞年有添無减若將來取數稍虧支數稍添則不待來年便有闕少自來遇嵗計有闕即添支錢引補助支遣紹興四年添印五百七十六萬道五年添印二百萬道六年添印六百萬道成都運司及大使司各半見今泛料太多引價减落本司緣此不曽添印去秋畫㫖上供及該說不盡諸窠名錢竝許拘收通融應副除封樁禁軍闕額等錢五項折計錢引七十萬道已指數科撥外細數見去年九月庚辰見凖户部符催督總制司錢大使司拘收提刑司常平司錢物充稱提錢竝與本司通融取撥指揮相妨既不敢添印錢引又别無窠名錢物可以補足所闕錢計宣撫司但責應辦大使司乃責以蠲减勢相矛盾尤難措置即今嵗計見憂不足設若將來緩急調發嵗計之外别有支費委是無從辦集切慮必致誤事兼嵗收錢物因有上供進奉土貢三路綱坑冶課利等窠名錢物共計一千五百九十九萬係四川舊額所管嵗入之數其勸諭激賞增敷役錢助軍頭子錢免支移米腳錢秋稅上出納地理腳錢鹽酒增息錢等課名錢物共計錢二千六十八萬係軍興後來所增嵗入之數今比舊額已增過倍取于民者可謂重矣若計司不恤更增賦斂民力困竭事有難測此亦朝廷所當深慮矣臣嘗竊讀劉晏傳見史臣稱晏理財謂亞管蕭是時天下嵗入緡錢千二百萬而管𣙜居其半今四川區區一隅之地𣙜鹽𣙜酒嵗入一千九十一萬過於劉晏所𣙜之數多矣并諸窠名錢已三倍劉晏嵗入之數於大軍嵗計闕一百六十一萬彼以一千二百萬貫贍六師恢復中原而有餘今以三千六百萬貫贍一軍屯駐川陕而不足然則拖缺折估糴本水腳之類豈計司之罪乎議者皆謂軍中支費冗濫臣初亦疑之近因檢察乃得其實且如折估錢一項每年計錢引一千三百一十七萬以上件折估錢十貫折米一石為率約計米一百六十八萬見今每年應副正色米九十七萬七十九萬係水運八萬石係就納九萬九千石係就糴通估錢所折米共二百六十五萬本司不見得宣撫司即今官兵實數止有紹興六年朝廷遣使取㑹到諸頭項官兵共計六萬八千四百四十九人决無一年用二百六十五萬石米之理其折估錢不止是官兵坐倉折估灼然無疑據諸處糧審院供到折估錢名色除官兵各有身分料錢已係隨折估錢過勘外官員有驛料折估錢厨料祿粟米贍家錢供給錢月犒錢旬設錢支糧錢添支絹錢軍兵有坐倉折估錢攛槍又貼射錢添支食錢鹽米紙筆錢草估錢共十二項但緣官員有驛料折估軍兵有坐倉折估故特以折估錢總之又有諸帥諸將公使錢人吏作匠請給錢竝係於按月折估錢內應副是致此一項已用劉晏嵗入之數應副不足此議者所以謂其支費泛濫也又諸頭項官兵數內官員一萬七千七員軍兵五萬七百四十九人宣撫司上項官員數內有入隊有不入隊兩等近據閬州本司簽㕔具到閬州屯駐官兵一萬七千九百三十一人其官員內有不入隊使臣三百三十人軍兵內有不入隊敢勇效用義兵弓箭手共五千八百七十八人訪聞不入隊人數除輜重火頭合破數目不多外餘盡是繫名冗占之人所有諸州屯駐官兵去處本司近備坐攢具旁通朝廷纍行㑹問竝不報應未見的確不入隊人數官員之數比軍兵之數約計六分之一軍兵請給錢比官員請給不及十分之一即是冗濫在官員不在軍兵去年宣撫司屢以拖缺軍兵折估錢聞之朝廷趙開亦緣此而罷然臣契勘本司去年應副折估錢逐月差官剗刷但緣萬數浩瀚不能如期起發了足若宣撫司將撥到錢先支軍兵次支使臣後支將官雖有拖缺必不闕事蓋自將官以上每月請俸大假優厚故也然欲脅持計司則須以拖缺軍兵坐倉折估為辭此乃宣撫司屬官為主將所畫之䇿朝廷不可不知也臣近到軍前經由綿劍利州大安軍興州皆屬屯駐軍馬去處間有軍兵陳訴拖缺折估錢至於衣賜則所在皆有支散不盡數目糧食亦有探支過一兩月或一兩旬者足見軍前衣糧寬剩也然計司雖知冗濫力不能裁節雖知寬剩亦未敢除减但日夕憂懼嵗計不足此朝廷不可不知也蜀人所苦於折估錢猶未為甚其所甚者糴買般運也蓋緣糴買不科敷則不能集事茍科敷則不能無擾般運事稍緩則般户獨受其弊或稍急則稅户皆被其害紹興四年六年兩次支移陸運至軍前死損人夫甚多勞費猶不足道也欲省漕運莫如屯田近因興元府洋州守臣修築堤堰特降奬諭蜀人皆知德意在此然臣會問屯田等事皆不報止有紹興六年朝廷遣使取會到陕西路屯田頃畝共六十莊計田八百五十四頃七十九畝當時已種七分以上今年耕種既遍又有增墾頃畝不少漢中之地自古沃野訪聞屯田盡係膏腴且據前項頃畝㑹計每畝除出種糧止以三石為率約收二十五萬餘石若將一半樁充自來不係水運應副去處嵗計米一半對减川路糴買般發嵗計米亦可少寬民力兼臣近體問得利路興元府洋州陕西路岷州夏麥大熟皆可就糴除興元府洋州已委利路轉運副使勾光祖措置就糴五十萬石外岷州緣宣撫司屬官異議措置未得若屬官肯於岷州就糴二十萬石兼用營田所收一半之數十二萬石三項共計五十七萬石每年水運應副閬利州以東嵗計米五十八萬石願得此三項嵗計足矣可以盡數蠲免川路糴買般運此乃恤民之實惠守邊之良䇿朝廷所當留意者也不知務此但責應辦今之所入三倍劉晏而猶不足雖晏復生亦不能辦况如臣者豈敢望晏之萬一能保其不敗事誅責計臣雖不足道然四州生靈休戚所繫朝廷所宜動念也裁節冗濫措置糴買臣纍有奏陳未凖回降指揮今輒復陳本末是皆臣之職事也不敢隱默茍避譴訶伏望聖慈特賜睿察逮此疏關全蜀大計故止削去錢物畸零數目外並全載之不得其本月日且因奬諭詔書附見奏中言纍凖朝㫖不許添印泛料又言近因梁洋守臣修築堤堰特降奬諭又言裁節冗濫纍有奏陳未凖回降梁洋奬諭事已見此月十七日戊寅不許添印泛料指揮在此月二十八日己丑以事考之逮此奏必在今年六月以後未被受今此奬諭詔書之前當求他書考其本日癸未左武大夫宣州觀察使王公亮知閣門事甲申張浚奏江東宣撫使張俊遣參議官史願來議修城事上曰昨內殿引願入對問軍中教閲曲折因使告俊每隊五十當增旗頭一人常卷之以待用每遇出戰旗以簸揚而壞洎收軍而退或無以寓三軍之目於是植所增之旗則衆無惑矣時上方議諸軍置副浚奏曰此亦旗頭之副上以為然先是浚自淮西歸以除王德為不便奏論之左護一軍皆故羣盜驕悍自恣而統制官中侍大夫武泰軍承宣使酈瓊素與德不叶光世以瓊屢立竒功待之與德等瓊聞德為帥不自安乃以瓊為副都統制瓊除左護軍副都統不見本日張浚行狀云秦檜等奏以王德為都統制即軍中取酈瓊副之公俱以為不然奏論之按日歷所書議諸軍置副在浚還朝之後則二人非並除也殿前司等處置副統制指揮在後五日己丑或可移附彼日詔以時暑命行在所及行宫御史各一員慮諸獄囚諸路州軍令監司分詣右朝散大夫呂錫山依舊知果州錫山大忠子也大忠大防兄紹聖寶文閣直學士寓居於蜀上召之錫山辭不至集英殿修撰知衢州董弅提舉江州太平觀從所請也初命學士院䇿試行在所及行宫樞密院都統府效士五十三人得陳夀昌等十人合格詔優等授官平等免文解一次餘皆賜帛罷之武功大夫貴州刺史提舉江州太平觀鄭諶卒乙酉手詔自今內外臣寮薦士或不如所舉及罪當并案者必罰毋赦上以薦舉法壞甚者以子弟姻戚互相薦論至犯吏議則僥幸首免故條約焉尚書省言自來立法太重不能必行乃詔自今犯贓私罪者舉主遞降二等其以子弟親戚互薦者令臺臣察之監察御史趙渙乞令侍從至職事官不限資序各舉才堪大縣者一人俟三二年之間按其治狀同其賞罰詔行在所侍從官限一月通舉二十人丙戌右宣教郎知劔州梓潼縣侯臨令再任以士民舉其政績也丁亥中書言諸路監司除授依祖宗法即不避本貫詔如故事仍止避置司州戊子詔皇太后三代特封贈一次姪誠忠郎謙訊各進七官為閣門宣贊舍人以后初正尊號故也左從政郎荆湖南路提㸃刑獄司檢法官王湛特改合入官以薦對也湛已見去年十月辛酉己丑張浚奏論史事因言紹聖以舊史不公故再修而蔡卞不公又甚每持一已褒貶之語以騁其愛憎今若不極天下之公則後人將又不信上曰謂之實録但當録其實而褒貶自見若附以愛憎之語豈謂之實録上又曰今日重修兩朝大典不可不慎浚曰敢不恭承聖訓自趙鼎去位有言神宗實録改舊史非是者故浚奏及之日歷己丑後殿進呈臣浚奏史館事云云其上又必須别有言語餘見六月末并注名徽宗皇帝神御殿曰承元時未有殿而禮官言明堂前一日太廟朝饗當用原廟殿名為樂曲之名乃命學士院撰定焉此乃黃積厚為博士時所請詔殿前司行營右護軍後護軍竝許置都副統制日歷不載中前二軍當考中書言四川錢引近來印數多慮害成法詔禁止令制置大使司覺察如違重置典憲四川錢引舊書放兩界為二百五十一萬餘緡至是通行三界為三千七百八十餘萬緡故條約焉庚寅尚書右僕射張浚言臣先備員川陕宣撫處置使切見和靜處士尹焞緣叛臣劉豫父子迫以僞命焞經涉大河投身山谷自長安徒步趨蜀﨑嶇千餘里乞食問路僅獲生全臣嘗延請至司與之晉接觀其所學所養誠有大過人者紹興甲寅春被命還朝蓋嘗以焞姓名逹之天聼今陛下博採羣議召置經筵而焞辭免新命未聞就道伏望聖慈特降睿㫖令江州守臣疾速津遣初焞行至九江㑹諌官陳公輔請禁伊川學焞復辭曰學程氏者焞也浚乃顯言其學行請趣召之焞猶不至熊克小歷略載此事於今年正月末又云浚顯言其拒僞之節焞乃就職益誤矣江州去建康不逺而焞以九月上旬方及國門至此已百餘日况其間一再辭新命至閏月上旬方趣令供職是時浚得罪已久非因此奏而遂就職也今不取是月汴京無雲而雷有龍起撼宣德門滅宣德二字僞齊陷隨州劉豫以進士張浹為僞皇子府凖備差使浹景州人初見建炎四年春末六月辛卯朔改諡惠恭皇后曰顯恭壬辰右承議郎新知楚州韓元傑罷坐前守濠州日其兄元英私往宿州而不以聞也時元英已奔劉豫豫用為户部貟外郎癸巳祕書少監蘇符言史館見重修哲宗皇帝實録元祐政事屢致分更尤當盡付天下公論非符所宜𠫭預望改除一間慢差遣三省勘㑹元豐紹聖指揮係令祕書省長二通修日歷詔劄與符照㑹左司監陳公輔入對面奏興復之䇿因言衆論謂南兵不可用上慨然曰赤壁之役曹操敗於周瑜淝水之戰苻堅敗於謝元北人豈常勝哉越王勾踐卒敗吳王兵强諸國亦豈北方士馬邪日歷六月己酉後殿進呈陳公輔劄子比緣奏對興復之䇿云云按公輔此月戊申進對劄子即其日所上則得上語乃癸巳面對之日也故附於此詔建康府守臣遇有奏禀事許非時上殿直祕閣京東淮東宣撫處置使司𠫭謀官王㬇罷以樞密使秦檜引親嫌有請也龍神衛四廂都指揮使平海軍承宣使權主管行宫馬軍司公事蘭整罷軍職提舉台州崇道觀以墜馬有傷故也命主管步軍司公事邊順兼權甲午四川制置大使席益遣左朝奉郎本司主管機冝文字趙子琇奉表起居因統所選衛兵赴行在上引對及還賜益詔書奬諭又賚以銀合茶藥毬文帶象簡子琇燕懿王後東平侯令鏗子也賜益詔書等以是月戊申降㫖乙未罷江淮營田司以直徽猷閣淮東轉運判官蔣璨直祕閣淮西轉運判官韓璡直祕閣江東轉運副使俞俟直顯謨閣兩浙轉運副使汪思溫竝兼提領本路營田仍督責州縣當職官接續措置提領官樊賔王弗俟結局還行在先是議者數陳營田之害上命樞密院計議官李宷按視頗如議者所云中書乃言自置營田司數年已有成效但路分闊逺難以周遍若不專委帥漕就近措置深慮卒無增廣郤致廢弛成法故有是㫖三省又言恐州縣觀望乞命帥漕察其稽違與增廣者而賞罰之從之後㫖在是月壬寅丙申御筆史館重修神宗皇帝實録尚有詳略失中去取未當恐不可垂信傳後宜令本館更加研考逐項貼說進入以俟親覽先是祕書著作郎何掄面對乞刋正新録訛謬前三日命掄兼史館校勘是月癸巳至是批出掄所言張浚意也輔臣進呈上曰史官公心去取方可以垂信萬世知樞密院事沈與求曰神宗一朝史至今紛紛未定此蓋史官各以私意去取指為報復之資故久而未就但能公心實録庶可傳信趙鼎行實云初因臣僚上言裕泰二史是非失實始命官重修鼎去國之後有言其非者乃降御筆改修又鼎事實稱御筆乃宰相擬定見今年七月戊寅并注戊戌權主管侍衛馬軍司公事劉錡兼都督府咨議軍事錡時以所部戍廬州故也詔四川制置大使司津遣隱士張大楫赴行在大楫龍水人隱居翠微巖知天象嘗倣唐制為蓋天圖謂可置之几案及備軍幕中候驗因為木式以獻席益為上之乃詔大楫併賫所藏天文祕書赴行在己亥德慶軍節度使充萬夀觀使韋淵為昭慶軍節度使開府儀同三司壬寅詔徽猷閣待制新除提舉萬夀觀兼侍讀胡安國纍上章引疾可與便郡以右司諫陳公輔等有言也乃以安國知永州倉部郎中兼權大理少卿薛仁輔言比年以來法官寖闕斷刑官十四員而應格者無三數人試刑法官恩例增重而每年中選者無一二人加以數嵗恐遂曠官望詔有司討論祖宗設法科之制於京西荆湖淮南江西每路量立明法科解額以收遺才詔刑部條具申省甲辰武功大夫鳳州團練使殿前司選鋒軍統領吉俊降二官俊所部修武郎于輔私役軍士俊杖之死主帥楊沂中劾于朝故有是命乙巳知樞密院事沈與求薨于位特輟視朝二日贈七官為左銀青光祿大夫即湖州賜田十頃上將臨奠之其家辭而止與求再執政僅數月未及有所建明後諡忠敏詔宣撫司屬官自今毋得選羌人丙午攝太尉張浚率羣臣為大行太上皇帝請諡於南郊先是江端友為禮官建議攝太尉名實不正乞改用三公奉冊至是浚復攝是官失之也既而浚亦以為疑乃命禮官討論其事後遂改為攝太傅七月壬戌降㫖戊申兵部尚書兼都督府參謀軍事吕祉往淮西撫諭諸軍祉初在建康每有平戎之志張浚大喜之浚以劉光世持不戰之論欲罷之𠫭知政事張守以為不可浚不從守曰必欲改圖須得有紀律聞望素髙能服諸兵官之心者一人乃可浚曰正為有其人故欲易之也時祉亦自謂若專總一軍當生擒劉豫父子然後盡復故疆及光世罷乃命祉先往淮西直祕閣詹至聞之遺浚書曰吕尚書之賢固一時選然如此軍恩威曲折卵翼成就恐不得比前人兼此軍今已付王德德雖有功而與酈瓊輩故等夷恐其下有不能平者願更擇偏禆素為軍中所親附者使為德副以通下情會祉還朝而瓊與其下八人列狀訟德于都督府且乞回避都督府謂德為直寢不行瓊等又訟于御史臺德亦言瓊之過乃召德還建康以所部一軍𨽻都督府復命祉往廬州節制之祉將行賜以鞍馬犀帶象笏撫諭甚寵皆非從官故事中書舍人張燾見浚言祉書生不更軍旅何得輕付浚不從祉又辟都督府凖備差遣陳克自隨資政殿學士葉夢得與克厚謂之曰吕安老非馭將之才子髙詩人非國士也淮西諸軍方互有紛紛之論是行也危矣哉亦弗聽祉克皆留其家以單騎從軍右司諫王縉請於都督府屬官中選知兵者助祉謀議且留軍中撫循訓練以通將士之情不報此以趙甡之遺史熊克小歷詹至王縉墓志張燾行述參修小歷稱瓊等列狀都督府以訟王德之過而張浚行狀稱訴于御史臺今從之徐夢莘北盟㑹編云酈瓊狀王德之罪于朝德密知之遂赴行在上問之德具言諸將驕暴恐别生患上愕然遂命德以本軍入衛熊克小歷云德亦訟瓊等之過乃召德以本軍還為都督府都統制按今年九月二十四日德申薛死事狀猶繫左護軍都統制銜與克所云不同今且云𨽻都督府庶不差互詔以欽廉雍州去嵗大水米踊貴令本路常平官蠲賦稅賑飢乏其公私缺負皆停之右承議郎直祕閣新提舉荆湖兩路常平茶鹽公事張叔獻貶秩一等坐前為江西提刑不核實殘破州郡逃亡人户蠲减上供錢雖該恩免特責也此未知與五年三月丁丑叔獻申江州隱匿上供事有無相關更俟考詳己酉皇叔檢校少師光山軍節度使同知大宗正事士㒟開府儀同三司士㒟嘗因對勸上留意恤民上曰朕以兵戈未息不免時取於民如月樁之類欲罷未可一旦得遂休兵凡取於民者當悉除之時建康有積缺左藏庫錢帛乞免輸上曰建康兵火後遺民無幾朕何忍更取積逋耶可竝除之因謂輔臣曰朕嘗諭趙鼎宣和以前宰輔非其人費用無節誅求無藝四海之民困於科斂不得安業朕嗣位以來思與之休息又以邊事未靖軍費之資取辦於諸路者尚多斯民之災如此儻他日兵寢朕當一切蠲罷雖租賦之常亦除一二年朕之此心天地鬼神實照臨之張浚等曰陛下聖志如此天必助順民之休息固有期矣他日更在陛下選用大臣推行德意上曰然事亦在朕秦檜曰陛下聖志既定人誰敢違因論及唐太宗不能去封德彛上曰唐太宗用封德彛宇文士及朕常以為恨既知其奸佞猶信之不疑陳與義曰古人謂去佞如拔山浚曰太宗所謂惡惡而不能去也命𠫭知政事陳與義撰顯恭皇后諡册文吏部尚書孫近兵部尚書吕祉篆三諡寶詔顯肅皇后外家有服親各遷官有差左宣教郎田如鼇主管亳州眀道宮理作自陳如鼇為御史坐上疏詆張絢等斥去及是復之辛亥祕書省校書郎兼史館校勘張嵲守著作郎左朝奉郎李良臣為校書郎良臣已見紹興三年六月良臣自蜀召歸上召見而有是命賜龍圖閣直學士汪藻銀合茶藥以其纂緝詔㫖之勞也壬子左通直郎林安宅主管西外敦宗院安宅舊為宣諭官朱異所薦至是始命之安宅初見三年七月甲寅左朝奉郎四川制置大使司主管機宜文字趙子琇再入對言四川財賦自茶鹽𣙜酤與夫常賦之外可以供公上之求者經度措置固已曲盡在今無復理財之術但有惜財之術爾望明詔主兵者念民力之已殫應泛濫不急之費當自有以蠲减典計者知戍兵之久勞凡大軍經費之須務求所以贍給如此則兩司相通皆能贍軍恤民同濟國事詔川陕宣撫副使吳玠都轉運使李逮措置後五日擢子琇提舉荆湖北路常平茶鹽公事時川陕贍軍錢闕逮遣官屬分行三路召三等井户量增貼納錢上等每百斤增千錢中等七百錢下等三百錢自是為例而子琇未知也子琇奏下在是月丙辰除命在丁巳今因引對遂書之李逮增貼納錢在此月而不得其日今附子琇奏疏之後熊克小歷云上殿官趙子琇頗知蜀中事云云蓋不詳其本末也丙辰尚書省請申命舉人程文許通用古今諸儒之說及自出己意但文理優長即為合格從之乙卯執政進呈左朝奉大夫蒲贄乞駐蹕江陵上曰荆南形勝自古吳蜀必爭之地冝諭王庶益濬治城塹招徠流移練兵積粟為悠久之計張浚曰庶在荆南頗有治行元係雜學士猶未復舊職上曰可還舊職使悉心府事上又曰蜀中多士幾與三吳不殊近日上殿如李良臣蒲贄極不易得因論士人各隨所習如蜀中之士多學蘇軾父子江西之士多學黃庭堅浚等曰大抵耳目所接師友淵源必有所自贄閬中人浚在閬州引為宣撫處置司主管機宜文字至是自知彭州召入後六日遂以贄行尚書兵部員外郎左司諫陳公輔權尚書禮部侍郎降授左朝散郎致仕王次翁令再任秦檜之再召也道由婺州時次翁居于婺與檜遇至是起居郎樓照為檜言次翁甚貧兵部尚書呂祉等奏次翁天資孝友履行清修年未六十浩然求退召置朝列必有可觀故有是命次翁去年四月方除湖南大制司𠫭議官不知何時致仕熊克小歷云樓照為秦檜言吕頥浩次翁郡人也頥浩再相而次翁困一至此檜笑曰非其類也遂落致仕以兵部郎官召之按紹興三年秋頥浩在相位次翁自廣西漕召還㑹頥浩免相次翁亦乞祠而去比頥浩再起又以上幕辟之與克所云全不同當考又次翁此時雖落致仕旋又得祠明年三月方除兵部郎官克不詳考耳丁巳吏部尚書兼侍讀兼史館修撰孫近引疾乞奉祠張浚等皆言近之賢宜留朝廷張守曰聞近信命甚篤以為自此當有災故亟求去位上曰此安足深信隂陽技術惟卜筮最為近古古人精于術數故無毫髮差今人能如是乎君相造命固不當言命况近時日者尤不足信朕未嘗問也己未給事中兼直學士院胡世將權尚書禮部侍郎吳表臣竝兼侍講詔回易庫撥𨽻都督府權户部侍郎王俁仍舊總領其事務苛細者皆除之是夏金左副元帥魯國王昌等以內起大獄各不之草地避暑太師領三省事晋國王宗維乞免官為庶人以贖尚書左丞髙慶裔之罪金主亶不從斬慶裔于會寧市慶裔臨刑宗維與之哭别慶裔曰公早聽我言今日豈至此蓋慶裔嘗教宗維反也山西路轉運使劉思河東北路轉運使趙溫訊坐纍當誅東京留守宗隽與溫訊善匿其斷命以俟赦乃得免其餘連坐甚衆皆宗維之黨金中雜書云烏竒邁即位十年儲位久虛尼瑪哈利于幼主易制隂謀立阿固逹之孫而慮烏竒邁將以子為嗣乃創建三省首除烏竒邁之子為尚書令阿固逹次子固倫貝勒録尚書事尼瑪哈陽尊二人而處身於下左揆立二太子之子為皇太子丙辰年烏竒邁死皇太子即位尼瑪哈隂謀既成後以烏竒邁之子尚書令者封宋王阿固逹次子録尚書事者封秦王置兩人于間散尼瑪哈遷太傅領三省事拜都元帥內外之政皆出于己金主十二年少守虛位而已秦宋二王方悟尼瑪哈之術丁巳春因群聚㑹所謂宋王者以所受封王之命擲于尼瑪哈前歷吐胸中積憤尼瑪哈深被沮毁包羞忍辱亟歸私第感疾不起是年十月二十一日死國政復歸秦宋二王遂去尼瑪哈腹心之人殺左轄髙慶裔山西漕使劉思黜與左揆烏舍右轄蕭慶為庶人尼瑪哈用事日凡所施設俱廢罷宗隽太祖旻第六子富勒呼也宗隽所居官必復租稅甚得蕃漢間心然時有酒過及除東京留守金主亶𠡠令止飲道有渤海僧以杯酒獻者即命敲殺之建炎以來繫年要録卷一百十一建炎以來繫年要録卷一百十一金人地名考證烏竒邁原書作吳乞買誤改見卷一尼瑪哈原書作粘罕誤改見卷一阿固逹原書作阿骨怛誤改見卷一固倫貝勒原書作骨盧勃極烈誤今改正烏舍原書作兀室誤改見卷一富勒呼原書作蒲路虎誤改見卷九
