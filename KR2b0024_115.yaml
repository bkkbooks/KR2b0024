body:
  text: 建炎以來繫年要録卷一百十五宋李心傳撰紹興七年冬十月庚寅朔上謂大臣曰向緣亢旱詔求直言自是上書者甚多雖經親覽猶恐未能詳究利病可令後省官子細看詳有可採者中書條上取旨行之庶詔令不為虛文詔依舊間一日開講筵用右正言李誼奏也初權禮部侍郎陳公輔建議以為上日臨講筵有妨退朝居喪之制乞令講讀官供進口義今年八月已未事既行而講讀官孫近胡交修朱震論天子之孝有百姓四海其勢不得與諸侯卿大夫同也且以古今論之喪禮唯而不對今陛下親庶政決萬幾可否天下事其可唯而不對乎喪禮未葬衰麻不去身今越紼行事被黼服冕其可不去衰麻乎今便殿按弓馬撫將士金革之事有不避也何獨至於講筵而疑之真宗咸平元年在諒暗之中也是年正月詔訪明達經義者召崔頥正講尚書於廣福殿又於苑中説大禹謨二年置翰林侍講學士命邢昺講左氏春秋亦在三年之中伏望以時開講筵見儒生臣等不勝大願兵部侍郎兼直學士院兼侍講胡世將時為給事中言神宗皇帝治平四年四月同知諫院傅卞請開經筵詔俟祔廟畢取旨按祖宗舊制即無前件供進口義典故况陛下親御經筵講眀治道與其餘事體不同臣恐於居喪之制實無所妨伏望更令侍從官討論故事奏可今年九月乙丑公輔復言今陛下親決萬幾此蓋外庭以日易月之制明堂祀上帝不敢以卑廢尊也至於咸平治平故事臣非不知蓋以祖宗時並遵漢文故事以日易月未嘗明言行宫中三年之喪則以日易月外自不妨聽講今陛下以太上皇帝奄終沙漠痛不可言所遭變故實異前世臣所以每切切于此欲以將順陛下之美至論視朝當服淺淡羣臣未純吉服遇禫日天下禁屠宰作樂朝廷並已略賜施行前日又乞不行臨軒策士之制蓋欲陛下於三年之內凡涉吉禮者皆未宜講亦蒙依臣所奏今日所議開講非固立意違衆自速一時嫌謗也實望陛下深念為人之子十年不獲致天下之養而萬里告哀痛傷無及今居宫中之喪雖日月逾邁不可暫忘故凡遇退朝且以追思悲慕為先然陛下孝性純篤何待臣言伏望斷自聖心特賜詳酌乃命從官一併詳議九月癸酉於是誼奏臣備位言責不嫌出位為陛下别白而明言之臣竊考之於詩成王訪落之初羣臣進戒之始其言曰日就月將學有緝熙於光明是成王居三年之制未嘗廢學也英宗皇帝嗣服之始司馬光首以開講筵為言者三是司馬光所以輔導人主於三年之制亦未嘗廢乎學也曲禮曰居喪未葬讀喪禮既葬讀祭禮故曰喪復常讀樂章是未復常以前除樂章之外皆可以讀也又曰居喪不言樂自樂之外皆可以言也臣質之禮典論之人情以謂三年之制聽備樂悅備色饗備味則有所不可至於聞先王之正道監祖宗之成訓亦何不可之有伏望陛下斷自聖志依舊間一日開講筵燕見羣臣講求至道庶幾聰明不蔽以增聖德以闡大猷實天下之幸疏奏從之右司諌王縉罷為直祕閣知溫州從所請也浙東諸司言婺州金華縣士民舉知縣蔡材治狀詔遷一官令再任壬辰御史中丞周祕入對論張浚罪乞更賜貶責丙申權尚書禮部侍郎陳公輔充集英殿修撰提舉江州太平觀張浚既得罪公輔再上疏乞奉祠自言進退之際有不得不去者故有是命丁酉徽猷閣待制新知永州胡安國提舉江州太平觀從所請也趙鼎進呈因言安國昨進春秋解必嘗經聖覽上曰安國所解朕置之座右雖間用傳注頗能明經旨朕喜春秋之學率二十四日讀一過居常禁中亦自有日課早朝退省閲臣僚上殿章疏食後讀春秋史記晚食後閲內外章奏夜讀尚書率以二鼓鼎曰今寒素之士豈能窮日力以觀書陛下聖學如此非異代帝王所及上曰頃陳公輔嘗諫朕學書謂字畫不必甚留意朕以謂人之常情必有所好或喜田獵或嗜酒色以至其他玩好皆足以蠱惑性情廢時亂政朕自以學書賢於他好然亦不至廢事也四川制置大使席益奏成都府漢州賑濟有方全活甚衆賜益詔書奬諭漢州守臣仍進一官是日殿中侍御史石公揆入對論張浚罪且言浚之敗事天下之人皆痛憤切齒恨不食其肉而直祕閣新知溫州王縉方且為決癰之論陛下厚其禮貌以俟後相懷姦顧望欲為後圖望褫其職名還之銓曹以為言者之戒詔縉落職主管台州崇道觀免謝辭戊戌特進提舉江州太平觀張浚責授左朝奉大夫祕書少監分司南京永州居住先是趙鼎奏欲降一詔以安淮西軍民上曰當以罪已之意播告天下俟行遣張浚畢降詔鼎曰浚已落職上曰浚誤朕極多理宜逺竄鼎曰浚母老且有勤王大功上曰勤王固已賞之為相也功過自不相掩此據趙鼎雜記於是臺諫周祕等論浚罪未巳祕奏浚去國之數日乃與賔客置酒髙會從容遊觀殊無恐懼循省之意今聞盛兵自衛居苕霅間若不稍申遣罰則浚必不自知其罪而四方之人亦未必知浚之所以去也石公揆奏浚之罪惡上通於天竭天下之財東南為之困覆富平之師西北為之擾止於禠職人心謂何李誼奏浚罪戾之餘更求衛卒之衆頃年責居福州於未行間亦上章以官田為請其意以此卜陛下眷禮之盛衰惟祕奏罪大責輕未知所懼已上並據日厯祕對後四日夜降祕等各兩章惟祕第二章論浚二十罪不出後批浚散官安置嶺表中書舊例御批即時行出至是鼎封起未即行此亦據鼎雜記翌日至漏舍約諸人救解此據趙鼎事實鼎奏曰前日趙令襟之言外頗傳播以謂浚之出皆諸將之意今又如此行外聞益疑矣上曰若宰相出入由於諸將即唐末五代之風今幸未至此鼎曰今謫浚雖非諸將之言亦少快諸將之意矣上曰此不恤也此據趙鼎雜記樞密使秦檜奏曰臣等前日不敢言今日却當言此據趙鼎事實參知政事張守曰浚為陛下捍兩淮宣力勤勞前此罷劉光世正以其衆烏合不為用今具驗矣羣臣從而媒孽其短臣恐後之繼者必指浚為鑒孰肯身任陛下事乎且其母老矣惟陛下哀憐之此據趙甡之遺史上顧而不答鼎開陳纍數百言上意殊未回鼎又曰浚有母老今過嶺必不能將老母浚有勤王功陛下忍使其子母為死别乎上猶未解鼎又曰浚所犯不過公罪恐不應如此上乃曰來日再將上商量鼎又留身再懇曰浚之罪不過失䇿耳凡人計謀欲施之際豈不思慮亦安能保其萬全倘因其一失便置之死地後雖有竒謀妙算誰敢獻之此事利害自關朝廷非獨私浚也上意解此據趙鼎事實鼎朝退召祠部員外郎勾龍如淵都官員外郎馮康國工部員外郎馮楫至都堂三人見鼎皆踧縮鼎曰上憐德逺母老有復辟功決不逺謫無過嶺之患諸君速以書報上意三人退鼎又目之曰鼎不負德逺德逺負鼎此據趙鼎遺事又張浚行狀云上令浚擬詔召鼎既出樞密使秦檜謂浚必薦已就閣子與浚語良久上遣人趣進所擬文字檜錯愕而出後反謂鼎曰上召公而張相遲留上使人趣始進入檜之交諜類此又翌日乃有是命制略曰浚奮自孤生驟膺重寄既執廟堂之柄遂專帷幄之籌獨幸成功力排衆議委用非人而境土侵削綏懷無策而將士叛離廣費以蠧邦財重斂而屈民力乃至丐賜田以探主意請衛卒而為身謀論其前後之愆難以一二而數念嘗奮身以赴國家之急提兵而拯社稷之危屈法申恩姑投善地記功閔舊忍置嚴科尚體寬容毋忘循省此據日厯鼎之初相也上謂曰卿既還相位現任執政去留惟卿鼎曰秦檜不可令去張守陳與義乞罷上皆許之檜亦留身求解機務上曰趙鼎與卿相知可以必安檜至殿廬起身向鼎謂曰檜得相公如此更不敢言去此據趙鼎事實江西制置大使李綱上疏言臣竊見張浚罷相言者引漢武誅王恢事以為比臣恐智謀之士卷舌而不敢談兵忠義之士扼腕而無所發憤將士解體而不用命州郡望風而無堅城陛下將誰與立國哉伏望陛下堅聖心而勿動修軍政以自強無為趨時獻言者之所搖古語曰臨大難而不懼聖人之勇也夫張浚措置失當誠有罪矣然其區區徇國之心有可矜者願少寬假以責來效此據綱奏議户部員外郎霍蠡自鄂州赴行在詔引對今年八月所書蠡奏嶽飛錢糧事或可移附此是日偽齊遣兵犯泗州守臣起復武功大夫閣門宣贊舍人劉綱率官軍拒退之尋詔綱領文州刺史庚子手詔曰朕不敏不明誤用柄臣寄以兵政乃謀猷乖戾委付非才致淮西一軍懷疑反側而莫以告朕遂使積年忠義之衆一旦陷於叛亡之罪凡取於民力以事此軍者委於空虛而無效此朕所以慨惜叛者而深愧吾民也中外文武將何以副朕焦勞願治之意應監司守令各務存恤百姓非供軍費定數之外無得妄取於民將帥之臣撫綏其衆毋使失所訓練整齊毋使驕惰毋怠毋忽助朕逺圖有違朕言則有常罰都官員外郎馮康國乞補外趙鼎奏自張浚罷黜蜀中士大夫皆不自安今留行在所幾十餘人往往一時遴選臣恐臺諫以浚里黨或有論列望陛下垂察上曰朝廷用人止當論才不才頃臺諫好以朋黨罪士大夫如罷一宰相則凡所薦引不問才否一時罷黜此乃朝廷使之為朋黨非所以愛惜人才而厚風俗也鼎等頓首謝集英殿修撰提舉江州太平觀陳公輔知處州右朝請大夫知楚州胡紡直祕閣武功大夫文州團練使京東淮東宣撫處置使司右軍第一將髙傑除名勒停本軍自效傑醉擊隊官統制巨振笞之傑怒自斷其指韓世忠以聞故有是命初虔賊毛順掠武平縣武德郎汀州弓手準備將領吳辛率諸巡尉捕之官軍失利辛與右迪功郎上杭縣尉王袤皆死至是贈辛武節大夫袤右承事郎官其家有差辛丑詔御史中丞周祕纍乞外任可除徽猷閣直學士知秀州中書舍人趙思誠入對論任子之弊以為每遇親祠之嵗補官者約四千人是十年之後增萬二千員科舉取士不與焉臣將見寒士有三十年不得調者矣比嵗朝廷置討論之法羣起怨謗不果盡行夫該討論之人盡是緣橫恩私謁而得之雖盡追奪猶不為過今以士大夫本分合得恩澤而議裁抑之則其羣起怨謗愈甚於前大臣不敢專任其怨日復一日以至於今祖宗朝祕書監今之中大夫也諸寺卿今之中奉中散大夫也仕至此者皆實以年勞功績得之年必六十身不過得恩澤五六人政和宣和之後私謁行橫恩廣有年未三十而官至大夫者員數比於祖宗之時不知其幾倍而恩例未嘗少損有一人而任子至十餘者此而不革實政事之大蠧也望特詔侍從官共議所以革弊之術示之以至公斷之以必行翌日詔侍從官討論申尚書省會思誠補外議遂格壬寅祕書省正字胡珵李彌正復兼史館校勘趙鼎因奏事議及改修神宗實録上曰止修訛謬非有所改也鼎曰所降御筆如此上曰乃宰相擬定者鼎曰起居注載著作郎張嵲所得聖語亦然上駭曰安得有此即詔嵲所記勿存留鼎乃知是事本非上意鼎言何掄本與祕閣修撰曾統所進本小異掄乃蜀本有朱字處統本却無之自合重修其李彌正胡珵不應嫌避史職令依舊兼之上曰朱勾去者太冗鼎曰此乃美事蔡卞輩不學故不知去取如吳奎傳有曰臣願陛下為堯舜主不願為唐德宗卞乃刪去臣謂主聖則臣直載之乃見神宗之聖也使魏徵王圭傳不載其直言則後世不知太宗能納諫也上曰然鼎又曰臣去國半載今觀聖意稍異前日上曰尋常造膝每以孝悌之説相搖撼其實紹述之謀也鼎曰秦檜莫有正論上曰無之自卿去唯朱震不改其舊鼎曰臣觀持中論者皆惑聖聰乃是沮善之術故以為不可太分當兼收而用則得人之路廣臣謂君子小人並進何以為治與其多得小人寧若少得君子之為愈也蓋分善惡唯恐不嚴稍寬則落其姦便君子於小人常恕小人於君子不恕也上復以為然乃詔昨令史館官再加研考新修神宗實録止緣曾統所進本脫落不全又九卷不載舊史理宜修整别無同異之嫌元校勘官胡珵李彌正可依舊校勘是日有星隕於偽齊平康鎮壕寨官賁百祥見之謂人曰齊帝星隕禍在百日之內劉豫問可禳否曰惟在修德麟怒以為誑斬於市癸卯上曰昨布衣賴好古上書論虔賊事頗有理趙鼎奏大意以招安為非張守曰招安固非策其始州軍非不欲勦殺而賊據險負固師老財費則不免於招安固非得已陳與義曰招安討殺不可偏廢以重兵臨之而後招則賊可得也上曰用兵則不免害及良民止當誅其首惡餘悉縱之乃善初京東淮東宣撫處置使韓世忠遣親校溫濟來奏事且圖上淮陽形勢言賊並淮陽增築保障欲遣偏師平之使濟諗於朝上戒濟曰歸語汝帥當出萬全不宜輕動以貽後悔濟既稟命復要他日將士之賞上曰有功則當賞但須核實然後有功者勸世忠既以狀來上則朝廷不欲違如去年攻淮陽賞一萬七千餘人不以為當也濟恐悚奉詔至是趙鼎奏濟已行上曰昨呼來訓飭之矣熊克小厯稱世忠使其屬官溫濟諗于朝按濟乃世忠軍中事務官非屬官也日厯紹興九年九月戊戌濟自拱衛大夫威州防禦使勒停甲辰少保鎮南軍節度使兩浙西路安撫制置大使兼知臨安府行宫留守吕頥浩以明堂恩封成國公右承事郎陳正同知大宗正丞正同以銓量罷故改命之乙巳左承奉郎趙雍充諸王宫大小學教授丙午荆湖北轉運判官辛次膺行左正言先是右正言李誼言古者爭臣七人唐六典諫大夫以次六員祖宗時諫員並置當其盛際以言相髙今臣獨員供職綿力寡助深恐不逮望增置一二庶有補於聖聰之萬一至是以命次膺誼所奏不得其日熊克小厯附之今年六月末實甚誤此時王縉為右司諫不得云獨員也直寶文閣湖北京西宣撫使參謀官薛弼行户部員外郎丁未殿中侍御史石公揆守侍御史中書舍人趙思誠充寶文閣待制知南劔州從所請也武功大夫閣門宣贊舍人王進以收捕虔冦毛迪之勞領忠州刺史己酉承節郎張久中特進二官賜銀帛以樞密院言先令久中往諭叛黨得其干照而歸故也所諭事當考詳按干照字未辛亥權管殿前司公事楊沂中乞以諸路所起禁軍弓弩手揀刺上四軍事祖見今年三月戊寅日厯止云諸路所起弓弩手而省禁軍二字熊克小厯又去弩字止云諸路弓手遂失其實趙鼎等因論及南兵可教張守曰止是格尺不及耳上曰人猶馬也人之有力馬之能行皆不在軀幹之大小故兵無南北顧所以用之如何耳自春秋之時申公巫臣通吳於上國遂霸諸侯項羽以江東子弟八千橫行天下以至周瑜之敗曹操謝元之破符堅皆南兵也正議大夫提舉臨安府洞霄宫汪伯彥復資政殿大學士用中書檢舉也制曰朕卜季秋之月躬總章之祀顧雖輝胞之微悉蒙慶賚囹圄之賤咸與滌除况嘗居於輔臣敢獨忘於甄敘伯彥頃膺鼎鉉之寄旋致覆餗之凶投置散地厯年於兹矣爰因合宫之享稍復神殿之聯昔漢家故事宰相之不任職事者賜之牛酒歸老于家唐室舊制凡郊祀之慶百官庶士麗於刑書者皆以赦除朕雜用漢唐之典以御臣工非獨爾私也服我至恩無忘補報按此時舍人是曾開獨員不知此制誰當筆也壬子秦魯國大長公主入見上謂大臣曰大長公主今日入內朕以仁宗皇帝之女朕之曾祖姑待遇加禮每入內朕必迎見聲喏朕惟仁宗深仁厚澤涵濡海內大長公主眉夀康強亦仁宗盛德遺澤之所致甲寅中書舍人曾開充寶文閣待制知鎮江府開與趙思誠皆張浚所引故力請外而命之徽猷閣待制知嚴州胡寅移知永州先是寅父徽猷閣待制安國自衡山以書訓寅曰汝在桐江一年矣大凡從官作郡一年未遷即有怠意汝今宜作三年計日勤一日思逺大之業若有遷擢自是朝廷非我所覬也至是寅言父病初愈迎侍不來近者妻室喪亡乞湖南一小郡乃改命焉直祕閣詹太和知江州仍趣之任太和既落致仕上引對而用之趙鼎進呈除目因言士人有不可為郡守而必欲得之者往往不肯就宫祠上曰爾則不肯其如一方赤子何鼎退而歎曰大哉帝王之言也武翼郎行營左護軍部將張世安以為酈瓊所殺特贈武節郎官其家二人乙卯上謂大臣曰昨劉瑜書論十事皆民間疾苦可擇其當行者行之趙鼎等曰所論皆善然法令已詳密當申嚴行下上曰若申嚴未必濟事須去其不便於民者謂如向來浙右水腳錢其後造成綱船遂免此患瑜以布衣應詔言事上納用之感德軍節度使萬夀觀使髙世則來朝召之也丁巳中書舍人傅嵩卿權尚書禮部侍郎吳表臣並試給事中徽猷閣待制提舉太平觀常同試禮部侍郎祕書省校書郎髙閌正字李彌正並為著作佐郎正字胡珵為校書郎仍並兼史館校勘左宣義郎通判永州羅孝芬為祕書省校書郎孝芬嶽州平江人宣和初中進士甲科屏居邑之石牛山躬耕養親十年不調至是湖南憲臣趙伯牛等薦于朝上召對乃有是命詔遇六參日輪行在百官一員轉對右正言李誼奏昨扈從臣僚不多止令輪對一次今已輪遍數月矣望準建隆天聖故事日輪一員俟百官俱集則依舊制故有是旨建炎以來繫年要録卷一百十五
