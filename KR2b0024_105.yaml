body:
  text: 建炎以來繫年要録卷一百五宋李心傳撰紹興六年九月丙寅朔上發臨安府先詣上天竺寺焚香道遇執黃旗報捷者乃湖北京西宣撫副使嶽飛所遣武翼郎李遇先是飛遣統制官王貴郝政董先引兵攻虢州盧氏縣下之獲糧十五萬斛上已登舟召守臣李謨即舟中奏事遂宿北郭之稅亭丁卯御舟宿臨平鎮上於舟中與宰執論嶽飛之捷固可喜淮上諸將各據要害雖為必守計然兵家不慮勝惟慮敗爾萬一小跌不知如何更宜熟慮趙鼎等奉命而退邵武軍進士危無咎特補下州文學以川陜宣撫副使吳玠言無咎從軍日久委有勞效也戊辰上次崇德縣縣令趙渙之入對上問以民間疾苦渙之言無之又問户口幾何渙之不能對言者論渙之儲偫擾民詔轉運副使張匯究實匯言渙之和借塗金溺器至十收辦衛士五千人食用肉直千緡而止償民三分之一乃削渙之二秩仍令匯治罪趙鼎曰陛下所以延見守令者正欲知民間疾苦耳上曰朕猶恨纍日風雨不能乘馬親往田間問勞父老己巳次皂林上謂宰執曰嶽飛之捷兵家不無緣飾宜通書細問非吝賞典欲得措置之方爾張浚曰飛措置甚大今已至伊洛則太行一帶山寨必有通謀者自梁青之來彼意甚堅趙鼎曰河東山寨如韋銓輩雖力屈就金人招而據險自保如舊亦無如之何羈縻而已一旦王師渡河此輩必為我用上曰斯民不忘祖宗之德吾料之必非金人所能有鼎等曰願陛下修德孜孜經營常如今日也庚午上次秀州直祕閣王㬇韓琰並充京東淮東宣撫處置使司參議官權殿前司公事解潜帶御器械提舉宿衛親兵劉錡各罰銅八斤坐以不經御史臺印驗旗號舟船於禁衛內乘使為侍御史周祕所劾也起復右武大夫文州團練使廣南東路兵馬鈐轄都督府摧鋒軍統制韓京領和州防禦使以掩殺嶺南諸盜之勞故有是命辛未御舟次平望壬申次吳江縣平海軍承宣使兩浙東路馬步軍副都總管蘭整權主管侍衛馬軍司公事行宫供職是日僞齊故相張孝純遣其客薛笻間道走行在上書言利害先是劉麟嘗養俠士蒯挺等二十餘人待以殊禮孝純自言得其隂謀孝純書云蒯挺訪臣曰有人自兩浙來擕宋帝御書云酷好黃庭堅墨跡東宫得之喜曰吾得計矣近以黃庭堅墨跡二十餘本授挺令與王開道等效學務令精肖不久與相公别矣臣方知賊臣輩欲令挺輩袖匕首微行二浙以庭堅書取媚於陛下得以肆其狠毒矣又言金人於沿海州縣置通貨場以市金漆皮革羽毛之可為戎器者以厚直償之所積甚衆孝純言於豫曰聞南人治舟久矣旦暮乘風北濟而所在岸口視之恬然儻利於吾彼寧不為之禁豫大懼遽罷通貨場又言豫遣使封廣王事見三年九月乙卯羅誘上南征議事見四年七月盧偉卿乞師李成獻䇿事並見四年九月徐文犯通泰事見三年五月辛酉防俠士禁商販之可為軍器者並見前又請分兵守京西諸州斷貝勒之糧道搗劉豫之巢穴則淮南關陜之兵不攻自解又言山東長吏皆本朝舊人日望王師之來爭為內應以贖前罪惟李鄴有異志不復心懷本朝孝純嘗與鄴論及朝廷鄴曰死無所憚但恐如陸漸之禍惡名終不可免漸事見二年六月戊戌故孝純及之孝純所上書僞齊録有之不得其年其書有云自太原失守于今十年以年計之當是紹興五年而書中所引多紹興三年事不知何也如云徐文北奔烏珠西犯皆在三年敵出助兵李成獻計皆在四年則其書當在金豫末入犯之前今且依徐夢莘北盟會編附此疑非今年也書首稱僞尚書左僕射按僞齊有左右丞相而無僕射又孝純久已罷去此時僞相乃劉麟張昴為之姑附此俟考癸酉上次平江府以水門隘不通御舟乃就輦于城外百官朝服乘馬扈從至行宫賜百司沐浴三日甲戌江西制置大使李綱乞赴行在扈從優詔不許乙亥韓世忠自楚州來朝上特燕世忠令入內內侍省都知黃冕押伴上督世忠進兵世忠不從此據趙甡之遺史日歷不書世忠入見但于今月十五日書世忠辭免御筵今併附此起居郎張燾兼權給事中秉義郎郭彥卿忠翊郎行營中護軍凖備將韓瑶並為閣門祇候以彥卿自北來歸而張浚言瑶向在川陜宣撫司嘗獻陳法頗有可采也武翼大夫閣門宣贊舍人添差洪州兵馬鈐轄王才令再任戊寅命中書門下省檢正諸房公事張宗元撫問江東淮西宣撫司諸軍家屬之在金陵當塗者詔行在職事官日輪一員面對己卯上謂執政曰前此大臣誤國科斂百姓以供不急之費今日正復用兵未能蠲除力役真有愧也詔四川都轉運使李逮與制置大使司及川陜宣撫司行移並用申狀書檢不繫銜始趙開于兩司並用申狀至是改之庚辰趙鼎奏昨日趙密巨師古軍中苦重膇之疾者得陛下所賜藥皆一服輒愈上曰朕於醫藥嘗所留意每退朝後即令醫者診脉才有虧處便當治之正如治天下國家不敢以小害而不速去也詔臨安府百司行移並增行宫二字行宫留守司奏以祕書少監吳表臣兼參議官直寶文閣知臨安府李謨兼詳議官祕書省正字胡珵兼主管機宜文字又請右承議郎通判臨安府袁復一趙令結並兼幹辦公事大理寺丞吳彥章凖備差遣皆從之復一以十月己亥令結以十月己未彥章以十一月庚辰奏辟今聫書之詔四川應上供內藏封樁等錢並許都轉運司拘收應用從都轉運使李逮請也一曰封樁禁軍闕額錢二曰减罷吏人請受錢三曰耆户長雇錢四曰經制頭子錢五曰贍學租課錢於是嵗撥提刑司錢八十九萬後四日逮始辭行辛巳詔龍圖閣直學士汪藻所辟編類詔㫖官二貟並理在任月日俟成書投進日比附自來修書體例取㫖推恩右朝請大夫新廣南西路提㸃刑獄公事吕聰問直祕閣以樞密院言聰問在閩中招捕海賊鄭廣宣力故也又賜福建安撫使張致逺詔書奬諭致逺賜詔在是年甲申壬午翰林侍讀學士兼史館修撰范冲言近重修神宗皇帝實録於朱墨二本中有所刋定依奉聖㫖别為考異一書明著是非去取之意以垂天下後世今來重修哲宗皇帝實録考其議論多有誣謗以當日時政記及諸處文字照據甚明亦乞别為一書志其事實欲以辨誣為名每月校勘到卷數差人吏親事官送至行在付冲看詳修定就呈監修相公訖有合添改去處即發回史館庶幾不致妨廢從之鑄行在所度支金倉部太府司農寺印嶽飛以孤軍無援復次鄂州是日新除崇政殿說書尹焞發涪州初焞固辭新命右朝議大夫䕫州路轉運副使韓固奉詔即所居敦遣焞始就道固時已有罷命俄除知開州固除郡在十月辛丑癸未詔太廟神主權奉安於平江府能仁寺遇朔享日令太常寺焚香詔嗣濮王仲湜安定郡王令懬交互赴行在武舉童子江自昭年十二能誦兵書及步射詔行宫户部賜帛寵之自昭江山人也直祕閣淮西宣撫司參議官李健知宣州降授右朝請大夫主管台州崇道觀陸彥欽知婺州降授右朝奉大夫直祕閣范正已知衢州彥欽等始為吳玠所劾送潼川府治罪而中書言别無合勘事理故以郡守處之事祖在去年閏二月是日左司諫王縉入對乞江浙人户預以米斛折納紬絹者抵斗交量勿收耗凡頭子縻費之類皆捐之翌日如所請行下時縉以大臣不和為憂乃言今陛下所以共濟艱難復大業者二三大臣爾或出而總戎或處而秉軸交修政事之間進退人才之際謀慮有不相及則初意未必盡同茍無私心惟其當而已願戒大臣俾同心同德絶猜間之萌以同濟國事至再三言之縉疏在此月而不得其日因縉上殿附見乙酉詔龍神衛四廂都指揮使洪州觀察使行營前護副軍都統制權都督府參議軍事王彥免持服彥行至鎮江遭母憂上疏乞解官不許仍趨還引對時左武大夫康州刺史种潜為彥中軍統制官從至行在詔潜領文州團練使亦以金帶錫之潜師中子也彥入對潜遷官並在十月丁酉丙戌故左宣義郎石芳特贈一官芳元符末為太學正坐上書入邪上尤甚籍停官興元府羈管至是用其家請而贈之詔宜州守臣兼帶提㸃買馬丁亥吏部侍郎晏敦復權戶部侍郎王俁等上紹興重修祿秩新書五十八卷看詳一百四十七卷乞鏤板施行詔俁落權字敦復與離所提舉詳定官各進一秩在所刪定官遷秩者一人選人改京秩者五人其後俁再辭乃止遷一秩三省戶刑房已下减磨勘年有差戊子詔江東轉運使向子諲應副劉光世軍錢糧副使俞俟應副張俊軍錢糧子諲與俊不協俊數有論奏而光世向氏壻也故改命之尋詔子諲與直祕閣兩浙轉運副使俞俟兩易子諲乞還政不許子諲與俞俟兩易在十月庚子乞致仕不允在戊申今聫書之命户部貟外郎霍蠡就鄂州置司專一總領嶽飛一軍錢糧左承議郎新提舉兩浙西路常平茶鹽公事計有功充都督行府書寫機宜文字己丑徽猷閣直學士江南西路都轉運使趙子淔升寶文閣直學士以中書言子淔應副嶽飛大軍及行府官兵錢糧無闕故也轉運判官逄汝霖令再任建州布衣胡憲特賜進士出身添差建州州學教授憲安國從兄子也有學行纍召不至右朝請大夫知處州吕丕問直祕閣徽猷閣待制知明州仇悆直徽猷閣知衢州吳革各進一官以三省言丕問等究心郡政吏戢民安故也溫州進士張頠召赴都堂審察頠瑞安人以嵗旱民饑率鄉人就陶山湖之側築陂儲水溉田萬餘畝小民就食者且千人龍圗閣學士章誼時守溫州上其事于朝且言頠素有文行衆所推許乃有是命庚寅直祕閣秦梓知台州尚書左司郎中耿自求言竊見祖宗以來內自京師畿邑外及五路養兵數百萬衆所以重本兵也願詔天下諸州府招刺一二萬衆先足禁衛兵額次招上中禁軍仍寬以數年之限嵗選强壯及等之士以充其額詔樞密院措置是日張浚復往鎮江視師初僞齊劉豫因金領三省事晉國王宗維尚書左丞參知政事髙慶裔在兵間而得立故每嵗皆有厚賂而蔑視其他諸帥左副元帥魯王昌初在山東回易屯田遍於諸郡每認山東為已有及宗維以封豫昌不能平屢言於金太宗晟以為割膏腴之地以豫人非計晟不從及是豫聞上將親征遣人告急於金主亶求兵為援且乞先冦江上亶使諸將相議之領三省事宋國王宗磐言曰先帝所以立豫者欲豫闢疆保境我得安民息兵也今豫進不能取又不能守兵連禍結愈無休息從之則豫受其利敗則我受其弊况前年因豫乞兵嘗不利於江上矣奈何許之金主乃聽豫自行遣右副元帥瀋王宗弼提兵黎陽以觀釁於是豫以其子僞尚書左丞相梁國公麟領東南道行臺尚書令改封淮西王又以主管殿前司公事兼開封尹許清臣權諸路兵馬大總管尚書右丞李鄴為行臺右丞講議軍事戶部侍郎馮長寧為行臺户部侍郎兼行軍參議又以故叛將李成據李大諒征蒙記成此時為僞中侍大夫安化軍承宣使知鄭州孔彥舟關師古為將簽鄉兵三十萬號七十萬分三路入冦中路由壽春犯合肥麟統之東路由紫荆山出渦口犯定逺縣以趨宣徽姪猊統之西路由光州犯六安彥舟統之僞詔榜示指斥鑾輿尤甚於五年淮泗之役諜報豫挾金兵來寇主管殿前司公事楊存中在淮壖先以二百騎馳至盱眙觀形勢還奏事留宿內殿三日條上禦冦之策於是分遣諸將以備要害時江東宣撫使張俊軍盱眙沂中軍泗上京東淮東宣撫處置使韓世忠在楚湖北京西宣撫副使嶽飛在鄂聲勢了不相及獨淮西宣撫使劉光世在當塗光世遣輕騎據廬而沿江一帶皆無車馬左僕射趙鼎甚憂之浚乞先往江上視師至是發行在辛卯中書舍人董弅言陛下雖當巡狩必載廟主然近嵗時享徒以有請勿殺牛者至三牲不備而謂之隨宜今陵寢尚淪僞境嵗時衣冠之遊未獲嚴奉獨有太廟神主祀事必過於厚情文始稱願明詔禮官舉行以稱陛下祇事神靈之意從之都督行府擬定盜賊徒中自相招誘出首賞格五十人已上守闕進勇副尉三千人忠翊郎凡十等仍並賜銀絹有差壬辰上諭大臣曰資治通鑑首論名分其間去取有益治道即知司馬光雅有宰相器若唐鑑正可為諫書耳何俌龜鑑髙宗之崇儒講學即太宗身屬槖鞬風灑露沐而鋭情經術開文學館之時也况聖訓有曰朕之務學欲知治亂成敗君子小人之迹而他日之讀通鑑且曰通鑑去取皆益治道唐鑑正可為一諫書耳是則帝王務學也豈徒誦說云乎哉左司諫王縉言竊見軍興以來費用百出州縣科敷有不能免已降指揮官戶並同編户所以寬下民也諸處寺院有莊産多者類請求於貴臣之門改為墳院乞免科敷朝廷優禮大臣特從所請然官戶既不免墳院之名蓋緣官戶豈得獨免哉况又前宰執貟數不少所在僧徒僥幸干請使莊産多者獨免則合科之物均之下戶非官户同編戶之意也詔户部申嚴行下左朝奉郎林叔豹知饒州叔豹為御史坐秦檜纍久斥至是稍復之進士何疇獻孫子解語賜束帛癸巳翰林學士朱震言按大理國本唐南詔大中咸通間入城都犯雍管召兵東方天下騷動藝祖皇帝鑒唐之禍乃棄越嶲諸郡以大渡河為界欲冦不能欲臣不得最得禦戎之上策今國家南市戰馬通道逺夷其王和譽遣清平官入獻方物陛下詔還其直却馴象賜勑書即桂林遣之是亦藝祖之意也然臣有私憂不可不為陛下言之今日干戈未息戰馬為急桂林招買勢不可輟然而所可慮者蠻人熟知險易商賈囊槖為姦審我之利害伺我之虛實安知無大中咸通之事願密諭廣西帥臣凡市馬之所皆用謹信可任之士勿任輕狷生事之人務使羈縻而已異時西北路通漸减廣馬庶幾消患未然詔劄與廣西帥臣建炎以來繫年要録卷一百五建炎以來繫年要録卷一百五金人地名考證貝勒原書作孛堇誤改見卷一烏珠原書作兀术誤改見卷一
