body:
  text: 建炎以來繫年要録卷一百四十宋李心𫝊撰紹興十有一年夏四月己巳朔四川轉運副使左中奉大夫直徽猷閣李唐孺特進一官右中散大夫井度直祕閣録餉軍之勞也壬申御史中丞何鑄言御前軍器所既屬工部郎合隸臺察又匠工四千五百餘人內二千九百餘人係諸郡差到乞揀退其老弱不堪者從之癸酉宿州觀察使帶御器械鄭藻知閣門事乙亥鎮潼軍節度使開府儀同三司判婺州信安郡王孟忠厚判紹興府兼照管昭慈聖獻皇后􅓖宫照管􅓖宫繫銜此似因向者劉一止論列之故去年高世則判溫州帶景靈宫使入銜前亦未有例也國學免解進士張竤上書言四川之利其興未盡者有二鄉兵不可不盡教軍糧不可不廣糴大略欲教民兵於內郡而令五等戶糧納夫錢漕司差官於豐穰之郡買糧則不患不足又言州縣官擾民及隔槽破産科舉徇私入粟之人居官貪墨等凡十三害詔胡世將張燾相度按燾為路帥而兵財之事與宣司同相度此所謂四川事盡委卿也丙子詔諸州縣量收免行錢自宣和間始復熙寧舊法罷行戶而令輸錢至靖康初又紹興初元年三月雖令現任官市買方物悉如民間之價而汙吏猶虧其直議者以為不便㑹興軍用乏遂復令免行仍詔公私和買物色竝依市直違者以自盜論日厯無此指揮今以紹興十二年七月二十四日户工部看詳狀收入己卯參知政事兼權同知樞密院事孫近充資政殿學士提舉臨安府洞霄宫金人之犯淮西也近請召張浚都督諸軍秦檜大惡之及敵退御史中丞何鑄乃論近本無體國之忠但有謀身之計乞行罷黜近聞引疾求去上未許鑄又劾近懷私立異殿中侍御史羅汝楫因交章論近於君父之前則繆為將順而多所面從對士大夫之前則退有後言而惟知掠美乃有是命癸未太府少卿沈昭逺守尚書右司員外郎司農寺丞李椿年為尚書度支員外郎乙酉太尉慶遠軍節度使知鎮江府郭仲荀為醴泉觀使免奉朝請仲荀引疾求去故有是命戊子上曰陳亡士卒多寡之數人言不同恐有漏落則忠魂義魄或不䝉贈典莫若出榜使死事之家得以自陳則實數見矣右承事郎張子顔右承務郎張子正竝直祕閣賜六品服二人皆浚子時浚自建康來朝既對遂有是命自是大將子孫率多除職焉庚寅復置將作軍器監長二各一員詔祖宗時樞密院無計議官可罷之顯謨閣待制樞密都承旨周聿沿江㸃檢措置防守還入見右宣議郎樞密院計議官王湛直祕閣充節制陕西諸路軍馬兼措置河東忠義軍馬司參議官右文殿修撰湖北京西宣撫司參謀官朱芾充敷文閣待制知鎮江府司農卿李若虛充祕閣修撰知宣州二人皆嶽飛幕客也自軍中隨飛赴行在上將罷飛兵柄故先出之辛卯詔給事中直學士院范同令入對初張浚在相位以諸大將久握重兵難制欲漸取其兵屬督府而以儒臣將之㑹淮西軍叛浚坐謫去趙鼎繼相王庶在樞府復議用偏裨以分其勢張俊覺之然亦終不能得其柄至是同獻計於秦檜請皆除樞府而罷其兵權檜納之乃密奏於上以柘皋之捷召韓世忠張俊嶽飛竝赴行在論功行賞時世忠俊已至而飛獨後檜與參知政事王次翁憂之謀以明日率三大將置酒湖上欲出則語直省官曰姑待嶽少保來益令堂厨豐其燕具如此展期以待至六七日及是飛乃至上即召同入對諭旨令其與給事中兼直學士院林待聘分草三制是夕鎖院壬辰揚武翊運功臣太保京東淮東宣撫處置使兼河南北諸路招討使節制鎮江府英國公韓世忠安民靜難功臣少師淮南西路宣撫使兼河南北諸路招討使濟國公張俊竝為樞密使少保湖北京西路宣撫使兼河南北諸路招討使嶽飛為樞密副使竝宣押赴本院治事世忠既拜乃製一字巾入都堂則裹之出則以親兵自衛檜頗不喜飛披襟作雍容狀檜亦忌之中興聖政何俌龜鑑曰謬哉范同之為檜畫計也同之議曰諸將俱握重兵必甚難制莫若皆除樞密而罷其兵權此范同但求以助和議而然也檜乃用之詔罷宣撫兵隸樞院附和則保富貴是故張俊先至則除美官韓世忠劉錡不言和則傷於讒嶽飛最後至被禍最慘矣詔三省樞密院官依東京舊例分班奏事癸巳詔參知政事王次翁序位在嶽飛之下以飛階官為少保故也飛請班次翁之下不許上謂大臣曰昔三宣撫之兵分為三軍故有此軍作過而往投彼軍者今合為一則前日之弊革矣監察御史祝師龍試太府少卿大理寺丞王師心為將作少監軍器監丞鮑琚為軍器少監填復置闕師心與祝師龍皆自廣州鞫獄還故有是命乙未樞密使張俊言臣已到院治事見管軍馬伏望撥屬御前使喚時俊與秦檜意合故力贊議和且覺朝廷欲罷兵權即首納所統兵上從其請復召范同入對命林待聘草詔書奬諭詔詞略曰李郭在唐俱稱名將有大功於王室然光弼負不釋位之釁陷於嫌隙而子儀聞命就道以勳名福祿自終是則功臣去就趨舍之際是非利害之端豈不較然著明意蓋有所指也上謂韓世忠張俊嶽飛曰朕昔付卿等以一路宣撫之權尚小今付卿等以樞府本兵之權甚大卿等宜各為一心勿分彼此則兵力全而莫之能禦顧如烏珠何足掃除乎是曰詔宣撫司竝罷遇出師臨時取㫖逐司統制官已下各帶御前字入銜令有司鑄印給付且依舊駐劄將來調發竝三省樞密院取旨施行仍令統制官等各以職次高下輪替入見王伯庠撰王次翁叙記云紹興辛酉敵人有飲馬大江之謀大將張俊韓世忠皆欲先事深入惟嶽飛駐兵淮西不肯動上始有誅飛意又世忠軍中親校溫濟者以世忠陰事來告朝廷置濟於湖南世忠連上章乞遣濟至軍中語甚不遜是時三大將皆握重兵輕視朝廷其年柘皋之捷有旨令大將入朝論功行賞俊世忠已到而飛獨未來秦檜為相先臣參知政事大臣止二人檜憂之甚先臣為之謀以明日率三大將置酒湖上欲出則語直省官曰姑待嶽少保來益令堂厨豐其燕具如此展期以待者六七日飛既到以明日鎮院皆除樞密使趣命入院供職罷其兵柄晡時有㫖鎮院明日宣麻是夜半復以制分命三大帥軍中列校使各統所部自為一軍更其銜曰統制御前軍馬凡其所統升黜賞罰得専逹之諸校喜於自便莫不欣然受命明日三大帥入授元樞之制既出則其所部皆已散去𨗳從盡以密院之人上之此謀惟先臣與秦檜預之天下歎服三帥既罷兵柄先臣語伯庠曰吾與秦相謀之久矣雖外示暗暇而終夕未嘗交睫脫致紛紜滅族非所憂所憂宗社而已事幸而成上之英斷與天合也吾何力之有按此所云夜半以制分命列校更其銜為統制御前軍馬一節與日厯所書不同日厯鎖院在辛卯降制在壬辰張俊歸部曲及諸將帶御前字在乙未前後凡五日不知伯庠何以云然姑附此更須詳考於是禮部侍郎鄭剛中言於檜曰前所共憂者一旦變為平安之道廟堂不動聲色而三大將惟恐奉上兵籍之不先彼曲士不通世務挾口舌以議政者已皆言塞意順謂此非常之舉因為檜陳善後之䇿凡七事大概以沿邊倚兵為重今大帥去則人心懼昔日三帥兵律不同今合而用之固有以更易為便亦有念舊而不能忘者又三帥分地而守各任其責今統制官在外有如塵蒿使誰糾合又諸軍係宣司按月勘請今既罷合漸立法庶無冒請之弊傳曰平亂責武臣望以數事悉付右府俾經畫之而酌其可否他日攻守進退彼不得為言矣右正言万俟卨試右諫議大夫丙申詔三宣撫司官屬竝優與升等差遣是月慕容洧破新泉寨又攻㑹州將官朱勇拒戰破之洧憤將益兵入寇川陜宣撫副使胡世將遺洧書勉以忠義且言金人欲髠五路之人太尉抗論以為不可人心積怒金人而歸恩太尉誠乘此時料簡精鋭保據險阻儲積糧食繕治甲兵拒此殘敵為持久計敵必舉兵以攻太尉據險以待世將當出兵岐隴共乘其弊如此則太尉今日之舉乃吳公和尚原之舉也吳公之勳業寵祿不再見於太尉焉往哉比聞金人有疑太尉心而置同帥於山後事危矣計不早定計必中發先發者制人不易之論也惟太尉圖之洧自是不復侵邊勇本洛城人在㑹州嘗與夏人戰擒其驍將由是知名五月戊戌朔故武節郎殿前司統制官鄭滋等六人贈官録子孫有差以淮西戰殁故也己亥給事中兼直學士院實録院修撰范同為翰林學士是日柔福帝姬薨於五國城此據十二年九月僞公主案欵修入庚子賜三宣撫司統制官以下詔書朕延登秉鉞之元勳竝任本兵之大計凡爾有衆朕親統臨肆其偏裨咸得専逹尚慮令行之始或墮素習之規其各勵於乃心以務肅於所部詔林待聘所草也辛丑直祕閣淮東轉運副使胡紡為司農少卿總領淮東軍馬錢糧置司楚州尚書度支員外郎總領提舉大軍錢糧等事吳彥璋為太府少卿總領淮西江東軍馬錢糧置司建康府太府少卿總領湖廣江西財賦㑹慥為太府卿總領湖廣江西財賦京湖軍馬錢糧置司鄂州各専一報發御前軍馬文字諸軍竝聽節制蓋使之與聞軍事不獨職餽餉云總領官正名自此始壬寅右文殿修撰陳桷充敷文閣待制知池州蘄州防禦使辛永宗為明州觀察使提舉亳州明道宫右武大夫欽州刺史王敏求為左武大夫添差兩浙西路兵馬鈐轄仍釐務桷韓世忠幕客永宗敏求張俊嶽飛親校也以罷從軍故遷之詔親衛大夫利州觀察使荆湖南路馬步軍副總管馬擴纍乞宫觀特依所乞癸卯御前統制昭信軍承宣使王勝江州觀察使劉寶竝加龍神衛四廂都指揮使磁州團練使成閔為棣州防禦使中亮大夫果州觀察使嶽超領武勝軍承宣使四人皆韓世忠部曲也成州言同谷縣民王澤六世同居行義異常宅前後有二柳皆同根幹中分二股上復長合實為奇詔旌表門閭甲辰顯謨閣待制樞密都承㫖周聿試尚書刑部侍郎試尚書禮部侍郎鄭剛中為寶文閣直學士樞密都承旨御前統制武功大夫通州團練使兼閣門宣贊舍人李捧落階官為岷州團練使敦武郎顧暉為武翼大夫忠州刺史二人皆張俊部曲也乙巳樞密使韓世忠獻西馬五百匹在楚州諸軍者詔收入帳丙午詔文臣封叙竝許帶左右字丁未詔韓世忠聽候御前委使張俊嶽飛帶本職前去按閲御前軍馬専一措置戰守時秦檜將議和故遣俊飛往楚州總淮東一全軍還駐鎮江府二樞密出使未見降旨之日今年六月二十日耿著欵狀云五月上旬有指揮韓世忠聽候御前委使張俊嶽飛出外按閲軍馬丁未初十日也故附於此日又按日厯此月十一日戊申韓世忠獻錢糧之在楚州者宜與此相關權附此須求他書參考夲日戊申樞密使韓世忠言自提兵以來有回易利息及收簇􅔨積軍須見在錢一百萬貫排垜楚州前軍軍中耕種竝椿管米九十萬石見在楚州封樁及鎮江府掦楚真州高郵縣江口瓜州鎮正賜公使回易激賞等酒庫一十五合行進納望下所屬交收詔嘉獎尚書右司員外郎沈昭逺權户部侍郎時命昭遠措置津發般運楚州錢米故有是命後三日昭遠辭行太常少卿陳桷權尚書禮部侍郎尚書左司郎中施垌守太常少卿左武大夫忠州刺史王剛武功大夫果州團練使知襄陽府御前遊奕軍統制武糾竝進橫行一官二人皆嶽飛部曲也己酉尚書右司員外郎錢葉太府少卿李公懋竝為左司員外郎司封員外郎楊願司勳員外郎莊必强竝為右司員外郎庚戌龍神衛四廂指揮使福州觀察使韓世良為奉國軍承宣使提舉醴泉觀世忠之使樞密也世良自權主管步軍司公事引嫌罷軍職故遷之辛亥御前統制相州觀察使王德為興寧軍承宣使廬州觀察使田師中為保寧軍承宣使協中大夫武勝軍承宣使劉寶翊衛大夫武勝軍承宣使李橫竝為正任觀察使新州刺史馬立為正任防禦使翊衛大夫楚州團練使張淵落階官德仍充侍衛視軍馬軍都虞候師中立竝充龍神衛四廂都指揮使六人皆張俊部曲以宿亳功依所擬定也壬子上謂宰執曰士大夫言恢復者皆虛辭非實用也用兵自有次第朕比遣二樞使按閲軍馬指置戰守蓋按閲於先則兵皆可戰兵既可戰則能守矣待彼有釁然後可進討以圖恢復此用兵之序也甲寅詔樞密行府於鎮江府置司仍令遍行巡厯措置直祕閣知泰州王㬇為淮南東路轉運副使丙辰罷三樞密府承受文字宦者員以御史中丞何鑄言韓世忠等既已除樞密使副稽之典故大臣投進文字自有通進司欲望減罷承受文字官故有是命中書舍人程克俊淮南幹事還入見檢校少傅保信軍節度使提舉臨安府洞霄宫汪伯彥薨年七十三上悼之後九日降制除開府儀同三司到仕訃聞贈少師賜其家田十頃銀帛千匹兩官給葬事又官其親屬二人於饒州後諡忠定熊克小厯稱是日開府儀同三司汪伯彥卒於饒州伯彥除儀同在此月乙丑方囊時第以檢校官為節度使也庚申太尉保成軍節度使充殿前副指揮使主管都指揮使公事楊沂中為檢校少保開府儀同三司賞柘臯之捷也林泉野記云楊沂中濠州敗績殿前司兵幾盡秦檜利其繆加沂中開府儀同三司以慢軍勢資政殿學士知泉州富直柔提舉臨安府洞霄宫先是州之録事參軍誤以流罪囚陳翁進為死罪囚陳進哥既論決矣直柔乃自劾上以大臣不問但劾其官吏直柔慚懼力請奉祠言者論之詔提刑司取勘右朝議大夫直敷文閣江西轉運副使李中儒以淮西餽運之勞特轉行一官左武大夫耿著遙郡刺史添差荆湖南路兵馬都監著韓世忠親校也於是世忠官屬十五人竝進秩一等選人改合入官徽猷閣待制提舉江州太平觀勾濤卒於秀州濤奉祠退居上歲賜以金帛茶藥恩禮優異嘗除知潭州不赴比訃聞上顧近臣曰勾濤死矣悼惜久之辛酉布衣虞宰獻樂曲詩上頌大臣曰士大夫所進文字朕詳覽熟思蓋欲知民之利病政之臧否朕躬之得失耳若溢美之言實不欲聞可令還之乃詔檢鼓院自今獻無益之言不干政體者勿受癸亥左朝請大夫直祕閣劉阜民充祕閣修撰知秀州以淮東宣撫司結局推恩也饒州童子江安國九歲其弟定國七歲皆能誦經子書詔免解一次甲子侍衛親軍馬軍都虞侯興寧軍承宣使熙河蘭鞏路馬步軍副都總管御前統制王德為清遠軍節度使賞柘皋之捷也龍神衛四廂都指揮使保寧軍承宣使秦鳯路馬步軍副都總管御前統制田師中為平江軍節度使亦賞柘皋之捷也初張俊之長子早卒其婦更嫁師中因呼俊為阿父事之如子姓故每戰必有奇功而天下之人不信其果戰也至是王德竝建節鉞人無愚智皆以德為當而不稱師中此竝據徐夢莘所編附入詔丁憂人前左奉議即張九成令在家持服候服闋日取旨初徑山儈宗杲聚徙十餘士大夫從之游者甚衆而九成亦往來其間秦檜疑其議已言者即奏近者朝廷延登功臣置之樞管而異意之人不顧安危鼓倡浮言誑惑衆聽如九成者實為之首宗杲從而和之恣行誹訕務欲搖動軍政以快其私伏望嚴賜處分詔宗杲特還俗送衡州編管而九成有是命左朝散大夫王燾落致仕燾守象州年五十九歲而告老至是顯謨閣學士梁揚祖等三人薦其才故復令出仕言者論燾頃以受賕事露為部使者按治遽稱疾休致不可再齒搢紳乃罷之丙寅左中大夫直祕閣淮東轉運副使王㬇升直龍圖閣以㬇往在單州嘗應副元帥府錢糧礙止法未得遷故也詔汀州編管人范漴免監管令赴貶所漴守鄂州坐故縱郝抃為韓世忠所劾抵罪至是用世忠請而釋之事祖見紹興九年正月六月戊辰朔責授單州團練副使劉子羽復右朝請大夫知鎮江府無沿江安撫使初樞密使張俊嘗為子羽之父韐部曲韐器之俊薦其才故復用俊晚年主和議與秦檜意合上眷之厚凡所言朝廷無不從薦人為監司郡守帶職名者甚衆自俊晚年主和議已下竝據林泉野記附入辛未上謂大臣曰外國不可責以中國之禮朕觀三代以後惟漢文帝待胸奴最為得體彼書辭倨傲則受而較彼軍旅侵犯則禦而逐謹守吾中國之禮而不以責外國此最為得體也權尚書工部侍郎朝謙之充敷文閣待制提舉江州太平觀謙之引疾乞祠故有是命直祕閣三京等路招撫處置使司參謀官陳衮為淮南東路轉運副使壬申户部奏贖刑文字上曰朕謂凡為政之本必抑强扶弱民乃能立今使富者犯死法得以金自贖則貧無金者豈能獨立乎贖刑即非祖宗法似未可用也太府卿總領湖廣江西財賦㑹慥充祕閣修撰提舉洪州玉隆觀以疾自請也左朝請郎林大聲為尚書度支員外郎總領湖廣江西財賦湖北京西軍馬錢糧大聲侯官人初為永嘉丞用章誼薦擢守建昌秦檜寓居永嘉與之厚遂驟用之癸酉分行在省倉為三界界百五十萬斛凡民戶白苖米南倉受之以廪宗室百官為上界次苖次北倉受之以給衛士及五軍為中界糧米東倉受之以備諸軍月糧為下界甲戍上謂宰執曰中興自有天命光武以數千破尋邑百萬豈人力所能乎朕在宫中聲色之奉未嘗經心只是靜坐內省求所以合天意者秦檜曰陛下聖德畏天如此中興可必也乙亥左光祿大夫守尚書右僕射同中書門下平章事兼樞密使華國公秦檜為特進尚書左僕射封慶國公宣制畢上臨軒再坐引檜入見命坐賜茶詔有司造尅敵弩韓世忠所獻也上謂宰執曰世忠宣撫淮東日與敵戰常以此弩勝金朕取觀之誠工巧然猶未盡善朕籌纍日乃少更之遂增二石之力而減數斤之重今方盡善後雖有作者無以加矣乃命殿前司閲習將士有能貫甲踰三石力弩施三十矢者進秩一等三石五斗力者倍之賞格在七月丁巳辛巳右宣教郎主管台州崇道觀趙慶孫等六人竝停官永不得與堂除以言者論其不孝也或曰慶孫嘗為趙鼎所薦故秦檜斥之壬午布衣吳曾特補右迪功郎曾臨川人獻所著左氏發揮而有是命癸未資政殿大學士江南東路制置大使兼知建康府葉夢得升觀文殿學士徽猷閣待制知明州兼浙東沿海制置使仇悆與寶文閣直學士知平江府兼浙西沿海制置使梁汝嘉兩易悆為人劾急軍士頗不安之僧王法恩因與軍民施宥鄒子明等陰謀為變法恩者以持穢迹呪著驗郡人頗神之不逞之徒因以是幸富貴約以是月庚寅奉法恩為主舉兵盡戕官吏及巨室然後掃衆趨臨安不得志則逃入海悆改命後六日其徒書法恩甲子詣卜者包大常問休咎俄而沓至所問命皆同大常疑焉始最後至者曰此非君五行在五術中有不可言之貴其人安在我當自與言不敢泄諸人也法恩至其肆大常遽拜之𨗳以人俾妻子拜舞奉觴為壽良久大常詐為市殽饌密詣直徽猷閣通判權州事高世定告之世定亟遣兵官掩捕得法恩與其徒數十人皆論如法以大常為保義郎據浙東提刑司所申大常以六月二十二日告變悆以十六日改除相去六日大常八月補官今併書之是日張俊嶽飛至楚州飛居城中俊居於城外中軍統制王勝引甲軍而來或告俊曰王勝有害樞使意俊父名密四月甲午得旨以樞使稱呼俊亦懼問何故擐甲勝曰樞使來㸃軍不敢不貫甲耳俊乃命卸甲然終憾之飛視兵籍始知韓世忠止有衆三萬而在楚州十餘年金人不敢犯猶有餘力以侵山東可謂奇特之士也時統制河北軍馬李寶戍海外飛呼至山陽慰勞甚悉使下海往山東牽制寶焚登州及文登縣而還俊以海州在淮北恐為金人所得因命毁其城遷其民於鎮江府人不樂遷莫不垂涕俊遂總世忠之軍還鎮江惟背嵬一軍赴行在甲申右武大夫忠州團練使知河南府李興以所部至鄂州興據白馬山與李成相拒凡數月朝廷以興糧餉道梗孤軍難守乃命班師興率軍民僅萬人南歸至大章谷遇金人數千要路興擊退之至鄂州都統制王貴言於朝遂以興為左軍同統制辛卯武經郎吉陽軍使楊雍言徽宗御製叙述宣和內禪事因及罪已奏天密表真本見在萬安軍蔡攸子孫家詔藏敷文閣壬辰太保三京等路招撫處置使雍國公劉光世罷為萬壽觀使金人始渝盟光世嘗請以舒蘄等五州為一司選置將吏宿兵其中為藩籬之衛諫官万侯卨言光世欲以五州為根本將斥旁近地自廣以襲唐李藩鎮之弊不可許也及是三大將既罷光世入朝因引疾丐祠上謂大臣曰光世勳臣朕未嘗忘聞其疾中無聊昨日以玩好物數種賜之光世大喜秉燭夜觀幾至四更朕於宫中凡玩好之物未嘗經目止須賜勳舊賢勞耳光世既罷遂寓居永嘉焉光世乞五州為一司據孫覿撰卨墓志云耳而不得其年月熊克小厯附之去年六月按卨去年閏六月始自湖北提刑還朝附湖南運判又除監察御史八月方除右正言克蓋甚誤今權附此當求其本日丙申金州言免解進士蔣舉宣和初丁母憂廬墓墳生芝草詔旌表門閭是月川陜宣撫副使胡世將言敵人自聞烏珠大敗之後其跳梁之勢比之前日稍衰此廟堂制勝將士協和大挫凶威福及遐邇天下幸甚薩里罕在長安猶敢揭榜諸處自謂東南獲捷以安人心衆不可欺往往唾罵三月二十二日長安白日昏暗至舉燈燭又鋒刃之端悉皆有火議者謂白日昏暗陰太盛也鋒刃有火將自焚也敵方肆其貪暴結怨士民其滅亡固可待矣近差往長安幹事官吳名世申金人纍經敗衄可以乘勢出兵緣金人重兵多在岐隴一帶不住探得練兵聚糧欲來侵犯又各增城濬濠為自保之計度其勢固未能動止恐别有包藏臣見今精審間探密結土豪多方以圖之非十分得便豈敢輕舉向䝉朝廷指揮令招諭慕容洧此最今日所宜先者本司節次遣人入僞地先次結約到環慶路都監屈元等又令幹事官章欽并間探人王貴張仲元等密切前去及聞秦弼見作僞涇原帥近與金人有隙亦令齎書諭以朝廷德意冀其改圖自餘忠義軍民在陜西結集者甚多一一推誠撫納仍令各先占地利可以保聚俟有機便則內外相應竝據前後探報計算元帶過河甲軍從軍約五萬人自去年五月至今諸將獲捷大小五十次殺傷及招收敵軍約三萬人若陜右忠義保聚得數處稍能自立則敵勢必分其弊可乘當與諸帥共圖進擊或見機便不敢遺力徽猷閣待制洪皓在敵中求得皇太后書是夏遣邵武布衣李微齎來上大喜因御經筵謂講讀官曰不知太母寧否幾二十年雖遣使百輩不如此一書遂命微以官此據洪皓行述建炎以來繫年要録卷一百四十建炎以來繫年要録卷一百四十金人地名考證烏珠原書作兀术誤改見卷一薩里罕原書作撒離喝誤改見卷十一
