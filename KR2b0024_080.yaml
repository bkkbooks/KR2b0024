body:
  text: 建炎以來繫年要録卷八十宋李心傳撰紹興四年九月丁未朔直徽猷閣主管臨安府洞霄宫李謨為江南西路轉運副使應副嶽飛大軍錢糧先是轉運副使曾紓除司農少卿而殿中侍御史張致逺論紓媚附中人自絶清議遂罷去乃改命謨紓以八月己亥除少農壬寅别與差遣祕閣修撰王倫主管江州太平觀放辭謝限三日出門日歷是日侍御史魏矼上殿恐是論倫當考右奉議郎吕應問貸死除名化州編管先是朝議取宣諭官所劾贓吏擇最重者一人用祖宗故事決之應問前知華亭縣與右承奉郎池州貴池縣丞黃大本皆繫獄刑部言應問犯自盜贓六十三匹大本犯枉法贓一百四十五匹比之應問數多乃令應問先次依法擬斷詔諸路州軍各給承信郎至成忠郎告身一道俟有忠義告變人即書填給付時論者以為方今州縣皆宜曲為之防如建昌軍小壘公私所傷性命金寶不知幾何當結謀之時使有告者不過費一保義郎告身爾望給告付逐州緩急之間便行書填乃是賞不踰時之意故有是命戊申吏部侍郎兼直學士院孫近兼侍講近言祖宗之法無私如天地難犯如江河皎如日月之明著在令甲垂裕萬世雖元豐之後建三省分六曹更新庶事而銓選科舉刑罰廪祿之制亦多循襲祖宗之舊比年以來風俗習為僥幸有求者志於茍得有罪者期於幸免而為人變法者多矣伏望聖慈執祖宗之制堅如金石行祖宗之令信如四時凡啓僥幸之門而輕議變祖宗之法者一切裁抑以示天下之公詔劄與六部給事中張綱提舉江州太平觀以侍御史魏矼論綱傾邪媚竈論事誕謾也左朝請郎致仕賜緋魚袋徐時彥追四官奪所賜進士及第敕并章服時彥為蔡京館客用臨幸恩特赴殿試至是請再仕都省批送吏部審量故黜之詔減淮浙鈔鹽錢每袋三千今年正月乙卯所增令諸場對支新舊鈔各半以户部言𣙜貨入納遲緩故也自渡江至今鹽法五變而建炎舊鈔支發未絶乃命以資次前後從上併支焉建炎三年二月二十一日改鈔法紹興二年九月二十七日又改十一月十七日又改今年正月五日又改通今次所改凡五色趙鼎事實云自南渡以來國計所賴者惟鹽每因闕用則改新鈔以幸入納之廣苐茍目前不知利權悉為商賈所持去年冬鼎請立對帶之法商賈聽命而鹽法遂為定制除去積年之弊加以出剩立為分數許入納不對帶二法並行出入有常源源不絶始不為巨猾所制矣按對帶指揮乃在今年九月此時朱勝非為相鼎知密院不知何以云鼎所請且附此更須詳考己酉左中奉大夫知開州耿自求為川陜荆襄都督府隨軍轉運副使自求河南人已見建炎二年趙鼎所辟也是夜荆南制置司統制官王槩以所部叛於鼎州之城外西奔桃源縣庚戍縣寨統制官李臯遣小將龔亨率鄉兵擊敗之制置使王􅊅遣兵追至桃源而槩已死乃責臯取敗兵器甲臯復責亨亨亦隨叛會􅊅聞罷命而知鼎州程昌宇念亨屢充選鋒勇而敢戰作手書招之亨即復歸於是知鄂州程千秋遣準備使喚李寶入周倫寨招安得其報以歸詔以寶為進義副尉寶補官在此月戊申昌宇又乞選辰沅靖州洞丁牌弩手三百人相兼使喚辛亥從之壬子宰相朱勝非言湖寇逋誅兵久未解今已更命荆帥濟師益舟期於一舉必靜湖湘帥守郡縣轉運等官如敢玩寇尚蹈前失但為身謀無徇國心罪大當誅次亦流竄軍須調度或煩民力秪俟賊平合行寬恤有能出竒計立戰功以助破賊者宜加髙爵厚祿以酬其勞詔直學士院孫近草詔戒諭如所請詔賜川陜荆襄都督府度牒二萬道紫衣師號各二千五百道趙鼎之出使也乞度牒等如張浚例朱勝非難之鼎請不已然後許焉鼎又乞隨軍金帶二十條絹三萬匹米二萬石詔米以江西上供之數絹以𣙜貨務金銀折之鼎乞支金帶及米在八月戊子乞支絹在此月戊申鼎將行上疏曰陛下建炎中遣張浚出使川陜國勢百倍於今浚有補天浴日之功陛下有山河之誓君臣相信古今無二而終致物議以被竄逐夫喪師失地浚則有之然未必如言者之甚也大抵專黜陟之典受不御之權則小人不安其分謂爵賞可以茍求一不如意便生觖望是時蜀士至於醵金募人詣闕訟之以無為有何以自明故有志之士欲為國立事者每以浚為戒且浚有罪臺諫論之可也人主誅之亦無憾也今乃下至草澤行伍凡有求於浚而不得者人人投牒醜詆及其母妻甚者指為跋扈抑何甚哉今臣無浚之功當此重責去朝廷逺恐好惡是非行復紛紛於聰明之下矣伏望睿鑒憫臣孤忠使得展布四體少寬陛下西顧之憂鼎又言臣隨行兵除王進外取於密院及諸處才二千人而強壯者曾無數百又錢帛合依張浚例初乞錢百萬止得五十萬度牒二萬止得三千再乞得萬八千又乞始足元數臣日侍宸扆所陳已艱難如此况在萬里之外惟望睿斷不為羣議所移臣實萬幸朱勝非秀水間居録云紹興四年趙鼎除知樞密院事充川陜宣撫處置使時勝非起復居位已纍章乞持餘服鼎窺宰席甚急被命殊不樂申請數十條皆不可行如隨軍錢物須七百萬緡之類勝非參告進呈指此一項言昔聞玉音趙鼎出使如張浚故事浚自建康赴蜀朝廷給錢一百五十萬緡今鼎所須三倍以上今嵗郊恩所費不資上曰奈何勝非曰欲支三百萬緡半出朝廷已如浚數半令所部諸路漕司應副上可之既退鼎詬怒云令我作乞兒入蜀邪按鼎所得度牒二萬道是時每道直二百千止共得四百萬緡通紫衣師號與秀水録不合若以初乞所得錢牒計之止為一百一十萬緡亦與三百萬緡半出朝廷之説不同此勝非作相所行其自記不應有誤更須詳考賜史館校勘鄧名世進士出身寧逺軍承宣使同知行在宗正司事安定郡王令畤薨輟視朝一日贈開府儀同三司嗣濮王仲湜言其貧無以殮乃命户部賜銀帛百匹兩癸丑廢觀州為髙峯寨平州為王口寨初用明橐奏也是日吏部員外郎魏良臣閣門宣贊舍人王繪以使事入對先是良臣等至都堂面請使指朱勝非謂曰二君見上當自知之退見趙鼎鼎曰事之成否不在二君上所以遴選者恐語言應對間踈脫耳繪艴然而去及對上一一訓勑詳盡繪奏竊知已關偽齊遣臣奉使恐不測約日過界欲乞早辦禮物上曰大禮後可行退至朝堂具道上旨勝非等唯唯繪曰前此王倫歸言金人要遣使商量金人先遣王倫歸且道息兵議和之意須使人往議故遣潘致堯等行洎還云金人欲大臣往使故韓胡二樞密往尋金使李永夀王翊來聘所需三事故以章尚書孫侍郎往及還所議互有可否獨疆界一事未定今繪輩之行所授使指皆章孫已陳之迹金人每以逗遛為言此行逗遛之迹明矣今三尺童子皆謂敵情不可知未知廟堂以為如何勝非作色曰朝廷非不知但不遽絶使路公意如何繪曰欲更增嵗幣耳趙鼎曰只此數將來已不易出須減百官俸多方收簇方可辦繪曰今已增幣只是虛數諸公愕然曰何邪繪曰今敵之所欲吾淮南川陜之土地耳且以淮南鹽論之嵗一千萬緡與嵗幣孰多今雖增數敵未必受故曰虛數勝非曰待來日奏知更有何事繪曰所擕禮物六分尼瑪哈以下皆有之獨不及金主萬一親至彼中相見何以藉手豈有與其臣下不及其君者更有蕭慶高慶裔先令王倫作手書送信物去及章孫二公往二人亦來館中議事會私覿已盡無以贈之斯二人者乃用事人金人好賄萬一來館中須薄賂之欲乞更增私覿兩分不來即已勝非曰亦待奏知時金人已定議出兵而朝廷未知也甲寅建康鎮江府淮南東路宣撫使韓世忠奏遣使議和非計乞厲兵恢復上謂大臣曰世忠為國之忠甚切可降詔奬諭仍先開諭二聖在逺當時遣使通問起復直徽猷閣張宗元充湖南制置大使司參議官用席益奏也乙卯殿中侍御史張致逺言淮南營田四五年間不聞獲斗粟之用是必有不可行者况士卒驕惰官吏茍簡日復一日嵗復一嵗安得不解絃而更張乎今江北流寓之人失所者甚衆而淮甸耕夫往往多在南方樵芻自給豈無懷土之心若委逐處守令誘之歸業應有照驗物産盡數給還仍檢括荒地許人請佃隨其力之大小量給頃畝定經界立標表與為永業十年勿問兼營田而行之將見鄉聚相望阡陌相屬雞犬之聲相聞異時博糴其贏餘亦足以紓急闕而省轉餉願更詔羣臣啇𣙜利便斷而行之詔户工部相度申尚書省丁巳上謂輔臣曰諸大將固當奉法循理然細務末節可略而不問若事大體重係國家利害者不可不治也龍圖閣直學士提舉江州太平觀陳規復知德安府仍令規便道兼程之任如敢稽違重置典憲直祕閣閻旦為成都府路轉運副使左朝散大夫知蜀州師驥提點成都府路刑獄公事郭大中為利州路轉運副使左朝請大夫开南公提點利州路刑獄公事紹興後朝廷除川陜待次監司自此始驥彭山人建炎初為衛尉少卿大中成都人也南公初除江西漕寓居蘷州故就用之時宣撫司已用便宜除南公宫祠而行在未知也南公宫祠十一月七日奏到戊午上宿齋于內殿百官齋於本司己未中書門下省檢正諸房公事李大有卒詔賜其家銀帛百匹兩庚申命皇叔象州防禦使士街朝享太廟神主於溫州辛酉合祀天地於明堂起復尚書右僕射朱勝非為大禮使惟不入殿門他職如故禮畢赦天下勘會川陜應副軍須科使頻仍民力重困令都督府講究利害革去舊弊應襄陽府等六郡稅租科役等事並與放免三年諸路人户經金人殘破盜賊燒劫之後日前應干官私欠負並與除放歸業後稅役和買科率等更免兩科未曾離業者免今年稅役十分之四州縣違戾令提刑司按奏當議科除名之罪應州縣日前以軍興預借租稅及錢物並與當見今合納稅租如依前違戾當職官衝替應命官因出戰或捕盜中傷不堪釐務之人當議特加優恤奉使金國或緣差使及指名取過未回之家與西北土人流寓東南者令州縣多方存恤按月支行合得請給應被虜遺棄小兒十五嵗已下聼人收養即從其姓殘破州縣暴露遺骸募寺觀重行埋瘞每及二百人給度牒一道諸處盜賊除專降指揮不許招安原貸外限一月出首自新前罪一切不問內元係頭首及能勸率徒黨出首者優與轉補官資諸路合納和買紬絹於五分中特減一分以償本錢其減下一分令轉運司置場收買不得虧損上供額數應捕獲姦盜及軍中有犯罪當誅戮者並令依法勘鞫俟獄成方得行遣如事干機速不可待者須對衆研窮審取伏狀然後加刑仍即時報憲司驗實保明以聞如違皆科徒三年不以失論及以去官赦降原減其挾私者依本法坐罪初紹興宗祀止設天地祖宗四位至是始設從祀神位四百四十三用祭器十千五百七十一祭歌樂四十祭服六十三玉十二犢四羊豕各二十有二分獻官五十八奉禮郎四樂舞工共二百八十七而五帝神州地祗上不親獻用崇寧禮也始議設從祀諸神七百十一位會議者請裁省而禮官言十二階三百六十位無神名請每階各設三十五位每羊豕二正備一副登歌之樂通作宫架之曲皆許之四月乙未又以祭玉不備請除蒼璧黃琮外依天聖故事用珉既而得玉甚美然尺寸不及禮經乃命隨宜製造五月乙丑言者請如祖宗故事權御臺門肆赦七月戊辰議裁省者以為宫門地隘儀衛不能容乃止宣赦於常御殿前三衛班直宿衛忠佐忠鋭將兵神武右軍中軍七萬二千八百餘人共支錢二百三十一萬餘緡劉光世韓世忠嶽飛王􅊅四軍十二萬一千六百餘人共支錢二十八萬餘緡合內外諸軍共二百五十九萬餘緡視元年明堂增支九十四萬餘緡而宰執百官諸司給賜以軍興故權住於是省部禮寺官告院事務所行文書吏三百餘人增給或數月所費僅萬緡言者以為冗費乃命例支一月餘悉追剋焉此月庚午行遣南丹州防禦使莫公晟知南丹州兼管內溪洞都巡檢使提舉賊盜公事公晟既掠省地廣西經略司遣人開諭令供結狀且要其子武翼郎延穩為質公晟乞别除一職事主管彈壓一方遂從之甲子尚書左司貟外郎晏敦復兼權給事中詔董巽特補武翼郎閣門宣贊舍人巽商虢鎮撫使董先部曲用先請也乙丑詔三省樞密院録黃畫黃並依祖宗條例施行先是侍御史魏矼言國家法度森嚴講議畫一凡成命之出必先録黃其過兩省則給舍得以封駮其下所屬則臺諫得以論列已而傳之邸報雖遐方僻邑莫不如家至户曉此萬世良法也臣竊聞近時三省樞密院間有不用録黃而直降指揮者亦有雖畫黃而不下六部者紀綱廢弛莫此為甚欲望特詔三省樞密院常切遵守舊典以示至公遇兩院御史詣省院檢察日除實係機密邉事外悉令取索點檢如有違戾即具彈奏自古人臣弄權罔上者固自有術防微杜漸得不慎哉惟陛下留神省察故有是旨詔建昌軍賊首修逹等五人凌遲處斬同謀拒敵官軍江清等八人梟首受招安人劉淨特補進義校尉餘四人等第授官發付本路帥司使喚用江西安撫制置使胡世將請也既而殿中侍御史張致逺言艱難以來外郡軍變殺辱守長者屢矣既以重兵討蕩各正典刑未聞命以官者今建昌之變自知通以下數家幾至絶滅城中縱火殺人極其慘毒官吏士民悉遭黥刺前此未有而淨等皆素為頭首六七年間纍因小驚輒唱軍衆突入官府邀索犒設包藏禍心久矣知軍劉滂等不幸而值其變未聞朝廷窮治逆黨褒録死事之家遽報官此賊首五人深駭觀聼竊恐江西帥司解發此五人者謬為好語或出不獲已意必有在宜即械繫廷尉責正其罪或以為可宥則明白諭之使知有更生之幸仍分明送神武諸軍令得自效雖非所以示訓猶未深失事體今一旦釋其孥戮授以名秩揚揚而歸故鄉以歆羡其徒此豈州郡之利邪樞密院勘會淨等元據江西帥司稱被衆兵逼脅為首又曾勸諭賊衆首先受招委是忠義乃命世將究實申樞密院致逺章在十月戊寅是日吏部員外郎魏良臣閣門宣贊舍人王繪辭往金國軍前通問上曰卿等此行不須與金人計較言語卑辭厚禮朕且不憚如嵗幣嵗貢之類不須較見尼瑪哈為言宇文虛中久在金國其父母老日望其歸令早放還又言襄陽諸郡皆故地因李成侵犯不已遂命嶽飛收復良臣曰臣等近聞有探報朝廷祕不言乞聖慈宣諭上曰止是淮陽有舟船來運麥此不足慮良臣等退至都堂朱勝非已不入趙鼎孟庾胡松年聚堂同坐良臣等起白上指鼎曰事涉機密少時閣子中言之松年離席曰乞就此共議如何鼎不答繪退謂良臣曰趙樞密嘗以不預始議不肯預此事矣及再見鼎遣直省吏致意曰督府事不暇請與參政胡樞密議之良臣等出遇神武右軍都統制張俊來白事俊為二人言有探報金人大舉今過南京良臣等乞再對不報已上並據王繪甲辰通和録初偽齊劉豫既納其臣羅誘南征議見七月末乃遣知樞密院事盧偉卿見金主晟具言國家自大梁五遷皆失其土若假兵五萬下兩淮南逐五百里則吳越又將棄而失之貨財子女不求而得然後擇金國賢王或有德者立為淮王王盱眙使山東唇齒之勢成晏然無南顧之憂則兩河自定矣青冀之地古稱上土耕桑以時富庶可待則宋之微賂又何足較其得失金主晟命諸將議之左副元帥宗維左監軍希尹以為難右副元帥宗輔以為可於是以宗輔權左副元帥右監軍昌權右副元帥調渤海漢兒軍五萬人以應豫宗維希尹繇是失兵柄又以左都監宗弼嘗過江知地險易使將前軍宗輔下令燕雲諸路漢軍並令親行毋得募人充役豫遂命其子偽諸路大總管尚書左丞相梁國公麟領東南道行臺尚書令合兵來寇始議自順昌取合淝犯歷陽由采石以濟簽軍都制置使李成謂所簽民兵盡除山東餉道遼逺又慮嶽飛之軍自襄陽出攻其背不如沿汴直犯泗州渡淮以大軍扼盱眙據其津要分兵下滁和揚州大治舟楫西自采石以攻金陵南自瓜洲以攻京口仍分兵東下掠海楚之糧庶幾大利先是偽尚書右丞相張孝純既告老豫復起之孝純知豫必不能久欲自託於朝廷麟嘗飬俠士蒯挺等二十餘人待以殊禮孝純與挺厚得其隂謀又金人於沿海州縣置通貨場以市金漆皮革羽毛之可為戎器者以厚直償之所積甚衆孝純言於豫曰聞南人治舟久矣旦暮乘風北濟而所在岸口視之恬然茍利於吾彼寧不為之禁豫大懼遽罷通貨場至是豫將舉兵乃下偽詔略曰朕受命數年治頗有敘永惟吳蜀江湖皆定議一統之地重念生民久困不忍用兵故為請於大金欲割地封之使保趙氏之祀大金以元議絶滅但欲終其伐功力請逾堅方見聼許豈期蔑棄大德乃敢偽遣使聘密期吞噬是用遣皇子麟會大金元帥大兵直搗僣壘務使六合混一以上據偽齊録及張孝純所上書并熊克小歷於是騎兵自泗攻滁步兵自楚攻承諜報至舉朝震恐或勸上它幸議散百司趙鼎獨曰戰而不捷去未晚也上用鼎計侍御史魏矼嘗言陛下宵衣旰食將大有為而所任一相未聞有所施設惟知今日勘當明日看詳今日進呈一二細事明日啓擬一二故令政務山積於上賢能陸沉于下方且月一求去徒為紛擾宜亟從所請以慰公議先是右僕射朱勝非因久雨乞行䇿免故事以消天變又以餘服為請章十二上上許以俟總章禮畢如所請且有保全舊臣之論至是祀明堂已畢勝非復求去且論當罷者十一事矼亦疏勝非五罪由是得請鼎之為參預也常與諸將論防秋大計獨張俊曰避將何之惟向前一步庶可脫當聚天下兵守平江俟賊退徐為之計鼎曰公言避非策是也以天下之兵守一州之地非也公但堅向前之議足矣鼎蓋隂有所處故每日留身必陳用兵大計上意已悟又使俊密為之助至是決意親征留鼎不遣入蜀鼎奏用十月七日西行許之然上方向鼎已有命相之意矣丁卯知南康軍孫光庭罷端明殿學士知饒州董耘貶秩一等先是耘等言鄱陽湖有水寇詔本路帥司遣兵千人收捕而江東宣撫使劉光世以為所言不實故黜之言者論李敦仁范汝為等皆以官司不速掩捕養成其衆今罪此二郡則鄉縣有賊非州郡帥憲司審實體究必不敢聞奏緩急之際致失機會為害不細命遂寢十月辛巳詔耘光庭候分析到取旨明年二月乙未耘降官指揮不行閏二月己酉光庭知南安軍尚書兵部員外郎王純充川陜荆襄都督府詳議官戊辰龍圖閣直學士知靜江府折彥質充川陜荆襄都督府參謀官不許辭避用趙鼎奏也左宣義郎通判邵州劉式罷仍毁改官告敕式衡陽人與朱勝非外姻自言宣和末權平陽縣嘗設方略遣巡檢官捕獲強盜十有四人勝非不以付部遽用特旨改官至是侍御史魏矼論式素無清白之稱且朝廷爵命乃為大臣私家之用乞行追奪故有是旨己巳右司諫趙霈言臣嘗聞漢高祖初入關中約法三章殺人者死傷人及盜抵罪唐髙祖入京師約法十二條惟殺人劫盜背叛者死夫以漢唐二主當草昧之初雖約法尚簡猶不廢先王之刑辟故殺人者斷在必行以是知好生雖聖人之大德而殺有罪亦刑辟之所不赦茍殺人而不死傷人而不刑雖堯舜不能以致治也臣竊見比來在外刑獄例常淹延考其奏案原其情犯有法當論死初無可疑者奈何吏緣為姦以獄為市意在縱釋以故久而不決使已死之魄寃抑而不得逹被苦之家怨憤而不得申將何以召和氣乎臣未暇悉數如以建康府婺州論之建康百姓王紱等六人始因失牛仍報私怨共殺死一十三人獄具得旨處以凌遲處斬二等後因審問乃輒翻異今踰一年婺州豪民厲景欣昨緣賊發差充隘首搜山因捉到孔真疑其為賊其人兩次聲寃景欣不問來歷親斬首級昨體究詣實後來勘鞫兩經翻異今踰二年紱等殺人命為至衆景欣殺平人以希賞二獄久而不決皆欲遷延免死則死者何其不幸哉乞下兩路提刑司催督並限十日具案奏聞如稽留出限重行黜責庶寃枉得申和氣可召仰副陛下矜慎刑獄之意從之永豐縣故射士蔣青與其徒三人殺人縱掠縣令左從政郎黃延年捕斬之事聞詔放罪明年三月乙未降旨庚午起復左宣奉大夫守尚書左僕射同中書門下平章事兼知樞密院事監修國史朱勝非解官持餘服從所請也尚書兵部侍郎趙子畫乞補外罷為徽猷閣直學士知秀州左宣教郎主管江州太平觀朱震守尚書祠部貟外郎兼川陜荆襄都督府詳議官震言荆襄之間沿漢上下膏腴之田七百餘里土宜麻麥古謂之神臯若選良將民所信服者領部曲鎮之招集流亡務農重穀冦來則禦寇去則耕不過三年兵食自足又給茶鹽鈔於軍中募人中糴可以下江西之舟通湘中之粟觀釁而動席捲河南此以逸待勞之意也詔送都督府震奏以此月壬申行下時震始入見上首問以易春秋之旨震以所學對上大善之是日通問使魏良臣等發行在前二日直學士院孫近入對面稟國書指意次日良臣等省中見近笑而言曰非細再添良臣曰幾何近舉五指於胸前蓋聞有大舉意遂增作銀帛共五十萬至是得國書辭行會趙鼎等出餞朱勝非謝不見良臣等至秀州則聞金已渡淮遂兼程而去此以日歷及王繪甲寅講和録參修辛未左宣義郎熊彥詩守袐書丞彥詩坐王時雍纍久廢至是趙鼎引用之左從事郎喻樗王居修並為左宣教郎樗桐廬人居修中書舍人居正弟也二人並以趙鼎辟為江西制置大使司準備差遣隨府罷至是上召對而命之樗之制曰自熙寧用事之臣託儒為姦而斯文幾喪五十餘年其間不以一時之是非毁譽動其心而能審是其所學以不失其正者豈非豪傑之士歟爾少稟異才輔之篤學謀道力久卒用有成既窮伊洛之淵源遂見古人之大體藹然令聞逹於朕聞燕見便朝有嘉獻納改錫京秩將試爾能夫大學之道由誠意正心以至於治天下國家此爾昔之所聞於師而成已成物之要在是也勉行汝知無負所學居正之詞也徽猷閣待制胡安國聞之語人曰伊洛淵源古人大體雖其高第遊酢楊時謝良佐諸人尚難言之而况於樗乎居正又言草居修詞有嫌乃命都司官權中書舍人命詞行下都司攝詞命以二史皆闕而檢正又權給事中故也此事十月五日得旨按周綱除右司在此後二日故今不出其名壬申輔臣進呈上曰宰相有姦惡臺諫當言朕當施行若托以小過使人無善去者誰肯作相耶趙鼎等對曰陛下睿照如此臣鄰幸甚中書舍人兼史館修撰常同充集英殿修撰知衢州祕書少監劉大中為起居舍人左迪功郎仲并特改左承奉郎仍舊平江府府學教授并嘗從胡安國遊至是以薦者得召對故以命之制曰孔子稱可與共學未可與適道可與適道未可與立可與立未可與權夫知堯舜文王為正道而不惑於異端邪説者可與共學也自是而後適道適道而後立立而後權然後為成德之士然自昔者大學之道不明而求士之可與共學者殆不易得况成德哉爾資稟淳明器質深厚頃自妙齡潛心問學則知所謂是非邪正拳拳服膺雖於異端競起邪説誣民之時能獨立不懼自信甚確庶幾孔子所謂可與共學者朕聞而嘉之兹用錫對便朝改賜京秩爾其勉哉期進於道用其所學以見之於行事焉溫州舟人林貴特補進武校尉貴在膠西偽齊遣土軍崔寧等八人取其舟以為戰艦貴道殺四人捕寧等四人赴行在并其徒九人皆官之是日金人及偽齊之兵分道渡淮諸書並無金人渡淮之日按日歷明年正月二十四日知建康府吕祉申去年九月二十六日已後畨馬賊馬分兵兩路侵犯淮甸壬申二十六日也故繫于此日知楚州武功大夫和州防禦使樊序棄城去淮東宣撫使韓世忠自承州退保鎮江府趙甡之遺史先是嶽飛軍中有校尉王大節者蜀人飛待以為客李成退走歸劉豫也上語飛曰如李成歸國朕當以節度使待之飛即遣大節招成歸國是時豫方招接江南衣冠大節遂投劉麟麟待之甚厚授承務郎為皇子府屬官麟問征江南之䇿大節言四川百姓以宣撫司征擾不已供億重困思得大齊以重兵臨關則人皆嚮應既得四川然後發江之舟鼓擢而下江南屯戍之兵魂散膽裂矣麟曰不然大金有命會本國之兵趨淮甸渡長江直搗吳會汝以為如何大節曰其謀非不善但恐南兵扼長江未可渡則我師挫鋭矣不若攻四川必取之地以圖萬全雖若遲而迂然大功可以必成麟不聼大節既得敵人之情乃脫身走歸報飛飛大喜送大節于行在上令引見具以奏聞且請淮南為防江之備授大節承節郎閣門祗候至是偽齊與金果合兵犯淮甸今且附此更求他書參考癸酉左中大夫知樞密院事都督川陜荆襄諸軍事趙鼎為左通議大夫守尚書右僕射同中書門下平章事兼知樞密院事初鼎奏稟朝辭上曰卿豈可逺去當相卿付以今日大計制下朝士動色相慶趙鼎事實時獨給事中孫近直學士院時傳鎖院莫知為誰諸侍從謀于近曰非晚必命相公當草制幸密報髣佛以解我憂近入院諸人聚於沈與求之家近密報取樞府細位諸人喜而散明日拜鼎右相按此時近與沈與求並直此云獨直誤也又朱勝非既罷人望次輔皆應在鼎此云莫知為誰恐亦非其實今姑附此更須詳之也鼎入謝命坐賜茶即赴都堂治事祕書省正字張絢樞密院編修官田如鼇並為監察御史監察御史周綱守尚書右司貟外郎薑師仲為司封貟外郎朱勝非間居録稱趙鼎引用周綱事見五年十月壬申免審録濫賞注直祕閣通判臨安府邵相為荆湖南路轉運判官用帥臣梁汝嘉薦也甲戌吏部尚書兼權翰林學士兼侍讀沈與求為參知政事按宋史繫癸酉日宗正少卿直史館范沖言臣於趙鼎實有親嫌伏念賜對之初首蒙訓諭謂臣之進匪有先容親奉玉音不敢辭避今鼎進位冢司事無不統在臣分義滋不遑安竊慮招致煩言指為附麗親黨則臣上負聖知何以自解伏望除臣一在外宫觀則臣今日之退其榮於進多矣詔不允初川陜宣撫副使吳玠與隨軍轉運使趙開不咸玠謀為牽制之舉必欲從陸運糧開執不可玠迄自為之是秋兩川調夫運米十五萬斛至利州率四十餘千而致一斛時玠令縣官部役先至者賞役夫飢病相仍死於道路蜀人痛之此以李燾撰趙開墓志及馮康國奏議參修開懼不敢言更遣主管文字左奉議郎張洙按後期者洙撫其民流涕曰諸葛孔明再舉師以糧盡而返孔明豈不智哉懼吾民之至此也輒削所受令聼民以粟輸內郡官募舟載粟挽以上民皆歡呼而去玠大怒以深文詆洙賴宣撫司置勿問雖開亦以為難洙郫縣人也張洙事以邵溥所撰墓志增入此恐是邵溥權宣撫副使時事且附此更求其本日建炎以來繫年要録卷八十金人地名考證尼瑪哈原書作黏罕誤改見卷一
