body:
  text: 建炎以來繫年要録卷一百八宋李心傳撰紹興七年嵗次丁巳齊金熙宗亶天會十五年偽劉豫阜昌八年春正月癸亥朔上在平江手詔曰朕獲奉丕圖行將一紀每念多故惕然于心屬叛逆以來侵幸以時而克定重念兩宫征駕未還於殊俗列聖陵寢尚隔於妖氛黎元多艱兵革靡息永惟厥咎在豫一人其敢即安彌忘大業將乘春律往臨大江駐蹕建康以察天意播告遐邇俾迪朕懷時左司諫陳公輔亦勸上幸建康甚力公輔嘗言臣熟思今日恢復之䇿不出攻守二事攻者以我攻彼也守者防彼攻我也以我攻彼則乘機而動量敵而進可速可遲其勢皆在我也防彼攻我則突然長驅忽爾入犯有莫測之變有難當之鋒其勢皆在彼也以彼我之勢論之攻雖為難而守之為尤難攻雖在所急而守之尤在所急今朝廷分委大將各提重兵天威震疊士氣鼓勇所謂攻之之策廟堂有成算主師有逺略臣不得而議也唯守之之策臣請詳言之陛下已詔移蹕建康前臨大江俯近偽境非若臨安之比也防守之備可不嚴乎又况豫賊雖屢敗而未曽殄滅事窮勢逼必須求救金人我之所患不在豫賊唯防金人雖嘗逆料金人不爭土地唯利金帛知吾國家所有不如往時彼無所貪必不妄動然原其所以立豫之意非唯使我中國自相屠戮亦欲為其藩籬今聞車駕進蹕建康有北向之意若漸逼中原豫賊難立金人必須援之矧河北便是敵區驅兵而入計亦不逺吾豈可不過為計哉勿信探報之言謂敵勢已衰不足深慮寧守之而不來不可俟其來而不守也臣竊見淮東州縣相連道里不逺楚泗兩州城壁堅牢大軍分屯烽堠相望此其勢不易犯也唯淮西路分濶逺止有一軍今將移蹕建康則其地尤重於淮東矣臣愚欲乞措置淮西先選大臣以臨之更增兵將以實之要害之處不可空虛使西連嶽鄂東接楚泗皆有犄角之形仍令諸大將緩急相援首尾相應則雖敵騎之來不足畏矣公輔又言議者皆以兵少為憂臣獨以兵多為憂望諭諸大將據見在兵數擇羸弱者别項差使老病者去之仍罷諸般私占盡以壯強日赴閲習則雖少而精可以取勝又言諸將或邀求無厭以至各為異議輕視朝廷此無他御之未得其道願加之以威處之以法茍有惡不問有罪不治且將肆其桀驁又安敢望其立功邪置御前軍器局於建康府嵗造全裝甲五千矢百萬以中侍大夫岷州觀察使行營中護軍忠勇軍統制楊忠憫充提點仍𨽻樞密院及工部甲子命巡幸隨軍都轉運使梁汝嘉先往建康趣繕行宫及按視程頓皇伯閬州觀察使同知大宗正事安定郡王令慮為鎮東軍承宣使以積閲遷也丙寅上諭大臣曰昨日張俊呈馬因為區别良否優劣及所産之地皆不差張浚曰臣聞陛下聞馬足聲而能知其良否上曰然聞步驟之聲雖隔墻垣可辨也凡物茍得其要亦不難辨浚曰物具形色猶或易辨惟知人為難上曰人誠難知浚因奏人材雖難知但議論剛正面目嚴冷則其人必不肯為非阿諛便佞固寵患失則其人必不可用上亦以為然直寶文閣知臨安府李謨移鎮江府四川制置大使席益言知劍州王彥智勇謀略自其所長而為政治民有古循吏風一郡信服其條教伏望特加褒異詔賜金帶仍降勑書奬諭趙甡之遺史云王彥為人好奢喜佞矯偽不情當考丁卯左宣奉大夫守尚書右僕射同中書門下平章事兼知樞密院事都督諸路軍馬張浚以破賊功遷特進資政殿學士提舉臨安府洞霄宮沈與求提舉萬壽觀兼侍讀户部員外郎霍蠡自鄂州軍前來奏事言今軍事所須而病民最甚者莫如月樁錢所謂月樁錢者不問州縣有無皆有定額如樁窠名曽不能給其額之什二三自餘則一切出於州縣之吏臨時措畫銖銖而積僅能充數一月未畢而後月之期已迫矣願詔諸路守臣各條具逐州所樁之錢實有窠名者幾何臨時措畫者若何而辦召諸路漕臣稟決可否而罷行之詔諸路通判開具申尚書省翼日賜蠡五品服遣還龍圖閣直學士提舉江州太平觀汪藻再遷一官以編類元符庚辰以來詔旨成書也其屬官右朝奉郎新知無為軍鮑延祖左從政郎新徽州歙縣丞孟處義皆進秩初詔處義比類循資而處義言自來修書推恩即無比類例體乃命改次等京官二月乙巳降旨己巳履正大夫崇信軍承宣使行營中護軍江南東路宣撫使司前軍統制軍馬張宗顔為武信軍承宣使賞功也初命宗顔帶軍職落階官為麟州觀察使而宗顔辭軍職於是改命餘統制官酈瓊田師中以下第賞有差左宣教郎新夔州路轉運判官楊晨直祕閣用行府官屬賞也詔京東陜西來歸之民已命湖北京西宣撫司授田給種其令嶽飛以軍儲米萬斛付諸州賑給之辛未中書舍人兼權禮部侍郎董弅充集英殿修撰知衢州免謝辭先是有旨禁伊川學録黃下禮部吏部員外郎兼權郎官黃次山欲鏤板弅曰少俟之乃以己見求對弅即申奏御史臺謂弅沮格詔令御史周祕見上言昨者在廷之臣以一家之學誘天下之人而使之同己士大夫靡然從之風俗幾為之變陛下灼見其弊乃因臣僚論列特降聖訓且使布告中外命下禮部郎官欲遵故例遍牒所屬弅獨難之戒諭曹吏無得印發其意猶不以前日所行為非而今日命令為是也蓋弅素無士行躐躋侍從今朝廷略其朋附之罪已賜寬容而弅猶敢肆其凶愎沮格詔令無所忌憚一至於此若不斥之於早臣恐隂邪害政無所不至故弅遂罷日歷正月六日戊辰中書舍人董弅已見進對七日己巳侍御史周祕本職進對直祕閣新兩浙東路提點刑獄公事張九成罷先是左司諫陳公輔入對論九成平日所為無非矯偽茍無仕宦之心自當不事科舉既僥幸一第而堅欲辭榮亦可謂不相副矣不知朝廷何意每因其辭輒復遷擢彼亦何憚而不辭伏望聖慈特降睿旨罷浙東提刑與宫觀差遣遂其自髙之志且為矯偽者之戒詔九成與小郡九成又辭乃以九成主管江州太平觀詔江東宣撫使張俊特賜御筵令入內內侍省都知一員押伴時俊自軍中來奏事復還泗州俊入朝未見本日按此月丙寅上諭大臣已稱昨日張俊呈馬或是嵗前入朝亦未可知當求他書參考壬申龍圖閣直學士新知處州劉大中降充龍圖閣待制侍御史周祕論大中平日委親從官蓋非安分知足之人今陛下待遇之禮未衰而大中汲汲求去乃以不獲陛辭疑陛下進退羣臣之禮未盡可謂無禮矣欲望鎸奪職名少警在位故有是命癸酉張浚懇辭特進之命上曰朕以賞罰治天下如卿大臣固不俟勸然賞不行則四方萬里無由知卿之功浚曰為陛下宣力臣之職分而恩禮之優固不敢當且向緣富平敗事受天下之責借或自效微勞僅足補過兼諸大將及偏禆邇來策勳無由厭足所欲惟臣不受賞庶幾有以服衆上曰富平之失卿以宫祠去位朕所以示罰也今日有功則賞可後乎卿每有制除必再三辭避恐於君臣之義有所未安浚恐悚奉詔詔兩浙江東西湖北漕臣向子諲等七人以餉軍之勞各減三年磨勘翰林學士兼侍讀朱震引疾乞在外宫觀不許先是董弅免官震乃白張浚求去徽猷閣待制胡安國聞之以書遺其子徽猷閣待制寅曰子發求去晚矣當公輔之説才上若據正論力爭則進退之義明今不發一言默然而去豈不負平日所學惜哉且復問宰相云某當去否既數日又云今少定矣此何等語遇緩急則是偷生免死計豈能為國逺慮平生讀易何為也於是安國自上奏曰士以孔孟為師不易之至論然孔孟之道久矣自程頤始發明之而後其道可學而至今使學者師孔孟而禁不得從頤之學是入室而不由户也夫頤之文於諸經語孟則發其微旨而知求仁之方入德之序鄙言怪語豈其文哉頤之行則孝弟顯於家忠誠動於鄉非其道義一介不以取豫則髙視濶步豈其行哉自嘉祐以來頤與兄皓及邵雍張載皆以道德名世如司馬光吕大防莫不薦之頤有易春秋傳雍有經世書載有正蒙書惟皓未及著書望下禮官討論故事加此四人封爵載在祀典比於荀揚之列仍詔館閣裒其遺書以羽翼六經使邪説不得作而道術定矣甲戌淮西宣撫使司隨軍使喚張逺特補右迪功郎逺歸正人也乙亥祕書省著作佐郎勾龍如淵為尚書祠部員外郎祕書省正字張嵲為祕書郎祕書省正字兼史館校勘髙閌為校書郎直祕閣新知信州周葵提點荆湖南路刑獄公事直祕閣新知吉州謝祖信提點兩浙東路刑獄公事祖信為御史坐與章惇連姻補郡趙鼎既罷姑以部使者處之葵以論事語侵鼎去朝及是並命殿中侍御史石公揆言官冗之弊寖廣當有所汰軍興之費日繁當有所補今宫廟之官文武不下千有餘員如未曽出官及世家厚祿之人皆可減罷其諸司屬官州郡攝官悉宜減省詔左右司取索看詳可減者行之丙子端明殿學士提舉江州太平觀董耘卒於明州特贈資政殿學士丁丑太常少卿林季仲以母老乞補外除直龍圖閣知泉州祕書省著作佐郎王蘋道判常州從所請也戊寅吏部尚書孫近兼史館修撰尋又兼侍讀右武大夫開州團練使帶御器械權提舉宿衛親兵劉錡權主管馬軍司并殿前步軍司公事初行營前護副軍都統制王彥鎮金州其使臣王善亡去至是在權主管馬軍司公事解潛軍中彥遣將執之兩軍之士交鬭於通衢中外洶洶會平江民居火潛所部兵入人室聲言救火而攘其貨巡幸隨軍都轉運使梁汝嘉時在平江亦頗為所掠侍御史周祕論潛罪詔軍士免推治管幹使臣李堯臣等降二官潛闔門待罪張浚因薦錡文武兩器真大將才故有是命右承事郎王大智落致仕張浚薦之也右武大夫興州防禦使李琮落致仕與宫觀琮故宦者娶童貫女以嘗給事藩邸故復起之右司諫王縉論琮在宣和間倚貫聲勢罪惡不可具言望賜追寢以快輿人之論命遂止縉論列在五月丁亥縉墓志云內侍李琮童貫壻也已致仕詔起之奉祠公言梓宫未還天下痛憤忍令童貫壻再仕乎命遂止按日歷中所載縉疏乃無此語當是朝廷節貼或止上前口奏亦未可知日歷五月甲戌右司諫王縉本職進對在此前十三日自後别無降出縉章疏故知縉入對即是論此事也己邜吏部尚書孫近言竊見陛下戎輅撫師凡六曹事有格法者悉付之有司而廟堂始得専意於恢復之功今已過防冬將遂解嚴茍常程細務又復坌集則恐廟堂之上日力有不暇給而一二大臣將不得専意於恢復之圖矣伏望明詔三省樞密院惟甲兵征伐土地開闢金榖饋運戰士功賞叛亡招納凡所以靖中原禦外侮者日夜講究而常程之事仍復付之有司有不能決者然後申覆庶幾早克有濟輔臣進呈上曰近所論甚當常程事盡可付之六曹令與決行下張守奏六曹有常法故四方所奏稟或不能専決而朝廷則取旨施行上曰固然但六曹長二不任責則巨細皆取決於朝廷任責則朝廷事自清簡要當慎擇長二而已乃如所奏令三省樞密院遵守是日直寶文閣新知鎮江府李謨過行在入見時都督府統制官种潛屯江上軍民不相安人情惴恐謨次丹陽或勸謨繕騎嚴兵而後入巡尉部千百人執戈以衛謨笑曰設有急若輩足恃乎趣使散去延見吏民如平日一府帖然潛見謨感泣庚辰起復洪州觀察使行營前護副軍都統制王彥協忠大夫華州觀察使權主管侍衛馬軍司公事解潛各貶秩一等潛仍於遙郡上降坐總兵扈衛軍政不肅故也給事中胡世將奏潛統軍無律不黜無以明賞罰乃罷潛管軍提舉江州太平觀潛趙鼎所薦也熊克小歷稱彥為樞密院都統制又稱是月併罷彥潛以兩軍屬劉錡皆小誤彥罷兵柄在三月庚辰左朝奉大夫淮西宣撫使司主管機宜文字王擇仁右承務郎張體純等六人以從軍之勞各進一官初命吏部侍郎兼都督府參議軍事吕祉相度築采石宣化渡二城祉言宣化渡之靜安鎮渡城圍千三百步其半依山修築采石渡有舊城基因而為之度三百五十步有竒工料可省從之辛巳韓世忠奏已還軍楚州上因諭淮陽取之不難但未易守張守曰必淮陽未可進故世忠退師張浚曰昔西伯戡黎祖伊恐奔告於受以要害之地不可失也淮陽今劉豫要害之地故守之必堅上曰取天下須論形勢若先據形勢則餘不勞力而自定矣正如奕碁布置大勢既當自有必勝之理祕書少監吳表臣試太常少卿癸未翰林學士兼侍講陳與義參知政事資政殿學士新除提舉醴泉觀兼侍讀沈與求同知樞密院事左修職郎朱倬特改左宣義郎倬為廣東提舉常平司幹辦公事用明槖薦得召對論得天下有道在得民心因舉咸平中以户口增減為計臣之殿最祥符中以雪活寃獄為憲臣之上第願申戒有司勤恤民隱今西北之民已思見官儀矣陛下幸大固其心勿小小以傷之天下幸甚詔下其章而倬有此命詔內外諸軍今年大禮賞給除禁衛諸軍外令戶部酌度增減一等支給自渡江以來神武右軍中軍之扈從者賞給與禁衛比而前左後軍及劉光世部曲則視承平時向陽關戍卒例給之輕重殊絶韓世忠嘗以為言事見四年十月至是尚書省言在外諸軍屏捍外冦事體為重其所得賞給反輕在內軍兵役使為輕賞給優重若不别行措置終恐未均故有是旨甲申給事中胡世將兼權直學士院乙酉詔宥密本兵之地事權宜重可依祖宗故事置樞密使副宰相仍兼樞密使其知院以下如舊自元豐改官制而密院不置使名宣政間鄧洵武以少保知樞密院其後童貫以太師蔡攸以太保鄭居中以少師皆領院事中興因之至是張浚將引秦檜共政以其舊弼不可復除執政官於是浚自兼知樞密院事改兼樞密使吏部侍郎吕祉在建康聞禁伊川學上奏曰臣竊惟孔子刪詩序書繫周易作春秋明禮樂與門弟子答問則見於論語凡學孔子無如子思孟子中庸與七篇之書具存自漢至本朝上所教下所學鴻儒碩學端亮閎偉之士接武於時何嘗不由此道豈待程頤而後傳也臣竊詳程頤之學大抵宗子思中庸篇以為入德之要中庸曰君子之中庸時中程頤之所得也近世小人見靖康以來其學稍傳其徒楊時輩驟躋要近名動一時意欲歆慕之遂變巾易服更相汲引以列于朝則曰此伊川之學也其惡直醜正欲擠排之則又為之説曰此王氏之學非吾徒也號為伊川之學者類非有守之士考其素行蓋小人之所不為有李處廉者知瑞安縣専事貨賂交結權貴取程頤文并雜説刋板作帙遍遺朝士朋比者交口稱譽謂處亷學伊川近聞處亷犯入已贓繫獄罪當棄市逺近傳笑此皆子思所謂小人之中庸而無忌憚者也中庸一也然有君子之中庸有小人之中庸非其學之謬乃學者之罪也臣寮所論可謂切理望將前日聖旨指揮連臣寮所論出榜諸路州縣學舍使學者皆知舊學而不為近世小人之所習以補治化從之先是處亷以右宣教郎知瑞安縣為監司所按殿中侍御史石公揆又疏其罪詔趣具獄故祉言及之公揆論處亷罪在是月辛巳寶文閣直學士江西都轉運使趙子淔復知西外宗正事子淔趙鼎所用也福建路轉運判官蘇良治荆湖北路轉運判官李若虛兩浙東路提舉常平茶鹽公事鄭績提舉兩浙路市舶王時並罷先是朝論欲重監司之選而侍御史周祕奏良治時貪鄙無行又言若虛止嘗歷秀州司户一考績自提轄文思院徑除監司二人尤為超躐故並罷仍以若虛為湖北京西宣撫司參議官命四川制置大使司存恤劉惟輔張嚴家屬其兄弟子孫皆與升等差遣無官人具名申樞密院丙戌詔以知州軍諸郡通判各六十一闕歸吏部用左右司奏也於是堂除郡守之闕一百九通判之闕八十丁亥閣門祇候充問安使何蘚承節郎都督行府帳前凖備差使范寧之至自金國得右副元帥宗弼書報道君皇帝寧德皇后相繼上仙張浚等入見于內殿之後廡上號慟劈踊終日不食浚奏天子之孝與士庶不同必也仰思所以承宗廟奉社稷者今梓宫未返天下塗炭至讐深耻亘古所無陛下揮涕而起斂髮而趨一怒以安天下之民臣猶以為晚也上猶不聼浚等伏地固請乃進少粥是日百官詣行宫西廊發喪故事沿邊不舉哀特詔宣撫使至副將以上即軍中成服將校哭於本營三日止時事出非常禮部長二俱闕而新除太常少卿吳表臣未至一時禮儀皆祕書省正字權禮部郎官孫道夫草定方議論之際翰林學士朱震多依違人或罪其緘默朱震事據吕大麟見聞志附入大麟乂言獨王蘋以謂若子發建明是已取名而歸過於上也子發之意或取於此按蘋此時已出為常倅兼祕書省正在臨安今且附此俟考觀文殿學士醴泉觀使兼侍讀秦檜為樞密使應干恩數並依見任宰相條例施行故事宰執新除雖到堂即時還第辭免至是以何蘚等還留檜議事不許歸第尚書右司員外郎徐林直顯謨閣充江南西路轉運副使以林引更迭詔書有請也命內侍梁邦彥提舉欽奉几筵戊子為太上皇帝寧德皇后立重詔諸路州縣寺觀各建道場七晝夜禁屠宰三日新除樞密使秦檜乞立知樞密院事班不許檜又乞于宰臣之後執政之前别作一班亦不許檜又奏言竊恐未盡祖宗典故欲望依臣所請仍乞應干恩數比宰臣並行裁減上優詔諭之檜第二奏在是月辛丑第三奏在二月甲申今聯書之林泉野記云檜為樞密使無所建明惟奉張浚而已己丑上成服于几筵殿倣景靈宫分前後設幄宗室各以其服服之無服者三日除建國公瑗和州防禦使璩各以其官服手詔降諸路流罪以下囚一等內鬬殺情輕者降配釋杖以下詔平江諸佛寺聲鐘十五萬杵選僧道三十有五人醮祭作佛事降授武功大夫髙州刺史福建路兵馬鈐轄藍公佐復左武大夫榮州防禦使知閣門事庚寅張浚等請入奏事上遣幹辦御藥院趙轍宣旨曰知欲奏事以荒迷中未能裁決庶政兼不知祖宗故事嘗有此否恐今日行之便為典禮浚等曰祖宗故事未聼政之時大臣亦得進見今日臣等非敢奏事實以為上哭踊過哀不勝憂懼欲一望天表轍入奏復宣旨曰深欲一見羣臣以哀迷未能支持借或相見不過慟哭而已浚等流涕奉詔右司員外郎權太常少卿樓照等言隂陽家每遇辰日忌哭張浚奏合取自聖裁詔辰日不得忌哭辛卯詔百官禁樂二十七日庶人三日行在七日宗室三日外勿禁嫁娶用太常請也是日四川都轉運使李逮始視事時茶馬司闕官命逮兼領自熙豐以來始即熙秦戎黎等州置場買馬而川茶通於永興四路故成都府秦州皆有權茶司買馬監牧司各置官吏至是關陜既失逮請合為一司名都大提舉茶馬司以省冗費從之後月餘逮至成都徽猷閣待制趙開乃辭漕職都運司題名趙開今年三月八日替是月名周處廟曰英烈後封處忠勇仁惠侯封侯在二十六年二月建炎以來繫年要録卷一百八
