body:
  text: 建炎以來繫年要録卷一百七十五宋李心傳撰紹興二十有六年冬十月己巳朔大理少卿楊揆言臣檢準大理寺一司敕諸刑名疑慮及情法不稱並奏裁事若重密仍許上殿望自今後遇本寺有重密公事許依前件條制乞上殿奏陳從之右朝議大夫知明州王俁試尚書戶部侍郎庚午詔去年十月甲子以前斷罪之人除大不恭不孝及蠧國害民枉法自盜贓抵死因人告發迹狀明白者各論如法其餘不以年限並許自陳事屬無辜則與行改正稍涉疑似則除落過名用大理少卿楊揆請也二十七年正月戊寅湯鵬舉奏可考罷浙東提舉常平司平準務提舉官趙公稱請也仍以其錢充糴本左朝散郎喻樗右朝散郎陳掞右朝請郎邢繹並落致仕樗始坐趙鼎門人久廢至是召還繹恕孫嘗通判襄陽府以私事決殺掌庫者懼罪而去寓居武陵万俟卨謫沅州與之親厚乃併薦之尋以樗知大宗正丞掞守軍器監繹知興國軍武經郎向世禧知賔州世禧為東南第十二副將代還湯思退擬除郡上閲履歷狀見其稱府學內舍生問得非武舉出身否思退言世禧本士人後以獲賊補官上曰士人必知民事如此差除甚當世禧襄陽人也詔故敦武郎王正臣特與恩澤一資正臣為奉使大金禮物官墜車死故録之辛未沈該等奏近以內教有司依年例供進賞賚物帛有旨退還者半仰見陛下儉德上曰賞賚何必許數如此撙節嵗中自可省數百萬緡該曰陛下每事省約以寬財賦天下幸甚壬申上謂大臣曰宗室中有才學者可選兩三人充行在官京師盛時為從官及建節者甚多今不可以比舊但如南班亦少朕甚念之癸酉左朝奉大夫知隨州田孝孫直祕閣以京西諸司言其公廉儉素流移安業也是日中書門下省檢正諸房公事陳正同入對言縣令之職最為近民今懲戒既嚴而不旌異循良恐亦有所未至望令諸路監司採訪拔擢一二不次用之庶幾威惠兼行人知勸沮上曰卿言正合朕意早方有一郡守為監司所薦已令除職因任仍俟終更升擢之矣左奉議郎陳俊卿為祕書省校書郎左迪功郎鄭聞充敕令所刪定官俊卿莆田人也乙亥詔以蜀去朝廷遠郡守尤須得人令監司帥臣各舉知縣資序以上堪充郡守者二人制置總領財賦提舉茶馬各舉三人犯贓及不職與同罪令尚書省置籍是日輔臣奏事因言皇太后儉德上曰太后盛德自古所無雖一錢未嘗妄用間或飲酒用伶官三兩人支豫不過三數千每嵗衣服不過數襲平時所進金銀錢帛並積在庫往往盈滿敷文閣直學士新知卭州蘇符卒丙子詔命官田産所在州或寄居及七年並不許注擬差遣用右正言凌哲請也拱衛大夫忠州防禦使兩浙西路兵馬鈐轄卲宏淵為殿前司前軍統制壬午吏部郎中兼權祕書少監沈介乞以提舉祕書省印權納禮部所搜訪書籍併歸本省官吏兼權者並罷從之甲申詔右朝請大夫知盱眙軍吳説纍乞奉祠可差主管台州崇道觀丙戌尚書右僕射万俟卨上皇太后回鑾事實左僕射沈該為禮儀使進讀畢以授內侍用樂導入內庭安于小殿上行捧觴上夀之禮禮畢宰相率百官拜表稱賀杉溪居士內外制皇太后回鑾事實編修成書奏告祖宗諸帝神御并后祝文伏以頃屬慈闈言還長樂事無聞於古昔美獨擅于國朝允謂至難是宜紀實用顯無疆之慶克成傳信之書爰擇令辰式伸虔告周必大稱賀表曰冬溫夏凊久承長樂之顔文瞻事詳令紀蘭臺之鞏母儀既著聖治愈光中賀臣聞周美太任詩人發詠漢迎薄后史氏特書儻汗青不載於一時則副墨孰傳於萬世於皇盛舉克掩前芳恭惟皇帝陛下仁冒垓埏孝通天地締盟北道永清萬馬之屯至養東朝夙返六龍之馭言念皇家之殊慶豈容惇史之闕文既詔諸儒纂事而書之䇿復資上宰帥屬而獻於王昭哉典籍之精詳導以禮儀之繁縟風傳六服喜動羣工臣身也滯南心焉拱北班香宋艷莫窺三館之藏舜日堯年願祝兩宫之夀崔敦表曰慈闈旋養諧上聖之誠心惇史奏篇紀皇家之慶事涓辰尊閣率土忭歡中賀臣聞至孝實近乎王大事則紀于册晉謝蕭君之質因左史而詳明漢迎吕氏之歸于班書而謹籍矧乃䇿非凡見事有至難將侈厥洪休放諸四海而皆準必勒為大訓垂之萬世而無窮陛下髙行敷天深仁冠古始遣北廷之使君子以為必歸迄修長樂之儀聖德無以加孝城頴之賦融融凊溫無斁虞氏之書渾渾顛末不遺臣遠守偏州欣聆巨典參陪嘉會阻趨稱夀之班宣怖惇風恪謹承流之職時安奉禮物皇太后悉退出不受他日該見上贊太后儉德上曰宫中無用許多禮物皇太后今七十七歲而康健如五六十歲人自古帝后無有也中興聖政臣留正等曰顯仁皇后恭儉節用出於天性中外之人莫不聞之如有司進金唾壺則曰宜易以塗金宫中宴飲用伶官才兩三人所豫緡錢無幾歲進金帛帑積已充牣而一銖一縷不妄用此自古母后所未有之盛德也而我太上皇帝且能曲意以順承之雖以朝廷大慶奉慈寧萬年觴而有司禮物皆卻而弗受噫兩宫之間慈孝相承而加之以恭儉宜乎天人叶相而享天下之盛福也歟甲午敷文閣直學士左朝散大夫提舉江州太平興國宫秦塤改授右朝散郎吏部奏乞追還塤元及第日所轉三官故有是命皇叔均州觀察使士洪宣州觀察使士嵰宣州觀察使士譜並特遷承宣使士洪華容軍士嵰靜江軍士譜清遠軍皇叔和州防禦使知濮安懿王園令士輵為建州觀察使上以南班宗室近屬所存無幾故有是命餘睦親宅十六人各還一官士洪等四人皆濮安懿王曽孫也時太祖後宗子於屬益踈故無在南班者太尉建寧軍節度使提舉萬夀觀韋謙薨命睿思殿祗候王晉行護葬事乙未右宣奉大夫宋貺責授果州團練副使梅州安置右太中大夫徐琛責授成州團練副使道州安置循州編管人王會移瓊州編管御史中丞湯鵬舉奏會姦贓狼籍罪大責輕貺琛黨附權臣民之蟊賊今又長惡不悛每多怨謗故謫之潼川府路轉運官王之望言四川自軍興以來供億至重民不堪命公私困竭陛下知之詳矣臣不敢復陳前歲朝廷遣使裁減而畏首畏尾未足以副聖主寬恤之意兹者彗出東井寅畏有加詔臣與許尹同制置總領茶馬再修便民之政輒有愚見冒昧上聞蓋治病之標不若療其本導水之末不若疏其源四川贍軍之費前後纍蒙蠲放而利澤未深上貽聖慮者蓋其本原實在軍中也軍中之費仍舊則歲計所減必妨臣願陛下親灑宸翰以賜軍前二大將若曰朕永念蜀人久困邉饋如軍中有冗食可省浮費可除冀以上聞得從末減若乃士卒衣糧之實甲兵繕治之須務協經常勿輕裁損二人者皆功臣宿將久荷國恩聞陛下至誠惻怛之言必將有以應詔隨其多寡以補助裕民庶幾積蓄可豐調度可節竊慮聖慈謹重事體不欲自親其文則願以臣劄子示之但云臣僚所論如此卿等可契勘有可減省量為措置二人忠義體國必自樂從之望所上劄子不得其月日按之望又有乞減上供劄子云臣去月二十七日具劄子乞詔二大將而減上供劄子以明年正月二十五日辛卯進呈則是十一月末所上也又按今月有閏十月則所謂去月者蓋舉前十月言之故附此日丙申詔自今三衙官兵差出外州者並取旨方得起發宰執進呈秀州守臣鄧根按崇德知縣林善問不法科借折帛錢事詔罷善問仍取勘上曰科借錢若一一在官猶可恐因而入已大抵贓吏最為民害今後須盡追贓物不然自謂雖得罪猶不失為富人無所憚也右朝請大夫知盱眙軍楊抗直祕閣以抗帥府舊僚且和議之初上書可採故有是命崇慶軍節度使嗣濮王士俴薨追封思王諡溫靖端明殿學士富直柔薨於建州左中大夫直祕閣王圭卒丁酉詔前特進張浚依舊令永州居住俟服闋取旨先是浚奉母喪歸葬於蜀行至江陵會以星變詔求直言浚慮金數年間勢決求釁用兵而吾方溺於宴安謂金可信蕩然莫之為備沈該万俟卨居相位尤不厭天下望朝廷益輕雖在苫塊不得不為上終言之乃復奏曰天地之大德曰生而天地生物之功本於秋冬蓋非嚴凝之於秋冬則無以敷榮之於春夏然則秋冬之嚴凝生物之基也若夫一時之和亦聖賢生利天下之權爾商湯事葛矣而終滅葛周太王避狄矣而未幾謀以卻狄文王事昆夷矣而卒伐之勾踐事吳矣坐薪嘗膽竟以破吳漢髙祖與項羽和羽歸太公吕后割鴻溝以西為漢東為楚良平以楚兵罷食盡釋而弗擊是養虎而遺患漢王從之卒成大業唐太宗初定天下有渭上之盟未幾李靖之徒深入沙漠之地犁其庭繫其酋海內始安兹非以和為權而得之哉若夫石晉則不然桑維翰始終主和其言曰願訓農習戰養兵息民俟國無內憂民有餘力觀釁而動動無不成若有深謀者考其君臣所為名實不孚專務姑息賞罰失章施設謬戾權移於下政施於上無名之獻莫之紀極維翰所陳殆為空言姑欲信其當時必和之説以偷安竊位而已契丹窺見其心謂晉無人頻來凌侮日甚一日後嗣不勝其忿始用景延廣之議僥幸以戰不知其荒淫怠傲失德非一日天下之心已離勢已去財已匱延廣不學不知行聖賢之權亟思所以復其心立其勢強其國急於兵戰之爭事窮勢極數萬之師無一夫之發矢北向者至今天下嗤笑嚮者講和之事陛下以太母為重爾幸而徽宗梓宫亟還此和之權也不幸用事之臣肆意利欲乃欲翦除忠良以聽命於敵而陰蓄其邪心故身死之日天下相慶蓋惡之如此方姦雄之人豢於富貴分列黨與布在要郡聚斂珍貨獨厚私室皆為身謀而不為陛下謀也坐失事機二十餘年有識痛心夫賢才不用政事不修形勢不立而專欲受命於敵適足啓輕侮之心而正墮其計中也臣願陛下鑒石晉之敗而法商湯周太王文王之心用越勾踐之謀考漢唐四君之事以保圖社稷深思大計復人心張國勢立政事以觀機會未絶其和而遣一介之使與之分别曲直逆順之理事必有成万俟卨湯思退見之大恐以為金未有釁而浚所奏乃若禍在年歲間者或笑以為狂御史中丞湯鵬舉即奏浚身在草土名繫罪籍要譽而論邉事不恭而違詔書取腐儒無用之常談沮今日已行之信誓豈復能為國家長慮却顧徒以間居日久惟幾復用耳議者以為前此權臣嘗被其薦故雖洊致人言姑竄近地况浚近得旨歸葬於蜀倘堅異議以倡率遠方之人慮或生患望屏之遠方以為臣下不忠之戒殿中侍御史周方崇亦言浚倡為異議以動搖國是欺愚惑衆冀於再用不顧國家之利害罪不容誅望破其姦謀重加貶竄以正妄言之罪右正言凌哲言浚憑愚護短專務立異求售前日之臆説恐遠方遐徼民聽易惑别生事端望賜黜責以為懷詐徇私欺世盜民之戒故有是命趙甡之遺史云初張浚責永州居住秦檜既死已放令任便居住矣至是浚進書乞勿信沈該万俟卨二相宜修武備或謂浚無此書憸人偽撰而進之或又以為金人令姦細詐作浚書以進雖不可明然該卨大怒湯鵬舉迎合二相意乃上言浚罪有旨永州居住按甡之所記得于傳聞今不取閏十月己亥朔知樞密院事湯思退奏昨日張浚行遣極當上曰浚用兵不獨朕知天下皆知之如富平之戰淮西之師其效可見今復論兵極為生事且太祖以神武定天下亦與契丹議和同知樞密院事陳誠之曰浚論事頗有不當如石晉因契丹之力以自立其勢不得不與之和此桑維翰之功也及景延廣用事遽以翁孫之禮待之契丹遣使問曲直延廣對使者云晉有橫磨劒十萬口翁欲戰則來石晉之禍自此始矣浚不罪延廣而謂維翰不當與契丹和好甚無謂上曰耶律德光入汴首以此言數延廣罪誠之曰浚永州之命甚塞衆議上曰不如此議論不能得定按誠之所云浚不罪景延廣乃與浚奏疏之意全不同不知何故左朝奉郎新知漢陽軍張庭實行太常博士庭實入對論文昌政事之本今諸部及寺監用例者多乞一切條具修入見行之法詔可遂有是命時湯鵬舉先有此奏庚子左正議大夫守尚書左僕射同中書門下平章事沈該為左宣奉大夫左宣奉大夫守尚書右僕射同中書門下平章事万俟卨為左銀青光祿大夫皆以進回鑾事實推恩也實録院修撰官以下皆進官祕閣修撰知婺州辛次膺權尚書禮部侍郎次膺以事與通判張本互訴宰執匿之乃召次膺還既至乃有是命張本互訴事湯鵬舉劾疏中及之不知如何行遣也辛丑宗正少卿李琳為賀大金正旦使秉義郎侍衛馬軍司幹辦公事宋均副之尚書左司郎中葛立方為賀生辰使閣門宣贊舍人梁份副之尚書省言諸路常平義倉見管米數不多乞以所樁糴本錢措置收糴從之壬寅詔內外見任官因生日受所屬慶賀之禮及與之者各徒一年贓重者依本法自秦檜擅權四方皆以其生日致饋其後州郡監司率受此禮極其僣侈太學録范成象面對以為言故立法御史中丞湯鵬舉奏右朝散郎王彥博鄭柟贓汚踰濫詔並勒停彥博送靖州柟辰州編管彥博起趙令襟獄柟請秦熺為相左朝散大夫方雲翼追兩官特勒停袁州編管坐強市民田事有司按實故也癸卯宰執進呈故右朝散大夫楊淵男椿進狀為父昨守吉州因金人侵犯棄城乞依王仲山仲薿例追復元官并恩澤上曰祖宗時棄城皆用軍法今得不誅幸矣仲山仲薿皆秦檜親黨録用以示私恩豈可為例沈該等因奏當時一般棄城之人獨仲山仲薿兩人追復官職他皆不與也按日歷王仲薿乃是生前纍復左正議大夫徽猷閣待制淵明年六月丙辰復官祕閣修撰知溫州張九成以喪明求去詔九成提舉江州太平興國宫溫州民間有柑實每霜後郡例科市於民以遺權要民或赭其所植以求免長吏方且張樂會寮宷旨嘗媺惡率以為常及九成為州遂罷柑宴丙午詔廉州歲貢珠雖祖宗舊制聞取之頗艱或傷人命自今可罷貢蛋丁縱其自便翌日上謂宰執曰朕嘗讀太祖實録見劉鋹進珠子馬鞍太祖知鋹所採珠子甚多日役蛋丁數千人死者不少朕以謂珠子非急用之物既是難得且傷人命故特令罷貢以為一方無窮之利龍神衛四廂都指揮使建武軍承宣使新江南西路馬步軍副都總管董先卒於鄂州夔州觀察使提舉萬夀觀陳仲堅卒丁未右朝散郎通判鄂州任賢臣特降一官先是鄂州舉人王昌言訟考試官䇿題差誤又冒貫合格者衆賢臣為監試故責及之上諭宰執以昌言訟主司有害士風乃送鄰州編管己酉御史中丞湯鵬舉言離軍添差之人養贍不足無以自存望於江淮湖南荒田內人給一頃令所在州軍支請給一年以為牛種之費仍免十年租稅二十年丁役從之三十一年正月戊寅所書可參考右承議郎劉伯英特勒停送連州編管以右正言凌哲論其諂附秦檜在江西湖南贓淫僣侈也伯英初見紹興十七年七月又見二十三年六月庚戌參知政事張綱言皇太后生日回賜臣銀絹過多上因曰太后前以飲食動臟腑近已安健粥藥皆朕親進又得皇后侍奉甚謹太后聖慈無比然性亦嚴惟皇后賢淑能順其意朕每日臨朝所以得心安也御史中丞湯鵬舉乞自今春降詔之後有換易差遣之人令吏部具名以聞特賜降黜從之其後吏部言除改差職事官楊揆等一百三十六人並係特旨外止有右朝奉郎張延之等六人乞改正詔與元授差遣仍令三省遵守辛亥詔刑部郎官依元豐法分左右廳治事先是右司郎中汪應辰言國家謹重用刑是以參酌古誼並建官師在京之獄曰開府曰御史又置紏察司以譏其失斷其刑者曰大理曰刑部又置審刑院以決其平鞫之與讞各司其局初不相關是非可否有以相濟及赦令之行其有罪者許之敘復無辜者為之湔洗內則命侍從館閣之臣置司詳定而昔之鞫與讞者皆無預焉外之川陜去朝廷遠則委之轉運鈐轄司而提點刑獄之官亦無預焉及元豐更定官制始以大理兼獄事而刑部如故然而大理少卿二人一以治獄一以斷刑刑部郎官四人分為左右廳或以詳覆或以敘雪同僚而異事猶不失祖宗分職之意本朝比之前世刑獄號為平者蓋其並建官師所以防間考覆有此具也中興以來務從簡省大理少卿止於一員而刑部郎中初無分異則獄之不得其情法之不當於理者又將使誰平反而追改之乎今雖未能盡復祖宗之舊亦當遵用元豐舊制庶幾官各有守人各有見反覆詳盡以稱欽恤之意故有是旨尚書省請以去年十月二十二日以後朝廷所行寬恤事件編類成册鏤板頒降從之壬子忠州防禦使知閣門事幹辦皇城司石清為泉州觀察使清援解帶及使北恩例乞遷官故有是命徽猷閣直學士致仕胡寅卒於衡州寅既退居乃著讀史管見三十卷論周秦至五代得失其論甚正蓋於蔡京秦檜之事數寄意焉其書今行於世癸丑詔見任官於所部私役工匠營造己物者依律計庸準盜論若緣公興造即申所屬輪差優賞工直著為令先是大理少卿陳章在司農有請至是行下章是月庚戌自少農遷大理甲寅尚書右司郎中汪應辰直祕閣知婺州從所請也乙卯初置臨安府左右廂官二員時城外已置南北廂官守臣榮薿乃請於城內增置二員分掌訟牒以京朝官為之未幾言者以為曲法徇情廂官遂罷明年六月五日侍御史周方崇奏今併書之集英殿修撰提舉江州太平興國宫嚴抑卒己未復敷文閣待制致仕辛酉右承議郎崇義公柴叔夏言已關升知州資序乞換授一差遣詔以其子國器為右承務郎襲封崇義公主奉祠事而以叔夏為荆湖南路安撫司參議官吏部郎中沈介面對言間者柄臣好惡自己因事變更祖宗法令望詔大臣恪守成法凡前日便文一切之制俾有司條上悉加平考稍戾祖宗之法者勿復施行從之壬戌樞密院乞自今賫賜夏臘藥依故事遣內侍官一員遍往諸路從之先是樞密院遣使臣賫賜四川大帥等夏臘藥所至騷擾上聞之詔以敦武郎劉世康等屬吏故密院請之尋停世康官邵武軍編管十二月癸亥行遣甲子詔自今已注知縣縣令人不許諸處奏辟用尚書省請也尚書吏部郎中孫道夫試太常少卿道夫入對論蜀中州縣稅絹之外有和買有預俵又有激賞而蜀民尤以激賞絹為苦稅米之外有遠倉有和糴又有對糴而蜀民尤以對糴米為患今邉鄙無虞甲兵不用總司但給諸屯衣糧耳而諸州軍猶有激犒錢各不下一二萬引此非橫斂乎以至鹹錢退縮鹽額頓虧使井戶虛納土産引錢則破産者十室而九酒徒零落課息欠少使槽戶空納石頭錢則失業者比比皆是有司不恤園戶務增茶額以求羡餘合同場計無所出禁繫山氓使輸虛息蜀民被牢盆酒茗之害有年矣今欲通其變以革其弊雖救焚拯溺不足以喻其急也上感其言詔制置諸司相度奏聞而道夫有是命乙丑中書舍人王綸言近看詳守臣所具五事其間有惟一二事的實餘皆細務姑以充數亦有為五條所拘不得盡言望自今不拘其數從之十有一月按是月己巳朔癸酉詔自今臣寮不得輒以子弟親戚陳乞特赴殿試甲戌權禮部侍郎辛次膺言竊考邦國之大計今諸路歲入行朝之數加以茶鹽所入數目實多使有以理財而其入無欠有以節財而其出有節則豈特財用充足蓋將儲蓄沛然有餘矣而近年以來拖欠數多內外支遣歲歲增添是其入未能無欠而其出未能有節也願詔左右司同戶部取朝廷一歲中出入之數其入數拖欠失限者嚴立譴罰其出數則更加裁酌立為定數不得增添然後於所入中撥錢若干以待其出又取若干專一收樁以為積蓄之數無故不得支用仍令諸路轉運司歲終具移用過錢物及見在數申尚書省庶內外各知節約上曰此誠今日急務然止有三説生財理財節財是也比年生財之道講求略盡唯理財多因官司失職致有拖欠使州縣得人必不至此若節財則用莫大於給軍既有定額無從裁省今但當撙節不可妄費遂命吏部侍郎陳康伯戶部侍郎王俁大理少卿陳章同措置乙亥詔在京百司被受條制依故事謄報樞密院如違慢漏落令本院取旨丙子左從事郎主管禮兵部架閣文字杜莘老充敕令所刪定官先是詔以星變求言莘老上書論彗盩氣所生歷考史牒多為兵兆國家為息民而將驕卒惰軍政不肅今因天戒以修人事思患預防莫大於此因陳時弊十事莘老青神人甫十三世孫魏良臣所薦也熊克小歷云時應詔者衆上悉以付後省令精擇第而上之衆議以莘老為首未幾差敕局刪定官此據查籥作莘老行狀所書也其實莘老此月除刪定十二月庚申方有旨推擇明年正月甲子推恩今並附本日己卯詔臣寮因事論罷之人自今已經郊赦方許除授差遣犯贓者從本法用御史中丞湯鵬舉請也庚辰宰執進呈倉部郎中黃祖舜面對論經總錢以紹興十九年數立為定額非是蓋是年經界初行人投舊契故所入倍多乃詔戶部以十九年以後二十五年以前取酌中一年立為定額申省辛巳左朝奉郎孫覿復右文殿修撰提舉江州太平興國宫覿上疏自訴不已故復之左朝散大夫知江州范漴罷以右正言凌哲論其嘗諂事嶽飛也壬午上謂大臣曰近太學試補弟子員中程者詩賦多而經義少後生輩往往皆詩賦數年後恐經義科廢矣宜令兼習經義沈該等請俟省試畢上可之癸未吏部侍郎陳康伯等言被旨措置財用今當節妄費以寬民力所有州縣違法支使窠名如支積俸差權局饋遺借請批劵之類並令日下住罷仍委監司互察從之如違令臺諌彈劾乙酉刑部郎中孫敏修言天下所奏獄案下法寺擬節除所勒刑名疑慮合行駁勘外其間有情節不圓行下取會動經歲月望自今取會三次供報未盡徒罪以上許令法寺貼説指定或作兩斷行下仍專委提刑前去審問情實定斷歸一如尚有不盡及事涉疑似即選官别勘庶無寃滯詔刑寺長二看詳申尚書省丙戌執政進呈知盱眙軍吳説奏乞禁止採􅒕上曰暴殄天物誠可禁苐貧民以此為生一旦禁止恐致失業古之聖人先仁民而後愛物今但令官司不得買􅒕民間從其便也吳説十月甲申得旨與宫觀去此已兩月餘不知奏何以才至也尚書省言被旨裁減吏額法行當自近始乞裁定三省樞密院近來所添名額於是六曹寺監百司各以舊額及新置人數來上朝廷悉加裁損焉辛卯國子司業兼崇政殿説書王大寶直敷文閣知溫州從所請也左朝散大夫知嘉州朱昌裔右朝奉大夫知萬州李莘民左朝散大夫知大寧監費行之各特轉一官大寧地沃饒前此多並緣取為公廨錢行之獨無所取部使者舉其最與昌裔莘民皆籍記姓名及行之任滿宰執擬知卭州上令更與轉官于是三人並命行之廣都人也壬辰光祿寺丞唐文若行祕書郎左朝散郎江南西路轉運判官逢汝舟行光祿寺丞汝舟入對論湖北增起二分上供錢物科取於民及州縣預借之弊上皆行之遂有是命汝舟汝霖兄也詔拱衛大夫忠州防禦使殿前司左軍統制卲宏淵纍立戰功所待借補官資未經收使可特轉宣州觀察使殿前侍御史周方崇言敷文閣待制提舉江州太平興國宫張柄頃任棘卿凡權臣滋長告訐以脅制羣臣者柄必極力煆錬且加貶竄詔落職癸巳吏部員外郎王晞亮言國家取士詞賦之科與經義並行比學者去難就易競習詞賦罕有治經至於周禮一經乃絶無有望自今經義文理優長合格人有餘許將詩賦人材不足之數通融優取仍以十分為率不得過三分從之詔右通直郎司馬倬送吏部與遠小監當差遣倬寓居會稽而殿中侍御史周方崇論其貪淫不檢與王會康與之為狎交又奴事魏良臣干撓郡政故黜甲午詔親賢宅蘄州防禦使居中遷宣州觀察使餘七人皆進一官御史中丞湯鵬舉言湖南提舉常平茶鹽蔡撢嘗治方疇獄恣為煆鍊以奉權臣詔放罷丙申監察御史沈大廉直祕閣提點福建路刑獄公事左朝請大夫福建路提點刑獄公事吳逵直祕閣知鼎州逵所議鹽事二十七年正月庚申十月乙巳所書可參考御史中丞湯鵬舉論吏部近條具換易差遣人不當因論史浩陳良祐陳㮤陳豐四人見今年九月丁未及戊申及改差主管吏部架閣文字王淮等十七人詔除近臣被旨薦舉及朝廷選差與到任已久人外並令改正淮師心從子也既而吏部郎中續觱沈介見鵬舉言前日所具實出上下相制有不得已鵬舉即奏二人欺罔且言觱乃張浚親黨使之窺測朝事以浚被論每懷不平詔罷觱出介知興化軍觱介被論在十二月癸卯十有二月戊戌朔臘饗太廟是日也罷朔祭以禮官援淳化故事有請也庚子資政殿學士知紹興府魏良臣提舉臨安府洞霄宫從所請也辛丑少師保寧軍節度使判平江府信安郡王孟忠厚復判紹興府知樞密院事湯思退同知樞密院事陳誠之言仁宗朝詔臺諫言事皆録報樞密院及大觀令臺諌上言本院取旨審量比年以宰相兼領久廢故事有合報者多不預知乞依舊制詔臺諫言事三省録報樞密院詔宰執宣借人各減三分之一用左僕射沈該等請也壬寅靖海軍承宣使提舉佑神觀劉懋為昭慶軍節度使丙午三省樞密院裁定吏額上之尚書省視建炎三年四月所定損守闕二十人密院副承旨主事令史書令史共一百二十七人守闕貼房二百人為額詔諸縣保正長並將上戶斟酌定差下戶止輪充大保長用資政殿學士知宣州樓照請也日歷不載此以王師心看詳狀修入二十八年六月己丑不行戊申新除大理卿張礿自蜀中召還入對論字民之官莫如縣令而四川諸司奏辟多徇人情望悉收歸銓選己酉以礿權尚書刑部侍郎壬子刑部員外郎邵大受言保州宗子實翼祖皇帝之後曩者每遇大禮及誕節各與推恩自建炎至今三十年寢而不行今聞保州宗子有官及白身人其數甚少乞令尊長兩三人省記合行事件結罪以聞從之癸丑尚書右僕射万俟卨上重修貢舉敕令格式五十卷看詳法意四百八十七卷皇伯明州觀察使提舉江州太平興國宫安定郡王令襟為慶遠軍承宣使令襟自言老病丐出不獲與南班普遷之寵乞收使歷過磨勘減年故有是命甲寅罷江淮等路提點坑冶鑄錢司自韓球籍定歲買銅數事見十三年閏月丁酉然所鑄錢才十萬緡尚書省言本司歲額全闕而一司官吏所費不資故有是命遂以其事付轉運司明年七月庚午復鑄左朝散大夫知嘉州朱昌裔言四川鹽酒場務自建炎中總領財賦官變法以盡一時之利應副川陜軍食蓋勢有不得已者自後纍政惟務增添逮今每歲共收鹽酒課息錢一千一百餘萬緡比之舊額幾四五倍遂至趨辦不及積欠數多乃者朝廷遣使裕民歲減七十萬雖未能盡去重額民亦少寬惟舊欠未除追催嚴峻官吏貧民俱被其害破産舉債終難補足望將未減額以前舊欠如非侵欺盜用並行除放詔蕭振等相度以聞乙卯三衙乞免減吏額許之殿司吏六十馬司四十有一步司五十人其名有都吏副都吏典史副典史書吏典書副典書凡八等殿司八案五曰兵曰磨勘曰倉曰胄曰推餘二司無磨勘三司皆有開拆及法司殿中侍御史周方崇論知信州周葵終日談禪不親郡政詔葵與宫觀差遣己未宰執進呈殿中侍御史周方崇論左朝奉大夫主管台州崇道觀陳惇左朝請大夫趙迪之貪暴無恥乞屏於遠方上曰所論未知實否且下逐路監司體究沈該曰既是臺章恐不須體究上曰朕見人才難得未嘗不留意愛惜每諭以臺諫風聞言事不可容易須再三詢訪朕惟言者之聼豈可不審今二人者合如何施行該曰乞送吏部與監當上曰且依此方崇又論戶部郎中向伯奮素有脫空之名專務刻剝上曰朕方令伯奮理財亦嘗使之治盜乃寢其奏出伯奮知吉州伯奮嘗言典買田宅舊法六十日報契今限百八十日違限即將田宅沒官宰殺耕牛舊法罪止徒今皆配廣南立法太重乞依舊法上曰祖宗舊制輕重適中皆當遵守此二事並從舊後二日降旨施行而伯奮已出矣庚申上謂大臣曰昨日詔求言四方之士陳獻甚多朕一一披覽所言利害極有可取宜擇其議論尤切當者量與推恩庶幾有以勸之時應詔者甚衆而後省以左從事郎敕令所刪定官杜莘老左從政郎新黃州州學教授潘慈明為首乃各循一資慈明金華人也二人循資在明年正月甲午祕書省著作佐郎兼普安恩平郡王府教授黃中言恩平郡王講禮記終篇詔令講易時王府官龍淵已親幸他教授或與之過從觴詠中獨未嘗與之坐朝夕見則揖而退其後他教授多蒙其力而中獨不徙官此據朱熹撰黃中行狀附入未知指何人辛酉左銀青光祿大夫守尚書左僕射同中書門下平章事提舉詳定一司敕令万俟卨以進書恩為左金紫光祿大夫壬戍三佛齊國進奉使蒲晉等入見獻乳香八萬斤胡椒萬斤象牙四十斤劒原缺名香寶器甚衆又以明珠琉璃金酒器上宰相而秦檜已死詔以其物輸御前激賞庫而以蜀錦答之癸亥以三佛齊國首領悉利麻霞囉為保順慕化大將軍三佛齊國王賜襲衣金帶鞍馬器幣二百以蒲晉為歸德郎將副使蒲遐為懷德郎將判官蒲押陀囉為安化司候蒲晉等留彌月乃行甲子金國賀正旦使中奉大夫祕書監兼右諫議大夫梁球副使定遠大將軍充侍衛親軍馬軍副都指揮使耶律諶入見球廣軍人也此據范成大攬轡録是歲宗室子賜名授官者二十有六人諸路斷大辟三十人金主亮以李成知中山府孔彥舟知河南府且經營汴京將謀徙居乃以內侍梁漢臣為修大內使彥舟副之於是暴役橫斂以務速成而中原之民重罹其毒矣漢臣師成養子也熊克小歷稱金主以左相張浩領行臺省修汴京且用本朝內侍嚮陷金梁其姓者為提舉官號大使注云此據殺亮録參修以煬王江上録考之內侍則漢臣也張棣正隆事迹張浩營汴京在正隆四年三月時當紹興二十九年今移附本年月建炎以來繫年要録卷一百七十五
