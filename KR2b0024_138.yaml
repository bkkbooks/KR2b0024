body:
  text: 建炎以來繫年要録卷一百三十八宋李心傳撰紹興十年冬十月壬申朔袐書省正字溫革監登聞檢院馬竤罷時言者論二人専守偏見譏議紛然望使各與外任庶幾人知好惡國是自定乃以革通判洪州癸酉資政殿大學士知福州張浚以明堂恩復觀文殿大學士左朝請大夫范塤都大主管川陕茶馬監牧公事主管秦司甲戌武功大夫華州觀察使知代州兼沿河安撫使統制河東忠義軍馬王忠植落階官為建寧軍承宣使龍神衛四廂都指揮使河東路經略安撫使兼知代州丙子河南府言永安永昌永熙三陵神臺􅪤列損動及枳橘柏株有為賊所伐者詔本府如法補飭丁丑言者論每遇宗祀之秋必有警戒之象或六龍順動或強敵侵陵今又大火示變故當正厥事以應之恭以皇祐詔書合祭天地並配祖宗此陛下所用宗祀之彛典也而辛亥嵗禮部郎官有立議止以太祖太宗並配者是時宰相力主是説違詔書輕宗廟之罪卒自當之且太祖開萬世之基太宗定四海之難而和戎戢兵以致太平者真宗也臣願陛下參之羣言斷以獨智以合皇祐聖詔以慰在天之靈以垂萬世之法事之當政無大于此者誠如是則天意格而災異銷矣詔禮官討論申省後不行戊寅尚論右僕射兼提舉詳定一司敕令秦檜等上紹興重修在京通用敕令格式四十八卷申明十二卷看詳三百六十卷丙戌武翼大夫忠州刺史河北路統制軍馬李寶至楚州先是寶與其徒曹洋等自興仁泛舟來歸過徐州捕金之戍卒七十餘人及淮陽軍為守將所逐寶射郤之時韓世忠在楚州寶與其徒歸之世宗大恱丁亥直祕閣提舉洪州玉隆觀范直方落職與逺小監當直方以司農卿為淮北宣撫副使楊沂中計議軍事至是右正言万俟卨論其怯懦沮師又言軍之進退必觀機會而乃昧于興舉之謀但為保身之計故有是命王明清揮麈録餘話云建炎中金人駐楚泗間時張韓擁兵于髙郵敵誓于衆整師大入二將自料非其敵深以為怯將欲交鋒之際風雨大作敵衆辟易散走損折甚衆因遂奏凱范師厚直方滑稽之雄也為參議軍事笑云焉知張七韓五乃得巽二滕六力邪聞者為之開堂鄉貢進士王文獻進所注司馬法詔免文解一次文獻泉州人也己丑徽猷閣待制知信州劉岑落職提舉江州太平觀建昌軍聽旨以臺臣論其厯守三郡妄費官帑以市私恩故也仍命司農寺丞李椿年往鎮江府信他州點檢侵支妄用錢物申省左朝散大夫沈該行軍器監主簿填復置闕庚寅武功大夫忠州刺史新知宿州王進改知濠州武功大夫貴州刺史王存知光州進之除宿州也乞台州兵馬鈐轄邵青為本州鈐轄至是復興青偕之濠梁也辛卯詔州陜官員陳乞覃恩轉官磨勘奏薦封贈循資致仕遺表恩澤依得著令者令宣撫司施行以胡世將申審也壬辰上謂大臣曰用兵惟在賞罰若用命者必賞不用命者必罰何患人不盡比聞大將奏賞往往任私不當人心朕若親提一軍明賞罰以勵士卒必可擒取烏珠戊戌左光祿大夫守尚書右僕射同中書門下平章事兼樞密院使提舉詳定一司敕令華國公秦檜以修書恩進左銀青光祿大夫封衛國公直顯謨閣知慶陽府節度鄜延環慶兩路軍馬宋萬年升敷文閣待制録守城之勞也己亥龍圖閣直學士范中徽猷閣待制王居正並落職依舊提舉江州太平觀御史中丞何鑄論二人之罪以為趙鼎當軸汲引一時邪佞之人置之朝廷日者陛下斤逐凶邪天下咸服而欺世盜名之甚者猶置而不問是狐狸雖去而豺狼猶存恐非所以明好惡一觀聽故故有是命庚子熙河經略司將領惠逢與敵遇于野龍河敗之是月淮北宣撫判官劉錡來朝資政殿學士翟汝文薨賜諡忠惠十有一月案是月辛丑朔壬寅直徽猷閣主管台州崇道觀王子獻卒癸卯尚書倉部員外郎陳膏祕書郎吳傳並為監察御史戍申金將喀齊喀自潼關出犯陜州守臣吳琦擊郤之喀齊喀羅索孫也鳳翔府同統制軍馬楊從儀敗金人于寶雞縣己酉上曰自古為天下者必先得人心未有専事殺伐殘忍而可為者烏珠雖強専以殺伐殘忍為事不顧人心之失朕知其無能為也右宣義郎廣西路提點刑獄公事陳正由特降一官正由奏其代者尤深不法而言者論正由但當具事因申聽朝廷施行今乃云謹按又云姑托其大者言之又云以為天下臣子貪墨不體國家之戒其言犯分輕率故有是命辛亥頒真宗御製文武臣僚七條于郡縣福建安撫大使張浚等奏乞措畫賑濟事上曰賑濟本為貧民近世止及城郭而鄉村之民未嘗及之須令州縣雖僻處亦分委官吏必躬必親則下户皆霑實惠矣起居郎張宦權尚書吏部侍郎起居舍人李易守起居郎尚書司封郎中郭孝友為起居舍人廣南東路兵馬鈐轄殿前司催鋒軍統制韓京升充本路兵馬副總管兼汀漳虔吉州捉殺盜賊時劇盜謝花三為亂故命京討之仍聽福建大帥張浚節制壬子皇伯鎮東軍承宣使安定郡王令廣為保平軍節度使以令廣曩任文資積閥特遷也癸丑兵部尚書兼權翰林學士兼侍讀胡交修充端明殿學士知台州權尚書吏部侍郎周綱充敷文閣待制知饒州二人皆以引疾得請以徽猷閣待制提舉醴泉觀兼詳定一司敕令張宗元試尚書兵部侍郎乙卯川陜宣撫副使胡世將奏已遣兵解慶陽之圍乞詔湖北京西宣撫使嶽飛出兵牽制上曰此未易輕議凡事有緩急先後必思而後動乃可以成功也先是慶陽圍急帥臣宋萬年乘城拒守會世將以檄書招建寧軍承宣使河東經略使王忠植以所部赴陜西會合行至延安叛將趙惟清執忠植使拜詔忠植曰若本朝詔書則受若金國詔書則不拜也惟請械之以詣右副元帥薩里罕不能屈使甲士引詣慶陽城下諭使出降忠植大呼曰我河東步佛山忠義人也為金所執使來招降願將士勿負朝廷堅守城壁忠植即死城下薩里干怒詰之忠植披襟大呼曰當速殺我遂遇害諸王宫大小學教授范雩請南班大將軍以下用故事二年一試藝業取中選者推恩不果行雩吳縣人也丙辰賜成州團練使帶御器械郉孝揚兩浙田二十頃丁巳監察御史楊願守尚書司封員外郎諸王宫大小學教授梅充實行監察御史直祕閣知臨安府俞俟升祕閣修撰以俟每對便殿切事機故也戊午上曰用兵惟視謀之臧否不可問力之強弱茍謀之不臧惟知恃力雖或勝亦不足以成功上又曰收復州縣非良策也守之則兵分而勢弱不守則旋為敵人所得惟塗炭吾民且須深思熟慮策出萬全一舉而逐敵則州縣皆為我有矣何必每州每縣而取之乎已未尚書左司員外郎魏良臣為中書門下省檢正諸房公事右司員外郎施坰林正為左司員外郎監察御史錢葉為右司員外郎左承奉郎何逢原為祕書省正事免召試辛酉御史中丞何鑄論薦舉改官之弊以為多以親故勢賄賂得之而有治行之人終老選調徒長奔競無補得人望詔有司罷去保官之令専用考課之法關升改官各以四考為限有過犯則量事展考以别流品嵗限員嵗數以防猥并庶寒畯之士無淹滯之歎事下吏部不果行嘉泰四年四月庚申所書可參考甲子右正言万俟卨論營田官莊附種之弊以為官莊設即百里之民應籍者皆赴莊以待耕耨已業荒廢多不能舉附種行則斗升之種户給于民散斂之擾率以為常欲望逐路選委強明監司一人遍行郡縣應有營田去處核實均放其帥臣隱蔽不肯公共商榷者並許按核以聞上曰卨所論極當大凡營田須軍中自為之則不斂于民而軍食足若使民舍己之田營軍之田恐甚于斂民之為虐也乃詔領營田監司措置詔淮北宣撫判官劉錡募兵效萬人時錡軍及韓世忠嶽飛皆造軍器所乞牛皮至十餘萬張郡邑往往殺牛以應命言者請蠲其數目詔工部措置是月宜章洞民駱科文遂犯桂陽郴道連賀州諸縣詔發大軍往討之趙甡之遺史在十二月今依紹興十二年四月二十四日湖南安撫司所申附此月末十有二月案是月辛未朔癸酉左朝散郎李若谷為司農寺丞若谷若水兄也徽猷閣待制知潭州謝祖信卒趙鼎事實曰謝祖信坐章氏子壻出知潭州祖信至家大詬其妻凡數日曰爾家纍我以致鬱抑而死祖信守潭事具去年六月壬午命尚書右僕射秦檜上皇太后册寶于慈寧殿寶用金册以珉石册文參知政事孫近所撰而上自書之禮畢上遙賀于宫中羣臣遙賀宫門外丙戌詔臣僚章疏非已施行者及邉防攻守等事並毋得雕印尚書禮部侍郎蘇符權禮部尚書仍兼資善堂翊善中書舍人林待聘試給事中仍兼直學士院兼侍講起居郎李易試中書舍人起居舍人郭孝友權尚書工部侍郎責授清逺軍節度副使潮州安置趙鼎移漳州居住左通議大夫王庶復端明殿學士左朝議大夫折彥質復龍圖閣學士皆用明堂恩也言者奏庶之飾姦惑衆彥質之敗事誤國罪皆顯著今遽牽復恐天下之人心不能無疑又言鼎之罪惡類入于無將十惡之誅恐難以常法從事而行原赦命乃寢庶大中寢命在己丑鼎寢命在壬辰丁亥祕書少監朱翌試起居舍人仍兼實録院檢討官司農少卿李若虛試司農卿故龍神衛四廂都指揮使建寧軍承宣使王忠植特贈奉國軍節度使開府儀同三司官其家十人時胡世將上忠植死事于朝詔贈官特賜諡太常議諡勇節都省批忠植死節事迹顯異自古節義罕有倫比其别擬定太常奏據法忠植當諡曰忠然易名之義不欲復犯其名諡法能濟于志曰義義能固守曰節請改諡義節從之忠植再定諡在明年二月丙申今聨書之戊子左朝請郎勾龍如淵復敷文閣待制左朝奉郎劉一止呂本中復祕閣修撰並仍舊提舉江州太平左朝奉郎主管洪州玉隆觀周葵復直祕閣辛卯祕閣修撰栁約復敷文閣待制仍舊提舉江州太平觀左朝奉郎監廣州都鹽倉施庭臣復直祕閣與宫祠皆用刑部檢舉也言者奏本中阿附趙鼎無異陪臣又奏庭臣失尊君之體于是二人復職之命皆罷本中寢命在是月癸巳庭臣寢命在明年正月乙丑癸巳武略大夫耿著復為左武大夫用韓世忠奏也樞密院效士吳惕特補下州文學惕河南人用守將李興薦而有是命甲午龍神衛四廂都指揮使和州防禦使權主管侍衛步軍司公事韓世良為廣州觀察使乙未婕妤張氏才人吳氏並進封婉儀有言者請令諸大帥各薦偏裨之可任者上曰諸校智愚勇怯朕皆熟知之儻有使令便可抽摘何用薦舉耶兵部侍郎張宗元乞命有司以續降朝旨便人合理者褒為一書以進許之後九年乃成凡四百三十五卷十九年六月戊午成書詔左承事郎陳淵已復直祕門指揮勿行以言者論淵與吕本中各以朋比得罪不當與詿誤之人一槩湔祓故也丙申新除權尚書工部侍郎郭孝友卒詔除敷文閣待制致仕右奉議郎樞密院計議官王易卒以久攝本院檢詳特官其子一人後不為例丁酉命殿前司前軍統制王滋捕東陽縣魔賊上命大臣諭滋毋多殺未幾賊平己亥詔太廟時享以少牢夾享以太牢如舊典用太常少卿陳桷請也始以殿室隘狹祫與時享並用一羊至是殿室已展修故桷有請是月淮北宣撫副使楊沂中引兵還行在永州防禦使呼延通自殺初京東宣撫處置使韓世忠在楚州晚年猶嗜色每諸將招之飲必使妻女奉觴為夀世忠留連酣醉而後歸通忿之臨安有甲妓韓婉者美而慧通以力致之世忠聞而屬意通不能吝遂獻于世忠一日世忠與水軍統置郭宗義會于通家世忠暫卧通以手拔其佩刀宗義搦其手曰不可世忠覺大驚奔馬而歸通與淮陰統制官崔德明不叶世忠即召通斥為士伍使𨽻德明軍中世忠生日諸將皆入為夀通自淮陰馳至世忠見之即走入不復出通伏地泣血衆共遣之通乃去德明還淮陰數通擅離軍之罪杖之數十通怏怏赴運水死人皆惜其勇世忠後亦悔之案世忠生日在此月癸巳不知通死以何日故且附月末初知河南府李興既屯白馬山寨李成以蕃漢數萬衆圍之時興妻周氏與其子居襄陽惟幼子在側敵圍益急士心頗搖興聞謂諸將曰興與諸軍當以死守毋有二志茍或不敵吾豈為敵汚者當抱是兒南向投崖以謝天子諸將皆感泣由是守益堅敵遣使賫黃榜招興以奉國上將軍河南尹興得檄不啓立斬其使以檄聞于朝白馬受圍久方冬泉涸軍民乏絶興焚香默禱一夕大雪泉源皆溢成知興志不可屈乃即山下屯兵積糧為久居之計興潛遣將士夜焚之成大挫徑歸西京是嵗河南王忠民卒忠民既辭祿事具紹興三年依董先于豫章次年撰三國和議狀遣世臣嶽知常散之偽境俄而知常為侯人所執忠民坐是編置閩中未幾得釋金歸河南之嵗三詔威武軍津遣忠民造朝力辭恩命罷歸及是携家來居臨安而卒年七十五此據林泉野記修入金人既復取河南地猶慮中原士民懷二王之意始創屯田軍凡女真奚契丹之人皆自本部徙居中州與百姓雜處計其户口授以官田使自播種春秋量給衣馬若遇出軍始給其錢米凡屯田之所自燕之南淮隴之北俱有之多至五六萬人皆築壘于村落間至今不廢此據張棣金國志修入不得其年故附于取河南之嵗建炎以來繫年要録卷一百三十八建炎以來繫年要録卷一百三十八金人地名考證喀齊喀原書作合喜即金史之合嘉並誤今改正洛索原書作婁宿誤改見卷一烏珠原書作兀术誤改見卷一薩里干原書作撒離喝誤改見卷十一
