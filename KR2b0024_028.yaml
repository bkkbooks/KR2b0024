body:
  text: 建炎以来繫年要録巻二十八宋李心傳撰建炎三年九月丙午朔日有食之所蝕僅四分未㡬復退故事日食不視朝吕頥浩言今車駕廵幸事務至繁乃以晚朝進呈公事上謂頥浩曰太史所奏日蝕早而分深朕適以油盆觀之食淺而退速頥浩曰陛下嚴恭寅畏感格如此宣義郎監登聞鼔院范燾上封事上批令奉使金國吕頥浩召直學士院汪藻至都堂令作國書且召燾赴堂咨問頥浩奏使臣以忠信為主而燾所獻封事狂誕不經乃罷之詔尚書兵部侍郎湯東野權管平江府職事以李邴未至故也是日上幸登雲門外閲水軍時諜報金人䧟登莱密州且於梁山泊造舟恐由海道以窺江浙初命杜充居建康盡䕶諸將至是輔臣言建康至杭州千里至明越又數百里緩急禀命恐失事機請以左軍都統制韓世忠充兩浙江淮守禦使自鎮江至蘓常界圌山福山諸要害處悉以𨽻之上曰未可此曹少能深識義理若權勢稍盛將来必與杜充争衡止令兼圌山足矣己酉上次常州庚戌上次無錫縣晚朝進呈周望言昨晚望氣椘清覺嘗占天象牛宿光明正在東南敵騎不渡江第恐擾闗陜襄鄧為五路災爾上曰大率皆本晉天文志本朝自祖宗禁星緯之學故自太史外世罕知者金人不禁其人徃徃習知之辛亥上次平江府壬子金人降單州取興仁府遂䧟南亰守臣直徽猷閣凌唐佐為所執敵因而用之龔頥正忠義録云唐佐知應天府建炎三年金人圍城守節不屈偽齊欲用之不受命為所害此誤也趙甡之遺史云金人至應天唐佐投拜金人以應天為歸徳府令唐佐知府事日歴附傳亦云金人䧟南京執唐佐降之復以為南京守今從附傳唐佐紹興二年十月死節癸丑端明殿學士簽書樞宻院事周望充兩浙荆湖等路宣撫使時尚書右僕射吕頥浩請自留平江督諸將拒戰而命望駐兵鄂渚以控上流既而上以頥浩不可去行在乃以望為兩浙宣撫使總兵守平江府翰林學士奉議郎張守為端明殿學士朝奉郎同簽書樞宻院事正議大夫李梲守戸部尚書徃建康調軍食熊克小歴户部侍郎李梲遷尚書按梲靖康中已為執政無縁復除侍郎克誤也棁初見元年正月辛夘尚書戸部侍郎陳邦光移刑部兵部侍郎湯東野移工部詔江東宣撫使劉光世移屯江州時隆祐皇太后在南昌議者以為自蘄黄渡江陸行二百餘里可至上憂之遂命光世自姑熟移軍以為南昌屏蔽既至軍中月費錢十三萬緡江南路制置使起復寳文閣直學士權邦彦以用度不足告於朝已而言得東平府故吏報其父亡遂觧官持服丙辰廸功郎張邵為奉議郎直龍圖閣假禮部尚書充大金軍前通問使起復武翼郎楊憲為武義大夫副之時將復遣使入金而邵以上書得見因請行邵自椘州渡淮則逢金軍遂見左監軍完顔昌於昌邑前御史中丞秦檜在焉知萊州吳鉌者宣和間為太學生與邵善昌使與邵飲酒鉌頗有得色初邵之至軍也昌責邵拜禮邵不從昌怒使人拘於昌邑乆之憲與其從者謀欲共殺監己者脫身来歸事泄金人執憲鞭之與其徒囚祚山寨土牢邵以不同謀得免邵初見今年三月初張浚調兵潭州而帥臣直龍圖閣辛炳懦怯不能遣㡬至生變浚罷之起復直龍圖閣向子諲知潭州至是以聞日歴於此日書二人除罷按此月壬申潭州軍變子諲已在本州相去纔十六日不應赴鎮如是之遽盖浚先除後奏也髙麗請入貢詔不許給事中兼直學士院汪藻草詔略曰壊晉館以納車庻無後悔閉玉闗而謝質匪用前規上大善之以藻為得體紹興二年閏四月癸巳再入貢金人陷沂州守臣以城降辛酉徽猷閣直學士陳彦文落職以張浚奏其在江州妄用諸司錢四十餘萬緡且多欺隠也仍遣御史一員徃察其事未㡬彦文卒朝議大夫知岳州按史作鼎州邢倞坐結伊都事再責汝州團練副使英州安置倞結伊都事已見元年正月辛卯壬戌宣教郎直秘閣亰東轉運判官張自牧追還所轉官資職名章服令開具元賫錢物收支數申尚書省金之未渡江也詔以自牧兼亰東制置副使厚賜金帛遣行自牧至揚州留不進居數月乃言有已見機宻急切利害大事欲具實封差人賫申朝廷竊慮路中失滯今不免渡江前来欲乗時速詣都堂面禀朝廷察其欺罔乃重黜之㑹軍務擾攘事遂寢此乃紹興五年五月十三日張絢劾疏修入他書並無之癸亥尚書左司貟外郎兼御營使司參議官李承造直秘閣知筠州以言者論列故有是命右武大夫忠州防禦使知泗州李成言所統軍衆天寒無衣今艱難之際府庫不充欲望量賜支絹以激戰士詔成所言忠能體國令戸部輟絹二萬匹賜之初上遣賀子儀撫諭成成即令其將張琮赴行在又命舉人許道為表謝上曰恨無李廣之無䨇願效顔回之不貳吕頤浩喜以琮為秉義郎召道赴行在琮自言本諸生乃以為成務郎使趣成入見道行至白塔市成追還之復以其衆叛琮遂歸詔以琮監温州酒稅琮安肅軍人道泗州人也丁卯直龍圖閣福建轉運使程邁守太常少卿江南西路提㸃刑獄公事張公濟為尚書右司郎中尚書金部員外郎王岡為御營使司𠫭議官岡無錫人吕頤浩之守揚也岡通判州事多所賛助頤浩徳之至是外召為郎尋薦對而有是命己巳御筆朕累下寛恤之詔而廹於經費未能悉如所懐今聞東南和預買絹其弊尤甚可下江浙减四分之一以寛民力仍俵見錢違寘之法令尚書省榜諭徽猷閣待制知建康府胡舜陟為兩浙宣撫使司㕘謀官徽猷閣直學士知鎮江府陳邦光為顯謨閣直學士知建康府沿江都制置使徽猷閣待制兩浙宣撫司𠫭謀官胡唐老知鎮江府舜陟邦光之除熊克小歴繫之卜一月己酉按唐老實代邦光而日歴四年四月壬辰有唐老母康氏乞恩澤狀云自宣謀移鎮江府十一月三日到任决不是初五日除日歴閏八月四日陳邦光知建康府九月七日陳邦光除刑部侍郎此亦差誤按建康知府題名陳邦光今年十月到任以時考之當是九月二十四日除日歴誤差一月今移附此但不知唐老何以許時方到官當考時舜陟以金人勢逼乃求為周望屬官吕頤浩從之浙東制置使韓世忠在鎮江或執舜陟以獻世忠數其棄城之罪縛於海舟之桅檣既而問之曰改除矣乃聽行庚午詔休兵兼旬可涓日進發以尚書工部侍郎湯東野為徽猷閣直學士知平江府兼兩浙西路安撫制置使留御營統制官巨師古陳思恭李貴以所部守平江並受宣撫使周望節制始平江人猶幸駐蹕倚以為安及是皆失望於是有逺散之閩越者宣撫處置使張浚言已劄下亰湖川陜轉運司時下差官權攝職任若犯入已贓其元差官並同罪從之是日李成入滁州初知滁州向子伋聞有敵師乃堰滁河使環繞城下山水暴至堰成輙壊子伋令民輸財募工疊石穿孔灌以金汁㑹秋雨連日堰卒壊子伋率軍民徙居瑯琊山寨五軍之士僅二千人猶慮不能守聞成在泗即移書招之成喜盡掠泗州强壯以行或謂子伋曰成包藏深險豈可與共居子伋悟遂却之成怒率兵入城屯於州治辛未故直龍圖閣鄒浩追復龍圖閣待制浩黨籍待制已上第三十四人永州安置已見二年九月壬辰紹興六年二月己酉再贈故延康殿學士沈積中追復資政殿學士通奉大夫盡還合得恩數積中晉陵人宣和中知真定府上疏論不可取燕山童貫惡之奪其職至是三省以為言故有是命壬申上謂大臣曰有為朕言移蹕浙東人情未孚宜降詔具述初非朕意悉出宰執庻㡬軍民不怨朕既為天子當任天下之責舉措未當豈可歸過大臣王綯曰古之賢君不肯移災股肱無以過此熊克小歴載上語在癸丑今從日歴遣御史趙鼎徃杭秀諸州按察上聞浙東西諸州科率黄幙且調民治道慮其擾人故命鼎先徃仍許民間自陳其科率者皆還之草澤天文耿静言太㣲垣正午推歩今嵗熒惑躔次方在己未應至太㣲垣上曰此人不深知朕夜以星圖仰張殿中四更親起見其已至昨夜已退二度半吕頤浩曰宋景出人君之言三而熒惑退舍或者疑焉陛下寅畏天應之速如此信傳記之非虛也耿静耿堅之姪紹興元年正月癸亥以從義郎樞宻院尅擇官乞召耿進赴行在是夜潭州禁卒自城南縱火殺一兵官於市刼其將使為主其將譎之以入甲仗庫至子城反闗拒之郡卒焚東西城樓火市民居放火自馬軍營始馬軍營忿之出戰賊掠金銀遂自東門出瀏陽路城中大亂殺戮攘奪至旦未息帥臣向子諲命通判州事孟彦卿趙民彦以將領馬軍等追之至醴陵攸縣間與鄉兵戰為寨柵所阻不能去遂招安歸至城門皆搜索而入畏其黨與不敢盡誅彦卿忠厚從父民彦燕人嘗為張覺㕘謀者是也甲戌戸部侍郎葉份請江浙湖廣福建成都潼川府利州路贍學錢糧並起發赴行在内川廣福建仍易輕齎亰畿亰東西淮南路贍學錢糧並借與漕司為軍期之用䕫州路半給漕司半易輕齎從之金陜西諸路選鋒都統羅索大合兵渡渭侵長安是日經略使郭琰遁去張浚行狀載琰棄長安在今年九月二十九日甲戌今附此趙甡之遺史繫之去年八月十二日甲午與此不同據史琰靖康元年四月自朝議大夫秘閣修撰除陜西制置觧鹽使不知今為何官職也乙亥御營統制官巨師古所部建卒陳觀等謀為變焚營夜遁詔都統制辛企宗遣兵追捕至無錫縣盡獲之是月兵部尚書謝克家罷為徽猷閣學士知泉州殿中侍御史趙鼎為侍御史先是御史中丞范宗尹因奏事論鼎自司諫遷殿中非故事上亦嘉鼎敢言故有是除直龍圖閣知婺州黎確行左司諌諌院題名盗酈瓊圍光州固始縣瓊相州人崛起於兵火中尚氣敢為衆所推伏至是轉㓂淮右知縣事向宗輝悉力禦之按宋史繫甲戌日保寜軍承宣使主管侍衛歩軍司公事閭勍以所部奉西亰㑹聖宫祖宗神御南歸由蔡河而下至濠州守臣孫逸謂之曰太尉雖王臣而逸未嘗識面今為軍民計不敢開門勍曰勍奉祖宗神御而来守臣郊迎禮也逸乃朝服率屬吏遥拜於四望樓勍不能奪而去初勍至𣺌河遇劇賊張用説使歸朝以其義女嫁之因以為中軍統領用遣其𠫭議官劉舜臣與勍偕行是秋金國元帥府復試遼國及兩河舉人於蔚州遼人試詞賦河北人試經義始用契丹三嵗之制初鄉薦次府觧次省試乃曰及第時有士人不願赴者州縣必根刷遣之雲中路察判張考純主文得趙洞孫九鼎諸人九鼎忻州人也宣和間嘗㳺太學陷金五年始登第熊克小歴稱九鼎陷金十年始登第盖承洪邁夷堅志所書也非實金人以靖康元年陷河東至此始五年盖誤記耳金左副元帥宗維禁𨼆藏被掠亡人士者罪死初金人之始用兵也右副元帥宗傑建樞宻院於燕亰以劉彦宗主之左副元帥宗維建樞宻院於西亰即雲中府以時立愛主之彦宗初見元年正月辛卯立愛初見元年八月末金人呼為東朝廷西朝廷及是彦宗以病卒宗維乃併樞宻院於西亰以西亰留守韓企先與立愛同主之宗維素念彦宗遂以其子筈簽書樞宻院事又以通事髙慶裔為大同尹山西兵馬都部署按原註作英宗廟諱同音今補以烏凌阿思謀權太原少尹思謀即色哷美姓最賤宗維初起時色哷美方負薪宗維喜其才妻以庻弟宗憲之乳母命為都㸃檢乆之其門人洛陽吳士鼎為制今名宗維以思謀奉使有勞令樞宻院白身差權少尹金國樞宻院分河間真定府為河北東西路平陽太原府為河東南北路去中山慶源隆徳信徳河中府名復舊州名去慶成軍名復舊縣名改安肅軍為徐州廣信軍為遂州威勝軍為沁州順安軍為安州永寜軍為寜州升樂夀縣為樂夀州降北平軍為永平縣金元帥府禁民漢服又下令髠髪不如式者殺之青州觀察使李邈故為真定帥城陷入燕留金三年金欲以邈知滄州笑不答及髠髪令下邈憤詆之金人以撾擊其舌流血復吮血噀之翼日自祝髪為浮屠金人大怒命擊殺之邈將死顔色不變謂行刑者曰願容我辭南朝皇帝拜訖南向端坐就戮燕山之人皆為之流涕邈清江人家世業儒其母曽鞏女兄弟也登進士第累官部刺史以忤蔡京意畏禍換右列死年六十九後秦檜還言其忠贈昭化軍節度使諡忠壯邈死不得其時附傳云建炎三年故附於今秋金人下令髠髪之後初宣武卒閻進從朱弁出使至是逃歸為邏者所獲西亰留守髙慶裔義而釋之進逃遁至三乃見殺進南鄉受刄而斃保義郎李舟者被拘髠其首舟憤懣一夕死此據朱弁奏不得其月日故附於慶裔除留守及金人下令後是時知代州劉陶執一軍人於市驗之頂髪稍長大小且不如式即斬之其後知趙州韓常知觧州耿守忠見小民有衣犢鼻者亦責以漢服斬之生靈無辜被害莫可勝紀時復布帛大貴細民無力易之坐困於家皆不敢出常慶和子守忠本燕人宣和末為石嶺闗守將宗維兵至以闗降因為金用冬十月丙子朔詔諸路按察官自通判至監司嵗具發摘過贓吏姓名置籍申尚書省以為殿最即有失按而因事聞者重譴之給事中兼權直學士院汪藻轉對請結故遼逹實林牙以圖興復丁丑金人侵蔡州守臣程昌㝢遣將時貴拒之敵留攻七日而去既而賊田臯犯新恩縣昌㝢命杜湛出擒之昌㝢因留臯以為將此據昌㝢奏狀及家傳參修昌㝢所奏守禦事甚詳十一月乙巳朔有㫖劄下江淮諸州為法文多不載日歴紹興六年五月十三日量移人滕膺狀昨任亰西運副建炎三年十月金人来侵蔡州知州程昌㝢託病在假膺遂措置捍退與此不同當考戊寅上發平江府自廵幸以来駕後諸軍多乗勢為亂至是詔駕後諸軍先發獨以禁衛諸班扈蹕由是平江得安此據錢復平江記利州路轉運司奏辛企宗擅引兵過興洋庚辰詔諸軍擅入川者依軍法癸未上至臨安府丙戌執政登御舟奏事吕頤浩曰陛下邇来聖容清癯恐以艱難聖慮焦勞所致然願以宗廟社稷付託之重少寛聖抱以圖中興上曰朕嘗夜觀天象見熒惑躔次稍差食素已二十餘日須俟復行軌道當復常膳庚寅上御舟幸浙東時内侍馮益以潛邸舊恩恃此頗恣與御前右軍都統制張俊争渡以語侵俊且訴於上事下御史臺侍御史趙鼎言明受之變起於内侍覆車之轍不可不戒益紹興六年七月庚辰貶郭仲威自楚州引兵至通州遂渡江至常熟縣兩浙宣撫使周望招降之仲威有衆數萬人望承制以仲威為觀察使充本司統制官使將其軍屯虎邱山寺日歴閏八月辛卯御營使司劄子魯珏聴杜充使喚此日後書郭仲威至通州受周望招安魯珏而下以次補官前後不同當考辛卯李成陷滁州先是李成攻瑯琊山寨知滁州中奉大夫向子伋遣僧智修持書遺成通好且犒師成不從攻之益急寨中惟有澗水不足以供數萬人之食軍中皆食炒米多得渇疾於是徃徃越城而遁鴉觜山髙而逼成累土運薪填其㘭處遂與城平是日賊攻城大肆殺掠溝澗流血成執子伋殺之盡取强壯以充軍日歴辛卯李成陷滁州按此時滁州已移治矣向子伋事以趙甡之遺史修入壬辰上至越州入居州廨百司分寓王明清揮麈録云上初過蕭山縣宗室趙不衰等迎拜道左上大喜顧左右曰符兆如是吾無慮矣命進不衰三秩晚朝謂宰執曰朕自建康至此不無擾民欲赦所經州縣朕誠知數赦非良民之幸但金人榜文要動揺民心使歸怨國家强使從彼因赦諭以朕意謂廵幸非出得已事定當議蠲除令詞臣深知此意戊戌令東南八路提刑司嵗収諸色經制錢赴行在一曰權添酒錢二曰量添賣糟錢三曰増添田宅牙稅錢四曰官員等請給頭子錢五曰樓店務添三分房錢其後嵗収凡六百六十餘萬緡而四川不與焉紹興元年四月庚午可參考知樞宻院事宣撫處置使張浚至興元上奏曰竊見漢中實天下形勢之地號令中原必基於此謹於興元積粟理財以待廵幸願陛下早為西行之謀前控六路之師後據兩川之粟左通荆襄之財右出秦隴之馬天下大計斯可定矣浚治兵興元欲易置陜右諸帥乃徙端明殿學士知熙州張深知利州充利州路兵馬鈐轄安撫使而以明州觀察使劉錫代之於是徽猷閣直學士知成都府盧法原去利州路兵馬鈐轄不兼利路置帥成都帥臣不兼利路自此始既而趙哲帥慶劉錡帥渭孫渥帥秦於是諸路帥臣悉用武人矣錡錫弟也行狀浚以十月二十三日抵與元故附此錫以今年七月除熙帥續成都記法原今年八月罷兼利鈐當是七月與深並命也哲錫渥之除皆未見本年月日且附此俟考浚又以武功大夫忠州防禦使本司前軍統制王彦為利州路兵馬鈐轄浚初至漢中問諸將以大舉之策彦曰陜西兵將上下之情皆未相通若少有不利則五路俱失不若且屯兵利閬興洋以固根本若敵人来侵則檄諸將帥互為應援以禦敵若不㨗亦未至為大失也時浚之幕客皆輕銳聞彦之言相視而笑彦以言不行即求去故浚因而授之彦為利鈐未必即在此月附此俟考是日金人陷夀春府時金人大起燕雲河朔民兵入邉又使萬户尼楚赫布爾噶蘇大托卜嘉王伯隆等將女直渤海漢軍以完顔宗弼為統帥初鄧紹宻既死淮西提㸃刑獄閤門宣賛舍人馬識逺代知府事識逺舊嘗使金金將知之南侵過城下扣城呼曰馬提刑與我相識何不開門司法參軍王尚功聞之夜見識逺説以迎降識逺拒不可府人籍籍言郡守有異志識逺懼不敢出以印授通判府事朝散郎王攄攄即自為降書啓城迎拜金兵亦不入城但邀識逺至軍中三日已而以其將周企知府事遂南行此據洪邁夷堅志増修志中通判無名今以日歴夀春府奏状考之則王攄也餘見四年十二月癸未修武郎宋汝為奉詔副亰東轉運判官杜時亮使金請和行次夀春遇完顔宗弼軍不克與時亮㑹汝為獨馳入金壁奉上國書宗弼怒命執之欲加僇辱汝為色不變曰一死固不辭然銜命出疆願逹書吐一詞死未晚宗弼顧汝為不屈遂解縛延之坐且問其邑里謂左右曰此山東忠義之士也以金帛酒食遺之命引至東平見劉豫汝為曰願伏劍為南朝鬼豈忍背主不忠於所事宗弼亦感歎遂留之軍中此據宋氏忠嘉集修入集又云烏珠遣傔人三十輩䕶送汝為至亰師則恐誤盖此時亰師未陷當是来年北歸時也今且云留之軍中更俟詳究庚子金人侵黄州守臣直龍圖閣趙令嵗死之先是張用屯光州境内沿淮為柵上下百里盡収禾稼入寨中儲蓄甚富光州患之及是敵聞隆祐皇太后駐南昌欲自蘄黄濟乃遣精騎五百直攻其寨用之衆數萬悉奔散金人遂焚用積聚徑趨黄州敵之未至也令􅍲以内艱去詔移州治武昌縣命下而令􅍲起復前一日辰刻敵至黄州守衙軍校晏興得其木笴鑿頭箭遣軍士潘明浮江白令􅍲令􅍲視之驚曰金兵也夜半以官軍渡江入黄州敵治兵攻城翌日城陷令􅍲在西壁被執金人猶欲降之令􅍲大罵曰汝輩侵陵中國殺害生靈我雖死不屈金人飲以酒令􅍲揮之又衣以戰袍令􅍲曰我豈當此服金人曰趙使君何堅執如此今天下大半為大金所有若降當富貴令􅍲曰此膝但拜祖宗豈能拜爾金人怒以鞭撃令嵗流血被面令􅍲罵不絶口遂敲殺之兵馬都監王逹軍事判官吳源廵檢劉卓皆為所殺令􅍲守黄踰再嵗羣盗丁進李成張遇貴仲正之徒俱不能犯至是卒以節死事聞贈徽猷閣待制諡曰愍辛丑張浚承制以朝請郎同主管川陜茶馬監牧公事趙開兼宣撫司隨軍轉運使專一總領四川財賦開言蜀民已困惟𣙜率尚有贏餘而貪猾認以為己私惟不䘏怨詈斷而行之庻救一時之急浚以為然於是大變酒法自成都始先罷公帑賣供給酒即舊撲買坊場所置隔槽聴民以米赴官自釀每一斛輸錢三千頭子錢二十二多寡不限數明年遂徧四路行其法䕫路舊無酒禁開始𣙜之舊四川酒課嵗為錢一百四十萬緡自是遞増至六百九十餘萬緡䕫酒紹興十五年七月乙巳减免是日金人自黄州濟江初金人得岸下小舟其數不多乃毁民居為筏以舟引之而行集英殿修撰荆湖沿江措置副使王羲叔聞敵逼黄州引舟遁去敵遂渡大江凡三日濟江盡絶時江東宣撫使劉光世在江州日與朝奉大夫韓梠置酒髙㑹無有知敵至者比知之以為蘄黄間小盜遣前軍統制王徳拒之於興國軍始知為金人至遂遁梠粹彦子粹彦琦子故資政殿學士宣和末為戸部侍郎責黄州安置於是敵自大冶縣徑趨洪州大事記金之分道南侵也不惟廬州之李㑹濠州之孫逸和州之李鑄無為軍之李知㡬真州之向子忞洪州之王子獻臨江之呉将之吉州之楊淵撫州之王仲山袁州之王仲嶷建康之杜充越州之李鄴譚州之向子諲荆南之唐殻或降或走而張浚劉光世之兵亦遁矣豈獨江淮素無兵備哉亦習見兩河官吏被禍而無益寜畏敵而不畏義也癸卯李鄴被㫖造明舉甲每副工料之費凡八千緡有竒上召大將張俊辛企宗示之曰是甲分毫以上皆生民膏血若棄擲一葉甲是棄生民方寸之膚諸軍用之當思愛惜時王綯在側曰陛下愛民如此凡百臣下當體此意中興聖政臣留正等曰斂人之財以為殺人之器聖人忍為之哉惟其扞敵禦難使斯民得遂其生所利有大於所斂者此所以行之而不疑也茍輕棄之而扞禦之效無聞豈聖人之本心哉太上皇帝以此戒諭諸將孰敢不竭忠賈勇以靖國安民為任耶聖訓一發而愛民取將之方兼得之嗚呼休哉詔右諌議大夫富直柔遇事敢諫皆合大體艱難之中賴其獻替以裨朕躬可特轉一官報行天下使知朕優賢納諫之意監察御史沈與求上疏論執政過失改為尚書兵部貟外郎與求奏臣言茍不當宜黜不應得遷上行其言甲辰擢與求殿中侍御史與求論執政過失據附傳云耳未知所論為誰當考是月盜入宿州保義郎權通判州事盛修已守節不屈為所害乆之州人為之請遂贈武翼郎閤門宣賛舍人封表其墓此以紹興九年六月八日樓炤所奏修入奏稱蘄修武等突犯州城未知蘄修武為誰當水他書參考江淮宣撫使杜充聞李成叛命神武前軍統制王􅊛以所部赴滁州􅊛留輜重於長蘆屯其軍於瓦梁不敢進成遣輕騎五百刼其輜重不克㑹充遣宣撫司統制官岳飛為􅊛援遇賊於九里堽盡殪之既而聞金人大入􅊛不至滁州而還楊進之死也其徒劉可以進所部轉㓂汝蔡隨唐之間程昌㝢家傳云三年閏八月沒角牛楊進軍十餘萬㓂真陽公令杜湛等以兵掩擊之俘斬不勝計按是時楊進已為翟興所殺湛所擊即劉可耳至是其下劉滿㓂信陽軍執權知軍事朝散郎趙士員而去至荆門軍殺之後贈右朝奉大夫官一子此以紹興三年八月二十四日程昌㝢保奏狀修入建炎以來繫年要録巻二十八
