body:
  text: 建炎以來繫年要録卷一百二十五宋李心傳撰紹興九年嵗次己未金熙宗亶天眷二年時已定都臨安故自此嵗首不書上所在春正月壬午朔詔大金已遣使通和割還故地應官司行移文字務存兩國大體不得輒加詆斥布告中外各令知悉癸未新除起居郎莫將試司農卿充伴送使侍御使施庭臣守起居郎庭臣之制有云爾抗忠不回見義能勇此時蘇符劉一止並為舍人未知何人所行也詔英州羈管人傅雱許自便以雱建炎初首請出使故也雱坐孔彥舟故流竄者凡七年乙酉左通直郎新監昭州鹽倉胡銓簽書威武軍節度判官廳公事宰相秦檜參知政事孫近言銓昨上書思慮有所不及言語過當不足深責兼書中専詆臣等若不陳乞稍加甄敘則是臣等身為輔弼區區與小官校曲直失大臣體故有是命丙戌以金人來和大赦天下赦文曰乃上穹開悔禍之期而大金報許和之約割河南之境土歸我輿圖戢宇內之干戈用全民命給事中直學士院樓照所草也應河南新復路分見任文武官各安職守並不易置山寨土豪等優與推恩應陕西掌兵官昨緣撫御失宜致有離散非其本心今來既已歸還各仰安職應進士諸科曽因劉豫偽命得解者並與理為舉數應新復州縣放免苖稅三年差徭五年應兩淮荆襄川陕新舊宣撫使及三衙管軍並特取旨優異第賞統兵官等第推恩內外諸軍並與犒設張邦昌劉豫僣號背國原其本心實非得已其子孫親屬並令依舊參注無官者仍許應舉軍興以來州縣失守投降之人不以存亡並與敘復子孫依無過人例靖康圍城偽命及因苖傅劉正彥名在罪籍見今拘管編置者並放逐便未經敘用者與收敘紹興八年特奏名進士試入第五等人並特依下州文學恩例江浙諸路今年和預買紬絹每匹特免一貫文江西湖廣等路見有盜賊嘯聚去處並許自新前罪一切不問日歷全不載此赦書條件今以紹興請和録修入端眀殿學士提舉臨安府洞霄宫徐俯上表賀曰禍福倚伏情偽多端恐未盡於事幾當復勞於聖慮湖北京西宣撫使嶽飛表曰救暫急而解倒垂猶之可也欲長慮而尊中國豈其然乎又曰謂無事而請和者謀恐卑辭而益幣者進願定謀於全勝期收地於兩河唾手燕雲終欲復讎而報國誓心天地尚令稽首以稱藩飛幕客左承務郎張節夫之文也秦檜讀之大怒行營右護軍都統制吳璘時兼知熙州其幕客擬為表以賀璘愀然曰在朝廷休兵息民誠天下慶璘等叨竊不能宣國威靈亦可愧矣但當待罪稱謝則可客謝不及責授祕書少監張浚在永州見議和詔書移書參知政事孫近大略曰魯仲連不肯尊秦為帝且云連寧有蹈東海而死蓋知帝秦之禍發遲而大况我至讎深隙乃欲修好而幸目前少安乎異時嵗幣求增而不已使命絡繹以來臨以至更立妃后變置大臣起罷兵之議建入覲之謀皆或有之矣浚是以伏讀詔書不覺戰汗幸公深思密以啓沃又以書抵參知政事李光論之龍圖閣學士提舉醴泉觀王倫賜同進士出身除端眀殿學士同簽書樞密院事充迎奉梓宫奉還兩宫交割地界使榮州防禦使知閣門事藍公佐為宣州觀察使副之許嵗貢銀絹共五十萬匹兩此據眀年五月丁酉詔書附入倫公佐及報謝使副韓肖胄錢愐各官其家二人賜裝錢有差王倫等與恩澤裝錢在是月庚寅戊子上謂大臣曰祖宗陵寢久淪異域今故地既歸便當遣宗室使相與近臣偕往修奉遂命光山軍節度使開府儀同三司判大宗正事士㒟與兵部侍郎張燾俱行先是祕書省正字范如圭轉對言兩京版圖既入則九廟八陵相望咫尺而朝修之使未遣何以仰慰神靈下遂民志上悽然曰非卿不聞此言遂命遣使秦檜以如圭不先白已始怒之熊克小歷稱校書郎范如圭蓋悮如圭眀年二月方遷校書士㒟等受命在庚寅克於丁亥書之亦誤寶文閣學士知廣州連南夫上封事曰臣竊惟大金素行欺侮比年以來兩國皆墮其術中大概彼以和議成之此以和議失之今陛下果推赤心信之以其割河南之地遂恩之乎臣知陛下知幾有不信也何以言之丙午之禍父兄母弟六宫九族咸被驅虜逮今十四年辱莫大焉使太上聖躬無恙隨所割地全而歸之十四年羈縻隔絶之恨念之猶且心折得梓宫猶不足為恩得土地顧何足以為恩乎况陛下於太上有終天之别於大金有不戴天之讐方且許還河南之地許還梓宫許還淵聖六宫彼其計實老子所謂將欲取之必姑與之兵法所謂不戰而屈人兵之術也誰不怒髮衝冠握拳嚼齒而痛憤哉借使盡得所許彼何加損漢王語吕后曰使趙王有天下顧少乃女乎臣竊恐陛下天性孝弟方感其恩遂無赫怒整旅之志蓋用心不剛則四肢委靡將士雖欲斷髮請戰有不可得誰為陛下守四方者是陛下十有餘年寵將養兵殫財曲意之計一旦積於空虛不用之地倒持太阿交手而付之矣昔太祖皇帝之南征也李煜遣其臣徐鉉朝於京師鉉曰煜以小事大如子事父未有過失奈何見伐太祖曰爾謂父子為兩家可乎安知大金之計不出於此乎豈吾太祖行之而陛下不悟者乎伏讀正月五日赦文曰戢宇內之干戈又奉聖旨不得詆斥大金如此直墮其術中使忠義之士結舌而不得伸忠良之將縮手而不為用范增之語項王曰天下大定矣君王自圖之可不鑒哉臣聞張良為漢王借前箸以籌撓楚權之謀為漢王不能制項王死命遽欲效武王休馬息牛具陳天下遊士各歸事其主陛下誰與取天下審如詔旨臣恐將士解體魚潰獸散如張良所謂誰與取天下者然則計將安出或謂彼國新主厭兵乃有此議臣謂使其果有厭兵之心正當乘其懈而擊之如其不然先發制人後發制於人陛下必知所決擇矣臣聞陛下方遣侍從宗臣祇謁宫廟陵寢將親見宫室之禾􅎟陵寢之盜掘此正詩人倣徨不忍去之憂也恐有扶老携幼感泣而聽語者少者之哭哭其父與兄也老者之哭哭其子也陛下追悼其因是誰之過歟還地之恩孰少孰多而河南之民何啻百萬昔日樂生今日效死因民之欲北嚮為百姓請命而以王師甲兵之衆隨之河北之人必有簞食壺漿以迎王師者此臣所以願陛下因而圖之也南夫封事當在今年二月士㒟張燾行之後今因降旨附見南夫又為表賀曰雖虞舜之十二州昔皆吾有然商於之六百里當念爾欺秦檜大惡之宗正少卿馮楫權尚書禮部侍郎以國信計議之勞也殿中侍御史鄭剛中試宗正少卿詔故追復宣州觀察使曲端貼還合得恩澤己丑詔以黃金一千兩附北使張通古進納兩宫時通古與報謝使韓肖胄先行而京東淮東宣撫處置使韓世忠伏兵洪澤鎮詐令為紅巾俟通古過則劫之以壞和議肖胄至揚州世忠將郝抃密以告直祕閣淮東轉運副使胡紡紡白之肖胄故通古自真和由淮西以去世忠怒追抃欲殺之抃棄家依嶽飛軍中世忠奏知鄂州范漴縱之漴坐奪官編管汀州仍命鄂州拘漴俟獲抃訖赴貶所日歷無此今以紹興十一年五月二十九日世忠乞放范漴狀修入通古性聰敏秦檜以胡銓封事示之通古一覽即能誦庚寅以金人歸河南地命官奏告天地宗廟社稷少師萬夀觀使榮國公劉光世賜號和衆輔國功臣進封雍國公揚武翊運功臣少保京東淮東宣撫處置使韓世忠遷少師少保淮西宣撫使張俊賜號安民靜難功臣遷少傅自劉光世以下其所領三鎮節鉞皆如舊用講和恩也資政殿學士提舉臨安府洞霄宫汪伯彥復觀文殿學士責授左朝奉大夫祕書少監永州居住張浚復左宣奉大夫提舉臨安府洞霄宫浚上疏言燕雲之舉其鑒不逺敵自宣和以來挾詐反覆傾我國家蓋非可結以恩信事以仁義者今日事之虛實姑置未論借令敵中有故上下紛雜天屬盡歸河南遂復我必德其厚賜謹守信誓數年之後人情益懈士氣漸消彼或內變既平指瑕造隙肆無厭之欲發難從之請其將何詞以對顧事理可憂又有甚於此者陛下積意兵政將士漸孚一旦北面事敵聽其號令比肩遣使接武求盟大小將帥孰不解體陛下方將經理河南而有之臣知其無與赴功而共守者也蓋自堯舜以來人主奄有天下非兵無以立國未聞委質外國可以削平禍難逺而石晉近而叛豫著人耳目厯厯可想戰國之時楚懷王入覲於秦一往不返逮今千載之下為之痛心由辨之不早也漢髙知項羽之寡恩少義其和不可恃故雖再敗固陵甘心不悔兹二事者足以為今之戒矣臣日夜思念此國之大事也陛下宜深慮之熟謀之今從約之早肆赦之速用世儒之常説以答敵人之詭祕措置失序臣不勝寒心輒不自量為陛下再計嗣今以往使之遷延生事姑緩一時謝絶使人可也明告以利害詳諭以曲直可也萬一有如太公吕后之歸便當博詢諸帥奬勵將士以圖恢復之實逼之以大勢使其人心終至於乖離示之以威武使其內釁不能以遽息國家猶可立也左中大夫劉大中左通議大夫王庶並復端眀殿學士依舊提舉臨安府洞霄宫新除左通直郎權尚書禮部侍郎兼侍講尹焞為徽猷閣待制提舉萬夀觀兼侍講焞以和議不合力辭新命章十上乃有是旨焞五辭不拜太府少卿林待聘守尚書右司貟外郎左朝請大夫施坰為太府少卿靜江軍承宣使提舉江州太平觀劉錫知鼎州故事置四川都轉運使以掌軍儲而四路漕司各領經費都漕司蓋不得與其後起復直祕閣髙士瑰為四川轉運判官乃以糴軍糧為詞請下四路漕司不拘司分名色盡行剗刷應副許之至是御史中丞勾龍如淵言如此是於嵗約軍需之外暗侵諸路漕司嵗計勢必及民凋瘵之餘何以堪此詔制置司措置成都記士瑰以二月初三日到任此時已畫旨而未行也壬辰太尉武勝定國軍節度使湖北京西宣撫使嶽飛保平靜難軍節度使川陕宣撫副使吳玠並開府儀同三司殿前都虞候保成軍節度主管殿前司公事楊沂中為太尉殿前副都指揮使主管都指揮使公事飛以議和非計纍表辭所進官不從太常少卿張絢直龍圖閣提點江南東路刑獄公事絢不肯議敵使朝見禮儀以病告而有是命此以紹興正論修入祕閣修撰知饒州曽統守太常少卿寶文閣待制提舉江州太平觀曽開知徽州癸巳詔建皇太后宫室於大內以舊承慶院為之龍神衛四廂都指揮使江州觀察使權主管侍衛馬軍司公事解潛以論事不合求去罷為建寧軍承宣使福建路馬步軍副都總管王眀清揮麈後録云紹興壬戌罷三帥兵柄韓王世忠為樞密請馬帥解潛曰雖云講和敵性難測不若姑留大軍之半於江之北觀其釁公其為我草奏以陳此事解用其指為劄子韓上之已而付出秦會之語韓云何以不素告我而遽蒍是耶韓覺秦詞色有異倉卒皇恐即云世忠不識字此乃解潛為之使某上耳秦大怒翌日貶潛單州團練副使南安軍安置竟死嶺外張子韶云按潛以此年罷馬帥世忠時在淮東十一年四月乃罷三帥兵十四年三月潛坐鼎客責嶺外皆與此不合按七年十二月檜奏令世忠自楚州移屯鎮江世忠言敵情難測乞留此軍遮蔽江淮上從之時趙鼎當國明清誤記也熊克小歷載潛罷軍職在今年四月亦誤起居舍人薛徽言卒徽言雅為趙鼎所知會秦檜於上前論和議事徽言直前引義固爭反復數刻遂中寒疾而卒上念之賜其家百縑甲午金人所命知宿州趙榮以城來歸榮不俟割地首先納欵由是金人怒之乙未右迪功郎監明州比較務楊煒獻書於參知政事李光論和議事大略以謂屬者敵人求和乃遣招諭使至以無禮臣我舉國喧譁議論不一閣下召來造朝遽復合為一黨寂然無聲有識者謂閣下非不知利害之曉然所以然者賣諂取執政爾自靖康國破主上南狩無厭之敵既襲廣陵又襲吳中其意固宜重有所在也所幸神靈庇護社稷有主比年以來敵人知我不可以兵取也又恐我國勢或至於遂強也汲汲然萬里遣使見報以太上之喪以探朝廷意謂我若遣使而有請則唱為議和空我之國困我之師今復割之中原為一大餌以釣江南且向竭中原舉天下實一燕薊猶不三年而遂弊况今欲竭江南偏左一方求實中原不知空空之地孱老孤寡既不可賦所謂按月所支一切調度何從出乎東南數十州所有幾何頻年以來換度牒鬻官爵出賣戶帖預借和買頭會箕斂衰世掊尅之法略己盡行剝膚椎髓無所不至膏血無餘不知何從出乎加之供奉禮物動計百萬異時以有限之財充無厭之欲是以江海實漏巵爾日者乃始揭榜都城有曰敵人並無須求煒所不識也諸公蒙蔽天聽是何異掩耳竊鐘也哉倘或梓宫可還真偽未辨如為所欺彼且恃為大恩百索纍至江南無立錐矣尚何有於中原哉自古連和結好講鄰國之歡以求偃兵息民者固多有之若乃我小而彼大我弱而彼強我衰而彼盛乃欲請和以幸旦暮之存擒縱在彼是速滅亡而已我太祖太宗之肇造也其割據諸國亦嘗告和於本朝矣未嘗不納之和也及其機可乘則命將出師破而滅之如取諸其寄耳曽何害於和哉南唐李煜嘗自貶尊稱降損省府取媚本朝以乞須臾之命然卒亦無效此蓋強弱盛衰之理使然固不可以取媚存也今國家兵籍非不甚衆諸將非不無人但當謹謀謨於帷幄收敵幣以賞將士期之嵗月何患中原之不復梓宫之不還太后淵聖之不歸乃求臣事於敵人豈不哀哉設若主上睿謀獨斷未悟敵機閣下固當身先百辟抗議廷諍雖鼎鑊在前當無顧避此誠越國之男子也丞相秦公方且含垢忍耻専為誤國之謀傾心敵人猶盧杞以百口保朱泚李林甫以盛美稱祿山非煒踈逺之言能入也參政孫公煒之舅子平生齷齪謹畏天下初不以此責之今日之可任春秋之責者惟閣下耳願閣下盡發敵人之詐歷告吾君罷絶使命收還金幣正天子之尊號薄敵人之聘禮飭諸將之兵備揚問罪之先聲傳檄中原各保境土人自為戰以待王師一切改轍而圖之如閣下姑欲愛惜名位隨羣而入逐隊而趨亦以謂敵必可信和必可講則請直以此書上之天子置以典憲煒所不辭書凡數千言其大略如此煒山隂人也丙申右承事郎主管台州崇道觀王銍特遷一官銍以國朝建隆至元符信史屢更書多重復乃以七朝國史自帝紀志傳外益以宰執宗室世表公卿百官年表常同為中執法言於朝詔銍奉祠中視史官之秩尚方給劄奏御至是銍以元祐八年補録及七朝史上之故有是命然銍所修未及半也其後為秦檜所沮不克成是日金右副元帥瀋王宗弼始以割地詔下宿州金主亶詔河南吏民略曰頃立齊豫以守南夏纍年於茲天其意者不忍遽泯宋氏社稷猶留康邸在江之南以安吾南北之赤子也倘能偃兵息民我國家豈貪尺寸之地而不為惠安元元之計乎所以去冬特廢劉豫今自河之南復以賜宋氏爾等處爾舊土還爾世主我國家之恩亦已洪矣爾能各安其心無忘吾上國之大惠雖有巨河之隔猶吾民也其官吏等已有誓約不許輒行廢置各守厥官以事爾主無貽悔吝此書紹興講和録有之略載其語以見金人亦知天意人心之所在也又命官吏軍民願歸山東河北者聽行臺尚書省榜會驗近凖尚書省降到契丹字詔書今翻寫抄白在前兼會到朝廷已遣人使於江南撫諭去訖及省會職官百姓軍民事件若是守等江南人使前來交割封界方行曉示實慮至時難以陳告須合預先開示一應據見在河南諸職官中已據人數外其餘職官百姓使效軍民等至有不同元係河南人如願歸山東河北者並聽仍仰所在官司各具所就事宜先次告陳須至指揮右下宿州可照驗即日詔書內事理宜就便開坐指揮所轄處分眀曉諭大小職官軍民僧道耆老别令一一仔細省會各不離本鄉及父母邱墳依舊安業住坐永致義信實為大事不得致違誤錯失付宿州準此天眷二年正月十五日金中雜書云達蘭元帥同四太子提重兵來廢劉豫未敢眀言割地事尚稱欲自有之任張孝純為行臺丞相放赦寬恤以鼓惑聾盲先次計置般運帑藏盡數過河次遣張通古蕭哲來皆是元議定事初約俟蕭張奉使回見得可否方於河南出示割界文字忽於今年正月間陕西帥司申報夏國大軍壓境并密封夏國榜來時四太子方在東京慮腹背受敵幾於失措大急先發割界文字前往陕西方解其事此事它書皆無之疑與李世輔相關姑附此俟考丁酉手詔淵聖皇帝宫殿令臨安府計度修建時胡寅丁父喪居衡州以書抵張俊曰聞敵人果欲以河南地授我則應接當謹始十餘年間凡有詔令必以恢復中原為言所以係百姓心也今乃於臨安增修母后淵聖宫殿是不為北遷之計也然則居杭者乃實情而恢復者乃空言耳一未是也既下赦令免三年租稅五年徭役軍兵依元來營分招收不知何處運物支給及官吏所請應有從出若取於民則赦令所言是罔新附之民也不取於民何以給之二未是也中原之地一是敵人強暴所向憑陵二是世間人不知有三綱動則投拜甚則僣叛號令之初要當申明大義以示勸戒而張楚劉齊並以本非獲已處之自今而後誰不利此三未是也不知公以為何如寅此書必在二月已後今因降旨建淵聖宫殿附書之太常少卿曾統為殿中侍御史詔發運經制司去發運二字以戶部長二一貟兼領初𠫭知政事李光請罷發運司事下三省事見去年十二月辛未至是三省請别置副使或判官一貟不時巡按諸路以檢察內外官司失陷錢物舉催未到綱運措置糴買及總領常平為職左宣教郎江南西路提點刑獄公事黃鍰罷鍰范沖所引也御史中丞勾龍如淵劾諸路監司守二之不職者九人論鍰反覆姦佞苛刻擾民故並罷檢校少傅奉國軍節度使醴泉觀使趙鼎引富弼王安石例再乞納節不許戊戌端眀殿學士同簽書樞密院事王倫為東京留守兼權開封尹檢校少傅慶逺軍節度使提舉醴泉觀郭仲荀為太尉東京副留守兼節制軍馬召汴京行臺尚書左丞相張孝純赴行在所孝純自慙乃白右副元帥瀋王宗弼以儀同三司致仕歸徐州滕縣熊克小歷云孝純致仕而卒按十一年宗弼所上書云今張既請老而杜亦物故則孝純未死也尚書戶部侍郎梁汝嘉兼江湖荆浙閩廣路經制使司農少卿霍蠡直徽猷閣權發遣經制判官徽猷閣待制江淮等路經制發運使程邁知鎮江府右諫議大夫李誼言丙戌赦書一切甄敘恐忠邪不分功罪不别臣謂左右賣國虧損名教之人宜不在甄收之列其餘名存白簡重者未及二年輕者未及半年並未許收敘詔令三省銓量取旨己亥少師護國鎮安保靜軍節度使萬夀觀使雍國公劉光世為陕西宣撫使熊克小歷書胡世將除陕西宣撫副使按諸書世將除川陕宣撫在今年九月六日癸未保平靜難軍節度使開府儀同三司川陕宣撫副使吳玠為四川宣撫使內陕西路階成等州聽玠節制如舊命內侍賫告以賜上因光世除命諭輔臣曰河南新復境土所命守臣専在拊循遺民勸課農桑各使因其地以食因其人以守不可移東南之財力虛內以事外也御史中丞勾龍如淵言丙戍赦書劉大中王庶並復職大中之罪在不孝庶之罪在欺君落職未及一月例蒙甄敘蓋朝廷不肯任怨耳臣在言責亦復避之則凡賞刑失當誰為陛下言哉秦檜進呈二人之命遂寢趙甡之遺史云秦檜令言者論庶大中之罪遂再奪職東京留守充交割地界等使王倫副使藍公佐辭行祕書省正字汪應辰上疏言和議既諧則因循無備之可畏異議既息則上下相蒙之可畏臣聞前日王倫之行未嘗一詣敵庭此必有深謀至計而畏吾使者之或能覘之也是豈能洞然無疑於我哉臣又聞敵之遷而北也竭取財物盡驅其丁壯而往下至雞豚狗彘靡有遺者豈是能有愛於我而不取哉是豈誠有悔過效順之本意哉敵使既去所宜深詔執事交修庶政申戒邉吏以敵人雖通和疆埸之上宜各戒嚴以備他盜今方且肆赦中外厚賚士卒褒寵諸帥以為息兵休民自此始矣縱一朝遂忘積年之耻獨不思異時意外之患乎此臣所以言因循無備之可畏也方朝廷力排羣議時大則竄逐小則罷黜雖舉世非之而不顧至有以一言迎合則不次擢用今者事既少定陛下必以出於獨斷益輕天下之士矣夫事是而臧之猶郤衆謀况其非乎是以小人窺見間隙輕躁者阿諛以希寵畏懦者循默以備位淺謀者遂謂無事而忠臣正士乃無以自立於羣小之間此臣所以言上下相蒙之可畏也臣願陛下痛心嘗膽以圖中興勿謂和好之可以無虞而思患預防常若敵人之至也何至以中國之大而下為讐人役哉辛丑詔故景福殿使湖州觀察使內侍省副都知藍安石已贈保寧軍節度使可特與賜諡於是禮官定諡曰良恪渡江後宦者之有諡蓋自此始癸卯四川宣撫司統制官王俊張從儀田晟以修興元府洋州堤堰溉田增稅各遷一官仍賜宣撫使吳玠詔書奬諭丙午徽宗皇帝大祥上衰服詣几筵殿易白羅袍行祭奠之禮前後不視事十日宰臣率百官進名奉慰監察御史江西宣諭李宷言盜賊未息其弊有五一曰盜賊招安之後不離鄉土良民畏懼未嘗易業二曰賊徒受招初無悛改隨復作過比所捕賊徒腰間已有受招安公據至五六道者三曰縣官蔽縱不以實聞四曰稅戶交通茍免禍害五曰公吏受賂多從脫免五弊不去盜賊無時而息乞下帥臣監司守令協心施行從之庚戌尚書戶部侍郎李彌遜充徽猷閣直學士知漳州彌遜再章求去乃有是命右諌議大夫李誼言河南初復江上未可撤屯望密諭三京帥臣凡東南逃歸軍校毋得接納庶幾長江守備不至寡少詔密付諸帥是月名建康府晉司空卞壼廟曰忠烈偽熙河經略使慕容洧叛洧在熙河十餘年驍勇得衆屢為邉患及金人歸陕西地洧慨然曰吾何面目見朝廷棄熙河去居西夏青唐兩界之間有衆數千洧又寇環州經略使趙彬追及與戰涇原經略使張中彥率兵援之洧敗走其衆多降初偽齊知同州李世輔既奔夏州其家悉為金人所害夏國主乾順偽降制書以李世輔為靜難軍承宣使鄜延岐雍等路經略安撫使時夏國承宣使除書如朝廷之內制而御史中丞知制誥亦皆繫階三省自令僕以下多闕而不除書名者十才一二而已偽制今在利州大軍庫建炎以來繫年要録卷一百二十五建炎以來繫年要録卷一百二十五金人地名考證逹賚原書作撻辣誤改見卷一
