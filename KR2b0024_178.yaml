body:
  text: 建炎以來繫年要録卷一百七十八宋李心傳撰紹興二十有七年冬十月乙未直祕閣主管台州崇道觀林大聲落職罷宫觀以殿中侍御史王圭論大聲向自永嘉縣丞深結秦氏父子以致超遷家居侯官干擾州縣故也丙申權刑部侍郎徐林陳正同言近來不住有官員雪訴被罪寃抑其間多係大理寺勘斷其本寺官因臣僚論列觀望挾情已行罷黜唯是舊吏尚存顯有妨礙欲將右治獄當出職人日下與注授差遣往外州縣待闕已出職而在行在其他官司充役者凖此上曰朕在京師時惟開封府頗類外方官司如大理寺御史臺法令嚴密官吏謹畏無敢干以私者自渡江以來大理寺治獄官吏極有姦弊至於容情請托賄賂公行玩習既久理宜懲革沈該等曰前此寺官觀望失職已嘗汰去惟是胥吏尚用舊人不可不略行措置欲依林正同所奏施行上曰甚善六部出職人亦遣離部勿復存留庶幾官曹稍清姦弊頓革己亥右奉議郎郭淑令吏部與監當差遣淑嘗為治獄丞罷去刑部侍郎徐林等言其數到行在恐與舊吏交通故黜之淑紹興十七年六月二十四日除大理寺主簿二十三年十月再除二十六年五月六日又除九月遷治獄丞今年八月放罷前後在寺近十年故也詔自今臺部吏應出職者並罷毋得存留左承議郎知溫州平陽縣方廣左宣教郎知處州麗水縣薛良朋並進秩一等以直祕閣兩浙轉運副使李邦獻奏其治狀也辛丑罷兩浙漕司科糴馬料令本司降錢於沿流順便州置場收糴左朝議大夫江南東路轉運副使周綰為國子祭酒右通直郎知黃州范伯奮降一官放罷今後不得與堂除差遣左司諫凌哲論伯奮所至貪叨有舊契劉楫死於光山酒官其家投之以圖歸計伯奮初議以長孫娶其女及見女美豔遽納為妾故有是命其女令提刑司日下理還癸卯詔自今差往川中賜夏臘藥內侍經由去處輒收受例外饋送及非理取索買賣騷擾仰守臣具申尚書省樞密院先是上諭宰執以比密院所遣使臣多妄作受賕今改差內侍尚慮不切畏慎故有是㫖甲辰詔學士院人吏應奉修寫機密國書及十次者與减一年磨勘六十次以上轉一官從直學士院王綸請也乙巳以講筵讀三朝寶訓徹章燕儒臣始用化成殿樂侍讀王師心因講畢奏曰祖宗創業垂統所以長慮却顧為萬世子孫之計甚備熙寧大臣私意改作流毒至今不可不監又言帝王之於史其要在於觀得失究治亂今進讀漢書願摘切於治體者讀之詔月以錢米廪給昭憲皇后外家子孫之孤遺者仍依宗室袒免外兩世紹興格計口給之右通直郎新福建提舉市舶司幹辦公事權知衢州江山縣陳鼎特轉一官堂除繁劇知縣俟任滿與升擢差遣江山闕令久鼎攝事不數月士民列狀詣部使者舉留之故有是命丙午直祕閣江南東路轉運判官葉義問為殿中侍御史義問入對首論監司號為外臺與御史相表裏望立為約束凡監司遇巡按歸任皆具平反寃訟與搜訪利害各幾事薦舉循吏與按發姦贓各幾人陛下與大臣考之因可以知監司之能否而行賞罰上納其言十一月丁亥立法行下遂有是命後九日義問入見又論吉凶悔吝生乎動吉居其一而凶悔吝居其三願陛下與羣臣協心鍳戒庶無輕動之失戊申直祕閣知台州曽幾守祕書少監幾入對言士氣久不振陛下欲起之於一朝矯枉者必過直雖有折檻斷鞍牽裾還笏若賣直沽名者宜皆優容奬激之上大悅遂有是命幾承平時已為館職去三十八年而再用鬚鬢皓白衣冠甚偉每與同舍㑹多言前輩言行臺閣典故薦紳皆推重焉癸丑權户部侍郎林覺等言冬月養濟務在均給貧乏今措置臨安府兩縣在城兵官下公人及甲頭如抄劄貧民姓名不實及詭名冒請錢米許人告每名賞錢十千至三百千止諸路令坊正耆保抄劄依此施行犯人並計贓斷罪先是右正言朱倬以浙西提舉官入對論其弊以為狡獪者舉家皆預支請而貧窶者反見棄遺上諭大臣曰聞官司不留意多為胥吏冒請可措置革弊務令實惠及民至是行下朱倬奏請在九月辛卯上語在此月庚戍今併書之己未上謂宰執曰近臣僚獻利害往往各述己見未必知有無見在之法自今宜令有司講究詳審無輕改祖宗成憲湯思退等曰臣僚奏請不惟未詳條令固有便於一方而不可行於天下豈容輕議改法當依聖訓行之先是右正言朱倬論祖宗立政創制煥乎大備然邇日陳利害者或不深知朝廷之典常或不洞究民間之利病得之口耳即以上聞陛下無開納而舞文之吏若從甲則曰舊法如是欲從乙則曰續降如是出入玩弄官莫知從為害實大乞自今獻言者必送有司精詳參照既定然後大臣審究至當剖析利害上取宸斷付下有司然後施行上從其言至是復有此諭倬章疏以此月己酉行下殿中侍御史王圭言權吏部侍郎葛立方違法為其子營求薦章詔罷之右武大夫幹辦皇城司劉伉領榮州刺史請給等全支本色今後凖此詔保信軍承宣使知閣門事曹勛與依鄭藻例給真俸庚申左司諫凌哲權尚書吏部侍郎先是臺諫官皆湯鵬舉所薦至是哲與方崇皆內徙而以朱倬葉義問代之自是鵬舉始不安矣辛酉詔四川制置司總領所轉運常平司各具所部州縣有無旱傷聞奏如有旱傷即行减放仍以舊宣撫司樁積錢米賑濟之既而潼川府路提㸃刑獄公事王之望言被受御寶封省劄指揮已在陳訴限外但令州縣賑給旱傷去處孤老殘疾闕食饑民而已據之望所申十一月十三日被受殿中侍御史葉義問言工部員外郎喻樗託儒為姦曩者詐為伊川之學以迎合時相薦用非人黜為邑宰因糴米為姦百姓訴之乃託疾休致逮其晚節黷貨尤甚吏部員外郎劉天民素無操履自平江職官滿秩倚託聲勢要索當路未及數月三遷為郎太學博士范成象阿附權勢甘為僕𨽻遍走臺諫之門士類所鄙詔並罷義問首劾成象天民蓋以搖湯鵬舉也中書舍人趙逵卒逵始病上因御經筵諭兵部侍郎楊椿令傳㫖存問及卒上念之命沿江漕臣致其柩十有一月癸亥朔詔减福建路鈔鹽錢每年八萬緡初吳逵既核福建鹽數雖民力稍寬而郡邑無以供百費且尤非轉運司之便故衆論搖之逵既移鼎州憤而死殿中侍御史王圭乃請令諸司相度更定至是諸司請運鹽如逵數而增其直官肆鹽直止减一分漕臣鹽本錢每斤為二十五錢上命輔臣計之㑹提舉常平鹽事張汝楫别奏乞行鈔法上問同知樞密院事陳誠之如何誠之曰閩中山溪之嶮細民冒法私販雖官賣鹽猶不能絶若百姓賣鹽豈無私販之弊苐恐不盡請鈔則有虧額上曰中間福建曽用鈔法未幾復罷若可行祖宗已行之不待今日正如萬户酒前日欲𣙜者甚多然竟不可行大抵法貴從俗不然不可經久圭以六月乙巳奏乞相度誠之以十月庚申奏此事時福建嵗認鈔錢三十萬緡乃詔减八萬自此漕司及州縣稍舒不復抑售於民矣乾道四年二月壬辰再减乙丑太常少卿充賀金國正旦使孫道夫閣門宣贊舍人充副使鄭朋辭行道夫既至北廷金主亮詰以關輔買馬非約始欲敗盟時左從政郎左蹕為書狀官死於涿州驛舍不暇為棺具但坎地瘞之道夫還乃焚其骨以歸詔特官一子蹕臨海人也禮部侍郎周方崇言國朝之制一嵗四祭天一祭地皆以執政官充初獻頃權臣怙威憚於齊戒凡此五祀但遣從官循習既久遂為故事今冬至日與髙禖之祠既已分命宰臣獨上辛夏秋四祀未還舊制望申詔有司自來嵗始詔依祖宗典故施行丙寅大理少卿金安節入對安節首言治民之道先德教後刑法今守宰之慮類不及逺簿書期㑹之程賦斂輸入之限窮日力辦之即謂職無餘事矣而刺部觀風者幸其不乏乎此亦偷一切以茍目前無有卓然以教化為務而期於無刑者逮民陷於罪乃按以三尺以行誅擊而曰非我也民自為也欲望陛下發德音下明詔申飭監司守令率職之際不特専用律令從事茍有可以贊助教化者無小大必行庶幾先民未犯而格之或有恥而不為足以仰副陛下先德後刑之意凡再章言之丁卯工部侍郎兼侍講王綸等言興化軍進士鄭樵耽嗜墳籍杜門著書頃年嘗以所著書獻之朝廷降付東觀比聞撰述益多恐必有補治道終老韋布可謂遺才望賜召對驗其所學果有可取即乞依王蘋鄧名世例施行庶學者有所激勸乃命樵赴行在戊辰監察御史何溥為左正言監察御史李庚守尚書兵部員外郎自此湯鵬舉之客稍稍被逐矣資政殿學士知婺州張綱言本州紹興元年以後合納內庫綾羅及折帛錢積缺數目皆人户殘缺之數經涉嵗月實難追催望許依已得指揮將二十二年以前見缺數目並與除放庶使七邑之民少寬追擾從之殿中侍御史葉義問入對論知樞密院事湯鵬舉以為人臣不忠之罪莫大於掠美以欺君植黨以擅權有一於此法當竄殛况兼而有之鵬舉初罷平江適逄陛下欲去權臣黨與之弊起廢匿瑕付以風憲凡所彈擊發蹤指示皆出陛下之英斷初非鵬舉可得而擅也况鵬舉本非正直敢言之士嘗除廣帥憚於逺行因秦檜之嬖人丁祀獻佞於檜遂移平江及秦熺還建康焚黃鵬舉棄去郡事連日奔走吳江望塵雅拜比他郡守最為諛佞自非陛下抆拭而用則鵬舉實秦檜黨中之姦猾耳至處言路乃妄自尊大竊弄威權使陛下去邪之英斷反為鵬舉賣直之虛名此臣所謂掠美以欺君者也鵬舉自居要塗引用非類凡平日之所忌者雖賢德忠良必極力而擠之平日之所喜者雖輕猥邪佞必極力而援之坐是劉天民范成象留觀德之徒爭為鷹犬同惡相濟牢不可解逮居樞府猜忌尤甚凡己所惡必遣天民輩先諭臺諫有議論不同者即怫然作色曰此人我所薦拔何負我如是夫臺諫者陛下之臺諫非鵬舉之私人也而鵬舉自違詔㫖敗壞成法略無忌憚之心復蹈前車之轍此臣所謂植黨以擅權者也况鵬舉位居宥密執權甚重若不急去其害有甚於秦檜伏望聖明將鵬舉明正典刑竄之逺方以為不忠罔上之戒己巳右朝奉郎知處州謝伋提舉兩浙西路常平茶鹽公事將作監張晟直祕閣主管台州崇道觀晟引年乞老乃有是命戊寅樞密院檢詳諸房文字潘莘知徽州莘宰相沈該甥壻也言者疏其罪故以郡守處之太府寺主簿留觀德通判靜江府殿中侍御史葉義問言仰惟陛下聰明神聖灼見前此大臣植黨擅權私結臺諫以害治道於是擢湯鵬舉而用之手詔丁寧非不深切而鵬舉則過自矜伐以蓋人主之英斷分朋植黨専狥私情首犯締交之罪隂為朋附竊弄威權去之不决馴致大患此臣之所以深憂而陛下所宜深察也臣不敢搖舌以瀆聖聼且以秦檜言之檜之先結臺諫相為表裏因而假竊名器而為私用故一時羣小希寵競進知有秦檜而不知有朝廷也自非陛下乾剛夬决一洗而新之則漢唐朋黨之禍如臣前章所陳者豈不復見於今日乎今鵬舉不遵陛下訓戒而復效檜之所為內則倚用劉天民范成象留觀德之徒以交通臺諫外則倚用李良民趙士鵬以賊害良善何異一秦檜死一秦檜生所幸鵬舉未至宰輔耳借使居檜之位縱其凶暴濟以朋比其為患有甚於檜者欲望陛下回天地之監震雷霆之威將鵬舉早行竄殛以叶輿議故觀德先罷天民成象今年十月已先罷殿中侍御史王圭言荆湖南路提㸃刑獄公事趙士鵬䕫州路轉運通判官王珏皆秦檜親黨居官貪虐常以官錢市珍異玩好之物以奉秦熺詔並罷先是䕫之州縣行經界大為姦利不均珏至為均之戒其部曰吾土瘠而貧不與他等民嵗輸者損之又損可也每按部持什器與偕盡以隨行胥吏閉之一室臨當啓途須衆吏上馬已然後去薪水芻粟皆計直給錢償之州縣無一毫之費初左朝奉大夫張紘通判䕫州珏薄其為人紘宰相沈該同年進士及是入為吏部員外郎言珏苛斂由是罷去紘伊陽人也紘今年四月丙申除郎己卯刑部奏百姓張璘等用藥殺人劫取官綱公事上曰此罪當死古者用刑貴情法相當祖宗以來好生之德間有用例貸死刑者然不可為常茍當死而不死無以禁暴戢姦恐殺人愈多非愛民之道也湯思退曰士制百姓於刑之中若殺人不死非所謂以殺止殺上曰然右朝奉郎知黎州唐秬罷初卭部川蠻客崖遇與其徒持馬赴州互市北還過大渡河邊民數十人共殺之奪其錦帛計直六千餘緡秬聞令邊民償其骨價都大主管茶馬公事李澗以其不當用蠻禮奏劾之於是秬與右奉議郎通判州事陳伯强俱罷仍令提刑司將為首者一人杖脊送千里外州軍編管今後並依見行條法施行伯強巴西人也秬已見庚辰監察御史褚籍為尚書工部員外郎籍與李庚皆湯鵬舉所薦故次第徙官辛巳左正言何溥請特詔大臣毋庸數易郡守上謂宰執曰此論切中時病近亦有因事移易者今非甚不得已且令成資湯思退曰豈惟郡守監司亦然昨因近臣薦除監司至春間往往當替欲於卿監郎官中擇資淺者令中外更代皆至成資而罷上曰如此不惟免迎送之擾亦可革內重外輕之弊矣起居郎賀金國生辰使劉章閣門宣贊舍人充副使李邦傑辭行江南西路提㸃刑獄李長民罷以殿中侍御史葉義問論其阿媚權臣所至騷擾也癸未太學正史浩為太學博士甲申右朝散郎監潭州南嶽廟任古為監察御史古初用王俁薦召至是特除之權刑部侍郎充接伴使徐林武翼大夫貴州刺史充接伴副使張棆等乞將人使往回宿食頓其有不擾而辦或過為擾民皆許保明按劾以行賞罰上謂宰執曰朕再三思之止是增重接伴事權恐州縣觀望却成騷擾接伴迓客耳何用如此前後指揮已備只令兩路漕臣檢察足矣丙戌宰執進呈給事中賀允中論吳國長公主奏請女夫右奉議郎直祕閣鄭珙乞特與轉行兩官添差兩浙東路安撫司參議官切詳所奏即非用本家合得恩例陳乞却創自擬官職仍乞作特與行下顯是過有僥求不合公議望追還已降指揮上曰珙被命逾兩旬乃始封駮詞頭恐非故事可諭令書讀宰執退召允中至都堂諭㫖允中執所見不易翌日奏其事上曰雖稍後時所論極有理蓋慮後來援例者衆當曲從之可寢轉官指揮沈該曰諌行言聼使言者得以自安此盛德也殿中侍御史葉義問言臣伏見知樞密院事湯鵬舉狼戾姦詐出於天資平昔蒞官略無善狀所至貪殘人皆以鬼車乳虎目之頃知當塗縣以苛酷而附權勢以為私計其罷淮南漕以貪婪而占官船以為己物倚托官勢强買地基則見於居金壇之時營造私第驅索州縣則見於為浙漕之日其知紹興也則恐脅將官劉之儀而致之死地其知平江府也則竊取公帑而唯己所欲是皆前日彈章之所備載暴惡之所著聞者也陛下略其往愆責其來效自臺憲要途洊躋右府則陛下所以擢用委任之恩可謂厚矣為鵬舉者不思勉勵激昂以圖報稱而乃掠美以欺君植黨以擅權長惡不悛故違詔㫖揣其後患實有甚於秦檜有識之士為之寒心其可冒近列乎伏望聖慈察臣愚直將鵬舉早正典刑以警有位鵬舉聞之乃留身求去詔不許義問又言臣纍具劄子論列湯鵬舉罪惡乞賜竄殛外庭之臣側耳聼命以謂必行兩觀之誅以慰天下之望兹者伏聞宣押赴朝及都堂治事此乃祖宗體貌人臣常禮在鵬舉罪惡貫盈自當藉藁負荆請罪於朝而猶占留樞密院印簿偃蹇不遜傲睨自如至如前日敢具劄子留身奏事蓋其要君冒寵失大臣難進易退之禮一至於此又况鵬舉所為雖閭閻鄙夫臺省老吏見其包藏禍心舉措凶狠猶為國家憂慮孰謂身任言責者而可默默乎伏望睿斷將鵬舉早正顯戮以慰公言丁亥知樞密院事湯鵬舉罷為資政殿學士提舉在外宫觀免謝辭戊子殿中侍御史葉義問言臣連日論列湯鵬舉罪惡已䝉陛下灼見其姦邪而去之不疑臣伏見鵬舉懷殘忍之心縱猛暴之志頃知婺州欲買花羅嫁女而東陽知縣留觀德迎合應副鵬舉近薦為太府寺簿未幾兼丞又擇優厚去處使之兼局又有汪懷敏者婺州富僧也因坐姦還俗鵬舉在婺州時以賄賂交通既遷執政遂補為將仕郎又有婁廙者本名詳漕司罷役之猾吏也鵬舉為漕日倚為腹心今補為副尉令幹辦本府凡有關節輒入卧內評議鵬舉無不聼從鵬舉為中丞時周方崇為殿院李庚為臺簿皆其薦用也一日詣方崇而罵辱之因顧李庚且請作證二人唯唯而退臺吏無不驚駭鵬舉恃其威勢至於恥辱風憲如此而乃使之領祕殿之隆名享真祠之厚祿其如天下公論何望將鵬舉職名宫祠並行褫奪明正贓凶之罪以慰天下公論詔鵬舉落職己丑宰執進呈次雪大作沈該等稱賀上曰前次久雨深以為慮幸而穀價不至騰踴今得此雪來年二麥必大豐稔也中書舍人周麟之兼實録院同修撰始除同修撰也庚寅祕書省正字林之竒兼權國史日歷所檢討官自韓球權䕫茶至是且十年民頗以為害右朝請大夫知逹州董時敏言於朝事下茶馬司其後主管茶馬公事許尹不肯蠲乃止三十年二月所書可參考十有二月癸巳朔殿中侍御史葉義問言禮部侍郎周方崇俗惡無能衆所共鄙頃因湯鵬舉之薦而為殿中侍御史鵬舉已遷政府方崇猶伺其風㫖為之彈擊或以為未然則厲色曰我只報湯樞密何恤其他兵部郎官李庚輕儇無狀衆所共惡頃因湯鵬舉之薦而為監察御史日與劉天民范成象留觀德之徒相為表裏故鵬舉在政府每欲排擊異己則必遣天民等逹意於庚善類為之重足工部郎官褚籍昏謬無恥衆所共笑頃因鵬舉之薦而為監察御史諂事鵬舉甚於奴𨽻假借風憲規圖貨財望將方崇庚籍等三人明正典刑以為臺諫來者之戒所有天民成象觀德乞重行竄責以為交通臺諫之戒如此則紀綱一振而姦回之心潛消於未萌矣乙未宰執進呈上曰朕深不欲朝廷分朋植黨今方崇等交結所幸覺之於早當戒其漸姑從輕典可也時天民成象為左宣教郎天民前吏部員外郎今年十月罷成象前太學博士今年十月罷觀德為右奉議郎新通判靜江府於是方崇庚籍觀德四人皆罷仍詔天民成象觀德自今毋得與堂除權吏部侍郎凌哲以鵬舉所薦不自安乞守小郡上曰哲亦善人非方崇比朕嘗與臺諫論大臣出處或以罪去但及其身足矣至所薦引當觀其人若不問賢否一切斥逐是使之為朋黨非公正之道也凌哲乞郡在是月戊戍中興聖政臣留正等曰元祐相司馬光盡取熙豐之政與其人而更新之天下至為相賀而程皓獨有憂色蔡確新州之竄一時大臣有名望如文彥博吕大防臺諫知大體如劉安世范祖禹皆以為當然而范純仁獨為之慨然曰搢紳之禍自此始矣夫成敗興廢天也君子能為其可為者至其不可為則安之以俟命而已固奚暇他顧然獨不觀諸水乎順而導之則行激而怒之則摶今以其泛濫無畔際也隄而障之曰吾以止水也激而不已奔怒四出臣見决隄破岸傷物轉甚耳惡乎止水哉太上皇帝之言也其殆知消息盈虛者乎夫漸而察之則不遽擇其已甚而去之則不苛薄其法以待其改則不怨使元祐大臣家存斯言則士君子之紛紛竄逐奚至如紹聖之甚哉縱使有之必不至空天下君子黨而籍之更歷再世以至於危亂而不悟也雖然天下之更相是非豈有既哉太上皇帝之言臣願聖子神孫萬世寶之左從事郎沈樞特改左宣教郎以薦對也乙未詔諸路帥臣監司於本路武臣大使臣已上及見任寄居歷任有勞效之人每嵗各舉二員明具所長堪作如何任使保明聞奏樞密院籍記姓名以備量才任使直祕閣兩浙轉運副使趙子潚言被㫖措置鎮江府沙田欲選官打量隨田地肥瘠輕立租課就令見佃人耕種委知縣拘管如形勢之家尚敢占吝不即交割許本司具奏所有以前收過租利不少依條合盡行追納入官詔人户冒佃積年收過租課特免追納其田疾速拘收措置二十八年正月癸未遣官丙申重建六部尚書成直祕閣知臨安府張稱升直敷文閣奉議郎守尚書都官員外郎楊倓轉一官以董役有勞也朝野雜記紹興四年髙宗在平江將還臨安始命有司建太廟十二年和議成乃作大社大稷皇后廟都亭驛太學十三年築圜丘景靈宫髙禖壇祕書省十五年作內中神御殿十六年廣太廟建武學十七年作玉津園太一宫萬夀觀十八年築九宫貴神壇十九年建太廟齊殿二十年作玉牒所二十二年作左藏庫南省倉二十五年建執政府二十六年築兩相第太醫局二十七年建尚書六部大凡定都二十年而郊廟宫省始備焉處州遂昌縣丞黃楷乞籍定民户物力髙强比他户大假遼絶者並應役兩次比其他役户一次從之二十八年六月己丑不行辛丑左朝奉大夫知眉州王揚英為成都府路轉運判官右中散大夫知果州王弗知嘉州左朝散郎主管台州崇道觀陳䕫知眉州癸卯詔右承直郎沈作乂作霖並令三省擬進差遣仍改合入官二人皆左僕射該之子該為乞行在無職事妨嫌管庫及外路屬官差遣故有是命給事中賀允中言寒士改官視為再第內則管庫外則屬官俾宰相子任之則主司孰敢號令昔司馬康以光之子扶掖改服色光猶力辭今陛下既新萬務大臣當忘其私臣甚為該惜也檜熺覆轍可不防其漸哉上覽而稱歎該聞亦上疏辭免改官從之右朝請郎吕廣問提舉江南東路常平茶鹽公事甲辰上謂宰執曰監司郡守固當久任然其間老病之人難以使之在職蓋移易不過有迎送之擾而廢弛則貽患於一路一州利害孰為輕重今後有如此等可與宫觀理作自陳詔故敦武郎知麟州建寧寨楊震諡恭毅震靖康初死事至是用其子存中請而諡之同日楊宗閔諡忠介已附見建炎二年正月宗閔死事時乙巳刑部言汀州奏讞大辟不當乞免收上曰祖宗聖意務從寬厚若一有失當便行收坐則天下獄情雖甚可閔無復來上矣遂從之權尚書户部侍郎林覺引疾罷為敷文閣待制提舉江州太平興國宫丙午祕書丞羅孝芬為直祕閣荆湖北路轉運判官右朝奉大夫荆湖北路轉運判官徐康為兩浙西路提㸃刑獄公事詔太常丞任文薦博士張庭實鮑彪各罰銅十斤先是臨安府樁辦大祀禮料沿襲既久率多繆誤如蜃醢用蛤蜊肉蠯醢用石决明則大小差訛鹿臡雁醢皆以肉與骨雜為之則臡醢不辨鮑當用乾而今以生鯽䵄當用熟而今以生麥以至蚳醢用黿魚豚拍訛為豚白如此非一文薦等皆按經傳釐正而御史臺劾其擅行移易詔令分析文薦等援據甚白乃有是命仍令禮部審辨改正然卒不能易戊申殿中侍御史王圭言潼川府路轉運判官朝公武傾險出其天性初為井度屬官専事掊尅聚斂以濟其私及度之罷求為鄭剛中幕客不從遂以剛中之事告於趙不棄至興大獄攝逮紛然連及平人死非其罪不棄倚為心腹薦之故相秦檜自屬官更歷數郡所至貪暴人不聊生左朝散郎新知蓬州馮時行頃在萬州之日積羡餘之錢以萬數計並無赤歷不可稽考又以州之良百姓皆刺為虎兒軍人情惶駭幾欲生變此兩人者蜀人嘗被其害今豈可令遺患於一方乃並罷之己酉權尚書刑部侍郎徐林為刑部侍郎癸丑勑令所刪定官杜莘老面對乞遍下內外有司重行取索自建中靖國至於宣和應干徽宗皇帝寬恤赦詔條令専委長吏逐時推行詔付實録院甲寅右朝請大夫續觱為潼川府路轉運判官丙辰詔刑部長二日輪一員赴大理寺録囚徒諸路州縣應入禁公事並具情犯及入禁月日申提刑司申本部檢察蓋徐林在刑曹建至是始行之丁巳給事中賀允中言小黃門任嘉輔免試補官不當政和舊制內侍進子年十二試以墨義其中程者候三年引見供職自建炎後以宫庭小黃門少遂聼不候年及命之至是允中以為非法上曰允中此論極當但外庭未悉宫禁曲折先朝立法非特此曹不得濫進且使識字近來小黃門人數稍足豈可一向循例免試前㫖可勿行自今並如舊制端明殿學士知洪州折彥質提舉江州太平興國宫從所請也戊午金主遣驃騎上將軍侍衛親軍馬步軍副都指揮使髙思亷昭毅大將軍行尚書兵部郎中珠勒根彥忠來賀明年正旦資政殿學士知靜江府施巨移知洪州是嵗宗子賜名授官者二十三人諸路斷大辟十九人建炎以來繫年要録卷一百七十八建炎以來繫年要録卷一百七十八金人地名考證珠勒根原書作阿勒根與金史同並誤今改正
