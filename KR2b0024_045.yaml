body:
  text: 建炎以來繫年要録卷四十五宋李心傳撰紹興元年六月丙寅朔詔自今朔望遙拜二聖於殿上百官於殿下行禮先是上與百官並拜於庭而中書舍人林遹以為非宜請用家人禮故有是旨敦武郎房湜為武翼大夫榮州刺史知房州用知唐州胡安中奏也時道路猶梗乃令安中權給差帖授之詔河朔進士汪巨源令赴都堂審察後未見初上以大理卿王衣與偽齊相張孝純有舊欲令衣貽書孝純使緩兵秦檜奏衣所與孝純書當諭以意否上曰以孝純守太原固忠義可信然今既與豫合則其心亦未可知若便以緩兵之意諭之則彼知吾怯恐遂南渡是呼之來也不若且令衣告無疑間之意徐觀其事為善丁卯夜寢殿後屋壞宫人被壓者數人吳才人驚悸得疾翌日上以諭輔臣始令略葺州治戊辰迪功郎諸葛行言獻國朝訓典乞為其兄國學免解進士行仁推恩詔補行仁將仕郎其後復獻書萬卷官一子獻書在九月甲戍初張琪自襄安鎮引兵渡江遂犯建康府太平池州諸縣建炎四年江東安撫大使司𠫭謀官劉洪道招降之復叛去既而統制官韓世清張俊會兵討之追至溧水縣其勢窮蹙遂受浙西安撫大使劉光世招安詔光世揀其軍毋令遁逸然琪實無降意已進兵掠安吉縣而樞密院復下敕榜招收之蓋信光世所云誤以為餘黨也降黃榜下湖州招收在此月辛未己巳初鬻承直修武郎已下官用宰相范宗尹請也承直郎直二萬五千緡修武郎直四萬五千緡其餘以是為差參注恩例並依奏補出身人其告身內更不聲説事因第云某人奉公體國宜加奬録而已和州防禦使知邵州兼樞密院提領海船張公裕帶御器械兼職如故詔鄂州安撫司軍馬令直祕閣滕膺權行主管召李允文赴行在初朝廷聞允文執知嶽州袁植詔以植棄城令湖東提刑司鞫治今年正月癸亥植弟國子監丞正功乞歸其喪乃令新湖東安撫使向子諲體究三月辛亥既而江東安撫大使吕頥浩奏植已為允文所殺植愛將袁衮亦詣行在擊登聞鼓訟寃其從者強勝又訴於御史臺殿中侍御史章誼奏其事參知政事張守與植素厚乃啓上密諭江東招討使張俊令收允文膺始以分鎮罷京西漕遂在允文軍中故有是命罷京畿等路宣諭使副令淮南三宣撫司遣人齎撫諭詔書付諸路壬申宰相范宗尹等率百官奉上昭慈獻烈皇后諡册於太廟寶用銀塗金册以象簡其文參知政事秦檜所撰也時太廟神主寓溫州乃即大善寺大殿上設祖宗寓室行禮癸酉詔選人仕閩廣者往還所給驛劵並罷甲戌言者論諸路轉運司類省試舉人多訟其不公若止仍令憲臣差官慮有私請欲於帥臣部使者中擇文學之臣領其事詔江東西福建廣東委帥臣吕頥浩朱勝非程邁趙存誠兩浙委憲臣施坰荆湖廣東委漕臣孫綬王次翁其川陕路令張浚於帥臣監司內選差有出身人分鎮路分令茶鹽司選官如前詔存誠挺之子坰晉陵人眀受中嘗除右正言綬須城人次翁歷城人也詔盡鬻諸路官田每路以憲臣總領措置朝廷為擇幹辦官一貟佐之時范宗尹以軍興用度不足故有此議令下民大以為擾後迄不行此為沈與求奏宗尹第三罪張本大理少卿朱宗直祕閣為福建路轉運副使於是范汝為未平而辛企宗握兵玩寇一路騷然宗入辭言民困無聊弄兵以延一旦之命陛下苐追還制置使以此事付臣可無戰而平也時富直柔與企宗厚幸其成功而企宗不能制賊反屯其衆於建之城外乙亥詔朝奉郎以上陳乞致仕未受敕而身亡者許任子以中書有請也朝奉大夫吕景山主管台州崇道觀景山大防子建炎初提舉潼川府路常平官省而罷寓家於蜀至是因其請而命之是日張琪犯宣州琪自安吉引兵至臨安境上前一日報至命神武左軍都統制韓世忠分兵三千往捕之而琪已去矣丁丑詔越州申嚴門禁時有潰兵數百直入行在越州泊於禹迹寺闔城震駭論者以為言乃命諸門增甲士守視命官親書職位出入軍馬自外至者悉屯於城外尚書左司貟外郎林之平直龍圖閣知溫州樞密院編修官林待聘召試館職遂以為祕書省校書郎待聘平陽人秦檜所薦也承奉郎楊願充樞密院編修官願自越州觀察推官用薦對改秩而有是命武翼大夫閣門宣贊舍人池州兵馬鈐轄江東安撫大使司統制軍馬韓世清為武德大夫忠州刺史録掩殺張琪之功也世清故為盜有衆五千及屯宣州而世清復招納亡命至萬五千人月費錢十萬緡米五千石頗凌州縣論者疑其復反上以諭輔臣會吕頥浩奏世清可疑李回曰世清近討張琪有功未見其可疑處上曰頥浩之言亦不為無理方其未可疑自當賞其功如郭偉奏邵青解圍而劉光世謂因其招安青之去恐或因光世然偉之守城亦自當賞功過不相掩則賞罰信矣上語在是月庚午熊克小厯注世清在江東彈壓有勞時頥浩方招安張琪而世清襲擊琪破之頥浩以世清壞其事故不樂日厯紹興三年三月吕頥浩奏王􅊛擒世清事上曰去嵗纍諭范宗尹此乃心腹之疾而宗尹遲疑未決不知即因頥浩所言否當考録故太學博士何渙子楰為將仕郎渙青城人舉進士廷試第一其弟宣義郎通判利州洙援楊置等例乞推恩張浚為之請乃有是命詔和州威顯妃增封昭順二字妃歷陽侯范增女有祠在麻湖之水寨用鎮撫使趙霖請而命之戊寅言者論朝廷暫駐江左蓋非得已當為攘却恢復之圖頃嵗駐蹕揚州有兵數十萬可以一戰而斥堠不眀金人奄至卒以奔走踰江而東此宰相黃潛善汪伯彥之過也前年移蹕建康是時兵練將勇食足財豐據江上不測之險當敵人疑懼之秋可以守矣而舟師不設一相異意金人未至先已奔走遵海而南此吕頥浩之過也往者不可諫來者猶可追陛下今嵗戰守之䇿安所從出萬一事起倉猝大臣復欲棄土地遺人民委府庫脫身奔走此豈安國家定社稷之謀乎臣愚以謂有江海則必資舟楫戰守之具有險阻則必資郡縣防守之力有兵將則必駕馭馴擾不可為將帥自衛之資有財賦則必轉運灌輸不可為盜賊侵據之用伏望委任大臣早賜指畫詔三省樞密院措置持服前寧逺軍節度使孟忠厚起復鎮潼軍節度使開府儀同三司充醴泉觀使上推恩隆祐外家異姓無服以上親皆進秩一等本宗白丁豫初品官諸婦及諸女並進封號受恩者凡五十人是月己巳降旨時朝臣有建議以后専配哲宗室而去昭懷者上乃為挽詩曰有美三宫德無嫌並后心前一日出以示從臣己卯昭慈獻烈皇后靈駕發引上遣奠於行宫門外𠫭知政事張守撰哀册文禮畢易吉服還內百僚服初喪之服詣五雲門外奉辭退易常服詣常朝殿門外立班進名奉慰故事園陵用吉凶儀伏五十三十一人至是太常請權用五百四十四人初總護使李回既受命以直顯謨閣江東副使曽紆權兩浙副使充修奉官江東轉運判官郭康伯提點一行事務紆兼攝浙漕不見月曰史臣於紹興元年十月己丑書之實甚誤矣康伯為提點據今年六月四日申明諸色人衣號狀修入史並不載按此時浙漕乃徐康國方孟卿劉寧止三人不知何以専用江東漕臣也而有司猶援園陵之制辟官分局費用頗廣寶文閣待制陳戩時為給事中上疏論列以為異日歸祔泰陵復用何禮至謂會稽之山無可採而欲取他山之石廂禁之卒不足用而欲調諸郡之夫並緣為姦誇侈如此豈不違太后慈儉之遺訓於是一切鐫省辛巳詔文林郎越州上虞縣丞婁寅亮赴行在以其言宗社大計也寅亮之書曰先正有言太祖捨其子而立弟此天下之大公也周王薨章聖取宗室子育之宫中此天下之大慮也仁宗皇帝感悟其説詔英祖入繼大統文子文孫宜君宜王遭罹變故不斷如帶今有天下者獨陛下一人而已恭惟陛下克已憂勤備嘗艱難春秋鼎盛自當則百斯男屬者椒寢未繁前星不耀孤立無助有識寒心天其或者深惟陛下追念祖宗公心長慮之所及及乎崇寧以來諛臣進説推濮王子孫以為近屬餘皆謂之同姓致使昌陵以後寂寥無聞奔迸藍縷僅同民庶恐祀豐於昵仰違天監藝祖在上莫肯顧歆此二聖所以未有回鑾之期強敵所以未有悔禍之意中原所以未有息肩之時也欲望陛下於伯字行下遴選太祖諸孫有賢德者視秩親王使牧九州以待皇嗣之生退處藩服更加廣選宣祖太宗之裔材武可稱之人升為南班以備環列庶幾上慰在天之靈下係人心之望臣本書生白首選調垂二十年今將告歸不敢緘默位卑言髙罪當萬死惟陛下幸赦疏入上讀之大為嘆寤簽書樞密院事富直柔從而薦之遂有是命寅亮永嘉人也寅亮十一月己亥除察官壬午權攢昭慈獻烈皇后於會稽縣之上皇村神圍方百步下宫深一丈五寸眀器止用鉛錫置都監巡檢各一貟衛卒百人生日忌辰旦望節序排辦如天章閣之儀改寶山證慈禪院為泰寧寺専奉香火賜田十頃上事昭慈皇后備極孝愛故園陵儀範率用母后臨朝之比焉是日張琪自宣州引兵犯徽州通泰鎮撫司統領官張憲以所部在城中聞之亟遁直祕閣提點江東刑獄公事王圭見守臣郭東曰為之奈何圭奔休寧縣東亦繼去民間驚潰琪遂據其城事聞圭東並追一官東勒停圭衝替圭東追停在十月甲申初張琪之叛劉光世遣統制官右武大夫康州防禦使潘逵以所部三千人戍饒州已而赴行在至是行次信州之玊山其後軍胡江等千餘人作亂掠玊山永豐二縣進犯衢州之江山詔樞密院凖備將領徐文自臨安往討之時江之黨又犯弋陽迪功郎監寶豐鎮熊彥深為所殺後官其家一人彥深紹興二年十一月己未贈承事郎與恩澤一子會吕頥浩已遣統制官閻臯追擊叛黨至宜黃文乃止逵戌饒州據日厯光世以四月庚午奏至江掠玊山在此日詔遣徐文在壬辰江犯弋陽在七月今聨書之癸未江淮招討使張俊以大軍至瑞昌縣之丁家洲日厯十一月六日張俊奏臣於六月十八日已到丁家洲下寨候分遣張用人馬軍往洪州癸未十八日也故係於此日初俊被密旨并收李允文恐其拒命乃與神武後軍統制陳思恭謀之思恭言允文兵尚衆須以計取會英州編管人汪若海自江東赴貶若海被謫事見建炎四年八月戊子行至撫州允文以書招之招討司𠫭議官湯東野因引若海謁俊俊曰君與李節制善盍往説之與俱來免盛夏提師至鄂若海曰與來而少保誅之則若海為賣友俊曰以百口保之若海先以書與允文曰張少保既破李成欲移兵指武昌若海言君無反狀其屬曰節制非朝命且救袁植與留四川綱運非反而何惟少保言以百口相保今有三説劉豫新立君能引張用之衆擒豫以取重賞一也或引衆西投宣撫司張樞密既相辟必為君白於朝二也信少保百口相保之言三也君勿恃張用之徒為強彼見李成既破皆已喪魄若知朝廷怒君必回戈相逐矣允文感悟乃舉其軍東下俊因檄若海併招新除舒蘄鎮撫使張用時用自咸寧縣引兵趨分寧為通泰鎮撫使嶽飛所逼遂會俊於丁家洲俊并將二軍遣統制王偉護允文及參謀官滕膺赴行在趙甡之遺史張俊移文允文曰恭奏聖旨率大兵前來掩殺賊徒李成請照會時鄂州糧且盡而孔彥舟在漢陽允文得牒遂將其軍往江州丁家洲見俊俊分其軍留三百人與允文回鄂州允文怒俊奪其軍有言侵俊俊怒具允文在鄂州事差人押赴行在所日厯七月十六日張俊奏鄂州李允文人馬作過臣數十次差人前去追呼到臣軍前收管訖據此則似俊初未嘗被旨也今且從熊克小厯書之更當詳考責受雷州别駕趙霆復朝散大夫霆抃孫也宣和中以徽猷閣待制守杭方臘之亂棄城去詔貸死長流昌化軍至是始敘甲申昭慈獻烈皇后神主還越州百官常服出城奉迎上迎於殿門外焚香退百官進名奉慰降充集英殿修撰提舉臨安府洞霄宫何志同復徽猷閣待制尋不行叛邵青自太平州以舟師泊鎮江留三日是日復叛去引兵趨江隂此據十一月一日知湖州葛勝仲所奏按七月十六日劉光世分析狀稱青至真州鵝翎灣駐泊復移揚州一夕遁去未嘗於鎮江岸下駐泊然光世六月十八日先奏邵青招安赴鎮江府擺泊人船乞降旗榜則後報非實也青以十九日下江亦光世六月二十四日所奏故附於此丙戌中奉大夫李芘知建州時建安民張毅等蒍盜犯福州之古田知縣事承議郎江滋遁去芘諭降之安撫使程邁以聞前一日詔以金字牌招收毋失機會遂以芘守其州芘已病不克赴朝請郎謝嚮特遷朝散大夫録招降范汝為之勞也於是同措置官修職郎葉棠亦授承直郎並令赴行在棠建安人也是日朝散郎知江津縣穆延年渡江禱旱夜漏未盡水暴至延年溺死詔官其子二人延年夀春人嘗知鄢陵縣縣牧國馬中人預其事羣類豪橫相勝雖開封尹亦避之獨數為延年屈其死年四十六崇安民廖公昭聚衆為盜范汝為所部提轄官保義郎熊志寧召募槍仗手聲言往捕之其意實欲為變會神武中軍統制官朱師閔以所部適至志寧懼遂散其衆丁亥福建制置使辛企宗以聞未幾建陽民丁朝佐作亂志寧率射士以往道與朝佐合執武尉解渥而拘之遂入建陽崇安二縣官司不能制戊子上諭大臣曰昨令廣選藝祖之後宗子二三嵗者得四五人資相皆非岐嶷且令歸家俟其至泉南選之先是尚書右僕射范宗尹有造膝之請故上有此諭宗尹曰此陛下萬世之慮上曰藝祖以聖武定天下而子孫不得享之遭時多艱零落可閔朕若不取法仁宗為天下計何以慰在天之靈同知樞密院事李回曰自昔人君惟堯舜能以天下與賢其次惟藝祖不以大位私其子聖眀獨斷發於至誠陛下為天下逺慮上合藝祖實可昭格天命參知政事張守曰堯舜授受皆以其子不肖藝祖諸子不聞失德而以傳序太宗此過堯舜逺甚上曰此事亦不難行秪是道理所在朕止令於伯字行中選擇庶昭穆順序簽書樞密院事富直柔曰陛下聖斷度越千古第恐令懬不足以奉承上曰且令廣求須自選擇𠫭知政事秦檜曰須擇宗室閨門有禮法者上曰當如此直柔曰宫中有可付託否上曰朕已得之矣若不先擇宫嬪則可慮之事更多宗尹曰陛下睿眀審慮如此宗廟無疆之福上所指宫嬪蓋張媫妤吳才人也二年五月乙亥可參考王眀清揮麈録餘話云紹興壬子詔知大宗正事安定郡王令畤訪求宗子伯字號七嵗已下者十人入宫備選十人中又選二人得阜陵及伯浩按令畤以二年閏月乙未除知宗而阜陵五月乙亥育於禁中相去才四十日恐選擇未必如此之速又令畤以舊事談稹為上所薄恐未必以此委之眀清誤記也停官人姚舜眀敘朝奉大夫以吕頥浩有請也詔隆祐殿諸色秪應人各進一官己丑修職郎曺涭為閣門宣贊舍人涭曚子也曚開封人靖康中為應道軍承宣使以其父遍歷三衙管軍未有褒録用遺表恩二人而有是命庚寅命權工部侍郎韓肖胄主管昭慈獻烈皇后升祔一行事務及題神主初命左司貟外郎趙子畫子畫言昭慈典禮率用母后臨朝稱制之儀按元德升祔宰臣王旦題寫徽名今以庶官為之不稱繇是改命肖胄直祕閣主管江州太平觀裴廪為荆湖西路提點刑獄公事時湖西未置使者而廪寓居廣西乃就用之言者奏廪貪財敗事近者輒差除廣東西帥臣其狂妄可知遂寢其命廪所除廣東西帥臣不知蒍誰當求他書參考按此時趙存誠許中並為廣帥廩除人或又在其先今未見初安南賊吳忠與其徒宋破壇劉洞天作亂聚衆數千人焚上猶南康等三縣殺巡尉進犯軍城統制官張中彥李山屢舉兵討之不克是日江西提點刑獄公事蘇恪以從事郎田如鼇權南康縣丞令與朝奉大夫權通判魏彥杞往招捕未幾破壇為彥杞所殺如鼇尋遣兵焚賊寨殺洞天如鼇大庾人也破壇以八月壬申被殺洞天以九月癸卯被殺今併書之吳忠事紹興二年八月辛亥所書可參考辛卯輔臣進呈言者論劉光世軍中冗費上曰光世一軍搜汰冗雜約留兵幾何可以贍足范宗尹曰今月給錢十六萬緡米三萬斛若留精兵三萬人且汰其使臣之罷軟者可以足用上曰俟作手書與之如家人禮直示朕意庶幾光世不疑委曲聽命翌日遣睿思殿祗候羅亶賜光世手書諭旨仍以玊帶賜之尚書吏部侍郎李正民移禮部侍郎右諌議大夫黎確試吏部侍郎吏部貟外郎江躋守左司貟外郎詔局所官吏請御厨折倉錢自八十千至二十千凡十一等並減半癸巳詔祕書丞李元瀹學無根源妄議典禮可與外任乃以元瀹通判湖州元瀹嘗上殿恐是議昭慈升祔事當考中大夫王安中提舉臨安府洞霄宫既而言者論其罪命遂寢中大夫張澄提舉西京嵩山崇福宫􅊹新落分司故有是命甲午直祕閣魏志崇知筠州志崇既罷京畿之行乃命出守是日賊鄧慶龔富圍南雄州守臣鄭成之率軍民拒之知虢州邵興以餘兵屯盧氏縣為河南鎮撫司統制官董先所敗興不勝率衆走興元投制置使王庶張浚以其姓名與年號偶同乃易其名為隆先遂取商虢二郡先河南人也先取商州在七月取虢州在八月今併書是夏金左副元帥宗維右監軍希尹自雲中之白水泊右副元帥宗輔自燕山之望國崖避暑山西漢民賂宗維執蓋者毒之宗維幾死建炎以來繫年要録卷四十五
