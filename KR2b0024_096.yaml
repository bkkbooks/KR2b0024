body:
  text: 建炎以来繫年要録巻九十六宋李心傳撰紹興五年十有二月己亥朔檢校少保鎮寧鎮信等軍節度使神武後軍都統制荆湖南北襄陽府路蘄黄州制置使岳飛遷招討使帶御器械神武中軍都統制權殿前司公事提舉宿衛親兵楊沂中權主管殿前司公事併中軍𨽻殿前司沂中自劉錫之罷已暫權殿前司至此真除也自五軍外又置選鋒䕶聖二軍每軍皆有統制仍令沂中具名申樞密院給降付身給付身指揮在是月己酉直秘閣宋萬年提㸃利州路刑獄公事日歴萬年去年五月己亥自左朝散大夫直秘閣轉一官利路提刑題名萬年七年十月乃以右中大夫直徽猷閣到任詔果州團練推官王利用知隂平縣丁則江原縣丞馮時行知蒼溪縣常明左廸功郎曹彦時並召赴都堂審察如未能逺来令宣撫司與陞擢差遣則晉原人時行巴縣人明安民孫也先是祠部員外郎楊晨撫諭川陜還薦利用等才行于朝故有是命中書門下省奏累據臣寮陳請乞淮南川陜荆襄等路行屯田之制以裕軍食乃命學士草詔諭諸帥如所請詔閤門祇候孫崇節特差幹辦儀鸞司指揮勿行先是閤門得㫖行下而言者以謂自来未有閤門承受聖㫖除臣僚差遣條法深恐自此沿習為例中外臣僚因奏對之際干求差遣上累聖德此事雖小所繫甚大望賜追寢仍詔大臣今後傳宣内降或官司申乞奏審而不依法律者並依祖宗法許中書宻院及所屬官司執奏故有是㫖崇節差遣以十一月辛巳得㫖今但附寢命之日庚子試尚書禮部侍郎兼侍講唐煇充徽猷閣直學士知徽州以煇引疾有請也詔神武係北齊軍號久欲釐正按神武乃高歡諡號此云北齊軍號未詳宜以行營䕶軍為名神武前軍改稱中䕶軍左軍稱前䕶軍後軍稱後䕶軍劉光世所部人馬稱左䕶軍吴玠所部人馬稱右䕶軍並聽夲路宣撫招討司節制熊克小歴稱並聽本路宣撫司節制此時湖北未置宣撫也克云川陜右軍後亦謂之右䕶軍此亦鹵莽今不取王彦所部人馬稱前䕶副軍聽荆南安撫司節制應統制官已下請給資任軍分如舊中䕶軍者本張俊所將信德府部曲後以忠銳諸將及張俊親兵與張用李横閻臯之衆𨽻之前䕶軍者本韓世忠所將慶源府部曲後以張遇曹成馬友李宏巨師古王􅊛崔増之衆𨽻之後䕶軍者本岳飛所將河北部曲後以韓京吴錫李山趙秉淵任士安之衆𨽻之左䕶軍者夲劉光世鄜延部曲其後王德酈瓊靳賽自以其衆𨽻之右䕶軍者本吴玠涇原部曲後得秦鳳散卒及劉子羽闗師古之衆𨽻之前䕶副軍者本王彦河北所招部曲其後稍以金州禁卒𨽻之至是俊與世忠光世軍最多玠次之飛又次之彦兵視諸將最少自渡江以後三衙名存實亡逮趙鼎張浚並相乃以楊沂中所將𨽻殿前司解潜部曲𨽻馬軍司統制官顔漸部曲𨽻歩軍司沂中之軍本辛永宗部曲後又益以他兵故其衆特盛潜之軍纔二千餘漸所統烏合之兵而已顔漸今月乙巳差充湖南安撫司使喚其兵以壬寅日𨽻歩軍司今併附此言者論行在職事官凡有除授畫降指揮承襲舊例日下供職此無補於事適足以長奔競之風又有不可者方除命之出合於人望者固無可言儻未愜於公論則御史諫官得以言舎人得以繳給事中得以駮與其追寢於供職之後曷若改正於未行之前不為反汗也執政大臣人主之所體貌天下視之以為矜式進退之際其舉措尤當慎也至於軍旅急切之事有司之不可一日闕者自可臨時别降指揮勿以為例此當從權權非反經之謂相時之宜權事之輕重而已伏望特降指揮除去舊例亦所以訓廸列位勵其風節從之詔四川制置大使司奏禀急速事許赴入内内侍省投進用席益請也辛未趙鼎等奏應都督府軍馬並撥𨽻三衙上曰祖宗故事應軍馬未有不入三衙者今釐正之甚善他日差出即降㫖聽某將節制其名既正則軍政漸可復舊權户部侍郎王俁言致治之要無他上有道揆下有法守而已然則守法者有司之事也自兵火以来雖案牘散亡而嘉祐舊典紹興新書與夫通用專法纎悉具存奈何比年以來官失其守廢法用例其弊滋甚如立功之賞不可以一揆也彼重而此輕則必引重以為例死事之澤不可以一律也甲多而乙少則必引甲以為例以至遷轉補授之差請給蠲減之異如此之類不可槩舉有司動輙援引以請甚者巧為附益規紊朝聽初則曰與例稍同又其次則曰與例相類一字之别去法愈逺不啻倍蓰什伯千萬然也所以恩歸於下怨集於上人不退聽事益増多為治之害孰大於此伏望明詔大臣除刑寺斷例合依舊存留照用外其餘委官悉取己行之例精加詳定有不戾於法而可行於時者参訂修潤附入夲例嚴戒有司自今以始悉遵成憲毋得受理敢有弗率必罰無赦詔左右司樞密院檢詳官取索措置條具申尚書省自南渡以来百司日有申明皆臨時裁决初無定制三省樞密院尤為叢冗至是趙鼎因請委都司取㑹前後所行之例約為中制立為定法付之有司遵守而行吏無所肆其姦矣熊克小歴略載此事於今年八月末又不出俣奏請實甚誤也按今年八月戊午止是編集糧審院續降指揮今移附此壬寅中書舎人兼直史館任申先陞充史館修撰先是范冲以待制兼修撰而舎人當在待制之上故改命焉吏部尚書孫近等乞依宰執例裁減俸給不許已而臺諫近戚諸大將相繼有請上悉以不允答之詔龍圖閣待制耿延禧端明殿學士董耘保静軍承宣使高則帥府舊僚令所在州各賜田五頃言者論其不可遂止左朝請郎兩浙西路提㸃刑獄公事吴表臣試秘書少監權主管殿前司公事楊沂中罷帶御器械以沂中自言職事相妨故也親衛大夫宣州觀察使江西路兵馬都監閻臯為成都府利州路兵馬都監先是四川置制大使席益將湖南兵自随以臯兼親兵統制故有是命乙巳詔以翠羽為服飾者依銷金罪賞並徒三年賞錢三百千許人告工匠同之鄰里不覺察者抵罪賞錢二百千已造者三日不毁棄同此以諸王宫大小學教授錢觀復有請也既而文思院言學士院書詔禁中應奉班直行門等賜帶觀察使已上牌印冊寳法物皆合用塗金詔令如舊文思院申明在六年正月乙亥江西轉運司奉朝㫖措置賑濟事件乞支降本路實催苖米五七萬石委提舉司以州縣災傷分數取撥比市價減錢十分之三零細出糶仍令州縣勸諭有力之家入納粳米每一千石補廸功或承信郎便作官户免丁身差役本路帥司舉辟合入差遣入納稻穀每二千石依入納米斛補官例第四等已下户本户秋料全放十分者並賑貸為種更不取息仍令州縣勸誘商賈出給公據徃秋收處收糴斛㪷免納斛㪷力勝稅錢仍每米一百石許附帶别色行貨約計一百貫沿路與免收稅錢三分令州縣密切詢訪停塌興販見有斛㪷之人勸諭令依元收糴時價量取利息責認石㪷數目出糶接濟闕食之民雖放稅不及七分縣分亦許賑給若常平穀不足聽取撥入納榖米支給候將來有納到義倉斛㪷却行撥還州縣當職官賑濟有方使饑民安業者委提舉司保明提刑司覈實申奏朝廷優與旌賞都省勘㑹取撥苖米及許入納米榖補官不行外餘從之丙午詔韓世忠錢糧專令兩浙都轉運使李迨應副先是金部員外郎張成憲在楚州應副世忠錢糧至是成憲赴朝禀議因乞外任宫廟故改命焉右朝請大夫提舉江州太平觀劉子羽復集英殿修撰知鄂州主管荆湖北路安撫司公事張浚既還朝始議大合兵為北討計乃自召子羽令諭指西帥且察邊備虛實故有是命右武大夫開州團練使劉錡為江南東路馬歩軍副總管帶御器械以其親兵遥𨽻歩軍司徽猷閣待制新知靜江府胡舜陟言伏覩熙寧間王安石當國變祖宗畫一之制創立新法而保甲居其一當時宗公元老如曽公亮富弼文彦博力爭以為不可行司馬光亦累章數其失安石好勝遂非必欲行之京畿三路不勝其擾元豐年諸路盗賊蜂起皆保甲為之本欲禦冦乃自為寇善良受患惡少得志至元祐間司馬光秉政一切罷去民獲蘓息盗亦銷弭及章惇蔡京祖述安石弊法而侈大之復行之於東南雖不授弓弩教之戰陣然於一鄉之中以二百五十家為保差五小保長十大保長一保副一保正號為一都凡州縣之徭役公家之科敷縣官之使令監司之迎送一州一縣之庶事皆責辦於都保之中故民當正副必破其家大小保長日被追呼不離公門廢其耕農之業今民遭差役者如驅之就死地必多方曲計以圖茍免吏縁為姦贓賕狼籍富者以賂逃役貧者舉家逺遁臣出守五郡每視訟牒之中理訴差役十常七八民之惡役如此未甞不為之痛心竊原立法之意不過欲便於捕盗耳然盗之小者雖無此法鄰里利害所同必能協力掩捕盗之大者使有此法豈足以當之近時淮西劇寇充斥保甲皆為俘擄未聞有一縣一鄉而能捍禦者於盗則不能擒制於民則徒有騷擾豈若祖宗時耆長壯丁之為利乎盖祖宗時於第一第二等户差耆長第四第五等户差壯丁一鄉差役不過三人而已今保甲於一鄉之中有二十保正副有數百人大小保長役者數多免者極少此不若耆長壯丁之為寛也祖宗時所差耆長無形勢官荘寄任之限但品官之家則以不該䕃贖人及管莊田人代充其餘家長祇應老疾者以次家人充今之差役品官之家及老㓜疾病者免焉不若耆長壯丁之法為均也惟寛則民不勞惟均則民不怨此祖宗良法萬世而無弊者也昔甞以此安邦保民致太平矣今尚何疑而不行哉朝廷欲養民力固邦夲以建中興之業守臣欲以民之利病告於朝廷皆無先於此者伏望特降睿㫖討論耆長壯丁之法而行之罷去保甲以救疲瘵之民天下幸甚詔户部勘當申省其後户部言已有四月己未指揮乞令常平司鈐束州縣毋得差委非本耆保事及赴衙集祇應違者按舉從之十二月戊辰行下給事中張致逺言艱難以來縣令每不得其人黎元受弊無以赴訴臣甞求其故正由資格大廢為令輕賤之所致也望令三省檢㑹薦舉縣令預籍記之人悉與堂除大縣内京朝官見待次京局或未闗陞而待次通判者仍與借服色他日以應郎曹侍從之選若賢才有所旌别資格亦不盡廢明分守息奔競則百里之寄固士大夫之所願也詔三省一就措置己酉趙鼎奏謝因足疾䝉賜珍劑上曰藥所以攻疾疾良已則當却藥或者烹煉金石餌之徒耗真氣非養生之道豈唯治身雖國亦然張浚曰秦以嚴刑峻法治天下而自速其禍此可以為戒給事中吕祉言近制行在職事官係朝廷擢用類多踈逺不獲一望清光故特延見訪問所以求賢審官詢事考言惠至博也然侍從官以言語備顧問朝夕論思出入獻納乃其職也豈可令與庶官輪日面對願詔侍從官免輪面對如有己見即許依舊例請對勿拘以時勿限以數從之熊克小歴載此事於十一月十一日庚辰按祉是月十三日始除給事中其實祉上此奏在十二月十一日己酉克盖差一月也庚戌拱衛大夫泰州刺史都督府中軍統制軍馬吴錫為殿前司策選鋒軍統制兼都督府軍統制按督府都統制乃馬擴而左軍統制杜湛前軍統制王進選鋒軍統制申世景摧鋒軍統制韓京皆出戍於外右軍後軍統制未見姓名當考辛亥上與趙鼎論人才因曰朝廷用人不分彼此四方人才宜参用之沈與求曰成湯立賢無方豈限南北大理卿張礿充祕閣修撰知饒州右廸功郎朱敦儒既受官上命德慶府以禮敦遣赴行在既至入對遂有是命尚書金部員外郎張成憲直秘閣提㸃淮南西路刑獄公事權户部侍郎王俣言兵革未息屯戍方興大計所入充軍須者十居八九此國用所以常乏當講究長策細大不遺斯為盡善庶㡬日増月積漸致富實臣愚見略陳五事一曰去冗食之兵二曰損有餘之禄三曰收隠漏之賦四曰補銷毁之寳五曰修平凖之法臣聞兵貴精不貴多兵多而不精則冗食者衆冗食者衆則勇怯不分勇怯不分則戰無必勝是冗食之兵不惟徒費糧餉取敗之道故治軍之法戰兵之外車御火長牧人工匠之屬皆有定數舎是則為冗食今日財用所出盡於養兵然其間未甞入隊不堪披帶者尚多有之竭民力以養無用之人非計也不如委自將帥盡加澄汰付之漕臣籍荒閑之田計口分授官為借貸給與牛種使之墾闢仍且與減半支給錢糧俟秋熟之時便罷請給一嵗之後量立租課且以萬人為率每嵗所減米十餘萬石錢四十餘萬緡絹布五萬餘匹况又有租課所入哉儲此以養戰士非小補也艱難以来流品猥衆進用殊常而制禄之數一循舊法理宜不給欲乞應内外文武官俸給等以緡計者自百千以上每千減半有兼職者通計並候事平日依舊如此則裁損雖衆不及小官恕而易行夫復何患自軍興以来十年於茲財用所出大則資之民力其次則資之商賈無不自竭以奉其上惟是釋家者流一毫不取邑以千計郡以萬計不稼不穡坐食吾民其隠漏稅賦暗損國計不知其㡬何也臣謂宜酌古今之意權急緩之宜使之輸米贍軍人嵗五㪷依稅限送納凡居禪坊及西北流寓者特與蠲免於以少舒民力不為過也自艱難以来饒䖍兩司鼔鑄遂虧而江浙之民巧為有素銷毁錢寳習以成風其最甚者如建康之句容浙西之蘓湖浙東之蠡越鼓鑄器用供給四方無有紀極計一兩所費不過十數錢器成之日即市百金姦民競利靡所不鑄一嵗之間計所銷毁無慮數十萬緡兩司所鑄未必稱是加以流入偽境不知㡬何乞明詔有司申嚴銅禁屏絶私匠自今以始悉論如律除公私不可闕之物立定名色許人存留及以後官鑄出賣外其餘一兩以上嚴立罪賞並令納官量給銅價令分撥赴錢監額外鼓鑄國家平昔無事之時在京則有平凖務在外則有平貨務邊計之餘内裨國用無慮二十萬緡其效固已可見况今日師旅方興用度日廣欲乞先於行在置平凖務次及諸路要㑹去處各置平貨務以廣利源誠非小補俟其就緒置使領之此五事者儻有可採乞令有司講究條畫排斥浮議斷以必行詔户工部勘當其後頗施行之殿中侍御史周葵言州縣人户自兵馬盗賊殘破之餘困於軍期例多貧之望將蔡京父子王黼李邦彦等給使減年及其他恩澤補官并童貫梁師成朱勔等妄作名目補充大小使臣之家並不理當官户一例選募充役庶㡬少寛貧民下户之力事下吏部其後吏部言給使授官於本選無理為官户之文其蔡京等他恩補官及童貫等妄作名目之人乞如所奏從之明年正月丁丑行下壬子尚書吏部員外郎周秘守監察御史詔王寀追復朝奉大夫寀江州人甞為親衛中郎政和末坐詐為天神示現誅死至是用其家請而復之後省䟽其罪命遂格癸丑詔淮東西川陜宣撫司荆襄招討司荆南安撫司並以参謀官一員兼提㸃本司屯田公事右文殿修撰致仕趙億落致仕提舉台州崇道觀用給事中吕祉等奏也命下而億已卒矣汪藻撰億墓誌云朝廷知公未衰起提舉崇道觀命及門而公卒時乙夘十二月丙申也按億之卒在此前十七日藻所云小誤甲寅尚書刑部員外郎楊邁直秘閣知夔州兼本路安撫使自渡江後由朝士出為川陜帥臣者始此尚書工部員外郎許𤾉祕書省正字孫雄飛並罷遣中使賜諸大將銀合臘藥其川陜荆襄止令密院遣使臣以地逺故也徽猷閣待制湯東野卒吏部言照得本官脚色係曽經勤王人數詔追復徽猷閣直學士東野既貴甞請於朝與兄弟世為義居禁子孫毋析户又輟俸買田為義莊以給踈族之貧者乙夘左文林郎紹興府觀察推官凌景夏為秘書省正字用帥守綦崈禮薦也右通直郎樓璹與陞擢差遣遂以璹通判邵州璹异子也為於潛令宣諭官舉其政績詔俟終更引對而甄擢之至是代還用薦者改官乃有是命宣諭官所薦前此未有不得對者當考丙辰徽猷閣待制提舉江州太平觀劉觀知彭州觀既罷歸屢不赴乃就用之右廸功郎江袤充勅令所刪定官己未改樞密院北面房為河北房諸路制置大使吕頥浩李綱席益次第之鎮詔内侍徃勞且以銀合茶藥賜之國子監丞張戒守秘書郎右承議郎主管江州太平觀李維行國子監丞維綱弟也史館修撰范冲薦其學問操履置之臺省無所不宜遂召對而有是命直秘閣李革知興元府中書以興元殘破之後久闕正官撫治故選用之時宣撫司已用協忠大夫華州觀察使王俊守興元革不得上乃改知雅州興元帥題名王俊今年五月到任日歴李革明年九月己卯差知雅州直秘閣主管台州崇道觀向子忞落職罷宫觀依衝替人例係事理重子忞守衡州視事再閱月諸司共劾其徒流編配無慮數十人率皆報復仇怨任情廢法自謂滅門刺史乞送所司治罪先半月子忞已得請奉祠輔臣進呈上曰監司乃外臺耳目之官既按劾自當推治然有罪者家居待命而證左無辜之人徃徃淹延囚禁動經歳月深可憫也子忞罪狀既明别不須干證第黜責其身足矣趙鼎曰臣等共議欲將子忞鐫罷不必取勘上可之子忞此月乙巳自陳宫觀庚申太府少卿沈昭逺請久任計臣上曰祖宗時三司使如陳恕最為久任號稱職今内外計臣儻能稱職就加爵秩以褒寵之可也不須數易張浚曰久任豈獨計臣他官儻有稱職者亦當如此殿中侍御史周葵試司農少卿葵甞入對言今天歩尚艱非臣子諷諫之時臣願直言其失大扺務虛文而無實效因進數所行之事不當者凡二十許上曰趙鼎張浚為朕任事不可以小事形迹之葵曰陛下即位已相十許人其初皆極意委之卒以公議不容而去大臣亦無固志假如陛下有過尚望大臣納忠豈大臣有過而言者指陳便為形迹臣願因人言使大臣易意不惟可救朝廷之闕亦可保全之上曰此論甚竒至是朝廷議大舉而葵三章力言此存亡之機不必更論安危治亂未有不先自治其國而成大功者或言葵沮國大計遂有是命諸王宫大小學教授劉長源大理寺丞黄珪並為監察御史詔上虞縣當職官貶秩一等令提刑司治罪以月中無住賣鹽數故也其㑹稽等七縣鬻鹽數少者皆詰之辛酉起居郎潘良貴言中臺省出納王命敷政四海喉舌之司也六曹遵奉成憲各揚乃職兵火以来茍簡玩習視為傳舎其最甚者遇朝廷送下勘當事理並不依據格法指定是非常操兩可之說曰更合取朝廷指揮是致朝廷臨時别有衝改長貳郎官循黙奉行不復更有執守每廢一法即後来陳乞者循以為例干求請託紛然無窮若不加察恐省部成法盡壊其患有不可勝言者伏望嚴飭六曹長貳郎官各務協心凡朝廷送下勘當事理並須據格法定是非供報仍乞詔大臣事闗六曹者不問鉅細一切惟有司格法是從庶㡬杜僥倖之門開公正之路仰稱陛下敷政之意輔臣進呈上曰祖宗以来自有格法有司但能遵守即事稱職格法既定誰復有僥倖之心唯其因事陳請人思幸得此法之所以寖廢也可依良貴所請更切申嚴沈與求曰六部乃法守之地有司徇情遂至廢法而用例然情豈勝徇耶僥倖之門塞則人自安分天下何患不治中興聖政史臣曰法外豈得有例哉徇情之私而為法之蠧莫例若也其弊盖出於特㫖為例矣而又㳂請之僥倖相乗無不可者是猶從其不齊於物而悉廢其器雖有權量度數無所用之也天下誰為知止足之分者哉然則法安出也𫝊之祖宗盖有所創之於上付之有司盖有所受之於下猶權量度數之器受之於官而用之也夫是之謂遵守詔勑令所刪定官監登聞檢皷院官自今並令轉對以周葵甞建言檢皷院𨽻諫省而刪定官為書局故也癸酉詔川陜路州縣官不並差川陜人但有内地官一員餘不限員數紹興令差川陜人州不過三員縣鎮寨一員吏部員外郎徐林言比元豐勅差誤故命申明行下明年正月别立法甲子詔屯田郎中樊賔候都督府出使日随逐去江淮措置屯田時張浚再出江上欲謀大舉深慮諸將議論不同心頗憂之不欲出口趙鼎察知其意與之謀曰公之此行未便能舉事莫若兼領屯田而歸不為無補於是置官屬畫一而去先是建言屯田者甚衆至是始為之乙丑監察御史周秘守殿中侍御史丙寅都督府奏以集英殿修撰新知鄂州劉子羽權本府参議軍事與主管機宜文字熊彦詩並徃川陜撫諭詔各賜銀二百兩遣行時張浚將謀出師故令子羽等見宣撫副使吴玠諭指而玠亦屢言軍前糧乏因命子羽與都轉運使趙開計事併察邊備虛實焉命湖北帥臣同知鼎州張觷以閒田排鼎澧辰沅靖州刀弩手用樞密院請也丁卯右朝議大夫韓梠主管台州崇道觀梠坐蔡攸親黨久斥至是始得祠戊辰詔御史臺朔參官用在京通直郎以上望參用釐務通直郎以上除宣制及非時慶賀以望參官餘並令朔參官趂赴是夜雨雹是月偽齊前尚書左丞張東死是冬金主亶以䝉古叛遣領三省事宋國王宗磐提兵破之䝉古者在女真之東北在唐為䝉兀部其人勁悍善戰夜中能視以鮫魚皮為甲可捍流矢偽齊劉豫獻海道圖及戰船木様于金主亶金主亶入其說調燕雲兩河夫四十萬入蔚州交牙山採木為栰開河道運至虎州將造戰船且浮海入犯既而盗賊蜂起事遂中輟聚船材於虎州以張匯節要洪皓紀聞王大觀行程録參修虎州者在雄州之北䝉國編年謂之萌骨子記聞謂之盲骨子今従行程録其按䝉古字原本錯訛今改正其所列異同姑存舊是嵗都督行府令靜江府昭州折布錢每疋増一千二郡之民嵗輸布九萬疋有竒舊法每疋為錢五百至是始増之此據路彬所奏修入左朝請大夫馮子修致仕子修知普州治有能名上召之子修以年踰七十上章請老乃有是命子修西充人甞為長安令童貫使陜西士大夫入謁者皆拜庭下子修長揖而入貫怒奏子修莅建神霄宫不時興作奪官晚乃得州既致仕後六年而卒此据趙逵撰子修墓誌修入其月日未見且附年末俟考南班宗室賜名者二十有一人諸宗室命官者三十有七人兩浙路見管户二百十二萬餘口三百五十三萬餘廣南東路稅客户六十一萬餘西路稅戸三十一萬餘客户十一萬餘陜府西路户四萬餘荆湖南路户九十五萬餘成都府路稅戸七十八萬餘口二百十六萬餘客户三十七萬餘口九十萬餘䕫州路稅客戸三十四萬餘口八十六萬餘福建路户一百三十三萬餘口二百五十九萬餘有二龍死於冷山金左丞相陳王希尹欲遣人截其角或以為不祥乃止松漠記聞夏國主乾順改元大德四川總領所利州大軍庫有李顯忠西夏偽誥云大德五年正月下按顯忠以年冬奔夏九年六月還朝合在紹興九年逆數之知此年改元也建炎以來繫年要録巻九十六建炎以來繫年要録巻九十六金人地名考證䝉古原書作蒙國巻一百三十三又作䝉兀並誤今改正
