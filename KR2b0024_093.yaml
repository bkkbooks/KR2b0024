body:
  text: 建炎以來繫年要録巻九十三宋李心傳撰紹興五年九月辛未朔詔總制司近取漕司雜税及常平増收頑子錢鈔旁勘合錢耆户長雇錢常平一分寛剩錢正税零畸剩數等並罷以久旱用都省請也封呉才人母孺人張氏為咸寧郡夫人弟世景蓋並補承信郎壬申徽猷閣待制權川陜宣撫副使邵溥按屬郡守趙承之不法趙鼎曰溥在蜀中極振職上曰人情多鋭於其初久之徃徃懈怠若常如此甚佳雖古帝王亦然唐明皇開元天寳治亂可見矣鼎曰陛下知此中興之功宜不難致天下幸甚武功大夫薛紘落致仕充川陜宣撫司幹辦公事用吳玠請也詔知昌州文正倫知懐安軍呂協中知中江縣鮮于戢知郪縣程果知小溪縣髙岑各進一官以潼川諸司按令審擇所部守令功狀以聞故有是命觀文殿學士知紹興府孟庾乞許便宜從事詔遇邉機調發軍馬不可俟報者權許便宜行訖以聞俟過防秋如舊癸酉右奉議郎淮西宣撫司幹辦公事韓元傑知濠州用劉光世奏也濠州自建炎以來就命降冦為郡及是始用文臣甲戌大理評事諸葛行仁獻家蔵書籍萬有一千五百巻詔補其家将仕郎一資行仁辭乞為父愷陞通直郎仍舊致仕從之尚書省言封州引試舉人差右廸功郎陳煥充考試官不應格詔本路漕臣特降二官詔進士唱名依故事令館職殿上侍立用秘書省著作佐郎李公懋請也徽猷閣待制提舉江州太平觀季陵卒於廣州乙亥上御射殿賜進士汪洋等洋初見三年三月二百二十人及第出身時右修職郎黄中對策言陛下貴為天子富有四海而兩宫北狩闕然温凊之奉者十年於此矣人生天地之間如白駒之過隙所謂十年者豈可多得陛下思念及此豈不為之痛心然臣恐陛下有思念憂懼之言而未有思念憂懼之誠心也故凡有是誠者必有是事臣不識陛下所改作者果何等事耶今天下之弊可謂極矣臣不能以徧舉要之非蹈常襲故者所能為也臣愚以為獨在於陛下安之以誠益之以剛健明詔二三執政大臣思有所矯拂於世俗事事刮磨整齊之必盡去天下之宿弊而為之一新其耳目然後治效将有可觀祖宗之烈為可復父兄之耻為可雪也陛下欲實惠及民當先為省財之術宜約祖宗兵數立為定制自今募兵皆以年二十以上至年五十而罷遣之痛削任子之法縱未能如祖宗之數要亦不可過三嵗取士之制此省財之一端也洋策言治道之要不在乎他在反求諸己而已臣不知陛下之志将行帝王之道耶抑将為覇者之事耶今聖策乃以正心誠意為言則帝王之道陛下固知之矣臣願陛下以帝王之道為可以必至以聖人之言為可以必信勤而行之不自懈怠夫覩邑之遷徙宰臣之廢置進取之前却政事之措劃人才之進退皆當今之大事而不可不為者乃紛紛不定則陛下所以為自治之計從可知矣臣恐敵國之有以窺陛下也彼劉豫之為逆臣神人共憤固不當與之較彼此之勢然使彼一旦遽能遷善而改過發政而施仁有以深服於人心則陛下之勢豈不危哉願陛下以混一區宇為心使施設措置莫不當理從諫如轉圜見善如不及純而不已盛徳日進使海内皆有歸徃之心然後大舉六師削平蕃偽所謂以天下之所順攻親戚之所叛也惟陛下力行之耳今日之事陛下将責之宰相興利而除害耶苟非陛下信之篤而用之専如齊小白之於管仲則宰相之賢者方且畏懼而避嫌而其不賢者又将因循以敗事矣将責之臺諫使之進賢而退姦耶茍非陛下諫則必行言則必聽如唐太宗之於魏鄭公則臺諫之賢者方且量力而就規而其不賢者又将觀望而言事矣又将責之山林特起之士使之獻可而替否耶茍非陛下盡禮以致之克己以從之若蜀先主之於諸葛亮則山林之士其賢者方且奉身而退而其不賢者又将諂諛以求進矣詳定官中書舎人胡寅等定中為首選輔臣奏中係有官人上問故事如何沈與求曰臣聞皇祐元年沈文通考中第一仁宗曰朕不欲以貴胄先天下寒畯遂以馮京為第一文通第二上曰可用此故事遂擢洋為第一朱勝非閑居録云趙鼎作相殿試策不問程文善否但用程頥書多者為上科是嵗状元汪洋按黄中策乃不用頥書與勝非所云不合時新復詩賦上欲重其選策試日謂大臣曰詩賦取士累年未聞有卓然可稱者俟唱名日可将省試詩賦髙等人特與陞甲以勸多士遂詔省試魁賦鄭厚循二資與陞擢差遣中潜善族孫厚莆田人也同日賜特奏名進士汪喬年以下二百七十二人同出身至助教詔五路人依祖宗故事與陞等而取應宗子不尤等四人武舉正奏名進士張深等五人亦次第補官自是以為例熊克小歴云鄭厚特依第三名今從厚所上辭免劄子按日歴厚紹興八年十月以左從事郎上殿十年正月戊午以左從事郎泉州觀察推官衝替克實甚誤丁丑中書舎人朱震言竊見将作監丞郭千里畜養娼婦侵奪民田嘗經按治雖得逺闕終非所宜望賜寝罷從之以後省而按吏頃所未有故著之庚辰右朝奉郎江漢特差主管台州崇道觀從所請也漢不審量又得祠當考辛巳中書舎人朱震徽猷閣待制兼史館脩撰范冲以資善堂職事同班入對左朝奉郎通判平江府梁弁為監察御史壬午張浚奏江上諸軍事藝精強非前日之比趙鼎曰承平時陜西並邉人馬亦未必如此皆陛下累年葺治之力沈與求曰去嵗敵人奄至淮甸賴陛下英斷决策向前遂使敵計盡廢然亦恃此事力可以扞敵故也上曰此皆卿等協賛向使朱勝非尚為相必勸朕退避今已無江浙矣鎮寧崇信軍莭度使神武後軍都統制荆湖南北襄陽府路蘄黄州制置使岳飛檢校少保賞功也左朝散郎前權樞宻院計議官湖南路幹辦公事馮檝言遂寧諸縣自康定年立法以税雜錢一千一百一十文折一匹紬今潼川路隨軍漕司行下新科約乃以六百文折一匹絹又不許納正色毎匹估錢七千五百文乞改正詔宣撫司覺察詔川陜宣撫司差撥人船優給路費以禮敦遣和靖處士尹焞赴行在以范冲再有請也徽猷閣待制提舉臨安府洞霄宫張灝卒於開州癸未太常寺少卿陳桷直龍圖閣知泉州尚書刑部貟外郎范直方直秘閣提㸃福建路刑獄公事時海㓂未平故命桷出守尚書吏部貟外郎董弅試太常少卿監察御史錢葉為都官貟外郎甲申資政殿大學士提舉萬夀觀兼侍讀張守自福州入見命坐賜茶乙酉尚書左僕射監修國史趙鼎上重脩神宗實録五十巻舊文以墨新修以朱刪出以黄及進呈上起詣殿東壁焚香再拜受書内侍設案捧書至御坐前鼎搢笏展書修撰范冲進讀上起立拱觀禮畢復御坐賜鼎以下銀合茶藥又延鼎冲陞殿命坐賜茶後三日制鼎進二官為左光禄大夫冲及直史館任申先著作佐郎張九成李公懋校勘李彌正喻樗前史官常同王居正劉大中熊彦詩環中並進一官校勘合珵王蘋鄧名世改京秩鼎四辭不拜冲等亦以未終篇為言詔将來節次進書了畢更不推恩冲等乃受命九成言在館未及一月最無功乃命俟終篇進秩於是提舉諸司宣慶使明州觀察使入内内侍省都知兼内侍省都知梁邦彥以勞遷景福殿使而承受入内東頭供奉官幹辦御藥院張令亦進一官自後進書率如此例降廸功郎告身扵浙西諸州博糴毎道四千緡亦不作進納與理為官户仍理選限日歴無此今以明年三月二十九日吏部申明状附入詔臨安府在城寄付兊便錢㑹子毋得出門仍依在京小平錢法立定刑名用守臣梁汝嘉請也都人不以為便翌日遽罷之丁亥都督行府言契勘屯駐軍馬比去嵗其數過倍費用浩瀚皆自行在措置應副比嘗置司講究近畫㫖並罷即裏外軍國之費除茶鹽課入外止仰上供錢物資助不容少有違欠而當職官徃徃循習積弊罕肯留心居常則緩催理以沽名譽急闕則太騷擾以資吏姦理合嚴行戒飭詔户部開坐州軍應干上供錢物糧斛紬絹絲綿等合起發赴行在名色數目鏤板遍下監司州郡通知當職官各仰身體今來訓誡之意當思國歩艱虞屯兵衆廣用度増多恪守條令悉心措置専意收簇如期起發資助軍國大計監司常切㸃檢催督户部毎限類聚毎路毎州有無拖欠開具以聞如尚敢違慢或循情縱弛即依條劾罪當議重加懲責以為官吏不恤國事之誡監司户部失覺察御史臺得以弹奏殿中侍御史謝祖信言臣比聞朝廷用任伯雨章疏追治章惇蔡卞以誣謗宣仁之罪謫授散秩子孫補外臣係是章惇家姻戚即欲具奏乞解職任縁臣初除言事官日首䝉陛下靣賜宣諭此事仍奉聖訓有排浮議而用臣之語臣亦自以去惇之亡已數十年耳目之所不接似無所礙故不敢引此以請伏思數日臣既待罪言責以陛下聽納之深毎有論奏不敢觀望顧避上負知遇竊慮臣今後論事之際不無間嫌反復熟計義當引去伏望聖慈許臣解罷前件職任除在外合入差遣或宫觀一次不許然祖信不自安未㡬卒去常州言民潘念八剔肝愈父病詔依格倍給米帛仍常存恤之戊子史館奏乞将宗澤行實與汪伯彥等所編元帥府事迹参照具録進呈斷自聖意付之史官上曰朕昨以使事至河北逮今十年當時事歴歴可記也趙鼎等曰臣聞澤嘗勸陛下勿為河朔之行信否上曰誠有之然王雲之死乃邦人疑其為姦細而殺之澤不為無過鼎曰使澤一言以留陛下此天意也至於澤不能救雲之死豈得無過然事有重輕左從事郎蔡安強特改左宣教郎安強比陽人以薦對改官遂命為諸王宮大小學教授己丑左朝散大夫新知信州余應求為江南西路提㸃刑獄公事應求坐李綱累久廢至是稍錄之勅賜進士及第汪洋乞避逺祖嫌名洋年十八上以其與王拱辰同嵗賜名應辰時言者請賜新進士儒行及中庸篇詔正字髙閌校正上将親書以賜閌言儒行詞說夸大類戰國縱横之學蓋出於漢儒雜記望止賜中庸庶使學者知聖學淵源而不惑於雜上從之左廸功郎雅州嚴道縣尉謝惇徳特改左宣教郎簽書昌州軍事判官以所陳六策議論可采也惇徳六策一曰正國體大畧謂天下治亂如人身之安危人禀隂陽以生陽為正氣隂為邪氣以一身而論天下則近忠良布直道遵古法施善教省費用守謙恭皆正氣也近淫僻信䜛言任獨見施虐政貪財貨崇奢侈皆邪氣也崇觀之失在邪勝正也反崇觀之失監於祖宗成憲則國體強二曰正身大略謂人主一身神明之宅也仁義禮樂之器也政教法度之本也邪正賢愚之鑑也朝廷百官之儀也四方萬國之表也若夫飾偽矯誣以幸人之不知是不能安其宅暴虐殘賊以傷一氣之和是不能守其器効僻亂常以傾先王之治是不能立其本喜䜛悦佞以塞忠直之路是不能明其鑑私嬖權倖以掩白日之光是不能肅其儀逸豫敗度以毁威儀之則是不能端其表三代漢唐之亡未有不由是三曰求賢大略謂人君未嘗不欲治賢者未嘗不欲仕振古以來致治之君成功之賢如此其少何哉當秦隋之季非無賢也在上者恃侈靡之驕恣淫慾之私縱悅佞之僻以害正直而驅之使避地也漢唐之興非多賢也在上者恭而不驕公而不私正而不僻屈己尊道而賢者樂為之用也有天下者其可不鑒四曰奉天大略謂君之奉天猶臣之事君子之事父也揆之天理豈使一人壞法亂紀縱其私欲棄民而弗保乎君棄其民天亦棄之君殘其民天亦殘之今國家多艱㓂盗尚熾天未悔禍陛下誠能盡誠以事天籲俊尊賢以興愛民保民之政則佑徳助順将無所不致矣五曰愛民大略謂天下之得失在於愛民與不愛民昔漢之興困於平城危於呂氏顛蹙於七國簒奪於王莽而漢終不亡者蓋當是時人心思漢甚如饑渇則民未厭漢故也必俟黨錮成訟君子盡誅小人盈廷民大失望而後亡唐之興危於武后殆於韋庶人奔走於安史㡬亡於奉天而唐終不亡蓋於是時朱滔謀叛無樂從者則民心未厭唐故也必俟白馬禍興君子盡戮小人滿朝民大失望而後亡臣未見不愛民而能興國家保社稷𫝊之無窮者也六曰服四裔大畧謂天地之法嘗嚴於中國而畧於四裔嚴於中國故尚教化而以道徳為強畧於四裔故尚功利而以兵甲為強中國之君有能嚴甲兵之備而不失之虛持威福之柄而不失之弱聰明作哲而不失之蔽嚴恭寅畏而不失之驕政教詳明而不失之亂天将誘之福之廸之啟之助之彼人之強者孰能勝天哉惇徳依政人時年且七十矣既受命又為表以謝大畧謂天恩榮被而不䝉朝廷推愛民之心行愛民之政是有益於臣無補於國大非臣之素願後二嵗卒於家庚寅上以御書尚書一帙賜趙鼎翌日鼎奏謝上曰尚書所載君臣相戒勅之言所以賜卿政欲共由此道以成治功耳辛卯端明殿學士提舉鳳翔府上清太平宫宇文粹中復資政殿學士中侍大夫保信軍承宣使帶御器械神武中軍統制權主管殿前司公事提舉宿衛親兵楊沂中權發鄜延路馬歩軍副都總管自渡江後諸将為統制軍馬者必以資序帯六等兵官沂中以扈衛之勞特陞等也壬辰詔元符上書邪說尤甚范柔中等二十七人身亡未任子者並與一子官趙鼎進呈上曰此乃蔡卞蔡京之罪獻言者有可取則施行之無可取則容納之如此則上無拒諫之名而下有敢言之士何至立為邪等名目其誤太上皇帝皆此類也唐太宗時馬周上書言貞觀初米斗直一縑而天下帖然百姓知陛下憂憐之也今一縑易粟十餘斛而百姓咸怨以為陛下不憂憐之也其言可謂切至矣太宗亦優容之復加擢用如柔中等子孫與一文學不為過當國子監丞張戒靣對奏上曰臣幸因輪對輙撰成書一封宗社大計軍國重事臣靡不盡言願陛下萬㡬之暇留神省覽上曰甚善戒進呈訖奏曰臣所論事既多必有不合聖心處上曰朕覽天下章奏不如此朝廷初無拒諫之意人臣進言其可行者行之其不可行者置之朕未嘗加罪戒曰誠如聖諭人臣進言若皆合聖心即是陛下所已知者又何用言為上曰不惟己知已施行不須言若人臣進言必欲合人主之意即是觀望戒曰陛下明此天下幸甚中侍大夫華州觀察使解潛權主管侍衛馬軍司公事所部将佐軍兵義兵敢勇効用並𨽻本司使換資序請給如舊仍速赴行在供職潛部曲僅三千餘人老弱減汰者三之一焉故遼宣徽北院使行左金吾衛大将軍劉彦昇特贈左武大夫貴州團練使以其子武翼大夫逈援例有請也甲午詔自今用恩例陳乞嶽廟人並令吏部勘當有無違礙申省初趙鼎欲優西北故家子孫之落南者不俟年及率以祠禄處之遂換階官理資任終身不復銓試論者數以為言至是始條約焉太常諡故相劉摯曰正肅既而其家言正字犯摯父名乃更為忠肅乙未趙鼎奏昨日䝉降出國子監丞張戒所上書其言雖有過當小臣敢盡言如此亦不易得上曰戒因靣對擕此書來上㡬萬八千言朕熟覽之其間固有過當然其憂國愛君之心誠有可嘉戒自言恐忤聖意惟陛下容之方患朕之過失不得自聞民之疾苦不得上逹大開言路以防壅蔽豈罪言者朕意自欲賞之沈與求曰陛下容納忠言如此使臣下忘忌諱思有以仰裨聖徳何患不聞盡言上曰戒言朕有仁宗皇帝守成之徳而不知太祖創業之心此言良是朕見仁宗皇帝在位四十二年徳洽民心至今天下誦之仰慕如堯舜文武故當時立政用人之事朕嘗置在左右朝夕以為法至於太祖以神武創業朕誠不及也鼎曰陛下以仁宗皇帝為法此乃中興之基本至於太祖創業艱難願陛下常留聖慮則施之行事自然合若符莭太府寺丞徐度樞宻院編修官李諠左廸功郎孫雄飛並守秘書省正字故寳文閣直學士王古盡還合得恩澤古元符户部尚書黨籍待制以上第二十九人温州安置丙申鄉貢進士翁績以軍功補下州文學績崇安人也丁酉權户部侍郎張致逺奏呈嵗計上曰今中外大小之臣罕肯任責若人人體國以公事同家事何憂不足仍須毎事節省積少成多唯贍軍賞功務在激勸此不可減耳監司守令有不經意於常賦惰慢尸素者户部宜糾劾之當議竄責十一月丙戌所書章䟽恐可附此戊戌徽猷閣待制趙子淔復徽猷閣學士知西外宗正事子淔宣政間依梁師成以進趙鼎引用之此據朱勝非閑居録附入詳具七月壬辰免審量濫賞注是月淮西宣撫司統制官華旺復光州名雷州㓂凖廟曰旌忠自靖康之末兩河之民不從金者皆於太行山保聚太原義士張横者有衆二千來徃嵐憲之間是秋敗金人於憲州擒其守将又有梁青者懐衛間人聚衆數千人破神山縣平陽府判官鄭奭以大軍討之不敢進居數日都統烏瑪喇引騎五百與奭㑹深誚之乃併其兵與青戰兵敗為青所殺此據張滙節要修入滙稱横有衆十八人青有衆近四十人二人共無六十人對敵六千人之衆而熊克小歴乃稱横有衆二千青有衆四千未知克誤或傳寫者誤以十為千也金主以右副元帥魯王昌為左元帥左監軍瀋王宗弼為右元帥右監軍薩里罕為左監軍建炎以來繫年要録巻九十三金人地名考證烏瑪喇原書作五馬誤改見巻三十薩里罕原書作撒離喝誤改見巻十一
