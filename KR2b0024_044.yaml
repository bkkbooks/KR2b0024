body:
  text: 建炎以來繫年要録卷四十四宋李心傳撰紹興元年五月丙申朔宰相范宗尹率百官拜表請御正殿不允表三上乃許之通直郎王鈇為樞密院編修官鈇南昌人父本仕至顯謨閣侍制秦檜舅也鈇通判邵州為帥臣程昌㝢所劾檜遂薦用之王明清揮麈後録建炎末先人為樞密院編修官被㫖集祖宗兵制書成高宗諭范覺民云王某所進兵制甚佳朕連夕觀之至于目痛可改官與升擢差遣時秦㑹之參政知事素與先人議論不同雖更秩然自此去國矣王鈇檜之舅子會之心欲用之薦于上謂有史才名適與先人偏旁相似上忽問云豈非修兵制者乎㑹之即應云是也詔再除樞屬按明清父即王銍也此所云秦檜對上語疑未必然時范宗尹為相檜方進用恐未敢面謾如此今不取丁酉詔以淮南民未復業全藉威望大臣措置令江東安撫大使吕頤浩江西安撫大使朱勝非浙西安撫大使劉光世並兼宣撫淮南頤浩領夀春府滁廬和州無為軍勝非領德安府舒蘄光州漢陽軍光世領真揚通泰承楚州漣水軍時李成既敗勝非乞置司洪州而江州依沿邉舊制以副帥總兵戍守上不許勝非奏下在己亥朝奉大夫知臨江軍康倬朝奉郎通判臨江軍邱鄄並貶秩一等倬衝替鄄放罷坐寇至棄城也王明清揮麈録餘話秦㑹之范覺民同在廟堂二公不相咸敵騎初退欲定江西二守臣之罪臨江康倬棄城走撫州王仲山以城降仲山㑹之婦翁也覺民欲寬之㑹之云不可既已投拜委質於賊什麼話不曽說豈可貸耶蓋詆覺民嘗仕僞楚耳按敵入江西乃建炎三年事而王子獻吳將之王仲山仲薿之徒皆以次年三月間行遣此時檜在敵寨未歸也今年春檜始參知政事而康倬以五月衝替蓋坐李成入冦事與仲山實不同時又李成所陷乃江筠臨江興國四州軍撫州亦不在其數明清蓋甚誤詔李成罷舒蘄光黃四州鎮撫使削奪在身官職俟獲日依法施行戊戌翊衛大夫福州觀察使辛道宗為福建路馬步軍副總管拱衛大夫相州防禦使張用為舒蘄鎮撫使兼知蘄州時用在鄂州駐軍朝議欲討李允文故有是命浙西安撫大使司統制官史康民知真州用劉光世奏也己亥手詔禮部太常寺討論隆祐皇太后合行册禮及奏告天地宗廟等事取㫖初進士黃縱上書論隆祐皇太后頃年以誣謗廢斥未嘗昭雪雖復位號然未正典禮及册告宗廟朝議欲因升祔廟庭特行冊禮上諭大臣太母失位於紹聖之末其後欽聖復之再廢於崇寧之初雖事出大臣然天下不能户曉或得以竊議兩朝范宗尹曰太母聖德人心所歸自陛下推崇位號海內莫不以為當然前後廢斥實出章惇蔡京人皆知非二聖之過上曰然昔高宗欲立武氏長孫無忌禇遂良皆以為不可而李績獨曰此陛下家事何須問外人帝意遂决則隆祐之廢出於惇京明矣富直柔曰陛下推崇隆祐天下以為當人亦不以尤哲廟與上皇願陛下勿復致疑上然之乃命禮官討論典禮既而禮部員外郎王居正以謂國朝追冊母后皆由前日未極尊稱之故隆祐皇太后蚤儷宸極雖䝉垢紹聖退處道宫而按元符三年五月詔書則上皇受命欽聖憲肅皇后以復冡婦之意亦已明甚崇寧初權臣擅政悖違典禮以卑廢尊是太后之隆名定位已正於元符而不在靖康變故之日也謂宜專用欽聖詔書及崇寧姦臣沮格之意奏告天地宗廟其册禮不須討論刑部尚書兼權禮部尚書胡直孺等以聞其議遂定禮官議上在庚戌今聨書之紹興四年五月庚申臣僚上言哲宗朝事跡載在時政記日歷者皆為蔡京取㫖焚毁滅跡紹興九年有進士黃縱者嘗繳進其父籍沒京家所藏之餘又皆殘缺不全按縱所上書未得其本此所云蔡京殘書未知與黃策所進蔡京親書復后所得聖語劄子相關否當考直徽猷閣主管江州太平觀李弼孺勒停初范宗尹薦弼孺使領營田遂召赴行在而右諫議大夫黎確奏弼孺淫汚狡妄媚事朱勔宗尹曰固知弼孺小人然但欲委之勸耕故有此命上曰君子易疏小人易親不知者無如之何既知弼孺小人安可不疏今日知田事者應别有之可勿召也弼孺怒上疏訟確所言誣誕故有是命弼孺以今年三月召上語在其月己酉臣留正等曰治遒要務在知下之邪正邪正一辨賢人君子常聚於本朝而憸侫小人不容幸進以害治道一或涇渭不分牛驥同牢則邪正雜揉往往生事以産亂天下可得而治乎太上皇帝宣諭輔臣深戒小人之勿用蓋邪正辨則朝廷治天下不足以理矣治道要務孰有先此者豈特垂訓輔臣而已哉真足以昭大訓於無窮也中奉大夫盧襄再叙中大夫庚子右金吾衛上將軍提舉臨安府洞霄宫張楙卒蜀國長公主子也主英宗女適張敦禮嘗為嚮德軍節度使靖康初換授初馬進既敗乃執朝請郎知興國軍李宜之淮南宜遁得免至江州北岸夜宿僧舍宜納衣中有黃金數十兩為主僧所覺遂縊殺之棄其印於江中賊在興國軍幾半年宜能調護之無秋毫擾民感宜之惠為立生祠至是中書始奏宜容留馬進之罪詔罷之而宜已死矣辛丑御筆犒賞諸軍一次范宗尹奏自昨犒後已近五旬上曰朕不欲數犒凡三月可省一次今財用止出東南數十州不免痛加節省若更廣用竭民膏血何以繼之宗尹等曰陛下之言及此天下幸甚熊克小歷上自南渡頗優假衛士每兩月輒一賞賚云云按今年三月一日吕頥浩奏自來養兵之法止是逐月支月糧料錢即無每日支食錢一百文并犒設一次體例昨因自南京扈從南來有司失於謀始遂開此例幾殫國力據此則非自南渡後始有犒設克所云誤也日歷二月十九日丙辰詔行在禁衛諸班直親從親事輦官宿衛親兵神武諸軍三衙軍兵宰執下親兵並令户部依例犒設一次據此則韓世忠等大軍並在其中非止衛士也時政記後殿進呈犒設軍兵御札先是月一犒設自正月至今五十日矣上猶難之據此則克所云每兩月輒一賞賚亦非也自正月至今凡一百一十餘日上三次賞賚故云每三月可省一次若本自兩月二賚而今五旬即給之則半年反增一次矣未知克書鹵莽或傳本差誤也壬寅左武大夫棣州刺史馬欽等並特補舊官聽劉光世使喚欽故遼彰國軍節度使堯俊子也宣和末為常勝軍統領燕山破為金所得用為千户金師既去欽與其徒數十人渡江歸劉光世軍中光世因留以為將癸卯侍從臺諫集議隆祐皇太后諡曰昭慈獻烈後三日詔恭依甲辰上始御正殿用百官三請也江西安撫大使朱勝非奏內侍李肖隨劉紹先出戰功係第二等上曰恐無此理肖安得有戰功毋庸行出懼貽笑四方張守曰不若但以傳宣之勞賞之上曰然癸卯上出大宋中興之寶及上皇所獲元圭以示輔臣寶上新刻者其玉明潤視定命寶猶大半分中書舍人洪擬轉對論帝王之學中叙董仲舒王吉之言末以章句書藝為非帝王之事上曰人欲明道見禮非學問不可惟能務學則知古今治亂成敗與夫君子小人善惡之迹善所當為惡所當戒正心誠意率由於此范宗尹曰人主尤以此為先務因奏仇士良告其徒之言上然之是日忠州防禦使秦鳳經略使吳玠及金人烏嚕珠赫戰于和尚原之北敗之時金主晟之從姪摩哩與烏嚕珠赫以數萬騎分兩道入犯摩哩自鳳翔二將由階成約日㑹和尚原熊克小歷云烏嚕珠赫自階成鳳出散關蓋據王綸王曮撰玠璘碑所云也然階成在散關後不應云出散關當云自階成還趨散關會于和尚原乃可綸曮皆江東人不知蜀口地理克又因之耳玠與其弟統領官武翼郎閣門宣贊舍人璘以散卒數千人駐原上朝問隔絶軍儲匱乏將士家屬往往陷敵人無固志有謀劫玠兄弟北去者幕客陳逺猷夜入告玠遽召諸將勵以忠義㰱血而誓諸將感泣為備益力是日二將以徑騎先期而至陳於原北玠擊之四戰皆捷山谷中路狹而多石馬不能行敵棄馬遂敗去後三日摩哩自犯箭筈關玠遣别將擊之二軍卒不得合又五日敵移寨黃牛嶺㑹大風雨雹翼日引去張浚録其功承制以玠為明州觀察使璘為武德大夫康州團練使賜金帶擢秦鳳路兵馬都鈐轄統制和尚原軍馬趙甡之遺史附此事於五月十四日戊申按今年十月甲申吳玠乞三聖神廟額狀云五月八日金人與官軍拒戰八日癸卯也故係此日丙午故正議大夫何㮚贈觀文殿大學士官子孫七人初殿中侍御史章誼論㮚折衝無謀守禦無策堅請淵聖再幸敵營此陛下父兄之仇而中國招禍之首雖死異域當行追貶望寢贈典以允公議事既行是日甲辰參知政事秦檜力明其死節深為金人所重上曰㮚能如此不可不示激勸但比張叔夜等三人稍損可也故有是命然㮚建炎初已遙除是職今又以為贈官蓋中書失之江東安撫大使司奏捕䖍賊李敦仁獲捷時吕頤浩猶在告參議官李承造以聞上曰頤浩大臣義當體國江西盜賊非張俊未易辦頤浩須少推之如亷藺相濟乃可可趣令視事李回請上親札富直柔又乞遣中使撫問上從之詔承議郎范同宣教郎𠡠令所刪定官劉一止修職郎王洋並召試館職初復故事也既而同以內艱不果試二人皆入等一止所對䇿極言當世之務且曰天下事不克濟者患在不為不患其難聖人不畏多難以因難而圖事爾如其不為而俟天命自回人事自正敵國自屈盜賊自平豈有此理哉上覽之稱善乃以一止為祕書省校書郎洋為正字同江寧人一止歸安人洋資深子也二人除命在六月庚寅今併書之是日真揚鎮撫使郭仲威為劉光世所執初仲威聞敵退乃以其將李懷忠知揚州而自往真州屯駐仲威與李成有舊聞其在九江欲往從之時滁濠鎮撫使劉綱以所部屯建康之雨花臺仲威為所扼不得進復還揚州謀據淮南以通劉豫光世知其反復遣前軍統制王德往捕之宣言遊徼淮上至維揚仲威迎謁于摘星臺德手擒之遂并其衆德以功進秩一等此以趙甡之遺史及光世奏狀參修但遺史載此事於此月又云仲威引兵至建康為劉綱所招劉光世生致之皆誤也按日歷光世奏仲威反狀以五月十六日到得㫖令密切措置而後兩日已奏生擒仲威蓋光世先遣王德行而後奏上也奏中苐云謀與劉豫連和若仲威已渡江光世無緣却不言及今略刪定令不抵牾丁未徽猷閣直學士高衛復為尚書戶部侍郎衛始除鄂州為李允文所拒不得進至是遂召用之戊申臨安府節度推官史祺孫言兩浙撲買坊場一千三百三十四處為净利錢約八十四萬緡今未賣者五百有竒乞募進納補官之家投買從之己酉朝奉大夫胡舜陟起復徽猷閣待制充京畿京西淮南湖北路宣諭使朝奉大夫直祕閣魏志崇升直徽猷閣副之范宗尹素善舜陟以其方持喪故建議遣使諭指京畿而有是命詔以米價貴諭積粟之家出糶三千斛以上補官有差庚戌朝請大夫主管亳州明道宫程瑀直祕閣江南東路提㸃刑獄公事辛亥詔以道路未通諸路死罪囚應奏讞者權令降等斷遣五年正月壬子復奏案登州防禦使郭仲荀權主管殿前司公事自巡幸以來三衙實無兵名存而已朝散郎知䕫州韓迪直徽猷閣先是桑仲犯歸州迪能禦之張浚承㫖除職二等言于朝乃有是命是日邵青以舟師犯太平州初青以樞密院水軍統制屯蕪湖及張俊討李成上令青受俊節制青至池州不得進復還蕪湖就糧守臣郭偉聞之曰邵統制已受命討李成安得還此青怒率衆欲入城城門皆閉青遂擁衆攻城偉竭力拒之壬子湖東安撫向子諲奏孔彥舟犯衡永州詔張俊密行措置癸丑詔斬郭仲威於平江市梟其首先是仲威焚掠平江邦人怨之最甚故就誅之責授祕書少監道州居住黃潜厚許自便甲寅樞密院言劉超賊馬侵犯澧州及鼎澧界有戴進楊靖大假猖蹶訪聞鄰境施黔等州自來各有團結義軍輕捷可用及䕫路兵馬鈐轄田祐恭見統家丁於䕫州把隘欲令湖西帥臣程昌㝢䕫路帥臣韓迪密切相度可否起發令前來湖西共殺賊馬并所用錢糧實封條畫以聞從之祕閣修撰提舉臨安府洞霄宫趙令懬為集英殿修撰知南外宗正事上命令懬往泉南選宗室子育之宫中故有是命詔忠勇統制知泰州張榮已下吏士四千二十九人皆進官用劉光世奏也初吕頤浩之在相位也聞滄州人李齊在海中聚衆乃白上遣使臣董德乘海舟賫詔授齊武翼郎閣門宣贊舍人使收復山東陷沒州郡丙辰船乘風誤泊福島為范溫所得溫以禮待二人且詢問朝廷消息始知上駐蹕㑹稽士皆感泣溫遂遣參軍事李植等三十二人泛舟赴行在且告李齊已順僞齊矣溫農家子初聚衆牢山後守福島其為人無他長惟待人以誠故能得衆焉此據趙甡之遺史及溫申狀參修齊初見建炎四年六月壬申遺史董某無名其至福島亦無月日此據狀修入狀云五月二十一日忽有海舟南來丙辰二十一日也故附此植等八月丁卯至行在吕頤浩遣德亦遺史所云按頤浩以建炎四年四月罷相去此已踰年恐非頤浩在相位所遣今且云爾當考丁巳詔江淮州軍自今有金國南歸之人賫到二聖密詔文檄䗶彈之類未得奉行具奏聽㫖違者重置典憲先是僞造者衆故條約之參知政事秦檜乞以昨任御史中丞致仕日本家奏補兄彬男熺恩澤文字毁抹更用建炎二年大禮恩例補兄彬文資從之熺王㬇孽子也檜娶㬇女弟無子㬇妻鄭居中女怙貴而妬檜在北方出熺以為檜後奏官之至是其家以熺見檜檜甚喜趙甡之遺史云檜陷敵王㬇取王氏子冒姓秦以為檜嗣立名曰熺不云誰之子而王明清揮麈録所載頗詳今從之戊午權工部侍郎兼詳定重修𠡠令韓肖胄言對修政和嘉祐𠡠成復置太府寺丞以承奉郎章億為之措置印給茶鹽鈔引億惇孫也復長二在四年五月沅州言本州自熙寧末為郡始創營田招置弓弩手四千人靖康調發往往不歸今軍食窘急乞以間田募民承佃招補弓弩手二千人餘助歲計從之先是鼎澧辰沅靖諸州以地接蠻猺溪峒故熙豐間排置刀弩手五郡合萬三千人散居邉境教以武藝無事則耕作自贍有警則集而用之最為利便後全軍調發應援河東或死或亡其法浸廢矣紹興六年十二月己未所書可參考朝散郎吕安中言舊官給錢募户長催稅近已差甲頭宜樁其雇錢用助經費諸路提刑司拘收赴行在既而言者以差甲頭不便者五一則小户丁少科差不辦二舊每都保正長少四家今甲頭凡三十家破産者必衆三夏耕秋收一都之內廢農業者凡六十人則通一路有數十萬人不容力穡四甲頭皆耕夫既不熟官府且不能與形勢豪户爭五所差既多爭訴必倍于是甲頭不復差而其户長役錢不復給不差甲頭在今年九月乙巳其户長役錢五年正月壬戌詔分季起赴行在今並聨書之己未手詔降榜式於諸路應州縣因軍期不得已而貸於民者並計所用之多寡度物力之輕重依式開具務令民間通知毋得過數催理違者竄嶺表故朝散大夫畢仲遊贈直徽猷閣以黨籍故也祕書少監程俱言見修日歷乞下諸州搜訪建炎元年以後邸報及所被受朝㫖文字仍于中外臣僚先且取㑹二年事實應曽任宰執至行在職事官有日歷合載事件如政事弛張臣僚黜陟刑賞征戰凡所見聞或私自記録或親承聖語及所上章疏并被受詔𠡠與公案官文書之類並令詣實抄録回報以慿修纂從之庚申翰林學士汪藻上隆祐皇太后諡議福建制置使辛企宗奏順昌盜余勝就招若不補授名目稍高慮致滋蔓已補勝修武郎從之是日孔彥舟自衡山引舟而下過潭州權湖南招捉公事馬友以舟師迎擊之彥舟大敗遂趨嶽州州官吏遁去一城皆空彥舟無所掠進犯鄂州時鄂方大饑米㪷三千五百民多餓死彥舟括軍中米糶於市㪷直二千鄂人皆稱揚彥舟之惠安撫使李允文遣人招彥舟彥舟聽命遂以湖東副總管屯漢陽趙甡之遺史繫此事於四月末按日歷七月一日潭州申彥舟五月二十五日敗於潭州庚申二十五日也故係於此日朝廷聞彥舟尚在衡永間詔張俊就便措置始俊欲乘勝渡江而軍中糧乏遂屯軍九江四十餘日然後北行詔江東西及隨軍三漕臣協力應副辛酉給事中陳戬充寶文閣待制知處州戩嘗上疏論五失一謂宰執尚寬厚示大體而務姑息二謂寵任將臣輕授之柄遂便邀賞示恩至謂本兵大臣出其門下三謂臺諫觀望朝廷交結權幸毛舉細務以塞責四謂監司郡守身自犯法豈能律姦五謂內侍之權漸盛交結將帥恐臨安之變生于不測上奬其言至是又論諸將造政事堂與大臣狎紊亂朝綱恐緩急不可用於是樞臣上章待罪諸將亦不自安戩因力求去乃有是命戩所言蓋指辛企宗富直柔黎確馮益等也翰林學士汪藻言本院出入經由隆祐殿􅓖宫門工役不便乞權就本家供職從之荆南鎮撫使解潜言所管五州絶户及官田荒廢者甚多已便宜辟直祕閣宗綱權屯田使中奉大夫樊賔權副使募人使耕分收子利詔以綱為鎮撫司措置營田官賔為同措置官渡江後營田自此始其後荆州軍食多仰給于營田省縣官之半焉綱嘗為湖北轉運判官官省而罷遂為潜所辟賔河中人也壬戌范宗尹等以國用不足奏鬻通直修武郎已下官上曰不至人議論否張守曰祖宗時嘗亦有此第止是齊郎李回曰此猶愈于科斂百姓上曰然大凡施設須可行於今可傳于後即善耳宗尹乃退其後遂止鬻承直郎已下官餘見六月己巳是日邵青受劉光世招安太平州圍解初青既薄城下與其徒單德忠閻在等分寨四郊開畎河水盡淹墟岸以斷援兵來路調民伐木為慢道怠緩者殺而并築之一日之間與城相平賊攻具畢施遂縱火焚樓櫓刳孕婦取胎以卜吉凶敵樓為炮所壞守臣郭偉運土實之賊不能近偉方食於城上青以炮擊其案又以矢斃其侍吏偉亦不顧相持凡九日偉募死士乘夜下城因風焚其慢道又二日决姑溪水以灌其營青窮蹙㑹光世遣使來招安翼日青遂去初青之參議官魏曦多智偉憚之乃為書以響箭射于城外已而曦力勸青就招青怒殺曦人皆謂偉用間言青信之也此據趙甡之遺史參修曦勸青就招據劉光世所奏云爾然光世所奏乃以為青解圍後至建康道中殺曦今且附此俟考癸亥詔滁濠鎮撫使劉綱所部中軍牙兵等六千餘人並令神武中軍統制辛永宗遣將官統押赴行在用綱請也綱受命踰年卒不之鎮於是左軍統制王惟忠等以所部土人數千渡江北去綱所將者獨淮北數千人而已始綱既不能渡江盜王才因據濠之橫澗山為寨縱兵剽掠殺權知滁州梅迪俊綱即以權清流縣丞張格非代知滁州格非濮州人也時羣盜縱橫格非以數十舟依山險避之往來城中而已才以王命阻隔乃以其衆附僞齊用阜昌年號而亦受招安為閣門宣贊舍人然出沒如故武翼大夫忠州刺史閣門宣贊舍人趙延夀特遷武經大夫營州團練使充江南東路兵馬都監延夀自湖北渡江遂據分寧縣江東安撫大使吕頤浩遣鄉貢進士李丕等諭降之頤浩選其軍得精鋭五千餘人分𨽻統制官巨師古閻臯姚瑞王進傅選等九軍言於朝故有是命延夀之赴鄱陽也頤浩令朝請郎分寧縣丞逄汝霖隨軍濟其芻粟至是授丕忠州文學而汝霖遷一官汝霖掖縣人也按宋史繫壬戍日朝議大夫俞賙卒賙錢塘人宣政間以應奉故屢為部使者靖康初乃廢是月婺源尉方疇上疏極論宰相范宗尹過失不報疇弋陽人也僞齊知同州李成冦升平寨保義郎統領蒲城縣忠義軍馬井全與戰為所殺初馬進既為江淮招討使張俊所敗而李成猶在蘄州至是俊引兵渡江至黃梅縣親與成戰成據石幢坡慿山以木石投人俊乃先遣遊卒進退若爭險狀以誤之俊率衆攻險賊徙奔潰進為追兵所殺林泉野記張俊傳云俊追成至蘄州羅田山成遂殺馬進降于劉豫與此不同當考成遁去以餘衆降僞齊俊敗李成於蘄州未見本日按俊所奏云自三月二十八日收復江州為糧食匱乏坐食四十餘日旦夕渡江北去則其行必在五月半間也俊又奏六月十八日已至丁家店則其敗李成當在五六月之間今參酌附此月末建炎以來繫年要録卷四十四建炎以來繫年要録卷四十四金人地名考證烏嚕原書作烏魯誤今改正珠赫原書作折合誤改見卷三十七摩哩原書作沒立卷一百九十三又作毛里並誤今改正
