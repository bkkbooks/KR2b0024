body:
  text: 建炎以來繫年要録卷一百九宋李心𫝊撰紹興七年二月癸巳朔百官七上表請遵易月之制詔外朝勉從所請其三年之喪人子所以自盡者朕悉于宫中行之丙申夜太平州火丁酉鎮江府火日厯太平州申二月初五日在城火起而李致虛家陳狀稱二月四日城內遺火所云不同按本州所申又云上丁釋奠知通致齊則是初四日夜火也先是僞齊劉豫遣姦細縱火于淮甸及沿江諸州于是山陽儀真廣陵京口當塗皆被其害淮西宣撫使劉光世軍于當塗郡治其府被焚軍須帑藏一夕而盡太平州録事𠫭軍吕應中當塗丞李致虛􅊖以燔死致虛時攝縣事後求得其尸尚握縣印事聞詔鎮江府太平州各給米二千石賑民之貧乏者應中致虛皆官其家一人焉二郡賜米在是月甲辰應中與恩澤在己酉致虛與恩澤在三月丙寅己亥小祥百官拜表請聼政許之庚子上始御几筵殿西廡之素幄召輔臣奏事張浚見上深陳國家禍難涕泣不䏻興因乞降詔諭中外詔曰朕以不敏不眀託于士民之上勉求治道思濟多艱而上帝降罰禍延于我有家天地崩裂諱問逺至嗚呼朕負終身之戚懷無窮之恨凡我臣庶尚忍聞之乎今朕所賴以宏濟大業在兵與民惟爾小大文武之臣早夜孜孜思所以治詔巡幸建康可令有司擇日進發右文殿修撰主管台州崇道觀王倫為徽猷閣待制充奉使大金國迎奉梓宫使武節郎閣門宣贊舍人髙公繪為武經大夫逹州刺史副之賜裝錢如前數仍加賜銀帛各二百兩匹二月丙午降旨支賜熊克小厯于四月丁酉始書詔倫等奉迎梓宫乃朝辭之日也命內侍撫問劉光世韓世忠吳玠楊沂中仍賜銀合茶藥起復湖北京西宣撫副使嶽飛以親兵赴行在翌日內殿引對飛密奏請正建國公皇子之位人無知者及對風動紙搖飛聲戰不䏻句上諭曰卿言雖忠然握重兵于外此事非卿所當預也飛色落而退𠫭謀官薛弼繼進上語之故且曰飛意似不悅卿自以意開諭之此以熊克小厯張戒默記及薛季宣所録𠫭修默記又曰薛弼以甲子正月道由建康謂戒曰弼之免于禍天也往者丁巳嵗被旨從鵬舉入覲與鵬舉遇于九江之舟中鵬舉說曰某此行將陳大計弼請之鵬舉云近諜報敵人以丙午元子入京闕為朝廷計莫若正資宗名則敵謀沮矣弼不敢應扺建康與弼同日對鵬舉苐一班弼次之鵬舉下殿面如死灰弼造膝上曰飛適奏乞正資宗之名朕諭以卿雖忠然握重兵于外此事非卿所當與也弼曰臣雖在其幕中然不與聞昨到九江但見飛習小楷况密奏皆飛自書耳上曰飛意似不恱卿自以意開諭之弼受旨而退嗟夫鵬舉為大將而越職及此其取死宜哉弼又云不知若箇書生教之耳鵬舉飛字也但克記此事繫于今年四月丁未飛求解師事時則恐誤飛與弼此時同入對四月間未嘗冉至行在也日厯二月庚子勘㑹嶽飛已到行在奉聖旨令入內內侍省引對自後更無對班而當月二十八日乙卯降出弼劄子乞為靖康以來死節之臣立廟故知弼與飛繼對在此日也飛三月乙亥已朝辭弼三月丙子除京西帥替張旦過滿闕便當赴任安得四月半間尚與飛對乎克考不詳是以差誤然亦以日厯不載內引之故難以稽考須反覆𠫭究乃見本末耳餘見今年四月丁未并注辛丑吏部尚書孫近率從官同班入見詔以太陽有異氛氣四合令中外侍從各舉䏻直言極諌之士一人自復賢良方正科久未有應者至是張浚乞因災異降詔上從之賜修武郎朱辨家湖州田五頃辨初副王倫非使十年未歸倫為之請于是詔諸郡存恤奉使未還魏行可郭元邁建炎二年十一月洪皓龔璹建炎三年五月崔縱郭元眀建炎三年七月杜時亮宋汝為建炎三年七月張邵楊憲建炎三年九月孫悟卜世臣建炎三年十一月家屬各賜錢三百緡詔監司郡守應朝辭上殿人竝權免願伺候御殿者聼壬寅行宫太常寺言按此時少卿樓照博士黃積厚隨行在所謂行宫太常寺乃丞華權博士陳康伯也仲春薦獻諸陵乞依乾興故事行事官權易吉服內祀祭天地及諸大祠亦乞依時日排辦從之先是有旨未祔廟前停宗廟祭享及中小祠故禮官以為請左承事郎知汀州長汀縣嚴褒特遷一官以父老言其政績且親統民兵捍禦盜賊保護州城故也故通仕郎致仕周永徽特贈宣教郎永徽嘉州人元符末應詔上書入邪上尤甚籍奪官羈管故録之是夜雷聲初發癸卯參知政事張守言姪女適秦檜之兄今檜除樞密使雖無回避之法而同在政府不䏻無嫌欲望除臣一在外差遣詔祖宗故事不合回避毋得再請起復親衛大夫利州觀察使沿海制置副使馬擴知鼎州命樞密院計議官李寀往江淮詢究營田利害先是司農少卿樊賔等措置營田才朞嵗議者以為奉行峻急抑配豪户或强科保正田瘠難耕多收子利民間類有鬻已牛以養官牛耕已田以償官租者而為營田者之言則謂去嵗所用本錢二十三萬緡嵗中收雜色斛斗共三十一萬石除客户六分并知通令尉職田五釐外官實收十一萬餘石已粗償所費矣惟是州縣殘破户口凋零募民開荒最為難事非嵗月間可望成功而州縣奉行之初不無違戾又形勢之家詭請冒佃見官莊不利于已遂百端鼓唱意在沮壞良法美意欲望朝廷假以數嵗之期勿責近效庶幾有補仍乞選忠厚彊眀官一二員分詣諸處詢究利害檢察官吏其措置有方奉行違戾即乞依元旨賞罰或有不便于民即與本處官吏商量隨宜措置疏奏遂命宷行如有未便于民者令宷與樊賔王弗商量先次改正夜大雪甲辰輔臣奏事上曰朕常日不甚御肉多食蔬菜近日頗雜以豆腐為羹亦可食也水陸之珍竝陳于前不過一飽何所復求過殺生命誠為不仁朕實不忍沈與求曰陛下舉斯心以加諸彼天下不難治矣先是太陽有異張浚奏曰臣以非才備位宰相致天象如此罪無所逃上曰此乃朕不德所致浚因引咎上曰應天以實不以文惟君臣交修不逮可以消變浚曰臣等敢不恭承大訓命𠫭知政事陳與義撰諡冊文張守書同知樞密院事沈與求篆諡寶右司員外郎川陕宣諭范直方乞金字牌旗榜二副所過緩急招收盜賊許之因命直方與都轉運使李逮措置市馬赴行在尋賜直方三品服遣行直方賜章服在是月戊申皇叔象州防禦使士街為華州觀察使以積閥遷也承節郎都督府帳前凖備差使范寧之特遷忠翊郎閣門祗候乙巳臺諌官周祕石公揆陳公輔王縉趙渙同班入對惠州羈管人劉相如移雷州相如以書遺廣東經略安撫使連南夫首引漢髙祖不斬韓信唐神堯不斬李靖事又云聖人作而萬物覩未見聖人之作南夫械繫之以聞故有是命武經大夫逹州刺史閣門宣贊舍人髙公繪自言本右學諸生嘗鎖㕔得文解乞以奉使轉官恩例換文資詔特換右朝請郎仍假左武大夫忠州防禦使充國信副使丙午詔內中祖宗神御殿俟權制畢遇節序等酌獻如舊川陕宣撫副使吳玠初置銀㑹子于河池一錢銀十四萬紙四紙折錢引一千半錢銀七萬紙八紙亦如之迄今不改玠元額四萬七千五百緡行于魚闕及階成岷鳳秦等州嵗一易十七年七月總領所復造于大安軍冉嵗一易乾道四年四月增印一錢銀三萬紙今總印一錢銀二十三萬紙半錢銀三十六萬紙共折錢引十萬緡徽猷閣待制提舉江州太平觀方孟卿卒丁未詔堂除知縣竝借緋章服供給依簽判例任滿赴都堂審察其有治狀者甄擢之即治行顯者監司列薦當不次除擢通侍大夫華州觀察使知思州兼䕫州路兵馬鈐轄田祐恭令再任仍賜金帶及𠡠書奬諭先是祐恭言得溪州報有兵萬餘自鼎澧州來聲言欲入川界四川制置大使席益以聞詔益遣人伺其實故褒録之尚書禮部侍郎兼都督府參議軍事邵溥充徽猷閣待制知衡州溥乞在外宫觀且言已終喪制見起發沿路聼旨張浚進呈乃有是命溥尋乞蜀郡改知眉州左朝奉郎新知峽州吳樵特轉一官折彥質之守潭也樵知湘隂縣彥質奏樵招納田眀一行人兵田明未見乞量加旌賞至是檢舉行之日厯紹興五年六月辛未都督行府關左承議郎知湘隂縣吳樵已轉行兩官奉聖旨依七年二月戊申又書折彥質奏左朝奉郎知湘隂縣吳樵有旨轉一官前後不同當考戊申詔韶州故工部尚書余靖祠堂載在祀典春秋祭享以州人言靖有平蠻之功也己酉上與輔臣論兵器因曰前日嶽飛入對朕問有良馬否飛奏舊有兩馬已而亡之今所乘不過馳百餘里力便乏此乃未識馬故也大抵馴而易乘者乃駑馬故不耐騎而易乏若就鞍之初不可制御此乃馬之逸羣者馳驟既逺則馬力始生張浚曰人材亦猶是也但當駕御用之耳上曰人材若只取庸常易恱者何以濟天下之事浚曰既知其可用則當不責近效以待有成茍為不然則其材終無以自見上又曰飛今見之所進論議皆可取朕當諭之國家禍變非常唯賴將相協力以圖大業不可時時規取小利遂以奏功徒費朝廷爵賞須各任方面之責期于恢復中原乃副朕委寄之意昨張俊來覲亦以此戒之詔自今大理評事闕本寺以試中刑法苐二等以上年未六十無贓私罪人關吏部仍令刑寺長二共赴吏部長二㕔審驗差注如無應格人竝申朝廷選差日厯無此今以紹興九年九月二十七日臣僚劄子修入庚戌吏部尚書孫近等請諡大行太上皇帝曰聖文仁德顯孝廟號徽宗于是監察御史已上先集議而後讀諡于南郊用翰林學士朱震給事中直學士院胡世將請也自是遂為故事觀文殿大學士江西制置大使兼知洪州李綱聞諌官陳公輔以伏闕事求去上疏乞奉祠優詔不許辛亥大祥詔俟至建康日奉安太廟神主于天慶觀天章閣神御于法寶寺故中散大夫魏彥眀特贈中大夫官其子先是其家以彥眀死事延安事見建炎二年十一月乞優恤事下四川制置大使司究實而莫有知者左朝奉郎通判鳳州郭奕嘗為鄜延經略司幹辦公事具狀力言其忠乃有是命癸丑禫祭先是几筵朝夕上食各五十品自是减為三十權户部侍郎王俁申眀常平廢弛事件乞令諸路主管官檢舉約束一拘籍户絶投納抵當財産及所收租課二封樁義倉斛㪷三出賣坊場河渡四樁收免役寬剩錢五立限召人陳首侵欺冒佃常平田産六根括贍學田租課已上窠名錢物自去年正月已後州縣侵支之數竝立限撥還自今毋得擅用從之左朝散大夫提舉廣南市舶林保進中興龜鑑詔賜三品服其書令進入日厯無保階銜今年九月二十七日保以上件官職朝見是日雨雹甲寅改諡寧德皇后曰顯肅建康軍節度推官杜臨等竝循一資以本府言勸誘大姓買官告錢三十萬緡了足故也自是率如此例三月庚寅季州四縣勸誘大姓買官告四十三萬緡四縣知令各减二年磨勘乙卯百官三上表請御殿聼政許之直徽猷閣湖北京西宣撫副使司𠫭謀官薛弼請褒靖康以來盡節死難之臣詔州郡于通衢建立廟廷揭以褒忠之名旦望致酒脯之奠春秋修典禮之祀使忠義之節血食無窮詔樞密院三省賞功房開具自靖康元年後來不以大小文武吏士應緣忠義死節之人姓名取旨丙辰上始御便殿素仗在庭上服淺黃袍黑銀帶望之若純素羣臣莫不感動先是左司諫陳公輔嘗論視朝當服淺黃上納用焉此據今年九月癸酉公輔所奏修入直祕閣知果州宇文彬降一官放罷去嵗果州旱守臣王隲率民出粟賑貸㑹隲滿嵗彬代之乃與通判州事龎信孺繪禾登九穗圖獻于朝吏部侍郎兼權行宫禮部侍郎晏敦復言去年四川饑饉米㪷價錢三千細民艱食流為饑殍者十室而五隲等以勸富户醵米賑濟朝廷嘗與推賞則蜀民疾苦朝廷固已盡知今知通與隲相繼到官目擊其事乃繪禾登九穗圖號為瑞應萬里遣人投進茍置而不問則逺方觀望意謂朝廷甘受纎人諛佞百姓疾苦無由上逹其于治體為害不細臣等職在禮部茍有所見不敢緘默三省擬各降一官上曰此不出誕謾即諂諛爾去年四川荒旱黎民艱食安有瑞禾正使偶然有之何足為瑞往年知撫州髙衛進甘露圖朕疾其佞罷其守符彬等可降官仍放罷秦檜曰如此行遣足使四方知陛下好惡矣彬成都人也丁巳起復檢校少保武勝定國軍節度使湖北京西宣撫副使嶽飛為太尉賞商虢之功也翌日升宣撫使飛威名日著淮西宣撫使張俊益忌之𠫭謀官薛弼每勸飛調護而幕中之輕鋭者復教飛勿苦降意于是飛與俊隙始深矣飛時留行在未去遂衛上如建康起居郎張燾試中書舍人趣尹焞赴行在用張浚請也詔祕閣修撰知建州魏矼治狀有聞令再任武功大夫忠州團練使知黃州杜湛降一官放罷初湛與通判州事葉介不協介率其僚七人走鄂州訴湛語言不順朝廷聞之命嶽飛究實飛奏湛忠勞今來止是語言疑似别無跡狀乃兩罷之介乃鎸二秩衢州進士毛夢符毛歸各上書論事詔賜帛二十匹是日徽猷閣待制王倫閣門祇候何蘚皆引對以使事也己未上發平江府以舟載徽宗皇帝顯肅皇后几筵而行將發召守臣章誼升舟奏事上每旦乘輦詣几筵前焚香宿頓亦如之庚申上次常州泊荆溪堂淮西宣撫使劉光世乞在外宫觀先是議者謂光世昨退保當塗幾誤大事俊雖有功可以贖過不宜仍握兵柄又言其軍律不整士卒恣橫張浚自淮上歸亦言光世沉酣酒色不恤國事語以恢復意氣拂然乞賜罷斥以警將帥上然之光世聞上進發乃引疾乞祠是日奏至上曰光世軍比之韓世忠張俊之軍訓練殊不至一軍皆驍鋭但主將不勤耳月費錢米不資皆出民之膏血而不䏻訓練使之赴功甚可惜也大抵將帥不可驕惰若日沉迷于酒色之中何以率三軍之士趙鼎事實云駕至建康當軸者以光世不足仗遣其腹心吕祉誘脅之俾請宫祠罷兵柄欲以此兵付嶽飛為北向之舉按此又與秀水録所云張浚捃托嶽飛之說不同後三日乃以親筆答光世曰卿忠貫神眀功存社稷朕方倚賴以濟多艱俟至建康召卿奏事其餘曲折併俟面言時上賜諸將詔書往往命浚擬進未嘗易一字此據朱熹所撰張浚行狀平江府進士張亨衢進厯代中興論給事中胡世將看詳言亨衢所論若少康之得民髙宗之任相周宣之自治漢宣之待外國光武之任智勇晉元之遷都肅宗之仁孝憲宗之果斷其說有可取然于晉元帝乃取其遷都則非也上讀至是曰肅宗以張后李輔國之故不䏻盡子道于眀皇可以謂之仁孝乎武德郎閣門宣贊舍人湖北京西宣撫使司書寫機宜文字嶽雲為武德大夫飛再辭不受辛酉上次常州賜無錫知縣李德鄰五品服初上引德鄰入對問以民間疾苦德鄰論民户避役田土􅊖歸兼并之家近旨雖令單丁女户募人充役然每都不得過一名欲望增為五人俾得均濟詔付户部上以德鄰留心民事故有是賜焉壬戌上次吕城閘三月癸亥朔上次丹陽縣京東宣撫處置使韓世忠以親兵赴行在遂衛上如建康甲子上次鎮江府權主管殿前司公事楊沂中以所部赴行在詔沂中總領彈壓車駕巡幸一行事務拱衛大夫和州防禦使湖北京西宣撫司都統制王貴落階官為棣州防禦使龍神衛四廂都指揮使賞功也統制官中侍大夫武泰軍承宣使牛臯亦落階官為建州觀察使乙丑詔駐蹕及經由州縣見缺紹興五年以前稅賦竝與除放丁卯尚書吏部侍郎吕祉試兵部尚書升兼都督府𠫭謀軍事顯謨閣直學士梁汝嘉試户部侍郎仍兼巡幸都轉運使權户部侍郎劉寧止權吏部侍郎己巳上發鎮江府乘馬而行晚次下蜀鎮上謂張浚等曰道中晴眀因閲韓世忠背嵬軍馬極驍健事藝比往日益更精彊浚等因論奏諸將才䏻不同大要在得士心則人肯用命上曰天時地利不如人和將帥䏻得士心則上下和輯樂為之用矣庚午上進發道中望几筵輿輦在前恐趣行頓撼駐馬久之晚宿東陽鎮辛未上次建康府賜百司休沐三日時行宫皆因張浚所修之舊寢殿之後庖圊皆無上既駐蹕加葺小屋數間為燕居及宫人寢處之地地無磚面室無丹雘壬申詔軍旅方興庶務日繁若悉從相臣省决即于軍事相妨可除中書門下省依舊外其尚書省常程事權從𠫭知政事分治合行事令張浚條具取旨浚奏欲張守治吏禮兵房陳與義治户刑工房如已得旨合出告命𠡠劄與合關內外官司及緊切批狀堂劄臣依舊書押外餘令𠫭知政事通書從之浚條具在是月乙亥癸酉祕閣修撰知建康府葉宗諤率在府文武官入見輔臣奏事畢率百官詣几筵殿㷊香手詔降建康府流罪已下囚及鬭殺情輕者釋杖已下建康府太平宣州紹興五年以前稅賦及五等户今年身丁錢竝放又免建康府五等户科敷一年太平宣州半年甲戍遣內侍往軍前勞問江東宣撫使張俊仍賜銀合茶藥時俊軍士兼家戌盱眙尚未至也乙亥中書言湖北京西宣撫使嶽飛已朝辭所降立功將佐告命乞免進入詔趣行給付時中原遺民有自汴京來者言劉豫自猊麟敗後意沮氣喪其黨與皆携二金國謂豫必不䏻立國而民心日望王師之來朝廷因是遂謀北伐飛謂豫不足平要當以十萬衆橫截金境使敵不䏻援勢孤自敗則中原可復張浚不以為然㑹劉光世乞奉祠飛乃見上請由商虢取關陕欲併統淮右之兵而行上問何時可畢飛言期以三年上曰朕駐蹕于此以淮甸為屏蔽若輟淮甸之兵便䏻平定中原朕亦何惜苐恐中原未復而淮甸失守則行朝未得奠枕而卧也飛無以對飛朝辭不見本日今因中書所奏附此當即是其辭日也奏乞取陕右等語見日厯今年四月丁未丙子鎮南軍節度使開府儀同三司新知臨安府吕頥浩入見初頥浩至平江欲勸上輟行而不得見乃隨上西來至是引對言者論其罪上不聽撫諭久之熊克小厯載吕頥浩見上在駐蹕建康之前又稱行宫留守皆小誤頥浩除留守在是月辛巳召徽猷閣待制提舉江州太平觀胡安國赴行在時安國上所纂春秋傳翰林學士朱震乞降詔嘉奬上曰安國眀于春秋之學比諸儒所得尤邃向來偶緣留程瑀而出可令召來張浚曰若安國乃君子之過過于厚耳小人必須觀望求合豈肯咈旨上曰安國豈得為小人俟其來當置之講筵故有是命仍用金字遞行安國自言所著傳事按左氏義取公羊穀梁之精者大綱本孟子而微辭多以程氏之說為據凡三十年乃成上甚重之其書今行于世直徽猷閣湖北京西宣撫使司𠫭謀官薛弼升直寶文閣知襄陽府前旬日詔弼兼都督行府隨軍轉運副使至是改授弼兼隨軍運副在是月乙丑直寶文閣知鼎州張觷升直龍圖閣知處州先是山冦周十隆等未平直徽猷閣孫佑以選為守佑至官未幾言隨宜討蕩了當詔書嘉奬正月乙酉俄又言賊大猖獗乞統制官李貴以所部措置江西制置大使李綱亦言佑為謀不密漏泄事機致令諸盜反側且薦觷材術正可任此朝廷以為然遂命觷代佑佑七月癸亥行遣賜都督府摧鋒軍統制韓京金束帶戰袍銀笴槍先是䖍冦劉宣犯梅州京引所部解圍遂至惠州之河源討軍賊曽衮衮挺身出降故有是賜八月丁未帥臣連南夫轉官僞成忠郎閣門祇候李清詣嶽飛降詔補正仍進二官丁丑宰臣率文武百寮遙拜淵聖皇帝畢詣常御殿門進名奉慰自是未祔廟皆如之戊寅手詔撫勞將士同知樞密院事沈與求進知院事詔敦武郎閣門祇候劉光時特與換文資忠翊郎閣門祇候丁祀為江南東路兵馬都監祀初為劉光世部曲至是離軍詔江浙福建五分禁軍弓弩手竝揀少壯武藝髙彊人一半赴都督府教習既而浙東制置大使趙鼎言本路將兵約六千五百餘人半習弓弩于內摘其半起發計一千六百餘人而已朝廷得此千餘懦怯南兵不足為用而一路之間千百人內摘去强壯百數則其餘益不堪矣况本路兼備海道與其他路分不同望賜存留詔鼎依數遣赴殿前司教閲俟防秋月分遣兵往眀州屯駐鼎奏下在四月丁未己卯尊宣和皇后為皇太后先是上諭輔臣曰宣和皇后春秋已髙朕朝夕思之不遑安處翰林學士朱震乃奏引唐建中故事乞遙上寶册且言陛下雖從權宜而退朝有髙世之行謂宜供張別殿遣三公奉冊以伸臣子之志册藏有司恭俟來歸詔禮官條具太常少卿吳表臣請依嘉祐治平故事俟三年禮畢檢舉施行乃先降御札播告中外焉上諭輔臣在癸酉震奏下在戊寅太常奏下在庚辰今並聫書之都省言尹焞已過鄂州詔所至州軍守臣以禮敦遣武功郎閣門宣贊舍人知夀春府孫暉進一官令再任暉守南夀春凡六年庚辰上諭輔臣曰欽慈皇后寧德皇后近屬多流寓南方者可令所在訪尋推恩皇太后本家合得恩數亦令有司以次施行起復龍神衛四廂都指揮使降授雄州防禦使行營前護副軍都統制王彥復洪州觀察使知邵州解潜既罷彥亦不自安因乞持餘服故有是命彥入辭上撫勞甚厚曰以卿能牧民故付卿便郡行即召矣將行又錫以金帶詔彥軍併𨽻權主管馬軍司公事劉錡于是錡始䏻成軍彥入辭在四月乙未右朝請郎陶愷知吉州左朝散郎劉長源知眉州二人初以言紹述責監當至是竝復之武功大夫辰州刺史兼閣門宣贊舍人于鵬令後省策試降等換文資用嶽飛薦也眀年二月庚辰換右朝散大夫辛巳鎮南軍節度使開府儀同三司新兩浙西路安撫制置大使兼知臨安府吕頥浩為少保兼行宫留守頥浩不稱判府事失之也先是潭州學廢頥浩出羡錢五千緡付學官葺治州東之二十里因諸山之泉築堤儲水曰龜塘溉田萬餘頃嵗久堙廢頥浩募饑民補築之至是請帥臣劉洪道續其事上皆許焉頥浩浹旬間三入對比至臨安處事甚有緒豪右莫敢犯禁時已命百司漸赴行在所謂留守司名存而已朱勝非秀水間居録吕相頥浩喜酒色侍妾十餘夜必縱飲前户部侍郎韓梠家畜三妾俱有殊色名聞一時梠死諸大將厚賂取之吕力爭用數千緡得一人焉號三孺人大寵嬖之初則専其家政既而吕為留守兼判臨安權勢甚盛三孺人者遂預外事公然交通韓氏中外因以媒進時吕六十七嵗召觀文殿學士提舉萬夀觀兼侍讀行宫留守孟庾赴行在庾在臨安軍士嘗有為飛書怖之者庾因盛陳兵自衛浙江竝海漁火夜眀庾以為冦至大驚一城震恐事聞故罷去尋命庾知婺州孟庾罷留守日厯全不載趙甡之遣史云以吕頥浩為留守而召孟庾回今從之日厯九月二日辛酉直龍圖閣周網知婺州在任差孟庾替罷回朝見不知庾以何日除也尚書吏部員外郎辛次膺為荆湖北路轉運判官左通直郎都督府幹辦公事張斛知桂楊監前此歸正官未有典郡者故著之壬午武功大夫忠州團練使閣門宣贊舍人范溫添差兩浙東路兵馬鈐轄依舊鎮江府統轄人兵癸未中書奏銓量監司守二資格應監司知州見帶職名及嘗任館職若監察御史以上通判曽任職事官及得旨升擢人竝更不銓量其餘通判資序人任監司節鎮知州次任知縣資序人任知州軍通判竝依舊其不應逐項資格及嘗犯贓罪笞私罪徒與贓罪論列停替人並罷願就宫觀者聽先是有詔中書後省御史臺銓量監司守二而中書言未有立定資格故申眀焉事祖見去年十二月丙午甲申少保護國鎮安保靜軍節度使淮南西路兼太平州宣撫使劉光世為少保仍三鎮舊節充萬夀觀使奉朝請封榮國公時光世入見再乞罷軍且以所管金穀百萬獻于朝乃以其兵屬都督府而有是命張浚因分光世所部為六軍令聽本府𠫭謀軍事吕祉節制詔行在職事官令轉對一次乙酉賜劉光世府第一區給親兵三百人右朝請大夫韓璡直祕閣璡為劉光世𠫭謀官隨府罷用光世請而命之丙戌左文林郎林獻材令吏部與先次占射差遣一次獻材為海豐令以宣諭官薦對故有是命自是選人引對之恩殺矣丁亥通侍大夫武康軍承宣使行營左護軍前軍統制王德落階官為相州觀察使劉光世既罷軍都督府以德提舉訓練諸將軍馬故優擢焉故勒停人王毅追復承議郎毅倫父也宣和間坐論蔡京罪謫死嶺表至是倫訴于朝上謂大臣曰倫萬里逺使宜與施行上因言靖康中耿南仲用事每遣使出疆必降旨有免行者當以軍法從事既行雖身分請給往往不支其家至有狼狽失所者比使還則合得恩澤亦例從鐫减如此何以使人張浚曰南仲誤國何止此事戊子故武功大夫榮州團練使郝中正特贈翊衛大夫中正宣和末守涇州城陷死張浚在陕西承制贈官五等至是賜告焉己丑禮部太常寺言今嵗當行大禮而郊天法物未備國朝故事仁宗皇祐五年南郊嘉祐元年恭謝四年祫祭七年眀堂蓋嘗踰九年而不再郊將來大禮請合祭天地于眀堂祖宗並配兼祀百神于禮為便詔行眀堂大禮令有司條具以聞此時太常少卿乃吳表臣而禮部侍郎闕未知何人兼權左承議郎通判彭州施庭臣為祕書省校書郎庭臣成都人也祕閣修撰知建康府葉宗諤直祕閣江南東路提㸃刑獄公事韓膺胄並引對初命宗諤營治行宫至是官府營栅皆備上嘉其勞錫以鞍馬焉此據武陽志附入寶文閣直學士提舉萬夀觀趙子櫟卒庚寅詔京西帥臣薛弼措置荆襄屯田時已賜錢五萬緡為營田本又市蜀牛三千賦之言者謂凡兵火所過地廣人稀皆可徙新附之民授以遺地故以命弼僞武義郎監盧氏縣酒稅楊茂特補正嶽飛之出師也茂挺身歸附故録之翰林醫診俞哲押歸本貫哲三詣匭上書尚書省言哲所陳皆告訐事故有是命仍令尚書省榜諭哲嶽州人也是春廣西大饑㪷米千錢人多餓死桃李互實李實變成桃皆可食凡物多類此此據蔡絛叢談金左副元帥魯國王昌居祁州右副元帥瀋王宗弼自黎陽歸燕山左監軍薩里罕居雲中以前知相州杜充為燕京三司使尚書左丞髙慶裔以贓下大理寺建炎以來繫年要録卷一百九建炎以來繫年要録卷一百九金人地名考證薩里罕原書作撒離喝誤改見卷十一
