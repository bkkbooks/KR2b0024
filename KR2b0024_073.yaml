body:
  text: 建炎以來繫年要録卷七十三宋李心傳撰紹興四年二月辛巳朔張浚至潭州時鼎寇楊么既為官軍所敗其黨漸散賊防之甚嚴鄰居失覺者其罪死間有得達官地保甲又利其財而殺之知鼎州程昌宇乃募人能引降者與獲級同故降者稍衆浚至遂留左朝散郎權樞密院計議官馮楫為荆湖撫諭俾同安撫使折彥質措置招安會嶽州進士王朝倚在賊寨脫歸自言知賊虛實詔赴都堂審問後數日有旨令王􅊛與彥質招安然賊方恃水出沒其所據北達公安西及鼎澧東至嶽陽南抵長沙之界春夏耕耘秋冬攻掠跳梁自如未有降意也王朝倚審問在乙酉詔王􅊛等招安在丙戌詔南班宗室自今並赴臺參故事宗室遷官或赴或否至是用御史常同言著為令壬午廣東西漕臣各貶秩一等坐違欠去年上供皆十分之四故也詔贓罪至死者方籍其資先是右文林郎朱崔璵監處州都酒務坐贓流郡籍其資而田宅不在數審於朝法寺言産業俱合入官然祖宗故事謂犯贓貸配之人乃命申明行下户部奏令廣東提舉司支鹽本錢二十萬緡常平錢五萬緡由海道赴行在為大禮費從之癸未參知政事席益充資政殿學士提舉江州太平觀先是諫官劉大中既奏其罪前一日殿中侍御史常同入對論益本盧把之姦邪兼逢吉之險譎初為王黼之客後入蔡京之門陛下略其宿愆欲觀後效去嵗議遣大臣使金益獨以母老為辭近者金使對揚榻前默無一言之助輔臣若此將焉用之至于心術不端力庇邪佞中傷善類隂奪相權蓋天資險薄可畏如此望速賜罷黜以慰公論輔臣進呈上曰諫官御史所言臣僚過惡未必皆實然易曰大君有命開國承家小人勿用既審知其小人自當退之也故益遂罷按此日上語為席益設熊克小歷既不書所以又併益罷政亦復不書不知何故大中章再上後二日詔益落職奉祠詔自今諸路州縣進奉天申節禮物並置場和買毋得于民間科配仍令刑部立法先是諫官劉大中言自崇寧以前臣僚進奉聖節禮物多是虛表物或不至因崇寧二年發運副使胡師文建言並令前期一月到京自後立定數目期限催督起發臣昨奉使江南聞皆不免科配若軍期急切有取于民蓋不獲已豈有斂百姓怨嗟之物為臣子禱頌之誠其於邱山有何所益如上件金銀絹未可捐除即乞嚴戒州縣樁簇官錢和買不得于人户名下科配庶幾感召和氣增崇聖德故有是命甲申直龍圖閣知臨安府梁汝嘉升徽猷閣待制乙酉簽書樞密院事徐俯兼權參知政事是日軍賊檀成犯長楊縣荆南鎮撫使解濳遣統領官秉義郎閣門祗候胡勉捕斬之成本澧州官軍後從雷進於慈利縣忠翊郎澧州沿邉都巡檢使雍從善嘗與成戰成執而磔之至是就戮時群盜田政自襄陽引兵破夷陵潛命知峽州統制策應夔路軍馬王恪往擊之斬其首政宜城人也此以今年七月二十五日宣撫處置司所奏附入後贈從善三官録其家一人五年閏二月己酉丙戌鄉貢進士上官公弼特補將仕郎公弼在太學有聲工部尚書胡松年與之有筆硯之舊用使金所得恩澤而命之公弼初見紹興元年丁亥知樞密院事張浚言荆南府潭筠峽州最係出産箭簳去處已令各計置二三百萬赴行在其後浚復言潭州近年採伐殆盡今所用皆自全永武岡商販而至恐誤措凖請差損其數從之後請在四月癸巳著此為辛炳言浚事戊子監察御史眀槖宣諭嶺南還入見翊日請詣都堂白事許之槖出使一年三閲月所按吏二十有七人三年五月丁卯右修職郎權知保昌縣丁賓九月戊辰廣西運判王據南恩州司户莫憲章陽春令陳子鎮桂陽令馬緘權蒼梧尉兼令簿李右朝奉大夫知連州陳與承直郎知龍水縣鄭中行忠翊郎權桂陽縣趙邦昌十一月戊辰宣教郎知富川縣鄧公行十二月癸卯右奉議郎權雍州盛外右從政郎權司户陳栗右迪功郎司理薛容右迪功郎權石龍令薛魯十二月戊申攝樂會尉兼令成大順己酉髙安令王允迪荔浦令連希尹權武仙令劉振武緣尉溫安賓州推官王澤武仙尉陳述修仁尉熙朝攝宜倫尉兼令杜介之雷州遞角場兵馬監押黃宗弼並放罷取勘三年九月戊辰通判廣州韓僖催勘十二月丙午修武郎知萬安軍柯光國取勘又知桂州許中已見二年七月辛巳薦士二十人朱敦儒已見三年九月乙巳董弅章傑趙子巖王縉趙竒鄭鬲朱倬已見十一月甲戌同日前桂陽令張勉左朝奉大夫知韶州尤深右通直郎通判韶州宋普右奉議郎知南恩州王治海豐令林獻材今年正月乙卯右通直郎通判廉州陸畀右朝奉郎新知白州尹植左朝請郎知容州趙子升左朝奉大夫知昭州鄧偲左朝奉郎權廣西轉運司主管文字王淵右迪功郎廣西轉運司幹辦公事連漢夫靜江府觀察推官韋溫輔左儒林郎權臨桂丞郭偉並轉一官候任滿日赴行在凡五使所按吏總七十有九人眀槖二十七人劉大中二十人薛徽言十六人朱異胡蒙各八人薦士五十有七人眀槖二十人劉大中十六人朱異十二人胡蒙六人薛徽言三人而劉大中所劾多大吏槖大中朱異所舉多聞人又薛徽言鋭于有為而槖大中數言公私利病惟胡蒙奉承大臣風指此其大略也己丑左朝奉大夫侯延慶守太常少卿直龍圖閣主管臨安府洞霄宫蘇擕守宗正少卿尚書吏部員外郎陸長民為右司員外郎左奉議郎晏敦復守吏部員外郎左朝奉郎黃祖舜守軍器監丞擕頌子祖舜福清人嘗從胡安國學自衢州州學教授召見改京官而有是命龍圖閣學士提舉江州太平觀沈與求知鎮江府充浙西安撫使監察御史明槖奏瓊雍鬱林諸郡嵗調夫數百人為監司帥臣饋荔支詔禁止犯者計贓坐罪辛卯駕部員外郎洪興祖比部員外郎范振樞密院編修官許世厚並罷坐席益所薦引為御史常同論列也世厚景衡子與興祖皆吕頤浩所録故同斥之葛立方撰興祖墓志稱因上封事罷去已附見洪擬罷吏部時更須詳考壬辰工部尚書兼侍讀兼權吏部尚書胡松年試吏部尚書翊日松年入對論唐太宗嘗諭房元齡以細務屬左右丞大事關僕射其委任元齡之意篤矣殊不知尚書丞實政事綱轄若專責以細務以何暇禆益治體哉臣願睿斷以今日所當為所當行不可緩者分委二三大臣庶使悉心勠力各底乃職且戒簿書有可簡省者簡省之詔付三省樞密院左朝散郎范漴提舉廣東茶鹽公事漴守惠州州為虔賊所蹂及是還朝妄奏守禦功減磨勘年而有是命監察御史明槖言于朝命遂寢虔賊事見二年冬末乙未詔參知政事同都督江淮荆浙諸軍事孟庾赴行在本府統制官姚端李捧王進並以所部偕還惟張榮屯平江李貴屯建康如故自朱勝非再相數言都督府可罷吕頤浩不從及是既畢防秋勝非復乞罷都督府使諸將得自奮厲故有是命殿中侍御史常同言近嘗論列監司之不才者已蒙放罷臣今再體訪得新廣東轉運判官潘闢深刻險薄吕頤浩喜之頤浩去未久闢倡言再入移書示衆無不惑之新浙東提舉茶鹽陳鼎昨任湖州司户贓汚狼籍諂事蔡攸遽除監司新廣東提舉茶鹽張世才駔儈俗吏始以從父入燕特赴殿試合該討論之人緣與頤浩有舊纍遷差遣新湖北提舉茶鹽徐嘉問王黼之客也為應奉司屬官自稱相幹輕暴之性至今不移新福建提舉茶事趙公達贓吏也嘗和糴小麥自盜為倉吏所告倍償而去新湖南提舉茶鹽胡緯父子出入蔡京之門受官數年即除監司此六人者皆有罪狀不可以表帥一路理宜罷斥詔並罷世才思正子也初知唐州胡安中為偽齊所逼棄山寨奔隨州及隨州失守詔赴行在至是補武經郎閣門宣贊舍人添差溫州兵馬都監武節大夫吉州防禦使致仕陳思恭復為入內內侍省押班主管福州應天啓運宫神御填創置闕左朝請郎致仕翁升特遷一官以升自言元符末上書入籍故也吏部侍郎陳與義言陛下褒恤元祐黨籍及元符上書人碩大光眀者既已盡録亦有姓名不熟于人而多故之後無籍以考昨黃策以蔡京所書黨碑及國子監所印上書黨籍人姓名録白來上付在有司遭火不存間有子孫自陳者乃以胥史私抄之本定其是非望再行搜訪乃命吏部訪尋真本繳申左右司審驗訖送部照使升選人邪中等苐三十四人日歷與義奏下在丙申今併附此丙申試尚書吏部侍郎兼侍講兼直學士院陳與義移禮部侍郎胡世將移刑部權刑部侍郎劉岑移吏部與義以兼直院故免劇曹起居舍人唐輝試中書舍人簽書樞密院事兼權參知政事徐俯以疾告上命即其府視事俯言三省文書最為叢委平時盡日力可了臣係暫權實不知首尾占位書名而已臣既以衰病方且療治筋力心志實不能支欲乞且止治臣本院事所有三省職事自有宰相伏望聖恩免臣暫權事務既簡可得專心既獲治養賤軀亦免乖誤大計詔不許丁酉詔以宣諭五使手歷進册令檢正都司檢詳官同共看詳比較多寡申尚書省右迪功郎泰州録事參軍李亦特改右承務郎亦上疏論事上召對而命之戊戌詔廣西提舉買馬官移司雍州用李預奏也知樞密院事張浚乞俟至衢州留數日修治軍器從之武德大夫秀州防禦使致仕張見道落致仕主管江州太平觀已亥初命三衙管軍及將帥觀察使以上舉忠勇智略可自代者一人如文臣之制用吏部侍郎鄭滋請也翊衛大夫相州防禦使添差浙西兵馬副鈐轄張用改福建路兵馬都監辛丑翰林學士綦崈禮兼史館修撰始除修撰官也右司諫劉大中言近户部尚書黃叔敖申明江浙上供和買紬絹並七月終已前起發數足臣契勘租稅條限係五月半起催八月半納畢災傷放免不盡者限外展一月祖宗以來未之有改今户部却令七月終已前數足可謂迫促太甚矣納畢者人户送納到官之期也起發數足者諸州團併起發到行在之期也且以道里逺近酌中言之吉州陸路到臨安府二十八程水路又倍之若依户部所請之限則須五六月納畢豈不大假迫促今户部不過以大禮賞給未足上動朝廷不知户部平時所管是何職事豈不知今年合是大禮平時蠧耗未嘗講究平時失陷未嘗稽考今乃臨時畫降指揮迫促稅限變亂祖宗舊制全不恤民且郊祀之禮所以為民祈福也今户部因大禮賞格迫取物帛反為民害有傷和氣有纍聖德臣安得不論詔展限一月詔廣西土丁洞丁各仰本處防守其調發赴靜江府并團結餘丁並罷自許中為帥始調土丁防托既又令以錢代丁事見紹興二年四月提舉買馬官李預又以駑馬配之監察御史明槖自嶺南還數以為言故有是旨此以明槖奏狀及今年二月壬午槖論許中五罪二月癸未槖論買馬司事二月壬辰范漴論廣東盜賊事四章修入許中科土丁錢據槖奏詳著二年四月川陜宣撫處置司言已用便宜差左奉議郎王瓘權利州路轉運判官從之是日金右都監宗弼自寶雞入犯攻仙人關先是金既得和尚原利州路制置使吳玠度敵必深入乃預治壘于關側號殺金平嚴兵以待玠弟秦鳳副都總管璘在階州移書言殺金平之地去原尚逺前陳散漫宜益治第二隘示必死戰則可取勝至是宗弼果與其陜西經略使薩里罕偽四川招撫使劉夔率十萬騎入犯趙甡之遺史二月辛卯吳玠及烏珠戰于仙人關敗之初烏珠欲大舉兵期必入川劉豫之弟益方知長安密使人告玠早為之備玠預為壘關側號殺金平按日歷宣司奏金以二月二十一日攻仙人關辛卯則十一日也甡之所書凡差十日蓋小誤又所云劉益密告吳玠事乃據林泉野記恐未必然當考進攻鐵山鑿崕開道犯仙人關既至敵據髙嶺為壁循嶺東下直攻我軍玠自以萬人當其前璘率輕兵由七方關倍道而至轉戰凡七日晝夜不息統制官郭震為宗弼所襲破其寨王師屢敗玠斬震以徇敵復攻之玠斬郭震據趙甡之遺史云爾然甡之繫之甲午蓋誤今且去其日俟考壬寅太府寺丞權户部郎官張成憲為尚書駕部員外郎直祕閣秦梓提點福建刑獄公事左中奉大夫栁瑊提點浙東刑獄公事監吉州𣙜貨務都茶場陳靄提點湖北刑獄公事直祕閣吳懋為湖北轉運判官左朝散郎新知台州徐偉達直祕閣陸置並為廣東轉運判官右朝奉郎添差通判平江府田積中為淮南轉運判官御史常同言置乃內侍王通客為明府司録供進密煎海錯就遷通判避通名改稱府判今浙路有呼府判者自置始也後任發運姦贓狼籍瑊頃知洺州不能鎮撫士卒以致軍變身中數刃近嵗交結辛道宗求賜章服陛下灼見其無恥罷之偉達資性貪鄙在圍城中移書親舊有新君即位人情喜恱之語梓本附梁師成特赴殿試闒冗疏謬士所指笑靄是雖不知其才但恐不應超躐亦望詳酌改命吏部言靄嘗任提舉湖北刀弩手乃詔置瑊偉達梓皆罷置佃子也梓瑊懋偉達已見靄未見同為御史不數月劾罷監司之不才者二十有三人中外聳然懋以眀州獻羡事訴于朝謂曩以代者移用故申明之非有所獻也由是復起後十餘日右司諫劉大中言淮南人民有幾乃共置監司五員乞罷積中上從之懋乞改正眀州獻羡事在是月壬寅同章下在己酉大中章下在三月丙辰今併書之積中不知何許人乃吏部尚書胡松年親屬自添倅躐除監司不知同何以獨不言而大中言之當考孫覿撰栁瑊墓志瑊知洺州被疾司録事李承勵權州事州兵聞公􅔂唱言倉粟惡逐庾官嗾衆為亂公聞變力疾按衣出譙門坐宣詔亭命三校率其屬捕殺首亂者而釋其餘已乃復卧承勵逢童貫之怒以公病不任移書馳告貫而自為功居未幾公黜三官歸承勵進五官此與同章疏所云全不同姑附著此日歷紹興五年韓璜為伯膠乞恩澤狀亦稱洺州軍變執縛知州栁瑊癸卯勒停人向子廉復右朝奉郎除直祕閣子廉宗良子宗良經子永嘉郡王知平陽縣民有負和糴米者子廉訊之杖二百即日死坐是停官劉光世夫人子廉兄女也光世為請于朝以欽聖憲肅皇后諸姪在者惟子廉一人故有是命詔權以射殿為景靈宫四時設位朝獻用太常博士劉登議也其後上親征不果行乙巳監察御史明槖言昨李棫遣人入大理買馬於邊防有所未便小必失陷官物大則引惹邉釁臣講究買馬之術有七深入蠻國誘之不惜其直一也原有繒綵鹽貨之本二也待以恩禮三也要約分眀四也禁止官吏侵欺五也信賞必罰以督之六也馬悉歸朝而後付於將帥七也七説若行西南諸國所産自至望下提刑司根究諸司鹽利剩錢應副買馬仍下提舉司詳前七説施行從之左金紫光祿大夫龍圖閣待制提舉華州雲臺觀王革卒詔官子孫如故事言者謂革自廷尉尹京專以觀望意旨為獄刑罰失平枉濫者衆獨以夤緣交結冒濫賞典法當討論詔追降革為左中大夫盡格其恩數鄉貢進士李郁為右迪功郎郁以布衣入見所陳皆當世要務上批郁學通世務議論可采故有是命上批日歷不載武陽志有之丙午知樞密院事張浚至行在初浚行至嚴州之新城復上疏引咎求罷殿中侍御史常同入對論浚五年于外誤國非一用李允文王以寧傅雱諸小人為荆湖害以曲端趙哲之良將皆不得其死以至擅造度牒鑄印記賜赦減降出給封贈磨勘綾紙之類皆有不臣之迹及被召盡掠公私之財選精兵自衛出蜀雖膏斧鉞不足以謝宗廟若蚤正典刑示天下不復用則陜右之地不勞師而自復矣侍御史辛炳素憾浚事見建炎三年二月亦論浚誤國犯分富平之役趙哲轉戰用命勢力不敵而潰浚乃誅哲致其徒怨叛又信王庶一言殺曲端于獄中端之部曲又皆叛去其後日夜攻打川口公行文檄求端于浚者是也和尚原之戰王萬年之功為多浚乃抑之萬年怨憤叛去與哲端潰卒力窺川口金人特因之耳按蜀口用兵録今年三月殺金平之戰尚遣王萬年擊賊蓋萬年即王喜此時為統領官炳誤也又用趙開營財利行𣙜茶鹽及隔槽酒法苛細特甚內結人怨西蜀之不亡者幸也凡朝廷所除監司郡守至輒不許上必已所命乃得赴張深以老乞退則令五日一赴宣司治事此例安出哉甚者擅肆赦宥一嵗凡再自古便宜未有如是之專者也湖南北非浚所管地分乃遣李允文王以寧假以便宜肆行生殺遂亂兩路敗事而歸不自知罪猶移文令葺治府第浚謂樞庭之權為已家物乎既被召盡刷四川之財以行尚敢託言那輟隨軍錢物應副解潛程昌宇欲以要功不知錢何所從出哉事見今年正月丁丑沿路劄下荆峽諸州計置箭簳各數百萬又言如難計置即具因依回報是徒欲求進不恤民力之困也事見二月丁亥浚聞罷之始則遷延不行中則疑而有請欲俟至潭州道路無虞而後造朝事見正月壬戌近又奏乞至衢州留數日修治器甲事見二月戊戌今聞政府虛位則至衢州一日而行星夜兼程不復留滯何前緩而後急疏入不報前一日炳以急速請對論浚為黃潛善所知自興元曹官一二年間引為侍從及金人有窺江南意浚乃避禍逺去引用一時小人如劉子羽程唐輩誅求聚斂四川騷然陛下初許浚便宜黜陟蓋以軍事在逺不欲從中制也浚輒立招賢館有視龍圖閣之命以孺人封號封參議官之妾陛下常遣中使撫問浚乃與之加秩勞其逺來其狂悖甚矣賴陛下聖明辨之不晚亟遣郎官持節召之浚乃偃蹇遷延上章慢命既到鼎澧間擅差撫諭官騷擾州縣事見二月辛巳其所為一至于此望賜罷黜明正典刑以為人臣跋扈之戒浚至行在詔浚隨行軍馬盡付神武中軍統制楊沂中隨行錢物𨽻內藏為封樁激賞庫浚既見遂赴樞密院治事丁未右朝請郎通判臨安府卲相右朝散大夫通判臨安府熊彥昭並直祕閣守臣梁汝嘉薦二人上召對而有是命彥昭鄱陽人也相已見賜偽福國長公主宅于行在建炎以來繫年要録卷七十三金人地名考證烏珠原書作兀木誤改見卷一薩里罕原書作撒離曷誤改見卷十一
