body:
  text: 建炎以來繫年要録巻一百四十八宋李心𫝊撰紹興十有三年嵗次癸亥三金熙宗亶皇統年春正月己丑朔上不受朝詣慈寧殿賀皇太后太師秦檜率百官詣文徳殿拜表稱賀遙拜淵聖皇帝于行宫北門癸巳太傅醴泉觀使潭國公韓世忠請以其私産及上所賜田統計從來未輸之税併歸之官從之仍賜詔奬諭戊戌上蔬食齋于常御史遣太師秦檜册加徽宗諡曰體神合道駿烈遜功聖文仁徳憲慈顯孝皇帝己亥上親饗太廟秦檜為大禮使簽書樞密院事程克俊為禮儀使普安郡王亞獻皇叔光州觀察使士街為終獻士街儀恭孝王子也是日平旦上自宫乘玉輅秘書少監秦熺執綏大臣兩省監察御史武臣正刺史以上朝服分左右騎道禮畢鈞容直作樂導駕還宫辛丑立春節學士院始進貼子詞百官賜春幡勝自建炎以來久廢至是始復之壬寅徽猷閣直學士致仕廖剛卒年四十七癸卯太師秦檜等上表請立中宫詔答不允熊克小厯在壬寅葢誤設度牒並權住給降諸路已降未賣者拘收繳尚書省户部尚書張澄入内内侍省都知諤並進秩一等以車輅仗衞畢工故也臨安府言獄空詔奬之詔以錢塘縣西岳飛宅為國子監太學舊太學七十七齋今為齋十有二曰禔身服膺守約習是允蹈存心持志養正誠意率履循理時中髙閌擬齋名在二月乙酉今併書之乙巳詔保信軍節度使兩浙東路馬步軍副都總管李顯忠今任俸給特免減借從所請也丙午權禮部侍郎兼實録院修撰王賞言皇帝親饗太廟聖孝格天前數日陰雲欲雪至日澄霽伏望宣付史館以昭聖孝從之左奉議郎提舉台州崇道觀李誼復秘閣修撰知廬州左朝散大夫許中復直秘閣知揚州直徽猷閣知揚州陳兖移知潭州集英殿修撰新知湖州秦棣乞前後御書經史並以墨本頒賜諸州學宫從之丁未安吉縣布衣談庚言本邑去秋有圓𤓰並蒂合而為一此實皇帝孝治天下故見祥瑞以昭天意詔勿受自今有似此投獻者皆却之武功大夫吉州刺史閣門宣贊舍人鄂州駐劄御前㨗勝軍副將楊浩除名昭州編管浩岳飛部曲坐謗訕朝政及私令人上書詐不實也己酉上謂宰執曰朕不畏多事事若多必入思慮大抵無事則怠忽易生不可不戒於是秦檜等贊聖謨宏逺天下幸甚又曰此所謂勅天之命上大善殿中侍御史江邈權尚書吏部侍郎詔大理寺丞袁柟燕仰之往静江府推劾徽猷閣待制提舉江州太平觀胡舜陟不法事以聞先是舜陟帥廣西因奉詔討郴賊駱科餘黨以饋餉不繼與轉運副使吕源有隙舜陟劾源沮軍事時有府吏徐竽者因獲罪舜陟杖而逐之竽乃隂求舜陟過失得其邕州買馬折閲事以告源源即奏舜陟因生日受知邕州俞儋百金又盜官馬八百餘匹贓汚僭擬傲慢不恭萬一别生不測為患不輕又以書抵秦檜言舜陟非笑朝政檜素惡舜陟入其説遂奏遣柟等雜治仰之瑛子也瑛青州人宣和户部尚書直秘閣新知卭州宇文郴勒停以言者論其夙負故有是命監文思院何幾先罷言者論席益之守平江府幾先出入其門是時同朝大臣協心體國力佐恢復之勲而益嘗受知吕頤浩幾先傅㑹其意屬頤浩被命按閲江上屯營經由平江幾先乘此設為秘計勸益力説頤浩此行非策當有擠公於後者頤浩大以益説為然於是托疾於常不復前進是時朝論由是不復和一實自幾先發之今近居轂下安知其不包藏禍心密籌詭計以俟投隙而發故有是命辛亥監察御史李文㑹守殿中侍御史丁巳興寧軍承宣使張子葢為兩浙西路馬步軍副都總管初張俊之薦王徳代掌其軍也徳以子葢及俊親將馬立顧暉為軍中統制及俊罷樞柄徳乃不禮子葢等而罷之故有是命俊與徳始有隙戊午右廸功郎監潭州南嶽廟畢良史獻春秋正辭二十巻是書良史在汴都所著也奏入詔右諫議大夫兼侍講羅汝檝國子司業髙閌看詳來上遂特改京官趙甡之遺史云良史初補文學既得三京地束京留守司俾權知束明縣良史乃搜求京城亂後遺棄古器書畫買而藏之㑹金人敗盟良史無所用心乃教學講春秋及復得還遂盡載所有骨董而至行在上大喜於是以解春秋改京秩自此人號良史為畢骨董二月己未朔詔自今宰執轉官加恩正謝日衣帶鞍馬並依格全賜更不減半庚申國子司業髙閌特引對閌言陛下復興太學凡養士取士之法當取聖裁上曰自有祖宗成法閌曰有慶厯元祐紹聖崇寧法有司未知適從若出於聖裁則行之乃久閌又奏舊太學辟雍皆有御書今亦乞建閣以藏御書仍願特灑宸翰加恵多士上許之閲又奏有一事最先經術是也上曰經不易通士習詩賦已久遽能使之通經乎閌曰先王設太學之意惟講經術而已上曰近侍讀官程瑀亦論經術閌曰國初猶循唐制用詩賦神宗始以經術造士遂罷詩賦又慮不足以盡人材乃設詞學一科試以雜文上曰詩賦亦雜文也閌曰取士以經義為主不過三場後加詩賦為四場不能無礙今欲經義第一詩賦第二論策各一第三上可之辛酉太師秦檜等三上表乞選正中宫詔俟懿節皇后撤几筵日取㫖太師尚書右僕射秦檜以進書恩再封秦魏國公檜不受壬戌上初御前殿特引四參官起居自建炎以來始有此禮癸亥上曰近代獻書者時有怪誕祥瑞之説此興訛之漸不可長也前代往往喜聞圖䜟朕所不取乙丑更名永祐陵曰永固先是有㫖從官同議定自是權户部尚書張澄等言永固二字不犯厯代陵名從之此似因王銍建言已見紹興九年二月殿中侍御史李文㑹入對文㑹以朝廷方守和議不言兵乃奏仁義之説曰陛下至孝格天文徳來逺慈寧以寧親永固以寧神偃兵息民天下大安則其仁固大矣曩者金人犯闕陛下毅然請行志存宗社及登大寳力圖恢復任賢去邪斷自宸衷而宗社再安則其義固大矣臣以是知陛下足以大有為願慎守此道而力行之太平之基實在於此後五日上謂秦檜曰文㑹力陳仁義甚善朕令録一本置之几案欲常觀覽上語在庚午今併附文㑹入對之日熊克小厯修潤其詞非文㑹本語也今從元奏丙寅上曰為君不知春秋昧為君之道為臣不知春秋昧為臣之道此書褒貶甚嚴真萬世之法上又曰為政之要在辨忠邪此治亂所由分也秦檜曰書生喜論王霸臣謂推誠任賢是為儒學施于有政是為王道挾術任數是為雜學施于有政是為霸道上以為然中興聖政臣留正等曰為國而或王或霸治道之所出者同源異𣲖耳霸政雖曰駁雜而有紀綱有政事恩威足以使民勢力足以强國如管仲晏子所以用於齊國者謂之不純于道徳則可舉而謂之挾術任數則不可人而挾術任數邪孰甚焉未冇不亂天下者是以太上皇帝曰辨邪正治亂之所由分也揚武翊運功臣太傅横海武寧安化軍節度使醴泉觀使潭國公韓世忠進封咸安郡王時劉光世始薨舊功大臣惟世忠與張俊在俊勲譽在世忠左特以主和議故為秦檜所厚顧先得王至是世忠願輸積年租賦于官乃有是命時上又數召世忠等兼家屬燕于苑中賜名馬寳劍等甚渥世忠所以得王墓碑及諸書皆不載其制詞云願㑹賦租併歸官府重惟逺識實麗前賢葢度越于常人宜顯頒夫異授即指此也世忠奏請已見今年正月癸巳王明清揮麈第三録紹興癸亥和議初成有南雄太守黄逹如者考滿還朝獻言請盡誅前此異議之士庶幾以杜後患秦㑹之喜之薦為監察御史方數日廣東部使者韓球按其贓汚鉅萬奏牘既上雖秦亦不能揜僅止罷黜人亦快之皇叔保慶軍承宣使知大宗正事權主奉濮安懿王祠事士夽為安徳軍節度使以迎䕶之勞也己巳上謂大臣曰古人琴制不同各有所屬朕近出意作盾様以示不忘武備之意詔清河郡王張俊咸安郡王韓世忠平樂郡王韋淵並五日一朝庚午詔自來年為始令太史局遞賜諸路監司守臣厯日以廣西轉運判官李紹祖省記有請也乙亥減雷化髙融宜亷邕欽賀貴十州免行錢用去年七月詔㫖也提刑司初請其半上特命除之十七年四月丙申又減左承事郎沈介潘良能左宣教郎洪适左宣義郎游操並為秘書省正字良能良貴弟操建陽人也四人皆以勅局進書恩自刪定官改秩而有是命左朝散郎提舉江州太平觀象符知遂寧府符有田在蘇因留居之秦檜不樂符遣還蜀丁丑詔自今宰臣已下遇節序令客省依格簽賜節料己夘宰執奏福建安撫使葉夢得措畫弭盜之事上曰盜之竊發多縁守令非人掊克所致宜令帥司條具凡有害於民者除之自此夢得或招或捕或誘之相戕三策並用然頗與監司相異至交奏其事監司謂盜魁林元仲必不可致既而夢得遂招致之又謂俞徹明必再叛萬少佺必大熾而夢得處之皆定異議遂息國子司業髙閌言太學者教化之本而最所當先者經術是也自漢以來多置博士而後世所謂詩賦論策皆經術之餘耳太學舊法每旬有課月一周之每月有試季一周之亦皆以經義為主而兼習論策為三場苟加一場則旬課季攷之法遂不可行自元祐以來雖臣僚累奏請加詩賦通為四場而終不施行者葢為此也自罷詩賦之後朝廷恐専門之學未足以收實用乃别設詞學一科試以制詔表章之類通謂之雜文臣今㕘合條具太學課試及科舉三場事件第一場大經義三道論語孟子義各一道第二場欲以詩賦第三場以子史論一首并時務策一道永為定式閌又言今比嵗郡國雖有學而與選舉不相闗今㕘取祖宗舊制通以當今之宜補太學生以諸路往本貫學滿一年三試中選不曾犯第三等以上罰游學者同或雖不住學而曾經發解委有士行之人教授保委申州給公據赴國子監補試諸路舉人以住本貫學半年或雖不住學而兩預釋奠及齒于鄉飲酒禮者縣學同仍籍記姓名本學次第委保教授審實申州聴取應仍自紹興十四年為始皆從之何俌龜鑑或者乃曰敵勢如焚國勢如綫彌文縟典何暇蒐舉得無蹈宣靖之覆轍乎愚應之曰不然科舉固所以沮天下豪傑之氣亦所以収天下豪傑之心茍無科舉以取之學校以養之則士之不知受重者不入于敵則入于盜矣張九成之策李時雨之書何由而來哉辛巳秘書省著作郎王揚英周執羔並為尚書吏部員外郎先是日厯所修書自建炎元年至去年成五百九十巻秘書少監秦熺因與揚英等書皇太后回鑾本末上之壬午詔熺揚英執羔各進官一等自秦檜再相取其罷相以來一時詔㫖與夫斥逐其門人章疏或奏對之語稍及于己者悉更易焚棄由是厯時政記亡失極多不復可以稽考逮其擅政以來凡所記録莫非其黨姦佞之詞不足以傳信天下後世矣王明清後録云聞之徐度秘書省校書郎兼益王府教授嚴抑守秘書丞秘書省校書郎兼吳王府教授張闡為秘書郎兼國史院檢討官専修祖宗寳訓尚書右司員外郎李若谷右司郎中王師心並遷左司吏部員外郎梁弁考功員外郎游損並遷右司左文林郎真州州學教授楊邦弼左廸功郎陳鵬飛並為太學博士初除博士員也鵬飛永嘉人秦熺唱榜名第四故事廷試三人兩任囘始召至是熺已為秘書少監故並擢之川陜宣撫副使鄭剛中言奉㫖相度茶馬兩司每年應副都轉運司錢物今相度乞將成都府路提刑轉運司合樁坊場鼔鑄食茶税錢三色共二十三萬緡令都運司徑行取撥外更那融續添錢八萬緡通作四十萬緡并取博馬絹一萬八千七百五十匹自紹興十二年為頭應副從之自趙開行鈔法每茶百斤為一大引令商人輸引錢市利共六引八百文至是遞增為十一引紹興七年李迨增一引二百文八年張深増四引八百文九年趙開減三引十年馮康國增一引半共為此數時物價騰湧茶商取息頗厚自得㫖取撥之明年主管官左朝請大夫賈思誠又增為十二引三百文於是諸場類皆溢額而買馬之數復不加多人但知茶馬司之富甲天下其實所収引錢視建炎增倍後雖破敗不可復減矣淳熙十四年李大正裁減事可考乙酉詔令臨安府建景靈宫先是言者謂自元豐始廣景靈宫以奉祖宗衣冠之游即漢之原廟也自艱難以來庶事草創而原廟神游猶寄永嘉四孟薦享旋即便朝設位未副廣孝之意望命有司擇地倣靈宮舊規以建新廟迎還列聖粹容庶幾四孟躬行獻禮用慰祖宗在天之靈事下禮官至是權禮部侍郎王賞等乞體倣温州見今安奉殿宇令本府同修内司隨宜修葢熊克小厯載此事在三月丁酉與日厯不同其後創于新莊橋之西以劉光世賜第為之光世家進納賜第在三月庚子今併附此築三殿聖祖居前宣祖至徽宗居中昭憲而下二十一后居後掌官内侍七人道士十人吏卒二百七十六人上元結燈樓簾幙嵗一易嵗用酌獻二百四十羊凡帝后忌辰通用僧道士四十七人作法事中興聖政吕中大事記秦檜始則倡和議以誤國中則挾敵勢以要君終則飾虚文以為中興使一世酣豢於利欲之中奉敵稱臣而不以為恥忘讎事敵而不以為怪其弊可勝言哉紹興十一年置玉牒所十二年作崇政垂拱二殿十三年築圜丘建太社太稷國子監太學十四年置宗子學建秘書省御書院十六年建武學二十五年建執政府二十六年築兩相第二十七年建尚書六年定都二十年而郊廟宫省之制亦已具備矣紹興十年明堂備大樂十三年初謁景靈宫合祭天地建金雞肆赦班鄉飲酒儀十四年作渾天儀復教坊樂工十五年行大朝㑹禮十六年製常行儀衛耕籍田郊備祭器設八寳作景鐘閲禮器奏新樂十七年祠髙禖十九年定蜡義十八年圖景靈宫酌享功臣息兵三十年而禮樂文物亦畧備矣國家靖康之禍乃二晉之所未有中國衣冠禮樂之地宗廟陵寢郊社之所盡棄之敵禮器樂器犠尊彞鼎馬輅冊冕鹵簿儀仗之物盡入於敵渡江以來庶事草創皆至檜而後定然耕籍朝覲祀明堂養老更武王克商後事也辟雍明堂籍田光武平隴蜀後事也今果偃武修文時耶果息馬論道時耶宫室雖備而忘前日巡幸之懼矣郊廟雖具而忘前日宵旰之憂矣朝儀雖肅而忘前日扈從之勞矣文物新而忘前日根括之慘矣趙霈告髙宗曰願陛下毋忘親征時王庶謂秦檜曰公不思東都抗節存趙時而忘此敵乎洪皓曰錢塘暫居而太廟景靈宫皆極土木之華豈非示無中原意乎三月辛卯詔宴殿陳設止用緋黄二色勿以文繡上以祖宗朝殿帷但用純綵後來寖多文繡故屏去之也熊克小厯附此事於正月癸巳今從日厯國子司業髙閌請在學人依徽宗御筆復立三年歸省之限以彰孝治上曰舊有九年之法至徽廟方改作三年豈有士人九年而不省其親者乎其從之川陜宣撫副使鄭剛中乞增印錢引四百萬緡許之先是直秘閣四川轉運副使井度言右䕶軍嵗計闕七百七十八萬緡乞撥四川免行錢五十萬緡仍添印錢引户部奏免行錢乃朝廷窠名不可予止命增印焉癸巳資政殿大學士左正議大夫提舉臨安府洞霄宫張守貶秩二等時右宣教郎添羞通判常州陳袤以貪贓屬吏而言者謂守實庇之故繫久不服遂有是命武節郎閤門宣贊舍人趙瓌等並轉一官以初御正殿應奉無差失故也直龍圖閣葉三省知信州代還言鉛山縣民王小十取肝以愈母病葢陛下躬行孝徳風化之所致乞詔有司旌其門閭易其鄉號仍宣付史官從之右武大夫榮州防禦使新知辰州邵隆興武功大夫貴州刺史知叙州劉光弼兩易乙未詔文宣王廟門立㦸二十四中書舍人兼修玉牒官楊愿兼侍講國子司業髙閌兼崇政殿説書閌仍進講左氏傳丙申拱衛大夫貴州防禦使殿前司忠勇軍統制輔逵為江南東路馬步軍副總管罷從軍左從事郎廣南鹽事司幹辦公事鄭厚罷以言者論厚頃縁劉大中力薦及為泉州察推唯知諂事趙鼎比因誤殺罪囚例與衝替乃謗議朝政簧鼔衆聴故也乙巳詔臨安府建太社太稷言者以謂社稷之祠王者所重故漢光武東遷則置於雒陽國家南渡以來上戊之際寓于佛祠未副事神保民之意望下禮官講明擇地為壇以備春秋之禮故有是命詔昭慶軍節度使開府儀同三司致仕平樂郡王韋淵依舊行在居住初令淵致仕居處州未行復留之淵致仕諸書全不見不知何故當考丙午詔臨安府同殿前司修築圜丘于龍華寺之西壇四成上成縱廣七丈下成二十有二丈分十三陛陛七十有二級壇及内壝凡九十歩中壝外壝共二十五步以龍華寺為望祭不築齋宫詔僧及道士於淮南京西沿邉行遊者禁之辛亥明州言自廢廣徳湖田嵗失官租三千餘斛請復以為田從之事祖見九年五月甲寅中衛大夫慶逺軍承宣使劉光烈落階官為崇信軍承宣使以光世薨特遷之也乙卯初命官告院監官書綾紙之背以防姦弊熊克小厯在甲寅葢誤丙辰直秘閣兩浙西路提㸃刑獄公事王鈇陞直徽猷閣鈇獻親享太廟賦而後省官言其古雅故有是命左宣教郎汪勃為太常寺主簿勃黟縣人也紹興二十八年六月庚寅葉義問奏勃為建徳縣丞贓汚不法為邑人所訟秦檜與之有舊監司庇之寖得美官起居舍人兼侍講兼權中書舍人程敦厚言臣昨侍經筵恭聞聖訓以通和之初異議者甚衆今皆退聴葢異議小人初不為陛下社稷計務于不靖以售其姦今事既大定矣固不容不退然而其所以退聴者則不可不察臣觀異議小人其罪惡顯白者陛下雖已為社稷棄之而其黨猶衆匿情詭跡布于中外既不得於其前則將害於其後故今朝廷一有所成尚相與詆曰是墮隣謀也是非國福也一有所作又相與詆曰是不節財也是重困民力也曾莫知悛至于甚者輙更肆險詖以中傷善類欲惑移上意以規取顯美期於必勝而已幸陛下明良胥契鎮以一徳然風俗如此臣實寒心臣益願陛下謹察其㣲而大明賞罰焉庶使異議絶息風俗歸厚永固丕圖臣不勝拳拳之心敦原文集云紹興十三年所上而無其月按敦厚以六月一日罷而此疏首云昨侍經筵則必春講之時也故且附三月末夏四月己未右朝奉大夫通判臨安府万俟虎為荆湖南路轉運判官虎卨兄也庚申上諭宰執曰郡政以循良稱者便與擢用庶為郡守之勸今兵事少息當以民事為先卿䓁宜博詢之壬戌御史臺檢法官詹大方秘書省正字游操並為監察御史大方建徳人也右承事郎知嚴州淳化縣孔括為右宣義郎光是浙西提㸃刑獄公事王鈇言括治狀輔臣進呈上曰可與轉一官令再任任滿更與陞擢縣令最親民而員最多難於一一選擇但有治狀者進用之有過惡者黜責之使知所勸懲則人自勵而不害吾民癸亥詔禮部以鄉飲酒儀制鏤板遍行郡國比部郎中林保請之也翰林司言依例自五月下旬進時果一合至八月初止詔御前權不供進皇太后如例丁卯昭慶軍節度使開府儀同三司平樂郡王韋淵落致仕充萬夀觀使乃奉朝請癸酉右諫議大夫兼侍講羅汝檝試御史中丞監察御史詹大方守右司丙子左朝奉大夫知漳州韓岊代還入見請復孝悌力田科上謂大臣曰漢有此科固可以厚風俗然祖宗未嘗行可令講究不可輕易創立租宗未行之法也岊初見紹興七年四月丁丑直秘閣主管台州崇道觀喻汝礪卒庚辰兩浙轉運副使張叔獻等乞依元祐古迹於華亭置閘以捍鹹潮上曰今邊事初息當以民事為急民事當以農為先朕觀漢文帝詔書多為農而下以農者天下之本置閘其利久逺不可憚一時之勞也乃令叔獻措置殿中侍御史李文㑹論寄居士大夫干擾州縣又監司郡守類皆親故莫敢誰何望嚴加戒約儻或不悛令監司郡守密具姓名聞奏重寘典憲不以赦原從之時士大夫與奏檜異論者多奉祠里居或僑寄他郡自是以次被罪矣秘閣修撰張祁直秘閣李健並落職祁監漢陽軍健監徳安府在城酒稅以李文㑹奏祁治獄不當為不仁健甞仕偽庭為不義也健之制曰往者元惡盗我魁柄濁亂國經為不道之宗主故汝得以免頼天之靈國是大定汝曾不知缺而從搢紳之後罪豈勝誅制詞所云葢指趙鼎與張浚也左朝議大夫提舉洪州玉隆觀胡思左朝散郎直顯謨閣徐林並勒停思南劍州林興化軍居住兩浙轉運副使李椿年言二人廣為謗訕必欲沮經界之政故責之皇伯保平軍節度使安定郡王令懬薨贈少師後追封惠王謚襄靖癸未懿節皇后撤几筵上素服焚香以太師秦檜為禮儀使是日禁在城音樂屠宰及停决大辟囚丙戍詔宰執四叅官赴垂拱殿習看石位是日宰執奏事上曰數日來太后趣行策命中宫之禮朕乞太后降一指揮太后不肯云我但知家事豈預外廷太后知國體故重愼如此秦檜等曰太后有定命陛下奉行可也丁亥國子司業髙閌言舉人春秋欲依舊制止於正經出題從之先有是㫖許於三傳解處出題閌謂如此則是三家者與六經並行以春秋之法繩之三家者當被僭聖作經之罪乃下禮部如所請是月蒙古復叛金主亶命將討之初魯國王昌既誅其子薩罕圖郎君者率其父故部曲以叛與蒙古通䝉古由是强取二十餘團寨金人不能制此據王大觀行程録按松漠記聞逹蘭長子逹爾瑪被囚遇赦得出逹蘭次子章嘉為平章皓以今年六月歸乃不見此事未知孰的今姑附見更俟考詳十六年八月末可叅考先是都元帥越國王宗弼疑知亳州王彦先至南朝常泄其國中陰事乃徙彦先知澶州而調其子保義郎大觀從軍北討實質之也大觀者年二十餘驍猛善騎射以事劉麟擊踘得官宗弼以為保義校尉閏四月戊子朔上曰祖宗時殿宇皆用赤土刷染飾以桐油葢以國家尚火徳故也所以只用赤土桐油者弊則易於更修後來多用朱紅漆不維所費不貲且難於修整檜等曰此有以見陛下追述祖宗之儉徳也己丑立貴妃吳氏為皇后制曰顧我中宫久兹虛位太母軫深逺之慮羣臣輸悃愊之忠宜選淑賢以光冊命敷文閣直學士兼直學士院秦梓所草也三省行首司言事大體重乃詔太師尚書左僕射秦檜押麻右從政郎兩浙東路安撫司準備差遣楊遹特改右宣教郎遹時子也上召見遂以為司農寺主簿遹除寺簿在六月壬寅庚寅上諭大臣曰近右朝請大夫吳説上殿言湖台之家士大夫多藏書者縁未立賞故不肯獻卿等可求太宗朝訪遺書故事依倣行之是月己亥行下壬寅宰執奏兩浙漕臣張叔獻言天申節鍚宴在邇本司合造山樓而木植未備欲借慈寧殿山樓用之上曰此皆朕自置專奉太后宴設不欲他用姑借與木植其綵段不可假恐或損汚非朕所以奉太母之意也御史中丞羅汝檝奏太常寺主簿王勃充本臺檢法官從之丁酉詔金州撥屬利路直寳文閣提㸃江淮荆浙福建廣南路坑冶鑄錢韓球請籍坑場户姓名約定賣納銅數許之先是贛饒二監歳鑄錢四十萬緡提㸃坑冶趙伯瑜以為所得不償所費遂罷鑄錢歲額銅鐡積而不用盡取木炭銅鉛本錢及官吏缺額衣糧水脚之屬凑為年計至是球必欲盡鑄新錢調民興復廢坑至於發墳墓壞廬舍而終無所得郡邑或毁錢為銅以應其命民大以為擾其後歳收銅二十萬金潼川府興利饒信池潭連韶汀建南劍州卲武軍凡十四場總二十六萬三千一百六十九斤九兩係黄膽二色鐡二十八萬斤洪信饒池徽撫吉江舒潭辰處建韶黄惠賔鬱林州興國軍凡三十八場總二十八萬三百二斤十三兩鉛十九萬斤信舒潭衡峽衢處温韶連潯邕建賔南劍南恩州興國桂陽軍凡二十四場總十九萬一千二百有十九斤十三兩錫二萬斤衡郴賀州桂陽軍凡五場總二萬四百五十八斤皆不登祖額此紹興三十二年虞部數也祖額銅七百五萬斤鐡二百十六萬斤鉛三百二十一萬斤鍚七十六萬斤戊戌殿中侍御史李文㑹論前知閩縣李汝明贓污上謂大臣曰縣令最衆安得人人而知之若一一待臺諫論列何用監司今後贓污人為臺諌所論而監司失按發者量與降官庶知所懲行之數年贓吏自然少矣時本路提轉黄積厚陳桷賀允中余應求己代去皆坐貶秩焉八月癸卯行遣萬吕中大事記檜雖監司帥守到闕必要珍寳數貫乃得差遣而上則嚴監司失按發贓污為臺諫所論者監司量與降官又令監司按縣令申嚴監司巡厯法其飭吏之嚴自若也己亥詔紹興府守臣即直秘閣陸寘家録所藏書以實三館壬寅詔人戸應管田産雖有契書而今來不上砧基簿者並拘沒入官用兩浙轉運副使措置經界李椿年請也時椿年行經界法量田不實者罪至徒流江山尉汪大猷覆視龍游縣白椿年曰法峻民未喻固有田少而供多者願許首復改正又謂每保各圖頃畆林塘十保合一大圖用紙二百畨安所展視椿年聽其言輕刑省費甚衆大猷鄞縣人也詔諸州自長貳外非公筵若休告毋得用妓樂燕集違者坐之癸卯詔少保兼領殿前都指揮使職事楊存中遇合執仗子侍立特令依舊窄衣執骨朶甲辰冊皇后吳氏太師尚書左僕射秦檜為奉冊寳使叅知政事王次翁為副使冊文檜所撰而叅知政事万俟卨所書寳文則簽書樞密院程克俊所篆也權禮部侍郎直學士院王賞為禮儀使工御文徳殿授冊后即穆清殿廷受之通設黄麾半仗千四百九十九用宫架樂其受冊讀冊舉冊悉以内侍為之時太常無女工乃命設於穆清殿門外丙午新除宗正少卿何麟依舊直秘閣知嘉州以殿中侍御史李文㑹論其浮薄夸誕也戊申敷文閣直學士提舉萬壽觀兼侍讀直學士院資善堂翊善秦梓為翰林學士梓直北扉踰半歳至是草后制而命之己酉吏部員外郎王揚英乞命史官編靖康建炎忠義録俾見危致命臨大節而不可奪者託無窮之傳詔付史館其后書不克成庚戍賜武當軍節度使川陜宣撫司都統制楊政漢中田五十頃政自興元入朝故有是命辛亥權尚書禮部侍郎兼實録院修撰兼侍講權直學士院王賞落權字以中宫冊寳成禮也壬子户部供上諸路月樁錢上諭輔臣令析其數為二存其有窠名者餘悉蠲之十七年八月丁巳又減癸丑太常寺言皇后受冊畢依儀詣景靈宫行恭謝之禮從之甲寅上諭大臣曰昨日上殿楊大任其人昏老難當郡寄可處以宫祠似此等人作郡臺諌欲論又無顯過但千里之民陰被其害今後郡守卿等審悉之秦檜等曰謹遵聖訓吏部員外郎王揚英兼國史院檢討官此恐是專修忠義録當考乙卯參知政事王次翁充資政殿學士提舉臨安府洞霄宫次翁執政凡三年至是引年求去而有是命王明清揮麈録所云上終惡次翁秦檜諭使辭位己見紹興十一年八月丙寅皇太后渡淮注建炎以來繫年要録巻一百四十八
