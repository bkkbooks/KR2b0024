body:
  text: 建炎以來繫年要録卷六十三宋李心傳撰紹興三年二月丁亥朔升桂州為靜江府以上嘗領節度故也工部尚書兼權吏部尚書席益言魏晉而下甄别人物専任選曹至唐而銓法密矣然不盡拘以微文激濁揚清時出度外故杜淹表薦四十餘人後多知名韋思謙坐公事負殿髙公輔遽擢為監察御史國初猶存舊制乾德四年詔曰自今常調集選人吏部南曹取歷任中多課績而無闕失其人材可擢者具名送中書引驗加奬則是尚或任人而不専任法也其後官制釐改典選者一切不得以意從事振拔幽滯無復聞焉望稽用乾德詔書凡常調中材行可取者許長二具名以聞從之龍圖閣直學士汪藻守湖州州例敷糴軍糧於民戶而土居左朝請郎通判無為軍顔經投匭訟藻廢格赦令跋扈不臣事下宣諭官胡蒙蒙具以聞經坐貶二秩經言不已停其官經停官在三月詔禁箭簳往山東犯者抵死官吏失察流三千里不以原赦右諫議大夫徐俯進春秋解義至天王使宰渠伯糾來聘用左氏説父在故名上謂俯曰魯桓公篡立天王當致討既四年不問乃使其宰往聘失政刑矣故書名以貶之戊子俯乞編之記注己丑言者論軍中虛費四事一曰冗兵二曰虛劵三曰廣作名目以收使臣四曰招集遊手以充效用大略謂或有一軍不過三二千而使臣至五六百又效用之給倍於上禁軍今乃以供雜役望詔統兵之臣與應副錢糧官同心體國愛惜財用立定使臣員數選汰效用詔樞密院申嚴行下右承事郎徐端益知漢陽軍端益陽翟人此乃本中之父建炎元年四月先見者自是一人自分鎮後漢陽未曾除守至是始命之是日端明殿學士簽書樞密院事兼權參知政事權邦彥薨於位上將臨其喪其家辭而止特贈七官為左奉政大夫輟視朝一日賻銀帛千匹兩邦彥無子有女適右承事郎韓穰乃詔所得恩賜皆以三分之一給其女邦彥秉政幾一年碌碌無所建明充位而已庚寅詔以法惠寺為同文館初議以臨安府學館髙麗使人言者奏雖在兵間不可無學且恐為麗使所窺乃改除館以待之既而麗使言至洪州洋內風敗其舟卒不至知鼎州程昌宇遣將攻夏城寨寨據芷江東西北各阻陂湖惟西南半面有平地賊設重城重壕其外設陷馬坑官軍屯於寨下以守之辛邜右諫議大夫兼侍讀徐俯為翰林學士尚書考功員外郎任申先試監察御史都督府統制官王進改充江西安撫大使司統制官以所部二千自饒州移江西屯駐初置廣西提舉買馬司於賔州俸賜視雜監司凡買馬事經略司毋得預仍命撥本路上供封樁內藏錢合二十七萬緡欽州鹽二百萬斤為買馬費先是提舉洞丁李棫與帥臣許中有隙坐停官中遣屬官任彥輝代領其事移司賔州至是雍州效用蒙賜投匭上書以為賔州去橫山寨十二程道逺不便又鹽綵價髙公私多弊故良馬不可得上納其言遂以左朝請大夫新知建昌軍李預提舉廣西買馬仍召見遷官而後遣行預江隂人也嵗撥買馬錢在此月甲午蒙賜上書在辛丑除李預在甲辰置司賔州在庚戌撥鹽在壬子預遷官在三月癸亥今聮書之熊克小歷云撥本路上供錢七萬緡為本按日歷所撥乃上供錢七萬緡提刑司封樁錢及韶州歲額內藏庫錢各十萬緡十一月壬申預奏內藏庫封樁錢並無現在乞改撥贍學經制錢十萬許之仍詔通其餘見取窠名計三十一萬應副買馬支用按鹽二百萬斤約計二十四萬緡又有錢十七萬緡實計四十一萬克蓋誤也國子監丞蘇良冶為尚書都官員外郎良冶與吕抗善故頤浩用之是日陜西都統制吳玠與敵遇於真符縣之饒風關先是知興元府劉子羽聞金州陷即遣統制官田晟守饒風關拒敵來路且馳檄召玠時宣撫司未有行下玠曰事迫矣諸將不能辦我當自行直祕閣主管機宜文字陳逺猷請曰敵舉國而來其鋒不可當宣撫既命分守各有守地何苦逺赴萬一不勝悔之無及玠不聽自河池一日夜馳三百里中道少止子羽移書曰敵旦夕至饒風嶺下不守此是無蜀也公不前子羽當往玠即復馳與敵遇玠軍才數千人益以洋川義士萬三千人玠先以黃柑遺薩里罕曰大軍逺來聊奉止渴今日決戰各忠所事薩里罕大驚以杖擊地曰吳玠爾來何速耶張同撰吳玠傳志補遺金帥薩里罕最好釋氏僧午長老者最所尊禮至得與其妻妾雜坐飲食而仙人關尼某少畜於是僧忠烈於是置尼私第日以施利厚給已而使尼手書言忠烈所以待已意惟汝可報及密許髙爵且啖以金午喜諾吾諜之往者皆館於方丈往來不絶薩里罕不疑也於是金人情偽凡至密之事吾舉得之費士戣蜀口用兵録亦載此事且云至是玠知金將犯金洋云云按史金人以去年十二月二十五日趨金商而玠以今年二月五日至饒風關相距且四十日不得云先知今姑附此更須詳考時金房鎮撫使王彥自西鄉以八字軍來會諸軍見援至稍弛玠怒欲斬壕寨將而壕寨將走降金人告以虛實且言統制官郭仲等地分雖險而兵寡弱易敗乃縱所掠婦人還山寨而自蟬溪嶺繞出關背夜以輕兵襲取之仲果退走敵既得山寨遂乘髙下闞饒風以精兵夾攻王師之背王師盡却玠斬之不能止凡六日關陷壬辰起居舍人黃龜年進起居郎尚書左司員外郎張綱為起居舍人尚書右司員外郎李與權為中書門下省檢正諸房公事吏部員外郎王庭秀守左司員外郎劉岑為右司員外郎癸巳都司檢詳官奏下營田法於諸路行之悉以陳規條畫為主其江北無牛之地仍用古法以二人拽一鋤凡授田五人為甲别給菜田五畝為廬舍稻場初年免田租之半兵屯以使臣主之民屯以縣令主之悉以嵗課多寡為殿最左通直郎楊揆直祕閣知楚州楚州自殘破後久不置守樞密院言揆才可用遂除職而命之此可見王明清所云揆欲斬秦檜事謬誤已見建炎三年十一月丙午注仍令都督府以兵千人授揆之官尋詔兼沿淮安撫司公事揆兼沿淮安撫在此月丁未勒停人謝亮復右朝請大夫知筠州以奉使之勞也左司諫唐輝奏亮庸繆不才又法當討論後旬日遂罷其命甲午降授武功郎樞密院聽候使喚耿進特送處州羈管先是韓世忠奏進有反謀下大理法寺當進對其徒有下海歸鄉語比私罪徒追一官罰金使臣李明聽聞不審誤告世忠當死罪杖世忠上疏言無以懲後遂遷明一官而黜進世忠奏進反事見二年十月乙巳丙申乾化縣土兵作亂先是閣門祗候劉瑾以禦寇之勞就知縣事瑾日縱土兵剽掠人甚苦之會瑾改除江西兵馬副都監安撫大使司以右承事郎黃象先為代象先與瑾不協每裁抑之是日象先出郊飲酒土兵有盜民園蔬者象先執以屬吏其徒篡取以去象先怒後八日密遣土豪鄧密等以兵掩土兵寨盡殺其孥焚其居而去時嶽飛討虔寇朝廷命瑾以所部六百人為鄉導在虔吉間守臣侯延慶以象先屬吏言於朝象先坐罷去丁酉饒風關陷吳玠收餘兵趨西縣王彥收餘兵奔逹州彥潰兵走通明縣破之四川大震王彥奔逹州吳玠功績記云爾彥潰兵破通明惟劉長源奏議及之蓋他書無有也戊戌詔要郡次要郡守臣帶兵馬鈐轄路都監者並罷以言者論虛文無補也己亥御筆臨安自兵火後民地為官司軍營所占者其預買絹皆除之翌日輔臣言上戶往往以免下戶不能自陳宜遵詔旨蠲放上曰文王發政施仁必先四者凡施惠當先及下彼豪家雖立法抑之猶能侵細民不可不察也是日薩里罕入興元府經略司劉子羽焚其城而遁初饒風關陷子羽與吳玠謀守定軍山玠憚之遂西子羽亦退屯三泉縣從兵不及三百與士卒同粗糲至取草木牙蘖食之遺玠書曰子羽誓死於此與公訣矣時玠在興州之仙人關為守備得書而泣其愛將楊政大呼軍門曰節使不可負劉待制不然政輩亦舍節使去玠乃從麾下由間道與子羽會於三泉敵遊騎甚迫玠夜視子羽方酣寢傍無警呵者曰此何時而簡易乃爾子羽慨然曰吾死命矣夫何言玠泣下復往守仙人關子羽約玠共屯三泉玠曰關外蜀之門戶不可輕棄金人所以不敢輕入者恐玠躡其後耳若相與居下敵必隨入險反守徐取間道則吾勢日蹙大事去矣今經略既下玠當由興州河池繞出敵後褒斜山谷如行鼠穴敵見玠繞出其後謂將用竒設伏邀其歸路勢必狼顧吾然後據險邀擊可使遁走此所謂善敗者不亡者也子羽以潭毒山形斗拔其上寬平有水乃築壁壘凡十六日而成其衆稍集既而統制官王俊又以五千人至於是軍勢復振張同傳志補遺曰劉子羽自漢中西遁謂忠烈曰今漢中失守公不若與子羽同至閬州調兵以出破之未晚忠烈不從則又日以羽書邀促約共入兵按子羽留玠當是共守蜀口耳非欲同趨閬中也不然子羽胡為留三泉耶諸書毁子羽太甚今不然庚子詔伯琮特除和州防禦使賜單名從玉令學士院擬二十八字進入自擇瑗字以名之吏部員外郎權監察御史江南東西路宣諭劉大中言昨嶽飛提兵洪州頗有紀律人情恃以為安業今盜賊未息而飛既去則民不安農務失時欲望速賜選兵前來免致盜賊滋蔓詔以湖南安撫司統制官韓京為江西安撫大使司統制官將所部千五百人自衡州移吉州屯駐詔官兵所過州縣並具人數及所敷錢米與支用實數申尚書省尋命官軍所過毋得調夫此月壬寅皆用江東西宣諭劉大中奏也左迪功郎梅汝能為進武校尉汝能初以注列子授官法當審量用權丹徒縣日嘗有捕盜功而改命詔三省都録事自今不許赴御史臺故事通直郎以上遷官皆赴臺謝惟兩省侍從官則否至是御史臺令省史皆謝而朝請大夫中書門下省都録事魏弼等言舊例無之但文案散失不見故事遂有是旨蓋吕頥浩開陳欲以抑御史也其後頤浩去位卒改之九月丙子衝改辛丑詔天章閣神御二十五位旦望節序帝后生忌辰依舊逐位排設內應用羊肚者以他物代之上以每位當用一羊故有是旨且諭大臣曰祖宗以仁覆天下豈欲多殺物命吕頥浩曰陛下奉先盡禮而仁愛及於微物天下幸甚詔廣東諸郡盜賊所過被掠之家捐其稅用中書舍人趙思誠請也壬寅宗室瑗為貴州防禦史此據當時告詞所書癸邜樞密院言自來軍賞轉資禁軍副都頭廂軍副指揮使以上給降宣命禁軍十將以下三衙給帖今統兵去處既許軍前給據補轉資級欲並申朝廷改給付身方行支破請受從之甲辰詔諸州經總錢並委通判拘收用浙東提點刑獄公事孫近請也舊委守臣樁管而常為侵占移用至是始革之乙巳資政殿學士提舉臨安府洞霄宫謝克家知泉州詔諸路漕司移用錢每季具支使科名申戶部本部察其違法之甚者按劾以聞仍令諸州季具漕司取撥之數申戶部用議者請也是日河南鎮撫司統制官李吉敗偽齊兵於伊陽初孟邦雄既為鎮撫使翟琮所執而邦雄之黨梁進者復為劉豫守襲琮所寓治鳯牛山寨琮設伏擊之盡殪吉端氏人也梁進事不得其日按史吉以二月十九日敗孟邦傑于伊陽故繫此吉七月庚申補武功郎閣門宣贊舍人丁未知成都府王似始受川陜宣撫處置副使之命先是宣撫處置使張浚見似除書上疏言都統制吳玠參議軍事劉子羽有功于蜀不應一旦以似加其上尚書左僕射吕頤浩與似連姻聞浚論似非才不悅或告右僕射朱勝非以浚起義平江時常有斬勝非之語勝非又毁之浚由是得罪時浚承制以子羽為宣撫判官與似同治事大事多與子羽謀之似充位而已日歷二年九月丙戌知興元王似為宣副十二月甲辰又除知夔州盧法原成都續記似二年閏四月自成都移興元六月還成都十二月遷顯直冉任今年二月始為宣副張深代似知成都五月到任蓋道阻除命不時至故似二月始聞命耳子羽為宣判見於常同劾疏而浚子羽行狀墓志皆不書惟宣撫司案牘中有之今掇取附見虔賊周十隆率衆犯循梅汀州己酉詔統制官趙祥韓京申世景王進合兵捕之庚戌襄陽鎮撫使李橫為神武左副軍統制京西招撫使初橫既進兵偽齊右武大夫和州防禦使添差鄭州兵馬鈐轄牛臯武德大夫知汝州彭玘各以所部兵與橫會橫以便宜命臯為蔡唐州鎮撫使玘知汝州言於朝故有是命仍賜橫武翼郎以下告三百遂以臯為左武大夫安州觀察使賜橫空名告在此月壬寅今併附于此橫又言臣已起兵撫定尅復神京請命重兵宿將進屯淮西按兵勿動以揚聲援詔同都督江淮荆湖諸軍事孟庾淮東宣撫使劉光世江東宣撫使韓世忠措置徽猷閣待制廬壽鎮撫使兼知廬州胡舜陟改充淮西安撫使應本路鎮撫司並受節制時論者以為鎮撫兵皆烏合之徒其帥守與夫僚屬率多肆貪殘之威無子惠之德故民之復業者少宜稍選沿江諸郡長民之官責以勞徠勸相之任於是淮東已復置帥臣故改命舜陟初集英殿修撰葉煥知池州募官兵得三千人號曰敢勇分為五軍然所募多烏合不逞之徒煥不能制是日左軍反右軍擇甲將應之兵馬都監華旺大呼令釋甲左軍以諸軍不相應遂焚天王樓而遁煥檄池州統制官王進以所部追擊叛兵過江而潰事聞上謂大臣曰此事雖由小人喜亂亦守臣馭之失宜吕頥浩曰請先抽出過敢勇且分汰其餘衆乃議守臣之罪於是煥坐落職奉祠事聞在三月戊午煥奪職在六月甲申劉忠餘黨犯分寧武寧二縣江西大帥司遣統領官武經郎髙道修武郎司全合兵討平之後各遷一官二人遷官在十一月戊午辛亥工部尚書兼權吏部尚書兼侍講席益參知政事新除翰林學士兼侍讀徐俯為端明殿學士簽書樞密院事故事簽樞下執政一等至是特詔鈞禮又例外賜以金帶壬子降授右朝散郎提舉浙東茶鹽公事王然罷仍貶秩一等先是宣諭官朱異論然置明州三縣鹽場將沿海下戶一例拘籍其間有不願結甲及雖結甲而不願貸本錢至有憂畏而自縊或持仗而逐保正者言者亦論其擾民故有是命甲寅詔自今守臣到任半年先具民間利害或邉防五事來上因以察其材能翰林學士綦崈禮兼侍讀給事中胡松年兼侍講集英殿修撰提舉西京嵩山崇福宫檀倬祕閣修撰邵溥並復徽猷閣待制倬建德人宣和末嘗為給事中坐王黼黨廢至是始復之直祕閣提舉江州太平觀馬咸召對請申嚴鞫獄於本狀外别求他罪之禁頒之中外上納其言遂以咸試大理卿右中散大夫兩浙轉運副使徐康國罷仍貶秩二等先是康國獻羡錢十萬緡上不受宣諭官朱異左司諫唐輝論康國拋糴民戶米麥踰年不償故有是命王明清揮麈後録云韓璜叔夏為司諫奉使江外回赴堂白事徐康國為兩浙漕亦以執事入謁中書康國自謂揚歷已久率多傲忽既詣省候於廊廡以待朝退一緑衣少年已先在焉天尚未辨色康國初不知為叔夏也貌慢之偃然坐胡床雙展兩足於火踏子之上目視雲霄久之始問曰足下前任何處緑衣曰乍脫州縣時以事之湖外方以獻利害得審察之命因以求任使者康國疑為此輩易之曰朝廷多事之際隨材授官乍脫州縣者未易遽干要除堂吏過與之揖康國且詫於緑衣曰此某中奉也某在此儻非諸公調護亦焉能久安耶語未終丞相下馬遣直省吏致意康國曰適以韓司諫奉使廽得旨有所問未及接見吏引緑衣以登回首揖康國始知為諫官驚悵恐怖腳蹙踏子翻空灰火滿地皇灼而退越數日竟為叔夏彈其交結堂吏臣所目覩而罷洪邁夷堅丙志紹興初韓叔夏璜以監察御史宣諭湖南歸有旨令詣都堂以職事白宰相時朝廷草創官府儀範尚踈略兩浙副漕徐大夫者素以簡倨稱先在客次視韓緑袍居下坐殊不顧省久之乃問曰君從甚處至此韓答曰自湖外來徐曰今日差遣不易得雖見廟堂於事亦何所濟少焉朝退有省吏過廡下徐見之拱而揖曰前日指揮某事已即時奉所戒吏方愧謝望見韓驚而去徐固不悟繼復一人至其語如前俄有趨避而丞相下馬直省官抗聲言請察院徐大駭急起欲謝過方冬月燎爐在前袖拂湯瓶仆衝灰蔽室因不暇致一語韓既退除右司諫即具以所見劾之以為身任使者媚事胥徒遂放罷按韓璜以建炎四年九月除監察御史是年出使湖南治鍾相獄事紹興元年四月除右司諫十一月送吏部當康國罷浙漕時璜去言路久矣又按康國紹興二年五月因進銷金屏風事降二官乃中丞沈與求所劾與璜殊不相關邁纍年為史官不知何以差誤如此左承議郎襄陽鎮撫司參謀官趙去疾來獻捷上召見以去疾為左朝散大夫直龍圖閣仍命有司以米五千斛餉橫軍朝廷未知金房鎮撫使王彥之敗亦詔彥以軍食給橫時宣撫處置使張浚念非王庶不可修葺興元庶以左通議大夫責江州未行乃復起庶為參謀官使詣巴州措置梁洋一帶庶至巴急散榜梁洋境上招其軍民不數日逺近來會巴之北境即米倉山下視興元出兵之孔道始敵破金商無所得已失望薩里罕至金牛鎮不見兵疑有伏自以深入恐無歸路又聞庶在巴州吳玠陽為軍書會諸將欲斷敵歸路敵邏得之懼會野亡所掠食少盡乃引兵還興元詔劉光世韓世忠赴行在奏事以將易鎮也乙卯劉光世遣統制官酈瓊等以萬人屯泗州為李橫聲援偽齊劉豫葬偽太后翟氏於東平是月豫開貢舉得進士羅誘以下四十八人誘海州人也三月丙辰朔禮部尚書洪擬兼權吏部尚書丁巳浙西提舉茶鹽公事夏之文言去歲賣鹽增鈔錢五十萬餘緡所煎鹽增八百七十餘萬斤詔之文與其屬官皆遷官戊午賜貴州防禦使印初浙西安撫大使兼知鎮江府劉光世言本軍月費錢二十七萬緡朝廷及漕司才應副十六萬七千有竒雖有取撥鎮江一郡財賦之名而兵火之後所入微細欲盡撥歸漕司祇乞貼數應副都省言浙西提刑司具到鎮江酒稅課利田賦以紹興元年計之總為一百餘萬貫石匹兩兼本府水陸要衝商賈輻輳若諸色稅課悉歸公上則比之前日不無增羡乃如光世所奏財賦並令漕司拘收酒稅令兩通判措置遣入內東頭供奉官睿思殿祗候趙願往京西勞李橫軍詔兩浙諸州和買物帛聽以三分折納見緡用户部請也己未中書舍人趙思誠言州縣武臣添差甚衆一郡有至三四十人貪汚不法民受其弊望自今惟忠義及有功勞於國之子孫朝廷特加優恤者許添外差餘並禁止若以員多缺少自當稍清入仕之門以息官冗民貧之弊詔除宗室外令吏部開具申尚書省中書舍人洪炎兼權直學士院初炎因朔日轉對言趙姓出於少昊而原廟之祀止及於黃帝黃帝子孫蕃衍盛大王天下者蓋非一姓獨少昊及太祖開基以來未有大顯者望命諸儒討論一正禮典以盡尊祖之義事下禮部後不行炎章疏以辛酉降出今併附此庚申武義大夫閣門宣贊舍人知隨州李道領榮州團練使以樞密院言道能察軍情不受鎮撫之命理宜褒賞故也初命神武後軍統制兼都督府都統制巨師古以所部萬人屯揚州壬戌孟庾奏留之不許名湖州唐太子太師顔真卿廟曰忠烈用守臣汪藻請也召布衣蘇庠赴行在庠丹陽人父堅元祐中為太府卿庠少能詩不事科舉徐俯薦其賢於上令赴都堂審察固辭乃命鎮江以禮敦遣赴行在庠喪明不至淮西安撫使胡舜陟至廬州時潰卒王全王全初見正月辛未蹂境上督府檄招之全拒不從聞舜陟入境遂與其徒來降詔以全為承信郎擇其少壯之士五百人𨽻淮西軍籍王全以是月戊寅補官前郡將王亨籍官逋之在民者亡慮數萬緡舜陟盡蠲之亨又托名贍軍令市販輸金物物苛斂民擾且怨行旅幾絶舜陟罷之流民稍稍自歸舜陟發粟貸民俾濟農事俾秋登乃償會嵗大穰所收至倍公私皆給焉癸亥詔前降鎮撫司差官按察郡縣指揮並罷以殿中侍御史曽統言分鎮之地平時既無監司按察而一旦遽加繩削則將不可勝誅乞俟戎馬平定更選膚使布宣德意故有是命詔𣙜貨務都茶場除提領官并左右司外其餘官司並非所𨽻毋得勾喚吏人及取索文字以提轄官張純言本務係朝廷庫務依法不𨽻省寺故也於是榷貨事戶部不得預日歷無此敕旨今以今年十月壬辰戶部勘當狀修入以見常同論鹽法事張本甲子資政殿學士江西安撫大使知洪州李回落職提舉江州太平觀回老而慢其下多縱弛帥司屯兵數萬皆招收潰賊既無所憚又軍食不足恣其所為郡民夜不解衣惟恐生變宣諭官劉大中至江西奏回専權廢法且縱其子右宣教郎澡預政受金及多辟親黨攝官凡二十餘事朝廷初疑太多再下大中審實大中言十中之一二事耳事有大於此者於是江西轉運副使吳革韓瓊並罷而澡勒停回素與吕頤浩不諧由是不復而卒端明殿學士知建康府趙鼎為江西安撫大使兼知洪州鼎過信州舉人汪洋方志學之嵗裁書謁鼎鼎喜遂與偕行洋玊山人也京西招撫使李橫傳檄諸軍收復東京是日以其文來上略曰偽齊僣號自速剪平國運中興王師已進西壓淮泗東接海沂驛騎交馳羽書疊至我則兼收南陽智謀之士提大河忠孝之人仗義以行乘時而動又曰金商之兵出其先荆湖之師繼其後若能納欵則悉仍舊貫執迷不悟則後悔難追朝廷嘉之後五日詔橫自武功大夫袁州防禦使特遷右武大夫忠州觀察使丙寅詔讀書習射童子求試者九人惟習射者召見餘賜帛罷之上因謂大臣曰上有所好下必有甚焉蓋繇昨嘗推恩一二童子欲求試者雲集此雖善事然可以知人主好惡不可不謹也直祕閣知江州兼主管沿江安撫司公事孫佑言本州對岸自舒州至蘄黃數千里間盡為荒榛既非所統稍有動息别無斥堠甚非控守之計請蘄黃二州軍期控守事務並從本司措置從之仍詔大事聽江西帥司處置寇賊令湖北帥司應援其嶽州係長江上流緊要控扼之地守臣亦令帶沿江安撫俟盜賊寧息如舊丁卯省沿江三大帥官屬員詔自今臣僚上殿毋得輒論私事及有僥求對畢仍申閣門照會時直龍圖閣吕源自浙東使還賜對乞改正過名為言者所劾故有是命襄陽鎮撫使兼京西招撫使李橫獻金人之俘二十有二詔女真逹呼拉等四人處死其渤海漢兒分𨽻神武諸軍己巳徽猷閣待制知平江府李擢試尚書工部侍郎徽猷閣待制提舉亳州明道宫黃唐傳試給事中祕閣修撰浙東提點刑獄公事孫近為祕書少監並限三日赴行在是日潁昌捷奏至詔李橫再進翊衛大夫加賜空名告身二百令京西山寨並聽橫節制劉豫聞橫入潁昌遣使詣左副元帥宗維求援橫等軍本羣盜雖勇而無紀律見敵所遺子女金帛乃縱掠數日置酒髙會敵聞而易之豫遣其將李成以二萬人迎敵金遣左都監宗弼援之敗臯於京城西北牟駝岡橫等軍無甲皆敗走敵亦不敢深逐也潁昌復陷參議官榖城談世則為賊所執令其臨漢江招橫橫不答世則遇害庚午右承事郎陳正彚直祕閣主管亳州明道宫正彚黨人瑾長子也崇寧中上書訟蔡京罪流海島者十餘年上聞其名召見將用之正彚稱疾求去乃有是命初大理正劉藻乞借官許用蔭贖刑部請係朝廷許便宜從事實因功勞先次擬補官之人犯贓私罪杖非重害者及公罪徒並贖從之辛未故直徽猷閣知應天府凌唐佐以死事贈徽猷閣待制上命其從孫閣門祗候憲往潁昌津致其家且賜金五十兩為道路費先是唐佐妻子皆為劉豫所囚李橫入許始知其狀言于朝遂命收恤之而道已梗矣初命神武副軍都統制嶽飛督捕虔寇而飛言軍無春衣乃出戶部帛萬五千賜之仍令吉州𣙜貨務就賜錢三萬緡為行軍費於是飛有衆二萬四千餘人詔江西廣東湖南三漕臣濟其軍食武德大夫知汝州彭玘為武功大夫髙州刺史壬申閣門宣贊舍人神武中軍右部統領韓世良帶御器械詔貴州防禦使瑗育在宫中不可與諸宗室比特給真俸從內東門司供納癸酉命起復鎮潼軍節度使開府儀同三司孟忠厚朝謁昭慈獻烈皇后攢宫以將再期也左承務郎通判潭州張掞坐與孔彥舟馬友交通下吏計贓抵死以昭慈外親免編配送韶州收管掞妻趙氏宗室女有美色彥舟之敗也掠其妻以去至是抵罪東流令王鮪坐贓抵死除名編管新州自是贓吏罕復黥配矣甲戌尚書左司員外郎王庭秀言朝廷比來深疾貪吏然州縣之間豈無亷介自將沉於下僚者望命五使所至以亷潔清修可以師表吏民者具名來上參以公議不次升擢以厲士風從之直祕閣主管萬壽觀吕抗吕托並改在外宫觀任便居住以其父頥浩言京祠當奉朝請於班列間不免與百官相見恐致嫌疑也宣撫處置使張浚奏劉子羽吳玠王彥饒風嶺勦殺金人丁丑進士聞人武子特補從政郎孟庾之使閩中也武子以客從軍箋奏至是得官江東西路宣撫使韓世忠言近旨諸軍不得互相招收請自今官兵已受宣敕者並於紙背書寫軍號用印以為照驗詔從其請自今批勘官吏失察者徒二年初惠州獄囚黃四等七人有司以為強盜當死司士曹兼管左推勘公事孟師尹録問駁正無罪及是上聞之特遷右宣教郎知營道縣既而有司言師尹嘗平反死囚五人特命遷一秩師尹遷秩在明年正月乙亥左朝奉大夫知藤州侯彭老獻賣鹽羡錢千萬上批其奏付三省曰縱有寬剩自合歸之有司非守臣所當進納或恐妄有刻剝取媚朝廷特降一官以懲妄作所進物退還翌日徐俯又以為言彭老遂罷彭老延慶兄也詔衢州守臣汪思溫追捕事魔為首之人重置於法毋得張皇騷擾先是衢州妖民余五婆居開化之九里坑傳習魔法新除祕書少監孫近在浙東恐其為變請命衢嚴州守臣捕治禁止故有是命時江浙州縣溪山深僻之民更相傳教各有主首願為徒侣之人即輸錢上簿聽其呼率私置軍器羣起舉事里正恐其纍已匿不告官由是其徒轉熾既而近又言江浙山谷之民平時食肉之日有數所以易於食菜今者一槩株連黨與則其衆不可勝治乃命為首者取旨論罪其餘皆釋之御史曽統亦言開化接連徽嚴二州之間地險而僻其人勇悍喜鬬不可不早為之圖望捕為首三人法外行遣自餘徒黨一切出榜釋其罪戾免致反側生變從之而亂已作矣統奏在四月庚子今附書之此為今年五月繆羅事始戊寅內侍賈翊責監英州宜安鎮鹽稅日下出門親衛大夫寧州觀察使福建路馬步軍副總管韋淵提舉亳州明道宫以淵引疾有請也皇后母福國夫人熊氏言家無居第乞令臨安府蓋屋十五間為皇后宅上不許命以官屋假之辛巳詔浙西安撫大使司統制軍馬兼知泰州張榮兼知承州王林並以所部聽帥司節制以湯東野有請也壬午太尉武成感德軍節度使神武左軍都統制江南東西路宣撫使韓世忠開府儀同三司充淮南東路宣撫使泗州置司朝廷聞李橫進師議遣大將以劉光世兵不練而世忠忠勇故召見而遣之仍賜世忠廣馬七綱軍士甲千副激賞銀帛三萬匹兩又出錢百萬緡米二十八萬斛為半歲之用命户部侍郎姚舜明往泗州總領錢糧賜世忠甲在三月甲戌支錢糧在癸未賜綱馬在四月辛卯壬辰遣舜明在丙申倉部郎官孫逸詣平江府常秀饒信撫州督發軍食直祕閣提舉廣南市舶宗頴添差都督府參議官右宣教郎通判和州賈直清提舉淮西茶鹽公事兩淮舊為分鎮地至是始命監司言者論軍屯所至發掘冢墓及借取平民首級之弊詔以付神武諸將宣撫處置司同統制官楊政率兵入偽地因糧攻討是日至水洛城與賊遇乃還癸未左朝奉大夫提舉建州武夷山沖佑觀胡世將復徽猷閣待制知建康府直徽猷閣知靜江府許中降職一等時中原士大夫避亂者多在嶺南上數詔有司給其廪祿中言本路諸州賦入微薄請禁寄居官毋得居沿邉十三郡見寓止者皆徙之仍毋給其祿上惡之故有是命詔今後贓吏依祖宗舊制斷訖令刑部鏤板行下以兵部員外郎劉景真有請也大理正劉藻請諸路獄案情犯未圓者除命官外更不取會令刑寺悉行兩斷委憲司遣官審問定歸一斷事下本寺本寺奏如所請其不可定歸一斷者即上朝廷酌情處斷施行從之甲申右承議郎新通判溫州陳桷直祕閣賜五品服桷為韓世忠所厚故上召對而申命之詔自今進士䇿問及銓試選人時議並以七書為題一首既而言者以為文具遂不行四年二月辛亥禮部侍郎陳與義申請不行今并附此初江西安撫大使司將官李宗諒燕筠以所部叛於筠州引兵侵瀏陽諸縣李綱為湖南安撫使遣兵擊降之詔宗諒筠戮於市其衆分𨽻諸軍按宋史繫壬午日江東轉運判官陳敏識黜監嶺南諸州市征以言者論其頃在分寧首欲降敵也建炎以來繫年要録卷六十三金人地名考證薩里罕原書作撒離喝誤改見卷十一逹呼拉原書作逹鶻辣誤今改正建炎以來繫年要録卷六十三
