body:
  text: 建炎以來繫年要録卷四十二宋李心傳撰紹興元年二月戊辰朔廣東經略司言賊李冬至二犯英連韶郴等州冬至二者宜章人以軍興賦重不能保遂與其徒作亂自號平天大王詔湖廣憲臣招捕是日祝友以其軍降於劉光世初友在新店欲侵宣州阻水不克渡㑹光世遣人招之友留其使彌旬然後受招時江東路兵馬副鈐轄王冠在溧水駐軍友移書假道以趨鎮江冠不從友引兵擊之冠軍大敗友遂自句容之鎮江光世分其軍以友知楚州先是史康民在淮南與友合軍康民之軍極富以金寶賂光世光世喜康民遂得進用己巳監察御史江躋為尚書吏部員外郎禮部尚書秦檜兼侍讀翰林學士汪藻中書舍人胡交修並兼侍講朝請大夫和州無為軍鎮撫使趙霖復直祕閣庚午執政言劉光世軍中乏糧遣考功員外郎仇悆往究其實上曰光世一軍月廪萬數如此宜速為屯田之計富直柔曰近辛道宗具陜西弓箭手法頗類屯田之制范宗尹曰容臣等細議之悆益都人也尚書省乞檢舉行遣常程文字從之改行宫禁衛所為行在皇城司詔朝奉郎知益陽縣魏舜臣俟任滿升擢差遣以御史韓璜論其嘗拒鍾相也時知漢陽軍馬友以糧乏遣其將王成率衆渡江犯鄂州副總管張用率精兵登城詰問以神臂弓射之成乃退翊日李允文即以友權荆湖南路招捉公事友盡取漢陽財物往湖南道過嶽州守將吳錫棄城去率精兵數千自益陽入邵州舜臣時權州事為所逐馬友吳錫魏舜臣事皆據趙甡之遺史參修但未得本月日按日歷友自叙狀云今春乞糧於鄂而李直閣差友殺劉忠招捉湖南盜賊行次嶽州知郡吳錫先已去友遂權駐其地狀以五月十六日至行在不知何時所遣然孔彥舟三月九日已焚潭州則友離漢陽必在二月也故因舜臣事附見遺史言允文以友為湖南副總管而狀中乃云招捉公事今從之熊克小歷紹興元年春益陽有吳錫者提兵七千屯本縣告邵州守臣魏舜臣乞糧不得錫以兵趨郡舜臣懼而走以胡安國與宰相書考之錫破邵州在今年七月四日蓋是時舜臣權守倅也今併附此江州兵馬副鈐轄劉紹先以殘兵七百人赴朱勝非是日邵友以數千人犯筠州守臣朝請郎王庭秀與鄂州統制官修武郎傅樞方共飯聞冦至即與官吏棄城走豐城縣辛未同知樞密院事李回言士大夫自衢信來者皆稱張俊軍行極整肅上曰朕亦聞之犯軍律者已誅六七人矣范宗尹曰臣已以書奬其美上曰待亦作詔勉之立功俊心忠謹惟好官職正當以此使之張守曰陛下深得御將之術朝請大夫葉宗鄂復直龍圗閣知洪州是日邵友犯臨江軍守臣朝奉大夫康倬遁去江西安撫大使司統制官吳全以其軍夜奔新喻縣倬識子也識河南人元祐間引進使於是朱勝非以兵少自新喻南去取兵於吉州壬申初定每嵗祭天地社稷如奏告之禮用權工部侍郎韓肖胄奏也詳見去年十一月甲辰癸酉詔張浚措置津發四川上供金帛赴行在自置宣撫司而上供悉為截留以備軍食至是户部以將行大禮及行在急闕為言故有是命然川陜用度繁截留如故日歷不載此按今以紹興二年四月二十二日户部申明狀修入詔江湖福建路憲臣遍詣所部剗刷應干合起金銀錢帛赴行在亦以將行大禮也故朝奉大夫吕希純追復寶文閣待制希純公著第三子元祐中書舍人黨籍待制以上第二十四人道州安置新除襄鄧隨郢鎮撫使桑仲始受命是日以其都統制霍明知郢州霍明申省狀云紹興元年二月六日准桑仲差知郢州初仲在京西連跨數州無糧食人相啖又數為金州人所敗欲引衆北去至是次棗陽縣始被鎮撫使之命遂還襄陽駐軍文林郎金房安撫司幹辦公事晋城續觱獻書於宣撫處置使張浚曰談兖守鄧州披荆榛保孤壘屢戡大盜奉朝廷法令隱然若一長城曽不得鎮撫使而仲乃得之是奬亂也朝廷在逺未詳仲凶逆之狀不然豈有舉四郡數千里之百姓委之餓虎之喙乎今仲連敗衄於安康此正天亡之時若使兖併力勦除稍申國威而以鎮撫使命兖則忠義知勸盜賊少戢矣襄陽為朝廷基本利害甚大相公豈可不從權易置浚深嘉觱言而不能用郢州新遭曹成之後百室無一二存者仲俾霍明領兵二千守之明邯鄲人為遞鋪曹司有膂力善戰而敢殺郢與德安接壤鎮撫使陳規藉其通船運每以恩信結之明自是與規通好不絶曹筠撰陳規行狀桑仲為鎮撫使其副霍明别以精兵數萬屯郢州郢鄰德安公欲以恩信結之因奏明知郢州仍請加美名朝廷從之自是郢與德安通好不絶蓋結之以恩者實所以間明之附仲也按日歷紹興二年五月五日霍明申紹興元年二月六日䝉鎮撫使桑仲差知郢州不去嘗受朝命行狀誤也趙甡之遺史云明在郢與德安通書陳規亦藉其通船路此言有理今從之甲戌詔江淮招討使張俊速往措置以降授中散大夫提舉臨安府洞霄宫湯東野為本司參謀官朝廷始聞江州失守故有是命丙子臨安府觀察推官沈長卿監都稅院沈震陳祖安司理𠫭軍葉義問並勒停時長卿等上書論范宗尹過失詔責以中傷大臣力肆詆毁露章臺省搖動衆情此而不懲為患滋大宗尹抗疏為請後四日乃寢其命長卿烏程人祖安閩縣人義問夀昌人也廬夀鎮撫使李伸之被執也其統制軍馬武顯郎閣門宣贊舍人髙彥以所部走廣德軍至是就招赴行在詔以其衆𨽻神武左軍𨽻左軍在此月癸巳戊寅詔禮部御史臺太常寺條具明堂合行事件申尚書省時上以當行大禮命近臣議之𠫭知政事張守欲行祫饗禮禮部尚書秦檜建言頃嵗渡江冬祀儀物散失殆盡宗廟行事登樓肆赦不可悉行至於祫饗又不及天地惟宗廟明堂似乎簡易茍採先儒之說而略其嚴父之文志在饗帝而不拘於制度之末尚或可舉議遂定詔自今盜賊令州縣極力措置毋得申奏陳乞及擅便招安用知鄂州髙衛奏也己卯日中有黑子淮康軍承宣使神武副軍都統制辛企宗為福建路制置使時南劒賊余汝霖余勝等作亂輔臣欲假企宗事權故有是命辛巳禮部尚書兼侍讀秦檜𠫭知政事龍圗閣待制孫覿時知臨安府以啓賀檜有曰盡室航海復還中州四方傳聞感涕交下漢蘇武節旄盡落止得屬國唐杜甫麻鞋入見乃拜拾遺未有如公獨參大政檜以為譏已始大怒之徽猷閣待制知建康府趙㠓乞免詔㠓提舉臨安府洞霄宫直寶文閣張縝知建康府壬午延福宫使奉國軍承宣使入內內侍省都知提舉禁衛董慤提舉臨安府洞霄宫從所請也初張榮率舟船至通州過捍海堰欲出海復歸山東水阻不得去榮遂入通州糧日盡取人為豝以食民之得脫者無幾是日日中黑子消伏翌日范宗尹進呈因言故事當避殿减膳今人情危懼之際恐不可以虛文搖動羣聽望陛下修德以消弭之臣等輔政無狀義當罷免上曰日為太陽人主之象豈關卿等惟在君臣同心行安民利物實事庶幾天變不至為灾也詔度支員外郎韓球所刷饒信州錢糧除應副張俊軍須外並發赴行在時已罷移蹕之議故有是㫖癸未詔以季秋大饗明堂江淮招討司隨軍轉運使詹至言大敵在前國勢不立請停大饗以其費佐軍仍督諸將分道攻守以慰在天之靈繼志述事莫大於此至桐廬人也刑部尚書胡直孺兼侍讀右諫議大夫黎確言福建盜起夲於科斂誅剝民不堪命今自范汝為以下官者二三百人而聚萬衆於建安辛企宗坐視而不能制謝嚮順從而不敢違建邵之間雞犬一空橫尸滿道逺近謂之謝范而不敢名其無生理殆亦可見願稍分汝為之衆以弱其勢擇官吏信厚練逹閩人素所畏愛如梁澤民張穆李芘輩委以一路之寄汰牧守之無狀者權免二年科配使前日脅從之輩得齒於民非小補也詔企宗嚮放散汝為下見團結人兵又詔民兵願歸農者許自便汝為不聽命又詔在此月丙戌甲申詔神武前軍統制王􅊛依舊聽江東安撫大使吕頥浩使喚與江淮招討使張俊大軍掎角討捕馬進等賊用頥浩請也頥浩又乞俟俊至江東令與臣約日於饒州或本路其他州縣㑹合計議從之朝奉大夫鄭望之復集英殿修撰詔自今郡守在任改移並俟新官合符方得離任二年十月衝改乙酉江西安撫大使朱勝非言方今兵患有三曰金人曰土賊曰游冦金人自冬涉春不聞南渡所謂游冦者皆江北劇賊自去秋以來聚於東南所謂土賊者二年以來為害日大原其實情似有可矜南人資産素薄比年科率煩重願特降寬詔稍蠲苛擾按贓吏之尤重者舉行祖宗顯戮之典以慰疲民疏奏詔諸路憲臣詰諸州之科率者餘依已降德音施行時勝非又論東南盜賊則欲招撫西北劇冦則命之以官使流離北人各得其所汰被敵老弱與不從軍者留其精鋭使散處諸軍如此當不復為患至於江西土冦皆因朝廷號令無定橫斂不一名色既多貧民不能生以至為冦臣自桂嶺而來入衡州界有屋無人入潭州界有屋無壁入袁州界則人屋俱無良民無辜情實可憫陛下時降寬詔擇其首領與補官收𨽻軍籍而散遣其徒使民還業則江西之亂可指日平也不然則為盜者日衆勢必南軼湖南二廣皆不得安矣先是勝非被命宣撫江湖三路首訪民瘼皆云正稅之外斜科繁重乃令民間陳其色目稅米一斛有輸及五六斛稅錢一千有輸及七八千者如所謂和糴米與所輸正稅等而未嘗支錢他皆類此勝非因極論其事疏纍萬餘言范宗尹當國既未嘗歷州縣不知民間疾苦又惡聞弊事摘勝非所奏十去七八畫㫖依已降赦令而已按勝非此疏今見於日歷者凡一百五十字其節略多矣時勝非在吉州有兵才數千亦非精鋭故未能之鎮丙戌復祕書省仍詔監少不並置置丞郎著佐各一員校書郎正字各二員范宗尹嘗因奏事言無史官誠朝廷闕典繇是復置有崔紹祖者為金人所掠自南京遁歸詐稱越王次子保信軍承宣使受上皇蠟韶為天下兵馬大元帥興師取陷沒州郡是日至夀春府和州鎮撫使趙霖以聞詔文字不得奉行召皇姪赴行在霖是月辛卯奏三月辛亥得㫖召赴行在今併書之十月戊子行遣龔相記歷陽死事及王亨乞奏薦狀皆稱為元帥趙不瓌蓋紹祖七月丙午初赴獄時自稱趙不瓌故也紹祖九月乙卯因御史臺檢法官晏敦復審問稱所招不實移御史獄方招當考戊子執政奏事范宗尹問隆祐皇太后聖體上曰昨有少虛風證朕旦暮未嘗敢離側已三夕不解衣宿頓减矣己丑詔湖南馬步軍副總管孔彥舟與吕頥浩張俊㑹兵討李成頥浩聞彥舟欲自袁州引兵之江西故有是請先是上親筆命彥舟解圍江州彥舟不奉詔而上疏論成分鎮之初不能安分越境侵漁以希孟嘗春申之事以臣料之其敗有三然圗之急則禍結而民不安圗之緩則怨集而衆必離蓋湖南見有劉忠張用之徒環列境上若舍近而圗逺恐九江之圍未解而先失湖南湖南既失二廣必危非計之得者也遂以所遺成書進呈然彥舟實不欲擊成故為之游說詔彥舟分兵聽向子諲節制親領大兵赴江西毋失機㑹庚寅張浚奏本司都統制曲端自聞吳玠兵馬到郡坐擁重兵更不遣兵策應己責海州團練副使萬州安置詔依已行事理初浚自富平敗歸始思端及王庶之言可用庶時以朝議大夫持母喪居蜀乃併召之庶地近先至力陳撫秦保蜀之䇿勸浚收熙河秦鳳兵扼關隴以為後圗浚不納求終制不許乃特授參議官浚徐念端與庶必不相容暨端至半道但復其官移恭州宣撫處置使司主管機宜文字楊斌素與庶厚知庶怨端深乃盛言端反以求合又慮端復用謂端反有實跡者十又言端客趙彬揭榜鳳州欲以兵迎之秦鳳副總管吳玠亦懼端嚴明譛端不已庶因言於浚曰端有反心久矣盍蚤圗之㑹蜀人多上書為端訟寃浚亦畏其得衆心始有殺端意矣此以王之望西事記趙甡之遺史費士戣蜀口用兵録參修辛卯尚書右司員外郎王俁知卭州俁初除閬州未行復改命都司題名俁以二月出知卭州而日歷不見除閬之日但於此日書改除故繫於此左武大夫秀州防禦使陳剛中同主管閣門公事剛中浙人父彥本日者以權幸薦至大官言者以為法當討論遂寢其命壬辰朝散郎新除尚書工部員外郎廖剛為福建路提㸃刑獄公事先是順昌盜余汝霖作亂剛遣使招降之㑹本路提㸃刑獄公事陳桷請奉祠詔桷主管江州太平觀而剛有是命剛延平人也桷得祠在庚寅今聫書之宣義郎新知大宗正丞吕抗提舉荆湖東路茶鹽公事抗頥浩子初見建炎三年三月是日雨雹癸巳詔侍從臺諌條具保民弭盜遏敵患生國財之䇿翰林學士汪藻熊克小歷作兵部侍郎兼權直學士院蓋誤藻去年十二月已除學士上馭將三說一曰示之以法二曰運之以權三曰别之以分大略謂諸將過失不可不治今陛下對大臣不過數刻而諸將皆得出入禁中是大臣見陛下有時而諸將無時也道路流傳遂謂陛下進退人材諸將與焉又廟堂者具瞻之地大臣為天子立政事以令四方者也今諸將率驟謁徑至便衣密坐視大臣如僚友百端營求期於必得朝廷豈不自卑哉祖宗時三衙見大臣必執梃趨庭肅揖而退蓋等威之嚴乃足相制又遣將出師詔侍從集議者所以博衆人之見今則諸將在焉且諸將聽命者也乃使之預謀彼既各售其說則利於公不利於私者必不以為可行便於已不便於國者必不以為可罷欲其冒鋒鏑趨死地難矣自今諸將當律以朝儀毋數燕見其至政事堂亦有祖宗故事且無使𠫭議論之餘則分既正而可責其功是三說果行則足以馭諸將矣何難乎弭盜何憂乎遏敵哉若夫理財則民窮至骨臣願陛下毋以生財為言也今國家所有不過數十州所謂生者必生於此數十州之民何以堪之惟痛加裁損庶乎其可耳外之可損者軍中之冒請內之可損者禁中之泛取今軍中非戰士者率三分之二有詭名而請者則挾數人之名有使臣而請者則一使臣之俸兼十戰士之費有借補而請者則便支廪祿與命官一同聞嶽飛軍中如此者數百人州縣懼於憑陵莫敢呵詰其盜支之物可勝計哉臣竊觀禁中有時須索而户部銀絹以萬計禮部度牒以百計者月有進焉人主用財須要有名而使有司與聞至於度牒則以虛名而權實利以濟軍興之用誠非小補幸無以方寸之紙捐以與人而不知惜也然臣復有私憂過訃者自古以兵權屬人久未有不為患者蓋與之至易收之至難不早圗之後悔無及國家以三衙管軍而出一兵必待密院之符祖宗於兹蓋有深意今諸將之驕樞密院已不能制臣恐賊平之後方勞聖慮自古偏霸之國提兵者未嘗乏人豈以四海之大而寥寥如此意偏裨之中必有英雄特為二三大將抑之而不得伸爾謂宜精擇偏裨十餘人各授以兵數千直屬御前而不𨽻諸將合為數萬以漸消諸將之權此萬世計也給事中陳戩言今日之計當省徭薄賦敦本厚生先以保民然後聽諸盜自相糾擲占上流據形勢恭儉節用量入為出斥內庫之藏以歸太府此弭盜遏敵生財之䇿也中書舍人胡交修言盜賊之起惟其飢凍無聊日與死迫然後棄而為之陛下哀憫無辜詔許自新官無急征暴斂而俾安其故髙下種植而無廢壤男女耕織而無懈人榖帛不可勝用則弭盜而財裕矣日者翟興在西洛什伍其民為農為兵不數年雄視一方彼起於卒徒猶能屹然自立於敵巢之中而不可犯矧吾以東南二百郡欲強兵禦敵而不能為興所為乎中書舍人洪擬言兵興纍年饋餉悉出於民無屋而責屋稅無丁而責丁稅不時之須無名之斂殆無虛日所以去而為盜今閩中之盜不可急宜求所以消之江西之盜不可緩宜求所以滅之夫豐財者政事之本而節用又豐財之本是時諸將中劉光世尤橫故汪藻有是言藻書既傳諸將皆忿有令門下作論以詆文臣者其略曰今日誤國者皆文臣自蔡京壞亂紀綱王黼收復燕雲之後執政侍從以下持節則喪節守城則棄城建議者執講和之論奉使者持割地之說提兵勤王則潰散防河拒險則逃遁自金人深入中原蹂踐京東西淮南之地為王臣而棄地棄民誤國敗事者皆文臣也間有竭節死難當橫潰之衝者皆武臣也又其甚者張邦昌為僞椘劉豫為僞齊非文臣誰敢當之自此文武二途若氷炭之不合矣詔中大夫直龍圗閣姚舜明武功大夫中州刺史劉紹先並勒停令吕頥浩軍前使喚以責後效侍御史張延夀以內艱去位初馮長寧既以淮寧降劉豫京西轉運使檄武功大夫范福權知蔡州福率軍民固守執僞命知陳州楊勛斬其使蔡人以聞詔加福右武大夫果州團練使朝廷猶未知長寧在僞庭乃召長寧赴行在金人以舟載江浙所掠輜重自洪澤入淮至清河口假宣教郎國奉卿在趙瓊水寨與瓊夜劫其舟得李梲所攜户部尚書印上之日歷五月四日真揚鎮撫使郭仲威奏分遣冦宏統制軍馬邀擊金人至宿遷縣收到户部銅印蓋申奏之詞云耳今從遺史是日雪乙未直祕閣新江西轉運判官張穎移廣西路以其母吉氏有請特優之也頴孝純子已見朝奉大夫趙士諒知嶽州朝廷聞吳錫已去故遣士諒為守言者請郡國經兵火處更置丁産財穀簿書期以半嵗從之丙申復詔諸路提刑司類省試於是川陜宣撫處置使張浚始以便宜合川陜舉人即置司類省試自是行之至今二年六月癸卯始降㫖就宣司類省試熊克小歷自此始蓋誤楊希仲榜在此年方試時未嘗降㫖也丁酉宣教郎范燾除名潮州編管坐誣訟孟忠厚且及太母也事祖見去年十二月乙酉是月降授朝請大夫守中書舍人致仕李公彥卒年五十三初金人至德順軍經略使劉錫遁去金人以兵少不敢由秦亭聲言分三道而獨出沿邉以掠熙素多馬金人駐兵搜取無遺馬步軍副總管中亮大夫同州觀察使劉惟輔將遁去顧熙州尚有積粟恐敵因之以守急出悉焚之敵追及所部皆走惟輔與親信數百匿山寺中遣人詣夏國求附屬夏國不受其親信趙某詣金軍降金執惟輔誘之百方終不言怒捽以出惟輔奮首顧坐上客曰國家不負汝一旦遂附賊耶即閉口死不復言第六將韓青者間行從惟輔為敵所擒罵敵不降而死統制官等遂以熙河降知蘭州龕谷寨髙子儒聞惟輔尚存固守以待及城陷先刃其家而後死子儒狄道人也金人既略熙河地遂引歸李彥祺在古原州張中孚及其弟中彥導金人劫降之趙彬引敵圍慶陽守將楊可升堅守不降五路陷秦鳳經略使孫渥收本路兵保鳳州統領官關師古收熙河兵保鞏州左副元帥宗維既得關中地遂悉割以豫僞齊陜西全陷不見本月日熊克小歷於建炎四年十一月末書之趙甡之遺史分見四年十一月紹興元年三月末費士戣蜀口用兵録所書尤略按張鈞續忠義録紹興元年三月九日金人大軍回自熙河至弓門寨鈞所書蓋據宣撫司案牘則盡失六路在二月間無疑今併附此月末關陜之陷也士大夫守節死義者甚衆隴州既失守朝請郎知州事劉化源不肯降敵使人守之不得死遂驅入河北販買蔬果隱民間者十年終不屈辱奉議郎通判原州米璞亦杜門謝病卒不受汚化源璞世家耀州西人皆敬之敵入鳳翔秉義郎權知扶風縣康傑與敵將馮宣戰宣愛而欲招之傑奮曰吾今也當死於陳不能死於敵宣殺之忠翊郎知天興縣李伸為敵所圍堅守不下城既陷伸曰吾豈使敵殺我遂自殺時慶陽圍急成忠郎盧大受欲㑹合軍民收復邠寧二州解慶陽之圍為人所告送寧州獄論死敦武郎秦州定西寨都監兼知寨鄭㳙為敵所攻袒臂而戰及城破自刺不死金人髙其節亦弗害也是時守令以城下者敵僞皆因而命之文林郎知彭陽縣李哲獨不降與其民移治境上僞令執之以獻欲官之凡三辭其後金人以為歸附命為儒林郎哲言於所司曰元係捕獲不敢受歸附之賞以其牒還之有武功大夫知環州安塞寨田敢者嘗得太祖御容欲間行南歸以獻事泄杖之死其後武功大夫秦鳳路兵馬都監劉宣以蠟書密遣人與吳玠相結且率僞將任拱等以所部歸朝約日已定有告之者取宣絲擘之其家屬配曹州豫又升渭州為平凉府去慶陽延安府名復舊州名即以叛將張中孚守平凉府中彥守秦州趙彬守慶州慕容洧守瓌州後中孚纍遷陜西節制使兼兵馬都統中孚及李彥琪自羈管中劉錡以為將而叛建炎以來繫年要録卷四十二
