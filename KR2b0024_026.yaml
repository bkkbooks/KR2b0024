body:
  text: 建炎以來繫年要録卷二十六宋李心傳撰建炎三年八月按是月丁未朔戊申環慶經略使王似言方今用兵之際關陜六路帥乞皆用武臣吕頤浩曰臣少識种諤眇小而為西夏信服今之武帥類皆鬬將非智將罕見如諤之比杜充曰方今艱難帥臣不得坐運帷幄當以冒矢石為事上曰王似未知武臣少能知義理若文臣中有智勇兼資練達邊事如范仲淹者豈必以親臨矢石何為多藉武帥己酉移浙西安撫司於鎮江府臨安守臣改帶管內安撫使翰林學士曽楙試禮部尚書龍圖閣待制知台州謝克家試兵部尚書右文殿修撰江淮等路發運副使葉煥為徽猷閣待制知鎮江府煥進職在壬子今併書之壬子資政殿學士權知三省樞密院事李邴以本職提舉杭州洞霄宫邴與吕頤浩論不合力丐免乃有是命按宋史繫庚戌日資政殿學士權同知三省樞密院事滕康進權知三省樞密院事吏部尚書劉珏為端明殿學士權同知三省樞密院事仍許珏綴執政班奏事詔尚書吏部侍郎髙衛從衛往洪州仍兼御營使司參贊軍事沿路因便處置控扼及具形勢以聞時雖下詔堅守建康而議者以為朝廷隂為避敵之計吕頥浩因奏事為上言如曾楙尚疑之况小民乎宜量留嬪御掌批奏牘以固人心且免令內臣權管恐其不密㦯緣此開端上納之按洪州之行潘賢妃實往而張才人吳夫人留上左右恐用頤浩納說也甲寅劉文舜冦舒州通判權州事鄭嚴遣人以禮待之文舜喜遂入城秋毫不敢犯嚴請於朝以文舜為淮西都巡檢使賜金帶嚴鍾離人也龍圖閣待制陜西節制使王庶罷徽猷閣直學士知慶陽府王似為陜西節制使初庶聞敵去復入延安而城不可守乃移駐洛交收召散亡㑹詔庶守長安庶益治軍且上章請不能守延安之罪遂罷去延安之陷也金人移兵趨環慶路似選徑兵邀擊于險兵不能進故用之乙卯詔應侍從官非功在社稷及死於國事之人所得官給葬事指揮勿行以言者有請也此據紹興三年正月十九日廣東轉運判官章傑申省劄子增入日歷在乙丑丙辰詔祠部度牒改用綾紙倣茶鹽鈔法用朱印合用號仍增綾紙工直錢十緡通舊為百二十緡以尚書户部侍郎葉份兼權禮部侍郎提領措置自治平末年始鬻度牒李燾長編熙寧元年七月戊戌注前此未嘗書賣度牒因錢公輔言表而出之鬻度牒蓋始此年按實録治平四年十月庚戌賜陜西轉運司度牒千道糴穀賑濟此云始於熙寧元年事亦相近渡江後軍興費廣用度多仰之舊以黃紙印造故僞者易為至是户部郎中朱異等以為言始有是命既而户部無見綾乃改用絹辛酉廣州州學教授林勳獻本政書十三篇勳以為國朝兵農之政大抵因唐末之故今農貧而多失職兵驕而不可用是以饑民竄卒類為盜賊宜倣古井田之制使民一夫占田五十畝其有羡田之家毋得市田其無田與遊惰末作者皆驅之使為𨽻農以耕田之羡者而雜紐錢榖以為什一之稅本朝二稅之數視唐增至七倍今本政之制每十六夫為一井提封百里為三千四百井率稅米五萬一千斛錢萬一千緡每井賦二兵馬一匹率為兵六千四百人馬三千五百匹此方百里之縣所出賦稅總數嵗取五之一以為上畨之額以給征役無事則又分為四畨以直官府以給守衛是民凡三十五年而役始一遍也悉上則嵗食米萬九千餘斛錢三千六百餘緡無事則减四分之三皆以一同之租稅供之匹婦之貢絹三尺綿一兩百里之縣嵗收絹四千餘匹綿三千四百斤非蠶鄉則布六尺麻二兩所收視綿絹率倍之行之十年則民之口算官之酒酤與凡茶鹽香礬之𣙜皆可弛以豫民其說甚備書奏以勳為桂州節度掌書記其後勳又獻比校書二篇大略謂桂州地東西六百里南北五十里以古尺計之為方百里之國四十當墾田二百二十五萬頃有田夫二百四萬餘人出米千二十四萬斛祿卿大夫以下四千人賦兵三十萬人今桂州墾田約萬四十二頃丁二十一萬一千稅錢萬五千餘緡苖米五萬餘斛州縣官不滿百員官兵五千一百人蓋土地荒蕪而遊手末作之人衆是以地利多遺財用不足皆本政不修之故勳臨賀人也壬戌隆祐皇太后登舟發建康百官辭于內東門上猶慮金人驟來密諭滕康劉珏令緩急取太后聖㫖便宜以行此據李正民乘桴記按宋史繫己未日癸亥徽猷閣待制洪皓奏自壽春府由東京出界吕頥浩曰將來崔縱未必不先到上曰今奉使欲如王雲者豈易得先是羣盜張俊俊即小張俊也後賜名守忠李貴嘯聚潁上道益梗提舉官范潩張鋭常招慰之旋復亂皓至順昌聞賊有至近郊以牛驢市物者約與相見譙門下皓曉譬切至曰自古無白頭賊賊竦寤請歸報其渠帥乃為書至其窟穴俊貴皆聼命率所領入宿衛貴即俗所謂李閻羅者此據洪皓行述附見日歷紹興三年五月二日御史臺主簿陳祖禮劄子元係迪功郎聞喜縣尉京東西路提刑陳昌弼奏辟充准備差使被差徐州等處幹事至利國監界遇郡賊張俊等全火盡伏招安䝉本司保奏建炎二年十一月初一日准告授宣義郎據此文在皓出使之前不知與范潩張鋭有無相關今附此當求它書參考直龍圖閣兩浙轉運副使王琮罷仍奪職坐不刋行資治通鑑板本也始范冲刻是書垂成而去琮至遽罷之言者劾琮指司馬光為姦人謂通鑑為邪說必欲毁板恐其流傳故有是命日歷不載劾疏此以四年十月乙酉刑部檢舉復職狀修入乙丑直龍圖閣權東京留守判官程昌㝢自京城還蔡州初杜充既去昌㝢以無糧不可留引所部還蔡昌㝢家傳六七月蔡父老五百餘人投箋於留司丐公還曰蔡洊經冦攘自公臨治盜奔它境雖今有本道運判滕膺攝事民未安其政詞㫖誠切杜充時為宣撫聞之檄公還按昌㝢之去乃以無糧不可留非為蔡也趙甡之遺史十月昌㝢入京師四年正月還蔡昌㝢在京師凡四月隨行軍吏無糧食乃不可留甡之所書年月恐誤今從家傳副留守郭仲荀亦引餘兵歸行在遂以直徽猷閣京畿轉運副使上官悟權京城留守悟初見元年八月丙寅日歷悟以元年六月壬午除京畿轉運判官自後不見除日臣家藏綸言集有悟除直徽猷閣副使制詞略云其陛延閣之班以正使名之重故知今為此官職也仲荀既行都人從之來者以萬數離京師數日始得穀食自此京師人來者遂絶矣先是知唐州滕牧為董平所逐事見今年五月乙巳㑹羣盜八􅓕針王民等犯京西牧自襄陽遣使招之皆聽命遂以其衆還桐柏攻平民取道蔡州昌㝢不納民營城東兩日無所得而去牧以民之軍與平戰平敗執通判州事李祁以行未幾牧遷京西轉運判官唐州遂無主將京師自悟留守後命令不復能行留守司名存而已據程昌㝢家傳王民以昌㝢至蔡之日過其州故附於此未知與董平以何日戰也初統制官喬仲福自閩中引兵還行在道饒州入其郛占民居掠子女吕頥浩聞之白上詔官軍經由州縣者皆毋得入城仍具應付錢物數及有無騷擾申尚書省丙寅上謂輔臣曰國用匱乏政以所費處多吕頥浩曰用兵費財最號不資故漢文帝不言兵而天下富上曰用兵與營造最費國用深可戒也中興聖政臣留正等曰漢武帝外事四裔內侈宫室剝民之膚極矣及盜賊蜂起乃始封宰相以富民侯顧奚益哉太上皇帝以用兵營造為蠧財之戒其有鑒於斯乎然臣嘗竊議之二者為財用之蠧雖均宫室之奉所當深戒師旅之興有出於不得已者文帝惜露臺百金之費而乃講武於上林聚兵於廣武豈靳營造而輕於用兵哉蓋應敵之備不得不然也太上皇帝在位三紀臺榭苑囿無所營繕內帑所積甚富及金人南侵餽餉賞犒之費盡出於此而民不知易曰節以制度不蕩財不害民而後知聖慮無一日不在斯民也丁卯朝散大夫京東路轉運判官杜時亮為祕閣修撰假資政殿學士充奉使大金軍前使進士宋汝為授修武郎假武功大夫開州刺史副之初朝議以為敵師且至而洪皓崔縱未得前求可使緩師者時亮宣和末嘗為燕山路幹辦官金許王宗傑至燕與吕頥浩等五人俱被執既而釋之汝為豐縣人身長七尺餘博聞彊記徐州之陷闔族百餘人皆死至是聞金人入邉見部使者陳邊事遣詣行在所上納其說命持書遺金主晟請和且致書左副元帥宗維略曰古之有國家而迫於危亡者不過守與奔而已今以守則無人以奔則無地此所以鰓鰓然惟冀閣下之見哀而赦已故前者連奉書願削去舊號是天地之間皆大金之國而尊無二上亦何必勞師逺涉而後為快哉謹按十一月丁卯詔書云在建康遣杜時亮其為書指曲盡哀祈恐即此書也國史拾遺與元帥書八月日謹致書國相元帥閣下某昨遣洪皓輸懇切之誠懼道塗梗塞或不時布聞則又令崔縱進書御者既遣使者于庭君臣相聚泣而言曰古之有國家而迫於危亡者不過守與奔而已今大國之征小邦譬孟賁之搏僬僥耳以中原全大之時猶不能抗况方軍兵撓敗盜賊侵交財賄日朘土疆日蹙若偏師一來則束手聼命而已守奚為㦲自汴城而遷南京自南京而遷揚州自揚州而遷江寧建炎二年之間無慮三徙今越在荆蠻之域矣所行益窮所投日狹天綱恢恢將安之耶是某以守則無人以奔則無地一身倣徨局天蹐地而無所容厝此所以朝夕鰓鰓然惟冀閣下之見哀而赦已也恭惟元帥閣下以宗英之重行吊伐之師謀略如神威權不世其用兵之妙與黃帝爭驅遂北平契丹南取中國極天所覆混為一區此豈載籍所有㦲故缺十二字願削去舊號自此一缺二字者蓋知天命有歸而欲仰以成缺二字一尊之人也如此則缺十三字金珠玉帛者大金之外府也學士大夫者大金之陪𨽻也是天地之間皆大金之國而無有二上矣亦何必勞師逺涉然俊為快哉昔秦併天下可謂彊矣而不廢衛角之祀漢髙祖成帝業可謂大矣而不滅尉陀之國周武帝兼南北朝可謂廣矣而許留蕭察以為附庸故曰竭山而畋者非善畋者也竭澤而漁者非善漁者也伏望元帥閣下恢宏逺之圖念孤危之國回師偃甲賜以餘年缺十六字倘異時奉事之誠不足以當保持之意則移師問罪缺六字何難之有某亦將何辭嗚呼中天而立至威也相時而動至明也存人之血祀至信也全人之肝膽至仁也兼是四者在閣下德為何如在某之感為何如不寧惟是而已大軍一回則數百萬之生靈永保室家數萬里之山河永成井邑亦大國之利也孰與夫皇皇稱兵而自殘其一統之內哉今缺六字社稷存亡在閣下一吉某之受賜有若登天之難而閣下之垂恩不啻轉圜之易伏惟留神而特加矜察焉謹再遣使資政殿學士朝請大夫文安縣開國子食邑五百户賜紫金魚袋杜時亮副使武功大夫開州刺史武功縣開國男食邑三百户宋汝為特詣行府儻蒙許使參見面受約束幸甚素秋將杪冀益順時保重永綏壽祉時劉豫節制東平吕頥浩因以書遺之俾汝為面陳朝廷密意光祿少卿范寅敷自金來歸詔寅敷都堂審察寅敷已見元年二月戊辰先是知陕州李彥仙遣小將趙成往雲朔覘事比還念無以自明乃挾寅敷以歸至是赴行在成正平人也此據張鈞續中興忠義録己巳詔郭三益鄭㲄所賜田宅並减半初上念鄭㲄之忠且以其河朔人無家可歸故於常賻外賜第一區田十頃比三益繼薨其家援以為請許之言者論三益本王黼死黨㲄無尺寸功乃减其半言者又爭之遂寢其命其後上思㲄之忠卒賜之庚午奉安滁州端命殿太祖皇帝御容于建康府天寧萬夀觀壬申上謂輔臣曰髙麗入貢人使將至聞上皇遣內臣宫女各二人來朕聞之一則以喜一則以悲朕違逺二聖已及三年忽得安信豈得不喜上皇當承平之久以天下之養奉一人彼中居處服食凡百粗陋而朕居深宫廣殿極不遑安且朕父母兄弟及妻皆在異域惟有子近又薨逝孑然一身當此艱難所以悲也玉音未已淚已盈臉吕頤浩曰願陛下少寬聖抱大恢中興之業二聖忽有使來南歸之期可望此必金人之意若非彼意數人者雖至髙麗髙麗亦不肯令來上曰然詔布衣陳篆吳石韓彥李元忠並假從事郎令入對石常州人彥汝州人元忠河北人篆等皆從杜充軍往壽春故有是命甲戌禮部尚書曽楙為翰林學士承㫖禮部侍郎張守為翰林學士先是殿中侍御史趙鼎入對論守無過下遷按守原為御史中丞六月甲戌以言事異㫖遷禮部侍郎上曰以其資淺鼎曰中丞臺綱所繫豈計資耶且言事官無他過願陛下毋沮其氣時上每除言官即置一簿考其所言多寡鼎為臺諫三月而言四十事上皆行之中興聖政龜鑑曰朝政有闕許士庶以直言利害當講諭從臣而給札或以朕之耳目付臺諫或以不畏强禦責御史趙鼎有言四十事固足以見鼎之盡職而四十已行三十六尤足以見髙宗之善政增言事官置言事簿而聽言路廣矣乙亥直顯謨閣知青州劉洪道充徽猷閣待制京東經略安撫制置使時洪道奏使時洪宫等牽制且諸將不按洪道奏使句以下十一字文義未明當有闕文上以京東僻在一隅而洪道屢騰奏牘欲倚之經略山東故有是命又以武功大夫忠州刺史宫儀知濟南府召知濰州閻臯赴行在仍下詔戒諭之於時洪道等皆失守而臯已南奔朝廷蓋未知也趙甡之遺史附此事於今年五月而日歷載戒諭敕書於七月乙亥敕書有云還洪道制置之印付宫儀濟南之符并召閻臯來朝行在故且繫此日更須參考鄉貢進士陳登為迪功郎登師道子也三試禮部不第客游南方貧窶不能自立翰林學士張守等三人言於朝故有是命師道彭城人祕書省正字是月詔中書門下省檢正官嵗舉官如左右司條例此以紹興二年四月五日仇悆申明劄子附入兵部尚書謝克家言今日官冗外方尤甚請悉罷之以紓民力又言官軍單寡而郡縣皆有土豪宜令自相推擇有智勇者各守其地郡縣有闕官處乞許郡守自辟吏銓無礙則付以告身若其狥私則監司御史得以糾之今京東西及江淮悉為榛莾難用常法宜建藩鎮文武並授令得便宜從事財賦亦聽自用如捍禦有功則許世襲又言國典不存宜詔諸郡訪求傳録俟駐蹕既定悉上送官凡此皆急務也建炎以來繫年要録卷二十六
