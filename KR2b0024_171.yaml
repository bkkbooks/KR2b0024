body:
  text: 建炎以來繫年要錄巻一百七十一宋李心傳撰紹興二十有六年歲次丙子隆金海陵焬王亮正元年春正月按是月癸卯朔丁未資政殿學士提舉江州太平興國宫樓炤知宣州右朝請大夫知信州黄仁榮為江南東路轉運判官仁榮浦城人也上曰信州亦須擇人昨宰臣搜水晶極擾人如林機尤無狀魏良臣等曰紹興初徐康國為浙漕進台州螺鈿椅桌陛下即命焚之至今四方歎誦聖徳上指御座曰如一椅子只黑漆便可用何必螺鈿上又曰往日宫殿幕帟皆文繡朕今並不用土木被文繡非帝王美事良臣等曰漢文帝所以稱賢君正由節儉也戊申左朝散郎張九成復秘閣修撰知温州直秘閣新知廣州陳璹知湖州九成謫居十四年談經自樂學者尊之上覧除目曰九成昨在經筵講書及西漢災異事秦檜不樂以此遂去璹本檜所薦謂其材可作帥後自桂州召來不旬日遣去不曉其意魏良臣曰人多推其材可用上乃從之陳璹桂州召還事見紹興二十二年九月温民乆困重歛斛米匹絹輸者率倍其入九成曰重歛以疲民二千石責也斗尺皆立定例民大恱端明殿學士折彦質知廣州直秘閣知湖州郭瑊充秘閣修撰主管台州崇道觀左朝散郎徐林守太府少卿總領淮西江東軍馬錢糧己酉左奉議郎樊光逺為秘書丞左朝散郎邵大受知大宗正丞光逺以論事忤秦檜去國十六年上欲用為臺官故召左朝散大夫傳雱知韶州辛亥尚書禮部侍郎兼侍講王珉權吏部侍郎徐嚞罷時珉等使北未還而殿中侍御史湯鵬舉論二人皆以諂事秦檜故驟為臺諫無一言彈擊姦邪無一事裨補時政不修人臣之禮不識事君之義可謂甚矣委之為使公然受所差官每貟金四十五兩以為定例更抑勒使臣陪買私覿其無恥如此一時傳播以為笑談乞賜罷黜以振起禮義廉恥之風故有是命殿中侍御史湯鵬舉言今科舉之法名存實亡或先期以出題目或臨時以取封號或假名以入試場或多金以結代筆故孤寒逺方士子不得遇髙甲而富貴之家子弟常竊巍科又况時相預差試官以通私計前榜省闈殿試秦檜門客孫兒親舊得占甲科而知舉考試官皆登貴顯天下士子歸怨國家伏乞申嚴有司革去近弊如知舉參詳考試官乞臨期御筆㸃差以復祖宗科舉之法從之左通直郎新擬差知平江府崑山縣李庚充御史臺主簿庚臨海人湯鵬舉所薦也壬子秘書省正字兼權國子司業張震言太學前廊職事於令有不次選之文比來多有不安分義者多方請託濫居其列乞立為定格以上舎有行藝者充不則取之内舎庶息謗議從之尚書省言近年所在稅務收稅太重雖屢降指揮裁酌减免而商賈猶不能行蓋縁稅場太密收稅處多欲令户部行下諸路轉運司開具將相去連接之處裁酌减併以寛商賈如縣道稅務不可减即與免過稅仍許豁除省額如此則商賈行而貨財通矣從之右朝散郎知復州章燾言湖北京西州縣有户口稀少去處欲每一都人户若不及五大保處即合併接鄰近都分人户通行選差都保正一人催稅户長亦乞通行雇募候人户各及一都之數日仍舊差選責使歸業人户安業耕種實為利便刑部尚書韓仲通看詳依所乞其淮南東西路亦合一體施行詔户部行下降授左朝奉大夫楊揆復左朝散大夫直秘閣尋知全州詔承信郎殿前司自効郭振累經赦宥可與復元官除落過名差充將官癸丑詔州縣有犯彊竊盗須管督責廵尉嚴限收捕不得抑令鄰保出備賞錢所通窩藏及寄贓等人州委通判縣委知縣親行審問詣實方得勾追如有虛妄加本罪一等若承勘官司教令供通人吏决配勘官取㫖黜責時言者謂諸縣廵尉不用心捕强盗反令隣保備賞捉賊百端擾之及捕到官却令攤有力之家悉追入獄恣行乞取望嚴禁止上曰朕深知之惟得一好守臣此弊自革不得人約束雖嚴不能禁也於是降㫖行下翰林學士陳誠之兼侍讀尚書吏部侍郎張綱兼侍講起居舎人王綸兼崇政殿說書自秦熺侍經席講讀說書官多以臺諫兼之至是悉命從官如舊制殿中侍御史張鵬舉行侍御史左朝奉郎通判宣州沈大亷為監察御史大亷永嘉人也左朝散郎通判廣州汪應辰守尚書吏部郎中右奉議郎張􅤡送吏部與逺小監當差遣右正言凌哲論􅤡刻薄忮忍果於為惡諂事曹泳相為腹心泳所不快之人則誣以不測之罪付之棘寺􅤡每得之必極力煆煉傅成其獄今雖有外任指揮未甞顯正其罪士論未厭故有是命是日執政始入新第東位魏良臣居之中位沈該居之西位湯思退居之於是良臣等稱謝上曰比年執政府上漏下濕蓋不堪居卿等曽到京見宰執入位諸事如法所以待天下賢俊禮當如此乙卯尚書省勘㑹命官諸色人犯罪遇赦恩本斷刑名合行原免刑部尚具例請降特㫖并不遇赦合奏裁之人亦具重例請降特㫖未稱寛恤之意詔今後並令刑部遵依赦條施行其不遇赦合奏裁案狀不得一槩擬例請降特㫖如事理重害即具例申省取㫖詔孟庾路允廸家屬令信州廣徳軍並放逐便以尚書省檢舉也丙辰執政進呈新除觀文殿大學士判洪州張浚丁内艱上曰士大夫起復非美事所以敦孝行厚風俗惟軍中人乃可耳少傅寧逺軍節度使兼領殿前都指揮使職事楊存中言本司諸軍入隊官兵依時教閱不曽有闕人數兼無私役軍士外逐軍雖有酒坊解庫房廊鹽米等鋪各和雇百姓開張依市價出賣即不曽敷配軍士皆係外入利源内主管錢物係不入隊人逐軍統制等掌管各有簿厯製造軍器舟船軍裝買馬修蓋寨屋添支激犒盡是贍軍不可暫闕並無分文私用别無違戾委是難以任罷臣今將自紹興十一年至今年終諸軍收支過錢數謹具進呈伏望特降睿㫖除前項實係贍軍囘易許令依舊外其私自違戾去處即依己降指揮施行詔解庫房廊官莊藥鋪並令本軍召募百姓開張種佃即不得役使兵士餘依己降指揮其舊係買撲坊場令常平司拘收依條施行如係城郭開張酒店令户部總領司拘收先是參知政事魏良臣建請罷諸軍囘易事己行故存中以為請二月丁巳降㫖不行左朝奉大夫王葆知廣徳軍左奉議郎王復知臨江軍二人皆秦檜時為御史至是出之左朝散大夫楊朴朴資陽人已見為䕫州路提㸃刑獄公事是日沈該進呈蜀中人材上曰蜀人多能文然士人當以徳行為先文章乃其餘事該曰誠如聖訓戊午少傅寧逺軍節度使醴泉觀使信安郡王孟忠厚遷少師判平江府庚申築兩相第於都省之北是夜雷癸亥權尚書工部侍郎丁婁明罷以侍御史湯鵬舉奏婁明徒以秦烜之妻父遂躐清要四方不服故也集英殿修撰提舉江州太平興國宫黄唐傳復徽猷閣待制唐傳為吕頥浩所喜故秦檜乆抑之左朝請大夫直秘閣林大聲知鎮江府左朝散郎嚴抑知信州右奉議郎王義賔言竊見故建寧軍承宣使解潛歴事四朝十任方面頃守代州首抗議燕山之役已而得罪罷黜逮淵聖嗣位復加擢用建炎間盗賊蠭起分鎮荆南首尾六年尋䝉召還三總環衛昨緣與大臣不合以祠祿罷居平江後來知府王㬇到任承其風㫖媒孽以事責南安軍安置含恨而死今其子亦己物故諸孫零丁㷀然在逺伏乞許令歸𦵏不使宣勞之臣遺骨遐裔實公朝美事從之詔武功大夫福州觀察使兩浙西路馬步軍副總管丁禩武功大夫成州團練使兩浙西路兵馬都監朱珪並罷見任其已轉左武大夫并禩改差江東副總管珪改差江東兵馬鈐轄指揮更不施行先是秦熺援張俊家給使例乞轉官詔依所乞權中書舎人趙逵已草詞趙逵外制集勑朕於大臣死生之際未甞不用其極也既旌其忠䘏其家猶以為未也而又錄宿所指令之人崇其官而顯其身豈非以示朕體貌始終不替之眷也歟禩等服勤吾丞相府乆矣府廢而恩加焉故畀以戎麾遷秩超資恩意甚渥益勤忠孝無斁無怠而權兵部侍郎兼權給事中沈虛中言禩等於國家曽無横草之功超資越授僉論不平故有是命甲子故責授清逺軍節度副使趙鼎追復觀文殿大學士故責授左朝散郎秘書少監分司南京贑州居住孫近按近紹興十四年四月已復左朝散大夫落分司十四年六月再降授左朝散郎依舊宫觀未知何時又責秘少當考故責授濠州團練副使鄭剛中並追復資政殿學士故左太中大夫提舉江州太平興國宫永州居住汪藻追復顯謨閣學士先是右正言凌哲論迺者郊丘肆赦凡命官因事編置流竄之人輕者原放重者量移或乃盡復原官還其職任四方萬里莫不歌詠載路鼓舞増氣甚盛徳也然臣尚念有負罪至死越在異土者未䝉檢舉施行欲望特命大臣量其原犯事因條具以聞取自聖裁以次推行庶幾深仁厚澤下漏泉壤及是宰執以刑部狀進呈上曰遷謫之人自郊祀赦降及節次檢舉盡行牽復士大夫翕然稱快魏良臣等曰陛下深仁厚澤昭天漏泉天下幸甚因奏孫近亦已死於貶所上為之惻然又進呈胡思先因沮壞經界得罪乞追復元官上曰經界事李椿年主之若推行就緒不為不善但恐反以為擾今諸路往往多中輟良臣曰臣昨備貟廬州親覩其害甞以五事歴陳時宰意頗不樂上曰須得一通曉經界者欵曲議之於是鼎等皆復舊職而思亦復左朝議大夫故左朝散大夫昭州編管人洪興祖特贈直敷文閣侍御史湯鵬舉言臣恭覩紹興元年正月十四日聖㫖今後不歴知縣人不除監司郎官不經外任人不除侍從立為永法以革重内輕外之弊此陛下加惠庶工一均覆幬帝王之髙致萬世之良法也自兹後宰臣容私公道不行非親與舊非姦與佞安得與侍從之選豈容曽任知縣者得除監司郎官耶臣伏乞睿㫖申嚴宰執使良法美意不為空文而推行之以革重内輕外之弊以慰安臣下之心上可其奏因諭魏良臣等曰士大夫往往輕外重内親民之任莫如縣令若取其有治狀者陞擢之則人皆盡心良臣等曰祖宗故事不曽歴三路轉運不得除三司正欲其練歴上曰如從官須是曽歴外任宰執皆自此選若練逹政事通曉民情則事事便可裁决監察御史周方崇為殿中侍御史左朝奉郎主管台州崇道觀孫道夫為尚書吏部貟外郎左朝散郎唐文若行光祿寺丞文若庚子也庚眉山人大觀中京畿提舉右承議郎新通判嘉州黄貢改知綿州貢舉進士為四川類省試榜首用鼎甲恩授職官終更例當改秩時秦檜當國或勸以姓名自通貢曰進退有命枉道何益徑從外銓調嘉州州學教授用舉主考第改官從宦二十年始得郡倅及是沈該以其名聞乃有是命而貢已卒矣貢仁壽人初見紹興五年左奉議郎新通判彭州虞允文改知梁州允文祺子沈該所薦也按孫道夫唐文若黄貢及允文即沈該所呈蜀中人才也乙丑吏部侍郎張綱言監司所以督責守令而比年以來所在姦貪不法未甞有按發者此無他蓋由資淺望輕而不敢誰何或以識暗才劣而不能廉察也欲望今後監司有闕須擇七品以上清望官或曽經朝廷擢用或曽任郡守治狀顯著者為之所貴位望兼重而可以付之權材能已試而足以舉其職庶守令皆知奉法不負陛下宵旰圖治之意從之左太中大夫知婺州李椿年罷以右正言凌哲論其所至刻剝隂取係省錢名為平凖務盡籠一郡之貨侵奪百姓之利復以官錢賖貸與民日收其利謂之放課及結甲納苖米置圏市猪羊等凡十數事故黜之忠翊郎閤門祗候劉懃秉義郎閤門祗候劉愿並為閤門宣賛舎人丙寅皇伯左朝請大夫趙令衿為明州觀察使安定郡王直秘閣新知紹興府周葵權尚書禮部侍郎左朝散郎知筠州凌景夏守軍器監景夏入對言陛下臨御以來留神刑獄屢下明詔戒飭治獄之吏薄海内外同心愛戴然而有司拘于法令如大辟前勘官吏收坐者有一案推結之文歴時既乆官吏或有事故或在逺方文移取㑹動經歲月坐獄之人不免淹繫臣待罪筠州本州見禁婦人阿羅殺夫陳徳公事大情已定獄案已上正拘此條未有决遣之期臣契勘阿羅自紹興二十一年入獄今已五年欲望睿慈委刑部取案看詳如阿羅情節别無未圓先降指揮檢斷其前勘不實官吏續次施行仍乞立為定制庶不致乆淹刑禁仰副陛下哀矜庶獄之意從之左奉議郎知泰州海陵縣馮舜韶為監察御史上監秦檜擅權之弊遂増置言事官時何溥王珪沈大廉與舜韶並為察官而湯鵬舉周方崇凌哲為臺諫察官具貟近世所未有左從事郎監車輅院趙廱充勑令所删定官廱密子初見紹興二十四年四月特勒停新州編管人曹泳移吉陽軍編管右通直郎知台州劉景右朝請大夫知楚州盧適並罷侍御史湯鵬舉論泳懷姦挾勢狗彘不食其餘頃為衢州酒稅官正以贓敗監司按之劉景軰三四人與之營救及景倅廣州而泳已權户部侍郎遂竭廣州之土宜以厭滿泳所欲泳遂薦景於檜而得台州盧適父益之為樞密也泳為之使臣泳叨竊從官遂除楚州臣竊謂泳之過惡其在兩浙為漕臨安為守將官錢官物餽送檜之父子及塤并婢僕等於常例外輙更増添如買花石獻時新搜求難得之貨不可縷數至為户部侍郎即以正入窠名錢物用充羡餘將合收財用擅申住罷以釣時譽是誠何心哉論其公取竊取又不可以數計臣又採公論以謂李光苦無罪犯逺竄海島而泳罪惡貫盈止貶新州乞將景適特賜罷黜將泳竄之海上以為臣下朋比之戒故有是命丁卯右朝請郎孟充知大宗正丞翌日又以其弟右宣義郎嵩為軍器監主簿二人皆忠厚子也戊辰執政進呈諸州除免黄河竹索錢因及鄭作肅昨因乞蠲免竹索錢宰臣見怒致臺臣論列取勘上曰君相之職本以為民民間利病豈可不理又進呈户部供具到諸路拖欠紹興二十一年二十二年錢物欲行除放上曰若只倚閣州縣夤縁為姦又復催理擾人即與除放甚善樞密院編修官呉棣言頃因臣僚建議増置民事之科應緣民事被罪者並不得注知州軍通判知縣差遣夫守令通判親民之官茍有所犯未有不干涉於民者使其人實由姦貪而犯贓私之罪則坐以重法固不足恤萬一素行廉勤偶陷公過而或傳致於民事遂令終身不入親民之選則人才必有廢棄者豈不重可惜哉又况刀筆之吏因此執疑似之迹故生沮難或致交通賄賂為害不細一時權臣欲專予奪之柄故不肯遽罷但令申取朝廷指揮殊不以紊亂祖宗法度為意欲望睿㫖將吏部民事一條早賜蠲除所有百官注擬及公私贓罪格法並依舊制施行庶幾法令簡明易於遵守從之左朝議大夫直秘閣趙令詪陞秘閣修撰知台州令詪既封安定郡王至是以爵讓其從兄令衿故有是命宜州觀察使知金州姚仲為清逺軍承宣使以積閥遷也詔昭化軍承宣使知閤門事錢愷所生母太碩人田氏特封永國太夫人張遇之寇真州也秦魯國大長公主家人頗為所掠故田氏亦失所在其後愷於淮南求得之至是愷以任子恩四資請益其母封號遂有是命户部言今年分民户畸零租稅欲令依見行條法折納價錢如願與别户合鈔納本色者聽秦檜之未薨畫者令州縣不得合零就整元㫖在去年十月至是兼權侍郎鍾世明以為恐奉行牴牾却致擾民遂從之己巳詔昨降指揮已得差遣人限五日出門并已有差遣及在貶謫者不得輙入國門紹興五年五月二十四日十二年十一月十一日十四年十月二十七日敕又文武官應得酬賞及選人依法改官令吏部先次開具格法申取朝㫖紹興二十二年八月九日郡守年及七十之人許自陳宫觀紹興二十三年十月二日逐項更不遵用從吏部請也詔江浙荆湖諸路紹興二十二年已前未起諸色錢物租稅等其形勢并第二等已上有物力之家見欠數目並與除放令州軍日下銷落簿籍如巧作名目催理者監司按劾取㫖重作施行庚午左朝散郎劉嶸為大理正左朝奉郎何涇左奉議郎楊邦弼並為大理寺丞三人甞為禮宫學官上覽除目曰理寺官俱無出身正宜參用士人又進呈近來士風委靡諂諛奔競至有己得差遣而屢求換易不量資序而超躐干請者上曰風俗人才正當今急務似此之人可具名聞奏當議黜責遂降詔如所請左朝奉郎通判肇慶府黄公度引見上曰卿官肇慶嶺外有何弊事公度曰廣東西路有數小郡如貴新南恩之類有至十年不除守臣者權官茍且郡政弛廢或不半年而去監司又復差人公私疲於迎送民受其弊上曰何不除人公度曰蓋縁其闕在堂欲者不與與者不欲上曰若撥歸部當無此弊遂以公度為考功貟外郎左中大夫知常州沈調知揚州右朝請大夫主管台州崇道觀榮薿知常州辛未左承議郎新知黎州唐秬入辭秬言臣所治黎州控制雲南極邊在唐為患尤甚自太祖皇帝即位之初指輿地圖棄越嶲不毛之地畫大渡河為界邊民不識兵革垂二百年昨䝉遣鍾世明裕民川蜀蠲减虛額人受其賜更乞降詔撫諭庶幾蜀民扶老携幼共聞徳音上曰卿甞上書論列頷首者乆之秬重子也秘書省正字兼權國子司業張震言仰惟朝廷行寛大之政異時士大夫以疑似涉謗皆已赦除流落者得生還除名者得仕宦人神懽恱天下翕然此治世之事也竊見昨降指揮取索福建四川等路私雕印文書赴監看詳取之未己恐妄以私意將近世名公文集盡行毁板不問是非玉石俱焚真偽兩失不足以稱朝廷寛大本意欲乞特降指揮令福建四川等路如有私雕印文字委自所屬依法詳定更不須發赴國子監及提舉秘書省庶幾知聖朝無有所諱天下幸甚從之二月癸酉朔左朝請大夫提舉江州太平興國宫劉才邵入對才邵言近年以來居監司郡守之任者多迎合大臣私意鎮靜之說專務因循無所舉劾遂使郡縣之間姦貪官吏倚法營私以困斯民民間受弊莫甚於受納追催差役三事米則多加合數絹則抑取輕錢計其浮費已過正數追催官物本屬户長今則遂至於差土豪土軍鄉民驚擾民間田業自經界之後稅産髙低灼然易見差役自上及下夫復何疑滑吏意在求賂每闕一名必追十數户請求脫免所費不貲觸類而長之端緒實多為害不一望委諸路監司廣加詢訪凡民間利病官吏侵漁無有巨細咸得以聞仍乞類聚委官看詳條具本末取决聖裁詳為法禁實天下之幸上可其奏曰此三者皆民間大事宜速行之是日金主亮大赦改元正隆制詞畧曰顧赦宥之為弊在史籍以具陳又甞念無知之民多誤入有司之法慮或罹於寃枉宜並賜於哀矜庶導至和肆因更始自正隆元年二月朔以前除正謀反大逆殺祖父母父母外咸赦除之此據耿編詔本甲戌執政進呈太府少卿兼權吏部侍郎許興古看詳右奉議郎魯冲上書論郡邑弊事云臣前任宜興縣漕計合收窠名有丁鹽錢坊場課利錢租地錢租絲租紵錢一歲所入不過一萬五千餘緡其發納之數有大軍錢上供錢糴本錢打船錢軍器物料錢天申節銀絹錢之類歲支不啻三萬四千餘緡又有見任寄居官請受過往官兵批劵與非泛州郡督索拖欠畧無虛日興古看詳州縣若造船隻須經三二十年可用又國家休兵既乆諸州不輟打造軍器及發納料物數不少又諸軍亦以糞土錢不住兼造似亦不闕欲望量與减免冲又論今之為令者茍以寛恤為意而拙於催科旋踵以不職獲罪而去頗能迎合上司一以慘刻聚歛為務則以稱職聞是使為令者終日惴惴惟財賦是念祈脫上司之譴朝不謀夕亦何暇為陛下奉行寛恤詔書承流宣化者哉興古看詳冲所論誠中今日之弊今銓曹有知縣縣令共二百餘闕無願就者正緣財賦督廹民事被罪所以畏避如此今若罷去獻羡餘除放民間積欠與夫以民事被罪之科及慎擇守臣戒飭監司奉法循理則吏稱其職民安其業仰稱明天子寛恤愛民之意上可其請曰累年所造軍器内庫已如山積諸軍亦自製造諸州每歲發納物料可與减免所役工匠太多亦宜减放發還於是批㫖行下三月丁夘施行權尚書兵部侍郎兼權直學士院沈虛中罷以侍御史湯鵬舉論其為省試參詳官私取秦塤且素無廉聲巧貪富貴不當留在侍從故也左朝請大夫劉才邵權尚書工部侍郎乙亥上曰近榮州守臣費庭論蜀中隔槽酒甚擾民當是時張浚趙開以軍興窘於財用濟一時之急耳今休兵既乆内外無事自合更也魏良臣曰己令鍾世明詳之矣上曰須下本路漕臣方能盡其利害上又曰四川交子亦有弊如沈該稱提之說但官中常有百萬緡遇交子减價自買之即無弊矣先是建炎中趙開為四川大漕始變酒法置隔釀設官主之其法聽民就務分槽醖賣官計所入之米而收其課行之既乆酤賣虧欠則責入米之家認定月額不復覈其米而苐取其錢民始以為病庭安仁人時以左朝奉大夫除知榮州前四日入辭因奏其事上問之庭曰酒户入易出難必至傷殘而後已從其便則無難矣上曰當付之漕臣於是命總領所與諸路轉運司措置明年正月辛亥申到茶何俌龜鑑總所征𣙜之増場交子之造條具錢榖裁節浮費趙霈言之大禮錢帛各令减半沈該言之至論折閱稱提之說乃謂但得官中常有錢萬緡遇减價則用錢自買方得無弊以此理財而財無不豐矣右司貟外郎兼權户部侍郎鍾世明論四川諸縣預借賦稅之弊乞下四路轉運司覈實如借及一年者分作四料及二年者分作八料理折庶寛民力州縣亦不闕乏歲計支用自後輙敢預借及不與民户理折者並令按劾仍許越訴他路或有預借去處亦乞依此施行從之户部言江浙湖廣四川福建諸路常平司拘收到户絶沒官田宅除見佃人已添三分租課並令依舊承佃外餘依今來措置出賣從之宣政使均州觀察使内侍省押班康諝卒贈保信軍節度使賜諡忠定丙子詔自今奉使所辟三節人先具名申三省樞密院次第審量仍令國信所覺察先是淮陽軍流寓進士單鎡言古之遣使揆度人才能稱其任比年以來為奉使者不問賢否惟金多者備貟而往多是市㕓豪富巨商之子果能不辱君命乎奏下後省沈虛中時權給事中看詳以聞至是行下丁丑右朝請大夫新知濠州周紱言監司郡守聽歲舉部内官吏欲其别白賢否激勸士類近年以來或獨援於親黨或先通於賄賂或專奉於權勢遂致貪汙庸懦之人常得與剡薦之列而清白强明之吏既不能阿媚以取和往往有終身困於選調而不復進者欲望嚴戒監司郡守各存公道庶幾賢者知勸不賢者知退魏良臣奏比年間有前執政合歲舉官亦或冒濫者上曰前執政尚如此不若因此併與戒約行下詔諸軍贍軍囘易令和雇百姓管幹毋得役使官兵其撲買酒坊酒庫各許更立一界俟界滿日别取㫖時參知政事魏良臣建議盡罷諸將囘易未得㫖而江東轉運判官趙公智遽行之建康軍中尋又行之池州公智與良臣姻家諸將皆以為不便上聞遂寢其事戊寅又詔元占官兵願離軍者可罷名糧不願者拘收歸軍如依前隱占重寘典憲己卯詔諸路州軍以前舉解試流寓終場人數紐計及土著合取放一人之數即與添解額一人或零分及流寓人少以土著所解人十分為率及三分亦解一人並通立為額已後人多不得過今舉所取之數用荆湖北路轉運判官程敦臨請也起復龍神衛四廂都指揮使武當軍承宣使池州駐劄御前諸軍都統制李耕卒昭慶軍承宣使殿前司右軍統制岳超為龍神衛四廂都指揮使充池州駐劄御前諸軍都統制池州都統衘内除去太平州三字未知在何年月當考詔宣政使保成軍承宣使宋唐卿特贈清逺軍節度使賜諡恭靖庚辰執政進呈權刑部尚書韓仲通看詳知雷州趙伯檉所奏廣西州軍經制等窠名銀皆是括率百姓隨稅均敷欲令今後只依市價收買不得敷民上曰此豈可不禁上又曰朕聞蜀中銀價髙比江浙間過一倍如劉晏掌邦計懋遷有無低昻適中方是理財之術可令有司措置毋致枉費右正言凌哲言國家自祖宗時置進奏院若朝廷之號令政事注擬賞罰之類皆付之郵傳播告天下比年以來用事之臣乃令本院監官先次具本納于時相謂之定本動輙旬日俟許報行方敢傳錄而官吏迎合意㫖多是删去𦂳要事目止傳常程文書偏州下邑往往有經歴時月不聞朝廷詔令切恐民聽妄生迷惑有害治體望將進奏院定本亟行罷去以復祖宗之舊以通上下之情從之哲又論守令以修造為名頻破官物虛沒入已監司屬官廣占兵級坐耗廪劵命官之任及解官妄指逺僻之所多請雇直寄居官俸給往他州重疊冐請等四事乞嚴立法禁違者計贓坐罪皆從之癸未保康軍承宣使提舉佑神觀韓公裔為華容軍節度使江南東路轉運判官趙公智罷以侍御史湯鵬舉論其貪饕也自是魏良臣始不安于位矣左中大夫叚拂薨特輟視朝一日甲申執政進呈權刑部尚書韓仲通看詳知鬰林州趙不易便民五事内雷化等州民間納苖多令折銀擾民為甚欲令並納正色上曰百姓足君孰與不足百姓之財乃國家之外府安可盡取但藏之於民緩急亦可以資國用乙酉詔右朝奉郎林一飛送吏部與逺小監當差遣一飛既罷去乃使其族人進士東投匭上書論進退大臣當以禮侍御史湯鵬舉面奏禮為忠賢設使其姦詐如李林甫盧把之徒自當明示典刑為天下後世之戒又况檜薨之後陛下禮意隆盡不可復加而一飛遣東鼔唱浮言動搖國是乞特賜懲戒上謂大臣曰朕每覽封章若其言可行即行之若其言非雖渉狂妄亦不欲罪其人蓋所以來天下之言也今東書用意如此言路既有論列豈可免行遣乃責一飛監髙州鹽稅東英州編管丙戍封信安郡王孟忠厚故妻秦國夫人王氏為秦魯國夫人丁亥以監司多闕命侍從臺諫各舉甞任知通治狀顯著者二人仍保任終身犯贓及不職者與同罪太常博士葉義問直秘閣為江南東路轉運判官己丑新除秘書丞樊光逺特引對光逺言頃年大臣挾權修怨不平其心陛下聖明固已灼見其弊矣至於臺諫之所排擊法寺之所鍜鍊告訐之所中傷其間又有因責降而死未霑䘏典者夫已甞與聞朝廷之政親厠甘泉之班矣及子而無一命之祿以奉其親而撫其孤誠宜聖心之所深憫也欲望陛下明詔有司應曽任執政侍從因責降而死者其家子孫尚未有官許令自陳依貶死例與復官職錄其子孫則陛下之徳澤所及廣矣上曰甚善當令有司看詳檢舉上又曰朕與卿不相見今幾年光逺曰臣得外任迨今十有六年上曰朕所以令卿上殿欲除卿察官光逺曰臺察委任非輕如臣愚陋何足以當此選於是以光逺為監察御史六月甲午施行庚寅執政奏廣東申三佛齊國入貢依例到闕二十三人上曰逺人鄉化國家美事到闕人數可増作四十人蓋嘉其誠欵而非利乎方物也左朝散大夫直秘閣新知全州楊揆行大理正揆入對首言在法人户家産物業每三歲一行推排陞降等第立為定籍凡有差科令佐躬親按籍均定比年盡付吏手豪右計囑良民受弊望明飭有司凡遇差科並須令佐躬親均定不得令公吏干預從之揆奏以是月甲午行下皇叔建州觀察使知南外宗正事士􅱰為保康軍承宣使再任辛卯參知政事魏良臣罷為資政殿學士知紹興府先是侍御史湯鵬舉言良臣人品凡下天姿兇險率意任情浮躁淺露通判已下差遣已得㫖令吏部差注必留堂除以市私恩臺諫之論列人才良臣引用私親趙公智必欲庇之是恨臺諫不與之為支黨也廷尉之禁勘公事良臣改正富人胡邁奏補必欲從之是使獄官與之容私也每議事於同寅之間則愚而好自用以至奏對於君父之前則賤而好自專迹其所為稍若假以歲月授之權柄殆有甚於秦檜殿中侍御史周方崇言良臣狠愎自用不恤公議分朋植黨背公營私如奏補親屬文武自有定制胡邁已授武職良臣乃昵於親黨叱責部吏改授文資趙公智所至貪鄙良臣特以為姻婭遂擢為漕臣日者陛下盡收竄逐沉抑之臣而召用之良臣乃誦言於時以謂皆由已出右正言凌哲言良臣昵比匪人甘心媚竈剛愎不悛輕躁自用驟易中外冠帶之制不知其倉猝之難辦拘收軍中囘易之類不究其本柄之所自臣僚之貶死復官身後恩數多不檢舉而洪興祖獨得依條指揮其不公不忠跡狀顯著鵬舉又言軍中之囘易等事行之日乆所以寛恤統兵官欲其修器械務整肅以壯軍容也而良臣奏請住罷未得聖㫖先次行下建康總領司便行拘收是命令專輙而動搖人情也軍人有陞帶所以優將士也而良臣專持繆見沮格不行至今畫黄猶在省部是使慶賞全廢而陛下之恩徳不能及於將士也自逺方召來特起之士臨軒賜對欲為中都官者輙以私釁出之止令補外如新差太平府教授陳天麟是也此良臣之方命而擅作威也富家巨室通財營私酬以美官不畏公議如新除國子正倪偁是也此良臣之罔上而擅作福也其餘不可悉數使其歲月滋乆其為害豈止一秦檜而已伏望早賜罷黜以慰中外之望於是良臣亦抗章求去章五上乃有是命鵬舉又言良臣政事罷行不審紊亂政機且如法令因革不候勑㫖或先闗報以施行已薦張松自知縣造朝輙差郡守所為如此復典大郡叨竊職名其可乎乞將良臣落職罷郡將臣之論列播告中外鵬舉又言良臣乞罷諸軍囘易等事未得聖㫖於正月二十五日江東轉運判官趙公智已施行於建康軍中一軍驚擾近又聞施行於池州軍中亦復驚擾至二月五日方奉聖㫖别無改罷諸軍將士莫不感荷聖恩良臣與公智婚姻之家身參大政未得聖㫖預報公智動搖軍情此何理也詔公智今後不得與知州軍差遣臣僚論列良臣章疏令報行偁徳清人少從張九成學自臨江軍學教授召為學官未赴以言罷天麟宣城人以董徳元薦對徳元罷去良臣以外郡學官處之故鵬舉以為言良臣執政纔九十八日國學不見倪偁題名蓋旋即罷也張去年十二月戊寅差知瓊州令年三月戊辰不行胡邁同日改正詳其本日陳天麟同日除國子正癸巳秘書省著作佐郎周麟之乞申命史館續修神宗哲宗兩朝寳訓從之甲午國子司業兼崇政殿說書王大寳言竊見江南諸州有月樁錢而縣吏因仍為姦有折帛錢而下户賠補為患月樁錢者科撥不均名目無定胥吏緣此以科麴引催積欠抑賣官紙私行賞罰四事為名刻剥良民追呼旁午其弊為甚折帛錢者艱難之初物價踴貴令下户折納務以優之也今市價每匹不過四貫乃令下户増納六貫望委諸路監司覈實月樁名色立為定額如有不足者審度均定不得假名目以恣率歛及折帛錢量與裁减以恤下户庶幾和氣旁浹至治格於神明矣上覽奏謂執政曰大寳所論可令户部看詳上因言大寳近又請放度牒殊未曉朕意人多以鬻度牒為利亦以延人主壽為言朕謂人主但當事合天心而仁及生民自然享國長乆如髙齊蕭粱奉佛皆無益也僧徒不耕而食不蠶而衣無父子君臣之禮以死生禍福恐無知之民竭民財以興建塔廟蠹民傷教莫此為甚豈宜廣也輔臣皆稱善左朝請大夫直秘閣辛次膺知婺州北使張通古之議和也次膺提㸃荆湖南路刑獄上疏言父之讐不與共天兄弟之讐不反兵豈有降萬乗之尊屈已稱藩者乎書奏不報即奉祠及金人敗盟次膺有故人將漕湖北者擬寄居鄂渚而依焉岳飛時為宣撫使待遇甚厚既而延入小閣盡出所被宸翰具言上眷之渥且執次膺手曰前日夢為棘寺逮對獄獄吏曰辛中丞被㫖推勘飛方懼不敢告人而公適至公自諫官補外他日必為獨坐飛或不幸下獄愿公救之次膺悚然不知所對既歸語兄弟曰飛握重兵昧保身之䇿禍將作矣飛厚贐其行次膺不受遂入鄱陽寓居宫祠歲滿不復再請閱十一年忍窮如鐵石上始親政即除知紹興府未上㑹魏良臣出鎮於是改命次膺奉祠及過鄂州當在紹興十年九年之間不得其本月日且附此當求他書參考左承議郎通判泰州朱冠卿提舉淮南東路常平茶鹽公事冠卿華亭人也乙未左朝請大夫新知漢州陳康伯試尚書吏部侍郎左朝散郎主管台州崇道觀呉秉信守起居郎丙申侍御史湯鵬舉言右朝奉郎新添差通判秀州王韅寄居撫州恃勢作威郡守監司聽其使令如役僕𨽻毒流一州至崇仁縣人糾率鄉黨來投時相所訟三十餘事止送江西帥司體究公吏迎合捕獲狀首三人勒招虚妄悉坐編配乞將韅罷黜委本路有風力監司追還撫州居民産業然後重寘典刑詔專委本路提刑劉長源拘留王韅追證給還居民産業具已還數目及情犯申尚書省取㫖不得滅裂其後長源究實如章上曰此不可不痛治在祖宗朝革去五代苛法專以仁恕為本未甞真决一士大夫惟犯贓者不貸可令刑部約法重作行遣上語在五月乙丑今併書之日厯稱韅受贓已滿不知如何行遣也丁酉左朝散郎新知信州嚴抑復集英殿修撰提舉江州太平興國宫上始召抑既至而抑以足疾不能朝乃有是命大理寺丞楊邦弼為荆湖南路轉運判官權禮部侍郎兼權國子祭酒周葵言科舉所以取士近年主司迎合大臣之意多取經傳之言可為諛佞者以為問目學者因之專務茍合時好如論伊尹周公則競為歸美宰相之言春秋譏貶失禮則指為褒稱之事其悖戾聖人之意大率類此至於前古治亂興亡之變以時忌絶口不道後生晩軰往往不讀史歴代先後有不知者望詔國學及將來秋試考試官精選通經博古之士置之上游其穿鑿迎合議論乖僻不合體式者皆行黜落若矯枉過正不顧所問務為詆訐者亦復勿取從之戊戍左通直郎周操行國子錄操歸安人也己亥太尉保康軍節度使提舉萬壽觀呉益開府儀同三司庚子左朝散大夫王曮送建昌軍居住直徽猷閣主管台州崇道觀吕愿中責授果州團練副使封州安置殿中侍御史周方崇論曮以宰輔親黨妄作而愿中知復州日强買部民玩好古器納於大臣遂得進擢其帥靜江肆行貪虐軍兵幾至生變言者論其䟦扈之狀愿中乃以寳貨納於大臣及曹泳致刑罰不加故併謫之建炎以来繫年要録巻一百七十一
