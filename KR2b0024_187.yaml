body:
  text: 建炎以來繫年要録卷一百八十七宋李心傳撰紹興三十年十有一月乙亥朔忠訓郎王瑀為閣門祗候丁丑樞密院檢詳諸房文字徐度守尚書左司郎中直祕閣兩浙西路提點刑獄公事吕廣問守尚書右司貟外郎戊寅皇姪常德軍承宣使權主奉益王祭祀居廣為華容軍節度使以主祭踰十年也己卯太常丞吳曽祕書丞杜莘老兼權吏部郎官右選小使臣舊不出闕吏間取而鬻之在選二百人逺客寒窘無所訴莘老始命榜闕使曉然以次就注庚辰殿中侍御史陳俊卿言比年江西湖廣米斗才數十錢而職田米乃令折價至三四千監司守倅利其豐於己而莫敢問如永之祁陽乃監司職田之所聚為縣令者惟於諸司職租不乏則薦削可盈不知斯民何辜而取其膏血以自媒也按令職田折錢而增直者計贓望今後只令納本色監司守倅毋得違戾從之御史臺檢法官薛良朋轉對乞見任官毋得與部民結婚秩滿仍不得於本處寄居上謂輔臣曰此等事祖宗皆有成法可申嚴行下務在必行詔故延康殿學士簽書樞密院事曹輔特贈左金紫光祿大夫以其子金部貟外郎紱言輔靖康末蠟書之勞故有是命辛巳左朝請大夫主管台州崇道觀王傅知建州用左正言王淮薦也降授右通直郎新通判福州林珦知黃州壬午邵州防禦使向超落致仕知文州司農少卿總領四川財賦許尹薦超年未六十筋力不衰堪任將帥故復令出守癸未封永康縣主為永嘉郡主主瓊王仲儡女適權知閣門事張掄甲申右承務郎趙益為右承奉郎益鼎孫也用其祖在相位時所遷官乞回授權吏部尚書洪遵奏比附戰功人身亡許收使特遷之乙酉太常寺主簿李浩面對時楊存中權寵日盛浩為上言存中恩寵太盛嬰兒過飽恐非其福上頗感其言此據朱熹撰浩行狀修入存中明年二月甲寅就第大理司直陸禋為太府寺丞禋為湯思退所厚以祠官理考改京秩論者非之初殿前司遣將官往建昌軍招兵五百人詔守二同領其事及是招足守臣楊師中等減磨勘年有差戊子權尚書刑部侍郎黃祖舜試給事中大理少卿張運權刑部侍郎壬辰詔諸軍出戍戰守軍校天寒暴露各賜帛一匹乙未左朝請郎知黎州馮時行言本州稅米並無正色每石理錢引十三千重困民力已令百姓充土丁者每石輸八千不充者輸十千乞為定直又乞禁官吏誅求土丁紅桑影木酥果之屬其應干互市物貨仍不許見任官收買皆從之時行為人亷正而用法頗嚴前是夷人入州互市者率肆橫難制至是讋服丙申詔內外諸軍毋得招收放停之人如違將佐重行責降直敷文閣福建路轉運副使王時升言到官才一考撙節到浮費三十萬緡乞以其半代民輸舊欠鈔鹽錢執政言恐合旌賞上曰漕臣能節約妄用而代民輸理宜褒録第恐他路聞之妄認以為羡餘侵漁百姓可俟其政績有聞與升職名後旬日乃徙時升兩浙轉運副使時升益都人綱子已見丁酉池州駐劄御前諸軍都統制李顯忠請令諸軍屯田上謂大臣曰此事可行然須先立規模如括田市牛立廬舍給糧種置農具之類悉有條理乃可施行兩三年間且盡興地利使之嵗入有得則不勸而耕矣戊戌侍御史汪徹言伏自陛下更化勵精以來進賢退姦興利除害汲汲孜孜求治如不及而輔相未得其人如湯思退猶得偃然在羣臣之上而秉國鈞欲逃折足覆餗之譏難矣臣謹按思退本無器識更乏忠亮徒以工駢儷之文嘗綴科目飾諛言以奉秦檜用選舉而私秦塤夤緣超躐徑躋樞近自檜之死一時支黨悉從貶竄而思退獨得漏網陛下以其外若純篤而不知其中實佞邪偶因乏人遂至大用制下之日人人駭愕為相以來亦三閲歲矣曽無一善之可稱一事之可紀其任情率意凡所施為多拂公論且匿名迹逺權勢此大臣之事也思退則蔑視同列擅威福以吝權恩欲歸已怨使誰當此大臣之事也思退則專市私恩務姑息以媚下清儉化俗此大臣之事也思退則貪鄙無嫌至於受三衙之餽裁抑權幸此大臣之事也思退則脂韋固寵至於結近習之權孔子曰鄙夫可與事君也與哉其未得之患得之既得之患失之茍患失之無所不至矣若夫望輕不足服士夫則衆怨並興德薄不足理隂陽則天戒垂示聞邉鄙之報則相顧而無謀覩將帥之驕則制馭之無術祖宗法令或廢格而不用臣寮章疏多沉抑而不行曽何忠國而為民率皆背公而植黨如此等事未可縷數久玷鈞輔物論沸騰豈惟有妨賢路實亦深負陛下所以委任責成之意欲望早賜罷黜以快中外之望己亥武泰軍承宣使添差兩浙西路馬步軍副都總管王安道令再任右朝散郎直祕閣充兩浙轉運司主管文字王恱道主管台州崇道觀庚子殿中侍御史陳俊卿入對上奏曰臣伏見十月癸亥日方過中天無雲而有雷聲人情駭異臣竊謂變不虛生當有任其咎者及觀本朝慶歷八年京師一日無雲而震仁宗皇帝謂張方平曰夏竦姦邪天變如此亟命草詔罷之今日之應其陛下之大臣乎宰相代天理物共天位治天職食天祿若得罪於天必示警戒雷比之號令君道也雲從龍之物臣道也今以陽氣潛伏之時無雲而雷是臣懷姦而乖其志於君君震怒而發隱慝於臣天變昭然與慶歷之事若合符契臣謹按宰臣湯思退挾巧詐之心濟傾邪之志本由章句薦歷要塗專於徇私素無人望觀其所為多效秦檜蓋思退之致身皆檜父子恩也始以掌文衡曲意取其子孫緣此汲引以致政府檜死熺逐值更化之初四方賢才號召未至陛下姑且留之不旋踵而湯鵬舉為御史二人素通譜系鵬舉首鼠顧忌網漏吞舟而思退且結約貴近詭祕其迹自是安若泰山寖登輔相而敢肆意矣思退起於微官即登秦氏之門一時耆哲略無識者自居相位惟務招延親黨佐其羽翼昵近小人以為心腹盜名器而行以私恩假國權而傾搖同列有大議論則皇皇而無謀每臨事機則迎合而自固其負宿望者陽交而隂沮之其不附己者中傷而決去之曲庇豪強馴致紀綱不振多為回護暗使風憲不立土木雲擾於鄉郡賄賂輻輳於私庭每月俸金則便會於他邦而強買良田戚屬門人則密諷於太學而屢玷優選姦偽萬狀外示人以不疑巧設機穽隂伺間隙臣恐太阿之柄倒持竊弄無所不至也然其罪惡未若檜之甚者以臺諫不由其門未興犴獄連搢紳之禍耳自張孝祥王希亮邵大受方師尹祝公逹沈介之去自知寡助每憤惋不平劉寶之罷兵柄以迫於衆議而思退先與之通書若不得已劉錡之召為管軍公議惟允而思退密使人迎謁於前路欲收其恩身為首相四海具瞻而舉動大率如此正堯代之共工魯邦之少卯有夏竦之姦邪而無其才術臣備位耳目之官况覩天變茍循默隱忍是為曠職伏望陛下赫然震怒置之典憲上以合仁宗皇帝之威斷下以快天下之公言編管人前右朝請郎王彥傅死於靖州辛丑右正言王淮入對上奏曰臣謹按宰臣湯思退初無素望可服時流偶以文詞僥幸科目其於人事之終始道德之指歸未嘗深講而熟聞也因緣秦檜引之要塗年除嵗遷致位公宰忘事君之大義昧經國之逺猷竊弄威權動循覆轍有識之士固已寒心而乃進用匪人習成朋比排斥異己公肆誕謾英俊沉於下寮耆老遺於散地故其所得非一時柔佞即桀黠亡耻之徒相與推擠黷亂名器雖布滿中外適足以養成禍胎不聞其長慮却顧為國家建久安之䇿成長治之業命令出而輒更官吏除而數易假封駮以行其意嫉風憲以沮其言妄作聰明陵轢同列小遇事機則相顧變色莫知所為尚能持危扶顛如古之所謂大臣者歟凡此皆其小智自私學未知道物我之心既勝愛憎之情遂遷黑白紛然而方寸亂矣豈不上負陛下委任責成之意哉臣身受異恩職司言責覩棟梁之將撓知鼎足之必傾緘默以居咎將安在輒采至公之論上干不測之誅伏望特垂英斷將思退亟賜罷免博選耆德以亮天工臣不勝大願右諫議大夫何溥言臣伏見宰臣湯思退本無學術粗習辭章容恱詭隨偷合取寵十餘年間不出國門而至兩地當陛下更化之初凡向時阿附之徒斥逐殆盡而思退以雅善結託免於司敗之誅因緣推排遂至宰輔不務改心易慮以懲往失而隂用其術以箝制天下之士凡不附己者必托他事以中傷之而其所恃腹心之人往往分布要地繳駮推行惟意所欲間有同列稍或異議則多方擠排迄去而後已尋常差除雖管庫之卑例先招致欵曲密諭使知歸恩之地於是朝士靡然從風莫不奔走其門而不顧其他專權自恣擅作威福本原浸大末流濫以致溢自非任言責者與之抗衡立敵時有以折其萌芽則人主之勢幾何不孤立而無助邪夫宰相以用人為職要當以天下人才為心賢能所在何間疏戚今思退動懷私意必自己出耳目所及其能幾何故便佞輕緩之徒委曲傅會隂有薦導其言必行由是小人成羣布於中外而州縣之間被其毒者多矣若夫忌嫉言者甚於仇讎凡所建明故作沮格至戒飭版曹不得關報時事近有姦臣獻間疏臺諫之䇿大合其意雖奴才鬼質亦以侍從處之察其自任之專加以用人之失使久在相位其害將日甚於一日真賢實能亦何路以自進哉伏望聖明洞照其情駿發英斷亟賜罷黜以開賢才之路以除禍亂之本以快天下憤悶不平之氣則君子道長有德彚進而朝廷之勢尊太平之基立矣太府寺丞陸禋罷右正言王淮論禋初乏寸長惟以醫術逰士大夫之門湯思退以其治母疾有瘳擢致丞列瀆亂流品聞者駭愕望賜罷免故有是命從義郎閣門祗候种浤知永康軍浤自陳師道之子别無人食祿故除之癸卯權户部侍郎兼權知臨安府錢端禮入見上言近制初除從官許論薦人才以備擢用竊見左朝散大夫邵知柔敦朴重厚清介誠實博通古今邃於學問左奉議郎魏把力學能文議論方正事親孝居官亷左朝請郎吳芾奮自儒科曉暢吏事守正不撓才力有餘知柔見知袁州杞知涇縣芾見持服乞俟任滿服闋日召赴行在量才録用從之杞壽春人也芾仙居人已見待御史汪徹殿中侍御史陳俊卿言臣等聞易曰大君有命開國承家小人勿用必亂邦也古先聖哲立言垂訓必以小人為戒以其蔽明害治怙勢招權故去之惟恐不亟臣等近日論奏湯思退乞置之典憲聖度寬宏未賜威斷臣等因讀唐史陸贄奏議見贄反復論裴延齡姦蠧其言君子小人之際甚詳而明至謂延齡其性邪其行險其口利其志凶其矯妄不疑其敗亂不耻臣等謂此數語正為思退設真小人之雄也思退初居政府時秦氏既敗朋附掃迹獨思退在焉時有語曰知不知問進之會不會問思退進之乃思退字蓋甚言其秦黨而得免竄逐也自登宰輔政由己出同列莫敢與之校如王綸賀允中稍不詭隨則多方抑之終以睚眥不協或稱疾或挂冠而去大抵小人勝也明揚人才宰相之職思退則不然己所喜者立致青雲己所惡者如視秦越以朴厚為山野以巧佞為才能專恣自用動有猜妒之心如孫道夫蜀士也慮薦其鄉之人則黜之逺郡葉謙亨其所愛也以别為知己所稱則怒而補外故正人端士耻登其門而一時躁競側媚之徒搖尾而希進錯列中外氣焰薰赫方以類聚無足怪者至若每有差除之人則必預延至私第密以告之權貴之家或有干請則阿意曲從惟恐少忤激賞等庫皆用其平日所私之𨽻使命出疆必薦其親舊苞苴之輩王曮竄逐之罪人也以其同類遇所遣親密人來致書思退必呼入宅堂委曲問動靜而致意焉不知果欲何所為哉凡有舉措率背公營私擅權植黨欺罔君上凌玩搢紳是以唾罵形於里閭之談嘲笑見於俳優之語昔唐周墀入相韋澳曰願公無權爵賞刑罰人主之事公無以喜怒行之俾庶官各舉其職天下治矣烏用權今思退反是原所以陷溺其心者由秦氏也故臣等復以小人論之伏望早賜處分臣等不勝拳拳憤激之至右諫議大夫何溥右正言王淮言臣近上章論列宰臣湯思退植黨營私懷援迷國乞賜罷黜俯伏俟命未蒙施行仰惟陛下體貌大臣務全恩意使之自圖進退曲盡始終然以思退之在相位顓權自恣擅作威福箝制天下大率效秦檜所為臺諫交章猶未足以當其罪惡謂朝奏暮斥庶幾少快天下之望豈可以大臣罷政常禮遇之使得從容於去就之間哉漢法丞相不勝任使者奉䇿即時布衣出府免為庶人有他過則乘棧車牝馬放歸田里今思退之罪惡暴著如此蓋不止於不勝任及他過而已而陛下待之之禮太過此中外所以未喻而臣等所以惶惑而未能自定也况思退平時詭譎動輒任數竊恐遷延顧望别生事端欲望特發宸衷早賜斥逐使觀聽釋然而無疑天下幸甚十有二月乙巳朔左金紫光祿大夫守尚書左僕射同中書門下平章事湯思退罷為觀文殿大學士提領江州太平興國宫翰林學士洪遵草制略曰思退蚤由迪簡亟上清華逮豫更化之初實首本兵之寄寖隆物望越秉機衡方道揆之仰成駭煩言之嘖有著此為洪遵罷翰林張本思退在相位踰三年初命臨安府印造會子許於城內外與銅錢並行至是權户部侍郎兼知府事錢端禮乞令左藏庫應支見錢並以會子分數品搭應副從之東南用會子自此始丙午同安郡主卒賜其家銀帛百匹兩主益端獻王女也侍御史汪徹言伏覩湯思退罷相播告之初訓奬過當公論洶洶須至冒陳臣等聞祕殿隆名所以褒碩德殊庭厚祿所以養真賢惟進退之得宜斯授受而為稱若時思退為國具臣當故相醜正之時遂鄙夫患失之志逮經更化分合投間巧為媚竈之辭遂致吞舟之漏遷延歲月叨竊鈞衡背公營私專權植黨所進用者皆姻戚所昵比者為姦邪以林覺之庸鄙而掌版曹以沈介之僉壬而居省闥葉謙亨坐外交而罷右史方師尹由內援而擢左司張孝祥猶有童心聽其狂説邵大受真若鬼質納其隂謀初不恤於人言但力行其私意至於臺省之遷擢管庫之差除悉諭意於數日之前欲受恩於一門之內輕視同列旁若無人謀不僉詢事皆專決朝廷除目既下擅自更張臺諫封章上聞率為沮格録其專恣之罪合在譴呵之科縱未正於典刑豈宜加於寵數願垂睿斷俯徇至公追褫職名寢罷祠祿仍降章疏付外施行使天下共悉其愆尤知朝廷不阿於貴近用以警䇿不亦宜乎初徹等再論思退欲鐫其職殿中侍御史陳俊卿曰思退未有大罪雖非相才然比之沈該則有間今該猶以大學士典州而思退顧不得則執法之地所以議賞罰者偏矣不從右諫議大夫何溥等言臣等嘗論奏湯思退姦邪已蒙威斷賜之罷黜告庭既退公論尚喧臣等竊以為有大不可者思退貪鄙之狀見於前後居官市井之人皆能縷言其在侍從也蘇簡為處守嘗以五百緡贈思退母之父而得還其母又有妹夫梅琦者毆僧至死簡諷麗水令張禋枉其獄而出琦之罪以此二事德簡簡雖病且僇力欲薦揚以報之以至在翰苑則因行權貴之詞而受金二百兩以公用錢置私物亡慮數百緡其在相位也石邦哲居越與思退之壻高翥逰邦哲藉翥以求差遣於思退始捐千畝之田低價以售既立券矣思退乃悟其非命翥取元金而還其田邦哲欣然歸之思退不折劵而懷之如故乃除邦哲福建參議官田與金皆不可得邦哲對人每宣言之至若青田之潘集平江之張楶會稽之詹承宗括蒼之潘景圭輩率家計巨萬厚以財賄肆行交結思退或與之連姻或與之補吏又如貨縑帛於鄉郡糶俸米於近州責其倍償公私咸擾政事堂不造食而折見錢權要以時新而絡繹供饋享萬鍾之祿績效蔑如更務貪鄙都人號之曰養家宰相亦可耻矣祕殿隆名真祠厚祿非勳賢不居思退何有於是臣等職司言責不敢但已伏望聖慈亟賜褫奪追寢以絶紛紛之議仍降出臺諌纍上章疏庶使天下曉然知罪惡之不可掩如此丁未詔觀文殿大學士提領江州太平興國宫湯思退落職依舊宫觀戊申左朝奉郎知嚴州樊光逺奏三衙誘略近郡平民為軍乞自今軍下不許收刺遇有闕額均下諸州招填庶幾軍無闕額民獲安堵樞密院亦奏其弊且言三衙見管官兵增過紹興二十六年元奏人數欲令以今歲終兵帳立為定額宰執進呈上曰兵不貴多當有限制今天下財賦十分之八耗於養兵朕躬行節儉未嘗一緡妄費而諸軍冗費豈可增添不已自今三衙令以見管兵帳為額在外諸軍亦與立為定額日下住罷光逺又言本州歲輸御爐炭七萬四千五百斤而不償民間之直上亟罷之是日上謂大臣曰朕頃見秦檜論除授必曰臣未知其心術如何恐招物議似未為確論且人心不同各如其面若之何盡知其心術朕謂果知其賢固當用之不然採之公論國人皆曰賢如何不用借使繆濫旋行罷黜亦惟公論但不容私意無不可也宋史全文史臣曰爵位公器也是非賢不肖公論也採之公論而任以公器設有不如所任又從而去之在我無容心焉此宰相代天之義也奈何徇一己之私見以未知其心術而遽棄焉嘗觀趙鼎薦用臣寮後乃奏罷而上謂鼎非護短益以重之又曰張浚用趙哲曲端劉錫見有其過即加重譴其措置未為有失何得輕用言者以罪浚嗚呼檜之罔上而上察之鼎之盡公浚之無罪而上知之所謂明矣初知瓊州定南寨劉薦貸黎人王文滿銀馬香錢而不償文滿怒率其徒破定南寨薦遁去其子為所執文滿遂掠臨高澄邁二縣廣西轉運判官鄧祚時為瓊管安撫調土兵擊文滿逐之奪其田以賜有功者至是以聞黎南海四郡島上蠻也島直雷州由徐聞渡半日至島之中有黎母山諸蠻環居四傍號黎人其去省地逺不供賦役者名生黎耕作省地者名熟黎皆椎髻跣足男子常帶弓矢喜讎殺女工紡織得中國綺綵拆取色絲和木綿挑織為軍幕又純織木綿吉貝為布與省民博易其居處架木為兩重上重以自居下以畜牧地産沉水蓬萊諸香為香譜第一漫山皆檳榔椰子亦産小鳥翠羽黃蠟之屬閩商值風水蕩去其資多入黎地耕種不歸官吏及省民經由村洞必舍其家恃以安熟黎之外始是州縣大抵四郡各占島之一陲其中黎地不可得亦無路通朱崖在島南陲既不可取徑則復浮海循島西南所謂再涉鯨波也四郡之人多黎姓蓋其裔族而今黎人乃多姓王云敷文閣直學士致仕劉一止卒年八十二一止樂易長者聞人有少善率稱道不容口夜白氣如帶東西亘天己酉詔三衙官軍並以今年嵗終月分見管人數為額日下住招自今有闕並申樞密院取旨下諸郡招填用本院奏也太學博士鄭聞言太學補試弟子員至五六千人望自今以舉人居本州縣學滿一年三試中選及不犯罰者州縣保明給據聽赴補試從之言者論近太府寺選官檢視左藏庫有剩物計值十四萬七千餘緡乞依天聖故事拘管入帳不得將剩數比折欠少仍於京朝官諸司使副內選委有風力屢更事任可以倚仗之人為庫官從之右文殿修撰知綿州孫道夫卒詔復敷文閣待制致仕壬子祕書省校書郎王十朋守著作佐郎太學博士鄭聞為太常博士癸丑樞密院言三衙官兵已立定額江上諸軍理宜一體詔鎮江建康府江池鄂州駐劄御前諸軍並以奏到九月分見管兵帳為額內江州荆南府有未招人數聽招足日住招應諸軍日後有闕具數申樞密院招填國子博士劉藻兼建王府小學教授侍御史汪徹言諸路經總制錢以十九年為額其數太多財賦所出當究源流十九年經界初行民輸隱漏之賦蓋是適然今當取十年間酌中之數為額先是曹泳在版曹始立定額其後李邦獻賀允中黃祖舜數以為不可而其言不行並見紹興二十六年及是陳康伯進呈上曰可令户部具十年中數立為定額仍比十九年數減多少十年內通欠若干若不與除放及減歲額恐虛挂簿書又慮州縣科敷取足以困百姓於是批旨行下按紹熙中東南諸路經總錢歲收一千四百四十餘萬緡乃又多於紹興十九年之額不知何故當考既而江西提點刑獄公事黃應南入見又請盡除遞年積欠經總制錢從之乙卯宰執奏纍有臣寮論知縣庸儒不職上曰知縣若非贓私慘酷依祖宗朝與兩易其任不理違闕此良法也侍御史汪徹言太常博士朱熙載嘗以贓罪被斥湯思退引在奉常情同膠漆祕書省正字查籥為洪州司户諂事張常先任滿造都知張孝祥為思退所喜即走其門孝祥以氣類之同大相稱引逮孝祥之去恃籥以為心腹使之刺探時事每與思退書皆籥密為傳送詔並罷按籥在館中以論事稱今年十月乙丑面對不知所言何事也丙辰武德大夫建康府駐劄御前第三正將王玘降一官放罷以都統制王權劾其強刺民為軍故也初右奉直大夫直顯謨閣續觱以帶職乞磨勘中奉大夫既許之矣起居郎兼權中書舍人楊邦弼言其非舊制封還録黃丁巳進呈陳康伯奏此由秦檜放行王晌等三人遂致援例者衆實違令甲上曰檜不獨此一事放行且如禁軍換易亦改動祖宗格法朕因思霍光專政廢昌邑殺許后威震天下魏相乞除奏事副封奉行祖宗故事孝宣是以致中興之功祖宗成憲豈可不守朕無一事敢違舊章康伯曰當以邦弼所奏報行庶絶後來援例之弊上曰善戊午殿中侍御史陳俊卿言太常丞兼權吏部郎官吳曾素乏鄉譽昨以上書得官因挾命術遊時相之門敢為大言士流嗤鄙今處銓曹懵不曉事詔曾與在外宫觀己未左朝散郎新福建路提點刑獄公事李莫特降一官莫前知瀘州續觱為本路漕為屬吏宇文紹直求補發薦牘莫許之矣既而郡以為觱所詰莫怒以觱私書申三省及御史臺右諫議大夫何溥論莫非士大夫之所宜故有是命紹直時中孫也初廣右土丁自熙寧間有詔五丁取一免其科役每一年在縣一年上州自仲冬至次年正月終分畨三日一閲取事藝最髙者二分先放之至是州縣多以土丁供雜役每遇放免則或取其錢議者以為言詔禁止庚申詔春秋三傳非係釋經處毋得出題以取士用右正言王淮奏也自秦檜擅權舉人對義者多附會時政失經旨故淮奏及之辛酉言者論六卿分職條章亦異朝廷特總其要而已今則不然均是事也而有前批後批之殊同是事也而有元降續降之別欲豫則巧為傅會欲奪則工於舞文情法不相當則云更合取自朝廷指揮自知無法可行則云如朝廷特降指揮於本部條法别無違礙有勘當已上而退送者有未及勘當而套狀者或因堂白而面授旨意或無處分而惟務陸沉變亂舊章眩惑觀聽人無所措手足始干託請求惟朝廷之命是聽百官有司交失其守而名實亂矣望詔三省大臣凡四方奏請送有司者令各以成法來上其不以實而依違遷就者主典科違制之罪長吏以不職免所居官庶幾道揆正於上法守明於下矣從之詔自今三衙取到綱馬看驗訖令樞密都承旨用火印撥付逐司其見管馬亦依此用印江上諸軍委總領所江池州荆南府委守臣仍自逺及近以甲字至壬字為文戰馬印左輜重印右用樞密院請也壬戌賜劉伉和州防禦使印乙丑權户部侍郎錢端禮言比年以來國家財賦經費浩瀚陛下躬行節儉宜乎府庫充溢而日見匱乏靜惟其弊必有所緣且國無三年之蓄古人所憂况以月會日計者也臣私憂過計以有限之數不可應無窮之用謹按紹興二十九年一歲之費編類成册進呈望詔三省樞密院臺諫兩省侍從同户部公共商榷究其弊原直書無隱然後條陳取旨斟酌均節使可施行實當今之急務詔户部條具以聞丙寅上謂宰執曰比屢諭卿等屯田事須先立規模如一夫受田多少以括到荒間田充佃耕牛取於何地下至農具糧種廬舍之類當悉有條理方可行下兹大事也經始勿亟庶後來無更改之弊不可以一夫獻言遽即行之當博採物議而詳審之也翰林學士兼權吏部尚書洪遵罷為徽猷閣直學士提舉江州太平興國宫汪徹之再論湯思退也首言播告之初訓奬過當遵聞乃杜門丐罷上不許疏再上乃有是命詔祕閣修撰郭瑊妻安人趙氏特封永嘉郡夫人權户部侍郎錢端禮妻令人髙氏特封平樂郡夫人趙氏宗室女髙氏宣仁后家也二人與建邸連姻故得封是日太府少卿總領四川財賦王之望始視事時總領所帑庾見在之數為錢物計一千四百四十四萬引糧二百三十萬石皆有畸而糧之樁積於沿邊者為九十四萬此皆其大槩也先是司農少卿許尹總蜀計以邊事有萌乞下四川諸州造甲二萬副許之據王之望申三十年許尹陳乞造甲二萬副自當年七月為頭未見降旨日月仍令逐旋撥赴總領所儲之利州以備軍用丁卯閣門宣贊舍人荆南府駐劄御前中軍統領劉玘為鎮江府駐劄御前中軍統制用劉綺奏也時鎮江軍中馬多老病選鋒一軍斃者六百五十餘匹劉寶為都統制利其芻秣不肯言至是錡乞揀選退馬付淮東諸州出賣上從之因詔內外諸軍所管並令諸承旨總領官江池州荆南府守臣即軍中㨂退具數取旨庚午金國賀正旦使奉國上將軍兵部尚書布薩權副使翰林學士忠靖大夫知制誥同修國史韓汝嘉見于紫宸殿上服淡黃袍不設仗安南進馴象邊吏以聞上謂大臣曰蠻夷貢方物乃其職但朕不欲以異獸勞逺人可令帥臣詳諭今後不必以馴象入獻是日直顯謨閣知荆南府續觱始至官首遺宰相陳康伯書言荆南居吳蜀之中於今最為重地邇者北敵列屯近塞哆然有建都雍汴之意疆埸洶洶靡然搖動幸其事暫輟邊人稍安而議者但知聚兵東南而不知留意於西北使敵人異時萬一徙居雍汴則其勢不得不西資巴蜀之饒以為用而南窺江浙之漕以為食也今駐蹕臨安則荆南者實江浙之右臂而巴蜀之咽喉自中興以來三十餘年矣視荆南之重如羈縻州郡故北敵有移都之謀若不汲汲然長慮而早圗之良可寒心也今荆南兵備單寡形勢削弱盍分鄂渚戍兵之半為荆南久駐之基以伐敵謀昔藝祖創業夷門其征伐開拓必先取荆南次取巴蜀而後始及江左孰謂今日荆南實鞏王室而可易為哉或謂鄂渚之兵控制淮南橫袤千里勢不可分殆不然也設使荆南有警自鄂渚援之則泝流而上殊難為功使淮南有警自荆南援之則順流而下殊易為力今分兵於荆南吳蜀萬里首尾俱應國勢自振矣康伯以奏上納其言時已命李道為荆南駐劄御前諸軍都統制乃調循贛州摧鋒右翼軍合萬人𨽻之然二州兵不以家行日夜念歸其將皆不伏道節制或問道戰守之方道曰即敵至吾壅水護城無事矣議者謂水口在城外與敵共之敵得水口塞之可以灌決之可以攻未可恃也與李道議戰守蓋馮時行辛未右承務郎襲封衍聖公孔搢為右承奉郎搢年十九法未當磨勘吏部奏搢先聖之後特遷之是冬孝慈淵聖皇帝崩于朔庭年六十一是嵗宗室賜名授官者二十有三人諸路斷大辟三十一人諸路上户部主客户一千一百五十七萬五千七百三十三口一千九百二十二萬九千八初夔路施州南平軍嵗鑄鐡錢皆有定額至是施州以民户難得鐡炭為詞令七分輸正色鑄錢七千餘緡三分折納價錢計三千餘緡並充省計之用而南平軍亦以礦苖漸少嵗鑄僅千緡視舊額不及十分之一夔錢益耗矣建炎以來繫年要録卷一百八十七建炎以來繫年要録卷一百八十七金人地名考證布薩原書作孛散誤改見卷一百五十二
