body:
  text: 建炎以來繫年要録卷一百八十二宋李心傳撰紹興二十有九年五月甲寅朔詔福建路閃生沙田權行住賣時有詔盡鬻諸路官田而閩中傍江海之地有閃生者提點刑獄公事樊光逺審於朝戶部悉令出賣殿中侍御史任古言此皆民間自偹本錢興修數年之間償費未足出賣太早其擾不細上乃寢其命延福宮使寧國軍承宣使入內內侍省都知陳永錫提舉在京宮觀以病自請也永錫尋卒贈安德軍節度使諡溫恭永錫贈諡在辛酉丙辰主管侍衛步軍司公事趙密乞增置幹辦公事一員以忠翊郎周師古充從之師古皇后姨夫今年正月補官丁巳詔殿前司選差統制官一員官兵千人往江州駐劄彈壓盜賊歲一易之以江州之瑞昌及興國軍茶寇出沒故也尋遣統制官孟圭己未上與宰執論儲蓄事上曰比緣河流淺澀綱運稽緩已支內帑錢五百萬緡以佐調度朕自息兵講好二十年所積豈以自奉蓋欲備不時之須免臨時科取重擾民耳可令户部計每歲經常之費量入為出而善藏其餘自非飢饉師旅勿得妄動敷文閣待制知鎮江府楊揆移知湖州敷文閣直學士韓仲通知鎮江府時仲通未免喪詔俟從吉之任中書門下省奏江浙四路所起折帛錢地里遙逺欲就近樁管以備軍用臨安府嚴州廣德軍二百五萬八千餘緡並起赴行在平江府湖秀州四十八萬三千餘緡並起赴平江府鎮江府常徽處州八十二萬七千餘緡並起赴鎮務場建康府宣信洪筠袁撫州一百十九萬四千餘緡並起赴建康務場池饒太平州南康軍六十四萬八千餘緡並起赴池州大軍庫江吉州臨江建昌興國軍四十七萬九千餘緡並起赴鄂州總領所詔除徽處州廣德軍舊折輕齎外餘州當折銀者並發見緡願起銀者聽自行在外令浙西提刑司三總領所認數拘催置庫樁管俟旨支撥毋得移用先是兩路折帛錢嵗為五百七十三萬餘緡並輸行都至是始外儲之以備軍用辛酉詔官員豪富之家計囑諸軍部轄人放債與軍人厚取利息於請受內尅還有害軍政令內外諸帥譏察禁止其有債負日下除放即理索及還之者皆抵罪自今有犯命官取旨仍出榜曉諭進士康舉之譽之並送南康軍聽讀日下出門令本軍常切拘管二人皆與之弟臨安府奏其輒至行在妄説事端故爾壬戌昭化軍承宣使提舉萬夀觀錢愷降授舒州觀察使提舉台州崇道觀日下出門愷以私財託軍中回易事聞故有是命其營運錢仍拘沒如係軍人欠負即除之皇叔保康軍承宣使知南外宗正事士􅱰為建寧軍節度使乙丑右迪功郎大理司直劉芮為右宣義郎主管台州崇道觀芮以疾乞奉祠三省言芮名臣之孫恬靜有守欲望少加甄奬乃有是命丙寅左武大夫鄂州駐劄御前左軍副統制王宣為京西路馬步軍副總管先是詔都統制田師中選近上兵官可往京西者師中言宣可用遂命之丁卯詔諸路錢物綱運不許差承議郎已上官管押如或差募至交納處更不推賞時言者論近之貪官爵者例求部綱之賞以遷官蔭子望自今應轉朝奉大夫及朝奉郎毋得以恩賞遷下吏部看詳而有是命戶部侍郎趙令詪等言諸路屯駐大軍例當貼降錢應副欲下𣙜貨務場印給公據關子赴三路總領所招誘客人等請淮西湖廣各關子八十萬緡淮東公據四十萬緡皆自十千至百千凡五等內關子作三年行使公據作二年許錢銀中半入納依自來優潤分數從之己巳侍御史朱倬殿中侍御史任古左司諌何溥右正言都民望監察御史汪徹等言伏見直祕閣成都府路轉運副使王之望文行純全政事明敏前將漕東蜀繼領憲臺去經界之偏重救監酒之久弊及權潼川府因行賑濟募人修城功同創築斂不及民今移節西蜀除去橫賦以寬民力右奉直大夫潼川府路提點刑獄公事續觱好謀善斷向贊王彥軍幕裨益居多逮知果州首尾六年愛惜官物甚于私財今持節東川獄訟希簡右朝請大夫知閬州王濯臨事精審下不敢欺昨知沅州嘗為部使者列薦今知閬州未究其才已上三人治行顯著委是實迹詔之望直顯謨閣觱濯直敷文閣俟更取旨升擢先是去年正月甲申有詔臺諌侍從三人已上公共推薦監司治狀三省考察至是倬等以三人應詔宰相沈該湯思退言近旨令監司守臣按察所部官屬其治迹顯著者保舉升擢緣未有定立條目致舉刺皆未能當竊見元祐間司馬光陳請舉按官吏八條委是詳密于今可行臣等今重行修立舉薦四條曰仁惠謂愛民利物衆所畏愛非疲軟不立曲取人情者公直謂心無適莫事不吐茹非內私外公實佞詐真者明敏謂深察情理應機辦事非飾詐掠美利口矜功者亷謹謂安貧守分動遵法度非詐稱釣名偷安避事者按察四條曰苛酷謂用刑繁苛殘虐踰法狡佞謂傾險巧詐危人自安昏懦謂不曉物情依阿無守貪縱謂叨餮無厭任情不法凡應薦舉者州舉之部使者部使者舉之朝廷皆籍記姓名隨材任使又慮一路一州官吏衆多長吏覺察不盡望令監司専按守倅路都監以上守倅按察在州兵曹職官以上及諸縣令丞所舉失實者取旨竄責失按察者遞降差遣一資餘所部守監司守倅皆得舉按但不坐失察之罪從之庚午詔武舉人依府監年數與免解用兵部請也詔自今州軍按發官吏應申諸司差鞫者先申提刑司如提刑有妨礙聽申轉運司次申安撫使時湖北提刑司言自去年降旨之後去年九月乙亥諸州按發公吏並申夲路諸司諸司據所申各選官前去切慮紛雜併至亦有州郡揀擇一司申乞者皆失元降指揮之意乞指定行下故有是旨壬申金國賀生辰使資德大夫祕書少監王可道副使定逺大將軍行太子左監門兼尚廄局副使王蔚入見戊寅户部侍郎趙令詪等言客人齎錢銀赴左藏庫送納却兌支江浙荆湖福建等路合起赴行在綱錢既免起綱勞費又無拋失之患公私兩利若更加優潤庶可兌納增廣除福建路依元旨外餘路州軍每千支優潤錢自九文至五十文凡十五等並於應起腳乘糜費錢內支給大約水腳費百錢者給其半他以是為差剩數令逐州樁收附綱送納從之庚辰右奉議郎梅執仁特差主管台州崇道觀執仁執禮兄也壬午上諭大臣曰聞士大夫赴調者衆當此炎暑三省樞密院可速行措置差注毋得留滯時在部選人七百餘員而所榜之闕未及其半故留滯如此既而權吏部侍郎葉義問請諸州司法及監場官並破格差注其監司州郡重疊奏舉改官有誤選人到部者許本部檢舉依法以違制論從之義問申請在六月辛卯六月甲申朔同知樞密院事王綸為大金奉表稱謝使保信軍承宣使知閣門事曹勛副之使名據日歷所書如此然不知當時所謝何事也時士大夫數言敵情難信請飭邉備沈該等不以為然奏遣大臣往探敵意且尋盟焉乙酉詔減荆南府經總制錢四千七百緡以左奉議郎通判府事張震言民力未復無可收趂也太一宫道院乞買嘉興縣常平官草田三十頃罷轉運司嵗撥齎糧五百石從之丙戌祕書丞虞允文兼國史院編修官祕閣修撰提舉台州崇道觀劉岑知泰州詔瓊州牢城內侍李廣纍經赦宥可特與量移丁亥保信軍承宣使知閣門事曹勛為昭信軍節度使領閣門事依前充大金奉表稱謝副使制曰念展儀而修聘將堅好以息民欲申有永之歡盟無易老成之舊德給事中兼直學士院楊椿所草也權尚書禮部侍郎兼侍講孫道夫罷為右文殿修撰知綿州道夫數言武事沈該慮其引用張浚故出之軍器監丞吳撝直敷文閣添差利州西路安撫司參議官捧日天武四廂都指揮使武信軍承宣使李橫為兩浙東路馬步軍副都總管紹興府駐劄橫自鄂州前軍統制召歸不知何故乃有此除當考詔自今六參日上殿班次已定遇臺諌官請對令轉對官次日上殿己丑祕閣修撰提舉江州太平興國宫張九成卒年六十八九成以病風廢且喪明前五日兩疾頓除其親舊皆喜至是偶與諸生讀江少虞所集皇朝類苑至章聖東封丁謂取玊帶事忽怒曰丁謂姦邪雖人主物亦以術取因不懌廢卷而入疾復作不能言一夕卒訃聞詔復敷文閣待制致仕九成復職在閏月乙卯庚寅權吏部尚書兼侍讀賀允中乞再致仕不許右武郎幹辦皇城司成彥忠為右武大夫以供職滿三年推恩也辛卯右朝請大夫主管台州崇道觀万俟止提點荆湖南路刑獄公事壬辰尚書司勳員外郎任文薦守監察御史敷文閣直學士知鎮江府韓仲通移知建康府癸巳詔曰朕日與二三大臣宵旰圖治而士習驕怠不恤事機以偃蹇自如為髙以緘默不言為智朝廷有期會而不應省部文符屢下監司郡守視之邈然豈肯協濟國事可丁寧告戒并宰執臺諌率先所職有仍前驕怠者重置于法仍榜朝堂寧國軍節度使殿前司選鋒軍統制李顯忠升本司選鋒軍都統制楊存中為上言顯忠才氣豈宜處之偏裨故有是命甲午端明殿學士知建康府張燾提舉萬夀觀兼侍讀燾以衰病力辭詔不允仍給寬假將理右正言都民望言資正殿學士知洪州施巨前帥靜江當兵火之後不能撫綏遂致強暴殺人及移洪州敗闕尤甚盜賊橫行詔與宫觀崇正寺主簿趙雍司農寺主簿韓元龍並遷本寺丞中書言淮東帥漕係朝廷重寄鄧根孟處義到任已久有合措置便民事並無所建明詔令具析申尚書省詔揚州增招使臣效用通舊以五百人為額以淮東帥司言本州無兵故也丙申知樞密院事陳誠之充資政殿學士知泉州誠之抗章求去故有是命言者論比年權富之家以積錢相尚多者至纍百巨萬而少者亦不下數十萬緡奪公上之權而足私家之欲富者日益富而貧者日益貧乞為之限戶部請令民户積錢毋得過萬緡官户倍之滿二年不易他物者拘入官許告賞從之七月乙巳所書可參考丁酉詔纍禁不得與苞苴交結而邇來尚或有之其在州縣則科取于民在軍旅則掊尅卒伍盈車接艦珍甘技巧以為賂遺可不痛革夫居上位者必有所欲而後人得因其所欲以濟請託之私宜申戒飭有犯重置於法斷在必行仍令臺諌糾彈在外令監司按劾池州駐劄御前諸軍都統制嶽超乞於見管軍額外增招兵校三千人許之戊戌中書言昨令諸路州軍選禁軍之半教習弓弩以偹朝廷抽取拍試竊慮嵗久諸州吝于賞給教習稍墮緩急本處無以使喚詔諸郡守臣各具見管的實弓弩手強壯人數及教閲次第申尚書省國子博士史浩為祕書郎兼普安恩平郡王府教授太學博士劉度為祕書省正字太學録李石為太學博士名烏江縣西楚霸王項籍廟曰英惠己亥王綸曹勛辭行參知政事陳康伯兼權樞密院事以西府全闕故也資政殿學士知泉州陳誠之未辭侍御史朱倬殿中侍御史任古劾誠之附會秦黨旋躋顯途冒處樞庭無補國論方欲論列已見罷遣復叨峻職典大郡天下何觀詔誠之與宫觀免謝辭鄂州駐劄御前諸軍都統制田師中遣其子右承奉郎公輔入見特遷右奉議郎直祕閣賜三品服遣還時師中創增軍校三千八百人户部請以江西經制錢總領所樁管銀應付支用從之庚子資政殿學士陳誠之落職依前左中大夫提舉江州太平興國宫左司諌何溥右正言都民望言誠之自擢右府首尾三年其所建明惟禁止玳瑁鹿胎一事而又招集富商出入門下以置田之多寡為官資之髙卑使其謀國如家見義如利施之職事豈無裨益今富貴已盈志欲已滿設為詭辭容身而出此豈朝廷所望於大臣者哉望將誠之鐫職罷祠以為具臣尸素不職之戒故有是命辛丑左朝奉大夫李光守本官致仕光既許便居行至江州而卒年八十二其家乞以本官致仕許之三十一年三月辛卯追復祕書省著作郎楊邦弼為尚書禮部員外郎陳俊卿為司勳員外郎壬寅崇信軍節度使龍神衛四廂都指揮使主管侍衛步軍司公事趙密為太尉以積閥遷也時殿前司統制官輔逵王剛升領防禦團練使中書舍人洪遵言近制管軍十年一遷二人尚未滿嵗上喜曰趙密去歲求遷詞臣謂密為節度方九年逮今乃除太尉卿論二人軍中自以為當命遂格按去嵗詞臣乃楊椿周麟之二人未知何人建言當考以日歷考之輔逵此時為右武大夫忠州團練使王剛為拱衛大夫忠州刺史祕書省正字魏志為校書郎兼普安恩平郡王府教授時楊邦弼陳俊卿以久次為郎故志與史浩並命志吳縣人也初左朝請郎提舉兩浙西路常平茶鹽公事吕廣問入對言常平義倉之法廣儲蓄以待不時之須祖宗長慮逺計也事久廢弛名存實亡縱有見存類多陳腐主藏之吏不過指廪固扄執虛劵以相授受而已蓋緣法禁至重干連猥多上下含糊莫敢輕發望每路遣官一員同提舉官遍行檢察若干係積久欠折驗實除豁若干係近新借兊責限補還自餘實在若干嚴切樁管今後依條對兊先交新米入倉方得支撥陳米雖目前不免有除豁之數然虛挂文歷有名無實決不可得之物存之無益庶幾日後見在皆是的實不與虛數相參衮同失陷臣契勘常平錢物兵火以來前後因循全失稽考今若付所司盡須起獄其間嵗月浸久逃亡貧戶無可理償若止令申嚴即恐依前但為文具詔户部看詳至是遣司農寺丞韓元龍往浙西通判平江府任盡言往江東餘路委漕臣核實仍將浸支借兊失陷數目報提舉常平官措置七月己亥元龍奏請可考甲辰詔直祕閣知揚州鄧根無所建明可與宫觀祕閣修撰新知泰州劉岑知揚州左朝議大夫鄭作肅復直祕閣知鎮江府時居民遺火都統制劉寶遣其下救之因而大掠作肅以為言他日又火寶恨之閉壁不出下令曰輒出救者死城中半為煨燼倉米被燔者數萬斛右武郎帶御器械吳挺為利州路兵馬鈐轄尋以解帶恩遷挺右武大夫封其妻李氏為淑人遣還時上已召吳拱還朝故因挺求歸而有加命端明殿學士提舉萬夀觀兼侍讀張燾纍章告老詔許歸饒州飬疾仍免朝辭俟秋涼時赴闕供職乙巳侍御史朱倬殿中侍御史任古同班入對共奏尚書左僕射沈該天資踈庸人品凡下自居政地首尾數年曽無建明以禆國論惟知冒寵黷貨無厭請託公行賄賂坌至縱令子弟凌轢州縣起造第宅騷擾公私貪鄙之迹不可毛舉上孤陛下之恩下失四海之望乞賜罷黜别置典憲直祕閣知明州趙善繼罷善繼為政殘酷民有犯私酤者毁其居罰緡錢以千計兩浙轉運副使趙子潚湯沂浙東提點刑獄公事徐度提舉常平茶鹽公事都潔交章奏其事詔善繼奉祠給事中周麟之言善繼自知明州瘐死者六七十人明州之人謂其慘酷在秦棣王會曹泳之上諸司坐視已久近方按發觀其奏牘亦未能盡疏其惡鐫官禠職以為中外之戒詔善繼放罷丙午左司諌何溥右正言都民望同班入對共奏左僕射沈該性資庸回志趣猥陋自為小官已無廉聲徒以在州縣諂諛秦檜遂蒙提挈濫厠禁嚴連帥梓夔略無善狀以子弟為商賈以親信為爪牙汙穢之蹤白簡可覆陛下比因更化之初録其一得之慮起之謫籍擢在政途俾得自新以圖報塞首冠台席亦既三年舉措乖方積失人望凡是差除莫先親舊引所厚善置在要津請託公行幾成市道夫宰相之職無所不統而該乃謂軍旅錢榖之事各有司存凡百文書謾不加省陛下近念士人留滯逆旅特降睿旨令速差注旬日以來未聞有不因介紹而得之者道路怨嗟惟恐其不疾顛也伏望宸斷亟賜罷黜上謂溥等曰朝廷進退大臣誠非細事祖宗自有恩數於是溥等皆退而俟命尚書左僕射同中書門下平章事沈該乞罷政詔不允丁未詔自今武臣不得以綱賞遷正使中書舍人門下兼權樞密都承旨洪遵言祖宗以來武臣轉至諸司使者甚少舉審官之籍不滿數百人得之既艱人以為重自兵興以來用武功賞官者衆今自武翼大夫以上至不可勝紀既無員闕處之至欲附就指使押隊之屬而不可得朝廷雖知其然未有以澄汰之則遷升之路有不可不為之防者臣攝承密命每見諸路所遣押馬綱使臣多是見任大夫者一歲之間當轉官者亡慮數十人此而不革何以善後望倣文臣承議郎以上不得押綱條例庶幾班列稍簡可待立功之士故有是命尚書左僕射同中書門下平章事沈該再乞罷政詔不允初行在諸軍馬料歲用大麥七十萬斛其半令浙西諸郡民以苖米折納至是平江湖秀三郡積水冒田有司請令民間每米一斛輸稻穀倍之中書舍人兼權樞密都承旨洪遵言三郡連年水災民食不繼今麥價不下於米奈何指夏以為秋衍一以為二使之剝膚竭髓終擠溝壑乞令三郡盡免科折餘郡則以苖一斛折麥一斛五斗庶民間可以折納不至重困事下户部復不行遵在中書兼承密旨每邉防民隱必為上言之北人索絳陽郭小的安化劉孝恭等三百家遵執不可軍器刓弊命遵料簡遵區别良窳衆謂熟於軍旅者所不及由是上意益嚮用之二事以遵行狀附見其月日當考戊申言者奏行在軍衣踈紕上謂湯思退曰諸郡絹綱固有髙下聞本庫官吏分作數等最髙者應副親舊權貴其次官吏以其最下者給諸軍是致人户嗟怨自今可衮同支散仍諭版曹譏察之祕書省正字林之竒守校書郎左迪功郎胡憲守大理司直制曰爾父子兄弟皆以道名而爾志行安恬學術醇正尤見稱于士大夫間置之中都姑以示用毋云棘寺之屬而不屑就也詔右武大夫永州團練使帶御器械李彥實自藩邸事朕至今三十六年勤勞備著可特落階官忠訓郎閣門祇候劉汜為閣門宣贊舍人汜從錡在荆南上召見于內殿而有此命侍御史朱倬殿中侍御史任古言臣謹按宰相沈該頃在蜀部買賤賣貴舟車絡繹不舍晝夜蜀人不以官名之但曰沈本蓋方言以商賈為本也其在相位又暗大體如以二子改合入官為請嘗被繳駁其兄調身為帥臣捕獲小寇而該張大其事遽除次對又進階官此類繁不敢悉數大抵輕爵祿以市私恩布親故以責酬賂耄將及之不知戒得衰病日加不省國事欲望宣降纍章將該罷黜以為大臣簠簋不飭背公營私者之戒諌官何溥都民望亦言近嘗列奏宰臣沈該過惡乞行罷黜陛下禮貌大臣未賜俞允然臣等官以諌為名見惡不擊與擊而不去皆為失職該頃帥東蜀繼移夔府常令親隨人與其子弟用官舟載川貨公然販賣至荆南為守臣孫汝翼拘留追納稅錢二千餘貫未幾召用賜對之初即復私讎汝翼報罷聞者莫不寃之况又在相位黷貨無厭或啖其子而得刪定謂王方修或賂其壻而得良官此謂葛立方因緣增加以至侍從近觀大理評事八員而寄居霅川者五類皆富室右族豈無因而致哉夫宰相如此陛下不亟賜竄逐而猶望其代天工熙帝載非臣等之所知也己酉特進尚書左僕射同中書門下平章事沈該充觀文殿大學士提舉臨安府洞霄宫侍御史朱倬等言臣聞天人相與之際不啻影響之速所以彌綸輔相之者職在宰相人君揆燮調之當否而拜罷升黜之政行焉則天道何逺之有謹按沈該壟斷之夫不學無術占籍吳興其門如市百姓目之為湖州市惡結不解其咎動天去歲水潦為沴咸曰繫該之由漢法隂陽不和則册免簠簋不飭則請罪今該之罷兼是二者反以大觀文寵其行是賞姦也姦而賞之雖堯舜不能為治又况邇者暑雨頻仍幾于害稼天恩俯從臣等所請不能終日雲隂解駮陽光騰耀天人之際如此百姓之心如彼欲望將該落職奉祠以順天人之意諌官何溥等亦言該過惡暴著而使得被寵名以歸若名遂身退之所為者豈聖朝所以示好惡明黜陟伏望亟行追奪仍降前後章疏付外施行以慰公論右承議郎知平江府常熟縣丞江續之監登聞鼓院此亦為張孝祥被劾事直祕閣致仕王縉卒年八十七庚戍詔沈該依前特進觀文殿大學士致仕該以言者彈擊未已上疏力辭職名乃有是命閏六月癸丑朔右朝請大夫王珏知真州太尉知荆南府劉錡請益戍甲寅馬軍選兵千人騎二百戍之乙卯閣門宣贊舍人新江南東路兵馬都監兼荆南府駐劄效用統領官按此句上疑脫人名特免回避用劉錡請也錡又奏已招效用三千人乞分三等上等三分月支錢九千米九斗中等三分月支錢七千下等四分月支錢六千米皆八斗仍于初招日先支下等錢米俟及半年委重臣閲試事藝精熟者遞升如將來上等事藝精熟之人依諸軍效用例遷補官資從之勑令所刪定官王萬修罷放謝辭淮南轉運判官兼淮西提刑張祁言本路沿邉廬濠蔣州安豐軍民力凋弊所入不能自給即無認定本司錢物至於蔣州自罷𣙜場却從本司支撥應副本司全仰沿江諸郡合起窠名以給支費而諸郡亦自匱乏他欠既多無從追理竊見無為軍贍軍酒庫歲收息錢八千緡起赴御前激賞庫乞權𨽻本司應副支遣從之左朝奉郎史才卒丙辰祕閣修撰新知明州董蘋權尚書戶部侍郎丁巳户部言秋成不逺欲預行儲蓄收糴以為賑貸之備今科降本錢及取撥常平司作賑糴錢令江湖浙西路漕司選官置場或就客販增價收糴米共二百三十萬石內浙西一百萬石並起赴鎮江平江府常州江東五十萬石赴建康府太平池州江西三十萬石赴江州湖南二十萬石赴荆南湖北三十萬石赴荆南府鄂純州每石降本錢二千以關子茶引及銀充其數從之直祕閣兩浙西路提點刑獄公事邵大受行尚書左司員外郎戊午左太中大夫敷文閣待制知福州沈調左朝散大夫知袁州葛立方並罷調降授左中大夫仍落職侍御史朱倬殿中侍御史任古言調姦贓巨蠧前知臨安縣贓汙狼籍帥臣毛友加項禁勘獄情已具而遇大霈弟該執政擢自冗散躐帥七閩張大海寇以為調功誣罔君父濫進官職福州寺院自張守惡關節之弊革以實封調則賄賂公行福建貨鹽之弊已為重困百姓詔旨矜恤深照民瘼調悉不顧自賣安撫司鹽督責嚴酷杖背相望乞行貶竄為贓吏之戒立方汙賤躁進先因賂該之壻自曹郎而旋至侍從今又賂該之子自起廢而遽守萍鄉在秦檜時曾乞以檜不合者立為黨碑檜雖不從人皆憤怒望賜罷黜故有是命詔歸朝歸附人並以歸本朝日所給付身照使雖不曾帶到偽地被受文字亦與放行令吏部榜諭淮南轉運判官張祁言左朝奉郎知和州俞畢自謂學有師承乃中庸大學之道而過不自反實欺世盜名之人去嵗秋潦境內不熟抑勒百姓減放至少又於常賦之外以和糴為名科米三千餘石預借州縣來年稅錢急於星火一郡受害詔放罷初有詔四川隔槽酒務有敗壞處改作官監而總領財賦許尹言隔槽酒務自改置以來係人户自偹本所趂辦大軍折估若改作官監合用年計本錢至多無可應副成都府路轉運副使王之望言隔槽酒務既是槽務認定月額其監官别無職任又多徇私作過甚為公私之蠧今欲隨宜革弊莫若減罷官監今見界槽户承買如不堪倚仗或不願接續即别召人委自知縣任責驅催量支食錢本路隔槽一百三十四共減監官七十一員從之己未尚書户部郎中莫濛責監饒州浮梁縣景德鎮稅坐打量江浙淮東沙田蘆場奉行失實拘催及于貧民故也仍詔所增租課皆罷以示優恤辛酉直顯謨閣知臨安府張稱充祕閣修撰知明州直祕閣兩浙轉運副使趙子潚直敷文閣知臨安府右朝奉郎通判無為軍孔瓉知和州工部言軍器所役人比舊數多昨發回兩浙路兵匠欲揀其壯者復令赴所從之詔諸路常平司以見管錢三分之一措置糴米以偹樁積壬戍詔無為軍崑山縣礬場所收錢權以四萬緡為額癸亥武功大夫貴州團練使鎮江府駐劄御前後軍副統制李寶添差兩浙西路兵馬副都監臨安府駐劄不釐務寶與統制劉寶不協領殿前都指揮使職事楊存中言於上乃令赴行在罷從軍甲子詔觀文殿大學士沈該落職依前特進致仕侍御史朱倬等言臣等屢拜章疏則四方萬里何以知其罷黜之由詔臺諫章疏令報行倬又與左司諫何溥等論列不已乃有是命倬又請罷福建安撫司官賣鹽以寬民力復寺院實封投買之法以其錢助軍衣及百姓非泛雜科從之尚書吏部員外郎兼權右司郎官周操提舉福建路常平茶鹽從所請也詔荆南見有屯駐官軍帥臣劉錡可帶節制屯駐御前軍馬乙丑右朝請大夫知道州向子忞直祕閣知廣州左大中大夫李椿年卒丙寅右承奉郎吳曽守宗正寺主簿左迪功郎李浩充敕令所刪定官浩臨川人也詔左從政郎黃文昌已降召赴行在指揮更不施行文昌為起居舍人張孝祥所厚既辭崇德之辟事具今年二月甲寅有詔召之殿中侍御史任古劾文昌隂險狂率公私誕謾以掠虛譽命遂寢丁卯寧武軍承宣使侍衛步軍司第一將統制官戚方為本司前軍都統制以主帥趙密薦其纍立竒功可以倚仗也武功大夫忠州刺史孟邦傑為江南西路兵馬鈐轄邦傑邦榮弟戊辰大省淮西冗官自通判教授諸司屬官兵職曹官巡檢主簿下至指揮醫官凡百六十員以事簡民稀州郡無以供億故也直徽猷閣知福州程芾左朝散大夫通判福州趙績之並降一官本州左右司理參軍何緯徐敦石並放罷先是本路提點刑獄公事樊光逺奉詔慮囚而福州司理院無罪繫獄者百四十人光逺悉釋之乃以聞故有是命既而本路運判官趙不溢奏芾用心詳審但年老多忘遂致淹延乞與宫觀三省言建州乃不溢置司所在便文自營弛慢不職詔芾如奏不溢降一官不溢降官在是月丙子左司諫何溥言知徽州潘莘乃沈該之甥壻自該召用引在郎曹凡士大夫之干求差遣者舉集其門珍玩苞苴何所不有尋為臺諌所言劾章不下濫從外補士論不平久矣望賜罷黜仍永不得與堂除從之詔建康鎮江府起發氷假勞費人力可並罷己巳故責授嚮德軍節度副使王庶追復資政殿學士故責授祕書少監黃潛厚追復左通議大夫官子孫有差淳熙中諡庶曰敏節右承議郎新通判蘄州向淡改通判平江府淡子諲子用守臣敷文閣待制陳正同請也既而左司諫何溥言守臣辟差通判於法有礙乃罷之淡罷在是月壬辰辛未左司諌何溥言制官必正其名然後責有所歸治事必即其所然後課無不辦鄱陽永年永豐兩監當諸路鼓鑄之半鉛錫銅鐵四面輻輳祖宗以來置其地宜矣比年有司措置無法所得不償所費遂請廢罷朝廷初欲分𨽻漕司而諸路隔越不相統轄其勢無以通融遂議總制於版曹訪聞拘收銅器所在山積類乏鉛錫致妨鼓鑄正使一司官吏措置檢察朝夕不懈猶懼乏事况提領端坐省部而可以責辦於數千里之逺者乎人謂此議發於沈調而該主之故二三年間雖版曹亦知其非而未敢請自該之罷論者翕然以為當復蓋利害彰灼不待辨而自明也詔令給舍議中書舍人洪遵等議曰唐有鼓鑄使國朝或以漕臣兼領或分道置使或釐為二司自中興以來置都大提點官事權太重官屬太多動為州縣之害但當隨時之宜為救弊之計間者亟行廢罷事出倉卒既罷之後又無一定之論初委轉運使又委提點刑獄又委郡守二號令紛紛不一鼓鑄益少乃命版曹提領雖以侍從臨之然官守不専勢難踰度而屬官有幹辦公事又有措置官間一差出州縣承迎甚於使命則命權視前日又重矣罷提點一人官屬十餘人而總以侍從置在京官屬四員下至胥吏之類額雖減而月給數倍則官屬視前日又不少矣異時提點坑冶以一職名官猶懼不濟而况版曹錢穀之司逺在數千里外符檄往來安能辦治官屬之出不過毛舉細事以塞責耳遵等竊以為復置便今欲參照祖宗舊制及今日利害以江淮荆浙福建廣南路提點坑冶鑄錢公事繫銜與轉運判官序官依舊於饒贛二州置司輪年守任専以措置坑冶督責鼓鑄為職如州縣於坑冶不職許從本司按劾饒贛州置屬官各一員韶建州置檢踏二員别置稱銅催綱官各一員專差武臣詔依給舍議罷提領官權户部侍郎董蘋言民有常賦國有經費會天下之賦以資國用使州縣以時催供部使者以時程督綱目俱存何有不足然今賞罰有一定之格而論賞者紛紛被罰者甚鮮有勸無沮孰不弛廢望許户部擇違慢最甚者具名以聞特賜降責庶使人知警懼而財用無散逸嵗計可以指擬從之詔州縣書坊非經國子監看詳文字毋得擅行刋印以言者論私文異教或傷國體漏泄事機鼓動愚俗乞行禁止也初賜祕書省曝書會錢千緡令本省自辦罷臨安府應副言者論近者蠲除關市榖米之稅而諸郡禁民私相糶糴皆令從官中請斛遣官監視每斛有收斛子錢一二百者他費又倍之望行禁止詔監司覺察癸酉給事中修國史兼直學士院周麟之為翰林學士修國史權尚書工部侍郎王晞亮兼權給事中起居舍人張孝祥試中書舍人祕書少監黃中為起居郎殿中侍御史任古監察御史汪徹為殿中侍御史尚書都官員外郎楊倓直祕閣提舉兩浙西路常平茶鹽公事以其父存中援更迭詔書有請也右正言都民望言近降指揮依户部措置儲蓄收糴米斛此大務也然其間措置有未當約束有未盡倉場情弊中外一同交納邀求在所不免若和糴之價不髙于市直人誰肯就場申糴又物價髙下隨時低昂官私收糴之初略集行人供具三等價直後有增減更不復問所以民間雖與中交易謂宜約束依公實增勿為文具隨時增減勿為定價又所糴米專委知通認數樁管緣交量損折或積久米乾重以鼠雀之耗若令認定必致增損斗面誅求於民又以銀折錢須依市價折支方使人無詞説茶關充本須刷實錢應副方得事務濟集望申命有司講畫曲盡詔戶部措置户部乞令諸州守倅逐旬審度估定每石量增市價一二百錢每樁收及一年聼除一釐充折耗之數仍令牙人把斛交量勿用斗子官吏量給湯茶食錢每糴及五萬石減磨勘半多者併賞其關子茶引並令漕司先兊見緡從之甲戍直祕閣主管台州崇道觀范如圭知泉州左朝散郎馮時行知黎州用王剛中薦也詔淮西馬步軍副總管兼權知廬州劉綱給真俸丙子左從事郎新主管户部架閣文字查籥為祕書省正字武略大夫新荆湖北路兵馬鈐轄魏震兼權知荆門軍丁丑潭州觀察使樞密副都承旨吳拱為利州西路駐劄御前中軍都統制充階成西和鳳州路兵馬都鈐轄兼知成州拱乞依例升充副都總管從之拱升總管在是日戊寅詔故左奉議郎祕書省校書郎任質言特與一子恩澤以祕書少監任古等援常明故事有請也常明事在紹興九年十月時校書郎洪邁當草奏僉謂質言故諫官伯雨之孫篤學安貧議論徑正乞特官其嗣以勸忠義正字劉望之摘邁草曰只如此意似不廣宜增數語云亦使四方英俊知館閣養士雖其不幸亦蒙哀恤如此邁既如其言私怪之未逾月望之暴得疾一夕卒其官亦左奉議郎同舍又請宰相湯思退曰若更行此遂成永例恐議者不以為然聞其生前多著書若悉上送官亦可持以為説祕書丞虞允文乃諭其家盡録望之遺文合數百卷上之下兩省看詳俄而思退去位事竟寢己卯加諡秦魯國賢穆大長公主為賢穆明懿以其子少傅榮國公忱援故事有請也軍器監主簿馬騏言陛下加惠蜀民日者命有司除放州縣虛額錢此舉所繫利害甚重凡所謂虛額者皆出於鹽酒之課蓋鹽泉有盈縮則煎煮之數不能無多寡人煙有稀稠則酤賣之數不能無通塞向者有司但持目前一定之額而課其息將新蓋舊用實填虛卒以無償徒費督責望下四路監司取見鹽酒課利三年內所收實數以酌中一年為額使之趂辦其目前虛額之數盡與蠲除詔總領所相度申省詔故左朝奉大夫孫佑追復直徽猷閣官一子以其家自訴為李綱私意奏劾坐遣而死故也建炎以來繫年要録卷一百八十二
