body:
  text: 建炎以來繫年要録卷九十宋李心傳撰紹興五年六月癸卯朔趙鼎言資善堂極褊隘恐方暑不便上曰粗令整葺可也朕常以營造為戒居處不敢求安前日孫近乞罷修學士院今雖艱難之際然學士院上漏下濕如此若不略與修葺非朕待遇儒臣之意右文殿修撰主管江州太平觀王倫令依舊在外居住日下出門時上召倫赴行在倫因留不去殿中侍御史張絢奏倫鴟張大語誕謾無稽朝廷防秋在近為今之計除戰守二策之外並不當問若不棄之於外將恐搖國家一定之議惑將士效死之心利害所繫誠為不輕望令倫依舊在外居住以安羣情故有是命左朝請大夫尤深知韶州還入見上問深以廣東盜賊多少及今何在深言諸盜頃為韓京所擊或歸湖南或在連州屢乞就招京不許然京以孤軍未能分捕上曰北兵至南地道路險阻施放弓弩皆不便京不招安未為得䇿也甲辰皇伯武經大夫邵武軍兵馬都監令矼為華州觀察使安定郡王直祕閣知平江府孫佑主管台州崇道觀從所請也是日洞庭賊楊欽將所部三千人詣嶽飛降初張浚至長沙親臨湖以觀賊勢疑未可攻會有急詔召浚還朝謀防秋之計飛至潭州出圖示攻討出入之要且曰擒之易耳浚曰恐誤防秋之期俟明年再來討之如何飛請除往來之程限八日破賊請浚曲留以俟之浚然之光是湖南統制官任士安王俊郝最等領兵二萬餘不稟王􅊛號令遂至於敗及飛始至鞭士安以折其氣使為賊餌令曰三日不能平賊皆斬先揚言嶽太尉兵二十萬至矣及是止見士安等軍賊併力拒之三日飛乃以大兵四合一戰破賊衆殆盡乘其舟以入水寨欽等迎降欽在賊中最悍所至常先諸賊楊太恃以為強飛厚待之賊愈喪氣於是浚承制授欽武略大夫熊克小厯載浚欲歸防秋在欽降之後蓋誤今依林泉野記附在其前日厯載浚奏狀有云臣比欲便依聖訓起發恐將士懷疑欲俟六月上旬見得水賊未下即兼程前去行在又云飛約程今月二十五日可到鼎州而欽以六月二日降足見克所書差誤也野記又云飛杖欽等各一百遣還水寨恐未必然今不取乙巳名新厯曰統元詔宣州當職官各轉一官以江東提刑司言本州去嵗獄囚三百五十五人無疾死者用二月乙卯詔書推恩也時宿松縣囚七人死一人縣令坐降一資然行之僅三年而止蓋自趙鼎去位遂不復舉行焉宿松縣以七月己丑行遣今併書之今年六月丁卯衢州當職官八月戊辰福州左司理院十一月甲申袁州司理院六年九月丁丑臨安府右司理院七年七月丙寅福州右司理院並轉官六年二月壬戌洋州司理院降一官七年七月丙寅汀州武寧縣展磨勘一年故太尉种師道加贈少保諡忠憲師道從子閣門宣贊舍人知敘州湘以師道嘗上書入籍請於朝故有是命師道已見建炎元年正月辛卯黨籍种師極前知德順軍坐上書論役法餘官第一百一人後改名師道左武大夫和州防禦使同管客省四方館閣門公事韓恕知閣門事兼客省四方館事新制也丙午上諭輔臣曰近令諸郡以箭鏃改造甲葉恐再於民間科敷密院只今行下令止於作院打造毋得科擾百姓趙鼎曰陛下恤民如此臣等敢不奉承聖意尚書祠部員外郎張銖為荆湖北路提點刑獄公事左朝奉大夫幹辦諸司審計司辛次膺行尚書駕部員外郎江南東路轉運判官黃子遊貶秩一等先是有詔悉賣係官田宅每路委監司一員總其事惟福建路提點刑獄吕聰問篤意奉行餘多茍簡都省言聰問係朝廷專委本職自當悉心措置而子遊在諸監司中最為留滯乃命先降一官令提刑司詰其弛慢之因俟至取旨子遊實孫也武功郎閣門宣贊舍人神武中軍前部統領軍馬王滋言祖母孟氏年九十二願納一官為孟氏敘封從之滋陜西人也丁未罷饒州鑄錢司合行事務權領虔州本司兼管自渡江後泉司所發額錢比舊十虧八九朝議以為兩司責任不專職事因致廢弛乃合為一司後二日以直祕閣韓球提點江淮等路坑冶鑄錢令往措置六月戊辰改命龍圖閣直學士左中奉大夫知德安府陳規貶秩二等右朝請郎主管江州太平觀鄭釋之降授右承議郎依衝替人例施行係事理重黃大本既抵罪規等坐前為池州守二各不按劾並責之而規以守邉故末減先是祠部員外郎林季仲嘗因面對乞重縣令之選因欲丐一縣令以自效其言曰事有切於治道不可一日非其人而前後沿襲視以為常者監司守令而已至於縣令位輕責重尤為卑猥可憐者監司郡守吾之父兄也目指氣使固所甘心下至屬官憑藉侵辱無所不至雖一卒臨門亦得而玩侮之以故稍自好者耻就此職往往罷癃而暗懦殘虐而貪暴者乃始屑而為之嗚呼令非其人一邑受其弊守非其人一郡受其弊監司非其人一路受其弊積諸路而言之其弊有不可勝言者將何利於國家而輕是選耶陛下憂憫黎元思得良吏以共理天下比降明詔銓量監司郡守以示黜陟雖資考應得才非所長者厚以祠祿終不輕畀之其於縣令尤所遴選且令館職以上各舉所知所以惠顧斯民者可謂至矣然薦章之上今既數月孰當孰否缺然未聞豈所薦者皆不得其實抑將有以處之而臣未之知也人固不易知言固不可盡信盍亦參酌衆言斷以聖意曰某人某人可為監司用某人之薦也某人某人可為守令用某人之薦也少須嵗月以觀能否治狀尤著者受進賢之賞廉聲不聞者被繆舉之罰周官曰舉能其官惟爾之能稱匪其人惟爾不任不任之罰其得而辭乎近世薦舉牽親故之私迫權貴之請鮮有出於公者至其曠敗事在有司乃始以狀首免曰今聞某人改節云爾蓋由犯贓同罪其罰太重遂使令典久為虗文且如近日池州貴池縣丞黃大本枉法受賕流配海外若使舉者同罪事亦難行議者欲止於降官或薄罰以愧耻之期在必行不許首免人亦孰肯輕於舉人自貽他日之羞乎况今嵗亢旱所及者廣榖米登場民已告飢撫字凋瘵尤在得人臣才力綿薄不敢為其上者願從陛下丐一縣令往以自效倘能布宣德意少裨聖治他日備陛下使令復未晚爾臣承乏郎曹求為縣令若不情者然官職輕重惟陛下如何以省部為重則重在郎官以斯民為重則重在縣令夫亦何常之有漢館陶公主為子求郎明帝不許曰郎官出宰百里有非其人人受其殃蓋非以郎官為重重其出宰百里也古人有言曰請自隗始郎官出宰百里請自臣始季仲此奏未得其月日當是黃大本已斷之後陳規未降官之前今且附此右朝請郎知潮州徐渥降一官放罷先是渥言新守王升違年不赴留迓吏私役又言前守蔡詗死其子受屬邑夫緡皆乞取勘尚書省勘會渥身為士人薄於風義若不懲戒何以勵俗故有是命己酉上謂輔臣曰朕以南班宗室請給至薄甚有貧寠者昨日出內帑錢每人賜二百千令宗正丞沈禹卿散給尚有親賢宅近屬已取會人數别行給賜趙鼎等曰今宗室凋零無幾陛下敦睦如此盛德事也國子監丞王普為太常丞右朝散郎新知萬州馮康國為荆湖北路轉運判官是日建國公初出資善堂上命見翊善范沖贊讀朱震皆設拜趙鼎等得旨依故事謁見沖等每因箋奏導國公以仁義之言輒縹軸藏之時一展玩國公常得李公麟所畫孝經圖沖書其後略曰孝者自然之理天地之所以大萬物之所以生人之所以靈三綱五常之所以立學然後知之心不茍慮必依乎道足不茍動必依於禮行之以不息守之以至誠造次必於是顛沛必於是及乎習與性成是謂純孝不然無以立身矣豈不見夫諸侯車服之美儀物之盛尊榮如此國公以幼學之年享寵祿之厚盍思所以保富貴之道乎故沖以諸侯之事為獻曰戰戰兢兢如臨深淵如履薄氷周之諸侯其入而居於王所則皆謂之卿士故沖又欲以卿大夫之事為獻曰夙夜匪懈以事一人國公其勉之庚戍資政殿學士知成都府王似薨辛亥趙鼎進呈以旱乞分委侍從官等遍走羣祀祈雨澤上曰亢陽如此朝廷政事闕失更宜講求鼎等曰敢不奉詔近日蠲除翎毛箭鏃及官舟運糧等事皆是仰承聖意以寬民力沈與求曰雲漢之詩雖上下奠瘞靡神不宗不廢禱祈之事要之以側身修行為本陛下勤恤民隱如此宜蒙嘉應忠翊郎閣門祇候張昂特遷從義郎與州鈐轄差遣録其守石額山寨之勞也尋又以其弟鄉貢進士昴為下州文學昴補官在是月丁卯廢蘄州羅田廣濟二縣並為鎮壬子起居郎朱震言竊見陛下經營荆楚控制上流已命王彥領兵直入江陵遂與襄陽表裏相應在兵法所謂先發者制人誠得禦侮之上䇿然一方之民久罹荼毒若不優加綏撫則民未有息肩之期且如峽州四縣兵火之後多用軍功如胥吏攝知縣欄頭補鹽稅椎膚剝髓民無告訴伏望取峽州江陵府荆門公安軍州縣官闕令吏部破格差注或委安撫司别行踏逐可任之人奏辟一次庶使德澤下流民瘼上聞荆湖之人得免塗炭乃詔四郡官屬並令彥具名奏辟內知通朝廷審量除授其曽充胥吏人毋得舉辟及權攝如違各科違制之罪右承直郎添差衢州西安縣丞貫道特改次等合入官道燕人為劉晏部曲以與斬王鈞甫之勞當循二資吏部言道無依格舉主若候改官了日收使係成虗文故有是命十二月壬寅歸朝官改秩指揮恐緣此事録故贈承議郎張璠弟琛為英州文學以璠權鄄城縣丞守禦戰歿也癸丑手詔聞諸路久愆雨澤繇朕不德致斯亢旱雖恐懼修省思所以答譴戒弭天災尚慮州縣違戾詔令重擾吾民致傷和氣除稅租和預買及應副大軍之外應干科敷催驅等事日下並罷仍仰州縣具析所罷名件申尚書省是日荆湖制置使嶽飛破湖賊夏誠飛既降楊欽率統制官牛臯傅選王剛乘勝急攻水寨賊將陳瑫內變劫偽太子鍾子儀船獲金龍交床與龍鳳簟等詣飛降楊太窮蹙赴水死餘黨劉衡等相繼皆降飛入水寨殺賊衆殆盡惟夏誠寨固守寨三面臨大江背倚峻山官軍陸攻則入湖水攻則登岸至是飛親往測其淺處乃擇善罵者二十人夜往罵之且悉衆運草木放之上流賊聞罵聲爭擲瓦石擊之草木為瓦石所壓一旦填滿飛長驅入寨遂執誠湖寇悉平黃誠斬太首挾子儀奔都督行府此以林泉野記熊克小厯并嶽侯傳參修傳又云楊欽領兵到金橋山遇伏敗降欽獻計曰楊太可擒容欽令人報楊太今任士安敗走又聞後有救兵至吾兄急將士卒速來助欽擒捉士安等以除禍根楊太聞之必自領兵前來多用伏兵截楊太不為難也侯遣牛臯傅選王剛等各領兵伏於道側楊太果自領兵應援臯等伏發太得脫乘舟走入水寨侯將兵入寨擒楊太夏誠鍾子儀等並斬之此所云與諸書不同按日厯太乃其徒所殺誠子儀亦不死傳所云差誤今且附此更俟詳考中興聖政何俌龜鑑曰竹籖之題卒誤鍾相相既擒矣么猶相也然而昌宇致討而不能平王􅊛招安而不能伏及張浚至醴陵召間諜之囚釋其縛而縱之歸使諭寇於是么之將楊欽降卒有喪膽之嘆嶽飛至鼎城取偏裨之慢令者鞭之以折其氣使為賊餌於是么死而誠擒果應飛來之讖此平楊么之功烈也吕中大事記嘗謂宣王中興平外侮耳光武中興平內寇耳而髙宗欲攘外則內寇轉迫欲除盜則外敵復張而降張遇等殺杜用丁順等則有王淵擊李昱平趙方則有劉光世却丁進則有守臣康允之破戚方則有守臣周把誅葉儂討李成則有張俊平范汝為平曹成則有韓世忠而楊么據上流僣號紀年尤為腹心之害嶽飛一至八日而應飛來之讖湖寇盡平而內寇始息矣使當時諸盜不作諸臣得以併力中原豈不足以建立事功哉甲寅詔建國公祿賜比皇子尚書右僕射都督諸路軍馬張浚乞在外宫觀先是浚與淮東宣撫使韓世忠議令舉軍屯泗上既而世忠退屯楚州且令提舉官董旻入奏事浚遂請祠趙鼎進呈上曰浚必未知此間曲折故有此請昨日朕已降詔諭之矣世忠移屯既略如初議浚復何疑鼎曰臣等各已作書詳報浚矣董􅌈亦謂他日有警老小必移歸鎮江則積糧淮南非便浚必具曉此意沈與求曰聞浚與世忠初議屯泗上既而世忠退屯承楚之間則已與浚初議小異矣若緩急之際老小必須動則儲糧南岸逐旋般運似極穩當上曰朕見􅌈所請似合宜乃以親筆諭世忠如所奏尚書左僕射趙鼎知樞密院事孟庾參知政事沈與求奏自五月丙子不雨今越四旬叨冒近司輔政無狀致此譴戒伏乞特降威命正臣等之罪早賜黜責詔答曰旱暵逾時甘澤未應乃朕菲德非卿等咎各安厥位無得再請三省言訪聞淮南每至防秋所屬多以運糧為名或稱備賊擅拘收官私舟船詔禁止犯者抵罪著此用見趙鼎此月辛亥所奏寬民力事左奉議郎新太常博士張九成乞以磨勘一官為父右承事郎伸改五品服從之乙卯故追復集英殿修撰朱師服再復寶文閣待制師服已見三年八月丙午師服孫右迪功郎秉文言師服任禮部侍郎坐與蘇軾往來入黨籍乞復未責降以前從官職名故有是命已而有以白劄子遺趙鼎者併以師服賀紹聖改元及謫官謝表上之其間有曰首元祐之謫籍二紀於兹尾神考之從班一人而已夤緣軾轍之度嶺初一承顔先後安李之當塗未嘗通問乃詔復職指揮更不施行已給告身令吏部拘收申省毁抹後旨在十月丙午降授左朝奉大夫郗漸充江東宣撫使司書寫機宜文字用張浚奏也右朝奉大夫李棫追二官棫以建炎冬祀乞任子恩而吏部審量棫以進築隆兖州功賞改官故有是命丙辰趙鼎等再引咎乞去位上曰旱魃為虐皆由菲德所致豈可移過大臣然有闕政當講求之是乃弭災之道毋庸再請鼎等頓首謝丁巳給事中陳與義充顯謨閣直學士提舉江州太平觀與義與趙鼎論事不合故引疾求去徽猷閣待制提舉建隆觀兼史館修撰兼侍講資善堂翊善范沖言伏見和靖處士尹焞誠眀之學實有淵源直方之行動應規矩內外淳備毫髮無玷實為鄉閭之所尊禮士夫之所矜式臣無能髣佛舉以代臣允愜公議詔川陜宣撫司以禮津遣赴行在焞已見建炎元年八月焞程頥髙第也頥死聚徒洛中非弔喪問疾不出户士大夫尊仰之靖康初种師道薦於淵聖召至闕將命之官力辭而去建炎兵亂鎮撫使翟興辟之不能致紹興中避難長安偽帥趙彬以劉豫命玉帛招之焞却幣奔蜀居於涪州上聞其賢故召故光祿少卿陳適贈右文殿修撰例外官其家一人適亨伯弟也靖康末奉詔割中山地亨伯以大義遣之金挾適去後卒於燕山初神武中軍有與百姓競者其徒奪之以去且擊傷邏卒事聞詔統制官楊沂中執付大理治罪言者論陛下禮遇將士無所不至其間統兵者乃有馭下不嚴致兵人犯法無所畏忌重貽聖慮乞依公根勘重置以法其統兵官亦乞嚴示懲戒從之是日湖賊黃誠以鍾子儀至潭州都督行府湖寇既平得丁壯五六萬人老弱不下十餘萬張浚一以誠信撫之乃更易郡縣姦贓吏宣布寬恩命嶽飛進軍屯荆襄以圖中原浚率官屬泛洞庭而下張浚行狀云湖寇盡平老弱不下二十萬而日厯云降賊二萬七千户不言人數今且云不下十餘萬庶不失實時淮東宣撫使韓世忠江東宣撫使張俊皆已立功而飛以列校拔起世忠俊不能平先是飛皆屈已下之數通書俱不答及飛破楊太獻樓船各一兵徒戰守之械畢備世忠始大恱而俊益忌之浚之初被詔還也上奏言水寨闕食徒衆頗離據飛稱旬日之間可見次第臣欲更依聖訓起發慮賊勢轉熾將士懷疑欲俟六月上旬見得水賊未下即詔飛來潭州訖兼程赴行在許之而賊已破矣浚奏狀以六月十五日丁巳行下即黃誠等到潭州之日戊午左奉議郎新太常博士張九成為祕書省著作佐郎是日早朝上問輔臣曰近有民自汴京來云張九成投偽齊有此否趙鼎曰九成見居鹽官縣焉有此事必有讒者惑聖聼比探偽齊得九成廷䇿言蹂踐民田事以此出榜然未知是否昔夏竦嘗誣富弼遣石介投契丹今欲中傷人者便以投豫誣之沈與求曰陛下召用九成則讒者息矣上曰無讒言北來人所傳不審耳然用之若遲人必謂九成不用於偽齊復還矣遂有是命九成家傳稱宦者讒之云投偽齊上不信今從日厯詔福建嵗貢龍鳳團及京鋌茶並權減半以錫賚既少空費民力故也此未知止是五萬斤內減半為復於全額內蠲減當考罷潮州嵗貢花蕉布庚申徽猷閣直學士提舉江州太平觀王居正降充徽猷閣待制居正既出守復請奉祠而殿中侍御史謝祖信言居正以強暴之姿行凶果之志頃為大臣所薦逮其去位則顯詆之曰某人小子不用吾言故至於此繼在相位者悅其言而不悟其欺復薦拔之浸與腹心之寄未幾揣事必敗因詭為異論以規後利去國之初不勝怏怏去嵗果先收召自以為言得計行喜怒威福盜於一已縉紳畏懼不敢自保大臣旋悟其引用之非出之於外莫不稱快然其凶果犯上無所顧避剡章求去厯詆廷紳自饒易台惟意所欲日者陛下知公論不容特出睿斷改畀祠官然曲加芘覆猶竊寵名使負罪之臣與以禮進退者無異臣竊惑之望下臣章宣布中外仍將居正禠職以為欺世盜名貪得無禮者之戒故有是命祖信素與趙鼎異論其所謂大臣蓋指范宗尹秦檜及鼎也皇伯華州觀察使安定郡王令矼同知大宗正事詔諸路檢察財用官度支員外郎章傑樞密院編修官霍蠡計議官徐康吕用中並日下回行在都督府幹辦公事范伯倫令歸行府供職以久旱故也壬戌左朝散大夫主管江州太平觀楊植卒植宜興人元符末上書入黨籍植選人邪下第五十四人癸亥趙鼎奏甘澤應祈乞御常膳上曰朕纍日寢食不安者豈特為國無儲蓄而望嵗之心甚切兼恐嵗飢民貧起而為盜朝廷不免遣兵討定殘殺人命亦天道之所宜憫也左朝請郎提舉臨安府洞霄宫劉僴復祕閣修撰僴初見建炎元年七月僴既用赦復官又以討論追二秩至是乞復職名後省奏僴服事蔡攸以叨官爵天下共知若使參華中祕與論撰之職則名儒碩學寓處其間者心將謂何恐非勸懲之道命遂寢甲子詔省試舉人程文許用古今諸儒之説并自出己意文理優長並為合格令試院榜諭左從事郎劉昉特改左宣教郎昉潮陽人以薦對改秩遂除宗正丞權吏部侍郎張致逺以母老乞歸南劔州迎侍詔豫告半月乙丑張浚奏洞庭湖盜賊見已盡靜上手書賜浚曰覽奏知湖寇已平非卿孜孜為國不憚勤勞誰能寬朕憂顧奏到之日中外歡賀萬口一詞以謂上流既定則川陜荆襄形勢連接事力增倍天其以中興之功付之卿乎浚奏知舒州武糾知復州韓遹招輯流亡經理郡事備見有方已各轉一官令再任又奏左從事郎知信州弋陽縣魏安行治狀顯著遂授左宣教郎安行鄱陽人也丙寅詔故觀文殿學士鄧洵仁已降贈官推恩指揮更不施行洵仁雙流人綰子也事上皇為尚書右丞至是其子徽猷閣待制襄有請詔贈金紫光祿大夫推致仕遺表恩如故事五月辛丑降旨中書舍人劉大中言熙寧之初王安石假周官理財之説變亂祖宗法度恣為聚斂民始不堪是時居風憲之地盡擊去言新法不便之人助成安石之勢者鄧綰也紹聖之初章惇蔡卞用事輔之以蔡京遂以傾搖廢立之意上誣宣仁肆意形迹至於元祐臣僚竄殛無遺是時遊章蔡之門受知最深至於元符末密啓姦謀助成紹述之説者鄧洵仁也洵仁洵武乃綰之子今日之禍起於安石發於惇卞而成於京綰之父子實有力焉且洵仁洵武在政和宣和之間相繼執政專以佞諛保固寵祿盜取官爵莫知愧耻而洵仁暮年又與內侍鄧文誥通家往來謂同譜系洵仁之子襄洵武之子雍口尚乳臭已登侍從一門僥幸搢紳所羞得死牖下已為幸免今乃敢援平時褒典求贈官及致仕遺表恩澤不知太上皇帝今在何地而欺陷太上之人乃陛下之世讎也雖未削奪官爵斫棺戮尸以正其罪而欲追寵其身施恩其子孫天下謂陛下何臣昧死契勘自崇寧以來蔡京當國王黼繼之四維不張小雅盡廢三十年間曽為侍從官已上未有不因阿附大臣交結權貴而得之者容身誤國罪則有之有何勞能更加褒録除前降洵仁贈官恩澤指揮乞賜追寢外仍乞處分有司自崇寧已後宣和以前侍從官以上如洵仁輩乞贈典及恩澤者一切報罷更不須以其姓名凂瀆聖聼庶幾有以勸天下之忠為亂臣賊子之戒自靖康初追復元祐諸臣官職後亦稍稍擢任其子孫然議論不一是非混淆趙鼎夙有此志以身任之因大中繳洵仁詞頭遂厯言熙豐紹聖崇觀政事人才善惡利害本末甚備上嘉納命榜之朝堂詔州縣毋得催理民間積欠租稅如有違犯及監司失於按舉並取旨重行竄責修武郎閣門祇候樞密院凖備將領王林卒都督府言其有捕斬劉忠之勞一子孝忠尚幼詔以孝忠為承信郎給其祿俟年及參選日止丁卯右朝議大夫直祕閣主管台州崇道觀陸置落職置初以年勞進秩而殿中侍御史謝祖信奏置貪贓狼籍毒被東南宣和間諂事中貴王通及朱勔為其僕厮以竊名位制曰朕以禮義俟君子刑罰威小人如爾奴𨽻自居又何責焉然玷官職之髙榮煩言章而論列醜慝昭著典憲未伸則姦貪肆然自謂幸免矣禠直中祕尚為寬恩往慎厥終庶逃大譴可落直祕閣詔沿湖人户紹興三年以後未納租稅雜錢之類並閣三年戊辰命翰林學士孫近知貢舉給事中廖剛中書舍人劉大中同知貢舉中書門下省檢正諸房公事吕祉殿中侍御史張絢等六人為參詳官祕書省正字李彌正等二十二人為點檢試卷官太常少卿陳桷為别試所考試官司勳員外郎林季仲等四人為點檢試卷官自後率如此例是日禮部侍郎唐輝入見奏舉人已至行在習詩賦者一千五百餘人經義者一千餘人上曰他時習詩賦者當益多然經義亦不可廢元祐皆兼習詔諸路監司州縣非奉朝旨假作軍須名色之類科須者並罷州縣令監司按劾監司令御史臺覺察如或隱蔽並重置典憲用中書門下奏也左朝散大夫趙伯瑜提點江淮等路坑冶鑄錢伯瑜提舉江西茶鹽以劉大中薦得召見時新命韓球為提點官未上遂罷球而用伯瑜球之罷雖云避郡守韓昭親嫌恐别有故當考祕書丞環中知臨江軍中嘗進春秋年表上以賜輔臣沈與求奏不知誰詮次恐不當先魯而後周甚非春秋尊王之意上曰俟更令朱震校勘與求以五月己亥奏白至是輔臣進呈上曰中荒陋一至於此士大夫著述訛舛容有之此不足罪中為人臣乃不知尊王之義豈可置之三館己巳罷福建諸州係籍槍仗手福建槍仗手者自熙寧間始有之迄是五十餘年論者言其呼集擾民乞蠲放帥臣張守以為便遂施行焉庚午大理丞路彬兼權少卿以詳議闕官故也右從政郎權鄂州江夏縣吕大周特改合入官時湖北提刑司奏大周未到任前縣户二千七百五十三任內招復增户二千八百七吏部言增及九分已上故優賞之仍照餘路視此忠訓郎李溫請納一官為其母馮氏依故父官品封敘詔封令人溫庠子也辛未皇叔蘄州防禦使士珸為泉州觀察使上之即位也士珸治兵洛州未及覃轉至是始遷左承議郎直寶文閣知婺州周綱特遷一官綱紹興初為廣東轉運判官奉詔以本司錢市米十五萬斛自海道至閩中復募客舟赴行在故遷之左承議郎知潭州湘隂縣吳樵特遷二官通判鼎州都督行府以樵接納水寨首領有勞關賞功房而有是命七年二月戊申樵又自左朝奉郎用折彥質奏轉一官疑此兩官之命又中格也當求他書參考尚書省言訪聞四川州縣官以朝廷在逺並緣軍興貪墨狼籍按察官坐視不省致贓吏得以自肆久為民患契勘黃大本於淙莫憲章已行斷配宜檢坐已斷并行遣池州知通令宣撫司鏤榜諸州縣自今官員犯入已贓許人越訴如監司州郡阿庇不即察治令宣撫司劾奏重置典憲是月汴京地震是夏金左副元帥冀王宗輔自上京還燕山右副元帥魯王昌還祁州金以其國有喪懼朝廷乘而伐之乃命左監軍瀋王宗弼以所部戍黎陽宗輔尋入見金主卒於路宗弼自戍所赴其喪取宗輔之妻張氏以歸
