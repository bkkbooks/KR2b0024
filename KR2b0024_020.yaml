body:
  text: 建炎以來繫年要録卷二十宋李心傳撰建炎三年二月庚戌朔上駕御舟泊河岸都人惶怖莫知所為知天長軍楊晟惇奏已拆浮橋始詔士民從便避敵官司毋得禁上即欲渡江黃潜善等力請少留俟報且搬左藏庫金帛三分之一上許之此據行在録修入熊克小歷云葉夢得請以赴行在所藏金帛五十萬分其半併歸姑蘇金陵從之蓋據夢得行述所云當考户部尚書葉夢得即具舟楫從大將假二千人津發一日而畢然公私舟交河中跬步不容進矣夢得復請以户部所餘物前期支六軍春衣及官吏俸一月亦從之遂命御營統制官劉正彥以所部從六宫皇子往杭州幹辦御藥院陳永錫護皇子又遣吏部尚書吕頤浩禮部侍郎張浚往沿淮措置金以數百騎掩至天長軍統制官俱重成喜將萬人俱遁亟遣江淮制置使劉光世將所部迎敵行都人謂光世必能禦敵而士無鬭志未至淮即潰金人以支軍侵楚州守臣直祕閣朱琳具欵狀遣人迎降開西北門納金人開東門縱居人自便軍民皆趨寶應縣欲自揚州渡江金人覺之悉邀回城中閻瑾引兵至洪澤鎮其將姚端殺之是日揚州城內居民爭門以出踐死者無數從官有詣都堂問二相者黃潜善汪伯彥皆曰已有措置不必慮百官聞此復自相慰以為知事實者莫如宰相今既云爾未宜輕動居民亦以為然夜江都縣火皆戍卒自焚其居壬子金人陷天長軍上遣左右內侍鄺詢往天長軍覘事知為金人至遽奔還上得詢報即介胄走馬出門惟御營都統制王淵內侍省押班康履五六騎隨之過市市人指之曰大家去也俄有宫人自大內星散而出城中大亂上與行人並轡而馳黃潜善汪伯彥方㑹都堂或有問邊耗者猶以不足畏告之堂吏呼曰駕行矣二人乃戎服鞭馬南騖軍民爭門而出死者不可勝數上次揚子橋一衛士出語不遜上掣手劒刺殺之時軍民怨黃潜善刻骨司農卿黃鍔至江上軍士呼曰黃相公在此數之曰誤國害民皆汝之罪鍔方辨其非是而首已斷矣少卿史徽丞范浩繼至亦死給事中兼侍講黃哲方徒步一騎士挽弓射之中四矢而卒是日鴻臚少卿黃唐俊渡江溺死左諫議大夫李處遁為亂兵所殺太府少卿朱端友監察御史張灝皆不知存亡鍔南城人唐俊唐傳兄也熊克小歷作大理卿黃鍔按本寺題名今年正月商守拙除大理卿恐不應有兩員今從日歷又日歷稱史徽范浩渡江至常州宜興縣境為盜所害與此不同今從維揚巡幸記胡元質成都丁記云黃聖微為給事中金人絶淮車駕倉卒渡江文武百執事莫有扈從者聖微先謂其子端靖曰今日之事知有君爾吾從吾君此見危授命時也遂朝服乘馬而行或謂敵騎邂逅相及無乃不利乎聖微厲聲曰君在行必朝服以見死生命也不可茍免頃之敵騎相及果為所執聖微竟死朝廷後知之恤其家甚恩聖微哲子也此與當時人所記不同今附著于此先是布衣譙定被旨赴行在上將用之及是失定所在吕頤浩張浚聫馬追及上于瓜洲鎮得小舟即乘以濟次西津口上坐水帝廟取劒就靴擦血百官皆不至諸衛禁軍無一人從行者鎮江聞車駕進發居民奔走山谷城中一空守臣錢伯言發府兵來迓始右諫議大夫鄭㲄請幸建康潜善等沮之及是㲄從行上顧曰不用卿言及此是晚金逰騎至揚州守臣右文殿修撰黃願先已遁去簽書淮南節度判官吳某權州事州民喧呼皆備香花迎拜金人入城問上所在衆曰渡江矣金人馳往瓜洲望江而回引兵屯摘星樓下縱火城內烟焰燭天臣民子女及金帛所儲為金人殺掠殆盡南陽尉晏孝廣女年十五有美色為金兵所得欲妻之晏氏即刎縊求死居彼中二十年卒不能犯金人皆義之孝廣殊曽孫也殊臨川人慶歷中平章事金人之未至也公私所載舳艫相銜運河自揚州至瓜洲五十里僅通一舟初城中聞報出城者皆以得舟為利及金兵至潮不應閘盡膠泥淖中金取之如拾芥乘輿服御官府案牘無一留者上至鎮江宿于府治從行無寢具上以一貂皮自隨卧覆各半此以今年閏八月丙申宣諭聖語修入上問有近上宗室否時士㣓為曹官或以名對遂召士㣓同寢上解所御綿背心賜之士㣓仲維子也商恭肅王生韓榮思王宗鍔韓王生鎮海軍節度使仲維初賊靳賽來就招朝廷因以賽統制本部軍馬㑹邊報日急乃命賽與統制官王德屯真州及上渡江德以所部兵焚真州而去真州官吏皆散走發運使梁揚祖亦遁賽與其衆往來于江中中興聖政張匯進論曰尼瑪哈至揚州時御營之師必有十萬而尼瑪哈止有五六千騎自建炎二年秋九月離雲中下太行渡黎陽攻澶濮山東諸州郡可見疲勞之甚矣此强弩飄風之末無足畏也兼是時兩河州郡尚有未陷者山東州郡十陷二三人心未安糧道未集盜賊蜂起而不顧後患投身深入我境又可見其無知之甚也時若我師乘其逺來新至行列未定而擊之可也或則深池堅城拒而勿戰以挫其鋭以沮其意且多方出兵邀其出掠者彼萬里孤軍後無委積忌於相持利於速戰求戰不能糧道不繼又且野不能掠以此制之其遁必矣俟其既遁襲而擊之可也而乃望風自潰為敵席卷而去此失於退一也按滙全論見是年十二月己丑此係節文癸丑金遊騎至瓜洲民未渡者尚十餘萬奔迸墮江而死者半之舟人乘時射利停橈水中每一人必一金乃濟比敵至皆相抱沉江或不及者金兵驅而去金帛珠玉積江岸如山時事出倉卒朝廷儀物悉委棄之太常少卿季陵獨奉九廟神主使親事官負之以行至瓜洲敵騎已逼陵捨舟而陸親事官李寶為敵所驅遂失太祖神主四月己酉降詔尋訪於是太學諸生從上南狩者凡三十六人是日退朝上召宰執從官諸將對宅堂計事上曰姑留此或徑趨浙中耶奉國軍節度使都巡檢使劉光世遽前拊膺大慟上問何故光世曰都統制王淵專管江上海船每言緩急濟渡决不誤事今諸軍阻隔臣所部數萬人二千餘騎皆不能濟何以自效宰相黃潜善曰已集數百舟渡諸軍上曰濟渡軍固已處置今當議去留吏部尚書吕頤浩降階拜伏不起繼而户部尚書葉夢得等三人相從拜伏庭下上顧潜善問之頤浩以首叩地曰願且留此為江北聲援不然金人乘勢渡江愈狼狽矣二府皆曰善上曰如此則宰相同往江上經畫號令江北諸軍令結陳防江仍先渡官吏百姓衆遂退馳詣江干浙西提刑趙哲來謁云王淵欲誅江北都巡檢皇甫佐遣問則已斬矣召淵問之淵曰佐主海舟濟渡留滯蓋淵怒光世之語故殺佐以解遂諭淵分立旗幟命將官管押渡人有統領官安義自江北遣使臣林善來言今早金數百騎出掠皆無器甲已率所部千人集諸潰軍射退矣遂以義為江北統制俾收兵保瓜洲渡既而淵入對言暫駐鎮江止捍得一處若金自通州渡先據姑蘇將若之何不如錢塘有重江之阻諸內侍以為是此以三月十六日鄭㲄劄子修入㲄疏稱內侍陳悚動之言即時南來㲄時為諫官當得其實日方午上遣中使趣召宰執以淵語告之潜善曰淵言如此臣復何辭以留陛下執政未對有內侍於堂下抗聲曰城中火起俄又一人至曰禁衛涕泣語言不遜上甚駭顧中書侍郎朱勝非曰卿出問之是時管軍左言立階下勝非請與俱遂出郡㕔事並立階簷衛士或坐或立有涕泣者勝非傳㫖問之皆以未見家屬對勝非即諭之曰已有旨分遣舟專載衛士妻孥矣衆帖然因問駕去留利害則曰一聽聖旨無敢譁者乃許以俟駐蹕定當録扈從之勞優加賞給三軍欣諾勝非還上與宰執亦至屏後勝非前欲奏事上曰已聞矣適議定不若徑往杭州此中諸事暫留卿處置事定即來更無文字即上馬行以龍圗閣直學士知鎮江府錢伯言為樞密直學士充巡幸提㸃錢糧頓遞此除日歷不書今以紹興二年二月伯言乞宫祠狀修入頤浩為資政殿大學士充江浙制置使光世為行在五軍制置使屯鎮江府控扼江口兩司軍馬並同節制又以建武軍節度使主管侍衛馬軍司公事楊惟忠節制江南東路軍馬屯江寧府初命惟忠節制兩浙江南軍馬尋又改之此據惟忠附傳時潜善擬除頤浩資政殿學士上以資政非前執政者恩數止與從官等特除大學士是夕上宿吕城鎮淵留部將楊沂中與兵三百在鎮江約曰如金人計置渡江則焚甘露寺為號淵及上於吕城探者夜聞瓜洲聲喧謂金將渡江乃焚寺淵視之曰甘露寺火也質明請上乘馬而行是時儀仗皆闕惟一兵執黃扇而已上離鎮江日歷在癸丑熊克小歷在甲寅按朱勝非間居録云上初四日離鎮江癸丑初四也臧梓勤王記亦云甲寅幸常州諸書皆合今從之金人入真州甲寅上次常州時鎮江官吏皆散朱勝非求得通判府事梁求祖於竹林寺中付以郡事於是百姓稍有入城者金人揭榜於揚州市西北人願還者聽之西北人去者萬餘人自邵伯鎮往泰興後為薛慶軍者是也趙甡之遺史云金人榜上繫銜云東南道都統貝勒東南道副都統貝勒東南道都監凡三員御營統制官王亦將京軍駐江寧謀為變以夜縱火為信江東轉運副使直徽猷閣李謨覘知之馳告守臣祕閣修撰趙明誠時明誠已被命移湖州弗聽謨飭兵將率所部團民兵伏塗巷中栅其隘夜半天慶觀火諸軍譟而出亦至不得入遂斧南門而去遲明訪明誠則與通判府事朝散郎毋邱絳觀察推官湯允恭縋城宵遁矣其後絳允恭皆抵罪謨無錫人允恭貴池人也此據孫覿撰李謨墓志及江東運司所奏參修明誠改除日歷不載建康題名在今年二月絳允恭二月丁丑各降二官資是日御營平寇前將軍范瓊自東平引兵至壽春其部兵執守臣右文殿修撰鄧紹密殺之初瓊次壽春循城而南守陴者見其認旗笑曰是將軍者豈解殺敵人惟有走耳瓊聞而怒乃檄府索其造語之人紹密索得一人送之瓊命斬于麾下已而瓊之軍士入城負糧紹密所將兵怨斬其同類乃持仗逐之瓊所部與格鬬因入城焚掠紹密死于亂兵知下蔡縣趙許之亦死城中悉為灰燼久之贈紹密大中大夫此據趙甡之遺史修入熊克小歷載瓊去年十二月引兵至江西恐誤龔頤正中興忠義録云紹密以守城為金人所殺蓋㑹要之悮而頤正又因之日歷紹興二年四月癸未鄧紹密妻趙氏狀亡夫在任有紅頭巾賊不得姓名在六安軍界故步鎮作過亡夫親至賊寨招安賊徒不從反留亡夫不肯放出亡夫嫚罵誓不負國遭賊殺害身亡與此不同今附此更求他書參考龍圖閣學士王賔自揚州輿疾從上南渡遂卒于鎮江六月丁亥降旨賻恤乙卯上至無錫縣熊克小歷丙辰次無錫縣今從日歷及巡幸記縣令任讜供辦整肅有同宿戒上再三稱奬朝奉大夫知秀州葉煥復直祕閣知越州先是降充顯謨閣直學士知越州翟汝文告老不得請乃使其家奴以疾困告于朝黃潜善許之故更用煥汝文告老事以紹興三年章疏修入不得其月日因除煥附見是日金人去真州靳賽引兵復入城頗肆殺掠後數日守臣向子忞至以義責之賽語塞時賽之軍士有為州民所殺者二人賽必欲得民之為首者子忞不得已刷二人與賽賽使其徒釘于望江橋下燔甲葉以貼其體然後臠而食之子忞子諲弟江淮制置使吕頤浩所辟也丙辰上次平江府始脫介胄御黃袍侍衛者皆有生意命承信郎甄援往江北招集衛兵援成都人本太學諸生靖康中十上疏論利害淵聖皇帝遣詣河東見折可求計事命以官上至平江兵衛寡弱援上書請持詔過江招集以實行在及還遷保義郎丁巳下詔慰撫維揚遷徙官吏軍民集英殿修撰提舉杭州洞霄宫衛膚敏入對膚敏在維揚數為上言揚州非駐蹕地請早幸建康上思其言復召入膚敏言餘杭地狹人稠區區一隅終非可都之地自古帝王未有作都者惟錢氏節度二浙而竊居之蓋不得已也今陛下巡幸乃欲居之其地深逺狹隘欲以號令四方恢復中原難矣前年冬大駕將巡于東也臣固嘗三次以建康為請蓋倚山帶江實王者之都也可以控扼險阻以建不拔之基陛下不狩于建康而狩維揚所以致今日之警也為今之計莫若暫圖少安于錢塘徐詣建康然長江數千里皆當守備如陸口直濡須夏口直赤壁姑孰對歷陽牛渚對橫江以至西陵柴桑石頭北固皆三國南朝以來戰爭之地至於上流壽陽武昌九江合肥諸郡自吳而後必遣信臣提重兵以守之而江陵襄陽尤為要害此尤不可不扼險以為屯戍也今敵騎近在淮壖則屯戍之設固未能遽為宜分降詔書於㳂江守土之臣使之扼險屯兵廣為守備許行鬻爵之法使豪民得輸粟以贍軍許下募兵之令使土人得出力以自效又重爵賞以誘之則人人效命守備無失而敵騎必退矣敵騎既退則可以廣設屯戍如前所陳遲以歲月國體少安可以漸致中興之盛矣上頗納其言金人侵泰州守臣朝請大夫曽班以城降時金人自揚州分兵而來班聞之聚軍民議曰金重兵臨城且至矣班義不當去相與死守之若何衆皆哭曰願以生靈為念屈節投拜保全一城班遂遣兵馬鈐轄張亢賫降書詣軍前植降旗於城上率軍民迎拜金人入城置酒髙㑹居數日盡掠其金帛而去班楙弟也武經大夫閣門宣贊舍人丁進既受招以其軍從上行遮截行人恣為劫掠且請將所部還江北與金人血戰其意欲為亂㑹御營都統制王淵自鎮江踵至進懼欲亡入山東朱勝非過丹陽進與其衆匿逺林中以狀遮勝非自訴淵聞進叛遣小校張青以五十騎衛勝非因紿進曰軍士剽攘非汝之過其招集叛亡來㑹青誘進詣勝非至則斬之此以朱勝非間居録趙甡之遺史維揚巡幸記參修遺史稱進及淵于吕城鎮淵數其罪收斬之日歷亦稱淵斬進于馬前皆與間居録不合然間居録載此事甚悉今參取之進之死日歷在甲寅熊克小歷在乙卯間居録在初九日戊午二書不同按勝非以初八日離鎮江則進之死當在其後間居録載進自訴事亦在初八日丁巳今且並書之俟考統制濵州軍馬葛進攻青州不能下京東東路安撫使劉洪道求援于知萊州張成引兵赴之進乃去洪道遣其將崔邦弼追之敗歸進後與金人戰為所執戊午上將發平江中書侍郎朱勝非自鎮江來以晡入見初上以吳江之險可恃議留大臣鎮守勝非既對上諭曰黃潜善自渡江失措朕所過見居民皆被焚劫蓋軍民數日乏食至此勝非曰誠如聖諭陛下離此亦復擾矣上欲除勝非兼知秀州輔臣言秀非大臣鎮守之地乃以御札命勝非充平江府秀州控扼使使名據間居録日歷稱權差朱勝非節制平江府秀州軍民控扼等事蓋後來所降省劄也勝非再對留身言臣雖備員執政與諸軍無素更乞從官一員同治事上曰從官何嘗預軍事勝非曰如吕頤浩張浚皆兼御營司參贊軍事可用也于是上問近臣誰能佐勝非者浚慷慨願留遂命浚同節制控扼等事仍詔勝非行移如尚書省體式事有奏陳不及者聽便宜施行訖奏浚受命即出城决水溉田以限戎馬列烽燧募土豪措置捍禦長兵至平江者三千餘人朱勝非間居録云十日至蘇臺車駕未行即作奏有㫖晚對差平江府秀州控扼使而日歷及張浚平江録皆繫之初八日與勝非所記不同然初十日上已在秀州以事考之勝非之除當在初九日蓋間居録所記事日辰亦多差但當取其大綱耳忠訓郎劉俊民為秉義郎閣門祗候初上聞金人尚在揚州募能使軍前者俊民願行俊民嘗在敵中頗知其情僞上已乘舟召俊民就御舟賜對與語甚欵遂使持書以往賜賚極厚俊民請張邦昌一子弟同行庶可藉口上與黃潜善汪伯彥朱勝非共議因下詔尊禮邦昌邦昌之在南都也嘗奉詔貽書金人言約和事其藁在李綱家遂下常州取之邦昌之死也其子直祕閣元亨與其兄中奉大夫邦榮皆坐纍拘管至是悉令録用太學博士亷布者山陽人娶邦昌女太學正吳若者安陽人娶邦昌兄女先亦坐廢詔並乘驛赴行在上臨發又以勝非兼御營副使留御營都統制王淵總兵守平江府是夕上舟泊吳江趙甡之遺史云募使軍前者進武校尉劉伸願行與日歷不同恐甡之所記小誤今從日歷但日歷載此事於初十日上次秀州之後則恐不然蓋上已次秀州則勝非自不與此議胡安國劾疏何為以邦昌事責之下詔尊禮邦昌亦以安國劾章增入是日金人陷滄州先是明州觀察使劉錫知滄州聞金兵且至將數百騎棄城走道遇葛進退兵乃知青州尚為朝廷守即趨青州駐麻家臺留不進劉洪道遣人邀入城錫曰青州屢遭寇擾人心未寧不可洪道出見錫且犒其師錫竟不入城青州人髙其義錫遂將其餘衆赴行在錫已見元年六月己酉金兵至城下通判州事孔德基以城降己未上次秀州龍圖閣待制知江州陳彥文為沿江措置使總領江陵府至池州沿江防守等事及措置戰船承議郎新通判襄陽府程千秋充副使詔通判鎮江府梁求祖進二官直祕閣知鎮江府右文殿修撰知揚州黃願落職令所在根逐管押赴本州治事時揚州已為金所據願不能行乃除名南雄州羈管願羈管本末日歷不書但今年三月鄭㲄論錢伯言章疏中略及之今以紹興元年十月甲申刑部檢舉狀修入庚申御舟次崇德縣資政殿大學士江淮制置使吕頤浩從上行即拜同簽書樞密院事江淮兩浙制置使所除職去大字頤浩夜見上于內殿上諭以金人尚留江北卿可還屯京口令劉光世楊惟忠並受節制頤浩遂以王淵所部精兵二千人還鎮江府命恩州觀察使張思正統之熊克小歷頤浩除命在丁巳與朱勝非同日今從臧梓勤王記梓所記又云聖訓丁寧已遣朱勝非張浚守平江府卿可總兵屯于鎮江蓋二人非同日受命梓記頤浩事必得其真但以頤浩受命在壬戌而頤浩奏狀亦云二月十三日奉聖旨差充江淮兩浙制置使皆與日歷不同按諸書十三日壬戌上已至杭州而勤王記繫之乙丑是以差誤今姑從日歷遣御營中軍統制張俊以所部八千人往吳江縣防托時朝廷方以金人渡江為慮故命大將楊惟忠守金陵劉光世守京口王淵守姑蘇分受二大臣節度于是韓世忠在海道未還而范瓊自壽春渡淮引兵之淮西境上扈駕者惟苖傅一軍而已汪伯彥時政記云黃潜善等言陛下已留朱勝非張浚王淵在平江居吳之北若更差張俊去臣等慮行在只有苖傅一軍不惟緩急有警傅不可倚仗兼恐無以相制可虞非常乞留俊庶幾行在不致悮事按伯彥所記如此則二人可謂有先見之明然不知俊何以竟行此事更須詳考尚書吏部員外郎鄭資之為沿淮防托自池州上至荆南府監察御史林之平為㳂海防托自太平州下至杭州資之望之兄也資之請募客舟二百艘分畨運綱把隘之平請募海舟六百艘防扼從之辛酉御舟泊臨平鎮户部尚書葉夢得自宜興間道之杭州至是來迓夢得言平江江寧兩府所留上供約可支半載欲刷杭州諸司所有借支俟取兩處錢帛至而償之又請更給百官諸軍劵歷及命官權領户部司農太府寺職事皆從之壬戌上至杭州以州治為行宫顯寧寺為尚書省先是以轉運司為升暘宫葉夢得為上言小人遂傳復開應奉之端不可不慮乃亟命罷之上以百官家屬未至獨寢于堂外上御白木牀上施蒲薦黃羅褥舊制御膳日百品靖康初損其七十渡江後日一羊煎肉炊餅而已是日金人陷晉寧軍守臣武功大夫忠州刺史徐徽言死之初徽言在晉寧聞河東遺民日望王師之至乃隂結汾晉土豪約以復故地則奏官為守長聽其世襲㑹朝論與金結好恐出兵則敗和議抑其所請不報金人忌徽言欲速拔晉寧以除其患圍之三月屢破却之久之城中矢石皆盡士困餓不能興㑹監門官閣門宣贊舍人石贇夜啓關納金人城遂陷徽言聞兵入即縱火自焚其家人而率親兵力戰比曉左右略盡徽言為金所執金人知其忠欲生降之徽言植立不動與之酒徽言以杯擲其面曰我尚飲汝酒乎嫚罵不已金人怒持刃刺徽言徽言罵不絶聲而死後贈晉州觀察使諡忠壯初晉寧之圍也武德大夫太原府路兵馬都監嵐石路統領軍馬孫昂率殘兵與徽言共守及城破昂引所部三百人巷戰自夜逹旦格殺數百人士卒死亡殆盡昂自度不免引刃欲自刺金兵擁至軍前以甘言誘之昂終不屈而死昂父翊宣和末以右武大夫相州觀察使知朔寧府救太原死于陳後贈昂左武功大夫成州團練使徽言事以附傳及王明清揮麈第三録增修孫昂事以楊存中乞賜官狀附見昂贈官在紹興三十一年癸亥朝羣臣于行宫降詔罪己求直言令杭州守臣具舟往常潤迎濟衣冠軍民家屬省儀物膳羞出宫人之無職掌者凡三詔宰相黃潜善汪伯彥門下侍郎顔岐同知樞密院事盧益資政殿學士簽書樞密院事路允迪各上疏請罪伯彥之奏略曰雖世忠控要路于淮徐而范瓊頓徑兵于宿泗對壘兩軍之相拒輕兵間道以潜來臣偶以沈痾所纒不能密志而慮致鑾輿之遑遽拿舟楫以播遷詔不許兩浙路提㸃刑獄公事趙哲知鎮江府以朱勝非等言梁求祖能不離府城甚可嘉賞然鎮江重地恐求祖難以專責故也時哲在平江張浚令哲檢視控扼等事亦不果行甲子集英殿修撰衛膚敏試尚書刑部侍郎集英殿修撰知宣州侍其傳罷尚書吏部侍郎劉珏充龍圖閣直學士知宣州乙丑德音釋諸路囚雜犯死罪以下士大夫流徙者悉還之惟責授單州團練副使李綱不以赦徙蓋黃潜善建陳猶欲罪綱以謝金也十一月丁未放還者吕中大事記汪黃之所主和議而已故竄馬伸殺陳東歐陽徹罷衛膚敏許景衡以遂其私方且奏復科舉䇿進士行郊祀定配享置講讀官以文其欺幸而渡江猶罪李綱以謝金冀和議之可成耳彼其說曰非和則所以速二聖之禍然金與我有不共戴天之讎則其不可和也明矣祈請使還而兩河被兵通問使遣而維揚失守金豈虛言之所能動哉命侍從及寺監長二郎官限二日舉有才術之士二人故事薦士止侍從已上不及郎官上以兵火之後闕員甚多特有是命中興聖政一日進呈奏狀上曰今所薦士不比常時便當擢用之命赴都堂審察明日復曰不若便令登對朕當親自延見之臣留正等曰舜之舉賢惟屬之四嶽十二牧漢制大略自三公九卿丞相御史大夫止耳本朝故事宰執侍從才得薦舉未嘗及郎曹郎官薦士自太上皇帝始也蓋當大有為之時欲廣旁求之路故凡為尚書郎者咸得明揚等於從官雖然衆賢駢集旌車畢至固誠一時之盛矣使甄别之不明黑白之相混吹竽畫餅孔跖雜售則亦奚取於多乎惟其睿鑑英接之榮是其所以為全盡也唐陸贄有言取之貴詳擇之貴精蓋不詳其取則賢路多塞不精其擇則真贋莫分夫惟詳之於其始精之於其終斯兩盡之故臣愚以謂陸贄之言真盡用人之法而太上皇帝之用人真可為萬世之訓也出宫人百八十人用癸亥詔書也宰相黃潜善汪伯彥再上疏言臣等分義非他人比今謀國于艱難之時不能弭患而脫身於顛沛之際反獲便私則不惟公議不容臣等固不忍道也今不敢止用常禮再有奏陳俟禍患稍寧即再伸前請必冀明正典刑以厭公議自上即位以來二人專持國柄至是寇盜充斥宗社播遷議者皆欲正其誤國之罪而潜善等居位偃然猶無去意中外為之切齒焉置江寧府𣙜貨務都茶場詔應緣金人曽到州軍逃避守二兵官並令本路監司尋訪發遣歸任拱衛大夫忠州防禦使御營使司左軍統制李安為親衛大夫兩浙西路馬步軍副總管鎮江府駐劄朝奉郎劉誨添差兩浙轉運副使時轉運副使范冲疾病中書侍郎朱勝非等奏罷之上以司馬光家屬在冲所不許乃權增副使一員以命誨武顯大夫文州刺史幹辦御輦院潘永嘉罷金人屯揚州城下遣擐甲執旗者一人入城諭士民期以三日盡出西城過期者殺并數揚州人之罪謂留上也民無出城者初冀州雲騎卒孫琪聚兵為盜號一海蝦江淮制置使劉光世招降之維揚之役行在諸軍皆潰琪擁光世之妻向夫人在軍中由真滁奔淮西事之如光世琪至廬州帥臣胡舜陟乘城拒守琪邀索資糧舜涉不豫自部使者以下皆請以粟遺之舜陟曰吾非有所愛顧賊心無厭與之則示弱彼無能為也乃時出兵擊其抄掠者凡六日琪遁去舜陟伏兵狙擊之得其輜重而歸是日琪引兵之安豐縣琪所至不殺人但掠取金帛而去後以向氏歸光世光世德之向氏漢東郡王宗回女也丁卯百官入見杭州寄居迪功郎以上並許造朝中書侍郎御營副使朱勝非乞令常湖二州並聽節制許之直龍圖閣知杭州康允之言維揚無斥堠故金人奄至而不知于是初置擺鋪凡十里一鋪置遞卒五人限三刻承傳五鋪以使臣一員涖之一季無違滯遷一官令尉减半推賞是日吕頤浩帥師次鎮江府戊辰詔國步艱難謀慮之士咸願獻陳無路自逹可令左右司輪官設次看詳所陳納尚書省户部尚書葉夢得言行在官吏軍兵等除食料外應公使花果房卧生日身亡孝贈錢物並權住支從之詔出米十萬斛就杭秀常湖州平江府减價出糶東北流寓之人樞密直學士東京留守杜充升端明殿學士吕頤浩劉光世移兵屯瓜洲渡與金人對壘金人焚揚州初金遣甲士數十人按北盟㑹編此乃丁卯日復入城者入揚州諭士民出西城人皆疑之猶未有出城者是日又遣人大呼告以不出城者皆殺于是西北人自西門出出則悉留木柵中惟揚州人不出夜金縱火焚城士民皆死存者才數千人而已己巳尚書左僕射兼門下侍郎兼御營使黃潜善尚書右僕射兼中書侍郎兼御營使汪伯彥罷時御史中丞張澄上疏劾潜善伯彥大罪二十大略謂潜善等初無措置但固留陛下致萬乘蒙塵其罪一禁止士大夫搬家立法過嚴議者咸云天子六宫過江靜處我輩豈不是人使一旦委敵歸怨人主其罪二自真楚通泰以南州郡皆碎于潰兵重失人心其罪三祖宗神主神御不先渡江一旦車駕起則僅一兩卒舁致傾搖暴露行路之人酸鼻下淚宗廟顛沛其罪四建炎初年河南止破三郡自潜善等柄任以來直至淮上所存無幾其罪五士大夫既不預知渡江之期一旦流離多被屠殺其罪六行在軍兵津渡不時倉卒潰散流毒東南其罪七左帑金帛甚多不令裝載盡為敵有府庫耗散其罪八自澶濮至揚州咸被殺掠生靈塗炭其罪九謝克家李擢俱受僞命而反進用其罪十潜善於王黼為相時致位侍從故今日侍從卿監多王黼之客伯彥則引用梁子美親黨牢不可破罪十一職事官言時病者皆付御史臺抄節申尚書省壅塞言路罪十二用朝廷名爵以脅士大夫罪十三行在京師各置百司設官重復耗蠧國用如以巡幸而置御營使司則樞密院為虛設置提舉財用則户部為備員罪十四許景衡建渡江之議擠之至死罪十五身為御營使多占兵衛不避嫌疑罪十六敵人相距斥堠全無止據道塗之言為真致此狼狽罪十七敵騎已近尚敢挽留車駕罪十八盧益自散官中引為八座遂進樞副伯彥之客為起居郎有罪補外遂除集英殿修撰二人朋比專務欺君罪十九國家殆辱不知引罪罪二十疏入未報遂以狀申尚書省潜善伯彥乃復求去簽書樞密院事路允迪奏曰時方艱棘不宜遽易輔相乞責以後效詔押赴都堂治事已而皆罷為觀文殿大學士潜善知江寧府伯彥知洪州吕中大事記方上之在相州也金兵未退此申包胥哭于秦庭之時也時則當以宗澤進兵京城之請為義而黃潜善汪伯彥沮之逮上之次濟州也金兵已退此晉大夫反首茇舍之時也時則當以宗澤邀敵歸路之請為義而汪黃又沮之逮上之即位南京此肅宗即位靈武二年而復兩京之時也時則當以李綱獨留中原之請為義而汪黃又沮之中興之初綱在內澤在外此天擬二人以開建紹之業者也而綱為汪黃所沮才七十五日而去位豈非天耶澤為汪黃所沮未及一年而憤死又豈非天耶綱罷而汪黃相于內澤死而杜充繼于外天下事一變矣綱在位則措置兩河兵民稍集綱去則經制招撫罷而兩河無兵矣綱在位則僞臣叛黨稍正典刑綱去則叛臣在朝而政事乖矣綱在則澤志行綱去則澤志沮澤在則盜可為兵充守則兵皆為盜澤在則尼瑪哈退舍充用則金至維揚矣內無綱外無澤此建炎之失其機則汪黃二人為之也户部尚書葉夢得守尚書左丞御史中丞張􅊹守尚書右丞庚午右諫議大夫鄭㲄言陛下南渡出于倉卒朝士大夫省臺寺監百司職事之臣獲濟者鮮當擢吳中之秀以為用况平江常潤湖杭明越號為士大夫淵藪天下賢俊多避地于此望下此數州令守臣體訪境內寄居待闕及見任宫觀等京朝官以上各具官資姓名申尚書省選擇簡拔任使庶幾速得英才以濟艱厄詔三省行下限一月具名奏聞御營使司都統制王淵言戎器全闕軍匠數少請下諸州剗刷民匠赴官併手製造優支廪食自是以為例尚書省言浙西路當控扼處自吳江外惟千秋襄陽垂腳三嶺為險要先已命兩浙提㸃刑獄公事王翿措置千秋嶺外乃以宣義郎知建德縣林師說充統轄官控扼宣州來路命起復尚書水部員外郎詹大和措置襄陽嶺承議郎知桐廬縣孫佑充統轄官控扼廣德軍來路命通判杭州趙子嶙權兩浙路提㸃刑獄公事措置垂腳嶺宣義郎王嘏充統轄官控扼常州來路並量起鄰州諸縣射士三分之一以充長兵仍募土豪借官資兵糧器械自備各賜銀帛五百匹兩為軍費佑北海人與師說嘏皆常守把有勞為葉夢得所薦也大和已見元年正月既而以子嶙直祕閣知秀州大和直祕閣為淮南轉運副使大和乞致仕許之大和除淮漕及致仕日歷並不書此以紹興六年五月大和辭職名狀修入狀稱建炎三年春除淮漕未見本月日金人去揚州辛未湖州民王永從獻錢五萬緡以佐國用上不納輔臣言版計無闕或曰曩已納其五萬緡矣今却之則前後異同乃命併先獻者還之仍詔自今富民毋得輒有陳獻詔御營使司止管行在五軍其邊防措置等事並依祖宗法釐正歸三省樞密院四年四月乙未可參考門下侍郎顔岐等言方在兵間禮宜簡便所有執政官張蓋設狨座欲權暫撤去俟回鑾日如舊從之江淮兩浙制置使吕頤浩聞敵退渡江至真州收𣙜貨務錢物金人自揚州還至髙郵軍城下守臣趙士瑗棄城走判官齊志行率軍縣官出城投拜金人劫掠而去有潰兵宋進者初為韓世忠圉人至是更名世雄聚兵二百餘犯泰州守臣朝請大夫曽班遁去世雄入城縱掠推錢糧官裴淵為首班自劾待罪坐貶二秩趙甡之遺史云班自劾待罪其兄楙開請納官以贖班之罪上不許班坐遷謫按日歷不見班行遣紹興元年九月癸卯自降授朝奉大夫主管臨安府洞霄宫得㫖候任滿日再任十二月乙丑用諫官言雷州編管則楙開有請當在此時甡之少誤也兄按北盟㑹編班楙弟開壬申吕頤浩遣閣門祗候陳彥入揚州詔監司州縣擅立軍期司掊斂民財者並罷用尚書左丞葉夢得奏也觀文殿大學士黃潜善提舉南京鴻慶宫汪伯彥提舉西京嵩山崇福宫所除職去大字用言者奏劾也尚書工部侍郎康執權為吏部侍郎詔百官除拜非侍從並給敕量行開說補授因依俟事定日依舊癸酉靳賽犯通州城垂破中書侍郎朱勝非禮部侍郎張浚在平江作蠟書招之賽即聽命訴以無食乃漕米給之韓世忠提轄使臣李在自沭陽潰散聚徒百餘人居寶應縣㑹金人棄高郵去在乃詐稱五臺山信王下忠義軍率衆至高郵有監北較酒務保義郎唐思問先往迎之在既入城遂以其徒時正臣知高郵軍思問通判軍事執投拜官齊志行等皆殺之乃遣人截金後軍得金寶數艘故其軍極富時端明殿學士董耘朝議大夫李釜皆寓居髙郵在因以為參議又聚集潰卒數千遂據髙郵釜大名人也甲戌黃潜善汪伯彥落職奉祠乙亥召朱勝非赴行在留張浚平江府節制詔陳東歐陽徹並贈承事郎官有服親一人令所居州縣存恤其家降授奉議郎監濮州酒務馬伸除衛尉少卿赴行在先是尚書左丞葉夢得初謝上諭宰執曰始罪東等出於倉卒終是以言責人朕甚悔之今方降詔求言當令中外皆知此意上復曰伸前責去亦非罪可召還或奏曰聞伸已死上曰不問其死但朝廷召之以示不以前責為罪之意既又贈伸直龍圖閣伸贈職日歷及他書皆無之此據紹興五年正月伸加贈右諫議大夫告內前銜修入命尚書駕部員外郎方聞往淮東撫諭御營左軍統制浙西馬步軍副總管李安知揚州丙子詔曰朕以菲躬遭時多故舉事失當知人不明昨以宰臣非才任用既久專執已見壅塞下情事出倉皇匹馬南渡深思厥咎在豫一人既以悔過責躬洗心改事放斥宫嬪貶損服御罷黜宰輔收召雋良尚慮多方未知朕志自今政事闕遺民俗利病或有關于國體或有益于邊防並許中外士民直言陳奏朕當躬覽採擇施行旌擢其人庸示勸奬言之或失朕不汝尤咨爾萬邦欽豫至意詔郎官以上所薦士不候審察並令入對日於進膳後即後殿引三班直祕閣知婺州蘇遲言本州上供羅自皇祐中歲輸萬匹崇寧中增至五萬八千匹有竒民力凋弊乞减其半上覽奏驚惻欲盡蠲之門下侍郎顔岐等言今用度與祖宗時不同乃詔减二萬八千匹著為定制仍令給以本錢御營前軍統制張俊自戍所赴行在詔復還吳江行在録云俊領兵把隘吳江軍士怨俊渡江日脫身獨走致失家屬欲殺俊俊遜謝得脫奔走至行在上釋之却令再往招集軍衆繫此事于二十七日丙子今附見此朱勝非間居録云臣離平江有兵四千餘人後來王淵歸却令張俊去與此不同按日歷及諸書俊乃上未至杭時遣戌吳江縣非淵歸所遣當是俊赴行在而復還吳江也今併附此戊寅江淮兩浙制置使吕頤浩奏已復揚州詔尚書省榜諭士民是月以龍圖閣待制知延安府節制六路軍馬王庶為陜西節制使知京兆府涇州防禦使陜西節制司都統制曲端為鄜延路經略安撫使知延安府時延安新殘破未可居端不欲離涇原乃以知涇州郭浩權鄜延經略司公事浩成子也成德順人故客省使溫州觀察使新知鳯翔府王􅊅自興元以輕兵赴行在以􅊅為御營前軍統制􅊅表請幸西川不從宫儀自即墨引兵攻密州圍安邱縣築外城守之初慶元府陷將兵百餘人奪門得出及渡河惟有輔逵韓京數人而已逵後𨽻韓世忠軍為押火沭陽之潰逵聚卒得數百人擾于淮河之南北及是至楚州城下漸有衆數千當時淮南號為悍賊張用自淮寧引衆趨蔡州至黃離距城二十里守臣程昌㝢度其未食遣汝陽縣尉杜湛以輕兵誘之賊果以萬人追至城東遇伏大敗於是用駐于確山連亘數州上自確山下徹光壽據千里之地接迹不絶以其衆多故號張莾蕩抄掠糧食所至一空相接麥熟刈麥而食矣趙甡之遺史云用至確山下令不得攻城違者斬與昌㝢家傳不同今從家傳建炎以來繫年要録卷二十建炎以來繫年要録卷二十金人地名考證尼瑪哈原書作粘罕誤改見卷一貝勒原書作孛堇誤改見卷一
