body:
  text: 建炎以來繫年要録卷八十二宋李心傳撰紹興四年十一月丙午朔中書門下省言近今江浙常平司預借買撲坊場淨利錢一界亦恐奉行違戾乞令鈐束州縣不得接便騷擾從之先是户部侍郎劉岑言費用不資而豪右兼并之家纍年坐收厚利止令預借一界亦不傷於人情至是又條約焉存此已見借坊場錢事未見降㫖本日當考劉岑所云此以十一月庚申岑申明劄子附入武德郎閣門宣贊舍人淮南東路鈐轄權通判泗州劉綱就差知泗州時泗州已為金所據詔淮南州軍進奉大禮絹等並免先是和州言本州殘破無所從出乞蠲免户部奏展半年中書舍人王居正言上之所取於百姓之物其名色雖不同然要之皆因其土地之所出民力之有餘以助縣官之費一也故朝廷當察民力之有無不當問所立之名色就其名色論之生辰及大禮進奉乃是臣子用致區區傾祝饗上之誠初非朝廷取於百姓之物若朝廷察見民力無所從出固合豫降指揮曲加慰諭以將來生辰或大禮不須依例進奉如此則君臣恩禮上下兩盡朝廷既不能然至使州縣自乞蠲免蓋已非是矧又以係是進奉之物不許蠲免臣竊以為過矣兼和州申述本州殘破無所從出事理顯然伏望聖慈特與蠲免仍乞指揮户部今後淮南州軍應有似此起發之物更切審度如見得合行除放不須令本處再三申請庶使恩意出自朝廷人知感悅疏奏從之江南東路轉運判官黃子游俞俟並貶秩一等初命二人應副劉光世軍錢糧光世抵建康而二人皆不至帥臣吕祉奏國家艱難乃臣子盡瘁之時若人自為計專務全身保家朝廷何賴遂貶其秩命提刑司劾罪仍趣令之建康應副戊申胡松年自江上還入見上問控禦之計松年曰臣到鎮江建康備見韓世忠劉光世軍中將士奮勵爭欲吞噬敵人必能屏護王室建立竒勳上曰數年以來廟堂玩習虗文而不明實效侍從臺諫搜剔細務而不知大體故未能靖禍亂濟艱難非朕夙夜留心治軍旅備器械今日敵騎侵軼何以禦之趙鼎曰臣等躬聞聖訓敢不自竭駑鈍少副陛下責實之意中興聖政臣留正等曰太上皇帝可謂知備禦之本矣備禦在疆場而所以為備禦者在朝廷朝廷不治疆場何恃聖訓有曰數年以來朝廷玩習虗文而不明實效侍從臺諌搜剔細務而不知大體誠非治朝廷之道也然太上皇帝知虗文細務之不足恃而以實效大體自圖夙夜留心治軍旅備器械誠得備禦之道宜乎敵騎侵軼而有以待之也鼂錯有言曰五帝神聖其臣莫能及故自親事於法宫之中太上皇帝之聖德固非羣臣所敢望其清光親事法宫不免上勤宵旰然使當時輔相臺諌之有人少有以上裨聖畫備禦之功又豈止於是也宣王內修外攘所以必得賢能為之任使為是故也左朝奉大夫知廣德軍李健為江東淮西宣撫司參謀官用劉光世奏也己酉侍御史魏矼自劉光世軍前還監察御史田如鼇自張俊軍前還並入見詔故責授江州團練副使黃潛善更不追復觀文殿學士提舉西京嵩山崇福宫汪伯彥落職依舊宫觀上既追贈陳東歐陽徹官職而中書舍人王居正言宰輔非才誤國亂政求之自昔豈可勝誅然至於操鄙夫患失之心違臣無作威之戒使人主蒙拒諫之謗朝廷有殺士之名此而不誅何以為政潛善伯彥不學無術耻過遂非唯思固寵以保身務懲處士之橫議致東與徹被此淫刑方其威命之行實為初政之纍然自潛善伯彥得罪去位于今六年陛下喜聞謇諤之聲包容狂直之士崇奬臺諫詢擇芻蕘導人使言不吝於爵賞於是天下曉然雖愚夫孺子咸知嚮者東等之死非出陛下之心而忠臣義士扼腕共怒甘心於潛善等之日久矣今陛下尚軫淵衷痛自追咎使潛善魂魄有知猶思延頸就戮而伯彥軀幹故在不識何施靣目仰視君親伏望特賜睿斷將潛善伯彥無問死生重加貶削慰四海愛君慕義之心彰二子殺身成仁之志故有是命案宋史繫十月壬寅庚戍詔承楚泰州水寨民兵並與放十年租稅科役仍撥錢米贍之時承州水寨首領徐康潘通等遣兵邀擊金兵俘女真數十既命以官尋又賜米萬石是月甲寅撥江隂軍米三千石赴水寨乙卯又撥三千石十二月丁亥又撥四千石今併書之中興聖政趙鼎曰陛下德澤如此人心益以固國祚益以長矣臣留正等曰兩淮水寨之民正猶陜西之弓箭手河朔之保甲福建之槍仗手也無事則力田以自贍有事則固壘以相保縣官拊之得其術使之因利乘便亦可以助官軍掎角之勢曩者金人入犯水寨之民頗能邀擊其游騎而自衛其聚落及敵既退太上皇帝矜其忠而賑恤之德至渥也或聞當時淮上有司不能奉行太上之㫖至招其小過而責償官帑之所失以是苦之故甲申之警皆棄其寨柵載其器具漂流於江之南者久之此有司之罪也韓愈有言賊接界連村落百姓悉有兵器小小俘却皆能自防識賊深淺護惜鄉里自備衣糧共相保聚賊平之後易使為農今日水寨正與此無異帥守部使者安可不遵太上皇帝之㫖而勞來安集之哉左迪功郎權華為左承奉郎以薦對故也監察御史田如鼇言機事不密則害成比來未行一事中外已傳皆由省吏不密所致上曰由吕頥浩不知大體雖鬻食物人亦縱之入故事每漏泄趙鼎曰舊置中書樞密於皇城內如在天上人何由知自渡江屋淺而人雜自然不密乃詔應漏泄邊機事務並行軍法賞錢千緡許人告令尚書省榜諭詔神武中軍水軍並令往許浦鎮屯駐壬子手詔書朕以兩宫萬里一别九年覬迎鑾輅之還期遂庭闈之奉故暴虎憑河之怒敵雖逞於凶殘而投鼠忌器之嫌朕寧甘於屈辱是以卑辭遣使屈己通和仰懷故國之廟祧至於霣涕俯見中原之父老寧不汗顔比得强敵之情稍有休兵之議而叛臣劉豫懼禍及身造為事端間諜和好簽我赤子脅使征行涉地稱兵操戈犯順大逆不道一至於斯警奏既聞神人共憤皆願挺身而效死不忍與賊以俱生今朕此行士氣百倍雖自纂承之後每乖舉錯之方尚念祖宗在天之靈共刷國家纍嵗之耻殪彼逆黨成此雋功載惟夙宵跋履之勤仍蹈鋒鏑戰爭之苦興言及此無所措躬然而能建非常之功必有不次之賞初詔具在朕不食言咨爾六師咸體朕意熊克小歷載此詔在十月己卯今從日歷繫於此日自豫僭立朝廷以金故至以大齊名之至是始下詔聲其逆罪焉此據熊克小歷殿中侍御史張致逺乞車駕當議進發省罷營葺以繫軍民之心上曰朕置臺諫本所以正闕失事有規戒未嘗不樂聞昨日致逺奏自吳江至中塗見稱御前船不計其數此恐是諸司插一旗幟便為御前船可速行下幾察禁止乃詔除軍兵營寨外其餘修葺去處並令孫佑不得應副如違官吏取㫖重行黜責吉州廂軍曽方等謀為變牢城卒項勝告獲之後以勝為保義郎是日川陜宣撫司統制官楊從儀敗敵于臘家城嶽飛之取襄陽也朝廷命宣撫副使吳玠乘機牽制玠遣從儀以兵入僞地遇敵勝之明年二月癸卯奏到癸丑責授單州團練副使白州安置劉子羽放令逐便初子羽既貶㑹吳玠除川陜宣撫副使乃奏辭新命且言臣自紹興元年收集散亡踏逐和尚原屯駐軍馬控扼敵路蒙宣撫使張浚差參議劉子羽冒鋒鏑出散關與臣商議邊事子羽知臣愚魯為可以驅策知和尚原地利為可以必守言之於浚遂差臣充秦鳳路經略使專要臣措置戰守捍禦金人如錢糧器用之類子羽悉力應辦殊無闕少因此原下之戰屢破金人至紹興二年冬臣又與子羽議和尚原距川蜀地逺終恐糧道不繼難以持久又於川口仙人關側近殺金平選踏戰地修置山寨以備奔衝兼臣和尚原軍馬數目不多又得劉子羽所管成州及梁洋軍馬臣因而簡練之於川口併力控扼至今年春金四太子等再領步騎十餘萬衆攻犯殺金平血戰纍日敵兵敗走僅保無虞此豈臣之功乃子羽知臣而薦拔之功也今蒙驟加異數望追還成命於浚與子羽少寬典刑上曰進退大臣蔽自朕志豈可由將帥之言况朕於浚既罰其過詎忘其功可聽子羽自便上因言臺諫論事雖許風聞須要審實如排擊人材豈無好惡若果務大體不指摘纎瑕細務强置人於有過豈惟隂德不淺亦可銷刻薄之風成忠厚之俗趙鼎曰聖訓廣大如此言事官宜奉以周旋也中興聖政臣留正等曰臺諌人主之耳目蓋欲裨聰明以助賞罰也倘徇己好惡以誤人主之聽俾賞罰不當無以服天下之心豈不辜人主委寄哉此太上皇帝欲勵耳目之官至言隂德以警之此忠厚之至雖堯舜無以加任耳目者可不知戒乎甲寅左宣教郎太平州州學教授王言恭上書臣有愚計可以大助國用不唯不斂於民兼亦不拂人情不傷國體不失民信數月之間定有實效但臣管見事屬至密踈逺小臣不敢求對清光願許臣暫至行在見宰執委曲陳之詔本州守臣取索所陳實封繳進丁巳手詔曰朕以逆臣劉豫稱兵南向警奏既聞神人共憤朕不敢復蹈前轍為退避自安之計而重貽江浙赤子流離屠戮之禍乃下罪已之詔親總六師臨幸江濱督勵將士然而興師十萬日費千金動衆勞人懼所不免每一念此惻然疚懷尚覬諸路監司帥守與夫郡邑大小之臣夙夜究心以體朕意凡借貸催科有須於衆者毋得縱吏並緣為姦凡盜賊姦宄輒生窺伺者務絶其萌毋令竊發其或乘時擾攘恣無名之斂容姦玩冦失機察之方致使吾民橫罹困苦有一于此必罰無赦候軍事稍定當遣廷臣循行郡國執政奏遣神武中軍統領官范溫蕭保率海舟至淮口以來邀擊敵馬上曰須令楊沂中遣統領官朱師閔統率以行令溫等權受師閔節制蓋欲犬牙相制决無他虞也保燕人溫本山東義士故上訓及之趙鼎曰此非臣等愚慮所及武德感德軍節度使開府儀同三司淮南東路宣撫使韓世忠言遇大禮恩乞長女封號吏部言世忠非見任宰執難以施行詔特依所乞戊午簽書樞密院事胡松年兼權參知政事以沈與求按行江上故也時松江既有備商賈往來自如通泰出納鹽貨如故上見士氣大振捷音日聞欲渡江决戰趙鼎曰退既不可渡江非策也金兵逺來利於速戰豈可與之爭鋒兵家以氣為主三鼓既衰矣姑守江使不得渡徐觀其勢以决萬全且豫猶不親臨止遣其子豈可煩至尊與逆雛决勝負哉於是遣與求按行江上與諸將議可否始知敵騎大集其數甚衆與求回言沿江居民旋造屋為肆敵雖對岸略不畏之熊克小歷載與求按行江上事於十一月庚戌已前注云據趙鼎事實修入不得其時事實言久之張浚來自閩中則知此事在浚未至之前也按日歷十一月戊午有㫖胡松年兼權參知政事候沈與求回日依舊是時孟庾在臨安與求獨為參知政事不容十餘日始差權官當是與求出門而松年攝其事也今移附本日是日金人陷滁州於是淮西江東宣撫使劉光世移軍建康府淮東宣撫使韓世忠移軍鎮江府浙西江東宣撫使張俊移軍常州己未資政殿學士提舉萬夀觀兼侍讀張浚知樞密院事浚之未至也左宣教郎喻樗說趙鼎除浚閩浙江淮宣撫使以為後圖鼎大以為然及入奏上曰且在經筵亦可喻樗語録曰樗先受趙鼎辟為川陜都督府屬官既罷行因過平江見鼎曰相公此舉未知果有萬全之計或賭采一擲也鼎曰亦安保萬全事成幸甚不成遺臭萬代矣樗曰張樞密在福今只召之恐逡巡未至若直除閩浙江淮宣撫使不許辭免則命到之日便有府庫軍旅錢穀樞密來路即我之後門也鼎大以為然明日入奏久之上曰且在經筵亦可浚請遣嶽飛渡江入淮西以牽制金兵之在淮東者上從之及入見上問鼎浚方略如何鼎曰浚鋭於功名而得衆心可以獨任於是上復用之詔平江府城內舟船輒留燈火者如開封府本法斷罪以右司諫趙霈援臨安已得㫖有請也臨安指揮未見本年月庚申詔防江諸軍賜燕凖備將已上並預坐遣刑部尚書章誼押伴熊克小歷今年十月書是月樞密都承㫖章誼為户部尚書此蓋承户部題名之誤誼今年七月自都承㫖除刑書十二月兼權户書明年正月正除今各附本日辛酉觀文殿學士提舉臨安府洞霄宫李綱言今僞齊悉兵南下其境內必虗儻命信臣乘此機㑹搗潁昌以臨畿甸電發霆擊出其不意則僞齊必大震懼呼還醜類以自營救王師進躡必有可勝之理非惟牽制南牧之兵亦有恢復中原之兆此上策也朝廷或以兹事體大則鑾輿駐蹕江上勢須號召上流之兵順流而下旌旗金鼓千里相望以助聲勢則敵人雖衆豈敢南渡仍詔大將率其全師進屯淮南要害之地設竒邀擊絶其糧道賊必退遁保全東南徐議攻討此中策也萬一有借親征之名為順動之計委一二大將捍敵于後則臣恐車駕既逺號令不行敵得乘間深入州縣望風奔潰其為吾患有不可勝言者矣此最下策也往嵗金人南渡利在侵掠既得子女玉帛時方暑則勢必還師今僞齊使之渡江而南必謀割據將何以為善後之計哉今日為退避之計則不可朝廷措置得宜將士用命則安知敵非送死於我顧一時機㑹所以應之者如何耳望降出臣章與二三大臣熟議初張浚之謫福州也綱亦寓居焉浚服其忠義除前隙更相親善及浚召入綱因以奏疏附之執政進呈上曰綱去國數年無一字到朝廷今有此奏豈非以朕總師親臨大江合綱之意乎所陳亦今日急務可降詔奬諭既而綱聞上幸平江又條陳宜防備者有四曰生兵曰海道曰上流曰四川至於保據淮南調和諸將增置禁衛廣備糧食措置戰艦水軍及經畫楊么凡十事以告輔臣直祕閣知平江府孫佑為廣南東路提㸃刑獄公事佑言仇怨交攻身既危殆乞一待次差遣故以命之翌日復令如舊佑言仇怨交攻事當考壬戍詔諸司見占客船並令日下放還違者抵罪張浚之出師也多奪取士民舟船如被冦盜此據趙甡之遺史而諸司所占又以凖備遷移為名拘留不已言者慮其失業故條約之癸亥龍圖閣直學士新除都督府參謀官折彥質為樞密都承㫖星夜兼程前來供職降充集英殿修撰知鼎州程昌㝢復徽猷閣待制充都督府參議官權禮部侍郎唐輝自崑山入見請令沿江守令賙恤淮南士民之渡江者仍許借官屋以居從之武經郎前知濟州兼管內安撫司公事楊圭為武功大夫榮州刺史兼閣門宣贊舍人圭初以子弟所授官後仕劉豫至是來歸自言失武經郎已上告敕朝廷因其所稱而命之遂以圭知邵州圭除郡在是月辛未是日淮西宣撫司統制官中亮大夫同州觀察使知蘭州王德與敵遇於滁州之桑根敗之生擒十餘人赴行在後録其功進德官五等將士受賞有差明年二月丙申賞功甲子手詔曰張浚愛君愛國出於誠心頃屬多艱首倡大義固有功於王室仍雅志於中原謂關中據天下上游未有舍此而能興起者乘敵首勝之後慨然請行究所施為無愧人臣之義論其成敗是亦兵家之常矧權重一方愛憎易致逺在千里疑似難明則道路怨謗之言與夫臺諫風聞之誤蓋無足怪比復召浚置之宥密而觀浚恐懼怵惕如不自安意者尚慮中外或有所未察歟夫使盡忠竭節之臣懷明哲保身之戒朕甚愧焉可令學士院降詔出榜朝堂先是浚上疏辭免除命且言臣以淺薄之姿偶緣遭遇寖獲使令仰惟陛下任之太專待之過厚而有怨於臣者竊毁之備至有求於臣者責望之或深上賴聖智之獨明乾綱之自斷保全微跡不為廢人夫以失地喪師纍年無成臣之罪惡臣豈不知至於加臣以大惡之名陷臣於不義之地隳臣子百世之節貽孀親萬里之憂言之嗚噎痛隕無已訓詞所戒傳之天下付在史官臣復何顔敢玷班列趙鼎因言陛下幸聽臣言驟用浚恐臺諫未悉必至交攻非陛下斷自宸衷無以息衆議故有是詔詔左承直郎兩省西路安撫司幹辦公事吳㮚令引對㮚建康人以薦者得召見而閣門下著令初上殿臣僚具名銜隨事申三省樞密院審察乃命先審而後對㮚言萬騎所過雖膳羞亦無所取而掊克貪墨之吏轉以應副軍期為名裒斂錢物動以萬計官收六七吏取三四願下明詔非朝廷指揮自以軍期科率者借無侵盜並坐贓罪雖有朝㫖因而騷擾者重置典憲詔諸路漕臣覺察遂以㮚為左通直郎將作監丞㮚奏疏降㫖及改官在是月戊辰除監丞在十二月丙辰建州禁卒江勝與其徒謀劫庫兵以叛為軍士葉榮所告守臣江少虞捕斬之後以榮為保義郎乙丑湖北荆襄潭州制置使嶽飛言襄陽等六州歸業人户全闕牛種乞量借官錢俟起稅日分四科隨稅送納又乞支降錢米養贍官兵修葺城壁樓櫓應官私缺負並行蠲放州縣官到罷各轉一官選人改合入官仍以招集流亡多寡為殿最詔賜飛度牒二百道為贍軍修城之費其餘皆從之丙寅遣內侍李肖往劉光世嶽飛軍汪浩往韓世忠張俊王􅊛軍撫問將士家屬仍賜錢有差三宣撫軍各萬緡嶽飛三千緡王􅊛二千緡初河東忠義軍將趙雲嘗出兵與敵戰至是敵執其父福及母張氏以招之且許雲平陽府路副總管雲不顧遂殺福囚張氏於絳州久之雲間道奔嶽飛軍中既而飛遣雲渡河雲因擊曲垣縣復取其母飛以為小將此據紹興十二年六月丁丑雲自叙狀增入蓋今年十一月二十一日事故附于此丁卯上謂執政曰朕與大臣論事稍有不合便輕為去就何也張浚曰事有可行有不可行陛下一言之漏言者意其好惡因有論列不得不為去就上曰君臣之間當至誠相與勿事形迹庶可同心協德以底于治朕於三四大臣皆當分委張俊專治軍旅胡松年可專治戰艦浚曰仁宗時亦嘗委范仲淹韓琦分事而治言者數以為辭不旋踵報罷上曰今日之事若不專責無由辦集將來如財用亦須委一大臣中興聖政臣留正等曰相得於內則可相忘於外故至誠不必事形迹此自古聖君賢相相與之美事伊尹曰惟尹躬暨湯咸有一德先其身而不以為嫌周公曰孺子其朋孺子其朋以朋指其君申言之而不以為過是數者若責以形迹無乃有大不然者乎惟其相得之深故一切相忘而不論太上皇帝於君臣之間欲其至誠相與勿事形迹臣竊謂此自古帝王之用心非後世所及也昔魏鄭公以事形迹戒太宗今太上皇帝乃以事形迹戒其臣太宗賢君也視太上皇帝之聖德其不侔如此臣謂非後世之所及信矣戊辰趙鼎言臣等商議望陛下降一詔書開示從僞之臣勢不獲已他日來歸亦不加罪如張孝純李鄴子弟服在近僚可見陛下恩意上曰中原陷沒致士大夫不幸汚於僭逆皆朕之過又諭卿等為社稷大計不厭反復熟議鼎曰臣等夜以繼日惟恐智慮有不及又豈敢不勉浚曰前此廟堂事多是商量不合至有一事各持其說數日不决者上曰趙鼎剛正可與同心腹如向來議論使事席益來朕前終無一言胡松年曰益非不曉逹但恐懷姦自私爾上曰君臣相與當以至誠一有容私其間事功何由濟邪十二月丙戌降詔如鼎請己巳右從事郎程晟為江東淮西宣撫司凖備差遣用劉光世奏也晟頥孫已見盜區稠攻樂昌縣廣東兵馬鈐轄韓京遣統領官趙煥捕斬之既而為餘黨所逐馬陷淖煥死於陳後贈二官録其家一人煥贈官在明年閏三月辛未是夜淮西宣撫司選鋒副統制王師晟親兵副統制張琦合兵復南夀春府執僞知府王靖詔賜師晟金帶後録其功二人各進官四等將士受賞者二千九百九十六人師晟等明年二月己丑轉官庚午上按神武中軍射士于內殿召宰執趙鼎張浚胡松年權主管殿前司公事劉錫命坐賜茶吏部侍郎兼直學士院兼侍讀孫近言伏見朝廷以邊警未寧專意戎事凡常程庶務一切罷止臣竊謂多事之際搜求人材可與圖事揆策折衝禦侮者正今日所急與夫內外刑獄待報而决者不唯凝寒之月淹繫可憫亦恐非所以感人心召和氣也欲望申詔大臣凡人材之可用者以時采擢使赴事功而具獄之當决者且令一靣斷行茍刑名文牘之煩不欲以費廟堂日力則刑部長二許按格法權宜裁决其有甚可疑者乃以上聞庶幾不廢內修政事之意從之詔嶽飛母太恭人姚氏特封榮國太夫人廬山東林寺僧慧海賜號佛心禪師初飛遣本軍提舉事務武功大夫劉康年來陳乞襄漢功賞而康年用飛備紙乞奏子雷文資等三事朝論以奏文資為不可餘皆許之其後飛言臣近䝉恩以收襄漢功寵加旌節臣具懇辭不敢祗受敢謂康年於國家多事之際輒以私門猥瑣希求恩寵望寢前命仍將康年正朝典詔飛母封號係特恩餘令改正康年依衝替人例其所得襄漢功賞仍奪之飛奏至在明年正月壬子辛未左朝奉大夫提舉江州太平觀李彌大復徽猷閣待制知靜江府起復祕閣修撰知嶽州程千秋移知鼎州左朝奉郎張觷知嶽州上覽除目問觷才術如何趙鼎曰聞其能辦事上曰不須更問某人薦惟才是用胡松年曰朝廷用人不可不慎用一君子則君子進用一小人則小人進上曰君子剛正而易踈小人柔佞而易親朕於任用聽察之間不敢少忽也右司諫趙霈請命有司條具一歲錢穀出入之數裁節浮費上曰此疏極關治體過防秋便可施行胡松年曰使論事之臣每如此何患不能協濟中興正恐敵騎既退國家暫安虛文細務又復出矣上曰趙鼎記此可為戒中興聖政臣留正等曰唐李吉甫始部録元和國計著為成書本朝因之丁謂著景德㑹計録田况著皇祐㑹計録蔡襄著治平㑹計録蘇轍著元祐㑹計録皆所以總括國計杜失謾制豐耗量入為出也太上皇帝因諫臣之言以謂此疏極關治體惜當時未有能推行之者神聖嗣興以恭儉先天下比命計臣置版籍以總四方之賦計其入則盡矣量入以為出則㑹計之書不可以不作也願詔諸儒踵成之直徽猷閣兩浙轉運副使李謨言平江今歲苖米三十四萬石而逃田開閣四萬餘災傷减放八萬餘平江最係上色肥田豈有逃絶若干之理又慮檢放不實乞下憲司委官覆實如所委官隱蔽許監司互察先是謨言浙路上供稽緩乞秀湖州平江府委謨督責緊切催納故有是請户部乞許之中書舍人王居正言陛下仁恤百姓之心形於詔㫖行於赦令四方守令固未必能上體聖意使實惠及人今州縣一有開閣逃田及檢放災傷去處則監司便指以為官吏作弊欲置之於法臣竊以為非陛下本意兼恐提刑司及所委官觀望保明不實抑勒敷納為害不細望追寢今降指揮從之左朝議大夫知和州皇甫彥丁憂特起復時和州為金所破彥率軍民據守麻湖水寨淮西宣撫使劉光世遣摧鋒軍統制趙秉淵統領官楊貴將其軍民乘舟南歸秉淵等因縱火大掠士民倉猝引避水闊舟小沉溺甚衆彥之金帛妓女皆為所奪明年正月壬子行遣知樞密院事張浚往鎮江視師時金人於滁上造舟有渡江之意趙鼎密為上言今日之舉雖天人咸助然自古用兵不能保其必勝計當先定事至即應之庶不倉猝萬一金人渡江陛下當親總衛士趨常潤督諸將乘其未集併力血戰未必不勝或遏不住則由他道復歸臨安堅守吳江敵亦安能深入臣與張浚分糾諸將或腰截或尾襲各據地利時出擾之敵亦不敢自肆惟不可聞渡江便退即諸將各自為謀天下事不再集矣主管殿前司公事劉錫神武中軍統制楊沂中見鼎曰探報如此駕莫須動鼎曰俟敵已渡江方遣二君率兵趨常潤併力一戰以决存亡更無他術錫等同聲曰相公可謂大膽鼎曰事已至此不得不然二君隨駕之親兵也緩急正賴為用豈可先出此言錫等乃退是日金左副元帥完顔昌遣通問使魏良臣王繪歸行在平旦良臣等行接伴官李聿興謂曰侍郎歸矣如聿興等何時得離塗炭歎息久之行二里許昌擁三百餘騎相遇于塗問難再三良臣等答昌如初見聿興之語昌言既欲講和當務至誠不可姦詐况小小掩襲何益於事如欲戰先約定一日兩軍對敵則可我國中祇以仁義行師若一面講和又一面令人來掩不備如此恐江南終為將臣所誤如向來大軍至汴京姚平仲劫寨事可見本朝事體秦檜皆知若未信且當問之良臣等以此來有上大金皇帝表二聖二后表丞相元帥物録六封乞留軍前譯者云大金皇帝表可留他書持去戰而敗録中物固非我有即勝詎止須此物遂授良臣等以左副元帥宗輔書已上並據王繪紹興甲寅通和録又為良臣言當以連州以南王爾家為小國又索金帛犒軍其數千萬良臣等受書遂自鎮江赴行在金人言連州以南等語據張浚行狀云爾按金人前後書辭止欲畫江為界與此不同王繪語録亦無此說更當詳考壬申上謂大臣曰朕於羣臣或因其行事或因其獻言每料度曲折十亦得五但恐太察不敢見於所行耳左從事郎新潭州州學教授錢秉之特改合入官秉之避地廣西用趙鼎薦對而有是命後三日殿中侍御史張致逺言陛下親乘戎輅總師拒敵此正漢高延酈食其光武納冦恂之時顧雖韋布卒伍茍有才術足以排難解紛亦當聽用使羣心聳動共赴功名之㑹而乃陳誼無聞改秩罷去臣意朝廷祇以既降上殿指揮不可中輟既已引見登對例合推恩此豈今日所宜為耶當拯溺救焚之時襲承平優暇之軌在朝廷一時施設因成文具使臣下沿例獲賞何以勸功願陛下於延訪之際稍從慎簡其人才足以任事議論足以戡時者亟加委用令得攄發所藴以風厲其餘否則放令自便無徒啓僥幸之門長奔競之風賞罰二事在軍旅之際所繫甚大惟陛下無輕用之天下幸甚疏奏從之癸酉直祕閣韓之美通判全州之美守德安召還而有是命是夜魏良臣等至常州見浙西江東宣撫使張俊甲戍夜良臣等至許市遇知樞密院事張浚于舟中良臣等具告以金人所言且謂金有長平之衆浚謂曰欲同詣行在徐思之恐人疑惑乃密奏使人為敵所訹切不可以其言而動又勿令再往軍前恐我之虛實反為所得浚遂疾驅臨江召韓世忠劉光世與議且勞其軍將士見浚來勇氣自倍浚部分諸將遂留鎮江節度之
