body:
  text: 建炎以來繫年要録卷一百三十五宋李心傳撰紹興十年夏四月按是月乙巳朔丁未司勳員外郎張嵲兼實録院檢討官右宣義郎知建康府溧水縣李朝正召赴行在先是江東制置大司葉夢得言朝正到官二年招集歸業人戶萬餘磨出隱漏稅賦四萬貫碩匹兩委有顯效乞稍加試用以風能吏上召對既而謂秦檜曰近時縣令以政績被薦往往别除差遣不若與之進秩還任庶久則民安其政乃遷一官賜五品服遣還朝正開封人也戊申詔三公三少帶節鉞者並序班在宗室開府儀同三司之下時以請諸大軍官髙故裁抑之癸丑古文殿修撰都大主管川陜茶馬公事趙開提舉江州太平觀以言者劾其病不任事也直顯謨閣知夔州馮康國都大主管川陜茶馬公事主管川司右承奉郎范振上書論雇募耆户長等十事乙丑上謂輔臣曰朕昨夕閲振書所論皆民間利病其言多可采遂以振知南安軍振建陽人也辛酉檢校少保寧國軍節度使張中孚加檢校少傅充醴泉觀使清遠軍承宣使張中彥為龍神衛四廂都指揮使提舉佑神觀奉朝請顯謨閣直學士趙彬為尚書兵部侍郎彬自延安入朝既見之八日乃有是命壬戌特進知泉州趙鼎提舉臨安府洞霄宫鼎既謫溫陵纍章丐罷上不許時檢校少傅保信軍節度使汪伯彥守宣州端明殿學士徐俯守信州前數日御史中丞王次翁入對論鼎不法因奏伯彥不恤飢民而興土木之工俯妄自尊大不親郡政乞與外祠秦檜請以章示鼎等上曰人臣有小過朕不欲揚之使自為進退會鼎再乞宫觀遂有是命是日東京副留守劉錡入辭上命錡以所部騎司之軍往戍又益以殿前司兵三千人諸軍家屬皆留順昌就糧惟精兵分戍陳汴後五日錡乃行癸亥詔部使者嵗中同舉廉吏一人權吏部侍郎范同兼實録院修撰始除修撰官也尚書祠部員外郎張廣為禮部員外郎祕書省校書郎兼實録院檢討官朱翌守祠部員外郎翌因轉對乞搜訪徽宗御集建閣如故事詔學士院擬定遂有是除集英殿修撰知明州潘良貴充徽猷閣待制提舉亳州明道宫良貴引疾乞宫觀乃有是命乙丑宰相率百官啓建天申節道場以梓宫未還不用樂少傅淮西宣撫使張俊乞免其家嵗輸和買絹三省擬每嵗特賜俊絹五千匹庶免起例上以示俊因諭之曰諸將皆無此獨汝欲開例朕固不惜但恐公議不可汝自小官朕拔擢至此須當自飭如作小官時乃能長保富貴為子孫之褔俊皇悚力辭賜絹熊克小厯云丙寅上以語宰執蓋上待諸將甚厚而訓飭之嚴如此蓋恩威並濟也俊喜殖産其罷兵而歸也嵗收租米六十萬斛俊收租米以乾道宣諭聖語修入中興聖政史臣曰賦絹天下之公法也賜絹一人之私恩也上平時待將臣厚矣至其規免賦户則用嵗賜以塞之以為寧過於私恩不可少害於公法也存公法所以不起其例隆私恩所以不失其心聖人之御將誠有道矣太常少卿兼實録院檢討官劉昉祕書少監兼資政殿説書陳淵並罷右諫議大夫何鑄論昉鼓唱是非前此敵使之來未有定議巧持兩説便遊公卿淵特奏補官備位諫員但知朋附數對士大夫非毁臣僚其語尤為不遜去嵗小生上書狂妄至甚書中薦淵頗力安知其不預謀故二人並罷丙寅武功大夫文州刺史閣門宣贊舍人新應天府路馬步軍副總管劉綱知宿州丁卯上諭大臣曰聞三京穀賤令有司糴之運至江淮以備凶嵗則可減東南和糴之數又曰廣南市舶利入甚厚提舉官宜得人而久任庶蕃啇肯來動得百十萬緡皆寬民力也鎮潼軍節度使開府儀同三司知鎮江府信安郡王孟忠厚知明州兼管內安撫使端明殿學士提舉臨安府洞霄宫富直柔知泉州太尉慶遠軍節度使醴泉觀使郭仲荀知鎮江府張俊言仲荀有才故有是命戊辰直袐閣通判秦州郭子卿知隴州庚午左朝散大夫直袐閣江公亮乞大臣選易守令上謂宰執曰縣令至衆朝廷豈能人人推擇惟當選監司郡守使之易置則得人矣秦檜曰陛下選大臣大臣擇監司郡守擇縣令固當如此尋以公亮守宗正少卿公卿除命在五月庚申詔復置四川諸州學官員左朝請大夫新知全州史煒為利州路提點刑獄公事直徽猷閣永興軍等路提點刑獄公事宋萬年為秦鳳等路提點刑獄公事壬申端眀殿學士僉書樞密院事韓肖胄充資政殿學士知紹興府從所請也肖胄兩入樞府凡三年詔熙河帥臣提舉買馬五月甲戌朔檢校少傅保信軍節度使知宣州汪伯彥端明殿學士知信州徐俯並提舉臨安府洞霄宫從所請也伯彥仍給全俸逹州文學睦升特補修職郎升建炎初為華州司理參軍金豫之際屏居耀州之華原不復仕守臣以聞故有是命先是有詔新復諸州詢訪潔身挺節之士至是耀州以升名上又言迪功郎吳溫舒不受偽命寧州言進士張傑自隔絶之後不復就舉近辭金國行臺之召而為書欲兩國休兵復境未及上而詔書講和遂已河南府言借補秉義郎郭永昨在偽地結集忠義之人俟南兵到來欲同舉事為其徒儀端所告杖脊樞密行府言忠訓郎曲念祖為涇原第三將飛山寨駐劄建炎末堅守不順既而無糧不能守逃之渭州至今不出仕又言郿縣簿張彬嘗與縣令辛公淵同接偽詔彬言豈不忘夲國為公淵所首遂坐斬應天府言承務郎知榖熟縣閻琦坐匿宗室子被害乃詔溫舒改京秩傑補迪功郎永承信郎念祖武翼大夫遙郡刺史贈彬承務郎琦奉議郎官琦家一人升華原人溫舒三原人傑襄樂人也自吳溫舒以下皆不見於日厯今以林待聘外制集附入當求他書詳考琦先見建炎四年九月乙亥左朝散大夫主管台州崇道觀韓臨亨知興仁府丁丑上謂大臣曰天下之財何必盡斂於府庫有若曰百姓足君孰與不足若藏於民猶在官也秦檜等因贊王言之大得與天下共利之意上又曰纍禁銷金鋪翠朕性淡薄服用朴素故宫中無敢踰者但聞富家大室猶有以金翠為飾不惟費財害物亦非所以厚風俗乃詔臨安榜諭限三日毁棄違者重坐之左從政郎台州州學教授張闡召試館職闡初以中書舍人林待聘薦得召見闡言敵歸我關中此地古號天府乃祖宗社稷之靈天下莫大之福而議者過計以謂敵棄空城以餌我他日富貴敵將復至不如守蜀之得策其説疏矣天與不取反受其咎願擇大帥為必守之計秦中根夲既固則中原之復可冀遂有是命闡初見六年十一月熊克小厯稱給事中林待聘見闡按待聘今年十二月方遷東省克小誤也闡六月丙寅除正字己卯徽猷閣待制提舉洪州玉隆觀胡舜陟復知靜江府右奉議郎王以寧復右朝奉郎知全州故左宣教郎董國度特贈左朝奉郎國度德興人宣和末中進士第調膠水簿會北邊兵動乃留其家於鄉敵陷中原國度棄官走村落居數年有俠士以海舟載之南歸國度至行在上書言利害調宜興尉秦檜與之有北方之舊自改京官幹辦行在諸軍糧料院至是卒特贈四官録其子仲堪夷堅乙志載俠客事甚詳今不盡取壬午左朝郎郎李長民知泗州癸未右奉議郎川陜宣撫司幹辦公事王易為樞密院計議官易以薦對故有是命甲申詔徽宗皇帝御製閣以敷文為名直祕閣新知常州王浚明行尚書兵部員外郎乙酉監察御史張宦守祕書少監丙戍江東制置大使兼行宫留守葉夢得奏修行宫欲大慶垂德垂拱紫宸四殿規模稍大上恐勞民諭輔臣令從簡儉止營兩殿足矣金都元帥越國王宗弼入東京觀文殿學士留守孟庾以城降初左副元帥魯國王昌既廢偽齊乃言邊靣四塞未免枕戈坐甲之勞間以江左為鄰易生釁隙不可徹警不若因以河南地錫與大宋宗弼時為右副元帥力不能爭及昌誅宗弼始得政以歸地非其夲計決欲敗盟乃舉國中之兵集于祁州元帥府大閲遂分四道南侵命聶哷貝勒出山東右副元帥薩里罕犯陜右驃騎大將軍知冀州李成犯河南而宗弼自將精兵十餘萬人與知東平府孔彥舟知博州酈瓊前知宿州趙榮抵汴至是犯東京張戒默記敵犯東京在五月十三日日厯劉錡奏狀及順昌破敵録並在五月十二日趙甡之遺史在十一日諸書不同按費土戣蜀口用兵録有嶽飛牒胡世將公文云蔡州傳到汴京留守司文字備舉都元帥府劄子行府奉皇帝命興師問罪盡復疆土今月十三日到汴京撫諭了當十三日丙戌也今附于此日孟庾不知所措統制官王滋請以兵護庾奪門走行在庾以敵騎多不能遽去遂率官吏迎拜宗弼入城駐舊龍德宫於是金主亶詔諭諸州縣以逹蘭擅割河南且言朝廷不肯徇其邀求之故詔詞略曰非朕一人與奪有食言恩威張弛之間蓋不得已紹興講和録金人復取河南詔敕行臺尚書省粵有遼叔世專肆奢暴惟皇天假手于我太祖武元皇帝恭行討代併有土宇惟我太祖文烈皇帝不敢閟于天降威乃命帥臣自大江以北皆為我有太宗始務息民不貪其土止以大河分流為界自河以南茍得賢而處之亦猶吾民况以天下為公古之道也遂建張邦昌為大楚畏懦無立不克所付未幾就戮爾後劉豫再立位號皆自我師援之拯之守之護之僅有存焉亦以使我軍士就獲安息不謂向者逹蘭等入奏援立劉齊非所以利適足以害人也三軍之士往往皆曰自開拓以來大事既定申畫封疆亦有年矣何故罷於奔走違越公疆勞逺戍守他土曷若併一措畫惟軍與民皆得沽息矧惟劉豫悖德屢聞立武已非終竟無所濟今取河南惟其士人宅爾土繼爾居甸爾田爾厥有幹有年于兹河南惟其安罔有他心亦惟軍士能戮力一志為安守我土以此而行可速定朕乃從其言內外罔不帖然逹蘭等後力言齊為不道既廢矣邊靣四塞遐逖猛士雖能守之未免枕戈坐甲之勞間以江左為鄰易生釁隙不可徹警難以久安之計不若因以河南地錫與大宋恩義非爾所求而與之非爾所致而得之為恩重矣為義深矣朕詢于衆言或不可者三之二朕以元元休息之意斷自朕心又可其請逹蘭等不俟詔命欵報遽割土強旋班屯軍凡此之為皆逹蘭等實稔姦謀相為接好將啓亂心預圖外交先施責報庶無夾攻之患包藏詭狀專輒陳請割賜土疆職此之由朕常以止戈為武含垢藏疾不欲重違成命故王倫既執之後命使發藍公佐偕往責數之調嵗貢齊正朔徴誓表追册命冀其無我違然後禮降封册今省來章蔑如也其于事意反有要求况河南中原之地實惟天所授天與不取縱敵長寇為患滋甚亦使人心久則異異則變生抑又保聚完其蔓草難圖而使生靈愈罹殘毒不能休息由此思之朕志先定昆命于朝僉曰不可赦時哉不可失乃議大軍數道節制並進應洪流之南皆從撫惜嗚呼非朕一人與奪有食言尚念軍士久嵗征役所成大事式當此行尚慎終其如初亦使四海永清光昭我烈祖之德威暨爾千夫長百夫長今日之事一乃心力朂哉果毅亦念汝等立事立功有用命有不用命嘗為傳聞與親見之不同朕將聼覽以明其善否亦欲俾新民聞朕將往尚能向火而求蘇也行幸南燕可無令孑遺一夫皆分白省諭各設耳目量擇進退能歸欵而來者不使秋毫敢犯執迷頑不從者剪伐無俾育種在外者原加安恤還定勞來之俟軍尅日先備將士功迹大小多少以聞子將親覽焉如該載未詳可臨事便宜行之所有别降詔書已丁寧開諭無有逺邇宜體朕懷又詔蓋聞信合於義然後可循舍是自孚猶執一也故聖人之道貴在隨時未有泥而不通能濟其治日者齊政不綱人用恣怨既黜厥命晏然惟和時將混一教風有截無外不圖姦臣昌等稔心禍逆厚􅎖欺君請歸侵疆務繼絶世朕亦欲柔懷示德俯用聼從庶知不世之恩自取為邦之福洎王倫等至理又乖衷雖報謝為名而於實不既故藍公佐回丁寧理索誼故當然審必所行乃令欵報比得莫將等來所陳目事靡所遵承襲舊爵以自如略王正而不用願辭封建拒進誓章至於疇昔逋逃嘗言願遣今欲與河朔等路流寓臣民併為蔽靳自姦臣伏罪迹厥攸行內侮外連情狀甚著所不即行討取者蓋天下為心在彼猶此姑務含容以圖寧止又慮民吏滋久相效執迷邊隙兵端起將無日犯而後取禍亂必深弭爾後艱在吾早定今命元帥府領大軍數道並進撫定元係夲朝都邑州軍師之所在務加優恤以副豫子惠元元之意夫與奪之異豈所樂為而恩威弛張之間蓋不得已也凡有見聞當體至意其詞悖慢如此不當復録今存之以見其當時所請數事朝廷皆未嘗從又以見金人亦懼河南人心不歸於已故諄諄費詞如此其詆斥之詞三百六十三字已削去要當更刪削附書之遂命使持詔遍抵諸郡又分兵隨之知興仁府李師雄徽猷閣待制知淮寧府李正民皆束身歸命自是河南諸郡望風納欵矣金人陷拱州守臣左奉議郎王􅀈死之是日金右副元師薩里罕自河中渡河入同州界疾馳二百五十里趨永興軍陜西州縣偽官所至迎降逺近震恐費士戣蜀口用兵録五月十三日金人敗盟南侵大兵渡河丙戌十三日也故繫於此丁亥宰執奏事秦檜因論後世望帝王之治以為不可企及恐無此理上曰舜何人也豫何人也有為者亦若是濟州防禦使東京副留守劉錡至順昌府錡自臨安率所部以舟九百艘絶江泝淮至是才抵頴上按錡以三月二十日日戊戌離臨安自臨安至頴上三千二百里凡行四十一日遂與主管機宜文字杜亨道幹辦公事王羲賔及將佐捨舟陸行先趨城中是日金人陷南京初金人既渝盟復以葛王褎知歸德府褒以數千騎至宋王臺遣人諭都人官吏學生告以不殺不掠之意請路留守出門相見資政殿學士南京留守路允迪不得已朝服出城見之會於宋王臺允迪為主褒為客允迪奉觴為褒夀褒酬飲遂送允迪于汴京褒鼓吹入城秋毫不犯或曰允迪至汴京七日不食死戊子四川宣撫副使胡世將在河池知同州張恂遣人告疾時右護軍之戍陜西者五萬人始漸至所屯州縣而蜀口一帶正兵不過三萬人朝廷所除諸帥皆未至本鎮得報駭愕永興軍路經略使郭浩時在延安本路副都總管權知永興軍郝逺開長安城納金金人長安陷關中震動鈐轄傅忠信盧仕閔不從斬關以出知陜州吳琦城守以拒金人郝逺遣人持金國檄書至宣撫司語不遜不可聞世將焚檄斬其使己丑左朝請大夫直龍圖閣陳桷守太常少卿時上將用桷問其所在秦檜不樂之繆以同姓名者為對曰見從韓世忠軍為參謀上笑曰非也桷佳士豈肯從軍邪遂召用尚書屯田員外郎陳康伯為戶部員外郎祕書郎楊椿守屯田員外郎校書郎鄧名世為著作佐郎是日金人陷西京初金人有渝盟意河外豪傑以告河南府兵馬鈐轄李興興告於轉運判官權留守李利用副總管孫暉謂雒地東接王畿南通巴蜀北控大河可以屏衛襄漢况陵寢所在不可不注意也利用然之令興招集忠義民兵密為防禦計不數日得萬餘人暉大懼欲殺之會報敵以渡河利用聞之即棄城遁走李成以鐵騎數千據天津橋興令七騎逆繫之成罔測遂退暉棄城走興轉戰至定鼎門傷重仆於地夜半復蘇乃走外邑聚兵敵引兵入城以成知河南府時朝廷以利用有治最除直祕閣以寵之而利用已遁矣趙甡之遺史載金人入兩京在此月己丑日厯孫暉申五月十六日敵兵到河南府城下己丑十六日也甡之所云與此蓋合從之庚寅龍圖閣直學士知順昌府陳規得報敵騎入東京時新東京副留守劉錡方送客規以報示錡錡曰吾軍有萬八千人而輜重居半且逺來力不可支乃見規問曰事急矣城中有糧則能與君共守規曰有米數萬斛錡曰可矣規亦力留錡共守錡又見劉豫時所蓄毒藥猶在足以待敵會其所部選鋒遊奕二軍及老幼輜重相去甚逺錡遣騎趣之夜四鼓才至城下旦得報敵騎入陳距順昌三百里闔城惶惑錡遣兵屬與規議斂兵入城為捍禦計人心稍定郭喬年順昌破敵録云太尉欲斂兵入城為捍禦計陳守愕然曰城中人聞警報皆欲去太尉獨望守城邪疑規未必有此言今不取趙甡之遺史云劉光逺還言敵已入汴京而喬年所録云泰和縣申狀報四太子人馬五月十二日入東京今從之辛卯詔以鎮江府所藉酈瓊水陸田四十三頃賜李顯忠四川宣撫副使胡世將自河池遣涇原經略使田晟以兵三千人迎敵始金人之渡河也利路經略使楊政尚在鞏州永興經略使郭浩尚在鄜延環慶經略使范綜尚在金州而主管鄜延經略司公事王彥亦未至其地惟熙河經略使兼宣撫司參謀官孫渥右護軍都統制兼秦鳳經略使吳璘隨世將在河池世將倉皇召諸帥議出師政晟先至渥進曰河池平地無險阻敵騎已迫鳳翔自大散關疾驅一二日可至帳下頃吳公宣撫偶閲兵至河池幾為敵擒其事不逺願公去此治兵仙人原原雖去河池才五六十里而殺金平家計寨天險足恃元戎身處危地而欲號令將帥使用命赴敵渥不識也都統制吳璘抗聲言曰和尚原殺金平之戰方璘兄弟出萬死破敵時承宣在何許今出此懦語沮軍可斬也右護軍強半隔限在陜西未易呼集敵來日夜思戰今聞宣撫舍河池去保山寨失戰士心璘請以百口保破敵世將壯之指所坐帳曰世將誓死於此矣官屬韓詔等進曰渥實失言不宜居幕下遂先遣晟還涇原渥赴熙河渥恐懼汗落單馬趨出顧謂世將所親曰渥為公忠謀乃反得罪吳家小帥勇而鋭未見其勝之道也他日無忘渥言此以費士戣蜀口用兵録修入熊克小厯云時郭浩領八千衆在邠耀二州惟環慶范綜鄜延王彥仍守其地按胡世將今年六月間所奏云昨郭浩除永興經略使臣纍催夲官赴任計若未離鄜延道路隔絶却白浩申巳在邠耀州界措置探得浩只在邠州三水縣帶領衙兵數十人慮浩遲慢悮事據此則浩不在邠耀問王彥亦未至延安也又宣撫司今年六月行下知金州范綜差軍馬應按知商州邵隆則綜此時亦未赴一見克所云綜彥仍守其地蓋誤是日統領忠義軍馬李寶與金人戰於興仁府境上殺數百人獲其馬甚衆寶嶽飛所遣也飛遺寶事見九年十月壬辰劉錡詔諸將計事錡曰吾軍逺來未及息肩敵已壓境今當如何有欲就便舟順流而下者或曰去則敵人邀我歸路其敗必矣莫若守城徐為之計錡曰錡夲赴官留司今東京既陷幸全軍至此有城池可守機不可失當同心力以死報國家衆議始定即鑿舟沉之示無去意通判府事汪若海沿府檄至行在錡以奏附若海行即與屬官等登城區處城外有居民數千家恐為敵巢悉焚之分命諸統制官許青守東門賀輝守西門鍾彥守南門杜杞守北門且明斥堠及募土人作鄉導間探於是人皆奮曰早時人欺我八字軍今日當為國家立功錡親於城上督工設戰具修壁壘時守備全門錡取偽齊所作蚩車以輪轅埋城上又撤民家屋扉以代笓籬笆凡六日粗畢而金人遊錡已渡河至城外矣癸巳武經大夫濰州團練使王彥先以亳州叛附於敵以酈瓊守之是日邊報至行在丙申胡世將命右護軍都統制吳璘將二萬人自河南赴寶雞渭南以捍敵遣夲司都統制知興元府楊政樞密院都統制知永興軍郭浩為之聲援先是世將屢奏乞速徙右護軍之屯陜右者還屯蜀口事見三月丙戌不報丁酉始詔世將目下抽回戊戌上謂秦檜曰敵國之人不知信義無足怪者但士大夫不能守節至於投拜風俗如此極為可憂秦檜曰自靖康以來賣國之人皆蒙寬恩故習熟見聞若懲革之當在今日遂下詔曰昨者金國許歸河南諸路及還梓宫母兄朕念為人子弟當申孝悌之義為民父母當興拯救之思是以不憚屈已連遣信使奉表稱臣禮意備厚雖未盡復故疆已許每嵗銀絹至五十萬所遣信使有被拘留有遭拒却皆忍恥不問相繼再遣不謂設為詭計方接使人便復興兵今河南百姓休息未久又遭侵擾朕䀌然痛傷何以為懷仰諸路大帥各竭忠力以圖國家大計以慰遐邇不忘夲朝之心以副朕委任之意又詔罪狀烏珠募有能生擒烏珠者除節度使賜銀帛五萬匹兩田千頃第一區此詔旨日厯全不載蜀中刋行絲綸集中有之今掇入以補史闕三省樞密院同奉聖旨金人侵擾中原兵革不息己餘一紀天下忠臣義士雖在淪陷之中乃心不忘國家今烏珠無名再起兵端南北云憂未知休息之日凡爾懷忠抱義鄉里豪傑之士有能殺戮首惡或生擒來獻者並與除節度使仍加不次任使其餘能取一路者即付以一路取一州者即付以一州便令久任應付庫所有金帛並留賞給兵士其餘忠力自奮隨功大小髙爵重祿朕無所隱又三省樞密院同奉聖旨兩國罷兵南北生靈方得休息烏珠不道戕殺其叔舉兵無名首為亂階將帥軍民有能擒殺烏珠者見任節使以上授以樞柄末至節使者除節度使官髙者除使相見統兵者除宣撫使餘人仍賜銀絹五十匹兩田一千頃第宅一區是日御史中丞王次翁請對言陛下既以和議為主而諸將備禦嚴士卒勇鋭敵雖敗盟曲不在我無能為也前日國是初無主議事冇小變則更用他相蓋後來者未必賢於前人而排黜異黨收召親故紛紛非纍月不能定於國事初無補也願陛下以為至戒無使小人異議乘間而入上深然之己亥少師護國鎮安保靜軍節度使萬夀觀使雍國公劉光世為三京招撫處置使以援劉錡以統制官李貴步諒之軍𨽻之賜錢二十萬緡銀絹三萬匹兩為軍費於是光世駐軍太平州請樞密院都統制李顯忠以所部二千人為前軍都統制上又命左護軍都統制王德為錡之援光世請德自𨽻德不從顯忠行至宿泗間其軍多潰詔三省陜西路見在行在官員並與添差軍校願從軍者聼百姓令臨安府優加存恤無令失所右朝請大夫權州陜宣撫司參議官井度兼權四川轉運副使度亮采子亮采淮寧人元祐殿中侍御史久任於蜀故胡世將奏用之是時關中諸軍已選而復入蜀中已罷對糴停水運倉廩罄竭度建議請將紹興八年罷催對糴所欠并九年應納十年起催之數併以軍令督之世將惻然久之曰對糴所輸倍於常數民己不堪奈何計三年而併取之第起今年合輸之數其餘吾自辦於是以便宜撥成都府省司軍糧五萬赴新津運起又以制司稱提錢收糴興元米麥五萬洋州三萬趣印成都錢引五百萬委利路漕趙子厚取撥五十萬措置閬州糴買場都運司就糴成都路米十六萬潼川府路十一萬夔路三萬於利州交納米糴足間剗刷諸司見在糧米盡行借兑又起制司稱提庫金一千五百兩銀十七萬四千餘兩命利州管內安府王陟發夲州轉般倉米存留五萬外盡赴魚關命陜西都漕司印造陜西紹興錢五十萬貫應陜西州縣官錢除省計外不以有無拘礙盡數起赴鳳翔團併以右奉議郎節制司官屬陳護權隨軍轉運判官右承議郎通判興元府宋蒼舒權陜西路轉運判官軍事息日罷下川陜諸路帥臣監司同心協力共濟王事如敢違悮自有軍興條法下都統制不得妄行殺戮諸軍激犒錢物兩都統各銀絹五千匹兩郭浩田晟各三千匹兩下都統司措置於丹州界造木筏積薪縱火焚大慶橋傅忠信等奪長安門不順金者先與轉行五官約束仙人關如有陜西驚移人入關不得邀阻收陜西偽官前熙河路總管白常等於施黔州居住下興州大安軍興元府起夫四千人負一月糧修殺金平根刷官私回腳便舟載還諸軍家屬下都統制司擺置烽燧及銀牌馬不知思州田祐恭修合藥箭拘收汧陽監官馬茶兵並般運軍前物色於是守禦之計始備蜀人粗安按此諸事必非一日所行今因井度除命附書之都運司題名度以閏六月一日到任恐此時已一面供職矣費士戣蜀口用兵録稱世將添印成都錢引五百萬而成都續記無之蓋即二月戊子所得旨增印者也今改作趣即庶不抵牾庚子詔右護軍都統制吳璘同節制陜西諸路軍馬以金人犯陜西故也又詔川陜宣撫副使胡世將軍前合行黜陟許以昨張浚所謂指揮時三省樞密院言浚宣撫川陜日曾降詔旨黜陟之典俾得以便宜施行近旨令世將如遇軍事及賞罰等待報不及許一面便宜施行惟官吏黜陟未得指揮故申明之日歷不載此指揮按世將今年十月二十日申審狀云六月十三日凖樞密院劄子奉聖旨云云六月十三日丙辰去此十六日以時計之必是己亥庚子兩日降旨今併附此俟考辛丑中書舍人林待聘兼權直學士院起居舍人王鉌試中書舍人尚書司勳員外即兼實録院檢討官張嵲守起居舍人資政殿學士提舉醴泉觀鄭億年與在外宫觀改提舉亳州明道宫初邉報至行在從官會於都堂工部尚書廖剛謂億年曰公以百口保金人講和今已背約有何面目尚在朝廷億年氣塞秦檜以為譏已也乃曰尚書曉人不當如是億年懼求去乃有是命何俌龜鑑金人敗盟分道入犯人以為中國之不幸愚獨以為此猶中國之幸也何者河南我之故土不幸淪沒我無以取之而敵反以與之是敵得以制其豫奪之權而所以豫我者乃所以餌我也幸而烏珠速於敗盟我之福也使其不叛則彼有大恩我有大費如向者燕雲二京之事其禍愈久而愈深也嗚呼敵欲盟則盟欲戰則戰使斾方北敵兵以南此檜主和之驗也檜於此時曾無逺略乃且持祿固位猶使其黨其事有大變更用他相為天子戒檜之姦謀為何如耶是日金人犯鳯翔府之石壁寨吳璘遣統制官姚仲等拒之仲自奮身督戰珠赫貝勒中傷退屯武功時楊政母病方死亦不顧家徑至河南與璘協力捍敵已而諸軍家屬悉歸內地人心既定踴躍自奮不復懼敵矣先是金人之别將又圍耀州節制陜西軍馬郭浩遣兵救之敵解去費士戣蜀口用兵録郭浩申五月二十八日解圍耀州二十八日辛丑也故附於此壬寅右奉議郎通判壽春府鄭絪直祕閣知壽春府先是金人遣使臣顔林持檄書來撫諭絪縳林送於朝且率軍民為守禦計東京副留守劉錡言其忠故有是命會河南副總管孫暉自西京遁歸絪言於淮西宣撫使張浚乞改命武臣乃以暉知壽春府是日金人圍順昌府先是劉錡於城下設伏敵遊騎至擒其千戶阿克舒蘇等二人詰之云韓將軍在白龍渦下寨距城三十里錡夜遣千餘兵擊之頗殺敵衆既而三路都統葛王褎及龍虎大王軍併至城下凡三萬餘人錡以神臂弓及強弩射之稍引去復以步兵邀擊溺於河者甚衆奪其器甲又生獲女真漢兒皆謂敵已遣銀牌使馳詣東京告急於都元帥宗弼矣錡見陳蔡以西皆望風投拜又有王三者舊為宗弼所用嘗知順昌府至是復來城下宗弼欲再令守順昌錡慮有茍全性命者賣已於外故順昌官吏軍民皆不許登城以所部兵守之時鄜延路副總管劉光逺以道梗不能赴武功大夫溫州刺史新知石泉軍栁倪為錡所辟皆在軍中倪適至東門敵射中其左足倪拔矢反射之敵應聲而倒癸卯賜處州孝童周智童子出身智六嵗喪父哀毁過制芝生於墓廬守臣以聞故有是命建炎以來繫年要録卷一百三十五
