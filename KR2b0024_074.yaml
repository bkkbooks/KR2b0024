body:
  text: 建炎以來繫年要録卷七十四宋李心傳撰紹興四年三月辛亥朔川陜宣撫司都統制吳玠敗敵于仙人關初金右都監宗弼與玠連戰未決玠遙與宗弼相見且遣人謂曰趙氏已衰不可扶持公來當擇善地百里而王之玠謝曰已事趙氏不敢有二此據林泉野記敵遣生兵萬餘擊玠營之左玠分兵擊却之賊怒擁衆乘城玠遣統制官楊政以刀鎗手深入統制官吳璘以刀畫地謂諸將曰死則死此敢退者斬敵分為二陳宗弼陳于東將軍韓常陳于西我軍苦戰久遂退屯第二隘時軍中頗有異議欲别擇形勝守者璘曰方交而退是不戰而却也吾度此敵走不久矣政亦言于玠曰此地為蜀扼塞死不可失當守以強弩彼不敢捨此而犯關玠從之敵進攻第二隘人被兩鎧鐡刃相連魚貫而上璘督士死戰矢下如雨死者層積敵踐而登薩里罕駐馬四視久之曰吾得之矣翌日命諸軍併力攻營之西北樓統領官隴干姚仲登樓死戰樓已傾仲以帛為繩曳使復正敵以火焚樓柱仲取酒擊滅之玠又遣政與統領官田晟出鋭兵持長刀大斧擊其左右夜布火四山大震鼓隨之壬子夜壘中大出兵遣右軍同統領王喜及王武等諸將分紫白旗入敵營敵驚潰將軍韓常為官軍射損左目敵不能支遂引兵宵遁右軍統制張彥劫敵橫山寨斬千餘級玠遣統制官王俊設伏河池扼其歸路又敗之是舉也敵決意入蜀自薩里罕已下皆盡室以來既不得志遂還鳯翔授甲士田為久留計自是不復輕動矣敵之始入也玠檄召金房鎮撫使王彥熙河路總管關師古來援時師古已叛彥亦不至獨綿威茂石泉軍安撫使劉錡以所部會之玠聞師古叛并其軍麾下厚資給焉由是玠軍益以精強吕中大事記張浚以樞府任川陜半天下之責前控六路之師後據兩川之粟左通荆襄之財右出秦隴之馬以為定天下大計雖趙哲離部致有富平之敗而得劉子羽以保興元用吳玠以保大散關遂有和尚原之捷繼有殺金平之捷敵自是不敢犯蜀矣丙辰上問執政湖寇事宜張浚曰村民無知迫於官吏之擾偷安江湖非剽掠無以為生其拒王師實懼大戮勢不得已以緩死爾臣謂宜廓信義以招之上曰皆朕赤子何事於殺然自軍興盜起率招來之而姦人乘釁所在嘯聚今幸衰息勿復效尤可也丁巳右司諫劉大中守祕書少監上諭朱勝非曰大中頃使江西頗多興獄今猶未已若令為諫官恐郡縣觀望朕於用刑欽恤明慎常懼有司行法於意外今遷大中為少監蓋朕之深慮也熊克小厯大中自監察御史除蓋誤大中今年正月已遷諫官矣右朝散郎魏舜臣知黃州戊午端明殿學士江南西路制置大使趙鼎參知政事時鼎已召而未至也上命鼎薦舉人才鼎即以王居正吕祉董弅林季仲陳槖朱震范同吕本中上之乃詔三省公共隨器任使詔三省在三月壬申撫州布衣寧子思獻白銀木刻成千手大悲像極精工朱勝非進呈上曰朕平日未嘗佞佛然亦不敢加訾原飾像設以祈福乃流俗之事非朕心也勝非又言撫州有玉尊刻成龍文疑禁中舊物未敢進上曰此尤無謂異時茶馬司常竊市馬之直以易玩好是舉山澤之利而投之無用之地爾其勿受自今有來獻者皆却之夜雨雹己未刑部侍郎胡世將坐前守鎮江不發御服織羅錢與通簽判右承議郎曾恩等四人各貶秩一等仍令本府限半月發還先是劉光世既移戍內藏庫復舉行之世將奏民力凋弊無所從出有司劾世將違旨故有是命熊克書此事差誤已辨之見二年九月戊寅并注詔祕閣修撰主管江州太平觀宋輝落職右朝奉大夫主管台州崇道觀朝公為罷宫觀饒州編管人劉默許自便以侍御史辛炳論廢相吕頥浩用刑輕重不中也宋輝落職因守臨安日縱釋私酤事已見紹興三年十二月樞密院言三省事繁請機速房文字宰臣與院官輪日當筆庶免稽滯從之壬戍參知政事同都督江淮荆浙諸軍事孟庾自鎮江至行在庾請隨班奏事訖免赴都堂奏事仍免簽書三省文字時督府諸將既已分戍遂併其府廢之而以其餘兵𨽻神武右軍都統制張俊督府之罷日厯全不書會要本門亦不載惟趙甡之遺史略記此事今因孟庾召還遂書之以補史闕癸亥侍御史辛炳試御史中丞中書舍人唐輝試左諫議大夫禮部侍郎兼侍講權直學士院陳與義言明堂之禮有漢武汶上之制紹興元年實已行之若再舉而行適宜於今事無戾於古典太常丞詹公薦博士劉登亦言古人巡幸自非封禪告成未有行郊祀者今嵗若且祀明堂實得權時之義但紹興元年止設天地祖宗四位即不曾設皇祐百神議者疑郊與明堂當間舉及與義等議上乃命有司條具明堂典禮以聞左儒林郎連州州學教授范寅賔左迪功郎監泉州石井鎮朱松並為祕書省正字右宣義郎周聿為司農寺丞右承事郎王銍守太府寺丞右承務郎范伯奮守軍器監丞松婺源人謝克家所薦聿中從弟也中已見建炎二年正月癸卯伯奮以選人薦對故有是命寅賔已見紹興二年銍已見建炎四年言者奏銍浮薄無行罷之乙丑檢校少保定國軍節度使知樞密院事張浚罷為資政殿大學士左通奉大夫提舉臨安府洞霄宫時辛炳常同論浚不已上未聽二人因録所上四章申浚炳疏論浚聞罷之始遷延不行浚懼即移疾待罪且以吕頥浩在相位時書進呈上乃釋然頥浩書見三年六月庚寅朱熹撰浚行狀云炳言公既得召命不即出蜀意有他圖按炳元疏中語不如此熹誤也今略刪潤附見炳又言前此人臣未有如浚之跋扈僭擬專恣誤國欺君慢上者浚兼有衆惡其可逃於典刑望付三省早賜竄黜同亦論奏如炳言故浚遂罷尚書刑部侍郎胡世將充徽猷閣直學士知洪州後二日詔世將兼江西安撫制置使世將方至而遽出必趙鼎所不喜故也當更考之神武中軍中部統領官朱師閔改充本軍選鋒統領時統制楊沂中以張浚所携西兵為選鋒部故命師閔統之而以浚隨行選鋒將武功大夫榮州刺史閣門宣贊舍人柴斌為神武中軍後部同統領皆用沂中請也柴斌除統領在此月乙亥丙寅詔張浚免謝辭駕部員外郎李願以使蜀之勞進秩二等時議者以為興利閬三州及三泉縣見屯軍兵為四川門鑰有司饋糧雖用水運然每令州縣抑勒船户裝載失陷官物今潼川府路嵗運二十萬斛每斛支官錢三千二百有竒成都路嵗運六十五萬斛以水路稍逺所支錢又多通計費錢二百六千萬緡船户既被抑勒侵欺盜用巧詐百端以至自沉舟船號為拋失所運米數失陷大半今欲度江路逺近置轉般倉應用舟船令兩路量事力製造橰梢即於廂軍內刷差不足則召募百姓每舟約載三百斛若以百二十舟往來不絶不過十月撥發盡絶今興州銀一兩博米僅得一斗緣軍糧不足有司不免貴支坐倉價錢計司失職莫此為甚伏望慎擇人材付之以權專委措置詔宣撫司相度此疏未得其名恐即李願所上當考丁卯張浚落職奉祠時起居郎兼權中書舍人舒清國當草浚制奏言臣竊讀臣僚論浚跋扈不臣之迹實臣子所不忍聞今陛下寬恩雖罷其樞柄而祕殿髙班豈宜冒處故有是命始浚之在蜀也嘗以秦川館為學舍以待陜西河東失職來歸之士給衣食養之又新復州郡乞鑄印浚以便宜先給而後聞於上故清國所草謫詞有曰假便宜行事之勢忘人臣無將之嫌肖內閣以招賢擬尚方而刻印朱熹撰浚行狀云辛炳論公設祕館以崇儒擬尚方而鑄印此亦非疏中本語實當時之謫詞熹蓋小誤也殿中侍御史常同時方論清國行詞疏謬翌日清國亦罷為直龍圖閣主管台州崇道觀御史中丞辛炳復言浚之不臣不竄之嶺表不足以塞公議宫祠自便所至必有以搖人心者為害非一因言昨敵騎渡江滕康劉珏以措置乖方尚猶謫授分司之官湖南居住今浚之罪百倍康珏後三日詔浚福州居住何俌龜鑑建炎初潼關告警羽檄交馳浚以密院而任川陜宣撫之職請任西事分司秦州左通荆襄之財右出秦隴之馬興元一奏勇於自任擢劉子羽於參謀而弛禁通商輸財濟飢熙如也用趙開于總領而民不加賦軍用自足裕如也而分畫諸將如吳玠如王彥如劉錡如關師古等莫不屬其指授之下自是而捷於寶雞捷于箭栝捷于和尚原捷于殺金平劔閣棧道賴以保全此雖吳武安玠以下諸將戰鬬之功而分畫措置莫非我魏公力也而議者乃以祕閣崇儒尚方鑄印中傷之雖聖明天子有人言其過朕皆不聽之諭而還朝以後言者滋甚浚不容不落職出居外郡矣仍借撥官田十頃炳言浚之罪無可矜者今雖已廢示不復用然川陜之人自聞浚還朝朝夕反側視浚去留與得罪之輕重以為安危今祿以祠宫處之善地加之借撥官田川陜傳報豈不搖動又七日遂罷借田之命浚即日如福州從者皆去肩輿才兩人浚雖得罪猶上疏論敵偽暫和心必未已當益為備具大略言金人情狀專以和議誤我亦云久矣彼勢促則言和勢盛則復肆前後一轍姑請以近事明之紹興三年秋尼瑪哈有犯蜀之意先遣王倫還朝且致勤懇蓋懼朝廷大兵乘彼虛隙又其為劉豫之計至委曲周悉也自後九月伊都作難前謀遂寢至十二月伊都之難稍息則復大集蕃漢之衆徑造梁洋是時朝廷已遣潘致堯出使矣次年二月敵困饒風進退未遑先是朝廷開都督府議遣韓世忠直抵泗州敵實畏之於四月遣致堯還其詞婉順欲邀大臣共議此非無所忌憚而然也梁洋之衆未能出境至五月而後得歸既狼狽矣而世忠大兵尋復輟行敵之氣力固已復蘇而叛豫之心亦云紓緩所以前日使人之來求請不一故為難從之事也竊惟金人傾我社稷壞我陵寢迫我二帝驅我宗室百官自謂怨隙至深其朝夕謀我者不遺餘力矣况劉豫介然處於其中勢不兩立必求援於金借使暫和心必未已數年之內指摘他故豈無用兵之詞而我將士率多中原之人謂和議已定不復進取將解體思歸矣若謂今日不得已而與之通使為陛下之權敵亦固能用權也願陛下早夜深思益為備具處將士家屬於積粟至安之地使出而戰守者無返顧奔散之憂精擇人才以撫川陜之師使積年屯邊者無懈惰懷望之意江淮川陜互為牽制斥逺和議用集大業臣奉使川陜竊見主兵官除吳玠王彥關師古纍經拔擢備見可任外其餘人才尚衆謹開具如左吳璘楊政可統大兵田晟可總一路王宗尹王喜王彥可為統制後皆有聲世服其知人清國罷左史在此月戊午浚居住在辛未罷借田在戊寅今牽聨書之宗尹初見建炎二年十一月喜初見紹興元年十月新除太常少卿侯延慶為起居舍人尚書兵部員外郎馮康國罷日下出門御史常同言康國本遂寧浮薄不逞之徒張浚輕舉慢令一切猖獗康國實主其謀生殺廢置悉出其手納賄受賂所求無不遂者今尚敢晏然輦轂之下為浚遊談故有是命左武大夫文州團練使湖南安撫司後軍統制韓京充廣東兵馬鈐轄以所部屯廣州彈壓盜賊聽本路帥臣節制其所部即今摧鋒軍用經略使季陵請也初江西叛將元通犯境陵遣海南尉魏逢使臣董鼒招撫之即聽命寨於城外無幾何江西遣兵至通遁趨惠州追兵及之與戰不利人情震恐陵復遣逢鼒追通回至是乃以付京尋坐它事誅逺近始安元通初見紹興三年十二月戊申戊辰命前宰執追録建炎四年四月以前時政記用司封員外郎兼著作佐郎孔端朝請也己巳詔戚里之家應造進酒者許即所在州公庫或官務寄造為賔祭之用嵗毋過三十石時親衛大夫寧州觀察使韋淵奉祠居衢州奏乞鬻酒上弗從有司弗能禁郡守謝克家請於朝故有是命辛未直龍圖閣知永州胡寅試起居郎右文殿修撰新知饒州王居正試太常少卿壬申集英殿修撰知鼎州程昌宇充徽猷閣待制知靜江府左武大夫忠州團練使楊可輔知鼎州武翼大夫吉州刺史湖北兵馬都監杜湛領忠州團練使添差江西兵馬鈐轄統率舊管官兵洪州駐劄時朝廷方招安湖寇而賊以不堪昌宇殺戮為詞會廣西帥劉彥適以不勝任召還昌宇乃改命熊克小厯云詔除昌宇知靜江府候招安畢日行而日厯可轉限三日朝辭起發與克所云不同當考神武右軍都統制張俊大閲將士上聞之賜俊白金萬兩錢三萬緡為激賞之費癸酉左承議郎主管台州崇道觀李易充淮東安撫司參議官用韓世忠奏也易辭不赴六月甲午改知常州龍圖閣直學士知湖州汪藻上所編元符庚辰以來詔旨二百卷詔送史館甲戌尚書祠部員外郎趙霈改行吏部員外郎直祕閣主管台州崇道觀吕本中為祠部員外郎右奉議郎劉一止守尚書祠部員外郎主管溫州神主時祠部員外郎兼權太常少卿江端友已卒故以一止代之一止嘗為起居郎下除郎官辭不拜改知袁州端友無妻子死於鴈蕩山中徽猷閣待制知臨安府梁汝嘉請死事之家無人受恩澤者許換給度牒從之度牒直二百千承信郎一資易十四道他視此為差乙亥鼎州團練使提舉江州太平觀劉錫復捧日天武四廂都指揮使明州觀察使權主管殿前司公事鎮江建康府淮南東路宣撫使韓世忠乞承買平江府朱勔南園及請佃陳滿塘官地千二百畝詔以園地賜世忠直祕閣張澄自蜀赴行在上召對遂以為江西轉運副使熊克小厯書澄升直徽猷閣在今年四月按日厯澄明年正月戊辰自直祕閣江西轉運副使以隨軍無罣誤進職一等克實甚誤秀常湖三州守二右朝請郎俞俟龍圖閣直學士汪藻等七人與糴買官並進秩一等以和糴數多故也俟河南人嘗為宣諭官胡蒙所薦詔俟滿秩赴行在秀州止有通判錢濬明轉官未知郡守為誰當考是日御史中丞辛炳入對論用人三弊曰分朋黨以立門庭緣愛憎而有用舍記小過而掩實行三者不去而望得人譬如却行求前不可得矣夫才非可一途取也有忠實威望可以任股肱心膂之寄者有剛正詳明可以為耳目風憲之官者有學行深茂宜在論思獻納之地者有智謀宏靖宜居折衝禦侮之任者或長於專對或長於刺舉或長於撫字倘皆取其所長略其所短總核名實隨材器使則人才當自不乏顧豈天下真無人哉望陛下斷自宸𠂻去前三弊毋牽於朋黨之弊無溺於愛憎之意雖嘗有小疵而不害大節亦且抆拭用之惟實才是求惟僉諧是與或招延於內或布列於外使內外大小罔不得人則中興之治似不難致疏奏上嘉納之詔草澤鄧名世令閣門引見上殿名世初見去年十月丁亥名世初以劉大中薦召赴行在獻所著春秋四譜古今姓氏書辨證詔吏部尚書兼侍講胡松年看詳松年言其貫穿群書用心刻苦由是引對遂命為右迪功郎名世以四月戊戌入見庚子補官丙子端明殿學士川陜等路宣撫處置副使王似充資政殿學士川陜宣撫使龍圖閣學士川陜等路宣撫處置副使盧法原充端明殿學士川陜宣撫副使落等路及處置字並在司治事起復檢校少保鎮西軍節度使利州路階成鳯州制置使涇原秦鳯路經略安撫使知秦州充陜西諸路都統制兼宣撫處置使司都統制節制興文龍州吳玠充川陜宣撫副使免簽書本司公事專一措置沿邊諸處戰守秦州觀察使熙河蘭廓路馬步軍總管統制熙秦兩路軍馬專一招撫熙秦關師古充熙河蘭廓路制置使並日下供職朝廷未知師古叛亡故有是命丁丑右武大夫忠州防禦使同管客省四方館閣門公事楊應誠為樞密副都承旨詔今年正月已後海行續降指揮令刑部依舊法春秋編類頒降用大理少卿元衮請也自紹興新書既成之後省部經火續降指揮不存詔下湖溫州抄録編類頒降至是又申行之戊寅監察御史明槖提點兩浙東路刑獄公事從所請也詔臨安府失火延燒官私倉宅及三百間以上正犯人作情重法輕奏裁蘆草竹板屋三間比一間五百間已上取旨先是有旨失火焚燒數多取旨依軍法刑寺以為無所執守乃比附立法焉其後御史臺又乞估計價錢量輕重取旨刑部請延燒直萬緡者比三百間直五千緡者比五百間從之後旨在六月戊子己卯閣門祗候知漣水軍丁祀令再任閣門宣贊舍人添差建康府兵馬鈐轄王才權發遣洪州兵馬鈐轄建炎以來繫年要録卷七十四金人地名考證薩里罕原書作撒離喝誤改見卷十一尼瑪哈原書作粘罕誤改見卷一伊都原書作余覩誤改見卷一
