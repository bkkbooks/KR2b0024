body:
  text: 建炎以來繫年要録卷九十二宋李心傳撰紹興五年八月壬寅朔權吏部侍郎張致逺言臣竊惟靖康之變議者追咎異時首禍之由故於仕進則有討論之式於賞典則有泛濫之目中間緣施行過差武臣特免討論往往以宣和之前所得濫賞陳乞收使雖泛濫之目仍在而有司按文摘句放行已多如後苑作排辦採山撫定燕雲定鼎押樂之類雖不著之事目然三尺童子亦知其為濫賞明矣兼臣向見當時執政大臣猶有陳乞所得恩例者或即從其所請或旋被繳駮此尤無謂臣願特降睿旨應宣和以前所得上項酬賞并當時執政大臣所得恩例未經收使者一切勿行其敢輒有陳請重置典憲蓋國事如許而臣下尚忍言賞非所以示訓也乃詔應收使宣和以前酬賞如後苑作排辦採山撫定燕雲定鼎押樂之類令吏部申聽朝旨餘從之右司諫趙霈試右諫議大夫直祕閣新知溫州王縉為監察御史左迪功郎處州州學教授趙渙以薦對特改左承事郎尋除將作監丞九月壬申太府寺丞兼都督府幹辦公事王良存請州縣之獄所禁罪人並須當職官常加審問躬定牢户其不應拘繫及入禁不書歷之人許被禁之家越訴增重法禁期於必行從之令刑部看詳立法録故相范質七世孫楰為將仕郎罷荆南營田司令安撫司措置官兵耕種毋得循舊擾民又以歸州還𨽻安撫使王彥皆用都督行府奏也初彥自渠州以所部之鎮至荆南而鎮撫使解潛已去倉廪皆竭彥懼不可留即引兵追潛至鄂州會張浚平湖賊還與之遇復勸彥還彥自枝江徙居舊治時軍儲不繼彥乃倣川錢引法造交子行於荆南管內漸措置屯田為出戰入耕之計仍擇荒田分將士為莊莊耕千畝治石塘瓦窰二廢堰計工六萬有畸不浹旬告成公私利之癸卯左朝奉郎充祕閣修撰趙子稱主管台州崇道觀俸給如小郡知州例仍折支見緡並於上供錢內支給人從減半子稱辭郡寄故有是命武功大夫髙州刺史劉光逺帶御器械光逺自江西兵馬鈐轄召歸會其兄帶御器械光烈出為江東馬步軍副總管乃命光逺代之徽猷閣待制知江州兼管內安撫使程昌宇罷時江西轉運判官逢汝霖提點刑獄公事張叔獻提舉常平茶鹽趙不已共劾昌宇貪暴不法招剌水軍多不合人情願民生男者令納錢一千生女者五百到任之初閉城門抄劄居民有自外入城之人雖婦女亦印其面由此遁去者數百家城市蕭條行路歎息乃罷昌宇令帥府劾罪以聞甲辰詔增館職為十八員時言者論唐太宗當兵戈搶攘之際置文學館學士凡十有八人其後皆為名臣祖宗闢三館以儲養人才蓋本於此今國步艱難時方右武故館職猶多闕員然臨事每有乏才之歎則儲養之方亦不可以兵戈而遽已也一館職之俸入僅比一小使臣小使臣動以萬數何獨於館職較此微祿哉乞如祖宗故事通以十八人為額故有是命既而本省再請乃命祕書郎及著作各除二員校書郎正字通除十二員而少丞不與焉後旨在是月己巳是日禮部貢院放榜考校到合格進士樊光逺等二百人博學宏詞科新敕令所刪定官王璧新明州州學教授石延慶二人光逺錢塘人嘗從張九成學璧庭秀子延慶新昌人也右朝請大夫直龍圖閣向子諲落致仕知江州兼管內安撫司公事制曰湓城為郡據大江中流在昔宿徑兵為重鎮地有常險則守有常勢茍非其人險不足恃也爰擇才望乃畀符竹以爾秉節立義術略疏通總六路之權當大邦之寄屢更變故不懷二心蠻貊知名姦回忌疾自以危行告老而歸聞精力之尚強正艱難之所賴為朕復起往守九江必有忠謀以寬憂顧能益光於世業斯無忝於訓言詔都督行府官吏軍兵並進一官資録平湖寇之勞也丙午右中散大夫提轄𣙜貨務都茶場郭川減四年磨勘監務場及交引庫官吏各進一官資以户部言去年收茶鹽香錢共二千四十三萬餘緡故也直徽猷閣程芾新除湖南轉運判官未上乃遷廣西轉運司權知賀州是日視事於富川縣此為明年三月董弅劾芾張本丁未宰相趙鼎乞罷政先是殿中侍御史謝祖信奏新僉書廣德軍判官趙繼之任衢州江山令贓汚狼藉與判官趙不愚共為姦利表裏相濟詔浙東憲司劾治其日癸卯也鼎嘗以京秩薦此二人故乞解機務是日祖信方候對上顧鼎曰事有輕重卿薦士之失甚輕而朕之罷相甚重知人自古難之豈可以薦二士之失而罷宰相况頃時臺臣論李處勵罪是時呂頤浩為相曽入文字自陳嘗薦處勵乞依條不收使舉狀案牘今在中書可見也卿既自劾於朕矣更何嫌而輕為去就宜體朕意勿復再陳日歷五月二十六日己亥吏部磨勘數內左文林郎趙不愚改合入官戊申左迪功郎湯選改合入官以嘗任樂昌丞與掩殺李原缺二字之勞也己酉趙鼎進呈探報劉豫將山東百姓六十以下二十以上皆簽發為兵每畝田科錢五百上曰朕未嘗一日忘中原之民使其陷於塗炭皆朕之過百姓為豫虐用如此朕心惻然詔趙普佐太祖開基非其他勳臣之比官其五世孫六房各二資故追復朝請大夫梁燾再復資政殿學士中大夫以其家有請也燾東平人元祐尚書左丞黨籍執政第九人化州安置尚書左僕射趙鼎言故右奉直大夫邵伯溫大賢之後行義顯著元符末以上書得罪書名黨籍坐廢者四十年伏望優加褒贈鼎伯溫門人也詔贈祕閣修撰官其家一人制曰士君子依仁守義雖不見用乃有追録褒贈之典施於既死之後使聞其風者興起尚論而想見其人亦何存歿之間哉維先民康節學貫三易懷寶遁世而爾以孝謹為之子維先正弼光公著純仁道德勳賢表儀百世而爾以學行受其知浮沈下僚迄不大試柄臣有請朕用慨然寵以論撰之華資庸示儒林之深勸尚惟冥漠克享恩榮伯溫選人邪中籍第三十五人翰林學士孫近給事中廖剛中書舍人劉大中以知貢舉畢同班入見自是為例遣內侍麥伸趣張浚赴行在以將防秋也庚戌徽猷閣直學士知鄂州荆湖北路安撫使劉洪道進職二等張浚言洪道沈毅持重勇於事功艱難以來所至宣力故有是命壬子右文殿修撰知揚州葉煥復徽猷閣待制詔淮南水寨都巡檢各聽守令節制本寨應干事件並申取州縣指揮不得一面施行先是都督行府令諸州置山水寨擇土豪充都巡檢至是又條約之左通奉大夫祕閣修撰提舉西京嵩山崇福宫馮躬厚請以明堂恩任其子吏部言係責降人取裁詔特許蔭補中書舍人胡寅言躬厚乃蔡氏之甥在宣和中叨竊侍從之人也况有條制責降未敘復人不許奏薦躬厚未嘗復職其為責降明矣今以何名而許之蔭補哉比年有從臣係自陳宫觀法該奏薦者吏部觀望權臣反謂法不當得今躬厚法不當得而反許之非惟無以昭示好惡且如躬厚輩實繁有徒必相視效益長僥幸人心不服公論謂何命遂寢廢漢陽軍為縣𨽻嶽州以户口減少故也守臣髙舜舉乞存留不許癸丑户部尚書兼詳定一司敕令提舉製造御前軍器所兼權措置財用章誼充徽猷閣學士知溫州從所請也權尚書吏部侍郎張致逺復為户部侍郎中書舍人劉大中試吏部侍郎中書門下省檢正諸房公事呂祉權兵部侍郎起居郎兼侍講兼資善堂贊讀朱震試中書舍人升翊善時户部惟致逺獨員乃命祉兼權户部祉言國家所務財用為先嘗竊計一嵗之入不足以供一嵗之出此臣所深憂也然有三説焉一曰節二曰為三曰得人蓋今日支費百出固有不可節者亦有不可不節者今日利源廢壞固有不可為者亦有不可不為者內自朝廷外至州縣官吏甚衆惟得其人而政以舉則姦無所容利歸公上矣於是可節者能節之可為者能為之何患財賦不饒裕哉祉又言東南數路監司郡守僅有國家前日十之二三而吏員猥冗每一闕待次者三四人若知縣闕則並屬吏部不許堂除顧所薦雖材將何以處之監司郡守所差下人如實有才當不次用之茍或不才豈可待次宜令並罷然後於籍記所舉人內參考除授庶幾可以得人自公正之路塞薦舉之法壞而入仕者一任用舉主闕升可得小邑兩任用舉主改官可得大邑彼為監司為郡守者固許薦舉也豈盡公正乎又吏部注擬乃止循資格不聞曰某人名次雖低而材業優某人名次雖髙而材業劣如前世銓衡真有所去取也選法已弊不可復革應繁難知縣闕宜盡歸於朝廷然後於籍記所舉之人內宜參考除授庶幾諸邑亦可以得人矣漢宣帝時二千石有治理效輒以璽書勉勵增秩賜金或爵至關內侯公卿闕則選諸所表以次用之用為公卿者皆更治民以考功是故漢之良吏於斯為盛號中興焉今且選侍從卿監郎官出為監司郡守若侍從卿監郎官有闕宜擢監司郡守補之朝廷用人之路不一或以文學或以操行或以髙科或以故家獨無以治縣有政績而擢用者今若館職寺監丞編修計議之類有闕於知縣中擢用其治行尤異之人或即除監司郡守亦不為過也如是則人知勸矣令得人則一邑治守得人則一郡治監司得人則一路治合諸路為天下則治豈難致哉恢復之圖無以易此直龍圖閣主管亳州明道宫潘良貴試祕書少監趣赴行在尚書工部員外郎程克俊守兵部員外郎右朝請大夫樞密院計議官呂丕問行工部員外郎左朝請郎主管台州崇道觀陶愷為金部員外郎愷恱弟也與丕問皆召對而有是命丕問乞補外乃除知處州甲寅尚書度支員外郎何慤為右司員外郎太府寺丞都督府幹辦公事王良存為度支員外郎慤資陽人已見紹興二年丙辰故武顯大夫應天府兵馬鈐轄孫安道特贈右武大夫忠州刺史官其家二人以樞密院計議官徐康言其死節也安道死節事見紹興二年十月左承議郎新知台州郭東罷東守徽州盜未至而遁及是抆拭用之中書舍人胡寅奏東茍賤無恥台雖小郡然陳槖以循吏受賞矣柯棐繼之已是不稱重以郭東所謂一暴而十寒也詔書銓量澄汰如東者其當之命遂寢丁巳祕書郎何掄守祕書省著作郎詔福建收買末茶指揮勿行戊午監察御史王縉為殿中侍御史左從政郎樞密院計議官李寀為左宣教郎以薦對也故集英殿修撰周鼎特贈徽猷閣待制以其家援黨人例有請也制曰朋黨之論不聞於帝王盛時而起於漢唐之季世夫舉賢才之士以黨名之其效至於戎馬生郊中原板蕩既往之禍豈不痛哉朕用懲之是以盡湔沉寃激勸百寮為永世之戒鼎秉心端亮盡言無諱受材肅給所至有聲昔蒙邪慝之名今見忠良之實西清次對追賁九泉尚其有知服我休命鼎崇寧刑部侍郎以嘗上書入邪中籍待制以上第三十八人詔糧料院將見行條法及前後續降申請指揮編集成册次第經由太府寺户部看定用印給付如有抵牾疑惑申明朝廷可否行下用言者請也此與今年十二月王俁奏請相關己未御筆比覽元符諫臣任伯雨章疏論章惇蔡卞詆誣宣仁聖烈太后欲追廢為庶人誰無母慈何忍至此賴哲宗皇帝聖明灼見不從所請向使其言施用豈不蔑太母九年保祐之功纍泰陵終身仁孝之德自朕纂服是用痛心昭雪黨人刋正國史雖崇寧而後迷國猥衆推原本始實自紹聖惇卞竊位之時而姦慝未彰將何以仰慰在天稱朕尊嚴宗廟之意可令三省取索議罪來上當正典刑布告天下先是伯雨之子起居舍人申先乞贈其父官因上伯雨諫疏趙鼎留身奏惇卞罪惡遂贈伯雨右諫議大夫而有是旨吏部員外郎董弅言仰惟太祖皇帝受天明命削平僭亂混一區宇建萬世不拔之基垂子孫無窮之祚即其功德所起則有同乎周之后稷乃若因時特起之迹則無異乎漢之髙帝魏晉而下莫可擬倫是宜郊祀以配上帝祫享以居東鄉之尊傳千萬世而不易者也國初稽前代追崇之典上及四世故於祫享用魏晉故事虛東鄉之位逮至仁宗皇帝嘉祐四年親行祫享之禮嘗詔有司詳議太祖皇帝東鄉用昭正統之緒當時在廷多洪儒碩學僉謂自古必以受命之祖乃居東鄉之位本朝太祖乃受命之君若論七廟之次有僖祖以降四廟在上當時太祫止列昭穆而虛東鄉蓋終不敢以非受命之祖而居之允協禮經暨熙寧之初僖祖以世次當祧禮官韓維等據經有請援證明白適王安石用事奮其臆説務以勢勝乃俾章衡建議尊僖祖為始祖肇居東鄉神宗皇帝初未以為然委曲訪問安石乃謂推太祖之孝心固欲尊宣祖自宣祖而上孝心宜無以異則尊僖祖必當祖宗神靈之意神宗皇帝意猶未決博詢大臣故馮京奏謂士大夫以太祖不得東鄉為恨安石肆言以折之已又欲罷太祖郊配神宗以太祖開基受命不許安石終不然之乃曰本朝配天之禮不合禮經以此事未害逆順大倫姑未暇釐正一時有識之士莫敢與辨元祐之初翼祖既祧正合典禮至於崇寧宣祖當祧適蔡京用事一遵安石之術乃建議請立九廟自我作古其已祧翼祖及當祧宣祖並即循舊沿至今太祖皇帝尚居第四室遇大祫處昭穆之列識者恨焉臣竊謂王者奉先與臣庶異必合天下之公願垂萬世之宏規匪容私意於其間祖宗功德之外親盡迭毁禮之必然自古蓋未有功隆創業為一代之太祖而列序於昭穆之次者也亦未有非受命而追崇之祖居東鄉之尊歷百代而不遷者也是正闕違以契天人之望理固有待陛下孝通神明治法祖宗光紹丕圖中興聖緒嗣服之初郊見天地寅奉太祖以嚴配祀載舉合宫之祭仍修並配之儀亶諧公願兹者當省方駐蹕之地肇建太廟以時享獻用昭奉先之孝帝王盛德曷以加諸然則辨廟祧之次尊受命之祖固當逺稽前代上憲祖宗以時釐正况今告朔時享薦新之禮既略舉矣大祫之祀獨闕而未講誠欲修嚴曠典則東鄉之尊謂冝先定夫宗廟事體至大至重有輒擅議罪當萬死然私竊懷此久矣幸遇陛下隆寬逮下不間踈賤兹敢昧冒一言倘或可採乞從睿斷舉而行之天下幸甚臣謹按太廟九室之制始於唐之明皇非本於禮也而後之為説者乃遷就其事以謂三昭三穆與太祖祖功宗德三廟不遷為九廟蔡京之議祖襲唐制漢以髙皇帝為太祖尊居東鄉後世無有異論魏以武帝為太祖晉以宣帝為太祖蓋皆以始封為據唐以景帝始封故尊為太祖其後追崇獻祖而列景帝於昭穆禮官陳京抗論辨證前後二十年卒復其舊識者是之蓋以景帝始封於唐事迹有類乎后稷要之非始封之君受命之祖不得居東鄉由三代歷漢魏以迄於唐無異道也我太祖皇帝開基雖與后稷異而創業實同乎髙帝未聞漢以太公合食於祫而居髙帝之上也今若正太祖東鄉之尊稽古沿革委合禮經臣再考商周之興太廟世逺而羣廟之主皆出其後故其禮易明漢魏而下太祖世近毁廟之主皆在太祖上於是禘祫不得如古制而漢魏之制太祖而上毁廟之主皆不合食唐以景帝始封故其後廟制既定始以獻懿而上毁廟之主藏於興聖德明之廟遇祫即廟而享焉是以别廟之祭以全太祖之尊當時剛徑如顔真卿儒宗如韓愈所議雖各有依據皆不能易陳京之説以其當理故也歷代沿革具在謂宜博采而擇取其當詔俟過防秋令侍從臺諫赴尚書省集議聞奏貴州文學丁特起特差鼎州龍陽縣尉特起初見建炎元年直寶文閣新知信州許亢宗卒淮東宣撫使韓世忠遣統領官韓彥臣等襲偽鎮淮軍獲知軍成忠郎王拱等遣親校溫濟獻於朝詔貸拱罪以本官𨽻忠鋭第五將上因言宿遷偽官本吾赤子他時邊臣如此等小吏不須賞庶免生事今世忠既有請可量與推恩庚申集英殿修撰知衢州常同充徽猷閣待制提舉江州太平觀以同引疾有請也壬戌都督行府言右中散大夫知郴州許和卿治狀有方欲從朝廷推恩令再任從之仍遷和卿一官日歷不載和卿階官今以明年八月二十八日和卿降官告詞修入癸亥上䇿正奏名進士於射殿制曰朕德菲陋紹承大統遭家多難求濟未獲是以博延豪俊咸造在廷覬聞治道之要子大夫其必盡精極慮為朕言之蓋聞在昔聖王之治天下正心誠意躬行乎上者固自有道乃措諸事業之間則或寬或猛或質或文或變通隨時不膠於迹故其成效布在方册昭昭乎其可觀也朕甚慕之越自即位九年於此矣思欲雪父兄之恥而復祖宗之烈夙夜祇懼罔敢荒寧而施為繆戾治效闕然深惟其故不憚改作間者乃下銓量之令以擇吏而真才猶未顯也嚴科斂之禁以恤民而實惠猶未孚也謹簡練之法以治兵而冗食猶未革也夫吏道未肅民力未蘇兵勢未強朕之治所以未效也顧何以輯事功弭禍亂哉而建謀之臣并欲考課以議殿最省官以節奉稍力役不足以給調度也為之平凖均輸以佐之爵賞未艾也為之定武功之等紀律未明也為之參府衛之制凡若此者其合於古便於今乎其或有不然者耶雖然此治之迹也上之欲三辰明四序順災沴不生而動植遂性下之欲風化行習俗厚姦宄不作而中外協心兹可以占天人之助矣夫何敵不克何難不濟興復大業其庶幾乎子大夫以為何修何營而可以臻此其條列而茂明之務適於用朕將有稽焉日歷所載御試䇿問乃誤取紹興二年者今從會要先是翰林學士孫近言祖宗廷試進士置初覆考詳定官蓋欲參用衆見以求實才自嘉祐間王安石充詳定官始乞不用初覆考兩處等第别自立等至今循襲為法如此則髙下升黜盡出於詳定官而初覆考殆為虛設欲望復用祖宗舊制如初覆考皆未當即具失當因依奏稟方許别置等第詔如所請於是右諫議大夫趙霈為詳定官以試卷初覆考不同者具奏御寶批送編排官殿中侍御史謝祖信定奪祖信别有升黜悉依所定已而霈言如此是使編排官得以兼詳定之職非特廢法恐自此遂為定例望依崇寧令有隔二等纍及五人各具合升降等第以聞從之近所奏在八月庚戌霈所奏在九月戊子今聨書之都督行府言以見管湖南水軍及周倫等所部置十指揮並於手背上刺橫江水軍四字從之甲子上御幄殿閲試武舉人弓馬韶州人陳裕特補進武校尉充廣東經略司指使賜紫羅衫銀束帶以本司發到武藝程試合格也起居舍人任申先兼權中書舍人尚書倉部員外郎章傑主管台州崇道觀從所請也乙丑詔右朝奉大夫主管台州崇道觀呂省山免審量許磨勘省山大臨子也初以補治三陵堤堰改京秩例當削官趙鼎以故家特有是命丙寅以平湖賊及虔州諸盜德音降湖廣江西二十一州死罪已下囚徒杖並放時潭郴鼎澧嶽復循梅惠英廣虔吉撫汀南雄州荆南府南安臨江軍皆寇所蹂踐及軍行所經歷州被賊之家驗實與免科差及拖欠積欠各二年虔州強盜並依格追納賞錢免拘籍田産其已籍田産除已出賣外如子孫見存驗實給還應民田官中見拘作營田者許請認歸業應緣捕捉防托團結海船人户實曽立功之人並量度推恩丁卯故特進申國公章惇追貶昭化軍節度副使故責授寧國軍節度副使蔡懋追貶單州團練副使各人子孫不許除在內職任用己未詔書也初議取惇卞親戚在朝者併黜之趙鼎請黜子孫而不及親戚上曰仲尼不為已甚如此行遣酌中翌日以惇孫左朝奉大夫主管台州崇道觀傑知婺州太府寺丞僅提舉江東常平茶鹽公事給事中廖剛封還敕奏言傑僅賢否固未論蓋未聞方暴其人之罪惡以正典刑而擇官以處其子孫者也婺為名郡傑以宫祠得之不謂之遷可乎監丞平出才當得通判耳僅提舉一路號稱使者非遷而何臣恐天下有以議政刑之得失號令之不常如此何足以示勸懲臣願姑依已降指揮與僅等在外合入差遣毋令太優庶解中外之惑事干國體臣不得而默乃詔二人並與在外宫觀中興聖政史臣曰理能正於人之心而治不足以達於天下者未之有也天下之亂非自為之也必有害常醜正者取三綱九法汨陳而倒行之以致於亂矣而人心之不泯者猶在也舉而明之亂可使治亦豈其自治哉理在其心者固先之矣紹聖二姦為國産亂以絶天之理其忍哉髙宗誅姦於既死其得撥亂反正之理乎淮東宣撫使韓世忠妻秦國夫人梁氏卒詔賜銀帛五百匹兩尚書駕部員外郎辛次膺移倉部己巳左宣奉大夫守尚書右僕射兼知樞密院事都督諸路軍馬張浚以平冦功遷左金紫光祿大夫浚五辭不拜庚午置潭州市易務用提領張澄請也仍令以湖湘所得舟運販淮鹽其息錢非奉朝廷及都府指揮毋得擅用是月偽齊陷光州時劉麟出獵於陳留縣有義黨百餘人欲擒麟南歸為其徒所告悉斬於汴京豫又以其弟復知濟南府觀知淮寧軍
