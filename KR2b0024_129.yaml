body:
  text: 建炎以來繫年要録卷一百二十九宋李心傳撰紹興九年六月己酉朔簽書樞密院事樓照與東京留守王倫同檢視修內司趨入大慶殿過齋明殿轉而東入左銀臺門屏去從者入內東門過會通門由垂拱殿後稍南至玉虛殿乃徽宗奉老子之所殿後有景命殿復出至福寧殿即至尊寢所簡質不華上有白華石廣一席地祖宗時每旦北面拜殿下遇雨則南面拜石上稍北至坤寧殿屏畫墨竹蘆鴈之屬然無全本矣他殿畫皆類此自福寧至欽先孝思二殿欽先奉諸帝孝思奉諸后帳座供具猶在出肅雍門至玉春堂規模宏壯非他位比劉豫嘗對偽臣於此左竹徑之上有迎曦軒對軒有月屏始至修內司謂元是寶繪堂復由延春閣下稍東即今太母之舊閣過小門曰錦莊無文飾入睿思殿門登殿左曰玉鑾右曰清微後曰宣和殿庭下皆修竹自此列石為山分左右斜廊為復道平臺臺上過玉華殿殿後有軒曰稽古西廡下曰尚書內省西出後苑至太清樓下壁間有御書千文登瑶津亭亭在水間四面樓閣相對遂趨出拱辰門時京城外不復有民舍自保康門至太學道才數家太學廊廡皆敗屋中惟敦化堂榜尚在軍人雜處其上而牧彘於堂下惟國子監以養士略如學舍都亭驛棟牌猶是偽齊年號瓊林苑敵嘗以為營至今作小城圍之金明池斷棟頺壁望之蕭然也庚戌皇后邢氏崩於五國城年三十四辛亥西京留守孟庾辭行命坐賜茶陕西宣諭使周聿乞以赦書所免苖稅分為十年均減朝論以已行難追改乃命樓照相度陕西合用錢關子茶鹽利害及見收酒稅錢措置贍軍仍選可為漕臣者以聞時新疆皆復三年租州縣無所入故聿請之湖北京西宣撫使嶽飛言已復河南故地其兩路並是腹心州縣所有知通已下官屬今後欲望朝廷差注奏可仍賜詔奬諭武經大夫濰州團練使知亳州王彥先為福建路馬步軍副總管乙卯上謂秦檜曰山陵事務從儉約金玉之物斷不以一毫置其中前世厚葬之害可以鑒矣檜曰此非陛下博覽古今灼見利害之實孰敢輕議聖諭所及足為後世法尚書金部員外郎陶愷為司農少卿丙辰帶御器械鄭藻為隴州防禦使用祔廟推恩也先是上因邢孝揚除命諭大臣曰朕忽思顯肅皇后家未曾推恩今先及孝揚恐失先後之序三省檢會顯肅訃聞日已推恩上曰今與藻落階官足矣故保義郎盛修已特贈武翼郎閣門宣贊舍人令宿州封表其墓以樓照言修已建炎間死節也事見建炎三年十月宗正少卿三京宣諭方庭實言將仕郎趙汧性剛直曉吏事登封縣令雙虔為縣豈弟頴昌府進士范墀風度夷粹論事慷慨流離顛沛志不忘君欲望量才任使詔西京留守司津遣赴行在墀鎮元孫也汧新調鄭縣簿虔以白身攝令故庭實薦之是日簽書樞密院事樓照至永安軍先謁昭厚二陵及會聖宫昭陵因平岡種柏成道道旁不垣而周以枳橘四靣闕角所存者半神門內石羊馬駝象之類皆在神臺三層髙二丈俱植柏最下約廣十五丈為水道者五大門外石人對立其號下宫者乃酌獻之地今無屋而遺基歷歷可見餘陵規模皆如此諸陵前控洛水左少室右嵩髙山川佳氣不改而室屋皆為偽守竇玠所毁宫墻內草深不見遺址舊分水南水北今水北有二千户水南墟矣丁巳新除寶文閣直學士陕西都轉運使仇悆先次落職令聼旨悆上疏辭行有曰孤危之迹恐無還期儻使得罪於臨時莫若自明於先事既奪職悆又固辭上曰悆為侍從乃避事辭難遂責少府少監分司西京全州居住悆責官在是月癸酉戊午詔新復州軍同知州並改為通判用金人所命承奉郎同知順州陳楚請也楚申明狀云天眷元年十二月十二日凖偽敕改承奉郎就差同知順州天眷元年即紹興八年時劉豫已廢蓋金人所命也己未執政進呈殿中侍御史周葵論國用軍政士風三事上曰國用當藏之於民但百姓給足國用非所患辛酉權吏部侍郎謝祖信充徽猷閣待制知潭州祖信既歷論趙鼎落莭於是章氏諸孫咸集闕下再謀理訴并及史事上偶知之謂執政曰聞章惇家有人欲陳訴以趙鼎去便謂事有變更此事乃出朕意趙鼎何預聞有從官為之主議者執政奏謝祖信章氏子壻也上曰亦知之遂命出守此據趙鼎事實時武岡洞首陽三天叛勢搖荆湖祖信謀於副總管馬擴擴薦武臣張球可用祖信奏球知武岡軍遂擒三天破其巢穴中興聖政宰臣秦檜乞以上所賜御書真草孝經刻之金石以傳示後世上曰十八章世人以為童蒙之書不知聖人精微之學不出乎此也朕宫中無事因學草聖遂以賜卿豈足傳後檜請再三乃從之臣留正等曰人君萬幾之暇寓意翰墨若宋武帝唐太宗者蓋已鮮矣至於留神經典親灑宸翰遊息於先王之道者未有聞焉太上皇帝奎畫之妙敻絶前古五經語孟之籍既已筆而刋諸石三年大比又取六經修身治心之要學别書以寵多士至於左氏春秋傳司馬遷史與趙充國羊祐等傳分頒臣下若孝經之賜者不可概舉一札一畫豈徒在於翰墨之間哉蓋將以道德忠孝化成天下而追帝王之極治者也聖子神孫仰法乎此則近習佞幸雖欲殖貨財盛鷹馬乘間暇以畋獵聲色蠱惑聖志如仇士良者安所施其智巧哉壬戌詔大金割還河南故地信義甚著尚慮新復官吏妄分彼我懷不自安令學士院降詔開諭觀文殿學士左正議大夫新知宣州汪伯彥為檢校少傅保信軍節度使初伯彥將至國門上謂秦檜曰伯彥相見便令之官庶免紛紛且曰伯彥潛藩舊僚去國十年漢髙光未忘豐沛南陽故舊皆人情之常既至入見命坐甚寵伯彥上所著中興日歷五卷後三日遂有是命又詔伯彥元帥府舊臣特依見任執政給俸於是給事中劉一止曰節度使俸借減尚不薄况郡有供給圭田之厚以郡守而依執政殆與異時非待制而視待制非兩府而視兩府者類矣乃詔罷之伯彥留旬日燕見者三錫賚無虛日加賜寶鞍名馬笏帶茶藥等甚厚左奉議郎王慥知拱州慥通判南平軍剛正不茍合勾濤為給事中薦於上得召對秦檜惡之故有是除甲子寶文閣學士提舉江州太平觀胡交修試兵部尚書兼翰林學士中興後學士三入者自此始丙寅秦檜奏選人鮮于參乃王庶所薦人材似可取乞令上殿臣被位宰司人材茍有可用不敢輒分黨與上曰朕豈能盡知天下人材但付之宰相宰相賢則賢人皆聚於朝矣參既對遂命改京官參改官在七月甲午詔直徽猷閣史願賜同進士出身殿中侍御史周葵論福建轉運判官黃積厚江東提舉茶鹽公事方滋直祕閣新知處州詹至右朝散大夫新知台州吳説直顯謨閣新知常州耿自求之罪並罷之丁卯詔崇國公瑗讀孟子終篇翊善已下並進一官故承節郎詹慓特贈修武郎閣門祇候用御史中丞廖剛奏也時責授昭信軍節度副使徐秉哲已死剛言近年賞罰間有未當於人心者如慓親獲苗傅厥功可謂大矣反得罪以死遂破其家秉哲大索宗室係纍以獻於金人厥罪可謂大矣乃得死於牖下謂當録慓子孫籍秉哲家奪其子孫官以快天下之憤詔秉哲别作行遣餘從之秦檜之官州縣也吳幵為翰林學士薦諸朝召為太學正由是擢用檜甚德之故李誼廖剛連擊徐秉哲莫儔而幵無一言纍及己巳光山軍節度使開府儀同三司判大宗正事士㒟兵部侍郎張燾自西京朝陵還入見燾奏疏言靖康之禍上及山陵瞻望柏城至於慟哭雖誅討殄滅之未足以雪此恥而復此讐也恭惟陛下聖孝天立豈勝痛憤之情顧以梓宫兩宫之故方且與和未可遽言兵也然祖宗在天之靈震怒既久豈容但已異時躬行天討得無望於陛下乎矧自古戡定禍亂非武不可伏望益修武備夙興夜寐念兹在兹以俟釁隙起而應之電掃風驅雲徹席卷盡俘醜類告功諸陵使天下誦之萬世美之如是然後盡天子之孝而為人子孫之責塞矣上問諸陵寢如何燾不對唯言萬世不可忘此仇上默然何俌龜鑑痛哉張燾之謁陵寢也上問如何燾不對唯言萬世不可忘此仇石澗水至之祥父老驚歎而西京遺民夾道歡迎皆言久隔王化不圖今日復得為宋民者乘此機也撫定遺民泛掃舊物修車備器以侈宣王東都之會庶幾可也夫何敵去而舞上恬下愈惟曰韓肖胄等充報謝使而已秦檜加少保加國公而已大赦天下誇示竒功而長安咫尺王曰遄歸故老含泣而望絶黃河嗚咽以流悲檜之肉其可食乎此紹興八年九年之間虛老嵗月坐失機會此秦檜主和之議沮之也燾因請永固陵不用金玉珍寶聚而藏之固已動人耳目又其為物自當流布於世豈容終瘞伏於地下雖千萬年理必發露無足怪者上覽疏謂秦檜曰前世厚葬之禍如循一軌朕斷不用金玉庶先帝神靈有萬世之安燾又言頃劉豫初廢人情􅍅􅍅而我斥堠不明坐失機會今又聞敵於淮陽作筏及造繩索甚多不知安用此事我豈容不知諸將以朝廷嘗有不得遣間探指揮各務省事遂不復遣敵人姦猾廣置耳目我之動息彼無不知敵之情狀我則漠然不聞臣切惑之臣又見黃河船盡拘北岸悉為敵用往來自若比無一人敢北渡者豈有是理哉願飭戒邉吏謹封疆嚴守禦廣耳目明斥堠先事而預防之庶無後悔又言酈瓊部伍皆西陲徑兵今在河南尚可收用新疆賦租已蠲而使命絡繹推恩支費猶用兵興時例願加裁損非甚不得已勿遣使以寬民力又論陕西諸帥皆不相下動輒喧爭請置一大帥使之節制庶首尾相應緩急可恃燾所言皆切中時務而秦檜方主議和惟恐少忤敵意故事皆不行其所施行者薄葬之議與簡省使命以蘇新復州縣及裁損諸使官吏給賞而已三章並是月辛未施行今併書之是日保平靜難軍節度使開府儀同三司四川宣撫使吳玠薨於仙人關治所年四十七訃聞詔輟朝二日贈少師賻帛千匹玠御下嚴而有恩故士樂為之死其後制置使胡世將問玠所以勝于其弟右護軍都統制璘璘曰敵令酷而下必死每戰非纍日不決然其弓矢不若中國之徑利吾嘗以長技洞重甲於數百步外又據其形便爭出鋭卒與之為無窮以沮其堅忍之勢至於決機兩陳之間則璘有不能言然玠晚莭嗜色多蓄子女餌金石以故得咯血疾而死後諡武安初富平既失律蜀口屢危金人必欲以全取勝獨賴玠以為固由是蜀人至今思之玠淳熙中追封涪王辛未簽書樞密院事大金報謝使韓肖胄自金國還至東京肖胄初入北境迓者謂當稱謝恩使肖胄以使名勑授不敢輒易論難三四金人卒不能奪壬申宗正少卿方庭實宣諭三京還庭實請於河陽延津胙城興仁徐州淮陽等處與北人計議各置𣙜場以通有無仍禁止南北人不得擅越𣙜場以止姦盜詔東京留守司措置未及行庭實又言劉豫深文密網濫及無辜忠臣義士多被殺戮或因貶竄流落失所望委新復路分提刑多方採訪并取索罪案看詳其忠烈顯著之人具名取旨褒録應犯罪未經除雪之人特與改正以慰中原人心庭實又言大金割還河南舊地以通和好兩國生靈遂獲休息恩德甚厚陛下明守信義堅如金石臣不復有言竊恐沿邉州縣未能上體德意或招納叛亡或渡河侵擾初緣細故寖搖大事伏望明詔官吏兵民各守封疆務相輯睦疏奏悉從之據此疏與熊克所云使還奏邉事不合指全不同是日簽書樞密院事樓照至長安留十餘日初夏國主乾順所遣鄜延岐雍經略安撫使李世輔欲從乾順借兵伐延安以復仇因説乾順發兵可以取陜西五路乾順信之時有酋豪號青面夜義者恃衆擾邉乃屬世輔先圖之世輔請精兵三千晝夜疾馳掩至其地擒之以歸乾順大悅將妻以女世輔辭以父喪乾順即益以兵衆命招撫使王樞隨之鼓行而東至延安延安城守世輔曰吾之此來止求告捕害吾親者延安之人何憾焉已而兵馬都監薛昭縋城見世輔曰始告捕者蘇常栁仲二人耳俄有捕其人以獻者世輔詰之遽服因剖心以祭時金國已還河南地昭出本朝赦書以示世輔世輔未之信有耿煥者多識與世輔有舊為言真詔也世輔即率所部南望拜赦因遂説夏人南歸夏人多懷土獨與願從者二千人來而王樞者反説世輔還夏世輔遂擒樞才入境即望闕遙拜言本國主喜甚再三感聖恩將遣使入貢照聞之因與宣諭使周聿皆以書招世輔歸朝且命行府凖備差遣王晞韓護樞赴行在此以李顯忠行述熊克小歷費士戣蜀口用兵録參修但克稱世輔家屬悉為偽鄜延帥臺宗雋所害按此時延帥乃關師古非宗雋也或是師古入朝而宗雋暫權亦未可知今姑闕之顯忠行述全文云公鄉里鄰於夏境夏人服其家世久矣公至夏主甚喜遣翰林學士楊其姓者郊勞禮意良厚楊推誠公亦無隱自兹無彼我之見楊因暇日語及金人自得志於中原恃其強盛每見侵陵亦有并吞之意知公雄傑故深相結納將倚為用有間者從延安來報自公之西金人五路兵分捕公之家屬一百口無少長悉遇害公抱終天之痛每念之切齒裂肝恨不即死以復仇大雪公中夜自挈壺酒過楊舍延之卧內相與對酌因訴父兄遇害甚慘泣數行下屬楊借兵將以復仇楊惻然翌日為公請夏主曰彼能為吾立功固不靳借兵時有酋豪號青面夜義者有射騎數萬恃勇磔人要索無厭擾邉十餘年矣夏主患之顧國中無能制之者是以屬公公欣然自任問須兵幾何公曰當以計取得精鋭數百足矣夏主曰此未易輕圖與騎三千公命褁糧捲甲畫夜疾驅既逼其境遇行者則俘以自隨掩至其穴乃伏騎于旁岡阜間譟其三面倉卒惶駭夜義者金冠鐵面似夜義鬼物故號夜義少選夜義持大刀跨馬名赤駝指呼布陳公謂之曰汝徒恃犬羊衆實不勇能與我挑戰乎夜義問公為誰公曰因汝不臣其主汝主有請大國命我伐汝無多言速出戰夜義怒揮刃躍馬而前公豫戒兵騎俟我與之交馳從傍過之及鋒未接一騎出焉夜義顧視間公伺隙投鎗徒手捽其背夜義身偃公挾以歸其徒窘蹙散遁伏騎乘之餘衆悉降獻俘之日夏主大悅將妻以女公辭以父喪即日出兵十萬授公乃鼓行而東先是金人既族其家度公必為復讐之舉兼自丙午嵗用兵至是幾及一紀彼既厭兵且為王師敗於兩淮思欲息肩割三京講和公知之在夏未嘗一日忘東向也公軍所至無不望風迎降獨延安閉門拒守公謂之曰吾之此來止求告捕害吾親者若得其人吾於延安之人何憾焉已而監軍薛昭者縋城見公云始告捕者蘇常栁仲二人耳俄有捕其人以獻者公詰之遽服因剖心以祭時金人既還侵地國家肆赦安集薛因出詔示公公未悉真偽有耿煥者多識與公有舊為公言真詔也公即率所部南望拜赦郡人安堵公流離僑寄於三國間十有餘年備歷巇險還朝之志萬折不回顧勢未可姑待效見歸報朝廷及三京既還無所用力因説夏人俱南夏人往往懷土公度不可強但取願從者得二千餘人公鄜延舊部曲數萬衆皆願隨公蓋公在長安被詔止許量帶軍馬前來赴闕又於內揀選三千人時夏國招撫使王樞見公説夏人歸南反説公歸夏公大怒隨與王樞同時領衆歸朝行狀所云蓋多緣飾今參取諸書而折𠂻之趙甡之遺史云初李世輔奔夏國乃説夏國發兵可以取陕西五路夏國主信之發兵五萬别差都統與世輔共總兵政以宰相王樞監其軍長驅至延安府三十里下寨世輔以二千騎至城下問延安府守者姓名曰趙惟清世輔曰金人不道殺戮我滿家良賤今提夏國精兵為亡者雪冤呼惟清開門惟清曰太尉自與金人為仇讐何與於大宋而欲攻大宋之州府世輔問延安府今為誰守惟清曰大金已割河南三京地界還之大宋已行赦書到府官吏軍民拜恩畢今為大宋守也世輔驚請罪遂求手詔惟清以真本示世輔世輔曰然則世輔以左右數十人入議事惟清從之門啓世輔入城見市井間百姓歡笑之聲乃知割地事審約以單騎回軍中併殺夏國頭領南歸朝廷即復以心腹數十人回軍中聲言生執到延安府官屬是夜王樞具飲于帳中夏國都統與世輔皆在坐夏國軍馬悉全裝被甲列寨下酒三行世輔命執到延安府官屬入於是世輔腹心人偽擁數人至帳下世輔即起掣刀一手執王樞一手殺夏國都統帳下大喧諸軍皆不知其因聞風而潰墮坑填谷死者莫知其數天曉世輔招諭得馬二萬餘匹遂往延安謀欲歸朝廷或謂世輔曰太尉威聲著於大金與夏國矣於大宋則未有大功當今之計莫若就馬聚兵長驅直渡河乘勢取河北河東獻於朝廷則歸之為有名矣世輔心猶豫聞樓照宣諭陕西將及近境有勸世輔見照陳敘歸朝之意者或者曰不可大丈夫不就功名則已如欲就功名則一見樓照宣諭雖欲渡河不可得已亦會照以書與世輔遂見照照具揚天子德意勉世輔速歸朝廷世輔遂與王樞偕行留馬在陕西後欲起綱至行在而金人敗盟皆為金人所有按甡之所云失於太誇嘗以諸書互考之顯忠説夏國之詞當以甡之所云為正若行狀第以為借兵復仇則蕞爾小國空引弦之衆以資降將之私必無此理固不可信也費士戣用兵録稱王樞止是夏人遣來關中訪尋金人所掠生口而甡之以為顯忠監軍以事考之必是樞與顯忠偕來蓋西人尚疑顯忠固宜以其臣監之也但非宰相耳行狀稱出兵十萬遺史稱發兵五萬按夏國褊小而顯忠之行倉卒恐不能發兵如此之多今但云益以兵衆庶不抵牾癸酉澧州軍事推官韓紃除名勒停送循州編管坐傾險懷姦動搖國計也時紃上書論議和非計故竄之此以紹興正論增修新除京畿都轉運使李逮入見固辭新命上批限三日起發且諭逮以速行不然必重作行遣雖與朕有潛藩之舊不得而私也逮皇恐就道乙亥同簽書樞密院事王倫自京城赴金國議事初右副元帥瀋王宗弼既還祁州密言於金主亶曰河南之地本逹蘭宗磐主謀割與南宋二人必隂結彼國今使已至汴京未可令過界倫有雲中舊吏𨽻宗弼帳下密來謁倫告以宗弼謀誅逹蘭倫具言於朝乞早為之備而秦檜但奏趣倫過界會西京留守孟庾至京師倫始解留鑰將使指北行時宗磐等謀為變遂命中山府拘倫且會本路簽軍以復取河南為名將作亂初南平王李乾德既卒其庶子智之奔大理更姓趙號平王聞其兄陽煥死與天祚爭國大理以兵三千助之諜報智之欲入貢廣西帥臣奏其事詔婉順約回毋得招納生事范成大桂海虞衡志李陽煥死乾德有遺腹子屬之占城占城奉而立之或云有黎年者乾德妻黨也嘗子于李氏與遺腹子爭殺之與日歷所書不同或成大誤以大理為占城也餘見紹興七年九月乙酉并注丙子兵部侍郎兼史館修撰張燾兼權吏部尚書丁丑御史中丞廖剛奏殿前司強刺百姓充軍且言幸此講和上下且得休息惟此一事甚為民害詔諸軍嚴行約束初撫州兵馬鈐轄伍俊既殺山賊雷進以降遷延不之官而貪暴為閭里患且據舊地將復叛澧辰沅靖有通其謀者詔湖北諸司圖之提點刑獄公事万俟卨嘗檄俊詣司俊疑不往卨語安撫使薛弼曰俊不除將生肘腋之變可辟置麾下徐制之可也於是弼許俊不遣委三州令自擇俊語其徒曰我得州據以叛勝桃源逺矣戊寅趨府謝以卒二百自隨弼執諸座詰反狀誅之因收其積粟以贍軍始卨意弼自有其功而弼奏謂與卨共謀卨以此故德之臨安府秀州旱初文林郎李哲既陷偽齊終不肯仕劉麟聞其賢命張中孚以禮招致哲力拒之是月卒於原州後贈哲奉議郎官其家一人九月癸未贈官夏國主乾順薨是夏金以李鄴為翰林學士承旨行臺户部尚書馮長寧為東京户部使自大名至其東京凡五千里命下日各易服赴任熊克小歷載此事於去年冬今增入在此是時金人置司河間真定平陽太原顯州春州曰錢帛燕京曰三司大同曰轉運中京曰度支上京曰鹽鐡東京曰户部皆掌漕計之職金主亶命司馬朴試舉人於燕京得中山石琚為首范成大攬要録云是年出君子能盡人之情金人科舉之制先於諸州分縣赴試縣令為考官號鄉試惟雜犯者黜榜首曰鄉元次年春分三路類試自河以北至女真皆就燕關西河及河東就雲中河以南就汴皆取旨選官知舉號府試凡二人取一榜首曰府元至秋盡集諸路舉人於燕號會試几六人取一榜首曰狀元分三甲上甲皆賜緋雖下甲率十三年而轉奉直大夫所試分詞賦經義二科仍兼律義親戚不回避有私者決沙袋其官又有明經明法童子等科然不擢用止於簿尉後復置御試於上京士人苦之多不往則就燕徑官之御試之制遂絶此據洪皓松漠紀聞附見又與張棣所紀差不同今略刪潤建炎三年秋末紹興二十三年春末所書可參考建炎以來繫年要録卷一百二十九建炎以來繫年要録卷一百二十九金人地名考證達賚原書作達懶誤改見卷一
