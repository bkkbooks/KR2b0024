body:
  text: 建炎以來繫年要録巻一百九十三宋李心傳撰紹興三十有一年冬十月庚子朔詔曰朕履運中㣲遭家多難八陵廢祀可勝坏土之悲二帝䝉塵莫贖終天之痛皇族尚淪於沙漠神京猶陷於草萊銜恨何窮待時而動未免屈身而事小庶期通好以弭兵属强敵之無厭曽信盟之弗顧怙其簒奪之惡濟以貪殘之凶流毒徧於江淮視民幾於草芥赤地千里謂暴虐為無傷蒼天九重以髙明為可侮輙因賀使公肆嫚言指求將相之臣坐索漢淮之壤皆朕威不足以震疊德不足以綏懷負爾萬邦于兹三紀撫心自悼流涕無從方將躬縞素以啟行率貔貅而薄伐取細栁勞軍之制考澶淵郤敵之規詔㫖未頒歡聲四起歲星臨於吳分冀成淝水之勳鬬士倍於晉師當决韓原之勝尚頼股肱爪牙之士文武大小之臣戮力一心捐軀報國共雪侵凌之耻各肩恢復之圖播告邇遐明知朕意遺史曰詔未降一月之前市人皆能誦其詔文詔既降始則乆已製成但未降聞不當漏于外耳又先期降付吳璘軍中有㫖未得頒行璘具奏乞頒行俄已降出頒行矣少保奉國軍節度使四川宣撫使吳璘檄告契丹西夏髙麗渤海塔坦諸國及我河北河東陜西京東河南等路官吏軍民等曰盖聞惟天無親作不善者神弗赦得道多助仗大義者衆必歸敢據一切之誠用諗萬方之聼我國家功髙上古澤潤中區列聖重光方啟中興之運斯民不幸適丁板蕩之災惟兹女真之邦首覆契丹之祀怙其新造間我不虞妖氛既陷於神都虐焰殆彌於宇縣兩宫北狩訖罹邉境之煙塵大駕南廵未正漢京之日月凡居率土誼不戴天主上紹開中興宏濟大業望山河而隕涕瞻陵廟以傷心盖卧薪嘗膽之是圖寜拯溺捄焚之敢緩然人命至重佳兵不祥靡辭屈己以事讎姑欲安民而和衆豈彼㝠頑之主狃於簒逆之資以至不仁行大無道敺我中原之老稚翦為異域之囚俘乃輕棄於穴巢輙坐張於畿甸自謂富彊之莫敵公然反覆以見欺指揮而取將相之臣談笑以求淮漢之地九州四海聞之怒髪以衝冠百將三軍誰不搴旗而抵掌幕府濫膺齊鉞盡獲戎旃冀慿宗社之威靈一洗乗輿之耻辱待時而動歴歲于兹天鑒此忱使委身而致死人自為戰不與敵以俱生帝尊一臨士氣百倍劉制置悉南徐之甲成馬軍興侍衛之師李四廂虎視於青徐王太尉鷹揚於潁夀鄂師擣殽函之險歩軍充伊洛之郊前無堅鋒勇有餘憤以此制敵何敵不摧以此攻城何城不克惟彼諸蕃之大國乆為鉅宋之歡鄰玉帛交馳尚憶百年之信誓封疆逈隔頓踈兩地之音郵願敦繼好之規共作侮亡之舉至於晉秦竒士齊趙雋材抱節義之良謨志功名之嘉㑹為劉氏左袒飽聞思漢之忠徯湯后東征必慰戴商之望抗旌雲合投袂風從或據郡以迎降或聚徒而特起乗吾破竹之勢立爾剪茅之勲侯王寜有種乎人皆可致富貴是所欲也時不再來更期父老之誨言深念祖宗之徳化勿忘舊土重建丕基檄到如章書不盡意檄樞宻院所降本也江淮制置使劉錡至盱眙軍㑹將議事是日浙西副總管李寳以舟師至東海縣先是魏勝既得海州乆之官軍不至城中之人始知為其所紿然業已背金不敢有貳心勝懼乃推寳之子承節郎公佐領州事自出募兵得數千人徃攻沂州有女真萬户之妻王夫人者陽引兵避之勝入城遇伏與戰大敗僅以身免勝復還海州金兵圍之寳聞麾兵登岸以劒畫地曰此敵界非復吾境當力戰因握槊前行接敵奮擊士無不一當十金驚出意外亟引去於是勝出城迎寳寳維舟犒士遣辯者四出招納降附時山東豪傑開趙明椿劉异李機李仔鄭雲等各以義旗聚衆趙與耿京所部馬軍將王世隆合共攻城陽軍城陽軍者宻州之莒縣陷偽改焉趙等聞寳來遣使詣軍前納欵寳以為修武郎㑹金人自沂州遣五百騎至城陽軍解圍趙等散去世隆以其軍屯日照縣境寳舟至膠西縣遣提舉一行事務曹陽佯借民馬與小吏徐堅徃迎之世隆以其衆降後數日開趙亦至寳以世隆趙並為山後都統制以待官軍進攻且為聲援辛丑言者請降空名度牒官告下江浙福建市軍儲每州給度牒十道及右廸功郎告一道其有山險非沿流不出米州軍即易輕賫以進從之武功大夫康州刺史隨州兵馬鈐轄邢舜舉權知郢州用成閔薦也右朝奉郎通判楚州徐宗偃送吏部差監無為軍在城税務右司諫梁仲敏劾宗偃妄稱制置司之命令本州清野故有是命崇信軍節度使開府儀同三司領殿前都指揮使職事趙宻乞依楊存中例奏男賡姪孫厚並於文資内安排許之給事中金安節等言右選所載使相䕃補格法無補文資者不應用例棄法况存中紹興十年初陳乞狀稱主兵在外而宻今以殿職在内一不同也存中奏子而宻奏姪孫二不同也存中二十八年郊恩日已任少師在法合奏文資宻今任使相當隨本色䕃補三不同也國家待遇人才文武一道初無輕重於其間但祖宗百世不刋之書凡為人臣者當共遵守又契勘宻今次䕃補二人並乞文資安排其奏補男賡亦未合條法若許依楊存中例已為優異之恩所奏姪孫難以引用欲望聖慈裁酌施行仍乞自今後文武官奏薦並依法不得引例庶幾人各安分不廢成憲是日金人自渦口繫橋渡淮先是池州都統制李顯忠提兵在夀春安豐之間欲囬軍廬州徐觀其變至謝歩諜報敵自正陽渡淮矣正陽属安豐軍参議官劉光輔曰若欲尋戰功豈可退却宜據形勢之地結壘以待之見利則進策之上也顯忠從之得低山深林可以設伏顯忠率腹心百餘騎轉山取路敵直掩顯忠之背顯忠覺之率諸將邀截獲數人俄聞敵大至遂自峡山路渡大江以歸顯忠軍中有中侍大夫至小使臣官告付身僅二千道是役也書填悉盡中侍大夫王光輔及統制官孔福等受之壬寅泗州土豪孫鑑王􅛁忠順人李永葛松並補承信郎付旴眙軍使喚初湖北京西制置使成閔以馬司之軍赴武昌上命所過郡縣以經總制錢常平義倉米濟其軍食至宣諭使汪澈言總制錢每月解發通判廰諸縣多是催人户折帛錢及以等第髙下敷借應副乞令逐州通判以五年一州統取經總制之數撥下大軍經由縣分通融支遣及豁還民户從之癸夘少保四川宣撫使吳璘兼陜西河東招討使太尉江淮浙西制置使劉錡兼京東河北東路招討使起復寜逺軍節度使主管侍衛馬軍司公事湖北京西制置使成閔兼京西河北西路招討使詔以軍興應頑民持刃為刼盗者並處死有不獲者遣兵收捕雖遇大霈永不招安用議者請也武翼郎閤門宣賛舎人夏俊知泗州武翼郎統制忠義軍馬魏勝知海州朝廷聞敵圍海州勝與權州事李公佐共擊却之翌日以勝為閤門通賛舍人而公佐為閤門祗候詔今次大禮合加恩臣寮權不鎻院宣麻止降制給告事定日如舊太府少卿總領四川財賦王之望申凖尚書省劄子坐湖廣總領所申乞將吳拱帯行官兵錢糧草料依循贑夔州體例責令舊應副官司發赴襄陽府交納縁上件官兵朝廷已令限一季招填本所自無此一項闕額衣糧欲乞免行科發户部勘當不從是日金主亮至安豐軍又破蔣州甲辰吳璘奏刼金人橋頭寨獲㨗上謂宰執曰朕與金國講好二十年未嘗有纎毫之隙不意使人王全口陳邀我將相大臣又欲得漢東淮南之地一時臣下誰不勸朕用兵朕謂和好未解則兵釁不可開姑發信使以審其事至淮不納既歸又求遣使反覆詭詐多求釁端意在敗盟重兵壓境託名打圍謀為深入朕不免屯兵嚴備戒敕諸將務為持重以觀其變而犯蜀無名果為戎首之事曲直寜不判然散闗小㨗豈非信順之助而况簒弑君親誅戮殘忍天地所不盖載禽獸所不肯為神怒人怨滅亡無曰今三道出師置帥招討審彼已量虛實撫定我城邑招集我人民收復我寢廟毋焚燒毋虜掠毋殺傷以圖萬全之舉髙爵醲賞朕所不吝卿等賛朕成算協以衆謀庶幾恢復神州以復兩朝之耻陳康伯曰臣等雖不習武敢不奉以周旋秘閣修撰淮南等路制置使司參議官陳桷直敷文閣荆湖北路轉運副使李稙並兼逐路招討司隨軍轉運副使應辦劉錡成閔軍錢糧左武大夫興州駐劄御前中軍統制吳掖知成州乙巳劉錡自盱眙軍引兵次淮隂縣留中軍統制劉汜左軍統制員琦守盱眙時金人將自清河口放船入淮錡列諸軍于運河岸以扼之數十里不斷望之如錦綉丙午宰執言諸處屯戍將兵暴露日乆欲再行犒設一次詔所在總領所一面取撥給散於内帑給還是日劉錡遣淮隂鄉導卞彬以輕舟載二百人伺敵動息回報敵舟師甚衆錡不信厲聲叱之丁末金人以鐵騎列于淮之北望之如銀左朝奉大夫宋似孫為軍器少監直秘閣利州路轉運判官計有功移知嘉州右文林郎曹伯逹特改右宣議郎伯逹初權虹縣簿焚金詔不拜事見十年五月上命改京秩秦檜抑之不行至是自陳而有是命是日金人立其東京留守葛王襃為皇帝襃太祖旻孫晉王宗輔子初見紹興九年三月淳熙元年更名雍改元大定初金主亮刷國中女真五國渤海契丹漢兒軍自備衣甲鞍馬南冦衆謀曰皇帝失道逺犯南朝未知勝負難以歸國我等豈能作失家之鬼乎不若就近徃東京與渤海酋豪册立留守葛王為主何如僉言亦是太祖之孫有何不可於是入府求見大王襃纔出則庭下悉呼萬歲遂即位改元大赦熊克小歴載襃立在十月庚子朔注云或言立襃在六月今從宋翌所記金亮本末按苖耀神麓記立襃在十月八日丁未與赦書月日同今從之金人赦書門下朕惟前君乃太祖皇帝之長孫受文烈遺命嗣膺神器十有五年内撫外寜近安逺至雖晚年刑戮過甚而罪不及民前岐國王亮位叨宰相不思盡忠以救敢行簒弑自僣竊以來昏虐兹甚是用列其無道昭示多方一前來皇叔元帥曹國王自先朝以親賢當任止因簒位之初自懐恐懼無故殺害一前來太宗受太祖遺命不忘至公傳位前軍諸子並當職任止因簒位之初自懐疑懼將太宗親子八人子嗣等七十餘口並以無罪盡行殺戮一開國功臣晉王孫領行省楚國王愛新止因簒位之初自懐疑懼將愛新并凡子嗣三十餘口及駙馬丞相翁古察并宗室海州刺史等五十餘口並以無罪盡行殺戮一左副元帥國王薩哈累建功勲因篡位之初自懐疑懼計備遥設以白礬書假言宫外拾得令其誣告并其子御史大夫沙津及太祖親弟遼越國王男平章博濟弟兄子嗣一百餘口兵部尚書摩哩弟兄子嗣二十餘口太皇太妃并子任王威赫並以無罪盡行殺戮一前來太祖長女公主係曹國王親姊因簒位之初無故殺害一開國功臣皇叔太師梁王長子韓王臨民清正忌其聲譽令其家人誣告勘問不成故意殺害一應係開國功臣太祖太宗時已經封贈王爵無故並行追奪一㑹寜府係太祖興王之所所建宫殿無故拆毁一中都大内營造累年殫竭財力不可勝訃民力未定仍拆毁南京大内再行修盖並皆窮奢極侈土木之功前所未有一因伊小兒病却將乳母並二醫人等盡行誅戮一宋國講和之後臣禮不闕頓違信誓欲行併吞動衆興兵逺近嗟怨醫人祈翰副陳諫不可更不循省便行誅戮并舊有軍器盡行燒毁却令改造遂致公私困竭生靈飛走無不凋弊一昨來皇叔曹國王被殺之後嬸母國妃納在宮中及親族姊妹姪并應命婦有容色者恣行烝滛一亡遼豫王子嗣三十餘口天水郡王子嗣一百餘口並以無罪横遭殺戮一嫡母太后曽言不可南征之事手自殘殺其大逆無道古今未聞一徳宗嫡孫節使母妻子弟并太師梁王兒孫婦曹國王次夫人并子及韓國夫人并兒婦孫等並以無罪盡行誅戮一樞宻使北京西京留守等因北征回並加誅族宰執亦被鞭撻其餘過惡不可備舉前録數條稔於聞見遂致天怒人憤衆叛親離朕方留守東京遵飬時晦四方豪傑將士吏民咸懷怨苦無所控告自逺而至者數十萬衆日來赴愬再三敦請不謀同辭或以太祖皇帝聰明神聖應期撫運皇孫繼嗣止予一人歴數有歸不期而㑹朕推誠固讓至于再三請者益堅辭不得已恭念太祖創業之艱難祖宗社稷深懼乏祀俯循群情勉登大寳臨御之始如履春氷宜推肆眚之恩以布惟新之令可大赦天下改正隆六年為大定元年十月八日昧爽以前除殺祖父母父母不赦外罪無輕重已結正未結正已發覺未發覺咸赦除之内外大小職官並與覃恩仍委尚書省條奏施行於戯以寛而衆可御敢希堯帝之仁代虐而民允懐庶及湯王之徳尚頼文武勵翼忠良賛㐮咸告嘉猷永臻至治咨爾兆庶體子至懐襃時三十七張棣正隆事迹云襃乙巳年三月一日寅時生小字呼喇美戊申上謂大臣曰朕曩於内帑儲錢備邉士大夫不諭朕意甚者至指為瓊林大盈之比顧朕雖積此亦何嘗妄費一錢向撥百萬緡付公府而近日遣軍及諸處犒賜皆於是乎出豈不正資今日之用况方用兵國賦亦湏得人經理士大夫耻言利多事之時艱於選任亦今時之一病也中興聖政臣留正等曰太上皇帝與隣國講好二十餘年使命往來無纎介之隙而乃于内帑儲邉備錢一毫不敢妄費是其未嘗斯湏忘患也暨金亮敗盟師興財費而無横賦重歛以及民非聖慮深逺疇克哉權尚書吏部侍郎汪應辰充集英殿修撰知衢州中書舍人兼直學士院虞允文言應辰早歲以文章决科其材實堪世用今若藉其才以禦外侮則衢郡不為邉要若以為有罪亟當罷黜則不明言其罪以正其當黜之名若出於應辰之自請則邉境多虞而人材相繼去國此物論所以為朝廷惜也望且令依舊供職以待後日煩使從之左朝奉大夫知荆門軍姚岳令再任岳在荆門籍民兵置槍仗號强壯子弟號令齊一宣諭使汪澈見而善之奏岳緩急可倚乃有是命三省樞宻院奏招納歸附歸正人賞格應接納金人萬户或蕃軍千人者補武翼郎下至蕃軍五人漢軍十人者補進勇副尉凡十等如蕃漢僉軍自能歸附者並優補官資有官人優加陞轉仍不次擢用令降黄榜曉諭是日夜漏下二皷王權自廬州引兵遁屯昭關初金主亮在夀春欲渡淮繫浮橋已成邏者獲權軍擺鋪數人中有一曹司亮見之問權所在曹司曰在廬州又問有兵幾何曰有兵五萬亮曰是也吾知之矣乃以金十餘兩遺曹司且令附書與權權聞亮已渡淮遂自廬州退兵沿路作虛寨以敵游騎為權軍所執權與之酒問其虚實有都壕寨者曰大金起兵六十萬以十萬出清河口不戰但為疑兵以當淮東之軍以二十萬分往京西三十萬隨郎主來其十萬人出戰十萬人護駕十萬人奪渡江權曰不可當也宜引避之遂退保和州令破敵軍收後己酉總領四州財賦王之望言和州路見管階成西和鳯州元𨽻陜西路今來已收復隴洮州并管下諸縣城寨原堡不少見議進發大軍將來恢復陜西州軍有合就便措置錢糧草料應辦等事與四川路分别無相干又本所相去隔逺事力不及欲乞朝廷依舊復置陕西路轉運司管轄新復州軍措置合行事件庶幾事有司存各任其責亦可濟辦庚戌詔大臣私第接見賔客頗妨治事自今日毋過三次右朝奉郎淮南轉運判官莫濛降一官放罷初命濛隨王權軍應辦錢糧濛遷延不之任乃罷之右司諫梁仲敏又言其慢命詔濛勒停濛特勒停在壬子右朝請郎新知信陽軍向汋為淮南轉運使判官兼淮西提刑提舉常平茶鹽公事武翼郎知均州武鉅為武節郎閤門宣賛舍人以鉅言招納到北界廵檢杜海等二萬餘人故也初劉錡在淮隂日與王權軍中流星遞文書徃來不斷至是淮西路阻文書不通中軍統制劉汜等在盱眙錡命往招信以來體探至招信界聞金人扼路不可行遂徃淮隂合軍是日夜漏下四皷直秘閣知廬州主管淮西安撫司公事龔濤棄城走時諜報敵兵至北門外二十里濤聲言將本州人馬往無為軍等處措置捍禦委修武郎添差本州駐泊兵馬都監楊春權州事遂行春開封人自行門換授辛亥武功大夫東南第二將兼提舉沿淮民社向琪領髙州刺史左朝散大夫知眉州樊汝霖為成都府路轉運判官汝霖金堂人也江淮制置使劉錡令淮東副總管張榮選所部戰船六十五艘民兵千人赴淮隂軍前使喚先是有詔調淮東丁壯萬人付榮於射陽湖等處緩急保聚時淮東遭水災民多乏食錡乞日給民兵錢米及借補首領官資以為激勸而轉運使楊抗令榮分其兵之半歸農半給錢米至是調赴軍前者皆潰逸不歸榮卒不能軍是日金人陷滁州初金主亮既渡淮令萬户蕭琦以十萬騎自花靨鎮由定逺縣取滁陽路至揚州琦至藉塘駐軍數日先以百餘騎犯清流關官軍無與敵者又二日遂長驅入關直抵滁州右朝奉大夫知州事陸廉棄城去敵所過皆不殺掠或見人則善諭之使各安業有軍人遺火焚民居草屋一間者立斬之乃掲榜以令過軍初淮南轉運副使楊抗令州縣鄉村臨驛路十里置一烽火臺其下積草數千束又令鄉民各置長槍催督嚴切人甚苦之至是金入滁州界方以乏馬芻為患而所得積草甚衆又鄉民皆棄槍而去盡為金人所取琦之深入也每過險阻必憂有備至則全無守禦如蹈無人之境金甚笑我之失計焉此以王之望所奏蕭𤦺所言收入壬子皇子寜國軍節度使開府儀同三司建王瑋為鎮南軍節度使以明堂恩也四川宣撫使吳璘等奏已復秦州上曰金人無故敗盟數路出師朕之應兵良不得已今日之㨗雖由祖宗德澤然亦天人信順之助可令璘存撫四民各令安業以慰壺漿向化之意内為金簽軍者務恤其家毋令重擾暴斂虐刑一切除去陳康伯曰神州陷沒三十餘年今一方之人喜見漢官威儀上曰完顔亮窮凶極暴吾民脱去湯火如解倒懸此皆卿輩指蹤之功康伯曰臣等何功之有皆仗陛下弔伐威靈中原傳檄而下自此始矣殿中侍御史杜莘老言四川見管常平義倉米六十二萬石乞依兩淮湖廣已得㫖令漕臣遣官覈實以備軍食從之左宣教郎提舉荆湖北路常平茶鹽公事張震為秘書省著作佐郎黄中薦之也詔前籍劉寳貲産皆還之是日江淮制置使劉錡得金字牌遞報淮西敵勢甚盛令錡退軍備江時錡在淮隂與金人隔淮相持已數日至是清河口有一小舟順流而下錡使人邀取之有粟數囊而已錡曰此探水勢者也俄頃金人各抱草一束作馬頭以過舟舟約數百艘有載糧徃濠州者有載激犒之楚揚州者泝流牽挽其勢甚速錡募善沒者鑿舟沉之敵大驚先是淮南轉運副使楊抗聚民為水寨以土豪胡深充都統領抗在淮隂見錡與金人相持自言欲守水寨且催督錢糧應副大軍乃棄其軍而去遂渡江居江隂軍癸丑户部侍郎劉岑等乞借江浙荆湖等路坊場净利錢一界計錢三百八十萬緡以備賞軍限半月足許之國朝混一之初天下嵗入緡錢千六百餘萬太宗以為極盛兩倍於唐室矣其後月增嵗廣至熙豐間合苖役市易等錢所入乃至五千餘萬渡江之初東南嵗入猶不滿千萬上供纔二百萬緡此祖宗正賦也吕頤浩在户部始創經制錢六百六十餘萬緡孟庾為執政又増總制錢七百八十餘萬緡朱勝非當國又増月樁錢四百餘萬緡紹興末年合茶鹽酒算坑冶𣙜貨糴本和買之錢凡六千餘萬緡而半歸内藏昔時中都吏禄兵廩之費全嵗不過百五十萬緡元豐間月支三十六萬宣和崇侈無度然後支百二萬渡江之初連年用兵月支猶不過八十萬其後休兵浸乆用度滋多部嘗患無餘及軍興遂有此請净利錢明年二月罷借是日金人圍廬州修武郎添差兵馬都監權州事楊春勒兵乗勢突陣以出過中派河率鄉兵守焦湖水寨甲寅劉錡遣兵渡淮與金人接戰先是錡遣殿前司䇿應右軍統制王剛等間以兵數百渡淮金人退却官軍小勝既而金人悉衆來戰錡不遣援節次戰沒者以千數至是又遣刀斧手千人渡淮或進或却以退無歸路死者什七八金主亮以大軍至廬州城北之五里築土城居之江州都統司將官張寳復入蔣州蔣州既為金人所破訪戚方措置收復金聞官軍且至遂遁去是日金人冦樊城先是都統制吳拱至襄陽欲屯萬山小寨或襄陽失利則西入蜀諸軍皆洶洶不定時荆南軍新創金將劉萼擁衆十萬揚聲欲取荆南又欲分軍自光黄擣武昌朝廷以金昔嘗由此入江西慮揺根本令拱遣兵護武昌一帶津渡拱將引兵回鄂宣諭使汪澈聞之馳書止拱而自發鄂之餘兵進戌黄州拱還㐮陽嘗𥚹躁不自已㑹劉萼取通化軍前一夕牛首鎮莊家三人縋城入㐮陽告以金且至拱疑之不為備翌日敵騎三千忽至樊城欲奪浮橋徑至城下自講好後樊城不修築多缺壊副將翟貴部將王進時以兵二百戍焉統制官張順通以百騎廵逴與敵遇擊之㑹繫浮橋未成敵不得濟二將引兵出戰拱登城漸出兵禦之敵少却金人三卻至竹林下鐵騎突出官兵遂敗拱以四舟渡師助之阻風不至二將俱死士卒半掩入江中至晚敵騎退是役也以大㨗聞武功大夫張平未嘗出戰亦以竒功遷中衛大夫軍中謂之樊城功賞乙卯命學士院撰祝文具述國家與金和二十餘年備存載書今無故渝盟師出誠非得己之意以告天地宗廟社稷諸陵及嶽瀆等諸神詔比令侍從臺諫等薦舉知縣縣令今員數己多未有闕可處其權住薦舉户部侍郎劉岑等言軍旅方興主上出内帑以賞軍輔臣辭常賜以節費惟富人巨室乆擅髙貲初無毫髪之勞望令捐家貲以自獻州縣受納以其數上聞而朝廷等第推恩公私兩便從之令州縣榜諭詔萬夀觀使田師中許於將帶隨行使校軍兵内差三百人充使喚給事中金安節等言陛下禮待諸將必盡於始終之間然比者朝廷以湖㐮地重逺自禁衛分兵戍守今却於湖㐮差兵前來應副舊將當直輕重之際事不相侔又聞湖右士卒心擕已乆隨從在此之人出語籍籍傳於道路使之强留未必安帖欲望量留鄂兵三二十人外只於行在諸處差撥應副庶幾陛下禮待諸將之意曲盡而於邉防大計不致有妨從之江淮制置使劉錡聞王權敗乃自淮隂引兵歸揚州淮甸之人初恃錡以為安及聞退軍倉卒流離於道死者十六七錡之未退也檄淮東副總管張榮以所部人船盡赴淮隂是日榮被檄即發秦州至楚州則大軍已退其所統民兵皆驚潰榮收散亡僅千人至邵伯埭决運河水入湖以自保焉丙辰直秘閣知利州趙不愚為利州路轉運判言兼陕西河東招討司隨軍轉運判官用吳璘等奏也金主亮入廬州詣諸寺廟焚香畢還市中下馬召城外被虜百姓數十人親自拊循使之歸業人賜銀十兩興元府都統制姚仲遣忠義統領王俊率官兵義士至盩厔縣遇金人于東浴谷口破之侍衛歩軍司右軍統制邵宏淵以左右二軍至眞州金州都統制王彦遣統制官任天錫郭諶等領精兵出洵陽至商州豐陽縣克之侍衛馬軍司中軍統制趙撙引兵至蔣州先是江州都統制戚方奏以武徳大夫本司副將張存權知蔣州以所部三百守之撙既至以本軍將官秉義郎蘭某權知州事存力争不聼遂與其衆之沙􅌪此據張存申省状修入存状稱張寳等十月十六日掩殺敵軍過淮當日收復蔣州了當至十八日申時纔方馬軍司趙統制到城下張寳放下弔橋令趙統制入城丙辰十八日也故附于此但存所申又云蒙戚都統申朝廷差存權知蔣州存自九月二十六日起離蘄州至十月初五日到蔣州十二日未時有成太尉下中軍趙統制復部領人馬到州衙安下令存將州事日下交割與鄂州將官蘭秉義一状前後日辰参差如此殊不可曉按日歴金人十月五日癸巳破蔣州則存初五日未應已權州也必有一誤當求他書参考左武大夫建康府駐劄御前破敵軍統制姚興與金人戰于尉子橋死之先是王權既屯昭關將士猶有欲戰之心權引兵先遁金以鐡騎追及尉子橋興以所部三千人力戰權置酒僊宗山上以刀斧自衛殊不援興自辰至申興出入三四殺敵數百統領官戴臯下道避敵敵遂假立權幟以誘興興奪入與其徒拱衛大夫忠州防禦使鄭通等五十人俱陷死之事平贈興容州觀察使即其地立廟是日中書舍人權直學士院虞允文聞王權至濡湏知事急度權與劉錡必退回遂率侍從數人同見輔臣言權退師以臨江口必敗國事尚書右僕射宋倬参知政事楊春皆曰權自言退師以導敵深入身當其衝令歩軍司左軍統制邵宏淵出其右池州都統制李顯忠出其左夾攻之允文等力辯其不然且言權必為走計倬等猶以為不然丁巳得報王權果敗歸中外大震上召太傅和義郡王楊存中同宰執對于内殿上諭以欲散百官浮海避敵左僕射陳康伯曰不可存中言敵空國逺來已犯淮甸此正賢知馳騖不足之時願率將士北首死敵上喜遂定親征之義此據楊萬里所撰虞允文墓碑及王曮所撰楊存中墓碑参修員興宗紀采石始末云丁巳權渡江誤也按諸書權以癸亥渡江盖丁巳日始知權敗於淮西耳興宗恐誤時有欲遣使詣金以緩師者敷文閣待制曽幾聞之上䟽曰遣使請和増幣獻城中無小益而有大害為朝廷計當嘗膽枕戈專務節儉整軍經武之外一切置之如是雖北取中原可也且前陛下降詔諸將傳檄數金人君臣如㓂仇爾何辭復與和耶太府少卿總領四川財賦王之望言於宰執曰四川諸軍頭項非一乗軍興之際凡所湏索多踰格例本所去朝廷至逺調護極難今狀申明應諸軍錢糧事務合從逐軍統兵官徑行取撥唯復從宣撫司審實移文本所應辦若事有所總則本所差易酬應乞賜詳酌速降處分或直作朝廷行下仍將本所嚴行約束令撙節用度諸軍𦂳急非泛支費申奏朝廷不及據宣撫制置司關報量度放行不得輙徇人情耗破官物務在彌縫諸將使本所不生間隙庶可協濟大功事属機危宻陳肝膽一經鈞覽便告焚除毋致孤蹤陷于失身之戒實關軍國非為一司伏望體念四川總領與向來都運司及東南諸總領事體不同特垂矜恤尚書省勘㑹四川軍馬經常合用錢粮各有窠名應副外今來調撥之際費用百出總領所職在錢糧自當竭力措置應辦撙節浮費務在協和及將帥諸軍忠義體國與本所不生間隙庶可協濟大功應錢糧事務並合開具的確合用之數申宣司審實移文總所應辦遇有急速非泛支費申奏不及仰宣制司關報本所量度應副不得妄亂耗費劄付逐司照㑹少保奉國軍節度使四川宣撫使吳璘封成國公以明堂恩也是日官軍復鄧州先是閤門宣賛舍人知均州武鉅遣總轄民兵荀琛將官李元等領兵進取右奉議郎知房州司馬倬遣鄉兵二千為援且濟其軍食至是琛等復鄧州倬伋弟也戊午知樞宻院事葉義問督視江淮馬軍中書舍人兼直學士院虞允文参謀軍事樞宻院檢詳諸房文字洪邁秘書省校書郎馮方並参議軍事權禮部侍郎黄中請為欽宗作主祔廟從之侍衛歩軍司左軍統制邵宏淵及金國統軍蕭琦戰于真州胥浦橋西琦自滁州引兵至瓦梁扼滁河不得渡執鄉民歐大者問之大因記紹興十一年韓世忠以數百騎往定逺縣虛驚而回至瓦梁盡毁民居以為浮橋恐金人效之乃荅以有路自竹崗鎮可徑至六合縣琦從之俾為鄉導遂迂路半日故六合居人皆得逃去宏淵在真州方飲酒有報金人且至者亟率衆相遇於胥浦橋宏淵命將官三人拒于橋上金人弓矢如雨王師多死城中老弱皆竄避惟守家强壮猶登城以觀正争橋間敵實草以渡河三將皆死宏淵率親隨軍入城掩闗以拒故軍民皆奔于江上得舟渡江以免宏淵毁閘板退屯于揚子橋真州遂陷敵得城不入徑自山路犯揚州趙甡之遺史云是役也宏淵酒醉未醒實不入陣身在橋之東以麾將士追三將在橋上占橋迎戰及其退軍也百姓關然為之語曰邵太尉在西府橋當住畨人矣揚州百姓則曰若非邵太尉在真州力戰畨人則揚州之人皆避之不及至有言宏淵馳馬入陣鏖戰出入數四血汚滿體者其力戰迎敵之舉起于百姓後好事者不究其實為請立祠堂于二州可謂不虞之譽矣甡之所稱西府橋即胥浦橋今併附此更湏参考江淮制置使劉錡軍還至邵伯埭聞金犯真州疑揚州已不守未敢發㑹探者報揚州城上旗幟猶是官軍錡曰雖失眞州猶為國家守當速進乃自北門入見安撫使劉澤澤以城不可守勸錡退屯𤓰洲錡令諸軍憇歇徐圖所向金州統制官任天錫復商洛縣己未鑄樞宻行府之印知樞宻院事督視江淮軍馬葉義問言今來軍期之際事務不少全藉逐路州縣當職官竭力應辦如内有避事不職及生事騷擾百姓或老病怯懦不堪職任之人并見闕官去處欲許臣先次選官填替對移其罪狀顯著者具奏取㫖重賜竄責施行從之此據武昌軍回申行府狀詔翰林學士何溥祠馬祖又命招討使禡祭于軍中池州都統制李顯忠乞犒軍錢物詔以銀萬兩賜之侍衛馬軍司中軍統制趙撙引兵渡淮攻蔡州撙在信陽軍聞金已冦淮右曰此可以進兵擣其虛矣遂行是日金州統制官任天錫等復商州獲其守將昭毅大將軍完顔守能同知州武騎尉馬彦降食糧軍千餘人時關陜空虛華州宻邇商鄧人心驚揺金所命蒲城令與尉皆遁去丞喬扆召耆老告之曰事勢若此南軍且至爾等何以禦之皆曰有降而已扆曰即偏師至南軍奔潰不暇從之而去者死於蹂躪其不能出者責以背叛孥戮之莫若一心固守此萬全策也既而有謀翻城内附者扆執而戮之衆乃止扆平陽人也蒲城事以金國翰林直學士趙可所撰喬扆墓誌修入此可見人心戴宋之深也扆本中國人乃不顧大義如此可勝誅哉今具載可本文于後改華州蒲城丞正隆之季闗陜空虚華州宻邇商鄧人心動揺令與簿皆挈家遁去君召耆老告之曰今事勢若此南軍且至爾等何以禦之皆曰有降而已君復好謂曰國家之興實天所授人荷寛政亦已乆矣其忍負之乎茍如所言將捨順效逆一旦朝廷以偏師至其軍奔潰不暇從之而去者為官軍所乘皆死于蹂躪其不能去者責以背叛拏戮之今丁口數萬同一心力足以自固吾為爾等計莫若善壘浚隍厲兵積粟吾雖不肖願率先父老以圖共守此萬全策也衆皆喜曰敬受令于是増卑培薄躬執畚鍤以道其衆不旬浹而城完乃料揀丁壯得二千人悉令登陴又選精鋭百人以為牙兵其餘衛坊曲更廵邏備炊㸑者皆當其任禁繫豪猾逐去游手命寄居官分守要害延老儒與参謀議部分既定甲胄登城諭以禍福既而有謀翻城以應敵者執而戮之人皆屏息未幾渭南赤水華州華隂白水下邽皆為南軍所據賊楊萬李孝章率衆傅城自冬及春首尾凡四月誘脅百方君誓死無二人知感激自奮賊不能攻大定二年春正月官軍至賊始散走君空壁而出與官軍合擊追奔數十里振旅而還君慮民之嘗陷於賊者不能無罪諭使自陳其後捉殺使誅從亂者此邦之人獨頼以免人亦感君之恩繪君像户皆祠之庚申葉義問入辭乞犒軍金帛上命出内帑九百萬緡予之参謀軍事虞允文繼對上諭曰卿儒臣不當遣以卿洞逹軍事勉為朕行允文曰臣敢不盡死力太傅寜逺軍節度使醴泉觀使和義郡王揚存中為御營宿衛使初王權之未敗也權禮部侍郎黄中為上言淮西將士不用命請擇大臣督諸軍至是又率同列言存中不可遣狀甚力不聼户部言朝廷不住調發人馬徃淮上縁諸處總領所係在沿江南岸置司乞總領官不時過江徃來檢察催取隨軍轉運司并所委官同共多方措置悉力應辦不得有誤軍食從之盱眙軍免解進士胡昉為右廸功郎充泗州司户参軍用守臣夏俊請也趙撙破襃信縣是日建康府都統制王權自和州遁歸權聞敵且至紿其衆曰已得㫖棄城守江矣遂引兵登車船渡江屯于東采石辛酉左金紫光禄大夫提領江州太平興國宫湯思退復觀文殿大學士充醴泉觀使兼侍讀知樞宻院事督視江淮軍馬葉義問發行在朝廷始聞劉錡自楚州南歸盡葉淮東之地然尚未知王權渡江也詔將來廵幸應軍旅非泛支降錢糧差除等事並隨行在處分百司常程事依舊留臨安府行遣内不可決者即申行在所是日金人入和州初金兵至近郊猶未知王權棄軍而歸也後軍統制韓霖最後出城乃縱火城中喧亂金人聞之曰南兵遁矣遂進兵入城城中糗糧噐械並委於敵敵勢奔突軍民自相蹂踐及争渡溺死者莫知其數將士憤怒號呼指船詆罵皆以權不戰誤國為言統制官時俊殿後以弩伏道傍敵騎稍止潰兵徃徃棄甲抱蘆葦浮江而渡得生者十四五壬戌詔朕徳不足以懐逺人致金人復背盟好勞我將士䝉犯矢石念之坐不安席食不甘味自今月二十四日當避正殿减常膳尚書户部侍郎劉岑兼御營随軍都轉運使先徃沿江措置寜國軍節度使池州駐劄御前諸軍都統制李顯忠為御營先鋒都統制隨州觀察使主管侍衛歩軍司公事李捧為前軍都統制右武大夫髙州刺史苗定為右軍統制武經郎閤門宣賛舎人殿前司摧鋒軍統制郭振為左軍統制翊衛大夫利州觀察使劉鋭為中軍統制仍命顯忠屯蕪湖以扼裕溪口之衝且為王權聲援捧嘗請斷吳江橋以拒金或又欲塹常熟之福山以斷其騎軍徽猷閣直學士知平江府洪遵曰審爾是棄吳以西邪凡堂帖監司符移皆收不行自李捧以下差遣諸書皆不書日歴明年正月乙酉李捧見丙戍苗定見癸巳郭振見二月劉鋭見並係此銜但不知後軍為何人也徐夣莘北盟㑹編壬子御營前軍都統制李捧徃江上捍禦朝辭恐即此日事洪遵行狀又稱李捧請斷吳江橋亦不得其時今且附此更湏参考成忠郎閤門祗候東南第二副將都遇知濠州召降授武顯大夫吉州刺史知濠州劉光時還行在時州已不守光時寓治横澗山寨殿中侍御史杜莘老乞令勲臣戚里内侍之家獻家財以助國仍加優賞從之詔選人舉主考第應磨勘者許不俟替官赴闕用權吏部侍郎凌景夏請也資政殿學士知建康府張燾始至本府視事建康知府題名張燾十月二十三日到任壬戍二十三日也趙甡之遺史在二十日己未恐誤先是建康居民驚移而去者十五六及燾至人情粗安侍衛馬軍司中軍統制趙撙至新蔡縣金人所命令佐率衆迎敵撙一鼓破之是日江淮浙西等路制置使劉錡退軍𤓰洲鎮金陷揚州初邵宏淵既失利金人自山路徑犯揚州屯于平山堂下宏淵亦退在揚子橋南毁閘板而渡揚州軍民皆傾城而奔錡乃退軍自南門外拆民屋為浮橋軍過即毁之由東門而去守臣武功大夫榮州刺史劉澤亦奔泰州徃通州渡江入平江府先是右朝請大夫提舉淮南東路常平茶鹽公事王珏被㫖守海道至是獨引兵趨崇明西沙或勸毋行珏不聼即日登舟文書帑藏無毫釐之失癸亥詔侍從百官更互赴行在所供職先令翰林學士何溥吏部侍郎凌景夏張運給舎金安節劉珙臺諌梁仲敏杜莘老吳芾禮官王普尚書郎徐度薛良朋余時言栁大節姚寛從行仍命夏景等分攝六曹都司樞掾太府農職事時權兵部侍郎陳俊卿措置海道而户部侍郎劉岑中書舎人虞允文先徃建康從官兩省留臨安者惟汪應辰徐嘉黄中路彬許尹唐文若六人而已寛舜明子也時以右丞議郎監六部門兼權右曹郎官始有司辦嚴用紹興七年故事杜莘老為上言今親征與曩曰事異宜皆從簡以幸所過郡縣上曰此行中宫及内人不徃止與建王行欲令徧識諸將耳乃命王府直講史浩從行自金人窺伺江淮一時宿將莫不震怖惕息獨王處之恬然不懼廷臣有奏請王為元帥者及扈行邉遽日至王預料某所可守某所可攻某人可用後率如所言廷臣請王為元帥據張闡所進聖徳事蹟云爾當求言者姓名増入言者乞令諸州縣豪勢上户自備錢糧招槍仗弓箭手赴行在優立賞格從之尚書户部郎中總管江東財賦淮西軍馬錢糧都絜陞司農少卿直敷文閣荆湖北路轉運副使李稙落職放罷右朝奉郎知漢陽軍林之純為荆湖北路轉運判官之純輕薄無行不為吏民所敬宣諭使汪澈出使之純謹奉之澈問稙財計事稙士人據案牘行移而已諸州財賦未嘗經心不能對之純嘗為總領所属官粗知財賦所出納一日間見澈且言湖北財計澈大喜之純乃風郡人詣澈舉其才澈即奏吳珙進軍襄郢而稙留鄂州不隨軍坐是糧乏又薦之純可用于是申命之純十二月壬戊正差是日王權自采石夜還建康既而復如采石時金主亮率大軍臨西采石楊林渡已數日權與左朝請大夫知太平州王傳猶庇匿不以聞州學諭汪餘慶與教授蔣繼周同徃見傳責之傳氣奪一日發八奏初奏言金人已犯采石而不言東西朝廷大驚三省樞宻院吏皆挈家以出都人驚移不可止次報金人已到楊林而不言楊林渡朝廷莫知其在江之南北益懼因遣人于閭巷間求當塗歴陽人問楊林所在夜二鼓乃得一士人言楊林西采石之渡口也于是憂疑稍定繼周青田人也甲子特進提舉江州太平興國宫和國公張浚復觀文殿大學士判潭州左太中大夫提舉臨安府洞霄宫湯鵬舉復資政殿學士知太平州左朝請大夫知太平州王傅提舉江南西路常平茶鹽公事武節郎閣門宣賛舍人知均州武鉅為果州團練使知均州兼管内安撫使節制忠義軍馬賞功也入内内侍省押班林肇主管大内公事趙撙下平興縣忠義統領栁萬克伏羌城是日右武大夫興州前軍統制兼主管中軍軍馬吳挺邵州防禦使知文州節制軍馬向起敗金人于徳順軍之治平寨先是金遣兵之涇原宣撫招討使吳璘命起挺率所部捍禦過徳順遇金㳺騎二千餘與官軍接遂駐于治平統領官劉海將官曹建以數百騎掩擊之斬其將博綽生俘數十人入其郭金恐南軍襲其後乃火城寨為疑軍海等以為救至遂引還金乃得去宣撫司第賞首先出陣破敵者為竒功進官四等其下各有差乙丑鎮江府左軍統領員琦及金人戰于揚州皂角林敗之初金人既得揚州即遣兵逐劉錡與官軍遇至是大軍來争瓜洲渡錡命統制官賈和仲吳超等拒之于皂角林琦陷重圍下馬死戰數十合中軍第四將王佐以歩卒百有四人徃林中設伏金既入張弩俄發金以運河岸狹非騎兵之利稍引去遂大敗之斬統軍髙景山俘數百人時諸處以報㨗旗趨行在者絡繹于道路市人為之語曰雖日聞報㨗可喜但一報近如一報亦可憂督視軍馬葉義問讀錡㨗報至金人又添生兵顧謂侍史曰生兵是何物聞者皆笑當時謂之土園樞宻此以趙甡之遺史附入丙寅直敷文閣兩浙轉運副使王時升直秘閣兩浙轉運判官林安宅各特轉一官時升等言拘收到錢三十萬緡以備廵幸之費故有是命浙西馬歩軍副總管李寳與金人舟師遇于宻州膠西縣陳家島大敗之初金主亮用降人倪詢商簡梁三兒等計造戰船數百使工部尚書蘓保衡等統之約以十月十八日至海門山入錢塘江幹事畢令雄州刺史阿噶來江上迎報金舟泊唐家島寳舟泊石臼山相距三十餘里而北風日起寳憂之有大漢軍水手數百來降大漢軍簽起上等户也皆富豪子弟寳問之頗得北軍事實裨將曹洋請逆戰知朐山縣髙敞曰不可彼衆我寡宜避之洋曰彼雖衆皆不諳海道且降人云女真在船中惟匍匐而睡略不能動雖衆何為况我深入至此前逆大敵雖欲退走其可得乎有死而已時金候風即南不知王師之猝至也寳伺金未覺遣洋與裨將黄端禱于石臼神祈風助順夜漏將盡起碇進船風猶未順衆有難色良乆南風漸應衆喜争奮引帆握刄俄頃過山薄敵皷聲震疊敵驚失措敵帆皆以油纈為之舒張如錦繡綿亘數里忽為波濤巻聚一隅窘蹙揺兀無復行次㑹火頭船中有火起者寳命以火箭射之着其油帆煙熖隨發延燒數百火不及者猶欲前拒寳命勇士躍登其舟以短兵擊刺殪之舟中其餘簽軍皆中原舊民脱甲而降者三千餘人獲其副都統驃騎上將軍益都府總管完顔鄭嘉努等五人斬之阿噶亦為官軍所殺保衡舟未發亟引去熊克小歴云統軍蘓保衡未發舟不可獲旋聞自經死盖因馮忠嘉海道記所書也按范成大攬轡録蘓保衡為水軍都統葛王立除右丞則保衡此時不死忠嘉盖誤得倪詢等三人及敵詔書印記征南行程歴與器甲糧斛以萬計江淮制置使劉錡在𤓰洲四日無日不戰錡恐人心不固乃遣人自鎮江取妻子以安人心至是有詔令錡專防江上㑹錡病已劇遂肩輿渡江留中軍統制官范汜以千五百人塞瓜洲渡知均州武鉅遣將與忠義軍復盧氏縣是日侍衛馬軍司中軍統制趙撙引兵攻蔡州距城二十里金人出兵背城而戰方成列撙出金不意命官軍於宿草間乗風縱火鼓噪而進金披靡撙率親兵衝擊斬其總管楊寓遂整衆入城秋毫無犯宣諭使王澈以撙提舉諸軍先是朝廷聞敵犯淮西亟命湖北京西制置使成閔統諸軍併舟師為王權之援武昌令薛季宜獻計於澈謂閔軍已得蔡有破竹之勢宜守便宜勿遣令閔乗虛下潁昌趨汴京金内顧必驚潰澈不能用丁夘詔視師江上南班宗室並免扈從詔蔡京童貫岳飛張憲子孫家属令見拘管州軍並放令逐便用中書門下省請也於是飛妻季氏與其子霖等皆得生還馬是日知樞宻院事葉義問至鎮江權立行府中書舎人兼㕘謀軍事虞允文見太尉劉錡問兵敗狀錡曰兵凶器聖人不得已而用之允文曰敵人席巻兩淮直窺江表今日之用兵為得已乎錡曰錡非好官職者今當上還制置招討二印耳允文曰國事如此九重方有䝉塵之懼公持是印欲安所歸乎錡慚不能荅是日金州統制官任天錫自商州遣兵㑹虢州忠義首領辛傅等取朱陽縣降其知縣事奉議大夫劉楫商洛都監供奉班祗應王元賔俘女真九人戊辰殿中侍御史杜莘老直顯謨閣知遂寜州延福宫使安徳軍承宣使入内内侍省副都知張去為致仕先是去為取御馬院西兵二百人髠其頂髪都人異之口語籍籍莘老劾奏之上不樂莘老執奏不已竟罷去為御馬院致其仕而莘老亦出右廸功郎鄭樵充樞宻院編修官樵以布衣特起至是稍用之太府少卿總領四川財賦王之望言本所庫管錢引見在萬數不少陜西諸路並係敵中行使銅錢地分若不預行措置竊慮恢復之初諸軍進發出川路界分止以銀絹支散本所錢引遂成無用為害甚大照得前此𣙜場未開日四川錢引客人已私下將帶徃來陜西暗行買賣將來既得陜西則川陜路通客旅奔凑布帛茶藥之類皆是川貨與錢引相兼貿易實為利便欲乞朝廷速降指揮如收復到陜西州軍許將錢引依四川行用其見使銅錢一文紐川鐵錢二文庶幾公私貨幣流通不致妨闕議者必謂封疆既拓錢引可以多添此誠便利然蜀中交子祖宗時止一百二十餘萬道皆有稱提見錢今節次增添錢引凡四千一百四十七萬餘道只有鐵錢七十萬貫其所以流通者盖縁鹽酒等物隂為稱提而本所贍軍庫常有數百鉅萬不散於外故引法未致大壊此亦天隂有以相之也引法一壊則蜀不可為矣故今引法尤當愛護不可輕有増損向都轉運司以軍興急廹増印數百萬道引價頓减遂於通衢鑿毁以救其弊今官庫之積皆當散出若更増添湏當消息而行乞宻降省劄畧示大數付之望不下轉運司收掌令之望酌度事宜或三五十萬或百十萬道作畨次旋旋増添不令外人知所添之數足以給用即止不必盡如朝㫖所增盖添引頓多則引價必損諸軍恐其折閲則便多邀銀絹臨時實礙支遣又所復州軍未知多寡可守不可守而錢引既印則不可復收併與見界之數行用俱輕為害不細之望備員總計當此軍興若得多印錢引以救目前之急實為大幸但為朝廷乆逺之計慮及如此伏望特賜照察十二月庚子施行初金新主襃既立遣通事蕭恭特赦詔撫定州縣及中都權留守拒而不從恭立誅之大興尹李天吉懼而聼命於是自黄河以北皆下之左丞相張浩自汴京録襃赦馳以報金主亮亮歎曰朕欲候江南平後取一戎大定之義以紀元是子乃先我乎命取書一帙示其下果預識改元事亮即遣右議軍郭瑞孫回衆攻襃令盡誅黄河以北之叛己者天吉燕人瑞孫藥師孫兵部尚書安國子也亮得襃報諸書不見月日按襃以此月八日立而自上京至泗州五千八十四里自泗至廬和不逺則亮之得報必在十月下旬今且附月末建炎以来繫年要錄卷一百九十三建炎以來繫年要録巻一百九十三金人地名考證塔坦原書作鞬靼誤改見巻五十八愛新原書作阿辛即金史之愛申並誤改見巻一百三十翁古察原書作斡古刹誤今改正薩哈原書作撒改誤改見巻一博濟原書作孛急即金史之孛極並誤今改正摩哩原書作毛里誤改見巻四十四威赫原書作隈阿即金史之隈可並誤今改正呼喇美原書作忽剌馬誤改見巻一百三十三博綽原書作潑察誤今改正阿噶原書作阿瓦即金史之阿窊並誤今改正鄭嘉努原書作鄭家奴誤改見巻一百九十一沙津原書作沙只誤改見巻一百六十一
