body:
  text: 建炎以來繫年要録卷五十六宋李心傳撰紹興二年秋七月己未朔蕪湖縣進士韋許為迪功郎以其獻書籍也庚申直寶文閣知桂州許中令再任曹成之犯廣西也中嘗率兵與嶽飛㑹詔録其功進職二等至是又任之中進職在六月丁巳辛酉御筆福建州縣盜賊焚劫之家悉捐其田稅先是德音蠲免而有司以為著令不得過三分上欲實惠及民繇是申命壬戌復置湖北提舉茶鹽司癸亥勑令廣西經略司以鹽博馬其後嵗撥欽州鹽二百萬斤與之左承事郎㳂海制置司參議王安道充樞密院計議官往淮東措置海道秦檜引之也初江東安撫大使李光奏小使臣翟慶賀仲堪為宣州兵馬監押如有已差人亦乞從今來所辟施行詔並特添差甲子殿中侍御史江躋言臣當怪近日帥守監司辟官往往不知尊朝廷必欲直衝吏部已差之人雖以李光之賢亦且為此朝廷既不能奪吏部已行之命又不能違藩鎮辟置之意則不惜以添差與之臣未知其可也今州縣添差之官以祖宗舊額較之殆三四倍生民安得不重困朝廷姑息藩鎮可謂得已而不已者願罷慶仲堪仍下吏部措置每州縣添差不得過若干員以寬民力從之令修政置局措置罷福建提舉市舶司依舊法令憲臣兼領以每嵗海舶不至虛費官吏廪祿故也乙丑給事中胡安國入對上曰聞卿大名何為纍召不至安國再拜辭謝進曰臣聞保國必先定計定計必先定都建都擇地必先設險設險分土必先遵制制國以守必先恤民夫國之有斯民猶人之有元氣不可不恤也除亂賊選縣令輕賦斂更弊法省官吏皆恤民之事也而行此有道必先立政立政有經必先核實核實者是非毁譽各不亂真此致理之大要也是非核實而後賞罰當賞罰當而後號令行人心順從惟上所命以守則固以戰則勝以攻則服天下定矣然欲致此顧人主志尚如何耳尚志所以立本也正心所以决事也養氣所以制敵也宏度所以用人也寬隱所以明德也具此五者帝王之能事備矣乞以核實而上十有五篇付宰相參酌施行先是安國為時政論二十篇以獻其論定計略曰陛下履極六年以建都則未有必守不移之居以禦敵則未有必􅋵不變之術以立政則未有必行不反之令以任官則未有必信不疑之臣舍今不圖後悔何及論建都謂建康有可都者五不宜數動與敵人逐水草無異論設險謂欲固上流必保漢沔欲固下流必守淮泗欲固中流必以重兵鎮安陸此不可易者論正心謂在先致其知而誠其意故人主不可不學願更選正臣多聞識有智慮敢直言者置諸左右論養氣謂用兵之勝負軍旅之强弱將帥之勇怯係人主所養之氣曲直何如願强於為善益新厥德使無曲失可得指議論宏度謂人主以天下為度不可以私勞行賞私怨用刑論寬隱謂創業興衰之君柔遜謙屈必施於林壑退藏之士以礪其節獨以威刑外施暴橫之敵內拂貪殘之賊與悍驕不可使之將讒說殄行之臣則天下歸心而治道成其大㫖如此至是又申言之安國又有制國論已附紹興六年四月甲申張浚言運米至荆南之後核實論已附李綱復官時時上欲講春秋遂以左氏傳付安國㸃句安國言今方思濟艱難豈冝耽玩文采莫若潛心聖人之經上稱善安國因薦司勳員外郎朱震丙寅詔靖康勤王京城守禦應緣方臘及直逹綱賞靖康以前御筆指揮眀受可行事件并淮南州縣官建炎已前元不離任靖康以前鹽課增剩等賞自今並不許陳乞以言者論其為濫也此所謂明受可行事件申取朝廷指揮不知以何月日降㫖日歷未見可附建炎三年四月辛亥丁卯資政殿學士新除提舉萬夀觀兼侍讀張守知福州從所請也上曰福建盜賊之後要在拊循凋瘵用守為冝初僞閩以八州之産分三等之制膏腴者給僧寺道觀中下者給土著流寓自劉䕫守福始貿易以取資守與士大夫謀為實封之說存留上等四十餘剎以待髙僧餘悉為實封金多者得之嵗入不下七八萬緡以助軍衣餘寬百姓雜科時實便之此以紹興二十九年閏月甲子朱倬所奏修入起居郎王居正充右文殿修撰知婺州居正素與秦檜善檜為執政嘗與居正論天下事甚鋭及拜相所言皆不讎居正見上曰秦檜嘗語臣中國之人惟當著衣噉飯共圖中興臣時心服其言又自謂使檜為相數月必聳動天下今為相施設止是願陛下以臣所言問檜所行於是檜始恨之通侍大夫溫州觀察使神武右軍統領官張翼卒以嘗有斬馬柔吉功特賜其家銀帛百匹兩戊辰右朝奉大夫王昞提轄行在𣙜貨務都茶場昞㬇弟也己巳上謂輔臣曰比來臺諫論駁多涉細事意其沽敢言之名朕謂宣和間言事者少千百中無一今朕盡令人言不間疏逺所以人人敢言秦檜曰陛下聽言臣下所以敢言臣亦嘗謂胡安國凡有論駁當務大體若或細事第可申朝廷改正江西安撫大使司奏孔彥舟北遁詔趣嶽飛移屯江州左司諫吳表臣言風聞僞齊於京東路每戶科麻七斤或者恐其以繩維舟謀濟江之計今沿江津渡皆當為備就中采石江稍狹而水緩鍳之往事備禦尤當嚴密樞密院勘㑹已令韓世忠屯建康府嶽飛屯江州防托江道詔送沿江諸帥武翼大夫寧州刺史翟琮起復河南孟汝唐州鎮撫使兼知河南府琮告父喪於朝故有是命日厯琮此日奏狀已繫遙刺御而明年五月丙辰捷奏乃止稱武翼郎閣門宣贊舍人仍帶權字朝廷除觀察使告命亦止繫副使御八月乙未李橫奏琮到襄陽始稱遙刺或是因起復轉官而道梗未嘗受命至襄陽乃得告也今附注此當求他書參考庚午詔湖廣宣撫使李綱速往潭州置司時綱引兵至吉州須犒軍物而𣙜貨務官不時與綱械繫之先是韓世忠軍士留其家於廬陵江西轉運副使韓球聞命即輟所樁世忠錢糧以勞軍既而軍儲不繼世忠之軍婦皆憤伺球出徂擊之裂其衣巾球走得免綱之乞錢糧也得㫖孟庾韓世忠班師日所餘錢糧並留與綱綱劄下吉州增依奏二字球以他郡所受不同審其故綱怒劾球事下安撫大使李回核實其後回言錢糧官髙公惕不時給散致世忠軍士邀球自言公惕坐免官事遂已綱乞錢糧事已見今年五月丙子著此為劉棐劾綱增益制書張本公惕今年十月庚戍免官辛未左宣教郎湖南提㸃刑獄公事吕祉加直祕閣直顯謨閣知郴州趙不群進職一等先是湖南盜胡元奭作亂祉檄統制官韓京吳錫破之及曹成為嶽飛所破進犯郴州不群堅守不下秦檜言湖南寇盜以來州郡多至失守請褒賞二人而劾賀州守禦官之罪時知賀州直祕閣劉全已罷去全六月甲午以許仲劾罷言者謂賀州當湖廣要衝乃賊所必攻之地而憲臣未嘗臨按守禦豈不失職况偏逺小州以數百殘弊之卒當豺虎百倍之師嶽飛鋭旅猶墮其計而簽判已下皆責以不能守禦豈不過乎望下漕司究實然後施行庶幾賞罰當而軍政修於是提㸃刑獄宋孝先已從辟為孟庾參謀官事竟寢癸酉上諭秦檜曰內諸司可省者令修政局條上檜曰此盛德事也大觀宣政間屢省冗費終不能行今斷自淵𠂻誰敢不聽時有議廢修政局以搖檜者檢討官尚書右司員外郎林待聘聞之上疏言陛下即位六年更用八相而績用弗著者此無他人無常責而各有心則治何以立今廷論猶前日也積弊宜更則樂於循故冗濫當裁則惡於損己臣知修政之局廢則亦玩嵗愒日而已監察御史劉一止亦言陛下閔宿蠧未除念頽綱不振政煩民困用廣財殫置司講究德至渥也㑹未聞有所施行恐有以疑似之說欺陛下曰如此將失人心夫所謂失人心者刑政之虐賦役之多則失百姓之心好惡不公賞罰不眀則失士君子之心若無則所失者小人之心耳失小人之心而得百姓士君子之心何病焉願審其利害當罷行者斷自聖𠂻勿二勿疑則事之委靡不振者舉矣二人上疏不得其日因上語附見一止以此月甲戍遷左史恐緣上此疏也今附於未遷之前俟考甲戌給事胡安國進兼侍讀給事中程瑀中書舍人陳與義並兼侍講上令安國兼讀春秋仍諭以隨事解釋不必作義朕將咨詢中興聖政臣留正等曰易之文言曰君子學以聚之問以辨之寬以居之仁以行之而下文繼之曰君德也蓋人君之德莫大於學問寬也者所以居是學問者也仁也者所以行是學問者也學則必有思思則必有疑疑而問問而辨辨而明明而廣大昭徹與天地等得失是非不能為之亂賢否忠佞不能為之惑欲帝而帝欲王而王惟所擇而用之無不如意夫是之謂君德堯舜禹湯文武之所以汲汲也仰惟太上皇帝以天縱之聖當艱難之初萬幾之繁日不暇給而留神六籍退託不眀申命講臣無為義訓隨事解釋用將咨詢焉嗚呼兹德之盛所以與堯舜禹湯文武相望於千百載之上也監察御史劉一止試起居郎一止在臺中嘗言人材進用太遽而仕者或不由銓選朝士入而不出在外雖有異能不見召用執親喪非軍事至起復為州縣官皆僥幸不塞之故又請選近臣曉財利者倣劉晏法於瀕江置司自辟官吏以制國用鄉村皆置義倉以備水旱及增重監司轉運副使提㸃刑獄皆以嘗任侍從官為之所言雖不即行後多採用中書門下省檢正諸房公事黃龜年右司員外郎劉棐並充修政局檢討官省淮東提刑司以其事歸提舉司樞密院計議官薛徽言論明州湖田利害詔上田稅每畝增租為四斗以其所增與下田對豁中等田如舊內低下處復廢為湖徽言永嘉人也丙子詔自今未經審量人不得舉辟及權攝職任犯者官司及被差舉人並以違制論言者以為近來惟到部人方預審量其冒濫贓汚之人避免到部皆在諸處干辟既無進身之望何所不至故有是命韓世忠進師討劉忠是日至嶽州之長樂渡與賊對壘賊開塹設伏以拒官軍丁丑詔兩浙漕臣梁汝嘉措置鎮江府縣酒稅務以其錢助劉光世軍費右宣教郎知無為軍王彥恢言建康古都乃用武之地欲保建康必內以大江為之控扼外以淮甸為之藩籬又必措置兵食以贍國費然大江以南千里浩渺决欲控扼非戰艦不可大江以北萬里坦途欲遏長驅非戰車不可舒廬滁和良疇百萬欲措置軍食非營田不可舟車之法以輕捷為上彥恢所制飛虎戰艦傍設四輪每輪八楫四人旋斡日行千里又有神武戰車下安四輪略同飛虎頂張布帷以避矢石傍斜衝擊其用如神又有拒馬車一人之力可以轉用比之䝉衝偏箱鹿角此尤至要淮西良疇不可以數計不須朝廷給本秪以有無相濟併力營田計其戶口什一養兵則淮西可以守矣如許令彥恢招兵教習只乞那融淮西數州財賦可足舟車之用及以數州秋成所得那融營田可足兵食之費萬一今秋金人長驅深入及盜賊猖獗彥恢當以此舟車推鋒陷陳以此士卒斬將搴旗以此種蒔飛芻挽粟保守淮疆决無疏失詔彥恢就本軍措置戊寅提㸃江浙京湖福建廣南路坑冶鑄錢王㬇言鼓鑄乏本錢乞借支浙鹽五千袋令本司販賣及借留上借錢十五萬緡為回易本錢都省言借鹽有妨商販乞借上供錢從之舊制鑄本以二廣五分鹽息錢自鈔發行所得甚薄故㬇以為請三年二月丙午罷借武義大夫閣門宣贊舍人主管廬夀鎮撫司公事王亨進秩一等以收復安豐夀春縣花黶鎮故也初夀春既為僞齊王彥先所據江東大帥李光欲出師而朝廷不從吕頥浩言夀春本治淮南國初方移治下蔡今賊不能守得之亦不能城不若遣兵二千逐安豐霍邱夀春之寇使之過淮且於夀春寄治府事如此則在我可省轉輸又足以示敵人不過淮之信詔督府措置此月己未㑹僞齊兵退亨遣敦武郎羅興往戍其地因是得遷光又言和州鎮撫使趙霖知濠州寇宏知六安軍謝通皆有守禦之勞並進秩一等既而傅嵩卿又薦霖宣力於朝乃復霖直徽猷閣三人遷官在八月癸巳霖復職在戊戌己卯吕頥浩自鎮江入見庚辰頥浩言金人頃趨建康初自北岸掠小舟數十而濟既至南岸恣行掠船濟渡軍馬其取和州渡江亦然欲令江北諸渡自九月朔日惟於緊要渡口量留舟一二以備轉送斥堠文字餘舟皆泊南岸至十月朔日以後大江更不得通行應公私舟船悉令於南岸深港內𨼆藏如違篙稍並行軍法俟過防秋如舊從之是日韓世忠先遣中後左右四軍渡江逼劉忠寨而屯先是世忠既移屯乃奕碁飲酒按兵不動者纍日衆莫窺其際一夕獨與親信蘇格便服聫小騎直穿賊營警夜者呵問世忠曰我也蓋已諜知賊中約以我字為號故所嚮不疑遂周覽賊營而出喜曰天賜我也即下令明日破賊㑹食遂命諸軍拔柵前行而潛令鋭卒二千御枚夜進伏於山上翌旦辛巳日旦世忠親率選鋒及前軍俱進暨戰所遣卒疾馳入其中軍望樓植麾張蓋賊回顧驚潰大敗遁去忠據白面山跨三年及是乃敗其輜重皆為世忠所得始世忠之出也宣撫使孟庾以師久勞止之世忠請期半月當馳捷以獻至是卒如所料熊克小歷載此事於今年二月蓋不知世忠行軍月日也克又云忠欲投劉豫徒中斬其首以降益誤矣蓋趙雄撰世忠碑所書如此其實忠以七月走淮西九月在蘄陽為解元所敗乃走僞齊明年四月始被殺也克不深考今各附本月日辛巳詔吕頥浩日下赴都堂治事觀文殿學士知紹興府朱勝非同都督江淮荆浙諸軍事頥浩薦勝非蓋傾秦檜也棣州進士李宷挈家來歸詔賜錢百千故右承議郎鄧考甫贈直龍圖閣考甫臨川人元符末應詔上書言新法必亂天下坐削官羈管年八十餘而卒後三年復官其曽孫一人考甫上書邪上尤甚第一人筠州羈管黨籍餘官第六十七人徽猷閣待制都督府參謀官權主管本府事傅嵩卿請逐路應統兵官大小將帥及本府元留下人馬並聽節制行移兵將官及屬部仍用劄子除江東一路事務與李光㑹議外餘路並令諸大帥依元得便宜指揮施行從之嵩卿之至建康也右承奉郎通判府事吳若以衫帽見之嵩卿訴於朝若坐貶秩自葉濃之亂而福建監司皆聚於福州言者以為建劔汀邵四州習俗强悍盜賊屢作漳泉興福號下四州其民怯弱少有為盜者每聞寇作監司首為逃避之計按部漳泉去賊愈逺群凶益無所憚乃詔漕臣還治建州詔淮浙煎鹽亭戶全免色役用户部侍郎提領𣙜貨務黃叔敖請也左朝請郎陳堯臣主管亳州明道宫初浙西安撫大使劉光世奏統制官喬仲福靳賽等十三人防江有勞詔進一官許回授至是光世辭兩鎮之節復為之請上命特與轉行給事中程瑀言將帥取必其流將不可收命令數改其弊將不可振望令尚書省籍記姓名後若立功優加賞典於體為便詔以章示光世其後瑀罷去仲福等卒遷官仲福等遷橫行在九月癸酉甲申吕頥浩言朝廷近置㳂海制置司最為得䇿然敵舟從大海北來拋洋直至定海縣此浙東路也自通州入料角放洋至青龍港又㳂流至金山村海鹽縣直泊臨安府江岸此浙西路也萬一有警制置一司必不能照應望令仇悆専管淮東浙西路别除制置使一員専管浙東福建路從之時江北士大夫多避地嶺南者上聞之詔帥臣監司優加存恤勒停人林杞以擅殺張政事訟於御史臺御史中丞沈與求等言把之情節終有可矜乞行改正詔把叙奉議郎乙酉詔武臣試換文資權令住罷以右正言吳表臣言天下危注意將近聞武臣欲趂秋試者甚衆蓋有舊係舉人寄名軍中者又有規免試弓馬及出戰短使者以武換文非今日事乞俟邉事寧息日施行故也詔自今臨安府遺火止令馬步軍司及府兵救撲仍預給色號他軍非奉御前處分者毋得擅出營丙戍御史中丞沈與求試吏部尚書兼權翰林學士尚書户部侍郎兼侍讀提領𣙜貨務兼修政局詳定官黃叔敖試戶部尚書試吏部侍郎兼直學士院綦崈禮與權兵部侍郎方孟卿兩易祕閣修撰都督府隨軍轉運使姚舜明權户部侍郎殿中侍御史江躋守侍御史躋之除日歷不載題名在七月必以沈與求出臺故也今附此初宗正寺所掌四書曰玉牒曰仙源積慶圖曰宗藩慶系録曰宗枝屬籍玉牒如帝紀而特詳於國書中最為嚴重建炎南渡舉四書而逸於江滸丁亥太常少卿兼宗正少卿李易請編次玉牒從之五年六月丁巳進呈是月詔潛邸祗應人自今並不作隨龍時吏士攀援推恩者衆言者引司馬光之論以謂人主獨私宫中之人則所與親者至狹况親曽遭遇之人推恩已久不應遷延至今故有是命此以今年十月四日臣僚上言增入湖廣宣撫使李綱以左朝奉郎通判全州趙志之權湖南轉運判官此以明年六月乙未薛徽言所奏修入建炎以來繫年要録卷五十六
