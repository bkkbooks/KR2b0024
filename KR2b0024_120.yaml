body:
  text: 建炎以來繫年要録卷一百二十宋李心傳撰紹興八年六月乙卯朔徽猷閣待制知信州程邁為江淮荊浙閩廣等路經制發運使専掌糴事用李彌遜議也刑部尚書兼侍讀胡交修以老求去罷為寶文閣學士知信州右承直郎鄂州武昌縣令唐時特改右通直郎以部使者列薦其治狀也既對復令還任禮部貢院奏試博學宏詞合格中等左迪功郎新鄂州武昌縣尉詹叔羲右迪功郎前建康府司法𠫭軍陳巖肖下等左迪功郎新饒州鄱陽縣東尉王大方詔叔羲大方並與堂除仍減年磨勘巖肖賜同進士出身叔羲玉山人大方麗水人巖肖金華人也丁巳諸班直換校上特御射殿戊午淮西轉運判官李仲孺言崑山場積礬千餘萬斤不售乞損引錢六分之一許之其后嵗鬻礬六十萬官買礬每斤十三錢至二十錢舊引錢每斤一百至是損之礬引分一百斤五十斤三十斤為大中小等又有韶州岑水礬嵗額十萬斤信州沿山場青膽礬黃礬無定額十四年十一月崑山礬增作三十錢一斤己未祕閣修撰知溫州樓照復為起居郎左朝請郎新成都府路提點刑獄公事李授之直祕閣授之開封人宣政間為縣令有匪人誣其有謗語坐失官趙鼎為諸生嘗從授之學鼎相辟為都督府幹辦公事擢知簡州至是獻所著易解於朝故有是命中書舍人吕夲中當制頗加稱美焉庚申詔廣西鹽嵗以二分令雷廉高化州官賣人户食鹽餘八分行鈔法尋又詔廣東鹽九分行鈔法一分産鹽州縣出賣皆不出嶺日歷無此指揮今以紹興十二年十月二十二日户部狀修入會要廣東行鈔法在十二月二十五日廣南去中州絶逺土曠民貧常賦入不支出故往時之法諸州以漕司錢運鹽鬻之而以其息什四為州用是以州租給而民無加賦昭州嵗收買鹽錢三萬六千餘緡以其七千緡代潯貴州上供赴經略司買馬餘為州用及罷官賣鹽遂科七千緡於民户謂之縻費錢焉敕令所請福建路人户以子孫或同居緦麻以上親與人雖異姓及不因飢貧並聼收飬即從其姓不在取認之限著為夲路令其江浙湖廣州縣有不舉子風俗處令憲臣體究申眀依此立法從之壬戌宗正少卿張九成權尚書禮部侍郎衍聖公孔玠避亂寓衢州詔即賜田五頃癸亥尚書左僕射監修國史趙鼎中書舍人史館修撰勾濤祕書少監尹焞著作郎兼史館校勘張嵲佐郎胡珵史館校勘鄧名世朱松李彌正高閌范如圭等上重修哲宗皇帝實録九月書成凡百五十卷乙丑御史中丞常同言近關報右奉議郎曽惇進曽祖曽布著三朝正論真迹轉右承議郎臣聞昔者神宗皇帝切於求治鋭然更化付王安石以政事安石孤負委任創為新法布於是時實為腹心其政皆出於布之謀其法皆成於布之手故自海州懷仁縣令一年半間十三遷而至於制誥安石嘗語人曰終始言新法不便者司馬光也終始言便者曽布也其餘出入而已故熙寧之初建新法者王安石始之曽布成之也逮紹聖初布與章惇蔡卞同秉大政元祐之法度委若辨髦元祐之人材棄如斷梗布內愧於私心外迫於清議乃間出一善言引一善士以求自異於衆故正論之作也雖論元祐人章疏不當編排然至於一時忠良竄斥無餘而布未嘗少假雖論瑶華不當加妃號至於掖庭祕獄疑似難眀而布未嘗略辨雖以公論為不可廢而以司馬光為詆毁以蘇轍為訕上雖論新法為不可不變而以免役為便於民凡所啓迪率皆順從之言紹述之旨而必飾小説以文之借異論以申之既欲取高位於當年又欲掠美名於後世首鼠兩端馴致建中之事遂致蔡京得以乘間而入貽禍邦家而朝廷尚尊其説頒其書於史官號曰正論臣竊惑焉雖增秩賜金固未足道而奪朱亂雅誠為可惜臣願陛下眀辨是非昭示好惡使天下之士曉然不二於趨向復宜宣諭史官筆削之際毋惑其説以至亂真庶幾一代之典足以垂信後世詔付史館丙寅上謂大臣曰吳國長公主數日前到留宫中三日為駙馬都尉潘正夫求恩數朕語之曰官爵豈可私許人須與大臣商量况今日多事未暇及此上又曰當此極暑朕每日著衣服相伴飲食蓋謂長主是哲宗之女朕之姊也趙鼎曰陛下行家人禮於宫中所以待長主之禮雖盛暑不廢至於官爵則不以私豫此帝王之公也左金紫光祿大夫守尚書左僕射同中書門下平章事兼樞密使監修國史趙鼎遷特進用實録成書也禮部侍郎權直學士院曽開當制上批諭開令具述宣仁保祐之功由是制詞中載修書夲意甚悉鼎辭不拜時祕書省著作郎何掄論哲宗舊録一書不應分前後請併紹聖元符接續修纂從之左承議郎新兩浙東路提點刑獄公事蕭振試宗正少卿秦檜引之也初湖北京西宣撫使嶽飛之在京師也其妻劉氏與飛母留居相州及飛母渡河而劉改適至是在淮東宣撫處置使韓世忠軍中世忠諭飛復取之飛遺劉錢三百千丁卯以其事聞且奏臣不自言恐有棄妻之謗詔答之戊辰接伴官范同言金使己至常州上愀然曰太后春秋已髙朕朝夕思念欲早相見故不憚屈已以兾和議之成者此也秦檜曰陛下不憚屈已講好外國此人主之孝也羣臣見人主卑屈懷憤憤之心此人臣之忠也君臣用心兩得之矣上曰雖然有備無患縱使和議已成亦不可弛兵備趙鼎曰假使金人與我河南之地亦維嚴備江南前日張建夀之説是也參知政事劉大中曰和與戰守自不相妨若専事和而忘戰守則墮敵計中耳樞密副使王庶時在合淝上疏曰臣聞無故請和者謀也究觀金國侵軼已逾一紀前此乘戰勝之勢以至江淮而我未嘗有一日之捷逮至紹興甲寅冬蕃偽深入駐兵淮南陛下親征至使奔潰而去又丙辰冬敵人傾國南侵陛下再統六師進於江淮之間皇威大振蕃偽皆有所畏於是遣使告我以徽宗皇帝顯肅皇后訃音彼若果敦鄰好則所報訃音不應在纍年之後必畏長驅而往故以此謀沮師陛下天資聖孝哀毁之中即遣使往以求梓宫往返之間一年半矣尚未聞梓宫之至固已落彼之姦又聞去年金國以欺詐廢豫偽庭用事之人奔散四走莫能自保百姓上下日望我兵之至諸帥之在中都者如居積薪之上而火未然勢之傾危未有易於此者若我一搖足則中原非彼所有所以姦謀祕計不得不遣使也從違之間可不深思而熟計之臣中夜以思使人之來其甘言啖我不過出於二策一則以淮為界一則以河為界以淮為界乃我今日所有之地而淮之外亦有見今州縣所治如泗州漣水軍是也既為我有安用以和為請若以河為界則東西四千里兵火之餘白骨未斂幾無人迹彼若誠實與我既得其故地非若偽豫之不恤尚當十年無征役以蘇其凋瘵財賦既無所從出所責嵗賂無慮數百萬若欲重斂諸路困弊已極安可取以充溪壑之欲利害曉然而不先為之慮則三十萬兵宿於無用之地假以嵗月是彼不必征伐而我數年之間終於自斃彼之為計可謂盡善而我之為國未有若是之踈也臣願陛下先與在廷之臣立為一定之論若以淮為界其所請之賂必少以河為界其所請之賂必多或多或寡未繫國之利害願以凋弊之極為言彼若以生靈為念當告之以河南之地偽豫暴斂之甚必使之蘇息然後可漸責稅賦其嵗賂須五年之後方能津遣若或見從則彼之議和方見誠實如或不然則彼以計困我既使我不敢用兵而又於困窮之際重取嵗賂是彼無所施為而坐收成功其為謀深矣疏入不報庶又言臣聞敵中自廢豫之後遼人與漢人上下不安日夕思變前此歸正者甚衆其驗可見彼知其屯戍不足又旋起簽軍以實疆場其所起之人又非昔日簽軍之比老弱盡行人心乖離抑又甚焉緣此嶽飛近與臣咨目稱今嵗若不舉兵要納莭請祠韓世忠亦以為然臣方欲到榻前縷細開陳今聞使人入境彼到闕廷必大有須索若以梓宫為言則設如得歸事在來年又詐偽未易可保今陵寢皆在敵境豈特徽宗顯肅兩梓宫而已若以割淮畫河議和兩淮我見有之以大河之南千里邱墟得之須兵屯守事力支持不行是所謂非徒無益而又害之也若果以此三説欵我亦不可遽絶之但將嵗幣多説艱難非五年之後不可或渠委曲見從其詭祕尤未易可料切望斷自宸衷出臣此章與大臣熟計之無落彼姦天下幸甚既而庶聞烏凌阿思謀已至境又奏曰臣聞前此敵中遣使人率皆傲慢無禮必多受金幣方少恭順如此人到恐徇前轍望陛下先遣人諭旨以朕見在諒隂聞使人即至悲慟哽噎殆不能堪以此為辭不須遽令朝見恐有商量事且令趙鼎等處商量如此則少破其姦謀又得徐觀趨向在我乃為得體在彼須少挫抑爾事與大臣議之無所不可惟是王倫深為不然彼欲朝廷曲從金人以成一已之私此不逹大體前日已稱有廢豫之功如此一事至易可見尚敢誕謾其餘何所不至望深賜聖察直祕閣奏迎梓宫副使高公繪先歸至臨安從義郎劉鐸自偽地結官兵百餘人來歸詔遷一官庚午詔故左朝請郎直龍圖閣知虔州張觷特與遺表恩澤一名觷至郡未踰嵗而卒州人言觷乘孫佑之後諸盜周十隆等相繼束身自歸前後守臣實所不及故優恤之辛未監察御史張戒言今日議和理有可得者有必不可得者畫大河為界復中原還梓宫歸淵聖此必不可得者也各務休兵音問往復或歸吾太后此或可得者也兩國之議和猶兩家之議婚姻也家聲不敵雖有良媒決不能諧婚姻之好國勢不敵雖有金使決不能解侵伐之兵金強我弱國勢殊絶事之可否豈在一使人之口易者可得而難者必不可得理則然耳又曰我今未有以勝金初非憚我金一執劉豫而自有中原乃遣王倫回揚言講和且有復中原還淵聖歸梓宫之説此政所謂無方之禮無功之賞禍之先也臣揣敵情若非欲襲我則恐我乘其未㝎耳是皆欵我之意而奈何信之中原之復不復梓宫之還不還淵聖之歸不歸一言可決遷延往復事已可知敵國愚弄使人誕謾臣恐不足以講和適足以招敵復中原還梓宫歸淵聖臣子之心孰不願然以兵取之則可以貨取之則不可非惟不可亦必不得設或得之不過如童貫買燕雲之地金人暫去復來財與地卒兩失之爾自古豈有兵不能勝而貨財可以却敵復國者必兵強而後戰可勝戰勝而後中原可復梓宫可還淵聖可歸苟力或未能則勤修闕政嚴設邉備可也不知務此而聼其枝詞逰説僥幸萬一欲中原無故自復梓宫無故自還淵聖無故自歸不勞力而坐享成功臣竊以為過矣事之必不可者臣既力言之其或可者臣亦妄為陛下謀之物之可者與之其無猒之求不可與也禮之可者從之其非禮之辱不可從也夫強國之欲無厭而弱國之物有限不稍執綱紀而一切畏懦順從亡之道也臣竊謂金使之來朝廷當以大義正色裁之而嚴兵以待之書詞之慢姑委曲謝之使人之倨可勿見也又曰自古伐人之國得其家而歸之者易得其君而歸之者難君之去來係於勝負而家則無與於事理勢固然金人貪婪惟利是視太后在彼於金初無損益陛下若刻意圖之或有可歸之理然亦須國勢稍振兵力稍強乃可望爾齊弱周強而宇文護之母遂歸况陛下尚有大半天下欲報之德昊天罔極可不勉哉川陕宣撫副使吳玠遣右朝議大夫直祕閣夲司主管機宜文字高士瑰來奏事上召見後十日進士瑰官職各一等遣還壬申上特御射殿引見禮部合格舉人黃公度已下遂以南省及四川類試合格舉人黃貢等共三百九十五人參定為五等賜及第出身同出身奏名林格已下出身至助教公度莆田人貢仁夀人也癸酉宰相趙鼎等上諸班直親從親事官轉貟勑令格是日樞密副使王庶自淮西還行在先是庶將還朝未至復上疏言宴安鴆毒古人戒之國家不靖疆埸患生敵人變詐百出自渝海上之盟至於今日其欺我者何所不至陛下所自知也豈待臣言今也不知宴安鴆毒之戒將信其愚弄臣不知其可也今其誠偽以陛下之聖固難逃於臨照夫商之高宗三年不言其在諒暗言猶不出其可以見外國之使乎先帝北征而不復天地鬼神為之憤怒能言之類孰不痛心陛下抱負無窮之悲將見不共戴天之讐其將何以為心又將何以為容亦將何以為説願陛下以宗社之重宜自兢畏思高宗不言之意無見異域之臣只令趙鼎而下熟與計事足以彰陛下孝思之誠而於國體為宜臣恭依詔旨見今兼程前去奏事誠恐臣萬一未到之日金使先已授館陛下不疑而見之敢布腹心伏惟聖慈採聼天下幸甚又曰言金使入境經過州郡傲慢自尊略無平日禮數接伴使欲一見而不可得官司供帳至打造金盞輕侮肆志略無忌憚臣聞自古謀人之國者必有一定之論越之取吳在驕其志而已秦之取六國在散其從而已其間雖或出或入而一定之論未嘗易也金人所以謀人之國者曰和而已觀其既以是謀契丹又以是謀中國方突騎陵闕初以和議為辭暨大兵圍城又以和議為辭二聖播遷中原板蕩十餘年間衣冠之俗蹂踐幾遍血人于牙吞噬靡厭而和議未之或廢也今王倫迎奉梓宫爾而受金人和議以歸且與其使俱來此為可信不可信乎劉豫雖云僣竊正名號者七八年一旦逐去金人慮中原百姓或有反側陕西叛將或生顧望吾一日出師必有應者以此設為講和之説仍遣使焉所以欵我者昭然無疑矣臣蒙陛下親擢備位夲兵國之大事不敢隱默故重為陛下陳其三䇿上䇿莫如拘其使者彼怒必加兵我則應之所謂善戰者致人而不致於人是也金人強大自居一旦或拘其使出於意表氣先奪矣其敗可立而待其次願陛下念不共戴天之讐堅謝使人勿相與見一切使指令對大臣商議然後徐觀所向隨事酬應最其次姑示怯弱待以厚禮俟其出界精兵躡之所謂掩其不備破之必矣凡此三䇿臣晝夜經度慮不出此倘陛下採其荒唐用濟機會則臣於兹事或可陪在廷之末議或以臣言為濶誕不切於事則臣之智思窮於是矣不敢復有論説也臣頃與邉臣大將議論皆云若失今日機會他日勞師費財決無補於事功至有云今年不用兵乞納莭致仕者觀此則人情思奮皆願為陛下一戰望陛下英斷而力行之乙亥起復武信軍承宣使行營中護軍統制軍馬張宗顔知廬州主管淮南西路安撫司公事右武大夫開州團練使知廬州兼淮西制置副使劉錡以所部屯鎮江府初王庶自淮上歸命宗顔以所部七千人屯廬州命中護軍統制官巨師古以三千人屯太平州又分京東淮東宣撫處置使韓世忠二軍屯天長及泗州使緩急互為聲援徙錡屯鎮江為江左根夲時朝廷以諸將權重欲撫循偏禆以分其勢俊覺之謂行府錢糧官右通直郎新監行在𣙜貨務劉時曰鄉人能為我言於子尚否易置偏禆似未宜遽先處已可也不知身在朝廷之上能幾日庶聞之曰為我言於張十不論安與未安但一日行一日事耳俊不恱時秦州人也此以張戒默記增修但戒稱大理寺丞劉時則小誤時今年七月方除大理熊克小歷記宗顔移屯在五月丁未巳前亦誤按日歷載此日所降指揮云熊克候張宗顔廬州交割職事訖前來鎮江府駐劄則非庶五月初在淮上所遣可知今並附本日庶不抵牾丙子上諭大臣曰昨王倫對云金使烏凌阿思謀説國書中須是再三言武元帝海上通好事庶得國中感動朕因記當時尼瑪哈輩不肯交燕雲皆欲用兵惟阿古達以謂我與大宋海上信誓已定不可失約待我死後由汝輩卒如約阿古逹乃所謂武元者也以此知創業之人設心積慮必有過人者初行朝聞思謀之來物議大訩羣臣登對率以不可深信為言上意堅甚往往峻拒之或至震怒趙鼎因請間密啓上曰陛下與金人有不共戴天之讐今乃屈體請和誠非美事然陛下不憚為之者凡以為梓宫及母兄耳羣臣憤悶之辭出於愛君非有他意不必以為深罪陛下宜好謂之曰講和誠非美事以梓宫及母兄之故不得已而為之議者不過以敵人不可深信但得梓宫及母兄今日還闕眀日淪盟吾所得多矣此意不在講和也羣臣以陛下孝誠如此必能相諒上以為然羣議遂息趙鼎語以鼎事實修入按王庶奏疏所稱趙鼎首鼠兩端當是指此等語也惜哉詔今後除六曹尚書未應資格人依元祐例帶權字賜俸如正侍郎滿二年取旨左奉議郎馮時行特轉一官時行知丹陵縣以楊晨薦得召對時行見上言金人議和何足深信必緣初廢偽齊人心未固深恐陛下乘其機會殄滅有期如奉迎梓宫在陛下之心至切至痛故以為辭延引嵗月待其撫循既定狡計既生然後牽其醜類送死未逺陛下可否逆照其情深為之備臣切見以前備禦尚為踈濶自建康以屬海道臣非親見不敢妄陳自西蜀以至江東臣請論之吳玠一軍在梁洋之間凡五千餘里至鄂州始有嶽飛又三千餘里至建康始有張俊陛下雖以淮為屏障然東南形勝實在長江今嶽飛屯鄂渚實欲兼備江池襄陽有警比嶽飛得聞往返三千里束裝辦嚴非一月不至荆襄而敵騎近在京西輕軍疾馳不數日而遂涉江漢萬一舉偏師向江池連綴嶽飛而以大軍向襄陽中斷吳蜀當是時吳玠不能捨梁洋而下嶽飛不能捨江池而上敵騎盤泊荆南可以控據上流震驚吳會或徑趨潭鼎橫涉饒信可以直乘空虛擾我心腹備禦如此似亦疏矣臣願陛下先事制勝選知兵大臣分重兵以鎮荆襄倉卒有警荆襄事力足當一面而嶽飛得専力於江池之間若兵有統不可遽分亦宜嚴戒嶽飛及兹無事預思方略上諭以為親屈已之意時行引漢祖故事言之上慘然曰杯羮之語朕不忍聞因顰蹙而起乃命進秩擢時行知萬州時行除郡在八月乙卯丁丑金國人使福州管內觀察使太原府少尹河東北路制置都總管烏凌阿思謀中散大夫太常少卿騎都尉石慶克入見思謀至行在上命與宰執議事於都堂思謀難之欲宰相就館中計議趙鼎持不可思謀不得已始詣都堂然猶欲以客禮見輔臣鼎抑之如見從官之禮鼎步驟雍容思謀一見服其有宰相體鼎問思謀所以來之意曰王倫懇之問所議云何曰有好公事商議鼎曰道君皇帝諱日尚不得聞有何好公事又問地界何如曰地不可求聼大金所與時執政聚廳惟王庶不之顧鼎因與思謀議定出國書之儀思謀氣稍奪將對鼎奏曰金使入見恐語及梓宫事望少抑聖情不須哀慟上問何故鼎曰使人之來非為弔祭恐不須如此及見鼎與諸大臣洎管軍楊沂中解潛皆立侍殿上閣門引思謀等升殿上遣王倫傳旨諭曰上皇梓宫荷上國照管又問太后及淵聖聖體安否因哽咽舉袖拭淚左右皆飲泣思謀曰三十年舊人無以上報但望和議早成上又諭曰記舊人必能記上皇切望留意思謀退遣倫就驛燕之徐夢莘北盟會編云思謀引見禮甚倨上問朝廷數遣使議和不從今忽來和何也思謀曰大金皇帝仁慈不欲用兵恐生靈塗炭上曰俟朝廷議之思謀請上自決上令思謀退館以俟按此所云與日歷不同今從日歷翰林學士兼侍讀兼資善堂翊善朱震疾亟上奏乞致仕且薦尹焞代為翊善夜震卒年六十七中夕奏至上逹旦不寐戊寅輔臣奏事上慘然曰楊時既物故胡安國與震又亡同學之人今無存者朕痛惜之趙鼎曰尹焞學問淵源可以繼震上指奏牘曰震亦薦焞代資善之職但焞微瞶恐教兒童費力俟國公稍長則用之乃詔國公往奠賜其家銀帛二百匹兩例外官子孫一人又命户部侍郎向子諲治其喪事朱勝非秀水間居録云先是章誼劉大中朱震皆可遷執政宰相趙鼎以誼守建康會當省試引故事以震知貢舉既鎖院大中遂作參知政事震聞之即病謁告出院不復供內職纍章求去詆誚鼎與大中初章求外祠次章復求行在宫祠顛錯可駭先是鼎初相以其姻家范沖與震同兼資善堂為鼎求結近閹鼎罷沖亦去震如故及其復相震自以為於鼎有功意圖執政至是大失望怨鼎刻骨月餘疾危猶作詩詆鼎遣人傳示遂不起一執政死二從臣可歎也以事考之此説雖不為無據然大中以三月庚寅除參政而鼎四月壬午方知貢舉勝非實誤又所云交結近閹等事疑出於忿辭今不取上命國公奠震及向子諲治喪它書不見惟子諲奏疏及張九成家傳及之例外與震家恩澤在八月己未祕書省正字孫道夫為校書郎道夫入館踰再嵗至是始遷之己卯御史中丞常同論新知蘄州李允武有贓因言户部郎官錢觀復除郎不當上曰郎官輕以豫人雖蔡京王黼不至是也趙鼎造膝具言觀復無過且求去上曰卿不須爾言官易得宰相難求時同之眷已衰矣熊克小歷紹興八年五月中丞常同論新知蘄州錢觀復除郎不當按祕書省題名錢觀復八年三月除祕書郎五月遷户部貟外郎此云觀復自新知蘄州除郎恐誤日歷八年五月癸丑李允武差知蘄州替張旦年滿闕六月己卯御史中丞常同奏李允武差知蘄州指揮更不施行恐此自是二事更須求他書考之辛巳詔吏部審量崇觀以來濫賞比類名色九項依去年九月辛酉詔旨施行用夲部請也此以王次翁劄子修入日歷無之起居郎樓照起居舍人勾龍如淵並試中書舍人壬午中書舍人吕夲中兼權直學士院時將遣金使禮部侍郎兼直學士院曽開當草國書乃言遲暮廢學志力俱衰凡有撰述動繫國體乞免兼權直職事上欲用勾龍如淵趙鼎力薦夲中乃有是命癸未給事中兼侍講吳表臣試尚書兵部侍郎兼資善堂翊贊中書舍人兼史館修撰勾濤試給事中是日户部侍郎向子諲入見因論京都舊事其言頗及珍玩中書舍人潘良貴故善子諲至是攝起居郎立殿上聞其言甚怒既而子諲奏金國遣使當審度情實報聘不可墮敵計中宜飭邉臣嚴備又奏朱震之亡陛下令建國公往奠師道久廢今陛下崇儒尚德如此實可以風化天下上因諭以震與楊時胡安國皆學有淵源深於春秋且論先儒異同之説及震薦尹焞為安國請諡等事子諲反覆良久良貴不聞其餘語怒甚徑至榻前厲聲曰向子諲以無益之言久勞聖聼上語未竟子諲不為止良貴叱之退者再焉上驚而怒欲抵良貴罪甲申子諲請致仕右正言李誼亦奏良貴罪此據勾龍如淵退朝録未見章疏御史中丞常同奏良貴疾子諲曼詞衆以為直不可罪之願許子諲補外上詰同曰子諲之二版曹乃卿所薦今良貴犯分沽激復上章稱述何也於是上欲併逐同權禮部侍郎張九成為上言臣比聞良貴廷叱子諲甚懼因就問之良貴曰日旰暑甚子諲久對而朝膳未進良貴懼勞聖躬遽前叱之不覺聲之厲也上曰良貴用心乃爾又曰三人得無不相能否九成曰良貴嘗為臣言子諲佳士子諲亦云且得子賤在朝子賤良貴字也以此知二人初無不相得者上曰常同嘗薦子諲今反論之九成曰常同亦嘗薦臣同之事臣不當言然前日之薦以子諲之才可薦也今日之事乃國體也上意稍解九成因曰近朱震死陛下命國公往奠又命子諲治其喪尊師重道天下嘆仰且士大夫所以嘉子諲者以其能眷眷於善類也今以子諲之故逐柱史又逐中司非所以愛子諲也上批諭同同言不已於是三人卒俱罷秀水間居録云向子諲進不以道交結北司頗事貢獻一日對甚久論説珍玩之物云云不已潘良貴不能平叱子諲退於是良貴罷與外祠中丞常同言良貴忠直不應去前此同於上前薦子諲蓋觀望北司也至是上責其反復按子諲多為善類所與此云交結北司未詳趙甡之遺史曰先是秦檜向子諲范同請與金人議和魏矼常同慮其詐和請善備之潘良貴請戰上命侍從官共議子諲執講和之説良貴大叱之及同奏事子諲與良貴交爭於殿上上知同為子諲辟客必助子諲也因顧問同同乃以講和為非而以良貴為是大忤上旨張九成行述云向子諲陛對云云翌日公侍金華因奏其事按九成今年八月丙寅方兼經筵今削去此四字或移附八月亦可是月顯謨閣直學士知漳州辛炳卒是夏金左監軍薩里罕自長安歸雲中元帥府下令諸公私債負無可償者沒身及妻女為奴婢以償之先是諸帥回易貸緡遍於諸路嵗久不能償會改元詔下凡債負皆釋去諸帥怒故違赦復下此令百姓怨往往殺債主嘯聚山谷焉建炎以來繫年要録卷一百二十建炎以來繫年要録卷一百二十金人地名考證烏凌阿原書作烏陵誤改見卷一尼瑪哈原書作粘罕誤改見卷一阿古逹原書作阿骨打誤改見卷一薩里罕原書作撒離喝誤改見卷十一
