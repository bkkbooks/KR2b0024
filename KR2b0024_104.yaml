body:
  text: 建炎以來繫年要録卷一百四宋李心傳撰紹興六年八月丙申朔詔寺監正丞博士司直評事六院倉場庫務編刪計議官並去替半年方許差人已除未到人並别與差遣願就祠廟者聽議者言今日用人之塗自郎吏而上莫匪遴選其下則有寺監丞一等蓋以待資望未深初召用者率三四人守待一闕使其才可用將試之於數年之後是姑以虛名豫之願詔大臣略行措置使天下之士才能有聞者得效所長毋使棲遲羈旅終以待闕而去庶幾人才輩出宏濟多難故有是㫖戊戌右迪功郎權滁州軍事判官林珦特改右承務郎以薦對也權户部侍郎王俁言近年以來諸路監司被受朝省指揮玩習太甚恬不為意且以事干財用者言之有坐待措置而踰年不報者移用錢數是也有逐季比較而全年不開具者住賣錢數是也有責令樁管而二年不具數者上供錢物是也有許令蠲减而二年不核實者逃閣之數是也至於稅場增分酒務立額擅使獻納錢拋失綱運米如此之類不可殫數雖省部舉催他司究治鄰路取勘終無結絶大抵或欲欺隱錢物或欲庇護官司或欲遷延嵗月或出于懈慢或出于無術故頑者付之以不報黠者雖報而不盡其視符命蓋蔑如也欲望明詔大臣應諸路監司廢弛鹵莽乖謬出限違缺等事令六曹類聚申尚書省委官看詳擇其尤甚者顯責一二自餘嚴立之期尚或稽違必罰無赦庶幾少警外服以稱陛下孜孜圖治之意詔如所奏每季類聚申尚書省委左右司看詳將稽滯最多去處取㫖重行黜責樞密院檢詳諸房文字王迪言道州丁米一丁有出四斗者腳乘之費不與臣聞閩廣之間往往有不舉子之風以成丁之後還為家害故法雖設而莫能禁願詔有司講求諸路丁錢丁米之數隨田稅帶納非小補也乃命諸路漕司具本路有無丁錢丁米及如何催理申尚書省己亥觀文殿學士新知紹興府秦檜入見命坐賜茶吉州萬安縣丞司馬宗召添差兩浙路轉運司幹辦公事先是翰林侍讀學士范沖入對言司馬光家屬向者伏䝉聖慈月給錢米故得存在至今切惟光為國宗臣逺近中外言及之則以手加額功在社稷澤在斯民今奉祀之主行路之人莫不哀之宜有以賑恤昭示四方為忠義之勸光族系單寡目今止有族曾孫宗召一人難以使之出繼欲乞令宗召權主光祀特與添差就近一合入差遣光名德顯著其後衰絶如此朝廷特恩不容有援例者故有是命初光孫植既死立其再從孫稹為嗣而稹不肖其書籍生産皆蕩覆之有得光記聞者上命趙鼎諭冲令編類進入冲言光平生記録文字甚多自兵興以來所存無幾當時朝廷政事公卿士大夫議論賔客逰從道路傳聞之語莫不記録有身見者有得于人者得于人者注其名字皆細書連粘綴集成卷即未暇照據年月先後是非虛實姑記之而己非成書也故自光至其子康其孫植皆不以示人誠未可傳也臣既奉詔㫖即欲略加刪修以進又念此書已散落於世今士大夫多有之刪之適足以增疑臣雖不敢私其能必人以為無意哉不若不刪之為愈也輒據所録疑者傳疑可正者正之闕者從闕可補者補之事雖疊書而文有不同者兩存之要之此書雖不可盡信其有補治道亦多矣於是冲衰為十冊上之其書今行於世上因覽冲奏謂鼎曰光字畫端徑如其為人朕恨生太晚不及識其風采耳觀文殿學士左通議大夫提舉臨安府洞霄宫范宗尹薨于台州年三十七訃聞贈特進輟朝二日令所屬量給葬事庚子集英殿修撰權都督行府𠫭議軍事劉子羽祠部貟外郎都督行府主管機宜文字熊彥詩撫諭川陕還至行在新除權禮部侍郎何慤亦自行府歸上皆召見之左司諫陳公輔入對上奏曰臣聞人君所以得天莫先於孝所以得民莫先於誠今二聖北征逺在沙漠願陛下跬步在念斯須不忘焦心勞思以圖恢復期於報父兄之讎雪積年之恥若乃前日懷姦罔上陷吾親至此不忠不義負國之徒吾痛恨之殺而勿貸可也今日有竭忠盡力削平僣亂俾廟社復安庭闈無恙必思所以厚報之庶幾復還兩宫得以盡問安侍膳之禮如此用心孝斯至矣用兵以來勞民費財願陛下誠意惻怛孚于四方雖曰取之不敢不以道雖曰用之不敢不知節凡一金之細一縷之微未嘗妄有所費也其間貪吏猾胥並緣為姦重害於民者吾痛懲之罰而勿赦儻能體國愛民撫循不擾俾均而無貧勞而無怨必思所以重賞之事平之後庶幾與民休息盡罷無名橫斂如此用心誠斯至矣中興根本不出于此願陛下守之而勿失行之而不倦實宗社之福生靈之幸疏奏上大感動是日詔公輔論奏深得諫臣之體可賜三品服令尚書省以其奏疏修寫成圖進入白身穆松年特補承信郎添差監秀州都酒務先是兵部侍郎司馬朴在燕遣松年間行以敵情來告故官之饒州童子梁璵賜束帛免文解一次璵年十嵗能誦五經及七書射鵠六發四中直祕閣王庭秀卒辛丑選人文旦循二資進士崔岩補上州文學岩子方子也先是上遣中使持子方春秋解命學士朱震校正而中書以旦所上春秋要義付震看詳震言旦博採衆說以明聖經非篤志此學積之嵗月不能成書子方一時名儒獨抱聖經閉門講學專意著述自成一家非特立獨行之士不能如此子方雖沒其後尚存望賜旌褒以勸來者故有是命子方已見建炎二年六月癸卯徽猷閣直學士兩浙都轉運使李逮進職四等為四川都轉運使都大提舉茶馬賜銀帛三百匹兩令臨安府差從卒百人自襄郢便道星夜之任徽猷閣待制四川都轉運使趙開俟逮至將本司財賦文籍交割訖赴行在所先是開復與制置大使席益不和抗疏乞將舊來宣撫司年計應副軍期但干錢物並不許他司分擘支用又指陳大使司截都運司錢就果閬利州糴米非是又言應副吳玠軍須紹興四年總為錢一千九百五十五萬七千餘緡五年視四年又增四百二十萬五千餘緡蜀今公私俱困四向無所取給事屬危急實甚可憂乞許以茶馬司奏計一赴行在庶得盡所欲言又言軍務惟錢糧最為要切欲乞自都督府節制其調發則無輕舉妄動枉費錢糧虧損威勢自都督府節制其用度則將兵請給皆可核實裁處量入為出公私無由困弊即今公私俱困弊無所措手矣朝論悉言開與玠益不可共事故有是命集英殿修撰劉子羽復徽猷閣待制知泉州子羽自川陕歸言敵未可圖宜益治兵屯田以俟機會時張浚以淮西宣撫使劉子翼驕惰不肅密奏請罷之而欲以其軍屬子羽子羽辭乃命出守熊克小歷載此事於明年四月末蓋誤甲辰手詔曰乃者強敵紊常阻兵軼界兩宫北狩六馭南巡霜雪十年關河萬里朕為人之子而雞鳴之問不至為人之弟而鴒原之難不聞眷言臣子之心誰無父兄之念而又干戈未息疆埸多虞遣戍經時不離甲胄飛芻越險久棄室家爾則效忠朕寧不愧是用當饋投七未明求衣弗辭馬上之勞以便軍中之務諒彼同舟之衆知兹發軔之情咨爾有官各揚其職布告中外悉使聞知時張浚自江上歸浚到行在未見本日日歷八月九日甲辰張浚放告謝蓋浚以內引故修注官不書也力陳建康之行為不可緩朝論不同上獨從其計先是三大帥既移屯而湖北京西宣撫副使嶽飛亦遣兵入僞地僞知鎮汝軍薛亨素號驍勇飛命統制官牛臯擊之擒亨以獻引兵至蔡州焚其積聚眉州布衣師維藩治春秋學纍舉不第至是赴行在上中興十䇿請車駕視師上下其議於朝浚以為可用㑹諜報劉豫有南窺之意趙鼎乃議進幸平江趙鼎事實曰是秋探報實有南窺之意乃議前期幸平江就近應接張浚先在江上已令張俊城盱眙移軍居之鼎謂非便浚堅欲為之鼎以其行府措置不欲力爭每為上陳其利害云詔百司隨從人比四年三分减一應軍旅非泛支降錢榖差出並隨行在所處分其餘百司常程事務留臨安府聽行宫留守司豫决內有不可豫決者即申奏行在所修武郎王恪為閣門祇候知隨州海賊鄭慶鄭廣並補保義郎慶受福建安撫使張致逺招安故有是命其徒十九人授官有差乙巳詔權主管侍衛馬軍司公事兼權殿前司解潜以所部精鋭千人扈從權主管步軍司公事邊順留臨安府彈壓兼治殿前馬軍司事務丙午新除權禮部侍郎何慤充集英殿修撰知瀘州慤引嫌力辭故有是命左朝請郎知巴州勾濤為尚書兵部貟外郎濤新繁人少從張商英游至是以范冲薦得召濤入對具言今日首行嘉祐之法次舉元祐之政既用其法當究其意既究其意當行其實上稱善顯謨閣直學士知臨安府梁汝嘉為巡幸隨駕都轉運使直顯謨閣新除兩浙運副使李謨升直寶文閣知臨安府丁未觀文殿學士新知紹興府秦檜充醴泉觀使兼侍讀行宫留守觀文殿學士提舉臨安府洞霄宫孟庾提舉萬夀觀兼侍讀行宫同留守權許赴尚書省治事時檜留行在未去也趙甡之遺史云秦檜為行宫留守張浚薦之也初與孟庾皆除留守而同為觀文殿學士庾以先除欲居檜上檜曰檜嘗為宰相公執政耳檜宜居上爭久不定奏取㫖乃以庾為副按二人同日並除而檜先入謝庾後數日方至又除目已帶同字八月丁巳續降㫖秦檜孟庾並日下供職與甡之所云全不同當考詔景靈宫神御令溫州四孟行禮俟還臨安日如舊戊申手詔賜沿江諸帥曰天地之大義莫重于君臣堯舜之至仁無先於孝悌一自衣冠南渡敵馬北侵五品弗明兩宫未返念有國有家之道必在正名盡事父事兄之誠詎宜安處將時巡於郡國以周視於軍師爾其慎守封圻嚴戒侵擾䖍共乃職謹俟朕行是日湖北京西宣撫司第四副將武經郎楊再興引兵復西京之長水縣右中大夫提舉台州崇道觀黃潜厚卒詔侍從官更互赴行在所供職時户部侍郎王俁先往平江措置于是兵部尚書劉大中翰林學士朱震侍讀學士范冲中書舍人陳與義董弅工部侍郎趙霈起居郎張燾侍御史周祕左司諫陳公輔右司諫王縉監察御史趙渙劉長源左司郎中耿自求右司貟外郎徐林樞密院檢詳諸房文字王迪編修官孫汝翼吏部貟外郎黃次山鄭士彥尸部貟外郎周聿比部貟外郎薛徽言太常少卿林季仲博士黃積厚皆從仍以大中兼權吏禮部尚書霈兼權户刑部侍郎又命祕與殿前司統制官趙密彈壓舟船帶御器械劉錡與管軍解潜同總禁衛時吏部侍郎吕祉户部侍郎劉寧止中書門下省檢正諸房公事張宗元右司貟外郎范直方皆為行府屬而新除起居舍人吕本中未至行在近臣之留行宫者惟吏部尚書孫近侍郎晏敦復刑部尚書胡交修中書舍人傅嵩卿左司貟外郎樓照殿中侍御史石公揆監察御史蕭振李誼而已按耿自求此時以左司兼權給事中尚書兵部侍郎胡世將充徽猷閣直學士知鎮江府世將引疾乞祠章再上乃命出守庚戍廣東經略安撫使連南夫言去朝廷逺如遇經制盜賊事不可待報者乞許便宜施行訖以聞從之吏部尚書兼權翰林學士兼侍讀孫近充龍圖閣學士復知紹興府從所請也徽猷閣待制程昌㝢落職昌㝢守江州為漕臣逄汝霖等所劾詔南康軍治罪而昌㝢亦上奏自辨且詆汝霖等不法至是獄成法寺當昌㝢公罪徒罰金上命貶秩後省言昌㝢初自秉義郎以鄧洵仁繳進詩頌特換京官嘗為吏部審量其守鼎州拒寇無功及移九江恣橫廢法望别議罪故有是㫖事租在去年八月癸卯辛亥太廟神主發臨安殿中侍御史石公揆言今者車駕巡幸措置約束務從簡省如陳設之具已有儀鸞舟船牽挽已有兵梢膳羞之奉不過隨宜切恐所過州縣帟幕供帳極於侈靡舟船人夫煩於調發飲食膳羞過求珍異以至應副百司極其所須以為己功不恤民力皆非陛下恭儉愛民之意伏望戒飭州縣勿為侈費若排辦大過有苦于百姓者令監司按劾從之壬子直寶文閣川陕宣撫司參議官陳逺猷充祕閣修撰四川轉運副使朝廷以吳玠與計臣不和故用其幕客為副焉癸丑徽猷閣待制樞密都承㫖兼都督行府參議軍事郭執中卒上覽遺表歎息特贈徽猷閣直學士賜其家銀帛二百匹兩張浚曰執中崇寧初以上書邪等禁錮二十年晚乃遭際陛下而年齒已老不得為陛下收尺寸之效上曰不知當時入邪等者以何事趙鼎曰凡蔡京蔡卞所惡者皆入邪等折彥質曰蔡卞以紹述為說其所斥己者盡誣以誹謗先帝上愕然曰太上皇帝內禪之初嘗遣梁師成宣諭淵聖皇帝云朕聞司馬光為前朝名相今日朝廷諸事但當以光為法然則上皇之意固可知矣且如朕今所施行與上皇時豈無修潤者要之一切從百姓安便而已百姓安便乃是上皇之意也執中黨籍餘官第七十五人龍圖閣直學士提舉江州太平觀耿延禧卒于溫州以元帥府屬官特贈龍圖閣學士賜其家銀帛二百匹兩甲寅秦檜入見命坐賜茶江西都轉運使趙子淔言龍泉縣民抗拒不納稅賦官物詔有官人特勒停餘人杖一百有䕃人仍不用䕃又一月不足並送逺惡州軍編管其後間如此行之日歷無此今以十月十九日江西運司檢凖狀增入丙辰中書門下省請尚書省應給降𠡠劄並依舊式給降內𠡠添用中守階銜六曹諸官司申省及承受詞狀內有格法合取㫖事並請畢送不須取㫖事並隨事批劄行下又詔應章奏房舍進入用寶降奏出狀不候畫寶先次作奉御寶留守司用印付所屬施行皆用中書請也按此條文義未明疑有脫誤直徽猷閣兩浙西路提㸃刑獄公事宇文時中升直寶文閣知湖州丁巳詔權罷講筵俟過防秋日如舊以右司諫陳公輔言扈駕從官貟數不多又當道路之間講讀故事皆所未暇故也左朝散郎馮楫試宗正少卿戊午孟庾入見命坐賜茶大食蕃客蒲囉辛特補承信郎仍賜公服履笏以福建市舶司言囉辛所販乳香直三十萬緡理宜優異推恩故也己未寧州觀察使提舉萬夀觀韋淵為德慶軍節度使充觀使户部乞依四年例預借江浙民户來年夏稅紬絹之半盡令折納米斛約可得二百餘萬庶幾儲蓄稍豐詔本部勘當於是兩浙紬絹各折七千江南六千有半以米斛價例紐折每匹折米二石户部勘當到事理日歷不書今以九月十七日王縉乞不收頭子錢劄子并九月二十七日中書門下省勘會别立米價指揮增入白身吳琰補保義郎琰玠從弟自陕西來歸故録之是日監察御史劉長源面對奏疏曰臣竊謂致治之道莫先於用人用人之道莫先於核實不可懷愛憎以為去取不可徇朋黨以忘賢愚不可信毁譽以為進退或謂應係元符以前人臣之子孫皆可用臣恐其失近於官人以世而其人未必皆賢夫以房元齡為賢相而其子遺愛預叛逆之誅盧奕為忠臣而其子杞居姦邪之列况不逮元齡與奕而可保其子孫盡賢乎茍曰盡賢則不賢者冒濫於其間而人莫敢言矣或謂應係崇寧以後人臣之子孫皆不可用臣恐其失近於罰及其嗣而其人未必皆愚夫以郤芮有謀弒晋文公之罪而子缺有獲白狄之大功李義府有議立武昭儀之姦而子湛乃復中宗之良佐况不為芮與義府而可誣其子孫盡愚乎茍曰盡愚則賢者隱晦於其中而人莫敢舉矣臣嘗究前代明君之選任賢臣之進戒唯孜孜切切以辨君子小人為要凡親賢臣逺小人則國無不興隆親小人逺賢士則國無不衰替其所謂家世實不繫於人才之賢愚與天下之治亂亦明矣至若封倫裴矩其姦足以亡隋而其智反以佐唐李績許敬宗在太宗時則致治而在髙宗時則致亂是所用之人不易一身可使為治可使為亂其故何哉兹乃人君善持用人之柄馭得其道以君子制小人而莫不為吾之用則其為治亂又在人君之操術焉臣敢併持是說以為獻伏兾陛下以判君子小人為先而濟以駕馭之術勿拘於家世則開天下之公道洗積年之私怨籠絡海內智能才德之士使四面交歸不復它往則賢者皆無遺而治道興矣庚申趙鼎進呈劉長源奏劄上曰長源昨日多有開陳至比戰國之士若不用於秦則歸於楚論議殊可怪鼎曰陶愷雖邪論尚不敢至此上曰然張浚曰長源不學無識至如疏中引證事實皆非所敢聞者况元符以後人臣子孫誰為可用而不用者折彥質曰如蔡京王黼輩是乃國家之深仇也罪通于天幸逃族誅今日正使子孫真有可用者猶不當用上曰長源之罪過於陶愷當與逺小監當朝廷明正典刑可也於是退而批㫖長源識趣卑陋不可置之臺列送吏部與監當差遣不知何以去逺小二字制曰御史耳目之寄自非剛明不惑之士鮮克勝任爾識趣卑陋學術膚淺嘗謂其恬退不競擢置臺察今兹論奏殊駭聽聞朕於人才唯賢是用一付之公議汝為是說意必有在匪出於憎惡則有所阿黨不然則汝之昏懵無知也乃若引用事實尤害風教何至是哉紀綱之地非汝宜處斥歸銓選往蒞槯征循省之餘勉思學問熊克小歷止稱上殿官劉長源蓋不考真為御史也詔職事官月給米三斛自郎官外舊止有職錢添給至是始增之辛酉武節大夫榮州刺史兼閣門宣贊舍人薛安靖為武功大夫文州團練使充沿海制置司參議官仍與右朝奉大夫通判明州李文淵同共措置海道事務進義校尉陳晟為承節郎以都督行府言晟自河北從楊圭還朝乞推恩也武節郎王逵除名䖍州編管逵崑山人以朱勔給使授官因事至縣庭詬詈邑宰法寺當私罪杖該恩原守臣言其情重特有是責右奉直大夫成都府路轉運判官安邡追五官添差監郴州在城酒務左中奉大夫成都府路轉運副使賈若谷降三官放罷先是川陕宣撫副使吳玠言軍前糧食屢闕伏望勾臣赴行朝應副使喚免致有誤邊防虛負罪責而撫諭官劉子羽等亦言得制置大使席益咨目稱邡端坐廨宇一向弛慢故貶壬戌詔侍讀侍講官自今並許正謝著為令時行宫留守秦檜同留守孟庾並兼侍讀檜以前宰相入謝詔錫衣帶鞍馬而庾亦以是日受告審於朝三省言講讀官在法雖無許正謝之文緣多係前執政及從官兼充理宜正謝故有是㫖詔左司郎官樓照兼權中書舍人書行户房文字中書舍人傅嵩卿兼權户部侍郎吏部侍郎晏敦復兼權工部侍郎宗正少卿馮楫兼權右司貟外郎兼權給事中並行宫職馮楫兼職據楫今年十一月十二日辭免轉官狀結銜如此而日歷不書當求别本參考是日僞齊遣兵掠鄧州之髙安鎮於是守臣武德郎閣門宣贊舍人韓遹坐降一官遹十一月壬辰降官癸亥左司諌陳公輔請奏䕃無出身人並令銓試經義或詩賦論䇿三場以十分為率取五分合格雖纍試不中不許參選亦不許用恩澤陳乞差遣詔吏部措置其後吏部請試律外止益以經義或詩賦一場年三十五已上纍試不中之人許注殘零差遣餘如公輔所奏從之吏部狀在明年四月癸卯觀文殿學士行宫留守秦檜言伏覩陛下親御六軍往護諸將而臣罪戾之餘猥䝉召用切願扈從鑾輅身冒矢石伏念臣陷敵纍年敵國詭計稍知一二賊豫狂謀備見本末若有探報逺近或可以備顧問至於留司職事孟庾有已試之效其人詳練慎密欲望聖明特加財察優詔不許祕書省著作郎張九成直徽猷閣提㸃兩浙東路刑獄公事以九成言父老乞侍養故也右中奉大夫知郴州許和卿降二官放罷先是和卿之子太虛以捕獲冝章土冦之勞免文解而湖南制置大使吕頥浩言祖宗以來監使知通親戚不許於所部從軍以革冒濫乞申明行下和卿遂罷甲子廢白州為博白縣𨽻瓊州龔州為平南縣𨽻潯州以廣西提㸃刑獄公事郭孝友言二郡土曠人稀不能償官吏之費故也乙丑詔信安郡王孟忠厚德慶軍節度使韋淵特許赴行在是月詔𣙜貨三務嵗收及一千三百萬緡許推賞大率鹽錢居十之八茶居其一香礬雜收又居其一焉二十四年收二千六十萬有竒三十二年收二千一百五十六萬有竒乾道六年三月癸丑立額左宣教郎遂寧府府學教授程敦厚應詔上書且獻所注經世十論曰畏天恤民量敵核實正俗練兵生財專任廣聽審慮大略言敵勢方堅吾寧未復於兩河而不忍輕用於民力願汰冗兵節浮費又言宰相有好功之志非社稷之福願陛下加意審慮寧拙而遲無速而悔又上趙鼎書言今日之事戰未必為是而和未必為非要不可令敵執其權而反以制我鼎亟稱之張浚曰姑試而用未晚也乃除通判彭州敦厚之元孫也之元眉山人故衛尉少卿敦厚上書以文集行狀修入而不得其時按今年六月下詔求言八月張浚始自行府還朝且附此月末當考建炎以來繫年要録卷一百四
