body:
  text: 建炎以來繫年要録卷一百九十宋李心傳撰紹興三十有一年五月癸酉朔新淮南轉運判官王秬上屯田利害以為軍士狃於安閒之久一旦服勞田畝其功未必可成望許令民兵於近便處人給荒田一頃有馬者别給五十畝自行耕作俟成倫緒五年之後十取其一十年之後十取其二雖縣官所得不多然積之既久則有不可勝計者其有日前侵耕冒種之人一切不問內有貧下者量給種穊如是則將見兩淮荒間之田皆變而為沃壤矣從之甲戍國子司業陳棠言自興學至今二十年六經博士未嘗備員今弟子員至千人而學官每日輪經講說甚不稱勸學崇化之意望加惠學者俾六經各置博士每經擇經明行修二人充選庶幾經各有師得以輪遞講說詔博士闕員許令正録兼講丙子祕書省著作佐郎王十朋知大宗正丞紹興府供職十朋丐祠甚力上特以此處之十朋與李浩胡憲相繼奉祠或以論事不合故也當考直祕閣新淮南轉運判官兼淮西提刑提舉常平茶鹽公事王秬入辭升副使賜三品服是日金國賀生辰使殿前都㸃檢髙景山副使刑部侍郎王全始入境用故事遣中使黃述賜扇帕于洪澤鎮北都館辭以乘船輒病欲乘馬接伴使右司員外郎吕廣問力爭不從久之乃至頓下景山等舉趾倨傲述與之對揖略不加禮又遣人量閘面濶狹沿淮顧盻意若相視水面者識者知其有敗盟之意此據徐宗偃兩淮紀實庚辰故資政殿學士楊願家乞遺表恩授子壻許之給事中黃祖舜等言願於秦檜當國之日踪跡詭祕隂濟其惡中傷善類至今士大夫無不切齒政使於法應得猶當排抑以厲其餘况欲引例而害成法安可不論癸未詔前降指揮更不施行甲申詔諸路監司失按屬吏一嵗及四人以上者令御史臺檢舉申朝廷議罰用殿中侍御史陳俊卿請也大理寺言獄空上謂宰執曰大理寺臨安府在闕下雖未敢謂刑措然獄訟清簡寃抑得伸亦庶幾焉惟是諸路憲臣或不得人則吏强官弱民無所措卿等宜思革此弊禮部郎中王普轉對論取士分科之弊以為後生舉子競習詞章而通經老儒存者無幾恐自今以往經義又當日銷而二禮春秋必先廢絶竊惟國初至治平雖以詩賦取士又有明經學究等諸科當時唯明經略通大義其它徒誦其書而不知其說非今日經義比也然猶且别立解額多於詩賦而不相侵紊逮熙寧後應舉者莫不治經故解額可以混而為一今經義詩賦既分為兩科而解額猶未分夫取易舍難人之常情故此盛彼衰勢所不免望詔有司追效舊制將國學及諸州解額各以三分為率其二以取經義其一以取詩賦若省試即乞以纍舉過省酌中人數立為定額而分之仍於經義之中優取二禮春秋庶幾兩科可以永久並行而無偏廢之患矣詔禮部國子監看詳申尚書省親衛大夫果州防禦使鎮江府駐劄御前水軍副統制李輔等六人罷從軍與添差差遣用都統制劉錡奏也初議者請外路之獄三經翻異而在千里內者移送棘寺事既行權刑部侍郎張運以為追逮干證經涉修途多致困斃且繫囚充塞於天獄刀鋸頻施於都市豈所以示四方望復祖宗舊制詔給舍詳議給事中黃祖舜等奏如運章乙酉從之丙戌直敷文閣唐文若守宗正少卿丁亥祠部郎中兼建王府贊讀張闡轉對言近詔侍從臺諫條具弭災防盜之䇿臣備數郎曹言之則出位不言則惓惓之誠不能自已臣竊謂和議以來嵗有聘幣之役民不堪命願陛下毋以外裔困中國可乎歸正人時有遣還之命怨聲聞於道路願毋使敵人得以甘心可乎州縣之吏職卑而地逺漁奪之禍被于編籍願嚴贓吏之誅可乎蠲租之令已赦而復征至以寬大之澤例為虛文願申詔令之禁可乎是數者誠次第罷行之足以動天地召和氣矣闡又言郡守監司州縣官吏所以體國愛民者有所未知望嚴小官贓汚之法重行司取受之禁勑州縣毋存留斷罷人類詔修造官司毋得展濶使細民咸得奠居至如二稅之先期追呼茶鹽之計口科買征商愈重而行旅咨嗟錢貨窘艱而市井蕭索凡此等類不可遍舉又言完顔亮積粟發兵意在南寇乞守要害防海道巴蜀淮襄不可無良將督視不可無大帥上曰卿言深中時病惟遣歸正人誓書所載卿特未知耳國子正林栗為太常博士戊子大理寺丞吕擢為荆湖北路轉運判官左朝議大夫提舉台州崇道觀劉章知信州己丑廣西經略司言南丹州防禦使莫延沈卒延沈以慘酷為部族所逐携孥奔宜州奉詔移居靜江府賜州都監俸至是卒其族人共推莫延廩領州軍乃以延廩為南丹州刺史庚寅吏部言廣西轉運司昨奏以攝官四十一闕注授小使臣及選人論者以為俸給倍增郡邑無以供其費望以其半復還攝官從之辛卯大金國賀生辰使龍虎衛上將軍髙景山副使通議大夫尚書刑部侍郎王全見于紫宸殿景山奉國書跪進三省樞密院同進呈訖各依位立景山當奏事自稱語呐不能敷奏乞令副使王全代奏上許之景山招全全欲升殿侍衛及閣門官止之上傳㫖令升全乃升殿之東壁面北厲聲奏曰皇帝特有聖旨昨自東昏王時兩國講和朕當時雖年小未任宰執亦備知得自朕即位後一二年間帝曽差祈請使巫伋等來紹興二十一年言及宗屬及增加帝號等事朕以即位之初未暇及此當時不曽允許其所言親屬中今則惟天水郡公昨以風疾身故外所祈請事後因熟慮似亦可從又念嵗貢錢絹數多江南出産不甚豐厚須是取自民間想必難備朕亦别有思度兼為淮水為界私渡甚多其間往來越境者雖嚴為誡禁亦難杜絶及江以北漢水以東雖有界至而南北叛亡之人互相扇誘適足引惹邉事不知故梁王當日何由如此分畫來梁王宗弼即烏珠也朕到南京開封府方欲遣人於帝處備諭此意近有司奏言帝以朕行幸南京欲遣使來賀灼知帝意至甚勤厚若只常使前來緣事理稍重恐不能盡逹兼南京宫闕初秋畢工朕以河南府龍門以南地氣稍凉兼放牧水草亦甚寬廣於此坐夏擬於八月初旬內到南京帝當於左僕射湯思退右僕射陳康伯及或聞王綸知樞密院此三人內可差一員兼殿前太尉楊存中最是舊人諳練時務江以北山川地理備曽經歷可以言事亦當遣來又如鄭藻輩及內臣中選擇帝所委信者一人共四人同使前來不過八月十五日以前到南京朕當宣諭此事若可從朕言緣淮南地理朕昔在軍頗曽行歷土田往往荒瘠民人不多應有户口盡與江南朕所言者惟土田而已務欲兩國界至分明不生邉事如帝意稍有所難朕亦必從來使回日以後朕以向來止曽經由泗夀州外陳蔡唐鄧邉面不曽行歷及知彼處圍場頗多約於九月末旬前去巡獵十一月或十二月却到南京帝於差來正旦使處當備細道來朕要知端的於次年二三月間又為京兆亦未曽至欲因幸溫湯經由河東路分却還中都去奏訖降殿朝見次三節人從朝見訖駕興全在殿下揚言曰我來理㑹者兩國事嘵嘵不已帶御器械李橫約全曰不得無禮有事朝廷理㑹時百官班未退帶御器械劉炎白陳康伯曰使人在廷有茶酒之禮宜奏免之康伯曰君自奏聞炎遂轉屏風而入見上哭泣炎奏其事上然之炎出傳㫖曰今為聞淵聖皇帝訃音忽覺聖躬不安閣門賜茶酒宜免使人且退班遂退既而詔全曰適所未奏事因可具奏狀以聞於是館伴使翰林學士何溥等録其語進故得知者一二焉宰執聚殿廬議舉哀典故或謂上不可以凶服見使者欲俟其去乃發喪於是禮房告報使人垂拱殿茶酒為臟腑不調可移就館中排辦令參知政事楊椿押賜權工部侍郎黃中聞之馳白康伯曰此國家大事臣子至痛之節一有失禮謂天下後世何且使人問焉將何以對於是始議行禮及調兵守江淮之䇿亮求釁渝盟此大事也而北使悖語日歷乃無一字及之蓋是時邉事未動固宜祕密也近熊克所作小歷亦復草略數語何哉徐夢莘所進北盟㑹編已備載其詞今併其本末詳之備後有考自大金賀生辰使具官已下據日歷本文自景山奉國書已下據朝公忞金人敗盟記自景山當奏事已下據趙甡之遺史但甡之誤以王全為正使今改正之自東壁面北厲聲據朝公忞敗盟記及今年五月二十二日尚書省劄下沿邉將帥監司劄子自奏訖降殿已下據朝公忞敗盟記自全在殿下已下據趙甡之遺史自既而詔全日已下據朝公忞敗盟記及五月二十二日尚書省劄子自宰執聚殿廬已下據日歷㑹要朱熹撰黃中墓志及熊克中興小歷壬辰宰執內殿奏事同知樞密院事周麟之言敵意可卜宜練甲申警靜以觀變使不當遣上曰卿言是也彼欲割地今何以應之麟之曰講信之始分畫封圻故應有載書存願出以示使者厥請將自塞矣此據麟之墓志修入志又曰如公計其人果無語按北使之來止諭亮意非議割地也今不取初麟之既請出使至是北使出嫚言且聞金主親提兵將大舉聲勢極可畏麟之大恐不敢直辭其行苐委曲言事已如此不必遣使雖遣使無益上大怒此據趙甡之遺史詔兩浙江東福建諸州守臣將見管禁軍弓弩手以十分為率揀選人才强壯堪披帶人五分遣官部送樞密院教習拍試聼候使喚太尉鎮江府駐劄御前諸軍都統制劉錡給真俸癸巳天申節詔以臟腑不調免上夀命同知樞密院事周麟之燕北使于都亭驛甲午宰執召三衙帥趙密成閔李捧及太傅醴泉觀使和義郡王楊存中至都堂議舉兵既又請侍從臺諫凌景夏汪應辰錢端禮金安節張運黃祖舜楊邦弼虞允文汪徹劉度陳俊卿集議陳康伯傳上㫖云今日更不尚和與守直問戰當如何執政欲遣閔全將禁衛兵禦襄漢上流允文言不必發兵如此之多慮必不從上流而下恐發禁衛則兵益少朝廷內虛異時無兵可為兩淮之用執政以金主在溫湯汝州恐其涉漢而南不聼日午下詔發喪宰相常服金帶率百官入和寧門詣天章閣南隙地舉哀仍進名奉慰是時禁中亦設舉哀之禮哀動于外為大行淵聖仁孝皇帝立重即學士院為几筵殿用神帛上特詔持斬衰三年以申哀慕權禮部侍郎金安節請庶人禁樂百日從之翰林學士兼權吏部尚書充館伴使何溥等奏繳録到大金副使王全於殿上口奏事因詔諸路都統制并沿邉帥守監司照應今來事體隨宜應變疾速措置務要不失機㑹此指揮即五月二十六日尚書省劄子四川總領所事類史有之時朝論洶洶入內內侍省都知張去為隂沮用兵之議且陳退避之策或因妄傳有幸閩蜀之計人情皇惑上意雅欲視師陳康伯奏曰敵國敗盟天人共憤今日之事有進無退若聖意堅决則將士之氣自倍願分三衙禁旅助襄漢兵力待其先發然後應之權工部侍郎黃中自使還每進見未嘗不以邉事為言至是又率同列請對論决䇿用兵莫有同者中乃奏曰朝廷與金通好二十餘年我未嘗一日言戰彼未嘗一日忘戰取我嵗幣啖彼士卒我日益削彼日以强今幸天褫其魄使先墜言以警陛下惟亟留聖心焉詔人使玉津園燕射特免錫賜依例乙未少保奉國軍節度使領御前諸軍都統制職事判興州吳璘為四川宣撫使仍命敷文閣直學士四川安撫制置使兼知成都府王剛中同措置應干事務時有詔夔路遣兵五百人往峽州屯駐俟荆南有警則令䕫路安撫使李師顔親往援之左承議郎知梁山軍朝公遡始至官以書遺大臣曰公遡在蜀久於其山川險阻亦粗識之嘗料吳興州足以蔽遮梁益以當一靣而其力不能以及䕫或者敵人搗夔之虛而入之是猶知守其閈閎而忘其藩垣之可穴也李武當在夔則藩垣固矣然或使之出夷陵援荆州夫夔誰與守之按夔之地圖自䕫至夷陵其間通谷數道敵由興山而出則李武當之歸路絶而三軍之心搖不可以戰由大寧而出則昔我伐蜀之故道也距䕫百里而近則為斷其脅而入其腹心蜀已舉矣吳襄陽之未出蜀也興州之兵皆得而將之置於襄陽去興州甚逺惟與麾下三十人俱乃孤軍也處於四通五逹之郊而無大險介於一二主將之間而不相親江夏田公蓋與襄陽交至淺也朝廷本使田公在江夏以荆襄委之而倚為距防今乃分其地以豫至淺之交荆州有警又近捨田公而用李武當田公能不觖望萬一襄陽不支必謂非我部曲不得專其功則不肯赴其難是襄陽獨三千人禦大敵守則不足以固戰則難以取勝徒奪吳興州手足之捍而荆州不得襄陽以為蔽公遡未暇憂此而先為蜀危之也時師顔又調屬部禁軍以補夔州之闕公遡言䕫之興寧鄉萬之漁陽鄉其人皆勇壯伉健有過於正兵如有願自效於戎行者役錢之外一無所征大不過捐千户之賦耳有搜兵之實而無餉饋之費師顔不能用公遡任城人也侍御史汪徹言天下之勢强弱無定形在吾所以用之陛下屈已和議厚遺金繒而彼輒出惡言以撼吾國若將唾掌而取三尺之童無不痛憤願陛下赫然睿斷置帥江干而專付閫外之任益兵上流而增重荆襄之勢渡師淮甸以守其要害嚴備海道以遏其牽制然後以不戴天之讎在原之戚下詔以告中外將見上下一心其氣百倍幾㑹之來間不容髮在陛下斷之而已是日賜北使御燕于都亭驛命尚書右僕射朱倬押伴從例賜北使副酒四大金瓶果殽四大金稜犀皮合瓶合金器悉賜與之丙申宰執赴素幄奏事侍御史汪徹為御史中丞起居郎楊邦弼起居舍人虞允文並試中書舍人允文自賀金主正旦還首言敵已授甲造舟必為南渡之計至是遂擢用之詔因孝慈淵聖皇帝升遐合支用錢物並送後省官看詳酌中裁定毋致妄費左朝散郎荆湖北路轉運判官趙不猷罷坐李道移屯荆南營寨不立故也直祕閣江淮荆浙福建廣南路提㸃坑冶鑄錢李租升直敷文閣荆湖北路轉運副使起復慶逺軍節度使主管侍衛馬軍司公事成閔對于內殿朝議以上流重地邉面濶逺而兵力分宜遣大將上乃面諭閔俾以所部三萬人往武昌控扼先命湖北漕臣同鄂州守臣建寨屋三萬間以待之後二日遂發江西折帛湖廣常平米錢及末茶長短引共一百四十餘萬緡湖北常平義倉及和糴米六十三萬石料十萬石赴湖廣總領所交收以備軍用江西折帛錢四十六萬餘緡末茶長短引五十萬緡湖南常平義倉米錢四十六萬餘緡銀萬兩湖北諸州樁管和糴及常平義倉米共三十六萬石鄂州樁管江西上供折納料十萬石又以江東上供折帛錢還池州如江西之數用户部請也戊戍上成服于几筵殿太學生程宏圖等上書言今日之事國家所以應之者其先務有四一曰留使者以欵敵人之謀一曰下詔書以感南北之士一曰先舉事以决進取之䇿一曰用人望以激忠義之心蓋金人憑陵之計甚久前日二使殿上之對軍民士夫恨不寢其皮而食其肉臣等願朝廷姑善留之為之詞曰前日所請皆汝等口語非國書所載吾將遣使以實汝言非獨使其未知所請之可否吾且得以措置為前進之䇿亦可以挫彼之鋭而示吾之未弱也國家自和議之後為故相秦檜所誤沮天下忠臣義士之氣三十餘年矣一旦思所以得其戮力必有以感動其心而奮起之可也故哀痛之詔不可不亟下然詔不可徒下也要當首正秦檜之罪追奪其官爵而籍其家財追賜宇文虛中之爵而為之立祠雪趙鼎嶽飛之寃而又下親征之詔移蹕建康則其氣固足以吞强敵矣今敵重兵已臨汝潁使吾不先發則敵直窺襄陽突至淮泗襄陽失利則可以控蜀且有順流東下之勢兩淮失守則唇亡齒寒江非所恃而環海而東又有不可以不早計者夫所謂人望雖不可遍舉如張浚張燾胡銓辛次膺皆其人也浚尤天下所屬望者夫豈可以一失而遽棄之哉銓以直言得罪於秦檜不死於檜手亦天意有所待也陛下若能付一臺諌之任則說陛下為茍安之計者皆屏息而不敢為也今日之事勢已急矣然臣恐朝廷之上猶以强弱不敵之為憂財用不足之為慮臣謂兵之强弱不以多寡曲直所在勝負繫焉國家自休兵以來凡百冗費豈無可减罷者願俾有司枚舉條具凡非繫軍民之急者不以大小一切罷去則民可不加斂調發有餘中興之功指日可冀矣宏圖瑀弟子也太學生宋芑上葉義問書言今使者在廷口傳敵意欲需我漢東江北之地及邀我二三用事之臣而其意豈在於其地與其人哉挾難塞之請以釁我也地不可割人不可遣則彼長驅而來耳為今之計不若誅其正使一人尸諸通衢以聲其叛盟之罪此不惟可以挫彼之强亦足以激吾之弱乃釋其副使一人使歸告其主曰吾與汝約和以來吾攻苦食淡傾內帑之儲以賂汝者三十年矣吾於汝無負矣汝欲戰吾率三軍之士與汝周旋若無厭之求吾不能聼亦使之知東南有人而示吾之不弱也然後下責躬之詔以播告中外誓與天下上報父兄之讎下雪生民之恥凡前日中外之臣誤我國以和議者無問存沒悉正典刑於是斫秦檜之棺而戮其尸貶竄其子孫而籍其資産以助軍以正其首唱和議欺君誤國之罪復嶽飛之爵邑而録用其子孫以謝三軍之士以激忠義之氣詔下之日使東南之民聞之莫不怒髮衝冠而西北之民聞之莫不感激流涕如此則師出之日吾之民將見人自為戰彼之民必有倒戈者矣願朝廷决意行之無疑自今日以往由宰執以及臺諫侍從之臣則當日造於便朝由郎曹而下以及百職事之臣則當日㑹於都堂凡防守江淮之䇿圖取中原之計朝夕相與討論次第而施行之規模籌畫必定於浹旬之間以解東南倒懸之急以慰西北來蘇之望則天下幸甚己亥金國賀生辰使髙景山等辭行上御後殿東廊之素幄宰執起居畢升詣御榻之東西相向立上與宰執已下並首絰衰服掩面號慟人使朝辭畢哀止次引景山赴幄授書訖退尚書左僕射陳康伯率百官赴几筵殿門外南面拜表請聼政詔不允賜北使御燕于都亭驛知樞密院事葉義問白巾常服黑角帶入驛押伴詔幹辦內東門司趙志忠弛慢不職送吏部與合入差遣初北境有被逐將渡淮者武功大夫忠州團練使知濠州劉光時疑寇至是日遂驅軍民入橫澗山謂之移治居民皆棄其資産而去生理蕩然淮南轉運副使王秬聞之遣卒五百人押歸舊治事聞光時坐貶秩七月己丑行遣庚子百官再上表請聼政詔不允詔浙東五郡禁軍弓弩手並起發赴判明州兼沿海制置使沈該浙西諸郡及衢婺二州並赴平江府駐劄浙西副總管李寶江東諸郡赴池州駐劄都統制李顯忠福建諸郡赴太平州駐劄破敵軍統制陳敏江西諸郡赴江州駐劄都統制戚方湖南北非沿邉諸郡赴荆南府駐劄都統制李道軍並聼候使喚辛丑百官朝臨畢三上表請聼政詔答宜允自是日一臨至小祥止詔右迪功郎史岑年改合入官岑年為修仁尉叛兵齊述之亂草寇蜂起岑年盡散其衆至是始録之太府少卿總領四川財賦王之望言契勘蜀中三大將下軍兵一嵗衣賜錢糧絶長補短錢引二百道可養一隊前年三將增招一萬人及吳璘下招填二千七百九十一人共約嵗用錢引三百餘萬道朝廷節次降到截留錢物共二百五萬道所闕尚多近四月差吳珙將帶三千人往襄陽令吳璘限一季招填又合嵗用六十餘萬引財賦有限支費日增恐不可以持久今兵雖未必用而邉戍不可省四川諸州禁軍除闕額外見管三萬餘人其間儘有强壯及格少嫩向長者但訓練弛廢事勢茍簡不成部伍多只充守倅兵官占破雜用枉費廪給今若揀選一半分作三畨如祖宗時出軍法每年發遣一畨往𨽻三將以充戍守入隊教閲周而復始如此則分在三將者常有五千人可以暗補所闕之數三年之後教閲既遍一萬五千人皆為勝兵無事則散在州郡緩急則盡可為用如禁軍不足即於廂軍內選刺若有逃亡事故本州逐漸揀填其逐兵自有本州衣糧不過嵗畨五千人者給口食米耳每兵月計七斗五升嵗用米四萬五千石若以招軍止贍得二千五百人更缺衣賜料錢之類前三將招萬人之後軍中子弟長成者不多以後若有招收必更短少恐不如諸州見所揀聞軍中每次招軍外來一人費至百千少亦半之若限期促迫則所費愈多將士頗以為苦或謂川兵懦弱不堪戰守是不然在所以用之何如耳今三將軍中亦不純是西人西人多而川軍少又經揀選參雜而用何所不可契勘四川腹內州軍並各無事其西南接近蠻界如瀘叙嘉黎等處邉界亦皆安帖無用多留禁卒兼每嵗一畨繫見在人六分之一在留在川者尚有五分亦不乏用惟夔州新置武帥控扼沿流而李師顔見團結教閲想漸成部伍若夔路禁軍免行抽撥亦不過减千人以下更在朝廷詳酌六月壬寅朔殿中侍御史陳俊卿權尚書兵部侍郎先是俊卿復言張浚可用上曰卿欲用浚為何官俊卿曰此在陛下上曰浚才疏使之帥一路或有可觀若再督諸軍必敗事俊卿曰人皆以浚為可陛下何惜不一試之上首肯俊卿又言張去為竊威權撓成算乞斬之以作士氣上曰卿可謂仁者之勇至是宰執奏事上曰陳俊卿敢言朕將賞之陳康伯言俊卿在臺振職乃有是命御史中丞汪徹入對言講和之久將帥養驕軍政隳弊軍士之廪給薄者幾無以自活冝優恤之以養其力又言淮南山水寨舊來鄉豪自相結集當隨宜存恤使自為守無令監司州縣擾之庶收其萬一之用又言軍旅將起費用方繁今局務之可省者尚多支費之浩瀚者尚廣百官之冗員尚衆官府之橫用尚繁宜條其不急大加節約以濟今日之務從之拱衛大夫利州觀察使張榮添差淮南東路馬步軍副總管泰州駐劄榮本泰州土豪建炎間聚衆為盜屢與敵角故復用之癸卯以淵聖皇帝升遐降諸路流罪以下囚釋杖以下詔中書門下後省詳議節約事件用汪徹疏也已而給事中黃祖舜等奏併敕令所歸刑部權罷籍田司减太常樂工省大理評事三員主簿一員太學博士録正書庫官指使武學諭各一員軍器所監造官二員幹辦提轄監門官各一員從之丙午小祥上詣几筵殿行禮詔諸路監司節浮費以待用仍自兩浙轉運司臨安府始權尚書吏部侍郎汪應辰兼權國子祭酒右朝奉大夫通判建康府蘇師德提舉荆湖南路常平茶鹽公事師德以常同友壻故久廢至是稍用之敷文閣待制知太平州陳正同與左朝請大夫知建州王傳兩易丁未出宫人三百十九人趙甡之遺史六月乙丑放仙韶院女樂二百餘人上聞淵聖訃音且知金人有用兵之意或傳金人欲來索仙韶院女樂上不忍良家子陷于絶塞乃盡遣出宫甡之所云或即此事按今年七月丙子詔書有云乃者放嬪御罷教坊惟是約己裕民而浮言胥動幾惑衆聼則甡之所記乃當時傳聞之詞非實事也戊申主管侍衛馬軍司公事成閔入辭詔賜金器劒甲己酉御史中丞汪徹為湖北京西宣諭使置司鄂州仍節制兩路軍馬徹辭節制許之監察御史杜莘老守殿中侍御史莘老入見上曰知卿不畏强禦故有此授自是用卿矣時陳俊卿既出臺求去甚力莘老因奏事從容曰人材實難况多事之際令俊卿輩在論思之地必有補益上以為然俊卿乃復留是日右朝奉郎通判楚州徐宗偃遺鎮江都統制劉錡書云近聞肅膺宸命進師廣陵先聲所至士氣賈勇竊惟今日之事非他事比安危成敗在茲一舉古人有云唇亡則齒寒蓋言表裏之相依也今欲保長江必先守淮頃嵗韓宣撫駐軍山陽山東之兵不敢一日窺伺幾至成功而姦臣誤國莫遂其志今清河口去本州五十里地名八里莊相望咫尺若不遣精鋭控扼萬一有緩急頃刻可至城下彼得地利兩淮之民悉為其用則髙郵廣陵豈足以捍其衝若遣偏師屯本州彼既不敢長驅山東諸郡怨其暴斂不忘戴宋一呼響應勢若破竹錡亦以為然庚戍詔布衣陳光國大同王德並為右迪功郎薛志忠朱興鞠炳並為承信郎以忠義自奮上書可采也光國自陳隱跡山林無求於世不欲受爵賞上許之辛亥北使髙景山還至盱眙軍未就宴泗州遣人關報守臣周淙稱有金牌天使欲來傳宣邦人驚懼謂金牌不時來昨紹興十一年有來傳宣者大軍繼之即傾城奔走宴罷天使大懷正入館白袍紅綬腰懸金牌乘馬直造㕔事索香案呼送伴使右司員外郎吕廣問等令跪以聼遂道金主㫖意以為本欲八月遷都今大臣奏宫殿修畢欲以六月中旬前去南京令送伴回奏知本國南京謂汴都也軍民聞之雖稍釋疑然有夤夜提携奔竄官司弗能禁㑹朝廷亦坐白劄子下轉運副使楊抗相度清野民尤恐懼自是淮南官吏老幼悉往江南矣此以徐宗偃兩淮紀實修入宗偃時以楚州通判應辦北使至界首目擊其事故也相度清野指揮未知在何日今依宗偃所記聨書之壬子成閔率衆發臨安閔行未旬日得報金主自溫逺還汴京中書舍人虞允文復白執政云金主已去請留閔後軍屯江池之間若金出上流自江鄂往援即淮西兵盛便出大信口近采石亦可以援淮西不聼癸丑詔罷教坊其樂工許自便甲寅命知樞密院事葉義問撰孝慈淵聖皇帝諡冊丈參知政事楊椿同知樞密院事周麟之篆諡寶文翰林學士何溥撰諡議右武大夫兩浙西路馬步軍副總管元居實為樞密副都承㫖提舉江淮措置盜賊中書舍人虞允文等言承㫖清資與侍從品秩相亞自神宗作新官制更用士人而副承㫖之選與之俱重近嵗廖虞弼以非才而用未幾罷黜其後多虛其選今居實無尺寸功效亟登清班物論籍籍臣願收還此命令居實以舊職措置俟其立功之後旌用未晚上從之居實素結宦官帶御器械劉炎嘗為臺諫言居實是除炎薦之也居實結宦官而得副承㫖楊萬里撰虞允文墓碑云爾劉炎薦居實乃杜莘老劾疏中語今參附書之同知樞密院事充大金起居稱賀使周麟之上疏曰臣聞事有必至理有固然固不待上智而後知昔日之和議今日之渝平是已方敵之許和也初豈有至誠惻怛之心哉徒以久戰而不休故其心厭盡力而不克故其志沮是以不得不歸之於和馴至于今垂二十年彼以無道竊位懼吾興問罪之師不能當也彼沛然自大尚猶藉我為援內安反側亦未遽萌搏噬之意暨巫伋之行則以侈辭拒我矣秦檜死蘖芽寖生屢詰行人以買馬渡淮之禁至罷𣙜場以絶南北貿易朝廷復遣王綸輩庶有以安之繼遭慈寧禍故命使三出辭卑幣重禮厚而疑愈深比顯露狂謀不顧信誓欺天畔神敗盟必矣纍日以來側聼聖訓仰見廟謨雄斷不惑群䇿唯是遣使一事遲回至今曉夕深思蓋有不可者七何則彼之所豫我不敢受彼之所欲我不敢從使人到彼其將何辭以對其不可一也若曰但守舊約彼必云故主已廢事當在我果可以禮義說哉其不可二也議事邀使既已指名遣非其人正犯凶怒其不可三也親征之斷矢於宸𠂻王旅戒嚴陸續進路事端彰著彼必聞之乃欲走驛輸誠是將翻以為詐其不可四也執政大臣預聞密論若加詰問難以飾詞避則為欺實對則賣國其不可五也南牧之釁陛下知之應敵之决海內知之而反藉一介行李以解紛適足以欵王師而誤大計其不可六也今天下無貴賤老稚智愚勇怯告之以用兵復讎則喜動容色告之以屈尊祈請則怒髮衝冠臣若昧於一行人情怫然或致王雲之禍草芥微軀縱死何益其不可七也為今之計豈有他哉惟陛下法天行健堅定規模俟其來南盡鋭奮擊天人助順必有成功昔周世宗征李景景奉表稱藩削去帝制非不貶損自下而孫晟見戮終奪十四州而後止則卑㢲之不足恃也世宗盛德如是尚執殺使者而逞其欲况亮之忮忍乎若夫彼有速亡之形我有恢復之冀有血氣者類能言之陛下審處而應之耳臣當竭智畢力協贊事機倘有搖尾乞憐復下穹廬之拜臣竊恥之且臣昨將命亮數詢叩樞廷事臣以翰苑異職為解今待罪于是彼將復有問焉則無從敢對蓄憤弗泄必殺臣而動兵兵端所由咎在臣啓雖闔門孥戮不足償責疏入上大怒左僕射陳康伯見麟之以國事勉之麟之語侵康伯康伯曰上若遣康伯聞命即行大臣同國休戚雖死安避麟之卒辭之乙卯詔祕閣修撰提舉台州崇道觀劉岑左朝散大夫徐嚞並召赴行在二人皆願使金故有是命太尉威武軍節度使鎮江府駐劄御前諸軍都統制劉錡為淮南江南浙西制置使節制逐路軍馬錡自順昌之捷金人畏之下令有敢言其姓名者罪不赦上知其能故有是命右朝請大夫提舉江州太平興國宫陳桷復祕閣修撰充淮南等路制置司參議官桷久從韓世忠軍軍罷而廢至是復用之詔吏部縣令窠闕再行破格差注一次以權吏部侍郎凌景夏言在部者七百餘人發遣不行故也丙辰不視朝百官臨于几筵殿次赴几筵殿門外進名奉慰自是朔望皆如之是日浙西馬步軍副總管李寶入奏事翌日上謂輔臣曰寶非常驍勇兼其心術可以仗倚朕素識其人觀之久矣他日未易量陳康伯曰誠如聖訓先是寶言連江接海便於發舶無若江隂臣請徙守萬有一不任甘死無赦上從之寶即遣其子公佐與將官邉士寧潛入敵境伺動靜至是敵謀益泄復召至闕廷問方略寶奏以海道無險要可守敵艦散八諸洋則難以蕩滅臣止有一䇿出百全上問何如對曰凡用兵之道自戰其地與戰人之地不同自戰其地者必生之兵也戰人之地者必死之兵也必生者易破而必者難却今敵未離巢穴臣仰憑天威掩出不意因其驚擾而疾擊之可以得志上曰善問所須舟幾何曰堅全可涉風濤者得百二十皆舊例所用防秋者所總人幾何白僅三千止是二浙福建五分弓弩手非正兵也旗幟器甲亦已粗備事急矣臣願亟發陛辭賜寶帶鞍馬尚方弓刀戈甲之屬及銀絹萬數以為軍實右朝奉郎提舉兩浙路市舶曽懷獻言曰航海之役船有輕重篷有疾遲風有大小竊嘗聞於髙麗之商謂敵人之便惟乘騎縱使至岸無馬不能捨舟如猛獸失林將自投於穽若海道亦為之備徒分兵耳懷公亮孫也丁巳御史臺檢法官兼主簿王瑀祕書省校書郎劉度並為監察御史瑀汪徹所薦也樞密院編修官陳良祐為御史臺檢法官戊午淵聖皇帝大祥上易禫服禮部侍郎金安節請權留衰服于几筵殿以待梓宫之還從之帶御器械劉炎同提舉措置㳂淮盜賊此據杜莘老劾奏劉炎章疏修入日歷無之庚申禫祭夜彗出於角壬戌右司員外郎充送伴使吕廣問等還行在奏臣等到盱眙軍有金牌郎君到來令臣等跪受大金皇帝聖㫖云六月二十三日來南京此據趙甡之遺史癸亥中官正判太史局李繼宗等各降一官坐奏星文不實故也甲子尚書吏部員外郎權祕書少監劉珙試起居舍人右朝請大夫知揚州王躍為兩浙西路提㸃刑獄公事武功大夫榮州刺史劉澤知揚州朝議以維揚重地當用武帥㑹澤自襄陽召歸乃有是命乙丑左迪功郎建康府府學教授戴逹先以近臣薦召對論自昔欲成天下之功者必賞功罰罪以作天下之士氣上納其言翌日以逹先為太學正丙寅詔許淮南諸州移治清野此據趙甡之遺史日歷無之宰執奏疏决行在刑獄上曰此間固應如法惟慮外郡視以為常恐致奉行不䖍陳康伯奏當諭㫖行下使中外均被陛下勤恤之實惠丁卯左朝請郎吳芾為監察御史芾錢端禮所薦也左朝散大夫荆湖北路提㸃刑獄公事趙沂為利州路轉運副使沂長江人也殿中侍御史杜莘老言善御天下者無事則深憂有事則不懼無事深憂所以預備有事不懼所以濟功今敵欺天背盟政陛下待以不懼之時願繼自今益以剛大為心勿以小利鈍為異議所搖諛言所惰則人心有所恃而士氣振矣因上四事一用建炎詔書不限早暮延見大臣及侍從謀議國事二申敕侍從臺諫監司守臣速舉可用之才三敵情雖叵測然趣我使期宜以時遣使曲在彼四車駕既謀順動則留鑰所付宜詳擇重臣又言藝祖簡諸道兵補禁衛訓閲精整故方鎮讋服莫敢有異心今親征有期而熊虎兩司班直親兵才五千餘人羸老居半至有不能甲胄者乞亟留聖慮皆從之戊辰右朝散大夫徐嚞為敷文閣待制樞密都承㫖假資政殿大學士左太中大夫醴泉觀使充大金起居稱賀使祕閣修撰提舉台州崇道觀劉岑試尚書户部侍郎岑與徐嚞俱至行在上召對岑曰臣受國家厚恩今老矣惟不惜一死可以報國有如議不合當以臣血濺金主之衣上愕然于是遣嚞庚午武翼大夫貴州刺史權知閣門事充大金起居稱賀副使張掄落階官為文州刺史辛未太府少卿總領四川財賦王之望申今月二十九日伏准宰執通簽劄子備到北使奏陳語録奉聖㫖令諸路都統制并沿邉帥守監司照應事體隨宜應變疾速措置務要不失機㑹今有本職合行申禀事件一川蜀向來用兵都轉運司領財賦而𨽻於宣撫司如趙開輩皆宣撫置其所厚宣撫司有便宜都漕司依倚而行以為一切之政故粗能應辦是時兵統於諸帥財領於都運而宣撫使兼總之後來朝廷改置總領實分版曹之務倉庫皆以户部為名而以朝臣奉使趙不棄初除四川總領日申畫一項云昨來張成憲應副韓世忠錢糧申明與宣司别無統攝止用公牒行移乞依張成憲已得指揮朝廷降㫖從之自是兵與財賦各有攸司勢若提衡輕重相濟東南三總領責任差輕又朝廷在近凡事有所倚重匱乏可容丐乞蜀在數千里外奏報往復動經數月與東南事體不同近朝廷以吳少保為宣撫而應干事務令王制置同共措置四川軍事有所統一甚合事宜是則宣撫制其兵制置共其謀而總領主其饋餉兵未必日交謀未必日用而饋餉則不可一日有闕在今日總計憂責最重了辦為尤難也四川自置總領司以來未經用兵一旦有事與當時不同恐或諸司或有申明不相參照朝廷行下臨時難以酬應人最所吝惜者財也最所貪愛者亦財也總領一司於郡縣則急其入於將士則裁其出職事所行大抵皆拂逆人情為衆怨之府若非朝廷主張假借使有以自立則緩急之際殆難與財賦作主事關軍國利害非輕今吳少保忠義體國兼愛軍民王閣學明逹憂時務循法度皆與之望心腹相照可容協濟顧朝廷分司庀職非為一時當計久逺處畫分明則易相調護各得守其職分矣今總領所户部倉庫糧審院並在利州職當科撥應副若以軍一動其般發轉輸須合有隨軍轉運前此或以諸路漕臣兼充或以宣撫司參議官為之今三都統邉面皆屬利路利路漕臣皆賴協濟責任最繁須置兩員更迭出入庶不乏使仍宜得强幹有風力者為之朝廷遣王官出使盡總四川財賦以軍馬錢糧為職事或有出入自應竭力應副不容闕乏若與將帥故為異同不體緩急使其無以赴功致誤國事何說以辭誅罰然主兵者亦當惜其有無凡所須索酌度緊慢据實關報事通商量則易於應辦若乘倉猝之際或相蹙迫臨時必致狼狽朝廷各宜訓諭使同心協議體國從長如一家無有彼我則功無不濟矣用兵對敵有攻有守蜀中自守之䇿蓋已屢試應干費用粗有凖則若欲出師搗虛以為牽制則與守禦事體不同其糧運逺近士卒多少經由去處計司須豫聞梗槩少為支備乞即下宣撫制置司照㑹北使所奏今年九月末金主巡獵陳蔡唐鄧之郊明年二三月方來京兆若秋冬以後王師迎擊於東蜀兵牽於西遂能殄敵於淮漢之間固大善萬一游魂關陜則蜀中來年所備愈重日月尚逺何以支梧之望自到官多方經畫催驅州縣務要辦而不擾上半年比較諸色所入已多於遞年最多之數二百餘萬引其勢極矣不可復加所入雖增費出亦夥只發吳四廂兵老少三千人并運興州寄樁米二十萬石水腳錢及一兩處移屯等已合添用一百十八萬引有竒其他雜費尚多難以悉舉諸軍關諸器械帳幕旗幟之類方來未已皆常嵗所無有將來調發之數皆不在此今於經賦之外既一毫不敢有取而東南用度至廣臣子之義所當體國非甚不得已豈忍煩溷朝廷以此日夜憂恐未知攸濟伏惟俯賜矜察是月和州布衣何宋英上書論敵必敗盟宜先事為之備今天下之所欣慕敵國之所畏服惟張浚劉錡願委以兵權又論不當遣歸附人及竄斥上書者又言今國勢危於纍卵而方且費國用造御舟乃於海岸欲為避寇之計天下聞之舉皆失笑萬一敵人對舟迤邐前逐風濤萬里進退不能當是之時其禍有不可勝言與其坐困一隅不若進幸建康以壯國勢書凡數萬言其大指如此建炎以來繫年要録卷一百九十建炎以來繫年要録卷一百九十金人地名考證烏珠原書作兀术誤改見卷一
