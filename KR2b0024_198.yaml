body:
  text: 建炎以來繫年要録卷一百九十八宋李心傳撰紹興三十有二年閏二月按是月戊辰朔己巳集英殿修撰張孝祥知撫州直寶文閣王佐知吉州辛未詔諸路常平米並令以新易陳在倉以五年為率如過五年盡數變轉毋得停留失陷官物龍神衛四廂都指揮使寧武軍承宣使江州駐劄御前諸軍都統制戚方添差兩浙東路馬步軍副都總管紹興府駐劄忠訓郎幹辦翰林司曹耘為閣門祇候耘勛子也是日金人以熙蘭之兵圍河州彌望蔽野兵械甚設官軍之未得河州也守將溫特赫遣食糧軍馳書於臨洮德順以求援為其吏曹劉浩等十有八人謀匿之不行已而浩等悉來歸及敵兵再至呼於城下曰惟以劉浩等縋城而出乃釋圍浩等射其呼者使去㑹義軍運炮擊賊衆殺其將一人敵乃小却然亦未退壬申欽宗虞主還几筵殿上親行安神禮於是自七虞至九虞皆親行之癸酉修武郎知威州趙迪再任迪普五世孫也四川制置使王剛中言其治狀有方蠻夷畏服乃有是命是日金人破河州初河既受圍金將溫特赫揚言曰河州能為南人死守甚壯今我留此萬一漢軍乘虛入熙則熙又為人有也不如引兵歸援熙耳乃率兵徑去城上士卒伺知之交口相賀守城益怠弛甲以坐是夜人人困臥城陬漏上敵驅鐡騎搗城斯須城壞州民尚有未知敵至者翌日癸酉敵驅父老嬰孺數萬屠之遷壯者數千𨽻軍先是宣撫使命惠逢李進等㑹蕃漢兵援河州逢以兵徒單寡不能支敵乞師者再頃之宣撫使遣將領郭師偉將騎七百為逢聲援師偉未至河州已陷逢屯通㑹進屯臨洮逢遣人謂曰金今再至是無河州决也吾曹罪在不測不如併力以往猶獲免也進曰敵兵愈前近萬人我以危兵綴之必取辱逢信之因休士卒進即星夜趨河州後二日逢聞之掩靣泣下曰李進誤我進至河州城已陷敵焚蕩除城趾而已敵之屠城也吏曺劉浩與其徒八人遁走得免餘十人被害宣撫使吳璘皆命浩輩以官甲戌上問宰執以金人消息朱倬曰據報稱葛王又有兄弟爭立之禍則是彼國中多故上曰金王再世篡弒自此必內難未已為之君者不亦難乎倬曰金將有五單于分裂之勢上曰審如是則中國自無事矣直祕閣兩浙轉運副使林安宅為尚書户部郎中總領淮東軍馬錢糧右通奉大夫韓仲通知明州武功大夫榮州刺史劉澤添差兩浙西路馬步軍副總管常州駐劄澤前棄揚州去至是復之乙亥詔資政殿學士知太平州湯鵬舉令致仕先是鵬舉言今年七十有四乞依近㫖致仕詔鵬舉提舉臨安府洞霄宫殿中侍御史吳芾言鵬舉天姿凶險老而益甚其在當塗妄作威福乃有是命左朝奉大夫沈介知永州入內東頭供奉官賈竑還所寄資為武義大夫保寧軍承宣使帶御器械右朝奉大夫新通判建康府陳良弼知信陽軍丙子上親行卒哭之祭于几筵殿丁丑金國奉直大夫支邦榮特換左奉議郎邦榮已見紹興三十一年八月壬戌戊寅上送欽宗虞主于和寧門外奉辭遂祔神主于太廟第十一室以尚書左僕射陳康伯為禮儀使嗣濮王士輵華容軍節度使居廣純州觀察使居閎為三獻祖宗皆用特羊備樂舞詔修武郎主管台州崇道觀趙師孟赴行在師孟嘗從胡安國授春秋大㫖屏居衡州僧寺幾二十年至是張浚言其才可任事操可律貪乃有是命辛巳中書言昨金人牒取有親屬在北界命官等當時有心懷忠義不肯從敵藏避之人欲下諸州榜諭許令自陳仍舊出仕從之資政殿學士知洪州魏良臣言與江西轉運判官林仲純因職事相失乞回避詔仲純放罷良臣提舉臨安府洞霄宫癸未宰執奏事參知政事楊椿留身求去上慰諭不許先是欽宗神主祔廟而椿以年衰不能久立幾於僵仆左右掖之而出椿不自安乃丐免於是殿中侍御史吳芾等相繼論之詔出浙西江東常平米二萬賜兩淮為賑濟歸正人之用降授右朝請郎馮榮叔知濠州左奉議郎李燾知榮州成忠郎閣門祇候知濠州都遇添差淮南西路兵馬副都監濠州駐劄是日正侍大夫宣州觀察使興元府駐劄御前右軍統制楊從儀率諸將攻大散關拔之關之未下也左從政郎都統司幹辦公事朱紱以書遺總領財賦王之望言諸軍鬬志不鋭戰心不壯且曰使我力戰就能果立微勞其如賞格當在何處伺候核實保明申獲宣司總司指揮往返數旬豈能濟急大率目今事勢與前時異不立重賞何以責人于死事乞詳酌事機别與措置略于川蜀科敷軍須之費十分之一多與凖備賞給錢物近一二百萬自總所移文諸帥多出曉示號令諸軍各使立功以就見賞謂如散關一處設使當初有銀絹一二萬匹兩錢引一二十萬道樁在鳳州宣撫吳公節使姚公明告諸軍遣二三統制官各以其所部全軍一出諭之曰當進而退則坐以軍律進而勝捷能破關險則有此重賞如是而軍不用命敵不破滅無有也之望怒答書言用兵百三十日糗糧草料銀絹錢引所在委積未嘗乏與纍次喝犒朝廷支賜自是諸軍應報稽緩文字才到本所立便給散略無留阻散關前攻不下聞自有說不知是險固不可取乎是有可取之理而無銀絹錢引之故士卒不用命乎若可取而士不用命豈計司之責必有任其咎者况聞攻關之日死傷不少則非士卒之不用命矣自來兵家行軍若逗撓無功多是以糧道不繼嫁禍於有司以自解亦未聞以無堆垜賞給為詞者也國家息兵二十年將士不戰竭四川之資以奉之一旦臨敵更須堆垜銀絹而後可用則軍政可知矣且如向來和尚原丁劉圈殺金平諸軍大捷近日吳宣撫取方山原秦州等處王四廂取商虢等州吳四廂取唐鄧州亦不聞先垜銀絹始能破敵也朝廷賞格甚明本所初無慳吝如秦州治平之功得宣司關狀即時行下魚關支散何嘗稍令闕誤兼魚關金帛錢物充滿府藏宣撫不住關撥豈是無有樁辦耶李晟屯東渭橋無積資輸糧以忠義感人卒滅大盜足下以書生為人幕府不能以此等事規贊主帥而反咎主人以不斂于民豈不異哉九月以後興元一軍已支撥過錢引二十八萬道銀絹二千匹兩而糗糧草料與犒設犒賞不與焉亦不為不應付矣若皆及將士豈不可以立功有功當賞而未得者何人也朝廷分司庀職各有所主而于財賄出納為尤嚴經由檢察互相關防所有屢降指揮凡有攴費宣司審實總所量度此古今通義而聖朝之明制也足下獨不辨何哉來書謂攻散關時若得銀絹錢引樁在鳳州而敵不破滅無有也樁在鳳州與在魚關何異方宣撫以攻守之策㑹問節使時亦不聞以此為言今散關鳳翔未破足下可與軍中議取散關要銀絹錢引若干取鳳翔要若干可以必克本所當一切抱認足下可結罪保明具申當以聞于朝如克敵而賞不行僕之責也若本所抱認而不能克足下當如何紱不敢對至是從儀督同統制田升等夜引兵攻散關四鼓拔之遂分兵據和尚原金人走寶雞紱眉山人也是役也宣撫司調梁洋義士萬數授以楮甲使之先登比交鋒官軍光遁義士死者大半西人痛之甲申淮南轉運副使楊抗罷以右諫議大夫梁仲敏論其因循尸素也右朝奉郎朱夏卿直徽猷閣主管江州太平興國宫夏卿自淮束總領罷歸乃有是命右奉議郎知房州司馬倬直祕閣録鄧州之功也左朝奉郎通判信州陳扃直祕閣知信州扃以薦得召見遂有是命言者論扃頗有吏能褒龍太過詔俟滿歲取㫖丙戌詔賜張浚錢十九萬緡為沿江諸軍造舟之費初上既還臨安有勸浚求去者浚念舊臣無他在人心尤以巳之去就為安危乃不敢言去日治府事細大必親焉祕書省著作佐郎張震言自建炎元年至紹興十二年日歷巳成者五百九十卷多所舛誤而十二年以後迄今所修未成書者至八百三十餘草卷未立傳者七百七人切慮日久益以廢弛望令本監長二同共修纂正其差誤內因故相所作時政紀所修者並審訂事實簽貼修改從之詔唐鄧州進士於襄陽府解試院併試戊子上始純吉服殿中侍御史吳芾論軍中冒濫功賞之弊乞榜諭諸軍應寄名之人盡行銷落詔限一月自陳如違停官編管官告院言諸軍以戰功遷秩給告者乞並牒軍中拘收綾紙錢詔特免舊制宗女出適者給資錢有司之財不以時遣南外宗女有踰四十不嫁者時祖宗八世女但得八十千再行者又減半於是直敷文閣知南外宗正事子游言今宗女未嫁者歲費錢米一萬一千餘緡而合得嫁資才九千五百緡而已望下福建路漕司以經總錢借支期以半歲從之己丑詔免光化軍上供上貢等一年集英殿修撰知婺州周葵升敷文閣待制祕閣修撰知溫州徐林充敷文閣待制提舉江州太平興國宫以年逾七十有請也廣東轉運判官林孝澤獻助軍錢十五萬緡湖南轉運判官黃績何佾獻四萬緡詔激賞庫收右諫議大夫梁仲敏入對論參知政事楊椿輔政期年專務諂諛以奉同列議論政事之際則拱手唯唯既歸私第則酣飲度日以備員保祿為得計朝廷何賴焉殿中侍御史吳芾言椿自為侍從已無可稱其在翰苑所為辭命類皆剽竊前人綴緝以進冒登政府一言無所關納一事無所建明但為鄉人圖差遣為知舊干薦舉而已故都人目為收敇參政又以伴食參政目之去冬警報初聞有數從官謁椿勉以規畫又以危言動之椿竟不答但指耳以對蓋椿素有瞶疾也親厚有風之使去者椿曰吾為參政宰相諾吾亦諾宰相拜吾亦拜重聽何傷其貪祿無耻至於如此左正言劉度亦論椿貪懦無耻頃為湖北憲率以三百千而售一舉狀自為侍從登政府惟聽兵部親事官及親隨吏貨賂請求望賜罷免以肅中外辛卯參知政事楊椿充資政殿學士提舉在外宫觀椿為臺諌所擊四上疏丐免乃有是命詔宰輔親王近臣報謝天地宗廟社稷宫觀及諸神用太常少卿王普請也壬辰上始御正殿右武大夫和州防禦使江州駐劄御前右軍統制李貴為江南西路兵馬鈐轄罷從軍浙西沿海制置使李寶奏膠西立功將士三千五百九十人詔第賞有差于是左從政郎京東招討使主管羽檄軍書文字曹秬特改合入官仍遷三秩秬江隂人也湖北京西制置使吳拱言西北來歸之人甚衆望權令踏逐寺觀安泊分給官田貸之牛種權免租稅上從之癸巳敷文閣待制樞密都承㫖徐嘉充館伴大金國信使武功大夫吉州刺史權知閣門事孟思恭副之先是北使高忠建等將入境責成禮及新復諸郡此據朱熹撰黃中行狀修入但熹稱責新復四郡則恐誤蓋此時京西淮北陜西新復近二十郡不但海泗唐鄧而已接伴使洪邁移書曰自古以來鄰邦往來並用敵禮向者本朝皇帝上為先帝下為生靈勉抑尊稱以就和好而岐國無故興師背盟自取夷滅竊聞大金新皇帝有仁厚愛民之心本朝亟諭將帥止令收復外不許追襲乃䝉責問首遣信使舉國欣幸無以為諭但一切之禮難以復仍舊貫當至臨淮上謁更俟惠顧曲折面聞近例迓使相見于淮河中流及是見于虹縣之北虞姬墓始抗禮比錫燕以欽宗喪制未終不用樂太府少卿總領四川財賦王之望言于宰執曰伏聞金人改圖願修舊好遣使叩關將至闕下近陜西僞都統者亦揭榜令其將士毋得交戰以待講解察其上下之意和議甚切蓋和議不定則必有內憂不獨懼我師之致討而已國家以生靈為念固應許其自新有如三事所宜審處一正名分二减幣聘三畫疆界竊料金人之議必出兩端一則欲仍用舊儀更增歲幣而以河南故地盡歸本朝一則欲復請侵疆各守舊境而以契丹故事求為敵國二者皆未可遽也女真本越在逺服貢獻于我海上之盟以契丹之故約為兄弟契丹既滅便尋釁端以宣和為渝盟靖康為失信劫遷二帝淪陷中原聖主中興懷柔備至而狃于常勝必欲兼并凶力既窮始通和好天子不較稱謂屈己從權者正以强弱之勢有未敵耳其後東昏正隆屢盟屢變至敢傾國大舉直窺濟江其渝盟信視我宣和靖康孰輕孰重我可以為辭矣今其立者素非人望以孱庸之故得自全于正隆之朝完顔一宗誅屠略盡見在近屬惟有葛王僣盜之謀起于羣下非有受命之符遏亂之略也威福大柄必在權强內外乖爭覆亡可待故即位未幾已有兄弟之變近傳金主詔書兵部尚書克錫昭武大將軍鄂楞延安府同知李老僧武義將軍千户烏赫哩統軍司令史鄂爾多謀叛伏誅觀其纍世骨肉自相剪除此豈安固之基靈長之運哉則强弱之勢與靖康以後事體不侔逺甚若欲通好必尋海上之盟復敵國之禮然後可許名分既正歲幣自輕凡此二事彼必不敢固執唯分畫之議恐費商榷耳大河以南彼知終非所有或當輕以與我而别有所邀然淮漢之北人稀土曠都無險扼汴都殘破徒有虛名雖或得之未易經理發兵戍守少則不足多則不堪措置一乖腹心罹患此黠敵反覆已試之䇿而我向來受欺覆車之明戒也豈可保哉厥今天下之勢唯陜西為可復其地去北最逺控帶江河內有四川為之根本我已得其十餘州若摧散關鳳翔之衆則其餘風靡矣今日之議設以大河為界固中國之福猶當深圖利害以敉後艱若以此更有邀求豈容墮其姦計彼欲降尊損幣自同契丹而靳吝土疆不肯分割則陜西之地决不可失宜以我所得陳蔡唐許潁嵩洛并他路諸州兩相換易如尚不可則寧稍增幣期于必從獨留南陽以通武關若我并梁雍荆揚之區保江漢秦蜀之險平居無事積糧固圉北雖猖獗亦無能為若其有釁可乘北方不足圖也此事至重非片言所决必一再往復而後可了惟少忍之而已陜西既得則置宣撫司于階成和鳳之間分布將帥據和尚方山仙人等原以臨制關中各用土人保其郡邑如熙秦京兆要害之處量出蜀兵戍之使以其力自參而不為蜀纍邂逅有警則下甲而出征萬一不虞則回戈而固守進可逐利退無後憂撫綏數年形勢自壯不煩糧饋不耗金錢唯稍出蜀縑增印錢引以募糴于陜西便足以了辦經費天下之利莫大于此百世之業也之望所言在此月而不得其日今因差館伴附書之書中稱若摧散關鳳翔之衆則其餘風靡蓋在未復散關之前也權尚書吏部侍郎汪應辰與權户部侍郎徐度兩易應辰仍兼權國子祭酒詔去年十月癸卯所降劫盜一切抵死指揮勿行右朝奉大夫提舉兩浙西路常平茶鹽公事徐康行尚書户部員外郎總領淮東財賦軍馬錢糧户部郎中總領淮東財賦軍馬錢糧林安宅令赴本部供職甲午右武大夫元居實為淮東東路馬步軍副總管揚州駐劄專一招填本路闕額軍兵右承事郎幹辦行在諸司審計司曹耜為軍器監主簿耜亦勛子也乙未右朝請郎知盱眙軍周淙言富察特默奴婢走馬自燕來報契丹侵擾金國等事上謂大臣曰上天悔禍與國相攻今先遣使請和則其國中可卜昔西漢五單于爭立久之呼韓邪朝于渭上儻舊疆復還得奉祖宗陵寢尤見天意眷顧誠國家之福也陳康伯奏曰頃年金后有云只見漢和蕃不見蕃和漢今日金先求和仰見聖德動天之應左中大夫提舉洪州玉龍觀董弅引年告老詔復敷文閣待制既而右諌議大夫梁仲敏論其居鄉擾民乃降為集英殿修撰三月乙卯四川總領所增印錢引一百萬道以備邊儲先是密詔許本所增引三百萬道去年十二月庚子總領王之望恐害引直寢不行至是宣慰使虞允文取撥百萬以備招軍之望始增補其數半充新復州軍省計半備犒軍而已是月興元都統制姚仲統忠義統領假彥引兵攻平安關寨克之進至原州金人堅守不下彥以兵圍其城鼓勵將士乘勢畢登遂拔之殺其知州完顔薩里獲同知鎮國將軍赫舍哩烏楞古等并其孥來獻乃以彥知原州彥又遣將官陳玘克西壕柳泉綏寧靖安四寨原州之克史無其日捷奏四月九日到行在費士戣蜀口用兵録繫之閏二月三月丁酉朔新除資政殿學士楊椿降充端明殿學士提舉臨安府洞霄宫時諌官梁仲敏劉度連疏論椿持祿茍容而殿中侍御史吳芾極言椿按刑湖北委政妻弟關節公行既位于朝蜀人之求官理賞者椿受其賂遺擅以威勢逼脅省部以遂其私所得减半不以與人而盡出賣於富室所破宣借元不差人而收所請于私帑三衢豪民徐國澄納錢二千二百緡遂以門客恩澤奏之衆牙分錢不均喧爭于市椿知而不耻章再上乃有是命起居郎唐文若起居舍人兼權中書舍人劉珙並試中書舍人珙仍兼權直學士院權尚書户部侍郎張運充集英殿修撰提舉江州太平興國宫從所請也殿中侍御史吳芾言本臺如遇得㫖令臺諌赴都堂議事或特令薦舉及同共看詳文字未審監察御史合與不合干預事下吏部本部言依條稱臺官謂大夫中丞侍御兩院御史又御史臺令稱兩院御史者謂殿中侍御史監察御史合依上條干預從之己亥詔海州漣水縣依舊𨽻楚州以金人圍海州故也庚子詔扈從視師官吏軍兵依紹興四年例各轉一官資中書門下省檢正諸房公事吕廣問為起居郎左朝奉大夫宋朴提舉台州崇道觀右朝奉大夫提舉福建路常平茶事鍾世明罷先是世明自陳本貫南劔州乞回避詔特免言者論世明居鄉嗜利有同市人今為本部使者何所不至朝廷若欲抆拭用之且試以兩淮凋弊州郡令以功贖過仍乞自今應差監司必先下部檢㸃家狀然後除授庶幾不廢祖宗之法從之辛丑左宣教郎新主管官告院杜易依舊知嘉興縣初邑民婁睿等詣提刑頌易於巡幸之時催科不擾提刑官王躍薦于朝詔召入㑹邑民有以本縣曩嘗斂錢募人挽舟自釘其手赴御史臺聲寃者諌官因論近韓元吉知建安縣雖以大臣之薦亦俟終更方許赴闕今易到官未及一考遂除告院則是婁睿之言乃重於執政之薦也望下本路監司審實如果有善政即乞用韓元吉例仍將御史臺所訴改送鄰州根究庶幾毁譽核實升黜不爽從之是日四川宣撫使吳璘自秦州引兵至德順軍先是興元都統制姚仲攻德順踰四旬不能下乃以中侍大夫武當軍承宣使知䕫州李師顔代之與中軍統制吳挺節制軍馬㑹金國都統完顔喀齊喀副都統張忠彥目鳳翔濟師又遣其左都監自熙河以兵由張義堡駐摧沙合涇原之師來援挺與敵遇于瓦亭統制官拱衛大夫秀州刺史吳勝閣門宣贊舍人朱勇等以所部逆戰統領官王宏謂人曰吾赤手歸朝驟官將領不以死力戰非夫也即突出部其徒擊敵坐椅注飛矢如蝟毛宏不動敵敗去然諸軍猶畏敵軍盛復相持不敢進璘恐士有怠志遂自將以往至是抵城下壬寅詔諸路帥府並置㑹子庫左司員外郎充接伴使洪邁文州刺史知閣門事充接伴副使張掄等言接伴變更舊例事件望降付三省樞密院令主管往來國信所照㑹今已差館伴及日後接送伴再賜御筵中使並令通知庶免異同從之邁等所更凡十四事其大略則不傳御名不問聖躬不稱上國下國伴使與北使語稱主上為本朝皇帝而北使亦改宋國為宋朝舊中使讀口宣微稱有㫖今抗聲言有敇舊稱帝恩隆厚今改稱聖恩舊私覿用狀申送今用目子舊與北使逺迎狀及賂北引接金銀等皆罷日歷洪邁等奏接伴更變舊例事件今開具如後一舊於淮河中流取接今于虹縣北虞姬墓首一舊接伴使副先一日發逺近狀人使不答今來不與一舊只傳帝名而北方傳廟諱御名今彼此不傳一舊接伴使問大金皇帝聖躬萬福北使只問宋帝清躬萬福今彼此不問一舊相見之初對立已定接伴出班就北使立位叙致今彼此稍前一舊上中節公參時接伴公服出笏迎于幕外與之揖今只著紫衫而彼冠服如儀上節先作一畨參接伴梢起不還揖中節來則坐受其禮一舊北引接初傳銜時賂以金十兩銀二十兩今不與一舊與北使語稱上國下國今稱貴朝本朝一舊北使口稱本朝為宋國今改為聖朝一舊對使人稱皇帝為主上今稱本朝皇帝一舊賜御筵中使讀口宣低稱有㫖今抗聲言有敕一舊中使與北使相揖北引接請中使稍前今只依平揖一舊御筵勸酒傳語稱帝恩隆厚今稱聖恩隆厚一舊送私覿接伴用銜位姓名申狀人使回狀押字不書名今彼此用目子癸卯閣門客省奏北使到闕朝見禮儀及參酌傳語意度並以在京舊儀及渡江後近例北使見日位于西班照東班宰臣稍退從之詔閣門宣贊舍人知海州魏勝妻于氏特封安人金之圍海州也勝為流矢所中病甚于氏割股肉進之勝尋愈故有是命甲辰罷扈從官吏遷官其禁衛軍兵依已降㫖時言者交章論臨安至建康不逺官吏俸劵優厚其視軍兵之驅馳道路事固不同况比來軍下奏功例多冒濫朝廷方欲痛懲其弊則賞典所加豈容不惜儻謂紹興四年之例不得不遵則六年移蹕江上比之四年尤為淹久初未嘗有賞則是當時已悟前賞之非而革之矣望寢前降指揮以杜僥幸之門庶協公議故有是㫖司農少卿總領湖廣江西財賦向伯奮守司農卿太府少卿總領四川財賦王之望試太府卿以二人餉軍無闕故也乙巳少保奉國軍節度使四川宣撫使領興州駐劄御前諸軍都統制職事充利州西路安撫使判興州充陜西河東路招討使吳璘為少傅龍神衛四廂都指揮使保寧軍承宣使金房開逹州駐劄御前諸軍都統制兼知金州兼金房開逹州安撫使王彥為保平軍節度使録商虢之功也權尚書禮部侍郎兼侍講黃中落權字翰林學士兼侍讀兼權吏部尚書何溥充龍圖閣學士提舉江州太平興國宫以疾自請也丁未左司員外兼國史院編修官洪邁文州刺史知閣門事張掄接伴北使還入見邁等言伏見已降指揮罷北使沿路遊觀燒香竊謂朝廷方接納鄰好所爭者大非一事而止也今賜豫宴犒一切如舊則遊觀小節似不必略若以欽宗皇帝服制為辭則向者顯仁皇后弔祭使來天竺浙江之行猶且不廢或彼有請拒之無名望令有司依例施行詔使人欲往浙江觀潮令館伴諭以近日水勢湍猛損壞江亭石岸難為觀看其天竺並沿路遊觀燒香且依近例或無所請即依已降指揮施行遂以邁守起居舍人兼職如故是日金國報登位使高忠建等入國門始忠建責臣禮及新復諸郡邁以聞且曰土疆實利不可與禮節虛名不足惜也禮部侍郎黃中聞之亟奏曰名定實隨百世不易不可謂虛土疆得失一彼一此不可謂實議者或有言土地實也君臣名也趨今之宜當先實而後名乃我之利權兵部侍郎陳俊卿曰今力未可守雖得河南不免為虛名臣謂不若先正名分名分正則國威張而歲幣亦可損矣洪邁所奏它書無之朱熹撰黃中墓志云迓者以聞蓋邁時為接伴使也戊申録文宣王四十九世孫孔琯為右迪功郎以白身最長承繼恩也主管淮西安撫司公事方滋言右迪功郎盧仲賢招諭到歸正願就屯田人一萬七百五十二人欲添差仲賢本司幹辦公事專一招集其田係在濠州境內乞令濠州守臣兼帶措置屯田餘州候招集有緒依此從之是日四川宣撫使吳璘復德順軍璘初至城下自將數十騎繞城守陴者聞呼相公來觀望咨嗟矢不忍發敵氣索於是璘按行諸屯預治夾河戰地前一日當陳斬一將數其罪以肅軍諸將股栗乃先以數百騎嘗敵敵一鳴鼓鋭士躍出突我兵遂空壁來戰我軍得先治地無不一當十逮苦戰久日且暮璘忽傳呼某將戰不力其人即殊死鬭敵大敗遂遁入壁質明我再出兵敵堅壁不戰㑹天大風雪敵引衆夜遁璘入城市不改肆父老擁馬迎拜幾不得行遂遣忠義統領嚴忠取環州獲其守將中憲大夫郭裔先是武功大夫閣門宣贊舍人强霓與其弟武經大夫震皆陷敵及是自環州來歸璘嘉其忠義奏以霓知環州兼沿邊安撫司公事震統領忠義軍屯環州熊克小歷附復德順于四月之末按德順奏以四月四日至行在小歷誤也復環州不得其日奏至在四月九日今併附復德順之後己酉太常少卿王普假工部侍郎充送伴大金報登寶位國信使武翼大夫榮州刺史帶御器械王謙假昭慶軍承宣使副之時已議遣洪邁張倫出疆故改命二人送伴忠義統領孟晞聚衆數千人于宿亳之間朱家林嘗與金人戰詔以晞為承節郎庚戌權尚書户部侍郎兼權國子祭酒汪應辰兼侍講進講春秋文州刺史知閣門事張掄為果州團練使起居舍人洪邁特轉一官録接伴之勞也右朝請大夫知黃州沈邦直依所乞主管台州崇道觀右朝奉大夫新知濠州馮榮叔移知黃州閣門祗候淮南西路兵馬都監都遇復知濠州辛亥命權兵部侍郎陳俊卿權工部侍郎許尹措置兩淮堡寨屯田等事初命御營宿衛使楊存中與兩路制置帥漕司同措置而久未就緒故復遣近臣壬子金國報登位使驃騎上將軍元帥府左監軍高忠建副使通議大夫尚書禮部侍郎張景仁見于紫宸殿故事北使授館之三日即引見至是以議禮未定故用是日於是北使于隔門外下馬近例于宫門內隔門接下馬三節人下馬于皇城外近例在皇城門內上下馬使副位于節度使之南不設氊褥近例與宰相齊班仍並設氊褥以欽宗喪制未終不設仗次燕埀拱殿不用樂先是閣門定受書之禮略如京都故事東京舊儀北使跪于地下進書內侍啓匣取書宰執讀書畢使人升殿跪傳北主語問上起居客省官宣問畢北使下殿起居詔館伴使徐嚞等以所定示之忠建固執上特許殿上進書此月辛亥降㫖及升階猶執舊禮尚書左僕射陳康伯以誼折之忠建語塞乃請宰相受書康伯奏曰臣以宰相難以下行閣門之職忠建奉書跪不肯起廷臣相顧眙愕康伯呼嚞至榻前厲聲曰館伴在館所議何事嘉徑前掣其書以進北使氣沮上嘉歎之此以日歷㑹要隆典宣諭聖語徐嚞待罪奏狀熊克小歷參修兵部尚書川陜宣諭使虞允文言自去年以來湖襄諸軍轉戰京西因糧於敵比常年歲計約减省儲積得米斛二十萬石乞行下本路於上件米內支撥應付京西招討使等處新移效用如川陜諸軍有上件因糧减省米斛亦乞行下許本司移文四川總領所用支新募軍兵效用從之癸丑金人圍淮寧府守城武翼大夫忠州刺史陳亨伯登城督戰為流矢所中死之甲寅右迪功郎尹穡等引對穡河南人也敷文閣待制樞密都承㫖徐嚞武功大夫吉州刺史權知閣門事充館伴副使孟思恭言館伴金國使人所有朝見一節得㫖特令上殿進書臣等先與北使副議上殿禮數及將進書客省接書儀範凡三次說諭北使張景仁云都理㑹得已將所議節次奏聞不期北使副在殿上却乞近上臣僚接書續奉㫖令館伴接書臣即時接書進呈訖合行待罪詔放罪燕北使于都亭驛命知樞密院事葉義問押伴故祕閣修撰曽開追復敷文閣待制詔韓誡已除在京宫觀誡嘉彥子已見所有請給自供職以來未嘗支破可令依祿格施行給事中金安節權中書舍人劉珙言臣等初謂國家賦祿高下具載格法有司何為不與放行致煩聖聽今將户部案牘契勘據糧料院狀稱張說昨提舉佑神觀請給依例支給即與張說事體一同難以免借减臣等復自檢照給與祿格諸遙郡承宣使除統兵戰守官外並行借减其指揮著在祿格行之已久今誡既任宫觀差遣自合借减况與張說事體一同誠難獨免若或放行恐後來者轉相攀援有瀆天聽望令照應借减指揮施行庶幾人悉知分一遵明制從之四川宣撫使吳璘自德順軍復還河池是日金人自摧沙引兵由開逺堡犯鎮戎軍環城呼噪衆矢盡發守將秦弼來救援時興元都統制姚仲已遣將官王仲等領千兵戍鎮戎至是又遣副將杜孝亷領兵五百屯摧沙為外禦乙卯右朝散大夫吳巘提舉淮南東路常平茶鹽公事丙辰燕北使于都亭驛命同知樞密院事黃祖舜押伴近例不臨宴則宰臣就館賜宴至是稍殺其禮丁巳金國人使高忠建等入辭置酒埀拱殿忠建等既朝留驛中凡五日觀濤天竺之遊皆罷之至是面受報書用敵國禮將退遣客省官宣諭云皇帝起居大金皇帝謝逺勞人使持送厚幣聞皇帝登寶位不勝欣慶續當專遣人欽持賀禮忠建等捧授如儀起居舍人兼國史院編修官洪邁假翰林學士充賀大金登寶位國信使果州團練使知閣門事張掄假鎮東軍節度使副之亮之立也秦檜白遣柄臣往賀至是復用舊禮右武大夫榮州刺史提舉佑神觀張說知閣門事言者請倣漢武故事詔侍從臺諌各舉內外之臣可備使命者不限官之文武位之高卑察其可用即奬擢以為緩急之用茍得如曹利用輩亦奚患事之不集詔各舉一員初嘉州徼外蠻既掠賴因忠鎮二寨又于州境立夷神廟而歸無敢誰何者言者謂諸州寨將祖宗時擇其土豪為之特與蠲免徭役故皆樂於承命近年以來不復免役而又三年一替其權不專所部土丁曽不為用望復舊制且久其任凡三年之中無敗闕透漏即以校副尉之類補之如其不才或致騷擾即許他人論替又土丁與夷獠雜居習熟地理便于馳逐望令勒成隊伍以備緩急詔制置司措置戊午北使出國門忠義軍統制兼知蘭州王宏引兵拔㑹州獲其通事李山甫等五十四人宣撫司因令宏統制蘭㑹州軍馬是日金人陷淮寧府忠義副統領戴規部兵巷戰奪門以出為敵所害守將陳亨祖之母及其家五十餘人皆死後贈亨祖容州觀察使贈規三官録其家三人又為亨祖立祠于光州名閔忠北之叛盟也淮襄諸軍復得海泗唐鄧陳蔡許汝亳夀等十州自是但餘四州而已亨祖贈官等指揮在四月乙酉己未上始御經筵自去秋以用兵權罷講讀至是復之權刑部侍郎兼侍講黃祖舜進論語解義詔給事中金安節等看詳安節等言其書詞義明粹足為後學之傳乃令國子監板行仍賜祖舜詔書獎諭辛酉上諭宰執曰近傳到金人賞格卿等見否陳康伯曰見之上曰其意何如康伯曰觀其語云邊釁既生未底寧息恐是京師總兵蕃官所請欲復取所失州縣耳上曰朕熟金國用兵始末自尼瑪哈阿里布在時軍政極嚴不用賞典止用威脅其下而人自畏服今賞格如此之重必是人不用命也康伯等曰聖識高逺非臣等所及左宣教郎諸王宫大小學教授袁孚特引對詔孚守監察御史樞密都承㫖徐嚞等奏館伴更改近例事件望降付有司令今後館伴參照施行從之嚞等所陳凡十四事其大略則更定朝謁與進書授書儀範及伴使與北使抗禮而已日歷徐嚞孟思恭奏䝉差充館伴大金報登寶位使人自接見至出驛有更改事件下項一近例館伴傳銜以紙四張單階先通于北使副北使副以紙一張雙銜便回答今彼此只用一張雙銜一近例館伴先于亭子內等候北使副上轎先立轎于班荆館門外待候北使副上轎同入今改只各就船同上轎擺定入館門歸幕次中一近例掌儀以下先于北使副船外岸上立定趨參其北使上中節止就幕次內參館伴今來爭議本所掌儀以下與北上中節各不公參一近例在驛每遇過位館伴使副于位次便門立定相迎同至設㕔今改更不相迎止就設㕔上對立相揖一近例遇使人入內使副于宫門內隔門裏上下馬今改宫門內隔門外上下馬一近例三節人於皇城門裏上下馬今改皇城門外上下馬一使人朝見并意度等儀範並係與北使對南靣爭議逐急申明朝廷降到指揮今來與近例更改不同一近例使人在驛遇天使賜到物以兩次賜物併作一畨受賜拜表謝恩今更改逐次拜表謝恩一近例使人觀濤天竺之遊今更不往一近例臨安知府書送酒食并書儀與北使副並用狀子繫銜書名北使副回狀繫銜押字今改不用狀一使人朝辭捧授國書等禮儀係是爭議改更並從舊例即與近例不同一近例夜筵解換館伴請都管以下就筵勸酒館伴起身與都管以下相揖其北使副不起身今改北使副皆起身一近例館伴自執注子斟勸都管以下今改作只令通事斟勸權户部侍郎兼侍講汪應辰言太祖乾德四年詔鹽鐡度支户部判官自今應制置起請事件或素未諳詳不知利害即牒問曽臨蒞者别司判官同共看詳畫時回牒可否從長就便方得施行開寶三年又詔今後一司如有敷奏諸司同取指揮總合便宜方得行遣臣竊以人之材智不能兼備有宜于此而不宜于彼者故許未逹之事别司得以看詳事之施行不能曲盡有便于此而不便于彼者故令敷奏之事三司皆同取㫖其慮事也周矣今之户部昔之三司而郎官分曺治事各司其局遵守法令無敢出意見而議其他者得毋如太祖詔令所慮者乎欲乞今後户部或事有相關或理有可疑難以便行裁决者並許長二臨時與衆郎官聚議文字皆令連書既有定議然後付本曺行遣庶幾謹重大計博盡衆謀而不致於疏略抵牾也從之金人引兵與蕃官興格同圍原州守將假彥親率忠義統領鞏詮領兵併州之官吏軍民登城以守金依城建寨晝夜攻擊原州城雖固而忠義兵皆無甲乃遣使詣鎮戎軍秦弼求援弼無兵可遣不得已分第三將趙詮及總押官茍俊所領兵之半應之興格本涇原部落子奔降于北深知利害險扼之處金遂將之是日川陜宣諭使虞允文至西縣之東總領四川財賦王之望自利州往㑹之允文之出使也與京西制置使吳珙荆南都統制李道㑹於襄陽至是又與四川宣撫司吳璘㑹於河池前後博議經略中原之䇿令董庠守淮東郭振守淮西趙撙次信陽李道進新野吳拱與王彥合軍於商川吳璘姚仲以大軍出關輔因長安之糧以取河南因河南之糧而㑹諸軍以取汴則兵力全而餉道省至如兩河可傳檄而定遂驛疏以聞先是之望數以軍興費廣為言朝廷令勸諭民户獻納之望因是親至梁洋諭豪民使之輸財焉壬戌上謂輔臣曰近大將入覲有以鞍馬寶貨為獻者惟馬不可闕餘皆却之蓋慮以進奉為名公肆掊尅有害軍政耳時主管侍衛馬軍司公事成閔自淮東赴行在故上語及之上因言宫中平時服食器用無非儉素如彘肩豆腐間以供膳器皿之屬亦無稜道今御厨所用是也朱倬曰當書之為後世法上曰此何足為後世法陳康伯曰此盛德事外間有未知者豈可不書敷文閣待制提舉江州太平興國宫周石致仕癸亥夏人二千餘騎至菜園川俘掠又二百餘騎寇馬家巉甲子言者論比年以來士風委靡以觀望為進取之資以姑息干長厚之譽是以州縣官吏弛慢贓汙庇而不發望明詔有司應官吏以不職不法抵罪監司守倅不先按發而旋覺察者並坐以知而不告之罪務在必行又言祖宗為治之道可為萬世法歲月寖久或因臣僚建言有所更革吏緣為姦望自今悉付中書後省或送所𨽻之司使之看詳必於祖宗之意無所違戾然後施行則良法美意在人耳目吏無所容其姦矣從之丙寅四川宣撫使吳璘令右軍統制盧仕閔盡以秦鳳路并山外忠義人及鎮戎軍四將軍馬留𨽻守臣秦弼先是弼言鎮戎兵備單弱敵勢甚盛乞遣援兵故也是月明州言高麗國綱首徐德榮至本州言本國欲遣賀使詔守臣韓仲通說諭許從其請殿中侍御史吳芾言高麗與金人接壤為其所役如紹興丙寅嘗使金稚圭入貢已至明州朝廷懼其為間亟遣之回至是二十餘載方兩國交兵德榮之情可疑今若許之使其果來則懼有意外之虞萬一不至即取笑外國上從其請乃止之太府卿總領四川財賦兼權提舉秦鳳等路買馬監牧公事王之望遺宰執書言見今三帥分頭征討官軍義士與招降之衆幾十二萬人前此用兵無如今日犒賜激賞糴博糧草之費已一千餘萬引自休兵以來二十年間纎微積纍之數及纍次朝廷支降錢物皆已費用所存無幾耳今不之計而向去事勢未有休息之期戰勝則有重賞納降則有大費皆不可預計本所若常無數百萬以凖備應付緩急何以枝梧曉夕憂惶未知攸濟兹者朝廷遣腹心近臣宣諭川陜專委以招軍買馬此誠國家武備所急然皆在四川安危大計與總領所用兵循常非泛一切調度之外虞尚書元初申畫所降指揮並不仰給本所朝廷聰明灼知本所别無錢物可以支撥故出內庫金給降度牒以供其用及宣諭使到此費用漸廣與向來遙度事體不同故凡指揮本所事間或出乎元初畫降之外兩司職任各是逼迫雖互相昭悉而皆有不得已者想宣諭接續再有申明而本所未曽承受總領茶馬本是兩大司平時所費恐自不資今兩司所費又多於平時數倍而欲以總所平時所有供兩司數倍之用况宣諭使司招軍買馬又在其外而所費尤不可算乎以前總領兼領茶馬是欲那取催收之資以濟軍用今來之望權秦司却是暗侵總所財物以供買馬當此軍興調餉之際以一司所有供三大司非泛之用其將何以應給許總領任內以新招軍合添衣糧請于朝廷於茶馬司撥錢四十萬引應付是時之望權四川茶馬今之望為總計要將總領所錢物應付兩司買馬相去只在一年之間所費十倍之廣不應取豫如此之相反也若將來本所用度闕乏誤國大計將誰任其咎者已纍具誠懇控告廟堂乞改授一宫觀差遣伏望别選才能委以濟辦依之望所乞早賜陶鎔庶免有誤公事是春淮水暴漲中有如白霧其濶可里所其長亘淮南北又有赤氣浮於淮面高僅尺長百餘步自高郵至興化縣若血凝而成者此據孫祖義高郵志建炎以來繫年要録卷一百九十八建炎以來繫年要録卷一百九十八金人地名考證溫特赫原書作溫迪㾗誤改見卷一百九十七克錫原書作可喜與金史同並誤今改正鄂楞原書作烏倫即金史之斡倫並誤今改正烏赫哩原書作烏古剌誤今改正鄂爾多原書作斡里朵即金史之斡魯朵並誤今改正薩里原書作撒里誤今改正赫舍哩烏楞古原書作紇石烈訛魯古即金史之斡魯古並誤今改正喀齊喀原書作合喜誤改見卷一百三十八尼瑪哈原書作粘罕誤改見卷一阿里布原書作阿里不誤改見卷二興格原書作杏果誤今改正富察特默原書作蒲察徒穆誤改見卷一百九十一
