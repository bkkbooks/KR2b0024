body:
  text: 建炎以來繫年要録卷一百六十九宋李心傳撰紹興二十有五年秋七月戊申宰執進呈疏决文字上曰行在刑獄皆已蕃充外路須令憲臣躬詣州縣庶無寃濫己酉秦檜奏曰陛下欽恤庶獄異境所推今欲令大理正一員往决浙西滯獄以稱德意上可之丙辰宰執進呈户部狀凖都省批送下四川安撫司制置使符行中四川總領湯允恭户部員外郎鍾世眀申行中等同共取索得四路州縣委是供輸太重除節次承指揮減免外見理之數尚多理合減免及將纍年積缺難以催理錢物酌度減放委得不妨軍食寬裕民力欲並依所乞先是茶馬司嵗剩錢二百萬緡宣撫司已取撥四十萬緡赴總領所贍軍而成都潼川府䕫州路廂軍闕額錢七萬九千緡皆已入帳成都路六萬一千八百四十四緡潼川路一萬七百六十一緡䕫州路六千三百二十四緡事俱已見十七年九月己巳至是世眀乞嵗增撥茶司剩錢七十三萬緡利路廂軍闕額錢十萬緡又以三路稱提錢八萬緡益之稱提錢已見十八年五月乙丑今復以七萬九千四百八十三緡有奇悉與之遂減兩川絹估錢匹一緡凡二十八萬緡時西路每匹估十千有半東路估十千又減潼川府秋稅腳錢四萬緡利路稅斛腳錢十二萬緡舊三十萬餘斛每斛錢引千四百去年已減三萬緡今又減兩川米腳錢四十萬緡元理百五十萬纍減至今尚存三十五萬鹽酒重額錢七十四萬緡激賞絹九千餘匹十六年十二月戊戌宣司已減二萬匹今再減外餘三十萬匹自絹估錢已下所減合一百六十餘萬緡皆勿復取又蠲州縣逋缺錢二百九十二萬緡係紹興十九年至二十三年拖缺折估糴米等錢始世眀之使閩也已見二十二年三月丁巳凡所建白皆不以聞而第申尚書其使蜀亦然上頗咎之然嘉其亷謹遂以為直祕閣兩浙路轉運副使以日厯及四川財賦冊參修上咎世眀據今年十一月庚午聖語附入絹估錢二十六年八月辛卯茶司錢三十年三月戊戌所書可參考右奉議郎兩浙路轉運判官黃然為江南東路提㸃刑獄公事然為畿漕才數月秦檜以其不勝任遽命鍾世眀代之曹泳主然故復得職司左文林郎平江府府學教授曹冠行國子録左文林郎陳孺行太學録孺為眀州職官用曹泳薦入俄又兼實録院檢討官尋以憂去右從政郎監編估局陳序充𠡠令所刪定官序丹陽人少從蘇庠學詩向子諲在版曹薦官之王眀清揮麈録餘話云陳彥育丹陽士子從後湖蘇養直學詩造其三昧向伯恭為浙漕訪養直于隱居彥育適在坐一見喜之邀與之共途益以契合遂以其愛姬冦氏嫁之其後踰年伯恭登從班乃啓于思陵云冦氏萊公之元孫其後獨有此一女乞以一官與其夫陳序遂詔特補和州文學伯恭為自製簮裳靴笏令人賫黃牒往併授之以白金為餉彥育方教村童于陋巷持書人至彥育疑非其所有至出補牒見其姓名始拜命望踰意表不勝驚喜閭巷為之改觀其後終于刪定官眀清有其詩一帙至今尚存也序補官不知在何年月果如所言則序蓋不知世間有亷恥事而子諲欺罔之罪不容恕矣或者冦氏實凖之裔流落失身子諲後知之故以適序前賢多如此以無它書參考且附著之序今年九月以進寬恤詔令改官尚書省批狀川路諸軍見耕營田除逃亡死絶外有占佃民間田地如人户陳訴委本路常平司勘驗但有契書干照即行給還仍據本年合收營田租課令人户承認送納與依見今營田免納二稅科須此以紹興三十年二月十八日工部勘當狀修入他書無之同日知利州趙不愚乞將人户識認營田租課取一年酌中數目與減半輸官工部看詳下都統制姚仲同總領所相度未知後如何丁巳右朝散郎監尚書六部門蘇振行太府寺丞總領淮東軍馬錢糧監登聞鼓院曹紱面對言建州邵武軍鄉鎮民間或以非僻之書妄行開印乞委州縣檢察止絶詔如所請専委直祕閣本路提㸃刑獄公事趙令詪奉行令詪燕懿王後昌國公世膺子也戊午直龍圗閣知平江府湯鵬舉罷以右正言張扶論其竊取悻直之名以濟貪汚之行長惡不悛治郡亡狀故也先是扶入對論眀州通判黃卓費耗財用乞賜罷黜上諭以其他州縣官果有似此等人一一奏來扶奉詔而退後四日遂疏鵬舉上之卓罷在是月甲寅或謂卓與曹泳不相能扶所言蓋承其風㫖爾己未右通直郎福建路轉運司主管文字王瀹提舉福建路常平茶事庚申成都府言新繁縣藥師院太祖皇帝御容殿夾柱損壞及壁上衣紋壆裂禮部乞許令修換粉飾從之御容本雍熙間僧道輝所畫熙寧間趙抃初設欄楯帷帳以崇奉之元豐七年走馬承受趙選者更具奏得㫖修建殿宇創置門鑰官設監守崇謁以時紹興元年太平宫道士訾全真等復持太宗真宗御容自鳳翔詣宣撫使張浚浚即遣使安奉于太祖之側四年宣撫副使吳玠更自興州送仁宗英宗神宗御容至此安奉於是本院始有六聖御容辛酉殿中侍御史徐嚞言直徽猷閣知靜江府吕願中悖逆害民時已召願中赴行在上覽疏謂大臣曰聞諸蠻之來盡令於帥司歃血此乃亂世諸侯事其妄作如此乃與願中宫觀令漳州居住其隨行人馬官物差官前去交割壬戌上曰願中既罷恐羣蠻生疑可檢舉典故優與推恩以慰其向化之心於是以左中大夫提舉江州太平興國宫施巨為資政殿學士知靜江府癸亥刑部員外郎許興祖面對言仰惟陛下以至德要道臨御天下嘉與一德大臣都俞一堂之上至誠惻怛仁民愛物靡不用其至焉故靈芝産於廟楹瑞麥秀於留都以彰至治臣竊謂宜如漢齊房之歌製為樂章登歌郊廟以答揚神貺從之尚書兵部侍郎王㑹充敷文閣學士知平江府丙寅左朝請郎張士襄主管台州崇道觀從所請也此為士襄責監當事祖丁卯南丹州刺史莫延沈為本州防禦使依例給長生劵月給鹽三百斤吕願中之未罷也乞令延沈盡承襲父官上可其奏且諭秦檜曰冝令施巨諭諸蕃以願中自別以不法罷去於外國了不相干庶絶疑慮戊辰右通直郎添差通判衢州汪召錫直祕閣提舉荆湖南路常平茶鹽公事秦檜賞其訐趙令襟且令圗張浚乃奏昨得㫖汪召嗣已死欲與其弟召錫推恩詔令除職上因言伯彥鈍而輕信在相州時先在朕之左右故際㑹致大用秦檜曰陛下天命所集繫隆正統非相州守臣之功而召錫因奏事上殿自擬父諡忠獻乞建定策之碑可見其無識也上曰善帝王之興自有天命豈人力所能為也己巳直祕閣知福州方滋移知眀州甲戌靜海軍節度使安南都護交趾郡王李天祚進封南平王加賜衣一襲六事御仙花金帶銀匣塗金銀器二百兩衣著三百匹鞍轡一副馬二匹天祚遣使入貢故有是命上諭宰執曰所授天祚及莫延沈告𠡠卿等可詳視仍與修改播告逺人欲令得體也秦檜時已病上顧檜曰昨醫者謂卿膝弱今已安可喜更當節飲食檜稱謝左朝請郎陳誠之為敷文閣直學士知泉州誠之服闋上欲召之為秦檜所沮乃有是命左從事郎莫汲行國子正八月丁丑左奉議郎知大宗正丞兼工部員外郎王圭面對言縣令之職於民尤親近年以來告訐成風善於其治或遭誣訴有司極其煆鍊故作邑者懼禍之及一切因循茍且為自全之計責其盡綏撫之方勢有不可欲望聖慈付之有司略為措置申嚴行下不惟以絶寃濫亦使能者知勉以副陛下責成之意詔刑部措置申省戊寅左朝散大夫汀州居住趙令襟追一官勒停令南外宗正司委官専一拘管法寺言令襟謗訕不遜故有是命辛巳秦檜進乞差刑部尚書韓仲通户部侍郎曹泳看詳守臣到任所陳裕民五事上曰守臣陳獻利害當令國與民皆足乃為稱職如建炎間時方艱難財用匱乏翟汝文知越州乃盡放散和預買及鑑湖官租不恤國計而専欲盜名如此等人國家何賴也中興聖政臣留正等曰古之為國者有城郭宫室宗廟祭祀之禮有諸侯幣帛饗飱百官有司之事是其勢不得不取諸民然而聖人猶以為不得已也由是量所用以賦之為之什一之法不敢有加焉過乎此則百姓有不足是桀之道也不及乎此則君孰與足是貉之道也二者聖人皆以為有罪也今之事君者曰我能為君惠養元元愛惜生民彼國計之有無吾不知焉是賊國盜名之人也若夫剝下以益上獻佞以營私曰我欲為君充府庫而已此又古之所謂民賊而其罪當不止與盜名者同科由是觀之太上皇帝論臣所言利害必國與民皆足乃為稱職者蓋古者取民之法當如此殿中侍御史徐嚞言近者臣僚論列趙令襟罪惡已䝉付之有司施行臣訪聞事目內一項稱令襟與趙鼎之子汾終日開懷痛飲臨別厚贐之且寄以書信未知所寄何人臣竊謂汾故宰相之子乃甘心與人遞送書信决有姦謀密計窺伺朝廷事機儻不究治則罪惡不彰為國産禍不可不慮詔送大理寺究治壬午左中大夫知鎮江府張修國子正王復並為監察御史修厭次人曹泳之為小吏也嘗以贓汚被劾修力庇之復自樞密院效士登第驟除臺官人皆駭愕右承議郎新浙東安撫司主管機宜文字王曉通判溫州曉㑹弟也癸未左從事郎祕書省正字張震特引對詔改合入官甲申秦檜進呈敷文閣待制提舉台州崇道觀蘇符右宣奉大夫知建康府宋貺欲並復敷文閣直學士上曰符軾之孫與復職名甚善上因言和議之初李光凶悖蔑視朝廷専欲沮壞大計符初贊和議甚力後乃變其說蓋有捭闔之風也國子司業兼權直學士院沈虛中權尚書兵部侍郎大理卿張柄權刑部侍郎祕書省正字洪遵兼權直學士院遵之除日厯不載但於此月壬辰書宰執進呈洪遵乞罷翰苑事壬辰在此月後八日按是時翰苑乃虛中獨員虛中既改除則不容一日無官也且附此更求他書參考丙戌尚書吏部侍郎兼侍講董德元參知政事德元登第七年而執政自吕䝉正以後所未有熊克小厯德元自吏部尚書除蓋誤詔人户身丁免丁錢可特放一年以御前錢依數還户部凡為絹二十四萬匹丁亥尚書刑部員外郎張􅤡陳良翰並為大理少卿己丑廣東經略司言於占城國計置馴象來貢稱真臘國自要進獻上曰祖宗時每遇大禮須用此今見有馴象若其未至姑俟之可也詔都督府所至官莊及牛租可日下放免今後不得起理元降指揮更不施行庚寅殿中侍御史徐嚞右正言張扶監察御史王葆並兼崇政殿說書左朝請郎新知泰州王揚英直祕閣知眉州左文林郎行國子録曹冠為左宣義郎冠特被引對乃有是命後三日除太常博士尋兼權中書門下檢正諸房公事冠引對在是月己丑辛卯樞密院編修官兼權檢詳權樞密都承㫖薛仲雍面對論今眀良一德坐致太平使監司守二不妄用不橫斂則郡縣無緣騷擾乞申嚴行下從之壬辰宰執奏事次上曰頃韓世忠納宅子當令移左藏庫及倉欲以倉基造二府以處執政此祖宗故事今各散居非待遇之體降指揮已三年矣轉運未見施行可呼至都堂傳㫖催促並要日近了畢合用物料工錢於御前請降不得科敷權尚書刑部侍郎張柄充敷文閣待制知潭州柄秦檜死黨也時張浚謫居永州檜猶忌浚故俾柄與汪召錫共察之權尚書兵部侍郎沈虛中依舊權直學士院祕書省正字洪遵改兼權中書舍人遵乞罷權翰苑故有是命癸巳左朝散大夫昭州編管洪興祖卒初趙鼎罷相居㑹稽其門人方疇為言檜答張九成有立朝須優游委曲之語事見紹興八年十月因曰秦相亦今之賢者安得有此怪論鼎曰此南方之所謂賢者北方之賢者必不爾也疇曰公既知之安得薦之於上乎鼎曰張德逺罷相之後鼎再相上曰卿既還朝見在政府去留惟卿意鼎曰秦檜不可令去一日檜留身下殿有喜色謂鼎曰檜適求去上云公自知檜令檜與公商量鼎握檜手曰吾輩當以國事為心也檜由是安迹蓋行止非人之所能為也至是疇默數檜再専國柄十有八年士大夫死於其手者甚多則鼎言非人之所能為信哉右迪功郎張用和贈承務郎官其一子以權潭州安化縣尉捕賊死事本路提刑司為之請也甲午直祕閣兩浙轉運副使鍾世眀乞四川諸路應係大鐵錢並依利州路作二文使用官司不得括責拘收從之蜀自漢以來用銅錢至公孫述據蜀始更造鐵錢厯代仍用銅錢孟氏廣政初復鑄鐵錢與銅錢互用國朝乾德三年平蜀後吕餘慶鎮蜀日首與沈義倫奏乞揀出銅錢計綱發充上供其川界止行用鐵錢後以為非便淳化間仍令兩川銅鐵錢兼用先是益卭嘉眉等州皆鑄鐵錢每嵗五十餘萬緡後因李順之亂罷鑄久之民間闕錢始用私行交子因而弊端百出景德三年張詠上言受詔與轉運使黃觀同裁度嘉卭二州所鑄錢每銅錢一小鐵錢十相兼行用自後人多盜鎔大中祥符七年凌策又請鑄大錢以一當十嘉州錢監名豐逺卭州錢監名惠民止於兩州置爐鼓鑄嘉祐四年趙抃為轉運使奏以蜀中鐵錢甚多乞罷鑄十年以寬民力是嵗祫享赦文中行之熙寧間轉運司復言罷鑄纍年民間見錢闕少乞行下三司詳度减半鑄錢與交子相權詔從之後廢嘉州豐逺監至建炎二年卭州復罷鑄紹興十五年鄭剛中為宣撫副使始復利州紹興監鑄大小錢嵗各五萬施州廣積監者起於紹聖三年其所用爐料悉於清江縣籍定人户家業敷買南平軍廣惠監者所用鐵炭皆取於爐户而於所佃田上捐其租稅廣積監嵗額萬緡廣惠監萬五千緡皆供本州省計而已丙申宰執進呈直祕閣提舉福建路市舶鄭震劄子占城國遣使賫到進奉表章方物并書信上宰相見聽候指揮繳納禮部欲令近上二十三人到闕仍令本司差熟事使臣引伴前來宰臣秦檜奏欲依所請內獻宰臣等物乞說諭不當創例上曰可依典故其書信婉順說諭不須創開新例丁酉左承議郎秀州州學教授陳巖肖為諸王宫大小學教授巖肖在秀州為秦檜立祠堂于學舍熺歸稍薦用之俄兼權考功郎官己亥龍圗閣直學士知洪州張宗元罷時秦檜忌特進永州居住張浚尤甚每臺諫官劾疏必使及之殿中侍御史徐嚞即言今隂邪逆黨尚爾交結簧鼓衆聽撼搖國是宗元天資隂狡頃在川陕與浚大誤國事今書問往來健步絡繹無一日無之浚之諸僕皆寄名帥司親兵月置銀與之時江西轉運判官張常亦箋注宗元與浚夀詩右宣教郎添差安撫司主管機宜文字徐樗又疏宗元之短宗元遂罷樗南昌人也庚子宰執進呈大理寺丞郭唐卿面對劄子論逺方公皂買賣文引乞取擾民乞申嚴法禁大理評事沈正度劄子論朝廷罷免行錢尚慮四方官吏仍舊於行市虧價買物望委監司常切覺察皆從之辛丑詔臣寮合得紫衣師號昨因住賣權停給賜可依條給還宰執除落職等人外令有司檢舉今後與免釐革壬寅右朝請郎知衢州王彥傳為江淮荆浙福建廣南路都大提㸃坑冶鑄錢右中大夫新知瀘州王師心改知洪州左朝請郎新知閬州周執羔改知䕫州䕫路諸州地接蠻獠易以生事至是或告溱播夷叛其豪帥請遣兵致討執羔使誡之曰朝廷用爾為帥今一方驛騷責將焉往能盡力則貰爾而已一兵不可得也豪懼斬叛者以獻此事不得其時熊克小厯繫之紹興二十四年六月末誤也是時執羔方知眉州今因執羔除帥附見右中奉大夫直龍圗閣錢端禮知衢州九月丙午左朝奉大夫新知資州左守道言國家推行茶法為利甚大比年以來給賣茶引多有虧缺欲乞應州縣産茶地分官募有力之家權給木記置場收買候收成畢日差官稱盤見數依字號給賣與有引商旅庶幾私販之弊自革而官課日益增羡詔户部看詳申省後數日宰執奏事上因問今天下一嵗茶利所入幾何秦檜曰都茶場等三處一嵗共得賣茶鈔錢二百七十餘萬貫上曰比承平時少陕西諸路故其數止此上問在辛亥今聨書之丁未大理評事鞏衍面對論逺方受納人户匹帛不應繩式者往往以退印為名用油墨損汚或乾沒入官甚者掩為己有望申嚴禁止仍許越訴詔監司按劾御史臺彈奏辛亥降授左奉議郎知遂寧府李文㑹知瀘州直祕閣提舉福建路市舶鄭震知嚴州左朝散大夫直祕閣楊揆特降一官仍落職揆嘗以事為秦檜所憾屏居台州不敢出者將二十年檜怒不已守臣劉景即奏揆有田在黃巖縣不依上户輸納科敷雖㑹赦猶有是命王眀清揮麈録稱揆知楚州欲斬秦檜事蓋誤已辨之見建炎四年十月癸丑權户部侍郎曹泳言江淮荆湖廣福九路上供錢物糧斛依條發運司注籍稽考催促自罷司之後別無總轄拘考緣鑄錢司職事簡少欲望就委兼管拘催驅考九路上供錢物糧斛每嵗以諸路漕司催發及一路州軍起發數目比較申取朝廷指揮從之時新除鑄錢官王彥傳本泳辟客故其所陳如此乙卯持服前安德軍節度使龍神衛四廂都指揮使張子蓋依前官提舉佑神觀免奉朝請以服闋從吉也丙辰大理評事俞長吉面對論村落酒坊多因農民婚嫁之禮縱其私醖不即掩捕望許保伍告官重置典憲詔申嚴買引條法行下丁巳太師尚書左僕射提舉詳定一司𠡠令秦檜等進呈紹興寬恤詔令二百卷自鄭康佐建請已見紹興二十三年八月乙酉至是再踰年乃成凡五十門詔鏤板頒降己未大理評事劉敏求面對言在法夏秋二稅分立三限近年縣邑往往初限未周即行監拷望申嚴法禁從之辛酉右承議郎新福建路安撫司主管機宜文字王韅添差通判秀州丙寅祕閣修撰提舉佑神觀秦堪充敷文閣待制堪妻令人趙氏進封郡夫人直徽猷閣主管佑神觀吳益升直寶文閣以秦檜提舉編寬恤詔令推恩也丁卯敷文閣直學士提舉佑神觀秦塤試尚書禮部侍郎冬十月乙亥朔祕書省正字張震面對言陛下臨御以來興學校制禮樂天下學士靡然鄉風臣願申𠡠天下學校禁専門之學使科舉取士専以經術淵源之文其涉虛無異端者皆勿取庶幾士風近古從之丙子右朝請郎新知無為軍張永年直祕閣永年閣之子與秦檜連婚至是獻其父文集於朝故有是命仍詔閣身後依條合得恩數令永年經有司陳乞戊寅詔紹興二十六年分民户二稅不得合零就整令户部行下諸路監司州軍遵守如違許經尚書省越訴己卯軍器監丞孫祖夀面對論川廣守令有闕違法差官俾之久攝妨公虐民至有新授人不敢之任或有至而不許赴者望行下諸路遇守令有闕以見任正官暫時兼權即申朝省及吏部選擇差官不得隱藏闕次從之庚辰右朝散郎朱敦儒特引對秦檜喜敦儒之才欲為其子孫模楷敦儒已告老強起之既至落致仕仍詔陳乞過恩澤免追奪日後致仕更不推恩比對即除鴻臚少卿人始少其節建炎中廢鴻臚寺及是復置敦儒落致仕在是月丙子壬午禮部侍郎王珉為賀大金正旦使閣門宣贊舍人王漢臣副之宗正丞鄭柟為賀生辰使閣門宣贊舍人李大授副之癸未右正言張扶言謹按右通直郎陳祖安本李光庶婢之子其天資凶險實酷似之光為朝廷擢用之時祖安出入其門助為傲虐近者以沈長卿謗訕為鄉人所訟平日所與唱和獨祖安為多及赴逮棘寺而鄭仲熊叔姪力為營救州縣觀望悉為改易文字遂致漏網而祖安偃然自恣益無忌憚每對人必盛談光之為人歎惜嗟恨謂不遇其時功業勿遂一時無知羣小為所簧鼓往往靡然從之毗陵去行朝不逺而祖安負罪之人乃敢遨遊其間朝夕窺伺雖朝廷未欲眀正典刑望將祖安勒歸建州本貫令官司常切覺察月具存在申尚書省庶不復為盛世患實天下幸甚從之右宣教郎添差通判衢州周麟之言今天子受命中興功光創業近者太廟生靈芝九莖連葉此尤瑞應之大卓絶而創見者冝令有司考故事特製華旗繪靈芝之形於其上以彰一代之偉績實宗社大慶詔令所屬製造既而禮部侍郎王珉秦塤權員外郎趙逵等乞以諸處申到瑞木嘉禾瑞瓜雙蓮等並繪為旗從之王珉等申請在是月乙酉何俌龜鑑日蝕之變髙宗猶減膳避殿而檜則以隂雲不見賀彗星之異髙宗猶以寬民力出滯獄降詔而康與之以彗為不足畏檜則卑之改秩草木之瑞髙宗嘗謂不如鐵騎十萬而檜則繪芝草於旗矣髙宗不敢有欺天之心檜乃敢有欺君之心檜之心直欲掩蔽災異緣飾祥瑞以文中興而為固寵之資耳甲申國子正莫汲大理評事莫濛並罷殿中侍御史徐嚞言趙令襟與汲評論日月無光若非平日交結之深豈肯披露心腹遽發是言今趙汾已送獄而汲在朝列濛為寺官若不區處則獄吏觀望不盡實情必遺禍胎貽國後患望將汲罷斥濛別與差遣庶幾趙汾等獄事研究盡實灼見其姦重置典憲使隂邪交結之徒稍知懲戢故有是命乙酉右正言張扶言謹按右承議郎張祁本農家子緣其兄邵奉使遂叨一命乃私犯其嫂以致有娠於蓐中隂殺以滅口胡寅從而庇之邵歸因此失心不復視為兄弟前此孝祥新第而歸終不敢往見且寅之為人凶悖險詐専事脅持范宗尹趙鼎之徒畏之如鬼雖在謫籍其勢力猶可以造張祁父子之大福又能使舉世不敢言祁此其力不小若不治之則輕儇之徒觀望胡寅雖不附麗一朝為國生事悔之無及臣身任言責豈敢避忌不為國家逺慮伏望付于有司正其罪名以快天下公論詔大理寺根治辛卯太師尚書左僕射秦檜言衰老交侵日就危惙伏望許臣同男熺致仕二孫塤堪改差在外宫觀上賜詔曰卿比失調護日冀勿藥之喜遽覽封奏深駭聽聞其専意保攝以遂平復副朕所望檜秉政十八年富貴且極老病日侵將除異己者故使徐嚞張扶論趙汾張祁交結事先捕汾下大理寺拷掠無全膚令汾自誣與特進永州居住張浚責授建寧軍節度副使昌化軍安置李光責授果州團練副使致仕新州安置胡寅謀大逆凡一時賢士五十三人檜所惡者皆與獄上而檜已病不能書矣此以朱熹所撰張浚行狀修入臣嘗見前校書郎魏了翁言在館中時聞今敷文閣直學士吳獵言秦檜病時大理寺官以趙汾等獄案上省檜夫人王氏却之語家吏曰太師病勢如此且休將這般文字來激惱他如此者再三檜死事遂已故以檜之惡如此而其子孫未盡絶滅蓋王氏此舉能全數十家性命故也臣又嘗見蜀之老士人有為薛仲雍館客者言仲雍時持案牘入檜臥內是時已擬定刑名只取檜一押字㑹其疾篤乃已所謂五十三人趙令襟胡銓汪應辰張孝祥之徒皆是也臣按此時仲雍以樞密院編修官兼權檢詳仲雍乃曹泳甥與秦檜有連故得出入卧內也但五十三人不能盡得其名惜哉中興聖政大事記曰甚矣檜之忍也不惟王庶胡銓趙鼎張浚李光張九成洪皓李顯忠辛企宗之徒相繼貶竄而吕頥浩之子托趙鼎之子汾王庶之子之荀之竒皆不免焉蓋檜之心大狠愎尤甚於章蔡竄趙鼎而必置之死殺張浚而猶及其家甚至蕭振以附程氏之學而得禍洪興祖以序馮瑀論語注而得禍末年欲殺張浚胡寅等五十三人而檜已病不能書可畏哉壬辰少傅觀文殿大學士秦熺言父以久病未安乞謝事納祿伏望許臣守本官致仕庶幾父子俱退追迹漢疏上賜詔曰朕方賴卿父子同心合謀共安天下豈可遽欲捨朕而去效漢二疏哉癸巳檜再請詔答曰卿獨運廟堂再安社稷朝廷恃以為輕重天下賴以為安危勿藥之喜中外所期納祿有陳豈朕所望甲午熺再奏臣已與臣父議定蓋是素志乞同降處分詔曰宗社再安卿與有力方將同德之求遽有納祿之請非朕所望勿復有陳是時檜病已篤而熺祕不以聞但以滿盈求退為請而已乙未上幸秦檜第問疾檜朝服拖紳無一語惟流涕淋浪上亦為之揮涕就解紅帕賜檜拭淚熺奏請代居宰相者為誰上曰此事卿不當與乃賜幹辦府丁祀金帶已刻還內是夕召權兵部侍郎兼權直學士院沈虛中草檜父子致仕制夜熺遣其子禮部侍郎塤與其黨右司員外郎林一飛宗正丞鄭柟等見殿中侍御史徐嚞右正言張扶謀奏請除熺為宰相此以湯鵬舉劾疏修入疏稱十月二十一日事故附於此林泉野記乃稱董德元曹泳等謀薦即相位於此不同是日左朝奉郎主管台州崇道觀洪皓卒於南雄州年六十八後諡忠宣丙申太師尚書左僕射同中書門下平章事兼樞密使益國公秦檜進封建康郡王少傅觀文殿大學士充萬夀觀使兼侍讀提舉祕書省秦熺為少師並致仕詔檜熺已降制其孫試尚書禮部侍郎兼實録院修撰塤敷文閣待制提舉佑神觀堪並提舉江州太平興國宫塤仍充敷文閣直學士初檜病篤招參知政事董德元簽書樞密院事湯思退至卧內以後事囑之且贈黃金各千兩德元以為若不受則他時病愈疑我二心矣乃受之思退以為檜多疑心他時病愈必曰我以金試之便待我以必死邪乃不敢受上聞之以思退為非檜之黨是日以思退兼權參知政事臣嘗見故武學諭范子該言秦檜當國執政官不敢獨奏事湯思退初入樞府一日檜擬除局務官二人上偶不付出檜疑之諭思退令留身請其故思退連稱不敢檜曰此是檜意無傷也眀日思退留身如所戒上見已驚曰有何事乃不與秦檜同奏耶思退具白云云上曰此細事朕偶忘記非有他也思退將下殿奏曰臣自此恐不復望清光上曰何故思退曰臣今日留身雖出檜意但其人多疑必謂臣更及他事且諭言路擠排臣去無日矣上曰無慮朕當保全思退因略言檜専權䝉蔽之狀上頷之退至殿廬告以上意未至省已批出依奏檜甚喜其後臺諫數劾思退黨附秦檜之罪乞罷相上曰他人言檜擅權皆言於其死後獨思退於檜在日為朕言之非黨也子該所言必有據故具載之夜檜薨年六十六遺表略曰願陛下益固鄰國之歡盟深思宗社之大計謹國是之搖動杜邪黨之窺覦林泉野記云熺尤恣橫不學聞檜死置酒大喜初靖康末檜在中司以抗議請存趙氏為金所執而去天下髙之及歸驟用為相檜力引一時仁賢如胡安國程瑀張燾之徒布在臺省士大夫亟稱之未幾為吕頥浩朱勝非所排遂不復用㑹張浚與趙鼎有隙因薦為樞密使浚罷鼎復相諸執政盡逐而檜獨留既而與鼎並居宰席卒傾鼎去之金人渝盟軍民皆歸咎於檜檜傲然不肯退又使王次翁奏留之韓世忠張俊嶽飛方擅兵檜與俊密約議和而以兵權歸俊飛既誅世忠亦罷俊居位不去檜乃使江邈論罷之由是中外大權盡歸於檜非檜親黨及昏庸諛佞者則不得仕宦忠正之士多避山林間紹興十二年科舉諭考試官以其子熺為狀元二十四年科舉又令考試官以其孫塤為狀元上覺彗星見檜不乞退頻使臣僚及州縣奏祥瑞以為檜秉政所致上見江左小安以為檜力任之不疑檜隂結內侍及醫師王繼先伺微㫖動靜必具知之日進珍寶珠玉書畫竒玩羡餘帝寵眷無比命中使陳腆續瑾賜珍玩酒食無虛日兩居相位凡十九年薦執政必選世無名譽柔佞易制者不使預事備員書姓名而已其任將帥必選奴才初見財用不足密諭江浙監司暗增民稅七八故民力重困餓死者衆又命察事卒數百游市間聞言其姦者即捕送大理寺獄殺之上書言朝政者例貶萬里外日使士人歌誦太平中興聖政之美故言路絶矣士人稍有政聲名譽者必斥逐之固寵市權諫官匪人略無敢言其非者自劉光世薨其家建康園第併以賜檜及張俊薨其房地宅緡日二百千其家獻於國檜盡得之性隂險如崖穽深阻世不可測喜贓吏惡亷士略不用祖宗法每入省已漏即出文案壅滯皆不省貪墨無厭監司帥守到闕例要珍寶必數萬貫乃得差遣及其贓汚不法為民所訟檜復力保之故贓吏恣橫百姓愈困臘月生日州縣獻香送物為夀嵗數十萬其家富於左藏數倍士大夫投書啓者臯䕫稷契為不足比擬必曰元聖或曰聖相至有請加檜九錫及置益國官屬者自非檜親黨以下至富於左藏數倍以林泉野記本文自士大夫投書啓以下並據趙甡之遺史刪附聖相事詳具紹興十四年六月益國官屬事詳具十七年三月九錫事詳具二十三年正月王循友知建康府注然自渡江後諸大將皆握重兵難制張浚趙鼎為相屢欲有所更張而終不得其柄檜用范同策悉留之樞府而收其部曲以為御前諸軍息兵以來諸郡守臣有至十年不易者又以僧道太冗乃不鬻度牒暗消其弊使民知務本由是中外少安至於忘讎逆理陷害忠良隂阻宗資之議又其罪之大者上久知檜跋扈祕之未發至是首勒熺致仕餘黨以竄逐天下咸仰英斷焉丁酉執政奏事上曰秦檜力贊和議天下安寧自中興以來百度廢而復備皆其輔相之力誠有功於國傷悼久之權尚書户部侍郎兼知臨安府曹泳特勒停新州安置右朝散郎守鴻臚少卿朱敦儒令依舊致仕樞密院編修官兼權檢詳文字薛仲雍右朝請郎江淮等路提㸃坑冶鑄錢王彥傅左奉議郎提舉兩浙西路常平茶鹽公事杜師旦並放罷日下押出門秦檜既死右正言張扶乃奏泳肆為凶悖傲誕不遜招權怙勢以收人情監司郡守必欲出其門下廣為死黨一或不然則必以事隂中之擯斥廢罷者踵常相繼搢紳畏之視如鬼蜮近見太師秦檜不安未赴朝參日與群小妄議朝政動搖國是専欲離間君臣竊恐別有覬覦將致誤國殿中侍御史徐嚞言泳性資凶險貌狀姦雄威聲虐焰震懾朝野而又招權市恩擅作威福引援市井不逞之人結為心腹如朱敦儒者乃趙鼎之心友杜師旦者李光之上客王彥傳者贓汚淫濫専事刻剝薛仲雍乃泳之甥蹤跡詭祕唯務躁進而泳悉致之門下國家財賦自有常經泳巧計百出必為額外多方聚斂較利之錙銖割民之脂膏怨嗟之聲滿于道路甚者幸大臣之有疾遂日與群小㑹聚妄議朝政便欲竊弄權柄恣其悖逆不臣之心以搖國是罪惡貫盈未易殫舉欲望屏竄逺方以快天下仍將敦儒師旦彥傳仲雍等並行罷黜使凶惡不有君父之臣及隂邪姦贓交結之徒皆知所懲艾故有是命庚子殿中侍御史兼崇政殿說書徐嚞權尚書吏部侍郎兼侍講詔敷文閣直學士陳誠之魏良臣敷文閣待制沈該直龍圖閣湯鵬舉並召赴行在令疾速起發辛丑右正言兼崇政殿說書張扶試國子祭酒兼侍講上既親政首易言事官前一日批出除扶太常卿執政言正言自來不除太常卿遂改宗正復言之乃有是命壬寅詔保信軍承宣使提舉萬夀觀曹勛保康軍承宣使提舉佑神觀韓公裔並令行在居住二人皆上使令之舊久為秦檜所逐故也甲辰秦檜妻韓魏國夫人王氏乞改賜一道號詔特封冲真先生直寶文閣主管佑神觀吳益充敷文閣待制提舉江州太平興國宫秦熺言益先臣長孫女夫望特賜推恩改差在外宫觀故有是命詔敷文閣學士知平江府王㑹按原本脫此句今增敷文閣直學士知建康府宋貺兩易其任以秦熺言㑹臣親舅望令與貺兩易庶得相聚照顧家屬故也熺又言先臣葬事乞令江東轉運使應副從之仍令入內內侍省副都知陳永錫管葬事建炎以來繫年要録卷一百六十九
