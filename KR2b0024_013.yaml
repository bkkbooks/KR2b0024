body:
  text: 建炎以來繫年要録卷十三宋李心傳撰建炎二年二月乙卯朔言者請令羣臣入對具所得上語除機密外關治體者悉録付史官從之直祕閣京東轉運判官柴天因為本路轉運副使兼知青州主管京東東路安撫兼提刑司公事天因開封人天因見洪邁夷堅乙志時金已陷青濰而朝廷未知也丙辰詔太史局天文自今除報御前外並不許報諸處日厯無此今以紹興三年七月祕書省申明狀增入吏部尚書路允迪罷為資政殿學士提舉杭州洞霄宫時言者復論允迪薦郭太沖事以為欺君允迪因乞祠而有此命詔録韓琦子孫可任使者是日金再侵東京宗澤遣統制官李景良閻中立統領官郭俊民等領兵萬餘趨滑鄭遇敵大戰為敵所乘中立死之俊民降金景良以無功遁去澤捕得謂曰勝負兵家之常不勝而歸罪猶可恕私自逃遁是無主將也即斬之既而金令俊民持書招澤俊民與金將史姓者及燕人何祖仲直扺八角鎮都巡檢使丁進與之遇生獲之澤謂俊民曰汝失利就死尚為忠義鬼今乃為金遊説何面目見人邪捽而斬之謂史某曰上屯重兵近甸我留守也有死而已何不以死戰我而反以兒女語脅我邪又斬之謂祖仲本吾宋人脅從而來豈出得已解縳而縱之諸將皆服戊午詔責授單州團練副使耿南仲係淵聖皇帝二十年宫僚免過嶺移臨江軍居住詔諸路有警報鄰近三百里內州軍不拘路分互相䇿應用宣教郎馮鐸請也劉衍自滑州引兵還汴京是日尼楚赫陷唐州遂縱焚掠城市一空己未詔兩浙武臣提刑于鎮江府置司辛酉刑部尚書周武仲遷吏部尚書兼侍讀尚書户部侍郎兼知揚州吕頥浩遷户部尚書御史中丞王賔遷刑部尚書仍兼侍講朱勝非秀水間居録云建炎二年春夏之交政府闕員周武仲獻之吏書豫在翰林王賔元將中司同司讀講元將經營甚力至一旬九對或一日再對早朝以中丞職事午間經筵留身豫與獻之纍遭指摘不敢求對如是兩月元將匆遷刑部頗不樂謁告十餘日上遣人敦諭始起又數日豫忝右轄之命按史路允迪以二月丙辰罷簽樞王賔除刑書前五日勝非所謂政府闕員當指此也然實不在春夏之交勝非五月戊子除右丞去此已逺亦不應云又數日子忝右轄之命也若指今年五月許景衡去位時則賔已不在中司勝非小誤時冦盜稍息而執政大臣偷安朝夕武仲請對引孟子言國家間暇及是時明其政刑雖大國必畏之今不乘時為無窮之計何以善其後願詔二府條天下大事與取人才紓民力足國用選將帥強兵勢消盜賊之䇿講究而力行之又言今宿將無幾後來以武略稱者未見其人請詔武臣郡守路都監以上各舉可為將者會議者言三省舊合為一文書簡徑事無留滯乞循舊以宰相帶同平章事詔侍從臺諌議武仲曰今敵兵尚熾軍防兵政所宜討論者甚多何暇講求省併條例莫若且依元豐官制元立吏額及行遣日限庶無冗員滯事而得省併之實翰林學士朱勝非亦言唐制僕射為尚書省長官奉行兩省詔令而已今為相職如復平章事則三省規制與昔不同左右丞以下官曹職守以至諸房體統綱目皆合改易典故散亡未易尋繹儻輔佐得人官稱異同似非急務矧今行朝事無巨細皆三省樞密院日再進呈同稟處分兵機國政宰相實已平章矣請俟休兵日議之議遂寢此以武仲墓志及勝非間居録參修不得其時且附武仲遷吏書之後龍圖閣學士鄭修年顯謨閣直學士劉阜民徽猷閣待制余日章白彥暉並奪職始用元年七月己亥詔也初李綱既建議而去修年與其弟顯謨閣直學士億年至行在皆用雜學士乞見朝廷亦不問而許之中書舍人汪藻嘗以為言不報王賔之長御史也又疏言之久之乃有是命獨億年以進士甲科領職如故修年居中子阜民正夫子日章深子彥暉時中子也龍圖閣直學士知洪州胡直孺奏江西軍民五害如經制司拋科灰磚提刑司科配吏民以私財助國此事去年八月己卯李綱罷相後黃潛善等已將指揮住罷不知何以依舊勸誘不已疑是黃潛厚又有申明當考諸州受納苖稅加耗太重有一斛而取五斗者又朝廷所須郡縣率取之等第及行户而無錢以償監司巧為犒設之名務收恩保家由此搖動軍情愈益驕恣望特下寬恤之詔除此五害以固人心寬民力先是翁彥國為經制使籍民輸建康修城磚數百萬其人踰虔吉南安諸郡陸負水運率千錢致兩磚江西提點刑獄公事留怙勸民出私財助國乃督責州縣以等第厚賦於民欲以求進江西民苦二役皆愁恨無聊直孺以為言詔嘉奬於是諸役並罷祕閣修撰新兩浙路轉運使吕源知揚州直祕閣新兩浙路轉運副使薑仲謙移廣南西路朝散郎新荆湖北路轉運副使范沖移兩浙路先是汪藻論源仲謙小人不可用執政不樂故仲謙改而源更有是除沖正月癸卯自虞部員外郎除湖北漕今併書之朝奉大夫辛炳落致仕奉議郎主管亳州明道宫張頴直祕閣頴滕縣人父孝純靖康末以資政殿學士守太原城破不降為金所執故有是命壬戌責授安逺軍節度副使韶州安置宇文虛中復中大夫乘驛赴行在以虛中應詔使絶域也虛中之貶也上疏自陳元議與金人三鎮及金帛遣沈晦送誓書皆正月事臣自拱州與李邈收召東南兵入援二月朔姚平仲劫寨失利金人復攻城翌日得旨宣召微臣入對被命出使明劫寨非朝廷本意且令迎奉陛下還闕當時所與物止鞓帶四百條水銀硼砂十許斤而已若不剖析恐身首異處家族殄滅亦未足以消弭人言疏入不報至是始召鴻臚卿康執權為起居郎尚書禮部員外董逌為宗正少卿逌在圍城中權國子祭酒不知何以獨不貶謫恐是靖康間已權當考癸亥罷在京及諸路市易務以其錢輸左藏庫惟抵當庫仍舊自熙寧初創市易法及是言者以為所入不償所費遂罷之越州觀察使提舉萬夀觀髙世則為保靜軍承宣使宣教郎蘇符為國子監丞符軾孫軾眉山人元祐禮部尚書自選人特改京官而有此命甲子金人侵滑州東京留守宗澤聞之謂諸將曰滑衝要必爭之地失之則京城危矣不欲再勞諸將我當自行右武大夫果州防禦使張撝曰願效死澤大喜即以鋭卒五千授之乙丑開封府判官范延世奉宗澤表至行在上諭以旦夕北歸之意澤復上奏以謝言今月二十四日凖范延世等齎降詔命車駕將欲還闕者比遣屬僚仰輸誠欵洊瀆蓋髙之聼益懷履薄之憂睿眷矜憐特賜回鑾之詔愚忠戀慕倍增徯后之誠中謝竊以萬乘來歸六龍扈從雨伯前驅而灑道河神迎駕以安流不煩夾道之壺漿自有隨師之甘露人情皥皥如聼南風天意昭昭乃回西顧再斡乾坤之造重增宇宙之光赫有宋之中興奄多方而大定想瞻原廟應加肅穆之儀爰御端朝愈見鬱蔥之氣雍容對越駿惠緝熙宏收率土之歡誕作普天之宥下有欲者上必從之恭惟皇帝陛下踐阼應天時巡淮甸備履艱難之事盡敦勤儉之風謂京師為諸夏本根而元后作斯民父母念本根不宜搖動謂父母自合依歸兹俄奉於詔音衆但知於抃舞願陛下繼志述事整頓萬機願陛下命將出師邀迎二聖平蕩兵戈之擾保全疆埸之封坐視穆清時躋仁夀臣無任時楊進初以軍降澤澤奏於上授進武功郎閣門宣贊舍人充留守司統制日厯進補官在乙丑降授宣教郎充祕閣修撰知廬州胡舜陟特遷一官先是濟南僧劉文舜聚黨萬餘盤據合肥境內舜陟至即退保舒州之投子山縱兵剽掠朝廷患之遣將趙俊討捕俊大衄舜陟曰文舜既敗王師勢必熾不若以誠招納比其來又可用何至久勞兵也乃遣介招之文舜聼命時丁進李勝合兵為盜光蘄夀久被圍舜陟命文舜及其將悉破之得勝所取列聖御容以歸張遇自濠州掩至梁縣逺近震讋舜陟命毁竹里橋伏兵河西遇果結筏渡河伺其半濟而擊之遇敗去此據沈長卿所撰記增入以時考之皆建炎元年事不得其月日且附此俟考朝廷以舜陟措置民兵防扼有勞故有是命丙寅光州觀察使提舉亳州明道宫邢煥充樞密院都承旨朝奉郎周離亨充京城留守司𠫭謀官離亨宣和六年八月除起居郎七年正月責監烏墩鎮稅務未知今自何官除當考丁卯復延康殿學士為端明殿學士述古殿直學士為樞密直學士從舊制也進士胡昭特補登仕郎何烈王彥詹至並將仕郎用從官部刺史薦也先是詔舉草茅才德之士得昭烈彥至朱敦儒等五人令中書省䇿試敦儒河南人靖康中嘗召至闕命以初品官與學校差遣辭不就至是淮西部使者薦其有文武全才乃再召之敦儒卒不至昭潭州人彥江州人至撫州人也烈已見元年正月丙午諸按原注無元字查元年正月十六日有生何烈上書今補入時烈所對䇿用廷試體稱臣上以烈踈逺寒士不知體式命一體推恩故有是命朝散大夫知濮州楊粹中直祕閣以金人圍城固守不下也己巳張撝至滑州身率將士與金迎敵衆且十倍諸將請少避其鋒撝曰退而偷生何面目見宗元帥鏖戰數合日暮敵少卻澤遣統領官王宣以五千騎往援未至撝再戰死之後二日至滑州與金兵大戰於北門士卒爭奮敵出不意退兵河上宣曰敵必夜濟收兵不追半濟而擊之斬首數百所傷甚衆澤即命宣權知滑州且令載撝喪以歸為之服緦厚加賻恤仍請於上贈撝拱衛大夫明州觀察使録其家四人金自是不復至東京矣辛未殿中侍御史張浚試侍御史時浚方上疏論祕書省正字胡珵挾諂媚之姿躬姦回之性沾沾可鄙自託李綱服童僕之役而出入其寢室朝夕交結隂中善良逮綱遭逐營為百計密招羣小鼓唱浮言陳東之書珵實筆削意欲使布衣草萊之士挾天子進退大臣之權一時閧然幾致召亂按珵罪狀天地不容願褫奪官爵投之荒裔永為臣子立黨不忠之戒珵是月己卯勒停詔自今犯枉法自盜贓抵死者籍其資時議者以為贓吏之盛所在填溢願明詔有司應緣贓得罪及曽經按發迹狀明白並毋得與堂除及親民自今有犯者仍籍其資即監司守倅失按郡縣及監司失按守倅與失於互察者並科違制之罪不以去官原免或謂當今使貪使過之時恐難以槩廢竊謂貪贓之人惟可用於軍旅不可用於臨民况其天資好賄者雖死不變借令才力可以辦事而結怨民心為害甚大上酌其言乃詔贓情俱重者籍沒餘從之祕書監李朴卒朴贛縣人少力學慷慨有大志舉進士國學禮部皆第一為虔州州學教授坐元祐學術廢靖康初自外五遷為國子祭酒以疾不能至上即位除祕書監趣召會卒年六十五贈寶文閣待制官其家二人朴操履徑特不以貧富貴賤死生易其守自為小官天下髙其名蔡京將強致之俾其所厚道意許以禁從朴力拒不見京怒形於色然終不害也壬申中書舍人汪藻滕康衛膚敏並罷為集英殿修撰提舉江州太平觀用諫官李處遁疏也處遁言後省比試四方薦士而何烈用廷試䇿體數處稱臣陛下貸其草茅陋學不加以罪則可矣而臣子戴上之分詎宜如此望將烈黜落併正元考官鹵莽之罪詔降烈為下州文學於是三舍人俱罷處遁淑孫也淑彭城人參知政事若谷子仁宗時翰林學士按史處遁宣和七年十月自朝奉郎京西北路提舉常平與郡未知今為何官其除諫官日厯不載以馬伸劾疏考之恐是與張浚同命浚此月辛未自殿院遷侍御史或曰膚敏等在後省數論事為黃潛善所惡故因事斥之起居郎康執權兼權中書舍人詔建州作過軍民既已受招已前所犯不論輕重可並赦免令尚書省降敕榜曉諭用知福州充本路兵馬鈐轄江常奏也癸酉尼楚赫陷蔡州初金人自唐州北歸守臣直祕閣閻孝忠聞之先遣其家往西平依土豪翟沖以避冦而自聚軍民守城金圍之數日城陷於東南隅居人自東奔者皆達其餘皆死知汝陽縣丞郭贊朝服罵敵不肯降敵執之贊罵不絶口而死金人遂焚掠城中而去孝忠為所執金人見其貌陋而侏儒不知為守臣乃令荷擔孝忠乘間奔西陵甲戍詔曰自來以內侍官一員兼鈐轄教坊朕方日極憂念屏絶聲樂近緣內侍官失于檢察仍帶前項可減罷更不差置中興聖政臣留正等曰聖人之憂樂以天下不先天下而樂後天下而憂也建炎之初方開中興之業以天下之大太上皇帝之所深憂而聖意篤於孝悌其憂益逺矣典樂之官實已廢其名尚存心猶有所不忍也而亟罷去之其屏聲樂豈非誠意也哉乙亥言者論兵興以來借補官資之弊以為所借皆給使伎術下至屠沽之人望委逐路憲帥司依弓馬所格法比試合格人申省部給進武進義校尉兩等文帖進武日給百錢進義七十錢並籍定凖備軍前使喚不得充州縣監當等差遣俟立邉功或捕盜有勞即與補正如兩試不中者追毁元帖入官許令自便詔比試合格人發赴御營使司審試餘從之此事雖極細不足辱書然軍興備補之弊至今有之亦足為公私之蠧故摘取修入朝奉大夫知棣州薑剛之直祕閣初金人圍棣州剛之固守不下金人引去至是遣使臣杜移忠以蠟書告于朝故有是命日厯不書剛之除職按紹興三年正月剛之妻管氏乞贈官狀云二月二十一日三省同奉聖旨除直祕閣故附此丙子金人陷淮寧府知府事起復中散大夫向子韶死之先是子韶為京東轉運副使以父喪免居於淮寧會蔡州缺守蔡人願得子韶三年部使者上其事而蔡已除新守矣乃起復子韶知淮寧府至半嵗尼楚赫侵淮寧子韶率諸弟城守諭士民曰汝等墓墳之國去此何之吾與汝當死守之時郡有東兵四千人第三將嶽景綬欲棄城率軍民走行在子韶不從景綬引兵迎敵而死敵晝夜攻城子韶親擐甲胄冒矢石遣其弟子率赴東京留守宗澤乞援兵未至城陷子韶率衆巷戰力屈為所執金帥坐城上欲降之酌酒于前左右按令屈膝子韶直立不動戟手罵遂殺之其弟新知唐州子褒等與闔門皆遇害惟一子鴻得存事聞再贈通議大夫官其家六人後諡忠毅子韶子諲兄也按子韶死事甚偉而日厯乃無一字及之獨會要略載其恤典今以楊時所作子韶墓志修入趙甡之遺史云金人侵陳州知州向子褒固守第三將嶽景綬以將兵迎戰不勝軍亂殺子褒其家屬或散或亡既而城陷按陳守乃子韶甡之誤記也甡之記子韶死事與時所作墓志全不同疑傳聞不詳今從墓志金兵既去陳蔡東京留守宗澤檄知尉氏縣陳長寧權淮寧府武經郎張某權蔡州蔡領十縣民牒浩繁張不能辦時閻孝忠已罷去郡人詣部使者乞以孝忠權知州從之此據趙甡之遺史按此時京西南路帥臣劉汲已死監司權提刑陳芾一人當考丁丑詔諸路帥司以所部禁軍數聞自軍興諸路不奏兵籍故有是命國子祭酒黃哲為起居舍人兼權中書舍人直祕閣提舉江州太平觀歐陽懋試衛尉卿懋修孫也修廬陵人嘉祐參知政事朝奉大夫向子諲知襲慶府道梗不能赴奉直大夫致仕王貺特補朝奉郎以將北使也初開封人劉廷者嘗從張懷素倡左道於真州懷素敗廷即國門外亡去至是更名誨上書自薦願應募使金國召對以為宣教郎王明清揮麈第三録云誨願使金補京官直祕閣以行而日厯誨除職在明年七月丁酉明清恐誤假户部尚書充大金軍前通問使貺假拱衛大夫合州防禦使副之貺本醫工初以進頌補從事郎積遷至是官靖康中例行追奪上既遣貺命復舊官言者以為不可乃有是命誨貺至京師留不進黃潛善等奏趣之上曰朕觀誨等稽遲如此益知王雲忠義乃命趣進王明清揮麈録云思陵中興應天誨上書出使而汪伯彥中興日厯云上即位之二年遣劉誨奉使金國則非應天所遣也趙甡之遺史誨行在宇文虛中之後按虛中以五月丙申受命而王貺以二月丁丑補官則誨行在先蓋虛中以二月壬戌被召復官但未行耳遺史恐小誤三年正月乙丑使還戊寅責朝議大夫趙子嵩為單州團練副使南雍州安置初子嵩與御營統制辛道宗有隙道宗得子嵩靖康末檄文上之詔監察御史鄭玨置獄京口究治得情上震怒然不欲暴其罪乃坐子嵩前棄鎮江責官安置先是龍圖閣直學士知鎮江府錢伯言亦以失守待罪前一日詔以伯言當殘破之後到官未久大盜遽至而伯言不出府界保聚軍民量貶二秩玨尋遷右司諫此以日厯及王明清揮麈録餘話參修子嵩傳檄事已見元年四月壬戍明清所云雖無他書可以參考然以建炎三年胡寅封事觀之不為無據玨遷諫官不見于日厯諫院題名在今年春附傳亦云鞫獄還稱旨遷司諫今且附此俟考己卯詔祕書省正字胡珵交結權要傳導風指諷諭狂生扇搖國是可特追所有官勒停送梧州編管用張浚章疏也浚疏已見是月辛未遷侍御時按日厯浚此疏尚繫殿中御史蓋其未遷時所上或者黃潛善先遷浚而後行出也今各附本日朝奉大夫新通判虔州劉正彥為武德大夫威州刺史知濠州正彥初見元年六月庚午初御營都統制王淵為熙河經略使劉法部曲法器之方法之死事也正彥自閣門祇候易文資至是援舊恩從淵求官淵薦諸朝以正彥應詔使絶域故有是命未幾除御營右軍副統制淵自以所將精兵三千授之庚辰捧日天武四廂都指揮使保大軍承宣使真定府路馬步軍總管御營使司都統制王淵為嚮德軍節度使以平杭賊功也會要淵建節在去年七月平杜用之後日厯亦于八月庚申書楊惟忠劉光世王淵並除節度使而此日又書之且有制詞按野記及熊克小厯皆云淵平杭賊還建節今附此更須詳考禮部請令曽得解及免解武舉人就淮南轉運司附場類省試從之少府少監方承知建州承莆田人也初武功大夫和州防禦使馬擴聚兵西山既為金所執囚之真定事見去年四月甲子會右副元帥宗傑自京師歸北義而赦之欲授以官擴辭不受請給田以養其母既而又言耕田不即得食願為酒肆以自活宗傑許之時武翼大夫趙邦傑聚忠義鄉兵保慶源五馬山寨擴因此雜結往來之人復與山寨通耗辛巳寒食節擴偽隨大姓送喪携親屬十三人奔山寨先是皇弟信王榛既亡去更稱梁氏子為人摘茶擴等隂迎以歸遂奉榛總制諸山寨兩河遺民聞風響應願受旗榜者甚衆壬午殿前都虞候奉國軍節度使御營使司專一提舉一行事務都巡檢制置使劉光世以平張遇功加檢校少保詔募河南北淮南土人有名籍者為振華軍以六萬人為額即不足聼募兩河流移之衆毋得過三分皆於左鬢刺某州振華四字徽猷閣直學士知成都府盧法原奉詔修羅城是月始畢城周二十五里三百六步髙二丈二尺廣二丈八尺用工四十六萬有竒初羣盜冀德韓清乘金人南侵嘯聚不逞出沒於汝洛之間有衆萬人屯留山寺及艾蒿坪至是西京留守司統制翟興以輕騎襲之一擊而潰德為興所擒清脫身遁去獲財物甚衆皆給麾下婦女數百悉縱還其家金人既去鄧州有巡檢官陸某者自羽山率其徒入城以守隆德之陷也攢司談兖脫身南遁鄉人之奔竄者推兖為首間關渡河屯灰堆山兖聞敵去引衆殺陸某自據鄧州以收復報朝廷因授兖武功郎知鄧州羅索既陷同州繫橋以為歸路西陷陜華隴秦諸州秦鳯經略使李復生降陜右大擾鄜延經略使王庶檄召河南北豪傑共起義兵擊賊逺近響應旬日間以公狀自達姓名者孟迪种潛張勉張漸白保李進李彥仙等兵各以萬數勝捷卒張宗自稱觀察使亦起兵于南山下彥仙時為石壕尉陜府既下彥仙獨不去民知彥仙在稍稍至彥仙因以軍法部勒之于是月中破敵五十餘壁彥仙初見元年三月建炎以來繫年要録卷十三
