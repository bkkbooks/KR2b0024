body:
  text: 建炎以來繫年要録巻五十八宋李心傳撰紹興二年九月戊午朔觀文殿學士提舉江州太平觀秦檜落職時言者論陛下憤中國之未振付檜以内修之事而檜不知治體信任非人不以寛大之政輔陛下仁厚之徳乃以苛刻為務事圖減削過為裁抑人心大搖怨讟在路又引用程瑀等布列要路黨與既植同門者互相借譽異己者力肆排擯檜為宰相兼此二罪尚何俟而不譴之乎故有是命王明清揮麈後錄云秦檜之褫職告詞云聳動四方之聽朕志為移建明二䇿之謀爾材可見謝克家之文也秦大憾之按此時謝克家以前執政領京祠不知制詞何人所作明清蓋誤也尚書左司貟外郎兼修政局檢討官張觷金部貟外郎潘特竦兵部貟外郎鄭朴樞密院計議官陳淵並罷以右司諫劉棐言觷甞游蔡氏之門輕脫干進故也朴西安人與特竦皆秦檜所引故棐並斥之仍降淵三資與觷皆黜監逺郡市征大理少卿張宗臣為尚書右司貟外郎右承奉郎監諸軍審計司張汝舟屬吏以汝舟妻李氏訟其妄増舉數入官也其後有司當汝舟私罪徒詔除名栁州編管十月己酉行遣李氏格非女能為歌詞自號易安居士己未罷修政局以議者言修政所講多刻薄之事失人心致天變故也龍圖閣待制知温州洪擬試吏部尚書徽猷閣待制提舉臨安府洞霄宫鄭滋試尚書兵部侍郎詔雩祀上帝復以太宗配用太常少卿王居正請也舊以神宗配居正建議而禮部侍郎趙子畫奏行之新除右司諫劉棐言監察御史李靄係親姑之子同處言地豈得無嫌詔勿避初保靜軍承宣使提舉江州太平觀邢煥自忠州來朝復以為樞密副都承㫖煥在逺方盡得其山川險易比入對首陳川陜形勢利害請幸荆南訓兵以圖興復上甚嘉之煥引疾不拜改提舉臨安府洞霄宫煥初除日不見今因得祠遂書之庚申直秘閣提㸃江淮等路鑄錢王㬇右朝奉大夫提舉𣙜貨務都茶場王昞樞密院計議官王守道並罷坐秦檜親黨為御史黄龜年所劾也辛酉以彗星出赦天下應盜官物入已罪抵死者不赦内外臣庶許直言時政闕失行在和糴軍糧自今並用一色見錢銀絹充糴本免民間牛稅一年應盜賊嘯聚去處限十日出首免罪補官川陜豪户輦運軍儲數多者與補承信郎至進義副尉陜西諸叛將許令自新前罪一切不問朝奉郎充河東大金軍前通問使王倫至行在上嘉其勞詔倫去國五年奉使有稱特遷右朝奉大夫充右文殿修撰主管萬壽觀倫言宇文虛中奉使日乆守節不屈時虛中子右朝奉郎師瑗奉其母居閩中乃添差師瑗福建路轉運判官於是尚書左僕射吕頥浩議當再遣使人以驕敵意壬戌以左廸功郎潘致堯為左承議郎假吏部侍郎為大金奉表使兼軍前通問秉義郎髙公繪為武經郎假武功大夫忠州刺史副之命倫作書與其近臣耶律紹文紹文九年七月為翰林待制不知此時居何官故但云近臣且附香藥果茗縑帛金銀進兩宫二后上皇金三百兩銀三千兩淵聖減三之一寧徳宣和二后又減半又遺左副元帥宗維金二百兩銀千兩遺右監軍希尹及賜宇文虛中半之遺耶律紹文銀三百兩縑幣百匹而通問副使朱弁已下亦皆賜金三省勘問路由東京乃令頥浩作書以果茗幣帛遺劉麟熊克小厯云令宰執作書與劉豫蓋從日厯所書也按此時豫已僭號不應作書日厯紹興三年九月乙丑潘致堯狀元降信物内有退囘物色劉大總管天凈紗等有㫖並赴左藏庫寄收劉大總管即麟也致堯公繪各官其家二人賜金帛甚厚集英殿修撰知平江府席益試尚書吏部侍郎㝷兼侍講益兼侍講在丙寅癸亥執政進呈胡安國請益衛兵上曰一衛士所給可贍三四兵朕命楊沂中治神武中軍此皆宿衛兵也卿等可修鞍馬備器械乃為先務熊克小厯於此下書遂命楊沂中兼提舉宿衛親兵按史沂中今年三月己酉除中軍統制已兼帶矣非在安國建請之後克蓋誤也資政殿大學士提舉臨安府洞霄宫王綯知紹興府初置六部監門一貟以右朝散郎新通判平江府董將為之秩比寺監丞郎官有缺得兼甲子直徽猷閣郭偉為淮西招撫使初江東大帥李光聞偽齊王彦先於壽春鳩兵聚糧奏言廬州王亨濠州冦宏六安謝通兵力單寡恐透漏過淮則大江之外盡入賊境乞兵五六千人并近上文臣一貟往廬州屯駐未及行光又言本司參議官宗頴乃宗澤之子以其父故為諸將所愛又其人亦慨然有忠憤之氣望假以制置或招撫使副之名詔光别選文臣一貟充招撫使光之未奏也都督府以知江州劉紹先為沿淮防遏使未行㝷罷紹先復以為都督府統制光初奏以六月庚辰再乞除宗頴以八月甲午紹先罷防遏在此月癸酉不知以何日除今併附見詔太史局令丁師仁等造渾天儀不果成宣撫處置使張浚遣其兄右承務郎滉與工部貟外郎本司主管機宜文字張宗元廸功郎孫道夫等四人來奏事因與偽徐王偕來是日至行在上令王府故吏驗視具言非真詔大理劾治宗元方城人為浚辟客道夫丹陵人宣和末入太學為上舎生浚使川陜命以官上皆召對㝷詔宗元進秩滉除直徽猷閣道夫改左承奉郎遣還詔自今應賜帛者自禁中及二府中丞北使并軍功捕盗收茶鹽錢及數外每匹令户部折支錢三千乙丑觀文殿學士左宣奉大夫提舉醴泉觀兼侍讀朱勝非守尚書右僕射同中書門下平章事勝非再相不進官當制學士綦崈禮失之初命沿江岸置烽火臺以為斥堠自當塗之褐山東采石慈湖繁昌三山至建康之馬家渡大城堙池州之鵲頭山凡八所旦舉煙暮舉火各一以為信有警即望之用李光請也丙寅吕頥浩言得張浚申今歲措置川蜀有備諸將之兵分道守險敵來難犯聞夏國屢遣人來呉玠關師古軍中金人與夏國頗暌可令浚常通問夏國上曰此與今來欲講和事相妨否上又曰浚孜孜為國人多稱譽但聞蜀中士民流怨人情不喜蓋軍興累年賦調征役不無騷動緩急恐浚失助宜遣人副其事頥浩曰當如聖訓吏部尚書兼權翰林學士沈與求兼侍讀馬友之死也其潰卒過均州境上守臣林積仁聞之棄城去詔罷積仁軍賊李通受都督府招安通初見正月癸丑傅崧卿以通為修武郎本府親兵前軍統領戊辰以聞己巳國子監丞李愿為尚書駕部貟外郎酬使蜀之勞也集英殿修撰李擢復徽猷閣待制辛未監察御史林叔豹為湖南轉運判官陳橐為江西轉運判官二人之出史不云所以恐是吕頥浩在外時秦檜所除故補外明年十二月叔豹劾章言為御史以朋比逐即指此也降授右宣教郎監台州酒務王以寧既貶其母陳氏干張浚乞自便浚以聞㑹朱勝非為吕頥浩言以寧向在荆湖妄用便宜專殺掊歛害及兩路頥浩白其言上曰以寧罪大責輕今又干宣司從之則兩朝廷也乃責永州别駕潮州安置時廣東轉運副使汪召嗣奉其父觀文殿學士提舉臨安府洞霄宫伯彦在官所頥浩因奏左朝奉大夫新知廣州向子諲輕肆妄作請罷去伯彦長於治郡欲以代之上曰恐外議以朕藩邸之舊云云未協勝非曰漢用蕭曹故人唐用房杜舊僚今使伯彦任一方面未為過舉上乃許之翌日批㫖行下按日厯向子諲罷帥乃頥浩口奏不云有言章而壬申日行遣乃有臣僚上言纔八十許字不知何也武功大夫貴州團練使新知横州陳晟除名雷州編管晟客居婺州詐稱戰功冐請真俸為守臣所劾故有是命宣撫處置使司言見依倣朝廷體制造綾紙度牒為贍軍修城壘除戎器之用或不如則乞給降度牒萬道付張滉以歸俟至即罷詔以五千道賜之詔自今應批降處分係親筆付出身者並依舊作御筆行下用三省請也宣和二年正月九日立御筆日限靖康元年正月十八日照依祖宗法並作聖㫖行下是日御筆醫官樊端彦湯藥有勞特除遥郡刺史免執奏言者以謂陛下臨御以來深戒僥倖之弊事有不由朝廷者皆許覆奏所以絶羣小之求今奉御筆恐斜封墨敕復自此始願下三省評議乃寢前命然用御筆行下如故蓋吕頥浩意也日厯九月十五日奉御筆樊端彦已降指揮更不施行此月丙子吕頥浩云云可考壬申詔諸州武臣非教閱軍陣出師討賊者見長吏如文臣禮論者以天下艱危不可失武臣之心故有是命御史臺主簿唐煇守監察御史煇呉縣人也御筆從官因事得出者並替見任人成資闕故事大中大夫已上補郡者見任人即衝罷言者論前此州郡廣而從臣之貟少今也州郡狹而從臣之貟多士人失職公帑匱乏皆由此之故乃有是㫖癸酉右朝請大夫吕源為浙東福建沿海制置使置司定海縣以和州防禦使帶御器械張公裕為本司都統制㝷命御前忠銳第八將趙琦以所部從行賜江東安撫大使司統制官武功大夫威州防禦使張俊名守忠仍命以所部一軍赴行在遂以為御前忠銳第二將守忠赴行在以此月丁丑降㫖其除忠銳將在十月乙巳蓋代趙延夀也今並附見甲戍端明殿學士顔岐李邴並復資政殿學士責授左中奉大夫薛昻復左太中大夫責授寧逺軍節度副使王安中責授寧國軍節度副使蔡懋並復左中大夫責授秘書少監滕康落分司提舉亳州明道宫皆以赦叙也右諫議大夫徐俯言昻諂京卞以壞學術安中附王黼以開邊釁懋厚誣宣仁結怨建禍罪不可貸乞追寢近恩從之俯奏在十月甲辰日厯不書安中及懋叙官今以俯章疏増入是夜彗星沒乙亥御筆尚書兵部侍郎兼直學士院綦崈禮為翰林學士自靖康後從官以御筆除拜自此始襄鄧鎮撫使司統領官侯進言見以所部在漢陽軍詔聽湖北帥臣節制進桑仲部曲也用為郢州都廵檢使仲為霍明所殺進與其徒亡去後受江西安撫大使李囘招安囘十一月乙夘奏至尚書禮部貟外郎江端友主管台州崇道觀從所請也丙子詔近降御筆處分事多係寛䘏及軍期等事與前此指揮事體不同並經三省樞密院如或不當自合奏禀仍許給舎繳駁臺諫論列有司申審若奉行違慢止依違聖㫖科罪是日進呈上謂輔臣曰今日批降處分雖出朕意必經由三省密院與已前不同朱勝非曰不經鳯閣鸞臺蓋不謂之詔令吕頥浩曰所以别於聖㫖者欲上下曉然知陛下徳意所嚮也遂批㫖行下降授同州觀察使主管殿前司公事郭仲荀復武泰軍節度使戊寅罷鎮江府織御服羅上諭輔臣方軍興有司匱乏豈可以朕服御之物為先且省七萬緡助劉光世軍費也熊克小厯初鎮江府有歲貢御服花羅數千匹兵興罷貢至是内藏庫舉行守臣胡世將奏民力凋弊無所從出有㫖劾世將違㫖府僚皆懼世將曰某以身任諸公無憂戊寅詔罷日厯紹興二年九月五日鎮江府狀本府未經兵火以前歲貢花平羅六千三百餘匹建炎三年前知府葉煥申明朝廷省罷近於今年六月八日承省劄㨿内藏庫申獲聖㫖織造起發本府殘破之後賦入不多約用本錢七萬餘貫乞展限來年起發户部勘當所乞難行劄本府速行計置今來委是無錢起發得㫖令依限起發二十一日進呈上謂輔臣曰鎮江府織造御服花羅可罷當軍興之際有司匱乏豈可以朕服御之物為先且省七萬緡以助劉光世軍也按此時光世以浙西安撫大使兼知鎮江府明年四月光世移淮南宣撫始以世將代守鎮江其實紹興三年再舉行而世將有請坐是削官事見四年三月己未克實誤也御筆靖康建炎以來上書授官之人並令免吏部審量時方下詔求言論者以為近歲因上書直言而得官者乃與宣和以前投賦獻頌之人例皆審量故忠正之士咸以為耻未敢盡言故有是命己夘降授孟州觀察使權主管侍衛馬軍司公事蘭整降授海州團練使權主管步軍司公事邊順並復舊官庚辰端明殿學士許翰馮澥宇文粹中並復資政殿學士以赦叙也起居舎人王洋草粹中詞極其稱美洋坐免官而粹中之命亦格事在十月辛丑詔福建市舶司職事令提舉茶鹽官兼領仍移司泉州移司在十月辛夘務要招徠蕃商課額増羡臨江軍編管人范仲熊許自便仲熊坐照附苖劉謫嶺外至是始釋之是日吕頥浩奏論防秋事宜欲以韓世忠為宣撫使總大兵屯建康諸路帥臣兼帶宣撫使名者並罷上因論湖南事頥浩言李綱縱暴恐治潭無善狀上曰朕選任賢才惟恐有遺如綱朕固任用不知有何功可紀若謂在宣和間論水災事以此得時望可也權邦彦曰綱元無章疏苐掠虚美頥浩曰綱之朋黨與蔡京一體靖康伏闕薦綱者皆其黨陳公輔張燾余應求程瑀鼓唱太學生殺戮内侍幾作大變上曰伏闕事儻再有朕當令五軍收捕盡誅之辛巳太尉神武左軍都統制福建江西荆湖等路宣撫副使韓世忠為江南東西路宣撫使置司建康府沿江三大帥劉光世李囘李光並去所領揚楚等州宣撫使名其節制淮南諸州如故惟荆湖廣東宣撫使李綱止充湖南安撫使湖北廣東並還所部自方鎮以來前執政為帥者例充安撫大使至是右司諫劉棐屢言綱跋扈吕頥浩將罷綱故帥銜比江東西減大字日厯載出奏禀及指揮殊不了了蓋頥浩之意專為李綱設是以沿江三大帥雖去使名而依舊統𨽻元管州運獨李綱正領一路耳今詳載庶見本㫖世忠言提舉官董旼招馬友曹成之衆得八萬人詔户部侍郎姚舜明往衡邵辰沅等州揀其軍仍應副沿路糧食世忠還建康乃置背嵬親隨軍皆鷙勇絶倫者壬午遣使宣諭江浙湖廣福建諸路川陜向有宣撫司兩淮京西分鎮地故不遣時盗賊稍息尚書左僕射吕頥浩慮守令弗䖍請分命御史循行郡國前一日手詔選强明廉謹不欺之人觀風問俗平反獄訟宣布徳意三省以監察御史明橐尚書左司貟外郎曽統度支貟外郎胡䝉御史臺主簿施鉅樞密院計議官薛徽言五人為請上皆召見賜以宣諭吏民詔書御寳手厯招收盗賊旗榜而遣之其居它官者仍攝御史權尚書禮部侍郎趙子畫充徽猷閣待制樞密都承㫖自改官制後都承㫖除文臣自子畫始召責授海州團練副使合州安置劉錫赴行在承事郎權陜西轉運判官董詵直秘閣詵已是去年二月甲申先是張浚錄詵功進三官除職名故申命之已而言者以為太過遂罷遷秩之命詵罷遷秩在十月己丑殿中侍御史黄龜年言近㫖令臨安諸門差官率兵搜撿往來舟舡以察私鹽之盗乞速賜寢罷以安人心詔三省戒飭毋得接便騷擾癸未新作行宫南門成詔大理寺置監門使臣一貟用本寺請也仍用舊制令内侍一貟在門檢察宣撫處置使張浚承制以中大夫䕫州路轉運副使劉鎡知遂寧府詔御前忠銳第七副將宋穩所部並付沿海制置使仇悆甲申直秘閣范寅敷知岳州自袁植為李允文所執岳州遂無守將寅敷有田在岳之平江參知政事孟庾出使付一郡事至是奏而命之詔淮浙鹽每袋令商人貼納通貨錢三千已筭請而未售者亦如之十日不自陳論如私鹽律應販私茶鹽雖遇非次赦恩特不原免時吕頥浩用提轄𣙜貨務張純議峻更鹽法至是畫一行下鹽鈔畫一日厯全不載㑹要亦無之十月十八日乙巳右諫議大夫徐俯劄子比降鹽鈔指揮内一項貼納錢三貫文者云云十一月十五日壬申有㫖廣南鹽鈔並依今年九月二十七日淮浙鹽鈔已降畫一指揮施行三年正月十五日刑部狀檢㑹九月二十六日聖㫖應販私茶鹽雖遇非次赦恩特不原免今參附書入以補史闕但吕頥浩鹽鈔畫一與張浚措畫指揮乃同日而下亦可怪也徐俯劄子廣鹽指揮詳具本月日可以參考是日直龍圖閣宣撫處置司隨軍轉運使專一總領四川財賦趙開初變鹽法盡𣙜之倣大觀法置合同場收引稅錢與茶法大抵相類而嚴密過之初成都潼川利州路十七州鹽井户自元豐間歲輸課利錢銀絹總為直八十萬緡比軍興所輸已増數倍至是開始令每斤輸引錢二十有五土産稅及増添約九錢四分所過稅錢七分住稅一錢有半應折錢引者每引别輸提勘錢六十其後又増貼納等錢蜀中鹽課最盛者莫如簡州舊為課利錢纔千三百緡絹千九百匹銀百兩引法初行歲課至四十八萬餘緡他州倣此自是歲益増加合三路所輸至四百餘萬緡而䕫路十三州及隆榮卭岷諸州官煎者不與焉乙酉都督府請増辟參謀官已下文臣十七貟以孟庾至府故也右僕射朱勝非甞因辭同都督之命上章極論利害至數千言勝非以為宰相權任已重若更典兵文武二柄盡在其手豈人臣所堪後世不幸姦人居此位建功立業託名濟世將何以處之他日因進呈復奏此官當罷吕頥浩權邦彦皆言方防秋未可勝非又言庾姑存之頥浩所領可罷庾奏以右文殿修撰提舉江州太平觀盧知原為參謀官從之十月戊子丙戌顯謨閣直學士知興元府王似為端明殿學士川陜等路宣撫處置副使與張浚相見同治事始浚出使第以宣撫處置為名至是始帶川陜及等路字浚在關陜凡事雖以便宜行之然於鄉黨親舊之間少所假借於是士大夫有求於宣司而不得者始起謗議於東南大畧謂浚殺曲端趙哲為無辜而任劉子羽趙開為非是朝廷疑之將召歸先為置副時似已復還成都而行在未知也朱熹撰浚行狀云謗者謂浚任劉子羽呉玠趙開為非是按浚用玠時人皆以為宜所以謗子羽及開者指子羽驕倨開聚歛耳於玠無所與今删潤修入端明殿學士江南東路安撫大使兼知建康府李光落職提舉台州崇道觀以言者論光頃為御史不言蔡京之罪及秦檜罷相而光含憤興訕故也先是光甞遺吕頥浩書稱李綱凛凛有大節中外畏服頥浩以白上上曰如此等人非司馬光富弼誰能當之頥浩因言光與其儕類結成黨與牢不可破上以為然頥浩白上語在辛巳都督府參謀官傅崧卿兼權知建康府集英殿修撰程邁充徽猷閣待制知温州以孟庾言邁在福唐保䕶下四州有勞也集英殿修撰提舉亳州明道宫趙子淔鄭望之右文殿修撰提舉臨安府洞霄宫季陵並復徽猷閣待制以赦叙也子淔令鑠子宣和末甞以雜學士為陜西都轉運使坐累免至是始復之令鑠錙王世雄子故寳文閣待制右朝請大夫浙東福建沿海制置使吕源復右朝議大夫直龍圖閣婺州編管人施逵移瓊州編管以孟庾言范汝為殘破閩中逵實禍根罪首乞竄海外以謝福建荼毒之民故有是命逵中道逸去後改名宜生奔偽齊丁亥保靜軍承宣使邢煥為慶逺軍節度使充醴泉觀使皇伯右監門衛大將軍榮州防禦使權知行在大宗正司事令畤為洪州觀察使安定郡王是月録故直龍圖閣尹洙四世孫錫為將仕郎此㨿明年三月錫乞祠狀初劉忠既為韓世忠所破復聚衆走淮西駐于蘄陽口世忠前軍統制解元以舟師奄至襲忠大破之忠與其徒數十人遁走北去遂附於劉豫豫以忠為登萊沂密等州都廵檢使忠之將文廣率所部詣江西安撫大使李囘降囘即以廣為武翼郎閤門宣賛舍人充本司統領軍馬資政殿大學士宇文虛中在雲中聞金將攻蜀遣使臣相偁間行以告宣撫處置使張浚且賫上所賜御封親筆押字為信兩傍細字作道家符籙隱語云善持正教有進無退魔力已衰堅忍可對虛受忠言寧殞無悔虛受忠言者蓋隱虛中名也又遺其家人書言中遭廹脅幸全素守惟期一節不負社稷一行百人今存者十二三人有人使行可附數千緡物來以救囏厄昨有人自東北來太上亦須茗藥之屬無以應命甚恨甚負於是其夫人黎氏奏以縑帛茗藥附通問使潘致堯而致堯已行矣虚中遣相偁事以紹興四年十二月宇文粹中所奏修入黎氏以十一月甲戍奏至今併附此偽齊長星見偽太后翟氏死諡慈獻是秋金國主晟如燕山府左副元帥宗維右副元帥宗輔右監軍希尹左都監宗弼皆㑹留右都監耶律伊都守大同府左監軍昌守祁州伊都久不遷頗怨望遂與燕山統軍浩里謀為變盡約燕雲之郡守契丹漢兒令悉誅女真之在官在軍者天徳知軍偽許之遣其妻來告時希尹微聞其事而未信偶獵居庸關上遇馳書者覺而獲之宗維族浩里命希尹誅伊都于大同伊都微覺父子以遊獵為名遁入夏國夏人問有兵幾何云親兵二三百遂不納乃奔塔坦塔坦先受希尹之命其首領詐出迎具食帳中潛以兵圍之塔坦善射無衣甲伊都出敵不勝父子皆死西京副留守李處能坐累誅南京留守郭藥師河東南路步軍都總管蕭慶皆下獄既而獲免處能燕人遼宰相儼之子宣和末自平州來歸拜延康殿學士賜姓名趙敏修金人交燕復取以去宗維以藥師家富于財謂其可以動衆悉奪而囚之宗維次室蕭氏本天祚之元妃希尹殺之謂宗維曰彼與兄實為仇讎然忍死事兄者蓋有待也今事既不成他日帷間寸刃不測可以害兄矣希尹以愛兄故擅殺之宗維泣謝于是宗維令諸路盡殺契丹金主晟聞伊都叛未至燕而歸大赦彰徳軍節度副使髙景山告知相州杜充隂通江南先是充之孫自南方逃歸充不告官而擅納之遂下元帥府掠治宗維問之曰汝欲歸江南邪充曰元帥敢歸江南監軍敢歸江南惟充不敢歸也諸帥相顧而笑踰年乃釋西京即雲中大同府南京即平州内樞密使楊朴卒建炎以來繫年要錄巻五十八建炎以來繫年要録巻五十八金人地名考證伊都原書作餘覩誤改見巻一浩里原書作槁里誤今改正塔坦原書作逹靼巻一百七又作韃靼並誤今改正
