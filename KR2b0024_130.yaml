body:
  text: 建炎以來繫年要録卷一百三十宋李心傳撰紹興九年秋七月己卯朔金主亶執其太師領三省事宋國王宗磐太保領三省事兖國王宗雋滕王宗英虞王宗偉先是郎君和什者謀反下大理獄事連宗磐等㑹宗磐等以朔日入見亶伏兵執之辛巳皆坐誅亶下詔略曰周行管叔之誅漢致燕王之辟刑兹無赦古不為非不圖骨肉之間有懷蜂蠆之毒又曰宗磐族連諸父位冠三師胡為失圖以底不類謂為先帝之元子常蓄無君之禍心信任宵人煽為姦黨坐圖問鼎行將弄兵洪邁容齊三筆云宗雋等逞躁欲以無厭助逆謀之妄作欲申三宥公議豈容不煩一兵群凶悉殄已各伏辜并除屬籍其文知制誥劉昉所草也洪邁容齊三筆曰紹熙癸丑金主誅其叔鄭王詔曰朕早以嫡孫欽承先緒皇叔定武軍節度使鄭王允蹈屬處諸父任當重藩潜引凶徒共為反計自以元妃之長子異於他母之諸王冀幸國災窺伺神器其妹澤國公主長樂牽同産之愛駙馬都尉唐古富拉塔狃連姻之私預聞其謀相濟以惡欲寬燕邸之戮姑致郭鄰之囚詢諸羣言用是大戒允蹈及其妻卞玉男安春愛新并公主皆賜自盡令有司依禮收葬仍為輟朝二事甚相類蓋其視宗族至親與塗之人無異也是年冬倪正文奉使臨於中山正其誅戮處相去一月猶血腥觸人枯骨塞井為之終夕不安寐云初宗磐自以太宗晟長子嘗與亶爭位而左副元帥魯國王昌實穆宗英格長子金主亶大父行也尼瑪哈以憤悒死宗戚大臣皆懼禍故二人有逆謀宗英宗偉與宗磐同産知其情既被誅悉除屬籍右副元帥瀋王宗弼已平內難遂馳至燕京囚燕京留守彬王宗孟及其子禀宗孟宗磐弟也宗弼又以金主之命徙左副元帥魯國王昌為燕京行臺尚書左丞相拜簽書行臺尚書省事杜充為丞相昌怒曰我開國元臣也何罪而與降奴為伍遂叛欲南歸不克北走沙漠至儒州望雲甸追獲之下祁州元帥府獄趙甡之遺史云初秦檜在金中與逹蘭相善檜還朝為宰相聞逹蘭封魯王檜欲間逹蘭使二乃令髙益恭齎書與逹蘭益恭者燕人與檜通心腹隨檜歸朝檜授以承信郎令齎書賀逹蘭封魯王勸逹蘭令就封以治魯地且以為南朝宰相可以相應令劉光世差人送益恭至沂州劉冷莊金人寨取交收文字光世令漣水軍山水寨統領官王勛送益恭至金人寨得回文到清河遇祝友據楚州差人在清河把隘遂殺勛光世以承信郎借補勛之子恪益恭至祁州投書為人所告金人殺逹蘭一族良賤八百餘口而益恭以烹死此所云與諸書不同兼祝友據楚州在紹興初去此已久恐必有誤李大諒征䝉記云天眷元年四太子到京師呼四輔諭曰都元帥割三京還南宋何不與吾計議都元帥必有逆謀欺罔國朝恐與南宋别有異圖爾等四輔自今都元帥府應有移軍文字如吾不在府第無吾手押不得承受回報待吾急赴國朝整㑹割還土地是時父成在中山府謂大諒曰今北人彊橫非吾所憂吾慮者副元帥烏珠性剛恐還朝有異議次年皇統元年副元帥詔至行府數逹蘭與南宋和好叛逆甚明已將全族誅廢此所云與諸書大略相同今併附此金主封太師領三省事秦國王宗秀為梁宋國王拜右副元帥瀋王宗弼為都元帥封越國王以尚書左丞蕭慶為右丞相賜左丞相陳王希尹詔書不名肩輿升殿始宗弼之殺諸王也希尹與其謀希尹即眀威將軍達勒達有智略力兼百人宗雋入見達勒達自後執其手而殺之故有是賜此以張匯節要洪皓記聞參修匯於此年秋書烏舍為左相按天㑹十三年秋烏舍已除左相韓企先除右相去凡二年金中雜書云宋王達蘭既讎尼瑪哈又間邇來尼瑪哈之黨復陰說秦王謂成皇是秦王親姪阿固達嫡孫尼瑪哈陰謀决策立之是有翊戴之功可見尼瑪哈忠於秦王父子也秦王省納其言悔宋王調誘禍尼瑪哈之黨秦與宋近緣眦睚之憤復為參商二月間秦王以舊識召烏舍蕭慶復為左揆右轄仍用尼瑪哈子色格爾參知政事據此則可知烏舍已嘗罷而又相匯或脫漏也洪皓記聞有烏舍加恩制在誅宗磐詔書之後今從之張棣金國記世系篇英格長子阿固達生四子宗幹亮亮之父宗浚亶之父宗輔褒之父宗弼即烏珠英格次子烏竒邁生五子宗慶宗信宗儀皆為亶所殺宗元宗直為亮所殺英格少子薩拉哈亡生三子宗本即尼瑪哈次宗秀次宗憲金之譜系盡是焉餘同姓名雖親戚非本宗按棣所記與他書不同他書散見之而棣有世譜甚詳疑若可信然用金中文字可見者參究之則為抵牾棣以宗慶為烏竒邁長子而無宗磐按金中誅宗磐詔云謂為先帝之元子常蓄無君之禍心則宗磐果烏竒邁長子也棣以宗本為尼瑪哈又云烏竒邁姪按金中誅蕭裕詔云晉王宗本太宗子則宗本非尼瑪哈也尼瑪哈死於紹興七年宗本誅於紹興二十年相去亦逺以宗儀為亶所殺按金中詔本宗儀宗本同得罪乃東昏之時而非海陵之時棣亦誤矣餘見二十年四月末并注壬午申嚴州縣接送差兵之令時言者論席益罷四川制帥輦載寶貨以歸不知紀極乃以吳玠步騎數千人護行用防劫奪邵博之召亦妄作聲勢假卒數百人趙鼎赴泉州折彥質罷福州各千百人隨逐閩境為之騷然願各為之限制以裕民力故有是㫖癸未入內內侍省都知黃冕為山園陵按行使甲申詔新疆縣令自今並差文臣自建炎間始置武令劉豫因之論者以為不學而從政民間被害甚衆故復用文臣乙酉樞密院檢詳諸房文字朝謙之為尚書右司員外郎吏部員外郎陳正同為樞密院檢詳諸房文字祕書省校書郎許欣守吏部員外郎丙戌東京承平坊耆老寇璋等二百人奉表來賀上臨軒引見賜酒食於眀慶寺皆補官賜袍笏冠帶而遣之熊克小歷在乙酉蓋誤尚書倉部員外郎賀允中移吏部殿中侍御史周葵言薦舉之法自古豈能無弊而今為特甚選人用舉者升改立法之意本欲使監司郡守收擇人物激揚士行亦使晚進下寮知所以修身臨政以赴上之公舉也今奔競之風大熾請託之弊公行監司郡守以權勢髙下為論薦之先後孤寒之士無所求知或貨賂以干其私或詔曲以阿其意僅而得舉臣謂宜增修改官法考任稍增即聽減舉主二員或增至若干考任雖無舉主并許改官如此則恬退之士自有平進之路不復枉道以干人矣所有前宰執及監司郡守舉員却乞裁减仍須具述所舉官實有某事可應舉而不可泛用八字舉詞庶幾人人安分自修以副陛下官人求治之意所有今來降㫖以前已有考第之人若盡改官却恐太濫亦乞下有司照應詳酌施行詔吏部措置後十餘日葵又言恐吏部以在選調之人皆闒茸之士例得改官未肯措置今若遞增一考減舉主一員謂如三任以上十考舉者三員十一考舉者二員四任十二考雖無舉者並許改官則亦不可謂濫矣選人四任通待闕計之非二十餘年不可大率以二十五嵗出官更歷州縣二十五年則幾五十矣如是而無公私過犯雖其闒茸亦豈可不謂之安分循理之士哉改官之人固應有限制宜以三嵗改官員數取一嵗得中者為額每嵗奏舉及用考任改官者各居其半如不足許通用有餘即候至次年方許改官如此則不致過有冗濫詔吏部一就措置時張燾在吏部以為不可行事遂止丁亥秦檜留身論治道上曰御衆以寬朕於宫中未嘗輕用鞭撲往者劉豫苛虐聞此間仁政即以為笈諜者以聞趙鼎屢勸朕厲威朕不謂然今得失之效何如哉檜言陛下與豫勢異豫之叛逆人所不與非劫以威不能茍延嵗月陛下上承祖宗之德惟仁政可以懷逺邇上因歷叙古今帝王治迹專以仁祖為法上又言真宗時有宫人犯法當誅帝令執付有司隂諭㫖笞而遣之在內足以警衆而於外可以市恩蘇軾元祐中嘗於講筵進讀退又為疏以進軾用心不易得朕今寶藏之起居郎林待聘試中書舍人中書門下省檢正諸房公事周綱權尚書吏部侍郎左朝議大夫直龍圖閣蘇擕守太常少卿古中大夫直祕閣王㬇知泰州是日同簽書樞密院事王倫至中山府為金人所拘辛卯樓照至鳯翔府壬辰彰武軍承宣使知金州兼陜西宣諭使郭浩為鄜延路經略安撫使兼知延安府同節制陜西諸路軍馬趣令以所部之任武康軍承宣使利州路經略安撫使川陜宣撫使都統制節制成鳳州楊政為熙河蘭鞏路經略安撫使兼知熙州定國軍承宣使熙河蘭廓路經略安撫使右護軍都統制節制階岷文龍州吳璘為秦鳯路經略安撫使兼知秦州仍詔郭浩楊政吳璘並依舊聼四川宣撫使節制時陜西新復永興涇原環慶三路僞官張中孚趙彬張中彥為帥熙河慕容洧叛鄜延關師古入朝秦鳯無帥樓照以便宜命浩等分鎮三路於是照欲盡移川口諸軍於陜西璘曰敵反覆難信懼有它變今我移軍陜右蜀口空虛敵若自南山搗蜀要我陜右軍則我不戰自屈矣當且依山為屯控守要害逮敵情見力疲漸可進據繇是璘政二軍獨屯內地時已命張中孚節制陜西諸路軍馬故以浩副焉護國軍承宣使知興元府田晟為利州路安撫使兼知興元府右中奉大夫李唐孺陳古並直徽猷閣唐孺為陜西轉運副使古為秦鳯等路提㸃刑獄公事鳯翔府置司直祕閣鮮于翰為永興軍路提㸃刑獄公事永興軍置司翰未見自何階官除祕閣修撰四川轉運副使陳逺猷充右文殿修撰直祕閣四川轉運副使張深升直徽猷閣並為陜西轉運副使専管熙秦兩路時樓照㑹諸路監司于鳯翔深等皆言宣撫司仙人關河池等處屯駐大軍之久坐困四川民力今幸復得六路所在粒米狼戾軍士多關中之人得還鄉食賤食人情無不感悅他日使戰誰不樂從川蜀糧運可次第罷矣樞府下其議以行營右護軍精兵八萬餘人三萬人分守關隘五萬人分守陜西委宣撫司立限并老小起發諸州就糧令下之日諸軍久駐川口其間有屋舍田産經營姻親者則憚於逺戍有出怨言者詔新復州軍請佃官田納租外免輸征稅劉豫之僣也租稅並取之至是有舉人上書請去其一户部言自已之田謂之稅請佃田土謂之租自來不曽有併納租稅指揮乃依舊制甲午上謂秦檜曰朝廷惟要辨君子小人君子小人既辨則治道無不成矣尚書兵部侍郎兼史館修撰張燾權吏部尚書詔三省催促刑部將今赦未檢舉人速具事因申省取㫖以久旱用言者請也祖宗舊制每赦降後置看詳編配罪人一司崇觀後不復舉行間有檢舉皆出於一時用事者之意建炎以來未能盡革言者以為弭旱災而召和氣莫先於此故有是㫖焉是日起復右中奉大夫直祕閣四川轉運判官髙士瑰令持餘服此據本司題名附見日歷無之乙未申嚴支借移用常平錢物之禁時諸路常平錢有降㫖令輸行在者㑹楚州請以常平錢為奉迎兩宫之費論者以為常平儲蓄所以備水旱消盜賊為國家根本之計望依舊法令於所在樁管遂寢前命是月左諫議大夫曽統上殿詔臨汝軍殄寇縣復舊縣名縣劉豫所改也丙申詔置司看詳劉豫僞命官換給上曰朕方以天下為度凡僞命者既已寬貸勿問使其才可用亦當抆拭用之遂命都省察院委官如賞功司例是日南京留守路允迪入對命坐賜茶允迪奏乞申嚴行下應干事件並遵見行條法又請本路合置學官處乞從朝廷選差有學行之人皆從之允迪出守新疆而所建眀如此故具載之丁酉上為吳玠薨輟視朝時已命四川制置使胡世將兼權主管四川宣撫使司職事世將權宣司日歷不見降㫖之日但於此月乙巳書勘㑹已降指揮令胡世將兼權四川宣撫職事按玠以六月己巳薨去此二十有九日朝廷得報必在輟朝之前而世將八月二十三日庚午至河池在勘㑹指揮之後二十五日必不如此之速未知六月十三日玠以疾篤乞致仕時已密降此指揮或樓照在行府先次差權然後降㫖當求它書參考世將自成都馳赴河池己亥秦檜言陛下齊居蔬食以祈雨澤考之典禮惟當損大官常膳上曰雖損膳豈免日殺一羊天意好生朕實不忍既而雨應詔金州依舊𨽻四川宣撫司虢州𨽻京西商州聽金州節制自五路初復而商虢復𨽻陜西至是陜西宣諭周聿郭浩言五路並在秦川之北萬一盜賊出沒五路便見隔絶豈能南來為朝廷用商州舊屬川陜自講和之後還𨽻陜西而武關秦關之險並在其北何以制禦况虢州跨河帶山北臨陜郊最為要害之地今亦屬陜西非所謂以近致逺也故有是㫖庚子上諭秦檜曰州郡月樁大軍錢尚有敷斂於民以充數者可速行裁减各量所入樁辨如有不足悉從朝廷應副毋使橫取以為民患日歷載此無秦檜奏答之語後來亦不見施行當考監察御史王利用提㸃成都府路刑獄公事是日王倫在中山始聞金國內變倫以下皆憂俄傳都元帥越國王宗弼昨夜抵城外已還祁州矣少頃引接者令倫等赴元帥府趣行甚遽是晚達祁州辛丑言者論恤民備災儲蓄之政莫如常平義倉此二法者雖始於漢建於隋唐其意則唐虞三代不易之美國朝循其制於其盛時府界諸路所積幾千五百萬斛天災代有民無流離餓殍由有備也艱難以來用度不足或取以給軍須至於州縣他費因以侵用比年往往銷費殆盡甚乖祖宗憫人之意今日經制議者止謂盡行經畫以應支遣而已至於察其豐凶以謹散斂勸其貯納以待賑給未之聞也大抵有司務紓目前之責不思久逺之計遂致言者無事預言指為迂緩不幸一有二三千里水旱蟲蝗之憂言又何及謂宜凖舊制更加修明侵移擅用格奏之令使祖宗恤民備災之政不變於聖代詔戶部申嚴行下是日御史中丞廖剛上殿特進知泉州趙鼎言昨凖告命落節度使自惟罪狀昭著揆之禮法赤族猶為輕典止從貶秩益不自安伏望罷知泉州投之散地庶幾澡雪淬勵以副陛下庇護再生之賜詔答不許臨安府火癸卯詔新復州軍遇有合降詔書令學士院請寶訖赴三省樞密院給發乙巳路允迪辭行丙午端明殿學士提舉臨安府洞霄宫徐俯知信州徽猷閣待制知嚴州董弅與宫觀殿中侍御史周葵論弅嘗以珍玩賂權臣許以從班弅遲其命以事挾持之遂得詞掖其權禮曹也言者論主伊川之學因以罷去弅何自知伊川哉今以次對居輔郡略無憂民閔雨之意故弅遂罷直祕閣秦梓知太平州建炎以來繫年要録卷一百三十建炎以來繫年要録卷一百三十金人地名考證和什原書作胡矢誤今改正唐古富拉塔原書作唐括蒲刺覩即金史之蒲刺篤並誤今改正安春原書作按春與金史同並誤今改正愛新原書作阿辛誤今改正英格原書作楊割誤改見卷二尼瑪哈原書作粘罕誤改見卷一逹蘭原書作撻懶誤改見卷一逹勒逹原書作撻撻誤今改正烏珠原書作兀术誤改見卷一烏舍原書作悟室誤改見卷阿古逹原書作阿骨打誤改見卷一色格爾原書作㵼里孛即金史之斜哥此㵼里孛係斜哥之訛並誤今改正烏竒邁原書作吳乞買誤改見卷一薩拉噶原書作思改誤改見卷一
