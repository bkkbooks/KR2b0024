body:
  text: 建炎以來繫年要録卷二十三宋李心傳撰建炎三年五月戊寅朔上次常州詔知樞密院事兼御營副使張浚為宣撫處置使以川陜京西湖南北路為所部初上問浚以方今大計浚請身任陜蜀之事置司秦川而别委大臣與韓世忠鎮淮東令吕頥浩扈駕來武昌張俊劉光世從行庶與秦川首尾相應上許之始除浚招討使左司員外郎兼權中書舍人李正民言川陜吾境不當以招討名請用唐裴度故事上是其言浚乃改命上許浚便宜黜陟親作詔賜之左諫議大夫滕康為翰林學士時御史中丞張守聞吕頥浩張浚叶議將奉上幸武昌為趨陜之計又欲徙中原之民於東南於是守與康皆持不可曰東南今日根本也陛下逺適則姦雄生窺伺之心况將士多陜西人以蜀地近關陜可圖西歸不過將士為此計耳非為陛下與國家計也守併陳其害有十至殿廬又謂康曰幸蜀之事吾曹當以死爭之上納其言遂擢康為學士時顯謨閣直學士致仕翟汝文亦奏疏請幸荆南不從右司諫袁植言前宰相黃潛善汪伯彥國之姦賊其罪不在王黼蔡攸之下且怙寵擅權蔽賢嫉能登相府曾未踰年三分天下幾失其二陛下縱釋而不誅奈宗廟社稷何望檻送二人斬之都市以崇國體詔責授鎮東軍節度副使英州安置黃潛善降充江州團練副使責授祕書少監永州居住汪伯彥降充寧逺軍節度副使並即其州安置始潛善之斥也其兄潛厚以分司居道州潛厚聞命徑歸邵武軍朝廷聞之為降守臣張髦一官潛厚乃去潛厚事以紹興二年十月劉棐劾疏附入不得其年月故因潛善再責遂書之是日韓世忠引兵發杭州庚辰江浙制置使周望引兵至衢州而苖傅與其徒犯江山縣傅之行軍也常以王鈞甫馬柔吉將赤心隊為先鋒去大軍十里而屯時上命諸將以罪止傅兄弟及劉正彥鈞甫柔吉張逵餘皆罔治赤心軍士聞詔寬大乃叛傅鈞甫遂焚河梁以斷其路率赤心之衆降於望望使人受降書未成其前軍統領官右武大夫歸州防禦使張翼等七人謂鈞甫反覆斬鈞甫及柔吉父子首以降賊黨大懼詔以翼為翊衛大夫溫州觀察使諸將趙秉淵楊忠憫歸朝官趙棫趙休並進三官仍以棫休為直祕閣秉淵易縣人宣和末殺契丹廋軍以城來降忠憫其先榆次人也上之未移蹕也朝散郎洪皓以秀州司録事遭父喪免上疏論今內患甫平外敵方熾若輕至建康恐金人乘虛侵軼宜遣近臣先往經營庶事告辦鳴鑾未晚也時朝議已定不從既而悔之上問宰輔近諫移蹕者為誰今安在張浚以皓對乃召至平江欲以為部使者使招二凶會捷書至乃止此據洪皓行述附見但行述以為將招二凶會捷書至乃止却恐不然按皓以三月乙酉被旨使金國是時二凶未平不應捷書已至當是鈞甫柔吉被殺而上在常州已聞之也今略修潤仍移附此日庶不抵牾皓彥升弟子也彥升鄱陽人政和給事中傅等聞韓世忠且至遂引兵趨信上世忠聞之恐其滋蔓閩廣乃自浦城捷出以邀之辛巳上次鎮江府翰林學士滕康請命有司祭陳東之墓御筆令守臣併張慤致祭上諭執政以慤古之遺直東忠諫而死皆厚恤其家焉資政殿學士提舉西京嵩山崇福宫盧益為淮東制置使資政殿學士提舉醴泉觀兼侍讀路允迪為淮西制置使上以兩淮為強敵所殘議擢大臣鎮撫故有是命益居天慶觀置司備位而已尋皆罷之此據趙甡之遺史日歷無之癸未翰林學士滕康為端明殿學士簽書樞密院事康既秉政張浚西行之議遂格朱熹作張浚行狀云浚建議令吕頥浩奉上幸武昌會浚西行江浙士大夫搖動頥浩遂變初議按康以異論而執政則此議蓋已變矣不在浚西行之後意者浚此時正往髙郵措置而康遂得遷邪或熹所云蓋指東巡之議今且附見又於閠八月丁丑申言之徽猷閣直學士提舉西京嵩山崇福宫曽楙為翰林學士是日上次下蜀鎮建武軍節度使節制江南東路軍馬楊惟忠將萬餘人迎鑾部伍甚整上按轡顧望頗稱其能甲申中書舍人張忞罷忞初入見言上即位以來無纎毫之失上謂大臣曰自古人君不患無過患不能改過耳忞諂諛如此豈可置之從班乃落職宫觀乙酉上至江寧府駐蹕神霄宫初上至張橋山水暴溢橋壞於是江南東路轉運副使李謨黃敦書皆罷去而中大夫提點刑獄公事姚舜明坐不迎車駕亦降二官御筆建康之地古稱名都其以江寧府為建康府起復朝散郎洪皓為徽猷閣待制假禮部尚書充大金通問使皓已見五月庚辰初議遣人使金張浚因薦皓吕頥浩召與語大悅俄有旨賜對時皓方墨衰絰頥浩脫巾衣服之既對上以國步艱難兩宫逺狩為憂皓極言天道好還金人安能久據中土此正春秋邲郢之役天其或者警晉訓楚也上恱進皓五官擢待制而以武功郎龔璹為右武大夫假明州觀察使副之上遺左副元帥宗維書願去尊號用正朔比於藩臣上令皓與宰執議國書皓欲有所易頥浩不樂遂罷遷官之命洪適撰皓行述云近例逺使得循職郎四人時先君有六子獨適與名三以官其弟姪按日歷紹興十二年二月十九日左從政郎洪適狀父皓出使依例合得五名恩澤當時蒙指揮令候回日陳乞伏望先次一併給還有旨依傅雱例施行據此則皓出疆日止實放行一名故獨官適也其後紹興元年四年七年十一年皓皆用待制恩例奏子京官十三年還朝則適遵已入館矣官其弟姪乃在此時今不取時淮南盜賊踵起右武大夫忠州防禦使李成自山東至泗上甫就招即以成知泗州羈縻而已乃命皓兼淮南京東等路撫諭俾成遣所部衛皓至南京璹歷陽人也此以洪皓行述增修上遺尼瑪哈書日歷不載按今年十一月丁卯親征詔書有云卑詞厚禮遣使相望以至願去尊稱甘自貶黜請用正朔比於藩臣在建康則遣洪皓崔縱杜時亮在平江則遣張邵其為書指無不曲盡哀祈此詔布之四方則史臣不必追諱此事當略存之以見其實今年七月癸未八月丁卯所書可參考丁亥龍圖閣待制沿江措置使陳彥文為徽猷閣直學士都大提領水軍措置江浙防托事務仰體國憂不許辭免日下疾速前來行在奏事又詔防江措置自池州至平江府並𨽻彥文仍委守令按户籍丁産簿選衆所推服之人為隊長分認地分廣置刀弩具舟楫將佐並委彥文經畫之彥文升職名日歷無有今以季陵外制集增入詔內侍藍圭等並緣苖傅作亂無辜譴斥仰所至州軍火急遣赴行在潰卒朱海有衆數千人入定逺縣界知縣事魏孝友率兵至永康鎮迓之孝友請戰海曰我假道而過秋毫不敢犯尚何與公戰乎孝友不從以民兵擊之海怒與戰民兵皆潰海執孝友至縣殺之是日苖傅冦浦城縣時御營副使司前軍統制王德既殺江浙制置司裨將陳彥章欲與制置使韓世忠戰世忠曰苖劉未平若與之戰乃是更生一敵不如避之夜世忠將至浦城北十里與傅正彥遇于漁梁驛正彥屯溪北傅屯溪南跨溪據險設伏相約為應世忠率諸軍力戰驍將李忠信趙竭節恃勇陷陳右軍統制官馬彥溥馳救死之賊乘勝至中軍世忠瞋目大呼挺矛而入正彥望見失聲曰吾以為王德乃韓將軍也正彥少却世忠揮兵以進正彥墜馬世忠生擒之盡得其金帛子女傅棄軍遁去墜馬不死失傅所在苖瑀收餘卒得千六百人進破劔川縣又犯虔州事聞再贈彥溥武成軍節度使諡忠壯先是朝散郎劉晏晏已見二年九月甲申𨽻正彥軍中傅使統赤心隊晏謂其部曲曰吾豈從逆黨反者邪韓制置來吾事濟矣遂率衆歸世忠浦城之戰世忠以晏騎六百為疑兵於浦山之陽賊見大駭晏以所部力戰世忠上其功後遷一官日歷載世忠獲正彥在己丑今從熊克小歷戊子祕閣修撰知廬州胡舜陟以禦冦有勞升集英殿修撰己丑詔以浙西所糴米四十萬斛赴東京應副留守司支用以發運副使葉煥有請也初薛慶既據髙郵兵至數萬人附者日衆知樞密院事張浚聞慶等無所係屬欲歸麾下親往招之浚渡江靳賽以兵降及是至髙郵入慶壘從者不滿百人浚出黃榜示以朝廷恩意慶感服再拜辛卯詔太史局天文官許將帶學生內中直宿以備宣問天象壬辰徽猷閣直學士提舉萬夀觀兼侍講詹乂兼權直學士院甲午左武大夫福州觀察使節制戰船軍馬辛道宗提點江南東路刑獄專一措置捉殺盜賊公事乙未知樞密院事張浚罷為資政殿學士提舉杭州洞霄宫初薛慶欲求厚賞乃留浚三日而外間不知謂浚為慶所執浮言胥動真州守臣以聞吕頥浩與李邴滕康共議罷浚樞管以御營使司前軍統制王􅊅為淮南招撫使統所部往平之中興姓氏録薛慶傳趙甡之遺史皆云張浚至髙郵薛慶詐迎入城見浚之貌曰豈有如此樞密邪遂執之浚隨行有陜西兵多遭殺者慶逼浚出所賫官告三千道而館之按此即當時傳聞之詞恐不至是日歷紹興二年三月七日進武副尉張存狀於建炎三年五月內受到御營副使張樞密劄子勘會髙郵軍屯駐統制官薛慶下將佐使臣人兵能保護知宗一行無虞居民歸業係河北忠義之士因金人侵洺州纍年堅守勢力不加轉戰千餘里皆曽殺獲委有功效昨隨李民來赴行在又能堅守忠義再立勞績深可嘉尚今依奉聖旨各與轉三官資內存係民兵甲頭至今未曽陳乞正授文帖詔張存轉兩資其借補劄子令尚書省毁抹據此慶求厚賞則有之而所謂迫浚令出官告三千道則恐非其實也又紹興四年三月壬子張俊申本軍使臣韓福喬德建炎三年五月內張樞密到承州補正承信郎所有承到張樞密付身未曽換給足明傳聞之妄今併附此以備參考徽猷閣待制提舉杭州洞霄宫沈思卒思真州人事上皇為中書舍人京東東路安撫使劉洪道在安邱未有所向乃與宫儀偕引兵依閻臯於濰州丁酉直祕閣主管南京鴻慶宫曽紆以首明大義除直顯謨閣用御史中丞張守奏也日歷云紆除直祕閣誤也今從紆墓志遂以通判杭州章誼為尚書倉部員外郎己亥都省言自軍興以來天下多事四方文移增倍於前日宰執精力疲耗於案牘而邊防軍政所當急者反致稽緩此無他中書别無屬官故也望用熙寧故事復置中書門下省檢正官二員分書六房事省左右司郎官二員從之是日苖翊率衆出降未解甲復用其將孟臯計欲遁之溫台裨將江池聞之殺臯擒翊降於制置使周望其衆皆解甲有舉子程妥者崇安人時在傅軍為傅謀與苖瑀張逵收餘兵入崇安縣統制官喬仲福王德共追之盡降其衆傅夜脫身去變姓名為商人與其愛將張政亡之建陽縣土豪承節郎詹標覺而邀之留連數日妥知不免密告標曰此苖傅也標執以告南劔州同巡檢吕熙熙以赴福建提點刑獄公事林把把懼政分其功與熙謀使護兵殺政崇安境上自以傅追世忠授之遂檻赴行在林杞遺事苗傅劉正彥既敗走韓世忠尾賊而追之時把為閩憲恐賊至得脫預檄諸郡扼其奔衝既而正彥先為大軍所擒傅與其徒變姓名竄伏人莫能蹤迹把立重賞募之俄而募士詹標擒傅與其徒張政以至是時世忠已班師杞冒暑親部送至富沙境上會日暮大雨政乘此謀竄去為護兵所殺把獨以傅追及世忠授之初知建州某人者與當軸為姻恃勢貪婪用官錢至纍巨萬監司不敢按杞亟以其罪聞某人讒於當軸遂以張政為告苗傅反者宜得重賞而把殺之遂下杞於獄幾欲置之死不得已猶削籍連州安置紹興四年六月二十四日刑部狀勘當吕熙元係南劔州同巡檢據統制詹標申搜尋四山見三人從廟山奔下內一人是稅户陸安來報被賊虜去內二人係張政苖傅押至提刑林杞處出頭內張政言寃屈事政是徒中反告之人有金牌子與程十一郎託他去告官林把為見張政稱是告捉苖傅之人有礙自己功賞問吕熙道張政是苖傅使臣只道他捉得苖傅若送去韓世忠處壞了我待殺了如何吕熙道可乘虛作緩急令人取首級到建安縣界安泊關報張瑀將兵來取苗傅林把向吕熙道張政如何吕熙道因此急難取首級林把言好吕熙向邱萬嚴景用刀將張政斫下首級此日歷所書也遺事所云不無緣飾今從史把明年三月甲寅編管辛丑張浚自髙郵至行在復以浚知樞密院事先是淮南招撫使王􅊅既渡江會薛慶既得厚賞用其黨王存計亟以兵衛浚而出上聞之歎息即日趣歸浚辭曰髙郵之行徒仗忠信雖不至如所傳聞然身為大臣輕動損威其罪莫大詔不允遂以慶守髙郵軍上親書御製中和堂詩賜浚曰願同越句踐焦思先吾身卒章曰髙風動君子屬意種蠡臣是行也御營使司主管機宜文字承直郎任貺至髙郵遇賊墜馬死上命以銀帛恤其家録其子仲全為忠州文學趙甡之遺史云薛慶之執浚也屢欲殺之其黨王存勸止之曰真偽未可知若殺真樞密則異日欲歸朝廷其可得邪慶然之浚遂得歸按此亦傳聞之辭以任貺之死及浚奏劄之語觀之慶其初亦必稍有不順但終於感化不至如遺史所云耳今不取壬寅詔諸將班師以劉正彥苖翊就擒故也癸卯改鑄虎符初唐州既為金人所殘乃移治桐柏縣土豪董平盡攢集強壯為兵朝廷因以為統制平以兵勢脅制州郡守臣滕牧不能堪平怒欲殺之會京西轉運判官直徽猷閣范正已行部至唐州牧告其狀正已陽數牧罪下襄陽獄言于朝乙巳詔免牧官令疾速取勘正已純禮子也純禮仲淹子建中尚書右丞平嘗引衆犯德安府遣其徒李居正黃進入城議事守臣陳規即推誠與語且諭以忠義居正曰誠所願進不對規斬進以兵授居正使為前鋒大破之平乃去按董平事迹全不見於史今以趙甡之遺史陳規行狀程昌宇家傳參修甡之載滕牧事於今年六月末而昌宇家傳載牧與王民自襄陽還攻董平以八月十九日過蔡州事亦相近日歷紹興二年正月二日刑部狀檢準建炎三年五月二十八日敕知唐州滕牧治事不審與董平有隙使軍民無緣安帖等事奉聖旨滕牧先次放罷疾速取勘具案聞奏本部催促襄陽府二年半有餘並無回報此即正己所劾也未知正己過唐的在何時今但書降旨之日俟考丙午命諸路漕臣驅磨常平失陷錢物具數申尚書省仍樁收以待詔用丁未尚書省請以江池饒信州為江州路建康府太平宣徽州廣德軍為建康府路並以守臣充安撫制置使其江州守臣更不帶江東湖北字入銜從之熊克小歷載此事在此月丁酉今從日歷明年六月戊辰又改是月宣義郎直祕閣張元亨主管亳州明道宫用渡江詔也此據紹興四年六月元亨陳乞差遣狀修入京西北路制置使翟興擊叛將楊進殺之進屯鳴臯山之北興與其子琮屢擾劫之進不能安棄輜重南走興引衆邀擊會於魯山縣賊以精鋭逆戰於婆娑店興之軍以藥箭射進併中其馬進死於陳興遂復西京躬率將吏至永安軍朝謁諸陵軍士皆掩泣有義兵統領季興者王屋人世為農魁桀有勇力寡言語尚信義二帝北狩興以保扞鄉里聚衆萬餘元帥府統制官元常以興為義兵統領上既南渡興以衆往來懷衛間斷金人糧道翟興以書幣迎之使知長水縣至是破楊進有功興奏為武義郎閣門宣贊舍人就統所部而借補武略郎王俊俊初見元年十二月亦以功遷京西南路招捉副使留守司仍鑄印給付此據俊建炎四年六月自陳狀增入進餘衆復推其徒劉可為首以拒官軍時劇盜張用王善皆在陳蔡之間楊進既死京畿稍寧靜東京留守杜充乃奉表請上還闕不從建炎以來繫年要録卷二十三
