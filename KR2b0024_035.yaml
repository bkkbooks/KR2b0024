body:
  text: 建炎以來繫年要録卷三十五宋李心傳撰建炎四年秋七月按是月辛丑朔癸卯浙西安撫大使劉光世乞依宣撫處置使司例合隨宜措置事並從便宜詔除臨陳出竒或事干機會許施行外餘並稟朝旨光世此請日歷不載今以紹興元年十月戊寅兵部狀修入詔諸州守臣自軍興以來得便宜指揮者並罷和安大夫開州團練使致仕王繼先為榮州防禦使落致仕以覃恩特遷也先是有詔雜流遇覃恩勿遷遙郡至是以命繼先富直柔奏靖康建炎之初吏部皆嘗申明武功大夫雜流伎術官遇覃恩許與不許轉行有旨不許轉行遙郡止令回授此事不見于日歷今併附見中書舍人季陵草制略曰勉思藝諫毋忘藥言戒于驕淫保此休寵斬神武前軍統領官胡仁參于越州市宣教郎袁潭除名韶州編管坐與李鄴同謀投拜又擅殺兩浙提點刑獄王翿故也尋詔以翿死事贈朝請大夫官其家三人既而言者以為翿嘗降敵比敵兵之去遂以印付翿不當褒贈范宗尹主之卒贈翿一官録其子云翿初贈官在九月乙卯改命在明年三月己亥今併書之責授建寧軍節度副使李邦彥卒于桂州甲辰執政奏以朝議大夫提舉江州太平觀劉洪道為建康府路安撫大使司參謀官上曰不可是又欲與吕頥浩同官趙鼎曰頥浩之來尚遲今先令洪道往池州措置防江上曰此固無害但議者謂頥浩多引用山東之人故不欲遣且頥浩身為宰相當收攬天下人材盡為我用獨私鄉曲非公道也先是中書舍人季陵入對言強敵之患已無寧嵗焚劫殺戮幾遍天下夏則北去秋則南牧往年休士馬于燕山次年移于河北次年移于京東今寓淮甸無復去意患在朝夕可謂急矣張浚提兵以赴公安劉光世提兵以赴鎮江亟召亟遣事尚可及若吕頥浩既去朱勝非未來使七月受命八月之鎮九月弓徑馬肥敵人向南兵不素練糧不素積又不設險何以禦之臣願陛下急與大臣謀先遣馬軍先儲運漕更擇賢副先為經畫以待其來不然雖位望崇重號前宰相無益也今日注意將相非為安危實為存亡朝謀夕行當如拯溺豈可不惜分隂哉至是遂命洪道趣之池州權管本州及安撫司事以統制官張浚李貴王進王渙所部合四千人𨽻本州撥四將人兵在此月壬戌諸軍權聽節制洪道請用便宜指揮許之乙巳詔婺衢信饒州豫蓄錢糧以備巡幸丙午詔閩越商賈常載重貨往山東販賣令沿海諸州禁止丁未太尉奉國軍節度使浙西安撫大使兼知鎮江府劉光世為集慶軍節度使開府儀同三司安世遷延不之鎮右諌議大夫黎確奏光世不念兩朝大恩乃欲豫擇便地自求暇佚中外憤之願趣就塗前一日詔以章示光世仍加使相以遣之光世以父名為嫌乃換武寧之節貼麻改命戊申詔臣僚至都堂自正一品外他並在執政之下著為令為劉光世也武經大夫榮州團練使權湖南馬步軍副總管孔彥舟以捕鍾相功真拜利州觀察使充辰沅靖州鎮撫使兼知辰州王明清揮麈第三録云方務德守荆南有寓客張默者魏公之族子出乃翁所記建炎荆州遺事一編孔彥舟領衆十餘萬破荆南城時朝廷方經理敵兵未暇討捕張單騎入城説諭彥舟使之效順又令討鍾相許以成功入川從宣撫司保奏求賞彥舟出師一戰而勝張遂令彥舟具立功人姓名及歸降文字與彥舟心腹數人俱入蜀至夔又説降劇賊劉超未及宣撫司數舍道遇族兄攫金不得乃見魏公言張三受賊賂甚厚其謀變詐不可信魏公然之張正令彥舟屯荆南彈壓鍾相餘黨魏公悉不從令往黃州屯駐其徒皆不樂遂率衆渡淮降金按彥舟以建炎四年二月受傅雱檄討鍾相三月獲之七月拜利州觀察使知辰州尋改除鼎澧鎮撫使彥舟為馬友所逐引兵之江西紹興元年秋除蘄黃鎮撫使實代李成二年夏權邦彥入樞府彥舟聞之乃叛去降偽齊以本末考之彥舟賞功及除命皆出朝廷與宣司别無干涉况賞典已不薄又距其叛去蓋踰二年俱與張所記不合此蓋其飾説今不取宣撫處置使張浚獻金一萬兩以上令浚措置財用赴行在故也辛亥詔遣官措置海道軍賊楊勍自稱武功大夫忠州團練使都統制軍馬受劉光世招安光世以聞詔放罪時勍已聚衆三千人復犯永春縣乃命統制官李捧速往捕之遣李在七月己未承議郎范正輿直祕閣正輿純仁子也在劉光世軍中纍年故有是命壬子朝散郎張綱為尚書司勳員外郎綱金壇人也癸丑故責授安化軍節度副使王時雍許歸葬先是范宗尹用赦量移徐秉哲吳幵莫儔王紹王及之胡思等諸人故其家以為請林泉野記范宗尹量移王時雍徐秉哲等皆不聞奏議者譏其不公按史不見秉哲等移放月日而時雍家陳乞狀云同時得罪之人皆己生還鄉里則其移放必在此前今因書時雍事附見崔增既破譙湖水寨有大小舟數百遂犯太平州圍其城守臣郭偉盡力禦之荻港巡檢王宗射中增之中軍將劉順賊少却偉引兵下城與戰賊乃解圍然亦未退甲寅詔汪伯彥張􅊹錢伯彥邵溥並許便居以檢正都司檢舉也初伯彥等三人以散官永峽州安置而澄分司居衡州至是用德音皆復之詔總領四川財賦舉官如陜西轉運使例用張浚請也乙卯劉光世言平江去大江不逺其利害不在鎮江之下乞移大使司于平江府遣本軍練歷統制官一員以重兵屯鎮江與光世相為犄角詔不許宣撫處置使張浚請宗室非嘗犯贓私罪者許具腳色申本司赴四路轉運司注擬從之自熙寧劄制宗室不許調川陜官至是宗室避難入蜀者多故浚以為請是日二帝自韓州移居五國城五國城者在金國所都西樓之東北千里金人將立劉豫乃請二帝徙居之臣謹按北狩行録云庚戌中元遷五國城乙卯十五日也故附於此日時越王俁鄆王楷已薨靖康皇族數云二王薨于韓州烏登路都統錫庫者以金人之命減去隨行宗室官吏上皇力懇之不從乃召諭之曰卿等相隨而來憂樂固當同之但事屬它人無如之何言訖泣下皆相與號呼而出于是宗室仲晷等五百餘人皆移居臨潢府而內侍黎安國等數百人在遼東從二帝者惟晉康郡王孝騫和義郡王有奕等六人而已有奕吳榮穆王子也上皇之在五國城也其貝勒赫伯之通事慶格詐傳赫伯之意求北珠上皇豫之它日事覺欲殺慶格遣人質其實上皇曰初無此事恐復誤傳北人聞之皆以手加額已上並據北狩行録靖康皇族數參修初敵之挾天屬以往也右監門衛大將軍吉州團練使士跋得間遁去居邢州至是結約土豪將舉事為人所告捕至京師戮之後贈保寧軍節度使諡忠果士跋濮王曽孫也此以乾道會要增入據其子所陳乃今年事不得其月日故附見二帝東徙之後俟考丙辰户部尚書葉份充龍圖閣直學士知泉州時侍御史沈與求論份嘗受張邦昌偽命在圍城中買宗室女為妾份不自辨力求去上命執政召至都堂諭旨既而大理劾治買妾之人乃葉三省也與求上疏待罪詔釋之浙西江東制置使張俊收本路諸將王民魯珏劉琬戚方之軍合萬有一千人赴行在詔以方軍𨽻神武前軍餘軍分𨽻統制官李捧陳思恭張俊丁巳申命元祐黨人子孫經所在自陳盡還應得恩數時言者論陛下即位已來凡三因赦令欲復元祐臣僚及上書停廢人官職恩數日月不為不久然其間德望之偉如吕公著范純仁皆未盡追復生存如李積中尚未改正况其他乎蓋朝廷嘗令有司條具而不限以月日故至於遷延嘗令州郡照驗文書保明然其告敕未必皆存故至於沮格嘗令子孫詣公車自陳然其子孫或湮微貧乏故未能自列此其所以久而未復也臣愚以謂元祐之宰執侍從大率多賢其德行事業皆在人耳目其元任官職易以追考又其餘官若程頥鄭俠孔平仲司馬康江公望孫諤張庭堅龔夬朝補之黃庭堅吕希純歐陽棐張耒商倚畢仲勝王鞏李格非王回范正平李積中皆其姓名官職章章可見臣愚欲乞特降親筆應元祐宰執侍從前項程頥等並與盡復官職贈諡盡還致仕遺表恩例其間德行之不顯職業之無聞如葉祖洽輩量復官職可也自靖康初稍復元祐諸臣官職或録用其子孫然輕重不倫且未能遍及故議者數以為請時方多故亦未克舉行焉詔浙西制置使韓世忠浙西江東制置使張浚並罷以本路安撫大使劉光世言兵火凋敝之餘不任三處節制呼索故也戊午中書舍人季陵試尚書户部侍郎武功大夫新肇慶府兵馬鈐轄曽訥罷訥初以貢獻得官後忤梁師成為廣南轉運使鄭良所劾以多藏寶貨服用擬乘輿得旨令良究實良即以兵圍其家其弟誼坐拒捕誅死訥亦配海島靖康末復舊官及是上憐其無辜諭輔臣而有此授訥猶上書乞郡不已言者謂訥因請託得之上曰朕何嘗有此遂罷其命詔加封吳將甘寧為昭毅武寧靈顯王寧有祠在興國軍之富池以劉光世有請也己未詔明越州禁山東遊手之來販糴者時海密諸州米麥貴踴明州進士林秉德言積粟之家利其髙價皆傾廪以鬻之正恐因緣為姦以泄中國之機又且耗吾國計以資寇糧不可不慮乃命禁止焉初宣撫處置使司參議官京西制置使王以寧為桑仲所逼以所部走潭州以寧以本司便宜之命節制湖南軍馬更易全郡守臣科斂無度官吏有被誅者民甚苦之至是以寧言欲赴朝奏事而病未能行請以所部于嶽鄂潭州聽旨詔以寧還本司供職時以寧已提兵在長沙而朝廷未知也庚申武功大夫昌州團練使嶽飛為通泰鎮撫使兼知泰州用張浚薦也嶽侯傳云常州太守林茂薦侯於朝充通泰鎮撫使按史知常州周祀今年五月放罷已差下人章綜張鋭改除令徐天民疾速之任不知所云林茂為誰當考辛酉武翼郎樞密院準備差遣程寶特遷一官先是遣寶賫御封香間道往京西諸陵祭告踰年乃還故有是命壬戌臺諌有請以所論事行否劄下照會者范宗尹曰頃吕頥浩作相凡言官所論或朝廷已有措置或所聞不審劄下某人照會臣在臺時每與趙鼎論及此事以為朝廷但當容納可即行之不可則已不必相與較是非也按此時黎確為諌長沈與求為臺端而確乃宗尹所薦與求多與宗尹異論疑是與求建言當考大抵言者有建明若朝廷一一行之則天下不勝多事因舉李沆之説以奏上以為然乙丑詔前宰相責授建寧軍節度副使李邦彥責授單州團練副使李綱並復銀青光祿大夫責授崇信軍節度副使吳敏復通議大夫前執政光祿大夫知潼川府宇文粹中通奉大夫提舉西京嵩山崇福宫王孝迪中大夫提舉亳州明道宫王易簡顔岐許翰朝散大夫提舉江州太平觀路允迪並復端明殿學士責授單州别駕耿南仲復宣奉大夫責授昭化軍節度副使王安中責授寧逺軍節度副使王襄責授寧國軍節度副使蔡懋責授祕書少監分司南京馮澥並復中大夫前侍從朝奉大夫提舉杭州洞霄宫陸德先朝奉郎孫覿並復徽猷閣待制通奉大夫提舉江州太平觀葛勝仲復集英殿修撰責授成州團練副使盧襄復中奉大夫責授單州團練副使趙子嵩復朝請大夫前管軍責授海州團練副使英州安置王元責授秀州團練副使賀州安置左言皆許自便易簡潯陽人嘗為淵聖宫寮恩數視執政勝仲江隂人事上皇為大司成自綱粹中易簡岐翰覿子嵩外皆坐專守和議及朋附京黼邦昌苖劉次第逺貶至是范宗尹為政悉用赦而復之既而言者奏安中懋開邉襄不勤王翰趣戰子嵩棄城覿草降表皆不當敘乃詔更俟一赦取旨時邦彥南仲已死而朝廷未知也詔統制官李捧張宗顔各貶秩二等仍令捧趣往招捕楊勍初朝廷以勍叛命捧宗顔陳思恭三將討之比勍破松溪五月乙丑而捧始至浦城縣後三日宗顔亦至皆不出兵勍既去松溪五月戊辰二將乃離浦城六月辛未賊又掠建州六月丁丑捧宗顔乃趨南劔州與賊遇遂歸思恭不至南劔而還時賊猶未平三人皆言已行殺散侍御史沈與求奏殺散者未獲賊之異名今三將軍並出不能平數千之潰卒何以示敵故有是命丙寅權知三省樞密院事盧益奏隆祐皇太后已至信州乞權于本州歇泊始議以巡幸荆南道由信上故益請之三省言寧逺軍節度使孟忠厚內侍李圭于太后處妄有奏陳乃詔令分析丁卯户部請嵗終以諸路上供錢斛比較最多最少去處申乞賞罰庶使官吏有勤惰之戒從之武節郎閣門宣贊舍人知真州王冠為建康府路兵馬副鈐轄本府駐劄是日金主晟遣西京留守特進檢校太保尚書右僕射大同尹兼山西兵馬都部署上柱國髙慶裔金紫崇祿大夫尚書禮部侍郎知制誥護軍韓昉册命中奉大夫知東平府充京東西淮南安撫使節制河南諸州劉豫為皇帝國號大齊都大名府其册文略曰咨爾劉豫素懷濟世之才夙擅直言之譽百里雖智亦奚補于虞亡三仁至髙或願從于周仕當姦賊擾攘之際愚氓去就之間舉郡來王奮然獨斷宜即始歸之地以昭建業之元是用册爾為皇帝國號大齊都大名府世修子禮永貢虔誠付爾封疆並同楚舊昉有文學仕遼為知制誥金主因而用之凡大詔令多昉所草也熊克小歷云張匯言九月九日立豫而豫傳云五月戊申豫傳所記差詳今從之按金人册豫文首云天會八年七月辛丑朔二十七日丁卯蓋金以七月丁卯遣使而豫以九月戊申受册戊申九月九日也蓋豫傳誤作五月而克遂因之偽册文不足辱書姑摘其一二以補史闕張匯節要以慶裔階官為輔國大將軍册文乃右揆今從之偽齊録册文維天會八年嵗次庚戌七月辛丑朔二十七日丁卯皇帝若曰朕聞公於御物不以天位為已私職在牧民乃知王者為公器威罰既以殄罪位號宜乎授能昔有遼運屬顛危數窮否塞獲罪上帝流毒下民太祖武元皇帝仗黃鉞而拯黔黎舉白旗而整師旅妖氛既掃區宇式寧爰有宋人來從海道願輸嵗幣祈復漢疆太祖方務善鄰即從來請豈期天方肇亂自啓釁階已下二百一十五字指斥不録建楚新封守宋舊服庶能為國當期息民不料豎儒難承重任妄為退讓反陷誅鋤已下八十八字指斥不録重念斯民亂于無主久罹塗炭未獲昭蘇不委仁賢孰能保庇咨爾中奉大夫京東西等路安撫使兼諸路馬步軍都總管知東平府節制大名開德等府濮慱濱棣德滄等州劉豫夙擅直言之譽素懷濟世之才居于亂邦生不遇世百里雖智亦奚補于虞亡三仁至髙或願從于周仕當姦賊擾攘之際愚氓去就之問舉郡來王奮然獨斷逮乎歷試厥勳克成委之安撫德化行任之尹牧獄訟理付之總戎盜賊息専之節制郡國清况有定衰救亂之謀持變扶危之䇿使民無事則橐弓力穡有役則釋耒荷戈罷無名之征廢不急之務徴隱逸舉孝亷振紀綱修制度省刑罰而去煩酷發倉廪而息蟲螟神人以和上下協應比下明詔詢考輿情列郡同辭一心仰戴宜即始歸之地以昭建業之元是用遣使留守西京特進檢校太尉尚書右僕射大同尹兼山西兵馬都部署上柱國廣陵郡開國公食邑二千户實封二百户髙慶裔副使金紫光祿大夫尚書禮部侍郎知制誥護軍南陽縣開國侯食邑一千户實封二百户韓昉備禮以璽紱寶册命爾為皇帝國號大齊都于大名府世修子禮永貢虔誠付爾封疆並從楚舊更須安集自定攸居爾其上體天心下從人欲忠藩王室信以保邦惟天難諶惟命靡常常厥德保厥位爾其勉哉勿忽朕命戊辰宣撫處置使司都統制曲端遣其子之傅進士田震來奏事上召對以震為將仕郎震命官在八月庚寅己巳詔神武前軍統制王􅊛以所部屯信州先是右正言吳表臣言饒信衢婺等州未經殘破正當敵騎來路此數州南連福建東接溫台緩急不可不慮故命􅊛以本軍守之􅊛請合措置事許一靣便宜施行詔軍期不可待報許行訖以聞不得因而騷擾生事􅊛便宜之命在此月壬午中大夫知平江府湯東野為江南路都轉運使先是東野乞間慢差遣神武右軍都統制張浚數稱其才上謂浚曰東野若欲來行在則不可當令換一外郡又謂范宗尹曰趙鼎嘗言東野與李逮康允之皆有才但當外任煩劇不可處獻納之地宗尹曰議者謂允之優于東野張守曰二人皆能辦事但東野刻剝允之不擾上曰既能辦事無不擾之理然卒有是命既而言者奏其在平江刻剝及棄城之罪乃貶東野二秩上語在是月乙丑東野貶秩在十月甲戌右文殿修撰胡松年起復知平江府松年朐山人也朝散大夫吳懋知明州禮部尚書謝克家奏故翰林學士范祖禹當元祐中終始實在經筵所著唐鑑已進御又有仁宗訓典及帝學二書深裨治道今其子前宗正少卿沖見寓衢州乞給劄令沖投進從之崔增圍太平州不克庚午引去是月朝請大夫洪擬為起居郎兼權中書舍人擬光祖父也光祖已見三年三月癸卯宣和中嘗為侍御史為王黼所逐至是復用之熊克小歷今年十一月載擬諌移蹕事猶以擬為起居郎而後省題名以為此月除中書舍人日歷擬除舍人在八月甲午三書皆不同按紹興元年三月己酉給事中陳戩奏狀有云建炎四年起居郎洪擬兼權中書舍人止立起居郎班則是擬以左史兼西掖也題名脫漏據葉三省今年六月自起居郎罷去而劉棐九月除起居郎當是擬以七月除左史八月遂遷西掖耳今且附月末俟考詔迪功郎王銍權樞密院編修官纂集祖宗兵制其後書成上覽之稱善命銍改京官賜名樞庭備檢銍衣兄子也此事史不書以王明清揮麈録修入樞密院官屬題名銍以今年七月權密編不見罷時今且附此月末初程千秋既入蜀其後軍將王闢復叛去至是陷興山縣遂破歸州闢不知地利帥臣直龍圖閣張上行檄本路兵馬鈐轄中亮大夫貴州防禦使田祐恭率義兵以木弩射之闢敗去祐恭思州人也此據趙甡之遺史及今年十月夔路安撫司所奏修入劉長源奏議云富平之役王闢潰兵直破峽州與史不同恐誤張用據漢陽軍初用在淮西其軍乏食遂至信陽軍復往德安府用屯中軍于三龍河曺成屯于應城縣諸軍散居連接至郢州不絶至是用所部魚磨山寨軍亂將佐王林孟振等殺其統領官馬某林相州人嘗為敵所擒盛以布囊置船舷上以刀斫其頸棄黃河中復得活謂之王八刀用聞之疑諸軍圖已遂棄其軍去願從者一二千人至漢陽會沿江措置司右軍統制馬友屯漢陽境上宣教郎知軍事范寅亮懼倉庫不能給乃以印授用用遂為知軍鄂州路安撫沿江措置副使李允文聞之遣其將張定國往招用遂濟其師允文怒曰何不且撫定而遂濟度乎定國懼以其兵叛自漢陽界掠強壯而去允文遣水軍將張崇追之不及允文乃以宣撫處置司便宜之命徙寅亮為沿江措置司提領官而以友知漢陽軍用為鄂州路副總管寅亮致虛從子也用往信陽在五月今從趙甡之遺史聨書之遺史云漢陽知軍范某而無其名又不書馬友知漢陽事此以今年十二月馮康國奏允文狀增入建炎以來繫年要録卷三十五建炎以來繫年要録卷三十五金人地名考證烏登原書作烏東誤今改正錫庫原書作習古誤今改正貝勒赫伯原書作孛堇曷八誤今改正慶格原書作慶哥誤今改正
