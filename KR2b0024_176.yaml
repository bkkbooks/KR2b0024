body:
  text: 建炎以來繫年要録卷一百七十六宋李心傳撰紹興二十七年歲次丁丑隆金海陵煬王亮正二年春正月按是月戊辰朔丙子尚書駕部員外郎楊偰試祕書少監右中奉大夫王晌卒晌自太平州罷歸會提舉江東常平茶鹽公事吕忱中發其在宣城盜常平米買銀事置獄廣德軍所按無狀移徽州晌行至梅家店而卒丁丑右武大夫和州防禦使幹辦皇城司劉伉知閣門事初大理少卿楊揆建請秦檜當國日無辜被罪者不以年限自陳並與改正事既行去年十月庚午御史中丞湯鵬舉奏揆邀譽侵官抵牾祖宗之成法乞寢前奏戊寅從之戊子詔侍從各舉宗室京朝官材識行治者二人特與召對用權刑部侍郎張礿請也右通直郎監登聞檢鼓院王述以食貧乞補外上曰王倫頃年奉使金國金欲留之許以官爵倫不從乃冠帶南嚮再拜訖就死此事亦人所難宜恤其後可特添差通判平江府己丑召徽猷閣待制致仕鄭望之赴行在望之以衰老疾力辭上謂大臣曰望之不獨君臣乃是故人於是升徽猷閣直學士復致仕望之復致仕在三月辛巳時望之年八十矣庚寅忠訓郎嶽建夀為閣門祇候建夀超子武舉及第已見三佛齊國進奉使蒲晉等辭行辛卯潼川府路轉運判官王之望言臣於去月兩具劄子奏聞乞特詔蜀中二大將量減軍中冗食浮費切計已徹宸聰臣聞應天以實不以文動人以行不以言陛下若俯從臣請願先撥四川上供歲額之半以為之倡此錢宣撫處置司已嘗截留應副贍軍邉事既息始發赴行在今復捐以裕民真盛德事蓋不如是不足以示陛下應天動人至誠惻怛之意若今指揮與詔書相繼而下則彼知丁寧之訓非空言文具必將心恱誠服其敢不祇若休命臣不量疏逺薦以瞽言上冒天威罪當萬死惟陛下赦其愚忠先是上以蜀民久困供億詔制置使蕭振總領財賦湯允恭都大主管茶馬公事李澗成都府路轉運判官許尹與之望同措置務令實惠及民可以經久故之望有是言輔臣進呈上曰此須見得四川每年出入之數常賦幾何橫斂幾何軍儲所需與無名之費多少朕不惜減以裕民第諸司未有定議今遽如此萬一闕乏何以善後之望有愛民之心但臨事不審率爾有請知樞密院事湯思退請趣振等條上上可之時起居郎趙逵亦奏四川在萬里外其取民之塗有二如激賞絹之類官以民所當納者揭之通衢上下共知此明白告示而取之也如激賞錢之類總領以若干數下之州縣必陽戒之曰無損歲計無傷民力若然則須官吏自備而後可官吏不能自備其勢不得不增有額之賦私應無名之索此隂取而不告者也臣願詔振等凡總司錢物必分為二曰此上下通知者其不通知當根其所自出而放之然後吏不能沮而惠遍逺方矣壬辰直敷文閣張宗元為尚書駕部貟外郎初朝廷歲於江浙湖南福建諸州市軍器物料而州縣以無本錢率於人户物力錢上敷納民甚苦之上聞之甲午詔皆以縣官錢償其直江東路用一分軍期錢江西路用移用錢福建路用增稅錢浙東路用應管錢浙西湖北路並用係省錢湖南路用運司錢泛拋物料乾道三年九月辛巳所書可參考乙未詔兩省臺諌侍從有服親省試合格者令禮部具名以聞自是遂為故事二月丁酉朔詔自今國學及科舉取士並令兼習經義詩賦內第一場大小經各一道永為定制上以經學寖微故有是旨庚子右承直郎知分宜縣咼輔特遷右通直郎以吉州守二應詔言其政績也太尉武當軍節度使御前諸軍都統制充利州東路安撫使兼知興元府楊政薨年六十政守漢中凡十八年訃聞特贈開府儀同三司賻銀帛千匹兩封其妻永寧郡夫人南氏為崇國夫人後諡襄毅辛丑將作監丞楊倓守尚書都官員外郎壬寅廢江隂軍為縣𨽻常州先是直祕閣知臨安府主管浙西安撫司公事榮薿言自建縣為軍於朝廷初無所補而以一縣之財供一州之費遂使繇役科率倍於他州兼常州失此一縣之賦兩皆受弊故有是命仍詔存屯兵三百八十餘人以知縣兼軍使直徽猷閣江南東路提點刑獄公事天民按天民上疑脫姓劾信州守臣周葵不恤郡政時葵巳為御史論罷去年十二月乙卯上謂宰執曰大抵先歷知縣諳政事然後付之一郡必優為之朕頃在河北見汪伯彥治郡全不費力以其經歷多事皆通曉向來俞俟知紹興亦然今周葵止因昨在言路好論事遂得虛名魏良臣力薦之及治郡乃不職與宫觀宜矣沈該等曰汪伯彥河朔事至此蓋三十餘年上記人之善久而不忘如此癸卯直徽猷閣提舉台州崇道觀張深卒甲辰詔試中武學生依監學例給綾紙丁未上謂大臣曰王會守平江日有錢三十萬緡以羡餘為名未曽起發聞近已侵耗大半今既罷羡餘未知復何所用若巧取於民當便將窠名盡行除去恐取之不已百姓難堪宜速理會權尚書禮部侍郎辛次膺試給事中自巫伋遷後給事中不除者七年至是始命次膺右朝散大夫張子華除名勒停送萬安軍編管仍籍沒家財子華嘗提舉廣南市舶言者奏其贓汙不法遣大理寺丞莫濛即廣州鞫之法當絞故有是命濛又言秦檜秦熺鄭時中丁祀受子華所賂計直皆數千緡詔並免追究禮部貢院奏應博學宏詞科左迪功郎周必大合格詔堂除建康府府學教授必大管城人寓居廬陵普安郡王見其所試以為有掌誥才大善之己酉直龍圖閣淮南轉運副使蔣璨權尚書禮部侍郎未及拜為言者所論後八日改集英殿修撰知平江府左朝請郎知嚴州金安節提點兩浙西路刑獄公事庚戌宗正少卿李琳權尚書吏部侍郎祕書少監楊偰為宗正少卿辛亥樞密院檢詳諸房文字劉章試祕書少監壬子宰臣沈該等言太廟仁宗英宗兩室前柱生芝草欲率百官拜表稱賀許之少師保寧軍節度使新判紹興府信安郡王孟忠厚充萬夀觀使提舉祕書省忠厚過闕入見遂以命之後七日詔忠厚月過局如宰執例熊克小歷誤載忠厚初除在己未今不取癸丑給事中辛次膺罷為敷文閣待制提舉江州太平興國宫以御史中丞湯鵬舉論次膺曩歷臺諌無彈擊之譽故也戊午御史中丞兼侍讀湯鵬舉參知政事鵬舉為臺官凡一年有半所論皆秦檜餘黨他未嘗及之宗正寺主簿祝閔罷右宣教郎通判臨安府吳伸責監郴州酒稅先是湯鵬舉論閔曩令海鹽以權臣嘗遊學是邑乃創一堂名曰將覺因而乾沒官錢入已伸初實無官因權臣與其父有鄉黨之親委曲為地遂玷仕籍故有是命己未敷文閣待制知荆南府王師心試尚書户部侍郎師心嘗言鄂渚戍兵市馬北境宜禁止以窒邉釁上然之殿中侍御史周方崇守侍御史監察御史王圭守殿中侍御史右正言凌哲為右司諌祕書省正字葉謙亨胡沂張孝祥並為校書郎庚申尚書吏部侍郎陳康伯兼侍讀權禮部侍郎賀允中兼侍講初福建提點刑獄公事吳逵奉詔核實鹽事謂紹興元年漕司第辦歲計未認鈔錢不可為凖蓋慮有不足必别致擾民宜約州縣歲費總數除二稅所入外有闕即分鹽綱補之凡上四郡及屬縣歲般千有六百萬斤視舊直十損其三毋得敷於民户舊漕司取於州縣號增鹽錢及提舉司取吏祿錢皆損三分之一增鹽錢斤二十八文今損其九吏祿錢斤一文今損三分又帥漕二司毋得鬻鹽以侵州縣時逵已移鼎州詔從之自是閩之上四郡民力稍寬矣癸亥武泰軍節度使知潭州劉錡為太尉知荆南府初江陵縣之東有黃潭者建炎間邑官決水入江以禦盜由是夏秋漲溢荆復間皆被水患至是錡究知其弊始命塞之廣田數千畝流民自占者幾千家議者以為便此據明年八月壬辰都民望奏修入當在此年因附錡除帥之後甲子上謂輔臣曰蜀中舉人前此有赴廷試不及者皆賜同進士出身恐其間有俊秀能取髙第之人例皆置之下列甚可惜也今次若來者尚少當展日以待之左朝奉郎知瀘州李文會復龍圗閣學士知潭州是月金國主亮坐武德殿召吏部尚書李通刑部尚書胡勵翰林直學士蕭亷語以朕夜夢至上帝所殿中人語如嬰兒少頃有青衣持宣授朕天䇿上將令征某國朕受命出而上馬見鬼兵無數朕發一矢射之衆皆喏而應既覺聲猶在耳即遣人至廄中視所乘馬其汗如水取箭數之亦亡其一此異夢也豈非天假手於朕令取江南乎通等皆賀亮戒無泄於外廉慶弟也亶特賜及第此以張棣正隆事迹及宋翌金亮本末參修但翌繫之明年五月而棣所記事與金他書多參同故從棣事迹附今年二月蕭廉事迹以范成大攬轡録修入三月按是月丙寅朔丁卯侍御史周方崇言敷文閣待制知福州李如岡本曹泳黨與媚事權臣所至不治詔如岡提舉台州崇道觀仍奪職己巳侍御史周方崇請京局改官並先注知縣上以問宰執沈該曰選人改官後實歷親民實為良法上曰徽宗嘗言仁宗朝每除執政大臣必先問曽歷親民否蓋親民則能通世務置之廊廟天下利病知過半矣此朕昔年恭侍親聞玉音誠可為萬世法也遂從之左朝奉郎陳之淵提舉福建路市舶右奉議郎直顯謨閣韓彥朴降官職各一等仍勒停坐毆部曲至死也壬申上謂宰執曰去冬皇太后微有腰腿之疾不曽出殿門昨入侍慈寧因言近日清明牡丹已開皇太后欣然步至花所朕喜甚因留賞牡丹皇后以下皆醉至晚回殿上猶喜見天顔張綱曰陛下孝德所感誠可慶也權刑部侍郎張礿言今四川州縣以錢計贓者並以引抵貫泉貨之用銅鐵相凖如此是四川之法偏重乞自今有犯並依市價紐計錢數從之丙子宰執進呈從官所舉人材試尚書吏部侍郎陳康伯奏左朝奉大夫趙不溢可備郡守四月壬寅除軍器少監右宣教郎趙師嚴學術文章可期逺大三十二年三月庚戌自六院除湖州通判權禮部侍郎兼侍講賀允中奏左朝奉大夫知吉州曽幾多識典故宜在夲朝四月甲辰辭召命除直祕閣左朝散郎通判荆南府范如圭操修無玷久處外官未厭輿論九月乙丑除江西提舉平茶鹽常左承議郎新主管南外敦宗院葉顒端方靖退可備選掄七月丁卯除將作主簿右宣教郎知天台縣韓元龍長於治縣二十九年二月庚子除司農寺主簿權刑部侍郎張礿奏右通直郎知巴陵縣劉廓剛正詳明未見除目當是礿得罪遂不至右宣教郎主管官告院鮑黌博學有文優於吏事四月癸卯召對不稱旨左宣教郎蒲瑮端方有守學問該通四月壬子用御史王圭言罷召命户部侍郎王俁奉左朝請大夫提點兩浙東路刑獄公事宋棐忠厚詳明四月丁酉除直祕閣知揚州右承議郎鄞縣丞向子偉孝友公方長於治劇三十八年二月壬子除軍器監主簿左朝散郎監潭州南嶽廟任古邃於經術明練端方十一月甲申除監察御史詔並赴行在顒永福人元龍宗道孫宗道綜子仕至户部侍郎黌朐山人瑮眉山人古定陶人也三月庚寅楊椿薦四月甲寅李琳薦六月辛亥王師心薦通兩史官所舉凡二十六人惟張礿所薦三人不用詔兩省官依侍從薦所知三月丁酉左史薦辛巳右史薦左朝奉郎馮時行知蓬州時行以不附和議為秦檜所惡坐廢者十八年至是復起既而殿中侍御史王圭論其萬州招軍事又罷之時行至官才五日也戊寅左宣議郎趙雍主管官告院己卯監察御史樊光逺為尚書工部員外郎從義郎趙不德乞以登第所遷二官回授其母曹氏詔特封咸寧郡夫人不德沂王仲損孫也父士圃時為右監門衛大將軍庚辰直祕閣新知鼎州吳逵卒壬午詔江西提刑司依舊還贛州節制贛吉官兵措置汀漳盜賊癸未左朝奉郎新江南西路轉運判官趙公稱知贛州甲申敷文閣學士提舉江州太平興國宫周三畏卒捧日天武四廂都指揮使房州觀察江南西路兵馬鈐轄馬立卒丙戌上御射殿引正奏名進士唱名先是湯鵬舉以御史中丞知貢舉上合格進士博羅張宋卿等上親䇿試既而御筆宣示考試官曰對䇿中有鯁亮切直者並置上列以稱朕取士之意時樂清王十朋首以法天攬權為對其略曰豈今日朝廷猶有僣賞濫罰如春秋時乎豈國家用度之際有所未節奢侈之風有所未革乎又曰臣勸陛下攬權者非欲陛下衡石量書如秦皇帝而謂之攬權也又非欲陛下傳飱聽政如隋文帝而謂之攬權也又非欲其以強明自任親治細事不任宰相如唐德宗而謂之攬權也又非欲其精於吏事以察為明無復仁恩如唐宣宗而謂之攬權也蓋欲陛下懲其所既往戒其所未然操持把握使威福之柄一出於上不至於下移而已又曰朝廷往嘗屢有禁鋪翠之令矣而婦人以翠羽為首飾者今猶自若也是豈法令之不可禁乎豈宫中服浣濯之化衣不曵地之風未形于外乎夫法之至公者莫如取士名器之至重者莫如科第往歲權臣子孫門客省聞殿試類皆竊巍科而有司以國家名器為媚權臣之具而欲得人可乎又曰臣願陛下以正身為攬權之本而又任賢以為攬權之助廣收兼聽以盡攬權之美權在陛下之手則所求無不得所欲皆如意雖社稷之大計天下之大事皆可以不動聲色而為之矣晉原閻安中䇿言太子天下本自昔人君嗣政之後必建立元子授之七鬯所以繫隆社稷基固邦本示奕世無窮之休臣觀漢唐史東海王疆之於顯宗宋王憲之於明皇帝既皆為太子矣暨天命定於後莫不優加職秩大封殊禮退就宫邸當時無間言後世無異議孝成帝即位二十五年立弟之子定陶王為子今陛下之心祖宗之心也聖慮經逺神幾先物嘗修祖宗故事纍年於兹矣日就月將緝熙光明之學其歷試周知不為不久也而儲位未正嫡長未辨臣愚深恐左右近習之臣寖生窺伺漸起黨與間隙一開有誤宗社大計此進退安危之機也臣願陛下斷自宸衷蚤正儲位以係中外之望詳定官定十朋為第九編排官孫道夫奏其辭語鯁切上覽之前三日謂大臣曰今次舉人程文議論純正仍多切直似此人才極有可用翌日又謂大臣曰昨覽進士試卷其間極有切直者如論理財則欲省修造朕雖無崇臺榭之事然喜其言直至論銷金鋪翠朕纍年禁止尚未盡革自此當立法必禁之去年交趾獻翠毛五百尾朕未嘗用當焚於通衢湯思退進曰陛下旌直言以冠多士焚翠羽以革侈靡皆盛德事昔公孫𢎞射䇿太常奏𢎞第居下武帝親擢為第一今此九名試卷若不經御覽安得獨先多士上曰其中亦有不實處但取其直耳思退曰太宗時有雍邱尉武程上疏願減後宫嬪嬙太宗謂宰相曰程踈逺未悉朕意縱欲敗度朕所不為內廷執掌有不可去者李昉欲黜程以戒妄言太宗曰朕曷嘗以言罪人但念程不知耳士人論事不究虛實陛下能容之實千載之遇上曰正不消與辨陳誠之曰天下自有公論陛下此舉大足以感動天下願陛下自此益崇儉約以節浮費上曰卿等在朕左右見朕曷嘗一日不以此為念誠之曰願加不息之誠則天下幸甚時上臨御久主器未定大臣無敢啓其端者安中對䇿獨以儲二為請上感其言擢安中第二遂賜十朋等四百二十六人及第出身或曰安中與舉人黃成孫同縣相友善成孫父源嘗為書言儲二事安中得其説以對上大賞之始蜀人之未集也上數有展日之命沈該奏天時向暄恐陛下臨軒不無少勞乞一面引試後有至者臣等䇿之中書定其髙下上不許曰三年取士朕豈憚一日之勞耶及唱名至安中又至第三人雙流梁介上連舉首謂該曰如何該大慚悚上親䇿在癸酉諭大臣在癸未甲申今牽聯書之丁亥特奏名進士李三英等三百九十二人武舉進士趙應熊等十五人特奏名一人授官有差應熊武藝絶倫且試南省為第一人上謂大臣曰徽宗時如馬擴馬識遠俱以武舉擢用或銜命出疆今次魁選文武皆得人應熊弓馬甚精文字亦可采朕樂於得士雖終日臨軒不覺倦也遂以應熊為閣門祇候江東安撫司凖備將三英福州人也詔自今宫人以銷金鋪翠為服飾者令會通門譏察犯人追賞錢千緡經手轉入皇院子等並從徒二年科罪用王十朋之言也己丑詔減三川對糴米十六萬九千餘石夔路激賞絹五萬匹兩川絹估錢二十八萬緡有竒用蕭振湯允恭李澗許尹王之望請也內對糴正色米四萬六千餘石舊應副御前軍之在綿渠州潼川府者至是令漕司糴買而總領所以其直償之舊潼川路畸零折帛每匹為錢九千成都路為九千有半今皆減一千振澗又減韓球所增茶額四百六十二萬餘斤罷𣙜渠合廣安軍茶減成都府利州路茶引錢每引三千凡茶司引息虛額歲減錢九十五萬餘緡上覽奏謂宰執曰前日下有司詳其事正欲知向後兵食無闕使民被實惠若無以善後恐又别有改更非所以裕民初講利害想四川之民日望蠲免今此足以慰其心矣庚寅權兵部侍郎兼國子祭酒楊椿奉詔舉左承議郎馬騏才學醇明見識髙逺二十九年正月丁巳除軍器監主簿左朝散郎簽書雅州判官廳公事文之竒學業老成恬於進取二十九年二月戊子除通判階州右宣義郎前知涪城縣趙不倚性資孝友吏事可觀詔並赴行在內騏之竒仍俟秩滿騏廣都人之竒眉山人也辛卯詔從官所薦新改官人並與堂除知縣俟任滿日取旨升擢右奉直大夫荆湖北路提點刑獄公事趙子遊直祕閣初命從官各舉宗室二人户部侍郎王俁薦子遊忠厚儒雅左朝奉郎知蕪湖縣趙不吝公廉靖退既召還而本路闕官除職還任子遊令㢜子也二人被召在甲申今併書之是日左宣奉大夫守尚書右僕射同中書門下平章事万俟卨薨壬辰拜特進觀文殿大學士致仕贈少師命入內內侍省都知衛茂實護喪拜其子右承奉郎夷中右迪功郎致中並直祕閣他子姪九人各進一官後諡忠靖左朝散大夫符行中再責成州團練副使南雄州安置右朝散大夫鄭靄令吏部與逺小監當差遣以殿中侍御史王圭論二人在蜀中專恣暴橫多以庫金互送也右承議郎黃敏行免決刺配貴州牢城敏行嘗守江隂常和三郡盜庫金入已法當死特貸之夏四月丙申朔手詔除民間買賣耕牛之稅清逺軍承宣使知金州節制屯駐御前軍馬姚仲為龍神衛四廂都指揮使御前諸軍都統制利州東路安撫使兼知興元府保寧軍承宣使御前前部統制知階州王彥為金房開逹州安撫使節制屯駐御前軍馬兼知金州丁酉侍御史周方崇乞裁定選人充勑局刪定官賞典序位吏部請位太學博士下在任滿一年進士出身通及四考餘人五考許磨勘該進書者比類循資從之左朝請大夫兩浙東路提點刑獄公事宋棐直祕閣知揚州用王俁薦也左文林郎逹州州學教授劉望之行國子正望之成都人宰臣沈該薦其才乃有是命起居郎趙逵奉詔舉左迪功郎李石學識髙明志節髙果二十八年正月乙酉除太學録左迪功郎劉儀鳳富有詞華恬于進取二十八年四月甲寅除諸王宫教授左從政郎郟次雲稟資端良五月己卯除國子録左文林郎馮方才識兼茂二十八年正月乙酉除國子正石磐石人儀鳳樂至人方安嶽人也辛丑尚書工部侍郎兼權直學士院劉才邵以老疾求去罷為顯謨閣直學士提舉江州太平興國宫起居舍人周麟之奉詔舉左朝散郎新通判邵武軍鄭知剛老成端練七月丁卯除宗正寺主簿左從政郎李薦學術純明蒞官不茍六月戊申除太學正左迪功郎惠迪才識過人所養深厚五月庚辰召見二十二年三月丙辰除大理司直知剛侯官人也壬寅左朝奉大夫主管台州崇道觀趙不溢為軍器少監用陳康伯薦也甲辰端明殿學士左朝奉郎知湖州汪勃特遷左朝奉大夫勃乞奉祠乃有是命御史臺檢法官褚籍主簿李庚並為監察御史籍庚皆湯鵬舉所薦也左朝奉大夫知台州曽幾直祕閣幾始用賀允中薦召赴行在至則以老疾乞辭遂有是命庚戌宰執進呈趙逵所薦士上曰三吳才行之士往往知其姓名惟蜀人道逺其間文學行義有可用者不由論薦無由得知前此數年蜀中仕官者例多隔絶不得一至朝廷甚可惜也自秦檜專權深抑蜀士故上語及之沈該曰近日蜀中士大夫多被薦舉已得旨隨材召用上曰甚善辛亥少師保寧軍節度使萬夀觀使提舉祕書省信安郡王孟忠厚薨贈太保擢其子右朝請郎充右宣義郎嵩右承事郎雍皆直祕閣他子孫六人皆進一官封其妾趙氏為恭人符氏為安人命睿思殿掌簿書梁紹祖主葬事詔以提舉祕書省印納禮部自是不復除壬子權尚書刑部侍郎張礿降一官放罷先是礿奉詔薦主管官告院鮑黌召對而人才凡下上諭大臣曰朕不能盡識天下多士故令侍從臺諌各舉所知若不精審非朕求才之意乃罷之殿中侍御史王圭即奏黌出於效用諛佞權臣請求得官又奏礿所舉蒲􅛁素無行檢故有是命後二日知樞密院事湯思退奏礿薦人不當昨罷之甚合公論上曰朕居深宫中何由盡識天下人才侍從既不足信朕何所取信初見黌上殿已覺不如所舉况又臺諌論列較其罪自合逺竄只降一官罷已是寬典左宣教郎新婺州州學教授任盡言為太常寺主簿盡言伯雨孫上召對而有是命甲寅祕書省校書郎王剛中兼普安恩平郡王府教授權尚書吏部侍郎李琳薦右朝請大夫施垓端慤公廉左文林郎沈厦文行兼美厦五月丁丑召對垓六月丁未除廣東提舉厦歸安人也時上命從官後除者皆得續薦士故琳以二人應詔虗恨都王歷階告老乞傳其子蒲底詔以蒲底為承信郎丁巳左中大夫知福州沈調充祕閣修撰調自揚州改除過闕入見遂有是命調改除在三月丙子己未玉牒所進呈太祖太宗魏悼王三祖下仙源類譜用黃麾細仗教坊樂僧道威儀前導上御垂拱殿觀書宰執皆升殿侍立於是本所官吏及中使進秩者二百一十人本所官推恩在六月甲午辛酉尚書吏部侍郎兼侍讀陳康伯遷吏部尚書壬戌尚書户部侍郎王俁權工部尚書太府少卿林覺權户部侍郎侍御史周方崇奏俁在户部所為乖方及徙他曹怏怏不樂後八日罷俁為敷文閣待制提舉江州太平興國宫覺麗水人也是月加封徐偃王曰靈惠仁慈王廟在衢州建炎以來繫年要録卷一百七十六
