body:
  text: 建炎以來繫年要録巻一百二十四宋李心傳撰紹興八年十有二月按是月癸丑朔甲寅檢校少傅奉國軍節度使知紹興府趙鼎充醴泉觀使免奉朝請從所請也中衛大夫貴州防禦使京東淮東宣撫處置使司右軍統制杜琳降横行遥郡二官琳擅遣士卒過淮採薪爲敵人掩執以去韓世忠劾之故有是命乙卯左朝奉大夫主管洪州玉隆觀馮檝守宗正少卿假徽猷閣待制爲國信計議副使檝既罷歸行至鎮江復召檝入對奏疏曰臣嘗謂天下之事有經有權顧所遇如何耳遇經事而可以守常則何以權爲遭變事而蘄於有濟烏可捨權而不用焉國家自靖康以來敵人南侵二聖北狩族屬臣民随寓沙漠宗廟陵寢遥居僞境繼而太上皇帝訃至梓宫未還豈獨陛下羮墻之念造次不忘凡百臣子孰不痛憤昨縁朝廷遣使請上皇梓宫使還道敵人講和之言從而應之徃返通好竊聞比有許還地歸梓宫之報然索禮太髙朝廷未有所處使人躊躇境上而稽於過界道途之議皆云士大夫有不可屈之言諸大將有君辱則臣辱之説咸欲奉兵以示威臣恐此聲若出萬一有妨和議則機㑹何時可復得耶使金人無還地歸梓宫之意固不敢自屈以奉彼如或有之是陛下之屈廼爲父母兄弟宗廟陵寝祖宗境土族屬臣民而屈耳爲父母兄弟宗廟陵寝是屈而行孝弟也爲祖宗境土族屬臣民是屈而施仁慈也陛下少降其禮而能返父母兄弟族屬臣民於舊都還祖宗境土於版籍復宗廟陵寝於邦内一舉而兼備孝弟仁慈之四徳自古帝王之用心何以加於此乎然所謂屈者豈真我辱哉循斯湏之權耳廼伸之階也㑹稽之役勾踐屈於呉王卒能破呉鴻門之㑹髙祖屈於項羽卒能興漢然則兹屈也非所以為伸歟假如諸大将不許陛下降禮以就之自非同心恊謀一戎衣可以空敵庭然後上皇梓宫可還太母淵聖鑾輿可復族屬臣民可返宗廟陵寝可安臣恐敵廷未易遽空也借能空之兩國又須交兵殘害億萬生靈之性命而後底定豈若不血一刃而遂如所欲乎臣願陛下毋惑士大夫之言毋徇諸将之議斷自淵衷度利多害少則行之儻陛下俄頃少降萬乗之尊果得金人革心歸上皇之梓宫還太母淵聖之鑾駕返我族屬臣民復我故疆境土則是陛下於十有餘年渺茫懐想之中一日之間母子兄弟復得相見宗廟陵寝復得奉祀族屬臣民復得綏睦臣謂累世南面之樂未有如陛下今日之樂也臣所以不避忌諱而妄爲陛下陳之雖然自古和不能獨成有威然後能成其和和而有威其和乃固如専任和而廢威使彼以信來夫復何疑其或繼之以詐将何以待之哉臣願陛下諭使人篤於講和勅將帥嚴於修備責效於使人歸功於将帥降禮以成和議嚴備以固和好如是則有萬全之功無不測之患矣上覧疏即日除檝故官與王倫偕見使人議事丙辰詔曰朕以眇躬撫兹艱運越自初載痛二帝之䝉塵故兹累年每卑辭而遣使不難屈已徒以爲親雖悉意於經營終未得其要領昨者驚傳諱問恭請梓宫彼方以講好而來此固當度宜而應朕念陵寝在逺梓宫未還傷宗族之流離哀軍民之重困深惟所處務適厥中既朝慮而夕思又廣詢而博訪言或同異正在兼收事有從來固非創議樞宻院編修官胡銓職在樞機之屬分乖廉陛之儀遽上封章肆為兇悖初投匭而未出已謄藁而四傳導倡陵犯之風隂懐刼持之計儻誠心於體國但合輸忠惟専意於取名故兹眩衆閔其淺慮告爾多方勿惑胥動之浮言庻圖可久之大計時秦檜恐言者不已故白上下此詔以戒諭之檢校少傅慶逺軍節度使郭仲荀提舉醴泉觀仲荀既入見遂有是命尚書户部員外郎錢觀復罷殿中侍御史鄭剛中言觀復性資隂狠䑓章頃數論其短執政庇而留之劉大中䘮子觀復随其柩宿於城外亷耻不立故絀之丁巳太府少卿耿自求直顯謨閣知常州軍器監丞李若虗守尚書户部員外郎直徽猷閣提舉華州雲臺觀汪召嗣知撫州戊午秦檜奏大金使名未正乞令人與計議改江南為宋詔諭爲國信如不受封册不遣泛使皆當先事言之上曰朕受祖宗二百年基業爲臣民推戴已踰十年豈肯受其封册兼畫疆之後兩國各自守境每事不相關渉惟正旦生辰遣使之外非時不許徃來朕計已定觀文殿大學士提舉臨安府洞霄宫李綱言臣竊見朝廷遣王倫使金國奉迎梓宫徃返屢矣今倫之歸與金使偕乃以江南詔諭為名不著國號而曰江南不云通問而曰詔諭此何禮也臣請試爲陛下言之金人毁宗社逼二聖而陛下應天順人光復舊業自我視彼則仇讎也自彼視我則腹心之疾也豈復有可和之理然而朝廷遣使通問冠盖相望於道卑辭厚幣無所愛惜者正以二聖在其域中爲親屈己不得已而然猶有説也至去年春兩宫㐫問既至遣使以迎梓宫亟徃遄返初不得其要約今倫使事初以奉迎梓宫爲指而金使之來乃以江南詔諭爲名責實己自乖戾則其所以罔朝廷而生後患者不待語而可知臣在逺方雖不足以知其曲折然以愚意料之敵爲此名以遣使其邀求大略有五必降詔書欲陛下屈體降禮以聽受一也必有赦文欲朝廷宣布班示郡縣二也必有約束欲陛下奉藩稱臣禀其號令三也必求嵗賂廣其數目使我坐困四也必求割地以江南爲界淮南荆襄四川盡欲得之五也此五者朝廷從其一則大事去矣金人變詐不測貪婪無厭縱使聽其詔令奉藩稱臣其志猶未巳也必繼有號召或使親迎梓宫或使單車入覲或使移易将相或使改革政事或竭取賦税或朘削土宇從之則無有紀極一不從則前功盡廢反爲兵端以謂權時之宜聽其邀求可以無後悔者非愚則誣也使國家之勢單弱果不足以自振不得已而爲此亦無可奈何今土宇之廣猶半天下臣民之心戴宋不忘與有識者謀之尚足以有爲豈可忘祖宗之大業生靈之屬望弗慮弗圖遽自屈服祈哀乞憐冀延旦暮之命哉臣願陛下特留聖意且勿輕許詔羣臣講眀利害可以久長之䇿擇其善者而從之試尚書禮部侍郎曽開充寳文閣待制知婺州先是秦檜嘗因語和議事曰此事大係安危開於坐中抗聲曰丞相今日不當説安危止合論存亡爾檜矍然驚其言而罷遂命出守開辭改提舉江州太平觀左奉議郎林待聘試太府少卿進士顔師與特補右廸功郎師與卓兄也上以真卿故官卓等三人卓遄死故改命焉故左中大夫李回再復資政殿學士以其妻郭氏訟劉大中挾情報怨也兵部侍郎兼權吏部尚書張燾言回嘗受張邦昌僞命爲執政今來恩命竊恐公議紛然不允詔劉大中所劾無寔盡還職名依條與恩澤其從僞一節竢與范宗尹謝克家别取㫖秦檜恨二人不已故因事及之己未吏部尚書李光參知政事秦檜與光初不相知特以和議初成将掲榜欲藉光名以鎮壓耳上意亦不欲用光檜言光有人望若同押榜浮議自息上乃許之御史中丞勾龍如淵上疏以振紀綱辨邪正眀賞罸謹名器審用度厚風俗去文具七事爲獻詔三省樞宻院常切遵守先是有詔觀文殿學士孟度提舉萬壽觀赴行在如淵入對論庾已試罔功難以更加器使上曰朕蓋欲遣庾奉使上又厲聲曰在朝莫更有小人如淵曰如趙鼎爲相隳盡紀綱乃竊賢相之名而去王庶在樞府使盡姦計乃以和議不合賣直而去劉大中以不孝得罪亦竊朝廷羙職善罷去上曰卿如何不論如淵曰今士論見孟庾之召王庶之去已有一解不如一解之語願陛下不惜庾一人以正今日公論其他一一容臣爲陛下别白之上色稍解翌日以庾知嚴州孟庾初召及除日歴全不見據如淵退朝録云爾今因如淵上殿附書之以事考之必在劉大中未落職之前大中落職在癸亥去此四日事亦相近也癸亥秦檜奏吕本中行趙鼎修哲宗史成遷特進詞云謂合奉晉楚之成不若尊王而賤覇鼎爲首相於議和通使未嘗不僉同議論今命詞如此皆鼎風㫖欲窺伺和議之不成爲脱身之計上因諭己酉年金人南下之時鼎爲臺臣尚欲與金人畫江爲界當時傳言金國遣使來遂留鼎於四眀接伴既而盧伸等自軍中竄來非金使也鼎追見朕於章安鎮當時豈以議和爲非此事張守備見今守赴江西大帥去尚未還卿可遣書問之檜曰便可録此聖語付史館按日厯又云臣檜等退竊歎上眀智照臨洞見臣下反覆之態豈欺我哉資政殿學士提舉臨安府洞霄宫劉大中落職以御史中丞勾龍如淵再論其不孝也制曰含齒之類共知篤於愛親垂髫之童莫不羞稱不孝豈有居儀刑之重任爲名教之罪人民罔具瞻朕有逸罰大中頃由過聽擢在要津猥以小才遂當大用忘所生之天屬視厥父如路人爨烟不同寝疾弗問事皆有狀聞者寒心人誰無親咸所切齒其詞起居郎權中書舍人劉一止所作也尚書駕部員外郎王居修罷殿中侍御史鄭剛中論居修縁大臣姻故遽叨郎選故黜之布衣姚舉上書詔賜束帛甲子詔太府寺丞莫將所上封事通曉世務議論可采令閤門引見上殿将之書曰臣竊見近者金使求聘且許交河南地界還梓宫歸東朝淵聖皇族議者雜然益以爲詐已而見行人過索禮儀又肆臆度之説何衆人之難曉一至是乎且夙夜以思天之所以純佑陛下無過此舉深慮臆度之説少眩聖意陛下惜一日之屈而隳其初心臣聞中原擾攘無甚於晉方十六國之長雄於中原其相呑滅者皆其族耳苻堅一舉而敗於合肥李靖謂非謝元之善乃苻堅之不善葢時爲慕容垂所陷也由是言之紛紛者之論謂養吾兵威一舉而足以滅敵者亦不通乎古今之説也孟子曰太王事獯鬻勾踐事呉畏天者也陛下以太王之心行勾踐之䇿達孝於父母致恭於兄弟敦睦於九族一舉而悉如吾志此天相陛下之眀驗也臣聞興師十萬則不得操事者七十萬家此危道也今日之議成雖未可以去兵而亦可以少休兵矣夫國虛則民貧民貧則上下不親敵攻其外民盗其内是謂必潰此今日四川之事大可慮也今日之議成則兵之戍於外者可以移於近兵之冗於食者可以汰而减興農桑而省饋餉俾四方萬里舉無科抑怵惕之勞顧不可乎今關市重歛商賈不通財貨彫虛錢寳空乏公私掃地赤立之際也今日之議成費可漸積商可漸通錢可漸増變警擾之習爲阜民歸遷徙之勞爲永業俾城郭郊野舉有還定之安顧不可乎是四事者至易曉也而紛紛之説猶不喻焉盖亦未之思耳或者又曰無約而請和者謀也卑辭而益幣者進也臣應之曰陛下遣使以和請敵以和應非無約而請也使人之來徜徉境上舉止甚髙言辭頗倨非卑辭也敵以和應出於實矣在我所以自治而待之者何如耳非譎竒無以息㓂非隂謀無以成功臣於此多有說焉使獲奉清閑之燕以畢其說非特臣之幸實天下之幸乙丑詔紹興府南班不帯遥郡宗室十八員嵗撥上供米五百斛令同判大宗正事士㒟均給之以士㒟言宗室俸薄者不足於糴故也徽猷閣待制提舉江州太平觀錢伯言卒于嚴州丙寅資政殿學士新知潭州王庶落職提舉臨安府洞霄宫時御史中丞勾龍如淵論庶之罪以爲薦用非人屢遭繳駮而歸罪後省驕蹇自恣不下堂廡而倨見從官傾耳側足惟幸王倫不還和議不成使人及境而色大沮於是始有求去之請也庶本趙鼎所薦方劉大中之去庶已不安鼎之将去庶愈不安變詐百出營救萬方謂鼎不逐朝臣爲不成宰相手叚交結張戒一日曰此子不了得一事及其去也乃敢冒言以和議不合賣直而去伏望重行竄削以眀庶欺君罔上愚弄天下之罪制曰庶大言以惑衆小智以飾姦既陳立異之辭旋有壊成之意倘謂和戎之非䇿則雖執義以何慚乃因知已之莫由遂欲脱身而邀譽第務死黨寜知有君其詞亦劉一止所作也尚書考功員外郎李彌正禮部員外郎髙閌並罷御史論彌正閌與修神宗實録元豐之法元祐之政固二事也范冲以元祐史臣之後而膺論撰之職則雖曰盡公終亦致疑此趙鼎之失也厥書既成閲日已久縱有得失後之作史者尚得而去取之必建重修之議此張浚之過也彌正舊校勘官閌爲史官本非所長者也至趙鼎再相彌正乃以前日之罷爲不易逢之機閌以前日之舉爲不得已之事誕謾反覆以儒濟姦伏望特行罷黜以戒在位故二人並罷日歴直作臣寮上言而有謹按字恐是鄭剛中疏樞宻院編修官趙雍上書曰臣伏見金使到闕朝見之禮彌旬未决宰執䑓諫定長久之䇿未得其中意者陛下以梓宫未還母兄在逺急於迎見或欲少抑禮節以全大倫此宜羣臣庶民仰體聖意克賛孝心何苦立爲異論然中外定分誠不可亂其禮且金人之禍十五年矣始者我不習兵望風犇潰其後民心銜痛願雪國耻淮上屢勝金有懼我死戰之師是以去春哭我以上皇之䘮今嵗示我以豫賊之廢使我遭國㓙訃則宅憂而弛征伐喜廢豫賊則釋怨而望和好皆彼淺近陋隘之術而大臣不能洞照其姦猥相與從事於遣使彼得以怠我之事我無以乘彼之隙王倫一行使㫖屢變反令邀求将見名位紊亂冠履易置天傾地覆莫甚於此名號一屈尚可望號令海縣責備臣節休息盗賊固結人心哉况金人肆禍亘古無比我乃慿一介之使忘千百年無窮之耻更欲自屈不知其可也周赧王時秦強楚弱楚願和秦約之武關比其至也閉關奪之使効藩臣之禮居三年懐王發病卒秦歸其䘮太子畏秦復娶秦女以和先臣司馬光曰秦之不道也殺其父而刼其子楚之不競也忍其父而昏其讎彼之紿我以𣺌茫之梓宫刼我以難從之稱號母兄未見乃先事讎均之二䇿孰爲得失乎天子之孝與臣庶不同報難報之恨雪難雪之耻精變天地誠動金石震國威立法制爲匹夫匹婦復讎而朝四夷於眀堂此陛下之職而羣公所當盡心也若膝一屈則禮經掃地拜恩不暇一嵗遣使再嵗遣使三嵗遣使國力大弊所議無期費嵗月殫財計失人心我之九廟盡在臣妾當是之時陛下雖欲長侍母兄度可如意乎爲今日之計當以講和爲中國一事不必張皇委宰相平見使者遣使臣再議直俟梓宫已還母兄相見然後徐議稱號折中典禮南北兄弟自有故事願陛下少抑一身孝愛之情俯循天下至正之論臣不勝甚幸雍所上疏未得本月日且附此或移附金使入闕之前丁夘左宣教郎王揚英爲太常博士揚英丹陽人獻所著黼扆箴十二篇上召對而有是命戊辰國信計議使王倫言金使作詔諭江南四字名目不正秦檜曰須是見得國書恐封册事非便上曰朕嗣守太祖太宗基業豈可受金人封册日歴大臣秦檜奏曰陛下堅守此兩句臣謹按不受封册上兩嘗宣諭豈待檜言之日歴成於秦熺之手其意欲逃責於後世而妄爲此説爾今不取倫又言胡銓上書首欲誅臣乞正鼎鑊之罪以弭煩言詔倫無罪可待己巳王倫馮檝同班入對湖北京西宣撫使岳飛乞差胡邦用知靖州上曰郡守牧民之官亦藩屏所寄當自朝廷選差若皆由将帥辟置非臂指之勢也庚午御史中丞勾龍如淵入對先是主管殿前司公事楊沂中權主管馬軍司公事解潛權主管歩軍司公事韓世良至都堂見秦檜曰以主上受金書欲行屈己之禮萬一軍民洶洶将若之何退至御史臺以其副上如淵且言今三大将在外它日見責以爾等爲宿衞之臣乃令上行此禮不知何詞以對如淵告以諸公不須爾他日苐令計議使取國書納入禁中必不行其他禮數沂中等以手加額曰若得如此天下萬幸如淵具以其言入奏且言今日和議實陛下以徽宗顯肅皇后梓宫與母兄之重在人國中宸心朝夕不遑寜處遂遣王倫奉使請和今日金人既遣報使賫書而來儻若不受必至歸曲于我一日興師彼則有辭此和議固不可壊而禮文之間動輙過當若不度利害勉而從之則堂堂中國一旦遂爲敵人屈己如臣管見必遣王倫與使人反復商議取得敵書納入禁中則禮不行而事定矣上曰果如此即無以加俟以此而付之此並據如淵退朝録修入如淵所記又曰如淵請對條取敵書之䇿曰昨日三衙楊沂中韓世良解潛來見臣云某等昨詣都堂覆宰執説聞官家受敵書必欲行屈己之禮萬一軍民洶洶即某等弹壓不得有一劄子今将副本來呈中丞此亦非某等生事盖縁有大底三箇在外它日問某等云爾等爲宿衛之臣如何却使官家行此禮數不知使某等如何辭對其所説大底三箇盖謂韓世忠張浚岳飛也此言雖似挾持然亦此事渉大利害誠不可輕議臣告以諸公不湏如此他日只是令王倫取敵書納入禁中必不行其他禮數三人者以手加額曰若得如此天下萬幸臣所見惟是令倫早開諭使人取得敵書納入最爲良䇿殿中侍御史鄭剛中言今日之勢尤急於邉郡如楚泗通泰滁濠江鄂以至荆襄關峽之地不過二千餘郡願詔大臣精選二十餘軰分而布之使其招徠牧養朝廷又時遣使按行無狀者易之處處得人則湏以持久増勅賜金之事可行矣從之熊克小歴繋之庚午盖付出之日也辛未參知政事李光言諸路月樁最爲民間重害而江東西爲甚元降指揮許取撥應干上供封樁諸司并州縣等不以有無拘礙上供經制酒税課利及漕司移用等錢樁辦如此州縣尚自應辦不足今江南路漕司徃徃将移用等錢於逐州主管司専委通判拘收不許取撥致民不堪命欲下諸路應月樁錢許将諸色錢樁辦如有餘方許漕司拘收庶㡬壠畝之民不致失業光又奏今日急務莫切於理財之政有避其名而因失其實者有無其實而徒存其名者未易概舉姑論其大者二事常平之法本出於漢耿壽昌今州縣錢榖有屬常平司者名色非一悉總於户部右曹今乃以王安石之故而廢之既使香鹽司兼領又别差主管官一員有司莫知適從錢榖因致失陷發運使本以總六路財計以漕輓中都饋餉爲職兵興以來既無輸轉今乃以糴買事委之其本錢無慮五六百萬緡皆從朝廷給降此國用所以益窘也望罷常平主管官依舊令香鹽司兼領罷發運司其糴買經制等事令户部侍即専領庶㡬名正而事成官省而職舉秦檜進呈上曰月樁事朕數為趙鼎言之鼎不以爲意常平司當復置三省可條具取㫖癸酉秘書省著作郎胡珵尚書司勲員外郎兼史館校勘朱松祕書省著作佐郎張廣凌景夏秘書省正字兼史館校勘常眀范如圭上書曰臣聞主憂臣辱主辱臣死前者上皇訃聞陛下方宅大憂天下受其辱矣今者聞諸道路口語籍籍審如此是将辱在陛下之身臣等得其死為有名之時也人誰無死爲君父死之爲有宋宗社死之爲古今臣子忠孝大訓死之豈爲無名乎或難臣者曰彼将歸我淵聖皇帝歸我天枝之族屬歸我中原之故地重質以要我大義以動我是國人顒顒望之十年而未致者曽無亡矢遺鏃之費一朝而獲雖使主上爲是一稽顙屈膝焉宜無所愛也豈與夫新垣衍帝秦倉猝之謀張儀捭闔之論同日道哉臣曰固也昔者劉項相持滎陽成臯之間嘗置太公爼上約髙祖降矣爲髙祖者信其詐謀而遽屈則分羮之語不敢出諸口而天下亦非劉氏有矣唯髙祖不信不屈日夜思所以圖楚者而上下戮力焉故至於漢有天下大半諸侯皆附楚兵疲食盡而割鴻溝東西之約自至太公吕后自歸故敵不至於窮蹙敗亡之廹而與我連和者古無有也臣聞四太子者方據汴都晏然撫有中原之民關輔淮楚之備未始一日徹而戍卒各不下數萬未有可圖之釁彼亦何憂何恐而一旦無故與我連和幡然若是何爲也哉顧易曉爾彼狃夫薦食之威動則得志而我甚易恐故喜爲和之説以侮我又慮我訓兵積粟蓄銳俟時而事有不可測知者故不得不爲和之説以撓我中國民力日就困竭而敵使之至無已時蓋坐弊敵國疲於奔命無出此計者不憚一費而獲永寜猶之可也今年秋如是矣冬又如是矣眀年又如是子産之言曰用幣必百兩百兩必千人㡬千人而國不亡臣所不忍聞也殫竭膏血以飬驕惰之兵屯戍不用欝其憤憾緩急則曰講和講和使此軰一旦藉口而召亂将何以弭其變哉故臣嘗謂秦之衡人金之和使兵家用一勝百之術也六國不悟衡人割地之無饜故至於社稷不血食國家不悟敵使講和之得䇿其禍亦可勝道哉而况敵人虞詐所從来久時時備禦猶懼或不免也而乃嗜其甘言信之不惑其料事亦踈矣彼以和之一字得志於我十有二年矣以覆我王室以弛我邉備以竭我國力以解體我将帥以懈緩我不共戴天之讎以絶望我中國謳吟思漢之赤子奈何至今而猶未悟也陛下躬曽閔之行受敵人之侮不過曰使獲伸東朝一日之養於天下是亦足矣遑恤其他信如道路之言則敵人之要我至不遜也至無稽也是坐而約降我也艱難以來彼茍可以毒我者無遺力矣獨欠約降一事爾今不慮而從之且梓宫何在在境已乎母后何在淵聖皇帝何在皆在行已乎中原故地版圖何在在使者所已乎陛下奈何不顧祖宗社稷二百年付託之重将不慮而從之以萬乘之尊冒險而僥倖彼敵人者茍或濟其不遜無稽之謀而蹂躪以逞将焉避之哉劉豫之監甚未逺也當是時累百王倫何補救敗之際而倫之在金爲功臣矣可得而追戮哉子思曰人主自臧則衆謀不進事是而臧之猶卻衆謀况未必臧乎故曰聖人甚禍無故之利不可不察也臣等疎逺小臣然於行在與備一官司之列坐縻廪粟無以報大賜情廹理極義不愛身冒千雷霆甘俟斧鉞臣等無任惶懼激切屏營之至如圭又言臣竊謂徽宗顯肅之靈母后淵聖之意所以眷眷焉庶幾得歸者以陛下身爲皇帝有國有家故也陛下不顧安危輕身以從讎則我國家将爲讎敵所有陛下雖欲求措身之所且不可得梓宫輦輅其将安歸女真自以於陛下爲不共戴天之讎雖陛下未能即日報復寜不慮陛下他日終爲之害乎其所以揚言欲以梓宫母后淵聖悉歸於我者豈誠然哉是欲以計取陛下而除已之害爾陛下縱不愛身柰宗廟何柰梓宫皇太后何柰淵聖何今女真之使以詔諭江南爲名要陛下以稽首之禮自公卿大夫以至六軍萬姓莫不扼腕忿怒豈有聽陛下北面而爲仇敵之臣哉萬一陛下拂天下之情屈身於敵意外之患有不可勝言者矣陛下勿謂屈一已便可以得女真之懽心彼其無厭之求寜有窮已設若擁梓宫而南邀六飛奉迎于境或強吾母后淵聖爲手書以召陛下㑹于大河之北或欲易吾之將相去其所惡而用其所愛又欲使其腹心之臣來預吾之政事如監于方伯之國者又欲使吾散遣戍卒之兵平治險隘以利其戎車能從之乎凡此數者一有不從忿怒之兵必不旋踵而至豈如今日痛憤肝膽之際明諭敵使而謝遣之然後詔在廷之臣與守邉之将講眀戰守之䇿日夜飭厲常若臨敵表裏江淮必足以防侵軼之患矣願陛下枕戈嘗膽深思此䇿而力圖之則梓宫終有山陵之期母后終有東朝之養淵聖終免鴒原之難陛下終得遂孝悌之心而天下臣子亦得伸眉吐氣食息世間俯仰無所愧怍與夫忍耻事讎榮辱禍福相去萬萬矣時士大夫皆以和爲不可而如圭與王庶曽開户部侍郎李彌遜監察御史方庭實言之尤力彌遜庭實奏疏未得本當訪求増入之甲戌端眀殿學士提舉萬壽觀韓肖胄以舊職簽書樞宻院事乙亥以韓肖胄爲大金奉表報謝使光山軍承宣使樞宻副都承㫖錢愐副之武功大夫和州防禦使江南西路馬歩軍副總管兼統制本路屯駐軍馬賈和仲罷以參知政事李光劾其輕佻妄作也丙子金國詔諭使尚書右司侍郎張通古眀威将軍簽書宣徽院事蕭哲至行在言先歸河南地徐議餘事以左僕射府館之監察御史施庭臣爲侍御史庭臣抗章力賛和議故有是除胡元質成都丁記施庭臣除侍御史入謝自陳在朝無援不自意䝉親擢至此太上曰卿勾濤所薦弗以相語耶此與張燾劾疏所云全不同今不取命下中外駭愕詔左朝奉大夫沈該選人陳懋上書可採懋改合入官該令閤門引見上殿以該獻書言和議也兵部侍郎權吏部尚書張燾言陛下信王倫之虛詞發自聖斷不復謀議便欲行禮羣臣震懼跼踳罔措仰惟聖孝通於神明固可使仇敵革心惟我之聽然必已得梓宫已得母后已得宗族乃始可議彼此通好經久之禮今彼特以通好爲説意謂割地講和而已几陛下之所願欲而加於聖心者當是時也在廷之臣莫能正救曽魯仲連之不如豈不獲罪於天下萬世乎爲臣如此何以生爲臣是以不避鈇鉞之誅再干天聽伏望陛下俯詢輿情稍寛聖慮母務欲速緩以圖之天下幸甚御史中丞勾龍如淵右諫議大夫李誼殿中侍御史鄭剛中請至都堂與宰執議事初如淵既見上陳取敵書之䇿後數日但聞朝論决欲行屈己之禮軍民時出不平之語聞之有可駭者上自大臣下至百執事朝夕惴惴恐此禮一行或生意外之變闔城百姓有終夕不能寐者而近甸常潤㑹稽之間民悉不安於是入奏同誼請對又呼臺吏問朝廷有大議論在法許臺諌見宰執商議否曰有如淵取法視之果然乃入奏即日有㫖並許之此據如淵退朝録修入徐夢莘北盟㑹編云張通古來時上與秦檜已議定而朝臣猶未僉諧通古要與人主抗禮又欲上面拜金國之詔議未定故通古在館多日未得引見丁丑詔大金遣使前來止爲盡割陜西河南故地與我講和許還梓宫母兄親族餘無湏索慮士民不知妄扇惑令尚書省榜諭起居郎劉一止試中書舍人司農寺丞莫将賜同進士出身除起居郎将入對遂有是命都省翻黄下吏部試兵部侍郎兼權吏部尚書張燾試吏部侍郎晏敦復言仰惟陛下聖孝天至痛梓宫之未還念兩宫之未復不憚屈己與敵議和夙夜焦勞誠心懇切孜孜汲汲惟恐後時特以衆論未同故未敢輕屈爾幸而日者上自朝廷下逮百執之臣小大一心無復異議朝夕進退從容獻納庶㡬天聽可回卒不致屈此宗社之福也彼施廷臣乃務迎合輙敢抗章力賛此議姑爲一身進取之資不恤君父屈辱之耻覈寔定罪殆不容誅乃由察官超擢柱史夫御史府朝廷綱紀之地而陛下耳目之司也前日勾龍如淵以附㑹此議而得中丞衆論固已嗤鄙之矣今庭臣又以此而躋横榻一臺之中長貳皆然既同鄉曲又同腹心惟相阿附變亂是非豈不紊國家之綱紀蔽陛下之耳目乎衆論沸騰方且切齒而莫将者又以此議由寺丞而擢右史如淵庭臣庸人也初無所長但知觀望而将則姦人也考其平昔奚所不爲陛下奈何遽與此輩斷國論乎詩曰憂心悄悄愠于羣小孔子曰小人成羣斯可愠也今如淵庭臣将輩漸已成羣豈國家之福哉伏望睿斷幡然而改特加斥逐庶㡬少杜羣枉之門天下幸甚至於議和則王倫實爲謀主彼徃來敵中至再四矣陛下所倚以爲腹心而信之如蓍龜者也今其爲言自己二三事之端倪蓋亦可見更爲陛下仰念祖宗付託之重俯念億兆愛戴之誠貴愛此身毋輕自屈但務雪耻以思復讎加禮其使厚資遣發諭以必得事實之意告其國人皆曰不可之狀使彼悔禍果出誠心惟我所欲盡歸于我然後徐議所以報之之禮似未晩也如其變詐将復誘我以虛辭則是包藏終不可測便當勵将士保疆塲自治自強以聽天命以俟天時天時既至何爲不成何求不得伏願陛下少忍而已所謂自強之䇿豈有甚髙難行之論特患陛下不爲而已君臣上下協力一心定爲規模一新庶政安徃而不得哉矧我将士浸皆可用比之徃年氣已數倍萬一未能進取以之自守蓋有餘矣釋此不爲甘心卑辱之事臣竊惑之仰惟陛下脱身艱難苦厄之中保有國祚一紀于兹其所恃者不在人心乎自朝廷有屈己之議上下皆已解體儻遂成屈己之事則上下必至離心人心既離何以立國伏願陛下戒之重之臣世受國恩身參法從不敢自同衆人是用輙敢盡言夫言而犯雷霆之怒罪固當死不敢救正而使陛下受屈辱之耻罪亦當死所有施庭臣莫将除命更合取自聖㫖指揮一止亦言将丞九列驟綴從班人以爲将上書附和議而得之臣之誤恩與将同制臣若不言人必以臣自爲地而不忠乞併臣罷之於是将庭臣皆不敢拜時燾既力詆拜詔之議秦檜患之燾亦自知言切恐得罪遂托疾在告檜使給事中兼權直學士院樓炤諭之曰北扉闕人上欲以公爲直院然亦使途耳公疾平宜早出燾大駭曰果有是言愈不敢出矣燾乃不主和議者若使草國書豈能曲徇意指哉燾嘗思之不過一去今日之事其去在我一受遷官他日以罪去則事由人矣檜不能奪遂止按張燾行述所載執奏施庭臣等除命事與晏敦復行状全同而魏掞之讜議以此奏爲燾所作是時燾以兵侍兼權吏書而敦復爲左選侍郎以事考之則二人同上也是日臺諌官勾龍如淵等再詣都堂議國書事秦檜曰若王倫商量不聽則如之何如淵曰正恐倫未能辦此亦嘗率易入文字請相公叅政親見使人與議庶國事早濟李光曰此固不可憚第一至館中遂有如許禮數如淵曰事固如此然視人主之屈則有間矣光黙然遂召國信計議使王倫副使馮檝至都堂如淵語倫曰公爲使人通兩國之好凡事當於敵中反覆論定安有同敵使到此而後議者倫泣且曰倫渉萬死一生徃來敵中者數四今日中丞乃責倫如此檜等共解之曰中丞無它亦激公使了取書事耳倫曰此則不敢不勉戊寅如淵與李誼入對上曰士大夫但爲身謀向使在眀州時朕雖百拜亦不復問矣上辭色俱厲如淵曰今日事勢與在明州時不同誼曰此事莫湏召三大将來與之商議取其稳當乃可上不答久之曰王倫本奉使至此亦持兩端秦檜素主此議今亦來求去去則無害它日金人只來求朕豈來求秦檜二十七日已邜上召倫入對責以取書事是晚倫見使人商議以一二䇿動之使人惶恐逐許眀日上詔宰執就館見使人受國書納入人情始安或曰時欲行此禮宰臣秦檜未有以處因問給事中炤炤舉書諒隂三年不言之句以對檜悟於是上不出而檜攝冡宰即館中受書以歸敵使始知朝廷有人此聞之王師愈此並據如淵退朝録脩入如淵又言講和之事繫國利害禮文之間所當商㩁其如大議蓋已素定初不待道塗之言而决也沈該輕儇俗子素無循行近因上書亦䝉召對深慮希進之人迎合聖意自此妄有陳獻乗時獵取官職有紊紀綱爲害不細望賜寝罷先是張燾晏敦復因論施庭臣莫将除命亦言該賍吏不當由冗散召對至是遂寝尚書右司員外郎范同直寳文閣提㸃兩浙東路刑獄公事從所請也己夘吏部侍郎晏敦復户部侍郎李彌遜梁汝嘉兵部侍郎兼史館修撰兼權吏部尚書張燾給事中兼直學士院樓炤中書舍人兼資善堂翊善蘇符權工部侍郎蕭振起居舍人薛徽言同班入對按此時兵部侍郎吳表臣館伴新除中書舍人劉一止權禮部侍郎尹焞起居郎莫将未上故從官止此上奏曰臣聞聖人與衆同欲是以濟事自古人君施設注措未有不以從衆而成違衆而敗者伏見今日屈己之事陛下以爲可士大夫不以爲可民庶不以爲可軍士不以爲可如是而求成臣等竊惑之仰惟陛下獨以爲可者謂梓宫可歸也淵聖可還也母后可復也宗族土地可得也國人不以爲可者謂敵人素多變詐今持虛文以來而梓宫未歸淵聖未還母后未復宗族土地未得何可遽爲卑辱之事此公論也以陛下聖孝固無所不盡然天下公論又不可不從使天誘其衷敵果悔禍惟我之從而梓宫已歸淵聖已還母后己復宗室土地皆已得之則兩國通好經久之禮尚有可議豈有但信其虛辭一未有所得而遂欲屈膝以從之乎一屈之後将舉國以聽之臣等恐彼之所許未必可得而我之爲國日朘月削遂至不可復支矣臣等竊聞敵使入境伴使北向再拜問敵帥起居此故事也然軍民見者或至流涕夫人心戴宋如此雖使者一屈猶爲之不平况肯使陛下不顧羣議斷而行之萬一衆情不勝其忿而王雲劉晏之事或見於今日陛下始有追悔之心恐己晚矣傳曰衆怒難犯専欲難成合二難以安國危之道也臣等職在論思竊聞輿議不敢緘黙伏望聖慈俯同衆情毋遂致屈而緩圖之不勝幸甚上覽奏愀然變色曰卿言可謂納忠朕甚喜士大夫盡忠如此然朕必不至爲敵所紿方且熟議若决非詐僞然後可從如不然當拘留其人再遣使審問虛實燾等頓首謝奏燾所草也新除權禮部侍郎兼侍讀尹焞言臣伏見本朝兵革之禍亘古未聞我國無人致以擾亂昨者城下之戰詭詐百出二帝北狩皇族播遷宗社之危己絶而續陛下即位以來十有二年雖中原未復仇敵未殄然而頼祖宗徳澤之厚陛下勤撫之至所以億兆之心無有離異逺近愛戴國勢可保設若人心輕揺豈至今日前年徽宗皇帝寜徳皇后崩問遽來莫究不豫之狀天下之人痛心疾首而陛下亦且屈意降志以迎奉梓宫請問諱日爲事遂使敵意益驕謂我無人乃再啟和議於今日意欲潛圖混一臣妾中國陛下必爲此議則人心自去祖宗積累之業陛下十二年勤撫之功當决於此矣不識陛下亦嘗深謀而熟慮乎抑在廷之臣不以告也臣觀陛下所以不顧衆説力求和好者不過謂梓宫未還母兄宗族在人掌握不知敵人之情専尚姦詐敵人之求無有紀極坐竭帑藏歛及百姓感動人心沮䘮士氣異時悔之固無及已禮曰父母之讎不與共戴天兄弟之讎不反兵今陛下方将信仇敵之譎詐而覬其肯和以舒目前之急豈不失不共戴天不反兵之義乎又况使人之來以詔諭爲名以割地爲要欲與陛下抗禮於庭復使陛下北面其君則是降也非和也今以不戴天之讎與之和且猶不可况實降乎臣竊為陛下痛惜之或以爲金國内亂懼我襲已故爲甘言以緩王師儻或果然尤當訓飭號令申嚴賞罰鼓士卒之心雪社稷之耻尚何和之爲務時近臣皆入焞以疾固辭新命乃上此疏及移書秦檜言今敵使在廷天下憂憤若和議一成彼日益強我日益怠則中國號令皆從敵出國事廢置皆從敵命侵尋朘削天下有生靈塗炭之憂䜛間疑貳将帥有誅戮奪權之害姦宄生心大勢奈何将見敵人坐收成功相公被天下之責無所歸咎願相公從容榻前力陳大計以謂敵人與我有不戴天之讐靖康以來屢堕其術今若一屈使為口實賈怨誨兵自困自斃豈真忍為此議比者竊聞主上以父兄未返降志辱身於九重之中有年矣然亦自是未聞敵人悔過還二帝於沙漠繼之梓宫崩問不詳天下之人痛恨切骨則敵人貪噬之性不言可見天下方将以此望於相公覬有以革其已然豈意為之已甚乎今之上䇿莫如自治自治之要内則進君子而逺小人外則賞當功而罰當罪使主上之孝悌通於神明道徳成於安强勿以小智孑義而圖大功不勝幸甚檜得其書已不樂讀至小智孑義之語乃大怒之庚辰尚書右僕射秦檜見金國人使於其館受國書以歸前一日従官既對上召王倫責其取書事倫見北使張通古以一二䇿動之通古亦恐遂請明日此據勾龍如淵退朝録或曰時欲行此禮檜未有以處因問給事中直學士院樓炤炤舉書髙宗諒隂三年不言之句以對檜悟於是上不出而檜攝冡宰受書此據熊克小厯丑按以上二條前三日丁勾龍如淵議國書時已約畧載入此處又為記通古允授國書縁起故複及之通古猶索百官備禮迎其書檜乃命三省樞宻院使朝服乗馬導従趙甡之遺史云金人遣張通古来要上北面拜詔朝廷議未㝎或請列祖宗御容而置金人詔書於其中拜之至於紛紛不定者累日通古索備玉輅迎詔書百官導從至是猶未决秦檜獨主其事坐於待漏院中置玉輅於殿門之外命三省使服銀緋服緑樞宻院使服紫腰金魚赴館候使人出則或導或従使人以為百官也日髙通古等始出館馳馬入殿門有親事官一人拽馬覊敵使藤杖擊其首傷竟不肯放通古所持詔其詞不遜上皆容忍之錫賫通古等極厚時上特以皇太后故俯従敵約而檜必欲屈已天下咎之紹興講和録載金人國書畧云向者建立大齊本以休兵欲期四方寜謐奈何八年之間未能安定有失従来援立之意於是已行廢黜况興滅國繼絶世聖人所尚可以河南之地俾為主云云今畧掇取附見或削去亦可張中興聖政何俌龜鑑彼秦檜何人也再入相位投置浚而不之救揺撼趙鼎而不知恤同已和議者用背已言戰者斥戊午集議問之廷臣廷臣以為不可問之将臣将臣以為不可上自宰執下至侍從臺諫内而卿監郎官外而監司郡守皆以為不可王倫妄誘金使移書悖慢且以詔諭江南為名是欲臣妾我也而吾國含垢茹耻畧不知校澹庵胡公至欲掲檜首扵藁街而新州之行志士飲氣他日韓世忠有伏兵洪澤刼金使以壞和之謀晏敦復不以身計誤國有到老愈辣之性竟亦不能以沮成說也范如圭有曰檜不病狂奈何爲此檜盍亦知所反矣夫以盈庭分議竟不能奪一檜之議者其爲説亦有二焉其一則倡孝悌之説足以動人主之聼其二則立三日思慮之言有以堅人主之心嗟夫秦檜倡和議而藉口于孝悌是以蔡京欲行紹述而借繼志述事之説無異也秦檜欲議之不搖而要君以三日思慮是與安石欲行新法而要君以講學術之説無異也然而天聼俯順羣議莫移盖亦有説云耳彼諸公之疏謂梓宫不可還而梓宫之還有日矣太后不可復而太后之復有期矣陜西河北之地不可得今可得矣謂敵不足信今可信矣此檜所肆行而無忌憚也孰知尼瑪哈達蘭之姦計哉彼以陜西歸我正所以分吾川蜀之兵力也以河東歸我正所以弊我東南之事力也我以艱難理之彼遲以數年而收拾之猶外府也何其不慮及此耶吕中大事記建炎之初内有綱外有澤此可為之一機也而汪黄以主和失之紹興之間内有鼎外有浚此又有為之一機也而秦檜以主和失之失此二機天地之大義不立使我髙宗抱終天之痛可勝惜哉盖嘗大臣任事者張趙朱吕數人惟浚在外鼎在内至公血誠相與扶持此義然浚終始主戰鼎始主戰終主守則鼎之規模已與浚少異若頥浩勝非雖内有平賊之功而外但為避敵之謀則皆不知此義者也大将用命者張劉韓岳數人張浚謂諸大将惟飛世忠可倚大事而二人必欲掃強敵壊和議則真知此義若光世之沉酣酒色不喜恢復毎每退屯而俊不受行府之命不與劉錡共功不與世忠同謀但與沂中為腹心以附秦檜之和議而已則皆不知此義者也是則諸臣之不知義者多矣而南渡百年公論獨切齒於一檜者何也盖汪黄壊之於事勢未定之時而檜壊之於事機垂成之日為可恨也諸公之言和者依違於其間而檜獨斷然為南自南北自北之説也他相或一年或二年或不數月而檜獨相二十年之久也方其入相之初朝士皆動色相賀惟晏敦復目之爲姦人然向子忞於紹興之初與胡安國論曰與檜同時被執軍前鮮有生者獨檜盡室而歸非大姦能如是乎當時安國猶以為忠其子寅猶以子忞之言為過則檜之奸可以欺賢人君子也如此方檜之初主和曰我有二䇿可以聳動天下今無相不可行及再主和曰臣恐亦有未便欲望更思慮三日又三日曰臣恐别有未便知上意堅確不移乃乞决和議不許臣下干預則檜之奸足以欺聖主也如此檜雖以和議斷自聖衷而人心公議終不可遏爭之者臺諌則張戒常同方庭實辛次膺侍從則梁汝嘉蘓符樓炤張九成曹開李燾晏敦復魏矼李彌遜郎官則胡埕朱松張廣凌景夏宰執則趙鼎劉大中王庶舊宰執則李綱張浚其他如林李仲范如圭常明許訢潘良貴薛徽言尹焞趙雍王時行連南夫汪應辰樊光逺交言其不可大将岳飛世忠亦深言其非計而胡銓乞斬王倫秦檜孫近二疏都人喧騰數日不定人心亦可知矣諸公之議憤激懇切而終不足以折檜者則有説矣謂梓宫不可還今還矣謂太后不可復今復矣謂陕西河南之地不可得今可得矣謂敵不可信今可信矣此檜之所以能排衆議也然不能復讎雪耻而使吾君抱終天之痛以為孝悌不能自復土宇而乃乞丐於仇讎以立國家此如圭所謂相臣以為忠而不知身陷於大不忠主上以為孝而不知身䧟於大不孝樊光逺所謂金人詭詐不足憂而信實深可懼其可信愈甚則其可懼愈甚皆至論也一人之私不能以勝千萬人之公雖檜亦末如之何也辛巳御史中丞勾龍如淵言今和議己定将遣某使又将遣某使自時厥後嵗必再三而使者冠蓋益相望於途矣欲望特詔有司檢照近年體例參酌中制将所得恩例凡使者在館及至界首者比舊减三分之二汴京或燕中者减半直至金國者全破庶㡬久而可行詔三省樞宻院照㑹是月尚書吏部員外郎王次翁試祕書少監日歴無此今以本省題名附入虛恨蠻王歴階犯嘉州忠鎮寨執寨将茹大猷以歸虛恨乃烏蠻之别種所居髙山之後夷人以髙爲虛以後爲恨故名焉其地東接馬湖南抵卭部川北接中鎮地方三百里墟落數十天禧以前朝廷嵗以酒食犒勞嘉祐間始入㓂遂徙寨於陽山江北以避之紹聖間乞於嘉州博易不許至是遣其徒来忠鎮寨爲漢人所殺蠻益讎恨有判官田二三本新津縣吏也亡命蠻中常惎歴階爲邉患遂舉族入㓂轉掠忠鎮十二村民殆盡鄜延既陷第六将李世輔爲金右副元帥宗弼所喜累遷知同州及敵廢僞齊世輔乃與其徒王世忠領遇等潛謀遣使臣白彦忠等持書抵川陕宣撫副使吳玠使出兵爲外應是冬左監軍薩里干自大同之陕西見左都監布爾噶蘇議割地事薩里罕每過都邑必湏使将吏妻女侍飲世輔忿之比過同州世輔乃偽稱足疾伏兵州廨因犒其從者醉而悉殺之遂縳薩里罕上馬欲以南歸敵騎追及之世輔與親校崔臯托卜忠等數十人决圍而出且戰且前至五交原追騎益衆世輔謂曰廹我急即急殺之矣故敵騎尾而不廹世輔度衆寡不敵乃解薩里罕縳折箭爲誓縱之使去時洛水溢世輔無舟不得渡敵人又㑹兵斷其歸路世輔遂奔夏州其父同州觀察使永竒及其家百餘人皆爲敵所族世輔清澗人也徐夢莘北盟㑹編云世輔與知華州王世忠謀歸朝爲其下告變於珠赫貝勒世忠被殺金人西元帥薩里罕來同州謀殺世輔世輔伏兵州廨執薩里罕率兵走半塗薩里罕説世輔曰欲執我何徃也世輔曰徃江南歸大宋耳薩里罕曰若徃江南江南與大金和議大金以河南之地許歸江南江南喜於得地講和必送我歸本國汝則被害矣世輔曰何以爲信薩里罕乃於近體楮衣中取出一文字即金國主宻發來退地之文世輔信之遂暫放薩里罕令去世輔出奔爲金人所追且行且戰其下皆盡金人遂殺世輔一家親屬此所云與諸書差不同但夢莘繫今年五月恐太早熊克小歴繫之今秋今從張滙節要附今年冬更湏參考世輔行述稱薩里罕召公計事公疑不利於已移疾不徃薩里罕怒領兵數百人欲以掩公以張滙節要考之薩里罕是行因見布爾噶蘇計事非掩世輔而出蓋行述容有潤色也行述又稱世輔與薩里罕折三箭爲誓令翼二聖還疆土及毋殺同州之民今不盡載是嵗四川制置使胡世將即成都潼川府資普州廣安軍創清酒務嵗收息錢四十五萬緡舊成都都酒務許人户買撲分認嵗課爲錢四萬八千餘緡建炎三年額趙開行隔槽法所増至十四萬六千餘緡紹興元年額及世將改爲官監所入又倍自後累益増加至五十四萬八千餘緡紹興二十五年數而外邑及民户坊塲又爲三十九萬餘緡淳熈二年數於是隔槽之法已壊諸郡漸變爲官監而民户坊塲率以三年一榜賣公私俱困矣建炎以來繫年要録巻一百二十四建炎以來繫年要録巻一百二十四金人地名考證尼瑪哈原書作黏罕誤改見巻一逹蘭原書作撻辣誤改見巻一薩里罕原書作撒離喝誤改見巻十一布爾噶蘇原書作㧞束誤改見巻二十八珠赫貝勒原書作折合孛堇誤改見巻三十七
