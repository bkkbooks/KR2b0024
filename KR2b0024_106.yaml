body:
  text: 建炎以來繫年要録卷一百六宋李心傳撰紹興六年冬十月乙未朔上率百官遙拜二帝右朝散大夫提舉淮南東西路茶鹽公事蔣璨直祕閣上召璨入對乃有是命璨初除不帶茶字當時張澄改除乃并以茶事歸監司耳丙申詔諸路州軍將西北流移無歸人民情願充軍堪披帶少壯人招填禁軍闕額尚書右僕射張浚言昨令兩浙江東州軍勸誘大姓就買官誥今來將欲就緒望將每州勸誘及三十萬緡以上知通縣令當職官各減二年磨勘及二十萬緡減半推賞從之後旬日中書言恐當職官趂數希賞却致科敷乃命行府核實如無抑配擾人即如前詔中書所奏在是月丙午秉義郎李絪特除名送潯州編管絪入內黃門也主承受劉光世軍奏報文字坐罪轉歸吏部光世以其貧乃贈之金趙鼎張浚聞之奏絪不法下大理獄具坐嘗與光世交通光世為之市常州田數百畝又遺以五十金法寺當絪賘罪徒追二官罰金鼎進呈特有是命絪後死于貶所趙甡之中興遺史睿思殿祗候李絪者能謳詞善小説主養飛禽吕頤浩在都堂聞飛禽數百其聲如音樂問之曰鵓鴿也詰其所主曰內侍李絪所飬每鴿有金鋜鋜其足又有鷹鷂之屬甚衆皆御前者頤浩不樂明日奏之詔絪送吏部應主管飛禽有官人皆與逺惡州指使絪遂居于金壇之别業絪嘗為劉光世承受光世以其貧乃贈之金頤浩聞之下大理寺除名勒停潯州編管死貶所甡之係此事于紹興三年二月據絪案欵稱紹興四年十月內差充承受劉光世軍奏報文字則其送吏部不應在三年亦非由頤浩所奏也此事恐與今年八月庚辰馮益事相關按日歷八月二十三日戊午中書門下省勘會李絪昨在內侍省日公受賄賂所為不法有旨令大理寺勾追根冶具案聞奏是時張浚自行府初還朝故知同鼎奏請也如喻樗所記張浚乞斬馮益事亦恐或在此時今併甡之所云附此須求他書參考故朝散郎遊議特與一資恩澤議師雄孫也靖康中為河北轉運判官真定之破議在城中至是其家援例求恩且引侍御史周祕為證祕言嘗與議同在圍中而不知其所以死特録之丁酉吏部侍郎都督府參議軍事吕祉還行府供職先是劉麟等令鄉兵偽金人服于河南諸處千百為羣人皆疑之以金偽合兵而至淮西宣撫使劉光世奏禦賊事宜謂廬州難守且密干左僕射趙鼎欲還太平州又江東宣撫使張俊方駐軍泗州都督張浚奏敵方疲于奔命決不能悉大衆復來此必皆豫兵而邉報不一俊光世皆請益兵衆情洶懼議欲移盱眙之屯退合肥之戍召嶽飛盡以兵東下浚獨以為不然乃以書戒俊及光世曰賊豫之兵以逆犯順若不𠞰除何以立國平日亦安用飬兵為今日之事有進擊無退保而鼎及簽書樞密院事折彥質皆移書抵浚欲飛軍速下且擬條畫項目請上親書付浚大略欲退師還江南為保江之計不必守前議趙鼎事實曰鼎移書張浚令張俊楊沂中兩軍併力𠞰滅麟猊二賊然後移軍建康固守江上以待後來者諜者言二賊之後金兵騎不斷知兵者亦謂金使麟猊為前驅金以精騎繼之萬一出此枝梧不暇矣鼎復以書與浚云使張楊協軍掃蕩之後敵騎未必不望風而遁蓋兵家之勢如此折彥質亦以書言之九切鼎為上言之上曰此謀之善者也因令鼎擬定所以措置之方上親書賜浚且曰今有數條與卿商量初未嘗執定決行之也其後浚謂沮害其功者此也明年言者論折彥質言淮南之役首議斂兵幾敗國事坐此落職亦觀望者不詳首尾一意投合且出其私意非公言也按此與朱熹所撰張浚行狀及張栻所作王縉墓志全不同以史及他書考之其實鼎專為守江之計而浚力督諸將進兵以此異議餘具此月癸卯趙鼎進呈注於是淮東宣撫使韓世忠統兵過淮遇敵騎與阿哩雅貝勒等力戰既而亦還楚州或請上回臨安且追諸將守江防海浚奏若諸將渡江則無淮南而長江之險與敵共淮南之屯正所以屏蔽大江使賊得淮南因糧就運以為家計江南其可保乎今淮西之寇正當合兵掩擊況士氣甚振可保必勝若一有退意則大事去矣又嶽飛一動則襄漢有驚復何所制願朝廷勿專制于中使諸將不敢觀望上乃手書報浚近以邉防所疑事咨卿今覽所奏甚眀俾朕釋然無憂非卿識髙慮逺出人意表何以臻此祉亦言士氣當振賊鋒可挫榻前力爭至于再四彥質密奏異時誤國雖斬朝錯以謝天下亦將何及上不聽乃命祉馳往光世軍中督師時劉猊將東路兵至淮東阻世忠承楚之兵不敢進復還順昌麟乃從淮西繫三浮橋而渡於是賊衆十萬已次於濠夀之間江東宣撫使張俊拒之即詔併以淮西屬俊主管殿前司楊沂中為浚統制官浚遣沂中至泗州與俊合且使謂之曰上待統制厚宜及時立大功取節鉞或有差跌浚不敢私諸將皆聽命戊戌沂中至濠州會劉光世己舍廬州而退趙甡之遺史云劉光世軍廬州聞劉麟入寇其勢甚熾密申宰相趙鼎乞降樞密院指揮退保太平州簽書樞密院事折彥質助為之請遂檄光世退軍張浚大怒遣向子諲等督光世復還廬州林泉野記所書亦同按光世但私請于鼎無緣便降密劄許其退保此所云恐誤然張浚行狀稱鼎欲退合肥之戍召嶽飛之軍東下而日歷十一月九日癸酉嶽飛奏依奉處分往江州屯駐則是果嘗降此指揮也甡之或有所據姑附著之更俟參考浚甚怪之即星馳至采石遣人喻光世之衆曰若有一人渡江即斬以徇且督光世復還廬州右司諫王縉亦言主將有慢令不赴期會者請奮周世宗我太祖之英斷以厲其餘上親筆付沂中若不進兵當行軍法趙鼎事實曰時鼎又督沂中徑趣合肥以援光世而張俊謂楊軍新戰勝當少休然劉麟已逼合肥光世輜重已回江北人情大懼浚急以書屬鼎曰欲上親幸江上先作一指揮行下庶諸將用命鼎慮行府號令不行有失機事即白上今者軍事已急萬一少有差跌利害不細須自朝廷主張其事庶使張浚事有骨肋上深以為然乃擬呈親筆付浚云有不用命當依軍法從事浚乃使人懷此御筆馳往合肥見光世徵出示之光世驚駭大呼諸將曰汝輩且向前救取吾首級即躍馬而出諸將帥其部曲倉皇追之麟兵方大集光世適與之遇血戰終日麟遂大敗是時非朝廷措置以御筆督之勝負殊未定鼎之誠心協濟如此而議者謂沮軍事可謂厚誣矣按日歷明年五月丁丑載上語不進軍者當行軍法乃指謂楊沂中與鼎事實差不同光世不得已乃駐兵與沂中相應遣統制官王德酈瓊將精卒自安豐出謝步遇賊將崔臯于霍邱賈澤于正陽王遇于前羊市皆敗之是日賊攻夀春府寄治芍陂水寨守臣閣門祇候孫暉夜劫其寨又敗之初光世言糧乏詔轉運使向子諲濟其軍九月戊子子諲晝夜併行至廬州而光世兵已出東門子諲直入城見光世具言綱船至岸次光世乃止己亥詔平江府城內外民旅買賣錢物出入並各從便自上駐蹕以來有司舉行京城錢不出門之禁糴價貴踊右司諫王縉以為言乃罷之右中奉大夫李平仲起復充四川制置大使司檢法官平仲開封人舉眀法為大理評事不去廷尉者十年職至丞梁師成用事欲見之平仲不往建炎初出知榮州代去丁母憂寓居于蜀至是席益奏用之而平仲卒矣右從事郎平江軍節度推官趙慶孫特改右承事郎翰林學士朱震等言慶孫內行孝友施于政事明敏可觀故引對而有是命辛丑詔提點淮南公事張成憲重别措置大軍所須茭芻毋令騷擾時淮泗大軍所須茭芻甚夥而成憲均之楊楚泰州暨髙郵州每州十萬束至二十萬束民間津送每束有至五六百錢者右司諫王縉請令諸軍願得錢就便收買者聽餘令採之近地雇人以官舟運之故有是旨右迪功郎李若朴試大理司直若朴若虛弟也左文林郎鄭剛中右迪功郎李郁並充敕令所刪定官剛中金華人為溫州判官受知秦檜故檜薦用之郁已見資政殿學士四川制置大使席益薦嘗任知縣人十三員政績乞已任通判者與大郡見任縣道者與小郡並俟終更日赴任仍從本司隨才選差內選人俟改官丁憂人俟服闋日依此從之時益所薦士頗衆而左宣教郎馮時行左通直郎樊汝霖為之最後皆知名汝霖金堂人也時行已見罷四川諸州軍縣鎮酒官一百七員用席益奏也時川路多置比較務科定人户出錢以資妄費民不堪之上聞命益相度裁減益請州縣有官可兼鎮市鄉村相近者並罷餘令都轉運司選差申制置大使司審度給劄從之詔巡幸隨軍都轉運使舉官依發運使例減半壬寅顯謨閣直學士巡幸隨軍都轉運使梁汝嘉為浙西淮東沿海制置使帶御器械劉錡副之翌日更命行營前護副軍都統制王彥為制置副使以所部屯通州之料角汝嘉等乞以右通直郎新知濠州蔡延世等二人充參議官量賜激賞錢仍令浙西漕臣淮南提點官應副軍食皆從之熊克小歷載汝嘉此除于十月癸丑蓋誤左迪功郎方疇左從事郎朱翌並為敕令所刪定官翌載上子載上懷寧人靖康司農少卿疇趙鼎客也疇已見元年五月監察御史趙渙請令御史臺今後日受諸路詞訴其事重害日久不決者申取朝廷指揮其監司州縣留滯經時裁處失當亦許依法彈奏詔御史臺所受諸路詞訟如有事理重害日久不決者具申尚書省取旨看詳餘如所請詔總制司錢令諸路州軍通判依己降指揮悉心拘收别用庫眼樁管依限起發非專降朝旨不以是何官司並不得應副如違通判先降二官放罷仍令提刑司檢察時諸郡多截用總制錢申乞除破都省言總制錢乃朝廷於常賦之外講畫到錢數故申飭之尋命監司守臣擅行兊借截用者視此後旨在十一月丁卯詔廣西路宣和官鑄當二小平錢並令行使有鼓唱為毛錢之人重行決配右通直郎都督府幹辦公事張斛引對翌日詔賜同進士出身與升擢差遣是日劉猊以衆數萬過定逺縣欲趨宣城以犯建康權主管殿前司公事楊沂中與猊前鋒遇于越家坊敗之猊孤軍深入恐王師掩其後欲會麟于合肥癸卯趙鼎進呈劉光世所奏事宜上曰光世之意似欲退保采石鼎曰據諸處探報殊無金人如此則自當鏖擊若官軍與豫賊戰而不能勝或更退撓則他時何以立國但光世分兵隨處禦捍已見失策今賊兵既已渡淮惟當急遣張俊合光世之軍盡掃淮南之寇然後議去留兹為得計萬一使賊得志于光世則大事去矣折彥質曰誠如趙鼎所論上顧鼎曰卿此策頗合朕意朕度金人行兵不如此止是劉豫之衆若合張俊光世之軍擊之理無不勝者此假據日歷所記修入按鼎所奏與諸家記録及當時諫官論列全不同當時鼎與折彥質初欲抽兵後知無金人乃有此奏也不則彥質撰時政記容有修潤亦未可知更當詳之甲辰沂中至藕塘與猊遇賊據山險列陳外嚮矢下如雨沂中曰吾兵少情見則力屈擊之不可不急乃遣摧鋒軍統制吳錫以徑騎五千突其軍賊兵亂沂中縱大軍乘之自將精騎繞出其脅短兵接即大呼曰破賊矣賊方愕視會江東宣撫司前軍統制張宗顔等自泗州南來率兵俱進賊衆大敗猊以首抵謀主李諤曰適見髯將軍鋭不可當果楊殿前也即以數騎遁去餘黨猶萬計皆僵立駭顧沂中躍馬前叱之曰爾曹皆趙氏民何不速降皆怖伏請命官軍獲李諤與其大將李亨等數十人麟在順昌聞猊敗拔寨遁去光世遣王德追擊之先是上賜德親劄諭令竭力協濟事功以副平日眷待之意德奉詔與沂中追麟至南夀春而還是役也通兩路所得賊舟數百艘車數千兩器甲金帛錢米偽交鈔告敕軍須之物不可勝計于是孔彥舟圍光州守臣敦武郎王莘拒之彥舟聞猊敗亦引去北方大恐趙鼎事實曰初麟猊之報甚急張浚倉皇出江上未知為計鼎白上嚴督諸將皆鼎自擬詔檢上親筆付諸將于是皆恐悚奔命楊沂中自泗上率吳錫張宗顔直前與劉猊遇多破之使麟賊失援大衄而遁皆鼎之始謀也吕中大事記自紹興四年趙鼎為相偽齊與金分道入犯鼎決親征之議于是世忠進屯揚州流星庚牌之計一行遂捷于大儀鎮而金偽俱遁矣鼎又薦浚可當大事以樞府視師江上將士見浚來勇氣百倍而軍聲大作矣白五年楊么既平東南無盜區于是鼎左浚右並平章事兼領樞密俱帶都督浚出視師以行府為名而鼎居中總政表裏相應雖孟庾沈與求有三省樞密奉行府文書之譏而鼎至公協心未嘗計較説一般話行一般事用一般人諸賢聚會一時號小元祐矣自六年浚親行邉盛暑不憚命世忠自承楚以圖淮陽光世屯廬州以招北軍嶽飛屯襄陽以窺中原張浚為進屯盱眙之計而鼎與浚同心責張俊以當聽行府命告浚以邉事不必稟朝廷恐失機會故偽齊入寇浚獨建有進擊無退保之論諭諸將以一人渡江即斬以徇之言于是蕩沂中捷于藕塘北方大恐而金廢劉豫矣此紹興四年以後七年以前所以又大異于紹興之初也司農少卿樊賓請沿江間田不成片假者比民間例只立租課上等立租二斗次減二升又次一斗有半召人承佃免一年租從之故朝奉大夫俞賙追一官賙家以致仕乞任子而吏部言賙用明堂結局改秩雖已身亡亦合審量故有是命乙巳四川制置大使席益言被旨令催促趙開應副吳玠軍前糧餉臣即考其稽滯之由方見得見今水運尚係以前嵗計合起之數蓋緣遞年登帶以至今日臣凖指揮催促雖據回申止是泛稱已牒逐路運司管認措置裝發並無的確己未起發之數由臣人微望輕無以號令諸司竊恐緣此上纍國事伏望特降睿旨下趙開應本司文移略行報應庶于職事免致曠弛趙鼎乞令開分析上可之時益已命逐路漕臣分認地分遞相交割後半月又言開别不應副舟船及水腳錢乃詔開與逐路漕臣同措置津運如軍食少有不繼並一等取旨後詔在是月庚申歸正人黃捷特補成忠郎捷承縣人劉豫之叛也捷率鄉民保守山寨數報賊中事宜至是與其弟淵挺身來歸故録之也詔潼川府守臣景興宗進職一等廣安軍守臣李瞻果州守臣王隲宗正少卿馮楫並進一官去年蜀中旱興宗等率民賑貸楫居遂寧府自出米數百斛以率鄉人鄉人歡趨之飢者賴以濟制置大使席益聞于朝故賞之隲郫縣人也日歷無此今以紹興七年十月八日尚書省檢會指揮修入丙午右從事郎鄂州蒲圻縣令劉旁循一資再任旁為邑再嵗户口益增用部使者請而命之丁未左宣教郎江西制置大使司幹辦公事羅薦可進秩一等先是觀文殿大學士江西制置大使李綱聞上巡幸遣薦可奉表問起居且言自古用兵相持既久則非出竒不足以取勝願速遣得力兵將自淮南前來蘄黃間約嶽飛兵相為掎角以夾擊之大功可成繼而王師屢捷綱又奏陳利害大略以謂竊見間探所報偽齊乞兵於金人頭項頗多未聞有渡淮而南者其侵犯淮淝及光山六安等處作過只是李成孔彥舟叛將簽軍深慮賊情狡獪匿重兵于後而以簽軍來嘗我師若一勝之後兵驕氣墮則為患有不可勝言者伏望降詔諸將益務淬礪以待大敵仍命朝廷按圖以視諸路某路固實當設疑以欵賊兵某路空虛當增兵以禦侵掠使江淮之間表裏相資首尾相應上以綱所陳利害切中事機賜詔奬諭綱再奏願降哀痛之詔憫將士罹兵革之苦凡死于戰陳先加封爵厚給賻贈收恤其家死者褒則生者勸矣然後眀詔統帥審定功狀俟防冬解嚴慶賜併行其誰曰不然故武經郎种廣特贈武翼大夫雄州防禦使廣守陜州死于難張浚在陜西嘗贈一官至是樞密院以為薄乃申命焉事在建炎元年四月左司諫陳公輔言在法臺諫官不許出謁許見客都司大理寺官並禁出謁休日許見客比緣多事廢弛往往不依法禁非惟不能杜絶請求亦恐有妨職事乞申眀行下從之戊申上謂大臣曰近日淮西有警朕常至夜分方寢奏報到又輒披衣以起或至再三趙鼎曰致陛下憂勞如此臣等之罪也左從事郎張登特改左承事郎登以薦對而有是命辛亥楊沂中捷奏至俘戮甚衆上愀然曰此皆朕之赤子迫于凶虐勉強南來既犯兵鋒又不得不殺念之痛心顧趙鼎曰可更戒敕諸將爾後務先招降其陳歿之人亟為埋瘞仍置道場三晝夜以示矜惻上嘉張浚之功賜詔略曰賊雛犯順犯夀及濠卿率師徒臨敵益壯遂使凶渠宵遁同惡自焚寤寐忠勤不忘嘉歎仍令浚具上都督府隨行官吏軍兵推賞浚言賞或濫加則將士解體乞將至龜山太平州人並轉一官資别有功人量與增賞上從之浚奏以七年正月丁卯下今聫書之左文林郎江州管內安撫司幹辦公事胡孰特改左宣教郎孰在政和中嘗上書言當以堯舜之道治天下不當用黃老之説又言蔡京誤國童貫梁師成等不當用事坐奪官舒州編管至是用趙鼎薦對乃有是命翌日上謂鼎曰朕昨覽孰所上疏極為忠憤而孰才編管耳此有以見道君皇帝之聖德也若據諸人之意必殺之矣制曰朕側席圖治渴聞讜言爾頃在難言之日鋭然獻忠以取竄逐豈知有今日之遇乎爰因造朝召對便殿遂俾改秩錫以贊書庶幾四方知朕好惡直徽猷閣新兩浙東路提點刑獄公事張九成改除直祕閣九成以貼職太峻固辭不受上不許九成言今日辭免非矯激要名苐不欲因九成上紊朝廷綱紀朝廷察其意為之改命仍賜詔奬之壬子四川制置大使席益以便宜增印錢引三百萬緡市軍儲七年五月禁泛印制司增印錢引始此癸丑右司諫陳公輔言近行在職事官輪對己周目今臺諫止有三員逐日上殿班次亦少見在行在審計官告糧料𣙜貨鹽倉及茶場等元不係面對上件文臣皆係朝廷選差之人今來若有己見願面對者乞許輪對一次庶使臣下各得盡其所言而艱難之時亦少禆聖政之萬一也乃命輪對如二年之詔二年五月丙子詔行在釐務官得輪對八月丙申罷之是日張俊楊沂中引兵攻夀春府不克而還乙卯侍御史周祕奏貸遣所得之俘上曰祕此意甚善朕方痛念西北之民皆吾赤子進為王師所戮退為劉麟所殘不幸如此今當給與錢米然後遣之使歸翰林學士朱震翰林侍讀學士范沖各進官一等以建國公讀孟子終篇也於是本閣官武經大夫帶御器械卲諤已下及資善堂官吏各進一官資詔省部應平江府管內士民陳訴事件不拘常制許令受理用權户部侍郎王俁請也丙辰直龍圖閣知建康府葉宗諤升祕閣修撰中書言宗諤治效有聞民安其政故陟之龍圖閣學士知平江府章誼入對論平江之民所甚苦者在于催科之無法稅役之不均強宗巨室阡陌相望而多無稅之田遂使下户為之破産今欲革此二弊若責之監司則不過移文於郡守責之郡守則不過移文於縣令是三人者吏課叢委酬應多方雖有敏強之吏功不能專力所未暇況吏不盡才則又非徒無益也伏望眀降詔旨專委通判一員均平稅役先開首原之路次舉告陳之令詢考鈎稽責以期限賞信而罰嚴則二弊可革貧富俱安公私共濟矣乃命左朝奉郎添差通判府事孫邦措置後不果行詔江西制置大使司辟右迪功郎李琦上猶縣丞指揮勿行琦以李綱奏辟仍乞免避本路茶鹽官親嫌詔特許而言者謂丞闕當用京官琦攝官未及二考無舉主不在奏辟之數徇李琦而廢朝廷之法四臣切惜之命遂寢丁巳修武郎張勳特換右通直郎勳在劉光世軍中權主管機宜文字張浚言其有學行乃策試而命之戊午改廣州奉真觀為來逺驛以備招來諸國貢使己未趙鼎奏比見探報劉麟所起山東京畿人夫有自書鄉貫姓名于身而就縊者上曰何故如此鼎曰苦其力役耳臣昔在陜西親見調夫而民間大不聊生號哭之聲所不忍聞是以聖人常以用兵為戒仁宗皇帝勤儉積纍四十二年府庫盈溢下無貧民上曰他時事定願不復更見兵革庚申右司諫王縉言州縣和糴關子勘合繳連多所阻滯乞令只於關子背批鑿年月日州名用印給付任其行使從之右宣義郎賜緋魚袋李弼追二官改正章服弼自國子內舍生以進明堂頌授官校正御前文籍改秩賜服至是自言恐合審量故有是命是日都督行府摧鋒軍效用易青為廣東賊曽衮所執青不屈死之衮本軍士去為盜後受經略使季陵招安以為承信郎已而復叛至是經略使連南夫與摧鋒軍統制韓京會于惠州督諸兵討之京募敢死士七十三人夜劫衮營青在行中為所執賊驅至後軍將趙續寨外謂續曰汝大軍為我所擒者甚衆青大呼曰勿信所擒者我耳賊又言我不汝殺苐令經略持黃榜來招安易青呼曰勿聽任賊殺我我惟以一死報國家賊怒焚之青詈不絶口而死青無妻子事聞特贈保義郎閣門秪候官為薦祭焉青贈官在十二月癸卯辛酉左從政郎王湛循二資湛獻負薪論於朝起居郎權給事中張燾言其人可用故也按此王湛有二人其一人進士出身紹興十一年除軍器監主簿其一人從軍補官紹興十一年為樞密院計議官此乃有出身者也壬戌直祕閣知雅州李革為陜府西路轉運判官廢梅州為程鄉縣𨽻潮州又廢長樂縣為鎮時梅州之北四百餘里地不耕種人無室廬而長樂户口不滿數百故用諸司請而廢之十四年復梅州詔太平州編管人范燾移惠州編管燾初以上書詆誣昭慈聖獻皇后奪官編置至是復獻書張浚詆毁大將故竄之此恐是言劉光世當考是日日中有黑子癸亥張浚遣左承議郎行府書寫機宜文字計有功來奏事後二日除直祕閣遣還初趙鼎得政首引浚共事其後二人稍有異議賓客往來其間遂不協及楊沂中奏捷鼎即求去位上不許鼎因曰臣始初與張浚如兄弟近因吕祉輩離間遂爾暌異今同相位勢不兩立陛下志在迎二聖復故疆當以兵事為重今浚成功淮上其氣甚鋭當使展盡底藴以副陛下之志如臣但奉行詔令經理庶務而已浚當留臣當去其勢然也浚朝夕還俾臣奉身而退則同列之好俱無所傷他日或因物議有所去留則俱失之矣上曰朕自有所處卿勿為慮鼎曰萬一議論紛紛曲直殽亂是時陛下必不祕今日之言臣狼狽無疑矣陛下即位以來命相多矣未有一人得脫者豈不纍陛下考慎之眀乎上徐曰俟浚歸議之浚奏車駕宜乘時早幸建康鼎與折彥質並議回蹕臨安以為守計上許之朱熹撰張浚行狀云公未至平江時鼎等已議回蹕臨安公入見之次日具奏云上翻然從公計今掇取附此為吕中大事記建炎二年幸揚州三年幸杭州此汪黃之也然自眀州而航海幸越幸平江亦汪黃為之乎自紹興八年定都臨安不復進都此秦檜為之也六年浚獨相乃有建康之幸七年鼎獨相已有駐蹕臨安之議亦檜為之乎胡寅有言陛下父兄在金中日夕南望曰吾有子弟為中國帝王吾之歸有日矣痛為愁苦屈辱之中發此念為此言于今三年日迫日切而獻謀奉慮之人方導陛下南狩日逺日忘遂無復讐之心别求建都之地臣所未諭不得已則如張浚所謂都建康則北望中原常懷憤惕可也今乃息心於一隅何義哉故左武大夫貴州防禦使郝仲連贈中侍大夫眀州觀察使更與七資恩澤始録河中死事之勞也事見建炎元年五月江南東路提舉茶鹽常平公事吳序賓乞去嵗本路三州旱歉流移歸業之人與免差役一次從之十有一月乙丑朔進士詹叔霆特免文解一次仍賜帛三十匹叔霆玉山人嘗投匭上書且獻平定策樞密院檢詳諸房文字王迪言其可採故旌録焉太常諡故贈少保种師中曰莊愍丙寅故中大夫范純禮再贈資政殿學士其合得恩澤依數貼還以其家有請也後諡恭獻純禮元符尚書右丞黨籍執政苐二十二人徐州居住權主管殿前司公事楊沂中言近𠞰殺劉猊賊馬盡淨生擒簽軍萬餘人已將強壯之人團結入隊天寒無衣詔有司製綿裘四千授之丁卯左司郎中耿自求言殺人者死古今不易之典也吏緣為姦迎合時好希覬賞典不以情實例奏可憫茍盡原貸生者即幸矣奈死者寃抑何願詔監司州郡今後詳究可憫之理謂所以傷人不應致死偶而致死者方為可憫若因鬬爭毁詈復有用棒刃手足等殺人致死則相犯各有輕重尚何情之可憫乎仍乞詔憲司州郡如案情疑慮誤用法意能雪活人命自合依舊日賞典施行庶幾絶官吏希覬之望使生者死者均被聖眀平允之澤詔刑部看詳申省太常諡王巗叟曰恭簡以其孫右迪功郎循友有請也戊辰左宣奉大夫守尚書右僕射同中書門下平章事兼知樞密院事都督諸路軍馬兼提舉詳定一司敕令張浚特遷左光祿大夫以祿秩成書也浚固辭不許請回授其兄右承事郎直徽猷閣滉于是資政殿學士提舉臨安府洞霄宫沈與求乞以經修一官回授兄右迪功郎夢求上皆許之中興後輔臣以進書恩回授親屬自此始浚乞回授在是月甲申與求乞回授在十二月甲辰詔應轉對官如有疾故許實封投進文字更不引對起居舍人吕本中引疾再請奉祠不許本中言自古中興必有根本之地以制四方之地必有根本之兵以制四方之兵今都邑未定禁衛單弱望諭大臣先求二者之要而力行之武經郎閣門秪候知夀春府孫暉特遷武功郎閣門宣贊舍人録堅守水寨之勞也暉言本府進士金覺贊畫有方乃以覺為下州文學己巳右奉議郎知濠州韓元傑以軍儲無闕遷一官停官人鄭漻上書言用兵急切邊機利害二策詔漻敘故官為左從政郎右宣教郎蘇籕知大宗正丞籕轍孫也起居郎權給事中張燾言比罷待闕寺監等官二百餘人蓋欲慎選才能天下莫不拭目以觀新除而籕乃以專事馳騖干請權貴無恥而得之士論紛然以為不可遂罷其命庚午詔張浚召還行在所令學士院降詔上又别賜手書遣內侍勞問仍以端石硯筆墨刀劒犀甲賜之辛未中書舍人兼直學士院兼侍講陳與義為翰林學士趙鼎事實曰張浚既因羣小離間遂有見逼之意會中書舍人陳與義不樂于鼎遂傾心附之乃以資善引范沖之説告之浚以為竒貨劉子羽與聞其事嘗為人言之左司諫陳公輔請措置宫廟之官毋使太濫曽任侍從以上俸給優者捐之曽經除名編置罪惡重者罷之百官祿料米麥數多亦當酌中例與折減詔堂除宫觀依已得旨除見任郡守前侍從外非吏部格者令御史臺彈奏癸酉湖北京西宣撫副使嶽飛奏依奉處分往江州屯駐上曰淮西既無事飛自不須更來趙鼎曰此有以見諸將知尊朝廷凡所命令不敢不從上曰劉麟敗北朕不足喜而諸將知尊朝廷為可喜也熊克小歷先是詔湖北京西招討使嶽飛駐江州癸酉飛奏已至按此止是飛起發未至江州也上語云飛自不須臾來則必止其行矣當考丙子左朝請大夫直祕閣新知宣州李健右中大夫直祕閣新知袁州汪召嗣並降一官放罷健等為劉光世軍中謀議官金之入犯也自廬州遁歸且勸光世退保采石至是張浚言健等久在軍中坐食厚祿倉皇南渡上下解體故罷之中書舍人董弅奏二人議罪施行當坐軍法今日正大明賞罰以警中外之時不容輕貸乃又降一官丁丑觀文殿學士行宫同留守孟庾自臨安來朝翌日辭還都督行府關立定回易庫官賞格凡本錢萬緡嵗中收息及六分賞錢二百千遞增及十分賞錢千緡本錢五萬緡已上各更轉一官不及六分令檢察司取戒飭不及五分申行府當議酌情行遣仍勒令陪還從之左文林郎新敕令所刪定官鄭剛中引對剛中言陛下臨御十年寬刑罰省科徭戒貪贓恤飢窮嚴警備每一詔下丁寧懇惻而德澤未遍者蓋天下有虛文之弊臣願為士大夫下勵精之詔許自今宣布實德視斯民利害如在其家不得以虛名文具欺罔朝廷使陛下之誠意被覆赤子之身而不在于官府文書之上翌日輔臣進呈上曰近所引對多是人才朕雖得珠玉珍玩不足為寶但冀一嵗之間得十數輩人物乃足為寶也又翌日以其言令學士降詔出榜朝堂遂以剛中為左宣教郎充樞密院編修官上語在是月戊寅降詔在己卯剛中改官在辛巳今聫書之戊寅右司諫王縉言切見朝廷拋降軍須之類諸路州縣承受鮮有不均之民間者緣朝廷有不許科敷之文監司不敢任科敷之責而責之屬部知通復不敢任責而委之屬縣令佐欲避其名則付之胥吏姦弊百出無不至矣若自今以後應和糴糧斛之類有不免均之人户者逐縣各具承受之數以編户計之少則均及上户逐等分上中下三等各若干多則用物力或苖稅通計每若干貫石當若干零數與免逐鄉開人户姓名逐户具合買數目并官給價錢真書大字榜之通衢使民間知其無廣拋之數則胥吏無所容其姦豪右不得計囑而幸免善弱下户無倍出之患矣從之詔諸路宣撫司屬官許本司奏辟或朝廷差除內京官並以二年為任願留再任者取旨時議者以為自兵興以來士大夫一入軍中便竊議而鄙笑之指為濁流皆緣朝廷未知審擇一聽其辟差故所用之人或坐罪廢或報私恩或因應副或出干求貪利覔官略無去就之節有更十年而不退者故條約焉右宣教郎知虔州信豐縣彭合轉一官俟任滿日與升擢差遣合廬陵人守臣孫佑奉詔薦其材略有餘盜不入境故有是命故左朝議大夫孫諭特贈左中奉大夫以其曽孫右朝奉郎致仕偉乞以覃恩一官回授也偉先見建炎二年諭為吏廉紹聖初引年告老有司以諭子孫皆亡不許蔭補遂絶祿仕湖北諸司上其事請官其曽孫偉以為天下廉吏之勸奏可著為令封嘉陵江神為善濟侯江自鳳州之梁泉歷興利閬果合恭以入大江川陜宣撫副使吳玠言正係餉軍漕運水路望加封爵故也庚辰上諭大臣曰司馬光𨽻字真似漢人近時米芾輩所不可髣佛朕有光𨽻字五卷日夕置之座隅每取展玩又所書乃中庸與家人卦皆修身治家之道不特玩其字而已趙鼎曰如光所謂動容周旋中禮而無纎毫遺恨者也詔韓世忠駐軍淮上簡練有方金豫畏服不敢輕犯令學士院降詔遣內侍盧祖道往軍前撫問仍以銀合茶藥賜之右修職郎趙衛特賜同進士出身為諸州教授以薦對也壬午左從事郎黃豐為敕令所刪定官豐初見建炎元年二月四川制置大使席益上漕運六策令學士院降詔奬諭初宣撫副使吳玠以水運稽留欲從陸運而都轉運使趙開以其費大難之上命益措置至是益言蜀中民已告病而軍尚乏食詳觀弊源圖所以救之不一而足所以奏請轉般欲于上流水澀之時併運在閬利近處春水生後一發運至軍前庶免如今年夏秋頓至闕絶一也又奏請于利閬州就糴入中庶免如今年多支腳錢而運逺路之貴米二也又于瀘敘嘉黔等州打造運船及自用收拾水流木斫伐官地木造船庶免向來虜船之弊致客旅逃避棄毁其船官失指凖三也秋初于閬州急糴萬斛以應軍前急闕又遣官于軍前計議梁洋就糴十萬石庶免如向來陸運之弊人民役死田菜多荒又得軍前早有糧餉四也行下三路漕司任責起發合運之米自五月後來至今在倉米數起發將盡庶免如向來積米在倉軍前告之五也又差本司屬官賫錢物往瀘敘恭涪依私下糴買新米就近發赴軍前却于西路水運最逺去處兊樁米數省水運舟船之費而民無科糴之苦六也時開已召而未去亦言制司就果閬市軍儲非是已見今年八月癸卯議者又謂伐木造舟于邉禁非宜李弼直奏請而玠與益相疑事亦竟止是冬復行陸運名曰支移民間率費七十千而致一斛糧夫死者甚衆支移事以明年七月馮康國所奏修入乙酉詔隴右郡王趙懷恩令四川制置大使司月支供給錢百千先是懷恩自熙河入蜀依閬州宣撫司及司廢席益奏徙居成都久之乃有是命丙戌起居舍人吕本中兼權中書舍人時有監階州倉草場苖亘者以贓獲罪黥之本中奏曰近嵗官吏犯贓多抵黥罪且既名士人行法之際宜有所避况四方之逺或有枉濫何由盡知若遽施此刑異時察其非辜雖欲深悔亦無所及矣論者皆以嚴刑上法祖宗夫祖宗之時臨機制變事有不得已也然自神宗而降寬大之政久已成風纍聖相承不敢輒易今一旦盡改成法欲用祖宗權宜之制將重失人心臣未見其可也又此刑既用臣恐後世不幸姦臣弄權必且借之以及無罪直言私議亦不能免何者用之已熟彼得藉口不以為異也使國家此刑不絶則紹聖以來憸人盜柄搢紳遭此殆無遺類矣願酌處常罰以稱陛下仁厚之意疏再上從之苗亘事日歷不載會要矜貸門亦無之今以本中奏議附入按夲中明年四月罷去此事必在數月之間故因其兼權書命書之當求他書别係本日丁亥日中黑子沒戊子諸王宫大學生不微特遷一官不微濮安懿王後南班官士夽子也母病割股肉為羮以進故褒之己丑故翰林侍讀學士王洙之孫楚老獻仁宗皇帝所賜飛白字及御書賜銀帛百匹兩洙在翰林仁宗問今嵗科舉內中合要奏告文宣王及諸賢表章趙鼎奏此事不見于他書上曰祖宗留意人材如此天下安得不治直祕閣京東淮東宣撫處置使司參謀官王㬇兼都督行府隨軍轉運副使庚寅湖北京西宣撫司參議官李若虛以所擒偽知鎮汝軍薛亨等赴行在上引對進若虛官賜章服仍釋亨罪命以官付飛軍中使喚後四日擢若虛荆湖北路轉運判官若虛除漕在十二月甲午今聫書之其遷官賜服日歷不書又日歷止云薛亨放罪而嶽侯傳云上赦薛亨等賜銀絹并各人官資上更賜一官付侯軍中使喚故附此若虗遷官賜服以周祕劾疏修入辛卯祕書省正字朱敦儒兼權兵部郎中行在供職進士朱昉應詔上書謂地震咎由失信中書後省奏其言眀切有補治道詔永免文解仍賜帛三十匹昉無錫人也壬辰上書大成殿榜賜成都府學官用左迪功郎新府學教授范仲殳請也仲殳成都人奏疏言本府學殿建於東漢之初平漢人以大𨽻記其修築嵗月刻于東楹至今九百四十三年蓋天下棟宇之古無過于此者上從其請命仲殳就持以歸左承議郎知邵武軍趙子木至官言利害詔特減二年磨勘日歷不載子木階官今以武陽志增入髙麗將入貢先遣持牒官金稚圭劉待舉來朝廷懼其與金人為間是月詔賜稚圭等銀帛各百匹兩及衣帶器幣而遣之于是稚圭至眀州而反日歷無此今以會要及吳芾奏議參考修入初劉麟等既敗歸金人遣使問劉豫之罪豫懼廢猊為庶人以謝之于是金人始有廢豫之意矣熊克小歷于是金廢豫之意決矣此蓋因張匯節要所云也考之諸書金人前此未有廢豫之意今略修潤附入豫之初出師也偽知臨汝軍宋著部夫後至麟斬之納其女于豫繼斬使臣趙倚語人曰吾已去趙宋矣識者曰趙宋如是不可去矣麟竟敗去豫又免偽知濟南府劉復官徙知淮陽軍劉觀為東路留守其妻弟翟綸為南路留守建炎以來繫年要録卷一百六建炎以來繫年要録卷一百六金人地名考證阿哩雅貝勒原書作訛里也字堇與金史同並誤今改正
