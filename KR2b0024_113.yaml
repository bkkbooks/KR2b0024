body:
  text: 建炎以來繫年要録卷一百十三宋李心傳撰紹興七年八月按是月辛卯朔壬辰張浚奏探報偽齊簽軍自六十以上則減之五十以下則增之科條之煩民不堪命出軍之際自經於溝瀆者不可勝計上蹙額歎息曰朕之赤子至於如此當思有以拯救之可諭江淮諸郡凡歸附者加意撫納厚與賙恤勿令失所以稱朕意癸巳上與執政論漕臣能否因及向子諲上曰帥府舊僚往往淪謝惟汪伯彥實同艱難朕之故人所存無幾伯彥宜與牽敘張浚奏陛下念舊如此實甚盛之德但伯彥無所因而牽敘則必致紛紛恐非徒無益臣等已商量俟因大禮取旨更得親筆數字為明帥府舊勞庶幾內外孚信上曰俟到九月當復職與郡伯彥之未第也嘗受館於王氏秦檜從之學而浚亦伯彥所薦故共贊焉中書舍人張燾起居郎樓照以嘗論駮張滉賜第事不自安皆求去不許言者繼論之乃以燾為集英殿修撰提舉江州太平觀後省題名燾以八月除職奉祠而日歷不載今因燾乞去遂書之或可移附乙未日並除兩舍人之後乙未少保江南東路宣撫使張俊為淮南西路宣撫使盱眙軍置司保成軍節度使主管殿前司公事楊沂中為淮南西路制置使右武大夫開州團練使權主管侍衛馬軍司公事劉錡為淮南西路制置副使並廬州置司時吕祉至廬州而酈瓊等復訟王德于祉祉諭之曰若以君等為是則大相誑然張丞相但喜人向前儻能立功雖有大過彼亦能濶略况此小嫌疑乎於是密奏乞罷瓊及統制官靳賽兵權乃命二帥往淮西召瓊等還行在鄭克撰吕祉行狀稱祉密以利害聞於廟堂未可易將分軍與諸書全不同詳具八月戊戌注顯謨閣待制提舉亳州明道宫曽開徽猷閣待制提舉江州太平觀趙思誠並為中書舍人思誠嘗除舍人坐其父挺之直陳紹述為言者所論至是張浚復用之權尚書兵部侍郎兼都督府參議軍事權湖北京西路宣撫判官張宗元為徽猷閣待制樞密都承旨嶽飛復任宗元乃還既對遂有是命司農少卿樊賔罷知袁州左朝議郎常明為祕書省正字明自西充丞召對䇿試而後命焉明以今年六月辛卯降旨就試按是時校書多不試而正字有試者不知何故也丙申尚書戶部員外郎霍蠡轉一官用權湖北京西宣撫判官張宗元奏也日歷惟此日宗元繫宣判銜蠡在鄂州應副嶽飛軍錢糧宗元言其奉公守正故特遷焉先是飛數言軍中糧乏乃命蠡按視至是蠡言飛軍中每歲統制統領將官使臣三百五十餘員多請過錢十四萬餘緡軍兵八千餘人多請過一千三百餘緡總計一十五萬餘緡於是右正言李誼言蠡職在出納理當究心然慮點檢苛細若行改正却合支劵錢六萬餘貫才省九萬緡而已望令依舊勘支務存大體以副陛下優恤將士之意蠡奏不得其日今因其轉官遂書之熊克小歷繫之去年八月戊子蠡初受命時誤矣是時李誼止為監察御史今年七月方除正言此假或可移附今年十月戊戌蠡入對之日但是時乃淮西軍變後恐不應議裁減更須詳考詔知桐城縣魏持知太湖縣張鼎知武昌縣唐時俟秩滿並令入對以權湖北宣撫判官張宗元言其政績也先是樞院計議官李宷奉詔行視江淮營田還言其不便又論持及知泰興縣李慥違法殃民比之諸邑尤甚望黜責之張浚不樂宷得監西京中嶽廟而去於是宗元奏持為政有惠愛淮南諸司亦上慥治狀於朝乃令再任焉注此見李宷本末宷明年三月自嶽廟除察官未知其罷日今附此按王弗樊賔之罷去此不逺必相先後也持明年九月為張戒所論丁酉左從事郎朱松特改左宣教郎為祕書省校書郎松婺源人以薦者得召見言自昔中興之君惟漢光武可以為法晉元帝唐肅宗可以為戒元帝東渡賞刑失中強臣跋扈晉室終以不振肅宗雖復兩都而急於罷兵是以終唐之世不能取河北上曰光武固無可議若元帝僅能保區區之江左略無窺取中原之心而肅宗猶能克復兩都再造唐室則肅宗為優然肅宗當明皇西幸既不能扈從以行晚復惑於張后李輔國之讒而虧人子之行此其可恨也四川制置大使席益復與都轉運使李逮有違言交訴於上詔川蜀去朝廷甚逺全藉兩司協濟國事今覽益逮所奏務為嫌隙必致生事深以為憂可令學士院賜詔戒諭仍當深體朕意毋得因今旨在告待罪妨廢職事詔四十大邑許通除選人供給依職官例代還甄擢如先詔戊戌張浚進呈顯謨閣待制知荆南府王庶復徽猷閣直學士上曰庶嘗云今天下不可專用姑息要當以誅殺為先謂朕太慈聞仁宗皇帝嘗云寧失之太慈不可失之太察此祖宗之明訓也今百姓犯罪自有常法何以誅殺為先乎浚等曰聖人三寶一曰慈未聞以慈為戒也庶學識淺陋不知大體浚因奏偽齊尚用本朝軍器上曰祖宗有內軍器庫在誗門幾百間所藏弓弩器甲不可勝計及軍器庫在酸棗門外數亦稱此原祖宗置庫有內外之異及弓弩弦箭亦各異藏分官主之皆有深意陳與義因奏頃為澶淵教官嘗見甲仗甚盛日久不用往往朽敗上曰此等物得不用亦美事也是日中侍大夫武泰軍承宣使行營左護軍副都統制酈瓊叛執兵部尚書吕祉祉簡倨自處將士之情不逹徐夢莘北盟會編云祉舉止驕傲不諳軍旅統制官有兩使有正使者橫檛唱喏祉頷應之有伺候終日稱歇息喫食調弄聲樂之類不得見者其下多憤怒按祉此時不將家以行所云調弄聲樂之類恐當求他書參考惟熊克小歷云説者皆曰祉簡倨自處將士之情不逹今從之淮西轉運判官韓璡舊在劉光世幕中光世待之不以禮至是諸校或以罪去趙鼎逸事曰張浚自當國引吕祉為援除兵部尚書復用韓璡為淮南漕璡嘗倅建康日劉光世待之不以禮又常為其屬劉覿所辱積此二忿故力建議罷光世軍遂以祉代為宣撫判官祉為人剛愎自任昧於應變既代光世謂執政可跬步而得璡亦狠傲志在復仇故李著王默光世所厚也悉以罪去王德者光世之腹心也酈瓊者光世所招徠之盜也光世以瓊屢立竒功待之與德等祉慮其部曲難制故專任德以悅軍情瓊不自安會祉密奏朝廷乞罷瓊及靳賽軍權吏朱昭漏謀於瓊瓊賽懼翌日殺祉舉軍奔偽齊祉聞瓊等反側奏乞殿前司摧鋒軍統制吳錫一軍屯廬州以備緩急又遣璡詣建康趣之鄭克作吕祉行述曰公往合肥護諸將還朝奏事懇切皆寢不報留行朝再浹旬上令執政諭旨且暫往續有處分復遣中使抑賜鞍馬犀帶象笏撫諭甚寵皆非從官故事蓋示將欲大用也公拜賜退語家人曰君命如此義不可辭勢須即往一死固不惜苐恐議論不定無益於國家耳與其妻孥相對涕泣如訣别然蓋以事有牙蘖往不保還故也合肥一軍如酈瓊輩將校兵卒皆故羣盜也居則蠶食動則鴟張光世紀律不嚴暴橫殊無畏忌其所憚者惟王德耳十月除王德都統制然瓊輩與德等舊為等伍者恥受其節制也乃列狀詣都督府數其過而訟之並乞回避都督府謂德為直故寢不行瓊等又詣御史臺或語之曰爾輩如此是訟宰相迹甚危矣遂憂懼不自安一旦瓊等二十人橫檛趨庭哀訟於公曰不合極惱朝廷今日未知所告尚書救取某等公令升階慰諭之曰若以公等為是則大相誑然此事尚可醫治蓋張丞相但喜人向前耳儻能向前立功雖有大過者彼亦濶略况此小嫌疑乎當力為諸公辨之保無他慮切不可置胸中也詞直意誠衆皆感泣于庭下曰誠如尚書之言某等誓當效死圖報其事遂定公見德與瓊等輩如氷炭然乃密以利害聞於廟堂且加撫循徐為措置未可遽易其將驟分其軍尋有旨召王德諸將皆喜謂德之往必有行遣而公所言不妄矣先是嘗薦趙不羣為淮西帥且乞吳錫一軍廬州駐劄凖備緩急又遣轉運判官韓璡詣建康而屬之日諸將反側幸已定矣然有他議則必愈乖煩賢子細白知宰相此可見公慮之周也時都督府機宜蓋諒别因職事經過合肥璡乃問公蓋幕歸去曽令説否公曰亦曽屬渠苐恐不敢盡逹此意復煩開陳曲折諒果不敢盡言璡行至和州以疾作滯留已而諸將聞王德留都督府為都統制且錫賚極優渥瓊等皆觖望曰我初訟彼罪也今彼既受賞我必有罰首領且不保矣於是始萌叛意時有旨除張俊楊沂中劉錡三人為淮西宣撫使副判官軍中已傳聞而八月七日金字牌指揮令易置分屯次日瓊等遂叛按日歷八月八日戊戌有旨韓璡令閣門引見上殿與克所云略同今從之但所言祉事亦多緣飾恐須詳考徐夢莘北盟會編云楊沂中遣巽錫先以兵往淮西察其動靜瓊等覺之按此時錫實未至今剛潤修入瓊聞頗有異志統制官康淵曰朝廷素輕武臣多受屈辱聞齊皇帝折節下士士皆為之用衆皆不應猶相視以目先是統制官王師晟戍夀春挈營妓去其家訟于祉時將士方不安祉之政師晟乃與瓊及統領官王世忠張全等謀作亂已上並據徐夢莘會編祉之乞罷瓊與靳賽也其書吏朱照漏語於瓊此據趙鼎逸事瓊令人遮祉所遣置郵盡得祉所言軍官之罪瓊等大怨怒此據徐夢莘會編前一日被旨易置分屯此據祉行狀按張俊等以乙未日除宣撫制置至此三日正當被受所謂分屯乃瓊等被召之旨也瓊被召不見於諸書以今月十一日手詔修入康淵曰歸事中原則安矣詰朝諸將晨謁祉坐定瓊袖出文書示中軍統制官張景曰諸兵官有何罪張統制乃以如許事聞之朝廷邪祉見之大驚欲退走不及為瓊所執有瓊之黃衣卒者以刀斫瓊中背瓊大呼曰何敢爾顧見有執鐵檛者瓊取以擊卒斃於階下瓊親校已殺景於廳事又殺都督府同提舉一行事務喬仲福及其子武略大夫嗣古統制官劉永衡友遂執閣門祇候劉光時率全軍長驅以行已上並據徐夢莘所編其張景以下官職則以日歷增入但夢莘以衡友為邢友蓋字誤至州東樓下祉謂瓊曰若祉有過失當任其咎奈何乃如此負朝廷此據張宗元所奏軍士縱掠城中而去時直徽猷閣前知廬州趙康直祕閣修撰知廬州趙不羣皆為所執此據徐夢莘會編既而釋不羣歸蓋不羣至官未旬日無怨憾於軍中故也此亦據徐夢莘會編但稱瓊至霍邱縣殺祉而縱不羣歸則恐誤按張宗元所申祉以十三日被殺而日歷八月十二日壬寅知廬州趙不羣申已回本州則是不羣未至霍邱先得歸也今併附此日瓊遂以所部四萬人渡淮降劉豫熊克小歷云瓊以全軍七萬人北走降劉豫趙鼎事實云瓊以全軍五萬之衆歸於豫張戒奏上語云淮西失精甲四萬日歷云失三萬人數皆不同按光世一軍王德所部八千人已還建康其餘必無此數趙甡之遺史亦云四萬人似得其實今從之己亥吳國長公主言妾選尚潘正夫三十年矣伏見祖宗以來駙馬都尉如石保吉魏咸信柴宗慶皆除使相見今戚里亦多得之正夫歷事纍朝於靖康圍城中首乞迎立陛下早正大位又於杭州召對嘗言陛下倉卒渡江禁衛未集預宜防變今望特除開府仍將檢校少保落檢校字詔近除士㒟開府儀同三司係任宗司十年合依故事劄與本位都監自後毋得妄有陳請庚子中衛大夫秀州刺史京東淮東宣撫處置使司前軍第三將魯彥降橫行遙郡七官令本軍自效彥嘗幽軍吏韓全絶其食而死為韓世忠所按故黜之辛丑上始聞淮而失師手詔賜酈瓊等曰朕躬撫將士今逾十年汝等力殄冦讎殆將百戰比令入衛於王室蓋念久戍於邊陲當思召汝還歸方加親信豈可輒懷反側遂欲散亡儻朕之處分或未盡於事宜汝之誠心或未逹於上聽或以營壘方就而不樂於遷徙或以形便既得而願奮於征戰其悉以聞當從所便應廬州屯駐行營在護軍出城副都統制以下將佐軍兵詔書到日以前犯罪不以大小一切不問並與赦除熊克小歷書壬寅淮西奏至蓋不考此手詔也壬寅張浚見上引咎上曰失三萬人不繫國安危譬猶臨陳折傷亦是常事卿等不可以此介意當益鎮安人心激厲士氣以為後圗浚曰去年劉麟賊兵一敗塗地無慮殺數萬人亦復能軍况軍將時有叛亡亦所不免要是臣非才誤國上貽聖慮今聖志先定臣復何憂敢不黽勉以圗報效趙鼎事實曰劉光世既罷其下已不安當軸者俾吕祉者以都督府參議官總其事祉不嫻軍旅措置不厭衆心既又除劉錡制置副使楊沂中制置使張俊宣撫使劉光世將酈瓊懼併其衆以全軍五萬之衆歸於豫報到中外皇駭莫知所措意瓊挾豫衆為倒戈之計當軸者謂參知政事陳與義張守曰萬一侵犯使上往何地避之與始議移蹕建康氣勢不同矣遣中使以銀合茶藥勞賜新淮西宣撫使張俊且犒修城將士時俊在盱貽未受命也是日兵部尚書都督府參謀軍事吕祉為酈瓊所殺先一日瓊與其衆擁祉次三塔距淮僅三十里祉下馬立棗林下謂曰劉豫逆臣我豈可見之衆逼祉上馬祉罵曰死則死此爾等過去亦豈可保我也軍士聞之有傷感咨嗟者瓊恐搖衆心乃急䇿馬先渡淮至霍邱縣令統領官尚世元殺祉世元以刃刺祉且顧統領官王師晟師晟不肯祉罵瓊不已遂碎首折齒而死年四十六於是直徽猷閣趙康直亦為所害世元斬祉首示瓊瓊摽之木末祉從者江渙取而埋之主管馬軍司公事劉錡殿前司摧鋒軍統制吳錫尋至廬州以兵追之不及上遣樞密都承旨張宗元往招叛卒制置使楊沂中聞瓊已渡淮乃遣人持羊酒相勞苦於是錡復還濠州甲辰御筆觀文殿大學士兩浙東路安撫制置大使兼知紹興府趙鼎充萬夀觀使兼侍讀疾速赴行在是日張浚留身求去位上問可代者浚不對上曰秦檜何如浚曰近與共事始知其暗上曰然則用趙鼎遂令浚擬批召鼎檜謂必薦已退至都堂就浚語良久上遣人趣進所擬文字檜錯愕而出浚始引檜共政既同朝乃覺其包藏顧望故因上問及之詔新除崇政殿説書尹焞疾速赴行在以焞再辭除命故也起居郎兼權中書舍人樓照充祕閣修撰知溫州照為言者所劾力上疏請奉祠上謂輔臣曰朕固深知照但言者不已恐非所以愛惜人才冝暫令去除職與郡三數月間召用未晚也朕於人才惟恐傷之彈擊不已非照之福乙已故右宣教郎知筠州髙安縣步汝霖特贈右承議郎官一子故迪功郎髙安縣尉李𣆀年特贈右從事郎與一子下州文學先是劇冦熊清作亂汝霖等統民兵射士與戰為所執死焉帥臣李綱上其狀於朝故有是命是日偽齊劉豫得酈瓊降報大喜先是豫聞王師移屯遣偽户部員外郎韓元英乞師於金主亶以我師進臨長淮為詞欲併力南冦金主亶不許至是潁昌馳報喜旗至言江南劉相公下全軍人馬及淮西百姓十餘萬來歸附已交收器甲接納矣豫乃命粉飾門墻增飾仗衛以待其至又命偽戶部侍郎馮長寧為接納使偽皇子府選鋒統制李師雄副之此以偽齊録及徐夢莘北盟會編參修熊克小歷云元英乞師未回而酈瓊降豫偽齊録云七月間人回探報王師北征遣韓元英乞師大金金人不許今從之丙午左朝奉大夫主管建寧府武夷山沖佑觀趙令襟行尚書都官員外郎令襟令嵗弟靖康初為軍器少監坐言事斥至是復用之丁未張浚論淮西地勢險阻可以固守陳與義曰見王德呈淮西圗道路幾不可方軌上曰地形雖險亦在將兵者如何耳李左車謂井陘之道車不得方軌騎不得成列韓信卒由井陘口以破趙軍要是險阻不足恃也給事中兼直學士院胡世將言舊制常平錢義倉米皆有專法不許支撥近年以來州郡急於軍期侵借殆盡朝廷雖有立限撥還指揮緣在窘乏終無可還之理今既張官置吏自合舉行舊制務興實利截日將見在錢穀及以後所收之數專一樁管仍委主管官逐季巡察如有借兊之數即剗刷本處係省錢物撥還申提舉官將擅支官吏按劾除義倉合備水旱外其常平錢專充糴本朝廷亦宜權住支取並令趂此豐嵗盡數糴米别倉收貯不得與漕司米相雜遇春夏之交民間貴糴之時比市價量減錢出糶如此積三五年官本既豐糶糴增廣則可以低昂百貨劉晏所謂常操天下贏資以佐軍興者可復見矣然後寬留糴本而取其贏餘以濟緩急之用如此雖無目前之近利而有無窮之實效所謂富國而民受其利者實在於此詔户部看詳申省寶文閣學士知廣州連南夫特進一官仍賜詔奬諭以招捕惠賊曽衮之勞也後數日南夫言今水陸别無大冦乞收還便宜指揮從之是月癸丑降旨戊申權禮部侍郎吳表臣言科舉校藝詩賦取其文䇿論取其用二者誠不可偏也然比年科舉或詩賦稍優不復計䇿論之精粗以致老成實學之士不能無遺落之歎欲望特降諭旨今年秋試及將來省闈其程文並須三場參考若詩賦雖平而䇿論精博亦不可遺庶幾四方學者知向慕不徒事於空文皆有可用之實輔臣進呈上曰文學政事自是兩科詩賦止是文詞䇿論則須通知古今所貴於學者修身齊家治國以治天下專取文詞亦復何用張守曰此孔門四科所以文學為下科也乃如所奏行下己酉尚書左司員外郎李彌遜為起居郎右司員外郎勾濤守起居舍人賜吳玠漢中田二十頃辛亥贈故中侍大夫榮州防禦使熙河蘭廓路兵馬都鈐轄喬仲福為保信軍承宣使故降授武功大夫恩州刺史兼閣門宣贊舍人張景為光州觀察使故武功大夫果州刺史劉永故武功大夫吉州刺史衡友並為右武大夫亳州觀察使皆録淮西之死也瓊之叛也將官成忠郎張遇不從率其麾下四十餘人歸夀春詔遷遇一官熊克小歷以衡友作史衡恐字誤又稱辛亥張遇至建康詔轉一官按日歷上是夀春府申遇未嘗至建康也壬子詔祕閣修撰知廬州趙不羣俟淮西轉運判官韓璡至本州日暫赴行在癸丑贈吕祉資政殿大學士例外官其家二人加賜銀帛五百匹兩先是樞密都承旨張宗元至廬州而祉之從校江渙馬師謹言其死狀宗元具以聞故有是命時有得祉括髮之帛歸吳中者其淑人吳氏持之自盡以殉葬聞者傷之吳氏事以張祁廬州百韻詩修入觀文殿大學士趙鼎奏辭新命上不許繼遣中使往紹興宣押赴行在又以御劄趣行此以鼎奏議修入日歷並無之權禮部侍郎陳公輔言淮西軍叛或謂朝廷緣此諸事稍沮見謀改圗不知今日當如何耶謂帥不應罷將復任之耶謂兵不可馭將姑息之耶謂大臣無謀將别用之耶謂進臨建康為失將回蹕耶此皆徒為紛紛未見有益臣謂正當鎮靜使敵無所窺於是張浚求去位故公輔請對論之左宣教郎金安節召對論士大夫茍且之弊且言編刪計議廷評等官多用選人蓋取其才不論資序比乃令改官即罷往往到任一年皆去則是朝廷設此特為選人改官之地而已不幾示人以茍且乎又言軍興以來言利者日益衆然皆瑣碎掊尅而無益於國之大計為今之計獨有推行營田之䇿以省邊地轉輸抑奢長儉簡事恤費命郡邑守長禁遊惰招流亡興瀦澤蓄泄之利以備水旱使民敦本力農以廣播植庶幾田野闢而穀粟多緩急有以供公上之求而無咨怨是為長久之䇿如目前匱乏不免下取於民莫若昭然布告使知所以取之之意不必避科斂之名而别為之法也如避其名而别立法以取之則事益多文書益繁不唯胥吏得以為姦而重困吾民且示天下以不誠非所以感人心而孚萬邦也甲寅中書言命官犯贓抵死祖宗之時間有杖脊刺面係一時酌情斷遣近來刑部引為常例甚非朝廷欽恤之意詔自今似此案狀令刑部更不坐例止申朝廷酌情斷遣自是贓吏不復黥配矣進士閻夏特補右迪功郎令引對夏獻六論故䇿試而論之乙卯詔來年禮部奏名進士依祖宗故事更不臨軒䇿試先是祠部員外郎兼權禮部勾龍如淵引天聖治平諒暗故事為請召侍從討論吏部尚書孫近等言皇帝臨御天下發號出令已踰十年即與前世嗣君新立諒暗不言事體不同所有將來御試貢士乞用臨軒之制奏可是月辛丑行下未幾權禮部侍郎陳公輔入見請罷經筵䇿士等事以為三年之內凡涉吉禮者皆未冝講上以為然公輔乞罷臨軒日歷不載此以公輔奏疏修入是日御史中丞周祕入對論右僕射張浚輕而無謀愚而自用德不足以服人而惟恃其權誠不足以用衆而專任其數若喜而怒又怒而喜雖本無疑二者皆使有疑二之心豫而隂奪奪而復豫雖本無怨望者皆使有怨望之意無事則揚威恃勢使上下有暌隔之情有急則甘言美辭使將士有輕侮之志酈瓊以此懷疑而叛然則浚平日視民如草管用財若糞土竭民膏血而用之軍中者曽何補哉陛下若不逐浚則紀綱何由張輔相何所憚敵人誘掖之謀將日至將士搖動之情將日生百姓無以慰其愁歎之心衆情無以安其憂懼之意陛下如有區區之心尚欲觀其後效則臣謂浚之才術止於如是而已願早正其誤國之罪以為後來之戒丙辰左護軍使臣林堅黃貴並杖脊刺配海南堅等為酈瓊持書往偽境順昌府取糧而霍邱縣令執之以獻故也是日殿中侍御史石公揆入對論右僕射張浚罪大略言浚強狠自專往年冨平之敗論者謂有不軌跋扈之漸今抆拭録用復爾寡謀失䇿使數萬之衆一旦叛去舍而不戮何以示威而勸來者丁巳左宣教郎金安節守監察御史是日右司諫王縉入對言劉光世屯淮西士卒數萬惟王德一軍忠勇敢戰餘驕怠自肆不可用也一旦以德踵光世之後酈瓊等憚其威嚴訴於朝既為之改命而召瓊等赴行在乃懷疑二相率北去則潛為此謀有日矣今張浚引咎求罷方防秋之際二大將又入奏事朝無宰相無乃不可乎時已詔韓世忠張俊入見議移屯故縉言及之己未刑部尚書胡交修等奏以故尚書左僕射贈太師魏國公諡文定韓忠彥配享徽宗皇帝廟廷三省勘會內有在告及新到行在官未經詳議詔令詳議以聞八年三月壬寅下詔此事必有故當考詔自今當講日只令講讀官供進口義更不親臨講筵以權禮部侍郎陳公輔言恐日臨講筵有妨退朝居喪之制故也直寶文閣湖北京西宣撫使司參謀官薛弼乞追還所進職名不許弼初除襄陽未赴而罷故請之弼罷襄陽日歷不書但弼申狀中有云今來寢罷允合公議不知何日降旨當考武經大夫閣門宣贊舍人武糾知襄陽府降授左朝奉大夫直祕閣李健知太平州是月諸路大旱江湖淮浙被害甚廣觀文殿學士江西安撫制置大使李綱獻言乞修政事大略以謂前年江湖閩浙嘗苦大旱殍踣相望陛下軫慮之深親灑宸翰勸誘賑濟其所存活不知其幾千萬人至誠動天報以休應曰雨而雨曰㿩而㿩嵗大豐穰民以安樂自經一稔之後上下恬嬉不復勤恤民隱朝廷百色誅求上供不以實數而以虛額和糴不以本錢而以關子絲蠶未生已督供輸禾穀未秀已催裝發州縣困於轉輸文移急於星火官吏愁嘆閭里怨咨感動天心旱災復作然則陛下欲銷弭災異導迎吉祥不必他求但如前日之用心自然感召和氣休應立臻繼旱暵復為豐年矣夫今日之患欲民力寬則軍食闕矣欲軍食裕則民財乏矣二者如鐵炭之低昂此首重則彼尾輕非有術以權之使斂不及民而軍食足不可得而均也惟陛下留神邦本天下幸甚建炎以來繫年要録卷一百十三
