body:
  text: 建炎以來繫年要録卷七十宋李心傳撰紹興三年十有一月壬子朔太常博士兼權宗正丞趙霈行尚書祠部貟外郎直龍圖閣胡寅知永州癸丑徽猷閣待制提舉台州崇道觀洪炎卒于信州詔官給葬事既而侍御史辛炳奏炎非功在社稷及死於國事之人乞改正上曰炎以文學稱有恤典蓋用舊制今既為言者論列當罷之然聞其家貧可如胡直孺例改賜銀帛炎蓋黃庭堅之甥也徐俯曰庭堅自有親孫上曰何在俯曰見任臨安管庫其家極貧改賜銀帛在十二月甲午熊克小歷書宰執奏故侍御史洪炎葬事云云按炎未嘗為此官尋考其故蓋日歷於舊申書進呈侍御史言洪炎葬事而不出御史之名克不細觀遂以侍御史為洪炎前銜其鹵莽如此甲寅皇后母福國夫人熊氏薨遺表求恩如母后外家故事前一日進呈上曰朕於外戚不敢有私前此官邢氏中外親已減於韋氏矣今祈請不已其援母后以為比者亦勿聽乃詔邢煥贈少師追封嘉國公子承事郎孝揚加直祕閣忠翊郎孝藴孝騫並閣門祗候賜銀帛五百匹兩許造進酒及差官舟二隻而己丙辰執政進呈修運河畫一上曰有欲以五軍不堪出戰士卒充此役者固不可又有言調民而役之者滋不可惟發旁郡廂軍壯城捍江之屬為宜至於廩給之費則不當吝朱勝非曰開河似非急務而饋餉艱難故不得已且時方盛寒役者良苦臨流居民悉當遷避至於畚挶所經泥沙所積當預空其處則居民及富家以僦屋取資者皆非所便恐議者或以為言上曰禹卑宮室而盡力乎溝洫浮言何恤焉起復從義郎閣門祗候廣西經略司走馬承受公事俞似罷似移文列郡引崇寧詔旨不隸屬帥司又欲與通判敘官為諸司所劾故罷自是走馬承受遂不復除詔諸郡委倚郭縣認納公帑醋息錢者徒一年認而納者罪亦如之著為令丁巳開封府布衣李漢英上書言國家之弊在用柔太過故敵得逞上曰光武治天下以柔漢室復興漢英所言狂易朕不以為忤聞罷可也按此句疑有脫誤戊午右朝奉郎孫世顯知澧州澧州自鍾相作亂久闕守臣至是命知鼎州程昌宇遷置世顯因即陶家市創山寨寓治未能入城也己未右文殿修撰主管萬夀觀王倫為都督府參議官行在供職詔王􅊅所部帥司并諸州軍並聽􅊅節制俟楊么平日取旨以􅊅言湖南北安撫使折彥質劉洪道不肯濟師也彥質聞命上疏言靖康中任河東宣撫副使􅊅係臣部下兵官兼曾體量行遣嫌怨灼然若使平時部屬偏裨一旦加乎其上緩急聽其慿陵竊恐有虧國體詔彥質與􅊅同心討賊如托故避事致有踈虞當議重行竄責後旨在十二月癸巳庚申右承務郎李若虛守司農寺丞右通直郎曾惇為太府寺丞左朝奉郎張宇為將作監丞右宣義郎章僅為軍器監丞並填新創闕若虛若水兄惇紆子宇守兄僅惇孫也時寺監長二不除以丞顓其事既而御史常同言惇浮薄無行若虛人物粗惡於是二人皆罷惇罷在四年正月戊辰若虛罷在正月癸酉監察御史李長民罷時新除監察御史劉大中以嘗論長民兄正民罪乞避之而長民亦有請詔别與行在一等差遣長民復求去乃命知處州罷楚州吳城縣為鎮縣自兵火後居民才八十餘家故廢之詔賜溫州度牒紫衣共二百為崇奉神御神主之費時嵗用錢糧五萬七千餘緡守臣程邁告乏于朝故有是賜禮部貟外郎虞􅀈請銓試初出官人以經義詩賦時義斷案律義為五場就試人十分取七榜首循一資從之此以紹興七年四月十二日癸卯吏部尚書孫近劄子修入日歷無之壬戌直祕閣江西提點刑獄公事孫佑移知平江府癸亥詔諸路上供錢物令戶部嵗終舉劾稽違侵隱去處申朝廷取旨責罰時左司諫唐輝論比年以來責小官之法則密縱大吏之法則踈監司郡守失職者未嘗眀正典刑臣請言其一二兩浙諸郡合樁上供糴本錢一百五十七萬餘緡今糴買正其時方行催促儻更違限必失凖擬此郡守不職也前此諸路上供稽違拖欠至於遣官四出其間有侵欺妄用者朝廷知之不聞究治此轉運不職也虔饒兩司自紹興元年至今起發過錢十二萬餘緡而費用三十五萬餘緡無益有損此提點鑄錢不職也臣竊謂省部總天下之務財用必有所統屬宜不虛設不識但聽諸路自至邪亦當舉劾鈎放謹其稽違侵隱邪欲望嚴賜誡敕一嵗之間省部稽諸路之勤惰上之朝廷眀為勤勞之賞重為曠弛之罰庶幾稍知自效故有是旨是日武德大夫髙州刺史閣門宣贊舍人御前忠鋭第一將崔增右武大夫忠州團練使荆潭制置司水軍統制吳全與湖寇遇于陽武口死之時荆潭制置使王􅊅將水軍以前二日至下芷江口翌日知鼎州程昌宇亦至共議取周倫寨又翌日增全至陽武口遇賊軍船皆寂然無聲呼之不應增等以為空舟也令湖海船倚梯而上賊兵掩出官軍遂敗死者不知其數增與全皆死或曰為賊生執臠割而食之時統制官任士安以萬人屯赤沙湖阻水不能救賊收其弓矢甲胄欲西襲官軍􅊅遂并將增兵後贈一階加果州防禦使贈全二階加忠州防禦使録其子有差四年六月癸未贈官甲子樞密院言端眀殿學士同簽書樞密院事韓肖胄工部尚書胡松年使還詔肖胄等速赴行在自上即位遣人入金六七年未嘗報聘至是左副元帥宗維始遣安州團練使李永夀職方郎中王翊等九人與肖胄偕來尋詔刑部貟外郎潘致堯浙西兵馬都監髙公繪接伴而兵部侍郎趙子畫右武大夫忠州防禦使提舉台州崇道觀楊應誠館之所至諸郡守二出城送迎勿用樂時淮東宣撫使韓世忠在鎮江奏臣職係統兵與北使别無相干乃詔世忠不見北使致堯請淮南漕臣郭康伯馬承家隨行應副事務許之又别遣文臣二員傳旨撫問于揚州及平江子畫奏以元帥府遣官議事與平時好使事體不同乃命臨時講究是日程昌宇王􅊅進兵取周倫寨至鳳港聞二將之死方躊躇會賊襲官軍於神山窖不勝遣書詣􅊅詐降以緩師昌宇欲擊之􅊅猶冀其降不果進乙丑殿中侍御史常同言皇城司頃以鄆王提領而不隸臺察閣門客省四方館以內侍鄧文誥提舉而不隸臺察祕書省以新置而不隸臺察若謂要近之司不當察則三省樞密院尚有分察之法豈有官司在六部之下而不隸臺察之理望復舊制時閣門皇城司皆援靖康詔旨依祖宗法隸屬中書省而祕書省亦以未嘗隸臺察為言同復奏御史臺格吏察三館祕閣禮察閣門客省四方館兵察皇城司乃詔並隸臺察同又言六曺長二拘執繩墨事無大小不取可否願少假以權使隨事之宜以意裁決上曰國朝以法令御百執事故凡有司以奉法為能而不敢以私意更令如三代皆有所尚兩漢而下亦各自有制度祖宗成憲朕不敢改也中興聖政臣留正等曰任人固愈於任法而自秦漢以來鮮不為法所用何哉公道不行私意交勝人不足任而法為可守爾况乎一代之興必有一代之法而所謂一代之法者本非成於一代其所循治亦逺矣特因時之宜而少為損益耳遵之可以致治違之則至於亂蓋已有眀效大驗於前世庸可率意而輕之歟常同之請知任人任法之説而未察公道私意於時世也尚書侍郎雖未必皆徇私之人要其所御皆宿姦巨猾法眀如是彼猶舞而用之法意一縱則將何所不至哉臣謂今日弊正在於不知謹守祖宗之法而上下因循廢弛倘每事一以祖宗之法御之何患於不治太上皇帝謂祖宗成憲朕之家法不敢改也是宜寶之以為致治之龜鑑敕令所刪定官陳琦責監道州江華縣博易場琦初見十月戊戌琦嘗上書言臺諫論列吕頥浩不當又訟監察御史劉大中受命出使急於進身首發大臣并懇要路先乞面奏及計會降詔三事大中奏臣果欲進身則當承順大臣意旨庇李回之姦惡不當發其罪及韓顔胄李正民之徒亦不當按劾臣不知出此乃具以聞於陛下致貽大臣之怒急於進身必不如此又遣使之初已畫降聖旨回日不隔班先次上殿胡蒙朱異薛徽言三人還朝亦便引對何獨臣還必欲結要路而後得對也若夫陛下詔令而琦謂臣將入國門計會得之且言於士大夫間謂臣自作詔草進入豈不大害國體琦纍受吕頥浩之恩無以酬報姑以是書為報恩之具且以諛辭取恱舊相儻琦言為是則臣為有罪安得不亟誅夷以懲奉使之失指若琦言誣罔則乞眀正典刑以解天下之惑顔胄琦孫也先以右宣義郎通判吉州大中劾罷之疏奏故有是命久之顔胄獄成有司當公罪罰金詔貶二秩顔胄以五年五月甲午降官詔沿淮諸寨鄉兵毋得輒擅侵優齊國界分用樞密院請也丙寅詔今來議和與往日不同更不發遣北人令內外諸軍帥分眀説諭川陜宣撫司以邠州觀察使永興軍路經略安撫使知興元府郭浩為利州路經略安撫使兼知利州此據利州知州題名附入興元知府題名浩今年七月到不見替時郢州防禦使利州路馬步軍副總管田晟權知興元府兼管內安撫使此以眀年十二月宣撫使奏殺金平功狀所繫銜修入興元知府題名無之興元題名稱郭浩以節度使知府利州題名稱浩以承宣使知州皆誤戊辰詔北使經由州軍權避金國諱旻晟二字庚午初聞襄陽失守詔李橫等即江北擇地屯駐是日臨安火承信郎楊有坐縱延燒追一官編管嚴州是月己卯行遣壬申御筆皇城司係専一掌管禁庭出入祖宗法不隸臺察已降指揮更不施行自今臣僚不得妄有陳請更改祖宗法度如違重行黜責先是御史常同既援臺格奏陳而幹辦皇城司馮益等復言本司舊吏張祐等供自祖宗至今並無隸臺察指揮故有是旨輔臣進呈上曰政使皇城司隸臺察何所憚顧祖宗法不可易今如易之後將輕言變祖宗成憲者衆故不可不慎也右宣義郎張叔獻直祕閣提點江西刑獄公事専切制置虔漳汀州盜賊叔獻叔夜弟也資政殿學士兼侍讀謝克家薦于上召見而擢之癸酉詔行在民居失火延燒官屋數多者取旨依軍法甲戌廣南宣諭眀槖奏左朝散郎廣西提點刑獄公事董弅左朝散郎廣東轉運判官章傑右朝奉郎廣西轉運判官趙子巖左朝奉郎知英州王縉知貴州趙竒左奉議郎知潮陽縣鄭鬲左修職郎廣東茶鹽司幹辦公事朱倬等十二人治行且言弅公正奉法特立不羣廣西州縣姦貪成風其間能循守吏所恃以安職者弅一人而已倬操修亷正問學淹該公直在官不為勢屈自紹興以後淮鹽不通鹽價騰貴縉奇雖少增其直而皆以剩利歸之公上詔並進官一等俟滿秩赴行在子巖子嵩弟縉分水人鬲寧德人倬閩縣人也弅傑已見竒未見初命有司製渾天儀太史局官丁師仁等請募工鑄造且言若往他州則臨時定北極髙下量行移易有吕燦者言師仁等所募工不知鑄法况渾天無量行更易之制若用於臨安與天參合移往他州則必有差忒之患至是工部員外郎謝伋言所費既多事體亦大宜先詢考制度敷求通曉天文歷數之學如漢之賈逵張衡本朝之蘇頌者𠫭訪是非然後可作望下溫州訪求蘇頌遺書考質制度詔别聽指揮十四年四月丙戌可𠫭考乙亥左司諫唐輝守起居舍人時新除舍人侯延慶在道未至於是改命延慶眀年二月除少常召保靜軍承宣使提舉萬夀觀髙世則為樞密都承旨尋不行資政殿學士提舉萬夀觀兼侍讀謝克家知台州從所請也克家本吕頥浩所引至是數稱疾求去上許之尋改衢州詔復司馬光十科舉士之制令文武侍從官嵗各舉三人用宰相朱勝非請也命荆潭制置司統制官吳全湖南制置司統制官吳錫以所部屯武昌時江北屢有警報知黃州鮑貽遜徙治樊口權知漢陽軍呼延虎渡江走鄂州知興國軍徐璋亦以捍寇為辭棄城而去至是乃命二將移屯受嶽飛節度而全已死矣於是虎璋皆坐貶秩二人貶秩在四年二月乙未丙子親衛大夫寧州觀察使提舉亳州眀道宫韋淵言自宣和至今十二年未嘗磨勘乞遷秩吏部言在法橫行無以年勞磨勘者上曰若宣和皇后來歸勢必推恩外家姑留此以需母后之歸可也乃命留俟焉直祕閣主管江州太平觀張潁卒潁孝純子丁丑詔宣諭官所劾贓吏罪至死者令刑寺摘出情理巨蠧之人三兩名令所在留禁俟旨時議舉祖宗杖黥之制故有是命初令賓橫宜觀四州守臣専管買發戰馬如雍州例以提舉廣西買馬李預言逐州並係接連外界可以招誘故也戊寅右承事郎直徽猷閣張滉主管江州太平觀鎮江建康府淮東宣撫使韓世忠奏本司𠫭謀官已下序位詔謀議官與提舉茶鹽官敘官機幹官與諸州通判官序既而世忠援孟庾例為言且謂發運司幹官令在通判之上乃詔謀議官知州資序人與提刑運判敘官機幹官如發運司例後旨在四年三月甲戌荆潭制置使王􅊅以兩遇賊皆敗二將俱死鬱鬱無憀會得江北警報欲移師鄂州防江程昌宇曰江北實無事乃李橫自棄襄陽鄂州孤城亦冀公速來少安爾今二橋已就事功垂成大軍一還難以復合願公少留共破三寨若鄂州有警疾馳尚可及也􅊅不聽是日􅊅引大軍還鄂州留統制官王渥趙興及湖南將馬凖步諒四軍權聽昌宇節制於是昌宇移屯上芷決賊堤四百丈己卯蠲南劒州所負民間獻納錢十六萬緡自建炎初勸民出財助國寄儲是州葉濃之亂諸司悉取為軍費至是户部責償而侍御史辛炳言本州纍經殘破今必以等第再取於民其為數百萬户之害豈特十六萬緡而已上以為然乃寢前命庚辰詔諸州大辟應奏者從提刑司具因依繳奏申舊制也時上既欽恤庶獄而言者以為州縣之制於罪無可矜者類以疑讞上聞冀幸寬貸其意以為失出之罰輕隂德之報厚姦胥猾吏旁緣惟貨元惡巨蠧罔有悛心望自今罪人情涉疑慮並申憲司閲實委有可憫本州當職官與提刑司官連書具奏事下刑寺刑部言舊法已是詳備若如所陳反見迂枉望坐條申嚴行下從之直祕閣知簡州勾光祖為陜西轉運判官光祖有吏才川陜宣撫司承制授之至是申命建炎以來繫年要録卷七十
