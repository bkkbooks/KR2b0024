body:
  text: 建炎以來繫年要錄巻一百十七宋李心傳撰紹興七年十有一月按是月己丑朔庚寅尚書兵部員外郎蒲贄比部員外郎黄祖舜並徙吏部員外郎左承事郎新提舉福建茶事張城守兵部員外郎樞宻院編修官鄒柄守比部員外郎國子監丞李維為屯田員外郎秘閣修撰褔建轉運使葉宗諤為江南西路轉運使以中書言礙本貫也其餘見任人皆徙官癸巳監察御史蕭振提㸃兩浙西路刑獄公事振引親年髙求去不許振復因給事中吳表臣右司員外郎薛徽言請於趙鼎甚切鼎乃從之此㩀趙鼎事實侍御史石公揆等論李綱罪未巳初謂朝廷檢舉綱前後屢請宫祠使之善去則長惡不悛何所忌憚乃詔言章報行閏十月乙酉至是又請鐫綱職名上曰前宰執政所體貌綱已罷帥不必更有行遣朕待遇羣臣未嘗容心賞罰適當於功罪足矣甲午用户部尚書章誼請初置贍軍酒庫于行在命司農寺丞蓋諒主之賜浙東總制錢五萬緡為釀本其後嵗收息錢五十萬緡二十九年七月南外東外二庫共收三十萬緡三十年二月癸亥増置新中庫又收二十萬緡三十一年三月庚寅所書可考武功大夫貴州防禦使幹辦皇城司韓公裔帶御器械承務郎楊適監行在都進奏院適時子也淮西宣撫使張俊入見為上言劉光世罷軍政閑居自有登仙之歎上不樂謂俊曰卿初見朕何官曰副使是時家貲如何曰貧甚從陛下求戰袍以禦寒上曰今日貴極冨溢何所自邪曰皆陛下所賜上曰然則卿宜思所以自效而有羡於光世邪俊皇恐謝先是都督府既罷左䕶軍都統制王徳未有所屬俊毎以厚幣結之德遂以其軍八千歸於俊俊軍以故益强然俊在建康其下多不戢頗為民患殿中侍御史金安節見上嘗言治兵者一於嚴而不撫之以恩則怨一于恩而不御之以嚴則驕怨固不為使驕亦不足恃也比者朝廷以禁旅單寡還盱眙之戍以實行朝精銳之衆無慮數萬是宜武備増重百姓恃以無恐而近日以来羣情惴惴咸不自安以為朝廷之患不在外冦甚駭聞聽臣切憂之所以然者以撫御非才士心不附慮其緩急非所恃且為百姓之患故也臣竊聞其下裨佐材力不堪陛下睿明悉已知之願因閱武之際精加選擢喻以聖意使歸申明紀律訓齊士伍令不特有勇而且知義則將為用而兵足恃軍國之勢順兵民之情安矣彼為將而日興土木之工以廣邸第者既失拊循以致其怨復為姑息以長其驕其扵申儆固有所不至矣亦無怪乎羣情之過慮也惟陛下圖之俊軍頗為民患林泉野記云爾安節奏議集無月日下注第三字按日歴此月十一日己亥金安節本職進對十二月庚子降出安節第一第二論填闕任子兩劄子則此䟽必己亥所上也今因俊事附書之丙申川陜宣撫副使吳玠遣使臣吕政求犒軍物上詔政諭之曰歸語吳玠玠自小官㧞擢至此皆出扵朕非由張浚也大丈夫當自結主知何必附託大臣而後進所湏犒軍物已支百五十萬緡非因浚進退有所厚薄也冝以此諭之龍圗閣直學士汪藻奉詔舉鄉貢進士劉度應直言極諫科且上其詞業詔兩省官參考以聞不果召度歸安人也宰相趙鼎之帥東也以近㫖與監司分上下半年舉知縣之有政績者遂舉松陽令唐閌至是檢舉循二資竢終更令赴都堂審察丁酉執政擬臨安火禁條約凡縱火者行軍法遺火延燒數多者罪亦如之上曰遺火豈可與縱火同罪立法太重徃徃不能行趙鼎曰遺火數多者取㫖可也上曰止扵徒足矣庶可必行兼刑罰太重亦非朝廷美事端明殿學士知温州李光為江南西路安撫制置大使兼知洪州名彭澤縣唐相梁國公狄仁傑廟曰顯正戊戌右承直郎江東安撫司幹辦公事王漻上六朝進取事類詔與陞擢差遣己亥江南西路提㸃刑獄公事余應求直秘閣淮南西路轉運判官韓璡並罷璡仍奪職用侍御史石公揆章䟽也公揆言呂祉之自用失軍士心人皆言陳克與璡之謀望賜罷黜以快士論應求坐與李綱連姻故併劾之殿中侍御史金安節入對論比年以来吏員衆多而闕不足以處之近者每改遷事故必别差人承替仕者始不安其分乞應在外堂除去處如見任及待次人别有差遣者令已授人次第之任庶㡬授受之際悉歸至公從之始趙思誠之請减任子也上命侍從官討論來上事見十月辛丑安節言迄今累月未聞有所施行儻謂其来已乆難以過為裁損亦當約以中制去其太甚也今欲除初遇大禮許其依格䕃補外其後並令逓展一郊仍自宰執侍從以及庶官皆為之限通前後奏薦以至致仕遺表恩澤各不得過若干人如此庶㡬稍合人情可以悠乆雖未能盡去官冗之弊亦可以少損矣乃命疾速討論如初詔安節二䟽以庚子日行出左朝散大夫新知信州梁澤民為淮南西路轉運判官用從官應詔所舉也後三日澤民入辭又加直秘閣庚子資政殿大學士四川安撫制置大使兼知成都府席益以母褔國太夫人朱氏憂去官辛丑左正言辛次膺言比来臣寮因罪降黜初若峻厲閱月既乆徃徃増飾情詞巧為辯訴前日所坐之罪雖嘗經推鞫迹狀明白貪贓姦惡不可容貸者一切除免復其故秩謂之改正其間隔過郊恩任子磨勘轉官者一旦盡得謂之給還援例紛然干乞不已欲望稍嚴定制自今應訴雪者必須在一年限内體究得實而後别勘果有異同即專委刑寺官看詳定奪委係寃濫方與改正仍議元勘官司不當之罪以為懲戒從之壬寅上謂大臣曰張俊事上御下慮事臨敵皆不易得獨好廣邸第營土木朕數鐫諭莫能改也比因其入對面諭以朕来建康行宫皆因張浚所修朕不免葺數間小屋為燕居及宫人寢䖏之地當與卿觀之初不施丹雘蓋不欲勞人費財也俊曰略加雅飾不過二三千緡朕語以國用艱窘之時以二三千緡崇土木之飾亦所不忍也俊感歎而去先是俊營第建康廣袤占居民王縉為右司諫奏其事請𠡠俊宻自還之上納用焉中興聖政臣留正等曰儉為百王之至徳然有矯激沽名者有出于天稟之自然者其為儉則同而所以為儉則有間矣晉武之焚雉頭裘夫裘則焚矣而侈心自若也平吳之後後宫益以侈麗卒之晉祚陵夷者以此唐明皇始罷織錦坊而錦則無用矣侈心猶是也驪山華清逰幸之盛極其侈靡唐遂以衰二君之為儉無乃非其真情而徒竊其美名乎太上皇帝愛張俊之材勇而恐其以侈故殫民力以事上乃諄諭如此雖然方庶事草創之初戒土木之工示敦朴以先天下似非甚難也乃其行之悠乆奉養有節而費用彌省至今不改其度然後知慈儉之徳殆由天稟與大禹之菲食文王之卑服同風宜以為聖訓之尤也乙巳金右副元帥瀋王宗弼執偽齊尚書左丞相劉麟于武城先是金主亶已定議廢豫㑹豫乞師不已左副元帥魯王昌謂之曰吾非不欲出兵也顧以用兵以来無徃不㨗而自立齊國之後動輙不利恐蹈覆車挫威武耳豫請不已乃以女真萬户布爾噶蘇為元帥府左都監屯太原渤海萬户大托卜嘉為右都監屯河間令齊國兵權聽元帥府節制遂分戍于陳蔡汝亳許頴之間扵是尚書省上豫治國無狀偽齊録尚書省上劾奏自趙氏北遷浚凖元帥府申指以大河為界河外别擇賢人使為民主施此厚恩庻其知報協力兩獲安便早致成平以此凖申建立張楚無何旋為彼人所廢王師再舉無徃不克後来帥府復申前議冊立劉豫建號大齊置國之初恐其不能自保故于隨路分駐兵馬至今八年載念上國大事已来逺戍兼齊國有違元議闕乏軍需比年以来益漸减損遂致艱窘多有逃亾隨路百姓亦各不得息肩與之征討則力既不齊為之拊循則民非我有凡事多誤終無所成况齊人假我國家之力積有嵗年事悉從心尚不能安民保國論其德不足以感人言其威不足以服衆兹實有乖從初康濟生靈免其荼毒使天下早致隆平之意反使庻民困苦兩國耗乏之端相度從初所申實為過舉既知其非豈可不改置若混同四海之内聖德廣運睿澤旁流霜露所霑孰不歸附今臣等議欲定一民心變廢齊國不准宋國舊疆至扵普天之下盡行撫綏是為長便奏訖奉聖㫖齊國建立于今八年道德不修家室不保有失從初兩獲安便之意豈可坐視生民乆被困苦冝依所奏施行委所司速為措置所有其餘隨擬事件仍别商量行下金主亶下詔責數之略曰建爾一邦逮兹八稔尚勤吾戍安用國為寧負而君無滋民患偽齊錄勑行䑓尚書省朕丕席洪休光宅諸夏將俾内外悉登成平故自濁河之南割為鄰壤之界灼見先帝舉合大公罪則遄征固不貪其土地從其變置庶共撫其生靈建爾一邦逮今八稔尚勤吾戍安用國為寧負而君無滋民患已降帝號别膺王封咎有所歸餘皆罔治將大革于弊政用一陶于新風勿謂奪蹊田之牛其罰則甚不能為託子之友非棄而何凡爾臣民當體至意所有其餘便冝事件已委所司畫下元帥府去訖外處分不盡之事亦就便計議從長施行仍布告逐處咸使聞知遂令昌等以防江為名伐汴京先約麟單騎渡河計事麟以二百騎至武城與宗弼遇金人張翼圍之數匝悉擒而囚之丙午詔潯州編管内侍李絪留滯衢撫州踰年不去令兩路憲臣體訪押赴貶所上諭趙鼎曰兩州守臣亦湏行遣鼎曰候體訪到取㫖陛下于近習不少假貸如此上曰小事便須繩治無使滋長鼎曰如此必不至如童貫之典兵梁師成之預政上曰童貫梁師成豈是一日至此要在不可假以事權耳是日金人廢劉豫為蜀王初右副元帥宗弼既執劉麟遂與左副元帥昌三路都統葛王襃同馳赴京城下以騎守宣德東華左右掖門襃太祖旻孫潞王宗輔子也宗弼將襃等三騎突入東華門問劉齊王何在偽皇城使等錯愕失對宗弼以鞭擊之徑趨垂拱殿入後宫門問劉齊王何在有美人掲簾曰在講武殿按射宗弼等馳徃直陞殿豫遽起欲更衣宗弼下馬執其手曰不湏爾有急公事欲登門同議于是偕行出宣德門就東闕亭少立宗弼乃麾小卒持羸馬强豫乗之約令偕至寨中計事豫拊手大笑上馬從衛猶數十人宗弼露刄夾之囚于金明池張浚行述云浚嘗遣人齎手榜入偽地誘劉豫略曰如能誘致使之疲弊精兵健馬漸次銷磨兹報國之良圗亦為臣之後效金用事者見此榜已疑豫八月間豫聞王師北嚮遣韓元英告金乞兵同舉金謂豫終欲困已益疑之㑹酈瓊叛去浚復多遣間持蠟書入偽地故遺之大抵謂豫已相結約故遣瓊等降而豫再乞兵于金十月金副元帥宗弼徑領兵来廢豫惜其有此機㑹而浚已去位矣趙鼎事實云鼎欲使張俊出不意徃趨夀春取其城措置已定㑹金廢豫乃止其所措置當求他書詳考兇何俌龜鑑曰方逆豫之陸梁也羣盗縱横蹂踐京汴雛狂悖子麟姪猊擾動江淮其鋒不易當也李横之謀復東京而豫之氣已折岳飛之收復襄陽而豫之鋒已摧内有趙鼎賛親征之謀外有張浚董督師之事張韓劉岳又從而諸道進兵自是而兇徒授首强敵悔禍六年而廢豫之謀定金人廢豫自麟猊敗之後廢豫為庻人盖自建炎四年僣偽至紹興七年敗走凡八年而後平云丁未故朝請大夫陳師錫加贈諫議大夫告詞無左右字其子右朝奉郎顯言黨籍餘官任䑓諌者凡七人其五人皆已贈諫議大夫故有此命師錫已見元年四年按餘官自司馬康元祐中已贈諌議大夫陳瓘靖康中追贈常安民任伯雨江公望龔夬紹興中追贈凡六人而苐十六人殿中侍御史黄隠第三十人監察御史馬㳙第三十一人右正言孫諤第三十六人監察御史王回第四十五人殿中侍御史孫倚第四十六人左司諫陳祐此六人與師錫皆未加贈凡十三人今顯乃以其父及康瓘伯雨安民夬倚為七人不知為何當考右朝奉郎程江軍使游輔丁憂去官詔以其有郤敵之功特起復初宣和間進士王問進書萬巻補承務郎上即位有越州布衣諸葛行仁亦因進書得廸功郎至是吏部以為不倫追問兩官問訴之詔與改正起居郎兼權中書舎人李彌遜以為不可上謂執政曰求遺書自是美事朕方多難之時故行仁之賞薄宣和承平留意墳典與授京秩不為過然既有論駮可鐫一官熊克小歴以彌遜為中書舎人盖誤彌遜除舎人在十二月是日金右副元帥魯王昌等復入汴京召偽齊文武百官軍民僧道耆老拜金詔于宣徳門下宣詔已昌與宗弼張紫蓋從素隊數十人立西朶樓下偽尚書左丞相張昴左丞范恭右丞李鄴等趨前欲拜昌歛身令通事傳言慰勞昴等次第進揖次見宗弼宗弼不為禮昴等退二帥入居東府遣鐡騎數千廵繞大内又遣小卒廵行坊巷揚言曰自今不用汝為簽軍不取汝免行錢不取汝五釐錢為汝敲殺貌事人請汝舊主人少帝来此住坐於是人心稍定尚書省行下齊國自来創立重法一切削去應食糧軍願歸農者許自便齊國宫人除劉豫所留外聽出嫁内侍除看守宫禁人外隨處住坐自来齊國非理廢罷大小官職並與叙用見任官及軍員各不得奪侵民利自来逃亡在江南人郤来歸投者並免本罪優加存恤應州縣見勘諸公事不得脫漏始豫僣位作楮幣自一千至百千皆題其末曰過八年不在行用其兆已見矣逮豫之廢也汴京有錢九千八百七十餘萬緡絹二百七十餘萬匹金一百二十餘萬兩銀一千六十餘萬兩糧九十萬斛而方州不在此數豫拘於瓊林苑常蹙頞無聊謂魯王昌曰父子盡心竭力無負上國惟元帥哀憐之昌曰蜀王汝不見趙氏少帝出京日萬姓燃頂煉臂號泣之聲聞十餘里今汝廢在京無一人憐汝者汝何不自知罪也豫語塞昌逼之北行問以所欲豫乞居相州韓琦宅昌許之先是進士邢希載毛澄上書請豫宻通朝廷為所殺至是留錢五萬命道士追薦諸直言者而去豫弟京兆留守益輕財好施禮賢下士與士卒同甘苦頗有逺畧金人忌之将廢豫遣左監軍薩里罕左都監布爾噶蘇以㓂蜀為名伐京兆襲益以歸金人以偽齊銀青光禄大夫太子太傅張孝純權行臺尚書左丞相契丹蕭博碩諾為右丞相金人温騰師中為左丞燕人張通古為右丞博碩諾師中通古未見其前銜後不書官名者凖此偽齊户部侍郎馮長寧為户部尚書燕人張鈞為禮部侍郎又以杜崇為兵部郎中張仲熊為光禄寺丞皆在行䑓供職崇充子仲熊叔夜子也鈞始事遼為鴻臚少卿遼興軍節度掌書記奉張覺歸順表来朝除徽猷閣待制至是復用罷偽齊尚書右丞相張昴知孟州左丞范恭知淄州右丞李鄴知代州殿前都指揮使許青臣同知懐州偽皇子府左軍統制靳賽同知相州户部員外郎韓元英為忠武軍節度副使南路留守翟綸為横海軍節度副使又以金人完顔呼沙呼為汴京留守偽齊河南監酒李儔同知副留守知代州劉陶偽齊録作劉􅀈為都城警廵使宗室趙子滌為汴京總判偽皇子府選鋒軍統制李師雄為馬歩軍都虞候前軍統制王世忠為歩軍都虞候偽知莱州徐文為汴京總管府水軍都統制偽鎮海軍節度使山東路留守李成為殿前都指揮使兼知許州孔彦舟為歩軍都指揮使兼知東平府涇原路經略使張中孚為陜西諸路節制使權知永興軍秦鳯路經略使張中彦權知平凉府麟府路經略使折可求環慶路經略使趙彬熈河路經略使慕容洧資政殿學士知開封府鄭億年偽齊録云億年自吏部兼禮部侍郎除吏部尚書而朱勝非閑居録及當時䑓章皆稱億年為偽尚書左丞資政殿學士今修潤附此更湏詳考知河南府闗師古知拱州酈瓊知亳州王彦先知宿州趙榮大名府副總管劉光時並依舊職時晉國王宗維已亡金主亶以太師領三省事宋國王宗磐乃太宗晟長子豪猾難馭而京東留守宗雋亶親叔父有才望乃拜宗雋太保領三省事封兖國王以制之初金國自其祖宗以来雖名為帝而與其下無尊卑之别樂則同享財則共用自亶㓜時詞臣韓昉已教之學稍賦詩染翰及嗣位左右儒士日進謟諛導之以宫室之壯侍衞之嚴入則端居九重出則警蹕清道視舊功大臣寖踈且非時莫得見由是宗戚思亂己酉殿中侍御史金安節言諸路和糴米加耗太多如饒州一石至収四㪷三省擬下提刑司體究上曰郡守為誰候體究得實當痛與懲戒趙鼎等奏江東郡守有掊歛不䘏民者上曰郡守以字民為職掊歛不䘏朕何賴焉當悉罷與宫觀選除循吏如周綱陳橐之流使罷者不失宫觀之禄而民被實惠實為兩得上論諸軍使臣猥多嵗増俸廪因曰大將奏功率以所愛偏裨多轉官資而出戰士卒徃徃不及不惟無以勸有功兼亦蠧國用朕嘗謂行賞當先自下行罰當先自上鼎曰聖慮髙逺豈諸將可及庚戌承信郎劉偉等各進二官偉左護軍使臣也自偽地来歸故録之初修武郎朱弁既為金人所拘至是遣使臣李發歸報尼瑪哈等相繼死秦檜曰金國多事勢須有變上曰金人驕恣理無足恃我藝祖皇帝兵不血刄而得天下故福祚悠逺自古帝王未聞窮兵黷武而能乆長者金人連破大國而兵弗戢其可久乎檜曰陛下但積德中興固自有時上曰亦湏有所施為而後可以得志但今年政猶病人誤服藥氣力尚羸来春當極力經理中原辛亥右廸功郎李時雨特循二資時雨初見建炎元年七月時雨獻玉壘忠書三十篇論形勢選兵任相攻取等事故有是命其間有鹽鐡論欲罷四川官賣鹽引而征民間鹽貨三分之一又欲盡𣙜天下銅鐡而輸之官云壬子樞宻院計議官吕稽中司農寺丞蓋諒並罷二人皆為都督府官屬故侍御史石公揆論之趙鼎等開陳稽中諒之為人上曰用人不湏太速湏使名實加扵上下然後無異論賢士大夫衆所未知驟加㧞擢一遭㸃汚則為終身之累非所以愛惜人才也可且與外任乙卯為徽宗皇帝顯肅皇后立虞主不視朝故事山陵埋重于皇堂之外及將祔徽宗主翰林學士朱震言不當虞祭又請埋重于廟門之外上命禮官議之閏月辛巳太常以為不可乃埋重于報恩觀立虞主昭慈之䘮也工部侍郎韓肖胄題虞主至是震引漢唐及永昭陵故事為言乃不題丙辰上與大臣言嗣濮王仲湜酷好珊瑚趙鼎因言頃到蔡行家見其奢麗可駭如卧榻亦滴粉銷金等為飾上曰朕頃在藩邸猶用黒漆牀渡江以来止用白木上施蒲薦素黄羅為褥素黄羅被三條而已睡後豈復知有華好也直秘閣新知台州秦梓主管台州崇道觀從所請也先是殿中侍御史金安節論梓人品凡下自為諸生日固已不安義命出入權門厥後以傔從徃髙麗始授校尉又圗直赴殿試唱名後自第二人以下皆未有所授而梓已為太學官矣其無忌憚如此以梁師成為之援也梓附麗匪人惟意所欲而討論之法又獨不行扵梓郡守民之師帥風化所係而梓之所履如此難以望其化民成俗矣䟽入不報安節又言近降聖㫖欲實惠及民不為文具故博詢侍從不限名數各以名聞是務得其人以副除授臣之區區必欲罷梓所授者盖欲使郡守之選自此加重以稱陛下及民之意非止為一郡言也梓聞乞宫觀乃有是命樞宻使秦檜深恨之右朝奉大夫主管華州雲臺觀錢端禮直秘閣端禮忱子也上召對而有是命既而言者論今日艱難之時所以激勵多士者職名為重端禮未有勞効非所當得𫝊之四方必有譏議乃以端禮通判嚴州端禮寢職名在十二月癸亥除倅在辛未今併書之時朝廷方優假勲臣故以右通直郎張子儀為軍器監丞右承議郎韓彦直直祕閣按韓世忠碑誌世忠四子彦直彦朴彦質彦古而日歴世忠長子亮紹興四年十二月庚午自右宣教郎特轉三官不知亮復是何人碑誌何以全不及之當考殿中侍御史金安節言國家賞延之典有予人以爵禄無假人以職名崇觀以来因父兄秉政而得貼職者近制皆在討論之數盖惡其濫也今彦直復因父功而授得無類于昔乎况倖端一啓則攀援僥覬他日必有難從者又言軍器不除貳長唯以丞専治其事任責匪輕子儀行能既未有聞於時而方換文資殊無履歴伏望併賜追寢不報張子儀除目已見今年九月乙酉并注但未知的以何日遷監丞按安節劾章云乞詔大臣遵用去年八月初一日差官指揮勿使輕變考之日歴紹興六年八月一日丙申有㫖寺監丞等並去替半年方許差人而安節七年閏十月方除御史則其論列正在此時也轉彦直除職亦不見月日因錢端禮除職事遂書之安節所奏有云近以韓世忠屢有㨗奏特授其子彦直初等貼職而安節明年二月丁憂則彦直之除亦在此時矣日歴明年二月壬子陳確除軍器監丞已差下張子儀改替陳確則安節所論不行可知然本監題名乃無子儀姓名則是後来竟不到官當考是月左承直郎荆湖南路提㸃刑獄司幹辦公事胡銓為左通直郎充樞宻院編修官銓廬陵人也偽知臨汝軍崔虎詣湖北京西宣撫使岳飛降此據徐夢莘北盟㑹編増入日歴無之按岳飛今年十一月八日申先次到歸正人崔虎劉永夀孟臯華旺等將帶官兵已供申朝廷外云云則知果有此事但日歴脫落耳先是劉豫建新蔡縣為軍後使虎守之十有二月庚申禮部尚書劉大中言浙東之民有不舉子者盖自艱難以来姦臣持不恤之說虐用其民為國歛怨民被其毒無所赴愬一身不恤皇恤其他臣嘗承乏外郡毎見百姓訴丁鹽紬絹最為疾苦盖為其子成丁則出紬絹終其身不可免愚民寜殺子不欲輸紬絹又資財嫁遣力所不及故生女者例不舉誠由賦役煩重人不聊生所致也望令州縣五家為保保内有姙娠及五月者次第申縣除其籍守令滿替以生齒増減為殿最之首増减甚者取㫖别行賞罰其殺子罪賞並依見行條法趙鼎進呈上曰可嚴行禁止朝廷法令備具徃徃不能奉行如銷金鋪翠立法甚嚴禁中有犯罰俸三月無一人敢犯者而聞士民之家尚有服用如鋪翠一事非特長奢靡之風而殘害物命不知其數朕甚矜之俟軍務少休當更申嚴且行下廣南褔建禁採捕者鼎退而批㫖以大中所言送户部措置日歴載大中奏䟽節略生男女賜帛一叚遂失所奏本指今具書之八年五月庚子降㫖如所奏辛酉左承直郎趙成之特改左奉議郎成之知萬安縣劉大中為宣諭薦于朝至是引對而有此命癸亥禮部侍郎常同奏奉詔舉可為監司郡守之人輔臣進呈上曰朕已令書于屏其間有除授者則注之先是旬日前建昌軍守臣趙叔涔以御史金安節論罷三省奏用注待舉者填闕安節又論建昌有次待者而朝廷别用人為疑上曰言者不知待舉乃近日從官所薦之人故也今後監司郡守有闕有已差人不足任皆當用所薦人填闕雖不滿一人所欲而千里之民休戚所繫當權輕重而處之退遂批㫖監司郡守自今罪罷處許于舉到人内先次選除填闕乙丑上親行卒哭之祭用酒幣先是虞主還几筵殿上服袍履奉迎遂行安神禮自埋重至于癸亥皆太常代行九虞及是又親祭焉丁卯祔徽宗皇帝顯肅皇后神主于太廟第十一室初議祔廟畢純吉服及太常以為請上詔曰情有不安可並如舊其百官竢過小祥取㫖初議易服已見今年四月壬子太常建請在十一月乙卯百官過小祥取㫖在是月辛酉今并於此書之左承事郎羅萬監都進奏院萬自初官改秩始命堂除大邑至是趙鼎以京局處之戊辰中書門下省奏勘㑹已降指揮来春復幸浙西日歴不見此指揮所有太廟神主合先次進發詔恭依協忠大夫華州觀察使提舉江州太平觀解潛權主管侍衛歩軍司公事後二日又命潛兼權馬軍司熊克小歴于今年九月戊子劉錡除淮西帥時遂書之盖誤按此時馬歩二司職事皆楊沂中權管今始命潛耳王曮撰沂中神道碑云馬歩乏帥詔兼領其職王辭不許閲數月復乞免乃令舉人自代其眷委如此按觧潛乃趙鼎所厚其兩除管軍皆随鼎進退恐非沂中所舉盖碑下無縁飾也偽齊武略郎兼閤門宣贊舎人統制官王宗等帥衆来歸上命引見賜銀帛趙鼎奏令有司供進上曰已令内帑辦賜禁中所有未嘗一毫妄用皆以賜將士耳乃詔宗遷官三等餘吏士各進二官熊克小歴扵此月書宋超来降今移附八年正月殿中侍御史金安節言臣切聞劉豫為金所執驅之以北雖得扵諜報未審其由敵情多變難以遥度然有以知去順效逆禍終自速金人無信不可恃以為援也臣蚤夜思之神州既非外國所可居而變詐若此誰復為用是殆上天悔禍使復為國家驅除以啓中興之運爾要在修人事以應之而已盖中原重擾外敵方强或狃勝之兵怙其詐力尚敢慿陵或喜亂之民起於盗賊輙肆越軼則防遏之備不可以不嚴轉禍而為福者或舉城而内附去危而即安者或率衆以来歸則撫納之方不可以不至此誠天下舉安之機南北復合之㑹不可失也臣謂正當申嚴守禦以固吾疆陲多遣間諜以招彼携貳通好之使未可遽遣順動之計更宜緩圗使民心不揺軍聽無惑養威持重徐觀其變然後起而赴之則定計審而臨機果庻㡬無遺策矣臣願陛下上承天眷下副人望命心腹大臣深謀審處無失機㑹以定中興之業天下幸甚安節疏不得其所上之日㩀日歴是月十七日甲戌安節進對又在此後六日恐太晚今因奉迎太廟神主及王宗等来降遂書之更須詳考宗正少卿馮檝言國家自金人用兵以来謀所以恢復平定之䇿不過和擊二議而已和則遣使撃則用兵然使屢遣矣而好未通兵屢用矣而功未見者何也時勢未革而機㑹未至故也中原荒蕪無可湏索敵人追求悉厭所欲事已極矣邇来傳報金執偽齊叛瓊而歸似時勢欲革而機㑹之將至也顧朝廷措畫以趨其機㑹者如之何耳聞見議遣使此正得策然為今日之使全藉有識見謀畫膽氣又有辭辯副之廼能有濟儻有請行者乞令宰執召而宻詢之今金執偽齊叛瓊而歸謀出何䇿前去見金合致何辭金與論事說以何道事畢而還當有何功若於此四者皆有建眀使可遣矣儻或於此初無先見深畫更在陛下與大臣熟議而慎擇之此據馮檝所上時議録録稱紹興七年十月内在建康府投進然金執劉豫乃閏月事不應前十月先言之今且附金安節奏疏之後庚午秘書省校書郎施庭臣諸王宫大小教授黄鍰並守監察御史日歴無鍰除目本臺題名在十二月今併附此俟考其本日庭臣勾濤所薦鍰范冲所薦也樞宻院進呈先得㫖令京東宣撫處置使韓世忠移司鎮江府留兵以守楚州秦檜奏曰諸軍老小既處置得宜萬一警急諸師當盡力捍㓂時已命張俊岳飛皆留屯江内故檜奏及之世忠上奏極論敵情叵測其將以計緩我師乞獨留此軍蔽遮江淮誓與敵人决於一戰上賜札曰朕迫於彊敵越在海隅毎慨然有恢復中原之志顧以頻年事力未振姑鬰鬰於此前日恐小或有未便委卿相度今得所奏益見忠誠雖古名將亦何以過使朕悚然興歎以謂有臣如此禍難不足平也古人有言閫外之事將軍制之今既營屯安便控制得宜卿當施置自便勿復拘執至扵軍餉等事已令三省施行辛未資政殿學士翟汝文落致仕提舉臨安府洞霄宫壬申不視朝百官進名奉慰先是太常言祔廟畢遇朔望日皇帝御殿百寮更不奉慰上以宮中實行三年之䘮乃命如舊癸酉端明殿學士提舉臨安府洞霄宫折彦質知福州趙鼎去位彦質亦奉祠至是復起甲戍禮部侍郎常同面對言兵革未息正當馬上為治之時而上至三省下至州縣尚循承平之舊窮日之力以從事於煩文曲禮豈救弊之道望詔大臣屏去細務專帷幄之謀責任六曹隨事裁决凡禮文法令悉命裁定以趨簡便翌日上謂宰執曰聞三省文書極繁卿䓁省閱日不暇給皆由六部官不任責事事申明故也豈有為尚書不能任一部之事朕若擢為執政便可裁天下之務昨常同亦奏此事陳與義曰今日事比承平時極多趙鼎曰承平時朝廷尊嚴上下有分昨一小使臣馬前喧呼臣恐其訴寃乃求差遣耳政由臣等不才致朝廷之勢陵夷上曰此須與行遣天下事賞罰而已若有罪不行罰漸成姑息之風誠為不便乃命六部措置條具申省命六部條具在是月丙子金人徙劉豫扵上京給舊夫子廟居之後封曹王豫廢年六十五乙亥户部尚書章誼入對上諭曰天下苖米湏與措置其不熟處除檢放外止令輸錢仍運錢於豐熟之地糴米如此則公私兩利矣誼退以上㫖告執政行之丙子徽猷閣待制知池州劉岑移知鎮江府己卯祕書郎羅孝芬提舉荆湖南路茶鹽常平公事辛巳尚書禮部侍郎常同試御史中丞試尚書户部侍郎王俁充徽猷閣待制提舉江州太平觀侍御史石公揆論俁在户部所行皆誅剥之政初為趙鼎所用及鼎與張浚爭論不合而去則百計譖短以求合扵浚又諂事吕祉張宗元因縁求哀且謂得革心洗慮以求自効祉常笑其語對士大夫語之然復說其諂力為游說浚遂喜而用之力言回易之利呼吸駔儈市井為之用破費官錢數百萬緡而莫收其利伏望亟加貶斥投置閑散故有是命俁辭後三日改充集英殿修撰壬午吏部員外郎蒲贄面對論當建都險要之地時已議定回蹕故贄言及之此以明年正月戊戌上語修入温州布衣黄石應詔上書論内事之可治者七外事之可治者四詔與免文解仍賜束帛癸未有司奉九廟神主還浙西百官辭于城外是日徽猷閣待制王倫右朝請郎髙公繪還自金國初劉豫既廢左副元帥魯國王昌乃送倫等歸曰好報江南既道塗無壅和議自此平逹前七日知泗州劉綱奏倫歸耗上嚬蹙曰朕以梓宫及皇太后淵聖皇帝未還曉夜憂懼未嘗去心若敵人能從朕所求其餘一切非所較也趙鼎曰仰見陛下孝心焦勞上曰國家但能自治以承天心豈無復彊之日日歴云臣檜以屈辱為憤此秦檜為祕書少監時所修也恐非其實倫言金人許還梓宫及皇太后又許還河南諸州上大喜賜予特異時通問副使朱弁因以表附倫歸進上覽之感愴恤其家甚厚王明清揮麈録載弁表略曰節上之旄盡落口中之舌徒存又曰歎馬角之未生魂消雪窖攀龍髯而莫逮淚灑氷天按此乃弁等北地祭徽宗文中語明清誤記也初知泗州劉綱乞調滁州千夫修城有㫖從之言者以為非是甲申上謂宰執曰百姓誠不可勞但邉城利害至重天下之事亦權輕重而為之朕愛民力一毫不敢動惟此役不得已也趙鼎曰昨得㫖已令優給錢米矣丁亥以王倫為徽猷閣直學士提舉醴泉觀充大金國奉迎梓宫使髙公繪為右朝奉大夫充副使樞宻使秦檜乞以元日假内徃山中上冢焚黄許之是月起居郎李彌遜起居舎人勾濤並試中書舎人尚書祠部員外郎勾龍如淵守起居舎人時已定議囘蹕浙西羣臣對者多言建都事而如淵獨言在德不在險故擢用焉三人之除日歴不載今以後省題名附入按十二月十三日庚午起居舎人勾濤十八日己亥起居郎李彌遜並直前奏事則三人之除必在下旬或是常同除中丞之日當考是冬川陜宣撫副使吳玠遣裨將馬希仲攻熈州希仲素妄庸得檄即氣索不得已進營熈州城外數十里熈州父老聞官軍来有欲率衆歸附者金將宣言曰北軍今日大至當共刼營希仲聞之昏時㧞寨遁去時别將鄭宗李進攻鞏州城垂破希仲引兵㑹之金守將龍虎衛上將軍富察烏遣人約降希仲許諾獨進疑其詐衷甲待之烏出城援騎四至蘭州歸明將王宏曰事急矣何不遂取此人即刺之不殊騎士張玘斷其首坐者皆鳥獸散獨宗死城下乆之玠以希仲失二郡機㑹梟其首令諸軍此據員興宗西陲筆略建炎以來繫年要録巻一百十七建炎以來繫年要録巻一百十七金人地名考證布爾噶蘇原書作㧞束誤改見巻二十八托卜嘉原書作撻不也誤改見巻五薩里罕原書作撒離喝誤改見巻十一博碩諾原書作保夀奴誤今改正温騰原書作温敦誤今改正呼沙呼原書作胡沙虎巻一百三十三又作湖沙虎即金史之怱斜虎並誤今改正尼瑪哈原書作粘罕誤改見巻一富察原書作蒲察誤今改正
