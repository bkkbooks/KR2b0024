body:
  text: 建炎以來繫年要録卷一百五十一宋李心傳撰紹興十有四年歲次甲子四金熙宗亶皇統年春正月按是月癸丑朔丁巳燕北使于紫宸殿權侍郎正刺史已上預焉戊午吏部尚書羅汝楫為大金報謝使瀛海軍承宣使知閣門事鄭藻副之以金來賀正故也己未金國賀正旦使完顔曄等辭行自通好後金使至闕見辭燕射密賜共白金千四百兩副使八百八十兩襲衣金帶三條三節人皆襲衣塗金帶上節銀四十兩中下節銀三十兩自是以為例趙甡之遺史紹興三十一年五月又書從例使副酒各四大金瓶瓶并器合盡與之會要不載當考乙丑故奉議郎河北軍前通問使魏行可特贈右朝奉郎祕閣修撰以行可父右通直郎致仕伯能有請也先已官其一弟二子至是復官其一孫初太傅醴泉觀使咸安郡王韓世忠之罷樞管也上命存部曲五百人俸賜如宰執丙寅世忠言兩國講和北使朝正恭順此乃陛下沉機獨斷廟堂謀謨之力臣無毫髮少禆中興大計望將請給截日住支并將背嵬使臣三十員官兵七十人撥赴朝廷使用詔使臣令殿前司交割餘不許丁卯詔上津豐陽二縣隸金州資政殿學士提舉臨安府洞霄宫王次翁以舊職致仕次翁自言疾勢困重乞納祿故也太師秦檜憐之饋問不絶集英殿修撰提舉江州太平觀黃龜年落職令本貫福州居住龜年為御史嘗論秦檜之罪至是寓居四眀右司諌詹大方奏龜年昨緣諂附匪人搢紳不齒今當朝廷清眀之時自宜退聽深藏而乃覆出為惡凌壓百姓干撓郡政害及一方上覽奏曰此豈士人所為乃有是命己巳直龍圖閣知臨安府張叔獻升敷文閣待制辛未封普安郡王婦郭氏為咸寧郡夫人給內中俸郭氏祥符人故奉直大夫直卿孫也癸酉侍御史李文會試御史中丞右司諫詹大方試右諫議大夫丁丑詔四川路內藏錢帛並易輕賫赴行在惟絹以本色戊寅內出鎮圭付國子監以奉文宣王先是有司請以藥玉或珉石為之上曰崇奉先聖豈可用假玉左朝奉大夫祕閣修撰趙子稱既卒詔侍從臺諫集議普安郡王當持何服議者張澄李文會秦熺周三畏王煥劉才邵詹大方張叔獻段拂何若遊操奏檢照國朝會要嘉祐四年九月詔使臣內殿崇班太子率府率以上遭父母喪並聽解官行服宗室解官給俸所有普安郡王持服乞依故事庚辰秦檜進呈上曰初議養宗室子今子稱死若不使之持服則非本朝典故宜從其議熊克小歷云普安郡王瑗以父子稱身故乞持服日歷議狀全文不云王自陳當考瀛海軍承宣使知閣門事充大金報謝副使鄭藻改鎮東軍承宣使日歷不言所以程敦厚外制集有華州觀察使傅忠信改除制詞公朕方務昭大信以固圉故推長利而正名可溫州觀察使二月壬午朔尚書工部侍郎王煥充寶文閣直學士知平江府從所請也癸未宰執奏𣙜貨務茶鹽推賞事上因論祖宗茶鹽之法納粟于邊請鈔于京公私皆便不惟邊面可實而又免轉輸之勞朕嘗思祖宗立法無不善者豈可輕議變易上又曰朕因前日金使須要射以謂武備不可一日弛深慮邊事寧息諸軍稍怠朕見造金銀碗將因暇日親閲用此旌賞以勸激之熊克小歷載此事於二月戊寅按二月無戊寅戊寅乃正月二十六日不知克何以差誤少傅鎮潼軍節度使江南東路安撫制置大使判建康府兼行宫留守信安郡王孟忠厚與資政殿學士知紹興府樓照兩易左承議郎潼川府路轉運判官楊椿改本路提點刑獄公事時諸路漕臣多獻羡餘獨椿無所獻帝曰今瘡痍未瘳愧不能裕民力其肯掊克以資進身耶乙酉左朝奉郎江南東路制置大使司參議官朱敦儒為兩浙東路提點刑獄公事丁亥詔川陕宣撫司便宜合換給文字限一年陳乞盡今冬毋得受先是宣撫副使鄭剛中乞將磨勘酬賞等事收還省部却將軍旅事務便宜施行故吏部以為請焉靖州乞依舊置新民學教養溪洞歸眀子弟以三十人為額從之戊子國子司業髙閌等率諸生上表請視學手詔宜允故左朝奉郎劉長孺特贈二官録其家一人以權華隂縣日死事故也長孺已見紹興九年己丑福建安撫使葉夢得乞將見拘留海船與不係籍船户輪流差使上曰不惟海船一事民間積欠亦可放秦檜曰自來諸州各乞放積欠為惠不均欲令戶部取諸路之數條可蠲者以聞上曰善因言朕頃在山東河北備見民間利病如官司錮吏下鄉催科此適足資其為姦耳乃詔江浙等路紹興八年以前拖欠並與蠲之放欠指揮在此月癸巳今併附此熊克小歷載福建帥司所奏在甲申今從之日厯中興聖政內史臣曰聖人中心之仁譬猶榖之有種也上因海船之請而遽及於逋負蓋其愛人利物之誠根於聖性故有以感發之而仁不可勝用矣辛卯復置教坊凡樂工四百有十六人以內侍充鈐轄三十一年六月罷甲午上諭大臣曰昨嘗降旨諸軍揀汰人數令便招填可嚴切行下不然暗損軍額不可不慮恐緩急誤事時皇太后築外第有遷徙居民處上命臨安倍支般挈之費仍對撥官屋居之毋令失所二事熊克小歷繫之三月甲子今從日歷乙未鈞容直乞推賞上曰可與支賜仍降旨為第一次祗應有勞今後並依此體例庶絶其後來希望耳丙申上謂大臣曰近見鄭剛中奏減民間科須數目不少朕聞之頗喜自是四川之民當少蘇矣給事中兼權直學士院楊願等送伴北使還入對自是率如之戊戌初令四川都轉運司嵗撥總制錢一百七十三萬餘緡市輕賫并細絹四萬七千餘匹綿四千五萬餘兩赴鄂州總領司樁管自去秋以右護軍統制田晟所部隸馬司故取其贍軍錢帛至今蜀中號田四廂錢是嵗四川始取稱提錢四十餘萬緡以備軍費詳見十八年四月乙酉丙午左通奉大夫參知政事万俟卨依前官提舉江州太平觀先是卨使金還太師秦檜假金人譽已數十言囑卨奏於上卨不可他日奏事退檜坐殿廬中批上旨輒除所厚官吏鈐紙尾進卨拱手曰偶不聞聖語却不視檜大怒自是不交一語御史中丞李文會右諫議大夫詹大方聞之即奏卨黷貨營私窺搖國是卨再上章求去命以資政殿學士出守及入謝上問勞甚悉檜愈怒給事中楊願因封還録黃乃有是命同知大宗正事士䅳請宗學生以百貟為額大學生五十小學生四十職事人各五人從之己酉資政殿學士新知紹興府樓照過闕入見即日除簽書樞密院事兼權參知政事中書舍人兼直學士院劉才邵祠部貟外郎王觀國並罷御史中丞李文會論二人皆以附万俟卨為腹心中懷異意自作弗靖若久在朝必害至治乃以才邵知漳州觀國知邵州軍器監陳康伯權尚書吏部侍郎尚書左司郎中李若谷權工部侍郎以將出使也樞密院檢詳諸房文字吳秉信守右司貟外郎倉部貟外郎王循友為樞密院檢詳諸房文字奉國軍節度使知金州兼樞密院都統制郭浩檢校少保以將還鎮也三月壬子朔上謂大臣曰聞臨安府官地民間見佃者近日頗為豪強所奪至毁其屋宇此事在民利害甚大宜令禁止仍舊給與小民癸丑秦檜等奏選除武岡軍守臣上曰猺人當安不可擾煙瘴之地遣兵討伐視他處尤難不可不慎乙卯輔臣進呈諸路未發上供錢糧數上曰江浙京湖積年拖欠皆虛數紹興十年以前除形勢及第二等以上户外悉蠲除之仍出榜曉示官吏故違許之越訴于朝資政殿大學士提舉臨江府洞霄宫張守為江南東路安撫制置使兼知建康府丁巳以右護軍選鋒左右遊奕軍為馬軍司第五至第十將管軍田晟部曲始至行在故也庚申户部尚書張澄乞諸路坑冶委的有名無實去處令憲漕司別立酌中課額仍覺察無令有力之家計囑幸免致下户受弊上曰寧於國計有損不可有害於民若富藏於民猶國外府不然貧民為盜常賦且將失之此有若所謂百姓足君孰與不足者也尚書禮部侍郎秦熺免兼資善堂翊善從所請也權禮部侍郎段拂兼資善堂翊善熺免兼資善必有説丁卯改岷州為西和州金人避阿古達諱更為祐州至是改之與階成鳯州皆隸利路端眀殿學士川陕宣撫副使鄭剛中改四川宣撫副使去陜字日歷無此今以會要修入己巳上幸太學祗謁先聖止輦於大成殿門外步趨升降中興聖政史臣曰治道莫盛於堯舜而夫子則眀堯舜之道者也故欲舉堯舜之治必先推本眀堯舜之道者退御敦化堂命禮部侍郎秦熺執經國子司業髙閌講易泰卦權侍郎正刺史已上並與坐講畢賜諸生席于廡下啜茶而退遂幸養正持志二齋觀諸生肄業之所賜閌三品服熺與學官皆遷官諸生授官免解賜帛如故事中興聖政臣留正等曰學校以教之王政之本也樂育人材菁莪之義也士不素養而求一旦之用猶兵不禁練而責其一日之戰也太上皇帝興太學以養天下之士慮其未廣又下增貟之令譬之嘉榖種之力者獲必豐養之至者才難何慮矣詔今後臣僚有面刺大字或燒灸之人許入見時諸將多起於羣盜上既命更迭入朝統制官李用者面刺雙旗閣門以為疑故審於上而有是命此以會要增修壬申太師秦檜言陛下文德誕敷干戈載戢乃者祗謁先聖遂幸太學躬行之化乃在斯舉臣不勝慶幸乞宣付史館仍許拜表稱賀上曰非卿力主和議兵革休息則學校何由興所請宜依故事熊克小歷云上幸太學言者以為盛事乞宣付史館蓋誤權尚書禮部侍郎兼權實録院修撰兼資善堂翊善假拂試中書舍人兼職如故國子司業兼崇政殿説書資善堂贊讀髙閌權尚書禮部侍郎徽猷閣直學士胡寅聞之移書責閌曰太學者明人倫之所在也閣下召自間廢有成均之命竊自計曰今天下方無三綱斯人之所以來乎及見請視太學之表寅心惕然不意閣下有所請而有斯言也昔秦楚敵國懷王不還楚人憐之如悲親戚蓋忿秦之以強力姦詐加於其君使不得其死其􅉃勝於加之刃也太上皇帝我中原受命之主劫制強敵生往死歸此臣子痛心切骨坐薪嘗膽宜思所以必報者也而柄臣者乃敢欺天罔人以大讎為大恩乎昔宋公為楚所執楚子釋之孔子筆削春秋乃曰諸侯盟于薄釋宋公不許外國之人得制中國之命也太母天下之母其縱釋乃在外國之君此中華大辱臣子所不忍言者也而柄臣者乃敢欺天罔人以大辱為大恩乎大宋基業封疆皆太祖太宗收用英俊勤恤民隱躬擐甲胄與天下士夫勞苦以得之人纍聖嚴恭寅畏不敢荒寧而守之者也今關河重地悉為敵封園陵暴露不得瞻守宗族拘隔不得相見土地分裂人民困苦不得鳩集寃恨之氣外薄四海不得伸雪而柄臣者方且施施然厚誣天下自以為有大功乎閣下受其知遇何不勤勤懇懇而為之言乎言而或聽天下國家實幸甚也晉朝廢太后董養遊太學升堂嘆曰天人之理既滅大亂將作矣則逺引而去今閣下目睹忘讎逆理北面事敵以茍晏安之事猶偃然為天下師儒之首既不能建大論明天人之理以正君心乃阿諛柄臣希合風旨求舉太平文具之典又為之詞曰云云欺天罔人孰甚焉是黨其惡也人皆謂閣下平生志業掃地去矣數十年積之而一朝毁之乎春秋之業誅國賊者必先誅其黨歷觀往古人君以無道行者猶不能終况人臣而敢肆然以無道行之乎一旦明天子監亂亡之禍赫然震怒以咎任事者嗚呼危哉豈不與董養異哉閣下不及今翻然改圖則必與之俱矣尚書右司員外郎吳秉信守起居舍人御史中丞李文會言建寧軍承宣使提舉江州太平觀解潛本趙鼎之客不從和議及和議之效既著居常不樂明州觀察使浙西馬步軍總管辛永宗好撰造言語變亂是非二人者守官寄居皆在平江衝要之地倡為異説恐使命往來傳聞失實旋致疑惑誠為未便詔永宗移湖南副總管潛責濠州團練副使南安軍安置何俌龜鑑曰竄王庶檜怒其不附和議也竄胡銓檜怒其曽沮和議也論趙鼎論曽開論李彌遜而此心無愧之張九成既與之編置不肯附和議之解潛亦從而謫居焉王次翁之力排趙鼎則喜之孫近之請名張浚則惡之生殺廢置惟已所欲異時賢士五十三人皆欲置之死地獄成未上而檜則自斃矣天之所欲又豈人之所能為哉癸酉秦檜進呈講筵闕官因言陛下聖學日躋實難其人上曰朕學問豈敢望士大夫但性好讀書檜曰士人讀書固多但少適用若不適用或託以為姦則不若不讀之為愈上又曰王安石程頥之學各有所長學者當取其所長不執於一偏乃為善學檜曰陛下聖學淵奧獨見天地之大全下視專門陋儒溺於所聞真泰山之於邱垤也乃以御史中丞李文會兼侍讀右諫議大夫詹大方權禮部侍郎髙閌並兼侍講閌仍兼資善堂翊善太學博士陳鵬飛兼崇政殿説書尚書禮部侍郎秦熺兼直學士院乙亥上出文宣王贊刻石賜學官髙閌言陛下贊文形容先聖盛德無愧於古上曰唐明皇作贊文乃斥先聖先師之名非尊儒重道之意閌曰此尤見聖學髙出前代帝王之上其後上又悉贊七十二子丁丑左奉議郎敕令所刪定官李朝正守尚書户部員外郎司農寺丞宋貺為金部員外郎貺歙縣人初見紹興十一年七月戊寅尚書省勘會趙鼎李光折彥質該去年郊恩合行檢舉詔更俟一赦取旨右宣教郎新湖南安撫司參議官王銍獻祖宗八朝聖學通紀論詔遷一官己卯左中大夫提舉臨安府洞霄宫富直柔復端明殿學士右宣教郎新利州路提點刑獄公事李志行乞戒飭諸路帥臣監司將前後所承寬恤民力及恤刑詔書恪意奉行違者重置典憲上曰二事皆切中時病方今兵革既息惟寬恤民力欽慎庶獄是為急務可令有司申嚴立法行下庚辰詔諸軍應有刻板書籍並用黃紙印一帙送祕書省夏四月癸未葬柔福公主主既死從梓宫者以其骨歸至是葬之甲申詔刑部將半年以上未結絶公事行在委本部外路委監司責限結絶內日月稍逺者取問因依申奏以都省言四方多滯獄也丙戌命太師秦檜提舉製造渾儀詔有司求蘇頌遺法來上上謂檜曰宫中已製成小範可以窺測日以晷度夜以樞星為則蓋樞星中星也非久降出用以為式但廣其尺寸爾遂命內侍邵諤專主其事將作監丞蘇籕面對乞取近世儒臣所著經説集而成編以補唐之正義闕遺上諭秦檜曰此論甚當若取其説之善者頒諸學官使學者有所宗一則師王安石程頥之説者不至紛紜矣籕初見紹興三年九月左承議郎林待聘充敷文閣直學士知衢州待聘初免喪乃有是命責授左朝散郎祕書少監漳州居住孫近責授左朝奉郎祕書少監筠州居住范同並復三官提舉江州太平觀近興化軍同池州居住用尚書省檢舉也顯謨閣學士提舉亳州眀道宫曽楙卒丁亥秦檜奏乞禁野史上曰此尤為害事如靖康以來私記極不足信上皇有帝堯之心禪位淵聖實出神斷而一時私傳以為事由蔡攸吳敏上皇曽諭宰執謂當時若非朕意誰敢建言必有族滅之禍樓照曰上皇聖諭亦嘗報行天下所共知也檜曰近時學者不知體人謂司馬遷作謗書然武紀但盡記時事豈敢自立議論祕閣修撰知虔州薛弼言江東鎮民居木柱內有天下太平年五字適符上元甲子之歲此殆天發其祥非人力所能為詔侍從同觀仍送史館庚寅皇后謁家廟推恩外家甲午執政奏呈得泗州牒金人復索淮北人之在南者上曰第令邊臣報以朝廷見依誓書發遣蓋誓書所載淮北人遣歸者取其情願也秦檜曰如此甚便樓照曰早來秦檜所論仰符聖訓趙甡之遺史今年四月命州縣刷遣前後歸明人發還金國乃與秦檜奏對之語全不同命侍衛馬軍司將官張守忠往福建捕盜時海賊朱明熾甚將官武功大夫張深與戰而死故遣守忠捕之上謂大臣曰民愚為盜不足蕩平第憂被驅脅雖釋其罪使之歸業生理已蕩析矣乙未吏部奏以左朝請大夫主管台州崇道觀趙令襟通判德安府時令襟以事至臨安御史中丞李文會論令襟頃在建康為郎官適淮西之變乃以急速請對實為大臣遊説陛下察見姦偽即賜罷黜今乃恬然不顧依舊奔走省謁于此詔送吏部仍日下出門丙申顯謨閣直學士提舉江州太平觀劉寧止卒戊戌權吏部侍郎陳康伯為報大金賀生辰接伴使容州觀察使知閣門事曹勛副之自是歲為例勛仍以嘗將到先朝御筆及編修接送館伴例册有勞遷保信軍承宣使庚子軍器監丞蘇䇿轉對乞逺方之民委有孝行者令州縣以聞乞行旌表詔申嚴行下䇿軾孫也辛丑少傅判紹興府信安郡王孟忠厚乞朝永祐陵等􅓖宫許之忠厚既朝陵將入見謂寓居新湖南安撫司參議官王銍曰忠厚與秦會之雖為僚壻而每懷疑心今當入朝欲求一不傷時忌對劄銍言元祐中姚麟以節度使守蔡建言乞免帶提舉學事朝廷許之忠厚喜即入奏如銍言詔可尋又降旨武臣帥守並免繫銜自是以為例此據王眀清揮麈録附入日歷未見甲辰少保領殿前都指揮使職事楊存中請詣太學謁先聖上曰學校既興武人亦知崇尚如漢羽林士皆通孝經况其他乎丁未西南小張蕃貢方物詔廣西經略司受而答之己酉詔諸州秋試官所差不足或無經術精通之人許於見任祠官中通選以邵武軍軍學教授宋藻代還有請也五月按是月辛亥朔壬子詔左承議郎知均州范寅賔措置乖方引惹生事可特除名勒停寅賔初見紹興二年九月措置事當考甲寅將作監米友仁權尚書兵部侍郎丙辰饒州言右迪功郎薑樓等獻錢十萬緡以助國用上曰國用有常自不至闕不然雖多亦有不足之患其還之右金吾衛上將軍王舜臣復檢校少師嶽陽軍節度使提舉佑神觀舜臣徽宗王貴妃之父也靖康初倒納節至是特復之詔四川宣撫司就階成西和鳯州募兵赴行在先是右護軍都統制吳璘言西邊可募衛兵上諭輔臣曰諸軍招填闕額類是南人恐西北寖損數年之後始見其弊兼諸路軍器物料近多不到方間暇時尤宜整治秦檜曰外議妄謂朝廷講好休兵不以武備為急不知除戎器戒不虞聖慮未嘗忘也丁巳詔祕書省火禁依皇城法己未御史臺檢法官汪勃主簿黃應南並為監察御史應南邵武人也甲子資政殿學士簽書樞密院事兼權參知政事樓照罷御史中丞李文會右諫議大夫詹大方論照素無繩檢交結蔡京亟改京秩其帥紹興不恤國事溺愛二倡詔以本職提舉江州太平觀初作都亭驛乙丑御史中丞兼侍讀李文會言權尚書禮部侍郎兼侍講髙閌初為蔡攸之客媚蔡京以求進復録程頥之學徇趙鼎以邀名權工部侍郎王師心奉使大金專務嗜利起居舍人吳秉信機巧便利專結樓照此三人者若久在朝必害至治詔以閌知筠州師心知袁州秉信知江州先是上在經筵嘗謂閌曰向來張九成嘗問朕左氏傳載一事或千餘言春秋只一句書之此何也朕答之云聖言有造化所以寓無窮之意若無造化即容易知乃常人言耳閌曰説春秋者雖多終不能發明正如窺造化矣上曰九成所問極是閌曰陛下所答亦極是上因問九成安否翌日謂秦檜曰張九成今在何處檜曰九成頃以倡異惑衆為臺臣所論既與郡乃乞祠觀其意終不為陛下用上曰九成清貧不可無祿檜疑閌薦之呼給事中兼侍講楊願詢其事文會即劾閌是日拜文會端眀殿學士簽書樞密院事兼權參知政事自是執政免即以言者代之吕中大事記曰自如淵擢中丞而巫伋鄭仲熊李文會之徒除授悉由密啓欲竄逐諸賢則使之露章而論其罪欲斥去執政則使之彈擊而補其闕而臺諫之權在檜矣丙寅太常諡故觀文殿大學士張商英曰文忠按勾濤為商英請諡在紹興七年不知此時何以方舉行丁卯左奉議郎諸王宫大小學教授葛立方言陛下決䇿定計成此中興親迎長樂之鑾輿坐息邊陲之烽火格天之業敻無前比臣雖賤微惴惴然惟恐讒説潰成動搖國是蚤夜思之弗置也伏望特降詔旨申勑臣工使之精白一意上承休德如有懷姦弗靖煽惑士流者令御史臺覺察流之四裔永為臣子不忠之戒從之立方勝仲子也紹興二十九年朱倬論立方嘗請與秦檜不合者立為黨碑檜雖不從人皆怒罵恐即是此時也大理評事孫敏修請罪人不以赦降原者遇非此赦或再遇大禮赦雖有專條亦聽原免從之近制犯私茶鹽及擅支常平錢之類皆不許引海行法原赦至是用敏修言始除其律焉戊辰權尚書吏部侍郎陳康伯假吏部尚書充大金報謝使以金來賀生辰故也上欲用右武大夫嘉州防禦使錢愷為副愷方持母喪乃起復故官假保信軍承宣使知閣門事左朝散郎尚書吏部員外郎黃達如降一官放罷坐前知南雄州日私役禁軍販易物貨故也事初在紹興十二年十一月達如為提點坑冶司所按贓汚巨萬獄既上雖秦檜亦不能掩僅此罷黜人亦快之己巳金主始遣驃騎大將軍安國軍節度使烏雅和通議大夫行大理少卿孟浩來賀天申節遺上珠一囊金帶一條衣七襲色綾羅紗縠五百段馬十匹自是歲如之右正言詹大方言左朝散郎新知遂寧府蘇符居論思之地識慮暗淺朝廷畀之便郡而踰年不行徘徊近地窺伺時事人為切齒詔降符二官趣之任辛未天申節文武百官金國人使上壽於紫宸殿故事北使上壽畢同百官殿上賜酒三行次赴筵于尚書省至是特就驛燕之仍以執政官押伴癸酉大燕垂拱殿甲戌秦檜奏昨日殿宴大金人使執禮甚恭可見其鄉慕之心上曰樂語之類朕亦嘗觀待之厚矣彼安得不然也初兩浙轉運副使李椿年置經界局于平江府守臣直祕閣周葵見椿年問之曰公今欲均稅耶或遂增稅也椿年曰何敢增稅葵曰茍不欲增胡為言本州七十萬斛椿年曰若然當用圖經三十萬數為凖時秦檜怒葵不已椿年因奏葵在郡錫宴北使飲食臭腐致行人有詞葵坐落職主管台州崇道觀自是投間十一年按葵行狀其罷平江在此年而日歷會要皆不見未知在何月日丙子祕閣修撰江南東路制置大使司參謀官馬觀國充敷文閣待制提舉佑神觀秦檜將遣觀國還北地故特遷之丁丑北使辭行自是留館中率不過十日左宣教郎王之望行太學録之望榖城人初舉進士考官孫道夫異其文欲置魁等衆議不同他日知貢舉朱震持以示人曰此小東坡也戊寅命祕書省補寫黃本書籍己卯右諫議大夫詹大方為御史中丞仍兼侍講監察御史何若為正言監察御史汪勃守殿中侍御史監察御史遊操試祕書少監六月辛巳朔檢校少保奉國軍節度使知金州郭浩辭行右朝奉郎曽惇知台州惇嘗獻秦檜詩稱為聖相故以郡守處之此據紹興二十八年七月葉義問劾疏修入自檜擅權凡投書啓者以臯夔稷卨為不足比擬必曰元聖或曰聖相此據趙甡之遺史甲申詔江浙等路州縣酒稅欠折坊場廢壞綱運沉失倉庫漏底委非侵盜者皆蠲之左朝散大夫提舉江州太平觀興化軍居住孫近降三官移南安軍住坐詐名士人鮑得朋為子壻奏補恩澤為臺章論列也戊子右迪功郎權國子録師古特改右承務郎通判敘州古即維藩也初以幸學恩應改秩而吏部謂古文學攝官當俟注正官日收使國子司業宋之才言特恩與常格不同乃有是命廣西經略司言安南請入貢詔使人免到闕貢物就境上交割仍優答之辛卯普安郡王府學教授趙衛等言王已誦文選稍通經書意義可學為文詔令讀左氏傳對句及評議故事壬辰四川宣撫副使鄭剛中言已減四川和糴米一年廣西經略司言西南大張蕃武泰軍請入貢詔本司受而答之癸巳尚書兵部員外郎錢時敏為右司員外郎兼權起居舍人上覽除目曰神宗聖訓云左右司便是學為宰相豈可不慎擇時敏溧陽人也時敏攝右史都司題名在此月太學博士兼崇政殿説書陳鵬飛守尚書禮部員外郎太府寺丞張子儀行屯田員外郎宣州言涇縣魔賊俞一等竊發上曰兩國修和並無科須民何乃為盜監司每奏無事魔者今乃有此可令取問時提點刑獄公事洪興祖已代去乃降興祖二官為左奉議郎自今不得與監司差遣興祖行遣在六月甲辰於是守臣秦梓遣兵捕滅之後遷一官梓轉官在十月乙未上謂大臣曰浙東福建被水災處可令監司躬往悉力賑濟務使實惠及民毋為文具時江浙福建同日大水建州水冒城而入俄頃深數丈公私廬舍盡壞溺死數千人嚴州水暴至城不沒者數板右奉議郎通判州事洪光祖光祖初見建炎三年三月集舟以援民且區處山阜給之薪粥卒無溺者衢信處婺等州民之死者甚衆林泉野記云嚴衢信處婺州等州大水士民溺死數百萬秦檜隱而不奏有開言者必罪之按日歷五月戊辰上宣諭婺州水漲事今又及此則檜非不奏但不盡奏耳祕書省正字吳芾轉對言江浙之地軍興以來人苦貴糴望申命有司凡米之稅悉從蠲免庶幾民被實惠詔户部看詳芾仙居人也丙申詔趙子稱許用普安郡王除節度使特贈太子少保令秀州量行應副葬事右武大夫華州觀察使提舉佑神觀白鍔特刺面配萬安軍時閩浙大水鍔乃自北方從太后歸者宣言燮理乖繆洪皓名聞中外顧不用太師秦檜聞之奏繫鍔大理寺鍔館客張伯麟嘗題太學壁曰夫差爾忘越王之殺而父乎伯麟亦下獄獄具鍔坐因伯麟嘗問何故不用亷訪使鍔答以任內臣作耳目正是祖宗故事恐主上不知因出言指斥案奏乃有是命伯麟亦杖脊刺配吉陽軍御史中丞詹大方即奏皓與鍔為刎頸交更相稱譽誑惑衆聽時皓以徽猷閣直學士知饒州丁酉詔皓提舉江州太平觀己亥尚書禮部員外郎兼崇政殿説書陳鵬飛兼資善堂贊讀是日上諭秦檜曰蔣璨守鎮江更不任事只是避事卿等可擇人代之至如揚州在淮東尢為衝要守臣亦不可不擇檜因言二十年來人人但知為己靖康間陛下奮不顧身親至軍前當時若避事不出亦可上曰朕以宗廟社稷為重一身不恤也蔣璨八月壬午放罷揚州守臣許中七月壬申奏祠庚子左通奉大夫提舉江州太平觀万俟卨降左中大夫歸州居住李文會在中司論卨兄右朝散大夫止以嬖妾為兄女嫁士人林讜奏受將仕郎止除名讜送二千里外州編管而卨有此命辛丑御史中丞詹大方言陛下作新庶政光啓中興而士大夫輕於為國重於謀身前此事之未定且進且郤利於己身則就之謀及國家則避之今事之既成時向安平則專務進取隂交伺隙此風不革最害治之大者伏望眀詔大臣崇奬亷隅退抑姦險將見大小之臣咸懷忠良中興之盛可立而待詔榜朝堂甲辰淮東轉運判官湯鵬舉言五月乙亥楚州鹽城縣海水一槩澄清秦檜請率百官入賀上曰自太祖平定天下太宗時干戈偃息真宗時祥瑞甚多祖宗聖語止於豐年為瑞第可付史館不必受賀檜曰不受賀尤見大體乙巳詔國子監置小學先是監尚書六部門程允元轉對援故事有請前十日擢允元太府寺丞至是行下允元建請在四月戊申丙午右正言何若言陛下倚任忠賢排屏姦慝蓋深知致治之要臣望陛下獨觀昭曠之上以照臨臣下審知其君子也則信任之知其小人也則斥逐之如是則一心徇國者得以輔治異趣而徇私者不能以害治中興之業愈久而愈隆矣上覽疏謂秦檜曰朕任臺諫正要分别君子小人若小人者但時察而去之斯不害治矣熊克小歷但書何若乞進君子退小人六字非其本旨今依日歷所載摘書之克又稱上諭若云云此乃秦檜進呈所得聖語克誤也建炎以來繫年要録卷一百五十一建炎以來繫年要録卷一百五十一金人地名考證烏雅原書作烏延誤今改正阿古達原書作阿骨打誤改見卷一
