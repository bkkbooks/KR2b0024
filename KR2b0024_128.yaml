body:
  text: 建炎以來繫年要録卷一百二十八宋李心傳撰紹興九年五月庚辰朔亳州民陳逹等請輸稅以助國用上不許中書門下省檢正諸房公事閭邱昕權尚書吏部侍郎左司員外郎陳橐權刑部侍郎起居舍人王次翁試中書舍人右司員外郎林待聘試起居郎左司員外郎程克俊試起居舍人中書舍人劉一止轉對言神宗復隋唐之舊始置義倉然而推行之意有未盡合於古者今置倉入粟止在州郡歲饑散給僻逺之民罕霑其利臣謂當於本縣鄉村多置倉窖自始入粟以及散斂悉在其間大縣七八處小縣三四處逺近分布俾適厥中如未有倉窖則寄寺觀或大姓之家縣令總其凡以時檢校遇饑饉則丞簿尉等分行鄉村計口支散庶幾僻逺之民不復棄家流轉道路此大利也疏奏不行嘉泰四年五月諸縣置倉右諫議大夫曾統言今縣官歲入僅足以支出國計可謂急矣有司既不知養財之術又不知節制之度豈不殆哉且以去冬及春以來遣使之費言之命韓肖胄報聘金國又命王倫交割地界遣方廷實宣諭三京河南命郭仲荀留守東都遣周聿郭浩宣諭陜西遣士㒟張燾祇謁陵寢又命樓照至永興等路宣布德意凡此七使所携官吏兵民不知其浩費當幾何竊聞熙寧命宰相韓絳宣諭陜西才費十八萬緡時論沸騰以為大咎今一使之出已數倍於昔合而計之不知其幾何矣雖事有出於不得已者而援引體例皆非舊比臣願檢照國朝舊遣使命則例裁定其要使前有所稽後為可繼庶幾可以及逺從之資政殿大學士新知福州張浚辭免新命上不許中書舍人兼直學士院李誼復言頃為諫官纍論浚過失不肯草詔乃命舍人劉一止撰述用金書遞趣行癸未直龍圖閣知明州周綱為中書門下省檢正諸房公事尚書右司員外郎范璿樞密院檢詳諸房文字王鉌並為左司員外郎吏部員外郎魏良臣大理少卿潘特竦並為右司員外郎吏部員外郎朝謙之為樞密院檢詳諸房文字祕書省校書郎兼實録院檢討官邵溥知果州時上屬意史官所以顧溥甚寵嘗賜御府法書黃金器錦綺珍劑而言者論其過乃命出守甲申太常少卿周葵守殿中侍御史趙鼎之始相也葵在臺中嘗連章極論趙子淔不可用語侵鼎坐是不得其言而去逮秦檜獨相意葵必憾鼎再引入臺葵行狀云公語人曰元鎮已貶某固不言雖門下客亦不及也按葵論董弅所稱權臣即是指鼎今不取一日內降差除四人葵言願陛下以仁祖為法大臣以杜衍為法檜始不樂祕書郎何鑄為監察御史乙酉宗正少卿三京宣諭方庭實言永安永昌陵制度極為簡古將來徽宗山陵乞明詔有司務從簡儉上納之丙戌名顯肅皇后神御殿曰承順時原廟未立承元承順殿皆寓行宫天章閣之西武經大夫濰州團練使知亳州王彥先應詔言利害賜勑書奬諭丁亥龍圖閣直學士提舉江州太平觀李逮為京畿都轉運使初命吳革為畿漕又用趙子淔子淔入見不果行乃命逮往少師京東淮東等路宣撫處置使韓世忠請倚閣俸給之半以助軍用不許戊子大理少卿周三畏為大理卿左朝奉大夫趙令襟提㸃福建路刑獄公事是日判大宗正事士㒟兵部侍郎張燾朝謁永安諸陵前二日士㒟等至河南民夾道歡迎皆言久隔王化不圖今日復得為宋民有感泣者士㒟等入柏城披荆履蘖隨宜葺治成禮而還陵下石澗水自兵興以來久涸二使到水即日大至父老驚歎以為中興之祥士㒟等既朝陵留二日遂自鄭州歷汴宋宿泗淮南以歸行在中興聖政臣留正等曰山川草木之所好惡與人情不相逺也以山川草木為無知欺孰甚焉周公廟在岐山西北所謂潤德泉者世亂則竭此皆物理之常然者庚寅奉迎欽先孝思殿祖宗御容赴行在先是劉豫入東京毁天章閣遷御容於啓聖院至是王倫遣官辨認以聞故有是㫖詔環慶經略使趙彬免兼權陜西諸路都轉運使從所請也壬辰東京留守王倫言自至京師民李興等獻銀帛芻粟以贍軍詔奬之還其獻祕閣修撰四川宣撫司參議官陳逺猷復為四川轉運副使俟吳玠辟到參議官日令赴任本司題名陳逺猷紹興七年三月初六日到任十年閏六月十六日致仕與此不同未知逺猷去而復回題名脫漏或以宣司便宜之命未嘗解去也當考癸巳河南諸州進天申節銀帛上曰新復州郡財用無餘此寧免於擾民其勿受如取於民者令散還之時宿州諸縣以迎兩宫為名沿路蓋屋上曰新民豈可重困乃罷縣令仍詰守臣縱而不舉之罪先是左宣議郎王之道嘗遺左諫議大夫曾統書大略言金人自宣和靖康以來愚㺯朝廷有同兒戲而朝廷之上乃獨斷然以為非姦非詐惟恐奉承之不暇前日劉豫之擒未逺又况包藏禍心未易窺測且事固有未見其利而先見其害淮西兵火之餘遺民百無一二重以奉迎兩宫之故竊嘗以一邑計其費不下五七萬緡使金人誠還兩宫斯民正復竭膏血鬻妻子以應所須猶將欣然不爾雖食王倫之肉何能謝哉愚謂今日之事殆古人所謂可弔不可賀者請以五事備吾君之採擇其一淵聖南來俟其渡河即請下手疏以自訟其二梓宫及淵聖到日自天子以下素服郊次而哭仍密諭河南所過州縣一切凖此而其供張之類純用布素其三竊聞梓宫以下神櫬無慮十百請委西京守臣豫修陵寢繼遣一二大臣蒞葬取神櫬之最下者斫而視之然後奉安且令諸道飭武備以戒不虞其四兩宫宿食供頓所經或無屋宇乞依南郊青城故事預辦數千匹之青布臨時張設以庇風雨而明詔諸路勿造宫殿勿飾器用以重費民力其五梓宫之還天子宜哭泣衰絰以從未葬之禮統不能用也時東京留守王倫亦請梓宫所過州縣舉哀致祭上從之王之道上曾統書在此月今因行遣宿州事附見王倫奏請在此月丙戌徽猷閣直學士仇悆升寶文閣直學士充陜西路都轉運使左朝奉大夫知徽州吳偉明直祕閣應天府路提㸃刑獄公事甲午尚書都官員外郎丁則知道州祕書省正字汪應辰通判建州樞密院編修官趙雍通判瀘州並免辭謝三人皆以論事忤秦檜故出之雍嘗有書亦論不當議和事降授左朝奉大夫直祕閣宇文彬送吏部與合入差遣彬守果州坐獻嘉禾圖降罷至是上書訟土居士大夫十餘人之罪中書言理合懲戒故有是命乙未尚書祠部員外郎劉昉為禮部員外郎著作佐郎張廣為祠部員外郎祕書郎朱敦儒為都官員外郎左朝奉大夫新知簡州蒲贄為荆湖北路轉運判官樞密院計議官曾䋖提舉淮南東路茶鹽公事填復置闕䋖肇子也自兩淮復置監司而鹽事以漕臣兼領議者以為今鹽課歲入一千三百餘萬緡而淮東為七百七十餘萬緡且新復州軍多仰淮東鹽貨般販利入最多故復置官提舉武義大夫忠州刺史主管萬壽觀公事邢孝揚落階官為成州團練使丙申上謂輔臣曰鋪翠銷金之飾屢詔禁止宫中雖無敢犯而有司奉行不䖍市肆公然為之權貴之家至有銷金為舞衫者可重立告賞在必行秦檜退而批㫖第令廣南監司督責緝捕採販翡翠而已權刑部侍郎陳槖請申飭諸路大辟具獄非有可憫之實不得附㑹遷就論奏如稍違戾即置之典憲詔本部檢察槖又請立限下新復州軍具文武官未經真命員數申朝廷換給事下吏部後不行戊戌尚書省勘㑹國家經費惟仰二稅間有陳乞蠲免之人理宜禁絶詔户部遵守執奏如有已經施行者並改正此似為張俊設當考徽猷閣待制新知瀘州劉觀罷以御史中丞廖剛論觀在僞楚時嘗有指斥淵聖皇帝之語故也資政殿學士左光祿大夫提舉鳯翔府上清太平宫宇文粹中薨贈少保青田縣童子梅元眉七嵗喪其祖抱棺而寢守墓不去夜有羣鵲喜噪祥光照冢上守臣以聞庚子詔賜粟帛壬寅詔自今百官並久任如有僥冒陳乞之人取㫖黜責時殿中侍御史周葵論自頃大臣市恩而不任怨爵賞輕而人有奔競之心刑罰弛而下無畏服之意風俗不靖職此之由甚者布衣獻書敢納宰執州縣官有請誅大臣者此風豈可長哉願詔大臣悉心奉法漸矯前日之弊故有是㫖布衣薦宰執恐是指周南仲已見七年八月末未知即此否或又别有上書者當考癸卯起居舍人程克俊言河南故地復歸版圖父老苦劉豫煩苛久矣賦斂及於絮縷割剝至於蔬果宿債未償缺牘具在欲望明詔新疆州縣取劉豫重斂之法焚於通衢詔如所請豫之僣也凡民間蔬圃之田皆令三季輸稅又令民間供贍射士宣諭官方庭實嘗言其不便事下諸路漕臣措置故克俊及之上因言太祖皇帝混一天下當時彊藩悍鎮與方命之臣既歸在朝廷皆加容貸今中原官吏復還本朝朕方以天下為度凡舊染之汚一切務在兼容上又曰今恢復新疆正是求治之初士大夫在外者輒辭難避事在內者多循私立異卿等當分别明示賞罰方庭實奏請在是月癸巳今併書之詔兩浙轉運司措置明州廣德湖利害申尚書省湖在州西十里外周回五十餘里灌民田近二千頃畝收穀六七斛自政和末始廢為田得租米萬九千餘斛近歲仇悆為守又倍增之紹興七年然民失水利所損穀入不可勝計至是中書門下省檢正諸房公事周剛自明州召歸請復廢田為湖故有是㫖焉左迪功郎張行成獻芻蕘書二十篇其首曰定謀大略謂關中汴洛之地我無故得之然敵情未可測意我得關中必以蜀兵實之得汴洛必以吳兵鎮之留梓宫以多索賄賂我必竭吳蜀之財以奉之兵移則守解賂重則財困然後求我之釁正彼之名舉兵以來乃得志矣自古講和多矣未有終久不變則審處慎行乃今日有常之謀不可勝之術也次曰審勢大略謂天下形勢不過乎三曰彊曰弱曰彊弱之中故或戰而圖之或和而圖之或守而圖之及其成功一也國家南渡逺在江左誠弱矣然昔日之敗本由人不知兵故望風奔潰遂成孺子之名頃年以來人材日經事兵將日練習天下之心稍怒忠義之氣漸振咸思效死於敵故金人三敗於蜀再敗於吳一敗於楚况項羽以㑹稽高祖以漢中皆取天下則其弱亦不必憂今日和議恐未堅也戰守二事必居其一矣倘審勢慎守不與敵遽絶陽交而陰圖之俟我之力既全敵之志已殆一舉而滅之則亦何逺之有次曰議都三篇大略謂當今地之可都者莫如金陵自過江以來十餘年矣廟堂之上未有發斯議者其弊有二一曰茍且不任事二曰誇誕不務實且今河南既還返汴洛遷關中臣知必不敢也莫若勵志竭力以建金陵之都猶不失晉元帝也或曰曷若稍徙荆楚以為進取之資臣應之曰方城之山推車可上漢江之水褰裳可涉此之謂險阻淺一不便也江南之師遇漲則隔吳越之衆泝流則遲此之謂應援難二不便也前耕襄許寇難實逼後視湖湘膏腴復鮮此之謂地利薄三不便也荆楚雖未可都亦不可輕可順流而東形勢便利此之謂撫吳之背斷三峽之口則蜀雖徑兵亦莫能前此之謂扼蜀之吭若夫用荆州之衆涉漢水踰方城不十日間汝洛震動此之謂撞敵之胸故勢不得不重若建為留都示人以漸命宰相為留守出御史於留臺如今八路銓選逺方類試攬此二者萃於留都亦足以振接天下之勢維絡逺人之心矣次曰議地三篇大略謂今河南之地欲奄而有之即力所未能若貪而信之恐害必遄至若因而利之據其可據割其當割最為得策如秦隴之上附之於蜀淮漢之內附之吳楚有其地土有其人民此據其可據也秦隴之下淮漢之外或擇豪傑或因舊將裂而藩鎮之此割其當割也次曰議蜀二篇大略謂農以田商以貨二者蜀民所以生自新法行增和買免役二年復有對糴之米激賞之絹募兵贍家之錢比昔時之稅不知幾倍茶鹽酒法一變官收九分之息下無毫末之利今關中虛竭方賴蜀以供給征斂未可遽輕若改紀其政大為措畫使冗兵可消冗官可减冗費可節如是則民力蘇矣臣竊謂為蜀之計者當固邊而息民固邊莫若專任息民莫若省事今取熙秦二路附之於蜀而於山南置秦蜀宣撫外則分之一付於人此專任也內則併之一付於法此省事也次曰立志大略謂志不可以卑弱亦不可荒唐江左自併蜀地抗衡中原垂三百年今河南新復之地雖未盡獲其用亦可假以為藩籬茍有立志焉事何患其不濟次曰遣使大略謂梓宫親屬悠悠未返若迫而求之則要我益堅若遂賂之彼雖先歸梓宫而母兄弟未必歸也茍若緩而圖之卑辭可以屈已厚幣不可傷國數年之後積財訓兵我彊敵畏而使者得如侯公養卒有辭藉口以張其說則梓宫親屬何患其不歸耶次曰任相大略謂古之人君定大難濟大功者必擇宰相與之終身未有中道輒易者故雖有嫌疑弗信雖有過失弗問要其終之成功而已方今多難擇相而任之願以太祖為法次曰蓄力大略謂自古竊據中原未有三十年不變亂者若能痛自刻厲積粟訓兵求材練將俟時至而赴之會稽之耻可雪矣次曰建親大略謂本朝宗室親近者雖有爵號而無土宇權柄故靖康之難拱手偕行賴陛下適總兵在外不然何所顧藉以繼此配天之業今宜搜訪天下宗室稍分之以權任之以事數年之後安知無挺挺著見者次曰搜竒大略謂國朝以詩賦取士又有免舉推恩之法如賢良之試六論皆注疏之學豪傑之士豈肯俯首作此方今外有巨敵正急人材之秋如謀任帷幄武堪將帥辨可奉使若此等類冝使在位各舉所知濶略細故務得竒才如是而英雄豪傑庶無在下之歎次曰省官大略謂欲節財用以專軍須莫若併州縣省官吏若謂親老家貧或仰祿以為養假令任子之未及年進士之未登科固必有術以生亦豈仰祿而食今若恐英豪失志則宜開自薦之路如州縣之殘破者願自效而安輯壤地之荒蕪者願自效而營墾或備驅使於劇邊或充奉使於絶域材有堪此咸許自陳則英豪之士當自穎脫餘子雖群譏聚謗安能南北奔走哉次曰惜穀大略謂天下之穀半縻於酒今若為令非嵗時不許造釀豈惟可惜榖而人樂於供上所得將愈於𣙜酤矣次曰實內二篇大略謂孫皓之守吳惟恃江險不修內備故杜預以破竹策之劉禪之守蜀也亦恃山險自姜維漢中之外惟有羅憲屯白帝以備吳霍戈屯夜郎以備蠻其餘郡縣罕有精兵强卒及鍾㑹以重兵扼姜維鄧艾由江油道入葛瞻一敗後主遂降今吳蜀之地兵素弱若用以備敵則吳沿江一帶蜀隨山數處宜有宿將總兵鎮扼之至於內郡莫若鄉兵漢之材官騎士可用為法若因保甲之舊精擇而教之置材武上中下三等之科事藝進者遞遷退者黜責階至五百人長得副尉千人得比校尉人知此途可以進身將樂然為之矣行成又獻七引一篇其意謂今日之勢未可一戰復中原也故託晉元帝以寄意焉行成臨卭人也建炎以來繫年要録卷一百二十八
