body:
  text: 建炎以來繫年要録卷七十九宋李心傳撰紹興四年八月戊寅朔宗正少卿兼直史館范沖入見沖立未定上云以史事召卿兩朝大典皆為姦臣所壞若此時更不修定異時何以得本末沖因論熙寧創制元祐復古紹聖以降弛張不一本末先後各有所因不可不深究而詳論讀畢上顧沖云如何對曰臣聞萬世無弊者道也隨時損益者事也仁宗皇帝之時祖宗之法誠有弊處但當補緝不可變更當時大臣如吕夷簡之徒持之甚堅范仲淹等初不然之議論不合遂攻夷簡仲淹坐此遷謫其後夷簡知仲淹之賢卒擢用之及仲淹執政猶欲伸前志久之自知其不可行遂已王安石自任己見非毁前人盡變祖宗法度上誤神宗皇帝天下之亂實兆於安石此皆非神祖之意上曰極是朕最愛元祐上又論史事沖對先臣修神宗實録首尾在院用功頗多大意止是盡書王安石過失以明非神宗之意其後安石壻蔡卞怨先臣書其妻父事遂言哲宗皇帝紹述神宗其實乃蔡卞紹述王安石惟是直書安石之罪則神宗成功盛德煥然眀白哲宗皇帝實録臣未嘗見但聞盡出姦臣私意上曰皆是私意沖對未論其他當先眀宣仁聖烈誣謗上曰正要辨此事上又曰本朝母后皆賢前世莫及道君皇帝聖性髙眀乃為蔡京等所誤當時蔡京外引小人內結閹宦作竒技淫巧以惑上心所謂逢君之惡沖對道君皇帝止緣京等以紹述二字劫持不得已而從之上曰人君之孝不在如此當以安社稷為孝沖對臣頃在政和間常聞道君皇帝六鶴詩一聨云網羅今不密回首不須驚宣示蔡京等云此兩句專為元祐人設以此知道君皇帝非惡元祐臣寮上曰題跋小詩雖可以見意何如當時便下一詔用數舊臣則其事遂正惜乎不為此沖對若如聖諭天下無事矣上又論王安石之姦曰至今猶有説安石是者近日有人要行安石法度不知人情何故直至如此沖對昔程頥嘗問臣安石為害於天下者何事臣對以新法頥曰不然新法之為害未為甚有一人能改之即已矣安石心術不正為害最大蓋已壞了天下人心術將不可變臣初未以為然其後乃知安石順其利欲之心使人迷其常性久而不自知且如詩人多作眀妃曲以失身為無窮之恨至於安石為眀妃曲則曰漢恩自淺胡自深人生樂在相知心然則劉豫不是罪過也今之背君父之恩投拜而為盜賊者皆合於安石之意此所謂壞天下人心術上曰安石至今猶封王豈可尚存王爵詔象州羈管人孫覿特放令逐便覿始坐贓貸死至是上書訴枉事下刑部刑部言覿所犯未嘗置對止據衆證定罪於法意人情委是未盡故釋之己卯右中奉大夫陳古為成都府路轉運副使兼宣撫司隨軍轉運副使右朝請大夫賈若谷為利州路轉運副使用川陕宣撫司奏也古為張浚板授至是到官諭再嵗始申命之命未至而王似已用便宜移古知瀘州充瀘南沿邊安撫使成都續記古以紹興二年五月九日到任今年九月十三日改知瀘州庚辰御札參知政事趙鼎知樞密院事充川陜宣撫處置使初張浚既召歸言者數上章謂若無大帥必失兩蜀上與朱勝非謀曰西帥難其人欲以趙鼎為之如張浚故事勝非曰聖謨如此臣謹奉詔自是言者益力踰月乃有是命鼎留身辭以非才上曰行朝之事朕自主之宰相茍非其人自有臺諫四川全盛半天下之地盡以付卿卿以便宜黜陟専之可也時勝非以瘍疾在告鼎詣之曰今川陜兵柄皆屬吳玠大帥無它能制玠足矣若官與之同豈能制乎勝非曰公以元樞出使豈論宣撫邪鼎曰須得一使名在宣撫上者乃可勝非曰偶疾未能造朝公難自言即同官可言也時鼎除命既出諸名士爭願從之趙鼎行實是時當國者不可否事事多不決吏緣為姦鼎受狀之日人皆駢集由是見忌樞密院宰相兼領言者論其失令參知政事通知其事上以為然於是忌者益切至是除川陜宣撫使皆忌者之説也顯謨閣直學士新知漳州辛炳侍御史魏矼直祕閣知常州鄭作肅各進官一等以刑部言御史臺去嵗平反臨安府等處獄訟二十二事比諸路最多用手詔升黜也詔吏部編七司例册時有旨六曹細務令長二治其事有條者以條決之無條者以例決之無例條者酌情裁決刑部侍郎兼權吏部侍郎胡交修言以例決事吏部最多若旋行檢例吏得為姦邀求貨賂乞將應干勑劄批狀指揮可以為例者各編為册令法司收掌以俟檢閲從之二十六年九月戊辰所書可參考辛巳執政進呈侍御史魏矼論淮東西屯田利害上顧孟庾等曰招集流離使各安田畝最為今日急務遂舉鴻鴈美宣王詩謂中興基業實在乎此孟庾曰誠如聖諭胡松年對曰古人圖必成之功為必取之計於是有屯田若趙充國破先零羊祜守襄陽是也朝廷行屯田纍年除荆南解潛略措置其餘皆成虛文無實效上曰卿論實效極是松年復對曰漢宣之治總核名實信賞必罰而已天下事若因名以責實無有不治者如屯田一事尤不可欺一嵗耕墾田畝若干收獲幾何便足以稽考上曰卿等可商議條畫來上當力行之後二日朱勝非言今日之兵既令執兵又令服田終嵗勤勞所得如故有未可者上曰古者三時務農一時講武農即兵也兵農之制一分恐不可復合勝非所陳甚善可便施行庾等對曰淮南收復今已數年守令豈不欲招徠流離但復業者未甚多恐自此兵日以衆食日以廣不易供給更容臣等與勝非熟議上曰不可既行下光世世忠軍中却便訴其難行復議改更如此則朝廷命令自為反覆議遂寢捧日天武四廂都指揮使慶逺軍承宣使神武前軍統制充荆南府潭鼎澧鄂嶽等州制置使王􅊅降授龍神衛四廂都指揮使光州觀察使徽猷閣待制知鼎州程昌宇降充集英殿修撰杜木塞之破也昌宇上疏待罪而􅊅奏昌宇不濟師朝廷以􅊅敗軍失將故皆黜之詔皇叔祖德慶軍節度使仲溫疾速赴行在仲溫時避地廣西故也癸未左朝請大夫知江州陳子卿報嶽飛已復鄧州上曰朕素聞飛行軍極有紀律未知能破敵如此胡松年曰惟其有紀律所以能破賊若號令不明士卒不整方自治不暇緩急豈能成功邪後二日飛捷奏至上大喜遣中使持詔書奬諭促令第賞將士且賜銀合茶藥捷奏自鄧州二十二日至行在甲申侍御史魏矼入對論遴擇羣才隨宜器使考之僉論揆之已試毋分朋類毋徇愛憎上自廟堂次及將帥侍從下至百司庶府外至郡守監司各因其才而任之則天下之務粲然舉矣抑臣聞之陸贄有言核才取吏有三術焉一曰拔擢以旌其異能二曰罷黜以紏其失職三曰序進以謹其官守欲望陛下因任之外更取是三術而力行之則用人之道罔不周盡矼又言國家養兵多矣其屯行在者實三之一諸將間有不鈐束其下一兩月來造言惑衆者有之擒人強刺者有之或以取質為名劫持財物或因採樵之役殺傷人民訟牒紛紛朝廷雖送臨安府大理寺根治而主名不獲非府寺所能辦也臣竊考自古善用兵將者必也宰執因其事機而御之有道臺諫乘其闕失而言之當理是以國能御將將能使兵綱紀既張人主可垂拱而治矣因舉唐韋處厚李德裕李勉溫造事為證上納其言乙酉輔臣進呈上曰朝廷當為官擇人不可為人擇官矼論隨宜器使正得用人之道胡松年指疏中語曰朝廷用人誠能毋分朋類毋徇愛憎則大公至正之道行矣天下幸甚乃詔前章令三省遵守次章劄與諸將賜矼五品服戊子趙鼎改都督川陜荆襄諸軍事先是鼎因奏事言臣今所行與吳玠為同事或當節制之邪上悟是日輔臣進呈朱勝非以疾不入孟庾胡松年言鼎使名與王似盧法原吳玠相似請易一使名上顧鼎曰此是朕不思不曾與大臣商議所以然者使卿知出自朕意别無嫌疑鼎奏荆襄乃川陜後門勢須兼領上以為然故有是命己丑趙鼎開都督府治事鼎奏以祕書省正字楊晨樞密院編修霍蠡太府寺丞王良存并充幹辦公事從之蠡端友子也端友武進人故吏部侍郎晨除命在庚寅蠡在戊戌良存在九月癸丑今併書之初上以親筆召都大主管川陜茶馬公事趙開綿威茂州石泉軍沿邊安撫使劉錡景福殿使宣州觀察使致仕黃冕赴行在命川陜宣撫司津發而宣撫使王似等數言錡守邊不可遣又奏開規畫利源深知首尾若行津遣恐權官未諳知經畫次第有誤邊防大計望權留開在任俟事宜稍息日津發從之冕嘗為成都府兵馬鈐轄庚寅神武中軍中部將馮賽罷主管隆德府路安撫司公事充本軍右部同統領賽自閬州從張浚赴闕因𨽻中軍統制楊沂中麾下故用沂中請而遷之辛卯責授寧江軍節度副使韶州居住莫儔與改正放令逐便初儔妻淑人劉氏投匭訟靖康之末太上皇帝出郊係吳幵同內侍李石金淵賫文字入城其日儔被拘在金寨內並無干涉且引兩浙轉運副使王俁為證俁以為然先是朱勝非疽作于背遍召醫工不能料理有以儔家給使為言者勝非用之一日而愈勝非方念無以酬其勞而儔家多豫之金使為之請遂有是命此以紹興八年十二月二十七日李誼劾莫儔章疏增修殿中侍御史張致逺言廣東循惠韶連數州與郴虔接壤自鄰冦深入殘破無餘今則郴冦未殘韶連疲於守禦而廣州之觀音惠州之河源循州之興寧千百為羣緋緑異服橫行肆掠以衆為強吳錫既還湖南韓京素稱怯弱海荒逈逺奏報稽時臣聞朝廷近遣趙祥一軍招捕虔寇因降德音開其自新之路廣東與虔犬牙錯境今號魁首多是虔人願推廣於天恩以撫綏於遐域令祥與京相為聲援諭虔守與廣東帥審處事宜得強梗而必誅貸脅從而罔治乘此軍力悉務討平仍嚴養冦之刑雖去官不宥大革相蒙之弊每先事而圖非惟良民不陷於非辜庶幾陛下得行於仁政從之武功大夫貴州刺史知階州充熙河路經略司中軍統領權主管五軍軍馬李永祺為右武大夫武功大夫兼閣門宣贊舍人知岷州充熙河經略司前軍統領假傑領吉州刺史永祺等皆關師古部曲先是宣撫司用梁洋牽制功全軍進秩至是申命此亦饒風嶺功賞也壬辰命吏部貟外郎汪思溫等考選人秋試刑部貟外郎劉藻考試刑法舉舊制也徽猷閣待制知衢州宋伯友與降授右朝請大夫直祕閣知揚州宋孝先兩易仍命伯友兼程之鎮孝先乞解官終喪許之右迪功郎李把追所授官左朝散郎胡蒙貶秩二等侍御史魏矼數言杞本庸人蒙宣諭浙西黃叔敖假大臣意風之論薦得官旋販私醖郡邑觀望不敢復治驗問如章故黜之癸巳太常少卿陳桷言今日之弊物貴而錢少祖宗以來有司鼓鑄之數既多而泄於四裔其禁甚嚴川陜之間以鐵易銅而行之至於私造銅器及私賣鬻者悉皆有禁今鼓鑄僅有其名約工既大勞費既多而官鑄所入無幾議者往往以錢監為可併不思國之重寶與其他場務所入課利不侔但當博求銅本廣行鼓鑄不當計數便議省併也今之疆場犬牙密接偽境利之所在民以死趨之江淮海道難於譏察其日夜泄吾寶貨者多矣又銅器布於天下不可勝數皆毁錢而為之欲銅本之盛鼓鑄不闕何可得也望特詔有司講求其弊厚銅本之積廣加鑄之數重外泄之防嚴銷毁之禁庶幾國得專其權而民用不乏當務之急孰先於此事下工部勘當會朝廷多事未及行甲午尚書省言大理寺左斷刑實議法所在天下奏獄皆經取決其間刑名實有疑慮者自丞評已上次第咨稟或聚廳會議如各執所見本寺不能從不免巡白刑部本部即合依公與決如不能決方合上省舊來每嵗之間不過三五件其所稟讞並是議論精確適合情法可為規例近來法寺畏其疏駁全不任責丞評謾各立説卿正以次隨而書之次第上之朝廷坐待處分方行擬斷遂致往復淹延刑禁詔刑寺自今獄案如刑名輕重委有疑惑即依例巡白令刑部與決行下又不能決聽上都省若有妄作疑難立議不當之人當議黜責乙未左宣教郎守尚書吏部貟外郎魏良臣為左朝散郎充大金國軍前奉表通問使武德郎閣門宣贊舍人王繪為武顯大夫副之仍命良臣假工部侍郎繪假右武大夫果州團練使各賜金帶一裝錢千緡官其家三人傔從有官者進秩四等白身人補初品官以行詔以餘杭縣南上下湖地置孶生牧馬監命臨安府守臣兼提舉每馬五百匹為一監牡一而牝四之嵗産駒三分斃二分以上皆有賞罰丙申詔追王安石舒王告毁抹時右朝請大夫福建路提點刑獄公事吕聰問辭行上疏曰臣聞書曰除惡務本又曰政事惟醇今國家舉事未能大有為者豈非政事未醇豈非惡未除本安石之不利趙氏其實迹可見乃陛下世讎天下所共知然其人行僻而堅言偽而辨足以深惑羣衆中人以下鮮有不為安石壞其心術陛下若以其嘗被任遇不欲痛加懲艾至如傳習安石之學問者謂宜深加屏逺過於防冦蓋彼之邪説易以動人為之地者則必曰政事雖有不善學術過人若謂讀書為文過人則誠有之豈有學術善而政事不善學術不善而政事善之理但乞陛下因對臣下訪安石之為人有意向稍佐之者便可見其用心之邪正仍願陛下赫然發憤從中下明詔具言神宗皇帝終棄安石不用以慰在天之靈所有諡議乃以文為言若并王爵稱之則為文王實為僭越蓋當時太常博士許彥一意諂事蔡卞侈大安石輕蔑祖宗此來若不追寢諡議恐無以示天下曉羣聽鼓羣動立政事况方命重修二史甚盛舉也若此論不定徒令天下後世終得以議宣聖曰舉直錯諸枉則民服今若追奪安石之諡雖若不急其實舉直錯枉之要道靖康初已詔追奪安石王爵至是始毀其告焉哲宗新録安石附傳詔江西和買絹折納錢每匹減作六千省人户願輸正色者聽舊洪州和買其八分輸正色二分每匹折省錢三千至是帥臣胡世將請以其三分折六千省又言絹直踊貴請每匹增為五千足户部定為六千殿中侍御史張致逺言臣嘗考易象剝之六四曰剝牀以膚君者民之所戴也剝民不已必及於君今江西殘破之餘軍旅轉餉殆無虛日鎮南軍和預買絹自起催至六月才納及一分民力不易自可想見本州申乞折納價錢朝廷從之是欲少寬民力每匹令納錢五千省比之舊折二分價例已增一半若比二浙見價每匹計多一千五百可以已矣户部勘當便令折錢每匹六貫文足其實八貫省耳是於三等之中獨取極價欲乘民之急而倍其斂也物不常貴官有定額民得蠶織則絹有時而易辦錢額既定則價無時而可減世將出自禁從户部天下取則所宜推廣聖德慰藉逺民乃旁睨市直錐刀取贏幾同商賈剝牀損下恬不知怪和買舊給本錢每端一千方時多難白取既非得已户部乃用極價雖坐致數十萬緡豈陛下本心耶臣抑聞之山林不能給野火江海不能實漏巵一二年間費用漸廣比之會稽已數倍矣使户部不能均節則雖匹絹百千橫費無緣充足封倫法律之語魏徴仁義之效惟陛下慎擇而力行之疏奏故有是旨荆南鎮撫司統制官辛太貸死除名令本鎮自效嶽飛之復襄郢也上命荆南鎮撫使解潛遣兵助之潛令太將鄉兵千二百人赴襄陽飛命太駐清水河以掩賊太不聽命自鄧城擅歸宜都潛不即遣反妄申太先復襄陽飛怒乞押太赴軍前與免罪責以自效詔太罪當誅戮特貸死令潛分析言者論曲直未判刑罰無章乞令潛押太赴行在聽區處庶幾軍律稍振且免二人更有論辨漸成仇隙潛坐降橫行一官潛降官在九月癸丑熊克小歷稱湖北制置使嶽飛劾辛太又云太擅歸荆南皆誤也飛此月壬寅始除湖北制置此時但為江西安復等州制置耳潛自建炎末寓治宜都至今未歸荆南蓋飛按章有云太擅往荆南鎮撫使解潛處克遂誤也詔諸軍不得陳乞自往廣西買馬先是神武右軍遣將官曹章持羅錦綵纈至橫山寨市馬又增其直豫之提舉官李預以章所持皆蠻人所未見恐後無繼乃以本司所市馬五百付之因奏其事且謂若諸軍更來收買則臣無復可措手足乞候綱馬到日取旨截撥庶事歸一體故有是命承節郎李佾充閣門祇候以江東淮西安撫使劉光世言佾係鄜延邊人使喚得力故也言者論光世陳請涉私不平者衆乞留此異恩以待戰士乃罷之戊戌吏部尚書沈與求兼權翰林學士中書舍人常同兼史館修撰宗正少卿范沖為起居郎依舊直史館中書門下省檢正諸房公事虞􅀈為起居舍人始沖入對面奏臣與趙鼎姻家恐人謂臣因鼎以進則無以自明上曰鼎未嘗薦卿朕因與常同論修史言及故家數人朕以為無如卿者故纍召卿非由鼎薦也是日鼎至漏舍中書吏以除目示鼎鼎謂朱勝非曰沖初除宗卿已不獲避免今又遷擢恐招物議勝非曰前日留身得旨如此不敢不進擬更自上前言之及進呈鼎復申前論上不許會侍御史魏矼論沖􅀈皆執政親黨不當用後三日簽書樞密院事胡松年奏臣叨聮政府雖於三省進擬人才不敢干預緣臣前妻係􅀈之親妹委於人情有嫌乞與􅀈間慢差遣而鼎亦奏臣與沖姻家雖職事了無干涉法不當避而搢紳士大夫不知出自聖意必謂臣援引親黨在臣不得不懼乞罷沖新除乃詔沖復舊職􅀈除直龍圖閣江南東路提點刑獄公事沖復為宗卿在是月辛丑􅀈補外在九月癸丑今併書之侍御史魏矼言今諸路兵官悉屬樞密院除授膏粱皂𨽻之徒往往以請求得之而纍歷行陳顯立功勞者乃以孤寒寡援多至陸沉故所在盜賊竊發則驚懾四顧無可措手乞罷湖州兵馬鈐轄范寧等三人因薦湖秀州管界巡檢崔慎由沉毅勇敢久在邊陲頃為江隂兵官偶金人遊兵至戞港慎由身先士卒掩殺迎敵闔境賴以安全嚴州兵馬監押王宏出自行伍騎射過人屢獲羣盜近討繆羅功效尤著乞量材録用仍詔密院參照祖宗時差注兵官六等格法遴擇其人方行除授詔罷寧等慎由宏令赴樞密院審察後四日朱勝非進呈慎由宏差遣上曰臺臣耳目之官職在彈擊官邪若因而薦論人材竊慮私有好惡可籍記姓名他日量才選用直史館范沖條上宣仁聖烈皇后誣謗事沖奏臣親奉玉音開諭再四至於議熙豐之法度則曰神宗之意初實不然言紹聖之繼述則曰帝王之孝豈在於是辨宣仁之誣謗謂功烈之盛何可不明思道君之聖明謂姦臣所誤安得不悔臣願陛下特出睿斷明詔羣臣以聖意所在示之好惡詔付史館賜嶽飛金束帶己亥尚書左司郎中李大有為中書門下省檢正諸房公事尚書考功貟外郎徐杞為左司貟外郎司封貟外郎孔端朝為右司貟外郎已而殿中侍御史張致逺言端朝以幸學得官諂事梁師成不可用端朝遂罷新除中書舍人趙思誠復為徽猷閣待制知台州思誠既為常同所劾抗疏力辭而有是命是日虔州興國縣南木寨周十隆等千六百人奉德音出降江西制置司統領官毛佐王贇趙恕往受之未成官軍掠其婦女十隆懼復與其徒奔突水南而去明年三月己亥佐等並降官遂掠汀循諸州庚子偽齊保義郎卞橫刺配海南牢城橫濟隂人從劉益在長安使來偵事橫投劉光世軍中為義兵光世涅其手因不得去至是為其徒所告下大理法寺當徒三年依舊收管特竄之據招橫以去年十二月一日離長安今年正月四日到舒州大雲倉渡江至池州投充義兵橫欵稱偽大王劉奕下充效用即劉益也辛丑尚書禮部侍郎兼直學士院陳與義充徽猷閣直學士知湖州以與義引疾有請也給事中唐輝試尚書禮部侍郎仍兼侍講壬寅鎮南軍承宣使神武後軍統制充江南西路舒蘄州兼荆南鄂嶽黃復州漢陽軍德安府制置使嶽飛為清逺軍節度使湖北路荆襄潭州制置使先是神武前軍統制王􅊅在湖北連年不能討賊會飛襄陽賞功樞密院因言楊太等作過日久先因張浚奏乞招安特與放罪許令出首而遷延纍月終無悛心理難容貸􅊅出師踰嵗不能成功與潭鼎帥守每事忿爭不務協心致一方受弊乃詔專委飛措畫討捕仍令知鼎州程昌宇自上流進兵湖南制置大使司遣馬凖步諒兩軍聽昌宇節制荆南鎮撫使解潛亦遣兵船約期進討命􅊅將所部還江州飛時年三十二自中興後諸將建節未有如飛之年少者朱勝非行述云嶽飛復襄郢之地朝廷欲行獻捷之禮勝非謂本吾家堂奧不足言俟中原盡復大駕還汴乃可今附此更須詳之也資政殿學士川陜宣撫使王似復知成都府兼本路安撫使以趙鼎出使故也宣撫副使盧法原吳玠如舊張浚之出蜀也奏以端明殿學士張深守成都至是以似代之日歷五月一日張深罷知夔州按此時深在成都不知何以云爾當考户部侍郎兼權臨安府梁汝嘉奏明堂行禮殿成乞提領官以次推賞上曰朕愛惜名器以待戰士土木之功豈當轉官但可等第支賞耳中書舍人常同兼權起居郎王居正兼權起居舍人以二史全闕官故有是命癸卯詔侍從已上外移知州差遣者並令徑路之任有合陳請事畫一申奏俟過防秋日仍舊時近臣外移者例得過行在而侍御史魏矼以為沿江衝要所在權官難以責成故有是請焉樞密院奏以襄陽府隨郢唐鄧州信陽軍為襄陽府路本府置帥司緣收復之初事務不多未置監司止委制置使嶽飛措置仍𨽻都督府從之甲辰右朝奉大夫主管臨安府洞霄宫蔡植追二官仍追奪建炎二年冬祀蔭補恩澤植卞姪孫也以濫賞改官至是乞審量磨勘為言者所劾故黜右朝請大夫權荆南制置司參議官盧宗訓知德安府武翼郎閣門宣贊舍人張應知鄧州修武郎髙青知唐州承節郎舒繼明為成忠郎閣門祗候知信陽軍左文林郎李尚義為左承事郎通判襄陽府右承直郎黨尚友為右宣教郎通判鄧州皆用制置使嶽飛奏也繼明羅山人身長七尺善騎射矢不虛發故飛薦用之既而侍御史魏矼言飛新立功朝廷當成就其美不宜使輕儇之徒為其屬郡昔郭子儀以奏請不行為人主所厚願以臣章示諸將因事機以善其後宗訓之命遂寢尚義奏辟在九月辛亥今併書之右承事郎知承州劉𡨢罷以淮東宣撫使韓世忠劾其貪繆也乙巳右金吾衛上將軍充中太一宫使錢忱復為檢校少保瀘川軍節度使忱愕兄也愕已見建炎二年正月靖康中以戚里故例納節至是其母秦國大長公主乞還舊官仍給半俸前二日以忱弟左金吾衛大將軍提舉萬壽觀公事愐為光山軍承宣使仍詔大長公主係仁廟女特與改正舊官應戚里之家並不得援例如違重置典憲至是降制焉
