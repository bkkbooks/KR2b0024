body:
  text: 建炎以來繫年要録巻一百五十四宋李心傳撰紹興十有五年秋七月乙巳朔罷䕫路軍興以來所置酒店以寛民力用四川宣撫副使鄭剛中奏也䕫路舊無酒禁為場店者百四十餘所而已建炎末增至六百餘然土荒民少人不以為便剛中既以本司錢四萬餘緡代撥贍軍遂弛其禁丙午右承務郎新添差浙東安撫司幹辦公事司馬伋言建安近刋行一書曰司馬温公記聞其間頗闗前朝故事縁曾祖平日論著即無上件文字顯是妄借名字售其私說伏望降㫖禁絶庻幾不惑羣聼詔委建州守臣將不合開板文字盡行毁棄伋特遷一官初范冲在史舘上出光記聞命冲編類進入冲言此書雖未可盡信其有補治道亦多乃繕寫成十冊上之至是秦檜數請禁野史伋懼罪遂諱其書然其書卒行於世伋遷官在是月辛亥今併書之范冲編類記聞不得其時已附見紹興六年八月己亥丁未右朝請大夫知泉州吴序賔奉詔條具便民事件言泉南七縣盗賊者四本州雖軍儲不足而義倉見存七萬石欲開倉賑貸而常平司執以災傷七分之法至今人未被賜欲比附每縣給三千石賑貸四等以下人户給事中李若谷等請每縣給二千石如所奏從之戊申復置利州紹興監嵗鑄錢十萬緡以救錢引之弊用四川宣撫副使鄭剛中請也剛中言祖宗朝立法約四川所有見錢對數印造錢引使輕重相權昨因軍興調度滋廣印造寖多又有司申請為闕鼓鑄本錢遂廢罷錢監其金州一帶銅錢迤邐透入利路相兼轉用銅錢不多有而民間鑄造農器鍋釡及供應官司軍器積日累月銷鎔川錢殆盡以致劍外州縣全闕見錢行使竊恐稱提不行牽連以裏州縣引法弊壊有悮國事䟽奏不待報遂行剛中以利州山林多鐡炭易集乃命本路轉運判官王陟董其事置監官檢勘監門物料庫官等六員軍匠五百人後增鑄至十五萬緡大錢千重十二斤小錢千重七斤有半嵗用鹽官錢七萬緡三路稱提錢二十四萬為本率費錢二千而得千錢云辛亥執政進呈處州守臣徐度准詔條上便民事件上曰因此亦可以觀人才如議論平正留心國事其說自然可見不然矯訐迂闊者亦可見也左承奉郎主營台州崇道觀陳鵬飛除名惠州編管侍御史汪勃奏鵬飛前在禮曹陛下崇東朝之養推尊徽稱禮有自來鵬飛深切譏議殊不知先帝之三妃九嬪秩等公卿固與庻人之一妻一妾異鵬飛敢為妖言妄自標目無所忌憚大逆不道望投畀荒裔以為造言亂衆者之戒故竄之壬子直秘閣新提舉淮南東路茶鹽公事錢端禮為兩浙路轉運判官端禮自明州通判改除過闕入見論湖塘利害望特詔所部專責丞佐廣求水利之源乃有是命時秦檜議乾鑑湖為田云歲可得米十萬斛上謂若遇旱歲無湖水引灌則所損未必不過之檜乃止乾鑑湖事以日厯紹興二十九年十月辛未所載上諭王綸語修入不得其年且附端禮論水利之後癸丑成州團練使幹辦御輦院吴盖為建州觀察使提舉佑神觀甲寅左朝奉郎提舉江州太平觀呂本中卒乙卯權户部侍郎王鈇言應軍事補官之人欲令本縣驗實如屬冒濫即令改正隠庇者抵罪以富民避役者衆故也丙辰詔學士院案籍令監修國史官取索㸃檢此必有所為當求他書參考左承事郎新簽書鎭江軍節度判官㕔公事劉章為秘書省正字章觧褐即入館異數也熊克小厯載章除正字在十月亦因題名所書而不詳考也克又云章不待一任囘便除館職盖用陳誠之例亦悮章此時未到任也丁巳興化軍守臣汪待舉條具便民事乞蠲本軍諸邑漁人所輸簄稅及浦生之草採者毋令出錢從之戊午詔廬光州上供錢米展一年用轉運司請也上曰人皆知取之為取而不知予之為取若稍與展免俟其家給人足稅歛自然易辦淮南平時一路上供内藏紬絹九十萬匹有奇至紹興末年纔八千匹爾故廸功郎楊世永贈右承務郎官一子以前任端溪尉死於盗也己未故武德大夫趙德贈右武大夫果州團練使以捕䖍㓂閩中死於陣也其徒九人皆贈官録子孫有差甲子故右廸功郎汪位贈右承務郎官一子位為濠州司理參軍死於難故録之乙丑權尚書禮部侍郎宋之才充敷文閣待制提舉江州太平觀從所請也丙寅楚州為捕盗官乞依元㫖推恩秦檜曰賞有定格固難易也上曰信為治道之本若不堅守出令其誰信之丁夘大理寺丞周賛面對乞戒監司郡守毋得增吏擾民詔申嚴行下戊辰兩浙轉運判官吳坰條具便民事乞令常平司支借錢糓勸民濬决華亭等處沿海三十六浦以泄水勢庻無渰損民田之患詔可後十餘年乃克行之己巳秦檜進呈放免四川轉運司因贍軍借用常平錢十三萬緡檜言近來户部歲計稍足盖縁休兵朝廷又無妄用故也上曰休兵以來上下漸覺富貴大抵治道貴清浄人君不生事則天下自然受福檜曰舜無為而治陛下得之矣是月金國旱飛蝗蔽日詔蠲民租八月甲戌朔左朝議大夫知池州魏良臣條上便民事言今民間有合零就整錢如綿一錢令納一兩絹一寸令納一尺之類是正稅一分隂取其九也乞折帛錢並輸實數更不合零從之秘書省著作郎兼普安郡王府教授趙衞守起居郎錢周材試起居舎人詔樞宻院凖備差使使臣以百五十人為額三年為任比舊减五十人其已滿願就外任者聽徽猷閣直學士提舉江州太平觀唐煇卒丙子上與大臣論事因曰朕謂進用士大夫一相之責也一相既賢則所薦皆賢矣楊愿曰陛下任相如此盖得治道之要上因論史事秦檜曰是非不明乆矣靖康之末圍城中失節者相與作私史反害正道壬子之後公肆擠排不遺餘力然豈知人臣遭變夫豈得已上曰卿是時獨不推戴異姓圍城中人自然不容愿曰檜非獨是時不肯雷同宣和間耿延禧為太學官以其父在東宫勢傾一時士皆靡然從之以徼後福獨檜守正雖延禧傾害畧不為之易節檜曰臣嘗聞范仲淹與其友書云致意某官為渠作東宫官不敢通書惟聖主於忠義之臣與夫失節之徒灼然如此誠立國之本也臣謹按范仲淹祥符末登第終眞宗之世為小官自為陳州通判以至執政而薨仁宗未有子安得有東宫官檜之誕妄無稽皆此類也尚書右司郎中林乂權吏部侍郎右司郎中錢時敏權工部侍郎丁丑秘書省著作佐郎兼恩平郡王府教授王墨卿魏元若並兼普安恩平二王府教授司空員外郎胡㳙面對乞去諸邑害民二事一曰輸納官物不銷簿二曰催科輙付廵檢司詔申嚴行下戊寅江州觀察使鎭江府駐劄御前游奕軍統制劉寳降授果州團練使別與差遣都統制王勝劾寳擅伐民木及彊刺平人充軍故責之己夘詔自今太學及州縣釋奠先聖並令宗子侍祠用諸王宫大小學教授陳孝恭請也庚辰樞宻院檢詳諸房文字王循友守尚書右司員外郎倉部員外郎韋夀成為樞宻院檢詳諸房文字丙戌龍圖學士知宣州秦梓為端明殿學士再任土居右朝請大夫章元崇率六邑士民詣闕借留故有是命左朝散大夫知南康軍張元禮乞免牛稅一年上曰天下之物不當稅者甚衆如牛米柴麺之類是也秦檜曰去歲浙中艱食陛下令不收米稅故江西客販俱來所全活者不可勝計元禮侯官人也熊克小厯附此事於九月丙辰恐誤丁亥左朝散大夫提舉江州太平觀黄龜年卒國子監丞文浩面對論諸州教授與諸生難疑答問於羣經宜無所不通乞自今試教授並於六經中臨時取二經各出兩題不拘義式以貫穿該贍為合格戊子詔禮部㸔詳行之九月己巳依奏辛夘詔諸路州縣出限歸業人户其元棄田産可照者盡行給付見有人承佃及官賣了當即以官田之可耕者比倣給還先是詔限十年至是知興國軍宋時條上便民事乞寛展年限以招歸業之人故有是命壬辰沂州防禦使殿前司左軍統制李捧特降一官坐擅遣官兵囬易故也甲午大理評事黄子淳面對言自渡江以來宗室散處外州多居民間或在僧寺陶染澆薄不足上副陛下親睦之意望依兩京例於江浙湖南帥司各置敦宗院以地里逺近遣居之董以宗長訓以師儒庻幾不致失所且獲被教養悉為良善事下禮部不果行己亥權户部侍郎王鈇言常平之法本以抑兼并備水旱科條實繁其利不一有義倉和糴之儲坊塲河渡之入以産制役欲使平均以陳易新俾無紅腐一有饑饉則開發倉廪以濟艱食豈一主管官能勝其任哉建言者將欲省官而主管已復將欲省吏而胥徒如故獨罷一提舉官而姦弊百出州縣茍且無所畏憚封樁錢物借貸移易多致陷失凶年饑歲賑濟之法漫不加省今雖𨽻於憲司而獄訟繁夥不能究心望復置提舉官庻良法美意不為虛文乃命諸路茶鹽官改充提舉常平茶鹽公事惟四川廣西以憲臣淮西京以漕臣兼領仍令檢察所部州有擅用常平錢物者按劾以聞四川等處兼領指揮在九月辛亥㸃檢錢物指揮在八月壬寅今併書之直秘閣知盱眙軍沈該為淮南路轉運判官兼淮南路提㸃刑獄公事直秘閣淮南路轉運判官湯鵬舉知常州右宣義郎幹辦行在諸軍糧料院畢良史知盱眙軍良史入辭詔加直秘閣良史除職在九月丁巳庚子給事中兼侍講李若谷為敷文閣直學士樞宻都承㫖仍兼侍講辛丑增太學弟子員二百人以國子司業嚴抑有請也通舊為九百人九月戊申故中大夫吕由成特贈左通奉大夫官其家二人由成嘗知襲慶府死於難己酉清逺軍節度使建康府駐劄御前諸軍都統制王德添差兩浙東路馬歩軍副都總管德既黜張子盖又併取張俊所屬愛將馬立顧暉而罷之俊怒訴諸朝秦檜亦忌其勇乃有是命先是德言本司游奕軍𨽻馬軍司已久乞將牙兵親随搭材等為一軍以補游奕之闕從之德遂以中軍正將張振為游奕軍統制振河内人敵陷兩河振聚衆得百餘人由喜兒灣渡河直趨襄陽詣鎭撫使桑仲仲以為諸軍都提舉李横代為鎭撫使與振有隙振乃走板江歸于觧潜為潜中軍統制潜召歸振至行在遂𨽻張俊軍中俊以為凖備將後遷正將至是德㧞用之張振事以趙甡之遺史附入但甡之稱王德置游奕軍在十六年恐誤今且附德罷時庚戌寜州觀察使殿前司神勇馬歩軍統制王權為武康軍承宣使充建康府駐劄御前諸軍都統制林泉野記云秦檜任將帥必選奴才恐其有謀起兵問己之罪故諸帥皆貪汚士氣不振辛亥臨安府守臣張澄條上修建皇太后宅官吏名銜詔以次第賞按秦檜賜第修建官吏第一等轉兩官而皇太后外第第一等轉一官更减一年磨勘檜為宰相而所擬如此可謂無忌憚之至也壬子金主亶祀天于郊先是資政殿大學士宇文虛中旣為金人所用虛中知東北之士不甘應敵宻以信義感發之從者如響乃與其翰林學士髙士譚等同謀欲因亶郊天就刼殺之先期以蠟書來告于朝欲為之外應秦檜拒不納㑹事亦覺虛中與其子直顯謨閣師瑗皆坐誅闔門無噍類虛中死年六十八此以虚中行狀及其家訴理狀參修行狀又云秦檜懐姦無狀且忌公功在已上繳還蠟書當求他書參考李大諒征䝉記云都元帥烏珠回師忽乘詔報宇文國相連中外官守七十餘員欲乘邉事未息及遷都之冗謀反幸得萬户司冦沃赫先告首捕獲宇文等請帥暫歸議事王大觀行程録所云亦同二人皆北人益知虚中死節無疑也虚中淳熈六年十月戊午贈開府儀同三司諡肅愍開禧初加贈少保贈師瑗寳謨閣待制甲寅起居舍人錢周材權尚書刑部侍郎國子司業嚴抑權工部侍郎時將遣二人出疆乃引對而有是命既而二人以已見請對周材乞命諸路憲臣察刑獄寃濫抑乞禁止沿江米稅從之二人以見入對在十月癸酉周材所奏以甲戌抑奏以丙子行下今聯書之乙夘左朝議大夫陳桷知襄陽府丙辰詔諸路安撫使見帶待制以上者所舉京官狀理為職司從吏部請也辛酉以錢周材為賀金國正旦使閤門祗候俞似副之嚴抑為賀生辰使閤門祗候曹涭副之敷文閣直學士樞宻都承㫖兼侍講李若谷進兼侍讀起居郎趙衞兼侍講甲子夜太廟旁居民遺火乙丑上諭大臣令於廟左右各撤屋二十歩以備不虞丁夘侍御史汪勃請以給舎看詳到裕民事目令監司鏤板散下州縣使民通知仍劾其稽違從之福州觀察使知閤門事王公亮卒以奉使之勞特贈慶逺軍節度使壬申武經大夫吉州刺史閤門宣賛舎人趙瓌知閤門事是月集英殿修撰福建安撫使薛弼始至福州時福建羣寇未平本路鈐轄李貴領兵討管天下貴失利為賊生得有殿前司後軍統制官張淵在本路措置盗賊自為一所或語弼事惡二三盍請以措置所𨽻帥司弼不從曰惟和則可以濟事先是舊帥莫將嘗乞招游手為効用及將移鎮而轉運司以軍湏浩瀚申樞宻院言閩中人勇於私鬭怯於公戰此等游手易聚難散慮賊平之後官軍旣還或能為過亦未為便遂下安撫司共議弼以為廣東副總管韓京每出必㨗正以所部多土人今本路素無此等故連年受弊弼又謂前守贛上有武翼郎周虎臣成忠郎陳敏各有家丁數百人皆能戰比之官軍一可當十乃辟虎臣為本路將官敏為汀漳廵檢皆從之所請虎臣開封人敏石城人也弼遂减取二人家丁日給錢米責以捕賊期於必滅與漕司合奏選一千人號奇兵詔可自此歲費錢三萬六千餘緡米九千石而草㓂遂平河决李固渡金主亶調曹單拱亳宋五郡民修之民有田一頃者出一夫不及者助夫之費凡二萬四千夫五旬有四日而畢冬十月按是月癸酉朔甲戌大理評事環周面對乞戒州縣自今毋得令保正副日書夘厯詔監司覺察乙亥上書秦檜賜第書閣曰一德格天之閣遣中使就第錫宴仍賜檜青羅盖塗金從物如蔡京王黼例熊克小厯在九月盖誤檜言不敢上辜恩賜欲什襲珍藏以俟外補或得歸休用諸國門之外上優詔諭之吕中大事記我髙宗之待檜旣賜之相第又賜之家廟祭器既賜之畫像賛又賜之一德格天之閣六字而孫三人尚在襁褓並賜之三品服果何負於其臣而檜忍於負其君如此此檜之罪所為上通於天萬死而不可贖也丙子端明殿學士簽書樞宻院事兼修玉牒兼權參知政事楊愿提舉江州太平觀職名仍舊時侍御史汪勃言愿之過愿聞引疾丐免章五上乃有是命熊克小厯云楊愿自請罷按汪勃論韓公裔章䟽云公裔素與愿交通臣嘗具䟽論列今愿旣云云則愿盖為勃所擊也此月辛夘王言恭文浩放罷明年二月辛丑韓公裔與任外宫觀皆與此相闗戊寅右奉直大夫新通判昌州魏彦昌除名昭州編管彦昌故省吏也侍御史汪勃論其在紹興初交鬬宰執以致紛紛既獲幸免而不悛其惡故竄之癸未敷文閣直學士樞宻都承㫖兼侍讀李若谷充端明殿學士簽書樞宻院事尋兼權參知政事乙酉左朝議大夫知婺州吳表臣復敷文閣待制直秘閣知潭州劉昉言武崗軍猺人楊再興父子自建炎中侵占省地幾二十年近凖御前處分令昉措置遂遣安撫司幹辦公事王歴諭以禍福願還省地及民田共六十餘畝已召民歸業欲乞永免賦役從之厯㬇弟也明年四月壬寅推恩降授均州觀察使范訥卒于䕫州丙戌遺表上上曰訥庸人也朕嘗識之全不知兵今既云亡可復一官乃復昭化軍承宣使戊子寳文閣直學士提舉亳州明道宫晏敦復卒于明州方議和之初敦復力拒屈已之非秦檜患其不附已使腹心之人啗敦復以利曰公若曲從兩地旦夕可至敦復曰吾終不以身計而誤國家况吾薑桂之性到老愈辣請勿復言檜卒不能屈上嘗面諭曰卿鯁峭直言無所間避可謂無忝爾祖矣己丑左朝散郎新國子監主簿余堯弼充勑令所刪定官堯弼上饒人也左承事郎楊偰守國子監主簿偰存中子舉進士及第故擢之左朝議大夫虞祺復為潼川府路轉運判官祺初見紹興四年祺厯漕䕫潼方時軍興諸道以聚歛為先務惟祺所至晏然不擾庚寅主管馬軍司公事田晟請給軍器上曰戎器乆不用則易蠧令善用之又進呈鎮江軍中秋教武藝出格人上曰師不可不素練翰林學士承㫖兼侍講提舉祕書省秦熺再乙避親且言今國信已行別無撰述文字御筆除熺資政殿學士提舉萬夀觀兼侍讀恩數視執政位李若谷上熺請班其下從之翊日上謂檜曰熺出朕親除可謂士人之榮也熊克小厯於此書熺除知樞宻院事力辭盖誤詔宰執給使授官轉至保義郎許理為官户辛夘尚書吏部郎中王言恭國子監丞文浩並罷以侍御史汪勃言二人趨附執政陰為爪牙結用植黨故也此恐與楊愿罷政相闗甲午左朝議大夫提舉臨安府洞霄宫折彦質郴州居住彦質寓居信州侍御史汪勃希秦檜意奏彦質頃任樞府懐姦誤國今居衝要之地與守臣吳說私相議論妄及朝廷說坐免官而彦質有是命乙未詔秦熺依舊提舉祕書省戊戌太常寺主簿陳積中御史臺檢法王鎡並守監察御史鎡石埭人嘗為皇后宅教授汪勃薦之也己亥命中書舎人叚拂權户部侍郎王鈇睿思殿祗候王晉錫同製造郊廟祭器庚子詔置四川宣撫司總領錢糧官先是資政殿學士四川宣撫副使鄭剛中馭諸將嚴㑹剛中以事忤秦檜諸將因言其有䟦扈狀檜不欲剛中併掌利權侍御史汪勃聞之即上言國之大務在兵與財各有攸司則有條而不紊今朝廷支散諸軍則𨽻户部外道則𨽻總領責有所歸事且易辦欲依此例就四川宣撫司置總領一司專掌財賦庻幾職事專一從之十一月庚申除趙不棄辛丑左朝議大夫知池州魏良臣左朝奉大夫知袁州沈昭逺並復敷文閣待制是月金太師尚書左丞相兼侍中監修國史院元帥梁國王宗弼卒宗弼封梁王諸書不見紹興三十年五月生辰副史王全上路口奏稱烏珠為故梁王盖紹興十三年以後改封故也宗弼且死語其徒以本朝軍勢强盛宜益加和好俟十餘年後南軍衰老然後可為寇江之計云此以李大諒征䝉記修入其詞雖俚然足以見金人急於就和與秦檜養寇遺患之罪故具載之皇統五年十月宣到皇叔都元帥遼國王危篤親筆遺行府四帥曰今契丹漢兒侍吾歲久服心于吾吾大慮者南宋近年軍勢雄鋭有心爭戰聞韓張岳楊例有不恊國朝之幸吾今危急雖有其志命不可保遺言于汝等吾没後宋若敗盟推賢用衆大舉北來乗勢惑中原人心復故土如反掌不為難矣吾有術付汝等切冝謹守勿忘吾戒如宋兵果舉勢盛敵强擇用兵馬破之若制禦所不能向與國朝計議擇用智臣為輔遣天水郡王安坐汴京其禮無有弟與兄爭如尚悖心可輔天水郡王併力破敵如此又可安中原人心亦未深為國朝患害無慮者一也宋若守吾誓言奉國朝命令時通國信益加和好悦其心目不數歲後共湏歲幣色色往來竭其財賦安得不重歛于民江南人心奸狡既擾亂非理其人情必作叛亂無慮者二也十五年後南軍衰老縱用賢智亦無驅使無慮者三也俟其失望人心離怨軍勢離堕然後觀其舉措此際汝宜一心選用精騎備具水陸謀用材畧取江南如拾芥何為難爾爾等切記吾嘱吾昔南征日見宋用軍噐大妙者不過神臂弓次者重斧外無所畏今付様造之帥死贈大孝昭烈皇帝按大諒所云烏珠封諡他書皆不見且附此當考十有一月癸夘朔以秦魯國大長公主終喪子孫遷官者十有一人授官者十有六人甲辰以其子檢校少保瀘州軍節度使開府儀同三司中太一宫使錢忱為少保封榮國公太尉德慶軍節度使提舉皇城司錢愐開府儀同三司用優禮也近制公主子率授武翼郎孫宣義郎曽孫承奉郎四世孫承務郎女封郡主孫女封恭人云饒州童子戴松十歲其弟槐九歲皆能誦書詔免觧一次甲辰右朝散大夫主管台州崇道觀滕膺卒方臘之反也膺為台州司户參軍賊徒呂師囊以萬衆圍城膺率軍民捍之數月不能㧞台人為立祠嵗時祀之後名其廟曰義靈膺開禧元年閏八月壬午加諡忠惠乙巳忠訓郎張掄獻書籍五十一事詔遷一官掄開封人瓊王仲儡子婿也丙午右朝散大夫提舉江州太平觀池州居住范同復左中大夫知太平州右朝請大夫趙士鵬提舉兩浙路市舶士鵬秦檜友婿自江陰軍代還而有是命紹興二十七年十一月戊寅王珪論士鵬再任提舶凡珍異之物專以奉秦檜而盗取其半以為私藏當考丁未直秘閣知潭州劉昉陞直徽猷閣再任户部員外郎邉知白面對論錢塘仁和二縣養濟院茍簡滅裂乞申嚴行下從之戊申右通直郎杜天舉知潯州還入對言廣西列郡並無教官昨沈晦請於土官内差教諭恐未足為後人模範乞令見任有出身或特進名補官人兼攝從之翊日上謂大臣曰天舉所陳事頗有條理士大夫所言有益於事者不可不行也熊克小厯稱杜天舉奏便民事盖誤樞宻院檢詳諸房文字韋夀成面對乞令諸路憲司覈實州縣給散和糴本錢詔申嚴行下己酉祕書省正字黄公度罷侍御史汪勃言李文㑹居言路日公度輙寄書喻之俾其立異且謂不從則當著野史譏訕其意盖欲為趙鼎游說隂懐向背豈不可駭伏望特賜處分故公度遂罷端明殿學士知臨安府張澄言本府内外官兵支遣及供辦行在所宗廟宫禁下至百司取索皆成定式樁辦外其嵗計經費之餘理合歸之朝廷如遇非泛申朝廷取㫖支用詔户部取索開封舊法申尚書省敷文閣待制栁約卒辛亥責授左朝奉郎祕書少監徽州居住何鑄復左朝請郎提舉江州太平觀大理評事郭唐卿面對論諸州録事參軍不得專一治獄事上謂大臣曰獄重事也官不厯事則一出胥手不勝其弊矣丙辰檢校少保奉國軍節度使侍衞歩軍都虞候金房開逹州安撫使知金州兼樞宻院都統制郭浩薨諡恭毅丁巳詔平江府應辦國信館舎宴設為一路最守臣寳文閣直學士王㬇落直字日本國賈人有販琉黄及布者風飄泊温州平陽縣僊口港舟中男女凡十九人守臣梁汝嘉以聞詔汝嘉措置發遣戊午右諫議大夫何若試御史中丞侍御史汪勃試右諫議大夫若論勑令所刪定官陳澥軍器監丞章岵皆與在外者交通窺探朝政宻相報聞詔並罷己未集英殿修撰提舉江州太平觀閭邱昕充敷文閣待制宰執奏新製祀享禮器事上曰今天下無事郊祀廟享禮莫大焉不可不留意又曰真宗朝遼人直犯澶淵當時射殺逹賚乃命追襲戒諸將毋得殺戮防之出境秦檜曰契丹百餘年來不敢渝盟者縁真宗兼愛兩國生民不殺之故也歸州文學髙衮獻二都賦詔與教官差遣成忠郎趙子愷停官南外宗正司拘管時發還北人馬欽而子愷與之飲宴游獵常州守臣湯鵬舉劾于朝故有是命史所載發歸北人惟此一事故著之欽紹興八年正月乙夘以拱衛大夫忠州團練使為江西兵馬鈐轄不知今何官也庚申右中奉大夫江南東路轉運判官趙不棄行太府少卿充四川宣撫司總領官時秦檜旣疑鄭剛中以不棄有風力乃薦於上遂召對而命之王明清揮麈録餘話云熙寜三年詔宗室出官從政于外方惟不許入蜀鄭亨仲本秦檜之所引自温州判官不數年登禁近遂以資政殿學士宣撫川陜亨仲駕馭諸將有理諸將雖外敬而内憚之適亨仲有忤秦之意因相與媒孽言其有䟦扈狀奏聞之謀于王顯道㬇㬇云不若遣一宗室有風力者往制之因薦趙德夫不棄焉於是創四川總領財賦命德夫至坤維得晁公武子止於零落中辟為幹辦公事俾令采訪亨仲隂事欲加以罪又以德夫子善究為總領司幹辦公事越常制也子止又引亨仲所逐使臣魏彦忠者相與物色其失上聞遂興大獄竄籍亨仲即召德夫為版曹按王㬇今年正月已出知平江又建炎三年已許宗室注川陜四路差遣此小誤晁公武事李燾常辨之見十七年二月符行中除總領注始趙開嘗總領四川財賦於宣撫司用申狀至是不棄言昨來張憲成應副韓世忠錢糧申明與宣司別無統攝止用公牒行移乞依成憲已得指揮許之於是改命不棄總領四川宣撫司錢糧上諭檜曰卿所論甚當如此方與諸軍一體既而不棄將入境用平牒剛中見之愕而怒久之始悟其不𨽻已繇此有隙祕書正字王曮面對言今訪求遺書而州縣施行未稱上㫖提舉祕書省官即古修圖書使之任宜以求書之政令命以專行優加賞勸從之辛酉降授武功大夫殿前司神勇軍統制李耕復饒州刺史知金州主管金房開逹州安撫司公事耕邢臺人楊存中所薦也壬戌左朝奉郎吴棫添差通判泉州癸亥兵部言秦州舊買馬二萬匹今僅發五十八綱乞省押馬使臣許之自紹興後川秦茶馬司嵗市馬九千八百有奇黎叙文長寜南平五州軍千匹係川司宕昌寨峯貼峽三千八百匹係秦司成都潼川府利州路漕司嵗應副博馬紬絹十萬餘匹成都五萬潼川三萬利州二萬餘匹成都利州路二十三茶塲嵗産茶二千一百餘萬斤一千六百十七萬斤餘係西路九州軍凡二十塲四百八十四萬斤餘係利路二州凡三塲而茶馬司嵗輸總領所錢四十萬緡此其大畧也紹興十三年二月二十四日宣撫副使鄭剛中奏乞將成都府路轉運提刑司合樁坊塲鼔鑄食茶稅錢三色共三十二萬貫文令都轉運司徑行取撥外更那融續添錢八萬貫通作四十萬貫并取發博馬絹一萬八千七百五十匹自紹興十三年為頭應副奉聖㫖依已見本月日紹興二十五年七月丙辰所書可參考丙寅權尚書吏部侍郎林保充敷文閣待制提舉江州太平觀從所請也右司員外郎王循友權吏部侍郎監察御史李檉為右司員外郎右朝散郎添差通判秀州曹泳提舉福州路舟舶閏十一月壬申朔太師尚書左僕射秦檜言伏奉恩命賜臣請給依政和格全支望更付有司取索參酌庶得安帖從之按紹興五年十月辛酉𠡠令所申明政和禄格三公三少三省長官請給比嘉祐禄令倍多乞依嘉祐禄令宰臣請給則例修立已得㫖依奏今檜方乞取索參酌何也戊寅提舉祕書省秦熺言祕府多闕書詔本省暨諸路藏書之家借書録本且訪先賢墨迹己夘詔罷新科明法熊克小歴載此事於明年二月己巳今從日歴克又稱自紹興十一年禮部定中選人赴庭試次年遂得黄子淳一人盖不考今年再得張鎡也庚辰太師尚書左僕射秦檜為耕籍使以上將親耕故也先是祕書少監權禮部侍郎游操等請耕籍使乘金根車備鹵簿䕶耒耜先詣壇所許之既又乞减鹵簿之半用三百四十四人其後檜不敢乘而止乞耕籍使乗車在十一月癸夘乞減儀仗在此月丁丑今聫書之朱熹撰張浚行狀稱有張柄者嘗奏請檜乗金根車詳見明年三月戊寅張柄面對注此月甲午禮部太常寺奏用端拱故事金根車載耒耜耕籍使不乗車癸未權尚書兵部侍郎米友仁充敷文閣待制提舉佑神觀奉朝請上好米芾書嘗裒其遺墨刻石藏之禁中友仁能世其業上眷待甚厚太常寺主簿吴元美罷元美侯官人用薦者除太常甫踰月右諫議大夫汪勃奏李光頃為執政行同市井而元美出入其門相與謀議望斥去之以一四方之觀聽乃出元美主管福建安撫司機宜文字甲申司農丞主簿宋敦朴面對言望詔守令以來春耕籍之後出郊勸農諭以天子親耕使四方曉然知陛下德意仍自今每春行之上曰農者天下之本守令有勸農之名無勸農之實徒為文具何益於事乃詔從之敦朴永嘉人也集英殿修撰提舉江州太平觀張宦陞敷文閣待制丙戌權兵部侍郎鄭朴充敷文閣待制提舉江州太平觀從所請也詔提舉祕書省月給公使錢三百緡丁亥詔祕閣修撰提舉江州太平觀劉一止新除敷文閣待制指揮勿行初秦檜以一止久奉祠奏與閭邱昕同除待制十一月己未一止上䟽言臣末學迂愚本無才術叨居近宻未報毫分屏伏山林誓將槁死獨何顔面更叨異恩中書舍人叚拂奏一止趣操朋邪自作弗靖陛下以其嘗在𤨏闥特優容之而乃輕躁怨忿形於奏牘乞罷除職指揮御史中丞何若再奏一止阿附李光舉所不知陛下待遇優容不為不至而一止辭氣怨懟無臣子之禮戊子一止坐落職己丑太常丞王湛請皇后就禁中親蠶不果行辛夘詔楚州上供錢物更免一年丙申提舉祕書省秦熺奏以祕書郎沈介正字湯思退充本所編定書籍官從之丁酉進呈太學博士王之望面對乞倣端拱咸平故事悉取近郡所開羣經義疏及經典釋文令國子監印千百帙俾郡縣各市一本置之於學上曰古人讀書湏親師友雖未必盡得聖經妙㫖然亦自淵源今士大夫未有自得處便為注說以為人師此何理也皇兄寜國軍節度使權主奉益王祭祀安時薨輟視朝一日贈少師追封清化郡王十有二月按是月辛丑朔壬寅諸王宫大小學教授馬雲罷以右諌議大夫汪勃言其心懐異議隂合趙鼎也戊申上謂大臣曰今雖無事諸軍教閱亦不可少廢宜丁寜戒飭之吕中大事記檜雖偃兵以茍安而上御殿閲焉又每嵗閲殿前馬歩軍賞將士藝精者增置殿前司軍又分軍於州郡以控制盗賊其立武不忘也辛亥新除太常寺主簿余堯弼為御史臺檢法官用中丞何若奏也乙夘太尉慶逺軍節度使醴泉觀使郭仲荀薨于台州丁巳上謂大臣曰將來禮器造成宜頒其制于州縣俾遵用之以革舛誤太學正孫仲鼇面對言陛下崇雅黜浮大明正論而民間書坊收拾詭僻之說不經裁定輙自刋行汨蕩正眞所當深慮乞行禁止又言郡縣庠序春秋釋奠守令或不躬親望賜申戒皆從之左宣教郎孫道夫知蜀州道夫入對上諭曰軍興以来蜀民應副不易朕將詔鄭剛中條具盡與蠲减止存經賦而已此以紹興二十六年十月癸亥道夫奏疏修入疏稱十五年陛下諭臣云云而日厯不載道夫上殿之日盖遺之也今因除目附見戊午徽猷閣直學士提舉江州太平觀趙霈卒辛酉直祕閣兩浙西路提㸃刑獄公事徐琛為軍器監尚書右司郎中李檉樞宻院檢詳諸房文字韋夀成並為左司郎中户部員外郎李朝正金部員外郎宋貺並為右司員外郎大府寺丞徐宗說為度支員外郎宗說開化人也壬戌左承議郎知廣安軍張庭俊與宫觀尚書省言庭俊隂懐異意凡朝廷措置並不遵禀故有是命甲子詔右司員外郎李朝正仍舊同措置經界右朝散大夫髙楫知全州代還言溪峒猺人至弱未嘗敢侵省地縁寨官縱人深入猺界掠取遂致乗間刼省民謂之酬賽仰惟祖宗之法止令撫遏不容捕殺乞下湖南禁止庶使邊民安業以廣陛下好生之德上謂大臣曰蠻猺微弱州縣或非理侵擾當諭守臣撫綏之丁夘金主使驃騎大將軍殿前右副都㸃檢富察說正議大夫尚書刑部侍郎吴磐福来賀来年正旦戊辰詔諸路提舉常平官復為監司嵗舉屬吏五人改京官用吏部請也是嵗宗室子賜名授官者二十一人諸路㫁大辟九十一人徽猷閣待制知瀘州馮檝申修築本州城許之瀘舊無城以木柵為固嵗久不葺盗取而薪之政和中始命壘石為堤上築城其周六里有奇計用錢二十一萬緡然瀕江一帶石堤雖固而上封以土江水暴至猶有齧城之害檝悉以石甃土凡石城千一百七十歩髙二丈二尺土城千三百二十八歩髙三丈舊樓櫓千五百餘間今為敵棚四十而已初眉州通濟堰自建安間剏始溉蜀州之新律眉州之眉彭三縣田三十四萬餘畝其後壊於開元又壊於建炎隴畝彌望盡為荒野是嵗守臣勾龍庭實庭實夾江人初見紹興十三年十一月貸諸司錢六萬緡躬相其役更從江中創造横截大江二百八十餘丈與下流小筒堰一百十有九於是前日荒野盡為沃壤庭實又為書名曰堰規至今不廢邦人為立祠嵗時祀之嘉泰元年賜廟額曰靈惠開禧元年封惠濟侯邵武軍威果營卒謀作亂欲以夜半縱火焚譙門殺郡守左朝請大夫趙子昇卒陳昇告之捕同謀者皆斬授昇承信郎建炎以來繫年要録巻一百五十四建炎以來繫年要録巻一百五十四金人地名考證烏珠原書作兀术誤改見巻一逹蘭原書作撻覧誤改見巻一富察原書作蒲察誤改見巻一百十七沃赫原書作惟可誤今改正
