body:
  text: 建炎以來繫年要録卷一百六十四宋李心傳撰紹興二十有三年歲次癸酉元金海陵煬王亮貞元年春正月按是月辛卯朔己亥左朝散郎致仕高閌卒閌退居明州太師秦檜欲卜其向背因其鄉人姚孚者逹意於閌欲以弟之女豫其子閌辭之遂致其仕絶口不言時政杜門觀書卒免於禍云癸卯太保昭慶軍節度使萬壽觀使平樂郡王韋淵為太傅己酉降授平海軍承宣使提舉台州崇道觀台州居住李顯忠復寧國軍節度使以赦叙也顯忠行狀云降居丹邱十餘年㑹時宰物故太上皇帝知公被黜非辜召還復寧國軍節度使誤也今不取顯忠再除節鉞不降麻亦非故事隆興元年十一月劉寶乾道五年十一月顯忠再復節並學士院降麻此除或是秦檜抑之當考翊衛郎階成西和鳳州兵馬都鈐轄充御前後部統制軍馬吳拱為榮州刺史上召拱入朝故有是命庚戌左奉議郎臨安府府學教授鄭仲熊為國子監主簿仲熊西安人也乙卯詔四川綱馬令承旨司看驗自今有瘡疥瘦瘠者押馬使臣更不推恩其芻粟令所過州如法應副尋不行五月己丑再降旨依舊格推賞丁巳右文殿修撰提㸃佑神觀秦塤升敷文閣待制久任在京宫觀以塤奉祠滿歲故也檜辭不受戊午右朝散郎知鎮江府王循友移知建康府趙甡之遺史云王循友乞加秦檜九錫雖不行俄自知鎮江遷循友知建康府識者不敢言惟以目相視按循友以十七年三月罷吏部侍郎其乞加檜九錫當在未罷之前今附此更須詳考是月昭信軍節度使士夽薨追封安化郡王録其子右宣教郎不䛲等三人為直祕閣它子弟遷官改秩除官者七人恤典如執政二月己未按正月辛卯朔己未二十九日原本作月誤以下月考之當以庚申為二月朔詔嶽陽軍節度使開府儀同三司萬壽觀使士樽權主奉濮安懿王祠事癸亥上幸玉津園遂詣延祥觀己巳吏部尚書林大鼐罷右正言史才論大鼐狂躁欺誕父在而不迎侍陛下擢宋朴為樞密大鼐以其出己上憤然不平若不亟去必搖國是故大鼐遂罷庚午臠䖍州軍賊黃明等八人於市明等據州城凡百有十二日辛未改䖍州為贛州州漢贛縣地貢水自新樂山至城東北與章水合故名焉先是祕書省校書郎董元德面對論䖍州謂之虎頭城非佳名今天下舉安獨此郡間有小警意其名有以兆之望賜以美稱事下中書後省至是擬定又請改䖍化縣為寧都從之壬申直龍圖閣都大主管成都等路茶馬監牧公事汪召嗣與宫觀差遣以尚書省言綱馬不如數故也右朝散郎成都府路提㸃刑獄公事湯允恭都大提舉成都府利州路茶事兼提舉四川等路買馬監牧公事乙亥左宣教郎王綸充諸王宫大小學教授綸江寧人也丙子復置光祿寺丞一員專掌祠祭禮料即惠照院齊坊儲之以吏部郎中兼權太常少卿沈虛中言今醯醢之屬皆制在市司慮其不䖍故也至是以故僞福國長公主第為光祿寺庚辰樞密院編修官楊願守尚書工部員外郎直祕閣主管台州崇道觀鄭震提舉兩浙路市舶震驤子也辛巳左朝奉郎林大鼐知泉州大鼐以此月六日乙丑得旨放罷今才十七日乃即除郡不知何故當考癸未龍神衛四廂都指揮使忠州團練使殿前司遊奕軍統制措置盜賊節制軍馬知贛州李耕以功為金州觀察使於是諸將劉綱等九人各遷二官將士受賞者萬三千百二十有四人方贛之亂也本州居住人降授左朝散郎提舉江州太平興國宫孫近走吉州避之至是復還其州未幾卒熊克小歷稱近以祕書少監分司南京謫居按近落分司已久紹興十四年六月癸未自左朝散大夫提舉江州太平興國宫興國軍居住坐奏薦事降三官移南安軍二十年八月又移䖍州依舊宫祠克恐差誤三月庚寅朔殿中侍御史魏師遜右正言史才並兼崇政殿說書丙申慶逺軍節度使知洪州張澄知福州龍圗閣直學士知福州張宗元知洪州丁酉詔太尉吳璘楊政田師中並給真俸時璘以依楊存中指揮援存中所得張浚例有請朝廷因併政師中給之敷文閣待制知平江府徐琛以疾求去升敷文閣直學士提舉江州太平興國宫癸卯平海軍承宣使知南外宗正事士珸言宗子善軫在學實及二年文藝卓然衆所推譽乞免文解一次上曰近日宗子多讀書殊可喜也丙午御史臺主簿胡襄面對論諸邑主簿多不銷民户輸納之鈔往往勒令重輸乞戒飭詔申嚴行下襄永嘉人也光山軍節度使開府儀同三司提舉西京嵩山崇福宫齊安郡王士㒟薨于建州訃聞贈太傅追封循王六子皆進官二等女封郡主諸妾受封者五人丁未鎮江府駐劄御前諸軍都統制劉寶乞令民户識認軍莊營田者每畝賞開耕工本錢五千五百從之尋詔諸路倣此詔諸路在九月戊戍今併書三十二年三月庚子所書可參考司農寺主簿盛師文面對論諸州都監諸縣巡尉擅置刑獄乞申嚴法禁詔刑部申嚴行下戊申左朝請郎范彥輝追毁出身以來告敕文字除名勒停永不收叙送荆門軍編管初彥輝為太府寺丞嘗作夏日久隂詩云何當日月明痛洗蒼生病殿中侍御史魏師遜奏彥輝隂懷異意謗訕朝廷法寺鞫實故有是命彥輝罷寺丞在二月丙寅今併書之辛亥直龍圖閣提舉台州崇道觀汪召嗣知潭州召嗣以失職罷茶馬才四十日便除大藩前未有此當考召嗣未至官而卒壬子詔故武功大夫貴州刺史楊宗閔賜諡忠介故敦武郎知麟州建寧寨楊震賜諡恭毅二人楊存中祖父皆以死事故用存中請也癸丑軍器監丞黃然面對論福建江浙販牛屠賣十百為羣乞重立賞格許人告捕詔申嚴行下左宣義郎江南西路轉運司主管文字王歷候今任成資日優與升擢差遣以知贛州李耕言其應副軍須有勞故有是命歷㑹弟已見歷寓居撫州恃秦檜之勢凌奪百姓田宅甚於寇盜江西人苦之右武郎幹辦皇城司劉允升劉伉並特遷右武大夫以訓練禁旅有勞特推恩也是春金主亮徙都燕京下詔改元貞元不肆赦內外文武皆進官一等改燕京析津府為大興府號中都為中京㑹寧府為北京汴京開封府為南京而舊遼陽府為東京大同府為西京如故分蕃漢地為十四路置總管府名都城門十二命近臣王競書之名太廟曰衍慶宫以奉太祖旻太宗晟德宗宗幹神主又作元廟於其東以奉英格己上張棣金人志云英格諡大聖皇帝廟號仁祖而洪皓松漠記聞云英格諡孝平皇帝廟號穆宗二書不同按皓歸以紹興十三年而棣之作志在淳熙三年疑後來復有所改然大聖乃阿古達諡號棣恐誤記疑不能明也舊取士無殿試亮始復之凡鄉試三人而取一府試四人而取一府試分六路河北及燕人於大興遼之東北於㑹寧山後及河東人於大同山東人於東平河南人於開封關中人於河中通以五百人為合格殿試又黜之榜首即授奉直大夫翰林應奉文字後又罷經義神童等科惟以詞賦法律而已金之用刑舊有沙袋亶立始去之亮立又去杖脊凡徒刑止以荆决臀為其近人心故也徒刑五等自五年至一年皆使之雜作滿則釋之亮又定車蓋之式后妃車飾以金三品以上飾以銀自后妃至五品皆朱輪六品以下黑緑而已舊親王宰執用紫蓋亮始削之惟太子用紅諸妃用紫三品以上用青皆以羅四品五品用青皆以絹餘不得用此事必非一年所為今且因遷都附見亮至燕以平章事郜王蕭裕有參畫之功拜裕尚書右丞相兼中書令以兩國編年金人誅蕭裕詔張棣金人志參考修入熊克小歷亮徙燕在二十二年冬今從編年張棣又云大赦僞境按亮詔云除參酌不肆赦外可改元貞元棣誤也詔書具于后門下朕以天下為家固無逺邇之異生民為子豈有親踈之殊眷惟舊京逖在束土四方之政不能周知百姓之寃艱于赴訴况觀風俗之美惡察官吏之惰勤必宅所居庶便于治顧此析津之分實惟輿地之中參稽師言肇建都邑乃嚴宗廟之奉乃相宫室之宜遂正畿封以作民極雖衆務之畢舉冀暫勞而久安逮兹落成㳙日涖止然念驟興于役力豈無重擾于黎元凡有科徭皆其膏血遂至有司之供具亦聞享上以盡心宜加撫存各就休息載詳前代赦宥之典多狥一時姑息之恩長惡惠姦朕所不取若非罰罪而勸善何以勵衆以示公今來是都寰宇同慶因此斟酌特有處分除不肆赦外可改天德五年為貞元五年燕本列國之名今為京師不當以為稱號燕京可為中都仍改永安析津府為大興府上京東京西京依舊外汴京為南京中京為北京又爵祿所以勵世而磨鈍也前此官吏每有覃轉資級賢否不辨何補治功緣今定都之始所冀上下協𠂻恪恭乃事若俾一夫不獲其所則何以副朕遷都為民之意故特推恩以示激勸可應內外大小職官並與覃遷一官於戲京師首善之地既昭示于表儀詔令責成之方其勿怠于遵守咨爾有衆體豫至懷夏四月庚申朔詔江南西路轉運判官盧奎特轉一官慶逺軍節度使新知福州張澄轉一官回授以樞密院言收捕贛州叛兵帥司遣發官兵㑹合漕司應副錢糧别無闕誤故也壬戌大理評事莫濛面對論官司遣人追逮罪囚多所邀乞詔刑部申嚴行下乙丑秦檜奏以權吏部侍郎陳相接伴北使閣門宣贊舍人張彥攸副之上因曰今後奉使須選醇謹之人至如武臣作副亦當慎擇彥攸開封人也甲戌上謂大臣曰近今臨安府收捕破落户編置外州本為民間除害而所謂小火下者乃為人訴其恐嚇取錢妄有供具本非為民除害之本意可令有司子細根治務得其實先是行在有號破落户者巧於正晝通衢竊取人所帶之物秦檜得其姓名悉奏分遣外州拘之上恐因而擾人故有是諭熊克小歷載此事于五月癸酉按今年五月己丑朔無癸酉克歷恐誤丙子右朝奉大夫張柄復為大理少卿辛巳詔諸州編管羈管人在法止許月赴長吏㕔呈驗聞比來囚禁鎖閉甚於配𨽻可令遵守成憲如走失捉獲人即具名申尚書省别作行遣臣謹按是時朝士如胡銓吳元美士人如智浹等以秦檜所擠編管者甚衆所在望風以流人為竒貨多捃辱之今此指揮日歷但云有旨則是出自上意非由臣下及官司陳請也故表出之乙酉詔利州歲鑄錢以九萬緡為額視舊額减五分之二二十五年七月丁巳所書可參考仍並鑄折二錢丙戌太師尚書左僕射秦檜言臣昨者京城獨入議狀不隨衆人推戴張邦昌實人臣分義不得不然其後邦昌同門壻朱勝非及妻家使臣換文資程昌㝢相與協謀極力排擯蹤跡詭險欲蓋彌彰昌㝢任鼎州鎮撫使日於不係所管邵州擅取常平錢米本州守法未敢起發乃移文欲遣軍馬就食其跋扈不軌何異李允文等朝廷以軍興隱忍未發昌㝢懷不自安乃於勝非再相之日以自己所得詔書刻置鼎州㕔事又於碑文公肆誕言掩其私交之迹歸非於上今勝非昌㝢雖死其徒實繁隂謀未己伏望聖明降鍳若昌㝢不當以己事列置公㕔即乞明降指揮以上件碑石别刻本州所受詔書庶允衆聽從之五月庚寅刑部侍郎韓仲通言近郊赦時禁州縣不得挾私意籍罪人家産恩德至渥也而守令猶有易以追賞錢為名且違法制多立其數至數百千致竭其産雖鬻妻子不足以償望詔有司申嚴禁止詔刑部申嚴行下甲午右朝散郎通判福州葉仁特展二年磨勘左從事郎福州閩縣丞兼權察推林亮功特降一資以鞫鄉貢進士鄭煒簽書不當也按此當是吳元美謗訕事不知何以許時方行遣也丙申武德郎李昌齡特追一官勒停昌齡為清河郡王張俊掌房緡坐不依聖旨减放故有是命己亥右承奉郎楊倓為藉田令倓偰弟也庚子右朝奉郎就權利州東路安撫司主管書寫機宜文字楊庭言興元府褒斜谷有古六堰溉民田甚廣兵火後修不以時水至輒壞若全以食水户修葺恐致民力重困欲每遇夏月水泛於見屯將兵內差不入隊兵卒併手修葺興元自兵亂以來城內生荆棘官民皆茅屋而帑藏寓僧舍自太尉楊政再為帥以次繕治至是一新户口寖盛如承平時矣政嘗葺學舍府學教授青神唐迪請增學田以廣養士政從之時有欲以學田饋軍迪言大軍歲費四千萬而欲取學田以當賦何啻九牛一毛又豈愛禮存羊之意邪論者乃止癸卯尚書省言人使來程淮南轉運司應副酒食多不足備合行約束詔回程須管足備不得誤事令先具知委文狀申省甲辰直顯謨閣知揚州向子固罷時北使赫舍哩大雅過其州子固遇諸衢不即引避大雅以為言故有是命乙巳詔敷文閣待制四川安撫制置使兼知成都府曹筠年老纍乞便郡可移知宣州左承議郎池州居住蕭振復敷文閣待制四川安撫制置使兼知成都府辛亥金國賀生辰使副中奉大夫祕書監兼右諫議大夫赫舍哩大雅廣威將軍尚書兵部郎中兼四方館副使蕭簡見于紫宸殿癸丑右承議郎知大宗正丞張宗元面對乞令諸州按月支給宗室孤遺錢米從之六月己未上謂大臣曰近遣內侍往盱眙賜北使宴乃擅買北貨非便已令拘收入官庶少懲戒左承議郎王之道通判安豐軍之道以上疏言兵故坐黜者十四年辛酉上謂大臣曰近日霖雨軍營多壞己賜錢七萬緡令整葺聞所在民田有被水患者可下州縣遣官檢放苖稅壬戌國子監丞兼權祠部員外郎吳武陵面對乞申嚴荆湖福建士民不舉子之禁令保伍更相覺察月上娠産之數于官兼申給錢之令則全活嬰孺將不可勝計詔監司丁寧州縣悉意奉行其有顯績去處保明申奏推賞甲子詔每歲交割歲幣官員雖多止以十三年分六員所得减年細計分受以前盱眙軍録事參軍蔡翬言其泛濫故也左朝奉郎張闡添差通判衢州乙丑大理寺丞丁仲京面對乞以前後己行軫恤庶獄事理撮其要語揭示通衢使天下之民瞻視鼓舞遷善逺罪而不忍犯詔申嚴行下丁卯直龍圖閣主管台州崇道觀舒清國卒己巳右朝奉郎利州東路安撫司主管書寫機宜文字楊庭特遷右朝散郎直祕閣賜紫章服尋以庭通判階州詔直祕閣兩浙東路提㸃刑獄公事秦昌時令自成資後别理今任月日候再任成資滿日取旨庚午詔民户典賣田地毋得以佃户姓名私為關約隨契分付得業者亦毋得勒令耕佃如違許越訴比附因有利債負虛立人力雇契敕科罪以言者有請從户部立法也壬申尚書駕部員外郎齊旦為樞密院檢詳諸房文字忠翊郎閣門祇候王謙為閣門宣贊舍人謙晉錫養子用晉錫大理奏薦及减五年磨勘恩例回授也丙子右正言史才言諸路州軍起綱赴行在所交納至有折缺之數並將合干人押下排岸司追理排岸非刑法官司無所研問得其人則使監守夜則寄禁錢塘仁和兩縣獄中身為囚繫欲償無路欲望並令即時具名數申解所屬見得有侵盜貿易之弊者送大理寺推治其過誤損失並押下元起綱處依法備償附綱起發從之己卯大理評事莫濛面對乞令州縣編配罪囚並依程限遣行詔申嚴行下是日潼川大水涪江漲庚辰元武江漲水四面壞城奄至人方惶駭爭保城西牛頭山寺山趾大溪橋壞水大至平地丈五尺人之死者甚衆辛巳左朝奉郎廣南西路提㸃刑獄公事田如鼇直祕閣以其嘗在贛州有勞也左朝議大夫李健卒壬午左朝散大夫提舉荆湖南路常平茶鹽公事王珏為荆湖北路轉運判官鄂州征民竹木并役之作堤捍江歲歲水齧堤壞珏募人厚與之直伐石於漢陽以為堤凡五百十九丈堤成水大至不能齧嶽州賦于民者畝增二畝謂之毛種珏聞立罷之癸未上謂大臣曰靜江府士人上書乞增解額及减稅二事可令有司看詳稅額乃胡舜陟妄增尤為民害不可不减也祕書省校書郎董德元面對言明年省試太學士人承教已久入仕必衆須用補試以收後來之俊彥欲乞諸州補試人各限其數上郡不得過二十人中郡十五人下郡十人臨安府倍上郡之數流寓各在寄居郡數之內每以省試年夏季為率許士人詣本州投狀令佐保明委教授簾試賦一首或經義二道取文理優者申州給據赴太學補試若當年省試下願就補者聽不在此數不許非時投狀乞試如此則人知天子之學不可造次而入凡預補者無不自愛臣又聞既補入學而聽讀日少在告日多長假與特給假固有法矣今則特給展至三年而不禁在學與在假固有法矣今則三年在假而取解與在學者等如此恐不足以為懲勸欲望委國子監自今秋科舉以後檢舉學令施行則人皆勉勵無復輕去上庠矣詔禮部看詳申省丙戍左從事郎張震為太學博士入內東頭供奉官裴詠除名瓊州編管永不放還詠往盱眙撫諭北使私市北貨尋被拘收心懷怨望有指斥語法當絞特貸之此即己未日上語及之者也丁亥故武功大夫殿前司統制吳進特贈右武大夫果州團練使故武節大夫江西安撫司同統領馬晟特贈武功大夫忠州刺史二人皆為贛賊所殺故録之是月南康軍言宗子不硜割肝愈母疾建炎以來繫年要録卷一百六十四建炎以來繫年要録卷一百六十四金人地名考證英格原書作楊割誤改見卷二阿古達原書作阿骨打誤改見卷一赫舍哩原書作紇石烈誤今改正
