body:
  text: 建炎以來繫年要録卷五十宋李心傳撰紹興元年十有二月甲子朔知樞密院事宣撫處置使張浚言今年二月於階成州駐兵與金人相持聞潼川府路有偽造檄書稱平蜀大將軍不顯姓名指斥宗廟搖動吏民臣移師利閬之間密切採訪據知潼州府宇文粹中稱本府吏民乞用曲端充統制官等緣端跋扈之迹顯著臣受陛下重寄豈有主兵之官却用藩府薦用萬一事出於意外臣將何辭以報朝廷已送端恭州置獄推治外四川見今前執政侍從等官在職慮與臣議論不同别有奏陳乞賜下照詔已覽來章令三省劄浚照會時端已為浚所殺而朝廷未知也併著此以見端之死所坐無名故浚之詞支離也詔直徽猷閣提舉臨安府洞霄宫黃叔敖文學吏事皆有可觀恬退之節士夫推重可除給事中令所在以禮敦遣赴行在龍圖閣學士提舉江州太平觀路允迪守本職致仕允迪以前執政告老不進官非故事也乙丑太常少卿趙子畫權尚書禮部侍郎本朝以公族為從官自子畫始朝散郎廣南東路提點刑獄公事程瑀試太常少卿秦檜引之也降授朝奉大夫主管臨安府洞霄宫曽班除名勒停雷州編管以右司諫方孟卿論其在秦州植旗降敵上書秦州已投拜大金國八字且行移斥御名也班兄弟顯謨閣直學士楙顯謨閣待制開乞納官以贖班之罪上不許太中大夫吳敏充資政殿學士提舉臨安府洞霄宫敏初除湖廣宣撫使以祖母年髙力丐免未報敏受命置司栁州時冦盜充斥敏方鳩兵選將未能出師而吕頤浩檢會敏丐祠之章故有是命敏至司才十六日也熊克小歷吳敏不能制賊為言者所論而罷降資政殿學士提舉洞霄宫與日歷所書不同當考國學進士上官孔明上書論范汝為猖獗之狀且言為范賊之策有三直搗廣南盤據要地疲用王師使苦嵐瘴嵗月莫能下此上策也引衆直前據福州城食城中粟北守壯嶺南斷浮橋備河口舟阻古田險坐困王師此中策也不度智力迎敵王師此下策也臣今料之彼必出下策然福建之地平原曠野率皆磽確民利於步戰而王師長於車騎便於長戟利於弓弩地有所宜戰非所利謂宜永嘉航海直至福建秣馬厲兵張皇聲勢募福建之民以攻福建之賊詔付宣撫司孔明邵武人也丙寅詔依祖宗故事復置樞密都承旨以兩制為之如未曽任侍從之人即依權侍郎法詔應販私茶鹽並不用蔭原赦樞密直學士知遂寧府席貢上遺表贈光祿大夫後諡襄榮丁卯吏部侍郎李光請復東南諸郡湖田詔户工部取會奏聞初明越州鑑湖白馬竹溪廣德等十三湖自唐長慶中創立湖水髙於田田又髙於海旱潦則遞相輸放其利甚博自宣政間樓異守明王仲薿守越皆內交權臣専事應奉於是悉廢二郡陂湖以為田其租米悉屬御前民失水利而官失省稅不可勝計王明清揮麈録餘話云王仲薿守會稽頗著績效如乾湖為田導水入海是也按二郡湖田其租悉屬御前重和元年二月甲子詔鑑湖田租以備繕修原廟之須不許他司奏請他皆類此上虞一縣考究自宣和元年至建炎四年湖田凡得米三萬三千餘斛入御前而約放省稅米十四萬六千餘斛民間所失不在焉其本亦如此眀清所云未免誤矣光奏請復之既而上虞縣令趙不搖以為便不搖申到在明年三月庚申遂廢餘姚上虞二縣湖田而他未及也宣撫處置使張浚言已封永康軍普德廟神為昭惠靈顯王漢右將軍張飛為忠顯王詔依已行事理普德神秦蜀守李冰次子也宣和間改封真人至是浚言神比託夢兆欲掃妖凶患無兵印又言閬州有死卒復蘇稱飛與關羽分兵境上摧拒強敵故封之己巳祕書少監傅嵩卿權尚書吏部侍郎充淮東宣諭使且賜諸州守臣銀合茶藥仍命嵩卿體訪民間利病來上庚午手詔閩賊范汝為嘯聚日久反覆變詐害吾良民比再遣帥盡行剪戮重念軍旅暴露轉輸勞煩皆朕不德之所致也王師到日其諸徒衆能執汝為請命者當受重賞自餘咸赦除之可令宣撫司多出榜示及箭射蠟彈入賊中使眀知朕意辛未吕頤浩奏乞通京東河北商賈先是劉豫置𣙜場通南北之貨頥浩以為便乃奏行之責授海州團練副使孟揚責授黃州團練副使孟揆並放令逐便先是揚父責授昭信軍節度副使昌齡既卒於封州而揚揆猶在嶺南朝議以其蠧國害民纍赦不宥昌齡妻東平郡夫人靳氏以昭慈近屬訴於朝乃許自便昌齡開封人宣政間與二子繼任水衡昌齡仕至保和殿大學士揚揆皆光祿大夫靖康初坐姦贓廢宣撫處置使張浚承制以閣門宣贊舍人知興州同統領秦鳳等路軍馬李師顔知成州閣門宣贊舍人利州路第三將柴斌知興州金之陷陜西也師顔為耀州守獨率所部來歸其家屬皆為金所得金人服其忠義遣其弟師文招之師顔不顧師文卒為所害由是浚擢用之師顔事以紹興三十年三月壬辰富元衡所奏增入夜行在紹興府火壬申言者論今日為百姓甚害者無如科配一事州縣比年以來於常賦之外别立一項軍期科配一嵗之間一户至五七次臣竊謂與其許科配不若専責常賦與其放逋欠不若嚴禁敷率今稅租免後和買及關征𣙜酤之利别無失陷則軍事所需何容不足伏望特降睿旨今後除依法催科以備軍期外自餘非泛科配一切停罷詔户部勘當户部侍郎栁約言遇災傷及經兵破難以不放逋欠外若實因軍期須索亦有許收量添酒錢應副或因軍期所需多科其數别作支用昨降旨以自盜贓論官竄嶺表望依纍降指揮施行從之時議者又言朝廷之上喜徇祖宗愛民之良法而諱言今日科斂之大害如早稻未熟而借冬苖春蠶未畢而催和買富民鬻田舍下户質子女籲天不聞誠宜嗟憫伏望眀詔大臣繼自今勿以科斂為諱而特如條畫申敕監司謹其拋降之名俾不得加數掊克因事漁利則四方之民凡有征求莫不樂輸而無怨矣疏奏詔檢會五月己未指揮申嚴行下後奏在此月甲戌今聨書之明年正月陳汝錫謫官恐緣此事左朝奉郎葉夏卿直祕閣知饒州時江東羣盜方熾故選用之既而言者論夏卿通守洪都以城投拜命遂寢甲戌詔江東安撫大使司統制官郝晸顔孝恭以所部四千往建昌軍討賊權聽守臣朱芾節制先是建昌之石陂寨軍賊丁喜饒青聚衆為亂提刑司檄土居宣教郎蔡延世會安撫大使司都統制閻臯擊之官軍失利至是李敦仁復犯虔化縣閣門祗候權縣事劉僅與戰為所敗言者慮二寇相合故命芾討之晸孝恭時駐軍鄱陽就遣之也乙亥淮康軍承宣使神武副軍都統制福建制置使辛企宗追三官令統所部赴宣撫司軍前自效坐擁兵逗遛為御史所劾故有是命初詔內外侍從官舉縣令中書記名以次除授而言者以為所舉多親舊或罪纍礙於銓選之人乃命吏部參考其負罪礙格之人並罷仍坐所舉官詔立賞錢千緡有妄言火災者許人告捕從軍法時都人訛言太史局奏是月望復有火災故禁之丁丑手詔略曰比緣國難盜起未息者蓋姦贓之吏無恤民意及煩王師而軍需不免又取於民因循展轉日甚一日欲民不為盜不可得也可將建炎三年以前積欠除形勢户及公人外一切蠲除如州縣不奉詔及監司迫脅州縣巧作催科者並除名令御史臺糾察多出黃榜曉諭又詔三省備坐祖宗朝真決贓吏舊制鏤板行下自今有犯依法行遣仍籍沒家財上以軍興民困吏緣為姦故盜賊蜂起乃下此詔焉朱勝非秀水間居録云范宗尹為相踰年南宋沈與求論其過惡二十事而贓墨居其四焉於是罷相宫祠彈疏既傳無不駭愕繼有詔旨官吏犯贓依祖宗舊典誅戮仍籍其家因宗尹也按宗尹罷相非因與求論列前已辨之此詔恐非因宗尹特勝非惡之之辭今不取親衛大夫建州觀察使神武右副軍統制嶽飛為神武副軍都統制仍以所部屯洪州時飛遣本軍主管文字秉義郎髙澤民至紹興而澤民其甥壻也乃詐為飛狀乞都統制或總管職事故有是命飛皇恐自辨詔諭以出自上意仍鑄印賜之詔浙西安撫大使兼揚楚等州宣撫使劉光世防遏金人招安盜賊保護浙西一路厥功懋焉可特與恩澤三資奏補本宗或異姓有服親户部侍郎栁約言軍興科需百出望官户名田過制者與編户均一科敷從之明年正月丁巳不行是日曹成至道州守臣直祕閣向子忞聞之悉城中官軍得百有二十五人俾之迎敵又遣使招之兵行三十里與成遇士皆驚逸成自東門入子忞從西門跳奔獲免成遂據道州戊寅以彗出會稽許臣民實封言事按此手詔甚詳而日歷不載蓋失之詔行在職事官人添職錢十千日歷十二月十五日沈與求除龍圖閣學士宫祠賈安宅工部侍郎胡松年給事中黃龜年起居舍人按此皆紹興二年十二月事史蓋誤也又於此日書右諫議大夫徐俯上殿按俯明年春方除諫官又書遣駕部員外郎李願充川陜撫諭按願明年四月方以國子監丞被命入蜀迎祁王史皆誤也周必大序駕部題名亦繫於今年十二月同此一誤今並不取庚辰武翼郎閣門宣贊舍人制置山東忠義軍馬范溫遣參議李植來獻捷詔以溫為武功大夫忠州刺史仍命聽樞密院節制是日桑仲遣兵攻復州守臣修武郎祖遹棄城走辛巳復置廣西茶鹽司舊淮南鹽息嵗收八百萬緡自軍興淮南道梗許通廣鹽於江湖諸路而二年半入納才七十萬緡至是江湖鹽價每斤為七八百錢議者以為利厚而冒販者多故復置官提舉户部侍郎栁約復請增諸路酒錢上等每石二千下等一千其半令提刑司樁管餘備軍費從之去年十一月辛亥增至此又增詔武翼大夫閣門宣贊舍人知海州薛安靖朝散郎通判州事李彚並赴行在令楊楚等州宣撫使劉光世遣將統兵戍守安靖本劉錫屬官彚嘗為沙河簿在滄州結約南歸會劉豫使守海州至郡踰年遂誘率簽軍蓋諫等殺金人所命沂南淮北都巡檢使王企中及偽齊之戍守者率軍民以城來歸尋以安靖為浙西兵馬副鈐轄賜彚同進士出身簽書寧海軍節度判官廳公事安靖等除官日歷不見據明年三月四日安靖等申明東海軍戍兵狀增入彚以二年二月乙丑賜出身武翼郎單德忠充樞密院準備將領以所部三千人自為一軍以其忠節顯著也詔户部給銀五萬兩付溫州為福建等路宣撫司大軍家屬錢糧之用以添差兩浙轉運使盧知原有請也先是宣撫使孟庾總大軍道由溫州守臣龍圖閣待制洪擬趣使赴援庾怒於饋餉外命擬亟犒師犒已即行擬歸未及州治軍人已塞滿庭下洶洶且不測擬即借封樁錢用之事已自劾詔書奬其知變賊平庾上其勞加秩一等擬轉官在明年十一月癸未蓋因宣撫司保奏也偽齊汴京留守劉益遣父老史平僧録德真道録王從問奉表請劉豫遷都是日豫下偽詔曰汴京實四方之上遊名區奧壤為天下最今所宜都無以易此而重念遷都重事未嘗輕議既而冦盜衰息強梗還歸關輔混同人漸寧謐宅中而據會要因舊以建新邦乃其時矣朕志已定朝論僉協將戒嚴而順動宜先事以示期誕布詔音亶孚羣聽已定明年春末遷都於汴凡爾遐邇宜知朕意豫又以偽權尚書左丞張昴權門下侍郎權尚書右丞張東為左丞中書舍人直學士院范恭兼權右丞先是監察御史婁寅亮即陳宗社大計尚書右僕射秦檜以寅亮富直柔所薦惡之使言者論寅亮宣和中父死於賊匿不舉喪壬午詔大理寺劾治甲申右司諫方孟卿言祖宗故事諫官置局於後省號為兩省官蓋兩省朝廷政令所自出祖宗以諫官居之不無深意今行在諫院許於皇城內建置未有定處望令依舊隨省置局詔諫院許於行在所都堂相近置局尚書吏部郎中孫近充祕閣修撰提點兩浙東路刑獄公事乙酉祕書丞劉大中為尚書吏部員外郎丙戌詔大理寺且留紹興府俟勘斷見禁公事盡絶赴行在詔入內內侍省應官司取索文字依舊例更不回報後又詔內侍省準此此以二年二月十七日內侍省狀增入丁亥言者請贓吏當死者勿貸上曰朕本心欲専尚德化顧贓吏害民有不得已者然亦豈忍遽置搢紳於死地如前詔杖遣足矣武經郎閣門宣贊舍人潘永思追一官坐為人市恩澤也先是大理推治偽告事連永思上曰永思雖戚里既有過安可廢法乃命罷職就逮右司諫方孟卿言比年大兵所過肆為虜掠甚於盜賊望賜告戒詔自今出師毋得秋毫騷擾樞密院察大將大將已下遞察犯者並行軍法戊子知樞密院事宣撫處置使張浚奏和尚原勦殺金人先是浚徙治閬州徽猷閣待制參議軍事劉子羽請獨留河池調護諸將以通內外聲援浚許之是日吕頥浩等進呈浚奏劄言浚今居閬中為水運以給西軍上曰朕料浚必能立功秦檜因奏去年臣初至行朝論浚者紛紛甚可嘆駭賴陛下保全得以安迹萬一有功實賴陛下知人善任使不惑浮言之效上因備論天下事有利必有害但害少而利多皆所可為若聽浮言則事將俱廢且如前年航海一枝之外便皆為不測使惑於浮言逡巡不決豈不敗事頥浩檜出至省府未食捷奏至上大喜己丑制授起復明州觀察使陜西諸路都統制兼知秦州吳玠鎮西軍節度使從張浚請也仍遣中使任充持旌節官告賜玠尚書右司員外郎江躋為殿中侍御史初上既褒録符祐黨人而其子孫陳乞推恩者吏部猶會刑寺有無過失議者言敕書既稱以忠為罪望悉除落過名以正名實從之詔襄鄧鎮撫使桑仲金房鎮撫使王彥釋怨體國不得自相侵擾初仲雖受命然猶恃兵衆再圖取金州是冬以其衆分三道一攻住口關一出馬郎嶺一搗洵陽縣使其副都統制武節大夫榮州刺史李橫統之前軍去金州三十里彥曰賊兵以我為寡故冦三道以離吾之勢今吾破其堅則脆者自走矣時賊之大兵在馬郎嶺北彥遣統制焦文通禦住口關而自以親兵營馬郎嶺與之對壘幾月大戰凡六日賊大奔潰彥縱兵追擊均州平仲冦金州據彥行狀在今冬不得月日按史降旨令二人釋怨在此月己丑故遂聨書之曹筠撰陳規行狀云都督張公入蜀桑仲遣兵躡其後為王彥所敗即日遣郢州兵欲謀蜀公遣人諭霍明毋附仲仲怒挾數百騎來郢州為明所殺按浚以建炎三年冬入蜀去此已久仲不應躡其後若以為浚入援時則其還秦州在建炎四年三月至此亦已踰年筠所云誤也仲追郢兵及被殺皆在明年已刪潤附見庶不抵牾仲承制加橫榮州團練使日歷明年四月戊寅桑仲奏李橫近緣再立功效已便宜加榮州團練使有旨李橫特與轉團練使依前武節大夫按橫自此未嘗出兵故且附於犯金州之後俟考庚寅詔存恤張孝純鄭億年李鄴家屬命所在州根刷期已上親赴行在候到取旨遷擢以其用事於偽齊故也辛卯尚書考功員外郎潘良貴守左司員外郎壬辰詔自今春試選人及京官初出官人銓試如故事後不果試明年正月丙申依例免試明年秋乃克行之是月賜陳東家錢五十萬詔以冬寒命有司賑給行在紹興府居民不能自存者其後移臨安亦如此例是嵗宗室善淵賜名者二人初命户部降本下江浙湖南和糴米以助軍儲十八年閏八月可參考靜海軍節度觀察處置等使開府儀同三司檢校太師守司空同中書門下平章事安南都護上柱國南平王李乾德薨子陽煥立乾德在位四十五年建炎以來繫年要録卷五十
