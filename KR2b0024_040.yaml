body:
  text: 建炎以来繫年要録巻四十宋李心傳撰建炎四年十有二月己巳朔輔臣進呈張浚與吕頥浩書報将自蒲解進兵曲折初頥浩在相府遺浚書言近日臺諌尚循舊態論事不切時務浚報之曰臺諌箴規人主闕失糾彈朝廷官邪當優容之但使主上曉其意足矣范宗尹言浚此論甚善上稱美久之庚午拱衛大夫相州防禦使張用等言所部四十萬人乞不分擘他䖏願聽李允文節制詔髙衛率用等解圍江州如䏻解圍其張用當除正任觀察使時衛已為允文所却而朝廷未知也朝奉郎添差通判福州宇文師瑗提舉福建路市舶師瑗虛中子特録之詔自今立春日賜百官春幡勝權免俟邉事寜息如舊交趾郡王李乾徳請入貢詔却之辛未尚書屯田員外郎黄龜年行監察御史龜年永福人也臺部題名並在紹興元年正月恐誤詔度支員外郎韓球速往饒州所過州縣錢糧盡數剗刷别項樁管應沿江綱船不以空重並令赴饒州岸下擺泊先是李回富直柔共議移蹕饒信間以討李成乃遣球往饒信州樁積錢糧凡江湖川廣所輸上供悉儲二郡中書舍人胡交修曰郡盗猖獗天子自将勝之不武不勝貽天下笑此将帥之責何足以辱王師中書舍人洪擬亦言捨四通五逹之郡而趨偏方下邑道里僻逺非所以示恢復形勢卑陋不足以堅守禦水道壅隔非漕輓之便輕棄二浙失煮海之利力上䟽争之球璜弟也時上自海道還内批取金以百計絹以千計銀錢以萬計人言籍籍以為費交修曰予以馭其富人主之柄也即有賜苐詔有司奉行毋示人以私上欣納熊克小厯以擬為起居郎按日厯擬今年八月除中書舎人克誤也直秘閣知江州姚舜眀陞直龍圖閣武功大夫江州兵馬鈐轄劉紹先領忠州刺史録守城之勞也時舜眀所募迪功郎黄武免解進士張定之持䗶書至行在詔武改初等京秩而定之為迪功郎是日金左副元帥宗維命諸路州縣同以是日大索南人及拘之扵路至癸酉罷籍客户拘之入宫至次年春盡以鐵索鎖之雲中扵耳上刺官字以誌之散養民間既而立價賣之餘者驅之達靼夏國以易馬亦有賣扵䝉國室韋髙麗之域者時金既立劉豫復以舊河為界宗維恐兩河䧟没士庶非本土之人逃歸豫地故有是舉小民出不意父子夫婦盡城星散哀號滿道井縊者甚衆夀州初得客户六十八而誤報六百八人宗維不容訴扵是州官驅窮民孤旅四百五十人以充數至則一例賣之莫䏻辨也先是中原士大夫為宗維所掠聚之雲中至者無以自活往往乞食扵路宗維見之畏其衆也驅三千餘人坑之城外熊克小厯云樂夀縣初得客户六十八人盖據張滙莭要所書按去年秋金已陞樂夀縣為夀州今改定修入壬申大理少卿張誼行殿中侍御史御筆令孔彦舟移兵援江州賜彦舟戰袍金束帶銀槍細甲時起復尚書考功貟外郎宣撫䖏置使司主管機宜文字傅雱在彦舟軍中因為之用乃亦進雱二官為朝散大夫癸酉浙西安撫大使劉光世乞暫赴行在奏事詔鎮江係控扼要害之地方敵人對境所頼措置防守所乞難議施行丙子以越州為趙立醮祭作佛事特輟視朝一日閤門宣贊舎人建康府路安撫大使司統制軍馬韓世清為池州兵馬鈐轄戊寅宣撫䖏置使司参議官王以寜自長沙遣人獻馬四匹又以一馬遺内侍馮益益并其書上之上諭輔臣曰此豈士大夫所宜為范宗尹請以所進還之李回曰以寜以此窺朝廷亦淺矣張守曰以寜以此圖官職爾上曰朕即位以来未嘗以貢獻進人官職俟其来當還之己夘詔户部進錢萬緡奉隆祐皇太后生辰時上以太后誕日置酒宫中従容語及前朝事后曰吾老矣幸相聚扵此他時身後吾復何患然有一事當為官家言之吾逮事宣仁聖烈皇后求之古今母后之賢未見其比因姦臣快其私憤肆加誣謗有玷盛徳建炎初雖嘗下詔辨眀而史録所載未經刪定豈足傳信後世吾意在天之靈不無望扵官家也上聞之惕然其後更修神宗哲宗兩朝實録盖張本扵此此以哲宗實録萹末朱勝非所記上語修入但不知在何年謹按昭慈聖獻皇后以建炎元年至南京二年在維揚三年在䖍四年在越而后以紹興元年四月升遐史臣所記言語有云建炎初雖嘗下詔辨眀則必非元年二年事故知為此年不疑今因進奉遂書之當求他書附生辰本日辛巳尚書兵部侍郎兼權直學士院汪藻為翰林學士徽猷閣待制林遹復為中書舎人熊克小厯汪藻除學士在眀年五月盖因本院題名誤也今従日厯朝奉郎朱宗守大理少卿宗始以偽黨斥至是范宗尹薦用之承奉郎新知常州劉寜止改知衢州詔崔増聴吕頥浩莭制頥浩請之也三省言訪聞江西州縣往往廹扵軍衆應副馬進錢糧詔禁止違者當職官重行竄責癸未朝散郎通判夀春府王攄知夀春府従政郎淮南西路安撫司主管機宜文字王大莭為宣議郎通判府事初金将周企既去攄執守臣閤門宣贊舎人馬識逺械繫之且上閭勍死事于朝故有是命攄因為惡言動衆亡頼少年相與取識逺殺之日厯夀春府奏見禁叛逆守臣馬識逺而無行遣指揮此以洪邁夷堅志所書修入詔監司守倅並以三年為任甲申翊衛大夫福州觀察使辛道宗為樞宻副都承旨先是承旨司闕官范宗尹擬用保静軍承宣使提舉江州太平觀邢煥起復右武大夫榮州防禦使同管客省四方館閤門公事藍公佐與道宗凡三人除目上上曰朕不欲以戚里任朝廷官道宗亦可但不甚知兵乃用道宗而罷煥命下給事中陳戬不書録黄道宗聞之使所親語戬曰富季申以阿附故有今日公第行之必有以報此據沈與求劾富直柔状修入戬即上奏言右府主兵之地所以號令諸将今道宗之兄企宗總禁旅之屯以事征討扵外其弟永宗總神武之衆以制中軍扵内而使道宗出入機庭親承宻旨豈無妨嫌上不従遂命尚書右司貟外郎趙子畫兼權給事中書讀行下命子畫在是月壬辰今併書之熊克小厯云道宗時為後軍都統制按此時神武後軍統制乃陳思恭為之而辛永宗為神武中軍統制克恐誤直秘閣知越州陳汝錫以軄事修舉陞直顯謨閣汝錫此除季陵白雲集有制詞按此時後省乃席益胡交修洪擬三人陵方罷版曺奉祠家居不知何以當此制也乙酉詔臨江軍津遣宣教郎范燾赴行在燾已見去年九月燾嘗權寜逺軍節度使孟忠厚従衛提舉事務所属官以事擾州縣為忠厚所斥及還忠厚言燾攝任日淺乞不推賞燾憾之乃上䟽訟忠厚與太母共養淵聖皇帝之子藏之別室上諭輔臣曰朕事隆祐皇太后子母之間更無疑間燾誣謗太后安得有此可送御史臺治其罪范宗尹曰陛下若坦然不疑不若便行遣上曰所以送獄者欲天下知其誣謗太后得罪非以言罪人也既恐追逮煩擾可送一州編管上又曰英宗慈聖及哲廟宣仁皆以人離間故使疑謗上累兩朝朕不得不懲乃有是命眀年三月丁酉行遣丙戌同知樞宻院事李回進呈諸路盗賊數上謂回卿意如何回曰臣意欲治數渠魁當少戢上曰卿意甚善皆吾赤子豈可一一殺之苐治李成輩三兩人可矣范宗尹曰俟更數日江北探報稍定便降車駕幸饒信指揮先遣韓世忠往盗賊自須聴命李回曰臣所以屢告陛下移蹕者盖天威所臨羣冦自然銷服富直柔曰兵家貴先聲亦須早降指揮回曰周虎臣乞降黄榜招撫臣謂吕頥浩方失利今若便降招撫榜去政恐賊笑爾上曰招撫須以大兵臨之守曰誠如聖諭所以就招撫者以我䏻制其死命故也時遣太常博士周虎臣往頥浩軍前計事而虎臣乞招撫故執政及之庚寅上與輔臣議改元范宗尹曰将来郊禮又須降赦今徳音乞用第二等上曰将来郊禮除諸軍賞給及官貟奏薦不可不與其餘當一切従權減省参知政事張守曰仁宗時祫享禮恐将来可遵用降徽猷閣待制知婺州沈晦為集英殿修撰提舉臨安府洞霄宫以言者論晦妄用便宜指揮行事也辛夘劉光世奏諜報敵不渡江上謂大臣曰朕當修人事以荅天意范宗尹曰聖訓及此天下幸甚乙未神武右軍都統制張俊為江南路招討使進解江州之圍且平羣盗事急速者許便宜時李成乗金人殘亂之餘據江淮六七州連兵數萬有席巻東南之意使其徒多為文書符䜟幻惑中外朝廷患之至是聞金不渡江上乃止饒信之行范宗尹因請遣大将討成故有是命仍令前軍統制王􅊛後軍統制陳思恭通泰鎮撫使岳飛皆属俊詔招討使位宣撫使下制置使之上著為令丁酉朝散郎措置福建兵民寨柵謝嚮言范汝為已就招先是神武副軍都統制辛企宗駐邵武軍距賊洞二百餘里時遣兵攻賊為所敗有従事郎施逵者邵武人上舎髙第自潁昌府府學教授代還以䇿干企宗反為賊㳺説而本路監司亦以招安為便乃募國學内舎生葉昭積往招之至是授汝為武翼郎閤門祇候充民兵都統領其徒葉鐵最驍健亦以為忠翊郎更名徹昭積補下州文學而逵還承直郎時汝為慕得官且懼大軍繼至故聽命然未肯散其徒企宗駐軍邵武軍不䏻制㷱克小厯扵此書就命謝嚮為民兵寨柵官按嚮措置福建兵民寨柵日厯已扵十月二十一日書之克盖誤也克又稱辛企宗為福建制置使亦誤企宗除制置在眀年二月己夘是月夏人攻西安州平羌寨㧞之翰林學士汪藻言古者兩敵相持所貴者機㑹此勝負存亡之分也金師既退國家非暫都金陵不可而都金陵非盡得淮南不可淮南之地金人决不䏻守若為劉豫經營不過留簽軍數萬人而已盖可驅而去也淮南洊經兵禍民去本業十室而九其不耕之田千里相望流移之人非朝夕可還國家欲保淮南勢須屯田則此田皆可耕墾臣愚以為正二月間可便遣劉光世或吕頥浩率所招安人馬過江營建寨柵使之分地而耕既固行在藩籬且清東西羣盗此萬世一時也䟽奏未克行中興後言屯田者盖自此始藻䟽不得其時今㕘酌附此月未是嵗行在大軍月費見錢五十餘萬緡銀帛芻粟在外而諸路養兵之費不與焉此以紹興元年正月徳音修入宗室不縦等賜名者八人宣撫䖏置使張浚命四川民户嵗輸激賞絹三十三萬匹有竒俟邉事寜息即罷四川田稅大約凡三百錢令民輸一匹絹而成都彭漢卭蜀永康六郡自天聖間官以三百錢市民間布一匹民甚便之其後不復予錢而但取其布民始以為病至是宣撫司嵗截陕西河東北三路絹綱三十萬匹令民輸其直以贍軍西川匹為十一千東川匹為十千嵗凡三百萬緡有竒謂之絹估又截布綱七十餘萬匹匹取其直三千嵗凡二百萬緡有竒謂之布估云按絹估錢自慶元初累減至二百餘萬布估錢減至一百二十七萬緡激賞事紹興十六年十二月戊戌絹估事紹興二十五年七月丙辰可𠫭考自浚入蜀盡起諸路常平坊場錢以贍軍次科激賞絹布次則盡起常平司積年本息和糴等米次則對糴稅户米對糴者謂如甲家嵗輸米百斛則又對糴百斛以備軍儲蜀民始困矣此以劉長源奏議附見當求縂領所案牘各繫本月日紅巾賊屢犯均州知武當縣奉議郎王㬇率邑人保山寨賊軍大至或勸之使遁㬇曰使吾有此心則不䏻與邑人為此来矣遂與一家俱死後録其家一人此據張鈞續忠義録鈞以為建炎末事故附扵此但又以為金人大軍捜山則非也此時均州諸盗乃李忠之徒金人未嘗至今刪改令不牴牾偽齊劉豫立陳東歐陽澈廟于歸徳府封東為安義侯澈為全節侯取張巡許逺廟制立為雙廟以祠之此以方疇封事及遺史参修疇以紹興元年五月上書豫以今年僣立故参酌附此末時國信副使宋汝為自京師至東平見豫持頥浩書與之勉以忠義開陳禍福使歸朝廷豫悚而立曰使人使豫自新南歸人誰直我獨不見張邦昌之事乎業已至此夫復何言即拘汝為不遣既而以汝為本儒士乃授通直郎同知曺州時豫又依金國法鄉各為寨擇土豪為寨将兩丁籍一為出戰軍以糧器甲自備民有醉酒罵豫云汝何人敢為天子豫斬之滄州進士邢希載上言有大利害乞見豫召入希載請遣使宻通江南豫榜于市云上國聞知與生靈為害非細斬其首以令初徽猷閣待制洪皓與右武大夫龔璹持命至太原金令其陽曲縣主簿張維館伴留㡬嵗金遇使人禮益削是嵗始遣皓璹至雲中時通問使朝奉郎王倫閤門宣贊舎人朱弁已被拘倫皓因以金遺商人陳忠令宻告兩宫以本朝遣倫等来通問扵是二帝始知建炎中興之實已而左副元帥宗維召皓䓁遣官偽齊皓力辭不可宗維怒命壮士擁以下執劔夹承之皓不為動傍貴人唶曰此忠臣也止劔士以目為跽請宗維怒少霽遂流逓于冷山與假吏沈珍𨽻卒邱徳党超張福柯辛俱流逓猶中國編竄也雲中至冷山行兩月程距金國二百餘里地苦寒四月草始生八月而雪土廬不滿百皆右監軍希尹聚落希尹使誨其八子或二年不給衣食盛夏至衣觕布畨課四𨽻採薪他山嘗久雪薪盡至乞馬矢煨麫而食㷱克小厯附此事扵三年末恐誤今従皓行述瀘州騎射卒張仙謀殺安撫使蘓覺以叛舉火焚倉庫不克伏誅先是戍卒王全等十數人糾合為亂乗郡官端午泛江乃舉兵前一夕夜漏四鼓大雨及眀罷出郊姦謀沮䘮遂就擒騎射盖元祐末所置其額才四百人全盖宣和末京師所遣禁兵號東土軍者是也此據江陽志修入志稱不利扵帥臣蘓覺而以為建炎四年事按覺今年十二月到官故附此年末建炎以來繫年要録巻四十
