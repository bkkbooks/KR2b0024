body:
  text: 建炎以來繫年要録巻四十九宋李心傳撰紹興元年十有一月甲午朔尚書祠部員外郎鄭士彦罷初士彦奉太廟景靈宫神御在温州而主管内侍許佃等三人與之不相能頗為所擾上聞之黜内侍而徙士彦命大臣選郎官有風力者代之乃以都官員外郎向宗厚為祠部郎官兼權太常少卿知温州充景靈宫太廟提㸃武功大夫忠州防禦使岑筌為内侍省押班主管迎奉仍詔筌凡事并申提㸃所毋得行移文字宗厚敏中曾孫也兵部尚書兼侍讀胡直孺卒特贈端明殿學士官給𦵏事承務郎任申先通判秀州申先辭召命特録之乙未右文殿修撰提舉臨安府洞霄宫胡安國試中書舍人兼侍講秦檜薦之也直秘閣知宣州李彦卿為尚書刑部郎中詔泉州布衣朱冲召赴都堂審察是日江東安撫大使葉夢得始至建康時建康荒殘見兵不滿三千人諸将散居它郡夢得至乃奏統制官韓世清一軍自宣州移屯建康遣水軍統制官崔増屯采石及統制官閻臯分守要害夢得行述云巨師古閻臯分守要害按師古今年十月已除後軍統制行述恐誤而世清尚未至也先是王才據横澗山降劉豫遂引偽知宿州胡斌以兵入寇詔淮南宣撫使劉光世遣兵招捕夢得使統制官張俊自青陽間道㑹之吕頥浩欲招才乃命才以所部赴行在於是夢得遣使臣張偉諭才如詔㫖才遂率其将丁順等三千餘人渡江才懼罪請留建康頥浩議以淮西一郡授才使統其兵之任夢得以為不可乃詔才自武顯郎閤門宣賛舍人特遷武翼大夫充建康府兵馬鈐轄汰遣其衆得正兵千餘人分𨽻諸軍按史今年九月丁酉詔劉光世遣兵捕才丁未詔才赴行在甲辰光世奏止小張俊出兵辛亥又奏才犯濠州十二月一日夢得奏才已謝恩詔相度與淮南一郡甲申才轉官除建康鈐轄丙戌坐夢得奏才不可往淮西首尾葢百餘日今牽聨書之丙申翰林學士翟汝文兼侍讀吏部侍郎李光兼權侍讀遣内侍髙傑任鎮持詔書撫問孔彦舟桑仲且以銀合茶藥戰袍戎器金東帶賜之丁酉神武中軍統制辛永宗權主管侍衛馬軍司公事神武後軍統制巨師古權中軍統制初上召吕頥浩復相而永宗與同知樞密院事富直柔右司諫韓璜見上多言頥浩之短侍御史沈與求奏其交結上将黜永宗故有是命趙甡之遺史云與求再章言永宗之罪其章不行而有是除非也其實上将罪永宗先解其兵權耳賜宇文虛中家錢千緡以其奉使日久守節不屈也日歴紹興元年十二月一日甲子樞宻院奏據探報金國昨差宇文虚中往河北冊立劉豫虛中請國相并監軍郎君茶酒虛中道若冊立劉豫與黄河外陜西五路放過二主歸國我只佐得一主國相監軍不語尋差太原張孝純冊立劉豫了當勘㑹已降指揮宇文虚中奉使守節不屈令福州賜錢一千貫與虛中男師瑗今據探報忠節可嘉有㫖令福州更切存恤虚中家屬承事郎王趯充廣西經畧幹辦公事専切提舉左右江峒丁及收買戰馬自五路既䧟馬極難得議者謂嶺外於西南夷接境有馬可市而大理特磨諸國所産尤多時已罷買司事見建炎四年八月以帥屬領其事工部侍郎韓肖胄言戰以騎兵為勝今川陜馬綱不通而廣右鄰諸番宜即邕州置官收市専責成功故復置官提舉二年五月癸巳所書可参考戊戌詔以㑹稽漕運不繼移蹕臨安命兩浙轉運副使徐康國兼權臨安府與内侍楊公弼先營公室既而康國奏為屋百楹以充大内公弼請増之上不許遣公弼在辛丑公弼請増屋在乙巳先是尚書左僕射吕頥浩言今國歩多艱中原隔絶江淮之地尚有巨賊駐蹕之地最為急務伏惟陛下發中興之誠心行中興之實事要當先定駐蹕之地使號令易通於川陜将兵順流而可下漕運不至於艱阻然後速發大兵一軍從江西湖南以平羣冦一軍往池州至建康府處置已就招安尚懐反側之人於明年二三月間使民得務耕桑則在我之根本立矣然後乗大暑之際遣精鋭之兵與劉光世渡淮犄角而北去由淮陽軍沂州入密州以揺青鄆命張浚躬親統兵由河中府入絳州以撼河東乗兩路餘民心懐我宋未泯之時知王師有收復中原之意則中興之業可覬也若不速為之逡廵過春夏則金人它日再來不惟大江之南我之根本不可立而日後之患不可勝言矣臣嘗觀自古有為之君将以取天下者弗躬弗親則不能戡禍亂定海内伏望考漢髙祖以馬上治之之蹟法唐太宗櫛風沐雨之事以速圖之不可緩也三四年來金人纔退士大夫及獻言之人便以謂太平無事致機㑹可乗之便往往沮抑不得行今天下之勢可謂危矣既失中原止存江浙閩廣數路而已其間亦多曾經殘破浙西郡縣往往已遭焚劫浙東一路在今形勢漕運皆非所便若不移蹕於上流州軍保全此數路及漸近川陜使國家命令易通於四方則民失耕業號令阻絶俄頃之間已至秋冬金人復來則雖欲追悔無及矣至是遂定移蹕之議頥浩奏不得月日行状係之再相時而奏有云浙東形勢漕運非便則是未移蹕臨安以前也參知政事孟庾為福建江西荆湖宣撫使神武左軍都統制韓世忠副之時朝廷猶未知范汝為據建州而論者皆言神武副軍都統制福建制置使辛企宗懦怯玩寇福建安撫使程邁等請改命将帥章四十三上故更遣世忠自台州進仍命世忠械招撫官朝散大夫謝嚮承直郎葉棠赴行在械二人之㫖在此月庚子己亥宣教郎婁寅亮守監察御史以其言宗社大計也寅亮初見六月辛巳帶御器械權主管侍衛馬軍司公事辛永宗罷為江南西路兵馬副總管坐與幹辦官李秉文盗請諸軍劵錢為御史沈與求所論故秉文堂吏李瑗子也遂以龍神衞四廂都指揮使忠州防禦使邉順兼權主管馬軍司公事而黜秉文為逺小監當湖西安撫使程昌㝢以便宜印造販茶短引以給軍食吕頥浩聞其事命金部止之承務郎敕令所刪定官陳康伯通判衢州康伯弋陽人也辛丑詔孟庾韓世忠應官吏軍兵一切事務共為一司不得輙分彼此自范汝為外餘皆與免罪許令歸業庾請徽猷閣待制李皓屯田貟外郎李易並為參謀官朝奉大夫陳杌直秘閣張鋭並為轉運使直秘閣李健等十人幹辦公事朝散大夫新通判岳州趙康直等十人准備差遣皓不就庾又請賜空名敕吿以備賞軍尚書省勘㑹庾係見任執政所行文字與朝廷一同其立功将佐合行推恩之人自當一面施行訖奏從之自劉豫之僣位也朝廷以金故至以大齊名之至是襄陽鎮撫使桑仲始上疏請正豫惡逆之罪下詔進幸荆南庻幾中原人心不致揺動詔答以荆南形勢固可駐蹕但以糧運未通已令參知政事孟庾計置俟就緒進發太常少卿趙子畫請續編紹興太常因革禮明年乃成凡八十六篇為二十七巻淳熈十二年三月庚子又進中興禮書子畫又言每歲春分日祀髙禖自廵幸不行雖多故之時禮文難徧至於祓無子祝多男以係四方萬里之心葢不可闕望自來嵗舉行從之壬寅起居舍人廖剛以招降閩盗余勝之勞進秩一等時制置使辛企宗與剛有隙㑹士人廖廷實為勝所擄企宗奏廷實乃剛之姪為賊參議剛愬于朝十一月庚子事既明剛卒辭不拜甲辰詔從義郎單徳忠忠節顯著特先進秩二等詔以鎮江府常州江隂軍苖米三十七萬斛為劉光世軍中一嵗之用仍令漕臣分月給之乙巳右司諫韓璜責監潯州商稅用侍御史沈與求奏也先是與求言同知樞宻院事富直柔附㑹辛道宗永宗兄弟為致身之資昨者直柔任御史中丞永宗攜女妓宴飲其家物論騰沸暨陛下擢登樞府而道宗兄弟倡言于朝自謂直柔之用我嘗有力已而道宗果為樞密院副都承㫖是時給事中陳戬議駮除命之際道宗使所親諭戬曰直柔以附我故有今日公第行之必有以報㑹陛下批降道宗怙寵賣恩亟罷承㫖之命天下稱快比又除道宗防遏及總管差遣往來温台明三州之間剏置此闕以便其私葢直柔請也外人皆云宫禁語言道宗永宗往往傳漏陛下意嚮無不知之必以語直柔而直柔又以語司諫韓璜凡璜所言逆知事端巧發微中者直柔道之也頼陛下英斷逐道宗永宗于外伏望併黜直柔及璜以為臣子隂慝私邪之大戒時吕頥浩秦檜皆忌直柔繇是二人卒俱罷詔發運使置司饒州廸功郎陳剛中上書論今民力凋瘵國用匱乏而冗食之官衆不急之務繁行在之局務可省併者三分居一而州縣冗食尤可怪駭以月計之不知所費緡錢幾何萬民之脂膏日以乾涸邦之財賦日以蠧耗奈之何民不窮且盗也願罷冗食去虛文以足邦用上詔對改合入官所陳令三省措置剛中改官在十一月壬子言者論浙西科斂之害以為均買度牒勸諭吿官下户貧民俱已困乏不支糴錢强令輸粟號曰均糴又别立一名曰借糴當此艱食方時大旱而官吏於常賦均糴之外復計頃畆以月科敷既均度牒矣又敷修城木木未及輸復敷麻皮又敷牛皮羊皮又敷糯米則農末之病殆不聊生将鬻田而償則孰肯受者将棄之而遁則質其妻孥錮其婢僕其它郡邑大抵類是上下相䝉名曰健吏暴虐若此民其無所措手足矣若此等事雖非陛下之意然所以科敷者必以朝廷為名是利歸於貪吏而怨歸於陛下矣若今盗賊幾半天下豈天下之人皆跖之徒哉實三吴失業之良民不聊生之赤子也陛下試遣有司執一人而問之曰若何為盗其必有説也願詔重科敷之罪嚴貪墨之法指天誓日示以必行庻幾人心未叛天命未改疏入詔本路漕司究實聞奏通直郎知瓊州虞沇言近嵗州縣之吏多賄敗者望自今命官犯入己贓許人越訴其監司不即按治者重行黜責從之沇錢塘人也是日磔武義大夫閤門宣賛舍人張琪于越州市丙午起復寶文閣直學士權邦彦試户部尚書吕頥浩薦之也丁未徳安府復州漢陽軍鎮撫使陳規奏本鎮營屯田畫一事件自中原失守諸重鎮多失惟規與羣盗屢戰自楊進李孝忠孔彦威董平曹成馬友桑仲李横之徒皆不能犯由是徳安獨存牢城卒方夀等嘗謀亂規方㑹食有吿變者規捕而詰之問從謀者幾夀曰一城之軍公之左右皆是今夕舉事矣規命誅夀餘不問一府皆服時羣盗稍息規以境内多官田荒田乃倣古屯田之制命射士民兵分地耕墾其說以兵民不可並耕故使各處一方軍士所屯之田皆相其險隘立為保寨冦至則保聚捍禦無事則乗時田作其射士皆分半以耕屯田少増錢糧官給牛種收其租利有急則權罷之使從軍凡民户所營之田水田畆賦粳米一㪷陸田賦麥豆各伍升滿二年無欠輸給為永業流民自歸者以田還之凡屯田事營田司兼行營田事府縣官兼行皆不更置官吏條畫既具乃聞于朝詔嘉奨明年下其法於鎮使行之朝散郎知邵武軍吴必明以失守待罪詔降一官衝替令赴宣撫司軍前自效承議郎知公安縣孫倚以營田辦集遷二官用荆南歸峽荆門公安軍鎮撫使解潛奏也己酉詔福建制置使辛企宗聽宣撫司節制庚戌中大夫同知樞密院事富直柔守本官提舉臨安府洞霄宫侍御史沈與求既劾直柔罪詔下其章直柔乃求去遂有是命承務郎鄧肅主管江州太平觀從所請也福建江西湖南宣撫使孟庾辭行庾請樞密院計議官張致逺主管機宜文字致逺沙縣人先是謁吿歸閩中還言賊勢方盛乞遣重兵致討故庾辟之承議郎知鉛山縣姚舜恭言建賊范汝為等乍臣乍叛首尾二年中間謝嚮葉棠施逵等三人皆以招安為職反為賊計俾其固守巢穴辛企宗提兵本路經今及年而企宗初不識汝為之面昨企宗全軍自南劍退往福州止留李山一軍守禦邵武近汝為據建州破邵武軍李山已來信州駐劄萬一賊兵果破福州則全閩皆賊有矣契勘江南兩浙係與福建鄰境本縣正與崇安光澤連接雖申信州遣發廵尉召募土豪分布把截然不諳戰敵深慮不能捍禦伏望朝廷速賜分遣大兵専委近上将帥從浦城崇安等處分路致討詔以付宣撫司右武大夫宣州觀察使閻臯進秩二等録饒州掩殺張琪之功也将士受賞者四千四百八十有二人於是武功大夫威州防禦使閤門宣賛舍人張俊以不策應特貶一秩是日荆湖廣西宣撫使吴敏始受命置司栁州敏奏臣以十一月十七日恭受除命置司治事庚戌十一日也時降授右武大夫和州防禦使馬擴避地融州之仙溪敏即起擴為本司都統制兼參議直秘閣范直方為􅄁謀直方純仁孫也擴之在仙溪也宣撫處置使張浚以貲幣招之且貽書曰上之待公不輕雖縁讒毁終必保全公荷上恩如此可不圖報乎擴以參賛軍事劉子羽在真定有隙不復往以書謝之至是始為敏用辛亥陞康州為徳慶府尚書右司郎中方孟卿行右司諫閤門宣賛舍人主管宿衛親兵李永志降一官落閤職令吏部與逺小監當差遣永志吴湛部曲也辛永宗用為中軍提舉事務侍御史沈與求論其同為姦利使軍情不安故黜之除名勒停人盧宗原叙承議郎宗原宣和末以徽猷閣待制為江淮發運副使坐與朱勔交通送肇慶府編管至是始復之宗原已見建炎元年正月辛夘壬子手詔内外侍從各舉所知三人限五日以聞舉得其人當受上賞毋以先得罪于朝廷及蔡京王黼門人為嫌先是上得陳襄薦司馬光等三十三人奏章大善之故有是詔禮部侍郎李正民以為光等皆不合時宜者由是上薄之中興聖政臣留正等曰臣誦周詩而知安天下之本觀孔子之言而得廣求人材之要文王之詩曰濟濟多士文王以寧武王之詩曰無競維人四方其訓之成王之詩曰佛時仔肩示我顯徳行葢得賢則能為邦家立太平之基故成周治效致兵寝刑措而國祚過八百年之永者本於此三詩而已孔子曰舉爾所知爾所不知人其舍諸自昔論求材者多矣語簡而曲盡其要無過此一言者今太上皇帝詔曰方仰瞻雪恥不有多士寘之周行則不能也此葢深得文武成王為治之本詔又曰已雖賢不若薦賢之為愈因舉陳㐮薦司馬光等三十三人疏章宣示羣臣使之各舉所知則與孔子之言若合符契於是聚精㑹神相與協成三十六年中興之治葢本於此詔而已嗚呼大哉翰林學士兼侍讀翟汝文為學士承㫖新除吏部尚書盧法原依前徽猷閣直學士提舉臨安府洞霄宫法原自成都召還道梗不能赴從所請也熊克小歴建炎四年五月法原除吏部尚書不及供職改知䕫州誤也法原明年十二月始以張浚奏就差知䕫州此時韓廸為䕫帥克不詳考耳詔天章閣祖宗神御二十四位權於臨安府院奉安朔望節序酌獻共饗一分而已此據㑹要増入三年二月己亥復舊癸丑秘書省校書郎林待聘守尚書司封貟外郎待聘嘗言原廟之在郡國有漢故事而太廟神主禮宜在都今新邑未奠宜考古師行載主之義還之行闕以彰聖孝閤門宣賛舍人韓世良為神武中軍右部統領官兼主管宿衛親兵世良初見今年十月壬申中奉大夫張純提轄𣙜貨務都茶場純省吏也吕頥浩更張鹽法故引魏伯芻舊例而命之朝奉郎知南劍州張觷為福建路轉運判官觷未行㑹范汝為之将忠翊郎葉徹引衆來犯時武徳郎制置司統制官任士安駐軍城西不力戰觷獨率州兵拒敵徹中流矢死觷知士安方懼無功即函徹首與之州兵皆憤觷曰賊必再至非與大軍合力不能破也未幾徹二子引衆聲言復父讎縞素來攻於是士安與州兵偕戰大敗之汝為稍挫觷侯官人士安本范瓊部曲有衆數千瓊誅改𨽻御營司辛企宗因以為将乙夘紹興府奏百姓路榮失火罪状上曰此災不細恐是天戒不専為榮罪止杖遣足矣丙辰侍御史沈與求論起復福建等路宣撫司随軍轉運副使陳杌貪汚剥尅不可用詔孟庾韓世忠别辟能臣代之吕頥浩秦檜因言與求前論宗尹近擊直柔頗為稱職上曰論宗尹固當然在今日能破直柔黨與尤非小補尚書禮部侍郎李正民罷為徽猷閣待制知吉州詔武功大夫榮州團練使曹成以所部赴行在命張浚遣使持詔書往攸縣就賜之時朝奉大夫提舉江西茶鹽公事侯慤言成今據衡山上流控扼要害毒流三千里莫之誰何馬友見與李宏潰卒合為一軍雖駐兵在潭然素畏曹成昔成在鄂友自漢陽移軍潭衡以避之其忌成可知矣臣料賊意若成由衡山順流而下友必棄潭而東入江西蓋前有孔彦舟之隙後逼曹成西拒劉忠萬一勢窮力盡則必歸曹成而攻江西矣聞友近招人買馬打造兵器度其狡獪之心觀望向背止在今春朝廷若不早作措置則江西諸郡恐非朝廷有江西失則二廣危矣詔付宣撫司慤潭州人也慤奏下在庚申今併書之丁巳日南至命資政殿大學士提舉萬夀觀兼侍讀王綯祀昊天上帝于吿成觀初復舊禮也己未命吏部侍郎兼權侍讀李光往臨安府節制本府内外見屯諸軍及兼權户部侍郎總領臨安府應干錢糧卸納綱運及修繕移蹕事務詔武經大夫東南第十副将辛璋處斬先是福建安撫使程邁遣璋以所部屯古田縣璋逗遛不行邁奏免之璋集麾下持兵見邁請留既而亡去邁言於朝有司迹璋于海鹽縣捕誅之辛酉詔諭福建州縣以彌盗罷兵與民休息之意承奉郎樞密院編修官楊愿從事郎李誼並充樞宻院計議官誼初見建炎二年九月遣大理少卿錢稔往浙西路催促見楚公事稔請因便密行體訪民間利病許之偽齊秦鳳經略使郭振以數千騎掠白石鎮武節大夫閤門宣賛舍人宣撫司選鋒将王彦與熈河統制官關師古併兵禦之賊兵大敗振為官軍所獲遂復秦州張浚承制以彦為康州刺史彦上黨人也明年九月丁丑奏至壬戌監察御史劉一止言伏見尚書六曹下逮百司凡所用法令初無畫一之論類以人吏省記便為予奪葢法令具在姦吏猶得舞之今乃一切聽其省記顧欺弊何所不有欲與則呈與例欲奪則呈奪例或與或奪在其牙頰其患可勝言哉陛下聖明灼見此弊嘗降處分令左右司郎官以其省記之文刋定頒行然左右司職事號為最繁竊恐於此不能専一無由速成伏望改差詳定一司敕令所立限刋定鏤板頒降内吏部條法最為急務乞責近限先次施行庻幾杜絶姦吏弄法受賕之弊詔如其請吏部法限一月餘限一季成書既而廣東轉運司以元祐吏部法來上乃命參以七司所省記元豐至紹興條例參酌修立再踰年而後成云是日曹成犯安仁縣執湖東安撫使向子諲初成既屯攸縣而子諲兵不滿萬駐司于衡之安仁遣使招成成亦聽命子諲乃檄成權本司都統制而命諸将韓京以一軍西守衡陽吴錫以一軍南定宜章賊徒逡廵不敢南向者百有餘日上江諸郡遂得以穫既而援兵不至成忿子諲扼已即擁衆而南子諲遣從事郎權安撫司幹辦公事何彦猷廸功郎随軍錢糧官張節夫見成計事遇于途二人皆遁去子諲率親兵與成相拒自午至申官軍悉潰子諲度不可遏單騎入成軍諭以國家威靈成不服遂掠安仁縣進攻道州執子諲寘軍中而去節夫安陽人也金房鎮撫使王彦斬中軍統制官趙横統領官門璋彦既敗李忠凱歌而歸大賞将士待横如初終不言豐里之敗横亦不疑至是忽㑹諸将于毬場酒四行叱横使起數其豐里不策應之罪併璋斬之復飲數行而歸建炎以來繫年要録巻四十九
