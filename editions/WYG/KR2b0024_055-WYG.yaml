body:
  text: 建炎以來繋年要録巻五十五宋李心傳撰紹興二年六月庚寅朔武功大夫貴州團練使新知復州李宏引兵入潭州執湖東招撫使馬友殺之時韓世忠將至長沙宏遂有殺友之謀是日因其詣天慶觀還襲殺之于市其將王進王俊以所部數千人遁去宏屯潭州宏殺馬友趙甡之遺史在六月朔日今從之日厯六月二十六日福建江西荆湖宣撫使司奏潭州申統制李團練於今月一日統兵入城已將馬友處置去訖不云是何月潭州去臨安遥逺又此時道路不甚通不應二十餘日奏到或者宣撫司軍期奏報行速亦未可知且依遺史附此更求他書詳考辛卯内殿進呈王大智所造軍器上曰車戰可用否古法既廢不復聞用車取勝莫若且令多造强弩起復朝奉大夫提舉江州太平觀向子諲知廣州朝廷恐賊度嶺故就用子諲守之右承議郎呂抗右宣義郎呂摭直秘閣主管萬夀觀仍賜五品服右廸功郎江淮荆浙都督府書寫機宜文字呂挺為右承務郎中興後大臣子以恩澤除職名自此始挺初見建炎三年三月朱勝非閑居録云祖宗舊制宰執子弟例不當除只於銓部注擬罷政不以罪則推恩遷擢蓋二府號表則之地不阿其親當以身率也至蔡京作相不數年子六人孫四人為執政侍從鄭居中劉正夫余深王黼白時中蔡卞鄧洵文洵武之子並以曲恩倖例列於從班至建炎二年中丞王賔論列始鐫職建炎以後子弟得職名者汪伯彦子召嗣直徽猷閣呂頥浩二子抗摭秦檜兄梓並為直秘閣張浚兄滉亦直徽猷閣李綱弟維亦直秘閣倖門復啓盖諸公不為國家計也詔進士陳邊事可采及自河北京東赴行在之人並充樞宻院効士月俸錢十千米一斛其後都督行府亦如之壬辰温州軍事推官呂諒卿贈右宣教郎後官其家一人元符末坐上書入籍故録之諒卿黨籍餘官第七十八人亳州編管六年二月辛亥官異姓親一人癸巳頒黄庭堅所書太宗御製戒石銘於郡縣命長吏刻之庭石置之座右以為晨夕之戒中興聖政臣留正等曰古者盤盂有銘几杖有誡其意盖謂夫不忘乎目則不忘乎心不忘乎心則不忘乎設施措置之間此内外交相養之道而亦其理之必然者也是銘也以虐民欺天為戒其說明甚使人人服而行之敢不悉心於愛民乎惟其蔽而莫之知故棄而莫之恤今斯銘日在其目則必能𨼆惕於其心而見諸行事矣此太宗皇帝製銘之意而太上皇帝復俾刻諸庭石置之座右之深㫖也為守為令者可不念哉初命廣西經畧司即韶州撥内帑錢三十萬緡市戰馬至是經畧司言比嵗不逞之徒多以金銀市馬鬻於羣盗故馬直踴貴望於大觀格逓増二分許之舊格八等馬髙四尺七寸者直四十五千最下髙四尺一寸者直十有三千其餘以是為差於是神武諸軍皆缺馬乃命經畧司以三百騎賜岳飛二百騎賜張俊又選千騎赴行在賜岳飛馬在是日賜張俊馬在癸丑買千匹赴行在在七月癸亥今併書之熊克小厯云取馬嶺表以資軍用自古未有今乃得之按邕州買馬格乃大觀中所定建炎亦屢置官克謂始於紹興非也然蠻馬尤駔駿者在其地㦯博黄金二十兩日行四百里但官價有定數故不能致此等焉此據范成大桂海虞衡志甲午上諭輔臣曰士有從軍該賞者可苐補右選庶清流品三年自有科舉取士豈可開此一路上又曰今歴官不精推歩七曜細行皆不能筭故厯差一日近得紀元厯已令參考自明年當改正權尚書吏部侍郎章誼兼修政局參詳官左承事郎陳槖秘書省校書郎林叔豹並為監察御史槖餘姚人叔豹永嘉人也右從事郎知海鹽縣歐陽興世廬陵人修曾孫也劉光世言其考第舉並已應格乞就任改官許之丙申直徽猷閣權主管浙西安撫大使司公事范正輿言京西路提舉軍馬彭圯牛臯河東路總領軍馬劉全皆願聽劉光世節制詔並進官仍賜敇書奬諭臯已見建炎四年正月其實臯等未嘗來歸蓋諜者吳珣詐為之以要賞也八月二日吳珣泉州編管宣撫處置使張浚至興元檄召吳玠王彦議事二將皆願得參贊軍事劉子羽守興元浚乃承制拜子羽利州路經畧使兼知興元府徙徽猷閣直學士新知成都府王庶知嘉州而徽猷閣直學士新知興元府王似復知成都府是日似至成都先是浚奏似守蜀有勞請加職後二日詔以似為顯謨閣直學士再任庻既被黜乃請奉祠浚以庶不遵行府命令盡奪其職而奏劾之子羽至興元通商輸粟二鎮遂安趙甡之遺史云浚至興元閱視庶平日之所營為毛舉而髪數之簿書之間不謹奉行宣司指揮若干件遂改庶知嘉州蓋庶因與二將有違言而去非忤浚也今不取丁酉朝議大夫折彦質復龍圖閣直學士赴行在彦質可適子靖康初為河東制置使坐喪師逺謫及是復用武顯大夫吉州刺史湖北安撫司統制山東軍馬崔邦弼貶秩二等邦弼自宣之鄂道過績溪其部曲有因擄掠食物而殺人者郡守檄邦弼治其罪邦弼報以不知主名令被害之家赴軍中辨認事聞乃有是命仍令邦弼執犯人送徽州處斷即不獲者重黜之戊戌詔神武副軍都統制岳飛以韓京吳錫吳全之衆戍江州朝廷聞曹成為飛所破乃命孟庾班師李綱徑如潭州而飛以所部之江州屯駐時綱甫自邵武引兵三千之江西也熊克小厯六月甲午書曹成自賀州至郴州李綱遣使臣賫榜招之成與其徒赴司參於是綱奏成已招乃詔成自榮州團練加防禦使日厯綱五月十七日所奏云本司已定六月五日進發徃邵武建昌軍等處就近措置甲午即初六日綱在福州安得有此事也詳克所書曹成已至郴州及遣使臣賫榜說諭乃是江西福建荆湖宣撫使司奏狀中語其實孟庾韓世忠所奏以甲午至行在而克悮以為綱奏耳是時曹成亦未赴宣司成三年五月丁丑始進榮防克誤也武功大夫成州團練使陸漸既從金右都監北行事見建炎四年七月丁亥宗弼以付劉豫命以官漸脫身南歸至鎮江為人所告言者論漸嘗勸金人焚臨安而去停官下大理是日漸坐誅此為五年張孝純上書張本日厯漸欵狀云受偽齊劉豫差使歸家般載而孝純書中所云不同恐當以孝純所云為正詔堂除選人任大理司直評事供職滿二年通理五考有舉主三員並改合入官用吏部請也己亥江東安撫大使李光乞行宮北臨安増剏後殿仍修蓋三省樞宻院百司及營房等許之其後上手詔光苐令具體而微毋困民力輔臣進呈上曰但令如州治足矣若止一殿雖用數萬緡亦未為過必事事相稱則土木之侈傷財害民何所不至上語在乙巳庚子起復寧武軍節度使開府儀同三司浙西安撫大使兼知鎮江府兼淮東宣撫使劉光世起復寧武寧國軍節度使録收淮楚之功也檢校少師武成感徳軍節度使神武左軍都統制福建江西荆湖宣撫副使韓世忠以平閩湘羣盗功遷太尉移屯建康府恩數視執政仍詔世忠以親兵赴行在親衛大夫建州觀察使神武副軍都統制岳飛以破曹成功遷中衛大夫武安軍承宣使辛丑武節大夫榮州團練使知鄧州李横為襄陽府郢州鎮撫使兼知襄陽府武徳郎閤門宣贊舎人知隨州李道為鄧隨州鎮撫使兼知鄧州先是鎮撫使司主管機冝文字譚憲為桑仲訟寃於朝詔以黄榜撫諭諸軍令徳安陳規究實且即軍中求可代仲者會聞新除鎮撫使霍明為横道所破走漢陽乃令江西李囘勾收使喚而以四郡分授二人時横已命别將桑立守鄧州道不敢拜降黄榜在五月壬申令李回勾收霍明在此月庚子今聫書之李道明年正月乙亥改命初横聞眀奔徳安府聚衆數千人以是日圍徳安趙甡之遺史載横以六月圍徳安而無其日按日厯江西安撫大使司申八月十九日徳安圍解十九日己巳也又紹興二年十一月一日徳安鎮撫使陳規狀李横等領兵衆前来攻城計六十五日以日推之其初至合在六月辛丑故附此日規登城以好語諭之且申和好仍送米百斛横受之規請退兵横曰襄陽之兵至矣無可議者遂造天橋為攻具規竭力捍之規行狀云李横衆十萬㓂城下請議事願得米二百斛而去公與之翌日横復来㓂按横之出本為桑仲執讎非求粟也日厯規乞救兵狀横率兵民數千人圍徳安此云十萬人亦非其實行狀又云規出城見横恐規未必出城今從趙甡之遺史壬寅御筆翟汝文罷參知政事時四方上奏未决吏縁為姦汝文語尚書右僕射秦檜宜責都司考其稽違者峻懲之汝文嘗受詞牒書字用印直送省部檜不能平他日因對汝文乞治堂吏受賄者檜面劾汝文擅専汝文言臣位執政按吏而為宰臣所劾無顔居位力求去上意不直汝文右司諫方孟卿因奏汝文不顧大體不循故事批狀直送省部不闗其長每聚議則目視霄漢未嘗交談豈能共濟今日之事蓋防秋在近規為脫去之計上以詔諭留汝文汝文終不釋孟卿章再上遂命出守朱勝非閑居録云秦檜作相力引翟汝文參預纔數月失歡對案相詬秦斥翟曰狂生翟詈秦曰濁氣左右堂吏至今能言之唐相鄭畋盧擕議備禦王仙芝黄巢争論不叶擲硯相擊識者謂唐室衰亂之兆今方圖中興豈當爾耶左朝散大夫周隨亨提㸃湖南刑獄公事還言近者諸路安撫使朝廷皆假以便宜蓋以軍興恐失機㑹然間有招權怙勢侵官越職假便宜之名擅易屬郡守貳移用諸司錢物自作威福無可誰何望行戒約儻有侵紊必罰無赦庶使為帥臣者各循分守職毋敢䟦扈從之詔川陜官員陳乞磨勘令宣撫處置司一靣照條施行月終類奏換給付身以尚書右司郎中張公濟言道逺留滯也右宣教郎陸知微追三官聴參選挨轉至承議郎止知微吳縣人政和末以言水利得官法當討論故有是命是日利州觀察使蘄黄鎮撫使孔彦舟叛降偽齊先是劉豫訪得彦舟母妻及子厚給以禄使其舅盧某持書招之彦舟乃有叛意未發㑹報權邦彦入樞府彦舟與之有隙心不自安時韓世清既伏誅而韓世忠連破湖湘羣盗順流東歸彦舟疑其圖已遂决策叛去幕客長洲王玠諫曰緫管被命鎮撫二州任優禄厚豈可負朝廷恩自䧟不義彦舟不聴玠再見遂靣罵之彦舟怒殺玠引所部降劉豫其統制官陳彦明不肯北去與統領官武翼郎郭諒率衆千餘詣知江州劉紹先降詔進彦明二官與諒並為都督府准備將仍賜敇書奬諭趙甡之遺史彦舟將行出左右婦人皆嫁之送官員入山寺恐為行軍所擾彦舟臨行對官屬言無負朝廷之意所以反者蓋疑權邦彦也至光州畧棄甲仗器械不勝計乃歸劉豫日厯今年四月五日丙寅蘄黄鎮撫使孔彦舟狀得光州並定成縣牒用偽年號稱彦舟母王氏有狀稱相州人有宅子田園親戚兼稱母王氏要取彦舟事伏念彦舟蒙朝廷非常之恩萬死莫報雖愚賤武夫粗知忠孝不能兩立今来劉豫意在招誘所有光州並定成縣牒已具繳奏乞照㑹有㫖降詔奬諭按彦舟狀乃與甡之所云使其舅持書招之者不同今併附此江西安撫大使李囬聞彦舟遁乃以本司右軍統領李玠以所部知黄州九月己夘正差癸卯左宣教郎眀槖守監察御史槖長沙人也朝奉郎知華陽縣古洵直遷一官以元符上書押出故也於是集英殿押出黄定等十七人皆進官一等内選人改京官甲辰左中大夫翟汝文依舊致仕免謝辭上既詔汝文出守而言者復奏汝文方春而来遽竊公輔之寵及秋而去不顧國家之急望誅其避事之意復令致仕故有是命江東安撫大使李光言近縁朝廷除呂頥浩都督八路諸軍偽地震恐遂聲言八月人分道入境此固不可不慮望専任大臣宻加措畫凡諸處探報乞送頥浩與臣覈實聞奏今王彦先盗據夀春滋長不便臣使頥浩至建康首議過淮若頥浩病勢未減臣當遴選五六千人召募敢死之士身自請行若止遣兵將萬一失利遂使敵人得以窺伺愈無忌憚詔光申督府措置不湏躬親前去初樞宻院計議官王大智請造戰車詔工部侍郎韓肖胄董視是日大智以所造霆撃車各一乘進呈上觀於内殿既而車不可用罷之乙巳詔簽書樞宻院事權邦彦兼權參知政事丙午遣殿中侍御史江躋尚書度支員外郎胡䝉㸃檢劉光世軍中將士告帖具每月合請錢糧實數以聞時都督呂頥浩至鎮江而軍中告乏頥浩言光世軍月費錢二十二萬緡除取撥鎮江一郡財賦外朝廷已應副其半望令臺部堂各一員考究如有闕數乞盡行支降如無闕數亦乞行下光世照㑹故有是㫖熊克小厯載此事殊失本㫖蓋頥浩疑光世軍中詭名冒請者多錢糧初不乏非謂少錢而乞朝廷應副也今依元奏刪潤附入直龍圖閣知鼎州程昌㝢降充直秘閣坐嘗劾樞宻院編修官王鈇在紹州棄城不實也戊申輔臣進呈大理少卿李曦論太祖皇帝明謹獄事上曰此太祖皇帝徳澤也朕敢不遵承每於庶獄奏讞未嘗不致慎亦未嘗送下公事恐獄吏觀望鍜鍊人罪權邦彦曰法者天子所與天下公共上然之中書舍人兼侍讀胡安國試給事中起居郎修政局參詳官胡世將起居舎人王昻並試中書舎人右司諫方孟卿權尚書兵部侍郎太常少卿王居正試起居郎尚書司勲員外郎張燾守起居舎人左司員外郎黄龜年為中書門下省檢正諸房公事禮部員外郎林待聘兵部員外郎樓炤為左右司員外郎時安國在道未至也昻以疾不拜後二日改徽猷閣待制知台州尚書屯田員外郎兼修政局檢討官曾純充樞宻院檢詳諸房文字左宣教郎江端友守尚書禮部員外郎御史䑓檢法房晏敦復守祠部員外郎敦復初以大臣薦召試館職辭不就故特命之時祠部郎官向宗厚奉神御於永嘉論者以給降度牒增多權官不能譏察由是二員並置起復翊衛大夫福州觀察使劉光烈帶御器械光烈光世弟也庚戌御史中丞沈與求言祖宗故事許令館職兼在京釐務官所以蓄養人材自今劇曹郎官并繁冗局務有闕乞於館職編修計議刪定官太常丞博士國子監丞内隨才選差亦可試其能否從之自是職事官復權郎矣壬子參知政事福建江西荆湖宣撫使孟庾以平㓂功進二官為左通議大夫尚書右司員外郎兼修政局檢討官吳表臣為左司諫左朝奉郎沿海制置司參謀官林師說權尚書兵部員外郎徃福建起發海船癸丑左朝請郎李健提舉江西茶鹽公事初復提舉官也甲寅詔尚書左僕射都督江淮荆浙諸軍事呂頥浩令赴行在奏事初頥浩甫出師而其前軍叛去又聞桑仲死頥浩不能進遣參謀官傅崧卿以所部之建康因引疾求罷上手詔封還所上章頥浩復乞祠乃命還朝以崧卿權主管都督府職事保義郎統領光州石額寨忠義人兵張昻以保境有勞進一官陞閤門祗候乙夘上謂秦檜曰周宣内修政事外復疆土近設修政局令百官各條具利害甚善所謂修車馬備器械以及外禦之事卿更宜講求檜曰臣敢不奉詔詔以辛企宗所部神武副軍𨽻湖廣宣撫使李綱仍趣令之鎮是日福建江湖宣撫司前軍統領官解元後軍統制官程振以所部入潭州屯於子城之内新知福州李宏稱疾不出夜宏中軍由恩波門以遁元遣將李義追撃之翌旦元盡拘宏舟檝之在江臯者引兵至寨中見宏計事因悉其兵械以歸世忠即以宏為宣撫司統制時朝廷始聞馬友死以敇書勞宏而宏已執矣丙辰詔江東大使司水軍統制張崇耿進所部兵七千人舟千五百權𨽻韓世忠丁巳尚書考功員外郎兼修政局檢討官張觷升左司員外郎左宣教郎主管江州太平觀朱震為司勲員外郎左奉議郎知嘉興縣施鉅為御史䑓主簿鉅歸安人沈與求所辟也直秘閣知秀州秦梓主管臨安府洞霄宮神武右軍都統制張俊請本軍自造軍器赴朝廷呈訖置庫樁管下户部支物料價錢許之凡全裝甲一副費錢三萬八千二百馬甲一副費錢四十千一百弓一費錢二千八百弓矢百費錢七千四百弩矢百費錢六千五百提刀一費錢三千三百應鼓一費錢六千五百皆有竒凡鍪甲一副率重四十有九斤此其大畧也戊午詔江浙湖廣福建諸路各委漕臣一員措置出賣官田是月偽齊大雨劉豫以為徳政所感使其子尚書左丞相梁國公麟代謝於相國寺上清太一宮有孫肇者濟南人嘗為麟府屬累遷尚書吏部侍郎出知棣州㑹大旱偽庭以蕃法祈雨執肇坐於烈日中汲水數桶更互沃其體遂得疾死此事據夷堅志不得其年因謝兩附見偽宣奉大夫守尚書右丞相張孝純告老遷觀文殿學士銀青光禄大夫參知機務户部尚書兼權門下侍郎張􅄧權右丞相兼門下侍郎尚書吏部侍郎鄭億年為開封尹成忠郎許青臣主管殿前司公事是夏金左副元帥宗維之白水泊避暑試舉人以詞賦得胡礪以下先是試之日宗維立馬塲中呼舉人之年老者諸生不諭其意争跪於馬前宗維據鞍以鞭指麾俾譯者諭之曰汝無力老奴婢胡為應試使汝能文章則少年登科矣今茍得官自知日暮塗逺必受賕為子孫計否則圖財假手何補於國我欲殺汝又念汝罪未著姑聴終塲儻有所犯必殺毋赦諸生伏地叩頭愧恐而去是舉也宗維諭主司勿取中原人礪磁州人與知制誥韓昉善用燕山貫得之建炎以来繋年要錄巻五十五
