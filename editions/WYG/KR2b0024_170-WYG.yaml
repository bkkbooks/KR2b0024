body:
  text: 建炎以來繫年要録巻一百七十宋李心傳撰紹興二十有五年十有一月戊申右承事郎趙汾特降二官制曰汝大臣子不自愛重言者謂汝交通宗室窺伺機事朕議汝于法究其始末亦既有狀從有司議姑削二官尚體寛恩毋重後戾制詞權中書舎人趙逵所行也日歴云汾故宰相鼎之子徐嚞任御史日言其甘心與人逓送書信窺伺朝廷事機法寺鞫治故有是命按此乃與張浚行状所書鞫治本意全不同必檜死後所擬也臣嘗聞前校書郎魏了翁言呉獵在舘中嘗云張浚謫居永州杜門不通人惟穴墻以通薪水一日有自穴中擲身而下者已困頓不省其子栻往問之乃趙刪定者為栻言秦檜方起大獄相公與某皆在其中勢不免死故來相别爾栻不敢以白浚延之别室浚微聞之召栻謂曰吾曽薦秦㑹之必不見殺然亦當往海南槖中有銀苕子留其半汝奉吾母歸長沙其餘中分半以予趙半以備海南之行可也又數日有黄衣卒復自穴中擲身而下其家以為謫命至大懼亟往視之卒困甚不能言指腰間小紙文書取視之乃湖南漕臣所寄也其書云十月二十二日秦太師已致仕伏乞鈞照浚始命撤關啓門獵潭州人舊游栻之門其言必有據故附著于此趙刪定未得其名當考己酉詔秦檜神道碑以决䇿元功精忠全徳八字為額以熺言臣父際遇聖主獲依末光眷禮始終曠古未有今合立神道碑望特賜御題八字故也辛亥詔大理少卿張􅤡與外任右宣敎郎王錡直祕閣錡繼先孫以繼先郊祀合得薦奏恩澤而命之制曰朕酬乃祖之勞將益録其子孫既而曰與其益之盍増異焉用是以汝進直祕閣夫父祖之於子孫無所不用其愛其亦榮汝之承吾賜而歸侍于側也汝克孝秀祗聼吾訓顯身揚名兹其所以報君親與制詞權中書舎人趙逵所行也壬子敷文閣直學士魏良臣參知政事左中大夫直龍圖閣湯鵬舉行殿中侍御史監察御史張脩行右正言乙卯詔秦檜合該賜諡令太常寺擬定於是博士曹冠撰諡議曰故太師贈申王秦檜光輔聖主紹開中興安宗社於阽危之中恢太平於板蕩之後道徳光天地勲業冠古今雖備道全美不可主一善名一功而崇報之典嚴於定諡尤當先其報國之大節傳道之顯効焉謹按諡法慮國忘家曰忠文賢有成曰獻冝賜諡曰忠獻右朝奉郎通判常州秦烜為光禄寺丞烜梓子也熺言臣本家御書閣及賜第家廟並未有人看守望改烜行在差遣就令專一照管故有是命丙辰執政進呈赦書副本九十三條上曰依前郊體例還有増改否參知政事董徳元奏今所進本除依前赦外増改十八條新添二十三條上曰民間利害冝講究詳備務在寛恤無所寃濫右司員外郎林一飛罷直祕閣兩浙轉運副使鍾世明兼權郊祀大禮提㸃一行事務官以都司全闕故也丁巳直祕閣新知眉州王揚英落職催赴新任殿中侍御史湯鵬舉奏揚英寡亷鮮耻近除職知眉州可謂幸矣嫌其地逺而不行方且對衆揚言我嘗薦秦熺為宰相必為我致力命下三月傲然自安方命不恭無甚於此故有是命太常博士兼權中書門下省檢正諸房公事曹冠右通直郎司農寺主簿林一鳴監文思院上界門林一鶚並罷先是殿中侍御史湯鵬舉奏一鳴一鶚乃一飛之兄弟恃權挾勢輙得進用冠秦檜之館客也試官觀望叨冒登科平江敎授到任三月遽得改官遂遷太常博士如此則國家清要任使宰相用以酬門客可乎中外士大夫莫不飲恨而竊笑之望將一鳴一鶚及冠特賜罷黜以俯慰中外臣下積憤之心是日執政進呈畢新除右正言張修入對亦論宗正寺丞鄭柟天資險詖賄賂狼籍冠章句鯫生人物凡下二人者朝夕出入大臣之門復交結曹泳柟之奉使泳力與為地今冠為檢正實政事之本柟為奉使葢國體所繫若不亟罷黜深恐别致生事傳笑四方上面諭修以開廣言路之意時冠已用鵬舉章先斥於是柟相繼亦罷左奉議郎知池州青陽縣褚籍充御史䑓檢法官左承務郎監鎮江府𣙜貨務都茶塲門張堅充御史䑓主簿時䑓屬闕官上面諭湯鵬舉令舉薦遂用二人籍丹陽人堅綱子也榮州刺史階成西和鳯州兵馬都鈐轄御前後部同統制軍馬吳拱兼知成州戊午執政進呈激賞庫所賣錦三千餘匹係曹泳行下江浙諸州辦賣已依聖㫖拘收上曰自古帝王多事土木䑓觀遊燕田獵朕皆不好正恐有害吾民如敷出許多錦帛决致科擾豈可不禁朕深居九重百姓愁歎之苦朕安得知乎是日占城進奉使􅀢逵麻等入見貢沉箋等香萬餘斤烏里香五萬五千餘斤犀角象牙翠羽玳瑁等賜酒食殿門外後三日即懐逺驛燕之其後交趾三佛齊使人率如此例占城者在中國之西南東至大海西南至真臘北至交趾之驩州東北至吉陽軍所統大小州三十八通不盈三萬家其戎噐以標槍旁牌竹弦弓無翎箭民有罪輕者笞臀背罪重者籠而擲之水中殺人者復使其親屬毆殺償之大畧如此時占城國王楊卜麻疊死其子鄒時蘭巴嗣立故遣使入貢焉己未宗正丞充大金賀生辰使鄭柟罷用右正言張脩奏也奏已見丁巳脩又言曹泳先權户部侍郎兼知臨安府日與鄭柟曹冠締交合謀朋附大臣將平昔交結不逞之徒狥情辟差共為姦惡乞行下户部及臨安府盡行减罷又奏左廸功郎監文思院曹緯實泳之姪先持祖母服泳力挽其來俾就試省闈試官觀望濫綴科第使其留行朝深慮造作語言動搖國是詔緯放罷權尚書吏部侍郎徐嚞充大金賀生辰使利州觀察使御前前軍統制王彦特遷保寧軍承宣使左部統制楊從儀王宗尹右游奕統制王喜中部統制傅忠信右部統制李思顔等九人並轉行一官以都統制吳璘楊政言彦等供職滿十年從四川制置司保明也右武大夫劉允升帶御器械癸亥冬至日合祀天地于南郊赦天下應命官縁事流放累該赦宥未曽施行令刑部開具元犯因依申尚書省取㫖應刺面不刺面配軍編管羈管人等内命官具元犯因依聞奏其永不移放人祖父母父母年八十以上或篤疾者保明以聞其情巨蠧人録元犯因依并自到後來有無過犯開析奏裁當議看詳特與量移勘㑹進士因事送州軍聽讀並無放年限實可矜憫可令刑部看詳如元無的實罪犯行下所在州軍並發歸本貫聽讀自今赦後及一年别無公私過犯給據放令自便取應是嵗郊祀増鹵簿為萬五千二百二十有二人建靈芝瑞木等為旗用乾徳故事也甲子上幸秦檜第臨奠面諭檜夫人王氏以保全其家之意乙丑敷文閣直學士新知平江府宋貺罷右朝請大夫知廣州周三畏復敷文閣待制知平江府先是貺以祖諱平乞避魏良臣等奏令與三畏兩易上曰貺小人妄作向知臨安府因官妓公事甚喧可直與宫觀理作自陳三畏亷謹守法中間被黜無辜與復職知平江甚當三畏復職必三省所擬也熊克小歴載二語减去甚當二字遂失其實左朝奉郎主管台州崇道觀袁州居住洪皓復敷文閣直學士皓謫居九年至是已卒十月二十一日魏良臣等言皓在貶所病甚欲復舊職宫觀任便居住上曰皓頃在敵中屢有文字到朝廷甚忠於國中間以語言得罪事理曖昧可依所奏上因語及大理寺官多是觀望廷尉天下之平如此朕何所頼趙令衿趙汾被罪事起莫汲汪召錫如近日張祁坐獄皆是曹泳以私憾誣致其罪卿等可速治之丙寅徽猷閣待制張綱落致仕召赴行在保信軍承宣使提舉萬壽觀曹勛幹辦皇城司丁夘手詔曰廷尉為天下平而年來法寺惟事旬白探大臣㫖意輕重其罪致民無所措手足玩文弄法莫此為甚比恐尚爾任情亟罷舊吏所冀端方之士詳覈審覆一切以法而不以心俾無寃濫副朕丁寧之諭詔建寧軍承宣使王繼先供進湯藥有勞特與轉兩官依條回授右奉議郎江南西路轉運判官張常先直祕閣提舉荆湖南路常平茶鹽公事汪召錫並罷令逐路提刑司取勘聞奏右正言張修論常先心懐傾險專事把持尤工告訐召錫倚恃榮勢姦濫貪汚侵擾公私故有是命庚午手詔近嵗以來士風澆薄持告訐為進取之計致莫敢耳語族談深害風敎可戒飭在位及内外之臣咸悉此意有不悛者令御史䑓彈奏當重寘于法參知政事董徳元魏良臣簽書樞宻院事湯思退言天下之事皆人主總攬人臣不過奉行而已近來諸路監司郡守以事達朝廷止云申尚書省取指揮殊失經意欲自今以後事無巨細皆湏奏聞如或凖前違戾許臣等具名銜進呈當以黜責示權柄悉歸于君上非臣下所敢專也上曰此乃大臣任意所為不欲朕知天下事耳此奏可即行下徳元等又言今州縣之官貪墨殘忍尚容有之監司郡守職在按察務相隱蔽以市私恩斯民何頼欲自今後有不亷不恤之士失於舉覺别因事彰露其按察之官重加黜責上曰此誠今日之弊當如此奏行上又曰三省行首司賈雩罪惡甚多執政大臣乃朕之股肱皆被譛訐不容安跡須與編置卿等冝速治之皇叔右監門衛大將軍和州防禦使士俴為崇慶軍節度使嗣濮王皇叔左朝議大夫直祕閣福建路提㸃刑獄公事趙令詪為利州觀察使安定郡王士俴和僖穆王宗樸孫榮國公仲憫子也自秦檜當國二王不襲封者十有餘年至是始命之時令衿當封而方坐累拘管乃封令詪安懿王曽孫五百五十有三人得紹封者自士俴始令詪已見直祕閣兩浙轉運副使鍾世明守尚書右司員外郎兼權户部侍郎上覽除目曰世明亷謹解事前往閩蜀頗有勞但事止申省無一字至朕前今可詔諭朕此意右正言張修言人才自有公議乞誥誡臣僚今後薦舉必三人以上同銜列薦庶無私於親黨免取譏於公議從之辛未執政進呈淮南轉運判官龔鑒恃勢妄作乞放罷仍差知揚州樓璹權兼管運司事上曰揚州正當人使往來之地須欲得人聞璹亦不能稱職卿等可與易一差遣三省樞宻院言士大夫當修行義以敦風俗頃者輕儇之子輙發親戚箱篋私書訟于朝廷遂興大獄因得美官縁是之後相習成風雖朋舊骨肉亦相傾䧟收尺牘於往來之間録戱語於醉飽之後况其間固有曖昧而傳致其罪者薄惡之風莫此為甚臣等願陛下特降睿㫖令刑部開具前後告訐姓名議加黜罰庶㡬士風丕變人知循省詔刑部開具申省取㫖敷文閣學士新知建康府王㑹罷殿中侍御史湯鵬舉言恭惟陛下慎簡群材鼎新百度内外莫不歡欣而和氣所以充溢中興之治可以持守然近者士論皆言朝廷未除宰相於十月二十一日秦檜未薨之前曽遣林一飛鄭柟秦塤計㑹臺諫奏請秦熺為相以此傳播中外臣僚猶且指望熺必復用以茍進取以堅黨錮恐天下士庶不能無疑惑臣切見熺父薨之後陳乞數事止有營私之心初無憂慘之意且如乞王會知建康共辦父之𦵏事可也乃云庶得相聚照顧家属建康屯駐大兵為守臣者一路軍民所寄事體非輕若止為私家相聚朝廷何頼焉伏乞差㑹自陳宫觀與熺共集檜之葬事臣更乞睿慈將臣之論列報行中外使臣下咸知尊君親上精白以承休徳則浮言自息公道自行故有是命直祕閣知太平州王晌右朝請郎知宣州王鑄直祕閣知廬州鄭僑年直祕閣新知嚴州鄭震直敷文閣知明州方滋並罷亦用湯鵬舉劾䟽也鵬舉言晌附勢作威寡亷鮮耻鑄尃事謟䛕出官未久遽得監司郡守僑年不通世務沉湎貪饕震不歴州縣驟躐監司頃為福建市舶每有貨物半入私帑滋隂狠恣横姦贓狼籍自楚州移桂府自廣帥移福州其所出珠翠犀象盡入於權貴之家復得明州優厚之處此誠公議不行私恩特甚髙官美禄一家有煖衣飽食之幸而孤寒逺官數年不得差遣終身有號寒啼饑之憂其怨将何歸耶伏望將晌等特賜罷黜以慰臣下孤寒之心故皆黜之鑄今年七月己未自江東轉運判官改知宣州初和州州學敎授盧傅霖嘗作雪詩有云寒鄉只願春來早煖日寒風盡蕩摩右朝散郎通判州事范洵按其怨望遂罷傅霖至是右正言張修劾洵罷之尋復令傅霖還任傅霖十二月戊寅還任壬申國子祭酒兼侍講張扶罷以殿中侍御史湯鵬舉論扶頃為明州敎授奴事曹泳夤縁改官用泳之薦遂為正言凡有奏陳盡出泳口豈能為學者模範故也祕書省校書郎兼吴王益王府敎授兼權禮部員外郎趙逵兼普安恩平郡王府敎授及引對上曰卿乃朕擢秦檜日薦士曽無一言及卿以此知卿不附權貴真天子門生也又曰兩王方學詩冀有以切磋之逵因奏言路久壅願陛下廣覽兼聽勿以賤微為間庶養成敢言之氣上嘉納之此據周麟之所撰逵墓誌修入他書並無之按逵今年二月入館至檜薨僅半年未為久次如董徳元湯思退林機葛立方王曮皆檜所親厚者曮入館踰年立方思退皆二年機二年半方除郎徳元亦二年半方除察官則逵亦未為滯也且據麟之所云附此更須詳之皇叔宣州觀察使知西外宗正事士衎轉一官再任保信軍承宣使曹勛知閤門事兼幹辦皇城司右正言張修奏右通直郎福建路提舉常平茶事王瀹左承事郎添差通判廣徳軍鄭時中以大臣之親驟加進用左奉議郎知邵州林機以宰相姻婭進躐清顯附下罔上妄立異議宰相曽不以為罪猶付之名郡物議籍籍詔並罷修又言兩浙東路提舉常平茶鹽公事黄兑以大臣之姪壻累冐差除唯知謟事曹泳浙東提舉闕官泳何與焉輙敢以兑姓名達之天聽望賜罷黜以協中外之望從之十有二月甲戌朔禮部奏郊祀行禮聖孝等事乞宣付史館上曰霜露之感人子常禮所不必書上又謂輔臣曰頃委官㸔詳監司郡守所條裕民之事已數年而未嘗進呈必是取宰相意㫖不欲令朕見也又所條止於民事自令有已見利害並許敷奏於是降㫖行下手詔曰臺諫風憲之地振舉紀綱紏剔姦邪宻賛治道年來用人非據與大臣為黨而濟其喜怒甚非耳目之寄朕今親除公正之士以革前弊繼此者冝盡心迺職惟結主知無更合黨締交敗亂成法當謹兹訓毋自貽咎端明殿學士提舉臨安府洞霄宫程克俊知建康府左朝奉郎提舉江州太平興國宫章厦知太平州光禄寺丞秦烜與外任殿中侍御史湯鵬舉言熺乞留烜守家廟不過使之探伺朝廷之施設稽察百官之向背况熺身在草土不當數有陳乞望與烜在外差遣將帶檜家廟歸建康上從之右正言張修言資政殿大學士鄭億年以宰相子身為近臣不能捐軀報國乃甘事逆臣劉豫既還朝大臣力為之地髙爵重禄坐享累年端明殿學士鄭仲熊與大臣連姻不一二年致身右府賄賂狼籍詔並落職億年南安軍安置仲熊依舊提舉江州太平興國宫修髙郵人也特進提舉江州太平興國宫永州居住張浚降授左朝請大夫提舉臨安府洞霄宫郴州居住折彦質降授左中大夫提舉江州太平興國宫沅州居住万俟卨左中大夫提舉江州太平興國宫南康軍居住叚拂並令任便居住卨仍復左通奉大夫責授建寧軍節度副使昌化軍安置李光移郴州安置光年八十矣左奉議郎主管台州崇道觀道州居住何麒勒停人前左朝散郎直顯謨閣興化軍居住徐林並放逐便嚴州觀察使殿前司選鋒軍統制許世安為建武軍承宣使神龍衛四廂都指揮使和州防禦使殿前司選鋒軍統制李捧為隨州觀察使皆以積閥遷也乙亥左通奉大夫万俟卨復資政殿學士提舉萬壽觀兼侍讀詔行在百司闕官甚多可令侍從共舉一二十人務要真材實能不得輙狥私意儻不如所舉必罰無赦左朝請郎主管台州崇道觀張士襄責監南康軍在城酒税務是日執政進呈次上曰張士襄去嵗奉使囬當朕前奏事欺罔不實宰相止以奉使不肅罷續以宫祠處之卿等可與逺小監當以為後來奉使之戒左朝奉郎直祕閣楊偰為尚書駕部員外郎左宣敎郎直祕閣楊倓為將作監丞殿中侍御史湯鵬舉言敷文閣直學士徐宗説不學無術夤縁幸㑹遽躐版曹而為時相管莊自為茍賤敷文閣待制曹筠因秦檜薦為臺臣凡有奏陳盡出於檜右正言張修言敷文閣直學士徐琛貪汚叨竊詔並奪職罷祠直龍圖閣提舉台州崇道觀蔣璨為淮南路轉運副使璨不為秦檜所喜自鎮江罷去為祠官者十二年丙子淮南轉運判官王秬為父雲請諡執政乞下太常寺上曰若下太常則又申請遲滯可特賜諡卿等便與議定進呈於是賜諡忠介左朝散郎王大寳守國子司業兼崇政殿説書是日執政進呈次上曰王大寳向來曽進詩書易三經解甚有可採朕録一本留中以進本付中書省此人留意經術卿等可與行在差遣董徳元曰臣等方議欲除國子司業上喜曰朕意與卿等適合甚善經筵亦闕官可與兼崇政殿說書左承事郎張孝祥為祕書省正字故事殿試第一人次舉始召先是秦檜以孝祥父祁為胡寅所厚命有司按以反謀繫詔獄上祀郊之二日魏良臣宻啟釋出之因有是命丁丑敷文閣直學士提舉台州崇道觀宋貺落職以右正言張修論貺天資刻薄恃大臣之知已恣為不法故也明年十月再貶諸王宫大小學敎授陳巖肖為尚書祠部員外郎尋兼權中書門下省檢正諸房公事詔除名勒停前右朝散大夫武岡軍編管人万俟卨除名勒停前右朝請郎直祕閣南劔州編管人夏珙勒停前右朝散大夫直徽猷閣大寧監羈管人王良存除名勒停前左承議郎象州編管人髙頴並放令遂便戊寅御筆應先統兵官差破使臣軍兵隨年被賞以轉官資者不得以冐賞罪之内代名人依紹興十三年四月八日指揮改正今後凖此翌日執政奏臣等未諭此意上曰只為十三年以前立功將士有曽將决配甚非朕意時上喜見顔間又曰今後文字有疑處次日可復將上執政又奏熙寧崇寧封占城國王典故上曰昨問客省亦不知此例可依此行之勿失逺人歸附之意左朝請郎南安軍居住鄭億年再責建武軍節度副使南安軍安置右朝奉大夫知南劍州沙縣張松就差知瓊州用本路安撫司請也按明年二月辛夘湯鵬舉論魏良臣章䟽稱所薦張松自知縣造朝輙除郡守與此不同又按良臣今年十一月癸丑方除參知政事扺今二十七日廣西經畧司所請必在良臣執政之前當考己卯左朝奉郎通判婺州周方崇為監察御史方崇海陵人湯鵬舉所薦也直龍圖閣知紹興府趙士㣓直祕閣知温州髙百之並罷殿中侍御史湯鵬舉論士㣓為時相家作媒畢婚嫁故連作帥臣進陞祕職百之與秦塤為姻家故驟為提舉繼守鄉郡公論謂何乃罷之庚辰安豐軍進􅒕鮓白魚御筆朕不欲以口腹勞人可下本軍自今免進翌日執政進呈上曰温州柑橘福建荔枝去年皆令罷進獨􅒕鮓淮白皆宗祖嵗進之物朕恐勞百姓所以再降指揮住罷辛巳左奉議郎知廣徳軍王綸守起居舍人綸為察官以不合檜故峻用之右正言張修言江南東路提㸃刑獄公事黄然傝䢆庸懦昨為兩浙轉運判官其於漕計漫無措畫將一路常賦妄行折科民苦其擾州郡申陳則曰此曹侍郎指揮也夫何疑焉為江東提刑案牘積壓一聽人吏乞與宫觀差遣以恊望從之左朝散郎金安節知嚴州安節為御史再䟽論秦梓罷之由是乆廢至是復起壬午三省樞宻院言近嵗監司守城競事刻剥重為民蠧者其事未易縷數摭其尤者則羨餘不可不禁權攝不可不罷苞苴所當戢宴飲所當節欲望嚴申禁約或有違戾仰御史臺及監司彈奏重寘憲典庶㡬副陞下愛養元元之意上曰此等無非害民者可依此申嚴行下執政進呈刑部状開具到前後告訐人右朝奉郎張常先先任江西運判告訐知洪州張宗元與張浚書并壽詩右通直郎直祕閣汪召錫左從政郎莫汲並告訐衢州寄居官趙令衿有謗訕語言右朝散郎范洵告訐和州敎授盧傅霖作雪詩稱是怨望左朝奉郎提舉兩浙路市舶陸升之告訐親戚李孟堅將父光所作文集告人及有譏謗語言左從政郎福建路安撫司幹辦公事王洧任兩浙轉運司催綱日告訐知常州黄敏行不法等事追官勒停人前右通直郎明州鄞縣丞王肇誣告程緯慢上無人臣之禮等語言致興大獄並是虛妄降授承信郎雍端行先任監潭州湘潭縣酒税告訐本縣丞鄭玘主簿賈子展因筵㑹酒後有嘲訕語言致興大獄福州進士鄭煒告吳元美譏謗等事上曰此等須痛與懲艾近日如此行遣想見人情歡悦感召和氣於是並除名勒停常先送循州召錫容州汲化州洵梅州升之煒雷州洧南恩州肇髙州端行賔州並編管洧鈇子端行蜀人祖孝聞崇寧初舉進士南省第一坐上書詆斥廢死父子純建炎間為右職𨽻趙哲軍哲誅子純亦編置張浚憐之復授端行一官至是抵罪後不知所終黄敏求自常州對移和州不知洧所訐何事端行事迹以王明清揮麈前録修入但録稱雍安行恐小誤鄭玘賈子展未知何時行遣此月十一日甲申復官詔除名勒停前左朝請郎荆門軍編管人范彦輝坐作夏日久隂詩前右朝奉大夫展州編管人王趯坐與李光通書及借人前右朝散大夫䕫州編管人元不伐坐撰造行在言語特勒停前右承議郎徽州編管人蘓師徳坐其子撰常同祭文稱姦人在位除名勒停前右承務郎峽州編管人李孟堅坐父光所撰小史皆非事實右承務郎紹興府羈管人李孟津坐鼔唱台州人乞管鎬為知州除名勒停前右承務郎梅州編管人王之竒前右承務郎容州編管人王之荀坐怨望謗訕特勒停前右朝散大夫鼎州編管人閻大鈞坐依隨鄭剛中並放令遂便詔諸撲買坊場並遵依常平法施行如有違戾去處仰提舉司檢舉改正此當是為罷諸軍酒坊酒庫張本祕書省校書郎兼普安恩平郡王府敎授趙逵左宣敎郎通判徽州周麟之並為著作佐郎逵仍兼權中書舎人是日制授占城蕃首鄒時蘭巴懐逺軍節度觀察留後占城國王散官檢校官憲御勲邑如故事加賜寛衣一對金帶一條細衣着百匹金花銀器二百兩衣着百匹銀帛千匹兩又以其進奉使􅀢逵麻為歸徳郎將使副見日皆賜金帶判官金花銀帶襲衣衣着辭日皆賜衣服器幣有差甲申御筆醴泉觀使孟忠厚令行在居住奉朝請翌日參知政事魏良臣奏曰忠厚在戚里最號賢者上曰向來徽宗梓宫須宰相䕶送秦檜辭不肯行遂差忠厚以樞宻事䕶送朕深不欲以國戚任軍旅及朝廷之事萬一有過治之則傷恩釋之則廢法如太后家子弟但加以爵禄奉祠而已良臣曰陛下聖明深得所以待國戚之體詔命官犯罪勘鞫已成具案奏裁比年以來多是大臣便作已奉特㫖一面施行自今後三省將上取㫖敷文閣待制劉一止落致仕召赴行在右朝散大夫直祕閣宗頴行尚書兵部郎中左朝散郎周葵復直祕閣知紹興府詔除名勒停前左朝請郎處州編管人邵大受坐朋附范同浮言無稽前左從政郎武岡軍編管人芮曄坐賦牡丹花詩怨望前右從政郎萬安軍編管人楊煒坐上李光書詆和議前左迪功郎横州編管人鄭玘前右迪功郎肇慶府編管人賈子展坐酒後有嘲訕語言並放令逐便仍與復元官煒渡海而卒徽猷閣待制致仕陳橐卒乙酉參知政事董徳元罷為資政殿學士提舉江州太平興國宫先是殿中侍御史湯鵬舉言徳元器能淺陋徒以巧言令色取媚權貴叨竊進取既參大政又以承乏得權宰執興利除害豈能任其責乎進賢退不肖豈能任其怨乎是真伴食備貟者也望將徳元罷黜以為貪進無耻之戒右正言張修言仰惟陛下聰明灼見大臣前此專權自恣一時小人有害于政者奮由英斷旋加斥逐中外之人獲覩朝廷清明百度鼎新之日無不歡呼鼓舞稽顙相賀其有朋比大臣欺罔君父罪狀顯著物議沸騰乃尚參與大政不知引退可不論列貶竄以昭天下四海乎臣謹按參知政事董徳元以猥𤨏之才偶中巍科大臣當軸欲其附㑹遂啖以要官至如䑓諫人主耳目之寄尤非他官比而徳元為侍御史與之交通令憸人徃來傳道宻意所喜者即驟進之所怒者即擠排之群小得計相為黨與善類惴慄若無所容此實䑓諫附㑹以至於此極也近日聖詔初頒在位之臣敢不精白一心仰承休徳如徳元自宜告退猶洋洋然不以為耻處廟堂與機政士論切齒若不亟行罷黜深慮有誤國事鵬舉又奏去嵗省闈徳元為參詳官偶於謄録處取號而得秦塤巻子對衆曰吾曹可以冨貴矣今房中以得塤之試巻更相自慶而徳元復對衆又曰此巻子髙妙魁等有餘近日遂接引鄉人之浮浪者公然皷噪於市肆中乞朝廷除徳元為相是真不量力取笑於一時莫此為甚伏乞早賜罷黜以為謟奉權貴妄意進用之戒修又言人臣之罪莫大於附㑹徳元之罪中外固已知之懲一勸百以戒飭在位之臣誠不可緩也鵬舉又言徳元權宰臣職事以來兩月餘矣才力不逮智能無取日甚一日貪不知耻况復歴官未久驟躐政機徒知歸徳於時相不知恩出於陛下近日擅支激賞庫錢物犒給胥吏誠何心哉是使胥吏歸恩於徳元不知激賞庫錢物實出於朝廷也䟽入徳元乃求去上猶以不允答之奏上上始有是命鵬舉又言徳元貪鄙之心知無不為且如近遣王珉出疆徳元遂令其子克正充上節禮物官今端坐於家公然循資殊不知耻珉之行日有云衆人皆有所得獨參政令嗣略不念盛寒中萬里之行耶人皆傳之以為笑徳元貪鄙如此尚得資政殿學士而竊宫祠厚禄公議謂何望將徳元職名鐫褫仍将臣前後論列報行中外以戒臣下貪得無耻之心詔徳元落職制略曰不思臨軒之恩遂决媚竈之䇿間不一嵗來參萬㡬權舍人趙逵所行也左朝散郎通判明州凌哲又承議郎添差通判嚴州何溥並為監察御史湯鵬舉薦之也哲吳縣人初見紹興十四年七月溥永嘉人初見紹興十二年三月溥入見首論天子之耳目所恃以周知天下之故者内則寄之臺諫外則寄之監司故監司權與臺諫等陛下勵精求治尊用䑓諫言無不從今兹朝廷之治可謂肅矣而臣竊恠州縣之間貪吏為虐摶噬良民甚於豺虎監司不問郡守不訶往往甘受佞巧先食其餌是為足以當陛下耳目之寄哉臣愚以謂州縣之貪吏郡守不治而監司得以按之則郡守當坐縱容之罪監司不按而䑓諫得以劾之則監司當受失察之罰而又每嵗校其所按之多寡以為殿最之課如是則非惟監司不容於匿姦而貪吏亦將歛迹而不敢犯矣此非臣意度而為之説也比居田里所親見故敢為陛下言之伏望睿慈斷以必行則實惠及民天下幸甚從之溥奏下在十三日丙戌盖此日引對所上也右司員外郎無權户部侍郎鍾世明言契勘天下財賦窠名不一有歸之朝廷者有歸之户部者要之均濟國家之用而已故朝廷之與户部事實一體户部闕乏朝廷未嘗不應副也比年以來朝廷每月支降劵食錢三十萬緡又於數内尅還給關子錢而户部窠名錢物又有為朝廷拘收支用者户部所得無㡬欲望特降睿㫖令户部條具自來支使錢物窠名撥歸户部每月以實闕錢申朝廷取㫖貼降又言江浙等路有絶户没官等田宅紹興二十年内節次指揮撥赴常平司措置其間州縣官吏往往應副形勢有力之家量力租課佃賃不惟暗失官課而州縣又縁此失去二税嵗計之用乞將上件田宅盡行出賣令户部參照條具申朝廷取㫖並從之右承議郎謝伋知處州王明清揮麈後録云紹興二年秦檜之罷右僕射制詞綦叔後之文褫職告詞謝任伯之文綦謝姻家也秦大憾之先是髙宗有親批云秦檜不知治體信任非人人心大揺怨讟載路丁卯嵗上詔毁宰執拜罷録謂載訓詞也至乙亥嵗秦復知御札在任伯之子伋景思處作劄子自陳大槩云陛下是時尚未深知臣所以有此乞行抽取得㫖下台州從伋所追索得之是秋又令其姻黨曹泳為擇酷吏劉景者擢守天台専欲鞫勘景思時景思寓居外邑黄巖山間景視事之次日捕吏追逮景思直以姓名傳檄縣令差人防䕶甚峻景思自分必死将抵郡城外渡舟中望見景備郊迎儀一見執禮甚恭至館舍則美其帷帳厚其飲食景思叵測是晚置酒延佇坐間笑語極歡而罷始聞早已得檜之訃音矣又踰旬景思拜處牧之命然終不知所興之獄謂何也按此所云謝克家草秦檜制詞及丁卯嵗毁拜罷録乙亥嵗秦檜乞下台州取索御札皆小誤前已辯之劉景今年四月己丑差知台州詔右通直郎陳祖安令逐便以刑部檢舉也祖安初坐不告沈長卿謗訕事勒歸建州本貫丙戍武泰軍節度使充侍衛親軍馬軍都虞候提舉江州太平興國宫劉錡知潭州敷文閣待制知潭州張柄提舉江州太平興國宫是日執政奏事魏良臣言錡一時名將久閑上曰朕聞其貧甚昨賜田百頃仍官給牛種良臣言錡有申状到朝廷稱官田並撥入常平司止得荒田數頃臣已下本州只就常平田撥賜欲差帥潭州見任人張柄與宫祠上曰甚善直祕閣江東轉運副使州石罷以右正言張修論石縁大臣有父執之舊濫被任使貪汚不法也辛卯執政進呈監察御史王葆自劾徐嚞曽與臣議除秦熺事上曰王葆徐嚞王復雖言官所薦皆出秦檜意想其不自安須與外任於是次第罷之參知政事魏良臣等言仰惟國家累聖相承法令全備以為萬世不易之典自比年以來間有一時申請權宜而行其間致與祖宗成法有相牴牾者臣等近面奉聖訓國家政事當並遵祖宗舊制欲望特降睿㫖令省部節次條具續降申明指揮付有司看詳可否取㫖施行庶與舊法罔或背戾又言朝廷偃兵息民于今十五年矣典章文物粲然備具惟是衣冠舊制狃於近習競以紫衫為自便之服公卿皂𨽻混為一區甚非所以明等威定民志也欲望除諸軍將校許服紫衫外自餘並依承平舊制施行仍自紹興二十六年正月一日為始皆從之詔比年諸軍統兵官類多私役軍士至於託名囬易贍軍以茶鹽布帛之屬敷配倍取價直因致貧乏可令刑部行下諸軍如或依前違犯在内御史在外委總領官按察劾奏三省樞宻院取㫖重寘憲典如按劾官司知而不紏與同罪徽猷閣待制張綱試尚書吏部侍郎右正言張修為太常少卿監察御史凌哲為右正言左朝散郎葛立方為尚書吏部員外郎葛郯題立方文集後云太上更化伯父被召復為郎數日沈公該始除參知政事而言者乃謂賂該之子得之後議該者往往以為口實而伯父亦卒以此一跌不振伯父既捐館諸孤上書呌閽下其事於吏刑部而吏刑部考寃狀甚白謂伯父除郎乃紹興二十五年十二月十八日而沈該除參知政事乃當年十二月二十一日也左奉議郎通判紹興府黄中為祕書省校書郎中進士廷試第一官州縣近二十年至是始召御筆敷文閣學士王㑹落職罷宫觀後九日勒停詔應召赴行在臣寮入國門日令即時具狀聞奏右朝奉郎通判袁州蔡撢提舉荆湖南路常平茶鹽公事撢初見紹興二十二年十一月左承議郎充兩浙東路安撫司參議官何逄原提舉荆湖北路常平茶鹽公事癸巳責授果州團練副使致仕胡寅復徽猷閣直學士致仕詔追官勒停人趙令衿復左朝請大夫追官勒停人閻大鈞除名勒停人元不伐復右朝散大夫万俟止復朝散大夫止明年四月庚寅帶右字范彦輝復左朝請郎李孟堅王之竒王之荀並復右承務郎勒停人蘇師徳復右承議郎甲午敷文閣待制沈該參知政事該自蜀歸召還入見上曰秦檜何忌卿之深該曰臣始用檜薦及登從列聖知益深檜稍相猜上笑曰然遂有是命該首奏曰朝廷機務至繁所頼以同力協濟者惟二三執政比嵗大臣怙權參樞皆取充位政事例不關决冝特詔三省務各盡誠以賛國事時上復親庶政躬攬權綱首詔該及万侯卨還朝已而二人共政無所建明益不厭天下望云敷文閣直學士知泉州陳誠之為翰林學士誠之至泉纔數日也乙未上謂魏良臣沈該湯思退曰兩國和議秦檜中間主之甚堅卿等皆預有力今日尤冝協心一意休兵息民確守無變以為宗社無窮之慶良臣等唯唯奉詔左奉議郎知大宗正丞兼權工部員外郎王珪面對即日除監察御史日歴紹興三十年八月沈介論珪召攝宰士檜泳逐珪失所恃巧入湯鵬舉濫陞御史按前後薦除察官例引對今日歴所書乃云某官王珪輪當面對則似非薦對也珪除御史告詞有云爾仕于朝知之者鮮一言之間朕乃得之則非䑓端所薦可知又按秦檜死日宰士止有右司林一飛一員而曹冠權檢正右司自去年六月張士襄遷後更不除人或者珪所權即左司也然工部郎官題名止書珪遷䑓察不云珪改權都司介所云更當詳考左朝散郎葉義問行太常博士右朝奉大夫王㑹特勒停送循州編管殿中侍御史湯鵬舉言㑹初無履歴恃檜與熺之親黨致身禁從出守便郡置田産於湖秀造大宅於平江三州之物聚於私宅恬不知耻新除右正言凌􅈒言㑹專恃權勢肆為貪酷其知湖州也民間私造酒醋斗升之犯即拘没家財逮移明州益嚴其禁加之違法横歛託名羡餘貯之别庫謂之措置曹泳嘗倡之於前已不堪其弊矣至㑹復増其數嵗至三十萬緡於是多置税場以掊尅商旅増造酒額以抑配貧民以為未足也則又侵奪諸司正額之錢悉充措置之數及其還朝席巻而去帑藏為之一空凡典三州皆二浙膏腴之地其去之日公庫所有多擇以自随所至蕭然恬不知恤治第平江極於華侈皆出於三州兵民之力望投竄遐裔以為臣子慢令賊民之戒上謂魏良臣等曰㑹所至狼籍止縁恃秦檜之勢乃敢如此可與廣南編置故有是命太尉御前諸軍都統制知興州呉璘乞赴闕奏事詔不許丙申執政進呈諸處申到祥瑞乞宣付史館上曰此等極有不足紀者卿等冝斟酌不中理者刪去之中興聖政史臣曰中興以來言祥瑞者類多貶秩罷官紅光有火徳之祥赤芝應建炎之號禾穟生於枯桔甘露降於潜邸此其尤恠誕也聖諭及此欲屏絶之也上曰近日葉義問劄子極言州縣添差官之弊所給俸禄皆生靈膏血豈得不為民害祖宗舊法止宗室戚里添差差遣及比年因軍中立功人離軍將校例與添差除此外當盡罷去數十人不無怨嗟然愛惜民力要當如此魏良臣等言容續次修具取㫖熊克小歴止書詔罷添差官五字左朝散大夫福建路安撫司參議官賀允中守太常少卿左朝奉郎荆湖北路提㸃刑獄公事楊椿試祕書少監左朝散郎吕廣問為尚書禮部員外郎三人皆為秦檜所抑久于外故上擢用之左承議郎提舉江州太平興國宫蕭振充敷文閣直學士四川安撫制置使兼知成都府時上既蠲蜀民舊逋而敷文閣待制知成都府符行中督責甚峻蜀人怨之䨇流令馮光邦賊殺不辜為監司按治行中以光邦為秦檜所厚反坐告者杖脊編管朝廷知其不可任乃召行中還而復用振降授左朝請大夫折彦質復端明殿學士左朝議大夫左文林郎衢州州學敎授胡沂左從政郎宣州州學敎授葉謙亨並為祕書省正字右奉議郎莫濛復為大理評事左承議郎通判盱眙軍祝閔行宗正寺主簿左承議郎朱夏卿行司農寺主簿閔徳興人夏卿勝非子皆用近臣薦故有是命閔二十二年十一月戊戌除盱眙倅其後言者論閔知海鹽縣作将覺堂由此除宗簿恐誤左從政郎范成象行太學録成象成大兄也責授左承事郎將作少監分司南京朱翌復左承議郎充祕閣修撰降授右承務郎趙汾復右承事郎特與改正過名汾還家而卒除名勒停人髙頴復左承議郎吉陽軍編管人胡銓量移衡州從刑部檢舉也直祕閣提舉淮南東路常平茶鹽公事齊旦直祕閣添差通判平江府王伯庠並落職放罷殿中侍御史湯鵬舉論旦奴事權臣减尅鹽本錢以資妄用伯庠以王㑹親戚寡廉鮮耻違法貪饕故皆黜之鵬舉又奏右承事郎福建路安撫司主管機宜文字康與之贓濫尤甚右宣敎郎江西路安撫司主管機宜文字徐樗初受秦檜奏補即在行在守官撰造言語檜酷信之嘗中害張宗元范彦輝與之頃在平江干求州縣稍不如意遂撰造言語致周三畏放罷蘇師徳編管伏乞重加竄殛以為臣下贓汙告訐之戒詔並除名勒停與之送欽州樗髙州編管右司員外郎兼權户部侍郎鍾世明言近年民間銷毁錢寳法禁雖嚴尚未止絶葢縁出賣器皿其利不啻數倍今措置欲責令州縣應街市見賣銅器限半月並拘催入官嚴行禁止其犯人不論輕重並押赴鑄錢監充役官吏知而不覺者從違制論仍行放罷論逐路坑冶興廢不常難以立為永額近來鑄錢司督責嚴𦂳往往銷錢為銅上下期於脱責今欲令遂路提刑司選官檢視坑冶所出多少令分數認納不得抑勒其全無所出去處即保明申朝廷放免又近來錢寳多有流入外界蓋縁場務官司利於收息博易今欲嚴行禁止如有透漏其廵尉并場務官司知而不覺者以違制論仍行放罷犯人許諸色人及徒伴告首即以随行財物多寡全行給賞民間有銅寳興發去處官司量支貸聽人户隨多寡輪納不得抑勒庶㡬諸處銅坑不致隱蔽不告其金銀等坑及膽水興發處亦乞依此施行從之丁酉特進提舉江州太平興國宫和國公張浚復觀文殿大學士右通直郎知真州陳正同為樞宻院檢詳諸房文字上覽除目曰今此差除皆合公議自兩月以來卿等除用人材無非盡公想見外議皆以為當如朕未嘗容纎毫之私於其間若行公道不變天下何憂不治上又曰近日兩浙閩廣市舶司及四川茶馬諸處進貢真珠文犀等此物何所用當批出禁止御史䑓主簿張賢為國子監主簿右通直郎陳洪為太府寺主簿洪與義子也詔直祕閣知荆南府孫汝翼專恣妄作直祕閣都大主管四川茶馬鄭靄職事不修唯務掊尅可並罷直祕閣新知無為軍張永年罷以淮南轉運判官王秬奏其以權貴姻連得貼職而不請避父名也詔監司約束所部州縣受納秋苗不得過加收耗先是監察御史王珪以大宗正丞入對言今之急務莫先於冨國裕民今四境無虞干戈不用而小有水旱一方之人多致流離死徙不能自存且以目前利害言之蠹民之財莫甚於輸納二稅之弊大率加耗之入或過於正數官收一嵗之租而人輸兩倍之賦中下之家逃租棄産漂寓他鄉者往往而是朝廷雖申嚴約束而州縣公肆歛取無所畏憚唯其所説可以藉口循習之久不以為恠也臣愚以謂莫若度州縣所用多寡之數立為定例使上下通之此外不得分毫有所湏索必重寘典憲不唯少寛民力亦使官租易辦公私之利無以踰此故有是命右朝請大夫主管台州崇道觀霍蠡復直徽猷閣為京西南路轉運副使左朝請大夫熊彦詩知鄂州左中奉大夫提舉台州崇道觀葉三省復直龍圖閣除名勒停人王趯復右朝奉大夫朝奉郎主管台州崇道觀劉岑復左朝散大夫戊戌敷文閣待制劉一止充敷文閣直學士依舊致仕一止被召至國門病不能拜復求去乃有是命諸王宫大小學敎授朱三思罷以右正言凌哲論其謟事王㑹遂得敎授宫學㑹之去朝復附曹泳以短巻宻䟽人事于泳多非其實故也己亥金國賀正旦使奉國上將軍太子詹事耶律歸一副使左中大夫行大理少卿馬楓見于紫宸殿詔少傅醴泉觀使信安郡王孟忠厚押百官班特進觀文殿大學士和國公張浚判洪州寳文閣學士張燾知建康府浚以母憂不赴端明殿學士新知建康府程克俊依舊提舉臨安府洞霄宫從所請也左中大夫知洪州王師心復敷文閣待制知荆南府左朝奉郎通判筠州劉章為尚書司封員外郎左朝奉郎通判廬州張晟為司勲員外郎上覽除目曰晟㑹稽人前日論本府科買箭筍擾民想皆曹泳趙士㣓所為魏良臣曰不獨越之箭筍如平江之洞庭柑每對直二千宣之蜂兒每斤三四十千多是科買民極苦之皆郡守無狀以此取恱權倖上乃詔悉罷之因曰朕平時未嘗毫末有取於民如日用紙亦不委臨安府只自令人買於市肆便得佳者良臣等曰陛下聖徳恭儉如此雖古帝王何以復加昭信軍承宣使潘端卿依舊帶御器械庚子詔御前諸軍都統制可依見任管軍法不許出謁及接見賔客内兼州事者依本法辛丑詔殿前馬軍司元差軍兵一百人充秦檜下充白直可令逐司拘收歸軍加封漢將龎統為通惠威烈侯廟在滎州是嵗宗室子賜名授官者二十有一人諸路斷大辟二十一人金主亮隂有南侵之意乃謀遷居南京即汴都遣參知政事馮長寧為留守經畫修内未㡬大火宫室悉為所焚亮大怒降長寧為庶人尋杖之死建炎以來繋年要録巻一百七十
