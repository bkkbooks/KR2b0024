body:
  text: 建炎以來繫年要録巻三宋李心傳撰建炎元年三月辛卯朔范瓊率諸將陳兵以迓張邦昌金人以鐡騎送之及門而返晡時邦昌入居尚書省百官班迎邦昌與百官交拜於道司門郎中徐俯獨不拜持王時雍大呼號慟掛冠而去俯禧子也禧分寕人元豐給事中夏少曽僉言二帥知邦昌不可強乃詭邦昌曰大金皇帝有詔立宋之太子以公為相善為輔助母使敗盟請公入城臣按邦昌上大元帥書叙金人迫脅事甚詳初無此説况太子出城已乆未嘗再入城此説妄也吕好問開具謝克家分析因依状云三月一日邦昌入居尚書省臣為言相公曽察今日人情所向乎今日人情畏金人兵威耳金人去後公保人心如今日乎邦昌曰誠如是臣曰今康王在外元祐皇后在内天意亦可見邦昌曰是邦昌之心也按此事惟好問奏狀及秦湛回天録有之今且附見壬辰金人以兵部尚書吕好問工部侍郎何昌言給事中韋夀隆按北盟㑹編作馬夀隆顯謨閣待制提舉醴泉觀李熙靖左諌議大夫洪芻光禄卿黄唐傳軍噐監王紹按北盟㑹編王紹下尚有吏部員外郎王及之禮部員外郎董逌户部員外郎李健此本無及之健名而後云皆與時雍等同趣當有脱文工部員外郎李士觀刑部員外郎吕勤倉部員外郎曾慥祕書省著作郎顔博文為事務官限三日立邦昌不然下城盡行焚戮都人震恐有自殺者邦昌亦欲自裁或曰相公城外不死今欲以死塗炭一城邪衆人泣勸再三乃止昌言新塗人夀隆餘杭人熙靖晋陵人唐傳侯官人士觀昉孫昉饒陽人雍熙中宰相慥晋江人博文安徳人也昌言芻紹及之健博文皆與時雍等同趣而慥娶吴幵女故金用之實録稱中書舎人李熙靖為事務官按附傳熙靖自西掖出守拱州復以故官召靖康元年除待制奉祠此時不為舍人實録誤也癸巳吏部尚書王時雍等申今來軍民悉愿推戴張太宰縁京城無主日乆伏望早賜遣備禮儀施行金復令吴幵莫儔入城云以初七日行冊命之禮留守司以軍前劄子復湏金銀元數遂分下二十三坊每坊金四十四萬五千兩銀二百八十一萬四千一百五十兩表段八萬四千三百一十六匹下户金亦不減百銀不減千表段亦百餘細民但發笑亦不憂曰金人以立主事恐民不服先以此脅之耳已而果然徐夢莘北盟㑹編載開封府敷配金銀事在此月壬寅與實録不同夢莘所編又云先是城陷之初金人索在京户口數開封府張大其事報以七百萬户至是金人令以人户等第敷配故雖細民下户亦不下金三十鋌銀二百鋌表段五百匹督令日下送納士庶知所配無規但相與戯謔而已江淮發運副使向子諲遣進士李稙賫金帛詣元帥府且悉獻本司錢糧之在濟州者以助軍費王喜遂以稙為承直郎稙招信人也欽宗實録以子諲為發運判官盖因汪伯彦中興日歴所書也按紹興八年子諲乞以靖康中拘張邦昌家属事宣付史館奏状稱任京畿轉運副使兼發運副使今從之鄜延經略使張深自陜府将所部改塗趨虢州初諸帥既集宣撫使范致虛欲盡取五路兵與敵刻日㑹戰經略司主管機宜文字李觀以敵氣方鋭勸深取間道趨京師其實謀避敵也深别致虛致虛大驚曰公獨異議殆假此以歸耳深曰既不能進其可守株以誤國事遂與副總管劉光世合軍而去觀華隂人也深至盧氏縣乃山行出大和谷南之汝州丙申統制官閤門宣贊舎人吳革為范瓊所殺革将起兵其􅄁謀吳銖等曰事急矣緩則且泄有不測之祸夜漏未盡班直甲士崔廣等數百人排闥至革寝所曰邦昌以翊日受冊請舉事革以衆不可奪被甲上馬時已黎明比行至咸豐門四面皆瓊兵瓊以權主管前殿司公事左言謀紿革至帳下議事遂斬之其徒百餘人併戮河上革至死顔色不變革天資忠勇天文地理人事兵機無不通死之日知與不知皆為泣下夏少曽僉言云呉革召集壮士欲奪駕時軍前取去醫人入城買藥材見革説勤王兵皆在近甸敵精軍不滿萬人革信其詭説初五早欲奪門范瓊左言詐而殺之按革自以邦昌僣位日迫倉卒舉事恐非為人所詐也今不取都省禮房告報文武臣僚並以受冊日赴文徳殿立班閤門儀制榜今月七日僧道父老於尚書省令㕔下立俟太宰上馬導引至右掖門先退太宰至文徳殿門下馬仍詣殿東朶殿幄次更衣文武百官諸軍将校文臣選人武臣承信郎已上於殿下東西間面北并設儀仗於殿下排立皇帝望大金國闕設褥位於殿下少立俟冊寳入門至位皇帝降階詣褥位望大金國闕拜訖俟冊寳至褥位讀冊設寳皇帝跪受訖再拜皇帝陞殿即坐文武百官等七拜訖起居稱賀五拜訖退右暁示各令知悉是日吳幵莫儔至自敵營時金人在南薫門謂吕好問曰康王我眼中物當以五千騎取之此據秦湛回天録好問即遣人持書獻王言大王所領之兵度可當則邀撃之不然即宜逺避又言大王若不自立恐有不當立而立者是夕侍從官並宿尚書令㕔以待行事丁酉金人冊張邦昌為皇帝冊文略曰太宰張邦昌天毓疏通神資睿哲處位著忠良之譽居家聞孝友之名實天命之有歸乃人情之所徯擇其賢者非子而誰是用冊命爾為皇帝國號大楚都于金陵自黄河以外除西夏封圻疆場仍舊世輔王室永作藩臣趙甡之遺史邦昌冊文曰無徳而王故天命假於我手當仁不譲知歴數在于爾躬按偽楚録有邦昌冊文今録于此盖甡之傳聞之誤維天㑹五年嵗次丁未二月辛亥朔二十一日辛巳皇帝若曰昔先皇帝肇造區夏務安元元肆朕纂承不敢荒怠夙夜兢兢思與萬國同格于治粤惟有宋實乃通鄰貢嵗幣以交懽馳星軺而講好期於萬世永保無窮葢我有大造於宋也不圖變誓渝盟以怨報徳已下一百一字指斥不録今者國既乏主民宜混同然念厥初誠非貪土遂命帥府與衆推賢僉曰太宰張邦昌天毓疏通神資睿哲處位著忠良之譽居家聞孝友之名實天命之有歸乃人情之所徯擇其賢者非子而誰是用遣使備儀禮以璽綬冊命爾為皇帝以撫斯民國號大楚都于金陵自黄河以外除西夏封圻疆場仍舊世輔王室永作藩臣貢禮時修勿疲於述職問音嵗至無緩於披誠於戯天生蒸民不能自治故立君以臨之君不能獨理故署官以教之乃知民非后不治后亦非賢不守有國者可不慎歟予懋乃徳嘉乃丕績日慎一日雖休勿休欽哉其聼朕命前期有司設褥位於宣徳門外平旦邦昌自尚書令㕔乗馬入次慟哭乆之步至御街望金國拜舞跪受金使韓正退邦昌服赭袍張紅葢百官導引步自大慶殿至文徳殿前進輦却不御步陞殿於御榻西别設一椅坐受軍員等賀訖文武合班邦昌乃起立遣閤門傳令云本為生靈非敢竊位王時雍等懇奏復傳㫖云如不䝉聼從即當引避時雍率百官遽拜邦昌急囬身面東拱手而立有衛士曰平日見伶人作雜劇装假官人今日張太宰却装假官家是日風霾日色薄而有暈邦昌之受冊也百官皆惨沮邦昌亦變色惟王時雍吳幵莫儔左言范瓊等數人欣然若有所得上皇在青城聞之曰邦昌若以死節則社稷増重今既立異姓則吾事决矣因泣下霑襟此據曹勛北狩聞見録時上皇又遺左副元帥宗維書乞東南一郡以奉祖宗遺祀宗維不許王若冲北狩行録云軍前已議北遷令姜堯臣書冩劄目投尼瑪哈國相其劄目曰某素慕山林謝事罷政之後止管教門公事某之罪失固不可逃責念兹神御逺遷異國欲乞東南一郡以享祖宗血食不勝大願之至曹勛北狩聞見錄云金人凡有計議只在淵聖御前奏稟隔數日一遣人起居徽宗到寨十餘日自製劄子一通與相國云某頃以海上之盟謂歡好可以萬世雖嘗招収張珏繼䝉湏索即令戮以為報意罪不至甚而大兵踵來乃指為釁某即遜位避罪南去後塊處道宫恬飬魂魄未嘗干預朝政而奸臣伺隙離間父子雖大兵南來亦不相關報致煩天討宿甲臨城至城破時始知三關敗約所致葢嗣子不能奉大國之約某亦有失義方之訓事遂至此咎将誰執尚有血誠祈囬洪聼某願以身代嗣子逺朝闕廷却令男某等乞一廣南煙瘴小郡以奉祖宗遺祀終其天年某即分甘斧鉞一聼大國之命誠迫意切顒待台令劄子去後二日有蕃使來云承示文字但三關之盟初不恁地止説子孫不紹社稷傾危雖承劄子却不敢背元約吏部尚書王時雍乞差官分管職事此據吕好問開具因依状以時雍權樞宻院事兼權領尚書省兵部尚書吕好問權領門下省開封尹徐秉哲領中書省尚書左丞馮澥守舊職延康殿學士提舉萬夀觀李囬權右丞偽楚録三月八日李回元係簽書樞宻院事權依舊十八日權領中書省二十五日自權禮部尚書乞罷尚書領省事四月初九日乞罷權右丞皆與實録不同翰林學士承㫖吳幵權同知樞宻院事吏部尚書兼翰林學士莫儔權簽書樞宻院事按實録時雍儔皆自吏書除不知吏書何以有二員據儔除吏書在去年六月癸夘時雍不見除日當是儔從駕徃金營而時雍併攝之耳沈良餘録云邦昌既立以時雍為太師何烈草史云王時雍領三省事徐秉哲權門下侍郎皆誤記也今不取大理卿周懿文為開封尹吏部員外郎王及之權都水使者大抵徃來議事者幵儔也逼逐上皇以下者時雍秉哲也脅懼都人者范瓊也遂皆擢用回江寕人靖康初簽書樞宻院事及是前執政在城中者惟回一人時馮澥曹輔留敵營邦昌素善澥将歸之而輔不在請中故以回補其處時雍既受命請用二府葢薦許之都人號時雍賣國牙郎按紹興中王次翁曽統謝祖信劾趙鼎受邦昌偽命為京畿提刑退而告人有親奉玉音之語而實録不書葢誣之也吕好問開具因依状云初七日王時雍乞差官分管職事其時吕不肯承當門下省人吏來參臣亦設椅請坐以示堅不承當之意邦昌自謂臣曰忘省中之語耶若虛着窠闕被軍前差将人來如何臣當時已傾心陛下再三思得利害實如此若軍前差人則城中束手做事不得矣所以含羞忍耻者以圖大計也好問此説雖以自辨理亦有之今併附見邦昌之僣立也有司趣百官入賀太學博士孫逢獨堅卧不屈夜既半同寮強起之不從垂泣而與之訣事畢有司舉不至者以逢及駕部員外郎喻汝礪為請欲以復於金人邦昌以畢至告乃得免逢聞之曰是必将肆赦遷官以重汚我我其可竢遂發疾而卒逢眉山人也逢事迹據汝礪所作傳修入譚篆作汝礪年譜云公既不屈節乃為主議者觧赴軍前二帥倨坐見公責其不從軍令公大言曰鉅宋恩澤在人天命未厭忠義之氣形於詞色或欲辱公二帥曰此義士各為其主姑釋之按史及諸書汝礪未嘗出城篆葢妄也戊戍尚書吏部侍郎謝克家兵部侍郎盧襄中書舎人李擢並落致仕集英殿修撰范宗尹權右諌議大夫克家良佐弟子良佐見今年八月壬申襄西安人擢歴城人也克家以疾辭邦昌遺之書曰既無由自裁不食五七日又不能死顧豈得已哉公能諒此心則共安海内以究逺圖之事尚可冀也况銓綜舊職非敢以此累公公無以疾辭則幸甚書用尚書内省之印龍圖閣直學士胡直孺權户部尚書司農少卿胡思權户部侍郎户部員外郎葉宗諤權司農少卿顯謨閣待制李熙靖詹乂並權直學士院熙靖不受宗諤泰寕人乂縉雲人也己亥王時雍權領尚書門下省事時吕好問未就職故時雍兼之邦昌遣户部侍郎邵溥使左副元帥宗維中書舎人李㑹使右副元帥宗傑報以欲詣軍前致謝二使及門先以状申金答云皇帝不湏出城好治人民竢要相見自徃請也庚子金人來取宗室徐秉哲令坊巷五家為保毋得藏匿開封少尹夏承力争不聼添差少尹余大均主其事前後凡得三千餘人秉哲悉以使引押赴軍前當行者皆令衣袂相聨屬而徃濟王之夫人曹氏避難它出秉哲捕而拘之此以欽宗實録趙甡之遺史李綱進退志趙子崧家傳參修開封府捉事使臣竇鑒曰我生為大宋之臣豈忍以大宋宗族交與敵人乎遂自縊而死權户部尚書胡直孺免權職太府卿朱宗權尚書刑部侍郎户部員外郎陳師尹權太府卿庫部員外郎葉份權左司郎官户部員外郎李健權右司郎官宗紱子紱仙遊人嘗為給事中份劍浦人也河東軍賊髙才以二千人歸正出語不遜王誅之命右軍統制苖傅代領其衆傅盡収才金帛子女王曰傅賊耳與才何異自此惡之金人自宛邱引衆逼興仁列寨而屯復分兵犯開徳宗澤遣統制官孔彦威與戰敗之度敵必犯濮州急戒右文殿修撰權邦彦以所部冀州兵為之備敵果至與戰又敗之辛丑金人遣慶賀使崇禄大夫兵部尚書髙慶裔副使彰武軍節度使李士遷入城其書曰固倫尼伊拉齊貝勒左副元帥皇子右副元帥同致書於大楚皇帝向承明詔擇立賢人爰及庶士之謀已諒英聰之徳具聞天闕優降冊書禮命初行羣情胥悦未遑伸於慶牘不圖辱於華緘幸容先導微悰繼陪髙諭别幅遺邦昌衣著百二十叚馬四匹既見邦昌與慶裔等燕于禁中金人分兵犯濟州至栢林鎮距州纔百里王聞之命都統制楊惟忠惟忠愠曰諸少将不出首推老者王曰此遊騎伺吾虛實耳乃令惟忠警嚴五軍翼擺堤上張滿以待又命中軍統制張俊以所部為疑兵夜金㧞寨遁去是日知冀州權邦彦與敵再戰殺傷相當京東轉運判官直龍圖閣閭邱陞亦以所募民兵出戰宗澤自南華縣遣二千騎援之敵引去復向開徳邦彦與澤所部統制官孔彦威夹擊大敗之陕西宣撫使范致虛兵潰于千秋鎮初致虛率諸路兵過陕州與敵遇戰十數殺傷相當復得潼關參議官趙宗印以舟師至三門集津亦累得小㨗致虛乃授宗印河東制置使整軍出潼關偽西京留守髙世由聞之遣使告急于左副元帥宗維乞兵為援宗維謂諸将曰致虛儒者豈知用兵當使斥堠三千殺之按北盟㑹編作當明斥堠使三千人破之致虛前軍出武關由鄧州澠池之間屯於千秋鎮宗維遣貝勒羅索将精騎自伊陽直衝之王師不備遂棄輜重而奔死者幾半西道副摠管孫昭逺環慶經畧使王似熙河經畧使王倚留居陕府致虛収餘兵入潼關世由瓊孫也致虛之離陕也裨将李彦仙説致虛曰陕為軍後盍少遺之兵行者利速多為支軍則舎不致淹敗不致覆不然衆屯聚出殽澠一䠞於險則􅄆矣致虛業已發傳怒彦仙沮觧罷不用彦仙彭原人後徙鞏善騎射喜言兵嘗為种師中部曲入雲中斬首二級稍得遷校尉其説致虚不見聼至是果敗致虛千秋之敗按趙甡之遺史及李觀紀行録皆在三月十一日辛丑而實録於三月末附書之盖不得其本日也實録又稱自正月至三月十五日大戰十數既得潼關乃引衆東出亦恐差誤壬寅金遣使入景靈宫取神御等物此據實録未知與宣和録正月戊申所書有無重疊今且兩存之自邦昌出令之初王時雍等皆以聖㫖行下邦昌下令曰夫聖孔子不居則予豈敢自今議定及面陳得㫖事稱面㫖内批稱中㫖傳諭所司稱宣㫖以手詔為手書偽楚録邦昌下令曰予以寡陋向逼大國之威俾救斯民於兵火而諸公横見推逼不容自裁忍死以理國事豈其心哉顧徳弗類實難稱塞出令之初有司乃以聖㫖行下載循昩陋殊震危𠂻夫聖孔子不居則予豈敢自今與三省樞宻院議定處分及内外官司面陳得㫖事稱面㫖内廷及批出文字稱中㫖遣官傳諭所司稱宣㫖洪惟非常之變適遭㑹於斯時尚冀有永之國訖敉寕於區夏庶幾多士共識此懐靖康野録云邦昌内批稱中㫖命於外曰命㫖與此不同盖傳聞之誤今不取工部侍郎何昌言請更名善言避邦昌名也其從弟通直郎昌辰亦請於吏部更名知言時奉直大夫致仕徐俯居城中買一婢子名之曰昌奴遇朝士至即呼前驅使之是日兵馬副元帥宗澤與金人戰於韋城縣敗之金人既為權邦彦所却澤因約知深州直秘閣姚鵬同進兵鵬未至澤自引所部至衛南候騎報敵壘近宜少避澤曰将孤兵寡不深入重地無以取勝澤揮戈直前親冒矢石與戰敗之敵益濟師官軍不利将士傷重者什二先鋒将果州刺史王孝忠戰死士卒知退無所恃人人争奮敵大敗斬首數千級遂得韋城縣敵欲夜襲澤澤知之日暮移軍南華敵果夜至得空壁大驚自是不復出澤在軍中與士卒同甘苦故人樂為用汪伯彦中興日歴云三月辛巳開徳府宗澤申金人十日自衛南前來侵犯乞應援十六日丙午宗澤申金人十日己午間近䕶城堤統制官孔彦威交兵申酉間殺退十一日辰巳間再向前來本軍差權邦彦下官兵併力殺退當夜三更㧞寨遁去奉王㫖行下不得追襲恐落奸便十九日己酉據副元帥宗澤下敗兵五人前來稱宗元帥十二日領兵追襲待徑入京城下觧圍當日到衛南逢伏兵殺退東趣南華縣兵敗宗元帥易衣裳随敗兵夜走奔北續據澤申如敗兵所説外見於雷澤縣招集潰兵乞給噐械澤先造戰車一百五十輛大而難運推駕者苦之一旦遇敵倉卒皆委而走金人以戰車盡載澤軍實而歸王聞之曰吾見澤戰車大不適用徒費工料澤不聼今果資敵矣初劉浩剏造戰車五兩試之不可用軍中闕衲襖乃提軍見澤為車陣圖以獻澤喜問所闕浩既得衲襖不告而還澤遂以浩所圖妄稱見造成車一百五十輛已募到民兵一萬五千人謀復真定朝廷壯之除秘閣修撰河北民兵總管其實無一人一車也方且圖之耳逮帥府遣徃開徳乃旋用浩車制剏造而終於敗耿延禧中興記云宗澤權邦彦自南華入遇敵騎卒至西将王孝忠死澤邦彦更士卒白布衫草履夜走姚鵬軍所製戰車五百兩使民兵御之民兵棄車走為敵所得以載城下所獲金銀歸後建炎初河北㓂皆澤麾下潰卒也按伯彦延禧與澤議論不同詞多毁澤又二人所進書皆出於澤死之後恐未足信今以欽宗實録及澤遺事参修戰車事今年九月乙巳注可考先是知博州孫振以軍民之兵二千人至冠氏縣按博州有冠氏縣原本冠誤㓂今校改王命屯濮州受澤節制去年十二月己丑至是聞澤與敵戰其親兵皆懼且懐鄉土乃殺振分取軍實散而北歸振傅父也耿延禧中興記云振墜馬死今從汪伯彦中興日歴竢考癸夘吕好問權領門下省職事好問雖繋新銜仍莅舊職太學博士朱震致仕震邵武人也元帥府寮屬聞金人立張邦昌欲奉王至宿州駐軍謀渡江左先鋒輜重至山口鎮三軍籍籍謂不返京師而迂路何也王聞其語遂罷行欽宗實録以宿州之行為黄潛善建議按中興日歴罷行在三月十三日癸夘此時潛善在興仁三月二十七日丁巳潛善乃至濟州實録誤也盖耿延禧中興記初不深考附此事于潛善至濟州之後而史臣遂因之是時耿南仲汪伯彦在濟州未知的是何人建此議今但云帥府寮屬竢考宗澤自南華遣兵過大溝河襲金又敗之甲辰金人遣髙慶裔入内藏庫又命歸徳軍節度使王汭與慶裔偕來汭燕人也是日領門下省吕好問以私財即永慶院啟建聖夀節道塲慶裔適入城衆皆恐懼好問獨不顧實録甲辰金人入内藏庫而無其名三國謀謨録是日慶裔等入城而無其事今参取修立汭所領節度要盟録二帥再問罪書中有之邦昌以書至軍前論根括金銀事書曰比以冒膺縟禮願展謝悰雖瀝貢於忱辭終未親于台表退増感悚豈易敷陳載惟草昩之初實軫阽危之慮民志未定故未可以得其心事緒實繁念将何以息其動前朝昨奉台令取索金銀表叚以充犒軍伏自入城以來講究民間虚實乃聞罄竭悉以傾輸嗣位之初朝夕祗畏戒諭官吏罔敢弗䖍仰荷大恩敢不論報雖割肌體豈足能酬然念斯民困弊已甚當圍城窘急之乆有比屋餓莩之多欲撫養則無資以厚其生欲賑給則乏粮以續其命而催科正急刎縊相尋若閱日稍淹則所存無幾非仁何以守位非民何以守邦坐觀轉壑之憂不啻履氷之懼與其跼天蹐地莫救于黎元孰若歸命投誠仰祈于大造伏望察其懇迫賜以矜容特寛冒昧之誅誕佈蠲除之惠則終始之徳遂全億衆于死亡報稱之心敢憚一身之糜潰期于沒齒以答隆恩又乞徃謝二帥大楚皇帝張邦昌謹致書于國相元帥皇子元帥今月七日伏奉皇帝聖㫖特降樞臣俯加封冊退省庸陋之資何以對揚休命前此固嘗死避終不獲辭載惟選授之初盡出薦揚之賜尋因還使附致感悰願亟拜于光儀庶少伸于謝禮未聞台令殊震危𠂻遂遣從官具敷勤懇重䝉開諭仰識眷存然而淹日未前撫躬無措恐有失于稽緩實深積于兢惶伏望恩慈早容趨詣俟承報示徑伏軍門拳拳之誠併留面叙不宣謹白鄜延經畧使張深引軍次魯山縣時西道都總管王襄亦在焉襄議與深合軍深以襄所統皆烏合不從乃趨潁昌而去乙巳邦昌詣青城謝二帥既至迎接殿下揖而升致賔主之禮酒三行邦昌請不毁趙氏陵廟罷括金銀存留樓櫓借東都三年乞班師降號稱帝借金銀犒賞凡七事敵皆許之丙午邦昌下令不御殿不受朝引對百官于延康殿小軒吕好問家傳云或勸邦昌坐紫宸垂拱二殿好問曰不可邦昌矍然而止按實録初無進説者更竢考詳與執政侍從以上坐議言必稱名飲膳起居不用天子禮遇金人至則遽易服邦昌雖僭立其處大内多不敢當至尊之儀有華國靖恭夫人李氏者數以果實奉邦昌邦昌亦厚答之一夕邦昌微有酒李氏擁之曰大家事已至此尚何言即衣之赭色半臂益之以酒掖邦昌入福寕殿使其育女陳氏侍寝其後因邦昌之姊入宫乃留其從者而易陳氏以歸王明清揮麈後録云道君在端邸有妾彭氏稍惠黠上憐之以小故出為都人聶氏婦上即位頗思焉復召入禁中恩倖一時舉無與比父黨夫族頗招權顧金錢士大夫亦有登其門而進者二聖北狩彭氏以無名位獨得留一夕邦昌有酒彭氏衣以赭色半臂掖之入福寕殿使宫人之有色者侍寝邦昌既醒急觧其衣起就它室固已無及矣其後邦昌得罪者以此按史及李綱建炎進退志所書乃李氏事首尾甚詳明清所云疑姓氏或悮姑附著此今年七月丙辰行遣王時雍每日白事屢以陛下呼之邦昌叱之乃退徽猷閣直學士知淮寕府趙子崧聞張邦昌僭立即以状白王乞遣師要撃河上迎請兩宫問罪僭逆且言國之存亡在此一舉若有獻議擁兵南渡者似未可聼大王麾下皆西北人孰肯渡江渡江之後中原豈可復収莫如自近舉兵要撃此為上䇿子崧燕懿王後淄恭憲王世雄孫也燕王生英國公惟忠惟忠生韓國公從靄從靄生世雄世雄生贈通奉大夫令郯令郯生子崧丁未邦昌下令曰嗣位之初宜廣推恩霈今四方道路未通致赦宥未能宣布縁京城圍閉日乆下項事可以先次施行應罪人常赦所不原者並與釋放文武臣僚皆遷官特奏名三舉以上及府監諸州觧首並與推恩廂禁軍依例犒設應見行法令典章百司事任職務一切依舊内有於民不便者䑓省寺監條具以聞仍許諸色詣鼓院奏陳當議􅄁詳更定以從民欲邦昌偽赦全文云三月十七日三省樞宻院同奉面㫖嗣位之初宜廣推恩霈今四方道路未通致赦宥未能宣布縁京城圍閉日乆下項事可以先次施行應罪人所犯無輕重不以已未發覺常赦所不原者並與釋放應文臣承務郎武臣承信郎以上并内臣及致仕官並與轉官在職選人循資校尉比類施行合磨勘者仍並不隔磨勘文武陞朝官并禁軍都虞候以上父母妻未有官封者並與封叙亡歿未封贈者並與封贈已封贈者更與封贈祖父母在願回授者聼應禁軍正副指揮使已上各特與兒男下班祗應一名應承務郎以上服緑緋及十五年不以贓私罪並與改轉服色開封府國學及别試所去年秋試得觧舉首特與推恩餘並以今年八月鎻院省試應合特奏名人並與免試内曽經六舉以上到省人與補登仕郎五舉人與補京府助教四舉上州文學三舉下州文學兩舉諸州助教錫慶院試中在學不係在學生免廷試推恩人諸路觧到武藝合格人等並照原降指揮分等参酌推恩應命官除名追降官資及勒停終身不齒放歸田里人等及永不収叙人並與叙元官落職人與復舊職令刑部檢舉奏聞應停降諸色人等未曽叙用者並與特叙元職名其永不収叙人依此以次遷補候有闕収補應配軍因圍閉未出京人候開門日配沙門島並配鄰州見分配在京重役處者仰刑部疾速具元犯取㫖放令逐便應逃亡軍人及潰􅄆人兵除依累降指揮招集出首外慮有未出首人可特展一月首身其存恤等事並依已降指揮應係官司欠負不以名色貫伯並行蠲免其私債元無利息者限一年外許理索諸軍縁借請之類見尅請受者並特與除放耆老並賜粟帛令户部支給價錢官私房錢不以貫伯並放三月出糴米麥雜豆以濟貧民雖已降指揮減價尚慮民間不易可令更與減價出糴仍約束逐塲人民擁并仰户部踏逐應有係官木植及空閑屋舍添置賣場以濟細民無致阻滯掩骼王政所先當草昩圍城之中不忍視其横逆應亡歿貧民仰開封府量給官錢充𦵏送之費應細民疾病貧乏無藥者令開封府疾速措置差官分定坊巷就門俵散官藥諸軍疾病合給官藥縁多事之際給散不時仰馬軍司體度速支官錢廣行合藥俵散其諸軍差發到軍兵保甲等有疾病者令所轄官司依在京軍營法醫治應伎術人等并家属取赴軍前所抛下財産其有分人許經開封府自陳騐實給付應寺院宫觀有隔下發放等恩澤各令自陳所属保明申禮部限三日給降度牒應特㫖還俗僧道特與依舊為僧道令開封府給公據應禁宫觀寺尼女冠令所属取問願歸俗者聼從便應見行法令典章百司事務職任一切並依舊内有于民不便者䑓省寺監條具以聞仍許諸色人經鼓院奏陳當議􅄁詳更定以從民欲牒奉敇如前宜榜河南暁示各令知悉牒至准敕故牒初金人欲令邦昌肆赦吕好問曰赦書日行五百里今四郊皆敵相公尚誰赦邪遂先赦城中延康殿學士李回辭權右丞改權禮部尚書偽楚録戊申徐秉哲權領樞宻院李回權領中書省吳幵權同領尚書省按史邦昌訪尋大元帥偽尚書省劄子李回押字而吳幵無之恐録誤也己酉邦昌遣權國子監祭酒董逌撫諭太學諸生陕西宣撫使前軍統制官翟興襲西京斬敵所命西京留守直龍圖閣髙世由大金随軍轉運使右文殿修撰張友極興伊陽人習知地利范致虚既敗去興間世由之怠出其不意與族弟進提步卒數百巻甲夜趨潜入洛陽擒世由斬之友極前為河東轉運使世由知澤州金人再入以城降因為敵用事見去年十二月戊寅至是就戮金人陷復州庚戍尚書吏部侍郎謝克家户部侍郎邵溥並權本部尚書實録溥權户部在此月丁酉按户書先差胡直孺直孺辭乃改命溥若係之丁酉則不應併差二員實録恐誤今從偽楚録克家出而不治事左司員外郎王琮權吏部侍郎邦昌所除拜皆令吏部賜告身不書年但繋日月邦昌偽命出告不見於史光堯㑹要載閤門宣賛舎人宋源陳乞轉官舊告係三月二十日下庚戌二十日也故因除吏部長貳附見克家不治事據實録所云然宋源遷官係尚書右選所行是時吏書王時雍莫儔在都堂若克家果不治事未知復是何人書告此事當考是時邦昌雖不改元而百司行移必去年號獨吕好問所行文書稱靖康二年辛亥金人以貝勒明珠為河北路統軍屯濬阿里為河東路統軍屯河陽諸軍有不服並令處斬初金人欲留兵為邦昌衛邦昌辭之吕好問謂髙慶裔曰南北異道恐北人不習南朝法令或致驚擾奈何慶裔曰留一貝勒在此節制可也好問曰貝勒貴人南方暑熱即有病恙則南朝負罪益深慶裔然之此據秦湛回天録於是命二人分屯兩河以為邦昌聲援壬子權户部尚書邵溥兼提舉京城所都水使者陳求道依舊職癸丑淵聖皇帝以手劄付徐秉哲曰祖宗創業幾二百年矣宗廟社稷一朝傾危父子宗族不能相保皆因諸公相誤追念痛心悔恨何及見已治行闕少厨中所用什物煩於左藏庫支三千緡収買津發非晚成行勉事新君無念舊主某上徐尹士庶傳聞血淚迸路手札以實録及丁特起泣血録等書参修實録云上三以親札付王時雍徐秉哲泣血録云手札末云前宋趙某上王徐二公而臣家藏圍城中人手記則但云某上徐尹盖秉哲本尹開封故也夏少曽僉言靖康小録皆載上批但語小異耳少曽所記又云秉哲得之而泣恐未必然今不取邦昌命應文武官被㫖權攝職事者令尚書省出劄子請給恩數依正官法非被㫖兼舊職者並罷尚書左丞馮澥簽書樞宻院事曹輔侍衛馬軍副都指揮使郭仲荀等歸自金營時邦昌遺金書曰比膺詔冊獲撫邦封載惟草創之初方賴臣工之助竊以左丞馮澥國之老成管軍郭仲荀衆推忠謹此外臣寮等或因扈從前帝或因差充在軍如非台意欲留之人乞示慈恩遣還之命左副元帥宗維許之澥仲荀歸輔與譚世勣孫覿汪藻祕書著作佐郎沈晦鴻臚寺主簿鄧肅亦因得歸覿在烏凌阿色哷美帳中未與遣有小卒教覿以姓名屬髙慶裔慶裔乃釋之晦文通孫文通錢塘人治平中翰林學士名犯太上嫌名舊從肅王出質肅沙縣人也輔入城遂卧家不出括初太常少卿劉觀在圍城中與少卿兼權起居舎人汪藻謀夜以栗木更刻祖宗諸后神主二十四而取九廟神主累朝冊寳金鐘玉磬悉埋之太廟中觀眉山人也此事不得其日據觀行状在今春而藻正月十日已從駕出城恐是觀因敵入景靈宫取神御物而有此謀故附藻入城之後或可移附正月己亥淵聖臨出城時是日罷括金銀時邦昌致書二帥懇其事其書曰邦昌聞之先聖云何以守位曰仁何以理財曰義人君之於天下惟以百姓為本百姓之不存則社稷無以固其重人君不能保其尊又况創業造始之君惟務施徳布惠収天下之心然後作為事業固其根本由漢唐以來率由此道後世子孫終必賴之皆百代不易之理也邦昌材質庸繆道義無聞仰荷大金皇帝天造洪恩遽令軍民官吏推戴冊命畀以南土使主斯民以為屏翰以事大國方夙夜祗懼無以報稱思臨士民坐視困苦莫之拯救痛傷肺肝殞身無門見今京都百姓自來前皇帝朝已根括金銀數次雖有藏匿官吏捜索悉皆罄盡今又䝉元帥科降數目浩大難以充足雖軍前遣人捜檢亦無所得百姓嗸嗸憂疾餓死者日以萬計復懼根括金銀數不能足重念大金皇帝以邦昌主斯民而從政之初民心離散怨謗交興邦昌恐以此主國必致傾仆惟元帥慈恩洪溥智燭髙明曲照物情俯加矜恤止絶再降金銀數目庶使億兆生靈保全性命不陷顛危邦昌所圖竊冀其安仰副大金皇帝建立屏藩之徳邦昌不任哀懇惶懼之至金報曰自來所取金帛皆係犒賞軍兵之所急用雖不能足數亦且期大半今楚國肇造本固則安慮因根括之急重困斯民已議捐止邦昌令尚書省榜諭甲寅從事郎胡把為宣教郎權司農寺丞此必有故當考尚書考功貟外郎虞謩致仕温州觀察使四壁都廵檢使范瓊為京城内都廵檢使帯御噐械鄭建雄樞宻副都承㫖王􅊛為四壁都廵檢使􅊛成紀人也西兵安義潰散無所歸與其徒去為盗掠汝潁間鄜延經畧使張深招降之乙夘邦昌致書左副元帥宗維欲乘大軍未退修城池以備㓂宗維許焉延康殿學士權禮部尚書李回乞罷權尚書以祕殿舊班暫領省事乃以回為資政殿學士領尚書省事位王時雍下尚書刑部郎中張卿材太僕少卿陳冲同幹辦總領起發懿親宅物色冲等至徐王府日呼宫人飲酒歌笑聞者憤之按欵在三月二十五日故附此八月戊午行遣顯謨閣待制提舉醴泉觀李熙靖卒始邦昌以熙靖直學士院熙靖拒之因憂憤不食疾且篤謂友人曰百官何日再朝天乎泣數行下至是卒中興贈延康殿學士丙辰王承制以集英殿修撰兵馬副元帥宗澤為徽猷閣待制賞韋城之功也江淮發運副使向子諲檄廬州宻切關防張邦昌家屬時邦昌之弟邦基通判廬州奉其母以居故邦昌之妻子咸在至是遣人持敇書徃問道出亳州子諲知之即檄郡守直秘閣馮詢提舉淮西香鹽公事范冲使拘之以俟王命詢京子京武昌人元豐知樞宻院事冲祖禹子也祖禹成都人元祐翰林學士汪伯彦中興日歴四月六日元帥府勘㑹張邦昌家屬在淮東寄居劄發運判官向子諲行下所屬州縣嚴為防守在此後八日盖據子諲申到今不别出丁巳金右副元帥宗傑退師道君太上皇帝北遷自滑州路進后妃諸王以下皆從惟建安郡王楧先薨于青城此據靖康皇族數景王把自出郊日侍上皇衣不解帯食不肉味比行鬚髪盡白此據曹勛北狩聞見録時金人以牛車數百乘奉諸王以下自過滑州即行生路至真定乃入城云曹勛北狩聞見録徽宗北狩日乘平日宫人所乘牛車牛五頭次顯肅皇后次厨傳及本殿一行内人車仗次諸王帝姬妃嬪閤分内人不限次叙車計八百六十餘輛自過河經濬州城外敵騎約攔百姓不得看惟賣食物數人近前勛以銀二兩許博易飲食賣人知是徽宗即盡以炊餅藕食之類上進反銀而去自過此州即行生路步人砍窠木騎軍㦸枝梢水即填以草柴路深則疊以甬道䟦涉荒向旬日不見屋宇夜泊荆榛及桑林間雖雨亦進河北泥深沒脛車牛皆屢壊屢死壊不容補死即臠其肉而去又行稍緩則落後車馬從而勦除至暮下程悉以車前轅内向繞三四匝如射帖徽宗居其中又砍枝梢繚以為鹿角持兵備外嚴于出入旋鑿井及打柴草分給造飯然近水處終不肯住坐一行苦乏水造飯大半委頓是後習知遇水處則逐車房院内人各下車取水負薪而從遂得趂明造飯飯罷支散路糧徽宗皇帝共破一羊粟一㪷諸王帝姬及閤分或四位破一羊或六位破一羊米則計人日給二升皇太后皇后别有館伴二人早暮必來瞻見聖容而退如未見湏候見乃退餘房院無館伴至真定府方入城歇泊二日盡换牛乃行縁自京至真定府牛多無草又以疲瘁死者十有四五至是改换自過真定近中山府行少緩日亦行五六十里沈良靖康遺録云二帝之行也分為四處上皇與景肅諸王上與燕越二王及皇太子大長帝姬從鄭皇后帝姬諸王從朱皇后諸駙馬别為一處以鐡騎驅擁而去按史及諸家所記祁王從淵聖燕越王從上皇大長帝姬不在北遷之數良録誤也邦昌法駕縞素率百官詣五岳觀遥辭二帝邦昌慟哭百官軍民皆哭有號絶不能起者信王榛至慶源亡去變姓名匿真定境中是日髙陽關路安撫使黄潜善自興仁至濟州初潜善在興仁募南華縣小吏李宗至京師詗事為邏者所獲捕以見權領尚書省王時雍實録以時雍為權領三省盖承耿延禧所記之誤宗具言遣來状時雍以邦昌事告之且補宗承信郎不受實録作補修武郎恐誤今從汪伯彦日歴耿延禧中興記乞歸報時雍縱之宗得都城所印賣邦昌僣號文金人偽詔邦昌偽赦文以歸欽宗實録云宗得邦昌偽號文金人偽詔邦昌偽赦及迎立太后書各一紙按宗以三月丁巳至濟州而邦昌四月丁亥始冊太后宗自出京至興仁府又自興仁禀命而後來濟州必經涉旬餘則其離京師必在三月半間安得有此畫也盖汪伯彦耿延禧誤記而史官又因之轉運使黄潜厚聞之入見王哽咽不能語王問之潜厚曰二聖已去張邦昌僣立王聞之痛切即與潜厚同見耿南仲召潜善還濟州幕府請以都統制楊維忠代領其衆維忠辭汪伯彦言潜善所部統領官知廣信軍張换有将材乃命换節制興仁府廣濟軍軍馬换陕西人也潜善持李宗書見王耿延禧中興記云王時雍所以告李宗使語潜善者人莫得盡聞也潜善至曹州引宗見上髙世則欲與宗屏人語潜善随之潜善又引宗至臣南仲麟嘉堂臣延禧呼李宗語潜善亦随之潜善退李宗後失所在或云為潜善所殺故或謂潜善得王時雍書不知何等語懼李宗以告人耳按日歴紹興中趙鼎嘗以此事奏陳上曰不然當時措置皆是潜善李宗見存自可問也然則宗未嘗死特延禧怨潜善當國斥己而誣之今不取王讀之涕泣戊午王以集英殿修撰兵馬副元帥汪伯彦為顯謨閣待制充元帥復潜善徽猷閣待制充副元帥汪伯彦中興日歴潜善自河間初來已帯待制誤也按潜善是時奪職未復今始還之當以實録為正㕘議官龍圖閣直學士耿延禧為樞宻直學士徽猷閣待制董耘為徽猷閣直學士親衛大夫明州觀察使髙世則為遥郡承宣使随軍轉運使中大夫梁揚祖為集英殿修撰中興日歴揚祖前銜係帯直徽猷閣今從實録随軍應副直顯謨閣黄潜厚陞直龍圖閣幹辦公事直秘閣王起之陞直龍圖閣朝請大夫楊淵朝請郎秦百祥並直秘閣世則不受潜厚謝王訖以與揚祖並為漕臣而汪伯彦除己職獨異不肯用新銜中興日歴潜厚自小龍除祕撰亦誤今從實録及中興記邦昌遺金書曰孫傅張叔夜秦檜縁請存于趙氏遂留寘于軍中既知徇義于前朝必能盡心于今日宜䝉寛宥使遂旋歸不許邦昌書云比瀝懇誠仰干恩造丐舊臣之復職䝉英亮而遣還已荷隆施尚餘至悃伏念撫封之始尤先盡節之襃庶靖國人以彰名教孫傅張叔夜秦檜縁請存於趙氏遂留寘于軍中既知徇義于前朝必能悉心于今日恭惟上國方慎宏圖以忠孝而勵羣臣以信義而開鴻業宜䝉寛貸使獲旋歸式昭全度之仁垂副愚􅇆之願其如䖍叩曷究敷宣金人答書云早承懿諭願還舊臣以謂馮澥國之老成郭仲荀衆推忠謹此外臣寮如非欲留之人乞下遣還之令其已旋歸者係裨賛時政或有未還者俱是欲留仰冀照知無煩理㑹遣資政殿學士提舉醴泉觀路允廸中書舎人張澂還京師允廸宋城人靖康初以簽書樞宻院事使左副元帥宗維軍言割地允廸以元年二月丙午出使未見罷時為所拘至是得釋金人遣蕭慶來議以陕西沿邉城寨畫界與西夏邦昌遣權吏部侍郎王琮徃謝且辭之金不許金又遺邦昌書言地有分割民有凋弊特免嵗貢錢一百萬緡銀帛二十萬匹兩每嵗只議納三十萬匹兩銀帛各半邦昌書云比馳柔翰冒貢忱誠冀還文武之官庶裨中外之任載惟僣率深負兢惶豈意台慈曲垂鍳炤馮澥郭仲荀二員既䝉矜允曹輔譚世勣以下悉已獲歸仰荷隆恩實出望外至于親加訓誡俾䖍臣節之修俯念孤危允頼臣工之助以至金帛犒賞之數實軍前急用之資䝉深軫于疲羸遂獲紓于根括興言肇造之本賜以安固之圖豈惟億姓之生靈盡歸元造兹為萬世之大惠曷報鴻私罄筆舌以難周銘肝心而莫致今差吏部侍郎王琮恭詣帳前伸謝仰惟英聰俯見卑悃金人書云㑹騐宋時除依遼國舊例嵗納銀絹五十萬匹兩錢一百萬貫初以代燕地所出今若依舊例輸納且念地有分割民有凋弊特免錢一百萬貫减放銀絹二十萬匹兩只議納三十萬匹兩銀絹各半其數依舊例交割秘書省著作郎沈晦以所假官真拜給事中己未金兵下城盡絶我兵分四壁屯守邦昌詣敵營辭服赭袍張紅盖王時雍徐秉哲吳幵莫儔從所過起居並如儀二帥見邦昌請還孫傅等書大怒曰取三人者豈非欲講前日事邪遂面詰再三且云今若縱兵非無名然亦駐兵不逺當觀釁而動邦昌懼不能對及午還宫初孫覿既歸金人以覿初不與遣復追還之覿即舎旁從刑部郎中張卿材自匿又間行詣權刑部侍郎朱宗越七日金使坐都堂趣還甚急而卿材從開封吏卒至門宗以計緩之翌日敵引去覿乃得免元帥府斬閤門祗候侯章初命章監丁順軍章聞張邦昌僣立自廣信軍馳至濟州言曰事已如此諸公别無措置奈何且以言侵汪伯彦等伯彦請于王以章扇揺軍情斬以徇汪伯彦中興日歴云侯章本出入張邦昌門下至是以險語迫王勸王急為渡江計自具呈擅作大元帥府京東等路幹辦公事入銜與丁順同共措置招収人兵先計㑹案吏挿入熟事文字帯押王送伯彦面呈伯彦言章外則倡言扇揺軍情内則懐姦逼逐大王聚兵作過乞斬章以徇潛善延禧耘世則皆憤疾曰可斬王曰且與送獄尋捜到丁順所與章戰袍頭巾及丁順書簡遂斬之人情大定耿延禧中興記云侯章欲徃京城下道逢李宗宗具以事告章章走濟州明言之三軍洶洶云事既如此而諸公别無措置此皆細作耳侯章以先報事為功助三軍鼓倡汪伯彦斬章以徇人情大定二書所云與實録不同盖伯彦已誅章而誣之延禧所云差近事實宗澤自南華移屯臨濮閤門宣贊舎人申彦臣自軍前復還先是有勤王兵至咸平縣敵人遣使來問欲盡殺為復要招安可急将赦書來邦昌遣彦臣賫手書徃金人以三千騎送至咸平以南七十里不見我師而還初有詔起京東土兵射士勤王宿遷尉崔某以所部至沂州荘子城有王嗣者唱衆為亂遂縱掠城中建炎以來繫年要録卷三
