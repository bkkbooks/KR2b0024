十四年七月至十二月巻一百六十八紹興二十五年正月至六月巻一百六十九紹興二十五年七月至十月巻一百七十紹興二十五年十一月至十二月巻一百七十一紹興二十六年正月至二月巻一百七十二紹興二十六年三月至五月巻一百七十三紹興二十六年六月至七月巻一百七十四紹興二十六年八月至九月巻一百七十五紹興二十六年十月至十二月巻一百七十六紹興二十七年正月至四月巻一百七十七紹興二十七年五月至九月巻一百七十八紹興二十七年十月至十二月巻一百七十九紹興二十八年正月至六月巻一百八十紹興二十八年七月至十二月巻一百八十一紹興二十九年正月至四月巻一百八十二紹興二十九年五月至閏六月巻一百八十三紹興二十九年七月至十二月巻一百八十四紹興三十年正月至三月巻一百八十五紹興三十年四月至八月巻一百八十六紹興三十年九月至十月巻一百八十七紹興三十年十一月至十二月巻一百八十八紹興三十一年正月至二月巻一百八十九紹興三十一年三月至四月巻一百九十紹興三十一年五月至六月巻一百九十一紹興三十一年七月巻一百九十二紹興三十一年八月至九月巻一百九十三紹興三十一年十月巻一百九十四紹興三十一年十一月巻一百九十五紹興三十一年十二月巻一百九十六紹興三十二年正月巻一百九十七紹興三十二年二月巻一百九十八紹興三十二年閏二月至三月巻一百九十九紹興三十二年四月至五月巻二百紹興三十二年六月至十二月臣等謹案建炎以來繫年要錄二百巻宋工部侍郎井研李心傳撰心傳精於史學通知故實詳見宋史儒林傳中是書乃纂述髙宗朝三十六年事蹟仿通鑑之例編年繫月與李燾長編相續寧宗時嘗被㫖取進永樂大典别載賈似道䟦稱寳祐初曾刻之揚州而元代修宋遼金三史時廣購逸書其目具見袁桷蘇天爵二集並無此書之名是當時流傳已絶故修史諸臣均未之見至明初始得其遺本錄之而文淵閣書目祗有一部二十册藏諸秘府其他諸家書目亦並未有儲及之者蓋其失傳久矣誠已軼僅存之善本也宋自南渡後史學盛行紀述之書最稱該備迄今存者固多而蹖駁亦復不少獨心傳是編以國史日厯為主而㕘之以稗官野記家乘誌狀案牘奏報百司題名無不臚採異同以待後來論定故文雖繁而不病其冗且其於一切是非得失之迹皆據實詮叙絶無軒輊緣飾於其間尤為史家所僅見即如宋人議論多右張浚心傳獨能直書不諱并朱子行狀而亦不敢盡從未嘗以蜀人稍為掩覆宋史本傳謂其重川蜀而薄東南之士實有不盡然者綜而論之其書雖取法李燾而精審較勝至視熊克陳均趙甡之諸家相去殆懸絶矣原本所載秦熺張匯諸論是非錯謬疑為後人攙入又於本註外載有留正中興聖政吕中大事記何俌龜鑑諸書當亦修永樂大典時所附入者今既無别本可證姑依文錄存間加駁正有與宋史互異者亦各為辨証附注下方其書中所載金人地等名音譯均多舛誤謹依欽定金史國語解之例詳加訂正别為攷證附載篇末用以訂訛傳信仍依原第釐為二百巻至此書命名文獻通考作繫年要記宋史本傳作髙宗要錄互有不同今據心傳朝野雜記自䟦及王應麟玊海定為繫年要錄編次如左乾隆三十八年十一月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀
