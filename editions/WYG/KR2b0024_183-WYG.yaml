body:
  text: 建炎以來繫年要錄巻一百八十三宋李心傳撰紹興二十有九年秋七月壬午朔淮東安撫司言北邊蝗虫為風所吹有至盱眙軍楚州境上者然不食稼比復飛過淮北皆已凈盡癸未上謂大臣曰此事甚異可以為喜仰見上天垂祐之意陳康伯曰載籍所傳盖未之有皆由聖徳所感隣境聞之當自懾伏上曰然使其聞之必不敢妄作矣中興聖政史臣曰古者以災異多興國謂其誠於畏也誠於畏則君徳彰矣朝桑所以彰太戊也鼎雉所以彰髙宗也熒惑所以彰景公也誠矣今夫蝗之来不可祝而去蝗之孽惟苗是食其去而不食果何以致之也徳聞於天且眷之矣金安得而不服臣以謂非誠於畏者不能也御史臺主簿馮方為秘書省正字秘閣修撰知揚州劉岑言右朝奉大夫張松敏給精悍材力有餘徃年梁揚祖在䖍洪頗得松力若使治兵訓民必有可觀乞増置本州通判一員以松填闕從之未㡬諌官何溥以為非祖宗舊制詔松改通判荆南府甲申尚書禮部員外郎楊邦弼守起居舎人右朝請郎知靜江府李如岡復秘閣修撰乙酉詔直秘閣成都路轉運副使王之望充四川制置司類省試院監視左朝奉郎知嘉州何逢原充考試官左朝請大夫知卭州費行之充別試院監視左朝奉郎知榮州李曄充考試官監試官依監學條法取摘試巻詳定類省試勅差官自此始仍以金字牌遞給降勅劄付制置使收掌俟試近發出先是蜀中弛挾書律而就試者率以逹旦為常之望始禁之然卒不果右文殿修撰張子賢子正並充敷文閣待制提舉佑神觀秘閣修撰張子仁充集英殿修撰主管佑神觀仍並令乆任初楊偰以登第故累遷至侍從偰存中子而吳拱以守邊除潭州觀察使於是韓世忠張俊諸子猶在庶僚上以俊贊和議有功手詔今一二大将之子皆已遷至文武侍從而俊之子猶在庶僚乃有是命仍詔自今功臣子孫叙遷當至侍從並令乆任在京宫觀庶㡬恩義兩得永為定法給事中兼直學士院楊椿封還之曰爵秩天下公器陛下縱私之柰清議何上靣諭椿朕欲以虛名奨用勲臣子孫椿曰名器不可假人恐倖門一開援例者衆然卒除之丙戍安化三州首領䝉自臨等來獻方物詔以自臨為三班差使丁亥權吏部尚書同修國史兼侍讀賀允中參知政事戊子主管侍衛歩軍司公事趙密請以本司馬軍親隨二将為中軍餘四將為左右前後軍從之親衛大夫武泰軍承宣使兩浙東路馬歩軍副總管張守忠為侍衛歩軍司左軍統制用趙密請也己丑權尚書吏部侍郎兼史館修撰兼侍講葉義問兼權吏部尚書辛卯故中奉大夫尚書主客郎中林冲之特與致仕遺表恩澤以其家自訴靖康中使金割地死於金國故也初朝散郎尉服死其子紘㓜孫大亷以致仕恩入仕約官至正郎即任紘及大亷累遷至右朝奉大夫遇郊恩任其子敦詩紘訴於朝吏部請官紘而罷敦詩從之壬辰詔潭州觀察使知成州吳拱妻令人許氏特封信安郡夫人癸巳左太中大夫權尚書户部侍郎趙令詪復為崇慶軍承宣使安定郡王已而令詪言自来未有由從官襲封者請得任子孫京秩如舊上許之太府少卿錢端禮充秘閣修撰兩浙路轉運副使中書舎人洪遵言近奉指揮自今功臣子孫序遷至侍從並令乆任在京宫觀永為定法臣伏思之有大不可臣竊計内外将家子孫亡慮二十人若以序遷不出十年西清次對之班皆可坐致恭惟太祖皇帝之世所與開國創業及南征西伐諸大臣功如曹彬潘美王審琦石守信王全斌慕容延釗之徒其子若孫不過諸司使惟彬之子琮瑋以功名自奮王承衍石保吉以聨姻帝室皆為節度使初不聞有遞遷侍從之例今指揮一出使十年之間清穆敞閒之地類皆将種非所以示天下之美觀望收還前詔從之丁酉左朝奉大夫知吉州魏安行為尚書户部員外郎安行自訴為秦檜挾妻家私忿奪去墾田之賞置臣罪籍天下守令以臣為戒法遂不行望檢舉原降指揮使州縣樂於勸課田野日闢戊戌翰林學士修國史周麟之言左宣教郎知雙流縣李燾燾丹稜人已見嘗著續皇朝公卿百官表九十卷詔給劄錄付史館燾博學剛正張浚張燾咸器重之秦檜盛時嘗遣人諭意欲得燾一通問即召用之燾惡其誤國擅權迄不與通故偃蹇州縣垂二十年四川安撫制置使王剛中聞其名奏以為幹辦公事初燾父中任至在朝奉大夫通習本朝典故燾以司馬光百官表未有繼者乃徧求正史實錄傍採家集野史増廣門類起建隆迄靖康合新舊官制踵而成書其後續資治通鑑長編盖始於此右朝請郎韓髦知無為軍右正言都民望言朝廷自紹興二十六年縁諸路州軍縣鎮税場猥多减併一百三十四處减罷九處免納過税五處實仁術也然議者謂經總制錢係州縣以百色官錢分𨽻今既减省輸錢之源即上件錢自合裁减乞命有司除豁年額庶㡬州縣不敢巧作名目並縁為姦從之是晚福州大雨溝澮皆溢潮水因之冒城而入侯官縣民田頗為所壞己亥司農寺丞韓元龍覈實浙西常平米還言一路糶米錢毋慮六十萬緡乞別行收糴從之庚子右朝請大夫江南東路轉運判官李禎為直秘閣江淮等路提㸃鑄錢公事填復置闕上諭宰執曰泉司利害大槩有四坑户銅本人工木炭是也卿等宜諭禎講究利害令鼓鑄復額以稱朕意壬寅利州東路駐劄御前諸軍統制兼知興元府姚仲言被㫖増招官兵三千人乞下總領所支給器甲從之乙巳右僕射湯思退等乞以上親書近降戒驕惰禁賂遺二詔立石於尚書省以墨本頒於中外從之思退因贊雲章奎畫超冠古今上曰朕自少時留心翰墨至今不倦然迄不能臻妙在唐惟太宗好二王書一時翕然相尚歐虞褚薛皆有可觀朕有舊藏文皇數帖其間有好謙自牧上畏天下畏羣臣等語不惟字畫可喜其用心實後世所矜式也初勅令所刪定官聞人滋靣對言按察之吏例舉選人改官任使委責匪輕誠為良法然習行既乆不能無弊凡為薦舉本欲選取材能而或以相成或以彼此貿易或奪於勢力而不能自便其出於誠心薦舉者盖亦無㡬且小官孰不求進則皆務得而爭先奔競成風無復操守及被舉之人他日負犯則一状自陳而已夫舉非其人責豈容免欲乞詔諭有司申言同坐之條重其陳首之法庶㡬舉者知所戒其弊可革矣臣復有管見凡在官者歴任及十考以上則入仕亦積有嵗年矣委無公私過犯則其人亦知愛重矣若此之類雖舉状偶不及格伏望取自聖斷以次量材許其降等遷改既不廢舊制開此公道一門使孤寒亷退者亦有寸進之望或有疑其失於濫者即乞賜裁酌取吏部毎年以來改官中人數約為限格舉状年勞參酌並用少抑貪冒之弊養成亷素之風似為有補詔吏部長貳同加參酌務要精審乆逺可行至是中書舍人洪遵張孝祥權工部侍郎兼權給事中王晞亮議曰臣等竊詳選人改官之法自祖宗以來行之二百年法令章程燦然並具至於今日不能無弊者非法之不善也患在士大夫以私情汨之耳夫自一命以上仕於州縣之間雖有真賢實亷勢不能以自逹於上故為立監司郡守薦舉之法必使之歴任六考所以遲其嵗月而責其赴功必使之舉官五員所以多其保任而必於可用姦贓巨蠧者既有安治之科而齷齪冗懦之輩既無材可以被薦又無過可以斥逐寧予之幕職曹掾之禄使足以代耕至於沒齒而不敢望致身於京官所以分别材否可謂至矣舉之而非其人有才而不見舉是則監司郡守之罪所謂失舉之罰必行之可也今臣僚所建欲以歴任十考舉主不及格者與降等改官揆之人情雖為至公然恐此路一開則有力者惟圗見闕無材者茍冀終更率不過出官十餘年可坐以待京秩此其不可一也今欲約毎嵗改官之員减其分數以待無舉削者則當被舉之人必有失職淹滯之歎此其不可二也京官易得馴至郎位任子之恩愈不可减非所以救入流之弊此其不可三也祖宗法度非有大害未易輕議今一旦欲以二百年之成法舉而易之此其不可四也有四不可事理著明難以如臣僚所請竊謂宜如故事便從之滋嘉興人也按元降指揮令吏部長貳參酌今乃是給舎議上恐日歴或有脱字當求他本參考隆興元年三月己酉减舉主員己酉詔殿前司破敵軍以五千為額時左翼軍之改𨽻者與統制官陳敏所募士纔二千人乃於本司諸軍那摘以充其數荆湖南路提㸃刑獄公事彭合入對言湖南州縣於民間二税之外別令輸土户錢又以税科本色布而髙價折取其直謂之折絶以至受納官物收領詞状之際則取醋息錢又一例均科麴引錢隨科送納名色不一臣在官之日已行禁止乞下本路監司覺察合又言州縣出賣官田之害望痛减定價毋令抑勒户部言自降指揮僅及半年據江浙諸路日前賣到田一百十餘萬緡即非賣不行難以减價乞不得抑令田隣承賣從之庚戍在撥四川經總制并田晟錢糧錢八十四萬緡應副四川増招軍兵嵗計成都路二十萬潼川十萬利路十五萬䕫路五萬此據四川財賦冊明年八月甲寅所書可參考時總領官司農少卿許尹言増招兵校萬人嵗費錢糧二百四十萬引乞将毎年應副田晟窠名錢盡行截撥户部奏田晟窠名錢帛係指擬應副江上軍衣難以盡行截留外有二分錢引三十四萬緡係買發川布赴行在别無支使欲令總領所取撥并令就截合赴行在經總制錢五十萬緡通已得㫖於田晟錢糧内撥五十萬緡共一百三十四萬緡應副支遣從之右朝奉郎通判安豐軍向汋知安豐軍八月壬子朔殿中侍御史汪澈言中書舎人張孝祥輕躁縱横挾數任術年少氣鋭寖無忌憚孝祥繼母纔以父官封孺人孝祥輙乞用已官職躐封恭人父亡即隨子官著令也孝祥盖有無父之心焉事見今年正月辛巳交遊郭世模受財奪官乆矣孝祥曲為經營與之改正復齒仕列世模改正事未見此以私意而壞陛下之法令也黄文昌浮薄沽名之士孝祥則宛轉吹噓致被召命事見今年六月丙寅張松駔儈胥吏之子孝祥則强令劉岑辟倅揚州事見今年七月癸未江續之狡猾貪饕孝祥則愛其奉已為之提擕遂得登聞鼓院事見今年六月辛亥韓元龍資淺望輕孝祥以姻親為之維持欲得總領今年七月己亥以司農寺丞使浙西回此以詭計而誤陛下之除命也又養俠士左鄯輩刺探時事交通權貴蹤跡詭秘方登從班而所為己如此若假以歳時植黨連羣其為邦家之虞當不在盧把之下望早折其萌速從竄殛詔孝祥與外任世模改正指揮勿行鄯押歸本貫續之元龍並放罷既而孝祥乞宫觀乃以孝祥提舉江州太平興國宫自是湯思退之客稍稍被逐矣秘書丞虞允文秘書省校書郎洪遵並為尚書吏部員外郎仍兼國史院編修官太府寺丞陳洪為尚書倉部員外郎左朝請大夫彭合為尚書户部郎中總領湖廣江西財賦湖北京西軍馬錢糧左朝請郎兩浙路提舉市舶張闡為御史臺檢法官癸丑詔田師中妻衛國夫人蕭氏給内中俸從其請也甲寅司農少卿總領四川財賦軍馬錢糧許尹言諸州縣年額贍軍錢物拖欠數多乞候嵗終從本所取其尤甚者具申朝廷重行黜責庶㡬事任歸一舊州縣贍軍錢皆從所𨽻漕司拘催其有稽違漕臣按劾總領所不與故尹以為請三十一年四月己未王之望申明兩浙轉運副使錢端禮言諸路所糴樁積米斛移易借兊者乞以違制論從之詔責授靖州團練副使恵州安置傅選嘗立戰功理宜矜宥可復右武大夫容州觀察使充兩浙東路馬歩軍副總管丁巳執政以皇后生日用例從激賞庫進銀三萬兩充禮物詔今自除皇太后生辰内教犒賞将士外朕生日皇后生日冬年寒食節並减半餘並免宰執奏仰見陛下約已便民恭儉之徳度越前代逺甚上曰前後所進尚有餘若留之不過樁管以備不時之需耳宰執復奏曰此陛下盛徳事各再拜以賀戊午兩浙市舶司言髙麗賈人販到銅器乞收税出賣詔付鑄錢司起居郎黄中兼權中書舎人右武大夫和州防禦使殿前司統制賈和仲以母老乞補外改添差兩浙西路馬歩軍副都總管常州駐劄庚申詔四川等處見在行在進士歸鄉赴試不及可特令就兩浙轉運司附試一次後試者七百五十人詔令觧發十五人壬戍左奉議郎知大宗正丞劉珙為秘書省正字用賀允中薦也大理司直胡憲守秘書省正字癸亥秘書省校書郎林之竒以疾求去改知大宗正丞紹興府供職初侍御史朱倬等言江西漕司米綱積弊詔提轄文思院吕靖徃江西措置殿中侍御史汪澈言靖乃恵卿曽孫傾邪凶狠盖其家法去年被命徃饒州措置鑄錢事妄作威勢干請受財衆所鄙笑詔靖放罷更遣軍器監丞朱商卿措置詔皇后宅教授依太學博士格例通理成資翊衛大夫忠州防禦使利州西路駐劄御前選鋒軍統制吳琦知洋州甲子言者乞倣祖宗舊制許商人般載米斛輸行在諸倉願以茶鹽乳香礬鈔或犀象布帛香藥償其直者聽從之右奉議郎諸王宫大小學教授沈濬為監察御史濬畸之子也詔左朝請郎兩浙東路提㸃刑獄公事徐度左朝請郎兩浙西路提㸃刑獄公事吕廣問左廸功郎朱熹並召赴行在右通直郎知建州建安縣韓元吉令任滿日赴行在皆用輔臣薦也既而左司諌何溥言仰度聖意必以百里之民方安元吉之政不欲遽奪其去然度廣問近除提刑方及數月使果得人則為陛下平反庶獄刺舉百吏兩路受賜所繫非輕今遽令造朝髙不過為郎而使兩路失賢監司視一邑之令反不重耶近者朝廷屢擇郎吏以為監司毎患才難今既知其可用而復不使少安厥職兼恐來者未必如舊重為勞擾望湏其終更特加召擢詔度廣問並俟任滿日與在内陞等差遣溥所奏在是月己巳今聨書之元吉元龍弟熹松子也少孤從延平李侗學弱冠中進士第調泉州同安簿官滿當路尊敬不敢以屬吏相待同安之民不忍其去五年而後罷於是慨然有不仕之志築室武夷山中四方游學之士從之者如市上聞其賢故召之熹卒不至丙寅翰林學士兼修國史周麟之兼侍讀權尚書刑部侍郎黄祖舜兼侍講武功大夫侍衛馬軍司後軍統制劉澤帶御器械以周麟之洪遵張孝祥應詔諭薦也中書奏臨安府老人全富等四人上表賀皇太后壽八十詔皆授官有差丁卯左朝散郎知英州陳克勤請除南雄英連三州經界後州縣所抱丁米舊額從之時克勤已滿秩新守吳名世怒其迎接不如禮摭其用舊例多請驛劵遣小校至南雄州追之克勤憤懣死主管侍衛馬軍司公事成閔丁母憂戊辰詔起復右武大夫忠州團練使殿前司右軍統制輔逵改充本司右翼軍統制贛州駐劄用主帥楊存中請也按右翼軍統制官郭蔚此月方自右武忠團以賞轉遥防未見改除事故當考是日户部郎中總領湖廣財賦彭合入辭自休兵後户部嵗科江西湖廣京西諸路上供錢五百一十萬緡付本所贍軍其間有不敷額錢朝廷貼降一百十六萬緡矣合言樁積寖多嵗計乆乏己巳輔臣請以御前激賞庫樁積錢五十萬緡與之上曰此乃一時之事合所陳嵗計也乃詔嵗以四川經總制錢三十萬緡與之庚午詔御前軍器所官吏工匠並特轉一官資以創造精緻故也辛未詔成閔母鄭氏特贈衛國夫人壬申中書舎人洪遵等言太學武學臨安府學諸生以皇太后聖壽八十上表稱賀文理可採詔兩學大職事十六人並永免文觧兩學小職事四十五人府學正録三人並免觧一次大學五百三十三人武學三十六人府學職事四十人並倍賜束帛小學生四十人及府學諸生皆賜束帛焉殿中侍御史汪澈言直龍圖閣新知洪州蘇簡貪鄙病悴直秘閣知廣州向子忞暴虐苛察詔並落職放罷甲戌侍御史朱倬殿中侍御史汪澈左司諌何溥右正言都民望監察御史任文薦等言奉㫖同議裁减諸司官兼局竊見修書局四處嵗費官吏犒設等錢十五萬餘緡今參照祖宗古制自元豐置宗正寺以玊牒𨽻之今欲不置玉牒所檢討官只以本寺卿丞領編修事又國史院見修神􅈒徽三朝正史乞依舊宰臣提舉其修史同修史共置二員及編修官二員日歴所文字自有秘書省承行不須創局勅令所見修吏部法乞催促投進外官吏盡罷今後或遇特㫖編法臨時委刑部或大理寺官編修應内侍充提舉承受等官及三省吏人供檢並罷從之户部兩浙江湖諸路嵗認發米四百六十九萬石有竒今實發四百五十三萬石兩浙一百五十萬除三十五萬折錢一百一十萬緡今發八十五萬江東九十三萬今發八十五萬江西一百二十六萬今發九十七萬湖南六十五萬今發五十五萬湖北三十五萬今發一十萬且欲依减下之數以慿科降照依限數足熊克小歴載此法於去年九月壬申盖差一年丙子詔右廸功郎廣州南安縣尉傅若贈右承務郎與一子下州文學以若與兇賊徐大刀戰死特録之也戊寅資政殿學士提舉臨安府洞霄宫樓炤知廣州閤門祗候江南東路安撫司凖備將領趙應熊為武學博士翰林學士周麟之奉詔薦應熊㧞自武科通於文義素饒膂力洞逹兵機故有是命己卯起居舎人楊邦弼言紹興起居注未修者凡十六年縁乆無正員因循積壓望令兩省逐月循進外其前未修者毎月帶循一月從之詔知縣獨擅收支錢物不簽押佐官者杖八十用直秘閣知江州汪若海奏也左朝請大夫知邛州費行之為䕫州路轉運判官邛州歳以鹽市民絹四萬二千有竒一絹之直為鹽十五斤吏相承為姦行之増其二盡以予民且除其負四萬五千緡朝廷知其材復進用之龍圖閣直學士提舉江州太平興國宫張宗元卒九月辛巳朔秘書少監任古直龍圗閣知洪州從所請也太尉知荆南府劉錡引疾乞致仕不許詔諸州營田糶稻麥並起赴本路總領所樁充馬料仍令左藏庫計直撥還御前激賞庫用户部請也殿前司中軍都統制邵宏淵添差荆湖北路馬歩軍總管罷從軍既而殿中侍御史汪澈奉詔薦宏淵奮不顧身真萬人敵乃移江東總管十二月癸酉移江東壬午詔委官詳定閩浙廣三路市舶司條法用御史臺主簿張闡請也舊蕃商之以香藥至者十取其四十四年詔㫖即貴細者十取其一十七年十一月詔丁蔲沉香龍腦皆十分抽一闡前提舉兩浙市舶還朝為上言三舶司嵗抽及和買約可得二百萬緡上謂輔臣曰此皆在常賦之外未知户部如何收支可取見實數以聞殿中侍御史汪澈言右宣教郎知英州吳名世所為貪酷自到任數月民之逃徙者二千餘家籍貲者已數十滛刑以逞不可名状詔放罷令提刑司取勘其後法寺言名世贓罪絞詔貸死除名藤州編管仍籍沒家財是夜雷甲申詔建炎以來奉使未還後嗣無人食禄者並予一子官乙酉奉使大金稱謝使同知樞密院事王綸副使昭信軍節度使領閤門事曹勛等還朝入見言隣國恭順和好無他丙戌宰相湯思退等皆再拜賀上曰朕自綸等歸中夜以思不寒而慄盖前此中外紛紛之論皆欲沿邊屯戍軍馬移易将帥及儲積軍糧之類便為進取之計萬一遂成輕舉則兵連禍結何時而已故朕所慮者不在於此而在於彼也今而後宜安邊息民以圗乆長思退曰遣使尋盟和好益堅皆陛下威徳所致然金主亮已定㓂江之計綸所見盖妄也戊子右奉議郎王炎通判湖州辛卯左朝散大夫提舉兩浙東路常平茶鹽公事都絜特轉一官以本路出賣官田及五萬緡户部奏為諸路倡也初以運河春冬水涸詔江湖諸路糧舟皆自鎮江府轉江隂而來至是司農少卿張宗元入對論近糧舟自下江來有全舟俱失人物俱亡者是守閘則有闗津之阻轉江則有艱險之慮二者皆非良便今宜於沿流權就下卸命户部計行在儲蓄之數豫行量度因河流濟通之時令兩浙轉運司隨宜轉般公私兩便先是浙西提㸃刑獄公事邵大受嘗請置轉般倉於鎮江之海鮮堰今年閏六月戊辰未及行於是户部乞如二人言令淮東總領所措置壬辰言者奏吏部依格注授縣令多不得人望倣祖宗故事於京朝官及判司簿尉有考第人内令兩省臺諌卿監郎官各舉所知一二人充江浙荆湖福建繁難縣令仍令監司郡守察其治状連銜以聞如果有美政京朝官則増秩再任選人則减舉主就任磨勘其他擢用固在臨時若此數路得宜則兩淮四川二廣皆可次第而行矣吏部請卿監以上聽保舉如有恵民實迹監司郡守連銜奏聞並陞一任仍以山隂等知縣四十闕依舊歸堂其見任老疾或不任職人令監司郡守體量與祠廟詔給舎詳議以聞三十年正月癸未議上忠訓郎楊賡為閤門祗候利州路第五将賡政子特録之甲午尚書右僕射湯思退遷左僕射參知政事陳康伯守右僕射並同中書門下平章事上謂康伯曰卿靜重明敏一語不妄發真宰相也今與思退共政如有可否不憚商量康伯曰大臣論國事進退人材自當用心若媕婀取容植黨以自固臣不敢也故事宰臣初除例賜銀絹至是思退等辭上曰此舊格何足辭思退等言今國用匱乏自人主及百司皆當節省庶㡬有濟臣等若盡受何以風百僚力請减半上從之省樞密院機速房乙未以皇太后服藥赦天下命輔臣祈禱天地宗廟社稷自是不視朝召輔臣奏事於内殿丙申放臨安府公私僦錢半月詔諸路四等以下户去年未納稅賦兩浙江東西去年水灾賑貸物料及浙東江西民田為螟螣損稻者其租税皆蠲之丁酉减僧道今年免丁錢之半己亥詔見監贓罰及賞錢並與除放皆為東朝祈福也庚子皇太后韋氏崩於慈寜宫年八十國朝典故自南渡後多有司省記至恤章又諱不錄至是一時斟酌皆出於太常寺少卿宋棐而博士杜莘老又以古誼裁定辛丑百官班慈寧殿宣遺誥時百官入臨皆吉服吏部員外郎虞允文獨易服有非之者允文不改俄詔百官易服入内内侍省副都知衛茂實都大監領大行皇太后𦵏事睿思殿祗候馮孝宗造梓宫凡𦵏事之費皆以慈寧殿錢物給之詔三衙皇城司官並依故事宿直壬寅詔權吏部侍郎沈介時暫兼權禮部侍郎癸卯大殮殿前馬歩軍司統制官以下並許就本寨成服自是日再臨前一日宰相召太常博士杜莘老赴堂曰有㫖問含玊之制莘老曰禮院故事所不載以周禮典瑞鄭元所注製之其可因立具奏上覽之曰是真禮官也翰林學士周麟之為大金奉表哀謝使吉州團練使知閤門事蘇曄假崇信軍節度使副之時朝廷已議定遺金金繒等物麟之固請増幣而後行此以梁仲敏劾麟之章疏修附麟之至金金主亮喜其辨利錫賚加厚燕之二日中貴人至館密賜金瀾酒三尊銀魚牛魚各一盤尊盤皆金寳器併令留之麟之以例辭金主不許曰一時錫賚出自朕意何例之有麟之歸以其物繳進上復賜之此據趙甡之史及麟之墓誌修入范成大桂海虞衡志載金蘭酒事云金蘭燕京山名而麟之墓誌所書乃用此瀾字當考甲辰有司以辰日罷哭臨起居郎權中書舎人黄中爭之曰此非經且唐太宗猶以是日哭其臣况臣子於君母乎丁未百官以上未聽政詣文徳殿門進名自是不復臨戊申尚書吏部侍郎葉義問充按行攢宫使内侍衛茂良副之四川茶馬司言昨來差殿前馬歩兩軍自就宕冒峯鉄兩場取馬係本司遣使臣管押立定賞罰故倒斃數少今兩軍遞送無人任責則倒斃數多乞依舊從本司差人押赴興元府交付兩軍從之冬十月辛亥朔不視朝文武百僚詣文徳殿門進名奉慰自是朔望皆如之壬子小祥上詣几筵殿行禮癸丑皇太后殿攢有司以權制已訖請百官以吉服行事黄中復曰唐制啟攢雖在易月之外猶曰各服其初服今以易月故而遂吉服以殯非禮也朝廷用之於是百官常服黒帶入朝衰服行事甲寅上始聽政御慈寧殿之素幄召輔臣奏事命參知政事賀允中撰大行皇太后哀冊文兼書并篆諡寳同知樞密院事王綸撰諡冊文并書兵部侍郎兼直學士院楊椿撰諡議起居舎人楊邦弼為賀大金正旦使右武大夫榮州刺史兩浙西路馬歩軍副都總管張説副之太府卿李潤為賀生辰使閤門宣贊舎人張安世副之詔以保康軍節度使開府儀同三司萬壽觀使吳益為攢宫總䕶使尚書户部侍郎董苹為橋道頓遞使乙卯太尉主管歩軍司公事趙密為修奉總管入内内侍省押班王晉錫為都監睿思殿祗候馮孝宗為承受應營奉事委知臨安府趙子潚知紹興府王師心兩浙漕臣錢端禮應副具數報都大監領所支還時兩使及按行監領修奉五司共辟官屬八十五員而兩浙帥臣監司之屬不與焉丙辰侍從臺諫兩省郎官以上議皇太后諡於尚書省己未左朝奉郎福建路提㸃刑獄公事樊光逺特降一官先是福州水灾而守臣辛次膺提舉常平公事周操皆未知光逺並攝其事不即賑濟上聞之乃有是命辛酉詔監司守臣在外諸軍帥並免進賻贈應已科市於民者皆歸之壬戍尚書兵部侍郎兼侍講兼直學士院楊椿上皇太后謚議曰顯仁癸亥直秘閣提舉兩浙西路常平茶鹽公事楊倓兼權兩浙轉運判官應副頓遞司隨行支費甲子大祥上衰服行禮百官常服陪位丙寅禫祭戊辰上始御前殿直敷文閣知臨安府趙子潚言將來梓宫渡江江岸止有渡船二十隻乞下三衙各借馬軍船十隻并水手應副津渡從之是日頓遞使董萃辭行辛未雨同知樞密院事王綸因奏事言梓宫進發河道無淺涸之患上因論溝洫利害云徃年宰臣曽欲盡乾鑑湖云嵗可得米十萬石朕答云若遇嵗旱無湖水引灌即所損未必不過之凡慮事須及乆逺也綸曰貪目前之小利忘經乆之逺圗最謀國之深戒也癸酉同知樞密院事王綸言密院大事毎與三省同議上曰樞庭雖五代之制疑太祖太宗曽入思慮五代弊法祖宗掃除略盡惟存此一二大者必有深意都民望嘗有疏言軍政豈可令宰臣不與意謂樞庭非法朕已收之矣上又曰大臣固不當疑雖人告其不軌朕亦不信若有姦邪即罷之不當任而疑也綸曰自古帝王用人之道無越於此矣乙亥詔禁止沿淮私渡盗買鞍馬博賣物色已是嚴切尚慮冒利之人或假托貴要或作軍中名目徃來買賣令帥憲知通加意禁約有違戾去處即時奏劾當繼遣御史遍行譏察犯人如有假托追赴大理寺根究從軍法處斷其失察故縱官吏並當編竄逺方旬具有無申三省樞密院詔諸路和糴米斛並募土豪及子本客人自備船裝載毎石千里支水脚錢二百文二萬石補進義校尉其他皆以逺近多少為差除耗及搭帶一分税物如舊用户部請也江西元㫖見二十八年七月庚申丁丑奉皇太后諡冊告於太廟行事官常服吉帶戊寅上冊寳於慈寧殿是日攢宫破土作新城門於候潮嘉㑹二門之間直跨浦橋江次以梓宫所由出也凡經由道隘民居權撤之毎楹賜錢二十千為遷徙之費己卯左朝請大夫提舉江南西路常平茶鹽公事王傳主管台州崇道觀理作自陳先是户部員外郎魏安行自吉州召還言本州官田當賣者計直一百三十八萬餘緡而傳覈實以為可賣者二十二萬緡而已朝廷疑其高下遼絶故有是命仍令提刑司看詳以聞日歴于傳祠命下注云因依未見今以紹興三十年五月辛卯臺諌章疏内掇取修入提刑司㸔詳明年四月丁丑所書是月金主亮再役諸路夫匠造軍器於燕京令尚書右丞李通董之又令户部尚書蘇保衡侍郎韓錫造戰船於潞河夫匠之死者甚衆此據宋翌金亮本未修入張悌正隆事迹二事並在來年正月與此不同十有一月按是月辛巳朔甲申日南至命尚書工部侍郎王晞亮祀昊天上帝於南郊以輔臣皆奉冊寳不克齋故也丁亥參知政事賀允中保信軍節度使領閤門事提㸃皇城司鄭藻為皇太后遺留國信使副故事使者入北境當服黒帶韀至是朝廷慮北廷不從已命允中等隨宜改易允中等至汴京金主亮命吾故叛将孔彦舟押宴且用常例賜花允中辭曰使人之來致太母遺物國有大䘮樂何忍聞况戴花乎其天使怒謂将殺之允中曰王人無暴事固有體吾年餘七十矣當守節而死彦舟觧曰兩國通好乆參政勿動心也揖允中坐命左右捧花侍側而已隨宜改易帶韀据㑹要乃十月丙辰詔㫖今附見熊克小歴載允中至汴京事在月末按日歴允中十一月三十日庚戍方發臨安則其至汴京當在十二月正月之間克盖誤也己丑大行皇太后啟攢上服初䘮之服以祭禮畢更素服還内百官亦如之庚寅百官朝臨左武大夫昭慶軍承宣使董仲永兼權入内内侍省押班壬辰右朝請大夫知真州王珏降一官放罷今後永不得與知州軍差遣以淮東諸司言其用刑慘酷也晁公遡撰珏墓誌銘知真州益務為寛大出俸錢糴未五千餘石以减民輸訟者至論之其情得深自悔謝以去强猾者然後刑之隨部使者有與公不相能誣奏貶秩一等免某部尚書洪遵殿中侍御史汪澈論其枉召還所貶秩提舉淮南東路常平茶鹽公事甲午中書舍人洪遵暫兼權直學士院以楊椿将渡江故也乙未百官朝晡臨丙申顯仁皇后靈駕發引上啟奠於慈寧殿祖奠於庭遣奠于麗正門外禮畢上易吉服還宫太史焚衰服是日行在文臣路祭於城外自選人以上月俸毎千輸三十錢祭畢以其餘輸左藏而后妃宰輔侍從臺諫外戚内侍諸軍将佐皆以壓祭絹賜之有司以鹵簿儀物未備請權以儀衛服紫青褐衣執持儀物代充用昭慈權攢禮也戊戍上御後殿輔臣榻前慰問上哽咽流涕己亥命入内内侍省押班張去為提舉欽奉几筵責授成州團練副使符行中卒于南雄州辛丑閤門宣贊舎人劉炎帶御器械左朝請大夫淮南轉運判官兼淮南東路提㸃刑獄公事孟處義為江南東路轉運判官尚書户部員外郎魏安行直敷文閣為淮南轉運副使兼淮南東路提㸃刑獄公事専一措置淮東營田左朝散大夫主管台州崇道觀徐康知真州丙午顯仁皇后掩攢宫在永祐陵之西去顯肅攢宫十九歩舊下宫分前後殿至是更築前殿以奉徽宗中殿以奉顯肅顯恭顯仁三后神御而後殿奉懿節如故於是始立四隅以二十里為禁城居民皆徙之又有士庶邱墓雜錯其間隂陽家請悉挑去宗正寺主簿權太常丞吳曽從而和之時監察御史任文薦奉詔監掩攢宫就令按視乃挑其近攢宫者百七十有二穴而已此以㑹要參修熊克小歴言獲免者七百六十餘穴此乃汪澈奏請事見明年四月辛未丁未殿中侍御史汪澈言祠部員外郎兼權國子司業張洙神識昏䝉常如醉夢於課程規矩恬不介意國子博士陳豐素無行檢居官蓄妓士所不齒太學博士李石好立邪説敗壞文體傲視流軰不安分義大學正田興宗操心彊狠使氣忽下今春公試嘗取落韻賦入選士人至今傳笑詔並罷先是武成王廟生芝草學官白宰相欲稱賀石謂於五行乃金沴木将為兵兆執政不樂故遂罷學官四人俱罷必有其故也他書不見今以李石方舟集和張益州芝草詩修入按此時朱熙載為武學博士熙載實湯思退所薦或者武學官欲賀而兩學議論不同故也此事當與黄中相闗已見今年四月壬寅李石詩附于後紹興己夘武成廟廟殿之棟三秀芝太學奔走槩多士日遞百匝不蹔離欲奉九重望恩幸寒餓水火如切肌先期到堂白宰相宰相曰可甚易為樂工伶倫餙金玉以薦清廟載歌詩石時官忝博士職豈敢立論超等夷曰此五行金沴木木不曲直嘗聞之将軍鷹揚兆異氣弄兵徃徃憂潢池矧今裕民民未裕聖慮日軫天下飢斯言一出至捩目再召再逐彌嵗時戊申端明殿學士提舉江州太平興國宫折彦質告老特遷左中奉大夫致仕右宣教郎知池州南陵縣葛騏特轉一官再任仍令中書省籍記姓名先是邑民陶滋等詣行在言本縣昨經兵火被害最甚民多流移騏注意愛民流移之人接踵而歸田野開闢相次復舊乞令再任事下本路提㸃刑獄公事陳良翰等究實如滋言故有是命庚午虞主渡江十有二月辛亥朔有司於浙江亭行六虞畢百官奉迎虞主還慈寧殿上行安神禮初議反虞或謂上哀勞欲以宰相行事主議者甚力乃命兵部侍郎兼權禮部侍郎楊椿權宗正卿行事太常博士杜莘老曰古今無是比卒正之癸丑上服素黄袍黒帶素履詣慈寧殿行七虞之祭八虞九虞皆如之左朝請郎知蘄州章燾主管台州崇道觀從所請也右武大夫吉州刺史知杭州崔邦弼移知蘄州甲寅諜報北界掲榜禁妄傳起兵事上曰此事有無固不必問朕觀其科擾勞役民不聊生豈是乆長之道朝廷精擇牧守務為自治安邊息民靜以待之耳湯思退曰彼失人心陛下以聖徳兼愛南北天命不歸而焉徃恢復之期可指日而俟矣乙卯秘閣修撰知揚州劉岑直秘閣知襄陽府向伯奮並别與差遣時言者奏岑志廣而才踈輕財而尚氣雖乆更練而天資素稟未易頓革伯奮褊中而浮外多誕而不情雖無過而緩急恐不可恃望移别路監司郡守使各當其才别選靜重端慤之人徃守二邊以固吾圉從之尋移伯奮提㸃荆湖南路刑獄公事岑明年二月癸亥改除是日吏部員外郎洪邁面對論本朝尤重告老之制宣和以前士大夫未有既死而方乞致仕者南渡之後故實散亡朝奉武翼郎以上率為此舉甚者宰輔大臣考終於内其家發哀舉服已降㫖聲鐘給賻而方且為之告庭出命制辭中不免有親醫藥介壽康之語如故相秦檜万侯卨知樞密院沈與求是已其在外者非易簀屬纊不復有請乞令吏部立法今後當得恩澤之人物故者即以告所在州州上省部然後考其平生於式無累者輙官其後人若真能陳義引年或辭榮知止者則厚其禮節以勵風俗賢於率天下為偽也上曰朕記得此事之廢方四十年當如卿語時執政多以為然而左僕射湯思退難之其議遂寢武功大夫帶御器械劉澤領榮州刺史知襄陽府澤初為侍衛馬軍司後軍統制周麟之洪遵張孝祥奉詔薦其才故復此授澤八月丙寅自統制為御帶己未幹辦内東門司謝琢罷日下押出門以盗賣翠錢入已也庚申尚書左僕射湯思退以永祐陵奉迎録上之藏於敷文閣是日金國賀正旦使施宜生等入境先是宜生坐范汝為事逺竄遂奔偽齊事見紹興二年二月甲子齊廢復為金用累遷禮部尚書至是以翰林侍講學士來賀來年正旦侍衛親軍馬歩軍副都指揮使耶律翼副之接伴使宗正少卿金安節帶御器械韓俁迓之於淮岸安節發舟至中流互問聖躬已宜生遣人謂安節此特賀禮而來迓使安得服黒帶安節答曰太后上仙未逺若純吉服恐或失禮北人曰既以日易月豈得至今未葬安節曰以日易月乃太后遺誥耳主上至孝以未卒哭尚衣素服朝廷百官皆是黒帶北人曰頃者哀謝使之來朝廷以宋國有䘮尚令止樂今宜生等持賀禮而行迓使當以吉禮相待安節曰徃者哀謝使雖在制中不敢易服尊上國也今在境内自當如禮乆之宜生遣人來云請使副自便安節疑其語不誠即召其引接宋國趙選諭之云此事上有朝廷非使副所専日已向暮幸速赴宴有頃宜生等答曰且從所諭相距踰兩時乃至岸先是禮官疑北人不聼奏令接伴使副量度施行十一月辛丑安節固爭乃已辛酉右承議郎知蒋州龔濤直秘閣先是蒋州羣盗謀作亂濤先事擒戮之事聞故有是命左朝奉大夫主管台州崇道觀王揚英卒壬戌上親行卒哭之祭甲子祔顯仁皇后神主于太廟徽宗室尚書左僕射湯思退為禮儀使上服袍履歩導虞主至麗正門外奉辭遂命端明殿學士張燾題神主命嗣濮王士輵安定郡王令詪安慶軍承宣使同知大宗正事士街享於太廟祖宗皆用特羊備樂舞故事題神主畢附享於祖姑之下及是以太廟殿室隘乃設幄於英宗室外之東西鄉用權禮也十月己巳太常寺申初議升祔後百官純吉服而金之弔使未至朝廷疑之禮官楊椿等乃請竢正旦使還條具取㫖明年二月甲子純吉丙寅端明殿學士提舉萬壽觀兼侍讀張燾試吏部尚書初上知普安郡王之賢欲建為嗣而恐顯仁皇后意所未欲故遲回乆之顯仁崩上問燾以大計所在燾曰儲貳者國之本也天下大計無踰於此今兩郡名分宜早定上喜曰朕懷此乆矣卿言適契朕心開春當議典禮燾頓首謝時風俗侈靡財用匱乏燾勸上止北貨之貿易省非時之賜予罷土木减冗吏躬行節儉民自富足上嘉奨再三此並以燾行述修入顯仁皇后所未欲等事詳見日歴明年二月甲子侍御史朱倬試御史中丞左司諫何溥試右諫議大夫左正言都民望為右司諫初上命淮南京西帥漕司講究兩淮荆襄使無曠土以聞直敷文閣新淮東轉運副使魏安行乞募民力田其法曰身勸民墾田及七十五頃者補副尉五百家者補承信郎大率毎招一户墾田三十畝賞錢四千自是等而上之已仕者遞遷有差諸軍所汰官兵願耕者予三月俸牛種廬舎皆從官貸滿五年仍償其田並為永業仍免十年租從之三十年三月癸未所書丁卯以顯仁皇后升祔釋臨安紹興府杖以下罪囚尚書兵部侍郎直學士院楊椿進尚書仍兼權翰林學士延福宫使徳慶軍承宣使入内内侍省押班張去為為入内内侍省副都知右武大夫昭慶軍承宣使權入内内侍省押班董仲永為入内内侍省押班戊辰直秘閣汪應辰試秘書少監左承事郎王十朋守秘書省校書郎成州團練使知閤門事劉允升為和州防禦使以觧帶恩也右朝奉大夫陸亷知楚州藍師稷移知純州辛未同知樞密院事王綸進知院事成都府路轉運判官路允修罷仍永不得與知州監司差遣以殿中侍御史汪澈言其貪墨也初三省樞密院激賞庫及諸書局嵗用錢三十八萬五千餘緡銀六千餘兩而絹不與焉御史中丞朱倬指為永費又言諸路圭租嵗收二十三萬斛有竒錢帛絲麻枲漆雜物不與州縣有過給者倬上此議在四月辛亥時為侍御史上命倬與臺諌給舎議之中書舎人洪遵等奏减給賞等錢二十萬緡舊堂厨萬五千緡東厨萬二千緡玉牒所嵗用二萬四千緡日歴勅令所國史院各二萬餘緡尚書省犒設萬三千緡中書省七千緡密院九千緡今皆捐其數二十二年七月壬戌又减又請州縣圭租如格則止壬申從之左廸功郎鄭聞守太學博士直龍圗閣知鼎州凌景夏乞减程昌㝢所増蔡州官兵衣糧錢六萬四千餘緡詔减四分之一甲戌詔减西和州官賣鹽直之半先是州之鹽官井嵗産鹽七十餘萬斤半為官吏柴茅之費半鬻於西和成鳳州嵗得錢七萬緡為利州鑄錢之本十五年始鹽多地狹毎斤為直四百民甚苦之上聞故有是命是日䕫州大火燔官寺民居甚衆焚死者凡六人乙亥户部言昨令兩浙江湖六路轉運司市軍儲今已糴到一百萬石乞就整更糴二十五萬石上從之中書舍人洪遵刑部侍郎黄祖舜奉詔薦左武大夫忠州防禦使新浙江兵馬副都監李寳勇足冠軍知能料敵以寳為帶御器械時寳自鎮江軍中統制官纔離軍也丙子金國賀正旦使施宜生副使耶律翼見于垂拱殿以諒闇故命坐賜茶正侍郎觀察使以上皆與上服素黄袍黒帶供張皆用素黄衛士常服去銀鵞對鳳侍坐者錦墪易以紫素既見命大臣就驛賜燕不用樂辭亦如之時吏部尚書張燾奉詔館客宜生素聞其名畏慕之一見顧翼曰是使南朝不拜詔者也宜生閩人燾以首邱桑梓語之宜生敬燾頗漏敵情燾密奏之且言宜早為之備上深然其説亮又隱畫工於中即使密寫臨安之湖山城郭以歸既則繪為屏而圗已之像䇿馬於吳山絶頂後題以詩有立馬吳山第一峯之句盖亮所賦也此據金亮本末増修宋翌云此詩翰林修撰蔡珪作詭曰御製按世傳亮詞句頗多未必珪作也王敦詩作王之望文集序曰亮贈其相温都詩曰一醉吳山頂上峯與此小異己卯資政殿學士知潭州魏良臣奉詔薦淮西馬歩軍副都總管兼知廬州劉綱臨戎果敢馭衆嚴明浙東馬歩軍副總管李横知勇無前亷靜不擾詔樞密籍記姓名時綱在廬州籍淮西之民得百餘萬奏言皆可用為精兵其意謂淮南與淮北相接其民習戰故也是嵗宗室子賜名授官二十有五人兩浙等十六路上户部主户七百六十四萬口一千二百八十萬客户三百四十四萬口三百九十五萬皆有畸都計户一千一百九萬一千八百八十五口一千六百八十四萬二千四百一建炎以來繫年要録巻一百八十三建炎以來繫年要録巻一百八十三金人地名考證温都原書作温暾誤今改正
