body:
  text: 建炎以來繫年要録卷一百八十六宋李心傳撰紹興三十年九月丙子朔直敷文閣知閬州王濯提㸃成都府路刑獄公事用臺諫前薦也丁丑左從事郎鄭升之行太學録升之為台州軍事推官未上知樞宻院事葉義問薦其才召對改京秩而升之以未歴考任固辭乃有是命右廸功郎新廣西南路提舉鹽事司幹辦公事李鼎臣言廣西買馬嵗額増損無定沈晦為帥一年所買至三千匹今率不及二千匹若欲買千騎且以中價計之亦不下十餘萬緡况皆本路諸州上供錢買銀每兩三四千其折與蠻夷每兩二千而已折閱太甚伏見亷州白石塲嵗額賣鹽六百萬斤已自有餘而雷化諸州運赴白石塲積而不售者尤衆願令帥司同鹽司相度般運於横山寨以備博馬是以無用為有用也詔兩司疾速措置十一月辛巳上云昨李鼎臣上書言鹽博馬利便十二月二十八日鼎臣請辟海外四州守臣繫此銜熊克小厯載此事止云言者盖不詳考也武徳郎福建安撫司水軍統領鄭慶為武義大夫以本路帥司言慶任統領十八年防扼海道無虞故也戊寅直敷文閣知臨安府黄仁榮以母憂去官己夘權尚書戸部侍郎錢端禮兼權知臨安府長寧軍言夷官武經大夫西南蕃都大廵檢使落邸身亡乞以其子判孺承襲詔以判孺為武畧郎充都大廵檢使仍以鹽綵賜之戸部言大軍嵗用馬料今江浙諸路和糴米多乞令逐路轉運司以上供米増折馬料舊米一斛折納料二斛至是令兩浙路増二十萬斛江東西各増十六萬斛内平江鎮江建康府鄂州各十萬荆南府六萬宣池州各二萬從之庚辰太常少卿都民望卒以嘗任諫官特賜其家銀帛百匹兩右朝奉郎通判楚州徐宗偃聞揚州告急事見八月壬寅自髙郵以驛書遺大臣言宗偃自到官以來飽諳覘邏者之情偽密院三衙沿江諸將所遣固不一矣要皆取辦於都梁山陽土著之人由都梁者不過入於泗自山陽者不過至於漣水采聽髣髴信實蔑然且若東海之人止縁饑民困於暴斂一唱百和犯死求生而候者閧然有興師十萬駕海航二千艘因而南向之說遂重煩朝廷憂顧宗偃獨以為不然已而卒如所料矧今自六月以來日聞簽軍聚糧修京除道敷斂金帛營造舟船添立砦柵虐用其民無所不至且約七月必遷都矣既而不效展取八月又不效則曰京都改築外城更造秘殿且有登封泰山欵謁明道宫之議此何所考信哉宗偃近以職事至維揚帥府而都梁持羽檄來謂金主已遷於汴重兵散布宿泗清河之間帥司告急於朝廷人情恟懼宗偃亦以為不然才少須臾又無一驗合是此輩傳聞之誕亦甚明矣靖康之初再犯京闕洊至維揚無一人知其來者先聲播傳訃之詭也伏惟廟謨成算固非一介可測涯涘然長江不足恃兩淮不可失雖三尺童子知其利害灼然若密詔沿流諸將或以屯田或為牧放添増防托遣數萬人散處要害以候俟之若都梁太逼則屯天長若山陽太逼則屯寳應又若合肥襄鄧擇敵人耳目不甚相接之地悉儲兵備具命大臣護之以為緩急調發捄應之用則敵騎猝來吾盖有以待之矣若信覘邏者之言駭然有自失之意非所望於中興之世也切聞朝廷防慮料角至嚴至備是注意於海道可謂親切然楚州鹽城縣去海不過一里又居料角之上可為藩籬若屯以千百人假以一二十舟障蔽其前則料角决可力守且與敵人耳目全不相接亦一控扼之地伏惟特賜采擇辛巳右諫議大夫何溥權工部侍郎黄中並兼侍講壬午右正言王淮言兩淮間多私相貿易之弊如茶牛及錢寳三者國家利源所在而皆巧立收稅肆行莫禁茶於蔣州私渡貨與北客者既多而𣙜場通貨之茶少矣牛於鄭莊私渡每嵗春秋三綱至七八萬頭所收稅錢固無㡬矣若錢寳則有甚焉盖對境例用短錢南客以一緡過淮則為數緡之用况公然收貫頭錢而過淮者日數十人其透漏可槩見矣帥憲通知相與掩蔽望詔多方措置革去宿弊從之淮金華人師心猶子也左承議郎知道州季南壽言本州在湖南最為小郡地不過六百里民不過四萬戸舟車不至商賈不通其民樸野惟農桑作業米一升八錢絲一兩百二十衣食之餘質錢輸稅僅足者無幾民之窮乏莫甚此邦而大禮錢科取重舊額每樁管二萬九千餘緡自紹興十年以後增至五萬三千餘緡諸縣白撰名色漁奪民財莫不嗟怨今以鄰州較之衡州稅米十五萬斛所科大禮錢三萬五千餘緡郴州稅米三萬三千餘斛所科九千六百餘緡本州稅米三萬三千餘斛視衡州不及六分之一而大禮錢㡬倍之其為不均莫甚於此詔本路轉運常平司以本州稅米數目比較鄰州减定自今毋得增科右朝散郎知楚州周淙移知盱眙軍右朝請大夫新知黄州沈邦直移知楚州癸未右朝請大夫新知復州呉順之移知靖州武徳郎知石泉軍董誡移知復州誡劉錡子壻也先是李文㑹王剛中王之望王弗及䕫州路提舉官王适皆舉誡可備邊帥上曰五人皆薦可見其公乃與邊郡仍令籍記以備他時選用江州駐劄御前諸軍都統制戚方乞戰馬詔以蜀馬八百與之甲申百官入朝罷舞蹈以近顯仁皇后小祥故也丁亥詔申嚴銷金銅器之禁時行在之人復有鬻二物於市者論者以為貴近導之乃令官司嚴切覺察左朝請大夫福建提㸃刑獄公事梁仲敏行監察御史侍御史汪澈言吏部員外郎祝公逹狡狠躁競凡銓曹之事懵然不曉刑部郎中黄子淳闒茸鄙俗務為刻薄貪賄徇私詔並罷帶御器械李寳為淮南西路馬歩軍副總管兼權知黄州初右諫議大夫何溥言著令諸休務假一嵗之間百司七十有七日天下之務萃於朝廷非百司比而比年朝廷假故多於百司三分之一又有前後相因為例不入省者乞檢照祖宗典故裁定仍令吏戸兩曹後他司出局庶幾事無壅積事下給舍議是日權刑部侍郎兼權給事中黄祖舜等言乞今後宰執過局觀書及為北使除館皆以食後即宰執初除授告正恭謝惟本㕔不入堂諸㕔皆入上元止賜告一日應歇泊賜假遇休務者不别理其吏戸兩部官候他司出局畢然後出局從之己丑左朝奉郎知婺州章厦與在外宫觀殿中侍御史陳俊卿言厦以佞邪持媚竈之術致身政地饕竊過當其在言路專與大臣為支黨濟其喜怒以害善良今典名藩偃然以前執政自大漫不省事民無所訴故有是命左武大夫忠州防禦使新淮南西路馬歩軍副總管兼知黄州李寳改添差兩浙西路副總管平江府駐劄兼副提督海船時浙西及通州皆有海舟兵稍合萬人詔平江守臣朱翌提督言者請擇武臣有勇略知海道者副之寳先除知黄州未行乃有是命尋以觧帶㤙陞宣州觀察使寳乞於沿江州縣招水軍効用千人詔許三百又請器甲弓矢及乞鎮江軍中官兵曹洋等五十人自𨽻皆從之馮忠嘉海道記云紹興庚辰金主亮謀入犯大治舟師髙宻欲隂從海道徑襲浙江諜者得其實以聞上召宰臣問以備禦䇿方紬繹未及對上遽曰卿等無先定謀耶朕自議和之始逮今二十年寢食不忘此敵故練兵擇將修車馬輯船艦江淮荆蜀備已全具此卿等所共知惟是海道朕亦有以處之顧衆意何如耳宰臣再拜懇請上曰帶御器械李寳徃嘗陷敵自㧞身循海道來歸召對慰撫詢以此中事歴歴如數一二且其器局方重出語忠壮以一介羈旅脫然還朝廷陞殿陛對萬乘無分毫沮懾此必能辦事者今以為宣州觀察使總管淮西兼知黄州乘未發卿等為朕亟留計之翌日對便殿果如上㫖改授浙西路馬歩軍副總管平江府駐劄且令與其守臣督䕶海船為捍敵計按忠嘉所云恐不無潤飾今併附此寳轉觀察在此月丁酉乞招軍等在己亥今併書之直秘閣主管台州崇道觀范如圭卒壬辰右朝請大夫新知楚州沈邦直復知黄州右朝奉大夫新知郴州王彦融知楚州彦融宷子也癸巳以顯仁皇后小祥前一日輔臣及待制觀察使宗室遥郡防禦使已上入奠於慈寧殿甲午小祥上行祭奠之禮百官常服黒帶行香畢詣文徳殿門進名奉慰退行香於仙林普濟寺丙申鎮江府駐劄御前諸軍都統制劉寳言自罷宣撫司背嵬一軍發赴行在欲補置二千人仍以制勝軍為名詔許旋招武勇効用勝㨗吐渾共一千人為之丁酉罷内侍省以其事歸入内内侍省日歴但於十月戊午書内省條具前省併廢事件今依㑹要仍書併廢之日臨安府言今年收養乞丐提舉常平司已撥到米二萬七千餘石别無可用之錢戸部乞於常平司取撥浙西諸州未起坊場七分寛剩錢十二萬緡應副從之存此以見嵗給貧人錢米數戊戌宰執請上御吉服上曰朕本欲終三年之喪卿等既以故事有請須改朔而後可感愴乆之己亥權禮部侍郎金安節言顯仁皇后小祥乞用崇寧故事孟冬行親享景靈宫之禮從之庚子敦武郎權閤門看班祇候曾覿為建王府内知客壬寅太學録周必大太學正程大昌並為秘書省正字以學士院召試合格也館職復故事召試自此始上覽必大䇿大善之諭輔臣他日當令掌制大昌休寧人也秘書省校書郎王十朋面對言臣聞道路洶洶咸謂敵情叵測有巢穴汴都窺伺江淮意廟堂之上帷幄之臣必有料敵制勝之䇿然議者謂邊奏有警則羣臣失色相顧傳聞稍息則恬然便以為安且謂敵有内難勢必不來夫不恃我之有備而幸敵之有難謀國之術亦踈且殆矣自建炎至今敵未嘗不内相殘賊一人斃一人出曷嘗為中國利要在所以自備者如何今日禦敵之䇿莫急於用人用人之要莫先乎人望盖知人之術自古所難蕭何不出孰能識韓信於未知名之日孟軻復出亦必取士於國人皆曰賢晉悼分以民譽而用六卿遂成復覇之業東晉以人心而起謝安遂成破敵之計國家寳元間西夏叛命用韓琦范仲淹有西賊破膽之謡兵不大用元昊臣服皇祐中富弼文彦博並相搢紳相賀仁宗曰古之用人或以夢卜茍不知人當從人望夢卜豈足慿邪元祐初相司馬光遼人夏人相戒曰中國相司馬矣切無生事人望之能服人如此今内外士夫軍民口無異詞咸謂有天資忠義材兼文武可為將相者有長於用兵士卒樂為之用者今反投閑置散無地自効或老於為郡以泯沒其身内為䜛邪之所媢嫉外為敵國之所竊笑天下輿情憤悶抑鬱臣願陛下斷然為社稷計起而用之以從人望可以作士氣可以慰人心可以寢敵人之謀可以圖恢復之計陛下縱未大用之亦宜付以江淮重任自當一面為國長城亦可以無西顧憂矣猛虎在山藜藿為之不採國有人焉難當自消臣以為禦戎之䇿莫大於此十朋又言惟辟作褔惟辟作威此人主攬權之術得之於此失之於彼又人主攬權之弊唐自中宗權移房闥明皇親平内難懲孽妻驕主之禍挈大柄而掌握之可謂能收之於此矣承平既乆怠於聽斷内則移於姦臣外則移於藩鎮是又失之於彼也肅宗再造王室代宗平亂守成而權稍歸朝廷亦可謂能收之於此矣然君臣偷安𤓰分土壤以授叛將繼以徳宗姑息自是而後權歸藩鎮是又失之於彼也憲宗剛明果斷削平僣叛而權復歸朝廷可謂能收之於此矣晚節任用非人禍生所忽自是權歸閹寺是又失之於彼也陛下比懲大臣之盗權收還威福之柄朝廷清明邇者衆口籍籍謂權雖歸於陛下政復出於多門是一秦檜死百秦檜生也其間最重者如三衙管軍輩與北司深交固結盗陛下之大權養成䟦扈之勢昔漢之禍起於恭顯王氏之相為終始唐之禍起於北軍藩鎮之相為表裏今禍胎於内亂形於外臣竊憂之夫權之大者莫如名器與財與兵今以管軍而位居三公是盗名器之極古之時無有也祖宗之時無有也天下之利源財路皆入其門國用日蹙私室愈富三家弱魯田氏盗齊殆不過此夫樞密號本兵之地號令節制天下之諸將今殿廷立班管軍傲然居前樞密甘心其後倒置如此不奉行其意㫖者㡬希其能節制號令之耶其子弟親戚咸居清要䑓諫論列朝廷必委曲覆䕶俾其言卒不行昔唐大將管崇嗣背闕語笑李勉劾其不恭肅宗謂吾有勉乃知朝廷之尊李祐有縛呉元濟之功違詔進馬温造正衙抨劾祐自謂膽落於温御史今䑓諫言及侍從大臣隨即罷斥而風憲獨不行於管軍之門其何以為國耶至若清資横加於噲伍髙爵濫及於監門諸軍置承受福威自恣不减唐之監軍皇城置邏卒旁午察事甚於周之監謗内外將帥剥下賂上結怨於三軍道路之間捕人為卒結怨於百姓皆非治世事陛下自總攬以來聖政不可勝紀竄逐猾閹天下尤服英斷惟此數事臣所謂得此失彼者可不深懲痛革之臣願陛下慨然發憤斷自宸衷杜邪枉之門塞僥倖之路監漢唐而斥近習懲齊魯而抑强臣不惟尊嚴朝廷亦所以保全此類自秦檜扼塞言路士風寖衰及上總攬萬㡬激厲忠讜而餘習猶未殄朝士多務緘嘿至是十朋與校書郎馮方正字胡憲查籥太常寺主簿李浩始因轉對有所開陳聞者興起太學之士為五賢詩以述其事焉吏部侍郎沈介上封事曰臣竊惟今日之慮莫若備敵之䇿為急顧今大患有二一曰國論不定二曰威令不行二患不能去雖備敵將有所不可也何謂國論不定備敵之䇿不過有三征也和也守也征固力所未能和則理難必恃亦守而已今邊候之書若有所聞則廟堂之上焦然以為憂色動而慮亂旬月之間則又皆欣然忘其憂矣臣願陛下與大臣斷為一定之論必專為守無復異論又必一一而講之曰地孰為要可以宿兵將孰為先可使當敵兵謹於陳糧謹於庾將守淮也將守江也越淮而戰斯守淮矣越江而戰斯守江矣雖用兵不可預料然是數説者不可不講也何謂威令不行曩者秦檜盗權威福自己宸斷赫然收還權柄然三省樞宻院奉行威令者也屬者朝廷命取劉寳軍二百以為黄魚垜之用訖不禀承而三省莫可誰何本兵之臣坐廟堂以選三衙之卒文符既下却而不視顧乃私還之而樞密亦未聞議其罰者萬一當敵欲望號召以為指臂之用詎可得乎臣願陛下明諭大臣無多為令無輕議令其有慢令者悉以上聞罰惟必行勿阿貴近如此則朝廷尊矣二患既除而後守之之䇿可言也守之之䇿其要有四一曰御將二曰訓兵三曰先聲以奪敵人之心四曰棄瑕以用度外之士臣聞之善御將者莫若髙祖今諸將之視信越計功角材豈可同年而語而實齒公台握兵柄至二十年志得氣盈傲視朝廷彼其至此果何道耶不過掠軍士之廩以利其贏詭尺籍之數以私其禄既富矣於是為市寵媚竈之術宦官之徒有所謂承受者為之囊槖以利其貨為之遊談以乆其權士大夫平昔號為鯁亮者歎息而已未有敢昌言於朝者豈其隂謀固結卒不可破必勝而後已為今之䇿莫若罷其承受之官而黜其珍異之獻自然畏威聽命若謀之左右皆其黨也雖欲行之得乎大將聽命然後精擇裨校各分以兵大則滿千小則數百使之訓練才之能否將不可揜自通和之後訓兵之政漸弛今之諸將運土木以為技巧豈復使之執兵操竒贏以行貨坐市區以謀利豈復使之習戰緩急有用驅不素教之兵付之貪鄙慢令之將其禍可勝言哉臣願陛下萬幾之暇雖翰墨之習圖史之玩有益而無損者亦姑置之専以閱武為事召二三大將諭以至意俾各條小校之能給以軍兵量其才而多寡之肄之以藝責之以日月而訓齊之軍為㡬校校習何藝陛下早朝而退引數校以角藝而嚴其誅賞不過一嵗不患不為精卒雖横行天下可也况守備乎邇者敵人驅數百萬之夫為城汴之役觀其舉措甚異臣謂及其未徙也為計以奪之氣建康北距長江古為都邑謂宜急下明詔為廵幸之舉彼之未徙我不先動彼之先行我則前邁縱彼恃强能不疑乎一二年間我備修矣國家承平日乆崇尚禮義士大夫一行之失清論不容顧於今日之用似未盡也朝廷之上清望之臣自非才行兼全何以膺其選若理財糓治郡縣臨邊鄙校軍旅如此雖大過猶將用之願陛下責大臣以求才諭臺諫以使過如此則實才輩出何用而不可四䇿既行而勿奪於羣臣勿移於左右戰戰慄慄若疾之附身則社稷之危庻乎可安矣介所上疏未得其日按疏中論諸軍承受事而何溥等論介自遷銓曹縱跡不安乃效布衣上書以自誇耀則必介除吏部侍郎之後未罷諸軍承受之前也故參酌附九月末介遷吏部在八月十二日丁巳罷諸軍承受在十月二日丙午冬十月乙巳朔上始純吉服丙午詔文武官合班如遇親王使相立西班即令樞密院官權綴東班惟親王使相請假則立西班又詔罷内侍官承受諸軍奏報文字今後諸軍奏狀並於通奏司投進内三衙管軍仍許上殿先是少師領殿前都指揮使職事楊存中以官三孤主管侍衛歩軍司公事趙密官使相並班知樞密院事上秘書省校書郎王十朋轉對論其不可因及諸軍承受威福自恣等事起居舍人兼權中書舍人虞允文亦論此曹交通賄賂且寖如石顯之比於是知樞宻院事葉義問言三衙本𨽻密院祖宗舊制不許接坐所以正名分示等級豈當以官之髙卑而不以職之上下冠履倒置非朝廷福乞各為班著故有是命是日宰執進呈上曰今之承受即祖宗朝走馬承受専令掌邊將奏報前此亦嘗降詔戒約意謂空言不若以實事示之故前此屢却諸將貢獻此事朕無固必遂批㫖行下按紹興十一年五月丙辰已罷三宣撫司承受文字官者不知何時復置當考存中明年二月甲寅罷殿銜侍御史汪澈言楚州等處有捕獲軍士盗販箭簳甲葉徃外境者問其故云以軍中裒歛無藝不得已而為是可謂借冦兵矣乞自今有係軍士即同兵器觧赴樞密院根究來歴重作行遣仍將透漏去處郡守鐫降官資從之言者論近屢有詔趣郎官以上舉縣令而四十大縣類差兩政闕皆數年人情豈肯舍近而就逺辭易而圖難况朝廷急於恤民若不可朝夕而用人之實乃在於數年之後又何以仰副陛下憂念元元之意望自今縣令未及考而因事罷去者並從朝廷以所薦官填闕竢其滿秩即令吏部已差下人交承且使四方之民知朝廷不専為四十縣擇官亦所以廣徳意於天下也從之丁未起居舍人虞允文為賀大金正旦使知閤門事孟思恭副之允文仍避金太祖諱權改名允及至金廷與館客者偕射一發中的君臣驚異樞密院檢詳諸房文字徐度充賀大金生辰使武功大夫新江南東路兵馬都監蘇紳副之尚書吏部郎中張闡為祠部郎中兼建王府賛讀監察御史劉珙守尚書吏部員外郎珙前在銓曹時苦吏為姦思有以制之一日命張幕設案於庭置令式其中使選集者得出入繙閱與吏辯吏無得蔵其巧人甚便之間攝侍郎引選人改官班占對詳敏上恱焉珙本朱倬所薦倬執政珙引嫌求去於是復有是命感徳軍承宣使致仕梁邦彦卒贈保寧軍節度使賜諡清節右諫議大夫何溥言鎮江府駐劄御前諸軍都統制劉寳起於行伍初無勞績狠戾少㤙其在鎮江貪暴益甚號令不能服衆致其縱弛剽剠居民無所不至如頃嵗奪陳桷家財汙辱其婦女州郡不敢捕有鶴林寺僧遭刼來訴寳斥去之曰汝輩但願常如今日太平無事寳之軍律大抵如此日者其子除閤門祇候守臣鄭作肅徃賀之寳曰我費錢三萬緡得此何足賀比朝廷調兵二百人徃黄魚垜防海寳聲色俱厲終不肯差朝廷莫敢誰何事見今年七月己夘其慢上如此侵漁百姓凌駕府縣詭名虛籍率多冒請房廊間架㡬半於浙西田畝馬牛殆遍於淮上凡曰商販靡所不為凡曰利源靡所不奪諸軍月有食錢總司多給關子寳盡留之以償借貸雖油鹽茶菜之微亦皆抑配人人憤怒怨氣滿腹其剥下如此朝廷方講備邊之䇿正頼諸􅀈恊力鼓作士氣而寳之所為中外切齒其勢必將至於䟦扈望明詔中外聲其慢上剥下之實竄之逺方别選賢將撫養士卒革去軍中回易掊克之習庻㡬人人感恩樂為國用戊申詔太尉知荆南府充本府駐劄御前諸軍都統制劉錡赴行在奏事以荆南駐劄前軍右軍統制李道兼權都統制朝廷將以錡代劉寳掌軍故有是命右武大夫和州防禦使知閤門事劉允升落階官為蘄州防禦使允升嘗副葉義問出使用戚里恩特遷之右從政郎主管淮東𣙜場趙湑罷湑嘗從泗州守臣貸買石緑錢千餘緡踰年不償直故罷湑其所負比境錢先以庫金償之己酉秘書省校書郎兼國史院編修官馮方言臣聞道路之言以為敵人將有叛盟之意臣謂議論定然後可以言措置措置定然後可以言成敗今欲和者在我制和者在彼若曰添嵗幣則自罷𣙜場以來彼之互市之所入嵗以鉅萬計畧不顧惜議者謂添嵗幣可以使之弭伏亦已踈矣若曰遣泛使則吾國勢未振將命徃來不過謹守常議雖百輩何益若曰吾奉事之惟謹彼將有所不忍史冊所載小國之事强國其謹亦多矣豈以謹故不加兵哉臣愚以為敵人之必來如盛夏之必熱願與心腹大臣日夜講求所以立國之道和則彼此安静來則有以待之勿以今日之報急而焦勞明日之報緩而閒暇所謂措置臣不知兩淮已有備否議者皆曰結民社矣夫民社者保聚可也應援可也輜重可也獨不可迎敵耳責之迎敵必如陜西弓箭手而後可行欲乞以見耕之田蠲其賦役率為畆二百而出一兵不可則三百又不可則四百足以招之而止未耕之田又加優焉大抵使為兵者常逸為民者常勞磨以嵗月可使有勇州縣所蠲一錢朝廷與之一錢不過損十萬可得萬兵縣官養萬兵嵗不下百萬也雖然官軍不振則民兵不能自立不知兩淮已有兵否朝廷又以武臣典郡然所遣皆無兵馬雖韓彭何益臣愚乞以營田為名擇見管軍統制官之循良者全軍出守因令耕作而入其租増置通判以莅民事然後命宿將中為軍民屬望可以附衆可以威敵者使兩淮營田如此則形勢强藩籬固欲守則守欲戰則戰敗則可以削走則可以誅矣方上此疏不得其日按日歴方以十月己酉面對故係於此盖自今至明年十月已前别無館職對班故也言者論國家之利莫盛於市舶比年商販日疎南庫之儲半歸私室盖商賈之受弊有四官中之虧損有二舊法抽觧十五之中汎取其一今十半之中盡擇良者向來舶賈率皆土人事力相敵初無攘奪相傾之患其後將帥貴近各自遣舟既有厚貲専利無厭商賈為之束手舊舶舟之行惟給符引財貨盈縮事止一身其後附以官錢或遇風濤人溺舟覆捕繫妻子籍産追償故海濵之民冒萬死一生之利而得不償費人人失業於是私切相戒不敢發舟官司又追捕糾告而遣發之此四弊也舊海賈既多物貨山積故抽觧所入不可以數計今權豪之家勢足自免縣官嵗入坐損其半往嵗土人入蕃之貨不過瓷器絹帛而已今權豪冒禁公以銅錢出海一嵗所失不知其㡬千萬此二損也市舶一司自唐以來恃此以為富國裕民之本今其弊至此願詔將帥貴近之家毋得嵗發舶舟攘奪民利虧損國課仍詔有司講究除去宿弊以便公私其於國計誠非小補戸部奏復抽觧舊法違者許商人陳訴應命官以錢物附舶舟或遣人過海者依已得㫖徒二年二十二年十二月二十日𠡠廣州見任官將錢物寄附綱首客旅過蕃收買物色依勑徒二年科罪其發舶州軍毋得抑勒仍檢銅錢出中國界條約行下從之詔左太中大夫沈調依舊為左中大夫調既以赦敘官而殿中侍御史陳俊卿論調所至􅂍汙狼籍罪當竄殛况調階官元係中大夫盖礙止法後除待制始得轉行今既奪其職名安可引用常法敘官使之盡得從官恩數望特不轉行以為􅂍吏之戒故有是命庚戌詔勲臣之家所留兵校皆以五分之一差破使臣不許差横行正任人其使臣仍毋得過兩任先是張俊既薨其家奏留幹當墳莊等使臣五十六人仍並理為資任權給事中黄祖舜奏武臣待闕多者數年今端坐而食並無替期累資積考遂成崇秩則是悉力於王事者逺不逮之非所以張公室抑私門望詔有司為之限制於是行下秘閣修撰提舉江州太平興國宫邵大受卒夜雷作非時辛酉翰林學士兼權戸部尚書洪遵言川蜀將士以宣撫司便宜遷補付身至吏部換給者吏多沮抑之將士冒犯矢石奮不顧身僅得一官至今二十餘年觸事拘礙僅同白身甚可憐憫望優與展限五年如小節不圓先次放行案後審㑹長貳郎官以時稽考取吏之沮難者痛治之仍榜諭諸軍使知前日補官不為虛文庶㡬異時緩急之間權時施宜可以取信從之帶御器械幹辦皇城司王謙為賀大金生辰副使時蘇紳以病告故也壬子敦武郎武鉅知叙州癸丑左朝散郎文之竒落致仕知簡州之竒既告老事見二十九年二月戊子兵部尚書兼權翰林學士楊椿權吏部侍郎李澗起居舍人兼權中書舍人虞允文復言之竒律已㢘臨政勤行業甚髙年齒未及進退合義誠有可嘉宜不遺踈逺起而用之以示朝廷褒崇㢘退風勵末俗之意故有是命之竒固辭不起乙卯尚書省勘㑹近據蔣濠州申到對境疾病事宜淮東即無報狀劄付右朝奉郎通判楚州權州事徐宗偃宻切體訪有無虛實申省仍不下司先是蔣州守臣强友諒言諜報金主已死嗣主改元新徳朝廷以未得淮東報命宗偃宻伺之宗偃言昨九月二十六日據淮隂縣民社長趙僅所遣幹事人李成探到汴京修城拆換廊廡等已録白繳申又云金主遍身患大泡瘡移都初無定日本人不肯供寫此項亦已併於劄子内具禀繼聞徐文管押北通州海船前來海州又已宻切差人前去地頭喚到彼處親信人當面詢問並無上件事宜於十月初七日入遞申覆所有對境疾病事昨曽有人稱說因患瘡不出别無考信不委虛實既而楚州守臣王彦融亦言得報金主果死自宿亳以北至燕京民間皆嘗縞素宗偃獨以為不然庚申左朝請郎江南西路轉運判官林安宅直秘閣為兩浙路轉運副使左朝散郎趙不猷為荆湖北路轉運判官殿中侍御史陳俊卿入對論鎮江府駐劄御前諸軍都統制劉寳十罪大畧謂寳减削軍食暗請錢糧多遣軍士於湖廣江西回易去嵗鎮江火寳閉壁下令出救者死城中半為煨燼寳市物為苞苴皆刻剥置辦乃謂其下曰此官家教我置買近朝廷調兵戍黄魚垜終不肯從子士元除横行人徃賀之則曰用錢買來何賀之有寳内蔵不臣嘗公言曰前代帝王皆起於微賤此何等語又養閻李二道人使夜觀星象至五更則具録以呈鎮江屢易守臣皆以寳故近又欲擊趙公偁頼朱夏卿勸免公偁知鎮江府夏卿淮東總領奪婦人姓劉者女又笞辱之今知人言籍籍乃因入覲載苞苴之物三十餘舟欲因為結納寳以専悍愚愎暴虐姦貪之資而有此十罪聞其在軍也偏禆屢諫而不從軍士含怒而莫訴使有緩急之事責其成功不亦難乎伏望因其來朝斥之國門數千里之外投諸荒裔以禦魁魅别擇良將徃肅軍旅辛酉詔安慶軍節度使捧日天武四廂都指揮使鎮江府駐劄御前諸軍都統制劉寳可罷都統制添差福建路馬歩軍副都總管給真俸令臨安府差兵級五十人同本軍見隨行人前去之任仍放謝辭先是寳為諫官何溥所劾上乃召寳赴行在未至陳俊卿復奏其罪侍御史汪澈亦言寳無尺寸功而豢飬滋久命令罕行朝廷嘗調兵戍黄魚垜寳既不聽乃乞創招制勝軍三千人事見九月丙申方命若此尚知戴天子之威乎寳嘗出緡錢遣其軍校回易嵗計三萬有竒猶以為鮮械諸囹圄掊刻諸軍至有凍餒不能出門户者望命有司議寳之罪明正典刑以為人臣亂法壊紀者之戒故有是命殿中侍御史陳俊卿言任用人材乞畧小過上謂大臣曰中間有顯過者若復進用却恐人言紛紛上又言贓汙之吏不可復用盖其天性貪墨使在州縣必難變革右諫議大夫何溥右正言王淮言吏部侍郎沈介隂險狡詐出於天資少年决科即登顯宦不歴州縣之勞不聞長老先生之説憑私臆决自以天下莫己若也昔在省闥用私意以庇族人按發之贓妄繳駮以快平時睚眦之怨凡所抑揚動有傅㑹自銓曹縱跡不安乃刺取朝廷欲行之事倡為已說欲自為功謂可以術箝臺諫之口至效布衣上書四謄副本以自誇耀盖谷永専斥宫闈之比望賜竄殛以為欺世盗名之戒詔介罷吏部侍郎免謝辭介所上封事已見今年九月末詔累降指揮沿淮禁戢私渡及盗馬之人可令帥守加意戒約務在肅靜不得纎毫生事以稱謹守和好之意仍出榜曉諭壬戌太尉武泰軍節度使知荆南府劉錡為威武軍節度使鎮江府駐劄御前諸軍都統制仍詔總領官同諸軍統制將日前非理除尅掊歛及應干私役日下改正諸軍所負回易錢具數以聞當議除放除劉寳私財還寳外餘並樁充軍須仍出榜曉諭直敷文閣潼川府路提㸃刑獄公事續觱直顯謨閣知荆南府右朝請大夫淮南轉運判官王趯知揚州上以許世安不勝任故就用趯鎮南軍承宣使龍神衛四廂都指揮使荆南府駐劄御前前軍右軍統制李道為荆南府駐劄御前諸軍都統制日歴道前銜猶帶鄂州右軍統制按道於今年四月庚午已改除不知何故詔吉州刺史知閤門事幹辦皇城司劉伉令再任癸亥左朝散郎荆湖北路轉運判官陳之淵為尚書吏部員外郎右朝散郎吕擢行大理寺丞是日日方中天無雲而有雷時侍御史汪澈等欲論左僕射湯思退方据摭其過殿中侍御史陳俊卿曰為相無物望而天災亟至此固當罷何以他為於是澈等相繼論之乙丑左中大夫趙士㣓卒丙寅利州觀察使建康府駐劄御前前軍統制鄭諶卒丁夘權工部侍郎黄中兼權吏部侍郎宣正大夫崇信軍承宣使利州東路駐劄御前後軍統制權節制閬州軍馬王喜主管台州崇道觀以病自請也己巳右朝請郎監髙州在城鹽稅林一飛卒庚午司農少卿張宗元充秘閣修撰江南西路轉運副使壬申建武軍承宣使淮南東路馬歩軍副都總管許世安移兩浙西路秀州駐劄癸酉詔舒和蘄黄州民戸附種田每嵗收租四千八百餘石並特除放先是左朝奉大夫宋曉知蘄州代還言兩浙營田之法募民就耕官給牛種民輸子利殆非不善也然應募者類非安土重遷之民多四方貧乏及惰於農者既無一定之志是以行之逾二十年未見成效又有司拘於已定種斛之數間有逃移人戸則均責鄰里督其子利謂之附種况一牛之斃則償於官今給於民者十有三年矣連嵗以疫斃而不免輸租收牛之家逋亡則責輸於鄰里恐十餘年之後其病民有不可勝言者望究其實而蠲除之亦招來墾闢之一端也至是淮西安撫司奏如曉言乃有是命建炎以來繫年要録巻一百八十六
