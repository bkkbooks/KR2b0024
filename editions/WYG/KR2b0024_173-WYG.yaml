body:
  text: 建炎以來繫年要錄巻一百七十三宋李心傳撰紹興二十有六年六月辛未朔户部言江浙湖南福建諸路没官田産昨許人佃租近因鍾世明請出賣而未有買者見佃人因此失業今乞仍舊給佃二月乙亥鍾世明建請出賣上曰建議者不過利於得錢耳若許民租佃量立租課民必利之百姓足君孰與不足乎沈該曰陛下䘏民務本如此天下幸甚御史中丞湯鵬舉言昨議役法者欲以批朱白脚輪差遂致下等人户被害謂如一保内上等家業錢一萬緡中等五千緡各已充役謂之批朱下等家業錢百緡末等五十緡已下未曽充役謂之白脚然下户無力可充遂有差役不行之患乞將批朱歇役滿六年者便與白脚比並物力再差從之二十八年六月己丑不行右承務郎何惟清上疏訟其父鑄頃嘗被命與曹勛出疆與金人辯其逆順勤懇之時哀切至慟是以未幾得濟其事而為秦檜所忌事實不傳詔付史館壬申咸寧郡夫人郭氏薨郭氏歸普安郡王生四子愉愷惇㓜未及名薨年三十一權攅于北山之修吉寺癸酉御史中丞湯鵬舉言陛下總攬權綱慎擇郡守臣愚擬令郡守久任責以治效正當今之先務議者必曰方今員多闕少不可行也又曰郡守之賢否未可知若或委之臺諌監司薦其賢能又恐臺諌監司未可信也臣乞聖斷逐路擇郡守三兩員課其勞績俾之再任委有異政者不次陞擢以激勸之輔臣進呈上曰此在慎擇監司監司得人舉刺公則郡守之職自振矣由漢以來郡守有善政者多増秩賜金正不欲數易然久任亦不可為定例沈該等曰欲令監司帥臣同共考察課績列衘保舉再任仍令尚書省置籍上曰如此甚善中書舎人吳秉信兼實錄院修撰御前諸軍都統制知興州吳璘言紹興十一年得㫖令宕昌寨嵗所市西馬十分之二給本軍而茶馬司積五年不與今軍中有馬七千皆已老大恐無以備緩急望令茶馬司今嵗如額支撥其餘逐旋補還從之甲戌宰執進呈秘書省校書郎黄中面對劄子言自頃大臣用事屏棄忠良私昵憸人布在郡縣不復以民為意自陛下一新百度而半年之間監司郡守出於親擢及近臣舉薦者不過數十人他皆如故謂宜取法祖宗精選公忠明敏之臣每道分遣一人假以嵗月令徧歴郡縣凡百姓之疾苦獄犴之寃濫財用之蠧耗官吏之貪汚茍且與夫利之未興害之未除者皆得條具以聞其監司守臣善惡之尤著者每路各黜陟一二人以新天下之耳目上納之乃詔諸路監郡躬歴所部詢訪㢘察條具以聞當議黜陟御史臺言去年十月以後因言章及告訐編置居住人曹泳吉陽軍莫伋化州王洧南恩州王肇髙州汪召錫容州陸升之雷州張常先循州康與之欽州徐樗髙州王㑹循州雍端行賔州林東英州鄭煒雷州已上並編管吕愿中封州安置王曮建昌軍曹雲柳州已上並居住未見申到貶所乞令所在州押發稽留者抵罪從之敷文閣直學士致仕俞俟卒右承議郎蘇師德通判建康府乙亥秘書省正字張震言四川茶場每貨茶百斤以上必有所増予謂之加饒所以優商官自捐之民則無與自韓球行刻剥之政希増羡之課始取償於民盡舉所捐増為正額或一場増至三二十萬茶既不足則併採新芽來年轉荒舊産愈負自此額未嘗足民日破貧且民者茶之所自出商者茶之所自行優商而困民是浚其流而竭其源也民知輸官不補所得於是强悍之民起為私販以為茍保於朝暮孰與坐待於死亡其弊若斯將損國計願將韓球以前茶額比今所取裁酌施行庶幾民力稍可復舊以為四川根本之計從之丁丑端明殿學士新知湖州程克俊參知政事上既命二相乃詔克俊過闕對之翌日遂有是命右正言凌哲乞下諸路州縣將去年十月以後所降寛恤指揮并臣僚論列得㫖章疏如約束受納催科推排差役之類榜之通衢掲之粉壁使民通知從之新湖南路安撫司參議官王昺罷昺㑹從弟也右正言凌哲劾昺兇狡刻薄嘗謟事李椿年辟充江東經界官所至肆為殘酷吏民有犯贓百錢者不問法之輕重一切籍産徒配且言畫㫖如此每州破壊無慮數百家故有是命戊寅沈該等奏今次科舉臣等子弟親戚並令歸本貫就試國子監轉運司並無牒試之人因進呈檢會到祖宗典故乾徳六年陶炳中第炳乃翰林學士承㫖糓之子遽命中書覆試上曰往時秦熺登科尚是公選後在翰苑文亦可觀其後秦塤中甲科所對䇿叙事皆檜熺語灼然可見朕抑之置在第三不使與寒士争先祖宗故事今可舉行遂詔貢院遵依咸平三年三月詔㫖所試合格舉人内有權要親族者具名以聞中興聖政史臣曰建炎初䇿士以委有司不以一人好惡為之升黜天下之至公也紹興中權臣罔上假國家科目以私其子弟親戚則聖斷赫然㧞寒畯抑權貴亦天下之至公也己卯端明殿學士提舉江州太平興國宫汪勃知湖州辛巳左朝散郎敷文閣待制錢周材落職以御史中丞湯鵬舉論其不孝不法而權臣以鄉里之私置在侍從故也壬午詔故追復資政殿學士鄭剛中特與致仕恩澤二名故左宣教郎石公揆追復直龍圖閣皆以刑部㸔詳元犯來上故有是命左奉議郎孫覿復左朝奉郎覿既叙官當秦檜秉政畏禍深居者二十餘年及是始上書自訴乃復舊秩起復武翼大夫兼閤門宣賛舎人充思州都廵檢通管州事田汝端知思州從本路安撫司請也御史中丞湯鵬舉言左朝散大夫添差浙東安撫司參議官方雲翼前任通州通判姦贓狼籍彊市民田三十餘頃驅歸業之民與之耕種權臣亦畏其利吻禄廪不絶伏望重賜竄逐庶幾有以懲戒詔雲翼先次放罷其通州在任日所置及奪取民户田産令本路轉運司盡數拘籍開具申省取㫖閏十月壬寅行遣甲申刑部尚書周三畏引疾罷為敷文閣學士提舉江州太平興國宫秘書省校書郎黄中正字葉謙亨並兼實錄院檢討官樞宻院言御前諸軍見行招填闕額人數竊慮亦有强刺不情愿人理宜措置詔諸軍都統制嚴行約束不得强招其招到願充軍人主帥躬親審問委的情愿方許刺填仍出榜曉諭後有陳訴其所委招軍統制官已下取㫖重作施行各具知禀聞奏乙酉秘書省正字兼實錄院檢討官葉謙亨面對言陛下留意場屋之制規矩一新然臣猶有慮者學術粹駁繫於主司去取之間向者朝論専尚程頥之學有立説稍異者皆不在選前日大臣則隂佑王安石而取其説稍渉程學者一切擯棄夫理之所在惟其是而已取其合於孔孟者去其不合於孔孟者可以為學矣又何拘乎願詔有司精擇而博取不拘一家之説使學者無偏曲之弊則學術正而人才出矣上曰趙鼎主程頥秦檜尚安石誠為偏曲卿所言極當於是降㫖行下右奉直大夫張杓試大理卿成忠郎柯熈為武學諭始除也詔左從政郎新楚州州學教授劉度左廸功郎林之竒並召試館職初復故事也之竒福州人度歸安人已見既而御史中丞湯鵬舉言度素無行義親䘮未除兄弟析居頃為漕司試官受韓世忠使臣之囑欲取世忠之子得解使之召試公論謂何乃罷之度罷召試在丙申丙戌左宣教郎新洪州州學教授王剛中入對論脩徽宗實錄事大體重望特詔史局採訪舊聞參考詳記擢剛中秘書省挍書郎以其奏付實錄院剛中吳秉信所薦也剛中初見紹興十五年三月武功大夫新知全州劉光時乞鑄夾錫錢執政以為難行上因論錢法隋末唐初其弊極矣至開元工始精緻國家如太平祥符崇寧錢亦甚精沈該等曰是時銅料豐饒故能如此上曰當令盡如舊制工費所不較也上又曰近日雨澤甚霑足暑中此雨絶難得殊可喜丁亥作皇帝本命殿于萬夀觀依在京以純福為名是日流星晝隕戊子左朝奉郎新通判泉州黄祖舜言取士先行實而後文藝今有抱道懐徳之士不就科目乃老於布衣無以自逹而羣試有司其間輕儇之流躐取膴仕徃徃而有以此較彼輕重大不相侔臣愚以謂鄉舉里選不可遽行文藝行實難以驟改參酌而用之或有補於治道欲望布告中外自科舉取士之外有能學行修明孝悌純篤為鄉曲素所推重者縣薦之州延之庠序以表率多士其卓行尤異者州以名聞縻以好爵以此激勵天下庶幾士風歸於淳厚亦鄉舉里選之意上曰文學徳行自是兩科若果有徳行純篤不求聞逹之士所當捜揚乃以其奏下禮部遂以祖舜守尚書倉部郎中右朝請大夫新荆湖南路轉運判官李邦獻入辭言州縣有經總制合取錢自來據所收多寡合得之數申解近因曹泳之請止以紹興十九年立為定額是年係經界年分人户將白契及隱匿田叚一併投印税契是致所收最多若以當年為額則是與郡縣開掊歛之門遂致逐州知通立賞督責必要及格以希賞典欲望特降處分除夏秋二税經總制錢有定額外其餘合收窠名錢物只得據實收起發即不得隠漏侵欺所有前項立額指揮欲乞更不施行詔户部㸔詳取㫖邦獻又言監司以互察為名取索他司職事因而騷擾乞戒飭上可其奏因曰逺方正要卿發摘姦贓選舉循吏凡有便民事可直奏來敷文閣待制提舉江州太平興國宫符行中落職罷宫觀以殿中侍御史周方崇言其在蜀中恣為不法掠歛四川珠貝錦綺以媚時相又督朝廷所放五年舊欠蜀人怨入骨髓故也辛卯秘書省正字張孝祥面對乞將去年郊祀以前官吏犯贓私罪除州縣監臨之官因民間論訴監司按發即依條㸔詳審實外如係取怒故相並縁文致有司觀望煆煉成罪之人乞免審實便與改正上曰近來如此雪正者甚多已令刑部施行孝祥又言昔王安石作日錄一時政事美則歸已故相信任之專非特如安石臣懼其作時政記亦如安石專用己意掠美自歸望取去嵗以前修過日歴詳加是正審訂事實務在貶黜私説庶幾垂之無窮從之入内武翼郎永祐陵攅宫都監鄧友杖脊刺配瓊州牢城收管坐盗伐陵木以葺私舎故也禮部言欲自今年七月朔為始太學生請長假滿百日之人並依條檢舉填闕從之秘書省正字胡沂兼實錄院檢討官甲午詔前侍從論罷未復職人寄禄官至朝奉郎以上身亡在去年大禮十年内者許以致仕恩任子用吏部侍郎權尚書張綱請也監察御史樊光逺建議而吏部舉行之乙未右朝請郎蔡樗送吏部與監當差遣以御史中丞湯鵬舉論樗投李椿年為經界官所至暴虐故也丙午詔黎雅州博易場官市珠犀水銀麝香等並罷令民間仍舊交易左廸功郎充皇后宅教授林同言太學養士千餘人而月試人數或不及五之一良由知以科舉為優不知以舎選為重如此則與方州取士何異恐非國家立學校之本意也今科舉宻邇欲望特降指揮諸州教官惟許上舎登科人注擬庶幾士子有所歆慕以舎選為榮則將重去學校而人材成就詔吏部㸔詳申省丁酉敷文閣待制提舉江州太平興國宫張邵卒邵起守池州踰時復請祠去道由廣德軍值其生日前一夕沐浴就寢詰旦家人起為夀視之死矣邵以丙子歲六月二十七日生復以其年月日死人皆異之秋九月辛丑樞宻院言武臣知州軍見闕數多及有過滿處詔三衙主帥保舉内外武臣知書諳練民事堪任知州軍人殿前司三人馬歩軍司各二人如後犯入已贓及不職與同罪各具狀奏聞保寧軍承宣使知西外宗正事士衎言西南兩外宗正司相去不逺凡所申請及鈐束訓導宗子事體一同欲望許兩宗司官每年一次往來商議職事從之壬寅御筆蠲放民間一年丁絹之數計二十四萬匹内十二萬匹令與户部措置商量收買合用錢於内庫支還餘十二萬匹令内庫支給本色以惠細民沈該等言昨降指揮止為免丁錢今陛下欲併與丁絹及綿全行蠲放聖恩寛大百姓被䝉實德今嵗絲蠶登熟置場收買便可足數上曰不唯寛民力且不失信於民上又曰近得一雨甚可喜該曰即如今日蠲放民間丁絹便可召和氣致甘澤右正言凌哲言陛下深念比年臣僚有縁誣告不測之罪投竄遐裔無路自明廼因郊賜赦曠然與之昭洗於是中外之士交章公車陳詞臺省以自祈辨雪者殆無虛日聖恩寛大悉命有司量其情實或除罪籍或復元官寃憤既伸萬物吐氣甚盛徳也臣竊見比來檢鼔院上封者滋多頗渉冐濫如其所犯元因語言疑似之類或可矜憫至於姦􅂍狼籍已經按治蹟狀顯著人所共知者亦復巧飾詞理公肆誕謾或稱向曽違誤權臣所致例圖解免今陛下方開公正之路而小人乃欲啓僥倖之門此尤清議之所不容也又况此曹嗜利之人與生俱生未易悛革儻復齒夷途再臨民社必且益務掊尅以殘虐吾民無所忌憚其害將有甚於前日矣伏望特詔有司應自今陳雪過名之人並須檢㑹元犯事因如係􅂍罪已經勘劾者乞止依元斷條法施行庶使貪汙知畏官曹寖清實天下幸甚詔刑部看詳取㫖其後本部言命官犯罪若元因論訴按發鞫勘贓證結錄别無翻異已行斷遣者並欲具元斷因依分明告示其餘特被罪或因縁連累斷遣之人後來有司看詳委有寃抑即行開具因依申取朝廷指揮從之左朝奉郎沈介為尚書吏部貟外郎左朝散大夫江南西路提㸃刑獄公事劉長源罷右正言凌哲言長源嘗冐臺察之列首創異議乞任崇寧以後大臣子孫陛下亟加貶斥後因與王㑹連親起廢專務營私每嵗舉官陞改不問賢否凡一薦章必得錢五百緡乃始剡奏廼者被㫖追證王韅不法事凡韅强取民田多不給還見訴臺部其用心如此望賜罷黜以為朋姦慢令之戒故有是命詔四川宣撫制置使鄭剛中李璆書押過便宜付身與除程展限一年換給若出違今限更不施行癸卯尚書工部員外郎吳援乞補外除秘閣修撰知綿州甲辰詔三佛齊國遣使入貢可差睿思殿祗候黄大求充押伴宫御史臺檢法官禇籍言近來州縣守令類多貪墨每有豪户及僧道富贍者罪犯必令獻助錢物或作贍軍支用或作修葺亭館多者數千緡少亦數百緡更不原其所犯輕重例作縁故釋放此風寖長不可不革望俾有司嚴立法禁並以􅂍論從之乙巳右正言凌哲乞下諸州縣應積年掛欠苗税官物等並權住催候至秋冬之交收成了畢再行追理詔户部看詳其後積欠殘零如所請丙午右奉議郎薛仲邕特勒停送連州編管時仲邕進狀乞宫觀而殿中侍御史周方崇謂省吏曹溈實教之溈泳之族兄弟二十餘年凡執政左右司多萋斐於故相因以廢罷中朝為之切齒洎魏良臣秉政漏洩省中事皆溈為之望屏之逺方以為治世蟊賊之戒詔為特勒停惠州編管丁未殿中侍御史周方崇言知撫州張子華目不識字初以玩好結託時相遂遷福建廣南兩路市舶貪汚之聲傳於化外知武岡軍李若樸交通王㑹其丞大理也岳飛之獄既具若樸獨以為非務於從輕今復令守湖外其異議如是得不為之慮乎若樸貪汚刻剥通判方疇欲裁正之若樸求疇之過言於監司疇遂坐深文貶責詔並罷左武大夫伏深言四川州郡駐泊東軍皆係宣和間發來戍守縁兵火各無所歸今邊事寧息諸州軍盡將年老或殘疾之人並行㨂放無所仰食徃徃至於乞丐甚可憐憫欲望免行揀汰支破半分衣糧至身故日止仍將已揀放人拘收存恤詔制置司行下諸州如所請四川東軍之籍凡萬二千四百九十人萬二千一十人禁軍四百八十人廂軍䕫州四千四百四十七成都府三千三百六十瀘州二千九百八十九劍門闗三百六十文州三百二十利州二百二十五内二百人廂軍蓬州二百三十六恭州二百閬州百五十廂軍巴州百三十廂軍龍州四十三休兵以來竄死相繼瀘南帥臣聞于朝有㫖招河東北陜西等處流寓人及本軍子弟補額然流寓不復有矣至今循之此以四川制置司事類附入得㫖招補乃江陽志所云不知何年月指揮也皇叔福州觀察使士䅳卒贈開府儀同三司追贈惠國公夜彗出井宿間戊申宰執進呈次上曰夜來太史奏彗出井宿間朕當避殿損膳以荅天戒深慮朝政尚多闕失或民情疾苦無由上逹可降詔述此意許士庶實封陳言務盡應天之實遂下詔曰太史言彗出東方朕甚懼之已避殿减膳側身省愆尚慮朝政有闕失民間有疾苦刑獄有寃濫官吏有貪殘致傷和氣上千垂象可許令士庶實封陳言詣登聞檢院投進仍令諸路監司郡守條具便民寛恤合行事件聞奏提㸃刑獄官躬詣所屬州縣詳慮决遣將枝蔓干連之人日下踈放務施實惠以盡應天之實詔今後選人初改官令吏部依法注知縣縣丞差遣奏補承務郎已上人並須實歴親民知縣縣丞一任方許闗陞通判言者論貴遊子弟干求堂除便用屬官差遣理當親民故也庚戌尚書左僕射沈該等以星變引咎且言兩夜㣲雲星不見所以未敢遽勤聖聽上曰天象亦有常數卿等不須如此待罪亦無益但思所以應天實徳以消天變可也該曰臣等當協心講求闕失民間利害聖慮所及亦乞宣諭臣等奉行上又曰據所臨分野當在秦晉間然朕以天下為憂豈問逺近耶御史中丞湯鵬舉言近因臣僚奏請乞根括銅匠招入鑄錢監充役户部㸔詳下提刑司委諸通判括責籍定鑄造銅器人姓名聽候指揮臣契勘諸州縣銅匠無慮千百家家有十數口若盡行拘籍即是一旦驅數千人轉徙異鄉復當重役似非國家忠厚之意况向來臣下奏請止欲禁人銷錢為器只合申嚴條制戒飭州縣常切禁戢俟其違犯决配鑄錢監可也今來見有祖宗成法又未有犯法者遽然押付鑄錢司有如工役之重固所不論而養贍不足失所者多矣竊恐於法未為允當伏乞申嚴禁戢銷鎔錢貨條令嚴切施行若已成坯而未鑄者已鑄而未出賣者臣擬欲並許諸色人告首盡以家業充償然後斷配錢監庶幾行法用刑有以慰安民心從之御史臺主簿李庚言國家立薦舉之法將以捜羅人才激勸士類嘗聞謝泌居官每發薦牘必焚香望闕再拜曰今日老臣又為陛下得一士矣其不負君上如此比年以來士大夫非唯不知出此抑亦有甚者焉彼其經年不剡一奏以待權臣不時之須闔郡不舉一人以為子孫換易之地是雖出私意猶之可也甚至闗陞改秩各有定價交相貿易如市賈然是以㢘隅之吏絶意於榮塗而姦􅂍不逞之輩侵漁公上掊歛百姓日營苞苴之計其弊有不可勝言者欲望明立法禁應買賣舉狀之人取者與者各坐􅂍論庶乎祖宗之法不為虚文而賢不肖之徒有以旌别實天下幸甚詔令有司立法其後刑部乞依薦舉受財法施行從之九月丙午立法辛亥詔諸州知通取索逐縣丁簿依年格收附銷落如將未成丁之人先次拘催丁錢及老丁不即銷落並許赴臺省陳訴又詔豐濟倉俟農隙興工及内外别有修造去處並行權住又詔昨來經界打量定驗輕重失實去處許經看詳官陳訴可更展限半年委守令申漕司審覆依公改正訖申省皆以星變故用尚書省請也户部尚書兼權知臨安府韓仲通言安撫司回易庫昨將官錢責借油鋪并置米鋪以收利息又居民日用蔬菜果實之類近因牙儈陳獻置團拘賣尅除牙錢太多致細民難於買賣又本府買撲稅錢并新添河渡所納錢物不多因此邀阻往來之人欲乞並行住罷從之三事皆曹泳所創及是因星變而罷壬子詔諸軍因罪勒令自効之人不得一例㨂汰離軍御史中丞湯鵬舉言諸州私置税場廣收醋息而州縣官切切然必加意於其間盖欲倍有所入盡歸於公庫有餘則分受以及已伏乞申嚴行下令守倅遵依紹興勅令按月支見任官供給或過數以請并過數以支者並以自盗論令臺諌監司依條按劾使州縣官稍知禮義㢘耻之風則刻意擾民者潜消於州縣矣從之癸丑詔臣民封事及監司守臣條具便民事件言刑獄財計者各委本部看詳餘並委中書舎人吳秉信王綸權給事中凌景夏仍添差權禮部侍郎賀允中分輪㸔詳務要詳盡又詔諸路州縣前後添置河渡去處並罷聽從民便又詔州縣和買紬絹及和糴草料等將官户及權勢之家並與平民一等科納如輒敢减免官司及减免之家並計􅂍科罪令監司覺察皆以尚書省有請也乙卯沈該等言夜來星象全然退减陛下尚未御正殿臣子之心實自不遑今日欲率百官拜表奏請上曰雖漸次消弭朕方憂懼恐未須如此該又奏前日臣等以輔政無狀欲待罪乞行罷免蒙宣諭再三所以不敢上勤聖聽上曰待罪何益朕當與卿等交修不逮上答天戒耳上又曰往時士子或因上書忤秦檜意押往本貫或他處聽讀不曽檢舉施行該曰聖慮及此寒士之幸也上又曰訪聞淮上米價甚平民間實難得錢可令㑹問米價官中若與收糴民間得錢亦兩便也該曰便當奉行詔故贈右諌議大夫陳瓘特賜諡忠肅先是上謂輔臣曰近覽瓘所著尊堯集無非明君臣之大分深有足嘉易首乾坤孔子作繫辭亦首言天尊地卑春秋之法無非尊王王安石號通經術而其言乃謂道隆徳駿者天子當北面而問焉其背經悖理甚矣瓘宜賜諡以表之事下太常至是用博士劉嶸擬定行下上語在六月癸巳今併書之丙辰詔進士因事送諸州軍聽讀可特放逐便仍許取應又詔臨安府猪羊圈并安撫使回易麻布連竹紙增息出賣及責借官錢付炭牙人放炭收息可並住罷又詔諸州民間地土占充官司營寨房廊其隨地産稅和買並與除放明婺嚴衢州所買發納牛羊司羊口令樁支合用官錢依市價和買不得依前抑配民戸應州縣受税賦即時銷注並只以縣鈔照用不得取索户鈔皆以尚書省有請也御史中丞湯鵬舉言臣竊以易曰渙汗其大號書曰慎乃出令令出惟行弗惟反葢號令者大君所以鼓舞萬民者也故一號令之出謀之不可不臧發之不可不慎行之不可不久臣竊觀臣下之奏請有所謂應詔者有所謂輪對者有得見闕而朝辭者有當替罷而朝見者是皆合對而奏請也或曰且以藉手且以塞白且以隨例責其端慤以陳利害十無一二也因而為之變易法度可乎因而施之號令可乎臣謂革其所可革不必以一言而為之改易因其所可因不必以一言而為之仍舊實以上闗社稷軍民之安危下繫君子小人之消長不可不察也臣伏望睿慈率由祖宗之典章深監帝王之因革有如號令之施設必使有司公心平氣熟思詳擇推原措畫之從違討論奏陳之意嚮利則行之害則除之不輕信而立法無曲從而反汙使獻言者不能窺伺間隙而容其姦則號令素定吏民信服天下幸甚從之權禮部侍郎賀允中言臣聞為君者在恤民應天者必以實臣敢以刑罰財用致傷和氣二事試為陛下陳之夫刑獄之官人之司命方今州縣獄官凡拷訊罪人未嘗監臨盡付公吏之手每一鞭笞極其慘酷號痛寃呼聲聞道路捶楚之下何求而不得其致傷和氣者一也國家財用窠名立額率用一嵗中制其由來久矣比年以來經總制錢立額以紹興二十六年中最髙者一年十九年之數為之其當職官既有厚賞以誘其前又有嚴責以驅其後額一不登毎至横歛民間受弊不可勝言其致傷和氣者二也望詔天下刑獄勘官每遇考訊須自監臨經總制錢改立嵗額以為中制庶使刑罰清而民自不寃財用節而孰與不足於陛下恤民之心應天之實或有涓埃之助詔户刑部㸔詳申省夜彗星沒丁巳宰相沈該率百官拜表請御正殿復常膳詔不允表三上許之吏部侍郎兼侍講兼權吏部尚書張綱言伏睹詔書以星文示變上軫聖慮許士庶實封陳言又令諸路監司郡守條具便民寛恤事件聞奏仰見陛下嚴恭寅畏克謹天戒亟欲消變復臻和平天下幸甚然臣竊謂求言為易聽察為難臣區區所見尚慮疎逺之人鋭於納忠設意過當有强出新意而致衝改祖宗舊制者有取便一時而行之既久不能無害者有貪蠲復之名而不以用度較之致州縣不免暗取於民者若此之類自非深思熟慮實難遽見欲望明詔有司凡看詳羣臣所上章奏必須審慎究極事情不得一切茍簡更乞萬幾之暇躬垂省覽唯不悖戾祖宗舊法可以經久而實惠及物乃聽施行庶幾事體稍重動合人心而和氣可召災異非所憂也詔劄送看詳官起居舎人兼權給事中凌景夏言切見臨安府自累經兵火之後户口所存裁十二三而西北人以駐蹕之地輻凑駢集數倍土著今之富室大賈往往而是紹興二十一年有詔臨安府見推排等第依在京例與免命下之日萬口歡呼有司乃以和買役錢難以减放止與西北人蠲除其土著人户反成偏重臣竊謂土著流寓皆陛下赤子徳澤之施實先京師今陛下施德澤以幸斯民而有司不能奉承失信於下契勘兩縣在城營運浮財物力所敷和買絹匹數止二千六百有餘耳此在國計如秋毫之輕而民户蒙被恩賜有邱山之重伏望依已降指揮並與蠲免庶幾徳澤無偏詔令有信足以稱陛下發政施仁之意詔户部㸔詳如所請武徳郎殿前司游奕軍訓練官顔深知珍州右武大夫石世逹知叙州敦武郎殿前司凖備將光盛按光盛上疑脱姓知宜州武節郎添差漳泉州同都廵檢使王格知龍州脩武郎侍衛馬軍司㸃檢醫藥飲食李宗周知賔州皆用管軍楊存中成閔應詔所舉也宗周新秦人父翼宣和末守邊死事既而宗周入辭上錫以金帶且索翼忠義事迹以進遂改知永康軍宗周入辭在九月丁巳改除在辛酉右武大夫和州防禦使殿前司水軍統制王交特轉遥郡一官時浙東海賊林軍入等作亂交率兵捕獲之故有是命戊午詔近令諸路監司守臣條具便民合行寛恤事件提㸃刑獄官親行决獄縁四川去朝廷逺尚慮奉行滅裂致實徳不能及民可令制置使蕭振總領財賦湯允恭催督如奉行不䖍按劾以聞當重寘典憲左朝奉大夫主管台州崇道觀吳景偲行宗正丞景偲入對上曰卿逺來所經歴處民間有何利病景偲言雨暘順適百姓安居樂業上曰百姓樂業莫亦増長和氣否景偲曰自去冬以來陛下進賢退不肖政事一新和氣充塞嵗必豐登上諾之詔民間私欠逋負依欠官物指揮限紹興二十二年以前並行除放以户部尚書兼權知臨安府韓仲通應詔有請也辛酉夜天雨水銀癸亥御史中丞湯鵬舉言方今於祁寒隆暑暫罷講筵許近臣進故事是欲令禁從少竭愚忠禆補國論近來講筵所胥吏輙違舊制取索副本稱講筵要用自紹興十三年為始臣竊疑之是必懐姦之人自為朋黨惟恐臣下獻忠背違其意故令吏胥取索伏乞特降睿㫖今後不許取索副本只乞令就通進司進入庶幾臣下得以輸宻勿之忠從之降授左奉議郎知瀘州李文㑹復左朝奉郎武功大夫侍衛歩軍司正將魯安仁知文州敦武郎侍衛歩軍司凖備將張希道知融州安仁珏子與希道皆管軍趙宻應詔所舉也故右朝散郎韓參故右承議郎万俟允中故左奉議郎吳元美皆追復舊官甲子御史中丞湯鵬舉言臣近聞福建路州縣以鹽綱擾民每嵗增添不知紀極福建民户素貧因科敷鹽貨家家堆積而錢榖空虛日甚一日臣究其所由來不特縣令容其姦實由太守漕臣藉此以應付權貴恣為妄用上下督責更相黨庇故有以致然也乞令本路憲臣廵歴一路州縣並不許過紹興元年般運鹽綱之數立為定制仍仰監司按劾臺諫彈奏人户越訴在州當職官在縣令佐並以自盗論庶幾杜絶一路之害先是福建鹽貨漕司悉貯於海倉令劔建汀邵上四州取而鬻之以供嵗用其後漕司提舉司及州縣皆自賣鹽名數既不一而州縣又高其直以收其利吏緣為姦鹽惡不可售即按籍而敷號口食鹽下里貧民無一免者人甚苦之鵬舉以為言詔付户部其後本部乞委提㸃刑獄吳逵躬親廵按覈實限一季畢從之丙寅上諭宰執曰昨卿等奏近年有司申明續降指揮多有與祖宗成法違戾已令看詳改正至今不曾具到沈該曰六部以謂若一頓更改恐致紛紛欲每因一事便與改正一項上曰此固善然恐吏輩臨時得以舞文不若督責與一番改正該等奉命而退罷臨安府嵗貢御服綾詔展限陳訴經界不當指揮更不施行以殿中侍御史周方崇言恐權勢豪强之家將已定賦税反均及於下户故也丁夘直龍圖閣知衢州錢端禮罷以端禮在任違法害民本路漕臣張匯體究得實故有是命詔令舉行在職事釐務官所隨親如依得服屬不以己未有官並令赴國子監請解其有官人不得依前循例陳乞赴兩浙運司試從禮部請也御史中丞湯鵬舉言陛下邇者以彗出東方許士庶實封陳言可謂應天以實然臣下之奏請類皆更改法令或為一己之私或為一鄉之利今欲鏤板遍行天下皆歸過朝政有闕而已如此則止容姦人紊亂治體使小人之欠逋不償者頑猾人户之不納苖稅者姦雄胥吏之有詞訟者至愚不肖之唱為浮言者時時候星文之變則得以售其姦矣然此彗星之出井宿躔度晉地之分野臣不敢臆度自取欺罔之罪臣聞惟守常然後可以應變能應變然後可以禦亂古今之通論也臣伏乞睿慈奮乾綱之斷廓離明之照使浮言不作以慰四海之心所有鏤板播告改易徳政之請姑少遲之然後下酌民言上承天意為之討論因事修入紹興勑令以為一代之仁政萬世之良法臣不勝至願從之人主求言誠切如此而中丞乃為此論不知何説也是月編管人前右通直郎張常先卒于循州常先素凶愎部送使臣嘗為所杖乃苦辱之常先在江西又嘗不禮於右翼軍統制官賈和仲和仲以書抵推鋒軍統制兼知循州張寧曰彼視我曹如糞土不可不報寧幽之土窖中少日而死云建炎以来繫年要錄巻一百七十三
