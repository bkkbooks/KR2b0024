body:
  text: 建炎以來繫年要録巻八宋李心傳撰建炎元年八月戊午朔朝散大夫洪芻等八人流竄有差初芻等坐圍城中事屬吏上命殿中侍御史馬伸劾之及是獄成芻坐納景王寵姬曺氏降授朝散郎陳冲坐括金銀自盗與宫人摘花飲酒朝請郎余大均坐盗禁中麝臍及私納喬貴妃侍児喬氏朝散大夫周懿文朝議大夫張卿材朝奉郎李彞皆坐與宫人飲朝請郎王及之坐苦辱寧徳皇后女弟皆辭服刑寺當芻姦罪流冲贓罪絞大均及之贓罪流卿材彞贓罪徒懿文贓罪杖並該赦日厯載此事甚畧今以芻等案欵增修議者以為芻冲大均當死上閱其獄甚怒李綱等共救解之上亦以新政重於殺士大夫乃詔芻等三人皆貸死長流沙門島責懿文卿材彞及之為隴文茂隨四州別駕懿文英州卿材雷州彞新之及之南恩州並安置始言者論及之汙染國戚詈辱諸王及是以他罪貶彞嘗為主客員外郎預根括事故得罪張邦昌之貶也朝散大夫胡思坐立邦昌時有不臣語詔御史鞫之思引中書舍人劉觀為證觀為辨其誣及獄具思坐於推擇邦昌表内添改諂奉之詞有司當罰銅七斤責沂州別駕連州安置幼老春秋曰周懿文余大均等不死惟從貶竄君子以知李綱諸人不能輔佐恢復河東北之境土也曰失其刑矣朝議大夫知通州郭凝言通州地界東北正係海口南接大江最為要害己措置教閱水戰人兵及募人許備戰船入海卓望晝以旌旗夜以眀火為號應港汊兩岸多積柴薪之屬俟賊徒進入即縱火焚之仍於要害處築土臺覘望及募民間諳㑹出船入水之人相兼土軍使喚凡出海船用篛蓬便於使風添長槳速於追宼或颺石灰以眯其目或塗泥漿以滑其足行則用䝉衝以長䥥刀割其帆幔止則使善沒者以利刃斷其砧紲以至火箭手砲木棹竹牌手弩戈矛等從宜用之乞下揚州都作院支降神臂弓下属縣支錢和買戰船詔㳂江淮海州軍依此措置徙諸宗室於江淮以避敵於是南宫北宅皆移江寧府願留京師者聽之南班至江寧者三十餘人又移南外宗正司於鎮江府西外於揚州西外二年正月甲午宗正司三年四月辛酉南外三年十二月又移是日杭州軍亂初上之立也遣勤王兵還諸道杭兵才三百其将得童貫殘兵與之俱軍校陳通等見杭州富實甲東南因謀為變㑹軍士以衣糧不足有怨言結約已定而兩浙轉運判官顧彦成行部未返需其還殺之至是彦成歸宿于城外夜三鼓軍士百餘人縱火殺士曺㕘軍及副将白均等十二人翌日執守臣龍圗閣直學士葉夢得詣金紫光禄大夫致仕薛昂家殺兩浙轉運判官吴昉彦成聞亂亟奔湖州軍士見昂數夢得不給衣糧之罪昂諭遣之衆乃推通等七人為首釋夢得而囚之逼昂權領州事浙東安撫使翟汝文聞變自将七千人屯西興且奏請浙西兵受其節制昂餘杭人嘗為門下侍郎日厯六月甲子詔杭州軍賊陳通作亂閉守城壁差王淵張俊領人兵前去擒討此時通未作亂日厯誤也又熊克小厯稱通等逼特進薛昂領州事按昂靖康元年已落特進克不詳考耳克又稱彦成為轉運副使盖承洪邁夷堅志之誤己未元祐太后發京師都人始望車駕還内及太后行莫不垂泣上遣御營前軍統制張俊按原本作張浚今從宋史改奉迎至是擢俊帶御器械上初未識太后比至宫中愛上如已出衣服飲食必親調製焉庚申侍衛親軍馬軍都虞候威武軍承宣使御營使司提舉一行事務都廵檢使劉光世為奉國軍節度使光州觀察使帶御器械御營使司左軍統制韓世忠為定國軍承宣使拱衛大夫徐州觀察使帶御器械御營使司前軍統制張俊落階官並賞平賊之勞也世忠俊遷官日厯不載㑹要云以平黎驛魚臺叛兵各轉三官時内侍康履始用事光世曲意奉之此據林泉野記附見日厯庚申楊惟忠王淵劉光世並除節度使而眀年二月二十六日庚辰又書淵除節度使且有制詞不知何謂俟考辛酉右司諌潘良貴罷為尚書工部員外郎洺州防禦使龍神衛四廂都指揮使李庠為東京副留守時侍衛馬軍副都指揮使郭仲荀将所部扈元祐太后至南京故以庠代之按庠近以登極恩方復防禦使而日厯稱觀察使李庠為東京副留守恐誤都水使者陳求道坐河决責單州團練副使且令主管本監公事壬戌衛尉少卿衛膚敏言河朔國家根本之地前日既不能有割以與敵幸其能守而不下為今之計莫若隂降蠟書許以世守俾各知愛其土地而不輕與人又令堅壁清野使敵無所剽掠以至陜西京東淮南諸路並令增陴浚隍徙民入城多市積粟此不戰而屈人兵之道也御營司都統制范瓊将至襄陽李孝忠聞之率兵犯荆南府入其郛置酒髙㑹瓊追及之孝忠乗醉跨馬迎敵遂大敗其将校死者四人孝忠率衆趣景陵尚書右僕射兼中書侍郎兼御營使李綱守尚書左僕射兼門下侍郎門下侍郎兼權中書侍郎兼御營使黄潜善守尚書右僕射兼中書侍郎先是綱為上謀以秋末幸南陽上許之矣潜善與知樞宻院事汪伯彦力請幸東南上意中變於是綱所建白上多不從客或謂綱曰士論洶洶謂東幸已决南陽聊復爾爾盍且從其議乎不然事將變綱曰天下大計在此一舉國之存亡於是焉分果然吾當以去就爭之綱知譛愬之言其入已深一日留身奏事言臣近者屢䝉宸翰改正已行事件又所進機務多未降出此必有間臣者因極論君子小人不可並立之理且言疑則當勿用用則當勿疑上但慰勉之綱拜謝而退後數日遂有並相之命建炎日厯中興制草並命二相在今年七月熊克小厯亦載於七月壬寅而李綱建炎進退志云八月五日告廷綱自記必不妄今從進退志同知樞宻院事張慤兼御營副使癸亥命御營使副大閱五軍人馬自是執政皆有親兵日厯張慤除御營副使在壬申恐誤丙寅京畿轉運判官上官悟請悉發諸路坊場錢為行在贍軍之費詔諸路提刑司具見在常平錢物數以聞自崇寧後州縣常平錢未嘗那移上京故所積甚厚悟既以為言其後悉令計置輕賫金帛赴行在悟均子也丁夘三省樞宻院奏以諸路民兵為忠義廵社令憲臣提領張慤之為户部尚書也建言河朔之民憤於兵亂自結廵社請依唐人澤潞歩兵三河子弟遺意聫以什伍而寓兵于農使合力抗敵且從靖康詔㫖以人數借補官資仍倣義勇增修條畫下之諸路未及行㑹許翰與京東西路安撫大使兼知東平府權邦彦繼以為言乃以忠義巡社為名仍自本院㕘酌立法行下其法五人為甲五甲為隊五隊為部五部為社皆有長五社為一都社有正副二都社有都副總首二都社共為一千二百五十人甲長已上免身役所結及五百人已上借補官有差即有功或藝强及都總首滿二年無過者並補正犯階級者杖之嵗冬十月按試于縣仍聽守令節制嵗中廵社增耗者守貳令尉黜陟皆有差論者以為其法精審而詳整可以乆行前此論民兵者皆莫及也戊辰江南經制司遣幹辦公事宣教郎鮑貽遜将福建槍仗手二千五百人徃杭州討叛兵己巳詔諸路兵非専被㫖者毋得㑹行在命江淮發運副使李祐自南京至真州躬督糧運及見在金帛赴行在直祕閣宋晦落職權中書舍人汪藻言自崇觀以來兼官據勢者無非貲結權倖與開邉誤國奴事閹宦之人今當盡行削奪何足一一煩朝廷詞命望詔官制局取㑹凡有職名者自觀文殿大學士而下直祕閣而上共若干人各具得職奪職因依及其勞效過惡申尚書省用祖宗舊法每等止留數人無其人則闕其餘取㫖雖未奪者並行追奪不止於不叙而已又有雖嘗落職而官乃叨竊至銀青通議者皆前日姦兇邪佞之人非所當得亦乞降至中大夫而止如前宰執子弟因恩澤帶貼職及待制已上者並乞眀降指揮孰為當罷指定姓名鏤板施行奏可然未克行眀年二月辛酉所書可㕘考是日通問傅雱等至河陽金遣接伴使王景彞來迓止許雱以五人自隨日行百八十里庚午名元祐太后所居曰隆祐宫用學士院擬定也於是后更稱隆祐太后隆祐本欽聖憲肅皇后宫名不當用盖權直學士院王綯朱勝非失之壬申召布衣譙定赴行在定涪陵人學於伊川程頥靖康中召為崇政殿說書定以言不用辭不受至是猶在東都尚書右丞許翰薦于朝詔宗澤津遣赴行在自熈豐間程顥程頥以道學為天下倡其髙第門人有故監察御史建陽游酢監西京竹木務上蔡謝良佐今徽猷閣待制提舉西京嵩山崇福宫将樂楊時其後黨禍作頥屏居伊闕山學者徃從之而定與尹焞為首至大觀以後時名望益重陳瓘鄒浩皆以師禮事時而胡安國諸人實傳其學宣和末或說蔡攸以時事必敗乃召時至經筵淵聖皇帝擢為諫官以論事不合去吕好問在政府首言時之賢于上復召還朝未至而又召定是時給事中許景衡左司員外郎吴給殿中侍御史馬伸皆號得頥之學已而傳之浸廣好名之士多從之亦有託以自售於時而識真者寡矣焞漸孫也漸河南人仁宗朝為郡守焞紹興五年赴召詔真州守臣以禮敦遣長蘆隠士張自牧赴行在宣和末或有言自牧沉毅知兵召至東都賜道士服以不肯屈下梁師成不果用許翰言其才可任以河北山東之事乃召之既至授從事郎充御營使司准備差使延康殿學士知鎮江府兩浙西路兵馬鈐轄趙子崧言杭州軍變遣京畿第二将劉俊徃捕又命御營統制辛道宗将西兵二千討之中興遺史云道宗時為江南都統制恐誤直祕閣新知髙郵軍侍其傳移知真州癸酉通議大夫提舉杭州洞霄宫耿南仲責授單州團練副使南雄州安置侍御史王賔論南仲罪大責輕上曰南仲誤淵聖天下共知朕嘗欲手劍擊之乃有是命熊克小厯作建昌軍居住誤也眀年二月戊午改臨江乙亥尚書左僕射兼門下侍郎兼御營使李綱罷先是河北招撫使張所纔至京師河北轉運副使權北京留守張益謙附黄潜善意奏所置司北京不當且言所欲起北京戍兵給用器甲為非是又言自置招撫司河北盗賊愈熾不若罷之専以其事付帥司同知樞宻院事張慤素善益謙毎與之相表裏綱言所今留京師以招集將佐故尚未行不知益謙何以知其騷擾朝廷以河北民無所歸聚而為盗故置司招撫因其力而用之豈由置司乃有盗賊今京東西羣盗公行攻掠郡縣亦豈招撫司過邪方時艱危朝廷欲有所經略益謙小臣乃敢非理沮抑此必有使之者上乃令益謙分析是月甲子命既下知樞宻院事汪伯彦猶用其奏詰責招撫司綱與伯彦慤争於上前言其不當沮抑之以害大計伯彦語塞而止所方招來豪傑以忠翊郎王彦為都統制効用人岳飛為准備將彦河内人世為髙平大姓後徙居覃懐豪縱不事生産讀韜略習騎射其父竒之使詣京師𨽻弓馬子弟所稍遷清河尉能與敵角二聖北狩彦慨然棄家奔京師求自試所竒其才故擢為都統制飛安陽人嘗為人庸耕去為市游徼使酒不檢上之在相州也飛以効用從軍至北京論事罪廢飛建炎初論事坐罪他書皆無之紹興日厯十年九月二日辛酉岳飛奏臣昨建炎初因論事罪廢偶幸免死實出聖造因投招撫使張所一見與言及兩河利害臣自白身借補修武郎閣門宣賛舍人充中軍統領又陞充統制八年六月十三日丁夘飛又奏臣始從陛下至北京留妻劉氏侍臣老母云云以此知飛嘗在元帥府軍中但不知所論何事耳今併附見至是投所軍中時河東經制副使傅亮軍行才十餘日伯彦等以為逗遛復命東京留守宗澤節制使即日渡河亮言今河外皆屬金人而遽使亮以烏合之衆渡河不知何地可為家計何處可以得糧恐誤大事綱為之請潜善等不以為然上依違者累日綱留身極論其理且言潜善伯彦力沮二人乃所以沮臣使不安職臣每念靖康大臣不和之失凡事未嘗不與潜善伯彦熟議而後行不謂二人設心乃如此如亮事理眀白願陛下虛心觀之上曰竢批出如元指揮可也既而潜善有宻啓翊日上批亮兵少不可渡河可罷經制司赴行在是日辛未綱留御批再上上曰如亮人材今豈難得綱曰亮謀略知勇可以為大將今未嘗用而遽罷之古人之用將恐不如此因求去上不語綱以御批納上前曰聖意必欲罷亮乞以御批付潛善施行臣得乞身歸田里綱退聞亮竟罷乃再章求去上猶以不允答之於是殿中侍御史張浚亦論綱案浚字原本誤作俊今改正以為綱雖負才氣有時望然以私意殺侍從典刑不當有傷新政不可居相位又論綱杜絶言路獨擅朝政士夫側立不敢仰視事之大小隨意必行買馬之擾招軍之暴勸納之虐優立賞格公吏為姦擅易詔令竊庇姻親等十數事浚素與宋齊愈厚且潛善客也是日甲戌上召綱入對諭曰卿所争細事耳胡為乃爾綱曰人主之職在論一相宰相之職在薦進人材方今人才以将帥為急恐不可以為細事若以為細臣以去就爭之而聖意不回臣亦安敢不去因再拜曰潛善伯彦自謂有攀附之功方虛位以召臣盖已切齒及臣至而議論偽楚建請料理河東北兩路謂車駕宜留中原皆不與之同宜其媢嫉無所不至臣東南人豈不願陛下順流東下為安便哉顧一去中原後患有不可勝言者故不敢雷同衆說以誤大事望陛下勿以臣去而其議遂改也因泣辭而退遂上第三表劄客或謂綱曰公决於進退於義得矣顧䜛者不止將有患禍不測奈何綱曰大臣以道事君不可則止吾知全吾進退之節而已畏禍患而不去彼獨不能諷言者詆訾而逐之哉天下自有公議此不足慮是夕上召禮部侍郎兼直學士朱勝非草制責綱以狂誕罔悛謀謨弗效既請盡括郡縣之私馬又將竭取東南之民財以喜怒自分其賢愚致賞罰弗當於功罪出令允符於清議屢抗執以邀留用刑有拂於羣情必力祈於親劄以至帖改已畫之㫖巧蔽外姻之姦兹遣防秋之師實為渡河之援預頒告命厚賜緡錢賞踰百萬之多僅達京師而止每敦促其速進輙沮抑而不行設心謂何専制若此時浚章不下綱所坐皆潛善宻以傳勝非翌日遂罷綱為觀文殿大學士提舉杭州洞霄宫仍加恩綱在相位凡七十五日綱以六月己未入朝八月癸酉免去日厯綱免相在八月二十日綱行状云八月十八日告廷汪伯彦時政記亦同從之吕中大事記曰初論水災於宣和之時而為宣和大臣所斥建守城之䇿陳邀擊之謀於靖康之時而為靖康大臣所擠建炎之初公為首相慨然以修内攘外為己任而為潛善伯彦所沮一人之身三定大䇿而三受重謗然謗之所至名亦随之使公之言用於宣和之初則城都必無匱廹之憂用於靖康則國家必無顛覆之危用于建炎之時則中原不至於淪沒也以髙宗即位之初召於貶所而任以台衡待之非不専而公亦以一身任天下之重邊防軍政已略就緒中山之功未成而謗書滿篋矣公之去就甚輕而闗於天下之安危者甚重綱在位則措置兩河兵民稍集綱去則兩河無兵而中原沒矣綱在位則偽臣叛黨稍正典刑綱去則叛臣在朝而政事乖矣綱在位則必主幸襄鄧之䇿必從宗澤還京之疏綱去則維揚有警而翠華南幸矣當時猶以靖康京城之禍建炎維揚之禍歸咎於綱小人之無忌憚一至於此哉右正言鄧肅言人主之職在論一相陛下初登九五之位召李綱於貶所而任以台衡待之非不専也然綱學雖正而術踈謀雖深而機淺陛下嘗顧臣曰李綱真以身徇國者今日罷之而責詞甚嚴臣所以疑也且既非臺章又非諫疏不知遣詞者何所據而言臣若觀望豈為愛君且兩河百姓雖願效死而數月間茫然無所適從及綱措置不一月而兵民稍集又偽楚之臣紛紛皆官于朝綱先逐邦昌而叛黨稍正其罪今綱去則二事將何如哉兩河無兵則强敵驕叛臣在朝則政事乖綱於此不可謂無一日之長也肅尋與郡而言者極論其罪上曰肅亦何罪然猶送吏部尚書右丞許翰亦言綱忠義英發舍之無以佐中興今綱罷而留臣無益因力求去上未許然潛善等皆怒有逐之之意矣丙子浙東安撫使翟汝文以兵七千渡江先是杭賊陳通等紿汝文来受降汝文至城下賊不聽命汝文復還越州於是通等盡刺城中强壯為軍有衆數萬丁丑隆祐太后發南京侍衛親軍馬軍副都指揮使遂安軍承宣使郭仲荀落副字部禁旅從太后行且制置東南諸盗應江淮荆浙閩廣諸州皆為所𨽻仲荀請經制使已下並受節制許之日厯書殿前都指揮使郭仲荀眀年七月自馬帥再除副留守恐誤尚書吏部侍郎錢伯言為龍圗閣直學士知杭州吏部題名伯言除顯直知鎮江今從日厯本路軍馬並聽節制己夘詔曰近者大臣以擅朝誤國去位而小人在外乃謂請還京師爭執而去未燭厥由可檢㑹李綱乞都江寧府奏狀榜示以解衆惑綱之奏曰臣䝉恩復官見取真揚便路赴行在勘㑹都城實難安守宜有遷都之議以從一時之權江寧江山雄勝實為帝王之宅自六朝以來多都之今天下形勝之地惟西有長安逼近夏戎與河東土壤相接非有昔時阻固之利則建康之都理無可疑願斷自淵衷早定其議然後控扼㳂河江淮之險保有東南制御西北任使材智養民訓兵此最急務此奏議與綱元議不同當考初綱嘗請減上供之數以寛州縣修鹽茶之法以通商賈剗東南官田募民給佃倣陜西弓箭刀弩手法養兵于農籍陜西保甲京東西弓箭社免支移折變而官為教閲上命中書省條具㑹綱去位皆不果行至是黄潛善汪伯彦共議悉奏罷綱所施行者是日罷諸路買馬惟陜西諸州各買百匹其勸民出財助國指揮勿行已而傅亮以母病歸同州張所亦以罪貶招撫經制司皆廢矣亮二年正月丁酉降金之何俌龜鑑曰綱之言雖忠綱謗愈多顔岐邦昌黨人也於公未至而沮之宗尹嘗仕邦昌者也於公已至而沮之宋齊愈又嘗豫立邦昌議也及與公議國事又從而沮之君子難進易退也如此加之藩邸舊人公肆排毁並相之命下而綱之權已分經制之司罷而綱之去已决中山之功未成而謗書盈篋綱之秉政凡七十五日而所以共治者他有人矣當時挽而留之者不投之散地則寘之極典公之去就甚輕而闗於天下之安危者甚重也庚辰詔賜杭州黄榜招諭作過軍民若能率衆歸降當赦其罪一切不問仍審量事状情理命以官資若敢抗拒仍舊為惡則掩殺正賊外父母妻子並行處斬如大兵㑹合已到城下即今來改過出降放罪推賞指揮更不施行仍令監司召募土豪自率鄉兵㑹合討蕩亦許先次借補官職建炎後以黄榜招安叛兵自此始辛巳徽猷閣待制提舉亳州眀道宫顔岐復為御史中丞辭不拜改工部尚書壬午斬太學生陳東撫州進士歐陽澈于都市先是上聞東名東已見正月辛夘召赴行在東至上疏言宰執黄潛善汪伯彦不可任李綱不可去且請上還汴治兵親征迎請二帝其言切直趙甡之遺史云東疏中有云上不當即大位將來淵聖皇帝來歸不知何以處此按東書本不傳今且附此章凡三上潛善等憾欲以伏闕事中東然未有間也㑹澈亦上書極詆用事者其間言宫禁燕樂事上諭輔臣以澈所言不審潛善乗是宻啓誅澈併以及東皆坐誅東始未識綱特以國故至為之死行路之人有為之哭者上甚悔之東死年四十二中興姓氏録云東澈伏闕上書黄潛善汪伯彦及諸内侍譖於上驅東澈於市斬之識者哀其忠直且知喪亂未已也此所云内侍不知謂誰當考東澈三年二月己亥贈官甲申給事中許景衡為御史中丞中書舍人朱勝非試尚書禮部侍郎仍兼直學士院起居郎滕康起居舍人汪藻並遷中書舍人康仍召試後省題名除舍人在九月盖召而後命也奉直大夫㓂庠知單州庠已見今年二月癸酉進士王茂麟州鄉貢進士何洋並補廸功郎以言利害可採也洋青神人舊㳺河朔間陜西轉運使直龍圗閣何漸言其有文武才召對獻河防守禦圗言利害五十一事故有是命乙酉遣使徃諸路撫諭時以金人内犯朝廷命令隔絶盗賊踵起民不奠居乃議遣朝臣分徃諸路體訪官吏亷汙軍民利病命殿中侍御史馬伸使湖廣吏部貟外郎黄次山使京東西兵部貟外郎江端友使閩浙監察御史㓂防使江淮皆持詔書撫諭按㓂防等四人同日受命而日厯於眀年九月庚寅又書以監察御史㓂防為江淮四路撫諭不知何故時祠部貟外郎喻汝礪徃四川剗刷錢物而王􅊛馬忠經制河東北錢盖在陜西因就命之尋詔撫諭官所至决獄即死罪當議者許酌情減降以聞以道路不通用端友之請次山南昌人也許决獄在九月丙午今併書御史中丞許景衡言臣聞議者多指開封尹宗澤過失未知所指何事若只拘留金國使人此誠澤之失也然原其本心但激於忠義未審國家事體耳臣自浙渡淮以至行在聞澤之為尹威名政術卓然過人誅鋤强梗撫循善良都城帖然莫敢犯者又方修守禦之備厯厯可觀臣雖不識其人竊用歎慕以為去冬京城之内有如澤等數輩赤心許國相與維持則其禍變未至如此其酷也今若較其小疵便以為罪不顧其盡忠報國之節其不恕亦已甚且開封宗廟社稷之所在茍欲罷澤別選留守不識今之縉紳其威名政績亦有加於澤者乎伏望聖慈上為宗社下為億萬生靈特賜主張厚加任使先是論者多以澤為非景衡入朝以病未得見首上疏辯之疏入上大悟詔朝廷別無行遣亦無臣僚章疏仍封景衡奏示澤由是澤頼以安景衡又言南陽無險阻城池而宻邇盗區且漕運不繼不如建康天險可據請定計廵幸凡八上疏言之丙戌尚書右丞許翰充資政殿學士提舉臨安府洞霄宫陳東死翰謂所親曰吾與東皆爭李相者今東戮都市吾在廟堂可乎乃力求去故有是命翰之罷日厯在乙酉今從熊克小厯是月監察御史盧臣中守右正言臣中除正言諫院題名在六月御史臺題名在七月日厯無之按此月鄧肅始罷右正言臣中當是代肅今且移附此俟考京西轉運判官程昌㝢為尚書吏部貟外郎昌㝢昌弼兄也初為鄧洵武使臣其後皆換授昌㝢之除日厯不載此據家傳博州卒宫儀聚衆數萬人迤邐㓂萊州至是據即墨縣時又有潰卒李汲劉三将合數千騎犯萊州儀利其馬紿之神霄宫與之㑹伏兵擊殺之盡併其衆軍勢甚盛通問使傅雱馬識逺至雲中金左副元帥宗維在草地未還左監軍完顔希尹遣其大理卿昭文館學士李侗館伴問雱使指雱以二帝表及國書授之凡六日乃得見希尹與右監軍耶律伊都知樞宻院事時立愛席地重氊参坐堂上兵部尚書髙慶裔立其傍雱跪聽其語希尹先言本朝不割三鎮事又言通問之初安可遽及二帝即不得請殆以兵取之耶雱遜謝再三乃罷就舍立愛其先臨洺人石晉之亂徙涿之新城立愛事遼為太子少保侗燕人粗知書宣和末避地中山詹度以侗知飛狐縣間為雱言斡里雅布與南朝有善意尼瑪哈烏舍堅持之繇是二帝北遷之舉决矣建炎以來繫年要録巻八
