body:
  text: 建炎以來繫年要錄巻一宋李心傳撰建炎元年嵗次丁未金太宗晟天㑹五年春正月臣謹案建炎改元在五月之朔今為所載乃中興事始故依資治通鑑及累朝實錄嵗中改元例即于嵗首書之或謂建炎元年無春當依舊文用靖康二年紀事臣謂不然春秋魯定公以六月即位是六月以前國人必稱昭公三十三年矣而孔子書之曰元年春王三月晉人執宋仲幾于京師夏六月戊辰公即位孰謂定公元年之無春乎故臣此書以元加春盖亦竊取春秋之義辛夘朔淵聖皇帝朝道君太上皇帝于延福宫是日兵馬大元帥康王軍行次陽穀縣王名構字德基道君皇帝第九子母曰韋賢妃謹案實錄體制當云顯仁皇后韋氏則紹興三十年以後所書也日歴則云宣和皇后韋氏建炎元年五月以後所書也今臣此書以事繫日此時顯仁未正尊名則書法當如此大觀元年五月乙巳夜生于東京大内之宫中紅光照室八月丁巳賜名拜定武軍節度使檢校太尉封蜀國公二年正月庚申徙鎮海軍節度使開府儀同三司封廣平郡王宣和三年十二月壬子拜太保遂安慶源軍節度使進封康王日歴四年正月封康王㑹要及熊克中興小歴並云四年三月封王誤也盖三年冬進封明年春乃出閤耳今從汪所編元符庚辰以來詔㫖藻識明彊記日誦千餘言挽弓至一石五㪷七年冬金人来侵張匯節要云阿古達為帝以本土愛新為國號愛新女真語金也以其水生金而名之猶遼人以遼水名國也金太祖實録云太祖以遼天慶五年建國曰遼以鑌鐵為國號鑌鐵雖堅剛終有銷壊惟金一色最為真寳自今本國可號大金二説不同未知孰的也靖康元年正月庚辰被命使軍前議和金國者在遼之東北葢古肅慎氏之地其國在漢稱伊掄南北之間稱和竒隋唐稱黙爾赫至五代始稱女真祖宗時嘗通中國後臣屬于遼建中靖國元年遼海濵王耶律禧立號天祚皇帝立十五年女真完顔旻起兵女真姓與廟諱同音今依張匯節要進本例為字不成案宋法嫌名皆避欽宗諱桓故完字亦闕末筆今已全寫本字則此註為贅然原本所有姑存其舊旻即阿固達其先新羅人也金太祖實録云太祖生於戊申七月其先為完顔部人後因以為氏洪皓松漠記聞云女真君長乃新羅人號完顔氏完顔猶漢言王也苗耀神麓記云女真始祖堪布出自新羅奔至安春無所歸遂依完顔因而氏焉後女真衆人結盟推為首領七傳至兀古達乃大聖武元皇帝侍中韓企先訓名曰旻張匯節要云阿骨打即位以王為姓以文為名鍾邦直舊帳行程録云金主名文小字阿古忽案此諸書阿骨打姓名及小字皆不同然趙良嗣奉使録馬擴茅齋自叙洪皓記聞等書並作阿骨打三人皆身至金廷此必不誤惟史愿金人亡遼録作阿姑打疑語音之訛案紹興二十六年令國信所避旻字紹興講和録載烏珠書李正民避旻嫌名改作正文而三十年十月虞允文出使去文字權改名允何也豈金主嘗名文而易為旻耶錯按金太祖名阿固達今已譯定李心傳不知漢文互由于譯音之訛舛復加辨訂實屬支贅但原註乃臚考異同之文未可概加改正姑仍其舊後倣此先是宦者武康軍節度童貫持命使遼政和元年九月辛巳為遼主禧所辱貫怒㑹燕人馬植得罪於其國間道邀貫説以取燕之策貫納之政和四年秋女真起兵四年八月五年夏植自雄州來奔更姓名曰李良嗣欽宗實錄童貫附傳云馬植得罪於其國間道邀貫説以取燕之策貫納之約以來歸至則蔵之家奏賜名為趙良嗣鄭昂危史云政和二年燕人馬植者來歸匿於童貫家植能文辭數上書上喜賜姓名李良嗣熊克中興小歴政和二年童貫為遼國生辰副使貫還有燕人馬植者宻邀於路為言取燕之策貫挾以歸奏賜姓名李良嗣王偁東都事畧契丹附錄云貫回至盧溝河夜召見植擁之以歸易姓名曰趙良嗣薦之於朝案三國謀謨錄良嗣以政和五年三月壬申上蠟書雄守和詵以聞辛巳蔡京童貫奏許之四月庚子入界壬寅至雄州丁夘入見盖貫與之約而後納之非擕以歸也附傳及諸書皆差誤或謂貫植既已相約不當更渉三年有餘而後至恐亦不然案良嗣降書云天慶五年三月而中有天祚親征女真軍無鬭志之語天祚以辛夘嵗改乾統十一年為天慶時當政和元年四年秋女真起兵五年春天祚下詔親征女真與此書合謂貫擁之以歸者恐誤仕諸朝始有謀燕之意遼人既為女真所破其勢寖微六年冬貫干預樞宻院事遂謀出師七年春尚書司封員外郎陶悦使遼而歸二月癸未具言敵未可圖㑹知樞宻院事鄧洵武亦不以為然事得暫止此以陶悦奉使錄參修錄云二月中旬貫北伐前軍發悦歸奏敵未可圖事乃寢建炎末悦以此贈秘閣修撰其年夏薊州人髙藥師見遼國亂自海道奔登州言女真攻遼奪其地大半守臣王師中以聞良嗣霍隂人渉獵書傳有口才先是師中聞朝廷經畧用兵全家來忻代詔令赴朝質以並邊衆事師中謀與良嗣同遂令知登州以伺其事事聞太師蔡京總三省童貫領樞宻院命師中募人持詔以市馬為名伺其實八月戊辰女真不納蔡絛北征紀實髙藥師等還奏謂雖已到彼蘇州界望見岸上女真兵甲多不敢近而回於是上為赫怒頗疑外廷臣寮承望大臣旨意因詔元募借補人并將校一行並編配逺惡又降御筆通好女真事監司帥臣並不許干預是歳童貫又上其平燕策魯公不報一日留身劾貫壊邊事上乃議除貫司徒致仕貫大懼為伯氏置酒甚厚以二犀帯遺伯氏伯氏力救解一日童師敏持䜟緯兩幅紙來讀之誠如近事魯公曰為奏知此非本朝美事廼䜟五代石晉出帝爾仍謂師敏曰更待用兵若使如圖䜟言好模様自此議遂寝重和元年春還青州正月丙戌夏詔武義大夫馬政與其子承節郎擴字犯御名今改後准此案廣字今俱改從原名擴字而原注姑存其舊及平海軍指揮使呼延慶航海往使四月己夘悦節夫子節夫宣和間為龍圖閣學士應姓名已見建隆以來繫年要錄者此不别出止注其爵里于下以便稽考洵武䨇流人京仙遊人政狄道人也秋旻用遼秘書郎楊璞計張匯節要作楊朴趙良嗣奉使錄馬擴自叙並用此璞字今從之即皇帝位重和元年八月遣南海人李善慶與政偕來廣安軍進士安堯臣疏論逺隙不可開詔補堯臣承務郎實不用其議堯臣以五月上書十一月補官冬遼主禧册金主旻為東懐國皇帝割長春遼東兩路地且議和旻不聽元年十二月宣和元年春善慶至京師正月丁巳詔京貫召問諭以夾攻遼人取燕地之意遣直秘閣趙有開持詔書往賜三月甲子璞鐡州人有開燕人趙秉直也秉直以政和七年正月丙申賜名案武臣趙秉淵易州人未知與秉直同族否當考蔡絛北征紀實云李善慶來見魯公但衩衣臨堂廡待之善慶再拜於堂下魯公曰歸語汝主中國所守信義也兩國盟誓重未得便如汝主所請汝主茍能興立則朝廷當自有禮遇善慶首肻再拜而退即具奏其辭上悵然魯公私甞謂絛曰北事只我了得他人做着必鑿脱雖然我功名能有甚底日夜着身不得更好了却燕山耶伯氏宻以白上於是上意大寝遂議罷魯公矣絛所云如此恐非其實夏有開至登州而死諜報遼人與女真議和朝廷聞之遣呼延慶送善慶歸呼延慶至女真六月戊寅金主旻以本朝賜詔為非禮怒拘之冬始遣歸十月戊戍二年春至京師二月丁酉時李良嗣已賜姓政和七年正月丙申賜姓遂命良嗣以右文殿修撰再使三月丙寅面約夾攻遼以燕地歸我金主旻許燕京七州而不許雲中及平灤地秋遣良嗣與其臣錫琳赫嚕以國書來且言嵗幣七月丙辰自上京遣還九月壬寅至京師詔登州兵馬鈐轄馬政持國書及事目報聘九月壬辰於是童貫已有出師意乃命河北軍與陜西河東更戍九月己未蔡絛北征紀實乃載更戍事於政和五年與史不同又遣西兵宿將㑹京師冬睦冦方臘作亂十月丙子三年春童貫南征正月丙午夏赫嚕復至京師五月丙午遼上京路副統耶律伊都以讒得罪遂奔女真松漠記聞云余都姑之降金人以為西軍大監軍即餘覩也邵伯温辯誣作俞覩亦誤今從實録蔡絛北征紀實政和五年遼主遣九大王為元帥征女真方臨敵而大臣余堵强立之因脫身投遼主余堵降女真與此異按伊都名今改正姑存原註秋上皇以貫未還用太宰祥符王黼議授赫嚕書歸不遣使八月壬子冬赫嚕至金十一月金主旻意朝廷絶之乃悉其衆渡遼而西以伊都為前鋒四年春破中京正月癸酉遼主禧棄燕京去三月庚午國人立其從父秦晉國王淳為帝三月丙子伊都引金人入雲中地三月乙酉入西京邊吏以聞詔太師童貫為河東北宣撫使三月丁亥貫自江浙還以諫取花石事與黼有隙貫造京坐深語黼大懼遺貫書曰若北行願盡死力貫大喜此據蔡絛紀實附入紀實又稱上將命鄆王為元帥魯公宻扣中宫力爭又梁師成力阻貫因得且止及魯公請對力諌北伐事文多不錄將行上皇以三策授貫上策取燕中策耶律淳稱藩下策全師而還夏童貫發京師四月戊戌復以少傅蔡攸為宣撫副使五月丙寅攸京長子為上皇所信愛使監其軍吳曽漫錄云宣和四年金人攻大遼使王緯來乞師宰相王將明主其議以童貫為宣撫使蔡居安副之案史金人止檄代州不得受逃亡人未甞遣使諸書亦無王緯乞師事今不取貫至雄州五月乙亥遣閤門宣賛舍人馬擴入燕招諭又遣都統制保靜軍節度使种師道將兵十餘萬随之耶律淳大懼欲稱藩五月辛巳㑹師道進兵與西都統林牙耶律逹實遇大石一作大實改按耶律達實名今正姑存原註敗于白溝五月癸未遂已始貫攸之出師也其參謀官中書舍人宇文虛中論此事乃安危存亡之所繫願罷將帥還朝毋開邊隙黼不聽師道世衡孫世衡洛陽人終環慶路兵馬鈐轄逹實遼宗室虛中廣都人也未幾耶律淳死六月辛亥妃蕭氏權主國事貫以遼尚盛遂班師六月癸巳次髙陽闗起復延康殿學士詹度時守中山言燕人無主願納土上皇疑未决王黼力主再興師之議秋詔貫攸毋歸異議者斬益發諸路兵二十萬㑹三關七月壬午朝散郎安陽宋昭提舉江西茶鹽公事還上疏論女真决先敗盟其言切至朝廷怒械送連州編管九月辛酉金人聞貫出師恐我師先入關不得嵗幣遣通議使烏色髙慶裔來議夾攻責以不先示起兵月日九月乙丑入見詔趙良嗣馬擴報聘朝議始傾心倚金人以取燕地既而遼易州將髙鳯以城來附九月辛未常勝軍管押郭藥師亦以涿州地及所部詣宣撫司降九月己夘蕭太后懼命乾文閣待制韓昉奉表稱臣貫攸不受九月甲申冬貫使藥師道諸將以輕騎襲燕入之諸將甫入燕軍無紀律遼樞宻使蕭幹以兵來援諸將遁歸七月己酉良嗣至奉聖州本古新州金主旻口不言而心許雲中地十月辛亥都統制鎮海軍節度使劉延慶自盧溝焚其營夜遁十月甲寅童貫不得燕而懼遣使臣王瓌宻禱金主使圖之瓌十一月辛未至奉聖州金主先遣國信使李靖計議使烏凌阿色哷美來許山前七州漢地漢民且言平營灤三州雖貴朝克復不在許與之限上皇諾之十二月戊子後三日金主旻入燕林牙逹實以七千騎奔夾山蕭太后偕行為遼主禧所殺蕭幹亡入奚十二月丁酉自號大奚國皇帝獨遼興軍節度副使張覺繕兵守營平地金人遣故遼參知政事康公弼招諭十二月戊戌授覺同中書門下平章事建平州為南京趙良嗣至燕十二月庚子金主責之復遣李靖色哷美來議以本朝不夾攻欲得燕地租賦十二月甲辰慶裔渤海人本東京户部司繙譯吏稍知書藥師鐡州人昉燕人幹奚人延慶保大軍人其先西蕃熟户瓌師中子靖賔州人色哷羙女真人也張覺賈子荘䧟燕記作張㲄北狩録作張珏諸書多作覺今從之撒拇馬擴自叙作撒盧拇今從張匯節要按色哷羙名今改正姑存原註五年春金人求燕地租賦使者三返遂命龍圖閣直學士趙良嗣持御筆誓書至軍前許嵗賂銀絹五十萬匹兩代租貨一百萬緡而請燕山地三月丁巳蔡絛紀實云劉延慶師潰王黼因入言曰二帥不足仗臣當自主之上意屢欲罷反為羣小所持激鄭居中時在樞府梁師成萬從中秉權數進不便之語黼既專任其事因降㫖飭二帥不得動以聽約束廼使趙良嗣奉使金用事者及契丹舊臣猶持不可金主旻獨許之前已得涿易二州夏金人以燕京及檀順景薊四州漢地漢民歸我四月辛夘後九日貫攸以全軍入燕初曰交割後曰撫定未踰月金太祖旻卒于白水泊五月乙丑其國相宗維遥册旻弟烏竒邁為帝更名晟宗維旻伯父和卓孫尼瑪哈也金太祖實錄云太祖生于戊申天輔七年八月己未終于布圖濼在位九年享年五十有六與諸書皆不同史愿金人亡遼錄云呉乞買名慎鍾邦直行程錄云金主名慎小字吾克埋與諸書亦不同今不取洪皓記聞云黏罕者呉乞買三從弟名宗幹其庻弟名宗憲靖康日歴欽宗實錄亦云阿古逹以其弟呉乞買黏罕為謀主張匯節要云天㑹四年夏以皇弟黏罕為左副元帥此諸書皆同按阿古逹子姪名皆連宗字黏罕兄弟亦然則决非其弟也史愿亡遼錄云阿古逹有弟姪曰呉乞買黏罕輩盖呉乞買乃其弟而黏罕乃其姪此為得之然宋王宗幹乃武元之子海陵之父紹興二十六年朝㫖令國信所避旻晟亮幹四字則宗幹决非黏罕名張棣金志云黏罕為薩哈子恐亦不然今從苗耀神麓記今按金太宗名烏竒邁及尼瑪哈名改正姑存原註自尼瑪哈擅兵愈不欲交雲中地而蔚朔武三州守將以城來附金南京留守張覺亦上表歸命六月丙戍上皇疑未聽燕山宣撫使真定王安中以營平形勝勸上皇受之覺邀囘金人所遷燕京職官户口乃拜覺泰寜軍節度使世襲平州金主旻之未死也議取燕北人民童貫以常勝軍為重乃奏以燕地六州富民與之對换盖利其田宅以贍常勝軍比富民歸而貲産已散皆流離困躓遂重失燕人心然常勝軍月費縣官糧猶十餘萬斛率自山東河朔運至燕由是齊趙晉代之間民力皆竭而羣盗蠭起太傅王黼大懼遂令天下皆出免夫錢凡六千二百餘萬緡此並據蔡絛北征紀實上皇以貫無功命貫致仕十月己未黼與少保梁師成共薦太尉譚稹為河東北宣撫使師成稹皆宦者使之圖雲中冬金人克平州五年十一月張覺奔燕山金人檄疏我罪而取之朝廷不得已命太尉同知燕山府郭藥師斬首以送繇是常勝軍皆解體是歳奚人饑其部曲殺蕭幹傳首于我十二月甲辰譚稹知常勝軍不可制六年春乃募雲朔漢兒數萬號義勝軍初燕之未得也趙良嗣許貸金人糧稹不與金人怒秋取蔚州及飛狐靈邱兩縣六年八月稹坐是貶復命童貫總師八月乙夘孫覿撰章綡墓誌云譚稹為宣撫使朝廷命公為參謀官時金人納夏𦍑之請割雲中以北三千餘里遺之止以朔武歸我夏人駸駸河朔州境詔稹發兵討之太上皇親筆督戰至八九公益持不可曰金人以我納叛渝盟藉為爭端今困竭天下盡于燕山訖無善後之策况議雲中乎退而疏燕雲决不可守之状反覆數千言皆社稷安危之决趣稹上之稹讀奏大驚曰安得此不祥之言公言擇禍莫若輕極論數日稹不得已擇取一二上之書奏稹罷公落職遷吏部更命童貫出師遂敗績按此所云與諸書不同姑附此當考綡楶子時為右文殿修撰遼主禧與林牙逹實猶在夾山夾山者在沙漠之北有泥潦六十里獨契丹能逹它國所不能至羣小共謀遣一蕃僧賫御筆絹書誘禧約使來歸待以殊禮禧大喜尅期相接貫以是落致仕出使金人每以力不能入夾山為恨㑹帛書屢返金伺知之冬貫遣武功大夫和州防禦使馬擴見金將完顔希尹議交雲中十一月壬寅希尹不許是月王黼致仕十一月丙子蔡京領三省事十二月癸亥貫上疏經畫雲中京進呈尚書右丞宇文粹中持不可乃畫㫖留俟粹中虛中兄也七年春遼主禧畧山後地希尹遇之于歸化州本舊武州以兵遮其歸路遣貝勒羅索擊而俘之天祚被擒國史載之宣和七年正月末盖因馬擴自叙及汪藻背盟錄所記烏珠獻㨗年月蔡絛北征紀實亦同然元符詔旨童貫賀表乃云契丹昏主以二月十九日北走二月二十七日准大金牒昏主已出首前來則在七年二月矣諸書皆誤亡遼錄云保大四年秋烏珠擒天祚保大四年乃宣和七年若繫之是秋尤甚誤今不取紀案文獻通考北征紀實二巻蔡絛撰此書或作錄或作紀實今俱改從通考以歸畫一逹實以殘衆奉其子梁王北奔洪皓松漠記聞云遼亡逹實林牙亦降與尼瑪哈雙陸争道尼瑪哈心欲殺之而口不言逹實懼歸帳即棄其妻擕五子宵遁入商安立天祚之子梁王為帝而相之案三國謀謨錄兩國編年皆云逹實諌不聽稱病不行若逹實亦降則梁王何以得免皓所記恐誤也諸書皆云天祚四子趙晉秦許四王而無梁王當是其後一王改封也今從之希尹晟之從子烏舍悟室名希尹據洪皓記聞天眷二年希尹加恩制云屬為諸父故知為晟從子也實録作兀室然皓嘗為其館客必不誤苖耀神麓記云悟室母孕三十箇月而生名曰悟室乃三十也今從之正按烏舍名今已改姑存原註羅索女真人也秋金益兵雲中頗經營南犯九月詔廣陽郡王童貫往太原宣撫速行毋留九月壬辰初遼海濵王既廢其貴臣劉彦宗蕭慶之徒朱邦基靖康餘録云劉彦宗本河北人奔大遼上東侵中原計天祚惡其敗盟覆好流于錢監金人克之召入帳計事大説其謀以為樞宻使節制諸軍案馬擴自叙阿固逹抵燕京北朝兩府漢兒官左企弓劉彦宗等開門迎降張匯節要金人立漢兒劉彦宗時立愛為相二人皆燕人以墳壠田園之故愈勸敵入侵盖彦宗非河北人又天祚時已知樞宻院事非金人始用之邦基所聞皆誤今不取復入金用事故内外合謀共勸南侵且言中國無人因兵就糧可也冬國相宗維檄宣撫司問罪遂侵河東大邑耿氏有書號痛哭流涕編載此檄文云天㑹三年十一月二十七日盖起兵日也國史尼瑪哈犯邊在十二月都經畧處置使宗傑自檀州入河北犯檀州在十二月朔其使名耿編上淵聖書有之義勝軍之在河東者執其守將以叛童貫聞之遁十二月甲辰常勝軍亦囚其宣撫使保和殿大學士餘杭蔡靖十二月乙巳以燕降十二月丙午邊遽聞十二月辛丑宦官猶秘其事後五日輔臣共議十二月丙午命陜府西路轉運判官鉅野李鄴持萬金及三省樞密院牒詣金軍迎獻太原中山河間三鎮地以和且言内禪十二月己未宗傑旻仲子斡里雅布金太祖實錄云二太子名宗望案宗望乃達蘭子恐誤今從苗耀記斡離不一作窩里孛案金正上淵聖書用此三字今從之按斡里雅布名今改姑存原註於是上皇意已决乃用給事中直學士院揚子呉敏計禪位于皇太子是為淵聖皇帝十二月庚申明年改元靖康保和殿大學士蔡翛請駕幸長安㑹兵以圖收復詔以翛知京兆府正月丁夘翛兄攸忌其成功改知鎮江府金人聞内禪大驚欲引去郭藥師言南朝未必有備乃遣藥師先渡河武泰軍節度使宦者梁方平河東北副都統制武康軍節度使祥符何灌皆潰正月戊辰太保領樞宻院事蔡攸夜奉上皇乘舟東幸正月己巳童貫與殿前都指揮使開封高俅繼領勝㨗軍及禁衛三萬五千人扈從太宰開封白時中等請幸襄陽淵聖皇帝用新除尚書兵部侍郎邵武李綱計固守正月辛未且召諸道兵入援金攻城不下乃遣貝勒呉孝民來議和正月癸酉自言奉其主命如趙皇悔過再乞懽盟仰就便酌中施行此為紹興十五年六月戊戌秦檜奏上語張本其書北盟㑹編有之始稱少帝詔遣尚書駕部員外郎彭城鄭望之同知樞宻院事臨沂李棁往使望之以癸酉棁以甲戍出使棁等與金議割三鎮以宰相交地親王送大軍過河太宰河内李邦彦亟請如敵約以紓禍王慷慨請行遂與少宰東光張邦昌乘一栰渡濠自午及夜分始逹敵寨辛巳上皇次鎮江府淵聖皇帝以王黼首禍流之湖外庚寅又使盗殺之黼之死實錄長編係于壬辰案靖康别錄開封府奏據捉事使臣韓膺状王黼二十四日至雍邱縣永豐鄉為盗所殺取到首級申比它書最詳庚寅二十四日今從之江淮發運副使盧宗原以行宫之命遏漕舟與郵傳俾不得西趣京師又留淛兵泗州司錄事詹大和言童貫且為變甲午以户部尚書聶山為發運使黔州觀察使權主管侍衛馬軍司公事薛安為副往誅貫尚書右丞李綱固諫乃罷行黜梁師成為彰化軍節度副使行一日追殺之趙甡之中興遺史陳東奏疏未及行㑹有姚平仲之敗繼有毆擊中官太學生伏闕事再貶循州安置師成知其不免遂自殺蔡絛國史後補師成得罪縊殺之但以其自縊聞贈太師按史師成之貶在乎出師之前亦無再貶循州及贈官事今不取宗原秉子秉徳清人龍圖閣直學士大和遂安人山臨川人也王留金軍踰旬日意氣閒暇二月丁酉朔京畿等路宣撫司都統制隴干姚平仲夜以西兵萬人襲敵寨不克亡去戊戍遂罷尚書右丞親征行營使李綱以謝敵命尚書左丞蔡懋為守禦使代之辛丑遣資政殿大學士宇文虛中持割地詔至敵軍是日太學生陳東等伏闕上疏請留李綱士民喜至者十餘萬淵聖皇帝大驚復以綱為守禦使平仲保靜軍節度使古養子懋確子確晉江人元豐右僕射東丹陽人也始姚平仲之襲金營也金以用兵責使者張邦昌恐懼涕泣王不為動金人因憚王不欲留更請肅王乙巳王還詔割三鎮以北二十州地遣皇弟肅王樞遷張邦昌太宰以為質又許金繒銀帛五千七百萬匹兩以和李綱爭不聽丙午王以勞遷太傅是日金人退師同知樞宻院事种師道請薄諸河而擊之又不聽庚申斬梁方平於都市罷諸道勤王之師辛酉遣將將兵援三鎮始上皇留鎮江未返幸臣寜逺軍節度使呉縣朱勔邀上皇幸其里第朝廷憂之少宰呉敏請令蔡攸勸上皇北歸以贖罪四月己亥上皇還京師金國相宗維在雲中聞宗傑獲金幣不貲而已無所得遣使者蕭仲恭來求賂大臣以勤王之師踵至有輕敵意初命尚書度支員外郎邢倞館客邵伯温辨誣云倞為司農少卿奉詔館客案仲恭以四月離京師而倞五月戊辰始自員外郎遷光禄少卿伯温誤記也既而拘之都管趙倫懼不得歸紿告倞以元帥府右都監耶律伊都貳於金人願歸大國欽宗實錄云初斡里雅布軍還尼瑪哈遣使數輩來求賂大臣以肅王未還留金使與之相當有都管趙倫者燕人狡獪懼不得歸乃詐以情告邢倞云云所謂使者數輩史無其名王偁東都事畧熊克九朝通畧並從實錄作趙倫李燾長編徐處仁呉敏共議釋蕭慶持伊都書遣還注此據李綱辨伊都事劄子蕭慶當作蕭倫案實錄所書全據宣和錄惟沈良靖康餘錄作蕭慶此亦不然靖康要盟錄有黄絹詔本云比者使人蕭仲恭趙倫之來云云盖仲恭乃使命而倫其都管也宣和錄脱仲恭名今載詔書全文于後以補實錄諸書之闕焉其書云靖康元年四月日大宋皇帝致書于左金吾衛上將軍右都監耶律太師昔我烈祖章聖皇帝與大遼結好澶淵敦信修睦百有餘年邊境晏安蒼生䝉福義同一家靡有兵革戰鬭之事通和之久振古所無金人不道稱兵朔方拘縻天祚剪滅其國在于中國誓好之舊義當興師以拯顛危而奸臣童貫等迷國擅命沮遏信使結納仇讎搆以金繒分據燕土金匱之約蔵在廟祧委棄弗遵人神恫怨致金人之强暴敢肆陸梁俶擾邊境逹于都畿則惟此之故道君太上皇帝深悼前非因成内禪肆朕初即大位惟懐永圖念烈祖之遺德思大遼之舊好輟食興念無時敢忘凡前日大臣先誤國搆禍皆已竄逐思欲重體先時親仁善隣以為兩國生靈之福此志既定未有以逹而使人蕭仲恭趙倫之來能道遼國與燕雲之遺民不忘耶律氏之德兾假中國詔令擁立耆哲衆望所屬宜于國人無若金吾者實諧至意良用忻懌昔聞金吾前為遼國將兵數有大功謀立晉王實為大遼宗社之計不幸事不克就避禍去國向使前日之謀行晉王有國則天祚安享榮養耶律氏不亡然則于天祚不害其為忠而于耶律氏則至忠矣宗室之英天人所相是宜繼有遼國克紹前休以慰遺民之思方今總兵于外且有西南招討太師同姓之助雲中留守尚書顯忠之佐一德協心足以共成大事以中國之勢竭力擁衛有何不成謀事貴斷時不可失惟金吾圖之書不盡言已令蕭仲恭趙倫面道曲折天時蒸溽更兾保綏宰相徐處仁呉敏共議甲辰以蠟書授倫厚賜之金錢使結伊都倞恕子恕原武人紹聖御史中丞處仁穀熟人熊克小歴云處仁宋城人今從本傳仲恭倫皆燕人也倫歸白其書宗維大怒趙甡之遺史先是麟府折可求獻言夏國之北有天祚子梁王與林牙蕭太師統兵十萬出榜稱金人不道南朝奸臣結納毁我宗社今聞南朝天子悔過遜位嗣君聖明如能合擊金人立我宗社則前日敗盟之事當不論也呉敏以為然乃奏上令致書梁王由河東入麟府為尼瑪哈遊兵所得按此與實錄諸書全不同疑傳聞之誤今不取辛亥宗傑至燕山府此據許採陷燕記癸亥斬趙良嗣趙甡之遺史在三月癸巳與史不同五月甲戌河東北制置使种師中戰死于榆次後十日制置使姚古敗于盤陀丙子用門下侍郎耿南仲議以知樞宻院事李綱為河東北宣撫使將卒萬二千人以援太原七月辛未罷諸道防秋之師綱爭不聽乙酉蔡京南遷至長沙而死辛夘誅童貫趙甡之遺史云童貫以八月乙夘誅于南雄州之使院是日河東制置使解潛進軍南關居四日潛潰李綱猶在懐州八月丙申召綱赴闕命太尉种師道代行邊既而亦不用師中師道弟南仲開封人也金人既不得三鎮地癸夘以書來責叛盟復引兵深入耿編二帥再問罪書云天㑹四年八月十日九月丙寅左副元帥宗維陷太原十月丁酉右副元帥宗傑破真定淵聖皇帝數蔡攸罪甲辰與朱勔並殺之攸之死實錄無月日附于九月壬申責萬安之後攸附傳云攸行至嶺外上以著作佐郎宋齊愈為御史即所在斬攸齊愈辭乃改命陳述按述先為御史而齊愈以十月甲辰除察官今參酌附此竢考刑部尚書高平王雲秘書省著作佐郎曲周李若水再見二帥而歸言金人堅欲得地不然進兵取汴都十一月己巳集百官議於延和殿右諫議大夫鄧城范宗尹等七十人請與之左司諫江寜秦檜等三十六人持不可乙亥兩軍分道渡河實録斡喇布以十四日自魏縣泛舟渡河北盟編有尼瑪哈上淵聖書云所遣先鋒今月十四日已過黄河蓋二軍尅期同日而濟是日復用王雲計亟遣王使河北止師奉衮冕玉輅以行尊金主為皇伯上尊號十八字上尊號表國史無之臣家蔵雜書一編乃圍城中人手記排日文字其間謂淵聖為少帝邦昌為新主盖未返正以前所記也紙背皆宇文虛中帥青社時監司郡守所通書尺而所記事亦全與丁特起泣血錄中語同不知果何人書耳此表襍記中有之今錄于後大宋攝太尉光祿大夫少宰兼中書門下侍郎臣唐恪等謹再拜稽首上言臣聞德之隆者禮必尊心之誠者文必至矧光奉三靈之眷交通千載之懽既和好之克成豈欽崇之可後伏惟大金皇帝陛下聰明生禀神武誕昭承天命以勃興協人謀而克濟若乃側躬而戒内恕及人能崇天也克承前烈仍善後圖能繼序也念保疆之重推愛物之誠能昭德也開朔漠之區疏燕雲之境能定功也輕地重民體仁可見睦鄰修好惇信無疑制禮不曰修文弭兵得非成武裒兹衆美總以鴻稱臣等不勝大願謹奉玉册上尊號曰大金崇天繼序昭德定功體仁惇信修文成武光聖皇帝伏惟大金皇帝陛下膺受彛章永綏福履表雍和於南北揚威烈于邇遐長保兩朝之盟允為萬世之則臣等誠惶誠恐稽首頓首謹言靖康别錄云先是都堂集議加金主徽號十八字太常博士華初平力爭以為不可二府怒罷之汪藻為太常少卿草定册文去冬遣馮澥等為奉册寳使及河敵騎大入乃還至是遂親上之别錄繫此事于今年正月車駕再出城時今附見此但以崇天繼序四字為繼天集統與襍書差不同當考王以耿南仲主和議請與俱乃拜其子中書舍人延禧為龍圖閣直學士與知東上閤門事髙世則並為參議官耿延禧中興記十六日出門是日臣南仲奏事内殿淵聖顧問康王辟卿之子為官屬不辭而往朕甚嘉之南仲奏曰臣雖此一子當國家艱難豈敢辭因泣下淵聖皇帝曰宣回奏事如何臣南仲奏曰康王既往而臣子獨宣回無此理退而奉御批耿延禧速宣回奏事臣南仲繳御批奏之云康王為國出使臣之子不肖得奉左右幸也若獨宣回臣何面目遂已案實錄王請南仲偕行上曰南仲老矣令其子延禧代行南仲奏臣老止有一子乞免行上曰姑令往渡至河即召回矣據此則延禧所記似其飾説今不取王府都監入内東頭供奉官藍珪康履黎楶西頭供奉官楊公恕内知客修武郎韓公裔從世則公繪子公繪蒙城人韓烈武王瓊元孫仕至保静軍節度使公裔開封人也王入辭淵聖皇帝解排方玉帯以賜朝議欲拜王為元帥又欲擁駕南廵猶豫未决而敵掩至辛巳王行至磁磁守義烏宗澤曰肅王一去不返今敵騎已迫大王去無益於事不如且留王未之聽磁人以王雲為不誠將奉王入金壬午執雲殺之汪伯彦建炎中興日歴云磁守宗澤與王雲有隙誣奏澤奉使賣國及是又以細作誣雲都人承風旨作亂澤畧不弹壓雲􅈤澤甚哀澤弗顧及出遇害耿延禧中興記云雲至磁訐宗澤之誕澤憾因磁人之怨聲言雲果細作將邀親王入金磁人遂有殺雲之謀宗澤遺事云公語雲曰外頗喧亂約與之同行雲易之及出遂遇害發雲行槖得皂裘一畨巾三綾羅各一王曰必有人見此故謂雲為細作也遺事與二書所記不同欽宗實錄全據澤遺事案澤雖與雲不協然是時特不欲雲奉王入金故邦人殺之而不救恐非以私憾故也伯彦延禧與澤議論不同辭多毁澤今但云磁人殺雲庻不失實朝廷聞金人渡河遣同知樞宻事聶昌與耿南仲分使金軍許盡割河東北地昌即山也趙甡之遺史云淵聖甞夢為兩日所逼乃改聶山為昌以壓之與實錄附傳不同時知相州祁門汪伯彦亦以蠟書請王還相癸未王以所部千人抵相州丙戌右副元帥宗傑至京師太宰錢塘唐恪請幸長安門下侍郎仁夀何㮚不可閏月壬辰朔以㮚為尚書右僕射丁酉副元帥宗維至京師耿南仲至衛州衛人不受南仲馳至相辛丑見王辭以面受睿㫖盡起河北一路將兵入衛王乃同南仲召募勤王之師殿中侍御史胡唐老見京城危議以王為元帥何㮚是之己酉遣閤門祇候秦仔等八人持親筆蠟書縋城詣相州拜王河北兵馬大元帥趙甡之遺史載帛書云奉聖旨訪知州郡糾合軍民共欲起義此祖宗涵養之俗天地神祗所當佑助檄到日康王可充兵馬大元帥同力協謀以濟大功其辭與汪伯彦日歴不同淳熈十三年九月壬申翰林學士兼修國史洪邁奏竊以靖康之難諸王皆留京師唯太上皇帝持節受使獨在河北用能光啟中興符一馬化龍之兆然霸府肇開事出倉卒一時潛藩諸臣不能得其始末近忽傳欽宗遺翰石刻一紙于故相何㮚家然後當時事蹟皦如日星可以垂示天下後世盖靖康元年䦌十一月至敵騎攻都城中外不復可通太上奉使斡里雅布軍磁州而有王雲之變中夕還相州迤邐東如濟鄆當是時㮚為開封尹首建元帥之請及在相位遂擬進書之文其語云訪知州郡糾合軍民共欲起義此皆祖宗百年涵養忠厚之俗天地神祗所當佑助檄到日康王可充兵馬大元帥陳亨伯充元帥宗澤汪伯彦充副元帥同力協謀以濟大功欽宗批云依奏施行又批云康王指揮已黄帛書訖又批云康王指揮已付卿係黄帛書必已到盖閏月十三日所行也欽宗真蹟今猶在㮚弟榘之子處欲乞聖慈行下蜀中于隆州何㮚家取索以上布之史館編于太上中天日歴以彰示萬世為火德復輝之符奉聖㫖依案此與甡之所云全同然是時汪伯彦同被除且耿延禧為參議不知二人何以乃不見此御筆或者㮚雖擬入而後來淵聖又自刪潤也兵馬大元帥上有河北字亦與㮚所擬不同今並附此以備參考資政殿學士中山府路安撫使知中山府陳亨伯為元帥直龍圖閣知相州主管真定府路安撫司公事汪伯彦秘閣脩撰知磁州河北義兵總管宗澤為副元帥俾率兵入援唐老宿曾孫宿晉陵人治平樞宻副使亨伯零陵人也亨伯名與上同音按史名遘金之再圍城也何㮚等得殿前司剰員郭京擢為大將使募市井游惰為六甲神兵丙辰旦京盡屏守城兵獨率神兵七千餘人以出未幾京敗金人登城士卒以無賞不肯戰殿前副都指揮使河南王宗濋引衛兵下城傳呼救駕四壁兵遂大潰及午城陷敵下令縱火屠城何㮚率都民巷戰聞者皆奮敵由是不敢下復偽唱議和辛酉淵聖皇帝幸敵營秦仔至相州於頂髪中出蠟書黄絹三寸王讀之嗚咽軍民感動十有二月壬戍朔王開元帥府有兵萬人盖樞宻院將官劉浩即相州所募義士及信德府勤王兵大名府救河東兵與所招太原真定府遼州潰兵而已分為五軍是日淵聖皇帝將還宫而金帥宗維未得見欲先得表乃命中書舍人晉陵孫覿秉筆而何㮚輩潤色之此表實錄不書按孫覿紹興末有書與朱倬云淵聖幸青城金人索表翰林學士吳幵莫儔皆稱病時覿承乏西掖奏曰雖非臣職事君父在難不敢辭表去郤回要説南朝刼寨覆我軍結伊都滅我國遂如其説叙二事以為大臣誤國致北朝興兵如此又郤回令作四六體來于是宰相何㮚刑部侍郎程振起居郎胡交修與覿四人同撰而覿下筆表至淵聖詣端誠殿尼瑪哈設飲别是日大駕還内建炎初上駐蹕維揚言官馬伸論覿草表之罪上曰大臣誤國至此教他怎奈何又覿建炎初辭待制奏状與此畧同其末云表往不合淵聖諭臣曰朕欲亟歸耳卿勿計空言可也㮚亦不從遂自操筆為之宣和錄趙甡之遺史畧載表語與丁特起孤臣泣血錄亦同其實皆誤表本具靖康要盟錄癸亥帝還宫金遣官檢視庫蔵此據三國謀謨錄二帥上淵聖書附見耿氏編有檢相數云絹五千四百萬匹大賜表段一千五萬匹金三百萬鋌銀八百萬鋌珍寳未見實數又令寜昌軍節度使蕭慶入居尚書省朝廷動靜並先關白此據實錄是日王以便宜命河北都轉運使龍圖閣直學士張慤京東轉運副使直顯謨閣黄潛厚並兼大元帥府随軍應副汪伯彦中興日歴作直龍圖閣黄潛厚誤也潛厚除小龍在今年三月戊午慤樂夀人潛厚邵武人也王之至相也河北西路提㸃刑獄公事王起之提舉常平等事王淵提舉茶鹽公事秦伯祥被旨守黎陽皆馳至相王訝之汪伯彦悉薦以為幹辦公事又以王府都監藍珪康履内知客韓公裔等並主管機宜文字武顯大夫陳淬都統制五軍兵馬甲子閤門祇候侯章自京師至傳命盡起河北一路兵守臣自將時有使臣劉定亦持蠟書趣王入援且言京城且破王憂之命耿延禧草詔布之諸郡左副元帥宗維聞王在河北丙寅遣甲士三千人與簽書樞宻院事沙縣曹輔賫詔書召王與諸將議引兵渡河康履等言相州守禦嚴備宜留相王叱之秦仔侯章劉定請自濬州以帛索攀援渡河轉載而南汪伯彦以李固渡敵壘可虞乃議往北京㑹兵而進乙亥王率五軍離相丙子履氷渡河丁丑發元水鎮迷失道汪伯彦得羊羮炊餅而進晩泊大名府初副元帥宗澤在磁屢乞㑹兵奪李固渡斷敵歸路衆議不可澤自遣其將秦光弼等領兵走渡斬數百級獲其齎糧耿延禧建炎中興記云時金寨據李固渡宗澤屢乞㑹兵破之衆議以為小而堅勝之不武不勝為笑且敵歸路不可遏澤不聽自以磁人攻之應王為先鋒澤為中軍集烏合之衆遏李固渡為敵所破市井無頼先遁抱應王馬足乞性命澤亦僅得脱與實錄所載不同今不取㑹帥府約赴大名癸未澤以所部二千人先諸軍至日歴丁丑王至大名癸未梁揚祖至自信徳府同日宗澤至自相州初揚祖引兵至磁澤謁軍中請揚祖同復真定揚祖曰奉大元帥檄書保衛過河豈敢違王命而從公乎即上馬趨子城渡澤倉卒收聚民兵僅二千人踵揚祖後同日而至與澤遺事不同耿延禧中興記云上至大名河北守臣將兵漸集宗澤王麟兵不滿三千人梁揚祖將邢州兵後至幾萬人此足明澤先諸軍至也今從之中大夫知信德府梁揚祖以兵萬人馬千匹繼至兵官張俊苖傅楊沂中田師中皆在麾下王壮之時中山受圍將士請以揚祖代為元帥揚祖辭乃以為秘閣修撰随軍轉運使揚祖子美子子美湏城人適孫道君朝中書侍郎俊成紀人本河東宣撫副使劉韐部曲傅授孫授上黨人元豐殿前副都指揮使傅乃履之子熊克中興小歴以傅為授子盖誤也沂中崞縣人師中秀容人韐崇安人也曹輔至興仁守臣徽猷閣待制贛縣曾楙詰之輔乃裂衣襟出御筆蠟封及樞宻院礬書以遺楙楙告于王甲申破蠟封乃淵聖皇帝手詔畧曰金人登城不下見議通和仰大元帥康王將天下兵分屯近甸毋得輕動汪伯彦等皆以議和為可信宗澤獨曰女真破城事勢如此是必欲欵我師今即信之後悔無及丙戍澤請直趨澶淵為壁次第解圍衆曰金兵十倍圍京城控守要害吾當量力何論解圍澤曰京都圍閉日久君父相望入援何啻飢渇今但進屯近畿設敵有他謀則吾兵已在城下矣王然之是日金人犯相州幕府聞曹輔已還輔以是月癸未入城恐金人知王所在且再至戊子命澤以萬人進屯澶淵宗澤遺事云命公提兵二萬先行誤也案中興日歴此行實以帥府先鋒右軍後軍共五千人及招到常景二千人王麟千人𨽻之明年春乃益以孔彦威所部萬人爾遺事恐誤揚聲王在軍中自是澤不復與府中謀議建炎中興日歴云宗澤渡河而來本欲憩歇數日乃詭辭趣王進發王語伯彦等曰宗澤渡河方到趣行言不由𠂻次日下令限一日起發澤詣王告曰一行人兵且乞令歇脚三五日要備辦乾糧置買草履澤退王笑曰遂我謀矣案澤以癸未至大名甲申乃聞城陷丙戌澤始請解圍丁亥分軍戊子進發伯彦謂澤趣行而又止者恐妄也今不取伯彦等請王如山東庚寅發大名府至是次陽穀縣是日澤以所部至開德府時遣精鋭與敵挑戰初京城圍久號令不通王軍在相州天下不得聞動靜及是渡河駐軍天下申陳四集取决霸府矣臣謹案編年之體不當追錄前書已載之事今以金人和戰帥府建立皆中興已後事蹟張本故詳著之以備其始末命濟王栩景王把出賀二帥左副元帥宗維亦遣其子珍珠大王入賀壬辰延康殿學士高伸落職左金吾衛大將軍高傑降充左衛率府率傑伸皆俅兄坐根括犒軍金銀而相與𨼆匿為婢所告也金人二十一人詣國子監謁宣聖此據趙甡之遺史癸巳王次東平府顯謨閣待制孫鼛卒諡通靖鼛江都人事上皇為殿中少監甲午詔諭河東北諸州守臣令趣降初朝廷既割兩河地累旬日惟知石州席秩以郡降餘皆不下金人患之復以為請乃下是詔焉太常少卿汪藻兼權起居舍人藻婺源人也蕭慶在都堂聽講月令洪範此據趙甡之遺史是日武翼大夫閤門宣贊舍人元帥府先鋒統制楊青為濮人所殺青大名人去為盗先是磁相間有盗常景者聚衆二千人據天平山青自衛濬趨天平破之青有衆萬人左右使令稱宣贊行移稱閤門最為兇狡既而青景以其衆詣相州降王以青為先鋒統制景為宗澤右軍統領去年十二月丙戌王去大名命青以所部屯栢林鎮青行至濮州需糧辱郡守藺中謹濮人擊殺之耿延禧中興記云青至濮州微服入欲殺守臣盖據中興所云非其實也汪伯彦中興日歴正月七日濮州申今月三日楊宣贊來城下待應副錢糧次日早親自帯領二十餘人安打木橛攀援上城直至州衙上㕔便擄押知州藺中謹至瓮城裏被守禦軍兵用亂石打殺楊宣贊據此則青纔以二十人入城恐無殺郡守之意中謹所云不無飾説當以實錄為正但實錄以為丁酉青至濮州湏糧却誤盖丁酉乃濮州申至之日耳王擢其將常謹代青謹疑懼欲復叛還西山帳下承信郎孔彦威以計斬謹王因命彦威為宣贊舍人統制軍馬屯澶淵受宗澤節制實錄云常景疑懼欲復叛彦威斬之按叛者乃青部將常謹自是一人所謂常景者已先撥𨽻宗澤軍中姓名偶同音史臣誤也宗澤事實作常景亦誤代青在此月乙酉彦威斬謹在二月丙寅命彦威在辛巳今聨書之丙申以徽猷閣待制董耘為元帥府參議位耿延禧下高世則上日赴軍中謀議耘湏城人也王在軍中率與延禧耘世則共飯夜設酒果延僚屬不過一再行詢問古今治亂軍中情實而已初金人同撫諭使臣齎詔至南京取金帛權府事直龍圖閣東道副總管汝陽朱勝非疑不與復遣使臣入京審其故丁酉詔守臣根括供納凡得金百兩銀帛三萬九千匹兩盡予之勅應天府守臣等忽覽來奏知撫諭詔書已到又知南京蒙大金存全更不攻城喜極出涕所湏金銀匹帛當極力應副一匹一兩不可存留可根括係官及官吏民庻之家盡數借納以謝恩德京城見今收拾犒軍務在罄竭已降詔書朕茍可以報大金者雖膚髪不惜亦可以此意曉諭官吏民庻勿更執迷恐誤大事故兹示諭想宜知悉春寒汝等比各安好遣書指不多及戊戌何㮚使軍前乞减金銀表段之數左副元帥宗維不從於是令御史臺置籍自宰執以下未納金銀人指名督索不以官職高下例加械掠人不聊生己亥車駕詣延福宫以將出郊也尚書吏部侍郎李若水兼權開封尹庚子淵聖皇帝再幸青城初金人將挾二帝北遷乃督犒軍金銀益急欲縱兵入城時蕭慶居尚書省淵聖皇帝以問慶慶曰須陛下親見元帥乃可前一日左副元帥宗維以書來約車駕出城議加其主徽號淵聖皇帝難之簽書樞宻院事曹輔請毋行吏部侍郎李若水使金歸報力勸出幸以為必無他右僕射何㮚主其説帝疑焉金使兵部尚書高慶裔者奏曰陛下不必親出城但遣親王大臣可也帝欲毋往恐敵縱兵殘民遂决計出城南壁統制官閤門宣贊舍人呉革聞之入白㮚曰天文帝座甚傾車駕若出必堕敵計㮚曰二太子止欲加金主徽號必不留也革固爭不聽時㮚自謂折衝有術在都堂對金使歌曰細雨共斜風作輕寒左右及金使皆笑翌旦車駕再詣金營先是門下侍郎耿南仲既走相州而同知樞宻院事聶昌為絳人所殺去年閏月癸夘朝廷遣中書侍郎陳過庭割河東北地閏月丙寅宰執見在者惟何㮚曹輔與尚書左丞馮澥同知樞宻院事孫傅簽書樞宻院事張叔夜至是㮚澥輔從行乃以傅兼太子少傅輔皇太子諶監國叔夜時彈壓于外不與謀遇於太學前叩馬諫帝曰朕為生靈勢不得已即策馬行叔夜控其勒不能止則號慟再拜帝猶回首字之曰嵇仲努力遂行衆皆哭革開封人國初樞宻使延祚七世孫過庭山隂人澥安岳人傅東海人叔夜耆曽孫也耆開封人天聖中樞宻相日晩命内侍邵成章衛太子赴宣德門自是並稱制行事傅雱建炎通問錄館伴李侗甞云京城初下二太子曽與國相商量自古北兵到南朝未甞不破其國擕其主而歸此只是兵强而已徳不足也孰若立其主刻大碑於梁宋間使天下後世知行兵有名且不絶人後亦使南兵自此數百年不敢動這個功績甚大他日若趙氏自立即更無立主一段恩義國相遂然其説差監軍烏舍送少帝入城烏舍辭免不曽入去後来其議復變却稱國家事大不可不為長久之計二太子亦曽力爭言不惟無一段恩義兼恐兵端未已於然累日商議不成遂從烏舍郎君之言臣按斡里雅布夲朝素號有善意侗所云理或有之他書皆不見今畧采掇附淵聖再出城時以補史闕命閤門宣贊舍人符彬持詔書詣北道總管司諭河北軍民自金再圍城四方師帥望風不進時敵以兵五萬守潼關扼西兵來路陜西制置使錢盖乃將十萬衆由商虢而東至潁昌去年十二月己夘聞敵登城遂棄軍奔湖北江淮等路發運使兼江浙福建經制使翁彦國亦將東南六路兵與峒丁槍仗手合數萬人徘徊泗上始議置四道都總管俾召天下兵勤王惟南道張叔夜以三萬人援京師因留不去閏十一月己丑東道胡直孺為金生得既而歸之十一月丁丑西道王襄棄河南走襄漢去年閏月北道趙野自大名亂後提其兵往南京與河東北宣撫使范訥合自號宣總司淵聖皇帝奪野職提舉西京嵩山崇福宫十一月丙戍而以河北都轉運使張慤為延康殿學士大名尹至是將出城遣彬持詔至北道總管司略曰金人圍城已及一季援兵尚爾稽遲使社稷生靈坐以待盡比已登城不獲已許帝姬和親立大河為界而金人實未斂兵欲質我太上皇帝又欲使朕南遷咨爾河北之民與其陷于蕃敵孰若抱孝懐忠更相推立總首保守疆土天下安平與汝等分土共享朕言及此痛若碎首實錄無和親至南遷等語盖節文今依宗澤遺事増入盖惟演曽孫惟演呉越王子仁宗朝樞宻使彦國崇安人直孺南昌人襄南陽人野訥皆開封人也是夕帝留宿青城實錄李若水附傳云二月丙寅敵謀中變案二帝北狩乃金本謀時驛召張邦昌將使僭位遲留彌月盖竢金主詔書之至也附傳因若水失計而抆拭之耳實錄云金使高尚書者奏上云不必親出而不言其名案耿氏編二帥與邦昌書有云兵部尚書高慶裔即此人也今増入辛丑淵聖皇帝在青城遣人通謁二帥不見禮數逈異於前蕭慶風李若水留儀衛三百命侍衛親軍馬軍副都指揮使郭仲荀統之仲荀逵孫也逵河南人治平末同簽書樞宻院事於是鄆王楷景王把濟王栩祁王模莘王植徐王棣沂王㮙和王栻信王榛等九人與宰執何㮚馮澥曹輔翰林學士承㫖呉幵學士莫儔中書舍人權直學士院孫覿禮部侍郎譚世勣太常少卿汪藻皆留城外餘悉令入城幵清流人儔歸安人世勣長沙人也帝再幸青城也舍於親王位供帳蕭然饋餉皆不至羣臣相顧失色於是敵人以數輩持兵守閽謹誰何日將入掩關外向以鐡繩維之然薪擊柝傳呼逹旦帝不堪幽閉之辱往往出涕此據實錄及宣和錄孫覿奏狀參修右文殿修撰知冀州樂夀權邦彦以勤王兵千人至帥府王命進屯澶淵壬寅高陽關路安撫使黄潛善自將本路兵二萬五千人至東平王軍益振潛善潛厚弟也軍賊祝進王在攻德安府通直郎權府事陳規率軍民拒之初京城之破也鎮海軍節度使劉延慶奪萬勝門率班直長入祇候西兵萬餘人而出皆䕶駕選鋒也甫過普安院為金人所邀延慶死其徒李孝忠党忠祝進薛廣曹端王在之徒皆去為盗党忠王在引衆數千犯隨州守臣朝請郎陸德先亟遁官吏居民悉走大洪山在掠强壮為兵取其財而去薛廣繼至劫掠罄盡廣又攻郢復二州守臣直龍圖閣舒舜舉中大夫趙縱之亦遁忠遂往來隨州德安之間先是規知安陸縣率民兵數千援京師至蔡州道梗不能逹還及境上㑹祝進攻徳安府守臣李公濟遁父老請規攝府事規辟進士韓之美及寓居十餘人為屬官遣射士張立率民禦進却之人心稍固時府城壊規植竹編木横門扉於上代女墻以捍矢石而施守具焉是日王在遣人持檄諭規開門規不答翊日早游騎至城下與祝進軍合又翊日引衆攻城規乃遣人出城縱火佛舍與居民皆盡懼其蔵賊也在又以砲石鵝車之屬進攻城東規登樓問之曰何故至此在曰京城已破我等皆爭門而出所以至此德安人聞之莫不墮淚盖時未知敵已登城也規謂此皆詭辭亂語叱退之在圍城十有七日而去自是党忠亦時復出没張立者規常用以出戰後擢為將官徳先甞為御史中丞規安邱人之美安陸人也熊克小歴云規臨沂人通判郢州捍賊有勞誤也今從規行狀癸夘樞宻院編修官胡珵以駕久不歸為書上右副元帥宗維畧曰優禮我寡君則康王懐恩恵恤我都城則河北慕義書凡千餘言珵晉陵人也是日太學諸生余覺民等數百人並詣南薫門上書請車駕還内朝廷恐生事令樞宻院轉遣彈壓官止之金遣兵百人衛司馬光墳甲辰再括金銀初帝幸金營約五日必還至是金以犒軍金帛未足為詞邀留不已留守孫傅以民間所有已竭乃取上皇㫖凡宗廟供器及諸王公主第盡括之尚書省正月十三日奉御批累見大金高尚書傳元帥台令為金銀表段數少且拘留在此俟見數足方可放還可速依下項并仰據所有數目明批上歴限至十五已前送納如有吝惜隠蔵却因捜檢告首發覺便行軍令時帝在齋宫無聊何㮚奏宜賦詩以遣興夜遣中使劉當時召孫覿賦即事詩詩成賜酒仍召馮澥曹輔呉幵李若水譚世勣汪藻同賦皆以歸回二字為韻羣臣見帝意所在不覺欷歔此以孫覿奏狀吕本中痛定錄參修本中又云上詩曰噬臍有愧平燕日甞膽無忘在莒時藻詩曰虜帳夢回驚日處都城心切望雲時有以此逹敵帥敵見在莒之句又斥其為虜帳因摭此為名遂遲留車駕案金人留駕乃其素議至是始以金銀不足為詞非因此詩也據覿所奏當時亦不用時字韻盖本中得於傳聞夏少曽朝野僉言云上在齋宫高尚書郭少傅與呉幵孫覿等對上吟詩唱和恐高慶裔輩未必果能吟詩今不取乙巳雪籍梁師成家支百官俸金人將易代懼民不聽欲以中原地擇人君之度大臣無肯任者乃議即軍中取前太宰張邦昌立之始邦昌既渡河遥罷為觀文殿大學士中太一宫使靖康元年二月己巳城始破金驛召邦昌于燕至是邦昌與肅王至城外案邦昌上王書云臘月二十日還闕正月十五日至城外乙巳十五日也耿氏編金人曉諭諸路節文云城破之後驛召而至是金人立邦昌之意已定於去冬矣今參考修入是日上元節二帥即劉家寺張燈宴設甚盛凡景龍門所用金燈瑠璃珠瓔翠羽飛仙之屬皆取去統制官呉革以駕久不回請往軍前計議不則死之孫傅不許趙甡之遺史云乙巳金人於劉家寺放上元請帝觀燈宴設甚盛有致語云七將渡河潰萬屯之禁旅八人登壘摧千仭之堅城宣和錄云自帝蒙塵二帥既不許見日遣蕭慶須索城中物脅帝傳旨取之此與甡之所云請帝觀燈不同今並附此當求他書參考丙午降授通奉大夫劉韐死于金營韐守真定有威名金人知之欲用為尚書僕射許以家屬行韐不可手書片紙遣使臣陳瓘持遺其子曰金人不以予為有罪而以予為可用夫忠臣不事二君此予所以必死也乃沐浴更衣酌巵酒以衣絛自經於城南夀聖院年六十一中興贈資政殿大學士贈官在六月丁夘今因其死節併書之後准此諡忠顯中興姓氏録云京城陷韐自縊而死誤也靖康小雅劉韐篇云時金樞宻使韓正年髙尼瑪哈欲用公代之公力辭闔户自經此亦誤案實錄附傳韓正時為尚書僕射不為樞宻使也太學生徐揆出見金帥請車駕還宫為所殺始城中傳金人以張燈留上駕燕罷即歸至是不還揆與諸生丁特起汪若海何烈等各為書欲遺二帥留守司不許揆獨詣南薫門誑云獻金銀守門者白之俄遣騎取揆赴軍中揆出其書畧曰曩者都城失守民無一生之望蒙再造之仁圖報無地况金銀外物豈復有靳苐自去歳以來根括殆盡恐京邑之蔵不足以償抛降之目雖以天子為質猶無益於事也願元帥存始終之惠反其君父班師振旅緩以時月使求之四方然後遣使入獻則中國之人德元帥之仁豈敢弭忘二帥見書詰難揆厲聲抗論為所殺揆江山人舉進士為開封第一待試省闈遂逢國難後贈宣教郎官其家一人實錄附傳云揆詣南薫門白守門者乞逹二帥請車駕還闕二帥遣騎取揆赴軍中詰難揆厲聲抗論為所殺案遺史揆始以誑敵得出故敵怒而殺之附傳刪修遂失其實靖康小雅徐揆篇云駕再幸金營被留未歸君以太學生具書極諫以謂為元帥之計莫若親宋則大金獲無窮之利茍吾君不歸則中原必自此亂亂則豪傑既出豈大金之利哉委曲千餘言祈必歸吾君而後己此與附傳及遺史所載揆書全不同今不取特起合肥人若海歙縣人烈潭州人也丁未霧氣四塞人對面不相視敵下含輝門剽掠焚五嶽觀戊申留守司輦景靈宫供具納軍前敵退太祖皇帝殿什物令張設如初宣和錄初高陽關路安撫使黄潛善至東平見董耘除參議官欲效之謁康履不遂乃獻言於王請貽書斡喇布辯曲直大畧謂捧登城不下之詔今踰時矣士大夫信大金之有義而戰士憤大金之不還萬一賈勇而前有傷和好耿南仲恐敵得書知王所在力折之此據耿延禧中興記但延禧記南仲語有云自曹輔張澂之歸敵方以不見大王為恨則恐誤盖澂此時未至澶淵今不取潛善怏怏乞進兵興仁王許之是日潛善發東平時高陽關路馬歩軍副總管楊惟忠知霸州辛彦宗將所部與潛善偕來㑹元帥府都統制陳淬戍澶淵遂以惟忠為元帥府都統制惟忠環州人西戎部族彦宗長安人故將叔獻從子也己酉詔權住納金銀徐夢莘北盟㑹編壬子御批付徐秉哲打毬畢便還金銀並限來日交納軍前盡絶在此後三日當考敵從城中人買酒軍民持溲水與之敵怒辛亥開封府榜自今以諸雜物博易者從軍法壬子軍民以車駕遷延未回詣留守司請軍器以備緩急不許即相率私造留守司慮其生事得李寳等十七人戮于市梟其首甲寅陜西宣撫使范致虛以勤王兵次華州初西道都統王襄既南走淵聖皇帝擢水部員外郎孫昭逺為秘閣修撰西道副總管去年十一月乙亥昭逺以三騎出國門道招潰卒得數百人由南陽入商洛遂至京兆㑹陜西制置使錢盖兵潰致虛檄諸路合兵勤王昭逺督之詞氣慷慨聞者感動於是環慶經畧使王似熈河經畧使王倚各以兵來㑹而涇原經畧使席貢秦鳯經畧使趙㸃鄜延經畧使張深皆不至昭逺凡二十八疏劾之貢竟不行㸃亦纔遣將官李安領兵入援秦州州學教授周良翰見㸃責以京城危急勸㸃自行㸃不聽致虛合六路兵得十餘萬以右武大夫成州團練使知西寜州馬昌祐統之昌祐官職他書不見案史宣和六年五月以右武成團除西寜州建炎二年二月丙寅自右武成團知西寜州除熈河副總管故知今為此官也先是致虛在長安繕兵為守河計河西㳂流壁壘相望致虛不曉軍事往往取獻陳者利便按文施設州縣軍民不勝其擾有萬花寺僧宗印者孝義人本姓趙避亂過河中題詩佛寺守臣徽猷閣待制席益見而竒之薦於致虛致虛喜其口辯善談兵即以便宜假宗印中散大夫直龍圖閣充宣撫使參議官兼節制軍馬竒兵軍正以統制官王偉等𨽻之宗印請築長城起潼關迄龍門雖致虛行移峻急而上下皆不以為是築城及肩應命而已宗印以僧為一隊謂之尊勝隊以行者為一隊謂之凈勝隊致虛以大軍遵陸而命宗印以舟師趨西京天章閣待制知同州唐重聞之為書遺致虛為言今日之事可為朝廷慮者三可為關中慮者五大率謂中都倚秦兵為爪牙諸夏恃京師為根本今京城圍久人無鬭志若五路之師逡廵未進則所以為爪牙者不足恃而根本揺矣然潰卒為梗禁谷通行關中公私之積已盡甲馬全無又聞西夏侵掠鄜延為腹背患今莫若移檄蜀帥及川陜四路使者輸財用輦軍器市戰馬以資關中守禦之備合秦蜀以衛王室初京城既破敵遣修武郎包某閤門宣贊舍人董某持登城不下之詔以止援師致虛即斬之重又遺致虛書言和議已定不當抗詔出師致虛不聽劉岑撰唐重墓誌云范致虛提六路兵勤王留陜州不進公自同州遺書責之曰金人犯京師半年王室存亡未可知臣子憂國宜何如哉且京城以秦兵為爪牙四方以京城為根本今擁秦兵坐視不前是爪牙不足恃而根本揺矣其言累千皆切至讀者感涕而致虛竟不能前也案此乃重第一書謂可為朝廷憂者三事然其全書大指則止致虛之行岑斷章取之盖以抆拭其事要非其實也京城二使不見於他書此以重第二書増入遂引而東及是次華隂軍勢大振昭逺抃曽孫抃眉山人嘉祐參知政事致虛建陽人似安陽人貢河南人深華隂人益旦子旦河南人故御史中丞重眉山人也乙夘金人來索内侍伶官醫工妓女後苑作文思院修内司將作監工匠廣固撘材役卒百工伎藝等凡數千人初元帥府統制官劉浩遣裨將承信郎丁順先渡河為金人所敗聚衆三千人圍濟州時汪伯彦等已有奉王居濟州意中興日歴載伯彦議討李昱事云濟州姑存大元帥駐泊之地豈容殘破盖伯彦引軍而東之意久已先定今參取附見乃以順為武翼大夫閤門宣贊舍人將其兵屯廣濟軍受黄潛善節制是日大雪數尺京城死者甚衆丙辰金人來索法駕仗衛自帝蒙塵二帥日遣蕭慶須索城中物脅帝傳㫖取之至是殆盡又遣鴻臚卿康執權秘書省校書郎劉才邵國子博士熊彦詩等押監書及道釋經板館閣圖籍納敵營執權開封人才邵廬陵人彦詩本孫也本鄱陽人元豐吏部侍郎徐夢莘北盟㑹編癸未御批付徐秉哲朕於土床之上睡者凡二十餘日矣不敢憚勞凡有所須卿等且竭力應副今附見此實錄無之龍圖閣待制鄜延路經畧安撫使張深以勤王兵八千餘人發延安丁巳太學諸生為書欲詣軍前不得進淵聖皇帝以手劄諭都人云此事豈口舌所能下金人取内庫香藥犀象司天監隂陽官大晟樂工等初左副元帥宗維聞王在開德遣甲士與中書舍人張澂持詔召王戊午至澶淵副元帥宗澤怒命壮士射之澂乃去澂舒城人也濮州民兵首領王善以其兵千人𨽻帥府王命進屯興仁兖賊李昱張遇破任城縣勢甚張元帥府遣中軍統制張俊討之後至任城遇伏幾殆小校趙宻連射數賊統制苖傅扼其前遂大敗之斬千餘級宻太原人也己未金人索朝服祭器尚方藥餌下至博奕之具車載而往者不可勝計庚申金人索九鼎八寳天下圖籍本朝開國登位赦書西夏進貢書本於是皇帝殿玉寳十四金寳九皇后皇太子妃金寳印各一盡予之靖康要盟錄云金人又取皇帝殿白玉之寳十四承天休延萬億永無極一也受命于天既夀永昌二也天子之寳三也天子行寳四也天子信寳五也皇帝之寳六也皇帝行寳七也皇帝信寳八也御書之寳九也御書之印十也無字寳十一也皇帝恭膺天命之寳十二也宣和御筆之寳十三也又皇帝恭膺天命之寳十四也青玊之寳二其一傳國寳其二受命于天既夀永昌所謂秦璽者金寳九御前之寳一宣和殿寳二御書之寳三天下同文之寳四天下合同之寳五又御前之寳六御前錫賜之寳七書詔之寳八皇帝欽崇國祀之寳九銀印一尚書内省出納之印皇后殿金印一皇后之寳太子殿金印一皇太子寳太子妃金印一太子妃印惟上皇所作定命寳在建炎以來繫年要録巻一
