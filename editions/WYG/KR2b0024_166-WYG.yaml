body:
  text: 建炎以來繫年要録巻一百六十六宋李心傳撰紹興二十有四年嵗次甲戍元金海陵煬王亮貞二年春正月按是月甲寅朔癸酉初詔郡國同以中秋日試舉人舊諸州皆自選日舉士故士子或有就數州取解者至是始禁之甲戌大理司直李璟面對乞令諸縣將二稅畸零之數並折見錢各令具鈔庶免重叠催擾之弊詔戸部申嚴行下丙子封婉容劉氏為貴妃大理少卿張柄面對乞州縣獄案並令明注年月日數毋得復稱今年前月或昨日之類以示欽恤慎重之意從之丁丑右通直郎王厯充江南東路安撫司參議官戊寅地震己夘右通奉大夫陳康告老詔遷一官致仕户部言諸州上供經總制等錢在法雖許置輕齎起發縁價直比之行在往往高貴欲將諸路州軍不通水路去處毎貫貼支客人兌便優潤錢三十文却於州縣從來起綱合破糜費脚剰錢内支給庶幾公私兩便從之辛巳寧武軍承宣使侍衛歩軍司統制戚方為龍神衛四廂都指揮使利州觀察使殿前司右軍統制岳超龍神衛四廂都指揮使洪州觀察使侍衛歩軍司統制梁斌並為承宣使超昭慶軍斌寧逺軍和州防禦使殿前司選鋒軍統制王升為宜州觀察使中衛大夫和州防禦使殿前司左軍統制閻德等七人各進一官皆用去年閏月辛丑詔書也先是方當依格回授而斌帯軍職叙位乃在方上宰執進呈上命方以所得一官特帯軍職庻與斌舊次不致陞降於是行下二月按是月甲申朔乙酉大理寺丞郭唐卿面對乞禁諸州毋得輙令屬縣逐月分認醋息錢從之左廸功郎鄭時中充國子監書庫官時中仲熊兄子也尚書省言御書法帖合委官措置頒降乃命時中為庫官専一措置丁亥詔除名勒停永不收叙人前左從政郎楊炬特送邕州編管以其弟煒紹興初兩上書譏謗朝政坐累故也炬行至賔州感瘴死煒坐罪已見紹興二十二年熊克小厯即於其時書炬連坐覊置邕州盖誤庚寅左朝請大夫新知卭州許尹入辭論州縣捃摭富民重行責罰有犯杖罪而罰錢至數百千者望𠡠有司自今有違法科罰人戸出錢者雖曽附赤厯亦重寘典憲詔申嚴行下尹鄱陽人也乙未貢院言應博學宏詞科左從事郎新平江府録事参軍莫濟左廸功郎監潭州南嶽廟王端朝合格詔並循資與堂除濟歸安人端朝開德人也戊戌右文殿修撰提舉佑神觀秦塤充敷文閣待制辛丑詔直秘閣主管佑神觀楊倓楊㒜特令赴正奏名廷試甲辰上謂大臣曰連雨恐傷蠶麥已令降香祈晴矣乙巳詔保義郎閤門祇候劉懃進職二等忠翊郎劉愿特除閤門祇候僧悟正與補左街僧録右武大夫劉允升特轉遥郡二官以貴妃進封推恩也他親屬補轉官者四人本閣官吏並進二官資礙止法人特與轉行丁未右承奉郎田公弼為右宣義郎直秘閣賜三品服公弼師中子也戊申大理評事沈正度面對乞戒飭郡縣不得非理科擾小保長庶貧民均被實惠詔申嚴行下己酉大理評事鞏衍面對言州縣受納米斛必有土居及寄居官員士人并上司公吏封鈔請求每石坐享錢數百或至一貫以上受納官為之减退升合不擇濕惡却於其餘人戸名下多増斗面以償其數虧公害私莫此為甚望申嚴禁止從之壬子榮州刺史提舉佑神觀劉懋遷靖海軍承宣使三月甲寅朔秘書省校書郎兼權太學博士董德元左朝奉郎新知江隂軍張士襄並為監察御史士襄江寧人也丁巳尚書司勲員外郎兼權中書舍人孫仲鼇罷以右正言鄭仲熊論仲鼇攝政成均力主専門以私黨與包藏其姦詭計叵測若不斥去為害尤深故也仲鼇嘗為李光客故仲熊劾之己未詔太尉御前諸軍都統制吴璘楊政郊恩䕃補特依楊存中例於文資内安排以政璘有請也辛酉上御射殿䇿試正奏名進士先是秦檜奏以御史中丞魏師遜權禮部侍郎兼直學士院湯思退右正言鄭仲熊同知貢舉吏部郎中權太常少卿沈虛中監察御史董德元張士襄等為參詳官師遜等議以敷文閣待制秦塤為榜首德元從謄録所取號而得之喜曰吾曹可以富貴矣遂定為第一榜未揭虛中遣吏踰墻而白秦熺及廷試檜奏以士襄為初考官仲熊覆考思退編排而師遜詳定虛中又宻奏乞許有官人為第一至是策問諸生以師友之淵源志念所欣慕行何修而無偽心何治而克誠塤對䇿曰自三代而下俗儒皆以人為勝天理而専門為甚言正心而心未嘗正言誠意而意未嘗誠言治國平天下而於天下國家曽不經意頑頓亡節實繁有徒慮亡不懐諂而嗜利自營者此而不黜顧欲士行之無偽譬猶立曲木而求直影也舉人張孝祥䇿曰徃者數厄陽九國歩艱棘陛下宵衣旰食思欲底定上天祐之畀以一德元老志同氣合不動聲色致兹昇平四方協和百度具舉雖堯舜三代無以過之矣又曰今朝廷之上盖有大風動地不移存趙之心白刅在前獨奮安劉之畧忠義凜凛易危為安者固己論道經邦爕和天下矣臣輩委質事君願視此為標凖志念所欣慕者此也曹冠䇿曰自伊川唱為専門之學蔽於一曲不該不徧述正道而稱邪侈好誇大而無實用盖其初有得於釋氏潛竊其說入室操戈而伐之習其學者尤為迂誕為師者不傳㫖要而使之黙㑹為友者不務責善而更相比周適足以戕賊善端而已故凡為伊川之學者皆德之賊也又曰自西學盛行士多浮偽陛下排斥異端道術亦有所統一矣至此而或有弗悛則嵬𤨏之徒堯舜所不能化者也豈容逭於兩觀之誅乎臣願陛下至誠樂與勿貳勿疑惟和惟一時則勿有間之則於萬斯年受天之祜異端何自而芽蘖哉於是師遜等定塤為首孝祥次之冠又次之上讀塤䇿覺其所用皆檜熺語遂進孝祥為第一而塤為第三賜孝祥以下三百五十六人及第至同出身時檜之親黨周夤唱名第四仲熊兄子右廸功郎時中第五秦棣子右承務郎焞楊存中子右承事郎倓並在甲乙科而仲熊之兄孫縝趙宻之子成忠郎廱秦梓之子右承事郎焴德元之子克正曹泳之兄子緯檜之姻黨登仕郎沈興傑皆中第天下為之切齒孝祥祁子冠東陽人檜館客夤開封人興傑永嘉人也何俌龜鑑掄魁所以待天下士也既私其子熺又私其孫父子親黨環列要津雖霍光之根據亦不是過云舉吕中大事記曰檜子熺既嘗為舉首又以其孫塤為首上覺之遂居第三進士榜中悉以親黨居之天下為之切齒而士子無復天子之臣矣丁夘左承事郎簽書劔南東川節度使判官㕔公事趙逵為秘書省校書郎先是總領四川財賦符行中有子預薦意逵必為類試考官宻以文屬之逵不啓緘既試符氏子不預奏名行中怒因事捃摭逵甚峻然不能害也庚午皇叔眉州防禦使士諳為宣州觀察使右監門衛大將軍和州防禦使士奇落階官以其兄士夽薨故有是命辛未敷文閣待制新知宣州曹筠提舉江州太平興國宫從所請也王孝忠之謀亂也議者以為當責帥秦檜右之乃俾奉祠焉壬申鄂州駐劄御前諸軍都統制田師中奏武崗軍猺人楊再興已就擒劉旦之帥潭也再興既還建炎初所侵省地至是八年猶抄掠不己師中遣前軍統制李道討平之上覧奏曰方國家閒暇之時冦盗竊發擒之足以靖民可如所請令檻赴行在時再興已老諸子惟正修聚人最多頗姦猾而正拱者最兇悍於是再興與正拱兄弟皆得正修繼就擒先是吉州盗胡邦寧攻刼衡郴桂陽三州之間破安仁縣提刑司遣土兵射士捕之為所敗未敢進詔左承事郎諸王宫大小學教授劉珙合赴行在供職珙子羽子也丙子特奏名進士吕克成以下四百三十四人武舉進士鄭矼等十六人特奏名二人授官有差而平等岳建夀特授保義郎以弓馬絕倫故克成常州人建夀超子也戊寅宰執進呈大理評事劉敏求面對劄子論諸州不依條限印給屬縣租稅簿熊克小厯劉敏求言州縣不依法即時割稅有害於民按敏求此奏乃論毎年諸縣造簿送州印給留滯未嘗言及割税也乞申嚴法禁上曰法令固在如官吏奉行不䖍終亦無益知州須厯民事通暁利病者為之乃命監司以時檢察有不如令按劾以聞庚辰右正奉大夫提舉台州崇道觀宋貺知建康府先是右朝散郎王循友守建康因事忤秦檜故罷去而用貺代之日厯不載循友罷命建康知府題名循友離任在四月二日去此凡四日循友六月辛丑除名辛巳将作監丞錢端英面對論州縣鞫獄事之大小各有定限至四十日而止有司往往虛文枝蔓逮及無辜至有踰年而獄不具者何以上副恤刑之意詔申嚴行下夏四月按是月癸未朔甲申左朝散郎提舉淮南東路常平茶鹽公事孟處義言去年煎鹽比舊額増十五萬五千餘石五十斤為一石支發袋鹽増四萬六千七百餘袋鈔面通貨錢増八十五萬四千餘緡并受鈔住賣茶鹽並皆増羡一司官吏委是宣力詔處義進一官屬官及職級有名目人逓减磨勘餘賜帛有差乙酉右承議郎敷文閣待制提舉佑神觀秦塤特遷左朝請郎兼實録院修撰仍許陳乞親屬章服一名舊制鎻㕔及第人不轉官至是吏部乞比附秦熺體例取㫖推㤙故有是命時塤年纔十八也丙戍上謂大臣曰三衙諸軍招填闕額乆未足敷於是樞宻院請均下諸路帥司分限招填期以三年課其殿最從之戊子右朝請大夫蔡向知滁州還言兩淮州縣之吏尚有貪名舉好興作者如開田本以勸耕也虛増頃畆因成騷擾起税本以薄賦也暗加勺合遂致刻削凢此豈所以仰副陛下愛育元元之意欲望申飭官吏違者令監司郡守按劾從之己丑上詣景靈宫朝獻有利州民王孝先邀駕訴閬州守臣右中奉大夫王陟惨酷不法陟前任知利州為趙不弃劾罷訴詞盖利州事也後二日輔臣進呈次上曰此事宜押送本路監司究實盖上慮蜀道險逺追逮為勞也辛邜右承事郎直秘閣張子仁主管佑神觀仍賜紫章服免奉朝請庚子宰執進呈大理寺主簿郭淑面對劄子論州縣受納物帛吹毛求疵稍不及格即以杮油墨烟連用退印望嚴戒飭上曰此重為民害可令監司覺察按劾如失覺察令御史䑓彈奏仍許民越訴辛丑西南小張蕃貢方物乙巳進士孔搢為右承奉郎襲封衍聖公先是搢之父右宣教郎衍聖公玠卒于衢州守臣以聞故有是命戊申太府寺主簿李文中面對言比嵗州縣多侵用常平義倉米既失經常之數亦乖惠養之方望詔有司申嚴其禁從之己酉羅殿國貢名馬方物五月癸丑朔日有食之丁巳鄂州駐劄御前前軍統制李道左軍統制郝晸建康府駐劄御前水軍中軍統制李進彦鎮江府駐劄御前右軍副統制單德忠等十一人各遷一官亦用去年閏月辛丑詔㫖也庚申權尚書吏部侍郎李如岡為敷文閣待制知泉州樞宻院檢詳諸房文字齊旦直秘閣提舉淮南東路常平茶鹽公事辛酉右正言鄭仲熊言陛下偃革休兵已見成效至於嵗時慶賀驛騎交馳盛典縟儀所以燕遇接納之勤情文備至惟是州縣之吏或不能上體聖意間有㓕裂欲望申𠡠有司凡迎勞館饑之禮務加嚴整稍有慢戾臣得按劾以聞從之癸亥監察御史王綸罷以御史中丞魏師遜奏綸因其兄綽弟紘舉進士不第而怒形於色謗罵考官也綸本師遜所舉至是綸以論事忤秦檜意師遜懼即自言智識淺昧於綸不得其詳望將綸罷黜庶使臣有改過之實云乙丑左宣教郎張扶為國子博士右承奉郎吴曽為太常寺主簿丁夘直徽猷閣知荆南府吴坰主管台州崇道觀以坰引疾有請也時鼎澧茶冦猖獗殺傷潭鼎州廵檢官焚溆浦縣坰未受命以憂死左朝請大夫荆湖北路轉運判官程敦臨被㫖攝帥事以䇿授兵馬鈐轄邵宏淵且往招安冦乃息茶冦事以通義志及王之望所申修入據之望申乃今年三月以後事日厯今年正月乙亥左朝請大夫知利州程敦臨除湖北轉運判官八月癸未知荆南府吴坰守本官職致仕故因坰得祠遂書之更湏詳考戊辰中書門下省檢正諸房公事施鉅權尚書吏部侍郎右宣教郎林一鳴為司農寺主簿庚午皇叔和州防禦使知西外宗正事士衎為宣州觀察使令再任辛未金主遣金吾衛上將軍工部尚書耶律安禮正議大夫尚書吏部侍郎許霖來賀天申節六月癸未朔上謂輔臣曰官司賑濟止及近郭㳺手之人其逺處宜令提舉官及州縣常平官親往措置務使實惠及於貧民大理正陳良翰面對言令甲職田租課抑令人戸折納價錢而増直者以等差計贓坐罪州縣之吏未免冒犯乞申嚴法禁從之左太中大夫提舉江州太平興國宫汪藻卒藻黜居永八年累赦不宥請還政不許至是卒藻工於儷語其所為制詞人多傳誦乙酉右文殿修撰知廬州曽慥高郵軍使吳祖棣並罷祖棣幵子也時慥上疏自訟不受張邦昌偽命乞付史館御史中丞魏師遜言幵不能以身徇國盡遣天属歸之北朝雖族誅之不足以快天下又烏可録用其後慥既失節比輙肆狂妄之言反欲盗忠名以干進此最姦邪之大者罪不可貸宰執進呈上曰幵與王時雍莫儔在漢法當誅且族朝廷寛大一切置之若復録用其子何以示天下自今毋得與堂除上顧秦檜曰當時忠義無若卿者檜曰臣一時守職遭遇陛下遂依日月之光上曰此卿之謙辭也尚書右司郎中兼權中書舍人吳㮚罷右正言鄭仲熊論㮚本蔡卞之近親黨習以成縉紳目為常州一蠧銜命出疆公肆裒掠并與北貨厚載而歸若不斥去則此軰自作不靖動揺國是不可不慮故有是命癸巳端明殿學士簽書樞宻院事史才罷御史中丞魏師遜劾才天資隂賊頃受李光薦改秩迨今隂相交通謀為國害屢貽書問不憚數千里之逺凡光所厚者悉與結託包藏禍心自為不靖右正言鄭仲熊亦言李光曩知温州孫仲鼇掌其表章才用其薦書以改秩及今得路遂與仲鼇及光所厚者互相交結宻通光書於萬里之外盖欲隂連死黨以揺國是伏望亟行竄逐才聞乃再章求去初命以舊職提舉江州太平興國宫師遜等再論遂落職甲午御史中丞兼侍講魏師遜充端明殿學士簽書樞宻院事尋兼權參知政事乙未權尚書吏部侍郎陳相卒丁酉大理司直李璟面對乞申嚴法禁獄事連婦女童稚别有證佐可以結絕者勿追從之庚子上諭大臣曰當兹劇暑待差遣人速與發遣其闕官處或遷或召卿等宜商量進擬辛丑右朝散郎前知建康府王循友特貸死免籍沒家財送藤州安置男右承奉郎前江南東路安撫司主管書冩機宜文字浤追兩官勒停特除名弟右文林郎新奉國軍節度推官循訓追四官勒停特除名送雷州編管右朝散郎新添差通判饒州韓参追兩官勒停特除名送德安府編管初循友在任嘗斷配宰臣秦檜族人檜銜之遂興此獄既而棘寺言循友盗取官錢受所部乞取金銀冒請宣借口劵入已减價詭名收買没官産業違法差参主管機宜文字因與参謗訕朝政循訓與浤偷盗官錢而循友不覺察故有是命日厯于秦檜當國時被罪之人多不言其故獨於循友一事書之㑹要亦同不知何人當筆惜乎其不廣也今摭其可考者依此例其書之未詳者則闕之更湏参考癸卯手詔曰息兵専以為民四川州縣雖屢降指揮减免錢物以寛民力尚慮措置未盡委制置司總領所同共方便措置務在不妨軍食可以裕民事逐一條具申尚書省取㫖監察御史董德元守殿中侍御史甲辰秦檜進呈禮部乞賣紫衣師號上曰自紹興四年江上用兵亦嘗用此以相資助今可檢舉保寧軍承宣使主管侍衛馬軍司公事成閔為慶逺軍節度使以積閥遷也左朝散大夫知衢州王曮罷左中大夫提舉江州太平興國宫王師心知衢州時飢民俞八等嘯聚為盗而曮措置乖方諸盗結集至千餘人掠嚴之夀昌焚倉庫殺平民事聞秦檜因奏曮有贓汙不法事在有司乞先次放罷上曰曮卿親戚今罷之勝如罷其他十數人也既而殿前司遣将官辛立将兵千人徃捕賊遂平八月乙未俞八等行遣九月丁巳辛立等轉官熊克小厯云盗雖捕獲而猶未定詔以王師心知衢州民始安堵按師心除命與曮同日此時盗猶未平今不取監察御史張士襄守尚書左司郎中乙巳大理評事沈正度面對言廼者陛下俯從臣僚之請令川廣京湖等州應禁奏案具録副本報提刑司繳奏以先到者約法欲使獄無滯訟德至渥也尚慮所過遞舖不即傳送以致逗遛望令當職官常切㸃檢上曰可令州縣以時支給月糧此軰方肯乆住不致闕額熊克小厯稱言者論二廣舖兵之弊上曰云云盖失於鹵莽也丙午秘閣修撰新知廣州陳桷卒戊申大理評事莫濛面對論民間不願承募保長正者盖官司以他事役之望申嚴法禁詔户部檢坐行下己酉大理評事劉敏求面對言薦舉之法昭若日星比年以來監司郡守有以一章而舉二人甚至於三四人前所舉者未用後來求者復舉之名曰改舉黷害風教莫此為最望明詔有司申嚴法禁凡所舉人實有改節及有事故不用方許改舉無故而改者重寘以法庶幾杜絕奔競仰副綜核名實之意從之建炎以來繫年要録巻一百六十六
