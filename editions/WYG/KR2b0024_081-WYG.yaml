body:
  text: 建炎以來繫年要録巻八十一宋李心傳撰紹興四年冬十月丙子朔淮東宣撫使韓世忠奏蕃偽兵馬犯承楚州上謂輔臣曰朕為二聖在逺生靈乆罹塗炭屈已請和而金復肆侵陵朕當親總六軍往臨大江决於一戰趙鼎曰累年退避敵情益驕今親征出於聖斷將士可奮决可成功臣等願効區區亦以圖報上因曰伐蔡之功亦憲宗能斷也故韓愈謂凡此蔡功惟斷乃成沈與求曰今日親征亦由聖斷遂詔神武右軍都統制張俊以所部往援世忠又令淮西宣撫使劉光世移軍建康車駕定日起發熊克小歴時江東宣撫使劉光世在馬家渡淮西宣撫使張俊軍在采石遂詔光世以所部兵援世忠且令俊移軍於建康與日歴所書不同按俊此月己卯始除浙西江東宣撫使此時未為宣撫克盖小誤詔四孟朝獻候過防秋取㫖權户部侍郎梁汝嘉等奏左藏庫𣙜貨務都茶場見管金二萬一千餘兩銀九十六萬七千餘兩乞並隨駕應副支用紬二十萬匹絹一百六萬四千餘匹羅一萬二千匹乞起發一半從之起居舍人劉大中兼權中書舍人太府少卿馬承家知衢州承家聞警奏即請外補時盡室登舟以行言者論其隂懐茍免乃詔承家依舊供職十月癸未依舊丁丑參知政事孟庾為行宫留守從權措置百司事務仍鑄印以賜庾請即尚書省置司行移如本省體式合行事從權便宜施行置降賜激賞公使庫如都督府例又請秘書省史館書籍三省樞宻院諸部案牘各差本司官一員於深僻處収寄大理寺官告糧審院左藏東西交引度牒庫南北倉都茶草料塲官吏並留太常司農太府寺將作軍噐監進奏文思院雜買務並量行存留宗正寺國子監勑令所大宗正司雜賣場並令從便庾又請留臺官一員以警違慢皆許之庾乞輟留精兵三千人分擘使喚乃命留神武中軍五百人及統制官王進一軍又令殿前馬歩軍司及忠銳第五將臨安府將兵皆聽庾節制勒停人巨師古復拱衛大夫忠州防禦使充神武右軍統制軍馬用張俊請也戊寅洪州觀察使權知濮安懿王園令士從乞徙神主神貎往穏便州軍安奉從之於是親賢宅宗子紹興府大宗正司皆從便避兵矣己卯趙鼎等進呈乞将韓世忠等奏報蕃偽人馬犯承楚等事劄付奉使大金魏良臣往軍前商議早行約束上曰和議蓋非得已儻得淮南兩路百姓安業即内帑物帛自可了其歳幣不須更動户部財賦朕宫中並無用度凡内帑所有専以養兵而已沈與求曰陛下為愛惜生靈之故至捐内帑以充歳幣此盛徳事也太尉定江昭慶軍節度使神武右軍都統制張俊為浙西江東宣撫使以事係機速更不降制止令尚書省出𠡠直徽猷閣新江南西路轉運副使李謨添差兩浙路轉運副使時左朝奉郎王俁直秘閣呉革並為副使户部侍郎梁汝嘉面奏乞用謨故有是命初武岡軍猺賊楊再興連年作亂湖南安撫司遣統制官拱衛大夫泰州刺史呉錫以所部討之及是大破賊徒獲再興之二孫得良民被掠者甚衆明年三月癸巳推恩據湖南奏稱招出被擄良民八千餘人今第云甚衆俟考是日淮東宣撫使韓世忠以所部自鎮江復如揚州初上聞敵騎渡淮再以御札賜世忠略曰今敵氣正銳又皆小舟輕㨗可以横江徑渡浙西趨行朝無數舍之逺朕甚憂之建康諸渡舊為敵衝萬一透漏存亡所係朕雖不徳無以君國子民而祖宗徳澤猶在人心所宜深念累世涵養之恩永垂千載忠誼之烈世忠讀詔感泣遂進屯揚州初敵騎渡淮探者未得其實以為兵勢甚少趙鼎曰金前犯我境乃入敵國即賊也故縱兵四掠其鋒可畏今行豫境即官軍也故按隊徐行不作虛聲然亦不足深畏庚辰侍御史魏矼殿中侍御史張致逺右司諫趙霈以急速事乞同班入對許之時朝士中尚有懐疑者或見趙鼎曰兹事甚大公宜審處無貽後悔鼎不答㑹侍從及臺諫官同日請對鼎留身奏曰今日侍從臺諫對必及親征事願勿為羣議所移上意益堅既而矼等與吏部侍郎鄭滋等以上親總六師皆乞扈從致逺又言今此金敢大入謂我猶如向来不習戰爾若戎輅親征必伐敵謀上曰正朕志也此以趙鼎行實增修然日歴臺諫以初五日乞對侍從以十一日上殿疑不同日今且從行實所云更須參考左朝請郎主管江州太平觀范振添差江南東路轉運判官右朝散大夫逢汝霖添差江南西路轉運判官應辦移屯大軍事務徽猷閣待制知鎮江府沈晦乞促張俊統兵為韓世忠之援趙鼎等稱晦議論激昂上曰晦誠可嘉然朕知其為人語甚壮膽志頗怯更觀其臨事能副所言與否鼎因稱馬擴極有才可用上曰宜令留守司使喚孟庾曰臣亦欲以此為請胡松年曰擴嘗見臣欲自将三千人禦敵鼎曰擴甞因苗傅事得罪然諸葛亮能用度外人區區庸蜀遂致强霸與求曰今日正當㧞卒為将之時臣聞擴持軍嚴整願陛下留聖意湔拭而用之上曰齊小白能忘射鉤之讎而用管仲朕豈不能用擴然能用之止與三千人非是可令引見上殿示以恩信然後用之彼必能効死力以報朕與求曰陛下駕馭諸将如此何事不濟鼎對曰陛下開大度用人如此天下幸甚擴此月丁亥除樞宻承㫖先是擴奉祠居福州鼎開督府引為詳議官故薦用之辛巳右儒林郎新樞宻院計議官方滋特改合入官以薦對故也是日通問使魏良臣王繪次鎮江府而泗州言得宿州牒已差引伴官孫少卿至境上乃命良臣等分析仍權将禮物私覿寄留鎮江止持國書物録取天長路星夜前去仍令韓世忠差近上使臣催促出界時良臣亦遣書状官梁植持禀目遺輔臣大略言和議本為淮甸今既進兵百端懇請終恐無益况臨難觧紛世無此理自古兩國議和皆以勢力相埒不能相下於是有講和脩睦之請息兵安民之議未聞以弱和强彼初無畏憚曲意定和者也澶淵之役規摹宏逺昭然可見比年諸将蓄銳練兵志氣思奮百倍於前日第以朝廷方篤信詐和之請斷然不疑歛兵不動以示誠意遂遣使命淹延嵗月墮欲奮之士氣乖違附之民心今和議未定敵兵已集竊聞宣撫韓開府奮袂怒髮遂統全軍絶江伺便以進其行踊躍如赴私讐議者謂必能成功獨念建康控扼之地聞朝廷已遣張太尉提兵迎敵敵已壓境此行似不可緩仍命劉開府相與應援以破逆賊三不救之說将和兵奮敵氣自懾則銜命以往宣國威靈庶乎其有濟矣茍不知出此止為退懦之計效尤前轍示之以怯使吾軍士氣不揚乗輿再動社稷阽危萬一敵革前日之弊所至按兵不擾遲以歳月人心茍安則大事将去矣而乃以一介之使馳入不測之廷是猶以羊委虎至則靡爾何功之有詔良臣等分析在此月壬午梁植離鎮江在甲申今聨書之壬午右司諫趙霈請令講讀官權罷供進講義侍從官權罷供進故事竢過防秋無警報日如舊從之初經筵乞開講㑹上将親征詔别令擇日故霈因有是請焉宗正少卿直史館范冲録其父祖禹紹聖間報國史院問目以進又具朱墨本去取體式請更憑衆議修立詔送史館中興聖政臣留正等曰史所以傳信而朱墨本各㨿所見自以為疑将何以取信哉以是益知人臣不可以有黨有黨則不惟貽禍於一時其流弊未已也然而人有邪正事有信否辨其人之邪正審其事之信否思過半矣人之邪正固可以類見事之信否求之以當時之實參之以故老與夫賢士大夫之所傳其幾歟范冲具到朱墨本去取體式乞更憑衆議㸔定其用心亦公矣是宜太上皇帝之所聴從也癸未左通奉大夫福州居住張浚為資政殿學士提舉萬壽觀兼侍讀不許辭免日下起發趙鼎言浚可當大事顧今執政無如浚者陛下若不終棄必於此時用之故有是命朱勝非閑居録紹興四年冬劉齊金人合兵犯淮泗朝廷震恐宰相趙鼎昔嘗失身於偽楚初無敢薦者而浚獨薦為言事官鼎徳之至是乘急變召浚復秉樞機其言失實今不取直龍圖閣知建康府吕祉奏淮南兵馬動息趙鼎等稱江上探報唯祉最為詳宻慷慨敢為兼有措置如此等人材實不易得上曰吕祉真有方面之才上又曰朕留意人物固欲得賢士大夫協力以濟國家之難且如鄂州劉洪道初縁吕頥浩薦對所言多誕謾不實雖略有麤材亦何所用之胡松年曰君父之前猶敢誕謾顧何所不至沈與求曰洪道頃知明州脫身先遁一城生靈盡殪於賊至今一方之人怨入骨髓上曰今鄂州乃上流之地緩急安可倚仗更須别擇守臣詔沿海制置使郭仲荀兼總領海船朝廷聞總領官和州防禦使同管閤門公事張谷裕卒故就命之甲申降授光州觀察使神武前軍統制江州駐劄兼節制舒蘄黄州王􅊛復建武軍承宣使江西沿江制置使大理少卿張礿乞宫觀上曰礿為理官頗有平允之稱邇来有司率多觀望鍛鍊或至刑獄失當甚非朕所以欽恤之意人命至重豈可忽擇其尤者當痛加懲艾大抵刑獄以明恕為先深戒慘酷趙鼎曰礿亦乆任理官不畏强禦極有執守上曰當議陞擢以為理官之勸參知政事沈與求奏頃臣曲謝已䝉衣帶之賜乞罷正謝日所賜衣帶鞍馬許之初淮東州縣聞敵入犯承楚之民相率控守水寨而帥司選官除去運河壩閘以阻敵兵至是言者以為若使承楚水澁船不能動則民社失其地利敵騎衝突直至江岸占據渡口復驅江北之人以布土袋填塞壩閘頃刻可辦依舊引取陂塘之水舟船復可通運是乃所以助其勢大害有四無一利也一者貽敵之笑謂我畏彼反生欺忽之心二者以顯官兵無北渡之意愈失江北人心三者水寨既失地利忠義之人無以措手足反墮敵計四者鹽商不行有誤朝廷進軍財計誠為痛害乙酉詔通泰真揚州守臣更切體度地利從長措置務要限阻敵船及不得有妨湖泊水寨民社保聚自金人入境揚州官吏退保隂沙承州官吏皆散淮東轉運判官郭楫亦挈家先遁徽猷閣待制新知揚州宋伯友至鎮江奏言孤獨一身委實前去未得乞那兵萬人與韓世忠同赴敵迎戰乃命伯友從便先次交割伯友從便交割指揮在丙戌日今併書之伯友引疾乞奉祠許之伯友十二月丙子提舉江州太平觀丙戌詔遣簽書樞宻院事胡松年先往鎮江建康府與諸將㑹議進兵因以覘察敵情上曰先遣大臣諭以朕意庻幾諸将賈勇争先沈與求曰真宗澶淵之役亦先遣陳堯叟此故事也詔常程事並權住俟過防秋取㫖殿中侍御史張致逺言車駕總師臨江乞速降黄榜預行約束每事務在簡省稍有配率許人陳告仍委侍從臺諫官覺察彈劾從之詔刑部尚書章誼吏部侍郎兼直學士院孫近户部侍郎劉岑中書舍人王居正右司諫趙霈殿中侍御史張致逺右司員外郎王綰樞宻院檢詳諸房文字陳昻吏部郎官汪思温度支郎官李元瀹金部郎官呉幷令扈從吏部侍郎鄭滋禮部侍郎唐煇刑部侍郎胡交修起居舍人劉大中監察御史張絢並留臨安府於是臺臣檢正都司郎官或往軍前或押案牘往傍郡收寄在臨安府纔十餘人而已滋交修乞從便許之是日侍從官同班入對以上将親征也丁亥降授右武大夫和州防禦使馬擴復拱衛大夫明州觀察使充樞宻副都承㫖擴入對遂有是命翊日趙鼎奏陛下用人如此何患不得其死力上曰擴知兵法有謀略不止於鬬将而已孟庾因奏以擴兼留守司參議官直秘閣新江西提㸃刑獄公事王圭樞宻院計議官方滋樞宻院編修官王循友並充幹辦公事循友巖叟孫也圭之辟在丁亥擴在戊子滋循友在十一月戊申今併書之已而圭以省員去殿中侍御史張致逺言圭張大敵數詫說逆劉乃罷其新除圭罷憲在十二月壬午戊子胡松年辭行時淮西宣撫使劉光世宻遣屬官告趙鼎曰相公本入蜀有警乃留何故與他負許大事韓世忠亦謂人曰趙丞相真敢為者胡不将官家入福建穏處坐江上之事付之我輩或不可則少避之俟春首敵退徐議何害鼎聞諸将之議如此恐上意移動復乗間言今日之勢若敵兵渡江恐其别有措置不如向時尚有復振之理戰固危道有敗亦有成不猶愈於退而必亡者乎且金齊俱来以吾事力對之誠為不侔然漢敗王尋晋破苻堅特在人心而已自詔親征士皆賈勇陛下養兵十年正在一日由是浮言不能入矣此據趙鼎事實附入但所云韓世忠言胡不将官家入福建穏處坐江上之事付之我輩或不可則少避之俟春首敵退徐議何害此與建炎三年閏八月世忠奏上語殊不同恐傳聞未必實或可削去參知政事沈與求兼權樞宻院事太常寺請車駕所過十里内神祠及名山大川並遣官致祭從之嚴州桐廬縣進士方行之獻家財六千緡助軍户部乞許行獻納依例補官從之自渡江後許民間獻納補官始此是日淮東宣撫使韓世忠邀擊金人于大儀鎮敗之初奉使魏良臣王繪在鎮江被㫖趣行乃以是月丙戌渡江丁亥至楊子橋遇世忠遣使臣督令出界繪顧良臣曰幸免管押二字亦是光華時朝廷已知承楚路絶乃連偽界引伴官牒付良臣等令賫執於阻節處照驗又令淮東帥司召募使臣說諭承楚州令放過奉使良臣等至揚州東門外遇選鋒軍自城中還問之云相公令往江頭把隘入城見世忠坐譙門上頃之流星庚牌沓至世忠出示良臣等乃得㫖令移屯守江世忠留食良臣等辭以欲見參議官陳桷提舉官董􅌈遂過桷等共飯熊克小歴稱世忠置酒與良臣别盃一再行流星庚牌沓至蓋承墓碑之詞今從王繪甲寅録世忠遣人傳刺字謝良臣繪且速桷等還桷􅌈送二人出北門繪與桷有舊駐馬乆之以老㓜為託泣數行下左右皆傷怛晚宿大儀鎭翌旦行數里遇敵騎百十控弦而来良臣命其徒下馬大呼曰勿射此来講和敵乃引騎還天長問皇帝何在良臣對曰在杭州又問韓家何在有士馬幾何繪曰在揚州来時已還鎮江矣又曰得無用計復還掩我否繪曰此兵家事使人安得知去城六七里遇金将聶哷貝勒同入城問講和事且言自泗州来所在州縣多見恤刑手詔及戒石銘皇帝恤民如此又問秦中丞何在繪荅以今帶職奉祠居温州又言嘗聞作相今罷去得非恐為軍前所取故邪繪曰頃實居相位踰年堅欲求去無他也又問韓家何在良臣曰来時親見人馬出東門望𤓰洲去矣繪曰侍郎未可為此言用兵講和自是二事雖得㫖抽回将在軍君命有所不受還與未還使人不可得而知又云元帥已到高郵三太子已到泗州是行皆劉齊間諜所致劉總管謂韓家有幾萬岳家有幾萬俱在淮南自入境来何嘗見一人一騎初世忠度良臣已逺乃上馬令軍中曰視吾鞭所嚮於是引軍次大儀鎮勒兵為五陣設伏二十餘處戒之曰聞鼓聲則起而擊敵聶哷貝勒聞世忠退軍喜甚引騎數百趨江口距大儀鎮五里其将托卜嘉擁鐡騎過五陣之東世忠與戰不利統制官呼延通救之得免世忠傳小麾鳴鼓伏者四起五軍旗與敵旗雜出敵軍亂弓刀無所施而我師迭進背嵬軍各持長斧上揕人胸下捎馬足敵全装䧟泥淖人馬俱斃遂擒托卜嘉通贊逺孫也趙雄撰世忠神道碑王自鎮江濟師㑹朝廷遣魏良臣使金至維揚王置酒送别盃一再行流星庚牌沓至良臣問故王曰有詔移屯守江乃撤炊㸑班師良臣竊自喜疾馳去王度良臣已出境乃上馬令軍中曰視吾鞭所嚮於是六軍大集北行至大儀鎮勒精兵為五陣設伏二十餘處戒聞嚴鼓之節則次第起攻良臣至金營果問我師動息悉如所見以對烏珠號知兵聞大軍倉卒南還喜甚與羣帥厲兵秣馬直趨江口至大儀鎮五里所王縱敵騎過五軍之東直北傳小麾鼓一鳴伏者四發五軍旗號與敵旗雜出敵軍亂我師伍伍迭進歩隊各持長斧斫馬足敵全裝䧟塗淖弓刀無所施王東西麾勁騎四面蹂之大半乞降餘皆奔潰追殺十餘里烏珠乘千里馬以遁積屍如邱垤擒其驍将托卜嘉女真千户長五百餘人獲戰馬五百餘匹噐械輜重與平山堂齊軍勢大震烏珠還泗上召良臣詰責其賣已将斬之良臣好詞以免趙甡之遺史世忠以董􅌈軍於天長以觧元屯于承州親與呼延通率十餘騎綽路去大儀鎮十餘里遇金人鐡騎二百餘世忠與通方立馬議所以待之有三四十騎直衝世忠與戰不利金人有驍将獨戰世忠世忠力疲通自後攻金将世忠墜馬幾被執通救止之世忠復得其馬回顧金人百餘騎許世忠據坡坂扼其路以弓箭當之世忠得還二書不同如此熊克小歴多據墓碑日歴韓世忠申十月十三日親領軍馬渡江到揚州大儀鎮逢金人掩殺趕及二十餘里又有伏兵把頭迎敵厮殺至酉時殺敵尾襲殘零兵馬走回天長縣以北四􅄆前去殺死蕃人横屍二十里不令斫級活捉到萬户千户百人長以下托卜嘉等二百餘人奪到蕃馬一百餘疋衣甲弓箭噐械等物三千餘件以世忠㨗奏考之所獲人馬亦不及墓碑之數蓋世忠行状誇言之雄不深考耳以諸書參究此時完顔宗弼實不在大儀軍中又據所申擄到噐甲弓箭果三千件亦安得便與平山堂齊耶如遺史所云則其㨗太小今且參取具書之更須詳究也世忠又遣董􅌈分兵往天長縣遇敵于鵶口橋擒女真四十餘人熊克小歴稱􅌈與敵戰于天長軍亦誤按此時魏良臣正在天長今從日歴是日早朝輔臣進呈世忠奏已統兵渡江上曰世忠忠勇朕知其必成功沈與求曰世忠平日慷慨自許恐其乘勝追襲深入更宜戒其持重上曰朕已戒其可戰則戰可守則守可令户部支銀帛萬匹兩犒賞過江将士以激其心與求曰自敵騎蹂踐中原未嘗有與之戰者今諸将争先用命此成功之秋也既而世忠又奏見在揚州適霖雨未能進師恐朝廷訝成功之遲上曰兵事豈可遥制趙鼎曰軍事不從中覆古之制也乃詔世忠聴其臨機制變而㨗書已至矣臨機制變指揮在此月庚寅己丑尚書禮部侍郎唐煇兼權兵部侍郎金人圍濠州是日淮東宣撫司前軍統制觧元與金人戰于承州敗之初金人至近郊元知之逆料金人翌日食時必至城下乃伏百人于路要之又伏百人于城之東北嶽廟下自引四百人伏於路之一隅令曰金人以髙郵無兵不知我在高郵必輕易而進俟金人過我當先出掩之伏要路者見我麾旂則立幟以待金人進退無路必取嶽廟走矣果然則伏者出衆皆諾又宻使人伏樊良俟金人過則决河岸以隔其歸路食時金人果徑趨城下元宻數之有一百五十騎乃以伏兵出麾旂以招伏要路者伏兵皆立幟以待金人大驚躊躇無路遂向嶽廟走元率兵追之金人前遇兵無所施其技盡被擒凡得一百四十八人戰馬噐械皆為元所得世忠神道碑觧元至高郵敵敗去按日歴㨗奏無成閔名今從趙甡之遺史初聶哷貝勒既敗歸召奉使魏良臣等至天長南門外良臣等下馬敵騎擁之而前貝勒憤甚脱所服貂㡌按劍瞋目謂曰汝等来講和且謂韓家人馬已還乃隂来害我諸将舉刃示之良臣等指天號呼曰使人講和止為國家韓世忠既以兩使人為餌安得令知其計往返良乆乃曰汝往見元帥遂由寳應縣用黄河渡船以濟右副元帥昌遣接伴官團練使蕭吉嚕少監李聿興来迓聿興見良臣問所議何事良臣曰此来為江南欲守見存之地每嵗貢銀絹二十五萬匹兩繪云見存之地謂章誼回日所存之地聿興又云兵事先論曲直師直為壮淮南州縣已是大國曽經略定交與大齊後来江南擅自占據及大兵到来又令韓世忠掩不備良臣等云經略州縣事前此書中初未嘗言及止言淮南不得屯兵本朝一如大國所教聿興云襄漢州縣皆大齊已有之地何為乃令岳飛侵奪良臣云襄漢之地王倫回日係屬江南後李成為劉齊所用遂来侵擾又結楊么欲裂地而王之江南恐其包藏禍心難以立國遂遣岳飛收復即非生事聿興云元帥欲見國書遂以議事迎請二聖二書授之吕中大事記建炎元年遣傅雱使金二年遣宇文虚中使金此汪黄為之也三年遣洪皓崔縱張卲杜時亮四人亦汪黄為之乎紹興八年再遣王倫此秦檜為之也十一年遣魏良臣何蘚之徒亦檜為之乎胡寅有言今納賂則孰富於京室納質則孰重於二帝飾子女則孰多於中原之佳麗遣大臣則孰加於異意之宰輔以使命之幣為養兵之費此乃晋人征繕立圉之䇿漢祖迎太公吕后之謀也不得已則如李綱所謂奉表兩宫致思慕之意可也今尋諸仇讐而請之何義乎吉嚕又問秦中丞安否此人原在此軍中煞是好人良臣等對如初聿興再云柰何更求復故地繪云以中間丞相惠書有云既欲不絶祭祀豈肯過為恡愛使不成國是以江南敢再三懇告若或不從却是使不成國聿興云大齊雖號皇帝然止是本朝一附庸指揮使令無不如意又云此去杭州幾日可以往回繪等云星夜兼程往来不過半月聿興曰昨日書元帥已令譯作番字一二日可得見矣吉嚕契丹人聿興宣和三年進士高第金用為樞宻院令史至是從軍庚寅詔信安郡王孟忠厚迎奉泰寜寺昭慈聖獻皇后御容往穏便州軍安奉忠厚援故事乞補門客曹雲登仕郎上曰昭慈聖獻皇后頃在瑶華宫三十餘年當得恩澤近八十員未嘗陳請忠厚受昭慈之訓亦不敢以私事干朝廷今此門客恩澤既有故事宜與之朕見漢唐后家亂政累朝母后之賢非漢唐所可擬議沈與求曰昭慈再安社稷其功至大上曰前日合得恩澤俟軍旅事間給田以賜忠厚庶幾少慰昭慈在天之靈壬辰輔臣奏事上因言朕出使河朔見汪伯彦為郡守頗有可觀及作宰輔一無可取所謂為趙魏老則優而不可為滕薛大夫也沈與求曰黄霸為宰相聲名减於治郡時盖其才有短長不可彊也上曰若伯彦得為黄霸之流乎與求曰伯彦安足以望此左廸功郎秘書省正字楊晨特改京官晨為都督府幹辦公事持詔書往四川撫諭上召對而命之後二日以晨守尚書工部員外郎賜銀二百兩詔書略曰朕命趙鼎以宰相居中仍兼領西南軍務既總司於朝廷益増重於使權遲俟来春改圖近弼綏爾衆士庸副朕懐肆命屬僚往宣徳意先是降充集英殿修撰知鼎州程昌㝢聞鼎以都督入蜀遺大臣書言四川初無盗賊之擾止縁宣撫使入蜀以擾之豈為宣撫者固欲重困州縣乎盖張官置吏屯師聚兵所過所留征求調發勢有不得不然者耳况今四川危動民困財竭乃欲以大臣出使将帶官吏抽摘諸軍又入蜀地征求調發號曰圖秦竊恐秦未可圖而肘腋腹心之變先起矣今四川士馬不過呉玠部曲耳有如近復襄鄧等州都督之行就嘗措置撥軍屯守兵勢愈分孰若命大臣或大将益重兵聚貲糧守荆州以據長江之險根本既固然後可以圖秦保蜀料理襄漢經略中原隨宜度勢以次施設荆南前日以二萬人守之亦可今春金人取和尚原關師古既叛階成州一帶無人控扼上流勢須益兵非有五萬之衆錢糧非有三年之儲且将不假歳月責之近效亦豈能勝其任也㑹鼎入相乃命晨諭指西帥焉定國軍承宣使秦鳳路馬歩軍副都總管知秦州兼節制階文州統制軍馬呉璘為熈河蘭廓路經略安撫使知熈州統制關外軍馬明州觀察使環慶路馬歩軍副都總管兼知慶陽府楊政為環慶路經略安撫使知慶陽府同統制關外軍馬兼節制成鳳興州用宣撫司奏也關師古之叛也其所部階成二州猶在故命璘政分領之自富平後五路之地悉屬偽齊經略使虗名而已癸巳韓世忠遣武功郎趙何来獻㨗詔遷何一官太尉神武右軍都統制張俊乞以明堂恩任子宗元文資吏部言有礙條法詔特許之武臣非使相而以文資禄子孫自是為例是日江東淮西宣撫使劉光世引軍屯建康府甲午尚書户部侍郎劉岑兼工部侍郎中書舍人王居正兼禮部兵部侍郎初令江浙民悉納折帛錢用户部侍郎梁汝嘉請也是時行都月費錢百餘萬緡且調發軍馬財無所從出故令民輸紬者全折輸絹者半折見錢每匹五千二百省折帛錢自此愈重汝嘉等又請江浙絲並折見錢綿半折錢諸路各委漕臣一員計綱起發赴行在遣侍御史魏矼往劉光世軍監察御史田如鼇往張俊軍前計事時光世軍馬家渡俊軍采石磯上命趣二人往援韓世忠而光世等軍權相敵且持私隙莫肯協心矼至光世軍中諭之曰敵衆我寡合力猶懼不支况軍自為心将何以戰為諸公計當滅怨隙不獨可以報國身亦有利光世意許矼因勸之移書二帥以示無他使為犄角已而二帥皆復書交致其情光世遂以書奏于上熊克小歴附此事於十月朔恐太早日歴十八日甲午魏矼特引進對丙申田如鼇状奉㫖差出計議軍事日下出門據此則矼等之行當在世忠奏㨗之後今併附甲午更俟參考於是光世移軍太平州光世聞金齊合兵謂人曰劉麟逆子可唾手取若雜以金兵當日月以冀參議官直徽猷閣馬觀國曰金人長於騎射兼以獷悍其鋒誠不易當龍圖閣直學士陳規奉祠居城中奮謂曰相公䝉國厚恩義當仗忠赤激士氣以報參議夷人也是亦人而已此據曹筠撰規行状増入行状又云光世引兵而西金人遂歸河南地按金還河南在九年春去此已逺若係於六年入犯之後則光世已先在合肥不在太平州聞命筠誤也今移掇附見庻不牴牾丙申以車駕将發不視朝内殿進呈劉光世報劉豫散出榜文有欲窺江表之言榜文已見九月乙丑上曰豫父子逆亂如此皆朕不徳所致然以朝廷事力遣一偏師豫可擒也徒以二聖在逺故屈己通和覬還鑾輅今乃挾彊敵之兵復入為㓂此安可容忍沈與求曰和議乃金人屢試之䇿不足信也左承議郎新知袁州劉一止為兩浙東路提㸃刑獄公事除名勒停人范仲熊叙右承事郎仲熊始坐眀受中為郎逺謫至是刑部引赦乞叙右通直郎與差遣趙鼎以仲熊連姻特降五官是日金人䧟濠州守臣閤門宣賛舍人㓂宏棄城走右宣教郎通判州事國奉卿為所殺先是宏率軍民守城城中兵少大率以三人當一女頭軍民與僧道相參每十人為一甲不得内顧毎一慢道以二長刀監守無故上下者殺之宏晝夜廵行城上北軍以衝車雲梯攻城宏作鐵槌上施狼牙釘有沿雲梯而上者以槌擊之頭鍪與腦皆碎屍積于城下而北軍来者不止凡八晝夜不休宏知不可為乃開北門棄妻子携母與寡嫂棄城而去士卒從之者七十餘人宏之将出也聲言登舟欲以計破敵奉卿信之既而乃知欲為遁計已登舟不可入城矣奉卿尤宏曰何不明言於我擕一妾兩子而棄之死地耶宏以奉卿為怨已遂殺之後以死事聞贈右朝奉郎直秘閣官其家二人奉卿五年二月戊戌贈官宏既去權兵馬鈐轄丁成自南門投拜兵馬都監魏進自東門投拜金人問宏之家屬何在成曰偕去矣已而聞為成所匿遂斬成于市取宏奉卿家屬寘于軍中以其将趙榮知州事初敵圍城急将官楊照躍上角樓以槍刺敵之執黒旗者洞腹抽腸而死照俄中流矢死統領官丁元與敵遇于十八里洲敵圍之元大呼告其徒以毋得負國於是一舟二百人皆被害無得免者事聞並贈承信郎録其子云明年七月丁酉贈官丁酉執政進呈車駕進發宿頓次序上曰朕奉已至薄况此行本以安民豈可過為煩擾又恐州縣以調夫修治道路為名並縁為弊趙鼎曰朝廷累行約束丁寜備至沈與求曰諸将之兵分屯江岸而敵騎逡廵淮甸之間恐乆或生變當遣岳飛自上流取間道乗虗擊之敵騎必有反顧之患上曰當如此措置兵貴拙速不宜巧遲機事一失恐成後悔宜速諭之右宣義郎裴祖徳除名祖徳以濫賞改官居憂中冐覃轉及章服又妄稱職名為言者所論下大理祖徳具伏又嘗從統制官王進岳飛王民得空名告身給賣富民入已刑寺當徒三年特責之戊戌上登舟發臨安府趙甡之遺史云金人在淮甸張俊軍鎮江府趣渡江出戰有遲疑未渡之意朝野驚恐趙鼎見上屢請車駕早幸江上上首肯之既退即為中官沮止至是鼎請上親征且曰軍民百姓皆望陛下親征内中官未肯若陛下一幸江上則諸軍皆盡力禦敵矣中官未見陛下親征之利也臣欲乞陛下發遣近上中官赴都堂臣具酒醴待之諭以禍福然後親征可决上從之遂發左右親近十餘人詣都堂鼎具酒醴以宗廟社稷安危之計諭之且曰諸公見上賛成其事俟退敵回鑾則共享安逸之福衆諾之議遂定即命草詔按此說皆不見於他書今且附此恐須參考奉天章閣祖宗神御以行主管殿前司公事劉錫神武中軍統制楊沂中皆以其軍從上不以玩好自隨御舟三十餘艘所載書籍而已上既發乃命六宫自温州泛海往泉州此月丙申降㫖晚泊臨平鎮進呈劉光世乞與韓世忠軍一般支錢糧上曰諸将之兵用命則一其所支錢糧豈容有異此皆吕頥浩不公之弊趙鼎曰朝廷舉措既當諸将自服今不公如此必致紛紛乞下光世㑹合得錢米之數然後行沈與求曰豈唯錢糧至於賞罰亦然惟至公可以服天下故賞則知勸罰則知畏上曰大臣不公何以服衆鼎曰茍為不公則賞雖厚人不以為恩罰雖嚴人不以為威上曰今日朕親總六師正當公示賞罰詔沿江州縣如排辦太過令監司具名以聞當重行黜責時右司諫趙霈言浙右諸郡頃罹兵火瘡痍未息民力未蘇今戎輅進發又慮州縣官吏不能上體徳意帟幕之飾務極於鮮華膳羞之進徧搜於珍異或調發人夫或差科舟船誠不可不為之禁故有是㫖湖北制置使岳飛遣屬官孔戊来奏事詔特改京官己亥上次崇徳縣韓世忠遣翊衛大夫宣州觀察使本司提舉一行事務董􅌈右朝奉郎直秘閣本司參議官陳桷以所俘女眞一百八人獻行在因言承州陣殁人乞厚加贈恤上蹙然曰使人死於鋒鏑之下誠為可憫可令收拾遺骸於鎮江府擇地埋殯仍嵗度童行一名照管今胡松年尚在鎮江可令就設水陸齋致祭沈與求曰自建炎以来将士未嘗與金人迎敵一戰今世忠連㨗以挫其鋒其功不細鼎曰陛下既親總六師則第功行賞與他時不同上曰第優賞之庻幾人知激勸必有成功乃詔􅌈真除宣州觀察使桷遷右朝奉大夫充秘閣修撰中奉大夫相州觀察使解元落階官為同州觀察使武功大夫康州刺史呼延通為吉州刺史􅌈等賞功在此月辛丑今聨書之趙甡之遺史韓世忠奏通之功乞優異推恩授武功大夫吉州刺史世忠繳其告命再奏乞重賞通以勸将士遂落階官按日歴今年五月十四日癸亥武功大夫康州刺史呼延通陞差浙東路兵馬副都監依舊從軍非因賞功始除遥刺也恐甡之所記有誤庚子上次秀州北門外辛丑上次吳江縣時知縣事楊同裒供張以待乗輿之至民有一家當費三百縑者其人不伏又械繫之御史張致逺三上章論其擾民同竟罷去同三月庚辰放罷壬寅御舟次姑蘇館上乘馬入居平江府行宫守臣孫佑進御膳其桌子極弊且有僧寺題識上不以為嫌他日謂趙鼎曰朕念往日艱難雖居處隘陋飲食菲薄亦所甘心若邊境以清都邑既定迎還二聖再安九廟帝王之尊固在鼎曰陛下規模宏逺如此天下幸甚上語在十一月壬子今併書之故贈承事郎陳東歐陽澈並加贈朝奉郎祕閣修撰更與恩澤二資賜官田十頃趙鼎進呈韓世忠奏劄世忠劄子不知所奏何事當考因論建炎之初黄潛善汪伯彦擅權專殺寘二人於極典上曰朕初即位昩於治體聴用非人至今痛恨之雖已贈官推恩猶未足以稱朕悔過之意可更贈官賜田雖然死者不可復生追痛無已中書舍人王居正草制曰嗚呼古之人願為良臣不願為忠臣以謂良臣身荷美名君都顯號忠臣已嬰禍誅君䧟昏惡嗚呼惟爾東爾澈其始将有意於忠臣乎繇朕不徳使爾不幸而不為良臣也雖然爾藉不幸不失為忠臣顧天下後世獨謂朕何此朕所以八年于茲一食三嘆而不能自已也通階美職豈足為恩以塞予哀以彰予過使天下後世考古之君飾非拒諫之主殆不如是魂而有知享朕兹意拱衛大夫明州觀察使提舉江州太平觀辛彦宗充浙西江東宣撫司幹辦公事用張俊奏也癸卯武功郎王權為武略大夫貴州刺史武徳郎許世安為武義大夫閤門宣賛舍人録承楚之功也二人皆淮東宣撫司正将初命進秩二等世忠再乞推恩乃有是命詔犒設隨駕諸軍一次時堂吏以下亦援泛海舊例各支犒設錢有至數十千者及侍御史魏矼自江上還奏言自臨安至平江四日耳乗舟順流有何勞苦雖曰激賞庫支其實户部係省錢也乃命除三省機速房三省户房外皆剋還焉矼奏請在十一月壬子淮東宣撫使韓世忠奏凖金部員外郎張成憲公文支給本軍大禮賞本司未敢幇請乞依張俊下官兵體例支給許之舊例俊與楊沂中内二軍賞給人三十千世忠與劉光世王􅊅岳飛外四軍人給二千有竒而已至是俊出為宣撫使故世忠援以為言初朝廷命成憲應副世忠軍錢糧成憲言職事别無相干乞用公牒往来奏可自是總領錢糧官率用此例日歴此月二十八日癸夘復置宗正丞等指揮非本年事蓋重疊差誤甲辰金右副元帥完顔昌召通問使魏良臣王繪相見旁有四人皆衣紗袍頭巾毬靴與良臣等同席地而坐昌問勞久之諭云俟三二日左元帥来議事畢畫定事節遣汝等歸良臣退接伴官李聿興問沈元用在否蓋聿興晦同年進士故也聿興又言今年本朝試進士張炳文侍郎出天下不可以馬上治賦丞相問何意張云事見前漢陸賈傳丞相命以番書譯賈傳而讀之大喜遂進張兩官繪以乆未得歸乃為書獻昌大略言頃䝉丞相都元帥惠書許以立國爾後江南三遣使未獲成命聿興不肯受聿興又言其國制度並依唐室因及蔡靖宇文虛中事乆之王繪紹興甲寅奉使録云聿興言自古享國之盛無如唐室本朝目今制度並依唐制衣服官制之類皆是宇文相公共蔡大學并本朝數十人相與評議繪問蔡大學見任荅云見任乾文閣待制他兒子蔡松年見在三太子處作令史近来本朝又在於燕山府用一萬貫錢買一所宅子蔡大學云尤勝如他汴京宅子又曰丞相得宇文相公真是歡喜甞説道得汴京時歡善猶不如得相公時歡喜如今直是通家往来時復支賜宅庫裏都滿也於是右副元帥昌在泗州右都監宗弼在天長左副元帥宗輔尚未至也乙巳淮西安撫使仇悆遣兵擊金人于壽春府敗之初親征詔未至廬州衆譁言棄淮保江悆得㫖急録以示人人皆思奮且遣其子津間道告急上命為右迪功郎會敵進據壽春安豐悆遣兵出竒直抵城下與守将孫暉合兵擊之敵戰敗却走渡淮官軍入城翌日遂復安豐縣仇津補官在十一月七日壬子計其離廬州則在未復壽春已前故附於此建炎以來繫年要録巻八十一金人地名考證聶哷貝勒原書作聶兒孛堇巻一百三十五又作聶黎孛堇係一人並誤今改正托卜嘉原書作撻也本巻後又作撻孛耶闥孛也並誤改見巻五烏珠原書作兀术誤改見巻一吉嚕原書作掲禄誤今改正
