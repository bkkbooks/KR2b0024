body:
  text: 建炎以來繫年要録巻一百四十六宋李心傳撰紹興十有二年秋七月案建月壬辰朔癸巳右諫議大夫羅汝檝言左奉議郎簽書威武軍節度判官㕔公事胡銓文過飾非益唱狂妄之說横議紛紛流布遐邇若不懲艾殆有甚焉者矣伏望陛下重行竄逐以伸邦憲詔銓除名新州編管徽猷閣待制提舉江州太平觀李璆知瀘州璆廢斥近二十年至是復起也甲午皇太后回鑾自東平登舟由清河至楚州境上丙申榮州防禦使提舉醴泉觀駙馬都尉高世榮為常徳軍承宣使直秘閣四川轉運副使井度兼州陜宣撫司參議官令再任協忠大夫郢州防禦使秦鳳路馬步軍副總管行管右䕶軍左部同統制知鳳翔府兼管内安撫司公事統制忠義軍馬楊從儀改知鳳州時將割和尚原故有是命丁酉祔懿節皇后神主于别廟前四日上詣几筵殿行燒香之禮遂埋重于城外東北之長明寺立虞主翌日文武百寮詣寺迎虞主至榮州防禦使邢孝揚第其虞祭皆有司設之權用檐子代壓翟車以儀仗未修故也至是命左監門衛大將軍貴州刺史士眵行卒哭之祭于几筵殿禮畢祔神主于别廟用衛兵九百八十二人尚書左僕射秦檜為禮儀使給事中直學士院程克俊題神主虞主不瘞即冊寳殿藏之己亥武翼郎閤門宣贊舍人呉近為右武郎承節郎閤門祇候張說承信郎閤門祇候呉蓋並為武翼郎閤門宣贊舍人武節大夫榮州團練使韓誠為武徳大夫忠州防禦使以貴妃進封故也其餘親屬推恩者又十七人說公裕子與誠皆娶妃女弟故遷之誠嘉彦子已見壬寅詔攢宫地段令臨安府召人陳獻將來優與酬賞癸卯上謂宰執曰呉璘說川陜可招衛兵今璘尚留此可諭鄭剛中令處置仍更呼璘與議璘又言胡世將嘗招得數千人近縁歳饑皆餓死今必有流民願就招者起居舍人兼修玉牒官楊愿等言準御寳令漏泄玉牒宗支依軍法乞降黄榜約束施行從之遂命宰臣秦檜兼提舉編修玉牒所秦檜兼提舉日厯不載本所題名在此月且權附此俟攷寳文閣學士提舉江州太平觀連南夫特落職南夫之守廣州也右宣敎郎杜嵓以朝命送本州居住及復疆赦下嵓乞自便南夫請于朝不俟報遽釋之及是金人索充子孫之在南者樞密院以金字牌命帥臣陳槖密切拘管槖以其事奏故有是命甲辰按行使万俟卨等請卜攢宫于昭慈聖獻皇后攢宫之西北丁未命資政殿學士提舉醴泉觀鄭億年充復按使武功大夫榮州刺史内侍省押班李珪副之戊申詔忠訓郎呉援令川陜宣撫司召試䇿一道保明取㫖與換文資援璘子也璘以初除團練承宣使恩例為之請上許之起居郎權中書舍人張廣持不可上覽奏謂大臣曰武臣換文資恐將帥之才後難得矣樞密使張俊曰試而後換可也上大以為然己酉命有司制常行儀仗自上南廵儀物草創時以皇太后且至上將躬迎於郊諸王宫大小學教授石延慶以儀衛未講為請乃命工部尚書莫將户部侍郎張澄與内侍邵諤董治將等乞先造玉輅及黄麾仗二千二百六十五人從之熊克小厯十一年十一月户部侍郎張澄遷本部尚書蓋據題名之誤也澄遷户部在今年十一月癸巳是日上諭大臣曰呉璘功賞事早與了使之歸秦檜曰已與張俊議呼璘到堂面定庶幾允當上可之且曰賞須令適中今日邊面正賴將士恊力守之賞須當乃慰其意且免姦人動搖軍情也癸丑上謂宰執曰郡守條上五事其間頗有可採又有欲衝見行法曰宜詳之可行即行秦檜曰如莊綽所上有可行者何鑄曰守臣中有志于民者所論定不茍上曰然乙卯詔廣南湖北沿邊偏遠州合納免行錢令提刑司相度量與蠲減時議者謂州縣官職田可行拘收民間免行錢可與寢罷事下户工部而工部尚書莫將户部侍郎張澄等言諸路職田一年凡八萬四千餘石未足以助經費而于國家制禄養亷之意實有所傷免行錢即無毫髮加賦于鄉村百姓亦非創行事件除江浙福建湖南四川路並已認定合發數外切慮二廣湖北僻遠沿邊州軍内有難以出辦去處欲量行蠲減時徽猷閣待制知靜江府胡舜陟亦言嶺南井邑蕭條賈無厚利比他路丐減十五故有是命胡舜陟奏請以秦資所作生詞詩碑附入日厯無之戊午左朝請大夫新潼川路提㸃刑獄公事宇文剛言湖外米賤乞行收糴上諭大臣曰水旱堯湯所不能免惟有以備之則民免流亡之患其即行之己未詔呉王益王府各差館職二員兼教授左中大夫右文殿修撰陳遠猷落致仕乆之以遠猷提舉亳州明道宫此恐呉璘所薦當攷八月辛酉朔金國都元帥宗弼以書來求商州及和尚方山原地紹興講和録金元帥上第七書皇統二年八月一日皇叔太傅尚書左丞相兼侍中監修國史都元帥領行臺尚書省事致書云云近者疊沐惠音備悉勤意即日秋凉想惟候履安和承諭遣報謝人使已聞朝廷并唐鄧二州界至亦再遣官交割去訖外昨來訃議分畫陜西地界緣時間未能盡知彼處地界遠近曽言候大事議定各差官子細檢視臨時從宜施行回辱示報凡事已遵來命差官前去仍約定至彼期限遂差行臺刑部尚書烏凌阿思謨等同往交割仍丁寧戒諭據陜西諸路疆土並合交收緣照得鳯城階祐四川于彼切近若行盡取或有不便其四州之地更不交割如兩界地形犬牙相侵各有合要去處仰從宜相度施行續據本官等申至彼相度得大散闗合屬本朝于闗外立為界除將上仲四州與江南外應陜西之地並行交割便欲立定界至却得鄭剛中等公文稱來時只指揮相視啇量難便一面分付已具申禀别行移報又據烏凌阿思謨申三月内鄭剛中公文坐奉指揮照呉玠劉豫所管地界分畫内啇州秦州不是呉玠元管地分合自逐州以南呉玠元管界至分畫其餘和尚原方山原兩處不係劉豫所管地分合遵依元降指揮保守為此于何鑄等曰時已令達意今于大散關西正南立為界首兼承今書已前據烏凌阿思謨申鄭剛中申五月中公文稱和尚原方山原方堂堡秦州等已承指揮許交割乞差官前來分畫外商州已具申審其間却説以龍門闗為界至今承來書與鄭剛中狀内所報亦又不同所云縱有少侵劉豫曽占舊界止是欲與川路留少藩籬以安彼中人心契勘彼間地界已曽布聞何煩再三别有改議若謂欲為藩籬以安人心乃是無故輒有疑惑豈元約也切冀早為指揮所司交割施行所有商州一處來書並不言及不謂遷延到今尚未了當亦請依元約催促施行又近據沿邊官司申有舊係淮北人民在南方者思鄉前來緣恐其人在南地别有罪犯逃避過淮難以不行勘會便行一例收受曽經指揮仰問當來厯因依移文對境州軍子細勘會却據逐處稱别無奉到指揮不肯收接文字深詳此事已經計議並誓表明言淮北之人有願歸鄉者更不禁約蓋兩國和好務在安濟生靈告以此意遍行開諭使上下曉然則有司奉行自無疑難豈有不接文字之理即日到此之人雖是淮北鄉貫合得歸業緣彼處不曽明有指揮遂使逃竄于理不應請為指揮有司明出榜曉諭應淮北人數原歸鄉者許其自陳仍今後沿邊取會文字使合屬官司依應收接契勘囘報以稱通和之義及來書内有北人畏罪之說欲得朝廷赦罪文字使之釋然無疑據前此雖曽發到北人只是數十人小民其餘并昨有劄録姓名之人都未見發遣檢準今年二月二十四日赦書自來亡命投在江南人等見行理索節次發遣來到並行釋罪其職官百姓軍人等並許復舊已有上件寛貸明文今將赦書内一項全備抄録前去請以此曉諭應在彼北人遍令省會早與發遣自可安心來歸尚何疑哉所附到鄭億年申狀尋具奏聞准奉聖㫖為已經放還只令在彼居住外有杜充家口雖曽離散其原任州縣官司并從來一行親屬人等豈應全不知得次第去處今國家大議既定欲人人咸獲安便理合使其骨肉圍聚張中孚兄弟張孝純宇文虚中王進等家屬諸處津遣今又數月計合皆到亦幸催趂一就早令到來惟留意貺示新茶良極愧荷餘冀順時倍加保嗇專奉書復聞不宣于是川陜宣撫副使鄭剛中亦言和尚原自紹興四年後便係劉豫管守不係呉玠地分合割還大金從之此據費士戣蜀口用兵録増去蓋士戣據宣撫司按牘也熊克小厯云剛中上奏曰商秦二州并和尚原皆陜蜀要害不可許與此全不同疑剛中行狀飾説今不取癸亥詔普安郡王納婦令主管所訪求選擇取㫖乙丑靖州言盜破豐山寨軍民死者甚衆上曰蠻夷但當綏撫不可擾之乃詔湖北帥臣劉錡毋得生事丙寅皇太后渡淮王明清揮麈後録云紹興壬戍夏顯仁皇后自金中南歸詔遣參知政事王慶曾次翁與后弟韋淵迓于境上時金主亦遣其近臣與内侍凡五輩䕶后行既次燕山金人憚于暑行后察其意虞有他變稱疾請于金少頃秋凉進發金許之因稱貸于金之副使得黄金三百星且約至對境倍息以選后既得金營辦佛事之餘盡以犒從者悉皆懽然途中無間言由此力也既將抵境上使必欲先得所負然後以后歸我后遣人喻㫖于韋淵淵辭曰朝廷遣大臣在焉可遂索之遂詢于王初王之行也事之纎憑悉受頤指于秦丞相獨此偶出不料使人趣金甚急王雖所賷甚厚然心懼秦疑其私相結納歸欲攘其位必貽秦怒堅執不肯儐相待界上者凡三日九重初不知曲折但與先報后渡淮之日既愆期張俊為樞密使請備邊憂慮百出人情洶洶謂金已背盟中變矣秦適以疾在告朝廷為備邊計中外大恐時王㬇以江東轉運副使為奉迎提舉一行事務從王知事急力為王言之不從㬇乃自裒其隨行所有僅及其數以與之金人喜后即日南渡疑懼釋然而王不預也王歸白秦以為所以然者以未始棄命故不敢專秦以王為畏已果大喜已而后泣訴于上王某大臣不顧國家利害如此萬一金人生他計于數日間則使我子母不相見矣上震怒欲暴其罪而誅之初樓炤仲輝自樞府以母憂去位終制起帥浙東儲之欲命謝于金廷至是秦為王營救囘䕶謂宜遣柄臣往謝之于是輟仲輝之行以為報謝使以避上怒逮歸上怒稍霽然終惡之秦喻使辭位遂以職名奉祠已而引之安居于四明秦終憐之餽問不絶秦之擅國凡居政府者莫不以微過忤其指例以罪行獨王以此情好不替王卒特為開陳贈䘏加厚諸子與壻親戚族人添差浙東者又數人以便其私議者謂秦居政府二十年間終始不二者獨見王一人而已此書他事皆無之今姑附此觀此月戊辰上問秦檜之語及次翁劾奏馮宜民事足明當時亦有是說也時上遣后弟平樂郡王韋淵徃迓遂扈從以歸端明殿學士簽書樞密院事何鑄依舊職提舉江州太平觀時御史中丞万俟卨右諫議大夫羅汝檝交章論鑄之罪謂鑄胥吏之子素無聞望初以廖剛薦為臺屬與孫近范同締交逮近同之敗自是跡不遑安乃蓋令黨與傾搖國是去春淮甸警報日與儇薄之徒張皇敵勢以為朝廷自當遷避岳飛反狀敗露鑄首董其獄亦無一言叙陳偶因報聘乏人陛下寘之樞庭命之出疆臨行反視親舊騰播以謂議獄不合遂致遠行廣坐語人以脫此自幸飛之負國天下所同嫉者鑄長御史乃黨惡如此罪將安逃章五上鑄亦累章求去乃有是命秘書省校書郎兼權禮部郎官程敦厚言方今最可憂者士大夫莫肯任患而盜名蓋艱難之世事之作也或將曲而當言之出也或將婉而成有經有權抑揚旋斡以乘其機而制其變君子于此時自當損身殉國而不辭天下之責奈何往往士大夫謀已以奸利者始也不量可否陽為夸論而務在盜名終也不計安危隂輒嫁怨而莫肯任患陛下亦既備嘗知之矣今茍不大有以矯正之使精白一意則臣之所憂有不勝言願陛下申飭羣工益固邦本以惠海内詔榜朝堂此事即是敦厚六月丙寅上殿所奏今方行出耳八月丁卯上與宰執論經術因曰朕每讀書未嘗茍必思聖人所以立言之意秦檜曰孟子云文王我師也周公豈欺我哉上曰聖人所自得者垂法後世又焉用欺秦檜曰陛下以通經得五帝三王心傳之妙人臣何幸自古不遇治世之主則為人臣誠有難處今陛下以經術出治人臣因以託日月之光傳諸不朽豈非幸會上曰讀書不適用則不若愚人猶無過讀書不適用為患更甚檜曰陛下持此心揆天下之事無不灼見底藴矣殿中侍御史胡汝明監察御史施鉅李益並與外任以言者論三人皆何鑄所薦密與交通唱為不靖也戊辰上問宰執曰界首猶未得皇太后的報秦檜曰據王次翁奏九日可到界首以理揆之此事必不爽約前蕭毅行陛下明與約言若太后果還自當謹守誓約如今歳未也則誓文為虗設此最切當上曰亦以此事卜和議諧否若還我太后大金亦守和議也端明殿學士何鑄落職奉祠左朝奉郎胡汝明知饒州施鉅知處州左承議郎李益知建州右朝散大夫宇文師瑗直顯謨閣右奉議郎張汲直秘閣並主管萬壽觀以將北行也右宣義郎福建路提㸃刑獄司斡辦公事趙恬特勒停先是宇文虛中因王倫使還附奏若敵人來取家屬願以没賊為言已見七年十二月至是都元帥宗弼來索虚中家甚急上遣内侍許公彦往閩中迎之恬虚中子壻也與其徒謀欲留師瑗一子為嗣守臣顯謨閣直學士程邁持不可師瑗乃使恬以海舟夜載其屬之温陵而身赴行在邁懼遣通判州事二人入海邀之言于朝故有是命汲先得衢州通判旋罷之至是復去已而師瑗至行在上疏懇留秦檜不許虛中妻安定郡夫人黎氏請以所賜田易錢以行乃賜黄金百兩焉據程邁奏師瑗家屬以七月二十七日辰時下海今併附此黎氏乞以田易金在九月丁巳庚午責授嚮徳軍節度副使王庶卒于道州許歸葬其子之荀之竒撫柩而哭曰秦檜秦檜此讐必報親舊皆掩其口曰禍未已也辛未權工部尚書莫將與侍從兩省官十一人以皇太后回鑾同班賀上詔吏部侍郎魏良臣就充館伴使秘書省校書郎兼權禮部郎官程敦厚為尚書禮部員外郎制曰攝宗伯之僚議常據古賜清閑之燕言切于時太常丞呉棫罷以言者論其與孟忠厚偕行而專執一偏之私附會姦人之論以虧損中興孝治之美故也王明清揮麈第三録云呉棫浮沉州縣晚始得太常丞紹興間尚需次也娶孟氏仁仲之妹貧往依焉仁仲自建康易帥浙東言者論上表中含譏刺詔令分析仁仲辨疏以為乆棄筆硯實託人代作孟雖放罪尋亦引閑秦會之令物色知假手于才老臺評遂上罷其新任繇是廢斥以終案孟忠厚以十四年春自江東移會稽明清小誤也秘書省校書郎陳之淵正字王璧並與外任放謝辭以言者論其本孫近所薦又附范同何鑄益肆其姦唱為弗靖也乃以之淵通判饒州璧通判福州壬申命權工部尚書莫將知閤門事曹勛接伴大金第二畨人使尚書吏部員外郎江少齊送吏部與監當差遣右諫議大夫羅汝檝奏太后還闕有期普天同慶而少齊方悒然不樂每謂金銀價置増長居民日以遷移天官顯曹異意之人豈宜叨據望行罷斥以靖國論故有是㫖拱衛大夫果州團練使知陜州呉琦為利州路兵馬鈐轄知興州兼行營右䕶軍選鋒統制癸酉鎮四軍節度使右䕶軍都統制呉璘與觀察使已上五人同班賀上後二日雄州防禦使士䅳等十人繼對皆以皇太后將回鑾故也監察御史江邈遷殿中侍御史甲戌御史中丞兼侍讀万俟卨為參知政事充大金報謝使上顧卨曰勉為朕行卨頓首謝上諭大臣曰和議既定内治可興秦檜對曰以陛下聖徳漢文帝之治不難致上曰朕素有此志但寡昧不敢望前王檜曰漢文帝文不勝質唐太宗質不勝文陛下兼有之上曰唐太宗不敢望漢文帝其從諫多出矯偽檜曰文帝能容申屠嘉而太宗終恨魏徴其為眞偽可見上曰朕謂專以至誠為上太宗英明有餘誠有未至也檜曰太宗之用智誠不及文帝之性仁也上曰然中興聖政臣留正等曰唐太宗即位不數年天下氣象一變兵力强而外國畏服人材盛而政事修舉此漢文帝所不及者然人主盛徳如天地覆載日月照臨不知所以為功文帝於此亦庶幾焉以其心術至誠故也太宗自謂三王以來撥亂之主莫吾若故負而矜之不及文帝遠矣乙亥榮州防禦使帯御器械邢孝揚充大金報謝副使翌日遷孝揚保信軍承宣使官孝揚及万俟卨家各二人上念洪皓之忠命孝揚持金帛以賜卨至汴京其從吏有為人持書訪其子者迓使以為言卨曰兩朝以玉帛相見而後敢以私書入境然父子之情不過問安否耳發而視之如卨言次涿州又以南宫毆擔夫告者曰一行裝齎悉以車載不復調夫矣卨遜謝之乃止丙子上諭大臣曰聞大金内侍有用事者今内侍中寄資有犯雖降官然俸物不減何以勸懲今小者有犯可恕即恕不可恕即撻之庶使知懼且云唐末内侍如田令孜輩羣唱為亂者良由天子縱之所致朕今在宫中都知押班御藥素號最親密者非時未嘗見見未嘗不正色己卯上謂大臣曰比聞大金中宫頗恣權不歸其主今所須者無非真珠靸靸之類此朕所不顧而彼皆欲之則侈靡之意可見矣宜令有司悉與以廣其欲彼侈心一開則吾事濟矣時金人又須白面猢猻及鸚鵡孔雀獅子猫兒上亦令搜訪與之上曰敵使萬里遠來所須如此朕何憂哉上又曰聞大金皇后擅政三省惟承后㫖其主所言顧未必聴且后性侈靡至以眞珠裝被追集繡婦至數千人后日更繡衣一襲直數百緡其風如此豈能乆邪自古權歸宫壼未有不亡者也辛巳上奉迎皇太后于臨平鎮初后既渡淮上命秦魯國大長公主呉國長公主逆于道至是自至臨平奉迎用黄麾半仗二千四百八十三人普安郡王從上初見太后喜極而泣軍衛懽呼聲振天地時宰相秦檜樞密使張俊太傅醴泉觀使韓世忠及侍從兩省三衙管軍從上行皆班幄外太后自北方聞世忠名特召至簾前曰此為韓相公邪慰問良乆其後餉賜無虛月武經郎馮宜民除名械送英州編管宜民為王次翁扈從禮儀使司準備差使次翁奏宜民在路妄造言語動搖人心今皇太后已渡江縁闗報北使再來宜民復肆妄説若不懲戒浮言不止故竄之此恐與王明清記皇太后渡淮愆期事相關壬午皇太后還慈寕宫太后聰明有遠慮上因夜侍慈寧語乆冀以順太后意太后令上早卧且曰聴朝宜早起不然恐妨萬幾上不欲遽離左右太后遂示以倦意上不得已恭揖而退太后復坐凝然不語雖解衣登榻交足而坐三四鼓而後就枕嘗謂上給使者不必分宜通用之蓋分則自為彼我其間佞人希㫖必肆閒言自古兩宫失懽未有不由此者後數日上以諭大臣且曰太后既歸宫中事一切不復顧矣詔扈從太后官屬左武大夫忠州防禦使白諤等十二人皆遷官中興聖政龜鑑曰太后之未歸也則諭以至誠太后之將歸也則示以喜色臨平奉迎瞻慈容而感泣慈寧居養侍乙夜而忘疲壽慶啟燕稱觴舉儀雍雍乎其和也意有所向竭力供應肅肅乎其敬也當時父老童稚且嘆曰不圖今日聖神母子重懽如此是其孝於事親也癸未百官詣常御殿門拜表稱賀張宇表曰臣宇言恭審皇太后回鑾已至行闕者五兵不用靜北徼之驚塵六騩遄歸嚴東朝之大養慶流宫壼懽浹海隅中賀歴觀簡冊之所傳或遇國家之大變冀一眞于百罔訖正元之世無聞歌二聖之重歡初蜀郡之行匪遠矧隔要荒幾萬里絶音驛踰十年為母子以如初越古今而未有恭以皇太后道隆隂化徳協坤成奉警戒于先朝盡劬勞于聖子從翠華而遠狩軫丹扆之深衷寢門莫展于晨昏使驛相望于道路無加于孝貴不足以解憂茍順乎親大可以刑四海原本脱一句修文徳以來遠人迎翟輅以言還戢琱戈而不戰祥生和氣福簡簡而穰穰喜動慈顔樂融融而洩洩舊陪帷幄遠伏山林以未盡之餘年覩絶聞之盛事心存魏闕式同四表之歡目斷堯天徒上萬年之祝毗陵張守劄子曰臣恭聞皇太后回鑾有期中外大慶仰惟聖孝感通神明敵國歸仁上天悔旤有此慶事夐絶古今行正東朝永展大養臣以抱疴畎畆莫獲瞻望天顔少伸贊喜之私無任歡呼忭躍之至謹録奏聞謹奏秀水朱勝非進賀上劄子曰比者恭承皇太后歸御東朝慶自一人歡騰寰海此實聖上孝徳通于神明天心昭答亦惟碩輔嘗總繁機謀國既深告猷有素致收成效逈絶前聞某叨被明恩屬當重任方時多故不敢自謀仰賴沈幾悉排浮議成茲偉績盡出睿謨克圖宗社之安肇自宫闈之慶非聖神孰能與此顧臣子何力有焉豈圖鈞慈特枉珍翰述邦家之盛事誠賢哲之用心褒借過優省循莫稱仰荷謙徳不勝感悚之至詔皇太后姪韋彦章與補忠翊郎閤門祇候丙戌詔以皇太后還宫遣執政官奏告天地左宣義郎劉安常追毁所授文書特編管安常羅源人冐其兄守禦免解恩中第後以捕盜改官至是為右廸功郎楊傑所告鞫實而有是命戊子上服黄袍乘輦詣臨平奉迎梓宫登舟易緦服百官皆如之己丑徽宗皇帝顯肅皇后及懿節皇后梓宫皆至行在寓于龍徳别宫以故待漏院為之在行宫南門外之東帝后異殿始議奉安梓宫之禮或請姑寓僧坊太常少卿王賞曰孝子之事親思其居處宣和内禪退居龍徳今宜綿蕝倣行殿以治喪儀又議百官制服賞曰訃告始至已成服矣復服之非是特上與執事者常服改葬緦而已朝廷用之時梓宫既入境即承之以槨命有司預製袞冕翬衣以往及是納槨中不改歛用安陵故事也百官服緦指揮在四月丁亥遷梓宫大槨指揮在六月丁丑用安陵故事指揮在七月丙申今聫書之史臣秦熺等曰案此係秦熺史論持議偏謬疑為後人攙入今姑存之上孝悌絶人前古帝王所不能及以二聖母后之在遠也憂思感傷戚戚無一日舒容舉足出言宸念未嘗少忘衣不重帛食不二味居處惟茅茨之陋自奉悉簡素有㫖有能還二聖母后者王侯節鉞盡以充賞問安之使奔走道路殆無虛月終莫得金人要約建炎四年冬十月御史中丞秦檜歸自金蓋扈從北狩者累年朝夕侍二聖旁方靖康之變金人立張邦昌咸北面以事異姓檜獨冐白刃不從抗辭乞存趙氏臨大節而不奪金人敬奉之故知彼之事宜為詳因曲折為上言之且念兵威未振知和好之未可通也既擢檜與政未幾為右相方圖維事機以濟大業時左相吕頤浩嫉之力加沮抑檜既去位悠悠積歳用事者趣辦目前無有任其責者紹興三年冬十月金遣李永壽來徒多端須求矯詐無誠意春正月遣張誼等往北返事亦弗濟七年春正月何蘚自金中來報太上皇帝之訃上哀慟號哭遣王倫迎奉梓宫不遂而歸八年春正月復往亦弗從上哀毁過制居三年喪如一日每出薦奠號哭失聲涕泗揮灑凡侍奉贊導之臣皆弗能禁止聖孝之美未易殫舉上悼國步之多艱治功之未効且厭凡才不足倚也求助益切三月辛卯復拜檜右相乆益知檜忠誠而謀謨可大有為也故議和之計決矣而左相趙鼎抑沮甚力因修史加恩制密諭直學士院吕本中為制詞曰謂合晉楚之成不如尊王而賤伯蓋豫為後日姦圖鼎為首相不復留意國事用兵則徒擅都督之名略無措畫及議和則隂懷首鼠于進對之際未嘗有可否隂結黨與肆為詆欺其負眷意如此迨秋遣通和之使而王倫等遂行後自金中還將及境矣和議之成否未能知鼎知不復任責亟為脱身自全之計力求解政又令其死黨張戒乞復留鼎設為詭辭誑惑天聴沮敗善類賴上睿明不得肆其姦是年冬十二月達賫遣張通古至欲先盡還河南故地徐議餘事金誠意若是蓋前此未有也自使者入境以及行朝士大夫議論洶洶皆以為不可信樞密院編修官胡銓上書力詆大臣冀必置之死地執政如王庶侍從如曽開李彌遜臺官方廷實館職范如圭等尤唱異論蠱惑羣聴其他不能徧舉蓋懷姦飾詐者但欲取一時市井虛名而利害不切于身初無體國親上之意故趨向如此既而輿地果復亟遣官省治陵寢撫循民庶且經畫數路急切之政故䧟身異域者有更生之幸亹亹來歸亟命韓肖胄報謝繼令王倫藍公佐迎梓宫及奉大母之歸既而金之次帥烏珠恚功之不由己出遂渝前日之盟拘留王倫但令藍公佐歸因引兵犯汴都而留守孟庾等率衆投降先是命劉錡以兵北戍以備不虞偶與敵遇于順昌錡于諸將中素號有謀與戰至十數捷音相繼以聞敵敗衂而退朝廷度必再入犯于是大修兵備十一年果竭衆以犯淮西必欲以全取勝時遣三大將領兵進擊而岳飛隂有異謀遷延顧望拒命不進韓世忠張俊皆屢與之戰殺獲不勝計敵知我不易攻也率衆退走既班師主上聖明察見兵柄之分無所統一凡有號召多託故不至于出師之際又不能協力徇國家恐有緩急必致誤國大事乃密與檜謀削尾大之勢以革積歳倒持之患一日大廷宣制除張俊韓世忠岳飛三帥為樞密使副由是天下兵柄盡歸朝廷矣然是舉也孰不以為善前此獨無敢聛睨者有識之士方懼金人之平四方厎定而此輩跋扈自肆意外事有叵測者今一旦悉屏聴命如玩嬰兒于掌股之上銷禍于未然既已協諸軍之公願謂自此願盡死力遠近歡呼切歎睿斷英果措意𢎞遠知敵不足憂而太平可指日待也上既日新厥徳内修政事專任一徳之臣以為腹心益練甲兵治財賦悉豫為之圖敵勢數不利又知我之有備設施措畫赫然驚人規模出其意表而戰勝攻取兵威勝强非前日比且虞後悔之及遂縱莫將韓恕以歸二人者使敵中被留閲歳且半無故聴歸其意蓋必有在冬十一月果遣蕭毅邢具瞻為審議使副必欲連和時衆議紛紛莫以為然謂當墮其計中矣上以宗廟社稷之重下愛惜生靈且念梓宫未還母后兄弟乆隔亦灼見敵情保其無他奮然獨斷檜力贊上以為圖謀和議今踰十年矣前此烏珠爭功故敗成事今兹之來乃自為盟主敵善意也機會不可失無可疑者遂斥浮言排異議從其所約一意迎奉之圖既遣何鑄報謝逮至敵庭黙然無一言而返梓宫及母后之還亦弗知也鑄自御史中丞遷簽書樞密院事固宜與聞國論之餘而猶持異意且疑貳而亟圖歸則今日之舉非君相合徳深見事情曷克有濟初岳飛擁重兵據上流者累年稔成罪釁日圖反叛至是皆暴章首告繼踵逮核實于天獄悉得其情逆狀顯著審讞無異飛與子雲及其黨張憲皆賜死于是天討有罪故桀傲者懍懍知畏咸奔走承命之不暇而政刑修明國勢益尊强矣臣等竊惟金人為中國患今十八年矣唯修好通和實今日至計前後用事之臣費日窮年未有以為意者淵衷監觀利害既審任兹大事實難其人爰出獨斷復命檜而相之其大節孤忠竒謀遠識蓋察之有素矣檜亦感不世之遇自任天下之重精白以承休徳不退縮以避事不猜忌以妬功不疑貳以敗謀不矯激以沽譽其圖事揆䇿料敵制勝咸仰契聖心用能夙夜自竭以符特達委任之意敵亦知所畏服無復敢肆有請必從不愆于素故上以安宗廟下以保黎庶送往事居又足以副天子寧親之孝一舉而衆美具焉無不悉如其意成效章章若此向之拱手以幸失騰口以興訕者皆歎服聖謨之不暇赧然羞汗悔前非之無及矣然是舉也危疑險阻蓋備嘗之非獨檜翊贊之難任檜之為難也書曰惟尹躬暨湯咸有一徳克享天心受天明命以有九有之師又曰徳惟一動罔不吉故臣等于今日之事亦云吕中大事記曰紹興十年金人渝盟軍民皆歸咎于秦檜而檜傲然不動順昌既捷之後先竄趙鼎而人無敢言矣柘臯既捷之後盡罷諸將而兵隸御前矣向者戰敗而求和今則戰勝而求和矣向者戰敗而棄地今則戰勝而棄地矣向者使命之費猶有限今歳幣銀帛各三十五萬匹兩而賀禮又有金器千兩銀器萬兩錦綺千匹矣岳飛復唐鄧張俊呉璘復商秦呉玠復方山和尚原皆間闗百戰而後得今吾不能有其地反盡割入于敵聴其分畫矣世忠田金陵岳飛田鄂王之竒田兩淮呉玠田梁洋樊賔宗綱田荆州皆累年經理而後成今吾不能屯田反使敵創屯田軍于河南矣吾國之民不肯入敵殺之猶不從而朝廷必以與敵使遺黎飲泣内恨而中原之人心失矣李世輔不顧其親來歸烏珠引避其忠今乃置之謫籍而中原豪傑之心失矣士大夫䧟没敵中家屬有在中國者徇敵人之情而悉還之方其去時如赴井阱而吾國衣冠之氣沮矣張俊深忌劉錡岳飛每言飛赴援遲而錡戰不力遂與檜謀斥錡而殺飛而天下忠憤之氣皆沮矣生何俌龜鑑曰我髙宗皇帝所以徇奉春之拙謀壞祖之壯志蓋仁孝之心有所感觸而不能不爾也故寧忍嫚書之恥而不忍廢務在養民之事寧割鴻溝之半而毋寧輟未央稱壽之儀敬觀聖訓有曰朕兼愛南北之民屈于講和非怯于用兵也若敵國交惡天下受弊朕實念之知此則可以知吾君之仁又曰北望庭闈踰十五年幾于無淚可揮無腸可斷所以頻遣使指屈已奉幣者皆以此也知此則可以知吾君之孝是月朝廷答金國都元帥宗弼書許以陜西地界紹興講和録皇朝答書仲秋漸凉伏惟某官鈞候萬福還歸備言國公恩徳不敢弭忘專人來又承書翰豈勝感荷所諭陜西地界大約已定鳳成階祐四州已荷恩照前日所納地圖乃是恃頼情契不敢自外今䝉諄諭何敢固必已令鄭剛中遵依五月中已報公文内備坐已降指揮分畫去訖其商州亦當属上國並令鄭剛中等差官交割今當不住催趣也前日圖内止是告求川口關隘去處故不言及商州亦乞賜察淮北人民願歸鄉者更不禁約據誓表中明言經官陳理今當遵依來訓許其自陳至若文字往來告請指揮止令就泗州及鄧州闗報庶得沿邊官司專一承領不致差失從來邊州多是用此體例望詳度也北人及張中孚兄弟張孝純宇文虛中王進家屬見行津遣所有稽遲皆有因由只如虛中家屬往就趙恬遲留見已重作行遣勒停趙恬又專遣内侍許公彦前往迎押師瑗到上國日可以質問也杜充家口尚在廣州實緣當時帥臣連南夫縱其自便近還行遣南夫落職名又督責見今帥臣陳槖于當時經由州軍已行根刷猶未見得著落只是尋見便當馳報鄭億年過䝉恩念特為取降聖㫖已令遵守其他俟報謝使副早晚啟行别得上狀時中伏乞善保鈞重謹奉啟不宣川陜宣撫副使鄭剛中遣選鋒軍統制兼知鳯州楊從儀鄜延經畧使兼知成州王彦閤門祇候宣撫司幹辦公事范寧之偕割陜西餘地金人遣朝奉郎直秘閣知彰化軍節度使事賀景仁來分畫乃割商秦之半存上津豐陽天水三邑及隴西成紀餘地棄和尚方山原以大散闗為界于闗内得興趙原為控扼之所先是左武大夫榮州防禦使邵隆在商州幾十年披荆棘立官府􅀈徠離散各得其心自金人敗盟之後屢與敵戰雖嘗暫棄其城俄即收復終不肯去至是割界金人以隆為陜西節制司統制隆怏怏不已嘗密遣兵為盜以刼之秦檜怒乆之以隆知辰州自休兵後川陜宣撫司及右䕶軍分屯三邊與沿流十七郡興城階鳯文龍綿劒利閬西和州大安軍興元府及房州之竹山縣處按前後文此註應補入金洋潼川三興州呉璘所部僅五萬人興元楊政所部僅二萬人金州郭浩所部僅萬人惟興州屯兵最多至二萬有竒興元府利州魚闗各萬金州六千洋閬各五千皆有竒西和劒三千而贏鳯綿階三千而弱成州大安軍二千而贏潼川千有竒文龍二郡與房州之竹山皆數百馬之籍萬三千計興州境内為七千而弱闗外四州為三千而贏此其大槩也自諸將所屯外凡闗外沿邊待敵去處則三都統司每春秋二仲遣兵更戍成州界四千六百三十人照應秦州道路岷州界九百二十五人控㧪熙鞏秦州道路鳯州界三千八百五十人控扼鳯翔府一帶道路興元府界千二百六十二人洋州界千一百二十四人並照應岐雍一帶道路金州界一千六百人控扼商州永興軍一帶道路合興州界戍卒共萬四千人又置烽燧四路凡一百六十二烽早晩舉火傳報平安此其大畧也分屯更戌烽燧等事以四川宣制兩司事類修入必非一年事今因分畫地界附書之蓋必地界以定而後如此措置也九月庚寅朔上行奠酹梓宫之禮入内内侍省押班提㸃慈寧殿藍珪言奉皇太后聖后徽宗皇帝顯肅皇后懿節皇后下項忌日詔報禮部辛卯尚書左僕射秦檜乞罷政詔通進司勿受章奏臨安府毋得令家屬出門癸巳有司具送金國禮物常幣外有金器極精巧上謂宰執曰此上皇時所用朕不欲饗之交隣國以息兵養民朕之志也上又言徽宗顯肅之疾皇太后躬親扶侍及啟手足又與淵聖同辦後事懿節之葬也亦然今三梓宫之來皇太后與淵聖呼當時躬葬事之役者待其畢集然後啟􅓖其思慮深遠如此甲午秘閣修撰江南東路轉運副使王㬇陞集英殿修撰以奉迎東朝之勞也餘人皆進一官右奉議郎知劔州劉時為陜西轉運判官乙未少保鎭潼軍節度使信安郡王孟忠厚為樞密使時秦檜當為山陵使而不欲行故用忠厚徐夢莘北盟會編云秦檜欲去張俊樞密之任乃除孟忠厚樞密使非也端明殿學士樓炤陞資政殿學士知紹興府將遣使北也丙申樞密使孟忠厚為攢宫總䕶使户部侍郎張澄為橋道頓遞使保成軍節度使開府儀同三司領殿前都指揮使職事楊存忠為都䕶内侍衞茂實為鈐轄山陵非宰相䕶送自秦檜始忠厚乞攢宫有待報不及事一面奏知先次作聖㫖行下從之忠厚所奏以紹興三年九年十月己巳呉益申明狀修入日厯無之集英殿修撰江南東路轉運副使王㬇為兩浙路轉運使應副攢宫金國人使殿前左副都㸃檢完顔宗賢等朝辭詔參知政事万俟卨就馹伴宴寳文閣學士提舉江州太平觀綦崈禮卒于台州詔贈官推恩如故事崈禮為秦檜所憾所得遺澤其家畏懼不敢自陳士大夫亦無敢為之保任者焉戊戌梓宫殿攢詔奉慈寧宫錢二千萬緡帛二萬一千疋綿三千兩羊千有八十口酒三十六石月俸萬緡冬年寒食生辰各二萬緡生辰絹萬疋春冬端午各三千疋冬綿五千兩綾羅各千疋臨安日供斗酒三羊節序羊十八口共成此數辛丑尚書左僕射秦檜上所撰徽宗哀冊文上諭檜曰哀冊極佳蓋語皆紀實故也鄉昭慈挽辭衆人所作文雖可觀皆不及實朕當時所撰有俯隨遺誥日猶似御簾時要紀實耳直秘閣兩浙轉運副使黄敦書以迎䕶之勞陞職一等左朝散大夫淮東轉運判官紀交直秘閣樞密院言昨降㫖不得詆斥大金尚慮行移之間或有違誤理宜申飭詔中外官司常切遵守時金國都元帥宗弼又遣使來言邊吏以兵出塞朝廷亦遣書報之紹興講和録皇朝又書某啟秋凉伏惟某官鈞候萬福專使兩辱惠問感荷契愛垂諭上國講修和好開示大信含生䝉福遐邇同之此敝邑之幸也叙謝之誠言不能盡切聞元帥府自班師之後每常丁寧諸路帥守應守把兵官吏人等咸使仰體徳意謹守封疆不得生事如此處制則天下安六合之外四海之内孰不欽服又聞近日諸處申逹北界人馬無故侵掠及謀畫出入至于收納叛人强奪鞍馬又縱羣冦攻掠縣道殺傷官吏驅擄人畜焚毁舍屋及假裝飾以革冦為名公然犯界驚擾百姓逺煩開諭不勝駭愕雖是聴聞未及已䝉矜恕然邊吏妄作不遵約束甚不稱某畏天事大之誠意已備録所示付四川宣撫鄭剛中根刷南來人馬依數交割與對境州軍取收管公文仍令沿邊諸將不得令人過界刼掠收接投來人馬今出榜界上曉諭庶得彊場安靜人民樂業信義敦篤垂裕無窮少副來誨還歸知恩有自己就報謝使副賫書信布叙前書所諭陜西地界亦已别修報書向寒切兾倍保鈞重不宣壬寅大赦天下制詞曰上穹悔禍副生靈願治之心大國行仁遂子道事親之孝可謂非常之盛事敢忘莫報之深恩其詞給事中直學士院程克俊所草也癸卯右承務郎邢孝肅孝寛並直秘閣二人皆懿節皇后弟也禮部侍郎施坰乞川陜進士赴殿試得同出身之人與免銓試從之甲辰詔大金人使下三節人並許于宫門外上下馬乙巳少保尚書左僕射同中書門下平章事兼樞密使冀國公秦檜為太師封魏國公是日檜入朝至殿門外上遣幹辦御藥院江諮賜以玉帶使服之而入檜辭上曰梓宫歸葬慈寧就養皆卿之功也此未報百分之一不必辭會要在十月十八日進封誤也詔福建官買茶送𣙜場上諭輔臣戒有司即償其直金主遣銀青光禄大夫中書侍郎劉筈奉國上將軍禮部尚書完顔宗表來丙午朝見朱熹撰張浚行狀云公去國後毎使至金主必問公安否方和議初定國書中有不得輒更易大臣之語蓋憚公復用也案紹興講和録有金國主書三烏珠書七並無此語或又别有書姑附此當求他書參攷戊申新玉輅成上觀于射殿詔金國誓書藏内侍省紹興講和録有誓書參知政事王次翁充大金報謝使徳慶軍節度使提㸃皇城司錢愐副之王明清揮麈録稱上欲誅次翁秦檜令出使等事已見八月丙寅皇太后渡淮注給事中兼侍講兼直學士院資善堂翊善程克俊充翰林學士敷文閣待制提舉萬壽觀兼侍講資善堂翊善秦梓陞敷文閣直學士權直學士院檜言臣兄老于翰墨自聖明所知今兹除授非臣敢預但以臣新被優恩躐正公槐之位一門並受寵命恐盈滿延災伏望許臣囘授與兄進今職名不許權尚書禮部侍郎施坰充敷文閣侍制提舉江州太平觀大常少卿兼實録院檢討王賞權尚書禮部侍郎兼實録院修撰尋又兼侍講秘書郎秦熺試秘省少監庚戍引見大金人使中書侍郎劉筈禮部尚書完顔宗表既見命樞密使孟忠厚就馹宴之筈等丙午日已朝見此日乃再引見也熊克小厯于此始書之蓋誤紹興講和録有國書辛亥上謂大臣曰朕戒慈寧殿諸人凡有闕毋得白太后第來白朕蓋太后年已六十惟胷中無一事動作如意即壽考康寧無窮矣起復檢校少傅寧國軍節度使醴泉觀使張中孚開府儀同三司起復龍神衞四廂都指揮使清遠軍承宣使提舉佑神觀張中彦為靖海軍節度使二人將北去故特遷之中書舍人兼侍講李易試給事中起居郎張廣起居舍人楊愿並試中書舍人愿仍兼修玉牒熊克小厯于此書張廣罷中書舍人實甚誤矣廣于此始為舍人其罷乃在明年云月壬子金國大使劉筈等往上天竺寺焚香自是以爲例進士孔履常特補右迪功郎以上書可采也甲寅詔僞福國長公主李善静決重杖處死初皇太后旣還宫内人楊氏告其詐妄詔殿中侍御史江邈大理卿周三畏治之内侍右武大夫相州觀察使李愕亦自北還言柔福帝姬在五國城適徐還而死紹興十一年五月還父武功大夫榮州團練使中立訴于朝于是善静具伏開封人少居乾明寺以試經爲尼初爲金人所掠有内人張喜兒者言善静貌似柔福帝姬卽僞稱之後恐事覺脱身走河陽三鬻身于人同知大宗正事仲的聞而迎之至酇陽復爲劉忠所掠然後入韓世清軍中自受封以來所得俸賜凡爲贓四十八萬緡法當絞詔處死宣政使明州觀察使提舉亳州明道宫馮益宗婦呉心兒坐驗視失實益除名送昭州心兒千里外州並編管駙馬都尉常徳軍承宣使髙世榮所授官仍追奪初善静賜第漾沙坑坡下驕蹇自恣積殺婢妾甚衆皆埋第中尋以益與皇太后連姻心兒宗室婦免編管時世榮父公繪累遷武經大夫逹州刺史閤門宣賛舍人世榮後以父任爲承信郎云熊克小厯載此事于辛丑蓋誤今依日厯附此奉國軍承宣使永興軍路經畧安撫使知金州兼樞宻院都統制郭浩改金房開逹州經畧安撫使中書舍人楊愿假戸部尚書左武大夫宣州觀察使知閤門事何彦良假奉國軍承宣使賀金主正旦器幣視生辰之數自是以爲例熊克小厯載遣生辰正旦四使在九月丁巳誤也生辰使已先見五月乙未愿等九月丁巳乃降㫖借官克不細攷耳先是金人求眞珠靸靸等物秦檜以誓書不遣泛使乃諭盱眙軍令録事參軍孫守信往泗州諭守將周金令具奏達俟遣彦良出使附行此據徐夢莘北盟㑹編附入但夢莘以爲秦檜作書與知盰眙軍向子固案子固今年十二月方除盱眙或因此移附本月而皇太后歲遺金主之后禮物亦以鉅萬計熊克小厯載此事于二十一年二月今移附此乙卯懿節皇后靈駕發引顯肅皇后次之徽宗皇帝又次之是日上緦服啟奠祖莫于龍徳宫吉服還内丁巳尚書右司員外郎鄭樸為起居郎禮部員外郎程敦厚為起居舍人直秘閣蘷州路提㸃刑獄公事何麒試太常少卿戊午尚書度支員外郎李椿年為左司員外郎屯田員外郎李若谷守右司員外郎建炎以來繫年要錄巻一百四十六建炎以來繫年要録巻一百四十六金人地名攷證烏凌阿原書作烏陵誤改見巻一達蘭原書作撻辣誤改見巻一烏珠原書作兀术誤改見巻一
