body:
  text: 建炎以來繋年要錄巻六十四宋李心傳撰紹興三年夏四月丙戌朔李横奏已還軍汝州有邊機事欲輕騎詣行朝奏稟詔俟邊事稍定日赴行在是日端明殿學士江西安撫大使趙鼎至境上視事鼎言臣本由拙直受知於陛下亦以招怨於人昨䝉陛下除臣知建康外鎮責任之劇無逾於此然足食足兵帥司之事也而臣無生財之長䇿但以漕司應副不繼屢丐於朝廷而已勞來安集守臣之職也而臣無及民之實利但以豫買價小不均疊聞於陛下而已至於僚屬所取皆州縣無聞之人郡政所先唯鹽米聼斷之務此皆臣已試之效也何足取哉臣素苦脚疾而江西最號卑濕萬一浸加即不能支惟陛下憐臣孤忠除一宫觀詔不許丁亥直徽猷閣和州無為軍鎮撫使趙霖右宣教郎知無為軍王彦恢並罷先是霖奉詔遣歴陽令茍紳至無為軍宣諭遂按彦恢不法而彦恢亦劾霖姦贓淮西安撫使胡舜陟言霖本贓吏之魁今已老病而彦恢年少妄作兩州吏民皆不安居請悉免官治罪從之然議者以霖為鎮撫而彦恢以屬郡按之非也其後獄具霖坐率民出防城錢有司當公罪杖罰金事遂已霖罰金在十二月丁亥武翼郎閤門宣贊舍人知虢州董震為武節大夫貴州刺史權商虢陜州鎮撫使用李横請也震又言敵偽犯蜀臣見調本軍三千人自豐陽而西絶敵糧道萬一四川將帥不能堅守墮敵姦計思之寒心今山東富庶如昔金人重兵亦不在彼望朝廷乘此機㑹興師深入可以破偽齊之巢穴兼牽制金人取四川之兵矣時震以貢士黨尚友為幹辦官遣來奏事詔特補文林郎而荆南鎮撫使觧潛言横已還鎮而四川總領財賦趙開遏糴將士饑餓望下湖南北濟師保䕶蜀口乃詔宣撫司應副軍食潛奏在此月壬辰尚友河南人也江東西宣撫司統制官中衛大夫成州團練使杜琳翊衛大夫昌州團練使劉寳拱衛大夫文州團練使岳超等八人並進遥郡二官先是琳等以平㓂功各進二階韓世忠言但得虛名不增廩祿故皆改命尚書左僕射朱勝非以母魯國太夫人楊氏憂去位日歴四月己丑中書門下省奏朱勝非母楊氏今月二日身故丁亥初二日也熊克小歴勝非去位在二月壬寅按勝非以七月乙亥起復舊官若在二月丁憂則不應半年方起復熊克恐誤特詔賻䘏如舊禮出殯日令太常即都門贈祭戊子上謂大臣曰沈與求席益前為吏部長貳甚有能聲今乃不如凡注擬吏率沮難以邀賄賂今員多闕少又重以水火盗賊陷失士大夫失職者衆儻非痛戢吏姦安得注擬無壅可召洪擬等諭之翌日上又言擬雖累歴亦恐失於濡緩益曰擬甚用心前此與求為尚書有所覆實責保待報迂乆不决擬曰罷之人以為悦上曰治吏以法使之畏威乃不敢舞文吕頥浩曰其次莫如猛誠如聖訓尚書省言浙中去嵗大豐近年未始科率今韓世忠移軍泗上恐饋餉不繼欲給空名官告勸誘大姓廣蓄之家博糴米五十萬斛料十五萬斛委江淮等路都轉運使張公濟兩浙轉運副使梁汝嘉措置尋命户部員外郎徐玘通判臨安府兼權倉部員外郎邵相偕行公濟等言米直總為二百五十萬緡詔空名官告内改給銀帛二十七萬緡品搭充糴本其後纔糴四十萬斛相宜興人也遣兩郎官在此月甲午品搭銀紬在丙申今聨書之是日百官入朝以近昭慈獻烈皇后大祥權罷舞蹈己丑韓世忠言近被㫖措置建康府江南北岸荒田為屯田之計沿江荒田雖多大半有主難以如陜西例乞募民承佃都督府奏如世忠議乃蠲三年租田主自訟則歸之滿五年不言給佃人為永業於是詔湖北浙西江西皆如之尋又免科配徭役駕部員外郎韓膺胄轉對論刑罰輕重國祚短長繫之望追法仁祖舊章凡獄官失入死罪者終身廢之雖經赦宥永不收叙上曰此仁祖之事也其仁民祥刑如此乎乃命有司申嚴行下膺胄肖胄弟也熊歴以膺胄為刑部郎中盖誤給事中黄唐傳言承流宣化責在守令今郡守之任患在不乆縣令之選失之太輕乞自朝廷立法自今郡守未終更非實有故者不得輙請宫觀凡大邑非歴官有顯績及曾經朝廷陞擢者不許除授以次小邑亦令吏部先選通判以上資序次選曾任知縣無過犯人既重其選必假之權凡文移自上而下有不便於民者聽以已見立議申監司郡守即有沮抑徑申尚書省兩更大邑有善狀者得選除郡守兩更小邑有善狀者得選除通判凡守令治行尤異者並不次擢用庶人思自奮吏稱其職民安其業不然徒責州縣奉行詔書而望其治效臣未見其可輔臣進呈上曰縣令於民最親今多非其人吕頥浩言漢以九卿為郡守郎官宰百里今縣令但以資格差注上曰豈在官資崇卑唯在得人乃詔吏部看詳申省其後權吏部尚書洪擬等言歴官有顯績即無定法其朝廷陞擢之人若非責降無縁却歸部注擬又如小邑須選嘗歴縣無過人即新改官未歴縣人無可入差遣亦與舊法相妨議遂寢吏部看詳在五月庚午庚寅徽猷閣直學士安復鎮撫使陳規為顯謨閣直學士知池州兼沿江安撫使規守徳安七年賊不能犯至是召還入對首乞罷鎮撫使又言諸将䟦扈請用偏裨以分其勢上皆納之遂以右通直郎鎮撫司幹辦公事韓之美為直祕閣知徳安府仍以安復二郡𨽻湖北帥司自是不復除鎮撫使矣規入對在三月癸未熊克小歴載規赴召於七月末間實甚誤也詔神武諸軍将統領官闕依己降㫖保明具奏給降敕劄如直行差填及額外増置當重寘典憲以樞密院有請也右奉直大夫江南東路轉運判官郭康伯為淮南轉運副使兼權淮東提刑填復置闕康伯以寓居揚州辭詔勿避日歴康伯除淮漕在四月庚寅而免避本貫在三月甲戍且附此必有一誤辛卯起復寜武寜國軍節度使開府儀同三司浙西安撫大使兼知鎮江府劉光世為檢校太傅江東宣撫使屯鎮江時光世與韓世忠更戍世忠至鎮江城下而姦細入城焚其府庫光世擒而鞫之皆云世忠所遣於是訴於上江東統制官王徳請於光世曰韓公之來獨與徳有隙耳當身徃迎見之其下皆不可或請以騎行徳不聼入謁世忠大驚謂徳曰公誠烈丈夫曩者小嫌各勿介意因置酒結懽而别熊克小歴庚寅浙西大帥劉光世為江東宣撫使於池州置司世忠已至鎮江而姦細入池州城潛燒倉庫按日歴光世制命即云建康府置司九月方移池州此時光世自鎮江即至建康世忠何為焚池州倉庫盖光世未離鎮江而世忠先至城外是以遣姦細入城也今從趙甡之遺史修入是日金人去興元自金人入梁洋蜀中復大震劒南諸州皆為徙治之計宣撫處置使張浚亦下令移潼川軍聞之皆憤或取其榜毁之利州路經畧使劉子羽遺浚書為言已在此敵必不南浚乃止薩里罕留屯中梁山踰月始自斜谷去興元子羽與吳玠謀以兵邀之於武林闗不及斜谷路狹惟可單行故凡所掠獲悉棄之於路熊克小歴三月壬午子羽與玠謀遣兵邀敵於武林闗而敵棄輜重以去擊其後軍敗之楊氏編年敵去興元在此日張浚奏狀亦云四月九日訓練官杜福遇敵于南龍潭小歴恐誤浚遣統制官王俊復洋州興元府時新罹兵革軍食益艱浚命取糧於内郡什邡丞眉山孫坦當督運請發常平倉以行遂先諸郡而至薩里罕既還鳳翔乃遣十餘人持書與旗來招子羽玠子羽盡斬之惟留一人使還曰為我語之欲來即來吾有死耳何可招也玠亦遺薩里罕書以大義責之薩里罕乃止壬辰移都督府於鎮江照應江淮兩軍機務於是建康府𣙜貨務都茶塲亦移於鎮江時朝廷以韓世忠將出師聼之妙簡僚佐乃以徽猷閣待制知處州宋伯友為徽猷閣直學士充參謀官直秘閣湖南提㸃刑獄公事吕祉陞直徽猷閣與直秘閣陳桷並充參議官始世忠之過括蒼也伯友待之甚密故薦用之既而世忠不渡淮伯友祉皆改命浙東宣諭朱異薦左宣教郎簽書鎮東軍節度判官㕔公事張九成義烏縣令閭邱昕右承義郎知龍泉縣汪汝則左奉義郎知瑞安縣熊彦詩右從事郎知嵊縣姜仲開政績詔並進一官吕頤浩言仲開臣之外親乞勿賞上曰此所以為公使有罪雖卿之親亦不當貸昕松陽人也九成彦詩已見是日神武副軍都統制岳飛以大軍次䖍州癸巳執政奏事上色不怡乆之曰昨夕暴雨朕通夕不寐恐於蠶麥有傷徐俯曰暴雨不害蠶麥乆則為害矣上色稍和詔禮官重别討論昭慈獻烈皇后諡號時登仕郎鄒况上書言其兄浩直諫事且乞雪慈后元符之謗前二日上諭輔臣曰此哲宗朝事言之毋傷乎徐俯曰陛下母事昭慈追崇極典天下共知其謗已矣上曰昭慈勲臣之家當時備禮而納正后此本朝盛事俯曰宣仁聖烈太后尤重家法欲正后生元子繼萬世之統以哲宗少年戒之在色不欲其多近嬪嬙小人隂連宫掖因是得行媒孽遂至廢后上曰皆當時大臣不諌之罪是日上又以為言遂詔有司更定諡號翊日詔况引對上曰况浩之弟故欲擢之俯曰浩自有子柄吕頤浩曰柄嘗為李綱客然朝廷要當以其父故湔拂用之不然則終陷於綱黨不能自㧞上曰直臣之子復擢用之為御史使言事聳動四方亦足為國家之光也中書舎人權直學士院洪炎以足疾不能朝罷為徽猷閣待制提舉萬壽觀俸賜如舎人例既而言者謂爵禄公器人主不得而私若炎文采可用候其疾愈造朝再加進擢孰曰不宜今乃越等而予之禄士大夫竊議以為乃有不釐務中書舎人兼炎博通典故能以亷節自守必不敢受此無名之禄上乃寢前命炎再乞外祠許之詔炎請給人從以舎人在此月庚子臣僚上言在壬寅炎改崇道在五月庚申慶遠軍承宣使神武前軍統制王􅊛為捧日天武四廂都指揮使兼淮南宣撫司都統制仍詔神武後軍統制巨師古御前忠鋭将崔増李捧等並受韓世忠節制於是世忠始去神武左軍都統制専為宣撫使世忠觧都統制不見月日按世忠三除宣撫使並帶都統制入銜自此却不兼帶當以與王􅊛巨師古官稱相犯故也今且附此責授昭信軍節度副使徐秉哲卒於漳浦縣詔令歸𦵏詔自今三衙管軍並給全俸甲午詔神武中軍官兵並進秩一等以其扈衛四年而無出入功賞故也於是統領起復武顯大夫康州刺史閤門宣贊舎人朱師閔等六千四百九十四人皆遷官師閔等遷官在五月丙寅按楊沂中奏中軍見官五将更於水軍内選五百人為第六将去此未乆不知何以紹興二年以前到軍人乃有此數也賜知唐州胡安中敕書撫諭先是安中以勢孤援絶附於偽齊至是知隨州李道招來之故有是賜左奉議郎知嚴州顔為條上便民事乞嘗得解及應免解人並免丁役許之其後太學生亦免免太學生丁役在十五年二月戊子乙未詔博糴補官人不作進納仍與免試注官用户部尚書黄叔敖請也是日宣撫處置司訓練官杜福邀敵於興元南龍潭降女真漢兒軍四百六月辛卯奏至丙申勒停人陳杌復朝請大夫知泗州杌為韓世忠所愛故起廢用之世忠又言浙東兵馬副鈐轄劉綱淮泗土人熟知地利乃命綱以所部聽世忠使喚是日偽齊將李成以衆二萬攻虢州陷之鎮撫司統制官謝臯與敵遇舉刃示敵曰此吾赤心也汝宜視之遂剖心以死權鎮撫使董先率餘兵二千奔襄陽臯開封人也戊戍湖南安撫使折彦質所遣統領官劉深以兵至鼎州時鼎㓂楊么衆益盛僭號大聖天王旗幟亦書此字且用以紀年又以兵二萬人㓂公安縣彦質言么之勢不减曹成望朝廷勿輕此賊乃命彦質督潭鼎荆南兵討之是日湖北統制官顔孝公亦以千九百人至鼎州之城外己亥昭慈獻烈皇后大祥命參知政事席益祭告于几筵殿上素服親行徹几筵之祭用牲幣庚子百官集議改諡曰昭慈聖獻用癸巳詔書也既而議者以為本朝諸后諡號皆連帝諡今昭字與宣祖昭憲皇后諡號相犯請命禮官改正朝廷難之事遂止臣僚建議在五月辛未詔復五帝日月之祀用祠部員外郎鄭士彦請也其禮祀四方帝以四立日黄帝以季夏之土王春秋分朝日夕月禮如感生帝湖南宣諭使薛徽言奏郴道州桂陽監去年旱民乏食詔户部剗刷本路諸州米二萬斛付提刑司充賑濟命未至徽言即諭漕臣發衡永州米賑糶而以經制銀市米償之民賴以濟五月己卯放罪修武郎閤門祇候知孝感縣韓遹進一官知復州詔陳瓘孫大方言政可采以為右廸功郎大方正彚子閤門宣贊舍人御前忠鋭第七將徐文以舟師屯明州謀為變朝廷命神武中軍中部統領官朱師閔以兵二千徃襲之日歴但書朱師閔徃福州屯駐代申世景赴行在此據趙甡之遺史修入五月乙丑詔世景依舊福州屯泊丙寅詔師閔發歸本軍可見二人初非更戌也辛丑資政殿學士知泉州謝克家移知平江府監察御史任申先主管台州崇道觀從所請也集英殿修撰都督府參謀官歐陽懋充徽猷閣待制知建康府徽猷閣待制新知建康府胡世将移知鎮江府充浙西安撫使是日荆南統制官羅廣以所部三百五十人至鼎之城西而軍食不繼於是潭将劉深鄂将顔孝恭皆引所部去後二日廣亦引兵北還由是不克討然賊徒屢抗官軍多被殺人心頗揺乃肆偽赦立鍾相少子子義為太子自楊太以下皆臣事之壬寅詔昭慈聖獻皇后同姓親遷秩二等異姓一等甲辰封起復鎮潼軍節度使開府儀同三司醴泉觀使孟忠厚為信安郡王制曰載考濟陽之始王雖由元舅顧如隆祐之盛烈特鮮近親蔽自朕心用作爾祉丙午封哲宗羙人慕容氏魏氏並為媫妤皆用后大祥推恩也入内東頭供奉官幹辦御藥院陳永錫為武顯大夫入内内侍省押班尚書右司員外郎劉岑請訪四方遺書以實三館從之童子彭興祖五嵗能誦書劉轂五嵗能騎射二人皆神武右軍小校子也都統制張俊以聞上召見於内殿以興祖為右廸功郎轂為進武校尉皆賜袍笏二人召見在三月辛未錄故太師文彦博孫緯世等三人並為廸功郎緯世父太僕卿維申建炎中從上渡江至湖州而死至是用守臣汪藻請而命之丁未工部侍郎李擢言昨知平江府所聞民間利病五事東南有逃田皆湖浸相連塍岸乆廢無人耕墾者且以平江言之嵗失租米四萬三千餘斛願委官相視可以疏導耕墾者招誘東北流徙之民給本施工與免三嵗之租其决不可施工者監司復按除其舊額平江陷敵之民所棄田三萬六千餘畝多有舊佃户主之諸縣悉已立定租課除常賦外餘以三方為率一給佃户一以上供一拘籍在官俟其歸業併田給還二年不歸即依户絶法今三年矣陷敵之民豈不願歸顧力未能脱耳望且更展二三年以俟之平江水鄉不可植桑柘故祖宗舊法無和預買絹帛舊本府租米嵗三十四萬餘斛既取其所有不責其所無徃因毛友陳請分臨安之數抑令嵗輸數萬匹逮今累年未嘗敢斂於民今户部裁定其數乃欲始自今嵗使之輸納實可矜憫惟睿斷盡罷之平江去嵗租米十六萬五千八百餘石悉充上供不許輙用然兵食吏禄月費七千餘石所不可闕望借撥漕司移用錢三二萬緡造酒取贏充收糴軍糧錢本圭田多瘠薄有司拘以舊籍民已告病願除其不可力耕之田損其已定過多之額後皆以次施行惟和買如故擢此奏見平江田租事甚詳著此為李椿年經界張本或可削去繁詞附入偽齊登萊沂密都廵檢使劉忠在懷仁縣為其部下王林等所殺傳首行在詔以林為修武郎閤門祇候充樞密院准備差使其徒九十三人授官有差林等授官在六月戊戍忠死不得其日依趙甡之遺史附此俟考神武副軍都統制岳飛遣統領官張憲王貴分道擊䖍㓂彭友李滿獲之飛自至䖍州日破一寨賊徒震恐友等先據龍泉至是乃敗戊申詔諸縁宣諭所按發置獄除正犯人外並放上嘗諭大臣曰向遣五使宣諭意在利民至於贓吏所當深治然所在多置獄横及無辜非朕本意此後惟謹擇監司不必毎事遣使故有是命親衛大夫明州觀察使髙士曈為保寜軍承宣使權管客省四方館閤門公事士曈初召見乞落階官上曰士曈以宣仁近屬故稍優之然躐等亦不可髙爵厚禄留待立功将士朕於外戚未嘗假以恩澤今後宫之家官未有過保義郎者此曹何厭之有雖與之正任承宣使又望節鉞矣武節大夫明州觀察使浙西兵馬鈐轄史康民将所部至行在以康民為御前忠鋭第九将詔自今大軍所過並令本州通判充錢糧官自入境隨軍至出境止西南蕃武翼大夫歸州防禦使瀘南夷界都大廵檢使阿永獻馬百有十二匹瀘州以聞詔押赴行在阿永乞第子也元豐間乞第既效順願嵗進馬以見向化之心官以銀繒償之所得亡慮數倍其後阿永所獻之數嵗増不已政和未始立定額毎嵗冬至後蠻以馬來州遣官視之自江門寨浮筏而下蠻官及放馬者九十三人悉勞饗之帥臣親與為禮諸蠻從而至者㡬二千人皆以筏載白椹茶麻酒米鹿豹皮雜氊蘭之屬博易於市留三日乃去馬之直雖約二十千然揆以銀綵之直則毎匹可九十餘千自蠻長已下所給馬直及散犒之物嵗用銀帛四千餘匹兩鹽六千餘斤銀則取於䕫之涪州及大寜物帛則果遂懷安凡馬之死於漢地者亦以其直償之此其大略也邕州進士昌慤特補忠州文學充廣西買馬司准備差使初提舉峒丁李棫既罷經略司更委通判賓州任彦輝就本州買馬道里迂逺大理馬遂不至及是朝廷復置司買馬慤上疏請招來之仍諭諸蕃中馬及三百匹賜錦袍銀帶如有出格之馬依溪峒搭價收買不可循其舊例毎蕃令提舉官以綵帛為信如遣効用入蠻許借官錢多市鹽綵結托山獠及諸蠻令開拓道路庶㡬諸蕃忻慕曲盡招馬之術䟽入遂授以官俾行其説焉初樞密院計議官薛徽言之出使也請所至州縣視吏之能否茍無大過而止不勝任者兩易之詔徽言具事因聽㫖事見二年十一月㑹權桂陽監陳如塤與平陽縣主簿權縣事陳發朋比為姦斂民錢數萬緡徽言亷得之即移如塤而罷發己酉吕頤浩奏以如塤等屬吏仍令徽言分析上可之庚戌詔江東宣撫劉光世月給公使錢七百五十緡光世初乞依韓世忠例吕頤浩言世忠既移軍淮甸則建康為近裏州郡與前日事體不同由是减半武顯大夫湖南安撫司統制官任士安為閤門宣贊舎人以帥臣折彦質言士安討閩賊降歩諒有功且老於兵間而後進皆位於其上望除一閤職以為激勸故也時湖㓂方盛而湖南諸将惟士安與吳錫所部僅萬人彦質賴以為用故有是請於是知鼎州程昌㝢攻夏城寨七十餘日乆雨水漲攻具無可施援兵不至是日昌㝢乃班師辛亥左朝散大夫趙康直為都督府隨軍轉運判官左奉議郎張延壽主管江州太平觀延壽為侍御史以憂去至是免喪而有是命大理寺丞姚焯言兼并之家囷廩動以萬計而力耕之民得食無㡬望令有司參酌毎畝以二税役錢為凖除外不得過若干倍以抑兼并舒貧弱事下户部不果行是日御前忠鋭第七将徐文叛奔偽齊文以所部屯明州城東朱師閔将至文覺之夜以所部泛海舟而遁未明至定海縣忠鋭第八将武徳郎趙琦以本軍沿海拒敵文乃去沿海制置仇悆率諸将追之不及日歴不書文叛去之日紹興三年四月二十五日趙琦乞推賞状云去年四月二十六日夜徐文作過辛亥二十六日故附於此壬子起復檢校太傅江東宣撫使劉光世再起復以光世丁内艱故也仍賜白金千兩武徳郎王繪為閤門宣贊舎人添差紹興府兵馬鈐轄繪仲通子也上以其父使金不屈而死故録之仲通靖康末以拱衛大夫平海軍承宣使死燕山詔韓世忠全軍渡淮毋失機㑹癸丑武徳大夫榮州團練使曹成為右武大夫尋復遷一階領忠州防禦使先是神武左軍提舉官董旼承制進成横行遥郡三官都督府以為言故改命成進遥防在五月丁丑今併書之熊克小歴二年六月甲午李綱奏曹成已就招成自榮州團練使陞防禦使恐誤户部尚書黄叔敖言自渡江後來諸州有未補發上供及估剥虧官錢物並限半年補發如違令提刑司取勘從之建炎以來繫年要録巻六十四金人地名考證薩里罕原書作撒離曷誤改見巻十一
