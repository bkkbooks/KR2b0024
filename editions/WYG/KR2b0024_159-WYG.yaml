body:
  text: 建炎以来繫年要録巻一百五十九宋李心傳撰紹興十有九年嵗次己巳煬金熈宗亶皇統九年海陵王亮天徳元年春正月甲申朔上以皇太后年登七十即宫中行慶夀之禮日歴不書此據㑹要丁亥詔信陽軍撥𨽻淮西詔紹興府第四第五等户去年未納租税並權與倚閣以旱傷最甚用提舉常平官秦昌時請也己丑北使召守忠等辭行置酒垂拱殿時在上辛祈榖祠官致齋之内禮官援治平故事請用樂從之自是以為例甲午上諭大臣曰國信所囘易北貨恐生事可降㫖令罷将作監丞黄敏行面對乞戒州縣謹務限之制毋得夤縁追呼以妨東作詔申嚴行下乙未置撫州樂安縣割崇仁吉水四鄉𨽻之庚子直龍圖閣新兩浙東路提㸃刑獄公事張絢卒丁未直敷文閣主管台州崇道觀張宗元為籍田令以其祖俊有請也己酉宰執進呈春敎使効踏射克敵弓乞依格推賞上曰此弓最為强勁雖被重甲亦湏洞徹若得萬人習熟何可當也宣政使和州防禦使帶御器械康諝為内侍省押班癸丑右廸功郎吳伸為大理司直伸初以上書得官既而久不用至是稍録之二月己未端眀殿學士提舉江州太平興國宫楊愿知宣州庚申顯謨閣學士知建康府鄭滋卒甲子復置雷州遂溪縣丁卯詔諸路總領官樂禁如監司例以左朝請大夫監尚書六部門張頡面對有請也左奉議郎楊偰知大宗正丞左奉議郎范如珪添差權通判邵州如珪為校書郎以論講和事去國閑居凡十年乙亥詔自今監司守臣代還入見並令以民事奏陳先是上諭大臣曰監司郡守得替上殿本欲知民間利病近来所奏姑應文書多不及民事宜行告諭故有是㫖上諭大臣在丁夘徽猷閣待制知瀘州馮檝陞敷文閣直學士令被授指揮日别理為任丙子上曰今四境寧息㳂邊守臣務在安静若任滿不生事可量𦂳慢取㫖推賞復置太社令以左奉議郎直敷文閣韓彦直為之以世忠有請故也丁丑左朝請大夫童邦直知峽州還言湖北溪峒醖造蠱毒以害往来之人又夷人以人釁鬼安復荆門鼎澧獨行之人或罹此禍望令廵尉覺察上諭大臣曰邦直二説皆可取當行之戊寅左中奉大夫知利州王賞充祕閣修撰提舉江州太平興國宫從所請也庚辰上謂輔臣曰每嵗所市馬悉付鎮江王勝軍令養而未見孳生之數宜分送諸軍仍立賞罰於是嵗發川馬二百匹進御而以四千匹付江上諸軍鎮江建康荆鄂軍七百五十江池軍各五百又以秦馬三千五百付三衙殿前司千五百馬步司各千自是嵗為定例二十四年十二月庚辰所書可參考封尚儀袁氏為宜春郡夫人辛巳詔臨安府日下給米賑濟流民時浙東大饑其小民行乞都市有餒死者上聞閔焉故有是命右宣教郎王秬幹辦行在諸軍審計司秬雲子也先是上諭大臣以雲頃年奉使忘身為國至於不免忠義可嘉宜録其後乃賜秬銀帛五百匹兩而命之上諭大臣在庚申賜秬金帛在甲子今聨書之熊克小歴稱秬為奉議郎與日歴不同恐悞三月癸未朔日有食之隂雲不見上不視事百官守職過時乃罷甲申詔皇太后慶夀親屬各進官一等慈寧殿官推恩有差己丑右武大夫平海軍承宣使蔡徳除名廣州編管徳為建康府駐劄御前破敵軍第三正将冒請錢糧法當死特貸之庚寅宰執進呈普安恩平二王得㫖令温習舊書上曰春秋乃舊所習讀朕嘗問以經中數事欲其通觧盖其義淵奥湏能識聖人之用心有自得處若泥諸儒之説拘而不通失經㫖矣時普安郡王在藩邸絶意聲色常以經史自娱凡六籍之文悉加講論夜則觀古人文集暇則握筆賦詩鼓琴習射而已丙申上語秦檜聞諸郡奏獄空例皆以禁囚於縣獄或廂界寄藏此風不可滋長自今有奏獄空者當令監司騐實如有妄誕即行按治仍命御史臺察之若不懲戒則奏甘露芝草之類崇虛飾誕無所不至矣戊戍左朝奉大夫知復州劉畤代還言湖北縣令有七八年無正官而以寄居待闕官攝之者事多曠弛民受其弊望許諸司及本州不以拘礙選辟能吏庶㡬縣有正官官事修舉上謂大臣曰可令吏部趣已差人之任未差者速出闕無人就則下所属辟差己亥徳慶軍承宣使提舉萬夀觀韋謙為建寧軍節度使慶逺軍承宣使提舉萬夀觀韋讜為重慶軍節度使用慶典也庚子上諭大臣曰淮甸久平宜加經理民復業者令守令多方恤之使盡力田畝數年後方可起税甲辰起居舍人王墨卿罷以殿中侍御史曹筠論墨卿貪墨嗜利與林待聘既黜乃懐怏怏動欲傾危朝廷故有是命詔責授濠州團練副使復州安置鄭剛中許用議減特免禁錮移封州安置初秦檜怒剛中不已捕其子右承務郎良嗣與将吏賔客即江州同繫遣大理寺丞湯允恭允恭初見建炎三年二月太府寺丞宋仲堪往鞫其事掠治無全膚獄成剛中坐任四川宣撫副使日被㫖收捉過界偷馬盗賊全不遵奉凡事于邊界常是懐姦異議隂與見在罪籍人符合交通沮害國事又輙違朝命出賣度牒收錢五十五萬餘緡又専輙起置錢監鑄錢擅便支使及違法請過供給厨食等錢一萬三千餘緡入已剛中欲併都轉運司入宣司遂将錢物贈遺士人令赴行在上書開陳既併運司違法私使過錢十二萬餘緡及有詔置總領錢糧官剛中不喜預作縁故收樁隠匿錢計四千餘萬緡又欲歸怨朝廷乃説諭統兵官今為總領盡數交併錢物無可送遺及被㫖令赴行在乃忿怒遷延收匿劄子不即起發多帶官物在路妄用法當死特有是命良嗣貸死送栁州右朝請郎張漢之嘗主管宣撫司機宜文字坐依随剛中亦除名送賔州並編管右奉議郎趙士禡嘗通判荆南府坐不即拘收剛中随軍錢物特除名右武大夫開州刺史御前中部統領官張仲亦坐依隨剛中追横行一官勒停送本軍自効即日擢允恭尚書刑部員外郎仲堪倉部員外郎剛中至貶所守臣左朝請郎趙成之希檜意每窘辱之剛中竟卒於貶所中興聖政講義曰秦檜之收三大将兵權也剛中阿於檜曰前所共憂者一旦便為安平之道廟堂不動聲色而三大将惟恐奉上兵籍之不先彼曲士不通世務挾口以議政者亦皆言塞意順謂此非常之舉因為檜陳善後之䇿凡七事非不忠於檜也一旦積怒貶死遐荒将吏賔客無得免者則人之附麗匪人以媒進取者亦可以為殷鑒矣将作監丞黄敏行權尚書兵部員外郎往四川諸路措置遞角敏行増鋪益兵所費甚廣紹興末卒罷之乙巳上謂大臣曰牧馬孳生為利甚溥朕令牧於近地今已見效嵗進馬駒皆佳者若得萬匹分與諸軍數年間便可濟用既免綱馬道斃且無賞給之費也丙午右武郎添差兩浙西路馬步軍副都總管劉懋為右武大夫吉州刺史懋以解帶恩乃有是命丁未右諫議大夫巫伋言近者監司帥臣與列郡守倅有因失懽遂相告論者望申嚴戒諭自今並先次罷黜然後付有司理辨曲直庶㡬崇推遜之風銷刻薄之俗從之戊申左朝散大夫知普州王輔代還言仁政必自經界始尚恐蜀逺未閑措畫或有謬誤乞誡勅有司刻意奉行上曰四川道逺儻如輔所陳則税愈不均矣可令措置經界官覺察奏劾己酉進呈上曰州縣官奉行如法其推恩勿限員數庶人人知勸正經界均税賦極為便民推行之初臣僚有肆異議圖沮壊者暨平江均税畢紛紛之議始息秦檜曰當時獻議欲使逐户自陳豈無失實上曰李椿年通曉次第中間以憂去他官領之便有失當處㝷以輔知合州輔初見紹興十二年正月時𠡠令所刪定官鄭克經界四川頗峻責州縣其所謂省荘田者雖蔬菜桑柘莫不有征而卭蜀間民田有什税五者由是迄今多逃田克開封人也庚戌諸王宫大小學教授葉綝面對言自祖宗以来定公私贓三等之罪其意未嘗不重於保䕶斯民而已向縁官吏率多不定罪而民被其害是以乂標立民事一罪以戒懼之然因公則多涉於民因私則雖重有與民事不相干者故公罪雖輕而麗民事遂為終身之累反甚於得私罪之重者吏因得舞文而出入之不可不察也欲望眀𠡠有司更加詳議庶協于中詔𠡠令所看詳申省事初在紹興七年十二月今年八月辛亥𠡠令所看詳不行夏四月癸丑詔四川制置司官属将吏請給令總領所嵗撥錢萬緡如軍中非泛激犒並取㫖本司舊有抵當熟藥息錢仍充經撫蠻夷之用從户部裁定也乙夘權禮部侍郎陳誠之權知閤門事孟思恭賀金主生辰還秦檜白上曰大金書詞丁寧盟好甚切上曰此畨待奉使愈周至館舍極宏壮思恭等所得馬亦皆上駟可知其永好之意也丁巳樞宻院承㫖司上孳生牧馬監賞罰格戊午殿中侍御史曹筠言樞宻院編修官何逢原頃在館中公於奏對之間謂沮抑用兵之議太過司勳員外郎沈介為禮部長貳腹心乃相與隂謀傾朝廷此二人者若不斥逐無以濟今日聖治詔並罷介為禮部長貳腹心不知謂誰當考去年七月禮部侍郎周執羔罷八月沈該知潼川府或即此事承信郎閤門祗候劉允升幹辦御輦院允升懋子也己未上曰治道民事為急數十年来吏習茍簡民受其弊必令監司守臣遵奉詔條留意拊循使民樂其生秦檜曰保正耆户長元立法止令管煙火橋道今承文書市物顧夫以至縣官之所私用種種責辦民之所病莫大於此革而去之其利不減於經界上曰朕頃在河朔親見其弊若縣令不得人民一充役即破産能去此弊極為便民庚申詔諭御史監司守臣如前㫖熊克載此詔於六月己未盖差兩月中興聖政臣留正等曰民以役而破家其為吏者倚法之弊也歟為人上者若難於知之雖極糟糠憔悴之情曽不足以動膏粱怡愉之色非必皆忍人也其事未嘗知之故難於聼之也太上皇帝在河朔時親見弊事端居九重而每以百姓為念知艱難而問疾苦中興之業成有自矣壬戍皇姪和州防禦使居廣為瓊州觀察使居廣安時子也娶皇后姪女特遷之癸亥宣州觀察使兩浙西路馬步軍副都總管王安道為武泰軍承宣使以其父繼先該慶夀恩囘授特轉行也丙寅祕閣修撰主管台州崇道觀張邵言恭惟陛下當宣和靖康之間為國捍難適丁大變仗義而起獨患曩時相臣未能仰副陛下委任之意或駸駸欲用兵則已無才能不度事勢之可否或但持兩端則自為身謀不恤宗社之阽危唯師臣檜藴精深髙世之識灼見南北两朝事體别白利害力賛陛下兼愛赤子敦講和好用息兵靖難再造太平此非特臣能知之九州四海遐陬異類亦能知之非特史能書之黨庠家塾雜記小説亦能書之顧有隂功隠徳世所未及知者臣請得言之焉臣於建炎三年被㫖出使敵軍適逢檜於路䇿蹇衣褐有顦顇色盖被執而訓讀童蒙以給朝夕亦猶蘓武食窖中之氊雪賴以偶活其命留為今日中興之用其後臣益北徙至金所謂中京者已而二聖稍東有随駕醫官七八軰因留而居一日同過臣言聞秦中丞已間行南歸矣有滎州團練使李子厚言秦公曽為徽宗皇帝撰長書抵金帥尼瑪哈引大義以譙責之尼瑪哈有慚色及臣南歸渡江有為臣言曽有自金傳寫得其書藁觀之者今士大夫間往往有之臣親見子厚言其事如此則知檜昔在金固有隂功隠徳及於天下社稷者多矣特耻自衒不欲言於人是以世不得知之臣常恐一旦先狗馬填溝壑則我朝賢相道義忠節終莫聞於世誠日夜以為歉伏望宣付史館以彰陛下任用之當所以能致中興之盛簽書樞宻院事余堯弼曰書論秦檜忠節天下所未及知上曰得此書庶㡬不致曖昧可付史館堯弼曰邵書篇末言檜嘗為徽宗皇帝撰書抵金國元帥其所開陳與今日事無一不合者聞勛家有録本乞宣一取同付史館上曰善戊辰秦檜奏昨日蒙御前降到曹勛所蔵臣向在北庭代徽宗作書藁書中開陳與今日事無一不合因請講和本出徽宗聖意上曰自頃用兵朕知其必至於講和而後止在元帥府時朕不知有身但知有民每惟和好是念檜曰此所以誕受天命上又曰用兵盖不得已豈可樂攻戰本朝真宗與契丹通和百餘年民不知兵神宗雖講武練兵實未嘗用朕自始至今惟以和好為念盖兼愛南北之民以柔道御之也檜所草書本具建炎二年六月末此不别出右朝請郎孫世顯知沅州代還言本州麻陽縣至今尚行差役事體未便乞改作募役詔本路常平司㸔詳申省是日日左右生青赤黄珥太史局言係是祥應乞付史館從之庚午尚書司封員外郎湯思退試祕書少監度支郎中徐宗説為太府少卿宗説在度支㑹右曹金部皆闕官因令兼領三曹金榖之地而宗説素有心計於天下經費出入盈縮之數莫不通知老吏為之斂手癸酉敷文閣待制提舉佑神觀米友仁陞直學士太常丞胡寧守尚書祠部員外郎戊寅祕閣修撰主管台州崇道觀張邵充敷文閣待制提舉江州太平興國宫制詞略曰惟時秉節之臣親見特書之事誦説賢宰彰明大功邵自北方還即被逐閒居凡七年乃上此奏焉建康府言甘露降是月太白蝕月此據苖耀神麓記日歴四月九日庚申是夜太隂行在太微垣内不犯星二十一日壬申是夜太隂行在羽林軍内不犯星乃不見月蝕事不知何也金國太史言不利於君大臣将作亂又風雷大作有龍自寢殿而出火焚壁幙及地衣金主亶震懼遂大赦翰林學士承㫖張鈞為赦文曰乃者龍潜我宫亶大怒曰龍若我何遂杖鈞數百截其手足而斬之五月壬午朔詔汀漳泉三州且據見令耕種田土紐計頃畝收納二税其未耕種田段二税權行倚閣時初行經界法於諸路而劇盜何白旗擾汀漳諸郡故有是㫖二十年七月己酉再降㫖住罷癸未詔諸州招填闕額禁軍守臣兵官同賞罰仍月申樞宻院前一日上以此事諭大臣令留意及是進呈上因言頃程師因捕賊處多用本處兵若招填數足練習武藝緩急可用也甲申始剏太廟齋殿乙酉户部員外郎周荘仲面對請復蜡祭之禮其禮東西方百神視感生帝南北方視嶽瀆皆以臘前一日祭之庚寅祕閣修撰都大提舉四川茶馬公事韓球與直祕閣知䕫州符行中兩易癸巳慶逺軍節度使知襄陽府張澄知洪州敷文閣直學士提舉江州太平興國宫魏良臣知廬州甲午建康諸軍都統制王權言揀汰兵數上曰諸軍闕額湏令招填不然恐傷兵數自今令具已招之數申樞宻院直龍圖閣知婺州錢端禮罷端禮與右奉議郎通判州事吕忱中互訴故皆黜之丙申大理少卿許大英面對論監司守令以私己之怒囚無辜於獄中名曰寄禁乞令憲臣稽察詔申嚴行下丁酉龍神衞四廂都指揮使宣州觀察使殿前司選鋒軍統制劉寳為捧日天武四廂都指揮使武泰軍承宣使録平閩盗之功也其将校軍兵義兵三千一百七十人各遷官及減磨勘年有差己亥秦檜奏以敷文閣直學士吴表臣知婺州檜言比年外患已寧惟郡守得人則奉行徳意民被實恵上曰然在謹擇之庚子金主使龍虎衛上將軍殿前左副都㸃檢唐古徳温昭武大将軍四方館使髙居安来賀天申節丁未左承議郎王大寳知連州代還言連英循恵新恩六州居民才數百非商販之地月輸免行錢望更審量裁減上謂大臣曰守臣上殿令以民事奏陳遂得知民間疾苦所陳五六得一可行為利不細乃命本路漕司具合減數申省大寳潮陽人也庚戍左中大夫提舉台州崇道觀樊賔卒六月辛亥朔户部員外郎周荘仲面對言浙西積水之患平江為甚平江秋苖三十四萬石以積水蠲放者嵗三之一積水之處皆昔日膏腴之地望委常平官督責令佐多方勸誘修築成田如民户不来即官為拘收召人請佃如此人當自勉不惟官得十萬而民間所得當數倍矣詔户部看詳申省故事宗廟時祠以宗室觀察使以上充初獻刺史以上充亞終獻其後以宗室數少乃請初獻以防禦使以上亞終獻以遥刺以上十二年十二月戊寅至是宗室正任止三人壬子大宗正司請權以遥團以上充初獻将軍以上充亞獻許之甲寅敷文閣直學士知廣州王鈇卒詔鈇帥司宣力賜其家銀帛五百匹兩令江西轉運司應副葬事集英殿修撰知福州薛弼移知廣州初以廣東羣盗尚多詔殿前司摧鋒軍統制官韓京戍梅循以彈壓因命為廣東馬步軍副總管提舉漳處吉州捉殺盜賊兼知循州久而未代秦檜慮其難制諭弼使圖之弼至南雄州京迎見弼即席諭之京乞罷遂遣人衞京出嶺亟命武功大夫張寧馳入戍所以統其軍此以熊克小歴修入克止云亟命别将而無其名以日歴考之代韓京為摧鋒軍統制者張寧盖寧自閩中從弼入嶺也丁巳左廸功郎王庭珪特勒停送辰州編管庭珪安福人胡銓之貶也庭珪為衡州茶陵縣丞以詩送之有曰癡兒不了公家事男子要為天下竒銓鄉人歐陽安永告之以為謗訕朝政事下䖍吉兩郡而守臣曽慥王珉江西路提㸃刑獄公事李芝不切究之㑹芝奉祠直祕閣林大聲代芝提㸃刑獄亦寢其事敷文閣待制沈昭逺知洪州白發之時大聲已去而昭逺與降授右朝議大夫江西轉運副使勾光祖以他事交章俱罷庭珪遂坐貶久之慥珉芝大聲與兩郡倅左中大夫吳温彦石承議郎杜師伋皆坐降一官温彦徳州人也大聲以十八年閏八月罷江西提刑昭逺光祖以今年五月己亥罷帥及漕慥等以二十一年八月癸酉降官今聨書之胡銓自䟦戒諭和議詔書序此事乃云太守吳温彦運使林大聲贛守曽慥皆小誤也戊午太師尚書左僕射提舉詳定一司𠡠令秦檜上吏部續降七司通用法四百三十五巻辛酉右朝奉郎朱同知南雄州代還言嶺南無醫凡有疾病但求巫祝鬼束手待斃望取古今名方治瘴氣者集為一書頒下本路從之熊克小歴載此事於辛亥朔盖誤壬戌徽猷閣直學士提舉江州太平興國宫沈晦徽猷閣待制提舉江州太平興國宫林保卒癸亥左朝請郎趙善瑛知封州代還論廣東諸州田税不足嵗用自祖宗以来不問有無田産常計丁嵗納身米以補常賦每有收免丁者於見納米人均増均減其法甚備今来州縣奉行不䖍隠落白丁不可勝計使見納丁米之人無從均減望令專一置籍記其丁口每嵗稽考庶㡬課役均一詔户部措置右宣教郎直祕閣髙百之提舉兩浙路市舶乙丑和安大夫髙州防禦使診御脉樊和彦令臨安府差人管押出門於處州居住坐用藥紕繆也此項未知與紹興三十一年八月辛亥杜起莘論王繼先等十罪有無相闗當考己巳龍神衞四廂都指揮使定江軍承宣使主管侍衞步軍司公事趙宻為崇信軍節度使辛未刑部員外郎章燾面對論州縣推鞫追逮干證之弊詔申嚴行下壬申殿中侍御史曹筠入對論溧陽知縣馮廸徳長洲知縣尹機前任不法事機趙鼎客也機已見紹興六年二月癸酉進呈上曰二人罪頗大可令取勘俟案上當重責之甲戍兩浙轉運判官提領營田曹泳言根括得鎮江府荒田二千二百餘頃望悉以為營田從之刑部員外郎湯允恭面對乞戒有司凡制獄具並依成式長吏親閱用印方得行使詔申嚴行下丙子上謂大臣曰閩中盗已漸弭惟海道間有作過可諭帥憲察廵尉之不可仗者代之左朝請大夫王普添差通判邵州代范如珪也二人嘗官館學為秦檜所怒終其身以郡倅處之丁丑龍神衛四廂都指揮使建武軍承宣使主管侍衛馬軍司公事田晟添差兩浙西路馬步軍副都總管請給與免借減捧日天武四廂都指揮使武泰軍承宣使殿前司選鋒軍統制劉寳主管侍衛馬軍司公事右宣教郎直敷文閣秦塤進職一等塤妹孺人秦氏特封令人以檜進書恩回授也建炎以來繫年要錄巻一百五十九建炎以來繫年要録巻一百五十九金人地名考證尼瑪哈原書作粘罕誤改見巻一唐古原書作唐括今改正
