body:
  text: 建炎以來繫年要録巻五十七宋李心傳撰紹興二年八月按是月戊子朔庚寅上諭輔臣曰今巨盗悉平年穀豐稔天意可知假如冦或南來避與不避策將安岀吕頥浩曰若盡遣諸將向前廣為備禦冦豈能便渡江但當先為定計以待之上曰未聞千里而畏人者也起居舎人張燾言自古未有不知敵人之情而能勝者願詔大臣諸將厚爵賞以募可用之人遣徃伺賊撫養家屬以繫其心資之財本或使為商或為技藝以混其迹庻得其誠心盡其死力凡敵人動静皆審知之則戰守進退在我有備彼尚安得出吾不意以輕犯吾行闕如前日詔以付都督府及沿江諸帥右宣義郎通判興化軍劉子翬主管建州武夷山冲佑觀子翬韐少子有學行以毁瘠不堪吏責棄官去讀書武夷山中左從政郎魏良臣為􅃯令所刪定官良臣初除密編避諱改刪定壬辰參知政事福建等路宣撫使孟庾兼權同都督江淮荆浙諸軍事觀文殿學士朱勝非復知紹興府先是吕頥浩自江上還欲傾秦檜而未得其要過平江守臣席益謂之曰目為黨可也然黨魁在𤨏闥當先去之頥浩大喜乃引勝非為助故以勝非同都督諸軍事給事中胡安國言勝非與黄潜善汪伯彦同在政府緘黙附㑹馴致渡江至今人心追恨未冺南狩倉皇國勢岌岌凡下詔令當本至公以收潰散之情冀安天歩乃尊用張邦昌結好金國許其子孫皆得叙録淪滅三綱天下憤鬱若謂事由潜善已不與知此大事也亦可從乎及正位冢司苖劉肆逆貪生茍容辱逮君父以此三者觀之勝非忠邪賢否斷可見矣方今敵偽交窺不忘東向㳂江都督極天下之選用人得失係國家之安危深恐勝非上誤大計上親劄諭以用勝非之意且謂昨逆傳作亂而勝非卒調䕶於内使勤王之師得以致力矧今諸將皆同功一體之人必能為朕克濟事功丁寧雖至而論者未已侍御史江躋亦奏勝非不知兵是日安國入對因論京都圍城中人乞再行遣仍薦李綱可用上問安國所以知綱安國曰綱為小官宣政間敢言水灾事上曰綱固以此得時望然嘗用為宰相矣如綱昔擁重兵解太原圍與官屬只在懐州相去千餘里綱多掠世俗虛美協比成朋朕今畀以方面於綱任亦不輕翌日上以語輔臣頥浩曰朋比之風自蔡京始靖康伏闕薦綱亦本其黨鼓倡乃至殺戮近侍莫可止遏此風不可再也癸巳提㸃鑄錢司言江池殘破逺渉大江乞權就䖍饒二州併工皷鑄許之舊制江池饒建四郡歲鑄錢百三十萬緡以贍中都江州二十四萬池州三十四萬餘饒州四十六萬餘建州二十五萬餘共役兵三千八百餘人其後皆不登此數至是併廣寧監於䖍州永豐監於饒州是歲鑄錢纔八萬緡順昌盗余勝等作亂左承議郎通判南劍州王元鼎督兵將捕殺之詔遷一官甲午詔韓世忠蕩平諸冦連奏大㨗已加優擢其告内外諸軍統制官各務立功報國共濟中興以光史册時言者以為今日理財治兵最為急務如鎮江建康江湖皆以大帥總重兵又命宰執都督諸路措置規模已漸可觀望陛下乗此機㑹更遣侍從官提振江上與大將周旋於金鼓矢石之間同力捍禦詔侍從官願行者聽於是給事中胡安國言提振者提領振舉之稱必有事權乃可今長江表裏悉命宰臣都督執政權領次則有宣撫劉光世在鎮江韓世忠在建康侍從官徃詣軍前若只遵約束即為虛行若别授事權又非特命宰執專制閫外之意况人主近臣入則陪侍出則扈從今逺去觀闕誠非所宜以臣所見其說不可用也給事中程瑀論事不合以親老求去罷為龍圖閣待制知信州給事中胡安國言今國勢未安朝廷微弱所賴以振頽綱消隠慝者衆君子耳如瑀志節特持議論剛正有補於時蓋知臣莫若君不待臣言而後諭也陛下方將與多士圖維萬務共濟艱難憐瑀之私處以便郡使養其親為瑀計則厚矣其為陛下計無乃失乎况瑀兄弟數人家居侍奉鄉邦非逺安問易通移孝為忠於義無闕詔瑀令日下依舊供職詔江東西福建路帥憲臣同共措置石陂軍賊限一月須管剿盡先是石陂卒饒青姚逹等作亂湖北安撫司後軍統制官顔孝恭掩殺逹統領官徐慶射殺青其徒李寶等走梅州境上既又聚衆千餘復作亂椎埋建昌汀邵間守臣朱芾以聞時神武前軍統領官申世景屯邵武孝恭屯建昌猶不能制左司諫吳表臣奏兩路憲臣互相推避不肯專一措置故命帥憲六人督捕樞密院又請降旗榜招安近歲官吏坐贓抵死之人率皆貸配故犯法者滋多至是錢塘縣吏樂振受賄當死詔論如律其徒始駭懼大理寺丞姚焯因請以振刑名頒下諸州從之詔通進司令檢正官檢察用黄龜年請也乙未皇伯寧州觀察使安定郡王令話薨贈開府儀同三司輟一日朝言者論比年編伍之民累經兵戰習其伎能徃徃保社相聨乗間邀擊賊不敢犯今數路分屯㳂海設備縱有百萬精銳之師亦不能徧給儻能激勸土豪使之訓習數年之後民兵之勢既成即黥刺之法可以漸變詔諸州守臣隨鄉土之宜措置丙申左司諫吳表臣言時方艱危州郡獲全者無幾正賴賢守以循撫之望用藝祖漢宣帝唐太宗眀皇故事應郡守初自行在除授及代歸赴闕者並令引對一則眀示朝廷謹重郡守之意使之盡心二則可以揣知其人之賢否與其才之所堪從而褒黜三則自外來者可詢其所以為政與民情風俗之所安而下情上通不至壅蔽輔臣進呈上曰郡守民之師帥若不得人千里受弊宜從之詔釐務官並免轉對竢來年三月取㫖宣撫處置使張浚奏知興元府王庻與陕西都統制呉玠金均房州鎮撫使王彦皆以職事不相協和深恐有誤國事臣以便宜將庻與知成都府王似兩易其任庻幾將帥一心相為犄角併力合謀以定興復從之時庻已得罪而似既還成都朝廷蓋未知也戊戌觀文殿學士知紹興府朱勝非提舉醴泉觀兼侍讀是日吕頥浩進呈勝非還任上曰勝非入相三日值苗劉作亂當時調䕶有力朕豈不知近因罷同都督士人疏論勝非功甚多惟一二臺諫不與可除在京宫觀留侍經筵蓋頥浩必欲引勝非故有此命頥浩恐胡安國持録黄不下特命中書門下省檢正諸房公事黄龜年書行安國言由臣愚陋致朝廷過舉侵紊官制隳壊紀綱孟子曰有官守者不得其職則去臣待罪五旬毫髮無補既失其職當去甚眀况勝非係臣論列之人今朝廷乃稱其處苖劉時能調䕶聖躬即與向來詔㫖責詞是非乖異昔公羊氏以祭仲廢君為行權先儒力排其說蓋權宜廢置非所施於君父春秋大法尤謹於此自建炎改元凡失節者非特釋而不問又加進擢習俗既成大非君父之便臣䝉睿奬方俾以春秋入侍而與勝非為列有違經訓儻貪禄位不顧曠官縱臣無恥公論謂何不報遂卧家不出詔選人充樞密院計議編修官到任一年進士通理四考餘人五考並與改京官初命㳂海州軍籍定民間海舟每縣分為三畨各當一年周而復始其當畨年分而輙徃它路者抵罪拘其船入官論者以海道頻年籍客舟把隘失業者多故有是㫖顯謨閣待制提舉江州太平觀董正封卒正封耘叔父也己亥吕頥浩奏諜報敵中造舟簽軍若果来侵其山東江北人豈有戰心如使劉光世張榮設伏兵於承楚要害地邀擊可以大破敵衆上曰可招可擊秦檜曰不戰何以休兵上曰朕觀自古中興之主何嘗坐致成功給事中兼侍讀胡安國言自古聖王雖用文徳必有親兵專掌宿衛成王即政周公指虎賁與常伯同戒于王欲其知恤虎賁者猶今侍衛親軍也康王初立太保俾齊侯吕伋以虎賁百人逆于南門吕伋者太公望子自諸侯入典親兵猶今殿前馬歩軍都帥也勲徳世臣總司禁旅虎賁銳士宿衛王宫其為國家慮深逺矣本朝鑒觀前代命三衙分掌親軍雖崇寧間舊規猶在及至髙俅得用軍政廢弛遂以陵替陛下嗣承寶位謀國者不思復古親兵寡弱宿衛單少豈尊君彊本消患預防之計也伏望考祖宗選擇禁旅之法修眀軍政威服四方上嚴宸極詔三衙措置孔彦舟之叛也尚書考功員外郎宣撫處置使司主管機宜文字傅雱坐久在彦舟軍中責監興化軍商稅至是停其官英州覊管詔大理正斷刑治獄丞七員並堂除以吏部員外郎劉岑言逐闕資望甚髙異時郎曹理卿之選元豐年雖係部闕見今久無應格之人故也庚子給事中程瑀言孟庾同都督之命物論良以為允然已廹防秋乞不俟其奏事趣令開府庻合事宜詔庾同韓世忠總大兵至建康訖赴行在奏事尋詔庾更辟官屬事從便宜自世忠以下並聽節制入内東頭供奉官鄭諶還所寄資為武功大夫英州刺史帶御器械諶頗能書上命書盤庚無逸詩之車攻篇孝經孝治章列于左右嘗以諭輔臣辛丑左司諌吳表臣言大江之南上自荆鄂下至常潤不過十郡之間其要𦂳處不過七渡上流最急者三荆南之公安石首岳之北津中流最𦂳者二鄂之武昌太平之采石下流最𦂳者二建康之宣化鎮江之𤓰洲是也惟此七渡當擇官兵修器械其餘數十處或道路迂曲或水陸不便非大軍徃來徑㨗之處略為之防足矣又十郡之間地不過三千餘里有一州占江面五百里者有占百餘里者逺近多寡勞逸大不均如七處渡口外冝每縣分定百里專令巡尉守之則力均而易守詔以付㳂江守帥初命尚書倉部員外郎成大亨等四人催督江浙諸路夏稅物帛而使者以趣辦為功至有五月初已到行在論者以為擾民於是前所降州縣催督官吏及受納管押等官推賞指揮並罷先㫖在二月二十三日乙酉日歴不書中書言東南州縣鄉兵多因私置紙甲而嘯聚作過熈寧編敕令有若私造紙甲五領者絞乞著為令從之癸夘上出所書孝經以示輔臣初置宰執已下待漏院於行宫南門之外淮東宣撫使劉光世言通問使朝奉郎王倫還自金國始朝廷遣人使金自宇文虛中之後率募小臣或布衣借官以行如倫及朱弁魏行可崔縱洪皓張邵孫悟輩皆為所拘既而金左副元帥宗維在雲中遣都㸃檢烏凌阿思謀至館中言息兵議和之意俾倫南歸須使人徃議宗維貽上書略云既欲不絶祭祀豈肯過於恡愛使不成國書語以王繪甲寅講和録増入於是皓弁皆得以家問附倫而歸倫至東京與劉豫相見豫遣偽閤門宣賛舍人馬某伴押至境上光世以聞詔倫赴行在甲辰詔武臣遥郡已上非統兵戰守者並依靖康指揮減本俸之半靖康元年二月癸亥减三分之一七月辛未又减四分之一内管軍及宗室節度使月廩權依六曹尚書承宣使依侍郎觀察使依給舍防團依郎官例支破户部申眀諸路總管鈐轄已下雖號兵官坐請俸給即不應全支從之初命浙西大帥劉光世屯銳兵五千于維揚光世以乏糧為詞不奉詔言者屢奏趣之給事中程瑀亦言三國東晉雖各保長江實宿重兵於淮南今光世未移兵渡江誠恐真揚楚泗見屯不多敵衆或渡淮則淮南為所蹂踐江浙必震時光世方遣人按行冝興湖洑之間以備退保議者恐揺人心請令光世扼險抗賊詔以章示光世光世卒不為之遣也論不當退保在此月丙午今聨書之乙巳徳安圍解李横自夏來圍徳安未嘗攻城㑹戰惟於城之西北隅造天橋成填濠皆畢乃鼓衆臨城鎮撫使陳規率軍民乗城禦之規坐城樓為砲折其足指容色不變圍益急糧餉不繼諸將請殺牛以代軍食規曰殺牛代食事窮矣因出家財以勞軍士氣益振孝感令韓遹來告曰縣有粟百斛路梗不能通㑹大風雨規命乗勢呵殿而來賊軍疑其有神卒不敢擊規以書求援于朝未報横遣人來願得府之妓女而罷軍規不可諸將曰圍城七十日矣以一婦人活一城之衆不亦可乎規曰使横即退是我以婦人求和况得之而未必退乎卒不予時横填壕不實而天橋陷規以六十人持火槍自西門出焚其天橋城上以火牛助之倏忽皆盡横拔寨遁去先一日詔以横及隨州李道鄧州桑立不受偽檄各進二官後六日朝廷得規奏命江西大帥李回遣兵援之而圍已解矣規奏以此月庚戌至行在日歴李回申徳安府八月十九日解圍而趙甡之遺史在乙巳實差一日蓋横夜引兵還丙午乃覺之也今從遺史丙午秘書丞李靄試監察御史戊申給事中兼侍讀胡安國罷安國以論朱勝非不從力求去勝非皇恐亦上㑹稽印走傍郡乞奉祠詔曰禮義不愆於人言而奚恤君臣無間於大體以何傷章十數上卒不許吕頥浩言於上是日詔安國屢召偃蹇不至今始造朝又數有請初言勝非不可任以同都督改命經筵又以為非豈不以時方艱難不肯致身盡瘁乃欲求㣲罪而出其自為謀則善矣百官象之又如國計何可落職提舉建昌軍仙都觀右僕射秦檜三上章乞留安國不報遂家居不出己酉以中書門下省檢正諸房公事黄龜年為殿中侍御史尚書右司員外郎劉棐行右司諫頥浩用二人將以逐檜也庚戌侍御史江躋入對極言勝非不可用安國不當責上不聽左司諫呉表臣上疏言安國扶疾見君亦欲行其所學今無故罪去非所以示天下也奏皆寢是日給事中兼侍講程瑀亦罷為龍圖閣待制知信州自是臺省相繼出矣瑀之罷日歴不書按此月辛亥方誾權給事中必以瑀補外故也今附此詔萬夀觀併歸景靈宫提舉官保静軍承宣使髙世則令任便居住此似為秦檜當考汀州童子萬頃年十歲能誦經子書上召見于内殿頃記誦如流自言能詩上指金唾壺為題筆閣不下上猶嘉其敏命為文林郎仍賜名嚴中興聖政庚戌大理少卿張宗臣奏風塵未静冦盗間作州郡兵器朘削殆盡作院旬呈之法僅成虛文漕計闕乏不復給物料之直工匠散充他役今兵器闕少將使數百疲卒束手臨敵此必不可冝行下諸路嚴責州郡凡軍器物料速給其直工匠不許他役監司察其滅裂者帥司或大軍取索先足本州合用之數方許給其餘詔從之臣留正等曰軍政之不修莫甚於今日之郡國也郡國之有兵所以為民人社稷之衛今乃與皂𨽻雜處轉移執事之不暇未始一迹於閱武之場吏亦習熟見聞以戎器為長物宜其所儲有名無實而僅存者蠹折斷爛尤可傳笑噫以甲仗名庫者茍欲備儀注而已耶則誠不必問儻曰民人社稷之衛在焉不可以無一旦不虞之備則安得置而弗憂宜太上皇帝以是而力責州郡也邇者聖上克遵成訓益勵戎威申命諸道主兵官専任閱習凡器械之刓蠹不備者皆有程督將繕治而一新之豈止於吳人之犀渠魯人之貝胄而已哉在易萃之大象曰除戎器戒不虞蓋國家閒暇之時而能不忘舉此然後見聖人之政云辛亥右承奉郎簽書桂陽監判官㕔公事范寅秩以招降諸盗李冬至二等李冬至二初見元年二月戊辰詔進二官通判全州冬至二者起於宜章連犯湖廣數郡踰年乃平寅秩致虛子也南雄盗鄧慶鄧慶初見元年六月甲午吳忠忠初見元年六月庚寅聚衆千餘州兵不能制守臣奏江西統制官傅樞在南安軍去本州纔九十里願得其兵擊賊詔樞總兵累年縻費錢糧未嘗立功當躬率所部兵討賊如敢逗遛重寘典憲既而樞捕忠之黨劉軍一其餘皆平之傅樞擒劉軍一以紹興四年五月二十五日田如鼇乞推賞狀修入樞密院統制范温以所部至東海軍温在萊州福島五年至是食盡遂與其徒二千六百餘人泛海來歸朝論嘉其忠詔温以舟師屯青龍鎮屯青龍鎮在九月戊寅降㫖是日侍御史江躋左司諫吳表臣並罷中書舍人陳與義兼權起居郎尚書都官郎中方誾兼權檢正諸房公事兼權給事中壬子龍圖閣待制新知信州程瑀中書舍人胡世將起居郎劉一止起居舍人張燾尚書左司員外郎林待聘右司員外郎樓炤並落職與宫觀皆坐秦檜黨為吕頥浩所斥也自是臺省一空矣此以胡寅撰其父安國行狀參修但寅云頥浩出瑀等二十餘人以應天變除舊布新之意恐誤蓋彗出在甲寅夜此時彗未出也朱勝非家傳云言路論公不知兵胡安國亦以為非所宜上怒與封駁者俱逐凡十三人以日歴考之胡安國程瑀胡世將劉一止張燾林待聘樓炤張觷潘特竦鄭朴陳淵與秦檜凡十二人此外更有楊愿王鈇王㬇王昞王守道五人而愿守道為計議官或通指此二人為十三而檜又不在其數也當考武功大夫柴春知楚州用劉光世奏也癸丑詔職事官輪對已周復令轉對右通直郎新江南東路提舉常平茶鹽公事王鈇罷坐秦檜親黨也直秘閣知鼎州程昌㝢復直龍圖閣賜銀合茶藥詔以昌㝢守鼎累年屢以孤軍禦冦忠力顯著可復舊職仍遣内侍撫問昌㝢為秦檜所黜故吕頥浩薦之諜報金人欲犯川陜輔臣言關外已有大兵惟歸峽係川路後門宜屯重兵為備詔張浚措置甲寅尚書右僕射同中書門下平章事兼知樞密院事秦檜罷為觀文殿學士提舉江州太平觀檜與左僕射吕頥浩不諧頥浩既引朱勝非還朝復自内批令日赴都堂議事位知樞密院事上欲以逼檜㑹邊報王倫來歸殿中侍御史黄龜年因劾檜專主和議沮止國家恢復逺圖且植黨專權漸不可長檜即上章辭位上未許前一日頥浩與參知政事權邦彦留身上前復言檜之短上乃召兵部侍郎兼直學士院綦崈禮入對出檜所獻二策大略欲以河北人還金中原人還劉豫如斯而已上謂崈禮曰檜言南人歸南北人歸北朕北人將安歸又檜言臣為相數月可使聳動天下今無聞崈禮請御筆付院上即索紙書付崈禮崈禮退未至院而麻制已成翌日制責檜曰自詭得權而舉事當聳動於四方逮兹居位以陳謀首建眀於二策罔燭厥理殊乖素期念方委聽之專更責寅恭之效而乃慿恃其黨排擯所憎豈實汝心殆為衆誤顧竊弄於威柄慮或長於姦朋檜既免上乃諭朝廷終不復用仍榜朝堂檜入相凡一年秦檜罷相事迹史極不詳其罷相制今洪遵所編中興玉堂制草亦無之王眀清以為皆檜擅政時焚滅當有此理也熊克小歴但云上召學士示以檜疏而不云有御札及榜朝堂今從趙甡之遺史按史學士所受御札後復取索則甡之所云不誣矣檜自辨奏云吕頥浩都督在外臣又奏遣北人招討都監門客通書求好未幾邊報王倫來歸頥浩欲攘以歸已援朱勝非來朝此所云又與黄龜年劾疏全不同不知何故檜自辨全章見二十三年七月戊戌又中興聖政龜鑑曰秦檜何人哉既出宗尹而奪之位出頥浩而專其權昌言二䇿可聳四方及上二䇿專為金計南自南北自北此何語也而斷然與天子言之王居正有言檜自請為相必驚動天下今設施乃止於是置修政局所修何政實欲奪同列之權宜乎曽統有何以局為之譏也既而頥浩視師還朝以傾檜御史黄龜年之論奏一行檜于是下章辭位矣考紹興三四年間國勢乍張而復沮敵勢既懾而復肆者秦檜禍國之胎已萌於此也詔珍禽花木毋入臨安諸門降徽猷閣待制新知台州王昂為秘閣修撰主管江州太平觀亦以秦檜所引故也主管大内公事知尚書内省提舉十閣分嘉國夫人朱氏薨朱氏開封人治平間自襁褓入宫建炎末從衛徃江西數遭冦盗及是年六十餘而薨夜四更彗出于胃上憂之命大官進素膳中興聖政宰執言所次分野甚逺上曰今不論齊魯燕趙之分天象示譴朕敢不畏天之威也臣留正等曰天心之仁愛人君至出災異以譴告驚懼之者乃所以扶持而全安之也人君之得失蓋在此而臣下乃採占歩之術或推之於鄰國或驗之於將來是以姑息愛其君者爾星文變異太上皇帝不問齊魯燕趙之分惟知側身以修省而邇臣乃以所次甚逺為言其得失果何啻天淵也乙夘詔防秋屆期建康修大内可罷丙辰上以星變諭輔臣修闕政徽猷閣待制賈安宅落致仕試給事中徽猷閣待制新知宣州胡松年試中書舍人直秘閣主管江州太平觀趙思誠守起居郎尚書吏部員外郎王洋守起居舍人思誠眀誠兄也樞密院計議官楊愿罷先已召愿試館職及是斥之既而右司諫劉棐論愿初係右職出身乃令換武言者又論廖剛嘗匿母喪從林待聘求為給事中詔剛落職待聘自左奉議郎主管江州太平觀責監郴州商稅久之愿自陳本上舍登第監察御史眀橐亦論剛未嘗匿服求遷乃復令改正剛以五年正月癸亥得㫖改正同日待聘依赦與本等差遣愿以五年七月壬申得㫖改正建炎以來繫年要錄巻五十七建炎以來繫年要録巻五十七金人地名考證烏凌阿原書作烏陵誤改見巻一
