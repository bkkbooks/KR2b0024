body:
  text: 建炎以来繫年要録巻五十二宋李心傳撰紹興二年三月壬辰朔詔襄隋郢等州鎮撫使兼節制應援京城軍馬桑仲量度事勢乗時収復䧟沒諸郡仍令河南翟興荆南解潜金房王彦徳安陳規蘄黄孔彦舟廬夀王亨更相應援毋失機㑹如能成功當議不次推賞仲除節制軍馬未見本月日或可附去年乞幸荆南之後尚書左司員外郎潘良貴以父老乞補外乃除直龍圖閣知嚴州責授昭信軍節度副使徐秉哲送恵州昭化軍節度副使吴幵南雄州寧江軍節度副使莫儔韶州並居住先是秉哲等既以赦得還而儔遣人詣皷院自陳上皇出郊之日已方在敵營不預其事乞改正户部侍郎栁約奏今二聖逺在沙漠而秉哲等復居善地言之至此陛下寧不動心縦未忍加誅亦宜永竄遐荒以為萬世臣子之戒故有是命䖍化縣兇賊李敦仁補正修武郎閤門祇候其徒三十八人皆授官分𨽻張浚等軍中敦仁起書生為盗三嵗蹂四州十縣最後為江東統制官顔子恭所破至是始平淮西招撫使李光執江東安撫大使司都統制韓世清于宣州初光與副使王􅊛将忠鋭神武軍合萬餘以辛夘晦抵城下時日已暮隔溪而營世清将迎謁其壕寨将曰不可李尚書往淮西而下寨甚嚴非過軍也必有謀耳世清曰我何罪遂将親兵千餘人来謁是夜光與􅊛共議翌日世清率諸将来賀月旦守臣具食􅊛先以甲士守其從者光謂世清曰得㫖揀軍往淮西可批報諸軍令素隊出城世清欲上馬馬已持去光命持黄榜入城統領官楊明吉榮聞之諭其徒擐甲毋出世清不得已批報諸軍衆乃聽命擇其壮者五千餘人後𨽻神武前軍餘許自便光又得世清所用舟九百艘帛七千匹遂執世清以歸其中軍統領官趙琦先以精鋭二千討賊于建昌亦命琦赴行在熊克小歴云世清在江東弹壓有勞民間惟恐其去至畫像祠之時吕頥浩方招安張琪而世清襲擊琪破之頥浩以世清壊其事故不樂後徽人翟汝揭在言路嘗欲為世清辯白而未果今敷文閣直學士程大昌亦徽人知其事嘗為克言之按日歴頥浩未相時上屢以諭范宗尹則當時言世清可疑者不特頥浩也然世清彈壓有功亦未可知如李光王􅊛所奏揀散事亦不言其拒命可見世清初無反意但迹可疑耳今併附此是日水賊翟進犯漢陽軍殺武功大夫權軍事趙令戣及吏民百餘人掠舟船而去遂以其衆歸于蘄黄鎮撫使孔彦舟此以今年五月七日徳安鎮撫司所奏修入癸巳詔温州太廟百步内遺火者徒二年尚書司封員外郎林待聘為禮部員外郎左朝奉郎張燾為司封員外郎詔以朱勔平江南園地賜孟忠厚責授果州别駕顔博文乞以赦叙權刑部侍郎王衣擬叙奉議郎與差遣而吏部侍郎綦崈禮言博文嘗撰偽椘赦書今使之通籍朝端公議未允乃詔博文永不収叙日歴刑吏部並無名按此時吏部尚書李光出使而崈禮為左選侍郎必崈禮也甲午詔兩浙市舶就秀州華亭縣置司承直郎施逵除名婺州編管坐為范汝為游説辛企宗也初宣撫使孟庾械逵及招撫官謝嚮葉棠赴行在且言嚮等三人與汝為同情反叛殺戮生靈不可數計聞尚有人為之多方營救不知何意嚮棠未至都道死上益疑有為之地者下逵臺獄命中丞沈與求窮治二月丙子降㫖逵至獄因得以歸罪二人刑寺當逵依随企宗不多方措畫攻討追二官罰銅十斤案上特有是命熊克小歴云逵送逺郡覊管中途逸去按逵十月己丑再竄瓊州其逸去當在彼時今移附十月乙未江西安撫大使李回言湖東名賊曹成在道州馬友潭州李宏岳州劉忠處潭岳之間雖時相攻擊其實聞二宣撫之来隂相交結分布一路為互援之計馬友據潭州踰半年漕臣錢糧不得移用今朝廷以岳飛知潭州友安得不疑飛亦安能引兵直赴潭州與友共處若使飛先往道州捕曹成友必懐疑阻害糧饋則飛有腹背受敵之患不若且置成不問先引兵往袁州約友宏云討劉忠以俟二宣撫之来庶使成不便過嶺最為長䇿飛之将行也回既諭以此意復言于朝吕頥浩秦檜進呈因言湖廣大冦曹成為首馬友劉忠次之此數人相與交結為輔車相依之勢上曰宣撫司兵到必能平湖南諸冦續次令轉往湖北襄漢間以通川陜譬如漢髙祖先遣韓信破趙復破齊然後擒項籍乃詔飛斟量賊勢如未可進且駐袁州以俟世忠㑹兵時成已進犯嶺南飛亦移兵茶陵而朝廷未知也詔臨安府城内彊盗及縱火焚有人居止之室依開封府法治罪竊盗指揮在四年四月癸夘戊戌罷江淮發運司以其錢帛赴行在始祖宗時發運司嵗漕江湖粟六百萬斛即真揚楚泗州置轉般倉納受泝流摺運以贍中都且因諸路之凶豐而平其糴及是江湖盗冦多綱米不繼發運司嵗費錢十六七萬緡第軄糴買而已故省之八年四月復置資政殿學士江東安撫大使葉夢得提舉臨安府洞霄官吏部尚書李光充端眀殿學士江東安撫大使知建康府兼夀春府滁濠廬州無為軍宣撫使仍命光以親兵千人之任光奏直秘閣宗頴叅議官廸功郎胡珵主管機宜文字從之日歴葉夢得累乞宮觀可依所乞則是朝廷檢㑹行遣非固乞祠也熊克小歴亦不云所以案夢得之去恐是處置韓世清事與朝廷異論夢得以世清為大使司都統制不見於它書今年三月四日樞宻院勘㑹江東安撫大使司軍馬數多本路賦入有限兼都統制韓世清一軍人數稍衆已令淮西招撫使司因便前去揀汰據此則世清為夢得所用而朝廷廢之其罷帥事而代以李光或由此也今且附此更湏參考直秘閣知台州秦梓移知秀州是日右武大夫眀州觀察使襄陽府鄧隋郢州鎮撫使兼知襄陽府桑仲為知郢州霍眀所殺初仲屢為王彦所敗欲再攻金州鎮撫司副統制兼知鄧州李横曰不率三軍入西川即殺敵以圖報國勿坐困于此仲檄明曰金州草冦當道當盡勦除眀不從每報之曰不知金州草冦主名為誰安復鎮撫使陳規聞之亦遣人謂眀曰朝廷以郡授汝矣汝謹勿附仲仲怒隂有殺眀意眀措置郢州漸成井邑亦有戀郢之心仲以二十騎疾馳入郢州眀聞謂其黨曰大太尉来定見害眀度仲以駿馬日馳三百里髻必觧散預備有力者為之束髪坐定眀卑詞謝曰擇日即起兵豈敢違令事未湏遽莫要理髪否仲欣諾有力者既得其髻即擒而殺之囚其從者而以反聞後鎮撫司參謀官趙去疾歸朝得召見上問仲何如人去疾曰忠義人也上問其説去疾曰仲嘗為臣言必欲取京師以獻朝廷第乞二文資以禄其子上惻然感動授仲二子昕維将仕郎昕維以紹興三年二月戊子補承信郎既而去疾言維年七嵗已能誦論孟不類武人是月壬子並改補将仕郎今併附此己亥布衣王大智授右廸功郎添差樞宻院計議官吕頥浩言大智知兵法上召見便殿而命之制授故南越王李乾徳子陽煥静海軍節度使特進檢校太尉兼御史大夫上柱國封交阯郡王仍賜推誠順化功臣自元豐後大臣功號悉除之獨安南如故懐逺軍節度使占城國王楊卜麻疊懐逺軍節度使闍婆國王悉里地茶蘭固野大同軍節度使真臈國王金裒賔深皆加恩以眀堂故也右承事郎潘疇通判通州疇葆真宫道士也建炎中以從張浚勤王改京秩故以命之既而言者論其忝竊冒濫為搢紳羞命遂寢寢命在今年四月庚辰庚子户部尚書李彌大乞命近臣講求祖宗委任三司之意詔給舍看詳申省詔自今行軍専委本路漕臣一員通融應副議者以為随軍漕運出於一時故以州縣則不從其號令以運使則不恤其有無甚至搜求獻羡以為已功其弊有不可勝言者故有是命言者奏山東艱食而帛踴貴商人多市江浙米帛轉海而東一縑有至三十千者詔許告捕獲人補承信郎賞錢三千緡犯者依軍法廵捕官失察者抵罪是日陜西都統司同統制軍馬楊政及金人戰于方山原敗之時隴州移治方山原守将范綜以散卒數千駐原上金人所命陜西經略使薩里罕與叛将張中彦慕容洧合兵来攻陜西都統制吴玠命政及吴璘雷仲救之大戰三日焚其水寨翌日敵引去政臨涇人初為弓箭手驍勇過人玠用為統制宣撫處置使張浚録其功擢政知鳯州辛丑鑄紹興經筵印淮東提㸃刑獄公事兼營田副使王實言根括到揚州未種水田一萬七千頃陸田一萬三千頃已分給六軍趂時耕種從之直秘閣王㬇提㸃江淮等路坑冶鑄錢丙午復置中書門下省檢正官一員熊克小歴在二月丁丑今從日歴以尚書右司員外郎仇悆為中書門下省檢正諸房公事直龍圖閣江淮發運副使姚舜明為左司郎中監察御史胡世将守右司員外郎資政殿學士知紹興府張守請朝昭慈獻烈皇后攅宫許之自是以為例詔雲安軍覊管人謝亮許自便以嘗使夏國也戊申降授武顯大夫威州防禦使江東安撫大使司統制軍馬張俊叙所降一官俊起諸盗所部凡七千餘人至是汰其老弱僅三千朝廷嘉之乃有是命詔淮南諸州通判到罷並進秩一等以廬州有請也己酉左武大夫滎州團練使權神武中軍統制巨師古復為神武後軍統制中侍大夫宻州觀察神武右軍中部統制楊沂中為神武中軍統制兼提舉宿衞親兵時衞兵不滿三千沂中病其寡弱於是招丁壮營牧圉未半嵗軍容果張由是上益眷之詔孟庾韓世忠至荆湖日應措置事務合從本司施行候将来班師令李綱措置庾初受命宣撫福建江西荆湖三路而朝議恐曹成度嶺故命綱自閩廣之長沙庾言措置相妨乃有是命始吴敏之未罷也上奏言曹成雖已受招隂縱擄掠臣見在桂州措置縁止係廣西軍馬事力至薄望促庾世忠或别遣大将前来於是庾已發福州而敏未知也濠州守将冦宏獲偽知虹縣李子誠赴行在詔給以資糧遣還偽境臨安府布衣孫清上疏論時事詔賜束帛賜鄭億年家錢千緡以其妻韓氏卒于台州故也追奪謝嚮葉棠出身以来告𠡠廢潮州掲陽縣縣海陽地也宣和中以劉花三作亂析置至是省之辛亥承節郎閤門祗候張莘幹辦御輦院莘媫妤弟也壬子左朝奉大夫趙霈行太常博士霈抃孫也初泉州花鄭貴等謀作亂為賈人湯易所告捕斬之至是以易為承信郎癸丑詔寛兩淮租税户部尚書李彌大言道路無阻諸路上供錢糧並依限起發赴行在許之童子朱虎臣七嵗能誦七書排陣歩射與其兄端友偕来上召對于内殿端友以誦經子書賜束帛而虎臣為承信郎虎臣浮梁人也樞宻院水軍統制官張崇李允文部曲也有衆僅五千詔揀其精銳三千五百人𨽻李光即建康屯駐龍圖閣待制知漳州黎確左朝奉郎知台州徐偉逹並罷以言者論其在圍城中受偽命也確仍奪職江西提㸃刑獄公事董濬罷殿中侍御史江躋論濬當蔡京用事時嘗撰蔡命三篇以事進取在㑹稽又嘗􅀞中興圖以獻故斥之閤門宣賛舍人知澤州盧師廸自建炎初結連山寨豪傑至是五年上在㑹稽師廸與其徒赴行在請兵収復河東州縣上命往張浚軍中俟路通之任師廸以非本計辭不行固請留紹興以俟命上許之師廸初見建炎四年八月戊子是日武功大夫忠州團練使閤門宣賛舍人河南府孟汝唐州鎮撫使知河南府兼節制應援河東北兵馬使翟興為其将官楊偉所殺初偽齊劉豫之将移都汴京也以興屯伊陽山寨憚之豫每遣人往陜西則假道於金人由懐衛太行取蒲津濟河以逹豫深苦之嘗遣廸功郎蒋頥持詔書遺興誘以王爵興戮頥而焚其書豫計不克行乃隂遣人㗖偉以厚利偉遂殺興携其首奔豫興死時年六十其子兵馬鈐轄琮収合餘兵退保故寨自是不復能軍事聞詔贈興為保信軍節度使興之死諸書不同張匯節要劉豫以翟興大軍屯伊陽去東京不逺及扼斷陜西道豫深患之故請於尼瑪哈期必破興㑹興將楊偉降具陳破興之計於是發女真萬户察罕瑪勒戍河朔多張聲勢揚言将攻興興遂出兵應之偉潜引賊兵由間道以襲興營興以大兵既出衆寡不敵力戰而死趙甡之遺史劉豫遣蒋頥持書遺興興戮頥於市豫計不行復誘興禆将楊偉隂約内應以謀害興是日賊兵徑犯中軍寨興親迎賊與戰遂䧟重圍中賊奮擊之興力戰不勝墜馬遇害熊克小歴全據張滙所云按日歴紹興二年七月十一日權河南鎮撫使翟琮奏父獨當一方前後百戰不敢辭難不幸於今年三月二十二日有本部将官楊偉隂懐姦狠遽然謀害先父身首異處提携首領叛投偽齊據所奏則興為偉所殺非戰死也甡之以為結偉内應此猶近之滙謂偉先降賊而後引兵襲興益非實矣克不詳考而遂因之今不取甲寅上䇿試諸路類試奏名進士于講殿上謂輔臣曰朕此舉将以作成人才為異日之用若其言鯁亮切直他日必端方不回之士自崇寧以来惡人敢言士氣不作流弊至今不可不革因手詔諭考官直言者置之髙等尤謟佞者居下列鹽官進士張九成對䇿曰禍難之作天所以開聖願陛下以剛大為心無遽以驚憂自阻彼劉豫者素無勲徳殊乏聲稱天下徒見其背叛於君親而委身於冦敵耳黠雛經營有同兒戲今日之計當先用越王之法以驕之使侈心肆意無所忌憚天其滅之将見權臣争强簒奪之禍起矣臣觀濵江郡縣為守令者類無逺圖陽羡恵山之民何其被酷之深也率歛之名種類閎大秋苖之外又有苖頭苖頭未已又行八折八折未已又曰大姓大姓竭矣又曰經實經實均矣又曰均敷均敷之外名字未易數也流離奔竄益以無聊臣竊謂前世中興之主大抵以剛徳為尚去䜛節慾逺佞防姦皆中興之本也中興綱目陛下之心臣得而知之方當春陽晝敷行宫别殿花氣紛紛竊想陛下念兩宫之在北邊塵沙漠漠不得共融和也其何安乎盛夏之際風牎水院凉氣凄清竊想陛下念兩宫之在北邊蠻氊擁蔽不得共此疎暢也亦何安乎澄江瀉練夜桂飄香陛下享此樂時必曰西風凄動兩宫得無憂乎狐裘温暖獸炭春紅陛下享此樂時必曰朔雪袤丈兩宫得無寒乎至於陳水陸飽珍竒必投筋而起曰鴈粉腥羊兩宫所不便世食其能下咽乎居廣厦具深宫必撫几而嘆曰窮廬區脱兩宫必難處也居其能安席乎今閭巷之人甿𨽻之伍皆知有父兄妻子之樂室家聚處之歡陛下雖貴為天子富有四海徒以金人之故使陛下冬不得其溫夏不得其凊昏無所於定晨無所於省問寝之私何時可遂乎在原之急何時可救乎日徃月来何時可歸乎望逺傷懐何時可釋乎每感時遇物想惟聖心雷厲天淚雨流思欲掃清蠻帳以迎二聖之車若夫小民則不然是以搜攪小蟲馳驅駿馬道路之言有若上誣聖徳者深察其源盖亦有自彼閹人私求禽馬動以陛下為名且閹寺聞名國之不祥也今此曹名字稍稍有聞此臣之所憂也賢士大夫宴見有時宦官女子實居前後有時者易疎前後者難間聖情荏苒不知其非不若使之安掃除之役復門户之司凡交結往来者有禁干與政事者必疎陛下日御便殿親近儒者講詩書之指趣論古今之成敗将聞閹寺之言如狐狸夜號而鴟梟晝舞也九成家傳云公對䇿言劉豫比之狐狸鴟梟豫怒手劒属客欲刺之乃與䇿語不同家傳小誤也上感其言擢九成第一餘杭凌景夏次之尚書左僕射吕頥浩言景夏之詞實勝九成欲以景夏為第一此以紹興五年六月戊午上諭大臣語修入上曰九成對䇿雖不甚工然上自朕躬下逮百執事之人無所回避擢寘首選誰謂不然中興綱目初上謂輔臣曰朕此舉将以作成人材為異日之用若其言鯁亮切直它日必端方不回之士自崇寧以来惡人敢言士氣不作流弊至今不可不革手詔諭考官直言者置之髙第謟諛者居于下列遂賜九成已下二百五十九人及第出身同出身而川陜類省試合格進士楊希仲等一百二十人皆即家賜第時舉人䇿有犯廟諱及文理紕繆者上命黜降又有犯御名者命収寘本等希仲視廷試第五人恩例餘皆同出身至助教凡七等特奏名入五等依揚州例許調官龍圖閣直學士致仕楊時遺九成書曰廷對自更科以来未之有非剛大之氣不為得䘮回屈不能為九成故樞宻直學士鑑曽孫希仲新津人公轍山隂人也時舉人陳之茂等十一人二人以犯諱降等九人以文理紕繆與諸州助教鎻㕔人右從事郎范寅賔樞宻院計議官楊愿等六人各進秩一等愿辭不受㝷詔助教人調官依特奏名例輔臣再請乃并文學人並附正甲之茂無錫人寅賔致虛徔子也愿己見建炎元年四月甲子鎖㕔遷官在五月甲子今併附書之唱第在四月丙寅今但書䇿試之日以便叙事日歴紹興二年四月戊寅後殿進呈新第正奏名助教乞依特奏名例推恩上曰初降㫖令考官以鯁正為上諛佞居下此以示朕好惡凡士人常湏自初進别其忠佞庶可冀其有立然而學子逺来朕悉務優容命助教九人者悉依特奏名例推恩如所謂五年七月庚寅殿中侍御史謝祖信奏紹興二年陳之茂等十九名為文理紕繆及犯名諱各補下州文學後来並附第五甲末前此與議以為紕繆之文乃縁觸犯忌諱之故其後大臣知之於是奏附正甲祖信所奏與日歴元降指揮全不同以進士同年小録考之是年第五甲後别有文學一十一人係陳之茂至陳宗周下注同進士出身則是果附正甲也但日歴遺之耳然日歴稱助敎九人依特奏名例而文學乃有十一人數又不同按日歴四月丙寅殿試進士有犯廟諱者上曰犯宗廟諱當依格降等然則九人之外又有犯諱降等者二人故祖信所奏合紕繆又犯名諱之人通言之也日歴載祖信奏状作一十九人疑傳寫字誤當求别本參考取中興聖政臣留正等曰自鄉舉里選之法壊而設科士之制行鄉舉里選務觀其行設科取士獨考其言其事若不相同而皆可以得賢亦各一時之宜也故嘗謂觀其行則必其行之至純考其言則必其言之不詭若使諛佞之言得以進則是汙穢之行亦可容為法以取士顧宜如是乎然而以董仲舒之賢猶有不切之譏若劉蕡之直則有不第之恨道之艱於自信與夫難於必行也尚矣非上之人有以優容之何以作成士氣而収其顯效太上皇帝之䇿士以鯁正為上諛佞為下言之切直無所囘避者必寘之首選至犯御名者又曰免降黜其優容也如是何患於不得其人乎秘書少監兼權吏部侍郎傅崧卿宣諭淮東還入見神武前軍統制王􅊛自宣州還行在賜銀帛五百匹兩其将士皆賜銀有差先是􅊛一軍凡萬二千三百餘人而使臣輜重在焉乃詔以萬四千九百人為額正兵萬人使臣四百人輜重火頭二千五百人馬軍二千人共成此數是日金人復自水洛城来攻統制官楊政等又大敗之丙辰詔韶州自今所鑄新錢毋得滅裂務令民間不能倣傚近嵗韶州所鑄新錢不甚磨錯湖東人號為韶錢又倣之私鑄夾以沙土謂之沙錢每千財直二三百及馬友逐曹成収其軍中沙錢甚衆行於潭州諸縣民甚以為苦提㸃刑獄公事吕祉請拘収二種錢入官重行改鑄不行顯謨閣直學士右光禄大夫提舉臨安府洞霄宫陳彦修卒于徳慶府吏部奏贈開府儀同三司自是以為例此據紹興九年十月十三日本部状修入丁巳詔修真揚澳閘戊午詔景靈宫酌獻嵗用三百五十羊自今損三之一尚書司勲員外郎吴表臣守左司員外郎詔五品以下官及執事官非監察御史以上應給告者其錦標權以纈代之進士曽昷夫特補将仕郎昷夫􅌈子也􅌈漳浦人故太常少卿獻其家所藏書二千巻故有是命詔應有坑冶去處令逐路漕司契勘所得不償所費者並罷己未左從政郎魏良臣充樞宻院編修官良臣江寧人秦檜引之也福建荆湖宣撫使司奏以朝奉郎胡紡充夲司參議官從之庚申曹成引衆犯賀州清水寨守臣直祕閣劉全安撫司所遣統領官趙履棄城去先是成遣小校毛全来告以二月丁亥發道州詔補全承信郎而成已叛矣毛全補官在此月戊午桑仲之未死也遣鎮撫司書寫機宜文字左承事郎潭志来告以願宣力取京師乞朝廷出兵淮南以為聲援吕頥浩信之始大議出師以仲兼神武左副軍統制是春金人以完顔宗弼為元帥府右都監左副元帥宗維諭樞宻院磨勘文武官出身遷秩冒濫命西京留守髙慶裔參主之奪官爵者甚衆建炎以來繫年要錄巻五十二建炎以來繫年要録巻五十二金人地名考證尼瑪哈原書作黏罕誤改見巻一察罕瑪勒原書作茶曷馬誤改見巻十五薩里罕原書作撒離喝誤改見巻十一
