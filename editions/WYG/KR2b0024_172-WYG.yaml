body:
  text: 建炎以來繫年要録巻一百七十二宋李心傳撰紹興二十有六年三月壬寅朔司農寺丞王炎罷初炎自乞徃浙東發泄鹽事既又乞以奉使為名賈人疑其改法侍御史湯鵬舉因奏其多貲干進之罪故炎遂罷降授左朝散大夫知常州無錫縣王傅通判臨安府初兩浙轉運副使張匯判官閻彦昭舉傅政績及劾湖州長興縣監稅陳峒不法事上曰監司刺舉乆不聞振職今所舉按必得實於是召見傅言自古屯田於邊塞未嘗於畿甸兼浙西營田既納租穀又令納稅每至召佃催納詞訴紛然失多得少誠未為便乞將浙西見行營田盡罷並撥其田復歸省司立定租米以給佃人令依省限送納並充上供田内二稅權行倚閣上曰監司薦卿五任縣令是以召卿所奏可令户部看詳後二日遂有是命張匯薦傅在二月庚辰傅入對在庚子今聨書之癸卯侍御史湯鵬舉言兩浙漕司於諸州縣寄造酒不支本錢專用耗米始於李椿年甚於曹泳諸路倣傚至今未罷淮浙提舉茶鹽司減尅亭户煎鹽本錢公然不支韓沃唱之於其先王晌繼之於其後至今未盡禁戢乞將逐路漕司寄造酒住罷將逐路茶鹽司亭户鹽本錢盡數支給稍復違戾許御史臺按劾施行從之詔敷文閣直學士俞俟落致仕赴行在言者奏其本秦檜黨乃罷之荆湖南路轉運判官周埅罷以右正言凌哲論埅以家藏寳器竒玩傾倒歸於宰相秦檜之室遂玷將漕之除略無善狀故也丁未尚書工部侍郎劉才邵權直學士院壬子三省言太學生係二千人為額聞在學不及三百人欲令禮部措置上曰學校人才所自出元祐中名臣最多實由仁宗養育之有素也近來學校雖設教育有所不至每患人才難得可如所奏甲寅詔比縁軍興令宰相兼樞宻使典掌機務今邊事已定可依祖宗故事宰相更不兼領右武大夫帶御器械劉允升領成州團練使乙卯資政殿學士提舉萬夀觀兼侍讀万俟卨入對卨首奏五事大略以為權臣執國命威福之柄下移人不知有上故相舊弼擯斥殆盡讒佞欺詐之徒造為險語中傷善類人不自保道路側目貪夫慕利掊取無藝公私掃地赤立而大臣姻族之家粟窖金穴至不可較軍政一壞士不知勞將帥豢養於富貴之樂一旦有緩急皆不足恃士風不競避讒畏譏襲常蹈故隨波浮沉無致身許國之忠上嘉納之侍御史湯鵬舉論右通直郎江東安撫司參議官王厯檜之妻弟也寄居臨川役使守令聚斂貨賂公私被害江西安撫司參議官王墨卿熺之先生也揺唇鼓舌誑惑衆聼招恩市權詔並罷之丙辰詔諸路轉運司所差發解試官務在盡公精加選擇如所差狥私及庸謬不當令提刑司按劾御史臺禮部覺察聞奏寧國節度使兩浙東路馬歩軍副都總管李顯忠為殿前司右軍統制楊存中薦之也右宣教郎新通判湖州余佐右通直郎主管台州崇道觀龔釡並罷殿中侍御史周方崇論二人因交結王㑹與秦檜管莊茍賤無恥故皆出之侍衞親軍歩軍都虞候安逺軍承宣使福建路馬歩軍副都總管王進卒後諡襄懋丁巳詔淮南邊州有未可起稅處令漕臣保明與放十年時諸州民户全未歸業每嵗旋乞展免起稅朝廷慮其農種不時故特蠲之戊午尚書省言責降未叙之人檢舉未盡詔元因臣僚論列之人委御史臺元係按發鞫勘之人委刑部各看詳聞奏務在至公以洽恩宥權刑部尚書韓仲通守户部尚書仍兼權知臨安府敷文閣待制新知信州周三畏試刑部尚書殿中侍御史周方崇論兩浙轉運判官閻彦昭諂事曹泳秦昌時髙百之公然聚斂廣東轉運判官鄭鬲以竒玩珍香取媚權貴妄稱本路闕乏輙有陳乞而時相過為之應副詔並罷己未資政殿學士提舉萬夀觀兼侍讀万俟卨參知政事權尚書禮部侍郎兼國子祭酒周葵知信州尚書禮部員外郎吕廣問罷侍御史湯鵬舉言葵初無直聲以魏良臣薦躐處侍從廣問乃葵死黨諂奉良臣遂得召用姦贓凶悍遂併罷之太學生黄作詹淵率諸生詣都堂投牒舉留葵翌日博士何俌等言于朝乞懲戒詔作淵皆送五百里外州編管詔諸郡守臣許以休務日用妓樂於公筵餘並不許擅自借用仍委兼司守臣具奏臺諫覺察侍御史湯鵬舉言自開樂以來州縣官遂有達旦之㑹廢事擾人故禁之庚申執政奏銓試院獲到懷挾者三人上曰銓試乃出仕之始將來官顯皆自此擢豈容冒濫沈該曰此自有法上曰當依法行以戒後來上又曰自來士人許帶韻略多縁此雜以他書乃詔今後韻略及刑統律文等並從官給時試院吏卒於交巻啟關公然作弊後三日執政復以奏上曰此豈可不治近聞試院整肅士人極喜自此實學者進而寒畯之士伸偽濫者革而僥倖之風息矣上又曰祖宗貢舉之法周備顧有司奉行之何如耳熊克小厯載吏卒作弊事在辛酉蓋誤樞宻院編修官呉棣江賔王並罷右正言凌哲論棣由恩科入仕朋附魏良臣復得進用乃敢招權納賂為人求官賔王諂事良臣躐寘要地故皆黜之賔王溧水人也壬戌詔訪聞和州有人偽撰詔書提刑司見行根究令疾速根勘具案聞奏此當是言召用張浚者癸亥太尉奉國軍節度使御前諸軍都統制知興州呉璘開府儀同三司璘典興州軍凡十五年先是有詔昨呉璘楊政田師中並除太尉縁璘元係檢校少師官在政師中之上今來已及六年理宜優别可與轉一官至是降制先㫖在是月壬寅侍御史湯鵬舉言尚書右司郎中兼權户部侍郎鍾世明便僻側媚見李椿年為經界遂投名為幹官見徐宗說與秦檜管莊遂諂奉宗說得尚書郎見丁禩往太平州修圩遂結丁禩與之同往既歸乃奉使四川及還除職名為浙漕又事曹泳泳敗附魏良臣復除都司兼權侍郎良臣既罷世明慢罵萋菲略無操守祠部員外郎兼權中書門下省檢正諸房公事陳巖肖嘗在秀州學舍為秦檜父立祠堂作記獻頌叨求進取於是二人皆罷甲子三省奏内外闕官上曰既闕官卿等可各舉所知自來多以親故為嫌正不當如是若非親故何由悉知其所為但無私心可也因顧万俟卨曰卿未嘗有所薦引卨曰臣來自湖外亦詢訪得數人方欲具奏沈該曰陛下急於得人如此臣等敢不遵承遂詔續除侍從兩省各舉所知乙丑詔近年士風寖薄冒户挾書代筆傳義靡所不為負國家選舉之意豈所望哉自今委監司覺察重寘于法務在必行右通直郎江南東路轉運主管文字龔鋈罷以轉運判官葉義問劾其凶險貪汙也東平府進士梁勛特送千里外州軍編管勛伏闕上書論北事甚詳且言金人必舉兵宜為之備尚書省勘㑹朝廷置登聞檢鼔院以來天下之言應有陳獻自合詣院投進前後累降指揮禁止不許伏闕今勛不遵約束故有違犯其所獻書既無可採輙妄議邊事理當懲戒故有是命趙甡之遺史紹興三十一年五月辛卯初河北進士梁勲夜行畫伏歸朝廷上書言河北事極詳且言金人必舉兵秦檜怒真决之押赴惠州編管檜死朝廷取勲勲已死矣按甡之所云與日厯不同蓋小誤又朝廷取勲未知在何年月當考丙寅詔曰朕惟偃兵息民帝王之盛徳講信修睦古今之大利是以斷自朕志决講和之策故相秦檜但能贊朕而已豈以其存亡而有渝定議耶近者無知之輩遂以為盡出於檜不知悉由朕衷乃鼔唱浮言以惑衆聼至有偽造詔命召用舊臣獻章公車妄議邊事朕實駭之仰惟章聖皇帝子育黎元兼愛南北肇修鄰好二百餘年戴白之老不識兵革朕奉祖宗之明謨守信睦之長策自講好以來聘使往來邊陲綏靜嘉與宇内共厎和寧内外小大之臣其咸體朕意恪遵成績以永治安如敢妄議當重寘典刑自秦檜死金國頗疑前盟不堅㑹荆鄂間有妄傳召張浚者敵情益疑於是參知政事沈該言嚮者講和息民悉出宸斷逺方未必究知謂本大臣之議懼復用兵宜特降詔書具宣此意逺人聞之當自安矣時參知政事万俟卨簽書樞宻院事湯思退皆與該同乃下是詔呂中大事記秦檜以十八年之久呼儔引類盤據中外一檜雖死百檜尚存安石雖退居鍾山而所任王珪蔡確即安石之黨章惇雖去位而所任曾布李清臣之徒即惇之黨也上雖親政而所任沈該万俟卨湯思退魏良臣即檜之黨也沈該万俟卨本檜之鷹犬也思退本檜之客以文衡私取檜之子孫者也良臣即檜徃來扵金定和議者也檜之身雖死而檜之心未嘗不存張趙所引之君子日少而檜之所教之小人日多故自檜死後金頗疑前盟之不堅為之禁妄議和好以信金為之重竄張浚以悅金無以異於檜之為也直徽猷閣兩浙轉運副使張匯言州郡嵗額諸色上供錢物皆所以供朝廷經常之用而近年以來各狥私意將合發窠名侵移名色以充羡餘因致積累拖欠暗損賦入臣伏覩近制灼見前者獻助之弊已行禁止切慮循習之久未能頓革望委守貳將諸色上供錢物並遵窠名不得仍前侵移或有違戾令逐路漕臣按劾從之丁夘工部言浙江福建路嵗起物料欲以三分為率减免一分軍器所工匠除見役八百六十四人依舊外諸州發到一千五百四人亦以三分為率减放一分執政進呈上曰工匠可减二分仍給路費右朝請大夫董苹為尚書金部郎中苹知汀州代還入對論生財節財移用除弊四者理財之先務諸州貢賦有殊項目不一利病之實難以盡知欲望訓諭監司郡守及在職之臣各以本職財計之利病來獻委官看詳擇其可行者委本路不干礙官措置以聞積之嵗月天下之財計盡歸掌握無失陷之弊侵蠧妄用之私矣詔如所奏遂有是命苹又言汀贛二州相去五百里民輕生喜盗多於農隙聚衆私販乞於兩州之間以㑹昌縣為軍别割二縣以𨽻上曰朕知贛之利害詳矣縁置郡兩江之間城勢頗下城外皆髙山每愚民作過即登髙而視州中兵出多即走避少則來敵今莫若於髙處屯軍以占地利縁軍在城外不見市井亦自省費其添置軍令兩路監司相度後亦不果行戊辰詔淮南漕臣樓璹創立罪賞令人告首侵耕冒占田多收租課致農民重困可下轉運司相度條其利害申尚書省取㫖既而轉運副司蔣璨言璹初被除命受權臣指意根括人户侵耕田土重立罪賞許人陳告急若星火兼出納租課皆不的實今每嵗侵耕之田所輸米豆二萬餘數在於有司實同毫末而數州之民擾費不少欲放免三年俟三五年内人户開墾數多從本司審實申奏聼候寛恤處分如此則歸業衆多稼穡增廣誠為淮甸久逺大利從之孫覿撰蔣璨墓誌公在淮南言朝廷募人治淮上廢田設有侵冒變斥鹵為桑田奚不可而無頼告誣官吏追呼無寧居者令丞職任勸耕實擾之也以故良田上腴蕪沒為汙萊為可惜矣今欲令占田者免租稅三年使肆耕其中人人歆豔相慕相生無曠土矣而後按所占田簡徭薄賦積穀實邊為公私百世之利不亦善乎按日厯所書乃是得㫖令璨相度利害非其建請也今併附此更須詳考奏下在今年四月甲午左從政郎新太平州州學教授陳天麟行國子正此為魏良臣不公事已見今年二月詔右朝奉大夫張松已差知瓊州指揮更不施行松始用魏良臣薦補郡及是尚書省乃言松係知縣資序有礙格法故也右承務郎胡邁依舊忠訓郎邁初用嘉徳帝姬女夫恩例補右職魏良臣以其嘗請舉為之易文資及是吏部言邁請解在過禮之後合行改正故有是命侍御史湯鵬舉言右承議郎通判溫州王著挾持權貴賄賂公行今且任滿而其弟曉又為本州通判曉貪財好色衆所指名若著去而曉來温州之害未有休息之時也瑞安知縣慎知柔曹泳王㑹鷹犬也陛下親降御筆不得科買黄柑貢獻而知柔到任之初遂買萬餘顆獻於王㑹作生日其不遵詔令乃至於此古人云苛政猛於虎一州之間聚此三虎豈不負陛下愛養元元之意哉伏望亟賜罷黜以除民害詔並罷己巳户部侍郎韓仲通等言蜀地狹人稠而京西淮南係官膏腴之田尚衆乞許人承佃官貸牛種八年乃償並邊悉免十年租課次邊半之滿三年與充已業許行典賣令四川制置司榜諭願往之人給據津發上曰如此甚善但貧民乍請荒田安能便得半種若不從官貸未免為虛文可令相度於合支錢内支破起居郎兼權給事中呉秉信言仰惟陛下總攬權綱日親機政中外之事皆出宸斷合於古而便於今臣職在記注竊見本省修注舊本方進至紹興八年六月新本至十三年四月其後久闕正官遂至積年時事闕然不書欲乞自紹興二十五年十月為始先次修纂庶得聖神謨訓不致少有散逸可詔天下萬世從之少傅寧逺軍節度使領殿前都指揮使職事恭國公楊存中言望許臣立家廟仍賜祭器詔依所乞辛未閤門宣贊舍人成彦忠特除右武郎彦忠閔子已見夏四月按是月壬申朔癸酉侍御史湯鵬舉言和買絹一事官户民户逐嵗入納遵守既久不以為害近年遂有不均之弊且富貴之家連阡跨陌兼并貧民之産其可容貴者獨納伏望申嚴有司依舊法均買從之戊寅詔北使到來縁路告覔物色隨行引接指使具禀接伴使副於所至州軍供應並呈使副訖方許送與餘人私自干預及與人使語話各杖一百送五百里編管情重及命官奏裁著為令從勅令所請也左朝奉郎主管台州崇道觀趙渙為兩浙西路提㸃刑獄公事己卯執政進呈次上曰昨詣景靈宮朝獻見武學頽弊亦全無士人向諭宰臣雖略修葺舍宇至於養士元未嘗措置已二年餘矣文武一道今太學養士已見就緒而武學幾廢恐有遺材祖宗以來武學養士自有成法可令禮兵部速條具以聞端明殿學士提舉臨安府洞霄宫程克俊知湖州侍御史湯鵬舉言近年獄官偷情故獄以賄成又多觀望恤刑之詔徒為虛文為守令者略聽斷而避怨責為廷尉者用觀望而為重輕獄訟稽留而刑罰不清誠可恤也伏望申嚴有司遵守見行詔令如違元限者臣乞聼展大事元限四十日展不得過三十日中事元限二十日聽展不得過十日小事元限十日聼展不得過五日罪人至有翻異送别獄者元勘官待罪未得離任元行人吏監禁未得别行他案則後勘便得一案結絶不復更有淹延之獄至或尚有愆期者在外委監司按發在内委臺諫具奏庶幾不負陛下欽恤之意從之左朝請郎兩浙西路提㸃刑獄公事謝邦彦大理寺丞石邦哲右通直郎提舉兩浙西路常平茶鹽公事司馬倬並罷先是平江土居右朝散郎曹雲召邦彦倬於其家與之蔬食侍御史湯鵬舉論雲平江大儈以賣卜為業交結士大夫遂得一官邦彦邦哲頃與妖人交逰論列放罷因鍾世明薦於魏良臣復得起發猶尚不知自新倬與王㑹曹雲為死黨今又赴雲喫菜之㑹聞坐間設出山佛相邦彦為師雲為弟子事實恠誕臣安得不論乃並罷之仍移雲郴州居住甲申刑部言依已降指揮開具到自去嵗郊祀後監司郡守嘗被臺劾之人直龍圖閣趙士㣓前知紹興府專與秦檜作媒直徽猷閣龔鋈前淮南運判其弟與秦檜管莊直秘閣鄭僑年前知廬州鄭震前知嚴州鄭靄前四川提舉茶馬髙百之前知温州張永年前知無為軍王晌前知太平州已上六人並檜親黨孫汝翼前知荆南府直敷文閣方滋前知明州已上二人並交結檜共十人詔並奪職先是殿中侍御史周方崇言延閣寓直所以待英俊而寵勞能望將去嵗郊祀後臣寮論列放罷監司郡守等人並鐫落職名非徒姦惡有所警懼而委任責成見帶貼職之人得為榮耀故有是命丙戌詔祕書少監楊椿著作佐郎趙逵周麟之同共編修神宗皇帝一朝寳訓按二月癸巳周麟之元申請係修神宗哲宗兩朝今又改命當考大理評事馮巽之言州縣獄官不躬親鞫獄纍紲之囚有不識獄官靣者望委監司郡守將見行鞫獄條法畫一刋榜揭於司理院當直司並諸縣㕔事之上使晨夕觀覽惕息奉承從之戊子詔增温州解五人台婺州各三人静江府明處湖衢嚴福徽秀汀賔融州各二人以三郡終場二百人已上始解一人而静江及諸州百人始解一人也其四川諸州令漕司取㑹視此數而增之先是尚書省言諸郡解額多寡不均詔禮部參酌均定申省取㫖及是進呈上曰解額窄處自當量與增添寛處却不可減皆欲優之也乃命行下秘書少監楊椿入對言湖北一路經冦盗最多之處陛下特降詔令蠲科徭省力役而累年以來田疇不加闢户口不加多視他路最為凋弊所以然者本路諸縣才見有請佃之人未得食新例皆抑令輸稅既而差夫配馬無名之征取之紛然民不聊生流移轉徙臣竊痛之欲乞詔湖北一路凡字民之官以招誘户口開墾田疇立為課最上曰已令勸誘四川農民至湖外耕鑿官給牛具賞罰自不可廢椿又言近兩降赦文籍没田産之人並令所屬具情犯條法申提刑司審覆得報方許拘籍而所至猶有不遵赦令者蓋縁未曾立法斷罪故也望詔有司申嚴行下如是違法籍沒罪人財産及不先申提刑司審覆得報便行拘籍者科以某罪監司不覺察者降一等上曰此須立法斷罪但刑名不必太重貴在必行耳五月丁巳立法左中大夫董弅知婺州左中奉大夫蓋諒知池州庚寅翰林學士兼侍讀陳誠之假資政殿大學士醴泉觀使兼侍讀充賀大金上尊號使吉州刺史知閤門事蘇曄假崇信軍節度使領閤門事副之以盱眙軍言得泗州牒金主號聖神文武皇帝故也誠之三至北庭頗見信後有往聘者必問其安否云詔京西淮南販買耕牛與免稅三年用三省請也上曰關市之征本以抑商賈如米麵民間日用之物豈可收稅今耕牛亦猶是也然恐專欄輩巧為名取之可令監司守臣察其違戾者當寘于法大理寺言獄空詔免上表賀仍賜少卿章燾等詔書奨諭朝散大夫万俟止主管台州崇道觀依舊帶行右字止弟參知政事卨言臣賦性愚直不能諂奉秦檜既罷政檜乃將臣兄誣以贓罪除名編管原檜之意非為臣兄止欲中傷臣爾欲望睿慈憐察除落過名與一在外宮觀庶使保全晚節故有是命癸巳詔武學生以八十人為額上舍十五人内舍二十五人外舍四十人置博士學諭各一員未幾詔學生以百員為額七月癸亥甲午詔諸路州軍自今不得奏祥瑞前一日執政奏事上曰前大理寺獄空不許上表稱賀甚為得體比年四方奏祥瑞皆飾空文取悅一時如信州林機奏秦檜父祠堂生芝草其佞尤甚蓮之雙頭處處有之亦何足為瑞麟鳯瑞之大者然非上有明君下有賢臣麟鳯之生亦何所取朕以謂唯年穀豐登可以為瑞得真賢實能可以為寳若漢武作芝房寳鼎之歌奏之郊廟非為不美然何益於事可降指揮今後不得奏祥瑞乙未右通直郎王炎右朝請郎鍾世明各特降二官初炎在司農嘗請令諸路以見管常平錢盡數糴米赴行在世明時以右司郎中權户部侍郎因請諸路嵗發常平次陳米十五萬斛赴省倉贍軍侍御史湯鵬舉言二人陰壊前世積財之根源時炎世明已用鵬舉奏免官於是貶秩丁酉上謂執政曰卿等接賔客有利害可行及人才可用者一一奏聞庶盡知民間利病因可得人才沈該等曰陛下勵精如此敢不恭禀聖訓戊戌置六科以舉士一曰文章典雅可備制誥二曰節操公正可備臺諌三曰法理該通可備刑讞四曰節用愛民可備理財五曰剛方豈弟勞績著聞可備監司郡守六曰知機識變智勇絶倫可備將帥命侍從嵗舉之如元祐中司馬光所請先是侍御史湯鵬舉言今明詔侍從各舉所知倘或薦之不慎而臺諫當議論者必曰禁從方薦賢而言者遽及之是有心於責備不容朝廷用一士也如是則臺諫虛設矣今輙條具六科以備采擇乞俾薦者随其才而舉之後有改節願坐繆舉之罪詔吏禮部討論至是行下慶逺軍承宣使提舉佑神觀呉蓋為寧武軍節度使右正言凌哲言臣聞昔漢髙祖入關悉除秦法與民約法三章耳所謂殺人者死實居其首焉司馬光有言殺人者不死雖堯舜不能致治斯言可謂至當矣臣竊見諸路州軍勘到大辟雖刑法相當者類以為可憫奏裁遂獲貸配前此臣僚累曾論列而比年尤甚無他居官者無失入坐累之虞為吏者有放意鬻獄之幸上下相䝉莫之悛革貸死愈衆殺人愈多殆非辟以止辟之道也臣嘗取㑹到自去嵗郊祀後距今大辟奏裁無慮五十有餘人姑摭其略而言之汀州雷七處州徐環兒常州郭公彦䕫州冉臯此四人者情理兇惡實犯故殺鬬殺之條葢常赦所不原者於法既無疑慮於情又無可憫今各州勘結刑寺㸔詳並皆奏裁貸減彼殺人者可謂幸矣顧被殺者含恨九原不知何時而已也臣恐強暴之風日以滋長善良之人莫能自保其於政刑為害非細欲望特降睿㫖應今後諸州軍大辟若情犯委實疑慮方得具奏其情法相當實無可憫者自合依法申本路憲司詳覆施行不得一例奏裁當職官吏及刑寺日後將别無疑慮情非可矜奏案輙引例貸減以破正條並許臺諫彈劾嚴寘典憲庶使用刑咸得平允惡人重於犯法臣又契勘大辟所犯未有不因財氣鬬詈而致死者今有司但以先曾詈人一句打人一拳便以為可憫奏裁如此則故殺鬬殺條令皆可廢矣惠姦長惡莫大於此伏望聖慈詳酌施行從之敷文閣待制陳桷落職右正言凌哲論桷始以從軍冒賞躐居華近頃縁大臣之妻及子好方士之說桷因以奉道為名至書符主醮邀取厚賂交結豪富多受寄産茍賤不㢘故有是命户部尚書韓仲通言今斗米為錢不滿二百正宜積穀之時如輦轂之下諸軍雲屯仰哺太倉終嵗之用亦有餘數若嵗取所餘之數别置倉廩貯積以一百萬石為額常以新易陳闕即補之遇有水旱助給軍食減價出糶以資民用實為經久之利從之仍以豐濟為名左承議郎新通判撫州張洙行國子監丞洙召對乞士人雖不預鄉飲酒者皆許赴試事下禮部其後禮部言今後科舉欲並依舊法其鄉飲酒禮願行於里社者聼從其便仍不許官司干預從之左奉議郎新通判安豐軍王時升行司農寺丞時升召對論淮南州縣地皆膏腴今邊鄙寧息日久然地未盡闢而民不加多者蓋縁有有其地而無其力者有有其力而無其地者且如豪彊土著之人虚占良田有及百頃者其實力不足以遍耕也貧窮流寓之民襁負而至而近郊之田盡為豪强虛占唯有僻逺去處人跡希少雖欲開墾勢不可得欲望不問官私田畆但係荒閑者並許人指請開耕雖曾經開墾而見今復致荒閑者亦許剗佃詔户部看詳申省其後本部請未耕種官田限二年盡行開墾耕種如限滿有未種田畆即依臣僚所請許諸色剗佃其京西路亦乞於此施行從之時升綱子也五月辛丑朔侍御史湯鵬舉言太府寺丞總領淮東軍馬錢糧蘇振奴事曹泳遂除總領職業不修左奉議郎通判紹興府陳之茂為秋試考官違法容私取秦塤於髙等殿中侍御史周方崇言太府寺丞歐陽逢世頃棄其妻趙氏及其二子而再娶龔釜之女釜係秦家管莊人久不敢訴詔並罷逢世懋子也敷文閣直學士提舉台州崇道觀蘇符知邛州壬寅參知政事沈該為尚書左僕射万俟卨為右僕射並同中書門下平章事直秘閣知婺州辛次膺陞秘閣修撰先是執政薦次膺有詔赴行在上意深欲用之而病足不能拜復請外上躊躇久之曰可與進職仍復還舊任上因曰用人當盡公道若以私喜怒取人則真材實能何由得進邪甲辰端明殿學士簽書樞宻院湯思退知樞宻院事丙午太常少卿賀允中權尚書禮部侍郎起居郎呉秉信起居舍人兼崇政殿說書王綸並試中書舍人自王鎡後紹興十七年十二月中書不除舍人者近十年至是二人始有此授軍器監凌景夏守起居舍人兼權給事中詔今後御前諸軍統領官候及三年取㫖召還行在本任供職丁未侍御史湯鵬舉試御史中丞詔今後諸州軍教授不許差兼他職令提舉學事司常切遵守以右朝請大夫知郢州路採代還有請也工部侍郎兼權直學士院劉才邵言江西諸州自紹興初間縁盗賊未息有置土軍去處就縣屯駐以縣令主之往徃强掠薪米又令追呼公事監守罪人其弊至此望將上件土軍分填諸處廵檢司及諸軍闕額更不復置如此則兵皆有用而民不被害一舉而兩得之矣事下兵部其後本部乞如所請如分填不盡即充填見闕禁軍從之右朝散大夫直秘閣呉援行尚書工部員外郎戊申宰執進呈御史臺看詳到責降及事故前宰執并侍從官十五人情犯或與叙復職名或給還致仕恩澤輕重分為五等欲更取聖裁上曰甚當可依此行下遂詔故追復觀文殿大學士趙鼎特與致仕恩澤四名故追復資政殿學士孫近與致仕恩澤三名故追復顯謨閣學士汪藻與致仕恩澤二名故左中大夫劉大中李若谷叚拂並追復資政殿學士與恩澤二名故左朝散大夫程昌㝢追復徽猷閣待制與致仕恩澤二名故左太中大夫范仲追復龍圖閣直學士故左中奉大夫王居正右文殿修撰趙開並追復徽猷閣待制與恩澤一名故左朝散大夫黄龜年與致仕恩澤一名故左朝請郎李朝正左朝散郎致仕髙閌左朝奉郎㳺操左朝奉郎李本中並特與恩澤一名凡恩澤上有致仕二字則是有續得遺表恩澤之理故不可削去以見輕重熊充小厯於此始書凌哲奏請按哲元奏在去年十二月而今年二月己丑樊光逺又乞之三月戊午尚書省乃乞行下御史臺看詳至是條上克不詳考耳又哲所奏止是乞追復官職未及恩澤也詔李顯忠昨縁歸朝全家被害理宜優䘏除已給恩澤外更特與五資己酉詔殿前馬歩三司官軍闕額數多可令召募百姓之願充軍者毋得强行招刺將作監丞楊倓言伏覩法令舊章因羣臣一時申明前後衝改嵗月積久致相牴牾老胥宿吏遂夤縁為姦欲望申勅六曹寺監諸司將逐處見行條法累降衝改指揮并一般放行體例參以日月先後分明編類稍有遺逸重寘典憲限旬月成書委官審實復下元來官司先使之奉行仍録送勅令所修定頒降以為永制每有訟理令所司畫一備坐看詳裁决則曲直曉然胥吏無所容姦實天下之幸詔六曹長貳看詳申省取㫖辛亥言者論近年以來朝廷節次放免米麥菽豆柴薪耕牛力勝等稅錢而不曾與减退稅務課額仍更立賞督責州縣稅額既重則他物必致重征取給敷額故商賈不通欲將稅務年額量與减免却重行裁减收稅則例上曰此說極有理如米麥之屬民所日用者既與放免若不量减年額則必巧作名目重斂以求敷數反為民害可依所乞令户部措置立法壬子上謂大臣曰近諫官凌哲言大辟不應奏讞事此說固當但恐諸路見此指揮觀望滅裂將實有疑慮情理可矜之人一例不奏有失欽恤之意致傷和氣可令刑部坐條及前後指揮行下照應哲建請在四月戊戌癸丑殿中侍御史周方崇言宗正少卿張修本曹泳所薦及泳已竄斥欲擺脫蹤跡乃欲論列泳之姪緯章疏明言蒙聖恩擇寘諫垣意欲人知其非泳黨日者陛下㧞擢卿監而修不得與怏怏見於顔色詔放罷甲寅右朝請大夫李邦獻為荆湖南路轉運判官邦獻知撫州還入對言近年用事之臣險愎狠忌凡登對臣僚奏陳稍久或聖語有所詢訪隂即中傷是致臣下所陳類皆不切之務畏禍甚者至托疾在告望申飭臣僚凡有所聞盡言無隱從之邦獻奏下在是月丁未遂有是命上覽除目因謂大臣曰近縁遴選監司諸路稍稍有按發官吏不職者罰不患乎不行但賞典亦不可無今後郡守有治狀顯著者令諸司共奏當議褒奨如增秩賜金之類或與陞擢有賞有罰則善惡知所勸沮矣乙卯左朝請大夫主管台州崇道觀黄達如知徽州丙辰尚書左僕射沈該監修國史右僕射万俟卨兼提舉實録院先是秦檜以監修兼提舉自該卨並相始分監修及提舉為二至今因之該謂檜專政以來所書聖語有非玉音者恐不足以垂大訓乃奏删之而取上即位至今通三十年纂為中興聖語六十巻上之詔靖康間責降見存未叙復人令刑部依大禮赦檢舉開具元犯申尚書省取㫖初錢塘縣民楊康進狀乞每嵗獻納賣羊抽分牙利錢二萬三千緡應辦太廟景靈宫大小酌獻支用并買獻内膳御膳羊七百二十口計錢一萬緡自今猪羊圏交易並不許餘人干預事下臨安府至是御史中丞湯鵬舉起居舍人權給事中凌景夏中書舍人呉秉信言康輕量朝廷欲擅一府屠宰之利望送大理寺治罪從之丁巳尚書左僕射沈該提領編類玉牒所該初兼提舉避曾祖名改焉延福宫使寧國軍承宣使入内内侍省副都知陳永錫為入内内侍省都知延福宫使徳慶軍承宣使提舉萬夀觀衞茂實為入内内侍省副都知延福宮使崇慶軍承宣使帶御器械王晉錫為入内内侍省押班湖南轉運司言潭州南嶽廟災詔本司計合用錢數申省取撥毋得斂民詔財産不應籍沒而籍沒者徒二年即應籍沒而不申提刑司審覆及雖申而不待報者杖一百監司不覺察者减一等著為令用秘書少監楊椿議也敷文閣待制符行中提舉江州太平興國宫從所請也或曰行中為政貪刻及代去蜀民邀於路將辱之為幕官所蔽得免戊午進士鄧椿年言故父左奉議郎名世以忤時相廢弛不該日厯賞典乞褒贈詔御史臺看詳名世嘗為秘書省著作佐郎秦檜以其本劉大中所薦惡之㑹名世擅録副本以歸檜因令言者論列下吏停官遇赦牽復而死其後御史中丞湯鵬舉等言名世亦合預賞乃特贈左承議郎己未金主使宣奉大夫左宣徽使敬嗣暉定逺大將軍尚書兵部郎中蕭中立來賀天申節暉易州人也此據范成大攬轡録庚申户部尚書韓仲通言諸路州軍上供米漕司催發違限且以去年之數稽考未起發者迨今三分之二而江東西尤多計以支降三總領嵗終所用軍食及今秋苗米數外實管上供苗米二百四十萬石皆有人户所納縻費水脚錢若失時般撥則新陳相因致有隱沒之弊望令户部於嵗計之餘支撥付建康鎮兩江總領各一百萬石催督漕司般發限以半年足辦居常以新易陳或值水旱則補助軍食取撥賑濟遇有闕數則復行補撥從之甲子御史中丞湯鵬舉乞申嚴福建廣東沿海銅錢出界之禁犯者盡數充賞檢稅官除名守倅廵尉抵罪從之己巳中書舍人兼崇政殿說書王綸陞侍講前特進張浚度金人必敗盟是月上疏曰今日事勢極矣陛下將拱手而聼其自然乎抑將外存其名而博謀宻計求所以為久長歟臣誠過慮以為自此數年之後民力益竭財用益乏士卒益老人心益離忠臣烈士淪亡殆盡内憂外患相仍而起陛下將何以為策今天下譬如中人之家盗据其堂安眠飽食其間而陰伺其隙一日之間其捨我乎書奏執政不省建炎以来繋年要録巻一百七十二
