body:
  text: 建炎以来繫年要録巻三十四宋李心傳撰建炎四年六月辛未朔詔侍從䑓諫三衙諸軍統制並赴都堂集議駐蹕事宜先是言者論今車駕所至雖未能據形勝占上㳺如古者建國之制而官吏兵衛頗衆其積粟聚財之計必有成謀然後六飛可以順動嵗且六月矣似不宜緩伏望内裁之聖心外參之衆議早賜處分使百司各舉其職以待廵幸故有是命議者又謂比年防秋未嘗不召羣臣咨以計畫迄無定論况事有幾微難於徧曉而積粟聚財屯兵拒守事節至繁非可以立談判頃刻聚議未必精詳望令各以所見條畫利害限三日實封投進詔令赴都堂集議有未盡者許實封以聞後詔在甲戌通直郎万俟詠者工小詞嘗為大晟府製撰得官至是因所親携書入禁中乞進官二等上覽而擲之壬申權通判建康府錢需言捕敵兵一名執政召問自言涿州人上曰此吾民也止令諸軍使令不可殺也若女真則不可留癸酉合江南兩路轉運為一司以直秘閣李與權為都轉運使降授宣教郎朱異承議郎張匯並為判官責授秘書少監分司衡州居住周望再責昭化軍節度副使連州安置用侍御史沈與求再䟽也徽猷閣待制胡舜陟坐嘗為參謀官與徽猷閣直學士知平江府湯東野皆奪職望竞卒于貶所時饒信魔賊未平與求奏顯謨閣直學士知饒州連南夫直秘閣知信州陳机殘擾害民以致生變机坐免官而南夫貶秩机豫子也豫已見元年四月戊寅徽猷閣待制何志同坐父子誤國降充集英殿修撰朝請大夫知處州梁頥吉罷坐㓂至棄城也既而兩浙轉運副使徐康國按頥吉多取帥臣供給頥吉坐除名甲戌以宰相范宗尹兼知樞宻院事罷御營使議者以為宰相之職無所不統夲朝沿五代之制政事分為兩府兵權付於樞宻比年又置御營使是政出於三也望罷御營司以兵權歸之宻院而宰相兼知凡軍額有闕並申樞宻院增補不得非時招收仍用符以遣發庶幾可以收兵柄一賞罰節財用於是罷御營使及官屬而以其事歸樞宻院為機速房焉自慶歴後宰相不兼樞宻者八十餘年其復兼盖自此始紹興二十六年五月壬寅罷兼樞宻院二十九年九月甲午又罷機速房先是御營司有激賞庫専充軍書警奏間探之用凡銀五百兩錢千緡為一料畫㫖取之暨司廢庫存𨽻于三省出納浸廣矣言者論江北之民誓不從敵自為寨柵羣聚以守者甚衆望訓以恩意有功者推恩從之詔初除執政官正謝日賜衣帶鞍馬如故事中書門下省檢正諸房公事張汝舟直顯謨閣知明州汝舟乞奉祠改主管江州太平觀日歴止書直顯謨閣張汝舟知明州不繫前衘都司題名汝舟奉祠在七月當考直秘閣蘓遲為中書門下省檢正諸房公事遲之除日歴不書檢正題名在今年八月按七月十二日汪伯彦等徳音是遲當御則必非八月始除也今因張汝舟補郡附見按此注原夲多脫誤今以七月十二日甲寅事參考改正監察御史萬格為樞宻院檢詳諸房文字始除檢詳官也格之除日歴不載宻院官屬題名在此月而御史䑓題名書此月除右司盖格除檢詳未乆遂轉都司故題名略言耳格遷右司在此月壬辰其除檢詳不見本日因檢正官除罷附書之俟考按此註原本多脱誤今以此月二十二日壬辰事参考改正乙亥詔趣武信軍承宣使提舉亳州明道宫辛興宗統押所募秦鳳諸州良家子赴行在先是張浚以興宗為秦帥其後見孫渥才優即以渥代之故命興宗赴闕既而浚復以興宗知瀘州興宗知瀘州史不見其贈官制云初煩上隴之役遽為渡瀘之行今併附此詔六品以上官及初改京官並給告身朝官以上給𠡠初授官人給綾紙用吏部侍郎兼權直學士院綦崈禮請也自渡江惟侍臣賜告其後稍及帖職遥郡至是漸復之丁丑太尉御營副使劉光世充御前廵衛軍都統制光世所領部曲既無所𨽻因號太尉兵侍御史沈與求論其非宜㑹御營司廢乃以廵衛名其軍除光世都統制集英殿修撰宣撫處置使司參議軍事劉子羽充徽猷閣待制直秘閣宣撫處置使司參議官王以寧陞直顯謨閣本司官屬吏士自建康從張浚入蜀者並遷一官資以其逺役故也是日戚方犯湖州安吉縣統制官巨師古與戰亡其卒千餘人詔浙西江東制置使張俊往捕之仍命統制官岳飛聽俊節制戊寅詔御前五軍改為神武軍御營五軍改為神武副軍其將佐並屬樞宻院徽猷閣待制知臨安府季陵復為中書舍人陵入對首上奏曰臣觀今日國勢危如綴旒敵國盛强盗賊充斥人所共憂者姑置未論事有深可慮者四尚可恃者一大駕時廵未有駐蹕之地賢人逺遁皆無經世之心兵柄分於下而將不和政權去於上而主益弱所恃以僅存者人心未厭而已前年議渡江人以為可朝廷以為不可故諱言南渡而降詔回鑾去年議幸蜀人以為不可朝廷以為可故弛備江淮而經營關陕以今觀之孰得孰失張浚出為宣撫處置使不過欲迎陛下耳金人長驅深入吳越至今尚在淮甸曾無一騎入援王室設或當時侵犯属車之塵縦能提兵問大臣罪如苖劉時事亦何及維揚之變朝廷不及知而功歸於宦寺錢塘之變朝廷不能救而功歸於將帥是致陛下信任此曺有輕朝士之心黄潜善好自用而不能用人吕頥浩知使能而不知任賢自張確許景衡飲恨而死劉豫杜充相繼颺去凡知幾自重者往往巻懐退縮矣今天下不可謂無兵若劉光世韓世忠張俊者各率諸將同心而謀恊力而行何所往而不克然兵柄既分其情易睽各招亡命以張軍勢各効小勞以報主恩勝不相遜敗不相救大敵一至人自為謀其能成功哉君臣之間義同一體廟堂出命百官承禀知有陛下不知有大臣大臣在外事渉形迹其可作威福以自便乎周望在浙西人能言之張浚在陕右無敢言者夫區處軍事恐失機㑹便宜可也乃若自降詔書得無竊命之嫌耶官吏責以辦事便宜可也若安置從臣得無忌器之嫌耶以至賜姓氏改寺額事類此者無與治亂待報何損是浚在外傷於太専雖陛下待之不疑臣恐自陕以西不知有陛下矣三代之得天下者得其民也得其民者得其心也民墜塗炭無甚於今日發掘邱墓焚燒屋廬六親不能相保而戴宋惟舊實祖宗徳澤在人心者未厭也所望以中興惟此一事耳然人心無常固亦難保陛下宜有以結之今欲薄歛以裕民財而用度方闕今欲輕徭以紓民力而師旅方興罪己之詔屢降憂民之言屢聞丁寧切至終莫之信盖動民以行不以言臣意陛下舉事當人心服自足以結之也爵當賢禄當功刑當罪施設注措無不當於理天下不心悦而誠服者未之有也臣願陛下以其所當慮者使一二大臣謀之無偏聽無自賢無畏强禦無徇私昵處之得其當則人心服人心服則盗賊将自息而外患亦可圖矣起復寳文閣直學士新知建康府權邦彦為淮南等路制置發運使朝奉大夫提舉江州太平觀胡舜陟知臨安府直龍圗閣知越州傅崧卿移知婺州直秘閣添差兩浙轉運副使陳師錫知越州是日滁濠鎮撫使劉位為張文孝所殺前一日位引兵入滁州克之文孝遁去詰旦文孝以其衆復至城下位即引兵迎敵位逢兵衆數百以為己之兵也乃指揮殺賊而所逢者賊兵也位覺之欲急戰為賊所殺權知州事茍某與州縣官皆散走事聞詔其子武徳郎閤門宣賛舍人知泗州綱起復滁濠州鎮撫使贈位武功大夫忠州防禦使後為立祠名剛烈位贈官史不載此㨿季陵外制附入己夘詔南班宗婦為子孫食禄者並加賜緦麻親錢八千米三斛春冬帛各十有四匹綿八十兩袒免親錢米减三之一綿帛並减半詔廣東轉運司募使臣押糧舟自海道至福州交納此㨿紹興元年十月十九日保義郎翁㮚等乞轉官状修入状稱六月初九日已降指揮故附于此但紹興二年四月九日都省劄子稱建炎四年六月二十四日降指揮令廣東轉運司糴米十五萬石乃在此指揮後半月不知何故當求它書詳考罷臨安府守臣兼浙西同安撫使以防秋在近欲責任之專故也庚辰命宰臣范宗尹提舉詳定重修𠡠令參知政事張守同提舉先是有詔以嘉祐政和𠡠令格式對修成書至是始設官置局命大理寺及見在勑局官就兼詳定刪定等官仍召人言編𠡠利害踰年乃成㑹要置詳定重修𠡠令所在此月七日今因命提舉官併入此祕閣修撰知徳安府陳規為徳安府復州漢陽軍鎮撫使兼知徳安府仍賜三品服規在郡四年屢破羣盗傍郡皆失守惟徳安一城獨存識者偉其能然嚴刑重歛世或以此疵焉時復州為盗彭筠所㨿規遣兵逐之以部將祖遹知復州武翼大夫康州團練使觧潜為荆南府歸峡州荆門公安軍鎮撫使兼知荆南府潜自謫籍中為張浚所用言于朝遂復官而有是命時荆南殘破不可居潜寓治峡之宜都直龍圗閣程昌㝢為鼎澧鎮撫使兼知鼎州仍賜三品服鍾相之敗其黨楊華楊太等聚衆于龍陽相雖敗而華等恃水出沒未已也太年㓜椘人謂㓜為么故以么目之先是昌㝢以李允文之命權湖北安撫使㑹觧潜且至昌㝢引所部之鼎澧間撫諭使馮康國以羣盗方盛奏留昌㝢鼎州故有是命京西南路轉運副使陳求道為襄陽府鄧隋郢州鎮撫使兼知襄陽府仍賜三品服朝廷未知程千秋敗亡詔千秋以所統兵属求道坐不措置鹽事張浚用便宜責求道單州團練副使安置忠州而朝廷未知也京西南路轉運副使范之才起復金均房州鎮撫使兼知均州仍賜三品服時王彦已戍金州而均房二州為桑仲所破守臣李倫清韋知幾皆遁之才不能之鎮而卒日歴紹興二年九月甲申倫清以朝散郎奏差知廣安軍二年八月壬辰右朝奉大夫前知均州李倫清状建炎三年五月准敕差知均州八月五日到任至紹興元年八月五日滿三考所冇到任任滿各轉一官酬賞已䝉宣撫司出給轉兩官劄子有㫖令換給㨿此則建炎四年倫清尚在任而王彦行狀乃云倫清奔竄盖蜀去朝廷逺故倫清得以冒賞也知幾本王􅊛部曲已見建炎元年十二月癸酉彦鎮金州歛民倍常比属縣莫敢抗漢隂令任城晁公休獨不用其令彦召至州囚欲殺之公休不為屈彦亦弗敢害也宣撫處置使張浚聞其能召為糧料官晁公休事㨿晁公遡所作墓誌云爾不得其年因書王彦戍金州且附見此朝請郎直秘閣知淮寧府馮長寧長寜初見二年二月丙子為淮寧順昌府蔡州鎮撫使兼知淮寧府仍賜三品服長寧自言招集忠義軍十餘萬大破敵兵故有是命自軍興以来蜀綱之應輸内藏及内東門司者皆不至中書門下省以為言詔宣撫司督促赴行在是日和州進士龔楫率民丁襲金人于新瑭為所殺時和州無為軍鎮撫使趙霖雖已受命然寓治水寨未入城水寨之衆乗間出掠敵營完顔宗弼乃遣偏師築堡新塘以遏絶濡須之路楫率二千人襲之入其營獲敵兵數百所掠男女盡縦之楫歸道遇敵救大至其衆多赴水死楫為敵所得㦸手大罵不絶敵臠割之時年二十二霖上其事于朝有司以楫率衆無所受命而格楫原孫也原故兵部侍郎敵之得歴陽也有士人蔣子春者平日教授鄉里敵見其人物秀整喜欲命之以官子春怒罵為所殺辛巳用宰相范宗尹請申命有司討論崇觀以来濫賞凡脩書營繕應奉開河免夫獄空之類凡十有八項皆釐正之自越州駐蹕以来已收使人令吏部改正拘收付身毁抹三省奏今具濫賞名色下項脩盖神霄宫推恩轉官减年應縁奉安等轉官减年除編修敕令格式及修國史推恩外應縁修書轉官减年應禮制等局所得轉官减年西城所措置田土及應縁本所恩例轉官减年應奉有勞轉官减年祇應有勞轉官减年修盖宣徳樓集英殿及剏造宫院池苑艮嶽及内外應干營造轉官减年之類催促燕山府路免夫錢糧一時推賞轉官减年進奉御前物色轉官减年駕幸省宅等處轉官减年催促五局木植并顔色轉官减年之類應縁開河部夫及應副錢糧稍草之類轉官减年應開封府大理寺趂辦獄空推恩轉官减年應縁修築舊城轉官减年應上件濫賞名色所得占射差遣之類應主管臣寮御書閣所得轉官减年詔上件濫賞名色今後並更不許收使按此事建炎二年十月丙子已降指揮審量其後中輟故云申命但元㫖不如是之詳耳詔以度僧牒百賜河南鎮撫使翟興為祭告諸陵之用右正言吳表臣論近世不以縣令為重故為令者政多茍簡而民受其弊願擇可用之人必先使為縣令顧其才誠可用則必有善政以恵斯民縱或不能亦必强勉為善以期它日之獲用矣夫天下者積諸縣而為之者也縣令皆得其人天下豈有不治輔臣進呈上曰祖宗謹守資格必兩任縣令以至守倅然後内為郎外為監司又擇其賢者然後為侍從范宗尹曰大凡進用不必甚驟乆於其職然後究知利病而奔競之風息上因言朕進用大臣固已考覈人才參稽公論而亦令術者論其命如卿等命朕皆知之盖恐蹇薄之人難與共功名也椘州鎮撫使趙立引兵攻金人孫村浦寨不克而還壬午執政奏以朝散郎主管亳州明道宫潘良貴提㸃荆湖南路刑獄公事上曰良貴頃為諫官與袁植皆勸朕誅殺祖宗以来未嘗戮近臣故好生之徳信于天下若此必失人心趙鼎曰諫諍之職尤不可以此導人主熊克小歴執政擬前淮東提舉官潘良貴為湖南提刑按史良貴宣和七年二月提舉淮東茶鹽靖康元年召還九月丁丑送吏部建炎元年五月除左司諌六月改工部負外郎罷去克所云誤也盖日歴載張守對上語有云良貴頃為淮東提舉常平頗以風力有聞而克遂以為前衘不細考其履歴耳權知汝州兼京西南路招捉副使王俊為右武大夫康州防禦使充河東路招捉使俊自言捍㓂有勞不欲受翟興節制乞兩河差遣以自效故也癸未召劉光世赴行在趙甡之遺史八月壬申劉光世来朝盖誤朝請郎主管江州太平觀吳説為福建路轉運判官説自言在明受間嘗上執政書論主上未正位號必召天下之變乞早賜裁决鄭㲄嘗奨其忠故有是命乙酉成忠郎趙令佟乞説降戚方詔赴張俊軍前計議令佟燕懿王後榮孝公世程孫也燕王生同安王惟正惟正生馮翊侯從讜從讜生世程詔皇兄右監門衛大將軍忠州防禦使安時權主奉益王祭祀先是安時請襲封事下禮官禮官以安時非嫡遂不許自仁宗以来諸王後各以一人襲封至渡江始廢尚書兵部侍郎兼權直學士院汪藻言東南遭戎馬之禍生靈塗炭城郭邱墟而國家廹於養兵征歛未息重以羣盗竊發官軍所至焚殘無以制之今欲䘏民莫大於去貪殘之吏祖宗時吏犯􅂍者無大小皆棄市故人重犯法官曺為清今縱未能舉祖宗之典姑擇其一二大者真决黥配以戒其餘仍令臺諫官以上嵗舉郡守一人保其終身如後姦􅂍與之同罪不得以自首原免而郡守監司於部内有􅂍吏不聞朝廷而為佗人所劾者罪亦如之庶幾斯民漸被實惠䟽奏詔坐條申明行下其後卒施行如藻請八月丙戌指揮盖為此也詔見責降人曽任宰執侍從官令檢正都司取索條具文臣帶職武臣觀察使管軍已上令刑部疾速檢舉並限一月盡絶毋令漏落以言者有請也自是宣靖執政及圍城明受偽命之人悉皆收叙矣丙戌鎮南軍節度使開府儀同三司充醴泉觀使吕頥浩為建康府路安撫大使兼知池州太尉御前廵衛軍都統制劉光世為兩浙路安撫大使兼知鎮江府觀文殿學士新除江西荆湖南北路宣撫使朱勝非為江州路安撫大使兼知江州於是三省請自今帥臣官二品以上者即除安撫大使繫階如鎮撫使例以示區别從之先是奉化賊蔣璉乗亂為變頥浩為所刼在其軍中上以頥浩故赦而招之至是復有此命且令樞宻院遣使臣賫告就賜所至州守臣敦請上道直秘閣知池州李彦卿移知宣州兩浙宣撫司統制官郭仲威為真揚鎮撫使兼知揚州初仲威在平江縱所部擾民朝廷令浙西江東制置使張俊来治其罪仲威覺之引兵走興化縣欲犯鎮江朝廷聞之因有是命仲威至揚州其參議官林獻可代伶人為口號司理參軍楊庶戱之曰何不云路不拾遺獻可怒以告仲威執庶及伶人斬之士人無不重足而立丁亥詔分鎮州軍因獲賊及守禦有功人不以分鎮前後令鎮撫使一面定賞内應補轉官資者申尚書省給降付身此㨿紹興四年二月十二日程昌㝢為崔嗣義乞轉官狀増入日歴無之戊子詔遣使撫諭邵青戚方以所部赴行在時方引兵犯安吉縣之上鄉浙西江東制置使張俊以兵討之或言上鄉路狭不可行兵俊乃遣其將王再興招之㑹統制官岳飛追襲其後方無路進退始詣俊乞降方上兵簿有馬六百匹所獻金玉珠珍不可計至行在日與中貴人蒱博不勝取黒漆如馬蹄者用火熁去皆黄金也以償愽負毎博不下數枚詔遷方武翼大夫以其軍六千人𨽻王􅊛軍後因以方為裨將時人為之語曰要髙官受招安己丑樞宻院進呈劉光世所獲敵人并簽軍狀參知政事張守曰光世謂簽軍不宜留盖知吾山川險易他日叛亡恐為敵人鄉道上曰此皆吾民也不幸䧟於敵驅質而来豈其得已守曰若分置軍伍中毎隊留一二人豈能遽叛上以為然庚寅詔浙西制置使韓世忠以所部赴行在辛夘大理寺奏魔賊王宗石等欵狀上曰此皆愚民無知自抵大戮朕思貴溪兩時間二十萬人無辜就死不勝痛傷乃誅宗石等二十六人於越州市其餘皆釋之先是浙西江東制置使張俊以全軍討饒信妖盗太尉劉光世因命統制官王徳靳賽總兵㑹之獲王念經徳等凡屠兩縣所殺不可勝計王徳獲王念經未見本月日日歴紹興三年四月戊戌胡蒙奏秀州土兵聞富詐冒王承宣本軍建炎四年三月二十六日饒州殺賊功賞補官按王承宣即王􅊛恐與此事相關當求它書參考上聞之不樂故有此諭王宗石當即念經也詔荆南鎮撫使觧潜措置計備廵幸一行事務壬辰侍御史沈與求言今日矯枉太過盡循資格賢愚同滯輔臣進呈范宗尹曰茍有豪傑之士自可不次擢用若未得其人不得不謹守資格上曰使有豪傑之士雖自布衣擢為輔相可也前古固多但本朝未有耳今士大夫並進若未能考詳其實不若姑守資格詔䕫路監司帥臣歸峡州守臣拘收係官舟船以備廵幸尚書左司郎中韓肖胄權工部侍郎監察御史林之平為尚書右司貟外郎樞宻院檢詳諸房文字萬格為右司貟外郎徽猷閣待制趙㠓知建康府通直郎鄧根知秀州周望之為宣撫使也以根攝守事至是用邦人請而命之初山東之䧟其士人多不降有滄州人李齊聚衆沙門島宻州人徐文聚衆靈山寺萊州人范温聚衆福島㑹河北忠義人䕶送宗室士幹泛海南歸文刼之至是文自稱忠訓郎權宻州都廵檢使其副宋穏自稱忠翊郎權兵馬監押請以所部五千人海舟百五十泛海来歸詔各進一官赴行在士幹岐獻簡王子也趙甡之遺史云文授武經夫夫閤門宣賛舍人㨿史二人七月癸夘各轉一官甡之盖誤也遺史又云士幹下大理寺併刺面配廣南後不知所終此事於史不見今且附此元符詔㫖士幹政和八年四月除右千牛衛大將軍未知此時為何官李齊范温紹興元年五月丙辰所書可參考是日知六安軍邊某殺金人所屯軍三百遂棄城而去其徒因縦焚掠市井一空甲午直祕閣京西南路提㸃刑獄公事權㳂江措置副使李允文知鄂州兼主管本路安撫司公事先是允文以宣撫處置使司之命權本司參謀官湖北察訪使節制軍馬招捉賊盗允文既以所部移屯而諸盗曹成馬友之徒頗為之用故允文得以自恣及㳂江除三大帥而鄂帥就用允文由是允文益横日歴紹興六年五月十三日量移人滕膺狀准刑部告示膺未勒停前係鄂岳辰沅州鎮撫使李允文下参謀官念膺不曽充李允文下參謀官乞改正按諸書允文未嘗除鎮撫使又鄂岳非分鎮地分不知刑部何以云然當考中書門下奏行在仰食者衆倉廩不豐請委諸路漕臣及秋成和糴詔廣東糴十五萬斛福建十萬斛並儲之漳泉福州浙西以銀十萬兩錢十萬緡糴之儲於華亭縣浙東以銀十萬兩糴之儲於越温台州應屬郡非茶鹽及朝廷寄樁錢皆許為糴本諸統兵官非有制書而擅取及所在州擅予之者皆從軍法置樞宻院幹辦官四員以本院言自罷御營司别無官屬故也初和安大夫開州團練使致仕王繼先繼先初見三年閏八月以覃恩特換武功大夫落致仕給事中富直柔奏繼先以伎術雜流而易前班則自此轉行更無拘礙深恐將帥觧體上覽奏諭輔臣曰朕於言無不從但頃冒海氣繼先診視實有竒效可特令書讀直柔再奏外議謂醫官用藥有功自當於本色官遷之武功大夫昔之皇城使也惟有戰功歴邊任負材武者乃遷無是三者雖入仕日乆不以輕授伏望陛下思名器不可假人之意特加愛惜以塞亂源是日進呈上曰繼先初未嘗有請出自朕意直柔能抗論不撓朕當屈意從之命遂寢七月癸夘繼先除防禦使中興聖政史臣曰以一人臨天下其勢常信不以一己之私勝天下之公則其義當屈聖人不恃其信者而嘗畏其當屈者此所以立於無過之地也乙未劉光世言今来充浙西安撫大使是為控制一路不獨治鎮江一府而止若使但守鎮江則與列郡太守同為守土之臣緩急别郡有警不可離任望别除鎮江守臣専主民事光世専充安撫大使隨宜從便置司時光世慮敵過江故預擇便地上覺其意乃詔光世許増辟通判餘不行正議大夫提舉臨安府洞霄宫傅墨卿卒丁酉郭仲威遣兵犯鎮江詔統制官岳飛以所部擊之初趙令􅍲之死事也或詆其降敵朝奉郎宣撫處置使司主管機宜文字孫偉移書張浚白其忠偉又言知分寧縣陳敏識拒敵有功請除知洪州浚承制贈令􅍲中奉大夫右文殿修撰建分寧縣為義寧軍進敏識二官使守之時已贈令􅍲次對而敏識亦遷官浚盖未知是日奏至詔不許偉江陵人也戊戌宣教郎杜嵩送廣州居住嵩充子也時以御營使司主管機宜文字在衡州李允文拘之言於朝乃有是命己亥封才人張氏為媫妤和義夫人吴氏為才人吴氏開封人時年十六自上即位以来嬪御未備及是潘賢妃從隆祐皇太后在䖍州後宫近侍者惟二人而已故封之朝散郎江躋為監察御史躋入見論天變事甚悉上以其有史學它日謂大臣曰今士大夫知史學者幾人此皆王安石以經義設科之弊范宗尹曰安石學術本不至是由蔡京兄弟以紹述之説敷衍被蔓浸失其意然自非卓然特立之士鮮不為誤上深以為然躋開化人也上語在六月癸夘尚書祠部員外郎章傑為福建路轉運判官是月起居郎葉三省以直龍圖閣奉祠日歴不見後省題名在紹興元年六月恐誤按今年七月洪擬為起居郎今移附此資政殿大學士陳過庭薨于燕山年六十後諡忠肅紹興元年四月己巳贈官蘄州兵馬鈐轄韓世清乞以所部衛柔福帝姬赴行在上不許世清乃屯于徽州之黟縣建炎以來繋年要録巻三十四
