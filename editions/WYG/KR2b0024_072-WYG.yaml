body:
  text: 建炎以來繫年要録巻七十二宋李心傳撰紹興四年嵗次甲寅金太宗晟天㑹十二年偽齊劉豫阜昌五年春正月辛亥朔上在臨安金國元帥府通書官李永壽等入見中興聖政甲寅進呈臨安府勘武翼郎馮師道言語狂悖事上曰師道本畫工嘗令繪佛像為民祈福已賜緡錢聞輙覬覦錫帶遷秩此事在承平時猶不可况於今日豈有濫賞官職賚予當勸有功朕未嘗敢以輕授師道以此怨望爾盖上重惜名器不以假人自百工技藝之流一資不可妄得故因論師道罪状諭無濫賞之意兹有以見御天下以至公也也臣畱正等曰輕用名器不分流品此前日召亂之由太上皇帝以爵待有徳有功者雖貴近越法求請未嘗予之况畫工乎此所謂大公至正之道宜謹守之乙邜龍圖閣學士樞宻都承㫖章誼為大金軍前奉表通問使使名據日歴給事中孫近副之官子孫各五人傔從補文階者八人白身補官者又七人賜銀帛裝錢如三年之數私覿増十分之二時金所議事朝廷皆不從乃遣誼等請還兩宫及河南地命右文殿修撰王倫作書於金左副元帥宗維所親耶律紹文髙慶裔且以資治通鑑木棉䖍布龍鳳茶遺之朱勝非閑居録云李永壽王翊来聘議七事第一事欲取北人與秦檜二策正同王繪紹興甲寅通和録云李永壽来聘所需三事故以章尚書孫侍郎徃及還所議互有可否獨疆界一事未定二録不同按此時勝非為相而繪奉命出使二人所云必得其真不知何以差互如此誼所謂疆界不知云何按豫今秋偽詔云乃遣使聘宻期吞噬以此知其請河南也詔淮浙鹽鈔錢每袋増帖納錢三千通舊為二十一千諸州所收帖納錢並計綱赴行在尋命廣鹽所增亦如之廣鹽添錢在此月戊辰丙辰監察御史劉大中行右司諫尚書刑部員外郎潘致堯主管江州太平觀致堯之罷似為接伴失職當考詔右朝奉郎通判壽春府盧伸赴行在旣至停其官潯州編管伸編管在此月己巳坐先謫潮州不赴貶也然伸通判壽春不知何從得之當考丁巳朱勝非等奏禀國書意上曰意當如此乃朕一己之見卿等更覺盡底藴勝非等頓首謝戊午以法慧寺為祕書省詔宣州奏檀偕殺人疑慮獄案令刑部重别擬斷申尚書省偕倬兄也先是有葉全三者盗其窖錢偕令耕夫阮授阮㨗殺全三等五人棄屍水中當斬屍不經驗奏裁詔授捷杖脊流三千里偕貸死决杖配瓊州孫近為中書舍人言偕殺一家五人雖不經驗而證佐明白别無可疑貸宥之恩止及一偕而被殺者五人其何辜焉乃命重别擬斷始近之提㸃浙東刑獄也紹興民俞富因捕盗而并斬盗妻近奏富與盗别無私讐情實可憫詔貸死去年三月戊寅故法寺援之近言富執本縣判狀捕捉刼盗殺拒捕之人并及其妻女而偕私用威力拘執打縛被殺者五人所犯不同刑部亦言右治獄近斷孫昱殺一家七人亦係屍不經驗法寺為追證分明不用疑慮奏裁何不依例法寺堅執不移詔御史䑓看詳定奪今年二月戊子既而侍御史辛炳等言偕係故殺衆證分明又已經委官審問以近降申明條法不應奏裁輔臣進呈朱勝非言曰疑獄不當奏而輙奏者法不論罪而孫近以宣州有觀望欲併罪之上曰宣州可貸今若加罪則後来州郡實有疑慮者亦不復奏陳矣乃詔偕論如律大理寺當職丞評刑部郎官皆贖金有差進呈在三月甲子今併書之知鼎州程昌㝢遣統制官杜湛與荆湖制置使王􅊅所留綂制官王渥等共引兵撃楊么己未破真皮寨獲其舟三十艘湖中小冦始懼熊克小歴作鼎澧州鎮撫使程昌㝢按昌㝢紹興元年春已改除湖南安撫二年又去安撫名為提舉鼎澧等州兵甲公事此時鼎澧無鎮撫使克誤也辛酉章誼孫近入對初知樞宻院事張浚既至荆南上書引咎乞罷政且請俟至潭州道路無虞即赴臨安府待罪詔不許是日殿中侍御史常同請對論浚以大臣之貴當閫外之權付與之專幾半天下事功不就受代而歸今乃聞命踰年故為留滯不䖍君命莫甚於斯望嚴賜戒督星夜馳速還闕下壬戍詔浚疾速赴行在自是言者稍稍論浚矣浚於是月甲寅奏至今併書之甲子左文林郎新勅令所刪定官孫邦為左朝奉郎充奉使書狀官用章誼等奏也乙丑尚書右司員外郎韓膺胄以親嫌除直祕閣提㸃江南東路刑獄公事皇叔光山軍節度使知大宗正事士㒟言寜逺軍承宣使同知大宗正事安定郡王令畤于属為兄乞用故事序位於其下許之自是以為例丙寅金國元帥府議事官安州團練使李永壽尚書職方郎中王翊辭行賜鞍馬器幣及其属銀帛有差翌日永壽發臨安詔通問使章誼等偕行又遣右文殿修撰王倫閣門宣贊舍人王繪送至境上上召倫繪入見而遣之倫繪以正月乙夘受命甲子引對今併書之熊克小歴時朝廷館金使既簡面所乞事朝廷皆不從於是李永壽等禠氣而去按日歴去年十一月乙丑館伴所畫一雖有臨時講究之文而今年正月丙辰臣僚上言有云館伴應用錢物朝廷畧不曽裁定盡循承平故事聞已支費過數萬緡如蠟燭一項計支錢數千緡其他可知則是未嘗簡也克云失實今不取誼等至泗州而偽境以檄来言大金使副已差官引伴赴闕請權留南宋奉使俟㫖永壽復移檄宿州接引誼等乃得俱北云據日歴此事以二月九日己丑奏到今聨書之翰林學士兼侍讀綦崈禮言近者金人議和託言劉豫所請雖敵情叵信然而中原殘破民力困瘁不堪驅役豫麟父子特倚金人為重以拒王師如聞金自有故且倦於南牧則議出於豫欲欵吾問罪之舉延旦夕之命理亦或然今金人遣使先至豫所乃来而所持書輙有封疆之畫其為豫計不疑陛下灼見其情報書曲折事理詳盡固應奪其狡謀破其姦膽不復敢肆桀驁庻能聼順以定和約然而猶可慮者萬一負恃強敵尚懐逆圖必欲窺吾境土或恐稽留使人呼敵騎以来邀脅則吾可以不為之備乎今已過防秋且逺近傳聞通使人情恐便舒緩謂宜申戒㳂江將帥明逺斥堠防扼險要選練士卒日訓於師常如遇敵以為先事之備庶無後悔茍和議遂成亦未可以弛備况今日耶綦崈禮又言陛下懲強敵之侵凌念兩宫之阻逺不憚卑詞以通使屈已以議和上以為宗廟社禝靈長之計下以息海内元元戰伐之苦至誠交感外域革心甚盛徳也然臣私竊度之陛下欝欝居此忍自卑屈以求成請好豈得已哉徒以事勢未競國歩未移生民未安故為計出此非謂舊事可忘中國可棄敵情可信能恃以乆安也然則約和之後便欲髙枕而卧得乎仰惟聖意固將大有所為興起庶政觀時俟釁期復舊業不惟茍紓目前之急而已臣願陛下堅卧薪嘗膽之志勵宵衣旰食之勤深詔大臣簡賢能謹名器明殿最嚴賞罰申飭百執事之列下至州縣之吏各修厥官毋敢媮惰革因循之弊去茍且之習要使人人公心為國誠意在民而無養資尸禄計日待遷之患則衆治舉矣於是生財積榖繕甲治兵嗇用度寛賦斂以實民力汰冗弱精選練以作士氣日伸月長假以嵗年一旦起而用之則大計可圖成功可必也顧惟今日權宜之議所利在此昔周宣内修政事外攘夷狄而越之報吴亦曰十年生聚十年教訓兹非陛下之所熟聞者乎左朝奉大夫主管亳州明道宫陳堯臣貶秩一等堯臣里居以干請為事嘗偽造張守雪已奏牘奉御寳依録之以示永康簿左廸功郎李宷宷折之宷俄為李光江東帥幕朱異宣諭浙東言於朝宷用是除樞宻院計議官仍召見而堯臣令大理劾治獄成當私罪杖故責異以去年正月薦寀得㫖轉官堂察六月甲午堯臣取勘戊申宷以新除計議官得㫖引對今併繫此日丁邜修武郎閤門祗候知復州韓遹進一官兼閤門宣贊舍人仍賜錢萬緡為軍費自襄郢失守安復為極邊故録之戊辰執政奏事因及北方事宜上曰人心國之本也雖有土地若失人心亦不可立國賜右修職郎洪适朱捄銀帛各百匹兩捄弁子以父逺使得官先是王倫言其不屈故皆䘏之時适未冠得監潭州南嶽廟自張浚召還而川陜宣撫處置副使王似盧法原人望素輕頗不為都綂制吴玠所憚上聞之己巳賜三人璽書畧曰羊祜雖居大府必任王濬以專征伐之圖李愬雖立殊勲必禮裴度以正尊卑之分傳聞敵境尚列兵屯宜益務於和𠂻用力除於外患時玠為檢校少保位遇寖隆故有是詔辛未左中大夫李大有行尚書左司郎中樞宻院計議官錢圻守刑部員外郎左承議郎廣南東路轉運判官張致逺行監察御史故延康殿學士宋康年奪職追所贈官及致仕遺表恩以御史常同言康年本市井俳優之徒止因蔡京婣黨叨竊名位理宜追貶也康年庠孫宣政間為殿中監壬申武經郎潘永思復為閤門宣贊舍人龍圖閤直學士許份卒份卒當在去冬俟考癸酉輔臣進呈張浚奏四川自七月以来霖雨地震盖名山大川乆闕降香乞製祝文付下上曰霖雨地震之灾豈非重兵乆在蜀調發供饋椎膚剥體民怨所致當修徳撫民以應之又何禱乎日歴不書浚所繫銜熊克小歴加宣撫處置使字按浚去年六月已罷宣撫此乃離司後所奏克不考耳詔臨安府四至州郡犯罪合配之人無得配本府竢囬鑾日如舊直祕閣知徳安府韓之美起復直祕閣通判徳安府李恃以守境無虞並進秩責授左中奉大夫薛昂卒三省檢㑹李邦彦例復特進與遺表恩言者奏昂黨附蔡京同惡相濟稔成今日艱危之禍陛下不賜竄殛得終牖下已為厚幸若追復舊官則是誤國之臣歿有榮耀非所以示天下也命遂寢寢命在是月戊寅今併書之是日浚運河以漕運不通故也詔役兵得遺䦨物者以十分之四給之河中遺骸聼僧徒收瘞數滿二百給度牒一道給度牒指揮在壬申遺䦨指揮在戊寅是役也用二浙廂軍四千餘人月餘而畢聖政録在三年十一月丙辰盖降㫖之日今後日歴及㑹要八年十一月再浚十九年二月又浚乙亥徽猷閣待制知鎮江府胡世將試尚書禮部侍郎祕書少監劉岑權刑部侍郎吏部侍郎兼權禮部侍郎鄭滋改權刑部侍郎滋移官為劉大中論列事祖尚書右司員外郎鄭作肅直祕閣知常州作肅引疾求去從所請也降通山縣為鎮縣為盗所掠遺民纔二百餘家故廢之武義大夫閤門宣贊舍人主管江州太平觀薛安靖為榮州刺史知全州降授朝散郎李彚添差通判秀州録海州之功也既而二人言無家可歸乃各賜㑹稽田三頃仍蠲其租賦彚除目在此月丙子賜田在二月乙未左通直郎試太常少卿唐恕卒上以其恬退有守特贈徽猷閣待制賜銀帛百匹兩官子孫如權侍郎丙子左司諫劉大中言國朝以来革五代之弊中書掌文事宻院掌武備文臣除授未有不由中書者近錢圻等除授乃宻院直降劄子尚書省止奉樞宻院闗報而不經由中書門下此何謂也若謂宻院属官可以自行除授直降指揮則百司長官皆可以畫降聖㫖自差官属斜封之事漸不可長伏望申敕三省樞宻院自今差除並守祖宗舊制勿復侵紊若直降指揮許承委官司論執施行庶幾紀綱不至隳弛按日歴去年十一月已亥樞宻院行遣内已云闗送中書門下省指揮今大中所奏乃云不由中書或是後来改正亦未可知當詳考大中又言近来臺諌章疏多不行出黜陟賞罰多不分明是非之所以淆亂向背之所以乖違非所以為治也儻臺諫之言不合公議則是違衆狥私當指謫其非而懲其妄言之罪儻其言合於公議則是論事舉職當暴白其言盡理行之不應黽勉而已也如呂頥浩之罪惡公議所不容而罷相之制舉皆美詞至今逺近疑惑黨類相扇以揺正論豈非有彈章而不曾降出乎又如李擢遷尚書不旬日間得郡近日潘致堯之罷郎官鄭滋改權侍郎士大夫皆莫曉其由是臣僚章疏有無臣不得而知若或有之陛下留中不出不過欲全大臣體貌若大臣不肯行出則是䕶前飾非畏人議已欲自作人情耳此不可不察也大臣去就如有勲徳在人當全體貌可也其他非才冒寵有罪無功招致人言則是負陛下之委任何體貌之有欲望自今除授罷免悉皆明示所以黜陟之由䑓諫章疏並令付外施行與衆棄之庶幾賞罰分明有以勸懲非小補也䟽奏上皆嘉納之日歴大中以此月辛未入對丙子二疏行下時朱勝非當國不可否事徐俯在樞府每倨視之大中因入見論席益懐姦固寵全不任責上將罷之故大中以為請丁丑召江西制置大使趙鼎赴行在將以代席益也鼎守洪都踰再歳戢吏愛民盗賊屏息一方頼之初知樞宻院事張浚行至荆南而鎮撫使解濳告乏浚乃以隨軍金五百兩帛三千匹糧萬斛畀之又以帛五千給歸峡二州至是言於朝時朝廷以度牒計直六萬緡付潭鼎州造戰艦浚過鼎澧亦以黄金三百兩與之戊寅右武大夫忠州防禦使提舉台州崇道觀楊應誠同主管客省四方館閣門公事夜臨安火已夘端明殿學士同簽書樞宻院事韓肖胄以舊職知温州肖胄與朱勝非議事不合力求去䟽三上乃有是命後三日改提舉臨安府洞霄宮日歴乃肖胄自請然直降㫖免謝辭不知何故當考右廸功郎新監廣州寘口塲鹽稅吴伸上䟽訟張浚無罪大畧謂浚忠有餘而智不足且復辟之功大失地之罪小天下之人所共知之其退保四川敵人卒未能下盖亦浚之功也臣竊見里巷㳺談咸曰張浚之来章䟽列上必於失地之外吹毛求疵增其過惡使浚不至則議者必曰慢而不恭有違命之罪至則議者必曰覆軍之將有失地之罰非特一二人言之且將羣起而攻之必使罪去而後已臣謂艱難以求未有如浚比者使浚罪去不知誰可繼其忠乎望陛下痛察之無使朋黨得以快其私無使敵國得以乗其間實宗廟社禝之福天下生靈之幸也按徐夢莘北盟㑹編伸䟽以正月二十九日上故繫於此庚辰尚書省言今嵗係大禮年分已降㫖令諸路憲臣依例剗刷上供錢物起發限七月以前到行在尚慮漕臣不用心催督及合樁辦州軍占吝乞令户部置籍拘催至八月比較欠多去處具憲漕及當職官申省取㫖責罰從之是月秦州觀察使熈河蘭廓路馬歩軍總管闗師古叛降偽齊時師古自武都率選鋒軍綂制李進前軍綂制戴鉞求糧於偽地襲大潭縣掩骨谷城叛將慕容洧㧞寨遁去師古深入至石要嶺忽遇敵兵與戰大敗師古旋師大潭内懐慙懼遂单騎降賊自此失洮岷之地但餘階成而已師古之未叛也嘗請於朝以為聚兵五年所集二萬餘衆合用糧食惟岷州管下大潭長道兩縣和糴不多兼宣撫司别無應副委是養贍不足其河裏州軍師古止據洮岷兩州别無出産累年偽地討糧今則偽地亦無所積因即闗外止有師古一軍占䕶要衝若不申明朝廷竊慮縁此逃散若金人知此無糧乗虚而来何以枝梧伏望將階文州撥𨽻熈河或只乞兩州財賦專一應副或許將川中財榖取撥食用兼師古所管戰馬不多仍乞支撥川茶付師古於洮岷州界轉換戰馬以壯軍聲後數月朝廷命宣撫司以階文二州所入財賦專贍師古一軍及應副茶博馬而已不及矣朝㫖下宣司在今年七月乙亥建炎以来繫年要錄巻七十二
