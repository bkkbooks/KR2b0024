body:
  text: 建炎以來繫年要録巻四十一宋李心傳撰紹興元年嵗次辛亥劉金太宗晟天㑹九年偽齊豫阜昌二年春正月己亥朔上在越州平旦率百官遥拜二帝於行宫北門外退御常朝殿朝參官起居自是朔望皆如之是日改元紹興徳音降諸路雜犯死罪以下囚釋流以下羣盗限一月出首自新仍官其首領令州縣存恤陣亡戰傷將士及奉使金國與取過軍前未還之家民户今日已前倚閣稅租一切除放復賢良方正直言極諫科令有司條具元祐黨籍臣僚未經褒贈人吏刑部限一月檢舉自紹聖廢制科至是始因徳音下禮官講求故事然未有應者金人掠天水縣時縣徙治榆林承奉郎知縣事趙璧方受賀忽敵騎三百突入坐上縛璧及統領官雷震主簿張昔以去璧等不屈皆殺之璧京兆人也辛丑徽猷閣待制知臨安府李光移知洪州光以事與浙西安撫大使劉光世有違言光世請避光上曰朝廷方賴光世為上流屏翰然光區區數論事意亦可佳乃徙光江西范宗尹因薦朝奉郎提舉江州太平觀孫覿有才乃復覿龍圖閣待制知臨安府季陵白雲集光覿二制皆陵所草恐誤承事郎新知衢州劉寧止為浙西安撫大使司參議官劉光世請之也癸卯上謂輔臣曰張浚短於知人所用多浮薄妄作同知樞宻院李回曰浚之行出於倉猝以故不暇詳擇上曰用人豈可不審尚書禮部員外郎侯延慶為起居舍人延慶為范宗尹所喜故卒用之起復朝散大夫樞宻院計議官王佾起復右武大夫榮州防禦使同管閤門公事藍公佐並罷佾復子也朝廷以其父死事故録之而佾交結權貴數與公佐謳歌燕飲公佐與内侍康諝善毎至其直舍縱飲大醉薄暮還家頗漏泄禁中語侍御史張延夀劾之上令付出議罪范宗尹請除佾大宗正丞延夀言其不可乃盡罷之仍䥴公佐五官黜監諸州市征沈與求論宗尹交結公佐事當考中侍大夫奉國軍承宣使帶御器械權同主管殿前司公事李質卒故事横行不贈官以質當苗劉之亂與在外將帥協謀保䕶兩宫特贈鎮東軍節度使賜其家帛三百匹錢五百千贈官在此月辛酉凡臣僚薨卒有本月日者各繫其月日未見本日者因遺表書無遺表者因致仕書之是日始下詔罪狀舒蘄鎮撫司副都統馬進以其違主帥之令抗拒官軍也仍立賞格許其徒自新甲辰閤門宣賛舍人潘永思復為帶御器械以神武副軍都統制辛企宗言永思嘗捕魔賊有功故也朝奉郎和州無為軍鎮撫使趙霖復故官為朝請大夫霖先以贓廢至是特復之乙巳權鄂州路副總管張用所部統領官孟振王林以其軍奔咸寧縣先是安撫使李允文傳令㸃軍或告以允文將殺用用懼命諸軍擐甲而入允文大驚遽罷於是其徒俱散用獨與親軍二千居城中丙午太常博士王居正試尚書禮部員外郎宣教郎秦梓守屯田員外郎尚書刑部員外郎錢稔兼權江南路招討司隨軍轉運使中奉大夫李芘知建州丁未言者論大臣用人之際當推其賢不必以嘗經堂除為限先是吕頥浩當國患請謁者衆乃揭榜省户曰未經堂除者不得投牒求官言者以為如此則宣政之間倚權貴之門超取顯美者皆在所收豈無韜晦自重不願為人所知者至今守其說而不變其何以來天下之士而濟艱難之業疏奏詔三省遵守戊申神武右軍都統制江南路招討使張俊改江淮招討使後數日俊入辭頗言李成兵衆上曰汝將全軍設為朕攻一郡若何俊曰臣朝至而夕入可也上曰成竭力攻九江兩月不能下則雖衆何能為俊大以為然上因謂俊今日諸將獨汝未嘗立功俊曰臣何為無功上曰如韓世忠擒苗傅劉正彦則功績顯著卿殆不如俊恐悚承命俊將行越州下屬邑根刷民舟二千載其軍家屬言者以為擾乞罷之不從事見此月乙酉尚書省言岳鄂道逺請還𨽻湖北復江池路為江東西路置帥司於江池又分荆湖諸州之在江南者為荆湖東西路置帥司於鄂鼎八月庚辰又改是日馬進䧟江州守臣直龍圖閣沿江安撫使姚舜明棄城遁時江州被圍僅百日糧食皆盡人相食賊兵晝夜不息兵馬副鈐轄劉紹先竭力捍禦至是人皆饑困無鬬志吕頥浩楊惟忠巨師古率衆來救為進所敗不得近城城中亦不知官軍来援舜明與紹先議棄城出奔紹先乃縱火城中乘喧閧奪西門走瑞昌舜明奪南門走南康進引兵入城大肆殺掠日晚有米綱到城下泊於酒坊門下始知賊已據城急解維放船下湖口進遣賊黨追至湖口遇頥浩之兵而還李成聞江州已䧟乃渡江入城坐於州治括寓客及郡縣官僅二百員悉殺於庭下端明殿學士王易簡與其子責授單州團練副使㝢皆死於亂兵有沿江安撫司統領官吕鄂者能射一石三㪷弓發無不中城初䧟詣馬進降進喜成見之曰圍城乆士卒多中箭死非爾邪遂殺之成揭榜許人識認擄獲生口人漸有生意皆作庵寮以居㝢靖康中嘗除尚書右丞己酉岳飛自江陰軍引兵之洪州飛行至徽州有訴其舅姚某騷擾者飛責之他日舅因馳馬射飛不中飛擒而殺之金人犯揚州辛亥參知政事謝克家充資政殿學士提舉臨安府洞霄宫克家引疾乞祠故有是命壬子詔京官知縣並堂除内外侍從官限三日各舉可任縣令者二人犯贓連坐又詔不厯縣令人勿除監司郎官不厯外任人勿為侍從著為永法於是從官有互舉其子為縣令者而子又皆貪贓論者惜之何俌龜鑑不厯縣令不除監司郎官不經外任不除侍從嚴失舉之罰頒考課之條定内外更迭之法而命官之道得矣詔明州作閙班直令殿前皇城司依舊於禁軍内安排直龍圖閣知潭州向子諲移知鄂州主管荆湖東路安撫司公事後二日以湖南馬歩軍副總管孔彦舟為東湖副總管屯鄂州彦舟在潭州未去也是日江西安撫大使朱勝非始領使事於新喻縣此據勝非八月四日所奏癸丑曹成入漢陽軍成乆屯三龍河時出兵攻徳安府而李宏在郢州軍皆乏食成率衆趨漢陽宏亦繼至權鄂州路副總管張用聞之率其親信二千餘人往咸寧與孟振王林復合安撫使李允文遣使招成成曰若許人入城則秋毫不犯不爾當縱諸軍一蹂踐之允文許諾遂自平湖門入城出屯於東門之外漫岡被野連接不斷既而鄂州無糧食允文謂成曰可向南自求之於是成復有反意遂率衆如江西是日李敦仁圍建昌軍後半月乃解去甲寅中書門下省言祖宗舊法在京官吏添給各有定限次數若不别行措置無以革冗濫之弊詔行在供職官吏除本身請受外添給等不得過三色有兼職人不得過四色如違計贓斷罪批勘官司不覺察者准此此以紹興五年閏二月二十七日户部申明狀修入承務郎謝伋修職郎程克俊並充詳定一司勅令所刪定官伋克家子克俊鄱陽人也乙卯直龍圖閣鼎澧鎮撫使兼知鼎州程昌㝢依前知鼎州主管湖西安撫司公事時鼎之諸縣大半為宼所據賦入絶少米貴㪷直二千而養蔡兵頗衆昌㝢既輟兵北援澧州又於辰陽新縣邊地要城列置諸寨調屬郡峒丁刀弩手以助蔡兵守禦軍糧屢竭或五日纔給糯米一㪷軍人鬻妻子以自活昌㝢聞於朝不俟報即取辰沅邵全泗州諸司錢以贍軍又賦鼎民和預買折帛錢六萬緡自是以為例昌㝢科鼎州民户和預買紬絹錢五萬九千九百緡以贍蔡兵他書皆不見今以紹興二十九年十二月壬申凌景夏所奏修入朝奉大夫江端本主管臨安府洞霄宫初命端本知光州端本不赴既而言者劾其避事端本坐停官丙辰初許百司毎旬休沐宰執因奏事上曰一日休務不至廢事使一月間措置得十事雖二十日休務何害若無所施設雖窮朝夕何補也丁巳責授茂州别駕李彛復為朝奉郎以赦叙也是日江東安撫大使吕頥浩江西副總管楊惟忠引兵趨江州先是神武前軍統制王􅊛軍至饒州頥浩乃復進軍左蠡㑹頥浩又得閤門宣賛舍人崔增之衆萬餘軍勢稍振乃命􅊛與增擊賊於湖口之南增大㨗乘勢至江州城下而姚舜明已去矣於是李成遣其將邵友自奉新縣徑趨筠州戊午户部侍郎孟庾言兩浙路夏稅及和買紬絹一百六十萬餘匹半令輸價錢毎匹兩千從之己未中大夫知樞宻院事宣撫處置使張浚特遷通奉大夫以出使日乆禦捍大敵備著忠勞也浙西安撫大使劉光世言自去臘至今招到女真及簽軍共六百六十餘人乞補官詔補忠訓郎已下至効用甲頭内無姓人賜姓趙先是左監軍昌屯海陵光世知其衆乆戍念歸乃鑄金銀銅三色為錢文曰招納信寳皆有使押字以為信號獲戍人之解事者貸而不殺俾宻示儕軰有欲歸附者抵江執錢為信而納之自是歸者不絶遂創立竒兵赤心兩軍庚申朝奉郎直顯謨閣宣撫處置使司參議官王以寧落職降三官責監台州酒務以寧既為孔彦舟所逐㑹監察御史韓璜使湖南還劾其擅命故黜之銀青光禄大夫李綱提舉臨安府洞霄宫以綱有請也詔趙普佐命元勲視漢蕭何宜訪其子孫量才録用辛酉手詔曰朕念太祖皇帝創業垂統徳被萬世神祖詔封子孫一人為安定郡王世世勿絶乃至宣和之末以太常禮部各有所主依違不决使安定之封至今不舉朕甚憫之有司其上合襲封人名遵依故事施行是日輔臣進呈次上因論此事曰太祖功徳如此世襲王爵宜不為過范宗尹曰太祖嘗云天下初定朕思得長君以撫之而授位太宗則其意專為天下上曰朕頃在藩邸入見淵聖皇帝率用家人禮一日論及金人事嘗奏曰京師甲士雖不少然皆游惰羸弱未嘗簡練敵人若來不敗即潰耳陛下宜少避其鋒以保萬全淵聖皇帝曰朕為祖宗守宗廟社稷勢不可動其後敵復犯京師朕在相州得淵聖親筆謂悔不用卿言是時近習小人爭言用兵熒惑聖聽殊不量力遂至今日之旤奉迎神主提㸃所言今太廟寓温州逐月薦新有非地産者請得以他物代充從之癸亥樞宻院奏福建民兵都統領范汝為欲令聽辛企宗節制上曰事有本末卿等今日所措置者末也而未原其本福建僻陋盗賊踵起得非守領不知省其疾苦乎其令監司帥臣各條上弭盗及便民利物之事朕當施行之監察御史韓璜言臣誤䝉使令將命湖外民間疾苦法當奏聞自江西至湖南無問郡縣與村落極目灰燼所至破殘十室九空詢其所以皆縁金人未到而潰散之兵先之金人既去而襲逐之師繼至官兵盗賊刼掠一同城市鄉村搜索殆遍盗賊既退瘡痍未蘇官吏不務安集而更加刻剥兵將所過縱暴而唯事誅求嗷嗷之聲比比皆是民心散畔不絶如絲此臣所欲告於陛下者然道中伏讀改元徳音不覺感泣州縣情偽陛下既已盡知蠲煩去苛恩意亦已備矣臣惓惓餘忠欲陛下謹信詔令務在必行詔比降徳音寛恤事件州縣自宜悉意奉行違者監察按劾御史臺察之左武大夫京畿路提㸃刑獄公事權京城副留守趙倫既出奔與權知唐州胡安中數奏金人動息安中先以留守司之命假授武徳大夫京西南路提㸃刑獄公事在唐州至是遣人來奏事上嘉之詔並進三官仍賜勅書奬諭初杜充之敗也其中軍統制武義大夫耿進以所部去朝廷聞進在通州詔進以舟師赴行在進堅子也見三年六月甲子通義大夫吳敏復觀文殿學士知潭州充荆湖東路兵馬鈐轄初向子諲既移鄂遂以降授中散大夫新江南路都轉運使湯東野知潭州與子諲並命㑹監察御史韓璜言湖南困弊宜遣重臣鎮守敏時在廣西范宗尹因薦用之直祕閣王浚明知建州浚明初以軍變罷至是復用之乙丑荆南鎮撫使解潛言臣所領鎮最為要害而所部正兵不滿二千本鎮東鄰鄂渚而安撫李允文生事召亂致李成冦犯未巳南接潭鼎而節制王以寧輕易無知為孔彦舟所敗湖外騷然又鼎澧程昌㝢狂率自恣近為湖冦敗於辰陽僅以身免此事未見潛所奏云湖冦楊髯子恐是楊華也北連襄漢而未有帥臣千里之間人跡斷絶乞遣精兵一軍前來保䕶蜀口時允文軍將武功大夫康州團練使江南東路兵馬都監張崇叛去以所部屯岳州潛以崇知公安軍言於朝詔已命崇赴鼎州不許潛又言峽州宜都縣在大江之南背山面水險阻可恃乞移治宜都從之丙寅浙西安撫大使劉光世言諜報金人自泰州來横塘詔光世極力措置是月金人以萬騎攻南河寄治所西碧潭時鎮撫使翟興以乏糧方散遣所部就食於諸邑所存惟親兵數千報至人情危懼興安坐自若徐遣驍將彭玘往授以方畧設伏於井谷遇敵至陽為奔北金人果以精騎追之遇伏為所擒餘衆潰去初順昌盗余勝等既作亂官吏皆散土軍陳望素喜禍與射士張衮謀欲舉寨應之軍校范旺叱之曰吾等父母妻子皆取活於國今力不能討賊更助為虐是無天地也兇黨忿剔其目而殺之暴屍於市旺妻馬氏聞之行且哭賊脅汙之不從又殺之賊既平屍迹在地隱隱不没邑人驚異為設香火事聞詔贈承信郎更為立祠號忠節旺贈官在六年十月乙卯賜廟額在三十一年今併書之建炎以來繫年要録巻四十一
