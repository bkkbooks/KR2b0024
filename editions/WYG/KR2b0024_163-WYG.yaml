body:
  text: 建炎以来繫年要録巻一百六十三宋李心傳撰紹興二十有二年歳次壬申金海陵煬王亮天徳四年春正月按是月丁酉朔己亥雷丁未少師昭慶軍節度使萬壽觀使平樂郡王韋淵為太保右通直郎直秘閣髙百之提舉兩浙東路常平茶鹽公事右中大夫范直方卒己酉忠翊郎閤門祗候趙廓為武翼郎閤門宣賛舍人廓宻子也丁巳大理評事莫濛面對言州縣常賦秋苖官耗義倉各有定數而别立名色於民户至有納一二倍纔及正額者止資官吏侵欺盗隱無補用度乞令有司檢坐條法掲示許民越訴從之庚申右文殿修撰知婺州趙不羣為兩浙路轉運副使二月丙寅朔資政殿學士知宣州楊愿知建康府宜州觀察使御前左部統制軍馬知階州姚仲改知金州兼金房開逹州安撫使節制屯駐御前軍馬從吴璘奏辟也庚午詔南班宗室應權住支請及郊禮支賜等並依舊格放行時近屬有身没而無以歛者安慶軍承宣使同知大宗正事士街言於朝故有是命辛未大理評事俞長吉面對論州縣於民輸常賦有追鈔銷簿之弊甚者匿其户鈔抑令重納望申嚴法禁仍令通判專一檢察詔户部申嚴行下壬申大理評事王洪面對言申令所載三年一造簿書於農隙之時令人户自相推排蓋欲别貧富從均平也比年縣令貪墨者輙促限以開賄賂之門庸懦者則遷延以俟後政姦弊不可勝言望戒飭有司不得妄有促從之癸酉左朝散郎都絜知南安軍代還言差役之法别縣有物力稅錢各從等第差選今乃有兩處同時執役者所費甚大恐非立法本意望明降指揮兩處應役者一處役畢他處乃差惟不許罷役而歇以别於一處當役之民庶幾輕重適中權歸三尺詔户部看詳申省丙子右中奉大夫直祕閣王晌知宣州丁丑上謂大臣曰近有士人投獻詩賦之類其間文理可採者可取㫖與免文解庚辰軍器監丞黄然面對論沿江一帯税務比来非理邀取商旅患之於是號蘄之蘄陽江之湖口池之鴈汊為大小法場咸謂利歸公家無幾而為吏竊取大半矣望令所𨽻州縣選官檢察収放漕臣考察從之然庭堅孫也壬午詔建祚徳廟於臨安府用殿中侍御史林大鼐請也先是毁其廟以為大理寺而大鼐言三人者有大功徳於聖朝今神靈不妥士庶悲嗟宜進爵加奨㝷進程嬰為彊濟公公孫杵臼為英略公韓厥為啓佑公陞為中祀三神進封在七月甲午壬辰宰執奏殿前司揀退軍兵上曰數内放自便人可諭楊存中須令有所歸毋致失所癸巳左朝請郎魏安行知滁州代還言國家取民有制陛下軫念兩淮歳歳展免每田一畆止収稞子五升然州縣不能盡承徳意取于民者正數之外每斛加至六七斗多者徃徃倍之頃歳廣徳軍受納嘗用平斛令人户自概滁州亦用平斛民間樂耕見今州倉已有三年之儲民間毎歳増収不止三十萬斛公私皆利儻聖慈以前件平斛或可行用乞先自兩淮始詔户部措置先是滁州三縣合水陸之田以頃計之三萬九千有竒自紹興十九年前開耕纔千九百頃安行招集開墾所増遂倍乃擢安行為京西路轉運判官安行除漕在三月壬寅三月按是月丙申朔丁酉右承務郎王之竒之荀並特除名日歴不載王之竒之荀所歴官今據家傳増入之竒送梅州之荀追所有官送容州並編管二人皆庶之子以其父責降身死撰造語言謗毁朝廷法寺鞫實故有是命臣嘗聞長老言有告秦檜以之竒欲結客刺檜者由是得罪上因言庶為人㓙悖深沮休兵之議幾誤國事壬寅直龍圖閣提舉台州崇道觀葉三省落職筠州居住承節郎監臨安府都作院王逺除名髙州編管先是三省嘗與趙鼎王庶通書力詆休兵之議明州進士陳燾得其真蹟并逺遺三省猶子書併上之詔送大理至是法寺言三省等撰造語言謗訕朝廷秦檜進呈上曰此不可不懲庶後来者知畏乃有是命癸卯龍圖閣學士降授左朝請大夫提舉江州太平興國宫程瑀卒己酉殿中侍御史林大鼐言比糴馬榖以香引錢為糴本既為有司互用民亦不敢觖望第輸納溢所抛之數太多如江隂小壘視苖抛降苖不及七萬石漕司抛下馬料才三萬三千石計今所輸之數不啻十萬石如湖州産茶諸縣各有園戸祖宗朝並無茶稅州縣舊来立歳額毎畆輸三斤已自非法比年官司又於額外抑配園戸茶引僧人茶鈔武康一縣園戸買茶引毎畆出鈔三伯文足僧人買茶鈔毎名出錢三貫六伯文足而元額自若也江隂武康皆王畿之内所聞如此則嶺海之外弊將若何一有訴於縣縣利其經費而不顧訴於州州受縣之贏餘而不問至訴之監司省部又為州縣沈擱不行萬一窮治其事不過以為事循前例當時剏例作俑者官已離任吏以徙死罪責不我及焉故州縣得以安而行之欲望降詔申勅自約束後將剏意循例者究治同坐庶幾美意實惠同浃于民上曰此湏是守令得人秦檜曰陛下今日中興内外無事所乏者循吏爾上曰然守令非人不可不治若置而不問則全無忌惮矣上又曰錢榖大計亦要戸部得人朕觀徽宗朝戸部之職多自發運轉運使擢用蓋以經歴民事諳練財賦故也大鼐所奏其令戸部行下據實數収糴馬料不得踰額賣茶不得抑配餘從之徽猷閣待制提舉台州崇道觀董弅落職弅寓居宜興而右諫議大夫章厦論寄居干撓縣道弅為尤甚良民被害不可勝言故有是命庚戌徽猷閣直學士致仕向子諲卒於臨江軍子諲既告老歸玉笥之舊隱號曰薌林凡十五年而卒辛亥上謂大臣曰近諸軍多有㨂退人數可取索招填今日雖息兵無事然武備不可去也敷文閣直學士提舉江州太平興國宫林待聘卒壬子右正奉大夫宋貺提舉江州太平興國宫依舊徽州居住從所請也癸丑司農卿湯允恭面對言豐年屢應米價至賤下等人戸無他商販以錢輸官遂成逋欠欲望降㫖應民間下户畸零夏稅及丁錢之類除依條赦倚閣外願輸米者官定時價而折納之如係上供之數乞令常平司以錢兊糴後来隨時出糶公私兩利詔戸部看詳丙辰直龍圖閣知紹興府湯鵬舉罷以右諫議大夫章厦論鵬舉以宅庫欠賣酒錢而妄劾副将劉之儀致其死也丁巳詔新除司農寺丞鍾世明徃福建路措置寺觀常住絶産時住鬻度僧道牒已久其徒寖少而福建官自運鹽其直頗貴於是民多私販議者以為客販可行遂命世明徃本路措置凡僧道之見存者計口給食餘則為寛剩之數籍歸於官其後世明言自租賦及常住歳用外歳得羡錢二十四萬緡詔赴左藏庫熊克小歴云明年慶逺軍節度使張澄帥福州復請于朝率還六七按㑹要世明元措置剩錢三十六萬五千八百餘緡已而澄乞添給童行人力米外實餘三十三萬九千餘緡克誤也戊午資政殿學士提舉江州太平興國宫何鑄薨後諡恭敏己未祕書省校書郎董徳元面對論髙禖名為大祀而禖神乃位於壇下酌用一獻恐非所宜望與青帝分為二壇庶可求昭格詔禮部看詳庚申徽猷閣待制提舉江州太平興國宫鄭朴卒辛酉詔四川監司州軍今後募差管押綱運先選有行止可以倚仗官及召有行止付身圓備之人充保如押人侵使移易其保官與降兩官元募差不當官吏降一官放罷所少錢物押人依法斷罪仍估賣家資填納如有未足數目於干繫人名下追理從戸部請也癸亥宰執進呈大理寺主簿丁仲京面對劄子論逺方州縣預借人户税租有借及一二年者其間復以本色紐折見錢價又倍之輸納稍緩加以嚴刑上曰此多是州郡妄用若撙節不至如此可申嚴行下如違令監司按劾御史臺弹奏夏四月按是月丙寅朔丁卯殿中侍御史林大鼐論上饒知縣吴芑阿徇余堯弼彊市民田時堯弼以左中大夫家居戊辰奏檜進呈上曰聞其人訴之䑓部可罷芑令本路監司根治上因言縣令不法無由盡知已諭言官以所聞弹劾矣己巳司農寺主簿盛師文面對論頃嘗指揮州縣貧乏之家主男女不能贍養者每人支錢四千後改支義倉米一石然近於臨安市井窮民未聞有得斗米千錢者况於鄉村與夫窮僻鎮聚望申嚴舊令咸以舉行從之癸酉右諫議大夫章厦試御史中丞殿中侍御史林大鼐試右諫議大夫丙子端明殿學士簽書樞宻院事巫伋罷伋與秦檜居同鄉一日檜在都堂偶問伋云里中有何新事伋不敢對徐云近有一術士自鄉里来頗能論命檜變色謂伋曰是人言公何日拜相伋皇恐而罷章厦聞之即劾伋隂懷異意以揺國是林大鼐亦奏伋黷貨營私於是並遷二人而伋以本職提舉江州太平興國宫章再上遂落職辛巳拜厦端明殿學士簽書樞宻院事中興聖政吕中講義曰巫伋術士之對蓋恐輙及時事以觸檜之怒故舉泛言不切之事聊以塞責云爾而檜勃然變色遽嗾使言路逐之惟恐他人攘己之位雖檜之猜狠忌刻不近人情然亦可以為依阿取容謟事權貴者之戒矣壬午詔權知閤門事孟思恭可與外任乙酉詔宗子趙不辱令大宗正司庭訓鎻閉不辱寓居秀州與母妻夜游於市有右廸功郎吕禠者被酒衝行不辱怒毆之致死法當絞特貸之丙戌孟饗景靈官令宰執分詣時新宫未成祖宗神御皆寓於西齋殿故也戊子監察御史宋樸守殿中侍御史辛卯國子監主簿史才面對乞申嚴百官造謁之禁從之壬辰秦檜奏廬州觀察使王俊往在岳飛軍中弹壓有勞以為浙東馬歩軍副都總管上曰飛當時欲具舟船入川有統制官說諭諸軍乃止右諫議大夫林大鼐言比者朝廷以福建寺觀絶産上供鈔鹽委司農寺丞鍾世明措置而逺方盛傳以為計口籍丁而沙汰之又謂更變鹽法以杜絶私販别致生事欲望降詔諭以至意詔言者論列福建住持請託之弊官鹽科賣之擾令世明以使指行下州縣照㑹五月按是月乙未朔丙申上謂宰執曰昨治王繼先賣布事極係利害恐諸将因而交結就尅軍人食錢償之可諭與成閔今後有似此事並申樞宻院庚子詔故延福宫使保康軍承宣使黄冕將合得遺表恩澤特贈保寧軍節度使賜諡僖靖辛丑右諫議大夫林大鼐言比來遐方多有健訟之人欺紿良民舞玩文法州縣漕憲未結絶則申寃于部于臺于省官司眩於偏詞必與之移送重定外方徃徃觀望為之變易曲直欲今後所訟如婚田差役之類曽經結絶官司須具情與法叙述定奪因依謂之斷由人給一本厥有翻異仰繳所結斷由於狀首不然不受理使官司得以參照批判不失輕重而小人之情狀不可掩矣將來事符前斷即痛與懲治可使户婚訟簡臺省事稀亦無訟之一策也上曰自來應人户陳訴自縣結絶不當然後經州經監司以至經臺然後到省今三吳人多是徑至省如此則朝廷事多可從所奏癸夘左朝請大夫陳湯求知池州還論郡縣以耕牛水車舟船農具估為家力視此等降差役科敷其交易買賣又重收稅錢非勸農之本意乞委常平司紏察詔申嚴行下丁未司農卿湯允恭罷以殿中侍御史宋樸論其褊急任私也庚戌封媫妤劉氏爲婉容新興郡夫人吳氏宜春郡夫人劉氏並為才人宫中號婉容為大劉娘子才人為小劉娘子癸丑金主使宣奉大夫刑部尚書行大理卿田秀穎安逺大將軍充客省使兼四方館副使大允來賀天申節是月襄陽大水平地丈五尺漢水冒城而入右朝奉大夫知府事榮薿乗桴得免於是與轉運判官魏安行議講復環城古堤以捍水許之眀年冬按四縣之籍計田出力百畝一夫得三千餘人减其田租十之二凡五旬有七日而畢計用工十五萬有竒其長四十餘里此據王之望記請復堤在十一月今併書容州奏野蠶成繭右朝請郎主管台州崇道觀曽恬卒潼川府言涪城縣進士馬天祐廬墓孝行顯著詔賜粟帛六月按是月甲子朔戊辰右通直郎劉炎請換右職詔以為閤門宣賛舎人炎初見十年正月尚書左司郎中宋仲堪罷以殿中侍御史宋樸言其劾鄭剛中獄事淹延且交結巫伋也武翼郎閤門宣賛舎人劉伉為右武郎幹辦皇城司以才人進封故遷之壬申樞宻院檢詳諸房文字陳相試尚書左司員外郎丁丑宰執進呈右朝請大夫知嘉州王知逺到任五事論四川鐡錢至少自罷鑄後見今嘉卭州及成都府各剏都作院以嘉卭所産鐡炭打造軍器赴利州樁管數目不少今邉事寧息望將兩州依舊鼓鑄小鐡錢上曰知逺所論於錢引實有利害可委總領所同本路漕臣措置後未及行知逺白石人也紹興三十一年卭州復鑄錢辛巳上諭大臣曰聞淮東被水民多轉徃淮西可令漕司賑濟壬午中書門下省檢正諸房公事兼崇政殿說書陳䕫試太常少卿時䕫送伴北使甫還未及國門以憂去乙酉奉安祖宗帝后神御于景靈宫太師尚書左僕射秦檜為禮儀使丁亥右文殿修撰兩浙轉運副使趙不羣卒戊子上謂大臣曰檢皷兩院近日絶少論利害文字恐有阻遏可下所屬檢察大理少卿章燾面對乞申嚴暑月浣濯獄具之令從之壬辰起居舎人權直學士院湯思退權尚書禮部侍郎尚書禮部員外郎林機試起居舎人是月尚書禮部侍郎兼侍講陳誠之以母憂去先是秦檜甞諭誠之曰事有所聞可以片紙見喻盖檜方用告訐以擢人才誠之不領其意以此頗忤檜左朝散郎張九成時謫居南安軍或問九成曰近日士大夫氣殊不振曽無一言及天下事者豈皆無人材耶九成曰大抵人材在上之人作成若摧抑之則此氣亦索有道之士不任其事安肯自辱哉秦公方斥異己大起告訐此其勢欲殺賢者然未必不反激人之言子姑俟之敷文閣直學士知瀘州馮檝卒檝素佞佛晚嵗尤甚以傅㑹和議故為秦檜所厚帥本路者凡八年秋七月按是月癸巳朔乙未右承議郎知秀州郭瑊直祕閣丁酉左朝奉郎提舉江州太平興國宫劉一止復祕閣修撰致仕一止以疾篤告老故有是命壬寅右諫議大夫林大鼐言臣伏讀天聖詔書令流内銓裁内外嵗舉員數文臣待制至侍御史武臣觀察使至諸司使舉吏各有等數毋得輙過而被舉者須有本部長吏乃得磨勘詳此即知天聖以前朝廷常參官皆得舉人不限内外亦無員數其時磨勘京官用考第少而舉員亦不多言者憂其名器冗濫至是頗有裁减皇祐中旋増四考為六考増二員為五員非本部長貳吏毋得輙舉立為永式廼今日見行條法也然古今異時法無一槩仁祖朝科目人少磨勘者稀行之數十年人無淹滯法亦流通也自熈豐宣政間已有論列其不便者矣中興之初恩或非泛人得僥倖有以從軍而改秩者有以捕盗而改秩者有以登對而改秩者今則朝廷清明無事慎惜名器改秩無他只有薦舉一路而貪躁者速化廉静者陸沉法誠祖宗之法不知入流寖廣數倍如祖宗之時也臣欲取考第員數增减以便之増一任者减一員九考者用四十二考者用三十五考者用二若二員則保舉之古法不可减也如减舉法行中湏實歴縣令不得仍請嶽祠其或負犯殿選自如常坐士有應此格者行無玷缺年亦蹉跎無非孤寒老練安義分之人收奬老成不爲濫恩如臣管見足采欲望付有司看詳而條上之以取聖斷庶㡬中外弭奔競之風士夫絶滯淹之歎詔吏部看詳申省甲辰將作監主簿孫祖壽面對言祖宗薦舉格法尤重親民之官近嵗格應薦舉者既未必能一一知人而生弊日滋遂有踰越舉員之數重發奏牘以掠虛惠其被舉者徃徃争先到部宻賂胥吏故散舉主以絶後至甚至於昩其所知公納厚賄使守節寒士甘心遐遺其違聖化敗士風也明矣欲望申飭有司増重法令有犯必行詔刑部申嚴行下其受賄一節立法申尚書省其後本部請以受所監臨財物論著為令從之十一月丁巳立法乙巳上曰聞四川所起禁衞軍所費多出於軍衆可劄下總領司應副都官員外郎劉澉面對乞戒監司郡守以時檢舉奉行寛恤詔書從之武翼大夫貴州刺史兼閤門宣賛舎人韋誼落階官提舉佑神觀修武郎韋訢為武翼大夫髙州刺史提㸃佑神觀訢淵子也丙午祠部員外郎李巖老面對論士大夫奔競望令有司復舉謁禁之條而必行之詔申嚴行下丁未詔在部注授知州銓量過期六十日不到許以次人攙注聼其别射家便差遣以吏部郎中沈虛中面對有請也先是有詔銓量因民事被罪及癃老疾病之人而授闕者或遷延不赴故虛中以為言辛亥左朝散大夫知眉州邵博罷先是直徽猷閣程敦厚廢還里居專以持郡縣短長通賕謝為業及博為守貌禮之而凡以事來輙不答敦厚銜之㑹直徽猷閣成都府路轉運副使吳坰從襄陽來多以襄人自隨分屬郡取俸博獨不予敦厚知坰怒乃為匿名書訐博過惡及其帷箔等數十事遣人持寘成都客舎坰得之大喜劾于朝詔罷博令成都府究其事前是坰已捕博送成都府司理獄司理參軍韓抃懦不及事坰擇刻深吏簽書判官㕔公事楊筠主鞫之眉州兵馬都監鄧安民以勤力為博所知主帑庾之出入首捕寘獄中數日掠死博懼每問即承提㸃刑獄公事周綰知其寃亟詣獄踈决博乃得出閱實其事但得以酒餽游客及用官紙劄過數等事獄上博坐降三官敦厚事並以洪邁夷堅志修入甲寅殿中侍御史宋樸言今日郡縣有便文之弊自省部以至監司郡縣更相逭責初無體國之實縣則衆責所歸文移尤峻且數號為紙鷂為縣之人自非特立獨行者則便文以罔民此弊不革實害治之大者望陛下與大臣講求所以革之之術申嚴行下從之乙邜詔仲冬薦獻永佑陵等攅宫及檢察禁地就差大宗正丞馮至游故事太常少卿以春秋二仲行園陵至是太常官全闕但以祕書省著作佐郎丁婁眀兼權婁明請於朝至游供職紹興就遣之也丁巳右諫議大夫林大鼐言武臣奏薦多出軍中軍中爵秩髙而少族姓凡有奏薦同姓皆期功異姓皆中表市井暴富者咸附㑹以進寨帥柵長利其髙貲犬牙相錯䝉蔽有司欲乞係軍中奏薦湏經統轄長官結罪保眀庶少歛戢詔吏部措置是日䖍州軍亂初江西多盗而䖍州尤甚故命殿前司統制吳進以所部戍之䖍之禁卒嘗捕冦有勞江西安撫司統領馬晟將之與進軍素不相下㑹歩軍司遣將揀州之禁軍而衆不欲行有齊述者以賂結所司選其徒之強壯者以捕盗為名分徃諸縣夜兩軍交鬬州兵因攻城作亂殺進晟遂居民逐官吏守臣左朝議大夫余應求之父安行年八十餘矣避亂墜塹死應求遂以丁憂為辭而去於是叛軍據城自守安行少篤學年二十餘舉進士甲科遂掛冠去學者號為石月先生庚申宣州觀察使主管侍衛馬軍司公事成閔特轉行一官以景靈宫成閔與督役故也修内司兩浙轉運司官吏第賞有差敷文閣待制知潭州沈昭逺卒辛酉司勲員外郎兼權國子司業孫仲鼇言今日習禮之士比之他經十無一二以前舉言之天下薦名於禮部者凡二千七百五十餘人而習禮記止四十人習周禮止五十人可謂鮮矣竊恐禮學寖以無傳此亦扶持斯文者所當深慮也望令州郡有能明習二禮者優加延請使主講說以為學校勸率及令將來科舉考校並省試官究心誘進毋以所習者少或遂廢之則經學幸甚詔禮部措置壬戌秘閣修撰提㸃佑神觀秦塤為右文殿修撰直龍圖閣提㸃佑神觀秦堪為秘閣修撰以檜辭免奉安神御加恩也八月按是月癸亥朔乙丑右朝請郎添差通判平江府張子華提舉福建路市舶子華叔獻子也右廸功郎吳曽充勅令所刪定官丙寅宰執進呈比部員外郎李泳面對劄子論淮西田疇髙原去處舊有陂塘以資灌溉今墾闢雖廣而未究水利若使民户自行開濬竊恐方集之人有傷其力望詔有司俾於農隙官給錢米以濬治之上曰聞諸郡陂湖蓄水去處如紹興及淮南徃徃為民侵占雖目前州郡獲利恐二三年後無水溉田即為害不細矣泳所奏可下本路常平司措置丁夘大理正孫敏修面對論州縣推鞫強盗間有捕盗官希賞求囑獄吏非理鍜鍊平人致誣服其罪望申嚴法禁令監司常切覺察從之辛未詔文武官應得酬賞及選人依法改官令吏部先次開具格法申取朝廷指揮紹興二十六年正月己巳不行日歴不載此事今追書之壬申泉州觀察使提舉台州崇道觀潘長卿利州觀察使提舉台州崇道觀潘粹卿閬州觀察使帯御器械潘端卿並為承宣使長卿寜江軍粹卿建寜軍端卿昭信軍武翼大夫髙州刺史潘清卿落階官為榮州刺史武翼大夫賀州刺史潘墨卿武翼大夫吉州刺史潘才卿並轉一官陞團練使墨卿成州才卿忠州自長卿以下皆吳國長公主之子特推恩也甲戍右諫議大夫林大鼐兼侍講殿中侍御史宋樸兼崇政殿說書乙亥監察御史魏師遜面對論州縣二稅攬納邀阻之弊詔申嚴行下己卯江西安撫使張澄言䖍州兵亂詔鄂州諸軍統制田師中速遣兵仍合澄集本路兵擒捕後二日又遣殿前司遊奕軍統制李耕將所部千六百人徃討之熊克小歴八月殿帥楊存中奏據本司統制官吳進申䖍州將兵反按日歴稱齊述者因歩軍司差官揀兵因紏合攻打州城逼殺本州駐劄殿前司統制官吳進并安撫司統領官馬晟遂據城縱火不知何以却是吳進申到也當求它書參考大理正張􅤡面對論寄居士大夫與大姓豪家騷擾村民小不如意即送都保鏁縛捶楚乞委守令禁止詔申嚴行下辛巳利州觀察使御前前部統制王彦知階州依舊節制綿劍州屯駐軍馬以都統制吳璘薦舉從四川安撫制置司保眀也丙戌尚書司封員外郎兼權國子司業孫仲鼇為大金賀正旦使閤門宣賛舎人陳靖副之吏部員外郎李琳為賀生辰使忠州防禦使帯御器械石靖副之靖開封人也丁亥右武大夫忠州團練使提舉台州崇道觀趙子彦卒於是恩平郡王璩以憂去官戊子上謂大臣曰比累禁私商泛海聞泉州界尚多有之宜令沿海守臣常切禁止毋致生事大理寺丞郭唐卿面對論逺方州縣獄具多不如式望申嚴法禁從之庚寅敷文閣待制知潼川府沈該移知䕫州該初為秦檜薦引及登侍從上頗知之檜忌之故出於外九月壬辰朔哲宗賢妃慕容氏薨癸巳大理寺丞黄子淳面對乞申嚴民間生子不舉之禁從之乙未詔殿前司左翼軍統制陳敏以所部討䖍州叛兵先是叛兵突出徑走南康軍而寓居左朝奉郎田如鼇為其所得遂復還據䖍城時李耕纔至江東而敏駐温陵被本路安撫司檄以所部千五百人䕶閩境於是領殿前都指揮使楊存中言敏本䖍人且嘗於江西捕冦有功望令進兵與耕併力討賊乃以如鼇權江西提㸃刑獄公事令即城中撫定之丁夘左朝奉郎周楙言前任知蘄州從士民之請修復河堤以捍水勢工費已具望委州縣就農隙興役上可其請因謂大臣曰不獨蘄州凡沿淮有當備水患去處悉令漕臣同守臣措置戊戌都官員外郎劉澉言法有按問欲舉自首之條所以示民自新之路而斷獄者易以得其情也然所至姦吏於麗罪者或告以按問之法而取其貨賂或略其减等之因而置之重辟犯罪雖同斷獄乃異望特降㫖應麗罪者先以長吏親問責其情實而後送獄庶㡬愚民不為姦吏所陷詔刑部措置申省癸夘右諫議大夫林大鼐言兵弛久佚主將輙移其力而他役之今有伐山為薪炭聚木為簿筏行商坐賈開酒坊解質庫名為贍軍回易而實役人以自利甚者至有差借白直為厮𨽻之賤供土木之工不知其數望詔中外將帥遵守祖宗條法仍取約束未盡者増廣而峻行之詔刑部檢坐見行條法行下諸軍遵守内借人一節借者與借之者並同罪甲辰太府寺丞徐璉面對乞嚴責諸縣於公差常賦之外毋得侵擾保正詔申嚴行下丙午升廣州香山鎮為縣從本路諸司請也戊申升桂陽監為軍己酉殿中侍御史兼崇政殿說書宋樸為侍御史樸甫受命即劾端眀殿學士簽書樞宻院事章厦多納賄賂引致市井小人以為肘腋平居備位充數未見有害一旦臨大利害内懐奸邪外肆諼險必致敗事而後已右諫議大夫林大鼐亦論厦斗筲小器一旦致身宥宻之地議論喧然皆曰章新婦也作兩府言厦為人踧踖無儀矩也况又背公營私附下罔上朝廷機宻無不漏泄望亟加黜責以為貪懦素餐之戒癸丑章厦以本職提舉江州太平興國宫章再上遂奪職厦入樞府才九十三日甲寅秦檜進呈左右司狀伏覩章䟽其間大理少卿章燾勅令所刪定官吳悌並為章厦心腹之交以刺報事端竊慮逐人難以依舊存留在任欲乞並與外任宫廟差遣從之以左右司按朝士前所未有是時陳相為左司員外郎右司闕人不知權官為誰當考相此月己未除權吏部侍郎乙邜祕閣修撰致仕劉一止上中興聖徳詩擢一止敷文閣待制戊午國子監主簿史才充御史䑓檢法官用侍御史宋樸請也己未右諫議大夫林大鼐試吏部尚書仍兼侍講尚書左司員外郎陳相權吏部侍郎庚申尚書比部員外郎李泳守左司員外郎冬十月壬戌朔侍御史兼崇政殿說書宋樸試御史中丞御史臺檢法官史才為右正言監察御史魏師遜守殿中侍御史初殿前司遊奕軍綂制李耕左翼軍統制陳敏副將周成鄂州副統制張訓通池州綂領崔定殿前司摧鋒軍綂制兼知循州張寧皆以兵至䖍州城下而敏所部統領官元玘戰死既而權江西提㸃刑獄公事田如鼇在城中與賊黨齊述謀誅首亂者蕭顒等四十餘人即以撫定聞於朝耕徃受其降述等列拜城上而終不肯出有詔如鼇果是撫定令素隊赴軍前與免究詔耕諭述等速出降即不進兵述欲聽命為其子所制但列衆於城上聲喏而拜終不肯出是日壬戌如鼇自出成與耕相見耕遂留之有父老數十人詣耕乞令如鼇復入耕叱之去因宻言賊已穴地道欲出犯官軍宜防之耕即以其兵二百人送如鼇還南康軍甲子召如鼇及左朝請郎施鉅並赴行在丙寅御史中丞宋樸兼侍講熊克小歴於癸酉始書樸除中丞蓋誤壬申左宣教郎杜師旦添差通判處州日歴紹興二十五年丙子凌哲奏杜師旦知天台縣贓行僭侈守臣蕭振對移臨海縣丞師旦怨振遂撰繆政録納于故相曹泳劾之振以是得罪師旦通判處州又除浙西提舉以事考之哲所言當不妄振落職池州居住在此後八日癸酉左朝請郎京西路轉運判官兼提刑提舉常平茶鹽等公事魏安行特轉一官以前知滁州開墾荒田二千餘頃推恩也甲戌御史中丞兼侍講宋樸充端眀殿學士簽書樞宻院事樸自撫州學官召還甫踰年而執政直祕閣新知䖍州逄汝霖改差主管台州崇道觀以本州軍賊竊發避事不即之任故有是命忠州團練使殿前司遊奕軍綂制李耕為龍神衞四廂都指揮使知䖍州己夘直祕閣知臨安府趙士㣓言本府地分濶逺欲更増置三十五鋪共作一百五十鋪廵警盗賊所有合添兵級乞於行在殿前馬歩三司軍兵内與本府相兼差撥從之庚辰詔責授建寧軍節度副使昌化軍安置李光依已降指揮永不檢舉徽猷閣待制知台州蕭振落職池州居住從政郎楊煒特貸命追毁出身以來文字除名勒停永不收叙送萬安軍編管初光既參大政煒以朝廷和議為非作書欲獻光先見振言其意光不答及是振知台州煒為黄巖令政頗有聲振每聞煒大言無顧畏則擊節稱善遂薦煒改秩又移書浙東提㸃刑獄公事秦昌時俾同薦之昌時檜猶子也因囑吏宻語振曰煒嘗以書責光及太師昌時其姪義不當舉如待制亦不可舉也振曰吾業已許之豈可中輟煒在官鉏治㓙惡無所貸俄縣吏得煒書有詆檜語昌時聞於朝詔送大理寺仍下所司發卒大索煒家得所草萬言書語益切煒上光書已見紹興九年正月煒具伏紹興八年在臨安府聞朝廷講和鄰國煒以為非是欲撰造語言作書上光言更改講和之意以規進用時振任侍御史煒因見振先說書意振答云亦恐敵人難信公書意甚好遂作書上光光覽書遣人傳語煒諭以不及答之意刑寺奏煒當死上特宥之其兄左從政郎炬亦連坐除名煒徒歩赴貶所至撫州病士人鄒陶見之舁致其家出白金以贐乃得去煒植子陶餘子也餘宜廣人故殿中侍御史孫覿撰煒墓誌載此事於十九年蓋誤炬二十四年二月編管入内東頭供奉官幹辦内東門司王晋錫還所寄資為正侍大夫崇慶軍承宣使帯御器械辛巳左承議郎諸王宫大小學教授陸升之知大宗正丞秦檜以其訐李光故用之詔廣州見任官將錢物寄附綱首客旅過蕃收買物色依勅徒二年斷罪此以紹興二十年十月五日户部狀修入壬午左朝散大夫知盱眙軍龔鑒直祕閣再任丁亥右通直郎添差通判嚴州鄭珙直祕閣閤門宣賛舎人潘堯夫為右武郎堯夫正夫弟珙㲄子也娶吳國長公主之女主為請而命之右承直郎新監太平惠民北局張昉令吏部日下添差逺小監當差遣以右正言史才論其專事口吻撰造不根恣為毁譽動揺人情故也是月李耕始受知䖍州之命耕既徃攻城猶冀就招安賊曰健兒輩初只縁與吳綂制下人争今作過已至此縱招安朝廷亦不放也時城中細民皆絶食每日為賊役者才得一二升間有出投官軍又為賊所殺上謂宰執曰前日差耕知䖍州甚當使百姓知已有知州心有所歸也上語在甲申今聨書之十有一月辛夘朔左朝請郎施鉅為監察御史左朝奉郎田如鼇為廣南西路提㸃刑獄兼提舉常平同提舉本路監事辛丑左朝奉郎知常州錢周材獻紹興聖徳詩詔周材充集英殿修撰癸夘左朝奉郎凌景夏知筠州景夏在館中與秦檜異論閑居几十餘年戊申合祀天地于南郊赦天下乙夘吏部尚書兼侍講林大鼐言武林江山之㑹大江潮信一日再至頃者江流失道灘磧山移潮與洲鬬怒號激烈一城為之不安枕雖詔守臣漕司專意堤埽日計營繕纔成即决不支年嵗臣以為南至龍山北至紅亭二十里間乃潮勢奔衝之下流正迎敵受患之處雖繕治無益也望選歴練諳達之士專置一司博詢故老講究上流利病古今脉絡而後興工或者以謂錢塘之潮應有神物主之葺廟貎建浮屠付之有司此亦易事時六和塔壞又伍員祠以火廢故大鼐及之輔臣進呈上曰恐浸淫為害可令乗冬月水不泛溢時治之為易又舊有塔廟隂以相之雖出小説亦不可廢宜付禮部看詳熊克小歴先是林大鼐在言路嘗奏錢塘江浸滛為害十一月壬寅上諭宰執云云日歴十一月二十五日乙夘常朝宰政進呈吏部尚書兼侍講林大鼐劄子武林江山之㑹云云上曰大鼐所奏可令臨安府同轉運司措置禮部看詳不知克何以差互如此丁巳秦檜進呈起居舎人林機輪進故事不務論思獻納專懐怨望詔與外任乃以機知信州上因語及龎翼教人學道如機者信其邪說遂忘上下之義機既出外如翼者本軍中人亦不可留在此為士大夫尚以邪說動之何况軍伍中也龎翼事未見當考太常卿兼權户部侍郎徐宗說權尚書户部侍郎宗說頗有心計吏不能欺然附秦檜以至從官常為檜營田産時人因目宗說為莊客熊克小歴誤載宗說乞令州縣補常賦在此年今移入二十三年閏十二月丙午中興聖政吕中大事記曰徐宗說為户侍為檜營田産時人目之為莊客而侍從皆其私人矣是日忠州團練使知䖍州李耕引兵入城䖍州平時諸軍既集而江西馬歩軍副總管劉綱右宣教郎統押池州土豪鄉兵鄧酢皆在兵間耕招降不聼率諸軍登城收叛卒盡誅之翌日輔臣進呈上曰朕思䖍賊閉城已四十日城中乏食可諭楊存中速令濟師庶㡬良民得免困苦於是遣前軍統制苖定等率兵五千馬四百徃聽耕節制定等未至聞賊平乃還熊克小歴載李平䖍州在此月乙邜按日歴稱賊自七月乙邜竊發至十一月丁巳收復凡一百十二日今從之賊之始作也其徒侵軼旁郡或勸左朝散郎南安軍居住張九成徙避之九成曰吾謫此邦死分也何避焉守貳拒賊未得計請於九成曰此為廣南要衝失守則郡以南皆賊區䇿將安在九成曰僻小寡弱難與争鋒今聞賊寨水南夜募善泅者火攻之俾其衆驚擾則宵遁必矣用其䇿賊果散走賊之未平也右宣教郎知醴陵縣鮮于廣曰是五日可至吾邑告于府請以所部兵列境上留民租於縣以為食提㸃刑獄司復命五里建一樓民持更其上廣曰是當為六十八樓重費民不可且盗必從官道來耶獨取鄉保伍之壯者選其豪六十領之它盗亦不敢犯廣晉原人也戊午右武大夫和州防禦使帯御器械楊公恕落階官與在外宫觀以公恕自言遭遇二十六年除隨龍推恩外即不曽非泛稍霑恩霈故也資政殿學士知建康府楊愿薨先是愿守宣城其表弟王炎調蘄水令徃見之醉中偶謂愿曰昔嘗於吕丞相處得公頃嵗所通書其間頗及秦丞相之短尚記憶否愿聞之色如死灰自是留炎不得去炎患之㑹愿移守金陵燕監司大合樂守卒皆怠炎即青溪得客舟而去愿覺既失炎憂撓成疾至是薨炎安陽人競弟也競已見紹興二十年十二月十有二月辛酉朔詔嵗减蘷路及蒲江淯井兩監鹽錢八萬二千緡有竒夔路鹽每斤减二十錢共為二萬七千餘緡事初已見十七年蒲江减四萬四千餘緡淯井元額八萬七千餘緡今减八分之一昭信軍節度使知大宗正事權主奉濮安懿王祠事士夽言久在疾告願上大宗正印及主奉職事従之癸亥封劉才人祖母太安人耿氏為咸寜郡夫人吴才人母裴氏為齊安郡夫人以二才人進封特推恩也乙丑直秘閣韓膺胄知太平州代還言州縣小吏喜怒自私驅無罪之人不白長官而繫于獄謂之寄禁望申嚴按察詔刑部立法申省己巳右通直郎林一飛為樞宻院編修官詔睿思殿祗候使臣自今増二人舊以二十人為額至是以慈寧殿使臣二人兼充故也中亮大夫建州觀察使韓京提舉台州崇道觀太尉安慶軍節度使提舉萬壽觀邢孝揚薨諡忠靖癸酉殿中侍御史魏師遜言近士子有因守令親識旋置田産臨時便作本貫應舉或守臣直以他處士子姓名冒令教官以次保眀望申飭州縣仍令監司按劾其士子冒貫得舉亦乞嚴賜行遣詔禮部措置申省戊寅進士王積特補右廸功郎積父雱以右奉議郎通判興國軍而死積上書乞推恩上曰此王雲之姪雲奉使極效忠率先衆人勤事而死於難兼係潛藩之舊理宜優䘏乃有是命壬午左奉議郎楊偰直祕閣主管佑神觀癸未秦檜進呈四川總領所申諸路欠紹興十七年以前折估糴本等都計錢引一百二十九萬餘緡米九萬八千餘石綾絹一萬餘匹雖已權住催理終是掛欠恐州縣别立名色暗行拘催欲乞盡行蠲放從之按十七年以前官物久已蠲放不知本所何以方有陳乞當考丙戌太師秦檜辭免進大宗正司勅加恩詔封其次孫女為和國夫人孫女夫將仕郎吳益為右承務郎丁亥免解進士袁敏求杖脊送海外州軍編管坐撰語言故也上曰小人妄生是非既得其罪當行遣以為惑衆者之戒戊子金主使太子詹事張利用廣威將軍尚書兵部郎中兼四方館副使諾延温都子敬來賀眀年正旦是嵗宗室子賜名授官者十有八人諸路斷大辟十六人福州舊法民嵗輸錢而受鹽於官其後不得鹽而輸錢如故民多私鬻以給食而官亦不問至是龍圖閣直學士張宗元知州事始再𣙜鹽犯法者滋多人不以爲是二十七年三月甲申所書可參考安撫司屬官胡憲上書於宗元告以爲政大體宗元不恱久之憲請嶽祠而去建炎以來繫年要録巻一百六十三建炎以來繫年要錄巻一百六十三金人地名考證諾延原書作耨盌與金史同並誤今改正
