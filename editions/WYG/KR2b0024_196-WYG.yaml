body:
  text: 建炎以來繫年要錄巻一百九十六宋李心傳撰紹興三十有二年歲次壬午二金世宗雍大定年春正月戊辰朔日有食之上在鎮江時欽宗几筵在臨安府行宫百官當入臨留守湯思退以吉月議罷之權禮部侍郎黄中力爭得不罷己巳遣中書舍人權直學士院虞允文先往建康措置徽猷閣直學士提舉江州太平觀劉岑落職以言者奏岑前罪又論岑請復免行錢不當也右朝奉大夫知楚州王彦融右朝奉大夫知光州強友諒並為淮南轉運判官塡添置闕彦融兼淮東提刑兼淮北宿泗州招討司隨軍轉運判官友諒兼淮西提刑提舉常平茶鹽公事借補修武郎閤門祇候郭昇充淮北忠義軍統制右文殿修撰四川制置司參議官吳援丁母憂制置使王剛中言于朝特起復右宣義郎新知泰州劉祖禮辭行金人犯夀春府保義郎樞密院忠義前軍正將劉泰率所部赴救轉戰連日是日金引去泰身被數十創一夕死先是泰自備家資募兵三百糧儲器械一切不資於官樞密院檢詳諸房文字洪邁言其忠詔贈武翼郎官其家三人泰贈官在是月乙酉庚午上發鎮江府次下蜀鎮左奉議郎知句容縣范卣入見時方雨淖上御氊衣氊笠乘馬建王扈從雨漬朝服畧不少顧而宰相已下多有肩輿者辛未上次東陽鎮壬申上至建康府觀文殿大學士判府事張浚迎謁道左衛士見浚復用至以手加額浚見上謝曰秦檜盛時非陛下保全無此身矣上慘然曰檜為人既忌且妬浚起於廢黜二十年之後復當重寄風采隐然軍民恃以為重焉詔張浚免兼行宫留守從浚請也癸酉放建康府公私僦錢一月初京西制置使吳拱聞汝州陷遣統制官王宣領所部往節制諸軍是日至汝州之土門而敵騎已去矣丙子祧翼祖皇帝神主藏于夾室司農少卿總領淮西江東財賦軍馬錢糧都絜左朝奉大夫提舉江南東路常平茶鹽公事洪适入見适言江鄉之民以旱荒而遷徙淮甸比遭敵騎之擾復還故鄉則所棄之産已為官司估賣形勢之家買者十不償一佃者量納租課無補於官而有害於民乞斷自紹興二十九年以後凡州縣所賣逃産許原業人以原估價就贖專委提舉常平官覺察上褒予甚渥尚書左司郎中徐度權户部侍郎右朝散郎新通判盱眙軍劉敏士知楚州朝奉郎通判光州郭淑知光州閤門祗候劉澤充樞宻院忠義軍統制詔金國故武勝軍節度使蕭中一特贈奉國軍節度使中一率先歸附上嘉其忠義嘗欲築館待之使其至如歸及為亂兵所害京西招討使吳拱令統制官王宣訪尋其妻子承制授其子頴武翼大夫言於朝乃有是命又封其妻耶律氏為蘭陵郡夫人以頴為鄂州兵馬鈐轄且命拱多方存恤之中一事以趙成京西戰功錄及周必大掖垣類藁修入日歴不如是之詳也戊寅張浚入對上問勞甚渥尚書右司員外郎吕廣問為中書門下省檢正諸房公事兼權行在左右司郎官樞密院檢詳諸房文字洪邁守尚書左司員外郎兼權行在檢詳秘書省校書郎馮方守尚書吏部員外郎兼權刑比部都官郎官閤門宣贊舍人御前忠銳軍正將李師民帶御器械成忠郎王全為修武郎閤門祗候樞宻院忠義統制全倡義來歸故有是命己夘詔侍從臺諌各舉可為監司者一員郡守二員有不稱職當坐繆舉之罰是日淮西制置使李顯忠引兵還建康淮西兵火之餘無廬舍天大寒多雪士卒暴露有墮指者上遣中使撫勞顯忠厚贐之中使喜既還具以奏上乃令班師庚辰言者論監司不按吏望令郡守每半歲各疏屬縣知縣治狀之得失具申監司監司覈實并與屬郡太守治狀以聞于朝仍下御史臺考核有不如言論奏殿罰庻幾郡邑勉勵而監司之職不至曠廢從之詔郡守年七十之人令吏部並與自陳宫觀著為令直顯謨閣御營宿衛使司書冩機宜文字楊倓行尚書度支員外郎右朝散大夫江南東路轉運判官李若川右朝奉郎江南東路轉運判官柳大節並入見壬午金人犯蔡州侍衛馬軍司中軍統制趙撙率諸軍禦之京西制置使吳拱亦遣踏白軍統制焦元來援金以勁矢射城上守者不能立金人登城撙知不可當乃棄城而下率諸軍巷戰自午至申金人敗乃去癸未言者奏自金犯長淮而江上之民有所謂踏車夫則操舟檝而雜戰卒防江夫則持旌旂而頓山岡以修防則有鹿角夫以轉餉則有運糧夫而踏車夫尤為可念願按采石當時籍定之數與免三年科役其餘亦與犒賞從之既而户部下建康府具到􅂿車夫六千三百餘人詔與免一年後詔在五月乙丑今聨書之右朝請大夫陳漢知通州劉子昻知和州時二州守臣皆遁去故命之右朝奉郎曾造知荆門軍造幾子也詔放太平州池州公私僦錢一月甲申直顯謨閣知揚州向子固辭行乙酉權知東平府耿京遣諸軍都督領賈瑞掌書記辛棄疾來奏事上即日召見先是京怨金人征賦之横不能聊生與其徒六人入東山漸得數十人取萊蕪縣有衆百餘瑞亦有衆數十人歸京自此漸盛遂據東平府京遣瑞渡江瑞曰若到朝廷宰相已下有所詰問恐不能對願得一文士偕行乃以棄疾權掌書記自楚州至行在瑞萊州人棄疾濟南人也淮西制置使李顯忠主管侍衛歩軍司公事李捧入見顯忠之撤戍也上欲幸建康南門以觀過軍㑹大雪不出乃召對飲以金缾御酒果實之属皆渾金器就賜之丙戌嚴州幇源洞効士方文郁言募到敢勇義兵百餘人詔付御前忠銳第五将張耘使喚丁亥制授王友直復州防禦使友直歸正事具去年十二月己巳友直與王任皆至行在上喜欲除友直節鉞任亷車友直曰向若臣有衆數萬歸朝廷則受之不辭今衆不滿百而受如此之重賞不可於是改命亦以任爲果州團練使給事中金安節等言凖尚書省備到白劄子奉聖㫖令臣等同議聞奏者臣竊惟建康江山險固從昔以為帝王之都葢以南控楚越西連巴蜀北接中原最為形勝實東南之要㑹也今将圖維經畧指揮號令固宜駐蹕於此然而两淮師旅之後藩籬未立自昔所以壯根本而固形勢者一切未備至于宗廟宫室官寺城壁倉庫營壘皆非倉卒所能辦集實如白劄子所陳然民思拯援如在焚溺比聞大駕進臨江表方徯來蘇至于淮壖瘡痍之人甫遂歸業亦頼聲勢以幸安堵一旦聞戎輅還軫恐乖始望臣等謂宜頒詔㫖明諭以建康臨安猶唐之東西都今雖暫還臨安自此當往來廵幸不常厥居仍詔有司按求吳晉以來城壘故迹以次營治以俟駐蹕庻幾慰逺邇之望成宏濟之功臣等愚昧所見如此伏望聖慈更賜裁擇先是殿中侍御史吳芾言大駕宜留建康以繫中原之望㑹有陳駐蹕利害者宰相陳康伯不能决上命侍從臺諫同赴都堂集議芾謂建康可以控帶襄漢經理淮甸若還臨安則西北之勢不能相接衆不從遂定回鑾之議集議指揮日歴不載此据金安節奏議修入按此時從官自安節外止有左諫議大夫梁仲敏中書舍人虞允文權吏部侍郎凌景夏權户部侍郎張運起居舍人劉珙五人扈上行故安節為首也奏議無月日今附降詔回蹕之前趙甡之遺史云羣臣皆入文字乞進取往往欲駐蹕建康不回浙省陳康伯不能决上命侍從臺諫赴都堂集議上降㫖問進取利害令各具狀奏羣臣皆不能言但唯唯請回浙西而已少頃傳聞于外士庶誚之戊子詔曰比者視師江上敵騎遁去两淮無警已委重臣統䕶諸将一面經畫進討今暫還臨安畢奉恭文祔廟之禮重維建康形勢之勝宜令有司増修百官吏舍諸軍營寨以備往來廵幸可擇日進發何俌龜鑑曰惜夫視師之寄不屬之魏公而屬之葉義問使魏公亟起而任其責則觀其戰功又豈止如是而已耶魏公者兼資文武出入将相幾三十年武夫健将言者嘆息兒童婦女知有都督其徳為何如加之許國之心白首不渝杜門念咎老而練事今日之浚非前日之浚建府迎謁衛士懽呼浚之措置經綸曽未設施而局面又一變成閔等領三衛而招討散局吳璘班師而宣撫結局矣金陵王者之宅席我師之屢㨗為駐蹕之宏規可也未及一月遽爾反斾何耶意者天道厭於西北而黄旗紫葢應於東南耶否則聖心倦勤而恢復之義将有待於後人耶邦畿千里惟民所止肇域彼四海四海來假錢塘之形勢此其地矣噫有田一成有衆一旅而祀夏配天開拓若是亦可以為難矣給事中金安節等言竊惟去歲金人渝盟犯侵淮甸兇焰方熾遽自殞滅雖然此可為慶而未可恃也何則天道善應其所培覆常因乎人今眷佑皇家如此可不益思所以副之乎臣愚竊嘗為朝廷深慮以謂當今之計其大要不過有三一曰進取二曰招納三曰備守夫中原之地皆吾土也有機㑹而可取如之何不取中原之民皆吾民也有機㑹而可招如之何不招然觀自昔英雄之君削平禍亂未嘗不先固根本而後征討以致寜一者如漢髙之闗中光武之河内魏武之兖州是也由是言之進取招納雖當乘機而備守之計尤在所急備守者進取招納之本也備守既固以之進取則兵勢益壯而易以成功以之招納則人知所倚而樂於從命不可不早圖也今敵兵逺遁疆埸罷警正天假國家以預為備守之時伏望陛下深詔大臣特創一司遴選練達之士俾之討論如豐財積粟除戎器峻城壘練士卒選将帥等事皆深謀熟計俾歸至當然後廟堂之上審擇而行之如或難於置司則乞詔廷臣及沿邉帥守各陳所見委官㸔詳取其可行者上之朝廷臣愚不足以知大計伏惟留神財度幸甚安節此疏不得其月日奏議集在㸔詳楊存中等條具淮西利害之前而奏中止言進取招納備守畧不及和議則必未聞北人遣使已前所上也今因下詔回鑾附見更須詳之差接伴使在此後一日邵州防禦使知文州節制軍馬向起為鄂州觀察使右武大夫興州前軍統制節制軍馬吳挺為榮州刺史右武大夫達州刺史興州前軍統制劉海為拱衛大夫賞秦州之㨗也時四川宣撫使吳璘在河池遣中軍統制杜實傳令于起等曰軍行並從隊伍勿亂次勿殿後勿踐毁民舍勿掠民財逢敵欲戰必成列為陣甲軍弓弩手並坐視敵兵距陣約百五十歩令神臂弓兵起立先用箭約射之箭之所至可穿敵陣即前軍俱發或敵兵直犯拒馬令甲軍槍手宻依拒馬用槍攛刺忠義人亦如之違者並處斬如敵已敗許忠義人乘其後追擊之必生獲女真及金人與其首級乃議賞否則闕其有以偽地兵為女真金人冐賞者罪亦如之凡布陣之式以歩軍為陣心為左右翅翼馬軍為左右肋拒馬環於左右肋之内以衛歩軍以一陣約計之主管敵陣統制一統領四主陣撥發各一正副将凖備将部隊将則因其隊為多寡陣兵三千二百六十有三歩軍居陣之内者一千二百有七為陣心者一千有六甲軍槍手五百有二神臂弓二百有二平射弓二百有二輿拒馬者二百居陣外分两翅副翼者五百六十有六左翼二百八十有三主陣将官二平射弓二百一十有七神臂弓六十四右翼亦如之馬軍居陣外為左肋者二百六十有一将官二訓練一管隊十隊兵乘騎二百四十有八右肋亦如之雖其間有貼撥輔陣増益之不同而大略可類見矣璘遂遣興元都統制姚仲以東路兵自秦亭出貝鞏州而金房都統制王彦以其兵分屯商虢陜華虢華為敵所取敵去復得之陜州方與敵相持然亦未退姚仲出秦亭在此月不得其日敵取虢華以王之望劄子考之亦是此月事也權知泗州劉繹補正修武郎閤門祇候從淮東制置使成閔請也乙丑制授耿京天平軍節度使知東平府兼節制京東河北路忠義軍馬權天平軍節度掌書記辛棄疾特補右承務郎諸軍都提領賈瑞特補敦武郎閤門祗候京瑞並賜金帶将吏補官者二百人於是京東招討使李寳遣統制官王世隆與瑞等齎官誥節鉞以往盱眙軍奏大金國遣使過界先是金主褒入中都居之且告于太廟以父晉王故名宗輔非帝王所稱改曰宗堯追諡宗堯曰簡肅皇帝廟號懿宗母曰欽慈皇太后追尊東昏王曰武靈皇帝廟號閔宗降亮為海陵王諡曰煬亮后圖克坦氏為海陵夫人又祧徳宗宗幹神主祔懿宗神主于太廟改通天門為應天門以威勝統軍勸農使耶律阿里為平章政事廢叅知政事敬嗣暉為庻人工部尚書蘇保衡遷尚書右丞太府兼權左司郎中魏子平為户部侍郎大興尹李天吉為刑部侍郎修起居注鄭子􅅨復為翰林修撰此以宋翊金亮本末張棣金記参修往歲𣙜場有貨板行明昌事實者云宗堯諡立徳顯仁啟聖廣運文武簡肅皇帝廟號睿宗疑後所加者東昏明年亦改諡孝成皇帝廟號熈宗耶律阿里已下差除從范成大攬轡録趙可文集修入不得其月日但以與亮褒廢立事相干及已嘗見其名字者則書之如阿里之遷嗣暉之廢决在此時趙可撰魏子平墓碑稱大定元年冬入覲中都即拜尚書户部侍郎而墓誌乃云大定元年冬上即位于遼陽公自河南赴京師明年拜户部侍郎則必春初事也成大稱鄭子􅅨為修注葛王立除殿中侍御史兼侍講學士而可所撰子􅅨墓誌云大定二年春復為翰林修撰今從之天吉已見紹興三十一年十月即遣元帥府左監軍髙定建禮部侍郎張景仁來告登位邉吏以聞景仁廣寜人也尚書左司員外郎洪邁充接伴使文州刺史知閤門事張掄副之庚寅宰執奏金使二月渡淮上曰今若拒之則未測來意有礙交好受之則當遣接伴使副於境上先與商量如向日講和本為梓宫太后故雖屈已卑辭有所不憚而今金國主興無名之師侵我淮甸則两國之盟已絶今者使者所以惠我國甚寵然願聞名稱以何為正疆土以何為凖與夫朝見之儀歲幣之數所宜先定不然則不敢受也知樞宻院事葉義問言金人乞和之議未可許之未可拒之許之則不可盡歸侵疆而盟約一成則中原之人無路歸順拒之則兵連禍結未有已時然為進取之計既不可急亦不可緩急則彼将以此為辭恐脅其衆併力拒我緩則彼君臣之分既定上下之情既安盡反虐政以收人心他日圖之艱于今日為今之計莫若且為悠悠之辭以答其求和之請并詔諸帥且與相持俟吾兵威益震其京陜之地半已收復彼有可畏堅來請盟然後聽許惟聖慈財擇言者請命帥司監司於新復州縣搜訪仗節死義不屈北庭之人具名以聞特加優異從之尚書吏部員外郎馮方知邛州從所請也右宣義郎知上元縣李闢之入見右朝請大夫新知廬州方滋辭行太史局奏用二月六日回蹕臨安府從之殿中侍御史吳芾言聞金使将至葢欲觀吾進退視吾虛實不如受禮建康俟其出境然後還亦未晚也不從壬辰洪邁張掄入對上謂宰執曰朕料此事終歸於和卿等欲首議名分而土地次之葢卿等事朕不得不如此言在朕所見當以土地人民為上若名分則非所先也何者若得復舊疆則陵寢在其中使两國生靈不殘於兵革此豈細事至如以小事大朕所不耻陳康伯曰此非臣等所敢擬議上曰俟邁等對朕自以意諭之果州團練使知均州武鉅兼知河南府令招刺効用馬軍五千俟招足日之任司農少卿總領淮西江東財賦軍馬錢糧都絜令赴寺供職建康府市易務經紀人劉彦訟絜欺隐市易息錢故有是命日歴不書此事但于二月辛巳書絜罷農少今因李若川改命追書之耳直秘閣江南東路轉運判官李若川行尚書户部員外總領淮西江東財賦軍馬錢糧右朝請大夫江南東路安撫司㕘議官陳良弼為本路轉運判官右廸功郎添差揚州司法㕘軍髙禹為右承務郎添差簽書常州軍事判官㕔公事癸巳中書舍人權直學士院虞允文池州駐劄御前諸軍都統制邵宏淵御營宿衛左軍統制新知夀春府主管宿亳安撫司公事郭振皆入見右宣義郎劉芮為國子監丞甲午右朝請大夫提舉淮南東路常平茶鹽公事王珏直秘閣金之踐两淮也帥守監司皆遁去珏獨不離所部敵退珏招集亭户復興鹽竈故褒擢之直秘閣浙西沿海制置司隨軍轉運副使龔濤添差两浙轉運副使專一應付李寳軍錢糧左朝散郎知撫州葉謙亨為江南東路提㸃刑獄公事右朝奉大夫通判紹興府孫大雅提舉江南東路常平茶鹽公事乙未接伴使洪邁張掄辭行上顧掄曰洪皓三子其才皆可用丙申太傅御營宿衛使和義郡王楊存中為江淮荆襄路宣撫使中書舍人權直學士院兼侍講虞允文試兵部尚書充江淮荆襄路宣撫副使時上将還臨安軍務未有所付張浚判建康府衆望屬之及除存中宣撫使中外大失望給事中金安節起居舍人兼權中書舍人劉珙言比言金人渝盟干犯王略恃彊凌侮勢必漸衰今陛下親御六飛視師江滸大明黜陟號令一新天下方注目以觀傾耳以聽凡所擢用悉宜得人况欲盡獲羣雄兼制數路大柄所寄尤當審圖國家安危在此一舉存中已試之效不待臣等具陳頃以權勢太盛人言籍籍陛下曲示保全俾觧軍職今復授以兹任事權益隆豈惟無以慰海宇之情亦恐非所以保全存中也儻聖意以允文資歴未深未可專付宜别擇重臣以副盛舉疏入上怒謂輔臣曰珙之父為張浚所知其為此奏意專為浚地耳宰相陳康伯朱倬召珙諭上㫖且曰再激累及張公珙曰珙為國家計故不暇為張公謀若為張公謀則不為是以累之矣命再下珙執奏如初乃止於是允文改使川陜存中措置两淮而已日歴全不載此事今以劉珙墓誌金安節奏議修入但奏議無月日趙甡之遺史畧載除目于丙申今從之允文二月戊戌改命右朝請大夫新知廬州方滋乞招効用千人許之其錢糧總領所應付御史中丞湖北京西路宣諭使汪澈言已復光化信陽軍目今上流事勢稍定詔諸路帥司所遣土禁軍弓弩手並歸原来處徽猷閣待制宋㬇卒是月詔㫖行下民間有得金人所遺器甲送官者以内藏錢償其直人甲十千馬甲减半太府少卿總領四川財賦王之望言昨凖指揮再下本所令應付吳拱襄陽官兵錢糧竊惟四川之地􅄶隘險絶財賦所出不比江浙而於饋餉為尤難古今稱善用蜀者無如諸葛亮亮得南中六郡軍資饒富又一絲一粟不入中原以今凖之事力不侔亮兵前後四出其衆不滿五萬或由祁山或由散闗或由斜谷近止數百里逺不踰三數月木牛流馬轉輸之巧猶每苦糧食之不繼今蜀中大軍十餘萬與金相持於散闗一百三十餘日則兵比亮衆為多右取秦隴洮蘭左取陜華商虢皆仰供億則地比亮境為廣又䕫州萬人防扼亦係本所應副視亮用蜀之費不啻數倍若更令越三千里搬運糧草饋襄陽之戍區區巴蜀何以勝任古所謂千里饋糧者亦不過旬月計耳若錢糧草料三千里外按月責辦豈能免於闕誤契勘蜀中屯軍分𨽻一十八處其潼川興元府綿劒文龍渠金洋階成西和鳯州合用糧料本所每年科支本錢就逐州夏秋糴買應付其利閬两州邉嘉陵江係招誘客販收糴支遣唯魚闗興州大安軍三處合用糧料本所於利閬州糴買數内運三十四萬前去水陸只五六百里約用船脚錢引七十萬道所有馬草只於屯駐州軍收到稅草内應付而四川當無事之時已不堪其勞費今吳四廂官兵一歲當用錢糧草料春冬衣賜物帛紐筭錢引計一百二萬四千五百餘道上件軍兵朝廷已限一季招塡本所自無此一項闕額衣糧若更本色前去襄陽當用水陸脚錢四百三十餘萬道比之應副興州魚闗大安軍所費當六七倍雖竭四川公私之力亦恐難以應辦欲望免行科撥下湖廣總所照應施行從之建炎以來繫年要録巻一百九十六建炎以來繫年要録巻一百九十六金人地名考證阿里原書作阿列誤改見巻三圖克坦原書作徒单誤改見巻一百九十二
