body:
  text: 建炎以來繫年要錄巻八十五宋李心傳撰紹興五年二月乙亥朔秘書少監魏矼直龍圖閣知泉州以矼引親年有請也殿中侍御史張絢言臣仰觀陛下自臨戎以來累降詔㫖約束州縣常恐一毫擾民今又申詔監司覺察州縣至誠惻怛視民如傷雖三代明王之用心不過是矣然臣甞聞自昔國家所患者在人君之澤壅而不下逹小民之情鬱而不上通故君勤恤於上而民不懷民愁怨於下而君不知此最可慮也唐徳宗畋於新店入民趙光竒家問百姓樂乎光竒對以不樂但聖主深居九重未之知也臣每讀史至此未甞不歎息焉故耳目儻有聞見悉願為陛下明言之臣契勘軍興之際諸路除預借坊場折帛錢米外未知有無科擾若浙西一路則既借坊場折帛錢矣又有貼納關子蓋造蓆屋兩色錢此朝廷所不知也貼納關子錢者當時户部之意止謂般運見錢脚重民間却有願來臨安府就請者乃以關子為公私兩便之用今乃不然民間多有不願兊便者州縣不免以等第科俵及執關子赴臨安府𣙜貨務請領則官司却無見錢惟有等守留滯之患而所得十纔六七蓋造蓆屋錢者凡蓆屋一間所費數十千官司既無錢物不免取於百姓上户有認三十間者中户不下一二十間以一路計之民間所出之錢甚廣然官中現用之屋不多未免有欺隱之弊此二者監司不敢輙發則陽為不知州縣不敢申明則隂自計置所以浙西之民多有怨咨而陛下恤民之惠未得均被也欲望明降指揮令州縣從實供具如委曽令民間分認關子蓋造蓆屋限半月陳首特與免罪却委本路監司躬親到州縣分明逐一㸃檢察其姦弊其關子錢民間有未請得者畫時具姓令𣙜貨務日下支給毋得要阻稽滯其蓆屋錢如貪贓之吏出納不明乗時掊歛入已自用即具名聞奏重行竄黜如此則上澤下布下情上聞足以消百姓怨嗟之聲副陛下愛民之意非小補也從之丙子清逺軍節度使神武後軍統制充湖北路荆襄潭州制置使岳飛為鎮寧崇信軍節度使岳飛自池州入朝前一日御筆賜岳飛銀帛二千匹兩封其母榮國太夫人姚氏為福國太夫人親屬為承信郎者一人封孺人者二人賜冠帔三道賞淮西之功也既而飛言母見係太恭人乃詔福國告令吏部修洗改正榮國告拘收申省毁抹改正告身在此月癸巳刑部尚書兼詳定一司勑令章誼試户部尚書熊克小厯將刑部尚書章誼移兵部尋改户部按誼紹興二年九月自刑部侍郎改兵部侍郎遂遷都承刑書去年十二月兼權户部今始正除未甞為兵書也尚書吏部侍郎兼直學士院兼侍講孫近為翰林學士中書舎人兼史館修撰王居正試兵部侍郎徽猷閣直學士知湖州陳與義左朝請郎廖剛並試給事中剛既以母憂去言者論其匿䘮求遷落職事見二年八月至是趙鼎為辨其實復召用之中書門下省檢正諸房公事兼權給事中晏敦復權尚書吏部侍郎祠部貟外郎朱震試秘書少監直龍圖閣知建康府吕祉為中書門下省檢正諸房公事秘書郎林季仲為祠部貟外郎秘書丞熊彦詩為秘書省著作郎降授左奉議郎提舉台州崇道觀李光復寳文閣待制知湖州左朝請大夫提舉亳州明道宫葉煥復右文殿修撰知揚州直龍圖閣提舉亳州明道宫葉宗諤知建康府詔布衣陳得一就秘書省别造新厯令少監朱震監視自行紀元厯至是三十餘年㑹日食正旦太史定食在辰其驗在已定分以九其驗以八得一為侍御史張致逺言此蓋造厯者不能於消息盈虛之奥進退遲速之分致立朔有訛凡定朔小餘七千五百以上者進一日去年十二月小餘七千六百八十而不進今年五月小餘七千一百八十而乃反進一日定臘失序臘日接也以故接新當在十二月近大寒前後定之若近大寒戌日在正月十一月者即用逺大寒戍日定之如宣和五年十二月二十七日丙午大寒後四日庚戌雖近緣在六年正月一日故定十九日戊戌日為臘而太史建炎三年定十一月甲戌晦臘積差之甚將見日不食朔月有朏朒矣又甞為致逺預言正旦日食時分不差釐刻致逺奏得一少嗜厯學老而彌篤年踰七十無甚僥覬且唐初起造厯用道士傅仁均肅宗改厯用山人韓頴茍善推步何必世官得一先被朝㫖待命行在願令得一先正見行之失别定中興之厯仍令取其所收厯書參較太史有無用補遺闕擇厯筭子弟粗通了者授演撰之要庶幾日官無曠厯法不絶故有是命又詔川陜宣撫司尋訪眉州精曉厯數人將所降厯日委官監視有無差錯申尚書省得一常州人也左朝請大夫新知英州沈調罷調歸安人從韓世忠辟為宣撫司幹辦公事至是為州而權給事中晏敦復奏調頃知錢塘縣為守臣毛友發其姦贓荷項禁勘獄已具㑹靖康大赦得免復令長溪貪贓如故不可使守逺郡遂罷之丁丑上御舟發平江府晩泊呉江縣戊寅命祠部貟外郎兼權太常少卿張銖奉太廟神主自海道至臨安府令本府雅飾同文館安奉其景靈宫神御祭享事令温州通判權管詔諸軍揀選老疾不堪出戰人送諸州贍養使臣送吏部先次注授仍限一月以知樞密院事張浚有請也是夕御舟宿平望鎮己夘宿秀州北門庚辰宿崇徳縣辛巳宿臨平鎮壬午御舟至臨安府行宫留守孟庾率京官小使臣以上迎於五里外上乗輦還行宫賜百官休沐三日癸未詔扈從官吏並轉一官資上以緩急之際休戚所同故有是命是日樞密都承㫖兼都督府叅謀官折彦質至行在始趙鼎議遣彦質至川陜諭指西師而彦質奏折可求辜負國恩不能守節臣之兒女七人昨在京師為金人取去傳聞亦在府州儻臣以督府上佐驟至川陜於職事豈能人人得其懽心萬一因疑似之迹興暗昧之謗則臣一身不可自保况為朝廷辦事伏望追寢成命别賜使令詔不許遂罷入蜀之議乙酉尚書右司貟外郎周綱兼權給事中忠訓郎閤門祇候岳雲為閤門宣賛舎人忠訓郎岳雷為閤門祗候侍御史張致逺言自昔立國者兵不貴多貴於有用財不患乏患於無節聚財養兵皆出民力今之獻計者孰不以儲用不繼為先務然莫有原其本者且東南土地不加廣而日以荒蕪租賦不加饒而日以脧耗蓋緣民以力田為苦而游手者軍伍收之避役者度牒假之彊悍者盗賊死之一人耕百人食本先瘁矣民瘁而國富譬人有痿瘵之疾而忽肥何以能久昔漢用孔僅軰皆鬻冶大賈言利至析秋毫唐用裴延齡軰皆宿姦老吏其術多尚虛詐納君掊克之名敝民流亡之苦至有請烹桑宏羊而恨不食皇甫鎛肉者此歛怨之極也故臣以為善理財者宜常固邦本夷吾陶朱不世出得人如劉晏第五琦斯可矣今主計者初非因任復數更易利源不講權柄下移酒稅利源也而諸將侵之通都大邑沽肆成市巨艘成載旗幟縱横皆以軍器囘易為名商販之人復請買牌厯假其聲勢有司不能制也茶鹽利源也而堂吏私之往往窺弄法意自為商販往歲用李仲孺守法示信入納漸廣乃無故而罷去秋變法人人不以為便既輟而復變者皆吏之為也銅鐵利源也而大賈擅之比屋鬻器取直十倍海舟販運逺出山東雖有提㸃兩司何甞料理且如嚴州神泉監其所𨽻兵卒幾百人所管銅鉛等物亦數萬計罷鑄寖久監官坐享俸祿兵卒散充他役餘路可知矣常平利源也而憲司忽之名存實亡乾沒無限且如向賣蔡京朱勔田舎估值太賤劉光世請稍増錢凡合増納者諒亦不少緣多勢吏之家遂緩於追索又重叠請受復冐軍功或一人兼請數邑如三省樞密院人吏者冗費種種臣不暇悉數利源既湮廢而用度復無節户部號稱職者不過賣度牒官告借苖稅淨利士夫扼腕奮臂而言利者不過鬻命婦告身増添酒稅額復置市易換給度牒甚者請𣙜福建鹽耳若以户部為是則民未有舒息之期蓋劍汀諸郡為上四州地險山僻民以私販為業者十率五六鹽産泉福泝流而運寸進於亂石奔濤之間又非廣南平溪安流之比也祖宗以來獨不𣙜此二路者良以郴䖍之人資鹽於廣劍汀邵之人資鹽於泉福頃年廣東以鈔法禁絶之嚴而郴䖍盗起至今未熄福建前此羣盗皆異時私販之人也昨者陳麟條畫賣鈔麟兩任海鄉詳練財計臣初見其說亦謂可行無疑比令下未幾人競般請鄉村鹽價翔貴銖兩計較斤直千錢而篙工厮役僅輸數十千有贏取數百千者狡悍惡少往往厲兵嘯黨將營販鬻賴朝廷察其非便亟寢罷之臣竊以為言利之難茍不深計所入未毫芒所傷已山岳矣唐用劉晏兼領鹽鐵諸使凡二十年今欲理財宜三司精擇使副罷坑冶提㸃併歸諸路曹司以常平茶鹽合為一官稍重其選或憚於改為則姑以户部官吏依倣三司任以職事全計經常量入為出先務省節次及經理儻能盡去愚臣所陳之弊則財用勃然將不可勝用矣詔户部限十日講究條具申尚書省此書係國家大計故具載之但致逺所云去冬變鹽法事乃與趙鼎行實不同當考致逺又奏戎輅所涉臨安平江府秀州三郡迎駕父老乞各擇其年最髙者一人推恩又請罷崇徳縣烽火望樓戒諸守令毋得輙興工役其平江府應辦事務官吏及長安閘官兵皆乞量與推恩從之先是崇徳縣每鄉三里置一望樓調民五人守視論者以為兒戯故致逺及之川陜宣撫副使盧法原言已選銳兵五千令右武大夫開州團練使劉錡統押俟審知駐蹕之地倍道前去詔將兵不須起發令錡疾速赴行在左修職郎朱倬為檢察福建二廣財用所幹辦公事用章傑奏也倬為廣東茶鹽司屬官以宣諭明槖薦召未至為傑所辟傑言倬考第舉主皆已及格乞就任改官許之丙戌宰相率文武百官赴後殿候問聖體承務保義郎已上皆與焉尚書右僕射同中書門下平章事趙鼎守左僕射知樞密院事張浚守右僕射並同中書門下平章事兼知樞密院事都督諸路軍馬始議浚以右揆出使湖外平楊么鼎陞左揆方鎻院之夕鼎密啟曰宰相事無不統不必專以邊事乃為得體暨兩制出浚獨以軍功及專任邊事為言上既以邊事付浚而政事及進退人才專付於鼎矣喻樗語錄曰時張趙二公相得人固知其並相樗獨以為且作樞密使同心同徳亦何不可趙退則張繼之說一般話行一般事用一般人如此則泰道長若同相議論有不合或當去位則一番改更必有參商是賢者自相戾也已而其事亦果如此觀文殿學士提舉臨安府洞霄宫李綱復觀文殿大學士資政殿大學士知温州范宗尹復觀文殿學士左通奉大夫提舉江州太平觀秦檜復資政殿大學士端明殿學士提舉西京嵩山崇福宫張澂龍圖閣學士致仕路允廸並復資政殿學士始用明堂恩也神武後軍統制湖北路荆襄潭州制置使岳飛為荆湖南北襄陽府路制置使充神武後軍都統制將所部平湖賊楊么賜錢十萬緡帛五千匹為犒軍之費以湖北轉運判官劉延年充隨軍轉運及令湖南江西漕臣薛弼范振應副隨軍錢糧左宣教郎直秘閣添差通判湖州趙子偁令再任江東宣撫司統制官張宗顔真除沂州防禦使統制官楊宗閔王進各遷五官將官王再興戚方盧師廸各遷三官以追襲敵馬之功也丁亥趙鼎張浚告謝命坐賜茶浚因曲謝又以儲貳為言上首肯曰宫中見養藝祖之後二人長者年九歲不乆當令就學浚復奏王者以百姓為心修徳立政惟務治其在我則大邦畏其力小邦懷其徳天下捨我將安歸哉固不僥倖於近績也仰惟陛下躬不世之資當行王者之事以大有為正心以正朝廷正朝廷以正百官正百官以正萬民國勢既隆强敵自服天下自歸因書王朴平邊䇿以獻又奏臣昨奉清光竊見陛下於君子小人之分聖意拳拳於此宗社生靈之福也昔唐李徳裕言於武宗曰邪正二者勢不相容正人指邪人為邪邪人亦指正人為邪人主辨之甚難臣以為正人如松栢特立不倚邪人如藤蘿非附他物不能自起臣甞推類而言之君子小人見矣大抵不私其身慨然以天下百姓為心此君子也謀身之計甚密而天下百姓之利害我不顧焉此小人也志在於為道不求名而名自歸之此君子也志在於為利掠虛美邀浮譽此小人也其言之剛正不撓無所阿狥此君子也詞氣柔佞切切焉伺候人主之意於眉目顔色之間此小人也樂道人之善惡稱人之惡此君子也人之有善必攻其所未至而掩之人之有過則欣喜自得如獲至寳旁引曲借必欲開陳於人主之前此小人也難進易退此君子也叨冐爵祿蔑無廉恥此小人也臣甞以此而求之君子小人之分庶乎其可以槩見矣小人在位則同於已譽之以為君子異於已排之以為小人不顧公議不䘏治亂不畏天地鬼神是以自崇觀以來以至今日有異於已者而稱其為君子乎臣以為必無之也彼其專為進身自營之計故好惡不公以至於亡身亡家亂天下而莫之悔惟陛下親學問節嗜慾清明其躬以照臨百官則君子小人之情狀又何隱焉左朝散郎提舉建昌軍仙都觀胡安國復徽猷閣待制知永州不許辭免制曰朕惟士君子讀聖人之書學先王之道豈獨善其身而已哉治人治已成已成物易地則皆然世俗之儒名師孔孟實蹈楊墨可與論中庸者鮮矣安國學優而仕行顧於言通經為儒者之宗論事識治道之體頃從時望召寘𤨏闈方喜便于咨詢顧何嫌於封駮奉身而去亦既累年予力思共理之良爾安得獨善於已零陵雖小有社有民竹馬歡迎相望數舎往讀中興之頌無忘平日之言亟懷印章祇我明命安國聞詔問舊宰執攻戰等四事以書遺其子起居郎寅曰此詔問舊宰執即是國論未定正要博謀若賛得國是其績不小汝勉思之吾有時政論二十篇雖未詳大綱舉矣諸葛復生不能易此也左朝散郎王擇仁知廣徳軍擇仁自蜀還行在上召對而命之户部侍郎兼權知臨安府梁汝嘉請倣祖宗故事置朝集院以待四方之士詔疾速措置其後侍御史張致逺言陛下鑾馭比還祗以建康營葺未就緒而平江素無官府暫囘之語詔墨未乾然輿議尚有紛紛頃因迎奉神主只令雅飾同文館權充太廟示以不作久計聞者方復竊喜意謂陛下將載而北征復我故都以慰祖宗在天之靈其企見中興之功蓋如此今乃過計於覊旅若將安焉實臣所未諭乃罷之是月庚寅前降指揮不行是日定國軍承宣使統制闗外軍馬呉璘武泰軍承宣使同統制闗外軍馬楊政復秦州先是川陜宣撫副使呉玠聞敵犯淮南遣璘政乘機牽制璘等出竒兵自天水至秦諭偽守胡宣以逆順宣不肯降遂攻之拔其城秦民大恱金右都監薩里罕聞秦被圍集諸道兵來援政復擊敗之熊克小厯載拔秦州事止書楊政而不及呉璘今以璘墓碑及日厯宣撫司奏功狀修入戊子詔都督府以諸路軍馬為名命倉部貟外郎章傑因便措置招撫湖廣江西群盗詔黄誠楊太等如率衆出首當議與湖南北路知州差遣先是張浚以湖寇為腹心害欲招來之㑹誠之黨周倫自稱統管鄉社水陸兵馬以狀抵岳州乞保奏且以鍾相作亂事歸罪於孔彦舟詔以黄榜放罪令誠等一行人船趁此春水順流赴張浚行府或劉光世軍前當議優與轉官仍舊專充水軍若有願乞外任之人許乞本鄉或鄰近州軍鈐轄都監差遣願歸農人於鼎澧州支撥閑田養贍仍免五年稅役倫又言劉豫遣來招誘使臣前後十人已行斬首乞下邊界幾察詔誠等忠節顯著深可嘉尚制置使岳飛又乞以荆湖一郡授二人故有是命是日詔諸路宣撫司偏裨將佐自今士卒有犯依條斷遣問當有官人具情犯申樞密院量度事因重行編置毋得故為慘酷因至殺害如遇教閱行軍即依自來條例施行按此指揮雖云為偏裨設然令徑申密院則是大帥亦不得專殺也朝廷指揮不得不爾今具存之己丑上躬率百官遙拜二聖自親征此禮權廢至是復行之左中大夫致仕翟汝文復端明殿學士尚書刑部侍郎兼侍讀胡交修兼直學士院尚書左司貟外郎徐把兼權給事中右司貟外郎周綱改權中書舎人並俟正官到日罷詔責授中大夫秘書少監分司南京黄潛厚落分司提舉台州崇道觀已而殿中侍御史張絢奏其宿負且謂向者潛善誤國姦謀多出此人忠義之士扼腕憤怒望永不收叙以為臣子之戒乃詔更俟一赦取㫖詔臨安府修蓋瓦屋十間權充太廟用守臣梁汝嘉奏也既而侍御史張致逺言陛下頃自平江自進發間先降指揮暫囘臨安委江東帥漕繕治建康路逐省部百司倉庫等具圖來上駕方至臨安又首議差官奉迎太廟神主令梁汝嘉雅飾同文館權充太廟中外聞之靡不忭蹈咸謂陛下進都之意决矣竊聞建言者以同文館隘陋不勝當别有營造夫奉迎神主至孝也宗廟事至重也雖罄帑藏竭民力宜無所吝臣下亦駿奔肅助之不暇宜無所言然臣聞漢髙祖有言吾萬世之後老思豐沛今中原雖隔絶而陵寢故在京都雖未復而廟社僅存顧澤國偏方正使九筵複棟極其嚴潔萬一四方傳播以為朝廷剏建太廟兹焉定都人人解體難以家至户曉至失興復大計臣恐祖宗在天之靈未必樂此採於外議謂同文館若就加葺飾亦足崇奉必不獲已惟有明慶寺耳伏望睿斷以臣二說擇一而用之所有别建太廟指揮乞改付建康先次計置營造以慰祖宗在天之靈以繫將士軍民之望以絶敵人窺伺之謀天下幸甚殿中侍御史張絢亦奏人言籍籍難以户曉祇謂陛下去歲建明堂今年立太廟是將以臨安府為乆居之地不復有意中原矣萬一此疑不釋至於蕃偽見窺將士解體有誤社稷之計則祖宗在天之靈反以為憂矣謂宜只令雅飾同文館權安神主庶使羣情曉然知陛下止為孝思祖宗急于祠奉初無奠居此邦之意後二日有詔汝嘉隨宜修蓋不得過興工役俟移蹕日復充本府使用後詔在二月辛夘是日奉安濮安懿王神主於紹興府充孝寺之法堂庚寅賜侍御史張致逺五品服以其數言事也嶺南編管人何大圭放逐便特復左承事郎大圭建炎末為三省樞密院幹辦官坐罪廢斥及是宰相張浚為之保叙故遂復舊官詔樞密院幹辦官除扈從賞外更轉一官减二年磨勘尚書省户房更轉一官以本院言機速房晝夜專一行遣邊防軍機文字利害至重户房應辦大軍錢糧激犒等並無曠闕故優賞之辛夘特進觀文殿大學士提舉臨安府洞霄宫吕頥浩復鎮南軍節度使開府儀同三司以明堂恩也徽猷閣待制都督府參議官程昌㝢知江州昌㝢守鼎州六年賊不能犯至是就用之後數月新守程千秋始至鼎州時湖北兵馬都監杜湛亦改為都督府左軍統制千秋因留湛所將蔡兵捍賊熊克小厯載昌㝢除參議官千秋知鼎州在今年六月按日厯二人改除並在去年十月而昌㝢以今年六月去官克遂誤記也左朝奉大夫新知建州鄭彊特遷左朝請大夫彊前守汀州㑹寧化縣按囚當死者十人知縣事楊耆年以獄上彊按得寃狀悉破械縱去刑部侍郎胡交修言縣令為民父母而殺無罪十人徼幸進秩不重寘典憲無以塞天下之怒詔重黜耆年進彊二秩左朝散郎尚書金部貟外郎張成憲進官一等以淮東宣撫使韓世忠言本司駐劄江上近二年成憲應辦錢糧並無闕誤故也福州言顯謨閣直學士辛炳卒詔炳任中執法操行清修今其云亡貧無以葬特賜銀帛二百匹兩壬辰詔張浚暫往江上措置邊防且賜諸路宣撫制置司手詔曰朕以敵人逺遁邊圉稍安臨遣相臣往行師壘西連隴蜀北泊江淮既加督䕶之權悉在指揮之域既難從於中覆宜專制於事機咨爾多方若時統率欽承朕命咸使聞知詔下在是月庚子右司諫趙霈言安危治亂之機相為倚伏今鑾輿言還逺邇寧乂臣願陛下無忘親征時臣亦無忘扈從時則治安可保恢復可期矣伏望益軫聖念載廣逺圖知晏安不可懷則前日跋履之勞不可忘也知豈樂不可極則前日宵旰之憂不可忘也知前日倉卒之驚則凡所謂備禦之䇿其可忘乎知前日餽餉之艱則凡所謂理財之道其可忘乎臣於此當念扈蹕之勞殫報國之誠指陳得失獻替可否庶幾君臣上下共享治安之美如漢光武唐太宗時無愧馮異魏徴之所陳不勝至願詔霈論奏深得諫臣之體可轉一官賜紫章服仍令尚書省將所奏修寫成圖進入熊克小厯載此事於五月辛夘蓋誤臣何俌龜鑑善乎趙霈之言曰願陛下無忘親征時亦無忘扈衛時此與馮異之勉光武者何異時呉芾亦曰陛下勿以敵之進退為憂愉勿以事之緩急為作輟凡下詔必務責己引對必令盡言此與陸贄之告徳宗者又何異君臣上下警戒如此敵其可謂中國無備乎侍御史張致逺言天下之勢猶一人之身庶民處心腹之中外國在皮膚之外故外國侵侮是謂皮膚不仁儻善用藥石其去甚易庶民稔亂是謂心腹蓄毒若養而不治其愈實難今之洞庭郴䖍廣東嘯脅者仍在此心腹之疾也洞庭阻固累年於茲招安之人屢遣而大半不還水陸之師每進而無敢深入臣嘗究訪曲折蓋其巢穴綿亘甚廣軍民嘯聚甚衆抄掠儲積甚富伏聞廟筭己定臣不多言至如郴䖍廣東乍起乍息略無寧歲往者岳飛至所遣徐慶日破一寨群賊假息村落殄滅可期慶遽追還餘黨遂復熾矣呉錫至郴襲賊入韶州朱廣鄧晏等頗見窮促未幾而錫亦徑歸長沙責任不專無益於事韶連南雄近為郴寇所擾雖韓京屢小㨗而軍威不振循梅潮惠又苦䖍寇出沒重以土豪殘暴人不聊生廣東州府十四惟西江四郡粗得安堵其他蓋無日不聞賊報十百為群所至焚刼而惠州河源縣凌竦曽衮二項人數最多衮嘗就招安補官為歸善廵檢頃復歸河源其徒居於水上自惠至廣相屬也帥守監司幸其不入州縣各僥倖罷去無肯任其責者故憚於上聞一方閔閔無所告訴臣甞為陛下言之矣繼以江淮有警度朝廷未有餘力今適可為之時更緩而不圖是養心腹之疾然帥守監司所以憚於任責者亦有一說諸郡素不儲糧大兵難以持久以臣愚慮宜以此事付之諸帥仍令委江湖閩廣諸漕使各應副糧草韓京一軍并元通黄進之黨各四千餘人見駐韶州令湖南帥司遣任士安等入郴州宜章與京相應以經營郴與北江數州令江西帥司遣趙詳等由䖍州安逺入循梅令福建帥司遣申世景由漳州入潮惠相為犄角以經營䖍與東江數州視賊所向不以路分逺近或分或合且招且捕招者刺其壯徤捕者釋其老弱若委任得人信賞必罰不過歲月之間可以平定詔逐路提刑司體究有無上件賊火申尚書省又詔郴䖍廣東諸盗限兩月出首内有材武之人願赴都督府使喚令帥司津遣前來當議不次任使癸巳左廸功郎成都府府學教授雷觀特改左承奉郎觀成都人靖康初以上書賜第為太學博士俄罷去上聞其名故召對而有是命觀又獻蜀本資治通鑑乃以觀通判潭州觀進通鑑在三月甲戌除倅在丁丑今聯書之賜荆襄制置司統制官李道崔邦弼金束帶各一録襄漢之功也飛承制以其將武功郎姚政于鵬並為武顯大夫至是申命乙未宰相趙鼎張浚請鑄都督府印應川陜荆襄都督府事務見管官吏兵將官物等併歸本府行移依三省體式其與三省樞密院往來文字依從來體例互闗合行事件待報不及者聽一面施行浚又乞神武中軍將官王存及本軍一百人騎并昨江上措置日有支使不盡激犒金帛等並行取撥前去又於左藏庫支撥空名文武官告三百道皆從之封太常博士陳確寡㛐楊氏為孺人確自言少養於楊氏乞以明堂封妻恩回授庶酬其平生撫養之恩特許之非常制也和安大夫忠州刺史致仕樊彦端落致仕判太醫局詔臨安府曽得解舉人特免文解一次以諸生援紹興明堂赦恩有請也責授永州别駕潮州安置王以寧許自便詔左朝奉大夫太常博士耿洵特與致仕恩澤一名洵在揚州為敵所執至是用其家請而命之仍詔更有似此之人依此丙申參知政事孟庾夫人徐氏薨於桐廬縣詔賜庾告半月往視之詔遣監察御史一貟往江西閩廣諸路體訪捕盗時已用張致逺言命神武中軍將官趙詳廣東兵馬鈐轄韓京福建兵馬都監申世景王進各率所部不拘路分㑹合招捕樞密院言尚慮詳等遷延乃遣臺臣體訪如監司帥臣不切措置漕臣不為應副錢糧統兵官遷延玩寇並令按劾以聞當議重寘典憲仍令樞宻院各降黄榜付詳等軍前招諭又令福建安撫使張守遣官密訪進兵勤惰等事逐旋聞奏偽齊成忠郎左恭特補秉義郎恭為劉豫部糧至淮隂縣遂以所部舟十五艘米千五百斛來獻故録之賜荆襄制置使岳飛金字牌旗榜十副充招安使用從飛請也右朝請郎提㸃江淮等路坑冶鑄錢公事韓寅胄罷寅胄琦曽孫也金之入犯也寅胄自鄱陽挈家遁去寓建州之崇安至是為殿中侍御史張絢所劾故黜之是日雷聲初發丁酉詔參知政事孟庾沈與求簽書樞密院事胡松年各進官一等以措置防秋之功也於是徽猷閣待制胡安國與其子起居郎胡寅書曰昔裴度平淮西功亦大矣制辭不過曰燕弧載櫜楚廣旋軫錫階旌徳胙土執勤而已李繼隆澶淵竒績止進一階比觀二揆制詞四將賞典頗未曉也又曰元鎮非大手亦得一半恨佐之者弱元鎮趙鼎字也詔自今旬休日令宰執摘按神武中軍事藝精熟人量行激賞令樞密院榜諭吏部奏武臣陞朝官已上賞立戰功人遇大禮並加勲乞著為令用大理寺丞韓仲通奏也事見去年七月辛未後亦不果行都督府奏改詳議官為諮議軍事又奏右朝議大夫知常州詹至主管機宜文字司農寺丞蓋諒幹辦公事皆從之戊戌手詔監司守令勸農左文林郎建昌軍軍學教授李彌正左廸功郎沿海制置司幹辦公事髙閌並改合入官除秘書省正字閌甞從楊時學至是為趙鼎所薦皆召對而命之閌初見紹興元年四月彌正初見三年六月詔監司州縣官吏公人毋得収買官田右武大夫同管客省四方館閤門公事宋籛孫以扈從恩特轉遙郡一官籛孫自陳係隨龍人特有是命殿中侍御史張絢言籛孫特於遙郡上轉行超躐衆人數等彼身冐鋒鏑萬死一生者儻或聞之豈免别生僥覬况隨龍請給同於軍功若特轉如此其祿廪合増兩倍臣又謂朝廷紀綱由乎三省詔令所出當從中書審覆駮正當由門下受而行之當在尚書三省相成不可闕一今籛孫所得聖㫖只云中書門下省閤門狀則是不經由尚書省也兼臣檢照比年以來閤門自取特㫖作中書門下省閤門狀降出指揮者前後非一賞失於僭則啟僥倖之門法失所守則成紊亂之弊二者之患漸不可長望速賜改正只令依常格施行仍乞今後不許閤門以私事徑自取㫖並須經由三省及應干隨龍人今後亦不得妄有僥求庶幾大公至正之道可以克濟中興不為小補輔臣進呈上曰絢所論極當可即令改正然隨龍人偶有一日攀附之舊輙僥求恩澤不已朕每抑之今後有如此者可令臺諫論列上語在閏月乙酉詔神武中軍見入隊官兵每五百人為一指揮選將校置兵籍俟就緒日取㫖賜軍名渡江以來諸小將之兵及招安群盗往往撥𨽻中軍然無排置之法至是始舉行焉己亥手詔以中原未靖介處一隅令公卿百執事交修不逮仍榜朝堂賜信安郡王孟忠厚兩浙官田三十頃尚書左司貟外郎徐把直徽猷閣提㸃江浙荆湖福建廣南路坑冶鑄錢右司貟外郎王綰直徽猷閣知漳州右朝散郎馮國泰知萬州右朝請郎喻汝礪知普州左朝奉大夫提舉江州太平觀張綱集英殿修撰提舉臨安府洞霄宫賈安宅右太中大夫提舉台州崇道觀湯東野並復徽猷閣待制秘閣修撰提舉江州太平觀王衣復集英殿修撰左朝請大夫提舉江州太平觀栁約左通議大夫提舉南京鴻慶宫馮温舒並復秘閣修撰皆用刑部檢舉也既而言者論安宅明受間不從葉夢得勤王之議御史張絢論温舒借勢於梁師成以得館職並乞寢罷以俟後赦從之詔呉國長公主二子並補武節郎賜名令中書舎人訓選近歲公主子例補副使一遷即領遙郡孫曽皆京秩云故武翼大夫趙士遒特贈武徳大夫官其家二人士遒守官江州為馬進所殺故錄之庚子命翰林學士孫近直學士院胡交修編類職事官條具利害章疏進入初上既命群臣條具而宗正少卿直史館范冲面對謂天下之事言之非難而聽之為難聽之非難而擇之為難臣伏見神宗皇帝治平中詔内外官上封事者委翰林學士承㫖張方平學士司馬光詳定利害以聞於是方平等言百官所上封事其間但陳箴諫之言及泛論治體者欲節略編寫成册奏御若指陳時務利害有可行之事即具聞奏乞降付二府施行若大意可採而文辭鄙俗事理不盡者臣等逐節别立看詳冀文理稍備其上封事人開陳國體時務文理詳明才識出衆者官貟乞依詔書甄擢其次賜勑書奬諭布衣乞下有司召問令逐一條對委有可取量才錄用從之臣竊惟中國無事之時採納羣議如此其至况今内修外攘建太平之基業復文武之境土時不可失實資群策之助伏望陛下明詔有司依倣治平故事編類進呈斷自聖意擇而行之故有是㫖左朝奉郎兩浙轉運副使王俁守尚書左司貟外郎直徽猷閣湖南制置大使司參議官張宗元守右司貟外郎後六日詔俁暫權給事中俟廖剛至日罷左宣教郎何掄為秘書郎掄青城人張浚所引也左朝請郎呉表臣提㸃兩浙西路刑獄公事秘閣修撰主管台州崇道觀劉寧止提㸃江淮等路坑冶鑄錢進士劉儼特補進勇副尉以儼自雄州歸朝言利害也淮西宣撫司統制官親衛大夫康州防禦使知丹州酈瓊翊衛郎劉光輔來獻光州之㨗詔賜其軍錢二萬緡以瓊領宣州觀察使光輔遷拱衛大夫文州刺史而統領官武功大夫吉州團練使孫琦亦遷右武大夫琦即建炎初寳應縣作亂者辛丑尚書左僕射趙鼎監修國史鼎奏范冲直史館於臣為外姻願以授浚上曰安可以冲故廢祖宗故事况史館非朝廷政令之地可無辭前二日冲以史事入對奏疏曰臣竊惟神宗皇帝實錄既經删改議論不一復慮他日無所質證輙欲為考異一書明示去取之意設若不當稍涉私狥則罪有所歸何所逃刑據史館所用朱墨本出於臣僚之家私相傳錄書寫之際悉從簡便臣記紹聖重修實錄本朱字係新修黄字係删去墨字係舊文今所傳本其删去者止用朱抹又其上所題字蓋當時簽貼今考異依重修本書寫每條即著臣所見於後庶幾可考方神宗皇帝在藩邸及即位之初治平之際未有大議論也舊史成於元祐六年而王安石日錄出于紹聖之後新史專用安石之說去取之際各有可議㕘照稽考必求其當此則見於熈寧之後也臣衰病不才誤膺付委固不可避凟煩之誅然先朝大典設官置局上有監修次有修撰而臣妄愚進越乃敢專逹止緣從便之日輙為此例上禀聖訓恐可如此修定臣智識淺近學業荒蕪遣辭非工敷叙不明此臣不能勉彊者也其如議論之未精考覈之未詳前後有所牴牾本末或相乖違伏望陛下貸臣之罪容臣是正當稽於衆論資于官長固非臣所得專也其考異五巻乞付史館更慿衆議刋定修立從之按宋史繫己亥日左中奉大夫潼川府路轉運副使陸彦欽為川陜宣撫司㕘議官用盧法原奏也詔淮西宣撫使劉光世妾許氏寗氏呉氏並封孺人用光世請也時吏部勘當自來特恩所得封號許陳乞親屬如遇赦封妻亦召保官委係禮㛰正室封贈本部未曽行遣過似此體例合取朝㫖詔特從所乞中興後諸大將封妾自此始壬寅侍御史張致逺言自古為官擇人故人勝其任後世為人擇官故官失其職比年以來不復因任號公選者猶不量其能否狥私意者豈復計其賢愚故天下之務日以委靡無所責成而百官有司亦寖失其職監司守倅皆按察官也乃不責以糾劾而分遣臺屬諸路漕臣正轉餉官也乃不責以應副而别遣郎曹舉此二端倒置已甚欲革其弊惟在於摭公議以因任耳臣願陛下飭諭執政大臣自今中外有闕皆以公議能否而進擬除授仍令給舎臺省察其選用未當亦以公議是非而繳駮論列如此則官惟其人人勝其任賢才彚進朋比不作中興之業陛下垂拱仰成矣詔三省樞密院遵守左中奉大夫黎確復徽猷閣待制右通議大夫提舉江州太平觀程唐左朝議大夫提舉江州太平觀方孟卿並復集英殿修撰既而言者論確甞勸張邦昌罷東南貢獻以收人心論唐諂事童貫不當叙命遂寢確罷職在是月戊辰唐罷職在己巳都督府奏改參謀參議官為參謀參議軍事從之癸卯進呈殿中侍御史張絢言宰相用才雖不當以鄉閭親舊為嫌更宜廣訪寒畯上曰朕亦面諭絢茍如此則朋黨之風自破矣張浚曰大臣以國家為心則所用人才必取公論安有朋黨趙鼎曰用人才所以立國臣任宰相豈敢乆居至於立國規模則不敢不為乆逺計尚書户部侍郎兼權知臨安府梁汝嘉充徽猷閣待制知臨安府以汝嘉言心力有限不能當兩處繁劇故也後三日陞徽猷閣直學士甲辰申嚴吏部禁謁應在部人整㑹文字聽於食前具事因見長貳郎官呈禀仍不接坐著為令詔湖南上供錢物及進奉並免三年日厯無此今于七月二十五日本路運司狀修入是月端明殿學士川陜宣撫副使盧法原薨於閬州初宣撫副使呉玠言法原以憾不濟師不餽糧不給錢幣不應副器械功成又不銓量獲功將士上以手詔詰法原法原辨數甚悉上不以為是法原又上疏開具自到任後來應副玠軍馬等事且言人微望輕無以塞責乞一宫觀差遣詔不允時都督府主管機宜文字楊晨行至逹州之通明而參議官范正已等白以法原乆病乞致仕即日本司事無人與决乞速降指揮晨具以聞有詔法原委任非輕義當體國協濟事功不可託疾引避仍仰晨宣諭至意令法原日下視事而不知法原已卒矣盧法原卒未見本日李燾撰趙開墓誌係於閏二月按日厯閏二月二十二日丙寅楊晨申法原乆病乞致仕以地理計之自閬州申至通明又自通明申至行在非月餘不能則法原之卒當在前二月矣日厯宣撫司奏二月十五日秦州捍禦事亦止是呉玠單衘無法原名今且附此當乞法原墓誌増入偽齊將商元率衆千餘襲信陽軍成忠郎閤門祗候知軍事舒繼明率麾下十三人轉戰登師陽門矢盡被擒賊誘以美官繼明罵曰吾寧為大宋鬼豈汙逆耶汝速殺我驅行至軍北史陂竟不降遂遇害後贈修武郎官其家一人荆襄制置使岳飛聞敵退乃以忠訓郎閤門祗候權隨州兵馬都監李廸知軍事就戍之舒繼明事以信陽圖經修入日厯繼明四月己巳贈官李廸三月乙未正差淮西宣撫司將官陳琳叛琳者親兵統制官張琦之裨將也勇力過人屯於蕪湖縣刼琦以衆奔偽齊統制官王徳追至襄安鎮屬無為軍獲琳而歸失琦所在閏月甲子奏至明年五月琦復歸劉豫罷什一税法改行五等税法建炎以來繫年要録巻八十五金人地名考證薩里罕原書作撒離曷誤改見巻十一
