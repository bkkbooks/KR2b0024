body:
  text: 建炎以來繫年要録巻一百十六宋李心傳撰紹興七年閏十月已未朔故左中大夫李回追復端明殿學士官其子孫三人以其家有請也庚申權尚書吏部侍郎劉寧止權户部侍郎王俁竝落權字監察御史金安節守殿中侍御史安節為察官嘗論大功未立羣情凛凛而昧者乃欲竭民之力而僥倖於一舉豈不殆哉臣謂今日之計莫若早自治而已欲自治則選將以訓兵擇吏以安民䘏費以豐財誠當世之急務又論自用不若用人用寡不若用衆國家所以用輔弼之臣而置諸左右者非茍取充位而已盖欲可否相濟彌縫朝政之闕也今天下多事正馳騖而不足之時欲望陛下斷自宸衷衆建大臣而使均任其責庶幾廟堂之上分職率屬而不至於專權同寅協恭而不容於備位可否相濟謀無不獲至是遂進之安節所言不得其日必張浚未去位以前所上今因遷職附書之直龍圗閣主管台州崇道觀吕本中試太常少卿直龍圗閣新知泉州林季仲為中書門下省檢正諸房公事季仲既至建言禍亂未平不足憂風俗未革深可畏比年以來大臣去位凡其所行之事所引之人率皆廢而逐之輩出輩入相傾相擠彼亦一是非此亦一是非是非至於今未决也遂使陛下願治之心憒憒然無所底定而在位之臣亦或畏首畏尾不敢展四體以從事葢懼後患之必至也嗚呼士大夫如此亦已甚矣今日何日而忍為是哉臣願陛下體貎大臣進退以禮唯當疇咨於未用之前不當致疑於既用之後誠得其人則委以庶政責以成功使夫䜛間之口不得以入焉必不得已而罷出之姑示涵容而露彈章於天下如漢故事策免三公但以隂陽失度盗賊未弭為言雖不斥言其罪人亦自知之矣孰與滛言醜語狼籍白簡内見侮於中國外取笑於强敵使之輕其臣以及其君乎至於所行之事不必槩廢問其當否可也所引之人不必槩逐問其賢否可也如此則皇極建私黨銷而風俗可革矣尚書户部員外范璿為樞宻院檢詳諸房文字資政殿大學士提舉臨安府洞霄宫王綯薨于平江府特贈七官為左光禄大夫辛酉寳文閣學士知廣州連南夫條上市舶之弊大略言市舶司惟藉蕃商往來貨易大商滿亞里者昨至廣州有武臣曹訥利其財以女適之亞里遂留不歸上因令南夫勸其歸國運蕃貨往來上曰市舶之利最厚若措置合宜所得動以萬計豈不勝取之於民朕所以留意於此庶幾可以少寛民力耳進士江俊明獻陣圗詔賜束帛壬戌給事中傅崧卿兼史館修撰時崧卿在行宫未至也詔江東西州縣民户輸納米毎石收水脚錢二百文此以紹興二十七年六月戊申葉義問所奏修入日歴無之癸亥左正言辛次膺論士大夫營私不任事之弊詔榜朝堂時趙鼎再相已逾月未有所施設朝士或以此責之鼎曰今日事如乆病虛弱之人再有所傷元氣必耗惟當静以鎮之若作措置煥然一新此起死之術也張德逺非不欲有為而其效如此亦足以戒矣集英殿修撰提舉江州太平觀董弅充徽猷閣待制知嚴州故直徽猷閣趙康直特贈徽猷閣待制依所贈官禄其後時偽境揭榜言康直與吕祉已被害京東淮東宣撫處置使韓世忠得而上之故優䘏焉是日趙鼎奏張俊措置河道事上曰俊每事必親臨所以有濟上因言朕每論將帥須責其挽弓騎馬人未知朕意必謂古有文能附衆武能威敵不在弓馬之間抑不知不能弓馬何以親臨行陣而率三軍使之赴難况今時艱將帥冝先士卒此朕之深意也時俊以全軍還行在上欲令俊盡以舟師分布控扼然後引兵渡江鼎曰淮西寂然無警似不必爾外間便謂朝廷棄淮西矣當一向勿顧不發一兵彼未必敢動上以為然乙丑上諭大臣曰川陜茶當專以博馬聞吳璘軍前向或以博馬價易珠玊之屬艱難之際戰馬為急可劄下約束端明殿學士致仕翟汝文端明殿學士提舉鳳翔府上清太平宫宇文粹中端明殿學士提舉嵩山崇福宫王孝廸並復資政殿學士丙寅左宣教郎尹焞為秘書郎兼崇政殿說書焞及國門稱病未巳上趣起之既而焞入見遂就職焞每當講前夕必齋戒沐浴或問之曰欲以所言感悟人君安得不敬焞時年六十七矣焞既至講筵數日即乞致仕翌日趙鼎言焞有山林志不樂居此願陛下以禮留之因加賜賚焞乃止後有言於上者乃謂其徒相與造謀欲朝廷見留以為高云監察御史趙渙以親年高求去除江南提㸃刑獄公事主管殿前司公事楊沂中乞三綱馬上曰川廣馬到朕未嘗留盡以均給諸將若小不均則謂朕有所偏沂中馬少而張俊近以老馬數百匹納樞宻院可以兩綱付沂中而以一綱付俊己巳上謂大臣曰朕思今日安民之要無過擇監司郡守而已士大夫求差遣茍其履歴可為便以與之雖滿求者之意而其間或有不材之人奈一方赤子何可降旨令侍從官不限員數舉可以為監司郡守者中書置籍遇有闕卿等議以差填朕亦當書屏風置諸左右以時揭貼見在已差人不任職而無他過與自陳宫觀公議亦必為是上又曰繆吏之害民甚於贓吏贓吏一吏取錢爾繆吏為州則一州之胥吏皆取錢為縣則一縣之胥吏皆取錢其害民豈不甚於贓吏也秦檜曰向令内外侍從舉知縣而有互舉其子者其子又皆貪贓上曰侍從官朕之所取信也而其任私欺謾如此朕當時不知若知之當竄之嶺表卿等可諭諸從官須妙選實可為監司郡守者使實惠及民若茍求著中人材以應詔令則所得不過平常之人爾他日若所舉稱職朕當賞其知人趙鼎曰敢不祇承聖訓庚午殿前司中軍統制官王存進武校尉賀允升並降兩官存上書乞許張浚自便趙鼎進呈乞黜責上曰朕非不能容一王存但進退輔弼豈小臣所當議他日將帥或干預其間非國之福先是允升獻詩百篇其間多醜詆浚乃詔存允升不循分守並降官仍黜存為本軍正將右朝散郎莫將行太府寺丞將洪州人通判利州代還上疏論時事後省㸔詳以為援古證今皆有條理遂詔對而有是命將䟽言天下之事成敗得失在理不在形形者衆人共争之地理者衆人不見之處願陛下㳺心於所不争之地以求治安之理勿貪功於須㬰勿喪志於少屈彼劉豫者助敵為虐石敬瑭趙德鈞之禍豫必不免陛下姑俟之詔侍從官各選可為監司郡守之人不限員數具名以聞務令實惠及民不為文具故左從政郎徐鼎特贈左承事郎官一子鼎權桃源縣為水賊龔亨所殺故録之辛未詔堂除吏部窠闕並依去年十二月丙午指揮以前舊制施行自張浚獨相欲革内重外輕之弊乃詔郎官館職二年並補外又取寺監丞以下至外州學官送部者百闕而取知縣堂除者四十處未幾郎曹館職請外者衆終不克行至是又復其故焉詔史館見修徽宗皇帝日歴以實録為名時秘書省著作郎何掄言日歴視實録格目尤詳今記注不存編次無日故有是命甲戌户部尚書章誼等請用禮官議為徽宗皇帝作主袝廟詔恭依初趙渙之為御史也建言今雖迎奉梓宫未可指日請不竢梓宫之還作主袝廟於是禮官亦有以宗廟乆闕祭享為言者今年五月朝廷業已遣使欲少竢之至是祠部員外郎兼權禮部勾龍如淵言宗廟祀典不可乆曠請依明德皇后故事行埋重虞祭袝廟之禮詔侍從臺諫議于尚書省閏十月己巳尋又詔禮官同議議者言如淵所請權時制宜於禮為得乃倣虞袝練祥次第于小祥前擇日行之左朝議大夫周審言降授左宣義郎不得與親民差遣審言浦城人登政和貢士第為朱勔子壻以選人進頌改京官累遷直徽猷閣知秀州至是以討論不得調訴諸朝詔以為左朝散郎聽參選左正言辛次膺論審言登科第而甘心婚朱勔之息其間僥冐可鐫者詎止五官望存出身一資外追奪乃又降五官乙亥檢校少保瀘州軍節度使充中太一宫使錢忱開府儀同三司忱從其母秦魯國大長公主入朝主奏忱自建節鉞十有七年欲望聖慈以仁祖之甥戚里之舊特於節鉞之上優賜推恩詔三省樞宻院進擬而有是命主入謝上從容語之曰大長公主壽考如此乃仁宗皇帝四十二年深仁厚澤天下愛戴鍾慶於長公主在家待遇諸子宜法仁宗皇帝之用心須是均一長主曰未嘗敢不均一也上知愐愷非主所出常偏厚於忱故訓諭及之丙子詔左朝奉大夫徽猷閣待制提舉江州太平觀李彌大降二官左奉議郎廣南東路提㸃刑獄公事韓璜降一官彌大之守静江也璜提㸃廣西刑獄有強盗屈巢弟等作亂陽朔尉王鎬為所殺法當絞彌大以經略司酌情處斷盡斬之璜劾于朝去年四月乙卯遣大理寺丞吳彦璋即静江鞫治十二月乙未獄成璜亦坐所奏不盡實故有是命彦璋又言鎬因捕賊被害情有可矜乃録其子為下州文學王鎬得恩澤在今年八月癸卯今聫書之按屈巢弟强盗殺死縣尉而彌大乃坐誤引絞入斬抵罪不知何故當考熊克小歴於是月書彌大自工部尚書出為廣西安撫使實甚誤矣丁丑詔以春寒賑恤行在建康府貧民如平江例己卯龍圗閣待制知處州劉大中試禮部尚書徽猷閣直學士知荆南府王庶試兵部侍郎趙鼎以庶知兵故薦用之庚辰韓世忠乞統制官許世安功賞上曰世安雖勇果不及呼延通等而平穏曉事過之平居議論多有補於世忠上於諸將偏裨其材性短長亦照臨無遺如此起居舍人勾濤為故觀文殿大學士張商英請諡詔令太常寺定諡紹興十四年五月丙寅諡文忠辛巳觀文殿大學士江南西路安撫制置大使兼知洪州李綱提舉臨安府洞霄宫時趙鼎秦檜已叶議回蹕臨安綱聞知上䟽諫大略謂自昔用兵以成大業者必先固人心作士氣據地利而不肯先退盡人事而不肯先屈是以楚漢相距於滎陽成臯間髙祖雖屢敗不退尺寸之地既割鴻溝羽引而東遂有垓下之亡曹操袁紹戰於官渡操雖兵弱糧乏荀彧止其退師既焚紹輜重紹引而歸遂喪河北由是觀之今日之事豈可因一叛將之故望風怯敵遽自退屈果出此謀恐六飛回馭之後人情動揺莫有固志士氣銷縮莫有鬬心我退彼進使敵馬南渡得一邑則守一邑得一州則守一州得一路則守一路亂臣賊子􅃛吏姦氓從而附之虎踞鴟張雖欲如前日返駕還轅復立朝廷於荆棘瓦礫之中不可得也借使敵騎衝突不得已而權宜避之猶為有說今幸疆塲未有警急之報兵將初無不利之失朝廷正可懲往事修軍政審號令明賞刑益務固守而遽為此擾擾棄前功蹈後患以自趨於禍敗豈不重可惜哉既又具防冬畫一事件言之遂忤當路意時江西大旱而綱課民修城民不以為便侍御史石公揆因劾綱妄自尊大恣為苛擾在江西尤無廉聲張浚初謫居福州綱意其復用欲以為援所以交驩浚者無所不至近聞其置將不善致淮西之變勢必譴責遂貽書痛詆傳布行朝欲以欺衆取譽為進用之計繼聞已用趙鼎其意大沮乃自言指陳朝廷措置失當必有牴牾乞行黜責聞者竊笑殿中侍御史金安節左正言李誼右正言辛次膺亦論綱違法虐民毒流一路乞賜黜責三省乃檢㑹綱累乞宫觀奏章行下時未有代者綱懲靖康之謗乃具以本司積蓄財榖之數聞於朝自是不復出矣朱勝非秀水閑居録云合肥兵亂執吕祉以入齊執持紛紜綱意浚必敗條十五事奏浚措畫之失又貽書抵浚痛詆其過以副本傳示逺近欲擠浚而鈎竒且示於浚不厚也浚既貶永州綱亦坐浮薄及暴横貪墨而罷鼎復相窮治浚事至今未己嗚呼勢利之交古人羞之其三相之謂與綱貽浚書已見今年八月辛未壬午趙鼎等奏𣙜貨務出賣度牒而逺方不能就買欲量付諸路上曰如此則州縣將科敷於百姓矣鼎等奏不責以限數則無科敷之弊上曰宜嚴為約束毋使民受其患户部尚書兼提領𣙜貨務都茶場章誼言務場見係誼總領别無同官商議竊恐誤事望仍撥𨽻户部從之詔臨安太廟且令留存初以行在建康故以太廟為本府聖祖殿及是將回蹕議者乃言本朝推尊聖祖比之有唐尊奉老子事若相類而禮實不同爰自仁祖纂承以來五聖百年踵行不易協於禮經所謂凡祭有其舉之莫敢廢也之義今乃賜太廟為聖祖殿在理實有未安故有是旨户部侍郎王俁乞令從官所舉監司郡守必取曽經治縣聲績顯著之人從之癸未復漢陽縣為軍用湖北京西宣撫使岳飛奏也尋以右奉議郎通判鄂州孔戊知軍事戊之除在是月丁亥尚書右司員外郎王廸為左司員外郎吏部員外郎薛徽言都官員外郎馮康國竝為右司員外郎乙酉趙鼎奏比得旨復置茶馬官舊有主管至提舉官凡三等上曰俟擇得人當考其資歴命之尋遂以左中奉大夫直秘閣張深主管成都等路茶馬監牧公事自趙開後茶馬無專官者近十年先是知熙州吳璘常取茶馬至軍前博馬因以易珠玉諸無用之物上聞之數加戒飭故復置官領其事深雙流人也日歴止書至考其資歴而命之自後更不見除人按茶馬司題名張深以紹興八年正月二十八日到任則其除命必在此月末或十二月初也丁亥祕書省正字兼史館校勘鄧名世為校書郎戊子詔應淮西脫歸使臣不候整㑹失去竝先次支破本等請給如有冒濫即坐以法初淮西軍中諸使臣為酈瓊刼去至是復歸者甚衆有司以文劵不明例降所給趙鼎與執政議不合乃宻白于上曰此曹去偽歸正當優假之今乃降其所請反使棲棲有不足之歎上即批出各還其本於是人心欣然來者相繼鼎因奏事又言來春去留之計望更留聖慮恐回蹕之後中外謂朝廷無意恢復上曰張浚措置三年竭民力耗國用何嘗得尺寸之地而壊事多矣此等議論不足䘏也趙鼎事實曰上議回鑾諸公初無異議鼎獨曰今日復回臨安四方必謂朝廷但務退縮無興舉之意豈知陛下聖筭初不如此今固不可户曉唯是他日淮上有警郤須前進鼓作諸軍庶㡬進退合宜上嘉納於是降旨先發百司使民間預知乃以建康守臣兼行宫留守示往復兩都居無常所葢自十二月降旨至明年二月始離江左期既不廹上下帖然建炎以來繫年要録巻一百十六
