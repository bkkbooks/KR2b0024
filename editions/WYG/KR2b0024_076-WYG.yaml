body:
  text: 建炎以來繫年要録巻七十六宋李心𫝊撰紹興四年五月庚戌朔徽猷閣待制知温州趙思誠試中書舍人鎮南軍承宣使江南西路舒蘄州制置使岳飛兼黄復州漢陽軍徳安府制置使以飛出師也集英殿修撰仇悆知廬州江東淮西宣撫使劉光世言閤門宣賛舍人知濠州冦宏申備職邉吏欲遣老母将妻子詣江外安頓宏願以身効死疆場詔宏宣力日久今來所陳備見忠義朕推赤心待人並無疑間宜安職守勿復有請宏起於諸盗㑹羅興叛去宏懼為朝廷所疑故有是請焉辛亥直龍圖閣知建康府吕祉乞存舊行宫以為便殿許之建炎末上幸建康即以府治為行宫至是有㫖撤其材以營新府祉奏今行宫在子城之西偏側不正朝廷若欲别造行宫謂宜當子城之中營建正殿令與宫門相直其見存屋宇昨來營造費用朝廷錢物不少一旦拆除前功盡廢殊為可惜故有是㫖御史中丞辛炳言竊見祖宗朝宰相執政員數稍多毎有所施設必都堂聚議參訂可否而行之故仁宗皇帝時雖有西夏元昊之叛而宴然若無事者以韓琦范仲淹輩同心協濟也臣得諸搢紳之間咸謂頃者駐蹕㑹稽猶聞大臣每日㑹議至三至四自呂頥浩再相専權自私㑹食外往往各於閣子押文字雖軍旅之事差除之屬亦有不同相關决者顧同列間情猶不通况君臣之際乎陛下遭時多艱四方未靖一日二日萬幾盡以付之二三大臣間有横議害政者不旋踵而遂去之政欲廟堂之上同寅協恭可否相濟以賛中興之業也願詔大臣上體宵旰之意每一號令之出一政事之施人材之進退賞罰之勸懲凡有渉於利害者必商確參訂審得其當然後言於陛下而行之盡復昔時㑹議故事以踵前古都俞之風僉論既諧宜無乖繆則鄭國之鮮有敗事何足多尚兹事體大惟陛下留意壬子詔劄與三省樞密院川陜宣撫司奏敵自鳯翔退走詔劄與㳂江諸帥神武諸軍仍出榜曉諭癸丑左朝奉大夫范冲守宗正少卿兼直史館前一日執政進呈上諭朱勝非等曰神宗哲宗兩朝史録事多失實非所以傳信後世當重别刋定著唐鑑范祖禹有子名冲者已有召命可促來令兼史事勝非曰神宗史縁添入王安石日録哲宗史經蔡京蔡卞之手議論多不公今䝉聖諭命官刪修足以昭彰二帝盛美天下幸甚先是參知政事趙鼎賛上尤力故以命冲鼎奏冲乃臣姻家雖冲召命在臣未到行在以前及今來除授並出聖意竊慮士大夫不能詳知謂臣援引親黨乞罷冲除命上不許㑹新除宗正卿蘓擕丐免乃復以擕直龍圖閣主管臨安府洞霄宫鼎奏在是月乙卯擕得祠在丁巳起居舍人王居正言伏見兩浙州縣有喫菜事魔之俗方臘以前法禁尚寛而事魔之俗猶未至於甚熾方臘之後法禁愈嚴而事魔之俗愈不可勝禁州縣之吏平居坐視一切不問則已問有貪功或畏事者稍蹤迹之則一方之地流血積屍至於廬舍積聚山林鷄犬之屬焚燒殺戮靡有孑遺自方臘之平至今十餘年間不幸而死者不知幾千萬人矣仰惟仁聖在上視民如傷而民愚無知蹈禍至死竊意陛下所宜惻然動心而思欲究其所以然之說也臣聞事魔者每鄉或村有一二桀黠謂之魔頭盡録其鄉村之人姓氏名字相與訂盟為事魔之黨凡事魔者不肉食而一家有事同黨之人皆出力以相賑卹葢不肉食則費省故易足同黨則相親相親故相卹而事易濟臣以謂此先王導其民使相親相友相助之意而甘淡薄務節儉有古淳樸之風今民之師帥既不能以是為政乃為魔頭者竊取以瞽惑其黨使皆歸徳於魔於是從而附益之以邪僻害教之說民愚無知謂吾從魔之言事魔之道而食易足事易濟也故以魔頭之說為皆可信而爭趨歸之此所以法禁愈嚴而愈不可勝禁臣愚伏望陛下念民迷之日久下哀矜之詔書使人曉然知以謂不肉食則費省故易足同黨則相親相親故相卹而事易濟此自然之理非魔之力而至於邪僻害教如不祭其先之類則事魔之罪也部責監司郡縣責守令宣明詔㫖許以自新又擇平昔言行為鄉曲所信者家至而户曉之其間有能至誠用心率衆歸善優加激賞以勵其徒庶幾舊染之俗聞風丕變子子孫孫咸被聖澤實一方生靈赤子之幸詔諸路帥憲司措置毋得騷擾生事是日邵武軍卒蕭吉等謀縱火作亂為其徒黃嵩所告同廵檢保義郎管遺直捕斬之後以嵩為保義郎遺直遷一官嵩十二月丙申補官甲寅詔淮南帥臣兼營田使知通縣令銜内兼帶營田二字州推判官縣簿尉勿並置省路分都監廵檢監押監當等員時言者謂方今國家大勢以東南為重自江以北皆吾屏蔽不可謂殘破之地遂忽之今淮南官吏設員太冗供給之須必取於民侵漁騷擾為害不細兼所在皆有戍兵别無捍禦自可令為屯田既未起稅百姓來歸正當勸督耕墾在守令加意而已於是大省冗官且令監司守臣條畫屯田利便限一月聞奏焉詔都進奏院依祖宗法𨽻給事中初大觀間有㫖進奏官供報稽遲失錯並具情犯申牒提轄官相度輕重施行二年八月建炎末乂申明之四年十月二十日其後吏部請誤報窠闕等從本部徑送所屬紹興三年四月十八日後省以為言乃復舊制九月十七日至是權吏部侍郎劉岑復請徑送所屬後省執奏不行故有是命是日江西制置使岳飛復郢州初飛既出師詔淮西宣撫使劉光世發精兵萬餘人援之飛率統制官王萬等自鄂渚趨襄陽右僕射朱勝非許飛訖事建節且命户部員外郎沈昭逺往總軍餉參知政事趙鼎請上親筆詔監司帥守餉飛軍無闕庶幾必濟飛将發命軍士毋得踐民禾稼皆秋毫不敢犯至郢州諭偽守荆超令降超不從有偽知長夀縣劉某者登城發言不順飛怒令軍士曰城即破必生致之城陷超投崖而死獲劉某磔之遂引兵攻襄陽軍聲大振熊克小歴徐夢莘北盟㑹編稱命司農少卿沈昭逺總其糧餉皆承誤也昭逺此時實以郎總餉此月乙亥方有㫖復置司農太府二少卿克等不詳考耳乙卯詔荆浙江湖通接邉報州軍並置撥舖每二十里為一舖増遞卒至五人日増給食錢月一更替文書稽違如傳送金字牌法抵罪提舉官常切㸃檢翊衛大夫忠州觀察使神武左副軍統制李横為神武右軍選鋒統領用都統制張俊請也丙辰起復左朝奉郎秘書丞范同為尚書祠部員外郎起復左中奉大夫直秘閣知揚州宋孝先左朝散大夫直秘閣知靜江府劉彦適各貶秩二等先是上命檢正官具宣諭五使檢察諸路事件最多去處虞􅀈時以刑部員外郎權檢正言明槖在廣西削三十六事檢察稽違詔令一百四十事平反刑獄二十五事孝先提㸃本路刑獄彦適為轉運副使坐失按所部吏故責及焉日歴此日不書彦適降官今以十月二十一日刑部檢舉状増入詔偽造三省樞密院印者雖奏裁並依本法處斬更不原貸令所在榜諭丁巳翰林學士兼史館修撰綦崈禮言檢㑹知湖州汪藻得㫖編類元符庚辰至建炎己酉三十年事迹本所見已開局自建炎元年五月一日以後纂修日歴竊恐更不須在外别行編類乞下藻将搜訪到建炎以後文字赴本所照使從之自天聖以後史官遷徙不常中經渡江朝廷文書悉行委棄藻奉詔訪求甚備未及修纂至是崈禮取而専之俄崈禮罷去後十餘歲日歴始克成書首尾不全前後舛錯不可勝數矣川陜宣撫司王似等言川陜監司帥臣闕官或去替不逺乞從本司一面選差主管職事訖奏應轉運司知通窠闕及簽判知縣亦乞權許本司選官奏差庶幾事宜之際得人倚辦詔如差待闕帥臣監司前期每闕具三兩名聽㫖除授即非次見闕不可待報許一面擬差訖奏其餘堂除及安撫茶馬等司辟闕依已得㫖一面選差元係逐路運司窠闕即令轉運司依舊法施行自張浚召歸朝廷以塞土久不得禄故條約之中衛大夫濟州防禦使孟涓知泗州武功大夫和州防禦使樊序知楚州主管沿淮安撫司公事拱衛大夫岷州團練使許大同知漣水軍先是知泗州徐宗誠既罷去而淮東宣撫使韓世忠言楚泗漣水軍招信縣洪澤鎮五處皆係沿淮邉面與齊地接界水陸四衝要害去處自來官屬皆未得人所以前後斥堠不明探報誣罔大失倚頼乃召直秘閣知楚州楊揆閤門祇候知漣水軍丁禩還朝而命涓等焉翊日遂以中衛大夫和州防禦使淮東宣撫司前軍統領張順充淮東兵馬都監洪澤鎮把隘左武大夫温州團練使宣撫司選鋒第三副将兼水軍統領祁立充楚州兵馬鈐轄招信縣把隘皆用世忠奏也日歴書此事但云樞密院勘㑹而末云今欲差某人云云有㫖並特依所乞則是宣撫司奏也今修潤附入既而金偽入犯涓等率望風逃遁卒不能保其境焉尚書考功員外郎孔端朝言建立政事既有其實感悟人心必假於言今陛下留神治道刻意恢復聽覽至勤奉養至約行宫不逾牧守之居射殿止用茅茨之制聲色無所親幸訐直每加優容臣叨備朝列耳目所接乃幸知此數端則既有此美實矣而播告之言或未有以發之四方萬里之逺何自而知哉臣愚無識謂宜用陸䞇所言凡制誥號令因事見辭以謙抑為先必自引咎收拾人心且具言陛下食不重味居不求安思雪大恥圖復故疆之意而侈大夸矜之詞無所雜於其間人非木石誰不知感誠如是雖金人之彊猶将憚而屏迹彼盗賊叛逆本皆吾民其有不歸命者乎䟽奏詔下示内外制詞臣戊午翰林學士綦崈禮試尚書禮部侍郎兼權直學士院陳與義中書舍人張綱皆上䟽待罪詔令供職靖康初端朝為太學正敵至而遁坐停官崈禮力為薦延召對改秩遂除省郎至是首以詞臣失職為言葢指崈禮也議者薄之此以紹興七年十二月戊寅李誼劾䟽修入詔監司郡守常切譏察贓吏犯法廵尉失職並仰劾奏如失覺察取㫖重行時禮部員外郎兼秘書省著作佐郎郭孝友言今東南州縣無水旱之灾彊敵之禍而居無尺椽㸑無盛煙者贓吏害之盗賊擾之耳郡縣有贓吏乃煩朝廷遣使以黜陟之是按察之官不稱職也鄉邑有盗賊乃煩朝廷命将以招捉之是討捕之官不勝任也願陛下申命有司禁貪墨於未發之前消姦宄於未形之際監司郡守不覺察當免廵尉将校不斬捕以重論如此則贓吏革心盗賊破膽民安而物阜矣故有是㫖庚申詔日歴所速行條具重修哲宗實録事件聞奏時已命官更修兩朝史而言者以為祖宗以來法度具備海内乂安自熈寧中王安石為相盡取而變更之當時有識之士如韓琦富弼曽公亮歐陽修司馬光呂公著范鎮等皆爭議於朝相繼黜逐及哲宗即位宣仁聖烈皇后垂簾嘗諭大臣曰先帝所立之法民間不以為便者狥至公改之又曰餘可守者不宜輕易廢改又曰先帝追悔往事至於泣下皇帝宜知之然則元祐之政乃是順人情合公道復祖宗之舊成神宗之志也其後章惇蔡京蔡卞之徒積怨造謗痛加誣詆指白為黒變是為非邪正善惡顛倒交錯馴致危亂在紹聖時則取王安石日録用私書改修神宗實録在崇寧後則焚毁時政記日歴以私意修定哲宗實録其間所奏事端悉出一時姦人之論不可信於後也然神宗實録其間猶有朱墨元本他日尚可考訂是非至於哲宗朝事迹載在時政記日歴者皆為蔡京取㫖焚毁滅跡紹興元年有進士黃縱者嘗繳進其父籍沒京家所藏之餘又皆殘闕不全若非及此之時尚有故家善類父祖傳習之書師友聞見之論使之刋正則雖今之搢紳習觀誣謗之史猶有信以為然者况可使無惑於後世乎恭惟宣仁聖烈皇后以三朝母儀之尊抱孫臨朝保佑之徳豈容異辭而蔡確貪天之功以為己力厚誣聖后收恩私門羣邪協謀公肆謗毁忠臣義士疾首痛心莫之能救姦人敗露公道乃明靖康中追貶蔡確其後竄逐蔡懋葢為此也陛下即位之初首下詔曰宣仁聖烈皇后有安社稷大功姦臣懐私誣蔑聖徳著在國史以欺後世可令國史院摭實刋修播告天下屬以車駕南幸圖籍散亡史官廢闕未暇舉行近雖再降指揮令史官看詳重修尚恐論者以謂朝廷方修武備指此為不急之務又復悠悠則一代信史無期可成數年之後故家凋零耆舊老死傳聞訛謬載記失真益難取信矣欲望睿慈特降詔㫖明示聖意選擇史官責以歲月先令刋修哲宗實録候成書然後取神宗實録朱墨元本考證是非修定施行從之詔故簽書樞密院事王淵歿於王事更特官其家二人淵之死也已用使相例官子孫八人又以其子㓜録其女之夫修武郎焦潔為閤門祇候至是其家有請不已上特予之潔陜西人父安節嘗為隴右都䕶潔除閤職在四月甲辰辛酉淮東宣撫使韓世忠奏本軍統兵官武功大夫貴州刺史劉光弼乞陞差上謂輔臣曰光弼必光世之家兹事未便恐光世疑也世忠與光世交惡不已至是世忠自揚州入朝殿中侍御史常同言二臣䝉陛下厚恩不思協心報國一旦有急其肯相援望分是非正典刑以振紀綱上以章示二人它日帶御器械劉光烈召帶御器械韓世良食世良峻拒之世忠見上因及其事上曰世良等内諸司耳設有不和罷其一可也至如大将國家利害所係漢賈復㓂恂以私憤幾欲交兵光武一言分之即結友而去卿與光世不睦議者皆謂朝廷失駕馭之術朕甚愧之世忠頓首請罪曰敢不奉詔他日見光世當負荆以謝上以其語諭輔臣然二人卒不觧於是光弼更領䕫州路兵馬都監兼知黔州仍舊從軍熊克小歴世忠乞差劉光弼充本軍統兵官葢依日歴所書也日歴五月十四日癸亥樞密院劄子已降宣命改差下項人充逐路兵馬副都監依舊韓世忠下使喚候事寧日申取樞密院指揮前去之任數内劉光弼䕫州路兵馬都監兼知黔州替王宗道成資滿闕與王勝呼延通等並命則是光弼元在世忠軍中也恐時政記微有差誤今略刪潤令不牴牾更須詳考也檢校少保光山軍節度使同知大宗正事士㒟自吉州率宗室還居紹興至是入對士㒟言昨自陛下立極之初首論大臣誤國䝉恩寛貸差知南外宗正事臣既離維揚不旋踵有渡江之役後來被㫖召還又自䖍洪度嶺首尾五年衰病日増乞罷宗正司職事除一在外宫觀詔不許士㒟又言靖康末䝉太母密㫖遣臣管押張邦昌齎圭寳詣南京其一行官吏並已推恩獨臣未霑恩霈乃詔其子秉義郎不議換文秩忠翊郎不抽換環衛官壬戌詔李橫軍中文臣左朝散大夫直龍圖閣趙去疾等十三員並發歸吏部内借官人依條施行癸亥日歴所乞關内東門司取㑹禁中應出納更改事務先是内東門司取㫖不許供報至是史館修撰綦崈禮復以為請乃許之上因言禁中有事皆遵守典故不惟祖宗家法不敢輕議改更亦厭紛紛多事也熊克小歴在甲子今從日歴殿中侍御史常同守起居郎新除起居郎胡寅别與差遣時趙思誠新除中書舍人㑹徐俯去位朱勝非薦吏部尚書胡松年為執政同言松年乃王黼客宣和間劉光世復直龍圖閣松年在詞掖嘗醜詆之今乃營求欲為執政可乎思誠挺之子挺之首陳繼述實致國禍且與京黼同時執政今公道既開豈可使其子尚當要路勝非不悅同坐是徙官思誠亦辭不至朱勝非行述云勝非為宰相每薦士而言路輙不容朝士問勝非曰胡不辯之勝非曰勝非聞人以為賢則用之言者論其否則退之初無容心也且言路久塞得人主聽言乃盛徳事勝非若於榻前辯是非言未必不直然不知我者以為壅塞豈宰相事哉問者竦然按此所云與常同徙官事差不同今併附此更須詳之也既而復以寅為直龍圖閣知永州寅除命在八月甲午尚書右司員外郎袁正功直秘閣知饒州以正功引疾有請也武功大夫藍珪為内侍省押班左朝散大夫直秘閣朱萬年特遷一官以往來關師古軍前計議有勞也甲子㕘知政事孟庾兼權樞密院事時密院全闕官用故事而有是命左通議大夫提舉臨安府洞霄宫范宗尹復資政殿大學士知温州閤門宣賛舍人添差浙東兵馬都監劉綱充淮東兵馬鈐轄泗州駐劄徽州進士汪仲卿言有二子汝賢汝嘉習童子舉乞考試詔賜錢五十千罷之乙丑襄陽府免觧進士謝製補正廸功郎製在李横軍中累經借補至是川陜宣撫副使吳玠有請也丙寅尚書左司員外郎虞􅀈為中書門下省檢正諸房公事吏部員外郎晏敦復試左司員外郎丁卯利州觀察使新添差江南東路兵馬鈐轄翟琮知夀春府琮以母老力辭不赴熊克小歴載琮除夀春府於今年三月葢誤戊辰罷諸縣武尉見任人並不釐務聽成資罷辛未武功大夫貴州防禦使韓公裔幹辦皇城司壬申三省條上裁省細務一百十一事歸之六曹應合呈知文字令宰執㕔輪日請筆民詞令都司簽貼始用虞􅀈請也上諭朱勝非曰朝廷所以多事者以六曹不任責每事取決耳自今宜専責長貳毋得循習茍且卿等當進退人材修明法度助朕圖恢復之計繁文末節非所以委付大臣者勝非頓首謝中興聖政臣留正等曰大事關僕射者所以著唐制之得體宰相不親小事者所以議蜀臣之失職葢執刀斧運斤鋸左右趨走者衆工之所服役而梓人則不過司繩墨正大綱餘無所事焉且天官雖均列六卿而以治典居六卿之冠明六卿分任庶務以逸夫天官耳不然百官庶府條目如蝟雜然叢諸宰庭殆有不勝應者何以優游講究國家之大事耶太上皇帝高見逺覽清中書之務勵分職之官責六曹長貳無得茍簡而専以恢復大計屬宰臣可謂得任人之要矣傳曰掲裘者振領綱舉而目張其斯之謂歟癸酉詔修國史日歴所復以史館為名用修撰綦崈禮等請也崈禮等又言神宗皇帝實録自有舊來朱墨本係元祐年所修已是成書其朱本係紹聖年因蔡卞起請重修将舊書所載多所増損務要附㑹一時紹述議論深詆元祐史官之非其間語言不無過當失實然亦有别行檢㑹引用照據以證墨本未盡去處并将二本㕘照修定委是詳備欲乞從本館先據朱墨本看詳重修如或尚有合行取㑹照對文字逐旋申明取索施行哲宗皇帝實録係崇寧以後蔡京提舉編修叙事之外多是増􅎖語言變移是非殆非實録之體成書之後其當時時政記等應干文字又皆焚棄竊恐所載不無更改隠漏失實即難以便據舊録重行修定欲乞從本所逐旋申明於諸路州軍及舊臣之家更行取索求訪當時文字事跡按據㕘照看詳重脩庶無牴牾從之起居舍人王居正兼權中書舍人以張綱獨員故也甲戌監察御史魏矼守殿中侍御史國子監丞王普上明堂典禮未正者十二事其二先薦牛後羊豕其三尊罍之數其四升祠祭法酒於内法酒之上其六禮官冕服舊自七旒已下凡三等今増為四等其七皇帝未後詣齋室非三日齋之義請改用質明其八行事官致齋勿給酒其九以侍中中書令等侍立侍閤門官其十設席升煙奠冊勿以散吏其十一樂曲先製譜後撰詞非是請倚詞製譜其十二皇帝還位當歌大呂以易黃鍾皆從之其一請以玉爵易陶匏其五言三禮圖祭器制度不合古請用政和新禮改造皆未克行也按宋史紹興四年太常寺看詳國子監丞王普言明堂有未合禮者十一事並從之其九設神位版及升煙奠冊不當委之散吏其十十一皆論樂此本其九一條文義脫誤疑當併入其十條内乂其一其五兩條皆未克行亦與史異詔神武右軍選精銳軍馬三千人戍䖍州専一措置䖍吉一帶盗賊權聽江西帥司節制先是岳飛出師已破賊首鍾十四等十餘寨至是其徒周十隆等出沒未已遂命将官趙祥李昇以所部往討之左從事郎樞密院編修官田如鼇特改京官以斬南安賊劉洞天之勞也事見元年二月乙亥權尚書户部侍郎姚舜明充集英殿修撰提舉江州太平觀初都督府既罷舜明引疾乞奉祠遂不赴行在詔舜明江上宣勞日久特除徽猷閣待制宫觀言者論舜明諂事權臣至同僕𨽻去年韓世忠移屯鎮江舜明盡刷江東一路財物以行上下怨憤刻薄苛擾無勞可録又權侍郎未及二年未應元降指揮望賜追寝以重名器舜明由是改命中書舍人張綱當制改送刑房行詞論者非之改送刑房作責降人令遇大禮不得奏薦此言者論張綱章疏云耳丙子命館職編集建隆至元符七朝制詔録用秘書少監劉大中請也其後不克成此據㑹要丁丑詔秉義郎子彦特轉武翼郎添差温州兵馬鈐轄左中大夫集英殿修撰新知泉州令懬特轉行左大中大夫初令懬奉詔選宗室子至是復得子彦之子伯玖年五歳上以其聰慧可愛命吳才人育之聰明可愛日歴所書上語云爾紹興七年正月二十六日權太常少卿樓炤劄子吳才人位主管文字馮才申本位和州防禦使璩年八歳云云伯玖即璩也前二日上諭輔臣且言向日賜名瑗者亦令懬求來可量與恩數朱勝非曰令懬見乞磨勘有司以礙法方欲奏禀上曰凡宗室恩數當從優例况令懬又有此功耶淮東宣撫使韓世忠言於私第建閣以藏所賜宸翰乞賜閣名詔名懋功已而翰林學士綦崈禮言祖宗以來人臣之家不聞有以所藏御書賜閣名者始於蔡京崇觀間賜第城西遂起君臣慶㑹閣錫名揭榜以侈大之由是大臣貴倖之家更相援比以邀上賜無間内外兵火以來所存無幾今陛下乃於世忠復有此賜竊探聖志葢以寵光世忠勉其立功之志以歆艶諸将非若前日誇䛕之風未有過舉然方京都淪陷官省汙穢龍圖天章寳文顯謨徽猷所藏七朝典訓一時委棄而陛下乃自以所賜将臣御書聽其建閣且為製名顯示天下臣恐有識之士得以竊議而未以為當也在世忠之分則被遇聖主感激眷知親獲宸翰焜燿私室寳藏崇奉唯恐不至實臣子之義顧陛下勿與焉斯可矣欲望指揮特賜追寝今後臣寮不許有請仍著於令以明陛下謙恭抑畏之徳從之崈禮所奏在六月庚寅今併附此熊克小歴云世忠乞賜閣名見朱勝非閑居録按日歴有世忠崈禮奏状全文㑹要亦備載此事克不細考耳戊寅持服人前直秘閣范寅敷卒是月江南西路舒蘄黃復州漢陽軍徳安府制置使岳飛引兵復襄陽府初偽齊将李成聞郢州失守乃棄襄陽去飛進軍據守遂復唐州
