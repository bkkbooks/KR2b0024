body:
  text: 建炎以來繫年要錄巻一百六十七宋李心傳撰紹興二十有四年秋七月壬子朔右正言鄭仲熊言前知雷州王趯頃在任日每有被罪南竄者則厚賂津置為之橐囊結成死黨今聞在全州遂與海外罪人為地或有擅離受責之地逃匿趯家方命亂法莫此為甚切慮有司或致弛慢縱逸其禍有不可勝言者欲望特降睿㫖下全州差得力人管押王趯前來大理寺究治仍令日下押還元責地方庶絶後患詔依所請仍令逐路提刑躬親遵奉施行先具知禀状聞奏先是責受建寧軍節度副使李光謫居昌化軍因趯寓書秦檜以求内徙有小校李某者坐岳飛累編置全州與趯居相近趯俾校募人轉致之檜見書自全來疑光擅離貶所大怒故有是命此事詳見今年十二月丁亥王趯編管辰州注司農寺丞鍾世明為尚書户部員外郎世明治圩田還故有是命制詞云將命于外成效可觀不知何人作是日安民靖難功臣太師靜江寧武靖海軍節度使醴泉觀使清河郡王張俊薨於行在年六十九翌日輔臣進呈上曰張俊遽亡曩者張通古來俊極宣力與韓世忠等不同恩數宜從優厚遂賜貂冠朝服以歛命内侍省押班張去為䕶𦵏事俊晚年主和議與秦檜意合上厚眷之其麾下将佐若楊存中田師中王徳趙密劉寳皆建節鉞或至公師幕府諸僚為侍従帥守者甚衆自俊晚年以下並以林泉野記修入甲寅大理評事俞長吉面對言州縣贍學錢往往侵移兊用乞立法禁止從之乙夘詔國學生住學三年内實歴打食不及一年之人遇取應日别立字號依宣和指揮以八人有竒解一人以國子司業沈虛中看詳有請也此恐即董徳元面對所請是日臠猺人承信郎楊正修及其弟正拱于市二人皆再興子鄂州都統司檻送行在付棘寺鞫治至是抵法丙辰将作監丞錢端英面對論昨蠲米麥之征而州縣尚收力勝袋皮等錢乞令監司覺察從之降授左奉議郎提舉江州太平興國宫江州居住李文㑹知遂寜府敷文閣待制提舉台州崇道觀蘇符知饒州左朝請郎提舉江州太平興國宫周執羔知閬州丁亥宰執進呈次上曰贛州守臣李耕未有代者可選文臣一員具名取㫖於是以右朝散郎知處州趙善繼代之後三日領殿前都指揮使職事楊存中乞差本司統領官杜伯通以所部戍贛州上曰昨軍賊竊發之初外連百姓率多響應今㽞兵屯駐庶得安弭己未復置黎州在城雅州碉門靈門三博易場委四川茶馬司専一提舉以本路諸司有請也壬戌詔四川制置總領司許於茶馬司寛剰錢内撥取以寛民力用都省請也自熙寧七年𣙜法初行官買民茶增價發賣其初嵗收息不過五十萬緡至元豐六年增額一倍猶不過百萬建炎以來𣙜法弊壊提舉官趙開遂體倣亰師鈔法剏行茶引令園户客人就場交易而官止收引息市利錢每茶百斤為一大引客人不過納錢引六道五百市利錢三百以當時茶額計之嵗收亦不過為錢引一百五萬九千餘緡比熙寧所立之額未甚逺紹興初宣撫司取撥茶馬司餘剰贍軍亦不過嵗及四十萬而止其後物價騰踴茶商取息頗厚累提舉官於是增長引息等錢至紹興十四年每茶一引倍收引錢十二道三百文比趙開初立法時増及一倍茶既貴售諸場大段溢額而買馬之數復不加多當此時茶司之冨甲天下率以嵗剰上供一嵗多者至二三百萬及是詔捐以予民蜀人稍蘇矣直徽猷閣主管台州崇道觀程敦厚落職依舊宫觀靖州居住殿中侍御御史董徳元論敦厚頃權中書舍人韓世忠家有初封為夫人者敦厚多為羙詞以取媚世忠自此交歡每至其門或以金銀器物侑勸敦厚必挹而有之其居眉州刼持州縣侵漁編氓稍不如意則妄生是非興起獄訟望褫其官職竄諸蜀道之外以為在外者貪殘之戒故有是命先是敦厚既斥歸久未用乃上疏曰臣竊惟陛下當搶攘慼廹之中爰立同徳付以魁柄任天下所不任之責而成天下所不成之功其為力甚難今國是大定鄰好胥睦猶泰山而四維之尚何憂何慮而臣切有不能自已者盖昔之怙亂害成之輩鼠伏狙伺何所不至尤為可畏願陛下力遏朋邪之萌以幸海内然秦檜薄其為人卒謫之敦厚所上書據文集在紹興二年三年不得其月日因事事附見甲子右正言鄭仲熊言敷文閣待制知成都府蕭振天資狠戾趣向乖僻曩縁趙鼎用事倡為専門之説振阿附之自謂其曲學出於程頥殊不知頥在先朝固嘗見詆於識者如蘇軾尤嫉其姦振亦何知乃藉為仕進之梯方天台之罷曾未數月起於謫籍付以四川之權朝廷屢下寛詔有可裕民者俾同諸司措畫振為制置使畧不闗意乃敢誦言於朝欲以對糴軍糧八萬石截留不發初非真有意於民特出矯情惑衆以沽一時之譽望賜竄斥以為竊名市私者之戒詔振落職放罷依舊宫觀池州居住乙丑太府卿總領四川財賦軍馬錢糧符行中充敷文閣待制四川安撫制置使兼知成都府右朝奉大夫成都府路提㸃刑獄公事鄭靄行尚書度支員外郎總領四川財賦軍馬錢糧靄與符行中在蜀中餽遺秦檜不可勝計嵗時寒暄之問亦必用金獅子二枚伴書焉此以趙甡之遺史修入庚午軍器監丞孫祖夀面對乞禁江浙私渡詔臨安府措置既而守臣曺泳乞令本府差官一員主管濟渡紹興府蕭山渡亦依此施行從之九月乙丑行下壬申尚書省勘㑹近靜江府措置莫公晟及衢州措置作過饑民並無奏状詔今後州郡合措置事須管逐一開具聞奏委監司覺察御史䑓彈劾時秦檜用事久監司郡守以事逹朝廷者止申尚書省取指揮故條約之此二事必因上問而後降㫖但魏師遜政記中不敢載耳明年十一月庚午上諭輔臣語及鍾世明除右司時所得上訓或可掇取書之以魏良臣所奏考之則當時雖有指揮其申省尚如故也癸酉敷文閣待制提舉江州太平興國宫勾龍如淵卒乙亥上謂大臣曰莫公晟以丹州歸順及進馬可檢擬取㫖施行先是公晟自宣和以來屢為邉患嵗調官軍防守至是直秘閣知靜江府兼主管廣西經畧司公事吕願中言公晟獻馬三十匹且遣其部落七百餘人至靜江府與經畧司屬官㰱血而盟諸蠻願以二十七州一百三十五縣為本路覊縻寔為熙朝盛事丙子上謂大臣曰得丹州非以廣地但猺人不作過百姓安業可喜乃詔公晟以南丹州防禦使致仕其子延沈為銀青光禄大夫檢校太子賔客使持節南丹州諸軍事南丹州刺史兼御史大夫知南丹州軍事武騎尉其餘首領並與推恩願中又畫圖進呈上曰且喜一方寧靜秦檜曰陛下兼懐南北定計休兵小冦豈敢不服上曰若非休兵安能致此於是鑄覊縻州縣印一百六十二給之願中夷簡元孫也願中進圖冊在八月乙酉乞鑄印在丁亥今聫書之戊寅上幸張俊第臨奠詔俊姪右宣教郎子安等五人各進一官諸婿直徽猷閣韓彦朴直秘閣劉堯勛楊㒜並進一官陞一職子安等轉官在八月癸未彦朴等進官陞職在十月丙申今聫書之彦朴世忠第二子堯勛光世第三子㒜存中第三子龍神衛四廂都指揮使金州觀察使殿前司遊奕軍統制知贛州李耕為池太平州駐劄御前諸軍都統制己夘侍衛親軍歩軍都虞候安逺軍承宣使池州太平州駐劄御前諸軍都統制王進添差福建路馬歩軍副都總管日下起發之任辛巳詔李耕統制軍馬通理已及十年特轉行武當軍承宣使八月壬午朔勅令所刪定官楊造面對論宗室登科換京秩者初未經任即授大縣慮於民事未能諳練望依倣進士例俟歴任有舉主者乃授以縣庶㡬仰副陛下加恵元元之意詔吏部措置其後吏部請似此之人並注縣丞或監當差遣理作親民資序竢一任囬任内有舉主一員方許注授知縣從之吏部奏下在十一月乙夘丙戍左朝請大夫鄭作肅知吉州還入見奏木州自兵火後每嵗樁辦黄河竹索錢六千六百餘緡見拖欠四萬餘緡重困民力望將未起及日後合起之數並賜蠲放上可其奏秦檜怒後旬日殿中侍御史董徳元即奏作肅朋附席益中傷善類及知常州張浚主兵行横歛之法作肅極力率先督辦其數冠於諸州比守吉州多歛軍需賤市官米又賈販油布之屬以規厚利欲望重作施行詔令本路提刑司取㑹具案聞奏徳元奏下在此月壬寅今聫書之丁亥遣户部員外郎鍾世明同四川總領制置措置裕民自講和後嵗减川錢四百六十二萬緡有竒朝廷猶以為重於江淮故有是命明年七月丙辰减放戊子皇叔象州防禦使士洪為均州觀察使以積閥遷也左中大夫直龍圖閣王琮卒庚寅宗正寺主簿王珉國子博士張扶並為監察御史珉玉山人扶金壇人也壬辰上諭秦檜曰近輪對者多謁告避免百官輪對正欲聞所未聞可令檢舉已降指揮約束施行於是申嚴行下甲午温州布衣黄元夀論官市柑子擾民詔禁止其福建荔枝亦毋得進乙未臠衢州賊首俞八等七人于都市其次十有一人皆誅之戊戍殿中侍御史董徳元兼崇政殿説書庚子崇信軍承宣使提舉佑神觀劉光烈卒丙午禮部擬定故太師清和郡王張俊贈典乞依韓世忠例先是上諭秦檜曰武臣中無如張俊者比韓世忠相去萬萬贈典宜令有司檢討祖宗故事務從優厚七月丁巳及是進呈上曰俊在明受間有兵八千屯吳江朱勝非降指揮與秦州差遣俊不受進兵破賊寔為有功可與贈小國一字王令禮部擬定於是特封循王國朝淳化以後異姓不封真王其追封盖自俊始俊𦵏無錫縣比𦵏自行朝至無錫将相州郡祭之者接迹江左以為榮後諡忠烈史臣曰上之於世忠待遇賜子視諸将最厚與張俊語多摧折告戒之辭俊之立功盖有所激及俊死稱謂之美如此抑揚予奪冇深㫖哉九月辛亥朔鄂州前軍統制李道自長沙移軍往衡州措置盗賊先是胡邦寧既就江西安撫司招安其黨朱時等蟻聚于桂陽保險以自固道遣将官髙仲等擊平之得六百人以充軍賊之未得也湖南提舉常平茶鹽公事王之望數以書白大臣時多計畆率錢以備犒軍之望檄諸司止其事不聼既又請留兵五百人戍衡郴以備出没朝廷從之甲寅監登聞皷院曺紱面對論常平之法賤歛貴散農末皆利今者時和政協嵗已告豐其價益平能因天之所與以利于下實甚盛之舉望俾州縣及時廣糴使倉廩充實異時用以賑貸詔户部措置其後户部乞下諸路常平司依見行法如違令監司按劾従之紱輔子也丁巳左武大夫英州刺史殿前司正將辛立陞領忠州團練使錄平衢州羣盗之勞也餘将副軍校九百九十七人各轉一官資仍犒設一次壬戌左司郎中張士襄乞客人興販米斛不拘州軍許從近便官司投牒給據以為沿路𣙜征場務照騐沿路有乞覔阻抑依枉法論從之甲子大理寺丞郭唐卿面對言在法囚人遇寒量支柴炭貧者假以衣物而州縣多不預辦望申嚴法禁詔刑部檢坐行下乙丑大理寺丞環周面對言臨安平江湖秀四州低下之田多為積水浸灌究其所以盖縁溪山諸水接連併歸太湖水分為二派自太湖東南一派由松江入于海東北由諸浦注之江其松江泄水諸浦中惟白茅一浦最大今為泥沙淤塞每嵗若遇暑雨稍多則東北一派水必壅溢遂至積浸有傷農田望令有司相視於農隙開决白茅浦故道俾水勢分𣲖流暢寔四州無窮之利詔轉運司措置紹興二十八年九月施行丁夘秦檜進呈權户部侍郎徐宗説試刑部侍郎韓仲通等状日歴只書户部状今出其姓名俾後有考舉劾京西路轉運判官魏安行前知滁州妄奏開荒田二千二百餘頃今本州具到寔開耕數止及四百餘頃既不應賞格其己轉官合行改正上曰如此誕妄不可不懲於是罷安行見任餘令吏刑部依條施行此事須要與今年十二月王珉劾疏相闗己巳太師尚書左僕射提舉實錄院秦檜等進呈徽宗皇帝御集熊克小歴在十月壬午盖誤少保觀文殿大學士秦熺為禮儀使上特御垂拱殿再拜受書實錄院修撰秦塤陞殿進讀詩五章禮畢乃退集凢百巻上自序之權奉安於天章閣凡詩百五十有五詞二百賦一序十有二記十碑四䇿問九文七樂章三挽詞二十有七雜文十有五詩解九論語解二道徳經解八南華真經解八冲虚至徳真經解十有二廣濟經十金籙科儀二政事手札千五百五十邉機手札二百四十有四直秘閣知盱眙軍龔鑒陞直徽猷閣令再任壬申少保觀文殿大學士充萬夀觀使兼侍讀提舉秘書省安奉徽宗皇帝御集禮儀使秦熺言伏覩進呈御集前夕密雲閣雨翌旦迎奉出秘書省天宇廓清皎月如晝仰見聖孝感格及垂拱殿進呈皇帝拱立觀覽夭顔端肅極於嚴奉伏望宣付史館從之乙亥詔建天章等六閣冬十月庚辰朔大理寺丞孫敏修面對論在法禁囚徒罪以上方許枷禁仍須立檢判押其制不為不嚴而州縣官逐㕔所行事其干繫人往往在㕔一面枷荷遇夜即行寄禁甚失國家立法本意乞申嚴行下詔可仍令監司按察御史臺彈劾辛巳保義郎趙不瑕言母李氏年六十九未有封號望以臣磨勘一官囬封從之壬午秦檜奏諸州今嵗豐熟間有髙田旱傷去處上曰可令依條檢放公私欠負仍往催理其繫官年嵗深逺者委户部開具取㫖除放仍令常平司措置通融糶糴務令兼濟毋致失所十一月癸丑户部擬請行下權吏部侍郎施鉅言屬者誤䝉聖選銜命出疆禮備将還而鄰國之君嘗問陛下師臣所兼何軄又問今年有㡬臣皆以實對兹有以見陛下聖明登崇賢哲朝廷尊榮故鄰誠信而仰重之也伏望特降睿㫖宣付史館昭示萬世不勝大願從之丁亥尚書省言永祐陵及昭慈聖獻皇后􅑼宫見用幃幕供設之類皆已故敝種植窠木亦多損闕詔紹興府守臣趙士㣓親往檢察修葺換易補種候畢開具申省戊子國子司業沈虛中為賀金國正旦使敦武郎張掄副之尚書左司郎中張士襄為賀生辰使閤門宣賛舍人張説副之掄開封府人也辛夘宰執進呈年例令臨安府自十一月支錢米養濟丐者上曰此一事活人甚多可即行下熊歴在丙戍與日歴不同壬辰故武功大夫閤門宣賛舍人吴進特贈二官例外錄其家一人以進先受贛州檄賫旗榜招安劇賊黄先遇害故也黄先未見癸巳宰執進太府寺丞曾怡面對論監司州郡虚申綱解致交納不酬枉被囚禁乞立法懲斷上曰事皆有法惟在奉行可申嚴行下乙未詔諸路提刑司将灾傷去處職田一例檢放以尚書省有請也戊戍三省擬左朝散郎蘇欽知巴州上曰川中須擇不生事之人逺地舉措朝廷無由盡知欽晉江人也十有一月庚戌朔龍圖等六閣成壬子上謂大臣曰不擾民而易成甚得崇奉之意癸丑詔諸路州軍未起諸色錢物并拖欠上供米斛積欠租税等除形勢及監司州縣公吏鄉司及第二等以上有力之家未納數外並與放免至二十年終令州軍銷落簿籍監司檢察用户部請也甲寅權尚書刑部侍郎韓仲通權刑部尚書權户部侍郎徐宗説試兵部侍郎右正言兼崇政殿説書鄭仲熊權吏部侍郎直顯謨閣知臨安府曺泳權户部侍郎兼權知臨安府時徐宗説久病故以泳代之泳倚勢妄作又甚於宗說舊荆南户口數十萬冦亂以來㡬無人迹詔蠲口賦以安集之然十未還一二先是議者希朝廷意謂流民已復可使嵗輸十二其後頻嵗復增吏不能供至是積逋二十餘萬緡泳責償甚急時秦檜晚年怒不可測而泳其親黨凶焰熾然守臣直秘閣孫汝翼懼欲賦於民以予之左承議郎通判府事范如圭力勸之乃止此事不得其年月因泳除版時附見汝翼今年六月自成都運副改知荆南九月十三日離任如圭二十二年八月差通判荆南府大理少卿張柄試大理卿秘書省著作佐郎丁婁明試秘書少監婁明以女適秦檜之姪右朝奉郎烜故擢用之右通直郎張􅤡守尚書刑部員外郎樞密院編修官林一飛為屯田員外郎新除大理司直薛仲邕為樞密院編修官尋權樞密都承㫖直龍圖閣提舉洪州玉隆觀湯鵬舉知廣州左太中大夫提舉江州太平興國宫李椿年知宣州乙夘右朝請大夫新除江南西路提㸃刑獄公事劉環罷先是有詔令四川制置司總領所措置裕民而環為潼川府路提刑兼提舉常平權轉運司事具到本路紹興十九年至二十三年未起贍軍折估糴本水脚等錢乞蠲免都省批送户部户部劾環妄有申陳顯是侵官不循分守徇私沽譽難以倚仗乞罷環新任庶少懲戒故有是命環民瞻子也日歴户部状未知是徐宗說未改除前所申或曹泳供軄後當考丁巳賜直秘閣吴益三品服封秘閣修撰秦堪妻趙氏為令人以秦檜辭免進徽宗御集加恩故有是命臣頃在行都聞趙氏乃近屬今不能記其詳當考甲子監察御史王珉行右正言乙丑端明殿學士簽書樞密院事兼權參知政事魏師遜仍舊職提舉江州太平興國官殿中侍御史董徳元劾師遜嗜利懐姦不恤國事師遜乃抗章求去遂罷之詔楊存中恩數視樞密使丙寅檢校少保武康軍節度使恩平郡王璩從吉還舊官丁夘權尚書吏部侍郎施鉅參知政事權尚書吏部侍郎鄭仲熊為端明殿學士簽書樞密院事自秦檜専國士大夫之有名望者悉屏之逺方凡齷齪委靡不振之徒一言契合率由庶寮一二年即登政府仍止除一㕔謂之伴拜稍出一語斥而去之不異奴𨽻皆褫其職名閣其恩數猶庶官云故自万俟卨罷至此十年參預政事之臣才四人而已此以王明清揮麈錄修入熊克小歴云自秦檜専國執政無敢少違其意者於是仲熊歎曰為官至此可以行志而不得行遇主如此可以圖報而不得報負愧多矣按仲熊為檜所用自國子監主簿不二年而登政府中間更歴臺諫専附檜意擠排善類無所不至又安有此言今不取戊辰少保觀文殿大學士充萬夀觀使兼侍讀提舉秘書省秦熺加恩遷少傅封嘉國公左朝奉郎陳䕫試太常少卿夔先為是官以憂去至是復舊庚午敷文閣直學士晁謙之卒于信州辛未敷文閣待制提舉佑神觀兼實錄院修撰秦塤試尚書工部侍郎亦以進御集推恩也左承事郎鄭時中守秘書丞時中甫登第即以京秩授之至是入館壬申端明殿學士提舉江州太平興國宫魏師遜落職殿中侍御史董徳元再論師遜買賤賣貴自同商販在朝堂有詣禀白者則必背面他視畧不闗省黎明而入既飯而出漫不可否一事乞重加竄殛故有是命左朝散郎知平江府李朝正罷以殿中侍御史董徳元論朝正與其女壻魏師遜共為商販也甲戌大理寺丞郭唐卿面對乞戒州縣推勘公事不得妄有枝蔓詔申嚴行下乙亥右正言王珉言直秘閣兩浙路轉運判官韓璡乃堂吏韓詳之子詳曩為蔡京爪牙姦邪隂險璡蹈襲家傳比建天章閣璡既不得遇安奉之日與韓珹袖手往來其間耳語竊笑意有譏誚珹乃其弟見為堂吏窺伺朝政事無大小璡皆預知比曹泳除户部侍郎臨安府闕官璡語泳曰某旦夕當為之己令修漕􅇬以借公璡常在劉光世軍中受光世恩甚厚一旦背馳奴事吕祉光世既罷盡以光世事告吕祉光世知之移書責罵比之犬彘逺近傳之無不鄙笑為淮西轉運判官日與陳克令謀助祉為虐遂致生變當時叛卒求璡尤急以逃伏得免今又惡心不悛懐私背公如此伏望重賜行遣詔璡放罷按淮西軍叛時璡實在建康未去珉所云小誤丁丑大理司直李璟面對乞令諸郡受納秋苖将出陸僻逺去處許乞就近縣鎮送納畢日團綱起發以寛貧民詔户部看詳是月左奉議郎通判武崗軍方疇除名永州編管疇坐與流人胡銓通書為守臣李若樸所告江西提舉常平茶鹽公事張常先因令通判袁州蔡橝按疇不覺察人吏盗用出剰銀送獄法寺當疇贓罪徒私罪流公罪絞秦檜進呈乃有是命疇之貶日歴㑹要皆不書今以熊克小歴及紹興二十六年十一月湯鵬舉劾蔡橝章疏修入克歴稱提刑張常先鵬舉劾疏稱江西運判張常先按常先此時提舉江西常平明年四月癸夘就除運判或者疇得罪在彼時且附此當求他書參考十二月己夘朔試尚書工部侍郎秦塤充敷文閣直學士提舉佑神觀兼實錄院修撰以塤再辭免也直龍圖閣新知廣州湯鵬舉改知平江府庚辰詔宕昌塞峯鉄峡兩場綱馬自来嵗為始循環撥付殿前馬歩三司各一年周而復始先是市馬者嵗於宕昌寨峯鉄峡市馬三千八百匹赴樞密院而部送者利其芻粟多道斃者至是始命統領官一員徃取之再嵗一往返用四千四百人皆精甲既而楊存中言馬多不及格者乞令統領官就場監視買馬不行川馬二十七年七月壬午所書可參考清逺軍節度使侍衛親軍馬軍都虞候荆湖北路馬歩軍副都總管王德薨于荆南府贈檢校少保後諡威定辛巳左朝散郎都大總管四川茶馬監牧公事湯允恭復司農卿與尚書度支員外郎總領四川財賦軍馬錢糧鄭靄兩易靄仍除直秘閣尚書吏部員外郎黄然為兩浙路轉運判官右朝奉郎知蜀州孫道夫主管台州崇道觀從所請也道夫在郡九年遇事明了州人目為水晶燈籠癸未宰執進呈大理評事劉敏求面對劄子乞令場務不得将食米作糯米收稅詔如所請又進呈大理評事鞏衍劄子乞戒約耆長保正副非盗賊鬬毆有實母得輙受状詔刑部措置累年惟大理寺官而對極多當是獄官不容謁故也其後刑部乞比附條令将不應受理事追逮闗留者徒一年毆縛取財者以盗論加二等従之刑部奏下在明年二月壬午丙戍左朝散郎魏安行送欽州編管左朝散大夫主管台州崇道觀洪興祖送昭州編管先是右正言王珉言故龍圖閣學士程瑀本實妄庸見識凡下昨在閑廢輙取先聖問答之書肆為臆説至引王質㫁獄以釋弋不射宿全失解經之體於周公謂魯公之語而流涕不無怨望之意此等乖繆不可槩舉其子弟又私結父之黨與以竊世之譽如洪興祖者則為文以冠其首魏安行者則鏤板以廣其傳朋比之惡盖極於此不可不慮也兼聞安行刋瑀之書盡用京西轉運司官錢費用不貲又以傳示四方親故并擕歸其家無慮數千百本身為漕臣當為國家愛惜財用豈可率意妄作以濟其私使官錢可以私用則其他何所不至臣竊惟陛下以聖學髙明表章六經瑀乃敢唱為異論而安行輩又從而和之若不早為杜絶臣恐其説寖行害教惑衆其禍不止於少正夘楊朱墨翟也伏望特降睿㫖将見今鏤版速行毁棄仍令所司檢計所費之直盡數於安行名下追納或其他州軍有刋行異説書籍元未曾申取朝廷指揮者亦乞毁棄仍将興祖安行及瑀之子弟重賜施行以為朋附鼔唱異説之戒此亦陛下保治之一端天下幸甚詔户刑部逐一依條施行珉又言興祖天姿隂險趨嚮不正如程瑀妄人之䧺者興祖傾心附之結為死黨瑀既死又與其子弟復相結托将瑀書為之序引謬加稱賞以欺後世如所謂感發於孔子之一射流涕於周公之四言此何語也哉安行昨知滁州開墾荒田乃其職事輙敢妄增頃數欺罔君上雖已放罷亦為輕典興祖今為饒州人皆怨嗟日望其去乃敢共懐異議肆為不靖如不痛懲恐為亂階伏望聖斷将興祖安行編置逺方以禦魑魅仍并程瑀子弟見已任堂除差遣之人並歸吏部庶使君子小人有所别白而天下後世知姦人之不可容也詔刑部開具申尚書省於是刑部尚書韓仲通乞将安行送欽州興祖送昭州並編管瑀之子右承事郎宏濟罷新差監通州金沙鹽場右承務郎宏靖孫右承務郎有功有孚今後並不與堂除差遣或其他州軍有刋行異説書籍元不曾申取朝廷指揮者亦乞毁棄從之日歴於此日先書刑部状而十三日辛夘方載王珉二疏疑珉疏乃十一月十三日壬戍所上也今併附此日日歴又於去年十一月二十二日丁未書左朝散大夫知饒州洪興祖依所乞差主管台州崇道觀按王珉第二疏稱謹按知饒州洪興祖又云興祖今知饒州人皆怨嗟日望其去興祖去年已得宫觀則珉何以出此言疑興祖祠命在今年十一月二十二日辛未而日歴誤繫之去年也當求饒州知州題名參考左朝奉郎汪應辰通判潭州應辰之在靜江也帥臣吕願中嘗以㣲罪欲殺走卒王超應辰諫而止有錄事參軍周某者與秦檜有舊恃此自恣嘗以國忌日命妓佐酒應辰欲糾之既而中止周憾之使人持書告檜以應辰嘗遣信渡海餉趙鼎又與李光交通超以計得其書而易之應辰乃得免丁亥降授右朝奉郎勒停人王趯追三官依舊勒停特除名送辰州編管以趯前知雷州與李光通書及差兵級應副使喚致臣僚論列故也鄭仲熊之為諫官也論海外罪人擅離受謫之地逃匿趯家時趯坐與光通書停官未叙事見紹興二十年八月甲辰乃詔湖南廣西憲臣親往捕光押還責地分仍逮趯赴大理獄既而究治事皆虛按奏特有是命鄭仲熊章疏已見今年七月癸丑王明清揮麈第三錄云李泰發之還責海外也欲寓書秦丞相以祈内徙而無人可遣門人王彦恭趯罷雷守閑居全州泰發乃作秦書託王為尋端便王之鄰居有李将領者坐岳侯事編置於郡與閭里通情趯令其子司法者從李将就頋一𨽻遣往㑹稽授書於泰發家既至越泰發子弟不敢以人入都乃就令此介自往相府投之既逹於秦忽令問李參政今何在所遣人倉猝遽對云李參政見在全州與王知府鄰居盖誤以李将為泰發也且云有王法司與李參政親以書付我令來盖錯愕之際又稱司法為法司也秦怒於是送大理寺根勘行下全州體究李光擅離貶所因何輙敢存留在木州且追王趯并王法司送獄而全州適有法司人吏姓王者亦與彦恭舍甚邇俱逮後體究得秦發初未嘗離昌化但誣彦恭以前任過愆除名勒停編管辰州王法司者懵然不知亦勒任贓罪杖脊當時聞者無不笑而憐之己丑直秘閣提舉兩浙東路常平茶鹽公事髙伯之知温州辛卯尚書兵部侍郎徐宗說充敷文閣直學士知明州以病自請也甲午右朝請大夫福建路安撫司參議官王弗知果州乙未司封員外郎王葆面對言縣令於民尤親而近年以來監司郡守各縁好惡之私以更易縣令在法命官犯罪雖有實状亦須具奏方許對移縣有繁簡難易監司察令之能否隨宜對換亦必具奏聼㫖伏望嚴約束務在必行詔申嚴行下應對移具事實申尚書省丁酉度支員外郎曾怡罷以權户部侍郎曹泳劾其貸取庫務物色也入内東頭供奉官睿思殿祗候陳成之還所寄資為拱衛大夫保寧軍承宣使致仕右通直郎知明州鄞縣程緯追毁出身以來告𠡠文字除名勒停永不收叙送貴州編管仍籍沒家財先是縣丞王肇與緯不協誣告緯慢上無人臣之禮遂興大獄肇因掲榜召士民訴緯罪犯案具緯坐贓法當絞特貸之日歴明年十二月九日壬午刑部状肇所告並是虚妄已行斷肇追官勒停不知緯有無改正也庚子尚書司封員外郎王葆左朝散郎知江隂軍徐嚞並為監察御史嚞西安人也紹興二十六年五月言者劾張修章疏稱曹泳在衢州監酒贓汙不法監司郡守欲案其罪嚞修劉景曲為營救得免此事當考壬寅刑部奏編管人願充廂軍者聼刺時台州編管人謝立之妻乞将夫刺充牢城刑部因編下諸路上可其奏且諭大臣曰朕昨在元帥府見河北諸州将編管人牽聫丐食于市盖縁不給口食乃至於此誠可憫惻冝申嚴約束行下直秘閣兩浙東路提㸃刑獄公事秦昌時卒乙巳金主使驃騎上将軍簽書樞宻院事白彦恭中散大夫守右諫議大夫充翰林待制同知制誥胡勵来賀来年元旦勵已見紹興二年夏末是嵗宗室子賜名授官者十有三人諸路斷大辟十有九人行在鎮江建康府𣙜務三務場共收茶鹽息錢二千六十六萬餘緡鹽息一千五百六十六萬餘茶息二百六十九萬餘香礬錢一百九萬餘雜物錢一百二十萬餘金尚書右丞相兼中書令蕭裕為金主亮所疑與西北招討和和謀立故遼豫王禧之孫和和執其使以聞裕坐死亮詔諭諸路畧曰自漢髙祖以來謀反者頗多盖髙祖與朕皆中庸之主堯舜禹湯之時豈嘗多有此事其不遜如此以金人誅裕詔修入詔詞云朕撫臨萬方今第六載即此年也金人舊無陵墓自太宗晟以上但𦵏於䕶國林極草創逮亮南徙始令司天改卜於燕嵗餘乃得地於良鄉縣之西大洪山佛寺徙太祖旻太宗晟徳宗宗幹於其中餘宗室以昭穆祔惟東昬王亶𦵏於山之隂謂其刑餘之人不入陵故也建炎以來繫年要録巻一百六十七建炎以來繫年要録巻一百六十七金人地名考證和和原書作好胡與金史同並誤今改正
