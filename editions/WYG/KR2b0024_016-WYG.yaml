body:
  text: 建炎以來繫年要錄巻十六宋李心傳撰建炎二年六月甲寅朔朝散郎余應求知岳州承議郎陳公輔知南劒州李綱之得政也二人自外除郎未入而綱罷至是始以郡守處之乙卯成都府路轉運判官靳博文權罷卭州鑄鐵錢以其歳用本錢二十一萬緡而所鑄才十一萬緡得不償費故也先是成都府錢引務每届書放錢引一百二十五萬餘緡崇觀間西事既起由是泛印増多至二千六百萬餘緡而引法大壊朝廷知之乃詔以天聖為印所凖事見大觀三年七月十二日至是博文以利州路増屯西兵此恐是王􅊅之兵軍食不繼權罷鼓鑄不待報遂行復以便宜増印錢引六十二萬緡自後諸大臣相繼視師率増印矣尚書省言檢㑹靖康元年已降指揮人户願將金帛錢糧獻助者計價依條補授名目除河北河東路已降官告外餘路未曽給降詔尚書省度量給付逐路每路差監司一員専一提舉委官勸人户獻納依隨處在市實價如納已七千貫補承節郎六千貫補廸功郎依已降指揮並不作進納人願繳元授付身貼納數中以十分為率更減一分亦不作進納所納之物内京東東路並隨處樁管餘路計綱起發上京不係沿途去處變兊易輕賫物色赴元豐庫送納並須召人情願不得抑勒科配丙辰建州軍再亂先是張員等既誅餘黨復懐反側㑹朝廷調威果卒三千人入衞未行軍士葉濃等相與謀互殺妻子以為變是夜縱火焚掠盜本州觀察使印突城而出進犯福州葉濃之亂日歴㑹要皆云六月一日而今年七月臣僚上言乃云六月十日惟熊克小歴繫之丙辰丙辰初三日也今從小歴按宋史繫癸亥日戊午尚書禮部侍郎兼直學士院王綯試御史中丞黄潛善以綯柔懦無能故薦為臺長此據趙甡之遺史綯除中丞日歴亦不載己未詔右文殿修撰前知通州胡安國已除給事中指揮更不施行初安國數上疏乞祠詔不許仍趣赴行在安國因放免奏有言曰臣賦性踈拙全昩事幾前當賛書積日雖淺適縁六押兼管兵刑所降詞頭茍有未便不敢觀望迷誤本朝須至盡忠逐件論執遂因繳奏遍觸貴權貽怒既多幾蹈不測今陛下揆亂返正將建中興而政事人材弛張升黜凡關出納動係安危聞之道途揆以愚見尚未合宜臣切寒心而况𤨏闈典司封駮儻或隠情患失緘黙不言則負陛下委任之恩其罪至大若一一行其職守事皆違異必以戅愚妄發干犯典刑徒玷清時無補國事臣所以不敢上當恩命者也疏入黄潛善大怒言者因論安國被命經年託疾不至朝廷之召愈切而安國之辭愈堅要流俗之譽失人臣之禮臣聞臣之事君義也不擇事而安之忠之盛也昔孔子君命召不俟駕而行孟子去齊三宿而王不追然後浩然有歸志士之所學孔孟之遺耳孔孟之所以事君者如此其欽而安國如此其慢何所恃哉蔡謨有重望於晉然固拒司徒之命至免為庶人况安國素無美名者乎且朝廷之所以召安國者不過以其早乞致仕不就薦對爵禄髙尚其事而已然安國當吳敏用事之際則幡然而起亟遷給舍何鄉者奉命之速而今日從命之緩乎方陛下中興王業號令之出當如雷霆震動四方罔不丕應而不能行於一安國豈不損國威令之甚况安國子寅自郎曹謁告不至已降三官安國責以臣節則事君不以禮責以父道則教子不以忠如此而欲成政事厚風俗不亦難乎望罷安國新除特賜黜責以為人臣不恭上命者之戒安國遂罷庚申侍御史張浚充集英殿修撰知興元府浚好謀有大志數招諸將至臺講論用兵籌䇿浚本黄潛善所引至是因請汰御營使司官屬又論無謂金不能來當汲汲修備治軍常若敵至潛善始惡之浚以母在蜀中求去故有是命未行留為尚書禮部侍郎浚入對上諭曰卿在臺中知無不言言無不盡朕將有為政如欲一飛冲天而無羽翼者卿為朕留當専任用浚頓首謝浚出守及再留日歴全不見今據行狀増修以禮部題名考之浚除侍郎在今年六月而無其日按史王綯奏上語有云臣與浚同官兩日而浚以秘閣修撰罷綯以此月戊午入臺則浚出臺當在庚申故繫於此日御史臺記建炎二年空月張浚直龍圖閣知興元浚除職諸書俱不同今從行狀綯奏語見日歴四年三月辛酉癸亥以盜賊未衰命諸路武臣提刑専管捉殺甲子踈決行在揚州及四京繫囚雜犯死罪已下減一等釋杖已下其後建康府越州亦如之紹興二年五月甲申始申臨軒踈決乙丑徐州觀察使御營使司中軍統制張俊引兵入秀州前知州事中大夫趙叔近為所殺初御營都統制王淵在京師狎露臺娼周氏亂後為叔近所取淵銜之及俊辭行淵謂之曰趙叔近在彼俊諭其意前一日俊總兵至郡叔近以太守之禮逆諸城北沈氏園俊叱令置對方下筆羣力遽前斷其右臂叔近呼曰我宗室也衆曰汝既從賊何云宗室語未畢已折首扵地秀卒見叔近死遂反戈嬰城縱火毆掠江東西路經制司書寫機宜文字辛安宗在城中為所害翼日俊破關捕徐明等斬之取周氏以歸淵以予俊俊不受乃遺韓世忠此叚據王眀清揮麈第三錄増入周氏彦古母後封靳國夫人熊克小歴俊入秀州在六月戊辰日歴張俊申十一日到秀州十二日已時收復十五日申到今從日歴俊以功遷武寧軍承宣使叔近子朝奉郎交之亦坐受賊所獻玩好降六官勒停後十餘年御史言叔近之寃始贈集英殿修撰趙交之停官事以紹興四年十二月丙申本人乞改正狀増入叔近贈職在紹興九年丁卯國信使楊應誠副使韓衍至髙麗見國王楷諭㫖楷拜詔已與應誠等對立論事楷曰大朝自有山東路何不由登州以往應誠言不如貴國去金國最徑苐煩國王傳達金國今三節人自賫糧止假二十八騎楷難之已而命其門下侍郎傅佾至館中具言金人今造舟將往二浙若引使者至其國異時欲假道至浙中將何以對應誠曰女真不能水戰佾曰女真常於海道往来况女真舊臣本國近乃欲令本國臣事以此可知强弱後十餘日府燕又數日復遣中書侍郎崔洪宰知樞密院事金富軾来固執前論且言二聖今在燕雲不在金國館伴使知閤門事文公仁亦曰往年公仁入貢上國嘗奏上皇以金人不可相親今十二年矣洪宰笑曰金國雖納土與之二聖亦不可得大朝何不練兵與戰應誠留髙麗凡六十有四日楷終不奉詔應誠不得已與楷相見於夀昌宫門下受其所拜表而還此據應誠所上語錄修入按錄應誠以六月丁卯見髙麗國王楷楷令傅佾議事及送衣帶己卯府㑹壬午遣崔洪宰等至館七月丙戌文公仁等云云戊子應誠以病求醫壬寅甲辰八月戊午連趣應誠復命壬申拜表九月初放洋今併附此餘見九月癸未十月甲寅戊辰詔諸路應輸内藏庫錢帛經由揚州行在者許兊撥用端眀殿學士同提舉措置財用黄潛厚請也初東川布衣崔子方治春秋紹聖間三上疏乞置博士不報乃隱居真州六合縣子方剛介有守雖衣食不足而志氣裕然杜門著書三十餘年而死至是兵部員外郎江端友請下湖州取子方所著春秋傳蔵於秘書監從之己巳葉濃破古田縣甲戌入福州掠特進致仕衞國公余深家金帛欲縱火焚城守臣顯謨閣待制江常不知所出提㸃刑獄公事李芘防脂切登城諭之留十餘日乃去官軍追擊之不利芘安陽人也熊克小歴以芘為閩縣人今據芘遺事大抵芘亦僑寓者克多隨今户貫書之丁丑命京畿淮甸捕蝗己卯言者以為東南武備利於水戰如張遇乃河朔潰卒未嘗習舟楫之利一旦有急即刼舟張帆蔽江東下金人既破唐鄧陳蔡逼近淮漢去大江直一間耳為今之䇿宜於大江上游如采石之類凡要害處精練水軍廣造戰艦仍泊於江之南岸緩急之際庶幾可倚詔江浙州軍措置限一月畢是月以集英殿修撰知延安府王庶為龍圖閣待制節制陜西六路軍馬涇原經略使司統制官曲端為右武大夫吉州團練使充節制司都統制詔書有曰儻不靖難於殘暑之前必致益兵於秋涼之後先是溫州觀察使河東經制使王􅊅既遁歸朝廷除􅊅知鳳翔府東京留守宗澤承制以庶權陜西制置使端權河東經制使㑹主客員外郎陜西撫諭使謝亮西入關庶移書曰大夫出疆有可以安社稷利國家専之可也夏國為患至小而緩金人為患至大而迫方敵兵挫銳於熈河奔北於本路子女玉帛不知紀極占據同華畏暑休兵閣下能仗節督諸路協同義舉漕臣應給糧餉爭先並進雖未能洗雪前恥亦可以驅逐渡河全秦奠枕徐圖恢復夏人秋稼未登飢餓疲困何暇興兵庶可保其無它亮不聽遂自環慶入西夏夏國主乾順已稱制倨見之亮留夏國幾月乃與約和罷兵更用鈞敵禮乾順許之此據建炎三年七月癸未張浚奏西夏通書禮數及紹興元年二月庚寅謝亮乞存恤家屬狀參修亮歸夏人隨之以兵掩取定邊軍明年亮乃還行在初王􅊅之潰也其屬官王擇仁以衆二萬入長安復為經略使郭琰所逐祠部員外郎四川撫諭喻汝礪嘗言今朝廷已専命王庶經制中夏竊聞五路全不禀庶節制望擇久歴藩方曉暢軍事近上兩制節制五路招集潰兵勞徠流徙式遏冦盜仍以臣所刷金帛八百餘萬緡為軍糧犒設之費庶可以繫二京兩河山東陜西五路父老之心若謂四川錢物不當應副陜西臣謂使此錢自三陜湖湘平底建康固為甚善萬一中途為姦人所窺適足資冦臣又聞王擇仁所統皆三晉勁勇之餘今關輔榛莽軍無見糧故其人専以剽掠為事若得上件財帛養之則秦晉之民皆為吾用矣時庶已擢待制而汝礪停官然皆未受命也自王􅊅除鳳翔至喻汝礪乞留川綱必非一月間事以諸書皆不見日月故且牽聨附書之當更考求各附本月日復置諸州學官四十三員此以紹興二年十月九日給舍看詳狀増入初二帝既徙中京御史中丞秦檜實從既而聞上中興上皇欲作書貽左副元帥宗維與約和議大略言唐太宗復突厥而沙陀救唐冒頓單于縱髙帝於白登而呼韓頼漢近世耶律徳光絶滅石氏而中原灰燼數十年終為他人所有其度量豈不相逺哉近聞嗣子之中有為人之所推戴者盖祖宗徳澤之在人至深至厚未易忘也若左右欲法唐太宗冒頓單于受興滅繼絶之名享歳幣玉帛之好當遣一介之使奉咫尺之書諭嗣子以大計使子子孫孫永奉職貢豈不為萬世之利上皇草書已諭駙馬都尉深州防禦使蔡鞗曰為我示秦檜更潤色之檜讀書嗚咽即厚遺本路都統達於宗維宗維有慚色鞗京子也此以王若冲所著道君北狩行錄修入臣謹按紹興日歴秦檜張邵奏及曹勛所獻書本乃云檜代作與此不同或者檜嘗草具此書而上皇又親製之也行錄以此書為在中京所遣而無年月檜書首云季夏極熱臣按上皇以去夏去燕京今秋移韓州則在中京過夏必是此年故附著於此世傳檜在金國已倡和議因是得歸而未有以為之證以是書考之疑金人知檜為上皇草書度其肯任此事是以歸之耳朱勝非秀水閑居錄云檜自京城隨金北去為大帥達蘭郎君任用此則云秦檜北遷時達蘭方圍中山府檜何由在其軍中意者因草此書而達蘭移之尼瑪哈軍中為歸之之張本耳北狩行錄上皇書某自北来衆所鄙棄獨荷左右見憐故知英雄度量與凡俗自不同也嘗欲通書於左右而自訝自疑因循至今某聞惟大英雄之人然後能聽大度之言敢略陳固陋惟左右留神省察古之君子莫不以濟世安民為己任故有國士者止能安一國之人有天下之士者然後能安天下之人是以堯舜禹湯之君而輔以臯夔稷卨之臣則日月所照風雨所及莫不被其澤載在典籍昭然可考不在一二陳也且以近事言之昔唐之太宗起自晉陽奄有天下征伐荒外西破髙昌北禽頡利可謂黄帝之師莫强乎天下也而逺思長乆之計知突厥稽首戴恩常為北藩故唐之衰也終得沙陀以雪國恥又匈奴冒頓單于圍漢髙祖於白登七日不食當時若取之如俯拾地芥冒頓單于不貪近利以為逺圖使髙帝得歸以奉祭祀故得受繒幣舉中國珍異玉帛奉約結好後匈奴國亂五單于爭立終得宣帝擁䕶呼韓近契丹耶律德光責石氏之失約長驅至汴舉石氏宗族遷之北荒然中國之地亦不能守以至糜爛灰燼數十年之間生靈肝腦塗地而終為劉知逺所有比之唐太宗冒頓單于其英雄度量豈不萬萬相去逺哉先皇帝初治兵於遼東不避浮海之勤而請命於下吏䝉先皇約為兄弟許以燕雲適平山妄人嘯聚不逞某之将臣巽懦懐首䑕之兩端某亦過聽惑於謬悠之説得罪於大國之初深自刻責黜去大號傳位嗣子自知甚明不敢怨尤近聞嗣子之中有為彼方之人所推戴者非嗣子之賢盖祖宗徳澤在人至厚至深未易忘也不審左右欲法唐太宗冒頓單于受興滅繼絶之名享歳幣玉帛之好保國治民於萬世耶抑欲效耶律徳光使生靈塗炭而終為他人所有耶若欲如此則非某所知若欲如彼當遣一介之使奉咫尺之書諭嗣子以大計使子子孫孫永奉職貢豈不為萬世之利也哉伏惟左右以命世之才當大有為之時必能聽大度之言也昔人有為趙使秦者秦王問趙可伐歟趙使對曰里人有好色者好色之患世所共知而母言之則為賢母妻言之則為妬婦今日之事大類是矣惟麾下多賢必能審處言欲盡意不覺覼縷伏望台慈有以照察幸甚日歴紹興十九年四月丁卯御前降下曹勛所蔵秦檜向在金國代徽宗皇帝所作書藁某啓季夏毒熱伏惟元帥郎君台候動止萬福某居處幸安實賴庥庇離汴京已踰年矣鄙懐千萬久欲聞於左右常恐犯不韙之咎今閲日既久則復慮後時之悔又數䝉存問審知英雄大度可感以誠敢悉布腹心頃自大聖皇帝治兵之初某即承命於下吏先皇帝恵然顧懐結為兄弟載在盟書永以為好某之敝邑仰荷威徳怡然無事又盡得前代故地顧此恩紀未知報所適㑹妄人嘯聚不逞某之將臣巽耎畏事懐首䑕之兩端某亦惑其謬悠得罪大國自知甚明故於問罪之初深自克責不敢抗兵亟去位號委國計於嗣子亦䝉大國沛然寛宥許之自新復遵前好而嗣子愚弱不閑於理小人貪功要取民譽妄有交搆遂重獲罪於大國禍皆自取悔将何及某向自傳位以来退處道宫不復干預國事事無大小並不預聞此非敢妄為之説天下之人所共知也凡諸往事姑置勿論請以今之事勢言之夫南北之俗有異因其君長而臣屬之則可若混一之理自古以来無是事也昔契丹耶律徳光皇帝遷徙石氏拘於北方南朝遂為劉知逺所有終不臣屬且石氏有天下方二世本乃簒立初無徳澤知逺所以能攘其位而有之趙氏自太祖不血刃取天下仁㤙結人深矣厥後六宗世世脩徳不忝前人百餘年間不識兵革斯民仰事俯育衣食無憾乃以異姓易之此在某實難言天下之人自知其不可今若因而存之則世世臣屬年年輸貢得失可見矣必欲拏舟交廣馳馬閩蜀躡關陜决大計於金鼔之間就使一一如志欲所得之利盡歸公上則莫若歳歳受金幣使它人守疆則莫若因舊姓而屬之在郎君宜熟計而審處聞嗣子有在南方為彼人所依此祖宗恩徳在人未易㤀也如䝉郎君以某前所言為然望賜采擇某欲遣専介諭嗣子以大計郎君可不煩汗馬之勞而坐享厚利伏惟麾下多賢通知古今諳練世故者不為少想當禆賛成畫笑談而定瞻望旌棨鶴立俟報不宣秋七月癸未朔詔京官到行在者並令吏部審量非政和以後進書頌及直赴殿試之人乃聽參選按宋史繫丙戌日用吏部請也靖康初用御史胡舜陟言大治濫賞元年四月癸丑已而遽罷其年九月辛未有㫖可更不問至是提領茶鹽司奏辟朝奉郎鄭待問充准備差遣湖州用赦薦舉宣教郎新江東茶鹽司幹辦公事張體純論者以為二人皆以進頌得官法當討論悉罷之而有是命體純金壇人待問江山人嘗通判湖州坐朱勔黨衝替至是梁揚祖辟用之審量事十月丙子又改按宋史繫丙戌日資政殿學士東京留守開封尹宗澤薨澤為黄潛善等所沮憂憤成疾疽作於背至是疾甚諸將楊進等排闥入問澤矍然起曰吾固無恙正以二帝䝉塵之久憂憤成疾耳爾等能為我殱滅强敵以成主上恢復之志雖死無恨衆皆流涕曰願盡死諸將出澤復曰吾度不起此疾古語云出師未㨗身先死長使英雄淚滿襟遂薨年七十是日風雨㝠晦異於常日澤將沒無一語及家事但連呼過河者三遺表猶賛上還京先言已涓日渡河而得疾其末曰嘱臣之子記臣之言力請鑾輿亟還京闕大震雷霆之怒出民水火之中夙荷君恩敢忘尸諫澤自奉甚薄方謫居時饘粥不繼吟嘯自如晚年俸入稍厚亦不異疇昔食不兼味衣敝不易嘗曰君父當側身嘗膽臣子乃安居美食耶所得俸賜遇寒士與親戚貧困者輒分之養孤遺幾百餘人死之日都人為之號慟朝野無賢愚皆相弔出涕三學之士千餘人為文以哭澤初澤既拘留金使上屢命釋之澤不奉詔至是資政殿大學士充大金祈請使宇文虛中至東京而澤已病虛中攝留守事遂歸之時上已除澤門下侍郎兼御營副使東京留守命未下而訃聞詔贈觀文殿學士進六官為通議大夫後諡忠簡澤門侍之除史及他書不見惟遺事及靖康小雅有之熊克小歴云澤諡威愍與史不同盖誤按宋史繫丙戌日張吕中大事記曰自古未有内外不相應而成功者有仲孝友主於内而後吉甫得以専征於外孔明欲出師於外則必任褘允於内建炎之初綱在内澤在外此正天擬二人以開中興之治也使二人得盡行其志必能復君父之讎雪宗廟之恥伸神人之憤惜夫綱相則澤之志行綱去則澤之計沮盖汪黄二人既用事於中則宗澤安能措手於外二人既主幸東南之議則宗澤還東京之請雖二十疏而何益縱使渡河而北指日成功亦安能免後患哉嗚呼東京之地宗廟在焉陵寢在焉為人子孫烏可置祖宗而不問為人父母烏可棄遺黎而不思且向也元帥府方開之始宗澤解京城之圍而伯彦則謂不可使金知元帥所在今也還京之請屢上而汪黄則謂上皇之子三十人今所在者惟聖體耳自外而觀汪黄之計可謂忠矣宗澤之計可謂危矣以義而論則君父不可視之如路人中原不可棄之如土梗天祚吾宋則將有主矣天所興者誰能敗之此豈汪黄乳嫗護赤子之術所能為哉澤之志不獲伸於前又不獲伸於後徒使後之人聞出師未㨗身先死長使英雄淚滿襟之歎而為之致無窮之恨也甲申葉濃自福州引兵破寧徳縣復還建州丙戌中奉大夫福建路提㸃刑獄公事李芘勒停時言者論芘擁兵數萬費官錢二百餘萬緡専務招安不能平冦停其官責使捕盜以尚書吏部員外郎林杞代之有宣義郎御史臺檢法官謝嚮者靖康末嘗奉詔至閩中募武勇之士乃命嚮為本路捉殺官尋又遣御營使司中軍統制張俊兩浙路提㸃刑獄公事趙哲將卒二千人偕往討捕把永嘉人嚮建安人也謝嚮為臺法史盖不書據御史臺記繫之建炎二年空月在王綯除中丞之前按綯以六月除中丞故附於此把元年六月甲子以朝請郎除吏外既而濃又破政和松溪二縣濃破政和在八月辛未破松溪在其月壬申今聨書之申按宋史繫甲日丁亥御筆國歩多艱人才為急如蔡京王黼當國日久孰不由其擬授果賢且才豈可不用自今毋得分別使自奮忠義仰三省遵行之時宰相黄潛善本王黼門人故多引黼親黨以進議者非之此為三年二月己巳張澂劾疏張本詔諸郡發歸朝官赴行在時所在多囚禁歸朝官有疑則加殘害一郡戮至千百人上憫之故有是命中興聖政臣留正等曰古人有殺一不辜而得天下弗為者也彼姦雄忍酷之言至曰寧我負人嗚呼人之用心何止天壤之異哉方建炎之初所在盜起如蝟窮荒絶漠之人錯諸郡縣有司為之禁防或未過也而太上皇帝推天覆地載之徳視中外之民皆吾赤子惻然哀矜形於聖訓凛然有三代王者之風漢髙帝之恢廓大度不足言矣吏部尚書兼侍讀周武仲充龍圖閣學士提舉江州太平觀初武仲以疾亟求去上曰如武仲者未見其比雖病固當留最後同知樞密院事郭三益為之請乃有是命戊子幹辦内東門司王嗣昌送吏部坐與邵成章為死黨好大言議國政故也詔自今士卒有犯並依軍法不得剜眼刳心過為慘酷令御營使司行下衆皆鼓舞感戴中興聖政史臣曰愛而不能令厚而不能使亂而不能治此兵法之患也治軍固不能不嚴然治之自有常法若師出以律孰敢不畏者而諸將過為慘酷豈撫軍之道哉乙未侍衞馬軍都指揮使郭仲荀為京城副留守朝廷聞宗澤薨故也初澤以便宜假統制官楊進榮州防禦使知河南府㑹澤死進遂輟行林泉野記宗澤為京城留守招降諸大冦王善楊進丁進等兵勢甚盛澤有渡河迎請二帝之意黄潛善汪伯彦疾其成功又疑其為變遂以郭仲荀為副留守以察之按日歴二年七月十二日甲午開封府言宗澤卒十三日乙未郭仲荀充京城副留守盖潛善等聞澤死而後除之非以察澤也熊克小厯刪取其語附於元年七月澤初除留守時亦誤是時楊進丁進皆未降汪黄胡為疑之按仲荀兩為東京副留守其初除日厯不載但於今年八月正除騎帥時繫副留守銜克於仲荀再除時却不書是以展轉繆誤今並不取朝請郎提舉杭州洞霄宫謝克家上疏自辯不受張邦昌偽命且嘗奉國寳至濟州其言引資政殿學士吕好問為證大略謂圍城士大夫恃陛下在外共為後圖好問不能獨任其責遣人起諸退人臣始見邦昌面決行日則臣之復出為陛下出也疏入遂召克家及顯謨閣待制知平江府孫覿赴行在丁酉殿中侍御史馬伸言克家覿趨操不正姦佞相濟小人之雄者也在靖康間與李擢李㑹王及之王時雍劉觀七人者結為死黨附耿南仲倡為和議之說助成敵謀有不主和議者羣起而辱罵之欲執送金營人皆畏其險而不敢校也陛下即位之初照見情狀逐之是矣近者不知誰為之援皆得被召將復進用人情危駭莫知所謂望賜寢罷竄之逺方戊戌詔好問開具當時因依聞奏其後好問因自陳反正之功由是二人復用好問開具狀見偽楚錄誤以為克家所奏而徐夢莘北盟㑹編又因之夢莘乃云謝克家辯事偽楚狀與吕好問所奏一同其孰為正盖好問元奏云右臣准尚書省劄子朝請郎提舉杭州洞霄宫謝克家進狀七月十六日奉聖㫖令臣開具因依聞奏後來傳錄者減去又臣准尚書省劄子八字是以差互如此己亥祕閣修撰知荆南府唐慤降充直秘閣先是承議郎通判荆南府程千秋為慤所忌請避之改通判襄陽府未行轉運司誘執千秋以屬吏其弟千乗訴於朝有詔勿治正月丁未慤怒奏千乗偽造制書上命移獄於潭州四月癸未而慤終不肯釋言者謂方羣盜薛廣祝靖李孝忠相繼犯荆南帥臣監司望風悉遁賊既據城與公安止隔一水維舟絞栰欲乗勢南來千秋奮不顧身率縣民禦之使人夜渡焚舟毁栰殺賊甚衆遂不敢犯岳鄂鼎澧皆賴以安民間往往繪其像而祠之方今天下擾攘忠義之人所在不多朝廷所宜愛惜有罪猶當宥死况無罪乎臣近聞千秋至今坐獄存亡未可知萬一如此則慤亦可謂方命矣乃詔釋千秋而慤有是命辛丑詔以春霪夏旱飛蝗為沴命監司郡守條政事之未便於民者其大水飛蝗最甚之地令百姓自陳量輕重捐其租焉壬寅尚書兵部員外郎福建兩浙撫諭江端友罷以言者論其不練民事所至苛擾也癸卯詔京官知縣兩任已上實及六考方許關陞諸州通判舊法不拘考數至是申眀之此以紹興五年閏二月八日右宣教郎熊彦說劄子修入日歴無之甲辰降充顯謨閣待制北京留守河北東路制置使杜充復樞密直學士充開封尹東京留守且命充鎮撫軍民盡瘁國事以繼前官之美遵禀朝廷深戒妄作以正前官之失自宗澤薨數日間將士去者十五都人憂之相與請於朝言澤子宣教郎頴嘗居戎幕得士卒心請以繼其父任㑹充己除留守詔以頴直秘閣起復充留守判官充無意於金盡反澤所為由是澤所結兩河豪傑皆不為用吕中大事記曰此澤去而東京之地不可守也宗澤在則盜可使為兵杜充用則兵皆為盜矣充守東京則金至維揚充守建康則金至明州以充繼澤何異以淵代逖以姜維而續孔明之事功李綱罷而汪黄相於内宗澤死而杜充守於外天下事可知矣河北轉運副使張益謙復直秘閣兼權大名尹北京留守丁未亳州言本州已增修城壁剏置樓櫓可以禦冦今防秋在近乞以本州界所管新舊弓手合為一軍土軍合為一軍清河装發合為一軍選才武使臣充部押官分守要害從之仍詔諸路一體州軍凖此庚戌朝請郎提舉杭州洞霄宫謝克家試尚書吏部侍郎朝請大夫提舉江州太平觀葉夢得試户部侍郎既而克家不自安乞補郡乃以為龍圖閣待制知台州給事中劉觀試尚書工部侍郎觀之除日歴及後省工部題名皆不見紹興二年十月刑部檢舉狀云建炎二年七月除工部侍郎故附於此俟考朝散郎林之平為監察御史之平莆田人也詔諸路應兵將捕盜等官合應援地里内逗遛不進許安撫司從軍法時直龍圖閣新知杭州康允之言近杭潤秀三州兇冦竊發而屬邑及旁郡未聞有來赴難者必待奏報輒勤王師望以軍法約束軍民有立異功者仍具奏聞不次擢用以為勸沮從之故有是㫖辛亥黄潛善言朝議大夫恵厚下自中京逃歸言有傳登極赦書至上皇所者上皇與宣和皇后相賀聖情甚恱上斂容不語久之曰宣和皇后天性儉約在朕府中時每進膳未嘗改造侍上皇亦疎濶所得月賜未嘗妄用服浣濯之衣破則補之望明而觀縫處如繡盖非它人所能及也厚下華原人宣和中嘗知解州是月禮部貢院言應詞學兼茂科朝奉郎袁正功合格詔減二年磨勘正功無錫人也紹興三年七月乙未改法燕山人劉立芸聚衆攻破城邑立芸諭衆曰吾欲致南北太平所至不殺掠但令饋糧於是蕃漢之民歸者甚衆羅索遣兵攻解州之朱家山統領忠義軍馬邵興苦戰三日遂敗之陜州安撫使李彦仙授興從義郎遷本州都統制建炎以來繫年要録巻十六建炎以來繫年要録巻十六金人地名考證逹蘭原書作撻辣誤改見巻一尼瑪哈原書作黏罕誤改見巻一羅索原書作婁宿誤改見巻一
