body:
  text: 建炎以來繫年要録巻二宋李心傳撰建炎元年二月按是月辛酉朔壬戍金人索后妃服渾天儀琉璃玊器等乙丑再括金銀時開封言根括金銀盡絶而内侍藍忻等在軍前言家有窖藏乞搜取二帥大怒進士黄時偁段光逺遺金人書言忻等皆前日倖濫渠魁今挾怨生事罪不可赦宜斬首以徇又言不當以金帛乆留乗輿不報時偁等書實録無之以趙甡之遺史王明清揮麈後録増入但遺史係光逺上書于正月丙午恐太早今併附見鄜延經畧使張深引兵次朝邑縣先是本路副總管威武軍承宣使劉光世将歩騎三千援京師至唐鄧間道梗不得進聞范致虚傳檄諸路光世與其将喬仲福等議引兵㑹之㑹淵聖皇帝遣使臣黄深持御劄以和議已定止勤王兵光世曰不可以詔示衆冝速圖進發既而潰兵踵至具聞城中事衆心惶惑光世矯以蕃官沙穆来自京城云二聖决圍南幸矣乃遣使臣葛宗賫宻奏徃荆襄江浙間尋二聖所在衆情稍安光世因引兵入闗及是與深㑹光世延慶子也此以趙甡之遺史及李觀靖康勤王紀行録㕘修是日淵聖皇帝赴二帥擊毬之集何㮚馮澥曹輔郭仲荀從帝為主左副元帥宗維為客酒九行帝起謝曰某乆留軍前都人顒望欲乞早歸宗維問帝去将何之帝失色不復言罷歸右副元帥宗傑聨騎至行宫門外曰天命如此無可奈何帝悵然不怡而㮚亦有憂色丙寅金左副元帥宗維傳其主之命議立異姓平旦遣蕭慶邀淵聖皇帝詣端誠殿從官皆喜謂果得歸矣才出門忽有撤黄屋者衆方驚愕洎至門外則己望北設一香案随駕官於百歩外排立帝獨前下馬己上據宣和錄兵部尚書髙慶裔宣金主晟詔書其書畧曰賂河外之三城既而不與結軍前之二使本以間為既為待罪之人盍為異姓之事所有措置條件並己宣諭元帥府施行慶裔讀詔己慶廹帝易御服實錄李若水附傳云敵遣蕭太師即慶也李若水事跡云武節郎張玠説圍城中作横門第二次從駕出郊親見尼瑪哈先在殿上髙尚書讀詔罷詔使蕭慶脫御服侍郎向前左手抱帝右手指而罵之丁特起孤臣泣血錄云金人迫上脫去赭袍盡皆撦裂蔡絛國史後補所謂國家破辱皆在端誠殿即指此也金主詔本見于耿氏編今不錄時事岀不意㮚等皆震懼不知所為吏部侍郎李若水獨前持帝曰陛下不可易服敵命數人曵以去復大呼曰吾君華夏真主若輩欲加無禮耶敵擊之面目為傷若水氣結仆地良乆乃蘇於是毎執政監以二金兵毎侍從監以二燕兵各分散獨留鐡騎數十傳宗維令曰必使李侍郎無恙遂掖至青城門廡下日三飯飲之若水絶不食病如中風狀㮚亦伏地固請敵怒囚之若水母張氏聞變哭且言曰吾子死難必矣已而果然沈良靖康餘録云二月六日夜半宗維請上相見何㮚李若水孫覿並從火炬如晝宗維令人宣金主偽詔㮚若水伏地固争㮚雖争而不罵乃髠之覿不争得免靖康野録云若水抱持上罵不已尼瑪哈令持若水去生褫碎以為號令囚何㮚于土堀中數日按若水被殺在半月之後野錄誤也何㮚伏地被髠本傳及他書皆不見然金人立主詔云惟何㮚李若水不許與議則二人同争必矣何烈靖康草史亦云何㮚髠鉗為女真營軍校足明㮚得禍亦酷但不能強争耳今併附見是日夜漏下二皷金人以檄來議立異姓且令遷都詔書畧云宋之舊封理宜混一然念舉兵本非貪土請前宋在京臣僚一面請上皇併后妃兒女親眷王公之屬岀京仍集耆老軍民共議薦舉堪為人主者一人不限名位高卑所貴道徳隆茂衆所推服長于治民者從軍前備禮冊命淵聖皇帝亦附手劄略云今于元帥府拜受大金皇帝詔書以屢變盟誓别立異姓自惟失信固當如此猶許舊地别立賢人其于萬姓為幸非細幸早請上皇以下舉族岀京無拘舊分妄為禍福速招連累時執政侍從集内東門見敵書讀之皆號哭兵部尚書吕好問曰今計無所出但當率衆􅈤告耳若其不從上皇出城亦未遲也入内内侍省都知李石岀帝手劄好問曰此乃不得已而書也夜半不能决初左副元帥宗維與諸軍帥議欲留蕭慶居汴京以守河南地慶不敢當衆又推漢軍都統制劉彦宗彦宗亦不敢當右副元帥宗傑語于衆曰它日趙氏必復興今吾務廣地而兵力不能周是自貽患也不若以河為界宗維是之遂有就城中别擇賢人之議此據傅雱通問録附見好問希哲子也希哲公著子元祐崇政殿説書偽楚錄載金檄云大金元帥府近以降表申奏今回降㫖先皇帝有大造于宋人而宋人悖徳故去嵗有問罪之師乃因遣使軍前祈請遂許自新既而變渝愈速是致攻討擊城摧破方申待罪之禮况近尋載書有違斯約子孫不紹社稷傾危今既伏罪宜從誓約宋之舊封頗亦廣袤既為我有理宜混一然念舉師止為弔伐本非貪土宜别擇賢人立為藩屛以王兹土其汴都人民願隨主遷居者聽右所降聖旨在前今請宋宰相文武百官在京臣寮一面共請上皇以下后紀兒女親眷王公之屬岀京仍勾集耆老僧道軍民遵依聖㫖共議薦舉堪為人主者一人不限名位尊卑所貴道徳隆茂勲業耆舊素為衆所推服長于治民者雖無衆善有一于此亦合薦舉當依聖㫖備禮冊命趙氏宗人不預此議應宋之百司並事新君其國候得姓氏隨冊建號所都之地臨日共議天㑹五年二月六日右金吾衞上将軍右都監押右監軍押王子右副元帥押固倫尼伊拉齊貝勒左副元帥押安班貝勒都元帥押臣家圍城雜書載此手劄云今月六日於元帥府拜受大金皇帝詔書以屢變盟誓别立異姓仍依聖旨専俟上皇以下后妃諸王公主以次内族岀京俾令團聚自惟失信固當如此猶許舊地别立賢人其于萬姓為幸非細今因元帥府差人賫文字入城附此誠意幸為暁悉早請上皇已下舉族岀京外諸事並從元帥府指揮方是長計無拘舊分妄為禍福速招連累右備錄皇帝御書在前今暁示官員耆老等各令知悉二月七日按此手劄丁特起泣血錄中亦有之邦昌上康邸書亦云尋奉御筆令依元帥指揮云云盖指此也按原本所載檄文字句脱誤今悉依北盟㑹編補正丁卯道君太上皇帝岀詣金營時敵令翰林學士承㫖呉幵學士莫儔邀上皇岀郊上皇疑不聽敵以其事付京城四壁廵檢温州觀察使范瓊平旦金人大啓南薰門鐡騎極望闖門而陳瓊與幵儔及内侍李石偕至延福宫請上皇與寕徳皇后同詣軍前􅈤告上皇未應瓊以言逼之遂御犢車岀宫至南薫門敵自甕城以鐡騎擁之而去都人望之皆慟哭此以欽宗實錄及宣和錄㓜老春秋三國謀謨錄參修曹勛所進北狩聞見錄云徽宗在蘂珠宫李石吴幵莫儔入見石奏請到南薫門徹舍拜表乞皇帝歸聞金人意欲成本朝一叚􅈤情亦無它意石又道淵聖語云不可緩恐失事機徽宗欲索道服岀姜堯臣曰敵情詐偽不測更宜聖裁徽宗将行内人皆哭徽宗曰若以我為質得官家歸保宗社亦無所辭又取常所御佩刀令丁孚佩之乃岀至南薫徽宗頓足輿中曰事乖變矣呼孚取佩刀已被敵人捜去申初到南郊齋宫止于大王位從人皆不許隨後三日惟呼勛孚堯臣徐中立在左右㓜老春秋云吴幵莫儔持元帥府文字入城見孫傅王時雍徐秉哲謂之曰軍前有旨如上皇己下申時不岀即縱兵四面入來殺人傅與時雍徑見太上皇乞與諸王后妃詣軍前懇告上皇未應范瓊以言逼之上皇涕泗横流不得已乃乘竹轎而岀按諸書孫傅未嘗見上皇此所云恐誤然傅畫一状亦云太上皇己下不敢有違令旨見起發赴軍前同伸懇告則傅亦必預聞矣今併附此庶不失實時肅王樞已岀質鄆王楷等九人從淵聖皇帝在青城於是安康郡王楃相國公梃瀛國公樾建安郡王楧嘉國公椅温國公棟儀國公桐昌國公柄潤國公樅等九人及龍徳宫王貴妃喬貴妃韋賢妃王婉容閻婉容任婉容王婕妤喬婕妤小王婕妤崔夫人康王夫人邢氏與諸王夫人帝姬暨上皇十四孫皆岀靖康要盟錄有取宗族數云鄆王并夫人朱氏男二人女宗姬六人肅王夫人任氏男二人女宗姬二人景王夫人田氏女宗姬二人濟王并夫人曹氏康王不在京夫人邢氏祁王并夫人曹氏莘王并夫人嚴氏徐王并夫人王氏沂王和王信王己上係蕃衍宅未岀閤郡王國公十人係在諸閤分已出降嘉徳帝姬都尉曹寅安徳帝姬都尉宋邦光崇徳帝姬都尉曹晟岀使茂徳帝姬都尉蔡鞗押赴軍前成徳帝姬都尉向子房洵徳帝姬都尉田丕順徳帝姬都尉向子扆顯徳帝姬都尉劉文彦未出降華福帝姬惠福帝姬令福帝姬純福帝姬寕福帝姬永福帝姬柔福帝姬諸妃嬪欽宗實錄云上皇詣青城鄆王己下三十餘王皆從誤也按九王正月辛丑已留青城從上皇岀者乃未岀閤諸王耳上皇三十一子自淵聖肅王康王及先已薨外亦不應有三十餘人實録甚誤賢妃開封人邢氏祥符人朝請郎瓊女也日将午父老邀上皇不及道逢燕王俣越王偲哭而邀之燕王泣曰金人欲之将安所避民曰願與王俱死若何開封尹永嘉徐秉哲捕斬為首者益兵衛上皇岀南薫門左副元帥宗維令其禮部侍郎劉思易御服靖康忠臣第二番語錄云二月六日金人令蕭慶劉思脱二帝龍袍李若水擁抱徽宗王履擁抱淵聖令不得脫按上皇岀京在蕭慶宣詔之次日時若水等已被囚語録誤也王履事迹云履隨行翰林司兵士鄭福歸云當月初六日讀了金人詔尼瑪哈令蕭太師劉尚書脱二帝龍衣是時觀察抱定少帝令蕃人不得近前此得其實但誤以兩事為一日耳今畧刪潤令不牴牾靖康要録云上皇初到青城尼瑪哈阿里布坐于端誠殿上皇東向尼瑪哈南向阿里布西向聞上皇玉音甚厲汝稱先皇帝有大造于宋反是我有大造于汝也若大遼伐我當所甘心汝去年興師吾傳位與嗣君遂割地犒軍汝等乃還今興兵稱嗣君失信汝等曽記誓書否汝不自言乃蕭慶王汭等教汝曹為之可呼蕭慶等来與我面證吾豈畏一死二帥皆無言蕭慶等亦皆不岀少頃上皇起行東廊見上扶上皇號泣乆之上皇謂上曰汝若聽老夫之言不遭今日之禍盖上皇初欲與帝岀幸何㮚苦諌乃止此所云諸書皆無之今且附見初敵遣幵儔邀上皇岀并取諸王留守孫傅欲匿不遣幵示以真定府路走馬承受宦者鄧述等所供名字乃盡發焉獨恭福帝姬才周晬不為敵所知與賢徳懿行大長帝姬淑慎長帝姬不與遣燕越王神宗子二帝姬仁宗哲宗女也廣平郡王􅚃年十六給使何義奉􅚃及乳母隠民間後數日敵檄徐秉哲取之􅚃遂不免此據汴都記及何烈草史二書皆稱韓國公而無名臣謹按四朝國史韓國公􅚃靖康元年封廣平郡王盖進封月日淺故都人但以韓國呼之耳草史又云公與阿保同日被害則恐不然按靖康皇族數似是紹興十二年太母南歸日隨行内侍所具云廣平郡王見在足明􅚃未嘗為金人所害也今不取瓊開封人自卒伍補官屢平河北山東諸盗金人入犯瓊以所部援京師因留不去至是遽為敵用是日同知樞宻院事孫傅率文武百寮僧道耆老為畫一状詣軍前云准大金皇帝指揮傅等聞命震越義當即死然念世被本朝徳澤至深至厚嗣君皇帝親政才及朞年恭儉憂勤無所不至遽䝉廢絶實非臣子所敢聞知謹忍死陳詞上干台聽一太上皇已下不敢有違令㫖見起發赴軍前同伸􅈤告一嗣君即位以來並無失徳惟是失信一事上累譴訶盖緣觀政之初為謀臣所誤繼已盡行竄責顯是嗣君悔悟前失非有它心一嗣君在東宫即有徳譽比既即位中外歸仰今若未加廢絶尚可以嵗修臣事之儀如抛降金銀表叚之數雖日下未能數足将来下外路取索分嵗貢納實為大金無窮之利若一旦廢棄遂同匹夫雖有報恩之心何緣自効一伏詳来㫖令别擇賢人以主茲土許汴都人民随主遷居具見仁慈存恤之至據今中外異姓實未有堪充選舉者若倉卒冊立四方必不伏從緣此兵連禍結卒無休息之期非所以上副元帥愛惜生靈之意一今日之事生殺予奪全在元帥雖大金皇帝詔有廢立然将在軍君命有所不受則閫外之事元帥可専行一汴京兩經根索公私所有各已罄竭顯見将來難以立國乞班師之後退守偏方以備藩屏如䝉大恩特許嗣君已廢復立所有稱呼位號一聽指揮敵不報傅又自為状云伏覩詔書宜擇賢人立為藩屏竊見國主自在東宫恭儉著聞若欲選擇賢人必無出其右者兼本國自太祖皇帝以來累世並無失徳惟上皇信聽姦臣國主年幼新立為大臣所誤以致違盟失信上干國典伏望元帥許其自新復主社稷以責後效再念趙氏祖宗徳澤在民未冺或未允從前􅈤亦望哀憫許于國主子弟中擇一賢者立之或不欲立上皇之子乞於神宗皇帝二子中選擇建立使得北面永為藩屏非惟不滅趙氏亦使一國生靈䝉被恩澤永有依歸又不報戊辰吴幵莫儔復以檄來督舉異姓孫傅等以状荅曰本國将相多是日前誤國之人将帥率敗亡之餘其它臣僚悉皆碌碌若舉于草澤之間亦非聞望素著人心必不歸向孰肯推戴兼趙氏徳澤在人至厚若别立異姓城中立生變亂非所以稱皇帝及元帥府愛惜生靈之意若自元帥府選立趙氏一人不惟恩澤有歸城中及外方立便安帖或天命改卜歴數有歸即非本國臣民所敢預議乞自元帥府推擇金人報書曰自昔運數既衰必有繼興者若言敗亡之世必無可繼則三王之後迄至于今安有君臣之道人倫之序何不詳道理之深也今垂諭丁寕而輙言及趙氏雖不㤀舊其違命之罪亦已深矣此後不宜更復若此如或必欲元帥府推擇則在軍皆北地漢兒既舉北人與混一無異若欲推擇見在軍前南官亦請具姓名申報惟不許何㮚李若水預此議如或在京内外俱難自舉各具名銜管依元帥府所舉推戴状申書中所謂在軍前南官盖屬張邦昌也元帥府劄子據文武臣僚軍民僧道耆老中大夫孫樞宻等状申事已洞悉朝廷所以廢趙氏者豈徒然哉以不守信誓不務聽命也非天命改卜豈有如比之甚哉皇上猶以寛度别立賢人而已真可謂大義矣今垂諭丁寕而輙言及趙氏雖不忘舊其違命之罪亦已深矣此後不宜更復若此又状申前日将相多是罪廢敗亡之餘其他臣僚皆碌碌無聞若舉于草澤之間孰肯推戴者夫運數既衰亦必有繼興者若言敗亡之世必無可繼則三王之後迄至于今安有君臣之道人倫之序何不詳道理之深也再請恭依已降聖旨早舉堪為人主者一人當依己去劄子施行如或必欲元帥府推擇縁㑹驗在軍前皆係北地漢兒若舉北人即與混一無異實違所降聖旨若欲推擇南人其見在軍前南人亦樞宻等之所共知也未審果有可舉者否若果有則請具姓名見示亦與依應惟不許何㮚李若水等預此議如或在内及外俱難自舉仍請諸官各叙名銜連署速具管依元帥府所舉推戴状申天㑹五年二月八日初南壁統制官吴革聞上皇已岀入白孫傅請力留皇后皇太子至是引見革頓首請太子堅避以固國本傅許諾且問策焉革為畫計乃于啓聖院置局名賑濟所募士就食一日之間至者萬計革隂以軍法部勒且告急于王及在外諸大臣約日大舉實錄革附傳云上皇后妃盡出革入白孫傅請留太子明日引見而三國謀謨錄載之此月庚午按上皇以丁卯出南薫門革在南壁不應三日後乃入白孫傅録誤也今移附戊辰取光禄少卿范寅敷等四人赴軍前寅敷致虛子也是日上皇在青城自製發願文祈天請命諭景王杞曰適來宻詞罪己損夀以全趙氏自登位之後過失甚多敢不自陳以回天譴杞頓首稱贊此據王若冲北狩行錄曹勛所進聞見錄亦有之己巳内前揭示長榜坐金人檄書及孫傅等議状都人始知欲立異姓相顧號絶孫𫝊復為百官軍民状遺金人云本國趙氏祖宗徳澤在人日乆今来渝盟失信止是上皇與前主其子及支属並不干預尚冀恩造更賜詳酌庶得中外帖然不致生事若不容𫝊等死請必欲推擇異姓自中及外委無其人兼實難于自舉伏乞元帥府推擇敢不一聽台命傅又與張叔夜别具状云伏以前主皇帝違犯盟約既已屈服服而舍之全在元帥不然則有監國太子自前主傳命岀郊以來鎮撫軍民上下帖然或許就立以從人望若不容傅等申臣子之情改立異姓天下之人必不服從四方英雄必至雲擾生靈塗炭卒未得安傅等自知此言罪在不赦然念有宋祖宗以來徳澤在人於今九世天下之人雖匹夫匹婦未忍㤀之况傅等世食君禄方主辱臣死之時上為祖宗下為生靈茍有可言不敢愛死時在京士民郭鐸等亦詣善利門以状白金帥云上雖失信其於天下萬姓畧無過失若立異姓恐民心無統姦雄竊發望元帥垂天地之恩復立今上以主此土若元帥以失信廢之則監國太子肅王景王皆有賢徳人所共知乞賜選擇不報庚午孫傅復為状遺金人乞軫䘏趙氏存全社稷許國主歸國降號稱藩或立監國太子以從人望或選立趙氏近屬使本國生靈有主中外安帖以全大國弔伐之義傅等今在南薫門拜泣俟命遂率百官父老集門下號泣數刻吏部尚書王時雍獨不預是日右副元帥宗傑親至左副元帥宗維營中共議軍民告立趙氏事宗維不許吴幵莫儔復至督舉異姓催取皇族甚峻金檄畧云若謂廢舊立新衆難服從緣向因推戴尚可今依聖旨擇賢共立孰云不可又云行府于在京官僚未諳可否但想目下為首管勾者必是可舉欲立本官幵儔云尼瑪哈大怒明日二事不了即舉兵入城遂㑹百官議侍從已下乞致仕者四十人時兵部尚書吕好問在禁中亦乞致仕孫傅謂好問曰尚書畏死耶傅以執政留守當死軍前尚書世受國恩當任興復之責好問乃止時雍仁夀人也張叔夜為状遺金人云奉令旨令立見今為首管事之人緣本官非衆所推乞自元帥府于嗣子或趙氏支属擇立一人所貴恩歸元帥府永為藩輔而趙氏宗廟尚得血食此據叔夜家傳淵聖皇帝以手劄付徐秉哲云我以失徳為金人所廢公可彈壓京師毋使喧撓反為我累上劄據丁特起泣血錄吴幵莫儔所賫元帥府劄子云吴承旨回賫文武百官軍民僧道耆老孫樞宻等状二道并初七日状二道備已洞悉右勘㑹朝廷詔旨丁寕務在恤民今来堅執迷惑累日祈請復立趙氏甚不應理若謂廢舊立新果難服從縁推戴尚可何况遵依聖詔擇賢共立孰謂不可兼早有文字惟貴道徳不限名位髙卑本欲利民今諸官軍民僧道耆老既乞行府選擇行府于在京官僚未諳可否但想在京目下為首管勾者必是可舉所以行府欲立本官請在京文武百官軍民僧道耆老照㑹此意若所指在京目下為首管勾官員可以共立早具本官名銜状申如亦未可即依已去文字須得共薦一人限不過今月十一日状申趙氏支属不過今日發遣岀城如此度不見舉薦及不發遣必當别有悔吝無得有違天㑹五年二月十日又大金元帥府牒今月十日右副元帥親到左副元帥麾下共議宋人告請復立趙氏事至晚到本營方有善利門下軍員送到汴京軍民僧道耆老郭鐸等告乞立趙氏文状并孫樞宻等今月七日八日九日三次共五道録白為言此事已經共議差官入京湏得别行薦舉外善利門下人員以輒受文状嚴切懲戒訖慮在京人猶以投状為詞别致住滯今請在京諸官孫樞宻等照㑹依吴承旨莫學士等賫去文字日限施行不得住滯城之始破也行門指揮使蒋宣李福率衆叩祥曦殿請扈駕突圍以岀何㮚恐其為亂執而殺之及是帝命賜其家各三百縑以旌忠義辛未監國皇太子諶出詣敵營初留守孫傅議以五千金匿太子于民間殺状類太子者送之紿以都人遮留誤擊太子居五日無肯當之者統制官吴革請以所募士㣲服潰圍以出傅不從時金以淵聖皇帝手劄諭傳上皇亦劄云尚頼元帥寛仁使我父子團聚速令太子出來此據丁特起泣血録始幵儔督脅不已傅未聽至是事益急傅在皇城司其子来省傅叱之曰吾已分死國矣汝曹速去勿亂人意其子亦曰大人以身徇國某尚何言哉范瓊恐變生先以危言讋衞士是晩以兵衛皇后太子共約一車中詣敵營此據丁特起泣血錄從車凡十兩百官軍民奔隨號哭太學諸生擁拜車前哭聲振天時已薄暮将近門猶聞車中呼云百姓救我金人在門下者廹行此據宣和錄傅言於人曰上䝉塵託孤于傅豈可自脱分付與人請從太子徃死生以之遂以留守事付王時雍而岀守門人不許是夕傅留宿門下靖康野錄初上以太子監國孫傅為留守及金人邀太子岀人皆望傅以死節傅與張叔夜但送至門而已繼而又取傅及家属人以是非傅不能守節而自取辱與史不同今不取吏部尚書王時雍等請立張邦昌以治國事初金人定立邦昌然未顯然言之也至是趣百官議立異姓不即屠城時雍在皇城司令中書舍人李㑹預為議状曰自古受命之主必上膺圖籙下有勲徳在民今本國臣僚如孫傅等被用日淺率皆駑下迷誤趙氏至亡國在内官僚委無其人乞於軍前選命某人以治國事時幵儔微言金有立邦昌意時雍疑未定左司員外郎依政宋齊愈適自外至時雍問以敵意所主齊愈取片紙書張邦昌三字示之與所傳同此據欽宗實錄與張栻私記不同趙甡之中興遺史有齊愈欵状甚詳雖當時置對之詞不無鍜錬然栻所記似以為齊愈告鄉人于道而為李綱所中則亦恐不盡然餘見七月癸卯注時雍遂以邦昌姓名入議状付幵儔以出獨張叔夜不可實錄云是日不書議状惟孫傅張叔夜按此時傅已解留守事在南薫門故王時雍得主其議𫝊不但不書状而已壬申傅叔夜坐堅違詔㫖告立趙氏押赴軍前叔夜至敵營抗論如初不少屈敵拘之沈良靖康遺錄云孫傅既遣皇族為尼瑪哈召至青城令見舊主上見謂曰無煩重相公斷送我一門家眷傅無對而退趙甡之遺史云張叔夜赴軍前尼瑪哈召叔夜紿之曰孫傅不立異姓已殺之公年老大家族繁盛豈可與孫傅同死邪可供状叔夜曰累世荷國厚恩誓與國家俱存亡實不願立異姓廹之數四終不從唯請死而已金人皆義之敵散檄城中令軍民共舉張邦昌連名申上有異議者令别具状惟不許引惹趙氏有敢逗遛當按軍法夜幵儔復入城留守司據今月十二日吴承旨莫内翰自軍前来賫到大金元帥府指揮請疾速勾集在内大小官員不限己未共議并僧道耆老軍官等更乞說諭商議如並舉張邦昌即便連署各于本銜親書其名背後名下押字仍於年月紙縫用在上官印限十三日申上便與冊立入京如别有異見别具状申只不許引惹趙氏若舉賢人者亦許不阻有敢違留不赴議所者當按軍令是夜三鼓御史䑓告報文武百官不限大小使臣雖致仕在京宫觀僧道耆老軍民等限十三日絶早並赴宣徳門集議内有官員不来具状申元帥府依軍法無許住滯右録二月十二日夜元帥府指揮在前今暁示各令知悉癸酉王時雍行留守事揭榜通衢云金人許推擇趙氏賢者集百官秘書省共議何烈靖康草史云范瓊詐言金許立哲宗之後陳王子為君按哲宗無後而上之兄吴榮王秘嘗封陳王有奕其子也今附見既至即閉省門環以兵令范瓊以舉邦昌事説諭軍民皆唯唯而退有太學生對曰某等所見意殆不然瓊慮軍民視效即抗聲折之時雍恐百官不肯書乃先自書以率之百官亦随以書于是文武數百人以大巻相授若州縣胥吏書卯歴者畧無留滯不終朝而畢其間亦有飲泣悲吁而不敢出辭者忽下坐一朝士面目嚴冷者厲聲曰二百年趙氏天下豈可付它姓吾乃異議者請如所令其右汴士大慟曰吾請同行時雍詰之自列名氏曰奉直大夫冦庠朝請郎髙世彬庠山東人世彬瓊裔孫也此據夏少曽朝野僉言及孫偉跋靖康野史修入監察御史馬伸言于衆曰吾曹職為争臣豈可坐視不吐一辭當共入議状乞存趙氏中丞秦檜以為然即具單状曰檜身為禁從職當臺諌荷國厚恩甚愧無報今大金擁重兵臨已㧞之城操生殺之柄必欲易姓檜盡死以辨非特忠其主也且明兩國之利害耳趙氏自祖宗以至嗣君百七十餘載頃緣姦臣敗盟結怨鄰國謀臣失計誤主䘮師遂至生靈被禍京都失守皇帝至躬出郊求和於軍前兩元帥既允其議已布聞中外矣且空竭帑藏居民之所積追取鑾輿御服之所用割兩河之地恭為臣子今乃變易前議人臣安忍畏死而不論哉且宋之于中國號令一統綿地數萬里徳澤加於百姓前古未有興亡之命雖在天有數焉可以一城而决廢立哉昔西漢絶于新室而光武乃興東漢絶于曹氏而劉備王蜀唐為朱温簒奪李克用猶推其世序而繼之盖繼世之乆徳澤在人者深基業雖陵遲英雄猶畏而不敢窺其位古所謂基廣則難傾根深則難㧞之謂也晋武帝因宣景之權以竊魏之神器徳澤在人者淺加以惠帝昏亂五王争柄自相戮害故劉淵石勒得以據中原猶頼王導溫嶠輩輔翼元皇江左之盛踰于西京石晉欺天罔人交結外邦以簒其主得之以契丹失之亦以契丹况少主失徳任用非人曽無徳澤以及黎庶特舉中國藩籬之地以賂戎人天下其何思之哉此契丹所以能滅晉也宋有天下九世比隆漢唐竊觀今日計議之士多前日大遼亡國之臣畫䇿定計所以必滅宋者非忠于大金也特假威以報怨耳頃上皇誤聽姦臣因李良嗣父兄之怨滅契丹盟好之國乃有今日之難然則因人之怨以滅人之國者其禍可勝言哉彼必曰滅宋之䇿在絶兩河懐舊之思除鄰國復仇之志而已又曰大金兵威無敵天下中國之民可指麾而定大金果能滅宋兩河懐舊之思亦不能亡如其不能徒使宗屬賢徳之士倡義天下竭國力以北向則兩河之民将去金而歸宋矣且天生南北之國方域至異也晉為契丹所滅周世宗復定三闗是為晉報恨然則今日豈必趙氏然後復仇哉中國英雄亦将復中國之恨矣又况禍莫大于滅人國昔秦滅六國而六國滅之苻堅滅燕而燕滅之頃童貫蔡攸貪土以奉主欲營私而㤀國計屯兵境上欲滅遼取燕雲之地方是時也契丹之使交馳接境祈請于前為貫攸之計者當從其請為國逺慮乃欲邀功以兼人之地遂貽患今日雖焚尸戮族又何益哉今元帥威震中原功髙在昔乃欲用離間之論而矜一己之功其為國計亦云失矣貫攸之為可不鑑哉自古兵之强者固不足恃大金自去嵗問罪中國入境征戰已踰嵗矣然所攻必克者無他以大金乆習兵革中國承平百年士卒罕練将帥未得其人也使異日士卒精練若唐藩鎮之兵将相得人若唐肅代之臣大金能必其勝負哉且世之興亡必以有徳而代無徳以有道而易無道然後皇天祐之四海歸之若張邦昌者在上皇時附㑹權幸之臣共為蠧國之政今日社稷傾危生民塗炭雖非一人所致亦邦昌為之力也天下之人方疾若仇讎若付以土地使主人民四方英豪必共起而誅之終不足以為大金屏翰矣如必立邦昌則京師之民可服而天下之民不可服京師之宗子可滅而天下之宗子不可滅也檜不顧斧鉞之誅戮族之患為元帥言兩朝之利害望稽攷古今深鑑忠言復嗣君之位以安四方之民非特大宋䝉福實大金萬世之利也王明清揮麈後錄云秦㑹之靖康末議状乃馬先覺建議㑹之不答少焉藁就呼䑓吏連名書之㑹之既為臺長則當列為首㑹之猶豫先覺率同僚合辭力請㑹之不得已始肯書名所以秦氏藏本猶云檜等也紹興中先覺甥何珫上其藁㑹之大怒竄珫嶺外此叚實毁檜太甚按珫錄檜獨具單状而首詞云某身為禁從職典臺諫則必非連名也後錄又云姚宏嘗託張澄從秦㑹之求官秦云廷暉與某靖康末俱在䑓上書尼瑪哈乞存趙氏拉其連銜持牘去經夕復見歸竟不僉名此老純直非狡猾者聞皆宏之謀也繇是薄其為人宏曰不然先人當日固書名矣今世所傳秦所上書與向來者大不同更易其語用此誑人以僕嘗見之所以見忌語泄宏坐事死獄中按此又與何珫所云不同然當時金人獨取秦檜而不及姚馬則未嘗連名可知或者馬伸嘗慫惥之今畧修潤令不抵牾明清揮麈第三錄載檜議状全文乃孫傅第三状明清誤也檜為議状已即稱疾守本官職致仕檜致任實錄不書按日歴紹興元年檜乞奏薦状云靖康二年二月十三日准告依前朝請郎守御史中丞致仕壬申十三日也今増入始百官既集祠部員外郎喻汝礪聞舉邦昌事捫其膝曰不能為賊臣屈遂掛衣冠去於是監察御史吴給御史䑓檢法官王庭秀皆致仕而秘書省校書郎胡寅太常寺主簿張浚開封府司儀曹事趙鼎相率逃太學中以避亂故皆不書議状伸給須城人汝礪仁夀人庭秀鄞縣人寅崇安人右文殿修撰安國子浚咸子咸綿竹人已見紹聖元年九月鼎聞喜人也堂吏張僅自秘書省歸取平生所受告牒悉焚之遂自為布衣此据孫偉䟦靖康野記金人索南班宗室開封誤遣朝議大夫将之敵曰所取宗室無大夫名将之曰我魏王後也将之魏悼王廷美五世孫莫儔謂左副元帥宗維曰第取玉牒即見實數户部侍郎邵溥在南薫門下與宗正少卿黄哲共議貯以陶器坎而藏之紿以為亂兵所焚繇是踈屬獲免此據溥哲墓碑參潤増入實錄二月癸酉令人於宗正寺取玉牒溥指名取南班宗室自二王宮以近屬及官序髙者先取而中興㑹要乃云宗藩慶系錄仙源積慶圖等四書皆于初渡江時失之則是玉牒果為所留也王明清揮麈後錄云秦檜嘗對方滋言二帥謂捜索宗室未有盡者莫儔獻計乞取玉牒其中有名者盡行捜括檜在旁曰尚書誤矣譬如人家宗族不少有雖號同姓而情好極疎者平時富貴既不與共一旦禍患乃欲與之均恐無此理尼瑪哈曰中丞言是由此異待之按取玉牒之日檜尚未岀城此説誤也或是三月庚子再取宗室時姑附此竢考溥雍孫雍共城人元豐康節處士哲華陽人也時睦親宅嗣濮王仲理廣親宅保寕軍節度使克暢親賢宅晉康郡王孝騫棣華宅永寕郡王有恭已下舉宗北徙惟睢雒二都宗室得全仲理襄王宗愈子克暢魏悼王孫孝騫吴榮王子有恭楚榮憲王子也于是太祖後宗子益踈無至節度使者甲戌幵儔賫金牒㨿文武百官申乞立張相治國事己申本國册立為皇帝訖令取册寳及一行册命禮數乙亥金人取秦檜及太學生三十人博士正錄十員趙甡之遺史金人取太學生博通經術者三十人人給三百千俾治装太學生投状願徃者百餘人比至軍前金人謂之曰金國不要汝等作大義䇿論各要汝等陳鄉土方略利害諸生有川人閩浙人者各争持紙筆陳山川險易古人攻戰據取之由以獻又妄指倡女為妻要取詣軍前後金人覺其茍賤復退者六十餘人士之無守有如此者沈良遺錄曰金人初取太學三十人正録皆懼乃私誘學中素無亷恥者以充數即日岀城其齎糧並為賊所奪髠之中路皆裸體逃歸賊亦縱而不追二説不同今並附見何㮚已下随駕在軍前人並取家屬初統制官吴革既募兵後遷居同文館附者至數萬人多兩河驍悍之士又引太學諸生吴銖朱夢説徐偉等數十人與􅄁謀議革率衞士殺妻子以圖迎二帝沈良靖康遺錄上命孫傅留守宻諭慮有不測當以後事付卿可置力士司召募敢勇必死之士得三萬人擁上皇太子潰圍南去我從金人之命死生以之後傅止募得二百餘人知事不集乃止按吴革白傅募士在帝已行之後恐良得于傳聞非其實也三國謀謨録云革日夜宻謀迎立大元帥按此時二帝尚在城外安得便立元帥實錄云遣人告急于康王約擁兵近城圖迎二帝革附傳所書當得其實今從之欲奉九廟神主以從軍先誅范瓊等數十人乃分兵突出十八門期用三月八日舉事與謀者惟兵部尚書吕好問監察御史馬伸張所奉議郎致仕吴給等數人好問欲遣人持書詣王訪得邢煥女弟之夫閤門宣贊舍人蒋師愈又與門下省錄事張思聰謀募効用李進縋城以蠟書來上進行至開徳府守臣顯謨閣直學士王棣疑之進以實告乃遣人伴送至帥府夢説桐廬人政和末嘗上書直諫士論推之所益都人棣雱子也雱安石子元豐龍圖閣直學士丙子金人遣曹少監郭少傅同開封尹徐秉哲治事先是京師事務皆取禀軍前故也敵又索内藏元豐大觀庫簿籍悉取寳貨及大内諸庫龍徳兩宫珍寳竒物如西海夜珠王中正陳摶燒金之類其它真珠美玉珊瑚瑪碯琉璃花犀玳瑁之属各以千計上皇平時好玩有司所不能知者内侍王仍輩曲奉金帥指其所在而取之真珠水晶繡簾珠翠歩障紅牙火櫃龍麝沉香樂器犀玉彫鏤屏榻古書珍畫絡繹於路此據宣和錄及夏少曽朝野僉言宣和録又云金人入内徑取諸庫真珠四百二十三斤玉六百二十三斤珊瑚六百斤碼碯一千二百斤北珠四十斤西海夜珠一百三十箇硃砂二萬九千斤水晶一萬五千斤花犀二萬一千八百四十斤象牙一千四百六十坐龍腦一百二十斤金磚一百四十葉王先生燒金陳摶燒金髙麗進奉生金甲金頭盔各六副金鞁金馬杓金杵刀金作子四百二十五副玉作子六百副花犀帶金帶金束帶玉束帶鍍金帶金魚袋等上皇閤分金錢四十貫銀錢八十貫皇帝閤分金錢二十貫銀錢四十貫皇后閤分金錢十一貫銀錢二十二貫銀火爐一百二十隻金火爐四隻金桌子百二十隻銀交椅二十隻金合大小四十隻金水桶四隻金盤盞八百副金注碗二十副金銀匙筯不記數金湯瓶二十隻琉璃盞一千二百隻琉璃托子一千二百隻珊瑚托子四百隻碼碯托子一千二百隻真珠扇子四百合紅扇一百合藍扇一百合行鸞扇三百五十合大扇六十合扇車一百量二帥左右姬侍各數百皆秀曼光麗紫幘金束帯為飾它将亦不下數十人壁中珍寳山積初李若水既為金所囚蕭慶謂若水曰事已爾無可奈何徒死無益前日公雖詈國相國相初無過公意若今日順從即明日得美官若水歎曰天無二日若水寕有二主哉其從𨽻謝寕亦勉之曰侍郎父母春秋髙兄弟衆仰侍郎以生若少屈萬一得復歸若水叱曰忠臣事君有死無二吾今不復顧家矣雖然吾親老汝若歸勿遽言恐重傷吾親意令兄弟輩徐言吾死國也是日左副元帥宗維引若水諭意若水不聽囚之戊寅王以京師乆無耗檄諸将帥伺其實若敵未有去意即引兵近畿副元帥宗澤見之謂諸将曰敵情如此豈忍坐視乎時范訥趙野合兵屯南京遣使臣趙哲獻書帥府哲将家子有膽略以百騎分三隊道與金人三四戰獲數級奪金人馬三匹以獻王大悦都監康履面責哲不當王叱退之野軍自大名亂後尤無紀律日出剽掠甚於敵騎澤遺書誚野訥及知興仁府曽楙使率所部勤王野等以為狂不答知泗州朝請大夫賈公望見經制使翁彦國切責之曰京城報甚惡天子日夜望中丞救援今留此不進豈欲反邪泗小壘錢糧俱竭自來日更不供公宜斬公望以謝軍第恐朝廷他日未遽貸公爾彦國慚翼日提兵趨淮西而去公望昌朝孫也昌朝真定人慶歴中宰相金人取詳通經教徳行僧數十人待遇頗厚庚辰王發東平府王在東平踰月京城音問不通副元帥汪伯彦等共議移屯濟州以竢敵隙王從之是日副元帥宗澤自澶淵移軍南華縣先是澤約諸帥㑹兵五旬無一人至者澤奮願擊敵引諸将共議都統制陳淬曰敵方熾未可輕舉澤怒将斬之諸将羅拜乞貸淬效死㑹元帥府檄至澤乃引兵屯南華境上謂淬曰汝當先諸将一行以贖前日之過淬曰願盡力遂進兵未十里與敵遇岀敵不意敗之即據南華縣是時澶濮濟單曹亳陳潁應天廣濟諸郡皆有勤王兵敵又犯亳州直秘閣京畿轉運副使兼江淮發運副使向子諲遣使臣持書遺金人以㑹合勤王兵馬所為名大畧言兵勢逆順令退保河外敵遽以亳宋等州守禦所牒報之約日索戰諸道兵畏縮不進子諲敏中元孫也敏中開封人咸平中宰相辛巳尚書吏部侍郎李若水為金人所殺時左副元帥宗維再召若水問以不肯立異姓状若水言主上仁孝恭儉未有過失豈可輕議廢立宗維曰趙皇失信使南北生靈如此安得為無過若水知敵不可以義動即曰若以失信為過則公乃失信之尤者乃歴數其五事且曰汝伐人之國不務安全生民徒掠金帛子女以自豐汝滅亡不乆矣因肆罵不已宗維大怒即圜丘下敲殺之若水将死監刑者復問侍郎服未乎若水奮詈愈切敵怒以刄裂頥斷舌然後殺之梟其首此據若水逸事金人相謂曰大遼之破死義者以十數今南朝惟李侍郎一人咸歎重之初若水之岀使也淵聖皇帝擢監左藏西庫修武郎王履為之副使還遷相州觀察使履抗敵不回卒與俱死履開封人累世右職元符末坐上書入籍編管新州若水死年三十五中興贈若水觀文殿學士後諡忠愍贈履武勝軍節度使按履事迹甚偉而實錄乃無一字及之殊不可暁今以履事跡及靖康忠臣三畨語錄修入實録附傳若水臨死為歌詩卒章云矯首問天兮天卒不言忠臣效死兮死亦何愆履事迹乃以為履所賦今且附此竢考金主遣諸軍都部署英宗廟諱同音補按原書避嫌名今仍存舊注尚書左僕射權簽書樞宻院事韓正持冊來立張邦昌要盟錄有册文云尚書左僕射韓某而不言其名王明清揮麈後錄云具官韓昉按昉本燕人事遼為知制誥庚戌年七月冊劉豫為副使猶居此官此時無緣已為僕射實録劉韐附傳云金命其尚書僕射韓正館韐即此人也今増入金遣吴幵莫儔集百官於皇城司議遷都之地衆以揚州江寕為請敵命都江寕壬午鄜延經略使張深引軍屯陜府先是宣撫使范致虛欲聚兵為長驅河洛之計深不敢戰乃議各圖進取互為聲援使彼罔測且戰且前庶有先到國門者議乆不决深遂行翌日熙河經畧使王倚環慶經畧使王似西道副總管孫昭逺皆來㑹癸未金令百官拜表請立張邦昌光禄大夫中太一宫使唐恪既書議状仰藥死實錄恪附傳云恪聞議立異姓呼其諸子謂曰吾為大臣而國家至此顧力不能救獨有死耳乃仰藥自殺其後張邦昌攝位朝士貴賤多拱手臣之獨恪先事而死識者推其節王偁東都事畧云恪既書名乃仰藥死二書不同按議立邦昌在此月癸酉恪以前宰相居城中若不書名金人無不詰難之理又無由經十有餘日尚不書議状也夏少曽僉言曰羣臣于秘書省議推戴張邦昌恪大慟一少年斥恪曰公為丞相不能為國家計事以至於此况平時鬻賣官爵習蔡京不法所為猶厚顔赴議舉異姓實負國家哭之何益据此則恪亦在議中未嘗先事而死明矣汴都記曰是時金人正取人恪以前宰相恐不免遂服大黄作腹疾以死王明清揮麈後錄云金立張邦昌欽叟書名畢仰藥而殂建炎中張逹明為中司適欽叟家陳乞贈典逹明言欽叟不能抗敵之命雖死不足褒贈由是恩數盡寝迄今不能理也明清所云差詳但小舛誤紹興日歴二年十一月乙亥唐恪男瑑進状先臣恪任觀文殿學士中太一宫使以臣僚上言任少宰日不合許割三鎮事落職乞依赦追復有旨唐恪追復觀文殿學士丁丑中書舍人胡松年奏瑑陳請其父不獲伸迎請二聖之謀乃飲藥以死聖恩或謂累經赦宥特與復職臣不敢輕議若曰嘉其死節臣願詔有司更加詳考實状詔前降復職指揮更不施行明清所云誤以松年為張澂也實錄附傳云觀文殿大學士唐恪薨仍前不書落職事此不惟踈畧當必有故是日王次濟州時元帥府官軍及羣盗來歸者凡八萬人自黄河以南分地而屯濟州萬九千五百人以為王之衞𨽻都統制楊惟忠開徳府萬九千人濮州七千人以拒敵之在衞南韋城臨濮者並𨽻副元帥宗澤興仁府萬九千人廣濟軍八千人單州六千人栢林鎮三千人以拒敵之在考城者並𨽻節制軍馬黄濳善大凡官軍民兵六萬四千五百人孔彦威常謹丁順三盗萬五千人分屯六州而向子諲在宿何志同在許趙野范訥在宋趙子崧在陳皆圍遶京都未得進甲申金人取太學錄黄豐楊愿赴軍前二人托疾得免愿山陽人也敵游騎五百至濮州雷澤境上尉向拱禦之拱勇而有謀先培繩桑下敵至挑戰已而偽遁敵追奔馬絓而止悉擒斬之元帥府以拱為閤門祗候乙酉大風㧞木户部尚書梅執禮禮部侍郎陳知質刑部侍郎程振給事中安扶為金人所殺初金人括金銀急命執禮等八人董之未㡬執禮等議曰敵所以留車駕者為金銀也今欲足元數雖銅鐵亦不給不如結罪申絶塞其所請宦者謂金人曰試許士庶以金銀易米麥當有岀者已而果然二帥大怒是晩召執禮等四人責以金銀不足曰胡不賦之于民四人同辭對曰今天子䝉塵臣民皆願前死雖肝腦不計也于金繒何有哉顧誠亡以塞責敵大怒問官長安在欲加以罪而置其餘振恐執禮坐之遽前曰皆官長也敵不勝其忿先取其副侍御史胡舜陟殿中侍御史胡唐老監察御史姚舜明王俣各杖之百㡬死執禮等猶為之請命既而遣還至南薫門有呼于後者曰尚書且止有元帥台令四人皆下馬跪聽命則以次敲殺之梟其首趙甡之遺史稱胡唐老遂死盖誤也乃下令曰根括官已正典刑金銀或尚未足當縱兵自索執禮浦江人振樂平人扶燾子燾開封人元祐知樞宻院事舜陟績溪人舜明嵊縣人俣宛邱人也後贈執禮資政殿學士知質振端明殿學士自城破至此凡再納金二十一萬兩銀七百十四萬兩表叚一百萬匹皆有畸敵猶以為少故殺之朝野僉言二月二十八日大金以金銀事執梅執禮陳知質程振安復殺之監察御史黎確等知四人之由将欲結兵以救二聖曽與王時雍等議時雍不從金人欲正其罪恐動衆心故以金銀事殺之若謂金銀少自有四壁根括官執禮副留守非其職也按實錄金銀官八人執禮為首此所云誤若四人果有結兵救二聖之事本傳及墓誌無容不書記事者得于傳聞又誤以安扶為安復也今並不取是日再括金銀留守司差官百員分坊巷徧加根檢左諌議大夫洪芻等分詣懿親蕃衍宅諸妃嬪位所至與宫人飲又頗匿餘金以自奉吏部員外郎王及之至沂王府遂坐蕃衍宅門罵諸王此据李綱記上語修入八月戊午行遣芻南昌人也丙戌陜西宣撫使范致虛以勤王兵至陜府初致虛抵華隂京西轉運副使劉汲遺書勸以一軍自蒲中趨河陽焚敵積聚絶河橋一軍自陜洛直抵鄭許與諸道連衡敵必解散致虛以書謝汲遂行此據晁公遡所作汲傳附入但公遡稱致虛按兵華隂汲以書誚責云云致虛以書謝而終亦不行則非也其實致虛鋭意出師但以無謀致敗今畧修潤之時南道副總管髙公純奉詔勤王頓兵不進汲誚責再三不聽乃取其所部兵馳入援汲丹稜人嘗為開封府刑曹掾介直有守至是稍擢用之丁亥資政殿學士知中山府陳亨伯為歩将沙振所殺初金左監軍完顔昌圍中山府亨伯冒圍入城固守踰半年敵不能下至是呼總管使盡括城中兵擊賊以衆寡不敵辭斬以狥復呼振使徃振素有勇名亦固辭亨伯固遣之振懼潜衷刅入府有妾好定按宋史陳遘列傳妾名定奴者責其不待報振立斬之遂害亨伯于堂中次子錫與僕妾十七人皆被禍振出帳下卒噪而前曰大敵臨城安得殺吾父執而捽裂之身首無餘趙甡之遺史金人以上皇北狩至中山府其帥陳遘登城上皇呼遘遘曰道君皇帝也遂慟哭曰陛下何得至此提轄沙振曰此中豈有道君皇帝必金人之詐也以箭射之遂鼓衆喧閙而殺遘其子錫在旁側身䕶遘乃并殺之于是振自守中山按此時道君未離城下安得過中山若然則亨伯死不在此時史與甡之必有一誤臣修此錄凡繫月日者必以國史為斷但此時河北已隔絶史臣亦是得之傳聞容有差互以未有他書考證姑附見此後城破敵見其尸曰南朝忠臣也斂而葬諸鐡柱寺中興贈特進諡曰愍節昌金穆宗英格子達蘭也按紹興講和錄有金人復取河南詔曰姦臣昌等稔心旤逆玩冦欺君請歸侵疆務繼絶世自姦臣伏罪迹厥攸行外侮内連情状甚著又一詔云撻懶等力言齊為不道既衰矣不若以河南地錫與大宋以此知撻懶即昌也昌于旻晟為從父弟故名皆連日字耳楊割洪皓記聞作楊哥今從苖耀神麓記史愿亡遼錄撻懶或作撻辣今從金人詔本楊割廟號穆宗此據洪皓記聞所云張棣圖經云楊割廟號神祖疑是後来所改今附此竢考按英格逹蘭名今改正姑存原註戊子金令百官作勸進張邦昌表禮部員外郎吴懋當草表因稱疾求罷汪藻撰懋墓誌云為禮部員外郎㑹金立張邦昌法當郎草牋奏公度不可拒将引繩自裁有幸非常者儳曰僕請為之公由是獲免而王時雍用事坐政事堂公發憤罵時雍曰反賊吾不能擊汝如叚秀實耶時雍面頸發赤不能對公因以疾求罷不聽遂稱疾篤于家時執政已下咸有勸進文此據實錄然是時執政馮澥曺輔前執政路允廸皆在金營城中前執政惟李回一人當考軍噐監王紹獨曰念之乆矣何不亟為因探懐出表以示衆衆皆切齒懋晉陵人也於是吴幵莫儔賫司農少卿胡思所改定在京百官勸請状詣敵營其辭畧曰伏惟太宰相公名髙今古學通天人位冠冢司身兼衆美伏望以蒼生為憂而不以細行自飭以機政為慮而不以固避自嫌上體大金擇立存撫之意下副國人推戴為主之望幵等至二帥遣知樞宻院事漢軍都統制劉彦宗禮部侍郎劉思兵部尚書應奉御前文字髙慶裔持詣邦昌邦昌呵責彦宗又罵城中百官因不食金不聽使人守之百官勸請状金人暁諭諸路節文中有之見四月庚申注檄文但云具官劉侍中而無其名按邦昌上王書稱忽劉彦宗等賫城中文字與吴幵莫儔俱至故知劉侍中即彦宗也胡思改勸請状有案牘今㕘考修正耿延禧中興記云張邦昌至城外金諭以欲立之意邦昌求死不從曰康王軍中有文臣耿南仲武臣劉光世必竭力輔之趙氏必中興立邦昌徒取誅滅于是金人于圍城中取臣南仲家属并劉光世諸妾子之在城中者皆質金營按是時将相之家多為金所取未必因邦昌之言兼劉光世自延安引兵東岀此時猶未至崤澠間三月十五日西兵方至潼闗邦昌僣已乆矣當是金索劉延慶家屬而及光世諸子也况南仲非金所嚴憚張邦昌何用言之今不取元帥府以隨軍轉運使梁揚祖總領措置財用初王在濟州軍食不繼揚祖言京城圍乆鹽法不通權印賣東北鹽鈔王許之未踰月商人入納至百餘萬緡軍餉遂給逮元帥府結局乃止汪伯彦中興日歴云王移軍東平梁揚祖軍錢糧有後至者大元帥既行大名尹張慤截留弗恤揚祖移文屢索不報逮聞王将即位乃變易輕賫以還揚祖具禀王王發笑按慤以公忠名恐未必有此或别有曲折當考是日延寕宫火元祐孟皇后徒歩岀居相國寺前之私第此据回天録后去年閏月己卯自瑶華宫移延寕先是淵聖皇帝與李若水議更張弊政乃尊后為元祐皇太后已草詔書未及行也事見去年十二月乙丑至是六宫有位號者皆從二帝北徙惟后以廢得存朱勝非秀水閒居錄云二聖皇族皆詣敵營中議亦取后淵聖意邦昌必不能乆僣欲留孟后以為興復基本因遣人入城取物紙尾批廋語與府尹徐秉哲云趙氏注孟子可相度分付㑹金人以后廢乆無預時事故不復取按金取宗族皆據管宫閤内侍所供名字后實以廢處外宫故不為敵所指名未必欲取而復止也沈良靖康錄云上皇岀宫數日有手帖至開封府尹徐秉哲云欲得趙氏注孟子煩為送至及火發秉哲遽至延寕宫太后已岀良所謂上皇手帖恐其詞必有悮汴都記云太后居道宫三十年瑶華遺火之後在延寕宫今春又火是日太后脱身何所都人亦不知其無恙故皆得遺臣謹按靖康之變舉族北遷而元祐太后與康邸獨存盖天意也故詳著之庚寅吴幵莫儔來報邦昌來日入城以觀人情仍告語城中萬一有不虞盡行屠戮於是治尚書令㕔及西府以待之建炎以來繫年要録巻二
