body:
  text: 建炎以来繫年要録巻二十二宋李心傳撰建炎三年夏四月戊申朔宰相朱勝非等言臣等三月二十九日請召苖傅劉正彦等到都堂諭以今國家多事干戈未弭當急防秋之計睿聖皇帝冝還尊位總攬萬機苗傅等一皆聽従太后詔曰吾近以睿聖皇帝授位元子請同聽政國家艱難義不得辭朝夕不遑亟欲還政今覽所奏甚契吾心可依所請勝非乃率百官上第一表請上還宫詔不允辰刻百官詣睿聖宫新除尚書工部侍郎王世修以戎服見時將賜世修金帯而内帑無有宰相乃遣吏假于戸部尚書孫覿而以錢七百千償之太后内出札子與上曰今日朔日宜入見禁中上奏曰臣疾作卑體不安己奉表起居容臣望日趨詣太后又詔曰嗣君冲㓜強敵未寧事尤急於防秋理難安於垂箔臣僚􅈤請不可重違冝復御朝以安中外百官再上奏上荅以太后垂簾當共圖國事不然不敢獨當太后詔許之百官三表畢時己巳刻上始御殿百官起居上猶未肯入内勝非再請遂就西廊搢笏掖上乗馬還行宫都人夾道焚香衆情大恱熊克小歴載上還内在三月丁未蓋誤朱勝非閑居録云三十日上還宫按是月無三十日其實四月一日也上及太后同御前殿垂簾下詔曰朕顧徳弗類遭時多艱永惟責躬避位之因專為講好息民之計今露章狎至復辟為期朕惟東朝有垂簾保佑之勞元子有踐阼纂承之託太后宜上尊號曰隆祐皇太后嗣君宜立為皇太子所有三月六日赦書應干恩賞等事令有司疾速施行敢有稽違重寘典憲朱勝非閑居録云初二日捲簾上獨斷如故余留身奏曰復辟之功盡出太后宜有尊崇上曰如何余曰宜尊為皇太后皇子亦合有恩禮宜立為皇太子次日俱有詔如所請按日歴及諸書皆云初一日加皇太后尊號初四捲簾與朱勝非所記全不同或是勝非在睿聖宫先奏閑居録誤記也中興聖政龜鑑曰方苗劉之猖獗也杜鵑之詩聞者傷心投䑕之舉勢不可亟其事至難處也在内則有朱勝非李邴鄭㲄以正大之理折其鋒在外則有張俊韓世忠劉光世勤王之師挫其銳取日虞淵洗光咸池二凶以三月癸未至四月戊申反正凡二十六日而平葢張忠獻倡義之功居多焉中書侍郎王孝廸罷為資政殿學士提舉西京嵩山崇福宫孝廸始除執政使金不辭而至上復辟遂罷之按孝廸與盧益召使在十日戊子益力辭罷祠在壬寅時苗劉尚在朝也此則以反正後罷時事各異並不牴牾右文殿修撰提舉杭州洞霄宫張忞復為中書舍人是日吕頥浩張浚次秀州韓世忠以下出郊迓之具言傅等用意姦回當益為備頥浩謂諸將曰國家艱危君父廢辱一行將佐力圖興復今幸已反正而賊猶握兵居内包藏姦謀事若不濟必反以惡名加我諸公勉之漢翟義唐徐敬業之事可為戒也臧梓勤王記云頥浩至秀州問韓世忠等曰與賊對壘能知賊無它虞乎對曰彼怙勢恃衆脅取鐵劵自謂不死無有他虞又問曰我師可以必勝乎曰以衆敵寡以順討逆可以必勝頥浩曰知彼知己可以戰矣按此與復辟記所云世忠之語全不同疑臧梓所書有所潤色其後趙雄撰世忠碑又引而載之今不取夜有刺客至浚所浚見而問之客曰僕河北人粗讀書知逆順豈為賊用顧為備不嚴恐有後来者浚下執其手問以姓名不告而去翊日浚取郡囚當死者詭言刺客斬以徇己酉上與太后垂簾聽政初太后即欲撤簾日髙猶不出御筆令朱勝非陳請勝非言當先降詔於是暫出御殿后曰官家既還内吾便不當出勝非欽賛遂詔以四日撤簾此㨿勝非閑居録修入録稱今日下詔来日捲簾而捲簾乃在兩日後或是遲二兇出城亦未可知當考尚書省言親事官李寳負太祖皇帝神主至𤓰洲為金人所驅遂致遺失詔㳂路州軍㝷訪收到人補官此㨿日歴㑹要未知後何如御營使司都統制苗傅為淮西制置使副都統制劉正彦副之詔將帥非出師臨陣毋得用重刑即軍士罪至死者申樞宻院取㫖朝奉郎主管西京嵩山崇福宫李光試侍御史徽州進士汪訓義上䟽請皇帝聽政詔閤門引見上殿初上既復辟有徽士數人共議欲上書請上聽政或曰已復辟矣奈何更欲上書或曰復辟聽政或是二事有何不可訓義曰請来日謀之衆皆諾訓義夜竊其藁旦詣匭投之上召對而訓義為人庸鄙上欲招致讜言乃命為廸功郎充御營使司准備差遣此㨿趙甡之遺史修入甡之稱訓義紹興二十二年卒于濠州推官當得其實是日馮康國至秀州庚戌詔復用建炎年號熊克小歴載此㫖於初一日盖因朱勝非閑居録所記也日歴在初三日其實初二日進呈初三日降出爾勝非記此事自四月以後大率差一日盖三月小盡而勝非誤以為大盡記之是以排日差互宰執朱勝非等言臣等備位政府當三月五日之變義當即死所以隠忍偷生至今正欲力圖今日之事始終委曲陛下究知所有三月五日以後應政事差除等乞令有司條具取㫖従之日歴載此奏在初四日朱勝非閑居録云初二日余出劄子乞將三月初五日已後四月初一日已前應朝廷行事並取索看詳可行者存之不可行者罷之可疑者推治之上曰俟如卿所請批㫖行下至晚二兇来見三更後人馬出盡㨿此乃初三日事今移附此日於是勝非與顔岐張澂路允廸皆乞罷上不許上因論勤王事勝非曰勤王兵不為無助但欲令作聲援儻進兵交戰則禍變叵測矣如論臣寮利害則在城中者甚危而難為功在城外者甚安而易取名􅊾云當與天下共誅之此雖大義然事若至此雖誅何救度諸人朝夕必来臣則去矣望陛下試以此意諭之御筆張浚除中大夫知樞宻院事浚時年三十三國朝執政自㓂凖以後未有如浚之年少者熊克小歴浚除命在壬子按浚自撰復辟記云初三日奉聖㫖除浚知樞宻院事今従之武當軍節度使淮西制置使苗傅起復武成軍節度使淮西制置副使劉正彦並加檢校少保許以所部行又以直龍圖閣張逵為淮南西路轉運判官俾給其軍食傅欲請王世修為參議朱勝非曰世修今従官矣豈可復従軍傅乃止中書舎人兼權直學士院張守為御史中丞以朱勝非言其嘗與聞復辟議論也日歴守之除在庚戌按朱勝非閑居録乃在初五日壬子然閑居録云奉御筆張浚知樞宻院張守御史中丞則二人之除同在初三日勝非誤記也工部尚書兼侍講王綯兼直學士院給事中李㑹試尚書兵部侍郎國子祭酒詹乂為龍圗閣直學士提舉萬夀觀兼侍講應天尹孟庾充顯謨閣待制㝷召庾赴行在以直徽猷閣京畿路提㸃刑獄公事凌唐佐為應天尹庾鄄城人唐佐休寕人也唐佐宣和中嘗為司門貟外郎坐阿附盛章斥去至是朝廷湔濯用之是日吕頥浩張浚次臨平苗翊馬柔吉以重兵負山阻河為陣扵中流植木為鹿角以梗行舟翊以旗招世忠兵出戰始世忠以劉寳軍非所部乃悉收其家屬詣軍將戰世忠艤家屬舟于岸下率將士當前力戰張俊次之劉光世又次之軍小却世忠叱其將馬彦溥揮兵以進塗濘騎不得騁世忠下馬持矛突前令其將士曰今日各以死報國若面不帶㡬箭者必斬之頥浩在中軍被甲立水次出入行伍間督戰翊等敗走傅正彦遣兵援之不䏻進朱勝非閑居録云四月初三日赴朝上曰昨暮城上望見郊外水際有舟船火炬朕遣人縋城探之乃韓世忠下先鋒陳思恭船泊水中不敢近岸去人問之但云苗統制去也未勤王兵乃如此余日勤王兵不為無助只要它作聲援如遣馮康國来及拘留小使之類皆是儻進兵至城下必交戰勝負果未可知設使戰勝二凶必生姦謀以保䕶為名分守両宫勤王兵雖勝如何措手初四日午間報韓世忠下將佐陳思恭孫世詢等至皆以塵土䝉面破裂衣裳亦有面頰封藥如金瘡者州人指笑曰舟行未嘗有塵不曽戰鬬何故傷損按勝非所云皆以貶損張浚之功恐非其實王廷秀閲世錄亦云三日聞韓将軍至臨平為二兇設伏掩殺足明勝非所云皆私意也今不取朱勝非命諸將集兵皇城門外城中震恐知杭州康允之謂勝非不若使人諭二兇令速引兵去朱勝非閑居録云四月初一日奏二兇欲除淮南制置使命下即遣人說諭云勤王兵馬朝夕必来朝見恐手作人住閙須是速行但得離此百里正其罪以討之上曰待喚来敦遣余曰極善頥浩等進兵北闗傅正彦見上請設盟誓兩不相害此㨿趙甡之遺史上賜金勞遣傅正彦退詣都堂趣賜鐡劵勝非命所屬檢詳故事如法製造是夕傅正彦引精兵二千人開湧金門以出命其徒所在縦火遇大雨火不䏻起遂遁夜尚書省檄諸道捕傅等世忠俊光世馳入城至行宫門世忠欲入其下張介曰不可雖聞二賊已去尚未可知閽者以聞上歩至宫門握世忠手慟哭光世俊繼至並見于内殿上嘉勞乆之中興遺史閲世録並云世忠等初四日入城臧梓勤王記云光世世忠後夜馳入見上于禁中盖三將初三夜先入城而大軍初四早乃入也朱勝非閑居録云初四日午間報韓世忠下將佐陳思恭孫世詢等皆奔趨禁門欲直入衛士呵止遂大毆擊而入唱言曰韓太尉使来拆簾徑至殿門呌呼不已上大驚遣人引至殿庭望殿上無簾慚怍而退恐未必果爾今不取辛亥皇太后撤簾吕頥浩張浚引勤王兵入城都人夾道聳觀咸以手加額頥浩浚與諸將見勝非于殿廬因求對閤門白故事無與宰執同對者勝非曰吕樞宻固可随班然亦須先降㫖免見餘人則不知也此據勝非閑居録修入按張浚先已除知院不知何故乃不得随班或者所降㫖無日下供職之文故浚未得立本班也但録以為初五日事盖誤俄有㫖頥浩隨班餘人别作一班二府奏事畢頥浩出劄子乞取索改年以後事朝廷㸔詳上曰已有㫖勝非顧曰昨得㫖令三月五日以後事皆㸔詳不但改年後也班退勝非留身乞罷上曰何必堅去勝非曰國家厄㑹君與相當之以陛下聖徳尚避位二十餘日臣實何人豈可茍安相職上曰卿言有理朕更思之勝非頓首謝頥浩浚既見上遂召趙哲李迨楊可輔辛道宗李承造王圭等俱對上特召浚至禁中謂曰隆祐皇太后知卿忠義欲一識卿面適垂簾見卿自庭下過矣浚皇恐謝上欲倚浚為相浚辭以晚進不敢當是日平㓂左將軍韓世忠手執工部侍郎王世修以屬吏并拘其妻子詔制置使劉光世鞫其始謀以聞朱勝非閑居録云諸將擅殺工部侍郎王世修及中軍都制官吴湛皆畧其家今不取也苗傅犯富陽縣遣統制官喬仲福追擊之壬子上初御殿受朝知樞宻院事張浚等言逆臣苗傅劉正彦引兵遁走乞行下諸州生擒傅正彦者白身除觀察使不願就者賞錢十萬緡斬首者依此捕獲王鈞甫馬柔吉張逵苗瑀苗翊並轉七官其餘一行官兵將校並與放罪一切不問仍多降黄榜暁諭従之日歴捕斬傅等賞格在三日庚戍降黄榜在五日壬子按賞格内稱已擒到王世修則必非初三日也日歴盖誤今移附五日詔前日皇太子嗣位赦文内優賞諸軍改作復辟優賞餘不行資政殿學士提舉中太一宫兼侍讀葉夢得提舉西京嵩山崇福宫是日執政奏事畢朱勝非再留身乞罷上未許勝非曰臣若不去人必以為有所壅蔽臣去之後公議乃見上問可代者勝非曰以時事言之須吕頥浩張浚上曰二人孰優勝非曰頥浩練事而麤暴浚喜事而踈淺上曰俱輕浚太少年勝非曰臣向自蘇州被召軍旅錢榖悉以付浚後来勤王所事力皆出於此此舉浚實主之勝非拜辭將退上曰即今更押卿赴都堂令劉光世韓世忠張俊等皆參堂以正朝廷之體勝非曰臣聞唐李晟平朱泚之亂奏云謹已肅清宫禁祗奉寢園當時㓂汙宫禁晟擊出之故云肅清今陛下還宫已數日將士直突呼呌入至殿門誠為不知理道此據勝非閑居録刪修勝非所録又云初五日留身上曰卿拜相方三日事變遽作賴卿之力二十五日而事平以卿平難之謀用圖恢復必有所濟又曰朕與卿相知今暫聽卿去然孰可繼卿者余曰以時事言之須吕頥浩張浚上曰以謂勤王有功邪城中安静數日方至余曰嘗奏外援不為無助不必先到城下若以二人作相諸將必喜又曰陛下若以浚為年少且除近上執政官將退上曰卿到堂少待令吕頥浩張浚劉光世韓世忠張俊皆參堂以正朝廷之體面前日將佐直撞入内毆打衞士叫呼無禮皆不知理道此風不可長也按浚初三日已除知樞宻院事勝非留身在後両日乃方云且除近上執政官恐誤疑勝非所云不在此日又勝非載上語多訾諸人之功它書皆無之今並削去又云上令吕頥浩張浚皆參堂按此時頥浩浚已在樞府無縁仍令參堂今削二人姓名庶不牴牾勝非退見光世已下于都堂世忠曰金人固難敵若苗傅但有少許漢児何足畏者勝非曰請太尉速追討毋令過江於是御史中丞張守亦論勝非等不能思患預防致賊猖獗乞罷政䟽留中不出癸丑尚書右僕射兼中書侍郎兼御營使朱勝非罷為觀文殿大學士知洪州從所請也制畧曰亟持詔節趣秉國鈞夫何信宿之間乃爾震驚之遽深惟菲徳退避别宫甫再踰旬即復大位雖援兵之交至亦秘䇿之允臧工部尚書兼直學士院王綯所草也勝非在相位凡三十三日勝非既罷乃以苗傅等申請朝廷不曽施行者十八紙繳奏翌日上賜手詔嘉勞改知平江府勝非以平江廵幸所過遂力辭資政殿學士太中大夫同簽書樞宻院事吕頥浩特遷宣奉大夫守尚書右僕射兼中書侍郎兼御營使頥浩遷五官用朱勝非例門下侍郎顔岐尚書右丞張澂並罷為資政殿學士岐提舉南京鴻慶宫澂知江州兼江東湖北制置使澂執政纔四十六日張澂兼江湖制置日歴不書此㨿季陵外制集増入資政殿學士簽書樞宻院事路允廸仍舊職提舉醴泉觀兼侍讀端明殿學士同簽書樞宻院事李邴守尚書右丞端明殿學士簽書樞宻院事鄭㲄進簽書樞宻院事殿中侍御史王廷秀言錢塘非駐蹕地請進幸江寕監察御史陳戩奉詔審鞫王世修于軍中世修言苗傅等疾閹官恣横及聞王淵為樞宻愈不平乃與世修等謀先伏兵斬淵繼殺内官然後領兵伏闕脅天子禪位此皆始謀實情戩以聞詔斬世修于市苗傅犯桐廬縣甲寅檢校太保奉國軍節度使殿前都指揮使御營使司提舉一行事務都廵檢制置使劉光世為太尉御營副使先是御營副使皆以執政為之比光世還朝上議擢光世樞筦既而改命光世及韓世忠張俊除命日歴於庚戌甲寅兩書之今附此日光世行述云時上面授光世簽書樞宻院事光世力辭起復定國軍承宣使帶御器械鄜延路馬歩軍總管御營平㓂左將軍韓世忠為武勝軍節度使充御營左軍都統制寕武軍承宣使帶御器械秦鳯路馬歩軍副總管御營前軍統制張俊為鎮西軍節度使充御營右軍都統制秘閣修撰知平江府湯東野充徽猷閣待制朝奉大夫知常州周把充右文殿修撰自餘將佐咸進官二等張浚言廸功郎吕摭自城中以䗶書陳二兇反狀進士吕擢掌文字有勞得㫖摭改京秩擢命以官始王淵識韓世忠於微時待之絶等至是世忠為請地厚葬經紀其家不遺餘力乆之詔贈淵開府儀同三司而康履亦贈官諡榮節淵死年五十三淵乾道初賜謚襄閔斬御營中軍統制官權主管侍衛歩軍司公事吴湛初上以湛佐二叛為逆諭韓世忠使圖之世忠曰此易與耳時湛已不自安嚴兵為備世忠詣湛與語手折其中指遂執以出門下兵衛驚擾世忠按劒叱之無敢動者詔戮湛於市以統制官辛永宗為帶御器械充御營使司中軍統制權主管殿前司公事王允按史作元責英州左言責賀州並安置殿中侍御史王廷秀入對論徽猷閣待制知杭州康允之直秘閣兩浙轉運副使劉䝉吏部員外郎范仲熊金部員外郎兼兩浙路提舉市舶公事吴說之罪上曰范仲熊恐不如是對曰臣不知其它但在宣和末進用實出梁師成門下時廷秀論仲熊以為與二兇締暱五日之事仲熊實與聞故上不信既而張浚為之百拜力請乃詔允之䝉奪所除職說免官而仲熊除名桞州編管此事日歴全不載今以王廷秀閲世録参修范仲熊行遣據紹興二年九月二十四日刑部檢舉状増入廷秀又言浙西安撫司主管機宜文字時希孟之罪上怒甚欲梟首執政救觧之乃除名吉陽軍編管而通判杭州章誼遷二官始議反正拱衛大夫利州觀察使樞宻都承㫖馬擴亦往来其間至是以擴為觀望停其官永州居住杭州兵馬鈐轄張永載坐朋附兇邪除名瓊州編管永載事見三月丁未武功大夫永州團練使兩浙路兵馬都監鄭大年責授汝州團練副使英州安置言者論二兇屯兵湖州之小林傅等無縁知此徑路盖大年召之故有是命此事日歴不書今以四年十月癸酉紹興三年正月甲申大年復官改正狀附入乙卯赦天下舉行仁宗法度録用元祐黨籍即嘉祐法有與元豐不同者賞格聽從重條約聽從寛係石刻黨人並給還元官職及合得恩澤應諸路上供木炭油䗶之類有困民力非急用之物者並罷天下民庻許置弓弩技精者保試推恩既而刑部侍郎商守拙言一司一路一州一縣及在京海行與嘉祐所不該載如免役重録茶鹽香礬六曹通用等合依見行條法若事干軍政邉防機宻并修書未成間嘉祐制與見行條法相照而引用窒礙者並取㫖從之此事日歴不載今以會要増入四年六月庚辰對修成書丙辰苗傅至白沙渡所過焚橋梁以遏王師劉光世遣其前軍統制王徳助喬仲福討之丁巳常徳軍承宣使提舉醴泉觀孟忠厚為寕逺軍節度使醴泉觀使先是右司貟外郎黄槩應詔薦朝奉大夫趙鼎鼎謂張浚曰隆祐復辟其功甚大當檢㑹累朝捲簾故事推恩其家浚用其言且薦於上遂以鼎行尚書司勲員外郎鼎已見元年二月命發運使親督糧船赴京師上聞東京軍民乆乏糧食故有是㫖詔自崇寕以来内侍用事循習至今理宜痛革自今内侍不許與主兵官交通假貸饋遺及干預朝政如違並行軍法軍器監葉宗諤直龍圖閣充江淮發運副使苗傅犯夀昌縣所至掠居人黥以為軍戊午龍圖閣直學士知宣州劉珏復為尚書吏部侍郎祕閣修撰江淮等路發運副使葉份試户部侍郎仍提舉車駕廵幸事務右司貟外郎黄槩試兵部侍郎兼御營使司參賛軍事中書舍人周望右文殿修撰胡安國並試給事中安國仍令所居州以禮津遣尚書吏部員外郎李正民守左司員外郎新除左司諫劉寕止守右司貟外郎正民定孫也定江都人元豐御史中丞按二人除命日歴不書此㨿都司題名増入不得其日故附黄槩改除之後户部尚書孫覿為龍圖閣直學士知温州㝷改知平江府時浙西七州盗殘者五惟蘇湖獨存羣盗相傳號平江為金撲滿覿至官召諸大姓諭以禍福使挈其金帛逺徙而藏之一季不如令乃録入官人苦其擾新除尚書吏部侍郎賈安宅罷新除侍御史李光直龍圖閣知宣州光之除日歴不載因劉珏改除附此金國通問使李鄴宋彦通留行在乃以鄴知越州彦通知筠州著此為鄴以越州降金張本日歴彦通以朝議大夫除鄴無前銜按鄴建炎元年自通直郎責為散官不知後来出使除何職越州題名可考季陵外制集有徽猷閣待制宋彦通贈五官制畧云履危而使絶域乃遂生還則是彦通嘗出疆也日歴不書彦通職名不知何故奉議郎通判湖州張燾應詔上䟽大畧謂人主戡定禍亂未有不本於至誠而能有濟者陛下踐阼以来號令之發未足以感人心政事之施未足以慰人望豈非胷中之誠有未修乎又言天下治亂在君子小人用捨而己夫小人之黨日勝則君子之類日退將何以弭亂而圖治乎又言竊觀近措置防守大江之䇿户㸃一丁五丁㸃二使自備糗糧器械而蠲其税賦烏合之衆素不諳戰陣一旦有風塵之警則鳥驚魚潰之不暇尚能安心而用命乎徒費民財又損官賦而不適於用願速罷之又言近日侍從臺諌所言多循習故態觀望意指毛舉細務以塞責至國家大事則坐視而不言豈不負陛下待遇之意又言廵幸所至不免營繕重困民力勾踐之棲㑹稽似不如是不若權時之宜茅茨土堦以俟昇平為之未晚時論以為當是日統制官喬仲福追擊苗傅至梅嶺與戰敗之傅走烏石山己未詔諸路添差官自宗室歸朝官外日下並罷庚申尚書右僕射兼中書侍郎吕頥浩改同中書門下平章事仍兼御營使尚書右丞李邴改參知政事時言者復引司馬光併三省狀請舉行之詔侍從臺諫議御史中丞張守言光之所奏較然可行若便集衆徒為紛紛既而頥浩召從官九人至都堂言委可遵行悉無異論頥浩乃請以尚書左右僕射並同中書門下平章事門下中書侍郎並為參知政事尚書左右丞並减罷自元豐改官制肇建三省凡軍國事中書揆而議之門下審而覆之尚書承而行之三省皆不置官長以左右僕射兼兩省侍郎二相既分班進呈自是首相不復與朝廷議論宣仁后垂簾大臣覺其不便始請三省合班奏事分省治事歴紹聖至崇寜皆不能改議者謂門下相既同進呈公事則不應自駁已行之命是東省之職可廢也及是上納頥浩等言始合三省為一如祖宗之故論者韙之乾道八年二月乙巳又改宰相吕頥浩知樞宻院事張浚言今天下多事乞命庻僚各舉内外官及布衣隠士材堪大用之人擢為輔弼協濟大功詔行在職事官各舉所知以聞權罷秘書省紹興元年二月丙戌復置廢翰林天文局紹興二年正月壬寅復置并宗正寺歸太常紹興三年六月復置少卿五年閏二月辛未復置寺省太府司農寺歸户部紹興二年五月戊午復太府三年十一月庚戌復司農鴻臚光禄寺國子監歸禮部紹興三年六月丁未復國子二十三年二月丙子復光禄二十五年十月庚辰復鴻臚衛尉寺歸兵部後不復置太僕寺歸駕部後不復置少府將作軍器監歸工部紹興三年十一月庚戍復將作軍器二監惟少府監不復皆用軍興併省也秘書少監方誾罷為秘閣修撰知台州其餘丞郎著佐正字十餘人皆為郎出守或奉祠而去於是館學寺監盡廢士人之外召而至者率以尚書郎處之郎選始輕矣减尚書六曹吏自主事至守當官凡四等定為九百二十人吏部七司三百五十九户部五司二百八十八禮部四司五十六兵部四司一百三十五刑部四司六十三工部四司一十九其分案總為一百七十有三苗傅犯衢州守臣胡唐老據城拒之大雨雹城上矢石俱發不克攻遂引去熊克小歴載此事在戊午今從日歴辛酉武泰軍節度使知大宗正事仲綜請自江寜府移司䖍州許之未㡬仲綜薨追封平原郡王直龍圖閣知越州葉煥充秘閣修撰江淮等路發運副使壬戌集英殿修撰提舉杭州洞霄宫滕康試左諫議大夫明受中召康為中書舍人未至而有此命康見上首論頃者日中有黒子又白氣貫日皆灾異之大者當時無人為陛下道此不旋踵而有肘腋竊發之事上感其言謂有諫臣之風不踰月遂擢為執政此據李邴時政記附入當求康全䟽書之癸亥給事中周望為江浙制置使上以二賊未平議遣大將吕頥浩因薦望㑹兵以行望有口辨喜談兵故頥浩引用之尚書户部郎中朱異為江浙隨軍轉運使是日喬仲福王徳至衢州趙雄撰韓世忠碑云王兼程追襲二賊賊方圍三衢聞王師来即觧去按此時世忠猶未受制置之命碑盖誤也丙寅詔諸路靖勝軍並撥𨽻御營右軍都統制張俊日歴載俊奏状乃繫承宣使銜恐是未建節時所上也令兩浙轉運司運封樁米四十萬斛赴江寜府以上將廵幸也苗傅犯常山縣丁卯上發杭州留簽書樞宻院事鄭㲄衛皇太后御營左軍都統制韓世忠請身往討賊以世忠為江浙制置使自衢信追擊之世忠入辭白上曰臣當撲滅二賊未審聖意欲生得之邪或函首以獻也上曰能殺之足矣世忠曰臣誓生致之顯戮都市為宗社刷耻時衛士宋金剛張小眼者號有膂力世忠乞以行欲使䕶俘来上上壮之酌巨觥以餞世忠日歴於丁夘日已書車駕進發杭州幸江寕府命韓世忠為江浙制置使而戊辰日又書車駕幸建康府吕頥浩等乞留韓世忠前去衢信州以来擒捕苗傅按此時未有建康府名盖重疊差誤尚書禮部侍郎衛膚敏未就職卒于秀州戊辰苗傅犯玉山縣庚午詔天下帥臣監司守令采訪寓居文武官有智謀及武官武藝精熟者具名以聞量材録用辛未苗傅屯沙溪鎮統制官喬仲福王徳乗間入信州㑹統制官巨師古自江東討賊還與仲福㑹傅未至信州十里聞官軍在遂還屯於衢信之間初韓世忠喜徳之勇鷙欲使歸其麾下乃令心腹健將陳彦章圖之徳與彦章適㑹于信州同謁郡將彦章進揖徳頗倨彦章怒㧞刃刺徳不中徳奪刃殺之壬申制皇子檢校少保集慶軍節度使魏國公旉立為皇太子以工部尚書王綯為資政殿學士權太子少傅臣僚奏王鈞甫馬柔吉前後用心實非負國望特赦其罪許率其徒自歸仍與旌賞從之時苗傅等衆猶盛勢未可擒言者謂鈞甫柔吉見將赤心隊為先鋒以拒王師請下詔寛二人之罪以誘致其降故有是㫖丙子初定兩省吏額自録事至守當官分五等凡二百三十八人中書省六分門下省四分其分房十有四大凡六房外又有制敕庫及班簿章奏知雜催驅開拆賞功等房而刑房分上下諸吏守闕者百五十人其餘為正額丁丑初定尚書省吏額自都事而下凡二百二十四其間守闕如兩省之數分房十自吏户工刑之外有監印奏鈔知雜開拆等房及制敕庫後又増催驅三省催驅六曹御史刑封樁户營田工等房通舊為十有五是月以太中大夫提舉亳州明道宫梁揚祖為徽猷閣待制充淮東制置使右司貟外郎兼權給事中劉寕止論揚祖怯懦避事且數其父子交結權貴之罪命遂寢初上思内侍卲成章忠直召赴行在其徒忌之乃止之於洪州中興姓氏録云其徒譛之云卲九百来陛下無歡樂矣乃止不召御營平冦前將軍范瓊自夀春渡淮遣騎卒五人之廬州従安撫使胡舜陟責贍軍錢帛舜陟執斬之遣一騎還報諭之曰將軍受命北討今棄而南自為冦吾豈竭生靈膏血以為汝資冝急去不然將厲兵與將軍周旋於城下必盡殺乃止瓊乃去舜陟又檄諸郡勿給其糧瓊遂自光蘄渡江引兵之洪州屯駐熊克小歴載瓊之江西在去冬按沈長卿撰胡舜陟生祠記則瓊過廬州在今年四月克盖誤也淮西安撫司統制劉文舜引衆犯濠州文舜已見二年二月按文舜已受胡舜陟招安不知何以作過守臣連南夫移江寜府未上遣土豪俞孝忠率民兵百五十往拒之將戰孝忠馬還濘而死衆皆奔還文舜引衆至城下南夫出庫帛歛城中金銀以遺之且解所服金帶以授文舜乃得解薛慶據髙郵軍慶初自揚州遁事見二月甲寅與其黨椎埋通泰野澤間後同李在襲取髙郵守之在與其次爭事相殘殺衆乃推慶初金人既還泗州洪澤閘有大小官舟千餘皆不取時淮隂無縣令而縣吏孫晟攝行縣事洪澤閘軍羅成等不伏遂與其徒董青軰率舟船犯淮隂晟避去使人和之先是韓世忠潰于沭陽其後軍將李義者往来於寳應之間有衆數百人相約合軍兵圍楚州成又破漣水軍取綵繒以為帆既而義為卲青所破官軍追殺之成後亦為卲青所并建炎以來繫年要録二十二
