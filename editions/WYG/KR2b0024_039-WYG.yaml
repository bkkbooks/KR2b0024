body:
  text: 建炎以來繫年要録巻三十九宋李心傳撰建炎四年十有一月庚子朔徽猷閣待制宣撫處置使司參賛軍事劉子羽為尚書禮部侍郎以張浚言收復鄜延一路乞除子羽列曹侍郎故也既而臺諫皆言春官高選子羽以幕府軍功得之於事不類乃命進子羽三官子羽改命在是月丁未壬寅輔臣奏事先是王以寧以私書遺張浚桑仲得而上之上因言以寧黨其所知范宗尹曰以寧本李綱所薦上曰二聖朝黨與之大者惟蔡京次即綱也如張浚一心為國極不可得但所用一二狂生為累若責去之乃所以保全浚也宗室秉義郎叔䕯廵轄廬州馬遞為羣盗所逼自稱興德軍承宣使知南外宗正事都大制置使擅補將士官廬州以聞下大理至是獄成詔除名送廣州大宗正司拘管此據刑寺狀修入狀又云為受臧文宣牒逼令稱呼云云不知臧文宣何人也初宣撫處置使張浚遣使臣楊安間行往雲中訪資政殿大學士宇文虛中所在且以其家人書遺之是日安見虛中於南驛翌日虛中以礬書授安使歸報其書曰緩頬不效被囚累年歸望永絶待死而已家有艱勤但告君父勉思忠孝勿負吾心繼此勿用嗣音有損無益江左人錢釗傅昇勿令近行在此乃勾引者安還至汾州為邏者所獲囚之紹興四年七月所書可叅考癸卯詔曰吕公著吕大防范純仁皆盛德元老同居廟堂國勢尊安四裔順服而遭罹貶斥乆歴嵗時尚拘微文未獲昭雪朕經此時廵之乆益知致治之難念兹老臣是宜褒稱三省可撿舉速行褒贈并其餘黨籍臣僚下有司責以近限具名取旨施行初上既數下詔褒録元祐忠賢而朝廷多故有司未暇撿舉及是上諭大臣曰此事議論已久終是行遣未盡内中收得元祐黨碑即降出令録所司一一契勘褒贈遂追封公著魯國公大防宣國公諡正愍純仁許國公皆贈太師公著元祐司空平章軍國事謚正獻黨籍執政第二人追貶昌化軍司户參軍大防元祐左僕射黨籍執政第五人循州安置純仁元祐右僕射黨籍執政第九人永州安置後謚忠宣鄰中興聖政臣留正等曰三人之忠載之信史實冠臣旌三臣之忠則凡一時名列黨籍者咸有光焉雖褒贈之恩未及猶及也况太上皇帝成命亦既有在乎其有未及者舉行於今日亦太上皇帝之志也顯謨閣待制蔡莊落職莊奉祠滿嵗請於朝詔以莊提舉江州太平觀言者論莊乃蔡絛友壻法當論討遂有是命莊先已嘗降旨落職是日建康府路安撫大使吕頤浩復南康軍頤浩既駐軍鄱陽㑹建武軍節度使楊惟忠有兵七千屯州境頤浩請與俱是月朔官軍至都昌縣後三日遂渡江入居南康軍熊克小歴庚子朔遂復南康軍誤也據頤浩所奏復南康軍在十一月初四日分守要害遣統制官巨師古以所部三千七百人救江州是夜賊衆三萬人至南康與官軍鏖戰頤浩及揚惟忠皆失利引兵渡江避之陣於北溪州翌日師古引兵未至江州五十里而營詰朝出戰遇伏為所敗其衆潰去師古奔洪州頤浩乃傳檄王􅊛韓世清㑹兵未敢進按頤浩遣師古以此月丙午其屯五十里以丁未潰去以戊申今牽聫書之甲辰端明殿學士簽書樞密院事趙鼎罷初上欲除神武副軍都統制辛企宗為節度使鼎以企宗非有軍功持不下上不樂詔鼎累乞宫祠可本職提舉臨安府洞霄宫免謝辭鼎既免上欲申前命參知政事謝克家曰企宗非有大功今驟命之是使鼎得名企宗得利而陛下獨負謗於天下後世也上乃止中書舍人李正民試尚書吏部侍郎徽猷閣待制兼侍講陳戩試給事中乙巳權尚書工部侍郎韓肖胄請復天地日月星辰社稷之祀事下太常其後禮寺言自車駕廵幸已來宗廟之祭文雖省而義存則歲所常行者亦當姑存其意而天地社稷之祀不可輟今裁定毎歲孟春上辛祈榖孟夏雩祀季秋及冬日至四祀天夏日至一祀地孟冬上辛祀感生帝立冬後祭神州地祗春秋二社及臘前一日祭太社太稷並於越州天慶觀設位免玉與牲權用酒脯仍依方色奠幣以輔臣為初獻禮官亞終獻宗室奏告並常服行事從之是日偽福國長公主適右監門衛將軍駙馬都尉高世榮以世榮為貴州刺史賜公主銀帛各三千疋兩錢五千緡時調度日繁户部不能辦乃命諸費視故事皆損五之四云丙午秦檜入見初檜發漣水軍寨權軍事丁禩令參議王安道馮由義轉行前二日至行在檜自言殺監已者奔舟來歸朝士多疑之者而宰相范宗尹同知樞密院李回與檜善力薦其忠乃命先見宰執於政事堂翊日引對檜言如欲天下無事湏是南自南北自北遂建議講和且乞上致書左監軍昌求好按宋史繫乙巳日是日通泰鎮撫使岳飛自柴墟鎮渡江金左監軍昌既得楚州有經營南渡之意乃攻張榮鼍潭湖水寨榮初見五月乙丑金人屢攻榮阻湖淖不得進及是天寒水深遂併力攻其茭城榮不能當焚其積聚而去金人進犯泰州飛以秦州不可守棄城去率衆渡江屯江隂軍沙上飛棄泰州據趙甡之遺史在此月癸卯日歴飛奏十一月七日自柴墟鎮渡江七日丙午也故繫於此丁未奉議郎試御史中丞富直柔守本官充端明殿學士簽書樞密院事故事簽樞有以員外郎為之而無三丞為之者中書言非舊典乃特遷朝奉郎自是以為例直柔遷官在是月丙寅朝請郎試御史中丞致仕秦檜試禮部尚書賜銀帛二百疋兩范宗尹等進呈檜所草國書上曰檜朴忠過人朕得之喜而不寐葢聞二帝母后消息而又得一佳士也古者兵交使在其中第難作國書姑令劉光世作私書與之宗尹言檜初歸用乏欲賜銀帛又言檜舊除資政殿學士欲以經筵留之上曰未湏如此且與一事簡尚書檜請以本身合得恩澤授王安道馮由義官尋並改京秩而舟人孫静亦補承信郎始朝廷雖數遣使然但且守且和而專與金人解仇議和蓋自檜始檜初歸見上之語史冊不載今以檜紹興十八年八月癸丑二十三年七月戊戍奏疏中自叙語修入熊克小歴檜除在戊申與日厯異殿中侍御史張延壽試侍御史直秘閣宣撫處置司參議官李允文殺朝奉郎知岳州袁植於鄂州初允文以宣撫使張浚之命守鄂州朝廷因以為安撫使允文先得旨許截留上江綱運招軍軍浸盛范宗尹聞其專恣奏遣高衛代之事見九月乙卯允文不悦乃集諸兵官望闕拜表乞留允文允文遂拒衛不納植聞之邀綱舟不下允文怒直檄植取之植批報曰李節制已承朝命遣官為代其公牒不可施行允文怒未有以發㑹劉忠犯岳州忠以本年十日據白面山植出城避之允文即遣統制官吳錫叚貴等率兵至岳州數其棄城之罪執植以歸送蒲圻獄是日沉於江而殺之以舟覆告遂命錫知岳州朝廷始聞允文擅以馬友守漢陽戊申詔落允文職令還川陜本司供職己酉新除鼎澧辰沅靖州鎮撫使孔彦舟為湖南路兵馬副總管以所部屯潭州上始聞彦舟據長沙故有是命庚戌詔常程事並權住自金人破楚州游騎至江上朝廷震恐乃議放散百司仍結絶三省樞密院文字士民多奔竄者試御史中丞致仕秦檜奏臣昨者迂避江路不歸本鄉徑泛海洋來赴行在止為兩宫安好欲得及時奏禀今來已蒙賜對志願已畢而臣新自敵中脫身來歸理宜投閑長逺事任伏望聖慈許臣依舊守本官致仕詔不允命神武副軍都統制辛企宗以所部討建賊范汝為時汝為已破建陽官軍多失利朝廷以從義郎招之不至乃遣大將焉辛亥兩浙轉運副使曽紆請權増諸路賣酒錢上等毎斛増二千八百下等増千八百從之保義郎劉煥偽刻尚書省印以造告身差劄等事覺當死除名配雷州壬子日南至上率百官遥拜二帝自渡江至是始有此禮詔放散行在百司除侍從臺諫官外吏户祠部大理寺量審官告御馬院禁衛所閤門駞坊御厨皇城通進司左内藏庫省倉𣙜貨務並量留官吏餘令從便寄居候春暖赴行在從政郎權知湖口縣孫咸坐贓抵死三省擬刺靣配連州上謂大臣曰祖宗時贓吏有杖朝堂者黥而特配尚為寛典甲寅端明殿學士提舉臨安府洞霄宫黄裳卒裳劒浦人事上皇為禮部尚書乙卯改樞密院幹辦官為計議官序位在太常博士之下直徽猷閣方孟卿添差兩浙轉運副使專一應副行在大軍錢糧用户部侍郎孟庾請也右正言吳表臣言饒信州南連福建東接温台當敵馬之衝尤宜嚴備自杭至嚴自嚴至婺皆有水陸兩路最係𦂳切去處乞速行措置時已命神武前軍統制王􅊛以本軍屯信上詔以表臣章示之泰寧縣主簿吳明卓特降一資時邵武軍百姓多遷徙出城以避㓂者軍吏丁宗亦以其孥出明卓斬其首下吏當死上薄其罪乃有是命丙辰金左監軍昌䧟泰州時昌有渡江之意欲耕地而守遂親率萬人下蔡州而屯之丁巳知通州朝散大夫吕申棄城走桑仲既還房陵金均房安撫使王彦從間道出兵斷其糧運且求援於張浚浚遣將楊惟直以兵來援是日彦濟師攻自黄水仲奔潰追至白磧斬獲甚衆招降者皆𨽻麾下仲退屯襄陽府房州平浚承制以彦為金均房州鎮撫使戊午右正言吳表臣直秘閣知信州表臣以趙鼎去位乞補外上曰表臣殊不知朕意羣臣之進雖多因大臣薦引至於臺諫朕豈不能辨其賢否而表臣用意黨私朕何賴焉范宗尹曰昨吕頤浩罷相所薦人多被彈擊臣力懇陛下保全之正欲革此也朝散大夫路允廸復龍圗閣學士允廸七月乙丑已復端明不知何時又奪之當考成忠郎權知漣水軍丁禩為閤門祇候知楚州保義郎劉靖為楚州淮陽軍都廵檢使廸功郎王安道馮由義並為承務郎安道簽書楚州由義簽書漣水軍判官㕔公事禩等當是秦檜所薦趙甡之遺史云檜請以本身合得恩澤授安道由義官由是皆補廸功郎與日歴不同或者二人初以禩借文階至是先補正而又改京秩也當求他書參考之武義大夫兼閤門宣贊舍人劉彦知廬州初巨㓂李伸在廬朝廷因以為廬壽鎮撫使伸所為兇恣和州無為軍兵馬鈐轄武翼郎王亨以所部討擒之故命彦代領州事龔相記歴陽死事云水寨得間即出掠敵營執巨㓂李伸獻之闕下伏刑焉他書不見李伸事以史考之建炎四年十一月三日壬寅秉義郎趙叔䕯斷案内一項叔䕯在廬州因李仲保明與蕃人接戰有功人自己用特字可字紹興元年正月十七日乙卯武德大夫權淮西總管知廬州張琦奏朝奉郎牛際可通判本州二月九日丙子廬夀鎮撫使司統制官高彦状本軍元係廬夀鎮撫使李伸下人馬先蒙差在六合縣後來不知本官下落三月十四日辛亥和州鎮撫使趙霖奏夀春府偽皇姪事稱自去年十一月擒獲羣㓂李伸之後道路通行五月十一日趙霖奏新知廬州王亨先統兵在本鎮管下駐劄備見李伸不遵分守恣為兇惡靡所不至奮發忠義生擒賊首李伸肅清淮甸今以前後行遣參考之初見本末霖以王亨獲李伸在十一月故因附此然趙叔䕯與伸事相連而廬州奏叔䕯以去年九月五日甲辰至行在不知所奏即伸或是權州也此事本不必書以伸嘗為鎮撫使欲詳分鎮本末故具著之明年正月甲辰以王亨知廬州當是劉彦辭行史盖未見當考亨東都衛士嘗為張所部曲所奏官之至是以獲伸功稍得進用己未詔崔増人船就聽江州路副都總管楊惟忠節制増既犯太平州不克浙西安撫大使劉光世遣人招之増不從乃泝流而上至魯家口遇邵青舟師出江不及備為所敗増㳂道以擄掠為資所至無遺建康府路安撫大使吕頤浩在饒州以書招之増遂納欵至是至彭澤縣知縣事通直郎楊士明言於朝乃有是命時頤浩參謀官降授朝議大夫劉洪道亦奏遣統領官李貴引所部擊増逐之乃復洪道右文殿修撰洪道復修撰在是月辛酉是日金人䧟通州庚申詔學士兩省講讀官依舊輪日進故事先是量留百司而講筵所不與上特命留之通泰鎮撫使岳飛以失守待罪詔飛赴江隂就糧極力捍禦金人毋得透漏辛酉詔福國長公主毎月科錢増為七百千是日偽齊劉豫改元阜昌豫初僣立止用天㑹之號至是奉金命而改之偽齊録十一月二十二日奉聖旨王者受命必建元以正始近古以來仍紀嘉號以與天下更新乃者即位之初有司請遵舊制朕以大國之好遜避未遑而使命逼臨促立别號以昭受命之元用新我齊民之耳目嘉與諸夏共受天休其以十一月二十三日建元為阜昌元年布告天下咸使聞知偽尚書工部侍郎鄭億年移吏部前知越州李鄴知東平府偽監察御史李儔知單州淮寧鎮撫使馮長寧至偽庭請行什一稅法除尚書户部郎中兼權侍郎紹興三年五月稅成法豫又建歸受館於宿州招延南方士大夫軍民置𣙜揚通南北之貨此非一日事今併書之癸亥禮部尚書秦檜言臣伏聞敵騎宿留江北或傳迤邐渡淮欲往海州度其所長恐未必有肯捨輕騎拏舟南渡然在國家萬全之計毎事不得不備竊見海州入海當由東海縣及淮口丁禩馬臯地分通州入海當由料角及東沙汲域陸戡地分乞下逐處取軍令狀湏管專一探報不得怠慢透漏候得將來平安却與優加褒賞其東沙以西金山錢塘江及秀州平江府江隂軍鎮江建康府對岸去處臣不能盡知乞逐一依東海縣淮口等處施行免致萬一誤事從之日歴今年十一月戊午馬臯差充漣水軍海場今東海廵檢陸戡未知此時為何官當考初議者以為越州三江口係通接海道之所遂命神武右軍遣卒三千戌之至是守臣直秘閣陳汝錫言三江口乃平敞河地中有民居恐戍兵無以存泊兼去城止十八里請俟有警然後遣兵從之尋命以小海舟十艘付軍中為斥堠甲子建康府路安撫大使吕頤浩乞益兵討李成上曰頤浩奮不顧身為國討賊羣臣所不能及但與賊相拒不度彼已容易輕進此其失也今兵既少衂須令且持重急遣王􅊛引兵助之范宗尹曰頤浩意欲更得韓世忠兵為助上曰若遣世忠提全軍往破賊有餘力但敵騎尚在江北未可遽行李回曰成敢擁衆跨江跳梁正倚金人南犯朝廷不能遣發大兵若陛下親御六師移蹕饒信間則成破膽矣上曰朕日夜念此不少置決意須親往俟敵騎稍北遣世忠先行朕繼總兵臨之先以賞招携其衆許歸自新則成必易擒亦不欲多殺士衆也富直柔曰聖斷如此此天下大幸詔諸路守臣並許節制管内軍馬以中書言艱難之際事權太輕緩急無以彈壓故也時所在既募鄉兵往往廹縣道以取錢糧擾平民以要犒設朝廷知之乙丑詔鄉兵並聽守令節制丙寅詔神武前軍統制王􅊛以本部萬人速往吕頤浩軍前策應初祝友既至龔家城而滁河舟船已盡為官司所斂友遣其徒求得餘舟三柂以數千人䕶送出𤓰歩口泝流至馬家渡計置渡江時滁濠鎮撫使劉綱在溧陽友之舟為綱所扼及岸不得登是日友以其舟星散於岸之上下㳂流十餘里綱之兵不及分而友之徒已有得濟者遂畢登屯於薛店縱兵擄掠焉是月宣撫處置使張浚自泰州退軍興州初我兵既潰於富平金人以所得陜西金幣悉歸河東帥府㑹張中孚趙彬送欵於金又知慕容洧叛乃遂引兵而西走秦鳳路馬歩軍副總管吳玠自鳳翔走保大散闗之東和尚原權環慶經畧使孫恂由隴闗入秦與浚㑹金人至渭州得我情實乃入德順軍浚聞敵入德順遂移司興州簿書輜重悉皆焚棄浚之出師也幹辦公事朝請郎楊晟惇力言其不可浚不從晟惇乃求行邊不随幕下及是來見浚浚稍以諸事委之晟惇言金人必欲舉川秦然後歸國不若引兵金洋一帶俟敵騎既去然後收復川陜事乃永定浚雖不用其說然已置陜西於度外矣起復朝議大夫知興元府王庶亦來見浚計事力陳保秦之策衆議不同庶請歸持餘服浚之自邠南歸也將士皆散惟親兵千餘人自随其屬官皆懼有建議當保䕫州者參議官劉子羽曰議者可斬也宣撫司豈可過興州一歩繫闗陜之望安全蜀之心幹辦公事謝昇亦言不當逺去請築青陽潭左右四闗六屯浚以為然乃劾異議者遣子羽單騎至秦州訪諸將所在時敵騎四出道阻不通將士無所歸忽聞子羽在近宣撫司留蜀口乃各引所部來㑹凡十數萬人軍勢復振浚哀死問傷録善咎已人心粗安或謂吳玠宜移屯漢中以保巴蜀玠曰敵不破我詎敢輕進吾堅壁重兵下瞰雍甸敵懼吾乘虛襲其後此保蜀良策也諸將乃服時玠在原軍食不繼鳳翔之民感其遺惠相與夜負芻粟輸之玠亦憐其逺意厚償以銀帛民又益喜敵怒遣兵伏渭南邀而殺之又令保伍相坐犯者皆死而民益冒禁輸之數年然後止中大夫致仕吳㸃卒㸃邵武人與蔡京有舊崇寧初京拜右僕射㸃時為太僕寺丞首求去京不樂終身以郡倅處之淵聖受禪擢知漳州遂再掛冠而卒水賊楊華等乘船至鼎州城下聲言乞招安鎮撫使程昌㝢遣孔目官劉醇持檄以往醇登舟而賊斷其首鼓枻而去羣賊賀潮等數千人自郴州永興進掠衡吉諸縣至茶陵為京西制置司統制官韓京元用所敗遂就招此以紹興元年十月丁夘湖東安撫司所申増入盗王少八掠韶惠州諸縣奉議郎知惠州范漴捕其黨七十餘人誅之後進漴一官此以紹興二年二月甲戍廣東提刑司所奏増入建炎以來繫年要録巻三十九
