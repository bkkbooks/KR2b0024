body:
  text: 建炎以來繋年要錄巻五十一宋李心傳撰紹興二年嵗次壬子金太宗晟天㑹十年偽齊劉豫阜昌三年春正月癸巳朔上在紹興是日從官已下先發以將還浙西也甲午詔自今科塲復置賢良方正能直言極諫科令幹辦内東門司李珂衛茂實提㸃紹興府留住六宫事務徽猷閣待制致仕王昇卒昇建徳人事親至孝建中靖國初以經明行修授官事上皇為明堂司常卒年八十一乙未詔諸路死罪囚應讞者道路已通處依舊法奏案未通處許酌情減降如舊以三省言今道路稍通若令一例減降慮生姦弊故也五年正月壬子復奏案吏中興聖政上語及禁戢􅂍吕頥浩曰􅂍吏侵漁不可不禁然州縣官依條格合得請給宜按月支與使之食足然後可以養廉隅上曰然輔臣因進呈諸路公使庫支給外縣官供給條格詔申明行下臣留正等曰富而後敎聖人之心也衣食足知榮辱衆人之情也今使仰事俯育且不給而欲以刑法敺之於禮義敎化之不克成宜哉太上皇帝將大治􅂍吏則先足其供給誠得事理之序比年以來州郡經費不支屬吏之奉有至數月不給者天下賢人少而庸人多方責其㢘而勢或使之鮮廉誠不可以不察也浙西安撫大使劉光世言諜報金主死尼瑪哈已立劉豫率官僚舉哀見合兵謀取夀春詔江東安撫大使葉夢得和州無為軍鎮撫使趙霖措置防備丙申故奉議郎贈直祕閣楊邦乂加贈朝奉大夫為立祠名褒忠以江東安撫大使葉夢得言其忠節也五年四月再贈承事郎劉默除名特送饒州編管默知天台縣訟守臣晁公為之過范宗尹吕頥浩互庇之公為才免官而默坐違法科敷及饋送過客屬吏至是獄成遂有是命福建江西荆湖宣撫副使韓世忠圍建州先是世忠師行至福州守臣程邁以賊方鋭欲世忠少留以俟元夕世忠笑曰吾以元夕凱旋見公矣師次延平劔潭湍險賊焚橋以拒王師世忠單馬先浮以濟師遂濟距建寧百里許范汝為已伐木埋竹及布鐡蒺藜開陷馬坑以扼諸要路世忠乃偃兵自間道急趍鳳凰山是日旦至城下遂圍之戊戌祕閣修撰知紹興府陳汝錫責授汝州團練副使漳州安置先是手詔因軍期所須索之物令州縣以印榜實數科理毋得多取於民事見元年六月汝錫受詔不行之屬邑侍御史沈與求劾之下臺獄法寺當汝錫私罪杖該恩原免右僕射秦檜惡汝錫特有是命資政殿學士提舉臨安府洞霄宫張守知紹興府宣撫處置使司書寫奏報文字進士張橰為右承務郎橰浚之從子也辛丑昭慈獻烈皇后几筵進發上詣禁中焚香朝散大夫分司西京劉珏卒于梧州熊克小歴珏以提舉太平觀卒按珏此時未落分司閏月丙辰方追復元官訃聞官其二子後又追復龍圖閣學士是日韓世忠收建州初范汝為既被圍固守不下世忠以天橋對樓雲梯火砲等急撃之凡六日賊衆稍怠夜官軍梯而上城遂破賊衆死者萬餘生擒其將張䧺等五百餘人汝為竄回源洞中自焚死其將葉諒以所部犯邵武軍世忠撃斬之餘衆悉平初世忠疑城中人皆附賊欲盡殺之資政殿大學士李綱時在福州見世忠曰建州百姓多無辜世忠受敎及城破世忠令軍人悉駐城上毋得下植旗於城之三隅令士民自相别農者給牛種使耕商賈者弛征禁為賊脅從者汰遣獨取其附賊者誅之由是多所全活及師還父老請祠之世忠曰活爾曹者李相公也壬寅上御舟發紹興神武右軍都統制張俊中軍統制巨師古以其軍從留右軍統制官劉寳收後以吏部侍郎李彌大權知紹興府節制内外軍馬時百司先渡江扈衛者獨執政與給事中直學士院胡交修中書舍人程俱侍御史沈與求而已晚執政登御舟奏事上至錢清堰乗馬而行是日湖東安撫使向子諲自曹成軍中歸藍山縣初成既入道州㑹樞密院遣幹辦官左鼎持詔書諭成俾散遣江淮等路民兵獨與堪出戰人赴行在聽張俊節制其徒為盗久憚俊嚴明不聽命湖廣宣撫使吳敏時在桂州以兵力微未能進新中書舎人胡安國遺書於敏以謂帥臣見執而方伯不能治此方伯之耻不知策將安出願速遣前軍進由昭賀以通舂陵北檄韓京自衡移永東檄吴錫嚴兵宜章而親總中軍急渡嶺而北下臨清湘據三湖上流之地然後詰問曹成擅移屯所與執帥臣之罪就檄子諲赴軍前議事若其悔罪自新則與之招安不然斷而討之勝負可决若復延久必生内變矧迫東作之期民失耕種不待接刄已投於溝壑矣敏然其言而不能用先是宣撫司都統制兼參議馬擴嘗駐軍大名為成所服乃遣小校張布持敏檄諭成成許受招始釋子諲且令准備將魏憲遺擴書略云欲得相公指差一處參謀官范直方曰成不必招可促之使赴行在擴曰彼既不願逺出萬一促之是使散而為亂也不若藉以為用敏不能决擴獻書于敏請提軍親至道州入成軍中撫定分撥選強壯以隸五軍進兵長沙制服馬友正二月中可以就緒不然失此機㑹不惟湖湘重困師老財殫無以善後矣敏弗聽後數日擴為詩獻敏曰未敢此時非趙括已愁他日類田豐遂辭職徑歸融州敏遣騎追之弗及成聞擴去又數日敏祠命亦至成遂復為亂朝廷聞子諲為成所執詔子諲提舉江州太平觀便居以神武副軍都統制岳飛權湖東安撫使將所部往潭州而子諲已出矣子諲得祠在正月乙夘飛權帥事日歴不書今以三月甲午江西安撫大使司奏狀所云増入甲辰上次蕭山縣顧見帷幙華煥問輔臣得無擾民乎輔臣奏聞之縣令劉皥民盡出庫金上曰斂不及民為善丙午上至臨安播芳大全集趙徳莊賀車駕回鑾起居表皇威烜赫方望幸於中原聖孝寅恭暫歸承於清廟民有雲霓之慶師無霜露之勞恭惟皇帝陛下開濟艱雖圖回久大尚勤寳儉來天佑於清躬惡殺好生養國祚之元氣昌期将啟強敵自平時乗六龍淮海風動日闢百里豪傑景從適毖祝以言還因薦勲而飲至格于藝祖聊收虞守之常作我上京終復漢家之舊臣義均國體喜若已功簮槖坐踈雖媿甘泉之從衣冠未挂猶瞻清渭之朝靜曹橘林集代嚴州賀回鑾表大廵六師坐底妖氛之外薄四海欣聆法駕之旋宗社咸安君臣相慶顯祖宗能化本於至誠恭惟皇帝陛下道侔天地功武歸於不殺強鄰自殞靡勞彎撻覧之弓巨冦就屠必有假李兒之手乃眷雲屯之旅方馳月㨗之書往撫爾勞温挾忘寒之纊有激其勇爭揮却暮之戈遂使聞風鶴猶驚晉師固已取鯨鯢而為京觀商政由舊而戎衣大定徐方不回而王曰還歸禁籞生春旂常動色臣職拘守壘躬阻迎鑾朝隨葵影之傾夜喜旄頭之落功成惟斷願獻平淮西之碑復不逾時請詠刻浯溪之頌渠張孝祥于湖集代方務得賀回鑾表靈鋒電掃殱厥魁輿衛天旋格于藝祖神人歡喜華夏奠安始結琬圭之好恭惟皇帝陛下仁配乾坤恩兼南北齊民均蹈於泰和兹親革輅之征乃強敵自干於皇略逮訖鯢鯨之戮亟傳龍駕之歸萬里提封将復漢圖之舊百重陛㦸載新吴㑹之朝臣屬奉清閑獲瞻粹穆邊庭賤守莫陪飲至之觴馳道告行暫止前驅之蹕戊申武功大夫榮州團練使蘇易乞以奉化縣界把截所轉一官於階官上收使許之自政和初改官名以郎大夫易正副使由是武功大夫率徑遷横行至是横行凡數百千人中書舍人程俱力論其不可且謂祖宗之制自閤門副使至内客省使為横行不係磨勘遷轉之列蓋横行職事親近人主恩數多類從官以元豐三年班簿考之横行共二十二人如种諤韓存寳劉昌祚姚麟之徒皆一時名將故元豐官制武臣獨依舊不以寄禄官易之蓋有深意今文臣之為庶官者率不過中大夫而武臣乃遷横行此何理也望自今非軍功勿遷從之熊克小歴載此事於元年九月未實蓋不知其月日故附俱初除舍人之月也日歴自有本月日今從之己酉集英殿修撰知臨安府席益移知衢州從所請也直龍圖閣江淮發運副使宋輝知臨安府臨安府題名正月十八日宋輝自龍圖閣陞秘閣修撰蓋誤輝除秘撰在今年五月乙丑尚書左司郎中姚舜明直龍圖閣充江淮發運副使庚戌詔偽造劵榜人並行軍法時諸軍偽造者多故倉部員外郎成大亨以為請壬子侍御史沈與求遷御史中丞時禁衛寡弱兵權不在朝廷與求言陛下移蹕東南將圖恢復之舉先務之急宜莫如兵漢有南北軍唐自府兵彍騎之法既壞猶内有神策諸衛外有諸鎮之兵上下相維使無偏重之勢其意逺矣今圖大舉而兵權不在朝廷雖有樞密院及三省兵房尚書兵部但奉行文書而已願詔大臣講求利害而舉行之使人情不駭而兵政益修助成經理中興之志熊克小歴於此書與求上屯田集議按屯田集議乃去年上已具本月日初建昌軍石陂寨卒丁喜饒青等為亂聚衆數千人而蘆溪寨土兵楊招與鄉民乗之縱掠喜尋死其徒姚達代領其衆上命徽猷閣待制新知宣州劉洪道督統制官崔邦弼等往捕至是劉洪道請濟師乃詔統制官韓世清自宣州遣兵二千時奉議郎知貴溪縣符建中亦遣舉人劉銳往説諭土兵衆皆聽命詔官其首餘衆分隸信州諸軍癸丑左中大夫知樞密院事宣撫處置使張浚加檢校少保定國軍節度使賞和尚原之㨗也浚初除左通奉大夫未拜故自左中大夫除詔招信縣復隸泗州朝奉郎杜欽智知舒州初李捧既受招其徒路進以所部數千人渡淮而北進犯舒州守臣武節郎李鑄無兵不能守棄城遁知池州王進遣兵撃破之進與其徒遁去居太湖縣之司空山事聞故有是命欽智尋卒江西安撫大使李回以准備將領武經郎武糾代之進尋為糾所殺其黨李通率衆作亂乙夘詔臨安諸門權勿稅柴薪油麵等物丙辰右奉直大夫主管亳州明道宫徐俯試右諌議大夫俯初見建炎元年三月丁酉俯之母黄庭堅從妹也避亂抵昭州上始因閱庭堅文集見其名而胡直孺在經筵稱其行義文采汪藻在翰苑又薦之上賜吕頥浩手詔曰朕比觀黄庭堅集稱道其甥徐俯師川者聞其人在靖康中立節可嘉今致仕已久想不復存可贈右諌議大夫或尚在即以此官召之頥浩奏俯避地廣中乃詔俯文學行義有聞於時除右諌議大夫赴行在俯入朝未數月遂執政或曰内侍鄭諶與俯游於江西重其詩文至是力薦於上御劄史不載王明清云嘗於吕氏見之鄭諶事以趙甡之遺史増入時人多有是言今年二月甲申四年五月甲戍所書可參考詔見任郎官自建炎已來未經上殿者並引對吏部侍郎李光言方艱難之時朝廷廣收人材兼收議論郎官最號髙選其間豈無豪傑之士可備大用乃不令一覲清光廉退之士固難於自進故有是㫖丁巳右司諫方孟卿言近權户部侍郎栁約請推祖宗限田之制凡品官名田數過者科敷一同編户今郡縣之間官户田居其半而占田過數者極少自軍興以來科需與編户一同若以格令免科需則專取於民必致重困臣謂艱難之際士大夫義當體國豈可厚享占田之利又况富商大賈之家多以金帛竄名軍中僥倖補官及假名冒尸規免科需者比比皆是望寢前詔勿行從之約建請在去年十二月丁丑宰相吕頥浩秦檜神武右軍都統制張俊被㫖揀放邵青單徳忠李捧三盗部曲青等有衆二萬三千其疲老不任披帶者皆釋之所存七千而已如上所料中興聖政臣留正等曰世傳漢髙帝豫知吴王濞五十年後必反謂狀有反相可知也至於五十年之説非通於數者不能蓋不然且其知三傑料陳平期周勃之安劉氏此豈數之能及哉大抵帝王之興其睿智絶人太上皇料降卒可用之數妙於蓍龜其張良所謂沛公殆天授者歟皇城司更造入禁衛宫殿皇城門號四等嵗一易之勅入禁衛三千道黄綾八角入殿門二千道黄絹方入宫門八千道黄絹圓入皇城門三千道黄絹長三年十一月壬申更宫門號以緋紅絹方皇城門以緋紅絹圓自後不復易是日宣州火先是閤門宣賛舍人韓世清自淮西以所部五千戍宣城世清招納亡命萬餘嵗費縣官錢十萬緡米十八萬斛朝論恐其為變㑹州人有傅世清軍中欲縱火擄掠民財者逮火作世清往來彈壓城中乃定守臣李彦卿新除刑部郎中未上密遣監稅趙令吉告于朝吕頥浩遂有殺世清之議彦卿尋卒戊午三衙奏定臨安府左右廂廵為百有十五舖用卒六百七十三人三衙及本府兵各居其半二十二年十月己夘又増為百有五十舖資政殿學士提舉萬夀觀兼侍讀王綯提舉臨安府洞霄宫從所請也綯在經筵凡兩嵗力請外祠而有是命詔自今停藏接引私鹽並與犯人一等科罪用浙西提舉茶鹽梁汝嘉請也此以紹興三年三月八日淮東提監郭楫劄子修入己未詔修臨安城之頺圮者以修内司所集湖秀等五州役卒就築之詔商販茶鹽並許經由海道出入以運河阻淺故也庚申詔發運使湯東野往建康收簇江東西路上供嵗額米斛樞密院將領徐文有衆二千餘命神武中軍統制巨師古蒞揀之仍詔文及李捧邵青單徳忠趙延夀等所部兵並專聽樞密院節制辛酉遣入内東頭供奉官睿思殿祗候任源往張浚軍前撫問源請金字牌以招收所過羣盗上許之言者奏自崇寧以來宦官握兵馴致禍變天下之人言之切齒今來源所經去處就使偶有盗賊止當移文所屬措置勿致稽留使命足矣而乃欲以招安自任然則羣盗肯聽之乎又况挾招賊之名開握兵之漸事有㡬微不可不慮乃詔源遇有賊盗將金字牌旂給付守臣招安後㫖在二月庚午左武大夫棣州刺史馬欽特遷横行遥郡二官錄招降邵青之勞也武功大夫忠州團練使楊勍以所部四千屯吉州恣横不法建武軍節度使江西兵馬副總管楊惟忠欲圖之乃與勍叙同姓之歡邀勍㑹飲伏兵誅之遂并其兵尋進惟忠軍職一等勍自建炎中為盗踐蹂福建湖南諸州及是乃敗惟忠以二月辛未除捧日天武四廂都指揮使其誅勍不知在何時今從趙甡之遺史附此月末勍初見建炎四年五月二月癸亥朔詔臨安府近行宫髙阜禁人毋得至其處犯者徒二年以其可以下瞰宫中也甲子詔平江府守臣市賀鑄家所鬻書以實三館丙寅命浙西安撫大使兼淮東宣撫使劉光世將銳卒萬人移屯揚州勸率農桑經理一路時至鎮江視師光世不奉詔詔建州權罷鼔鑄二年以監兵避亂散逸用知漳州綦崈禮請也召泉州草澤陳嗇赴行在直顯謨閣李承造復為兩浙轉運副使專一應副劉光世錢糧以光世言累有機㑹多縁無樁辦錢糧㡬誤大事故也於是轉運副使直龍圖閣劉寧止遂罷丁夘詔選人七階並分左右時用元祐舊制寄禄官分左右而􅂍吏不預焉言者謂祖宗以來選人皆以州縣繋銜故無所分别今選階品秩雖卑豈可無以律貪而獨置之廉耻之外乃下吏部如所請尚書吏部侍郎李光試禮部尚書吏部侍郎李彌大試户部尚書徽猷閣直學士知漳州綦崈禮試吏部侍郎太常寺少卿程瑀試給事中崈禮吕頥浩所薦瑀秦檜所薦也給事中兼直學士院胡交修充顯謨閣待制提舉江州太平觀交修以引疾得請此恐是縁周杞事干連乞去此月庚辰可參考殿中侍御史江躋奏徽猷閣直學士江淮發運使湯東野承議郎知淳安縣鮑慎好姦􅂍脅使輸錢五千緡庇而不發東野遂罷去右宣敎郎王彦恢知無為軍無為分鎮地至是始命守臣也楚州參議軍事李用成充本州團練判官用成久參祝友軍謀最所親信劉光世因㧞授用成朝請大夫言於朝故有是命其後秘書少監傅崧卿自淮東還奏其勞乃正補承事郎用成補正在五月乙丑己巳詔𣙜貨務依臨安府様製造斛㪷百隻降之諸路倉部員外郎成大亨言紹興府斛㪷増大出給之際例各折閲具獄滋多惟臨安㪷斛均平公私兩便故有是㫖詔比縁移蹕臨安令漕臣措置營繕聞諸頗取材於民違背初㫖可令監察御史黄龜年取索仍給銀絹度牒計市價償之朝奉郎福建轉運判官張觷為尚書考功員外郎直顯謨閣新除兩浙轉運副使李承造移福建轉運副使直秘閣提舉浙西茶鹽公事梁汝嘉為兩浙轉運判官承造為劉光世所辟未到司改命當考庚午資政殿大學士提舉臨安府洞霄宫李綱為觀文殿學士荆湖廣南路宣撫使兼知潭州前五日直秘閣知道州向子忞奏曹成犯道賀二州宰相吕頥浩秦檜因陳天下大計當用二廣財力葺荆湖兩路使通京西接陜右此天下右臂如京東諸州為叛臣所據正如國初河東且留以蔽敵諸路先定他時併力圖之似為未晚檜請身至湖外自當一面效羊祜襄陽之體上曰卿等當居中運裁不可授人以柄至是命綱仍令福建等路宣撫副使韓世忠以所部統制官任仕安一軍三千人授綱由汀道州之任又命權湖東安撫使岳飛率湖東副總管馬友及諸將李宏韓京吴錫等共撃之新除中書舍人胡安國避地湖東亦以書遺檜言吴敏兵寡宜就遣世忠以為之副俾殱殄羣冦收拾遺民人言向子諲忠節在今日可以扶持綱常願憐其無救而陷於賊復加任用俾收後效辛未上諭輔臣將來御試舉人止造蓆棚於講殿之前不必更修别殿吕頥浩因讃聖徳以為如此可以示四方士人使知陛下恭儉如此上曰朕天性不好華靡况與承平之主不同秦檜曰大布之衣大帛之冠是古人處患難之事後世以為夸美上曰卿言極是初命發賣蔡京童貫王黼朱勔浙西田至是六年而未售者尚五千餘畆乃詔發運副使姚舜明措置壬申詔自今廵尉毋得注吏職出身人此以紹興五年二月十一日勅令所狀修入癸酉起居舍人廖剛權尚書吏部侍郎左中奉大夫李友聞復集英殿修撰提舉江州太平觀朝論以其子鄴為偽齊所倚故錄用之友聞年八十矣詔諸路州軍遇天申節依舊試經撥放僧道度牒每三百人放一名建炎末權住試經至是禮部員外郎兼權祠部王居正言本部嵗降諸路空名度牒各不下五六萬而其間乃無一人縁試經者揆之人情恐有未安故降是㫖甲戌福建轉運副使陳原闕廣東提㸃刑獄公事徐端本江西轉運判官趙公竤浙西江東廣東提舉茶鹽黄昌衡陳鑄王鈇章僅福建提舉茶事孫恭兩浙福建提舉市舶鮑存陳鼎等十人並罷以御史中丞沈與求論其猥濫也端本鑄子鑄安西人宣和述古殿直學士僅惇孫嘗除光禄寺丞鑄亨伯弟子鼎鎮江人也吏部尚書李光為淮西招撫使神武前軍統制王􅊛副之吕頥浩欲討韓世清乃託言路進等諸盗未平命􅊛將前軍往捕而以樞密院准備將徐文所部為光親兵仍命世清及江東統制官張俊崔邦弼王進王冠李貴等軍權聽光勾抽使喚事干軍政待報不及者許便宜行訖以聞朝請郎新通判池州樂亮臣改知滁州用江東安撫大使葉夢得請也滁州自向子伋死不復除守臣至是盗賊稍衰而鄉村尚有食人者亮臣捕得其首周智磔于市由是遂止亮臣清介自守惟一僧偕行郡事之餘多瞑目獨坐滁人久猶思之亮臣事以趙甡之遺史増入但甡之所記作岳諒臣蓋字誤今從日歴按亮臣除命在二月甲戌而甡之於正月乙夘書之疑葉夢得先遣亮臣而後奏也乙亥權尚書户部侍郎栁約落權字以將使髙麗也是日雨雹丁丑給事中黄叔敖兼侍讀權尚書吏部侍郎廖剛兼侍講詔閤門宣賛舍人崔増樞密院准備將領趙延夀單徳忠李振徐文武功大夫李捧樞密院水軍統制邵青所部兵分為七將以御前忠銳為名内增青仍作水軍並隸侍衛步軍司非樞密院得㫖毋得擅發仍鑄印賜之文除第七將及賜印在此月庚辰隸步軍司在辛巳今聨書之秀州海鹽縣令徐百禄敕令所刪定官莫儗並罷百禄秉哲子儗儔兄殿中侍御史江躋以為言故罷金均房州鎮撫使王彦奏文林郎續觱充本司書冩機宜文字宣敎郎髙士瑰起復承事郎王弗並幹辦公事士瑰瓊曾孫弗滎陽人也觱已見元年二月始淮南營田司募民耕荒頃收十五斛及是宣諭使傅崧卿言其太重故百姓歸業者少上用崧卿言詔損嵗輸三之二俟三年乃征之仍賜崧卿錢五萬緡俾貸民為牛種之費故朝散郎梅灝贈直龍圖閣以元符黨人故錄之也龍圖閣待制致仕洪中孚卒己夘浙西安撫大使兼揚楚等州宣撫使劉光世同執政對於内殿光世自鎮江入朝留彌月上命光世移屯維揚而光世以為恐鄰冦有疑或致生事願仍領浙西以為根本之地蓋光世實憚行也右司諌方孟卿言今陸下既已移蹕臨安豈能免鄰冦之疑臣又聞光世欲以身任山東河朔之事其陳義甚髙今乃不欲渡江其意安在臣願清燕之間召宰相吕頥浩秦檜與之面議於陛下之前及早應副錢糧并措置合宜事件諭以聖意使之必行庶幾不致臨時首鼠敗事上召光世入對諭使將大軍偕行光世終以為難乃命移屯五千往來節制而已光世之來也以繒帛方物為獻上命分賜六宫御史中丞沈與求言今艱難之際不宜有此乞斥還之上納其言仍降劄奬諭是日秦檜因奏事言每見陛下屈已從諌中外士民無不感悦上曰如前日百姓揭牌題以供御綉服問之乃十年前京師舖户用其舊牌已令毁撤不知者將謂舊習未除朕所服者多繒素豈復有綺綉也從事郎知髙郵縣鍾離濬言宣撫司指揮令營田之民有警旋行勾集出戰本縣四十村歸業之民僅千八十家少有耕種又慮秋成或為賊有欲分為二十社社三百人擇精強可仗者二人為廵社首領其餘十人為甲甲有隊長如遇警急遞相救援二十社計六千人約耕田六百頃若無耕牛可以人代每畆收一㪷五升共收穀九千斛計貸種錢萬六千緡詔宣諭使傅崧卿以永豐圩禾稻給之如其請濬先為薛慶幕客屢勉以忠義慶信用之其後崧卿還朝薦濬學有師承忠國愛民一路鮮有其比上嘉之命特改京官濬改官在四月戊辰庚辰詔自今監司不得任本貫其見在任者皆移之時言者論近兩浙轉運使盧知原等皆係本貫之人利於殖産營私應副親識干求請託一切用情望别與差遣庶革逐賂狥私之弊稍復祖宗立法之意故有是命降授朝請郎周把除名惠州覊管把在常州為政殘酷㑹大旱上御經筵問所以致旱之由顯謨閣待制胡交修時為中書舍人對曰此殆把佚罰遂以把屬吏把怒上書告其罪詔大理寺丞胡蒙詣常州按驗交修無所挂然羣從亦多抵罪而把坐賊殺不辜及贓罪流故竄蒙歴城人也熊克小歴載杞獄具於去年十二月甲寅按甲寅乃進呈體究文字非具獄克誤也詔内外諸軍並各供具人馬衣甲器械緫數及開坐統制統領官所轄數以聞自今每軍月具籍申樞密院時吕頥浩以諸大將專兵難制故舉舊制行之然終不能得其柄夜雷聲初發辛巳直秘閣知道州向子忞落職放罷以湖東提㸃刑獄公事周隨亨劾其不法及棄城故也新除中書舎人胡安國自全州遺尚書左僕射吕頥浩書曰昔韓忠獻公秉政十年勲蓋一時權震天下然議者亦或排之則孫公沔李公參吕公誨王公陶與司馬公光是也衆人常情睚眦必報而忠獻公於此數人皆引用之各盡所長不以為怨而近世諸人借國威福行其私意取快一時欲救往迷正在今日相公中間均逸亦有異同之議今公衮言歸進退賢否賞罷功罪固當以至公無我為先報復恩讎為戒然比於忠獻猶有未及不免天下之疑以貴者言之如舊相吳觀文起帥長沙繼除三路宣撫吴雖辭免而軍書羽檄輻湊門巷又以劇盗方集境中恐失事機惶恐拜命鳩兵選將夙夜究心亦未為失一旦賜罷自觀文降資政自通議降太中傳播諸方駭動觀聽所可疑一也以微者言之向子忞之守道鋤治姦猾雖犯衆怒識者是之申乞移按他部不為過也巨冦侵陵衆寡不敵移守山寨而外臺乗此交劾罷之所可疑二也相公平心為相施於貴者將存其事體施於微者當海度容之若改正此二事則不違公議釋疑於天下矣夫宰相時來則為不可擅為已有人才亦各自負不可蓋以己長安國見辭新命冀賜片言俾從所欲則受賜大矣頥浩不納隨亨江山人時以避賊寓治江華子忞檄歸衡陽隨亨怒愬于朝子忞坐削官至是復有此命子忞降官在今年二月乙丑今併附直龍圖閣主管湖東安撫司公事向子諲言已撫定曹成人馬在道州河南駐劄縁臣折衝無術有失國體望賜罷黜詔子諲免罪赴行在壬午叙文州司馬黄敦彦復通直郎敦彦建炎末通判袁州坐降敵停廢刑寺當敦彦謀叛還歸㑹赦叙散秩敦彦愬于朝大理少卿錢稔言與真犯不同故有是命敦彦自承議郎建炎四年八月甲申追一官勒停癸未上始御講殿自廵幸以來經筵久輟至是復之詔張浚選精鋭西兵五千人騎遣將統押隨中使任源赴行在以騎軍不足故也詔國學免解進士張雷令入對舊制州縣官正郎以下身亡者給倉券兩浙轉運判官梁汝嘉言詭冒者衆蠧耗邦財詔並罷是日淮西招撫使李光發行在甲申中書舎人程俱落職提舉江州太平觀上既召徐俯俱密言於上曰俯雖才俊氣豪然所歴尚淺今以前任省郎遽除諌議自元豐更制以來未之有也考之古今非卓然傑出如陽城种放則未嘗不循資望而進臣願陛下須其至姑以所應得者命之他日置之左右何所不可如元禛在長慶間命知制誥以至翰林學士真不忝矣止縁自荆南判司命從中出召為省郎使知制誥遂喧朝聽時謂荆南監軍崔潭峻引之近傳其與中官唱和有魚須之句名曰警䇿恐外人不知陛下所以得俯之由以此為疑仰累聖徳上不聽右司諌方孟卿因奏俱諂附蔡攸在秀州棄城而遁俱遂罷去户部尚書李彌大兼權侍讀大理寺丞李處度監都奏院蘇簡並送吏部限三日出門此當武節大夫榮州團練使新知光州劉超為武功大夫榮州防禦使知真州後數月超乃赴行在許約知光州事已見此月末恐可移入此或附超初除光州時超以閏四月壬子到行在故奉議郎守尚書工部員外郎滕茂實以死節贈龍圖閣直學士官其家三人茂實既死雲中其友朔寧府士曹椽董詵自投歸張浚浚以為陜西轉運判官詵乃錄茂實所為哀詞使其同歸者羅鉞來獻浚亦上其事於朝故有是命茂實死節已見建炎元年正月壬寅及二年八月末後諡忠節乙酉上諭輔臣曰人主待臣下當以至誠若知其不可用不若罷去疑而留之無益也又曰人主之徳莫大於仁仁之一字非堯舜莫能當吕頥浩秦檜曰聖學髙明以誠仁二者治心修身正家齊天下有餘裕矣賜劉光世淮東宣撫使印光世初除揚楚等七州宣撫使與江東西二大帥同命後光世乞鑄淮東宣撫使印得㫖以揚楚通泰真承州漣水軍宣撫使印為文至是再請遂改鑄陞東海縣為東海軍時海州復為偽齊所得乃以成忠郎閤門祗候葛玥為軍使將薛安靖部曲五百人往守之丙戌初置著作官二員編次日歴自渡江以來無史官及是御史中丞沈與求始以為請然未及行武功郎閤門宣賛舍人知廬州王亨權主管廬州夀春府鎮撫使司公事兼知廬州亨守郡踰年條陳禦冦利害來上故就用之詔六部於東北角開便門遇有職事赴都堂禀白聽於便門出入丁亥尚書工部員外郎王昂守起居舎人禮部員外郎王居正試太常少卿昂珪弟子也戊子龍圖閣待制知撫州髙衛落職與宫觀衛言甘露降於州之祥符觀且為圖上之王居正論今日恐非天降祥瑞之時言者劾衛以蔡京圍田叨冒改官頃者抗疏極言討論之非實自為地搢紳號為流外侍郎今乃崇飾諂諛老不知愧望賜罷黜從之右修職郎陳淵充樞密院計議官淵瓘兄孫舉進士不第以積舉得官秦檜薦其才而有是命殿中侍御史江躋言臣聞天下一家中外之財皆人主府庫也自古言利之臣初非天降地出不過推剥細民移東於西以欺其上唐徳宗時李兼在江西有月進韋臯在西川有日進刺史進奉自裴肅始幕僚進奉自嚴綬始載在史冊為世所譏蓋不可不戒也陛下盛徳日新躬履節儉不殖貨利有如成湯臣子所宜奉承徳意近日乃聞前知明州吴懋輒有所獻踰五萬緡州郡有餘朝廷自當移用豈待進獻以為己能竊恐朝廷受之無名將何以示天下倘或小人觀望爭相效尤殘民以為己利其患有不可勝言者一吴懋固不足道也欲望陛下斥還懋所獻錢仍加黜罰少寛四明民力且為後來貪競之戒詔委自憲臣勘當如係科斂即仰給還以聞吴懋俟勘當到取㫖懋守明踰年時四明承喋血之餘公私掃地而水軍歩卒戍明者踰萬人懋以等第貸民錢十萬緡又得𣙜酤之贏軍用無乏懋用是得職名懋除職在元年四月丁丑比代去又獻錢五萬緡其後勘當如章然懋所獻羡錢朝廷皆已移用但降懋二秩而已熊克小歴四明承喋血之餘公私掃地列將陳思恭統步軍二萬張公裕水軍一萬皆留戍郡境軍費不貲懋得𣙜酤之贏以供廪稍民不知兵朝廷嘗以直秘閣寵之至是貶秩而去尋察其枉除湖北轉運判官克所云乃汪藻所撰懋墓誌中語也日歴紹興二年五月二十四日浙東提刑司奏體訪得吴懋牒諸縣云都統陳太尉所帯軍馬四千餘人前來駐劄今相度權於人户等第物力錢自三十貫以上借錢二十文省實催到九萬七千九百餘貫又踏逐崇寧寺屋分酒務米麴寄造煮酒收息錢三萬七千餘貫又將朝廷降到度牒分下諸縣出賣收到錢一萬一千餘貫并都酒崇夀務䟎出二合酒錢二項共十五萬貫據此則藻所云非其實也陳思恭步卒四千人并張公裕本軍不應有三萬人今但云踰萬庶不失實懋以五月癸未貶秩今併附見右奉議郎監諸軍計司秦湛添差通判常州以黨人子特錄之也湛觀子已見己丑有司以春分日祀髙禖禮畢宫嬪有位號者以次即宫中飲福受胙如儀復荆湖東西為荆湖南北路以徽猷閣待制新知宣州劉洪道為徽猷閣直學士知鄂州充荆湖北路安撫使召湖西安撫使程昌㝢還行在仍命洪道以所部顔孝恭崔光弼軍之鎮熊克小歴四月甲申時朝廷已除吕祉湖東提刑祉因言荆湖分東西路地勢人情皆不便乞依舊為湖南北從之蓋克不考二月已降㫖乃繋之四月也詔申嚴福建路私有私造軍器之法以提㸃刑獄徐庚有請也庚寅監察御史婁寅亮罷寅亮既為秦檜所擠按治無所得至是獄成坐為族叔郛民田改立官户刑寺當寅亮私罪杖罰銅七斤詔免所居官送吏部未幾寅亮卒直籠圖閣知臨安府宋輝萊州防禦使主管侍衛馬軍司公事邊順皆貶秩一等坐城中多刼盗也既而獲盗復其官三月癸丑復官資政殿學士知泉州謝克家引疾提舉臨安府洞霄宫宣撫處置使張浚承制以奉直大夫知卭州陳右提㸃潼川府路刑獄公事而以朝散大夫鮮于繪代之時有㫖以朝請大夫王俣知卭州浚乞合改替繪朝廷不能奪也是月知商州董先叛附於劉豫先是閤門宣賛舍人李興以節制軍馬屯於商州㑹先為陜虢安撫司統制官耿嗣宗所迫來依興以兄事之未㡬河南鎮撫使翟興俾先知商州先心慊之宻有害興意因置酒伏甲執興於坐以鎮撫司之命械興赴河南欲於中塗殺之行兩程宿山林菴舍中興見羣卒熟寐乃荷械而去逮曉至洛南農家人識之咨嗟熟視遂破其械以糗糧遺興使去其子女諸妾皆被害興既脱復得麾下舊兵千餘人往來商虢間先既與興為仇且劉豫勢漸盛先不能軍遂以商虢二州降豫初淮西諸州多為劇盗所據朝廷因而授之閤門宣賛舍人知濠州冦宏雖受朝命隂與偽宿州守胡斌通李成之敗也褒信縣射士許約收其潰兵入光州城以收復告即以約知光州約與武節大夫中州刺史知夀春府陳卞皆與偽境往來兼用紹興阜昌年號光州土豪張昻獨率民兵據仙居縣之石額山為寨事聞詔授昻忠翊郎忠義兵民統領至是北賈有至建康者言中原之民苦劉豫虐政皆望王師之來江東安撫大使葉夢得聞之即遣使撫諭卞宏二人皆聽命既而豫遣偽京西南路安撫使王彦先攻夀春為卞所敗而宏遂與斌絶卞尋復固始縣㑹豫衆復犯二州卞棄城保南岸夢得令統制官王冠張俊等援之豫引衆去彦先維州人也此以葉夢得行述増修而不得其月日熊克小歴附之此月按日歴三月六日李光奏體問得江東安撫大使司已差王冠知宿州過江前去則冠之行必在二月也又紹興元年十一月十八日㓂宏申順蕃知宿州胡斌令人賫文字誘宏從偽已行處斬詔特轉一官二年二月十五日葉夢得申王彦先胡斌犯夀春府濠州已差王冠李貴小張俊策應四月十二日奏已收復夀春府此皆與行述同但克所書以陳卞為陳辨又云遂復光州皆誤也日歴今年四月五日孔彦舟尚申得光州牒係用偽年號則知未嘗復光州許約張昂事並不得其年今以紹興二年正月五日張昂奏狀附見俟考建炎以來繫年要録巻五十一建炎以來繫年要録巻五十一金人地名考證尼瑪哈原書作黏罕誤改見巻一
