body:
  text: 建炎以來繫年要錄巻九十八宋李心傳撰紹興六年二月己亥朔尚書金部員外郎陶愷知筠州前三日愷因面對言陛下未能建大中至正之道未能平黨與未能修政未能用人其言頗主紹述之說故命出守三月己卯再責詔江西轉運司於去年上供米内共撥二萬石付帥司為賑濟之用即不得有妨應副岳飛一軍米數庚子江西制置大使李綱湖南制置大使吕頥浩並兼本路營田大使翌日詔淮西宣撫使劉光世淮東宜撫使韓世忠江東宣撫使張俊湖北襄陽府路招討使岳飛川陜宣撫副使吳玠亦如之飛玠惟不帯大字賜两浙都轉運使李迨詔書奨諭以右僕射張浚言迨近措置酒稅課利錢僅五十萬緡備見體國故也詔諸路給賣户貼錢依限逐旋催納起發毋得希覬妄亂申請先是已减下户所輸之半又詔全無物力人户皆免都省言慮州縣猾吏妄說事端致令人户意望再有更易不行依限送納故條約焉既而右僕射張浚言元降指揮非奉聖㫖不得支使方今軍事之際兼措置屯田所費益廣已逐急取撥應副使用乞俟支使了畢具實數奏請除破從之浚奏請在三月癸巳辛丑左承事郎鄒柄充樞宻院編修官司農寺丞都督府主管機宜文字蓋諒撫諭川陜還入見詔進秩二等壬寅持服前左中大夫富直柔起復資政殿學士知鎮江府時直柔方持所生母䘮故有是命既而言者論直柔徧以書達權貴圗起復章格不下㑹直柔辭免新命趙鼎進呈言實無此事上曰鎮江謀守出自朕意小大之臣未嘗有薦直柔者前己面諭臺諫今且當降詔不允彼再有請則從之可也既而直柔引祖弼故事乞終䘮制上許之上詔在二月己未直柔再奏在四月辛丑詔利州路經畧安撫使郭浩襄陽府路安撫使張旦金均房州安撫使柴斌知建康府主管江南東路安撫司公事葉宗諤知鎮江府主管沿江安撫司公事李謨並兼營田使先是淮東西湖南北荆南帥臣皆已兼帯至是悉命之都督行府奏改江淮營田為屯田先是言屯田者甚衆而行之未見其效㑹張浚出行邉因出户帖錢二十萬緡為本浚請應事務並申行府措置俟就緒日歸省部許之於是官田逃田並行拘籍依民間例召莊客承佃每五頃為一莊客户五家相保共佃一人為佃頭每荘官給牛五具種子農器副之每家别給菜田十畆又貸本錢七十千分二年償勿取息若收成日願以斛斗折還者聽遂命屯田郎官樊賓提舉糧料院王弗同推行焉七月壬申又置營田司癸卯司農寺丞蓋諒言四川提轉牧守之官恃去朝廷阻逺輙法外用刑如軍民少有違犯其處斷輕重係於臨時喜怒之私上負陛下好生之徳乞速加禁止詔制置大使司宻切體究按劾聞奏都督府効士張􅀈按􅀈字字書不載或係䮧字之訛特補下州文學􅀈陕西免解進士也觧潛在荆南便宜版授至是命之夜雪甲辰置行在交子務先是都督行府主管財用張澄請依四川法造交子與見緡並行仍造三十萬用於江淮矣至是中書言交子錢引并沿邊糴買文鈔皆係祖宗舊法便於民間行使自軍興以來未嘗檢舉今商賈雖通少有囘貨已倣舊法先樁一色見緡印造交子分給諸路令公私並同見緡行使期於必信决無更改詔諸路漕司榜諭遂造百五十萬緡充糴本将悉行東南焉五月乙酉改為闗子尚書刑部侍郎廖剛充徽猷閣直學士知漳州剛引疾求去疏三上乃命出守左廸功郎林儵循兩資與堂除差遣儵乞上所著易書詔給事中朱震詳問震言儵積學有年用功至勤乃令明州給劄錄其所著易說及天道大備書變卦纂集等合二十六巻上之故有是命乙巳右諫議大夫趙霈言去秋旱傷連接東南今春饑饉特異常歲湖南為最江西次之浙東福建又次之然今日賑救之術不過二說惟兼行之斯可以活飢貧而消盗賊一則發廪粟减價以濟之二則誘民户賑糴以給之諸路固嘗有㫖許借常平義倉矣又嘗令州縣措置賑糴矣然艱難之際兵食方闕義倉之粟諒亦無幾州縣往往逐急移用無可賑給唯勸誘民户賑糴尤為實惠然豪右閉糴葢其常態况當飢歲彼孰知恤全在州責之守縣責之令多方勸諭上户估定中價俾以所食之餘各行出糴稍濟貧乏務在均平然自來官中賑濟多在城郭遂致鄉村細民不能徧及臣願以上户所認米數紐計城郭鄉村之户多寡分擘米數縣差丞簿於在城及逐鄉要閙處監視出糴計口給數照支或支五日或併十日其交籌收錢並令人户親自掌管官不得干預既無所擾人亦願從此惠而不費之道損有餘補不足之術也從之丙午賜兵部尚書折彦質進士出身時參知政事沈與求數求去趙鼎欲引彦質代之以其進不繇科第乃有是命監察御史梁弁言行在倉官任滿有出剩之賞由此諸州綱運多端加量枉被監禁望賜寢罷若任内交納不擾特與推恩庻幾其弊可革從之敕令所奏川陜路知州通判不並差川陜人無通判而但有簽判或職官獨員者同職官判司兵官令佐並凖此監司屬官每司不得過二員著為令先是吏部省記川陜人州不過三員縣鎮寨一員既而員外郎徐林以為不便乃更立法焉戊申湖北襄陽府路招討使岳飛請復以襄陽府路為京西南路唐鄧隨郢均房州信陽軍並為所𨽻從之己酉故承議郎追復寳文閣待制鄒浩贈寳文閣直學士諡曰忠時浩子柄入對上浩諫立元符皇后章疏手藁給事中吕祉等奏其言直而婉肆而隱有古諫諍之風與世所傳偽疏激訐淺俗繆妄之說不同竊惟浩之名徳表在一世如是而前日追復止于舊職未厭公議欲望優加贈典仍許依曾肇豐稷例賜諡庻以副主上優恤黨人旌顯忠直之意故有是命右儒林郎姜仲開特改右宣教郎通判鄂州仲開宰邑有聲為宣諭官薦對故也太學生張逸補右修職郎進士魏昌明補右廸功郎二人自淮北來歸故錄之進義副尉尹機為右廸功郎李鼐為下州文學鼐陽翟人祖薦嘗從蘇軾學為文章元符末以上書詆誣入自訟齋不第死機安化人趙鼎之未第也嘗從機父天民講學天民仕不達而卒二人嘗以策干主管馬軍司公事觧潛於荆南潛還朝例補武職鼐能為歌詩援黨人子孫例訴于朝都省言薦在元祐間名重一時坐應詔上書終身廢棄依赦合該錄用子孫鼎又請以給使一官及親屬轉官恩例為機換文資以伸師友之義故有是命詔江西轉運司相度以旱傷州縣下户所納苖米價錢於江次糴發客販米斛初上以江西湖南旱命四等下户苖米皆令折納價錢而江西漕司請放稅四分已下者仍理本色至是又言撫州已催二千餘斛它郡皆無之乃詔洪吉等州分析殿中侍御史王縉言去歲災傷至甚官司檢放未必以實四等以下該納價錢者少催督日乆未見申到其實可見近湖北轉運司申鄂州見商販米斛船到岸價例不至髙貴乞降輕齎和糴若令江西轉運司委能幹官就江次糴發縱折納價少除津般縻費欠折之外官司貼支數亦不多使一路細民免監督之苦無逃移之患甚大惠也詔相度措置申尚書省庚戌殿中侍御史王縉為右司諫監察御史石公揆守殿中侍御史制曰古者天子有爭臣七人謂輔弼疑丞大臣之職朝夕納誨務引君以當道者也後世事任言責析為二途官以諫為名而所用未必賢於是大臣不得盡其規而人主不得聞其過矣况未濟艱難慮多闕失顧兹任屬尤難其人縉孝謹忠信有古人之志徳稱於士友而達於朝廷頃自郎闈擢居憲府三院御史爾歴其二焉不好訐以為直不撓法以掩姦不為人飛走以搏吠所憎肆惟汝嘉俾陞諫列夫孝有移忠之道職在盡言之地勉行爾志以弼予違詔江浙閩廣諸路總領賣田監司榜諭人户依限投買鄉村户絶并沒官及賊徒田舍與江漲沙田海道泥田昨為兼并之家小立租額佃賃者永為己業更無改易仍令户部與監司州縣毋得申請少有更改用三省奏也荆湖南路轉運判官權安撫司公事薛弼言近以朝廷催趣應副岳飛月樁錢九萬貫并撥上供米十萬石往鄂州又撥四等折錢餘米應副岳飛又撥二萬石應副荆南王彦又撥一萬石應副鼎州臣愚兼管潭州備見帥漕两司虛實本路因旱甚民流檢放之餘通不及三分稅米内仍有五等下户折錢之數委無可以支給本路大軍并将兵自十一月折半支錢尚自拖欠一月及口食等米無可指凖逐旋守等諸縣催趣殘零放不盡稅㪷升支散惴惴有旦暮之憂今來十二月積隂雨雪不止自下旬雪霰交作間有雷電氷凝不觧深厚及尺州城内外飢凍僵仆不可勝數除用度牒招募僧行隨即瘞埋旬日之間閱實剃度僧行不少自中冬闕食城内白晝剽刼城外十室九空盗賊廹於飢窮十數為羣持杖剽奪行旅舟船道路幾於阻絶除散遣緝捕官晝夜廵察遇有發露隨即擒獲斬决流配殆無虛日近方少戢流移漸歸墾治田畆遭此凍雪寒餓死損枕籍道路雖自席益在任分置三場給粥以濟日近數目加増至市里居民逐軍營婦不憚愧耻與乞丐隨逐仰給觀此灾沴正宜倍加賑卹以副陛下仁民愛物之意况本路州縣累經敵馬殘壊尤甚遺黎九死之餘去歲一年備兼五大大兵大火大旱大飢今復大雪若通融一路所有極力救濟或恐不能延及秋熟蓋去麥熟尚四月禾熟尚七月若更撥錢九萬及撥米應副四處非唯上供已無可支移其錢亦何由辦足定見州縣剥膚搥髓百姓愈不聊生臣昨嘗以帥司激賞有備屢乞責辦相兼應副湖南軍馬及席益移鎮罄竭所有秪了迎新送故之費今帥漕两司空虛無一月之儲而大軍諸兵有拖欠之積萬一雨雪不止移運不繼飢寒併至或生他虞雖誅責臣身無救於事亦知朝廷費廣不敢别覬支降唯望特降睿㫖将應副諸處錢米速賜蠲免詔弼将節次降到米斛疾速措置賑濟仍具去年上供苖米正色及折錢實數申尚書省著此以見湖南事宜兼自來監司所奏災傷未有如此之詳者故全載之辛亥詔張浚暫赴行在所奏事浚遂命京東宣撫使韓世忠自承楚以圖淮陽命淮西宣撫使劉光世也合肥以招北軍命江東宣撫使張俊練兵建康進屯盱眙又請權主管殿前司公事楊沂中領中軍為後翼命湖北京西招討使岳飛屯襄陽以圖中原於是國威大振上自書裴度𫝊賜浚右宣義郎湖北京西招討使司參議官李若虛提舉京西南路常平茶鹽公事兼權轉運提刑司公事以招討使岳飛言自收復後來未曾差置監司慮無以檢察州縣故也壬子都督行府闗右朝奉大夫江東宣撫使司主管機宜文字郗漸在軍日乆備見宣力陞充本司參議官右承事郎直秘閣邢孝揚為武義大夫忠州刺史主管萬夀觀公事以其家有請也癸丑閤門祗候添差婺州兵馬鈐轄徐宗誠閤門祗候添差徽州兵馬鈐轄丁禩並發付淮西宣撫司使喚二人皆劉光世故校故光世請之甲寅兵部尚書都督府參謀軍事折彦質充端明殿學士簽書樞宻院事朱勝非秀水閒居錄云堂饌自艱難以來至為菲薄趙鼎増厚十倍日有㑹集侍從諸将下逮省寺官所喜者次第召食堂厨公吏云日費香直且數十緡酒饌不計也如執政折彦質劉大中輩從官范冲朱震胡寅魏矼輩每酣飲必抵暮方出省創為巨盃號升􅜔一杯容酒一升謂盞為􅜔者俚語也至是宰相不逮郡守都堂成酒肆矣勝非所云不得其時今且附彦質執政之後其曲折當考遣帯御器械錢愐往台州撫問其母秦魯國大長公主仍以銀合茶藥賜之詔偽造綾紙度牒依詐為制書法斷罪用禮部請也時以軍興配賣度牒於諸路故條約之乙卯給事中朱震言國家改官之法選人六七考用舉主五員始改京秩所以周知民情練達世務養之以乆然後舉而任之近歲戎馬生郊士多失職陛下覽羣臣之議給宫廟之禄待之固已優矣而又用其考第求薦於前執政之門以充舉主五員之數無乃太優乎臣愚乞自今而後有用宫廟年月改官者須一任知縣或縣丞補足合用考數然後兩任闗陞知州一如舊法不歴州縣者不得任朝廷之官若異才實能朝廷之所擢用者不在此例如此則抑僥倖之俗止奔競之風施之於政庻無妄作害民之事矣詔吏部勘當左朝奉郎知廣徳軍湯鵬舉罰銅八斤坐應報江東宣撫使張俊文書違滯也俊劾鵬舉報事不實出言輕慢趙鼎令鵬舉分析俊再乞黜責乃有是命淮東宣撫使韓世忠引兵至宿遷縣執金人之將貝勒雅哈時劉豫聚兵淮陽世忠欲攻之乃引兵踰淮泗旁符離而北前一日遣統制官岳超以二百人硬探偽知邳州賈舍人者亦以千騎南來與之遇衆欲不戰超曰遇敵不撃将何以報敵鳴皷超率衆突入陣中出入數四敵乃還翌日世忠引大軍進趨淮陽城下命統制官呼延通前行世忠自以一騎隨之行二十餘里遇金人而止世忠升髙邱以望通軍通馳至陣前請戰金将貝勒雅哈大呼令觧甲通曰我乃呼延通也我祖在祖宗時殺契丹立大功誓不與契丹俱生况爾女真小國侵犯王畧我肯與爾俱生乎即馳刺雅哈雅哈與通交鋒轉戰移時不觧皆失仗以手相格去陣已逺逢坎而墜二軍俱不知雅哈刅通之腋通扼其吭而擒之既而世忠為敵所圍乃按甲不動俄麾其衆曰視吾馬首所鄉奮戈一躍已潰圍而出不遺一鏃世忠曰敵易與耳復乘銳掩擊敵敗去是日澧州慈利縣山賊雷進為其徒伍俊等九人所殺先是進據險為冦朝廷以武功大夫忠州團練使招之進不受直徽猷閣知鼎州張觷使人說俊等而遣兵捕之俊斬進及其妻子詣觷降餘黨招戮殆盡後錄其功以俊為秀州兵馬鈐轄其徒一百七人授官有差日歴魯攀等一百七人以四月九日丙午補官丙辰右武大夫達州團練使知襄陽府張且復舊官充荆湖北路兵馬鈐轄用湖北京西招討使岳飛請也先是飛赴都督行府計事遂自鎮江入朝上召對于内殿賜飛金酒器遣還岳飛入朝日歴不載但於二月丁未書張俊乞令内殿引見及於此日書有㫖左藏庫進金二百兩賜岳飛酒器使用不知何日引見也直秘閣荆湖南路轉運判官薛弼陞一職知荆南府兼管内安撫使洪州觀察使荆南府歸峽州荆門軍安撫使王彦為保康軍承宣使知襄陽府充京西南路安撫使朝議以襄陽重地故命彦以所部鎮之彦除襄陽日歴不書是日韓世忠圍淮陽軍丁巳左從政郎徐嚞特改左宣教郎嚞為徳化令以宣諭官薦對遂命監行諸軍糧料院四月甲子詔湖北京西帥司於招討使岳飛並用申狀戊午詔中侍大夫保信軍承宣使權主管殿前司公事提舉宿衛親兵楊沂中以入隊萬人赴都督行府使喚張浚欲以沂中助韓世忠故有是命後二日詔沂中落階官為宻州觀察使龍神衛四廂都指揮使遣行張浚以沂中助世忠事詳見三月乙亥趙宻事内右朝奉大夫王約監行在交子務詔諸路常平司於管下客旅㑹聚州軍權置市易務候事平日罷用都省奏也己未遣權户部侍郎劉寧止往鎮江總領三宣撫司錢糧尚書右僕射張浚言所用錢糧雖各有立定窠名及專委漕臣應辦自來多是互相占吝不肯公共那移因致闕乏動經旬月深慮生事望於户部長貳内輪那一員前來置司專一總領措置移運應辦故有是㫖寜止請諸路監司州縣事干錢糧如有違慢許臣奏劾重寘典憲内通判以下一面對移沿邊州縣依條取勘從之寜止申請在是月丙寅辛酉權主管侍衛馬軍公事解潛兼權殿前司帶御器械劉錡兼權提舉宿衛親兵以楊沂中出戍故也是日韓世忠自淮陽引兵歸楚州世忠既圍城敵堅守不下劉豫遣使如河間求援于金右副元帥宗弼先是金偽與其守将約受圍一日則舉一烽每日益之至是城中舉六烽劉猊與宗弼皆至世忠之出師也請援于江東宣撫使張俊俊不從世忠乃還道遇金師世忠勒陣向敵遣小校郝彦雄造其軍大呼曰錦袍驄馬立陣前者韓相公也衆咎世忠世忠曰不如是不足以致敵及敵至世忠以數騎挑之殺其引戰者二人諸将乘之敵敗去趙雄撰世忠碑云攻淮陽旦暮且下㑹詔班師王亟還此與趙甡之遺史所書不同按世忠實以無援而退非得城而不取也今從遺史碑又云大敗敵衆暴屍三十里恐亦不然葢雄所撰碑第據當時功狀不參考他書故也今不盡取淮陽民從軍南歸者萬數都督行府悉授田居之上聞詔州縣存恤之毋令失所詔州縣存恤在四月丁未壬戌詔折彦質兼權參知政事湖北京西招討使岳飛言丙路州縣官有蠧政害民贓汚不法之人乞許本司一面對移事重者放罷具事聞奏從之直龍圖閣江東轉運使向子諲陞秘閣修撰子諲赴都堂禀議上召見進職遣還殿中侍御史周秘言江淮屯田誠財用之本然使兵民並耕則不能無侵擾之患臣愚以為必無願耕之民然後使揀退之兵如此則軍民兩得其宜於事為當詔送都督行府癸亥參知政事沈與求罷為資政殿學士知明州從所請也中書舍人任申先繳還詞頭論其罪與求繳詞頭他書不載今以趙霈劾申先章疏修入與求乞宫觀改提舉臨安府洞霄宫免謝辭詔臨安府民間僦舍錢不以多寡並三分中减一分白地錢减四分之一是日觀文殿大學士新江西制置大使李綱見於内殿前一日綱入國門趙鼎奏已有㫖内引然來日偶是寒食正節上曰朕宫中每日食後畧治家事即觀書冩字此外别無他事來日自可引對鼎曰陛下清修如此天下幸甚後二日綱以急切利害再對因言及張浚上諭綱曰浚自富平敗始練軍事時綱所上疏凡十六其論中興及金人失信襄陽形勝與和戰朋黨五事皆利害之大者上嘉勞乆之丙寅詔諸軍器甲漸已足備自今置到軍器等並於内軍器庫樁管雖奉特㫖亦許執奏是月加封梁濾州刺史陸弼為靈濟昭烈王弼咸陽人天監中卒於郡還葬射洪之白崖山下因廟祀焉後又加助順佑徳四字十一年五月加助順二十三年二月又加佑徳建炎以來繫年要録巻九十八建炎以來繫年要録巻九十八金人地名考證貝勒雅哈原書作孛堇牙合誤今改正
