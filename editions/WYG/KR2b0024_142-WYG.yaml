body:
  text: 建炎以來繫年要録巻一百四十二宋李心𫝊撰紹興十有一年冬十月丙寅朔上謂大臣曰人主之權在乎獨斷金國之主幼而無斷權歸臣下往年之和出於烏珠今年之戰出於達賚或和或戰國之大事而皆不出於人主無斷如此何以立國知不足畏矣丁卯寳文閣直學士樞密都承旨鄭剛中為川陜宣諭使落直字賜銀帛二百匹兩秦檜将罷兵故遣剛中至西師諭指諸將入内侍省都知陳永錫提舉舉江州太平觀劉光逺之被劾也永錫與内侍康諝多受光逺金錢為之營救右諫議大夫万俟卨言赦過宥罪人主之渥澤而二人乃私布懇悃以誣公上望賜罷責以清宫掖乃詔永錫與宫觀諝送吏部是日右朝奉大夫通判揚州趙旼右朝㪚郎通判揚州湯廣年棄城保瓜洲鎮先是安撫使劉剛以措置興化鎮水寨為辭而去旼等聞敵且至遂遁官吏軍民皆散城市一空事聞二人坐貶秩三等廣年東野子也旼廣年是月辛巳降官戊辰詔川陜宣諭使許舉選人改官七員職令十員川陜宣撫司都統制楊政及金國萬户通檢戰於寳雞敗之時通檢屯渭北政欲攻㧞其城是日黎明通檢將精甲萬衆出戰政賈勇士鏖戰縣旁至日晡五十餘合勢未分政遣裨將將騎突出陣後山上執幟以招陽為麾軍敵望見大呼曰伏兵發矣乃驚而潰政乘勝掩殺通檢至城門而橋已絶乃擒之己巳劉光逺等至敵軍庚午秦檜奏上流守備上曰艱難以來將士分隸主帥嵗久未嘗遷動使植根深固豈是長䇿嘗令互易如臂指可以運掉纔過防秋便當為此則人人可以指蹤號令矣上又曰敵人議和熟思所以應之若彼我之勢強弱相等如是而和者彼有休兵之意我強彼弱足以制其命如是而和者彼有懼我之意也是二者於和為易若乃彼強我弱壓以重兵要盟而和則必有難從之事邀我以逞當思所以應之者可預戒諸將厲兵秣馬以為待敵之具事或難從豈得避戰也壬申言者論近聞楚州建康二郡有回禄之災延燒甚廣臣竊謂今近邊州縣當此軍旅之際各宜謹察姦人恐有乘風縱燎如帑廪儲積一或有失則為害不細況其間隂謀詭計有不可測知者且如逆豫嘗遣人於太平州放火既歸言功遂得補官明書偽告頃聞吏部有直攜此告乞換給者其已然之明驗如此安可畧而不察詔送樞密行府措置左承議郎知萬州馮時行罷仍疾速取勘以夔路轉運判官李埛言時行招置刺虎一軍五百人以為自衛之計顯屬跋扈故也暴起新視事方謀痛征屬州詭為羡財以獻於朝市恩寵聞知萬州有積錢風取之時行獨不可曰州之地不宜稻而官出鹽為直俾嵗糴六千斛輸之夔豈忍如異時吏私其直而歛於民鬻鹽為錢而自為糴令將以是奉上官乎大怒劾於朝故黜乙亥増五品已下官綾紙錢䖍州免解進士李珙特封養素處士珙贛縣人朴從子也行義修潔該通典故祕閣校理孔平仲以其子妻之江西諸司上其行義於朝故有是命是日金國都元帥宗弼遣劉光逺等還宗弼之入犯也首破泗楚二郡樞密使張俊在鎮江遣其姪統制官子蓋以輕兵於維揚盱眙之間伺敵進止俊不以兵渡江恐妨和議謂人曰南北將和敵謂吾怠欲攄柘臯之忿爾勿與交鋒則敵當自退時右諫議大夫知鎮江府兼沿江安撫使劉子羽建議清野盡徙淮之人於鎮江兵民雜居子羽撫以恩信無敢相侵擾者境内帖然既而敵騎久不至俊以問子羽子羽曰此敵異時入犯飄如風雨今更遲回是必有他意至是宗弼遣光逺等還報大畧言當遣尊官右職名望夙著者持節而來蓋金欲速和故也紹興講和録敵元帥上第二書皇統元年十月十日具位致書云云今月四日劉光逺等來得書審承動靜之詳為慰所請有可疑者試為言之自割地河南之後背恵食言自作兵端前後非一遂致今日鳴鐘伐鼓問罪江淮之上故先遣莫將回具以此告而殊不見答反有遽起大兵直渡濁河之説不知何故雖行人對面之語深切勤至惟曰聞外之命是聴其書詞脱畧甚不類如果能知前日之非而自訟則當遣尊官右職名望夙著者持節而來及所齎緘牘敷陳畫一庶幾其可及也薄寒切冀對時慎重専奉書披答不宣丙子左朝奉郎幹辦諸司審計司胡汝明御史臺檢發官陳士舉竝為監察御史汝明黟縣人上召對而有是命戊寅宗正丞邵大受言宗正舊有四書曰玉牒曰仙源積慶圖曰宗藩慶系録曰宗枝屬籍建炎南渡寺官失職舉四書而逸於江滸陛下比命重修仙源慶系屬籍總要乃合三者而一之固已無愧於昔獨玉牒未修望詔有司討論一書以備中興之盛典從之大受建徳人也熊克小厯繫此事於丙子今從日厯少保醴泉觀使岳飛下大理寺先是樞密使張俊言張憲供通為收岳飛處文字後謀反行府已有供到文狀左僕射秦檜乘此欲誅飛乃送飛父子於大理獄命御史中丞何鑄大理卿周三畏鞫之岳侯傳云秦檜密遣王俊同王貴前去謀䧟侯王俊王貴等觀望秦張憲岳雲欲謀反等事俄將憲岳雲俱杻械送大理寺根勘上聞驚駭秦檜奏乞將張憲岳雲與飛同白其事是時侯尚不知良久秦檜密遣左右傳宣請相公略到朝廷别聴聖㫖侯既聞宣詔即時前去却引到大理寺侯駭然曰吾何到此纔入門到㕔下轎不見一人止見四靣埀簾纔坐少時忽見官吏數人向前云這裏不是相公坐處後靣有中丞請相公畧來照對數事相公㸃頭云吾與國家宣力今日到此何也道罷隨獄吏行至一處見張憲岳雲露頭赤體各人杻械渾身盡皆血染痛苦呻吟又見羅振等將王俊王貴首張憲岳雲并侯反狀罪文前來云國家有何虧負你三人却要反背侯向万俟卨羅振曰對天盟誓吾無所負國家汝等既掌正法且不可䧟忠臣吾到冥司與汝等靣對不休衆聞其説羅振并御史中丞万俟卨等曰相公既不反記得遊天竺日壁上畱題曰寒門何載富貴乎衆人曰既出此題豈不是反也侯和衆人皆是秦檜門下既見不容理訴長吁一聲云吾方知已落秦檜國賊之手使吾為國忠心一旦都休道罷合眼任其考掠按此時羅汝檝已不為御史万俟卨亦末為中丞其後卨遷中司汝檝遷諫議然汝檝不與此獄傳所云恐誤姑附此更須詳之資政殿學士提舉􅎔安府洞霄宫翟汝文薨於平江府私第諡忠惠己卯上曰凡事必謹於微若事已成則難改故書言制治于未亂保邦于未危荆襄守臣辟差者勿令久任以漸易之非特謹微亦所以保全之也壬午權尚書吏部侍郎魏良臣落權字充大金軍前通問使翊衛大夫保信軍承宣使知閤門事王公亮落階官為福州觀察使副之國書但使之歛兵徐議餘事紹興講和録皇朝答書某啓孟冬漸寒伏惟太保丞相侍中都元帥領省國公鈞侯起居萬福軍國重任委勤籌畫劉光逺曹勛等回特承恵示書翰不勝忻感竊自念昨䝉上皇帝割賜河南之地徳厚恩深莫可倫擬而愚識淺慮處事乖錯自貽罪戾雖悔何及今者太保左丞相侍中都元帥領省國公奉命征討敝邑恐懼不知所圖乃䝉仁慈先遣莫將韓恕明以見告今又按甲頓兵發回劉光逺曹勛恵書之外將以幣帛仰承寛貸未忍棄絶之意益深慙荷今再遣左正議大夫尚書吏部侍郎文安郡開國侯食邑一干户魏良臣保信軍承宣使知閤門事兼客省四方館事武功縣開國伯食邑七百户王公亮充稟議使副伏䝉訓諭令敷陳畫一切惟上令下從乃分之常豈敢輒有指述重蹈僭越之罪専令良臣等聴取鈞誨顧力可遵稟者敢不罄竭以答再造仰祈鈞慈時賜敷奏乞先歛兵許敝邑遣使拜表闕下恭聼聖訓向寒伏冀倍深鈞重冇少禮物具於别封切冀容留不宣上曰良臣往軍前禮物不必用上等蓋禮有等威不可不嚴茍烏珠禮物用上等而却以中下等奉其國主則在我者禮不至矣何以待外國乎上等物畱以待其國主上又曰恐左藏庫無佳帛朕處有之向張浚在川陜每嵗進奉摴蒱綾帛等皆在朕未嘗用一匹檜曰陛下恭儉如此中興可必也癸未監察御史陳膏梅充實呉𫝊竝罷膏守太府少卿充實行尚書吏部員外郎甲申度支員外郎李椿年自鄂州還行在右武郎吳拱為涇原路兵馬都監婺州觀察使充兩浙西路馬歩軍副都總管權知閤門事韓恕令之任從所乞也徽猷閣待制提舉江州太平觀盧知原卒乙酉虛恨蠻王厯階詣嘉州乞降厯階既犯邊獲寨將茹大猷以去提刑司調兵防扼所費不貲連年不能討大猷因以利啗之去年春厯階款塞求䧏不許至是復申前請守臣邵博言於宣撫司以便宜補厯階進武校尉令還大猷等且遺以包帶茶綵命王士安者往促之厯階遣其子阿帕蠻將軍葉遇等送大猷歸州令右宣敎郎知峨睂縣梁端即境上波恩神祠折箭歃血與盟而去厯階歸其出没抄掠如故熊克小厯稱知峨睂縣梁端修誤也蓋日厯載嘉州所申尋牒知峨睂縣梁端修武郎權知中鎮寨曹慎修示以恩威而克誤以梁端為端修耳丁亥江西兵馬都監程師回引兵至桂陽監之􅎔武峒討賊徒歐幼四等破之先是宜章峒民駱科反事見去年十一月朝廷命統制官郝晸以所部討科降之其徒歐幼四復率餘黨數千人據藍山縣掠連道二州樞密行府遣參議官史愿將師回往捕至是始平戊子監察御史胡汝明為殿中侍御史魏良臣等辭行庚寅上謂宰執曰凡事必熟思而後行朕今三十五嵗而髮大半白蓋勞心之所致也秦檜等曰陛下聖明天縱而又審思若此必無過舉矣右從事郎徐百禄秉哲子也嘗為海鹽縣令上以秉哲故黜之至是資政殿大學士張守資政殿學士李光等六人舉百禄改京官吏部奏百禄嘗犯私罪笞取旨詔皇族未歸秉哲之子百禄勿令出官辛卯龍神衛四廂都指揮瀘州軍承宣使御前統制劉寳卒按此乃淮東軍中劉寶也上聞其死為之一日不食特贈檢校少保寧武軍節度使寳加贈在二年五月丁巳癸巳揚武翊運功臣太保樞密使英國公韓世忠罷為横海武寧安化軍節度使充醴泉觀使奉朝請進封福國公世忠既不以和議為然由是為秦檜所抑至是魏良臣等復行世忠乃諫以為中原士民迫不得已淪於域外其間豪傑莫不延頸以俟弔伐若自此與和日月侵尋人情銷弱國勢委靡誰復振乎又乞俟北使之來與之面議優詔不許世忠再上章力陳秦檜誤國詞意剴切檜由是深怨世忠據趙雄撰世忠神道碑増入碑在除樞密使之前誤也自敵渝盟之後未嘗有使到今移於此庶不牴啎也言者因奏其罪上畱章不出世忠亦懼檜隂謀乃力求閒退遂有是命世忠自此杜門謝客絶口不言兵時跨驢攜酒從一二童奴游西湖以自樂平時將佐䍐得見其面云熊克小厯於此又書韓世良罷管軍奉祠加承宣使此事在今年四月克蓋誤也右朝奉郎幹辦行在諸軍審計司周公彦為監察御史是月金人䧟濠州商州安撫使邵隆及金人所命知陜州鄭賦戰克之復陜州起復川陜宣撫使胡世將圖上右護軍都統制吳璘剡灣克捷之狀且言臣詢究衆論皆謂璘之此戰比和尚原殺金平論以主客之勢險易之形功力數倍據捉到蕃人供金國中稱璘有勇似其兄之語臣猥以書生誤膺重寄不習弓馬不諳行陣上頼朝廷指授璘等為國宣力川陜用兵以來末有如此之勝臣不敢緘默伏望聖慈察璘智勇冠軍優與遷擢以為盡忠許國之勸又奏本司都統制楊政焚蕩敵寨十餘處親率勁兵與薩里罕迎敵敵衆敗去致不敢併力熙秦委是宣力樞密院都統制郭浩於陜虢等處攻却敵寨竝皆獲㨗牽制敵軍不致併力秦鳯竝乞優異推恩乃賜璘等詔書奨諭密賜世將黃金二百兩茶藥有差初三將之竝出也璘復秦州㨗剡灣政下隴州破岐下諸屯浩取華虢二州入陜府有破竹之勢世將亦遣要約陜西河東忠義首領數十願為内應而金人約和於朝廷秦晉之人殊惜之三將歸解嚴第功於是統制官姚仲王彦向起各落階官仲彦為華虢兩州觀察使起為卲州防禦使十有一月按是月乙未朔丙申權吏部尚書兼侍讀資善堂翊善呉表臣落權字中書舍人兼實録院修撰朱翌罷以言者論翌頃以謟事呂本中薦之趙鼎若以翌為可恕則小人之黨日熾故也右諫議大夫万俟卨言宗正丞卲大受禀性隂險每聞朝廷一有除擢則怒形於色浮言無稽短毁百出詔罷之右中散大夫提舉江州太平觀李迨復龍圖閣待制知洪州上覽除目曰迨能吏肯以身任怨不恤人毁譽朕深知之但北州寄居多必有造謗者不可不察也治道無他但不以毁譽為賢否常核實以行賞罰則治道成矣齊威王封即墨而烹阿齊大治蓋知核實偽而不徇毁譽空言也丁酉上曰唐太宗除亂比湯武致治幾成康可謂賢君矣然誇大而好名雖聴言納諌然不若漢文帝之至誠也人君惟至誠臨下何患治道之不成哉秦檜曰文帝雖至誠而少學太宗雖問學而未誠猶可以揚名於後今陛下至誠問學度越二君則堯舜三代何逺之有戊戌言者請補試州縣小吏仍許告吏罪使補其闕以懲吏強官弱之弊上謂宰執曰此説若用則相告訐而州縣擾矣治天下當以清靜鎮之若妄作生事乃亂天下非治天下也昔人有言省官不如省事省事不如清心朕嘗躬行此語顧謂秦檜曰邊事既息可以弭兵卿為相亦當效曹參之清静也拱衛大夫忠州防禦使曹勛知閤門事左奉議郎新通判利州程敦厚召試館職以其上書言事故也敦厚之書曰臣聞建大功者不謀於俗排大難者不計以時夫大功非逹權而不能濟大難非欲速而可以平昔之執事者茍不逹權則勸陛下正名弗屈而不恤其禍茍為欲速則勸陛下長驅疾戰而不量其力否則首鼠畏避徇羣枉而昩至當則又莫為陛下毅然出身以任其責今陛下除驕抗之害而彊場肅致安靖之福而朝廷遵制兵之命在我而悉収其用欲和之利在敵而決保其成有四可為之勢願陛下應之以定而不回奪於俗持之以久而不促迫於時則大功立矣敦厚又遺秦檜書言檜見幾似顔子任重似伊尹檜大喜之令赴都堂審察遂召試以為祕書省校書郎敦厚先見紹興七年二月其除校書郎在今年十二月己巳今併書之己亥左太中大夫參知政事兼修實録范同罷同始贊和議為秦檜所引及在政府或自奏事檜忌之右諫議大夫万俟卨因論同貳政之初首為遷𦵏之議自信州至建康調夫治道怨嗟藉藉近朝廷收天下兵柄歸之宥密而同輒於稠人之中貪天之功以為已有望罷其機務詔同以本官提舉西京嵩山崇福宫資政殿學士提舉臨安府洞霄宮李光責授建寧軍節度副使藤州安置言者論廼者二使之還敵示欲和之意於國體無損而光乃隂懐怨望鼓倡萬端致㑹稽之民扶老攜㓜轉徙道路連日不止乘時誹訕罪不可赦秦檜進呈上曰司馬光言政之大本在於賞刑朕於光輩聞其虛名而用之見其不才而罷之逮其有罪而責之皆彼自取朕未嘗有心也若用虛名而不治其罪則有賞無刑政何以成譬之四時有陽無隂豈能成嵗乎乃謫光嶺表令紹興府日下遣發樞密院差使臣一員伴送辛丑中書舍人王鉌兼實録院修撰尚書倉部員外郎閻彦昭罷以右諫議大夫万俟卨言近朱翌邵大受被黜彦昭馳書密報范同故也是日金國都元帥宗弼遣魏良臣等還許以淮水為界嵗幣銀帛各二十五萬匹兩又欲割唐鄧二州因遣其行臺户部侍郎蕭毅翰林待制同知制誥邢具瞻審定可否紹興講和録金元帥上第三書皇統元年十一月七日皇叔太保尚書左丞相兼侍中都元帥領行臺尚書省魏國公致書時寒想惟安善近魏良臣至伏辱恵書語意慇懃惟命是聴良見高懷昨離闕書親奉聖訓許以便宜從事故可成就此計也本擬上自襄江下至於海以為界重念江南凋弊日久如不得淮南相為表裏之資恐不能國兼來使再三叩頭哀求甚切於情可憐遂以淮水為界西有唐鄧二州以地勢觀之亦是淮水北在所割之數來使云嵗貢銀絹二十五萬兩匹既能盡以小事大之禮貨利又何足道止以所乞為定又云淮北京西陜西河東河北自來流寓在南者願歸則聴之理雖未安亦從所乞外有燕以北逋逃及因兵火隔絶之人竝請早為起發今遣昭武大將軍行臺尚書户部兼工部侍郎兼左司郎中上輕車都尉蘭陵縣開國伯食邑七百户蕭毅中憲大夫充翰林待制同知制誥兼右諫議大夫河間縣開國子食邑五百户邢具瞻等奉使江南審可否其間有不盡言者一一口授惟詳之既盟之後即當聞於朝廷其如封建大賜又何疑焉少禮物具於别副隆冬切冀順天慎衛眠食專持書奉答不宣先是有舉人獻策於宗弼者宗弼用之盱眙龜山造舟為梁引兵深入東過臨淮南至六合西臨昭信晝夜不絶至是軍食不繼士皆飢苦又聞王師將渉江而北宗弼大懼乃遣毅等與良臣偕來焉李大諒征䝉記云皇統元年副元帥烏珠誅都元帥逹蘭以割河南還大宋有逆謀提師過江復取河南四年回師謂南北行府三帥曰吾近因國有叛臣結連南宋自領兵東伐問罪宋國大軍至亳郡由廬越淮橋道阻遏車騎吾心熒惑未決忽淮隂二進士逺來獻陳平宋國策時吾急遣龍虎阿勒巴二帥探路先行韓常周棨騎兵至淮上吾入盱眙疑有重兵把路龍虎遣使報曰淮南無一人一騎為備已遣五千騎越淮分守盱眙龜山把截水陸兩勢造橋吾大喜晝夜兼行至淮上果橋成六座分歩騎徑濟淮源上據運河擺布斥堠細觀南耗東過淮隂南至六合西臨昭信畫夜不絶吾因觀宋室新立龜山城寨臨淮之勢就山為隘若此聚糧屯兵此地據守吾雖鐡心未可輕舉但見空壁吾心自持宋室空有建城立勢之心而無聚糧據守之法又觀二進士所陳圖策淮南路盱眙之楚州行路窄隘左有長淮右臨河渠糧道遙逺冇過邵伯至山陽人騎回惟是獲到菱實雞頭蓮子聞諸軍不避寒酷踏泥打凍決池涸港掘藕拾菱尋魚摸蚌又宰殺騾驢相兼為食諸軍飢苦之聲不忍聞但虛心寛諭而已又諸將士云輜重俱盡有食奴婢者又多言南軍不測要回淮上惟吾心所料南宋既修起盱眙此乃據山臨水大利之勢尚無守法措置安有智謀就吾敵也決無渡江之理吾獨與蕭平章計義大言檄書於宋若從此約請詣轅門計議如敢違拒水陸星電越江蕭平章南去吾視諸軍飢心嗷嗷㤀失晝夜龍虎阿勒巴言若南宋受檄猶得半軍囘若宋軍渡江不擊自潰王曰爾論正與吾心同吾西望糧音南聴蕭信心神不寧如此月餘忽蕭平章躍騎走報不覺喜感天神與南使同來議止淮為界誓約已定南使回吾班師回泗集軍馬輜重騾馬依稀四分奴婢十中無六惜哉軍機至此而不能決若能決無一人一騎得回也吾私心用智但一檄書下遂取捷乃萬世不傳之上䇿按大諒所云可見金人勢窮力竭之實今竝附此庶幾可考壬寅詔以四立日就行在權宜設位祭五福太一用禮官請也先是議者欲建太一之祠禮官難之乃有是議焉尚書吏部員外郎施鉅祕書郎李益竝為監察御史益長沙人與鉅皆中丞何鑄所薦也乙巳拱衛大夫貴州團練使顔孝恭知隨州詔吏部侍郎魏良臣就充接伴使以中書言金使蕭毅已過界也毅等過江掲旗於舟大書江南撫諭右朝散大夫知鎮江府劉子羽見之怒夜以他旗易之翼日良臣見旗有異大懼力索之且以語脅子羽子羽曰吾為守臣朝論無所預然欲掲此於吾之境則吾有死而已請不已出境乃還之此據張栻撰子羽墓誌附入丙午詔通問副使王公亮先赴行在奏事拱衛大夫忠州防禦使知閤門事曹勛充接伴副使丁未給事中程克俊兼權直學士院左太中大夫范同責授左朝奉郎祕書少監筠州居住時右諌議大夫万俟卨論近㑹稽之民以李光鼔惑遂至於紛擾者累日今聞同與朱翌邵大受等又往家焉竊恐浮言横議又益數光萬一㑹稽藩輔為之震動則逺方聞之將如何伏望將此三人重賜施行天下幸甚詔左承議郎朱翌責授左承事郎將作少監韶州居住左奉議郎卲大受除名勒停化州編管光山軍節度使開府儀同三司判大宗正事齊安郡王士㒟提舉西京嵩山崇福宮放謝辭士㒟數言事秦檜忌之岳飛之下吏也士㒟草奏欲救之語泄檜乃使言者論頃岳飛進兵於陳蔡之間乃密通書士㒟㒟叙其悃愊蹤跡詭祕范同頃為浙東憲與士㒟通家往還或以他故數日不克見則必遣其屬卲大受往傳導言語窺伺國事士㒟身為近屬在外則交結將帥在内則交結執政事有切於聖躬望罷其宗司職事庶幾助成中興之業故有是命仍令刑部檢㑹宗室戚里不得出謁接見賓客條法申嚴行下士㒟將行上賜手札勞問且以白金千兩賜之光山軍承宣使同知大宗正事士樽提舉亳州明道宫以言者論其毎與朝士結為朋黨兄弟二人更唱迭和非朝廷之福故也保慶軍承宣使同知大宗正事士夽知大宗正事庚戌日南至上望拜皇太后於禁中宰相率百官遙拜皇太后淵聖皇帝於行宫北門外壬子金國審議使行臺户部兼工部侍郎蕭毅翰林待制同知制誥邢具瞻等入見毅等至館上命工部侍郎莫將館伴時殿陛之儀議猶未決議者以為兵衛單弱則非所以隆國體欲設仗衛恐駭敵情秦檜與知閤門事鄭藻謀之藻請設黄麾仗千五百人於殿廊蔽以帟幕班定徹帷檜然之自是以為定制時檜奏誓書事以為自古盟㑹各出意以為之誓未有意自彼出而反覆更易必欲如其所要者上曰朕固知之然朕有天下而養不及親徽宗既無及矣太后年踰六十日夜痛心今雖與之立誓當奏告天地宗廟社稷明言若歸我太后朕不憚屈已與之和如其不然則此要盟神固不聴朕亦不憚用兵也乙夘御史中丞何鑄充端明殿學士簽書樞密院事充大金報謝使右諫議大夫万俟卨試御史中丞起居郎羅汝檝為右諫議大夫丁巳拱衛大夫利州觀察使知閤門事曹勛落階官為容州觀察使充報謝副何鑄入辭上諭鑄委曲致詞事在必濟又召勛至内殿諭之曰朕北望庭闈踰十五年幾於無淚可揮無腸可斷所以頻遣使指又屈已奉幣者皆以此也竊計上天亦默相之言已淚下左右皆掩泣上曰汝見金主當以朕意與之言曰惟親若族久頼安存朕知之矣然閲嵗滋久為人之子深不自安況亾者未𦵏存者亦老兄弟族屬見餘無幾每嵗時節物未嘗不北首流涕若大國念之使父兄子母如初則此恩當子孫千萬年不㤀也且慈親之在上國一尋常老人爾在本國則所繫甚重往用此意以天性至誠説之彼亦當感動也紹興講和録皇朝答書仲冬嚴寒伏惟太保左丞相侍中都元帥魏國公鈞侯起居萬福軍國重寄悉勞籌畫特䝉専遣信使惠以書翰良馬厚幣禮意勤腆鄙情感激已難具陳至許成就大計最為重恩自惟孤危何以得此又如逐件事目一一曲荷開諭雖甚愚暗豈不省㑹即奉鈞諭逐項遵承再惟大計已定其間不免少有懇告如墳域所在至甚𦂳切計鈞鑒處之必是不錯上國方以孝理天下若使祖宗不闕祭享是為至望嵗貢銀絹見排辦來年數目先次發納已差端明殿學士朝奉大夫簽書樞密院事文安郡開國侯食邑一千户賜紫金魚袋何鑄容州觀察使知閤門事兼客省四万館事武功縣開國子食邑五百户曹勛充報謝進誓表使副専附此書叙謝鈞造益寒敢冀曲加保重有少禮物具於别封惟幸容納不宣戊午金國審議使蕭毅等辭行時朝廷許割唐鄧二州餘以淮水中流為界毅辭上諭曰若今嵗太后果還自當謹守誓約如今嵗未也則誓文為虚設是日詔大金國已遣使通和自今官司文字竝稱大金不得指斥己未詔何鑄曹勛竝與恩澤二資庚申命宰執及議誓撰文官告祭天地宗廟社稷紹興講和録皇朝講和誓書節文竊以休兵息民帝王之大徳體方述職邦國之永圖顧惟孤藐之蹤猥荷矜存之賜敢望自竭仰答殊恩事既繫於宗祧理蓋昭於誓約契勘今來畫彊合以淮水中流為界西冇唐鄧二州割屬上國自鄧州南四十里西南四十里為界屬鄧州其四十里外南併西南盡屬光化軍為敝邑沿邊州軍生辰并正旦遣使稱賀不絶所有嵗貢銀絹二十五萬匹兩自壬戌年為首每春季差人般送至泗州交納淮北京東西陜西河北自來流移在南之人經官陳理願歸鄉者更不禁約其自燕以北人見行節次遣發今後上國逋亾之人無敢容隠寸土匹夫無敢侵掠其或叛亾之人入上國之境者不得進兵襲逐但移文収捕沿邊州城除自來合該置射糧軍數并廵尉等外不得屯軍戍守上國云云敝邑亦乞竝用此約既盟之後必務遵承有渝此盟神明是殛墜命亾氏踣其國家按此誓書日厯不載然其間冇北人願歸郷者更不禁約之類宣諭聖語蓋常及之今刪取附注以備參考辛酉特進觀文殿大學士福建安撫大使兼知福州張浚為檢校少傅崇信軍節度使充萬夀觀使免奉朝請秦檜將議和遣工部員外郎蓋諒因事至閩中風浚使附其議當引為樞密使浚答書言敵不可縱和不可成檜不悦㑹浚以母老乞祠乃有是命先是責授清逺軍節度副使趙鼎在㑹稽嘗語其客方疇曰張徳逺建炎復辟之功豈可㤀也上待臣下有恩想必講求矣疇曰今日擔子極重秦相欲獨負之恐難也不知故相中誰可辦者時李綱朱勝非皆在鼎曰伯紀藏一皆不濟事惟徳逺可爾第恐不容復來至是卒如所料左承議郎新福建安撫大使司参議官高穎除名象州編管以言者論春間敵騎犯邊穎自軍前造朝反為張皇之説以惑流俗故也穎陷偽十年固窮守節故驟用之及是以從岳飛被斥壬戌左朝奉大夫荆湖北路轉運判官汪叔詹直祕閣知鄂州右朝請大夫知韶州邵相為荆湖北路轉運判官兼京西路轉運提刑提舉茶鹽公事王俊之告變也叔詹與聞之此據王明清揮麈後録相嘗為岳飛所劾此據洪邁夷堅志謫嶺南至是復起是月詔大金已遣使通和令川陜宣撫司照㑹保守見存彊界不得出兵生事招納叛亾此據蜀口用兵錄日厯無之建炎以來繫年要錄卷一百四十二
