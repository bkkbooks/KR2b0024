body:
  text: 建炎以來繫年要録巻一百三十三宋李心傳撰紹興九年十有一月戊寅朔祕書少監鄭剛中權尚書吏部侍郎先是剛中為樞密行府參謀官及還上召對剛中言臣為陛下詳觀今日之勢陜西新復且逺然就緒也必易三京為近然就緒也難何者陜西復禁兵四萬得弓箭手六萬則有兵可守見管之粟與和糴相當足支一歳則有糧可因今又益出蜀之兵以一旦有警宣撫使號令六路經畧各據阻險未易窺也惟是三京乆為劉豫凶熖所焚焦痛未蘇凋殘尤甚今古三京户口纔四十萬比平時不能十之一近屯田司又收其已種之田民力殊困且地勢平廣而無藩籬無一兵可以受甲無一家可以供賦孤城乍聚易以生釁臣願陛下選任郡守監司精究屯田俾民安業朝廷和氣自東南達於西北則功可成矣既對遂有是命日厯剛中以十月庚午得㫖引對去此凡八日未知何日上殿且於此附書之當考尚書户部員外郎李若虛試司農少卿定國軍承宣使知秦州兼節制屯駐行營右䕶軍軍馬呉璘為龍神衞四廂都指揮使上諭大臣曰呉玠乆在蜀備著忠績雖已優加恤典然聞其家頗貧可賜錢三萬緡仍進其弟軍職令撫其家屬故有是命上諭在十月壬申命大理評事何彦猷等編集刑名斷例刑部郎中張柄等看詳先是胡交修為刑部侍郎嘗有是請詔限一季紹興四年四月乆之未成議者以為刑部用例之弊非止臨時翻檢案牘隨意引用輕重適當而已外議相傳有部吏賣例之説乞再立嚴限專委丞評編集成書復委通曉法令彊敏郎官一二員看詳允當上之朝廷審實行下方得引用故有是㫖己夘上諭輔臣曰新疆百姓凋弊無徃年十之一而官吏悉如舊何以贍之可令逐路監司併省庶寛民力又曰聞沿汴居民苦於官役不安其業逃去者多當嚴束熊克小歴云秦檜曰陛下愛民真二帝三王之用心也上又言前日議移兵飛屯於襄陽深慮饋運費力不若先移萬人於江西既省饋運亦可以彈壓盜賊和州防禦使權主管待衛歩軍司公事韓世良為龍神衛四廂都指揮使他職如故庚辰言者論今輿地復歸宿師百萬𨽻籍諸將非屯田何以善後今荆湖興洋汝𨽻江淮之間沃野千里尚或邱墟是地有遺利諸帥所統自農為兵者不少戰士之外負荷役使之徒不無可用是人有餘力望令諸路宣府帥臣悉意講行從之是日宣州觀察使知閤門事藍公佐自金國至燕山俄而都元帥越國王宗弼亦至公佐懼不免留四日始聽行癸未檢校少保嚮徳軍節度使知大宗正事嗣濮王仲儡薨輟視朝三日贈少師追封瓊王諡恭惠屯田員外郎陳康伯因對面奏士大夫自為廷召來上殿須防姦人刺客上以為不然語輔臣曰汙偽之士雖衆皆朕臣子當以赤心待之秦檜曰陛下待人開心無間雖漢光武何以加是日金人自河中府以馬軍八隊出城遣人招同州巡檢官白美入城議事美為言自今各守疆界無令北軍私過黄河蕭千户者言上畔即無不得過河指揮既有此橋我有千二百軍在此得指揮毋令騷擾南界地於二十里外硬探川陜宣撫副使胡世將聞之即上奏曰臣伏見金人講和今已逾年梓宫天眷未有還期本朝使命尚留金國其賀正使亦不差人迎接臣竊謂敵情不測初議難信理當過為預備昨呉玠所管右䕶軍七萬餘人控扼川口常若分布不足今移屯出川僅五萬人除秦鳳路及熙河路白石屯駐軍馬形勢相接外其餘地里遥逺老弱同行緩急勾喚不及今别行措置將分屯太逺軍兵從臣一面相度移那就近其鄜延路未發老小且令在元屯駐州軍存泊熙河别無税户從來多是蕃漢弓箭手田土自經兵火耕種稀少觀得斛斗糴買不行乞將楊政所帶二萬人分那五千人於附近本路有糧食處屯駐本路在五路最處西偏非金人衝突𦂳切控扼地方今來糴價極貴於川蜀徒使分兵太逺臣愚以為不若量留軍馬差兵官管熙州職事令政將帶精鋭就近屯駐臣昨將魚關倉斛斗二十萬石常行樁留縁每月支動一萬餘石今將利州倉月運萬石以新易舊利州所管止有十八萬餘石乞委潼川成都利路漕臣於沿流和糴一十萬石以備緩急涇原舊兵五萬人馬九千疋在五路最為强盛張中彦近以赴闕乞早别差帥臣先是世將與新除陜西轉運副使張深有太學之舊相處甚懽至是建議移屯闗中大將皆謂非便而深持之甚堅世將乃奏深頃以錢糧㢮慢得㫖令臣取勘深縁此積憾視制置司為仇敵竊慮懷恨不一别致中傷欲望罷臣宣撫司職事囬避張深舊成都潼川兩路對糴及脚錢折納米每石為錢十五引范直方之為宣諭也奏減三分之一事見八年三月及深又減其半深又白樓炤裁定右䕶軍請給則例於是諸軍出闗歸怨於建議者􅍅􅍅幾變而閬州戍卒欲殺其守臣淮康軍承宣使孫渥㑹謀泄不果世將亟下令悉如舊數不減且條上其利害大畧謂近所立新例第可減折估錢此軍折估錢舊每月為百三十萬緡臣近考見實數革去虛樁弊倖月支止計九十七萬緡即不須將士卒見請之數頒行裁損欲望斷自聖慈並令依舊庶幾恩出朝廷士心感奮乙酉殿中侍御史何鑄論士大夫奔競僥求之弊且言初改官唯注知縣謂之實厯蓋欲其改官之後更練民事以成其才雖不拘常制不得奏差此祖宗之法紹興所重建也比年以來纔得改宫求堂除差遣内則欲為寺監丞貳等官外則欲為倅貳自知縣以下皆不欲也宛轉干求寧涉歳月不願參部遂使實厯之法幾廢選人纔出身則有黄甲注擬無出身則參部射闕此亦祖宗之條今具存也比年以來選人纔出身則多欲求為行在之職無出身者又求為敕局樞屬之官未有一日考第未嘗一見吏民自此改職大則為監司太守其次猶為倅貳於法令漫不知於人情未之察傳笑於人者多矣願降睿㫖初改官人未經實厯選人未厯州縣並令赴部依法注授不得輒至朝廷干求差遣有違戻者懲一二以示必行秦檜進呈言舊法初改官須厯親民一任上曰既有成法自當遵守遂命吏部措置行之丙戌龍圖閣直學士京畿都轉運使李迨落職提舉江州太平觀迨始辭新命上固遣之及到任又與權東京留守孟庾不和先是降聖節日庾失於行香為迨所持庾方自劾迨因此規求罷去上曰迨昔守官於濟亦有風力然為人刻薄自頃被命已偃蹇今若止罷之適中其計遂有是命直秘閣舉台州崇道觀詹至提㸃永興軍等路刑獄公事至辭不行右朝請大夫陳敏識為江南東路轉運副使戊子詔司農卿莫將奉使宣力特除徽猷閣待制京畿都轉運使兼主管奉迎梓宫一行事務上曰李迨乃朕舊僚亦見朕於臣下無所偏也初命侍從兩史官各舉所知二人至是權吏部尚書呉表臣等舉左議即新知桂陽監張斛右承事郎新通判淮寧府王循友左朝奉大夫張甸諸王宫大小學教授施鉅軍器監丞歐陽興世右承郎主管台州崇道觀趙戩左宣議郎新提舉福建茶事吕用中左文林郎嚴抑左從事郎臨安府府學教授陳之淵左宣教郎吕廣問右奉議郎提舉浙西茶鹽公事徐康右從事郎監潭州南嶽廟李綸左從政郎新台州州學教授張闡左迪功郎明州州學教授王伯庠直顯謨閣馮康國幹辦行在諸司審計司鮑琚左朝請郎荆湖北路提舉茶鹽公事賈思誠左朝散郎新知臨江軍范正國右朝請郎新知南劍州李文淵等三十二人詔三省量材任使甸嘉興人抑歸安人廣問公雅孫公雅夷簡第三子仕至徽猷閣待制綸綱弟闡永嘉人伯庠次翁子琚松陽人正國純仁子也斛循友鉅興世戩用中康康國文淵已見遂以琚為軍器監臣是月壬寅正國為廣西路轉運判官甸知南劔州是月甲戍熊克小歴載甸除郡在十一月壬戌按十一月戊寅朔無壬戌克盖誤也興世守尚書都官轉外郎十二月己酉斛知鼎州尋又詔未經上殿人令引對十二月癸亥後多擢用己丑宰執奏𠡠令所已修成在京通用𠡠令乞頒降上曰朕未詳覽若欲頒降須委官詳覆恐有司行之或有誤也故追復左通直郎直龍圖閣張所特與一子官仍賜其家銀絹百疋兩先是湖北京西宣撫使岳飛言所忠義上命復舊官日厯不見此據飛奏劄修入飛又言好生惡死人之常情所以忠許國義不顧身雖斧鉞在前凜然不易其色乞與旌加褒異使天下忠義之士皆知所勸故有是命户部侍郎周聿言陜西士人學術久荒拙於為文若與四川類試必不能中程乞别立字號上曰陜西乆䧟偽境朕欲加惠逺方可令禮部措置川陜分類試額自此始詔西京諸陵文表等令内侍省每季一次遣親從官賫降故事每帝后生忌辰遣内臣徃諸陵酌獻至是以道逺遣止就付留司焉唐寅右正字陳淵入對論比年以來恩惠太泛賞給太厚匪頒賜予之費太過府庫空虛而發之不己財賦匱竭而取之益詳陵寢未成郊祀不逺内有諸將之饋外有隣境之好所用既衆而所入實寡此臣所甚懼也周官唯王及后世子不㑹説者曰不得以有司之法治之誠然是周公作法開後世人主侈用之端也臣謂冢宰以九式均節財用有司雖不㑹冢宰得以越式而論之矣若事事以式雖不㑹猶㑹也故臣願陛下凡有賜賫法之所無而於例有疑者三省得以共議户部得以執奏有司得以獻其疑臺諌得以論其失一有失當即行改正則前日之弊庶幾可息矣翌日進呈上謂宰執曰朕未嘗有一毫之妄費秦檜曰淵初除諫垣職在規正故耳上曰淵老成有學乃楊時之婿聞嘗講論語中庸可令其子適進來上因論極高明而道中庸此不可分作二事檜等曰陛下之學深造聖域非臣下所及時適監都進奏院遂命臨安給劄上之熊克小厯載上語於己丑恐誤日厯十一月甲申乙酉丙戌輟朝己丑廖剛本職進對庚寅陳淵進對辛夘臣僚上言賜賫等事有㫖依奏同日令楊適録進論語等解詔故左承議郎秘書省正字兼史館校勘常明特與一子初品宫明卒於行在給事中馮檝祕書省承劉才邵等言明去鄉萬里母老子㓜乞用梅堯臣劉恕例録其孤故有是命才邵廬陵人也壬辰吏部侍郎周剛為山園陵按行使入内内侍省都知梁邦彦為副使始命邦彦充使邦彦言事干典禮委付至重乞如故事命近臣故有是㫖左承事郎姚邦基特改左奉議郎樓炤之出使也言邦基不仕偽豫之節故召對而命之邦基先見建炎四年九月選人魏申進太一總鑑上曰申所論該博雖秘府所藏亦未之見可與循資仍賜錢五百緡癸巳檢校少保昭化軍節度使充醴泉觀使駙馬都尉潘正夫開府儀同三司初孟忠厚之守鎮江也給事中劉一止言后族業文如忠厚不可多得但此例一開有出忠厚下者何以禦之至是又論正夫除拜非舊典乞特降處分後人毋得援例自今除授有非舊制並令給舍臺諫論駮乃詔哲宗皇帝昭慈聖獻皇后惟正夫忠厚為近親餘毋得援例御史中丞廖剛曰是臺諌所當言者皆為劉君先矣一止在瑣闥僅百餘日事有不便者輒繳奏由是秦檜忌之左朝奉郎新京畿都轉運使莫將改充集英殿修撰右正言陳淵言將未應除次對望須其績著然後命之雖徃者尹焞亦自卿聨命以此職由焞先除從班以疾力辭老不可留故以寵之命將宜除近下職名庶合公論武經大夫濰州圑練使王彦先自亳州來朝甲午秦檜奏神宗哲宗兩朝正史乞俟徽宗實録書成之日通將三朝事實考據修定從之時史館已分修兩朝正史於是復罷熊克小厯載此叚乃云秦檜奏神宗哲宗實録已進今乞專修徽宗寳録不知何謂乙未徽猷閣待制提舉江州太平觀李正民知淮寧府朝奉大夫申暘知亳州暘已見今年四月直祕閣新知亳州王俊民知常州癸夘詔樓炤疾速赴行在熊克小厯載此事於十一月辛酉按十一月無辛酉辛酉乃十二月十五日炤不應許時未還今從日厯詔陜西李彦仙廟名義烈鍾紹庭廟名愍忠同州鄭驤廟名愍節皆以户部侍郎周聿上其死節也紹庭靖康初以朝議大夫通判陜州權州事死於難彦仙死事具紹興元年驤死事具建炎元年乙巳右朝散大夫曽慥行尚書户部員外郎總領應辦湖北京西路宣撫使司大軍錢糧時户部員外郎邵相在鄂州以之軍儲為宣撫使兵飛所劾言者亦論相到官以來追催積欠侵奪𣙜酤故以慥代之中書舍人又劾相坐視諸路違欠數多並不按劾後二日奪相直祕閣令吏部與逺小監當言者論相罷總領在此月乙酉今聯書之相為岳飛劾奏據洪邁夷埾志所言今以臣僚所劾行下者蓋不欲令出於將帥之意云耳十有二月己酉左諌議大夫曽統徽猷閣待制知婺州左承議郎福建路轉運判官張嵲為尚書司勲員外郎御史中丞廖剛言國朝治平以來詔三歳一舉士自是率用今年大禮明年科塲又明年省殿試故䕃補與登第人徃徃先後到部於注授為便而漕司嵗費亦無相妨誠經逺之計昨建炎元年殿試為軍興展至明年就維揚試紹興元年殿試為明堂又展一年就臨安府試今明年當試進士復與大禮相妨且省司財計難以應辦此不便一也近嵗初官人率待四五年闕若奏名人與䕃補人同時到部愈見差注不行此不便二也儻更展一年則大禮科塲省殿試皆得如古制矣况來年不獨舉大禮且山陵營奉有日豫備兩宫回鑾差官置局日分亦恐不給安得不權時而制宜哉兼河南陜西士人各罹亂政學業荒廢姑緩一年亦無不願詔禮部討論申省明年二月壬戌施行甲寅權尚書刑部侍郎蘓擕充徽猷閣待制致仕以病自請也擕尋卒太常丞梁仲敏乞續編紹興以來因革禮從之資政殿學士提舉臨安府洞霄宫盧益薨於嚴州丙辰詔臨安府司户參軍毛叔度令引對叔度奏疏曰臣竊見迺者藍公佐還自敵中王倫獨留逺近之情無不疑懼大抵國家所以待金人者不過二端曰戰與和而各有説也自宣和以來敵人常以反覆變詐困中國㗖我以土地要我以厚利一旦兵力得騁則長驅深入暴犯宫闕震驚陵寢邀遷兩宫竭取金幣中原之民肝腦塗地所謂不共戴天之讎何可和也然而梓宫未卜因山兩宫逺在絶漠如敵人革心易慮奉梓宫兩宫而歸之國家陛下亦宜含憤匿怨不得已與之和此一説也去年使人之來道路之言以為其國主議之臣厭前日黷武之禍翻然改圖有休兵息民之意且其約曰歸我梓宫歸我兩宫一無所邀請陛下篤於聖孝不億不信含憤匿怨屈而與之和謂奉迎之使朝發而梓宫可以夕返也今閲時寖乆未聞屬車之音而使者見留反更有所計議揆前日之約其言無不信者臣實惑之豈其國權臣自相誅夷而前日之議遂變歟抑敵情詭詐復欲挾我所重依違反覆以罷敝中國歟如其前議既變則和好之事自無可望茍為不然宣和靖康之間敵人己試之謀其迹較然不可不察也自艱難以來費用益廣根本所積不能有餘儻謂敵人要約未有顯絶中國之意猶欲遣使賂遺幾其革心臣恐使軺亟行而輕騎自屈萬一嵗時之間國用既虛邊備不戒敵人出吾之不意以犯江淮之邊未知倉卒何以待之伏望陛下追監既逺思患預防慨然發憤明出宸斷修兵備以杜其窺􅎿之漸謹財用以待吾軍旅之費無或贈送以伐其貪婪之謀天下幸甚叔度明年八月壬申對移丁巳詔保州宗室令吏部先次注官時翼祖子孫渡江者十數人有官者四人而已宗正丞鄭鬲乞權依兩京宗室例注官故有是命鬲初見三年十一月甲戌武功大夫忠州圑練使知河南府翟襄移知壽春府日厯無襄前銜此據襄乞上殿劄子修入朝奉郎河南府路轉運判官李利用兼權知河南府及本路安撫西京留守司公事先是觀文殿學士西京留守孟庾權東京留守及朝廷聞王倫為金人所執召翟襄還乃命利用武翼大夫忠州刺史知壽春府孫暉領文州圑練使為河南府路馬步軍副總管仍命暉招軍千三百人是時有酈瓊判軍為劉豫放歸農者又豫之廢使効免歸者甚衆皆願投募暉未至西京人數已足矣庚申右武大夫忠州防禦使提舉台州崇道觀王健為樞密副承㫖辛酉參知政事李光罷光與右僕射秦檜議事不合於上前紛争且言檜之短殿中侍御史何鑄因劾光狂悖失禮光引疾求去上命以資政殿學士出守言者又擊之後三日以光提舉臨安府洞霄宫免謝辭時右正言陳淵獨不論光之過檜疑之陳淵獨不論光熊克所書云爾廖剛為中丞不知有無文字當考壬戌言者請宗室之散在州縣者並令津遣歸所屬宗司増其廪稍庶幾知自貴愛詔禮部措置後不行宗正丞鄭鬲乞以常平錢於民輸賦未畢之時悉數和糴從之上謂宰執曰常平法不許他用惟待賑荒恤饑取於民者還以予民也戊辰祕書丞劉才邵言累朝㑹要已至熙寧而元豐以後者未次若置局則有官吏廪給之費望令館職接續編類從之熊克小厯載此事在甲子今從日厯己巳給事中兼侍講劉一止起居郎周葵並罷初一止葵皆以言事忤秦檜二人應詔舉左宣教郎吕廣問廣問嘗為李光屬官光欲除館職檜不許殿中侍御史何鑄即奏二人非知廣問特迫於光之囑而舉之是欺陛下也詔一止葵落職與宫祠直徽猷閣新陜西轉運副使李唐孺為四川轉運副使直徽猷閣主管台州崇道觀霍蠡為陜西轉運副使直徽猷閣新除陜西轉運副使張深知瀘州用川陜宣撫副使胡世將奏也事見十月癸未既而言者又奏深狥私廢法之罪深遂罷去日厯張深明年正月庚寅罷知瀘州而不見除日劾疏有云近又除知瀘州則必此時也按霍蠡除陜漕實以代深故因胡除命遂書之須求他書參考徽猷閣直學士知慶陽府趙彬陞顯謨閣直學士以破慕容洧之勞也叙郢州防禦使辛企宗為福建路馬步軍副總管是冬金主亶論其政省自今四時㳺獵春水秋山冬夏巴納並循遼人故事巴納者契丹語所在之意也元帥府下令沿河置寨防托渡河南歸之人及與人渡者皆死海㓂張青乘海至遼東偽稱王師遂破薊州遼土大擾中原之被掠在遼者多起兵應之青初無進取之意既而復去金主亶詔郡縣不得從元帥府擅便簽軍俟見御畫乃聽時太行義士王忠植已取石州等十一郡聞於朝上嘉之拜忠植武功大夫華州觀察使統制河州忠義軍馬忠植步佛山人也初金人之割地也以新河為界朔方盛傳御駕北征民間徃徃私結徒黨市軍器以備緩急沿河尤甚每遇隂晦輒引領南望曰御營烈火光矣太行義士又攻懷州萬善鎭破之守臣烏凌阿思謀率軍民城守思謀自金國内亂每夜披衣而坐喟然嘆曰可惜官人備厯艱險以取天下而今為數小子壞之我未知其死所矣官人謂尼瑪哈也知濬州韓常嘗與防禦判官宫茵夜飲論及江淮川陜用兵等事茵盛言金兵之强官兵之弱常曰君知其昔未知其今今之南軍其勇鋭乃昔之我軍其怯懦乃昔之南軍所幸者南方未知耳茵益都人也女眞萬户呼沙呼北攻䝉古部糧盡而還䝉古追襲之至上京之西北大敗其衆於海嶺金主亶以其叔呼喇美為招討使提㸃夏國塔坦兩國市場塔坦者在金國之西北其近漢地謂之熟塔坦食其粳稻其逺者謂之生塔坦止以射獵為生性勇悍然地不生鐵故矢鏃但以骨為之金人初置市場與之囘易而鐵禁甚嚴至金人始弛其禁又劉豫不用鐵錢繇是河東陜西鐵錢率自雲中貨於塔坦塔坦得之遂大作軍器焉是嵗直祕閣王岡引年告老許之後二嵗卒於家此據岡墓誌修入日歴未見建炎以來繫年要録巻一百三十三金人地名考證巴納原書作刺鉢巻一百三十七作捺鉢與金史同並誤今改正烏凌阿原書作烏林誤改見巻一尼瑪哈原書作粘罕誤改見巻一呼沙呼原書作湖沙虎誤改見巻一百十七䝉古原書作䝉兀誤改見巻九十六呼喇美原書作胡盧馬巻一百九十三又作忽刺馬並誤今改正塔坦原本作韃靼誤改見巻五十八建炎以來繫年要録巻一百三十三
