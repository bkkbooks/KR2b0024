body:
  text: 建炎以來繫年要録巻一百八十五宋李心傳撰紹興三十年夏四月按是月戊申朔己酉皇孫右監門衛大将軍榮州刺史愭為蘄州防禦使右監門衛大将軍愷為貴州圑練使右内率府副率惇為榮州刺史皇孫女碩人進封永嘉郡主庚戌户部言左蔵西庫見在錢銀止可支至明日約至月終闕錢一百二十六萬餘緡乞下𣙜貨務場於入納到茶鹽并樁管錢銀内預借百司諸軍七月八月分劵食錢同日後到來綱運應付支遣從之日歴四月二日庚戍户部状左藏西庫錢銀止可約支四月三日終今刪潤附此百司諸軍劵食錢毎月朝廷於務場應副三十七萬緡状稱近已預借到六月未知預借起於何年當考辛亥尚書左司員外郎方師尹專一㸃檢措置贍軍酒庫壬子秘書丞劉珙左奉議郎知大宗正丞祝公逹並守尚書吏部員外郎詔天申莭州縣並免排宴以上在諒闇故也甲寅紹興府奏以浙東提舉茶鹽司為恩平郡王府第從之乙卯秘書省校書郎兼權建王府教授史浩守尚書司封員外郎兼建王府直講秘書省校書郎兼權建王府教授魏志為祠部員外郎兼賛讀一日浩講周禮至酒正因言膳夫掌膳羞之事嵗終則㑹惟王及后世子之膳羞不㑹至酒正所掌飲酒之事嵗終則㑹惟王及后之飲酒不㑹而世子不與焉以是知世子之膳羞可以不㑹而世子之飲酒不可以無莭也王作而謝曰敢不佩服斯訓丙辰參知政事賀允中兼權同知樞宻院事以葉義問使北也尚書吏部員外郎劉珙秘書省校書郎王淮並守監察御史丁巳詔以顯仁皇后升祔禮畢親屬於后為子行者遷三官孫行二官餘人一官於是進秩者十有四人授官者三人諸女諸婦封夫人者九人令人三人安人五人龍圖閣待制四川安撫制置使兼知成都府王剛中陞敷文閣直學士剛中重修成都城是月始畢週四千六百文有畸熊克小歴載剛中進職在去冬蓋誤詔恩平郡王璩恩數請給並依前宗室士㒟例璩奏一行官吏請給乞令紹興府以上供經制錢支從之璩奏乞在乙夘日辛酉資政殿學士知潭州魏良臣言根括到本州民間開耕荒田七十八萬餘畝自今年為始起理二税計増茶鐵錢絹米草共六萬六千六百斤貫匹石束外有荒田四十六萬餘畝據人户自陳實無力開耕願納入官已依條出賣仍免三年税賦從之右朝請大夫沈邦直知黄州乙丑詔自今臣僚陳乞上殿令徑投状通進司不許於都堂納劄子永為例秘書省正字馮方劉度並為校書郎秘書省校書郎王十朋兼建王府小學教授先是教授入講堂則與皇孫敘賓主而教授居賓位十朋不可王特為之加禮而位教授於中崇慶軍承宣使安定郡王令詪提舉江州太平興國宫從所請也殿前司凖備使喚李師顔師雄並為閤門祇候二人皆顯忠子特録之初命户部於鎮江建康各别儲米百萬斛以備水旱助軍食其後鎮江所儲至九十五萬餘建康所儲至六十二萬餘至是左司員外郎方師尹言户部及漕司頗有借兑乞令户部措置補還從之丙寅右武大夫貴州防禦使殿前司摧鋒軍統制兼知循州張寜主管台州崇道觀以病自請也寜守循州凡十年丁卯武經郎閤門宣賛舍人殿前司正将郭振為摧鋒軍統制兼知循州用楊存中薦也徽猷閣待制提舉成都府玉局觀劉觀充敷文閣直學士觀奉祠里居屢召不至詔觀建炎初為侍從任待制三十年亷靖自守時推老成特有是命右文殿修撰孫覿告老復敷文閣待制致仕後三日不行戊辰進士梅綰特補将仕郎綰韋淵館客投匭自言嘗䝉顯仁皇后許以恩顧故有是命庚午龍神衛四廂都指揮使鎮南軍承宣使鄂州駐劄御前前軍統制李道為荆南府駐劄御前前軍右軍統制先是朝廷以彈壓茶冦為詞命田師中遣道以所部五千人戍荆南府至是帥臣劉錡奏改為前軍右軍以道統之於是荆南之戍合錡所募効用為萬有一千人然猶未成軍也右武大夫添差利州路兵馬鈐轄呉挺為利州東路駐劄御前前軍同統制用都統制姚仲請也辛未左朝請郎兩浙西路提㸃刑獄公事吕廣問直祕閣為兩浙路轉運副使初顯仁皇后既掩攅宫而大理少卿張運因請建立四隅其中皆屬禁地乃撤籬寨而甓城之四隅之内有士民邱墓八百餘判太史局李繼宗謂並在國音風水形勢之間悉合挑去顯謨閣學士知紹興府王師心言其間形勢廹近者不可不去或地里稍逺山隴隔絶望視不見恐在隂陽家了不相干乞委太史局再行覆視如無妨礙取自聖裁詔可張運見請不知在何時改墻寨作塼墻亦不見降指揮月日此據今年正月八日二月二十日檢察宫陵所状中所云修入王師心申明正月五日甲申行下既而檢察宫陵所言紹興府續根括到墳冡通約一千餘處正月八日丁亥太常少卿都民望時為左司諫請委太常禮官與本府官同太史局公共按視定奪聞奏庶㡬攅宫大事舉合先王典禮不至專徇隂陽相罔之説正月九日戊子乃命權太常丞呉曽偕太史局官楊彦民徃視之曽言已挑之冡九十二未挑者八百六十四内七百四十五冢相去稍逺崗隴遮映欲依宫陵故實攅宫近例更不挑移昭慈禁地内有小墳四所永祐禁地内有六所並不曽遷改其西北一百一穴彦民以謂依經合挑臣等非隂陽伎術之流禮經不載難以定奪欲望更加詳定詔本府更切相度如係崗隴遮映稍逺處亦免挑移正月二十八日丁未降㫖後二日檢察宫陵所又言竊本府不知經意乞令彦民等四人與王師心同共相度指示正月三十日己酉既又遣殿中侍御史汪澈将李繼宗徃看定之三月七日丙戍至是還朝澈上奏言攅宫之地舊占百歩亦有士庶之墳在其間經今三十年無有議其非者去冬新立四隅囬環不啻二十里居民寸土尺木率入於官而今皆為禁地乃謂其間邱墳盡合挑去何前後之不相侔耶臣書生素不曉方技請以史傳及祖宗故事明之秦樗里子葬于渭南漢興長樂宫在其東未央宫在其西當時不聞遷其墓也今七百餘穴皆在禁地一旦悉令挑去恐頓泄地氣兼於人情未安乞從本朝宫陵儀制所載民户舊墓願遷出者聽令自陳不願遷者仍舊上從之事祖已見去年十一月丙午今年十月朔王師心奏凖詔遷移攅宫附近士庶墳墓倍給價直已於城下兩縣根刷無用官山許令就葬與此差不同更當詳考言者論廣西轉運司昨申明将攝官四十一闕差選人小使臣其請給比攝官數倍州郡難以支吾且失攝官榮進之望乞依舊注攝官從之壬申太常博士杜莘老守秘書丞莘老因對又及江淮守備上曰卿毎言必及此憂國深矣議者以為川廣荆湖毎嵗漕綱至行在者既入浙江即湏守閘且有沮淺之患而建康府溧陽之鄧歩溧水之銀林皆有陸路止二十里乃舟楫經從之地謂宜於此地置轉般倉兩處中間陸路舊曽開通見有溝港可考問其所廢之由則曰宣州地髙毎遇水漲無以遏水為患於湖州等處臣謂只當留最髙處二三里不必開通以為倉基則般運尤易又言建康上供米自溧陽一夕而可逹宜興廣德軍上供米自西安一二日而可至湖州皆於兩浙漕司撥船般運不數日而可至誠為利便詔江東轉運司相度癸酉詔建王嵗賜公使錢三千緡逐月均給其初除推恩合得承信郎四人令依例陳乞左奉議郎沈樞言新除福建路提舉常平茶事縁常字係父名詔特不囬避右朝散大夫曽緯知台州令赴都堂禀議訖之任丁丑左朝散郎江南西路提㸃刑獄公事黄應南言奉詔覆視吉州應賣官田三千六百五十餘頃計直一百三十八萬餘緡内已有人承佃一千三百十七頃計直三十一萬緡乞減價直三分無人承佃荒田山林陂澤二千三百四十一頃計直六十萬餘緡乞别行估定從之議者謂魏安行虛張其數實非可售之田應南懲王傳之罷而不敢斥言之也事祖已見二十九年十月己卯今年十一月辛巳王傅知建州明年四月丁丑魏安行罷江東漕是月詔建王賜字元瓌玉牒在此月日歴不書五月按是月戊寅朔己卯御史臺檢法官張闡右正言沈濬並為尚書吏部員外郎先是濬言新除兩浙漕臣湯允恭不孝其母詔刑部侍郎黄祖舜覈實祖舜言允恭無不孝事迹不應罪之遂罷濬言職濬求去乃除知舒州濬補外在是月戊子左從政郎苪曄行國子正左廸功郎陳騤為國子録初淮東馬歩軍副緫管劉光輔既至楚州因招集叛亡是日歸明人呉臯率其黨持兵毆鬬北神鎮居民為之驚避已而其黨殺之金人尋復東海縣事聞移光輔江南東路副緫管饒州駐劄光輔移官在六月壬戍日厯不書所以此據徐宗偃兩淮紀實修入辛巳上書玉堂二字賜翰林學士周麟之麟之奏依淳化故事就都堂宣示宰執仍以石本分賜侍從館閣官從之左從政郎新紹興府府學教授徐履右從事郎陸游並為勅令所刪定官游山隂人也太尉知荆南府劉錡兼本府駐劄御前諸軍都統制先是領殿前都指揮使職事楊存中建言諸重地如四川鄂渚池陽建康京口皆已宿兵嚴守獨荆南歴代用武之地今為重鎮而九江上流要害之地緩急不相應援請各置都統制以廣屯備朝廷從之荆南府江州剏軍自此始忠訓郎趙廞趙庾並為閤門祗候二人皆宻子特録之詔建王府官吏各轉行一官資白身人補進武校尉故左太中大夫李椿年曽開各與子孫恩澤一資以吏部言寄禄皆侍從坐責死其遺澤當取裁也初給事中王晞亮詳議薦舉縣令事事祖見二十九年九月壬辰乞以山隂等四十縣並堂差卿監已上薦舉之人京官任滿無遺闕與減二年磨勘選人到任及一年與循資任滿無遺闕與減改官舉主一員如政績優異許監司郡守同銜奏聞别與陞擢癸未從之甲申編管人前直秘閣汪召錫死於容州乙酉初置江州駐劄御前諸軍都統制一員以殿前及歩軍司兵各三千人馬軍司及新招兵各二千人𨽻之以龍神衛四廂都指揮使寜武軍承宣使侍衛歩軍司前軍都統制戚方為江州駐劄御前諸軍都統制江州剏軍及戚方除命日歴全不見但於此月庚寅書馬軍司奏依已降指揮撥官兵三千人前去江州辛卯又書殿前司奏依已降指揮差官兵三千人前去江州歩軍司奏都統制戚方已差江州駐劄其闕未差人乞差張玘充本軍統制而趙甡之遺史方除江州都統在此日今從之王曮撰楊存中神道碑云王建言荆南九江各置都統制朝廷從之戍卒皆三衙分遣他司率汰羸弱以徃王獨以全隊精鋭行按荆南剏軍乃是劉錡先募効用六千人又馬軍司遣戍千人鄂州移屯前軍五千人既又以贛州左翼循州摧鋒軍𨽻之未嘗於三衙分遣循贛兵雖𨽻殿司其實但遥為節制碑蓋有所縁飾也今不取丙戌出内庫銀十萬兩下兩浙轉運司糴馬料大麥初直祕閣江淮等路提㸃坑冶鑄錢李植以廵歴過行在言嵗額錢内蔵庫二十三萬緡左蔵庫七十餘萬緡皆是至道之後額數自紹興以來嵗收銅止及二十四萬斤鉛二十萬斤錫五萬斤此最多之數紐計鑄錢一十萬緡外有拘到諸路銅噐二百萬斤搭以鉛錫可鑄六十萬緡乃暫時所拘乞據逐年所産權立為額事下工部至是本部言若依所乞委是數少且以酌中之數五十萬緡為額從之戊子賜江東轉運司銀七萬兩糴大麥二十萬斛殿中侍御史汪澈言攅宫四隅之内良田千畝耕植盡廢非惟可惜亦恐将來山林蓊宻人迹不通為虎狼窟穴盗賊潜伏之地乞募民承佃嵗收米斛可給衛卒數百人猶有餘饒又乞倣典故命官兼陵臺令凡攅宫公事盡以委之詔禮部太常寺議其後紹興府按視得良田八百餘畝請以付泰寜寺捐其税量納官租以贍衛卒其餘皆與之得㫖在七月辛丑今併書之仍令㑹稽知縣兼帯主管攅宫事務初金主遣殿前右副都㸃檢蕭榮等來賀上生辰命權工部侍郎黄中充接伴使榮等當謝錫宴故以天暑為辭欲拜宇下中持不可乃拜於庭中是日榮等過平江欲觀姑蘇臺百花洲非例也中許之此以中墓誌及國信所状參修辛卯參知政事賀允中免兼同知樞宻院事以同知樞宻院事葉義問将及境也初義問入北境見敵已聚兵有入犯意及還宻奏敵人以尅剥不恤為能以殺戮不恕為威窮奢極侈似秦隋之所為如燕京已劇壮麗而修汴京伐木琢石車載塞路民勞而多死於道天人共怒觀此豈能久也又海州賊黨未盡而任契丹出沒太行臣去時聞破濬之衛縣囬時聞破磁之邯鄲北使三人皆被賊傷奪去銀牌不驚南使在處不寜今欲遷汴京且造戰船敵人皆有深意以臣度之若果遷都則在彼已失巢穴今江淮既有師屯獨海道宜備臣謂土豪官軍不可雜處土豪諳練海道之險憑藉海食之利能役船户平日自如若雜以官兵彼此氣不相下難以協濟今欲於江海要處分寨以土豪為寨主令隨其便使土豪撓於舟楫之間官兵扼於塘岸之口則官無虛費民無横擾此䇿之上者也兵部尚書兼權翰林學士楊椿言於右僕射陳康伯曰北朝敗盟其兆已見今不先事為備悔将何及因與康伯䇿所以防慮之術其一兩淮諸将各畫界分使自為守其二措置民社宻為寓兵之計其三淮東劉寳将驕卒少不可專用其四沿江州郡増壁積糧以為歸宿之地康伯見上言敵謂我和好滋久而兵備弛其南牧無疑因條上兩淮守禦之計上嘉納之熊克小歴載楊椿四䇿於紹興三十一年四月蓋因陳良祐撰椿墓誌書此事於除參政之後而椿以是年三月執政故也然劉寳紹興三十年十月已罷鎮江都統則非執政後所上明矣詳考良祐所書有云三十一年拜參知政事未㡬朝廷再遣樞臣葉公義問報聘歸言金已聚兵境上公語左僕射陳康伯云云則椿所議實在此時而良祐誤記之也又按康伯此時為右僕射而左相乃湯思退不知何以全不與聞當考殿中侍御史汪澈亦條陳利害曰慮之有素則事至而安靜慮之無素則事至而倉卒靖康之變可為龜鑑今舊将自和好以來各擁重兵髙爵厚禄坐而寵榮飬成驕志朝廷宜有以攝其心服其氣戰士以伎藝囬易專於雜役而又有老弱疾病之不汰逃亡之不補宜有以蒐閲之使有鬬心而樂為用文武職事平居常患其多差除不行臨事要人則悟其無有當務選實才不宜泥資格視閥閲緩急非有益議者謂三者皆當今急務中興聖政龜鑑曰安石既去而珪確之行新法自若也子厚既去而曽布李清臣之紹述自若也主和誤國固檜之罪今檜死矣改圖可也而當國者執政如初是一檜死而一檜復生也紹興末年逆亮新立營汴久矣湯思退沈該之徒豈不知金将有叛盟之志特恐和議敗則張浚之徒進而已復退此其用心是即秦檜之用心也張浚論事而二相笑以為狂且加竄斥至紹興二十九年孫道夫使金囬言金将求釁於我未㡬黄中再使囬又言金治汴兵矣不數日可至淮上而時宰且詰之曰沈少監歸不聞此言公安得為此而不之信王綸阿附妄言鄰國恭順和好無他而湯思退遽爾稱賀此正趙子砥所謂金人講和以用兵我國歛兵以待和也及至葉義問使還見金已聚兵有入犯意於是右僕射陳康伯言敵謂我和滋久兵備弛其南牧無疑因條上兩淮守禦之䇿而遣将命帥始皇皇焉吁二十年講和之久張俊岳飛徃矣觧潜呉玠死不復生劉錡顯忠擯不復用意其頺敗廢棄之餘無復英鋭果敢之氣而一日分屯列戍四川則有王剛中襄陽則有呉拱江淮則有劉錡海道則有李寳蜀則有呉璘姚仲王彦江則有戚方王權李顯忠雲合響應氣勢翕張則知人心忠義雖更秦檜銷鑠之餘而亦不能使之冺沒也是日大雨於潜臨安二邑山水暴至夜安吉縣洪水作居民屋廬多壊人死者甚衆後四日詔轉運司賑䘏之其田决為溪者蠲其税壬辰太常丞呉曽特降一官先是曽奉詔與太史局丞楊彦民等按行攅宫地彦民等妄乞挑去民間冡墓曽依隨奏聞故黜之癸巳左奉議郎任文薦提舉江南西路常平茶鹽公事修武郎姚公興為右武郎公興仲子也甲午殿中侍御史汪澈言監登聞鼓院王直中奴事丁禩嘗知金壇縣彊取士人家書畫古噐以奉王曮詔放罷北使之過淮浙州縣也居人皆闔户不出使者以為言國信所奏其事詔尚書省行下並毋得閉門趙甡之遺史紹興三十一年五月王全髙景山來賀生辰也自入境有兇悍之状過平江秀州舟中以弓矢射夾岸居人官司莫敢誰何但報告居人闔户而已不知即此年事甡之誤繫之明年或自是兩事也姑附此當考白身人林觀特補承信郎時海賊陳演添等掠髙雷境上觀為所執既而殺演添及其黨聚被掠者九十餘人歸南恩州故有是㫖乙未直秘閣新京西轉運判官王秬知江州上以江州新戍大軍兵民雜處故選秬守之左朝散郎知隨州蒋汝賢為京西南路轉運判官兼提刑提舉常平公事丙申金國賀生辰使輔國上将軍殿前右副都㸃檢蕭榮副使中大夫太子右諭德張忠輔入見自休兵以後北使見紫宸殿設黄麾仗千五百有六人至是以未純吉不設仗既見置酒垂拱殿時建王侍燕榮等望見聳然曰此為建王邪竟夕不敢仰視戊戍天申節百官及北使上夀以顯仁皇后喪制未終不用樂初上以在諒闇欲不受禮而羣臣援景祐故事請之榮行復命黄中送伴還言敵日繕兵不已且其重兵皆已南下宜有以待之庚子右廸功郎勅令所刪定官王秬特改右承務郎令後省召試秬以薦對故有是命既而秬言朝廷久無此例力辭乃以為樞宻院編修官秬除秘編在六月癸酉辛丑秘閣修撰知明州張偁提舉台州崇道觀從所請也壬寅特進沈該落致仕復觀文殿大學士判明州仍令該疾速便道之任癸卯左中大夫湯鵬舉落致仕提舉臨安府洞霄宫甲辰左宣教郎張戒主管台州崇道觀乙巳江州駐劄御前諸軍都統制戚方入辭上諭以淮西民兵事事見三十九年十二月方乃遺官籍以教之自蘄州始而蘄州守臣以為不便奏罷之遂止丙午寜武軍節度使提舉佑神觀呉蓋為太尉六月按是月丁未朔戊申宰執奏殿前司申明州水軍内福建秋蘆延祥兩寨効用軍二年一替今到軍年餘方知紀律欲候滿日更留一年上曰𤓰時而徃及𤓰而代二年一替軍人望之久矣今将及期而改是上失信而下失望也遂令更戍如期庚戍用右文殿修撰知臨安府錢端禮議復令𣙜貨務給降諸軍見錢公據闗子三百萬緡為楮幣張本淮東緫領所四十萬緡淮西湖廣緫領所各百二十萬緡平江府宣州各十萬緡聽商人以錢銀中半請買右朝議大夫直敷文閣主管台州崇道觀李邦獻特降一官邦獻在江西舉吉州軍事推官郭珣瑜改官溢格為吏部侍郎洪遵所劾故有是命右通議大夫林乂卒詔特與恩澤一資用吏部請也日歴於正月四日辛巳先書吏部取㫖與乂遺表恩澤而乃於六月三日庚戌方立傳必有一誤或可移此併曽開李椿年與恩澤兼書之壬子監察御史王淮守右正言忠訓郎戚世傑成忠郎戚世顯並為閤門祗候二人皆方之子也甲寅左奉議郎提舉淮南東路常平茶鹽公事任盡言與宫觀以御史中丞朱倬論其託詞攘闕也事見今年三月丁亥乙卯殿中侍御史汪澈言通判平江府劉敏求嘗自言年一百八嵗設或妄誕亦不下八九十宜優與祠禄俾之就閒詔敏求與宫觀理作自陳丙辰石武郎呉掖為右武大夫掖挺兄用其父璘所遷官囬授也己未直敷文閣知揚州魏安行為江南東路轉運副使左武大夫武康軍承宣使權知廬州劉綱移知揚州直秘閣知蒋州龔濤知廬州右朝奉郎淮南路轉運判官張祁直秘閣辛酉昭信軍節度使領閤門事曹勛提舉萬夀觀免奉朝請壬戍三司申明逃亡軍人首身之限上謂宰執曰朕始見此法未深曉其意使出人主一時恩宥人猶不測著為定法是教之逃也因顧王綸曰卿觧之否蓋不如此即此曹聚而為盗始知祖宗用意深逺樞宻院檢詳諸房文字陳俊卿為監察御史左朝散郎知處州葉顒移知常州敦武郎監盱眙軍淮河渡郭貫之為兩浙西路兵馬都監忠翊郎夏俊監盱眙軍淮河渡此本不必書為欲見夏俊取泗州事始俊被差月日不見於日厯因郭貫之改除遂書之賜江州都統制戚方軍中錢二十萬緡銀布各五萬匹兩為囬易本癸亥少傅濾川軍節度使中太一宫使榮國公錢忱遷少師仍舊節致仕給真俸忱仁祖之甥再世位将相子登從列孫女為皇孫愭婦故恩數視戚里特優焉乙丑閤門祗候劉士元為武林郎士元寳之子也丙寅上謂宰執曰嵗方六月禾稼未登聞已催民間積欠可令諸路轉運司徧下州縣候秋成日催理庶㡬民不告乏湯思退曰陛下恤民一至於此天下幸甚處州麗水縣童子楊富老七嵗喪父哀慕不已夜則露卧冢前不避雨雪州上其事于朝詔賜束帛丁卯國子監主簿薛良朋為御史臺檢法官兼主簿武翼大夫貴州刺史兩浙西路馬歩軍副都緫管張掄知閤門事戊辰左朝奉郎知嘉州何逄原為成都府路轉運判官直秘閣知眉州計有功為利州路轉運判官己巳左武大夫昭慶軍承宣使入内内侍省押班董仲永提舉佑神觀免奉朝請庚午知樞宻院事王綸充資政殿大學士知福州綸引疾求去故有是命辛未户部奏下湖廣緫領所取撥江西折帛經緫制錢各二十萬緡廣東湖南經緫制錢各五萬緡江州轉般倉取撥樁管江西上供米六萬石並充江州戍軍支用從之仍令湖廣緫領所遣屬官一員徃江州應副折帛錢及米三萬石乃五月辛卯科撥今併書之壬申中侍大夫武當軍承宣使利州西路駐劄御前中軍統制李師顔知夔州師顔初用楊椿薦召還未至而有是命降授左中大夫沈調復左太中大夫以期叙也故太尉武泰軍節度使郭仲荀贈開府儀同三司仲荀薨十五年矣至是其孫成忠郎永茂投匭自訴故録之癸酉翊衛大夫忠州防禦使呉琦知巴州丙子尚書祠部員外郎兼建王府賛讀魏志卒秋七月按是月丁丑朔戊寅詔明州水軍三百人戍崑山黄魚垜廵捕漕船作過嵗一易初命鎮江軍中遣戍而都統制劉寳不奉詔故更發焉此據寳劾疏左武大夫武康軍承宣使新知揚州劉綱卒己卯上謂輔臣曰劉綱在淮西團結民社措置有方未到揚州聞已物故深可傷憫同知樞宻院事葉義問對曰臣採之衆論有許世安可以代之臣近招與語其人病體已安議論通曉必可倚仗上曰世安老将與成閔王權等輩向甚立功頗得淮南人情且除淮東緫管因令權知揚州觀其措置民社事然後用之尋賜綱家銀帛二百匹兩辛巳建武軍承宣使許世安添差淮南東路馬歩軍副都緫管揚州駐劄壬午尚書禮部員外郎洪邁兼國史院編修官宗正少卿金安節帯御噐械韓俁並復所貶秩乙酉詔諸路禁兵以其半教習弓弩令帥臣春秋遣将官廵行按試右承議郎知通化軍康杉主管台州崇道觀從所請也武顯大夫荆湖北路兵馬鈐轄兼權知荆門軍魏震移知鼎州右朝奉郎監饒州浮梁縣景德鎮税務莫濛知通化軍降授左朝散郎主管台州崇道觀姚岳知荆門軍丁亥初立大理少卿拘催贓罰錢减年格舊贓罰錢旬輸左藏庫至是少卿張運視事數月所輸至二十萬緡言者乞比附諸州守貳起發無額錢例推恩故有是㫖右文殿修撰知臨安府錢端禮權尚書户部侍郎直秘閣兩浙轉運副使黄仁榮陞直敷文閣知臨安府給事中王晞亮與外任以殿中侍御史汪澈劾其素無亷耻在𤨏闥踰年無所封駮故也晞亮乞宫觀改提舉江州太平興國宫庚寅直秘閣知鎮江府鄭作肅主管台州崇道觀作肅與劉寳不協自請之也直秘閣知衢州趙公偁知鎮江府右承議郎提轄行在雜買貨務葉林罷林著子也中書舍人沈介言林乃蔡京外孫雖陛下天覆地載推罪不相及之恩亦豈可使之官於天朝遂罷其命壬辰尚書左司郎中方師尹罷師尹兼㸃檢贍軍激賞酒庫奏辟右宣教郎新知海鹽縣何侑等三人為監庫官侑等皆新改京秩右正言王淮以其不當辟奏劾之且論師尹奮由武弁素無亷聲於是師尹與三人皆罷癸巳直秘閣徐度為樞宻院檢詳諸房文字直敷文閣提舉兩浙西路常平茶鹽公事楊倓陞直顯謨閣詔太常博士朱熈載諸王宫大小學教授劉儀鳯左奉議郎新知巢縣許必勝並召試館職殿中侍御史汪澈言必勝乃張常先之客遂罷之其後熈載儀鳯皆以久去場屋辭乃以儀鳯為國子監丞儀鳯除監丞在八月己巳甲午右中散大夫成都府路提㸃刑獄公事王弗直秘閣都大提舉四川茶馬監牧公事直敷文閣知舒州王珪主管台州崇道觀珪初除福建路提刑而中書舍人沈介論珪頃在紹興與曹泳為詩酒之游薦之秦檜召攝宰事檜死泳逐珪失所恃附湯鵬舉濫陞御史逮鵬舉之逐隂令其子與珪交通将有所誣陷賴聖明洞照亟有奉常之除其謀遂寝珪不自安方引去岀守龍舒政績無聞乃有是命日厯王珪罷閩憲於三十一年七月己丑復書之盖重疊錯誤也乙未翰林學士兼權吏部尚書周麟之言臣聞傳曰非天子不制度不議禮不考文竊見吏部續降申明條冊乃有頃年都省批状指揮參於其間向之修法官有所畏忌止與成法並立條目不與成法同今遂與成法並行以理推之誠為未允望令諸選具紹興二十五年以前批状指揮令勅令所看詳可削則削毋令與三尺混淆從之威武軍承宣使新江南西路馬歩軍緫管張淵移淮南西路副都緫管兼權知舒州左朝散郎新知舒州沈濬移知徽州丁酉權户部侍郎錢端禮專一㸃檢措置贍軍酒庫戊戍同知樞宻院事葉義問進知樞宻院事於是義問奏應變持久二説以為兩淮形勢在今危急荆南劉錡則均襄隨郢通化棗陽之所𨽻也鄂渚田師中則安復信陽漢陽之所𨽻也九江戚方則蘄黄之所𨽻也池陽李顯忠則龍舒無為軍之所𨽻也建康王權則滁和之所𨽻也鎮江劉寳與馬帥成閔則真揚通泰之所𨽻也江隂正控海道宜自鎮江分兵以扼之至於濠梁固始安豐諸郡近邊亦宜緫之合肥比已分屯諸将臣欲飭兵擇地險要廣施預備又金人用兵之久貪驕淫怠今所用皆非舊臣而多用簽軍簽軍本吾民也其肯為敵效死乎此應變之説也臣又見秋冬之交淮水淺涸徒歩可過若敵今嵗未動乞以江淮一帯遴選武臣為守公私荒田悉撥以充屯田使募人耕之暇則練習專務持重勿生釁端來則堅壁勿戰去則入壁勿追使之終無所得而自困此持久之説也御史中丞兼侍講朱倬參知政事翰林學士兼修國史兼侍讀兼權吏部尚書周麟之同知樞宻院事庚子初令純州平江縣民户結保打量實耕田畝赴官自陳毎畝輸税米二升四合仍置砧基簿有不實許告賞始用羅孝芬奏也孝芬所奏在二十八年正月權工部侍郎黄中言御前軍噐所領屬中人其調度程品工部軍噐監有不得而聞者非祖宗正名建官之意請得𨽻屬稽考之詔工部毎季輪差官一員檢察熊克小厯載此事於今年四月末又云不報蓋不考之日厯也左朝議大夫知黄州范漴移知池州辛丑浙西諸司言右通直郎知鹽官縣胡堅常治状為一路之最詔特轉一官俟任滿日取㫖陞擢堅常晉陵人也左廸功郎太學博士鄭聞為左承奉郎聞以大臣薦對故有是命成忠郎殿前司凖備使喚都遇為閤門祗候添差東南第二副将廬州駐劄以少師領殿前都指揮使職事楊存中敷文閣待制陳正同荆湖北路轉運判官王趯言其智謀才力可率士衆也壬寅詔太常悉以行在職事官侍祠勿用兩銓在選者用禮部員外郎洪邁奏也國家自近嵗大祀五十有五中祀四小祀十有四云癸卯詔以郡守多闕令侍從兩省臺諫各舉嘗任通判治状顯著者二人又趣郎官以上依新制舉縣令左朝請大夫淮南轉運副使董将直秘閣主管台州崇道觀以疾自請也初漳州羣冦數十人犯興國軍城下白晝殺掠官軍不能拒土人免觧進士呉堯獻率家丁捕斬之殿中侍御史汪澈言于朝下帥臣覈實至是以堯獻為右廸功郎甲辰詔户部科降銀錢一百二十五萬緡令兩浙江湖六路轉運司置場市軍儲通去年已糴數為三百萬石是月加封伍員為忠壮英烈威顯王八月丙午朔日有食之丁未仁壽郡主卒賜其家銀帛百匹兩主呉榮穆王女也戊申權禮部侍郎宋棐等言季秋大饗徽宗皇帝於明堂以配上帝縁祖宗以來屢行大饗明堂而所設從祀不同今若依皇祐廣設從祀竊慮其禮稍煩在孝饗疑若未専若依元豐悉罷從祀復慮其禮稍畧在昭報疑若未稱今欲依熈寜設五方帝五人帝五官神從祀之位庶㡬繁簡適當得禮之中從之資政殿學士新知福州王綸提舉臨安府洞霄宫從所請也庚戌言者論諸軍揀汰多不實上以問宰執朱倬曰近來諸軍招填難揀汰甚易上曰老病不堪帯甲在軍蠶食則揀汰之今皆縁請托以求脱去貟數猥多坐食諸郡無以贍之其間又有武藝精而尚堪用者亦可惜乃詔委緫領所保明樞宻院審實之直顯謨閣成都府路轉運副使王之望守太府少卿緫領四川財賦軍馬錢糧先是之望與續觱皆為臺諫所薦而葉義問又於上前力稱之望之才遂召赴行在或忌之乃有是除辛亥詔内侍呉因於左藏庫取錢九十千充九月十七日淵聖皇后生辰齋千佛等使用此事本不湏書以自建炎以來未見淵聖皇后典禮故表出之左朝請郎強友諒知蒋州友諒淵明子也淵明錢塘人故資政殿學士武功大夫知濠州劉光時領英州刺史壬子詔自今州縣官犯入已贓及用刑慘酷令刑部具失按察官姓名申尚書取㫖即有隠蔽令御史劾之右朝請大夫荆湖北轉運判官王趯為淮南路轉運判官兼淮南東路提㸃刑獄公事罷盱眙軍𣙜塲給商人闗子牌號仍舊印臂及給甲帖二事皆前守臣楊抗所剏言者以為阻節客貨故也癸丑左太中大夫參知政事賀允中特轉一官充資政殿大學士致仕允中使北還言敵勢必背盟宜為之備上疑未决允中因告老乃有是命秘閣修撰知平江府朱翌知饒州周執羔並復敷文閣待制直龍圖閣知太平州周葵直龍圖閣知宣州凌景夏並充集英殿修撰左朝散郎知信州徐林充秘閣修撰左宣教郎李浩為太常主簿端明殿學士致仕折彦質薨于潭州甲寅復以四川當起經緫制錢五十萬緡賜緫領所為増招軍兵之用成都府路十二萬潼川六萬利路九萬夔路三萬此據緫領所財賦冊起居舍人葉謙亨知撫州謙亨本湯思退所薦至是以他執政亟稱之思退疑焉故出之少師領殿前都指揮使職事楊存中上故左武大夫相州觀察使知朔寜府孫翊及其子武德大夫嵐石路統制軍馬昻死節状于朝詔贈翊昭信軍承宣使昻右武大夫成州圑練使以其事付史館丙辰上諭宰執曰近有獻用車戰者朕以用在人不在車南北異宜木性亦異如大舟以荔枝木為棹北方絶無而造車多用榆木南方亦少况江湖沮洳之地雖有車騎何所用卿更宜精思湯思退曰謹遵聖訓直顯謨閣提舉兩浙西路常平茶鹽公事楊倓乞以私販敗獲之人配𨽻諸軍無使放縱上曰私販之禁非不嚴備第官司奉行失信耳朕聞私販多以大風雨夜用小舟破巨浪潜行般置廵尉素不諳熟豈肯冐不測之淵以冀賞給哉使所捕者皆此等軰當賞不踰時以示之信若其圖升合之利以為活亦可恕也户部乞申嚴徒配舊法行下上從之尚書右僕射提舉詳定一司勅令陳康伯上參附吏部勅令格式七十巻刑名疑難斷例二十二巻翌日上謂輔臣曰頃未立法加以續降太繁吏部無所遵承今當一切以三尺從事不可復令引例若更精擇長貳銓曹其清矣殿中侍御史汪澈守侍御史監察御史陳俊卿為殿中侍御史秘書省著作佐郎陳之茂為監察御史權尚書禮部侍郎宋棐充集英殿修撰知紹興府户部奏嵗撥利州路經緫制錢十萬緡江西茶引二十萬緡通六月辛未所科為八十萬緡以備江州屯軍之用從之丁巳尚書吏部侍郎兼樞宻都承㫖洪遵為翰林學士兼權吏部尚書中書舍人沈介試吏部侍郎宗正少卿金安節權禮部侍郎吏部員外郎兼權右司員外郎虞允文守起居舍人兼權中書舍人權尚書刑部侍郎黄祖舜兼權給事中權户部侍郎錢端禮兼權樞宻都承㫖降授右朝散大夫王珏復所降一官提舉淮南東路常平茶鹽公事時洪遵汪澈奉詔薦珏可任郡守又言珏兩為漕臣民歌其政真州之罷人以為寃而遵所薦尤力故復用之己未言者奏國家因陳亨伯建議始立經總制錢多出於酒税頭子牙契錢分𨽻嵗之所入半於常賦自紹興十六年因李朝正上言專委通判拘收通判既許自專因得盡力於是嵗之所入至一千七百二十五萬緡無何議者妄有申請始命知通同掌通判壓於長官之勢恣其侵用迄今九載嵗虧二百餘萬緡望復委通判拘督從之詔故左奉議郎呉元美特與一子下州文學以列曹尚書侍郎楊椿等八人言其操履端方學問深博得罪故相已死乞録之也辛酉湖廣總領所言昨降一合同錢闗子三十萬緡賣錢樁管今已踰嵗所賣僅二萬緡乞支末茶長短引兑易從之壬戍左銀青光禄大夫守尚書左僕射湯思退為左金紫光禄大夫左通奉大夫守尚書右僕射同中書門下平章事兼提舉詳定一司勅令陳康伯為左正議大夫皆以進書恩也甲子右朝奉大夫陳良翰為廣南東路提㸃刑獄公事既而侍御史汪澈言良翰頃居棘寺阿附秦檜戕害良善持節江東公行賄賂其妻内通闗節人謂之女提刑使居逺方民何所愬遂寝其命良翰放罷在十一月丁丑初資政殿學士張燾為吏部尚書奉詔舉修武郎兩浙西路兵馬都監武鉅可充将帥至是進呈上問鉅知書否湯思退曰鉅議論過人深逹文義上曰武臣知書方曉民事可令籍記俟邊郡有闕則命之乙丑皇叔復州防禦使士周為宜州觀察使士周仲儡子以積閥遷也左宣教郎莫濟充諸王宫大小學教授丙寅資政殿大學士致仕賀允中入辭宗正丞趙廱為尚書駕部員外郎戊辰詔諸路犯罪合編管人不得配𨽻行在五百里州軍用秘閣修撰知信州徐林請也庚午大理寺丞蔡洸面對論猾吏擾民之弊詔趣諸路監司裁定吏額來上違者令户部劾之辛未皇叔安慶軍承宣使同知大宗正士街為安德軍節度使壬申淮南東路馬歩軍副都總管兼權安撫司公事許世安得諜報金主已至汴京重兵皆屯宿泗亦有至清河口者乃遣右宣義郎通判州事劉祖禮告急于朝廷此據徐宗偃兩淮紀實先是金主亮命户部尚書梁球兵部尚書蕭德温計女真契丹奚三部之衆不限丁數悉簽起之凡二十有四萬以其半壮者為正軍弱者為伊勒希一正軍以一伊勒希副之又簽中原漢兒渤海十七路除中都路造軍噐南都路修汴京免簽外令吏部侍郎髙懐正等十五人分路帯銀牌而出號曰宣差簽軍使毎路各萬人合蕃漢兵通二十七萬倣唐制分為二十七軍簽數已定遂以百户為穆昆千户為明安萬户為統軍其統軍則有正副諸軍悉以蕃漢相兼無獨用一色人者懐正㑹寜人也此以宋翌金亮本末張棣正隆事迹參修但棣稱至十月宣差始定今從翌所記聨書之范成大攬轡録稱髙懐正大定人大定即㑹寜也左朝請大夫江南東路轉運判官孟處義移知衢州癸酉秘書省校書郎馮方兼國史院編修官建炎以來繫年要錄巻一百八十五建炎以來繫年要錄巻一百八十五金人地名考證伊勒希原書作阿里喜與金史同並誤今改正穆昆原書作謀克誤今改正明安原書作猛安誤今改正
