body:
  text: 建炎以來繫年要録巻一百四十九宋李心傳撰紹興十有三年五月庚申上諭大臣曰人言南方不宜牧馬昨朕自創行雖所養不多方二三年已得駒數百此後不患不蕃與自川廣市來病不堪乗而沿路所費不少計之一匹自省數百千秦檜曰儉以足用寛以愛民魯頌專言牧馬上又曰國家自有故事京城門外便有孳生監每年所得甚多祖宗用意可見也奏事退遂即射殿引馬召輔臣同觀之熊克小厯在癸巳葢誤武徳大夫游士宣等各進一官士宣楊政親校用吳璘例遷也壬戍太常寺言郊祀仗内鼔吹八百八十四人今樂部全闕宜下三司差撥從之鼓吹用鉦鼓鐃角觱栗管笛等書在伏内導駕夜在警埸奏嚴甲子秦檜奏牧馬事上曰此事在乎得人朕初令楊宗憫管馬五十匹忠憫不理㑹得牧養一年之間死損俱盡後得張建壽副之更無死損以此知全在得人不惟養焉凡事皆如此得人則無事不濟矣時建壽以武徳大夫領貴州刺史於是遷右武大夫忠州團練使建壽遷官據程敦厚外制集附入日厯無之秘書少監秦熺權尚書禮部侍郎詔奉議郎張九成作與宫觀人令南安軍居住九成既免喪秦檜取㫖上曰可與宫觀此人最是交結趙鼎之甚者自古朋黨惟畏人主知之此人獨無所畏檜曰陛下知人之明如此誠帝王之大徳也既而右司諫詹大方言頃者鼔唱浮言九成實為之首徑山僧宗杲從而和之今宗杲已逺竄為之首者豈可置而不問望罷九成宫觀投之逺方以為傾邪者之戒故有是命九成得祠在閏四月乙夘今併書之熊克小厯於今年方書九成落職謫居宗杲編管皆誤也九成落職宗杲編管在十一年五月甲子已見本月日兵部員外郎錢時敏言今將享廟及郊當用仗内馬步導從之人而龍神衛上四軍未及舊額三分之一詔殿前馬軍司招填乙丑武當軍節度使副衞親軍步軍都虞候知興元府兼川省宣撫使司都統制楊政檢校少保時端明殿學士鄭剛中為川陜宣撫副使節制諸將極其尊嚴三都統每入謁必先庭揖然後就坐及右䕶軍都統制吳璘陞檢校少師來謝語主閽吏乞講鈞敵之禮剛中曰少師雖尊猶都統制耳儻變常禮是廢軍容璘皇恐聽命丁邜左廸功郎何俌獻中興龜鑑十巻詔遷一官己巳起復武經大夫兼閤門宣贊舍人知亳州完宏除名福州編管宏嘗為秀州兵馬鈐轄教所部為盜而分其財事覺故抵罪焉辛未詔左從事郎鄭厚自今不得差充試官及堂除厚甞著書號藝圃折𠂻其言有詆孟軻者駕部員外郎王言恭言于朝詔建川毁板其已傳播者皆焚之壬申追封懿節皇后曽祖右監門衛大將軍贈太𫝊邢允恭為恭王中奉大夫贈太師宗賢為永王父慶逺軍節度使贈太師楚國公煥為安王詔國子監置博士正録各一員學生權以八十人為額尚書左司郎中兼權太常少卿王師心及丞博主簿禮部郎官並進秩一等以中宫册禮成故也乙亥中書舎人兼侍讀楊愿請倣唐乾元及國朝故事詔天下置放生池祝聖壽工部郎中林乂又請以臨安府西湖為放生池從之既而上恐其妨民諭輔臣舊有者令復之不然則否乂尤溪人也丁丑天申節宰臣率百官上壽京官任寺監簿已上及行在陞朝官並赴始用樂近臣進金酒器銀香合焉郡縣錫宴皆如承平時三月庚子申明得㫖許進己邜大宴集英殿辛巳敷文閣待制知臨安王㬇以燕殿成陞直學士壬午上諭大臣曰承平時大燕及䇿中宫事太后一一能記考之故事所説皆同秦檜曰太后聰明如此上曰太后在敵中十六年未與皇后相識今此一見便相喜如太后飲食衣服皆皇后親自供承太后未甞有所需求每云飲食衣服只取飽煖不欲以細故擾思慮自太后歸朕於宫中事更不費力遂得專意外治檜曰大抵興運至陛下凡事皆如意正家而天下定矣詔兵工二部官將作軍器監官各進秩一等以册寳燕殿皆成推恩也右承事郎臧保衡獻皇太后還慈寧宫頌特進一官癸未詔皇后曽祖故贈太子太保吳文誠追封恭王祖贈太子太傅從享封和王父武翼郎贈太子太師追封榮王右武郎帶御器械吳益為成州團練使武翼郎閤門宣贊舎人吳蓋為文州刺史親屬恩澤與二十五人以后受册推恩也甲申言本府及錢塘等九縣獄皆空詔奬之六月丙戌朔起居舎人兼權中書舍人兼侍讀程敦厚謫知安逺縣敦厚攝西掖幾年數求即眞太師秦檜進擬上曰俟何麒至當並命之王秸撰行狀云丞相甞進擬欲以為真上曰何麒至當並命之麟上所厚也何公入朝未幾以臺評斥去公亦數忤丞相意向之不同者交口讒公遂用言者黜知安逺縣麒未抵國門以臺評黜去敦厚數登諸將之門㑹韓世忠之妾周氐陳氏張俊之妾章氏楊氏並封郡夫人敦厚行詞極其稱美他日從世忠飲罷酒因懐其飲器以歸檜聞益怒之殿中侍御史李文㑹即劾敦厚鼓唱是非中傷善類醜徳穢行難以悉陳前一日麒至直秘閣新知嘉州改邵州而敦厚遂黜戊子倉部員外郎王循友言國家平昔漕發江淮荆浙六路之粟六百二十餘萬和糴之數又在其外而近歲上供之數纔二百八十餘萬除淮南湖北凋殘最甚蠲放之外兩浙號為膏腴沃衍粒米充羡初無不耕之土而較之舊額亦虧五十萬石此葢稅籍欺隠豪强巨室詭名挾户多端以害之也比者兩浙漕臣建議欲正經界朝廷從而行之若使盡究隠田庶幾供輸可足舊額欲望訓勑諸路漕臣各令根檢稅籍之失上謂輔臣曰所論可行葢農桑衣食之本然須有所勸懲勿為文具拱衛郎行營右護軍後部提振軍馬吳拱充階成岷鳯路兵馬都鈐轄國學進士敦義重賜旌表門閭義重莆田人本軍言其事母至孝甘露降于墓廬故有是命壬申殿中侍御史李文㑹論右宣教郎簽書江陰軍判官㕔公事蔡楶不法勒停上曰不按發監司須當行遣天下事必待臺諫論列臺諌豈能盡知之監司乃朝廷耳目豈可坐視不舉於是提轉王鈇李椿年張叔獻皆坐降官詔三衙及御前諸軍統制統領將官月支供給錢自百五十千至三十千凡五等自今諸軍擅差軍兵回易委主仰及興販州縣收捉押赴朝廷依私役禁軍法所販貨物計贓坐罪必罰無赦州縣知而不舉與同罪時既已罷兵而諸將猶回易以營其私議者以為浸壊軍政故有是命既而尚書省乞都統制月支供給錢二百千從之尚書省奏在七月甲子棣州防禦使鎮江府駐劄御前中軍副統制成閔為殿前遊奕軍統制中侍大夫武勝軍承宣使鄂州駐劄御前選鋒軍統制李道為前軍統制先是軍官老病者皆授添差雜軍都統制田師中言本管軍馬不可闕官故有是命於是中軍副統制郝晸陲權選鋒軍統制後軍副統制李山遷中軍副統制餘以次陞焉按前軍統制張憲以十一年十二月誅死今且二年不知何以始差正官當考資政殿學士提舉臨安府洞霄宫張澂薨癸巳壽星院乞撥給度牒上曰朕觀昔人有惡釋氏者即非毁其教有好釋氏者即崇尚其徒二者皆不得中朕於釋氏但不能使其太盛耳言者皆欲多鬻度牒以資國用朕謂不然一度牒所得不過一二百千而一夫不耕其所失豈止一度牒之利若住撥十數年其徒當自少矣檢校少保武當軍節度使知興元府兼川陜宣撫司都統制楊政辭還鎮命坐賜茶甲午宫正翰氏為才人丁酉敷文閣直學士知臨安府王煥言太學將畢工養士之費當預備已括到民間冐佔白地錢嵗入三萬緡有竒養士三百恐可足用從之戊戍輔臣進呈鈞容直乞推賞上曰樂人無出官法可與支賜及轉資昔有教坊官求為郡者太祖以唐莊宗爲監不與之止令於樂部轉遷此祖宗之良法也吏部員外郎周執羔轉對乞戒諸路監司巡按檢視簿書凡財用之出入無簿書押者必按以不接之罪又乞命帥臣區别條目下諸路州軍廣行捜訪徽宗御製皆從之臣謹按秦檜再當國柄十有八年自定和策勲之後士大夫無有敢少違其意者故一時輪對臣僚但毛舉細務以應詔㫖如紹興二十七年六月黄中所論及上諭大臣之辭葢可見也故自今年以後至紹興二十五年十月己夘以前執事面對劄見於施行者共有二百二十四事葢撮其大畧書之其間則亦有闗於民間利害者葢自可以考其人焉辛丑温州進士蔡大忠上書獻太平十愼論人主誠心等事當有始有終上以其言有理熊克小厯在七月己未按日厯實在此日䧏㫖但七月辛酉上語及之克不詳考耳壬寅端明殿學士簽書樞密院事程克俊仍舊職提舉臨安府洞霄宫克俊為言者所攻及引疾故有是命甲辰中書舍人張廣提舉江州太平觀坐朋附程克俊動搖國是為殿中侍御史李文㑹所劾也或曰中書舍人楊愿疑廣薄已愬于秦檜故因事斥之汪藻撰廣墓碑云公在後省見事有不當人心者必諄諄為上言之其托縁倖恩繳詞頭者非一人益嘆重焉由是勲臣輩大不樂公而公不恤也居無何吏部闗引赦行詞公欲廣上恩澤為之秉燭草制言者咎公太遽罷中書舍人按今日厯所載文㑹全章乃殊不及此事不知何也王明清揮麈録餘話云張彦實掌外制楊原仲並居西掖代言多彦實與之潤色初亦無他彦實偶戲成二毫筆絶句云包羞曽借虎皮䝉筆陣仍推作鋒未用吹毛強分别即今同受管城封原仲以為誚已大怒愬於秦會之諭言路彈之彦實以本官罷為宫祠右宣教郎元盥行太學錄盥已見紹興元年四月全州文學師維藩權國子録維藩已見紹興元年八月維藩既上書不得用聚徒于福州之長溪閩浙之徒從之者數百人福清林栗其高弟也至是以累舉得官㑹太學初建國子司業高閌等言維藩博通古今士人推服建學之始宜得老成誘掖後進輔臣進呈上曰師儒之任尤當遴選須心術正者為之將以經㫖喻後進若有邪説學者從而化之為害不小既而右司諌詹大方言盥刻薄豈足當師儒之任盥遂罷去何俌龜鑑太學之補則曰士人進取不可不謹今日所養可以見異日之所為學官之除則曰師儒之任尤當遴選須得心術正者與之講觧則學校不為無益也武功大夫忠州刺史閤門宣贊舎人新知欽州劉紹先貸死除名械送亷州編管籍其貲坐前任統兵官虛招効用盜請錢米故也庚戍金人遣通問使徽猷閣待制洪皓直龍圖閣張邵修武郎朱弁還行在先是金主亶以生子大赦令燕雲汴三臺普度童行有籍于官者為僧及道士奴婢欲脱𨽻役者纔以數千請囑即得之得度者亡慮三十萬於是始許皓等南歸中興奉使幾三十人生還者三人而已時右文殿修撰崔縱右武大夫和州團練使郭元邁與靖康所遣徽猷閣待制張寕發尚書主客郎中林沖之皆没于敵至是敵以縱遺骨遞還初皓既辭官敵復令徃雲中校進士識金法甞被任使者永不可歸皓稱疾固辭不得命考官孫九鼎與皓有太學之舊為之請金乃許之辛亥翰林學士兼侍讀資善堂翌善秦梓充龍圖閣學士知宣州梓引疾乞退故有是命處州軍士楊興等謀殺守臣左朝請大夫徐伋以叛為軍校張行所告捕誅之癸丑上謂輔臣曰近觀諸郡所奏便民五事固有法已該載亦有一方之便朝廷未知者宜委都司看詳其便民者即與施行無事虚文也是日徽猷閣待制提舉江州太平觀胡舜陟死于静江獄初大理寺丞燕仰之袁柟至静江遂以舜陟屬吏居兩旬辭不服而死舜陟再守静江有惠愛邦人聞其死皆為之哭丐者亦斂數千錢致祭既而舜陟妻汪氏訴于朝詔左朝奉郎通判徳慶府洪元英究實元英言舜陟受金事渉曖昧其得人心雖古循吏無以過上謂秦檜曰舜陟從官兼罪不至死勘官不可不懲於是仰之柟皆送吏部行遣在明年二月甲申今併書之秋七月戊午朔上謂大臣曰昨訪遺書今猶未有至者朕觀本朝承五代之後文籍散逸太宗留意於此又得益昶李煜兩處所儲益之一時始備南渡以來御府舊藏皆失宜下諸路捜訪其獻書者或寵以官或酬以帛葢教化之本莫先於此也己未復置國子監書庫官一員庚申權尚書禮部侍郎秦熺兼資善堂翊善秘閣修撰知廬州李誼卒詔復敷文閣待制致仕辛酉命尚書左司郎中王師心提舉南郊一行事務自是以為例壬戌宣慶使宣州觀察使提舉江州太平觀陳永錫復為入内内侍省副都知癸亥詔秘書省曝書㑹自正言以上及舊係館職行在貼職人並赴坐故事自大學士至直秘閣六曹尚書至正言皆與近歲省官外但及前館職與帶職人而已至是敷文閣直學士知臨安府王煥請依故事近例两存之其後率如此例甲子詔求遺書丙寅上謂秦檜曰朕甞與卿言候國用足日蠲賦以寛民力比卿兄梓朝辭亦議及此梓累典郡頗熟民事朕謂若一概除之又恐用或不足浙西駐蹕之乆民供不易臨安尤甚本路三等下户與蠲一科庶貧民被實賜也己巳吏部員外郎王揚英罷殿中侍御史李文㑹言揚英阿附孫近近敗乃附范同望罷斥以銷餘黨故黜之壬申詔兩浙民户丁鹽錢多欠負者其除之先是上欲蠲浙西下户田租而秦檜言豪民多分立小戸難以概免若蠲丁鹽錢則實惠正直下户上可之且曰民間所以不舉子者正以是也朝廷法禁非不嚴終不能絶其本乃在於此是日雨雹癸酉禮寺上孟饗景靈宫儀注時以新宫成上親行孟饗之禮而神御猶在温州乃設幄行事自聖祖至真宗用初日仁宗至哲宗用次日承順承元殿用三日詔諸州奏大辟刑名疑慮公案若刑寺擬斷雖非大辟官吏並免收坐以議者言慮僻逺小郡不能盡曉法意畏憚收坐不敢具奏遂致斷遣失當使犯罪之人無以辯雪故也時左朝請大夫知邵武軍趙不棄亦請諸州奏讞但事干人命雖有不應奏者並免收坐事下刑部不行初命國子司業高閌等補試生員四方來者甚衆丙子有司上合格三百人以徐驤為首驤浦城人也辛巳武徳郎兼閤門宣贊舎人韋謙為右武郎帶御器械癸未奉安至聖文宣王于國子監大成殿命太師秦檜行禮時學初成上自題賜書閣榜曰首善八月丙戍遣權吏部侍郎江邈奉迎景靈宫萬壽觀神宗神御于温州自海道至行在丁亥有司言將來郊禮合用珠子坐褥上曰事天以誠為主如器用陶匏之類貴其質也若惟事華麗恐非事天之本意詔諸路以有出身監司一員提舉學事俱無出身即從上一員兼管庚寅尚書禮部員外郎段拂為起居舎人兼玉牒所檢討官拂言起字犯曽祖名辭不拜改宗正少卿辛邜敷文閣直學士知臨安府王㬇守尚書工部侍郎壬辰直敷文閣知紹興府張叔獻陞直龍圖閣知臨安府乙未國子司業兼崇政殿説書高閌乞率諸生上表請車駕臨幸太學上曰太宗幸學甞令學官講經及各有恩例其令有司檢故事來上既而閌侍經筵講畢奏曰國學落成臣奉詔試補諸生幾六千人自中興以來雖三年省闈亦未有如此之盛上曰乍脫干戈人皆向學此誠可喜閌曰近來埸屋不無懷挾假授之弊前日頓革皆不敢犯上曰朕亦聞之此美事閌曰臣待罪學官見此美事諸生以為陛下方偃武修文與太祖初定天下之時同符趣舉建隆故事願陛下講臨雍之禮言未畢上曰已令討論矣此以日厯及熊克小厯參修但克附閌講筵口奏之語于九月末又稱是時上已有幸學之意而閌未知之則恐不然葢討論故事乃因閌所奏又云所乞上表可依所請則閌安得不知意者閌以乞幸學事為胡寅移書切責故後來作行述者稍潤飾之克不細考耳今從日厯本文庶不失實丁酉尚書兵部侍郎兼侍讀資善堂翊善程瑀試兵部尚書戍戌徽猷閣待制洪皓至自金國上即日引見内殿諭皓曰卿志不忘君雖蘇武不能過賜内庫金幣鞍馬黄金三百兩帛五百匹象齒香綿酒茗甚衆翌日見于慈寜殿帟人設簾厚曰吾故識尚書矣命撤之皓退見秦檜語連日不止曰張和公敵所憚反不得用錢塘暫居而景靈殿太廟皆極土木之華豈非示無中原意檜不悦謂其子秘書省正字适曰尊公信有忠節得上眷但官職如讀書速則易終而無味要須如黄鐘大吕乃可起居郎鄭朴權尚書兵部侍郎尚書左司郎中王師心權工部侍郎己亥以朴為賀大金正旦使左武大夫保順軍承宣使知閤門事何彦良副之師心為賀大金生辰使武功大夫觧州防禦使幹辦皇城司康益副之時出疆必遣近臣故並遷二人自是以為例朴西安人也川陜宣撫副使鄭剛中獻黄金萬兩上諭秦檜曰頃年張浚甞獻千五百鎰是時有餘財卿可諭剛中不必循舊有餘則進若率於民則不可也庚子直龍圖閣張邵自金國還入見邵言靖康以來迄于建炎使於金人而不返者至數人若陳過庭若聶昌若司馬朴若滕茂實若崔縱若魏行可皆執于北荒殁于王事而司馬朴之節尤為可觀劉豫既廢金人取河南地金帥逹蘭使朴為尚書左丞欲以收南人之心朴辭以疾堅卧不起逹蘭不能奪其後以病死陳過庭且死其卒自割其肋取肝為羮以獻愈過庭之疾既死以北俗焚之其卒又自剔股肉投之於火曰此肉與相公同焚其感人如此聶昌割河東絳州人殺之滕茂實將死自為祭文人憐其忠崔縱中風坐廢三年其將死也以後事屬臣魏行可之死臣亦見之去冬臣請於金人尚書省乞挈縱行可之櫬以歸其宰執憐之朝命下所屬發遣而行可之櫬挈之往中京者乃不果發縱之櫬金人差丁夫輿致令臣舁之以來臣謹置之臨安府城外妙行寺而臣之隨行使臣有吕逹者本婺州人亦以病死於北界欲望聖慈以死事之例如過庭輩七八人其間恐有未經褒贈者而有司檢舉特賜恤典訪縱之家許親戚迎護其櫬而官助之葬下以慰忠義之魂於九泉上以副陛下不忘臣下之心庶可激勵天下仗節死難之義邵行􅃺云疏奏秦檜怒䧏㫖令開具逐人致死因依申省按史過庭昌茂實皆已贈官推思朴今年九月庚午贈官縱十二月庚子與恩澤行可明年正月乙丑贈官皆不行也但朴作直㫖行下縱用尚書省奏行可用其家自陳取壬寅秘書少監姜師仲罷以殿中侍制御史李文㑹言其乘間伺隙唱為異議也左朝散大夫宋宙知興州還入見乞諸路州學已葺治者並置教授員又請罷諸縣武令上曰學官須逐州置昨已䧏㫖恐州逺未及宜擇通經心術正者為之武令安能治民然亦難頓罷第令宣撫司以漸易置可矣癸邜除名人范燾送融州編管永不放還燾數以上書狂妄被斥及是至行在言者慮其妄鼓唱為國生事乞重賜逺竄故有是命乙巳修武郎朱弁自金還行在奏朱邵史抗張忠輔高景平孫益孫谷傅偉文朱勣李舟僧寳真婦人丁氏晏氏卒閻進節義于朝乞優䘏邵府谷人靖康初以秉義郎知鎮威城其死節甚偉具日厯抗濟源人為代州沿邊安撫副使忠輔為將領守崞縣景平崞縣人為隆徳府部將益為福州觀察使知朔寧州谷朔寧人為益府屬皆以宣靖間死事寳真五臺山僧靖康中嘗召對俾聚兵討賊金人生執欲䧏之寳真曰我既許太宗皇帝以死矣豈妄言耶臨刑色不變北人嗟異丁氏度五世孫甞適人後為敵所掠欲妻之丁氏罵敵不從絶於梃下至是弁裒其事上之疏入不報弁所奏及中省在九月今併附此偉文已見紹興十一年十二月勣已見建炎二年五月舟進已見建炎三年九月晏氏已見建炎三年二月此不別出丙午中書舍人兼修玊牒官兼侍講楊愿試給事中軍器監劉才邵守起居舍人兼權中書舍人殿中侍御史李文會試侍御史丁未以洪皓為徽猷閣直學士提舉萬壽觀兼權直學士院張邵陞秘閣修撰朱弁為右宣教郎直秘閣並主管佑神觀鎮西軍承宣使知階州兼節制階文龍州屯駐軍馬田晟為龍神衛四廂都指揮使主管侍衛馬軍司公事先是詔晟將所部三千赴行在遂以其衆𨽻馬軍司右宣義郎湖南安撫司叅議官王銍獻太元經觧義賜白金三百兩度支員外郎林大聲言江西州縣百姓好訟教兒童之言有如四言雜字之類皆詞訴語乞禁示刑部請不以赦前後編管鄰州從之己酉上與宰執論糴買事因曰今漕司各管一路有無不能相通宜放舊來發運置都轉運使一員通管諸路米賤處糴米貴處糶如此則有濟公私皆利可於從官中選通曉錢穀者付之秦檜言劉晏能權萬貨低昻使天下無甚貴賤而物常平上曰漢唐以來所可稱者晏一人而已自來人多耻言財利不知國家之所急孟子言無政事則才用不足此豈小事也起復徳慶軍節度使提㸃皇城司錢愐遷太尉以使北還也樞密院編修官吳坰提舉浙西茶鹽公事自建炎至今以密編除提舉官者惟秦梓錢堪及坰三人武寧軍承宣使提舉醴泉觀公事駙馬都尉石端禮卒庚戍詔諸路監司守臣講究寛恤民力事件以大理寺丞吳鏞轉對有請也辛亥直秘閣知䖍州劉昉移知潭州秘閣修撰主管洪州玊隆觀薛弼知䖍州壬子禮部言今嵗南郊應罷孟冬朝獻景靈宫之禮從之自是以為例初錢塘江有石堤以捍水故無水患歲乆堤且圮乃置捍江兵二千人專令採石修堤人以為便其後壯者以給他役弱者且不可用葢僅存十之一或謂近嵗潮東激而沙磧西湧故西雖不治而堤自固至是侍御史李文㑹言水勢不常方潮頭東激正西岸宜修之時乞招補捍江兵仍稍増其數使専採石修堤如曩制則潮不能為患從之建炎以來繫年要録巻一百四十九
