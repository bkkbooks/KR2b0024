body:
  text: 建炎以來繫年要録巻八十三宋李心𫝊撰紹興四年十有二月乙亥朔輔臣奏事上因論祖宗創業艱難未嘗不以躬儉為天下先盖儉則不妄費不妄費則征求寡而民心恱此所以得天下也趙鼎曰仁宗皇帝時大臣嘗入寢殿問疾見帝盖舊黄絁被宫人取被覆其上然亦黄絁也躬儉如此故仁恩滲漉四十二年號稱至治至今雖田夫野老言及必流涕沈與求曰臣聞元德皇后嘗用銷金縁皂襜太宗皇帝怒曰近日宫中用度不足皆縁皇后奢侈所致以此見祖宗以恭儉得天下自是家法上曰宣和以來世習承平之久奢侈極矣馴致禍亂可不戒哉右奉議郎浙西防托司提㸃官鮑貽遜罷上之出視師也置防托司於臨安府而以貽遜與左朝奉郎孫邦同領之至是監察御史張絢言貽遜追集鄉民聚於寨柵人苦其擾邦不以為是為貽遜所辱郡守梁汝嘉置酒和解之士民駭怪故貽遜遂罷防托司事始不見因此表出之尚書吏部員外郎魏良臣閤門宣賛舍人王繪自金國軍前還入見良臣等至平江見輔臣已金部員外郎吳并問金兵衆寡繪曰據所見不及二萬人而諜報及金人自言以謂四路各十萬人然未嘗見也日午對於内殿上問勞甚渥且詢敵勢繪舉冒頓匿壯士健馬故事為對且言願勿輕此敵翌日繪即乞致仕許之既而趙鼎召良臣問四路之數良臣曰此副使為吳郎中言之若所聞審的則必奏陳時良臣等既為張浚所斥而侍御史魏矼亦言朝廷前此三遣和使而大金繼有報聘禮意周旋信言可考頃復專使尋好未有釁隙兹乃偽劉父子造兵端本謀窺江初無和意使人未見國相報書來自近甸此而可信覆轍未逺今大兵坐扼天險援師艤舟上流精鋭無慮十萬彼偽劉挾金為重簽軍本吾赤子人心向背久當自携持重以待之輕兵以擾之吾計得矣昔曹操降劉琮得其水軍人船合八十萬徑下江陵吳之議者咸曰曹公豺虎也然托名漢相挾天子以征四方今日拒之事更不順且將軍大勢可以拒操者長江也今操得荆州水陸俱下此為長江之險已與我共之矣而勢力衆寡又不可論不如迎之獨周瑜引兵與劉備并力以逆操敗之赤壁今劉豫挾金以叛視操孰順敵衆深入澤國視操孰强而岳飛在江西吳玠在秦隴形勢乂孰得更欲聽其詭計惰喪士氣拱手以受其弊非臣所喻也昔新垣衍説趙帝秦魯仲連折之有曰是使三晉之大臣不如鄒魯之僕妾秦軍聞之為却五十里臣久誦斯語不勝憤懣惟陛下為宗社生靈之重仰順天意俯從人欲飭勵諸將力圖攻守上甚納其言矼疏不得其日且附良臣入見之後王繪乞致仕據繪甲寅録云耳日歴無之六年四月三日自武顯大夫閤門宣賛舍人落致仕充湖南制置大使司屬官是夜淮東宣撫司正將許世安王權劫敵柵於真州之東北獲數十人丙子賜趙懐恩隴右郡王印丁丑左朝請大夫知江州陳子卿為湖北制置使司參議官用岳飛奏也後二日執政進呈韓世忠辟官屬上曰諸將所辟官屬稍正當則能裨益其軍政儻非其人往往生事雖朝廷用人亦然書稱侍御僕從罔非正人况其他乎沈與求曰致治之道在積賢耳左右前後皆薛居州則邪枉之徒自然逺矣天下安得不治是日吏部侍郎孫近禮部侍郎唐煇中書舍人王居正權户部侍郎劉岑同班入見以敵騎臨江也戊寅侍御史魏矼殿中侍御史張致逺右司諫趙霈同班入見時侍從臺諫扈駕平江止此右廸功郎楚州錄事參軍權鹽城縣令劉舜士為右承務郎知縣事先是舜士率吏民守境捍禦又拒敵檄不從故有是命舜士言道梗無糧乃賜錢二千緡米五百斛詔鹽城權𨽻秦州賜錢米在庚辰𨽻秦州在辛巳己卯劉光世奏統制官王德獲偽承節郎定逺縣主簿朱從上命釋之既而曰諸將方與敵人對壘今獻俘輙釋之恐其意怠勿殺可也趙鼎曰此皆吾民誠不必殺遂付神武中軍仍給五人衙官劵十二月丙申給劵布衣王蘋特補右廸功郎蘋侯官人通春秋舎法既行遂不就舉至是寓居吳江守臣孫佑言其素行髙潔有憂時愛君之心召對補官後四日賜進士出身除秘書省正字上謂輔臣曰蘋起草茅而議論進止若素宦於朝大抵儒者能通世務乃為有用知湖南制置大使席益乞依李綱例於所在州軍寄造酒又言本路闕官去處省部已下差下人未到間乞依折彦質例許臣選委權攝及奏辟一次許之庚辰中書舎人王居正言州郡公使造酒命官限年之任祖宗之法悉有定制昨李綱知潭州乞於所在州軍造酒既不指定路分又無所造石數是潭州得於天下州軍不限石數造酒今益乞依綱公議以為不可初綱知潭州應朝廷所差官並不令赴任自行辟置自後彦質繼之乞省部已差下人未赴任間許時暫差人權攝如一季内未到即許審量奏辟比之李綱已極忠恕所以朝廷姑從其請兼彦質到任之初係經馬友鍾相殘破未久本路全然闕官是時權宜奏辟理或當然今湖南州縣稍已就緒而益乞依彦質例辟官公議亦以為不可欲望詳酌將益所乞造酒且依彦質就潭州寄造月不得過三十石其辟官候踰年依條不該赴任之人許行奏辟庶幾稍近人情從之辛巳刑部尚書章誼往江上押燕犒軍還入見命行宫留守司中軍統制王進以所部屯泰州防托通泰應援淮東水寨權聽帥司節制上召進入對而遣之秘閣修撰淮東宣撫司參議官陳桷丁母憂詔起復偽齊保義郎劉逺特補忠翊郎逺同州人從劉麟入冦與其徒六人自盱眙脫身來歸皆錄之其偽告令所屬焚毁壬午詔知宿遷縣劉澤等並各轉一官澤之來歸也徐俯在樞筦欲斬其首送劉豫趙鼎以為不可至是始褒録焉事祖已見四月丙午乙酉直龍圖閣新知永州胡寅試起居郎尚書左司員外郎兼權給事中晏敦復為中書門下檢正諸房公事朝請郎通判漳州江躋守司農少卿躋先坐秦檜黨斥去至是趙鼎用之丙戌賜偽齊右丞相張孝純偽知兖州李儔手詔曰朕惟强敵侵軼廹朕一隅叛臣乗時盗據京邑惟爾士大夫䝉被德澤服在周行其肯失身偽庭事非其主顧廹脅使然有不得已者朕甚痛之故若孝純儔等内外親屬不廢禄仕毎飭有司各加存䘏朕之於爾厚矣爾尚忘之邪其能洗心易慮束身來歸當復其爵秩待遇如初朕方布大信以示天下言不爾欺有如皦日他日孝純與偽尚書右丞李鄴論及本朝鄴曰死無所憚但恐如陸漸之禍惡名終不可免爾孝純乃止此據孝純所上書附見陸漸事見二年六月戊戌是夜月犯昴太史以為敵滅之象上以諭輔臣胡松年曰天象如此中興可期上曰范蠡有言天應至矣人事未盡也更在朝廷措置如何耳趙鼎曰當修人事以應之上語在是月庚寅初中興聖政臣留正等曰天理人事無有二人事盡矣天理無有不應者人事未盡而獨言天理亦悖矣然而天心仁愛人君常先事而為之兆有所宜禍則戒以災異有所宜福則開以禎祥戒以災異欲使之懼而知改開以禎祥欲使之勉而知遂茍惟覩災異而莫知改覩禎祥而莫之遂是直不知天意之所在而以人事自棄者也如是則離天人而為二其失逺矣太上皇帝因論太隂犯昴有滅敵之象舉范蠡之語以暁臣下曰天應至矣人事未盡也更在朝廷措置如何因天象而益修人事可謂善承天意也哉丁亥參知政事沈與求以兄歸安縣主簿夣求有公事定奪乞去位避嫌上不許資政殿學士知福州張守言臣聞韓世忠所獻敵俘已就戮於嘉禾逺近欣快不謀同辭然臣竊謂凡所獻俘若使皆是金人或他國借助則宜盡勦除俾無遺育至於兩河山東諸路之民則皆陛下赤子也劉豫驅廹以來必非得已若臨陣殺戮勢固不免至於俘執而至容有可矜臣妄意以謂凡所得俘内有簽軍則宜諭以恩信以示不忍殺之之意若可特貸而歸之或願留者亦聽其便不惟得先王脅從罔治之義而劉豫之兵可使自潰後雖日殺而驅之使前將不復為用矣䟽奏詔奬之端明殿學士荆湖南路安撫制置大使知潭州席益落職降充安撫使初命樞宻都承㫖馬擴為江西沿江制置副使屯武昌而令益遣統制官吳錫一軍受擴節制至是樞宻院言凡三十一次劄催未肯發遣故謫之仍命錫星夜兼程之武昌如違並寘典憲馬擴除江西制置副使不得其日按擴以十月丁亥方除宻㫖去此恰六旬而益責詞乃云令下七十日之間乃在擴未召對之前不知何也趙甡之遺史云詔撥吳錫崔邦弼兩軍付馬擴益不奉詔此亦誤今從日歴按史馬擴以辛巳除置副初張浚至江上令淮東宣撫使韓世忠募軍民王愈王德持書抵右都監宗弼所為言張樞宻已在鎮江金人問愈吾聞張樞宻已貶嶺南安得在此愈出浚所下文書見浚書押色動即以右副元帥昌書約日索戰戊子愈等持昌書至行府浚言於上並補承信郎此以日歴及浚行狀參修日歴云愈等於今月十四日回齎到右副元帥回書十四日戊子也行狀以為乙未今從日歴愈德補官在此月癸巳吏部員外郎魏良臣乞從便許之己丑權淮東安撫司公事趙康直劾泰州兵官任顯不伏使令已械送有司乞行竄責上曰康直既權帥事自合施行嘗記朕為元帥時有一部將醉入酒家壊其盆盎朕捐白金償之而斬部將梟其首自此更無一人犯令者大抵用兵當以威信為先命都督府右軍統制李貴以所部屯福山鎮按史繋戊寅日郢州防禦使利州路馬歩軍副總管權知興元府兼管内安撫使田晟為護國軍承宣使邠州觀察使永興軍路經略安撫使權知利州兼本路安撫使郭浩為彰武軍承宣使武功郎姚仲為拱衛大夫開州團練使降授武翼大夫郭仲復右武大夫文州刺史武翼大夫吳勝為右武大夫閤門宣賛舍人皆用殺金平之功也先是川陜宣撫使王似副使盧法原第其功自晟已下諸將凡九十三人皆進秩至是遂申命之似法原諸子亦以勞進秩二等而吳璘楊政優異推恩者不與焉庚寅處州雄節卒陳轉特補保義郎時守臣耿延禧簡兵以備調發而軍士謝紹葉新言即敵至斬延禧以順畨為轉所告論死故録之辛夘上謂輔臣曰韓世忠近以鱘魚鮓來進朕戒之曰朕艱難之際不厭菲食卿當立功報朕至於進貢口味非愛君之實也已却之矣集英殿修撰知廬州仇悆陞徽猷閣待制録守城之功也壬辰湖北制置司統制官牛臯徐慶敗敵於廬州時敵增兵復犯淮右仇悆盡發戍軍千人拒之既而敗北無一還者遂求救於湖北制置使岳飛遣臯慶率二千人往援慶飛愛將也是日臯慶以從騎數十人先至坐未定斥堠報金人五千騎將逼城臯即與慶出城謂敵衆曰牛臯在此爾輩胡為見犯乃展幟示之敵兵失色臯舞矟徑前敵疑有伏即犇潰臯率騎追之敵自相踐死餘皆遁去時淮西宣撫使劉光世亦遣統制官張琦至廬州城下又遣統制官靳賽至慎縣而還悆歎臯之功以書謝飛盛稱其勇飛不悦移其功以畀慶後慶以竒功自武功郎徑遷武功大夫開州刺史而臯止進二官此以徐夣莘北盟㑹編熊克小歴參修但夣莘所云臯以十三騎襲敵軍五十里又云畨偽大軍十餘萬去廬州百餘里而屯一夕皆遁此則未足據也畨偽軍退自是糧乏不支非因廬州之敗據岳飛奏功狀稱實接戰立功官兵五百四十六人雖未免泛濫在其中然亦不止於十三騎明矣狀又稱追逐敵兵三十餘里今但云率騎追之庶得其實臯慶明年二月推恩殿中侍御史張致逺言知和州趙霖知洪州分寧縣陳敏識知建昌軍方昭皆前有死守之功後坐文致之罪見被廢黜臣請為陛下言之和州自李儔納欵之後水寨民社以霖為請霖在江東間關赴難悉力措畫數與敵鬭屢拒他盗不廢耕植官私就緒冠於他郡民到於今稱之繼縁幕官私書時相移怒遂以按發屬郡用為互論獄司深文止坐公笞霖之非辜亦已明矣敏識當金人初渡大冶道出武寧所遇迎降禍不再計分寧距武寧百里而近父老列狀願歸城於敵帥以保全鄉井敏識披胷示之示以先死率衆據險迄免侵軼縣之姦俠有欲乗間嘯亂者譎誘而殺之一邑頼以安堵僑寓士夫述其狀隣路監司上其功既嘗進秩擢用偶挾私怒者得路託為䟽論遽送嶺外監當借使不足為功又何罪之有昭守建昌苖傅之餘黨韓世清者首殘邵武以衆數千徑犯軍城官吏軍民盡欲逃去昭以六十口為質揭榜通衢敢言去者以軍法從事率衆嬰城親督守備賊圍而攻之矢石雨集凡六晝夜昭鼓衆益厲攻者死傷十三四一夕遁去遂䧟臨川盖自通判而下咸被賞典獨昭未與是冬昭以敵在臨川遣人約齎降書相去一驛之間慮為軍民脅持既不可從又不能死乃以軍事委倅謁告寧親繼而論罪編置屢經恩霈無路自明今霖罷處祠館敏識與昭尚在罪籍臣若不為伸理非惟上負聖明耳目之寄且使朝廷有忽功記過之失無以勸効死守節者伏望睿斷霖等已往之過録霖等未報之功量材叙用以為衆勸亦今日之急先務也敏識時為降授右朝散郎先訟枉於朝得㫖改正霖為左中奉大夫直徽猷閣奉祠家居乃詔霖與郡昭改正命下而霖已卒矣十二月壬寅趙霖守本官致仕癸巳殿中侍御史張致逺言朝廷不當除授差遣以妨軍務上曰言者欲大臣專意軍務誠知所先儻因間隙莫不妨除授否比聞士大夫逺赴行在而吏部既不注擬往往貧困無以自存朕用惻然趙鼎曰向者車駕親廵海上猶有差除恐於今日未宜遽廢胡松年曰言者但當論除授當與不當耳上曰艱難之際豈可使士大夫失職浙西江東宣撫司統制官張宗顔與敵戰於六合縣時金人瀕江犯宣化鎮出沒踰月張俊遣宗顔潛渡江出金人之背與戰不勝詐為㨗書以聞此據趙甡之遺史日厯張俊曰張宗顔於六合縣掩殺敵兵不計數目生擒七十餘人奪到馬二十餘匹是日承州馳潭水寨首領仲諒遇敵於山陽獲七人甲午武功大夫忠州團練使神武中軍左部統領范温添差江南西路兵馬鈐轄撫州駐劄罷從軍乙未上曰敵馬近在淮甸而將士致勇爭先至於諸路守臣亦翕然自効顧趙鼎曰此乃朕用卿等之力鼎曰盡出聖畫臣等何力之有然大敵在前方懼無以塞責近日連南夫張守皆有奏牘應辦軍須錢物曽不愆期上曰自古國家用賢則治若警奏初聞而朕或為退避之計江浙已邱墟矣詔陳獻兵書進士葉汝舟賜帛二十匹丙申淮南東路轉運判官郭楫罷先是上命漕司以米萬石濟接水寨民兵及是旬而未有顆粒至者侍御史魏矼言楫不才慢命趙鼎亦奏斥之上曰今日大敵在前欲臣下趨事赴功不可不大明賞罰有賞而無罰是猶有春夏而無秋冬也萬物之生何由成實故楫遂罷提轄搉貨務都茶塲郭川等請今臨安府本務將每日入納錢三分之一樁還見錢關子仍俟客人身到乃給許之時朝廷降見錢關子為糴本而川等言未有關防故有是請焉日歴無此今以明年正月十三日章誼劄子所云修入但降見錢關子充糴本月日前此未見是必與明年二月張絢所奏相關當考丁酉侍御史魏矼言日食正旦乞下有司講求故事上曰日蝕雖是躔度之交術家能逆知之春秋日食必書謹天戒也矼之言良愜朕意宜下有司講求故事凡可以消變者悉舉行之沈與求曰日蝕雖躔度可推然日為陽類至於薄蝕則人君所當恐懼修省以應天變川陜宣撫副使吳玠奏夏國主數通書有不忘本朝之意及折可求族屬列銜申玠云見今訓練士馬俟玠出師渡河即為内援擊敵上報國恩上曰此皆祖宗在天之靈扶佑所致亦有以見人心同憤也戊戍知樞宻院事張浚奏捍禦敵馬次第且言久相持恐其别生姦計已與諸將㑹議凡可以克敵者無不為也上曰浚措置如此敵必不能遽為衝突沈與求曰晉元帝時兵力未强然石勒冦夀春帝集將士相持三月其下至有勸降者王導拒之敵逺來久相持非其利也上曰朕得浚何愧王導浙西江東宣撫使張俊奏張宗顔過江擊敵馬獲㨗事上曰俊每言不敢虛奏邉功恐坐㝠報嘗有方士謂俊曰王淵坐誤國之罪為隂司治之備極慘毒朕未嘗信方士之説果有之乎趙鼎曰臣在金陵聞韓世忠之言大略與俊合然淵之罪在殺已降松年曰秦皇漢武信方士之説卒亂天下此可以為戒上曰國將興聽於民將亡聽於神史嚚之言是也上又曰死生數之大常方士豈能損益責授單州團練副使劉子羽復右朝散大夫提舉江州太平觀時吳玠復辭兩鎮之節且言子羽累年從軍亦薄有忠勤可録念其父韐靖康間死節京城今子羽罪雖自取然炎荒萬里毒霧薫蒸老母在家殆無生理誠恐子羽斥死嶺海無復自新非陛下善善及子孫之意伏望聖慈特許臣納前件官少贖子羽之罪使量移近地得以自新三省勘㑹子羽與吳玠書所論邉事跡狀可考乃復元官與宫觀翌日詔玠篤於風義降詔奬諭士大夫以此多玠之義而服子羽之知人焉温州文學承揚泰三州水寨參謀趙安節特許赴將來省試安節嘗舉進士未赴禮部至是以勞補官乞依舊省試特許之己亥手詔以日蝕來年正旦命公卿講求闕政察理寃獄詢問疾苦舉遺逸求直言庚子金人退師日歴紹興五年正月十二日樞宻院劄子據劉光世韓世忠張俊申敵馬自十二月二十六日節次從楚州路遁走故繫於此日初右副元帥完顔昌在泗州而右都監宗弼屯於竹塾鎮嘗以書幣遺淮東宣撫使韓世忠約戰世忠方與諸將飲即席遣伶人張軫王愈持橘茗為報報書略曰元帥軍士良苦下諭約戰敢不疾治行李以奉承指揮也此據世忠墓碑増入張浚行狀云烏珠約日索戰公再遣世忠麾下王愈以世忠書徃問戰期愈回一日而敵宵遁二書差不同今且云敵遺世忠書更須詳考但碑載此事於世忠凱旋之後則誤也日歴通書人乃王愈王德而墓碑云張軫王愈亦須詳考時金師既為世忠所扼㑹天雨雪糧道不通野無所掠至殺馬而食蕃漢軍皆怨憤簽軍又為飛書擲於帳前云我曹被驅至此若過江必擒爾軰以獻南朝俄聞上親征且知金主晟病篤將軍韓常謂宗弼曰今士無鬬志過江不叛者獨常爾他未可保也况吾君疾篤内或有變惟速歸為善宗弼然之夜引還金軍已去乃遣人諭劉麟及其弟猊於是麟等棄輜重遁去晝夜兼行二百餘里至宿州方敢少憩西北大恐何俌龜鑑惟紹興之四年趙忠簡公鼎實領右揆之命當時玉音宣諭謂朕當親總六軍臨江决戰鼎即對曰親征出於聖斷將士皆奮决可成功於是移張俊於金陵進光世於當塗起世忠於維揚復起張浚而董其事自張公之出行邉郡也今年命諸將觀機㑹明年檄諸將觀兵勢今日召諸帥議軍事明日命諸帥分軍屯書押之示敵人動色號令之下奔走惟命不曰今日之事有進擊而無退保也則曰若諸將渡江則無淮南而長江與敵共也大儀之役伏兵四起貝勒就擒夀春之勝展幟示之敵衆奔潰鎮江勞軍韓世忠移書烏珠有張樞宻在此之言金人相顧失色敵於是有雪夜之走采石徇師之令一下諸將以死鏖戰我於是有李家灣之㨗前乎富平之失此魏公也後乎江上之勝亦此魏公也人無愚知作之則奮師無利鈍激之則鋭兹非其驗歟辛丑詔葬祭浙西江東二軍之死事者如淮東軍趙鼎因言比張浚遣使臣來説諸大將每得金字牌則踴躍奔命無敢不䖍由陛下素有以結其心也上曰諸將奉命此固美事然朝廷出號令亦須審重使其得之若降自雲霄之上其誰敢慢乎刑部尚書章誼兼權戸部尚書左朝奉郎直寳文閣知宣州趙不羣進秩一等以應副軍需不擾而辦也是日泰州陵亭水寨馮定捕敵三十九人壬寅侍御史魏矼試秘書少監矼乞依本省官例從便許之殿中侍御史張致逺守侍御史監察御史張絢守殿中侍御史臨安府供職權尚書戸部侍郎劉岑充集英殿修撰知太平州以岑引疾有請也倉部員外郎章傑福建路措置糴買公事觀文殿大學士提舉臨安府洞霄宫吕頥浩言京東之民企望王師日久乞命諸將分道進兵兵法所謂彼入我出彼出我入不二三年則中原之地大河之南必先為我有矣癸夘参知政事沈與求兼權樞宻院事以胡松年再徃江上故也明州觀察使司統制關外軍馬楊政為武康軍承宣使直龍圖閣都大同主管成都等路茶馬監牧公事專一總領四川財賦趙開陞秘閣修撰川陜宣撫司奏殺金平之㨗乞優異推恩故有是命是日金人去滁州是役也金據滁州凡四十有七日神武右軍將官盧師廸引兵至竹塾鎮遇敵千餘騎敗之甲辰淮西宣撫司將官王順引兵至泗州之南得敵所獲老弱二百是月偽知光州許約攻石額山寨破之小校承信郎陶甫率遺民奔黄陂縣詔以甫為成忠郎閤門祗候充黄州准備將張昻守山寨凡五年甫除將官在明年正月丁夘初通問使直龍圖閣張邵既不降金人自燕山移邵居㑹寧府兵部侍郎司馬朴右文殿修撰崔縱奉議郎魏行可右武大夫和州防禦使郭元邁皆在焉時金新立國向慕文教土人多從邵受書生徒斷木書於其上捧讀既過削而復書邵又以易講授學者資用稍給此據邵行實乃紹興四年事故附此年末是嵗四川總領所收錢物三千三百四十二萬餘緡支三千三百九十四萬餘緡而吳玠一軍費錢一千九百五十五萬緡宗子不屈等賜名者二十有三人補南班者四人班行十九人福建廣西兩浙䕫州路上戸部戸口陞降數廣南東路見管税客户一百三萬餘丁口二百一十三萬餘成都府路見管税客户一百一十三萬餘口二百三十四萬餘建炎以來繫年要録巻八十三金人地名考證烏珠原書作兀术誤改見巻一貝勒原書作孛堇誤改見巻一
