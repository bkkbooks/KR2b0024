body:
  text: 建炎以来繫年要録巻九十七宋李心傳撰紹興六年嵗次丙辰齊金熙宗亶天㑹十四年偽劉豫阜昌七年春正月己巳朔上在臨安辛未上以雪寒細民艱食命有司賑之翌日謂尚書右僕射張浚曰朕居燠室尚覺寒細民甚可念若湖南江西旱災去處亦宜早措置賑濟民既困窮則老弱者轉於溝壑强悍者流為盜賊朕為民父母豈得不憂浚曰陛下推是心以往則足以感召和氣况實恵乎上曰朕每以事機難眀専意精思或達旦不寐浚曰陛下以多難之際兩宫幽䖏一有差失存亡所係慮之誠是也然雜聽則易惑多畏則易移以易惑之心行易移之事終歸於無成而已是以自昔人君正心修己仰不愧俯不怍持剛健之志洪果毅之姿為所當為曽不他䘏以陛下聰眀茍大義所在斷以力行夫何往而不濟臣願萬㡬之暇保養天和澄心静氣庶幾利害紛至而不能疑則中興之業可建矣壬申都省請令吏部立勳官法應破金人拓地主兵官萬人以上第一等功五千人已上竒功並許加帶大使臣已上自武騎尉月給帶勳錢十千正任觀察使已上自輕車都尉月給二十千應賞功合轉三官者賜勳一轉五官者賜勳二轉雜壓序封許用勲品後不果行初置行在和劑局給賣熟藥用權户部侍郎王俣請也左朝奉郎都督府主管機宜文字熊彥詩為尚書工部貟外郎直徽猷閣提領都督府市易務張澄行尚書户部貟外郎兼提領市易務行府専一措置財用癸酉申命給舍甄別元祐黨籍時樞宻院檢詳諸房文字范直方言朝廷旌别淑慝大開黨禁以風動天下凡隸名石刻之人皆蒙追録此千載盛徳之舉也然而其間賢否是非未免混淆方紹聖初章惇蔡卞用事欲擠陷善良以快私忿上意未決而李清臣首倡異議助成京卞之惡善類由是塗炭而清臣獨留廟堂繼而姦人欺天厚誣太母有欲廢意尚畏天下公議不敢自恣而邢恕乃唾手攘臂力證其事至於反覆變詐如楊畏者固又不足道自崇寧以後黨籍日衆其間固多忠讜勁正之士出䖏議論具在方冊至如妬賢嫉能助成黨論之人偶乖迎合以至睚眦京卞欲終廢之故借黨籍以報怨汙蔑善類以至今日子孫又從而藉口僥覬恩典倖門一啟流風靡靡雖故家遺族未免衒鬻希進傷教敗俗莫此為甚伏望密詔近臣博訪耆舊重加審訂稍示甄別以行典禮庶幾賢不肖各當其分足以取信天下後世故有是㫖日歴書有㫖依己降指揮令給舍一就看詳而未見元降㫖之日當求他書參考按黨籍清臣執政第二十人畏待制已上第三十三人恕不在籍中直方誤也詔故贈少保王淵許以死事恩澤二資換給常州田二頃以淵妻齊安郡夫人俱氏有請也直秘閣提㸃淮南刑獄公事張成憲同提領都督府市易務荆襄招討使岳飛言太行山忠義社梁青百餘人欲徑渡河自襄陽来歸時金人併力攻青故青以精騎突而至飛軍前上曰果爾當優與官以勸来者諜言固未可信若此等人来歸方見敵情沈與求曰若敵誠衰来者衆則敵情審矣紹興十二年六月十一日親衛大夫忠州刺史梁興状四年十月與烏瑪喇太師接戰次年奪路渡大河歸本朝則興至飛軍前當在去冬今因奏到附此甲戌起居郎潘良貴試中書舍人尚書右司貟外郎董弅為起居舍人良貴未就職以父䘮免給事中呂祉等言良貴以父年髙十五年之間出仕不過數月貧甚無以舉䘮詔賜錢五百緡令所在以上供錢給之賜錢指揮在是月壬辰朱勝非秀水閑居錄云有潘良貴者父年九十餘卧病累年趙鼎聞其儉薄欲引為黨許以從官召之即至自秘少遷柱史又遷中書舍人纔旬月間命未下而厥父死矣右承奉郎孫道夫為秘書省正字道夫召對上問以方今形勢之地道夫請經營漢中以為復陜西之基措置荆南以為守江左之策上稱善武經郎權知閤門事潘永思為右武郎同知閤門事乙亥右諫議大夫趙霈言比年以奔競日滋㢘耻道䘮指臺閣為要津笑州縣為俗吏僥倖㨗徑以圖進身已參選者力求堂除得外任者謀改京局故臣僚一遇賜對則明與陞擢差遣一有過累則明與外任差遣人既知朝廷之輕外任孰不以内任為重乎願明詔大臣凡任省臺寺監及二年才可任煩劇者悉補監司郡守之職任監司郡守及二年才可被陞擢者悉充省臺寺監之選劇邑有闕擇寺監丞有才術者為之宰寺監有闕擇縣令有治績者為之丞更出迭入居中補外以息奔競以興㢘耻使士無入而不出之譏郡守無雅意本朝之望疏奏從之丙子承信郎徐如海杖脊黥𨽻化州如海陷北不得歸變姓名至臨安為偽齊詗事因投匭上書為有司所覺故黥之夜雷丁丑詔納粟別作名目授官人毋得注親民刑法官已授者並罷自今到部隠漏不實者抵其罪時論者謂縣令民之師帥刑法之官人命所繫不可輕以授人比年軍興以納粟得官者不謂之納粟或以上書文理可採或作獻納助國與理選限原朝廷之意欲激勸其樂輸使得為官户而銓曹别無闗防之法近年以来固有得縣令亦有得法司者此曹素未嘗知政務直以多貲一旦得官若遂使之臨縣議刑其不稱職必矣既不能稱職必為民物之害欲下吏部立法闗防仍先次改正故有是㫖己卯手詔朕以菲徳致兹旱災痛念斯人流離窮苦屢詔諸路常加撫存尚慮未能深體此懷奉承弗謹今仰三省檢㑹累降寛䘏事件布告中外悉力推行務在實恵及民毋使詔書徒為文具又勘㑹荆湖南北江南東西路旱傷湖南委呂頤浩江西委李綱各選差近上屬官分詣管下往来㸃檢賑濟其湖北江東並委帥守依此詔戚里之家見任添差官令别作措置初右諫議大夫趙霈入見論今添差官貟數猥多無補於事若不減罷國用益窘然有不可一概罷者如宗室歸明歸朝官軍班換授及軍功優異之人乞存留外餘悉罷去以紓今日用度之闕章再上進奏院言除川陜外諸路添差官一千五百四十貟戚里之家七宗室六百六十七歸朝官一百六十四歸明官二百八十四三省樞宻院逺赴行在官十軍班換授一百八十八軍功一百六十一隨龍二十六歸附官二十三奉使之家十乃詔隨龍官係祖宗舊法奉使官理當優恤其餘忠義可嘉皆勿罷所省者七貟而已起復徽猷閣待制都督府參議軍事權川陜宣撫副使邵溥試尚書禮部侍郎仍兼參議軍事辛巳罷綿州川陜宣撫司邵溥竢結局赴行在宣撫副使吴玠依江東淮南宣撫使體例専治兵事軍馬聽玠分撥錢糧令都轉運使趙開拘收限半月結局初張浚既召去王似盧法原以宣副代之溥又代之數人者務私相勝軍政民政弛紊不可具言故有是㫖舊宣撫司有兵三萬馬數千至是皆屬玠矣熊克小歴云辛巳吴玠陞宣撫使按玠正使名在九年正月克但見日歴書有㫖吴玠依舊川陜宣撫使遂承其誤不復考耳恐是元降㫖失契勘或日歴脫字當考浚之初入蜀也在軍中者皆依衙官例給劵有職事人支供給月犒隊下敢效支錢米其餘兵校則依軍額支衣糧及料錢及玠専為宣撫副使始別立格例隊官已上依衙官支驛料供給隊下有官人以武藝髙下給月糧又添支絹錢敢效諸軍依軍額外以武藝髙下添支銀錢葢以為激勸也然諸軍折色米麥各以軍屯所在之直為凖故米毎石少者八九千多者至十二千議者患其不均然沿襲既久終莫能革也淳熙十三年二月辛亥吴挺奏請并十五年七月戊午指揮可參考太常丞王普言宗廟之祭於禮不合臣請論之僖祖非始封之君而尊為太祖太祖實創業之主而列於昭穆其失自熙寧始宣祖當遷而不遷翼祖既遷而復祔其失自崇寧始葢前日之失其甚大者有二始祖之名不正大禘之禮不行今日之議其可疑者有四奉安之所祭享之期七世之數感生之配是也古者太祖即廟之始祖是為廟號非諡號也惟我太宗嗣位之初太祖皇帝廟號已定雖更累朝世次猶近每於祫享必虛東鄉之位以其非太祖不可居也至熙寧又尊僖祖為廟之始祖百世不遷而太祖常居穆位則名實舛矣儻以熙寧之禮為是則僖祖當稱太祖而太祖當改廟號此三尺之童知其不可大傳曰王者禘其祖之所自出而以其祖配之熈寧尊僖祖為廟之始祖而僖祖所出系序不著故禘禮廢自元豐以来宗廟之祭止于三年一祫則是以天子之尊而俯同於三代之諸侯瀆亂等威莫此為甚欲乞考古騐今斷以聖學自僖祖至於宣祖親盡之數當遷自太宗至于哲宗昭穆之數已備是宜奉太祖神主居第一室永為廟之始祖每嵗五享三年一祫則太祖正東鄉之位太宗仁宗神宗南鄉為昭真宗英宗哲宗北鄉為穆五年一禘則迎宣祖神主享於太廟而以太祖配焉如是則盡合禮經無復前日之失矣若四祖神主臣謂宜倣唐禮祔于景靈宫天興殿遇大祫之嵗就行享禮按禮天子七廟三昭三穆與太祖之廟而七則是四親二祧止於六世而太祖之廟不以世數為限僖祖廟既當遷又非郊禘之主尚仍配帝於禮無据宣祖皇帝實生太祖當為禘主萬世不易則配食感生無可疑者先是起居舍人董弅嘗有是請詔侍從臺諫過防秋集議未及行逮普疏入乃趣侍從臺諫禮官參議于尚書省後二日上謂左僕射趙鼎曰太祖開基創業始受天命祫享居東鄉之位合於禮經必無異議鼎曰三昭三穆與太祖之廟而七載在禮經無可疑者士大夫往往有異同之論乃命議者各具討論文状申尚書省既而卒不行紹興元年十二月丙戌所書可參考罷御史臺平反刑獄推賞時殿中侍御史王縉言察官皆出陛下親擢糾察六曹之稽遺乃其職事平反刑獄糾察之一也居是職者宜不待賞而勸嵗終刑部保明與羣吏同賞亦非所以待糾察之臣故有是㫖刑部侍郎廖剛乞以磨勘一官回贈其祖父丕右承務郎從之壬午宗室伯玖賜名璩除和州防禦使時年七嵗初命川陜四路轉運司每季於孟月上旬定日集注在司待次官窠闕注訖申部以革注擬不公之弊用言者請也既而都省言訪聞多是蔵匿闕次理宜約束詔制置大使席益覺察按奏後㫖在是月甲申癸未尚書左僕射兼監修國史趙鼎上重修神宗實録通成二百巻中書舍人兼侍講資善堂翊善朱震試給事中徽猷閣待制提舉建隆觀兼史館修撰兼侍講資善堂翊善范沖陞徽猷閣直學士他職並如舊故中散大夫開封府左司録孟彦弼追封咸寧郡王以昭慈聖獻皇后親弟特封之也彥弼忠厚父已見淮東宣撫使韓世忠言恭惟主上當焦勞之日減放宫女節省中禁之費務為勤儉以率天下在於臣子宜上體天心伏自國家多事以来養贍軍旅調賦日新所費不貲世忠積俸之餘尚可枝梧願将世忠合得俸禄一切倚閣俟至恢復中原職方貢賦咸入天府然後請於有司優詔不許乙酉武功大夫閤門宣贊舍人知泗州劉綱丁祖母憂乞解官承重州人共留之後五日詔綱免持服丙戌尚書右僕射張浚辭往荆襄視師浚以敵勢未衰而劉豫復據中原為謀叵測奏請親行邊塞部分諸将以觀機㑹上許焉浚即張榜聲豫叛逆之罪時淮東宣撫使韓世忠駐軍承楚淮西宣撫使劉光世屯太平州江東宣撫使張俊屯建康府而湖北京西招討使岳飛在鄂州朝論以為邊防未備空闕之處尚多浚獨謂楚漢交兵之際漢駐兵殽澠間則楚不敢越境而西葢大軍在前雖有他岐㨗徑敵人畏我之議其後不敢踰越深入故太原未陷則尼瑪哈之兵不復濟河亦以此耳論者多以前後空闊為疑曽不議其糧食所自来師徒所自歸不然必環數千里之地盡以兵守之然後可安乎浚既白于上又以告之同列惟上深以為然於是參知政事沈與求言都督府闗取空名告敕宣剳以萬數臣疑其有所為以問趙鼎張浚而不以告臣今又見浚言有川陜荆襄之行此固用兵之謀臣初不以為非第欲審而後行况遣宰臣之出乃大議論臣實參機務而不與聞是智不足謀國也乞罷政不允是日詔百官出城送浚行宗正丞孫緯向浚自言沂人丞相此行恢復中原望以緯守本郡浚大喜對衆稱善而許之熊克小歴稱詔百官出城班送浚行誤也日歴正月十五日癸未三省奏勘㑹張浚視師荆襄已免班送有㫖令百官並出城餞送今從之是日總領四川財賦趙開増印錢引三百萬緡市軍儲丁亥淮東宣撫司參謀官陳桷淮西宣撫司參謀官李健江東宣撫司主管機宜文字郗漸對于内殿上諭以國家贍養大兵之久國用既竭民力已困切須専意措置屯田此亦自古已成之效况軍中亦須先立家計若有機㑹方圖進取後二日以諭輔臣趙鼎曰措置如此社稷幸甚中興聖政臣留正等曰古之行屯田者何其易而其效何其廣也趙充國之於湟中是以将帥而行之也張公謹之于代州是以郡守而行之也韓約之于振武是以部刺史而行之也率不過一二嵗而軍儲富矣今以天子之命令國家之事力而毎病其難經歴嵗月未覩厥成則将帥恬不加意抑辜任使之意也使其開渠引水用以澆溉能若鄧艾躬耕百畝課督将校能若郭子儀如是而有不成臣不信也亦在賞罰勵之耳詔廣西提㸃刑獄公事韓璜市米三萬石赴湖南帥司賑濟此據呂頤浩五月一日所申修入己丑以皇伯華州觀察使同知大宗正事安定郡王令矼薨輟視朝尋贈令矼開府儀同三司賜銀帛百匹兩庚寅殿中侍御史王縉言有司申請乞将預借坊場錢先還一半不便上曰既預借當悉還之朝廷號令貴於守信而已儻或失信何以使民服從宜如縉所奏辛卯内侍衛茂恂降一官送吏部茂恂往岳飛軍前撫問受餽過數内批降黜輔臣進呈上曰受餽送過數宜坐以贓罪今降官已是寛典須當逐之使為外任沈與求曰陛下罰此一人可以為後来之戒上曰有罪則罰何但此一人趙鼎曰陛下懲戒如此後人必不敢犯詔諸路監司帥臣曰朕以督護之重付在相臣臨遣視師俾分閫制凡所措畫動干事機惟爾監司帥守郡縣之官宜皆戮力同心協濟國事茍或懷私害公慢令失職已命張浚就加黜陟以聞國有常典朕不敢貸咨爾衆士毋敢弗䖍吏部尚書兼侍講孫近兼侍讀吏部侍郎劉大中兼侍講制曰朕惟王教典籍皆先聖所以致治之成法也屬時多艱不忘稽古設官勸講豈直踵故事而已哉慨念熙寧以来王氏之學行餘六十年邪說横興正塗壅塞學士大夫心術大壞陵夷至於今日之禍有不忍言者故孟氏以楊墨之害甚於猛獸亂臣賊子與夫洪水為患之烈信斯言也朕方閑邪存誠正心以正百官推而至於天下之心自非直諒多聞所謂益友者孰與考質疑義以輔朕之不逮大中博洽古今持論不阿擢自論思俾充此選夫作於心而害於政念既往之不足懲尊所聞而行所知庶将来之有可復朕罔敢不勉爾宜悉其所蘊癸巳殿中侍御史王縉言諸處推鞫公事惟姦􅂍之吏多挾智數重賄獄司追理干繫停緩嵗月使陳訴及照證之人各有退心然後􅂍状可以昭雪其堅執不退者往往非理致死欲乞委諸路提刑司檢法官看詳有情欵異同而申報病死者研究情實如有寃枉具申朝廷庶幾官吏不致輕害人命從之甲午以江湖福建浙東旱命監司帥臣修荒政輔臣進呈戒約旱災路分監司帥守賑濟飢民等文字上曰嵗飢民多流殍朕心惻然官為發廪以賑給之則民受實恵茍為不然雖詔令數下恐徒文具耳宜申飭有司多方措置米斛江東西湖南北福建浙東路令逐路監司行下旱傷州縣恪意遵行如奉行有方别無流亡當行旌賞如流亡稍衆或聚而為盜即重行竄責並令帥臣監司比較優劣保明來上取㫖賞罰中興聖政臣留正等曰水旱之災治世所不能免然必有以處之周有荒政漢有賑貸之令本朝從而推廣之災之所被必開倉廩已逋負休力役甚則轉他路粟以給之又甚則出内帑金帛以濟之視前代益周密矣至於戒飭監司督州縣以存恤有方與奉行不謹者而為之賞罰則自太上皇帝始州縣之官以字民為職者也職乎字民遇其災而不能救焉罰将奚辭彼知罰之可畏而賞之可慕也於救民何敢不力民之免於溝壑者非太上皇帝之賜歟二百餘年之間徳積而彌髙澤濬而益深民之戴宋永永無斁宜矣乙未莱州防禦使權主管侍衞歩司公事邊順乞外任趙鼎曰祖宗舊制三衙用邊臣戚里及軍班出身各一人所以示激勸也上曰戚里未有可以當此任者然近上戚里既擢用後或有罪戾罰之則傷恩貸之則廢法故不得不慎也唐用宗室至為宰相本朝宗室雖有賢才不過侍從而止乃所以安全之也中興聖政臣留正等曰漢以諸呂幾亂天下而文帝復使薄昭典兵豈非以太后故欲恩之耶昭卒犯法誅死尚足為恩也哉魏文帝譏之以舅后之家但當養育以恩不當假借以權亦可謂知言矣觀太上皇帝之語趙鼎真可為萬世法也丙申進士魏悌特補将仕郎悌行可子也行可之應募出使也朝廷己官其子弟至是其家復援例乞官子孫四人詔如所請而言者論行可名節無聞雖拘留未返朝廷所當存恤然恩例過厚公論未允故但録其子孫焉丁酉尚書都官貟外郎錢葉改禮部葉自御史府再轉為郎既而乞補外乃除知泉州二月辛亥除郡左朝散郎新荆湖北路轉運判官馮康國為都官貟外郎左宣義郎薛徽言守比部貟外郎戊戌都督行府奏乞将大姓己曽買官人於元名目上陞轉文臣廸功郎陞補承直郎一萬五千緡特改宣教郎七萬緡通直郎九萬緡武臣進義校尉陞補修武郎二萬二千緡保義郎已上帶閤門祗候三萬緡武翼郎已上帶閤門宣贊舍人十萬緡已有官人特賜金帶五萬緡並作軍功不作進納仍與見闕差遣日下起支請給其家並作官户見當差役科敷並免如将来參部注擬資考磨勘改轉䕃補之類一切並依奏補出身條法施行仍免銓試金帶永逺許繫從之建炎以來繫年要録巻九十七建炎以來繫年要錄巻九十七金人地名考證尼瑪哈原書作黏罕誤改見巻一烏瑪喇原書作五馬誤改見巻三十
