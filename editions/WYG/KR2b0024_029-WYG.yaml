body:
  text: 建炎以來繫年要録巻二十九宋李心傳撰建炎三年十有一月乙巳朔金人至廬州守臣徽猷閣直學士淮南西路安撫使李㑹以城降先是王善自淮寧分軍由宿亳而南無駐兵之地遂犯廬州聞金人至乃移屯於巢縣既又以其衆降金遂拘善於軍中盡散其衆其將祝友張淵輩各以所部行自是兩淮皆被善餘黨之擾矣初閤門宣賛舍人韓世清在蘄州事祖見六月州人請以為兵馬鈐轄上許之仍以世清兼蘄黄光江州興國軍都廵檢使世清聞金人渡江是日將吏㑹於州治世清有酒意即取黄衣被兵馬鈐轄趙令晙按北盟㑹編作俊於東㕔俾令晙即皇帝位令晙號呼不聽褫其黄衣知蘄州朝請郎甄采等共勸之世清乃止紹興二年閏四月辛丑行遣知濠州孫逸聞金兵已渡淮即聲言往建康見杜充計事遂以州印付淮西兵馬都監王宗望按北盟㑹編作張宗望而去充聞之即檄節制兵馬劉位權知濠州位招信人素豪强為鄉里所仗擾攘之際位聚集鄉民保守鄉井西北衣冠與細民多依之充在建康以位節制軍馬就統其兵至是付以州事丁未以上至越州徳音釋諸路徒以下囚罷邠州嵗貢火筯襄陽漆噐象州藤合揚州照子之屬初未行鈔鹽以前兩浙民户每丁官給蠶鹽一㪷令民輸錢一百六十六謂之丁鹽錢皇祐中許民以納絹從時價折納謂之丁絹自行鈔法後官不給鹽每丁増錢為三百六十謂之身丁錢大觀中始令三丁輸絹一匹時絹直猶賤未有賠費其後物價益貴乃令民每丁輸絹一丈綿一兩軍興丁少遂均科之民甚以為患至是聽五等下户以為半折帛半納見錢於是嵗為絹二十四萬匹綿百萬兩錢二十四萬緡紹興十三年七月壬申所書可参考勘㑹宋齊愈所犯當寘於法然已經大赦祗縁憎愛之私致抵極刑可追復通直郎仍與一子㤙澤勘㑹責授單州團練副使昌化軍安置李綱罪在不赦更不放還縁累經恩赦特許自便綱行至瓊州而還初京西制置使程千秋既軍襄陽有劇盗曹端者自京城聚衆擾於京西號曹火星千秋遣人招之屯於城下是時桑仲在唐州盡取彊壮為兵唐州之民在桐栢者先為董平攢集其不屬平者進退無所依皆盡室願歸於仲仲之衆漸盛遂自光化軍而南千秋亦招之屯漢水之北始范瓊討李孝忠至襄陽留五百兵戍守使東南第五將徐彦領之仲故識彦嘗遺以二刀千秋怒其通㓂是日南至諸將入賀酒三行千秋叱彦起席數其與仲通書之罪遂斬之仲怒引兵犯襄陽千秋命端出師并檄知鄧州譚兖為援端與仲遇於髙車急擊之仲敗稍引退㑹兖遣騎兵來策應千秋賞其精銳端愠遂率衆軍於中廬南漳之間仲諜知整衆復進至孛羅岡與馬軍遇崗地坡仰而有低林非騎兵之利鄧州兵大敗仲進薄襄陽千秋公安親随兵未嘗厯行陣皆輕跳欲出戰千秋不許至於再三乃令出戰親随兵無器甲仲以馬軍數百伏路兩旁俟其過未盡即突出大呼令坐以棍杖次第敲殺之統制官貴仲正等聞之遁去千秋棄城奔中廬仲遂據襄陽千秋宻遣人説端裨將王闢使殺端端軍多潰惟後軍李忠寨差逺獨不散自稱權京西南路副總管與其徒冠白巾聲言為端報仇千秋不可居乃自金州入蜀貴仲正以潰卒㓂荆南兵馬鈐轄武功郎渠成與戰殺之提㸃刑獄公事李允文在郢亦不能守引所部往鄂州於是京西列城皆為仲所據王之望記西事曰張浚用程千秋久之又疑其跋扈乃以郭永為檢察軍馬李允文為京西憲使左右掣其肘二人傾險輕躁欲得其處更謀撓之使不得有所為既又奪其便宜諸將以故解體遂至於敗按千秋為帥至此僅半年盖未久也不知浚何以遽疑而抑之恐别有故姑附此當求它書考證之趙甡之遺史四年八月桑仲䧟襄陽程千秋棄城走按四年六月九日知襄陽府王擇仁状准宣撫使司劄子勘㑹程千秋李允文不務協和襄陽府郢州並各失守已落職罷本任王擇仁差知襄陽府據此則千秋失守張浚聞知乃命擇仁而擇仁已到京西然後申上是時道不通郵置往來必已更渉數月其失守必在今冬不疑但未知的實是何月日也今因斬徐彦事併牽連書之俟考戊申尚書户部貟外郎陳戩守太常少卿新除太常少卿陳邁為中書門下省檢正諸房公事江東提刑司奏自罷本路常平司取㑹到見管錢四十五萬餘緡糧五十九萬餘石金帛三萬入千餘匹兩詔錢米仍舊樁管其金帛並輸行在是日完顔宗弼至和州守臣李儔以城降儔初見元年七月丙午時奉使崔縦從行官屬盧伸自北逃歸宗弼得歸朝官程暉令擕嫚書與伸皆赴行在十二月壬辰至明州己酉宣撫處置使張浚以便宜増印錢引一百萬緡以助軍食其後八年間累増二千五十四萬緡浚又置錢引務於秦州以佐邉用是日金人陷無為軍守臣朝散大夫李知幾挈其帑蔵與其民俱南歸厯陽縣丞王之道率遺民據山寨以守之道無為人也庚戍金人攻采石渡知太平州郭偉率将士拒敵敗之翌日又敗之金人退攻慈湖偉又敗之敵遂趨馬家渡辛亥江東南路轉運司言近㫖江州建康府守臣並帶制置使止謂制置軍事不用常法處斷將士罪名及抽取噐甲兵級今江州制置司乃用制置二字行遣他州事務如刑獄財賦及差官權領州事竊慮州縣無以適從望仍令提刑轉運司用條行遣從之壬子隆祐皇太后退保䖍州前數日江西轉運司得報敵騎至大冶縣未辨蕃漢是月戊申㑹江東宣撫使劉光世馳輕騎以聞翌日乃知敵且至滕康劉珏共議奉太后及近上妃嬪陸行餘皆舟行百官從便路起發集英殿修撰江西安撫制置使知洪州王子獻棄城遁走撫州衆推土人朝請郎李積中權州事積中初見元年七月己丑於是中書舍人李公彦徽猷閣待制權兵部侍郎李擢皆遁司勲貟外郎馮檝匿廬山佛舍郎官已下多潜去者此據張延夀劾䟽修入既而檝貽書光世勸以出兵掩敵大畧言此敵深入最兵家之忌又進則距山退則背江百無一利而敢如此横行者以前無抗拒後無襲逐如入無人之境故無所忌憚也非敵之能也觀村人之强壮者尚敢與之敵其間勝負亦或相半豈有國家素練之兵反不如村人之强壮者但望風畏之耳實不足畏也太尉儻選精兵萬人厚立賞格自將而來洪州等處援救開一路令歸伏兵於前而掩殺之可使匹馬不還光世不能用丙辰尚書左僕射吕頥浩奏宗支凋零之後欲望逐人各與添差監當一次州勿過七員縣勿過三員皆不釐務奉賜傔從視正官之半從之丁巳金人陷六合縣又陷臨江軍守臣中奉大夫直秘閣呉將之遁去將之吳興人也徽猷閣直學士致仕蔣猷卒於昌國縣猷金壇人事上皇為御史中丞立朝有直聲及是避兵南來而卒特贈顯謨閣直學士諡莊定戊午承奉郎致仕孫悟落致仕為通直郎假尚書兵部員外郎充大金軍前致書使承信郎卞信臣為忠翊郎假閤門祗候副之金人至洪州權知州事李積中以城降紹興二年二月甲申葉夏卿劾疏乃云夏卿權通判總郡事率衆投拜當考時内侍邵成章居洪州金人召之曰知公忠正能事大金富貴可長享成章不從遂逼之以威屢欲殺之亦不從金人曰忠臣難得吾不忍殺復遺之金帛賊劉忠犯蘄州蘄黄都廵檢使韓世清與戰破之忠遂轉入湖南先是東京乾明寺尼法静嘗偽稱柔福帝姬檢校少保保順軍節度使同知大宗正事仲的聞而迎之㑹仲的被㫖移司至宿州與忠遇仲的死仲的官職及死事日厯皆無之綸言集有仲的加檢校官制詞盖明受中所除也紹興二十一年六月辛夘士上奏仲的遇賊劉忠没於王事蒙聖㤙與五資㤙澤亦不云何月日當考法静為忠黨所掠世清得之法静自言已上皇季女小字環環其母小王媫妤也世清疑焉即坐之堂上與守臣朝請郎甄采等朝服隔簾問其故法静自言脱難之因且及往時宫閤間事世清信之遂以聞於朝采亦恐㓂至不能守即與世清率所部䕶帝姬自江西赴行在是役也蘄春尉晏子開率射士迎敵為所殺忠又入舒州執朝請大夫通判州事孫知微而去知微不屈忠怒臠而食之後贈二人官録子孫有差四年十月忠方據白面山不知以何時入湖南也知微紹興三年九月壬子推㤙庚申金人陷真州守臣向子忞棄城保沙上其所擕金帛悉為韓世忠所奪子忞子諲弟初見今年三月辛酉隆祐皇太后至吉州壬戌金人自馬家渡濟江初完顔宗弼既破和州與叛將李成同至烏江縣尚書右僕射江淮宣撫使杜充在建康諜言成師老可擊充遽遣兵而金師已大入充聞敵且至以其兵六萬人列戍江南岸而閉門不出師無統一㑹將官張超失守敵遂過江充急遣都統制陳淬督統制官岳飛劉綱等十七人將兵三萬人與戰又命御前前軍統制王􅊅以所部萬三千人往援敵破溧水縣尉潘振死之呂中大事記方其幸維揚也使經理兩河之計行則敵豈能越三關四鎮而擣淮及其渡江也使防淮之議不格則敵豈能越大江重湖而攻我哉朝廷棄三路如棄土梗棄兩淮如棄敝屣使敵入數千里如蹈無人之境不戰而敗不守而䧟二百年之天下不因民之怨叛而直失其太半可勝惜哉癸亥金人至太平州保寧軍承宣使主管侍衛歩軍司公事閭勍奉迎祖宗神御至越州詔奉安於天慶觀甲子陳淬與完顔宗弼遇於馬家渡凡戰十餘合勝負畧相當王􅊅引西兵先遁淬孤軍力不能敵還屯蔣山水軍統制邵青以一舟十八人當金人於江中舟師張青中十七矢遂退於竹篠港統赤心隊朝請郎劉晏以所部走常州浙西制置使韓世忠在鎮江悉所儲之資盡装海舶焚其城郭既聞敵南渡即引舟之江隂知江隂軍胡紡厚待之先是􅊅部將輔逵在東陽被檄策應􅊅與遇於中塗曰已失渡口遂與逵引其軍自信州入閩所過大擾是日知臨安府康允之言有歸朝官自夀陽來報金人數道並進已自采石濟江朝廷以未得杜充周望報大懼詔侍從議之給事中兼權直學士院汪藻中書舍人李正民議移蹕平江親督諸將拒敵緩急則登海舟避之宰相吕頤浩因率從官同對於便坐或謂且遣兵將或謂宜募敢戰士以行頤浩又乞自行議未决退詣都堂午間得周望奏且録杜充書言充在采石防江朝廷稍安然不知充已敗矣上未知韓世忠棄鎮江去命追世忠赴行在又欲令移軍常州吕頤浩請以御筆召之上曰朕與世忠約堅守令聞急乃來頤浩固請遂遣中使賫詔召之議者又慮金人自江黄間渡江或趨衢信以逼行在乙丑以中書門下省檢正諸房公事傅崧卿為嚴信州防遏使募土豪集鄉兵以守衢信隘路命兩浙東路提㸃刑獄公事王翿江南東路提㸃刑獄公事姚舜明兩浙東路安撫司幹辦公事郭亢悉以所募人聽崧卿節制崧卿取将必用儒術統制官侯延慶將前軍歩汝霖將後軍自將中軍延慶長沙人也諜報敵自鄂州南渡有中使自洪州至云太后已往䖍州詔前知濱州向大猷為臣不忠屢為叛逆移文指斥罪状深重可令越州領赴市曹處斬先是武功大夫忠州刺史宫儀既以所部留真州事見今年八月而徽猷閣待制劉洪道入朝言其在山東時事儀縊死傳首赴行在以其軍𨽻御營前軍統制王􅊅洪道又與大猷偕來且奏其指斥之罪故抵死呂頤浩言洪道之才乃以為御營使司參議官洪道除參議未見月今併書之丙寅從官入見慮敵騎不測馳突時殿前副都指揮使郭仲荀方自臨安來乃請以仲荀輕兵三千人從駕往平江府倚周望韓世忠兵為重仍令張俊兵以次進發上以俊重兵不可留遂决議皆行退命汪藻草詔書諭中外以將往浙西迎敵是日杜充聞軍潰欲乗舟出奔方開水門士民争門不能出充使人諭之曰相公欲迎敵金人耳衆皆呼曰我亦往迎敵竟不能行而止於是市井喧言杜相公枉殺幾許人及其警急乃欲先遁充懼命軍士人犒銀絹十匹兩時陳淬已戰死夜岳飛等皆引去上元縣丞宣教郎趙壘之統鄉兵迎敵死之紹興三年四月壬子贈壘之奉議郎與㤙澤一資詔海舶擅載外國入貢者徒三年財物没官此據慶元随赦申明丁卯詔曰朕纉承以來深軫念慮謂父兄在逺而兵民未撫不欲身陷於鋒鏑故包羞忍恥為退避之謀冀其逞志而歸稍得休息卑辭厚禮遣使相望以至願去尊稱甘自貶黜請用正朔比於藩臣在建康則遣洪皓崔縱杜時亮在平江則遣張邵其為書指無不曲盡哀祈假使金石無情亦當少動近報金人一項自采石一項自黄州渡江生民嗷嗷何時寜息今諸路兵聚於江浙之間朕已移蹕浙西為迎敵之計我將佐人民與其束手待斃不若併計戮力以存國家遂遣兵三千先行時敵已逼建康而行在未知也金人至吉州知州事直龍圖閣楊淵棄城去隆祐皇太后離吉州至争米市敵遣兵追御舟有見金人於市者乃解維夜行質明至太和縣舟人耿信及龍神衛四廂都指揮使楊惟忠所領衛兵萬人皆潰其將傅選司全胡友馬琳楊臯趙萬王璉柴卞張擬等九人悉去為盗乘輿服御物皆棄之欽先孝思殿神御頗有失者内蔵庫南廊金帛為盗所攘計直數百萬宫人失一百六十人惟忠與權知三省樞宻院滕康劉珏皆竄山谷中兵衛不滿百從者惟中官何漸使臣王公濟快行張眀而已金人追至太和縣太后乃自萬安捨舟而陸遂幸䖍州后及潘賢妃皆以農夫肩輿宫人死者甚衆從事郎三省樞宻院幹辦官劉徳老亦為敵所殺後官其家一人先是康珏為幹辦官汪若海何大圭所間二人不和遂有兵火之禍選初見元年十月乙酉若海初見元年正月丙午大圭初見元年六月庚午潰兵之作亂也知永豐縣承議郎趙訓之尉修職郎陳自仁為所害後贈訓之直秘閣自仁通直郎訓之後諡忠果時金分兵侵撫州守臣王仲山以城降拜金以其子權知州事令括管内金銀赴洪州送納又侵袁州守臣顯謨閣待制王仲嶷亦降仲山珪子仲嶷仲山兄也按宋史繫戊午日両浙宣撫司統制官郭仲威以所部七千人屯通州海口金人至六安軍知軍事邉某降敵遣北軍三百人屯城中不殺不掠已又陷建平縣是日杜充引親兵三千絶江而北統制官王進王冠猶以本部随之時上遣内侍任源至充軍前道梗不逹以状白充充即附奏以謂初乞御營諸將聽其節制實無妄自尊大之意但欲人情相諳緩急可使令者劉光世逺在九江不得使韓世忠近在鎮江不能使儻王􅊅有心報國當陳淬等接戰之際乘勢向前敵兵必敗豈有今日􅊅之不忠萬死有餘臣今在儀真檄召徐泗二州趙立劉位等集兵却廻鎮江以䕶王室此區區困獸之志也時充在真州寓天慶觀守臣向子忞勸充自通泰入浙欲與之偕行充有邪謀不聽子忞棄真州去充命冠知真州自為出陸計聲言往招信縣㑹劉位兵來援遂北行進登州人初為逓卒此據吕頤浩奏議後以功補官充擢為宣撫使統制戊辰贈故刑部尚書王雲觀文殿學士官親屬八人以新除吏部侍郎鄭望之言其死節也仍命所在訪其家屬日厯無此今以紹興五年四月十四日雲子壻任使臣乞㤙澤状修入己巳上發越州次錢清堰夜得杜充奏我師敗績上謂輔臣曰充守江不利陳淬戰没王􅊅擁兵南遁金國人馬必臨浙江追襲事迫矣卿等意如何吕頤浩曰臣有一策望聖意詳度斷在必行上曰如何頤浩奏金人以騎兵取勝今鑾輿一行皇族百司官吏兵衛家小甚衆若陸行山險之路糧運不給必致生變兼金人既渡浙江必分遣輕騎追襲今若車駕乘海舟以避敵既登海舟之後敵騎必不能襲我江浙地熟敵亦不能久留俟其退去復還二浙彼入我出彼出我入此正兵家之竒也上沉吟久之曰此事可行卿等熟議來日召侍從臺諫至都堂参議可否庚午上遽回鑾王庭秀閲世録云二十五日駕至錢清聞金人已渡大江二十六日駕回避敵己巳二十五日也李正民乘桴記云二十五日夜得杜充敗奏又康允之奏人馬已自建康徑路趨杭州界遂倉卒回鑾按敵以二十七日辛未入建康十二月初始自廣徳軍湖州界趨臨安府恐此時允之未應已奏敵至府界正民所記或誤熊克小厯又因而書之當考晚次越州城下從官對于河次亭上侍御史趙鼎言衆寡不敵勢難與戰宜姑避之吕頤浩乃聚議航海新除吏部侍郎御營使司參賛公事鄭望之後至獨謂自古興王未有乘舟檝者權户部侍郎葉份中書舍人綦崈禮曰若别有策甚善不然捨海道將安之頤浩晚朝奏事上曰航海之事朕昨夕熟思之斷在必行卿等速尋船遂决䇿移四明中興聖政張滙進論曰金人之至江南也朝廷豈不知敵所利者騎也我所利者舟師與步兵也江浙之地騎得以為利乎此皆騎之危地也舟師步兵之利地也金人有知豈肯致身於此耶若御駕親征諸路進討尚可取勝而乃朝廷自散為敵得志而去此失於退二也按全論見是年十二月頥浩奏令從官已下各從便而去上曰士大夫當知義理豈可不扈從若如此則朕所至乃同㓂盗耳此據李正民乗桴記於是郎官已下或留越或徑歸者多矣御史中丞范宗尹參知政事侍御史趙鼎試御史中丞二人皆嘗建議避敵故遂用之時宻院惟張守獨員乃命宗尹兼權樞密院事宗尹兼樞它書無有紹興四年五月十五日樞密院客司供到下項建炎年參知政事范宗尹兼權樞宻院事且附此當求它書考其月日端明殿學士簽書樞密院事周望同知樞密院事仍兼兩浙宣撫使總兵守平江府殿前副都指揮使郭仲荀為兩浙宣撫副使與御營使司都統制辛企宗並守越州御前右軍都統制張俊從上行以俊為浙東制置使尚書祠部員外郎萬格為監察御史格之除日厯不見此據本臺題名格鄱陽人也辛未遣右武大夫和州防禦使樞密院提領海船張公裕徃明州募舟户部員外郎宋輝往秀州自海道運錢糧赴行在公裕開封人故省吏輝敏求孫也敏求平棘人元豐龍圖閣直學士是晚上詣都堂撫諭將士移御舟過都泗堰不克上命斧碎之是日金人陷建康初完顔宗弼既濟江士馬皆集遂鼓行逼城下户部尚書李梲與守臣顯謨閣直學士㳂江都制置使陳邦光具降狀遣人即十里亭投之宗弼喜曰金陵不煩攻擊大事成矣宗弼入建康邦光率官屬出門迎拜通判府事奉議郎楊邦乂邦乂初見元年五月不從大書其衣曰寕作趙氏鬼不為它邦臣既見邦乂獨不拜宗弼不能屈翌日遣人說邦乂以舊官許之邦乂以首觸堦求死金帥張太師者止之邦乂又遺金書曰世豈有不畏死而可以利動者幸速殺我方邦光出城投拜也居民争出城取蔣山路而去金人馳騎往蔣山遮其路約居民復回城中壬申光澤縣射士與金人一騎至邵武軍言大軍千餘人且至守臣朝請大夫張髦斬其首以聞既而髦以州事委寓居官陳直方而行閩中大震癸酉晚上發越州雨始作自是連雨泥淖吏卒暴露不勝其苦兩浙轉運副使直顯謨閣陳谷瑞排頓得豬肉六百斤炭千二百斤以給衛士日厯上發越州在壬申今從李正民乗桴記谷瑞莆田人也是日金人侵建昌軍先是金人既陷撫州遣人賫檄諭降守臣方昭慮為軍民所脅以印授承事郎通判軍事晁公邁而去未幾公邁亦以募兵為詞而出衆推承信郎兵馬監押蔡延世以守公邁任城人嘗為少府監主簿延世建昌人本太學諸生先是金人既入洪遣十人持檄至城下延世盡斬之及是敵兵臨城問十人所在延世示之以其首金人怒求戰延世擊却之公邁歸延世拒不納遂領軍事公邁坐罷去晁公遡撰公邁墓誌通判建昌軍未至建昌女真䖍劉豫章臨川遂命權知撫州女真始去公私掃地赤立盗發其傍州人惴恐乃誅豪彊撫鰥寡盗聞其聲不敢犯或者毁其功以為罪呂頤浩當國銜前在發運使争公事奏免所居官按此與日厯所書全不同盖私家傳誌類多失實今不取甲戌奉議郎通判建康府楊邦乂為金人所殺前一日金帥張太師與李梲陳邦光燕樂方作召邦乂立堂下邦乂見梲邦光叱之有劉團練者取紙書死活二字示邦乂曰若毋多言欲死趣書死字示我乃信邦乂奮前奪吏筆書字曰死金人相顧動色然未敢害是日完顔宗弼再引邦乂邦乂不勝憤望見大罵宗弼大怒擊殺之剖腹取其心邦乂死年四十四附傳邦乂死節在十一月庚申按庚申金未渡江當考初贈直秘閣官其子二人賜田二頃後諡忠襄紹興二年正月再贈是月張浚至秦州才數日即出行關陜參議軍事劉子羽言右武大夫忠州刺史涇原兵馬都監兼知懐徳軍吳玠之才於浚玠亦素負才畧求自試浚與語大悦擢為統制又使其弟進武副尉璘掌帳前親兵淮西兵馬都監王宗望在濠州以孤城難守遂率官吏請降金以其將孫興知濠州廸功郎陳浩然同知州事且屯北軍五百興燕人浩然夀春幕官也興等既入城但改天㑹之號其餘一無所問由是居人稍安建炎以來繫年要録巻二十九
