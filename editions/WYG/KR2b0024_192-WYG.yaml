body:
  text: 建炎以來繫年要録巻一百九十二宋李心傳撰紹興三十有一年八月辛丑朔忠義人魏勝復海州勝素無賴私渡淮為商至是率其徒數百人至海州自稱制置司前軍大兵且繼至海州遂降熊克小歴云李寳子公佐挾歸正官魏勝得海州今從徐宗偃兩淮紀實右朝奉郎趙學老通判秀州學老野子已見癸夘故左朝議大夫李彌遜追復敷文閣待制彌遜始坐詆和議謫籍至是始復之右文殿修撰提舉江州太平興國宫孫覿復敷文閣待制致仕覿年八十矣太學博士蔣芾國子正芮曄並為祕書省正字甲辰左朝請郎馮時行知彭州初時行守黎州上記其名召赴行在時行至建康以疾不進上疏言敵決敗盟望移蹕進幸建康下罪已之詔感動中外願與社稷俱為存亡自古未有人主退而能使天下進人主怯而能使天下勇今之形勢不比全盛之時車駕已在江南無復可徃之地福建二廣陛下可到彼亦可到蜀雖險阻形勢廹促如鼠入牛角必不能久將士觀望忠義之氣沮喪散而為盗賊大事去矣又沿邊備禦朝廷雖已措置然尚多闊疎荆南兵弱循贛將士不服李道節制緩急豈能為用鄂州田師中老且病上流重地恐不可保願以李顯忠代之劉錡有威名借其譽望不當便置之前行張浚憂患頓挫更歴已無少年輕銳之氣願陛下捨一己之好惡勉用浚以副人望決能使軍民回心踴躍鼓舞其效亦非小補財用在今日最為難事宜省官吏減州郡冗卒陛下痛自撙節蠲損切身之奉以養戰士清心寡欲踈逺閹寺與賢士大夫骨鯁謀議之臣共濟艱難然後命大臣留守宫闕陛下如建炎之初馬上從事以數十騎徃來循撫諸軍江淮荆襄無有定處使敵莫能測今敵使已還臣料朝廷必有大措置一新天下耳目旬日之間寂然無聞臣恐廟堂之議猶欲遣使祈請冀和議可以遷延以臣計之萬無此理臣紹興初䝉陛下召對時敵適請和臣以為疑至煩聖訓以為親屈己之意然和議既成無以善其後臣之愚言猶有騐于今日今敵既敗盟臣又以其狂愚冒凟聖聴望陛下特垂聖覽採而用之無使狂瞽之言又騐於異日也疏奏乃有是命直秘閣淮南路轉運副使王秬與在外宫觀右朝奉郎知通化軍莫濛為淮南轉運判官兼淮西提刑提舉常平茶鹽公事時秬自言生長兵間諳練戎事願得歩騎五千求試方畧因請至都堂白事許之殿中侍御史杜莘老奏秬自到官將淮上兵民分𨽻諸將民情皇駭今又狂率大言侵將帥之事秬遂罷去初詔淮漢郡縣籍民為兵秬在淮南乃選丁壯欲湼其手面從大軍役使民駭而逃莘老言敵未至而先􅇌吾民非計請令民兵止聴郡縣官節制征役無出鄉從之淮民乃定直顯謨閣知荆南府續觱既受朝命乃請籍民為義勇其法取於主户之雙丁毎十戸為甲五甲為團甲團皆有長又擇邑之豪為總首嵗於農隙教以武事而官給其糧其後𨽻於籍者至七八千人武昌令薛季宣亦求得故陜西河北弓箭手保甲舊法討論甚具㑹有伍民之令乃出其法行之五家為保五保為甲六甲為隊地形便合為總不以鄉為限總首副總首領焉官族士族富族皆附保蠲其身俾輸財供總之小用諸總必有射圃民暇則集無蚤暮之節盡禁蒱博獨許以擊刺馳射角勝五日更至縣廷閱其尤者勞賞之里閭皆以武功相髙氣俗一變旗幟總别為色槍杖皆中度候望干棷不幸死者予棺復家三嵗諸鄉皆置樓盗發伐鼓舉烽以相號召瞬息遍百里盗為衰止總首白事吏無得預追胥興發一以縣檄為騐季宣徽言子也此皆不得其時因罷王秬遂牽聫書之乙巳尚書省言兩國使命徃來舊係盱眙軍前期差人議定禮數近兩次大金金牌天使過淮顯是守臣不職兼慮倉卒祗備不及却致失禮詔右朝散郎知盱眙軍周淙特降二官丙午右奉議郎通判楚州徐宗偃挈其孥渡淮南歸因赴制置司議事丁未詔婉儀劉氏可歸本家逐便本閣官吏並發遣歸合屬去處官告令有司毁抹和州防禦使知閤門事幹辦皇城司劉伉提舉洪州玉隆觀任便居住放劉婉儀事史不言所以趙甡之遺史云初劉錡都統鎮江之軍屢請決戰用兵朝廷猶俟金人先有釁隙則以兵應之故未許錡申請不已及除制置使亦申請用兵一日汪應辰獻復和䇿堅執和議且言國家自講和至今未嘗有違闕用兵之議恐誤大計繼先因間見上言今邉鄙本無事盖縁新進用主兵官好作弗靖喜於用兵重欲邀功爾若斬一二人則和議可以復固上不懌曰是欲我斬劉錡乎是時盱眙軍奏到金人遣韓汝嘉直入盱眙館口傳勑不許奉使徐嚞渡淮未有以處之上在劉才人位進膳不舉筯才人怪之遣中人物色聖情因何不懌乃得應辰之䇿繼先之言才人侍上因用言寛觧上意大抵與繼先之言相似上怒問曰汝安得此言才人不能隠遂具説遣中人物色得繼先之言上大怒劉才人俄以他事賜第别居右武大夫容州觀察使兩浙東路馬歩軍副總管傅選移江南東路建康府駐劄戊申淮南等路制置使劉錡言新創踏射威强弓兵宰執乞推賞上曰此未可遽行不知威强與尅敵髙下如何今若别置名恐壊格法莫若且以尅敵為凖宗正少卿唐文若為起居郎上嘗諭大臣以文若與虞允文杜莘老馬騏才皆可用尚書兵部貟外郎劉堯仁充右文殿修撰知池州屯田員外郎韓彦直充秘閣修撰知蘄州給事中黄祖舜中書舎人楊邦弼言論譔之職祖宗以待文學博習之士其後或以旌勸勞能未有僥倖蠟至者乞令堯仁依舊充秘閣修撰彥直依舊直顯謨閣赴任後有治效因以加之庻㡬倖門不開詔可上因言祖舜在後省所言皆當陳康伯曰誠如聖訓二人還舊職在此月辛亥辛亥詔兩淮諸州起理二稅之外凡諸色科敷如天申節銀絹土貢銀人使歳幣亭館顧船貼撥等錢並停罷用權刑部侍郎張運請也詔昭慶軍承宣使致仕王繼先令於福州居住用殿中侍御史杜莘老奏劾也繼先怙寵干法富埒公室子弟直延閣通朝籍姻戚黨友莫非貴游數十年間未有敢揺之者自聞邊警日輦重寳之吳興為避賊計莘老入見面奏繼先十罪大畧謂繼先初係賤工負擔喝藥因奴事秦檜入拜其妻叙為兄弟夤縁薦引遂得以薄術供奉陛下盛徳至仁以顯仁皇后間餌其藥特加寵遇而繼先憑恃恩寵二十餘年恣為姦惡乃於都城廣造第宅占民居數百家以至侵官街塞運河其屋宇臺榭皆髙廣宏麗都人謂之快樂仙宫僣侈如此罪一也專用給使李彦輩數人强奪良民婦女以為侍妾雖有婚姻一切不顧鎭江倡家女童妙於歌舞又作御前取索至今尚在罪二也淵聖皇帝成喪之後舉家燕飲令妓女舞而不歌舉手頓足謂之啞樂罪三也自聞金使之來日輦重寳載之吳興罪四也隂飬無賴惡少年數百人私置器甲日夕教練罪五也繼先因其子守道悦道累為兩浙運司主管文字遂盡籠公私之利虧損官課賤市絶產多役禁兵罪六也受富民金鼐海舟薦為閣職事見二月辛夘凡州縣治大姦興大獄有力之人厚齎金帛以賂繼先隨即解免罪七也又於都城及他處佛寺建立生祠即嘱州縣蠲免科湏凡天下名山大刹常住所有大半入繼先之門又於北山招賢寺因山作園民間邱墓悉令移掘罪八也繼先嘗强奪其姊眞珠直千餘萬緡為姊所訟乃誣以姦罪編管罪九也凡醫工技出其上動輙沮格擠䧟故中外貴近多為繼先用藥謬誤以致危困罪十也繼先過惡臣特舉其大者如此餘雖擢髪實未足數上作而歎曰有恩無威有賞無罰雖堯舜不能治天下乃詔繼先福州居住其子武泰軍承宣使兩浙西路馬歩軍副都總管安道右朝議大夫直徽猷閣兩浙西路安撫司㕘議官守道右朝奉郎直秘閣兩浙轉運司主管文字悦道孫右承議郎直秘閣錡等並勒停凡繼先掠良家子為奴婢者百數悉還其家籍其貲以千萬計壬子詔鬻繼先田園及金銀並𨽻御前激賞庫専以賞將士其海舟付李寳天下稱快焉趙甡之遺史云王繼先遭遇在紹興中冠絶人臣權勢之盛與秦檜埒張去為以下猶不足道大抵上以國事委之檜家事委之去為一身委之繼先所以繼先憑恃恩籠靡所忌憚及是乞斬新進用主兵官上不懌劉才人因寛觧上意與其言相似上大怒杜莘老探知上意乃具白簡乗勢彈擊甚善之舉也惜乎莘老蜀人去國稍逺不知繼先出處而言繼先因奴事秦檜夤縁薦引又顯仁皇后間餌其藥特賜寵遇者非也其所言十事乃繼先之細過耳繼先乞斬主兵官事已具此月丁未劉婉儀可歸逐便注是宋史全文進呈後省繳駮劉堯仁韓彥直進職事先給事中黄祖舜中書舎人楊邦弼同狀乞劉堯仁仍舊秘閣修撰韓彥直依舊直顯謨閣赴任候有治效因以加之庶㡬倖門不開上曰依奏右通直郎直敷文閣劉堯勛換武畧郎閤門宣賛舎人從所請也癸丑兩浙轉運司獻䟎積錢二萬緡臨安府獻五萬緡上謂大臣曰可樁留外府若下諸路切戒毋得科敷如昔時羡餘實資贓吏而擾吾民也尚書禮部郎中王普為太常少卿吏部郎中陳之淵為秘書少監司封員外郎兼建王府賛讀史浩試宗正少卿祠部郎中兼建王府直講張闡試將作監兼職並仍舊詔皇子建王故妻咸寕郡夫人郭氏追封淑國夫人文州刺史權知閤門事張掄幹辦皇城司成忠郎閤門祗候張薿充東南第四將薿掄子也資政殿大學士知建康府王綸薨是日金主亮弑其母太后於宫中初其母病亮徃視之問以所苦母曰吾無他疾以皇帝用兵不止逺征江南是吾病也亮大怒曰非朕母乃南宋國王之小妻也遂命䕶國將軍持嘉彥忠弑之以威言者於是左右縮頸國人以目其后圖克坦氏與太子光瑛復諫亮亦欲誅之母子俱避去三日而後出甲寅浙西馬歩軍副總管李寳以舟師三千人發江隂先是寳自行在還即謀進發軍士洶洶争言西北風力尚勁迎之非利寳下令大計已定不可揺敢有再出一語者斬遂發徽猷閣直學士知平江府洪遵竭資糧器械濟之放蘇州大洋行三日風果怒甚舟散漫不能收寳慷慨謂左右曰天欲以試李寳邪此心如鐵石不變矣即酹酒自誓風亦隨止退泊明州關澳追集散舟不浹旬復故而裨將邊士寧自宻州還言魏勝已得海州矣寳大喜促其下乗機速發而大風復作波濤如山者經月未得進乙邜江淮制置使劉錡引兵屯揚州錡將渡江以軍禮久不講乃建大將旗鼓以行軍容整肅江浙人所未見也時錡方病不能乗馬乃以皮穿竹為肩輿鎭江城中香煙如雲霧觀者塡擁右奉議郎通判楚州徐宗偃見錡力陳兩淮要害山陽宻邇清河口實為控阨之地合肥扞蔽夀春自古北軍悉由渦口渡淮彼或長驅則兩淮皆非我有望速遣精銳列戍勿使敵得衝突錡疑未決淮東副總管李横浙西副總管賈和仲適來白事皆共賛之乃遣殿前司䇿應右軍統制王剛以五千人屯寳應徐宗偃兩淮紀實稱八月十一日至維揚軍前而趙甡之遺史劉錡軍至揚州乃在十五日乙卯疑宗偃先至揚州也丙辰國子博士兼建王府小學教授劉藻守尚書祠部員外郎浙東提鹽司言溫州積鹽數多不售詔商人算請十袋者増給二袋即本路住賣者増一袋仍限半年以温鹽水路由海道陸路渉山嶺客人少肯請販故也左奉議郎方疇降一官疇通判武崗軍坐失察吏人減常平錢法寺當私罪絞詔貸命除名編管及秦檜死疇訟枉於朝再鞫得實改正猶坐㣲文奪官焉劉婉儀之未廢也遣人諭廣州蕃商蒲琚獻名珠香藥而以承信郎告償之提舉市舶林孝澤以非奉朝㫖執不行且言於朝詔毋獻建武軍承宣使許世安卒是日金主亮殺其翰林直學士韓汝嘉汝嘉自盱眙歸諫亮寝兵議和亮曰汝與南宋為游説邪遂賜死丁巳詔鄂州駐劄御前諸軍都統制田師中令赴行在奏事殿中侍御史杜莘老言師中老而貪士卒怨偏裨不服臨敵恐誤國事御史中丞湖北京西宣諭使汪澈亦言師中握兵久且耄緩急恐不可倚仗上乃召之尋以潭州觀察使知襄陽府吳拱為鄂州諸軍都統制田師中之召吳拱之除日歴本不書今以徐夢莘㑹編増入㑹編稱拱九月庚辰交鄂州都統去此凡二十三日卒酉百官受明堂誓戒於尚書省上易純吉服壬戌資政殿學士張燾落致仕復知建康府樞宻都承㫖徐嚞文州刺史知閤門事張掄自盱眙還行在徐宗偃之在淮隂也有遷民孫一者自北來言嘗為金差徃濵州充水手暨逃歸而家屬已渡淮偶相値於此備陳海道曲折謂舟船雖大且多然皆松木平底不可渉洋水軍雖多悉簽鄉夫朝夕逃遁一有警急必致潰散及有願募人徃焚燒其舟船者宗偃因條具邊防利便遂併以其事白廟堂附疾置以達至奏邸特空函耳朝廷乃劄付宗偃根究沿路盗拆後數日乃知逓過山陽城下為郡中竊匿宗偃復條書附嚞掄以歸金人既却二使還復求遣仍令於九月中旬至汴京朝廷報以三節人從悉已放散若再行收拾恐趨期不及俟非久賀正當令嚞掄充使副一就奏禀此並據徐宗偃紀實亮不意朝廷與之絶大怒濟南府布衣髙禹特補右廸功郎揚州司戶㕘軍禹父敞知朐山縣魏勝之得海州也敞與奉直大夫知東海縣支邦榮皆欲迎拜邦榮京東人在金中進士及第或勸之使去邦榮曰我本大宋之民今將安歸遂以縣降禹將其家之淮甸頗能言金國利害制置使劉錡遣赴行在遂有是命徐夢莘北盟㑹編稱李寳至東海縣偽知縣高敞降拜寳載敞下海令其子禹挈家徃淮甸按馮忠嘉海道記寳以此月壬辰發明州關澳十月庚子乃抵東海縣夢莘所記恐誤是日劉錡在揚州得省劄諜報金以二十五日渡淮謂右朝奉郎通判楚州徐宗偃曰錡来日提師自天長趨盱眙君速歸語太守寳應以北日下清野勿留寸草有不如約當以軍法從事又謂轉運副使抗曰錡調人馬公主軍食各有司存毋相侵奪倘糧運乏絶非人情敢私抗與錡素不相下聞其言甚恐後三日宗偃至楚州金以是日渡淮之説已無驗守臣王彦融以未得制置司檄亦不聼宗偃乃白錡願以策應右軍移屯城下又旬日錡遣統制官吳超以所部駐盱眙宗偃再以書乞留屯淮隂合兩軍共萬人淮民稍定癸亥太常少卿王普言三衙藏氷甚富而祭祀未嘗供氷望自今令供氷如故事從之右朝散郎知安豐軍向汋轉一官知信陽軍降授右朝請郎主管台州崇道觀馮榮叔知興化軍乙丑右宣義郎通判揚州劉祖禮知泰州丙寅詔訪聞諸軍勘請回易處仍舊尅除或非理斂索並行禁止違者重寘之法初上念出戍官兵之勞出内帑七萬緡分犒其家殿中侍御史杜莘老言軍士負回易子錢甚夥例以月廪取償不先除此弊緡出禁帑入將帥私室矣上悟遂悉除軍債戊辰上齋於文徳殿忠義人魏勝特補武翼郎統制忠義軍馬趙甡之遺史於此日即書勝除閤職知海州恐誤進士李坤言北界調發事冝及金主遣張中彥窺蜀劉萼窺漢南等事淮南轉運副使楊抗以奏遂命坤以官己巳起復慶逺節度使主管侍衛馬軍司公事成閔充湖北京西制置使節制兩路軍馬九月庚午朔命輔臣朝饗太廟辛未宗祀徽宗皇帝於明堂以配上帝建王亞獻嗣濮王士輵終獻樂備而不作初禮官以行禮殿隘欲祀五天帝於朶殿五人帝於東西廂太常少卿王普言有熊氏乃聖祖之别號因引皇祐故事並升於明堂各依其隅鋪設五人帝在五帝之左稍退五官神位於東廂皆遣官分獻罷從祀諸神位用元豐禮也先是權禮部侍郎金安節以淵聖皇帝未祔廟請宫廟皆以大臣攝事權工部侍郎黄中請毋新幄帟毋設四輅以節浮費皆從之祭之日用鹵簿萬一百有四十人禮畢就常御殿庭宣制書赦天下壬申詔降授武泰軍承宣使提舉台州崇道觀劉寳令於福建路任便居住日歴寳今年正月壬辰初降官時已降㫖福建路任便居住不知赦後何以又降此㫖也熊克小歴今年四月末書陳俊卿論鎭江都統制劉寳責散官安置按日歴寳去年十月辛酉用汪澈陳俊卿章疏罷鎭江都統今年正月壬辰落節克恐誤癸酉淵聖皇帝百日上詣几筵殿行禮中書舎人楊邦弼卒大臣言其貧詔賜銀帛二百匹兩甲戍金人犯鳳州黄牛堡先是統軍張中彦與陜西都統完顔喀齊喀喀齊喀羅索孫初見紹興十年十一月將五千餘騎自鳳翔大散關入川界三十里分為三寨至是㳺騎攻黄牛堡守將李彦仙來告急四川宣撫使吳璘方受賀即肩輿上殺金平彦仙督官軍用神臂弓射敵却之璘遣將官高崧為之援仍與本堡管隊官張操同力拒敵敵遂扼大散關深溝高壘以自固璘駐青野原顧謂其下曰金自守之兵不足慮也益調内郡兵分道而進面授諸將方畧時四川安撫制置使王剛中被㫖徃軍前見璘計事剛中乗皮輿以避矢石人皆哂之剛中聞劉錡制置淮南因對璘談錡之美璘曰信叔有雅量而無英槩今天下雷同譽之璘恐其不能當亮也剛中未以為然丙子知資州王堡言蜀中地狹民稠衣食不給在法嵗以仲冬朔日給貧民常平義倉米豆日一升十嵗以下半之至三月終止縁蜀中常平窠名自軍興皆已移用而義倉非水旱不可擅支乞以義倉米豆通融支散又請民戶所輸畸零物帛依舊法合零就整同旁送納皆從之少師瀘州軍節度使致仕榮國公錢忱薨其子權戶部侍郎端禮以憂去位詔贈忱太師擢其孫右朝奉郎竽為直秘閣丁丑詔帶職正郎因事奪職而不降資或雖降資而非犯入己􅂍私罪徒以上及臣僚因言者論列而無􅂍私罪者雖未得宫觀並許以致仕恩澤任子帶職員郎未經奏薦而落職未復者亦如之以給事中黄祖舜等㸔詳有請也事祖在七月丙申庚辰給事中兼侍讀黄祖舜同知樞宻院事開封府進士劉藴古特補右廸功郎添差兩浙西路安撫司凖備差遣藴古在北作提盝販賣釵環者徃來夀春𣙜場與南客語欲歸朝言南北利害有好異者接引使歸朝至則上書遂有是命時又有進士梁淮夫者應天人大父陟官至朝奉郎元符末坐上書入黨籍至是淮夫自北來歸見大臣言北事大畧以為自金亮簒位以來前此功臣誅鋤已盡大興土木軍民離心又金人所射弓不過五㪷其器甲非如本朝堅利若我兵遲遲不決萬一亮死更立新君或土木畢工稍革暴政則人思息肩矣彼中百姓延頸以俟天兵若聞再議講和則民心必變又河北盗賊已起萬一此徒益熾假仁義而行之其為患不在金人之下今宜以正兵守淮甸以示弱使游騎侵陜右以下關中彼必以精兵盡赴關中之急然後以竒兵由濵州分二路以趨燕晉斷其歸路又條上在北聞見事宜十九事大畧謂北軍畏怯無復昔時輕銳果敢之氣且宿將已盡今之所用者惟歸朝人馬又鞍馬亦不多其所括水軍皆灌園種稻取魚之人實不識江海水性今敵之千戶毎人但有甲兵三百人萬戶九百人其餘皆民兵簽軍實無鬭志又言金人所憚惟劉錡李顯忠又言金人令倪蠻子等三人指教打造戰船七百隻皆是通州様各人補忠翊校尉俟將來成功以節度使待之去年十一月唐蔡州報沿邉有人馬甚衆不委便是南兵移文諸州各加嚴備百姓聞之徃徃遞相慶賀至有出郊或移他郡迎問南兵至期久而無耗皆怏怏悵望又言中間金人收取河南之後張七郡王軍至南京榖熟縣徃徃虜掠良人妻妾奪取財貨其酷無異金人百姓之心皆始失望今宜預先戒約使官軍所至秋毫無犯最為要切又言金主簒位之初嘗對諸大臣言若趙宋如東昏時依舊通和煞好方一月餘劉麟作右丞上章乞簽鄉軍收江南金主出麟作上京轉運使繼而身死又言金人未修内以前米斛極賤米不過二三百一石自修内後連綿水旱螟蝗間作賦税之外以和糴為名强取民間者如帶糴借糴帖糴之類二年之間不下七八次民間有米盡數為之拘括無則以戶口大小擬定數目勒令中納以此官積蓄多而民間乏食是日鄂州駐劄御前諸軍都統制吳拱始視事遂漸發諸軍徃襄陽京西湖北制置使成閔以鄂州左軍統制郝晸權知襄陽府郝晸知襄陽日歴不載但於明年四月乙未書王宣知襄陽府郝晸令依舊歸軍趙甡之遺史云成閔至鄂州受左軍統制郝晸金三百兩令晸知㐮陽府自此皆知閔為不足與成事功矣以事考之郝晸知襄陽必在吳拱改除之後故因拱受命書之當求他書係其本日辛巳上謂宰執曰近臣僚多上封事朕甞親閲徃徃至夜分陳康伯曰陛下乙夜之覽豈不重勞上曰誠恐其間不無利害又曰方兹多事朕於宫中所在常令以筆硯自隨毎思得一事即札記付外行之康伯曰陛下憂勤雖湯文昧爽日昃何以過之權尚書禮部侍郎兼侍講金安節試給事中定江軍節度使開府儀同三司田師中自鄂州至行在上召見師中乞奉祠乃除萬夀觀使奉朝請以王繼先第賜之右通直郎韓元吉為司農寺主簿元吉已見紹興二十九年八月秉義郎主管髙郵軍官莊陳順特轉一官忠翊郎監髙郵軍官莊車定方減二年磨勘時髙郵軍初復闕兵與糧順定方各集義兵數百人自備衣糧器械轉運副使楊抗言於朝乃有是命癸未言者論攻守並用軍之善謀也今劉錡在維揚則令分萬人自楚泗入山東成閔吳拱在荆襄則分萬人自襄漢入京西吳璘在興州則分萬人自仙人關抵關陜惟陳潁近京都金人聚精銳於此未可即攻則遣王權時權在建康顯忠在池州回翔廬夀聲言深入别遣戚方在江州以萬人擇利而進盖大軍持重偏師擣虛使智者為朝廷計無出於此矣詔劄與諸將時將作監兼建王府賛讀張闡亦獻三䇿一増沿江諸處之守以張威聲二益京西淮東之兵以為犄角三修江南諸郡之備以自藩蔽且言金無故背盟天怒人叛臣三説或行將見敵人進退跋疐必為其衆所斃且鳥獸散矣甲申夜楚州劄探使臣荀道至臨淮之新店遇銀牌天使奪其所持革囊歸以示通判徐宗偃啟緘乃金國御寳封送泗州牒藁令謄録關報本朝催督稱賀使徐嚞張掄於十月二十日以前湏到得來如敢依前不遣可自今以後更不湏遣使前來當别有思度其言多指斥宗偃不敢白即繳納轉運副使楊抗而録其副以逹輔臣此並據徐宗偃紀實乙酉詔劉錡王權李顯忠戚方各隨地分措置沿淮三處河口嚴為隄備先是錡亦檄權引兵迎敵權受檄與其姬妾泣别而行又聲言犒軍悉以舟載其家金幣泊新河為遁計築和州城居之錡再檄權徃夀春權不聴命以威脅總領財賦都絜江東轉運判官李若川固請於朝乞留權守和州江面錡又督行權不得已毎三日遣一軍徃廬州屯戍丙戌百官赴顯仁皇后几筵殿行殿酹禮凡三日詔皇太子建王故妻淑國夫人郭氏特贈福國夫人以明堂恩也中書舎人兼權直學士院虞允文兼侍講丁亥四川宣撫使吳璘遣將彭清直至寳雞渭河夜刼橋頭寨勝之時金人集陜西諸路兵分屯於隴州之方山原及秦州鳳翔之境意將分軍四出與散關之兵犄角相應璘乃命前軍統領劉海同統領王中正左軍統領賈士元合所部三千人騎趨秦州戊子海受檄即引兵而出海兖州人也左宣教郎徐履行太學錄己丑顯仁皇后大祥上服素紗中白羅袍親行撤几筵之祭百官常服黑帶進名奉慰庚寅四川總領所調利路民夫運糧赴軍前用隨軍轉運司議也初太府少卿總領四川財賦王之望以軍興移運當置隨軍漕臣時直秘閣利州路轉運判官計有功足疾不能行而又朝請大夫新除利州路轉運副使趙沂在湖北未至之望請於朝不俟報遂與宣撫使吳璘制置使王剛中共議以便宜檄左朝奉大夫知利州兼宣撫司㕘議官趙不愚左朝請大夫通判階州成份權隨軍轉運司公事日下供職不愚既就職白調利路夫九萬運糧至軍前之望詰之曰自魚關至大散關不過三百里安用許夫不愚乃與之望議先運五萬人三月糧人日食二升半計運米十一萬三千五百斛應用五萬夫夫持七㪷米自魚關至鳳州百八十里徃來六日程凡四十有八日而畢除興元府興洋利州大安軍不科外先於劒閬巴蓬四郡調夫萬人循環應副之望以為若大軍未動冝刷茶舗䭾驢逓兵廂軍及僦民間駝乘以漸為之㑹遣兵復秦州不愚乃白調利文龍州及前四郡夫共三萬一千人令諸州守貳以民間産力髙下品差毎五十人為一隊數外差大小甲頭二名火頭三名調夫事㨿四川總領所按牘以九月二十一日行下庚辰二十一日也故係於此後五日不愚又白調彭漢綿州成都府二萬夫之望以道逺難之不愚乃徑調興元府興洋階成州大安軍河池縣夫三萬六千人以行舊民夫裹糧自備至是之望始令船運日給米二升然利路諸州封疆闊逺所起夫皆以縣令部押仍令持兩月糧附收官庫謂之凖備錢民間一夫之費為七八十千雇夫以行者又倍王敦詩選王之望文集序云趙不愚初欲調九萬夫之望斥之不愚皇恐立减六萬人人日支米二升以總所按牘考之興元二萬夫洋閬州各萬夫劒州六千夫巴蓬利州各四千夫龍成州各千五百夫階州二千夫自魚關至鳳州百八十里徃來六日程盖集序不無増飾也當以按牘蒍正其後運糧十五萬五千九百餘斛料二萬八千餘斛至黄牛堡夫糧二萬七千九百餘斛有畸民大以為擾運米十五萬五千九百三石七斗八升以一夫七斗計之六萬七千夫毎畨當運四萬三千四百石則是摺運四畨自鳯州至黄牛堡又添一日程四畨計二十八日而支過人夫口食米止計二萬七千九百八十石五斗四升以毎夫二升計之只係二十日口食不知何故關外四州比嵗屢荒今嵗乃大熟故糧糗及約而辦階州陋邦也米至四萬石它物輸軍稱是隆興二年十月乾道二年正月所書支還運米脚錢事可叅考壬辰遣内侍官三員徃淮東西荆襄勞賜軍士仍賜主兵官銀合茶藥樞宻院請兩淮京西四川沿邊知州軍各帶沿邊都廵檢使庶㡬可以専一措置邊事從之右承議郎安堯臣主管台州崇道觀堯臣初見建炎元年正月辛夘浙西馬歩軍副總管李寳以舟師發明州關澳是日忠翊郎監盱眙軍淮河渡夏俊復泗州俊見金人敗盟遂有占泗州之意寓居武功大夫張政者與俊議政聚衆得百八十人時守臣周淙退保在天長俊等謀定隂備渡船夜漏未盡遂渡淮先㨿西城西城人覺知皆稱願歸大宋俊轉至城東下觀汴口有空舟焉俊取得六十餘航金人所命知泗州富察特黙同知州大周仁聞之率麾下數十騎棄東城遁走俊入東城撫定江淮制置使劉錡以俊知泗州癸巳右朝請大夫知忠州張徳逺言峽路保正以皇祐編勑尚差至三等戸物力不均望依紹興免役令選差物力最髙之人從之是日金人犯通化軍先是通化未有守臣鄂州都統制吳拱以游奕軍統制張超權軍事超纔入城忽報金人鐡騎數百入門超閉譙門令從者率邦人巷戰金人死者數十乃引去甲午冊諡大行淵聖仁孝皇帝曰恭文順徳仁孝廟號欽宗命尚書左僕射陳康伯上冊寳於几筵殿盱眙軍奏夏俊已復泗州左朝奉郎通判楚州徐宗偃録白金國趣遣奉使牒草至行在是日興州駐劄御前前軍統領劉海復秦州初秦州既陷金人徙城北山地最徑險守將蕭濟素狎官軍弗為備有明威將軍號竒珠諾爾者荒湎尤甚毎日自歌曰金亦有銀亦有我曹為樂宜耐久先是敵軍戍寨者三千前二日打糧傍郡弱者守室至是劉海引兵傅城下濟弗之覺也近城數里乃覺之海與左軍統領賈士元同統領王中正計曰秦城險而堅未易㧞也今城守似怠當以火攻之遂積藁縱火煙上蔽城寨破海登焉夜中乃開門以降得糧十餘萬斛遂以正將劉忠知州事撫定人民各安其素業宣撫司偕制置司第功以聞乙未金人冦信陽軍先是京湖制置使成閔遣中軍統制趙撙屯徳安撙至之五日信陽告急撙曰信陽雖小實為徳安表裏不可失也乃留遊奕軍統制宋奕守徳安府自將所部騎赴之敵騎徑去侵蔣州時江州都統制戚方在淮西即引其兵南渡江淮制置使劉錡命楚州以海舟數十艘徃淮隂軍前分布守禦時金人大軍已至清河口地名桃源錡猶在揚州未發也是日鄂州諸軍都統制吳拱發兵戌襄陽者盡絶時拱被朝命襄陽或有變不能自保則令退守荆渚拱以書遺大臣言荆南為吳蜀之門戶襄陽為荆州之藩籬屏翰上流號為重地若棄之不守是自撤其藩籬也况襄陽依山阻江沃壤千里設若侵犯據山以為巢穴如人扼其咽喉守其門戶則荆州果得高枕而眠乎若欲保守荆州自合將襄陽為捍守之計當得軍馬一萬使拱可得指畫則修置小寨保䕶禦敵營闢屯田宻行間探然議者謂拱言襄陽形勢雖善而所謂修置小寨者其意在於退守方山而棄城不守闔關自固而不以兵接戰也先是御史中丞湖北京西宣諭使汪澈道出九江右奉議郎新通判湖州王炎見澈談邊事澈即辟炎為屬自鄂渚偕至襄陽撫諸軍澈聞議者啟置襄陽而併力守荆南亦奏襄陽重地為荆楚門戶不可棄也至是秋髙澈乃還鄂州以調兵食既而拱至襄陽首置萬山寨寨無水無薪師徒勞役時人不以為便丙申權尚書工部侍郎黄中移禮部侍郎司農少卿許尹權工部侍郎詔皇叔崇信軍節度使提舉佑神觀士衎建寕軍節度使提舉江州太平興國宫士􅱰並令歸南班奉朝請二人先罷宗官居於外故也遣入内東頭供奉官李宗囬撫問四川宣撫使領興州都統制職事吳璘興元都統制姚仲金房都統制王彦并以茶藥賜之殿中侍御史杜莘老言知長寧軍劉忱所為貪黷放罷是日四川宣撫使吳璘所遣將官曹㳜復洮州先是金人所命知洮州阿哩雅徃北界軍前未還㳜至城下其妻包氏率同知昭武大將軍鄂屯察濟與官吏軍民來降詔封包氏為令人既而阿哩雅來歸璘即命同知洮州賜姓趙氏阿哩雅西蕃人也費士戣蜀口用兵録復洮州在今年十二月誤也按王之望今年十月四日所申乞復陜西運司劄子亦稱已復隴洮州足知在九月下旬不疑今從宣撫司奏状附此戊戌四川宣撫使吳璘四川安撫制置使王剛中奏金兵犯黄牛堡詔金人無厭背盟失信軍馬已犯川界今率精兵百萬躬行天討有措置招諭事件如後令三省樞宻院降勑榜曉諭中原百姓見為簽軍想未忘祖宗徳澤痛念二聖不還豈肯從蕃反攻舊主榜到各宜相率從便歸業内有願立功效來歸人當議優加爵賞一女眞渤海奚契丹應諸國等人暴露日乆豈不懐歸見此文榜請各散回本國别事君長以圖子孫長久之計一中原諸路州縣官吏軍民有能以一路歸者除安撫使以一州歸者與知州以一縣歸者與知縣餘見任官更不改易一諸路忠義豪傑山寨首領能立功自效者並依前項推賞一中原并諸國良民見為奴僕者並放令逐便内有能自擒獲其本主歸順者即以本主官爵田宅給賞一諸國官吏軍民不願歸本國者當盡還官爵雖見用事之人一例旌賞優䘏與中國人一般更不分别因而能立功自效者不次擢用一軍行秋毫無犯並不殺人放火亦不刼掠財物婦女一事平後放免稅租十年一應干敵人殘虐科歛等事如簽事刷人夫水手工匠差科軍器糧草舟船牛車騾馬揀奪人家室女繡女一切非法騷擾並行除放一滛酷之刑如滅族剥皮油煎鋸觧鈎脊之類深可痛傷並一切除去於是印發行下是日江淮浙西制置使劉錡發揚州錡在揚州病上遣中使譚某將醫徃視錡曰錡本無疾但邊事如此至今猶未決用兵俟敵人侵犯然後使錡當之既失制敵之機何以善後此錡所以病也中使以奏錡遂行日發一軍時錡已病不能食但啜粥而已己亥忠翊郎夏俊為武翼郎閤門宣賛舎人賞功也興州都統司後軍第二正將彭清左軍第一副將張徳破隴州清以是月乙未出師遂進兵傳於城下列攻具分擊之克其城守將奉國上將軍盧某同知昭武大將軍劉某巷戰不勝走涼樓不下清積薪焚之軍民乃降四川宣撫使吳璘以清知隴州尋令將官談徳守方山原俾清引其兵赴鳳州軍前㑹合徳至良原縣遇敵接戰自夘至午官軍不敵遂潰而逃初徳與其徒請兵出梁泉魚龍川徃攻方山原清從之既行徳乃改道經良原縣界遂失利清復引兵還方山原是日蘭州漢軍千戸王宏殺其刺史安逺大將軍温都烏雅以降宏嘗為秉義郎後為金人所獲俾部押蘭州軍馬宏聞王師克秦州乃誘諭漢軍使降人多從之惟北官不聴宏遂與其徒魯孝忠等率所部合鬭殺烏雅及鎭國上將軍同知蘭州富察薩等將騎兵五百歩兵二百來歸宣撫使吳璘承制授宏武功大夫知蘭州統領熈河軍馬授孝忠秉義郎同知蘭州費士戣蜀口用兵録趙甡之遺史皆作温都烏雅今從宣撫司所奏是月金主亮以其尚書右丞李通為大都督而將軍紐赫鄂碩和副之令先造浮梁於淮水之上亮遂自將入㓂時亮衣橘紅袍所乗馬金甲自宋門出其后圖克坦氏與太子光瑛俱送行亮亦掩泣徐曰天實使之不自由也亮兵號百萬氈帳相望鉦鼓之聲不絶逺近大震煬王江上錄云内侍梁漢臣本宋内侍陷敵毎思報讐乃進曰燕京自古霸國虎視中原陛下可修燕京大内時復廵幸使中原之民望帝都為近遂納其言差漢臣充修燕京大内使孔彦舟為副使自天徳元年起至正元三年畢工改燕京為中都正元四年八月十八日至燕京蕭王奏曰陛下移都燕京去白溝百里之餘皆宋故土孔彦舟酈瓊靳賽徐文之徒頃皆宋臣皆握大兵盡屯平原萬一有變非國之福亮曰卿無憂也梁漢臣奏曰臣聞南宋講武教兵有呑中原之志願陛下無安樂於内可令山東兩路河北三路通水去處積草聚糧仍教諸州軍置造軍器兼修大梁大内虎視江淮及造戰船以備海道征伐並依一日宣梁漢臣曰朕欲修汴京大内時復廵幸卿為朕行毋得有辭以漢臣充修汴京大内正使孔彦舟為副使正元三年梁漢臣至汴京正隆元年春起夫四年畢工梁漢臣孔彦舟又令人催造通州戰船數千隻委兵部尚書蘇保衡及徐文統押僉女眞渤海契丹漢兒軍五十萬山東河北路并簽漢軍一十萬諸路蕃漢軍七十萬諸路捕魚梢工水手一十七萬蕃漢軍共九十七萬令分八路入南界完顔仲統軍取長安鳳翔至西蜀完顔明統軍自西京至均房阿嚕穆爾統軍自亳州齊芬珠徹自夀州合肥至和州界郭拉們自青齊至淮楚界蘇保衡奏自通州至定林口二百八十里陸路不通河溝無水通舟入海梁漢臣曰起三路民夫開梁擔水作成游泥用夫拖船入海人人稱寃道路嗟歎而無敢叛者漢臣又奏洛陽好花宜廵幸看花正隆二年三月洛陽一夜天降大霜羣花盡死漢臣曰願陛下降詔催促諸路大軍進取江淮無失其時於是下詔催促有人譛孔彦舟者遂賜酒酖之命彦舟充西京留守起行至路藥發病遂死正隆五年五月起汴京此所云事迹月日與他書差不同今併附此更俟叅考初亮肆虐既久宗族大臣已悉被誅而舊臣如張通古孔彦舟蕭玊之徒亦皆坐死國人莫有固志及將用兵又借民間稅錢五年民益怨憤亮借民税五年此以金國翰林直學士趙可所撰戶部郎中王某墓誌修入盖今年事於是中原豪傑並起大名王友直濟南耿京太行陳俊唱義集衆而契丹之後耶律卾哈亦興於沙漠諸軍始有殺亮之謀焉建炎以來繫年要録巻一百九十二建炎以來繫年要録巻一百九十二金人地名考證持嘉原書作赤盞與金史同並誤今改正圖克坦原書作徒单誤今改正喀齊喀原書作合喜誤改見巻一百三十八羅索原書作婁室誤改見卷一富察特黙原書作蒲察徒穆誤改見巻一百九十一竒珠諾爾原書作乞求闈誤今改正阿爾嘉原書作阿令結誤今改正鄂屯察濟原書作奥屯蝉只誤今改正温都烏雅原書作温敦烏也即金史之烏野並誤今改正富察薩原書作蒲察撒誤今改正紐赫鄂碩和原書作黏安阿述虎誤今改正阿嚕穆爾原書作阿魯木律誤今改正齊芬珠徹原書作乞伏赤朱誤今改正郭拉們原書作郭律木誤今改正鄂哈原書作窩斡與金史同並誤今改正
