body:
  text: 建炎以来繫年要録巻四十三宋李心傳撰紹興元年三月戊戌朔詔海州淮陽軍兵馬鈐轄李進彦武義大夫耿進各以所部舟師聽吕頥浩節制尋並以為江東安撫大使司統制官進以此月丙午除進彦以乙夘除自駐蹕南京以来軍士日給食錢比數十日一犒設前是水軍統制官崔増以其衆萬有千二百人降於吕頥浩頥浩始用舊法按月支糧及料錢於是増一軍月費錢四萬四百緡米七千五百斛視五軍所給月省萬五千餘緡據史頥浩以是日奏到庚子殿中侍御史章誼權侍御史右文殿修撰知平江府胡松年以嘗為潜邸學官復徽猷閣待制宣撫處置使張浚以富平失律上䟽待罪壬寅上謂輔臣曰浚放罪詔宜早降因言浚用曲端趙哲劉錫後見其過即重譴之浚未有失安可罷也同知樞宻院事李回曰湏得勝浚者乃可易上曰有才而能辦事者固不少若孜孜為國無如浚亦有人言其過朕皆不聽浚乃得安中散大夫魏滂貶秩一等以言者論其聚歛害民也滂守饒州無善状范宗尹用為江南東路轉運判官未上諫官劾其盗用修城錢十餘萬乃罷之令提刑司覈實後本司言滂以修城之故令民户有税一錢者輸四錢凡得十七萬緡其出納之籍或不可考乃命轉運司治其罪後亦寢此為沈與求劾范宗尹第十五事滂除監司及罷黜日厯全不載但扵此日書降官亦無首尾今以諫䟽及提刑司根究状修入滂得㫖治罪在今年五月戊午今牽連書之癸夘承事郎浙西安撫大使司參議官劉寜止為兩浙轉運副司時劉光世遣直秘閣本司主管機宜文字范正輿來奏事即以正輿代為參議官翌日御筆進正輿直徽猷閣賜三品服遣還鎮責受祕書少監滕康劉珏皆許自便甲辰直秘閣福建轉運判官魯詹條具止盗利害請擇令尉罷免行錢糴米賑濟减殘破縣分上供銀上諭輔臣曰詹所奏切中時病皆可施行上因言朕毎日五更初盡覧諸處奏報比眀所覽畧盡乃出視朝盖上勤政如此詹海鹽人也直祕閣程俱試祕書少監直祕閣知信州呉表臣為尚書司勲員外郎降授右武大夫和州防禦使永州居住馬擴許自便武功郎和州無為軍兵馬鈐轄王亨知廬州限一月之任既而鎮撫使趙霖論其執李申之功乃以亨為閤門宣賛舍人亨除閤職在五月乙巳今併書之乙巳武徳大夫光州刺史曹成為武功大夫榮州團練使知郢州武徳大夫吉州刺史閤門宣賛舍人李宏為武功大夫貴州團練使知復州先是有詔罷李允文而允文奏以張用曹成李宏馬友人馬未能交割為詞留鄂州不去朝廷聞成宏在郢復間因就命之且令勿受允文節制扵是成已引兵之湖南而行在未知也承奉郎張汝舟特遷一官往池州措置軍期事務承節郎王悦道為閤門祗侯以其父繼先診視太母有勞也詔孟忠厚母福國太夫人李氏特贈兩國太夫人福建制置使辛企宗言李敦仁引兵犯汀州寧化清流二縣丙午責授定國軍節度副使王宗濋復忠州團練使以赦叙也輔臣進呈上曰宗濋自可用但當時用非所宜兼戚里不當管軍然此淵聖皇帝外家宜與叙復張守曰祖宗時亦有戚里管軍者上曰要是擇材只今諸戚里豈能管軍范宗尹曰誠如聖訓日歴宗濋叙官扵二月九日丙子三月九日丙午兩書之而此日又書上語甚詳今附丙午詔以京畿第二将兵千人𨽻神武中軍用統制官辛永宗請也於是中軍凡六千人直祕閣提舉淮東茶鹽公事曹伯逹知郴州時李冬至二叛於宜章守臣直祕閣衍聖公孔端友不能制故更遣伯逹而命端友奉祠端友初見建炎二年十二月日厯既於今年三月戊戍書勘會李冬至二等作過知州孔端友全無措置已降指揮與宫祠而六月戊寅戊子又兩書端友乞宫祠奉㫖主管洪州玉隆觀盖端友未被授而自請但日厯不應重疊書之耳朝奉郎蘇簡監都進奏院簡轍孫也金師還自熈河至弓門寨廵檢王琦禦之金立招降旗榜改阜昌年號衆皆拜琦獨不屈偽知平凉府張中彦執而殺之是日孔彦舟焚潭州初彦舟既據長沙而東湖安撫使向子諲在衡州之安仁不能進會馬友自江北趨潭子諲欲得人以利害說友令受招時户部員外郎致仕上蔡賀允中適寓郡境乃為子諲見友說之曰宋祚更興足下正宜自立功名何自棄於此自古有盗賊而夀終者乎友心動改容謝允中至是彦舟為友所逼逐焚潭州大掠公私之財而去引其兵趨衡州彦舟焚潭州他書不著月日趙甡之遺史在今年二月今以紹興元年四月十三日樞宻院奏到探報状參修戊申以西京統制官韓京元用並權樞宻院准備将領聽張浚節制京用本王以寧部曲京有兵二千馬數百皆精鋭以寧既遁京用駐衡之茶陵故有是命起復江淮發運使權邦彦自饒州䕶六宫至行在己酉責授昭化軍節度副使王安中復中大夫安中以開邉故自靖康初逺謫至是復之閤門奏職事官被旨兼權職任者其朝參立班並乞權依正官儀罷日依舊侍従官權職髙者止立舊班従之給事中陳戩援舊例駁之乃止庚戍江淮招討使張俊復筠州初俊引兵至豫章而李成在江州其将馬進在筠州皆不進俊喜曰我已得洪州破賊必矣乃復歛兵若無人者金鼔不動令将士登城者斬居月餘進以大書文牒使來索戰俊復細書答状以驕之又命神武前軍統制王􅊛閲水軍於江中賊勢方强謂俊為怯戰俊諜知賊稍怠乃議行諸将請分道擊賊中部統制官楊沂中曰兵分則力弱通泰鎮撫使岳飛請自為先鋒沂中由上流􅈳絶生米渡出賊不意遇其先鋒擊破之乘勝追奔前一日至筠州進出軍背筠河先守要地沂中語俊曰彼衆我寡當以竒勝願以騎見屬公率歩兵當其前沂中乃将騎數千與神武後軍統制陳思恭分為兩道同出山後俊嚴陣以出鏖擊至午精騎自山馳下賊駭亂退走大敗之俘獲八千眀日又戰俊疑其復叛令思恭夜殪之熊克小厯云俘獲數萬俊以其太衆且疑復叛是夕令思恭殺之此盖因林泉野記所書也按日厯載上語云殺降卒八千趙甡之遺史亦云賊退走死者數萬人俘八千人野記恐誤今不取進力不支乃遁俊遂復筠州臨江軍馬進至南康遇統制官臣師古失利進復還江州與成㑹俊整兵追之熊克小厯書此事皆無本日但於三月己未㨗奏至日并書之按趙甡之遺史及俊所申俊實以三月七日甲辰自洪州渡江十二日己酉與進戰二十八日乙丑乃復江州日厯二十二日己未進呈張俊㨗報不言其詳當是復筠州㨗報而克于此遂書復江州乃追李成于蘄州皆誤也今各附見本日辛亥武寧軍節度使開府儀同三司浙西安撫大使兼知鎮江府劉光世兼淮南京東路宣撫使揚州置司尚書省言金已渡淮而真揚等州未盡有人鎮守舒蘄盗賊盤踞又春耕是時百姓未能復業田畆荒閑冝措置屯田以足兵食全藉威望大臣措置故有是命光世迄不行朝請郎提舉杭州洞霄宫季陵復右文殿修撰承事郎陳正由主管官告院正由瓘子也詔婺源縣進士胡學海免文解一次學海上書論事上令赴都堂審察而有是命壬子朝奉郎通判泰州馬尚就差知泰州招諭軍民歸業并興鹽塲等事先是張榮在通州以地勢不利乃引舟入縮頭湖作水寨以守金右監軍昌在泰州謀久駐之計至是以舟師犯榮水寨榮亦出數十舟載兵迎敵望金人戰艦在前榮皇遽欲退不可徐謂其衆曰無慮也金人止有數艦在前餘皆小舟方水退隔淖不能岸我捨舟而陸殺棺材中人耳遂棄舟登岸大呼而殺之金人不能騁舟中自亂溺水陷淖者不可勝計昌収餘衆二千奔椘州榮獲昌子壻佛寜俘馘甚衆榮自京東来未嘗承王命遂無路告㨗聞光世在鎮江乃遣人願聽節制且上其功光世大喜以榮知泰州張榮敗逹蘭以張匯節要及趙甡之遺史考之當在此月但未見本日今因除奉州守臣附見詔樞宻院准備将領徐文以所部屯臨安聽守臣孫覿節制文初見建炎四年六月壬辰是日初𣙜南恩州陽江縣田鹽縣有潮水所浸田一頃二十四畆提舉鹽茶司募民墾之置竈六十有七嵗産鹽七十萬八千四百斤收浄息錢萬九千餘緡遂命官領其事後二年又増萬二千緡甲寅詔罷免行錢州縣官市買方物如民間之直違者以自盗論俟邊事寜息日取旨依舊法始用魯詹之言也先是改元徳音已减閩中上供銀三分之一是日又减建劒州銀半分令福建轉運司兊糴米二萬斛充賑濟且易置令尉之老疾不任事者皆用詹請也初河間府免解進士李季集天文諸書號乾象通鑑季寓居婺州貧不能逹乃命本州給札上之既而天文官呉師彦等頗摘其訛謬詔與舊書參用遂以季為将仕郎以去年六月癸酉得旨給札今併書之自渡江國史散佚至是衢州布衣何克忠獻太祖寔録國朝寶訓詔授下州文學後八九年而國書始備丙辰詔禁衛神武諸軍三衙宰執親兵并犒設一次先是月一犒設至是上以户部所入不廣故五旬而後有此命己未張俊㨗奏至上諭輔臣欲赦李成軍中脅從者范宗尹因言今日之事不可削弱上曰祖宗基業宏固偶值戎㓂故劉豫李成等輩䟦扈猖獗或謂止扵淮上作籬落朕甚不取要當以次收復湏一統乃已耳始朝廷未得㨗報命劉光世分兵往舒蘄乘賊不備擣其巢穴光世言江北盜賊雖名受招其實窺伺官軍虛實復出為患郭仲威張敵萬王林祝友史康民之徒火目不勝算若臣郡摘軍馬前去數少則必無成功數多則羣賊必乘虛作亂浙西一路頃刻被患雖陛下行朝亦未敢决保無虞韓世清劉綱邵清張琪四處人馬見在建康府無慮十數萬可使目下並進㝡為良䇿詔以綱已遣還鎮清琪作亂未已報之而俊已㨗矣光世奏至在乙夘湖南馬歩軍副緫管孔彦舟言扵潭州池中得美玉可為御寳乞遣人宣取詔御寳已足備兼自艱難以来華靡之物一無所用其毋進庚申中大夫致仕施大倫令再仕大倫晉陵人以給舍陳戩等薦其學行有聞居官詳謹也辛酉朝請郎陳堯臣特勒停堯臣金華人宣和末為侍御史坐王黼黨斥去至是以其與秦檜有舊自列於朝乞為郡守乃以堯臣主管臨安府洞霄宫中書舍人胡交修論堯臣首議開燕為國召亂望賜貶竄輔臣進呈上曰本乞宫觀却被削奪似為過當不若止行宫觀文字檜曰只宜如此堯臣猶怒上疏訟交修上以堯臣輕侮朝廷乃有是命堯臣與秦檜有舊王眀清揮麈後録云爾以日厯所載檜答上語參之當不妄堯臣以二月丁酉得祠三月辛酉寢命今併附見癸亥御筆近詔臣僚條具當今切務其應詔者多言将帥侵預朝權而指辛道宗為怙寵賣恩朕扵任人一繇公論當令抑損以全辛氏道宗可罷樞宻院都承㫖與外任初道宗既承宻旨論者數指其招權上未深信會其兄福建制置使企宗請避新除福建提㸃刑獄公事廖剛詔剛易江東路及召入而以朝請大夫桞瑊代之瑊當辭前一日道宗言先與往還乞賜三品服上不悦即以手札出道宗翌日謂大臣曰朕鑒往者羣小侵紊朝政求章服雖小事漸不可長於是瑊亦罷瑊合肥人宣和間為部使者以忤童貫意掛冠去至是復用之廖剛易江東憲在是月戊申召剛除瑊在甲寅瑊罷憲在二月丁夘今牽聨書之責授寧逺軍節度副使王襄復正義大夫責授單州團練副使蔡懋復中大夫皆以赦叙也故延康殿學士陸佃追復資政殿學士佃越州人崇寜尚書左丞黨籍執政第二十四人故資政殿學士聶昌以死事贈觀文殿大學士官子孫十人後諡榮愍甲子始下詔罪状李成募有能斬首及獲成者除節度使賜銀萬兩錢萬緡且赦成軍中脅従者初馬進既敗江淮招討使張俊追之至奉新樓子荘賊将商元據草山設伏俊熟視見山險路狹乃遣歩兵従間道直趨山頂殺伏奪險遂至江州進拒戰不勝絶江而遁乙丑俊復江州統制官楊沂中趙宻引兵追擊又大敗之成復還蘄州自是俊軍有鐡山之號丙寅右武大夫逹州團練使胡安中知廣州安中初以土豪假守至是就命詔以淮東賊馬寜息命朝散郎郭揖提舉淮東茶鹽専一措置復興鹽事揖自算學得官時論鄙之是月宣撫處置使張浚承制以本司參謀官起復朝議大夫王庶為中大夫充龍圖閣待制知興元府兼利䕫兩路制置使節制陜西諸路此據庶附傳修入附傳無月日興元帥守到罷在此月而利州知州題名孫渥今年五月自利帥移秦帥還利帥于興元又與興元帥守到罷不同當考留統制官王宗尹柴斌兵二千馬不滿百使庶守時敵騎已破福津蹂同谷廹武興浚遂退保閬州而以端眀殿學士張深為四川制置使與參議軍事劉子羽趨益昌此亦據庶附傳附傳不云深為何官而日厯今年十月庚午訪聞四川制置使張深并利䕫兩路制置使王庶各移文所歩州軍兼司帥臣並令聼節制故權附此俟考金人自階州引兵犯文州而江漲不得渡遂還因棄成州去武徳大夫知岷州李惟徳亦率官吏以城来歸惟徳先守廓州城既䧟敵就用之浚録其功遷右武大夫榮州刺史惟徳来歸不見本月日宣撫使以眀年四月八日奏到奏稱金人侵犯熈河退回尋差官措置招撫䧟沒州縣故且附金人去熈河之月當求他書參考於是盡失陜西地但餘階成岷鳯洮五郡及鳯翔府之和尚原隴州之方山原而已時興元帥事草創倉廩乏絶帥旅寡弱庶募民教之河東陜西潰師多舊部曲往往来歸不數月有衆二萬襄陽鎮撫使桑仲以其將李道知随州道相州人與兄旺聚衆其後東京留守宗澤因事斬旺以道掌其軍道之南也以一軍孤立遂依桑仲軍中號為寄軍時随州闕守通判州事王彦威與州縣官寓洪山僧寺主僧慶預給其資糧守洪山以拒賊道至随逆彦威以歸遂掌州事慶預金山人也汪藻外制有大洪山守守珍補承信郎制云汝營壁塢輯鄉閭恐與慶預事相闗是春金左副元帥宗維使右都監耶律伊都将燕雲女真二萬騎攻故遼林牙逹錫於和勒端城調山西河北夫饋餫自雲中至和勒端城經沙漠三千餘里無得還者始金人犯中原有擄掠無戰鬭計其従軍之費及回日所獲數倍自立劉豫之後南犯淮西犯蜀生還者少而得不償費人始患之故漠北之行人不勝其苦伊都之軍和勒端也失其金牌宗維疑伊都與逹錫暗合遷其妻子於女真伊都始貳此據兩國編年松漠記聞夏四月丁夘朔興國軍廵檢陳彦復入興國軍軍為李成賊黨所據僅半年彦始以班直受官至是遂權軍事宣撫處置使張浚承制以保康軍承宣使知秦州孫渥為利州路經畧安撫使兼知利州此據利州知州題名修入以興元帥守到罷考之王庶今年三月已到興元不知利州何以尚帶本路經畧當考己巳參知政事秦檜言臣昨與何㮚陳過庭孫傅張叔夜同扈二聖出疆今臣偶獲生還驟䝉聖奨擢居政府而㮚過庭叔夜皆死於異域體骸不全遊魂無歸可為傷惻欲望睿慈特依近者聶昌體例追贈㮚等官職仍給其家恩澤以為死事之勸詔贈㮚過庭傅叔夜並開府儀同三司官子孫各十人太學上舍生髙閌元盥並賜進士出身閌鄞縣人盥潁昌人也二人以免省該徳音故有是命盥父當可仕至鴻臚少卿庚午責授汝州團練副使邵溥復為朝請郎尚書户部侍郎孟庾請諸路無額錢附經制起發従之於是通鈔旁定帖及賣糟等錢凡七色五色見建炎三年十月戊戌金左監軍昌既為張榮所敗自楚州渡淮而北是日休兵於宿遷縣之馬樂湖癸酉右武大夫康州防禦使知汝州兼河東招捉使王俊為淮康軍承宣使俊遣閤門祗侯髙彦忠以收復潁昌府告於朝故有是命朝散郎路時中幹辨諸司審計司時中開封人常以符録為人治病世號路真官故承議郎刁翬贈直龍圖閣先是翬通判登州會金人入犯翬率兵迎敵至黄山館與敵遇軍敗力戰身被七矢而死至是言者論其忠特録之甲戌詔修日厯用祕書少監程俱請也自軍興史官久廢至是乃復然朝廷多事未克行復政州為龍州劔川嘉祥雷鄉建城辰陽羅川盈川泉江枳縣並復舊縣名通會鎮復舊鎮名以朝奉郎新通判建昌軍荘綽言自大觀以後避龍天萬載等字更易州縣名不當也乙亥詔國史日厯事干機宻輙入本所者流三千里凡所見聞因而漏泄並行軍令日厯無此今以紹興十年三月二十六日尚書省勘會劄子修入監察御史韓璜守右司諌武功大夫忠州刺史忠勇軍統制張榮為右武大夫忠州防禦使知秦州浙西安撫大使司統制官祝友知楚州皆用劉光世請也趙甡之遺史云榮得遥郡觀察使盖誤保義郎楚州淮陽軍廵檢使劉靖改漣水軍兵馬監押承務郎王安道改漣水軍主管機宜文字仍以楚州鹽城縣𨽻漣水軍尋詔閤門祗候知漣水軍丁禩兼都統制軍馬而靖兼副統制二人兼統制在六月庚辰朝請大夫王愈知無為軍愈徳興人嘗為祕閣修撰以贓敗至是月用趙霖請而命之時愈未復官尋以為承務郎是日權湖南招捉公事馬友引兵入潭州此據今年六月四日樞宻院所奏修入丁丑刑部尚書權禮部尚書胡直孺等言參酌皇祐詔書將来請合祭昊天上帝皇地􅅘于眀堂奉太祖太宗以配天庶幾禮專事簡従之時上將行眀堂禮命有司議初議三聖並侑如皇祐詔書禮部員外郎王居正以為皇祐眀堂本非為萬世不易之理也盖古之帝王自非建邦啟土肇造區夏者皆無配天之祭故雖周之成康漢之文景眀章其徳業非不美然而子孫不敢推以配天避祖宗也聖宋崛起非有始封之祖則創業之祖太祖是矣有徳之宗太宗是矣太祖則周之后稷配祭於郊者也太宗則周之文王配祭於眀堂者也此二者不遷之法皇祐宗祀合祭天地固宜以太祖太宗配當時盖拘於嚴父故配帝並及扵真宗主上紹膺大統自真至神均為祖廟獨躋則患在於無名並配則幾同於祫享望以太祖太宗並配眀堂於禮為合宰相范宗尹是之議遂定天地復合祭自此始詔館職選人供職及一年通理四考並自陳改京官隆興元年八月乙丑所書可參考宣教郎吕祉提㸃荆湖東路刑獄公事朝請郎知眀州呉懋直祕閣自陳思恭張公裕並戍眀州軍費日廣懋以第賦民錢又得𣙜酤之餘軍用毋乏故擢之戊寅張俊㨗奏至此當是江州㨗奏但不知何以十四日方到行在上謂輔臣曰兵既精又治器甲所以成功以此知軍器當留意朕計五軍見甲巳四萬范宗尹曰得十萬初足上曰可足成之財固當惜然於此不宜吝也己邜責授汝州團練副使郭仲荀復登州防禦使浙西安撫大使劉光世以泗州土豪徐宗誠為保義郎知泗州先是沿淮水陸廵檢㓂宏以其衆附於真揚鎮副使郭仲威仲威假宏敦武郎閤門祗候充鎮撫司統制宏夀春人素以操舟為業兇狡無行良民苦之建炎末與其徒張先聚衆掠舟沿淮而下趙立以先知泗州宏為水陸廵檢先尋為土豪所殺宏以衆數百泊龜山下願受仲威節制於是國奉卿在宿遷趙瓊水寨未有所向乃說瓊父革率衆與宏合軍衆議以宗誠守泗臧翌守盱眙宏遂復上鳯凰州刈民麥以食光世即以宗誠知泗州翌為承信郎通州事時泗州無復居民滿地荆棘而已宏既無所向乃以舟師犯濠州權知州事李玠禦之此並據趙甡之遺史附入日厯紹興元年十一月庚寅劉光世奏知泗州徐宗誠今年四月已後到任而甡之繫於郭仲威被執之後則五月也甡之又云衆議以臧珪守盱眙而光世奏中有通判臧翌疑甡之所聞稍誤宗誠紹興四年四月己酉有陳乞㸃檢泗州官錢状云紹興元年四月十三日到任己卯十三日也故附於此未知光世復以何日出檄耳庚辰隆祐皇太后崩於行宫之西殿年五十九上自后不豫衣不解帶者連夕至是范宗尹等見上於殿之後閤上哀慟甚久諭宗尹等䘮禮當從厚朝議大夫添差通判衢州史愿直祕閣愿燕山人有學問上召見而命之愿嘗著金人亡遼録行於世辛巳詔隆祐皇太后應干典禮並比擬欽聖憲肅皇后故事討論以聞朕以繼體之重當從重服命入内内侍省副都知良邦彦都大監領隆祐皇太后䘮事直祕閣張自牧主管江州太平觀從所請也中興聖政辛巳進呈程俱劄子名臣列傳止是節本合與不合録呈上曰初止令進累朝實録盖欲盡見祖宗規矩模範此是朕家法要得遵守既退范宗尹以下嘆仰者久之臣留正等曰帝王之道雖同其法則不必同忠質文異制同歸於治盖因時制宜各自為一代之法夏商周之子孫得以憲於先王傳世數十而長久者也太上皇帝欲盡見祖宗規模且曰此是朕家法要得遵守則自中興以来致治之效皆由於此今日尤當率循而不忘也壬午持服孟忠厚言見丁母憂即皇太后成服難以捨重従輕乞用衰服行事太常奏用欽聖憲肅皇后故事令忠厚為太后服衰三年従之詔江浙諸路上供紬絹半折見緡三千仍易輕齎赴行在此以今年八月二十九日宣州乞減折帛錢状修入他書並無之癸末襄陽鎮撫使桑仲䧟鄧州殺右武大夫淮康軍承宣使河東招捉使知汝州王俊初仲圍鄧州急守臣武功郎譚兖遣人詣俊求援俊自繖盖山引衆赴之兖與飲燕俊醉兖率衆突圍出奔遂入蜀仲攻城䧟執俊歸襄陽磔之既遂以其副都統制李横知鄧州横髙宻人嘗為黄河掃兵以勇自負仲雖嗜殺然性頗孝或盛怒欲殺人其母戒之即止每自稱桑仲本王官終當以死報國故能服其下焉甲申同知樞宻院事李回為􅑼宫緫䕶使刑部尚書胡直孺為橋道頓逓使神武右軍都統制韓世忠為緫管内侍楊公弼為都監調三衙神武輜重越州卒千二百人穿復土故事園陵當置五使議者以遺誥云權宜擇地􅑼殯故第命大臣一員緫䕶汪藻撰曽紆墓誌云李回辟紆修奉議者欲稱園陵紆曰上不日恢復中原當奉隆祐歸祔此但􅑼宫耳當先正其名朝廷用其言王明清揮麈後録云昭慈升遐外祖曽公紆以江東漕兼攝二浙應辦朝論欲建山陵外祖謂帝后陵寢今存伊洛不日復中原即歸祔矣宜以􅑼宫為名僉以為當遂用之謹按皇太后遺誥已云權宜擇地􅑼殯又云所製梓宫取周吾身以為他日遷𦵏之便不知草遺誥時紆已與議否也浙漕題名紆以四月十六日觧知此時盖未赴江東苐恐非紆始議更湏求他書詳考之乙酉輔臣拜表請上為隆祐服期従之丙戌以皇太后崩下詔恤刑遣官告天地社稷宗室望告諸陵丁亥詔𣙜貨務遵守茶鹽見行成法不得毫髪更改務令上下孚信入納増廣武節郎閤門祗候浙西安撫大使司統制軍馬康淵知通州金之犯淮東也朝散大夫知通州吕伸遁去踰月乃還上奏言敵營驚傳有戴紅笠人刼寨是為火徳勝㨗之象上惡其佞詔貶秩三等罷去更命劉光世選將守之是日宣撫處置使張浚殺責授海州團練副使曲端於恭州端既為利䕫制置使王庶所譛忠州防禦使知渭州吴玠亦憾之乃書曲端謀反四字於手心因侍浚立舉以示浚浚素知端庶不可並立且方倚玠為用恐玠不自安庶等知之即言端嘗作詩題柱有指斥乘輿之意曰不向闗中興事業却来江上泛漁舟此其罪也浚乃送端恭州獄有武臣康随者在鳯翔常以事忤端鞭其背百随切骨恨浚以随提㸃夔州路刑獄端聞之曰吾其死矣呼天者數聲端有馬名鐵象日馳四百里至是連呼鐵象可惜者又數聲乃赴逮既至隨命獄吏縶之維之糊其口熁之以火端乾渇而死士大夫莫不惜之軍民亦皆悵恨西人以是亦非浚然議者謂使端不死一日得志逞其廢辱之憾端一揺足秦蜀非朝廷所有雖殺之可也康隨紹興五年七月六日以武功大夫秀州防禦使為江東副緫管不知此時為何官職當考龜鑑曰趙哲之誅孔明之誅馬謖也曲端之不用亦孔眀之不用魏延也至於殺之太過矣况曲端威望敵人素懾富平之戰詐立端旗猶足以懼敵則端之死為可惜也然殺曲端而失闗隘浚之過也用呉玠而保全蜀浚之功也己丑范宗尹等表請聼政詔不允表三上乃許之辛夘詔百官開啟天申節道場以太母初崩勿用樂直寶文閣新知建康府張縝言本府倉庫皆竭欲借錢五萬緡限一年内作三次納還如違甘伏上書詐不實之罪詔以宣州常平錢二萬緡貸之壬辰故朝請大夫陳師錫贈直龍圖閣師錫建陽人元符殿中侍御史黨籍餘官第一百十六人郴州安置徽猷閣直學士陳邦光卒於偽齊建康知府題名邦光以顯直知建康此従日厯日厯加前字按邦光降敵後未常削職也癸巳詔自今諸軍補轉官資非奉宣帖者毋得増給請受違者令吏部及監司劾之乙未詔臨安府秀州亭戸合給二税依皇祐專法計實直價錢折納鹽貨先是兩浙轉運司以罷給蠶鹽令輸本色提舉茶鹽公事梁汝嘉奏亭户以煎鹽為生未嘗墾田於是申眀行下汝嘉麗水人也是月統制河東忠義軍馬馮賽自曲垣渡河歸邵興於盧氏縣鄧州人楊某有衆千餘人在河北偽稱信王河南鎮撫使翟興命沿河守禦官王興延致之厚其供饋楊自稱淵聖皇帝興覺之楊一夕遁去興遣都統制董先追獲於商州殺之建炎以來繫年要録巻四十三建炎以來繋年要録巻四十三金人地名考證佛寜原書作盆輦誤今改正逹蘭原書作撻懶誤改見巻一伊都原書作餘都誤改見巻一逹錫原書作大石誤改見巻一和勒端原書作曷董誤今改正
