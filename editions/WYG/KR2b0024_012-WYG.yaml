body:
  text: 建炎以來繫年要錄巻十二宋李心傳撰建炎二年嵗次戊申六金太宗晟天㑹年春正月丙戌朔上在揚州丁亥詔錄兩河流亡吏士又於㳂河給官田牛種以居流民中興聖政詔畧曰河東河北郡縣自太原真定失守之後皆因攻圍官吏軍民誓以死守在昔兵火之際有以城固守不下則褒載信史夸耀後世今數千里之廣億萬之衆無一人忍負國者忠義之俗前古未有訪聞失職之吏失次之軍失業之民渡河東南者未有所歸其令帥臣監司悉心措置分布收係臣留正等曰親之於子也有無窮之恩故子之愛親亦無窮君之於民也有無窮之德故民之戴君也亦無窮舜禹之民謳歌獄訟者皆歸非私於舜禹也私其德也國家一祖八宗聖聖相承深仁厚澤固結民心兩河千里之廣億萬之衆遭罹兵禍所以寜忘死以扞賊而不忍偷生以負君聖詔失職之吏失次之軍失業之民皆在所恤則其徳愈厚而民之戴之也愈固雖其地未即歸版圖臣知人心之猶在恢復之功無難矣朝散大夫陳瑊知建州瑊瓘弟也時建州亂軍甫定故更命瑊守之直龍圖閣知德安府陳規言近以羣賊日滋府司遂措置印造被俘人出首免罪公憑給令歸鄉井嚴禁捕盗人等不得妄加損害節次據張世黨内陳智等三百餘人皆執本府文榜前來投首乞下諸路有盗賊州軍准此施行從之詔廣南東路轉運判官尹忠臣徐庚同根括鄭良寳貨以聞初廣東帥闕轉運使直龍圖閣陳述攝行帥事述所為貪酷朝廷命顯謨閣待制陳邦光知廣州至則發其姦􅂍遂詔廣西提刑司劾治始述以御史出使有訴廣東西漕臣右文殿脩撰鄭良姦利者朝廷即以述為代使併治之良英州賈人素事宦者以進獄甫上而良死籍其貲以鉅萬計述頗私有之御史以為言故有是命㑹庚亦奏述􅂍状且言其賊殺不辜以百數述遁去詔捕獲者補保義郎既而送獄窮治述坐除名英州編管死貶所邦光石城人也陳述事見王明清揮塵後錄而不甚詳日歴全無首尾今叅考脩入述除廣漕并罷免史皆不見靖康元年十月述以監察御史使嶺外不知何時改除建炎元年十二月庚辰除都官員外郎尹忠臣為廣東轉運判官此必代述今年正月丁亥令徐庚同根括二月辛酉又除右文殿脩撰趙億為廣東轉運副使當是代庚四月甲子庚述互奏詔押述赴勘八月乙夘立賞捕述自後遂不見行遣今以明清所記増入明清又云述鞫治良施以惨酷良即承罪錮押往英州聴勅勅未下而良死旅殯僧寺述復姦利不法為人所訟制勘得情除名英州編管縱歩所寓僧舍廊間覩良旅櫬在焉驚悸得疾而卒按洪邁夷堅甲志良字少張英州人邁父甞貶英州此必不誤明清云良任至秘閣脩撰宣和詔㫖良七年自秘撰陞右文今從詔㫖但甲集稱良建炎二年代還復以他事為轉運使許君所劾下廷尉與日歴不同當考戊子女真萬户尼楚赫陷鄧州初觀文殿學士京西南路安撫使范致虛既受命㑹河東制置使趙宗印引兵自商山出武關欲趨行在與致虚㑹于方城因將其軍偕至致虛之未至也轉運副使右文殿脩撰劉汲攝守事營繕儲峙所以待乘輿之具甚備時中原俶擾汲初受命即遣家屬還鄉益治兵為戰守計至是尼楚赫壓境州兵不滿萬人致虛聞風亟遁汲除安撫使汲家傳云為京西轉運使髙宗即位就拜右文殿脩撰知鄧州兼京西南路安撫使日歴亦於九月壬寅書劉汲知鄧州今按趙甡之遺史則致虛以去年十二月初到官敵至乃遁而汲權帥與史及家傳不同然乾道六年太常寺擬汲賜諡状亦云權京西安撫使則是甡之所云非誤也中興㑹要汲死於直龍圖閣而家傳云陞右撰必得其詳今從家傳語諸將曰國家養汝曹乆不力戰無以報且吾不令汝曹獨死也士皆感奮汲募敢死士得四百餘人乃遣兵馬都監戚鼎以兵三千出東門迎敵靳儀以兵八百出南門趙宗印以兵三千出西門掎之汲以牙兵四百登陴以望見宗印遁即自至鼎軍中麾其衆陣以待敵至士爭死鬬敵為却俄而儀亦敗敵以二軍夾乘之矢如雨軍中請汲去蓋汲不許曰使敵知安撫使在此樂為國致死敵大至汲死之宗印率軍民自房陵奔襄陽事聞贈汲太中大夫後諡忠介趙甡之遺史云汲帥將兵二千人及兩都監出南門聲言欲出戰或以為出奔為金人所掩汲及兩都監被拘執或曰登時被殺今從家傳甡之又云宗印奔襄陽尼楚赫乃陷城而家傳所書差詳今從之是日金陜西諸路選鋒都統羅索圍長安先是河東經制副使傅亮自陜府歸馮翊㑹唐重除永興帥因與亮俱西城中兵才千人重悉以授亮嬰城固守金益兵攻之己丑直祕閣謝貺提㸃京西北路兼南路刑獄公事專切總領招捉賊盗先是有撰勸勇文者揭於關侯廟中論敵兵有五事易殺連年戰辛苦易殺馬倒便不能起易殺深入重地力孤易殺多帯金銀易殺作虛聲嚇人易殺各宜齊心協力共保今歳無虞貺得而上之詔兵部鏤板散示諸路辛夘詔自今武臣未至武功大夫不得除遥郡雖係軍功特㫖亦不施行以中書有請也户部侍郎兼知揚州呂頥浩轉對論官軍所至爭取金帛之罪猶小刼掠婦女之禍至深願申諭將帥自今有犯必罰無赦昨鎮江城中婦女有尚在軍中者亦乞速令放歸詔以付諸將壬辰龍圖閣直學士知鎮江府錢伯言奏已依處分螺鈿椅桌於市中焚毁萬姓觀者莫不悅服上曰朕早來語御史張浚曰還淳返朴須人主以身先之天下自然嚮化黄潛善曰誠如聖訓詔併真州𣙜貨務都茶場于揚州以行在務場為名以延康殿學士同專一措置財用黄潛厚言真州地近行在而兩處給鈔引非便故也潛厚在維揚率遣人於近州村坊市酒入都城鬻之得息至倍議者誚之此以紹興二年十月丙午劉裴論潛厚四罪章疏修入不得其年月因事附見去年九月庚戍張慤自作酒肆或與相關當考徽猷閣待制提舉南京鴻慶宫劉安上卒安上永嘉人事上皇為給事中是日金人侵東京至白沙鎮留守宗澤遣兵擊却之初金以知滑州王宣善戰不敢窺其境乃遣兵自鄭州抵白沙距京才數十里都人甚恐澤方與客對奕僚屬請議守禦之策澤不應諸將退布部伍撤吊橋披甲乘城都人益懼澤聞之命解甲歸寨曰何事張皇時統制官劉衍劉逹將車二百乘在鄭滑間此據澤遺事附傳云劉衍等又撤去城中吊橋開掘陷馬坑都人愈恐澤聞召衍等欲斬之與遺事不同附傳恐誤澤益選精鋭數千助之下令張燈如平時民始安堵癸巳復置明法科甞得解或被貢人許就試用大理少卿呉瓌請也初本朝取士之制自進士外有諸科而明法在其中熈寜中既罷諸科而獨存明法然以舊科但取記誦之學故更號新科崇寜初併其額歸進士至是瓌以法官闕人為請遂從之然未及行紹興十一年七月庚子可参考朝請郎季陵守尚書右司員外郎陵龍泉人也秘閣修撰吕源為兩浙路轉運使直秘閣姜仲謙副之源升卿子也升卿晉江人故贈寳文閣待制既而中書舍人汪􅇨論源以貲結林靈素孟昌齡梁師成而得監司仲謙奴事譚稹而陞延閣今兩浙人心未定豈堪二小子擾之於是源仲謙皆改命朝奉大夫謝亮行尚書主客員外郎亮初以余深門客恩補官後從童貫軍因得調宣和末用為尚書郎至是懼當討論乃求使絶域遂有是命詔應崇寜以來諸寺院改為宫觀者自天寜觀外餘悉還之甲午上詣夀寜寺謁祖宗神主殿中侍御史張浚論兵部尚書董耘自布衣諂事童貫陛下總師濟鄆夤緣獲進盖有所自尚書髙選耘邪佞有素豈可濫居詔以耘為延康殿學士提舉杭州洞霄宫廸功郎御營使司准備使喚周公彦言今兹正二月之交乃太一正遷之日宜於禁中設壇望拜上以問輔臣黄潛善曰太一所遷之方災祥應之如設壇望拜不可為也許景衡曰修徳愛民天自降福停官人崔穆復朝奉郎穆張閣子壻也大觀間蔡京責太子少保閣為翰林學士草制詞明著其罪京憾之開封尹盛章阿京意劾穆不能事母文致其罪至是穆母沈氏訴于朝中書侍郎張慤因白其事上曰抱寃者獲伸則人心悅而天意格矣如此等事卿能助朕行之豈不賢於周公彦築壇望拜之禱乎閣河陽人也移揚州宗室於泰州髙郵軍命祕閣修撰趙令懬苦謗切知西外宗正事主管泰州宗子皇叔洺州防禦使士從添差同知西外宗正事主管高郵軍宗子令懬燕懿王元孫舒益公世逢子燕王生昌州團練使惟圖惟圖生楚安禧公從信從信生世逢士從仲湜子也刑部尚書兼侍讀周武仲上言前朝得罪黨人既已復官宜並還其恩數上納之乃詔係籍及上書人令其家自陳當與贈諡碑額其致仕遺表恩澤皆還之盗據宿遷縣日歴無此今以正月十五日臣僚上言増入是日簽書武勝軍節度判官㕔公事權鄧州李操叛降于金人初劉汲既死金得穰縣小吏格某使入城招諭尼楚赫大王兵十萬取今日已時攻城城破鷄犬亦不留惟速降可以免禍有士曹叅軍趙某者欲投拜操不可曰當死節趙曰豈不知盡節為忠顧死無益奈一城生靈何操許諾乃偕見尼楚赫于城外尼楚赫折箭為誓遂入城操河南人也乙未詔自今犯枉法自盗贓人令中書省籍記姓名罪至徒者永不叙用按察官失於舉劾者並取㫖科罪不以去官原免時議者以為崇觀以來贓吏甚衆其害民甚於盗賊故條約之初武經大夫濰州團練使東平府兵馬鈐轄孔彦威與帥臣權邦彦不和彦威甞私宗室女邦彦欲按之彦威叛去邦彦率兵追及彦威射中邦彦邦彦乃還既而彦威更名彦舟聚衆漸盛遂引兵之淮西至是犯黄州圍其城守臣趙令􅍲率軍民拒之凡六日乃解此據隆興元年七月本州乞為令􅍲立廟状増入它書盖無有也状以為建炎二年正月十日事故附此日丙申金萬户尼楚赫陷均州守臣楊彦明遁去添差武當縣丞任雄翔以城降雄翔燕山人也趙甡之遺史曰先是靖康初金人入河北州縣軍民皆殺歸朝燕官均州有添差武當縣丞任雄翔者燕山人三世及第有智筭聞亂即率燕人之家所有器刃及有馬者皆納之以明不反知州事楊彦明信之未幾有潰兵犯州境者令雄翔措置每出必勝均人亦頼之随付以器甲兵馬使防境内雄翔甞與彦明曰國家忘戰久士卒偷惰不可用若金人至必不能當前者邉事初動時若國家盡取歸朝燕人使之防邉馭之有道猶可支梧今國家兵馬更十年後恐或可用及金人入境百姓流徙而去彦明計窮雄翔乃以其衆送彦明全家上武當山復還城中金人到雄翔迎入城於是歸朝燕人盡随金人北去丁酉朝議大夫李楫行監察御史是日金人陷房州戊戌言者論數十年來奏功冒濫請自今循襲前轍保奏不實者官員坐欺罔之罪軍曹司等編管逺惡州軍仍令御史臺覺察從之右武大夫高州防禦使環慶路兵馬副總管王機除名象州編管坐開邉隙也是日羅索陷長安守臣天章閣直學士京兆府路經略使唐重死之初金人在河中重上疏言状且乞五路兵自節制不報馬歩軍副總管武功大夫貴州刺史楊宗閔甞為重謀曰今河東諸州皆非我有敵距此纔一水而本路兵弱宜急繕城塹為守禦計以待外援捨此無策重以秦民驕不欲擾之而止及金人至境重不知所為貽書轉運使李唐孺曰重平生忠義不敢辭難始意迎車駕入關居建瓴之勢庻可以臨東方今車駕南幸矣關陜又無重兵雖竭盡智力何所施其功一死報上不足惜逮羅索圍城彌旬外援不至於是直祕閣前河東路經制副使傅亮以精鋭數百奪門降金時地大震敵因其勢以入城遂陷重尚餘親兵百人與敵戰諸將扶重去重曰死吾職也戰不已衆潰重中流矢死之趙甡之遺史云重自縊死今從劉岑所作墓誌陜府西路轉運副史直祕閣桑景詢判官曾謂京兆府路提㸃刑獄公事奉直大夫郭忠孝經略司主管機宜文字王尚及其子建中與宗閔皆死提舉軍馬武功大夫榮州團練使陳廸猶率餘衆巷戰嘔血誓衆敵大入死之重部曲有感其徳者求舊棺於僧舍掘地瘞蔵之時年四十六重之未殁也李唐孺以其書聞俄而死節報至上哀之贈重資政殿學士建中中侍大夫明州觀察使皆諡恭愍宗閔右武大夫貴州防禦使後以孫貴諡忠介它贈官推恩有差宗閔沂中大父沂中已見元年正月辛夘㑹要云宗閔靖康間為永興軍路總管西北畨兵併來攻寨全家被害此盖其子震死事㑹要誤也景詢懌孫懌雍邱人故涇原路兵馬都監介直有守尚氣節童貫用事時州縣官皆迎肩輿望塵而拜景詢獨不屈坐罪循州覊管議者多之忠孝逵子甞事伊川程頥授其易與中庸大學金人至長安或勸云監司出廵可以免禍忠孝不答遂被害熊克小歴以謂為本府通判盖承㑹要之誤日歴紹興三年四月庚戍宣撫處置司奏状亦稱永興通判曽謂死事不屈或是未受命也汪藻外制集又稱謂除轉運副使恐太驟當考己亥秘閣修撰河南尹西京留守京西北路安撫制置使孫昭逺為叛兵所殺初金至西京昭逺率麾下南去行至陳蔡間潰兵滿野昭逺猶欲安集之而麾下單弱乃欲擁之以行昭逺罵之曰若等衣食縣官不以此時報國南去何為叛兵怒擊昭逺死焉事聞贈徽猷閣待制後諡忠愍龍圖閣直學士葉夢得落職提舉江州太平觀坐守杭州軍變故也日歴㑹要夢得並自待制落職按夢得去年已復舊職為雜學士不知何故先是言者論顯謨閣學士知越州翟汝文總兵臨城不肯㑹戰詔令分析汝文言自杭賊作亂首提孤軍與賊鏖戰而諸將悉為憲臣所制除鮑貽遜槍仗手在城下與臣相聞外無單車一介以為掎角不知使臣與誰㑹合兼前後請討賊奏牘具在焉可誣也詔降汝文為顯謨閣直學士庚子主客員外郎謝亮為陜西撫諭使兼宣諭使持詔書賜夏國主乾順從事郎何洋為太學博士偕行亮兼宣諭日歴不書此以亮紹興三年九月十六日乞差遣状修入何洋事迹不見它書今以通義志増入志云奉使西夏加太學博士使還循承直郎未幾再使樞宻張公宣撫川陜公為屬從入關中按史西夏未甞再遣使洋盖從亮行其云未幾再使者當是建炎三年亮從張浚至秦州准備出使而洋又與之俱其實未甞出疆也今略修潤附入朝奉大夫通判濟南府張東進秩一等以喬仲福捕斬李昱東應副錢糧有勞也東後為劉豫偽相故於此著其始金游騎至京城下見宗澤不之備疑不敢入是日統制官劉衍與金人遇於板橋敗之追擊至滑州又敗之金人引去是日張遇陷鎮江府初遇自黄州引軍東下遂犯江寜江淮制置使劉光世追擊之遇乃以舟數百絶江而南將犯京口既而回泊真州士民皆潰將作監主簿馬元頴妻榮氏為賊所得榮氏厲聲罵賊為所害榮氏薿女弟也翌日遇自真州攻陷鎮江守臣龍圖閣直學士錢伯言棄城去時秦魯國大長公主避地南來其中子右金吾衛上將軍愕為賊所戕頗掠其家人而去王明清揮麈錄載此事甚詳日歴正月戊辰張遇冦江寜府劉光世破其後軍追襲至江州湖口縣大㨗此據劉光世所申非其實也辛丑入内内侍省押班邵成章除名南雄州編管時金人攻掠陜西京東諸郡而羣盗起山東黄潛善汪伯彦皆蔽匿不以奏及張遇焚真州去行在六十里上亦不聞成章上疏條具潛善伯彦之罪曰必誤國及申潛善使聞之上怒詔成章不守本職輙言大臣故有是命日歴不言成章得罪本末但坐批㫖云輙論大臣今以趙甡之遺史増入馬伸劾潛善章亦云成章緣上言逺竄則甡之所云當不妄也按史成章南雄州編管而甡之云貶吉州當考中興聖政臣留正等曰自古人君求言之路至廣也上自公卿百執下逮芻蕘庻人惟宦官女子不與焉豈以其皆無能言者歟直以其非所當言爾非所當言而言借曰有益己為非宜况其未必有益而常至於黨邪害正者乎唐明皇時雲南數喪師邉將擁兵太盛在朝之臣無一敢言高力士一日獨為明皇言之可謂切矣而論者猶以為朝廷無賢百官失職而至于宦者言天下事盖深為明皇不取也邵成章言大臣之失未必非衆人之所難言者太上皇帝謂祖宗以來所未有盖以為非所當言而言故斷然竄黜之可謂深得聽言之道矣且内侍毁大臣固在所當責而其輙為之譽者亦豈免妄言之罪或毁或譽俱不由于左右近習而以至明來天下之公論不亦善乎右文殿修撰鄧紹宻依舊知興仁府初濟南闕守而新知府事張悦遲留不行乃以紹宻知濟南府至是紹宻留興仁更命中奉大夫劉豫豫阜城人世為農至豫始舉進士宣政間仕至殿中侍御史提㸃河北西路刑獄後掛冠去避亂真州靖康末落職致仕召還道梗不能赴及是中書侍郎張慤與豫有河北職司之舊力薦於朝除知濟南府時山東盗起豫欲易江南一郡而執政厭其頻數皆拒之豫痛憾而去此據楊堯弼所作偽豫傳増修日歴不載豫濟南之除按紹宻以正月己亥除知濟南辛丑仍舊除知興仁故遂附見但豫傳以為豫為兩浙察訪至儀真丁父憂因家焉建炎二年起復除中奉大夫知濟南府代張悦行此則差誤據史豫以宣和六年十二月甲寅自朝請大夫新判北京國子監除河北西路提刑不知何時致仕召赴闕非丁憂起復也今畧刪潤令不牴牾是日金人陷鄭州通判州事直祕閣趙伯振率兵巷戰為流矢中墜馬金兵剖其腹而殺之後贈五官為朝請大夫官其二子伯振靖康末為鄭州司錄事捍禦有力故就用之至是金圍城八日而陷此以紹興元年六月戊寅其家乞贈官状修入状云建炎二年正月十六日城陷故係此日癸夘直龍圖閣黄唐傳守起居郎尋遷中書舍人黄潛厚之除延康也言者論其無名進職而唐傳行詞極其稱美故潛善擢之唐傳初見元年二月其遷中書舍人日歴不載而後省題名繫之此年八月按史今年三月壬寅康執權除起居郎執權既遷五月乙夘又除周望則唐傳之遷不容在八月矣馬伸論黄潛善疏云一日逐三舍人乃取諸羣小以掌絲綸而無唐傳名則唐傳之遷又當在其先不知何以不與䇿士之列皆不可考張澂劾潛善䟽第十三事云中書舍人黄唐傳行潛厚誥詞云云潛厚以去年十二月遷延康其出誥當在正月不知唐傳已為舍人或但以左史攝行也今併書之更俟参考是日金人陷濰州時右副元帥宗輔引兵侵山東而京東無帥士大夫亦皆避地朝議大夫周中世居濰州獨不肻去率家人乘城拒守中弟辛家㝡富盡散其財以享戰士城陷中闔門百口皆死此以紹興六年三月周聿乞贈官及閻臯保明状修入状稱建炎二年正月十八日城陷故繫於此日守臣奉直大夫韓浩亦遇害浩琦孫也此以紹興元年十一月二十七日浩姪貽胄陳乞死事推恩状修入宗輔又陷青州知臨淄縣奉議郎陸有常率民兵拒守死於陣知益都縣承議郎張侃知千乘縣丞廸功郎丁興宗亦死後贈有常朝散郎錄其家三人贈侃興宗二官官一子完顔宗弼至千乘縣市民率土軍射士保甲及濱州潰兵葛進等擊敗之敵棄青濰去羅索自長安分兵侵延安府㑹鄜延經畧使王庻在鄜州寓治於是敵陷府東城權府事劉選率軍民據西城以守趙甡之遺史作權府劉洪據今年十一月城陷時權府乃劉選疑甡之字誤甲辰直秘閣知夀春府康允之奏丁進解圍上謂輔臣曰此郡守得人之效也卿等六人宜廣詢人才若人得二人則列郡便有十餘守稱職然須参議不可徇私張慤曰崔祐甫甞謂非親非舊安敢與官今日當問所除當否耳尋遷允之直龍圖閣允之除直龍圖在二月壬戌時進既受閤門宣賛舍人京城外廵之命遂引所部屯京城往􅄁留守宗澤將士疑其非真主管侍衛歩軍司公事閭勍等請以甲士隂衛澤曰正當披心待之雖木石可使感動况人乎及進至澤拊勞甚至待之如故吏進等感服翌日請澤詣其壁澤許之不疑進益懐感畏後其黨有隂謀以亂京師者進自擒殺之初進既受招其所刺良民有復還鄉里者允之請刺填諸軍闕額上許之乙巳新除中書舍人孫覿充顯謨閣待制知平江府初覿有除命即上疏辭且言在靖康中首論蔡京蔡攸罪状又論蔡行父子棄官而去又論李綱不知兵太學諸生誘衆伏闕為亂大臣之政專務姑息於是京攸之黨逃棄官守之人行營司官屬太學諸生朝廷大臣莫不惟臣之怨積致中傷以陷大難乞一宫觀差遣故有是命日歴三年正月己亥再書覿與郡恐誤中奉大夫耿自求行都水使者自求河南人也初大臣有薦瀘州草澤彭知一者有康濟之略隱居鳳翔得㫖令津發赴行在所既入朝乃以所燒金及藥術為獻上手札付三省曰朕不忍燒假物以誤後人其遣還之仍毁其燒金之具丙午武翼郎閤門宣賛舍人單世卿提舉荆湖南路廵社兼提㸃刑獄公事時揚州有稱頓放御前金玉而占官屋者浙路有稱御前收買海味者上聞命有司劾治之仍令尚書省榜諭丁未詔曰自頃姦臣誤國邉隙既開兵禍及於黎元烽塵暗於京闕軍以傷殘而散潰民因侵軼而流亡遂假勤王之名公為聚冦之患朕駐蹕淮甸欲還故都興言及兹痛憤良切凡今日奪攘縱暴之侣皆異時忠義向方之人白日照臨明爾遷善之意皇天覆幬監予止殺之誠一應盗賊回心易慮散歸田里或失業不能自還者令所在官司條具以聞朕當區處其日前罪犯一切不問著此為宗澤論詞臣失職事始非中興聖政臣留正等曰民流散而至於奪攘皆其本心茍生朝夕失計而為之也從而殱之不為無罪要非先以化誨而使之自新聖人不忍遽絶之也斯詔之頒勉其遷善之意諭以止殺之誠丁寜懇惻亦云至矣昔周之于頑民庸殺而姑教之且曰我惟一人弗恤弗蠲乃事時同于殺盖言民為亂而我不哀恤之不蠲潔之雖民以罪致死與我殺之何異周之待頑民如此卒能致其保受威命明徳同于友民忠厚之風詩人歌之竊讀斯詔豈非所謂忠厚之至歟北京留守兼河北東路制置使杜充奏磁洺解圍詔尚書省榜諭遂以皇叔右監門衛大將軍貴州團練使權知洺州士珸為洺州防禦使士珸復洺州見去年七月甲午其除洺防日歴不書附傳云明年移蹕揚州以功轉洺州防禦使當在此時故附於㨗奏之後東京留守宗澤復奉表請上還京師且曰臣聞易曰天下之動正夫一案此句以避宋仁宗諱故改貞為正孟子曰天下惡乎定曰定于一恭惟京師是我太祖皇帝肇造大一統之本根也奕世聖人繼繼承承於此坐視天民之阜所以自西自東自南自北莫敢不來享莫敢不來王薄海内外莫不率俾陛下天錫勇智入紹寳緒天下之人竭蹷稽首咸曰一哉王心今既奄有九有實萬世無疆之休陛下奈何不念四海生靈切切徯后之意乃偏聴姦邪之言託為時廵駐蹕淮甸不思我宗廟朝廷祠享報上垂拱視下又不思我二聖后妃親王天屬蒙塵朝夕懐想迎取之志又不思我諸帝諸后陵園廟貌以時祭祀所以貽厥孫子之情臣竊謂陛下若於二月間詔勑回鑾登樓肆赦則天下皆知一人來歸九重强者當革心逺罪弱者當屏迹復業必無憂疑聚為盗賊諸軍將士震奮感激願敵所愾書曰時哉弗可失臣若有毫髪誤國大計臣有一子三孫甘被誅戮以謝天下臣竊恐州縣狃於騷擾百姓煽揺不能耕桑果耕桑失時則衣食之源盡廢衣食不給使諸大臣中雖有臯䕫稷契伊尹周公亦不能善其後矣願陛下以祖宗二百年大一統基業為意不可憂思過計而信憑姦佞自為身謀者之語早勑回鑾則天下幸甚臣犬馬之齒已七十於禮與法皆合致其事以歸南畆臣漏盡鐘鳴猶僕僕不敢乞身以退者非貪冒也實為二聖蒙塵北狩陛下駐蹕在外夙夜泣血惟恐因循後時天下自此失我祖宗大一統之緒所以狂妄屢有敷奏非臣好為此激訐恭望睿慈委曲詳察取進止遣開封府判官范延世以聞此係澤第十二奏張嵲擬留守司請囘鑾表習祥而征自潛消夫彊敵振旅以入宜復幸於奥區敢控忱誠仰干睿聽竊以衆人以宴安為意咸思克定於厥家王者撫艱難之時盖或不常於厥邑是以漢祖之戰京索時歸幸於櫟陽光武之復東京亦暫休於河内皆匪定都之㑹實為行衛之區眷此臨安久稽大駕雖宫室庫陋弗稱於九重而井邑夥繁粗贏於七校况官寺之有所復廟祏之已安儻回曦馭之臨允慰斯民之望恭惟皇帝陛下逺稽古昔下順黎元鑒瀆武之無庸知從政之盡濟詔太僕而効駕命髦頭以先驅回軫旋衡壹賜經行之錄復勞休士聊稱告至之觴己酉詔㳂邊將兵避難入蜀者並放罪限半月赴行在仍於大散關置關使二員自今官員入蜀審驗吿敕無偽者聴過自兩河失守兵官之敗散者多在興鳳間招集潰兵入蜀朝廷聞之故有是禁此事日歴不載今以建炎三年十月戊寅利路轉運司申樞密院状修入庚戍中書舍人汪藻言取㑹三省吏到揚州者二百五十八人乞推賞先是詔在京三省樞密院省臺寺監百司當行人吏随到駐蹕處先轉一資事定别推賞不到者勒停編管至是進呈上曰不到者何不具此賞未可行竢見當罰人數乃可執政皇恐而退辛亥詔曰近緣臣僚論列乞以崇寜以來無状之人編為一籍已降指揮候諫官御史具到令三省樞密院參酌施行然念才行難於兼全一眚不可終廢當宏大度咸俾圖新除參酌到罪惡深重不可復用人外並許随材選任如顯有績效可以補前行之失者因事奏陳特與湔洗仍許擢用是日兩浙制置使王淵招賊張遇降之遇自金山寺進屯揚子橋衆號二萬㑹淵還行在自將數百騎入其寨招之遇見淵器械精明惶懼迎拜淵曰汝等頼我來晚故得降不然已無遺類矣淵奏以遇為閤門宣賛舍人守臣錢伯言乃得還其府遇猶縱兵四刼扈從者危懼户部侍郎兼知揚州吕頥浩帯御器械御營使司前軍統制韓世忠聨騎造其壘曉以逆順禍福執其謀主劉彦磔於揚子橋縳小校二十九人送淵戮之餘黨怖而釋甲得其軍萬人𨽻世忠壬子顯謨閣直學士提舉醴泉觀孟忠厚為常德軍承宣使用臺諫給舍六章論列也初新除中書舍人衛膚敏既坐論忠厚故徙官力辭不拜翰林學士朱勝非言陛下即位之始四方拭目以觀新政今乃坐外戚而去諫臣非所以示天下㑹劉珏不書錄黄殿中侍御史張浚章繼上中書舍人汪藻亦言隆祐太后盛德著聞天下三十年今一旦以忠厚之故使陛下屈法而隆私恩臣恐海内之人不能無疑非所以成隆祐逺嫌之德膚敏復言事母后莫若孝待戚屬莫若恩勸臣下莫若賞今陛下順太后以非法非所謂孝處忠厚以非分非所謂恩不用臣言而遷其官非所謂賞陛下一舉而三失之矣况陛下事大母猶母也子之於父母可則從之其不可者不從也故孔子曰從父之令又焉得為孝乎盖有天下者當以大義滅親豈可徇家人之私情害祖宗之成法至假外戚以名器而示天下以不公矧中書乃根本之地而舍人所掌在於論列可否獻納是非不特演論而已臣叨居諫垣已試無補若更貪榮冒寵超擢詞掖則不移之愚難聽之語又復妄發其獲罪愈重矣前一日執政進呈上問何以處此中書侍郎張慤流涕言曰陛下政事盡循祖宗成憲惟忠厚冒居論思之職至今諫官卧家幾月有傷公道臣竊惜之同知樞密院事郭三益曰陛下屈法於忠厚為太后也慤流涕而請為天下也願陛下從慤言宰相黄潛善知樞密院事汪伯彦亦言忠厚當換武陛下儻重違太后意即請以言者論疏納東朝上曰不若以章疏付忠厚令自為謀則兩全矣既而太后令與忠厚易武上以諭輔臣仍詔后族自今不得任侍從官著為令中興聖政臣留正等曰臣聞章獻明肅太后垂簾時外戚馬季良為待制仁祖親政於明肅之政無大變更獨季良即日易武弁以為祖宗之制不可以私恩廢也太上皇帝奉隆祐太后至矣而不敢抑言者以私忠厚嗚呼此我宋家法萬世所當守也詔以京師乏糧出𣙜貨務錢五十萬緡付留守司召江淮兩浙商人入中時京師米斛十二千上聞之故有是㫖是日金人焚鄧州初上既用李綱議營南陽於是截留四川輕賫綱及聚芻粟甚衆城破悉為金有金又需百工技藝人及民間金幣如根括京城之法凡再旬乃盡至是將退師使人諭城中富民令獻犀象金銀以謝不死城中人既出尼楚赫諭曰大金欲留兵十萬屯於鄧州爾當供其芻粟衆曰鄧州多水非屯兵地尼楚赫曰爾曹既已投拜皆大金之民矣今引兵而去後有它盗若何衆莫對尼楚赫令竭城北遷士大夫許調官緇黄歸寺觀商賈使居市農家給田種作城中傳聞皆大慟少頃金兵四面縱火盡驅城中人入木寨中後四日擁之而去中塗量給食細民之死者殆盡癸丑太學生魏祐上書論黄潛善汪伯彦誤國十罪不報此據趙甡之遺史其書未見詔非汎假日並權住更不休務俟邊事平息依舊用提舉淮南西路茶鹽公事吕伸請也甲寅浙東安撫使兼知越州翟汝文言本州禁卒不滿千人皆侏儒不及等尺近者杭州兵卒作亂婺州盗賊繼作本州臨時不過募槍仗手禦賊而槍仗手皆村民乍募不習戰鬬動輙傷敗伏見武經郎王政見押回本路軍兵一千餘人分還管下六州其人昨戍河此稍習邊面欲乞盡屯駐在越州合為一軍則兵勢稍衆可以鎮壓一路豫備不虞從之是月太學錄万俟卨為樞密院編修官卨陽武人也此據樞密院屬官題名及墓誌金人陷潁昌府守臣孫黙為所殺初劉汲之未死也檄承事郎裴祖德權通判府事祖德時丁母憂黙奏起復㑹金人来侵默乞退保郾城既而廵檢趙俊密報祖德金人不來祖德以挈家為詞紿黙暫歸陽翟乃妄申留守司言默遁去宗澤信之以祖德權府事黙大怒劾于朝未報俄金人再至頴昌黙被殺澤乃假祖德直秘閣知潁昌府潁昌之陷諸書不見今以紹興四年八月十三日臣僚章䟽修入不得其年月故且附金人破唐鄧之後更須詳考羅索既得長安即鼓行而西進陷鳳翔府隴右大震夏人諜知關陜無備遂以宥州監軍司檄至延安府自言大金以鄜延割𨽻本國須當理索若敢違拒當發兵誅討鄜延經略使王庻口占檄詞報曰金人初南侵時甞以金肅河清畀爾今誰守之國家以姦臣貪得不恤鄰好一至於此貪利之臣何國蔑有豈意夏國躬蹈覆轍比聞金人欲自涇原徑擣興靈方切為之寒心不圖尚欲乗人之急幕府雖士卒單寡然類皆節制之師左枝右梧尚堪一戰果能辦此何用多言徑檄興中府因遣諜間其用事臣李遇夏人竟不出此據趙甡之遺史附見甡之以為春初事故附見此月末時金主晟居淶流河御寨而左右供奉半皆南人是月數千人同謀以入山採薪為名盡置長柯大斧欲刼晟入山據嶮然後結集南兵挾之渡河以為質既而為其徒所告首謀者皆坐誅遂寢此據趙子砥燕雲錄修入以洪皓記聞考之當有是事皓所記附三年正月建炎以來繫年要録巻十二
