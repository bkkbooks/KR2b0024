body:
  text: 建炎以來繫年要録巻七十七宋李心𫝊撰紹興四年六月己卯朔武成感徳軍節度使開府儀同三司充鎮江建康府淮南東路宣撫使韓世忠援舊例乞行移所部帥臣監司用劄子許之左諫議大夫唐煇言自來行移惟三省樞宻院用劄子它司皆不敢用所以尊朝廷也軍興以來領宣撫使者皆見任二府故用劄子向因主兵官輙用此例已得㫖縂兵官行移輙用劄子者徒二年伏見昨來孟庾為福建路宣撫使世忠為副使是時以庾􅄁知政事故行移皆用劄子今世忠非帶三省樞宻院職事恐難用庾例乞付有司􅄁照條例改正從之未㡬復詔世忠於所部州縣聼用劄子唐煇乞改正在此月乙未許世忠行移州縣用劄子在七月丁丑今聫書之癸未詔集英殿修撰新知泉州趙令懬轉左大中大夫指揮勿行上既遷令懬而中書舍人張綱言大中大夫非侍從不得轉行今令懬以庶官超轉侍從於法有礙且自崇觀以來士風不競叨竊官寵徃徃不循資任遂致紀綱大壊陛下慨然念治將欲大變其俗故前日冒濫之人大者追奪小者審量中外有識之士方竊欣幸以為自是復守祖宗之法今乃縁令懬之故復違舊章超遷官秩臣所未喻兼令懬在宗室中亷聲不聞望賜寝罷疏入詔以次官命詞行下起居舍人兼權中書舍人王居正言庶官之不可轉行大中大夫乃祖宗之法萬世不可改易豈俟臣等反復論說而後知其不可若以一大中大夫為不足惜則宗室之為承宣使者不旋踵求為節度使陛下是時何以却之上以為然乃寝其命拱衛大夫同知觀察使胡悈大閹楊戬妻姪也靖康中已致仕至是大将有薦其筋力未衰者詔起舊官左諫議大夫唐煇言悈用戬恩澤補授數年之間共轉一十九官任後苑作製造御前生活所及主管御前事務盗取恩賞人所切齒今一繫名軍中便為掌兵官月俸不下數百千悈可再任即童貫梁師成譚稹之徒其親屬亦皆當任用矣豈所宜哉命遂格日歴無悈落致仕之日止因煇奏疏書之疏言夤縁請托以為筋力未衰或是韓世忠所薦亦未可知當考甲申饒州進士金覺言賫到秘要天文太一遁甲兵書等未敢投進望付三省呼召容臣賫所有圖書謀䇿次第條陳詔赴都堂審察乙酉詔洪州鄉貢進士黄雲翼令引對雲翼豐城人初名時起嘗舉進士不第後以入貲授官至是更名上書故得召未㡬殿中侍御史魏矼言其本富家子嘗殺人亡命乃罷之雲翼猶上書不已矼力論其素行凶惡愚弄朝廷詔押歸本貫雲翼上殿指揮更不施行在六月甲辰押歸本貫在八月辛卯丙戌詔今後樞宻院邉防兵機等事令三省官通書檢時議者以為侍從之臣以論思獻納為職固亦無所不可言矧廟堂二三大臣為人主股肱耳目頼以圖維天下之治豈容於事有不預聞者乎今日國家之急莫過於邉事大臣任責亦莫先於邉事正湏衆智協謀今宰臣既已兼知右府矣欲望檢㑹康定故事應宻院邉事之大者詔㕘知政事同議仍令書檢庶㡬商確僉允動無遺策舊制三省奏事畢樞宻院别班再上自渡江後三省宻院皆同班進呈文字其宻院邉防兵機等事並機速房掌行如事體稍大三省宻院官同議進呈退同批㫖奉行宻院官押草檢并劄子至是宰相朱勝非㕘知政事孟庾並兼樞宻院言者嘗謂當國者不知兵又乞宻院令㕘知政事通知葢以屬趙鼎也由是勝非忌鼎益甚言者論當國者不知兵據趙鼎事實云爾詳見九月鼎除川陜都督注按日歴此月乙酉唐煇對丙戌魏矼對此事疑矼建請亦未可知當考熊克小歴載此事於五年六月庚戌盖差一年是時孟庾沈興求二叅並已權樞克實甚誤今從日歴丁亥左朝散大夫䕫州路轉運判官楊仲先為成都府路提㸃刑獄公事用宣撫司奏也己丑詔大理寺捕䧺州人王友直治罪友直𣙜塲大儈也嘗上劉豫書乞招李成歸附有云陛下若得李成如漢得闗侯唐得尉遲敬徳又云劉光世非中興之将吕頥浩非中興之相又乞令李成作江淮两路制置使只在淮南駐劄陛下津置糧道就兵取江浙其言多所指斥莫州商人王孝謹嘗見其書至是友直在平江為孝謹所告捕得刑之日歴今年八月十三日庚寅大理寺劄子根勘得王友直招於劉豫上策及有指斥言語乞據所招結案奉㫖依不知如何行遣也壬辰詔川陜合赴省試舉人令宣撫司於置司州置試院選差有出身清彊見任轉運使副或提㸃刑獄官充監試於逐路見任京朝官内選有出身曽任館學或有文學官充考試官務在依公精加考校杜絶請托不公之弊先是詔省試並就行在至是禮部侍郎兼侍講陳與義奏川陜道逺恐舉人不能如期故復令類試焉日歴十二日庚寅陳與義已見進對十四日壬辰禮部状勘㑹云云以此知為與義請也入内東頭供奉官鄭弼西頭供奉官盧祖道各追二官東頭供奉官徐奕髙品徐伸各追一官先是弼等與入内黄門李廙並赴淮東宣撫使韓世忠私第㑹飲廙即座上刄傷弓兵事聞詔以廙屬吏弼等坐違制與主兵官交通抵罪而奕伸與世忠連姻故末减之俄又轉弼為敦武郎出監宣州商稅弼差監稅在八月癸卯李廙七月戊午行遣詔自今特添差官並作不釐務其俸給傔從並减半慶元随勑申明甲午詔明堂大禮所用逍遙子權住製造其祭噐什物令禮官講究其可减者先是御輦院乞造逍遙子工部言約用金九十餘两詔以銀塗金代之修内司又請雅飾朝殿及週廻宫墻至便門左諫議大夫唐煇言禮有隆殺在於因時陛下自南渡以來服用之物未嘗増飾况親祠不出行宫門而内外皆丹雘此於欽祀何所補哉今彊敵蓄謀未已叛逆竊據中原日夜窺我邉陲而朝廷百司緣明堂大禮講求儀物大興土木之役廣求雕鏤文繡此皆有司之過邇來霪雨不止艱食可慮若縱為無益耗蠧金帛他時但貽陛下之憂望令有司照紹興元年體例可罷者罷之可减者减之務存其實庶為盡善時已罷雅飾朝殿宫墻故有是命乙未給事中胡交修試尚書刑部侍郎中書舍人張綱試給事中殿中侍御史魏矼言竊惟陛下以霪雨未解夙夜憂思凢可以消弭災沴者無所不用其至而百姓愁嘆或傷和氣臣訪聞諸州縣催督夏稅并和買紬絹急於星火至有限五月數足百姓間闗輸送乃倍所賦矧方遭此水患妻子號泣散佈田野忍以追科廹之哉二月内户部申明諸路上供令七月終以前起發數足繼因臣僚論列已奉聖㫖展一月今漕司州縣望風故促期限政苛刑酷遂使元元重罹其毒臣竊詳户部元申明之意本為大禮賞給然今府庫中豈無見存紬絹儻一切留為冬衣大禮之費俟過二事方得别支似無違礙昨來戸部初不曽分今年冬衣大禮及明年春衣所支各若干又不曽量度諸路道里逺近一槩限七月終起發盡足而監司守令各非其人吏緣為姦寖成大弊夫農天下之本也軍旅資糧官吏俸入悉出於此奈何坐視不䘏使就困苦哉欲望特委大臣㑹計冬衣大禮所用􅄁酌諸路逺近量寛其限事責憲臣覺察州縣騷擾并受納官吏之弊按劾以聞擇其尤者重坐之敢有隠庇致臣僚論列並連坐庶使斯民仰懐陛下撫存之意變愁歎為謳歌實弭灾之道也詔専委諸路提刑司檢察按劾以聞當議重寘典憲時户部尚書黄叔敖理財峻急故矼以為言諫官唐煇亦論政事失於下則天變動於上望陛下勿以堯湯水旱為運數之不能免勿以緇黄祈禳為足以消弭更詔大臣講求政事之實無見於空言斯為盡善又前日之雨浙右民田所損己多軍食所湏正宜預講此殆非細事也詔劄與三省樞宻院詔楊華特補修武郎閤門祇候添差臨安府兵馬都監樞宻院奏華已受知鼎州程昌㝢招安故有是命五年六月十三日咼輔乞改正状稱程昌㝢用本州添差統制彭筠權本路兵馬鈐轄進兵攻討黄誠等是致楊華畏懼出降當考右朝奉郎直秘閣新通判長寧軍李邦獻職名令川陜宣撫司審量追改胡交修之在後省援建炎討論指揮有請故奪之是日金星晝見經天丙申新除宗正少卿兼直史館范冲辭免恩命朱勝非奏曰冲謂史館専修神宗哲宗史録而其父祖禹當元祐中任諫官後坐章疏議論責死嶺表而神宗實録又經祖禹之手今既重修則凢出京卞之意及其増添者不無刪改儻使冲預其事恐其黨未能厭服上曰以私意増添不知當否勝非曰皆非公論上曰然則刪之何害紛紛浮議不足䘏也勝非曰冲不得不以此為辭今聖斷不移冲亦安敢有請上復愀然謂勝非等曰此事豈朕敢私頃嵗昭慈聖獻皇后誕辰因置酒宫中從容語及前朝事昭慈謂宣仁聖烈皇后誣謗雖嘗下詔辯明而史録所載未經刪改朕毎念及此惕然於懐朝夕欲降一詔書明載昭慈遺㫖庶使中外知朕修史之本意也勝非進曰聖諭及此天下幸甚昭慈遺㫖詳具建炎四年十二月己卯起居郎常同兼權中書舍人中書門下省檢正諸房公事虞􅀈兼權給事中詔増置秘書郎著作郎各一員校書郎正字各二員宣和間有詔秘書省自監少外以十八員為額建炎間罷去近嵗纔復六員禮部侍郎陳與義言陛下留神治道急於人才収召未已而逺方之士方且麕至誠恐未足以待之今郡縣添差之官莫知其數一通判鈐轄之俸不啻飬三四館職一監當掾尉之俸足以養一館職而有餘也若更以一州添差之費待天下之英才誠未為過乞詔執事議益増館職之員故有是㫖丁酉左中大夫提舉江州太平觀席益復端明殿學士知潭州龍圖閣直學士知潭州折彦質知静江府徽猷閣待制新知静江府程昌㝢復知鼎州右武大夫忠州防禦使知鼎州楊可輔充湖南兵馬鈐轄潭州駐劄初荆南制置使王􅊛自鄂回鼎奏己招到賊衆萬餘然賊累殺􅊛所遣持黄榜使臣裴彦晁遇等且乞割州縣如溪峒故事而行在未知也王􅊛奏招安萬餘人状以七月朔䧏出今併附此彦質與􅊛舊不叶請易鎮不許趙鼎嘗為彦質辟客至是改命之左從政郎充勅令所刪定官謝祖信左從事郎湖南安撫司主管機宜文字王鉌並改合入官時二人以薦得召對而祖信奏疏論名實之辨以為今國家之不競在於士大夫無激昻奮勵之志而以循謹自持為賢無捐軀致命之節而以全身逺害為智知無不為則見謂生事服勤州縣則取譏俗吏以至避言利之名而常賦經用寖以不理要解事之目而舊章故實多所廢格若此之類其名甚美其實無補伏望官人賞罰之際取其能濟時用有益於國者進之察其虛名無實欺衆要譽者退之則好惡彰風俗變而真賢實能出矣鉌元城人也祖信已見紹興元年左承議郎主管江州太平觀林季仲行秘書郎季仲為趙鼎所薦召對而有是命戊戌詔神武軍神武副軍統制統領官並𨽻樞宻院熊克小歴扵此日始書改軍名葢誤己亥左承事郎李公懋守秘書省正字用劉大中薦也詔今後除授館職寺監丞博士御史䑓檢法官主簿在外監司帥司並命詞給告承務郎已上差遣給勑命惟選人止用劄子先是建炎初有㫖非侍從除拜並出𠡠元年十月丙午降㫖其後稍及貼職遙郡二年六月辛巳又及文武官六品四年四月辛丑至是職事官自監察御史已上出告餘止出劄子議者以為卑陋削弱殊失國體至如館職天下之清選也而用幅紙除授反不若黄冠祝髪之流以綾紙為度牒恐非所以奨士類尊朝廷事下吏部如所請而計議編修官如舊法止出𠡠焉進士石公孺特補右廸功郎公孺以薦對而有是命已而言者論祖宗朝白衣授官如蘓洵輩數十年間未有一人屬者以進士召對錫官殆無虚月使果學識才行悉如蘓洵則可萬一有如胡䝉薦李杞補官之命方下而所屬捕獲私醖乃不敢治豈不傳笑四方哉衆口籍籍咸謂僥倖之門一啟寖與異時八行之舉無異矣欲望特降指揮若進士隠逸實有文武經世之才方許論薦其已収召則願朝廷更加審察取其上焉者官使之次則錫以處士之名下焉者量賜束帛庶使人安義命而入仕之門不至僥倖實今日治道所當先也從之日歴臣僚上言在此月辛丑今併書之公孺初見紹興三年七月故承信郎田承寛妻王氏特封宜人承寛本歸明寓居廣右王氏常遣家丁自備糧餉助官軍討賊破之提刑司上其事於朝故得封庚子吏部員外郎吕聰問上故相吕大防所撰其祖公著神道碑且言臣猶記憶少時親見大防取索當時詔本日歴時政記以為案㨿撰成此文由是觀之先皇與子之志盖已定於一年之前豈容中間更有異議其所以召臣祖輔嗣君欲更革之意亦皆出於神宗皇帝之本心後來臣祖與司馬光乃是推原美意尊奉初詔即非輙詆先帝輕變舊章當時若使更俟年嵗神宗皇帝當自更之豈待元祐臣竊聞聖詔欲改修二史所繋之大者無出於此或恐有補遺闕謹以投進乞俟御覽畢宣付三省史館録白以為案底從之辛丑詔祖宗正史實録寳訓㑹要令史館各抄録二本一進入一付秘書省以起居郎常同言渡江以來搜訪僅足今三館秘閣尚寄佛廬一旦守䕶不謹則累朝盛典又復散落故也責授黄州團練副使孟揆再責白州别駕本州安置揆坐販私鹽議罪至是始貶事祖在去年八月戊申起復尚書右僕射同中書門下平章事兼知樞宻院事監修國史朱勝非言奉制書起復竊見明堂大禮宰執例差五使臣身有衣制深慮不合陪侍親祠望令有司討論典禮付臣遵守詔禮部太常寺同共討論聞奏壬寅作明堂行禮殿於教塲調紹興府湖州卒二百為増築之役詔秉義郎王評前差秀州澉浦廵檢指揮勿行先是評以内降得差遣左諫議大夫唐煇上疏引康定元年詔及嘉祐中鎮海軍留後李璋内降指揮轉官為諫官陳升之劾奏罰銅以為祖宗之制如是今一廵檢不足道恐此風滋長自此攀援不已當不止於求乞廵檢矣望賜追寝仍詔三省宻院繼自今應干請内降指揮許執奏不行庶為後來之戒上乃罷之初置史館校勘員以右廸功郎鄧名世為勑令所刪定官充校勘惠州牢城人吕頥許自便頥為南劔州同廵檢坐殺苖傅之徒張政抵罪至是始釋之事祖見建炎四年三月武功大夫貴州防禦使入内内侍省押班李叔與在外宫觀以疾自請也甲辰戸部尚書提舉𣙜貨務都茶塲黄叔敖充徽猷閣學士提舉臨安府洞霄宫以殿中侍御史魏矼論其闒茸老繆職業不修也矼言數易鹽鈔蔡京之亂政也自叔敖在戸部財用畧不經意一有不足又變鈔法朝令夕改失信尤甚遂使富商大賈隂伺國用将乏則不復入納惟幸變法以規厚利朝廷舉措反為所制而貲本無餘之人至有待次累年者怨嗟盈路所不忍聞此其罪一也鬻爵為官户童貫之弊法叔敖去年倡為博糴自承信廸功郎低價以售遽理官戸䕃及二代應兼并之家遂與公卿無異悉免科徭而貧民下戸乃苦差役破家敗産在在有之罪二也叔敖性與小人合四司事務取决於胥魁毛漸吏縁為姦莫敢誰何凡出歴交綱之屬非厚賂不行罪三也夏稅物帛非皆給大禮之用也叔敖今春申明行下諸路令七月終悉至行在計江西道里兩月程方至若此者是五月當納足耳州縣望風急於星火民間買絹一匹至錢八千多至十千此在朝廷無毫髪之益而於百姓有邱山之害罪四也𣙜貨務利源所在頃者監官張純納賂狼籍叔敖公然容庇又縱其姪擇佳物而市之純既敗露朝廷委辟士大夫有才者使為監官叔敖不之恤也豈士大夫中悉無幹才以充是選哉罪五也廷尉者朝廷之獄天下之平也頃叔敖姻黨張覿以贓汚不法送寺根治俄干政府出之三尺安在哉罪六也伏望早賜黜責以警失職之吏後二日降叔敖為徽猷閣待制奉祠右宣義郎直秘閣張元亨乞知欎林州元亨初見建炎三年二月制曰爾僣偽之族乆冐寵榮乃敢請於朝為郡嶺外吾忍以逺方赤子餌汝哉中秘清塗非爾所居其歸銓曹尚畀爾禄徃圖自效毋重悔尤可落職送吏部元亨免䘮近三年至此方乞差遣當是因與朱勝非有連故敢陳乞也詔神武右軍都統制張俊中軍統制楊沂中将逐軍近日强刺人數並給㨿令自便自今違犯統制已下重行停降使臣行軍法立賞錢三百千許人告先是行在諸軍多强刺平人為兵人有斬手指以自免者左諫議大夫唐煇言輦轂之下人心必揺乃命軍効權住招収仍令樞宻院給黄榜曉諭乙巳武功大夫忠州團練使新江西兵馬鈐轄杜湛改荆湖北路兵馬鈐轄依舊統制軍馬鼎州駐劄聼守臣程昌㝢節制太常奏諡故資政殿學士王存曰荘定丙午執政奏事上謂曰岳飛已復襄郢尼瑪哈聞之必怒况今正是六月下旬便可講究防秋儻敵人尚敢南來朕當親率諸軍迎敵使之無遺類即中原可復也若復逺避為泛海計何以立國耶權尚書吏部侍郎劉岑改戸部侍郎岑乞依舊帶權字許之左儒林郎建州觀察判官黄彧乞守本官致仕以所得陞朝恩贈其父意一官吏部言事干風教望特依所乞從之右儒林郎新紹興府觀察判官楊真卿除名潮州編管真卿建安人政和間以蜜煎遺梁師成得官累為本路漕屬至是該討論乃妄稱因進伯祖億言靈州事宜補官都省以為不合審量遂得調言者論之下大理鞫實而有是命是月江西制置使岳飛復隨州初飛令前軍統制張憲引兵攻之月餘不能下神武後軍中部統領兼制置司中軍統制牛臯請行乃裹三日糧徃衆皆笑之糧未盡而城㧞生執偽知州王嵩送襄陽府磔於市飛之復襄郢也選鋒軍統制董先頗有功先臯皆乆在京西故飛以為将初直龍圖閣知建康府吕祉入辭上召對於内殿祉奏今日之事當先定規模使㳂江上下表裏之勢相接祉至官遂與左承奉郎通判府事呉若右廸功郎安撫司凖備差遣陳克共議作東南防守利便三巻至是上之其說以為欲守東南則淮甸荆州皆不可失朝廷宜亟圖之不可以遣使待報之故因循廢日以墮其計今士氣未振難以議戰但當謹守封疆如㳂江一帶自襄陽江陵武昌九江而下淮甸諸郡如合肥夀春盱眙廣陵等處各屯軍馬西與四川形勢聫接使上下有備表裏如一庶㡬可以抗禦雖未剪去凶逆南北之勢成矣今駐蹕臨安僻在海隅諸将重兵皆屯江左相去逺矣以臣觀之必於㳂江一帶措置而移蹕向前然後可以繫南北離散之心慰四海來蘓之望鼓作士氣以待天命其為說甚備克晋陵人有能詩聲祉尤信用之吕祉所上疏不得其日按建康知府題名祉以去年十二月到官而疏中有屯軍襄陽及遣使待報之語當是襄陽已復之後章誼未歸之前故􅄁酌且附此月末是月熒惑犯南斗此㨿趙甡之遺史是夏偽齊劉豫以偽成忠郎許清臣主管殿前司公事使清臣毁景靈東西宫等偽豫傳五年夏毁拆景靈東西宫云云偽阜昌五年即今年也金左副元帥宗維右監軍希尹自雲中之白水泊右副元帥宗輔自燕山之望國崖左監軍昌自祁州之麻田大嶺避暑宗維希尹尋入見金主右都監宗弼自鳯翔還燕山府率宗輔徃㑹之遷西京樞宻院於歸化州建炎以來繫年要録巻七十七金人地名考證尼瑪哈原書作黏罕誤改見巻一
