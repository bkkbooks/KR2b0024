body:
  text: 建炎以來繫年要録巻六十九宋李心𫝊撰紹興三年冬十月壬午朔詔曰昨者出自朕意分遣使人授以手歴澄清諸道逮胡䝉等還朝偶縁他事相繼而去皆非有失使指恐四逺不知其由妄意揣摩将已行之事茍簡滅裂顛倒紛紜民受其弊未還二使不無疑慮動輙畏縮甚失臨遣之㫖意也三省可速行下諸路所陳利害令監司郡縣遵守舉薦人材取㫖録用時劉大中明槖未還上恐郡邑觀望故有是詔禮部尚書兼權吏部尚書洪擬罷為徽猷閣直學士提舉江州太平觀以殿中侍御史常同論其阿附王黼在銓曹專任胥史故也先是上以地震求言擬與其兄子駕部貟外郎興祖偕上封事論朝廷紀綱不正語侵在位者繇是父子繼罷秦魯國大長公主自閩中至㑹稽請入見許之癸未起復尚書左僕射朱勝非等上吏部七司勅令格式一百八十八巻自渡江以來官司文籍散佚無所稽考議者以為銓法最為急務㑹廣東轉運司以所録元豐元祐吏部法來上乃命洪擬等以省記舊法及續降指揮詳定至是成書樞宻院言近聞商人有持膠鰾漆貨匿於茶篰中以售於北境者詔禁止犯者行軍法甲申顯謨閣待制提舉江州太平觀胡交修試給事中御史臺主簿陳祖禮秘書省正字陳祖言並罷以御史常同論其日登大臣之門肆為長夜之飲覘伺臺評出入詭祕也成忠郎閤門祇候統領光州石額寨人兵張昻充黄岡黄陂麻城三縣廵檢昻屯山寨凢七年故有是命丙戌尚書考功員外郎魏矼守監察御史矼在考功時選部案牘不存吏縁為姦川陕官兩部者多以㣲文沮抑徃反輙經嵗矼請細節不圓者悉先放行人以為便自後踵行之矼歴陽人也丁亥監察御史鄭作肅守尚書左司員外郎吏部員外郎袁正功守右司員外郎詔撫州進士鄧名世左承事郎李公懋左從政郎徐嚞並召赴行在名世孝甫孫孝甫已見二年七月家素貧不求仕進躬耕以養母博通經史長於春秋公懋臨川人進士髙第黄潛善惡其切直故斥逺之嚞西安人為徳安令民安其政宣諭官劉大中俱薦於朝故有是命戊子尚書工部侍郎李擢試禮部尚書龍圖閣直學士知處州耿延禧試尚書刑部侍郎既而言者奏延禧不當用罷之權刑部侍郎蘇遲權工部侍郎日歴九月庚辰蘇遲權刑部侍郎疾速赴行在十月戊子蘇遲權刑部侍郎兩次所載告詞並同刑部題名蘇遲九月除權侍郎十月除權工部侍郎工部題名同按此則李擢為禮部尚書遲實代之日歴差誤起居郎曽統罷為祕閣修撰知秀州太常少卿唐恕試起居郎兼權給事中恕力辭不拜右朝散大夫浙西提㸃刑獄公事張宗臣初除大理卿坐章去㑹婺州以賣鹽不法事被劾宗臣欲逮平民数十人府官就白宗臣大怒曰此事左相專遣人封來知之否簽書鎮東節度判官㕔公事張九成曰九成但知有聖㫖不知有宰相主上屢下恤刑之詔惟恐無辜被繫公身為部使者不能上體聖意而觀望宰相耶聞者莫不快意宗臣大慚九成因投檄去殿中侍御史常同奏宗臣夙貪且聞其朋附權貴居五客之一故罷詔樞宻院編修官宗庠魏良臣効官有守不事奔競並令引對庠順昌人良臣已見二年八月良臣席益所薦也既而御史常同論庠素號凶人嘗干廖綱薦引綱以其無行不薦遂誣綱匿䘮事以告言官及綱辨明有明槖為證乃知誕妄恐薦者不知其詳上誤聖聼乃止不召章再上詔與外任己丑直秘閣知江州孫佑提㸃江西刑獄公事左朝請大夫陳子卿知江州詔捕獲強盗雖無被主姓名而贓滿己經論决者許推賞先是太常少卿唐恕言舊法獲盗不知被主姓名則不該賞故江湖間有舉舟盡遭屠戮踪跡絶滅官司雖知終不掩捕盖既知無激勸之方又欲逃捕盗之責法乆姦生望賜更改故有是命庚寅起復鎮西軍節度使涇原秦鳯路經畧安撫使知秦州充陜西諸路都統制兼宣撫處置使司都統制吳玠加檢校少保以總兵累年捍禦有功也玠加檢校官除利州路制置使據墓碑乃縁饒風嶺之功而史所書如此盖宣司隐其敗次第行賞朝廷雖申命之却別降此㫖耳左朝散郎邵彪知楚州大理少卿元衮言四方之獄雖非大辟情法不相當者皆得奏請裁决今奏按來上大率皆引用情重法輕之制而所謂情輕法重者鮮矣豈人之犯法而無情輕者乎欲望申敇凡遇麗於法而情實可矜者俾遵守成憲請讞以聞詔申嚴行下左承事郎程克俊守國子監丞初魏矼在考功建言州縣和預買絹多不給本錢乞就折民間應納役錢之數使官無受給之弊民無請納之勞至是下轉運常平司議已而兩浙轉運司言本路嵗用和買本錢七十三萬餘緡委是無可那撥而常平司言役錢既充和買則役人無以給之其議遂止兩司奏下在明年二月庚子壬辰詔自今犯私鹽並依紹興敕斷罪如亭戸非亭户煎鹽與私販及軍人聚集百姓依藉軍兵聲勢私販本犯不至徒者配鄰州若罪至徒即配千里如係流罪即刺配廣南内私販拒捕之人依政和指揮不以赦降原减其去年十二月甲午敕㫖及今年六月辛丑尚書省批狀指揮勿行先是殿中侍御史常同入對論私販刑名太重上曰凡舉事不能有利無害第當擇利多害少者為之非卿言朕不知其害同復奏紹興敕私有鹽一斤徒一年三百斤配本城煎煉者一兩比二兩刑名不為不重後來復降指揮並不用䕃原赦再因官司申請雖遇特恩不原行法之深乃至於此可謂盡矣去年之冬因大軍所駐嘗有兵卒私販百姓因之故又有亭户不以多寡杖脊配廣南指揮盖一時禁止非通行天下永乆之法也昨因𣙜貨務看詳以謂諸路亦合一體施行遂批狀行之提領官張純一堂吏耳但欲附㑹去相之意朝廷不謀之近臣不付之户部不禀之聖㫖遂以批狀行之何其易哉自此法之行州郡斷配日有之破家蕩産不可勝計主議之臣聞人一語及此則以為沮壞鹽法但曰刑不峻不足以致厚利夫嚴刑章而不恤害民此蔡京王黼之術也奈何今遂用之訪聞官司所捕獲皆貧下之户不過數十斤之資至於有力之家則結集人衆持兵守䕶動至千萬斤廵尉熟視莫敢誰何嶺外險逺平時攘刼之風已自難制今配私販之徒徃聚於彼豈逺方之利自古及今刑之所施必稱罪之輕重豈有罪無等降一用重刑之理今私鹽一斤至杖脊配廣南則孰不相率為百千斤之多哉祖宗仁徳在人猶人之有元氣今天下之勢可謂病矣奈何遂欲傷元氣乎法令之行繫乎國本不使有識搢紳之士議之而使刀筆之吏弄其文墨非國之福也望付三省以前後所降私販刑名更加熟議如有犯禁且從紹興編敕定斷若軍人聚集及百姓依藉軍兵聲勢私販即依甲午指揮所有不用䕃原赦指揮亦乞詳酌施行契勘𣙜貨務都茶塲特一場務耳非省部寺監之比自今應干茶鹽事乞送户部勘當事屬刑名者兼送刑部擬定其場務及提領官受客人詞狀並申尚書省不許徑牒諸路施行事下户刑部大理寺㕘詳至是乃定用户部尚書黄叔敖奏也熊克小歴載此事甚畧且附於六月末間按常同此時自柳州召還未至都今年八月始除御史九月丁丑同奏私鹽刑名太重詔户刑部勘當至是進呈克實誤也克又並載張純下大理治罪在六月末亦誤純下大理在十月己亥今別繫本月宰相朱勝非言自置宣撫處置司凢四川帥臣監司已下堂除部闕及安撫茶馬等司辟闕盡以便宜差官有違舊制致使寒士乆不得禄詔自今監帥司闕官令宣撫司具奏三兩人聼㫖其元係部闕並令諸路漕司依舊法施行尚書吏部貟外郎蘇良冶罷以言者論良冶交結吕頥浩子弟最為親宻與蘇恪皆預入幕之賔人戯號為二蘇故黜恪十月癸酉巳罷荆南制置使王􅊛引舟師將至鄂州上奏言湖水瀰漫楊么未可捕詔湖水已减落令速進兵甲午大理國請入貢且賣馬上諭大臣曰令賣馬可也進奉可勿許安可利其虛名而勞民乎朱勝非曰異時廣西奏大理入貢事可為鍳上曰遐方異域何由得實彼云進奉實利賈販第令帥臣邊將償其馬值當價則馬當繼至庶可増諸將騎兵不為無益也左儒林郎舒賔王為永豐令擅斬刼盗詔特降二資尚書吏部貟外郎劉大中宣諭江南路還入見以舉刺官吏申明利害平反獄訟科撥財賦為八冊來上大中出使僅一嵗所按吏二十人正月乙丑永豐尉陳文昌戊寅右朝散郎知貴溪縣趙旼二月庚戌新建令王策三月丙子右承事郎知南城縣徐端益四月丁酉吉水令張汝錫己酉右承務郎知太和縣丞髙公軧五月丙寅左承事郎權上猶令郭逹右承直郎權上猶丞李㻂右廸功郎權上猶尉楊邦徳六月丁亥右從事郎知安福縣井大有壬辰右宣義郎通判吉州韓顔胄八月丁亥建徳令榮三省九月甲戌右朝奉郎新通判宣州楚執柔並放罷取勘内公軧達停官又李囬韓璆吳革李澡别見三月甲子李正民見六月甲午檀倬見十月壬寅又知青陽縣宋仲堪四年二月辛丑大中論上供促限奏中及之未見行遣薦士十六人正月己卯右承議郎知鈆山縣陳洙六月丁亥左宣教郎前㑹昌令吳兢七月丙辰左朝奉郎昭信軍簽判張師益左承直郎吉州判官李諤九月甲戌左朝請大夫知南康縣趙公謹十月丁亥袁州司戸㕘軍饒延直並遷一官赴行在又李彌正張縇李椿年湯鵬舉侯延慶朱芾孫佑鄧名世李公懋徐嚞别見六月壬辰九月甲戌十月丁亥所薦士後多知名川陜宣撫司隨軍轉運使趙開増印錢引二百萬緡於䕫路市糧及金銀以宣撫司於恭涪州糴米三十萬斛故也俄又増印二百萬緡乙未左奉議郎提㸃浙東刑獄公事周綱言新法弓手皆失業游惰不逞之徒乞廢武尉一司將見役之人蒞於文尉事下户兵部如所請初上既增以絹計贓之直而大理少卿張礿入對言竊盗以贓准錢四百以上即科杖罪纔及兩貫遂斷徒刑民無常産廹於饑寒不得已而為盗今百物騰踊所得至㣲而罪已及於徒情實可憫刑寺奏除強盗依舊制外竊盗逓増錢五分如三貫徒一年之類俟物價平日如舊是日進呈上曰自古人君治國家不過省刑罸薄稅歛為先耳可如所奏初以九月癸亥面對甲子章下今併附此乾道六年閏五月又増一貫武節郎閤門宣贊舍人帶御器械添差幹辦皇城司韓世良添差浙西兵馬鈐轄罷皇城司世良初除皇城司月日未見當考丁酉禮部貟外郎兼秘省著作佐郎舒清國言自有國難盗賊間起所在州縣率多殘破人民流離户口减少而守令或不究心撫存凋瘵謂宜以户口増否立守令考課之法而優其賞格庶幾守令惠愛及民不惟流民歸業而四方轉徙者亦有所托從之令吏戸部立法清國江山人也詔内侍賈翊放歸田里翊始坐罪黜監嶺南市征至是以其母老而釋之翊三月戊寅謫官此細事當牽聨書之為易相故各附本日戊戌手詔曰朕以眇躬親逢厄運愧無德化純一風俗深慮士大夫趣向尚多趨附征利盖奔競之風不息則朋比之勢漸成若不以時警懼辨其邪正尚且曰内修外攘中興可俟得不負愧於天下可令臺諫伺察其㣲即行紏劾三省樞宻院差除常加遴選朕有望焉尚書禮部貟外郎舒清國試起居郎仍詔以見闕官日下供職自是職事官除拜不俟給舍書讀率得堂帖即視事時孫近建請未踰月也近建請在九月壬申左廸功郎陳琦充敇令所刪定官琦始以累舉得官吕頥浩善之琦紹興二年特奏名同進士出身用為都督府屬官至是復有此命著此為劉大中論琦上書張本琦為都督府屬大中所奏云爾今年九月丙寅督府屬吏去留數内不見琦名當考廣南宣諭明槖奏邕州之地南鄰交阯其左右江諸峒多有亡頼之徒畧賣人口販入其國又聞邕欽亷三州與交阯海道相連逐年規利之徒貿易金香必以小平錢為約而又下令其國小平錢許入而不許出若不申嚴禁止其害甚大欲乞自今二廣邉郡透漏生口銅錢應帥臣監司守倅廵捕當職官失覺察者比犯人减一等坐罪庶幾檢察加嚴上下循守詔戸刑部立法其後二部請故縱生口及透漏銅錢過界者廵捕官减罪人二等失察生口又减三等鎮寨官縣令知通監司帥臣失察者抵罪有差從之十一月甲戌立法已亥尚書吏部貟外郎劉大中行監察御史大中奉使江南刺舉無所避上甚嘉之故有是除中書門下省檢正諸房公事王庭秀尚書左司貟外郎王岡皆甞為吕頥浩幕客不自安因引疾求去詔除直秘閣庭秀主管江州太平觀岡提舉臨安府洞霄宫右中奉大夫提舉榷貨務都茶塲張純罷仍送大理寺治罪時殿中侍御史常同奏純隂狡恣横肆為不法與尚書省戸房都事單知章及監都茶塲程庠深相交結凡有所行先囑二人庠内啟之於冡司知章外行之於都省權分執政勢動中外有違其意立見禍患毎客人入納稀少則強抑交引舖户先次納錢給空名文鈔俟入納擁併日旋填姓名出納不公姦狀暴著故有是命日歴不見純行遣明年六月十八旧丙午右治獄奏曹師雄案稱已斷人𣙜貨務提轄官張純不知如何具斷也淮南宣撫使韓世忠言有兵四萬四千餘人輜重病廢者大半方國家缺乏之際理宜省費望汰歸内郡以省財用詔世忠兵練已精自河北山東隨世忠累經出入難以例汰令存恤之初閩鹽自兵亂以來商販絶少鬻鈔不行乃用邵武軍判官趙不已請併令轉運司撥賣嵗輸鈔錢十五萬緡時䖍盗竊發多縁羣入閩廣販鹽以作亂右朝奉郎知梅州程杲乞散賣小鈔謂非特可助國計亦使細民得販則暗消其為盗之端事下榷貨務而提轄官張純以為福建廣東皆係官販杲所言有侵漕計且礙成法事遂寢杲建陽人也按榷貨務所申以此日行下乃張純未罷前所勘當也是日偽齊陷鄧州以其將齊安上知州事庚子詔廣西路安撫司取撥嵗額鹽一百萬斤和賣牛皮筋角赴行在於是兩路各以其數抑配于民民之殺牛者甚衆此以明年七月九日丙辰廣西運判趙子嚴所奏修入日歴無之辛丑南丹蠻犯觀州初南丹州刺史莫公晟政和間獻地於朝以為廣西兵馬鈐轄既而逃歸㑹武節郎黄昉知觀州遣兵畧其部族公晟怒聚衆數百人以是夜圍觀州焚寳積監廣西經畧使劉彦適調平融州土丁將兵徃救之公晟已去昉坐免所居官昉以四年三月丁巳免官壬寅禮部尚書李擢為徽猷閣直學士知婺州顯謨閣待制提舉臨安府洞霄宫檀倬落職劉大中之出使也奏倬阿附王黼以進里居貪鄙兄偕賊殺不辜既命有司劾治侍御史辛炳又以為言故黜偕四年正月行遣詔皇后受冊與本家親屬承信郎二十五名上不欲外家恩數與母后同故差損焉賜楊惟忠家洪州田十頃以惟忠自河朔扈駕至南京推戴冊立於國有勞故有是賜癸卯詔自紹興元年正月朔以前因羣㓂殘破占據去處乗時作過之人限今㫖到日將已受理詞訴結絶毋得枝蔓日後毋得受理時言者以為自軍興以來村民徃徃乗勢剽刼其罪大而考騐明白者固已就戮然牽聨黨與蔓及平人或挟仇規利轉相告訴人情不安故有是命詔福建憲漕置司去處並依舊制以言者論建州乃鼓鑄産茶及般賣鹽貨之地而福州在一路道里之中緩急盗賊可與帥司商議故也事祖在去年十二月庚戌淮西宣撫使劉光世遣㕘謀官右中奉大夫吳革以機速事入奏上召對後十三日加直秘閣遣還是日襄鄧隨郢等州鎮撫使李横棄襄陽奔荆南時偽齊将李成既得鄧州而劉豫之衆有歸襄陽者横以為宼至且軍食不繼遂引兵遁成入襄陽知隨州李道聞之亦棄城去豫以其将王嵩偽知隨州横之去襄陽也欲依觧潛以俟命其㕘謀官直龍圖閣趙去疾屬官右宣教郎閻大鈞勸使歸朝待罪横曰我有烏合之衆所至自謀衣食人皆謂我為賊萬一諸郡不見納柰何二人曰我亦官軍也何至是已而湖北安撫使劉洪道果拒之横大怒欲殺二人皆呼曰江西帥趙樞宻可歸也横猶未决而趙鼎已遣糧舟至其衆遂安時權商虢鎮撫使董先蔡州信陽軍鎮撫使牛臯先已渡江至洪州鼎復以銀數千兩犒横之衆且檄知黄州鮑貽遜迎勞於境上横大喜遂以所部入洪州熊克小歴載横失㐮陽事於今年七月末目云是月詔横駐洪州實甚誤也日歴詔横屯江州在十二月甲午詳見其日注甲辰顯謨閣學士曽楙試禮部尚書徽猷閣待制知平江府宋伯友守尚書刑部侍郎既而御史常同言楙乃蔡京上客至今不變其説伯友謟事鄧文誥之徒不當用詔並罷中侍大夫忠州防禦使荆南府歸峽州荆門公安軍鎮撫使兼知荆南府觧潛陞華州觀察使徽猷閣直學士知鄂州充湖北安撫使劉洪道進二官為左中大夫以招集軍民修城捍宼有勞也前五日詔以江西湖南度牒二百道左蔵銀五千兩餉潛軍至是復有此命詔觀文殿大學士汪伯彦端明殿學士董耘梁揚祖龍圖閣直學士耿延禧保静軍承宣使提舉萬壽觀髙世則編類元帥府事蹟以付史館用祠部貟外郎兼著作郎虞􅀈請也其後悉以書聞惟伯彦所著中興日歴最備荆潭制置使王􅊅率水軍至鼎口與賊遇賊乗舟船髙數丈以堅木二尺餘剡其兩端與矢石俱下謂之木老鵶官軍乗湖海船低小用短兵接戰不利􅊅為流矢及木老鵶所中退保橋口留統制官崔増吳全當下流親将神武前軍萬餘人陸行趨鼎州偽齊引兵犯郢州守将李簡棄城去劉豫以荆超偽知郢州超班直也豫才而用之乙巳詔臨安府依開封府例權𨽻臺察川陕等路宣撫處置司奏以直徽猷閣新知漢州范正已為㕘議官左朝請郎通判成都府虞祺等四人並主管機宜文字右奉議郎䕫州路安撫司幹辦公事李邦獻右通直郎通判成都府安邡等六人並幹辦公事親屬四人書寫機宻文字正已純禮子純禮純仁弟建中尚書右丞祺仁壽人甞為太常博士邦獻邦彦弟邡惇子也惇新明人崇寜同知樞宻院事張浚之東歸也其官屬皆罷去故用王似盧法原請而命之日歴邦獻自新彭州通判改辟而五年五月乙亥中書門下省勘㑹乃云邦獻歴䕫路帥司及宣撫司屬官兩任當是從盧法原到司也丙午左承議郎主管亳州明道宫王公彦進秩二等以元符上書入籍故也自是黨人見在者皆遷官公彦元符上書邪下等第八十八人黨籍餘官第一百三十六人丁未手詔曰六官之長是謂佐王理邦國者其惟銓衡乎今自艱難以來士大夫流離契闊有徒跣而赴行在者聞邇來注擬牓闕之際姦弊百出貨賂公行寒士困苦安得如毛玠清公使天下之士莫不以亷潔自厲三省可行措置除去其弊栢臺嚴加紏察初上以吏部注擬多弊寒士困苦手詔戒飭畧曰安得如皇甫鎛之流鈐制吏姦除其弊源既而上以鎛迎合貢羡恐臣下有疑翌日御筆改用毛玠事且諭朱勝非曰他時詔語未當三省便可進呈改定徐俯曰此所以見盛徳三省言注擬藏闕申請徼倖去失問難刷闕㓕裂闗㑹淹延審量疑似給付邀求保明退難凡八事令本部七司措置闗防從之戊申詔今後省試並赴行在自諸路置類省試行之纔二舉議者以為姦弊百端且言本朝省試必於六曹尚書翰林學士中擇知舉諸行侍郎給事中擇同知舉卿監為恭詳官館職學官為㸃檢官又以御史監視故能至公至當厭服士心今盗賊屏息道路已通若以此試復還禮部不過括諸路漕司所費輸之行在則必裕然有餘矣詔檢坐累降指揮申嚴行下於是遂罷諸路類試日歴於此日指揮止云檢坐累降指揮申嚴行下今以紹興四年六月十四日禮部状修入己酉右奉直大夫主管官告院郭川提轄榷貨務都茶場用户部尚書黄叔敖奏也按日歴張純下已差魏彦弼此乃云本務闕官令叔敖踏逐奏差不知何故當是因純罷去遂不復用堂吏也五年五月丙申又差馬延之仍是替彦弼當考庚戌復置宗正少卿一員太府司農寺軍器将作監各復置丞一貟太府寺大理左斷刑右置獄各復増丞一員始用常同請也乃令都督府及諸路監帥司具屬官之可省者申尚書省熊克小歴十一月庚申初置司農寺丞二員誤也其實諸寺増丞以此日降㫖庚申但除官耳克止書司農一寺而不及二監不知何故日歴於是日書復置宗正少卿一員已辨之見今年六月甲辰注遂以太常博士趙霈兼權宗正丞此據玉牒所題名附見辛亥詔諸路添差官州十縣已上勿過十員三縣已上五員已下二員縣萬户以上三員已下二員仍並以二年為任是日偽齊将王彦先自亳州引兵至北壽春揚兵淮上有南渡意江東淮西宣撫使劉光世駐軍建康扼馬家渡遣統制官酈瓊以所部駐無為軍為濠廬聲援賊乃還熊克小歴云光世將兵直擣廬夀敵乃引去日歴十一月壬戌劉光世申契勘無為軍前去廬州水陸稍便可以聲援濠夀已差酈瓊將帯全軍前去駐劄據此則光世盖不自行克所云非也初彦先在壽春廬人震恐有勸帥臣胡舜陟遷避者舜陟曰吾為守臣義死封疆且吾始來欲為朝廷用兵為恢復計今方講好兵寖不張但當嬰城死節以廵逺報君耳既而閤門宣贊舍人知壽春府羅興亦乞乗勢襲逐彦先收復淮北州縣詔興伺賊兵侵犯即出竒掩擊如賊不渡淮勿得引惹生事十一月癸亥降㫖偽齊以中書舍人直學士院權門下侍郎尚書左丞范恭守尚書左丞尚書兵部侍郎兼權右丞李鄴守尚書右丞建炎以来繋年要錄巻六十九
