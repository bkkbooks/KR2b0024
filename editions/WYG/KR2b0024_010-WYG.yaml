body:
  text: 建炎以來繫年要錄巻十宋李心傳撰建炎元年冬十月丁巳朔上登舟幸淮甸翌日發南京戊午隆祐太后至揚州初太后過髙郵聞叛兵焚鎮江乃遣兵扼􅆶洲渡及是入城駐於州治名州之正衙曰車駕廵幸駐蹕之門庚申詔諸路官司及寄居待次官或非王命備補之人以勤王為名擅募民兵潰卒者並令散遣有擅募者帥憲司按劾以聞東京留守宗澤復上䟽論其治兵且言臣契勘京城四壁濠河樓櫓與守禦器具其當職官吏協心併力夙夜自公率勵不懈増築開濬起造輯理浸皆就緒臣又製造决勝戰車一千二百兩每兩用五十有五人一卒使車八人推車二人扶輪六人執牌輔二十人執長槍随牌輔車十有八人執神臂弓弩随槍射逺小使臣兩員専幹辦閲習車事每十車差大使臣一員縂領為一隊見今四壁統制官日逐教閲坐作進退左右回旋曲折之陣委可以應用又沿河十六縣與上下州軍相接作聫珠寨以嚴備禦臣見使王彦曹中正在河西攻擊収復州縣西京河陽鄭滑等州同為一體把截探伺次第敵人畏襲已不敢輕動冒犯臣自到京奉揚陛下仁風布宣陛下徳意今街巷市井人情物態皆已忻恱敉寧嘉靖同祖宗太平時顧臣犬馬之齒六十有九比緣陛下委付之重常患才力不任惕惕憂懼近日頓覺衰瘁萬一溘先朝露辜負陛下眷恤憐憫之意臣死目不瞑儻使臣與官吏士民望翠華回輦之塵瞻仰天顔俯伏百拜然後臣填溝壑如生之年死骨不朽論語曰為政以徳譬如北辰居其所而衆星拱之京師乃我祖宗基命肇造二百年大一統基業本根之地陛下奈何偏聼如張邦昌輩邪佞之語以廵幸為名輕去其所使四海來享來王之人徜徉道路於偏僻州軍作朝宗之地乎臣果得以此老身俯伏道左迎陛下千乗萬騎垂拱九重奉陛下指揮號令強敵可以消弭冦盗自然平蕩王室於焉再造大宋中興可必若誕妄之人言臣欲以敵國之患貽君父憂即臣自頂至踵甘俟斧鉞臣已修整御街御廊䕶道􅒎子平整南薫門一帯御路聞萬邦百姓寓於京師者日夜顒顒望陛下迎奉祖宗之主與隆祐太后皇后妃嬪皇子天眷歸安大内以福天下臣夙夜憂思眷眷念念繼之以泣願陛下憐臣孤忠矜臣衰暮惟恐心力不逮或有誤陛下國家大計今年河流不氷惟陛下斷自淵衷毋惑羣邪之議書曰惟克果斷乃罔後艱臣不勝激切之至取進止始宗澤條上五事曰近者有㫖樁占器甲不得擅支今命將出師而樁占軍中當用之物此可疑一也近募兵於四城守禦今樞宻院問所募人繫何色額如此則古人使貪使愚皆不可矣此可疑二也臣為平常防河止以數千卒沿河分布如有數騎侵越即奔潰不支故開濠劄寨亦似允當而樞宻院乃用陜西例令三分出戰七分出助軍錢今京畿殘破民未復業勞來安集猶恐散去又何以助軍錢扼之使速去邪此可疑三也今守禦之具與夫城池雖已粗辦尚多鹵莽而三省樞宻院指揮所雇工役不令支錢此可疑四也臣竊見僕射黄潛善福建人樞宻汪伯彦徽州人内張慤雖是北人然無公識無逺見議論偏頗皆欲賛陛下南幸此可疑五也既而澤見詔書有竢四方稍定即還京闕之語壬戌澤上表以謝表曰臣今月六日承遞報車駕將還闕者恭聞眀命肅詔回鑾歡騰率土之謡和浹中天之氣里閭喜恱如嬰孺之將見慈親道路光輝若翳霾而忽瞻白日人情至此天意可知中謝竊以列聖格言先王垂裕天難諶而聪眀自我人至衆而好惡匪殊但觀自我之是非可騐匪殊之嚮背是知人所欲者自然天亦從之所以君子不務小同然後天下能成大順恭惟皇帝陛下以道觀政以徳行仁宻韜神武之機獨斡乾剛之斷整齊萬乗來歸九重宇宙澄鮮預想屢豐之慶廟堂肅穆式隆宏濟之休昊穹降福以穰穰寰海來崇而濟濟六軍有雷動雲行之勢四方䝉風驅電掃之威赫奕重光崇髙再造列辟駿奔而抃舞寰區竭蹶以欽承臣無任又上表曰恭膺眀命肅詔回鑾下蘓徯后之情仰對在天之意葱葱佳氣増光二百年之休勉勉逺猷駿惠大一統之盛佇觀丕應聿享咸寧中謝竊以太祖肇基奕世嗣服並據本根之地宏施實徳之風宅四表而率服吾君奄九有而來崇真主曩緣辰告暫聴時廵知人乆戀於睿慈聚議獨形於英斷欲繼志而述事遂斡乾而轉坤時方奉於詔書顧忽聞於雷震是天喜恱為人音聲想衆懽呼應時舞蹈河伯安流而迎駕雨師灑道以清塵兒童爭提携於壺漿父老願治平於道路里閭皥皥田野熙熙収兩河山寨之心鎮逺徼人民之聼然後御端門而肆赦滌舊染以惟新欵宗廟而告歸儼威容而如在憂勤祖述恭儉緝熙大成有截之功永以無疆惟恤臣無任先是羣盗王再興以兵數萬人王貴萬餘人徃來河上王善以車百乗冦濮州楊進兵尤衆連擾京西諸郡至徳安府守臣直龍圗閣陳規晝夜不解甲晝則與戰夜刼其營相持凢十有八日而進技窮乃以百餘人自衛直抵濠上求和規即出城與進交臂而語進感其至誠折箭為誓眀日引衆去圍光州甚急澤遣使招之皆聼命即以進為留守司統制且擇其軍中老弱萬人釋之進明年二月乙丑補官澤理財有方凢兩河及京東西諸郡求軍須者皆輟東京所有與之不以為間上遣中使撫問既而澤聞上已南幸又上䟽請還京臣聞易於渙之卦曰渙汗其大號此言人君發號施令如汗焉一出而不可反也臣竊觀陛下踐膺大寳權時之冝駐蹕近甸天下之民延頸企踵日望鑾輿之歸經理中原以建中興之業故廼者親降詔書即將還闕恭謁宗廟延見父老中外聞之莫不鼓舞相慶以謂陛下英斷如此何事不立何功不就何浮言之可惑何強敵之足憂太平基業正在此舉下詔之後日復一日尚未聞千乗萬騎㳙日啓行民心不能無疑焉臣愚竊意陛下乾剛不撓離眀並照洞見安危之機必不肯失信於天下是必有姦臣誤陛下負失信之謗也伏見邇者河陽水漲斷絶河梁有姓馬人妻王氏者率衆拒敵敵勢窮窘不知所為此天亡之時也夫天與不取反受其咎臣欲因此時遣閭勍王彦各統大兵乗其危孤大振軍聲盡平敵壘伏願陛下亟還京闕以繫天下之心則孰不用命且投機之㑹間不容穗願陛下毋惑於姦臣之言斷自淵衷臣自謂兹舉可保萬全無可疑者也或姦謀蔽欺天聼未即還闕伏願陛下從臣措畫勿使姦臣沮抑以誤社稷大計陳師鞠旅與之决戰掃盡邉塵肅清海宇然後奉迎鑾輿歸還京闕以快天下之心以塞姦臣之口臣䝉陛下知遇誓效死節區區愚忠不能自已伏望聖慈特賜睿斷天下幸甚取進止上優詔答之澤條上五事在戊午今牽聫書之徽猷閣待制提舉西京嵩山崇福宫陸藻卒藻已見七月甲午癸亥募羣盗能併滅賊衆者授以官甲子觀文殿大學士提舉杭州洞霄宫李綱落職依舊宫祠時殿中侍御史張浚論綱罪未已大略言綱杜塞言路獨擅朝政所陳敷奏之語無非殺戮之事盖欲隂為慘毒外弄威權當時臺諌如顔岐孫覿李㑹李擢范宗尹重者陷之以罪輕則置之閑散若非察見之早而養成其惡則宗廟之寄㡬敗於國賊之手可不為之寒心邪向使綱之輔相止於任職不堪當此危難尚當借綱行法以示懲戒矧其得罪於宗廟百姓與夫不道之蹟顯著如此願早賜竄殛以厭士論章再上乃有是命龍圗閣直學士錢伯言移知鎮江府初兩浙提㸃刑獄周格既死直龍圗閣知秀州趙叔近權提刑司事招杭賊陳通降之賊聞槍仗手屯秀州界其兵精遂聼命是日叔近以素隊數十人入城通等猶不解甲叔近與通等相見置酒推心腹待之使皆馴伏以待朝廷授官之命城中稍定乙丑詔帥府輔郡要郡等招置新兵初不計合用錢糧止仰度牒紫衣之屬及許雜兵改刺紊亂紀律為害甚大其罷之水軍准此三年二月壬午又置新軍丁卯御營使司都統制王淵為捉殺杭州盗賊制置使仍賜銀帛萬匹兩為軍費有内侍自京賫内府珠玉二囊來上上投之汴水翌日以諭輔臣黄潛善曰可惜有之不必棄無之不必求上曰太古之世擿玉毁珠小盗不起朕甚慕之庶㡬求所以息盗耳庚午上次泗州辛未幸普照寺賜度僧牒金鉢盂壬申升揚州天長縣為軍以其近行在也丁丑侍御史王賔試右諫議大夫詔東南諸州縣所樁私茶鹽礬賞錢每處各以千緡計綱赴行在用都省請也按奏状江東一路起五萬八千緡則通諸路為三四十萬緡未知後來所収如何户部言諸路所収民間助國錢乞令計置輕賫赴行在從之詔自今獲到強盗罪至死情理巨蠧者更不申提刑司詳覆令本州一面依法處斷俟盗賊衰息日仍舊初太祖少子秦康惠王生英國公惟憲惟憲生新興侯從郁從郁生華隂侯世将世将生東頭供奉官令譮令譮生子偁中進士第至是為嘉興丞一夕其妻張氏夢神人自稱崔府君東漢崔瑗廟在磁州封嘉應侯擁一羊謂之曰以此為識已而有娠戊寅生子伯琮是夕赤光滿室如日正中或聞庭下馬嘶劍甲之聲己卯上次寳應縣御營後軍作亂孫琦者為之首左正言盧臣中從駕不及立船舷叱賊為所逼墜水死上命求臣中所在得之水中拱立如故殿中侍御史張浚以為雖在艱難中豈可廢法乃劾統制官定國軍承宣使韓世忠師行無紀士卒為變詔世忠罰金中書舍人劉珏言無以懲後浚再上章論且乞擒捕為變者乃降世忠觀察使朱熹張浚行状云浚劾世忠上為奪世忠觀察使按世忠在南京已除承宣使行状恐誤今改作降字庶不牴牾上下聳然始知有國法又詔臣中知無不言而死於非横特贈左諫議大夫賜其家銀帛百匹兩官子孫二人臣中贈官在此月乙丑今併書之後按己卯是廿三日前此初九日是乙丑無丑日此字恐誤承議郎李則言舊制閩廣市舶司抽解舶貨以其貴細者計綱上京餘本州打套出賣大觀後始盡令計綱費多而弊衆望復舊法仍許商人赴行在納錢執據徃本州償其數從之自罷常平司而諸路提舉官多以未受命為詞居職如故偽黨之被竄逐者徃徃不行又崇觀以後因父兄得貼職之人用近㫖當追奪而所在自如言者以為國家再造之初所恃以號令天下振起中興之業者威信而已今稽違王命無所忌憚如此不可以不申戒乃詔帥臣監司體量罷奪其竄斥人䕶送貶所有隠庇者重坐之庚辰命奉國軍節度使御營使司提舉一行事務劉光世討鎮江府叛兵武功大夫逹州刺史趙哲提舉兩浙路廵社兼提㸃刑獄公事辛巳以劉光世為滁和濠太平州無為軍江寧府界招捉盗賊制置使御營統制官苖傅為制置使司都統制從光世行熊克小歴於此日書遣王淵捕浙西諸盗誤也淵此月丁卯先除制置使庚辰乃命光世耳日歴六月癸亥書趙哲除浙西廵社兼提刑亦誤廵社乃八月丁卯方立法安得兩月前先除提舉官耶况是時浙憲已有周格髙士瞳二員史官重疊差誤今不取朝請郎李棫提舉廣南西路左右兩江峒丁公事棫邕州人時自廣西經略司幹辦公事代還而尚書户部郎中葉宗諤奏言廣西峒丁自來止差使臣提舉位卑體輕徃徃不為逺人信服致賬籍開落失實教閲廢弛棫智謀深逺材術優長備知峒丁情偽乞特差充提舉官請給人從依市舶官例故有是除既而中書舍人劉珏不書錄黄論宗諤於修復成憲之時而改變法度减省官吏之際而添置監司恐峒丁驚疑或致生事望仍舊用使臣仍令監司一員譏察不從日歴云降㫖闕按紹興元年六月三十日廣西轉運司申經略司牒近奉聖㫖减罷提舉峒丁官撥𨽻本司則知此時未嘗罷也癸未上至揚州駐蹕州治舊制三衙管軍未嘗内宿至是始日輪一員直宿行宫紹興三年八月己亥所書可參考詔内侍不許與統兵官相見如違停官送逺惡州編管時入内内侍省押班康履以藩邸舊恩用事頗忽諸將諸將多奉之而臺諫無敢言者丙戌詔廣西沿邊無得受安南逃户仍令監司譏察以交阯郡王李乾徳有請也是日兩浙制置使王淵率統制官張俊等領兵至鎮江府軍賊趙萬等不知其猝至皆解甲就招時辛道宗前軍將官苖翊猶在叛黨中乃委翊統之衆心稍定翊傅弟也淵尋紿賊以過江勤王其歩兵先行毎一舟至岸盡殺之餘騎兵百餘人戮於市無得脫者日歴以此事為劉光世林泉野記熊克小歴等書皆作王淵今從之盖淵領兵徃杭州在光世之先故因過鎮江而遂平之也李孝義既攻徳安府不能下統制官喬仲福遣人招之是月孝義行至蘄州張世斬之以降擇其徒彊壯者𨽻軍餘老弱失業者皆還之十有一月丁亥朔以揚州路滑始聽百官乗轎戊子銀青光禄大夫提舉杭州洞霄宫李綱鄂州居住時殿中侍御史張浚等論綱罪状未已浚言綱邪險不正崇設浮言足以鼔動流俗非竄之殛之上無以謝宗廟下無以謝生民次無以嚴君臣之分而國是紛紛陛下黜陟之典終不能明於天下况誣罔不根事有可恨者惟綱不學無術始肆彊忿首議遷都於金陵陛下固嘗寢其請矣而廼狠戾輕狂施設大繆故為反覆以惑衆心如前所謂括馬招兵勸納民財之政此最大者夫馬可盡括而有兵可彊招而用民財可驟歛而得使三者果如其言人必大怨國本先困矣逮其易詔令以庇翁彦國之親黨捐金帛以資張所傅亮之妄費姦跡謬狀不逃聖鑒是以乾剛獨斷斥去不疑事之可稽皎如日月而反覆之論輙爾肆行徒取細民目前之譽以幸虛名不知朝廷經逺之謀是為大計人臣之忠於國家固如是乎臣嘗歴考綱之所為當靖康初力請淵聖皇帝留京師雖無制敵之䇿逺慮之眀亦可為奮身以徇國矣而乃小器易盈不知涵養貪名自用競氣好私忠義日虧浸失所守謂蔡京之罪可略蔡攸之才可用交通私書深計宻約凡蔡氏之門人雖敗事誤政力加薦引綱之負宗廟與夫存心險惡抑亦有素若不早加竄殛臣恐非所以靖天下言者又奏綱之用心在於専營小人之譽靖康之初綱知小人之情在於懐土故倡為守城之計卒之二聖北遷至今未復者綱之所致也和議之後綱知小人之情在於憤敵故倡為刼寨及解太原之圍覆師蹶將怨結兵拏敵再犯城闕者又綱之所致也逮陛下中興綱來自江淮知廵幸東南為便既抗章力陳矣及至行在聞小人有不樂東去者即遽為幸鄧之計當是時雖三尺童子知其不可而綱决為之盖綱之心急於盗名雖使國家顛沛一切不恤頼陛下聖眀灼知其姦亟行罷黜不然禍亂可勝計哉頃綱之入相也至南京之日於政事未有所問先差登聞鼓院并理檢院人吏盖欲引羣不逞之徒以譽己耳綱以小人譽己則己尊己尊則朝廷可以脅制而政令皆由己出甚者至於造成伏闕之事雖人主不得而令此淵聖皇帝所以謂其䟦扈也訪聞近日辛道宗叛兵自蘓秀而來綱傾其家貲數千緡并製造緋巾數千遣其弟迎賊不知其意安在今陛下駐蹕維揚人情未安綱居常州無錫縣去朝廷不三百里綱既素有狂愎無上之心復懐怏怏不平之氣而常州閭閻風俗淺薄知有李綱而已萬一盗賊羣起藉綱為名臣恐國家之憂不在金人而在蕭墻之内以為李綱者陛下縱未加鈇鉞之誅猶當寘之嶺海遐逺無盗賊之處庶㡬國家可以少安故有是命中書舍人汪藻草制曰朋姦罔上有虞必去於驩兠欺世盗名孔子首誅於正卯言者又奏承議郎知無錫縣郗漸嘗郊勞綱且與之燕漸坐除名漸臨清人也此據漸墓誌日歴無之事吕中大事記曰張浚平生忠肝義膽不與秦檜共不與金人俱生而初年之見反黨汪黄而攻李綱不已何哉使其移攻李之筆而攻汪黄豈不快公議哉善乎胡安國之䟽曰賞罰政事之綱必先核實而核實必自大臣與臺諌始渡江以前所任相其賢否則有公論矣而言者獨攻綱為甚一言而罷相再言而罷職又再言而投諸海島施於綱者亦甚峻矣然人心未服則以所毁亂真而不核實如西防江復令招刺諸州勸納發招討司未有以為非者在綱行之則謂失人心在他人行之則獨以為可此不核實者一也自仲尼大聖猶待三年有成而乃責綱以一時未聞報政孫覿嘗草降表貶薄二聖死有餘責得貶輕矣乃以為杜塞言路此不核實者二也綱既放於鄂州渚澧陽之後若如言者所論國家宜少安矣而李成張遇丁進縱横淮甸所在如織此不核實者三也金䧟京城邀請二帝乃何㮚操權郭京用事綱方逺貶不預戰守之謀而固欲黜綱前日回鑾之功指以為罪此不核實者四也綱本以建州禦敵守城之䇿為孝慈皇帝所知擢與機政而以為欺君要功不貸之罪此不核實者五也刼寨之事人以為姚平仲講於帷幄种師道李綱之所不與也而乃謂綱之用心欲寘君於何地此激怒為不貸之罪此不核實者六也胡安國之䟽如此然以親而庇翁彦國之罪以怨而抵宋齊愈之死此不待核實而綱有餘責矣大臣之用心不可不公如此初既行廵社法於諸路而通判亳州鄧浚眀乞鄉村三丁㸃一以為民兵至是朝議大夫知宿州李孝揚言其相妨乃止孝揚廸孫廸鄄城人天聖中宰相宣和間嘗為宗正丞是日張遇入池州遇本真定府馬軍聚衆為盗號一窩蜂自淮西渡江水陸並進至是犯池州守臣朝請郎滕祐棄城走遇遂入城縱掠驅彊壯以益其軍始遇驅民為兵民辭以不習戰遇曰吾教汝即命二人取器械相擊殺一人乃止曰此戰勝法也能殺彼則汝可活耳己丑詔諸路無額上供錢依舊法更不立額自來年始庚寅詔以二聖母后未歸有忠信宏博可使絶域及智謀勇毅能將萬衆者詣檢鼓院自陳其後得宇文虛中二月二日壬戍劉誨三年二月丁丑楊應誠二年三月丁未劉正彦二年二月戊寅皆擢用之尚書禮部侍郎兼直學士院朱勝非為翰林學士徽猷閣直學士知揚州吕頥浩試尚書户部侍郎兼權知揚州頥浩嘗入見上言竊觀天下之勢以撥亂為急撥亂必先任賢退不肖信賞必罰理財節用積粟訓兵裁抑恩倖毋令撓朝廷之權捜選將帥大開諫路縂攬羣䇿則何為不成何戰不勝上稱善給事中王綯試尚書禮部侍郎仍兼直學士院中書舍人劉珏試給事中降授承務郎充徽猷閣待制孫覿復朝奉郎試中書舍人初張浚因劾李綱罪論覿不當貶由是復用覿為張浚所訟略見李綱劾䟽今以覿文集與人書増入延康殿學士新知婺州何志同坐棄頴昌奪職提舉杭州洞霄宫辛卯詔政和以來諸慶節號真元寧貺天成天符天應者皆罷之惟開基節如故詔諸路守臣勤王在道者並與進貢恩澤金人圍磁州此據建炎二年正月河東北路制置司奏狀朝奉郎王倫為大金通問使時河東軍前通問使宣教郎傅雱副使閤門宣賛舍人馬識逺至汴京詔趣還問所得金人意復遣倫與閤門宣賛舍人朱弁見左副元帥宗維議事熊克小歴云時又得王倫授以朝官為通問使按倫弁五月初已授命但未成行逮雱歸而始遣耳克亦小誤雱見留守宗澤諭使縱遣所拘北使澤不從雱至揚州以金國書對於後殿為上言兵交使在其間今留之不足以壯威徒使鄰國交惡上納其言擢雱朝請郎尚書考功貟外郎雱除命在此月辛亥今並書之壬辰詔自今雜犯死罪有疑及情理可憫者許酌情减降斷訖以聞俟道路通行日如舊甲午詔福建路招募槍仗手已行住罷今後非被受朝㫖輙敢撥諸司錢物及以勸誘為名抑勒民間出錢者並不得施行仍具職位姓名申尚書省以本路常平司言自鮑貽遜等起發軍兵凡用本司錢米銀五十二萬貫石兩他司錢不與公然隠落㑹問不報故條約之乙未同知樞宻院事張慤守尚書左丞兼御營副使兼提舉户部財用工部尚書顔岐同知樞宻院事日歴十月己未中丞顔岐除右丞十一月乙未右丞許翰資政殿學士宫觀並誤初河北招撫司都統制王彦聚兵西山常慮糧儲不繼一日盡發軍士運粟㑹有亡告金人者金乗虛擊之衆稍却彦大呼鼔勇士卒皆奮且以彊弩飛石齊發金人乃退遂圍之絶彦餽運者旬餘彦檄召諸寨兵大至圍乃解丙申曲赦南京宿亳泗楚揚州髙郵軍以上廵幸所嘗過也丁酉詔江淮發運司幹辦公事鮑貽遜以福建槍仗手移屯江寧給事中劉珏言杭冦猖獗今已數月翟汝文之師既無功於前髙士瞳之兵又潰散於後唯貽遜之師屹然不動盖杭卒頗有窺浙西之心所以未敢大肆者以槍仗手為之捍蔽也郡冦之說欲遣散槍仗手乃就招安趙叔近已令退舍而冦猶未降則其説果可信乎念陛下深念二浙生靈方以成算授之王淵令其招捉彼槍仗手乆屯於彼望有尺寸之功今乃遣之江寧萬一怏怏不滿復有反側是又生一冦也設或槍仗手已來江寧而杭冦未肯就招不知淵之兵果能殄㓕之乎當是時再欲遣來應援如其遲疑不前又將何以處之昔唐裴度平蔡李光顔等六人各以師㑹今淵豈不能容數千槍仗手而用之乎願且令在杭州同共討捕候至錢塘蕩平然後遣屯江寧或令歸福建皆未晩也從之日歴云降㫖闕㑹要云劉珏乞申命王淵且令槍仗手在杭州同共討捕從之今増入甲辰河北經制使馬忠落龍神衛四廂都指揮使降充經制副使忠全軍退舍故有是命初户部尚書黄潛厚建請諸路監司郡守計置輕賫金帛勤王至是知濠州徽猷閣待制連南夫言剗刷到軍資庫紬絹二千匹有竒欲輸行在詔軍資庫物帛本非上供當留以為軍衣之用諸路視此者悉歸之南夫安陸人也乙巳詔自今被受中使傳宣者當時宻具所得㫖實封以聞如事有未便者許執奏又詔凡宣㫖及官司奏請事元無條貫者並中書樞宻院取㫖非經三省樞宻院者官司無得受復舊典也熊克小歴載此㫖因衛膚敏所奏非是詳見今年十二月戊辰注丙午尚書左丞張慤守中書侍郎兼知如故熊克小歴云上委慤理財元豐舊制中書専取㫖大臣所擬者慤輙屏不奏按此時黄潛善以右揆兼中侍慤安能獨屏之况自元豐之末至建炎之初凡進呈皆三省同上已革官制之舊乆矣或者慤獨進呈財用司事而行狀修潤失實日歴附傳又從而因之克不深考耳今不取丁未户部尚書黄潛厚請許淮浙鹽入京東毎袋納借路錢二千許之東京舊東北鹽地分也時濵海道不通金部貟外郎吳直夫以為言潛厚因請令商人特納借路錢就行在送納别儲之以待用焉戊申同知樞宻院事顔岐守尚書左丞兼權門下侍郎御史中丞許景衡守尚書右丞先是景衡陳十事謂方今人材未備而政事不立法度未修而宿弊尚存浮費不節而國用空虚賦役煩重而民力困敝命令不行而事多壅滯賞罰未眀而人無懲勸盗賊繼作而吏民被害邉境危急而武備弗嚴姦贓未逐而貪暴滋多公議未伸而親黨害政上歎息曰真今日之急務未㡬遂擢為執政日歴十二月庚午許景衡除尚書右丞熊克小歴樓鑰宰輔題名十二月丙子許景衡除右丞二書不同按御史臺題名王賔今年十一月自右諌議大夫除中丞實代景衡日歴十二月庚申起居舍人衛膚敏除右諌議大夫實代賔庚申在庚午前十日在丙子前十六日不應併除右諫二員盖景衡實以十一月遷也又按今年十二月朔日詔置講讀官而王普奏議以為其父賔為中丞時所請則景衡賔之除皆在十一月無疑詳考其故景衡右丞之命當在十一月二十二日戊申而記事者皆誤繫之十二月二十一日丙子日月互差一字故也兼日歴於十二日庚午書顔岐左丞許景衡右丞則二人同除自可知今移附此以正諸書之誤刑部尚書郭三益同知樞宻院事右諫議大夫王賔試御史中丞賔之除實代景衡日歴不載御史臺題名在此月尚書吏部侍郎周武仲試刑部尚書熊克小歴武仲及顔岐郭三益之除並在丙午盖誤初責授安化軍節度副使趙野行至宻州衆推野領州事時山東羣盗縱横劇冦宫儀據即墨不退野患之是日棄城去己酉樞宻院言昨翁彦國為經制使令江西轉運司認定錢百萬緡而本路諸州軍食不給詔蠲之初上至龜山而御厨人員賀進等求索民間難得之物所受贓以萬計至是曲赦獲免言者論其有害聖徳請特不原赦仍鏤板傳布四方從之婺州蘭溪縣僧居正乗亂據松山以叛民不逞者爭附之其衆漸盛庚戌杜彦據宻州趙野將輜重家屬棄城而去軍民偶語兩日不定彦守衛軍校與軍士李逵吳順謀曰方今盗賊縱横一州生靈豈可無主乃自稱權知州事而逵順左右之追執野於張蒼鎮後三日彦坐黄堂上數野以棄城之罪命臠之而分其室梟其首於市惟一子學老得脫彦盡刺城中人以益其軍野四年八月追復辛亥中書舍人汪藻言今中外所當推行者固非一事然軍政不修則無以立國望特詔侍從官以上各以所見考古軍制可行於今者條具以聞不得汎為迂濶之論陛下與大臣詳擇其中幸今冬敵騎不來汲汲為備毋使嵗月廢於因循有後時之歎從之朝奉大夫郭太冲行尚書吏部員外郎太冲茂恂子也嘗用李彦辟通判秀州吏部尚書路允廸率同列薦於朝乃有是命既而言者以為太冲嘗為允廸買妾用是得薦遂罷之太冲罷命在十二月壬午今併書之此為允廸眀年罷吏書事始是日金人陷河中府初黄潛善去河間以兵馬鈐轄孫某權府事金人至城下盡力禦之髙陽闗路走馬承受官李某者屢率兵與金人戰軍民服其忠勇至是城西北角破城内為月城以䕶之凡築月城三重與雲一營相近㑹營中遺火喧亂金渤海萬户大托卜嘉督將士乗亂攻之城遂陷二人皆為金殺知秀州權兩浙提刑司事趙叔近言杭卒初無叛心止緣葉夢得不時支賞遂致紛爭今已就招請官其徒二百二十人自修武郎至校尉乞降告身書填許之給事中劉珏言今盗賊數殘郡縣其勢未即殄滅者以招安之說誘之也金陵黥徒既被厚賞錢塘之兵建安之卒道宗之師又襲是跡而動今湖又見告矣其視殺漕憲守倅若刈草菅然非徒無罪且有子女金帛之獲紫袍象簡之寵此風一煽人人有冨貴之心今之為監司將帥者不亦難乎今叔近所乞乃郡盗逼作此奏皆不可從之事如欲加誅責即乞留此奏不下或欲令招安即乞量給官告三二十道彼見朝廷重於與之當亦有信朝廷之心御史中丞許景衡亦言官吏無罪而被誅責軍卒有罪反受爵命其為賞罰不亦倒置乎上用二人言至是寝其命熊克小歴載叔近奏請在十二月戊午與日歴不同當考是月湖州軍士有謀作亂者為其徒沈賔所告捕斬之詔以賔為保義郎此以紹興四年九月一日臣僚上言修入盖即劉珏䟽中所云也初夀春卒丁進被罪而竄遇亂復還鄉里聚衆於蘓村後至數萬皆面刺六㸃或入火二字進自號丁一箭遂圍夀春府守臣直秘閣康允之悉取銀帛以賞將士士皆效死允之以城危急募進士吕某權安撫司幹辦公事出城見進許以金幣犒師進怒殺使者盡取士卒家屬之在城外者戮之圍城二十五日不能㧞乃引去其後軍張勝以所部自趨光州進不能禁允之淮寧人也江淮制置使劉光世討張遇於池州光世至近郊行伍不整或請嚴為之備光世曰遇烏合之冦見官軍則自潰矣命速進兵奪城將士叩南門賊望之曰官軍少且不整可破也自城西出時湖水涸為平地賊越湖占長堤遶出官軍之背官軍亂遂敗績光世遁去㡬為賊所執前軍統制官王徳救之得免遇率衆循江而上光世亦整兵追之建炎以來繫年要録巻十
