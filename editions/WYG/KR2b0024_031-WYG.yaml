body:
  text: 建炎以來繫年要錄巻三十一宋李心傳撰建炎四年嵗次庚戌金太宗晟天㑹八年偽齊劉豫阜昌元年春正月甲辰朔大風御舟碇海中乙巳北風稍勁晚泊台州港口熊克小歴甲辰朔上至台州章安鎮駐蹕盖因日歴所書也今從李正民乗桴記是日午西風忽起敵乗之侵明州御前右軍都統制浙東制置使張俊與守臣徽猷閣待制劉洪道坐城樓上遣兵掩擊殺傷大當敵奔北堕田間或墜水俊急令收兵此據王庭秀閲世錄夜敵㧞寨去屯餘姚且請濟師於完顔宗弼丙午早上御舟次章安鎮朝請郎知台州晁公為與權户部員外郎李承造皆来朝上去警蹕易衣徒歩幸祥符寺從官迎謁拜於道左直徽猷閣江淮發運副使兼軍前糧料使宋煇自秀州金山村以海舶運米八萬斛錢帛十萬貫匹至行在時百司正闕續食從行者甚頼之上喜欲擢煇徽猷閣待制宰相吕頥浩以太峻難之乃除煇直龍圖閣公為直顯謨閣公為補之子也嘗為倉部員外郎補之見今年三月公為以去年七月庚辰除倉外未見出守在何時熊克小歴云甲辰上至章安鎮恐誤李正民乗桴記在初三日時正民實扈上行當得其的今從之紹興二年十二月韓世忠奏乃稱上幸台州時右武大夫張杞權知台州應辦無闕得㫖轉一官當考初上遣中使召御前左軍都統制浙西制置使韓世忠赴行在世忠已治舟師於通恵鎮乃請徃鎮江邀敵歸師盡死一戰上從之丁未御史中丞趙鼎自明州還行在遂與從官等六人同對於舟中是日象山縣報敵騎至明州張俊為戰守備明州西城外居民盡爇之其意亦欲赴行在也晚得知臨安府康允之奏且繳杜充書言充已在真州合兵為邀擊計又言徐州趙立以兵来援建康守陳邦光降於金戊申户部侍郎李迨自明州来朝己酉詔遣使自海道至福建䖍州問隆祐皇太后艤舟所在上慮太后徑入閩廣乃遣使問安焉張俊奏明州小㨗從行百官皆賀内侍陳顧言獨不賀曰上幸海道何賀之有是日遣御營都統制辛企宗以兵千人赴明州䇿應又降手詔趣杜充趙立進兵既而企宗卒不行庚戌同知樞密院事兩浙宣撫使周望言敵之在建康者焚糧草收金銀稍稍渡江北去自稱李成人馬先是完顔宗弼既陷建康望與徽猷閣直學士知平江府湯東野聞之集耆艾士夫僧道問所以為計者且曰今戰守皆無䇿矣盖其意在迎降而欲衆發其端士民不答而罷望遂收諸將兵歸城中懼其抗賊取怒也已而敵徑走臨安府遣人馳檄諭旁郡令趣降知秀州朝奉大夫程俱答言小邦不敢専即率官属棄城保華亭縣留兵馬都監趙士醫以守朝廷遂命俱押米綱赴行在望怒遣嘉興尉叚澤捕俱至平江將斬以狥既復釋之至是以聞俱開化人嘗為禮部員外郎平江城堞全壯而地下聚水四圍渠塹深廣望又竭取民財錢榖以鉅萬計庫廪充牣兵甲犀利郊居遷避之家徃徃而復望倚降㓂郭仲威為腹心俾盡䕶諸將由是人益安之是日金人再至明州浙東制置使張俊禦之於髙橋戰數合慮其濟師遂托以上㫖扈從辛亥盡將其衆入台州於是帶御器械權同主管殿前司公事李質亦以班直行城中居民去者十七八熊克小歴云金烏珠引衆再至明州誤也烏珠自入臨安未嘗過江克又云丙辰張俊劉洪道皆避去亦誤俊以正月辛亥引兵去明州丙辰洪道夜遁相去凡五日今從王庭秀所記尚書吏部兼權户部侍郎髙衛請即䖍州鬻鹽鈔二十萬緡以給行宫之用許之時淮鹽道不通故暫通閩廣鹽於諸路正月壬申又通閩鹽癸丑遂安軍承宣使兩浙宣撫副使郭仲荀責授汝州團練副使廣州安置仲荀既棄越州去其所部兵多散而為盗仲荀乗舟夜過行在不請朝言者䟽其罪詔御史臺大理寺雜治仲荀引伏故謫熊克小歴仲荀謫命在壬辰日歴㑹要在乙巳今從李正民乗桴記正民時在詞掖當不誤日厯既於乙巳書仲荀謫命而丙午又書令仲荀温州城外下寨己酉又書言者乞罷仲荀兵柄足明謫命不在己酉以前也乙卯滕康言太后已至䖍州丙辰劉洪道言敵再侵明州初張俊既行士民皆去有士人率衆扣洪道馬首願留以禦敵洪道曰予嘗數尅敵而勝若等毋慮是夜洪道悉府實微服而遁與浙東副總管張思正引所部奔天童山所過盡撤其橋民不得濟死者數千人哀號震天城中惟崇節馬軍與惡少僅千人以酒官李木將之詔金人侵掠兩浙陷没州郡官吏以衆寡不敵遂且降伏推其本心實非誠意並特與放罪令尚書省榜諭日歴無此指揮以今年五月丁未黎確奏狀修入命福建市舶司悉載所儲金帛見錢自海道赴行在初主管侍衛歩軍司楊惟忠所部九將既叛去至是司全張擬以所刼神御詣䖍州行宫請降傅選陷郴州大肆焚掠趙萬㓂袁州江東宣撫司前軍統制王徳與戰萬軍敗臨陣乞降徳斬之遂併其衆江淮宣撫司右軍統制岳飛自廣徳軍移屯宜興縣杜充之敗也其將士潰去多行剽掠獨飛嚴戢所部不擾居民士大夫避㓂者皆賴以免故時譽翕然歸之丁巳張俊自台州引兵赴行在中書門下省檢正諸房公事程邁充集英殿修撰知福州時寳文閣待制知福州林遹言敵近閩中請兵防守又自言老病不任事故以邁代之是日金陕西諸路選鋒都統羅索陷陕府守臣右武大夫寧州觀察使李彦仙死之敵自去冬以重兵来攻彦仙守禦甚備遇士卒有恩食既盡煮豆以啖其下而取汁自飲至是亦盡宣撫處置使張浚間道遺以金幣使犒其軍且檄都統制曲端以涇原兵徃援端素疾彦仙出已上無出兵意浚屬官資陽謝昇言於浚曰敵朝夕下陕莫以為憂者殆未知敵意也敵已得長安今取陕則全據大河且窺蜀衆莫謂然力爭數日師乃出至長安而敵先壅阻不得進彦仙日與敵戰將士未嘗觧甲羅索命自正月旦為始以一軍攻擊一日不下則翌日更遣一軍毎一旬則聚十軍併攻一日期以三旬必㧞之彦仙意氣如平常登譙門大作伎潛使人隧而出焚其攻具敵愕而却羅索雅竒彦仙才嘗招之彦仙斬其使至是遂欲降之使人呼曰即降當富貴彦仙不應日鈎取敵兵數十磔城上雖殺傷大當而敵兵沓至守埤者乆傷夷日就盡既而敵軍亦無食欲引去或告以急擊可入敵益衆攻之毎隊以鼓在前擊鼓一聲則進一歩既渡濠池皷聲漸促莫不争先疾趣併力齊登死傷者雖滿地而不敢返顧是旦有鳶鴉數萬飛噪於城上與戰聲相亂羅索曰城陷矣促使急攻城遂陷彦仙率士卒巷戰左臂中刄不殊猶不已敵惜其才以重賞募人生致之彦仙易弊衣雜羣伍中走渡河曰吾不甘以身受敵人之刃敵縱兵屠掠彦仙聞之曰金入所以殺傷過當者以我堅守不下故也我何面目復見世人乎遂投河而死敵取其家殺之陕民無噍類浚聞承制贈彦仙彰武軍節度使即商州立廟且官其子給宅一區田五頃乆之賜諡曰忠威浚承制贈官在紹興二年賜諡在乾道元年彦仙守陜再踰年大小戰二百及城陷其屬官陳思道李岳杜開通守王滸趙叔慿職官劉效馮經縣令張玘將佐盧亨邵雲閻平趙成賈何吕圓登宋炎等五十一人皆與同死無屈降者叔慿宗室子初為兵馬都監積功武翼大夫通判府事及城危有子為盧氏吏間使語之曰吾托肺腑死國難固其所若則走也雲龍門人敵陷蒲城雲獨與少年數百保聚山谷初事邵興後為彦仙部曲累官閤門宣賛舍人敵得雲欲以為將雲罵怒不屈羅索怒釘雲五日而磔之平湖城人官閤門祇候何陕縣人與成皆修武郎成正平人已見二年八月丁卯圓登夏縣人嘗為僧前後功㝡多號愛將城垂破自外来援與彦仙相持而泣曰圍乆不知公安否今得見公死且無恨左右皆泣創甚方卧聞城壊遽起戰死炎陕縣人善蹶張敵圍城炎取大弩數百調治所射洞殺傷敵兵甚衆城陷敵欲将炎呼炎出不應戰死後自雲已下皆贈官錄其家一人戊午張俊全軍立功人並遷七官賞明州之㨗也是役也軍卒王進身先士卒獨立竒功詔授武翼大夫俊㧞以為將進延安人也於是進士劉相如以嘗撰榜文募人迎敵亦補迪功郎添差監温州酒稅相如補官未見本月日且附此尚書倉部員外郎章誼罷坐出使浙東變賣度牒稽留也遣户部員外郎李承造往閩中刷錢帛金人再侵餘姚縣是日上元節韓世忠在秀州取民間子女張燈髙㑹此據汪藻奏議既遂引兵之鎮江己未金人破明州先是敵益兵而来前二日駐軍廣徳湖舊寨前遣老弱婦女運瓦礫填塹次夕植砲架十餘對西門是日以數砲碎城樓守者奔散而出城遂陷敵引兵入城顯謨閣直學士提舉建隆觀鄭億年避㓂山間為所執熊克小歴載明州之破在丙辰日歴在戊午並誤夜大雷雨翌日上謂大臣曰昨雷聲頗厲於占為君弱臣強四夷兵不制所致朕當與卿等修徳以應天庚申劉洪道奏金人大至詔權同主管殿前司公事李質貶秩三等引所部還赴之不知明已陷矣辛酉御舟離章安鎮朝議分遣張俊所部救明州上不欲遣乃止又批令劉洪道等皆退避其鋒已上並李正民所記時統制官李捧屯黄巗縣有㫖候金人至台州則前来温州此據汪藻奏議然議者謂明既失守則海道可虞而行在必不敢安枕也初李彦仙遣其將耿嗣宗屯盧氏縣陕州既陷金人攻盧氏嗣宗與戰敗之知虢州邵興聞彦仙死乃退兵與嗣宗合壬戌晚雷雨又作上謂大臣曰此與前占無異惟頻發者應速耳癸亥泊青澳門甲子泊温州港口日歴甲子御舟至温州舘頭今從李正民乗桴記宣教郎吴表臣守監察御史先是御史中丞趙鼎薦表臣及宣教郎林季仲充臺官而表臣先至上召見遂有是命二人皆永嘉人也乙丑以中書舍人李正民為江浙湖南撫諭使朝隆祐皇太后於䖍州事有不可待報者得與權知三省樞密院滕康等叅決仍許於簾前奏事所至官吏能否民間屈抑並體訪以聞丙寅御舟移次温州之館頭先是金人自明州引兵攻定海縣破之遂以舟師絶洋至昌國縣欲襲御舟至碕頭風雨大作和州防禦使樞宻院提領海船張公裕引大舶擊散之敵乃去上聞明州失守遂引舟而南與金人纔隔一日趙甡之遺史云金人乗小鐵頭船泛海隨潮過昌國縣至沈家門而回不知沈家門即碕頭否也丁卯䖍州從衛諸軍作亂初隆祐皇太后既至䖍州府庫所有皆盡衛軍打請惟得沙錢及折二錢市買諸物不售軍士與鄊民相争鄊民以槍刺軍士有傷者奔入所屯景徳寺被甲持仗保所居百姓亦持器仗保坊巷有䖍化縣民沈立率鄊兵三百人與城中相犄角其將司全令甲軍出於寺後轉殺鄊兵由是鄊兵與將兵及百姓爭門而出軍士遂縱火肆掠䖍多竹屋煙熖亘天不可嚮邇太后以禮部尚書曽楙為撫諭使楙遷延不行金人攻潭州時敵自南昌掠袁筠至長沙城下遂圍之盜劉可轉㓂京西屢與知唐州桑仲戰皆不勝至是為其黨所殺遂推劉超為首以據荆門軍可超所過井邑邱墟人無噍類戊辰資政殿學士權知三省樞密院事滕康端明殿學士權同知三省樞密院事劉珏並落職康提舉亳州明道宫珏提舉江州太平觀以監察御史張延夀言其罪也日歴康珏之罷在二月乙亥熊克小歴在三月丙寅皆並盧益李回除命書之今按樓鑰所編宰輔題名則康珏之罷在正月戊辰益回之除在二月乙亥故各附本日克又以延夀為殿中侍御史按日歴延夀除副端在五月癸丑克歴恐誤己巳上幸水陸寺侍從臺諌官稍集班列差盛尚書户部侍郎葉份請令僧道換給已書填黄紙度牒毎道輸紙墨錢十千從之初趙立既至椘州朝廷因以立知州事㑹金左監軍昌親率數萬人圍城攻其南壁立自為旗頭引衆出戰相持四十餘日至是敵以砲擊三敵樓遂登城立先取生槐木為鹿角以槎其破處而下修月城以裹之月城之中實以柴薪城之内為鎔鑪敵自月城中入立命以金汁澆之死者以百數敵不能入遂退守孫村大寨時遣數百騎出没於城下以掠取求糧採薪者由是城中人不能出而薪糧日竭庚午李成陷六安軍水寨以其衆攻六安軍不克時安豐縣土豪孫暉統率鄊兵保守安豐塘羣㓂不能犯由是人多依之辛未詔將来敵騎北歸或盡數過江或留兵守建康杭越當如何措置及於何駐蹕令侍從官條具以聞御史中丞趙鼎請遣使督王􅊛進軍宣州周望分兵出廣徳與之合邀敵歸路仍責􅊛不䇿應杜充之罪俾立功自贖及詔劉光世渡江駐軍蘄黄牽制湖南賊兵與杜充為聲援并趣劉光世為邀擊之計或與杜充㑹於楚泗使賊知江左軍衆歸路稍艱必有退軍之漸如尚占臨安建康則乗暑擊之期於克復而後己時或傳金人在建康築城為度夏計故鼎有是言給事中兼直學士院汪藻言金人為患今已五年陛下以萬乗之尊而倀然未知稅駕之所者由將帥無人而御之未得其術也如劉光世韓世忠張俊王􅊅之徒身為大將論其官則兼兩鎮之重視執政之班有韓琦文彦博所不敢當者論其家則金帛充盈錦衣肉食輿臺厮養皆得以功賞補官至一軍之中使臣反多卒伍反少平時飛揚䟦扈不循朝廷法度所至驅擄甚於外患陛下不得而問正以防秋之時責其死力耳張俊明州僅能少抗奈何敵未退數里間而引兵先遁是殺明州一城生靈而陛下再有館頭之行者張俊使之也臣痛念自去秋以来陛下為宗社大計以建康京口九江皆要害之地故杜充守建康韓世忠守京口劉光世守九江而以王􅊅𨽻杜充其措置非不善也而世忠八九月間已掃鎮江所儲之資盡装海舶焚其城郭為逃遁之計洎杜充力戰於前世忠王􅊅卒不為用光世亦偃然坐視不出一兵方與韓梠朝夕飲宴賊至數十里間不知則朝廷失建康敵至兩浙乗輿震驚者韓世忠王􅊅使之也失豫章太母播越六宫流離者劉光世使之也嗚呼諸將已負國家罪惡如此而俊自明引軍至温道路一空居民皆逃奔山谷世忠逗遛秀州放軍四掠至執縳縣宰以取錢糧雖陛下親御宸翰召之三四而不来元夕取民間子女張燈髙㑹君父在難而不恤也􅊛自信入閩所過邀索千計公然移文曰無使枉害生靈其意果安在哉臣觀今日諸將用古法皆當誅然不可盡誅也惟王􅊛本𨽻杜充充敗於前而􅊛不救此不可赦當先斬􅊛以令天下其它以次重行貶降使以功贖過臣愚以為敵退之後正大明賞罰再立紀綱之時莫若擇有威望大臣一人盡䕶諸將雖陛下親軍亦聽其節制稍稍以法裁之凡軍輙敢擅移屯以䕶駕為名者自主將以下並論如法仍使於偏裨中擇人才之可用者間付以方靣之權待其有功加以爵秩隂為諸將之代此今日所㝡急者惟陛下與大臣熟議斷而行之奉直大夫浙西提舉茶鹽公事陳述責監饒州酒稅述便文之浙東上在明越不朝請詔押還任時平江道梗述以無船為詞乃有是命壬申户部侍郎葉份言淮鹽路梗妨阻客販浙鹽數少積壓客鈔望權以福建鹽通商仍稍還買鹽本錢即本路官搬官賣兩不相妨從之福建路嵗産鹽一千一百萬斤政和中遣左司郎官張察至本路参定嵗以三分為率二分歸朝廷許商人輸錢於𣙜貨務給鈔即本路受鹽一分歸漕司許自買鹽積於海倉令上四郡及属縣搬賣以辦嵗計時商販官搬二法並行靖康俶擾商販殆絶故官悉自鬻嵗收課錢四十萬緡至是份請行鈔法而姦民乗之盜販者甚衆癸酉詔行在職事官條具駐蹕所在及守禦之䇿太常少卿陳戩言兵將用命則寡可敵衆不用命則多適致敗今國之典刑不能加之將將之威令不能施之軍宜申嚴紀律使左右進退惟命之從則敵可破矣是月京城留守上官悟以京西南路招捉司中軍統領牛臯為本司同統制兼京西南路提㸃刑獄公事臯魯山人初為射士聚衆與金人戰以功補官金人蹂踐京西臯數戰皆㨗知汝州王俊假臯武節大夫果州團練使至是為留司所辟二月甲戌朔酈瓊以其衆降扵檢校太保江東宣撫使劉光世瓊初見三年九月末瓊圍固始縣凡四月有二日至是乃觧初瓊之未至也羣盜黄林引衆来犯曹官吴翊趙甡之遺史作吴翼日歴中有知光州吴翊者即此人也招降之守臣任詩以翊有功請于朝改京官通判州事及詩還朝而翊權州事瓊尚未去也翊乃請統制官劉紹先以所部觧圍紹先至固始為瓊所敗知縣事向宗輝開門納之紹先以其衆登城用強弩禦瓊殺傷甚衆㑹光世遣人招瓊瓊受招安光世因以為將既而宗輝恃其功與翊不相下翊招宗輝至光州誣以罪送獄死叛將傅選詣䖍州行宫乞降選自江西潰散即率衆入湖南為盗既厭所欲遂来降乙亥御舟至温州江心寺駐蹕更名龍翔日歴正月二十五日戊辰御舟次温州三十日癸酉奉聖㫖御舟二月一日進發徃州城外盖重叠差誤今從諸書繫此奉安啟聖宫祖宗神御於福州太中大夫盧益為資政殿學士權知三省樞密院事責授安逺軍節度副使吉州居住李回復端明殿學士權同知三省樞密院事回范宗尹所薦也熊克小歴益回之除在正月丙寅今從日歴繫此集英殿修撰都大提領水軍荆湖路㳂江措置使王羲叔落職放罷坐金人渡江不奏報也禮部尚書曽楙充顯謨閣直學士知洪州承信郎建昌軍兵馬監押蔡延世進三官為閤門祇候權主管本軍公事集英殿修撰知洪州王子獻坐失守知撫州王仲山坐迎降皆罷詔温州守臣盧知原治狀有聞除右文殿修撰知原法原弟也以供億無闕故擢之是日金人陷潭州敵既破江西諸郡乃移兵至湖南帥臣直龍圖閣向子諲初聞警報率軍民固守且禁士庶無得出城敵騎至潭呼令開門投拜軍民皆不從請以死守宗室成忠郎聿之𨽻東壁子諲巡城督察官吏顧謂聿之曰君宗室不可效此曹茍簡聿之感激流涕敵圍之八日既而登城四面縱火子諲率官吏奪南楚門亡去城遂陷聿之拔刃自殺城之始破也將官成忠郎劉玠率餘兵巷戰身中數十矢戰愈力賊又以槍中之衆欲扶持而去玠揮衆直前死于陣敦武郎新杭州兵馬都監王暕部民兵守朝宗門亦死聿之魏悼王後安定郡王按原本作郡公今依宋史改正叔東子也敵掠潭州六日屠其城而去子諲乃復入後贈玠武經大夫暕武徳郎聿之右監門衛將軍潭州之䧟日歴不載趙甡之遺史繫之正月甲子熊克小歴繫之去年十一月按今年四月癸巳五月癸丑湖南轉運司兩次所奏及紹興四年閏二月己酉王暕家乞恩澤狀並云敵騎二月二日打破州城故繫于此克又云敵騎縱掠四日而去轉運司所奏乃云敵騎初八日離潭州今從之丙子金人自明州引兵還臨安初敵既破明州遣人聽命於完顔宗弼且云搜山檢海已畢宗弼曰如揚州例敵遂焚其城惟東南角數佛寺與僻巷居民偶有存者城之始破也守者奔湊東南縋城而出或浮木渡江生死相半而奔逃村落者與賊遇由是遍州之境深山窮谷平時人蹟不到處皆為金人捜剔殺掠不可勝數敵留明州七十日引兵去以修職郎蔣安義知明州進武校尉張大任同知明州事王庭秀閱世錄云張鼐為通判而㑹要作大任今從之且授安義以兩浙轉運司印一紐辛巳金人去潭州癸未䖍州鄊兵首領陳新率衆數萬圍䖍州隆祐皇太后震恐赦其罪不聴權知三省樞密院滕康劉珏主管侍衛歩軍司公事楊惟忠皆坐視其亂而弗能禁先是惟忠之將胡友既叛去犯臨江軍統制官楊琪與戰不勝城遂陷至是友以其衆復犯䖍州與新戰于城下破之新乃去統制官張忠彦時在吉州聞難不顧既而康珏聞罷命乃以吏部侍郎髙衛權主管三省樞密院事衛論顯謨閣直學士曽楙撫諭功與其屬十餘人皆進秩後御史張延夀以為言復奪之追奪在九月乙巳甲申慈溪縣令林叔豹引鄊兵入明州執蔣安義奪其印金人十餘在開元寺皆病不能前者叔豹誅之安義四月戊戌行遣丙戌劉洪道言已復明州時洪道自台州還屯奉化縣其麾下精卒暴横市肆邑人蔣璉夜集數十人之岳林寺圍洪道將殺之縣丞百彦金勸洪道流其毆人之卒衆乃定洪道復入城劚民家窖藏之物併得四萬緡以獻州人怨之是日金人自臨安退兵熊克小歴在丁亥而趙甡之遺史在丙戍甡之載此事排日甚詳今從之初完顔宗弼留臨安聞浙西制置使韓世忠自江隂趨鎮江恐邀其後是月庚辰宗弼歛兵於吴山七寳山遂縱火三日夜烟熖不絶癸未火息甲申縱兵大掠且束裝丙戌退軍以擄掠輜重不可遵陸乃由蘇秀取塘岸路行先是武功大夫成州團練使陸漸迎降宗弼以為臨安府兵馬鈐轄漸勸宗弼括金銀焚臨安因從軍北去方金人之未退軍也有衢州軍事判官錢觀復者以衢當路衝白郡守縱民老弱出户留一丁不留與留而瘦弱不堪任論如軍法其後諸兵欲乗時為變顧城中金帛子女無冀獲乃止陸漸紹興二年六月戊戌行遣靈𨼆寺僧智訥有禪學宗弼初入杭軍士執之以至宗弼觧其縛置一榻上善事之比去飭十騎送還時李儔李鄴鄭億年皆在軍中宗弼因携之以北敵分兵侵海鹽縣尉朱良率射士百餘拒之卒力戰以死良吴縣人光祿卿公綽孫也丁亥金人陷京師時河之南北悉為敵有睢洛皆屯重兵惟京師及畿邑猶為國家固守而糧儲乏絶四面不通民多飢死有河北僉軍首領聶淵者與其徒十十五五以食物與守城者博易積乆稔熟遂不之疑是日淵與其徒數百人夜登城之北壁縱火焚樓櫓猶未敢下城乃為慢道自守是時城之東有羣盗李潰蘇大刀等權留守上官悟皆招入城既入城則焚掠不止城中亂悟及副留守趙倫出奔悟至唐州為董平所殺金人得京師以前都水使者王夔為留守時在京強壯不滿萬人自是四京皆陷没矣熊克小歴載京師之陷在今年三月又云城破上官悟為敵所害而徐夢莘㑹編所載甚詳今從之江東宣撫使劉光世奏杜充敗事未知存亡王􅊅所統前軍亦潰韓世忠徑上海船而去臣今以孤軍駐南康移檄諸路㑹兵勤王望陛下逺避賊鋒竢春暄破之不難詔光世所部軍不少今又㑹兵深慮騷動可止統本部乗間擊之毋失機㑹浙東防遏使傅崧卿在婺州聞敵去遣前軍統制添差通判衢州侯延慶以所部入越州敵之去越也以兩浙提㸃刑獄公事王翿權州事翿招義兵入城防守土豪仁和縣茶槽巡檢胡仁參以其衆入城因與安撫司主管文字宣教郎袁潭謀執翿殺之於是崧卿就除直龍圖閣知越州此事日歴全無首尾今以建炎四年六月十五日尚書省所奏及王翿家陳乞狀七月三日大理寺胡仁参等案款七月十一日臣僚上言乞體究王翿死事指揮八月九日樞宻院奏約束土豪事件九月十六日浙東安撫司體究狀及臣僚上言紹興元年三月二日兩浙轉運司體究狀参修傅崧卿除越州日歴不載但於今年三月一日書權知越州傅崧卿狀収到安撫司印乞改鑄而崧卿以六月八日改除婺州崧卿狀稱印以二月十七日得之十七日庚寅在此後四日故併附此胡仁参袁潭七月癸卯行遣己丑奉安景靈宫祖宗神御於温州開元寺時祭并官屬嵗費錢萬七千餘緡皆以上供錢給之仍命祠部郎官及内侍各一員典奉祠事紹興十三年八月丙戌神御還臨安庚寅上入温州駐蹕州治楊氏編年云四年正月金人至江浙駕自明州幸海江南淮南兩浙宣撫䖏置使統制御營軍馬趙鼎率諸帥敗敵於江浙加鼎扈從定難中興社稷功臣赦十死駕還越州按史鼎未嘗為此官當時亦無此事未知楊氏云何謬妄如此温州觀察使御前前軍統制王􅊅自閩中引餘兵還行在詔降授文州團練使辛卯金人陷秀州先是兩浙宣撫使周望在平江有言敵自越州還金陵者望素不嚴斥堠但以傳聞之語為信乃遣統制官陳思恭張俊此即小張俊也初見三年八月癸亥統兵入杭以規收復之功思恭至秀州偵知傳言之妄間道走湖州之烏墩鎮以觀變至是完顔宗弼過秀州通直郎權州事鄧根留武翼郎本州兵馬都監趙士醫乗城拒敵城陷士醫為流矢所中而死後贈武翼大夫官其二子此據紹興三年十二月二十五日士醫家乞贈官狀修入狀中云昨知州鄧奉議差充東壁守禦官按此時守臣程俱已遁鄧奉議乃根也今年六月壬辰正差望聞金師至崇徳縣壬辰調太湖舟千艘赴吴江禦之根邵武人也甲午尚書省言淮鹽道路不通商人皆自京師持引鈔至兩浙請鹽故温台州積下引鈔至多有至二三年者乞令行在𣙜貨務換給新鈔赴閩廣算請毎袋貼納通貨錢三千從之金人過吴江縣統制官巨師古不戰而潰更以太湖民舟為嚮導歸於西山直龍圗閣知蔡州程昌㝢以王命不通軍儲乏絶率軍民棄城南歸趙甡之遺史二月壬辰程昌㝢棄蔡州壬辰十九日也按日歴紹興元年三月二十四日辛卯蔡州奏今年二月二十一日前知本州程昌㝢將帶官兵入衛王室二十一日甲午也甡之小誤當以奏牘為正蔡州奏狀以建炎四年遣故云今年先是昌㝢恐金人退師乃言朝廷除張用知蔡州已被召命欲引還直秘閣京西轉運副使滕膺言用嘗攻圍陳蔡二州今令守城懼軍民含恨生事乞且留昌㝢道梗不報昌㝢乃以勤王為詞而去遂與膺偕行此以紹興六年五月十三日滕膺乞改正状修入但狀稱昌㝢於建炎三年正月内詐作被召離任恐小誤是日鼎州人鍾相作亂自稱楚王初金人去潭州羣盗乃大起東北流移之人相率渡江武經大夫濰州團練使孔彦舟自淮西收潰兵侵據荆南鼎澧諸郡秘閣修撰知荆南府唐慤棄城去相武陵人以左道惑衆自號天大聖言有神靈與天通能救人疾患隂語其徒則曰法分貴賤貧富非善法也我行法當等貴賤均貧富持此語以動小民故環數百里間小民無知者翕然從之備糧謁相謂之拜父如此者二十餘年相以故家貲鉅萬及湖湘盗起相與其徒結集為忠義民兵士大夫避亂者多依之相所居村有山曰天子崗遂即其處築壘浚濠以捍賊為名㑹孔彦舟入澧州相乗人情驚擾因托言拒彦舟以聚衆至是起兵鼎澧荆南之民響應相遂稱楚王改元天戰立妻伊氏為皇后子子昻為太子行移稱聖㫖補授用黄牒一方騷然時鼎州闕守臣而湖南提㸃刑獄公事王彦成單世卿皆挈家順流東下僅以身免賊遂焚官府城市寺觀及豪右之家凡官吏儒生僧道巫醫卜祝之流皆為所殺自是鼎州之武陵桃源辰陽沅江澧州之澧陽安鄊石門慈利荆南之枝江松滋公安石首潭州之益陽寧鄊湘隂江化陕州之宜都岳州之華容辰州之沅陵凡十九縣皆為盗區矣趙甡之遺史相起兵在此月庚寅而傅雱奏㨗狀云相以二月二十一日僣號甲午二十一日也或者庚寅之日起兵甲午之日僣號亦未可知今從奏狀附此乙未尚書右僕射同中書門下平章事兼江淮宣撫使杜充罷為觀文殿大學士提舉江州太平觀充自真州而北熊克小厯云充將還行在而道不通按趙甡之遺史向子忞約充同赴行在充不從出西門自天長軍北去然則非道不通也完顔宗弼遣人說充許以中原地封之如張邦昌故事充遂降敵知真州向子忞以聞上聞之不食者累日御史中丞趙鼎右諌議大夫富直柔同對請先罷充竢得其投降的報則别議罪故有是命朝奉郎提舉亳州明道宫邵溥再責汝州團練副使峡州安置丙申以上還温州徳音釋天下徒刑應士民家属有自金来歸者所在量給錢米於寺院安泊訪還其家以洪州三省樞宻院淹延刑禁自今奏讞並令赴行在徽猷閣直學士知慶陽府兼陕西制置使王似知成都府時宣撫處置使張浚聞上親征亟治兵自秦州入衛留参議軍事劉子羽掌留司事凡川陕軍政民事皆得専决又徙似知成都府而以親衛大夫明州觀察使趙哲代之徽猷閣直學士盧法原時守成都乃命法原赴行在熊克小歴建炎三年十一月張浚出行闗陕徙王似知成都府而以趙哲代之按成都知府題名似以四年二月二十三日除五月二十一日到法原以四年五月赴行在克書於去年十一月實甚誤矣然此時道路隔絶似以此時改命則五月上旬未必便到成都盖浚已奏于朝而又以便宜先遣之鎮也法原五月壬子除吏書盖其離成都之日今但云赴行在李成入舒州初淮西都巡檢使劉文舜聞成犯舒州率兵迎戰為所敗文舜率其衆走權知州事鄭嚴亦走入山中成遂入其城得修職郎李雱以為参議官兼軍正雱建炎初嘗為秘書省正字至是在舒州雱以王命不通敵留江浙妄生向背遂以成為一時之英雄投書於成請順流而過金陵號召江浙以觀天意成不從時淮西提㸃刑獄公事李著受代未行與州縣官百餘員皆為成所執其徒有執鄭嚴而至者成殺之是日敵游騎至平江城東統制官郭仲威兵未交而退同知樞密院事兩浙宣撫使周望奔太湖市人請留不可則極口嫚罵望不顧而去守臣徽猷閣直學士湯東野聞望已出則挈家潛遁以府印付仲威錢穆收復平江記二十三日守臣湯東野出奔周望以印付仲威按望為宣撫使若未行守臣不應先遁盖望先出奔而東野乃棄城也趙甡之遺史當得其實今從之丁酉仲威㑹諸將飲城上士民叩頭出血請加守禦之備仲威奮髯曰即發騎兵敵行破矣民謹無擾日欲晡金人大集於城下仲威與將官魯珏縱火城中夜望及仲威皆遁其下自城南轉刼居民北出齊門而去民之得出郭者多為所殺茶陵縣軍賊二千餘人犯郴州永興縣所擄鄊民皆面刺聚集興宋四字欲自連韶路徑趨䖍州廣南東路提㸃刑獄公事曽統恐其枝蔓以便宜遣監韶州永通監宣教郎宋履徃招之至是以聞戊戌宣教郎新荆湖南路提舉茶鹽公事秦梓守尚書金部貟外郎梓辭不至奉議郎章傑守祠部貟外郎傑惇孫也是日午漏未盡四刻完顔宗弼自盤門入平江駐兵府治擄掠金帛子女既盡乃縱火燔城煙焰見百餘里火五日乃滅敵之在湖南者是日亦渡江趨石首縣而去知岳州袁植聞敵且至棄城避之己亥鍾相遣兵犯桃源縣朝請郎知縣事錢景持率保甲出戰為所殺紹興五年二月辛卯贈景持二官與㤙澤一資庚子吕頥浩奏户部侍郎葉份言駕幸浙西湏早除發運使臣觀可任漕計極難得人間有之又素行不修上曰有徳者率淳直或不能辦事有才者多是小人如梁揚祖誠無學術使為發運使則有餘矣大扺小人不可在侍從之列若藉其才任於外亦何不可中興聖政臣留正等曰世不能無小人固也因其小人而遂絶之使不容于世可乎至治之世君子小人各安其分在易之泰其至治之時與君子道長而居於内小人道消而居於外是之謂各安其分且君子小人之别安在哉徳勝才謂之君子才勝徳謂之小人才有所用則豈在所絶哉使之居外則足以効其所長而不至於害吾之治此太上皇帝所以不棄揚祖也生乎斯時者尚安有不遇之歎辛丑鍾相陷澧州守臣朝奉大夫黄琮等十餘人皆為所殺迪功郎澧陽縣丞葉畬守西門戰死敵入城縱掠而去琮紹興五年贈兩官與一子恩澤畬當年四月己巳與恩澤一資琮家乞恩澤状稱妖賊吴么郎犯澧州而畬家陳乞乃云二月二十八日鍾相攻澧州西門疑吴么郎即相所遣也初保寧軍承宣使權主管侍衛歩軍司公事閭勍自西京携所部數千人至越州行在上以金人南侵命勍節制淮西等路軍馬徃據之勍行次崇徳縣聞敵已至臨安遂至平江招軍得數百人自江隂渡江入柴墟鎮是月至楚州與守臣右武大夫忠州刺史趙立計事勍因稱上命授立徐州觀察使兼淮南東路兵馬鈐轄將佐皆遷官二等仍書告以賜勍遂將所部徃泗州先是宿遷人趙瓊率衆據守水寨後降於金人有椘州進士國奉卿者以假成忠郎知淮隂縣見立之参謀官陳括趙甡之遺史作陳适今從王銍所撰趙立傳與語楚州事因為立謀以旗榜招瓊瓊聽命立大喜奉卿自言本儒士不能出戰恐誤使用乞換文資立使視學籍信然遂假奉卿宣教郎措置髙郵軍羣賊犯應山土居將仕郎連萬夫率邑人數千保山寨賊不能犯至是有㓂浪子者以兵至圍之三日卒破其寨賊知萬夫勇敢有謀欲留以為用萬夫怒厲聲罵賊為所害後守臣陳規言於朝贈右承務郎官其家一人規奏贈官在紹興二年十月辛亥按萬夫居徳安恐是南夫之弟當考金人自江西還過荆門軍劉超率衆避之建炎以來繫年要録巻三十一
