body:
  text: 建炎以來繫年要録巻一百五十二宋李心傳撰紹興十有四年秋七月庚戌朔上以皇太后微不豫諭宰執曰朕侍太后每一食减少不勝憂懼朕平日先意承志太后意之所嚮便竭力供應然太后聖明大事未嘗言及凡所須皆是小事易從者秦檜曰陛下聖孝如此天下之福御史中丞詹大方言太常博士凌哲劉嶸之罪謂哲居討論之職每每緘嘿無所可否此其首鼠兩端志有所待嶸挾迂僻之學好為異論不恤國事志在謀身詔二人並罷乃以嶸通判建昌軍哲吳縣人也按哲為禮官跨二年半嶸為禮官僅三年其所討論當考壬子詔責授建寜軍節度副使藤州安置李光俟牽復日特降三官坐前為江東大帥擅用上供錢帛也按此事紹興三年正月已行遣不知今日何以再施行也輔臣進呈上曰當治其初擅用之人若止於見任者責償則必取於民未為允當於是特免補還而光與饒信州守臣四人皆坐貶秩祕書省正字吴芾何逢原並罷殿中侍御史汪勃言芾與潘良能結為死黨變亂是非逢原因藍公佐之回揣見和議少變乃公肆異論求合流俗二人者不罷黜緩急之際必為國家之害乃以芾通判處州逢原通判池州良能去年九月丙子論罷癸丑上諭大臣曰京西襄陽一帶宜擇守臣庶不生事秦檜曰當依聖訓丁巳詔與國同姓者不得二名用宗正寺主簿詹棫之請棫濟州人也命有司改作祭器三年乃成戊午祕書少監㳺操等上表乞車駕幸祕書省許之敷文閣待制提舉江州太平觀施坰卒是日端明殿學士同簽書樞宻院事王倫為金人所殺倫留居河間者六年至是金人欲以為河間平灤三路都轉運使倫曰倫奉使而來非降也大宋之臣豈受大金爵禄耶金遣使來趣倫又不受金人杖其使俾縊殺之倫厚贐使人冠帶南向再拜慟哭乃就死於是河間地震雨雹三日不止人皆憐之庚申復置梅州辛酉陞蜀州為崇慶軍以上始封之地故也壬戌尚書禮部侍郎兼直學士院秦熺提舉祕書省掌求遺書時新省成少監㳺操援宣政故事請置提舉官故有是命仍鑄印賜之右奉議郎李觀民新知濠州入見上戒令毋招集流亡恐致生事仍命秦檜以此語之甲子詔修錢塘江岸以備潮漲上諭大臣如捍江卒數少許取之近郡仍令中秋前畢工乙丑追封柔福公主為和國長公主辛未詔諸州以御書孝經刋石賜見任官及係籍學生時已頒孝經于羣庠而殿中侍御史汪勃言陛下獨擅聖人之德上天昭監果定和議於衆論鼎沸之中極天下之至養望降明詔令募工摹刻使家至户曉以彰聖孝故有是命壬申直祕閣知揚州許中主管台州崇道觀從所請也直祕閣知盱眙軍向子固知揚州持服人沈該依前直祕閣知盱眙軍徽猷閣待制提舉亳州明道宫程俱卒甲戌左朝奉大夫龔寛降三官永不得與堂除差遣坐前至潮州日不依期限狥私曲法擅放編置人王文獻令自便故也文獻因進注司馬法免觧已見紹興十年十月不知後来縁何事編管先是責授清逺軍節度副使趙鼎在潮州文獻與鼎相見鼎歴問行朝事冝因諭寛稱文獻切直令縱其自便鼎復以錢米饋之時髙閌為禮部侍郎閌患近世禮學不明凶禮尤甚嘗著厚終禮鼎以書寓文獻逹閌求之至行都而閌已去坐他事下臨安獄守臣張叔獻鞫之案奏乃有是命寛建陽人也按今年九月詹大方劾趙鼎章疏稱文獻與龔寛已有行遣而日歴所載甚畧不知文獻如何行遣也丙子上幸祕書省太師尚書左僕射監修國史秦檜率百官及實録院官奉迎上即道山堂進膳已遂幸祕閣召羣臣觀晉唐書畵三代古器還御右文殿賜羣臣茗飲従官坐于堂上省官席于廡下賜游操五品服御書扇省官及史官皆遷官戊寅上曰祕府書籍尚少宜廣求訪檜曰陛下崇儒尚文是宜四方翕然向化李文㑹曰若非干戈偃息此事亦未易舉中興聖政臣留正等曰國初削平僣亂收諸國之書而三館之制猶仍五代簡陋太宗皇帝見之慨然曰是豈足以蓄天下圗書延四方之士耶遂親為規畫一新輪奐大書飛白焜燿榜題鑾輿臨觀以幸多士聖聖相繼有加無損文明之治跨越漢唐廊廟之材皆於是乎取之兹誠有國之先務而治化之本原也中遭難厄太上皇帝開中興之運首求遺書追祖宗之祕藏崇建三館還祖宗之舊觀親御榜題幸臨多士襲祖宗之盛典行幸之詔又曰士習於空文而不為有用之學爾其彊修術業益勵猷為一徳一心丕承我祖宗之大訓是又欲幸多士而作成之以收祖宗得人之盛也猗歟盛哉雖周宣復古何以尚兹是宜聖子永永萬年得以持循也歟左承議郎知雅州楊昭左承議郎簽書雅州判官㕔公事王咸久各降一官以符同作弊牒試舉人不當為轉運司所劾故也八月庚辰朔尚書比部貟外郎李檉行監察御史詔少傅判紹興府信安郡王孟忠厚特放罪初忠厚移守紹興甫視事㑹以郊赦加恩乃令所親左承議郎呉棫為表辭免其間有本無時才出為世用之語御史中丞詹大方論忠厚表詞輕侮意謂今日不足與有為詔令分晰忠厚皇恐上䟽自明乃有是命秦檜尋物色知棫所代由是廢斥以終此以王明清揮麈録脩入但明清又云忠厚奏以久棄筆硯實他人代作則不然忠厚䟽中元無此語今不取忠厚得㫖分晰在七月癸酉今併書之壬午直龍圗閣知鎮江府蔣璨罷以轉運司劾其擅以經費錢物收入公使故也先是上嘗言其避事至是罷之孫覿撰璨墓誌云知鎮江府當是時權貴人執爵禄之柄視苞苴豐儉為低昻公獨無所餉遂罷歸請祠得台州崇道觀凡四任宫祠十二年癸未右正言何若言陛下紹復基圗勵精政理機務必由於中書兵柄悉歸之樞筦典章一新威令再振而士夫䘮亷耻之節權要啓僥倖之塗處持橐之任而睥睨鈞衡有如洪皓無汗馬之勞而覬覦節鉞有如藍公佐兹風一扇浸滛不已則朝廷紀綱㡬何而不為其紊哉願陛下悉加裁抑一斷以義是乃所以保全之也從之甲申右正言何若為國子監發解所監試祕書少監游操等三人充考試官詳定一司𠡠令所刪定官駱庭芝等六人為㸃檢試巻官尚書刑部員外郎吳㮚試駕部貟外郎葉廷珪等二人為㸃檢試巻官監學降𠡠差試巻官自此始丙戍太師秦檜以幸祕書省畢率百官詣文徳殿拜表稱賀丁亥右承議郎万俟允中貸死配貴州坐從使金國日以禁物博厚利故允中卨従子也庚寅直顯謨閣兩浙轉運副使李椿年權尚書户部侍郎仍舊措置經界辛卯上謂大臣曰言者多乞選縣令蓋令非其人則為民害可令吏部長貳審察注擬或老病則更授他職庶得人而民受其惠後二日都省請申嚴近制因民事被罪及老病之人不得注守倅縣令從之户部尚書張澄引病以龍圗閣學士提舉江州太平觀敷文閣待制知臨安府張澄按兩張澄當有一誤陞直學士此似為王文獻獄事當考癸巳召尚書左司郎中林保國子司業宋之才入對以保權尚書吏部侍郎之才權禮部侍郎後二日以保為賀大金正旦使知閤門事康益副之之才為賀生辰使閤門宣賛舍人趙瓌副之左奉議郎蜀州州學教授李宏知合州自諸州學官除郡前是未有故著之是日上諭大臣曰言者多勸朕變法朕思祖宗舊法已善豈宜輕改秦檜曰遵先王之法而或過者未之有也上曰然丁酉吏部尚書羅汝檝為龍圗學士知嚴州以汝檝引親年有請也庚子上謂秦檜曰朕於晉書取王羲之傳凡誦五十餘過其與殷浩書及㑹稽王牋所謂自長江以外覊縻而已其論用兵誠有理也檜曰誠如聖訓士寅秦檜進呈直學士院楊愿秦熺所撰賀金主正旦及生辰國書上覧熺所撰再三稱善於是命用之癸夘殿中侍御史汪勃言陛下兼愛南北之民力定和議與天下更始崇儒重道同符祖宗臣愚以為今年科塲當國學初建萬方多士將拭目以觀取捨為之趨嚮欲望戒𠡠攸司茍專師孔孟而議論粹然一出於正者在所必取其或採摭專門曲説流入迂怪者在所必去甲辰進呈上曰勃論甚善曲學臆説誠害經㫖當抑之使不得作則人之心術自正矣可勃所奏乙巳言者論冦朱明未平請悉以賊舟所有物賞將士之立功者上謂大臣曰此良法也凡攻城以子女玉帛與立功之人其城必破如此朱明必就擒矣時歩軍司統制官張守忠以所部往管軍趙宻戒之曰海道與陸異窮之則日月相持非策之善要在拊定之既而簽書樞宻院事李文㑹又請張皇榜立重賞許其徒自相捕致未㡬明等遂降是月金國境内大風㧞木自河南北轉至山東而止九月按是月己酉朔庚戌禮部貟外郎陳鵬飛面對言凡有獻利害者乞加討論必合於祖宗之舊如已試無成必加黜責上謂大臣曰祖宗之法思慮已精審講究已詳備不必改作天下自治秦檜曰天下本無事宜遵成憲為善上曰小人喜更法往往謂朝廷無所建明不知本無事然法至於弊乃不得已而更之耳辛亥顯謨閣待制提舉亳州明道宫葛勝仲卒後謚文康甲寅右朝請大夫通判明州錢端禮直秘閣乙夘才人韓氏廢丁巳置皇后宅教授員己未上謂大臣曰近多有人進春秋解可令通經者詳之蓋春秋難解人各有説當取所長頒示學者秦檜曰解經不可執一説王安石要人從已説故為學者譏議蓋道猶海也隨所得之深淺不同耳上曰説雖不同必有所歸檜曰四瀆之廣同歸于海也庚申秦檜奏事因言數十年來止是臣下互爭勝負致治道紛紛今當平其勝負之端以復慶歴嘉祐之治乃國家福也上喜曰正與朕意合左奉議郎知安逺縣程敦厚令吏部差通判彭州以赦叙也敦厚嘗為是官以賛和議而驟進既忤秦檜去及是九年復除之辛酉詔分利州為東西兩路用端明殿學士四川宣撫副使鄭剛中請也時川口屯兵十萬人分𨽻三大將檢校少師鎭西軍節度使右䕶軍都統制階城西和鳳州經畧使吳璘屯興州檢校少保武當軍節度使利州路經畧安撫使兼知興元府宣撫司都統制楊政屯興元府檢校少保奉國軍節度使金房開逹州經畧安撫使兼知金州樞宻院都統制郭浩屯金州皆建帥府而統制官知成州王彦知階州姚仲知西和州程俊知鳳州楊從儀亦領沿邉安撫使剛中請以興元府利閬洋巴劒天安軍七郡為東路治興元府興階成西和文龍鳳七州為西路治興州即命政璘為安撫使浩為金房開逹州安撫使諸裨將領安撫使命者皆罷従之時和議方堅而璘獨嚴備日為敵至之虞故西路兵為天下㝡上覧剛中奏謂檜曰川陜地逺為將尤難得人如璘統兵有法肯為朝廷出死力諸將所不及也政故為璘兄玠裨將及分道建帥而執門下之禮益恭世頗賢之壬戍宰執奏大理寺詞訴事上曰皆官吏弛慢所致可委長吏親察之如非其人即與沙汰又獄吏但以諸州吏充逐事更替漏泄獄情非便宜令吏久於其職不可替也癸亥詔殿前司諸軍公事非與百姓相犯者令本司根勘依法施行時都指揮使楊存中請以臨安府軍人刼盗事移送大理寺其諸軍公事視此少卿朱斐轉對論非所以嚴理寺而重國體故復舊制御史中丞兼侍講詹大方進兼侍讀中書舍人兼權實録院修撰資善堂翊善叚拂兼侍講甲子詔守臣終更入見各舉所部縣令一員所舉稱職特與推賞不當謬舉之罰用軍器監趙子厚請也左武大夫欽州刺史浙東兵馬鈐轄王敏求勒停南劒州編管敏求岳飛親校也秦檜追論黄彦節事事見十二年以敏求為彦節計囑飛私求財物法寺鞫實乃有是命丁夘祕閣修撰提舉洪州玉隆觀曽慥知䖍州初責授昭化軍節度副使吴幵既以赦還内慚不敢歸寓家贛上秦檜憐之故命慥為守慥幵子壻已見建炎元年三月此以王明清揮麈録餘話増修辛未御史中丞詹大方奏責授清逺軍節度副使潮州安置趙鼎輔政累年不顧國事邪謀宻計深不可測與范仲軰咸懐異意以徼無妄之福用心如此不忠孰甚焉王文獻一狂士也鼎方在貶所尚啖之以利使之㳺説偶然敗露者獨文獻耳其詭計所施人所不知者又不知㡬十百人今文獻與守臣龔寛已有行遣而鼎為誅首置之不問則鼎與其黨轉相惑亂决無安靜之理非宗廟社稷之福也壬申秦檜進呈上曰可遷之逺地使其門生故吏知不復用庶無窺伺之謀於是移吉陽軍安置王文獻行遣已見七月甲戌癸酉詔臨安府根刷蔡攸家屬押赴元貶所取收管狀奏時攸之妻子漸至行都殿中侍御史汪勃論靖康之變由於京黼望令宻切搜索特加處分故有是㫖仍命京子孫二十三人永不量移如初詔乙亥叙郢州防禦使辛企宗為䕫州路兵馬鈐轄丙子祕書郎兼益王府教授兼國史院檢討官張闡罷時秦檜用事久每除臺諫必以其耳目知闡久次喜論事一日㣲諷闡謂當入臺闡曰丞相茍見知老死祕書足矣檜黙然先是闡嘗為席益辟客檜初罷相益嘗有力故深憾之殿中侍御史汪勃因劾闡往時託跡益門朝廷置而不問而乃罔有悛心愈為不靖每以為用之不盡憤然見於言色由是罷去後二日檜進呈因曰近世學者多言春秋乃不知孔子作經本意漢書云盛則周召相其治致刑措衰則五霸扶其弱與共守周召糾合戮力以夾輔周室即桓文之勤王是也使桓文不僣亦與周召何異孔子作經本意為尊周而已上曰春秋盖為諸侯僣天子學者得其綱領方達聖經之㫖若泛然無所主徒誦其文何益哉冬十月按是月戊寅朔己卯太常寺主簿張晟罷晟山隂人始以久次遷博士而言者論晟昨諂附吕頥浩今當朝廷清明之時儻居博士議論之官竊恐挾邪懐異有害治道乃以晟通判信州庚辰詔昌化萬安吉陽依舊為軍置守臣還屬縣少保判紹興府信安郡王孟忠厚罷為醴泉觀使忠厚既放罷尋亦引閑自是不復除郡矣乙酉皇太后謁家廟己丑直徽猷閣江南東路轉運副使黄敦書罷坐令體究信州發洪事久不報應也庚寅皇叔光州觀察使士術卒贈開府儀同三司追封永國公辛夘詔贈皇太后故兄韋宗閔崇慶軍節度使餘親屬遷官者十有九人兄弟之女封夫人者七人以欵謁家廟推恩也龍圗閣待制知洪州李迨復直學士壬辰直敷文閣知廬州鮑琚落職放罷以言者論琚頃奉使湖北而還盛言軍實可以檢括及委以事任迄無能為㡬至生事故也後三日以直祕閣主管台州崇道觀王安道知廬州癸丑左朝散郎新知筠州髙閌致仕従所請也此似因王文獻獄辭連及之故當考甲午右正言何若言自趙鼎唱為伊川之學髙閌之徒從而和之乃有横渠正䝉書聖𫝊十論大率務為好竒立異而流入於乖僻之域頃縁閌為國子司業學者争投所好於是曲學遂行雖然凡試於有司者未有不志於得也伏望申戒内外師儒之官有為乖僻之論者悉顯黜之如此則専門曲學不攻自破矣輔臣進呈上曰若所論甚當程頥當哲廟之初在經筵奏曰陛下記得臣説否如記得明日可對臣説過是時宣仁聖烈皇后聞之大怒曰皇帝雖年少然宫中不自廢學措大家不識事體如此勒停人万俟止送桂陽監編管以殿中侍御史汪勃言止輙至行朝恐别生事故也乙未昭慶軍節度使開府儀同三司萬夀觀使平樂郡王韋淵為少師戊戍有司奏大朝㑹舊有地衣上曰祖宗時往往河東所獻因而用之今從儉約勿用可也己亥御筆除永道郴州桂楊監茶陵縣民丁身錢絹米麥自馬氏據湖南四州始増丁賦至是左奉議郎羅長源知永州還以為請上謂大臣曰天德好生今民為身丁錢至子不舉誠可閔也若更循馬氏舊法非所以上當天意湖南安撫使劉昉奏武岡軍猺人父子相讎殺今欲出兵助其父令還省地上以問宰執秦檜曰欲令與鄂州都統制田師中同處之不得輕舉生事上曰善恩威不可偏廢可懐則示恩不可懐則示威若侵省地俾知所畏可也庚子詔州縣文臣初至官詣學祗謁先聖乃許視事亦用左奉議郎羅長源請也長源言士大夫皆學夫子之道以從政而不知所自望令先詣學宫以彰風化之本後遂著為令長源又言朝廷通好息民興崇學校多士潜心經史而終嵗未有升進之望乞以諸州進士解額留七分以備科舉餘三分歸於學校稍取大觀三舍之法參酌而増損之務從簡便事下禮部長源所奏以丙午行出今併附此遂以長源知鄂州甲辰左奉議郎焦惟正知復州代還言陛下頃嘗詔内外臣僚薦士或不如所舉罪當并案者必罰無赦然竊觀行下賞功罰罪於犯贓之官皆云所有舉官見行取㑹未聞奉行詔㫖欲乞日後鞫正犯贓明甚者於上項詔書倣皇朝舊制於所舉官量坐謬舉之罪如事發日量逺近立限許令舉官申陳免罪止坐罰俸詔吏刑部措置令可必行乙巳秦檜奏太后生辰事無巨細並經聖意士大夫鮮能聖孝如此上曰事母之道不敢少有不至四川宣撫副使鄭剛中言今邉事寕息除軍政不可待報者且從便宜指揮外其有格法事並收還省部吏刑部請除文武臣僚磨勘封贈酬賞叙復章服奏薦及諸州應奏讞獄案外令本司照前後指揮施行從之熊克小歴於此月末書工部尚書莫將知福州按將罷尚書已久此月甲辰自知明州依所乞提舉太平觀十二月戊子除知福州克實甚誤也十有一月戊申朔御史中丞兼侍讀詹大方試工部尚書詔諸路監師帥守奏辟及定差縣令並精加銓量非曽縁民事被罪及老病之人用吏部請也己酉樞宻院檢詳諸房文字王循友轉對乞戒飭北使所過州縣供帳共億務令豐潔小有不備令監司按劾以期仰體國家睦鄰敦好之意從之庚戌龍圗閣學士知紹興府張澄與敷文閣直學士知臨安府張叔獻兩易癸丑給事中兼侍講兼直學士院楊愿試御史中丞權尚書工部侍郎李若谷試給事中御史臺檢法官巫伋守監察御史伋李文㑹所辟也吏部貟外郎嚴抑面對乞春秋三傳釋經處許出題以取士上謂大臣曰為人君為人臣皆不可不知春秋往者建言之臣欲罷讀春秋盖不思之甚矣如不可讀則聖人不修此經也抑又言渡江之初禮出綿蕝當時所撰祝文多述艱虞未備之語今時事既寧望令祕書省改撰皆從之三傳許出題在十二月辛巳降㫖丙辰哲宗婉儀慕容氏為賢妃妃昭慈后閣中人也頗有賢徳舊與皇太后善至是娱侍慈寜宫制曰藻鍳精明獨前知於聖母蘭心芳潔今娱侍於東朝後八年薨薨在二十二年九月壬辰右承議郎知桂陽監呉鐸乞以諸郡所賜御書孝經周官等别賜閣名上曰若别立名則諸郡縁此興造必致擾人姑從舊可也戊午中書舍人兼權實録院修撰兼侍講段拂權直學士院司封郎中李澗面對言今朝廷清明邉鄙靖謐望明詔有司講求祖宗故事躬行籍田之禮從之甲子上即宫中閲試殿前馬歩諸軍將士藝精者錫賚有差自是嵗以冬月行之號内教乙丑觀文殿大學士提舉臨安府洞霄宫朱勝非薨勝非與秦檜有隙奉祠八年寓居湖州僧舍及薨贈三官為特進後謚忠靖按故事曽任宰相贈七官而侍從贈官有至開府者勝非贈三官非例也疑秦檜抑之辛未少保感徳軍節度使萬夀觀使高世則薨贈太傅世則持身亷退居永嘉積俸二萬緡不復取以帥府舊恩賜田三十頃辭不受後謚忠節按公師已上止贈一官世則以少傅致仕贈三官非例也壬申秦檜請以軍器監趙子厚兼權吏部侍郎檜言今日宗室不可不崇奨令聚於朝上曰宗室中之賢者如嘗中科第及不生是非之人可收置行在如寺監祕書省皆可以處之祖宗以來不用宗室作宰相其慮甚逺可用至侍從而止檜又奏乞依舊置宗學教育宗子上可之御史中丞兼侍講楊愿言治道之要在總核名實名實未辨則人材學術難得其真此國家治亂之所繇分也數十年來士風澆浮議論蜂起多飾虗名不䘏國計沮講和之議者意在避出疆之行騰用兵之説者止欲收流俗之譽甚者私伊川元祐之説以為就利避害之計慢公死黨實繁有徒今四方少事民思息肩惟飾詐趨利之徒尚狃於乖譎悖偽之習窺揺國論詿誤後生此風不革臣所甚憂也願下臣章揭示廟堂俾中外洗心自新以復祖宗之盛従之癸酉御史中丞楊愿言建寜軍節度副使藤州安置李光負傾險之資挾緃横之辨諂附蔡京竊位省郎人倫墮壊亷耻不聞方時用兵迎合干進及修鄰好陽為應和以得執政聞藍公佐之歸則又狂悖為必去之計去國之日出險語以激將臣之怒聞軍之興鼓愚俗以幸非常之變人臣如此國何賴焉比年以來猶令子弟親戚往來呉越教人上書必欲動揺國論而後已若非明正其罪恐海内之患有不勝言先是知藤州周某者誘光倡和其間言及秦檜和議有諷刺者積得數篇宻獻于檜檜怒令言者論之此以趙甡之遺史修入乃移光瓊州安置甲戌户部貟外郎李朝正言今嵗浙右間有水災而江西湖南粒米狼戾望嚴遏糴之禁上曰所論甚當如有遏糴州縣可許鄰郡越訴仍責監司按劾是月黄龍府之北大雪色如血赤至春暮方消十有二月丁丑朔右朝請郎潼川府路轉運判官宋蒼舒獻嘉禾一莖九穗者二上曰凡赤烏白雉之類止可一觀而已不足為瑞惟五榖豐稔乃上瑞耳既而秦檜言蒼舒職事修舉乃遷一官蒼舒昌元人也蒼舒轉官在是月辛丑尚書禮部貟外郎兼崇政殿説書資善堂賛讀陳鵬飛罷鵬飛嘗妄議慈寧尚典禮事見十五年七月御史中丞楊愿劾鵬飛山野小夫妄自標置乃黜之戊寅秦檜進呈司封郎中李澗轉對乞褒擢縣令等事大畧謂今知縣再任六考乃陞通判而丞與諸司屬官初無吏責反以四考關陞故人皆有所擇而不願就又因民事得罪之人雖㣲罪亦終身廢棄故皆有所懼而不願就望詔有司凡京官應理親民者並通及六考方得關陞而應縁民事之人自徒以上乃取㫖庶㡬循良之吏爭任百里之寄上曰法令不可輕改檜曰但崇奨賢令則人自激勸上曰縣令有清亷愛民者令監司每路各舉數人其老耄不任事者並令按劾縣令得人則民實受惠矣己夘詔臨安府及諸郡復置漏澤園以户部貟外郎吳縣邉知白轉對有請也庚辰集英殿修撰新知明州秦棣入見詔遷敷文閣待制遣行棣乞戒守土之臣毋好竒以生事上諭大臣曰郡守之職惟以奉法宣化為急正不當生事也右通直郎上官世美知郴州還言郴道桂陽前此軍興居民率衆保險創立山寨私置甲兵駱科平殄未盡屏除今年豐盗息望明詔守令訓諭土豪如能罷山寨者量加旌勸納甲兵者優給價直其有日前罪犯一切原貸示以不疑詔帥臣劉昉措置辛巳給事中李若谷兼資善堂翊善壬午金部貟外郎宋貺轉對言國家嵗用至廣兩稅之外仰給於鹺茗者為多今商賈入納於官及其請鹽於煮海之塲則待次之期常逺買茶於摘山之户則流轉之限常廹萬一法令或有少變則夲已折闕尚何子利之可冀乎此所以商賈猶懐疑貳而入納之利未廣也欲望申嚴指揮遵守見行條令毋得妄有申陳庶㡬行旅通流邦儲豐衍從之丁亥觀文殿學士左大中大夫知福州葉夢得特遷一官提舉臨安府洞霄宫從所請也戊子雪百官入賀上諭宰執曰天下窮民宜加飬濟孟子所謂文王發政施仁先斯四者於是詔諸路常平官以時散米務令實惠及民大理少卿朱斐與外任既而殿中侍御史汪勃論斐近輪對奏疏指大理寺為詔獄不知其職乃罷之斐奏劄論殿前司公事送大理寺非是已見九月癸亥奏内乃無詔獄字必是别有章第不知所論何事當考尋坐其家僕受賕又貶二秩武崗軍猺人成忠郎楊進京等獻黄金朱砂白絹己丑左朝奉郎知資州楊朴獻禮部韻括遺詔遷一官朴資陽人也乙未皇叔和州防禦使知西外宗正事士慷為福州觀察使以訓導宗子率循規矩試于有司合格者衆故遷之丁酉端明殿學士簽書樞宻院事李文㑹罷御史中丞楊愿殿中試御史汪勃右正言何若共劾文㑹憸邪害政自登言路毎論一人必遣家僕宻送于門外曰此出上意及為御史又與王文獻締交俾㳺説于外私飬臺吏伺臺中章疏梟心虺志無所不為陛下講修鄰好之時儻使姦險小人尚在政地獸窮則搏必致為國生事此固有當繫於聖慮者疏六上詔文㑹落職依前左朝奉郎提舉江州太平觀愿等反攻之詔文㑹筠州居住自秦檜再居相位每薦執政必選世無名譽柔佞易制者不使預事備貟書姓名而已百官不敢謁執政州縣亦不敢通書問如孫近樓炤万俟卨范同程克俊及文㑹等不一年或半年必以罪罷尚疑復用多使居千里外州軍且使人伺察之此並㩀林泉野記夲語修入執吕中大事記自孫近叅政而政特備貟書姓名而已百官不敢謁政府州郡不敢通書問若韓肖胄以至施鉅鄭仲熊二十一人皆不一年或半年誣以罪罷之而政府之權在檜矣庚子御史中丞兼侍講楊愿充端明殿學士簽書樞宻院事辛丑詔愿兼權參知政事壬寅詔自今北使在庭嘗借官奉使者並權立借官班自是遂為故事祕閣修撰主管佑神觀周襟遷敷文閣待制襟燕人也癸夘金國賀正旦使金吾衛上將軍殿前右副都㸃檢布薩温安逺大將軍充東上閤門使髙慶先見于紫宸殿右正言何若論士大夫不恤國事專為身謀議論朝綱思出其位此兆亂之階不可不慮乞揭示朝堂使洗心滌慮以承休徳詔以若試右諌議大夫殿中侍御史汪勃試侍御史丙午祕閣修撰兩浙轉運副使王鈇權尚書户部侍郎鈇與秦檜有連故驟用之權尚書户部侍郎李椿年以憂去官拱衛大夫文州刺史劉光輔勒停坐强買民女為婢致其縊死也是嵗右宣教郎直祕閣主管佑神觀朱弁卒于行在秦檜惡洪皓故弁亦不得遷踰年卒紹興五年與恩澤一資融州觀察使行營右䕶軍選鋒統制知洋州節制巴蓬洋州屯駐軍馬王俊卒俊行軍紀律嚴明退者必誅軍中號為王開山言其所向無前也然性强犯上吳玠亦畏其反復而喜其勇常厚遇之宗室子賜名授官者十有六人諸路斷大辟二十有六人建炎以來繫年要録巻一百五十二建炎以來繫年要録巻一百五十二金人地名考證布薩原書作孛散誤今改正
