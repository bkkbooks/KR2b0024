body:
  text: 建炎以來繫年要錄巻一百九十九宋李心傳撰紹興三十有二年夏四月丁夘朔四川宣撫使呉璘得本司副將兼知徳順軍張舜忠報金人七千餘騎至九龍泉距原州十五里設兩寨於南原一寨於城西時原州受圍五日矣敵勢益壮民人糧畜俘掠殆盡叚彦鞏詮屢來吿急都統制姚仲亦言金人更益兵㓂原州今鎮戎之城周九里三十步先因地震樓櫓頺盡城亦中圯雖曩時分遣步軍一千馬軍五千而城大不足以衞其後秦弼勒回摧沙寨弓箭手而弓矢器甲皆闕已令張舜忠遣步軍五百増戍又盧仕閔領元留徳順兵五百人徃援原州己巳詔防秋不逺事貴預備足食足兵宜有長策可令臺諫侍從各以己見條具陳奏殿中侍御史呉芾言大農之財一歲所入㡬五千萬而内藏激賞不與焉㑹其多寡比景徳全盛時十増其四地不足而賦加多則取於民者已盡不可以復求矣惟當痛節冗費蓋今天下之兵内外何翅三十萬太祖太宗削平諸國盡取其數亦不過此况大農每歲飬兵之費㡬十之九若更加募何以贍之今欲兵之足莫如核實不得令虛張人數揀其驍銳汰其疲弱使人皆可用則官無費財是一舉而兩得之也時将士陣亡者衆軍多虛籍故芾言及之芾所奏不得其月日或可移附此月丙申改除户侍之後禮部侍郎黄中言足食之計在於量入為出今天下財賦半入内帑有司莫能計其虛盈請悉以歸左藏且引唐楊炎吿徳宗語曰陛下仁聖豈不能如徳宗之為哉上善之庚午言者奏右朝奉大夫新知信陽軍陳良弼踈庸右朝奉大夫新知黄州馮榮叔貪鄙右朝請郎新知江州曽愭𤨏懦詔並罷敦武郎鄂州駐劄御前軍第九將李恂兼知信陽軍言者論諸軍效用舊無陞進格法昨降指揮三歲與轉一官至承信郎止然而國朝八資之制自守闕進義副尉以上自有磨勘年限凡二十二年而後入品今三歲而轉一資又有挽强之賞八資可坐而致矣近制効用挽弓一石每歲一試八箭中垜與轉兩資則是三歲而可獲六資矣其轉資之格望特詔有司講求至當别與定制詔兵部看詳本部言欲將轉至守闕進義副尉之人更不理到軍三年賞八箭以上轉兩資顯是僥冒欲乞六箭上垜轉一資十箭以上轉兩資若别行拍試者依尅敵弓例每次増加一斗力至一石五斗止從之建王女永嘉郡主卒乾道二年追封嘉國公主詔以醫官李師堯等属吏王奏臣女幼多疾患若加罪醫人臣之愚分尤不遑安欲望寛恩特與踈放疏再上從之是日徳順㨗奏至辛未詔淮南新復州軍舉人許於近便州軍一處併試每終場十三人解一人中興聖政上宣諭宰臣陳康伯等曰卿等曽詢訪今歲民間蠶麥何如向雖多雨二麥稍黄今已登場而價不聞翔踴朕以令外市繭以知其直二者約度雖小有傷而成熟亦不减七分矣則臣留正等曰君人者飬人者也食則憂天下之飢衣憂天下之寒書稱文王卑服即康功田功則田功云者知小民稼穡之艱難不遑暇逸以就天下飬民之功云爾此文王之所以造周也太上皇帝當蠶麥既成廼潜遣市於外因物之貴賤以察知歲之豐儉唯慮天下之民不得其所飬如是則雖處九重之深而民之利病何患乎不知憂勤之心文王無以過之中興之業蓋有所本矣武功大夫吉州刺史權知閤門事孟思恭落階官為文州刺史以嘗再使北廷也左朝散郎知常州葉顒依所乞主管台州崇道觀壬申詔御營宿衛使司統制將佐使臣軍兵等四萬三百五十二人各轉一官資出戍暴露者轉兩官資用太傅御營宿衞使和義郡王楊存中奏也時存中還行在乃罷存中措置兩淮而以觀文殿大學士判建康府張浚兼之浚出入將相三十年素為士卒所畏愛至是復總軍政皆樂為用是日北使髙忠建等出境癸酉左宣教郎史正志為司農寺丞殿中侍御史呉芾言向來歲遣聘使多以有用之財博易無用之物大率先行貨賂厚結北使方得與北商為市潜行遁跡常虞彰露間遭捃摭復以賄免不惟有累陛下清儉之徳亦所以啓敵人輕侮之心歴年於此習以為常臣下雖知莫敢輕議今再通和好尚慮將命之臣或仍前例有傷國體為害非細詔使副嚴切覺察如使副博易回日令臺諫彈劾詔左朝奉大夫知江隂軍楊師中與右奉議郎知髙郵軍吕令問兩易蠲淮東殘破州軍上供銀絹米麥經總制錢一年初蒙城縣人倪震等率丁口數千渡淮來歸居花靨鎮糧乏不能自存頗出怨語御營宿衞使楊存中言淮西有歸正人甚多既闕糧食日虞回歸復興誹謗之言反使人人解體望出淮西總領所錢糧付知夀春府郭振以賙給之從之是日四川宣撫司令右軍統制盧仕閔領山外四將山裏四將兵及冀演所領部落趣程盡徃守徳順之東山寨甲戌宰執進呈次因論淮上屯田事上曰士大夫言此者甚衆然須有定論用諸民乎用諸軍乎若論既定當先為治城壘廬舎使老少有所歸蓄積有所藏然後可為陳康伯曰今西北歸正人願就耕者甚衆已降牛種本錢趙子潚所納抽解木植亦分送兩淮治屯田人廬舎矣上曰甚善上又曰卿等用人當收慤實為上若好名沽激如畵餅然終不可食耳已而權兵部侍郎陳俊卿自淮東還乞募民耕荒田蠲其徭役及七年租稅從之俊卿陳請在五月甲辰權吏部侍郎凌景夏言臣聞定而不易者謂之法法不能盡者存乎人國家設銓選以聽羣吏之治其掌於七司著在令甲則所守者法也疑似之間可與可奪悉得以例施行則所任者人也然所謂法猶可按籍而視所謂例則散在案牘之中匿於胥吏之手而長貳有遷改郎曹有替移來者不可以復知去者不能以盡告索例而不獲雖有彊明健决之才不復敢議引例而不當雖有至公盡理之事不復可伸臣嘗觀漢之公府則有辭訟比以類相從尚書則有决事比以省請讞之弊比之為言猶今之例云爾臣愚以謂今吏部七司亦宜許置例册凡換給之期限戰功之定處去失之保任書填之審實奏薦之限隔酬賞之用否有定參照凡曽經申請或堂白或取上㫖者每一事已命郎官以次畫時擬定而長貳書之於册永以為例每半年則上於尚書省用印給下仍關御史臺而詳焉部胥失舉坐以責罰事之可為例者不得遺例之所不載者不得言也如是則前後與決悉在有司之目開巻盡知猾吏無所肆巧貨賂不得而通姦弊由之而息庻㡬銓敘平允實天下士大夫之幸詔吏部措置申省左正言劉度言恭覩紹興二十九年六月詔書禁約苞苴結交權要掊克卒伍以濟請託之私近聞道路之言成閔入朝侍從卿監郎官閤門内侍皆有饋賂受授之間公然抵冒此例一開若不重行禁約他日將帥入朝必爭治苞苴以相誇尚而掛虛名削廩給必更滋蔓以充其求不得可禁矣况成閔此歸若有功而欲賞則逺近觀聽必曰以饋賂而獲遷也若有罪而欲貸則逺近觀聽必曰以饋賂而獲免也不惟堕紊邦制玷累士風而成閔所以為身謀者亦甚踈矣欲望申嚴戒飭掲榜朝堂今後羣臣輙受苞苴令御史臺彈劾重置典憲斷在必行毋為文具從之趙甡之遺史云言者論成閔苞苴交結詔榜朝堂已而收去左朝奉大夫提舉江南東路常平茶鹽公事洪适行尚書户部員外郎總領淮東財賦軍馬錢糧适乃代徐康康五月甲寅致仕總所建治京口名雖淮東而所總多江東浙西財賦适常奏乞以浙西江東入銜勿復增薦舉添官屬庻名正事順可以辦集不從親衞大夫和州防禦使賈和仲添差江南東路馬步軍副總管建康駐劄修武郎閤門宣賛舎人權通判唐州胡彬為武翼郎職依舊彬唐州土豪聚衆復其州京西制置使呉拱持授至是加命四川宣撫使兼陜西河東路招討使呉璘言收復秦洮路招到正兵弓箭手萬人乞支給器甲自休兵有㫖令成都潼川遂寧府嘉卭資渠州七作院日造甲興元府閬成州大安軍僊人關六作院日造神臂弓馬甲披氊至是二十年器械山積逮軍事將興今工部侍郎許尹時為總領官又乞令成都潼川府䕫州路憲曹二司取禁軍闕額係省錢益除戎器於是諸庫所管甲至二萬副有竒其餘稱此及璘有請遂命總領所以甲萬副予之是日呉璘命姚仲即日趣程之徳順統制官盧仕閔姚志並聽節制如得機便即進兵克復涇渭等州仲言所領兵少欲就興元洋州把守兵内分遣一千為助璘從之於是仲以河池兵千四百九十有九秦州兵五千五百四十通所將兵為九千三十有九並詣徳順餘兵留屯甘谷摧沙鎮戎軍時原州受圍已乆應兵寡弱敵兵益置大砲十有四所更用鵝車洞子擁廹城下矢石亂發軍民死守傷没甚衆勢將不支守將段彦鞏詮吿於知鎮戎軍秦弼又言原州鎮戎唇齒相依原州失守鎮戎必孤弼聞宣撫司乃就令弼盡領四將兵部落子詣州應援叚彦報興格率渭州兵圍原州増至七萬餘衆盧仕閔謂涇渭距徳順鎮戎地逺而原州勢急聞於姚仲乞分遣所統制前馬歩軍一千七百有四援原州仲乃令右軍統制李在分遣治平寨屯兵五百人徃援之仕閔以原州急止分遣其兵寨於東山及渭州道三岔口榆林堡堡距州五十里以為應援且宻遣壮士馳報城中俾知外援以堅其守丁丑安徳軍節度使龍神衞四廂都指揮使提舉佑神觀張子蓋為鎮江府駐劄御前諸軍都統制子蓋之除實代成閔日歴不載除日但於此月戊寅書子蓋内殿引見已繫都統制銜趙甡之遺史在此日是日川陜宣諭使虞允文檄四川總領所近奉聖㫖川陜諸軍因糧減省米斛許本司移文總領所用之新募軍兵効用并四川宣撫司開具到新復州縣見在糧斛共三十五萬九千八百九十一石應副軍馬支用契勘係對數減省總領所合應副贍軍糧斛數目今請依所降聖㫖將前項減省糧斛紐算糴本水脚錢數今項樁管聽候當司取撥支遺具已樁錢數回報時允文在河池宣撫使呉璘嘗為言三路因糧於敵不仰蜀中漕運允文即取索拘收到糧米數目璘不知其故具以報之允文遂有對撥糴本之議戊寅御史中丞汪澈參知政事澈宣諭荆襄還既見遂有是命己夘右朝散郎劉薳提舉荆湖北路常平茶鹽公事右通直郎吕大器知黄州右承議郎留觀徳知復州辛巳武翼郎閤門宣贊舍人孫儔知鄧州見任武翼大夫鄭雄别與差遣儔鄧州忠義人初見去年十一月甲戌詔以内鄉淅川兩縣𨽻均州事定日如舊右武大夫忠州團練使新江南西路馬歩軍副總管輔逵為殿前司前軍統制用趙宻請也是日總領四川財賦王之望得虞允文檄論對撥糴本事之望以其須索漸廣乃為書遺宰執言舊宣撫司所管右䕶軍共八萬五千四百餘人見今所管御前諸軍計九萬五千六百餘人比舊已多一萬二百餘人又當時有田晟一軍五千七百餘人在蜀後來兵徃東南本所依舊管認衣糧計一百二十餘萬引兵雖減而費不減於見今九萬五千六百人外更飬此五千七百餘人後來節次蒙截留只得八十四萬餘道本所見飬之軍比舊經常歲計正破衣糧軍計多一萬五千九百人以前用兵舊宣撫司除贍軍歲入外更有激賞降賜稱提營田四庫錢物僅一千餘萬緡専充犒賞又有未減放民間科敷錢引及截留供取撥茶馬諸司應干錢物斛斗該稅不盡窠名不以有無拘礙並許拘收通融應副仍以便宜行事賦外窠取又節次添印錢引一千四百萬道及兩次凖朝廷降到度牒一萬一千四百一十四道方粗了辦自休兵後來更無宣撫司四庫錢物又節次裕民減放過錢引一千九十餘萬道又無拘截朝廷物運又不得諸司錢物又不泛濫増印錢引其所降度牒比前數少又發賣未盡可見今日事體與前時用兵大段不同之望為東南調度至廣不忍數干叩朝廷而民力凋弊詔㫖每務寛恤亦不敢輙有科敷只是悉心盡瘁多方擘畫如去歲贍軍糴本増二三百萬引近日理㑹出限田契錢可得二百餘萬引前此於階成西和鳳州就糴糧料并諸處坐倉比搬運之費省得百十萬引如此之類錙銖積累以充用度傳聞過當便謂豐盈添支者並無給降減省者别有樁管小小増入指為寛剰創新支破不問有無如此則總領一司豈復可為假令見今總所果能經畫致有贏餘亦合候邊事寧息具數申禀朝廷以聽取撥不應供饋方急逐事拘刷使之窘束更無以凖備緩急官吏横身抗拒諸將節省得見存財賦及其辛苦措置纖毫之入反供他邑别用而本所依舊任闕乏之責盡心之吏豈不解體若本所自用兵來依承舊例不行撙節多耗錢物結將帥之人情及用度不足横斂百姓以伐四川根本朝廷何以加罪至其急闕未免更行應副豈復有樁留以待他用者之望移書允文乞㑹問宣撫司如果有上件減省到錢則見今本所庫中所有自可遣官拘占不必問本所之可否允文不從自川陜軍興朝廷給官告截上供出度牒總為錢六百餘萬緡度牒五十道計二萬緡官吿錢二百五十萬緡上供錢五十萬緡之望又督責諸州所起贍軍錢物比遞歲増四百萬緡田契錢亦四百萬緡二項皆約比時所入之數至之望替時又増一百二十八萬九千餘緡雖所入未齊而大數可見矣之望嘗為允文所薦及議軍儲二人始有隙壬午詔履正大夫安徳軍承宣使御前前軍統制兼知洋州傅忠信令再任癸未詔右奉議郎知江州林珦特令終任珦引年得祠而代者曽愭被劾故復留焉親衞大夫降授邕州觀察使監汀州在城商稅陳思恭致仕思恭故閹人以老病自請也甲申殿中侍御史呉芾言軍器監陳洪持禄茍容駕部員外郎趙廱假手登第不當居天下之清選上曰武臣子孫只宜為武官清望須還白屋今以將家居之則公議自然藉藉乃罷廱以芾權尚書户部侍郎熊克小歴全不載事祖今從日歴修入右承務郎京畿淮北招討司幹辦公事兼權淮西措置招集屯田劉藴古成忠郎王珍李雲王展韓彦承信郎蕭通並見於内殿尚書度支員外郎楊倓移吏部乙酉詔京西招討司具前後立功將士及邊面立功之人姓名以聞時言者論荆襄之師自去秋屯於襄陽列據漢水以拒劉萼露宿野處相持二月初有樊城之戰繼有茨湖之戰暨萼之奔也則有汝州之戰淮蔡之受圍也則屢有城下之戰偏師援蔡也則有確山之戰皆以少擊衆北騎大潰詢之故老前後用師亦未有如此之連㨗者儻不旌别何以示勸故有是㫖是役也招討使呉璘多補親舊之未曽經行陣者反令統制官王宣保明焉此以趙成京西戰功錄修入太府寺丞陳彌作為福建路轉運判官彌作侯官人也今年三月己亥方中嚴監司廻避户貫之禁不知何以旋有此除當考武功大夫東南第二將向琪為宿亳州潁昌夀春府兵馬鈐轄夀春府駐劄詔中大夫已下因推勘按劾放罷而非賍罪及私罪徒者雖未得宫觀聽以致仕恩降等䕃補用吏部侍郎兼權尚書凌景夏請也是日川陜宣諭使虞允文自河池還至西縣總領財賦王之望自興元復㑹之之望還利州允文還興元府戊子起居舎人充大金國賀登寳位使洪邁等辭行國書曰審膺駿命光宅丕圖徳合天人慶均遐邇比因還使常露悃悰粤從海上之盟獲講鄰封之信中更多故頗紊始圖事有權宜姑為父兄而貶損釁無端隙靡逃天地之鑒臨既邊境之一開致誓言之遂絶敢期後聘許締新歡載惟陵寢之山川寖隔春秋之祭祀志豈忘於纉舊孝實切於奉先願畫舊疆寵還敝國結兄弟無窮之好垂子孫可乆之謀庻令南北之民永息干戈之苦儻垂睿照曲徇懇祈願竚佳音别修要約履兹夏序善保聖躬秘書省著作郎兼權倉部郎官張震守殿中侍御史初上擢起居郎吕廣問為侍御史而廣問自言與陳康伯連姻力辭乃改用震敷文閣待制提舉江州太平興國宫楊偰知舒州武畧郎西南蕃都大廵檢使判孺為武經大夫忠州刺史判孺長寧軍管下蕃官也用瀘南安撫司奏而命之詔諸軍招到蕃人女真等日給錢三百文捉到人給一百文先是主管馬軍司公事成閔言捉到番人内有堪充馬軍披帶之人乞依武勇効用例支破請給而權户部侍郎呉芾言今諸軍招到人日止給百錢米二升有半若將捉到人請給増倍顯是輕重不倫故有是㫖權户部侍郎呉芾言塑製顯仁皇后神御其三省禮工房樞密院機速房禮户工部太常寺等處諸色人但以經由行遣為名添支食錢委是太濫詔日下住支己丑蘄州防禦使知閤門事幹辦皇城司劉允升為福州觀察使果州團練使知閤門事幹辦皇城司張掄為均州防禦使皆以配填班直推恩也辛夘左朝奉大夫主管台州崇道觀鍾世明勒停人前右朝奉郎莫濛並為淮南路轉運判官資政殿學士提舉臨安府洞霄宫魏良臣薨謚敏肅壬辰起居郎吕廣問權尚書禮部侍郎翌日上謂大臣曰廣問老成不沽激往時薦之者多因曰朕有一人材簿每臨朝臣下有薦揚人材者退朝則記姓名於簿遇有選用披而尋之無不適當陳康伯等又論備邊當擇良將上曰偏禆中有驍勇卿等可以所聞見隨其髙下具名以聞俟於諸軍汰去怯懦次第代之癸巳左正言劉度試軍器監度言恭覩慶歴四年八月詔曰除諫官毋得用輔臣所薦之人臣昨自館職除察官初因汪澈薦引今澈既參大政而臣尚陪諫省有違慶歴詔書實難安職乞改除外任差遣故有是命集英殿修撰知泉州李僴陞敷文閣待制提舉江州太平興國宫從所請也司農少卿朱夏卿論軍中冒請之弊乞令諸路大軍每遇招收到人先具名報總領所每旬委總領官同都統制就本所或教塲同共刺填軍號其効用即對衆審實從之是日總領四川財賦王之望得隨軍轉運判官趙不愚報陜西新復州軍各有元舊屯駐官兵按月支請糧料及調發軍馬前去徳順軍經過批支并僻逺城寨難就食亦有復經金人殘破城寨毁壞糧料兼無未曽取見實數不見得堪與不堪陳新斛斗的實數目惟徳順軍得小麥粟共四萬五千餘石並各陳次已借貸與裏外人户不愚又遺之望書云因糧事宣相初無它止因尚書公問及遂言此數繼而尚書公取索不免具數納劄子呈知不謂與疏所打算蓋恢復之初雖據諸處申到有許多實數元不曽覈實交盤兼其間陳次不堪支遣者甚多又有僻逺處支遣不到者又有得而復失者皆未見的確難以報應此一段事出於偶然元無適莫切幸融諒於是之望以其事報允文及申朝廷言假令宣撫司實有上件新復州縣米三十五萬餘石亦合先從運司覈實移文本所用就支新募軍兵効用口食有餘即合歸本所應副諸軍食用便是要還價直亦須俟食過若干計數還錢今來宣諭司不問已食未食盡據所有要紐算糴本水脚錢數令項樁管聽候取撥合計錢引三百九十餘萬道即是將陕西所得使用不到及陳腐不堪賤米却取本所貴價又不供新募軍兵効用支費别要取撥以與元初指揮不同則所得米斛非徒於本所無益反為大害幸而宣撫報元未曽取實數不見得已支見在堪與不堪宣諭司已灼見虛實不行前牒切恐將來收復陜西實有拘到糧斛不下數百萬石皆要本所紐計價直另項樁錢則須用數千萬雖竭本所所有亦不能足萬一臨時别有樁撥或朝廷支用本所難以違拒於本所經常歲計及軍興調度大叚有妨伏乞檢㑹元初申畫特賜照應施行朝廷以為然乃於所樁内撥二十萬引賜呉璘為激犒錢仍備之望所陳送允文照㑹乙未中亮大夫鄂州駐劄御前左軍副統制王宣權知襄陽府將帶所部軍馬權就本府屯駐親衞大夫鼎州觀察使鄂州駐劄御前左軍統制權知襄陽府郝晸令依舊歸軍右朝請郎知盱眙軍周淙直秘閣再任直秘閣知房州司馬倬知徳安府右朝請郎張松知郢州見任人伏深邢舜舉並罷起復宣州觀察使殿前司䕶聖軍統制王琪帶御器械左朝奉大夫提舉江州太平興國宫周方崇復集英殿修撰致仕丙申興元都統制姚仲聞原州圍急乃令統制官姚志李在量留兵屯徳順盡以精兵同所自將常從兵以是日發徳順徃援原州是月大雨淮水溢數百里漂溺廬舎人畜死者甚衆初金國為契丹耶律鄂哈所擾有衆數萬漸逼居庸闗金主襃大懼召同知保州赫舎哩志寧為右翼統軍以討之襃與其下謀以謂鄂哈兵勢如此若南宋乘虛襲我國其危哉設有所求當割河以南與之既而鄂哈之衆内叛金國得鄂哈而戮之裂其體於燕京汴京及長安三處契丹之患既息其割地歸本朝之意亦寢矣此據宋翌金亮本末及范成大攬轡錄參修五月戊戌右朝奉大夫知大宗正丞孟充為尚書工部郎中太府寺丞朱商卿為金部員外郎秘書丞劉儀鳳守禮部員外郎右朝散大夫新提舉淮南東路常平茶鹽公事呉巘入辭乞兩淮殘破處知縣京官終任者與陞擢選人減舉主員又乞倚閣下户見欠官私債負詔吏户部㸔詳申省巘又言淮民復業之初稅賦既免鬬訟亦稀乞量差保正長以寛民力從之是日四川宣撫使呉璘自河池徃鳳翔視師都統制姚仲遣統領官趙詮引馬軍七百至開邊寨克之獲其知寨成茂已而金人千餘自原州來求戰詮賈衆力戰北兵敗走金二百餘騎又駐開邊寨河灘右軍統制盧仕閔戰退之追擊至九龍泉仲令統制姚公輔同統領張詔趙詮領兵七百赴原州又令統制姚公興駐原州北嶺與金人合戰奪其隘口守將叚彦知大軍將至勢少壮金人是日攻城亦稍緩己亥總領四川財賦王之望乞根括民户嫁資及遺囑田合納契稅錢應副贍軍支用從之按白契事行之已乆今又有此申明恐與宣諭司異論故也今年十二月戊寅白劄子所云可參考庚子監察御史陳良祐守尚書司封員外郎亦以汪澈所薦有請也秘書省正字兼國史院編修官周必大守監察御史壬寅翊衞大夫利州觀察使權主管鎮江府屯駐軍馬劉銳添差兩浙西路馬歩軍副總管平江府駐劄從所請也是日興元都統制姚仲以大軍至原州之北嶺與金人合戰官軍大敗前一日仲未至開邊寨之十里將以次日由九龍泉上北嶺令諸軍弓弩盡滿引行前輜重隊居後平旦遇敵萬餘求戰仲以統制官盧仕閔所領馬歩軍及陜西兵合為頭陣次以己所統部軍六千四百十有八為四陣隨勢便利分列之又以統制官姚志所部兵為後拒列於隘西官軍盡力鏖擊陣面開合凡數十敵兵每一衝陣率三千餘衆迭為進退命輜重隊隨陣亂行不整第一第二陣方交鋒而第三第四已為金敵破拒馬而入陣心衝潰輜重中隔莫可應接第五陣乃仲牙兵死鬬最乆自辰至未人馬死亡枕籍滿道軍遂大潰志陣居第六已踰兩隘行前者還報諸陣盡為敵兵所敗志謂其徒曰前軍既敗我輩進亦死退亦死等死耳進猶可生也遂悉其軍各務死戰未㡬金人馬軍直前衝擊志令左軍第四正將張傳傳令槍手盡坐神臂弓先發平射弓次之起伏凡五敵兵引退約二百歩志遂趣陣踰七八里敵乃歸南山原當時詢求姚仲不得頃之有報仲已至開邊寨志遂令將官楊立領神臂弓甲兵各五隊據九龍泉大川路以備敵邀擊是役也武顯大夫興州前軍同統制鄭師㢘與統領官七將官三十隊將七十有三並死於陣隊兵以下不與焉仲既至開邊寨猶諱言五陣之敗惟推姚志為竒功以㨗報宣撫司統制官姚公輔聞仲遇敵乃引兵次原州城為策應遇敵與戰至午各退保於故壘時呉璘在軍前方遺仲書問原州敵勢曰喀齊喀貝勒次鳳翔堅守不出勢不易取雖原州圍未解可且赴徳順書未至而仲已敗矣癸夘言者論大理寺推獄多取賄賂凡以罪赴寺者率縛之暗室以木為拳或用藤杖擊之必厭所欲而後已貧者至鬻妻子以為賄賂詔刑部長貳覺察許越訴甲辰宰執奏近探報皆言黄河南北蝗蟲為災今已數年天意可見而江淮之間蠶麥大稔此實聖徳所召上愀然曰去歲完顔亮興師無名彼曲我直豈無天理朕徳不足以動天祖宗仁澤所致今幸蠶麥吿登更望有秋設或邊事未息必可枝梧太府寺主簿魏杞行太府寺丞右奉議郎吕搢為太府寺主簿是日太府卿總領四川財賦王之望再乞在外宫觀不許之望又遺大臣書言近縁宣諭司令本所樁管呉璘所得敵人米斛價錢别聽支用本所㑹問宣撫司悉無實數與呉璘㡬生間隙幸而相照有素所以無事渠於朝廷所撥二十萬引激犒錢只敢受其一半蓋知初無此一項錢物也此一事三司紛紛累旬而卒無一錢却二十日内只宣撫一事取撥過錢物㡬一百五十萬引以此知前此新疆所得之望一切不問而隨取隨予渠亦不肯過當蓋暗相乗除於其間人情周旋於國事亦濟誠策之得也又遺葉義問書言蜀中人材如茶馬王弗老成更練精力未衰總計之任自當次補知潼川趙沂廉介孤立意不在私憂國愛民深曉財賦有先儒循吏之風又嘗從軍亦能調䕶將帥見今職事亦可陞擢虞尚書乆在川蜀乍自東南還不深知近來事體而其人踈通果決鋭於立功凡有所聞推行奏請惟恐不及而於虛實之際未暇審詳竊意朝廷皆以為然一一施用或别致抵牾兵戎財賦事關安危不可不審也乙巳詔今舉禮部奏名進士依祖宗故事更不臨軒策試監察御史袁孚守右正言左朝請大夫知通州陳漢為兩浙路轉運判官左朝散大夫知荆門軍姚岳為京西路轉運判官左朝散郎知鄂州章服提舉兩浙西路常平茶鹽公事右朝散郎京西路轉運判官姚邵直秘閣知鄂州丙午秘書省正字芮曄兼國史編修官丁未右諫議大夫梁仲敏充敷文閣待制提舉江州太平興國宫從所請也左宣教郎龔茂良為秘書省正字茂良莆田人以薦對而有是命殿中侍御史張震入對言古之觀天下者不觀其勢而觀其人之志志强天下之勢雖弱必强况今東傅海西抵秦北拒淮南極閩廣脅荆襄跨江漢而負全蜀不可謂弱特在乎所以用之者何如耳願陛下體乾之健自强不息講内治之䇿急内修之政振威權整法度拔英俊奨忠直退姦佞擇將帥核軍實充國計謹名器信號令治戰守日夜摩厲以充其志持之以決而後舉天下惟所欲為無不可者惟陛下留神省察戊申太傅寜逺軍節度使御營宿衞使和義郡王楊存中復為醴陵觀使御營宿衞使限五日結局右武大夫和州防禦使入内内侍省押班林肇為入内内侍省副都知肇尋以解帶恩陞領福州觀察使肇轉遥察在是月壬子武顯大夫鼎州團練使帶御器械幹辦皇城司徐伸為入内内侍省押班提㸃皇城司伸尋以解帶恩陞和州防禦使伸為遥防在是月癸亥己酉總領四川財賦王之望得宣諭使虞允文書論買馬招兵及呉璘姚仲出師事之望答書畧曰適領使檄買馬以百運為限亦得中數乞罷招兵尤為至論南北通使和議必成亦須一再往返移書宣威且議休息生靈之幸師老銳挫若遇大敵豈不可憂此乃安危所係用度不足言也姚帥年來數竒不可委以要地更宜與宣威議之因糧事不敢必只得不至過當足矣先是之望聞璘再出散關移書曰頃聞此行士卒銳氣不及前時果否方此大暑師旅征行百姓轉餉皆是危事自非萬全豈可輕舉若果未可動且宜待時雖聞於朝廷可也書未逹仲已敗璘亦無功而還辛亥右奉議郎鄂州都統司主管機宜文字向汋知房州是日鎮江都統制張子蓋與金人遇於石湫堰敗之先是敵以數萬衆圍海州詔子蓋率兵往援仍聽張浚節制浚受命即為書抵子蓋勉以功名令出騎乘敵敝子蓋至京口整軍渡江亟趨漣水擇便道以進前一日至石湫堰敵萬騎陳於河東子蓋曰彼衆我寡利在速戰不可令敵知吾虚實於是率精銳數千騎馳馬先入諸將皆進復州防禦使王友直以所部力戰御營宿衞前軍統制張玘為流矢中其腦没於陣士卒死鬭敵遂大敗擁入河溺死㡬半餘騎遁去壬子奉安顯仁皇后神御於景靈宫先一日上齋於内殿及自射殿步導至麗正門外奉辭詔武功大夫閤門宣賛舎人統制忠義軍馬兼知海州魏勝歴時暴露忠義可嘉可除山東忠義軍都統制兼知州事給真俸癸丑呉璘聞姚仲之敗乃逮繫左軍第四正將張傳下吏以鞫之始得其實遂追請仲赴軍前議事翌日又令統制官姚公輔趙詮守原州聴候中軍統制呉挺節制不得自為摘發若擅離所守地稍失枝梧並處斬甲寅詔呉氏可復封才人日歴不書此據㑹要呉氏以紹興二十八年七月廢皇叔眉州防禦使權知濮安懿王園令士程為宣州觀察使以積閥遷也詔葉義問汪澈昨往江上督視軍馬撫勞將士一行官吏等第並特轉兩官資第二等轉一官資更減二年磨勘第三等轉一官資礙止法人依條回授選人改合入官遣内侍以金匣茶賜呉璘權户部侍郎呉芾入對上因論財賦在得人遂言川陜用兵朕全得一王之望之力大軍十餘萬衆數月與金角敵而蜀人不知他人安能辦此之望在蜀㡬如蕭何之在關中芾曰之望與臣有連其人為政尚嚴平日在蜀令行禁止故於財賦亦不督而辦上曰朕初不知與卿有連見大臣言之望婚嫁未畢亦欲令歸但蜀中不可無之望姑令在彼候事稍定朕當大用之卿發書宜道此意降授右朝奉大夫徐宗説卒乙夘帶御器械趙廓幹辦皇城司専切提舉訓練所忠州團練使知順昌軍孟昭率部曲來歸居固始縣詔以昭為光州兵馬鈐轄其徒皆授田居之是日呉璘趣姚仲詣軍前其原州敗兵並詣河池夏人百餘騎㓂秃頭嶺掠牛馬又以五十騎駐於鎮戎最髙嶺射傷軍民宣撫司令知鎮戎軍奉弼遣官説諭夏國沿邊兵馬司各守舊疆毋得侵犯丁巳天申節罷上夀先是權禮部侍郎黄中乞依元豐八年例宰臣率百官拜表稱賀上不許起居舍人充大金國賀登寳位使洪邁等出境金人遣工部侍郎龎顯忠接伴顯忠契丹人其父為常勝軍校母耶律氏美梁國王宗弼納之而殺其夫後封王妃是日海州圍解張浚以去歲淮上奏功例不以實有功者擯不錄而庖人廐卒悉沾濫賞使士卒無以勸欲革其弊及是論功乃命統制官下至旗頭押隊公共保明期以三日有冒濫者重罪之於是復州防禦使王友直以功特遷滁州觀察使時朝廷聞敵退有㫖犒解圍軍兵而鎮江府前軍之右軍與太平州之武鋒軍以在圍中獨不預總領淮東財賦洪适從權比附且倍其賞适又奏沿邊已招降人若使之飢寒失所則必怨望如蕭札巴一家踰二十口劵錢最多日不過六千餘錢尚不給用則其餘可知乞將有官人與給料歴進勇副尉與依武勇給劵四口或五口以上亦與添給口食人謂适知變戊午欽宗小祥上詣几筵殿行禮百官進名奉慰己未親衞大夫果州團練使御營宿衞前軍統制張玘贈容州觀察使與恩澤九資即其地立廟以海州戰死也辛酉入内供奉官鄺詢賜號白雲處士名守寧詢建炎中馳騎至天長軍詗北人因得肺氣病至是自請也壬戌詔視師江上扈從一行官吏軍兵諸色人等並轉一官資令檢正檢詳審量實有職事之人依此施行不得泛濫先為議者所格上以緩急之際休戚所同復有是㫖徽猷閣直學士知平江府洪遵復為翰林院學士熊克小歴遵自龍學除蓋誤定江軍承宣使改添差江南東路馬步軍副總管張振乞依正官例支破全分請給許之權户部侍郎呉芾執奏上以振采石有勞詔特依已得指揮餘毋得援例右朝請郎荆湖北路轉運判官兼京西招討使司隨軍轉運判官吕擢直秘閣賞勞也直秘閣韓璡知和州右朝奉大夫新改知髙郵軍楊師中主管台州崇道觀從所請也權兵部侍郎陳俊卿使淮東還入見上言軍事尚嚴故兵人逃叛在法當誅今乃一切寛縱不加窮治轉相招納使人人臨敵逗撓不進又遁逃而無罪其誰肯為國家出戰者願戒飭諸将毋得互相招納以堕軍政而長亂階其有保姦納亡重置之罪然後申嚴出軍逃叛之法斷在必行庻㡬此風稍革從之癸亥上謂大臣曰自去年完顔侵擾之後中原士民不忘祖宗之徳歸正者不絶朕恐士大夫分南北彼此浸失招徠之意卿等可審處如有官能辦事者與沿邊差遣士人從便入學及令應舉其餘隨宜收恤如此則非惟已來者得安未來者聞之必欣慕而至於是陳康伯等次第行之崇信軍節度使開府儀同三司領殿前都指揮使職事趙密充萬夀觀使密乞解兵柄故有是命仍詔請給人從紹興三十年四月七日已降指揮給事中金安節中書舎人唐文若劉珙等言前此指揮係密主管步軍司職事日陳乞今既除觀使只合依觀使體例難以統兵官禄格支破近田師中屢曽陳乞真俸臣等並行繳奏訖今來趙密請給望依見任觀使條法支破所有差撥使臣効用軍兵等乞照田師中所得人數施行從之保信軍節度使領閤門事提舉皇城司鄭藻為太尉舒州團練使潘清卿為容州觀察使用呉國長公主請也觀文殿大學士判建康府張浚言軍籍日益凋寡補集將士必資西北之人能戰忍苦方為可仗臣體訪得東北今歲蝗蟲大作米價湧貴中原之人極艱於食欲乞朝廷多撥米斛或錢物付臣措置招徠吾人人心既歸北勢自屈詔以米萬石予之浚以為淮楚之人自古可用乘其困擾之後當收以為兵乃奏曰兩淮之人素稱强力而淮北義兵尤為忠勁困於敵毒亦已甚矣讐敵欲報之心蓋未嘗一日忘也特部分未嚴器械不備雖有赤心不能成事自强敵恣為殘虐十室九空皇皇夾淮各無所歸臣恐一旦姦夫鼓率千百為羣别致生事可慮因其嫉憤無聊之心而招集之欲置御前萬弩營募民壮年十八已上四十五以下堪充弩手之人並不刺臂面以御前効用為名各給文帖書鄉貫居住之處及顔貎年甲姓名令五人結一保兩保為一甲十甲為一隊遞相保委有功同賞有罪同罰於建康府置營寨安泊詔皆從請浚即下令曰兩淮比年累被荼毒父子兄弟夫婦殺傷虜掠不能相保今議為必守之計復耻雪怨人心所同有願充者宜相率應募至於淮北乆被塗炭素懷忠義欲報國恩亦當來歸共建勲業於是兩淮之人欣然願就率皆强勇可用浚親訓撫之又奏差陳敏為統制敏起微賤聲迹未振浚擢於困廢中敏感激盡力圖報未㡬成軍按陳敏元係左武大夫興州刺史侍衛馬軍司破敵軍統制不知此時為何官也方召募之初浮言鼔動欲敗成績數月間來應者不絶衆論始定浚謂敵長於騎我長於步制騎莫如弩衞弩莫如車乃令専制弩治車又謂三國以後自北歸南未有不由清河渦口兩道以舟運糧蓋淮北廣衍糧舟不出於淮則懼清野無所得有坐困之勢於是東屯盱眙楚泗以扼渦潁大兵進臨聲勢連接人心畢歸精兵可集即奏言之又多募福建海船由海窺東萊由清泗窺淮陽有㫖下福建選募浚累奏終非一日事朱熹所作行狀皆於浚未赴召以前書之則必在此月也日歴全不載㑹要止載賜浚米萬石在此月二十七日癸亥故且並附本日俟考是日權工部侍郎許尹還入見甲子内降詔曰朕以不徳躬履艱難荷天地祖宗垂裕之休獲安大位三十有六年憂勞萬幾宵旰靡怠屬時多故未能雍容釋負退養夀康今邊鄙粗寧可遂如意皇子瑗毓徳允成神器有託朕心庻㡬焉可立為皇太子仍改名眘所司擇日備禮册命其宫室官屬儀物制度等疾速討論典故以聞慶逺軍節度使龍神衞四廂都指揮使主管侍衞馬軍司公事成閔為太尉主管殿前司公事寧國軍節度使龍神衞四廂都指揮使建康府駐劄御前諸軍都統制淮南西路制置使京畿河北西路淮北夀亳州招討使李顯忠為太尉主管侍衞馬軍司公事入内内侍省押班李綽主管徃來國信所是月四川宣撫使呉璘攻熙州㧞之熙州之破不見本月日蜀口用兵録亦全不載按王之望文集此月二十九日與呉璘書已稱姚師之敗熙河之㨗故且附月末更湏考獲其都總管劉嗣初三大將之出也興州路得秦隴環原熙河蘭㑹洮州積石鎮戎徳順軍凡十二郡金州路得商虢陕華州凡四郡獨此以重兵扼鳯翔故散關之兵未得進建炎以來繫年要錄巻一百九十九建炎以來繫年要録巻一百九十九金人地名考證興格原書作杏果誤改見巻一百九十八鄂哈原書作窩斡誤改見巻一百九十二赫舍哩原書作紇石烈誤改見巻一百六十四喀齊喀原書作合喜誤改見巻一百三十八貝勒原書作孛堇誤改見巻一札巴原書作鷓巴誤改見巻一百九十四
