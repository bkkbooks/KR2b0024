body:
  text: 建炎以来繫年要録巻一百五十五宋李心傳撰紹興十有六年嵗次丙寅六金熈宗亶皇統年春正月按是月辛未朔戊寅上謂大臣曰將来籍田降詔須語簡意足使人曉然知敦本之意漢文帝勸農之詔頻年有之不過數十語當時民知務農遂至富庶是日大理少卿張柄面對朱熹撰張浚行狀云有張柄者甞奏請秦檜乗金根車其死黨也按檜此時為耕籍使去年十一月癸夘禮寺嘗乞耕籍使乘金根車閏月甲午又奏止乘馬柄非禮官不知何以與聞之或者禮官已改議不乘車而柄復請之也柄面對劄子全不見行下當考戊子觀文殿學士左通議大夫提舉臨安府洞霄宫葉夢得告老特拜崇慶軍節度使致仕夢得除節鉞不降麻非舊典也盖中書失之舊例納節不降麻夢得自文階改除當降制也詔太學外舍生以千人為額己丑德慶軍節度使開府儀同三司提舉皇城司錢愐薨贈少師賜其家銀帛各五百匹兩上將臨奠之其家辭而止辛卯致齋於内殿壬辰上親饗先農於東郊牲用少牢配以后稷退詣思文殿進膳畢易通天冠絳紗袍詣親耕位宫架樂作上親耕九推乃止遂登觀耕壇命宰執使相侍從两省臺諫行五推九推之禮庶人終千畝焉癸巳太師秦檜以親耕禮成乞宣付史館甲午檜又奏陛下耕藉過三推之數少勞聖躬上曰朕本欲終畝以卿屢奏乃止簽書樞宻院事李若谷曰父老觀陛下躬耕極感恱上曰耕籍為農民之勸朕豈憚勞乙未檜率百官詣文德殿拜表稱賀丙申中書舍人兼實録院脩撰兼侍講權直學士院叚拂守給事中秘書少監游操權尚書禮部侍郎秘書省正字王曮為禮部員外郎右䕶軍統制知西和州程俊應詔條上便民事言本州並邉多沃壤而耕鑿或無其人疲瘵之民無力復業望令有司量行給借牛犂糧種許於六料償還從之戊戌端明殿學士右宣奉大夫知臨安府張澄為慶逺軍節度使以修皇城及籍田辦治故也尋詔澄佩魚施狨坐立班上殿並如舊是月癸丑降㫖二月按是月庚子朔辛丑保康軍承宣使提舉佑神觀韓公裔提舉洪州玉隆觀在外州軍任便居住初玉牒所修書而元帥府事多放佚者端明殿學士楊愿時兼修玉牒秦檜奏令愿質之公裔公裔上康邸内知客也檜欲賞公裔摘使来請㑹有詔除公裔承宣使檜疑其舍已而有求於上右諫議大夫汪勃乃劾公裔頃嘗與愿交通今愿既去公裔嘗懐怏怏出入公卿之門隂有窺伺若不罷去恐無安静之理故有是命此以日歴及熊克小歴參修但克稱史館修日歴愿時為史官云云則恐非也按愿自起居舍人以至執政並兼修玉牒惟紹興十年嘗為秘書丞數月而丞不與史事其所謂交通必在侍從執政之時也今畧修潤書之壬寅詔諸路淫祠非在祀典者並令日下毁去以左司郎中李檉面對有請也癸卯内降詔曰朕惟兵興以来田畝多荒不憚卑躬與民休息今疆場罷警流徙復業朕親耕藉田以先黎庶三推復進勞賜耆老嘉與世俗躋於富厚昔漢文帝頻年下詔首推農事之本至於上下給足減免田租光於史冊朕心庶幾焉咨爾中外當體至懐詔叚拂所草也甲辰降授從義郎范寧之除名建州編管坐前為四川宣撫司屬官犯贓抵法故謫之辛亥上謂大臣曰聞王權在建康教閱依時仍不擾民諸將頗畏服良可嘉也既而權言已揀退軍中老弱上曰所汰人須令招填恐暗消兵數也權申揀退軍兵在是月癸亥尚書左司郎中李檉罷右諫議大夫汪勃言檉嘗出入王安中之門燕山之役頻冐優賞今和議既諧乃使異意者攘臂其間緩急恐不可信乃以檉知信州癸丑詔太師秦檜合蓋家廟令臨安府應副務要如法先是檜上䟽乞令禮官討論家廟及三代墳域制度禮部太常寺以晋唐及本朝故事紹興式令奏下臨安建康府照㑹是月乙夘行下故有是㫖廟在私第中門之東一堂五室嵗以孟月柔日享之端明殿學士知宣州秦梓移知湖州未上卒於建康辛酉除資政殿大學士致仕恩數視參知政事特増七官為左光禄大夫官給𦵏事壬戌右司員外郎李朝正面對論土居士大夫于擾州縣為令者不能曲法順從或遭捃拾望自今按發訴訟非寔係貪墨殘酷之人宜加闊略上曰縣令之職本欲撫育百姓乃掊歛以待過徃科率以奉權貴害及一方殊失設官為民之意宜令有司措畫以聞癸亥詔臨安府旬具城内外有無已得差遣人申尚書省從右諫議大夫汪勃請也甲子殿前司乞起復李邦光充正將上曰從軍起復一時權宜然不能無弊若元在本軍則可或在外請嘱宜禁止之尋詔自今規求起復之人重行黜責令御史臺覺察彈奏三月庚子降㫖丙寅尚書户部侍郎王鈇充敷文閣直學士知湖州以鈇引疾有請也右司員外郎李朝正權户部侍郎措置經界三月庚午朔詔有司建武學先是士人上書者多以為言上數諭大臣以文武之道不可偏廢祖宗自有故事至是乃考卜焉上諭大臣在正月己丑二月乙卯今併書之壬申詔未置提舉官以前縣州借兊常平錢物令本司度量年月逺近申取朝㫖随其多寡立限撥還自今毋得借兊違者不以赦降去官原減癸酉以和王女樂平縣主出適命大宗正司主之王上季弟也靖康皇族數云故和王女嫁杜遵道男安石今已到行在主加封在辛夘今併書之丁丑眉州進士侯鳯上書論綱馬利害上謂大臣曰鳯所陳雖未足取然朕固知其敝未有以處每以綱至所損甚多皆縁部綱人作過卿等宜措置革之戊寅左宣教郎鄭邦哲進左氏韻類詔特遷一官左武大夫建州觀察使帶御器械王安道兼幹辦御前忠佐軍頭引見司卒王澤盗用軍錢亡命入北境妄言本朝機事金械之還是日斬於市壬午復桂陽監臨武洞為縣從本路諸司請也庚寅江西安撫使李迨乞留統兵官李通所部駐建昌軍上曰諸處有盗賊旋来請兵未為良䇿須帥臣豫有方略乃善可下諸路措置行之辛夘經筵講孟子徹章翌日賜宰執講讀脩注官燕于皇城司初復故事也詔禮器局造太師秦檜家廟祭器先是禮官援五禮新儀奏用常器常饌而給事中兼直學士院叚拂乞依政和六年已行舊制給賜臣僚祭器乃采用焉拂奏請在是月丁丑其後韋淵呉益楊存中皆賜祭器盖自檜始左武大夫忠州防禦使楊可輔卒癸巳户部侍郎李朝正言諸路提刑拘催諸州經總制錢有賞無罰事属僥冒乞立減展磨勘年格法從之刑部郎中許棣面對乞罷酒稅塲務日比詔户部措置乙未増建太廟時新祭器將成而太廟殿室狹至不能陳列給事中叚拂請正殿從西増六間通舊為十三間其中十有一間為十一室東西二間為夾室又作西神門册寳殿祭器庫明州觀察使辛永宗降授鳯州團練使永宗為秦檜所惡言者請移之逺地詔添差湖南馬步軍副都總管居邵州永宗留建康不行御史中丞何若言建康大軍所駐使永宗出入其間豈得安靖望少加懲責仍令本府差人押赴邵州故有是命左宣教郎皇太后宅教授張本為秘書省正字本以上書得官賜出身改京秩至是入館丙申詔海内四州軍各置教諭一員從瓊管安撫徐念道之請也己亥工部奏立淮東江東两浙湖北諸縣嵗較營田賞罰格其法以紹興七年至十三年所收課利最多酌中者為額每路縣令以十分為率取二分賞之嵗收増三分至一分以上並減磨勘年仍以最虧一縣為罰金主亶以上京宫室太狭是月始役五路工匠撤而新之規模雖倣汴京然僅得十之一二而已夏四月按是月庚子朔辛丑左朝請郎提舉江州太平觀何鑄復左朝奉大夫知温州壬寅直徽猷閣知潭州劉昉陞直寳文閣録招降武岡猺人楊再興之功也事見去年十月乙酉上曰猺人乆侵省地今盡以歸可見嚮化大抵猺人須加存撫此既不擾彼亦豈敢為過也癸夘用前荆湖等路撫諭司幹辦公事胡駿請立祚德廟於臨安府尋加封程嬰為忠節成信侯公孫杵臼為通勇忠智侯韓厥為忠定義成侯嬰等封在六月丁巳今併書乙巳普安郡王免䘮還故官司封員外郎邉知白面對乞令郡邑以籍田手詔刋石置於㕔事上曰凡治天下惟賞與罰有賞而無罰雖堯舜不能治天下守令有勸農之實若不能奉行朝廷德意當痛黜之右朝議大夫知道州李佾條上便民事件請以真宗御裂文臣七條凡守令朝辭之日悉令拜賜權吏部侍郎王循友等言守令多外除恐不周徧欲令鏤板於㕔事掲示己酉從之熊克小歴謂李佾乞掲示非也庚戌上曰近日全無事秦檜曰御前諸處奏到可見臣謹按林泉野記稱檜已漏即出省文書壅滯皆不省乃與此不同以紹興二十五年十一月董德元等所奏及上語考之乃是事事止申尚書省上又稱鍾世明奉使並無一字至朕前及稱看詳章奏官取大臣意㫖民事不令朕見由是言之御前諸處奏到絶少乃是檜意今反以此答天問其欺罔甚矣故表出之上曰前此文字極多朕有至夜分不寐頓如此減省豈非議和之效乎丙辰敦武郎閤門祇候俞似脩武郎閤門祇候曹涭並為右武郎以使還特遷也左奉議郎新通判成州郭伸獻易觧上曰易象深㣲難極窮究須有自得仍不穿鑿始可謂之通經伸議論亦粗通可略加旌擢於是進伸一官戊午兵部上武士弓馬及選試去留格初補入學歩射弓一石若公私試歩騎射不中即不許試程文其射格自一石五斗以下至九斗凡五等上可其奏因諭輔臣曰國家武選所係非輕今諸將子弟皆耻習弓馬求換文資數年之後將無人習武矣豈可不勸誘之甲子右脩職郎楊迥充勑令所删定官逈時子也丙寅御史中丞何若言諸軍多執平民强刺人情不安非太平肅静之意望嚴行禁戢從之五月按是月己巳朔壬申命諸路漕臣兼提舉事如本司官俱無出身即從上一員兼領用權禮部侍郎游操請也詔浚臨安府運河時北闗門外河道湮塞漕舟往往卸於門外極為勞費而商販亦阻上聞乃諭大臣令開撩之甲戌集英殿脩撰知福州薛弼請以招安人付諸軍拘收仍加存恤毋令逃竄上曰弼所慮不茍愚民無知有被驅掠或州縣科擾不得已而為盗者帥臣得人則盗不作矣丙子詔學校科舉取士如經義詩賦人數不等即以文理優長通融補放不得過三分亦用禮部請也丁丑封典籍馮氏為美人司記劉氏為才人庚辰左大夫周綰為淮南轉運判官上覽除目曰監司朝廷耳目之官今天下安静恤民為先得人則一路安否則煩擾百出豈可不慎擇綰縉雲人也辛巳直寳文閣两浙轉運副使錢端禮罷以右諫議大夫汪勃論其素習驕騃不閑世務傾險任數也命權吏部王循友權户部侍郎李朝正編類諸路監司郡守條上裕民事件俟成書頒之癸未初作太廟祏室於室之西墻金釘朱戸黒漆趺坐如承平之制甲申德興縣士民傅取新等請知縣陳鼎再任鼎嘗權監進奏院以上書請備邉忤秦檜故逐至是檜進呈上曰德政果及於民則固可留然其間不能無計嘱須加核實御史中丞何若即奏鼎朋附廖剛其任德興不遵法令用刑慘酷鼎坐免去鼎為邑有恵愛至今人思之鼎罷在八月庚申今併附此淳熈五年先臣知徳興縣邑人為詩以美先臣其首章云銀峯縣政百餘年陳鄭才猷舊所傳陳盖指鼎也是時去鼎之罷已二十餘年而邑人之言如此則若之所云非矣丙戌詔作景鐘鐘高九尺天子親祠上帝則用之以皇祐黍尺為凖既成命秦檜銘之曰德純懿兮舜文繼躋壽域兮孰内外薦上帝兮偉兹器聲氣應兮同乆視貽子孫兮彌萬世上大恱太學博士闗注罷以御史中丞何若論其隂有交結圖為不靖也丁亥金主使金吾衞上將軍彰德軍節度使烏庫哩海昭武大將軍同知宣徽院事趙興祥来賀天申節癸巳上謂大臣曰春秋之學士人習者極少宜有以勸之近秦熺亦嘗論此寔契朕意甲午資政殿學士提舉臨安府洞霄宫李邴薨於泉州後諡文肅徽猷閣待制知瀘州馮檝奏天雨豆甘露降於郡園是月右承務郎康與之監尚書六部門與之倬子也上之以星變求言也倬以選人上書言彗不足畏秦檜大喜遂特改京官與之事以林泉野記脩入日歴並不載與之改官指揮其監部門據題名在今年五月到任故附此月末彗出求言在去年四月六月己亥朔右宣義郎知信陽軍馮榮叔代還上言京西淮南民之歸業者尚少望詔有司應歸業之民如給復年限已滿止收其半稅更假之五七年以勸耕墾其流移在内郡欲歸業者所在自陳不許占㽞不過數年丁賦如舊矣上甚以為然諭大臣曰若荒田耕鑿得徧大為國家之利今邊境寧靖人思歸業然所在尚有占㽞之弊可令户部措置乃以榮叔知均州上諭大臣在癸邜榮叔除郡在壬子今聫書之直秘閣知常州湯鵬舉為两浙路轉運判官丁未秦檜奏淮東鹽課増羡乞推賞上曰増羡之賞尤所當慎大率今嵗有羡次年必虧盖民之食鹽每嵗止如此也癸丑左朝奉郎知彭州彭賔㑹赦猶降一官以前通判卭州牒避親舉人不實故也監察御史巫伋面對請申嚴有司所在刑獄不得輒為非法之具如錢塘仁和二邑所設浮匣命繩之類不得復用違者俱抵罪詔刑部禁止甲寅白州民家木偶土地神自館驛前相持入商稅務州人聚觀之兵馬都監葉某怒投之江中乃止其後未踰嵗守臣趙不易與僚屬死者六人此據百衲叢談己未分遣醫官循行臨安療病者至秋乃止自是行之至今監察御史陳積中面對論監司州縣淹㽞詞訴之弊乞令諸部每季檢舉劾其尤者從之癸亥少師昭慶軍節度使萬壽觀使平樂郡王韋淵復致仕任便居住從所請也監察御史王鎡面對乞一新禖壇行親祠之禮乙丑詔禮部措置是月安南獻馴象十秋七月按是月戊辰朔己巳上謂大臣曰今早雨甚霑足方欲祈禱遂得之嵗事有望聞米麥甚賤小民易活亦可慶也時嶺南州縣多不雨而慶之清逺韶之翁源英之真陽三邑尤苦䑕害雖魚鳥蛇皆化為䑕數十成羣禾稼為之一空焉嶺南不雨事以洪邁夷堅甲志脩入志稱紹興丙寅夏秋之間故因行在得雨附見壬申檢校少傅崇信軍節度使和國公張浚落節鉞職名依舊特進提舉江州太平觀連州居住先是浚因星變欲力論時事以悟上意以其母太夫人計氏年高言之必被禍恐不能堪計氏見其形瘠浚具言所以計氏誦其父咸紹興聖初舉制科策曰臣寧言而死於斧鉞不忍不言而負陛下浚意遂决即上䟽言當今事勢如養大疽於頭目心腹之間不决不止决遲則禍大而難測决疾則禍輕而易治惟陛下謀之於心斷之以獨謹察情偽豫備倉卒庶幾社稷有安全之理不然日復一日後將噬臍異時以國與敵者反歸罪正議此臣所以食不下咽而一夕不能安也於是秦檜以謂時已太平諱言兵事見之大怒御史中丞何若即奏浚建造大第彊占民田殊失大臣省愆念咎之體居常怨恨以和議非便惟欲四方多事僥倖再進包藏禍心為害實大望賜降黜以為臣子喜亂徇私之戒故有是命熊克小歴載此事于今年十二月彗再出之後誤也盖十五年四月彗出東方今年四月浚上此䟽七月貶十二月彗再出耳朱熹撰行状云檜命臺諫論公章五六上以特進提舉興國宫連州居住今日歴止載何若一章當考癸酉中亮大夫宻州觀察使行營右䕶軍右部統制軍馬李師顔更領宜州觀察使師顔新知西和州故改命制詞有云惟務在於正名廼不嫌於改命甲戌徽猷閣待制提舉江州太平觀仇悆卒乙亥右武大夫福州觀察使帶御器械潘温卿落階官為舒州觀察使丙子利州路轉運判官王陟罷用太府少卿總領四川宣撫司錢糧趙不棄請也陟為宣撫副使鄭剛中所喜俾兼本司參議不棄既入蜀欲盡取宣撫司所儲剛中不與不棄怒首劾陟罷之剛中愬於朝不報明年九月余堯弼劾剛中䟽稱總司發擿贓吏亦百端庇䕶肆為邪說即指此也右承議郎范仲熊以事至行在右諫議大夫汪勃論其不忠詔令臨安府差人押出界日後不得至行在戊寅國子監言今年秋試額外補中之人乞令待闕至科塲年許赴監依不滿年人例取應仍自来春住補俟科塲了畢有闕日檢舉施行先是四方就補者益多乃分塲引試士有更名冒試至於再三者御史中丞何若嘗以為言上曰士人進取之弊一至於此不可不革今日之所養則它日之所為可見矣上語在是月辛未於是學官以為言乃改用三嵗之法焉乙酉封恩平郡王新婦靳氏為齊安郡夫人右朝奉大夫新知奉化縣陳泰初進神宗哲宗御集百有十八册上因諭大臣曰書籍未備宜有以勸之可令秦熺立定賞格重則進官輕則賜帛於是進泰初一官丙戌上曰諸軍寨屋為霖雨所損可令脩整於是人賜錢一千太常丞兼權司勳員外郎王湛面對乞戒州縣官迎送監司毋出城倚郭縣令毋得日詣郡守常衙以廢事詔敕令所立法如所請戊子言者乞禁福建民間私藏軍器上曰此自有法宜令民通知若絶其源則盗自不作矣己丑詔普安郡王二子賜名愉愷並補右内率府副率用宗室緦麻親授官格也壬辰江東提刑司請諸路經總制錢並委縣丞拘收無縣丞處委主簿從之提舉秘書省秦熺奉詔立定獻書賞格詔鏤板行下應有官人獻秘閣闕書善本及二千巻與轉官士人免解餘比類増減推賞願給直者聼諸路監司守臣訪求晋唐真蹟及善本書籍凖此丙申左朝奉大夫何鑄復端明殿學士提舉萬壽觀兼侍讀將遣使北也江東轉運司建康府言本府民户所欠官錢六萬餘緡委是貧乏無可催理乞特賜蠲免權户部侍郎李朝正乞令總領所審實蠲放從之先是清河郡王張俊為淮西宣撫使駐軍建康責部民子錢息之不已積不能償則獻於朝奏下守臣敷文閣直學士晁謙之詰得其状立上言皆窮民願勿責上許之謙之事以晁公愬所作傳附入傳又稱謙之言於法不當償今狀中乃無此語疑公愬有所潤色也傳又稱積數十巨萬不能償亦與所申不合今削此四字令不牴牾未知江東漕此時為誰當考其名増入八月戊戌朔尚書吏部員外郎周執羔守右司員外郎上覽除目曰人材須廣訪而選用之所薦者君子其人自君子所薦者小人其人自小人觀所薦其人可知矣寳文閣直學士提舉亳州明道宮趙子淔卒己亥左承議郎主管台州崇道觀王蘋特勒停蘋奉祠家居其僕嚴安告鄉人王立已者有不順語蘋坐知而不告特責之庚子熈州觀察使侍衞歩軍司統制董先改邕州觀察使於是管軍田晟以下次第移鎮焉辛丑築高禖壇初監察御史王鎡以上繼嗣未立請行親祠高禖之禮六月乙丑禮官言自祖宗以来惟两制侍祠雖大唐月令政和新禮有天子親享之儀而未嘗舉乞命執政侍祠乃改築於圜丘之東高咫而廣五倍詔訪遺書於西蜀仍委逐路帥臣壬寅宻州觀察使殿前司後軍統制張淵乞遣招安人周宙等回寨上謂宰執曰福建諸盗皆無知之民若招安未為要術須是監司守令恤之不擾自然寧息如海賊皆本處大姓資給使然可嚴立賞罰收捕者優賞資給者痛治此消弭之要術也龍神衞四廂都指揮使降授果州團練使殿前司選鋒統制劉寳復宣州觀察使乙巳左朝散郎費樞知歸州樞廣都人宣和初徒歩入京師將至長安舍旅館主人婦美少新寡夜就之樞不可問知乃京師販繒人女因訪其父俾取而更嫁之人稱其清庚戌秦檜奏臣昨凖玉牒所取臣向者圍城中推戴趙氏事跡乞經聖覽降付本所上曰卿忠義之節書之信史萬世不朽檜踧踖退避檜又言禮器將畢上曰鍾磬音律皆和惟黄鍾大吕未甚應律更宜詳加講究辛亥右朝奉大夫江南東路安撫司參議官王晌提舉淮南東路常平茶鹽公事晌㬇弟也起居郎兼侍講兼權中書舍人趙衞卒壬子將作監邉知白權尚書户部侍郎右司員外郎周執羔權禮部侍郎甲寅以邉知白為賀金國正旦使武莭郎兼閤門宣賛舍人孟思恭副之周執羔為賀生辰使左武大夫知閤門使宋籛孫副之先是奉使者得自辟十人以行賞典既厚願行者多納金以請遂以為例執羔始拒絶之監察御史陳積中太常丞兼權司勳員外郎王湛並罷先是宣州言忠顯王桓彛廟顯應積中時以主簿權博士與湛共奏加封其長子温為宣威公餘子五人皆為侯至是御史中丞何若言温晋之亂臣請追告毁像上謂秦檜曰温謀移晋祚頼當時有大臣扶持不然晋不血食矣於是積中湛以嘗與討論故有是命己未敷文閣學士知廣州莫將卒以奉使之勞特贈端明殿學士恩數視簽書樞宻院事庚申右諫議大夫汪勃兼侍講辛酉監察御史王鎡獻戚里元龜三巻詔遷一官鎡初為皇后宅教授上命採歴代戚里故事可為法則及鑒戒者論次成帙至是上之癸亥右諫議大夫汪勃言刑部員外郎李頴士傾險回邪禀自天性昨以趙鼎用為大理屬隂懐附麗及鼎之去則不輟報以時政鼎赴貶所則令其子通問厚有贐遺快謝祖信之死公然以書抵親舊曰謝成甫疾亟休致可憐但擊天水之章謬用其心為可惜聞凌景夏樊光逺之補外則曰必皆有說王居正范冲之罷則曰時勢使然今雖為郎尚怏怏不滿每見差除則忿見於言色謂天水在朝必不至爾其虧忠正之節甚矣欲望特賜裁斷以厭士大夫之論詔頴士送吏部差監澧州慈利縣稅務甲子直秘閣淮南路轉運判官沈該移两浙路金都元帥宗弼之未卒也自將中原所教神臂弓弩手八萬人討䝉古因連年不能克是月遣領汴京行臺上書省事蕭博碩諾與䝉古議和割西平河以北二十七團寨與之嵗遺牛羊米豆且命冊其酋鄂掄貝勒為䝉古國王䝉人不肯此據王大觀行程録十七年三月末所書可考九月按是月戊辰朔己巳皇叔右監門衞大將軍榮州團練使士芑特换武德大夫從所請也撫州布衣呉澥進宇内辯歴代疆域志呉沆進易璇璣三墳訓義秘書省國子監言其書可采而太學博士王之望論三墳書無所傳授疑近世好事者所為詔澥永免文觧沆以書犯廟諱故賞不及焉甲戌端明殿學士提舉萬壽觀兼侍讀何鑄為大金國信使賔徳軍節度使提舉萬壽觀邢孝揚副之以迎請天屬故也鑄等出使日歴不云所以按明年九月余堯弼論鄭剛中䟽云近朝廷遣使迎請天屬剛中輒倡異議以為盡棄四川求易二京羣情為之震懾即此也初秦檜自金来歸與富直柔争進指辛道宗兄弟為直柔之黨深嫉之及是道宗停官未叙以前拱衞大夫居饒州言者劾其强市民田庚辰檜進呈上因言向者范宗尹與諸辛徃来甚宻宗尹為宰相不與朕情通乃附下如此於是道宗特更追一官癸未秦檜進呈四川茶馬等司條具馬監利害上曰太祖初有天下置沙苑監牧馬就渭州水草後京師門外方置監南方與北方地不同蓋難得其處宜詳究利害右承議郎知鼎州周聿卒甲申復顯謨閣待制乙酉慶逺軍節度使知臨安府張澄知温州從所請也丙戌直秘閣两浙路轉運判官沈該知臨安府己丑歩軍司言統制官寧武軍承宣使戚方已到行在供職上曰自合兵以来諸將出入若身之使臂臂之使指無不如意兹為可喜熊克小歴稱以湖南都鈐轄戚方為歩軍司統制按戚方此時恐在建康軍中充統制未嘗離軍所謂湖南兵鈐止是陞帶克誤也中興聖政史臣曰紹興以来所以為國者有二金欲戰則分江淮之鎮以授將帥金欲和則收將帥之權以歸朝廷規模既立守偹益固操縱自我此之謂定論烏珠求和畏我之強也故兵可以合兵合而朝廷之勢重將帥之權輕神機静慮盖用之於天下無事之時而不以為常也乆而不變則智者媮勇者怯江淮之役所患者此爾為國譬之養生視表裏虛實而輔道之不使砭劑改亂正氣夫何病之有壬辰何鑄辭行鑄言親䘮未𦵏乞俟使回日了此私計上許之初三佛齊國王以書遺廣南市舶官言近年商販乳香頗有虧損上曰市舶之法頗足國用宜循舊法以招徕逺人時市舶官右朝散大夫袁復一已移提舉福建常平公事詔特降一官甲午復起鼎州觀察使殿前司後軍統制張淵以平福建羣盗功遷威武軍承宣使軍器監徐琛右承議郎福建轉運判官范寅秩以給餉之勞皆進秩餘第賞有差賊之未破也翊衞大夫華州觀察使殿前司摧鋒軍統制兼知循州韓京將部㑹之乙未詔進京一階丙申詔武成王廟從祀諸將升趙充國於堂降韓信於廡下用祀部員外郎權國子司業陳誠之請也是月左朝奉郎陳剛充荆湖北路提舉常平司幹辦公事剛井研人建炎初為晋原尉時方用兵條五利八事以獻乆之遷羅江丞以母憂去至是投匭上書論恢復事大略謂當以和好為權宜戰守為實務䟽入上諭秦檜令除郎官檜不樂乃言剛資歴未深遂有是命且諭臨安府臣遣人蹤跡使去而剛已間行出北闕矣秩滿代歸遂不復仕後數嵗卒於家剛為人彊直登第三十年莅官纔九考所至皆有可稱上諭檜除剛郎官事以剛孫咸撰黄仲容墓誌所書修入景箎撰剛墓誌第云既外除朝參以公資歴未深堂除湖北茶鹽司幹辦公事盖是時檜權勢方盛箎不敢明言之也箎所作銘詩末章云公之家集必百巻蔵之必百年當有公道始定斯盟即指此事耳惜其泯沒不見於後世故表出之但咸所記以為紹興戊辰上書又合五利八䇿與此書為一事及稱以正郎止除幹官皆小誤剛紹興二十三年三月丙辰以左朝奉大夫卒于家冬十月按是月丁酉朔戊戌新禮器成上觀于射殿宰執侍從臺諫南班宗室禮官正刺史以上皆與觀撞景鐘奏新樂用皇祐故事也於是直祕閣秦塤陞直敷文閣給事中叚拂已下皆遷官塤進職在壬寅叚拂等進官在丁未何俌龜鑑曰帝仁孝一念勃於胷中故以大事小正孟子所謂樂天者保天下者也數十年来金安於金繒之徃来而吾國得以漸講玉帛㑹同之禮於是建辟雍於是立科舉於是修郊廟社稷之儀於是重經筵講讀之選他如求遺書則有詔刋石經則有詔閱禮器銘景鐘而文治自是彬彬矣徽猷閣待制提舉江州太平觀劉子羽卒年五十子羽在泉州嘗獻時宜八事論淮甸郡縣不必盡守故城各随所在據險置寨守以偏將敵長驅深入則我綴其後二三大將浮江上下為之聲援論荆襄宜合為一路置帥公安益兵聚粮為戰守計論三衙寡弱未振宜益増禁衞論守江宜輕戍江北重戍江南論舟船當講求訓練使大艦利於控扼小舟利於走集論南兵剽悍可用望别立統帥論江淮陜蜀之兵當互為聲援論募兵乞於荆粤收集諸盗後皆不行癸邜武徳大夫榮州刺史两浙路兵馬鈐轄樞宻院統領丁禩編排南郊隊衞禩嘗知漣水軍後罷去秦檜徳其前事用為給使頗用事士大夫無操者或與之游從焉禩初為檜給使及節次轉官史全不見因此差使標出之以偹檜事之本末甲辰少師平樂郡王韋淵復落致仕充萬夀觀使還居賜第己酉上曰今天下無事民事最急監司郡守須是擇人監司得人為縣者自不作過盖縣官皆銓注難别賢否全在考察昬繆不任者别與差遣清強有才則宜擢用之朝奉郎知遂寧府蘇符復敷文閣待制庚戌直秘閣知臨安府沈該乞展两淮起稅之限上謂宰執曰財賦須知取予之道如知取之為取不知予之為取非乆利也淮南民若盡歸業則其利甚廣矣癸丑秦檜奏以右朝請大夫韓沃知廬州上曰淮南今已寧静只不生事為善檜曰今天下無事苐恐庸人擾之不然天下未有不治甲寅端明殿學士提舉臨安洞霄宫胡松年薨戊午上曰近得玉二塊方成玉磬朕親臨視之已恊音律更欲按試之己未秘書省正字劉章為校書郎兼普安恩平郡王府教授徽猷閣直學士提舉江州太平觀周秘卒十有一月庚午言者奏近来詩賦經術各以舊試人數分取其間不無輕重大抵習詩賦者多故取人常廣治經術者鮮故取人常少今若專以就試之人立定所取分數則詩賦人常占十之七八而治經者止得十之一二但恐寖廢經術之學矣欲望命有司再加討論如通經之人有餘聼參以策論圓融通取明立分數庶㡬主司各有遵守上曰當日行詩賦為士人不讀史今若耑用詩賦士人不讀經大抵讀書當以經義為先所論宜令禮部看詳以聞辛未執政進呈郊祀肆赦上曰居養安濟漏澤先帝之仁政居養安濟已行之矣惟漏澤未行宜令條具増入壬申雪癸酉上齋于文徳殿丙子合祀天地于南郊始命普安郡王亞獻恩平郡王璩終獻是嵗備祭器設八寳如政和之儀太史局令胡平言三台星見禮畢上御行宫南門赦天下庚辰詔諸州縣鎮市新創稅塲墟並罷以言者有請也復置荆門軍當陽縣自建炎渡江始廢御書院癸未詔復之三十年正月丙申又罷甲申太師尚書左僕射秦檜言陛下好生之徳既定宇内乃不居其聖歸功於天前郊祀之期年稽古制作禮樂大備討論訂正悉出聖學有司效使惟謹曽不能措一辭及將祀則至誠感通天意響答雪呈瑞於齋宫之先日穿雲於朝獻之旦既升紫壇則星宿明潤旋御端闕則霄漢廓清允謂先天弗違諸神受祀至於率履不越又可為萬世法有司請設小次則拒而不答宫廟載葺既畢則宸翰標題皆極於恭恪此皆經典所誇詡有司宜書載者也臣職在後從親見不誣望宣付史館上謂檜曰此國家大典禮及期而晴誠可慶也朕自即位以来無如今次非卿等恊賛何以致此乙酉吏部奏郊祀大禮太師左僕射秦檜合封贈三代並妻詔依擬定成州團練使帶御器械韋謙罷貴州刺史提舉佑神觀韋讜帶御器械丙戌詔達州刺史韋訊累有過犯可降武功郎送吏部與嶺外監當差遣以皇太后有㫖也己丑檢校少保昭化軍節度使開府儀同三司充醴泉觀使駙馬都尉潘正夫為少保庚寅權尚書禮部侍郎游操罷御史中丞何若論操嘗阿附吕頥浩又嘗阿附趙鼎鼎既貶逐操猶書問不絶緩急之際何足倚信故出之辛夘朝散郎两浙東路提㸃刑獄朱敦儒罷右諫議大夫汪勃論敦儒專立異論與李光交通望特賜處分上曰爵禄所以勵世如其可與則文臣便至於侍從武臣便至於建節如其不可雖一命亦不容輕授於是敦儒遂罷癸巳權尚書工部侍郎錢時敏移兵部侍郎軍器監徐琛權工部侍郎直秘閣知楊州向子固陞直徽猷閣再任甲午皇兄眉州防禦使不怞為邕州觀察使以與皇后家連姻特遷之也乙未吏部奏郊祀大禮皇太后合封贈三代於是曽祖徐王韋舜臣徙封韓祖揚王子華徙封楚父魏王安禮徙封陳十有二月按原本脫干支四川宣撫副使鄭剛中奏減兩川米脚錢三十二萬緡元理百五十萬緡激賞絹二萬匹事初見建炎四年免剏増酒錢三萬四千緡許之戊戌詔以四川總制錢五十萬緡備邉費彗出西南方己亥詔避殿減膳辛丑徽猷閣待制提舉江州太平觀鄭望之言老而多病乞守本官致仕許之仍遷一官熊克小歴稱望之以集英殿脩撰告老盖誤丙午手詔曰朕惟軍興以来四川歛重恐不堪乆今疆塲罷警營屯内遷仰宣撫總領两司取索承平時常賦名色軍興後權所増益參酌措置既不能竭民力又不可乏軍須两皆給足永相保持以副朕顧倚之意尚書金部員外郎李若川罷若川簽書樞宻院事若谷弟也右諫議大夫汪勃論若川恃為執政之弟為所親經營差遣妄作威福故罷己酉大理評事環周面對論征商過重詔申嚴行下辛亥進士章公奎上書言國家向縁軍興之故財賦屈乏乃於民間預借其稅以濟軍用此不得已而行之耳國家偃兵息民固已有年而預借之稅今尚未免且預借之弊折納太重近於重歛可即除之以慰安元元之望上曰此事有否朕與鄰國通和正為百姓若預借以擾民失朕本意乃詔戸部取索措置辛酉金主使龍虎衞上將軍㑹寧尹盧彦倫定逺大將軍四方館使張仙壽来賀来年正旦壬戌左奉議郎仲并特降二官坐前通判湖州與倡女通濫為言者所劾有司鞫寔故也并初見紹興四年九月是嵗宗室子賜名授官者十有八人諸路斷大辟四十八人建炎以來繫年要録巻一百五十五建炎以來繫年要録巻一百五十五金人地名考證烏庫哩原書作烏古論誤今改正烏珠原書作兀术誤改見巻一博碩諾原書作保夀奴誤改見巻一百十七䝉古原書作蒙兀誤改見巻九十六鄂掄貝勒原書作熬囉字極烈誤今改正
