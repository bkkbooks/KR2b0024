body:
  text: 建炎以來繫年要録巻一百九十五宋李心傳撰紹興三十有一年十有二月己亥朔侍衛馬軍司中軍統制趙撙復蔡州初撙自蔡州引兵南歸後三日至麻城縣復被詔與鄂州都統制呉拱荆南都統制李道併力攻取二人未至撙疾趨城下金人所命刺史蕭懋徳聞撙至披城為寨相拒兩日不出戰至是夜漏未盡撙命將士潛師入城城無樓櫓不可守懋徳遁去詔主管侍衛馬軍司公事成閔所部軍馬並加倍犒設一次以自襄郢初至鎮江也秘閣修撰江南西路轉運副使張宗元獻助軍錢十萬緡米十萬石詔遷一官成忠郎張真自揚州金寨至鎮江出所持金檄云大金國大都督府牒大宋國三省樞宻院國朝太祖皇帝創業開基奄有天下迄今四十餘年其間講信修睦兵革寢息百姓安業不意正隆失徳師出無名使兩國生靈枉被塗炭奉新天子眀詔已行廢殞大臣將帥方議班師赴闕各宜戢兵以敦舊好須至移牒牒具如前事須牒大宋三省樞宻院照驗大定元年十一月三十日牒銀青榮禄大夫右領軍都監開國公芬徹龍虎衛上將軍左領軍都監圗克坦崇進左領軍監軍瀋國公圗克坦儀同三司右領軍副都督函國公銀青榮禄大夫右領軍大都督開國公太保左領軍大都督齊國公金牒内無左副都督階銜疑即李通見殺故也林栗上宰執書稱詳其闗牒尚有兩名不書不知右監軍為誰督視行府回牒金人軍前云今月一日承來文照驗正隆廢殞事除已繳奏外須議移文牒請照㑹紹興三十一年十二月一日侍衛馬軍都指揮使御前諸軍都統制成太傅御營宿衛使和義郡王楊左中大夫知樞宻院事都督諸路軍馬葉是時行府云都督者以金人稱大都督來議和我不可示之以弱也右武大夫吉州刺史知通州崔邦弼聞泰州陷欲棄城去恐百姓不從夜二鼓遣人於城内外縱火乗喧閙徑出渡江之福山既而提舉常平茶鹽公事王珏劾於朝降二官放罷而珏已死矣庚子詔淮東制置使成閔元帶到鄂州軍馬日下發還言者論金人自擁重兵身臨淮東日生姦計意欲渡江故朝廷督責諸帥嚴為捍禦今鎮江已有元來屯駐軍馬見係都統劉鋭所管并歩軍李捧都統邵宏淵及殿前司諸軍精鋭盡集京口一帶近日制置成閔又自襄漢率軍來赴鎮江防遏及摘帶鄂州所屯人馬同來然鎮江既有諸帥軍馬凑集在彼今又益以成閔之軍則軍勢不為不盛計其扼天險以拒金人亦足以制敵取勝然臣之區區竊知金人見有十餘萬衆屯聚汴京臣深慮敵人知我重兵盡集鎮江則襄漢一帶必虚儻以精兵襲我上流呉拱雖有軍馬在彼勢力單弱倉卒衝突我雖欲應援然泝流數千里之逺豈能旦夕而至使敵人萬一出此則利害誠為非輕欲望速降睿㫖將成閔帶到鄂州軍馬速賜發還本處仍乞戒諭呉拱眀逺斥堠嚴切捍禦常為待敵之䇿庶㡬首尾不落敵人變詐故有是㫖先是閔以鄂州水軍及勝㨗軍統制張成後軍統制華旺所部偕行乃令成等還鄂州屯駐激賞庫有成閔囬申云初五日被受初二日宻劄盖未聞㨗報前指揮也太傅御營宿衛使和義郡王楊存中淮東制置使成閔中書舍人督視江淮軍馬府參賛軍事虞允文司農少卿總領淮東軍馬錢糧朱夏卿等黃旗奏報已殺金主完顔亮訖朝野相賀上曰此人簒君弑母背盟興戎自采石與海道敗後知本國已為人所據乃欲力决一戰今遽滅亡是天賜朕也朕當擇日進臨大江洒掃陵寢肅清京都但戒諸將無殺掠此朕志也初敵騎矙江朝臣震怖爭遣家逃匿權禮部侍郎黃中獨謂其家人曰天子六宫在是吾為侍臣若等欲安適邪比敵退獨中與左僕射陳康伯家屬在城中衆皆慚服時存中與允文共議偕至江北岸以察敵情諸將憚行允文存中獨以輕舟絶江而北上嘗謂康伯及留守湯思退曰楊存中忠無與二朕之郭子儀也王曮撰存中神道碑云王與虞公以輕舟絶江而敵騎奄至方舉酒相屬神觀屹然敵不敢逼曮所云不無増飾今不取貟興宗所記采石始末稱允文與存中初二日渡江至瓜洲措置後二日赴行在初六日奏事而楊萬里所撰允文墓碑不言允文渡江以日計之自𤓰洲兩日無縁至行在葢允文存中渡江即囬興宗或誤記也馮履記范處義語云金亮死范丈再同權知揚州葉宏過江北有瓦礫之場見虞舍人再過以為當去前路促督追師范云此已深冬雪寒不見道路若止如此去恐中路無宿止飯食之地虞卒徃凡四日止行四十五里止于雪中一小坡上雖欲囬亦不知路偶然范丈為葉守言募兩健卒賫一壺酒一盝飯前路伺候果見虞在雪中見酒至甚喜因令此人引之囬謁揚守見范丈云某悔不聼年兄言㡬至狼狽然徐徃則敵已去不可追矣按此所記尤差誤難􅑀若允文渡江四日而後囬揚州則初六日何以遽至行在今並不取尚書省勘㑹近節次收復陜西州軍合添用錢引行使詔四川總領所添印三百萬道委王之望專一收掌逐旋約度合用之數作料次給降足以給用即止其餘合行事件仰一面隨宜措置施行訖聞奏仍不下司此事本之望陳乞已具今年十一月戊辰是日金人以舟師犯茨湖官軍擊却之茨湖在漢江之南與光化軍相對有鄂州副統制李勝荆南副統制張進之軍在焉至是敵以舟渡師欲攻襄陽㑹風勢不利不得着岸鄂州前軍旗頭史俊麾旗渉水直登一舟呼曰前軍得功矣諸軍宜進敵初不虞敢登其舟遂大驚失措行隊不整有墜水而死者諸軍繼進俊殺其千戸一人奪舟數十金人乃還趙甡之遺史云史俊殺其将杜萬戸而趙成京西戰功録云殺郭勒千戸二書不同當考辛丑右武大夫宣州觀察使添差兩浙西路馬歩軍副總管兼提督海船李寳為靖海軍節度使兩浙西路通泰海州沿海制置使京東東路招討使遣幹辦御藥院陳子常押賜旌節官告鞍馬於是承節郎曹洋特遷武經郎賜金帶餘將士第賞有差賞膠西之㨗也詔御營宿衛使楊存中以右軍統制苖定所管歩軍前來扈從詔兩淮帥臣監司州縣失守官吏並放罪除已放罷人外令還任其殘破州縣當省貟者監司帥臣相度以聞後减諸司屬官二十四員使臣二百餘員吏卒二千餘人嵗省錢七十餘萬緡初上將如建康撫師而欽宗神主未祔廟行宫留守湯思退欲省虞速祔而釋服以行既十日矣至是權禮部侍郎黃中言不可上納焉議者猶謂凶服不可以即戎上曰吾固以縞素詔天下矣卒從之樞宻行府議遣兵過江乃檄淮西制置使李顯忠速選精鋭甲軍至鎮江府㑹合所有采石一帶留下軍馬令池州都統制邵宏淵權管此據宏淵申行府状總領四川財賦王之望復言呉璘疾病乞朝廷權事勢輕重還呉拱於蜀使璘腹心有助之望恐璘不起朝廷以姚仲代璘故預有此請凡五遺大臣書言之是日金國統軍劉萼聞茨湖軍敗遂班師軍無行陣多失路為鄉民所殺細軍之在泰州者亦棄城而去壬寅觀文殿大學士醴泉觀使兼侍讀充行宫留守湯思退乞鑄行宫留守印仍就尚書省置司行移如都省體式合行事務從權便宜施行訖奏又請以敷文閣待制知臨安府趙子潚兼充參謀官尚書右司員外郎吕廣問充參議官秘書省正字芮曄主管機宜文字樞宻院編修官鄭樵諸王宫大小學教授呉祗若司農寺主簿韓元吉並幹辦公事皆從之崇信軍節度使開府儀同三司領殿前都指揮使職事趙宻為行宫在城都總管利州觀察使殿前司䇿選鋒軍統制張守忠為行宫在城都廵檢武功大夫侍衛馬軍司右軍統制權主管本司職事張伃為行宫城北廵檢右武大夫忠州團練使侍衛歩軍司神勇軍同統制權主管本司公事王存為行宫城南廵檢詔再放行在公私僦錢一月是日主管侍衛馬軍司公事淮東制置使成閔自鎮江引兵之揚州御營宿衛使楊存中亦遣右武大夫權殿前司右軍統領李伋自江隂軍引所部渡江之石莊進發此據江隂軍申行府状時葉義問遣使臣李彪伺金人回軍動静閔令報曰成太尉大軍在揚子橋相持來日當大戰矣彪不聼道路喧言金人已去揚州空虚閔計不行乃以馬軍司之兵自天長追襲主管侍衞歩軍司公事李捧亦以神勇軍襲之敵軍凡數萬竈其行如林官軍皆不敢與相近但遥䕶之出境而已貟興宗記采石始末云初二日虞侯即與楊存中成閔渡江至𤓰洲措置而蹇駒斃亮記云成閔復揚州壬寅初四日也趙甡之遺史云癸卯寅閔自鎮江府渡江追襲又云亮死之七日閔乃渡江以日計之亮以十一月乙未被殺後七日即壬寅甡之誤以亮死在丙申故載閔渡江復差一日耳熊克小歴亦載閔復揚州在壬寅今從之癸卯詔金亮渝盟侵犯王略屬兹進發躬往視師文武羣臣各揚厥職輯寧中外共濟大功熊克小歴於此月庚子方書殿中侍御史杜莘老乞親征從簡以幸所過郡縣等事按莘老十一月戊辰已罷御史甲戌復除司農少卿葢莘老所言在初下詔廵幸之時克失於細考也詔金人完顔亮以十一月二十七日駐揚州為其下所殺今四川宣撫司統率軍馬隨路進討恢復州縣雖曰分路調發亦仰常相關報互相應援不得輙分彼此務要協力共成大功諸路招討司凖此敷文閣待制知臨安府趙子潚請權行團結保甲廵察姦盗又請强盗情理深重者許酌情斷遣並候事定日如舊皆從之明年二月己未罷酌情指揮閏月丙戍罷團結保甲詔樞宻行府行下沿江諸大帥各條陳目今進討恢復事宜合如何施行具已見利害疾速聞奏資政殿學士知建康府張燾首陳十事大率欲預備不虞持重養威觀釁而動期於必勝御史中丞汪澈言紹興二十五年臣僚白劄子謂岳飛既已伏誅岳州與其姓同本路諸司乞改岳州為純臣竊謂岳飛之叛固自有公論以姓名而改州名尤悖於理又光州光化軍以避金人之名易光為蔣光化為通化尤可切齒乞改岳州光州光化軍名額一依舊制從之直顯謨閣新知蘄州韓彦直充泗宿州招討司隨軍轉運副使代陳桷也直秘閣洪濤為沿海制置司隨軍轉運副使濤前棄廬州去今復用之拱衞大夫和州防禦使權知揚州賈和仲聞敵去乃以單騎入城猶未有官吏池州都統制邵宏淵自蕪湖以親兵至采石成忠郎提領諸路忠義軍馬所右軍統領沙世堅自如臯縣以忠義軍百餘人入泰州甲辰進呈金國都督府牒上曰金主既已殞斃餘皆南北之民驅廹而來彼復何罪今即日襲逐固可使隻輪不返然多殺何為但檄諸將迤邐進師㑹京畿收復故疆撫定吾人足矣左僕射陳康伯請率百僚稱賀上曰未湏爾候到汴京與羣臣共慶按金檄以初一日至江初二日㨗旗至行在而初六日方進呈金檄者盖葉義問在建康疑從行府繳申故稍緩或虞允文自持赴闕也熊克小歴乃載敵遣張真持牒請和於成閔入揚州之後失之矣太常博士林栗遺宰相書言敵人於我有不共戴天之讎禍極凶殫自取屠裂今乃按兵江壖議立新主從容移檄令我戢兵萬一其計得行是一亮死一亮生也詳其關牒尚有兩名不書則其中同惡亦未堅定為今日計宜敕諸將進軍臨之别遣重兵分出泗亳頴壽規取汴京截其歸路勿與之戰使之前不得鬭退無所歸然後開以生還之路示以丹青之信諸軍但許受納降欵若只是通和文字不得收接若失此時縱其北歸是禄山斃而慶緒興思眀弑而朝義立中原塗炭不知何時而已惟廟堂垂聽中書舍人兼權直學士院虞允文自鎮江還入見上慰藉甚渥允文言車駕進發而敵尚有在淮東西者今當督淮上之兵斷敵歸路發鎮江建康之兵為掩襲之舉可使敵無噍類上從之而敵去已逺矣司農少卿杜莘老直顯謨閣知遂寧府從所請也莘老為御史極言無隐取衆素所指目如王繼先張去為輩悉擊去之及罷去朝士祖道都門以詩稱述者百餘人都人至今以為美談雖宿衞武夫府寺賤𨽻誦前朝骨鯁敢言之臣必曰杜殿院云昭慶軍節度使提舉佑神觀劉懋獻錢二萬緡以助軍用殿前司右軍統制權知泰州王剛以所部至本州王剛申十二月六日将帶一行官兵收復泰州入城了當此妄也初三日金人已去初五日沙世堅先入城矣侍衞歩軍司中軍統制顧暉引兵泊𤓰歩鎮諜報金兵自和州搭浮橋至六合縣暉不敢進留居之江東安撫司坐暉状申行府是日均州忠義統領昝朝等復據鄧州初敵將劉萼之敗於茨湖也還軍及鄧州駐于城北八里其武勝軍節度使威略軍都總管蕭中一亦挈屬出城駐於萼軍之南偽同知節副皆以屬去中一留州事付監倉王直中一與白千戸三戸穆昆言曰今日鄧州屯駐之兵悉為都統帶去而城中之兵皆土人萬一為南宋之兵内應如何衆皆知中一有順南之意唯唯而已坐中忽不見白千戸者中一疑走告於萼矣乃率其奴婢將家屬南走迷失道中夜屢遭鄉村土豪驚散至州北百餘里中一被殺翌旦金人皆北去録事參軍髙通聞萼兵已退乃集軍民謂曰今南兵已近若此時不决則城中之人皆不可保請遂决之衆請通權節度副使通曰鄧州本大宋所有今金國已棄我官吏軍民矣欲與諸公同歸大宋如何衆皆聼命忽報城下有十餘騎至問之則昝朝也遂納欵朝本鄧州射士聚衆在山中投均州守臣武鉅乙巳命右司郎官吕廣問等十一人分攝行宫檢正太常宗正少卿列曹郎官職事淮西制置使李顯忠自蕪湖引兵渡江時金人尚屯鷄籠山而顯忠兵在沙上觀文殿大學士判建康府張浚自長沙聞命即日首塗過池陽徃勞以建康激賞犒之一軍見浚以為從天而下浚諭顯忠曰聖駕將廵幸至此而敵未退得無慮乎顯忠乃以大軍濟江去和州三十里與之相持然敵亦未退池州都統制邵宏淵自采石復還蕪湖守把元認大信裕溪河口措置捍禦此據宏淵申行府状是日金人遊騎焚真州報恩寺塔徑往天長建康府申行府状丙午太常少卿王普言今鑾輿順動而百官留務皆在臨安行宫望詔有司凡祭祀之禮舉行如舊從之郢州防禦使侍衛歩軍司中軍統制顧暉充本軍都統制提總䇿應軍馬以其累遣兵焚寨刼橋故擢之也御前忠鋭第五將張耘乞增招効用千人從之是日淮東制置司統制官王選等復楚州丁未鄂州統制官王宣至鄧州先是昝朝既入城遣人告㨗京湖制置使呉拱俾宣以千七百騎赴之拱繼至又遣訓練官朱宏王彦忠等率忠義人入汝州是日均州郷兵總轄杜隠等入河南府先是金人以兵二千駐長水縣金州都統制王彦遣将官楊堅黨清引兵㑹忠義人往擊破之殺其將二人獲部将王寳以歸遂復長水縣堅以深入敵陳死之清引其兵進攻嵩州亦克之又克永寧壽安二縣遂進兵入河南府城中民吏皆迎降費士戣蜀口用兵録載復河南事全不言均州遣兵一節趙甡之遺史乃略及之按日歴明年正月壬辰知均州武鉅兼知河南府則必是均州有收復之功但未得其詳當考戊申上發臨安府所至羣臣送迎者皆常服黒帶去佩時中書舍人權直學士院虞允文使兩淮而翰林學士何溥屬疾不能從惟起居舍人權直學士院劉珙扈行乃命起居郎唐文若權行宫直院江南東路轉運判官李若川柳大節言金人兇暴反盟黷武上天降殃完顔亮被戮兵衆遁走乃傳其子見留京東軍馬頗衆有親信以統之勢湏邀擊以報擅殺之讎今過淮敵兵敗亡雖多尚有十餘萬衆寧肯束手就死亦須窮鬬及金人部落多有完顔宗族類豈無守國軍馬必不能奉亮之子亦不肯助戮亮之衆定圖自立更相攻殺盡而後已當此釁隙契丹起而乗之過於五單于爭國各自救不暇豈暇尚占中原且中原百姓被祖宗徳澤之深日思簞食壺漿以迎王師此誠天啓恢復之時不可失之機㑹也然王師大舉尤務慎重以成萬全之功一乞少憩将士以養鋭氣二乞預備錢糧無致少闕三乞添造器甲以備分給中原義兵縁義兵雖衆唯闕器甲使用四乞敵人欲敦舊好誘以好言以欵之五乞多遣人宻結中原義兵以為應援六乞厚賞募人探知敵情以便進取七乞召集諸大帥共議軍事勿致臨時異同然後諸路並進非特恢復中原有反掌之易亦可一舉而空朔庭也若川此奏據申行府副本在十二月十日左朝奉大夫提舉江南東路常平茶鹽公事洪适言金亮既殞大定僣號未必諸國服從若能仰順天時遣使歸疆則王師不血刄而得土宇實天下之幸萬一敵衆尚强自淮以北别無爭立之人則宜多遣有膽力人宻傳詔檄使中原義士各取州縣因以畀之王師但留屯淮泗募兵積粟以為聲援不必輕渉其地以務爭力俟漢蜀山東之兵數道聚集見可而進遲以嵗月必有機㑹可乗恢復故地何啻破竹庶㡬兵力不頓可以萬全是日御舟泊臨平鎮己酉中書言去御舟太逺連日趂赴奏事不及詔宰執舟次建王舟行庚戌上次秀州守臣右朝請大夫俞召虎左宣教郎知嘉興縣杜易見於幄殿自是所過監司守令皆引對召虎歸安人也是日金人大軍自盱眙渡淮盡絶初淮東制置使成閔以所部追襲金師閤門宣賛舍人知泗州夏俊聞敵歸遂焚其城而南金人乃遣千戸先至泗州撤民屋為三浮橋頃刻而成翌日軍到皆下馬乗橋而過望之如雲既渡絶閔軍至盱眙排列於岸之南聲喏如一金人笑曰寄聲成太尉有勞相送是時龜山沿路金人遺棄粟米山積往往有科山東河北民户令赴平江府秀州送納者官軍糧運方不繼賴以自給閔之衆多福建江浙人不能食粟其死者甚衆此據趙甡之遺史修入激賞庫有成閔申状亦稱十二月十二日收復盱眙軍閔状又稱收復泗州奪到粟米三萬餘石與甡之所云葢同己見此月癸丑劉鋭入泗州注或可移米事附於彼耳辛亥上次平望戸部侍郎兼御營隨軍都轉運使劉岑自江上還入見壬子上泊姑蘇館知樞宻院事葉義問自建康太傅御營宿衛使楊存中自鎮江還皆入見守臣徽猷閣直學士洪遵獻洞庭柑上不受自是所過無入獻者遵言官拘舟船聚近海縣募水手留民兵夾運河築烽臺徒費無益乃罷鎮江至臨安所置烽燧餘皆從之癸丑上乗馬至平江府行宫進膳時御營宿衛使司右軍統制苖定以所部至平江乃以定兼權主管行在殿前司職事定權殿司不知以何日降㫖激賞庫有定此月初十日申状稱今月九日晚到平江府止宿一更二㸃凖十二月八日聖㫖令於所至用軍屯泊以俟扈衛日歴明年正月十九日丙戍苖定引見上殿乃繫改銜盖是時趙宻留臨安故以定兼權也今且附此須考武經郎曹洋自李寳軍中部所獲叛人倪詢應簡至行在就御舟引見詔磔於平江市詢常熟人簡道州人並為金人造舟者鄂州水軍統制楊欽以舟師追金人至洪澤鎮敗之夜鎮江府統制官呉超遣部将叚温等追金人至淮隂縣又敗之獲其舟船糧食甚衆成閔申楊欽焚敵船五百餘隻糧米五陸萬石并奪到糧船二百餘隻糧米七千餘石呉超奪到敵船大小三百餘隻糧米三萬餘石是夜淮東制置司統制官劉鋭陳敏等引兵入泗州金人既渡淮有三百人長告其千戸曰三百人皆有歸心不可彈壓奈何千戸曰郎主雖死豈無王法其弟曰兄言失矣郎主雖死兄何不只在揚州而須北歸邪彼有父母人心難留豈可以法繩之千户黙然三百人各上馬即時馳去由是西城之兵皆上馬馳出不可遏俄而東城之人亦去成閔聞金人盡去也乃遣鋭等自東城之東渡淮又令統領官左士淵等自南門入以收復告金人所掠老弱之在泗州者皆委之而去此以趙甡之遺史及成閔所申叅修閔所申稱閔統率軍馬收復盱眙軍了當其泗州淮河岸下擺泊舟船數千隻金兵數萬人隔河與官軍相距閔遂将奪下金兵燒不盡橋脚船二千餘隻併工修整及於龜山以来搶奪到敵船十餘隻并分遣統制官劉鋭陳敏王公述張師顔於十二月十五日夜於泗州東城之東潜師渡淮有敵騎數千於城東擺列前来與官軍相拒閔又分遣統領官左士淵張青魏全部押官軍攻奪泗州南門入城占據閔再率官軍戮力掩殺敵兵敗走復收泗州了當奪到粟米三萬餘石被擄老小數萬口放令渡淮歸業按史所云與遺史不同盖自来諸軍功状大率如此也熊克小歴書丙辰成閔復泗州盖誤甲寅上至無錫縣宰執奏淮東敵人已遁去淮西尚餘三萬衆據和州陳康伯等依㫖撰到招安旗榜不惟諸國之人雖女真亦一槩與補官内萬户許以節鉞其餘視爵秩髙下更超等換授白身特命以官奴婢亦優賞示之生路庶使束手來歸上曰彼亦人也比引見所招捉到金人朕亦悉貸死送諸軍役使盖首惡止完顔亮一人耳若槩殺之則不勝其多朕不忍為也趙甡之遺史丙辰上至無錫縣葢誤右宣教郎知無錫縣李森入見淮東制置使成閔言已復淮東州縣了當武泰軍承宣使提舉台州崇道觀劉寳獻助軍錢萬緡是日淮西制置使李顯忠與金人戰於楊林渡却之將士死者千四百人殺傷大當翌日敵乃去乙卯上次常州荆溪館守臣左朝散大夫葉顒右通直郎知武進縣馮百藥右通直郎知晉陵縣馬階相繼引對浙西沿海制置使李寳自鎮江入見上慰勞久之是日金人破汝州先是京西制置使呉拱遣訓練官牛宏等率忠義人據汝州㑹統軍劉萼自鄧州北歸宏等邀之於七里河敵兵盛忠義人皆無甲遂敗走敵圍之五日及城破殺戮殆盡拱在鄧州遣統制官周贇将八千人徃援之已不及丙辰上次吕城鎮武功大夫建州觀察使田開落致仕開嘗為興州右軍統領以疾求退至是宣撫使呉璘制置使王剛中言其筋力壯盛乃復用之淮東制置使成閔至泗州時土豪劉繹有衆數百在横山閔承制授繹修武郎閤門祗候權知州事丁巳上次丹陽縣宰執奏和州敵人已遁去乃議肆赦及差官撫諭上曰赦書中應亮賊暴虐等事要一切罷去仍戒所辟官屬毋得生事右從政郎丹陽縣令胡傑入見淮西制置使李顯忠遣統制官張榮逐敵至全椒縣敗之得敵所獲老弱萬餘口日暮顯忠入和州是日觀文殿大學士判建康府張浚始至本府視事浚首奏乞車駕早幸建康聞已進發乃督官屬治具不半月而辦於是資政殿學士張燾已被召辭不至改提舉江州太平興國宫戊午上至鎮江府未就舍先乗馬幸江下觀划船浙西沿海制置使李寳從上行因陳俘獲與所得百尺舟上奨諭甚至因嘆曰始朕用寳謗書滿箧至謂必復從偽今竟如何晚頓丹陽館守臣直秘閣趙公稱司農少卿總領淮東軍馬錢糧朱夏卿入見己未上幸鎮江府行宫兩浙西路提㸃刑獄公事王趯提舉常平茶鹽公事徐康入見趙甡之遺史辛酉上至鎮江壬戌入行宫駐蹕皆與日歴不同甡之又稱以和州雞籠山金兵未退故囬駐蹕按此時金兵已退四日甡之葢誤詔諸路因事干北界編管覊管居住人並放令逐便庚申中書舍人兼權直學士院虞允文入見允文論采石之役張振等以偏裨勝金亮今止賞以三官願貤臣官以賞振等上曰曩者江上事勢此何等危事此輩宣力功其可忘於是振等並落階官是月甲子降㫖是日興州左軍統制王中正等引兵再攻治平寨拔之初劉海既去治平敵益兵堅守中軍統制呉挺遣中正及知秦州劉忠共擊之殺其知寨降其招信校尉張吉甫等四人既而金人謀復取治平中正引兵於于家堡迎敵戰十餘合敵敗走官軍進擊大獲其俘中正為飛槍中其左頰者二辛酉資政殿學士致仕張綱入見殿中侍御史呉芾言知崑山縣胡庭傑知金壇縣潘文禮應辦廵幸科擾民户銀器至多詔並勒停永不得與親民差遣壬戍曲赦新復州軍契勘淵聖皇帝梓宫及天眷尚在沙漠若中原與諸國人能津致扶䕶來歸者賜銀帛五萬匹兩先是宰執進呈赦書事目上曰向已下哀痛之詔今日恩宥不必更揚完顔亮過惡但專罪己而已起居舍人權直學士院劉珙草制略曰兹强敵之干誅幸上天之悔禍爰整濯征之旅坐揚耆定之功元惡就屠餘黨悉潰宜推在宥咸與惟新自江上用兵珙獨在禁林一時詔檄多出其手詞氣激烈讀者感厲癸亥張浚言金兵已退兩淮皆定甲子徳音釋淮南京西湖北路雜犯死罪以下囚尚書戸部侍郎劉岑充徽猷閣直學士知揚州權户部侍郎張運兼御營隨軍都轉運使岑受命請歩騎萬人以行又請廢置一路官吏乃復留岑為户部侍郎中侍大夫定江軍承宣使建康府駐劄御前游奕軍統制張振為定江軍承宣使中侍大夫寧國軍承宣使建康府駐劄御前前軍統制時俊為寧國軍承宣使中侍大夫舒州觀察使建康府駐劄御前軍統制戴臯為舒州觀察使中衞大夫宣州觀察使殿前司䕶聖軍統制王琪為宣州觀察使中亮大夫濠州團練使建康府駐劄御前水軍統制盛新為濠州團練使並以在采石親與金主見陣保䕶大江功力為重故也新自以功多而賞輕抑鬰而死建康采石軍士至今憐之盛新事以王明清揮麈第三録修入盖新於接戰次日又引舟師扼楊林河口而其賞與張振等無異故自以為賞輕也武信軍承宣使淮南東路馬歩軍副都總管李横移兩浙西路常州駐劄將仕郎戴公度獻助軍錢萬緡詔以為右從事郎浙西沿海制置使李寳言表兄張讜從王雲出使不肯順畨寳在膠西見得見被拘留韓州乞與除直秘閣仍令有司訪其子孫取㫖上許之給事中金安節等言讜使事在三十五年以前韓州在燕之東北二千餘里而寳乃自謂見得不知有何所據議者謂貼職之授當自朝廷而寳乃指名乞除犯分已甚况其意又在於搜訪子孫後將有所徼覬尤不當從欲望特賜寢罷庶㡬安分守法之將帥知公議有在而益堅其尊朝廷之心在今日誠非小補是日金人所命潁壽二州廵檢髙顯率所部民兵千餘人據壽春府遂來降乙丑直顯謨閣向子固復知揚州右朝請大夫主管台州崇道觀方滋知廬州右迪功郎淮北壽亳等州招討使司幹辦公事劉藴古為右承務郎藴古為李顯忠所辟至是引對而有是命丁卯尚書户部侍郎劉岑充徽猷閣直學士提舉江州太平興國宫言者奏岑誕謾大言畧不留意職事邉報方急便為自營之計欺誑廟堂求為江上之行一路騷然初無秋毫之補用心如此所不可恕故有是命丁卯河北安撫制置使王任天雄軍節度使王友直自壽春渡淮來歸任東平人嘗以罪亡命敵重賞捕之急友直方聚衆任往大名歸之友直喜假任契丹以舉事遂破大名金主襃既立下令友直之衆並放罪令歸業為平民其衆聞之皆散去友直乃與任等自山東尋路來奔比入境有衆三十餘遂自淮西赴行在初金岐王亮既為其下所殺參知政事敬嗣暉欲立其太子光瑛於南京左丞相張浩不可併亮后圗克坦氏殺之亮所遣先鋒將郭瑞孫至滑州聞變留不進金主襃知亮已死乃與其子允升允廸擁萬騎趨中都諸路嵗鑄錢既以五十萬緡為額去年五月丙戌然是嵗纔鑄及十萬緡惟嚴州神泉監直輸行在而建韶饒贛州皆自提㸃所泛江入漕渠輸之内帑焉是嵗降空名告劄二十一萬道付諸軍以備功賞此據乾道二年八月甲午宻院宣諭聖語修入諸路上戸部主客户一千一百三十六萬四千三百七十二口二千四百二十萬二千三百三建炎以来繫年要錄卷一百九十五建炎以來繫年要録巻一百九十五金人地名考證芬徹原書作蒲察與金史同並誤今改正圖克坦原書作徒单誤改見卷一百九十二穆昆原書作謀克誤改見巻一百八十五郭勒原書作狗兒誤今改正
