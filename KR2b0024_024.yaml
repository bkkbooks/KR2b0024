body:
  text: 建炎以來繫年要録卷二十四宋李心傳撰建炎三年六月戊申朔升盱眙縣為盱眙軍宣武軍節度使東京留守杜充兼宣撫處置副使節制淮南京東西路先是朝廷聞充引兵赴行在乃除充節鉞仍節制京東西路應天大名府許便宜行事充建節不見月日按明年五月庚戌上諭大臣語有云朕待充自庶官除從官建節遂召同知樞密亦不知的在何時蜀中士大夫家有藏綸言集者載充此麻乃自資政殿大學士除其詞有云頃聞整衆而行逺舉勤王之役以事考之當在充離京師之時且附此當求他書參考至是又申命之朝議大夫御營使司參議官髙衛復為徽猷閣待制時衛添差江淮等路發運使根括諸州移用經制獻納等錢二百餘萬緡故有是命徽猷閣待制洪皓奉使至淮南邀宿泗州都大捉殺使李成以兵護送而成方與遙郡防禦使耿堅共圍楚州責通判權州事賈敦詩謂其降敵堅河北人初以義兵保護鄉井既而率所部南來至襲慶府與成會及是俱在淮東皓先以書抵成成曰汴涸虹有紅巾非五千騎不可往軍食絶不克惟命皓聞堅可撼隂遣説之曰君越數千里赴國家急山陽縱有罪當稟于朝今擅兵名勤王實作賊耳堅意動遂強成斂兵皓行至泗境諜報有迎騎介而來皓復還且上疏言李成以朝廷不恤之而稽饋餉有引衆納命建康之語今靳賽據揚州薛慶據髙郵萬一三叛連衡何以待之此含垢之時宜遣辨士諭意優進其秩畀以京口綱運如晉待王敦可也上遂遣閣門宣贊舍人賀子儀撫諭成給米五萬斛吕頥浩亦為書遺成言左右欲圗王圗霸須有天命若無天命雖以項羽之強終必滅亡頥浩怒皓不先白堂乃奏其稽留生事貶秩二等皓遂轉由滁陽以行耿堅後亦為李成所并此據洪皓行述及紹興元年正月癸亥耿靜所訴參修熊克小歷云成圍楚州責守臣趙立謂其降金蓋誤成今年冬方入楚州此時尚在徐也蓋楚守朱琳以罪去而賈敦詩實權州事克不深考耳己酉上以久雨不止慮下有隂謀或人怨所致以諭輔臣於是吕頥浩張浚皆謝罪求去上曰宰執豈可容易去位來日可召郎官以上赴都堂言闕政中興聖政臣留正等曰周書言三公燮理陰陽漢故事遇災異則䇿免三公蓋以燮理失人而至於致災宜其不免于咎太上皇帝以久隂霖雨不止宣諭宰執不及其它獨使召郎官以上言己之過失而將以收人心召和氣銷天變此宋景公所以退星舍而子韋之所以賀延夀也聖德如此御史中丞張守言陛下罪己之詔數下矣而天未悔禍實有所未至爾儻能應天以實不以文則安知譴告警懼非誘掖陛下以啓中興之業乎先是守為副端嘗進修德之説疏凡三上且曰願陛下處宫室之安則思二帝母后氊廬毳幕之居享膳羞之奉則思二帝母后羶肉酪漿之味服細暖之衣則思二帝母后窮邊絶塞之寒苦操豫奪之柄則思二帝母后語言動作受制於人享嬪御之適則思二帝母后誰為之使令對臣下之朝則思二帝母后誰為之尊禮要如舜之兢業湯之危懼大禹之菲惡文武之憂勤聖心不倦盛德日隆而天之不助順者萬無是理也及是又申言之且曰天時人事至此極矣陛下覩今日之勢與去年孰愈而朝廷之措置施設與前日未始異也俟其如維揚之變而後言之則雖斥逐大臣無救於禍漢世災異䇿免三公今位宰相者雖有勳績然其才可以辦一職而識不足以幹萬幾願更擇文武全才海內所共推者擢任之中書舍人季陵言臣者君之隂妻者夫之隂外國者中國之隂金人纍嵗侵軼生靈塗炭城邑邱墟怨氣所積災異之來固不足怪惟先格王正厥事則在我者其可忽耶臣觀廟堂之上無擅命之臣惟將帥之權太盛宫閫之內無女謁之私惟宦寺之習未革今將帥位髙身貴家溫祿厚擁兵自衛浸成跋扈之風去年禦敵嘗遣王淵桀驁不行改命范瓊心懷怏怏苖劉二賊乘間竊發豈一朝一夕之故哉逮勤王之師一至錢塘拘占房舍攘奪舟船凌轢官吏侵漁百姓恃功益驕莫敢誰何此將帥之權太盛意其有以干陽也宦寺撓權為日固久不幸維揚大臣暗於事機渡江之初得以自衒竊弄威柄有輕外朝之心上下共憤卒碎賊手亦可以戒矣比聞藍圭之流復有召命黨與相賀氣熖益張衆召僧徒廣設齋會以追薦錢塘之被害者行路見之疑其復用莫不切齒此宦寺之習未革意其有以干陽也臣又觀洪範於休徴則曰肅時雨若謀時寒若於咎徴則狂恆雨若急恆寒若以今日之事揆之尚有可言者自古天子之出必載廟主而行示有尊也前日南渡事出倉卒有司迎奉不能如禮既至錢塘置太廟於道宫而薦享有闕留神御於河滸而安奉後時行路之人見者流涕今兹駐蹕又幾月矣未聞下欵謁之詔以慰在天之靈不肅之咎臣意宗廟當之比年盜賊殺戮長吏如刲狐豚殘虐百姓如刈草艾朝廷苟且例許招安未幾再叛反墮賊計元凶之罪罔獲忠臣之憤不雪赤子之寃莫報不謀之咎臣意盜賊當之昨太母臨朝姦臣馬擴上疏謂上䇿入蜀中䇿都武昌下䇿都江寧臣常詰之苐言天子必憚逺涉由下引之以及中由中引之以及上此姦謀也擴乃西人知關陜殘破不可以遽往欲先幸蜀以便私耳側聞道路之言謂鑾輿不久居此人情皇皇未知死所立賞禁止終莫之信雖自臆度決無是事萬一有之不幾於狂乎常雨之證恐或由此自軍興以來既結保甲又改巡社既招弓手又募民兵追呼急於星火割剝侵于肌膚民力竭矣而猶求焉不幾於急乎常寒之證恐或由此且陽為德隂為刑常雨常寒隂道太盛陛下正當修德以應天能制將帥乃德之剛能抑宦寺乃德之正事宗廟以孝禁盜賊以義謀國以智安民以仁如此行之則人心悅而天意得矣吏部侍郎劉珏言北敵強大隂盛陽微故隂雨為災此羣臣所共知也若乃孝悌通神明至誠動天地此陛下所宜知羣臣未嘗言也今二聖逺在龍荒陛下居九重之尊享四海之奉亦嘗思其燕處之不安飲食之不時乎願陛下精禱於天詳見於事揭為臺觀以表望思時遣使人以伸祈請則孝悌之道至矣陛下有仁聖之資而二三執政專為蔽塞使不外見敵國己和而背之盜賊已降而殺之詔令徒文具而無其實實之不至何以能格願取建炎以來所下詔令參稽而行則至誠之道著矣此感人心銷天變召和氣之大者也上嘉納之司勳員外郎趙鼎言自熙寧間王安石用事肆為紛更祖宗之法掃地而生民始病至崇寧初蔡京託名紹述盡祖安石之政以致大患今安石猶配饗廟庭而京之黨未族臣謂時政之闕無大於此何以收人心而召和氣哉上納其言遂罷安石配享神宗廟庭靖康初廷臣有請罷安石配饗者爭議紛然至是始決罷安石配享指揮日歷不載今以神宗實録安石附傳增入王善攻淮寧不克移攻宿州統領官王冠與戰敗之癸丑詔諸路帥臣監司郡守許招來材武之士官為給食仍量材録用以知邠州權涇原路提刑司公事李宋臣有請也甲寅罷三省樞密院賞功司以其事歸本部熊克小歷己酉三省樞密院置賞功司自軍興立功將士許之自陳各以輕重推恩按賞功司乃建炎元年六月己卯李綱所置至此始罷之日歷不載會要三年六月七日詔賞功司自今月七日為頭限十日結局應干以前積壓文字並於限內結絶自十七日以後生事更不收接依舊令部官看詳經由官司各不得過三日克於元年六月始置司時不書今乃於廢司時書之以為事始蓋因吕頥浩行狀之誤而不考其詳今不取權知泰州裴淵以其衆至行在詔𨽻韓世忠軍世忠數宋世榮之罪杖殺之乙卯詔軍興以來忠義死節之家令中書省樞密院籍記姓名優加存恤訪其子孫量材録用尚書吏部侍郎劉珏試吏部尚書徽猷閣待制御營使司參議官髙衛試吏部侍郎兼御營使司參贊軍事起復直龍圗閣李逮朝請郎李承造並充御營使司參議官尚書吏部侍郎康執權充顯謨閣直學士奉祠從所請也此據本部題名詔宗室從軍充統領參謀者並赴闕御營使司言防秋在近其沿江至海岸合定地分請以知杭州康允之兼浙西制置使自鎮江府至江隂軍悉令允之措置從之丙辰詔諸路監司郡守遇朔望率見任官望拜二聖是日苖傅後軍部將韓雋犯光澤縣陷之傅之敗也雋以兵六百趨邵武軍守臣朝散大夫張髦先期遁去雋入城焚掠皆盡遂引兵趨建昌軍官吏軍民皆欲逃去守臣方昭以六十口為質揭榜通衢敢言去者以軍法從事率衆嬰城親督守備雋攻而圍之凡六晝夜昭鼓衆益厲賊死者十三四一夕遁去進犯撫州守臣中大夫林積仁聞雋在閩中已棄城走雋乃入城縱掠積仁宣和末嘗為御史靖康初以祕閣修撰守平陽寇至而遁遂坐斥至是復用之雋既陷臨川又攻湖口縣遂渡江至蘄州守臣中大夫王甡與官吏皆逃去雋引兵欲依楊進于京西道為王善張用所邀且聞進死乃還居黃陂境上會劉光世駐軍江州遣人招雋雋往見光世光世命還屯蘄州因更名世清號小韓尋詔世清添差蘄州兵馬鈐轄此以趙甡之遺史及紹興二年四月世清案欵江西提刑司奏撫州事狀紹興四年十二月十八日張致逺乞録用方昭劄子參修江西所奏稱苗傅殘黨而無其名以事考之即世清也戊午祕閣修撰俞向知揚州維揚為金所蹂未有守臣故抆拭用之向卒不赴向除命日歷不書今以紹興三年三月十五日吏部中審向蔭補狀修入命江浙淮南開畎瀦水之地以限戎馬太常少卿黎確直龍圖閣知婺州日歷確無職名此以諫院題名修入庚申隆祐皇太后至建康上率羣臣迎于郊外徽猷閣待制知平江府湯東野扈太母至行在遂以東野試尚書户部侍郎張浚奏以東野兼宣撫司參贊軍事東野建言欲圗中興當先守關中據形勝以固根本此據附傳增入不得其日且附此日歷及本部題名並無之辛酉上手詔以四事自責一曰昧經邦之逺圗二曰昧戡難之大略三曰無綏人之德四曰失馭臣之柄仍命出榜朝堂遍諭天下使知朕悔過之意帶御器械李質權同主管殿前司公事邊順權主管侍衛馬軍司公事壬戌集英殿修撰提舉杭州洞霄宫汪藻復為中書舍人乙丑顯謨閣直學士知建康府連南夫兼建康府宣徽太平州廣德軍制置使丙寅罷江浙荆湖閩廣諸縣增置射士三分之一事祖見元年六月乙亥始朝廷以諸州禁兵不足乃集民兵置巡社又增射士以助之已而言者以謂巡社不利於東南既罷之猶存十分之一至是朝請大夫王海言海陵一縣應留巡社六十三人而嵗敷民間庸錢六千三百緡利害可見民兵之法凡坊市産錢千緡鄉村田三頃並出一夫嵗租之入或不足以供辦而點丁之際盡取其力穡之人此尤拂於人情新法弓手教習神臂弓專以捕寇故應募者鮮而諸縣更令上户雇募每名嵗用之數殆踰百千三者非蠢朴之農夫即浮浪之凶徒使百姓重困而無益于用况三役並行於一時其何能給詔樞密院看詳故有是旨既而言者以為無益乃罷武尉不數年而所增射士盡廢之罷武尉在紹興元年十月己卯盡罷新法弓手在紹興四年正月甲戌以其事體不大故牽聯書之丁卯右司諫袁植罷初植請再貶汪伯彥而誅黃潛善及失守者權邦彥朱琳等九人上曰渡江之役朕方念咎責己豈可盡歸大臣植乃朕親擢雖敢言至導朕以殺人此非美事吕頥浩曰聖朝弼臣罪雖大止貶嶺外故盛德可以祈天永命植發此念已傷和氣滕康曰如植言傷陛下好生之德矣乃下詔略曰朕親擢袁植置之諫垣意其補過拾遺以救闕失而植供職以來忠厚之言未聞殺戮之事宜戒可出知池州明日康見上曰大哉王言太祖以來未嘗戮大臣國祚久長過於兩漢者此也未幾潛善卒于梅州尚書司勳員外郎趙鼎行右司諫宣義郎監登聞檢院吕祉特轉一官守右正言祉上疏論致治之要以聰明為本其大略以謂善持養之則聰日聰明日明利及天下而生靈皆蒙其福不善持養則聰日不聰明日不明害及天下而生靈皆受其禍所以為堯舜為文武為桀紂為幽厲者皆由是也持養之道要在有益於聰明者為之勿以小善為無益而弗為也有損於聰明者去之勿以小惡為無傷而弗去也疏入上召對祉復進三䇿其一曰自古撥亂同於創業之君如漢髙祖唐太宗是也漢髙祖任用蕭何張良韓信號為三傑然蕭何主管籥給軍食而不預謀議張良侍帷幄運籌䇿而不預戰鬬至於韓信則盡護諸將握兵在外他事並不預也唐太宗時房元齡長於謀杜如晦長於斷王圭魏徴善議論李靖李績能用兵亦各效其力是以有功大抵天下事非一夫所能專任而况多事之際乎臣願陛下廣漢髙祖之大度法唐太宗之英斷執政大臣稍均信任因其所長咨訪任使如漢之三傑唐之諸臣使之同心協力共濟艱難庶幾簡要而易為專精而有功樞機之任各稱其職不負陛下委任責成之意其二曰自古得天下必以人心之同其失天下必以人心之異故曰受有臣億萬惟億萬心豫有臣三千惟一心商周之廢興盡在是也自蔡京王黼更進用事異同之論起士大夫僥幸茍且各顧其私恩而不復知有公誼雷同相從隨聲是非朋黨之風盛亷恥之道喪不聞有一人履公守正表倡在位同心同德以尊主庇民為心者欲望聖慈下詔布宣德意以鼓動士氣開衆正之路杜羣枉之門則人心自歸國威自振中興之業庶幾可圗矣其三曰乞付諸大將節制之權疏奏上悉嘉納既退遂有是命祉建陽人也祉行狀不云何人所薦當求它書參考罷諸州新置州學教授員此以紹興二年四月三日吏部申明狀增入中大夫知信陽軍劉絳除名郴州編管以京西都轉運司言絳正彥叔父恐難任守臣故也此以紹興五年閏二月十七日絳進狀修入戊辰上諭大臣曰祖宗時不忘武備如鑿金明池蓋亦習水戰朕非久欲親閲諸將所部人馬仍召卿等共觀庶以知諸將能否後避敵不克行詔以防秋在近自京南至鎮江府沿江巡檢五十有五員令樞密院各擇材武可仗者一人為之二其土軍有闕者並招填之承議郎新知富順監馮楫特轉一官以楫嘗貽書苖傅論復辟事故也初張浚自髙郵歸薦楫於上得召對楫奏陛下前日杭州復辟之事臣亦薄效區區自大臣而下皆知之但無肯為臣言者上曰太后嘗言之翌日上以問輔臣李邴鄭玨曰果有之遂命進秩後三日以楫為尚書司勳員外郎日歷楫除郎在二十八日乙亥而楫臨安録載此省劄在二十四日今從之升公安縣為軍以其能捍禦也庚午中書舍人汪藻兼直學士院辛未上諭大臣曰近有上言者請朕與皇太后異宫豈有是理朕事皇太后如事母帷帳皆親視或得時果必先獻祖宗奉太后然後敢嘗外人安得有此論張浚曰此氣象甚好以陛下容納直言故有此狂直之士也御營使司奏諸軍並以萬人為一軍每軍十將共置統制五員逐軍各置虎符於御前收管非降虎符毋得擅出營違者從軍法每統制官為軍籍三本一上之御前一納御營使司一留軍中逐季揭帖諸軍不得互相招收奏可時諸將方自擅迄不行癸酉樞密院言自兵興至今軍政事務倍於平時欲依祖宗朝置檢詳官兩員請給視檢正官序位在左右司之下編修官四員止存一員依舊看詳條法從之日厯無此今以紹興三年六月十日本院奏狀修入遂以編修官李唐俊兼權檢詳諸房文字此據本院官屬題名附入題名在六月故附于此明年七月始正除萬格龍圖閣待制提領水軍沿江措置使陳彥文試尚書兵部侍郎仍充措置使尚書右司員外郎劉寧止直龍圖閣同提領水軍充措置副使彥文初除雜學士至是又改命之中奉大夫黃叔敖承議郎傅嵩卿並為中書門下省檢正官嵩卿墨卿弟也樞密院編修官秦梓提舉荆湖南路茶鹽公事降充直祕閣知荆南府唐慤復祕閣修撰甲戌上自神霄宫入居建康府行宫御史中丞張守試尚書禮部侍郎守嘗論吕頤浩不可獨任而張浚不宜西去上不然之會有旨以東京糧運不繼復命大中大夫梁揚祖為發運使専切措置糧運以餉中都右司員外郎兼權給事中劉寧止言其不可詔以次官書讀行下遂命起居郎綦崈禮兼權給事中守言揚祖不可用請罷之中書舍人季陵亦封還録黃論揚祖前為發運使不能積粟以實中都道路梗澀未及半年而中都之人至於相食此揚祖之罪孰謂揚祖知首尾乎東京糧運不繼非有難曉有糧而無舟有舟而無人有人而無水有水可運而盜賊奪之三尺之童亦能知此孰謂發運司官不能知乎又緣給事闕官左史當攝崈禮既已供職寧止自當引退外人不喻皆謂朝廷因揚祖之故特用崈禮而罷寧止此事不可户曉臣恐天下以言為諱也守再上疏論列不報疏三上揚祖乃請奉祠守言揚祖以自請得祠是臣在憲臺言無可采因乞補外遂有是命守力辭不拜上命吕頥浩召守至政事堂以正士不宜輕去朝廷守乃受命中書舍人范宗尹為御史中丞宗尹首言金人為國大患戰之不能勝禦之不能却固己敝矣兩河陷沒陛下駐蹕維揚敵騎遽至僅能匹馬渡江至錢塘未閲月而苖劉之變生於肘腋此皆禍之大者其小者不可悉數大抵所為皆不成所向皆不利豈徒人謀乖剌實由天意之未回也茍不能隱忍順受以紓目前之急深恐天意之不測别致非常之禍此臣所以日夜寒心也設若敵騎深入當以控扼之事責之將相陛下姑引而避之言至于此可謂無䇿然譬人之大病垂絶投之善藥但得不死徐議補治陛下誠能側身修行以享天心發政施仁以從民欲選將練卒繕甲儲糧數年之後以弱為強孰曰不可則今日之無䇿乃為異時之長䇿也中書舍人季陵亦言國家之根本在東南東南之根本在建康雄山為城長江為池舟車漕運數路輻湊正今日之關中河內也陛下所當守亦敵人所必攻九江上流有建瓴之勢淮南諸郡有唇亡之憂今去防秋無日矣事之急者除盜賊習水戰凡要害之地屯兵以守之謀議之善固無以易此然臣之區區竊有管見自古無守城天子以天子守城則內重而外絀臣願陛下為馬上之計先定兵衛及扈從之臣精其選使可倚仗寡其數使易供億預詔郡邑各備巡幸使人不駭相時而動初無定方使人不測萬一敵勢縱橫便當整駕親按營壘召諸道之兵以為援師留將相大臣相率以死守鯁其喉牙使不能搏食東南是乃深根固本之道勿效前日百官跣足奔竄以扈蹕為名棄城池以與敵使生靈墮於塗炭財用填於溝壑而不恤也宗社安危在此一舉惟陛下早圗之宗尹陵所上疏不得本月日因宗尹入臺附見陵此月末得祠其建言當亦在此時也通直郎新提舉兩浙路市舶沈與求守監察御史與求德清人嘗為太學博士張守所薦也徽猷閣待制知郢州席益再任直龍圗閣知德安府陳規升祕閣修撰朝議大夫知復州韓儼直祕閣皆以守境故有是命季陵外制集有席益知渭州告詞不知在何時當考乙亥詔諭軍民以迫近防秋已令杜充提重兵防淮又於七月下旬恭請隆祐皇太后率六宫宗室近屬迎奉神主前去江表朕與謀臣宿將戮力同心以備大敵進援中原應官吏士民家屬南去者官司毋得禁先是東京留守杜充將赴行在檄直龍圖閣知蔡州程昌宇為留守判官至是昌宇入京城視事時京城自四門外餘皆闔人以為病昌宇至欲盡闢之又遊手雜食市多鼠竊犯者雖一錢亦死昌宇欲寬為一千副留守郭仲荀皆不聼始昌宇之離蔡也吏士皆持半月糧既而食盡乃挑野菜而食此據昌宇家傳修入家傳云六月杜充赴行在檄公為留守判官月中至京師視事乙亥二十日也故因降詔附見趙甡之遺史於閏八月書昌宇除留守十月書昌宇入京師恐誤自渡江以來百官除拜非侍從並尚書省出敕至是言者以為有係招撫及行軍出給之人非惟無以示信且事體削弱乃詔自今帶貼職及遙郡人出告朝奉武翼大夫已上出敕餘並給付身中書舍人季陵罷為徽猷閣待制知太平州陵論遣張浚宣撫陜蜀任太專非是議既忤乃自引求去未行改提舉亳州明道宫旋奪職祕書省著作佐郎富直柔尚書禮部員外郎承事郎胡寅為駕部員外郎直柔之除禮部題名在二年五月祕書省題名在今年五月與日歷不同當考是日金人陷磁州初金人圍城急軍校楊再興等作亂殺權守趙子節推將官蘇圭領州事圭曰有三事能從我則可衆曰試言之圭曰我欲率軍民奪路歸京師見宗元帥如何時澤已死城中未知也衆曰不可又問與汝等力戰如何又不可圭曰盍開門乎衆不應於是圭率衆請降金人以素隊至城下且折箭為誓曰不殺人丙子金縱米麵入城其價頓減數十倍時磁州武安縣城守甚固金不能攻及聞磁降乃下是夏賊貴仲正破嶽州詔遣兵討捕既而起復奉議郎通判襄陽府程千秋招降之千秋因留以為將日歷只於正月書貴仲正犯嶽鄂一句更無首尾惟紹興三年五月庚午知嶽州范寅敷奏乞免稅狀云本州昨據貴仲正占據州城蒙朝廷遣大兵殺散他書亦無仲正事迹按趙甡之遺史有千祕統兵官貴仲正即其人也故附此或是千秋為沿江制置時所招亦未可知馮楫時議録有建炎四年代袁植與李允文書云巴陵先于去年春間延燒殆盡至夏又遭貴仲正殘破則嶽州之破決不在此時但無書考其月日耳仲正之死附今年十一月丁未蓋以紹興元年六月甲戍解潛為渠成乞贈官狀修入亦須詳考建炎以來繫年要録卷二十四
