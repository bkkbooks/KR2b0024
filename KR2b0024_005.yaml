body:
  text: 建炎以來繫年要録卷五宋李心傳撰建炎元年五月庚寅朔兵馬大元帥康王即皇帝位於南京改元建炎中興聖政臣留正等曰堯舜所以髙出百王者以其得天下及其傅天下而知之湯有慙德武未盡善况於後世乎漢髙祖唐太宗號為賢君然其得天下也以爭其傳天下也幾以致亂大哉太祖皇帝之受命與太上皇帝之中興也謳歌獄訟歸而不釋則不得已而履大位及夫為天下得人則舉成業授焉不詢羣臣不謀卜筮惟視天意之所在而已自堯舜以來數千載始有太祖及我太上皇帝豈非希闊甚盛之際哉之何俌龜鑑羣陰翳大明出羣籟喧大聲發天下事激則起不激則靡天之開聖人蓋如是也且我髙祖之生紅光薦瑞蓋大觀之元年也是年金人欲背遼國已三嵗矣豈能終事我哉我心之不臧天實知之於是亟生吾聖人以平之我髙祖之封靖康著符蓋宣和之三年也是時金人倚我為助又五嵗矣以燕伐燕虐尤甚焉安知其不加諸於我哉國事之失圖天實念之於是天任吾聖人以定之逮及末年四郊多壘敵於我乎請命我以單車臨之而見者奪氣靖康改元不虞薦至敵伺我釁又以一身當之而聞者縮頸至相而百姓遮道次濟而父老迎謁人心歸矣渡子河而河氷合至磁州而神馬迎天心眷矣開府之初宗澤自磁至王麟自潞至梁揚祖自信德府至張俊楊沂中皆已在麾下即位之日劉光世自鄜延至路允迪范宗尹自京師至則天下豪傑之心歸矣而况賜袍之夢已應賜帶之言已驗勸進之書雖上而東鄉西鄉且謙遜而不受惟三月丙寅張邦昌以稱臣之意至越翌日丁卯謝克家以受命之寶至四方民大和會侯甸羣后咸在然必候道君便可即真之札然後不得已而就南京踐天子位焉此與肅宗即位靈武之事異矣初議年號黃潜善定為炎興耿南仲曰此蜀年號也衆皆服遂為建炎議即位儀耿延禧以為必築壇告天王然之乃令有司築壇於應天治門之左命王府記室參軍滕康作冊告天撰文肆赦汪伯彥中興日厯云冊文係朱勝非撰按紹興日厯滕康家自陳乃康所撰伯彥誤記也赦文詆斥圍城士大夫有憤怒意王命延禧改定其叙邦昌事但云仍抑臣僚俾僣位號而已又云圍城士大夫一切不問遂以南仲為禮儀使而延禧讀冊文時太常寺主簿張浚自京師馳至因以浚攝太常少卿導引行事昧爽皇帝登壇寅受天命冊文曰嗣天子臣構敢昭告于昊天上帝金人內侵二帝北狩天支戚屬混于穹居宗社罔所依憑中外罔知攸主臣構以道君皇帝之子奉宸㫖以總六師握兵馬元帥之權倡義旅以先諸將兾清京邑復兩宫而百辟卿士萬邦黎獻謂人思宋德天眷趙宗宜以神器屬於臣構辭之再四懼不克負荷貽羞於來世九州四海萬口一辭咸曰不可稽皇天之寶命栗栗震惕敢不欽承尚祈陰相以中興於宋祚讀冊畢上南鄉慟哭久之即位于應天府治之正㕔簾陛如殿儀耿南仲汪伯彥黃潜善耿延禧董耘髙世則賀上訖陛殿侍立權尚書左僕射張邦昌率百官稱賀班退大赦天下命西京留守司修奉祖宗陵寢罷青苗錢應死節及殁於王事者並推恩奉使未還者祿其家一年選人在職非在職者並循資臣僚因寇去官者限一月還任潰兵羣盜咸許自新係官缺負不以名色皆免南京及大元帥府嘗駐軍一月以上者其夏稅悉蠲之應天府特奏名舉人並與同出身免解人與免省試諸路特奏名三舉以上及宗室嘗預貢者並推恩州郡保守無虞者與推恩應募兵勤王之人以所部付州縣主兵官訖赴行在中外臣庶並許直言自今命官犯罪更不取特㫖裁斷布衣有材略者令禁從監司郡守限十日各舉一員餘如纍朝故事上時年二十一後名所築壇曰中興受命之壇中興聖政臣留正等曰自古人君即政之初必有大慰天下之望故事有利于民而未興者則興之有不便於民而未去者則去之雖以舜而繼堯號為重華協于帝傳授一道然猶舉前世之未舉者如十六相去前世之未去者如四凶命九官使各居其任肇十有二州使各有其工况時異事殊可無所因革以一新大政乎春秋記列國之君為政必有施舍已責逮鰥寡振廢滯等事列國猶爾况有天下之君乎是宜太上皇帝之始即政也求文武才略之士絶姦邪誤國之人以散斂青苗與上供之所增加稅賦之規出剩皆政之所宜革者而悉罷去之以褒賞死節講求民瘼皆務所宜先者而悉舉行之即斯數者則其餘可以類求是以天下之人心皆翕然欣戴於已成中興之業而垂無窮也禁何俌龜鑑罷青苗錢蠲常平榖裁損上供嵗增之數止州縣納稅槩量賦斂違法之弊是所以回建隆至仁之脉而曩時誤國害民如京貫黼勔等子孫更不復叙又所以懲崇觀不仁之轍歟尚書左丞馮澥延康殿學士簽書樞密院事曹輔以宗社失守上疏待罪耿南仲與張邦昌進呈三省事即日拜徽猷閣直學士兵馬副元帥黃潜善為中書侍郎顯謨閣直學士兵馬元帥汪伯彥同知樞密院事元祐皇后在東京是日撤簾辛卯尊靖康皇帝為孝慈淵聖皇帝元祐皇后為元祐太后既而尚書省謂元字犯后祖諱請以所居宫為稱詔學士院擬定汪伯彥中興日厯辛卯元祐皇后為隆祐太后諸書皆同之臣謹按上宫名改尊稱在八月庚午諸書誤也詔宣仁聖烈皇后保佑哲宗有安社稷大功姦臣懷私誣衊聖德著在史册可令國史院差官托實刋修播告天下吕中大事記當靖康元年二月敵退之後士大夫爭法新舊辨黨邪正識者譏其治不急之務今髙宗即位首詔改宣仁謗史不幾復蹈前轍邪曰不然張敬夫謂此乃撥亂反正之宏綱古今人心之天理蓋我朝之治元祐為甚母后之賢宣仁為最當熙豐小人相繼用事之後使非繼以元祐則中原之禍不待靖康而後見當京師失守之時使非元祐之治在人耳目又何以開炎興之運哉此宣仁之功也章蔡初意不過欲去元祐之人耳而至於變元祐之法又慮元祐之人復用也而至誣以廢立之罪謗及宣仁一念之私燎原滔天可畏哉大元帥府限十日結局召副元帥宗澤赴行在中書舍人孫覿張棣並依舊職宣教郎王府記室周望守尚書考功員外郎寶文閣直學士浙江荆湖等路經制發運使翁彥國知江寧府兼江南東西路經制使落直字賜彥國鈔鹽錢十萬緡使修江寧城及繕治宫室以備巡幸此據李綱建炎進退志又命築景靈宫於江寧府帝后異殿其後不克成寶文閣直學士趙子嵩請對首論臺諫本人主耳目近年率觀望取㫖言事用非其人請依故事聼學士中丞互舉又論范祖禹常安民上官均先朝言事盡忠請録其子上甚然之子嵩因建三屯之議大略以為開邊之患驗在目前不可不慮其熙河五路進築州軍堡寨欲望將不係緊要控扼去處並罷明諭夏人示以德意諸郡守戍之兵分屯陜西見在兵馬與河東北之兵合六萬人分為三屯一屯澶淵之間一屯河中陜華之間一屯青鄆之間平時訓練以備非常足張聲勢萬一敵騎南渡則三道並進深入搗燕山之虛焚舟渡河人自為戰未必不成功也壬辰宰執奏事張邦昌先退上問何以處邦昌黃潛善等曰邦昌罪在不貸然為金人所脅不得已而從權今已自歸惟陛下所處上曰朕欲馭以王爵使異時金人有詞則令邦昌以天下不忘本朝而歸寶避位之意告之輔臣皆曰陛下聖意髙逺非臣等淺智所及是夕召學士草制以銀青光祿大夫守尚書左僕射兼門下侍郎張邦昌為太保奉國軍節度使封同安郡王五日一赴都堂參决大事檢校少傅寧武軍節度使河北河東宣撫使范訥為京城留守威武軍承宣使鄜延路馬步軍副總管劉光世為省視陵寢使元帥府參議官龍圖閣學士耿延禧徽猷閣學士董耘越州觀察使髙世則並提舉萬夀觀留行在延禧耘仍兼侍讀寶文閣學士趙子嵩為延康殿學士知鎮江府隨軍轉運使集英殿修撰梁揚祖為徽猷閣待制知揚州隨軍應副直龍圖閣黃潜厚試尚書户部侍郎幹辦官直龍圖閣王起之為屯田郎中直祕閣楊淵行工部員外郎秦伯祥為虞部員外郎日厯子嵩延康鎮江之命於壬辰癸巳兩書之今併附此資政殿大學士知京兆府范致虛知鄧州充南道都總管應知州銜內帶一路安撫者不書惟初創或更革則書朝奉大夫河北轉運判官顧復本為北道副總管復本臨子也臨會稽人日厯復本無前銜汪伯彥中興日厯云河北轉運判官顧大夫哲宗朝翰林學士顧臨之子伯彥忘其名即此人也復本靖康元年八月除河北運判龍圖閣待制知延安府張深充龍圖閣直學士知京兆府起復直徽猷閣陜府西路計度轉運副使王庶升直龍圖閣知延安府應監司帥臣銜內帶權知權發遣之類今並削去以就省文庶慶陽人也深時將勤王兵來衛故就用之後十餘日深入辭乃移深知熙州而復以范致虛知京兆府二人改除在此月丁未今并書之李觀紀行録深除延安在癸巳今從日厯侍御史胡舜陟言今日措畫中原宜法藝祖命郭進李漢超董遵誨等守邊之術以三京關陜析為四鎮拱滑潁昌𨽻東京鄭汝河陽𨽻西京恩濮開德𨽻北京而同華陜府𨽻京兆擇人為節帥使各以地産之賦養兵自衛且援鄰鎮又京帑積錢千餘萬緡宜給四鎮為糴本若四帥得人庶幾中原不失江左可居詔付三省未幾舜陟罷去議遂格癸巳遙尊韋賢妃為宣和皇后國朝循前代之制帝母稱皇太妃至是以道君皇帝在行而特上尊號立嘉國夫人邢氏為皇后趙甡之遺史云上即位欲立後宫潘氏為皇后吕好問諫以為不可乃以為賢妃它書皆無之也門下侍郎耿南仲罷為觀文殿學士提舉杭州洞霄宫上薄南仲之為人因其告老故有是命耿延禧中興記云張邦昌已復辟臣耿南仲奏臣素拙得遭遇皇帝竭盡愚直惟靖康行遣蔡氏其徒實繁必不利臣父子乞大王保全上曰今日之事吾最痛心其次門下侍郎父子耳且老矣月以數百千養一前朝老師傅直易耳人言毁譽何足信因泣下按南仲誤國天下共知非因行遣蔡氏而被排也今不取甲午資政殿大學士新除領開封府職事李綱為尚書右僕射兼中書侍郎按上在濟州與綱書已稱伯紀觀文相公而此猶自大資政除蓋未有成命故也趣赴闕先是黃潜善汪伯彥自謂有攀附之勞虛相位以自擬上恐其不厭人望乃外用綱二人不平繇此與綱忤直龍圖閣東道副總管權應天府朱勝非召試中書舍人延康殿學士何志同知應天府日厯志同前銜帶端明殿學士蓋誤定武軍承宣使龍神衛四廂都指揮使大名府路馬步軍副總管大元帥府都統制楊惟忠為建武軍節度使主管殿前司公事賞翊戴之功也日厯惟忠建節在八月庚申按惟忠以都統制結局無緣百餘日方有除目今從趙甡之遺史附此通直郎傅亮直祕閣通判滑州亮為人徑直議論不能屈折執政不喜之滑兩經殘破無城壁會趙子嵩薦亮之才得召見亮上疏自陳曰陛下能歸東都則臣能守滑陛下未歸則臣亦不能守也執政責其語以為悖傲不遜降通判河陽日厯甲午傅亮除直祕閣通判滑州用趙子嵩薦召對改通判西京蓋因汪伯彥中興日厯所書也按李綱進退志載亮本末差詳今掇取附入但綱稱亮除知滑州與諸書不同恐誤亮通判河陽在五月戊申中書侍郎黃潜善同知樞密院事汪伯彥共議罷民兵及降盜而揀其士馬之精鋭者𨽻五軍是日以元帥府左軍副統制孔彥威為東平府兵馬鈐轄右軍副統制劉浩為大名府兵馬鈐轄先鋒統制丁順為滄州兵馬鈐轄秉義郎王善為雷澤尉浩所將皆民兵而順與彥威帥府所降諸盜也未幾順善作亂於河北乙未恭謝鴻慶宫上大慟羣臣皆哭太常少卿劉觀因導駕面陳藏九廟神主事上嘉嘆久之以五月二十一日為天申節尚書右丞馮澥罷為資政殿學士知潼川府延康殿學士提舉萬夀觀李回知洪州兵部尚書吕好問守尚書右丞好問持元祐太后手書來賀此據好問辨受僞命劄子上勞之曰宗廟獲全皆卿之力遂有是命尚書右司員外郎宋齊愈試起居郎齊愈自京城走行在自言以病在告不與僞楚事故擢用之工部尚書王時雍提舉成都府玉局觀放謝辭言者論時雍昨留守東京金人取皇族遣之殆盡及取其壻太學博士熊彥詩則設計為免後金書廢帝百官相持以泣時雍獨無戚容已而百官哭於南薰門時雍亦不預又竊禁中寶物以遺金使為名自以兼將相之重請用二府韀蓋曾不知愧有何面目復見陛下故時雍遂罷自是受僞命者稍稍引退矣熊克小厯時雍自吏部尚書罷蓋誤今從日厯詔自今天文休咎並令太史局依經奏聞如或隱蔽當從軍法李綱行至太平州聞上登極上疏論時事大略謂和不可信守未易圖而戰不可必勝此三者臣慮之至熟非望清光於咫尺之間未易殫言又言恭儉者人主之常德英哲者人主之全才繼體守文之君則恭儉足以優於天下至於興衰撥亂之主則非英哲不足以當之惟其英故用心剛足以斷大事而不為小故之所搖惟其哲故見善明足以任其君子而不為小人之所間在昔人君體此道者惟漢之髙光唐之太宗本朝之藝祖太宗願陛下以為法日厯於乙未蠔綱所上疏乃誤蠔綱十議中第一劄子今從綱建炎進退志修入而吕中大事記嗚呼天之愛人甚矣有感於人事之變迫于氣數屈伸消息之不齊然後不得已而降殃咎焉然是氣之屈於此也則必有以伸於彼其消於今也必有所以息於後是以天將降非常之禍於斯世則必為之預出非常之人以弭之使夫國家將有所依而立生民之類不至於糜爛泯沒而無餘是則理勢之必然而天所以為天者其心固如此也若李公者其天之所出以弭宣和靖康之禍而開建炎紹興之業也歟當上即位之初誤國之臣不可用僞命之臣不可用張趙之德望未孚天下人望之所歸者李公一人而已上不自內用汪黃而自外召綱則髙宗之志主於恢復可見矣觀上未即位時與公書云王室多故乘輿䝉塵方今生民之命急於倒垂諒非有不世之才何以成協濟之功則髙宗屬意於公久矣逮為汪黃所擠才七十五日而去位豈天意未欲恢復耶賊党忠犯淮陰縣從事郎權羅山縣尉李逈秉義郎監酒稅趙士壯率民兵拒戰為所殺此據紹興四年二月辛卯八年九月甲子逈士壯家乞推恩狀修入金左副元帥宗維既班師留諸帥分守河東北地於是女真萬户尼楚赫屯太原女真副統素赫屯真定女真萬户羅索圍河中女真副統䝉克進據磁相渤海萬户大托卜嘉圍河間是日命龍神衛四廂都指揮使馬忠通侍大夫欣州觀察使張換將所部合萬人自恩冀趨河間以襲之丙申尚書右丞吕好問兼門下侍郎集英殿修撰新知湖州胡交修召試中書舍人朝散大夫王府記室滕康守太常少卿尚書工部員外郎蘇遲守右司員外郎遲轍子也轍眉山人元祐門下侍郎觀文殿大學士提舉西京嵩山崇福宫徐處仁為大名尹北道都總管初南都之圍也處仁在城中都人指為姦細殺其長子直祕閣庚處仁因感疾此據林泉野記至是猶力疾入見而行處仁附傳云上為大元帥移軍睢陽以處仁為大名尹日厯五月丙申命徐處仁太名尹張慤發來赴闕今從日歷延康殿學士簽書樞密院事曹輔薨時前執政皆免上獨留輔始輔至南都首陳五事一曰分屯要害以整兵伍二曰疆理新都以便公私三曰甄拔人才駕馭用之四曰經制盜賊恩威並行叛而討之服而舍之五曰裂近邊之地為數節鎮以謹防秋上嘉納未幾輔得傷暑病至是薨後諡忠達諡在淳熙十年今因輔薨併書之後准此丁酉中書侍郎黃潜善兼御營使同知樞密院事汪伯彥兼御營副使自國初以來殿前侍衛馬步司三衙禁旅合十餘萬人髙俅得用軍政遂弛靖康末衛士僅三萬人及城破所存無幾至是殿前司以殿班指揮使左言權領而侍衛二司猶在東京禁衛寡弱諸將楊惟忠王淵韓世忠以河北兵劉光世以陜西兵張俊苖傅等以帥府及降盜兵皆在行朝不相統一於是始置御營司以總齊軍中之政令因其所部為五軍以真定府路馬步軍副總管王淵為使司都統制諸將韓世忠張俊苗傅等並為統制官又命鄜延路馬步軍副總管劉光世提舉使司一行事務潜善伯彥别置親兵各千人優其廪賜議者非之臣謹按建炎置御營司乃軍政之大者而史官不能紀其本末熊克小厯略書其事乃係于今年七月並命二相時實甚誤矣克又云除劉光世為都統制亦誤潜善伯彥别置親兵它書不見馬伸劾疏有之發吕中大事記國朝兵權隸於三衙本之樞府樞府有兵之權而無握兵之重三衙有握兵之重而無發兵之權今不復三衙而别置御營司分委之樞府而置御營使其後專掌兵權樞府不得而預議者以本朝故事分為兩府又置御營使是政出於三此趙鼎所以舉行故事以正西府之權范宗尹所以兼樞密使而罷御營使宜也詔京西統制官翟興團結義兵保護祖宗陵寢命陜西諸帥招兵積糧遣統制官薛廣以所部三千人出內黃張瓊以三千人出開德共復磁相廣本班直去為盜掠隨郢復諸郡至是就招中奉大夫提舉成都府玉局觀王時雍責授安化軍節度副使黃州安置以言者論時雍圍城中擅行三省事也日厯時雍無前銜按元符詔㫖時雍宣和六年以朝議大夫除户部侍郎今增入其它史無前銜者皆以它書補定之翰林學士承㫖吳幵言國家禍變不能死節乞正典刑吏部尚書兼翰林學士莫儔言久留敵營備遭困辱乞置散地疏皆三上詔幵充龍圖閣學士提舉江州太平觀儔述古殿直學士提舉亳州明道宫尚書吏部侍郎謝克家為翰林學士知制誥克家以祖諱辭乃命中書舍人李擢朱勝非兼權直學士院時庶事草創書詔填委而院無几案勝非常慿敗鼓草詔然辭氣嚴重如平時勝非直院日厯在六月丁卯今依學士院題名附此更俟詳考徽猷閣待制元帥府參議官顔岐試御史中丞起居郎宋齊愈試左諫議大夫監察御史馬伸守殿中侍御史承議郎潘良貴為左正言鴻臚寺主簿鄧肅守右正言奉議郎盧以中守監察御史良貴金華人嘗為尚書郎靖康中召還坐狂率斥去至是復用以中歙縣人也熊克小厯吳幵莫儔謝克家顔岐除罷並在戊戌今從日厯户部侍郎邵溥兼京城副留守右武大夫惠州團練使韓恕知東上閣門事恕琦孫其父嘉彥尚神宗女為瀛海軍承宣使戊戌詔曰故尚書吏部侍郎李若水忘身為國知死不懼忠義之節無與比倫達於朕聞為之涕泣可贈觀文殿學士賜其家銀帛五百匹兩官子孫五人時尚書右丞吕好問為上言若水之忠故有是命資政殿學士提舉醴泉觀路允迪龍圖閣學士提舉南京鴻慶宫兼侍讀耿延禧為京城撫諭使副熊克小厯允迪等出使在己亥耿延禧中興記亦云初十日臣受敕充京城撫諭副今依日厯附初九日戊戌蓋戊戌降㫖己亥受命也修職郎王倫特遷朝奉郎假刑部侍郎充大金通問使進士朱辨為修武郎副之從事郎傅雱特遷宣義郎假工部侍郎充大金通和使武功大夫趙哲副之倫毅子熊克小厯倫旦孫趙甡之遺史云倫旦之後王明清揮塵後録云倫三槐之裔祖端父毅俱以才顯按倫乃旦弟兵部郎中旭之元孫旭生通議大夫端端生朝奉大夫元元生毅官至朝散郎上書勒停已見崇寧五年正月乙巳記甡之明清皆小誤蓋汪藻行倫制詞有胄出公侯之句而傳者遂因之家貧無行好椎牛沽酒往來京洛間以俠自任數犯法幸免京城之陷也淵聖御宣德門都人喧呼不止倫乘勢徑造御前曰臣能彈壓之帝即解所佩夏國寶劔賜倫倫曰臣未有官豈能彈壓遂自薦其才帝亟取片紙書曰王倫可除尚書兵部侍郎倫下樓挾惡少數人傳㫖撫定都人乃息宰相何㮚以倫小人無功除命太峻奏補修職郎斥不用賜劔據王明清揮麈録修入它書無之王銍嘗為倫作御劔銘其事决不妄然明清又云靖康末李士美罷相就第倫忽直造拜於堂下士美問其所以正道自言願隨相公一至禁中有欲白於上士美曰方退間薦士非所預也正道自此日掃其門㑹有㫖令前宰執赴殿庭議事正道久拜而懇曰此倫效命之時也士美不得已因携之而入倫自陳於殿下曰臣真宗故相王旦之孫也有致君澤民之術無路而不得進宣和中上書言大遼不可滅女真不可盟果如臣言今圍城既急他無計策臣謹當募死士數萬願陛下侍上皇挾諸王奪萬勝門决圍南幸欽宗忠之慰勞甚厚解所佩夏國寶劔以賜且以片紙批曰王倫事成日可除尚書兵部侍郎倫既拜賜翌日再對自言已得豪俠萬餘悉願效死願陛下勿疑即行時宰相何文縝已主和議正道怒髮上衝冠文縝斥曰若何人敢至此邪正道曰爾何人乃至此邪又曰萬一天子䝉塵雖誅相公數百輩何益文縝怒以為狂生言既不用恐為亂請上誅之且乞就令衛士執之上意未决正道懼無以自脫時孫仲益在禁中正道少與仲益有布衣舊因求計仲益曰前日所拜小戎文字在否正道腰問取御批示之仲益曰得此足矣子但立于從班中誰敢呵子豈有無故就殿上擒一侍郎之理乎倫從其言入厠侍臣之列人果不敢前翌日文縝始畫㫖送御史府倫已得間出都矣正道倫字也臣謹按李邦彥以靖康元年二月罷相未幾出知郡州尋持餘服方城危時未嘗召前宰執議事邦彥亦未嘗入朝明清實甚誤今以趙甡之遺史及中興姓氏録倫本傳修入明清又云面斥何㮚㮚欲捕治倫倫立從官班中乃得免恐亦不然今但云㮚斥倫不用庶不抵牾至是上書自伸前志乞使沙漠問二聖起居故有是命既而黃潜善汪伯彥共議改雱為祈請使閣門宣贊舍人馬識逺為副而倫辨哲不遣倫辨十一月壬辰再行遣國書外又令張邦昌作書遺二帥時潜善等復主議和因用靖康誓書畫河為界始敵求割蒲解圍城中許之潜善等乃令刑部不得謄赦文下河東北兩路及河中府解州此據宗澤奏議其乙未丁酉所遣兵且令屯大河之南應機進止雱清江人以贓罪不得改官故求出使此據紹興二十七年五月乙丑王圭劾疏修入辨婺源人識逺山東人也遂安民倪從慶等為盜浙西安撫使招降之至是以聞己亥手詔天下曰朕將謹視舊章不以手筆廢朝令不以內侍典兵權容受直言斥去浮靡非軍功無異賞非戎備無僝工若羣臣狃於故習導諛諱過大臣蔽賢所舉非實臺諫紏慝有言非公凡此之屬必罰無赦何俌龜鑑治天下不出此數十條回天下之勢者在人主一動念一轉手間耳觀此一詔則髙宗惻然之心實然之政真足以轉移天心而感動人心中興之業已卜於此矣大元帥府結局將佐吏士推恩有差時諸道勤王兵皆至行在於是陜西將官王德初𨽻都巡檢使劉光世為右軍將官德鞏縣人號王夜義者也迪功郎胡蠡假通直郎宗正少卿為髙麗國信使承節郎黃鉞假閣門宣贊舍人副之鉞以癸卯受命今聯書之是日李綱誅軍賊周德於江寧德既作亂㑹經制司屬官文林郎鮑貽遜統勤王兵七千至城下江淮發運判官直徽猷閣方孟卿檄貽遜進兵逼城德乃受招而擐甲乘城殺掠如故宣教郎知溧陽縣楊邦乂亦起民兵討之綱至太平州遣使諭以勤王德始受綱節制然猶桀驁不以時登舟欲乘間遁去綱次江寧遂與江南東路轉運判官權安撫司事李彌遜謀大犒羣賊於轉運司執德與其徒聶旺皆磔於市又誅亂黨四十四人而令提舉常平公事直徽猷閣王枋統其餘兵千人俱進貽遜龍泉人邦乂吉水人孟卿鄱陽人彌遜吳縣人枋安石從孫也庚子詔以靖康大臣主和誤國特進李邦彥責授建寧軍節度副使安置潯州責授崇信軍節度副使涪州安置吳敏移柳州責授祕書少監亳州居住蔡懋移英州遂責正奉大夫提舉南京鴻慶宫李梲於惠州中大夫提舉亳州明道宫宇文虛中韶州承議郎提舉亳州明道宫鄭望之連州通直郎提舉杭州洞霄宫李鄴賀州並安置邦彥敏靖康初共政梲虛中望之鄴皆使金請割地者故責之吕中大事記金自攻陷大原以來即以講和割地為餌李邦彥吳敏唐恪諸人皆墮其計蓋小人始者惟以拓地邀功及敵已入中國小人無功之可邀則惟幸和之可成故政和之開釁者即宣和求和之人而宣和之求和者即靖康賣國之人也此小人以和誤國尤甚於敵之以和誤我也耿南仲既以和誤淵聖猶以和沮髙宗援兵此小人之尤者上至欲手劔擊之此髙宗之初心未為汪黃所誤之時也觀此則後日遣使議和者皆非其本心矣改諸司諸軍專搆司為審計徽猷閣待制新知揚州梁揚祖為江淮等路制置發運使直祕閣京畿轉運副使向子諲遷直龍圖閣充副使詔朝奉郎提舉淮南西路香鹽公事范冲宣教郎上官愔常同令乘驛赴闕三省審察用趙子嵩之言也既而以冲為尚書虞部員外郎明年愔至行在除祕書省校書郎同卒不至冲除虞外在九月壬寅愔除校書在二年二月辛酉祕書省題名乃除祕書省正字當考辛丑詔曰張邦昌知幾逹變勳在社稷朕寵以王爵欲與同理萬務而牢避莫奪可依文彥博例一月兩赴都堂急速大政令宰執就第商議以稱朕優賢倚賴之意日厯載此詔在初四日癸巳按邦昌除太保以壬辰得㫖癸巳降制而詔中有雖已斷來章宣付都堂治事之語則決非癸巳日所降也令依僞楚録附十二日辛丑更求他書參考之先是御史中丞顔岐言邦昌金人所喜雖已為三公宜加同平章事增重其禮李綱金人所不喜雖已命相宜及其未至罷之以為中太一宫使兼經筵官置之散地㑹邦昌纍章求退故有是命岐又請罷綱章五上上曰如朕之立恐亦非金人所喜岐乃退奉議郎致仕吳給復為監察御史壬寅封後宫潘氏為賢妃妃開封人父永夀直翰林醫官局上在康邸宣和皇后為納之有寵及邢后北去妃以無名位獨得留至是遂封以梁師成第賜其叔父永思趙甡之遺史云靖康初軍事方興宣和皇后使一小鬟背負被袱步行出內欲歸韋家過潘氏之門永思之妻號郡君適在門側見而異之乃呼曰天氣隂寒請娘子略避風露宣和皇后遂造其家徐言是康王之母韋氏郡君奉之尤謹出潘氏使侍左右且遣人詣韋宅報其親屬宣和皇后亦喜知潘氏已笄而未嫁也因求潘氏歸康邸郡君許之遂同宣和皇后潜行上之出使河北也潘氏已妊娠而外人多不知故圍城中金人邀請親王眷屬而潘氏不在其數臣謹按靖康元年正月金初犯京城是時道君雖夜出門而城中未亂宣和皇后不應徒步出宫若以為城破道君徒步入宫之時則上出使已久恐必有誤且刪潤修入但妃實非永思女其父永夀紹興十四年三月十一日贈太子少師日厯有制詞甡之蓋誤江淮等路發運使梁揚祖提領措置東南茶鹽公事尚書工部員外郎楊淵同提領置司真州時東北道梗鹽莢不通揚祖言真州東南水陸要衝宜遣官置司給賣鈔引所有茶鹽錢並充朝廷封樁諸司毋得移用朝廷以為然故有是命明年八月戊辰揚祖進職朝議大夫試開封尹徐秉哲充徽猷閣直學士提舉江州太平觀延康殿學士趙子嵩言臣聞京城士人籍籍謂王時雍徐秉哲吳幵莫儔范瓊胡思王紹王及之顔博文余大均皆左右賣國逼太上皇取皇太子汙辱六宫捕繫宗室盜竊禁中之物公取嬪御都城無大小指此十人者為國賊此天下之所不赦者也張邦昌未有反正之心敵騎甫退此十人者皆日夕締交密謀勸以久假未肆赦間又復督迫之時雍奴事敵人肆出詭計辱君父以安已忘社稷以要功秉哲大均追捕宗室急於冦盜至拘濟王夫人於匱坊閉如牢獄幵儔邀請上皇詞氣軒驁上皇至泣下皇后及東宫將出都人號泣遮道瓊斬數人以徇及之為敵人搜索宫嬪而藏其美者邦昌既僣號思獻赦文直用濮安懿王諱邦昌皇恐思曰如今更理㑹甚濮王博文則曰雖欲避堯之子其如畏天之威至紹則尤為悖逆其言不可道竊聞時雍秉哲落職宫觀既不足以正典刑又不足以安反側伏望將此十人付獄鞫治明正典刑以為萬世臣子之戒此據子嵩家傳不得其日且參酌附秉哲宫觀之後金人圍河間府是日淵聖皇帝次代州遂渡太和嶺至雲中留十餘日淵聖自離都城舊臣無敢候問起居者比至代州惟工部員外郎滕茂實迎謁於道茂實臨安人靖康初假工部侍郎副路允迪出使時茂實兄祹通判代州已先降敵左副元帥宗維素重茂實乃遷之代州又自京師取其弟華實同居以慰其意茂實聞淵聖將至即自為哀詞且篆宋工部侍郎滕茂實墓九字取奉使黃幡褁之以授其友人朔寧府司士曹董詵翌日淵聖及郊茂實具冠幘號哭迎拜宗維逼令易服茂實力拒不從見者墮淚茂實請侍舊主俱行不許諸書或以茂實為嚴州人按政和八年進士題名記云滕茂實字秀頴杭州臨安人父中承議郎知解州汴都記云少帝出城時茂實詣敵營上書遂留下或傳其為尼瑪哈內相與史不同今不取欽宗實録茂實靖康元年五月自工部郎中與監當坐前為明堂令收揩書捧入已此時茂實已出疆恐是案後收坐或用衆證耳今併附此按揩書捧三字疑有脫誤癸卯詔以二聖未還罷天申節上夀常禮自是至紹興十二年皆如之太常寺主簿張浚充樞密院編修官忠州刺史姚平仲再復吉州團練使所在出榜召赴行在平仲之劫寨也既不得所欲即皇懼遁去傳者以為亂兵所殺靖康末復官再召上思其才疑其不死命所在訪之平仲竟不至或云平仲隱九江山中陸游清尊録云人嘗有見平仲於廬山者閣門宣贊舍人馬識逺提㸃淮南西路刑獄公事辛道宗提㸃京兆府路刑獄公事道宗叔獻子也初議遣識逺使金未行而有此命乙巳詔諸路勤王兵還營日令所在人賜錢三千先是勤王兵至城下者皆遣還而武義大夫淮東諸司州軍統制勤王軍馬張憲言無以激勸乃有是命時諸道兵多有散而為盜者顯謨閣直學士知東平府盧益落職奉祠直龍圖閣京東轉運判官閭邱升責授濮州團練副使封州安置益開封人坐不勤王而升以戾轅門之令為臺臣所劾也耿延禧中興記云漕臣閭邱升自招民兵三千餘上遣屯濮州敵騎至濮升能禦之汪伯彥中興日厯亦同不知何以坐不赴援逺謫當考資政殿學士簽書樞密院事張叔夜薨叔夜既北遷道中惟時飲湯義不食其粟至白溝實録叔夜從淵聖在尼瑪哈軍中自鄭州而北尼瑪哈河東軍也不知何以過白溝當考御者曰過界河矣乃矍然而起仰天大呼遂不復語翌日扼吭死時上聞叔夜與御史中丞秦檜之忠遙拜叔夜觀文殿大學士醴泉觀使檜落致仕充資政殿學士提舉醴泉觀而何㮚孫傅輩以誤國故不復録㮚至金國不食死年三十九世傳㮚在金國謀奉淵聖間道亡歸事泄金人纒以油布而焚之今從實録附傳二年三月丙午除職傅北遷年五十一後不知所終此據傅附傳林泉野記云建炎初遙加傅觀文殿學士終以不屈卒于金國而傳無之紹興元年四月己巳贈官叔夜沒年六十三吕中大事記曰靖康之難能死節者前有李若水後有張叔夜二人而已金再犯闕勤王之師無一至者獨叔夜以孤軍入衛其忠已足稱及北遷之後猶不食其粟不入其境則始終之義無憾矣李若水嘗主車駕出城者也使其不死亦在誤國一人之數惟其一死之明白昭晰故誤國之罪盡釋而言忠義者亦首稱焉若何㮚孫傅身為大臣乃引其君降敵求生其不忠不義無父無君孰大焉使其能為若水之死已不足以贖誤國之罪而乃死於敵營則其死不足言矣論者猶以二子不屈於僞楚為忠夫屈於大而不屈於小不屈於前猶或有益不屈於後復何補哉丙午追貶故相汝南忠懷王蔡確為武康軍節度副使知樞密院事衛文正公蔡卞為寧國軍節度副使故御史中丞贈少師邢恕為常德軍節度副使坐誣謗宣仁后且自言有定䇿功也紹興五年八月己未再貶詔覃恩進秩惟侍從及宗室南班官給告餘並尚書省出敕三年二月壬申可考保靜軍節度使姚古知河南府帶御器械鄭建雄知河陽徽猷閣待制知興仁府曾楙升直學士提舉西京嵩山崇福宫通議大夫王復知徐州直祕閣通判秀州趙不試升直龍圖閣知相州尚書虞部員外郎姜剛之知棣按原本州上空一字查北盟㑹編宋史俱作棣乃明人避成祖諱也今補入棣字下同州顯謨閣直學士知開德府王棣以守境有勞升述古殿直學士集英殿修撰知滄州杜充升天章閣待制充安陽人也棣真定人也古先坐覆師責散官廣州安置至是趣召天章閣待制知同州唐重上疏論五月一日赦書所施行皆非國家大利害生民大休戚今急務有四大患有五所謂急務者大率以車駕西幸為先其次則建藩鎮封宗子使守我土地緩急無為敵有先欲通夏國之好繼青唐之後使相犄角以緩敵勢所謂大患者法令滋彰而吏緣為姦朝綱委靡而士大夫相習誕謾軍政敗壞而將兵相扇奔潰國用竭矣而利源又失民心離矣而調發方興欲救此者莫若於守祖宗成憲登用忠直大正賞刑選將漕之臣擇循良之吏誠天下之大計劉岑撰重墓志蠔此疏於除永興帥之後恐誤是日金人陷河中府左武大夫貴州防禦使權府事郝仲連死之徐夢莘北盟㑹編載河中之陷在此目乙巳按張鈞續中興忠義録在五月十七日丙午蓋據川陜宣撫司案牘也今從之初金人犯河中守臣徽猷閣待制席益遁去陜西宣撫使范致虛遣仲連節制河東軍馬屯河中就權府事至是羅索以重兵壓府城仲連率所部力戰外援不至仲連度不能守先自殺其家已而城陷仲連終不屈羅索使擊殺之久之贈中侍大夫明州觀察使仲連昌元人也吕中大事記曰吾觀元年金之內侵三道也不惟監司帥府如西京之孫昭逺同州之鄭驤維州之韓浩頴川府之孫默秦州之李積淮寧府之向子褒相州之趙不試大名府之郭永濮州之楊粹中開寧府之楊𨽻晋寧軍之徐徽言長安之唐重楊宗閔桑景詢曹謂郭忠孝皆死於義雖以通判如郝仲連郭伯振縣官如陸有常張侃丁興宗郭贊將校如李政杜績趙叔皎楊彭年亦死於義降者惟劉豫傳亮等三人耳彼之所以固守者以朝廷必不棄而必有援兵也而元年即位之赦刑部指揮已不謄報於河之東北陜之蒲解是明棄三路矣使忠臣義士守孤城以待盡惜哉丁未資政殿學士京城撫諭使路允迪守吏部尚書熊克小厯允迪靖康初為簽書樞密院事奉祠去丁未召為吏部尚書按允迪今年四月自京祠為奉請車駕進發使因隨行在非此時始召之克不詳考也太常少卿滕康為起居舍人兼權給事中資政殿學士西道都總管王襄領開封府職事左諫議大夫洪芻等坐誘納宫人及括金銀自盜詔御史臺鞫之時芻在東都未至也詔文武臣僚非疾病危篤及篤疾廢疾不能任職者毋得陳乞致仕時士大夫避事求退者衆故條約焉初命經制司鬻蔡京王黼田為糴本至是經制使翁彥國言恐生弊幸請仍租與客户嵗收課利損其二分從之文林郎鮑貽遜特改宣教郎以發運使翁彥國言其招安江寧盜賊有功也於是宣教郎知溧陽縣楊邦乂亦以討亂之勞就升通判江寧府楊邦乂事據附傳增入不得其月日因貽遜改官附見是日道君太上皇帝次燕山府館於延夀寺趙子砥燕雲録道君丁未五月十八日到燕山離門三里二太子邀看剪柳枝打毬飲宴至暮次日入門於延夀寺駐蹕金人供奉甚厚六月初二日太子請道君聖眷打毬宴㑹太子捧巵跪觀道君鄭后按子砥在燕山所云日月必不妄今從之上皇以烏凌阿色哷美有迎奉勞遺以後宫曹氏曹氏武穆王彬之裔寧德后近侍也此據張匯所進節要附入時兵部侍郎司馬朴亦在燕有傳建炎登極赦書至者朴私遣持詣上皇為人所告金主憐其忠特釋之此據朴傳附見按顔岐進所編聖語云朝議大夫惠厚下及樞密院小吏楊雍自燕境逃歸言有傳登極赦書奏道君者聖情大悅趣宣和皇后開宴費用頗廣建炎二年七月辛亥宰執以奏上斂容不語久之蔡絛鐡圍山叢談云太上皇既北狩略不得中原音問日以宗社為念久之且命皇族之從行者食御手因親將調羮呼左右令出市茴香左右偶持一黃紙包以茴香來太上帝視之乃中興赦書也始知其事於是天意大喜從行者皆拜舞稱慶此事聞之慈寧皇太后之猶子韋侯訊臣謹按韋訊所云當不妄乃與顔岐所記不同趙子砥燕雲録云康王登寶位赦文傳至燕山二太子得之封呈道君即召賢妃相賀喜動龍顔此恐非其實也子砥所録又云戊申三月間一南人貨驢肉瓦橋來買得故紙內有本朝足本赦書司馬朴營求得之為京師醫官靳洪告於燕山留守收朴枷項禁勘獄成申元帥府已而貸死杖七十依舊養濟附傳所云或即據此而稍潤色之也洪皓行述又云皓被拘雲中因以金遺商人陳忠令密告兩宫以本朝遣來通問於是二帝始知建炎中興之實此所云與前諸書又不同今併附此更求他書參考閣門宣贊舍人曹勛自燕山得間遁歸宣和皇后令勛奏上以再使軍前時有宫人見四金甲神人持弓劔衛上戊申勒停人李仲洵復武翼郎知滑州仲洵始坐棄城得罪至是再用之庚戌天申節羣臣詣東上閣門拜表稱賀新除給事中沈晦充集英殿修撰知舒州言者論晦市井駔儈之流雖嘗使金踰年不無艱苦而封駮之職政事得失所繫恐不可以賞功故出之徽猷閣待制宗澤充龍圖閣學士知襄陽府右文殿修撰知冀州權邦彥充天章閣待制知荆南府直祕閣知深州姚鵬升直龍圖閣知洪州時黃潜善等不欲澤居中故與河北勤王守臣並命辛亥太師鎮南軍節度使中太一宫使樂平郡王鄭紳謁告往江浙改葬許之紳開封人故為直省官此據蔡絛國史後補道君皇后父也城始破為金所執既而歸之未幾薨諡僖靖沈良靖康餘録曰正月二十七日尼瑪哈請上皇相見上皇乘轎至寨門著紫道服帶逍遙巾趨入至幕次尼瑪哈出迎入帳中坐良久上皇起白尼瑪哈云老夫得罪當北遷但帝姬下降者乞留荷大惠尼瑪哈不答有頃鄭皇后自外至云妾得罪合從上皇北遷但妾家屬不與朝事敢乞留尼瑪哈㸃頭許之壬子太保奉國軍節度使同安郡王張邦昌以覃恩遷太傅此據僞楚録日厯無之都水使者陳求道貶秩五等坐汴河水减不即補治為御史所劾故黜之徽猷閣學士知青州曾孝序升延康殿學士孝序晉江人也癸丑中書舍人孫覿充徽猷閣待制知秀州覿聞李綱且至上疏言靖康初任侍御史首論諸生伏闕之罪責知和州今綱為中書相而臣預省屬典掌書命職在論思設有愚見因事納忠則益不安位請得罷去故有是命甲寅中書舍人兼權直學士院李擢試給事中御史臺主簿鄭㲄為監察御史㲄建陽人邦昌之僭也㲄挺身見上於濟州至是擢用陳賈新立御史臺題名記㲄與盧臣中之除皆在六月今從日厯附此乙卯熙河經略使張深辭行詔留深所部鄜延統制官孫渥一軍衛行在餘兵復還本路渥武都人也丙辰監察御史張所為尚書兵部員外郎所按視陵寢還上疏言恭聞行在留南京軍民俱怨道路籍籍不知誰為此謀者又失計矣京師重城八十里之廣宗社宫闕省闥百司不可遷也况居之足以控制河東河北之地而河東河北者天下之根本不可失去年誤用姦臣之謀始割三鎮繼而盡割兩河之地遂使兩河之民煩寃沉痛怨流骨髓今聞兩河兵民無不扼腕用之可藉以守若或棄京師而不居則兩河之民無所係望陛下事去矣今急還京城誠有五利奉宗廟保陵寢一也慰安人心二也繫四海之望三也釋河北割地之疑四也早有定處而一意於邊防五也一舉而五利而陛下不為不知誰為此謀者臣知其必無長䇿曾不過緩急之際意在南渡而殊不知國家之安危在乎兵之强弱將相之賢不肖而不在乎都之遷與不遷也誠使兵弱而將相不肖雖云渡江而南安能自保徒使人心先離中原先亂耳大河不足恃則大江不足恃亦明矣誠使兵强而將相賢正須坐撫中原以制强敵尚何遷都之有雖然計有出萬全者宜若創業之君無以精兵自衛而圖任將相使之協謀共力經營乎朔方然後鼓勇河東河北忠憤之人使自為戰則强敵可摧土宇可保而京師可以奠枕而都也不能如此徒欲南渡以自便是偷朝夕之安非所謂社稷大計臣知其不可時所又條上兩河利害上欲以其事付所㑹所復言黃潜善兄弟姦邪不可用恐害新政潜善引去上諭㫖留之乃罷所言職潜善意未已尋責所鳳州團練副使江州安置所事迹他書不見今以李綱建炎進退志修入日厯載所奏議於六月己巳實甚誤矣所責江州月日未見今併附此更尋他書考證之是日李孝忠破襄陽府守臣直徽猷閣黃叔敖棄城去孝忠遂入城肆焚劫掠子女盡驅强壯為軍叔敖廉子也廉分寧人元祐中給事中丁巳資政殿大學士知京兆府范致虛升觀文殿學士太常少卿劉觀召試中書舍人起居舍人滕康為起居郎太常少卿汪藻為起居舍人兼權中書舍人承議郎兩浙路提㸃刑獄公事季質尚書考功員外郎周望並試太常少卿質張邦昌子壻聞邦昌僣位自繫越州獄提舉茶鹽司以聞詔嘉奬至是擢用之詔奬質在此月甲寅今併附見承議郎葉三省守右司員外郎朝奉大夫諸王府贊讀汪思齊行吏部員外郎朝請郎陳戩為虞部員外郎三省桐廬人思齊鄞縣人戩已見四月辛酉思齊與戩嘗為上宫僚故用未幾思齊卒朝請郎主管亳州明道宫邢煥為朝議大夫充右文殿修撰朝散郎宋昭為尚書膳部員外郎仍賜白金百兩以昭自言嘗上書論開邊事逺竄故録之昭元降㫖與郎官今併書除目後准此昭見今年正月戊午太常少卿周望假給事中充大金通問使武功大夫趙哲領逹州刺史副之初上用黃潜善汪伯彥計遣傅雱使金軍祈請二帝未行朝論欲更遣重臣以取信㑹尚書户部侍郎邵溥乞赴行在潜善等因白用溥溥辭乃黜溥知單州而更命望溥之罷在甲寅今併附此資政殿學士宇文粹中降授朝奉郎降充龍圖閣待制錢蓋並落職提舉亳州明道宫粹中坐江寧軍亂蓋坐陜西棄師也初執政論蓋功進職名中書舍人朱勝非封還録黃乃有是命資政殿學士新除領開封府事王襄資政殿學士趙野並落職襄責襄陽府野青州並居住權中書舍人汪藻草制曰豈有兩君之在野略無一騎以入關故取迂途以為緩計故事宰執初除賜銀帛各千匹兩至是中書侍郎黃潜善等以國用不足辭所賜許之其後詔皆減半休兵後乃盡復之詔以邊事未寧遇休暇日百司仍入局治事紹興元年正月丙辰所書可參考是月皇叔光山軍節度使士㒟知南外宗正事士㒟首論大臣誤國故黃潜善斥之日厯紹興七年八月二十九日士㒟劄子建炎元年䝉恩除知南外宗正事當年五月到任又紹興四年五月十二日士㒟劄子昨日陛下立極之初首論大臣誤國䝉恩寬貸改差知南外宗正事臣既離維揚不旋踵有渡江之變按南外今年八月移鎮江府三年又移泉州此所云既離維揚不旋踵有渡江之變則改差又非元年事當考朝議大夫京東西路提㸃刑獄公事王賔為侍御史賔侯官人嘗為御史去至是復用賔之除日厯不書今以御史臺題名增入安邑人邵興據解州神稷山屢與金人戰時金將呼紐屯安邑執其弟翼招之興不顧飲泣死戰大破金人之軍呼紐羅索子也建炎以來繫年要録卷五
