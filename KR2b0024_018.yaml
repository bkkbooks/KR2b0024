body:
  text: 建炎以来繫年要録巻十八宋李心傳撰建炎二年冬十月按是月壬子朔癸丑詔瀕江州縣官渡口並差官主之應公私舟船遇夜並泊南岸以御營使司都統制王淵言金人在河陽恐其奄至也甲寅言者論維揚之城可扳援上下其濠池可歩而往来乃詔揚州修城浚濠仍令江淮州軍閱習水戰浙東馬歩軍副總管楊應誠使髙麗還具言王楷君臣見拒之意上以其負恩甚怒尚書右丞朱勝非曰彼國與金為鄰而與中國隔海遠近利害甚明此乃曩時待之太厚安能責報右僕射黄濳善曰若以巨舟載精甲數萬徑造其國彼能無懼乎勝非曰越海征伐燕山之事可戒也上怒乃解丙辰忠翊郎河北制置使王彦為武翼郎閤門宣贊舍人彦初自東京赴行在上命召見時遣宇文虛中為祈請使而彦見黄濳善汪伯彦力陳兩河忠義民兵引頸以望王師願因人心向順大舉北征犄角破敵收復故地言辭憤激大忤濳善伯彦之意遂降㫖免對而有是命戊午監察御史江淮撫諭寇防請令列郡月朔拜表如三京以示尊君親上之意從之庚申上諭輔臣曰内侍髙邈曽任陜西走馬近得知陜州李彦仙書彦仙與金人戰再三獲㨗又鄜延帥臣王庶節制六路進兵同華間将士用命亦屢勝敵朕聞之喜而不寐黄濳善曰不審邈得彦仙書日月遠近上曰朕以其私書不欲取觀恐書中有不欲人見者濳善曰前代帝王或複道窺人之私此陛下盛徳也熊克小歴載此事在十一月己丑今從日歴命江淮制置使劉光世將所部討李成時成犯淮西故討之按宋史繫戊午日壬戌詔翰林學士葉夢得給事中孫覿中書舍人張澂討論常平法條具取㫖始用覿奏也時夢得屢為黄濳善言常平之利及是進呈青苖歛散永不施行其他條法令從官討論来上上指八字曰此事宜先報行令遠近知之濳善言澂詳練民事遂命同討論尋又命户部尚書呂頤浩癸亥初復鈔旁定帖錢先是政和間陳亨伯為陜西轉運使始議創經制錢大率添酒價増歲額官賣契紙與凡公家出納每千收二十三其後行之東南又行之京東西河北歲入數百萬緡靖康初廢至是四方貢賦不能如期赴行在㑹知沛縣李膺言方今多事朝廷之費日廣竊見昨来經制司酒糟契稅頭子等錢所收至微所得至多儻復行之為利不細户部尚書呂頤浩翰林學士兼侍讀葉夢得乃請復之夢得言如賣契紙頭子等錢皆出於民之所欲故酒價雖増未嘗驅民使飲稅額雖増未嘗廹民為商他皆類此而靖康初相繼遽罷除量添酒錢近已再行充造船外其餘名色有似此等可以暫濟急闕不至害民皆願參取行之頤浩言其法可以助國而無害於民賢於緩急暴歛多矣量添酒錢已見今年八月辛酉於是先取鈔旁定帖錢命諸路提刑司掌之仍毋得擅用經制錢自此始熊克小歴云宣和初因方臘之亂江浙殘破諸州皆竭蔵而官兵無所資乃詔發運使陳亨伯經制東南諸路亨伯始創經制錢欽宗實録亨伯附傳亦云亨伯為經制發運使創比較酒務及以公家出納錢量取其羸號經制錢後翁彦國為總制使倣其法又取所謂總制錢者至今天下有經總制錢給縣官費葢自此始按史與克書皆誤經制之法實建議于陜西後乃行于東南總制之法創于紹興非翁彦國所立彦國嘗為經制使未嘗為總制使也經制事三年十月戊戌總制事紹興五年閏二月乙巳可考詔御營平冦左將軍韓世忠以所部自彭城至東平中軍統制官張俊自東京至開徳以金人南侵故也仍命河外元帥府兵馬總管馬擴充河北應援使與世忠俊互相應援是日金人圍濮州初馬擴既至北京欲㑹兵渡河復陷没諸郡次館陶聞冀州已陷而敵在博州皆傍徨不敢進其副俱重與統制官曲襄魯珏杜林相繼遁歸擴軍乏食衆詾詾以頓兵不動為言擴遂引兵攻清平縣金右副元帥宗輔左監軍昌左都監棟摩合兵與擴戰城南統制官阮師中按北盟㑹編無阮師中鞏仲達及其子元忠皆死於陣日向晡清平人開門助金人掩擴軍之背擴軍亂統制官任琳引衆叛去其屬官吴銖孫懋皆降金擴知事不集乃由濟南以歸主管機宜文字起復承議郎万俟簴與敵遇及其子剛中死之後贈朝散大夫簴陽武人宣靖間嘗為太學録此據紹興元年五月己酉簴家陳乞贈官狀修入狀云今年十二月在博州逢金兵戰死未詳多昻摩金主晟從弟也時統制官張世昌軍失道誤由東平世昌途中立節制使牌晨夕趨衙擴之未敗也左副元帥宗維以兵来㑹宗維自雲中南出将歴懷衛而東聞擴敗遂由黎陽濟河以侵澶淵守臣王棣禦之不能下進攻濮州趙甡之遺史十一月乙未濮州陷金人圍城凡三十三日逆數之當繋於此日朝廷亦聞金在澶濮間故遣韓世忠張俊以所部兵迎敵而命擴佐之葢未知擴敗也既而言者以俊中軍不可遠去遂命御營平寇前将軍權同主管侍衞馬軍司公事范瓊代行瓊請閤門宣贊舍人王彦與俱乃以彦為平寇前軍統領彦知瓊臣莭不著難與共事即稱疾就醫真州瓊并將其軍萬人而去擴至揚州上疏待罪詔降三官為右武大夫和州防禦使罷軍職甲子命常徳軍承宣使孟忠厚奉隆祐太后幸杭州以武功大夫鼎州團練使苖傅為扈從統制先是張浚為侍御史嘗請先措置六宮定居之地然後陛下以一身巡幸四方規恢遠圖上納其言遂命六宮從太后先往忠厚申明應辦事上諭大臣曰三省須與定色目若倉卒索難得之物使百姓何以供億太后比朕雖粗留意亦不以口腹勞人如朕於兩膳物至則食未嘗問也向自相州渡河野中寒甚燒柴温飯用瓢酌水與汪伯彦於茅舍下同食今不敢忘輔臣曰陛下思艱崇儉以濟斯民天下幸甚熊克小歴畧載此事于十一月癸巳與日歴不同戊辰吏部員外郎京東西路撫諭黄次山與從行官吏皆進秩一等以次山自言兩路並係兵火去處與向南路分事體不同故也日歴無此今以紹興六年十月二十九日葉莫繳到吏部公據修入癸酉翰林學士葉夢得言臣聞祭有祈有報無事則報有事則祈惟其時而已臣近因申明昊天上帝皇地祇冊文䝉㫖别撰己為祈辭今来合降赦書謂宜更行推廣歴叙天下艱危之狀深自貶損明示四方無有遠近皆知陛下為民請命以邀福於上下神示之意則雖幽遠與愚賤者皆可以動文辭播告不為無補從之是日按宋史繫甲子日閤門宣贊舍人京西北路安撫制置使知河南府翟進戰死進與金人夾河而戰屢破之時東京留守杜充酷而無謀士心不附諸將多不安之馬擴王彦既還朝餘稍稍引去起復留守判官宗頴屢爭不從力請歸持服統制官榮州防禦使楊進亦叛以數萬衆攻殘汝洛間進謂其兄兵馬鈐轄興曰楊進兇賊終為國家大患當力除之至是進率其軍與楊進遇於鳴臯山下夾伊水而軍楊進多騎兵興皆歩卒将士望騎兵有懼色翟進激之使戰進渡水先登為流矢所中馬驚墜塹進為賊所害賊乘勢大呼擊官軍官軍遂敗興收餘兵保伊陽山寨詔贈進左武大夫忠州刺史初宗澤之為留守也日繕兵為興復計兩河豪傑皆保聚形勢期以應澤澤又招撫河南羣盗聚城下欲遣復兩河未出師而澤卒充無遠圖由是河北諸屯皆散而城下兵復去為盗掠西南州縣數歲不能止議者咎之甲戌大理少卿吴瓌言國家科舉兼用詩賦而政和令命官不得以詩賦私相傳習之禁尚未刪去望令刑部刪削從之始命有司討論崇觀以来濫賞凡直赴廷試及進書頌虛作從軍治河因權倖保奏推賞與父兄秉政無出身而得貼職者皆釐正之至是都省以留滯為言丙子詔令到部官自陳有無係討論之人仍給除名罪如係前項色目人並令吏部審量取㫖事祖見七月癸未四年六月辛巳再討論丁丑資政殿大學士大金祈請使宇文虛中始渡河趙甡之遺史云先是詔求奉使絶域者虛中方提舉洞霄宮乃上表自薦遂加觀文殿學士為大金祈請使此所云官職皆誤今不取是日范瓊引兵至京師是月朝散郎顧文為監察御史日歴不書此據臺記江淮制置使劉光世敗李成於新息縣先是光世以統制官王徳為先鋒與成遇於上蔡驛口橋敗之成奔新息裒散卒再戰光世以儒服臨軍成遥見白袍青蓋者曰必大將也併兵圍之徳潰圍拔光世以出光世下令得成者以其官爵予之士奮命爭進再戰皆勝成遂遁走其謀主陶子思為官軍所執按宋史繫十一月朔辛巳御營前軍副統制劉正彥擊丁進降之正彦初至淮西即須兵合肥安撫使胡舜陟固拒不與正彦檄求愈急且屯師城下以得兵而後退舜陟閉闗拒之踰月正彦大怒驛聞於朝詔舜陟分析舜陟亦劾正彦逗撓失事持兵不歸可重黜正彦之出師也請通直郎劉晏偕行晏嚴州人在遼登進士第宣和四年率衆數百来歸及金人圍京師朝廷以晏總遼東之兵謂之赤心隊故晏以赤心騎八百從正彦行逮至淮西而進軍頗衆晏曰兵固有先聲後實者今賊勢甚張當以竒計破之乃為五色旗使騎兵持之循山而出一色既盡則以一色易之賊見官軍累日不絶旗色各異遂不戰而請降詔降赦進罪分其兵𨽻諸軍正彦以功自武徳大夫威州刺史進階官武功大夫而晏遷朝散郎各賜金帛晏悉以所賜分將士將士皆悅正彦始觖望十有一月按是月辛巳朔癸未初賣四字師號每道價二百千即犯公私罪杖非傷人及盗者聽贖一次用禮部侍郎張浚請也初汪伯彦既去相州金人執其子軍器監丞似女之夫都水監丞梁汝霖使来割地似等至相州而守臣趙不試固守不下遂拘以北至是得歸伯彦以聞且言二帝未還不敢顧私己徑令還鄉矣上優詔勞之或曰伯彦密使人贖似於金國似後更名召嗣熊克小歴知樞宻院汪伯彦有子曰似與其女之壻梁汝霖者嚮皆為金人掠去拘于湯隂縣寨中一年矣至是似汝霖同日南遁至河偶得漁舟以濟按宗澤未卒前有奏疏云助奸臣贖子與壻之謀則其圖歸已久非倉卒遁歸也今且兩存之似汝霖自監丞出割地事見伯彦中興日歴頗詳克稱為金人掠去亦誤甲申朝奉郎知天長軍楊晟惇言盗賊之始以數弓手取之而有餘及其結集雖衆將捕之或不足近者増置弓手實消寇之術也若增而不教與不増同教而無法與不教同乃詔州縣自辦錢造軍器其武尉未辟者趣令辟之晟惇麻陽人也銀青光禄大夫提舉西京嵩山崇福宮李綱責授單州團練使萬安軍安置初綱既貶㑹有㫖左降官不得居同郡而責授忻州團練副使范宗尹在鄂州乃移綱澧州居住今年十月至是有上書訟綱之寃者御史中丞王綯因劾綱經年不赴貶所又論綱靖康中要功刼寨結衆伏闕覆師太原凡三罪請投之嶺海疏奏遂有是命綱之責日歴不書此據綱行狀及胡安國覈實論修入綱為王綯所劾惟朱勝非閑居録畧及其事未見全章綯以此月丙戍遷禮書故且先載綱謫命於未遷之前當求它書附其本日朔按宋史繫辛巳髙麗國王楷遣其臣尹彦頤等入見且奉表謝罪詔中書舍人張澂押伴麗使入貢日歴不書㑹要在此月奉表謝罪據朱勝非閑居録云爾張澂押伴事按日歴十月壬戌載上語云澂近押伴髙麗人使與賓客言甚知體然此時麗使未来或是十二月戊午澂等奏常平法時上語未可知麗使入朝無本日澂以是月丙戍除中丞故先書押伴事俟考按宋史繫辛巳朔既見命客省官賜酒食於殿門外仍優詔荅之丙戌户部尚書呂頤浩試吏部尚書翰林學士兼侍讀葉夢得試户部尚書御史中丞王綯試禮部尚書中書舍人張澂試御史中丞給事中孫覿試吏部侍郎仍兼權直學士院起居郎周望試中書舍人右司諫鄭㲄試右諫議大夫日歴于十一月丙戌載頤浩夢得除命而熊克小歴併綯澂書之按日歴十二月戊午記討論常平事夢得澂尚帯舊銜豈非未遷時已上此奏而後乃行之耶按吏戸部題名頤浩夢得覿之除皆在十二月而澂十一月間常押伴麗使則未應已為中丞必有一誤以臺部後省題名參考之頤浩夢得覿之除有月而無日㲄之除有時而無月澂之除有年而無時至綯望之除又全不見按十二月五日望奏民間習射事已繋舍人銜而澂寔代綯望寔繼澂則在十一月也今因頤浩夢得除命遂書之當更考求各附本日頤浩在版曹嘗乞輦致左蔵庫官物過江言未及行而徙九女澗遞卒王安擅拆東京留守司遞角事聞丁亥詔特依軍法後有犯者視此己丑江淮制置使劉光世還行在李成之敗也獲其黨之家屬詔分養於真泰楚三州至是光世具上男女六百餘人上謂宰執曰此曹身且不顧豈䘏其家朕念作亂者非其家屬之罪故令分養之黄濳善曰臣聞光世凱旋過楚州降卒見家屬無恙皆感泣仰戴聖恩朱勝非曰郊赦中可載此以見陛下徳意上又曰昨於光世處得成所用提刀一重七斤成能左右手運兩刀所向無前惜也惑於陶子思邪說使朕不得用之是日光世俘子思詣都堂既而以火燃於開明橋上其軍士降者皆釋之日歴載此事于十月九日庚申葢因汪伯彦時政記所云而不深考耳其中有云去降赦尚半月葢十一月九日己丑也㑹要亦云光世以十月九日受命討成不應其日已奏㨗今各附本日庶見首尾時政日歴差一月熊克小歴又差一年今並不取辛卯上夢上皇在延福宮亟往拜之翌日以論輔臣凄然良久曰朕何時得見上皇耶黄濳善曰近聞宇文虛中以十月二十六日過河與金人相見議事自兹二聖歸必有期望少寛聖抱上頷之日歴載此事于十月十一日壬戍恐誤今從熊克小歴附此壬辰金人陷延安府中散大夫通判府事魏彦明死之先是金人陷府之東城而西城猶堅守今年正月金人諜知都統制曲端與經畧使兼節制陜西軍馬王庶不協遂併兵冦鄜延康定統制官王宗尹不能禦庶在坊州聞金入康定夜趨鄜延以遏其前金詭道陷丹州丹州界於鄜延之間庶乃自當鄜州来路遣統制官龎世才鄭恩當延安来路時端盡統涇原精兵駐邠州之淳化庶日移文趣其進且遣使臣進士十數輩往說諭端端不聽庶知事急又遣屬官魚濤督師端陽許之而實無行意權轉運判官張彬為端隨軍應副問以師期端笑謂彬曰公視端所部孰與李綱救太原之兵乎彬曰不及也端曰綱召天下兵不度而往以取敗北今端兵不滿萬萬一若敗敵騎長驅無陜西矣端計全陜西與鄜延一路輕重是以未敢即行不如直抵巢穴攻其必救乃遣涇原兵馬都監吴玠攻華州端自攻蒲城縣華州蒲城皆無守兵玠拔華州端不攻蒲城引兵趨耀之同官復迂路由邠之三水與玠㑹於寧之襄樂襄樂在深山中去金人五百里天大雪寒甚敵攻世才世才與戰下不用命乃敗自此金兵専圍西城晝夜攻擊不息西城初受圍彦明與權府事劉選分地而守彦明當東壁空家貲以賞戰士敵不敢犯庶子之道年未二十率老弱乘城敵晝夜攻士多死者閱十有三日城之後大門陷選與馬歩軍總管馬忠皆遁去彦明獨曰吾去則民誰與同死城以外非吾所當死之地也敵大入彦明帥所部力戰坐子城樓上敵併其家執之諭使速降彦明曰吾家食宋禄汝輩使背吾君乎羅索怒敲而殺之久之詔贈彦明中大夫官一子彦明開封人也初庶聞圍急自收散亡往援温州觀察使新知鳳翔府王􅊛亦将所部發興元比庶至甘泉而延安已陷庶無所歸乃以其軍付􅊛而自将百騎與官屬馳至襄樂勞軍庶猶以節制望端欲倚端以自副端彌不平端號令素嚴叩其壁者雖貴亦不敢馳庶至軍端令每門減其従騎之半至帳下僅有數騎而已端猶虛中軍以居庶庶坐帳中端先以戎服趨於庭既而與張彬及走馬承受公事髙中立同見帳中良久端聲色俱厲問庶延安失守狀且曰節制固知愛身不知為天子愛城乎庶曰吾數令不從誰其愛身者端怒曰在耀州屢陳軍事而不一見聽何也因起歸帳庶留端軍終夕不自安端謀即軍中誅庶而奪其兵乃夜走寧州見陜西撫諭使主客員外郎謝亮說之曰延安五路襟喉今既已失春秋大夫出疆之義得以専之請誅庶歸報亮曰使事有指今以人臣而擅誅於外是跋扈也公則自為之端意沮因復歸軍明日庶見端為言己自劾待罪端乃拘縻其官屬又奪庶節制使印而遣之王􅊛将兩軍在慶陽端使人召之􅊛不應㑹有告􅊛過邠州軍士擄掠者端怒命統制官張中孚率兵召􅊛謂中孚曰􅊛不聽則斬以来中孚至慶陽而􅊛已去遽遣兵要之不及而止􅊛亦不能軍遂将其餘衆還入蜀金人既陷延安府遂自綏徳渡河抵晉寧軍守臣徐徽言遣使約知府州威武軍承宣使折可求謀夾攻敵羅索聞徽言與可求合乃令人說可求許封以闗中地可求遂降金挾可求招徽言於城下徽言登陴以大義責之且引弓射可求可求乃去金攻晉寧急徽言屢敗之斬羅索之子徽言西安人也癸巳兩浙提㸃刑獄公事趙哲與葉濃戰於建州城下大敗之濃引其兵東走哲遣人招諭濃遂降其後濃至張俊軍中復謀為變俊執而誅之熊克小歴載此事于十二月庚申今從日歴㑹要繫此月十三日乙未集英殿修撰新知福州吴巖夫移知南劒州此恐與十二月丁丑所書余深留江常事相闗當考是日金人陷濮州初左副元帥宗維自澶淵引兵至城下意以為小郡甚輕之將官姚端乘其不意夜刼其營直犯中軍宗維跣足而走僅以身免金攻城凡三十三日至是自西北角登城守陴者不能當端率死士突出宗維入其城守臣直秘閣楊粹中登浮圖最髙級不下宗維嘉其忠義許以不死乃以粹中歸城中無少長皆殺之金又至澶淵顯謨閣學士知開徳府充本路經畧安撫使王棣率軍民固守金偽為書至城下曰王顯謨已歸附汝百姓何敢拒師軍民聞之欲殺棣棣走至南門為軍民所踐而死城遂陷經畧司主管機宜文字朝請郎鄭建古亦為亂兵所殺金怒其拒戰殺戮無遺事聞贈棣資政殿學士贈建古朝請大夫建古鉛山人也開徳之陷史無月日趙甡之遺史附于濮州之後日歴紹興元年七月一日鄭建古妻傅氏訴鉛山縣科須狀云建炎二年十二月金人圍閉本府戰守陷没此必得其實但以不見本日故著于此龔頤正忠義錄云棣巷戰而死葢其家陳乞恩澤狀云爾與甡之所記不同頤正所錄又以棣為顯謨閣待制亦誤棣建炎元年已遷宻直其遷顯學未知在何時當考於是有言粹中死事者乃贈徽猷閣待制粹中贈職日歴㑹要皆無之惟季陵外制集有制詞畧曰一城之人同日而死汝無負者朕實痛之時相州圍久糧食皆絶守臣直徽猷閣兼主管真定府路經畧安撫司公事趙不試謂軍民曰今城中食乏外援不至不試宗子也豈可順敵諸人當自為計衆不應不試又曰約降如何衆雖悽慘然亦有唯唯者不試乃登城遥謂金人請開門投拜乞勿殺金人許之不試乃具降書啟門而納其家屬于井中然後以身赴井命提轄官實之以土人皆哀之此據趙甡之遺史但甡之謂權知相州趙縣丞乃不字行宗室恐誤按不試靖康元年十二月丙寅自朝請郎通判相州除直秘閣權州事建炎元年五月升直徽猷閣知相州即此人也澶相之陷當别求它書各繫本日按陷相州宋史繋壬寅日東京留守杜充聞有金師乃决黄河入清河以沮兵自是河流不復矣初太學生建安魏行可應詔使絶域補右奉議郎假朝奉大夫尚書禮部侍郎充大金軍前通問使右武大夫果州團練使郭元邁副之仍命行可兼河北京畿撫諭戊戌行可等渡河見金人于澶淵時河北紅巾甚衆行可等始懼為所攻既而見使旌皆引去元邁亦以應募出疆朝廷各官其子弟且廩給之然金人知其布衣借官待之甚薄因留不遣云庚子上親饗太廟神主于夀寧寺㑹要云建炎二年不饗廟按此月壬寅手詔云逮祖廟及壇夜氣晏温風靄澄霽是則先廟而後郊明矣今從日歴但日歴載此手詔于元年十一月戊申蓋差一年初成都府路轉運判官趙開開初見元年四月丁亥言𣙜茶買馬五害請用嘉祐故事盡罷𣙜茶仍令漕司買馬或未能然亦當痛減額以蘇園戸輕立價以恵行商如此則私販衰而盗賊息矣朝廷然之擢開同主管川陜茶馬是日開至成都遂大更茶法官買賣茶並罷倣政和都茶場法印給茶引使商人即園戸市之茶引錢每斤春七十夏五十市例頭子在外所過征一錢住征一錢有半置合同場以譏其出入重私商之禁號合同場為茶市交易者必由是而引與茶必相隨違者抵罪至四年冬買馬乃踰二萬匹引息錢至一百七十萬緡改酒法在三年十月辛丑改鹽法在紹興二年九月甲申辛丑上齋于行宮常朝殿光州觀察使樞宻都承㫖邢煥為保靜軍承宣使煥常為上言馬伸言事切當宗澤忠勞可倚再上疏論黄濳善汪伯彦誤國進戰退守皆無策可施其言多所補益壬寅親祀上帝于圜丘配以太祖用元豐禮也禮畢赦天下命侍從于廢放黜謫之中舉才幹强敏之士各二人吏民因忤李彦朱勔被罪者許自陳改正先是詔江浙淮南福建起大禮賞給錢二十萬緡金三百七十兩銀十九萬兩帛六十萬匹絲緜八十萬兩皆有竒是日上自常朝殿用細仗二千人詣壇行禮中興聖政詔曰朕承祖宗有道之長賴黎獻戴宋之舊嗣守神器適歲當郊祇見于皇天后土大懼菲徳弗獲顧歆乃先事三日繁隂凝翳震于朕心罔燭靈㫖逮祖廟及壇垂象燦炳夜氣晏温風靄澄霽迄用成禮朕既獲祇事弗敢謂幸矧敢怠康方恐懼修省以靈承扶持全安之眷股肱大臣其同寅協恭思難圖易輔朕不逮以倡百辟耳目風憲有言達于予聽必忠必誠毋奪于私凡曰有官君子飭躬謹行惟職業是修令部使者暨爾百僚有為有行其必曰毋傷于民毋害于國中國爪牙之臣敵愾戡難毋貽名節羞軍民戰士咸奮忠力毋至失業無依怙終為暴臣留正等曰大雅述文王有明徳故天復命武王其詩曰維此文王小心翼翼昭事上帝聿懷多福厥徳不回以受方國今太上皇帝當郊見天地而大懼菲徳弗獲顧歆覩繁隂凝翳震于朕心其為小心翼翼至矣蕆事之夕垂象燦炳風靄澄霽迄用成禮其昭事上帝聿懷多福厚矣馨聞于上既獲祇事又且弗敢自辛益恐懼修省下詔自警因以戒羣臣而勵多士則厥徳不回其誠益篤矣故能坐收三紀又寧之功用傳于聖神益恢中興之烈其與夫天復命武王千載同符矣嗚呼偉哉武功大夫達州刺史兩浙路提㸃刑獄公事趙哲領秀州團練使以平葉濃之功也甲辰金人陷徳州兵馬都監趙叔皎死之初祖宗朝以廣南地遠利入不足以資正官故使舉人兩與薦送者即轉運司試刑法以其合格者攝之兩路正攝凡五十人月奉人十千米一斛滿二年則錫以真命後増五十人號曰待次崇觀後又增五十人號曰額外其注擬皆自漕司建炎初敕歸吏部至是踰年無願就者乙巳吏部請復歸漕司從之己酉詔蔡京童貫王黼朱勔墳上利皆毁之收其田充省計是月有狂人具衣冠執香爐擕絳囊拜于行宮門外内侍以聞捕赴都堂問狀第云天使我為官家兒囊中紙一軸書是語也如醉如狂不可深詰因露索之右臂剜十餘字亦是語也送之揚州根治則自言蘄州人嘗見有認富家為父者所得甚厚意欲效之雖加箠楚終無他說且不言其姓名衆以為實真狂人也乃釋之尚書兵部侍郎李邴兼權直學士院邴除兵侍本部題名在此年而無月除直院本部題名在此月而無日諸書皆無之上之享廟也秘書少監林邇讀祝文而失于恭恪邇汪伯彦客也臺諫欲論其罪黄濳善遽擢邇為起居郎既而言者不容乃命集英殿修撰出守此事日歴全不見今以張澂劾濳善等章疏修入澂章疏無邇名按秘書省題名邇今年十月自少監除左史而後省題名無之葢未上也然朝獻失儀當在十一月拜郊時題名云十月恐誤徽猷閣待制賈安宅告老詔守本職致仕安宅歸安人事上皇為工部侍郎此事日歴不載今且以紹興三年正月安宅分析致仕狀修入陜西安撫司都統制邵興敗金人于絳州曲沃縣金人陷淄州初李成既為劉光世所敗遂轉寇淄州權州事廸功郎李某固守不下成糧盡引去淄人求救于知滄州劉錫㑹金人来攻騎軍至城下淄人望之曰滄州救兵至矣乃具香花于城上望塵歡譟既而知為敵至遂出降金人大喜不入城而去涇原兵馬都監兼知懷徳軍吴玠襲叛賊史斌按宋史作贇斬之初斌侵興元不克引兵還闗中義兵統領張宗誘斌如長安而散其衆欲徐圖之曲端遣玠襲擊斌斌走鳴犢鎮為玠所擒端自襲宗殺之玠以功遷右武大夫忠州刺史吴玠殺史斌趙甡之遺史繫之今年四月明庭傑功績記繫三年冬戰青溪復華州之後而云金人内侵己三載矣其實二年冬也王綸撰玠碑分此三事作二年按三年九月長安已陷而綸碑乃云三年冬劇賊史斌據長安謀為不軌實甚誤矣其實戰青溪在今年之夏復華州擒史斌在今年之冬但華州以十一月收復而長安不知的在何月耳今且附此月末統制濱州軍馬葛進按宋史作蓋進圍棣州守臣朝奉大夫直秘閣姜剛之與戰城破為所害後贈剛之奉直大夫剛之贈官在紹興三年正月辛酉初河北制置使王彦既渡河其前軍准備将岳飛無所屬遂以其衆千人降于東京留守杜充時种師道小校桑仲為潰卒所推亦降于充充皆以為将十有二月按是月辛亥朔乙卯隆祐太后至杭州扈從統制苖傅以其軍八千人駐于奉國寺日歴在壬子今從熊克小歴趙甡之遺史云傅拙直不能曲奉内侍故多譖之熊克小歴云傅與楊惟忠比肩如王淵韓世忠張後皆出其下按淵宣和間已為大將傳雖世家然自小校拔起非惟忠淵比也今不取中書舍人周望請除鄉兵外民有子弟願習射者聽之仍籍其姓名守令每月一試取藝髙者賞以銀絹而最優者如三路保甲法量與補官從之令尚書省立法按宋史繫十一月庚戍丁巳故朝奉大夫翁彦國追貶單州别駕太常少卿翁彦深罷尚書考功員外郎翁挺除名鄰州編管時言者論彦國本屠沽飲博之雄奴事楊戬靖康之末阻兵觀望與趙子崧締交結黨以觀時變挺素無行檢事伶人張補及梁師成師成父没挺與秦湛輩縞素延客自稱義孫則所養可知深窒塞暗昧以李綱所用覩朝廷正綱之罪心懷忿恚神識如癡望併賜罷黜疏奏遂有是命湛觀子也觀髙郵人元祐館閣校勘戊午執政進呈從官呂頥浩葉夢得孫覿張澂討論常平法事頥浩等言此法不冝廢如免役坊場亦可行惟青苖市易當罷上曰青苖斂散永勿施行夢得請選歴州縣通世務者為提舉官已而頤浩請追還常平司糴本皆從之㑹戎馬南牧未克行還糴本在三年正月庚寅今併書之熊克小歴載此事在十一月壬辰今從日歴繫此但日歴于去年十一月癸亥亦書此事葢重疊差誤己未詔諸路非見闕官及已授人違年不赴皆毋得奏辟以論者言監司帥守多私其親舊使士人失職故也庚申金人攻東平府守臣寳文閣直學士京東西路安撫制置使權邦彦遁去時御營使司同都統制范瓊自京師引兵至東平敵衆方盛邦彦無兵不能守遂棄其家與瓊俱南歸瓊引兵之淮西金既得東平又攻濟南府守臣中奉大夫劉豫遣其子承務郎刑曹掾麟與戰金兵圍之數匝朝散大夫通判府事張東益兵援之乃去金即遣人啗豫以利豫因有邪謀與東偕往投拜民遮道不從豫遂縋城詣軍前通欵此據偽豫傳増修趙甡之遺史云李成侵濟南府界擾于外邑濟南堅守拒城求救于滄州劉錫㑹金人侵山東先至濟南府劉豫謂滄州救兵来矣即不為守禦備間門納之乃金人也遂就投拜按此與諸書不同疑得之傳聞熊克小歴云尼瑪哈遣人㗖豫以利豫遂納欵恐亦不然葢此時尼瑪哈正圍北京今依豫傳削尼瑪哈名庻不失實豫傳載豫降在建炎三年己酉按汪藻撰郭永傳云金俘東平濟南人以令北京則豫降當在此時但未知的日耳日歴建炎四年八月丁亥權邦彦叙官狀云建炎三年正月内因金人重兵攻破東平府衆兵救奪得出奉聖㫖疾速發赴行在或是次年正月行在方知而降此㫖亦未可知今併附此當考壬戌言者論福建路茶之所自出祖宗以来商販自便望罷鈔法令都茶場約本路歲額印造茶引付茶事司實行招誘客人入錢請買計置輕賫赴行在毋得抑配州縣及科率民户僧寺出買引錢從之甲子金左副元帥宗維陷北京起復朝奉大夫河北東路提㸃刑獄公事郭永死之熊克小歴載此事于十一月戊申今從趙甡之遺史繫此初金人攻北京急河北轉運副使兼權大名尹張益謙欲遁去永曰北門所以遮梁宋敵得志則席巻而南朝廷危矣借力不敵猶當死守徐挫其鋒以待外援因自率兵晝夜乘城且縋死士持帛書詣行在告急金俘東平濟南人至城下大呼曰二郡已降降者富貴不降者無噍類益謙與轉運判官裴億皆色動永曰今日正吾儕盡莭之時即行城撫將士曰王師至矣衆皆感泣是日大霧四塞金以斷碑殘礎為砲樓櫓皆壞左右䝉盾而立至有碎首者良久城陷永安坐城樓上或掖之以歸諸子環泣請去永曰吾世受國恩當以死報然巢傾卵覆汝輩亦将何之兹命也奚懼益謙億率衆迎降金人曰城破而降何也皆以永不從為詞遂遣騎召永永正衣冠南向再拜訖易幅巾而入宗維曰沮降者誰永熟視久之曰不降者我也尚奚問宗維見永狀貌魁傑又夙聞其名乃以富貴啗之永瞋目罵曰恨不滅爾報國何說降乎宗維令譯者申諭永永㦸手罵不絶宗維惡其言麾之使去永復厲聲曰胡不速殺我我死當率義鬼以滅爾曹大名人在縶者皆出涕宗維令斷所舉手并其家害之年五十三即日語傳城中人皆痛哭金兵去相與負其屍瘞之永為人剛直長七尺美鬚髯望之如神人博通古今事親孝與人忠輕財好義而吏治精明事聞贈資政殿大學士諡勇節金人既陷北京又陷襲慶府衍聖公孔端友已避寇南去漢兒将啟宣聖墓左副元帥宗維問其通事髙慶裔曰孔子何人曰古之大聖人宗維曰大聖人墓豈可犯皆殺之故闕里得全端友孔子四十八世孫也自金人入中原凡官漢地者皆置通事髙下輕重悉出其手得以舞文納賄人甚苦之燕京留守尼楚赫以戰多貴不知民政有僧訟富民逋錢數萬緡通事受賄詭言久旱不雨僧欲焚身動天以蘇百姓尼楚赫許之僧號呼不能自明竟以焚死乙丑金人陷虢州丙寅户部尚書兼侍讀葉夢得兼修國史尚書吏部侍郎劉珏工部侍郎康執權兼同修國史己巳尚書右僕射兼中書侍郎黄濳善遷左僕射兼門下侍郎知樞宻院事汪伯彦守右僕射兼中書侍郎仍並兼御營使二人入謝上曰濳善作左相伯彦作右相朕何患國事不濟更同心以副朕之意皆稽首謝此據伯彦所進時政記濳善入相踰年當上初政天下望治濳善獨當國柄専權自恣而卒不能有所經畫伯彦繼相畧與之同由是敵國益無所憚是時李綱既去宗澤已死大權入手二小人為相其事可知决幸東南無復經理中原之意濳呂中大事記曰始也獨相綱已為汪黄所不悅繼與善同相則必為濳善所排綱于此時懲宣和大臣不和之咎且欲與濳善共事豈知君子小人决無共事之理既並相汪黄而髙宗猶望其同心然小人之同不過同惡相濟爾夫人主所職在論相而小事因革大臣用舍有不與焉尚書左丞顔岐守門下侍郎尚書右丞朱勝非守中書侍郎兵部尚書盧益同知樞宻院事檢校少保奉國軍節度使御營使司提舉一行事務都廵檢使劉光世加檢校少傅錄淮西之勞也庚午刑部尚書兼侍講王賓罷為龍圖閣直學士李綱之再貶也賓忿怒不平御史中丞張澂劾賓本綱之黨頃在中司無一語及綱近盧益除樞副翌日賓即於經筵留身除用偶後它人而躁進如此賓坐罷去辛未金人攻青州乙亥承議郎吴給充徽猷閣待制知東平府朝奉郎孫億直龍圖閣知襲慶府初給之在都司以論事忤黄潛善罷居須城及金人既得兗鄆二州給與億義不臣金率軍民據徂徕山為寨數下山與金戰主管京東東路安撫制置司公事劉洪道言于朝故有是命億奉符人也丙子朝請郎王庭秀為監察御史用中丞張澂薦也澂言偽楚時有自列卿而為侍從者有自侍從而登政府者擁騶傳呼略無愧色而庶官中如虞謩王庭秀者初非疾病毅然致為臣而歸聞者莫不嘉其為人願賜褒擢庭秀先嘗為臺屬去故遂擢用之左武大夫明州觀察使髙士瞳為江南東路提㸃刑獄公事置司江寧府丁丑特進致仕衛國公余深金紫光祿大夫致仕薛昂並責授中大夫守秘書少監分司深臨江軍昂徽州居住按宋史深昂並分司進昌軍徽州居住責授單州團練副使臨江軍居住耿南仲再責本州別駕資政殿學士提舉杭州洞霄宮許翰落職時御史中丞張澂言建卒之殘福州一方騷動深以前宰相與提刑司都吏王宏謀率郡人申朝廷乞留知州江常葢常善而易制故為此奸謀以窺朝廷杭卒之叛昂不縁君命自知杭州南仲趣李綱往救河東以致軍潰葢不䘏國事用此報讎翰與綱最厚方在樞府則廹种師中急救太原致其覆師及綱作相引為執政此四人者豈可置而不問故有是命未幾南仲卒于吉州日歴深昂責命在三年正月壬辰又不載翰南仲責命今從熊克小歴戊寅禮部侍郎張浚兼御營使司參贊軍事時金人横行山東羣盗李成輩因之為亂金左副元帥宗維将自東平歴徐泗以趨行在而宰相黄濳善汪伯彦皆無遠畧且斥堠不明東京委之御史南京委之留臺泗州委之郡守所報皆道聽塗說之辭未嘗多以金繒使人伺金之動息於是淮北累有警報而濳善等謂成餘黨無足畏者金諜知朝廷不戒亦偽稱成黨以欵我師上以邊事未寧詔百官言所見吏部尚書呂頥浩上備禦十策曰收民心定廟算料彼此選将帥明斥堠訓强弩分甲器備水戰控浮橋審形勢其說甚備户部尚書葉夢得亦請上南巡阻江為險以備不虞上曰自揚州至𤓰洲五十里聞警而動未晩夢得曰河道僅通一舟恐非一日可濟也夢得又請以重臣為宣總使一居泗上總兩淮及東方之師以待敵一居金陵總江浙之路以備退保上一日召諸軍議事中軍統制官張俊奏敵勢方張冝且南渡復請移左蔵庫于鎮江吏部侍郎劉珏亦言備敵之計兵食為先今以降卒為見兵以糴本為見糧二者無一可恃維揚城池未修卒有不虞何以待敵不報殿中侍御史張守上防淮渡江利害六事大率尤以逺斥堠探報為先别疏論金人侵淮甸之路有四宜取四路帥臣守倅銓擇能否各賜緡錢責之募戰士儲芻粟繕甲兵明斥堠公賞罰使之夙夜盡力扞蔽疏至再上又請詔大臣惟以選将治兵為急凡細微不急之務付之都司六曹濳善伯彦滋不悅乃請遣守撫諭京城守即日就道至是聞北京陷議者以為敵騎且来而廟堂晏然不為備浚率同列為執政力言之濳善伯彦笑且不信乃命浚兼參贊軍事與頤浩教習河朔長兵浚㕘贊之除日歴不見平江記云十二月二十八日建炎以來繫年要録巻十八
