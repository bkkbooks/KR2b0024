body:
  text: 建炎以來繫年要録卷一百十宋李心傳撰紹興七年夏四月按是月壬辰朔癸巳張浚奏雨既沾足又即晴霽庶於蠶麥不妨上曰朕宫中亦養蠶兩箔許欲知民間蠶熟與否浚等曰陛下敦本憂民如此天下幸甚上又曰朕聞祖宗時禁中有打麥殿今後圃有水朕亦令人引水灌畦種稻不惟務農重榖示王政所先亦欲知稼穡之艱難爾詔築太廟于建康以臨安府太廟充本府聖祖殿起居舍人吕本中直龍圖閣知台州本中引疾求去疏再上乃命出守本中辭乃以本中主管江州太平觀修武郎閣門祇候龍陽軍水軍統制覃敵知靖州用張觷薦也詔左朝奉郎王弸中已降追一官指揮勿行初吏部以弸中為童貫保奏改官當追奪而左司諫陳公輔言朝廷設審量之法蓋為崇觀宣和以來姦臣用事一時士人朋附結託夤緣改轉冒濫之甚乃若弸中實係方賊徒黨吕師囊等起兵攻圍台州而本州司户滕膺率衆官與軍民併力死守保全一州偶貫宣撫一路合行具奏遂竝轉一官不為濫賞若令追官恐失朝廷審量之意故有是命甲午少師萬夀觀使劉光世特許任便居住從所請也光世遂居溫州鎮江府進士蔣將上書論十事詔永免文解乙未直祕閣新荆湖南路提㸃刑獄公事周葵移兩浙西路尚書吏部員外郎黃次山為荆湖南路提㸃刑獄公事次山引疾乞補外㑹給事中胡世將舉次山自代張浚因擬次山修注上曰非告訐董弅者耶此風不可長遂令補外浚意甚沮此以趙鼎雜記增修丙申詔昭憲皇后本族親屬令所在訪求參酌推恩權主管侍衛馬軍司劉錡奏以前護副軍及馬司見在通為前後左右中軍及遊奕凡六軍每軍千人共為十二將從之前護副軍即八字軍也按馬司元管六百人後又益以解潛二千人及劉錡帶到軍馬又有八字軍萬人今六軍十二將止共管少壯正甲軍六千人則老弱數多故也丁酉徽猷閣待制王倫右朝請郎髙公繪入辭倫自平江至建康凡四召對上使倫謂金左副元帥魯國王昌曰河南之地上國既不有與其付劉豫曷若見歸倫奉詔而去上因倫行附進皇太后淵聖皇帝黃金各二百兩熊克小厯云皇太后禮物依例支金一百兩附倫等行誤也日厯二月十三日乙巳勘㑹王倫等奉使大金所有禮物理合附帶前去有㫖淵聖皇帝金二百兩宣和皇后金一百兩並令户部依數支給三月二十八日庚寅有㫖皇太后禮物令户部更支金一百兩附王倫等進納克不詳考爾中書言宇文虛中朱辨奉使日久宜有支賜以慰忠勤詔賜虛中黃金五十兩綾絹各五十匹龍鳳茶十斤辨黃金綾帛各三十兩匹茶六斤樞密使秦檜言孫傅張叔夜家屬在金中貧甚願因倫行有所賑給詔賜金如虛中之數虛中等賜金以三月乙酉得㫖傅叔夜以丙戌得㫖今併書之熊克小厯但稱詔傅叔夜依虛中例與之而不言虛中所賜何物蓋不詳考也初顯謨閣待制知荆南府王庶聞何蘚來歸乃草疏略曰先帝志慕道真宜用鼎湖故事奉衣冠弓劍起陵廟葬之名山盡舉送終之典使海內咸知梓宫還與否不足為國重輕彼雖有姦萌何自而生然後遣使倘或請之未獲則大兵躡之問罪致討不為無名因神民痛憤之情刷宗廟存亡之耻臣知梓宫可不請而得為策之上也疏將發知朝廷遣使已定乃止戊戌御批武功大夫貴州刺史鄭諶帶御器械翌日上諭宰臣曰諶除命未須行朕宿思之昨召用徐俯外議謂諶所薦朕何嘗容內侍薦人徐俯之召止緣洪炎進黃庭堅文集有云徐郎或徐甥者後因胡直孺薦俯自代朕問之始知其人直孺稱其行義文采過人逺甚質之汪藻亦以為然遂召用後程俱論俯與諶往還狀始知外議乃爾今諶新命又恐外間紛紛不若止與在外宫祠張浚等曰陛下聖慮如此敢不奉詔右司諌王縉言近詔吏部注擬守二縣令精加選擇止欲得人而已而差注之日例出文引差人追請又令醫者診視因緣邀乞士大夫實耻之夫癃老疾病可以見於步趨答問之間何必醫人望免看診以示禮重士大夫之意從之庚子直寶文閣兩浙路轉運使張澄升直龍圖閣知建康府祕閣修撰知建康府葉宗諤為福建路轉運使右承議郎韓元傑知楚州武功大夫忠州團練使都督府幹辦公事楊圭知濠州右司諫王縉入對奏疏論江淮營田利害以為地假之零碎土色之不等莊屋之難置耕客之難招若召募土居人户佃種取其情願而輕立租稅庶幾可也若以官田之總數均之逐鄉之人或人丁少而不能耕或去家逺而不能耕或瘠薄甚而不堪耕或不曾標撥而出租課人有受其害者又况輸納之際專斗多端邀乞水旱之變官司艱於檢放寄養之牛來自廣西乍遇寒凍多有死損近免賠填人心欣悅其有置莊去處人耕百畝給牛一具耕作既勞尤多困斃此皆利害之不可不講者欲望申敕所差之官所至詢審的確利害無或茍簡觀望去其所謂害成其所謂利以為悠久可行之制輔臣進呈上曰營田誠今日大利如兩淮間田不可數計但恐召募不行而奪見耕之農則為民害矣須要遲以嵗月以漸為之第使耕種日廣便為大利張守曰但地無曠土則國用足上曰然所謂百姓足君孰與不足乃命以縉章示樞密院計議官李寀及營田官樊賔王弗如所請詔張浚母蜀國太夫人已出峽可令所在州津遣赴行在壬寅太常少卿吳表臣權尚書禮部侍郎中書門下省檢正諸房公事兼都督府咨議軍事張宗元權兵部侍郎升都督府參議軍事司封員外郎蘇符試祕書少監仍兼資善堂贊讀右司員外郎樓照守起居郎右文殿修撰提舉江州太平觀劉岑充徽猷閣待制知池州先是向子諲為江東大漕劾池州守臣右朝請大夫徐昌言軍儲弛慢至是三省檢㑹降昌言一秩而用岑左武大夫和州防禦使知閣門事韓恕為兩浙東路馬步軍副都總管從所請也癸卯尚書右司員外郎范直方左朝散大夫知吉州李彌遜並為左司員外郎樞密院檢詳諸房文字王迪兵部員外郎勾濤並為右司員外郎濤嘗入對論今日之勢莫如先取山東膏腴之地財賦所出叛臣因之以活國者數年若合江淮之師連衡以進一出淮陽一出徐泗伺敵之釁徑趨其地利則山東可得有也又聞襄陽之衆欲自唐潁走汴都而唐州之地綿數百里皆為荆棘餉道不通非用兵之利宜卷甲由信陽掠順昌窺陳蔡自陳至汴才兩日耳僭僞之衆必裭魄喪膽莫知所出其勢必搖杜牧之曰不計地勢不審攻守為浪戰最下策也丁未起復太尉湖北京西宣撫使嶽飛乞解官持餘服飛與宰相張浚異論歸過江州上疏自言與宰相議不合求解帥事遂棄軍而廬墓上不許日厯止書進呈嶽飛求解帥事更無他語今以諸書參考增入熊克小厯稱張浚與飛議不合飛喪母乞持服乃棄軍去居江州廬山誤也飛丁憂在去年四月此行蓋自建康西上道過江州因入廬山耳嶽侯傳云秦檜當國方主和議侯申奏乞持母服棄軍權居廬山檜遂舉張宗元為宣撫判官監軍事詔侯赴行在此益誤檜明年冬方獨相十一年夏飛方赴行在今不取觀文殿大學士左銀青光祿大夫江南西路安撫制置大使兼知洪州李綱特遷左金紫光祿大夫時綱遣本司幹辦公事韓异奉表問上起居且上疏論時事略曰願陛下益廣聖志與神為謀日新其德勿以去冬驟勝而自怠勿以目前粗定而自安凡可以致中興之治者無不為凡可以害中興之功者無不去有所規畫措置必以天下為度必以施於長久可傳於後世為法則中興不難致矣夫中興之於用兵止是一事要以修政事信賞罰明是非别邪正招徠人材鼓作士氣愛惜民力順導衆心為先數者既備則士奮于朝農安于野榖粟充盈財用不匱將帥輯睦士卒樂戰用兵其有不勝者哉疏入詔綱典藩踰年民安盜息故有是命朱勝非秀水間居録云張浚薦李綱帥豫章以報之未至也薦其弟維及其腹心鄒柄等皆立于朝又以所薦陳公輔為諫官居頃之議者謂靖康伏闕之變乃公輔為綱謀不當在言路綱聞而懼抗章丐罷浚又思所以安之繆言江西盜息民安轉綱官為金紫光祿大夫是時䖍吉盜熾旁郡亦擾欺罔如此上召异入見進一官遣還异侯官人也庚戌命權兵部侍郎兼都督府參議軍事張宗元權湖北京西宣撫判官往鄂州監嶽飛軍宗元為宣判日厯無一字及之但於四月十九日書兵部侍郎張宗元朝辭進對八月四日甲午書張宗元先次引見初六日丙申書宗元薦士劄子帶權宣撫判官銜而云臣出使湖北所過郡縣云云則使還時所上也今依林泉野記嶽侯傳朱勝非間居録修入以補史闕餘見今年七月丁卯八月乙未并注左朝散大夫万俟卨提㸃荆湖北路刑獄公事左奉議郎林待聘知處州左宣教郎孫汝翼知建康府溧陽縣汝翼嘗為樞密院編修官至是堂除大邑新制也故追官人何灌追復正侍大夫忠正軍承宣使灌已見建炎元年正月辛卯灌既死城下言者論其不能守河之罪盡裭其官灌子閣門祇候蘚使金而歸訴於朝故有是命壬子張浚辭往太平州淮西視師浚因論劉光世以八千人為回易沈與求奏臣聞光世之去嘗語人以陶朱公自比是誠可以致富矣浚等論范蠡之賢人所難及上曰蠡固賢朕謂於君臣之義猶有所未盡也熊克小厯載浚出行淮上撫諭諸軍在今年三月劉光世未罷之前蓋誤先是左司諫陳公輔請對上因語及嶽飛事公輔退上疏言昨親奉聖語說及嶽飛前此採諸人言皆謂飛忠義可用不應近日便敢如此恐别無他意秖是所見有異望陛下加察然飛本粗人凡事終少委曲臣度其心往往謂其餘大將或以兵為樂坐延嵗月我必欲勝之又以劉豫不足平要當以十萬橫截敵境使敵不能援勢孤自敗則中原必得此亦是一說陛下且當示以不疑與之反復詰難俟其無辭然後令之曰朝廷但欲先取河南今淮東淮西已有措置而京西一面緩急賴卿飛豈敢拒命前此朝綱不振諸將皆有易心習以為常此飛所以敢言與宰相議不合也今日正宜思所以制之如劉光世雖罷而更寵以少師坐享富貴諸將皆謂朝廷賞罰不明臣乞俟張浚自淮西歸若見得光世怯懦不法當明著其罪使天下知之亦可以警諸將也公輔此疏不得其日按此疏首云昨親奉聖語而其末云乞候張浚淮西視師歸則必浚未還時所上日厯十月十八日己酉左司諫陳公輔本職進對在此前三日自後至浚還朝公輔更無對班則知所云親奉聖語即己酉之日也熊克小厯繫之此月丁未嶽飛乞解帥之後按是時公輔未對浚亦未往淮西今宜附浚行之後庶不抵牾克又於此月末書浚欲以劉子羽領光世軍子羽不可乃詔子羽知泉州尤誤子羽知泉州在去年八月癸卯已併附本日蓋浚欲易光世之意已久不在今年也詔羣臣俟祔廟畢純吉服卒哭日建康臨安府禁屠宰三日大小祥諸路州縣禁樂七日屠宰三日初禮官奏百官卒哭日純吉服左司諫陳公輔請令且服黑帶以俟梓宫之還如梓宫未還須小祥後又乞百姓禁樂三年上曰禁樂固當但念細民以樂為業者無以得衣食耳事下禮官討論至是條上禮官言卒哭禁屠樂無故事然卒行之二都蓋上指也公輔初議在是月癸卯羣臣吉服十二月辛酉所書可參考直祕閣提舉淮南東西路茶鹽公事蔣璨以課息登羡進職一等江南東路轉運副使俞俟以營繕之勞除直祕閣度支員外郎莊必彊面對言近聞廬夀間微有邊警詢之道塗則其說曰淮上之師頗有失伍離次去而不為用者將臣諱其事而不言也臣不知所傳之虛實萬一有之則是必有姦人陰為間諜以誘我師其軍中失於撫循有以離其心也使將臣不以為諱而聞于朝則可以因事設備果諱而不言則敵勢猖獗軍情疑二朝廷不知矣豈不敗乃事欲望密詔諸將明斥堠廣耳目嚴為警備毋輒懈弛凡軍中之事悉以實聞雖無稽之言勿聽然聞之亦足以戒願陛下過聽而深戒之後二日詔關都督府必彊此奏行下在甲寅今附面對之日癸丑故奉議郎贈直祕閣諡忠襄楊邦乂加贈徽猷閣待制增賜田三頃於是樞密院奏邦乂忠節顯著宜極褒崇上曰邦乂忠烈如此顔真卿異代忠臣朕昨已官其子孫邦乂為朕死節不可不厚褒以為忠義之勸故有是命詔臨安府寄留諸軍家屬已令赴行在沿路毋得一毫擾民犯者許越訴管押其重置於法甲寅龍圖閣直學士提舉江州太平觀汪藻言先奉詔編次元符以來詔㫖今史館既修日厯恐此書非私家可為乞住罷詔藻接續編類丙辰都官員外郎馮康國面對論曩者金豫相挺連年冦蜀吳玠據險得利全蜀賴之玠之功績不可誣也然蜀地狹民貧山險道隘紹興四年秋陸運始行役夫饑餓疾病相仍斃於道者三之一蜀民至今痛之自後嵗頓不登斗米二千死者枕籍去年冬是役復興更名支移計其所運一石民間費七十千逃亡死損又未論也有為救蜀之說者曰省冗官節浮費裁損軍中請給亦庶幾矣夫冗官浮費固當節省而軍中請給易搖軍心未易輕議臣觀蜀中之弊患在糧運不繼而折支太優嘉陵江險灘磧相望夏苦漲流之失冬阻淺澀之患終嵗水運終不能給是以時起陸運之役兼軍前將佐俸給優厚類皆正色米斛價髙銀絹價平既闕正米不免折支每以低價銀絹估折髙價之米所以嵗費浩大錢糧兩不給也若遣官委曲諭玠三月以後九月以前除關外防扼合用軍馬數目外其餘將兵移屯內郡歇泊就糧且以二萬人為率兼選仁厚牧守分治梁洋兩郡招集流散二年之後耕鑿就緒可贍戍卒萬人嵗又省蜀中二十萬斛之運誠如此行於吳玠軍中無損于全蜀生靈稍寬保蜀善後之䇿無易於此伏惟陛下財察丁巳詔送都督府既而祕書省正字兼權五司郎官孫道夫轉對上諭曰召自逺方者朕必詢民間疾病至如職事官轉對即以朝廷闕失訪之誠欲追法祖宗不特舉行故事為文具而已也卿蜀人宜熟知蜀中利害水運與陸運孰便道夫奏水運遲而省費陸運速而勞民向宣撫司初由水運每石取民錢十千後以其緩起兩川夫十數萬人陸運每石費五十餘千利害可見上曰水運既便自當行之戊午遣內侍往淮西撫問張浚仍賜銀合茶藥是月僞齊有梟鳴於後苑又有鳥數千鳴於內庭皆作休也之聲劉豫不樂命立賞捕之建炎以來繫年要録卷一百十
