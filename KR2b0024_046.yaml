body:
  text: 建炎以來繫年要録卷四十六宋李心傳撰紹興元年秋七月乙未朔劉光世以枯秸生穗為瑞奏之上曰歲豐人不乏食朝得賢輔佐軍中有十萬鐵騎乃可為瑞此外不足信朕在潛邸時梁間有芝草府官皆欲上聞朕手自碎之不欲主此竒怪事輔臣歎服臣留正等曰天人之際相與至密國家將有失道之敗則有灾異以為之譴告然則政教之修明中和之浹洽亦豈無符瑞以示其嘉祥乎然而古人于灾異則深警懼之符瑞則重黜絶之何哉知其有灾異則戒信其為符瑞則怠人之常情也去其怠而謹其戒則所益不知其幾何不然則徒以自慢而已奚益哉此春秋所以記異不記瑞而栁宗元正符所以謂不于其天于其人也太上皇帝屢闢祥瑞之說至此乃以朝廷有賢輔鐵騎為言豈非所以示其重黜絶之意與內龜鑑曰其於奉天也深思政事以盡畏天之誠靜坐省以求答天之意彗出井度則深以天下為憂癸未風雷則深以敵人為慮久雨則詔求言大雪則詔决獄枯秸之生可稱也吾瑞鐵騎而不瑞枯秸麟鳯之獻可喜也吾寶賢能而不寶麟鳯獻芝草則斥獻甘露則貶於是而無喜祥瑞惡變異之失詔權湖南招捉公事馬友補正拱衛大夫成州團練使權荆湖東路副總管時潭未有守而奉議郎奏辟通判張掞權州事奏友討逐孔彥舟之勞遂有是命乃以掞通判潭州先是湖西安撫使程昌㝢與友交通亦以便宜檄友為湖東副總管言於朝昌㝢坐貶二秩友在潭州措置酒法官不造酒但收稅酒錢城外聽造而不得賣城中聽賣而不得造若酒入城則計斗升取稅公私利之掞昭慈親姑之子今年六月四日以昭慈遺恩自儒林郎得㫖轉一官比類施行今未踰月不知何以却是奉議郎當考昌㝢降官在八月己卯今併書之新除太府寺丞章億監都進奏院章效監登聞鼓院章倧並與外任以言者論姦臣子孫不宜在朝故也上因言小人但不當在朝廷至於間慢差遣亦當與之豈可絶其生路秦檜曰舉臯陶不仁者遠正謂不可令近君耳上首肯丁酉徽猷閣直學士銀青光祿大夫王序落職降二官提舉西京嵩山崇福宫序以奉祠滿歲請于朝詔許再任而給事中李擢中書舍人洪擬言其諂事梁師成法當討論乃有是命詔自今堂除及舉辟差遣之人如礙本貫並不得放上用三省請也資政殿學士提舉臨安府洞霄宫呂好問薨于桂州訃聞例外賜帛五百録其弟朝散郎言問通判桂州官給葬事言者論靖康之變好問身為執政不能死節先拜僞楚於庭褒恤過厚尤為不可上不聽苐損賜帛之數而已減賻贈在十月辛卯己亥奉議郎知大宗正丞常同知柳州庚子朝議大夫新知澧州吳革為潼川府路轉運副使自置宣撫司後四川監司以𠡠除者始此詔通泰鎮撫使嶽飛一軍權留洪州彈壓盜賊以江淮招討使張俊將班師也遂以飛為神武右副軍統制宣撫處置使張浚以便宜印造綾紙度牒鬻之川陜京西以助軍用至是以聞詔日下住罷辛丑皇伯右武衛大將軍信州防禦使令話為寧州觀察使封安定郡王先是燕秦二王後爭襲封久不决禮部員外郎王居正言燕王太祖長子其後當襲封議遂定令話德昭元孫也熙寧初首封秦王孫從式已而更封燕王曾孫世清至世福無人宣和中又封秦王元孫令蕩及是秦王後令庇年長當封而禮官以為小宗乃封令話壬寅申命有司討論濫賞時范宗尹以上將行明堂故事文武官當遷秩且任子者衆故舉行之上覽條目曰議得當否朕不欲人以事每議及上皇聖德翰林學士汪藻嘗言陛下詔有司立討論之目凡不以道而補官遷秩者皆論如律天下孰不以為宜然此法尚行於吏部而堂除之人則一切置而不問是使孤寒椎鈍者獨廢其終身凡稍黠而有援者巧騰捷出于法度之外而僥冒自如也此豈聖朝行於天下畫一之公法乎臣愚欲乞應今後堂除人並先取會吏部無有干礙討論事件如涉討論即依條改正會宗尹乞去位事遂不行復置翰林天文局太史局學生五十人天文局十人權湖東副總管馬友在漢陽嘗獻賀天申節銀及是至行在詔奬之癸卯奉直大夫景興宗直祕閣知興元府時張俊已用王庶興宗迄改命䖍州賊陳顒聚鄉丁數千焚掠雩都信豐諸縣詔趣捕之甲辰祕書少監程俱言本省見獨員今著作官闕請用元豐故事牒校書郎或正字暫權詔今後特令祕書省長二通修日厯乙巳朝散郎劉大中為祕書丞大中揚子人也丙午金左監軍昌自宿遷北歸昌過東平僞齊劉豫不出迎使人言於昌曰豫今為帝矣若相見無拜之禮昌怒責之却其獻豫遣僞相張孝純隨而和之昌卒不解丁未太尉兩浙西路安撫大使淮南揚楚等州宣撫使劉光世兼海泗州宣撫使時淮北之人歸附者甚衆故命光世安輯之殿中侍御史章誼言聞邵青自太平州乘船經由鎮江府江隂軍遂入平江之常熟縣所至劫掠劉光世以梟將鋭兵而不能應時擒制者邵青所乘皆舟楫而光世皆平陸之兵故也國家既憑大江以為險阻而於舟師略不經意今邵青小醜光世大帥乃敢越境深冦使賊有大於此者將何以禦之臣聞古兵法舟師有三等其舟之大者為陳腳船其次為戰船其小者為傳令船蓋置陳尚持重故用大舟出戰尚輕捷故用其次至於江海波濤之間旗幟金鼓難以麾召進退故用小舟由此觀之凡舟之大小皆可以為守戰之備不必皆用大舟然後濟也望於駐蹕之地置一水軍帥以名將計亦易辦詔淮南三宣撫措置時青已移舟通州海門鎮而行在未知也戊申詔諸路出賣官田指揮勿行以久佃之民失業故也己酉昭慈獻烈皇后虞主往溫州太廟上奉辭于行宫門外宰相率百官城外奉辭退進名奉慰所至郡縣長吏已下迎送于城外朝奉郎符確權知昭州書填僞度牒千二百餘道為轉運司所劾遂遁去詔籍其資確瓊州人也庚戌迪功郎新江西提刑司幹辦公事謝祖信為從事郎祖信邵武人獻屯田利害于朝乃有是命壬子武功大夫明州觀察使知真州史康民移知揚州宣撫處置使張浚承制以直祕閣胡考寧知資州朝奉郎喻汝礪知果州閣門祗候种湘知文州湘師道弟子也考寧初在京西為劇盜薛廣所執用為郢州通判又入王仔軍中黃潛善喜之擢通判襄陽府張浚入蜀考寧從辟以行積官朝奉大夫直祕閣既而御史奏其狀遂罷之仍詔宣撫司自今毋得與守倅差遣據狀考寧以去年十月四日到州其罷郡在今年八月己卯癸丑直顯謨閣知台州朝公為罷直龍圖閣新知台州沈與求令疾速之任先是天台人求珍以殺人繫獄珍以金賂公為之妻遂得不死降授承事郎知天台縣劉默言之都省及御史臺范宗尹與公為厚庇之乃移默他官命憲臣施埛究實五月辛酉埛依違以聞七月戊申上覺其意內批公為先次放罷宗尹始黜乙卯朝散郎廖剛為尚書吏部員外郎時辛企宗奏剛招安余汝霖不當剛上疏自辨上曰近數訪問臺諫及上殿士人皆言剛有守必不與賊交通富直柔范宗尹又稱其賢乃有是命上諭在是月庚戌中書舍人林遹轉對論金雖北去安知不示弱以怠我師候秋髙馬肥遣李成招集瀕淮飢民呼吸羣盜侵軼江南徐遣徑騎由真揚福山搗虛浙右願乘此時聚衆積粟搜將閲士以備防秋之計今日之弊在於兵不習戰將不肅命財用殫匱民食艱鮮州縣以軍興為名而掊取無度此乃腹心之深病政事所當先而盜賊縱橫尚為病在四肢可以漸去也惟陛下與大臣汲汲講圖之初五湖捕魚人夏寧聚其徒為盜後有衆千餘専掠人以為食郭仲威嘗招之不應命至是受劉光世招安又有仲威餘黨出沒于淮南亦受光世招安皆令來長蘆俟舟以濟寧等無食半月之間復陷萬餘人是日始具舟迎之由是江北鄉村愈覺凋殘矣丁巳降授武功大夫康州刺史韶州居住張思正許自便通議大夫試刑部尚書胡直孺以攢宫頓遞之勞進二官直孺不受己未昭慈獻烈皇后卒哭命左監門衛大將軍士即內中天章閣几筵前行卒哭之祭上不視事百官進名奉慰辛酉故追復觀文殿學士劉摯贈少師後諡忠肅以其子知開州長歷有請也摯渤海人元祐尚書右僕射黨籍執政第六人新州安置六年五月丙子再贈召江東安撫大使兼知池州呂頥浩赴行在欲代范宗尹也是日頥浩督諸將與張琪戰于饒州城外大敗之琪自徽州引兵犯饒州衆號五萬時頥浩自左蠡班師帳下兵不滿萬郡人大恐頥浩遣統制官巨師古招降之琪詐受招誘師古入其營遂薄城下統制官右武大夫宣州觀察使閻臯頥浩愛將也方捕盜于宜黃走檄呼之會臯平盜而歸星馳以赴頥浩召諸統兵官姚端崔邦弼顔孝恭郝晸等駐軍城外皆令聽臯節制端軍為左邦弼軍為右臯將中軍頥浩自畫陳圖授之琪兵至近郊前軍將張俊失利琪恃其衆直犯中軍臯力戰而端邦弼兩軍夾擊遂大破之追奔三十里殺賊甚衆賊又别遣水軍分道自景德鎮來犯頥浩遣統領官張慶以崔增餘衆禦之琪遁去夜其愛將姚興以所部詣巨師古降琪遂走浮梁縣復還徽州此以呂頥浩所奏及熊克小歷參修克繫之今年五月末按日歷江東安撫司以八月九日奏到以為二十七日事蓋七月二十七日辛酉也故移附此但克以為臯等才出城五里而賊先鋒已至頥浩所奏乃云令臯等披城下寨二十七日巳時賊兵到十五里外則克所云誤也克又云賊別遣精鋭為水軍分道而進頥浩自將水軍禦之而所奏乃云本司前期於都昌縣勾集崔增看寨老小將兵千人令統領官劉慶部領橫截賊兵奪船四十餘隻則非頥浩自將也巨師古被執姚興來降克並不書今以頥浩所奏增入壬戌宣教郎新通判嚴州黃策直祕閣策吳縣人元符末以上書入籍坐廢久之上方録用黨人策因上疏言昭慈獻烈皇后既過瑶華泰陵嘗有悔意以蔡京所録上皇聖語親札上之故有是命日歷無此今以紹興三年孟忠厚奏劄修入癸亥尚書右僕射同中書門下平章事兼知樞密院事范宗尹充觀文殿學士提舉臨安府洞霄宫初宗尹既建討論濫賞之議士大夫僥幸者爭排之諸大將楊惟忠劉光世辛企宗兄弟皆嘗從童貫行軍論者疑其亦當貶削此據朱勝非秀水録然朝廷元㫖止謂虛作從軍之人勝非所云蓋當時沮議者之說云耳今略修潤增入吏部侍郎高衛初以圍田改官此據紹興二年二月章疏及是主右選力持此以為不便上疏詆之同知樞密院事李回亦言宣和間任中書舍人以校正御前文籍遷官乞削職罷政上曰宣和政事恐不必一一皆非人主留意文籍自是美事豈可與其他濫賞同科參知政事秦檜曰此法一行濁流者稍加削奪便比無過之人誠為僥幸清流者少挂吏議即為辱甚大不敢立朝恐君子受弊上顧諭宗尹宗尹曰此事如回者無幾其他亦不足惜遂降㫖侍從及館職兼領者罪又詔武臣濫賞並免討論令尚書省榜諭其日壬子也日歷六月十八日有㫖應武臣濫賞並免討論追奪按此時尚未進呈討論文字日歷誤也熊克小歷亦云高衛先上疏詆之乃罷武臣討論既而李回乞罷政云云據克所書亦承日歷之誤蓋罷武臣討論乃七月十八日而日歷所供檢人誤在六月耳日歷中如此者甚衆命既下上終以為難後二日上批朕不欲歸過君父斂怨士夫可日下寢罷七月甲寅宗尹堅以為可行即日求去翌日遂召直龍圖閣新知台州沈與求赴行在按是日乙卯又一日輔臣進呈上曰天下事不必堅執至如人主有過尚許言者極論若遽沮遏祇須人不進言如此則於誰有損七月丙辰始宗尹之建議也檜力贊之至是見上意堅反以此擠宗尹又五日詔驛召吕頥浩次日遂召翰林學士汪藻草宗尹免制曰日者輕用人言妄裁官簿以廟堂之尊而負天下之謗以人主之孝而暴君親之非朕方丁寧德意而申命于朝汝乃廢格詔書而持必于下宗尹入相踰一年始宗尹與辛道宗兄弟往來甚密上不樂之及是遽罷於是崇觀以來濫賞悉免討論但命吏部審量而已討論濫賞初見建炎二年十月丙子四年六月辛巳今年七月壬寅再舉行熊克小歷云侍御史沈與求條宗尹大罪二十宗尹力請罷政蓋誤此時與求未還朝今年九月乃用與求言奪宗尹職名克不詳考耳詔曰朝請大夫知邛州王俁尚書右司員外郎萬格以刻薄之資成傅會之惡首建討論之議盡失士夫之心姑示輕刑用懲私意可並送吏部熊克小歷云俁格時並為都司按俁今年二月已出守克誤也上因諭輔臣曰俁格既罷自此恐紛紛不已日後當盡置勿論恐分明植黨非國家福張守曰此陛下盛德臣欲建議未敢富直柔曰前日吕頥浩趙鼎之去陛下與之終始到今今於宗尹復如此聖性忠厚天下之幸也甲子命同知樞密院事李回朝拜昭慈獻烈皇后攢宫先是禮官以明德權攢故事請上行朝拜之禮既而以道逺不可親詣乃命回代行是月川陜宣撫使張浚以直龍圖閣利州路提㸃刑獄公事楊斌為永興軍路經略安撫使朝散郎知巴州馮楫為利州路提㸃刑獄公事利路提刑題名斌以此月二十九日被受宣劄楫以九月六日到故並附此月末但不知是時永興帥寓治何地當考武翼大夫知濠州李玠棄城去以巡防官張德權知州事玠在濠州當羣盜縱橫之時以嚴酷殺伐為政縱所部擾民故能得軍士之情久處危城中金珠寶貨不可勝計玠欲順流東下為鳯凰州冦宏所扼至是玠貽書與宏通好宏許之玠遂挈其孥泛淮而去僞齊劉豫以其子太中大夫知濟南府麟為諸路兵馬大總管尚書左丞相封梁國公户部尚書張昴兼權左丞兼門下侍郎僞豫傳載此事於阜昌二年而無月按日歷今年八月十九日癸未劉光世繳豫僞詔已用麟為左相銜故參酌且附七月末八月乙丑朔詔奉安天章閣祖宗神御於法濟院以乘輿播越神御猶在舟中故也宣撫處置使張浚娶直祕閣成都府路轉運判官宇文時中女時已詔時中奉祠而浚稱其有勞承制升時中副使再任時中虛中弟也成都記時中以八月一日升副使日歷時中十二月四日除副使再任今附初除之日丙寅利州觀察使湖東馬步軍副總管孔彥舟為蘄黃鎮撫使兼知黃州用張俊奏也時彥舟在鄂州舟多糧富俊恐其盤據要地故奏用之拱衛大夫相州防禦使新除舒蘄鎮撫使張用有衆五萬在瑞昌後數日俊親揀其軍精鋭者留之老弱者許自便有投曹成者有投嶽飛者有投韓世忠者有自去而為民者俊既并其兵遂以用為本軍統制趙甡之遺史云俊以八月壬申親揀用軍今併書之按宋史繫丁卯日武顯郎南雄州兵馬都監郭康僞造制書自稱奉使廉察廣東兵官已下轉運判官章傑覺其詐捕送廣州誅之至是以聞武功大夫康州防禦使入內內侍省副都知梁邦彥特遷昭宣使録攢宫之勞也丁卯觀文殿學士新知潭州吳敏為荆湖東西廣南路宣撫使兼知潭州時江湖餘冦未平而敏留居嶺右故就用之熊克小歷今年六月末書初舊相吳敏方責居涪州范宗尹薦敏復觀文殿學士知潭州敏以祖母年高力辭遂改資政殿學士提舉洞霄宫至是又復敏觀文之職充廣西湖南宣撫使按敏以靖康元年九月責涪州建炎元年五月移栁州已而自便四年七月復官今年七月甲子除知潭州八月丁卯除荆湖東西廣南宣撫其年十二月乙丑改資政奉祠克所云官職及先後皆差誤不知何以如此山東統制忠義軍馬范溫所遣參議軍事李植至行在溫遣植事見今年五月丙寅上嘉之以溫為武翼郎閣門宣贊舍人統制山東忠義軍馬仍鑄印以賜而植亦補承事郎戊辰參知政事張守等上對修嘉祐政和敕令格式一百二十二卷看詳六百四卷詔以紹興重修敕令格式為名自來年頒行中大夫直祕閣新知饒州王㬇提舉臨安府洞霄宫㬇以鄭居中故積遷至大官時方討論故有是請㬇仲山子鄭居中女壻已見建炎元年四月右司諌韓璜論堂吏滑浩等與討論濫賞文字秦檜曰吏行文書耳恐不必罪李回曰如罪兩都司彼自無詞上曰兩都司殊刻薄為朝廷建議須有忠厚之風乃以浩送吏部江西安撫大使朱勝非言自正月領事至今所降軍儲漕司未嘗發到斗升顆粒又六月中給降監鈔七萬緡其資次乃在同時降下一百萬緡之後未知算請當在何時詔委漕臣張滙濟其軍食滙河南人也勝非又别疏論安撫大使名甚重而無錢糧及兵實不及一小邑然勝非受命踰年遷延不進逮張俊班師始入城視事論者咎之己巳責授寧逺軍節度副使汪伯彥復正議大夫提舉臨安府洞霄宫以參知政事張守言其才可用也後四日遂以伯彥為觀文殿學士江東安撫大使兼知池州權尚書工部侍郎韓肖胄以修𠡠成落權字大理卿王衣權尚書刑部侍郎尚書右司員外郎趙子畫等各遷一官以𣙜貨務嵗中收茶鹽香錢六百九萬餘緡故也庚午直龍圖閣沈與求試侍御史上嘗從容言王安石之罪在行新法與求對曰誠如聖訓然人臣立朝未論行事之是非先觀心術之邪正揚雄名世大儒乃為劇秦美新之文馮道左右賣國得罪萬世而安石於漢則取雄於五代則取道是其心術已不正矣施之學術悉為曲說以惑亂天下士俗委靡節義凋喪馴致靖康之禍皆由此也徽猷閣待制提舉臨安府洞霄宫李光知饒州時饒信冦盜甫平光方里居而停官人康允之未叙乃復允之朝請大夫與光分守二郡允之行至長溪而卒辛未刑部尚書兼侍讀胡直孺守兵部尚書壬申吏部員外郎胡世將奏其兄唐老靖康中嘗建議除上為大元帥且為之請諡上曰當時之事亦偶然耳何功之云張守等退而歎曰大哉王言尚書兵部員外郎陳與義試起居郎故追復奉議郎張庭堅贈直龍圖閣庭堅廣安人元符末右正言黨籍餘官第二十九人象州編管洺州防禦使知西外宗正事士從自衡州移司溫州所過騷擾詔罷之癸酉初命大禮後引試刑法官自渡江久廢至是舉行之此以二年二月六日刑部申明狀增入乙亥上諭輔臣曰黨籍至今追贈未畢卿等宜為朕留意程頥任伯雨龔夬張舜民此四人名德尤著宜即褒贈乃贈夬直龍圖閣夬河間人元符末殿中侍御史黨籍餘官第三十五人化州編管時工部侍郎韓肖胄嘗密啓上乞追褒元祐諸臣故有是諭丁丑命右監門衛大將軍士芑祔昭慈獻烈皇后神主于溫州太廟哲宗室用太常少卿蘇遲議位在昭懷皇后之上是日韓肖胄題神主罷藏虞主于西夾室上不視事百官進名奉慰故事虞主瘞于殿後議者以上方巡幸當俟還闕依故事施行後遂為例士芑濮王曾孫也陷金得歸及是甫至行在戊寅參知政事張守充資政殿學士提舉臨安府洞霄宫侍御史沈與求言守舉汪伯彥不當守引疾乞祠而有是命同知樞密院事李回參知政事端明殿學士簽書樞密院事富直柔同知樞密院事武德郎閣門宣贊舍人滁濠鎮撫使劉綱為兩浙東路兵馬副鈐轄詔綱不即還鎮罪當誅責以其父忠勞特與原貸其羣從六人皆授官有差武信軍承宣使辛興宗卒特贈檢校少保安化軍節度使初宣撫處置使張浚以書抵范宗尹報關陜曲折及以去秋出師失律上章待罪會宗尹已去位輔臣以其書進呈上曰比屢有人言便欲行遣朕以人君用人當以大度聽其所為但責成功俟無成功責之未晚浚又奏本司主管機宜文字傅雱擅用便宜未嘗赴司供職乞罷之雱時已在張俊軍中詔可其請浚念上繼嗣未立是日密奏乞講明故事擇宗室之賢優禮厚養以為藩屏於是上己命選二人而浚蓋未知也庚辰故追復端明殿學士降授奉議郎蘇軾特贈資政殿學士朝奉大夫以其孫宣教郎知蜀州符言復官未盡也辛巳詔尚書省復置催驅三省房及催驅六曹房范宗尹之相也事多留滯比其罷相制下省吏抱成案就宗尹書押者不可勝計言者請命大臣相度委本省官各一員監督㸃檢諸房文字置籍結絶故復舊制詔福建制置使辛企宗自建州移屯福州時帥臣程邁言下四州已為盜所殘今熊志寧等作亂事見六月丁亥恐侵軼餘郡乞遣一軍自溫台直出以備之朝廷亦以企宗玩冦故命企宗移屯會江東統制官閻臯招降潘逵所部叛兵事見六月壬午企宗請其兵自𨽻遂詔臯以全軍往福州受企宗節制遣閻臯在此月癸未壬午成忠郎䖍化縣巡檢權縣事劉僅為秉義郎閣門祇候李敦仁破䖍化縣僅擊去之郡守上其功故有是命徽州言張琪復入祁門縣詔張俊遣兵捕之詔浙西安撫大使司統制官拱衛大夫忠州刺史王德領同州觀察使餘將士萬一千五百七十五人皆進官有差録防江之勞也癸未進呈劉光世所繳劉豫僞詔詔尾乃其子為左相銜也上曰可見豫褊陋朝請大夫致仕周諤遷中大夫致仕諤范純仁甥王覿子壻陳瓘婦兄也元豐中嘗上疏請修京城神宗命籍其名欲加推用元符末上疏言章惇罪且論元符后不可配先帝寢廟遂坐廢錮至是其子從事郎淵以為請故録之諤黨籍餘官第一百六十人詔宣撫司類省試五路舉人許依舊制别項考校以陜西陷沒故優之也乙酉詔樞密院選使臣賫䗶書賜陳蔡二郡令掩殺李成成既敗其餘黨趙端等皆來降朝廷聞成在順昌詔知淮寧府李寶知蔡州范福合兵掩捕先是福以蔡州危棄城遁去土豪李祐馮直率軍民以守言於朝乃以祐為淮寧順昌府蔡州鎮撫使日歷八月辛卯權蔡州馮直乞除李祐鎮撫使降㫖未聞九月甲寅詔淮寧等州鎮撫使李祐與翟興桑仲王彥互相救應不知以何日除今併附此按宋史繫庚寅日丙戌中奉大夫提舉臨安府洞霄宫翁彥深復集英殿修撰丁亥參知政事秦檜守尚書右僕射同中書門下平章事兼知樞密院事范宗尹既免相位久虛檜昌言曰我有二策可以聳動天下或問何以不言檜曰今無相不可行也語聞遂有是命林泉野記云檜還朝為禮部尚書紹興初除參知政事檜曰陛下用臣臣必能聳動天下之士後宰相范宗尹罷上欲用吕頥浩已詔之富直柔韓璜辛道宗永宗皆懼其來密薦檜為相俾塞其進乃拜尚書右僕射按諸書皆言檜與直柔爭進故以道宗兄弟為直柔之黨深疾之其後得政竄斥無餘今乃云道宗薦檜恐誤餘見今年九月癸丑吕頥浩拜相注詔諸路折帛錢昨每匹三千慮高下不等若一槩立定有虧公私自來年令諸路漕司各估實直申省聽候指揮約折時諸路絹直才二千所折高民多倍費故言者以為請云此見四月壬午熊克小歷既不載元㫖又云自今各估以實直而節去來年自各申省聽候指揮之文遂失其實今依日歷書之戊子贈張舜民寶文閣直學士程頥任伯雨並直龍圖閣制曰朕惟周衰聖人之道不得其傳世之學者違道以趨利捨已以為人其欲聞仁義道德之說者孰從而聽之間有老師大儒不事章句不習訓傳自得於正心誠意之妙則曲學阿世者又從而排陷之卒使流離顛仆其禍賊於斯文甚矣爾頥潛心大業無待而興者也方退居洛陽子弟從之孝弟忠信及進侍帷幄拂心逆㫖務引君以當道由其內以察其外以所已為而逆所未為則高明自得之學可信不疑而浮僞之徒自知其學問文采不足表見於世乃竊其名以自售外示恬默中實奔兢外示朴魯中實姦猾外示嚴正中實回僻遂使天下聞其風而疾之是不幸焉爾朕錫以贊書寵以延閣所以振耀褒顯之者以明上所與在此不在彼也尚其明靈知享此哉先是頥子端中知六安軍為盜所殺其孫將仕郎晟在韓世清軍中伯雨子承務郎先由建炎初嘗除御營使司主管機宜文字不赴至是詔並赴行在舜民邠州人建中吏部侍郎黨籍待制以上第三十一人商州安置頥河南人元祐崇政殿說書黨籍餘官第三十三人涪州編管伯雨眉山人建中右正言餘官第二十八人昌化軍編管神武左軍都統制韓世忠請以明堂恩澤為子忠翊郎閣門祗候亮易文資許之諸將以文資祿子孫蓋自此始於是浙西安撫大使劉光世已任孫正平為班行既而亦請換授遂以為例光世陳乞在十一月己亥己丑直祕閣浙西提舉茶鹽公事梁汝嘉言本路嵗收鈔錢一百十九萬緡詔汝嘉及幹辦公事迪功郎方滋主管文字修職郎蘇師德各進秩一等明年又增五十一萬滋䝉孫䝉盧人元祐中為御史師德頌孫也頌丹陽人元祐間右僕射大理寺丞梁藻奏諸鎮帥臣援授文資者並令赴行在量試程文以觀素所藴習然後等第推恩從之庚寅銀青光祿大夫提舉臨安府洞霄宫李綱復資政殿大學士通議大夫提舉臨安府洞霄宫許翰中大夫提舉臨安府洞霄宫李邴並復端明殿學士初綱既奉祠久之未叙右文殿修撰胡安國嘗獻核實論言如綱才氣亦不易得特以疏直幾至殺身望行辨雪稍復故官庶使後來宰相赤心為國者不懼不報至是以改元德音而有此命勒停人王庭秀叙承議郎詔募人往河南伺金齊事宜且持䗶書慰撫忠義人之保聚者至汴京人給錢七十千還日有驗授保義郎餘州等第賞給辛卯尚書右僕射秦檜為明堂大禮使參知政事李回為禮儀使兼禮衛使同知樞密院事富直柔為禮器使兼禮頓使五使不置局令三省禮房専行自是遂為故事右司諌韓璜論新除觀文殿學士江東安撫大使汪伯彥為相誤國不當用不報疏再上上曰治天下蔽以一言曰公而已朕亦安得而私乃詔伯彥提舉臨安府洞霄宫職如舊秦檜之少也嘗從伯彥游學至是伯彥雖罷帥而因得職名蓋檜力也林泉野記云檜拜右僕射若誤國之相汪伯彥首復其官與之宫祠以報舊恩故中大夫直龍圖閣張上行贈集英殿修撰上行自䕫州移興元未至道病卒張浚言其在夔州捍禦有勞故有是命上行之死當在建炎四年秋或可移附其年七月末詔停官人降授右武大夫和州防禦使漢州居住辛彥宗許自便彥宗提舉承興秦鳯路保甲兼提刑張浚按其罪貶秩五等至是用赦而復之壬辰直祕閣知太平州郭偉令再任以土人武節郎致仕儲宏等舉留也時新守通直郎方承已視事偉行至鎮江而返承閉子城拒之偉乃借用兵馬都監印蒞事於班春堂事聞詔停承官而偉以守城功升直徽猷閣既而言者論偉貪殘亦罷去踰年獄具承坐貪祿罰金云日歷今年九月丙辰偉升職名十月丁卯偉申承不令還任承申偉有贓詔提刑司體究十一月乙未尚書省勘㑹方承違拒𠡠命而閉城門不令郭偉入城交割又直申臺諫有劫持朝廷之意詔方承先次勒停令建康府取勘庚子臣僚上言郭侔有入已贓八千實行刳剔之也乞放罷取勘詔偉先次放罷之四月丙戍刑部大理寺狀建康府勘到方承慮夫祿養要占戀差遣按發郭偉姦贓等事法寺稱准條私罪杖罰銅七斤有㫖依斷洪邁夷堅已志當塗圭田最厚民事清簡居官者樂之紹興初遇守郭偉滿秩不遣吏卒迎新新守方承不能俟迓人拏舟徑至郭閉子城拒之云己申朝廷乞補謁告月曰方君乃借用兵馬司印蒞事於班春堂監司具奏其狀兩人皆罷去按邁所記本末差誤今不取詔夏國歷日自今更不頒賜為係敵國故也癸巳朝請郎守大理少卿王綱進秩一等綱為郎刑部嵗中駁正死罪囚五人徒流已下甚衆故有是命停官人鄧雍復為朝請郎是月吏部員外郎廖剛言古者天子必有親兵實自將之所以備不虞而強主威使無太阿倒持之悔漢北軍唐神策之類是也祖宗軍制尤嚴如三衙四廂所統之兵關防周盡今此軍稍廢所恃以備非常者諸將外衛之兵而已臣願稽舊制選精鋭十數萬人以為親兵直自將之居則以為衛動則為中軍此強幹弱枝之道最今日急務昔假秀實嘗為唐德宗言譬猶猛虎所以百獸畏者爪牙也爪牙廢則孤豚特犬皆能為敵正謂是也願陛下留神毋忽初武功大夫榮州團練使知郢州曹成雖受官爵稱兵如故自鄂嶽引兵數萬掠湖西先是比部員外郎万俟卨避亂乞主管亳州明道宫居沅湘間安撫使程昌㝢用便宜檄卨權沅州事成掩至城下沅城小而惡卨晝夜廬城上召土豪集丁壯以守成食盡引去與知復州李宏合軍屯瀏陽縣既而二人有不相下之心成引衆攻宏宏遂奔潭州湖東副總管馬友令宏屯於湘隂而成亦移屯攸縣曹成圍沅州據万俟卨墓志不得年月按明年正月癸丑郴州奏成以八月間至攸縣故併附此卨初見建炎二年五月其除郎及奉祠月日史皆失之修職郎知攸縣范寅遜聞成掩至走連州避之寅遜建陽人也蘄黃鎮撫使孔彥舟在鄂州受命遂以所部知黃州建炎以來繫年要録卷四十六
