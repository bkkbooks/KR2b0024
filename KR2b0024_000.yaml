body:
  text: 建炎以來繫年要録目録編年類卷一建炎元年正月卷二建炎元年二月卷三建炎元年三月卷四建炎元年四月卷五建炎元年五月卷六建炎元年六月卷七建炎元年七月卷八建炎元年八月卷九建災元年九月卷十建炎元年十月至十一月卷十一建炎元年十二月卷十二建炎二年正月卷十三建炎二年二月卷十四建炎二年三月卷十五建炎二年四月至五月卷十六建炎二年六月至七月卷十七建炎二年八月至九月卷十八建炎二年十月至十二月卷十九建炎三年正月卷二十建炎三年二月卷二十一建炎三年三月卷二十二建炎三年四月卷二十三建炎三年五月卷二十四建炎三年六月卷二十五建炎三年七月卷二十六建炎三年八月卷二十七建炎三年閏八月卷二十八建炎三年九月至十月卷二十九建炎三年十一月卷三十建炎三年十二月卷三十一建炎四年正月至二月卷三十二建炎四年三月至四月卷三十三建炎四年五月卷三十四建炎四年六月卷三十五建炎四年七月卷三十六建炎四年八月卷三十七建災四年九月卷三十八建炎四年十月卷三十九建炎四年十一月卷四十建炎四年十二月卷四十一紹興元年正月卷四十二紹興元年二月卷四十三紹興元年三月至四月卷四十四紹興元年五月卷四十五紹興元年六月卷四十六紹興元年七月至八月卷四十七紹興元年九月卷四十八紹興元年十月卷四十九紹興元年十一月卷五十紹興元年十二月卷五十一紹興二年正月至二月卷五十二紹興二年三月卷五十三紹興二年四月至閏四月卷五十四紹興二年五月卷五十五紹興二年六月卷五十六紹興二年七月卷五十七紹興二年八月卷五十八紹興二年九月卷五十九紹興二年十月卷六十紹興二年十一月卷六十一紹興二年十二月卷六十二紹興三年正月卷六十三紹興三年二月至三月卷六十四紹興三年四月卷六十五紹興三年五月卷六十六紹興三年六月卷六十七紹興三年七月至八月卷六十八紹興三年九月卷六十九紹興三年十月卷七十紹興三年十一月卷七十一紹興三年十二月卷七十二紹興四年正月卷七十三紹興四年二月卷七十四紹興四年三月卷七十五紹興四年四月卷七十六紹興四年五月卷七十七紹興四年六月卷七十八紹興四年七月卷七十九紹興四年八月卷八十紹興四年九月卷八十一紹興四年十月卷八十二紹興四年十一月卷八十三紹興四年十二月卷八十四紹興五年正月卷八十五紹興五年二月卷八十六紹興五年閏二月卷八十七紹興五年三月卷八十八紹興五年四月卷八十九紹興五年五月卷九十紹興五年六月卷九十一紹興五年七月卷九十二紹興五年八月卷九十三紹興五年九月卷九十四紹興五年十月卷九十五紹興五年十一月卷九十六紹興五年十二月卷九十七紹興六年正月卷九十八紹興六年二月卷九十九紹興六年三月卷一百紹興六年四月卷一百一紹興六年五月卷一百二紹興六年六月卷一百三紹興六年七月卷一百四紹興六年八月卷一百五紹興六年九月卷一百六紹興六年十月至十一月卷一百七紹興六年十二月卷一百八紹興七年正月卷一百九紹興七年二月至三月卷一百十紹興七年四月卷一百十一紹興七年五月至六月卷一百十二紹興七年七月卷一百十三紹興七年八月卷一百十四紹興七年九月卷一百十五紹興七年十月卷一百十六紹興七年閏十月卷一百十七紹興七年十一月至十二月卷一百十八紹興八年正月至三月卷一百十九紹興八年四月至五月卷一百二十紹興八年六月卷一百二十一紹興八年七月至八月卷一百二十二紹興八年九月至十月卷一百二十三紹興八年十一月卷一百二十四紹興八年十二月卷一百二十五紹興九年正月卷一百二十六紹興九年二月卷一百二十七紹興九年三月至四月卷一百二十八紹興九年五月卷一百二十九紹興九年六月卷一百三十紹興九年七月卷一百三十一紹興九年八月卷一百三十二紹興九年九月至十月卷一百三十三紹興九年十一月至十二月卷一百三十四紹興十年正月至三月卷一百三十五紹興十年四月至五月卷一百三十六紹興十年六月至閏六月卷一百三十七紹興十年七月至九月卷一百三十八紹興十年十月至十二月卷一百三十九紹興十一年正月至三月卷一百四十紹興十一年四月至六月卷一百四十一紹興十一年七月至九月卷一百四十二紹興十一年十月至十一月卷一百四十三紹興十一年十二月卷一百四十四紹興十二年正月至三月卷一百四十五紹興十二年四月至六月卷一百四十六紹興十二年七月至九月卷一百四十七紹興十二年十月至十二月卷一百四十八紹興十三年正月至閏四月卷一百四十九紹興十三年五月至八月卷一百五十紹興十三年九月至十二月卷一百五十一紹興十四年正月至六月卷一百五十二紹興十四年七月至十二月卷一百五十三紹興十五年正月至六月卷一百五十四紹興十五年七月至十二月卷一百五十五紹興十六年正月至十二月卷一百五十六紹興十七年正月至十二月卷一百五十七紹興十八年正月至六月卷一百五十八紹興十八年七月至十二月卷一百五十九紹興十九年正月至六月卷一百六十紹興十九年七月至十二月卷一百六十一紹興二十年正月至十二月卷一百六十二紹興二十一年正月至十二月卷一百六十三紹興二十二年正月至十二月卷一百六十四紹興二十三年正月至六月卷一百六十五紹興二十三年七月至十二月卷一百六十六紹興二十四年正月至六月卷一百六十七紹興二十四年七月至十二月卷一百六十八紹興二十五年正月至六月卷一百六十九紹興二十五年七月至十月卷一百七十紹興二十五年十一月至十二月卷一百七十一紹興二十六年正月至二月卷一百七十二紹興二十六年三月至五月卷一百七十三紹興二十六年六月至七月卷一百七十四紹興二十六年八月至九月卷一百七十五紹興二十六年十月至十二月卷一百七十六紹興二十七年正月至四月卷一百七十七紹興二十七年五月至九月卷一百七十八紹興二十七年十月至十二月卷一百七十九紹興二十八年正月至六月卷一百八十紹興二十八年七月至十二月卷一百八十一紹興二十九年正月至四月卷一百八十二紹興二十九年五月至閏六月卷一百八十三紹興二十九年七月至十二月卷一百八十四紹興三十年正月至三月卷一百八十五紹興三十年四月至八月卷一百八十六紹興三十年九月至十月卷一百八十七紹興三十年十一月至十二月卷一百八十八紹興三十一年正月至二月卷一百八十九紹興三十一年三月至四月卷一百九十紹興三十一年五月至六月卷一百九十一紹興三十一年七月卷一百九十二紹興三十一年八月至九月卷一百九十三紹興三十一年十月卷一百九十四紹興三十一年十一月卷一百九十五紹興三十一年十二月卷一百九十六紹興三十二年正月卷一百九十七紹興三十二年二月卷一百九十八紹興三十二年閏二月至三月卷一百九十九紹興三十二年四月至五月卷二百紹興三十二年六月至十二月臣等謹案建炎以來繫年要録二百卷宋工部侍郎井研李心傳撰心傳精於史學通知故實詳見宋史儒林傳中是書乃纂述髙宗朝三十六年事迹仿通鑑之例編年繫月與李燾長編相續寧宗時嘗被旨取進永樂大典别載賈似道跋稱寶祐初曾刻之揚州而元代修宋遼金三史時廣購逸書其目具見袁桷蘇天爵二集並無此書之名是當時流傳已絶故修史諸臣均未之見至明初始得其遺本録之而文淵閣書目祗有一部二十册藏諸祕府其他諸家書目亦並未有儲及之者蓋其失傳久矣誠已軼僅存之善本也宋自南渡後史學盛行紀述之書最稱該備迄今存者固多而蹖駁亦復不少獨心傳是編以國史日厯為主而參之以稗官野記家乘志狀案牘奏報百司題名無不臚採異同以待後來論定故文雖繁而不病其冗且其於一切是非得失之迹皆據實詮敘絶無軒輊緣飾於其間尤為史家所僅見即如宋人議論多右張浚心傳獨能直書不諱并朱子行狀而亦不敢盡從未嘗以蜀人稍為掩覆宋史本傳謂其重川蜀而薄東南之士實有不盡然者綜而論之其書雖取法李燾而精審較勝至視熊克陳均趙甡之諸家相去殆懸絶矣原本所載秦熺張匯諸論是非錯謬疑為後人攙入又於本注外載有留正中興聖政吕中大事記何俌龜鑑諸書當亦修永樂大典時所附入者今既無别本可證姑依文録存間加駁正有與宋史互異者亦各為辨證附注下方其書中所載金人地等名音譯均多舛誤謹依欽定金史國語解之例詳加訂正别為考證附載篇末用以訂訛傳信仍依原第釐為二百卷至此書命名文獻通考作繫年要記宋史本傳作髙宗要録互有不同今據心傳朝野雜記自跋及王應麟玊海定為繫年要録編次如左乾隆三十八年十一月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀
