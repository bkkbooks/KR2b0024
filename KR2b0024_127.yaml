body:
  text: 建炎以來繫年要録卷一百二十七宋李心傳撰紹興九年三月按是月辛巳朔壬午集英殿修撰提舉江州太平觀李璆為徽猷閣待制右朝請大夫提舉江州太平觀張宗元栁約並復祕閣修撰趙鼎之當國也璆兩經檢舉不報至是與秦檜連姻特除之丙申徽猷閣直學士知漳州廖剛試御史中丞剛在漳州嘗應詔上封事乞早以建國公正皇子之號大略謂惟誠足以動天地感人心今意雖有屬而名未之正恐未足以慰幽顯之望至是以年將七十謂宜謝事會已有召旨詔書趣行至則有中司之拜剛首奏臣職在搏擊姦邪當思大體若乃捃托細故矜一得於狐兔之微則非本心他日入對又言今經費不支賊盜不息事功不立命令不孚及兵驕官冗之弊蓋不一其原則在於一人之身若意誠心正以照臨百官則是非不紊姦邪洞見天下之弊可次第革矣中書言昨修執政拜罷録詳略失中本末差舛詔史官重行編修秦檜之初免相也上以御劄斥其罪而一時制詔拜罷録具焉檜欲滅其迹故有是請於是史官言罷免後事迹乞更不編載奏可其後書不克成此以王明清揮麈後録及日厯會要參修但後録以為丁卯毁拜罷録恐誤按會要九年三月六日有旨重修二十一年又用祕書少監林機言再行編修其後不克成史官乞不載拜罷後事迹在十月辛未顯謨閣直學士知湖州常同徽猷閣待制王居正並提舉江州太平觀從所請也丁亥和州防禦使璩為保大軍節度使封崇國公戊子尚書吏部侍郎晏敦復户部侍郎梁汝嘉皆進權本部尚書汝嘉仍兼江淮等路經制使侍從過宰執閣相見既退宰相須送出數步時敦復見秦檜未嘗送出每曰人必自侮然後人侮之舊六部胥史罪無大小皆送大理有罪而必送則頗煩擾不送則無以懲戒常以為患敦復之為尚書也奏請置門頭杖外可以省頻送之勞內可以示必懲之威是以胥吏知畏而不敢為過至今便之尚書兵部侍郎兼侍講兼資善堂翊善吳表臣移禮部侍郎權工部侍郎兼侍講蕭振移兵部侍郎徽猷閣待制知臨安府張澄試工部侍郎直寶文閣淮南東路轉運副使蔣璨升祕閣修撰權知臨安府既而澄辭乃遷澄徽猷閣直學士而璨為浙西轉運副使顯謨閣待制提舉江州太平觀趙霈復徽猷閣直學士左通奉大夫提舉江州太平觀劉洪道復徽猷閣待制皆以赦敘也左朝奉郎提舉江州太平觀吕本中更俟一赦取旨殿中侍御史謝祖信言和預買為今日民間之病有司從而變為折帛錢又其所甚病者今日固未能去若處之使得其所猶可以少紓民力其説無他惟均而已矣近者知徽州吳偉明乞用稅錢均敷此徽及江東所宜耳諸路未必可用欲乞下諸路轉運司各令條具所敷之宜或以稅錢或以畝頃使户無髙下人無貧富凡有田産者以丈尺為率等而上之合零就整依夏稅法如此姦民􅠕吏詭名析産無所容其幸而所出均矣詔户部措置自承平時官預俵買本一縑千錢時縑帛價亷得錢於春而輸縑於夏所以優民也軍興以來官中無本可俵名為預買其實白著其後户部又令折錢每匹為十千或八千比嵗絹直稍平而折錢不減江浙之民深以為患故祖信論之己丑尚書左司員外郎閭邱昕為中書門下省檢正諸房公事右司員外郎陳槖試左司員外郎樞密院檢詳諸房文字范璿試右司員外郎吏部員外郎王鉌為樞密院檢詳諸房文字右朝散大夫宇文師瑗行尚書度支員外郎祕書省著作郎胡珵守禮部員外郎兵部員外郎吕用中守祠部員外郎既而言者以珵用中為趙鼎之黨乃以珵知嚴州用中知建州二人補郡在是月甲午甲午命參知政事孫近撰皇太后册文參知政事李光書册兼篆寶寶用金册以珉石詔崇國公璩赴資善堂聽讀祿賜如建國公例右朝散大夫吳説為福建路轉運判官此以終去年八月辛酉上諭大臣事乙未少保鎮南軍節度使醴泉觀使成國公吕頤浩乞歸台州養疾許之初上欲得元臣調護陜西諸將乃命中使陳永肩將醫宣押頤浩赴行在頤浩以老病力辭上賜手札曰朕以陜西重寄非卿夙德素望不能任此出自朕意欲煩卿行可即日就道俟到靣議當處畫事卿宜深體至意母更執謙頤浩乃條具陜西利害大略言金人無故歸地其必有意臣計五路元係張中孚中彥慕容洧之徒為帥今必仍舊然皆久據一方敵亦難令當諭以德意許之久任庶不致疑又言陜西利害今日所繫甚重若一觸事機必貽後悔如張中孚等未見向背趙彬又係曲端門客本一書生其人尤桀黠伏望曲留聖慮詔趣頤浩赴闕既而頤浩至行在上命國醫王繼先視其疾頤浩留七日不能入見上乃聽其辭及將歸復言秦為天下脊今宜於長安興元襄陽各置宣撫司而重兵屯襄陽且建行臺仍即五路選精騎三萬赴行在請上親提萬騎不時勞軍使敵人不知六飛所在以伐其謀庶敵不敢窺江淮而中興之業由兹起矣上既許頤浩台州養疾乃以其子直祕閣抗為直徽猷閣添差提舉浙東茶鹽公事以便其歸江淮等路經制判官霍蠡言臣聞自三司之法壞而户部雖掌經費不復稽財用之出入久矣軍興以來上自朝廷下至州縣案籍焚毁綱目散亡老胥猾吏出沒其間而掌邦記者但以調度不足為憂苛刻隱欺之患不暇復省故一有調度舉以其數責之司漕漕責之州州責之縣縣責之民民不勝其求不得不為巧避之術於是詭名寄産分户匿稅之弊百端紛起今將檢察其實固非督其逋負收其羡餘以為刻剝之務亦將計其所取於民者幾何有當取有不當取者從而是正之核其上供於朝廷供億於大軍及諸司之所支撥州縣之所當用者各幾何有當用有不當用者亦從而是正之使其所取有常所用有數復於朝廷逹於萬民皆可通知以為經久之制尚慮不知者謂今設官之意檢察之名徒為聚斂之政願詔諸路監司州縣使明知陛下設官理財將為足國安民之計悉力而奉行之詔下諸路監司照會丙申東京留守王倫始交地界先是趙榮既納欵知夀州王威者亦以城來歸趙雄撰韓世忠碑云烏珠既陷三京又犯漣水王遂率背嵬軍走破烏珠偽守趙榮以宿州降李世輔以亳州降按榮之降在未割地之前不應附於明年五月而世輔自陜西入夏國後乃來歸亦不從亳州路碑蓋誤也及倫至東京見金右副元帥瀋王宗弼首問榮威且責赦文載割河南事不歸德於金倫一面改定謂元降赦文非真乃已接伴使烏凌阿思謀至館亦以榮威為問必欲得之至是倫始交地界畢京城父老官吏送宗弼至北郊宗弼坐壇上酌酒為别應交割州軍官物十分留二分餘八分赴河北送納宗弼由沙店渡河之祁州金遂移行臺於大名初金以葛王褒為三路都統知歸德府褒秋毫無擾甚得人心及割地而歸褒悉遣其吏士先行最後乃出即下釣橋極為肅靜丁酉徽宗皇帝禫祭上詣别殿行禮己亥以久雨放臨安府內外公私僦舍錢三日自是雨雪則如之詔分河南為三路京畿路治東京河南府路治西京應天府路治南京以帥臣兼留守三路各置漕臣一員兼提刑初河南鎮撫使翟興既死其將李興降於劉豫豫用為鄜延路兵馬鈐轄移河南至是以興為武翼大夫閣門宣贊舍人職如故豫之僭也有郁臻者以吏職出身獻屯田之議豫大喜行其䇿且謂人曰前朝以虛譽用人惟尚科舉至宣靖間誤國者皆進士及第之人也我則不然惟才是用不問門閥乃以臻為秉義郎閣門祇候充白波輦運及敵還河南召臻赴行在秦檜見而不之禮既而曰劉豫國祚不永者蓋由任此輩而不用士人也臻恨之祕書省正字樊光逺言臣竊觀今日士大夫之論莫不憂金人之詭詐臣獨曰詭詐不足憂而信實深可懼也通和之使項背相望吾既空府庫以奉之矣河南之地賦租悉蠲吾又將竭江左民力以給之矣府庫已空民力已竭士氣已墮一言不酬金人改慮此臣之所以私憂過計而為陛下深懼也夫有無故之福則必有無故之禍往者燕山六州二十四縣金人以兵取之來歸於我當時竭天下之力以償之所得止數空城而已朝廷動色相賀而天下蹙頞相弔一旦改慮席卷而南如寄諸鄰而取之此陛下所親見也願陛下勿以得地為喜而常以為耻勿以甘言為悅而常以為憂勿罪忠讜以養敢言之氣勿喜迎合以開濫進之門勿盡民力以固根本勿沮士氣以備緩急亦庶乎其可也此疏不得月日今附見交地界之後詔增補殿前司鈞容直樂工以二百人為額舊鈞容直四百人至是存者七十餘人既而上聞其召募擾民第命據見管人數存留而已後旨在四月庚午左朝奉大夫知吉州陶愷行尚書金部員外郎庚子金人所命環慶路經略安撫使趙彬上奏待罪詔以彬為左正議大夫充徽猷閣直學士知慶陽府辛丑翰林學士兼侍讀樓照為端明殿學士簽書樞密院事詔殿前司諸軍統制統領將官二百十二人用講和赦書各進秩一等統制十三統領二十一正副凖備將一百七十八其後摧鋒軍統制左武大夫華州觀察使韓京等十五人亦如之摧鋒軍統制統領各一正副將十三今年五月己巳轉官壬寅尚書右僕射監修國史秦檜兼提舉史館實録院以史館見修徽宗實録故也左諫議大夫曽統言自今命令事干軍期不可緩者乞依舊報行其餘除授須俟拜命方許視職至若畫黃未下敕命未成即依舊制更不報行從之祕閣修撰新京西路轉運副使宋輝改充應天府路轉運副使兼提點刑獄公事癸卯試尚書禮部侍郎兼資善堂翊善吳表臣兼侍讀權禮部侍郎馮楫兼侍講升衡州茶陵縣為軍以知縣兼軍使縣當江西湖南境上其地方二千餘里皆深山大澤在唐嘗為雲州至是湖南諸司言比年寇盜多民不安業請建為軍故有是命仍以將兵三百𨽻之甲辰主管殿前都指揮使公事楊沂中乞以本司酒庫五處歸户部詔嘉奬仍令本部嵗給錢十萬緡為軍費是日偽資政殿學士知開封府鄭億年上表待罪億年嘗為偽尚書右丞任事甚久朱勝非秀水間居録稱億年為偽齊吏部侍郎遷户部尚書尚書右丞而偽齊録當豫廢時億年實為吏部兼户部侍郎二書不同按偽豫傳豫所命右丞初是張東辛亥年東罷范恭權迄豫廢恭尚為此官亦與勝非所云不合陳淵劾疏又稱資政隆名乃豫所竊以與億年或者豫廢後億年嘗為行臺右丞亦未可知第資政乃豫所除則為右丞又在其前耳今且云嘗為右丞更須參考乙巳後宫韓氏為紅霞帔十三年六月封才人丙午祠部員外郎劉昉祕書省校書郎邵溥並兼實録院檢討官上因諭大臣曰宰相進退百官凡士大夫孰有不由宰相進者然宰相賢則所引皆賢豈當一槩以朋黨疑之也秦檜曰陛下推誠任下如此為大臣者豈忍懷姦以欺聖聽丁未詔歸德府復為應天府平涼府復舊州名陳許頴夀曹延慶州復舊府名順州臨汝鎮汝頴順軍復舊縣名皆偽齊所改也先是偽齊建雙廟於應天以祠陳東歐陽徹王倫命毁之此據趙甡之遺史附入尚書刑部侍郎劉岑移吏部侍郎左朝奉郎新幹辦行在諸司糧料院李利用為河南府路轉運判官兼提點刑獄公事上諭秦檜曰河南新復州郡當擇愷悌慈祥之人庶能為朕撫養凋瘵使不失職殿中侍御史謝祖信言東南之財盡於養兵民既困窮國亦虛竭然此所費止於養兵一事而已今梓宫既還有陵寢遷奉之費皇太后之歸有宫室迎衛之費皆前此所無而前此養兵之費又不可闕伏望睿明取逺慮見幾之義皆留聖心其陵寢遷奉願預戒節約以遵先帝恭儉之仁宫室迎衛願一從省素以成聖孝養志之美罷不急之務減冗長之費然後經中原以固根本則中興之業可以成矣從之武翼大夫閣門宣贊舍人王才為建康府兵馬鈐轄以江東制置大使葉夢得言其知淮南利害也是春夏人乘折可求之喪陷府州可求子彥文挈家依金左副元帥魯國王昌於大同府後金人命彥文知代州熊克日厯附此事於八年春末蓋差一年夏四月庚成朔上率百官遙拜淵聖皇帝於行宫北門外循舊禮也少保鎮南軍節度使醴泉觀使成忠穆公吕頤浩薨年六十九辛亥詔簽書樞密院事樓照暫往陜西宣諭德意先是吕頤浩既辭行遂罷置宣撫使而命照往制置移屯等事仍帶衛卒千人自汴京往四川宣撫使吳玠言舊川陜宣撫使嵗用激犒錢一百八十萬緡今改為四川宣撫司各守疆界别無招納望減其半從之偽武經大夫濰州團練使知亳州王彥先武功郎閣門宣贊舍人兼丹州兼管內安撫司公事傅師禹皆上表稱賀詔彥先依舊知亳州師禹知丹州仍令彥先以出身以來文字繳申尚書省換給壬子金人所命鄜延經略使知延州關師古上表待罪詔以師古為雄武軍承宣使知延安府癸丑詔河南新復州軍民間利病許監司守臣條陳餘官及士民上書所在州繳奏檢校少傅奉國軍節度使知泉州趙鼎落節鉞依舊特進知泉州時右諫議大夫曽統殿中侍御史謝祖信共論鼎罪統奏鼎叨位宰司怙權植黨近既丐間安於近輔望亟加譴謫祖信奏鼎罪惡滔天不可殫紀在靖康末嘗受張邦昌偽命為京畿提刑其後得志力引王時雍愛壻熊彥詩於朝以報其德平居每及圍城之事則心競力爭形於詞氣鼎與張浚同秉國政浚貪功喜兵一意進取鼎位上宰實主其謀不恤民力不顧國用欲將士之悅則出給厯之令而啓溪壑無厭之求快一已之私則託專任之辭而杜臺諫敢言之氣發兵遣戍中外騷然財用不足始售户帖户帖不足復鬻官告官告不足遂換度牒誅求刻剝民不聊生既専大政威福在已內則潛與姻家隂結密援以謀固其根株外則力引死黨分布要地以共成其羽翼下則厚餌遊士談説遊揚以助發其氣焰竊陛下之名器以為已用擅國家之財利以市私恩使天下之人惟知有鼎不知有陛下其初罷相也詞命之臣欺主以保交乞不為貶責之制其再罷相也耳目之官附下而罔上有陛下必悔之言鼎能使其黨出死力如此寧負陛下不敢負鼎使復得志將何所不至哉鼎初為相即與張浚合謀用兵後因私隙意遂以異及淮南之警浚方督師出戰鼎懼其成功從中撓敗果代浚遂盡以用兵之罪而加之前日王倫再行鼎實與遣講和之議不聞其輒異也及金使再至鼎適去國又以不主和議鼓惑衆論夫和戰二者國之大議鼎為元輔實任其責當戰則戰豈容中止可和即和貴在合宜而隂拱默睨每持兩端殊無殉國之忠動作謀身之計此其罪之大者也伏望特加流竄正國典刑章五上乃有是命權吏部尚書晏敦復充寶文閣直學士知衢州從所請也龍圖閣直學士提舉江州太平觀陳規知順昌府時順昌闕守而偽朝奉大夫陳道夫以通判權府事兼管內安撫司公事上表稱賀乃詔道夫通判如舊而命規守之環慶經略使趙彬言已殺叛將慕容洧其部曲多降秦檜言陜西遂已無事實為慶幸然洧實不死按紹興十一年四月洧尚寇邉宣撫副使胡世將遺之書蓋彬所言非實也甲寅詔溫福州祖宗諸殿神御令湖州相度可以奉安處申尚書省十月甲寅不行殿中侍御史謝祖信權尚書吏部侍郎制曰粵自簡知再為御史極純誠而不二嫉姦惡以如仇朕用嘉之擢登法從蓋賞其言也金人所命陜西諸路節制使兼兵馬都督權京兆府張中孚為檢校少保寧國軍節度使知永興軍節制陜西諸路軍馬先是赦書與金人割地詔皆至長安而中孚匿赦書不宣獨拜金詔其間有斥廟諱及御名者軍民皆怒至是中孚上表待罪上優容之乃有是命張中孚事以胡世將所奏修入詔諸州縣有隱寄財産及假借户名或立詭名挾户之人限一年內自陳併歸一户今日以前人户冒占官産令諸路漕司每三縣選有風力官一員逐一體究括責比倣鄰近田舍立定租課令依舊佃賃仍限一月自首限滿不首並許諸色人告陳將所寄隱財産依見行條法給賞其冒占官産之人斷罪追賞外仍追理以前租課皆用中書請也偽武功大夫知宿州景祥上表賀即以祥知宿州乙卯資政殿學士知衢州富直柔提舉臨安府洞霄宫從所請也承奉郎偽東京路轉運副使李俅乞歸田里詔放罪俅仕偽庭為殿中侍御史丙辰景靈宫孟夏朝獻上詣行禮殿行禮翌日亦如之自是四孟皆用此例戊午祕書少監鄭剛中充樞密行府參謀官是日東京同留守郭仲荀入京城已未觀文殿大學士新荆湖南路安撫大使李綱提舉臨安府洞霄宫初綱奏辭新命上不許命中書舍人兼直學士院李誼草詔行下至是綱再章求免有曰當日白簡公肆詆誣而誼為諫官嘗論綱罪乃引嫌自列乞改命詞臣遂詔中書舍人劉一止撰述會綱乂上疏言臣迂踈無周身之術動致煩言數年之間亟奮亟躓上纍陛下知人任使之明實有繫於國體故有是命壬戍詔卜永固陵於西京右武大夫榮州防禦使致仕王繼先特遷華州觀察使餘人母得援例詔升胙城縣為軍以東京留守王倫言縣與北界滑州相連乞升名額以便文移故也左朝請郎直祕閣劉彥適知徐州朝奉大夫偽東京副留守申賜承奉郎偽東京路轉運副使劉繼之乞歸田里詔放罪令赴行在所奏事賜建炎中嘗為少府監右迪功郎王棠特改合入官仍舊充東京留守司幹辦公事棠從王倫使北故召對而問之癸亥御史中丞廖剛言今先帝已終而朔望遙拜淵聖皇帝之禮如故此盛德也然禮有隆殺方兄為君則君事之及已為君則兄之而已欲望勉抑聖心自此寢罷嵗時自行家人禮於內庭可也若逺在萬里之外每尊之為君比其返也則不然政恐天下有以議我也况此拳拳之意於淵聖何補萬一歸未有期尤非所以示逺人事下禮部太常寺侍郎吳表臣馮楫少卿周葵等請遇朔望日皇帝用家人禮遙拜於禁中羣臣遙拜於北宫門外從之甲子祕書丞陳淵宗正丞陳確並守監察御史觀文殿學士孟庾為河南府路安撫使兼知河南府充西京留守資政殿學士致仕路允迪為應天府路安撫使兼知應天府充南京留守偽直祕閣知單州蔡如葵偽武德大夫知臨汝軍馮佺上表賀詔即因所稱官而命之丙寅感德軍節度使萬夀觀使髙世則開府儀同三司初上念世則帥府舊僚欲以為使相趙鼎曰今一年之間三除使相韋淵錢忱士㒟也天下事殊未濟而戚里相繼作使相公議謂何請少待之上善其説遲回者踰嵗始有是命端明殿學士提舉臨安府洞霄宫折彥質落職以諫官曽統言故相趙鼎用彥質為耳目以去不附已者淮西之警遽議斂兵幾敗國事故也金人所命彰武軍承宣使秦鳳路經略安撫使權知平涼府張中彥上表待罪以中彥為清逺軍承宣使知渭州丁卯簽書樞密院事樓照辭行命坐賜茶詔祠部員外郎劉昉條上廣南利害以御史中丞廖剛言嶺南凋弊之甚昉本貫潮州備知民間疾苦故也戊辰上謂大臣曰韓世忠欲獻一駿馬朕令留以備用世忠曰今和議已定豈復有戰陳事朕曰不然敵雖講和戰守之備何可必弛朕方復置茶馬司若更得西馬數萬匹分撥諸將乘此間暇廣武備以戒不虞足以待強敵矣和議豈足深恃乎左宣教郎通判臨安府朱敦儒為祕書郎直祕閣江南東路轉運副使俞俟知揚州集英殿修撰提舉江州太平觀潘良貴知明州庚午上諭秦檜曰陜西諸將既叛復來緩急金人敗盟難以責任朕謂中原尚可從容圖治至如陜西五路徑兵良將所出他時當用腹心之臣可也實録院奏修徽宗實録畫一一今來所書嵗月甚近尤防漏泄雖有斷罪指揮今欲優立賞格許人陳告一今所修書欲從簡約略去細務一所書先朝政事因革有當時權臣專恣所為者欲倣册府元龜例辨析於後庶見之即明邪正羣臣私記皆偏見自私言多失實今並不取一今所修實録卷帙不少欲用景德中修兩朝正史例每編一二年先具草卷進呈卷末仍書史臣姓名時秦檜領史院諱避者多故實録成書踈略壬申禮部奏皇太后從物名色其間有純金為之者先是上諭大臣以太后歸略備一行從物務從簡朴其間器皿等塗金可也朕自即位服食器未嘗妄費卿等所知上語在二月丙寅至是秦檜言所用甚微上再三不從曰太后儉素第須塗金檜曰敢不仰承聖意尚書吏部侍郎劉岑充徽猷閣直學士知潭州詔夀春府移歸淮北舊治時守臣武翼大夫閣門宣贊舍人孫暉入見後三日以暉領忠州刺史遣還偽武功大夫閣門宣贊舍人知綏德軍劉議奏嘗汙偽命乞放還田里秦檜擬依舊職任上曰新復州郡他時悉選用文臣武臣不曉三尺不可與郡偽奉直大夫開府少尹李景模等乞削籍放歸田里詔令赴行在與合入差遣癸酉秦檜進呈宗正少卿三京宣諭方廷實私書言金人方欲固兩河人心其所邀求五事非甚難行不可不從以示大信上曰廷實在臺時不以和議為是今至京城目覩利害乃能深合今日事機以此見士大夫皆是信不及耳此與熊克所書廷實奏邉事不合不同當考日厯又云方敵使在館論和議者章疏盈篋何獨廷實哉上虛心聽納狂瞽之言不獨寬貸又能察其用心豈復有壅蔽隔絶之患哉徽猷閣直學士提舉江州太平觀趙霈知平江府霈趙鼎所斥也甲戌偽奉義郎知鄭州劉全咨上表賀復命全咨知鄭州前資政殿大學士席益未免喪薨於溫州乙亥詔京東淮東宣撫處置使韓世忠淮西宣撫使張俊及隨行將佐並賜燕臨安府治上以世忠持身亷特賜建康永豐墟田千頃世忠辭不受司農卿莫將論財用五説由冗官濫費𣙜法虛文名色輕隱錢帛輕荒儲積不固願專委主計之臣一二人與臣窮究本源灼見利病然後斷而行之必有明效詔權户部尚書梁汝嘉與將同措置丙子左朝奉郎賀允中為尚書倉部員外郎建炎以來繫年要録卷一百二十七建炎以來繫年要録卷一百二十七金人地名考證烏珠原書作兀术誤改見卷一烏凌阿原書作烏陵誤改見卷一
