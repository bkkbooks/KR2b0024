body:
  text: 建炎以來繫年要録巻一百三十二宋李心傳撰紹興九年九月戊寅朔尚書右司員外郎魏良臣為左司員外郎司農少卿陶愷為右司員外郎龍神衛四廂都指揮使䕶國軍承宣使李世輔言初歸朝日有父母兄弟之讎臣曾報復乞待罪詔世輔有功鄜延特放罪後四月引對便殿上諭曰卿忠義歸朝立功顯著乃起復故官賜名忠輔除樞宻院都統制俄又賜名顯忠顯忠換給日歴不書或是樓炤行府便宜所命也按日厯顯忠待罪及朝見並不帶持服字令乃云特與起復或是因上殿乞解官當考京東淮東宣撫處置使韓世忠乞以顯忠為本軍統制官上不許顯忠行状云公與韓世忠同鄉里而未嘗少屈於韓及公歸朝韓力於上前奏乞公於麾下上以公才非韓所能服遂以樞密院都統制處之且靖康建炎之間世忠已立功為觀察使而顯忠尚未官年小於世忠二十餘固非其儕匹也顯忠既歸朝繼為劉光世楊存中軍中統制而世忠視存中為先逹且威名年位又皆過之存中能服顯忠胡謂不能服之哉蓋自趙鼎再相朝廷漸欲易置偏禆秦檜又忌世忠故不欲驍将畀之耳行状縁餙而云葢非其實已夘光山軍承宣使樞宻副都承㫖錢愐為徳慶軍節度使提㸃皇城司愐副簽書樞宻院事韓肖胄使金國歸故有是命中書門下省檢正諸房公事范同論私鹽窮究來歴之害以為州郡徒刑殆無虛曰深可憫惻臣嘗詢究利害而得其詳蓋比年以來亭竈煎鹽起止火伏之法盡廢畧無稽察致亭户私煎莫知紀極雖許額外煎到鹽賣納入官而官價低小校之私賣不及三分之一又場監乞覔減尅遲緩艱阻坐罄貲糧如是則私賣與官鬻孰利欲望命有司講究先革私煎之弊其次斟酌煎鹽實費立定適中價直仍關防場監之際勿令循蹈前轍庶㡬亭户所煎有限縱有賸數不歸於私而以輸官為便非特法行禁止囚繫漸少亦使利歸於公上國計不為小補詔户部措置閤門祗候吳益為武翼郎閤門宣贊舍人承信郎吳蓋為閤門祗候辛已左朝請郎劉化源左奉議郎米璞劉長孺並轉両官主管台州崇道觀新鳯翔府府學教授隂晫特改合入官時簽書樞宻院事樓炤言璞不汚偽命化源䧟金十年不屈長孺當劉豫僣逆嘗致書勸豫轉禍為福為豫所囚臣嘗召至本府並欲津遣赴行在而璞苦風痺右足幾廢化源長孺亦皆老病不任道路乞並轉官與宮觀差遣璞化源初見紹興元年三月長孺初見建炎四年九月又言晫亦是䧟隔以來守節不仕之人乞更賜褒擢故有是命先是宣諭使周聿亦上璞化源忠義於朝詔赴行在八月戊辰㑹炤出使遂就進官焉其後金人復背盟長孺知華隂縣不屈而死化源等除目以林待聘外制集修入日歴不如是之詳也壬午左朝奉郎鄭億年言有收到祖宗諸后御容五十餘軸今被召入覲見在舟次乞令臨安府差人奉迎入内從之億年之過常州也守臣直秘閣王縉不為禮且靣詰媿之既至行在秦檜復以億年為顯謨閣直學士提舉醴泉觀奉朝請繼欲復億年偽授職名參知政事李光榻前靣折之乃止此以朱勝非秀水閑居錄修入明年正月甲辰億年竟復資政殿學士癸未樓炤言川陜既分屯人馬已將自軍興以來剏生科敷悉行蠲免凡八十餘萬貫石上曰四州久屯大兵不無科湏今故地歸復兵各分遣得以減罷遂可愛養民力矣上欣然喜見於色起居郎周葵乞將犯私茶鹽人免根問來歴上曰犯𣙜貨者不根問經由此嘉祐著令仁宗盛徳也舉而行之則吏不至並縁獄不至滋蔓可速令省部相度後不果行熊克小歴載此事在九月丁未蓋誤給事中蘓符試尚書禮部侍郎仍兼資善堂翊善樞宻直學士成都潼川府䕫州利州路安撫制置使知成都府胡世將為寳文閣學士川陜宣撫副使置司河池諸路並聴節制世将精神明悟嫻習吏治其守成都甚有政績至是就用之世將既除宣副諸將皆賀世將語之曰世將不能騎射不知敵情不諳邉事朝廷所以遣來者襲國朝之故事以文臣為制將爾自今以徃軍中事務皆不改吳宣武之規模世將有所未逹諸公明以指示或諸公有所未逹者亦當奉聞各推誠心勿相疑忌共濟國事可也諸公皆拜謝初資政殿大學士張守帥江西以郡縣供億科擾煩重上疏請蠲積欠損和買罷和糴及裁減軍器物料上欲行之時秦檜方損度支為月進且曰虞四方財用之不至也覽疏怒謂人曰張帥何損國如是守聞之歎曰彼謂損國乃益國也至是成都闕帥檜遂擬以守代胡世將上曰張守素弱豈堪逺道江西盗賊寜息人方安之無庸昜也檜乃止此據趙甡之遣史履政大夫萊州防禦使知河州白常為涇原路馬歩軍總管起復武功大夫愽州刺史熙河路馬歩軍副總管知鞏州兼管内沿邉安撫使魏玠知河州兼主管洮西沿邉安撫司公事翊衛大夫和州防禦使熙河路兵馬都鈐轄行營右䕶軍右都統制軍馬李師顔兼知鞏州兼管内沿邉安撫司公事武經郎吳濬充環慶路兵馬都監濬革子也在陜西用樓炤請而命之權户部侍郎晁謙之言議者謂自古理財之臣皆無善終所以近世習而成風不復以理財為言臣以為不然聚歛而興利固非所宜如經理常賦以足國裕民又安可緩今曰官物多䧟失而州縣寝不加省宜有以救其弊而革之至於勸農欲墾無遺利督賦欲輸無逋期廣儲蓄之計以備水旱遵茶鹽之法以通啇賈凡若此者宜悉令條畫以聞從之熊克小歴載此疏於紹興十四年按謙之明年閏十月改工部十一年九月罷十四年乃在撫州不知克何以差誤如此甲申左朝散大夫權尚書禮部侍郎兼侍講馮檝左朝奉郎試中書舍人兼侍講劉一止並試給事中左通直郎試中書舍人兼侍講兼直學士院李誼試工部侍郎兼職並如故舊制職事官同日除者以寄禄官為序至是一止審於朝乃詔一止係自中書舍人除授序位在檝之上焉是月壬辰降㫖右通直郎張汲添差通判衢州汲孝純子上召對而命之乙酉故同州觀察使李永竒特贈鎮西軍節度使永竒妻令人䝉氏特贈安化郡夫人以其子顯忠歸正故也於是顯忠弟左武大夫沂州圑練使世夀武顯大夫愽州刺史世延修武郎世武姪忠訓郎師道及顯忠之子秉義郎師政各贈五官永竒乾道初賜謚忠壮丙戍皇叔檢校少師光山軍節度使開府儀同三司判大宗正事士㒟封齊安郡王以朝陵還特封之也日歴無此今以㑹要及中興玉堂制草修入戊子樓炤言永興軍保福院有姓張人自稱趙王上皇第五太子係杜玘璉皇后之子小名仲山年十九本軍已差官祗應日為給食契勘所供年紀稱呼詐偽不實已下本軍根勘詔趣具案以聞直徽猷閣利州路提㸃刑獄公事宋萬年為永興秦鳯等路提刑兼提㸃弓箭手措置營田又以行營右䕶軍統領樊彦知洮州賀景仁知邠州向洌知鄜州皆用樓炤請也上曰炤經理關陜毎有奏陳頗合事宜兼為朝廷得此人材以濟國事尤可嘉也利路提刑題名宋萬年八月五日赴樞宻行府取禀差充永興秦鳯等路提刑在此前已月餘蓋炤先除而後請也景仁洌前銜未見當考秘閣修撰新知單州栁約知蔡州左朝奉郎葉夏卿復直秘閣知單州詔左承奉郎高頴令引對頴河南人宣和末中進士第金豫之際隠於民間樓炤言其忠義上召見遂以為國子監丞己丑詔諸軍舊帶大河以北差遣之人並改帶河南州軍差遣行營右䕶軍後部統制兵馬李永琪知鳯翔府秦鳯路兵馬鈐轄孫注知成州庚寅罷經制司其諸路常平事令提刑兼領始用曾統奏也常平法起於西漢嵗豐則斂歉則散後世講之尤詳秋成則歛春饑則散可以平物價抑兼并人有接食官無所閲法至良也熙寜初王安石修水土之政與筦𣙜之利置提舉官以常平司為名當時所行新法如免役坊埸河渡青苖市易方水田利皆俾提領遂為民患議者不察但云常平法可廢建炎初遂盡罷提舉官時諸路苖役羡錢各不下百數十萬緡朝廷草剏多取諸此次年吕頤浩等言常平法不可廢其附益之者如坊場免役等可行青苖市易等可罷有詔委頤浩等詳議已成書矣㑹南渡未及行已而言者槩斥提舉官不可復前議遂寢其後或𨽻提鹽司或𨽻發運司或𨽻經制司終無定論而兵火焚蕩户部及州縣圖籍皆廢財賦多失矣辛邜樓炤奏以修武即閤門祗候知同州郝抃知陜州冨平之役抃以慶陽叛至是用之上覧奏問秦檜曰陜州合差是何臣僚檜曰係舊差文臣上曰武人作郡徃徃不曉民事又多恣横今日所還州郡久䧟金豫尤湏守臣得人使之愛養百姓非武臣之所任也可自今只差文臣庶能宣布徳澤亦以收還威柄承議郎蔣汝翼知醴州汝翼以進士得官建炎末為文林郎知成安縣䧟於金積遷至是官河南初復汝翼赴行在待罪詔與合入差遣遂有是命汝翼放罪在今年五月丁亥詔今後諸軍不許代名事見紹興六年末以言者論自都督府隨宜措畫以來冐名竊禄者不知其幾乞加釐革故也涇原路經畧安撫使張中孚言邊隅無警望許臣入覲闕庭詔俟春煖起發既而秦鳯等路提㸃刑獄公事宋萬年遺川陜宣撫副使胡世将書言昨頒降新復河南詔書張中孚等初不曽拜却将金國詔書宣讀百姓見詔書上有本朝廟諱御名皆不忍聞萬年昨密問吳璘萬一兵復渡河如何措畫璘謂中孚等重兵在手為秦鳯腹脅之患内外相應必來擣虛我軍旣守家計安能遠出接戰以此見中孚等隂藏姦謀所繫非輕世將即具以聞且言臣昨論奏逐人罪惡以謂朝廷方守信誓不欲遽易帥守然中孚等並已降指揮許令入覲欲望因其自請别與差遣於是中孚等皆改命癸巳左廸功郎王從一改合入官依舊太平州州學教授從一以薦對故有是命甲午名皇太后宮曰慈寧直秘閣主管台州崇道觀王浚明知亳州乙未工部侍郎王次翁權資善堂翊善以蘓符出使故也武功大夫忠州防禦使韓公裔特轉行右武大夫明州觀察使上以公裔給事藩邸及今三十餘年積勤勞故有是命故成忠郎盧大受特贈修武即官一子以紹興初結集忠義欲解慶陽之圍為劉豫所殺故也事見紹興元年四月川陜宣撫司以便宜増印錢引二百萬道應副陜西使用時右䕶軍之移屯者當用糴本錢四百三十萬引而計司之糴本錢乃有是請焉丙申詔汝州郟城縣故資政殿學士蘓軾墳寺以旌賢廣惠為名以孫禮部侍即符援范鎮家賜刹例有請故也戊戌張洵知同州未見前銜拱衛大夫威州防禦使温濟勒停南劔州編管濟為京東淮東宣撫處置使司提舉一行事務以其徒左武大夫耿著隂事告於朝語連韓世忠故有是命世忠意未快連上疏奏濟狂惑犯分罪惡顯著乞遣至軍中詔濟移萬安軍編管王次翁叙紀云濟以世忠隂事來告上命黜居湖南世忠連上章乞遣至軍中詞甚不遜按濟先貶海外十一年七月乃移潭州叙紀誤也移萬安日歴不載今以世忠奏狀修入林待聘外制集左武大夫耿著摑人至死降五官軍前自效恐即是此事當求他書參考己亥太尉東京同留守郭仲荀言所帶在京人馬已至鎮江先是上召仲荀赴行在仲荀因與劉豫之衆五千七百餘人南歸熊克小歴稱仲荀領劉豫下兵八千以還而樞密院勘㑹指揮乃云仲荀将帶東京官兵五千七百二十八克恐誤上謂秦檜曰仲荀善人也但馭衆非所長姑令駐彼别選人代之檜曰孰可當者上曰極難其人欲於二三大将統制官中選之檜等言董先牛臯才具上曰二人誠驍勇然先好貨臯嗜酒未可馭衆時京畿提㸃刑獄公事辛永宗與仲荀偕來上亦以其誕謾不可用檜曰外人不知陛下察其姦狀乃謂最蒙眷寵上曰朕何嘗喜之如道宗更不循理亦不可用既而檜等請以樞密統制官雷仲代将其兵從之奏雷仲管鎮江軍馬及上稱臯先未可馭衆乃十月戊午事今併書之庚子故中大夫直龍圖閣趙叔近贈集英殿修撰以御史言叔近有功於杭秀之民不幸死於亂兵望量加褒恤故也事祖在建炎二年辛丑詔東京遠來宗室子年及二十者授承信郎餘廪給之俟年及取㫖用魏悼王五世孫慧之等請也甲辰權刑部侍郎陜西宣諭使周聿使還入見聿言陜西旣歸得地數千里得兵十三萬得馬四萬有四塞之固居天下上游可謂彊盛然陜西䧟偽十有餘年城池不修器甲不備異時四十萬僅支一隅今纔十三萬而夏人不敢侵犯者以金人精兵在内故也今日金人盡去土地闊遠雖有要塞其實甚虛欲望陜西凡空閑不耕之地除元業主識認給付外依本朝沿邊制度並招弓箭手土地肥美邊人樂耕不出數年兵政自成盡在闋中與唐無異因謀都邑以建本根又言陜西諸路既命楊政帥熙河吳璘帥秦鳯然所屯之衆皆四路忠勇之士吳玠教習已踰十年百戰之餘所向無敵和好既成即可徃來舊國舊都不能無念統兵之官皆欲誘致望訓戒四路帥臣非元所統不得招納如敢違命必罰無赦熙秦兩路如有㪚亡亦當加以不能存撫之罪聿又靣陳所過州縣遺民見之皆懽忻鼓舞屬户有感泣者乙巳宰執奏事上以語之秦檜曰此祖宗仁恩涵飬而陛下純用德化故為夷夏所歸上曰皇天無親惟德是輔朕嘗笑趙鼎舉劉麟之語曰我能嚴刑故州縣無不畏聞江南只是尚寛鼎因勸朕立威以馭下是不知為天下者豈可不尚德而用刑也乃以聿所言令川陜宣撫司措置小歴云檜等退而竊歎曰唐太宗不聽封德彛之法律而用魏徴之仁義故能成貞觀之盛上於聽納同符太宗矣權刑部侍即陳槖等言右廸功郎李卿諳練刑法請以為大理評事許之言者論卿以特進名授官年踰六十又非試中刑法之人命遂寢乙巳左文林郎黄魯子特改合入官依舊平江府府學教授以薦對也丙午左朝㪚大夫董濬知興仁府左朝㪚大夫余應求為福建路轉運副使陜西之䧟也武翼郎涇原路第十将王忠弼沒於偽齊積官權秦鳯經畧使朝廷因命為龍神衛四廂都指揮使奉寧軍承宣使知德順軍節制涇原路山外諸将軍馬至是忠弼繳納偽命乞放歸田里詔速令換給仍賜詔諭之右通議大夫提舉江州太平觀劉阜民卒於湖州日歴不見贈官㑹要本門亦無之當考是秋太行義士蜂起威勝遼州以來道不通行時金人法苛賦重加以饑饉民不聊生又下令欠債者以人口折還及藏亡命而被告者皆死至是將相大臣如魯王昌宋王宗磐之徒皆被誅二帥乆握重兵植黨滋衆今則悉為亡命保聚山谷官司不能制金人罷諸路酒務賣於民間監官月督酒戸輸錢於官初金人右選入仕之法自初補閤門祗候至率府率凡十四階止許調征𣙜之任每月折支十千金籍移易庫金自贍而已至禮賓副使始理親民資序乃有廪禄及是罷之失職者甚衆冬十月按是月戊申朔庚戌尚書司勲員外郎張宧為監察御史初吏部功賞難於覈實吏得舞文為姦宧因陛對力陳其弊以謂圖籍㪚逸止慿省記月異而嵗不同無所總括舍法則用例引例則破法姦弊日滋甚非畫一之政請自今以例為據者悉令上之朝廷稽其合於三尺者著為定制人以為當宧八月甲寅除勲外未知何日陛對日歴十月戊申張宦靣對當即是此日也辛亥詔侍從各薦士二人時言者請遵祖宗故事詔中外各舉所知特加親擢如此則庶僚無附下之嫌大臣免招權之謗上亦以中原隔絶遺才必多故有是命祕書省正字朱翌范如圭並為校書郎翌仍兼實錄院檢討官如圭仍兼史館校勘是日同簽書樞密院事王倫始見金主亶於御林子倫致上命亶悉無所答令其翰林待制耶律紹文為宣勘官問倫還知元帥逹蘭罪否倫對不知又問無一言及嵗幣却要割地但知有元帥豈知有上國邪倫曰昨者簽宣蕭哲以國書來許割河南歸梓宮太母天下皆知上國尋海上舊盟與民休息使人奉命通好兩國耳癸丑權尚書刑部侍郎周聿改户部侍郎太常少卿蘓擕權刑部侍郎權吏部尚書兼史館修撰張燾充寳文閣學士知成都府兼本路安撫使四川制置司限一月結局初成都謀帥上諭秦檜曰張燾可付以便宜使治成都第道遠恐其憚行檜退召燾諭㫖燾曰君命也燾其敢辭上大喜遂有是命上諭檜曰燾雖安撫一路如四川前日無名横歛不急冗費可令蠲減以寛民力以成都帥臣而得行四川民事自燾始駕部員外郎喻汝礪靣對漢文帝光武嗇於用兵而厚於惜天下之力所以為後世計者至深遠也自漢以來屯戍轉輸嵗與敵角者其費不可勝支唐之謀臣日闘天下之士以弊方鎮而唐日以微今陛下講好結信以交兩國之懽寢兵休士以重萬民之命固知生事徼功之臣流毒遂以羸中國而思有以戒之也臣之區區尚願陛下申飭邊吏毋隱姦毋顓利毋徼亂以仰副陛下睦鄰好紓吾民嘉惠汝礪又言臣嘗謂忠義之士如玉鎮大寳故為天下者雖有高城巨浸以為之防粟糧漕庾以為之備良士選卒以為之戰而微忠義之士以為之守是委社稷而輸之敵也臣竊念之自靖康建炎而來将帥守宰義夫烈婦豈無捐軀徇國犯患觸禍負傑異之撡如古人乎若不及時早加褒掇歳月荒老無所訂正伏願申詔史臣採自靖康而來蒙患死難暴人耳目較然不欺者書之為死節之士復摭近日樓炤之所蒐訪周聿之所論薦者書之為守節之士庶幾彰國家臨危有仗節之士勵世有消萌之術詔送史館甲寅詔温福州奉迎景靈宮神御别聽指揮先是有詔奉迎神御至吳興而浙東諸州鑿山拆屋剙造次舍言者以為擾故暫罷之是日樞密行府凖備差遣王晞韓以夏國招撫使王樞至行在樓炤言陜西新復正與夏國為鄰此等留之無益還之可使知恩乃詔閤門引見令臨安府燕犒差行在官館件秦檜又召樞至都堂諭以講和意并還慶所獲夏人之俘百九十人歸之仍命晞韓伴送樞至境上明年三月所書夏國事可參考己未上諭大臣曰陜西新復州縣已放租税三年四川大軍移屯亦蠲軍賦不少惟階成岷鳯未知寛恤可與免租税之半以裕民力尚書禮部侍即兼侍讀兼資善堂翊善吳表臣權吏部尚書兼職如故庚申簽書樞密院事樓炤自陜西還行在炤乞罷政以奉親上不許敦武郎鄭涓監潭州南兵廟仍賜銀帛一百匹兩以周聿言涓頃知定西寨守節不屈也事見紹興元年二月尋又詔所居州津赴行在丙寅洪州觀察使新知鼎州王彦卒於邵州年五十荆南舊部曲聞彦之䘮皆即佛宮為位而哭彦事親孝居官廉其為将也與士卒同甘苦屢破大盗子弟從軍者未嘗霑賞及将死召其弟姪悉以家財分給之時號名将然性剛寡合雖待士盡禮而黑白太分此其大畧也戊辰慈寧宮成宮依山為之供帳皆備上召秦檜等入觀觀文殿大學士知湖州朱勝非提舉臨安府洞霄宮時用臨安守臣張澄議浚運河而兩浙漕司調夫甚衆勝非上疏論其害即日罷之因引疾求去章六上乃有是命己巳顯謨閣學士提舉江州太平觀汪藻知徽州藻閑廢累年以詔旨成書復命出守庚午詔新成都府路安撫使張燾令引對燾奏蜀自軍興以來因於征繇民力凋敝官吏旣不加恤又從而誅剥之去朝廷遠無所赴愬臣俟至部首宣陛下德意俾一路之民咸沾惠澤上曰豈惟一路應四川寛恤事件悉委卿措置燾因奏臣入界即行詢訪應民間一利一害先次罷行官吏有貪冒慘酷為民之蠧者臣先次放罷續行按發庶幾遠民速霑實惠上皆可之燾又言國家自軍興以來十餘年矣日不暇給今兹和議甫定征戰暫息亦可謂閒暇之時矣况來年嵗在庚申乃藝祖開基之載得非陛下中興之時乎時不可失願陛下鑒詩人閒暇之語稽孔孟發明之意汲汲專以治政刑為務上曰朕當書此語置之座右前是之蜀者例皆舟行至荆南則舍舟遵陸燾行至鎮江上奏曰主和者逹蘭也今為其姪烏珠所戕勢必渝平乞道京洛闗陜以徃因得觀形勢利便且至河池與胡世将共議邊計上許焉陜西轉運副使姚焯直秘閣焯隨樞密行府出使故就用之焯以七月壬辰除陜漕未見前銜林待聘集有制詞云比繇樞屬留使闗中而樞密院官屬題名無焯姓名蓋行府官屬也詔右修職即陜西都轉運司主管文字王湛令赴行在湛啇州人畧通書史多機數避難入蜀守将邵隆亦在蜀中湛屈已事之隆知啇州湛亦隨歸漸補以官至是用樓炤薦召此據徐夢莘㑹編修入夢莘又云隆料金人有歸河南之意然不乆必復取之乃作料理河南之䇿授湛使詣行在湛改為已文以見樓炤炤未之信既而金人許割三京地炤大驚以白秦檜檜喜薦湛改官為樞密院編修官隨炤徃陜西宣諭按夢莘所云與史不合今姑附此或是隆料金人復取三京因湛召還授以此䇿而夢莘所記小差更須參考辛未詔萬壽觀使髙世則令赴行在供職秦檜引之也權尚書工部侍即兼侍講蕭振充徽猷閣待制知湖州徽猷閣待制提舉台州崇道觀程俱提舉萬壽觀充實録院修撰秦檜薦俱領史事故有是除俱以疾不至寳文閣直學士提舉江州太平觀梁汝嘉為四川都轉運使兼陜西都轉運使專管熙秦兩路汝嘉辭不行徽猷閣直學士提舉亳州明道宮劉岑降充徽猷閣待制初右廸功郎吳伸之上書請滅劉豫也事見紹興三年岑為秘書少監以書譽之至是有刻吐金集本者實伸所上疏而岑書在焉秦檜奏伸書有斥聖躬之語不可傳播恐流入外境乃令臨安府拘收今年九月癸未岑坐降職翊衛大夫安德軍承宣使京畿路提㸃刑獄公事辛永宗落階官為蘄州防禦使兩浙東路馬歩軍副都總管永宗在京畿惟尋訪古器及宣政間宮禁舊物捜求美女而已每廵歴州縣專務苛擾民有寃抑不能赴愬既去則人唾罵之此並據趙甡之遺史甲戌監察御史陳淵守右正言乙亥簽書樞密院事樓炤乞賜告省侍於明州上謂宰執曰羣臣之有親者朕未嘗奪其情昨蕭振以親為言亦令奉親而來庶使不失為臣為子之道今炤可給假迎侍秦檜曰陛下愛親之心施及臣下臣等不勝感歎是月湖北京西宣撫使岳飛來朝初乘氏人李寳少無頼尚節氣鄉人號為潑李三山東䧟寳聚衆數百人謀殺濮州守不克脱身南歸朝廷以方議和不之用㑹飛入朝寳以鄉曲之故願歸軍中飛以為馬軍未之竒也寳怏怏乃與其徒四十餘人約日渡江北歸事露飛盡斬之寳抗言欲歸者寳也衆皆不預飛竒之繫於獄凡三十九日㑹得邊報飛釋寳問以北事寳願歸山東㑹合忠義人立功飛許之寳還偽地募得八百人赴飛軍飛乃假寳閤門宣贊舍人統領忠義軍馬屯龔城金主亶復遣翰林待制耶律紹文至驛諭奉使王倫言鄉留雲中無還期及貸之還曾無以報反間貳我君臣乃遣副使盘公佐先歸論歳貢正朔誓表冊命等事而拘倫以俟報已而遷之河間遂不復遣建炎以來繫年要録巻一百三十二建炎以來繫年要録巻一百三十二金人地名考證逹蘭原書作撻懶誤改見巻一烏珠原書作兀术誤改見巻一
