body:
  text: 建炎以來繫年要録卷七十八宋李心傳撰紹興四年秋七月戊申朔曲赦䖍州降其州雜犯死罪囚釋徒已下以招盜之未平者吏部尚書兼侍講胡松年充端明殿學士簽書樞密院事徽猷閣待制知臨安府梁汝嘉試尚書戶部侍郎兼權知臨安府己酉龍圖閣學士知鎮江府沈與求復為吏部尚書庚戌尚書刑部侍郎胡交修兼侍讀左諫議大夫唐輝試給事中兼侍講端明殿學士新知潭州充荆湖南路安撫使席益充荆湖南路安撫制置大使兼知潭州樞密院言本路見討捕楊么王􅊅已充制置使故有是命仍促令之鎮詔户部侍郎兩員通治左右曹職事以侍郎劉岑有請也元豐舊制尚書一員侍郎二員分曹治事艱難以來止除長二各一員通管本部事至是並除兩侍郎故申審焉是日建昌軍亂殺知軍事左朝請郎劉滂建昌兵素驕邀取無藝滂以法裁之及是市肆聚博羣卒掠取不從遂毁撤其肆毆傷其人滂杖而責償之衆憤兵馬監押沈敦智以俸緡代償且以言激衆軍士修達饒青等相與作亂殺及其家通判軍事張棫判官趙不倚皆死賊遂脅寓居左中大夫提舉亳州明道宫王羲叔權軍事盡刺彊壯為兵欲縱掠傍郡羲叔諭止之乃嬰城自守滂東陽人嘗為太常博士用近臣詹義汪藻李公彥薦守建昌軍及是遇害熊克小歷載建昌亂在此月戊申朔蓋因汪藻撰劉滂墓志所書也按日歷八月十六日癸巳侯慤奏沈敦智事云七月一日敦智向兵士危先道知通捉得你去定是斬了何自各人且逃避走閃至初三日修達鼓衆傷害知通又十月一日丙子張澄奏王羲叔事亦云七月三日晚諸軍變亂殺死前任知通初三日庚戌也故附於此日八月二十二日己亥樞密院言建昌軍賊饒青等殺害知通與慤所云修達稍異今兩存之張致逺奏建昌城中被黥者萬五千當考右朝議大夫知撫州孔傳聞變用樞密院計議官李蕘旗榜招之且乞兵於江西制置使胡世將以討賊傳道輔孫也辛亥徽猷閣待制提舉台州崇道觀沈晦知鎮江府兼兩浙西路安撫使晦過行在面奏藩帥之兵可用謂唐中年平安史用朔方太原兩軍末年平黃巢用忠武大同兩軍今沿江千餘里若今鎮江建康太平池鄂每處各有兵一二萬用本郡財賦回易官田給之敵至五郡以舟師守江陸軍守隘彼難自渡設渡五郡合擊敵雖善戰不能一日破諸城也若圍五郡則兵分而勢弱或以偏師綴我大軍南犯則五郡尾襲而邀擊敵安敢逺去頃嵗敵敢越中山河間正以兵少若太原則不敢南踰一步此制稍定三年後移軍江北糧餉器械悉皆自隨所至便成全盛晦又言大將與帥臣各有所職若全倚大將恐不能辦近年杜充總大兵在建康而帥臣陳邦光不為措置及充迎敵而邦光被縶以至周望去而湯東野逃郭仲荀去而李鄴降皆坐此也望撥零兵二千付臣并令臣募敢戰之士三千參用昭義步兵之法朞年後京口便成强藩况東晉常謂京口兵可用故北府兵號為最精唐亦用宣潤弩手平淮甸時方以韓世忠屯兵在府故其言不行詔以湖南上供錢三萬緡為安撫司諸軍大禮賞給之費長沙舊無屯兵自李綱為宣撫使始將兵校二萬一千餘人戍其地轉運司言無窠名應副故以上供錢助之壬子殿中侍御史魏矼乞詔大臣採司馬光之議置總計使以大臣領之詔三省措置後不行賜神武右軍都統制張俊錢十萬緡為除戎器之用仍以金錢度牒中半給之先是俊請造長甲三千短甲五千馬甲五百弓五千矢五十萬招即軍中打造通費四十餘萬緡至是未畢也癸丑戶部侍郎劉岑等建陳臨安稅錢事輔臣言收稅恐增物價更當令斟酌的確利害上曰第令條具若斂不及民一切聽之右武大夫忠州防禦使樞密副都承㫖楊應誠提舉江州太平觀從所請也集英殿修撰李友聞提舉台州崇道觀友聞李儔之父故門下省録事張思聰贈右宣教郎録圍城中蠟書之勞也是日水賊楊欽攻鼎州杜木寨破之時折彥質自湖南報制置使王􅊛以為賊不可招􅊛乃遣兵踐其禾稼賊乘大水攻寨破之忠訓郎鼎州遊奕將許筌為所殺官軍死者不可勝數賊愈增氣許筌明年二月己酉推恩甲寅詔博糴授校尉人與免本身丁役許用䕃承節承信迪功郎理為官戶有田五頃者與免差科一次若五頃以上令用家人充役先是殿中侍御史魏矼屢言徭役不均貧民重困故有是㫖左奉議郎湯鵬舉通判紹興府鵬舉為宣諭官所薦召對不果用俄改知廣德軍鵬舉改命在此月丙子尚書駕部員外郎宇文師瑗主管台州崇道觀從所請也師瑗嘗除福建路提㸃刑獄公事言者論其年少資淺罷之上念虛中翌日詔賜虛中及章誼孫近家錢各千緡乙卯祠部員外郎范同言師克在和大抵剛果豪健之士以氣相髙始由小嫌寖成大釁然古之賢將急公家棄私讎捨怨忘憤終成令名者蓋不乏人陛下拔用才傑禮遇勳賢備極榮寵固將憑藉忠力掃除氛祲一清寰宇恢復祖宗之業而道塗竊議以為將帥忘輯睦之義記纎介之怨或享髙位而忌嫉軋已或恃勳勞而排抑新進審如是他日必有重貽聖慮者欲望明示至意及其細微易於改圖使之視春秋諸卿以為戒追漢唐名將而踵其跡豈惟社稷是賴而勳名寵位尤享始終亦陛下保全之德也詔劄與諸將帥先是劉光世韓世忠久不協而嶽飛自列校拔起頗為世忠與張俊所忌故同及之丙辰檢校少保定國軍節度使川陜宣撫副使吳玠為檢校少師奉寧保靜軍節度使録仙人關之功也於是本司統制官榮州防禦使知秦州吳璘升定國軍承宣使自楊政以下宣撫司皆用便宜指揮以次第賞翰林學士綦崈禮當制有曰陸海神臯既失秦川之利銅梁劔閣敢言蜀道之難御史中丞辛炳奏玠方擁重兵據要害以屏翰四川乃云既失秦川之利又云敢言蜀道之難不識何謂併乞改正毋使逺方大將重以為忌詔學士院貼改遂改秦川為秦中既而崈禮引咎乞黜責詔赦罪丁巳詔自今年為始令左右司嵗考郎官功過治狀優劣上省取㫖賞罰復舊制也戊午入內內侍黃門李廙除名杖脊刺配瓊州牢城廙飲於韓世忠家即坐上手刃傷弓匠關寶事下大理寺殿中侍御史魏矼言內侍出入宫禁而狠戾發於杯酒乃至如此其於防微杜漸豈得不過為之慮建炎三年嘗禁內侍不得關通主兵官及據朝政如違以軍法處之乞申嚴其制以謹履霜之戒故有是命資政殿大學士知紹興府王綯提舉臨安府洞霄宫從所請也中書門下省檢正諸房公事虞􅀈言新除簽書樞密院事胡松年係親妹夫乞一間慢差遣制𠡠庫言職事别無相干不合回避詔劄與􅀈照㑹資政殿學士知衢州謝克家薨詔例外賜帛五百匹官給葬事庚申詔自今課院全闕官其印記權令門下後省官寄收前是掌於胥史言者恐其漏泄也神武右軍都統制張俊言近於逐處置到産業除送納稅賦外其餘應干科配和預買之類州縣並不理為官戶與百姓一等均科伏望並賜蠲免詔俊係主兵大將特依奏中書舍人言國家兵革未息用度至廣粒米寸帛悉出民力陛下哀愍元元膏血罄盡於是以權宜之法俾士大夫及勳臣戚里之家一切不問其存亡及官品之髙下遇有科敷與編戶一等蓋欲寬民力均有無今俊逐處産業必須浩瀚使其獨免科敷則當均在餘戶是使為俊代輸也不惟民力已竭而又加重焉且人心謂何哉兼方今大將不止俊一人萬一皆援此例以求於陛下將何以應之乎臣以謂今之二三大將富極貴足使其能體國愛君克自祇畏則可以長保富貴傳之子孫世世不絶何必斂百姓之怨恨致在廷之煩言而求分外之恩快一時之欲蓋亦不思之甚也望命有司檢㑹見行官戶科敷及和預買等條法劄與俊詔令以次官書行舍人又言從俊之請則是陛下之德雖加於將帥而害及於編戶夫民譬則肌肉也將帥譬則肘臂也愛一身者四體均受其養若曰惜肘臂而剝肌肉以養之其可哉伏望斷以不疑收還所降指揮是乃所以安俊也乃詔前降㫖勿行仍劄俊照㑹按此時後省乃張綱常同王居正三人未知此兩章何人所上也當考統領忠義軍馬陸全特轉兩官全本江西安撫大使司統制官祁超部曲後從統領官武功郎宛寶戍吉州寶馭下嚴全懼誅與其衆叛去至是在韶州湖南安撫司統制吳錫遣使招之全聼命其後江西制置使胡世將論寶討賊罔功乃降寶為敦武郎付本路帥司責令自效宛寶降官在八月戊寅詔故威武大將軍宣州觀察使曲端故親衛大夫明州觀察使趙哲並追復舊官日歷不云復何官㑹要云哲追復武功大夫達州刺史恐誤後悉還端所得恩諡曰莊愍制略曰屬委任之非人致刑誅之橫被申還舊秩加賁美名哲之制曰屬權臣之用事敢專殺以肆威其還橫列之名仍假廉車之重先是言者數論張浚殺端哲為非是故皆復之已而哲子承節郎洪訟於朝乃錫哲同州觀察使告身焉趙哲换給告身在八月戊戌辛酉龍圖閣直學士知湖州汪藻上所編建炎中興詔㫖三十七冊詔送史館壬戌翰林學士兼侍讀史館修撰綦崈禮充寶文閣學士知紹興府崈禮屢為御史中丞辛炳所攻乃引疾而有是命直祕閣新知泰州王圭為江南西路提㸃刑獄公事專切制置䖍汀漳州賊盜左朝奉大夫林把知池州把初坐殺張政故逺竄至是復用右奉直大夫致仕邵伯溫卒於犍為縣年七十八伯溫有聞見録辨誣等書皆行於世甲子保義郎蓋諫為閣門祇候以在海州手殺金將王企中之勞特録之也江西安復等州制置使嶽飛復鄧州時李成既遁去與金僞合兵屯鄧州之西北飛遣統制官王貴出光化張憲出橫林前二日至城下賊兵來戰統制官董先出竒要擊大敗之賊將髙仲入城據守將士蟻附而上遂克之飛移屯德安府是日資政殿大學士宇文虛中自雲中始之金國時宣撫處置司所遣使臣楊安初見建炎四年十一月再至雲中府虛中遺以礬書經文并跋語大略言石頭雙林雖未出世氣象已咄咄逼人又言當堅忍其心有進無退衆魔將降吾道自勝又言若見尊宿併可告此蓋言達實林牙勢浸盛欲張浚以其言白上也後數月安始至閬州宣撫處置使司劄子使司昨於建炎四年七月二十四日差使臣楊安賫文字前去僞地河東雲中府以來尋宇文相公投下今據本人回司供析稱當年十一月初三日到雲中府尋見吳先生名鼎係西京人充宇文相公門下幹當安遂具說差來因依本人指引前去南驛見相公將所賫文字下了不敢說話至初五日却得礬書二張盤纒金三兩亦不敢說話便回至汾州為無文引收捉了安下院禁勘半年得脫後來䝉嵐州給到公據至今年六月內却到雲中府再見相公具說因依安覆今秋須回去又䝉相公分付經一卷詩一首又說國相要我入國恐去你回去時千萬將所賫文字先呈宣撫司乞令人將往本宅傳語相公已次并大機宜小機宜且照管宅裏安今年七月十七日離雲中府親見相公入國去安迤邐回司今月十四日到閬州赴使司出頭使司今將使臣楊安賫到礬書二張經一卷詩一首封作一匣專人賫擎前去請照㑹親自開拆辨認前件文字是與不是奉使樞密相公親書如委是詣實即具保明文狀供申守待投進施行仍却將前件文字如法封角如匣分付差去人賫擎前來右劄送知潼川府兼使司參議宇文徽猷依此疾速施行仍不下司紹興四年十一月十五日印押按張滙節要稱色哷美門下被虜人吳才鼎為立名曰思謀疑楊安所稱吳鼎即是此人當考丙寅詔江東安撫司許招水軍千五百人仍賜錢三萬緡為造舟之費先是言者慮賊兵侵犯江淮詔沿江諸帥嚴加備禦故帥臣呂祉有請焉武功大夫文州刺史入內內侍省押班陳永錫兼主管往來國信所是日神武右軍統領官趙詳等引兵入建昌軍執叛兵誅之先是朝廷命詳自䖍州進兵而江西制置使胡世將亦遣左朝請大夫本司參議官侯慤中軍統領官邱贇與之㑹前一日慤等至城下權軍事左中大夫王羲叔遣叛兵劉淨等就招翌日軍士脅從者六百餘人解甲出城其首謀猶不出慤等縱兵入城賊敗走追殺五百餘人時降者尚懷反側慤盡誅之既而羲叔待罪於朝士民言其有撫定之勞乃詔放罪慤又劾兵馬監押從義郎沈敦智之罪遂罷之仍賜世將詔書奬諭於是叛兵所掠金帛子女多為慤所取而去慤懋兄也戊辰詔御史中丞辛炳稱疾既久亦屢抗章顧柏臺非養痾之地可遂其請除顯謨閣直學士知漳州先是樞府全闕官炳欲遷乃數論胡松年綦崈禮之失捃托細故毫髮必聞未幾炳疾踰月松年執政而崈禮補外㑹炳疾小愈未能造朝乞不妨本職先赴本臺治事許之議者紛然謂從官治事而不赴朝參為不恭中司如此何以掌朝議語聞故有是命此以朱勝非間居録參修炳乞先赴本臺管幹職事在十七日甲子蓋未罷前四日也初江西制置使嶽飛之入覲也以泰州軍事判官朱夢說偕行夢說宣和間以布衣上書切直故飛辟之夢說嘗遺炳書言時尚禽色之荒多無用之物二聖播遷未還中原陷沒未復上無賢相朝乏賢臣因責其不諫炳擕書以奏飛乃厚贐夢說而謝遣之此據中興姓氏録附入夢說已見建炎元年二月姓氏録又云炳擕書以奏上不喜諭飛罷之趙甡之遺史云炳亦請外補除知漳州按飛入朝在今春去此已久又炳亦久病恐非緣此求去也日歷今年八月二十七日甲辰韓世忠狀泰州軍事判官朱夢說體究到知承州劉唐不法則夢說還任必在春夏之間今且附此更求他書參考吏部尚書沈與求兼侍讀己巳執政進呈內降公事上諭曰近民間又造飛語多及內侍此曹何足惜恐因而生變不可不止絶之朱勝非曰恐軍中亦有幸變者更乞諭張俊楊沂中使之譏察然內侍輩亦望約束令省事上曰何嘗假借此曹兼已戒俊與沂中但令臨安府略加根治可也趙鼎進曰民言可畏亦不可不採聽願陛下思所以致此言之由上嘉納之詔戶部措置錢物二百萬緡增數和糴舊例朝廷嵗降本錢三百六十萬緡約糴米九十萬石至是中書請增糴焉右朝請大夫新知筠州白黃中追三官放罷黃中時中從弟也以時中任入官嘗為陳州士曹都水監丞至是乞審量而言者論其始者專用濫賞循九資而九年之內又轉十官僥濫太甚豈可當民社之寄故有是命庚午命宰執按江東淮西宣撫使劉光世帶到軍馬光世時自池州入朝見上言今軍中錢糧既已不乏器甲又漸足備臣官職超踰衆人所願竭力報國它日史官紀中興名將帥書臣功功第一上曰卿不可徒為空言當見之行事光世悚然受命而去降授和州團練使辛企宗乞討建昌軍賊上諭大臣曰聞企宗在建昌僅以身免乃使人來經營差委討賊頃嘗遣往福建平范汝為怯懦無謀養成大冦正如王􅊛在湖南玩冦日久卒無成功而企宗又在􅊛之下惟務交結本無寸長可用也朱勝非曰陛下洞察諸將才否不勝幸甚辛未殿中侍御史魏矼守侍御史尚書吏部員外郎趙霈行右司諌監察御史張致逺為殿中侍御史時致逺在道未至也於是矼首論自治之䇿且言諸軍比日以來或造言惑衆强行捉募或劫掠財物或殺傷農民朝廷雖付之有司而未能究治自古善用將者必宰輔因其事機而御之有術臺諫因其闕失而言之當理是以國能御將將能使兵今宜訓飭諸將謹身率下使士皆心恱誠服安靖不擾仍委宰輔以馭將之方責臺諫以敢言之義庶幾上下交警紀綱克振矣大理寺丞韓仲通請武臣之有戰功者升朝之後帶勳階以示旌别吏部立法仲通龔縣人也明年二月丁酉立法髙麗羅州島人光金與其徒十餘人泛海詣泉州風折其檣泊泰楚州境上詔付沿海制置使郭仲荀養贍伺便舟還之據光金所供以四月三日自毛羅島起舟當日遇風至二十八日吹到淮南地分今附降㫖之日是日龍圖閣學士樞密都承㫖章誼給事中孫近使金國還入見初誼等至雲中與左副元帥宗維右監軍希尹論事不少屈熊克小歷云誼至金庭興其左右副元帥尼瑪哈烏舍論事不屈按此時烏舍方為右副元帥諤爾昆為右監軍克小誤也金人諭令亟還誼等曰萬里銜命兼迎兩宫必須得請乃令金吾衛上將軍蕭慶受書初誼等之行論李永夀所需三事金人互有可否獨畫疆一事未定而宗維答書又約以淮南毋得屯駐軍馬王繪紹興甲寅通和録接伴李聿興問淮南已交與大齊後來江南擅自占據魏良臣等答云前此丞相惠書止云淮南不得屯駐兵馬繪所云丞相即尼瑪哈今掇取附見蓋欲畫疆以益劉豫也誼等還至睢陽為豫所留以計得免上嘉勞久之壬申中侍大夫華州觀察使荆南鎮撫使解潛特遷協忠大夫以川陜宣撫司言其討賊之勞也既而潛奏統領官胡勉績效復進勉二官事祖在今年二月乙酉勉九月丁巳轉官癸酉初命大理寺丞評刋定見行斷例時議者乞明詔有司應小大之獄既得其情一斷以法無使一時之例復預其間如其斷刑舊例法家所援有不可去者乞條具申上付之所司立為永法布示中外使知所遵守庶幾刑罰平允人無寃濫刑部勘當自國朝以來斷例渡江以來皆已散失今所引用多是自建炎以來近例若建炎以前皆出官吏省記間亦引用至於進擬案用例或罪輕而引用重例或罪重而引用輕例或有例而不引無例而彊引即無檢察斷罪指揮欲乞將本部并大理寺見行斷例并臣僚繳進元符斷例裒集為一行下大理寺委自丞評刋定若特㫖斷例即别為一書候成書申送刑部看詳駮正其不在新書者不得引用如引用失當許本部檢察斷罪上之朝廷乞頒降施行故有是㫖詔撫州建昌軍依舊𨽻江西路南康軍依舊𨽻江東路先是置沿江三大帥因移易其屬郡至是建昌軍亂朝廷及江西帥司皆已遣兵討捕而江東帥司獨未知故兩歸之是日淮西宣撫司統制官酈瓊以所部至襄陽府初嶽飛之出師也上命光世遣兵五千為之援及是始至焉此據嶽飛九月十一日所奏甲戌皇叔洺州防禦使士從為涇州觀察使士從前知西外宗正事以例遷也乙亥龍圖閣學士樞密都承㫖章誼試刑部尚書給事中孫近試尚書吏部侍郎兼直學士院起居舍人王居正試中書舍人執政進呈趙詳已平建昌叛兵上曰官軍既入城寧免玉石俱焚趙鼎進曰未必敢肆殺戮恐須劫掠耳上愀然不悅曰斯民無辜遽遭此禍其令有司優恤之既而殿中侍御史張致逺言國家艱難以來福建殺漕臣建康杭秀之守臣皆為其下所囚率歸罪於有司以為失於撫循臣聞建昌兵悍劉滂稍裁以法兹守臣之職乃并其家皆碎於賊此而不懲失刑甚矣願録滂之死以白其寃乃贈滂左朝請大夫通判軍事張棫亦贈三官各官其家三人軍事判官趙不倚亦贈三官官一子云尚書都官員外郎魏良臣移吏部祠部員外郎范同移考功左文林郎平江軍節度推官趙雋之改京官以同知大宗正事士㒟言其在建炎間有勤王之請也事見建炎三年三月丙子左朝散郎邵彪知泰州丁丑左朝請大夫提舉廣南西路買馬李預貶秩二等時預始市戰馬五百至行在類皆低弱故責之武功大夫神武後軍幹辦官張旦為左武大夫唐鄧郢州襄陽府安撫使知襄陽府親衛大夫安州觀察使神武後軍中部統領牛臯為安撫副使武義大夫榮州團練使李道充四川都統制承信郎神武後軍凖備差遣周識為右承奉郎知郢州承信郎神武後軍凖備差遣孫革為右承務郎簽書襄陽府判官㕔公事皆用江西荆南等州制置使嶽飛奏也初僞齊劉豫聞嶽飛復襄陽遣使乞師於金主晟以求入冦金主以方遣韓肖胄章誼來聘未可起兵僞奉議郎羅誘上南征議於豫曰皇天厭亂所以開聖人陛下據全齊之地豪傑之士雲屯霧集而趙氏兵窮力促國勢顛隮此天亡之秋所以假手於陛下隱忍不發者毋乃惑於四議乎臣請為陛下决之其一曰宜以卑辭通舊主告以大金敦迫不得已之意隂結猛援速求剪伐成即為君敗即不失為忠臣陛下獨不畏張邦昌之禍乎北面奉符璽退而復辟猶且為虀粉况又有甚焉者哉此可决者一也其二曰彼有强敵難塞之賂加以冗兵坐食之費俟其凶荒兵老財匱然後可擊此又不然今宋之所保不下百郡西有三川之饒南有二廣之富增摘山之算倍煮海之利其賂大金者不過歲時聘問講禮之幣而已若不乘其弊而擊待其羽翮之成提兵北向則我齊一敗塗地此可决者二也其三曰陛下所以王山東者以其得民心也若簽而從軍定失民望夫趙氏奄有神器已二百年其於生靈德至渥也一旦猶且忘之况大齊姑息之恩哉且民心日夜望故主之來所賴大金威惠固無異心使彼和間稍行將不我援則豪傑四起不待趙氏之兵而齊已誅矣此可决者三也其四曰陛下臨戎國事孰委而元子亦不宜輕動臣謂陛下一傳之後大臣皆宋之舊臣誰肯竭力以輔少主宜遣元子親行成此戡定之功以結民心以服大臣庶幾齊祚得永此可决者四也四議既决而臣復有六擊之便今備陳之且兩淮膏腴千里表護江浙而不可失者也金陵重地得人守之則窮年皓首而不可拔彼退保吳越略無意乎此天所以遺陛下若遣兵先據兩淮振威滁泗搖蕩江浙乘隙進拔金陵縱不能全圖則山東為內地矣此地利失其守可擊者一也且國步多艱必資賢相趙氏自播遷之後所與謀事者不過六七輩吕頥浩橫議狂直失大臣風兼有私門之僻常為利所移朱勝非雖老臣然守法具位怯於圖大事秦檜智小而謀大翟汝文才有餘而量不足趙鼎雖大器然孤立在外進不容於朝至於范宗尹口尚乳臭言不顧行又無足道者是數子者皆闒茸士非宰相才也况復互為朋黨此入彼出視相府如傳舍一旦倉卒其君惸惸於上百官泛泛於下無有任其責者此宰相非其人可擊者二也且國家危亂注意在將彼所用者第皆庸瑣劉光世雖持重而偏禆不良韓世忠有京西圮上之役不可以言勇世忠嘗敗於永安又潰於沭陽至於張俊尸祿素餐坐與卒伍爭利徒能費太倉米是三子者曽無毫髮功而又挾不賞之疑懷藏弓之忌驕侈淫泆權勢相尚結怨連隙未始少和此將驕而不和可擊者三也彼自敗績之後士卒殆盡不過降烏合之衆收飢悴之夫驕縱不治間有邉事覬賞而後行此兵縱而不戢可擊者四也太子天下之本彼既無宗室又失儲位設有軍事孰與為謀此主孤而內危可擊者五也夫用兵之道財用為先彼自拏兵以來藏無信宿之錢倉無間日之米兩浙之間賦斂橫出官吏生姦民人怨望諸軍僥求之心猶且不已稍有警急不亡何待此民窮而財匱可擊者六也且我無四議之惑彼有六擊之便是乃萬全之師取天下如反掌臣謹上議豫覽之大悅賜誘帛百匹乘傳赴闕以誘為行軍謀主此據僞齊録附見叛臣之䇿本不宜書書之以見誘所謂四可决者皆劉豫所忌朝廷所當知也是月豫調登萊沂密海五郡軍民之兵且二萬人屯密之膠西縣集民間之舟大小五百裝為戰艦以其僞閣門宣贊舍人知密州劉某充都統領叛將徐文為前軍聲言欲襲定海縣此據日歷今年十月五日軍賊崔寧等案欵附入僞皇子尚書右丞相梁國公麟與右丞相張昴同上書乞科民間錢據已耕種熟地頃畝為率每畝出二百五十文在坊郭者以五釐營運免行等錢比附均敷豫從其請建炎以來繫年要録卷七十八金人地名考證逹實原書作大石誤改見卷一色哷美原書作撒母誤改見卷一尼瑪哈原書作黏罕誤改見卷一烏舍原書作悟室誤改見卷一諤爾昆原書作窩里嗢誤改見卷九
