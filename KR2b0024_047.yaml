body:
  text: 建炎以來繫年要録卷四十七宋李心傳撰紹興元年九月甲午朔宣撫處置使張浚奏邉事上謂輔臣曰金人既去陜西必可經理荆楚以南亦須措畫庶幾形勢相應有收復之漸秦檜唯唯奉訓中書舍人席益兼權直學士院熊克小厯在八月蓋因學士院題名也今從日厯給事中李擢罷為顯謨閣待制知嚴州先是侍御史沈與求奏擢嘗事偽庭不當用不報擢求去乃有是命中書言池江二州地勢僻隘失祖宗分道置帥之意詔江東西路帥臣復還建康府洪州舊治熊克小厯在八月庚辰今從日厯女真人古裕特補修武郎閣門祇候賜姓趙古裕自楚州歸劉光世軍中故録之乙未親衛大夫寧州觀察使韋淵求差遣上曰淵以宣和皇后季弟義當敦睦然其人素不循理難以出入禁闥故斥逺之朕不敢以公爵示私恩密院可與一逺闕恐居官有過難以行法已而以淵為福建路副總管淵除總管日厯不書今以紹興三年三月二十三日淵乞宫祠狀增入殿中侍御史章誼守大理卿劉豫之從弟與為疆吏所獲詔送處州羈管丙申直寶文閣知建康府張縝移饒州徽猷閣待制新知饒州李光移婺州右文殿修撰江東安撫大使司參謀官權知池州劉洪道移宣州時復以建康為帥府而江池皆命武臣故三人改命溫州觀察使神武前軍統制王􅊛知池州檢校少保建武軍節度使江西馬步軍副都總管楊惟忠知江州並兼沿江安撫使各將本部軍馬之任其錢糧令尚書省應副按宋史繫甲午日湖東安撫司言曹成李宏犯潭州之瀏陽詔趣吳敏摘那廣西軍馬前來潭州之任屏捍二廣斬進義校尉李世臣於越州市世臣敦仁弟也世臣既為官軍所獲而敦仁據虔化縣仙山叛服未定江西安撫大使朱勝非自為文檄募太學生彭世範往招之不數日敦仁與其徒二十餘人請降然尚未解甲後録其功以世範為右迪功郎熊克小厯載此事於今年五月仍云世範誘敦仁出降然後諸郡解嚴蓋因勝非行述所書也其實敦仁雖受招仍犯虔化縣十月丙寅勝非罷帥十二月甲戌詔顔孝恭等討之或者因勝非罷而再叛亦未可知今參酌附此世範明年十月丙寅補官迪功郎宣撫處置使司書寫機密文字張滉特改承務郎以其弟浚請以扈駕所遷一官回授也朝散郎吳必明知邵武軍時盜賊蜂起守臣朝奉大夫張公庠不能制言者請擇能吏遂命必明代之必明崇安人也戊戌刑部奏軍士黃德等劫殺案目其從二人俟于岸次刑寺欲原死上曰強盜不分首從此何用貸朕居常不敢食生物懼多殺也盜於此時須當殺以止殺富直柔曰物不當死雖蚤虱可矜其當死雖人不可恕上甚以為然詔統制官李復興所部軍將四百五十人𨽻神武中軍其民兵九百餘人皆縱之復興未見浙西安撫大使劉光世奏邵青窮蹙恐其絶洋犯明州詔樞密院準備將領徐文以舟師屯定海縣召朝奉大夫陸欽彥赴行在令成都府津遣欽彥建炎初提舉陜西茶馬因事罷去至是復官欽彥紹興五年以左中奉大夫為宣謀己亥詔文臣寄祿官依元祐法分左右字贓罪人更不帶以示區别用樞密院編修官楊願請也其后選人亦如之選人分左右在明年二月丁卯資政殿學士提舉西京嵩山崇福宫葉夢得為江東安撫大使兼知建康府兼夀春等六州宣撫使宣撫處置使張浚承制以中大夫劉鎡為州路轉運副使右文殿修撰提舉亳州明道宫劉觀知遂寧府浚又言朝請郎楊晟惇挾持詭計躐求髙官包藏禍心常幸時變公肆狂悖鼓惑衆聽望賜竄黜羈管詔浚一靣施行先是浚以便宜授晟惇官至中大夫直徽猷閣及是盡奪之觀辭不赴晟惇所遷官職不得其年月按日厯紹興七年十一月乙巳晟惇以左朝請郎陳乞換給左中大夫直徽猷閣告命得旨依故附於此浚所謂躐求髙官蓋指此也是夜雷庚子以張琪賊馬壞宣州太平州墟田命守自葺治宣州化城惠民二墟相連長八十里太平州蕪湖縣方春陶新和政三官墟共長一百四十五里當塗縣廣濟墟長九十三里於時長五十里是日張琪犯宣州琪在宣城南陵之間駐於孔村其下李捧華旺謀殺琪以降辛丑琪遁去捧聞劉洪道在池州欲受其節制洪道遣統制官李貴招之朝廷聞琪等犯宣州乃詔神武前軍統制王􅊛以其軍討琪然後之鎮日厯宣州申張琪九月七日侵犯本州城下七日庚子也十月辛未江東安撫大使司申李捧狀自九月八日不曽再犯宣州初九此壬寅也今附此壬寅江西安撫大使兼知江州朱勝非言本州殘破之後闕官甚多無人願就欲乞州縣文武官到任一年及任滿各轉一官選人任滿通理四考改合入官後不為例從之此以今年十月十五日使部供到狀修入河南鎮撫使翟興遣幹辦公事文林郎任直清部契丹降人赴行在至召對直清具奏西洛艱危之狀及陵寢事上欷歔久之以直清為宣教郎直祕閣賜五品服進興三官為武功大夫加忠州團練使敕令所小吏成忠郎楊球蔡京家吏楊哲之子也范宗尹薦於上令後省䇿試授以文資七月丁巳日降旨侍御史沈與求以為不可乃罷之甲辰中書舍人胡交修洪擬並試給事中中書舍人林遹充寶文閣待制知廣州祕書少監程俱為中書舍人尋詔俱免召試直徽猷閣添差兩浙轉運副使方孟卿為尚書右司郎中右文殿修撰知溫州盧知原添差兩浙轉運使初朝廷以張琪邵青反覆為盜命諸將毋得招安而徽猷閣待制知平江府胡松年言大軍四合連旬不能破賊今青據通州崇明鎮沙上寨柵之外水淺舟不可行泥深人不可涉本府錢糧已費十三萬貫石公私騷然而賊未可睥睨况劉光世兵將類多西北人一旦從事江海間有掉眩不能飲食者况能與賊較勝負於矢石間哉先是光世奏已遣統制官王德討青又奏青窮蹙朝廷以為然及松年有是言乃令光世措置後二日右司諫韓璜亦奏謂青擁舟數千艘而朝廷未有舟師制禦恐轉入海道驚動浙東且浙西正當收成之時青若倐來必誤國計又師老費財或偽齊寇江藉青為用凡可慮者五事疏奏遂趣光世招降之禮部言自今應賢良方正科乞並用從官三人薦舉不如所舉者坐之故事閣試六題以五通為合格及是侍郎李正民員外郎王居正言今復科之初使士大夫徒能記誦義疏亦無補於用欲權罷義疏出題外餘如舊制詔兼於義疏出題仍以四通為合格乙巳進士吕元亮補迪功郎元亮平江人以薦對而有是命詔百司稽違許御史臺六察官彈奏以侍御史沈與求援元豐舊制有請也是日吕頤浩自饒州至行在丙午左奉直大夫王實為淮南東路營田副使上召對使往鎮江與劉光世同集其事實韶子也韶江州人元豐樞密使翊衛大夫成州防禦使楊忠憫提點製造御前軍器所丁未詔樞密院每半年遣使臣二員往河南省視諸陵因撫問所屯將士用起居郎陳與義請也命湖東馬步軍副總管馬友移屯鄂州尚書省請下江浙福建諸州造甲五千副兩浙之婺衢明湖州平江府江西之虔吉洪撫州各共千五百福建千二百饒信州八百逐州令通判一員董其事所費以上供折帛錢支從之己酉上齋於內殿庚戌命右監門衛大將軍士芑朝饗太廟神主於溫州此據會要辛亥合祭天地於明堂太祖太宗並配赦天下諸州守臣更不帶節制管內軍馬免殘破州縣耕牛稅一年越州曽得解舉人並免將來文解一次諸路大辟可免奏案緣道路未通並聽減等決遣二年正月乙未申明改正唐李氏後唐李氏後漢劉氏周郭氏柴氏子孫並各與一班行名目録用元符末上書人子孫應遇兵道棄小兒十五嵗以下者聽諸色人收養即從其姓諸盜許一月出首自新前罪一切勿問是日以常御殿增築地步為明堂止設天地祖宗四位其位版朱漆青字長二尺有五寸博尺有一寸厚亦如之用丑時一刻行事上親書明堂及飛白門榜時未有蒼璧黃琮禮官引故事請以木為璧繪天地之色上以祀天不當計費厚價市玊以製之既而尺寸不及禮經乃命有司隨宜製造禮畢就常御殿外宣赦書以行宫門前地峻狹故也是嵗內外諸軍犒賜凡一百六十萬緡而户部樁辦金銀錢帛三百五萬四千七百餘貫匹兩皆委官根括於諸路此據三月甲寅户部侍郎孟庾所奏川陜諸軍則宣撫處置司就以川路助賞物帛給之此據紹興四年二月二十日本司所申自諸軍外宰執及百官並權行住支以貢賦未集故也八月壬午降旨未知建炎二年如何當考時中書舍人兼直學士院席益草赦文有曰上蒼懷悔禍之心羣䇿竭定傾之力六師奏凱九扈成功爰舉宗祈聿修大報上以其夸大不悅壬子嗣濮王仲湜請合西南外宗正為一司以省官吏事下給舍中書舍人胡交修等言泉州乏財不許是時兩外宗子女婦合五百餘人嵗費錢九萬緡南外三百四十九人嵗費錢六萬緡西外一百七十六人嵗費約三萬緡癸丑鎮南軍節度使開府儀同三司吕頤浩拜少保尚書左僕射同中書門下平章事兼知樞密院事頤浩引故事辭所遷官乃以特進就職頤浩改特進在十月乙丑今併書之趙甡之遺史范宗尹罷相乃召吕頤浩而先相秦檜又富直柔韓璜辛道宗永宗皆譖頤浩故到闕多日而未有除拜人皆疑之俄拜少保左僕射按史頤浩以七月二十日降召命九月十二日到行在適值明堂齋禁十六日得旨陪祠十八日明堂十九日鎖院二十日拜相此云到闕多日者誤也道宗時已除福建副總管甡之亦誤今略刪潤於辛永宗罷去時修入甲寅尚書户部侍郎孟庾試户部尚書詔官兩浙錢氏子孫嫡長者一人以赦書所未及故也初上以中書舍人兼直學士院席益草赦文夸大惡之會益草吕頤浩復相制有曰朕中興聖緒兼創業守文之難上尤不喜乃出益為顯謨閣待制知溫州中興聖政臣留正等曰詞翰之職所以代王言詞翰雖成於人臣之手而其所以為言者若出於人君之口則為得體若其夸大而稱美則是人君自大而自美也豈禮也哉然而人之常情莫不好大而悅美故人臣之為是言者亦或不以為非今太上皇帝以赦文夸大為悖咈朕心而以麻制兼創業守文之言皆以為太過黜當時詞翰之臣以見其心之所不然者其為謙抑也至矣豈常情之所可度哉起居舍人侯延慶以母老求去除右文殿修撰知潮州直顯謨閣江東轉運副使曽紆為直寶文閣以紆自陳係元符黨特遷之也紆係黨籍餘官第九十八人建中太僕寺主簿袁州編管初見建炎三年三月癸巳既而右司諫韓璜言今日禍首實自王安石變新法始方安石秉政布以親戚最先引用聚斂刻剝之事布皆與謀逮建中靖國初故相韓忠彥守正持重布為右相每留身以破壞忠彥所為卒逐忠彥而成京賊之勢者布也至紹聖間與章惇爭權乍合乍離皆出為身本非國計紆在宣和間奔走閹寺門下蓋以交結而取官爵矣近乃撰造正論以欺廟堂望賜追奪紆遂罷去紆罷在此月庚午詔進士何溥特補上州文學以江淮招討使張俊言其招降李成餘黨趙端有勞也乙卯贈故朝奉郎知嶽州袁植直龍圖閣官其家二人於是編管人汪若海亦復承務郎以誘説李允文之功也張俊因奏若海為招討司幹辦公事上問輔臣始知若海得罪之因乃曰若容在軍中恐為俊纍後有罪者亦必援例苐勿許之朕自諭俊也丙辰吕頤浩言先平內寇然後可以禦外侮今李成摧破李允文革靣張用招安李敦仁已敗江淮惟張琪邵青兩寇非久必可蕩平惟閩中之寇不一又孔彥舟據鄂馬友據潭曹成李宏在湖南江西之間而鄧慶龔富剽掠南雄英韶諸郡賊兵多寡不等然閩中之寇最急廣東之冦次之蓋閩中去行在不逺二廣未經殘破若非疾速勦除為患不細詔樞密院措置朝請大夫傅亮勒停雲安軍羈管亮既從張浚西行以夏國道梗不果使浚俾知秦州又移遂寧府亮縱其從卒擾民浚罷之亮頗觖望浚言於朝故有是命宣義郎兩浙轉運副使劉寧止直龍圖閣以寧止自言建炎勤王嘗典餉事而賞典未及故也翊衛大夫泉州觀察使神武後軍統制陳思恭卒於江西江淮招討使張俊訟其勞特贈遙郡一官賜其家帛三百丁巳集英殿修撰提舉臨安府洞霄宫沈晦復徽猷閣待制中奉大夫王羲叔復直徽猷閣羲叔嘗為户部侍郎今復職已卑非舊典也是日金房鎮撫使王彥敗李忠於秦郊店忠走降劉豫初曹端既為程千秋所殺事見建炎三年十一月丁未忠自稱京西南路副總管為端報仇擾於京西漸犯金州謀入蜀遂申宣撫司乞下洋州關隘照會張浚以為憂乃遣提舉一行事務閣門宣贊舍人顔孝隆稟議官宣義郎蓋諒馳詣金州以慰撫為名探賾其意且以黃敕除忠知商州兼永興軍路副總管孝隆至軍中為所劫以狀白浚言忠實有兵二十餘萬諒覘知白浚乞為備浚恐孝隆為忠所殺委利夔路制置使王庶收接忠入關仍散處其衆於梁洋境內庶檄忠令解甲結隊而入忠去關二十里駐兵回翔月餘無解甲意一夕殺孝隆遁去遂攻金州彥率兵禦之忠沉鷙善戰其下多河北驍果官軍與戰輒不利一日彥遣兵與忠戰於豐里令提舉官趙橫率統領官門璋駐於山上為之䇿應彥乘髙視之官軍少却彥麾橫救之不應官軍遂敗彥退舍秦郊忠遂陷諸關彥令將士盡伏山谷間偃旗幟焚積聚若將遁者募死士得千餘人設伏以俟其至戰之前一日彥度忠長驅且入郡城夜半分官軍為三以遏其衝凌晨賊果大至官軍逆戰聲震山谷勝負未分俄伏騎張兩翼繞出忠大敗追襲至永興軍之秦嶺會王庶遣偏將鹿晟馮賽來援賽由間道乘之斬其將曹威等三人浚録其功以彥為拱衛大夫溫州觀察使賽初除隆德府路經略使自盧氏從邵隆至興元府故庶用之孝隆博州人後贈果州團練使賽初見建炎三年八月乙酉朝公遡作王庶傳稱李孝忠為盜久求入關而日厯及王彥行狀張鈞續忠義録皆作李忠無孝字蓋李孝忠又自是一人建炎初犯襄陽為王師所殺去此已久公遡實甚誤也戊午觀文殿學士提舉臨安府洞霄宫范宗尹落職用侍御史沈與求奏也與求言宗尹罷相制麻止言沮格詔令恐後有議論者不知其端妄謂宰相與天子爭可否未為失職去年敵騎將欲北歸韓世忠於大江中流以舟師邀擊臣僚數請號召上流舟師相為應援宗尹坐視不恤敵人果自上流乘風縱燎而世忠孤軍挫衄及敵騎留屯天長六合之間趙立等嘗請乘暑合共擊之宗尹以謂無事生事沮止其謀卒致立等相繼屠滅罪一也宗尹充位一年略無措置但將江東西湖南北祖宗所定路分朝改暮易有同兒戲罪二也出帳盡賣係官田宅使二百年安業之民怨怒紛起罪三也鬻爵之令一切增價且如修武告鬻四萬五千緡朝廷以此拋降糴本例須抑配設法罔民罪四也討論之事陛下纍諭不從卒致騰洶罪五也宗尹每事判呈實稟堂吏至有印押空名敕劄付之胥吏隨事書填賄賂公行罪六也創議討論之初本欲假借此名拔援非類搢紳介胄之士皆謂宗尹背國從偽罪在十惡此宜大討論者罪七也士大夫守節不回者未嘗肯薦一人至欲雪吳幵莫儔徐秉哲等罪名引用顔博文輩罪八也曽慥指斥國家語言不順宗尹以慥係吳幵之壻靣欺陛下除慥江西轉運判官罪九也宗尹與范瓊厚善寄居洪州受其黃金百兩聞瓊之死居常恨之罪十也宗尹自知不協人望乃隂結閣門藍公佐內侍康諝刺探宫禁傳漏語言欲因希旨之言專為固寵之計罪十有一也宗尹涖事一年身任宰相乃建議不厯知縣不除郎官監司蓋緣宗尹以迪功郎王居正改京秩除省郎恐後人援例遂塞其路既降指揮之後所除監司多非曽厯知縣之人舞文便事罪十有二也䇿試中書本求人望宗尹乃以吏職楊球者亦預召試罪十有三也京畿宣諭雖三尺童子知其未可宗尹徒欲起復胡舜陟召置從班故設此使命罪十有四也宗尹妻孥寄居洪州公受賄賂家問一至輒有差除如贓吏魏滂緣其門僧請託遂除監司又令使臣筆貼定價出賣差遣罪十有五也結卜相之士倡言於衆以謂朝廷若相宗尹四方盜賊自然衰息既而不驗復使王居正之徒為之説曰張邦昌奉迎太母宗尹有力陛下以此用之惑衆自媒罪十有六也朝公為妻取受求珍金銀使公為改換殺人公事案節減落刑名宗尹挾情庇之不肯根究至煩中批放罷罪十有七也宗尹拜相之初即與何之辰改正舊名繼得差遣罪十有八也顯黜言事之臣至謂投鼠忌器罪十有九也按七月癸亥宗尹罷相注沈與求條具大罪二十此尚缺一條俟考望特下臣章明正其罪庶為萬世之戒故有是命與求所謂何之辰蓋何昌言也時以奉議郎調監全州酒稅於是與曽慥皆罷二人罷命在十月乙丑顯謨閣待制新知嚴州李擢徽猷閣待制新知溫州席益並降充集英殿修撰以沈與求論擢有罪而益任職日淺不當除待制故也詔福建轉運司毋得齎牒所部州縣抑勒士民出助軍錢物令提刑察之先是漕司以軍食費廣乃諭福州土居陳義夫等願以一錢之産均出十錢因遣官遍諭下四郡徽猷閣直學士知潭州綦崈禮言本州新經楊勍侵擾之後已嘗均敷民間錢八萬緡不可再有科斂事聞故有是命承事郎蔡延世特進二官建昌軍進士蔡孟容補下州文學李敦仁之犯建昌也延世率民兵捍賊敦仁敗去城以故得全己未詔以江湖寇盜多貢賦不繼命户部尚書孟庾領江東西湖東等路宣諭制置使使理財治盜尚書省言近給賣新告價直髙大變轉不行乞減敦武郎為三萬緡承直郎為萬五千緡其餘以是為差仍不作進納理為官户免試注官從之庚申初措置河南諸鎮屯田侍御史沈與求亦言今欲因沿江荒間之田募人屯耕用為籬落兼資儲餉此誠計之得者乃陳屯田利害為古今集議上下二卷上詔付户部後亦未克行附傳載此事於明年春恐誤今從日厯繫此按宋史繫己未日勒停人張灝復朝散郎充徽猷閣待制提舉臨安府洞霄宫灝孝純子靖康末為河東都轉運使坐失汾州送雲安軍羈管至是悉復之辛酉詔應四方有為謀䇿能還兩宫者實封以聞可行有效當以王爵賞之翰林學士汪藻充龍圖閣直學士知湖州孫覿撰藻墓志載藻知湖州仍領日厯事其實謬誤熊克小厯不深考又因而書之已辨正修入詳見二年十月庚辰並注顯謨閣直學士致仕翟汝文復為翰林學士學士院題名在今年三月熊克小厯因之今從日厯給事中胡交修兼權直學士院學士院題名在十月而日厯與藻汝文除目同下蓋藻已罷而汝文未來自當有權官係之十月者誤也尚書吏部侍郎黎確髙衛並罷為徽猷閣待制確知漳州衛知撫州徽猷閣直學士提舉江州太平觀李彌大徽猷閣待制新知婺州李光並試吏部侍郎吏部員外郎胡世將祕書省校書郎劉一止並為監察御史一止首上疏論君子小人用否之辨以謂天下之治衆君子成之不足一小人敗之有餘君子雖衆道則孤小人雖寡勢易蔓且是時朝廷將遣世將出使故擢用之右文殿修撰新知宣州劉洪道復徽猷閣待制吕頤浩薦之也名河南鎮撫使翟興所部軍曰忠護時興屯伊陽山寨餉道既絶上自武功大夫下至義兵日給糧二升而已至春艱食又或無支然其下無叛去者言者論其忠勤故錫佳名焉壬戌遣監察御史胡世將督捕福建諸盜吏部員外郎廖剛言比江南探報事宜頗致懷慮臣謂周防津岸申嚴斥堠在今日最為機要而鑾輿或當順動預宜經理自得報以來未聞朝廷措畫建康鄱陽勢未暇議自會稽以南惟永嘉與福唐所當留意永嘉之險可恃與否臣所不知如閩之四境南控大海三面皆崇山峻嶺稍加人力不復可犯不得已至於幸閩則凡供億之事必責它路致於海上而兵環駐於四境閩人無所困苦斯可安矣願速令本路增修寨柵以備不時之巡盜雖未息願賜曲赦因遣重臣往宣德音使潢池赤子得以自新悉為我用剛所云江南探報未見當考然臣料今嵗敵騎勢分必無南渡之事望姑寬聖念以幸天下癸亥以明堂禮畢命同知樞密院事富直柔恭謝越州天慶觀溫州守臣恭謝景靈宫是秋金左副元帥宗維盡遷祁州居民以其城為元帥府凡民之當遷者止許携籠篋其錢榖器用皆留之右都監耶律伊都至和勒端城逹錫林牙率餘衆北遁伊都以食盡不克窮追而還時盜賊愈多宗維用大同尹髙慶裔計令竊盜贓一錢以上皆死雲中有一人拾遺錢於市慶裔立斬之蕭慶知平陽府有行人拔蔥於蔬圃亦斬之民知均死由是竊盜少衰而劫盜日盛慶裔又請諸路州郡置地牢深三丈分三隔死囚居其下徒流居其中笞杖居其上外起夾城圜以重塹宗維從而行之宗維患百姓南歸及四方姦細入境慶裔請禁諸路百姓不得擅離本貫欲出行則具人數行李以告五保鄰人次百人長巷長次所司保明以申州府方給畨漢公據以行市肆驗之以鬻飲食客舍驗之以安止至則繳之於官回則易之以還在路日限一舍違限若不告而出者決沙袋二百仍不許全家出及告出而轉之他處於是人行不以緩急動彌旬日始得就道且又甚有所費小商細民坐困閭里莫能出入道路寂然幾無人迹矣河東南路兵馬都總管蕭慶招降太行紅巾首領齊實武淵賈敢等送於宗維盡殺之於獄建炎以來繫年要録卷四十七建炎以來繫年要録卷四十七金人地名考證伊都原書作餘覩誤改見卷一和勒端原書作曷董誤改見卷四十三逹錫原書作大石誤改見卷一古裕原書作鴝鵒誤今改正
