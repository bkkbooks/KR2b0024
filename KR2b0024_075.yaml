body:
  text: 建炎以來繫年要録巻七十五宋李心𫝊撰紹興四年夏四月庚辰朔制授吴玠定國軍節度使川陜宣撫副使玠因除宣副遂移鎮加恩上賜以所御戰袍器甲且賜親筆曰朕恨阻逺不得拊卿之背也玠素不為威儀既除宣撫副使簡易如故常負手歩出與軍士立語幕客請曰今大敵不逺安知無刺客萬一或有意外則豈不上負朝廷委任之意下孤軍民之望哉玠謝曰誠如君言然玠意不在此國家不知玠之不肖使為宣撫玠欲不出恐軍民之間寃抑而無告者為門吏所隔無由自逹玠所以屢出者防有此耳幕客乃服直龍圖閣都大同主管川陜茶馬公事兼宣撫處置司隨軍轉運使専一總領四川財賦趙開令再任用王似等奏也初張浚既召歸開亦亟白王似盧法原求罷其自辨䟽曰開既兼宣撫處置使司隨軍轉運使専一總領四川財賦竊謂應副軍期費用不貲若加歛於民即民愈不堪尋措置改修茶鹽酒已壊之法不惟廣収息錢兼嵗入有常不誤措凖自建炎三年至紹興二年終茶鹽酒息增額錢并賣抵擬絶户田産等錢共收一千五百三十五萬餘貫兼隨軍秦州應副過陜西茶䭾及於陜西創行印造銅錢引紐計川錢八百三十四萬餘貫此外未嘗剏立名目科抑民間所𣙜茶鹽酒並係祖宗舊法置合同場買引及置官監務亦係朝廷已嘗行者其犯人斷罪刑名未嘗輙有刪定但增添告捕賞錢意欲犯法者少惟是營私官吏惡其不便於己懐異忌疾者共興謗讟謂改修弊法為生事擾民口舌沸騰必相䧟害况開年垂七十心力凋耗若叨冐無耻重致煩言豈惟有辱士風决然上誤國事似等察開雅非辭難畏謗讟者而軍事方急果不可無開乃奏言川陜屯駐大軍費用浩瀚漕司所入止充常賦諸司錢物見在不多累年經費委是趙開悉力措置茶鹽酒息之類通計約二千萬貫資助調度搜革宿弊增廣課息於民無科率騷擾今來若令本官罷任縁即目正當邊事之際財用急闕全藉趙開措畫應辦深恐别差官主管不知首尾措置乖方有誤贍養大軍利害至重故有是㫖賜川陜宣撫司及官吏軍民詔曰朕念慮疆陲覽觀形勢秦蜀壤地寔據要衝自時多虞則有戎事􅍀然西顧曽靡遑寧昨者特遣樞臣張浚徃宣恩威任國憂寄蓋五年於彼朕有聞焉肆頒召命俾還行闕而師言未已臺諫交章考其出使失職之辜在於常刑當從逺竄朕以其所用吴玠等能禦大敵累立戰功許國一心可膺委任因是貸浚止從薄責庶使玠等知朕厚於勸功而畧於記罪之意感恱奮勵益建良圖應累年以來川陜諸路其寔有勲勞而未逮於賞濫被刑罰而莫當其罪才能偏廢而不用謀猷見抑而不伸剏興横歛而致於無涯煩擾斯民而使之失業敕令所頒之澤不盡推行朝廷所差之官不獲赴上凡害民咈衆之事違吾徳意者仰宣撫司講求咨訪疾速施置以稱朕惻怛軫憂之誠庶幾惠和亟臻嘉靖播告有衆咸使聞知樞宻院計議官李蕘充湖南北路幹辦公事依苐二等奉使例蕘始引㕘知政事孟庾親嫌求去俄有是命辛巳尚書金部郎中陳桷為起居舎人翰林學士兼侍讀綦崈禮兼史館修撰詔兵部申嚴奏功不實之法時右司員外郎袁正功言自軍興以來陛下不吝推賞以旌戰多而所属上功類不覈實有盗賊自去而曰収復州縣有冦過境上而曰保守無虞如惠州及東莞縣皆經殘破而守令以禦冦推賞不知何所據而奏乎州縣且然况於軍伍似此姦罔詎可置而不問望特降睿㫖今後官司奏功不實若因朝廷檢察及臣寮按劾因事罥罣其元奏官司重加黜責仍將冐賞人特行追改以懲姦罔之弊故有是命中興聖政臣留正等曰昔魏尚守禦雲中坐上功差六級下之吏削其爵李廣出右北平遇左賢王戰以功過相當亡賞漢家賞功之令嚴矣戰而勝吏以法當其賞戰而不勝吏以法䋲其罪過足以累其功而功不足以贖其過是以當其軍一出塞人人争殊死戰者知敗則必誅也幕府上功毋或差一級者知言不相應則賞不行也終漢之世征伐四裔無不如志亦賞典明而將士用命爾近世則不然平時竭民力贍戰士以待一旦緩急之用卒然邊鄙有警使之擐甲必先賞而後遣之及其既戰奏功來上有司不敢問其士馬物故幾何但問其斬獲首級若干爾大將偏禆首已定封部曲行伍紛紛論賞動以萬計其間親戚子弟目不識旌旗耳不聞鉦鼓徃徃第功常出戰士之右噫亦已濫矣夫有功而不賞固無以得三軍之力論賞而不實亦無以服三軍之心古者賞一人而千萬人勸未聞賞千萬人而不足以勸一人也國家法令具載有司舉而行之正在今日臣是以備論之癸未宗正少卿蘓擕為中書門下省檢正諸房公事右朝散大夫吕聪問為宗正少卿後二日御史中丞辛炳言二人皆名臣之後擕老成頗知典故然檢正之任非精力有餘不能聪問止曾任通判差遣祖宗以來未有不歴内任直除卿監者詔擕依舊職聰問行吏部員外郎聰問除郎在此月辛卯聰問希純子自蜀中召還而有是命右朝請郎宇文師瑗為尚書駕部員外郎寳文閣直學士宣撫處置使司㕘議官劉子羽責授單州團練副使白州安置寳文閣學士宣撫處置使司𠫭議官程唐落職提舉江州太平觀本州居住初張浚既貶左諫議大夫唐煇言浚所引㕘贊軍事者皆妄庸小人而専横之甚衆所切齒者唯劉子羽未見施行臣不得不論子羽天資僉佞有以媚浚故見信任凡浚過惡皆子羽助成之秦蜀之民恨不食其肉頃者富平之舉諸路帥守多以為未可子羽弗思敵人詭詐不測輕聼間探斷然自以不疑卒至覆軍使五路生靈肝腦塗地全秦之失子羽之謀也富平既敗浚獨罪趙哲為不用命洎已斬哲浚知其失即出榜盡釋其餘將佐之罪子羽至鳯翔不以為然後復欲斬慕容洧及其統領諸將而下人人恐懼相率敗亡子羽所致也五路既失浚退歸閬州令王庶知興元府措置稍就緒子羽欲得之因而譛毁卒奪其任陜西叛將聞子羽至欲必殺之而後已乃誘金人併力以攻遂破興元朝廷差王似盧法原為宣撫副使子羽力請於浚求為宣撫判官隂奪二副使之權事無大小子羽專之浚有已放行者子羽輙塗抹改易官吏畏其氣熖不敢不凛受浚亦為其脅持不復敢誰何以士大夫所言子羽之罪擢髪不足數未有可與同科者自降指揮發來赴行在乃領銳卒以歸建州之崇安縣蓋其鄉里及聞浚到即出迓於信州今乃稱疾不至為人臣偃蹇不恭侮慢朝廷有如是者乎不正明刑曷慰公議伏望睿斷特賜竄殛少快秦蜀將帥軍民怨憤之氣䟽奏詔子羽落職提舉江州太平觀給事中胡交修論子羽専主軍議賛富平之大舉既斬趙哲復害曲端淫刑以逞其他將士心不自安率衆叛去被㫖召歸徑歸里第獨至上饒迎迓張浚全無人臣之禮望流竄遐荒以為天下臣子之戒殿中侍御史常同言子羽㓙暴殘刻在浚幕中最為横恣川陜之人切齒怨恨皆欲甘心焉子羽既知敗事必得罪於朝廷乃先遣其壻梱載順流而下及被召命又擕髙貲與姬妾先歸傲慢不恭如此唐本成都富人方其欲事童貫大雪中乞憐於貫之門媪因得見於庭下貫與杌子坐於其側飲以巵酒若飼奴僕然唐不耻也因獻渾金佛像一堂得為成都府路茶馬唐既出貫門下遂遣二使臣創第於貫之宅前盡蓄珍竒玩好之物伺貫意㫖即以獻納貫嘗築一堂生日落成唐為製錦繡帛幕地衣一倣堂之大小髙下曲折因為夀而獻焉凡所費悉出官帑茶馬司侵盗之弊寔自唐始又其狂妄之性與浚契合故浚喜之用為謀議之官同惡相濟遂致誤國若止落職放罷恐不足為小人之戒欲望特賜貶竄施行以子羽比唐其罪尤重陛下不欲誅戮亦乞流竄海島以示國威時唐以浚便宜之命知瀘州前三日詔唐赴行在令宣撫司遣官權管職事至是皆貶徽猷閣待制提舉江州太平觀邵溥充瀘南㳂邊安撫使知瀘州甲申武徳大夫康州刺史潘堯卿等五人各進官一等以吴國長公主入見推恩也尚書都官員外郎魏良臣請副尉之在籍者並不許改名以防詭冐從之乙酉江西制置使岳飛奏川陜戰㨗事飛奏中頗有輕敵之意上謂朱勝非曰用兵當持重宜深戒飛先是勝非居母䘮既祥引疾在告上賜親劄畧曰今乃何時而卿謁告使朕憂思廟堂之政蓋非特岳鄂襄鄧之間緩急不測機務隨即應辦豈容留滯是宜來早扶疾之朝兼朕别有所欲道者非可托於毫楮也勝非惶恐入見御劄據勝非行述附入按勝非母小祥在四月二日而日厯四月一日至五日並無聖語及勝非所奏事至此日始有之故且附本日左諫議大夫唐煇言明堂大禮恐有司尚循承平故事名物失於太縟伏望務崇簡儉輔臣進呈上曰當此多事固非制禮作樂之時然祭天之禮不可有缺乃命禮官條具裁省焉日厯止作臣僚上言按六月丙寅唐煇奏逍遥子事云臣昨嘗具奏靣奉聖訓謂當崇簡儉云云則此奏即煇所云也右修職郎啇虢鎮撫司幹辦公事李邦孚特改右承事郎右文林郎虢州録事𠫭軍党尚友特循二資皆用鎮撫使董先奏也先嘗以便宜假邦孚直秘閣又奏尚友因赴行在母妻子女悉陷偽齊乞改合入官故有是命丙戍詔閤門四方館客省並依祖宗舊制不𨽻䑓察先是御史常同有請至是閤門言故事𨽻中書省乃改命焉大理少卿張礿請自今朝廷降指揮應特㫖處死情法兩不相當許本寺奏審從之去冬都督府獲姦細董寳以聞下寺覈治無他情状礿用案問徒三年詔從軍法礿欲奏讞而以法寺未有執奏條例弗敢言至是乃上此奏是日吴玠與敵戰敗之遂復鳯秦隴州丁亥詔衢州布衣江袤召赴都堂審察袤少登貢籍元祐中嘗㳺太學樂道自守不干州縣方臘倪從慶之亂袤結集社甲土人率服一鄉頼之守臣謝克家言其才行於朝故召既而引對遂命為右廸功郎袤六月庚寅補官戊子神武左副軍統制李横以襄陽失守於國門待罪詔放罪横與蔡唐州信陽軍鎮撫使牛臯商虢陜州鎮撫使董先自南昌隨趙鼎赴行在詔以其軍萬五千人属神武右軍都統制張俊尋以錢萬五千緡絹萬疋賜之上念横等逺歸各賜白金千兩臯見上因陳偽齊必滅之理中原可復之計乃命臯復徃江州聼岳飛節制李横等賜銀在五月甲寅賜絹在五月乙丑己丑詔免澧州經制上供等錢至來年終以本州言累經傷殘未有賦入援鼎州例有請也庚寅左奉議郎兩浙東路提㸃刑獄公事周綱太常博士姜師中並為監察御史綱宣和間嘗為言事御史至是復用之綱言臣在宣和間嘗備臺属為察官者二年擢言官者七月是時可察可言之事不為少矣而臣無毫髪補於朝廷直至三年之乆方乞補外今若復叨冒豈無愧於心顔兼臣昨來改官係出特㫖尚慮在討論之列豈宜居紏正之司乞改差一宫觀以安愚分䟽再上不許乃就職秘書丞環中兼史館檢討置孳生牧馬監於臨安府以翊衛大夫成州防禦使神武右軍統領忠勇軍馬提㸃製造御前軍器所楊忠憫兼提㸃官日厯忠憫無前銜又於五月十九日再書楊忠憫差充提㸃孳生牧馬監按日厯今年四月二十七日忠憫乞製造七等色紋已繫新銜疑重叠差誤當考辛卯大理寺丞韓仲通言近泗州申請獲偽齊姦細依化外姦細推賞今西北士民流寓者衆恐逺方㓙悍之徒貪求厚賞妄殺良善為害滋大乞應知有姦細並告官収捕若擅行収捕致殺傷者為首人坐以故殺傷之罪庶免前日殺害無辜之弊詔刑部勘當申省仲通龔縣人也癸巳起居舎人陳桷與太常少卿王居正兩易以桷自言與宰相朱勝非同壻鄧氏雖逺属不能無嫌也甲午罷廣西茶鹽司其職事令轉運司主管内增添鹽錢令提刑司拘収起赴行在其後復以廣東提舉官兼之徽猷閣直學士知揚州湯東野落職提舉台州崇道觀坐在職日乆治状無聞不能撫綏一方受弊故也持服人朱孝先起復左中奉大夫直秘閣知揚州乙未右中奉大夫直顯謨閣江西轉運副使曾紆貶秩一等初命紆以錢米六萬貫石餉江西制置使岳飛軍為三月之費至是飛言芻粟皆竭綱運未到深恐有誤事機故責之左朝請郎万俟卨為湖北轉運判官直秘閣王圭知泰州丙申詔陜西路科舉手詔令川陜宣撫司給付初吏部遣使臣持詔徃陜西路而所遣者憚行廼付大理獄更遣它使其母訟於御史臺言者以為陜西隔絶不通士人逃生不暇豈復更有士子應舉乃命傳送焉丁酉尚書工部員外郎謝伋為祠部員外郎兼權太常少卿提㸃太廟景靈宫奉迎所起復左朝奉郎范同行秘書丞左諫議大夫唐煇言今中原未復邊鄙未寧盗賊未戢財用窘匱陛下憂勤焦勞未知攸濟所以責任二三大臣固亦可知然臣竊聞都堂窮日之力頗困於簿牒之煩反不得専意於恢復之大計可謂敝精神於蹇淺失緩急先後之序雖勞何補蓋縁循襲既久有司不肯任責必申三省三省復不予决有甚𤨏細者亦必浼聖聼以此文書猥多行遣不辦事又終不免留滯伏望特降指揮倣唐故事唯大事應奏者乃關僕射天下庶務分總六部各令長貳専决其不可専决者許申朝廷其非大事亦只令㕘知政事予决行下先是左司員外郎兼權起居郎虞􅀈嘗言國家承平日久法令詳宻過於文勝今朝廷之上雖至纎至微之事無不取决望明詔輔臣罷無益之虛文省不急之細務庶幾朝廷清簡得一意於恢復中興之大畧詔三省樞宻院講究减省細務至是煇復以為言遂命三省措置焉入内東頭供奉官直睿思殿鄭弼貶秩二等弼自閬州從張浚歸過常山其從者擊傷篙師為縣令汪禹錫所縳弼徃請之辱縣令令言於御史䑓詔守臣謝克家究實而有是命詔前宰執舉選人充京官状聼理為職司以權吏部侍郎劉岑言選人有任祠廟差遣之人别無監司薦舉故也未幾本部勘當不行五年十月壬寅衝改初趙鼎之為江西制置大使也制置使岳飛行移用申状至是徽猷閣直學士胡世將為制置使飛審於朝尚書省言世將無許節制指揮乃詔用公牒戊戌集英殿修撰提舉江州太平觀王衣權尚書刑部侍郎疾速赴行在既而言者論衣専懐躁進前為侍郎出入刑名命遂寝寝命在四月丁未持服前左朝散郎充秘閣修撰程千秋起復知岳州時湖賊未平朝廷求可守岳陽者㑹千秋方持母䘮乃有是命庚子詔江東宣撫使劉光世遣兵廵邊初襄陽既為偽齊將李成所據川陜路絶湖湘之民亦不奠居一日宰執奏事朱勝非言襄陽上流襟帯吴蜀我若得之則進可以蹙賊退可以保境今陷於冦所當先取上曰今便可議就委岳飛如何㕘知政事趙鼎曰知上流利害無如飛者簽書樞宻院事徐俯獨以為不然上不聼鼎因奏令淮東宣撫使韓世忠以萬人屯泗上為疑兵令光世選精兵出陳蔡庶幾兵勢相接勝非乞遣中使持劄子付光世庶恭禀無留滯上曰内侍至軍中多買馬市方物不欲遣止欲急置可也㑹光世乞奏事鼎曰方議出師而大將逺離本軍非便俯欲許之鼎力爭以為不可言者以鼎為是俯乃求去上許之右奉議郎幹辦行在諸司審計司方庭實充御史臺檢法官庭實莆田人中丞辛炳所辟也右承務郎陳正同添差通判婺州正同初自添差簽書保寧軍節度判官㕔公事除樞宻院計議官既而召見命為尚書郎諫官唐煇言其資淺乃有是命尚書刑部員外郎錢圻主管台州崇道觀從所請也圻與陳正同皆以徐俯薦為郎其被論及求去恐與俯相關左中大夫王安中卒詔特復左大中大夫推致仕遺表恩也辛丑左諫議大夫唐煇言安中進不以道燕山之役居廟堂則賛其謀命宣撫則請以行守燕山則為之帥敵情已變人皆寒心而安中曾無一言方以嘉禾為瑞養成禍階至今未已生不就戮没猶冒寵何以慰天下公議安中命遂格左朝奉大夫廣東轉運判官章傑代還繕冩本路所藏祖宗以來條令及續降指揮為一千十八巻來上詔勑令所看詳申尚書省後令事干六曹者分送逐部後㫖在五月丁巳傑又請帥臣子弟任書冩機宜文字除事干機宻合書冩外其餘文字並不得簽書仍令帥臣監司守貳隨行子弟親属毋得接見所部官属從之著為令立法在五月癸丑遂以傑行尚書工部員外郎傑除郎在是月甲辰保静州蠻人彭儒武等復詣辰州請獻方物詔免赴闕令本州受其貢仍優答之利州觀察使河南汝鄭州鎮撫使翟琮充江南東路兵馬鈐轄宣州駐劄琮自南昌與所部百餘人入朝上聞其貧賚以銀帛百匹兩後四日乃有是命壬寅左中大夫蔡懋卒於徳慶府詔特推遺表恩言者論懋誣謗宣仁聖烈皇后罪在不赦豈容其子尚叨賞典上為寝其命懋特與遺表恩澤在六月甲申是月辛丑詔已降㫖更不施行今併書之進士李㲄補正廸功郎㲄在襄陽鎮撫使李横軍中書冩機宜文字踰年以横有請也癸卯吏部員外郎趙霈言輦轂之下彈壓是先惟昔天府法令特嚴若彊盗不得財而配千里竊盗滿一貫而徒一年之類是也比來行朝盗賊尚多乞行下三省𠫭酌開封府舊法遇有盗犯之人乞不以常法斷罪庶幾盗賊畏戢人獲安堵時已詔城内外强盗依開封府法斷罪事下刑部勘當如所請刑部勘當在五月壬申今併書之左諫議大夫唐煇言伏見川陜宣撫司㨗奏再至謂敵人驅逐盡去臣竊思金人之來擁衆十餘萬是欲必得四川然則方遣使議和而進兵攻取此其素謀久矣李成之在襄陽蓋與川陜之師相表裏今不得志於川陜必與李成合兵或犯荆南或窺淮甸臣料賊必不肯一戰遂已今聞聖㫖劄與㳂江諸帥臣恐諸帥意其敗北不能復振因易其事伏望申敕諸帥整軍旅逺斥堠備禦加嚴則為盡善廟堂於上流及淮甸宜講求所以戰守之䇿尤不可緩乃命三省樞宻院講求戰守之䇿仍劄與㳂江諸帥嚴加備禦甲辰右承議郎直秘閣知楚州主管㳂淮安撫司公事楊揆貶秩二等揆遣承信郎范武之東京詗事既還未及奏而武先至行在漏言於人故貶丙午端明殿學士簽書樞宻院事徐俯依舊職提舉臨安府洞霄宫免謝辭俯既登宥宻頗驕傲自滿朱勝非趙鼎同在二府俯蔑視之每除一登第者則曰又一經義之士嘗與鼎論兵視鼎曰公何足以知此鼎曰鼎不足以知之豈若師川之讀父書耶俯大不堪而無以酬之卒不安位而去修武郎閤門祗候知泗州徐宗誠添差婺州兵馬鈐轄先是偽齊宿遷令張澤帥其邑民二千餘人自㧞來歸宗誠納之宣撫使韓世忠奏至徐俯欲斬澤首送劉豫趙鼎力争遂令世忠婉辭約回澤等仍械宗誠赴行在鼎復奏若恐妨和議乞令宰執以書諭世忠宻受之却報偽境謂北界人來以朝廷約束不敢受遂恃衆作過已遣兵逐散是亦兵家一術也殿中侍御史常同言敵雖議和而兩界人交歸未嘗有禁偽齊明置歸受館厚立賞以招吾人既遣李成侵襄鄧郢州又遣重兵歸川口今乃却澤人心自此離矣况宗誠起土豪不用縣官財賦募兵而自養之為國障捍今因受澤而械之以沮士氣非䇿也㑹俯去位乃釋宗誠罪乆之命澤以官且給閑田處其衆於淮西澤命官在十二月壬午尚書祠部員外郎吕本中依舊直秘閣主管台州崇道觀以本中引疾有請也本中還職在五月癸丑今併書之起居舎人王居正言臣聞殺人者死百王不易之法先王非不知死者已不可復生矣而殺人者又必死蓋以謂殺人而不死則人殆無遺類矣此先王之深仁厚澤萬世而不匱者也臣伏見主毆佃客致死在嘉祐法奏聼勑裁取赦原情初無减等之例至元豐始减一等配鄰州而殺人者不復死矣及紹興又减一等止配本城并其同居被毆至死亦用此法僥倖之塗既開鬻獄之弊滋甚由此人命寖輕富人敢於専殺死者有知沉寃何所赴愬伏望陛下深軫至懐監古成憲斷自淵𠂻俾從舊制用廣祖宗好生之徳成陛下全活之恩詔刑部看詳申尚書省後不行召龍圖閣直學士知廬州陳規直秘閣知徳安府韓之羙赴行在命淮西提㸃刑獄公事李健權廬州仍令江西制置使岳飛選官權徳安府規引疾不置乃以規提舉江州太平觀便居規得祠在七月乙丑丁未以忠銳第一將𨽻神武前軍初崔增從荆南制置使王􅊛討楊么遇賊死􅊛因請其軍自𨽻許之進士潘濤特補右廸功郎濤南昌人髙祖慎修為翰林侍讀學士祖興嗣自五嵗得官髙蹈不起韓琦趙抃張瓌唐介交薦於朝用為筠州軍事推官辭不就年八十餘乃卒曾鞏張商英言其賢録濤兄淳為星子尉蔡京用事以淳與陳瓘親厚又奪之淳既死趙鼎帥江西乞還所奪一官以為亷退自守之勸故有是命戊申罷婺州市御爐炭令户部講究更有似此之類並行禁止時兩浙轉運司檄婺州市炭湏胡桃文鵓鴿色㑹守臣王居正入為起居舎人面奏臣頃承漕司牒開讀至此羣吏以目俄頃之間道路籍籍有司過舉上累盛徳下擾百姓臣以更不施行而聞之傍郡蓋有不勝其擾者乞明詔州縣如有似此之類許之執奏上曰朕平居衣服飲食猶且未嘗問其羙惡隆冬附火只取温煖豈問炭之紋色也及是輔臣進呈上蹙然曰當艱難之時豈宜以此擾人可令速罷故有是㫖詔吏部四選廣南窠闕出榜一季無人願就者申朝廷破格差注又一月無人願就並送本路轉運司時言者論昨吏部闕少權借廣南差遣今未注之闕二百六十餘而流寓及廣南土人欲赴漕司則無闕可得理宜措置故也是月閤門宣賛舎人知夀春府羅興殺朝散郎通判府事侍其鏸叛降偽齊淮西安撫使陳規即遣使臣孫暉廬州録事参軍王彦融徃攝其事暉霍邱人也侍其鏸淳熈二年贈官推恩建炎以来繫年要錄巻七十五
