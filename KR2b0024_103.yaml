body:
  text: 建炎以來繫年要録卷一百三宋李心𫝊撰紹興六年秋七月按是月丁卯朔己巳翰林學士朱震言湖南去嵗大旱民多流亡今夏又復乾旱而一路連興大獄無辜就逮死於狴犴者甚衆望特降㫖除有罪當繫者治之其餘干繫一切踈放詔本路憲臣躬親巡行如震請後五日左司諫王縉又請諸路並依湖南已得指揮從之辛未吏部尚書兼權翰林學士孫近言見行官制學士二員今已有學士朱震直院陳與義乞罷兼職不許起復右文殿修撰京東淮東宣撫處置使司參謀官陳桷落職令吏部差監澧州在城酒務先是韓世忠遣桷陳乞淮陽功賞而桷以空名印紙增填其從行吏士冒賞者衆為世忠所劾故黜之是月丁丑降詔奬諭既而桷言當待次之官乃許持餘服九月己卯得㫖壬申大常少卿何慤權尚書禮部侍郎尚書屯田員外郎樊賔行司農少卿提領營田公事右朝奉大夫都督行府同措置營田王弗行屯田員外郎同提領營田公事並於建康府置司仍令行府兼行俟還闕日罷制曰嗚呼為君難未有甚於今日者也中原未復不可去兵而再三發輸民力已困旰食宵衣凡以為此日者頒營田之政於四方而未有大效孰能為朕趨時赴功以紓兵民之急乎爾才力治行有聞於時為郎田部知其曲折其以少農遂董斯政吾將循名以責爾實其惟勉勵克就爾庸時議者以張浚出師故専置一司措置於是賔等乞再給錢三二十萬緡應副支用每十莊募土豪充監莊假守闕副尉與免身丁依軍中例行劵俟秋成日比較所收最多者正補每縣增置十莊就緒令尉各减磨勘二年州縣官避事便文之人許本司劾罷皆從之今年八月甲辰降㫖詔川陕諸州應奏及刑名疑慮等文案許制置大使司酌情斷遣用席益奏也故檢校少保保靜軍節度使髙公繪故集慶軍節度觀察留後髙公紀並追封郡王二人皆士林子也宣仁聖烈皇后之上賔也二人以遺恩自防禦使升拜留後公紀先卒及免喪公繪乃除節鉞至是其子世則數以惇卞沮格遺恩為言遂有是命公繪紹聖二年十月建節癸酉尚書吏部侍郎兼侍講劉大中試兵部尚書直顯謨閣提㸃台州崇道觀張燾守起居郎右朝奉郎直祕閣主管台州崇道觀吕本中守起居舍人本中以范冲薦召還未入見詔曰本中學術淵源本乎前哲文采聲譽絶於搢紳更歷險夷遂為耆舊可特賜進士出身遂有是命尚書吏部員外郎林季仲試太常少卿吏部員外郎王迪為樞密院檢詳諸房文字詔新法綾紙度牒除換給使用外今後更不給降應童行試經並權住三年仍自今年為始先是令諸路僧道人輸綾紙工墨錢十千換給度牒既而不復換但令輸錢批舊度牒焉批度牒事日歷不見日月劉長源此日所上封事已言之則指揮必在此後也當更求他書參考之甲戌試尚書刑部侍郎吕祉給事中晏敦復並試吏部侍郎祉仍兼都督行府參議軍事左司郎中權中書門下省檢正諸房公事耿自求兼權給事中尚書司勳員外郎程克俊左朝散郎黃次山並為吏部員外郎左奉議郎范璿守尚書兵部員外郎璿知甌寧縣甫踰嵗士民言其治狀於州乞再任守臣魏矼以聞上召對而有是命丁丑安定郡王令懬同知大宗正事軍器監丞黃祖舜守尚書屯田員外郎時王弗在建康故中書引六曹郎官差出近例而命之賜京東淮東宣撫處置使韓世忠淮西宣撫使劉光世詔書奬諭時右司諫王縉論唐郭子儀渾瑊皆於唐室有大功而恭慎抑畏故能以功名終始近者淮西以麾下將領有欺隱軍人之劵淮東以幕中參佐有妄冒將士之賞皆能按劾聞奏以俟誅戮小心恭慎有足嘉尚伏望特降詔奬諭因使今日之後凡奏功者必以實而爵賞所加足以勸有功凡勘給者必以實而錢糧之餘足以養戰士戰士宿飽而競於立功則强敵不足滅而恢復可期矣故有是賜淮西事見六月己未淮東事見是月辛未戊寅樞密院奏親衛大夫利州觀察使樞密院副都承㫖兼都督行府都統制沿海制置副使馬擴丁母嘉國太夫人田氏憂詔特起復日下依舊治事殿中侍御史石公揆入對言比都督行府恭禀聖訓措置科斂之弊以寬民力內州縣賣官告除大姓全户承買外如糾定衆户凑數請買之人雖已均敷若未送納並截日住罷非陛下勤恤民隱何以及此然全户承買雖曰勸誘實出科敷欲乞以承買納錢者令諸縣别置簿籍他日如有科斂即令參照不得更敷令以次得及之家均出凑數事不見日歷因公揆奏表出之公揆又訪聞營田人假官勢力因緣為弊如奪民農具伐民桑柘占據蓄水之利強耕百姓之田民若爭理則羣起攻之以為盜斯民無訴有失朝廷本意也今來秋成收刈竊恐營田之人耕耘鹵莽欲償其費奪民之稼以為已功侵漁攘劫無所不至望下營田司預行戒約皆從之己卯翰林學士朱震乞廢靖州為縣上曰前朝開拓邊境似此等處尤為無益趙鼎曰非徒無益且復傾數州事力供輸不暇至今為害上曰朝廷拓地譬如私家買田儻無所獲徒費錢本得之何用當時首議之臣深可罪也乃命本路帥司相度後不行日歷震劄子以此月己丑行下疑是差十日尚書吏部員外郎陳公輔行左司諫公輔甫至行在上召見而命之監察御史黃圭罷為尚書刑部員外郎御史臺主簿閭邱昕守監察御史故奉議郎贈直龍圖閣張庭堅加贈右諫議大夫依所贈官與恩澤以其家援例有請也庚辰宣慶使明州觀察使幹辦皇城司馮益與在外宫觀日下出門初宰相趙鼎見益稍出鋒鋩意其未戢力言於上前是日上謂輔臣曰聞益交關外事寖不可長宜亟出之鼎等再三賀上威斷上曰朕待此曹未嘗不盡恩意然才聞過失亦不少貸也先是劉豫揭榜山東妄言益遣人收買飛鴿因有不遜之語知泗州劉綱得而上之僞齊録載僞詔云江南依前倣效宣和間所為寵任內官馮御藥等令恣受賄賂官員受差遣者往往尋買妾并鵪鶉鵓鴿之屬與馮御藥等蓋即綱所得也臣謹按日歷上一聞益交關外事即斥去之則豫之誣罔聖德可謂無忌憚者矣其書頗行於世故不可不詳辨張浚請斬益以釋謗上未許鼎曰益事誠曖昧然疑似間有關國體若朝廷略不加罰外議必謂陛下實嘗遣之有纍聖德不若暫解其職姑與外祠以釋衆惑上欣然出之浚意未快鼎曰自古欲去小人者急之則黨合而禍大緩之則彼自相擠今益罪雖誅不足以快天下然羣閹恐人君手滑必力爭以薄其罪不若謫而逺之既不傷上之意彼但見奪職責輕必不致力營救又幸其去位必以次規進安肯容其復入邪若力排之此輩側目正人其黨愈固而不可破矣浚乃服此以日歷及趙鼎事實喻樗記趙鼎逸事參修但樗所記謂鼎與張浚同進呈則誤按此時浚在淮上疑劉綱自行府繳奏而鼎進呈耳熊克小歷稱趙鼎意益未戢言於上前今參考書之辛巳都省言人户典買田宅文契昨限半年投稅仍免倍稅又斷罪人户往往樂於輸納今聞尚有未曾趁限去處蓋緣原降指揮出限别無約束詔更立限半年元降投契指揮日歷未見月日是日行營前護副軍都統制王彥發荆南以所部八字軍萬人赴行在統制官焦文通凖備將趙樽等偕從焉彥未至鄂州湖北京西宣撫副使嶽飛使人邀請艤舟相見彥許之而俟風順即解纜張帆下鄂渚其疾如飛飛岸觀其過舟歎伏久之而去熊克小歷六月壬子詔荆南府依例帶湖北安撫使時已召襄陽帥保康軍承宣使王彥為行營前護軍都統制以湖南漕臣權帥事薛弼代之弼入境彥遣親兵七千人來速其將言王太尉未有去意弼徑趨入境晨未起已報新帥入府乃出交政仍起彥所部八字兵一萬赴行在人頗不樂弼竭帑犒師彥遂統之以行按荆南先除薛弼六月乙巳改用王庶所謂帶經略使者乃庶也但此時庶未到而弼先至荆南交割耳所云彥未有去意及八字軍不樂赴行在他書皆無此說更當考詳壬午左承議郎陳康伯行太常博士癸未詔張浚暫赴行在所奏事淮西宣撫司參議官韓進兼都督府隨軍轉運判官以張浚言見修濠州城須官措置移運也乙酉責授欣州團練使王仲薿復左中大夫與宫觀仲薿上疏稱述宣仁聖烈皇后定策之功且訟父圭不忠之謗故有是命戊子侍御史周祕乞諸路踈放干繫人如命官犯贓合用供證者本身雖無收坐之罪亦聼暫時勒留對證其淹延妄禁者令憲臣按劾從之初上既從朱震王縉之請命諸路釋拘繫之人而祕謂命官犯罪先推干證今一槩釋之恐獄吏舞文縱釋贓吏故有是請後數日中書舍人董弅復言諸路見勘命官公事二百二十四其間姦贓不法等罪為數百二十有一有及三四年未决者干連禁繫死於狴犴不知其幾何人望令諸路憲臣詳加檢察按其滯繫以副陛下欽恤之意乃命刑部申嚴行下弅奏請在八月丙申癸巳詔川陕監司守倅內係宣撫司便宜所差未受朝廷告敕之人日下並罷用都督行府奏也行府又奏宣撫司自罷黜陟後以雜功遷轉將士並令四川制置大使席益取索改正若委有勞績令所屬保明申尚書省取㫖推賞內有出川歸部之人令吏部依濫賞條具申省皆從之彰武軍承宣使利州路經略安撫使兼知利州郭浩為永興軍路經略安撫使兼知金州武功大夫閣門宣贊舍人邵隆知商州並以所部軍馬之任其金州權𨽻川陕宣撫司仍令隆聼浩節制經略商虢金均房安撫使柴斌俟浩至日赴都督行府涇原經略使楊政兼權利路經略使専管本路戰守軍馬事務翊衛大夫貴州團練使綿威茂州石泉軍沿邊安撫使兼知綿州節制軍馬范綜令再任用席益奏也直顯謨閣兩浙轉運副使兼淮南漕運主管都督行府財用兼行府主管機宜文字提領市易務張澄升直寶文閣充轉運使他職如故直徽猷閣川陕宣撫司參議官陳逺猷進職二等忠翊郎閣門祗候吳扶忠訓郎吳撝並為右承事郎扶撝皆玠子也甲午左朝奉郎知廣德軍湯鵬舉知饒州以江東轉運使向子諲言其政績也已而復詔進鵬舉一官再任上諭大臣曰近時士大夫數言縣令多有不稱其任者朕再三思之亦難盡擇莫若慎選監司郡守以為要道正如朕深居九重之中安能盡知百執事之能否但當留意宰相耳鵬舉再任廣德在己酉詔營田課子除樁出種子外且令官收四分客户收六分次年已後即中停均分自今請佃官莊倣此用都督行府奏也乙未諸王宫大小學教授蔡安疆言祖宗之子皆擇其後一名為宗世補環衛官以奉祭祀著於甲令然自艱難以來宗籍散闕所存無幾立嫡以繼漫不可推今諸王之祀十年不供願詔有司考諸王之世酌情之宜選屬近而行尊者各一人補環衛官襲封公爵奉祀不怠詔禮部討論權户部侍郎兼權禮部王俁言太常寺令封爵以嫡而安疆所乞屬近行尊一節不應襲封條令難以施行事遂止是月監察御史劉長源應詔上書言當今之弊凡十有二事一曰節儉之風不行於臣庶二曰威福之柄漸移於臣下三曰禁旅太弱四曰從官輕去五曰政令有不審六曰賞罰有失當七曰將帥失馭八曰兵籍虛冗九曰師旅有法不立十曰賦斂有取無度十一曰田荒不勸農十二曰民困不擇令大略謂今內侍猶以奢侈相勝賔友燕集尚有宣政之餘習逺而將帥各以富貴自矜財用節於陛下之一身所省幾何而蠧於天下安得不匱髙祖親奪韓信兵柄於成臯光武躬拒尋邑大敵於昆陽繫海內之望消未萌之釁不得不爾也獻帝則失是矣曹操威望隱然震赫而天下推曹漢鼎潛移矣豈非獻帝不能收攬威福之柄所致歟今日之事若諸將過江分道並進臣願陛下移蹕建康親臨六軍料敵督戰非常之功盡歸陛下四海之望復安往哉西漢重兵悉在京師四邊但設亭障唐太宗分置府兵而關內居二百六十有一藝祖平定天下養兵止二十二萬而京師十萬餘皆明乎內重外輕強幹弱枝之勢也今禁旅單寡將領怯懦卒有蕭牆之變何以待之欲乞於五大將軍各取五千人更畨直衛在諸軍未為妨事而禁衛益二萬五千人則心腹無患矣仍别選智謀威望可以服衆忠義誠實果於衛上者為殿帥庶幾首尾無顛置之失侍從之官其任宜久今也凡應是選權侍郎者多不俟及二年而改除除正任者多患久次而求去其請外也不在於方權之時而常在正任之後皆為身謀也非為國計也欲乞重侍從之選必可與共圖興復之人然後用既用矣非有大故弗聼便私而去茍故為異議以冀退罷亦察其姦而明正典刑以為背公營私之戒以近事觀之如造交子賣户帖批度牒或方行而遽罷或既行而旋易大抵皆因一人建言以為可行而遂行又因一人建言以為不便而遂罷雖見否而革尚愈於遂非而不改然政令之不一所損於治體亦多矣欲乞今後每創有建明事送尚書省集侍從臺諫本職官㑹議委侍從官一員同左右司董其事謂之審議司具可不可之因以稟宰相宰相判其是非取㫖而行若猶有疑焉不憚再議必歸於是而後已今諸將行軍喪師失地則未嘗有罰收復殘破之空城則等第推賞以目今在蜀一軍言之一年保守和尚原朝廷賞其功矣大將增封加爵而全軍轉五萬官資又一年復失和尚原大將不聞有敗績之責而餘兵不復禠一官一資是以敗為常以無勝負為功不復為恢復之計矣今乞大明誅賞有功必賞有罪必罰使人人知所勸畏則功無患乎不成今諸大將爵居師保之尊權視輔弼之重擁強悍之兵以自衛奪生靈之財以自豐所欲賞者雖無功人得冒處而不疑所當罰者雖有罪彼且保全而不問大臣畏避而不敢斥諫官指陳而未嘗行方兹多事未可卒治臣願陛下以漢髙祖武帝先主為法以唐明皇為鑒徐以計銷其勢使之由而不知庶無肘腋之虞矣自古取勝之兵在精而不在衆今天下之民力困於養兵而兵籍之數類皆無實且以蜀中論之都運趙開應副關外軍糧紹興五年之數比紹興二年四倍比三年三倍比四年一倍每嵗倍索稍有稽緩直申朝廷遂云誤國夫糧所以贍兵必兵倍增然後糧亦倍增未聞其逐年益兵也度其私心蓋謂倍索糧數必有虧額恐因寇至兵潰欲移罪於漕運之臣其自謀則善矣如社稷生靈何臣愚欲乞選擇文武官各一員按閲諸軍之兵其有年五十以上者汰之年雖未至而有疾者亦汰之則勇者存而怯者去怯者並押送營田所收管願歸農亦聼嵗用之費十必省六七矣今大將統兵各十數萬號令不行士卒不練賞罰不明欲乞詔文武有學識通曉軍政之人考古兵法可施於今者勒為成書頒之軍中上下遵守庶幾兵皆可恃動則成功陛下施行臣所陳汰孱兵之冗食去軍帳之虛名廣克儉之風行勸農之實而又減宫祠之俸察軍功之濫省不急之官則用度節財有餘斂取有經矣凡官私之須莫不出於農奈何閲日寖久上之人無一語及農非特不勸督也又從而摧沮之接送官吏之上下農也在任者給親朋之負重農也遞兵不足而般運官綱亦農也一方有驚而負兵器賫行糧亦農也至若公家賦斂私門租課一有不足或械之囹圄或監之邸肆纍纍然如以長繩聨狗彘獄吏執箠而隨之路人灑涕為之不忍而州縣恬然不恤為民者何苦而為農乎今殘破州縣不耕之田豈可勝計流民散徙而為盜賊盜賊招安而為官兵官兵復仰給於縣官田野半空賦入甚微耕者既寡而食者愈衆上下困竭職此由也比者朝廷建營田之官行營田之政施之淮南固亦宜矣若兼行於近裏州縣則民之復業者為營田之兵所擾是以欲歸者不敢被擾者復去非特無益而又害之欲乞營田只行於江北所有江南民未歸業處詔守令誘勸百姓歸業有力者令其自營無力者官為假貸以招復逋逃勸課栽植之多寡為守令之殿最如是則田野闢而倉廪實百姓足而國計豐矣民為邦本而與民最親者莫如縣令欲令得人其術有五曰遴選曰重權曰量才曰久任曰勸沮不拘資格必唯其賢在內委省郎以上在外委監司知州嵗舉一名注籍吏部有闕照鄉貫路分差注仍赴堂審驗然後給敕委縣令稽考佐官之勤惰上下半年申州及監司稍假以權俾佐官協力逐路審訂煩簡分為四等應舉官充縣令者亦等别之盡以三年為任未滿不得遷已滿而民願借留者聼再任凡成任則具考課條中事件而别為三等政績優異者擢以省臺寺監之官次則與增秩次則與减年政績無聞者退歸選部不得復任縣令貪冒無恥則放歸田里永不叙用行此五等而縣令不得人者未之聞也長源書凡六千餘言其大要如此淮南宣撫使劉光世克夀春府建炎以來繫年要録卷一百三
