body:
  text: 建炎以來繫年要録卷一百三十九宋李心傳撰紹興十有三年嵗次辛酉元金熙宗亶皇統年春正月按是月辛丑朔壬寅右文殿修撰提舉江州大平觀趙開卒年七十六自金人犯陜蜀開職饋餉者十年軍用得以毋乏一時賴之開既黜主計之臣率三四易於開條畫毫髮無敢變易者人偉其能然議者咎開竭澤而漁使後來者無所施其智巧凡茶鹽𣙜酤激賞零畸絹布之征遂為西蜀常賦故雖略經減放而害終不去焉癸卯鳳翔府同統制軍馬楊從儀敗金人於渭南丁未直祕閣新知鄭州湯鵬舉知江州庚戌淮西宣撫使張俊入見上問曽讀郭子儀傳否俊對以未曉上論云子儀方時多虞雖總重兵處外而心尊朝廷或有詔至即日就道無纎介顧望故身享厚福子孫慶流無窮今卿所營兵乃朝廷兵也若知尊朝廷如子儀則非特身饗福子孫昌盛亦如之若恃兵權之重而輕視朝廷有命不即稟非特子孫不饗福身亦有不測之禍鄉宜戒之先是金都元帥宗弼自順昌戰敗而歸遂保汴京留屯宋毫出入許鄭之間復簽兩河軍與蕃部凡十餘萬亦謀再舉上亦逆知敵情必不一挫便已乃詔大合兵於淮西以待之俊自建康來朝故有是諭也中興聖政史臣曰將師驕蹇自有常刑聖上保全功臣恐其自速顛躋以經綸之訓易斧鉞之威使虎豹入圈檻鷹隼加羈紲駕馭之法盡於此矣高祖不以古人責韓彭速其禍敗亦不學之過也先是韓世忠易兩鎮節鉞上手寫子儀傳遍賜諸將至是十年矣故復以問俊焉辛亥上諭大臣曰李左車言千里饋糧士有飢色敵若犯淮其勢糧必在後但戒諸將持重以待之至糧盡欲歸因其怠而擊則無不勝矣又曰聼言必考其實近有言劉錡之過朕徐考之皆無實迹讒者遂息孫近曰錡當何以報聖恩也甲寅直祕閣知常州王縉主管台州崇道觀從所請也自是不復用乙卯金人犯壽春府守將孫暉樞密院統制雷仲合兵拒之戊午萊州防禦使淮東宣撫司遊奕軍統制劉實為江州觀察使己未淮北宣撫判官劉錡自太平州渡江以援淮西錡有兵二萬馬數百熊克小歷烏珠入犯己未命劉錡統所部渡江禦之案淮西從軍記云正月金人犯夀春是月十九日錡被命北渡江己未十九日也據此則錡先被命但此日出師耳克恐小誤朝廷聞報亟令張俊還建康拒敵時孫暉雷仲皆棄城而出金人陷壽春殺守兵千餘人繫橋淮岸以濟其衆禮部尚書蘇符又對因論易同聲相應同氣相求水流濕火就燥之理且言父子天合誠意所在雖遠必通今金人敗盟朝廷用兵雖議和之使不復再遣然誠心出於天合不問遠近則太后終必還饗慈寧之飬甲子上語宰執且曰符頗明經旨自世俗觀之此論似迂濶而理有必然者中興聖政上曰木瓜美齊威公而載之衛國風何也秦檜等方思所以為對上曰自衛觀之威公専討亦可罪仲尼成人之美而掩其罪故不載之齊國風而載之衛國風檜等對曰仰見聖學高明深得仲尼刪詩之意非諸儒之所能及臣留正對曰孔子遏惡揚善之意見於六經者多矣人主政治本原出於經術是以見臣下過失不幸而出於不得已者則以孔子之心恕之此之謂帝學乙丑劉錡至廬州駐兵城外時樞密直學士知廬州陳規病卒城中無守臣備禦之具皆闕官吏軍民散出逃遁惟有宣撫司統制官關師古兵二千餘人錡巡其城一匝曰城不足守也乃冒雨師古率衆而南丙寅金人大軍入廬州遣輕騎追錡相及於西山口錡自以精兵為殿復戈西向列陳以待追騎望見錡旌旗逡巡不敢逼日暮各解去丁卯錡結陳徐行號令諸軍占擇地利共趨東關依水據山以遏金人之衝自金人渡淮淮南之人皆避過江南之人為遷徙之計惟視錡兵以為安危錡既得東關之險稍休士卒兵力復振金人大兵據廬州雖時遣兵入無為軍和州境內剽掠而不敢舉兵逼江者蓋懼錡之乘其後也江南由是少安此以淮西從軍記及趙甡之遺史參修託不言錡與師古同奔蓋諱之也然陳規卒城中無守臣備禦之具皆闕則順昌之捷規不為無助故書因其語書之戊辰金人陷啇州先是右副元帥薩里罕遣珠赫貝勒以數千騎人犯守臣邵隆知不可守乃焚倉庫毁廬舍而遁敵入城據之己巳淮北宣撫副使楊沂中以殿前司兵三萬人發行在趙甡之遺史稱是月楊沂中以兵三萬出征而日歷無之熊克小歷云沂中自臨安晝夜疾馳六日而至歷陽尋復和州張俊至和州在二月五日甲戌以日計之自己巳至甲戌凡六日故附於此己巳正月晦日也是月川陜宣撫副使胡世將言鳳翔府渭河南和尚原昨來講和以前為敵人占據遂致軍馬動輒深入自金人再犯陜西至今和尚原尚係官軍屯駐不惟占得河南地土又包占鳳州在裏隔限軍馬來路不一所以薩里千等三帥日近會合軍馬觀其來意必欲取和尚原而後已上件形勢是今日必爭之地須當竭力占守紹興三年冬吳玠失和尚原遂致金人長驅直犯殺金平深入川口當時非兵力不足止緣糧遂致不能堅守去年和尚原所積斛斗不少緣自五月至今與敵相拒已經九月官軍食用垂盡除本司措置接續收糴外僅有現在二萬餘石止了得戍兵逐月口食若調發大軍不免闕誤今合據大軍的確合用之數預行椿辦若一向陸運又恐困竭民力臣自到任以來除漕司年計之外於仙人關一帶自行措置收糴軍兵食不盡米約計七萬餘石今來更不於民間科買止於上件米內支撥以雇直口食募軍民搬運然上件米斛止是救目前之急所有將來經久合每嵗預行措置契勘興洋稅賦祖宗舊法並係支移今欲將興元府洋成州等自今年夏料據和尚原合用軍食之數依舊法以地里逺近攢那送納本司近因歸投蕃軍稱説昨來呼紐與王俊於東路浴口相拒薩里罕使銀牌天使諭呼紐不得出兵只且守定王俊糧盡自入州去後果如其言今敵人又欲用此計困和尚原官軍使糧盡自退要須預備以伐其謀臣非不知自川中運糧至渭上雖諸葛猶以為難然國家必爭之地不可不多方措置昨蒙朝廷支除官補牒計價二百餘緡充補邉糴本於去年八月上件告發到司已是金人侵地其陜西斛斗不曽取糴兼告牒亦無人肯承買今欲乞朝廷遂行拘收只乞換度牒計價二百萬緡充將來糴買搬運之費鳳翔百姓忠義不負朝廷自京人侵犯以來尚猶賫糧赴楊從儀送納後金人禁止然亦不住有興販麵之人臣先行措置將銀絹錢引二十餘緡遣官屬前往同楊從儀令以高價招誘興販者剩獲利息必須趨利而來比之搬運尤為省費并與吳璘等熟議以為堅守和尚原以誘敵軍犯險破得敵衆則陜西可以收復璘等志甚堅鋭臣當竭力措置應副契勘和尚原所係利害至重今來川蜀士大夫議論或謂敵既必欲得故疆不若棄之只保仙人關殊不知一失和尚原便自棄地三百餘里又頓失險要其間入川路徑散漫不一為害甚大議者但欲省餽運而不顧其害又謂和尚原形勢吳玠尚不能守而臣以一書生乃欲力保此原多以為非殊不知臣欲力保此原蓋是與吳璘楊政等諸將佐議論至熟璘亦謂其兄昨失和尚原本非得已今幸尚可保守須據此地以佚待勞期破敵衆然後乘勢圗復陜西若失此原則璘等枝梧亦甚費力其言頗為精確兼本司探事使臣林常舊與薩里罕下蕭少尹相熟見本人説帶來正軍傔軍保共五萬餘人本朝已殺了萬餘人自去年五月渡河纍據諸處探報元帶甲軍從軍共約五萬本司前後遣發兵將與之力戰計所殺傷敵兵約及萬計今若據和尚原之險前扼渭河官軍盡得地利彼若冒昧深入決可大破其衆今來為大敵對壘見一面措指其間不無勞費要當權利害輕重案世將此奏必已知秦檜有割地求和之意故其詞丁寧如此二月案是月庚午朔辛未武功大夫果州團練使湖北京西宣撫使司遊奕軍統制武紏知襄陽府召靜江軍承宣使知襄陽劉錫赴行在壬申起復通侍大夫華州觀察使知思州充夔州路兵馬鈐轄兼思珍州南平軍沿邉巡檢使田祐轉升領奉寧軍承宣使癸酉淮西宣撫司都統制王德渡江屯和州初都元帥宗弼既入合肥建寧府諜者回報金人已犯含山縣漸犯歷陽時張俊諸軍雖已趣裝猶未起發江東制置大使葉夢得見俊請速出軍俊猶遲之曰更俟探報夢得曰敵已過含山縣萬一和州為金人所得長江不可保矣俊遂令諸軍進發諭諸統制曰先得和州者勝德曰德當身先士卒為諸軍前鋒俊壯之將士皆鼓舞歡譟而行有報已失和州者德乃率所部兵渡采石約俊明日入城會食至中流聞敵勢甚衆莫敢前德驅之進棹首先登舟俊宿於江中德率衆徑至城下敵退屯昭關趙甡之遺史二月己卯王德渡江入和州熊克小歷二月甲申張俊夜絶江與劉錡聲援相接己卯初十日甲申十四日也日歷不書復和州之日案今年七月八日賞功房關張俊乞陳亡人推恩狀云自二月四日由采石渡江措置收復和州初六日離和州五日殺馬初七日含山縣東獲捷初十日收復巢縣十一日全椒縣東大破賊馬十四日復昭關十八日柘臯大破四太子二十日夜收復廬州此所申最為詳密今並據之克又稱烏珠直據和州而淮西隨軍記云張俊遣先鋒至含山縣金人遊騎在無為軍和州者皆和則據和州者非烏珠也俊奏捷狀亦止稱龍虎大臣韓將軍三路都統等前來侵犯今從之是日武功大夫忠州團練使知啇州邵隆復入啇州初隆既遁去乃屯兵山領間道出州西芍藥口謂避地者曰汝皆王民毋忘本朝衆感泣携老幼來歸隆遣其子繼春出啇州之北以張其勢而移軍洪門金人以精騎來攻隆設三伏以待鏖戰兩時許大破之擒其將隆始持十日糧過期食不繼士卒臠腐尸嚙草木食之疲困日甚及戰隆親鼓之呼聲動山谷無不一當百遂大捷繼春亦破之於洛南縣金人乃去隆以功遷右武大夫榮州防禦使甲戌左宣教郎李朝正為大府寺主簿丙子上謂大臣曰中外議論紛然以敵逼江為憂殊不知今日之勢與建炎不同建炎之間我軍皆退保江南杜充書生遣偏將輕與敵戰故敵得乘間猖獗今韓世忠屯淮東劉錡屯淮西嶽飛屯上流張俊方自建康進兵前渡敵窺江則我兵皆乘其後今虛鎮江一路以檄呼敵渡江亦不敢來其後卒如上所料故朝散大夫鮮于侁追復集英殿修撰侁閬州人佑右諌議大夫宣籍待制已上第十九人是日淮東宣撫司都統制王德遇金人鎮國大將軍韓常於含山東敗之丁丑上謂大臣曰朕於諸帥聽其言則知其用心觀其所為則知其才人皆言劉錡善戰朕謂順昌之勝所謂置之死地然後生未為善戰也錡之所長在於循分守節危疑之交能自立不變此為可取己卯淮西宣撫司統制官關師古李橫復取巢縣庚辰徽猷閣直學士知洪州梁楊祖升顯謨閣學士以楊祖擒捕虔吉諸寇殆盡故也左朝散大夫蔡伸知知州星夜前去之任辛巳直祕閣知泰州王㬇兼通泰制置使措置水寨鄉兵控守二州壬午太常諡故瀘州軍節度使劉仲武曰威肅為其子錡故也是日淮西宣撫司將官張守忠遇金人於全椒縣敗之先是金人方兵犯滁州濠州起復武功大夫英州刺史知滁州趙時遁去張俊遣左軍統制趙密追金人擊之密令守忠以五百騎出全椒偃誘篁竹間敵疑不動迫暮引去密乃引兵出六丈河以分敵勢將斷其歸路癸未中書舍人兼侍講實録院同修撰張嵲罷以殿中侍御史羅汝楫論嵲初聞警報託假家居故也淮西宣撫使張俊言已復巢縣又言俊已在知州竭力措置決與敵戰自須取勝可保無虞上大喜是日劉錡自東閣引兵出清溪邀擊金人張俊楊沂中亦遣統制官王德張子蓋等會兵取含山縣復奪昭關甲申徽猷閣待制提舉亳州明道宫馮楫知卭州是日三京招撫處置使司統制官崔臯遇金人於舒城縣敗之丁亥淮北宣撫副使楊沂中判官劉錡淮西宣撫司都統制王德統制官田師中張子蓋及金人戰於柘臯鎮敗之前一日錡行至柘臯與金人遇夾河而軍初金人之退兵也日行甚緩至尉子橋天下雨次石梁河河流湍暴敵斷橋以自固列營柘臯柘臯地平金人以為騎兵之利且見騎軍少意甚易之河通巢湖闊二丈餘錡命軍士曵薪疊橋須臾而成遣甲軍數隊過橋皆卧槍而坐會沂中德師中子蓋之軍俱至翌日敵將邢王與鎮國大將軍韓常等以鐡騎十餘萬分為兩隅夾道而陳趙甡之遺史熊克小歷皆稱烏珠以鐡騎十餘萬夾道而陳案三宣撫所申止稱邢王韓將軍王太子大兵及自廬州前來烏珠軍馬蓋烏珠自廬州濟師非其親出也甡之克小誤沂中自上流涉淺徑進官軍不利統制官輔逵中目騎兵有稍却者德曰賊右隅皆徑騎吾將先破之乃與師中麾兵渡橋薄其右隅敵陳動有一帥被甲躍馬指畫陳隊德引弓一發帥應弦墜馬德乘勢大呼馳擊諸軍皆鼓譟金人以拐子馬兩翼而進德率衆鏖戰沂中曰敵便習在弓矢當有以屈其技乃令萬兵各持長斧堵而前奮鋭擊之金人大敗退屯紫金山德等尾擊之捕敵數百人馬馱數百而錡以步兵甲重不能奔馳下令無所取故無俘獲焉是役也將官拱衛大夫武勝軍承宣使姚端已下死敵者百九十人而敵之死者甚衆錡謂德曰昔聞公威略如神今果見之請以兄禮事公張俊之愛妾章氏即杭妓張穠也頗知書柘臯之役俊貽書囑以家事章答書引霍去病趙雲不問家事為言令勉報國俊以其書進上大喜親書奬諭賜之章氏事以趙甡之遺史修入甡之又云章氏加封雍國夫人恐誤案程敦原外制集章氏明年方自淑人進封郡夫人已丑官軍復廬州金人之至淮也資政殿大學士江東安撫制置大使知建康府葉夢得團結沿江軍民數萬分據江津遣其子書寫安撫司機宜文字模將千人守馬家渡及是宗弼酈瓊以輕兵來犯不得渡而還庚寅上謂宰執曰自敵犯邉報至人非一朕惟靜坐一室中思所以應敵之方自然利害皆見蓋人情方擾惟當鎮之以靜若隨物所轉胸中不定則何以應變也是日張俊楊沂中劉錡皆至廬州之城外壬辰柘臯捷奏至癸巳起復武功大夫英州刺史知滁州趙時降三官令葺理本州自效乙未賜劉光世韓世忠張俊嶽飛楊沂中劉錡詔書以捷書纍至軍聲大張蓋自軍興以來未有今日之盛仍戒以尚思困獸之鬪務保全功其詞給事中兼直學士院林待聘所草也上又遣入內內侍省都知陳永錫乘傳往淮西勞軍歷視戰地宣勞甚渥中興聖政何俌龜鑑曰敵之戰於柘臯也十萬鐡騎夾道而陳其勢豈可當哉張俊楊沂中等主之觀其晝夜疾馳聲援相接民兵圗結分據江津或守馬家渡以示吾之有備或據和州以遏敵之要衝卒使諸將捷書繼至而軍聲大振矣是役也蓋自兵興以來未有今日之盛又豈偶然之故哉是日節制陜西諸路軍馬郭浩言已復啇州丙申江東制置大使葉夢得上奏稱賀詔嘉奬初建康屯重兵嵗費錢八百萬緡米八十萬斛𣙜貸務所入不足以贍至是禁旅與諸道之師皆至夢得被命兼總四路漕計以給饋餉軍用不乏故諸將得悉力以戰由是朝廷益嘉之己亥上曰敵退便當措置淮南如移𨽻州縣併省官吏修築城壁要當事事有備常為敵至之防也中興聖政何俌龜鑑曰文事必有武備我高宗未嘗專事於文而浸忘乎武也吾觀講和之後吾國君臣搜警申訓嘗若敵至之無日八月六日上曰有備無患縱使和議已成亦不可弛兵備而張戒數論邉事謂當以和為表以備為裏以戰為不得已上亦諭曰此極當之論也九年上謂大臣曰敵雖講和戰守之備何必弛朕方復置茶馬司乘此間暇廣武備以戒不虞十年陳淵謂和戰二議不可偏執上謂淵曰今日之和非惟不可偏執自當以戰為主十一年上曰敵退使當措置淮南修築城壁要當事事有備常為敵至之防則知高宗之所以開紹中興者其自治之事蓋已先定也三月庚子朔觀文殿大學士左宣奉大夫福建路安撫大使知福州張浚言朝廷調發大軍用度至廣臣至州措置出賣官田及以誘寺院變易度牒共得六十三萬緡節次起發少助國用詔浚一意體國識大臣體令學士院降詔奬諭癸邜張浚復特進其言者請兩淮控扼去處其守臣並易以武臣餘州見仁人不可倚仗者並别與差遣去之是日金人圍濠州初金人自柘臯退軍於紫金山也濠州守臣王進發書告急日已再四而通判州事張綱以邉機事請赴行朝遂泛舟而去一日趙榮以數百騎至城下進登城望之榮語進曰大金以精兵三十萬旦暮臨城勢不可敵公宜開門縱民出城為避地計且淮岸舟船頗多若水陸從便傾城而去不三兩日可以獲安方今滿城生靈性命在足下足下宜念之進怒曰趙榮汝不能全節於朝廷乃為北軍遊説耶使徑弩射之榮大怒稍退罵進良久而去州人聞之以避地之謀力請於進進不從至是北軍自延陵浮梁渡淮翌日以兵數萬列於東門之外旌旗蔽野是時進有兵千餘又有宣撫司兵數百在城中北軍謂樓櫓皆腐爛攻之必破乃使人至城下招降守陴者怒罵之甲辰淮西宣撫使張俊淮北宣撫副使楊沂中判官劉錡會議班師俊與沂中為腹心而與錡有隙故柘臯之戰奏賞諸軍錡獨不預時朝廷雖命三帥各軍不相節制然諸軍進退多出於俊而錡以順昌之功驟貴諸將亦頗嫉之方金人之初退虛實未明三軍相視猶豫無決但聞俊沂中議欲棄壽春而移廬州於巢縣復以廬州為合肥而濠州自金人侵犯圍閉城守日夜遣人至軍前來援至是有被虜人民自淮上竄歸者皆言金人渡淮去已逺而濠路又通翌日俊因會飲謂錡曰公步人久戰可自此先回徑取采石歸太平吾欲與楊太尉至濠州耀兵淮上安撫濠梁之民而吾軍取宣化以歸金陵楊太尉渡瓜洲以歸臨安庶道路次舍樵㸑不相妨軍之始行也有詔淮東西漕臣胡紡李仲孺江東漕臣陳敏識隨軍饋運又遣兩浙漕臣張滙繼至會集於軍前俊命諸漕備十日糧諸漕以水路止於廬州陸路無夫搬運遂議給軍士錢人一千使之附帶又令敏識搬水路綱運入滁州以接濟二軍夜二軍進發遲明軍馬盡入去獨俊留兵數百未行乙巳權禮部尚書兼資善堂翊善蘇符兼侍讀中書舍人李易兼侍講直徽猷閣知邵武軍王洋言宣和二年布衣吕堂乞生子之家量給義倉米朝廷不曽施行近蒙恩詔貧乏之室生男女而不能飬贍者人於免役寬剩錢內支四千可謂仁德甚厚矣然免役寬剩州縣所收甚微勢不可久乞鄉村之人無問貧富凡孕婦五月至經保申縣専委縣丞注籍其夫免雜色差役一年候生子日無問男女第三等已下給義倉米一斛縣丞月給食錢十千專掌附籍所掌萬户已上嵗及千人便與改官蓋義倉米本不出糴今州郡尚有紅腐去處一郡嵗發萬斛可活萬人通數路許改官今使縣丞終任活一二千人俾之改官亦豈為過又義倉之米若有不繼逐年隨苗量添升斗積以活民民自樂從再三審度實可經久上覽奏曰愚民無知迫於貧困不能育故生子而殺之官給錢物使之有以育則不忍殺矣朕為民父母但欲民蕃衍豈惜小費也乃詔户部措置十五年五月戊午改給義倉米是日平旦楊沂中赴張俊帳會食已二帥俱去行數里諜報敵攻濠州甚急俊茫然失色復馳騎邀劉錡錡遽命軍中持十日糧繼二軍而行丙午德音釋壽春府宣和舒州無為軍管內雜犯死罪已下囚是日京東淮東宣撫處置使韓世忠舟師至昭信縣夜世忠以騎兵遇金人於聞賢坡敗之丁未遣樞密都丞旨周聿往沿江點檢措置事務且存撫淮民之失業者是日金人陷濠州武功大夫忠州刺史知州事王進為所執兵馬鈐轄武功郎閣門宣贊舍人邵青巷戰死之前一日敵薄城下以雲車衝梯之屬攻城城土與屋瓦皆震矢石如雨進所部皆閩人未嘗經戰守或告以州之民兵皆百戰之餘可以捍敵進不從翌旦兵馬鈐轄邵宏縋城投拜告以城中虛實敵益兵東南隅乘風縱火焚其樓櫓倐忽皆盡敵乘勢登城進奔馬入郡城朝服坐於廳事遂就執金人縱兵焚掠謀其城而去熊克小歷云濠州陷王進被殺此據淮西隨軍記所云也案紹興講和録烏珠第六書云濠梁之破守臣王進既已貸其生命則進固不死趙甡之遺史稱進被執與烏珠書同今從之戊申張浚楊沂中劉錡至黃連埠去濠州六十里而聞城陷俊乃召沂中錡謀之錡謂沂中曰兩府何以處沂中曰厮殺耳相公與太尉在後沂中當居前有進無退錡曰有制之兵無能之將可御有利害之兵有能之將不可御也今我軍雖鋭未為有制且軍士被甲荷糧而趨今已數日本救援濠州濠州既失進無所投人懷歸心勝氣已索又糧食將盡散處逈野此危道也敵人雖詭計莫測不若據險下塞塹地栽木使根本可恃然後出兵襲之若其引去徐為後圖此全師保勝之道願相協圖之諸將皆曰善於是鼎足以為營仍約逐軍選募精鋭旦日入濠州俊遣斥堠數輩還俱言濠州無金人或謂今人破城之後無所籍又畏大軍之來尋已去矣乃再遣騎數百往探皆無所見俊遣將官王某謂錡曰已不須太尉入去錡乃不行惟泝中與王德領二千餘騎而往以兩軍所選精鋭䇿應之四更起黃連午時騎兵先至濠州城西嶺上列陳未定有金人伏甲騎萬餘於城兩邉須臾煙舉於城上伏騎分兩翼而出泝中謂德曰如何德知其勢不可乃曰德統制官也安敢預事太尉為宣撫利害當處之泝中皇遽以䇿麾其軍曰那回諸軍聞之以為令其走爾散亂南奔無復紀律其步人見騎軍走謂其已敗皆散金人追及步人多不得脫殺傷甚衆此據淮西從軍記修入蓋其在軍中所目擊也王曮撰沂中神道碑云烏珠復遣三十萬至濠梁敵議欲搗山陽窺廣陵絶江而南王慮深入難制即以輕騎逆之據其衝敵抑不得展遂乘勢擊之於州梁橋敵勢崩壞戰屢卻王謂衆曰吾士氣方張視此餘孽猶几上肉耳若痛勦絶之可使二十年不敢復窺淮涘今橋闊岸領河流激深東西際林木隂翳可以拒敵於是奪橋為隘鼓衆而出於是敵三路並至王忠勇奮發示士以必死進所敵營自午已鏖戰至夜鼓動凡數十合士皆殊死鬪敵復大衄流血成河烏珠斷橋以遁獲所遺甲器資儲以億億計案此所云與林泉野記等諸書全不同蓋曮緣飾言之今不取己酉韓世忠引兵至濠州日歷世忠申初十日與賊接戰至三日以來賊馬衮墜直過淮北世忠亦據濠州趙雄撰世忠神道碑云敵别將數萬屯定逺王遺成功以輕騎追之轉戰數日烏珠中克敵弓以走其衆大潰遂奪鍾離以諸書參考烏珠此時不在濠州又金人既破濠州即焚掠而去不待官軍收復也碑之所云皆非其實庚戌秦檜奏近報韓世忠距濠三十里張俊等亦至濠州五十里又嶽飛已離池州渡江去會師矣上曰首禍者惟烏珠戒諸將無務多殺惟取烏珠可也澶淵之役逹蘭既死真宗詔諸將按兵縱契丹勿邀其歸路此朕家法也朕兼愛南北之民豈忍以多殺為意乎初敵之入犯也上命飛以兵來援飛念前此每勝復被詔還乃以乏糧為詞最後上御劄付飛云社稷存亡在卿此舉飛奉詔移兵三十里而止及濠州已破飛始以兵至舒蘄境上故張俊與秦檜皆恨之御劄以王次翁敘紀所載修入辛亥韓世忠與金人戰於淮岸夜遣遊奕軍統制劉實率舟師泝流欲劫金人於濠州金人覺之先遣人於下流赤龍洲伐木以扼其歸有自岸呼曰赤龍洲水淺可涉大金已遣人伐木欲塞河扼舟船請宣撫速歸我趙榮也諸軍聞之皆以其言有理世忠亦命速追而金人以鐡騎追至沿淮岸且射且行於是矢著舟如蝟毛至赤龍洲金人果伐木漸運至淮岸未及扼淮而舟師已去金人復歸黃連埠此據趙甡之遣史附入據日歷載世忠申狀乃云十二日三更後遣劉寶泝流再往濠州兩岸攻擾賊寨至十三日終日接戰萬户以下共折萬餘人馬數千匹與甡之所云全不同不知何也是日楊泝中自宣化渡江歸行在初張俊以諸軍至黃連埠士皆乏食乃遣事務官辛永宗還建康督糧永宗至江臯不肯渡坐於民舍呼邏卒採藤花食建康盡刷老弱及上元江寧二縣民夫運糧人持六斗米會俊等班師軍民皆棄戈負之采於道側而去壬子金人自渦口波淮北歸敵之始入也上以御劄賜三京招撫司都統制李顯忠令將所部與所俊會合如立竒功當建節鉞比敵退顯忠尾之至孔城而歸癸丑張俊引兵渡江歸建康府是日朝廷得俊與楊沂中報言初八日王進與敵人力戰大獲勝捷初八日丁未即濠州陷之日丁巳劉錡自知州引兵渡江歸太平州楊泝中之敗於濠梁也張俊自黃連拔寨徑去錡乃按部伍整旌旗最後徐行金人亦不復追錡至歷陽駐軍具奏聽旨然後班師由是俊與沂中皆恨戊午宰執奏御史中丞何鑄論牧馬地事上曰已優支地價或有移屋又支竹木之費朕恤民可謂至矣况湖上地半是冒佃不納租稅可令臨安索契而驗凡無契冒佃者明言其罪而恕之非特免罪更給公據及優支所費使民曉然知朕心也庚申詔中亮大夫康州防禦使右護軍右部同統制程俊旌表門閭俊之少也其母郡氏陷於憂國俊朝夕號泣願以財贖之遇奏薦則先其諸弟又聚族百餘人而飬之成州守臣王彥上其孝行於朝故有是命直祕閣新知常州秦梓知湖州辛酉左朝請即魏矼充集英殿修撰知宣州矼初免喪乃命出守甲子行營右護軍前部統制張彥與金人遇汧陽之劉坊寨武節大夫秦鳳路第八將張宏戰死宏初以為命補官歸朝屢有戰績事聞贈右武大夫忠州刺史宏贈官在是月丁丑丁卯右宣教郎宗汝為添差通判處州先是汝為自北境間行投嶽飛軍中飛遣赴行在汝為具言金人情偽且曰今和好雖定計必背盟不可遽弛武備奏檜聞之不樂至是權禮部尚書蘇符力言於上乃有是命既而上憐其忠遷右通直郎建炎以來繫年要録卷一百三十九
