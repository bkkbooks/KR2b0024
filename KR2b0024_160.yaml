body:
  text: 建炎以来繫年要録巻一百六十宋李心傳撰紹興十有九年秋七月辛巳左中奉大夫楊惇知舒州代還乞戒監司守臣修水利詔付户部上曰平江隄堰不修嵗輸米比舊虧十萬斛臨安西湖民間灌溉所資其利不細嵗久亦填淤宜悉令修治壬午上諭大臣曰官不給賣度牒已十餘年間多有輙自披剃者可令禁止稍重其罪仍許人告庶知戢畏左朝奉郎提舉江州太平興國宫邊知白卒癸未詔復敷文閣待制致仕中衛大夫忠州圑練使添差荆湖南路兵馬鈐轄馮賽卒于衡州辛夘秦檜以甘雨應祈乞拜表稱賀上曰更五日不雨則傷稼如浙東田髙得此雨拯濟秋成可必檜曰陛下至誠格天尤為可喜左承議郎主管台州崇道觀許忻知邵州忻以論事忤秦檜意屏居臨川閉門少所賔接舉人陸九齡年尚少忻一見亟折輩行與深語至是遂與之俱九齡金谿人初入郡學時場屋無道程氏學者九齡從故編得其説獨委心焉因結茅舍旁講習兼晨夜不怠如此者十餘年戊戍大理少卿李如岡面對乞守令悉心奉行民事顯有成績者令監司保眀来上優加褒擢其弛慢違戾者亦従按劾重寘典憲從之己亥拱衛大夫貴州防禦使建康府駐劄御前選鋒軍正將劉超卒庚子監察御史陳䕫面對論囚多瘦死望令諸路憲臣嚴責治獄之吏凡無家者官給之食詔刑部措置敷文閣直學士新知婺州吳表臣罷先是表臣自祠官中請郡故以婺處之既又抗章乞祠以全晚節殿中侍御史曹筠劾其敢為欺罔無所忌憚故有是命壬寅右諫議大夫巫伋論鎮江府見於民間科借苖米追呼捶撻不勝其擾乞禁止其官吏重賜黜責癸夘秦檜奏事畢上曰巫伋言鎮江預借事不知何故闕乏乃爾可令監司經理其守臣先罷時右朝請郎曽惇為秦檜所厚驟用知鎮江至是纔數月也左朝奉大夫趙逹之知漢陽軍代還言湖北諸郡人希土曠間有請佃歸業之人官司指為夫丁差科連併縁此無人耕佃平時沃壤鞠為荆棘望寛免税役庶有勸耕之漸詔本路帥臣監司措置甲辰監察御史章厦面對論州縣財賦出入之弊乞立法禁止從之直秘閣江南東路轉運判官鄭僑年令再任從帥臣俞俟請也左武大夫忠州團練使鄂州駐劄御前破敵軍統制李山添差福建路馬步軍副總管罷從軍八月庚戌朔昭信軍承宣使鎮江府駐劄御前諸軍都統制王勝卒諡毅武辛亥𠡠令所言臣僚劄子乞詳議民事一罪庶協于中今年三月庚戍葉綝奏請㸔詳民事被罪條法謂擅行科率及應因害民之事以被罪者作自犯民事不注知州軍通判知縣縣令差遣緣民事被罪情實為重難以與其它公罪事體一同欲乞並依見行條法施行從之自張浚當國始議州縣官縁民事致罪者終身不許治民行之數年論者數以不便為言然終不能改二十年十二月辛酉湯允恭又請壬子武泰軍承宣使主管侍衛馬軍公事劉寶為鎮江府駐劄御前諸軍都統制宣州觀察使殿前司遊奕軍統制成閔權主管侍衛馬軍司公事二人皆楊存中所薦也祠部員外郎胡寧面對論州縣受夏秋二税遇輸絹之時則不受絹而使輸錢遇輸米之時則不受米而使折色望自今並輸正色毋得折變見錢詔户部㸔詳癸丑復泰州興化鎮為縣乙夘右承議郎兩浙東路轉運司主管文字王守道直秘閣守道亦繼先子也辛酉詔行在内外諸官司添差官今後不得過二員令所属遵守御史臺覺察彈奏其已溢格處聼滿任按此指揮止為行在官司無預外路熊克小歴除去行在二字第云内外諸司則失其實矣宗正寺丞王葆面對言國家役法應女户單丁與夫得觧舉人太學生並免丁役盖本先王仁先孤寡貴肄多士之意頃議者歴陳丁役之弊遂有募人充役指揮臣謂進納雜流之人物力髙彊雖係單丁自應顧募至若前項三色亦令顧募似為矯枉之過且女户而無子孫與雖有子孫而年在㓜弱皆窮民之無告者也若遽使當力役之事則公私所費必倍於豪强故昨来指揮寡婦有男為僧道成丁者並許募人充役正恐姦民旋行規避爾今州縣之間欲舞文者以虐無告則或指逺適之緇黄為某氏之子孫初不以存亡為别也因使寡婦守志者不免於執役困悴之患其勢廹而改行者家貲産業或破壊於後夫之手是豈朝廷勤恤民隠之本心乎得觧舉人名已登於天府今乃同籍於役人太學生身已𨽻於上庠今乃心累於執役是二者其家或有兼丁則力役自不妨於充募若乃單孑一身而能留意於科舉奮身於庠序遂不得自别於齊民甚非陛下仁先孤寡貴肄多士之意欲望特詔有司俾是三者重加㸔定庶㡬孤寡得所而士知愛重是日進呈上曰單丁女户舊法免差役以許免者多有司遂有顧募之請宜令户部詳其的確利害来上葆崑山人也既而本部乞女户無子及得觧舉人太學生單丁並免身役即特㫖及因恩免觧人聼募人充役官司毋得追正身從之户部奏上在十二月己未丙寅太常少卿張把充大金賀正旦使武節大夫和州團練使知閤門事趙述副之直祕閣知臨安府湯鵬舉守司農卿充賀生辰使右武大夫吉州刺史帶御器械石清副之通好後以庶官出疆自此始述即瓌也述改名不知所以紹興十六年五月乙巳充接伴已改今名恐是避二王所連偏旁也庚午成州團練使潘長卿貴州團練使潘粹卿和州團練使潘端卿為泉利閬三州觀察使時吳國長公主入朝故有是命辛未詔浙東諸州强盜該配者並刺充沿江諸軍都統制下使喚俟盜賊寧息如舊以權本路提刑秦昌時有請也壬申右朝散大夫兩浙轉運判官曹泳直祕閣權尚書户部侍郎兼權樞宻都承㫖宋貺兼權知臨安府癸酉大理正元龜年面對乞自今諸州奏案内有不該留禁待報人並先次責出詔刑部㸔詳甲戍詔以景靈宫繪像功臣之副蔵于天章及秘閣復故事也乙亥大理正周埅面對論諸郡擅支借轉運司錢物充公事及收支官物别置私歴之弊乞戒監司稽察舉劾丙子詔申嚴行下戊寅詔荆南府應劉錡舊管軍馬並發還侍衛馬軍司九月庚辰朔大理寺丞石邦哲面對論天下之法宜總於大理而一路一司一州一縣與夫在京省臺寺監有司局務各有専法大理不能通設有論罪斷刑皆出臨時取㑹移文待報關决淹延或法有重輕供報不盡莫得稽考則罪有出入之弊欲望特詔三省委之刑部闗㑹應千官司前後被受立到専法各録兩本付之法寺斷刑治獄兩司以憑遵用事下刑部㸔詳如所請明年正月己丑刑部奏下丙戌左奉議郎知大宗正丞楊偰面對乞太學私試鎖院考官不得輙歸私家出入傳送之禁並依補試法事下禮部其後但令辰入昏出而已眀年二月辛亥施行辛夘惠州刺史知閤門事宋籛孫充大金賀正旦副使以趙述病告也壬辰左朝奉郎提舉兩浙東路常平茶鹽公事秦昌時直祕閣提㸃本路刑獄公事本路帥臣趙不棄申昌時悉心賑濟全活甚衆檜進呈乃有是命昌時檜兄子已見癸巳詔新通判汀州李璹特放罷坐嘗與新州編置人胡銓交結凌蔑州縣為守臣張棣所劾也乙未大理寺丞孫敏脩面對論諸路被差鞫獄官多求避免乞量増賞格詔送刑部庚子大理寺丞郭唐卿面對論四方案牘来上本寺取㑹未圓情節往往不以時報乞申嚴行下從之大理寺丞石邦哲令再任初有詔法寺斷刑官願再任者聼至是從其請也壬寅左朝散郎陳璹知饒州代還論諸縣保正副長科役煩多尤為民害若令當役良民皆許顧人自代則受顧之人習熟州縣通曉法令縣官非理相加未必畏懼官吏雖欲恣其谿壑之欲有所不能望特詔有司許凡當役保正副長除情願應役之人聼其從便外並許顧人代役官司不得追呼正身詔户部㸔詳申省璹建陽人也甲辰户部侍郎李椿年言諸路錢帛各有樁發條限比年往往公然移易妄用有誤嵗計欲将移改侵借去處不以去官並從本部申取朝廷指揮重賜黜責從之戊申上命繪秦檜像自為賛曰惟師益公識量淵冲盡闢異議决䇿和戎長樂温清寰宇阜豐其永相予凌烟元功尋出示羣臣藏于祕閣熊克小歴載此事在紹興二十一年十月盖誤冬十月按是月己酉朔庚戍言者論監司州縣樂於知事以厚利啗進奏官遂致聼探事宜漏泄機宻詔進奏官收受計贓坐罪官吏依擅支朝廷封樁錢物法仍令監司互察從户部請也壬子上諭大臣曰有司立法不可太重恐難必行宜令勑令所檢㑹日前建眀有不可行者並湏改正癸丑觀文殿學士提舉萬夀觀秦熺為郊社禮儀使渡江後五使以祠官為之盖自此始大府寺丞李燾面對論比年州郡監司多差未出官選人押綱以覬賞典縁未諳世務公然盗用望申嚴行下詔送户部其後本部言初官亦有可以倚仗因賞典太優欲今後止依本等推賞從之熊克小歴作太常寺丞眉山李燾按燾此時方自嘉州推官丁憂家居克盖誤也户部乞依本等推賞在十一月丁未丙辰左朝請郎主管台州崇道觀朱敦儒守本官致仕從所請也己未右朝請郎幹辦行在諸軍糧料院王珏提舉兩浙西路常平茶鹽公事先是秀州嵗以錢給亭民煮鹽至十五年積十九萬七千餘緡不給亭民無以煮鹽訴于朝上曰亭户宜恤不則遁去其害非細可令户部究實於是用珏珏至官踰年盡償所負又開華亭海鹽河二百餘里鹽滋得通流其溢以溉田經界之法行甚害者三百六十九事其七千二百二十七户尤為病珏奏除之珏安石曽孫也上語在八月戊辰併附此日歴所載甚畧今以晁公遡所作珏墓誌増修右承議郎知新州張棣提舉荆湖北路常平茶鹽公事以其再劾胡銓也至官一日卒時責授濠州團練副使洪皓在英州閩人右承務郎倪詧為守詧老矣内無奥主聞棣以巧中遷客取使節欲劾之即使兵馬都監伺其隙捕皓家奴寘獄中釀成其罪未及發而詧死事乃觧胡銓䟦戒論和議詔書云十九年春新興守張棣觀望權勢乞竄銓海外棣即日持節湖北按棣劾銓過海在去年之冬去此已久當是因再劾李燾遂超遷之銓盖小誤今畧脩潤庶不牴牾降受文州刺史辛永宗特勒停送肇慶府編管永宗為湖南馬步軍副總管居邵州永宗以嘗立軍功給真俸守臣右朝散郎吕稽中知永宗為秦檜所惡劾其冒請全俸當計以贓乞下守臣閱實稽中先以計取永宗所受御劄送檜矣永宗由是不能自眀詔侵支過請給令稽中依條追理稽中選郡僚之苛刻者籍其家以償欠一簮不得留既而稽中語其僚曰前赴其家燕集以某器酌夀今乃不見豈隠之耶其殘刻如此庚申直龍圖閣主管洪州玉隆觀梁棄卒辛酉上諭大臣曰西溪摽撥馬軍寨地可令守臣宋貺親往檢視毋得侵掘塜墓多占民田昭宣使髙州刺史趙轍提舉佑神觀免奉朝請宣政使眀州觀察使提舉江州太平興國宫馮益令再任壬戍徳安府忠節卒蕭龍挾刃殺守臣右朝奉大夫王伯淮于㕔事傷而不死衆執隆隆舉刃自殺伯淮以聞詔仍舊治事丙寅敷文閣直學士知紹興府趙不棄卒己巳初復諸陵攅官薦新之禮用太常博士晉陵丁婁眀請也庚午右奉直大夫知平江府王晌直祕閣知建康府兼行宫留守司公事建康自置留守後以庶官為之盖自晌始辛未左朝散大夫趙令衿知泉州左承議郎添差通判臨安府郭瑊知秀州乙亥閤門祗候王允昌為閤門宣賛舍人允昌勝子特録之丁丑詔右朝奉大夫提舉江南東路常平茶鹽公事張昌依舊兼權提刑仍許薦舉以昌言一路選人改官久無職司文字乞除正官故也十有一月癸未祕書省著作佐郎劉章面對言禮莫重於祭而郊廟為尤重神宗元豐間嘗詔陸佃等以太常寺置局編類成書凡三十巻郊廟奉祀禮文今陛下以眀聖之資當述作之任而縟儀未紀乞命官為紹興郊廟奉祀禮文以續元豐之書上嘉納之初太傅咸安郡王韓世忠之為淮東宣撫使也張浚在都督行府以世忠有功用上所賜空名告授其子彦朴彦質皆右承務郎久之除直秘閣賜三品服已而吏部審騐言無立功實跡當奪所授官甲申世忠請以郊恩改奏依舊帶行章服職名詔先次作白身人改奏俟補正日取㫖乙酉尚書工部員外郎楊遹卒丁亥尚書省勘㑹昨降指揮令諸路監司郡守将寛剩錢物每季開具申省撥充月樁今来逐路月樁錢撥填已見次第詔今後更不開具辛夘上親饗太廟至櫺星門降輦歩趨齋殿虛小次不入壬辰合祀天地于南郊太史局令胡平奏帝座及三台星體眀耀禮畢還御麗正門建金雞赦天下辛丑尚書户部侍郎兼權直學士院李椿年罷椿年首陳經界之議及是始畢㑹民多訴經界不均者殿中侍御史曹筠因劾椿年求薦劉大中隂交趙鼎皆竊其權柄漏其昵談今游舊将之門傾危朝廷尤為可慮兼經界已定若不别委他官覆實則椿年私結将帥曲庇家鄉之罪無以厭塞公議詔與外任右諫議大夫兼侍講巫伋兼權直學士院以諫官攝詞臣非故事也左修職郎周麟之行太學録甲辰詔諸郡行鄉飲酒之禮以取士先是司農卿湯鵬舉請對論舉人多冒貫求試乞於未下科詔前令州縣長吏籍定来嵗當應舉人名州縣學職事覆實申敎授預先引保委無偽冒然後許赴鄉飲酒若臨時投狀射保者並不收試事下禮部至是頒行焉乙巳右諫議大夫巫伋試給事中殿中侍御史曹筠守侍御史監察御史章厦守右正言監察御史陳䕫為中書門下省檢正諸房公事伋仍兼侍講權直學士院䕫仍兼崇政殿説書丙午上謂秦檜曰經界人户多訴不均當與受理若不受重税将無以輸納檜曰臣嘗諭户部侍郎宋貺宜體聖上均税本意有未均處亟與改正丁未户部上州縣墾田増虧賞罰格初議者謂淮南湖北民稍復業而曠土尚多請立賞格至是本部以其格上之每州増墾田千頃縣五百其守宰各進一官即州虧五百頃縣虧五之一皆展磨勘年詔頒之諸路二十年四月癸未所書可參考十有二月庚戌祕閣修撰提舉江州太平興國宫王賞卒贈敷文閣待制壬子軍器監王㑹權尚書兵部侍郎祕書省著作佐郎林機面對言訪聞有異意之人匿迹近地窺伺朝廷作為私史以售其邪謀偽說臣若知而不言則異日害正汨真之患臣實任其咎欲望宻加搜索嚴為禁絶甲寅上謂秦檜曰此事不應有宜行禁止許人陳告仍令州縣覺察監司按劾御史臺彈奏並取㫖優加賞罰於是李光之獄遂起眀年三月丙申行遣右朝請大夫知婺州周三畏復敷文閣待制知平江府丁巳金人弑其主亶亶立十五年平日嗜殺晚年尤甚左右近侍少不如意即手刃之兵部尚書賽音竒辰䕶衛将軍巴克沁廣威宿直将軍塔斯定逺皆以罪族又殺其后費摩申氏於是宗族大臣皆懼不免相與結約以伺其間至是駙馬都尉唐古辨與尚書右丞相岐王亮太常卿烏逹宿直将軍額爾楚克尚厩局使髙景山寢殿小底興國努謀因亶醉卧収其兵械夜入霄儀殿弑之有䕶衛将軍瑚圖克初不與謀亮等入殿門亶驚起求弓刀不獲瑚圖克遽以所持鎗刺亶于殿壁衆争前斫殺之遂閉殿門興國努傳㫖斂取䕶衛弓刀然後屏出敷徳殿門詐召大臣左丞相沂王宗賢夜半入宫為所害都元帥曹國王宗敏繼至亦縊殺之遂立亮亶時年三十一宗賢金太宗晟子宗敏太祖旻子也此麓苖耀神記修入耀稱亮為平章宗賢左相宗敏右相按亮十八年九月已拜相而大定赦書稱宗敏為元帥曹國王今從之耀又稱唐古辨為唐古卞與金人誅宗本等詔書所云差不同今從金詔戊午直龍圖閣知潭州劉昉言姓名偶與前代不令之臣相犯請更名旦從之是日金主亮即位時年二十八己未大赦文武官皆進一秩賜民租税一年追廢亶為東昏王以謂刑餘之人故不得入廟追尊父宋王宗幹為徳宗改元天徳亶追諡見三十一年十一月熊克小歴載亶死在己未誤也盖丁巳殺亶戊午立亮己未肆赦爾金國赦書朕惟太祖武元皇帝神武應期奄有四海以天下大器授于太宗文烈厭世不忘先遜憑几宣命属之前君以繼洪業十有五年而昏虐失道人不堪命宗族大臣協心正救久而弗悛仰奉九廟之靈已從廢黜亦既殞滅宗族大臣咸以太祖經營締建所繇垂統推戴眇躬嗣臨天下朕以宗祖之重義不獲已爰受命之初兢兢若渉淵冰未知攸濟尚賴股肱三事文武百僚同心附翼以底于治宜布維新之令以宏在宥之恩可從皇統九年十二月十一日改為天徳元年壬戍上恭謝景靈宫退御西齋殿進膳召近臣對御茶酒癸亥亦如之甲子復詣太一宫至是遂如故事丁夘封紅霞帔劉氏為宜春郡夫人吴氏為新興郡夫人吴氏名玉奴中宫近属也吴氏紹興二十二年五月進封才人制詞云乃椒房之懿属己巳宰執進呈四川管押扈衛人乞推賞上曰發来扈衛人已滿千人可下制置司自今嵗募三百人赴闕丁丑金國賀正旦使龍虎衛上将軍殿前右副都㸃檢完顔兖副使昭武大將軍西上閤門使劉箴入見兖亮弟也以病故改用是日尚書祠部員外郎胡寧祕書省著作佐郎劉章並罷章有士望太師秦檜疑其不附已而寧本因其父兄與檜厚故召用之至是檜知寧兄徽猷閣直學士致仕寅之貧因其往劒州省覲世母遺以白金寅報書曰願公脩政任賢勿替初志安内攘外以開後功檜以為譏已始怒之寅嘗游嶽麓寺大書壁間云是何南海之鰐魚来作長沙之鵬鳥於是帥臣劉旦方欲捃摭張浚諸人之罪而旦潮陽人也亦大怒復訟寅于檜侍御史曹筠即奏寧兄阿附趙鼎章居衢州與鼎賔客交通故二人私相朋比衆所指目不知每懐異意欲以何為若不罷斥無以安衆心乃以章通判均州而寧充䕫州路安撫司㕘議熊克小歴二人之罷在今年九月盖誤戊寅太常丞林大鼐尚書刑部員外郎湯允恭並為監察御史是月資政殿學士致仕王次翁薨于眀州次翁既引年秦檜憐之饋問不絶及薨贈恤甚厚責授濠州團練副使觧潜居南安軍至是疾劇有朝散郎張九成往省之謂曰太尉平日所懐亦有不足者否潜泣曰平生惟仗忠義誓與敵死以雪國耻而不肯議和遂為秦公所斥此心惟天知之九成曰無愧此心足矣何必令人知潜曰聞此言心中豁然矣即逝九成壮之時秦檜猶怒潜故䘮不得歸逮檜薨乃聼二十六年正月癸亥歸葬是嵗宗室子賜名授官者十有七人諸路斷大辟三十一人建炎以來繫年要録巻一百六十建炎以來繫年要録巻一百六十金人地名考證賽音竒辰原書作賽居常誤今改正巴克沁原書作八斤與金史同並誤今改正塔斯原書作特塞即金史之特思並誤今改正費摩原書作裴磨誤改見巻一百十八額爾楚克原書作斡諸即金史之阿里出虎宗按斡諸金熙宗時人官宿直將軍熙本紀内載其事與本巻同此斡諸係阿里出虎音轉之訛並誤今改正興國努原書作興國奴即金史之大興國誤今改正瑚圖克原書作忽突即金史之忽土並誤今改正唐古原書作同古即金史之唐括誤今改正烏逹原書作烏帶與金史同並誤今改正
