body:
  text: 建炎以來繫年要録卷一百四十一宋李心傳撰紹興十有一年秋七月丁酉朔鎮潼軍節度使開府儀同三司判紹興府信安郡王孟忠厚為少保戊戌實録院進呈徽宗皇帝實録六十卷自元符三年至大觀四年庚子上以臨安旱蔬食請禱決滯獄出繫囚後二十四日大雨翰林學士兼實録院修撰范同為參知政事辛丑司農少卿高頴罷以言者論其卑凡也自此諸大將之客稍稍被罪矣壬寅新福建路轉運判官董將江西路轉運判官孫邦並罷以言者論將邦皆孫近之死黨自近罷政而二人者隂懷怨望至於鼓飾浮言撼搖軍政故斥之給事中兼侍講兼權直學士院林待聘兼直學士院中書舍人兼侍講程克俊試給事中起居舍人兼實録院檢討官朱翌試中書舍人兼實録院修撰侍衛親軍馬軍都虞候武泰軍節度使劉錡乞宫觀詔錡疾速赴行在奏事左武大夫耿著杖脊刺配吉陽軍牢城先是韓世忠既罷兵遣著先之山陽著與總領財賦官胡紡有舊為紡言朝廷令二樞密來分撥軍馬紡言嘗與諸軍議欲開落走死逃亡之在籍者著又言軍中弊幸雖郭子儀李光弼不能無若一日頓革未必不生事吕祉之戒不可不慮紡奏著鼓惑衆聼事下大理故有是命紡始媚事著寺故亟為世忠所薦及世忠罷紡首訐其過焉初天聖間立川交子法三嵗一易令民户輸紙墨費三十錢至是詔增為六十四每界亡慮一百七十萬緡其更易不盡者亦二十餘萬緡號水火不到錢悉令計司取之以備邉用癸卯言者論旱魃為虐蓋州縣之間有傷和氣者七事昨降指揮許江浙折帛錢以十分為率紬折六分絹折三分綿折五分紬絹匹八千綿每兩五百皆所以寬民力也而州縣乃盡令折錢一也民間積欠稅物比令分四科隨稅帶納而州縣應民間七年八年九年積稅盡令一併送納二也諸州軍匠盡赴軍器所充役逃病死亡殆無虛日三也此項今年四月壬申已得旨減退不知何以如舊頃者鎮江府起蓋倉屋二百餘間計其費不下十餘萬緡皆民之脂膏四也頃以國公出閣勳臣還朝修建府宅又興立營寨為諸軍老幼歸宿之地雖不得已豈免怨咨五也頃者復免行錢既兼收於貧弱下户後連及於鄉村下店民有扄鋪而廢業者六也獄者人命所繫長吏或誤殺人巡尉執平民以為寇七也望特降睿旨督諸路憲漕求所以更張蠲免裁減而禁戢之勿為文具以召和氣詔分送合屬去處條具申尚書省直祕閣陜西節制司參議官王湛入辭上以御劄賜川陜宣撫副使胡世將曰已降詔旨委卿宣諭諸將保捍關隘極力戰守如有建立竒功當加不次之賞今遣湛申諭朕意併令靣飭諸將又賜知金州兼節制陜西軍馬郭浩詔書俾遍諭諸路舊臣使為內應詔林待聘所草甲辰直顯謨閣提舉川陜茶馬馮康國奏近聞敵在長安三月二十三日晝晦油酒變色皆白兵刃出光熖涇州雨沙旱災相仍赤地千里上曰景象異甚天變示人殆不虛也自古無文德而有武功往往非國家之福而敵好兵嗜殺肆為無道不畏天不恤人其能久乎朕當修人事以待之耳御史中丞何鑄入對復論資政殿學士孫近之罪以為近自罷政以來每對客談即云緣與陛下與秦檜議邉事不合遂致丐祠而去一時好事之人往往傳為口實且如兹者延登勳臣置在樞管此皆成算素定億姓均歡顧近何為而云不合揆近之意不過掠虛美於一已嫁實怨於君上欲望將臣日所論近章亟行頒降使天下之人知近果為懷私異議而去初不為陛下與秦檜議邉事不合而去也則天下之所以為觀聽者勿惑矣從之尚書兵部侍郎張宗元充寶文閣直學士知平江府兼浙西沿海制置使代仇悆也朝廷始聞王法恩事故亟罷之悆亦乞奉祠改提舉江州太平觀悆得祠在是月己酉樞密使張俊上從軍死事將校姚端等九百三人其七百四十七人共官其子孫九百六十四餘一百五十八人各賜其家帛二十匹自端至李青等三百三十人仍各贈八官至一官並從之乙巳左朝散大夫提舉江州太平觀劉岑責授單州團練副使全州安置先是度支員外郎李椿年審究岑三郡妄支之數為錢六十七萬餘緡其間有市馬及銀器供張帟物之歸已者故有是命丁未特進尚書左僕射同中書門下平章事提舉實録院慶國公秦檜以進書恩遷少保封冀國公戊申萬安軍編管人溫濟量移潭州用韓世忠奏也濟始以告耿著得罪著既敗世忠乃請遷之事祖見九年九月戊戌己酉命參知政事范同兼修實録庚戍詔實録院修撰官以下各轉行一官於是延福宫使慶遠軍承宣使入內內侍省都知都大提舉諸司梁邦彥落階官提舉江州太平觀靖康後宦者除正任自此始邦彥除正任日厯不書林待聘內制集有除充詔書云屬者祇嚴寶册勒成信書皆一時大典而爾庀職其間咸有績用蓋即此賞也答詔在張俊辭太傅胡世將乞奉親孟忠厚辭少保之後嶽飛乞罷樞副張中孚辭起復之前以日厯考之忠厚除少保在此月丁酉世將乞奉親在丁未俊除太傅在己未中孚起復在八月戊辰飛罷樞副在甲戊則邦彥除命必在此時今併附降旨之日俟考壬子右諫議大夫萬俟卨言伏見樞密副使嶽飛爵高祿厚志滿意得平昔功名之念日以頽墮今春敵寇大入疆埸騷然陛下趣飛出師以為犄角璽書絡繹使者相繼於道而乃稽違詔旨不以時發久之一至舒蘄匆卒復還所幸諸帥兵力自能却敵不然則其敗撓國事可勝言哉比與同列按兵淮上公對將佐謂山陽為不可守沮喪士氣動搖民心遠近聞之無不失望伏望免飛副樞職事出之於外以伸邦憲癸丑上謂大臣曰山陽要地屏蔽淮東無山陽則通泰不能固敵來徑趨蘇常豈不搖動其事甚明比遣張俊嶽飛往彼措置戰守二人登城行視飛於衆中倡言楚不可守城安用修蓋將士戍山陽厭久欲棄而之他飛意在附下以要譽故其言如此朕何賴焉秦檜曰飛對人之言乃至是中外或未知也先是飛數言和議非計檜大惡之嶽候傳云紹興十一年大金約和上令議和事便與不便候奏曰金人無故約和必探我國之虛實如年前正約和間併兵盡舉張俊不能迎遏其軍大潰失陷川陜烏珠韓常重兵攻淮西是時韓世忠在楚州亦無所措遂求救於朝廷後無旬日盡失淮楚退兵回住鎮江以拒江為險更無前進之意大概行兵無方略料敝無智勝賞罰不明信令不行兵無鬬志是以戰之不尅攻之不拔則敗之由也如臣提兵深入敵境潁昌之戰我兵大捷敵衆奔潰前入汴京當時戮力齊心上下相副併兵一舉大事可成今日烏珠見我班師有何懼而來約和豈不為詐據臣所見為害不為利也此奏不見於他書按飛自郾城歸後烏珠未嘗求和又其詞拙朴疑亦未真姑附著於此存其意可也及是飛自楚州歸乃令卨論其罪始有殺飛意矣熊克小厯稱卨言飛倡言棄兩淮以動朝廷此不臣之漸也蓋孫覿撰卨墓志云耳今日厯載卨三章乃無此語克又不考而遂因之今仍載其本文庶不失實詔權尚書吏部侍郎張宦與外任宦乞奉祠乃以為集英殿修撰提舉江州太平觀寶文閣直學士新知明州梁汝嘉落直字甲寅侍衛親軍馬軍都虞候武泰軍節度使劉錡知荆南府罷其兵張俊深忌錡與嶽飛每言飛赴援遲而錡戰不力也飛請留錡掌兵不許時有處士孫元濟者聞除錡荆南竊謂比之奕碁此最髙著也人問其故元濟曰陜蜀諸軍但知吳氏襄漢諸軍尚思嶽家江陵在蜀漢之間而錡有威名為諸將所服且聞有詔或遇緩急旁郡之兵許之調發銷患未形此廟算也非吾君大聖其孰能與此元濟江隂人也中書門下省檢正諸房公事魏良臣權尚書吏部侍郎右奉議郎宋貺為軍器監主簿昭慶軍節度使開府儀同三司萬壽觀使韋淵乞從便往外郡尋訪醫藥許之乙卯詔階成岷鳯金啇秦隴州永興軍鳯翔府州縣官並依光州已得旨到任半年減二年磨勘任滿遷一官以極邊故也己未少師樞密使濟國公張俊為太傅進封廣國公賜玉帶以俊首抗封章請歸部曲也俊請離軍將佐並與添差差遣從之其後大為州郡之患庚申詔文武官陳乞致仕身亡雖在給敕之前並聽蔭補用考功員外郎遊損請也上謂大臣曰士風陵夷以一官之故父死匿喪以俟命蓋立法有未盡也朕謂濫與人官雖害法其體猶輕若風教不立使人飾詐茍得棄滅天理其害甚大况在法所當得乎損酢子也辛酉尚書禮部郎中張廣守起居舍人王明清揮麈録云張彥實為著作郎秦檜一當軸其兄楚材為祕書少監約彥實觀梅於西湖楚材彥實次其韻檜之見之大稱賞曰旦夕當以文字官相處遂擢左史再遷而掌外制按廣紹興九年五月自著作佐郎遷祠部員外郎十年四月遷禮部又升郎中今年七月遷起居舍人十二月秦梓方除祕書少監明年正月廣遷起居郎明清蓋小誤也癸亥祕閣修撰知臨安府俞俟升敷文閣待制是日大雨翌日輔臣稱賀上曰朕日來卧不安席夜半猶未交睫懼德不類或政有闕失每事循省殆遍恐旱災必有致之之由若乃祈禱之禮但循其文耳是月樞密使張俊復往鎮江措置事務副使嶽飛留行在以二人議事不叶故也俊因奏事乞趣淮西之賞上曰功賞後時在將帥不在朝廷俊問所以然上曰軍士有出戰者有輜重及守營者凡所謂戰功皆戰士也今更不分全軍皆要推賞動數萬人朝廷何以行之俊曰誠如聖諭初因一軍如此故諸軍效之臣今蒙專任當誡諸統制官只保明實出戰者庶可漸革前弊端明殿學士提舉臨安府洞霄宫徐俯薨於饒州八月丙寅朔劉錡入辭命坐賜茶武功大夫榮州團練使兼閣門宣贊舍人知泗州劉綱知揚州主管淮東安撫司公事總領節制本路諸州水寨民兵先是淮東轉運副使陳衮劾師臣劉光逺厯守真揚二州移用公私錢斛金銀雜物十餘萬貫石匹兩收支不明詔浙西提刑司劾治故命綱代之光逺之劾日厯不書今以十月二日陳衮乞移差遣狀修入左武大夫添差江南西路兵馬都監樊序知楚州戊辰前檢校少傅寧國軍節度使醴泉觀使張仲孚前龍神衛四廂都指揮使清遠軍承宣使張中彥並特起復中孚添差兩浙東路馬步軍副都總管中彥添差福建路馬步軍副都總管以其丁內艱故也中孚等力辭乞依前行在宫觀許之中孚等奉祠在十二月丁卯中書舍人兼實録院修撰朱翌乞祀韓厥於作德廟仍就行在所權創祠宇詔禮部討論如所奏辛未尚書吏部郎中李鞉試將作監吏部員外郎劉才邵守軍器監始除也上覽除目曰凡事必謹始館職寺監丞乃郎官卿監之選也郎官卿監乃侍從之選也凡除館職寺監丞必擇他日可補郎官卿監之闕者凡除郎官卿監必擇他日可補侍從之闕者如此則士安分守而奔競之風息矣若不謹始用非其才久而不遷則士有留滯之歎以序遷之又有不稱職之誚不可不謹尚書都官員外郎施巨為吏部員外郎壬申資政殿學士顔岐薨於福州癸酉左承議郎髙潁添差福建路安撫大使司參議官限三日之任令湖廣總領官林大聲優與津發甲戌少保樞密副使兵飛復為武勝定國軍節度使充萬壽觀使右諫議大夫万俟卨既劾飛罪未報御史中丞何鑄殿中侍御史羅汝楫復交疏論之大略謂飛被旨起兵則略至龍舒而不進銜命出使則欲棄山陽而不守以飛平日不應至是豈非忠衰於君邪自登樞管鬱鬱不樂日謀引去嘗對人言此官職數年前執政欲除某而某不願為者妄自尊大略無忌憚近嘗倡言山陽之不可守軍民搖惑使飛言遂行則幾失山陽後雖斬飛何益伏祈速賜處分俾就間祠以為不忠之戒卨章四上又録其副示之飛乃丐免故有是命熊克小厯云張俊嶽飛皆在鎮江府而万俟卨等論飛罪於是飛上章丐罷以為萬壽觀使飛既罷而俊獨留鎮江為備按趙甡之遺史今年七月初俊飛自楚州俱還而本月俊再出使飛不行故此月己卯諫疏有云嶽飛官屬盡辟充行府差遣飛既不行遂各請宫祠平居無事聚於門下比緣臺諌繳納副本一夕散去以此考之益知飛不在鎮江無疑也克實甚誤乙亥詔諸王之後各以最長一人權主奉祠事不改環衛官先是諸王官教授兼親賢宅講書石延慶援故事請襲封事下禮官而有是命延慶新昌人也丙子保成軍承宣使知南外宗正事仲􅮔卒於泉州贈開府儀同三司追封國公丁丑徽猷閣待制知廣州陳橐貶秩一等初宜章盜駱科既為官軍所破其黨鄧寧李定鄺郃等復羣聚為寇詔廣西經略使胡舜陟節制湖廣三路之兵討之時選鋒軍統制韓京駐廣東橐奏留京乞令免聼舜陟節制朝論以橐稽留制書故有是命己卯右朝議大夫直祕閣于鵬為廣南東路安撫司參議官右奉議郎黨尚友為廣南西路安撫司參議官右朝奉郎孔戍為江南西路安撫司參議官左朝散郎孫革通判興化軍左宣教郎張節夫通判南劔州嶽飛之罷也鵬等十一人皆奉祠居行在及臺諌以劾疏遺飛鵬等聞之一夕散去事聞詔並添差江湖閩廣諸州趣令之任言者論湖南米斗百錢請令漕司廣行收糴時已令度支員外郎李椿年拘收嶽飛軍中錢物乃詔以上供經制錢收糴俟椿年拘到撥還詔路允迪家屬量移衡州居住以其家言允迪不受金人職事今被拘囚與孟庾事體不同故有是命庚辰故武功郎閣門宣贊舍人濠州兵馬鈐轄統領水戰人船邵青贈武顯大夫官其家二人以死事故也甲申上曰水旱有數雖堯湯不能免艱難以來十餘年間未嘗無嵗此天祐也然不可恃此不為之備祖宗置義倉以待水旱最為良法而州縣奉行不虔妄有支用寢失本意或遇水旱何以賑之可令監司視其實數或有侵失嚴責補還義倉充實則雖遇水旱或無飢病矣戊子殿中侍御史羅汝楫守起居郎癸巳上謂宰執曰監司郡守朝廷委任之意未嘗有異而近來妄分彼此莫相協和州郡或有闕乏監試不肯移那監試或有措置州郡不肯應副如此何以濟國事也川陜宣撫副使胡世將特起復世將方與諸將議出師進討而其母秦國太夫人康氏卒於晉陵上聞之詔軍旅事重不拘常制日下供職不許辭避翌日又詔世將弟彥博起復依舊添差提舉兩浙市舶官給葬事時金人統軍和珍希卜蘇合軍五萬餘屯劉家圈右護軍都統制吳璘川陜宣撫司都統制楊政樞密院都統制郭浩皆會於仙人原世將授璘以攻取之䇿璘乞精兵三萬人破此兩冦收復秦隴事若不捷誓以必死世將以二萬八千人與之仍命政出和尚原浩出啇州以為聲援璘閲兵河池以新戰陳之法每戰以長槍居前坐不得起次最強弓次強弓跪膝以俟次神臂弓約敵相搏至百步內則神臂先發七十步強弓併發次陳如之凡陳以拒馬為限鐵鈎相連俟其傷則更替之遇更替則以鼓為之節騎出兩翼以蔽於前陳成而騎兵退謂之疊陳諸將竊議曰軍其殱於此乎璘曰古之束伍令也軍法有之諸君不識爾得車戰餘意無過於此戰士心定則能持滿敵雖鋭不能當也房琯知車戰之利可用於平原曠野之間而不得車戰之法其敗固宜敵騎長於奔衝不爾無有能抗之者甲午上曰省刑罰薄稅斂王道之本國步方艱未能弭去斯民稅斂無術可以薄之朕心實不足至於刑罰豈可不省而獄繫淹延或至踰嵗何也可令提刑司覺察州縣提刑失職令御史臺彈奏務要訟平刑清以副朕意九月按是月丙申朔丁酉太常博士王普為尚書都官員外郎己亥秉義郎韋誼為武德郎閣門宣贊舍人誼淵少子也辛丑宿州觀察使知閣門事鄭藻以解帶恩升瀛海軍承宣使癸卯命軍器少監鮑琚往鄂州根括宣撫司錢物先是湖北轉運判官汪敘詹以書白奏檜言嶽飛頃於鄂渚置酒庫日售數百緡襄陽置通貨場利復不資自飛罷未有所付乞令副都統制張憲主之庶杜欺弊前二日詔都統制王貴與憲同掌上謂檜聞飛軍中有錢二千萬緡昨遣人問之飛對所有之數蓋十之九人言固不妄也今遣琚往縱不能盡若得其半亦不少矣又嵗計所入供軍之餘小約亦數百萬緡比之頭會箕斂不知幾多民力何以辦此檜曰軍興以來間有取於民者皆非得己今無橫賦而上朝夕軫念蓋務稍廣諸蓄以備緩急不待取於民而自足耳叔詹婺源人也熊克小厯時有上殿官鮑琚頗疏通上因命琚往軍前根括前物嵗入幾何諸路月樁以贍本軍有名無實而斂於民者幾何當議省之按琚紹興九年十二月除軍器監丞去年四月遷少監克謂之上殿官蓋不審也考之日厯琚是行専為根括嶽飛軍中現在錢物詳見十二年三月庚戌是日鄂州前軍副都統制王俊詣都統制王貴告副都統張憲謀據襄陽為變先是朝廷命諸將更朝行在憲懼不得還乃妄用金人侵犯上流冀朝廷還嶽飛復掌兵而已為之副會憲詣樞密行府白事俊具所謀告之以統制官傅選為證貴即日以聞張俊在行府聞之遂收憲屬吏俊東平人初為雄威率後從范瓊為右軍統制者是也王俊首狀全文見今年十二月癸巳注此不別出趙甡之遺史云張憲以軍前統制為提舉一行事務得嶽飛之子雲書遂欲劫諸軍為辭且日率諸軍徑赴行在乞嶽少保復統軍或曰不若渡江往京西朝廷必遣嶽少保來撫諭得嶽少保復統軍則無事語漸漏露百姓皆晝夜不安官司亦無所措置惟憂懼而已都統制王貴赴鎮江府詣樞密行府稟議方回到鄂州前軍副統制王俊以其事告之貴大驚諸統制入謁貴貴遂就執憲送於行府張俊令就行府取劾獄成送大理寺俊濟南人范瓊領兵在京東俊為劊子此所云差不同按俊首狀稱九月初一日張太尉起發赴樞密行府則憲此時固不在鄂州甡之小誤也王明清揮麈後録云榮茂世薿為湖北漕置司鄂州有都統司統制官王俊以其舊主帥嶽飛不軌狀詣茂世陳首茂世云我職掌漕計他無所預却之俊遂從總領汪叔詹陳其事汪即日上聞秦檜得之藉以興羅織之獄殺嶽飛父子知世茂不受理深怨之而髙宗於世茂有霸府之舊秦屢加害而不從秦死榮竟登從班汪訐嶽之後獄方竟而殂豈非命歟按叔詹此時與薿同為湖北漕或是新除總領林大聲未到而暫權也姑附此當考甲辰詔宗室緦麻親任環衛官身亡者賜錢三百千袒免減三之一白軍興財匱宗室近臣吉凶賜豫皆罷之及是皇叔祖右監門衛大將軍利州刺史仲䍃卒至無以斂判大宗正事齊安郡王士㒟請於朝故有是旨戊申泗州言奉使官工部侍郎莫將知閣門事韓恕歸至本州上諭大臣曰此殆上天悔禍敵有休兵之意爾朕料所以致此者有二今春烏珠提兵南來謂我可陵而淮西濠梁之敗有所懲創一也始謂將帥各自為家莫相統一今聞盡歸朝廷紀綱既立軍政必修望風畏懾二也朕每欲與講和非憚之也重念祖宗有天下二百年愛養生靈惟恐傷之而日尋干戈使南北之民肝腦塗地所願天心矜惻消弭用兵之禍耳秦檜曰每恨敵情難保未能仰副陛下憫亂之意先是將恕至涿州為金人所執至是都元帥越國王宗弼將與本朝議和故縱之歸報焉既而宗弼引兵犯泗州破之淮南大震右護軍都統制吳璘引兵至秦州城下川陜宣撫司都統制楊政夜引兵入隴州界徑趨吳山與金人對壘是日川陜宣撫副使胡世將始聞起復之命遂解官持喪惟軍事權行與決令簽廳行遣奏乞遣官交割宣撫司職事不許己酉祕書省著作佐郎鄧名世罷以言者論名世初本無官緣諂事劉大中遂力薦之於朝自入館以來蔑視同列竊議時政故也庚戌御史中丞何鑄言直祕閣潼川府路轉運副使喻汝礪輕鋭狂妄為門僧報怨興起大獄旁及無辜甚衆詔罷之先是廣安僧慧鑾淫穢不法汝礪治其罪士大夫多為之請不聽卒杖而黥之且劾守臣滕䄎於朝不報鑄又以為言汝礪遂罷汝礪為漕時本路當運米三十八萬石至利州舊例都漕司界以水腳錢四十八萬緡而不時與汝礪遺宣撫副使胡世將書言事有四難米價增長糴之難腳直空乏請之難舟子凋零雇之難江流乾淤運之難先是宣撫司取對糴米於四川至户而潼遂果合諸郡絶少稻田自軍興聽輸以粟至是都漕司責令輸粳其已津運者皆却還之汝礪力爭言其不便者五東川鹽舊行於劒外近歲階成鹽通入利路而客販始衰都漕司又置通貨場於興元府及閬州凡商人以鹽至二郡者皆拘入之必盡鬻於官乃償其直商人不能伺則每百斤令輸通貨錢三引或二引然後聽其他之貨日以壅汝礪為世將言四川一家潼利一民本路歲發折估錢五百五十萬緡以階成鹽稅及通貨所取言之算計見效恐未足以當本路鹽井折估之直著通而一之取其大而略其小可也又言鹽鹺𣙜酤之利此二物者今日四川之司命知所以張之而不知所以弛之知所以用其利而不知所以救其弊誅求不已無以為持久之策矣此並據汝礪文集修入詳著之以見四川財穀事宣司之從違當考閣門宣贊舍人知濠州王萃罷以樞密使張俊言萃並無措畫故也閣門宣贊舍人寇宏知濠州辛亥吳璘急攻秦州拔之守將武誼將官邵于成紀知縣荔諫等皆降吳璘復秦州日厯不載而熊克繫之去年九月實甚誤也以王曮所撰吳璘神道碑趙甡之遺史費士戣蜀口用兵録考之皆在此年克已於去年九月書之而今年八月末又書秦隴二州蓋重疊差誤耳徽猷閣待制提舉亳州明道宫歐陽懋卒於衢州癸丑詔歸朝官選人嘗以賞循轉者並十五考改京官事祖見紹興五年十一月甲寅以皇太后生辰預即官中啓建祝聖壽道場自是為例工部侍郎莫將等還至近郊上曰將等來敵意未可知但敇諸軍嚴為之備彼若議和何傷於好如懷姦詐初無失策昨張俊奏事嘗與議及此俊亦深曉云兵交使在其間和與戰自不相妨也是日建康府火燔公私室廬甚衆乙卯詔左武大夫忠州團練使劉光逺令赴行在奏事仰秀州守臣方滋不移時刻津遣須管來晚到行在時金國都元帥越王宗弼以書來金國書日厯不載紹興講和録有之今附於此或謂金書夸大不當具載臣謂此猶胸奴單于遺漢文漫書之比無足隱者當稍刪削而具存之以見一時議論之實紹興講和録金國都元帥上皇朝書皇統元年九月日皇叔尚書左丞相兼侍中都元帥領行臺尚書省致書云云去嵗使至逺沐書翰良仞勤意爾後衮衮頗疏嗣音即日動靜之間茂惟神介休祉爰念日者國家推不世之恩興滅繼絶全畀濁河之外使専撫治本期偃息兵民永圖康又豈謂畫討之始情不由衷其餘詳悉條日朝廷已嘗諄諭藍公佐輩厥後莫將之來輒申慢詞背我大施尋奉聖訓盡復賜土謂宜自省乃復搖蕩邊鄙致稽來便久之未發而比間至於分遣不逞之徒冒越河海剽攘郡邑考之載籍蓋亦未有執迷至於此者今兹降天威問罪江表已會諸道大軍水陸並進師行之期近在朝夕義當先事以告因遣莫將等四惟熟盧而善圖之餘冀以時善衛生理專奉書披逹不宣此書削去四十八字朝議遣光逺往聘而光逺方以贓罪為監司所按故趣召之翌日光逺王行在上面諭以前罪一切不問遂以為拱衛大夫利州觀察使而左武大夫吉州刺史曹勛亦遣拱衛大夫忠州防禦使令與光逺偕行丙辰右護軍都統制吳璘及金國統軍罕札戰於剡家灣敗之初罕札與希卜蘇合軍劉家圈罕札善戰希卜蘇善謀二人皆老於兵者狃其常勝且據險自固前臨峻嶺後控臘家城進退有守謂我軍必不敢輕犯璘揣知其情先一日召諸將問何以必勝統制官姚仲曰戰於原上則勝璘以為然諸將議不同璘曰諸將所以不同憚辭勞苦不欲攻原上耳若金人乘勢而下我兵敗矣卒如仲議璘既相視其地乃遣人告敵曰明日請戰敵聞之皆笑愈益不疑夜半璘遣仲與鄜延經略使兼知成州王彥率所部銜枚直進渡河陟峻嶺截坡上出其不意約與敵對柵然後發火又遣將張士亷等取間道以兵控臘家城戒曰敵根本在彼若敗必趨入城汝等截門勿縱一騎入二將所部軍行寂無人聲又天大陰霧既上嶺列柵乃發火敵大駭倉卒備戰我軍已畢列遊騎有聞敵帥以馬檛敲鐙者曰吾事敗矣我軍氣益振璘策希卜蘇有謀必謂我趣戰欲速不肯徑出罕札恃其百戰百勝與希卜蘇異議宜可挑取已而遣輕兵嘗敵果罕札勒兵已出與我軍合鏖擊數十更休迭戰敵及三陳戰急大將有請曰敵居髙臨下我戰地不利宜少就平曠以致其師宜可勝璘叱曰如此則我走敵遂勝矣敵已潰毋自怯璘輕裘駐馬陳前麾軍亟戰我師皆殊死鬬金人大敗遁去騎兵追襲斬首三千六百生擒七百人騎將楊萬膂力過人生擒一千户返璘曰萬可斬也戰方急豈可得一賊而遽返邪萬投千户於地倉遽復上馬入陳騎將馬廣者所部號八字軍察敵將潰越陳挑逐既而大靡俘馘人馬數千偽兵降者萬餘人璘悉釋之聽其自便敵殘兵果趨城走張士廉違節制後期二帥僅以身入城翌日第賞馬廣者獨不及反將誅之曰此違約束輕犯令者也罕札入城率餘兵拒守璘圍之熊克小厯載剡灣之捷於去年九月庚中蓋亦差一年也丁巳尚書左司員外郎李公懋直寶文閣為福建路提點刑獄公事從所請也戊午劉光逺曹勛辭於內殿遂命持金帥報書以行紹興講和録皇朝答書某啓季秋霜冷伏惟太保左丞相侍中都元帥領省國公台候起居萬福軍國任重仰勞經畫莫將等回特承惠書祇荷記存不勝感激某昨蒙上國皇帝推不世之恩日夜思念不知所以圖報故遣使奉表以修事大之禮至於奏稿干請乃是盡誠不敢有隱從與未從謹以聼命不謂上國遽起大兵直渡濁河逹踰淮浦下國恐懼莫知所措夫貪生畏死乃人之常情將士臨危致失常度雖加誅戮有不能禁也今聞興問罪之師先事以告仰見愛念至厚未忍棄絶下國君臣既畏且感専遣廣州觀察使武功縣開國子食邑五百户劉光逺成州團練使武功縣開國子曹勛往布情懇望太保左丞相侍中都元帥領首國公特為敷奏曲加寬宥許邉使人請命闕下生靈之幸下國之願非所敢望也惟祈留神加察幸甚向寒切冀保重有少禮物具於别封伏乞容納不宣左正議大夫尚書兵部侍郎趙彬卒贈左金紫光祿大夫己未右通直郎直祕閣何麒特賜同進士出身麒青城人常守蜀郡用薦者除職提點湖南刑獄未上復召對遂命為夔州路提點刑獄公事癸亥言者乞令有官人銓試並兼習兩場故事銓試有官人分五場曰經義曰詩賦曰時義曰斷案曰律義願試一場者聽議者謂試之以經義詩賦時義者欲使之通古今試之以刑統義斷案者欲使之明法令乞令二者各兼一場庶使人人明古今通法令而無一偏之失事下吏部乃命任子如所請十一月壬寅降旨右護軍都統制吳璘自臘家城班師初金統軍罕札在城中璘急攻之城且破朝廷以驛書命璘遂歸宣撫副使胡世將聞之歎曰何不降金字牌且來世將處耶世將以金人之俘三千人獻於行在命利路轉運判官郭遊卿就俘護中以聲音形貌驗得女真四百五十人同日斬於嘉陵江上斂其尸以為京觀餘皆涅其面於界上放還敵氣大沮罕札之受圍也追涇原經略使秦弼策應不至罕札歸遂罷弼是日武顯大夫西和州巡檢元成與金人戰死時宣撫司命成以所部牽制熙河敵兵行至鞏川朴麻與敵遇自度必死南向而哭曰長於行陳死於兵戎竟不得見吾君矣遂自剄而死乙丑宰執奏事秦檜曰山陽所以捍淮東東關扼淮西水路又厯陽六合皆近江形勢之地嚴備此數處然後江淮安上曰山陽東關已降處分更令張俊益修守備今莫將還雖遣報使然勿以議和為意但當作不講和處之耳詔將作軍器監如諸寺長二例舉本屬人充京官三員以上嵗舉二員六員以上舉三員用吏部請也是日商州管內安撫使邵隆及偽知虢州賈澤戰敗之復虢州建炎以來繫年要録卷一百四十一建炎以來繫年要録卷一百四十一金人地名考證烏珠原書作兀术誤改見卷一罕札原書作胡盞誤今改正希卜蘇原書作習不祝即金史之習不出並誤今改正
