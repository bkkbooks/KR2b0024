body:
  text: 建炎以來繫年要録卷一百二十三宋李心傳撰紹興八年十有一月癸未朔資政殿學士新知處州劉大中提舉臨安府洞霄宫大中既罷侍御史蕭振復言陛下既已斥逐大中而章疏留之三省臣恐去位之臣飾詞惑衆天下之人疑為中傷非所以公示好惡於天下乞報行論列大中章疏自今臣僚被論便應以所言之事議罰不得旋請宫祠假善去之名以蓋愆惡故有是命右諌議大夫李誼言陛下臨御於今一紀所用相凡十人執政三十三人然皆不久而去規模數易士知其不久則肆為同異而亡忌憚吏知其不久則専為茍簡以幸蔽欺陛下夙夜憂勤而治不加進殆必由此今左相虛位參政闕員乃擇賢之時望考以聖心參以公論儻選而得天下之才則責之専任之久可無數易之弊臣備位言責不敢復避形迹惟陛下察焉誼此疏不得其日以疏中有參政闕員之語故且附孫近除命之前俟考甲申左宣奉大夫尚書左僕射秦檜遷左光祿大夫以祿秩成書也翰林學士承旨孫近參知政事殿中侍御史張戒面對言臣昨奏疏十二事陛下雖甚嘉納朝廷未嘗施行示弱招侮理在必然王倫遽回金使遂有江南詔諭使及明威將軍之號不云國而且云江南是以我太祖待李氏晚年之禮也曽不得為孫權乎一則詔諭一則明威此二者何意金云詔諭臣不知所諭何事金若果欲和則當以議和之名而來何詔諭之有臣觀今日金使之來與前日大異禮不可屈事必難從臣為朝廷計上䇿莫若遜詞却之其次且勿令遽渡江先問其官名何意詔諭何事禮節事目議定得其實而後進退之則尚可少折又曰臣自乙邜歲論戰必敗去秋凡三年而後驗臣今又謂和必無成豈惟無成終必招侮亦願陛下姑記之戒又言臣逆料其事只有四川及江北地捨此復何詔諭之有又曰臣謂為國只當自勉不可僥幸偷安果得偷安猶可但恐屈辱已甚而偷安亦不得耳講和而是則可以息兵非則亦可以招侮疏入秦檜怒愈有逐戒之意矣乙酉中書舍人兼直學士院勾龍如淵言昔福建四川廣東西凡八路以其去朝廷之逺士艱於往來而以銓法付在漕司自車駕南幸而二廣福建則舉而歸之吏部矣惟四川漕司差注之法獨在是以蜀之人凡安貧守分無知己在朝廷者仕宦止於通判而奔競勢要之人今日改官眀日得倅又眀日得守望參酌祖宗之制凡四川守倅如何等闕合還堂選立為定格毋相侵紊詔吏部措置詔犯私鹽人除流配依本法外徒以下並令衆五日其後湖北提舉司言本路係省茶地分緣茶鹽事屬一體乞犯茶人依此指揮從之日歷無此今以紹興十三年十月十八日湖北提舉司所申修入徽猷閣待制江常以母憂免至是卒於泉州丙戌秦檜監修國史權尚書禮部侍郎兼侍講張九成罷初趙鼎之未去也九成謂鼎曰金失信數矣盟墨未乾以無名之師掩我不備今實厭兵而張虛聲以撼中國彼誠能從吾所言十事則與之和當使權在朝廷可也鼎既免秦檜謂九成曰且同檜成此事如何九成曰事宜所可九成胡為異議特不可輕易以茍安耳他日與吕本中同見檜檜曰大抵立朝須優遊委曲乃能有濟九成曰未有枉已而能正人檜為之變色九成從容言於帝曰敵情多詐議者不究異日之害而欲姑息以求安不可不察會檜聞九成在經筵講書因及西漢災異事大惡之九成入見面奏曰外議以臣為趙鼎之黨雖臣亦疑之上問其故九成曰臣每造鼎見其議論無滯不覺坐久則人言臣為鼎黨無足怪也既而九成再章求去上命以次對出守檜必欲廢置之奏除祕閣修撰提舉江州太平觀免謝辭詔建州鄉貢進士劉勉之令中書後省召試䇿一道勉之初以張致逺吕本中薦其學行召赴都堂乃有是命勉之引疾而歸勉之初見今年四月丁亥詔左武大夫榮州防禦使知閣門事藍公佐接伴大金人使過界俟接伴官右司員外郎范同等到日交割是日京東淮東宣撫處置使韓世忠復言恐金人詔諭之後遣使往來不絶其如禮物以至供饋賜豫蠧耗國用財計闕乏贍軍不給則經所謂不戰而屈人之兵望宣諭大臣委曲講議貴在得中以全國體詔諸路帥司各選委強明官一員將本路見禁一年已上公事専一催趣結勘仍逐旋具已勘結名件申省以大理寺言諸路多滯獄故也戊子司農少卿徐林直顯謨閣為荆湖南路轉運副使從所請也殿中侍御史張戒為司農少卿兵部員外郎吕用中上疏辨父好問受偽命之謗且言金人偽立邦昌好問隂募遣使臣李進冒重圍齎帛書往河北求今上所在若使事少敗露則必閣家盡遭屠戮與夫自經溝瀆身享美名子孫獲厚祿校量利害孰重孰輕乞録送史館從之己丑詔張戒為耳目之官附下罔上可與外任坐前奏疏乞留趙鼎也戒疏曰臣本貫河東絳州趙鼎本貫陕西解州鄉里相近士大夫通號曰西人臣被召除館職除郎官實自聖恩然人亦或云鼎進擬是非臣不得而知也今趙鼎求去議者皆以為未可臣欲言則形迹如此欲不言則大臣進退國家安危所係陛下他日必悔之臣初不知鼎負陛下者何事鼎與同列忿爭者何語鼎不敢自安者何意臣竊料陛下與鼎君臣之間嫌疑已久同列之際猜間已深鼎不自安已非一日假使勉強少留終非可否相濟聖意已決臣不復言但鼎去之後秦檜先悔而陛下後悔理在不疑此為可慮爾鼎去之後陛下必不獨任能忍事如鼎者絶少爭權者多後來者不三數月即與檜爭必矣此所謂秦檜先悔也陛下即位十二年而命相凡九人前後拜罷以三十數已試未試人材可知使後來者皆大過人雖去鼎可也若但斥逐異已而遷除附已者徒為紛紛則與鼎何異萬一緩急之際又將復用之使鼎何顔復見士大夫哉此所謂陛下後悔也臣今為陛下計有三其上可留之鼎若有負於陛下者面誡敕之鼎若與同列不協則面責以先國家後私讐之義其次必不可則姑留之行在祖宗故事宰執罷政多留京師非特示恩禮亦以備顧問近時前宰執遂無復敢留行在乃薄俗可歎非祖宗意也未罷相則如五日一到朝堂之類罷相則置之講筵少俟期月之間朝政修明邉事寧謐然後聼其逺去亦未為晚進退之間猶為有禮不然去歲召之如彼其急今日去之如此其遽時有緩急事有大小臣恐天下不無竊議鼎尚不敢自保餘人何足道哉臣之區區所慮者國家之安危所惜者陛下之舉措陛下若以為公論則願聖心更加審處若以為迹涉朋附則罪何所逃亦惟陛下察之而已臣今為言事官進退皆出宸𠂻非鼎所敢與鼎若去位則臣事陛下無復嫌疑迹愈安矣在臣計則幸鼎之去為便在陛下計則衆論以為未便也常同初除中丞以臣姓名薦於陛下鼎聞之縮頸吐舌搖手人傳以為笑蓋鼎畏臣如此後旬日乃以戒知泉州朱勝非秀水間居録云趙鼎復相植黨亦急凡凶險刻薄之士無不收用使造虛譽而排善類張戒其一也趙薦常同為中司同即以鼎所喜奏為臺屬戒知其決去即露章請留以邀後福其言狂躁愚弄鼎既罷猶知泉州蓋由其黨與維持之力也紹興正論云戒以入文字論秦檜十事救胡銓等罷論秦檜十事他書不見胡銓事則不在此時正論蓋誤初少師劉光世罷軍政上命賜第一區至是中書舍人勾龍如淵駁之上曰今營繕實難但光世罷兵柄奉朝請若恩禮稍加於舊則諸將知後福之有終皆效力矣卒賜第庚寅尚書戶部員外郎霍蠡守司農少卿樞密院編修官陳康伯為屯田員外郎諸王宫大小學教授趙雍充樞密院編修官是日上謂大臣曰王倫使回金人頗有善意朕即位十年以敵禍未平兵革饋餉重困民力曽無惠澤及於天下若上天悔禍敵肯革心休兵之後一切從節省雖常賦亦蠲減以寬百姓樞密副使王庶言日者王倫再以和議出使臣嘗以為倫必不返議決不成今倫既報歸是臣愚暗不逹事理幾敗陛下之事陛下雖以臣為可赦臣亦何顔以見陛下伏望聖慈以晉武帝并賞張華賈充唐憲宗相裴度罷李逄吉得失為鑒許臣自免退服田畝不許庶又言自昔禦敵雖時有不同大略唯和與戰一言而已今天下遭金人荼毒虔劉者十過八九天子駐蹕南北屯兵阻險自固不敢渡淮以窺長安其衰弱可謂極矣陛下過自貶損屈辱稱臣遣使進幣項背相望或拘或囚嫚書惡聲無所不至其困辱可謂至矣兵家至論不過曰知已知彼今彼如是之強我如是之弱雖三尺之童皆知之王倫之來反謂和好已成盡還侵地驗於古則不合審於今則無謂察其情則包藏不細觀其勢則蹤迹可見獨陛下斷以不疑而行之此殆天意未欲悔禍致使陛下篤於孝思弗虞此姦謀也臣試更為陛下陳之議和之説正緣彼外訌內叛上下携二假我使命以安反側以幸寧息逺不出一二載近或期月必别生事此固不論且以目前所損言之使人疲於奔命財賦竭於資送將士軍卒挫其勇鋭民庶困於將迎歲月廢於無益事勢至此非特敵人一旦敗盟無以支持又恐諸將師老財匱有弗戢之災禍可既乎此臣所以仰天椎心而泣血也臣前所謂朝廷自作不靖者正謂此爾且敵人雖無知豈不戒吳越之事乎寧肯付我土地與我兵馬使復不戴天之讐耶臣不敢飾非以質前説若復關陕則臣歸骨有地宗族有相見之期松楸有展省之日豈臣所不欲哉第萬萬無此上誤聖明下誤生靈宴安鴆毒必至噬臍矣昔楚懷王惑於張儀之口卒為秦所拘使其子孫銜涕忍耻以事仇讎之國終至覆亡今王倫語言反覆蹤迹詭祕終恐養成厲階滋蔓難圖悔何可及願陛下深念前事勉思今圖不逺而復尚可救藥茍或不然其患豈可深言耶辛邜京東淮東宣撫處置使韓世忠言臣得泗州申詔諭使先遣到銀牌郎君言須要接伴跪膝階墀州縣官拜詔若不如此定復回接伴不肯本州取接伴官歸州臣切詳金人自要講和本非實情今使人方欲過界便要接伴跪膝階墀州縣拜詔如此即是使人經過一道郡縣聽伏命令與臣前奏事理頗相符合兼既立此題目意在難從收拾釁端故要生事敢爾恣橫決有重兵在後専意脅持若到行朝必要陛下卑屈禮數更重萬一俯從外則四方解體內則恐失人心定須别有難從須索如何應付事體至大伏望以國體為重深加計慮熟賜講究貴在詳審免貽後患召端明殿學士知常州韓肖胄赴行在將遣報聘也壬辰召檢校少傅慶逺軍節度使提舉江州太平觀郭仲荀赴行在將使守河南也是日京東淮東宣撫處置使韓世忠言臣今續體探得銀牌郎君言到臨安府日要陛下易衣拜偽詔及詔諭使要賔客相見如劉豫相待禮數及稱今來詔諭所行禮數並是大金闕下定到臣切詳上件事理使人非久到行朝未審陛下何以應之想已宣付大臣預行講究非臣所知臣自聞此事曉夕實不遑安以臣愚見萬一陛下輕賜俯從即是金人以詔諭為名暗致陛下拜順之義此若果有實心欲修和好必須禮意相順闊略細故各存大體今使人所來行徑皆是難從之事灼見姦謀欲生釁端臣雖聞欲還陛下關陕諸路誠見詭詐且如實欲交割若却要山東河北等路軍民歸業豈可遣發此聲一出人心搖動復難安固今雖國勢稍弱然兵民事力尚可枝梧况諸軍將士訓習之久覩此窘辱少加激勵豈無鬬心若隨從稍有失當舉國士大夫盡為陪臣深慮人心離散士氣凋沮日後臨敵如何賈勇若四方傳聞陛下以有拜順之禮其軍民定須思鄉自然散去散易聚難悔將何及今若待其重兵逼脅束手聽命坐受屈辱不若乘此事力申嚴將士為必戰之計以伐其謀免貽後患臣邉逺庸材荷國厚恩無以補報今正當主辱臣死之時臣願效死節激昻士卒率先迎敵期於必戰以決成敗臣若不克事勢難立至是陛下委曲聽從事亦未晚竊詳金人欲要陛下如劉豫相待禮數且劉豫係金人偽立而陛下聖子神孫應天順人繼登大寶豈可相同顯見故為無禮全失去就玷辱陛下伏望特回聖念時上親劄付世忠令差人防護北使往回不得少有踈虞仍嚴戒將佐及所差人不得分毫生事癸巳世忠復言傳聞金人欲還陛下陕西五路未必實情設若果肯交割萬一却要山東河北等路軍民歸業陛下如何遣發縱未如此且先要歸朝及北來投附之人其數已衆散布中外諒陛下亦難依從大槩金人姦謀凡所施設巧偽甘言以相啜賺盡欲陛下先失天下人心繼為大舉臣曉夜痛心疾首惟恐陛下輕易許從自速後患疏入上優詔答之徽猷閣待制知臨安府張澄言臨安古都會引江為河支流於城之內外交錯而相通舟楫往來為利甚博歲久堙塞民頗病之頃由陛對嘗冒天聽乞因農隙略加濬治議者恐其勞民也至於今未克行之今駐蹕之地公私所載資於舟船者百倍前日所計特最關利害者兩河爾非盡開城中之河也臣再行講究更不調夫興工乞刷那兩浙諸州壯民及廂兵共千人赴本府量度緊慢開濬以工程計之半年之外河流無壅塞矣從之初新知筠州葉擬請福建鹽半給小鈔與官賣兼行庶幾課息增羡事下提刑提舉司委通判福州趙夀相度夀言初行鈔法時官鹽本每斤六錢客人鈔錢三十二錢有半今薪米益貴鹽本錢斤為十有七比舊至三倍而建汀南劒州邵武軍遣衙前運鹽貨賣每斤百錢自水腳縻費之餘所贏無幾若以其半行小鈔則每斤又增上供九錢通舊為六十如此則民間食貴鹽而州縣失省計不可行至是兩司以聞詔從夀議甲午京東淮東宣撫處置使韓世忠言切詳金人與本朝結怨至深又金人事力熾盛敵情窺伺已踰十年朝夕謀畫意在吞并今遣使講和及傳聞許還關陕諸路謂是懼我兵威謂復是曽遭毒殺事不得已故來講和臣深思熟慮但恐以交割諸路為名先要山東河北等路軍民或先要應北來歸朝投附女真契丹渤海漢兒簽軍等出此聲勢搖動人心或假此講和割地或以兵勢逼脅有無厭難從須索蠧耗國用使陛下先失天下人心坐致困弊方為大舉今國家避地東南目前軍勢敵尚隄防雖謀吞并未敢輕易深入故用此謀詐許交還陕西意望移兵就據分我兵勢其敵必别有謀畫志在一舉決要傾危絶彼後患况陕西諸路出兵産馬用武根本之地豈肯真實交割資助我用顯是巧賜甘言以相誑賺切恐使人暗贏陛下禮數輕賜許諾傳播四方人心離散士氣凋沮事繫安危在此一決委非細事望許臣輕騎星夜暫赴行朝面稟聖訓以盡曲折丙申徽猷閣直學士提舉醴泉觀王倫至行在倫引疾乞在外宫觀不許仍令日下赴內殿奏事起居郎兼資善堂贊讀蘇符為中書舍人免召試升翊善將俾副王倫也戊戌監察御史鄭剛中遷殿中侍御史召直祕閣新知筠州髙公繪赴行在將使介聘也是日太常卿兼崇政殿説書尹焞稱疾在告遂卧家不出己亥王倫充國信計議使蘇符充副使並日下出門符稱疾不受給事中兼侍講張致逺充顯謨閣待制知廣州從所請也寶文閣學士知廣州連南夫依所乞提舉江州太平觀庚子參知政事孫近兼權同知樞密院事以樞密副使王庶纍章求去故也庶之奏曰臣切詳王倫之歸以為和好可成故地可復皇族可歸上自一人下逮百執事皆有喜色獨臣愚暗不逹事機早夜以思揣本齊末未見其可臣復有強聒之請别無他腸止知愛君和之與否臣不復論且以目今金人利害言之講和為上遣使次之用兵為下何以言之金人自破大遼及長驅中原幾三十年矣所得土地數倍漢唐所得珠玉子女莫知紀極地廣而無法以經理財豐而恃勢以相圖又老師宿將死亡殆盡主幼權分有患失之慮此所以講和為上也金人滅大遼蕩中原信使往來曽無虛日得志兩國専用此道矧自廢豫之後蹤迹敗露杌􅑾不安故重報使人以安反側兼可以察我之虛實耗我之資糧離我之心腹怠我之兵勢彼何憚而不為此所以遣使為次也金人之兵內有牽制外多疑忌所用之人非若昔日之勇鋭所簽之軍非若昔日之強悍前出後空有覆巢之虞率衆深入不無倒戈之慮又淮上荒虛地無所掠大江浩渺未易可渡諸將兵勢不同曩時所以用兵為下也今彼所行皆上䇿至為得計吾方信之不疑墮其術中惟恐不如所欲臣不敢效子胥出不祥之言殺身以立後世之名於國何補唯陛下深思之速斷之無使後之視今猶今之視昔天下幸甚臣蒙陛下過聽擢置樞庭言雖忠而不適於時慮雖深而不明乎變愚魯自信滯固不移臣亦自厭其遲鈍况他人乎兼自今冬以來疾疹交作精神昏耗腳膝重膇若猶貪冒寵榮不知退避罪戾之來所不可逭陛下雖欲保全有所不能伏望矜臣衰憊保臣始終俾解職事除臣一在外宮觀差遣以便醫藥上乃許之左朝奉即張廣為祕書省著作佐郎廣德興人知廣德軍以薦者得召見論當今之法其未便者有二皆前日言利之臣不究本末急近效而昧逺圖所謂營田贍軍酒庫是也今營田悉籍於官還定之民執空契坐視故土而不得復戶部轉運司暗失賦稅號為逃閣者不知每歲幾何其視營田誰得誰失此營田之未便者也諸州承認大軍月樁之費常若不繼朝廷置贍軍酒庫本以佐之今但許取撥一分而已積日既久利源侵奪此贍軍酒庫之未便者也若謂未可遽罷則莫若許歸業之民漸認故土而取𣙜酤所入之贏盡以佐諸州月樁之數則得矣事下戶工部後不行廣疏以是月甲申行下江南西路轉運副使逄汝霖直祕閣以宣諭官李寀言其勞績也辛丑詔大金遣使至境朕以梓宫未還母后在逺陵寢宫闕久稽泛掃兄弟宗族未得聚會南北軍民十餘年間不得休息欲屈已求和在庭侍從臺諫之臣其詳思所宜條奏來上限一日進入先是禮部侍郎兼侍讀曽開上疏言女真和議稽諸前古為可憂考之今事為難信而朝廷不思有以伐其謀方且忘大辱甘臣服貶稱號捐金帛以難得之時為無益之事可不為痛哭流涕哉夫敵人叵測不可保也自用兵以來信使方至兵輒隨之皆已然甚明之驗不待考諸古而可知况今敵人之在京師者方建鎮南之號增屯戍之守閲戰艦備糗糧簡雙丁無非為南下之計而我乃日夕冀望和議之成豈不惑哉恭惟陛下仁孝誠至哀慕深切則迎奉梓宫之使不得不遣今既再往矣梓宫之來杳然無期而託以和議虛費時月使彼果有休兵息民之意則梓宫自當即還和議一言可決何必紛紛為他説乎竊聞敵使方責我以招降之事是求瑕釁耳非講和也本以迎梓宫而遣使今乃反致釁隙豈非自取哉伏望陛下以越為心以楚為戒無忘大耻無惑和議堅心定志一於自治使政事修於內兵將強於外則將不求而自和矣臣竊謂敵使之來所係甚大內外臣寮章疏劄子論及此事者願陛下悉以降付三省樞密院使輔弼大臣集侍從官預加熟議使應酬之間不至失誤庶無後悔兵部侍郎兼權吏部尚書張燾亦請詢可否於衆檜乃白上下此詔焉胡銓封事稱秦檜建白令侍從臺諌參議可否恐即此詔耶寶文閣直學士知台州梁汝嘉試尚書戶部侍郎中書舍人樓照試給事中太常少卿兼崇政殿説書尹焞權禮部侍郎兼侍講焞固辭不拜宗正少卿張詢為太常少卿日歷無此本寺題名在十一月故因尹焞改除遂書之當求本日京東淮東宣撫處置使韓世忠言臣伏讀宸翰鄰邦許和臣愚思之若王倫藍公佐所議講和割地休兵息民事迹有實别無符合外國誰賺本朝之意二人之功雖國家以王爵處之末為過當欲望聖慈各令逐人先次供具委無反覆文狀於朝以為後證如臣前後纍具已見冒犯天威日後事成虛文亦乞將臣重置典憲以為狂妄之戒先是世忠數上疏論不當議和上賜以手劄曰朕勉從人欲嗣有大器而梓宫未還母后在逺陵寢宫禁尚爾隔絶兄弟宗族未遂會聚十餘年間兵民不得休息早夜念之何以為心所宜屈已議和以圖所欲賴卿同心其克有濟卿其保護來使無致踈虞世忠既受詔乃復上此奏詞意剴切由是秦檜惡之壬寅兵部侍郎兼權吏部尚書張燾言臣竊惟敵使之來欲議和好將歸我梓宫歸我淵聖歸我母后歸我宗族歸我土地人民其意甚美其言甚甘廟堂以為信然而羣臣未敢以為信然國人未敢以為信然竊考其説蓋以謂彼非畏我兵甲之盛也非憚我土地形勢之強也而遽有此議深謀密計未易測也論者謂中原之地彼自知決不能有也故有此議又謂彼因廢豫人心遂疑懼我乘間恢復土地故有此議又謂契丹林牙漸有興復之勢彼既與我為深讐非施大恩於我無以結無窮之援也故有此議又謂彼國上下厭兵為日久矣姑務休息故有此議又謂敵帥屢死新帥之立懼不敢當推避再四與國人約必盡歸我父母宗族國人許之然後敢立故有此議凡是數者言皆有理使敵計果出於此可謂善自為謀矣陛下所以必信無疑遂欲屈而聼之也然兹事體大振古所無豈敵能為實關天意臣請一為陛下推原之傳曰天將興之誰能廢之臣請考人事以驗天意陛下飛龍濟州天所命也敵騎屢侵行闕卒以無虞天所保也嵗在甲寅一戰而敗敵師天所贊也歲在丙辰再戰而却劉豫亦天所贊也歲在丁巳酈瓊雖叛乃為偽齊廢滅之資亦天所贊也是蓋陛下躬履艱難側身修行布德立政上當天意而天祐之之所致也臣以是知上天悔禍蓋有日矣中興之期亦不逺矣伏願陛下姑少忍之益務自修益務自治益務自強以享天心以聽天命以俟天時時之既至吉無不利何戰不勝何攻不克何為不成何功不立梓宫何患乎不還淵聖何患乎不返母后何患乎不歸宗族何患乎不復宗廟陵寢何患乎不能繕修南北之民何患乎不能混一今此和議姑為聽之而無必信可也彼使既已及境勢難固拒使其果有願和之意如前所陳如我所欲是必天誘其衷使之悔罪必不復強我以難行之禮而在我者將以已行之禮待之則事亦何患乎不成如其初無此心二三其説責我以必不可行之禮而要我以必不可從之事其包藏何所不有安知非上天堅我復讐之志乎便當責以大義杜絶其來修政事謹邉防厲將士俟天休命起而應之此臣區區之愚見也其他利害羣臣類能言之臣不復陳伏願陛下斷自淵𠂻毋取必於敵而取必於天而已若乃略國家之大耻置宗社之深讐躬率臣民屈膝外國北面而臣事之以是而覬和議之必成非臣所敢知也上覽奏愀然變色曰卿言可謂盡忠然朕必不至為敵人所紿方且熟議必非詐偽然後可從如其不然當再遣使審問虛實而拘留其使人燾頓首謝吏部侍郎晏敦復言自古外國為中國患世皆有之然未有若今日之甚者自古外國與中國通和亦世皆有之然未有非中國強盛力足以制之而自肯與中國和好者也大金兩次遣使直許講和非畏我而然也又且幣重而言甘烏知非誘我耶此不可不疑也陛下以梓宫未還母后在逺陵寢宫闕久稽灑掃兄弟宗族未得會聚南北軍民不得休息意欲屈已就和此誠聖人之用心也然所謂屈己者當思有益於則小屈可為也儻於大事非徒無益又且因而别致禍患則可不深思熟慮之乎一事既屈則又以他事來屈我矣小事既屈則必有大事來屈我矣且以目前可見者言之今所遣使以詔諭為名儻欲陛下易服而拜受還可從乎又欲與陛下分庭而抗禮還可從乎設或如此等事從其一二則與彼上下之分已大定矣自此之後可以號令我矣彼或又行詔令授陛下一兩鎮節鉞封陛下一王號還可從乎又或下令將本朝大臣諸將盡行封拜還可從乎又或下令用彼年號正朔還可從乎又或下令盡遣西北人歸鄉里還可從乎姑略舉此數事則過此以往可推而知之儻謂今日許和出彼誠意或别有道理今日小屈之後更無他事可慮則臣所不能知萬一有如臣所言則自今以往一事有不順從者彼便可以違命之罪加我矣尚何梓宫可保必得乎皇族可保必歸乎地界可保必守乎如此則休息之期當益逺矣且我之所急者梓宫也宗族也而敵獨先以地界來議則事之可疑者亦多矣何則以河為界敵亦謂我未必能守一也使我捨江淮之險而趨平地二也西北之人懷土者皆使散走三也如此梓宫宗族牽制我矣小有違異即釁端也審如是則社稷之存亡在敵掌握爾陛下必欲屈己就和願陛下周思而熟慮之謹擇而善處之若已屈之後必不致有如臣前所陳之禍患陛下小屈以就大事可也臣又竊料専以和議為是者必謂和議既成則兵可不用而得休息是大不然臣竊謂和議與用兵二者不可偏廢若和議既成之後敵之詔令必有不可從者不免違異而敵以逆命來則兵可不用乎然則屈己之事誠不可不審而後行也使敵知我不憚用兵則和或有可議之理然則屈己之事似未輕易許也願陛下加聖心焉權吏部侍郎魏矼言臣素不熟敵情不知使人所須者何禮陛下所謂屈己者何事聞諸道路之言謂金人頃立偽齊使之屈膝受令北面之禮靡所不至歲時之貢靡所不取今需於我未必盡然以事料之其間必有不可從者如屈膝受令則大不可從者也賊豫本匹夫爾既為金人所立恩莫大焉北面拜舞禮亦冝之陛下承一祖七宗基業海內愛戴一紀於兹天命有歸何藉於金國乎傳聞奉使之歸謂金人悉從我所欲不復有所須其誠然耶必無難行之禮以重困我陛下何用過為卑辱以取輕侮乎如或為不可從之事先有所要則其詭詐之情固可見矣儻或輕從之屈膝受令他時反為所制號令廢置將出其手一有不從便生兵隙豫奪在彼失信在我非計之得也雖使還我空地如之何而可保雖欲寢兵如之何而可寢雖欲息民如之何而可息楚人衷甲吐蕃劫盟前史載之詳矣庸可不慮乎且禮經復讐之義臣未暇論也姑以人主之孝論之孔子稱明王之以孝治天下則曰天下和平災害不生禍亂不作故以一人有慶兆民賴之為天子之孝方今宗廟社稷惟陛下是依天下生靈惟陛下是賴陛下既欲為親少屈更願審思宗社安危之機與夫天下治亂之所繫考之古誼酌之羣情擇其經久可行者行之其不可從者以國人之意拒之庶幾軍民之心不至懷憤且無噬臍之悔也宗社安而國家可保此非天子之孝乎紹興三年敵使遽至朝廷數遣官報聘眀年使人方且交馳而敵騎侵淮甸矣天啓陛下之心六師鱗次江上力為戰守之具其冬魏良臣等以使事回敵人約再遣使為恐迫之語陛下悟其姦計不復再遣敵遂引去陛下因敵使之來博詢在廷抑聞孟子有云左右皆曰不可勿聽諸大夫皆曰不可勿聽國人皆曰不可然後察之見不可焉然後去之如此然後可以為民父母所謂國人者不過萬民三軍爾搢紳與萬民一體大將與三軍一體今陛下詢於搢紳民情大可見矣惟三軍之心未知所向和議國之大事豈可不訪之兵將乎欲望聖慈速召大將各帶所部近上統制官數人同來以屈己事目廣加訪問以塞他日意外之憂彼或以為不可亦能鼓作其氣益堅守禦之備時諸將韓世忠嶽飛皆以議和為非計故矼有是言既而矼以憂去癸卯祕書少監劉一止試起居郎徽猷閣直學士右朝議大夫知平江府向子諲轉一官致仕時金人所遣詔諭使將入境子諲不肯拜敵詔乃上章乞致仕秦檜許之此以徐夢莘北盟會編修入十一月初十日韓世忠劄子今續體探得銀牌郎君立候詔諭過界接伴於界首望北拜奏聖躬萬福再五拜訖只在位立候詔諭使馬過然後上馬隨後行至館中詔諭使面南列坐畢令接伴使于階下展狀躬身稱喏了上廳跪勸詔諭使酒及所過州縣官吏迎詔拜詔送詔如詔諭使入境一州不依前約禮數即打一州其館伴依接伴禮數按此時金使未入境但子諲聞其説耳夢莘稱張通古入境子諲不拜而請致仕蓋小誤今修潤書之甲辰樞密副使王庶充資政殿學士知潭州庶論金不可和於道上疏者七見帝言者六秦檜方挾金自重以為功絀其説庶語檜曰公不思東都抗節存趙時而忘此敵耶檜大恨庶又抗章求去乃有是命是日檜進呈上因言近日士大夫好作不靖胥動浮言以無為有風俗如此罪在朕躬卿等大臣亦與有罪蓋在上者未有以表率之故也檜曰風俗如此臣等實任其責孫近曰陛下聖德躬行多士狃於習俗未能鄉化時疆事稍定當須明政刑以示勸懲庶幾丕變中興聖政臣留正等曰事有係乎天下國家之舉者利害參而未明取舍同而未審几議論所到亦何怪於紛紛乎善斷者本理以論成事則紛紛者將自定矣此盤庚所以教民也紹興初大臣主和議而衆志之未孚甚於盤庚之遷也浮言動衆上之所患風勵表率所責於大臣者何事而大臣乃欲明政刑以示勸懲果何心哉自是士大夫曽駁和議不合風旨者皆以怨訐抵刑譴其丕變之言將為必酬平日之言以示威也豈不深負太上皇帝責望之意哉大臣誤國甚矣中書舍人兼侍講兼學士院勾龍如淵試御史中丞時秦檜方主議和力贊屈己之説以為此事當斷自宸𠂻不必謀之在廷上將從其請而外論羣起計雖定而未敢畢行如淵言於檜曰相公為天下大計而羣説橫起何不擇人為臺官使盡擊去則相公之事遂矣檜大悟遂擢如淵中司人皆駭愕此並據晏敦復墓志修入給事中樓照兼直學士院日歷無此今以本院題名修入侍御史蕭振權尚書工部侍郎振乞留王庶故有是命兵部侍郎兼權吏部尚書張燾兼史館修撰尚書吏部員外郎王次翁試祕書少監左朝奉大夫魏良臣行尚書吏部員外郎朱勝非秀水間居録云逹蘭統兵犯淮甸朝廷遣魏良臣奉使數問秦檜仍稱其賢乃知檜初相時所陳二䇿出於金意也逮其再相力薦良臣入為都司繼除從官欲弭其言耳國子監丞王利用為祕書郎乙巳端明殿學士韓肖胄提舉萬夀觀肖胄自常州入對遂有是命丙午王庶入辭命坐賜茶庶奏臣異議罔功必致人言乞改除宫觀上不許復溫言諭遣之遂召徽猷閣直學士知潭州仇悆赴行在丁未左朝奉大夫主管台州崇道觀王縉復直祕閣知常州龍圖閣直學士提舉江州太平觀汪藻上所編集元符庚辰至宣和乙巳詔旨終篇凡六百六十有五卷拜藻顯謨閣學士其屬官右朝散郎鮑延祖左宣義郎孟處義各又進一官是日樞密院編修官胡銓上疏曰臣謹按王倫本一狎邪小人市井無賴頃緣宰相無識遂舉以使敵専務詐誕欺罔天聽驟得美官天下之人切齒唾罵今者無故誘致敵使以詔諭江南為名是欲臣妾我也是欲劉豫我也劉豫臣事金國南面稱王自以為子孫帝王萬世不拔之業一旦金人改慮捽而縛之父子為虜殷鑒不逺而倫又欲陛下效之夫天下者祖宗之天下也陛下所居之位祖宗之位也奈何以祖宗之天下為金人之天下以祖宗之位為金國藩臣之位陛下一屈膝則祖宗廟社之靈盡被汚辱祖宗數百年之赤子盡為敵有朝廷宰執盡為陪臣天下士大夫皆當屈體事人變亂倒置異時無厭之求安知不加我以無禮如劉豫也哉夫三尺童子至無知也指仇敵而使之拜則怫然怒今堂堂大朝相率而拜仇敵曽無童稚之羞而陛下忍為之邪倫之議乃曰我一屈膝則梓宫可還太后可復淵聖可歸中原可得嗚呼自變故以來主和議者誰不以此説啖陛下哉然而卒無一驗則敵之情偽已可知矣陛下尚不覺悟竭民膏血而不恤忘國大讐而不報含垢忍耻舉天下而臣之甘心焉就令敵決可和盡如倫議天下後世謂陛下何如主也况敵人變詐百出而倫又以姦邪濟之則梓宫決不可還太后決不可復淵聖決不可歸中原決不可得而此膝一屈不可復伸國勢陵夷不可復振可為痛哭流涕長太息者矣向者陛下間關海道危如纍卵當時尚不忍北面臣敵况今國勢稍張諸將盡鋭士卒思奮只如頃者敵勢陸梁偽豫入寇固嘗敗之於襄陽敗之於淮上敗之於渦口敗之於淮隂較之前日蹈海之危已萬萬矣儻不得已而至於用兵則我豈遽出敵人下哉今無故而反臣之欲屈萬乘之尊下穹廬之拜三軍之士不戰而氣已索此魯仲連所以義不帝秦非惜夫帝秦之虛名惜夫天下大勢有所不可也今內而百官外而軍民萬口一談皆欲食倫之肉謗議洶洶陛下不聞正恐一旦變作禍且不測臣竊謂不斬王倫國之存亡未可知也雖然倫不足道也秦檜以心腹大臣而亦然陛下有堯舜之資檜不能致陛下如唐虞而欲導陛下為石晉近者禮部侍郎曽開等引古誼以折之檜乃厲聲責下侍郎知故事我獨不知則檜之遂非狠愎已自可見而乃建白令臺諌侍臣簽議可否是蓋畏天下議已而令臺諫侍臣共分謗耳有識之士皆以為朝廷無人豈不惜哉夫石晉之事契丹也桑維翰主之其初意亦以契丹強大可藉其力以保其割據之地而卒無救於敗亡况我朝為天下共主與敵有君父之仇而敵之詭譎甚於契丹如之何可行耶孫近傅會檜議遂得參知政事天下望治有如飢渴而近伴食中書漫不敢可否一事檜曰敵可講和近亦曰可和檜曰天子當拜近亦曰當拜臣嘗至政事堂三發問而近不答但曰已令臺諌侍從議之矣嗚呼參贊大政徒取充位如此有如敵騎長驅尚能折衝禦侮邪臣竊謂秦檜孫近亦可斬也臣備員樞屬義不與檜等共戴天區區之心願斷三人頭竿之藁街然後羇留敵使責以無禮徐興問罪之師則三軍之士不戰而氣自倍不然臣有赴東海而死寧能處小朝廷求活耶書奏市井喧騰數日不定秦檜上表待罪有詔檜無罪可待乃復治事銓遂罷戊申接伴使范同奏金使遣人議過界上曰若使百姓免於兵革之苦得安其生朕亦何愛一已之屈時上下洶洶上手劄付同塗中稍生事當議編置勾龍如淵退朝録云時金國遣二使携書來書中蓋以河南之地盡歸於我者唯是使人入界索禮過當號其書曰詔書指吾國曰江南見吾伴使必欲居堂中而坐使人於一隅所歷州縣必欲使官吏具禮迎其書如吾中國迎天子詔書之禮且言敵書到行在必欲上再拜親受之上下洶洶不知所為上親劄付館伴范同途中稍生事當議編置既而敵使蕭哲與其右司侍郎張通古入境同北向再拜問金主起居軍民見者往往流涕此據張燾率從官所上疏修入疏云此故事也則李永夀烏凌阿思謀之來蓋嘗行此禮矣當時外議皆謂蕭哲張通古入境范同再拜為央體俟再考禮部侍郎兼侍讀曽開言臣訪聞敵使在路語接伴范同云本國主相及軍前並無遣使之意江南令王倫來喚我倫百拜懇告不得已而來不知有何事商量又以排辦頓次行有里數數怒濡滯出語不遜范同具因依申朝廷不知既聞此語嘗有以答之乎又聞隨行三節人從在路恣其出入並無檢察有下節女真常先半程肆意而行將至之日夜半押馬過臨平逮曉已至江漲下節一名酈瓊將官旁觀者多識之此皆朝廷所當譏察不可忽者也陛下初遣使本為奉迎梓宫而王倫之還創生和議疑其不可信故諭倫云若金國果有欲和之意當自遣使來商議倫執陛下聖意遂至哀告求請敵使得以藉口謂本無來意因倫拜告而來陛下觀此意豈非盛氣而陵我乎臣竊聞王倫前此回日所得敵書已有早遣使人以圖休息之辭則今敵使豈可謂我呼之而來自當諭館伴官以此語折之也敵帥拒我禮物而不受書意責我以招降而使者自入我境已有傲慢侵陵之語就館之後言語禮貌必無遜順願陛下堅前日之説察其情偽勿輕見之或止令執政與之商議最為得體所有敵使隨行三節人從乞嚴行約束勿放出館夫朝廷之事固有當密如行軍用間已成之謀一或漏泄為害非輕今日之事特未定也正當大詢於國兼衆智而用之豈可但慿一市井駔儈之説而大臣不肯身任侍從不容與聞者乎臣願陛下以輔臣留身所論使事明賜宣諭以臣僚所論使事悉賜降出使大臣集兩省侍從官公共熟議取其是者斷而行之無為含糊囁嚅之論以招後悔開此疏不得本日因范同奏事附見徐夢莘北盟會編又有開一疏其詞淺俗而魏掞之讜議無之今不取是日資政殿大學士新江南西路安撫制置大使兼知洪州張守入辭命坐賜茶守與顯謨閣待制新知廣州張致逺皆乞黃榜以招安南安諸盜許之己酉詔責授寧江軍節度副使莫儔永不收敘先是朱勝非當國許儔便居儔既還浙西諌官李誼論其罪章上不行後數月乃有是命誼以今年五月上章不知許時何以不行也庚戌北使書狀官行臺尚書省主簿魏千運卒於髙郵軍賜白金六百兩張通古等還乃焚其骨而歸辛亥祕書省正字范如圭獻書於秦檜曰禮經有曰父母之讐不與共戴天寢苫枕干誓死以報徽宗皇帝顯肅皇后崩於沙漠去春凶問既至主上攀號劈踊哀動天地四海之內若喪考妣相公身拜元樞不以此時建白大義乘六軍痛憤之情與之縞素揮戈北向以治女真不共戴天之仇顧遣一王倫者卑辭厚幣以請梓宫甚矣謀之顛錯也春秋之法讐不復賊不討則不書葬葬者臣子之事也不書葬以為無臣子也天下之痛莫甚於不得其死而不復讐不討賊使神靈銜寃抱恨於地下而不得伸雖得梓宫而葬之於臣子之心能安否乎古之人有命將出師誓滅鯨鯢以迎梓宫者矣雖其力小勢窮不能有濟而名正言順亦可以無愧於天下後世未聞發幣遣使祈哀請命以求梓宫於仇讐之手者也女真用是知我無復讐之心可以肆為玩侮乃示欲和之意使倫歸報交使往來至於再至於三其謀益深言益甘我之信彼益篤禮益恭墮其計中不自知覺雖三尺童子皆為朝廷危之倫之言曰女真欲以梓宫母后淵聖皇帝中原境土悉歸於我審如是豈惟足以解吾君終身之憂哉乃天下臣子之所大願也然自王者迹熄五伯而下鮮不以詐力相傾今乃欲以誠信之道望於讐敵寧有此理且諱日之報與不報在彼無毫釐利害至不難從之事也我之懇請屢矣而寂無聞焉於其至易者尚不我從則其他可知矣春秋之法凡中國諸侯與外國盟會者必謹志而深譏之其法嚴矣女真自海上結盟借助於我以滅契丹契丹既滅遂犯汴都其不可信一也既而城下之盟講解而退矣曽不旋踵復圍太原其不可信二也自是厥後和使項背相望而侵犯之兵無歲不有其不可信三也既破京城乃始斂兵議和誘我二帝出郊劫之而去其不可信四也劉豫其所立也事之無所不至一旦執之如探囊中物其不可信五也彼包藏姦詭而不可測度如此何為一旦與我如此之厚哉或謂金主初立尼瑪哈已死親族離叛契丹復振方務自保畏我加兵故欲釋憾解仇以免南顧之患豈其然乎自劉豫既廢之後我益畏縮逺屏未嘗敢向北方發一矢彼何憚於我哉是深謀長計欲不費一鏃而坐收混一之功耳聞其使稱詔諭挾册命而來要主上以下拜之禮果有之乎其無之也果可從乎其不可從也反面事讎匹夫猶不肯為忍以堂堂之宋君臣相率而拜不共戴天之人哉主上哀疚在躬孝友天至必曰吾為梓宫屈為皇太后屈為淵聖皇帝屈何不可之有使子弟之情獲伸於一日志願足矣遑恤其他相公何不以必然之理開陳於咫尺之前乎誠使一旦拜受女真之詔册則將行女真之命令頒女真之正朔普天之下莫非女真之土率土之濱莫非女真之臣我宋君臣上下雖欲求措身之所且不可得徽宗顯肅之梓宫遂無地可葬母后淵聖之輦輅遂無家可歸矣無乃違主上聖孝之心失相公大忠之節乎昔漢髙祖責數項羽兵不少解卒免太公於爼上晉大夫征繕以輔孺子使惡我者懼卒能歸惠公於強秦此古人已試之明驗也相公不用此䇿以慰我主上孝弟之念奈何欲誤主上舉祖宗二百年之天下委而棄之哉今所以委曲順從敵意不敢少有違忤者惟恐其不歸梓宫母后淵聖而加兵於我耳曽不知一正君臣之分則號令生殺皆出於其手設若擁梓宫母后淵聖於大江之外下一紙詔召吾君相以下來迎于境我若從之立有禍變如其不從彼將責我曰吾歸而父母之喪歸而親歸而兄有大造於而國乃違我之命不肯來迎是不孝於父母不恭於兄不忠於我也聲罪來問將何以待之事至如此則前日所以順從其意者非特無分毫之益適足以致莫大之禍和好既敗雖欲兵之不用其可得乎為和之説者必曰今雖講和而邉備實未嘗弛必無意外之患以如圭觀之朝廷以議和之故謂謀臣猛將可以折衝禦侮者皆無所用或斥逐而逺之或併之於驕庸之帥又將包羞忍恥甘心屈辱以沮喪士氣而離其心殆若歸馬放牛示天下不復用兵者而謂之不弛邉備是內欺其心上欺人主下欺億兆之衆也主上南面而君天下十有二年矣其即位也由天下軍民推戴所迫不得已而從之至於今日天下軍民豈肯聽吾君北面而為仇敵之臣哉主上以思念君父母兄之故不憚於屈己天下軍民以愛君之故不肯聽主上之辱身用此拒敵不為無辭者若其舉兵而來適足以激怒吾衆我以大義明詔天下率勵瘡痍之餘共雪父兄之恥乃不可失之機會也相公若必欲拂天下之情贊成主上受此屈辱有如姦雄因衆心之憤擁數十萬之衆仗大義以問相公之罪則將何辭以對宣和靖康以來為女真所屠戮者非將士之父兄則其子弟幸得脫身於鋒鏑恨不得女真之肉臠而食之今相公反愛信之如天屬之親萬口籍籍扼腕忿怒莫不歸罪於相公相公亦知之乎相公嘗自謂我欲濟國事死且不恤寧避謗怨相公之心則忠矣使殺身而有益於君固志士仁人之所願為也若犯衆怒陷吾君於不義政恐不惟怨謗而已將喪身及國毒流天下遺臭萬世茍非至愚無知自暴自棄天奪其魄心風發狂者孰肯為此若曰聖意堅確臣下莫之能回此非所望於相公也檜不答是日樞密院編修官胡銓昭州編管銓之上書也都人喧騰數日不定上語秦檜曰朕本無黃屋心今橫議若此據朕本心惟應養母耳此據秦檜奏疏所載上言於是檜與參知政事孫近言臣等比以金使及境各進愚計務欲接納適中可以經久朝廷之體貴在慎密不敢漏言聞銓上章歷詆蓋緣臣等識淺望輕無以取信於人伏望睿斷早賜誅責以孚衆聽詔答曰卿等所陳初無過論朕志固定擇其可行中外或致於憂疑道路未詳其本末至彼小吏輕詆柄臣久將自明何罪之有至是乃議責銓檜批旨曰北使及境朝廷夙夜講究務欲上下安帖貴得和好久逺胡銓身為樞屬既有所見自合就使長建白乃狂妄上書語言凶悖仍多散副本意在鼓衆劫持朝廷可追毁出身以來文字除名勒停送昭州編管永不收敘令臨安府差使臣兵級押發前去候到具月日聞奏仍令學士院降詔布告中外深知朕安民和衆之意時銓妾孕臨月遂寓湖上僧舍欲少遲行而臨安已遣人械送貶所祕書省正字范如圭與敕令所刪定官方疇見吏部侍郎晏敦復為銓求援敦復曰頃嘗言秦檜之姦諸公不以為然今方専國便敢如此趙元鎮雖無狀不至是也此人得君何所不為敦復即往見守臣徽猷閣待制張澄語之曰銓論宰相天下共知祖宗朝言事官被謫開封府必不如是澄愧謝曰即追還矣壬子左通直郎胡銓送吏部與廣南監當銓既竄斥秦檜孫近又奏銓所上封章言及臣等若重加竄斥於臣等分義有所不安欲望聖慈更加寬宥臺諫勾龍如淵李誼鄭剛中亦共救解之乃以銓監昭州鹽倉銓之行也監登聞鼓院陳剛中以啓送之曰屈膝請和知廟堂禦侮之無䇿張膽論事喜樞庭謀逺之有人身為南海之行名若泰山之重又曰知無不言願請上方之劍不遇故去聊乘下澤之車秦檜大恨之此據銓自跋戒諭詔書及紹興正論參修銓稱秦檜孫近鄭剛中李誼勾龍如淵夜半同上殿引救上稍霽威特免昭州之徙而日歷及他書皆不見臺諫文字銓自記必審但謂如淵為給事中則誤耳正論云陳剛中任寺丞而銓所記以為鼓院二書不同考之日歷六年四月丙午左宣教郎陳剛中除太府寺丞替王師心成資闕而今太府寺題名皆無二人姓名蓋中間有旨待次者皆省罷故也鼓院題名起於紹興十六年亦無剛中姓名今且從銓所記俟考剛中紹興十年八月壬申行遣是月資政殿學士提舉臨安府洞霄宫陳與義薨於湖州建炎以來繫年要録卷一百二十三建炎以來繫年要録卷一百二十三金人地名考證逹蘭原書作逹懶誤改見卷一烏凌阿原書作烏陵誤改見卷一尼瑪哈原書作粘罕誤改見卷一
