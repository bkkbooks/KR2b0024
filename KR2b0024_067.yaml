body:
  text: 建炎以來繫年要録卷六十七宋李心傳撰紹興三年秋七月甲寅朔資政殿學士新知平江府謝克家提舉萬夀觀兼侍讀吕頤浩引之也浙東福建宣諭朱異言建州觀察推官林安宅清亷守正嘗面折范汝為詔循二資令入對安宅侯官人也丙辰吕頤浩言行宫北門未成而役夫少欲於忠鋭第八將范溫麾下擇不堪出戰二百人助役且令溫自董之上問其故席益曰役夫出入禁闥非素所撫循無以彈治上曰不可四方聞之以為使將帥舍甲兵而事營繕非今日整兵經武之道也益曰聖慮深逺非臣等所及武泰軍節度使權主管殿前司郭仲荀兼權神武後軍都統制朝請郎吳必明除名英州編管必明嘗知邵武軍葉濃之亂必明統所居崇安縣射士捕之繇是武斷一鄉脅制縣令與通直郎前通判臨安府暨尚卿協比為姦為右朝奉郎通判建州李佩所發事聞詔漕臣徐宇究實於是尚卿撫州編管知縣通直郎賈損亦坐停官丁巳徽猷閣直學士詹乂試給事中己未置博學宏詞科用工部侍郎李擢奏也其法以制詔書表露布檄針銘記贊頌序十二件為題古今雜出六題分三日試命官除歸明流外進納及犯贓人外願試者以所業每題二篇納禮部下兩制考校堪召試者每舉附省試院收試上等改京官除館職中等減三年磨勘下等減二年並與堂除奏補出身人以賜進士及第出身同出身為三等之差著為令給事中黃唐傳暫權翰林學士以綦崈禮疾告也詔太史局每月具天文風雲氣候日月交蝕等事實封報祕書省初置提舉孳生牧馬監官於饒州置司俸賜視雜監司令樞密差幹辦官三員本路給廄卒二百人仍令統制官王進以所部護之時益市馬於廣西故先擇牧地鄱陽置官提舉庚申權商虢鎮撫使董先奏虢州失守待罪詔先兼京西招撫司都統制屯襄陽壬戌詔建康府永豐墟租米嵗以三萬石為額此據紹興四年二月癸巳吳若申明狀修入墟四至相去皆五六十里有田九百五十餘頃近嵗墾田不及三分之一至是立額焉癸亥尚書吏部侍郎陳與義兼權直學士院甲子手詔諸路憲臣核實州縣己未支還和買本錢實數來上先是諸路和買紬絹匹支錢一千而州縣又多不給者時大旱上以為民咨怨而傷和氣諭大臣曰雨不濡土當務修政事以感天意和買未為良法重困吾民其令監司核實勿為文具也閣門祗候知泗州徐宗誠再任泗州自軍興以來田菜多蕪民間皆以草實為食及是宗誠以土豪為守修城郭治官舍問民間疾苦又以私財市牛蓄糧課民使耕軍民皆贍州民聞陳杌來為守相率詣朝廷請宗誠再任上許之知樞密院事張浚言君臣相與之際自古所難惟聖賢之君乃能終始保全使其臣立於無過之地史册書之後世歌之此臣日夜引領東向區區有求於陛下者也臣以﨑嶇孤旅之身幸蒙擢用適時艱危屢經大變臣荷陛下恩德深隆不敢以家室宗族為念勉竭股肱之力庶幾有濟力倡忠義決圖破敵誓不俱生而臣志大而才踈心忠而識暗舉措謬戾動致怨尤首罷使權繼膺召命再念臣五年使事心力俱疲疾病交攻日以衰弱願陛下推保全之志廣均逸之仁俾獲真祠奉事香火方今大敵敗却將士一心外敵之勢漸衰中國之威將振臣之求退不為無辭異時儻未死於溝壑尚求報於天地執筆見意涕淚交流詔不允令浚疾速赴行在乙丑尚書省言韓肖胄已至泗州齊國館伴官兵未到時神武諸軍護送者二千人乃詔都督府以輕舟濟其軍食肖胄至汴梁偽齊劉豫欲見之副使胡松年曰見之無害豫之偽臣欲令以臣禮見肖胄未有以答松年曰皆大宋之臣當用敵禮豫不能折既見松年長揖豫敘寒溫如平生豫欲以君臣之禮傲之松年曰松年與殿下比肩事主不宜如是豫問主上如何松年曰聖主萬夀豫曰其意何在松年曰主上之意必欲復故疆而後己豫有慚色丙寅尚書考功員外郎兼權監察御史朱異宣諭浙東福建還入見異出使九閲月所按吏凡八人三年正月庚申右承務郎知蘭溪縣黃伯達乙酉儒林郎知象山縣趙舉之永康丞劉伯英二月壬子浙東提舉茶鹽公事王然甲寅兩浙轉運副使徐康國四月癸巳右承直郎知崇安縣賈損己未保義郎監寧化縣稅務趙返之六月甲戌知莆田縣傅內王然康國詳見本月日餘並放罷取勘薦士十二人張九成閭邱昕汪汝則熊彥詩薑仲開已見今年四月壬辰張志行已見六月乙酉林安宅已見七月甲寅石公儒李郁見此日李寀見四年正月丙寅左承議郎知安溪縣王伯淮左朝奉大夫知松溪縣林元敏並以七月甲寅轉官異尋遷吏部仍詔俟都司有闕日除異選吏部在此月甲戌徽猷閣待制知宣州沈晦知建康府代歐陽懋也日厯不見懋改除建康志懋以五月二十三日到任亦不言替移今附此當考詔鄉貢進士石公儒李郁並令赴都堂審察公儒臨海人長於春秋傳不事科舉郁光澤人父深元祐黨人母陳瓘女兄弟也郁早從楊時學時以其子妻之宣諭官朱異言其賢故召自移建康𣙜貨務于鎮江而入納絶少建康日課近二萬緡鎮江才千緡而止論者以為軍士攘奪商旅不敢行詔尚書省降勑榜禁止士卒有犯當依軍法統制官已下並取旨重竄今來所繫朝廷大利務在必行仍令江淮兩宣司依地分巡察兩宣司巡察在此月己巳旨丁卯詔録用太祖太宗真宗仁宗英宗神宗六朝勳臣自曹彬至藍元振三百二十人子孫先是徽猷閣待制宋伯友入對言艱難以來中原隔絶功臣子孫凋喪殆盡乞訪其後量材録用故有是旨其後得趙普安仁范質錢若水諸孫皆官之慶厯三年初定曹彬至邵曄二百四人政和三年重增范質至藍元振一百十六人熊克小歷但云言者而無伯友名蓋伯友以六月甲辰建明得旨令吏部開其克厯但據吏部所申而不考事始也戊辰王􅊛以舟師發行在己巳詔以久旱令兩浙憲臣行所部慮囚左司諫唐輝乞令憲臣所至親自引問庶寃枉獲伸從之樞密院計議官權監察御史薛徽言宣諭湖南還是日入見徽言出使九閲月所按吏十六人三年四月戊申承信郎監茶陵縣稅務沈銓右迪功郎監常寧縣稅務王載五月丙子永州推官俞梅司户葉敷保義郎東南第九將押隊姚成忠翊郎權同管界巡檢夏習武經郎前兵馬都監吳廓將仕郎權司户蘇昱辛巳通判賔州謝徽六月甲申左宣教郎前權常寧縣阮冠六月辛亥知邵州和璟乙未右朝散郎添差湖南轉運判官趙志之並放罷取勘又陳發陳如損詳見四月己酉黃升詳見五月丙子薦士三人劉延年張登己見五月己卯又六月己亥左宣教郎前通判衡州趙伯牛轉官吕頤浩以徽言擅易守臣及移用經制銀後三日遂命出守上猶疑其資淺久之乃以徽言知興國軍徽言得郡在九月癸酉庚午詔無職田選人及親民小使臣並月給茶湯錢十千職田少者通計增給先是御筆增選人小使臣俸以養亷輔臣進呈上諭以今飲食衣帛之直比宣和不啻三倍衣食不給而責以亷節難矣雖變舊法以權一時之宜户部尚書黃叔敖言文武官料錢各有格法不可獨增選人小使臣乞令提刑司均州縣職田於一路通融應副無職田及職田少者增支從之壬申樞密院計議官王大智添差浙西安撫司幹辦公事始大智以獻戰車式得官車成而不可用遂罷之上因諭輔臣以車非利器席益曰古人彼此用車至於彼徒我車已有侵軼之懼而後人每以車敵騎其敗固宜樞密院計議官京西撫諭任直清依舊直祕閣添差都督府幹辦公事上既臨遣直清俄聞京西連失利遂罷行癸酉宰相吕頤浩參知政事席益簽書樞密院事徐俯以旱乞罷政上親答曰與其去位曷若同寅協恭交修不逮思所以克厭天心者頤浩等乃復視事時上以旱故詔羣臣言闕政禮部尚書洪擬奏曰法行之公則人樂而氣和行之乖則人怨而氣偏試以小事論之近時監司守臣獻羡餘則黜之徐康國侯彭老宣撫司獻則受之此恐指張浚是行法止及疏逺之臣也有自庶僚為侍從卧家視事未嘗入謝遂得美職而去洪炎若鼓院官移疾廢朝則斥罷之廖邦傑是行法止及冗賤之官也𣙜貨立法甚嚴犯者籍家財以充賞而大官有勢者連營列陳公行酤賣則不敢問是行法止及孤弱之家也小事如此推廣而言之則怨多而和氣傷可知矣疏奏上嘉納之上因旱詔群臣言事此據熊克小厯附見日厯蓋無有也當考甲戌右朝請大夫郤漸提舉饒州孳生監牧公事漸入辭言今西北之馬寖已衰耗朝廷取馬於雍管置監於鄱陽乃軍政之急務聞東南民間養馬亦多乞下諸路令民間以甚好馬輸官二十匹補進義校尉等而上之至百匹為五等次第補授朝論恐其擾民乃止漸以八月庚子入見今并附此神武中軍統制兼提舉宿衛親兵楊沂中自嚴州還以沂中兼帶御器械武功大夫忠州團練使閣門宣贊舍人御前忠鋭第四將范溫以所部充神武中軍左部統領尋詔溫係忠義人特令户部給厯餘毋得援例溫給厯在九月庚午乙亥朱勝非起復舊官守尚書右僕射同中書門下平章事兼知樞密院事特命睿思殿祗候陳彥臣宣押赴行在初召當直學士陳與義草麻後二日復命學士綦崈禮貼改四字與義上疏待罪詔釋之熊克小厯七月癸酉右僕射朱勝非起復蓋從日厯所書也樓鑰所修宰輔拜罷録在乙亥而洪遵中興玉堂制草乃注云七月二十三日三書不同按陳與義待罪狀云今月二十一日晚伏蒙宣召令草朱勝非起復制切覩二十三日三省同奉聖旨令綦崈禮貼改四字二十一日甲戌也據此則與義以甲戌草制乙亥宣麻不知日厯何以差誤今不取詔神武副軍都統制嶽飛選兵三千人移戍廣州初廣東諸司奏右朝散郎通判廣州韓僖貪贓不法事下提刑司劾治已而僖子惇胄使人詣闕訟轉運判官章傑與父有深仇乞移獄詔江西提刑丁彬選官根勘僖與吕頤浩子抗善故頤浩主之勘官通判南安軍時益因移文劾傑傑奏益觀望用情詔彬更選官往治毋得觀望徇情滅裂是月壬申至是言者謂貪贓之吏相習成風害政殘民蓋非一日即如益所行非勘僖是勘傑也望詰益因依從之其後頤浩免相御史又以為言於是彬益並罷時彬已遣通判虔州周文虎詣廣西按僖罪而諭意使出之文虎有守之士也辭之不聽怏怏成疾道死臺章再上彬坐停官而僖亦死於獄矣彬益罷官在九月丙寅彬勒停在明年正月丁卯皆用常同疏也此時同未為御史故不出其名僖以去年三月癸卯下廣州獄今年十一月乙丑死於獄中凡坐獄五百三十餘日明年二月甲午廣州申到丙子詔諸路監司分按州縣親録囚徒以察寃滯以久旱用工部員外郎臨海朱締奏也詔臨安府守臣有奏稟事許不隔班上殿用直龍圖閣知府事梁汝嘉請也汝嘉嘗言臨安府地望為一路最况輦轂之下莫先彈壓而守臣之任僅同支郡望令本府依舊帶安撫使析浙西八州為二分隸鎮江臨安時以防江為重未克行析是日泉州洪水溢壞城郭廬舍凡三日乃平丁丑詔遣內使衛茂恂往夔峽州荆南府催促張浚赴行在仍以茶藥為賜尋詔茂恂所過州有前宰執皆撫問之己卯省都督府隨軍漕臣時以户部侍郎姚舜明在鎮江總領錢糧故也詔左武大夫忠州防禦使知泰州張榮以所部赴行在初講筵所以進書推恩書吏慕允中補進武副尉提舉官乞特不作非泛補授都官用例許之左司諫唐輝言號令不信後之僥幸者無以澄革乞改正是日進呈上曰此御批寶也既有例當行席益曰此事固有前比然以副尉而煩諫官論執請如所奏上頷之徐俯曰如有例何上曰然凡朝廷事既有例因言者論列而改則朝廷所行果非也且此小事非繫國體吕頤浩席益固請如輝所奏上可之按唐輝所奏非謂不應補官謂其不應不作非泛也熊克小厯節略其文遂失事實今稍詳之中興聖政臣留正等曰天下之事必有爭臣以防其微必有謀臣以當於體此為治世也已矣事之行也苟有毫髮之可議人以為猶可也爭者曰必不可人以為未害也爭者曰必有害人主豈得忽於微而黜其説哉彼以爭為職者也事之猶可也而過於言無傷也人有所難言事有所必不可不言者又將使斯人不擇可否不計從違以伸其職於後也故曰法家拂士不可以通人望之言無不從有補國家稍加違咈其職遂廢謀臣者所宜左右其説以獻於明主也太上皇帝樂受諫疏付外而行與大臣謀議曲折詳盡寧格成命而重違諫奏此國體也夫以輝之論一副尉與論獻瓜果而授試官者何如哉獻瓜果而授試官塗之人耳而來者未必加多因講筵而覬恩澤則祗應之類不乏也其非泛補授之名安得而不早正於此雖有前比可免論執特不可以一祗應恩澤而屈忠言沮直氣也輝之論事以其職頤浩益謀國以其體而太上皇帝不難於聽從之聖德盛矣哉庚辰輔臣奏事吕頤浩言雨足上曰日者亢旱朕甚憂之以為穡事無望矣今霑足如此殆將有秋春秋二百四十二年書大有年者才一書有年者再而已以此知豐登之難得也先是自六月丙午不雨上命議獄省刑弛力役進素膳及是雨乃足翌日上始御玉食焉辛巳左朝散大夫廣西轉運副使劉彥適知靜江府代見任人降充直祕閣許中赴行在先是有詔復收免行錢而彥適市買方物抑賈人使低其直民有訟之憲司者中械繫之死獄中提點刑獄公事董弅言于朝故先召還尋奪職奪職在八月庚子弅逌之子也既而宣諭官明槖復奏其五罪四年二月壬午乃趣湖南漕司劾治皇伯洪州觀察使權行在中正司安定郡王令畤為寧逺軍承宣使以積閥遷也八月按是月癸未朔丙戌户部尚書黃叔敖請諸路上供錢兩浙限次年二月終江湖限五月中起發違者本部以聞從之四年二月廣東西漕臣以上供欠多降一級初忠鋭第八將徐文既叛去事見四月以所部海舟六十官軍四千三百泛海至鹽城縣遣使臣闞中納欵於偽齊具言沿海無防虞之人可以徑至二浙且圖上駐蹕所在軍馬之數因密州草橋鎮巡檢包德聞於劉豫豫大喜是日授文防禦使知萊州以海艦二十益其軍令犯通泰等州且至淮南與大軍會合己丑命神武副軍都統制嶽飛赴行在仍命飛以精卒萬人留戍江州輔臣因論分屯軍馬逺近輕重吕頤浩曰但恐無糧上曰撫國家給饋餉自古亦須運糧豈有無糧之理乃命出撫州樁管錢九萬餘緡江西折帛錢易糧萬斛以餉飛軍辛卯詔諸路州軍自去年以後奏案未得斷敕者具月日申部取斷先是禮部尚書洪擬入對論諸路獄案凝滯上諭輔臣曰奏案遣決濡滯刑獄禁繫者多何以召和氣吕頤浩曰奏案法有日限上曰但不舉行耳可當催趣務在刑清庶革久弊乃有是旨壬辰川陜等路宣撫處置副使王似言川陜諸州應奏獄案乞用便宜指揮酌情斷下如張浚例許之癸巳左承議郎常同為殿中侍御史同自柳州召還既對遂有是命和安大夫榮州防禦使王繼先言纍年供進湯藥有勞已推恩數乞將上件勞績守本官致仕庶不踰分招致人言詔繼先進秩一等許回授是日朱勝非自湖州赴行在故事大臣奪情者服糙光幘慘紫袍皂角帶上皇惡之政和末始議以入公門不應變服遂以吉服朝然居家猶喪服也至是勝非請所服太常遂省記宣和近事以報而居第則慘服去佩焉議者不以為是太常奏下在此月庚子今因勝非赴行在遂書之勝非奏狀云臣今月十一日登舟長行癸巳十一日也奪情故事太常所記不如是之詳今以蔡絛百衲叢談增入是夜虔卒石亮與其徒謀即州學團聚為變忠節指揮使石佺密告東南第六將韓思等率兵捕其徒七人皆斬之事聞詔虔州别選守臣命見任人侯延慶赴行在事聞在九月庚午後三日癸酉除朱芾知虔州已附見九月甲戌劉大中奏後更不别出甲午上謂大臣曰元祐黨人固皆賢然其中亦有不賢者乎吕頤浩等曰豈能皆賢徐俯曰若真元祐黨人豈有不賢但蔡京輩凡己之所惡欲終身廢之者必名之元祐之黨是以其中不免有小人上曰若黃䇿之類是也俯曰黃䇿乃元符末上書狂直被罪始天下皆稱之如䇿比者無慮十數人䇿不能固窮守節旋陷於非義其中亦有議論前後反覆姦惡猥瑣竄名其間如楊畏朱師服數人耳䇿以直祕閣通判嚴州受賕抵罪故上及之右通直郎唐恕試太常少卿恕既告老屢召不至及是入對詔賜進士出身而有是命右朝請大夫主管江州太平觀王子獻復右朝議大夫子獻初坐江西棄城停官及是乞牽復大理約法公罪斬仍用赦而復之著此以見棄城約法輕重故降充寶文閣待制王覿追復龍圖閣學士覿泰州人元祐翰林學士黨籍待制已上第二十六人臨江軍安置乙未詔河南鎮撫使翟琮且在襄陽府屯泊聽候朝旨時梁衛之地悉淪偽境琮屯伊陽之鳳牛山為偽齊所逼孤立不能敵率部曲突圍奔襄陽京西招討使李橫以聞故有是命熊克小厯載琮突圍在明年三月末蓋不知琮至襄陽之時也今從日厯附此克又云琮以數城孤立不能敵亦誤琮雖為河南府孟汝鄭州鎮撫使其實遙領虛名今不取權商虢鎮撫使董先亦言有官軍及老弱七千在襄陽而李橫兵已衆恐不能贍給乃命先赴行在先遂以其衆依趙鼎于江西丙申以昭慈聖獻皇后改諡册寶告太廟丁酉遣户部員外郎徐把奉册寶己亥以信安郡王孟忠厚為禮儀使奉神御並詣溫州上酌獻于射殿畢步導至行宫南門外奉辭宰相率百官辭于城外時以製塑神御官吏遷官資者二百四十餘人添給錢萬緡銀帛二千四百餘匹兩言者以為濫乃命差減焉八月甲午詔轉官資人減半詔置三衙管軍直舍於殿門外用主管殿前司公事郭仲荀請也庚子詔都轉運使移司撫州時議者皆欲罷都運司以省費給事中黃唐傳上疏言自罷發運司後上供錢物頓失拘催遂改為都漕蓋以收簇上供應副行朝為事今罷此亦可省官吏之費但慮諸路漕臣復以上供錢物移用他時復置即非朝廷舉措并具置司前後所催發錢物數以聞乞付戶部官同議於是度支郎中侯懋等言自置此司一嵗間所拘催錢糧金帛已八十二萬餘貫石匹兩第漕臣不得自便同所忌嫉以此見存廢利害甚明今置司常州去閩廣江湖地逺乞移司撫州從之熊克小厯誤以唐傳元章為懋所奏遂併户部定奪之語合為一章蓋鹵莽也今依日厯各取其要語别書之辛丑信安郡王孟忠厚言近者有詔改議昭慈聖獻皇后諡號務盡尊崇而其廢復之因終未明辨人或疑之臣聞昨有黃䇿上書專論此事蓋䇿於平江因析賣蔡京家産乃得京舊所藏親奉聖語劄子手迹有太上皇帝諭京語曰皇太后言昨先帝既廢后亦有悔意嘗以語皇太后則知廢黜之事非繇泰陵聖意斷可知矣昨已蒙宣取京所書劄子真本望宣付史館以慰在天之靈從之武功大夫忠州刺史兼閣門宣贊舍人添差福州兵馬鈐轄劉紹先為神武右軍右部統領用張浚請也甲辰手詔曰比者雨暘弗時幾壞苗稼朕方寅畏怵惕之中又復地震蘇湖益甚懼焉蓋天之降災其應必至皆朕失德不能奉順乾坤協序陰陽之故咨爾在位大小之臣有能應變弭災輔朕不逮者極言無隱先是宰執同奏請罪章未下侍御史辛炳奏大臣無畏天心何事不可其言峻甚由是出宰執初章仍有天之降災皆朕失德之語於是吕頤浩等居家待罪纍四章乃止此並據朱勝非秀水間居録附見日厯無之時己命諸路憲司起發州郡所負積年禁軍闕額錢是日上諭輔臣恐不便於民速令除放遂以手詔付有司自建炎以來皆蠲之御史臺主簿陳祖禮言按臺令有三院御史分詣三省點檢之文六察官輪詣六曹按察之制望申行之詔自下半年為始祖禮晉陵人也右承議郎新提舉廣南市舶姚焯請得具便民或邉防五事如守臣例許之自是監司皆得條上乙巳詔復置史館以從官兼修撰餘官兼直館檢討若著作郎佐有闕依元豐例差郎官兼領先是著作官全闕以都官員外郎孔端朝兼權著作佐郎至是吏禮部討論而有此命初婺州兵馬都監駱公彥等七人皆以潛邸恩得添差而左司諫唐輝言其非祖宗舊制吏部引上皇初即位時敕旨為言是日詔隨龍官係國朝故事添差劄與諫院照會吏部奏到元符三年六月五日聖旨蓋為上皇隨龍人創設也丙午起居郎孫近守中書舍人起居舍人曾統守起居郎祕閣修撰知虔州侯延慶復為起居舍人尚書左司員外郎劉岑守祕書少監直寶文閣知郴州趙不羣移知宣州左朝奉大夫趙康直改知泰州泰州自分鎮後就用武將張榮為守及是始命文臣左宣教郎杜巖送廣州居住巖自宜都與其孥乘舟至姑孰朝廷聞之命官護送至行在而後遣之巖兄嵩崑中道亡去求之不獲既而奔偽齊紹興七年十一月金人差除數內有杜嵩故責授海州團練副使朱師服追復集英殿修撰以元祐黨人故也師服海州人紹聖中書舍人待制以上第四十九人五年六月乙卯追奪丁未浙西提舉茶鹽司言本路諸縣去冬住賣鹽錢塘縣四十六萬餘斤比遞年增三十七倍建德縣二十七萬餘斤比遞年虧六分乞賞罰詔兩縣當職官減展磨勘年有差初張浚承制以參議官寶文閣學士程唐籌邉有勞進秩一等回授其子登仕郎敦復為承務郎命既下論者以為吏部改官格法甚嚴雖見任宰臣回授轉官亦無改官之例乞改正乃詔循敦復二資戊申罷江浙等路轉運司給事中黃唐傳言自置司以來催發上供所增錢三十餘萬緡黃金千五百餘兩米二十二萬斛絹二十餘萬匹綿亦稱是不知何名而遽罷之若罷此司而上供愆期定復分遣郎官四出催刷是徒為擾擾紛紛虧損國體利害甚明望賜詳酌詔以次官書讀行下初責授黃州團練副使孟揆寓居梧州多市官鹽以規利至潯州為監稅左宣教郎韓璜所發州以私鹽論罪揆訴於朝詔廣西提點刑獄董弅定奪弅言揆雖以詭名市官鹽為詞而在法犯𣙜貨不得根問買處合從私販法事下𣙜貨務提領官張純言廣西鹽係官販官賣即無不許隔越州府貨買之文都省勘會恐官司實有用情令本路漕臣依公究實申省如敢觀望重置典憲其日辛卯也至是侍御史辛炳言揆若轉買客人官鹽自有文引照驗今既無文引無可體究適所以彰朝廷用情廢法之失逺方官司祗有觀望朝廷之理必不觀望州郡勘司按揆父子兄弟叨受國恩前此坐罪貶責例當籍沒家資巧計避免今以私販獲敗天實誅之公朝成法每以私意廢輟不可不戒乃詔潯州速具案以聞俟至取旨著此以見臺諌攻吕頤浩本末按炳奏潯州已於去年七月二十一日具案聞奏至今踰年方令刑部促潯州奏案不知何謂四年六月庚子行遣詔故朝請郎陳伯疆特官一子伯疆事上皇為右正言以忤權幸廢及是用其家請而命之中書舍人張綱論伯疆之死已三十年前此未嘗敘雪今遽推恩其子異日死於謫籍者援以為例將何以止之朱勝非曰伯疆以直忤蔡京而被黜今公議已開理當推恩蓋綱失於取會上曰伯疆固直第朝廷未嘗辨雪致綱有言今欲直伯疆之寃當先令辨正也十一月丁卯寢命五年三月乙亥再推恩己酉給事中黃唐傳言近下求言之詔未聞有畫一奇出一䇿者而告論州縣及訴人之過則多有之此非陛下求言本意望降詔旨應自今上書言事毋有所諱惟不許因書告訐它人過失詔檢鼓院榜諭殿中侍御史常同言陛下乘此艱難注意在將而二三將臣不能協心共謀以濟國事邇者淫雨害稼地震輔郡陰盛之象殆謂此也悉由幕府謀議之官以妄言激怒主帥贊畫無狀理宜罷免詔以付諸將同所言蓋指劉光世韓世忠也侍御史辛炳言叨綴日𠫭每見朝殿進呈宰執有留身奏事者臣竊謂天下有大利害政事有大因革人才之黜陟賞罰之勸懲相與敷陳於陛下之前蓋有不容不公者留身之際何所不有臣恐分朋植黨之漸為害滋大欲望降旨自今三省樞密院朝殿進呈訖不得留身違者許御史臺彈奏都省奏閣門狀令臣僚上殿不得留身奏事宰臣非執政官曲謝及乞解職者聽庚戌詔依閣門見行條法詔𣙜貨務都茶場許臺諌取索及勾喚人吏此似因常同論張純罪當考辛亥嗣濮王仲湜請諸州宗室各以行尊者一人檢察月俸錢米許之渡江後宗子散居四方故仲湜以為請是月韓肖胄等始至雲中見金國左副元帥宗維等議事王明清揮麈第三録韓似夫與先子言頃使金國見金主所繫帶光彩絢目韓注視久之金主云此石晉少主獻耶律氏者唐氏日月帶也按張滙節要云紹興三年春尼瑪哈烏舍居雲中夏尼瑪哈之白水泊避暑秋尼瑪哈等避暑回分居本所不云金主在雲中金史肖胄以今年十二月四日回到泗州若往會寧往還必不如是之速兼與肖胄偕來者止元帥府使人則似未嘗見金主也明清所云姑附此當考建炎以來繫年要録卷六十七金人地名考證烏舍原書作兀室誤改見卷一尼瑪哈原書作黏罕誤改見卷一
