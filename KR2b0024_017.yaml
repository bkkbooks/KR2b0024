body:
  text: 建炎以來繫年要録卷十七宋李心傳撰建炎二年八月癸丑朔復諸路常平官時顯謨閣待制孫覿入對言自罷提舉官常平之財所存一二猶以億萬計皆為他司妄用今轉運使漕挽軍儲上供之外無一金之藏他時大水旱大舉措經畫殘破召募軍馬以備緩急之須皆非轉運使所能辦時方多事財用為急望復置官講補助之政故黃潛善奏行之十月壬戌討論遂命諸路拘催青苖積次本錢自崇寧以來皆不得免三年閏八月戊寅所書可參考甲寅初鑄御寶一曰皇帝欽崇國祀之寶二曰天下合同之寶三曰書詔之寶自是月乙卯行使戊午詔行在左藏庫湫隘目今綱運令戶部於江寧平江府置庫樁管逐府通判監視憲臣檢㸃擅用者依支封樁法加等科罪時戶部所餘金帛尚數百萬上以北方未寧為慮數諭黃潛善汪伯彥輦致江寧潛善等方以恐搖人心為對尚書右丞朱勝非獨論致揚州駐驆地上深納之令戶部納計郊祀之費餘財皆運之金陵祀事後當移蹕而潛善力沮之其言不行至是尚書吕頥浩侍郎葉夢得乃以庫府充牣為辭請命江湖二廣綱赴江寧閩浙綱赴平江惟川陕亰東西淮南綱赴行在從之尚書戶部侍郎葉夢得為翰林學士熊克小歷附此事於七月末云据夢得行述按日歷乃八月六日事今附本日顯謨閣待制知廣州陳邦光試尚書戶部侍郎邦光在廣州嘗發轉運使陳述姦贓却三佛齊使私覿珠貝異香文犀等直數十萬南人以為清尚書吏部侍郎魏憲復為顯謨閣直學士提舉杭州洞霄宫憲嘗言維揚南枕大江自古未有背天險而為都者金之徑騎自亰西不四五日可至宜有以備之尚書工部侍郎劉觀充徽猷閣待制知福州觀言敵騎出沒山東人情危懼望移蹕金陵執政不樂其言於是觀自後省移冬官踰月不拜故有是命給事中康執權試尚書工部侍郎顯謨閣待制孫覿試給事中集英殿修撰沈晦張澄並試中書舍人澄去年己為舍人不知何時罷當考魏憲康執權除目日歷不書今以後省及逐部題名增入工部題名仍全不載劉觀初除及補外然執權之除當是代觀故因覿除命遂書之恐觀之去留不盡在此日當别求他書考證乃可觀文殿學士范致虛提舉中太一宫兼侍讀致虛至行在言者論南陽之陷咎由致虛乃責安逺軍節度副使英州安置三年九月辛酉復官庚申殿中侍御史馬伸言陛下龍飛河朔近得黃潛善汪伯彥以為輔相一意委任不復致疑然自大任以來措置天下事未能愜當物情遂使敵國日强盜賊日熾國步日蹙威權日削且如二帝親屬盡室北狩宗廟社稷不絶如線者繫陛下一人而三鎮未復不當都汴以處至危之地此理甚明然前日下還都之詔以謫許景衡至於今日當如之何其不慎詔令有如此者事見五月乙酉草茅對策誤不如式考官罰金可矣而一日黜三舍人乃取沈晦孫覿黃哲諸羣小以掌絲綸其黜陟不公有如此者事見二月壬申又如吳給張誾以言事被逐給元年六月自監察御史遷左司員外郎誾元年六月除監察御史皆未見罷時邵成章緣上言逺竄今是何時尚仍舊體以言為諱其壅塞言路有如此者成章事見正月辛丑又如祖宗舊制諫官御史有闕御史中丞翰林學士具名取㫖三省不與厥有深㫖潛善近來自除臺諫仍多親舊李處遁張浚之徒是也觀其用意不過欲為己助其毁法自恣有如此者又如張慤宗澤許景衡公忠有才皆可重任潛善伯彥忌之沮抑至死其妨功害能有如此者景衡薨見五月慤六月澤七月又如有人問潛善伯彥救焚拯溺之事則二人每曰難言其意蓋謂陛下制之不得施設或問陳東事則曰外廷不知蓋謂事在陛下也其過則稱君善則稱己有如此者事見元年八月壬午又如吕源狂橫陛下逐去數月由郡守而升發運其强狠自專有如此者事見五月戊子又如御營使雖主兵權凡行在諸軍皆御營使所統潛善伯彥别置親兵一千人請給居處優於衆兵其收攬軍情有如此者事見元年五月丁酉潛善伯彥所為類此豈不辜陛下責望之意哉周任有言曰陳力就列不能者止孔子亦曰危而不持顛而不扶焉用彼相二人方且偃然自任屹然不動陛下隱忍不肯斥逐塗炭蒼生人心絶望則二聖還期在何時耶臣每念及此不如無生嵗月如流機㑹易失不早改圖大事去矣伏望速罷潛善伯彥政柄别擇賢者共圖大事疏留中不出甲戌伸改衛尉少卿承議郎趙子砥自燕山遁歸至行在上命輔臣召問於都堂且取子砥所得上皇御書以進子砥奏此事甚悉大略言金人講和以用兵我國斂兵以待和邇來遣使數輩皆不得逹劉彥宗云金國只納楚使焉知復有宋也是則吾國之與金國勢不兩立其不可講和明矣往者契丹主和議女真主用兵十餘年間竟滅契丹今復蹈其轍譬人畏虎以肉喂之食盡終必噬人若設陷穽以待之然後可以制虎矣後半月復以子砥為鴻臚寺丞已而賜對嘉奬遂以子砥知台州此據子砥燕雲録及紹興元年三月子砥乞差遣狀參修辛酉詔江淮六路量添賣酒錢以為造糧舟之費用發運副使吕源請也上色酒每升增三錢次色酒增二錢癸亥兵部尚書盧益言近世以田括丁號為民兵有古鄉兵之遺意請命提刑檢察從之三年七月辛丑罷甲子朝奉大夫直祕閣知棣州姜剛之進秩一等録其守城之功也日歷無此今以剛之家乞恩澤狀修入徽猷閣待制新知福州劉觀落職提舉亳州明道宫以言者論其觖望也丁卯光祿卿吳巖夫充集英殿修撰知福州觀除福州及罷日歷皆不載行狀云上留維揚人情危懼公申前議欲上狩金陵執政聞而間之乃以為待制知福州言者繼至落職奉祠觀建明金陵之議已於罷工侍時修入但不知前此馬伸劾孫覿謝克家嘗及觀圍城中事與此相關否今因巖夫除命附見戊辰龍圖閣學士提舉江州太平觀周武仲卒於揚州年五十三己巳詔試學官並用詩賦自來年始辛未徽猷閣待制江南等路制置發運使提領措置東南茶鹽梁揚祖遷徽猷閣直學士以措置就緒也茶法自政和以來許商人赴官買引即園戶市茶赴合同場稱發淮浙鹽則官給亭戶本錢諸州置倉令商人買鈔算請每三百斤為一袋輸鈔錢十八千閩廣鹽則𨽻本路漕司官般官賣以助嵗計建炎四年福建行鈔法旋即罷之紹興八年二廣行鈔法公私便之自揚祖即真州置司嵗入錢六百萬緡其後歷三十年東南嵗𣙜茶以斤計者浙東七州八萬紹興府溫台衢婺明處州浙西五州四百四十八萬臨安平江府湖嚴常州江東八州三百七十五萬宣饒徽信池太平州南康廣德軍江西十一州四百四十五萬洪贛吉袁撫江筠州建昌興國臨江南安軍湖南八州一百一十三萬潭衡永邵全郴州桂陽武岡軍湖北十州九十萬江陵府鼎澧辰沅歸峽鄂嶽州荆門軍福建五州九十八萬福建汀南劔州邵武軍淮西四州一萬舒廬靳州安豐軍廣東二州二千南雄循州廣西五州八萬靜江府融潯賔昭州皆有竒合東南産茶之州六十五總為一千五百九十餘萬斤通收茶引錢二百七十餘萬緡按茶引錢數原本錯入通收鹽息錢句下今移附於此鹽以石計者浙西三州一百十三萬臨安平江府秀州浙東四州八十四萬紹興府溫台明州淮東三州二百六十八萬通泰楚州廣東三州三十三萬廣惠南恩州廣西五州三十三萬亷髙欽化雷州率以五十斤為一石皆有竒以斤計者福建四州二千六百五十六萬福泉漳州興化軍合東南産鹽之州二十二總為二萬七千八百一十六萬餘斤通收鹽息錢一千七百三十餘萬緡此紹興二十五年數後增至二千四百萬緡乾道三年三月癸丑立額而四川三十州嵗産鹽約六千四百餘萬斤後𨽻總領財賦所贍軍成都府路九州利路二州嵗産茶二千一百二萬斤𨽻提舉茶馬司買馬皆不係版曹之經費焉蜀茶十一月庚子蜀鹽紹興二年九月甲申所書可參考責授祕書少監分司南亰筠州居住鄭滋復徽猷閣待制以言者論滋為李綱所惡謫非其罪也滋去年七月貶壬申詔訪聞髙麗國遣使入貢所過許用樂送迎其守臣宴設以二帝未還勿用樂顯謨閣待制知潭州曽開奉祠從所請也朝奉大夫辛炳落致仕除直龍圖閣知潭州炳方召還未至而有是命甲戌上策諸道正奏名進士於集英殿殿中侍御史馬伸試衛尉少卿日歷不書伸除官之日此據趙甡之遺史乙亥策特奏名進士庚辰詔東亰所屬官司般發祭器大樂朝祭服儀仗法物赴行在時上將祀天南郊命有司築壇於揚州南門內江都縣之東南而從行無器仗故取之舊都焉辛巳右武大夫忠州防禦使河北亰東都大捉殺使李成引兵入宿州初成既不能渡河朝廷恐其衆太盛命成分所部三千人往應天府及宿州就糧餘赴行在有道士陶子思者為人誕妄喜談兵成道遇之子思謂成有割據之相勸之西取蜀成遂有叛意乃分軍為二一侵泗州别將主之一侵宿州成自將之皆約八月晦日至是成陳仗入城宿人以其奉朝命來屯初不之備軍入未半即有登城者俄頃弓矢亂發縱火焚掠盡驅强壯為軍别將犯泗州者不及期乃焚虹縣而還復與成㑹成知事不集妄以前軍史亮反已即時撫定告於朝朝廷待以不疑乃就賜鎧甲成遂屯符離軍勢甚盛李成之叛日歷不見事始但於今年十月庚子因劉光世奏存恤成軍中老小事遂及之而熊克小歷乃於元年十月乙丑書命劉光世討成此實誤乙丑十月九日也蓋㑹要載光世以今年十月九日受命討李成而克誤移入去年是以差互今從趙甡之遺史繫此是月中書舍人黃哲試給事中哲除命日歷不書而九月壬辰薦士具銜乃如此按此月八日馬伸論二相疏猶云哲掌絲綸當是月末方遷故且附此俟考朝請郎王瞻為殿中侍御史此據御史臺記無月日按瞻當是代馬伸故附此月尚書工部員外郎滕茂實既為金所拘憂憤成疾至是卒於雲中紹興二年二月甲申贈官初吏部貟外郎程昌㝢與黃潛善論事不合出知蔡州郡已為金人所破軍馬散亡寇盜充斥昌㝢始至郡招集流民簡練師旅其命將也不限資格惟有功者居上日與羣盜戰每戰必克遂為强兵昌㝢家傳云二年八月至蔡州不得其初除故附見此金人遷二帝自上亰至其國御寨遂移居韓州王若冲北狩行録云戊申八月入見盡徙韓州之民出而㝢焉韓州在中亰東北千五百里去燕山二千五百里令下之日盡空其城以兵驅其民惟聽籠篋自隨凡財榖什物之類皆毋得賫持諸兵因之攘劫女戶及老弱之家有徒手而出者金遣晉康郡王孝騫等九百四人至韓州同處仍給田十五頃令種蒔以自養駙馬都尉蔡鞗嘗勸上皇讀春秋上皇大善之曰恨見此書之晚時御史中丞秦檜既不與徙遂依左監軍完顔昌以居昌亦厚待之上皇在韓州思張商英忠諌嘗為賦詩有嘗膽思賢佐之句云此以張匯節要王若冲北狩行録趙甡之遺史等書參修但甡之繫之春末恐誤世傳金人賜韓州供給二帝詔書其詞鄙陋非真今不取四年七月乙亥又遷五國城九月壬午朔詔以杭州和買絹偏重均十二萬匹於浙東西諸州癸未新除衛尉少卿馬伸責監濮州酒務伸以論事不行辭不拜且録其所劾黃潛善汪伯彥等疏申御史臺乞誅責詔伸言事不實趨向不正送吏部與亰東路監當促使上道死中路天下寃之三年二月丙子再召是日國信使楊應誠等以海州發髙麗後五日至明州昌國縣甲申武節大夫閣門宣贊舍人亰城外巡檢使丁進叛率衆犯淮西進初受宗澤招澤薨乃去時韓世忠軍中有進餘黨百餘人世忠盡斬於揚州竹西亭斬至王權有武臣假思者勸世忠釋而用之尋命御營右軍副統制劉正彥以所部收進庚寅上御集英殿賜諸路類省試正奏名進士李易等四百五十一人及第出身同出身而川陜河北亰東正奏名進士一百四人以道梗不能赴皆即家賜第特奏名張鴻舉已下至五等皆許調官鴻舉以龍飛恩特附第二甲易江都人鴻舉邵武人也故事殿試上十名例先納卷子御前定髙下及是御藥院以例奏上不許曰取士當務至公既有初覆考詳定官豈宜以朕一人之意更自升降自今勿先進卷子中興聖政臣留正等曰恭惟太上皇帝當建炎之初策士於庭一委主司不以一人之好惡為之升黜天下之至公也及紹興中權臣罔上假國家之科目以私其子弟親戚則聖斷赫赫然拔寒畯抑權貴以端仕進之路亦天下之至公也惟一出於至公故靜則為天地之度動則為雷霆之威傳曰公生明太上皇帝實有焉翰林學士葉夢得兼侍讀壬辰詔朝議大夫褚宗諤等二十一人並令乘驛赴行在祕書省校書郎富直柔太學正王覺並令赴都堂審察先是上嘗語大臣以從官班列未冨且謂黃潛善曰求賢宰相之職也宜加意詢訪因命取舊從臣姓名來上亦有召還復用者他日上又以人才未能廣收為言潛善乃請用祖宗故事命近臣各舉所知一二人以俟選擇於是戶部尚書吕頥浩舉宗諤兵部尚書盧益舉朝請郎惠柔民刑部尚書兼侍讀王賔舉新通判襄陽府程千秋翰林學士葉夢得舉直龍圖閣新知潭州辛炳朝散郎致仕王庭秀端明殿學士提舉醴泉觀黃潛厚舉登州州學教授鄒潛御史中丞兼侍講王綯舉通直郎蔡向吏部侍郎劉珏舉前秀州崇德縣令鄧根從事郎朱鞸禮部侍郎張浚舉直柔工部侍郎康執權舉王覺及朝請大夫李公彥給事中黃哲舉杭州州學教授李誼中書舍人黃唐傳舉朝請大夫知興化軍張讀中書舍人張澄舉從政郎致仕周虎臣等各二人上問輔臣今所舉士人卿等有識者否潛善曰臣等未識者數人亦皆知名之士上甚喜宗諤髙密人柔民晉陵人潛浩弟根邵武人鞸安吉人公彥臨川人誼南昌人讀閩縣人虎臣管城人也致和間虎臣為永康令部使者科須甚峻虎臣爭不聽即請老人惜其去繪像祠之至是得召庭秀炳直柔已見向覺未見是日葉濃入浦城縣癸巳金人陷冀州權知軍州事單某自縊死初權邦彥既以兵赴帥府勤王有將官李政者本雲騎卒以軍功授官措置守城甚有法紀律嚴明皆不敢犯金人攻城屢禦退之或夜劫金人寨所得財物盡散士卒無纎毫入私由是皆用命一日金人攻城甚急有登城者火其門樓與官軍相隔政曰事急矣能躍火而過者有重賞於是有數十人以濕氊裹身持仗躍火大呼力戰金人驚駭有失仗者遂敗走至是金以計誘其副將使害政故不能保而城陷後秦檜言於朝贈政忠州刺史此以趙甡之遺史及秦檜奏劄參修檜言政之功績在趙立之上是不可不書也政贈官在四年十一月甲子甲午詔䕫利州守臣並依成都府條例升帶本路兵馬鈐轄日歷無此今在紹興六年九月二十日席益申明狀修入乙未詔諸路禁兵𨽻帥府土兵射士𨽻提刑司即調發皆毋過三之一丁酉賜新及第進士錢千七百緡為期集費自是以為故事李易等以上憂勞辭聞喜宴從之紹興十七年十一月丁卯降㫖復舊宣教郎季洞充趙哲下參謀官時建州叛卒未平洞自言方臘之亂嘗在劍川招募民兵防托安靖無虞願往軍前悉力討捕故有是命詔列郡守臣帶管內安撫使者應軍期事並聽帥司節制戊戌上以所書資治通鑑第四冊賜黃潛善時上退朝日覽四方章奏暇則讀經史嘗取孟子論治道之語書之素屏因為潛善言論孟乃幼年所習讀之了無凝滯後五日又出旅獒篇大有大畜卦以示輔臣臣留正等曰人主之於學問有出於勉强者有得於自然者出於勉强則作輟有時得於自然須臾不能忘之矣辛丑陜西節制司將官賀師範及金人戰於八公原敗績師範死之初涇原統制官曲端既以留守司之命權河東經制使即檄鄜延經略司濟其芻粟方擬議間㑹經略使王庶被朝命節制陜西軍馬以端為都統制庶傳檄諸路併召端㑹雍耀間端以未受命為詞不數日走馬承受公事髙中立賫端告身至自行在庶遣人逹之諸路兵皆報應起發庶即以鄜延兵先出至龍坊而端又稱嘗有公移往還已奏乞回避涇原經略使席貢别遣統制官龎世才將步騎萬人來㑹庶無如之何則檄貢勒端還舊任遂遣師範趨耀州别將王宗尹趨白水且令原慶出師為援二帥各遣偏將劉仕忠寇鯶來與師範㑹庶欲往耀州督戰已戒行㑹龎世才兵至邠州端中悔以狀白庶言己赴軍前庶乃止師範輕敵不戒猝遇敵於八公原戰死二將各引歸端既得兵柄則傍徨於淳化矣壬寅統領密州軍馬權管州事杜彥獻赤芝彥言草葉純赤實符建炎美號形如指掌應股肱宣力之義殆將有熊羆之士窮討强敵蓋彥自謂也癸卯輔臣進呈上曰朕以豐年為瑞今密為盜區且彥所獻何足為瑞其還之甲辰黃潛善等奏謝宣示親書素屏易孟子有㫖勿拜上曰自朕幼習孟子書至成誦在口不覺寫出如旅獒乃因葉夢得進讀資治通鑑及之又欲寫無逸篇以其字多屏狹不能容見别營度上又曰如孟子言用賢與殺皆察於國人朕詳味斯言欲謹守之神交尚友如與孟子端拜而議詔福建路監司兵官並聽兩浙提㸃刑獄公事趙哲約期㑹合用御營都統制按察兩浙軍兵王淵奏也丙午詔京官已上非責降而間居奉祠者俸錢並全支去嵗用李綱言省三分之一至是遽復之丁未東亰留守司統制官薛廣及金人戰於相州敗死先是宗澤命廣與統制官張用王善㑹兵收復兩河用湯隂縣射士也乘民驚擾聚而呼之民之從之者甚衆其後受澤招安廣前驅才出城而澤卒杜充不善撫馭專務誅殺善復叛去而廣已渡河時相州受圍廣往救之入境遇金人與戰廣敗死其衆皆散己酉同知樞密院事郭三益薨是秋按原本繫己酉日下宋史作是秋諤爾昆逹蘭破五馬山寨信王不知所終一說信王在五國城事出傳聞難繫的日今從史冠是秋於此條之上河外元帥府都總管馬擴既北征㑹五馬山寨有亡告金人者同知真定府韓慶和副統素赫恐擴引兵而來言於右副元帥宗輔左監軍昌即大發兵至五馬山攻朝天鐵壁諸寨諸寨無井汲水於澗為敵斷澗道諸寨遂陷時擴在館陶慶和獲其母妻信王亡不知所在此據張匯節要靖康陷金皇族數云信王見在五國城與此不同西亰留守司將官王仔奉啓運宫神御始至行在建炎以來繫年要録卷十七
