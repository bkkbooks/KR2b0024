body:
  text: 建炎以來繫年要録卷一百二十一宋李心傳撰紹興八年秋七月乙酉朔詔徽猷閣直學士提舉萬夀觀王倫假端明殿學士為奉迎梓宫使大理寺丞陳括為尚書金部員外郎假徽猷閣待制副之殿中侍御史張戒復上疏請外則姑示通和之名內則不忘決戰之意而實則嚴兵據險以守又曰自古能守而能和者有矣未有不能戰不能守而能和者也使真宗無逹蘭之捷仁宗非慶歷之盛雖有百曹利用百富弼豈能和哉又曰茍不能戰不能守區區信誓豈足恃也樞密院計議官陳康伯充本院編修官詔以司馬光族曽孫伋為右承務郎嗣光後丙戌直顯謨閣知台州耿自求行太府少卿尚書左司員外郎薛徽言為中書門下省檢正諸房公事右司員外郎閭邱昕程克俊並守左司員外郎吏部員外郎范同司勳員外郎陳槖並守右司員外郎丁亥右武大夫榮州防禦使知閣門事藍公佐假慶逺軍承宣使充奉使大金國奉迎梓宫副使代陳括也先是王倫請括自副括見輔臣言國家多事臣子不敢辭若朝廷遣臺省諸公括願為之副如欲令括副王倫之行則不敢奉命也於是以公佐代行仍黜括監浙東州酒稅此以紹興正論修入括送部與監當在八月丙辰徐夢莘北盟會編云上召馬擴既至令入館見思謀因敘海上相見之好且屈指舉諸帥小字詢其安否思謀皆舉其封諡之號以答之因踧踖不安時復欲以馬奉使思謀懼其小已也乃繆曰馬某舊往來奉使國中甚敬之今若再遣恐必見留遂信不遣姑附此當考戊子樞密副使王庶留身言臣前日在都堂與趙鼎等同見金使再詢得烏凌阿思謀在宣政間嘗來東京金人任以腹心二聖北狩盡出此賊今日天其或者遣使送死雖虀醢之不足以快陛下無窮之寃今陛下反加禮意大臣溫顔承順臣于是日心酸氣噎如醉如癡口未嘗交一談目未嘗少覘其面君辱臣死臣之不死豈有所愛惜耶臣又竊聽其語詭祕譎詐無一可信問其來則曰王倫懇之論其事則曰地不可求且金人不遣使已數年矣王倫何者能邀其來乎地不可求聽我與汝若無金主之意思謀敢擅出此語乎臣曉夜尋繹此語彼必以用兵之久人馬消耗又老師宿將死亡略盡又敵人互有觀望故設此䇿以休我兵候稍平定必尋干戈今若茍且目前以從其請後來禍患有不可勝言者矣設如金人未有動作損陛下威武離天下人心蠧耗財賦怠惰兵將歲月易失凶豐不常所壞者國家之事力所憂者陛下之宗祏臣下無所不可今走道途號奉使者朝在泥途暮升侍從居廟堂任經綸者竊㺯威柄専任私昵豈止可為流涕慟哭而已哉臣以忠憤所激肆口所言冒瀆天聽乞賜誅責臣不勝願幸日歷七月戊子王庶留身奏事當即是此劄子也後數日庶又言伏思大宋有天下垂二百年矣祖功宗德重熙纍洽雖唐未易可擬偶崇觀之後太平日久上倦萬幾委政宰輔姦人弄權橫生邊事強敵因之虔劉兩河板蕩中原凶熖酷烈痛不忍聞宗社幾致中絶賴天道好還人心思漢戎馬之間陛下出繼大統天下翻然改圖以謂喪君有君恃此不恐殆天意也爾後匹馬渡江扁舟航海以至苖劉之變艱難百端終無所傷天之相陛下可謂厚矣至矣今雖未能復兩河取鞏洛定山東舉關右而大將互列官軍雲屯比之前日可謂小康矣又據長江以自衛萬全計也何苦不念父母之讎不思宗廟之恥不痛宫闈之辱不恤百姓之寃含糊淟涊姑從謬悠不能終始以墜大業非特逆天其所以辜人望者未可以一二數也伏願陛下反覆前後鑒觀天人勉思良圗以冀善後天下之福也社稷之福也陛下之福也庶又言金人之謀不過有二一則為我一則為己捨此非狂則愚也所謂為己者不過乎彼內訌外叛互相猜二擁兵角立莫敢先動故預設此謀以待平定徐為後圗此為己之計也所謂為我者必以為金幣已足不須多積土地已廣不須多占又陛下事之至謹心懷仁恕懇之至切哀憫悔禍欲立盟好永為鄰壤此為我之謀也陛下試深思之若敵為已謀臣固慮之熟矣若為我謀臣不敢信惟陛下留念毋忽中興聖政上宣諭曰朕歷覽前古治道三五恐未易及如漢文景唐太宗當力行之或可幾輔臣奏以陛下聖學髙妙兼睿斷如此天下安得不治臣留正等曰矜虛名者罕成功務實用者享殊效夫惟髙談邃古逺慕鴻荒思欲超然遐舉于三五之上者其名非不甚美然責之成效終莫能致也漢文帝曰卑之無甚高論令今可行也崔實曰當今不必純法八代體堯蹈舜其言雖若淺陋而實用存焉太上皇帝天縱神聖備道全德固已登三咸五視古無前而曰三五恐未易及至漢文景唐太宗所優為也則曰當力行之豈非斥虛名而務實用之謂耶易曰有大而能謙必豫臣於太上皇帝見之矣己丑故武功大夫貴州刺史狄流特贈拱衛大夫貴州防禦使官其家五人流青孫也靖康間為并代雲中等路亷訪使者太原之陷死焉其家訴于朝乃有是命庚寅御史中丞常同充顯謨閣直學士知潮州中書舍人潘良貴充集英殿修撰提舉江州太平觀免謝辭先是趙鼎奏向子諲無罪當留同與潘良貴亦所以為子諲蓋外議猶以子諲久對為非良貴實出于愛君也二人既出給事中張致逺謂不應以一向子諲出二佳士上怒作色顧鼎曰固知致逺必繳凡再言之鼎曰陛下何以知之上曰與諸人善趙鼎事實曰時蓋有先入之言上聞鼎奏由是不樂後數日右相秦檜留身奏事甚久既退鼎叩之曰上無以前日之言有語否檜曰上無他但患相公不樂耳鼎乃信而不疑徽猷閣直學士王倫言兵部侍郎司馬朴見在軍前守節不屈乞優恤其家以為忠義之勸許之偽豫之廢也金人欲以朴為汴京行臺尚書右丞朴力辭而免金重其節上因倫行錫以黃金茶藥焉賜朴黃金等事以附傳修入辛卯尚書户部侍郎向子諲充徽猷閣直學士知平江府子諲請致仕疏三上乃命出守子諲入辭備録榻前奏對之語已見六月癸未及所以稍久之故且言潘良貴初不聞所論何事輒有紏彈陛下猶與臣畢其説而後退竊見良貴待罪之章乃謂臣以無益之言久煩聖聽欲乞將上件事迹宣付記注庶幾不纍聖德從之子諲此章以八月庚申付出今併附此右正言李誼試右諫議大夫癸巳祕書省校書郎孫道夫知懷安軍先是席益為四川大帥奏以湖南軍屯于成都益既以憂去道夫見輔臣論自漢唐以來據蜀如公孫述與孟知祥輩皆非蜀人成都無警益乃移軍屯之昨幾有竊發之變願還之舊處以減糧餉又比年使蜀冠蓋相望如劉子羽方出而范直方又行往來之費公私騷然未聞有能宣德意者願且止之以息浮費丙申直祕閣都大主管成都等路茶馬監牧公事張源為四川轉運副使兼權茶馬監牧公事直徽猷閣川陜宣撫使司主管機宜文字高士瑰為四川轉運判官自成都移司利州士瑰未至官丁憂詔起復士瑰以十月九日起復此以本司題名增入日歷無之左從事郎新漳州州學教授李經特改左宣義郎經綱弟也嘗除太學博士未上而省至是召對遂以為祕書省校書郎經除校書在是月壬子丁酉金國人使烏凌阿思謀入辭上每及梓宫事必掩泣羣臣無不感動思謀為右副元帥宗弼所信動靜皆咨之後遷沁南軍節度使知懷州進士及第黃公度為左承事郎簽書平海軍節度判官廳公事禮部言祖宗故事不䇿試則榜首補兩使職官上特命授京官自是以為例戊戌王倫辭行倫至都堂稟所授使指二十餘事一議和後禮數趙鼎答以上登極既久四見上帝君臣之分已定豈可更議禮數二割地逺近鼎答以大河為界乃淵聖舊約非出今日宜以舊河為大河若近者新河即清河非大河也二事最切或不從即此議當絶倫受之而去此據趙鼎事實庚子中書舍人勾龍如淵入對上曰朕本用卿直學士院而趙鼎薦吕本中他日本中罷則用卿矣上又曰卿與樓照皆朕親擢中書事有當論即奏來如張致逺吕本中皆作附麗計者人誰不由宰相進致逺亦太甚上久之曰李授之進易解朝廷議與一職名本中毅然欲繳既而知授之乃趙鼎為諸生時教授也遂已殊可怪上又曰近日常同潘良貴事如何如淵曰良貴不為無失然素忠直望陛下優容之上色不平如淵曰天下事未有不起于微者比因此三人之出朝臣中有不能安者臣恐朋黨之議由此起上曰朋黨之説果已有之數日前趙鼎言聞朕要用周祕為中丞陳公輔為諫議朕何嘗有此意如淵曰聞李誼亦嘗有章劾良貴今陛下擢誼為諫議臣乃知陛下罪同者在其論事前後相戾而不在良貴也上唯唯此據如淵退朝録丁未右武大夫開州團練使劉錡充樞密院都統制依舊鎮江府駐劄辛亥詔殿前司䇿選鋒軍統制吳錫還行在令本司别遣一軍往廬州權聽帥臣張宗顔節制先是宗顔乞令錫更戍上曰錫有膽勇心計然不可獨用可趣歸令楊沂中别遣軍代之趙鼎曰沂中已嘗有此請矣鼎等退而語咸服上知人善將將之明焉癸丑左從事郎祕書省正字兼史館校勘范如圭特改左宣義郎制曰紹聖元符之間姦人得志首陳紹述之説以脅持上下次為廢立之議以誣謗宣仁傷泰陵孝治之風失神祖勵精之意凡是羣邪之舉措皆非當日之本心貽患至今餘風未殄載觀舊史實駭豫聞爰命儒臣復加筆削以爾如圭承外家之學懷疾邪之心維此一代之書遂為不刋之典改秩之寵厥有故常尚悉所聞以究而事如圭胡安國姊子也近制三衙管軍更日內宿事見建炎元年十月至是殿前都虞候楊沂中己免直今年四月癸未惟權馬軍司公事解濳與殿步二司統制官互輪濳又言今來無事乞依東京舊例乃詔濳權免只分輪統制官右諫議大夫李誼聞之引晉唐故事奏且言今萬騎時巡宫闕非曩之壯大禁衛非曩之衆多內外之患可備非一而管軍夜居于外是濳等之寢則安為宗社之慮則未安也望令沂中與潛依舊輪宿上嚴宸極從之尋命帶御器械韓世良權主管侍衛步軍司公事世良權步司日歷不見勾龍如淵退朝録載今年十二月取國書事三衙內有世良名未知以何日除今因內宿事附見是月四川制置使胡世將至遂寧府遂會川陜宣撫副使吳玠于利州時軍闕見糧玠頗以家財給之玠行至大安軍婦人小兒飢餓者千百擁馬首而噪玠大怒謂曰吾當先斬勾光祖然後自劾以諭汝輩光祖時以直祕閣為利州路轉運副使故也異時宣撫副使皆文臣而玠起行伍不十年為大帥故不肯相下誠意不通及是世將開懷與語玠歡甚語人曰宿見胡公開懷曉事使我憂悶豁然世將行之明日玠乃械諸路漕司吏斬于市餘怒尚如此先是水運泝江千餘里半年始達陸運則率以七十五斗而致一斛世將與玠反覆共論玠亦曉然知利害所在世將又以恩義開諭且貸閬州守將孫渥回易米數萬石給之諸路漕臣相繼集利州各有所餉饋軍賴以給乃復前大帥席益轉般摺運之法糧儲稍充公私便之玠欲斬勾光祖事以費士戴蜀口用兵録增入或曰玠初欲斬四路漕臣幕客止之曰轉運使皆上所命而宣撫擅斬之是跋扈也玠乃止猶斬其都史八月按是月甲寅朔乙卯宗正少卿蕭振試侍御史詔右承事郎陳淵爭臣瓘從孫學術通達國體特賜同進士出身淵時以選人監嶽廟召對改京秩遂以為祕書丞淵改官在七月丁亥入館在八月丙辰考功員外郎鄭剛中言陛下臨御以來寬仁愛物於古有光而臣下持法之心頗與古異大率有司皆不肯以身任怨縣有罪郡守不敢劾留以俟監司郡有罪監司不敢按留以俟臺諫某事於法不可行也郡猶問于監司監司問六部六部問朝廷作聖旨罷之某事於法不可得也郡猶請於監司監司請六部六部請朝旨作聖旨奪之積日纍月罷之奪之皆自一人出而百官有司無一拂戾人情者苛察之怨日歸於上姑息之恩各歸諸已此豈善風俗持久之道乎臣願陛下戒敕臣吏各使持職奉法凡豫奪之際自有成書無大疑惑者不得互相推避其失職廢法全身避怨者咸按之上納其言令學士院降詔布告中外戊午詔曰日者復遣使人報聘鄰國申問諱日期還梓宫尚虞疆場之臣未諭朝廷之意遂弛邊備以疑衆心忽於逺圗安於無事所以遏奔衝為守備者或至闕略練甲兵訓士卒者因廢講求保圉乏善後之謀臨敵無決勝之䇿方秋多警實軫豫衷爾其嚴飭屬城明告部曲臨事必戒無忘捍禦之方持志愈堅更念久長之計以永無窮之聞以成不拔之基凡爾有官咸體朕意太常諡故追復龍圖閣學士錢協曰文肅用其子徽猷閣待制伯言請也協吳越王宏倧曽孫元祐翰林學士黨籍從官第十一人己未進士徐士龍上書論事詔倍賜束帛庚申上與趙鼎語及瑶華誣謗因言有一內侍頗能道當時事所謂雷公式者止是一漆木盤子如今日發課看命盤子之類厭魅之端實起於昭慈之妹六夫人者一日福慶公主病六夫人取道家符水以入昭慈問所從來取符焚之自是禁中相傳有厭勝之事及公主疾甚忽於簾間得紙錢昭慈見而惡之或謂自媫妤所持來自是頗有疑心上曰以此數事觀之既有疑似故姦人得以進誣罔之説此哲宗聖聽所以惑也鼎曰借使實有之止是婦人求媚之事與前世巫蠱呪詛不同何足深罪上曰然端明殿學士提舉臨安府洞霄宫韓肖胄知常州殿中侍御史張絢試宗正少卿絢感疾不能朝力丐奉祠故有是命左從事郎新建康府府學教授髙布特改左宣義郎以薦對也俄召試除祕書省正字布除正字在九月辛酉輔臣進呈左朝散大夫吳説曾與苖傅輩欵密屢為言事之臣彈劾十年不得調上因語宰執曰説纍赦不得自新非朕用人之意可諭言官負釁被廢之人或已嘗行遣勿復再有論列壬戌端明殿學士提舉亳州明道宫章誼卒詔以留守建康之勞賜其家銀帛二百匹兩後諡忠恪甲子趙鼎等奏親衛大夫利州觀察使馬擴將到奉使録記海上之盟約金人夾攻事上以為人君不當有此心臣下不當進此説外國之與中國如隂陽消長豈能偏廢若可勦除漢唐之君行之久矣時北使已去復命擴以沿海制置副使屯鎮江故執政及之龍圗閣直學士新知婺州范沖提舉江州太平觀以病自請也乙丑試尚書禮部侍郎曾開兼侍讀權尚書禮部侍郎張九成兼侍講徽猷閣待制江淮荆浙等路經制發運使程邁入見言劉晏為九使財賦悉歸于一國朝始分為二而三司使居中發運使居外相為表裏今租庸分于轉運司常平分于提舉司鹽鐵分于茶鹽司鼓鑄則有坑冶司平凖則有市易司總之以户部而發運使徒有其名臣恐未及施為而議論蜂起上溷聖聽上乃督邁使亟行且諭以置場和糴毋甚賤傷農邁曰臣敢不遵聖意於是降本錢四百萬緡令於六路豐熟之地置場和糴焉降本錢事日歷不載今以十一月十七日户部供到狀修入丙寅詔侍讀曽開讀三朝寶訓侍講吳表臣講孟子張九成講春秋吕本中講左氏傳崇政殿説書尹焞講尚書既而本中辭兼局乃命中書舍人勾龍如淵兼侍講如淵兼侍講在是月庚辰九成在經筵一日論日食奏曰日食之變本於惡氣惡氣之萌本於惡念不芟夷藴崇之絶其根本將奔騰四達上觸乎天則日月蝕薄五星失序下觸乎地則災及五穀怪妖迭見中觸乎人則為兵為火札瘥備至則惡念之起可不應時撲滅乎上聳然曰誠在朕念慮間當為卿戒之九成進講畢上嘗論王道曰易牛微事耳孟子遽謂是心足以王朕竊疑之九成曰陛下不必疑疑則心與道二不忍一牛仁心著見此則王道之端倪推此心以往則華夏蠻貊根荄鱗介與天下萬物皆在陛下仁政中豈非王道乎他日上謂近臣曰朕於張九成所得甚多九成行述云上語侍講陳淵云云按淵紹興十年二月始兼崇政殿説書今併附此但削其名爾丁卯集英殿修撰知瀘州何慤集英殿修撰知臨安府張澄並升徽猷閣待制時臨安守臣任同京邑而澄有治劇之才甚得時譽中書言慤自除權侍郎已滿再嵗故並陟之中興聖政是日進擬栁州南雄州知州上曰廣南去朝廷逺守臣尤當遴擇前日連南夫奏廣南盜賊殺戮過多要降詔朕以謂盜賊固當殺戮只恐害及平人有傷和氣若得守令平日存撫使不為盜乃上䇿也如江西州縣長吏或昏繆不職或貪贓害民豈可不問臣留正等曰太上皇帝聖明照四海故於江西二廣之逺無一日不軫聖慮焉按舉之吏為逺而重其權也檢察之使為逺而専其選也決獄之官為逺而勤其行也周利見將漕廣南上因臨遣諭之曰廣南去朝廷逺監司耳目之寄卿到所部為朕悉意愛民若貪贓害民之人卿須按劾有體國愛民者便須薦舉則按舉之權重矣又嘗諭宰執曰朕夜來思慮江西盜賊未息使平民不得安居州縣不能存撫致百姓失業不得已而為盜可差監察御史一員前去檢察并降詔榜曉諭則檢察之選専矣又嘗因大理寺奏二廣結滯獄欲就委鄰路選官上曰二廣去朝廷逺民間寃滯無所赴訴尤當欽恤正須本寺守前去如江浙近地苟有寃抑不患不聞止令帥司選官則決獄之行勤矣至於是又以州縣長吏為念蓋聖心之不忘逺類如此戊辰監察御史張戒守殿中侍御史前二日上命戒入對遂有是命左迪功郎德安府節度推官張節夫以招諭劉永夀之勞特改左承務郎劉永夀事已見正月辛丑甲戌中書舍人兼直學士院吕本中兼史館修撰祕書省正字常明兼史館校勘本中奏曾祖公著祖希哲皆係元祐黨籍若記録當時舊事實有妨嫌且使後來生事之人得以藉口不從右朝奉郎新知滁州王安道罷時左迪功郎袁煥章以特奏名賜第乞為諸州教授許之中書舍人吕本中極論士不知義求利無厭之弊請寢煥章除命又言故事凡中都官自太學博士改官乞去者皆除諸州簽判當時已號優寵館職太常博士監丞正隨資序深淺大抵多得通判亦少有得郡去者因論安道等三人資序尚淺未有顯功故皆寢之丙子監察御史黃鍰為江南西路提點刑獄公事以病自請也丁丑徽宗皇帝實録開院用故事賜史館官茶酒監修官趙鼎奏曰先帝以仁厚之德涵養天下幾三十年其間法令有未盡善者皆出於羣臣貪功冒賞之私而有司壅於上聞非先帝本意劉大中宣和初知如臯縣時有旨即隱者徐神翁所居建為觀而基包士民墓甚衆大中顧有司不能決乃具圗申省且束裝待罪洎取旨先帝愕然曰豈可發民墳墓即詔移之别地則知當時有不便於民者使先帝悉知未有不改之者此羣臣之罪而蔡京為之首也上深然之以至泣下鼎又曰崇觀之失不歸之蔡京使何人任責今士大夫力主京者皆厚私恩而薄祖宗之人也願陛下深察之戊寅祕書省著作郎史館校勘何掄為祕書少監先是李彌正髙閌既除郎今年三月而掄與張嵲皆未遷樞密副使王庶疑之以問趙鼎曰少需處之要職至是乃有此授祕書省正字凌景夏為著作佐郎右承務郎丁騤落致仕騤為上元簿年五十餘挂冠去至是資政殿大學士張守言騤學行吏事皆有可觀恬靜安貧初無疾恙故復令出仕己卯左通奉大夫馮射厚卒庚辰監察御史李寀為江西宣諭先是上以虔吉等州盜賊未息議令殿前司遣兵往捕又慮州縣不能撫恤致其不得已為盜欲先遣御史持黃榜招諭使之改過歸業俟其不悛然後戮之前三日以諭宰相至是舉行焉辛巳宰執奏禁塗金鋪翠鹿胎等首飾上曰宫中禁之甚急民俗久當自化不必過為刑禁也壬午祕書省著作郎何掄罷掄既遷少監而殿中侍御史張戒言張浚入蜀掄為之鷹犬去嵗浚獨相自以黃濳善乃王黼之黨每持邪説以司馬光為非以王安石為是至再修神宗實録掄攘臂其間略無所忌浚敗乃焚燬籖貼國家大典豈宜屢易以徇權臣之私意右諫議大夫李誼亦言陛下命羣儒訂正舊史以明國論前宰相張浚狃於習尚遽欲取其書而竄易之是時掄實贊其事以掄之議論如此今復使之參預史書已為非宜而况進處中祕之長為東觀諸儒之冠欲其扶持正道不亦難乎侍御史蕭振亦言掄性姿佻浮本無操守奴事張浚川陜十年官為正郎浚作相掄遂入館其後攝左史浚兄滉賜出身公議不以為然中書舍人張燾樓照皆相繼繳還詞頭掄當行詞既重違浚又恐得罪于公議遂操兩可之説搢紳鄙之方浚之専政也欲竄易舊史掄首附其意旨凡所籖貼自云改字舛訛然頗主異議浚罷掄不自安遂撤去前日籖貼焚之掄之趨操議論不端如此何足以服多士乃出掄知邳州日歷掄自左宣教郎入館而振劾疏稱官為正郎蓋入館時猶未換給也詔右宣義郎李良輔已差主管台州崇道觀指揮勿行良輔河南人大觀間為零陵簿以告訐胡安國薦范純仁之客由是改官至是來臨安得宫觀而中書舍人吕本中論其宿負以為邪正之間有傷事體伏望特行貶竄故復奪之王明清揮麈後録李良輔者憸人也元符末任永州主岐陽簿有教授李師聃祖道蜀中老儒黃太史魯直之姻家善士也范忠宣遷是郡祖道作詩慶其生初有江邊間艤濟川舟之句良輔與之有隙遂上其本祖道坐此削籍流九江良輔用賞改秩寖至郡守建炎初吕元直當軸良輔造朝求差遣元直舊知其事詢所以然良輔猶以為績效歷歷具陳之元直笑曰初未知本末之詳正欲公自言之爾即命直省吏拘于客次奏于上除其名人皆快之明清所云良輔除名事日歷不書當求他書附本年月以胡安國行狀考之永州守二教官乃以安國舉遺逸王繪鄧璋之故連坐且是時范純仁之薨已久明清亦小誤也癸未詔故贈觀文殿學士李若水特與致仕遺表恩澤若水之死節也上命官其家五人至是其母張氏援陳亨伯例有請兵部兼權吏部尚書張燾言若水忠義顯著又非亨伯之比望特從所乞以為天下臣子之勸故有是旨焉是月御筆和州防禦使璩除節鉞封國公執政聚議樞密副使王庶大言曰並后匹嫡古以為戒此豈可行左僕射趙鼎謂右僕射秦檜曰鼎前負曖昧之謗今不敢奏須公開陳檜無語翌日進呈鼎奏曰今建國在上名雖未正恩數宜小異又曰建國名雖未正天下之人皆知陛下有子矣以前後恩數並同皇子又昨幸平江及謁太廟兩令建國扈蹕國人見者咨嗟太息此社稷大計蒼生之福也至於外間稱呼之語豈不聞之臣身為上相義當竭忠以報陛下在今日禮數不得不異蓋以繫人心不使之二三而惑也後數日參知政事劉大中奏事亦以為言命遂寢此據趙鼎事實事實又云執政聚議之日秦檜曰陳去非在政府時已有此意但未及行不知公之意如何鼎再叩其可否而竟無一言却問鼎意如何鼎謂已有其一名雖未正意亦可知不當更使一人參之翌日進呈檜不復措辭鼎奏云云後數日劉大中參式假亦以此開陳秦檜亦嘗留身不知所説何事後十餘日鼎請問再言之退謂檜曰朝廷惟患所見不同所以不能成事議論既一雖天意可回同寅協恭其效如此吾輩不可不勉初不疑中有異論者及鼎上章解機務上曰前日所議璩建節事如何鼎又如前所陳是時若能雷同相徇即留而不去矣鼎既去明年正月遂建榮國公乃知檜所稟者不然也方疇稽山録曰時左相趙鼎語右相秦檜曰公嘗説丙辰罷相之後議論鼎者專以資善堂藉口鼎今日當避嫌公專面納此御筆如何檜曰公為首相檜豈敢專公欲納之檜當同敷奏也鼎約檜與劉大中各將劄子至唯檜無之鼎遽參酌只作一劄子明日鼎又語檜同進呈尤好檜復曰公為首相檜不敢專明日進呈鼎奏曰祖宗受天命當傳萬世陛下仁孝子孫千億未可謂無也但宗子某已封建國只是小國今某封吳國公却是全吳臣欲且與建節或封一等小國上曰都是小孩兒且與放行鼎執奏再三且曰兄弟之序不可亂上意難之遂留御筆曰待三五箇月别商量既下殿樞密王庶西人氣直謂鼎曰公錯了也檜曰檜明日留身敷奏明日檜留身又明日鼎留身奏曰昨所納御筆不知檜與大中有何奏上曰大中與卿一爾疇所云與鼎事實小異今並存之璩明年三月建節封公權禮部侍郎兼侍講張九成兼權刑部侍郎先是刑部吏斷天下死囚不以情自九成蒞職有情輕免死甚衆一日法寺以成案上大辟九成閲始末得其情因請覆實囚果誣服者也奏黜之時法官抵罰而朝論欲以平反為賞九成辭曰職在詳刑而賣衆以邀賞可乎此以九成行述修入刑部題名九成權侍郎在此年而無其月然已繫兼侍講銜九成兼經筵在八月丙寅故且附月末俟考川陜宣撫副使吳玠以護國軍承宣使知利州權節制利州屯駐諸將軍馬田晟知興元府注利州知州題名八月九日改除興元知府題名九月到任建炎以來繫年要録卷一百二十一建炎以來繫年要録卷一百二十一金人地名考證達蘭原書作撻覽誤改見卷一烏凌阿原書作烏陵誤改見卷一
