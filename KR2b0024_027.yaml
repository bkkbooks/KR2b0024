body:
  text: 建炎以来繫年要録巻二十七宋李心傳撰建炎三年閏八月丁丑朔御筆朕嗣位累年凡可以睦隣息兵者卑辭降禮無所不至而敵人侵陵有加無已未有休息之期朕甚憚之比命杜充提兵防淮然大江之北左右應接我所守者一由荆襄至通泰敵之可来者五六兵家勝負難可預期朕欲定居建康不復移蹕與夫右趨鄂岳左駐吳越山川形勢地利人情孰安孰危孰利孰害三省可示行在職事管兵官條具以聞始張浚建武昌之議吕頥浩是之有成説矣浚行未㡬江浙士大夫揺動頥浩遂變初議是日召随駕百官及諸統制赴都堂至晚以二十五封進入大率皆言鄂岳道逺饋餉難繼又慮上駕一動則江北羣盜乗虛過江東南非我有矣翌日輔臣入對上猶未觀謂頥浩曰但恐封事中趨向不一昔真宗澶淵之役陳堯叟蜀人則欲幸蜀王欽若南人則欲幸金陵惟冦凖决䇿親征人臣若不以家謀専為國計則無不安利矣然卒定東廵之䇿戊寅尚書工部侍郎兼知建康府湯東野提舉應副六宫事務先徃平江按六月壬寅詔書隆祐皇太后率六宮先往豫章以趙鼎扈從録考之潘賢妃實從今此猶有所謂六宫者豈非上左右侍御之人邪四年六月己亥注云可考徽猷閣待制知盧州胡舜陟知建康府充㳂江都制置使集英殿修撰王羲叔副之先是舜陟言欲専治軍旅前迎大敵以謀與戰仰䕶行在王綯曰舜陟語甚壮似可託以方面上曰言未可信須在行事㑹兵部侍郎㳂江措置使陳彦文引疾罷為龍圖閣直學士在外宫觀乃卒用之自軍興後淮西八郡羣盜攻蹂無全城舜陟守廬二年安堵如故繇是廬人徳之龍圖閣直學士知平江府孫覿罷仍奪其職以言者論覿嘗建明王安石常平聚歛之法也時覿在平江拘催民間崇寧以来青苖積欠民苦其擾上聞亟下詔除之下詔在九月己未今併附見資政殿學士提舉杭州洞霄宫李邴知平江府初以防秋起江浙福建湖南等路禁兵屯扵昇江蘇潤荆襄六郡而宣撫處置使張浚以江東諸州地多要害用便宜止之己卯以聞然議者謂浚所得便宜之命當用扵川陕軍前今甫出國門而遂用之非也議者盖朱勝非乙酉詔諸路復置提舉常平官指揮勿行用殿中侍御史趙鼎䟽也鼎之䟽曰臣聞漢昭元年罷㩁酤均輸之法唐順宗即位罷月進羡餘之資如拯溺救焚惟恐其不及所以固邦本扵不㧞延世祚扵無窮恭惟陛下即位之元年即降指揮罷常平官吏蠲免常平錢榖詔下之日無逺無近鼓舞歡呼仰戴惟新之政而去嵗之冬初復有指揮置提舉官根刷諸司侵支催理民間舊欠諸司侵支固豈入已非軍期犒賞則月給錢糧逼使撥還亦非已出奪彼與此有何利害民間舊欠所在皆然非逃亡人民則庸胥猾户廹令輸納號令不行良善之氓例遭抑配開猾吏衣食之源遺平民椎剥之苦人心駭愕物論紛紜使陛下重失人心特在此舉繼聞有㫖委從官詳議渡江之後未即施行而逺方官司奉承不暇修飾廨舍召置吏人供帳什物之資增給禄廪之費不知其㡬何也近據監察御史林之平申福州一州已使過錢三萬餘貫則其餘州縣計不减此提舉官差與不差提舉司置與不置元無明降指揮徒使四方奉行違戾竊惟歛散本非良法知取債之利而不知還債之害前言固已曲盡扵人情而今乃督責扵既已放免之後其為嗟怨豈特還債之比邪臣願陛下明降睿㫖一依建炎元年指揮罷提舉常平官吏放見錢榖仍令追理耗用樁充錢本復舊平糴之法不惟陛下䘏民之詔不為空言而使斯民復見祖宗之政矣䟽奏從之是日上謂輔臣曰士大夫間有言李綱可用者朕以其人心雖忠義但志大才踈用之必亡人之國故不復用呂頥浩曰臣等與綱素無嫌隙原其心非故欲誤國但志大才踈耳上曰如聴邢倞言遂結伊都金人至今以為釁端周望曰如宣撫河東先扵河陽納置級軍金人聞而笑之亦足見其踈也丙戌御營使司參議官柳約請令土豪募民防江不仰給縣官者二百五十人官其首仰給者倍之先是㳂江制置司乞計人數正補官資更不借補上曰自崇觀以来爵秩叨濫日甚一日如小使臣闕只二萬餘今借補者何啻三五十萬将来事平未知何以處之呂頥浩曰若分布諸州縣止給俸錢即不難處也王綯曰富貴人主操柄若使臣下得假将何以馭臣上甚以為然丁亥輔逵攻漣水軍南寨大掠之殺漣水軍使朝請大夫郝璘丞修職郎吳深此以紹興二年四月十五日璘家乞推㤙狀增修遂以其衆降扵淮南招撫使王􅊛先是太學博士孟健自海州率民兵數千勤王至漣水軍南寨因留焉逵攻之數月及䧟健與其家皆死後贈璘等官録其家有差健初見二年三月紹興五年四月己酉推㤙深三年五月癸未推㤙今並附此是日上召諸将問以移蹕之地御前右軍都統制張俊御營都統制辛企宗勸上自岳鄂幸長沙左軍都統制韓世忠後至曰國家已失河北山東若又棄江淮更有何地上乃命内侍押三人赴都堂議上聞俊等退避之説殊怫然至晚不食戊子呂頥浩等入對上謂曰俊企宗不敢戰故欲避扵湖南朕以為金人所恃者騎衆耳浙西水鄉騎雖衆不得騁也且人心一揺雖至川廣恐所至皆敵國爾頥浩曰金人之謀以陛下所至為邉面今當且戰且避但奉陛下扵萬全之地臣願留常潤死守上曰朕左右豈可無宰相周望曰臣觀翟興李彦仙輩以潰卒羣盜猶能與金兵對壘拒守陕洛臣等備位宰執若不能死戰以守異日何顔見彦仙輩臣實耻之上曰張守入對言不如留杜充建康不可過江頥浩曰臣與王綯周望韓世忠議本自如此上又欲令世忠守鎮江府劉光世守太平及池州頥浩等以為然防淮之義遂格己丑尚書右僕射同中書門下平章事呂頥浩進左僕射同知樞宻院事杜充守右僕射並同平章事兼御營使充既升宥宻自言中風在告上知其不滿且以充久司留鑰天下屬望将授以兵柄故越次用之制下四日充即起視事熊克小歴命二相在丁亥今從日歴充止進一官為太中大夫蓋當制學士失之參知政事王綯兼御營副使是日通奉大夫范致虛入對先是右正言呂祉言致虛之才在今日可當一面雖有過宜棄瑕用之乃自謫籍中召赴行在而右諌議大夫富直柔力言致虛不當復用遂除資政殿學士知鼎州祉亦随罷諌職祉除外任據諌院題名在此月日歴無之武功大夫忠州刺史知濟南府宫儀屯盤石河數與金戰勝負畧相當金人患之乃宣言宫太尉馬軍五不能當我之一然歩軍絶勝儀聞之以為然金人屯宻州北二十里時出兵而南儀禦之敵佯若不勝而退儀易之敵伺知其懈至是引兵攻儀馬歩俱進方戰馬軍少却既而分為兩翼直攻中軍儀猶不知衆遂大潰儀與京東經略安撫制置使劉洪道奔九仙山敵又逼之洪道以餘兵二千奔海州李逵吳順乃以宻州降金洪道過楚州為郭仲威所敗遂至真州詔儀即真州屯駐淮東副總管靳賽以所部詣御營副使劉光世降光世因以為将就統其軍人人皆喜庚寅起居郎胡寅上䟽曰臣伏覩詔書以敵人侵凌備禦不給遂有移蹕之意右顧岳鄂左趨吳越安危利害下訪羣臣臣聞孔子曰成事不説遂事不諫既往不咎今臣所陳不免追咎既往者盖謂建炎以来有舉措大失人心之事今欲復收人心而圖存則既往之失不可不追不可不改故也一昨陛下以親王介弟受淵聖皇帝之命出帥河北二帝既遷則當糾合義師北向迎請而遽膺翊戴亟居尊位遥上徽號建立太子不復歸覲宫闕展省陵寝斬戮直臣以杜言路南廵淮海偷安嵗月金兵深入陕右遂破京西而漫不治軍略無扞禦盗賊横潰莫之誰何無辜元元百萬塗地怨氣上格日昏無光飛蝗蔽天動以旬月方且製造文物縻費不貲猥扵城中講行郊報朝廷動色相謂中興敵騎乗虛直擣行在匹馬南渡狼狽不堪淮甸之間又復流血逮及反正寳位移蹕建康不為久圖百度頺弛淮南宣撫卒不遣行自畫大江輕失形勢一向畏縮惟務逺廵軍民怨咨如出一口存亡之决近在目前凡此節次十餘條皆所謂舉措失人心之大者也自古衰亡固不足道請以中興者言之夏少康周宣王燕昭王越勾踐漢光武莫不任賢使能修政事治軍旅而其奮發刻厲期扵必成者則又本扵憤耻恨怒之意不能報怨終不茍已所以光復舊物各稱賢君未有乗衰微缺絶之後竊竊焉因陋以為榮施施焉茍且以為安而能乆長無禍者也為陛下計當何如而黄潜善汪伯彦顧以乳嫗䕶赤子之術待陛下曰上皇之子殆将三十人今所存惟聖體不可不自重愛也曾不知太祖勤勞取天下列聖兢業嗣守不敢墜失今也宗廟為草莽堙之陵闕為畚鍤警之堂堂京華荆棘生之赫赫帝圖盗賊營之然則潜善伯彦所以誤陛下䧟陵廟蹙土宇䘮生靈者又豈燕昭越踐漢光武之比乎本初嗣復既不為迎二帝之䇿因循逺狩又不為守中國之謀以至扵今徳義不孚而號令不行刑罰不威而爵賞不勸廵幸所至民以淮甸為戒駐蹕所在人以敵至為憂東南之州郡㡬何翠華之省方無已若不更䇿以救垂亡則陛下永負孝弟之愆常有父兄之責則人心已去天命難恃雖欲覊栖山海䟦履﨑嶇臣恐非所以為自全之計也為今之計願陛下一切反前失而已則必下詔曰繼紹大統出扵臣庶之謟而不悟其非廵守東南出扵僥倖之心而不虞其禍經渉變故僅免危亡盖上天警戒扵眇躬俾大宋不失扵舊物金人扶立僭偽俾臣作君朕義不戴天志思雪恥父兄旅泊陵廟荒殘罪乃在予無所逃責以此號召四海聳動人心不敢愛身决意講武然後選将訓兵戎衣臨陣按行淮甸上及荆襄收其豪英誓以戰伐天下忠義之士必雲合而景從天下武勇之夫必響應而飈起國用不足扵此不患無財甲馬不强扵此不患無備有道多助孰不順之秦隴雖遥驍騎壮士即可坐致齊魯雖失饒財厚貨必自竭輸陛下凡所欲為孰不如志其為利害豈與退保吳越日就滅亡同年而語哉臣不自量每切憤歎既未能被堅執鋭先啟戎行而服業簡編討論古昔固當忘其昧陋少贊經綸輙為陛下畫七䇿為中興之術其一曰罷和議而修戰畧葢和之所以可講者兩地用兵勢力相敵利害相當故也非强弱盛衰不相侔所能成也而其議則出扵耿南仲何也淵聖皇帝在東宫當宣和季年王黼欲揺動者屢矣南仲為東宫官計無所出則歸依右丞李邦彦時邦彦方被寵眷又隂為他日之計每因王黼讒譛頗曾解紛亦縁上皇仁慈本無移易太子之意也既而淵聖嗣極逓遷前朝大臣而邦彦為次相金人遽至城下邦彦諧謔小人烏知逺慮遂獻和議而南仲以宫傅之重方奉椒房出奔聞六飛堅守至陳留而返自愧其失因附邦彦而沮种師道擊敵之謀扵是覆邦之患滋蔓而起分朋植黨必欲自勝主戰伐者李綱种師道兩人而已機㑹一去國論紛然中制河東之師必使䧟沒以伸和議之必信二帝逺去宗族盡徙中原塗炭至今益甚者本縁南仲主持邦彦以報私恩不為國慮之所致其朋徒附合狠忮膠結寧誤趙氏不負耿門之所為也使其可和則淵聖執徳不囘馴致禍敗而陛下卑詞厚禮避地稱臣無所不用其極乞和之使接武扵道宜其少緩師矣何乃累年而尚無效耶自古中國盛强如漢武帝唐太宗其得志四夷必并吞掃㓕以示廣大侮亡取亂竭其兵力而後已中國禮義所自出也恃强陵弱猶且如此今乃以亷退慈仁君子長者之事望於尼瑪哈有是理哉若以為强弱之勢絶不相侔縱使向前萬不能抗則自古徒歩奮臂無尺寸之地而爭帝王之圖者彼何人哉伏望陛下眀照利害之原罷絶和議刻意講武以使命之幣為養兵之費此乃晉恵公征繕立圉之䇿漢髙祖迎太公呂后之謀斷而行之堅確不變庶㡬敵國知我有含怒必鬬之志沙漠之駕或有還期不然則今僻處東南萬事不競納賂則孰富扵京室納質則孰重扵二帝飾子女則孰多扵中原之佳麗遣大臣則孰加扵異意之宰輔深思逺慮反復計之所謂乞和必無可成之理昔契丹至澶州王欽若陳堯佐請幸吳蜀惟冦凖勸親征及成功之後欽若等羞恨無以藉口則撼真宗曰當時冦凖亦豈有好計但是熱血相沃譬如博錢以陛下為孤注耳使人君不眀則欽若之言為愛君而冦凖之功為幸勝今之議和者其情状一一出扵此茍能息絶其議陛下不藉之以塞民望大臣不藉之以寛已責則必為善後之圖矣其二曰置行臺以區别緩急之務夫事有緩急治有先後既定議講武則其餘庶事有日力不暇給者當置行臺以區處之今典章文物一切掃地百司庶府殆為虛設其必不可闕者惟吏部户部為急誠使江淮兩浙湖北並依八路法慎擇監司而付之則吏部銓事亦復减省不過置侍郎一員郎官兩員胥吏三十人則所謂磨勘封叙奏薦常程之事可按而舉矣户部所以治天下財賦也今四方供貢乆不入扵王府往往為州郡以軍興便宜截用經常一壊未易復理竊觀行在支費每月無慮八十萬惟以𣙜貨鹽利為無窮之源耳故臣謂宜置行臺或建康或南昌或江陵審擇一處以安太后六宫百司以耆哲諳練大臣總臺謹守成法從事郎吏而下不輕移易量留兵将為營衛命户部計費調度以給之其虛名無實徒費國用之所一切省罷陛下奉廟社之主提兵按行廣治軍旅周旋彼此不為定居惟是侍從臣寮帥臣監司要害守牧則當加意以時進退其賢不肖功罪之著眀者而餽餉之權自宜専責宰相而選委發運以佐行扵下如漢委蕭何以闗中唐委劉晏以東南經制得人加以嵗月量入為出何患無財所謂宰相之任代天理物扶顛持危其責甚重非特早朝晚見坐政事堂弊弊然扵文具無益之末移那闕次以處親舊濟其私欲而已也古之人君臨政願治必委任宰相豈徒體貎崇重一聴其所為亦必深相提䇿務為眀白計日累月以考功緒陛下視今日國勢孰愈扵前日乎此在宸心所自鑒照臣未敢深論也其三曰務實效而去虛丈夫大亂之後風俗靡然躬率而丕變之者則在陛下夫治兵必精命将必賢政事必修誓戡大憝不為退計者乃孝弟之實也遣使乞和廣捐金帛冀幸萬一者孝弟之虛文也屈已致誠以来天下之士博訪䇿略信而用之以期成功者乃求賢之實也未見賢若不克見既見則不能由之或因茍賤求進之人遂乃例輕天下之士姑為禮貎外示美名者為求賢之虛文也聴受忠鯁不憚拂逆非止面從必将心改茍利扵國即日行之者乃納諫之實也和顔稱善泛受其説合意則喜之不合則置之官爵所加人不以勸或内惡其切直而用他事遷徙其人者為納諫之虛文也将帥之材智必能謀勇必能戰仁必能守忠必不欺得是人而任之然後待以恩御以威結以誠信有功必賞有罪必刑者乃任将之實也庸駑下材本無智勇見敵輙潰無異扵賊與之親厚等威不立賜予過度官職逾涯将以收其心適足致其慢聴其妄誕張大之語望其朴實用命之功者為任将之虛文也簡汰其疲老病弱升擇其壮健驍勇分屯所在置營房以安其家室聚粟帛以足其衣食選衆所畏信者以董其部伍申眀階級之制以變其驕恣悍悖之習大抵如周顯徳年中世宗命我太祖之意然後被之以精甲付之以利器戰獲則厚賞死則恤其妻孥退潰則誅其身降敵則戮其族令在必行分毫不貸者乃治軍之實也無所别擇一切安養姑息之惟恐一夫不悦幸而無事則曰大幸矣教習擊刺有如聚戯紀律蕩然雖其将帥不敢自保者為治軍之虛文也慎選部刺史二千石必求眀恵忠智之人使乆任扵官懲革弊政痛刈姦贓以除民害雖軍旅騷動盗賊未平必使寛䘏之政實被扵民固結百姓将離之心勿致潰叛乃愛民之實也詔音出扵上虐吏沮扵下誑以出力自保則調發其丁夫誘以犒設贍軍則厚裒其錢穀弓材弩料竹箭皮革凡干渉軍需之具日日征求物物取辦因縁姦弊民已不堪乃復蠲其税租載之赦令實不能免茍以欺之者為愛民之虛文也若夫保宗廟保陵寝保土地保人民以此六實者行乎其間則為天子之實也陵廟荒圯土宇日蹙衣冠黔首為肉為血以此六虛者行乎其間陛下戴黄屋建幄殿質眀輦出房雉尾金爐夾侍兩陛仗馬衛兵儼分儀式賛者引百官以次入奉起居既退宰相大臣卑卑而前搢笏出奏司辰唱辰正則駕入而仗出矣以此度日而國勢益卑彼尼瑪哈晝夜厲兵跨河越岱電掃中土遂有吞吸江湖蹂躪衡霍之意吾方挾持虛器茫茫然未知所之此則為天子之虛文也伏望陛下留意實效勿愛虚文扵此七者奮發慷慨而力圖之其四曰大起天下之兵今宿衛單弱國威銷挫臣嘗言乞早勾發京師衛士赴行在又降等杖扵兩浙福建江東西湖南北四川二廣抽揀禁軍貢發充御營正兵增厚其月廪精加訓閲陛下自将之天子之軍既强則中國之變自弭昔漢髙祖嘗大敗扵成臯矣與數騎渡河入張耳韓信軍奪其印易置諸将軍遂復振此得御将之大權雖智如韓信且莫能測宜其取秦㓕項甚易陛下今欲扵劉韓張辛四人之兵有所移易廢置臣知其不能矣權既偏重柄既倒持彼必謂陛下不能一日而舍之夷踞桀驁日以滋起陛下以孤立之身寄扵其上安能使此四人者常無怨怒相激而不為變乎苖劉之亂率爾而作者坐此故也漢獻帝時主柄下移不能自立李傕郭汜以偏裨小将互刼乗輿至以臭牛之骨與帝進饌萬乗人主為叛臣所質此既往之鑑也臣謂今日見在兵必不可用既未有以大更易之莫若先集天下勁兵以强御營之勢然後可以彈壓悍将驕兵悍将驕兵既不敢妄動咸就紀律則四方横潰之軍及羣起不逞之盗必自帖息猶有披猖不軌者遣偏師以鋭卒往禽滅之遂罷招安之䇿况陛下以雪耻復讎為己任仗大義而行天下頑兇不義之徒固将歛袵倒戈而聴驅使之命矣漢光武為銅馬帝者用此道也東南之禁卒既起則又命福建團結槍仗手建汀南劍邵武四郡精選萬人各擇其土豪使部督之各屯本處以俟興發命兩浙募水手并選發諸州撩湖捍海等兵盡付水軍教習戰艦命江東西湖南北募弓手以在官閑田給養之人得一頃正税之外其餘科須一切與免命廣西及辰沅鼎靖扵見數峒丁中實科有技能壮勇者不取虛數分畨踐更屯戍襄漢為山林谿谷之援以亰西淮南荒廢無主之地為屯田招集兩河山東及本路流徙之人略依古法均節之擇强武者訓習且耕且戰文武臣中有眀習營屯之事肯承任者因以任之凡此六條雖非講武必為之急亦不可不為之助陛下試使執政大臣委棄簿書細故勿設他説以相論疑日夜圖維擇人而為之必見功績扵是時而兵不强敵不畏盗不息然後可以歸之天命無所復為矣不然是自棄也陛下内有自棄之心而欲扵目前三四庸将數萬潰卒中求為乆安三尺童子亦知其不能矣或者必曰軍旅之興民最受弊今若如前所陳恐未能有損扵强敵而先已自殘其民矣則臣應之曰自金南侵已来國家嵗嵗以和好自處未嘗敢以兵刄北向凡以愛民恐勞之也然大河以南連亘數十州之地城覆民屠不可勝計豈用兵之罪耶設有一城一邑能率勵兵民誓以死戰一郡不克一郡繼之不猶愈扵束手屈膝斃扵白梃之下哉惟在任将相使處置合宜則雖使民以死尚且不怨况欲用兵以保衛赤子乎漢光武既滅新莽之後東征西戰尚十餘年而後天下大定當時豈無勞民費財之事所計者大則有所不暇恤顧能以軍旅擾攘之中常有愛惜生靈之意故天助而人歸之茍坐視四海流血而避用兵之勞費則是舜不當征苖啟不當討扈髙宗不當伐鬼方宣王不當伐玁狁以噎廢食非通時務經國之逺猷也其五曰定根本自古圖王覇之業者必定根本之地而固守之者豈非建都之謂也今都城已失則必思所以克復舊物者然考天下之勢莫强扵闗中今則力未能至按南渡之迹莫過扵建康今則事理不可參擇二者欲强進取之資而無形勢之失惟荆襄為勝今方城鄧林雖非天險然漢水為池上下不過千里其要害易守非如淮西汗漫平原曠衍四通五達易入而難避也誠能屯唐鄧之田以養新兵出廣西武陵峒丁并施黔諸軍築堅壘列守漢上阻以州軍防以正軍繚以弓手兵民牽制江黄呼吸廬夀則攻取之計成然後陜西聲氣相應而騎卒能至川廣之富皆可拱揖其比扵漂泊大江之南棲伏東海之濵險易利害相去逺矣建康固是六朝舊邦甘守偏隅遷延國祚亦何不可而臣獨以為不可者以陛下之責與晉元不同故也今陛下父兄在敵中無恙其聞陛下登寳位也必旦夕南望曰吾有子弟為中國帝王吾之歸庶有日矣扵今數年日廹月切而獻謀者方欲𨗳陛下南定根本之地而固守之者而陛下南狩日逺月忘遂無復國之心别求建都之所此臣所深不喻也今河北河東之民知朝廷不復顧思己甘心從敵山東亰西淮甸之民猶兾陛下未忍遽棄若更遲延嵗月無以及之則怨恨陛下而為敵國者所至皆然亦何必尼瑪哈邪於此而欲建都非特不可亦不能矣臣願陛下先命呂頥浩杜充分部諸将過江廣斥堠治盜賊自以精兵二三萬為輿衛扵穩宻州郡速置營屋以安存其所謂老小者陛下提此兵渡江而北緩轡而上遣使廵問父老撫綏挺刃之餘民至扵荆襄規模措置為根本之地猶漢髙之扵闗中光武之扵河内雖廵歴往来征伐四出而所守固必爭而勿失者以荆襄為重陛下方富扵春秋非如昔人白首舉事覬萬一之成者誠能堅忍聳厲坐薪嘗胆悠乆為之而不能濟則書傳所載周宣王漢光武之事皆為妄言以欺後世無足信矣陛下聰眀洞照必不謂然也其六曰選宗室之賢才者封建任使之上世帝王為治之道惇睦宗族强本弱枝所以鞏固基局紹延祐命故三代有天下皆傳數十世而周又特為長乆盖以大建宗室以自藩屏故也原其用心葢以天下為公而不以為私初非如後世以智力把持之褊心多忌雖有骨肉懿親盻盻不借以尺寸之權而恐其伺便軋己亡秦是已漢以為鑒遂大封同姓非劉氏不王及其久也光武劉備皆以宗室唱義而起扵滅絶之後夫漢髙固欲為久逺無窮之慮非為其一身也以謂不如是不足以大庇子孫萬世血食然則封建宗室者乃固守天下之要術也今陛下之族北轅者衆矣所幸免亦㡬何而黄潜善鄭㲄小人之見本無逺識謂陛下以支子入繼又不縁傳付之命國歩未夷恐肺腑之間不無非望之兾考其行事必曾進言恫疑虛喝以恐動宸心故自南都以至維揚誅竄之刑疑忌之意相尋繼見雖其罪戾或自貽戚然亦恐未必盡出扵治親齊家之美意審如是欲以保國而延歴難矣今宜扵同姓中不間親踈選擇賢材布之内外廣加任使其望實傑然出衆者陛下宜留之宿衛夾輔王室其有克敵勘難之功者宜漸為茅土之制星羅而棊列以慰祖宗在天之靈以續國家如綫之緒使讎敵知趙氏之居中國者尚如此其衆既失而復得者非特陛下一人而已則其撲炎火之横心立異姓之譎謀庶其少息乎其七曰存紀綱以立國體夫創業垂統之君必立綱紀以遺子孫繼世承序之君必守綱紀以法祖宗綱紀存則存綱紀亡則亡所繫如此夫一君子進衆小人未必退一小人進則衆君子必退矣勢不兩立而扵君子為難盖其道固如此仁宗皇帝在位最久得君子最多小人亦時見用然罪著則斥之君子亦或見廢然忠顯則收之故其成當世之功貽後人之福者皆君子也至王安石則不然斥絶君子一去而不還崇信小人一任而不改故其敗當時之政為後世之害者皆小人也今也仁宗皇帝所養之君子既久且逺日以消亡矣安石所教之小人方新且近其蕃息未艾也所以誤國破家至毒至烈不知己時然則陛下欲求君子而用之而不愛爵禄以待其人豈非甚不易得者乎君子未得而已試無堪敗事顯著之小人稍稍類聚其未至則召之惟恐其不来其既至則用之惟恐其不速混然雜進其黨必集所謂悔過用賢之意與陛下反正之初絶不侔矣陛下土地金帛能有㡬何豈堪此輩大言輕捨盡輸之敵國耶将以汲引豪傑延致英雄而標的如此是猶却行而求前北轅而適越爾夫以賢治不肖此治平以前陛下之家法以不肖治賢此熈寧以後陛下之家戒矧今日否塞之氣充牣扵中原隂長之滋勃興扵外域非得希世異材上下内外迭任交用泰何由復而否何由傾乎此綱紀國家之一事也右文左武者有國不易之道漢髙祖用韓信彭越不以加扵蕭曹光武用賈復耿弇不以加扵鄧禹唐太宗用李靖李勣不以加扵房杜蜀先主用闗張諸将不以加扵諸葛孔眀非獨其禮文等降不同其誠心所以待遇之亦異今儒學衰息未有巨賢碩徳屹乎朝廷以收運籌指蹤之功陛下所深恃以為心膂爪牙者惟三四庸将耳夫此數人者以近時論之曾不足以當种師道之厮役况望古昔眀将乎而偃蹇龎然當負重寄使平寇盗尚或未能豈敢冀其向强敵發一矢也自愧無以塞責則大言詭論以上欺睿聴慢辭倨禮以下視朝士謂今日禍亂皆文臣所致耳敵人方强不可與爭鋒必以退避自保乗時而動又不鈐勒其衆動則潰潰則盗盗則招招則官反復循環無有窮已其為國家之害又豈淺哉竊聞陛下推心撫之失扵太厚出入内禁不以時節小人不知義理習扵所熟以謂君臣上下猶朋輩然恃憑威靈無有紀極寵而不驕驕而能降降而不憾憾而能眕者鮮矣臣願陛下委大臣以腹心待近臣以禮貎常使南衙朝士氣勢重扵此徒天下抱才自愛之人必願立扵左右緩急之際必有能為陛下竭忠盡節不愧古人者矣與樊噲為伍韓信猶羞之况儒士乎臣參奉内朝班綴之後欲求近臣如汲黯之流氣折淮南尚未多得羸軀弊輿惴惴然扵長㦸犬馬之中卒伍賤人皆得以惡聲誰何之不敢正色忤視少怫其勢從臣如此况其下者乎唐制監察御史秩七品衣緑至卑也然銜命出使則節度使具櫜鞬郊迎本朝㳂此意郎官出使則序位在轉運使之上凡此盖欲尊重天朝習民扵上下之分也故事宰相坐待漏院三衙管軍扵簾外倒仗聲喏而過呂夷簡為相日有營軍忽遇扵殿廊年老皇遽不及降階而揖非有悖戾之罪也夷簡上表求去以為輕及朝廷其人以此廢斥盖守分之嚴如此今見其分庭抗禮矣推此類非一日長而不已陛下不為之别異表著是自削堂陛無復等威此綱紀國家之二事也治天下者必取篤實躬行之士而舍浮華輕薄之人所以美教化善風俗本朝自熈寜以前皆守此道至王安石以佛老之似亂周公之實絶滅史學倡説虛無以同天下之習其習既同扵今五十年士以空言相髙而不適扵實用以行事為粗迹曰不足道也其或蹈規矩守亷隅稍異扵衆則羣嘲而族笑之以為異類紛紛肆行以至敗國二帝屈辱羿莾擅朝以為是適然耳仗節死難者不過一二人此浮華輕薄之為害也夫欲變風移俗惟係上所好惡韓琦富弼在朝文武兩班升朝官以上即不許自陳磨勘皆聴檢舉所以養勸亷耻恢張四維故當時人知自重風俗忠厚至今乃有身為從臣而自陳磨勘乞覃㤙轉官不以為耻者矣推而上之見利必忘義貪得必患失遺其親後其君背叛簒奪便可馴致此眀君之所甚畏而深戒者也今萬化之原本扵陛下茍力行孝弟則天下忠順者来矣好賢逺佞則天下名節者出矣賞清白則貪汚者屏矣崇行義則奔競者息矣旌能實則謬誕者懲矣貴忠厚則殘刻者逺矣茍反此道則頽波日漫必至扵糜爛而後已至扵文辭之麗言語之工倒置是非移易黒白誠不宜任用以為浮薄之勸也靖康二年著作郎顔博文佞䛕張邦昌則曰非湯武之干戈同堯舜之禪讓及為邦昌作請罪表則曰仲尼從佛肸之召本為興周紀信乗漢王之車固将誑楚博文近世所謂能文之士也其操術反覆如此故亷恥道消四維大壊則社稷随之陛下有何利焉此綱紀國家之三事也法度者所以治天下之具號令者所以行法度之㡬而信義者所以出號令之實也孔子曰自古皆有死民無信不立聖人重信至扵易死疑若太過鄙夫陋儒以智詐譎詭為術者必忽此言然真宗澶州與契丹結盟契丹守之百有二十年不敢輕動宣和宰相王黼一旦敗盟舉兵結金人伐與國取景徳誓書還之天章閣天地鬼神所臨重誓自我背之遂使敵人得以藉口夫金人何憾扵我哉皆契丹惎之假手借兵報滅國之怨耳失信之禍乃至扵此孔子之言良不為過而近日以来朝廷失信扵民尤甚臣不能徧舉其目但如所謂前降指揮更不施行如所謂已差下人别與差遣此等奏語必日聞扵冕旒之側矣陛下何惜不勑大臣俾審熟思慮而直為此反汗之失以欺駭四方之聴乎今外州郡専制不禀朝命者漸多有之所恃以指麾役使惟在號令出之不審則輕守之不固則疑輕而且疑則制命之權不在陛下矣承受既數奉行實難不曰略與應彼指揮則謂不晚必又更改近在朝廷尚有此風逺而四方從可知矣陛下縱有真賢實能付之民社仁政恵澤播之黔黎以是之故何繇責其功效百姓雖愚然習扵知見必謂朝廷之令率皆誑我是心一萌姦雄得以誘之矣此綱紀國家之四事也郡守縣令者親民之官監司者統臨州縣之長天下之治起扵一縣縣治則州治州無不治則天下治矣明主必慎擇居此之人既得其人必久任之以考功罪之實而施賞罰焉近日以来朝廷移易郡守監司無月無之殆不可勝紀東南路分不過十數何乃紛紛如此陛下宜察其故矣謂其不才而罷之耶則曷若考慎扵未命之前也顧恐末必然特出扵用事者之私意耳民力已困財用已竭潰兵劇賊徜徉乎其間戎務軍需交制乎其上朝廷憂勞嘆息而未能救尚忍不為擇忠信之長慈恵之師以撫綏之乎臣願深詔大臣自今以往扵郡守監司縣令斷以三年為任非有大過勿輕移改縣令不許輙從奏辟去官其有貪汙為民害者舉祖宗法痛懲治之仍許内侍從官舉所知堪為令者嵗一人後不如舉貶秩示誡留意此事庻㡬斯民扵鼎沸之中有蘇息之望又今吏部無闕以待入官之人士無所得禄一切茍且求權攝以度日見居官者不能勝任逆避患害則求差檄幹辦之名茍營俸粟無復夙夜之志欲事治而民安難矣今欲乞専委諸路帥臣轉運提刑不以逺近共限一年申發部内見任及闕官已授未到職位姓名參三司之實付吏部為案抵以行差注諸有以便宜從事辟置官屬者必用曾任令録以上無過犯人其奏補出官及曾以不職無治状罷者不聴奏舉奏補人必依舊法試銓無銓則扵逐路運司嵗一試之仍增時議䇿問各一首精其選少其數中格則出官以絶請求賄賂冗食之弊肅清仕路政在得人此綱紀國家之五事也臣禀賦凡下無大過人然夙夜思之又考之往古揆之公論得此七䇿列為十二條扵當世之務雖未能盡亦可見其大槩矣惟陛下動心加慮反覆而求之隆寛降意開納而聴之萬一可行則至誠惻怛奮乾之健而速圖之日月逝矣嵗不我與以為今日難扵前日安知後日不又難扵今日乎往者雖不可復追不當謂無可為者而遂已也天定勝人大福不再深可憂懼今年之春震雷大雪白虹貫日中有黒子錢塘之變實先垂象盖以上天之仁眷顧陛下懇懇至厚所以申命用休者不啻再矣陛下出扵屯難側身怨艾親近書史引對多士减徹玩好躬親庶政亦非復維揚之比臣民共知不可誣也然任至重者力必强責至大者憂必深天下萬姓以二帝之故所望扵陛下者非止如是而已廼閏月金犯大火芒怒赫然九月朔旦日有食之車駕復有思患預防之行明堂遂虛陽徳大弱錢塘受辱之地豈可再枉六飛縣名栢人漢祖不宿若趨㑹稽幸三衢則地形窮僻扈衛益勞貢賦不通財用益窘道路艱阻朝覲益稀郵置迂深命令益隔人知陛下無興復之志威權日削無可瞻望投戈四逸孰能止之惟有臣區區之言理眀事順思迎父兄誓報冦讎奮志强厲有進無退庶足以感發軍情率先将佐扵危絶之中求生存之道此非怯懦畏避之所能濟也不然而姑恃天命之不庸釋是猶不耕扵田枵腹以待嘉穀之旋生不績扵麻露肌以待野蠶之成繭事理之必無者矣又惟斯民戴宋無二者徒以祖宗徳澤深厚人未忍忘雖甚塗炭猶未瓦解雖甚怨怒猶未反叛然以比来廵行所過觀之傍道里縣之民一切空盡以避兵卒其甚者田疇荒莱室廬破毁生聚不保滿目蕭條殊非来蘇望幸之美傳示四方何以彰徳頃在建康已獲金人之覘者以此知金人雖負十全之勢而限以長江不敢輕渡然屯駐山東聞有數路並入之謀陛下不深委将相早為防遏但欲深尋幽逺則囘顧州郡復為虛邑必曰君王尚且畏避何以責我守城民心覩此安能久忍而無變亂若不望風拜跪以事仇讐必将推賢擇能以自保治陳勝吳廣因民不忍而劉項乗之秦遂滅亡者盖本扵此古人稱中興之治者曰撥亂世反之正秦不正而甚亂漢髙祖反之正而興焉王莽不正而甚亂光武反之正而興焉隋不正而甚亂唐太宗反之正而興焉唐末五代不正而甚亂我太祖皇帝反之正而興焉反之正者反易其道究其敗亡之由盡更而易之猶反覆手之易也今之亂亦云甚矣其反正而興之在陛下其遂凌遲不振亦在陛下金人雖暴强未必能久特恐中國豪傑因之而起反吾之亂興彼之治則陛下之大事去矣天下記之野史書之善惡榮辱垂之方来後人觀之亦猶今之視昔夫湯以七十里而有天下楚以七千里而為讐人役今尼瑪哈之強未如秦其得罪中國無人不怨則有甚扵始皇之扵六國也東南形勢控帶江山兼有吳楚之地坤維嶺海提封自如非如湯以七十里而起也而乞憐偷生之勢乃甚扵楚之為秦役此臣所以日夜憤懣為陛下痛惜而傷大臣過計也昔宗澤留守京師一老從官耳猶能致誠鼓動羣賊北連懐衛之民誓與同迎二帝皆相聴許尅期宻應者無慮數十萬人不幸為黄潜善所惡百方沮抑憤悒而死其志不就羣臣亦無敢以澤所謀達扵宸聴者以此知人心未厭二帝之徳何况陛下身為子弟責孰加焉誠欲北向而有為臣将見鋤耰惨扵長鎩奮臂威扵甲胄舉四海惟陛下之用决不為失䇿惟在陛下斷與不斷為與不為耳五路事宜張浚已行措置今能使淮南荆襄肘臂相應山東合從則金人所守者數千里之地兵分勢離批亢擣虛攻其不備多方以誤之不厭不倦以十年為期陛下必能掃除祲氛一清天歩修上京之廟貎拜鞏雒之神臯逺迓父兄歸安鳯闕再新儀物永固皇圖陛下扵時憂責方已巍然南面稱宋中興永永萬年欣懐無斁其與惕息遁蔵蹈尾負耻有如今日豈不萬萬相懸絶哉疏入呂頥浩惡其切直罷之按原本此疏傳冩舛錯殆不可讀今據歴代名臣奏議校正辛夘命尚書右僕射杜充兼江淮宣撫使領行營之衆十餘萬守建康留中書印付充統制官王民顔孝恭孟涓劉經魯珏殿前副都指揮使郭仲荀皆𨽻之又以御前前軍統制王􅊛為之援御前左軍統制韓世忠為浙西制置使守鎮江府太尉御營副使劉光世為江東宣撫使守太平及池州光世仍受充節制御營使司都統制辛企宗守吳江縣御營後軍統制陳思恭守福山口統制官王瓊守常州時仲荀雖已離京師猶未至也壬辰承議郎監都進奏院周元曜自亰太廟奉迎藝祖以下神位九室往臨安宰相率百官朝謁扵清凉寺兼辭元曜開封人周貴妃從孫也上初欲召對而元曜言升暘宫掛牌降甘露上謂輔臣曰元曜前態未革謟䛕如此可勿令上殿輔臣言元曜迎奉有勞當進秩上許之熊克小歴戊子百官迎太廟神主扵清凉寺以行日歴壬辰進呈太廟神位九室舟至城下權奉安清凉寺前一日得㫖令百寮朝謁兼辭據此則戊子日也和安大夫開州團練使致仕王繼先嘗以黄金三百兩從故秘閣修撰趙明誠家市古器兵部尚書謝克家言恐䟽逺聞之有累盛徳欲望寝罷上批令三省取問繼先因依繼先開封人時年三十餘為人姦黠喜謟佞善䙝狎建炎初以醫得幸其後浸貴寵世號王醫師自繼先為人姦黠至以醫得幸據趙甡之遺史附入按繼先生戊寅此時年才三十二不知何故致仕若是圍城中致仕則後来因何不復除落當考乙未隆祐皇太后舟過落星寺六宫及後宫舟飄覆者十數惟太后舟無虞戊戌言者奏祖宗以来遣将出師統制官掌兵轉運使措置錢糧應副軍兵各不相統攝使掌錢糧官得以修舉職事檢察妄費愛惜財用如錢糧闕乏據統制官申朝廷治其罪自嘉祐熈寧以来莫不如此近日将帥殊不思祖宗以来曹潘下江南王全斌下蜀彼皆一時英傑名将亦皆守此法乃因統兵脅持州縣或至驅掠官員輕侮典憲漸不可長又如劉光世雖係御營副使若勾差人馬即合用劄子付逐處州縣若與監司行移只合用文牒往還今乃輙行劄子下淮南監司及𤼵運副使顯見不當伏望睿慈申敕諸将遵依祖宗法度施行從之諸将用劄子行移事紹興二年閏四月癸夘四年六月己夘所書可參考己亥詔减福建廣南路嵗買上供銀三分之一以寛民力詔諸路制置使惟用兵聴從便宜餘悉禁止先是張􅊹為江州路制置使以便宜竭取屬郡之財論者以為祖宗時所謂安撫者止管機宻兵馬邉防等事財計自有漕臣轉輸安撫不預盖有深意今以便宜奪所𨽻州軍財計為害甚大望行禁止故有是命庚子從官已下先行是夜大雨上慮禁衞勞苦自扵禁中焚香禱天詰朝雨霽壬寅上幸浙西初太白犯前星次逼明堂纔一舍上心甚懼至是稍北復歸黄道上語宰執曰天之愛君猶父之扵子見其過告戒之及懼而改則益愛之王綯曰今夜必益逺既而果然是日上發建康遣户部侍郎葉份先按視頓逓御前右軍都統制張俊御營使司都統制辛企宗從上行時劉光世韓世忠各持重兵畏杜充嚴峻論説紛紜光世又上書言受杜充節制有不可者六上怒趣令過江且詔毋令光世入殿門光世皇恐受命上喜賜以銀合茶藥光世得楊惟忠所失空頭黄敕即以便宜復郴州編營人王徳武略大夫閤門宣賛舍人充前軍統制徳行至潭州而還先是邵青以舟師擾楚泗間後受江東帥司招安充因以青為㳂江措置司水軍統制時江浙人皆倚充為重而充日事誅殺殊無制禦之方識者為之寒心焉癸夘徽猷閣待制知鎮江府葉煥落職監亳州明道宫仍貶秩二等時煥遣人募槍仗手扵閩中而諫官言其騷擾生事故黜甲辰上次鎮江府參知政事王綯言此陳東鄉里上命以金賜其家熊克小歴癸夘上次鎮江今從日歴乙巳詔諸路催錢糧綱赴建康府户部送納其金帛並赴行在是月直秘閣裴祖徳為兩浙轉運判官用杜充薦也日歴無此今以紹興四年七月八日魏盈彈章增入宣撫處置使張浚自建康至襄陽按宋史繫甲辰日留二十日召帥守監司令預儲蓄以待上西幸浚方捜攬豪傑為用以涇州防禦使新除御營使司提舉一行事務曲端在陜西屢與敵角欲仗其威聲承制拜端威武大将軍宣州觀察使充本司都統制端登壇将士懽聲雷動端退謂人曰使劉平子在端安敢居此平子濮陽劉銓也靖康末以知懐徳軍死事先是河東經制司屬官宣義郎王擇仁為永興郭琰所逐事見二年六月十三乃将其軍萬餘人自商州奔漢中琰檄金州閉闗拒之擇仁不敢進屯扵襄陽浚薦其才除御營使司參議官而以朝奉郎㳂江措置副使程千秋為秘閣修撰亰西制置使宣教郎李允文為直秘閣亰西南路提㸃刑獄公事遂命千秋代将擇仁之軍允文盧陽人靖康末坐累廢斥僑居鄂州浚見而悦之因與俱時假中散大夫直龍圖閣趙宗印将陜西部曲在郢州欲從浚還陜西乃盡以其軍付允文裨将吳錫等皆屬焉錫河東人稍知書故為盗自云子厚之族子厚者宣和末為河東北宣撫司選鋒軍統制錫嘗㓂徳安之孝感縣守臣陳規誚之曰河東人勁氣直汝之先又登顯仕何不圖報國而為盗以干誅錫感悟願得自新其後宗印招降之至是亦在軍中浚将行復假千秋便宜許之久任自屬郡守貳以下咸得誅賞千秋以公安民兵數百自随皆無器甲謂之親随兵劉豫遣人説東亰副留守上官悟令降扵金悟斬其使豫乃賂悟之左右喬思恭宋願與之同説悟復斬之建炎以來繫年要録巻二十七
