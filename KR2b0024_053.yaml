body:
  text: 建炎以來繫年要録巻五十三宋李心傳撰紹興二年夏四月壬戌朔借補敦武郎閤門祗候權夀春府兵馬鈐轄陳寳為閤門宣賛舍人知順昌府先是江東安撫大使葉夢得遣寳與守將陳卞同取順昌以收復告遂命之卞等不能御軍下多擄掠中原人大失望夢得又遣統制王冠率知濠州冦宏共取宿州為僞齊王彦先所逐遂陷夀春卞棄城保南岸主管廬夀鎮撫司公事王亨與卞有隙且利其甲馬乃以犒軍為名襲取之盡滅其家王亨殺陳卞此據明年十二月二日郭偉所申附入偉又言亨受偽命武功大夫興州刺史癸亥詔神武前軍左部統領申世景以千人屯福州御前忠銳第六將單徳忠以八百人𨽻之仍並聽帥司節制時宣撫副使韓世忠移兵西去留統領官陳照馬凖所部千五百戍南劔州帥臣程邁以兵少為言故有是命左朝奉大夫宋髙知蘄州用鎮撫使孔彦舟奏也甲子直秘閣通判嚴州黄策罷先是桐廬淳安二縣令以贓為漕臣所劾而策庇之械繫其告者漕臣徐康國等言於朝命按其事既而䇿亦以贓廢是日曹成入賀州乙丑廣東經畧司言䖍州盗陳顒率衆三千人圍循州焚龍川縣詔江西大帥司遣將捕之顒初見元年七月壬寅戊辰詔知州兼統兵去處非出師臨陣毋得用重刑以秘書少監傅崧卿有請也己巳宣撫處置使張浚言直秘閣都大同主管川陜茶馬公事兼随軍轉運使趙開措置川路隔槽酒務自建炎四年春至紹興元年秋增收息錢一百四十萬緡已陞直龍圖閣詔中書省給吿庚午翰林學士承㫖兼侍讀翟汝文㕘知政事浙西安撫大使劉光世言軍中糧乏詔光世具見屯鎮江官軍單甲姓名責取統領官保明申尚書省故監察御史沈畸贈直龍圖閣以議章綖盗鑄獄忤蔡京謫死故畸徳清人事見大觀元年九月丙申辛未復置諸州學官四十三員此即建炎三年所省者時言者論文武之道不可偏廢東晉之初首開學校頃縁議者務減吏員諸州教授例從鐫減今所在州郡添差筦庫捕盗官無慮十數何獨於此而吝之欲望稍修學官使士子有所矜式且廉退之士不至棄遺事下給舍看詳而有是命壬申以平范汝為徳音釋福建諸州雜犯死罪已下囚其脅從歸業之人自今毋得告蠲上四州今年夏秋稅及夏料役錢下四州民嘗遭焚刼者蠲今年夏稅訪聞舊來未行茶引嵗收息錢至九萬緡自置茶事一司所收十餘萬緡除官吏支費外較其所入與搭息不甚相逺仰本路帥臣監司同共講求利害以聞初命江東統制官拱衛大夫宣州觀察使閻臯以所部五千屯邵武軍臯以檄授賊首熊志寧武功郎充前軍統領福建等路宣撫副使韓世忠言于朝降臯兩官衝替遂併其兵中奉大夫廣東提㸃刑獄公事宋孝先為福建等路宣撫司㕘議官是日建武軍節度使江西兵馬副總管楊惟忠討軍賊趙進降之進冦江州之瑞昌帥臣李囬遣惟忠討捕時賊衆萬二千官軍八千人而已平旦惟忠渡江先鋒將武徳郎閤門宣賛舍人傅選悉五軍旗幟行以壯軍聲賊諜知之曰先鋒尚如此若全軍而來何可當也遂遣使迎降詔以進為從義郎其徒十三人皆授官仍留江州屯駐留屯江州在六月壬寅進補官在八月乙未癸酉廬夀等州宣撫司奏偽齊兵犯夀春詔本路宣撫司不須輕舉甲戌徽猷閣待制知平江府胡松年罷初上幸浙西而漕臣營宫室聞諸邑有取材於民者遣御史黄龜年視其籍而以銀帛與度牒償之松年恐得罪諭屬縣詐言已償民間三分之一而具文以示龜年事聞故有是命乙亥昭慈獻烈皇后小祥上不視事羣臣進名奉慰初命館職校御府書籍尚書户部侍郎栁約提舉江州大平觀以御史江躋言約頃守嚴州畧無措置也詔進士第五甲人特免銓試一次丁丑奉直大夫淮東提舉刑獄公事兼營田副使王實罷以宣諭使傅崧卿言實闇懦不才自到官之後止在揚州乞别選能吏故也戊寅户部尚書李彌大兼侍讀彌大乞講筵官不許留身奏事從之日厯無此今以沈與求劾彌大章疏附入乙卯執政奏事上諭二相曰頥浩專治軍旅檜專理庶務當如范蠡大夫種分職先是吕頥浩聞桑仲進兵乃大議出師而身自督軍北向且言近聞金偽合兵以窺川陜若於來春舉兵必可牽制陜西之急萬一王師逐豫則彼必震恐因令韓世忠自西京入關此亦一竒也及是上諭輔臣二人唯唯奉詔朱勝非秀水閑居録紹興二年吕頥浩秦檜同秉政檜引傾險浮躁之士列於要近以為黨助謀出吕而専政其黨建言周宣王内修政事外攘夷狄故能中興今二相宜分任内外之事於是降制除頥浩江淮荆浙都督諸軍事總兵江上置修政局議更張法度而檜領之未按趙甡之遺史頥浩始開督府乃因桑仲出師之故幾聞仲死頥浩遂提行以事考之此說為合恐非檜黨所擠也又是時檜所引如胡安國程瑀江躋張燾之徒皆賢士不得以傾險浮躁名之勝非所云恐非其實今不盡取詔三省樞宻院人本宗有服親不許任軍中差遣如違重行黜責時辛永宗既得罪事見元年十一月辛亥而神武前軍統制王􅊛又奏省吏單知彰之兄為本軍准備使喚論者恐其刺探省中事故條約之中書言諸路州縣民户因兵火逃亡者田業二年外許人請射在十年内者雖已請射聽理認歸業已施功力者償其費客户權佃者聽免一料科催田主歸業者倍之仍免二年非泛科配庚辰䕫州路安撫使韓廸奏祁王見任本州詔國子監丞李愿宣召赴行在初廸功郎李霞者監富順監鹽井其子勃不肖蓄妓家貧無以為資遇保義郎杜逺于萬州欲從之假丐即偽稱祁王逺以舟送至䕫具以告廸廸聞于朝㑹内侍楊公謹在䕫與勃相見公謹頗能言徐王起居狀勃遂更稱徐王廸不疑其詐即以白宣撫司宣撫使張浚令内侍武翼郎趙彦民驗視彦民心疑其非而依違以對浚以為然乃給觀察使俸命愿偕勃赴行在十月庚寅行遣武功郎樞宻院兵房副承㫖劉希房等十九人各進秩一等以本院言昨范汝為破滅係本房首尾應辦措置行遣調發别無他誤故也既而言者論吏行文書蓋其職也今各進官恐將有捐軀冒死之人聞之解體而主帥論功第賞轉益冒濫乃命收後㫖勿行第令犒設而已後㫖在是月丙戌朝奉郎江漢者初以本樂府撰詞曲得官宣和末為明堂司令至是除通判郴州言者以為不可罷之太學生許燾上書論事上召對命為廸功郎壬午手詔曰比自宗廟播越國歩艱難以來中原士夫隔絶滋乆間有流寓東南者往往乏謀寡援致姓名不能上達良可惜也可詔内外侍從監司郡守各捜訪薦舉三兩人以備器使起居郎陳與義試中書舍人是日臨安火癸未詔曰朕寤寐中興累年於兹任人共政治效缺然載加考績登庸二相蓋欲其謀斷協濟事功倚毗眷遇體貌惟均凡一時啟擬薦聞之士顧朕㧞擢任使之間隨其才器試可乃已豈有二哉尚慮進用之人才或勝徳心則媚奧潛效偏私浸成離間將見分朋植黨互相傾揺由辨之不早辨也可不戒哉繼自今小大之臣其各同心體國敦尚中和交修不逮如或朋比阿附以害吾政治者其令臺諫論列聞奏朕當嚴置典刑以誅其意時吕頥浩秦檜同秉政檜知頥浩不為時論所與乃多引知名之士為助欲傾頥浩而專朝權上頗覺之故下是詔中興聖政臣留正等曰孔子曰大哉堯之為君也惟天為大惟堯則之帝王之道其大如天寧有私哉然而夏暑雨小民惟曰怨咨冬祁寒小民亦惟曰怨咨以小民之意而窺天不知其為大宜其不免於怨咨也太上皇帝謂登庸二相體貌惟均一時啟擬薦聞之士隨材任使曾無有二此其大如天者也進用之人或潛效偏私寖成離間使分朋植黨互相傾揺之患不免上貽聖慮此猶以小民之意而窺天者也大抵天下之事不患於不可制而患於不能知知之於㣲而革之於早豈有不可制之事哉此太上皇帝所以於其幾㣲而明辨之不憚於播告之修而以絶朋比之漸也秘書丞李藹為孫傅請諡遂諡忠定直秘閣知郴州趙不羣陞直顯謨閣知鼎州充湖北路兵馬副鈐轄代程昌㝢也時湖南多冦盗二人卒不果行詔臨安府令馬歩軍司分左右廂廵警照管時初命平海軍承宣使蘭整權主管侍衛馬軍司公事而權主管歩軍司邊順援東京舊例為言故有是命甲申宣撫處置使張浚言已運米五萬斛至荆南欲理川口與行在相接上曰一二日前猶有言者謂當遣人副浚治軍朕念委之不專難以責成秦檜翟汝文皆曰誠如聖訓時中書舍人胡安國上制國論大略謂陛下登極六年謀議紛紜未有一定昨嘗降詔定都建康而六飛蹔駐杭越乃以湖北為分鎮恐非設險守邦之意且朝廷近棄湖北逺留川陜者謂蜀貨可以富國秦兵可以強國也萬一有桀黠得之守峽江之嶮則蜀貨不得東塞武關之阻則秦甲不得南猶一身束其腰膂而首尾不相衛矣臣謂宜必都建康且不以湖北為分鎮則全據上流出秦甲下蜀貨而氣血周流矣又近者分鎮京畿淮甸多使暴客錯雜居之獨安陸命文臣陳規荆渚命武帥解潛若降指揮以湖北與諸鎮不同宜有更張攷二人之績規宜因任潛宜改移無不可者仍復漕憲二司以理財治盜若襄陽雖已分鎮然時方用兵乘便分割亦豈無機㑹然後上流之勢全矣安國又言今日之勢宜以襄陽𨽻湖北岳陽𨽻湖南而鄂渚𨽻江西蓋祖宗都汴其勢當自内而制外今都江左當自南而制北與祖宗事雖殊而意則同此復中原之勢也左宣教郎荆湖北路提㸃刑獄公事吕祉亦言荆楚乃行朝上游宜於沿江措置使與吳㑹相接庶幾可以一統東南時已命劉洪道鎮武昌而洪道未至也詔今次補授文學人不俟赦降令陞朝官三員保任聽㕘選乙酉吕頥浩言近至天竺祈晴今雨少霽可以上寛聖慮上曰朕宫中亦自育蠶此不惟可候嵗事亦欲知女工艱難事事質儉中興聖政上謂吕頥浩曰比來苦雨前日祈晴雨即止朕遣人於郊外取麥穂視之已結秀若晴霽十數日二麥必大熟兹誠上瑞何必甘露慶雲邪頥浩奏曰太宗皇帝嘗命親近人取未穂入禁中又駕幸近郊觀稼皆聖主務農重榖之意臣留正等曰昔周公於詩作七月厯序稼穡之艱難於書作無逸必曰知稼穡之艱難稼穡賤事爾何與於一人之貴哉蓋惟至貴不忘乎至賤然後能有其貴况農事食之所出而食者民之所以生歟周公之意可見矣太上皇帝憂雨之乆而喜晴取麥於郊而喜麥之秀以為過於甘露慶雲之瑞大哉王言真中興之本歟宣撫處置使張浚言已加封梓潼縣英顯王武烈二字王晉人張惡子也居縣之七曲山舊與姚萇交逮萇據關中因不復出後人即其地祠之浚言比形靈應大破羣凶詔令中書省出告是日李綱始受湖廣宣撫使之命置司上遣内侍于盖撫問令視上道乃還賔客多往賀綱有臨川陳冲用者獨不賀人問其故冲用曰丞相在靖康末以天下安危自任人望所歸今雖閒居其望猶重若因此成功尚盖前失萬一又無所成平日之名掃地矣何賀之有是夜太平州軍士陸徳等縱火作亂囚守臣左朝奉大夫張錞殺當塗縣令鍾大猷閉城自守先是錞與兵馬鈐轄武經郎趙子絅不恊劾罷之子絅因激怒諸軍既執錞遂領州事江東安撫大使李光聞變遣統制官耿進右奉議郎通判建康府錢需率兵水陸捕之子絅罷在四月己巳丁亥右武大夫忠州防禦使知秦州張榮進秩一等榮為盜乆朝廷聞榮與其部曲殺平民而取其資命劉光世圖之㝷召榮入朝復進官遣還郡命劉光世措置在去年十一月庚戌降㫖召榮在今年四月乙卯戊子尚書左僕射同中書門下平章事兼知樞宻院事吕頥浩都督江淮荆浙諸軍事制曰盡長江表裏之雄悉歸經略舉宿將王侯之貴咸聽指呼時頥浩將謀出師而秦檜之黨亦建言昔周宣王内修政事外攘夷狄故能中興今二相宜分任内外之事上乃命頥浩總師開府鎮江頥浩請辟參謀官已下文武七十七員鑄都督府印賜激賞銀帛二萬匹兩上供經制錢三十萬緡米六萬斛度牒八百道月給公帑錢二千緡仍許召諸州守臣時暫至軍前議事皆從之頥浩都督之除日厯㑹要玉堂中興制草皆在此日而熊克小厯繫之四月十八日已前盖以是日上有專治軍旅之諭不知是時雖有定議未降制也但日厯載頥浩畫一陳請狀在四月三日所不可曉當是閏四月三日所奏而日厯誤繫之四月初間今併附此俟考故追復觀文殿大學士相國公韓忠彦追封魏國公以元祐宰輔入黨籍者八人獨忠彦未加贈故也南康布衣李彧元祐户部尚書常之從孫也靖康末嘗率里人捍賊江西帥臣版授廸功郎至是安撫大使李囬言其學行于朝詔補正己丑給事中黄叔敖守尚書户部侍郎兼侍讀降授左武大夫萊州防禦使閻臯赴都督府軍前准備使喚臯故為吕頥浩部曲故頥浩請之武徳郎江東安撫大使司同統制趙琦為樞宻院准備將領㝷命琦以所部二千充御前忠銳第八將琦已見三月壬辰改忠銳將在五月辛酉詔建州豐國監復鑄錢監舊有役兵五百提㸃司嵗給黄銅五十萬斤白錫五十萬斤鑄錢二十五萬緡及是纔餘役卒數十乃減鑄額之半端明殿學士知潼川府宇文粹中求去張浚承制以其弟直秘閣成都府路轉運副使時中代之又以右中大夫陳古為成都府路轉運副使粹中奉祠以七月庚午得㫖盖用浚奏也續成都記時中以四月二十八日改差故附此日庚寅偽齊劉豫移都汴京士民震駭豫乃下詔以撫之因與民約曰自今更不肆赦不用宦官不度僧道文武雜用不限資格豫偽尊其祖忠曰毅文皇帝廟號徽祖父曰睿仁皇帝廟號衍祖偽左丞相麟簽所籍鄉兵十餘萬為皇子府十三軍以尚書户部郎中兼權侍郎馮長寧㕘謀軍事徙汴京留守益為京兆留守豫在開封凡軍國事以至賞刑鬭訟毋巨細申元帥府取决沿河沿淮及陜西山東等路皆駐北軍由是賦歛甚重刑法太峻民不聊生偽太常博士直史館祝簡獻遷都及國馬賦略曰蠢爾蠻荆弗賔弗降固將突騎長驅不資一葦之航豈惟觀長淮飲大江而已哉豫批云文賦非治天下所尚然自前朝之季上恬下嬉殆忘監牧國家創業力為生靈除祻亂致康泰以馬為急務而猶恐官吏軍民多狃於舊俗未知盡牧圉芻秣之道此賦極陳馬之為用使讀之者知此為至重而不可忽實有補於軍政與減磨勘以示無言不酬時西京奉先卒李英賣注椀與敵人豫疑其非人間物驗治得實遂以其臣劉從善為河南沙淘官谷浚為汴京沙淘官於是兩京民間窖藏及冡墓破伐殆遍矣趙甡之遺史於此書張孝純罷相劉麟秉政恐誤麟去年已為左相矣是月直秘閣主管廣西經略司公事許中令諸郡上丁輸召募勇敢錢户八千自治平間於廣東潮梅循惠等州專置槍手熈寧間又於諸州闕兵處增置保丁毎農隙輪赴州縣教閲防守若廣西邕州之洞丁本以防遏交趾而欽廉宜融平觀諸郡亦各有土丁欽廉之沿海宜融之防遏率以三等户五丁取一至四等以下則户以一丁充團結而已平觀桚邊之地則團結父子全丁凡為土丁者並蠲其身丁稅錢皆不離本處及中為廣西帥始調覊縻州洞丁赴靜江防拓往來剽掠所過騷然經渉冬寒死者殆半每遇戰守則統兵官先驅土丁赴敵潰䘮愈多至是中以聖㫖盡發一路土丁既而言恐妨農事上欲召募勇敢可丁輸錢五千并折米錢三千並易輕齎赴帥司一方大擾三年二月壬午明槖奏許中五罪論科土丁錢事在此月今附見右中大夫右文殿修撰知漳州趙億乞守本職致仕許之億年纔五十三也日厯無此今以紹興五年十二月十五日吕祉等薦章修入汪藻作億墓誌但云以疾請老從之亦不言其故日厯此月九日壬寅有都省奏廣東運司建炎四年糴米陳腐弛慢失職下提刑司覈實指揮然止是詰責當職糴買官億前任轉運使恐非其實故也姑附於此國史須詳考顯謨閣直學士李偃卒于饒州偃傳在此月未得其年閏四月辛卯朔户部尚書兼侍讀李彌大秘書監傅崧卿充徽猷閣待制並為都督府㕘謀官直顯謨閣福建轉運副使李承造陞直龍圖閣為㕘議官尚書右司郎中姚舜明充秘閣修撰為隨軍轉運使起復左武大夫榮州團練使神武後軍統制巨師古復榮州防禦使兼都督府統制軍馬翌日頥浩言臣今以僕射職事出凡所措置乞一切作聖㫖行下續具奏知許之後數日彌大於講筵留身言東晉王導謝安為都督未嘗離朝廷今邊圉幸無他頥浩不宜輕動又言已為天子從官非宰相可辟乞於諸軍悉置軍政如漢朝故事以察官郎官為之欲殺其專自都督府始陛下必欲遣臣與崧卿當别為一司伺察頥浩過失宻以啟聞上以為離間君臣彌大遂改命㝷詔謀議官叙位視兩省官奉使機宜官視職司幹辦官視雜監司選人在諸州通判之下時已罷隨軍轉運使而崧卿舜明所除職論者以為太優殿中侍御史江躋請降㫖以督府權任至重特許置隨軍漕臣一員又請自今非見任宰相暫出撫師其所辟僚屬除官進職不得輙援此例詔令三省遵守頥浩不悅許置隨軍漕在此月丙申㕘謀官已下叙位指揮在五月戊辰江躋論僚屬職名在六月戊戌遣内侍衛茂實往紹興府津送所留宫人赴行在詔左朝奉大夫知太平州張錞先次衝替令安撫大使司追攝取勘時本州言錞自到任不法等事已行拘收聽候指揮乞早降曲赦庶幾軍民一向安業中書乃言訪聞錞贓汙不法郡民厭苦遂罷之仍詔陸徳等並特與放罪既而聞徳不服乃命知池州王進合兵進討又詔江東安撫大使李光親往視師未行而城破遣王進在乙未詔光躬親前去節制在丁未今併書之壬辰詔戍兵於屯駐所在有違法許守臣監司按舉其兵校於知通並依階級法用樞宻院請也癸巳髙麗國王楷遣其尚書禮部員外郎崔惟清閤門祗候沈起入貢詔秘書省校書郎王洋押伴楷獻金百兩銀千兩帛二百匹紙二十匹人參五百斤詔賜惟清起金帶又賜酒食于同文館辭亦如之初議遣從官出使既而不果行洋資深子也直秘閣主管洪州玉隆觀衍聖公孔端友既卒詔以其子玠為右承奉郎封衍聖公甲午上諭吕頥浩曰卿耆艾有勞今總督之任以大軍委卿不當復親細務頥浩惶恐奉詔乙未吕頥浩請以右朝請大夫令畤主管行在大宗正司上令易環衛官頥浩言令畤讀書能文元祐間蘓軾嘗力薦恐不須易環衛上曰令畤昔嘗事宦官譚稹清議不容不當復齒士大夫之列乃以為右監門衛大將軍榮州防禦使令畤燕懿王元孫也宣撫處置使張浚奏以通直郎王擇仁知涪州擇仁初除河東制置使㑹都統制韋忠佺不能守以山寨降敵統制官宋用臣馮賽以餘衆赴宣撫司擇仁因改命詔諸路類試進士赴殿試不及人正奏名與進士同出身特奏名與諸州助教調官如文學例以道梗特優之也丙申户部尚書兼侍讀李彌大罷為顯謨閣直學士知平江府仍詔以彌大係侍從官特不避本貫御史中丞沈與求言彌大謀間君臣妄自尊大自陛下駐蹕錢塘四方顒顒日望朝廷為向進之圖今陛下命頥浩提相印總師律都督諸道之兵而節制之聖慮精㣲罔不曲盡中外翕然為甚盛之舉彌大設有他見自合委曲開陳裨賛廟畫乃縁懐私妄有奏請掩陛下推誠待遇大臣之盛徳沮陛下抗志經理四方之逺圖望賜降黜疏再上後六日詔彌大落職奉祠是日神武副軍都統制岳飛引兵擊曹成于賀州境上大破之初成既得賀州聞飛至以兵守莫邪關飛遣前軍統制張憲攻關軍士郭進與旗頭二人先登進揮槍而出殺其旗頭賊兵亂官軍齊進遂入關日厯飛申以閏月十二日奪關口今併附此飛喜補進秉義郎解金束帶以賜官軍既入關賊兵散亂第五將韓順夫解鞍脫甲以所擄婦人佐酒賊黨楊再興率衆直犯順夫之營官軍退却順夫為再興斫臂而死飛怒盡誅親隨兵責其副將王某擒再興以贖罪㑹張憲與後軍統制王經皆至再興屢戰又殺飛之弟翻官軍追擊不已成屢敗賊衆死者萬數成率餘兵屯桂嶺縣楊再興初見建炎二年六月不知即是此人否丁酉詔奉迎温州開元寺真宗神御赴行在初章獻明肅皇后以黄金鑄章聖神御上恐其誨盗故遷焉因愀然謂宰輔曰朕播遷至此不能以時薦亨宗廟奉衣冠出游令祖宗神御越在海隅念之坐不安席左朝奉郎提舉江州太平觀孫覿除名象州覊管先是李光為吏部侍郎上疏論覿知臨安府盗用助軍錢四萬餘緡吕頥浩秦檜削光名下其章付大理落覿龍圖閣待制至是獄成覿以衆證坐以經文紙劄之屬饋過客計直千八百緡有司言覿自盜當死詔貸死免决刺所過發卒䕶送連坐流徙者又三十餘人乆之二相免覿上書訴枉乃放還下光章在二月庚午降㫖以衆證為定在三月庚戌罷後苑作留老工數人作弓鎧以為武備戊戌賜紹興府行宫復作府治上謂時方艱難宜惜財用若别建府第益煩費矣直龍圖閣劉寧止充秘閣修撰江淮荆浙都督府㕘議官己亥吕頥浩進呈樞宻院編修官王大智所造戰車上言大智知兵法可用因語頥浩人材隨能器使皆可就事卿為宰相當識㧞人物如大智宜携以自隨令造水戰之具不當棄能也詔移紹興府𣙜貨務都茶場於臨安辛丑詔武徳大夫忠州刺史閤門宣賛舍人池州兵馬鈐轄韓世清特處斬世清既至行在𨽻神武右軍都統制張俊軍中吕頥浩欲除之㑹浙西兵馬副鈐轄趙令晙訟世清在蘄州嘗以黄衣衣已語言狂悖下大理世清具服因醉怒以緋脚黄旂被令晙向之山呼故抵死仍詔以世清一身專謀不軌其部曲並無干渉令樞宻院榜諭諸軍世清狂悖事在建炎三年十一月乙巳熊克小厯三月江東招撫使副李光王􅊛總兵至宣州光擒韓世清誅之仍揀其衆􅊛部之赴行在實甚誤矣光至宣州在二月辛卯揀軍在三月壬辰世清伏誅在閏四月辛丑相去凡四十日大理寺劄子節文寺司收管韓世清枷項根勘據招建炎三年十月内不記日因喫了數盞酒後去州衙理㑹官兵闕于錢糧見知州甄采共趙令晙坐間有逓到舒州劉文舜牒一道令世清聽他使喚世清道劉文舜舊曾與世清厮殺怎教聽得使喚趙令晙道我新從舒州來劉家人無事世清道趙令晙你莫與他劉文舜厮說着待來筭世清你是皇親趙官家人世清手下人不曾起動民間你是淮西兵馬鈐轄可自交割取我人馬遂呌使臣軍兵取將黄旗一面來意待交趙令晙披着不移時有使臣軍兵一百來人將到緋衣黄脚旗一面世清下階指定趙令晙你又不肯交割世清人馬你胡做時須肯交割世清令使臣于閏將旗去待與趙令晙披着世清不合指定趙令晙呼萬嵗其時趙令晙走起面西北槍起頭巾口稱太祖官家令晙不曾胡做世清即時便覺有酒不合與趙令晙呼萬嵗等不虛有㫖韓世清特處斬仍令大理少卿前去監斷癸丑詔統兵官行移用劄子者徒二年左朝奉郎辛次膺監諸司審計司次膺掖縣人也宣撫處置使張浚以朝請郎楊仲先為䕫州路轉運判官甲辰張浚奏桑仲侵犯均房州已令鎮撫使王彦掩殺乞嚴行戒約令兼聽臣節制詔京西係屬宣撫處置地分自合節制先是范宗尹當國以荆湖道逺乞勿𨽻宣撫司故浚以為請前三日仲以南陽破賊功進一官而仲乆已死矣責授中大夫余深卒乙巳宰相奏以大理卿章誼知平江府上曰誼儒者頼其奏讞平恕使民不寃勿令補外丙午吕頥浩言淮東宣撫使劉光世屯鎮江兵冗不練必敗事乞移光世一軍歸闕上不允翌日再請上曰比聞光世軍糧不足若驟移必潰卿至鎮江可先犒設使恩信既洽然後料簡光世惟卿所用不必移也朕之愚見如此頥浩歎服時光世招納蕃漢及淮北人民來歸者不絶江東安撫大使葉夢得之未去也亦招宿州人陸清等率衆來歸樞宻院言事體非便詔今後不許招納其後光世言結約到北界七十餘寨請降詔書撫之上不許是日神武副軍都統制岳飛敗曹成於桂嶺縣成㧞寨遁去賊將楊再興為追騎所及跳入深澗中軍士欲就殺之再興曰勿殺當與我見岳飛遂受縛飛見之解其縛曰汝壯士吾不殺汝當以忠義報國家再興謝之飛留以為將時成既為飛所破遂走連州飛命前軍統制張憲追之成窮蹙又走郴州守臣趙不羣乘城固守成轉入邵州㑹福建江西荆湖宣撫使韓世忠既平閩盜乃旋師永嘉若將就休息者而道處信徑至豫章江濵連營數十里羣賊不虞其至大驚以為神世忠聞成屢北遣神武左軍提舉事務官拱衛大夫貴州刺史董􅌈往招之成以其衆就招有郝晸獨不從率衆走沅州戴白巾稱為成報仇晸後歸于張憲曹成受韓世忠招安諸書不見日月按世忠以六月五日奏到則必在五月半已前去此盖閲月今併附此當考丁未集英殿修撰知衢州席益移知平江府賜福建等路宣撫司錢十萬緡以賞戰士宣撫處置使張浚承制復徽猷閣直學士程唐為寳文閣學士充㕘謀官專一措置財用浚言唐累該赦宥合復舊職已劄下先次繫階乞下有司於寳文閣學士上降勅又言四川監司知通闕人去處本司已差官到任而朝廷所差官後至者乞别與本等差遣皆從之御史臺檢法官晏敦復言逮事曾祖母張氏乞納左承議郎一官為張氏追封許之敦復殊曾孫也己酉更鑄樞宻院印初武功大夫榮州刺史樞宻院將領韓京以所部屯茶陵縣而湖南安撫司統制軍馬吳錫在郴州二人皆起於羣盗所將多湖東士人京本王以寧部曲兵皆精銳聞以寧之廢心常不平㑹有前河東經畧司幹辦公事王乆中者遺錫書論京專權擅命錫聞于朝事下韓世忠未逹神武副軍都統制岳飛并京錫軍自將之至是以聞庚戌武徳大夫知池州王進言已復太平州先是江東安撫大使司統制官張俊耿進等攻城未能下進以所部赴之叛兵陸徳等許受招進挺身而入其次周青者言不順進乃召使臣張錞叱令置對乘賊不意執青斬其首俄而耿進自西門張俊自南門入諸軍既不相一遂殺人縱掠城中亂兵馬鈐轄權州事趙子絅乘間遁去俊執徳以獻伏誅其後二人交訟其功詔李光究實光上進等及軍士五千八百餘人功狀于朝上命以功贖過而子絅與錞皆勒停初進在池州嘗以事械司理𠫭軍衛允廸而釘其手言者交奏其狀未及究至是吕頥浩遂命進以所部二千屯饒州進罷池州不見月日按日厯九月戊寅樞宻院勘㑹都督府已差本府統制官王進將帶官兵前去饒州駐劄候到饒州權聽守臣李彌遜節制今附見也徳之始叛也懼官軍將至謀盡黥城中少壯而屠其老弱然後擁衆渡江慈湖寨兵馬俊適𨽻周青左右得其謀陰結其徒十人殺賊然後諭衆開門其徒許之俊歸語其妻孫氏與之訣至南門伺青出上馬斫其頰九人懼不敢前俊與妻子皆遇害青被傷卧旬日賊黨益落官軍四合遂就誅後贈俊修武郎為立祠號登勇按史王進以閏月四日奏㨗且奏張俊冒爭功賞壬子詔李光體究甲寅俊申進恣行殺戮五月丁酉光奏子絅罪勒停九月庚辰詔以功贖過更不推恩始終凡百餘日事今聯書之錞勒停在十二月馬俊贈官在三年十月丙申立祠在四年正月己巳辛亥百官以天申節開啟道塲於天竺寺有軍將乘馬與權吏部侍郎廖剛爭道蹄傷剛左股宰相奏軍將爭道當降黜上曰第言軍將犯朝儀可也壬子吕頥浩言今嵗防秋當用兵江淮之間若車駕時廵則諸將孰敢不盡力但恐道路玉食不備上曰朕自艱難以來奉身至約昔為元帥與士卒同甘苦一日在道絶糧朕亦終日不食今居禁中雖太官上食間食彘肉一味若在道路雖無肉食庸何傷乎初陜西都統制吳玠戍河池縣同都統制王彦戍金州二鎮皆饑而利䕫路制置使兼知興元府王庶過為守備閉石門仙人關塞褒斜路商販不通玠彦病之因訴於宣撫處置使張浚浚初欲調䕶庶令與玠彦結好玠彦言庶遇已無善狀始庶治𣙜酤與關市之征得其贏以市軍儲有三年之積又為亭堠數百達於秦川至嵗終有三萬人仗於是有言庶難制馭者浚惑之檄召諸帥會於益昌庶亦覺有間已者以素隊數百人馳㑹浚問以進取之策庶曰富平之敗屬耳軍未可用也浚不樂曰君欲棄三秦耶乃以便宜命庶與知成都府王似兩易是日似發成都癸丑端明殿學士許翰提舉萬夀觀趣赴行在時翰避地嶺南辭不至甲寅詔責授中大夫分司南京江州居住朱勝非許自便尚書右司員外胡世將守起居郎中大夫洪炎為秘書少監秘閣修撰劉棐為右司郎中監察御史黄龜年守左司員外郎炎芻弟宣和中嘗為是職坐元祐曲學罷去至是復用之樞宻院計議官張致逺添差兩浙轉運判官河南布衣林向進砭石論詔赴都堂審察乙卯詔寺監丞以下並令吏部擬除時吕頥浩秦檜言祖宗舊制内外差遣並付審官士大夫自有調官之路故請謁奔競之風息近世堂除闕多侵占注擬士人失職廉耻道䘮欲外自監司郡守及舊格堂除通判内自察官省郎以上及館職書局編修官外並令吏部依格注擬從之詔諸鎮撫使襄陽桑仲河南翟興荆南解潛金州王彦徳安陳規蘄黄孔彦舟廬州王亨訓習兵馬廣行布種儲蓄糧食非奉朝㫖毋得擅出兵丁巳右通直郎新簽書鎮江軍節度判官㕔公事蔡延世改通判太平州以才選也戊午寧武寧國軍節度使開府儀同三司淮東宣撫使劉光世特起復光世始聞父延慶之䘮詔遣中使起復故官治軍事光世乞持䘮不許賜金帛甚厚欽宗實録靖康元年閏十一月丙辰金人登城劉延慶聲言䕶駕帶班直長入祗候西兵萬餘人奪開逺門以出至龜兒寺為追騎所殺靖康朝野僉言等諸書所載尤詳而光世自言弟光烈自陜西前來面說有保㨗兵士王進自金寨中走歸稱父於建炎二年内結約本朝人要走歸金知覺捉回遂被害身亡疑光世所云走卒之言未足據趙甡之遺史延慶死於亂兵光世不知其存亡多以金寳遣人詣偽境㝷訪紹興二年五日有客人自偽地來得其父之骸骨言死狀皆不可參考乃云以骨雜甘草把中故偽境官司不能稽察或勸光世割皮滴血以驗之光世不從以禮安葬發哀成服甡之所云必有所據今附見此將仕郎賀廪獻書五千巻詔吏部添差廪監平江府糧料院仍官其家一人廪鑄子也已未降授左朝散郎劉岑為尚書金部員外郎去年十一月乙酉劉超知光州注或與此相關俟考宣撫處置使張浚以起復朝請大夫張澄為利州路轉運副使宣教郎夏珙權陜府西路都轉運司判官公事秘閣修撰程千秋知巴州澄滎陽人始以娶宗室女補右職後王黻薦易文資建炎初黄潛善以為樞宻院編修官與浚同命故浚引用之封漢南昌尉梅福為吏隱真人初襄鄧鎮撫使桑仲既為都統制兼知郢州霍明所殺其將吏馳報副都統制李横于鄧州熊克小厯云仲母奔告李横當考同副統制兼知隨州李道聞之與横共率其兵縞素圍郢明有口辨登城謂横曰仲心難保先殺明次及兄矣何如吾二人分其衆與地請命于朝不聽攻之彌月横刈其麥以贍軍城中糧乏至是攻圍益急惟西城石壁下臨漢江敵不能近明知事急乃夜半縋石城而下與其徒數百泛舟順流而去翌日横始覺之追之不及明奔徳安府鎮撫使陳規謂之曰仲鎮撫也汝為其屬而殺之如法何當速訴于朝以辨曲直明乃去規謂人曰仲明皆黠冦也今兩亡矣横遂併將郢軍留其黨李簡知郢州惟後軍統制王嵩奔劉豫建炎以來繫年要錄巻五十三
