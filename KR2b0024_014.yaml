body:
  text: 建炎以來繫年要録卷十四宋李心傳撰建炎二年三月按是月乙酉朔丙戍端明殿學士東京留守宗澤為資政殿學士寶文閣直學士北京留守杜充為樞密直學士時河北東路提㸃刑獄公事郭永嘗畫三䇿以遺充一日見充問其目充曰吾未暇讀也永面數之曰人有志而無才好名而遺實以此而當大任難矣充大慚一日天雨紙錢於營中厚約寸許人皆以為不祥明日與金人戰于城下敗績充遂閉門不出此不得其時因除職附見按充今年七月甲辰自降充顯謨閣待制復密直移東京未知何時降職或緣此敗也但無書可考耳先是執政以山東盜賊踵起建炎初勑榜東京其詞有云遂假勤王之名公為聚寇之患詔見正月丁未澤恐豪傑解體是日上疏言臣聞人主中天下而立定四海之民恭惟太祖皇帝肇造區夏以今京師為天下中故創業垂統欲傳之億萬世太宗真宗仁宗英宗神宗哲廟奕世聖人傳以相授皆以京師為本根之地所以髙拱穆清坐視天民之阜必於天下之中也惟奠枕于京則自西自東自南自北莫敢不來享莫敢不來王矣偶緣玩習太平之久文武恬嬉狃於驕淫矜誇忘戰守之備遂致強敵稱兵殘破州縣圍閉京城劫迎二聖后妃親王與諸天眷蒙塵北去僑寓沙漠此忠臣義士所以夙夜涕泣繼之以血自陛下即位應天四海萬方歡欣鼓舞垂髫鮐皆山農野叟咸以手加額仰面謝天曰天下有真主矣萬世永賴實天祚明德為無疆之休矣四方帖然若逺若近並無盜賊洎陛下偏聽姦邪與敵為地者之語移蹕淮甸諸處凶惡强盜如蝟毛起如蜂閧聚縱火殺掠所在猖獗罔有悛懼以謂朝廷在逺無所依歸遽至是爾臣於二月十八日祇授降到黃榜詔敕云遂假勤王之名公為聚寇之患如是則勤王之人皆解體矣臣竊謂自金人圍閉京城天下忠義之士憤悶痛切感厲爭奮故自廣之東西湖之南北福建江淮梯山航海越數千里爭先勤王但當時大臣無逺識見無大謀略低回曲折憑信誕妄不能撫而用之遂致二聖北狩諸親骨肉皆為劫持牽聫道路當時大臣不出一語使勤王大兵前往救援凡勤王人例遭斥逐未嘗有所犒賞未嘗有所幫助饑餓流離困厄道路弱者填滿溝壑强者盡為盜賊此非勤王之人罪皆一時措置乖謬耳比來姦邪之臣方爾橫肆敵兵自然得勢强梁惡少無緣殄滅竊念國家聖子神孫繼繼相承湛恩盛德滲漉人心淪浹骨髓今河東河西自保山寨者不知幾千萬人諸處節義丈夫不顧其身而自黥其面爭先救駕者不知幾萬數也今陛下以勤王者為盜賊則保山寨與自黥面者豈不失其心邪此語一出自今而後恐不復肯為勤王者矣噫得天下有道在得其民得其民有道左得其心陛下若駐蹕淮甸俾顒顒之望皇皇之情未有所慰安此人之心也願陛下勿阻遏之以失人心臣仰詳詔語豈陛下之意皆詞臣失職不能敷繹之過臣願陛下黜代言之臣别降罪己之詔許還闕之期以大慰元元激切之意陛下還京登樓肆赦則天下之人盡皆遷善逺罪不犯于有司豈復更有為盜者王室再造大宋中興在此一舉願陛下睿斷而力行之若以臣言上咈陛下之意誅之赦之惟陛下命不報時有王䇿者夲遼舊將善用兵金以千餘騎付之往來河上澤密遣統制官王師正擒之釋縛解衣坐之堂上為言契丹本我宋兄弟之國汝何不悟義協討以刷社稷之耻䇿感泣誓以死報澤時呼䇿與語䇿具言敵中虛實澤又益喜大舉之計遂决熊克小厯云有金人之舅王䇿者拘囚在東京與宗澤遺事不同今不取天章閣待制知東平府權邦彥升寶文閣直學士尚書工部侍郎楊時兼侍講辛邜金人陷中山府時金人圍久城中糧絶人皆羸困不能執兵城陷金見居人瘦瘠歎而憐之兵校千餘人皆不殺中山自靖康末受圍至是三年乃陷壬辰詔諸路官吏並聽安撫使便冝節制甲午詔經筵讀資治通鑑遂以司馬光配饗哲宗廟庭光配饗當求降㫖日别書之且附此時上初御經筵侍講王賔講論語首篇至孝弟為仁之本因以二聖母后為言上感動涕泣左右侍臣莫不墮淚此據紹興十三年正月王普所奏附見侍讀周武仲進讀通鑑上掩卷問曰司馬光何故以紀綱為禮武仲敷述其義甚詳因為通鑑解義以進每至安危治亂之機必旁搜逺紹極其規諫焉侍讀朱勝非嘗言陛下每稱司馬光度聖意有恨不同時之歎陛下亦知光之所以得名者乎蓋神宗皇帝有以成就之也熙寧間王安石創行新法光每事以為非是神宗獨優容乃更遷擢其居西洛也嵗時勞問不絶書成除資政殿學士於是四方稱美遂以司馬相公呼之至元祐中但舉行當時之言耳若方其爭論新法之際便行竄黜謂之立異好勝謂之沽譽買直謂之非上所建立謂之不能體國謂之不遵禀處分言章交攻命令切責亦不能成其美矣上首肯久之丙申言者論當今所冝置司討論者凡三事一軍政二財用三官吏望命諸大臣詳議而行之詔軍政委樞密院都副承㫖及編修官討論申本院財用委户部討論申提領措置官官吏委左右司郎官討論申本省宰執參定取㫖後不果行承議郎知江州陳彥文復龍圗閣待制以江淮制置使劉光世言其守城之功也中奉大夫聶宇提㸃京西北路刑獄公事朝奉郎許亢宗知夀春府朝奉郎李光知江州亢宗樂平人靖康初為起居舍人光已見元年六月甲子既而言者論二人皆附蔡攸以擢要近及吳敏為相引蔡黨為助遂除亢宗右史光南榻淵聖察其朋比故因言章罷亢宗而逐光天下皆知其為蔡氏如谷永之附王鳳也乃詔亢宗光並主管西京嵩山崇福宫二人得祠在此月乙巳直祕閣向宗恕知真州宗恕敏中曽孫也丁酉初立大小使臣呈試弓馬出官格凡五等自今武臣䕃補親屬必於狀內稱某人或習韜鈐或便弓馬委自本州先行閲試然後保明申奏補官用議者請也尚書祠部員外郎四川撫諭喻汝礪勒停初汝礪奉詔剗刷四川嵗羡欲盡取常平所儲錢徽猷閣直學士知成都府盧法原轉運判官趙開靳博文提㸃刑獄公事邵伯溫皆持不可汝礪曰常平錢者朝廷五六十年之儲蓄也今朝廷多故天子狩于淮甸而二三大夫持必不移沮格詔㫖此謂之忠乎乃作檄以諭之其略曰明皇狩蜀宫室峻壯德宗幸梁儲偫豐備安有六騑在行淹薄風露取諸外府以餉軍食而謂吾人忍有不令之詞乎又曰今人主威柄移於帥臣之頑扈朝廷號令奪於監司之狂率法原等怒共奏汝礪騷擾生事汝礪亦奏剗刷嵗計外得錢七百三十餘萬緡又欲增川稱一銖與法稱合㑹宰相黃潛善以汝礪附李綱不遷都之論惡之乃以汝礪干求差遣營私自便為言而有此命談撰汝礪年譜云尼瑪哈輕兵趨淮甸金人入城潛善先騎馬走公賦黃花看欲落詩以譏之黃見之大憾有排公意按汝礪文集此詩叙揚州失守事當在明年蓋停官後所作非潛善見詩而排之也今不取己亥東京留守宗澤復上疏乞車駕還京時澤招撫河南羣盜聚城下又募四方義士合百餘萬澤遺事云時京城內外所屯兵凡一百八十萬人恐未能實及此數今但云百餘萬人更俟考詳糧支半嵗澤聞兩河州縣金兵不過數百餘皆脅服日夜望王師之來即詔諸將約日渡河諸將皆掩泣聽命澤乃上疏臣聞范仲淹云天下之事有二黨焉一黨曰發必危言立必危行王道正直何用曲為一黨曰遜言易入遜行易合人生安樂何用憂為天下之治亂在二者勝負耳大抵危言危行是用致君於無過置民於無怨而已天下豈有不治者乎若夫遜言遜行之徒阿諛曲折隨意所嚮逢迎茍合君施恩於上而下弗被民懷怨於下而上弗知如是天下豈有不亂者乎今之士大夫志氣每下議論卑陋上者不過持祿保寵下者不過便文自營曽不能留心惻怛為陛下思承祖宗二百年大一統基業為可惜又不為陛下思父母兄弟與至親天眷䝉塵沙漠翹翹徯望天兵救援之意又不曽為陛下思祖宗西京園陵寢廟為敵所占今年寒食節未有祭享之地又不曽為陛下思京師是天下之本根宗廟朝廷百司倉廪儼然如舊又不曽為陛下思河北河東京之東西陜右淮甸百億萬生靈之衆罹屠劫殘破之苦但朝進一言暮入一說計較泛舟冒大風險欲南幸湖外此姦邪之謀耳臣嘗思之是一欲為敵人方便之計二為姦邪親屬皆先已津置在南嗟乎為臣不忠不義乃至於此孔子所謂茍患失之無所不至正謂是也臣夙夜痛心泣血瀝竭愚忠為陛下保護京城自去年秋冬今春又三月矣農務是時陛下不早回九重則天下靡有定止臣不勝憤悶激切再瀆天聽狂妄干冒甘俟鼎鑊時上遣中使談燦賫詔書茶藥撫諭澤上表謝又疏請上還京師且言易曰幾者動之微吉之先見者也君子見幾而作不俟終日孟子曰雖有鎡基不如待時蓋天下之事見幾而為之待時而措之則事無不成茍或失焉必至汗漫委靡而不振矣方今輦轂之下民俗安靖宗廟社稷儼然如故以致收復伊洛而金人過河捍蔽滑臺而敵騎屢敗河東河北山寨義民數遣人至臣處乞出給榜旗引領舉踵日望官兵之至皆欲戮力協心掃蕩强敵以幾言之則大宋中興之盛於是乎先見矣以時言之則敵國敗歸之期於是乎可必矣惟在陛下見幾乘時早還華闕與忠臣義士究圖事功則萬舉萬全可以驅强敵而成中興也或者以謂自揚至汴時有小寇慮屬車之來途中不能無虞臣謂造此言者乃姦憸小人自為身謀爾殊不知盜賊所以作者誠緣法駕久寓外郡國勢未强天下不能定于一故時有竊發之事乃若六龍來復宅中圗大則比屋歡呼人各歸業彊不陵弱衆不暴寡豈復有盜賊耶此事甚易明此理甚易知然而姦邪之蔽於營私往往不肯開陳而力為陛下詳說者惟老臣而已臣所以再三言之者豈好辨哉恭念祖宗二百年舊都不恐為姦臣委去也恭念陛下聰明齊聖之資不忍為姦臣蔽蒙也念赤子之嗷嗷不忍為姦臣坐視而不救也念敵騎縱橫不忍為姦臣縱敵而不殺也伏願陛下念兹在兹斷自淵𠂻速回鑾輿上以對祖宗之神靈下以慰黎元之懷想外以平强鄰之侮拂則天下大定指日可期書曰𠡠天之命惟時惟幾望陛下留神而三復之臣今遣僚吏呼延次升及臣之子頴詣行闕以聞又疏曰臣得范瓊書叙說所統軍兵有海內招安使臣水軍奉聖㫖令於儀真駐劄教習水戰控扼上流於三月八日已到真州臣讀此語而不知扈蹕之臣誰為陛下建此議也且王者無外其規模約束當使守在四夷昔楚人城郢史猶鄙之况陛下奄有九有之時可規規孑孑為偏羈之事乎兹豈憸人之欲虛張敵勢以為可防其意望遷延六龍進發之期爾殊不知此聲一傳則四方驚愕必以為中原不守遂為江寧控扼之計如是則何以綏安四海之聽乎蓋天子為君萬邦而元后作民父母陛下回鑾登樓肆赦則普率之人欣欣而相告曰天子宅中圖大則萬邦罔不率俾矣元后正位丕承則兆民駸駸於變時雍矣夫如是臣將見强敵不足滅而中興之功與天地比崇若使范瓊教習水戰是聖心猶豫尚緩還期則中外播聞愈自懾怯萬國何自而咸寧乎此臣所以拭目注望屬車之塵不忘夙夜伏願陛下明詔范瓊即日整促人馬不須更習水戰祗備扈駕歸御京闕毋使羣黎百姓齎咨涕泣則豈惟老臣之幸實天下萬世之幸又表曰臣言屢奏囊封疊干宸扆聖主未頒於明命愚臣敢避于嚴誅謹攄悃愊之誠再瀆髙明之聽願從人欲以格天庥中謝竊以京師為諸夏本根元后作斯民父母本根如已深固則枝葉自爾扶踈父母若未安寧則子孫無緣泰定兹實簡編之成理蓋非里巷之浮言始陛下踐阼於應天萬方皆欣其有主近陛下駐蹕於淮甸百姓因此而致疑何前日之郡縣靖共而近時之盜賊荒擾由勤王者弗恤與救駕者靡憐贊主上逺父與兄乃巡南服助姦臣贖壻與子欲棄中原百為秪肆於誕謾一事罔由於誠實迹狀如此情意可知伏望陛下斷自淵𠂻早回法駕據本根而致治體父母以視民俾民人自勉勉以來王天亦穰穰而降福澤霈端門之赦歡收寰宇之心俗既逺罪以歸農敵亦望風而遁跡王室自兹再造大宋由是中興黎民時雍萬世永賴果臣有飾非之語則臣甘誤國之誅狂妄奏陳憤悶流涕臣無任庚子河南統制官翟進復入西京先是金人所命陜西諸路選鋒都統貝勒羅索入秦既得秦川隴右大震熙河經略使張深厲軍民為城守計遣兵馬都監劉惟輔將三千人騎禦之自千秋潰歸之餘兵籍失八九僅有惟輔一軍可用金前軍逾鞏州距熙才百里惟輔留軍熟羊城以千一百騎夜趨新店金兵自入陜西所過城邑輒下未嘗有迎敵者故恃勝不虞黎明軍進短兵相接殺傷大當㑹惟輔舞矟刺其先鋒將貝勒哈藩明庭傑吳玠功績記云惟輔刺其帥哈藩大王張鈞績中興忠義録作黑殺大王二書不同張滙節要云建炎元年尼瑪哈以萬户羅索為陕西都統又以萬户薩里罕貝勒哈藩副之即此人也按哈藩名今改正姑存原注墮馬死敵為奪氣惟輔涇州人也深聞羅索退更檄隴右都護張嚴往追之時上命御營左翼軍統制韓世忠為京西等路捉殺盜賊將所部及閣門宣贊舍人張遇軍萬人赴西京左副元帥宗維聞張嚴東出自河南西入關遷西京之民於河北盡焚西京而去由是進得以其衆自山寨復入西京東京留守宗澤言於朝即以進為閣門宣贊舍人知河南府充京西北路安撫制置使趙甡之遺史翟進與權京西北路制置使苖便遇金人於福昌及三鄉間苦戰終日金人敗北興進取龍門路收復洛城金人擁鐡騎數千相拒于龍門石道中興進麾將士力戰破之金人退保洛城官軍乘勝轉戰奪長夏門以入與金人巷戰遂復洛城時金人益出精兵自河陽南城至白馬坡營壘相望距洛不逺十數里復欲窺伺興遣麾下斷河橋自是金人稍稍退去按進入河南因尼瑪哈之去乘虛取之所謂轉戰之兵恐是金人所留小將耳今附著此更須參考宗維留完顔宗弼屯河間府左監軍完顔希尹右都監耶律伊都屯河南白馬寺以待世忠之至且與進相持既而深以功升端明殿學士癸卯京東東路轉運副使權知青州柴天因兼權本路制置使初葛進之掠濵棣二州也其衆皆面刺字曰不負趙王以示忠赤進自稱統制濵州軍有朝散大夫劉洪道者益都人中進士第靖康中自吏部員外郎除主管成都等路茶馬未行為金所執進攻潞縣之金寨得之時洪道方持喪進假洪道起復朝議大夫直顯謨閣為統制司計議官權知青州言於朝乃改天因權制置使而以洪道知青州主管本路安撫司公事趙甡之遺史洪道嘗監六部架閣庫為金人所執進得之言於東京留守杜充以洪道知青州按史洪道久厯清顯此除乃出於朝命又杜充亦未在東京皆本誤也今修潤令不抵牾洪道三年正月始至青州河東制置使趙宗印自襄陽移屯郢州守臣席益請之也丙午尚書右僕射兼中書侍郎何㮚為觀文殿大學士提舉成都府玉局觀中書侍郎陳過庭為資政殿大學士提舉江州太平觀同知樞密院事聶昌為資政殿學士提舉西京嵩山崇福宫時㮚已沒於金而朝廷未知昌亦為絳人所殺久矣過庭四年六月昌紹興元年四月癸亥㮚元年四月己巳贈官丁未兩浙東路馬步軍副總管楊應誠假刑部尚書充大金髙麗國信使應誠景宗曽孫景宗郫縣人章惠皇后弟仕至建寧軍留後宣和間嘗為部使者至是為安撫使翟汝文所抑不能堪乃應詔使絶域謂嘗隨其父任邊吏熟知敵情若自髙麗至女真其路甚徑請身使三韓結雞林以圖迎二聖汝文奏應誠欺罔君父自為身謀若髙麗辭以大國假道以至燕雲而金人却請問津以窺吳越將何詞以對决辱命取侮逺方臣已檄明州若應誠至毋濟其行不報應誠聞之遂與副使韓衍書狀官孟健自杭州登海舶以往健海州人時為太學博士監察御史張守守殿中侍御史辛亥捧日天武四廂都指揮使定武軍承宣使御營使司同都統制范瓊權同主管侍衛步軍司公事瓊自京西還朝廷令屯真州創造戰舶故有是命詔前降蔡京父子及王黼恩澤授官本宗有服親不許注授親民差遣指揮勿行前旨未見初金國知樞密院劉彥宗建議試河北舉人於燕山傳檄諸州搜索又蠲其科役以誘之命官即竹林寺校試北人以詞賦南人以經義詞賦及䇿論是日始揭榜得者甚衆彥宗云第一畨進士寬取誘之此據趙子砥燕雲録張滙節要云靖康元年冬劉彥宗勸斡喇布試真定儒士七十三人授以恩命與此不同按子砥此時在燕又其所記頗詳當不妄子砥又云二月十七日引試北人二十八日引試南人三月二十七日開院北人四百人取六分南人六千七十人取五百七十人並皆推恩恐南人就試者無緣有如許人必子砥所記有誤今不盡取是月石壕尉李彥仙復陜州初彥仙既聚兵㑹金人用陜降者守陜使招集散亡彥仙隂納士數百至是乘虛趨陜南郭夜潜師自河薄東北陬因所納士以入金兵敗棄陜去吏行文書請州印章彥仙曰吾以尉守此第用吾印吾敢佩太守印章耶事聞即以彥仙知陜州兼安撫司事彥仙以信義治陜不營毫髮之私與其下同甘苦由是人多歸之邵興在神稷山聞彥仙得陜州乃以其衆來歸願受節制彥仙辟興統領河北忠義軍馬屯三門邵興初見元年五月末三門鎮屬平陸縣信王榛既倡義起兵即遣使聞於朝猶慮其不逹乃與武翼大夫趙邦傑留居五馬山而遣武功大夫和州防禦使馬擴赴行在榛奏略曰自金人劫遷二聖舉族三千餘口悉驅而北臣至慶源府謀竄得免今在五馬山臣竊見邦傑與擴纍與金戰皆獲小捷其忠義之心堅若金石臣自陷金營頗知其虛實敵今稍惰皆懷歸心且屢敗於西夏而契丹亦出攻之今河北河東十陷七八惟山西一帶諸寨鄉兵約十餘萬力與敵抗但晝夜暴露民事失時率皆困窘兼闕戎器臣多方存恤借補官資使忠義之徒竭莭不變惟望朝廷早遣兵來援不然久之恐反為敵用則河南難保冝乘此時速取所失州縣以副民望臣願陛下念祖宗創業之艱二聖播遷之難於布衣小官中選其先公後私為國家效死之人付以事權即下明詔委臣總大軍與諸寨鄉兵約日齊舉决見成功仍給空名誥𠡠二萬道及河東河北兵馬元帥印付臣佩之臣粉骨碎首所不敢憚况於陛下以禮言則君臣以義言則兄弟其憂國念親之心恭想無異興言及此不覺流涕先以其疏附東京留守宗澤以聞建炎以來繫年要録卷十四
