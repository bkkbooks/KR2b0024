body:
  text: 建炎以來繫年要録卷一百八十一宋李心傳撰紹興二十有九年歲次己卯隆金海陵煬王亮正四年春正月丙辰朔上以皇太后年八十詣慈寧殿行慶壽之禮宰執使相皆進上壽禮物詔庶人年九十宗子女若貢士以上父母年八十者皆授官封文臣致仕官大夫以上並賜三品服僧尼道士八十已上者賜紫衣及師號有差宰執沈該率百官詣文德殿稱賀用建隆故事也班退上御垂拱殿受北使禮大理寺言獄空丙寅右武大夫容州觀察使荆湖南路馬步軍副總管傅選責靖州團練副使惠州安置以帥臣魏良臣劾其貪暴也選初以證嶽飛得進及是始斥丁丑左朝奉郎馬騏行軍器監主簿用楊椿薦也直敷文閣知盱眙軍楊抗升直徽猷閣再任己卯詔故洪州觀察使王彥纍立戰功贈典未稱特贈安逺軍節度使庚辰右正言朱倬言陛下對越上穹凡廂禁鋪兵之逃遁者咸以赦免然有非軍伍而流落山海間者尚有四焉一者海賈頃因市道交爭互相殺戮二者私商闌出為人所告官司見行收捕三者遊手廢業之人比因強奪財物或致傷犯勢不可還四者篙工水手曽從海寇景迹昭著物色根尋此曹自閩浙二廣十數為羣無所得食竄伏山海亡路自新日深月長别恐生事望詔諸路帥守多方招誘給據免罪或願充軍或欲歸農隨其所乞從之左正言何溥請禁諸州科賣倉鹽上曰鹽雖民間常用之物不可一日闕至於科賣則為大害朕頃在京東目擊此事州縣抑民均買謂之計口食鹽其後盜繇此起今當嚴禁止之史臣曰𣙜弊法也而又計口抑配以虐取之民將何堪此後世一切之政徒謂其食用所須官有必鬻之令莫我違者敢為不恤以欺吾君也民知其不吾恤亦輕於為盜此固聖君之所動心也其後福建鹽綱有嵗鬻名額以率價於民者亟命革之君之仁至矣尚書駕部員外郎馮舜韶知黃州辛巳宰執進呈起居舍人兼權中書舍人張孝祥劄子慶壽詔書凡通籍於朝者皆貤恩其父母孝祥父祁見任右承議郎母時氏以親父官方封孺人欲望特許依孝祥官序引用恩詔加封從之此為孝祥被章事始壬午端明殿學士李文會遺表聞初命進三官致仕至是贈左中奉大夫既而中書舍人洪遵言文會奴事秦檜排斥忠良改秩三年而登政府及守成都貪毒弛繆動為民害望罷其恤典以慰蜀人詔贈官勿行其致仕遺表恩澤共與二人而已癸未詔諸路新增沙田蘆場為風水所侵者其租皆減半殿前司乞諸軍買撲酒坊更立一界以助軍用從之魏良臣之執政也建議盡收諸軍酒坊事已行復令立一界收結紹興二十六年二月五日良臣以是罷政既而江上諸軍援殿前司例有請皆從之甲申大理評事潘景圭言諸州獄訟有罪狀顯著而不能決者皆姦猾玩法而胥吏因之以為利望自今三經翻異而不移前勘者取旨送大理寺去行在千里外者委監司選官就劾監司有妨請移鄰路差官從之景圭處州人也權刑部侍郎兼詳定一司敕令黃祖辭言見修吏部七司條法欲將舊來條法與今事體不同者立為參附參照施行上謂宰臣曰祖宗成憲不可廢也存之以備照用甚當但今所修法須與祖宗法意不相違背仍諭與詳定官左朝散郎致仕宋郭儒卒是月名永寧導江縣金馬碧雞神祠曰昭應金主亮詔自來沿邉州軍設置𣙜場本務通商便於民用其間止因隨處𣙜場數多致有夾帶違禁物貨圖利交易及不良之人私相往來未為便利可將密壽潁唐蔡鄧奏鞏洮州鳯翔府等處𣙜場並行廢罷只留泗州𣙜場一處每五日一次開場仍指揮泗州照會移文對境州軍照驗施行二月丙戌朔宰執進呈盱眙軍申繳北界泗州牒奉尚書戶部符付下聖旨廢罷密壽等州𣙜場只存留泗州一處詔盱眙軍𣙜場存留餘並罷安豐棗陽軍光州花靨鎮時事出其不意南北商旅棄物貨而逃者甚衆既而無所得食漸致抄掠議者請嚴責州縣捕之上不聽命給之裹糧各使歸業久之遂定熊克小歷云詔沿邉𣙜場數多致夾帶禁物私相往來可留泗州盱眙軍兩處餘悉罷之按此乃泗州牒中所坐金詔之語克誤也金人又於泗州增𣙜場屋二百間於是盱眙亦如之仍創給渡淮木牌增守卒焉三月丙寅指揮今就附此奉國軍節度使開府儀同三司領御前諸軍都統制職事判興州吳璘為少保初昭慶軍承宣使致仕王繼先欲得節鉞使其徒張孝直等三人校本草獻之詔祕書省修潤刋印孝直等皆進三官給事中楊椿言此但取古注圖經合而録之其勞甚微而賞太重况多訛錯不可傳世詔前降指揮更不施行丁亥權尚書吏部侍郎兼史館修撰周綰引年告老除集英殿修撰知溫州右武大夫知敘州石世逵再任以瀘南沿邉安撫使李莫言其政績也初諸州鑄錢監自紹興以來或省或并其存者所鑄亦希故兵匠有闕不補視舊數省十之三積其衣糧號三分闕額錢饒池江建嚴韶信衡南雄南安諸郡皆有之方提點坑冶司之未廢也朝廷三次降銅本錢凡三十六萬緡至是權户部侍郎提領鑄錢趙令詪言諸州三分闕額錢已積下六載今欲撥付諸監充銅本從之是後不復降本苐收諸州所樁以資鼓鑄之用戊子左朝奉大夫趙不愚知利州左朝散郎文之竒通判階州之竒初被薦召未至都而有是命之竒即告老而歸二十年十月癸丑落致仕己丑詔海商假托風潮輒往北界者依軍法侍御史葉義問試尚書吏部侍郎起居郎兼權樞密都承旨洪遵試中書舍人吏部員外郎王佐守起居郎詔皇太后外家子孫親屬及本殿官皆進官封一等姪逹州刺史訊惠州刺史欣為忠貴成三州團練使左中大夫直祕閣添差江南西路安撫司參議官楊持進秩一等姪婦會稽郡夫人韓氏政和郡夫人張氏並給內中俸皆以慶壽推恩也封吳璘妾劉氏為淑人袁氏李氏為碩人子三人賜五品服庚寅右正言朱倬守侍御史監察御史任古為殿中侍御史古奏事因請葉義問出臺之由上曰義問在臺稱職今委其料理銓曹左正言何溥為左司諫監察御史都民望為右正言右武大夫和州防禦使江南西路馬步軍副都總管賈和仲為殿前司破敵軍統制楊存中請之也辛卯右朝請大夫知邵州王躍為荆湖北路轉運判官詔信州上清正一宫道士張守真特封正應先生守真道陵三十二世孫也壬辰皇叔定江軍承宣使同知大宗正事士籛為安慶軍節度使直龍圗閣提舉台州崇道觀錢端禮行太府少卿時上為右監門衛大將軍榮州刺史愭納婦選得端禮之女故召還而有是命詔臨安府嵗供修內司錢三萬六千緡自今皆除之紹興六年始供忠翊郎思州邉面同巡檢田汝弼通管州事汝弼知思州汝端之弟以其兄自稱疾病有請也降授武翼大夫劉光逺既卒上念其有使金之勞丙申復光逺拱衛大夫利州觀察使丁酉詔蠲四川折估糴本積欠錢三百四十萬緡左武大夫和州防禦使知鼎州劉綱添差兩浙西路馬步軍副都總管臨安府駐劄戊戌禁以龜筒鹿胎玳瑁為飾用知樞密院事陳誠之請也詔淮北商旅渡淮未回之人令臨安府及沿淮守臣根刷限五日發遣如違限不行當牒送北界敢停者依故縱私渡法仍立賞五百千許人告有官司職任之人取旨重行竄責是日雪又雨雹己亥權尚書工部侍郎劉章兼權吏部侍郎給事中兼侍講權直學士院楊椿試兵部侍郎庚子詔曽得解進士祖父母年八十已上特與官封京朝官年八十已上者與改章服選人使臣年八十已上願致仕者加轉一官以慶壽詔書所未及也右通直郎韓元龍為司農寺主簿元龍知天台縣用賀允中薦而召之壬寅上諭大臣曰近户部會賣田錢數頗多此須令樁管近時士大夫持論多説百姓足君孰與不足見公家稍寬遽欲免民常賦不知緩急闕用取之甚難非時而科是謂橫斂茍徒知施惠之虛名而不恤橫斂之實害豈愛民之道也先是權户部侍郎趙令詪建議每縣賣官田十萬緡州二十萬緡守令各進秩一等縣二萬緡州五萬緡以上減磨勘二年有差至是會其數以聞故上有是諭宗正少卿楊偰權尚書工部侍郎癸卯詔武泰軍承宣使添差兩浙西路馬步軍副都總管王安道右朝奉郎直祕閣兩浙轉運司主管文字王守道並令再任兩浙轉運司言浚常熟縣諸浦畢工甲辰國信所言自來大金人使到驛告覔物色打造銀器止是排辦御龍直一面於本府呼索及付鋪所造作欲乞並令當管通事置歷抄轉出豁庶絶姦弊從之丁未封嗣濮王士輵第七女為永嘉縣主第九女為永春縣主從所請也戊申權尚書吏部侍郎葉義問兼史館修撰義問嘗言有備無患陛下當密行之夫海道四方通會所冝預防則明言曰近日商舶不行盜多出沒所以籍定船隻以示禁戢淮甸隍池不全所宜預守明言曰近有越界盜馬作過所以團結保伍以防姦盜若遣沿邉戍卒則曰近日諸軍勞逸不等所以議更戍者將以均之若譏察斥堠之滯則曰近日諸處案牘墜失所以革滯者防墜失耳至若揀軍者歲時所常行牧馬者就水草之地皆明言之彼亦無辭而發也凡此六者今日急務卒行則不及預備則有餘矣己酉上謂大臣曰聞江西境內有羣聚而掠人於道者王綸曰艱食之民不得已而為之未必皆嘯聚也上曰凡災傷處悉令賑濟蠲欠已及二十七年不知州縣奉行如何輕徭薄賦自無盜賊故唐太宗用魏徴之言行仁義既效且曰惜不令封德彛見之然德彛與虞世基輩皆隋朝佞臣誤煬帝者太宗受命自當斬之以為姦佞之戒祕書省校書郎兼國史院編修官汪徹言立國惟文武二道而人才尤不可偏要當求於無事之時陛下親政以來除召四出滯者奮屈者伸然武臣中未聞有薦者且其抱才負氣豈不願效尺寸以幸一旦之遇望詔帥臣監司於本路大小使臣舉智謀可充將帥勇鷙可率士卒者其侍從臺諫官如有所知亦許論薦自孫道夫使還言金主亮詰以關陜買馬非約恐將求釁於我士之有識者默為此慮而未敢顯言為備徹因轉對首有是請上從之庚戌吏兵部請自武舉承信郎以上人通注沿邉親民巡檢縣尉或監當窠闕始用何溥之言也初諸路郵傳每二十五里置一遞役卒十有二人軍興以來凡通蜀道者皆增斥堠遞九里一置其後黃敏行措置江浙荆襄之間舊無斥堠者一切創增大率一縣遞卒多至三百人既有月給又增俸麥衣糧食錢以禁軍三人之費不能增一卒又令諸州通判縣令皆於銜內帶驅催遞鋪增支月緡嵗廢縣官錢十餘萬緡至是祕書省校書郎兼權駕部郎官洪邁言其多廢無所益乞將有斥堠去處應干省遞並行減罷內鋪兵並撥入所闕州充廂軍從之壬子新除直祕閣知廬州黃仁榮入見言前任溫州點檢違法田産已根括到一萬九千餘畝見行出賣又拘收沒官田土嵗收榖租五千五百餘石折納價錢八千餘緡欲同賣田錢併綱起發可以少助經費上曰卿向論鬻田已令户部會其數矣何必往淮西也熊克小歷載上語云卿向鬻田户部已得緡錢五百萬矣按今年七月己酉彭合論賣官田之害而户部奏據江浙諸路月終賣錢一百一十萬餘緡則二月間無緣及有五百萬緡或者仁榮行述墓志夸言之而克不詳考也又按仁榮自奏溫州官田事亦云見行出賣則是元未得錢可知今略修潤令不失實癸丑以仁榮行尚書度支員外郎右武大夫和州防禦使新兩浙西路兵馬鈐轄劉綱為淮南西路馬步軍副總管兼權知廬州甲寅詔頃在謫籍文武臣僚未經量移敘復死於貶所者令有司檢舉元犯具名以聞當議輕重别加恩典左從政郎黃文昌言近蒙浙西提刑邵大受辟充崇德縣令契勘已差下范彤三年于兹行且赴上若以監司辟官之故遂令本人無故改替決為狼狽兼未曽到官安知其非廉吏伏望改正前命令范彤赴任庶幾文昌獲安亷耻之分詔文昌别與差遣文昌六月丙寅為任古論罷召命當考三月丙辰朔詔今後四川類試用九月十五日鎖院朝廷於帥臣監司內選差考試監試官各一員於鎖院二十日前用金字牌遣降指揮在院官吏如有挾私違戾令監試徑行劾奏餘官制置司精加選差務盡公明不得苟簡先是集英殿修撰周綰為吏部侍郎建言四川進士類省試所奏差試官乃取一路帥臣職司封部既異在院官吏勢難總一欲望今後選差行在清強官一員或假以御史之名充監試詔禮部看詳申省於是權禮部侍郎兼侍講孫道夫言臣僚所乞委得允當但四川去行在遙逺難以差官前去更合取自朝廷指揮故有是命是日道夫侍經筵猶請罷類試令赴禮部上曰早方與執政議今歲已無及後舉當遣御史監之道夫曰御史監試事體固重然所關防不過試闈中傳義代名等弊其有前期投舉業問題目以祕語為契驗則無迹可尋必令赴禮部乃為允也此以王之望所撰道夫墓志及四川制置司事類參修熊克小歷載道夫所言於今年六月末又以陳良祐撰楊椿墓志中所載監司子弟赴省事聨書之亦誤矣楊椿所言乃在去年七月乙亥此時椿不兼祭酒也祕書省校書郎兼國史院編修官汪徹為監察御史新除度支郎官黃仁榮依舊直祕閣提點兩浙東路刑獄公事尋改知秀州仁榮至郡數月又得賣官田錢六萬餘緡詔減二年磨勘七月己亥指揮己未權尚書工部侍郎楊偰充敷文閣待制提舉佑神觀從所請也辛酉龍神衛四廂都指揮使榮州團練使階成西和鳯州路兵馬都鈐轄御前中軍兼左軍統制節制綿劒州屯駐軍馬知成州吳拱為樞密副都承旨後五日遷潭州觀察使給真俸癸亥上謂宰執曰祈雨略應未至雱霈且令斷屠三日所免止是豬羊民間緣此競食雞鵝魚蝦之屬害物命多過百倍可更斷三日生命微物悉禁之左朝散郎徐林知信州司農寺丞葉顒知處州夜雷聲初作戊辰資政殿學士知潭州魏良臣以皇太后上壽金器來獻詔還之辛未詔以浙西去嵗水災臨安府養濟人令展至三月終止壬申右武大夫閣門宣贊舍人福建路兵馬鈐轄殿前司左翼軍統制陳敏為荆湖北路馬步軍副總管兼知鼎州直寶文閣霍蠡卒癸酉權尚書工部侍郎兼權吏部侍郎兼侍講劉章罷初章在工部時郊恩賞賚給絹主胥欲以絹自入而下其直以與衆衆不服請於章章語胥曰如所直以市百縑可乎蓋謾為詞以折服之耳胥遂誣章以實令市絹有摘其語於言事者侍御史朱倬乃劾章嘗令小吏市絹多所倍費疏始上上愕然曰劉章必無此事倬執不已章遂罷去熊克小歷載此事于紹興三十年蓋差一年甲戌右朝奉郎新知蔣州張祁為淮南轉運判官兼淮南西路提點刑獄公事新湖北副總管知鼎州陳敏入見上車戰之法上謂知樞密院事陳誠之曰車戰雖出古然用各有宜誠之曰非澤國所宜用同知院事王綸曰房琯猶敗於中原况澤國乎上曰姑令三帥議之免令武臣有一得之歎然卒不行丙子詔諸路州縣紹興二十七年以前積欠官錢三百九十七萬餘緡及四等以下户係官所欠皆除之宰執奏擬詔意上曰輕徭薄賦所以息盜歲之水旱所不能免儻不寬恤而惟務催科有司又從而加以刑罰豈使民不為盜之意故治天下當以愛民為本權尚書吏部侍郎兼史館修撰葉義問兼侍講丁丑詔帥臣監司侍從臺諫歲舉可任將帥者二員具材略所長及曽立功效聞奏用汪徹請也熊克小歷併書於二月己酉今附本日祕書少監沈介權尚書吏部侍郎尚書左司員外郎王晞亮權工部侍郎大理評事趙善養言王者制民之産皆有定法蓋所以抑兼并而惜民力也比年以來形勢之户收置田畝連亘阡陌其為害甚者無如差役今官户田多差役並免其所差役無非物力低小貧下之民州縣稍不加恤求其安裕樂業不可望也望命有司立限田之制以抑豪勢無厭之欲戶部奏品官之家所置田産依條格合得頃畝已過限者乞免追改將格外之數衮同編戶募民差役詔給舍同户部措置其後給事中周麟之等請品官子孫名田減祖父之半其詭名寄産皆併之滿三月不陳許人告以其田之半歸官餘給告者其募人充役並募本縣土著有行止人充從之善養故簡獻王曽孫也甲申權禮部侍郎孫道夫言四川類省試已降指揮選差監試考試官各一員今看詳别試所收試避親進士其利害關防比之類省試事體無異欲望亦自朝廷選差監試并考試官各一員所貴選舉盡公仰副聖世取士之意從之是月司農少卿總領四川財賦許尹始視事尹以備邉故乞空名告身於朝得八百六十道其後纍年間抑售於民者凡五百五十七道計直二百五十萬緡蜀中大擾降告身不知在何月日按王之望奏劄稱紹興二十九年朝廷降到告身若干自是前官所乞故因尹交割附見更須詳考金主亮再修汴京命尚書左丞相張浩參知政事敬嗣暉董其役集諸路夫匠大興宫室極其侈靡將徙居焉太府監魏子平權尚書右司郎中從浩行子平尋丁憂未踰月起復浩遼陽人也此以張悌正隆事迹宋翌金亮本末及趙可撰魏子平墓志參修志稱從張太師修南京大內張太師即浩也子平已見二十八年五月夏四月按是月乙酉朔庚寅詔大理評事賈選潘景圭等四人並與外任自今試中刑法而未歷任者勿除用侍御史朱倬請選安宅子也起居郎王佐罷先是侍御史朱倬論劉章市絹事斥去之事見三月癸酉朝士皆知其寃而無敢言者佐獨於上前極論其事倬怒劾佐植黨懷姦詔與外任乃以佐知永州祕書省校書郎洪邁兼國史院編修官召武信軍承宣使鄂州駐劄御前軍統制李橫赴行在詔殿前司破敵軍統制賈和仲與新湖北路馬步軍副總管兼知鼎州陳敏兩易仍命敏以泉州左翼軍二千人兼家屬器械自海道赴行在左司諫何溥右司諌都民望言和仲嘗知利州非法殺人不可勝數又嘗知歸州招聚不逞恣行殘酷議者謂使充軍下差遣尚慮凶橫豈可使典邉藩乃詔鼎州依舊差文臣而復以和仲為殿前司統制和仲罷命在是月己亥右朝奉郎新通判和州董長年降一官放罷仍不得於湖州諸邑居住長年居武康縣私養亡命擾民為姦事聞故有是命壬辰國子司業黃中賀金主生辰還時金主亮再修汴京以圖南牧沈介為賀正旦使先還不敢言中歸為上言彼國治汴京役夫萬計此必欲徙居以見逼不可不早自為計時約和久中外解弛無戰守偹上聞矍然曰但恐為離宫也中曰臣見其所營悉備此不止為離宫若南徙居汴則壯士健馬不數日可至淮上惟陛下深圖之宰相沈該湯思退聞之詰中曰沈監之歸屬耳不聞此言公安得為此也居數日復往白請以妄言即罪思退怒至以語侵中時中書舍人洪遵亦請密為邉備該等不聽己亥尚書右僕射湯思退言三省實總萬幾各有本省法自大觀間修中書門下敕令格式歷年已久而尚書省第有省記條册望選從官兩三人以典故法令參修三省成法來上從之其後敕局罷書不克成罷局在三十一年乾道六年七月丁酉修權吏部尚書賀允中言近有偽傳臣所上書言時政者乞立賞格捕從之鎮江府火詔商販竹木捐其稅被火之家以常平米濟之庚子詔近令中外薦舉武臣召到者無闕可處可增置帶御器械四員辛丑詔修臨安府至鎮江運河堰閘時久旱河涸綱運遲留又使人且至權户部侍郎趙令詪以為言故浚之詔以唐西平王李晟配食武成王降李績於堂下用右正言都民望奏也壬寅國子司業黃中守祕書少監近例使北還者率得從官宰相以中言金有南牧意惡之故沈介遷吏部侍郎而以中補其處先是武成王廟生芝草武學博士朱熙載密為圖以獻熙載金壇人湯思退所薦也於是宰相召長二至都堂責之曰治世之瑞抑而不奏何耶祭酒周綰未及言中指其圖謂曰治世何用此為綰退而嘆曰惜不使通老為諫諍官也芝草事據黃中墓志所書修入以李石詩考之芝草生在紹興己卯蓋今年事又云石時官忝博士職按石除博士在今年六月而周綰二十八年七月已自祭酒遷吏部侍郎黃中今年四月已自司業遷祕書少監皆不同時不知綰雖遷侍郎仍兼祭酒或芝草生時石尚為太學録也石除學録亦在今年二月若以為綰未遷時事則是去年今年連冇芝草生恐志或詩必有小誤李石事詳具今年十一月石罷博士左朝散大夫張柄卒癸卯大理少卿金安節守宗正少卿光祿寺丞韓彥直行尚書屯田員外郎監察御史沈樞行尚書比部員外郎初有詔盡鬻諸司官田而兩浙轉運司營田九十二萬六千餘畝嵗收稻麥雜豆等十六萬七千餘斛官莊田四萬二千餘畝收稻麥等四萬八千餘斛內稻麥充行在馬料雜豆等糶錢納激賞庫轉運副使提領營田趙子潚審於朝詔令出賣丙午上謂宰執曰內外諸軍朝廷未嘗輒有役使而為主兵將佐運材營造非理致怨又回易物貨本收其贏以助軍用今乃虛飾增直折與軍人掊斂百端所謂月給十不得二三又有納直賣工坐妨教閲姦弊如此何以使其不竄而為盜卿等可靣諭三衙禁止仍嚴行約束乃詔內外諸帥戒約將佐日下住罷如有違戾重致典憲三省樞密院覺察尋又於軍門榜諭榜諭指揮在五月庚申中書言私渡淮人已立罪賞尚恐透漏詔武經大夫忠州刺史淮南東路馬步軍副總管宋肇措置檢察時肇方自言效職淮東已二十五年遷副使亦二十年嘗從劉光逺至泗州及收捕淮賊前後未曽磨勘後日詔肇特轉武功大夫丁未右奉直大夫荆湖北路提點刑獄公事向伯奮直祕閣知襄陽府直龍圖閣知襄陽府凌景夏知鼎州詔自今金使到闕伴射官權令綴馬步軍管軍班起居戊申左司諫何溥言今吏員猥多吏部闕用五年而堂除隔兩政內之寺監丞簿學官外之提舉市舶皆預置代者朝廷執事官或出於宰相之推擇或出於侍從之論薦除目一下士以為榮豈可冗授其人溢用其闕而下比於州縣之職哉若居者未遷而來者不已臣恐兩政五年之闕因循遂用而所謂卿監郎官與大提轉常平之屬安保其不爾望深詔大臣愛惜名器毋輕假人使朝廷用闕常有餘地冗員茍去勿復遽補庶以示士大夫敦勸之義從之己酉左承議郎吕忱中知泰州既而殿中侍御史任古言忱中天資隂險所至貪墨前此特以父嘗薦秦檜檜報私恩連倅婺信後以告訐林機得江東提監逮檜之死迹不自安欲欺罔朝廷以掩前過遂按王晌常平米事興起大獄連逮甚衆朝廷差官考實並無事迹緣此降罷泰為淮東望郡任匪其人且將害及一方疏入命遂寢辛亥宰執進呈祕書省正字王端朝請選縣令上以縣令員多皆由銓注難以悉舉先是纍詔監司帥守舉按縣令功罪雖間有發擲而未聞特薦一二人者蓋專務行法而無旌賞使人歆艷恐非勸功之道乃詔縣令有政績者委諸司同薦不次升擢以風厲之左朝請郎新知蔣州孫鎮移通州右承議郎通判濠州龔濤知蔣州右朝請大夫知濠州鮑妤移知南劍州武功大夫劉光時知濠州侍御史朱倬言帝王立國強本之術在於節儉臣去冬嘗乞內自省臺寺監外洎監司郡守凡可以撙節者悉令條具蒙賜俞允今已半載未聞內外官司條具來上豈官司以為不急之務與抑惡其害己而不欲言之也臣謹綴其一二上瀆天聽契勘職事官既賦以厚祿矣而又身兼數職所得乃返多於本俸或以進書或以過局又在外焉此臺省寺監之可節者州縣之官其有俸給既優而復圭租豐衍髙者嵗至千斛少者亦不下三二百斛至有強敷價錢多量斛面不恤旱潦不認逃移此監司郡守之可節者欲望睿斷悉從裁減在內或去其三之二或中分而節之在外以監司守倅為一等屬官知縣為一等丞參簿尉為一等降殺裁損務得其平仍乞將此撙節金錢內則别作庫眼外則憲司主之一如祖宗封樁之法専以待激賞將士之勳庸拯救黎元之難苦非奉特旨不得巧作名目移用詔給舍臺諫逐一取索同議裁減中書舍人兼權樞密都承旨洪遵言瑞昌興國之間茶商失業聚為盜賊竊慮日復一日馴致滋蔓望令州郡揭榜開諭許其自新其強壯可用願充軍籍者即時填刺發往諸軍其不利為兵而願歸農者給憑放還復支路費仍於上供經總制錢內除尅庶幾失業之人有以安業從之是月歸朝官李宗閔上書言臣竊聞近者金人岐雍間伐木以造浮梁東京長安修治宫室遷諸路兵戍聚於關陜遊騎千數出近邉覘視虛實姦謀詭計未可窺測臣以疏賤冗散思效犬馬圖報萬分之一區區管見可以裨廟堂末議者析為三事其一曰嚴守禦方今天下根本在吳蜀輔車相依其勢若手足之相應荆州據其中心腹之地也今襄陽扼荆州之衝又足以為荆州重輕而重兵皆駐武昌荆襄之間所以自衛者未固且襄陽在今為極邉去荆州四百五十里無重山峻嶺長江大河之險敵人馳輕騎不兩日可至城下萬一荆州為其所據吳蜀首尾不能救朝廷雖以劉錡鎮荆州其威名固自聳聞鄰國然無兵以自固雖太公穰苴尚何能為至於襄陽之兵不過千餘人又皆疲懦安能以備緩急望俾劉錡將二萬人分屯荆州要害更令不住召募日夜訓習張聲勢嚴斥堠仍擇久歷將陳者一人以副之如田晟蓋其人也晟雖老而戰功之最敵人素畏之今居南昌未足以究其施設若使與劉錡協力敵人不敢復事南牧襄陽則遣一智勇兼全之將分武昌之兵萬人比嵗更其戍守荆襄既已有備吳蜀可髙枕而卧矣其二曰募新軍臣往往在行間常見三衙及諸處招軍皆市井遊手數年之後雖習知騎射擊刺之事而資性疲懦不改也臣聞福建汀贛建昌四郡之民輕剽勇悍經涉險阻習以為常平居則投石超距椎牛伐冢聚為小盜而為姦雄之資有人焉駕馭役使必能得其死力臣竊見殿前司左翼軍統制陳敏生長贛上天資忠勇其民亦畏而愛之所統之兵近出田舍且宜占籍遂為精兵人人可用若朝廷専委陳敏俾招集四郡之人使金人果叛盟則攻守皆可為用若尚守和好則可以填三衙闕額之數臣觀今日敵人之舉其志不小如聞遷陜右兩河之民悉以為兵與夫契丹奚家漢兒雜類不下數十萬衆聚之關陜其在他路又不知幾萬人若欲攻蜀則吳璘姚仲王彥之兵足以相抗臣觀其兵皆逺來烏合之衆利在速戰朝廷遣楊存中成閔提兵總率沿江諸帥各守江淮之險堅壁持重故老其師將不戰而自潰况金人比年以來父子骨肉自相屠滅用事之臣死亡殆盡尚且逺離巢穴大興土木虐用中原之民皆自取滅亡之道且空國而與人戰兵家所深忌吾方與之相持於江淮之間别以陳敏所招數萬人興戰船取海道不旬日可至山東徑入燕山搗其巢穴此所謂攻其所必救者前湖北副總管李橫雖出河朔賊盜朝廷優以美官橫亦感激奮勵思有以報臣過荆州觀其為人聽其議論皆有可取劉錡亦為之加禮山東河朔橫習知形勢若朝廷使與陳敏分兵北向均其事權必然協濟機事仍委三衙令諸軍統制各舉河朔山東勇而有謀者一人計得三十餘人使從其行分往郡縣曉以逆順禍福之理河朔山東既為內應敵人進退失據而陜右兩河之兵必思潰叛吾能及其鋒而用之適足以為吾之資矣若朝廷以趨海道為迂只乞以陳敏所招人屯之襄陽亦可以捍禦一面其三曰通鄰國宣和之末臣陷燕雲者纍年敵人以先臣不屈就死散於韓企先家充奴婢役使企先與烏珠密議臣皆得密聽之蓋聞金人之馬皆塔坦所入冀北雖號産馬之地自興兵以來所養至少金人置𣙜埸於白水與塔坦貿易丁未嵗塔坦之馬不入金國而又通好於逹實林牙金人即遣使問罪塔坦使其子來雲中問過金人羈留不得還戊申歲伊都金吾出師攻逹實林牙使塔坦助兵以為鄉道許歸太子已而伊都敗師欲結連謀叛事泄亡入塔坦太子卒不遣還自是太子鬱結成疾並其母死於雲中塔坦之恨深入骨髓今若遣一介之使開其禍福曉以利害使塔坦之馬無與金人互市金人利於騎戰捨馬則無所施其能矣至於西夏亦與金人為讎而金人亦素畏之金人嘗割天德雲中金肅河清四軍及八館之地以賂夏人矣丁未之歲烏舍郎君領數萬騎陽為出獵而直犯天德逼逐夏人悉奪其地夏人請和金人執其使者臣是時久留雲中人情稔熟因得出入雲中副使李屈移謂臣曰昔年大金賂我四軍八館俾我出軍牽制關中合從以攻南宋及其得志首叛盟約某昔年兩使南朝其禮義文法非他國之比自是觀之則知西夏惡金人喜中國可知壬子歲尼瑪哈聞蜀地富饒欲提兵親取今雲中副留守劉思恭條陳書傳所載下蜀故事及圖畫江山形勢鋭然欲往夏人聞雲中聚兵以為攻已舉國屯境上以備其來尼瑪哈亦不敢出兵止遣薩里罕珠赫貝勒以犯饒風今莫若遣辨士諭以盟約俾以重兵出境上為吾聲援臣尚有私憂過計者金人強則稱兵弱則請和頃歲經合肥順昌及川口數戰敵人倉皇議和朝廷姑務息兵屈體從之然則今日之舉首叛盟約自取滅亡其勢不利必將復要前日之計慎勿許和小勝則於荆楚之間練兵秣馬積粟務農徐為後圖大勝則長驅席卷以圖恢復臨機制勝猶有不可預言者臣又聞自古用兵有聲有實今者兵不出境而張皇聲勢惟恐吾之不知乃於近塞積石為郛閉𣙜場絶商賈造戰船自春徂夏且非秋髙馬肥之時臣願分遣諜者伺其虛實若誠如臣言則上兵伐謀之舉亦不可後惟陛下採擇宗閔不知此時為何官職以書中所云考之恐是李邈之子其所上書亦無年月以言北事甚悉故詳載之書中言閉𣙜場蓋今年二月事又云自春徂夏當是四月間以日歷考之今年四月庚寅陳敏當除破敵軍統制五月丙寅王宣戍襄陽六月丁亥李橫浙東總管閏六月甲寅荆南增兵乙卯劉汜除效用統領與宗閔所言往往相符故且附四月末俟考建炎以來繫年要録卷一百八十一建炎以來繫年要録卷一百八十一金人地名考證達實原書作大石誤改見卷一烏舍原書作兀室誤改見卷一尼瑪哈原書作黏罕誤改見卷一伊都原書作餘都誤改見卷一薩里罕原書作薩里合誤改見卷十一珠赫貝勒原書作折合孛堇誤改見卷三十七烏珠原書作兀术誤改見卷一塔坦原書作逹靼誤改見卷五十八
