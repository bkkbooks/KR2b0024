body:
  text: 建炎以來繫年要録巻六十五宋李心傳撰紹興三年五月乙卯朔上諭大臣曰朕省閲天下事日有常度每退朝閲羣臣及四方章奏稍暇即讀書史至申時而常程皆畢乃習射晩則復覽投匭封事日日如是也中興聖政臣留正等曰為天下者豈易哉躬勤而治君徳明矣夫户樞之不蠧以日運也筋力之人少疾以氣血無壅也况乎天下之大一人臨之勤亦不可以已也而明實生焉漢之君惟能勤訪公卿覽奏事講論經傳而致中興之盛惟其為臣所蔽使不得閑又不觀書而兆於亂故不勤則無為明也不已於勤則亦不已於明也太上皇帝躬明徳以濟中興其積諸此詔諸路宣諭官所薦人才並俟終更令入對當予陞擢以勸能吏左文林郎王闈除名全州編管闈吳縣人嘗以朱勔薦為秘書省正字右武大夫忠州防禦使楊可輔出一美妾吕頥浩欲之俄闈以貲取去頥浩大怒宣諭官胡䝉即劾其不法頥浩奏遣大理寺丞姚焯至平江按治坐詭立官户减免助軍錢特責之其所欠租稅悉令以其家田土計置納入官四年三月己未改正右朝奉郎新浙東提舉茶鹽王暘勒停以左司諫唐煇論其妄占民田也暘平江髙貲宣和中以交權倖得三品服至是併奪之左承奉郎林儼獻書二千巻詔官其家一人尋以儼監西京中嶽廟日厯不書儼差遣此據儼乞補官状増入詔諸路提刑司起發諸州建炎以來禁軍封樁闕額錢赴行在日歴無此今以八月甲辰手詔所云附入當考丙辰武翼郎閤門宣賛舍人權河南鎮撫使翟琮為利州觀察使河南府孟汝鄭州鎮撫使兼知河南府武功郎權河南鎮撫司馬歩軍都總官董先為武功大夫吉州觀察使河南鎮撫副使權提舉商虢陜州軍馬張玘為武翼大夫果州團練使知陜州權兵馬鈐轄起通為武顯郎閤門宣賛舍人知商州先是琮擒孟邦雄遣幹辦公事雷震来奏事上大悅遂有是命琮言道路梗塞緩急無兵救援請亦𨽻宣撫處置使張浚許之遂詔有司以米二萬石餉琮軍且命董先及李横牛臯彭玘㑹兵牽制時朝廷方嘉横敢勇向前命横等直至京城或徑徃長安與宣撫司夾擊江西安撫大使趙鼎奏襄陽居江淮上流乃川陜襟喉之地以横鎮撫誠為得䇿今聞横臯共起兵徃東京又聞偽齊亦㑹金人及遣李成領衆西去恐緣此紛擾不定横烏合之衆將不能禦則决失襄陽川陜路絶江湖震動其害可勝言哉近有自襄陽來者言横正緣乏食兼無衣則其出兵固非得已望詔有司時有資給使横衣食足則不假他圗然後責其守疆待敵不得因小利出兵則可乆之計矣上覽鼎奏始憂之於是蜀口敵騎已退而董先牛臯皆失守南奔朝廷盖未知也餉琮軍及令與宣司夾擊在丁未琮乞𨽻宣司在戊午今聨書之熊克小歴載琮除觀察使在四月初詔李横夾擊在四月末實甚誤矣命工部侍郎李擢提舉製造渾儀初馬氏據湖南始敷郴道永州桂陽監茶陵縣丁錢絹米其後丁有逃亡而不除其數民極以為患至是湖南宣諭薛徽言奏道州丁米萬七千餘斛乞以其半敷之田畆半取之身丁事下漕司相度未㡬守臣右朝散大夫趙坦亦以為言乃命田畆敷三分之二今年八月己酉詔博糴米斛以度牒官告償其直者中糴數多之家多給官告數少者給度牒博糴事祖見四月戊子龍圗閣直學士提舉亳州明道宫林遹卒是日徐文以舟師過青龍鎮遂至海門縣盡棄南船掠民間淺底湖船放洋而去沿海制置使仇悆都統制閻臯神武中軍統領朱師閔合兵追之不及文所部復歸者千餘人詔𨽻神武中軍與師閔俱還行在悆坐貶二秩五月壬午丁巳故武功大夫忠州團練使翟興以死事贈保信軍節度使遣樞宻院計議官任直清徃襄陽商虢河南撫諭仍賜河南鎮撫司黄金百兩為祭告諸陵之費直清本鎮撫司營田官其除計議日月未見當考戊午和州防禦使帯御器械張公裕同管客省四方館閤門公事兼沿海制置副使朝廷將罷仇悆故有是命大理少卿元兖言律令煩多非明察詳審而熟於憲章者未免有失故四方請讞比擬繆誤者十常二三舉此騐彼則得自論决者槩可知矣望令刑寺官具法令引用有可擬者為之推原法意申明以頒天下俾郡縣無承用之駮而姦吏絶因緣之市以廣陛下欽恤之意詔刑寺㸔詳如其請己未命神武中軍統制楊沂中統所部三千人徃嚴州措置盗賊初遂安民繆羅以匿妖民余五婆為官兵所捕遂率其徒據白馬源羣出拒敵事祖見三月戊寅知嚴州顔為遣兵馬監押從義郎王宏將射士保甲六千餘人捕之事聞乃命沂中行以神武右軍都統制張俊兼權中軍統制中書舍人趙思誠充徽猷閣待制提舉江州太平觀從所請也權河南鎮撫使翟琮權陜虢經略使董先言今嵗臣等首同李横東擊偽齊京城震恐復以無援引兵而歸思之痛廹臣等所管之地東至鄭州西至京兆南渉偽境北臨大河亦得兩國虚實但西南去宣司三千餘里東南去行在四千餘里外無應援内乏糧儲勢力孤絶望選委重臣於行朝宣司之中屯駐一司以為聲援詔報以已令韓世忠充宣撫使領大軍屯淮南辛酉詔築第百間以居南班宗室仍以睦親宅為名故朝請大夫歐陽棐贈直秘閣以元祐黨人故也棐修之子元祐吏部郎中黨籍餘官第六人河南布衣王忠民特改宣教郎忠民潁陽人世業醫忠民㓜通經史尤明於刑名靖康以來數言邊方利害於朝累召弗至上渡江忠民隠居不出諸鎮翟興等皆重之弗能致張浚以為廸功郎不受興徙治藥川忠民避地南下遇商虢鎮撫使董先於内鄉留之軍中事以師禮忠民以為豫僣立嘗作九思圗及定亂四象遣人逹之金帥又鏤版印圗散於敵境及偽齊以斷天下之疑至是翟琮薦其忠節於朝遂命先津遣赴行在録故樞宻副使包拯曽孫嗣直為廸功郎用淮西帥臣胡舜陟請也壬戍詔奉使官左承議郎潘致堯武經郎髙公繪赴内殿奏事致堯等言金人欲遣重臣以取信後三日以致堯為尚書兵部員外郎公繪為浙西兵馬都監先是朝廷以果茗縑帛遺劉麟假道麟不納致堯等復持還此月乙丑得㫖付左藏庫寄収時吕頥浩已定議出師而恐與和議相妨事遂中止應童子舉張揉為廸功郎揉饒州人年九嵗能誦書為古風詩孫子論上親試而命之癸亥吕頥浩奏事因論祖宗兵制上曰祖宗制度自朕家法至於仁宗臨御最乆恩澤及人最深朕於政事間未嘗不繹思仁祖庶幾其髣髴也何俌龜鑑我髙宗之法祖也論兵制則曰祖宗制度自朕家法進寳訓則曰祖宗規模此朕家法吏部條法創之可也而曰祖宗成憲不可廢也尚書繩墨寛之可也而曰祖宗成憲不敢改也謂仁祖臨御最乆徳澤在人最深朕於政事專以仁祖為法景徳與契丹講和故事今日可以遵行命以真宗寳訓進呈於是而得繼志述事之孝矣户部言來嵗大禮已下左藏庫自今日收錢十分為率樁出一分專充賞給之用從之甲子右朝奉大夫主管台州崇道觀晁公為言妻任氏受求珍金銀臣並不知法寺斷私罪杖乞改正過名詔改作公罪乙丑侍御史辛炳入對言艱危多事之時冗食之官當减今福建八州而添差至百八十餘員理冝改正詔付吏部炳又言願宣諭大臣自今勿廢公見之禮則必無乏材之歎詔三省通知監察御史鄭作肅言通判出於帥守之門則於州事無所執守視過咎無敢刺舉今藩屏之權已重於此尤所冝謹乃詔諸州通判見任守臣所辟者並罷丁卯尚書吏部侍郎韓肖胄為端明殿學士同簽書樞宻院事充大金軍前奉表通問使給事中胡松年試工部尚書充副使趙甡之遺史云上命朱勝非擇副使勝非言故事當用武臣時方艱危不冝專拘舊制遂薦松年按史此時勝非丁憂未還朝遺史恐誤今不取詔肖胄官子孫七人松年五人上中節二十九人皆遷官四等白身人予初品官下節七十人各遷四資三節人共賜裝錢二千三百七十緡銀三百八十兩帛千五百一十匹探請俸兩月又别給贍家及飡錢加賜肖胄錢萬緡黄金三百兩綾二百五十匹為私覿費賜金錢在戊辰三節人轉官資至給贍家銀在辛未使副與恩澤及裝錢在壬申賜綾在壬午今併書之時肖胄長子右奉議郎恊提舉浙東茶鹽乃詔肖胄次子右通直郎彬松年親屬右朝奉郎田積中各於寄家處添差通判彬臨安積中平江自是以為例二人添差在此月庚午安化蠻䝉全劔聚八百人焚冝州普義寨廣西經略使許中遣兵馬鈐轄羅選統冝融平觀西郡兵擊之戊辰以聞是日神武中軍統制楊沂中以大軍至桐廬縣而魔賊繆羅與其徒八人已就招日歴五月庚午嚴州奏王宏捉下繆羅等八人而六月丙申楊沂中申乃云繆羅已就嚴州招安明非捕獲也今從後奏當考詔沂中速徃招捕餘黨宣諭官胡䝉請榜諭其徒能自首者免罪給賞許之既而沂中捕斬其徒九十有六人詔沂中以舊官領保信軍承宣使將士進秩有差胡䝉建請在五月己卯沂中申到在六月丙申遷官在七月庚辰亂之始作也鳯林廵檢保義郎章甫淳安尉右廸功郎曹作肅指使保義郎徐詹皆為所害後各官其家一人十月丙申甫等贈官與恩澤己巳起居郎黄龜年起居舍人張綱並試中書舍人秘書少監孫近行起居郎偽齊尚書户部郎中兼權侍郎權給事中馮長寧尚書右司員外郎許伯通同修什一稅法及阜昌敕令格式是日書成凡條法三十一件隨法申明二十二件諸律刑統䟽議阜昌敕令格式與什一稅法兼行文意相妨者從稅法其進劄大略云宋之季世稅法為民大蠧權要豪右之家交通州縣欺侮愚弱恃其髙貲擇利兼并售必膏腴减落税畆至有入其田宅而不承其稅者貧民下户急於貿易俛首聼之間有陳詞官吏附勢不能推割至有田産已盡而稅籍猶在者監錮拘囚至於賣妻鬻子死徙而後已官私攤逃户賦則牽連邑里嵗使代輸無有窮已折變之法小估大折名曰實直巧詐欺民十倍掊取舎其所有而責其所無至於撿災之蠲放分數方田之髙下土色不公不實率皆大姓享其利而小民被其害貪虐相資誅求不輟朝行寛恤之詔夕下割剥之令元元窮蹙羣起為盗其大指如此此據偽齊錄庚午詔免岳州今年稅役用守臣范寅敷請也寅敷時已丁憂尋詔起復寅敷起復在丁丑辛未中書門下省檢正諸房公事李與權試大理卿尚書左司員外郎王庭秀為中書門下省檢正諸房公事駕部員外郎韓膺胄守左司員外郎樞宻院檢詳諸房文字王岡為右司員外郎膺胄以其兄出使故遷左宣教郎江端友守尚書祠部員外郎主管温州神主尋詔端友兼權太常少卿充神主神御提㸃端友權少卿在此月壬午湖北安撫司統制官拱衛大夫忠州刺史顔孝恭為貴州團練使武經郎閤門宣賛舍人郝晸等千二百九十四人並進官有差以平右陂盗饒青之功也壬申言者論五使所至訟牒紛起其間固有乆負屈抑不得自伸至於因緣嫌怒虛誕不實者十蓋八九望令有司具申朝廷特寘嚴憲從之癸酉京西撫諭任直清辭行乙亥天申節韓世忠進生鹿上不欲却諭輔臣將放之山林以適物性樞宻院言已遣使詣大金議和恐沿邊守將輙發人馬侵犯齊界理冝約束詔出榜沿邊曉諭如敢違犯令宣撫司依法施行丙子左朝奉大夫知永州黄陞與其州官文武六人並罷以湖南宣諭薛徽言劾其贓汙不法也是日金房鎮撫使王彦遣兵復金州初金兵既還彦遣本司統制官武節郎許青以所部千三百人出漢隂縣偽京西南路安撫使周貴迎戰青引兵横擊大敗之貴僅以身免遂復金州又敗金兵於洵陽乃棄均房去時軍食益艱張浚乃以彦兼宣撫司參議駐兵通州而留統制官武功大夫格禧以兵三千守金房是役也宣撫司幹辨公事右朝散大夫髙士瑰以功加直秘閣將佐軍効義兵三千四百七十人受賞有差日歴四年四月己酉王似等奏至丁丑右奉議郎鮑貽遜知黄州仍命以江西湖北兵千人之任賜白金二千兩為軍費貽遜奏右廸功郎李敏功為判官從之賜銀辟官並在六月丁亥左中奉大夫王聲英州編管坐權知岳州受賕當絞也仍以其獄示諸路州縣戊寅殿中侍御史曽統試秘書少監左宣教郎李長民守監察御史左修職郎程克俊右廸功郎監明州比較務歐陽興世登仕郎鄒况並特改京官先是四人俱得召對上問輔臣曰長民性行比兄正民如何吕頥浩對二人皆淹博文詞則長民優上曰陳襄薦司馬光等朕得其藁以示從臣而正民以為光等皆不合時冝者士大夫笑之徐俯以長民家世趣尚對且言正民之父景淵長者持論平正不以元祐為非臣嘗戒長民當繼父志上曰顧長民材行何如爾元祐之人雖賢其子孫亦不必偏用餘人亦不可偏廢惟賢則用之又問况何如人頥浩等對以浩之弟上曰浩固賢今更當議况之賢否爾頥浩曰陛下既賜之對矣故事選人賜對當改秩上可之席益曰陛下不以正民之過而廢長民雖已知浩之賢而又問况之賢否可謂至公矣上曰朕未嘗偏有好惡况用人乎克俊已見元年正月興世修孫也既而侍御史辛炳言况本非士類鄉評無聞玷辱名臣之後望授降等差遣從之况與知錄縣丞在八月癸卯言中興聖政臣留正等曰用人之道與聼同聼言而不繹蔽於先入之私牢不可破此害理之大者也求才必於名門凡賢人父兄之後槩為可用而不加察焉不為善用人者矣夫人才將焉取哉取於踈賤而賢則用之取於世族而賢則用之踈賤非無人才而氣質成就之為難世族非必多才而事業見聞之有自抑逺者多見遺近者無不錄能使大臣知之薦之天子而用之也徃徃寒畯為左膏梁為右耳彼其承藉風烈克肖於一門之中如十六才子者美矣不才如四族者烏能保其有無哉太上皇帝褒錄元祐黨人子孫則象賢崇勸之道也不偏於用舍則求賢審官之公也問李長民之性行更議鄒况之賢否雖大臣所嘗薦論而疇咨吁咈若此以知人之為難也孟子論用賢之道亦曰未可者三然後察之蓋賢哲羣才之鑒惟明則精也一不用明焉殆矣新除尚書司勲員外郎朱震依舊主管江州太平觀震初為胡安國所薦故引疾而有是命己卯詔淮南宣撫司統制官觧元以所部留屯泗州朝廷既遣韓肖胄等行乃俾元退屯盱眙且戒以勿侵齊地宣撫使韓世忠請留淮南兵馬都監劉綱以五百人屯泗上而大軍悉還鎮江詔元以二千人戍泗州餘留屯江北湖南宣諭薛徽言上左承議郎通判永州劉延年祁陽令張登治狀上問延年何如人輔臣皆言不識上曰古人求賢如不及然人故未易知雖聖人猶難之大臣既不識何由知其賢否通判非如縣令之不可數易也乃召延年赴行在登就任増秩徽言又奏擅發錢米賑糶饑民乞黜責上釋其罪因詔自今宣諭官合用錢物並申朝廷違者重寘典憲延年敞從子也嘗權興國軍巨寇李勝以迎奉神御為名將徒衆數千人拏舟入軍延年御之有方勝屈伏而去江西人至今稱之敞青江人嘉祐侍讀學士左武大夫忠州防禦使新知郢州曹成為兩浙東路兵馬鈐轄紹興府駐劄日歴成自正使遥團除恐誤左朝奉大夫知衢州汪思温左奉議郎知嚴州顔為並罷思温仍貶秩一等坐失察妖民余五婆為變也以尚書吏部郎中李大有知衢州尋詔以為捕獲繆羅復令居官以責後效後又進一官大有清江人也孫覿撰汪思温墓誌知衢州時有諫議大夫被召過郡或請致豐餽公曰諫官御史當如部使者之禮不敢過也既去又揚言謂公薄已公曰諫大夫辭受天下所瞻而子敖以我為簡乎嵗餘嚴睦盗起公聚兵境上塞其隘秋毫不犯盗平而諫議公適在樞省劾公玩寇降秋二等罷歸御史中丞辛炳道三衢得公寃狀䟽辨其誣詔復故官按史余五婆乃衢州開化縣人思温為守臣不云無罪又此乃都省所劾非樞宻院奏也日歴五月九日癸亥侍御史辛炳有本職公事進對在思温未罷前十日今乃云未㡬炳道三衢得思温寃狀亦誤矣覿所云恐未可全據今且附此更須詳之為六月甲中還任四年三月己未轉官忠訓郎閤門祇候劉軫為左奉議郎與通判差遣軫政和初中進士第為郾城尉以捕盗之勞換右職至是請復文階而有此命是日川陜等宣撫處置副使王似至閬州庚辰江西安撫大使趙鼎言岳鄂為沿江上流控扼要害鄂州雖有帥臣及軍萬餘其間大半皆烏合之衆以至器械未備萬一有警難以枝梧欲候䖍賊既平令岳飛以全軍徃岳鄂屯駐不惟江西藉其聲援可保無虞而湖南二廣亦獲安妥詔俟飛平江西湖廣賊畢聼㫖時朝廷聞李横失利乃詔横等逐鎮屯駐非奉朝㫖毋得進兵趙鼎奏李横事冝或可移附此日辛巳罷宣撫司便宜黜陟日歴不載此據成都續記附入初張浚既受黜陟之命事重者出敕行之參知政事席益簽書樞宻院徐俯大不平指以為僣及是浚還行在而王似等代之故有是㫖朱勝非閑居錄唐制不經鳯閣鸞臺不得謂之敕命今兩省錄黄是今人所受之敕乃尚書省敕牒也故前云奉敕云云後云准敕故牒然則三省奉行聖㫖之書也張丞相浚頃以知樞宻院為川陜宣撫處置使得㫖以便冝行事事多出敕余在朝廷日見之前云某司以述事因右語云奉敕如何末以使銜押字黄紙大字皆過於敕席參益徐副樞俯大不平指以為僣余曰川士性誇侈意以劄子為不尊故用便宜作敕初不思奉何敕聞渠向自建康出使未出國門已行便冝事亦類此故承議郎胡端修贈直秘閣以元符上書入籍故也端修常州人元祐尚書右丞宗愈子元符上書邪上尤甚第四人黨籍餘官第七十一人建炎以来繋年要錄巻六十五
