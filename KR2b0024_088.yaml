body:
  text: 建炎以來繫年要録卷八十八宋李心𫝊撰紹興五年夏四月甲辰朔監察御史田如鼇為尚書祠部貟外郎如鼇嘗上書排詆朝臣其言及殿中侍御史張絢輔臣入對上因曰臺臣耳目之官朕未嘗不愼此選然必試之六察度其可用方敢除言事官沈與求曰臺臣與朝廷分持紀綱要須得沉厚練達之人則論事不茍可以仰副聖意上曰用沉厚練達之人極是然朝廷與臺諫當為一家不分而為二若朝廷所行臺諫輒詆之臺諫所論朝廷輒沮之則事何由濟趙鼎曰朝廷與臺諫實相為表裏翌日如鼇遂罷郎官之命後三日送吏部與合入差遣如鼇罷御史未知所以四月壬子殿中侍御史張絢乞補外奏一介微賤豈謂見疑同列立致讒言賴聖學髙明物情洞照不待臣之辨析已出睿斷施行當是指此事也八年三月辛卯御史中丞常同奏如鼇上書力排善類乃趙霈隂與之謀結為死黨賴陛下察見奸心亟逐如鼇遂得安靜今併附此更須詳考霈此時為右司諫遣內侍往潭州勞張浚仍以銀合茶藥賜之新除徽猷閣待制知永州胡安國乞以本官奉祠詔安國經筵舊臣引疾辭郡重憫勞之可從其請提舉江州太平觀令纂修春秋傳俟成書進入以稱朕崇儒重道之意光山軍承宣使提舉萬夀觀公事錢愐帶御器械詔進士王九齡召赴行在令閣門引見上殿九齡無錫人其上世姓同太祖廟諱之上字因改焉九齡博極羣書卓越有大志㑹日食求言九齡上書論役法五害如司馬光所言已見於今日中書門下省奏江浙沿襲舊例差保正長催科等事致有破産失業流離之人前後臣僚論列雖多惟九齡建陳曲盡利害已令有司措置立法故有是命九齡入見又上五事一役法二屯田三復武舉四均賦稅五課農桑上再三稱善趙鼎讀九齡奏疏謂同列曰王君論事盡天下之利害非老生之常談也乃以為右迪功郎太平州當塗縣主簿孫覿撰九齡墓志云有不悅其言者止授初等一官不知謂誰當考九齡以是月乙丑補官今聯書之徽猷閣待制提舉江州太平觀宋伯友卒乙巳詔諸路係官田自宣和以後者令先次出賣其房廊白地園圃等令見賃之家限一月自陳依本處體例添納租課仍與减免二分限滿不陳許人告即以其地給與告人用言者請也先是有詔盡鬻官田事祖在正月丁未而議者以謂竭澤而漁明年無魚令軍事未支錢在民間猶外府也一旦欲盡取之何以善後所有係官田地乞且截自宣和以後應可以賣者先委官根括候見著實頃畝四至即大字榜示人户願買人各以時價著錢依已措置事理出賣庶幾歲月未久凡事易於考驗不至紛爭兼多在形勢户下取之無傷縱使巧為占吝亦須髙價承買其宣和以前田地且令官司寬緩括責步畝增减租課改造砧基簿賣與不賣他日臨時相度事下總制司故有是命廣東轉運判官田積中新江西轉運判官王景溫趙公竑新廣西轉運副使宋昞浙西提舉常平茶鹽公事侯憲湖北提舉常平茶鹽公事董補之新江東提舉常平茶鹽公事曾悟並與宫觀理作自陳憲懋弟也殿中侍御史張絢論外臺耳目之寄臣采諸公議凡此七人皆冒濫之尤者故汰之丙午檢校少保武泰軍節度使知明州兼沿海制置使郭仲荀來朝右承奉郎黃大本貸死杖脊刺配南雄州牢城收管大本為貴池丞坐贓抵死故有是命既而監文思院于淙南恩州司户參軍莫憲章皆以賄敗遂斷配焉淙憲章行遣據今年六月二十九日尚書省劄子云爾未見本月日先是右奉議郎吕應問知華亭縣亦坐贓抵死編管化州未數日引赦量移言者以為應問國之巨蠧肆諸市朝猶未足以快吳人之忿止緣應問平時厚以所得賕賂遺權要故按發之日大臣及侍從中有隂為之主者是以有司觀望不敢盡法勘鞫然所上奏牘蔽罪至絞者猶有二焉是豈可以常法論哉臣竊聞前此朝廷之議以宣州勘黃大本及秀州勘應問二人所犯候其獄具中取一人尤甚者用祖宗舊制真决刺配以警贓吏今大本既依法論决而應問贓罪貫盈止從編置雖道途之人皆謂失刑朝廷縱不追治亦宜投畀遐荒永不放還少謝百姓而自去年九月十二日在秀州凖敕編管化州十七日至平江府即作在道㑹赦便與量移用刑如此何以威貪暴而成政治哉况應問贓罪百倍大本吳中士大夫至民庶皆能言之何應問之幸而大本之不幸也伏望特降指揮不許叙赦量移日下差人押赴化州編管庶幾貪贓之吏咸少懲艾從之此疏在今年七月壬辰不出姓名疑謝祖信所上王明清揮麈録云趙鼎恨大本靖康中為蔡絛致書吳敏使蔡京得死牖下遂正典刑當求他書𠫭考按應問乃公著族子鼎以故家之故屈法貸之要非用刑之公而當時給舍如廖剛劉大中胡寅及諸臺諫皆無一言論列良可怪也今具載臺章庶不失實詔諸縣違法知通失按舉而被按於監司諸州違法監司失按舉而被按於臺諫各察治得實者並减犯人罪五等犯人係公罪又减二等並不以去官原免著為令始用議者請也事祖在四年五月丁未龍神衛四廂都指揮使洪州觀察使金均房州鎮撫使川陜宣撫司參議官王彥知荆南府充歸峽州荆門公安軍安撫使先是彥聞上親征乞提兵入援不許㑹張浚以都督視師湖南乃召彥赴行府議事至是令彥留所部三千人戍金房餘悉與俱仍歸荆南舊治其合用錢糧令行府於湖南江西那移應副召荆南鎮撫使解潛赴行在靖康中潛為河東制置副使辟趙鼎幹當公事故鼎薦用之於是諸鎮撫使盡罷矣左朝請大夫淮西宣撫使司參謀官李健直祕閣兼都督行府隨軍轉運判官時劉光世遣健赴都堂禀議故以命之上召健入對乃遣行戊申尚書祠部貟外郎兼權太常少卿張銖奉太廟神主自溫州至行在宰相趙鼎率文武百僚宗室迎拜于候潮門外户部奏攢類到紹興四年實收支窠名數目乞先次申納朝廷從之初用議者言造紹興㑹計録而户部以為皇祐治平㑹計天下財賦當時取㑹動經歲月方可成録故但具去年出入之數焉承節郎李威特遷秉義郎充閣門祗候威南陽人率鄉民據守山寨至是縣為僞知汝州郭進所破威亦被執已而得進降書以歸故録之己酉宗正少卿兼侍講范冲轉對言仁宗皇帝建邇英閣嘗命儒臣蔡襄等寫尚書無逸篇並孝經天子孝治聖治廣要道四章為二圖列於左右元祐初臣父祖禹為侍講奏乞檢尋二圖如仁宗故事哲宗皇帝從之願陛下御書無逸篇為二圗置於講殿之壁上納其言遂書為二圖不崇朝而畢翊日以諭輔臣沈與求曰願陛下以是圖為元龜夙夜自警則恢復之期可卜左銀青光祿大夫王序追八官為右中大夫仍改正出身序始以乞奉祠為言者所論下吏部審量至是吏部言序出身覃恩不合審量外有减年並係濫賞依建炎四年六月指揮係已收使無許改正之文所有纍除職名係該載未盡濫賞名色合取朝廷指揮趙鼎進呈特有是命按此時吏部無尚書而晏敦復為左選侍郎據吏部所申止乞奪序職而序落職久矣不知何人為序道也此事當考詔樞密院編修計議勑令所刪定官寺監丞并行在堂除倉庫等官並候到任及一年以上方差替人已差人並别與差遣始用司農寺丞金安節奏也於是書局寺監丞之闕二十四而當汰者六十三庫務官之闕十三而當汰者二十七論者以為孤寒之士待次日久一旦罷之益無寸進之望權要之家雖係减罷之數將不旋踵而得之但不過改易差劄耳欲乞不以見任人到官久近每闕聽元差替人一員待次其餘重叠差下人别無差遣疏入執政亦重拂人情遂寢前命寢命在五月甲戌右迪功郎沈敦特改右承奉郎敦掌建康市征三年比舊增錢四十六萬貫依纍賞法應减磨勘三十三年户部尚書章誼言無以激勸乃改次等合入官仍頒行諸路詔湖南轉運司限一月依舊於潭州置司自孔彥舟之亂漕司移寓衡山縣至是轉運判官薛弼已入潭州視事而餘官未遷故督之庚戌詔諸路檢察經費財用官吕用中霍蠡徐康范伯倫章傑體訪諸路軍須借貸等事保明申尚書省以中書檢㑹去年十一月丁巳手詔有請也試尚書户部侍郎兼侍讀鄭滋充顯謨閣直學士提舉江州太平觀滋自銓曹下移民部故引疾求去焉起居舍人兼權中書舍人劉大中引疾乞補外且言禀資愚戇涉世拙疏但知委質以事君不善締交而附下正緣多忤積有怨仇昨自郎官出將使指其所按發偶多權勢之人其所薦揚類皆孤寒之士一遵聖訓不知其他復命于朝誤䝉睿奬兩歲之內叨冒四遷但聞皆出親除初非廟堂進擬略加考驗蹤跡甚明自揣無堪纍陳􅈤悃今若不以情實仰告君父則意外之灾無所不至矣伏望哀憐除臣一外任差遣臣之圖報不必須在行朝粉骨碎身何地不可疏奏詔不許顯謨閣待制知湖州李光言本州上供歲額不過五萬餘石比諸郡最為窮窘前政汪藻將本州軍糧每月四千四百餘石盡拋在民間糴買人户無得脫者官給價錢每斗不過三百文而攬户又於民間每斗取錢三百文方能輸納近來兩浙米價倒長街市每斗已七百文民情皇皇委是無處糴買乞於上供米內借留萬斛以紓目前之急詔借支五千石候秋成撥還仍令守臣措置約度歲用收簇錢物趂新兌糴自今毋得科擾辛亥永州防禦使張思正復隨州觀察使左朝議大夫王子獻復直徽猷閣左朝散大夫閭邱升右朝奉大夫朝公為並復直祕閣皆以赦叙也既而權中書舍人胡寅論公為因妻受賕請託出入死罪當權貴庇姦之時尚不能自免於勒停其人可見今復舊職稽之公論大不為允公為命遂格直祕閣秦梓知袁州壬子承節郎柴叔夏為右迪功郎襲封崇義公叔夏周世宗五世侄孫也其從兄恪嘗襲封為金人所殺至是以命叔夏既而叔夏乞比類換文乃以為右承奉郎叔夏轉官在五月辛未直徽猷閣知潼川府宇文時中為兩浙西路提㸃刑獄公事右承事郎直徽猷閣張滉召赴行在並令川陜宣撫司差人船疾速津遣前來時中之女為張浚夫人故有是命給事中陳與義言司馬光嘗奏乞天下州軍勘到強盜情理無可愍刑名無疑慮輒敢奏聞者並令刑部舉駁重行典憲應奏大辟刑部於奏鈔後别用貼黃聲說情理如何可憫刑名如何疑慮今擬如何施行門下省審如有不當及用例破條即奏行取勘光以道德名臣議論如此豈其樂殺人也哉乃所以禁姦暴申寃枉期於庶獄之平允而措一世於無刑也陛下哀矜庶獄患中外之吏容心毁法而州郡妄奏以出人之罪者尚多有之伏望睿慈採用司馬光之言申嚴立法以幸元元詔刑部立法申尚書省詔館職正字已上專舉縣令初用張致逺議令執事官各舉所知至是致逺去御史而右司諫趙霈以謂正字已上亦舉監司守令則失於太泛乃改命焉致逺建請已見三月丁丑責授沂州團練副使王仲嶷復中大夫與宫觀言者論其不亷不忠乃詔更俟一赦取㫖乙卯進呈殿中侍御史張絢奏嚴州夀昌縣令臧梓治狀可稱饒州安仁縣令趙濤貪汚不法乞行勸沮御批梓改合入官再任濤送提刑司取勘趙鼎等曰縣令於民為親然秩卑而貟衆其才不才無由盡知儻因此二人以行勸沮甚善但兩縣士民近經都省陳狀已下監司核實上曰絢所奏亦因兩縣士民經御史臺投狀故有此請朕思之毁譽固未可知且令監司核實然後行賞罰未為晚也上又曰比來銓部胥吏並緣為姦士大夫頗苦之朕每戒飭侍郎終未悛革鄭滋既得祠而去今晏敦復張致逺必須為朕留意此事若宿弊不除朕當先黜侍郎鼎曰敦復致逺皆孜孜奉職士大夫亦頗稱之必須仰副聖意臧梓五月辛卯改官初復諸王宫大小學教授員詳見今年七月癸未詔皇城司官吏並與轉一官資幹辦官馮益特遷宣政使改鑄東南十將京畿第二將紹興銅虎符詔諸軍揀退不堪披帶使臣並許添差諸州捕盜官司使臣一次老病不堪任職者送忠鋭將支進勇副尉俸終其身以樞密院言員多闕少慮致流落也丙辰詔建州歲起片茶五萬斤赴行在仍市末茶十五萬斤赴都督行府市易務交納舊額歲貢茶二十一萬六千斤葉濃之亂園户逃散遂罷之而取其錢至是本州奏乞蠲免而行府以為指凖淮南支用乃命市末茶俾商人持往淮北焉將仕郎上官世謙與免將來文解其付身令尚書省毁抹世謙調官吏部自言因駕幸寶籙宫於御前問莊老大㫖皆通奉勑補初品官吏部以為非格法故追奪焉時武進縣主簿應締亦以父守郡日遷秩恩授官乃以締為下州文學仍注權官三任訖注正官自是濫賞追奪者復衆矣故中書侍郎傅堯俞追復所贈光祿大夫諡獻簡以其家言紹聖間嘗追奪故也堯俞鄆州人黨籍執政官第十四人丁巳詔省試舉人許於臨安府內外寺觀安泊中書言民間米踴貴詔户部借支神武中軍糧食一月令盡出糶時上已命發常平米後二日又詔日糶千石戊午奉安太廟神主參知政事孟庾為禮儀使每室用特羊八籩豆蓋權禮也詔福建廣東帥臣措置團結瀕海居民為社擒捕海賊時寶文閣直學士連南夫論海冦之患以謂國家每歲市舶之入數百萬今風信已順而舶船不來聞有乘黃屋而稱侯王者臣恐未易招也願明下信令委州縣措置團結瀕海居民五百人結為一社不及三百人以下附近社推材勇物力人為社首其次為副社首備坐聖㫖給帖差捕蓋濱海之民熟知海賊所向平時無力往擒爾今既聽其㑹合如擒獲近上首領許保奏優與補官其誰不樂為用乃下張守曽開相度如所請己未詔鄉村五保為一大保通選保正於免役令中去長字始改紹聖法也先是言者以為役法行之歲久積至大弊鄉村保正長最為重役不專取物力厚薄而兼用人丁多寡不通輪一鄉㸃差而但取逐甲人户官吏貪濁差募之際富者以賄賂幸免貧者以誅求受害被役一次輒至破産愚民無知巧為規避遂有父亡母改嫁兄弟析生求免役次非惟重困民力以虛邦本亦將有傷名教以壞風俗欲乞下有司稍革舊法專用物力及通輪一鄉差募保正長凡官吏因役事受財者重為典刑以示懲誡又進士上書竊觀方今害民之法無如保甲之弊願更去保甲法復嘉祐元祐之制行耆户長之法故有是㫖仍許今後差物力髙單丁每都不得過一人寡婦有男為僧道成丁者同即應充而居他鄉别縣或城郭及僧道並許募人充役官司毋得追正身餘如見行條法按此所謂進士上書疑即王九齡也時祠部員外郎林季仲亦奏疏乞總一鄉物力次第選差其單丁許募人充役至是頗採其說焉季仲之奏曰役法以十小保為一大保而保有長以十大保為一都保而都有正二者必以物力之髙人丁之多者為之也然法久而弊人僞日滋富而與貧為伍預知差役之必至也乃賂鄉佐求與富者為伍焉於是富與富為伍物力雖巨萬而幸免貧與貧為伍物力雖數千而必差蓋由猾胥造弊於排甲之初致使下户受弊於被差之後征求之頻追呼之擾以身則鞭箠而無全膚以家則破蕩而無餘産思所以脫此者而不可得時則有老母在堂抑令出嫁者兄弟服闋不敢同居者指己生之子為他人之子者寄本户之産為他户之産者或盡室逃移或全户典賣或強逼子弟出為僧道或毁傷支體規為廢疾習俗至此何止可為慟哭而已哉臣復覩紹興二年閏四月十日及四年正月二十四日臣僚上言欲不拘甲分總以一鄉物力次第選差非第一等不得為都正非第二等不得為保長其單丁物力應充者許其募人官司不得輒追正身臣詳其說實為利便欲乞檢㑹參酌而行之庶幾可以厚風俗息爭訟安流移恤貧匱不煩戒勑州縣而弊源自塞矣奏不得其月日與朝㫖相類故附著之進士畢良史特補上州文學良史上蔡人知書傳喜字學粗得晋人筆法少游京師亂後僑寓興國軍喜其才者資給令赴行在㑹迪功郎權婺州司户漕事畢鄰者以死事得任子恩其妻言子為金人所殺願官姪良史上許之徐夢莘北盟㑹編畢良史少遊京師以買賣古器書畫之屬出入貴人之門當時謂之畢償賣遭兵火後僑寓於興國軍江西漕蔣粲喜其辨慧資給令赴行在諸內侍皆喜之上方搜訪古器書畫之屬恨未有辨其真僞者得良史甚悅月給俸五十千仍令內侍延請為賓客又得束修百餘千有姓畢人合得文資恩澤無宗族承受良史邂逅得之補文學按蔣粲此時知通州紹興十一年九月方除江西運副此所云誤也然粲先常為江西提舉又知撫州入為尚書郎或者先已隨粲入都爾今且附此更須詳之也庚申詔韓世忠紀律嚴明嶽飛治軍有法並令學士院降詔奬諭時世忠移屯淮甸軍行整肅秋毫無犯飛移軍潭州所過不擾鄉民私遺士卒酒食即時償直上聞之故有是詔初山賊雷進據澧州之慈利縣殺掠平民甚衆至是都督行府言進已遣其徒雷琳等來鼎州公參詔進特補武功大夫添差鼎州兵馬鈐轄進不受明年二月乙卯所書可參考按行府奏狀及熊克小歷皆作雷進而明年四月九日鼎州所奏乃作雷進德未知孰是辛酉左朝奉郎新諸王宫大小學教授錢葉左通直郎臨安府府學教授周葵並為監察御史葵晋陵人先是沈與求薦葉節操方正可備獻納故二人並命葉係見任執政官所薦而不乞廽避當考直祕閣知泰州趙康直升直徽猷閣知廬州壬戌集英殿修撰提舉江州太平觀王衣卒贈徽猷閣待制甲子太上道君皇帝崩于五國城年五十四上皇遺言欲歸葬內地金主亶未之許兵部侍郎司馬朴與通問副使修武郎朱辨同在燕山聞之密議舉哀制服辨欲先請朴曰吾儕為人臣子聞君父喪當致其哀又何請設不見許可但已乎遂服衰朝夕哭金人義之而弗問上皇欲歸葬據國史拾遺云爾但拾遺云大宋上皇道君正月二十五日崩與史不同當以實録為正詔江浙轉運判官逐州守臣拘催上供及淮衣紬絹絲綿依條限起發限滿令户部開具有無拖缺去處申取朝㫖用都省請也遣帶御器械韓世良往韓世忠軍前撫問上召對而遣之詔諸路營田司官給種糧者每一耕牛歲課毋得過十石民間自有耕牛者除輸納稅賦外毋得抑令耕種營田時言者以為解潛在荆南民有耕牛官為給種納課或十餘石而租稅差科仍舊是致百姓流移田業荒蕪故條約焉乙丑詔命官未經銓試以恩例陳乞祠廟之人自合理任餘依見行條法先是右通直郎王瓙以嘗任祠官乞𠫭選許之仍命更有似此之人依此言者以謂進士唱名在第五甲及纍經任人偶無舉官者猶銓試中程乃得參選今世祿膏粱之家幼年補官又有陳乞恩例可差祠廟若任滿更不銓試則童騃不學之人將遍滿州縣而疲民益無所赴訴故有是㫖丙寅上就射殿躬行景靈宫孟夏朝獻之禮丁卯亦如之始祔惠恭皇后于宣仁聖烈皇后神位之下用右司諫趙霈議也自惠恭既祔别廟而景靈獨弗及至是將行禮博士禮官皆以為疑霈言異時既有别廟則歲時祭享未嘗廢朝獻之禮雖闕可也今時異事殊且上皇於惠恭夫道也以嫌故也今陛下於惠恭則子道也躬行兹禮似亦無嫌願下太常討論典禮上曰朕以母事惠恭皇后今太廟既有别廟則景靈朝獻之禮何可廢也乃從禮官議霈建請在庚申上語在甲子今聨書之戊辰詔嶽州許置市易務令本州收息錢補助支遣用守臣張觷請也檢校少保武泰軍節度使知明州兼沿海制置使郭仲荀為檢校少傅慶逺軍節度使録控守海道之勞也泗州軍事判官趙烈正補下州文學庚午直寶文閣新福建路提㸃刑獄公事曾紆上其父布所著三朝正論二卷詔付史館先是紆子右通直郎惇投匭上書論布日記中親聞哲宗皇帝欽聖憲肅皇后聖語辨正宣仁聖烈皇后誣史及元符密薦臺諫遺藁現在詔下紆取索紆奉詔以布熙寧記市易本末及紹聖以來奏對要語集為正論上之上諭輔臣曰昨觀布正論其言皆正當至如載哲廟冊立事及宣仁聖烈皇后聖語皆是當時所聞必不妄趙鼎曰臣往時守官陜西從紆弟􅀈嘗見此書乃布手筆也沈與求曰頃在湖州紆嘗以此書示臣昨來韓璜論紆撰造正論却是不知其詳上顧鼎曰布有一疏藁薦陳瓘等十餘人皆名士卿有跋尾具言曽見正論鼎曰誠有之起居郎胡寅起居舍人劉大中並試中書舍人自王居正遷而二人並攝書命至是正除尚書省言訪聞四川諸司州縣添置官屬甚衆未委虛實詔宣撫司究實併省時言者以為閬州宣撫司武臣官屬至百五十人泰州茶馬無置司處而官吏文武亦百餘人成都一路見任官七百三十六員視建炎間增三分之一䕫路創增關寨等官亦不少故條約之户部奏博糴授官人依進納條令官至升朝與免色役其物力家業等第係與民爭利雖至升朝亦不得免科配以知興國軍應㑹有請也辛未詔諸縣歲賦竒零剩數委通判㸃檢折納價錢别項樁管專充上供諸路免役寬剩錢除二廣福建江東西已令起發赴行在浙西應副大軍其浙東湖南北剩錢亦令起發赴行在用總制司請也時獻議者以為州縣之間夏秋二稅丐祖宗時自有定額緣人户析居異財絹綿有零至一寸一錢者亦收一尺一兩米有零至一勺一杪者亦收一升之類自大宋有天下垂二百年民之析户者既多而合零就整之數若此類者不可勝計官中催科每及正額而止所謂合零就整者盡入猾胥之家欲望行下諸州將人户所輸竒零之物各以一鄉細計數目總為一簿逐年專委通判任責追催應副軍興而所入當不可勝計又逐年役錢依法每年合樁留二分充寬剩今乞悉以應副軍興别立一庫非有朝廷文字取索不得輒自支遣庶幾年歲之間蓄積有餘可以應用故有是㫖二廣等路先取役錢指揮未見月日當考壬申尚書兵部侍郎兼史館修撰王居正充徽猷閣直學士知饒州以居正引疾有請也居正乞改以小郡乃移知台州五月己丑改命熊克小歷云趙鼎深喜程頥之學居正為兵部侍郎於是有伊川三魂之目鼎為尊魂居正為強魂言其多忿也工部侍郎楊時為還魂謂其身死而道猶行也既而正字張􅀈遂以元祐五鬼配之按此皆一時詆誚之詞今不取祕書少監兼侍講朱震守起居郎左司員外郎王俁言兩浙額斛責在漕司者凡一百五十萬石兩浙糴本責在州郡者凡一百五十餘萬緡每歲極力樁發率皆不過三之二其虛數常自若也糴本之數皆知其不可足為漕司者終不肯力請於朝為之少損額斛之數皆知其不可足為户部者終不肯力請於朝為之少損終歲之間文移相屬常負不足之責而終無毫髮之益使其緩急必欲如數而止則剝膚椎體必有深害於民望令户部取漕司額斛及州郡糴本五年中最多之數增零就整立為定額漕司以年終州郡以四季責使樁發如愆期不足當職官吏重置典憲亦中興善政核實之一端也詔令總制司措置淮康軍承宣使川陜宣撫司參議官孫渥丁母憂癸酉詔起復用吳玠請也是月龍圖閣直學士致仕楊時卒年八十三起居郎兼侍講朱震言時學有本原行無玷闕進必以正晚始見知嘗排邪說以正天下學術之誤辨誣謗以明宣仁聖烈之功雪寃抑以復昭慈聖獻之位據經論事不愧古人其所撰述皆有益於學者詔有司取時所著三經義辨賜其家銀帛二百匹兩後諡曰文靖時尚書左僕射趙鼎素尊程頥之學一時學者皆聚於朝然鼎不及見頥故有僞稱伊川門人以求進者亦䝉擢用震奏請在六月乙巳今併書之朱勝非秀水間居録程頥西京人熙寧元豐間司馬溫公退居洛下修纂資治通鑑頥乃鄉儒嘗與之論文元祐改元公入相薦頥于朝授幕職官公薨擢授侍講終于通直郎直祕閣方在講筵蘇轍為言官屢有彈奏至謂譬之蛇虺豈宜蓄于階庭當時公論與否可知也紹興四年趙鼎作相姻家范冲亦洛人以其父祖禹元祐從官召冲為宗正少卿冲云家有頥書鏤板傳布謂之伊川學鼎主之凡習讀者往往進用未幾冲除待制雜學士翰林學士侍讀學士尹焞年七十冲薦之云舊識伊川併進焞論語解云得頥餘論即授京官崇政殿說書歲內除待制張九成錢塘人急於進自言篤好頥學頗能誦說由館職三遷為禮部侍郎溫人周行已頃嘗與頥遊政和間交結道士林靈素得正字林敗行已貶死至是州人言嘗轉授頥學于行已者如林季仲輩數人皆作要官殿試策不問程文善否但用頥書多者為上科是年狀元汪洋然所謂頥書者小編雜語淺陋乖僻之說初則惟冲為之已而其徒皆為之嗚呼元祐誠多賢程在當時非卓然傑出者小人乘間為姦利不可不察也按勝非此假所云除周行已外皆毁訾失實今不取
