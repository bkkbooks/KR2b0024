body:
  text: 建炎以來繫年要録巻一百二十二宋李心傳撰紹興八年九月按是月甲申朔丁亥侍御史蕭振言近除發運使令糴米以待闕用其價雖隨時低昻當使官價髙於民間仍不加耗及即時支錢則有以助國寛民詔從之振又言古之賢将皆協力以成功今陛下舉付之諸将使分屯近甸此係社稷之安危攻之與守全在諸将協力昔何充所謂将賢則中原可定勢弱則社稷同憂盖事同者忌功功同者忌賞自古有之望明詔諸将俾首尾相應唇齒相依庻幾人人協謀大功克舉也是日振又劾𠫭知政事劉大中身為大臣而不以孝聞於中外乞賜罷斥䟽留中不下振本趙鼎所薦後以秦檜引入䑓其劾大中盖以揺鼎也趙鼎事實云初監察御史蕭振力求外補且托其鄉人吳表臣薛徽言為請甚切鼎從之遂除郡而去及秦檜拜相一召即来始振以親年七十求去至是不復以親為辭尋除南康是必有薦為鷹犬者也未踰月論劉大中至三章不已鼎謂意不在大中行且及臣矣振去年十二月除浙西憲此云除郡小誤戊子尚書禮部貟外郎方庭實考功貟外郎鄭剛中並為監察御史己丑起復親衛大夫利州觀察使沿海制置副使馬擴罷為荆湖南路馬歩軍副總管時和議将成大臣忌言兵事擴逡廵求退許之徐夢莘北盟㑹編載擴此除在明年三月恐誤庚寅給事中兼史館修撰勾濤充徽猷閣待制知池州殿中侍御史張戒論濤隂附張浚四川監司守倅多出其門及浚敗事又顯立同異反覆無耻如何掄不端宰執畏輿言初不敢擬而濤攘臂自任欲引躋禁從若不逐去則濤之植黨不特一掄而已䟽留中不出濤聞求去章四上乃有是命上遣内侍諭令入對奏事踰八刻濤言戒擊臣趙鼎意也因力詆鼎結䑓諌與諸将上頗以為然成都丁記景山遷給事中繳駁不避權貴王庻除樞宻胡世将制置四川皆濤所引一日太上親書金閣清溪四大字以賜又面諭當以卿為相王庶仍佐卿西府因為時宰所忌屬言路弹擊景山濤字也今附此仍當以他書參考太常少卿蘓符守起居郎仍兼資善堂賛讀中書門下省檢正諸房公事薛徽言守起居舍人直顯謨閣知掌州劉一止試秘書少監直龍圖閣知撫州石公揆罷時江西提㸃刑獄公事趙渙至部半年而移獄四十餘處殿中侍御史張戒論公揆病廢全不任事渙鋭意按察而不能安詳過猶不及乞委宣諭官李寀究實乃黜陟之後寀奏公揆貪殘而渙偏見自任詔渙奉祠而公揆奪職十一月癸未公揆落職庚子渙主管台州崇道觀理作自陳潮州進士夏侯旻上書論海陽令柯權自醫學入官其不法凡十二事詔憲臣究實以聞甲午史館上續修哲宗實録左廸功郎樊光逺為秘書省正字丙申詔知桐城縣魏持已降轉官指揮勿行以御史張戒論其營田殃民也持本張宗元所薦至是代還入對故戒論之事祖在去年八月丙申已亥尚書兵部貟外郎王次翁遷吏部貟外郎太常丞王居修為駕部貟外郎大理寺丞丁則為工部貟外郎秘書著作郎兼史館校勘張嵲左朝奉郎林叔豹並為福建路轉運判官何掄既以簽貼神録得罪嵲不自安亦求去故有是命尚書禮部貟外郎李良臣知簡州張浚既得罪蜀士相繼外補惟勾龍如淵施庭堅擢用秘書著作佐郎胡珵為著作郎時左奉議郎喻樗免喪趙鼎奏以著作郎召給事中張致逺獨袖堂劄還之除著作又還之除正字復還之乃已鼎忿曰差除簿當送後省耳此以張戒黙記修入秘書省題名樗紹興六年七月以正字丁憂當是十月一日從吉今因著作有闕權附此當考左奉議郎楊椿為秘書省校書郎椿彭山人舉進士禮部第一累官州縣用趙鼎薦召對椿勸上行仁義建學校收人材擇将帥去賍吏䘏民力凡二十餘事遂有是除庚子武經大夫閤門宣賛舍人知㐮陽府武糾進秩一等用岳飛請也辛丑輔臣奏以武功大夫王黙知均州武功大夫康州刺史邢舜舉知光州上曰今日邉壘内則撫綏外則斥堠二大事未易得人宜精擇之壬寅左廸功郎温州州學教授葉綝上書請興太學其説以為今駐蹕東南百司備具何獨於太學而遲疑且養士五百人不過費一觀察使之月俸又言漢光武起於河朔五年而興太學晋元帝興於江左一年而興太學皆未甞以恢復為辭以饋餉為解誠以國家之大體在此雖甚倥偬不可緩也事下禮部既而右諫議大夫李誼言今若盡如元豐養士之數則軍食方急固所未暇若止以十分之一二為率則規模削弱又非天子建學之體况宗廟社稷俱未營建而遽議三雍之事豈不失先後之序望俟囘蹕汴京或定都他所然後推行從之乙巳上諭大臣曰近張戒有章䟽論備邉當以和為表以備為裏以戰為不得已此極至之論也趙鼎等言當力守此議此據日歴盖戒本鼎客故主守日歴又言王庻與趙鼎等亦以此説為然當力守此議按庻所奏每病趙鼎劉大中持两端不應自叛其説臣嘗細考日歴紹興七年八月所載和議本末凡遣使議論悉是趙鼎所奏七年十二月丙子上曰金人能從朕所求其餘一切非所挍鼎曰仰見陛下孝心焦勞檜以屈辱為憤八年六月己酉上曰館待之禮冝稍優厚鼎曰若用兵不知所費多少八年六月戊辰范同申金使已到常州臣見人主卑屈懐憤憤之心此人臣之忠也十二月戊午秦檜劄子乞遣官往前路與金使計議使名未正當改江南為宋詔諭為國信據此則屈已之事皆鼎賛成之檜實無預天下後世果可欺哉臣詳考其故盖紹興十二年以前日歴皆成於檜子熺之手張孝祥嘗乞改之如言王庻當力守此議恐亦近誣今削庻名庻不失實徽猷閣待制提舉江州太平觀趙開落職初開被召未行乃録進舊所為軍務機宻三事其一謂蜀與荆渚為根本之地朝廷措置在所當先其二謂兵視國勢為彊弱蜀之民未蘓其勢未可輕動乞速止蜀闗大将牽制之謀以除根本之禍復近闗梁洋階成鳯五郡之税賦使其民皆歸業無殺傷秦鞏偽地之民使民有徯后之心則國勢强而兵自强其三謂招懐歸業之民當罷官營田専用張全義治河南故事其效可見於期月㑹張浚得罪開亦乞奉祠今年二月至是殿中侍御史張戒論逺方壅蔽之患且言臣頃在蜀中事皆目覩大抵張浚欲之而趙開與之張浚惡之而趙開和之二人罪惡四川疾苦朝廷不盡知也壅蔽之害一至於此開之罪状陛下既已灼知自浚敗以來開獨未嘗被責端居自若至今為待制伏望聖慈特加貶竄少謝蜀民故有是命丁未左金紫光禄大夫尚書左僕射同中書門下平章事監修國史趙鼎遷特進以哲宗實録成書也中書舍人兼直學士院吕本中草制有曰謂合晉楚之成不若尊王而賤覇謂散牛李之黨未如眀是而去非惟爾一心與予同徳右僕射秦檜深恨之左朝奉大夫叚拂知大宗正丞拂江寕人也戊申宰執言自時多艱朝廷思屈羣策以濟庻務縁此法度多有改易上因曰經久之制不可輕議古者利不百不變法卿等冝以蕭規曹隨為心何憂不治壬子上諭輔臣曰昨日浙東漕梁澤民奏今秋糴買事朕嘗諭以錢給之於民宜戒减尅榖輸之於倉無取羡餘則公私兩便糴數雖多亦恐無害時已命發運使程邁專掌和糴故上訓及之癸丑復制皮剥所以掌鬻官私倒斃牛馬之事其可為軍器之用者撥赴本所餘入内藏歳為錢二千四百餘緡是秋金人徙知許州李成知冀州徙知拱州酈瓊知博州悉起京畿陜右係官金銀錢榖轉易北去盖将有割地之意也劉豫之未廢也偽麟府路經畧使折可求因事至雲中左監軍薩里罕宻諭以廢豫立可求之意及是左副元帥魯王昌有割地歸朝廷之議薩里罕恐可求失望生變因其來見置酒酖之可求歸卒于路此據張匯節要及兩國編年修入熊克小歴附折可求之死於去年十一月恐太早冬十月按是月甲寅朔丙辰尚書右僕射提舉詳定一司勅令秦檜上紹興重脩禄秩勅令格及申眀㸔詳八百十巻右朝奉大夫主管襲慶府仙源縣太極觀邵博賜同進士出身除秘書省校書郎博奉祠居犍為以趙鼎薦得召對上諭曰知卿能文大臣亦多言卿能文者眀日顧二相曰邵博不止劄子好詔言皆成文乃詔博祖父雍道徳學術為萬世師父伯温經眀行潔博趣操文詞不忝祖父故有是命此指揮以㑹要修入日歴無之時博病新起上又命近臣往問賜以禁中金嬰神丹何麟撰博墓誌稱上顧二相除校書郎可不試按此時校書郎亦多不試非但博一人也丁巳參知政事劉大中充資政殿學士知處州初侍御史蕭振劾大中與父不睦人所共知平日分爨而食異屋而居頃自官所歸单騎省父相值於門不交一語而去及為執政乃建議民間生男女官支錢五貫欲邀一時姑息之譽而不恤國用如此去年其父病危棺櫬已具其家遣書報之大中久不答盖待除命爾大中取異姓之子為長子不與婚宦其子積憤所致遂失心一日欲剚刃於大中頼羣卒解救而止大中所以治家者如此何以為國所以事父者如此何以事君伏望眀正典刑以厚風俗又論大中選調改官本因童貫詭秘刻薄衆所指目䟽三上大中乃求去遂有是命朱勝非秀水閒居録云劉大中素不養父未嘗同居與父久别或責其不省勉强一詣見於門首再拜立談頃刻而退大中為趙鼎黨魁驟遷禮部尚書鼎許以𠫭政父居處州家信至報其父病不知人已具棺斂大中匿其書鼎力薦果𠫭大政已而父病間亦不問也其子不平操刀逐大中欲殺之衆救獲免事頗喧傳因罷政天下聞而惡之按勝非所云即振章䟽中語然大中在朝中其父歴官州縣故當不同居劾䟽所言未必一一皆實更須𠫭考左宣教郎朱翌為秘書省正字戊午左朝奉郎提㸃洪州玉隆觀林季仲知婺州辛酉湖北京西宣撫使岳飛言續收到偽知鎮淮軍胡清等官兵千一百八人詔歸正官並補正甲子詔自今從官上殿令次䑓諌在面對官之上乙丑中書舍人兼侍講勾龍如淵兼直學士院丁夘侍御史蕭振言朝廷支降見緡令經制司糴米而發運使程邁一例抛與諸州則諸州不免抛下諸縣科之百姓即非創司寛民之本意冝令官自置糴場從之右諌議大夫李誼嘗言祖宗時發運所領乃轉輸東南之粟以實中都又制茶鹽香礬百貨之利今皆所不及惟是給以本錢使之糴買然復興一司豈專為此哉如營田經理之制市易懋遷之法又州縣錢物之䧟無所拘賦歛之橫無所考監司廢格詔條漫不加省宜有稽考臣願俾總六路而調其盈虛内與户部相為表裏則劉晏之策可展而不為虚文不然則糴買一事自可責之諸路漕臣何必創此司哉望下臣之説於三省講而行之辛未上諭大臣曰江西盗賊在朝廷可治者三一擇帥憲以厭服其心二任守令以勸課其業三蠲科役以優給其力如此尚或為盗朕未之聞也於是右諌議大夫李誼言漢光武時盗賊羣起則慎擇人材以臨千里如頴川則七年以㓂恂為守九年以郭伋為守故卒能掃清以知其所本故也今盗賊之處在江西則䖍吉筠南安在廣東則潮梅循惠南雄在閩則汀在湖則郴此數郡之守未有能設方畧息盗賊以安民者迂儒不才往往皆是願詔三省科條其人如不任職即選强眀之吏以代之庻以分陛下南顧之憂焉壬申皇叔登州防禦使知西外宗正事士夽同知大宗正事甲戌特進尚書左僕射同中書門下平章事兼樞宻使趙鼎罷為檢校少傅奉國軍節度使兩浙東路安撫制置大使兼知紹興府初侍御史蕭振既擊劉大中謂人曰如趙丞相不必論盖欲其自為去就也時傳語紛紛今日曰趙丞相乞去矣明日曰趙丞相般上船矣盖秦檜之黨以此撼之鼎猶未深覺其客敇令所删定官方疇以書勸之曰見幾而作大易格言當斷不斷古人深戒鼎乃引疾乞免殿中侍御史張戒上䟽乞留鼎不則置之經筵戒奏䟽全文見十一月己丑時檜力勸上屈已議和鼎持不可繇是卒罷林泉野記云王倫自金還敵復遣人来議和右相秦檜請遂成之鼎争不從乞罷乃以檢校少傅奉國軍節度使知紹興府徐夢莘北盟㑹編云金人許和上與二相議之趙鼎執不可一日奏事退秦檜留身奏以講和為便上曰講和之議臣僚之説皆不同各持兩端畏首畏尾檜曰此不足與斷大事若陛下决欲講和乞陛下英斷獨與臣議其事不許羣臣干預其事乃可成不然無益也上曰朕獨與卿議檜曰臣恐未便望陛下精加思慮三日然後别見奏稟又三日檜復留身奏事知上意欲和甚堅猶以為未也乃曰臣恐復有未便望陛下更思慮三日容臣别奏又三日檜復奏事知上意堅確不移乃出文字乞决和議不許臣下干預上欣納鼎遂罷相鼎事實云鼎上章乞觧機務上曰前日所議璩建節事如何鼎又如前所陳是時若能雷同相徇即留而不去矣此叚詳見今年八月末并注鼎入辭從容奏曰臣昨罷相半年䝉恩召還已見乎宸𠂻所向與鄉来稍異臣今再辭之後人必有以孝悌之説脅制陛下矣臣謂凡人中無所主而聽易惑故進言者得乗其隙而惑之陛下聖質英邁洞見天下是非善惡謂宜議論一定不復二三然臣甫去國已稍更改如修史本出聖意非羣臣敢建言而未幾復修此為可惜臣竊觀陛下未嘗容心特既命為相不復重違其意故議論取舍之間有不得已而從者如此乃宰相政事非陛下政事也鼎行檜奏乞同執政往餞樞宻副使王庻謂鼎曰公欲去早為庻言鼎曰去就在樞宻鼎豈敢與檜至鼎一揖而去自是檜益憾之徐夣莘北盟㑹編云鼎首塗之日檜奏乞備禮餞鼎之行乃就津亭排列别筵率執政以待鼎相揖罷即登舟檜日已得㫖餞送相公何不少留鼎曰議論已不協何留之有遂登舟叱篙師離岸檜亦叱從人收筵㑹而歸且顧鼎言曰檜是好意舟已開矣自是檜有憾鼎之意徽猷閣待制提舉江州太平觀傅崧卿黎確皆卒詔贈官推恩如故事兵部侍郎兼權吏部尚書張燾言確平昔髙談忠義號為正人一臨變故遂失臣節北面邦昌之庭又請邦昌修徳以應天察其姦心欲置吾宋宗社何地哉諸路帥臣領勤王之師将次京城邦昌求奉使以上軍者確慨然請行遂奉邦昌手書持偽告擁黃旗以往其罪抑可知矣陛下龍飛甞加黜責而范宗尹當國力挽偽黨布列朝廷故若確輩亦參法從忠義之士憤疾久矣今又曲加贈䘏使賞延于後何以示天下後世亂臣賊子之戒乎為國之道所先政刑政刑不眀何以立國詔確追奪徽猷閣待制其贈官恩澤依條施行按確此時階官左中大夫依條仍得致仕遺表恩澤二資乙亥龍圖閣學士知紹興府孫近為翰林學士承㫖端眀殿學士知洪州李光試吏部尚書前二日上召中書舍人兼直學士院勾龍如淵草趙鼎免制如淵奏陛下既罷鼎相則用人材振紀綱必令有以聳動四方如君子當速召小人當顯黜上曰君子謂誰曰孫近李光上曰近必召如光則趙鼎劉大中之去皆薦之朕若召則是用此兩人之薦須朕他日自用之如淵曰此鼎大中姦計也兩人在位時何不薦光及罷去而後薦之意謂陛下采公言必用光故以示恩耳上又曰小人謂誰曰吕本中上頷之如淵因奏臣向聞陛下言本中與張致逺盖専為附離計者今觀本中真小人也致逺似不然如近日喻樗除著作佐郎臣親見其與宰相辨久之樗鼎腹心士也臣恐陛下過聽以致逺與本中同科則實不然願陛下察之張戒黙記曰趙鼎再相除喻樗為著作給事中張致逺獨袖堂劄還之除著作又還之除正字復還之遂致趙鼎曰差除簿當送後省耳然致逺猶以朋附趙鼎罪去直徽猷閣主管萬夀觀兼崇政殿説書尹焞試太常少卿兼職如故焞再辭不許自渡江以来惟天地宗廟之祭用牲牢他悉酒脯而已至是右諫議大夫李誼言社稷尚稽血食乞命禮官參酌舊制裁定從之丁丑京東淮東宣撫處置使韓世忠乞赴行在奏事先是徽猷閣直學士王倫與烏凌阿思謀至金庭金主亶復遣簽書宣徽院事蕭哲等為江南詔諭使使来計事世忠聞之上䟽曰金人遣使前来有詔諭之名事勢頗大深恐賊情繼發重兵壓境逼脅陛下别致禮數今當熟計不可輕易許諾其終不過舉兵决戰但以兵勢最重去處臣請當之因乞赴行在奏事馳驛以聞上不許按史此年張通古為使蕭哲副之而明年王倫答金主乃云簽宣蕭哲持國書許歸地或者通古乃元帥逹蘭輩就行䑓所遣亦未可知故先書金主遣哲後乃書通古戊寅樞宻副使王庻言間者金使之来大臣僉議或和或戰所王不同臣忠憤所激輙爾妄發不量彼己之勢不察時事之宜屢奏封章力請謝絶專圖恢復謂敵情不可以仁恩馴服王倫之往必致稽滯今聞奏報已還近境和議可决臣謀不逮逺知昧通方伏望速賜降黜或以適此執政闕貟未便斥去即乞特降處分遇有和議文字許免簽書庻逃前後反覆有失立朝之節書奏己夘詔不許庶復上言人各有能有不能臣生於陜西其風漸氣染耳目所聞見者莫非兵事禍亂以来嘗欲以氣吞强敵則所謂講和者非臣之所能也强使之則恐誤國家之大計故臣願陛下惟責臣以修戎兵不以講和之事命臣則緩急之際可以枝梧縱使金人知陛下専命臣以此則姦謀不得肆而和好易成雖曰治戎兵其實促使和也又况臣賦性愚魯嘗言金人不可和今若預此是臣身為大臣自為二三何可使也唐渾瑊馬燧李晟将之忠賢古所未有徳宗能用之吐蕃君臣大懼尚結賛謀曰唐之名将特此三人不去之必為吾患於是甘辭厚幣以申懃懇朝廷然之㑹盟於平凉李晟以言不可信罷渾瑊以被刼罷馬燧以為所賣罷果如其計而無一人留者願陛下察臣孤忠特留聖念又言臣前次所上章䟽及與王倫議論寔有嫌妨陛下亦當洞照底裏今若不自陳禀又如趙鼎劉大中輩首䑕兩端於陛下國事何益兼臣備數樞庭自合辭職不合辭事乞除臣一近邉州郡願効尺寸不許魏掞之戊午讜議以庻此疏為第六第七劄之在烏凌阿思謀至都堂前誤也按此疏言王倫還及近境又言趙鼎劉大中首鼠兩端當在二人罷政之後與王倫未至行在之前庻劄子云今月二十六日奉御筆不許辭免己夘十月二十六日也故附於此辛巳秦檜奏北使約仲冬上旬至泗州上曰所議殊未可解但可和即和不可和則否兵備不容少弛可徧諭諸将以為之備中書舍人兼史館修撰兼直學士院吕本中罷侍御史蕭振言本中外示朴野中藏險巇父好問受張邦昌偽命本中有詩云受禪碑中無姓名其意盖欲證父自眀爾趙鼎以解易薦李授之除秘閣本中初不知授之鼎所薦遂怒形於色欲繳還詞頭已而知出於鼎乃更為授之命美詞其朋比大臣無所守如此望罷本中以清朝列詔本中提舉江州太平觀壬午故武翼郎吳近贈宣州觀察使以才人之父特優之也建炎以來繫年要録巻一百二十二建炎以來繫年要録巻一百二十二金人地名考證薩里罕原書作撒離喝誤改見巻十一逹蘭原書作撻辣誤改見巻一烏凌阿原書作烏陵誤改見巻一
