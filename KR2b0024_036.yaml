body:
  text: 建炎以來繫年要録卷三十六宋李心傳撰建炎四年八月辛未朔禮部尚書謝克家參知政事克家首言呂頥浩老成練事去嵗勤王有大功時方艱難強敵內逼望留行在以備咨訪敵自渡江以來官司圖籍散佚遂命百司省記條制行之凡所豫奪悉出胥吏至是始令條具申尚書省其後復命左右司郎官簽貼勑令所審覆申朝廷取旨頒降然未及行左右司刋定日歷不載今以紹興元年十一月劉一止所奏及四年三月乙亥敕令所狀增入當求本月日修附浙西安撫大使劉光世請直徽猷閣范正已為本司參謀官從之既而尚書省請大使司置參謀參議官各二員俸賜視雜監司自是諸路以為例尚書省建請在此月乙酉光世嘗因公事移牒六曹言者以為今國勢寖弱藩方大臣所宜尊奬王室若帶儀同三司可牒六曹則亦可關三省樞密院矣光世非敢凌蔑特不知事體望損抑之詔以章示光世户部侍郎季陵轉對上疏曰臣聞宣王承板蕩之後任賢使能周室中興焉夫賢以德稱能以才稱賢者必有才故任之勿疑能者不必有德顧所使何如耳自古以為才難使人不當求備記其功忘其過取所長棄所短安得乏才之歎乎前日士大夫名節不立有愧於古論事之人皆喜攻之瑕疵既彰不復可用縱加抆拭攻者踵來雖君相制命亦不能為之地矣臣試舉其罪大且重者言之自崇觀以來黨助臣姦交結非類各由詭道以叨寵榮坐此當責者不知其幾何人也至靖康末二聖北狩邦昌攝朝不能死節間或從偽坐此當責者不知幾何人也至明受初苖劉専殺幾危宗社拱手受制不能討賊坐此當責者又不知幾何人也以義責之皆不容誅以情恕之亦士大夫不幸耳蔡京王黼當國日久閹宦弄權豪強販祿欲仕進者捨此無階雖名家文士甘從汚衊特立獨行是為希有首惡者既已伏辜其餘勿論可乎邦昌內奉太母外迎陛下一城生靈忍死須臾事有權宜初無異意首惡者既已伏辜其餘勿論可乎太母垂簾東宮監國回容以防挾主之變隱忍以待勤王之師各不統兵難備倉卒首惡既已伏辜其餘勿論可乎陛下昭德塞違以臨照百官雖皆赦而不誅然弄筆墨者至今未容貸文致其罪當得惡名雖知其才誰敢引薦當今多難之時朝廷緩急無可使者獨不聞舉魏尚於獄中卒能却胸奴起張敞於亡命卒能弭盜賊責功補過前古有之臣願陛下明詔宰執於罪戻之中選擇實能量付以事勿因一眚廢其終身仍詔臺諫為國愛人許以自效非誤國者勿復再言使人人皆得自新誓死圖報同心協濟以成中興之業天下幸甚疏奏後二日范宗尹進呈詔榜朝堂壬申詔福建溫台明越通泰蘇秀等州有海船民户及嘗作水手之人權行籍定五家為保毋得發船往京東犯者並行軍法以山東米麥踴貴故也詔自京堂除窠闕內不載去處並令吏部差注又詔除知州軍及舊格堂除通判外一切撥還吏部此以紹興五年閏二月十三日吏部侍郎鄭滋劄子修入癸酉詔神武中軍益選親兵通舊作六百人更三畨入直禁中不𨽻禁衛所命統制官辛永宗提舉之徽猷閣待制李釜卒釡以去年七月甲申除祕撰不知何時升職也甲戌詔日輪侍從官一員具前代本朝關治體者一兩事進入用參知政事謝克家請也既而吏部侍郎兼直學士院綦崈禮言祖宗以來選命儒臣以奉講讀若令從官一例獻其所聞既非舊典且有越職之嫌望但令講讀官三五日一進乃命學士與兩省官如前詔後詔在此月戊子詔朝散大夫致仕錢耚令再仕以給事中富直柔等言其疏通強敏可任郡寄也耚靖康末嘗除知唐州挂冠去至是復起之乙亥觀文殿學士朱勝非始被江州路安撫大使之命時統制官張忠彥將所部在吉州前一日執政奏除忠彥江州路兵馬副鈐轄令受勝非節制上曰勝非當苖劉之變不為無功范宗尹曰勝非能使二凶不疑以待勤王之師議者或稱其有謀上曰是時惟勝非鄭玨敢與之抗顔岐雖好士人亦懦怯不能有為勝非行至桂陽監始被命上疏言自桂陽至江州四十餘程措置不及臣之孤迹獨被聖知前後大臣並無交黨今赴任則敗事辭免即有避事之嫌進退狼狽皆當誅責臣謹體此意抗章請罪乞就近别差官詔不許勝非此奏以十月乙亥至行在今因被命之日遂書之丁丑起復檢校少保武勝定國軍節度使神武左軍都統制韓世忠遷檢校少師易鎮武成感德始録守江之勞也翌日上諭大臣曰世忠不親文墨朕方手寫郭子儀傳欲付卿等呼諸將讀示之鎮西軍節度使神武右軍都統制張俊為檢校少保寧武昭慶軍節度使録扈蹕及平盜之勞也詔故監察御史常安民左司諫汪公望加贈諫議大夫各官其家二人召安民子奉議郎同赴行在既至以同知大宗正丞同除命日歷不書紹興元年七月乙亥自宗丞除知栁州朝請大夫康允之坐棄城停官戊寅侍御史沈與求右諫議大夫黎確右正言吳表臣論季陵轉對乞收用近年廢黜之人其言非是不當榜朝堂上悟命撤之范宗尹請坐三章行出上曰祖宗以來凡朝廷政事不當未出則給舍封駮既行則臺諫論列一體相成判而為二則非矣宗尹曰臣等惟是之從何敢固執然議者謂陵所言蓋宗尹風指也初朝散郎知蘄州甄采以得柔福帝姬聞於朝事祖見三年十一月戊午會采為淮西都巡檢使劉文舜所破乃脫身從韓世清衛送帝姬赴行在時上猶在溫台先遣入內內侍省押班馮益宗婦吳心兒往越州驗視乃取入宮封福國長公主兵部侍郎兼權直學士院汪藻草制有曰彭城方急魯元當困於南馳江左復興益夀宜充於禁臠按光堯會要特用刑門載行遣偽公主事而無始封之年中興玉堂制草亦無始封之制汪藻龍溪集有之在今年八月韓張二將遷官制之後當是此月也藻集又有代公主奉迎隆祐皇太后起居表則其進封當在太后未還之前今且附此俟考庚辰隆祐皇太后至自虔州資政殿學士權知三省樞密院事盧益寧逺軍節度使醴泉觀使從衛提舉一行事務孟忠厚神武副軍都統制辛企宗扈從上出行宮門外奉迎因歷問太母所過守臣治狀后性恭謹未嘗以毫髮干朝廷然喜飲酒上以越酒不可飲令别醖后寧持錢往酤未嘗直取也吳才人頗為后所愛間語及瑤華事后曰我入宮時十六七女子安知其他事悉是劉氏相誣二事以上諭大臣語修入后在禁中嘗微覺風眩有宮人自言善用符水呪疾可瘳者或以啓后后曰又是此語吾其敢復聞也此等人其可留禁中邪立命出之此事王明清聞之王嗣昌是日拱衛大夫福州觀察使承州天長軍鎮撫使薛慶及金人戰于揚州城下死之完顔宗弼既屯六合縣欲自運河引舟北歸而趙立在楚薛慶在承扼其衝不得進宗弼患之左監軍昌自孫村來見宗弼計事欲會兵攻楚州真揚鎮撫使郭仲威聞之約慶俱往迎敵慶以是月戊寅出兵己卯至揚州仲威殊無行意置酒髙會慶怒曰此豈縱酒時邪我為先鋒汝當繼後上馬疾馳去平旦出揚州西門從騎不滿百轉戰十餘里亡騎三人仲威迄不至慶與其下走還揚州仲威閉門拒之慶倉皇墜馬為追騎所擒馬尋舊路歸承州軍中見之曰馬空還矣太尉其死乎仲威棄揚州奔興化敵長驅犯承州兵馬鈐轄王林出城迎敵不勝亦奔興化承州陷措置髙郵軍事國奉卿走還楚敵懼慶復脫歸敲殺之慶在承久軍食既足不復斂取於民王官自京師至者館榖甚厚皆按格賦祿官兵𨽻承州者月糧時帛舉如令給之至視其徒則戰士計日廪食老弱計日受劵而已金人自浙歸大寨於天長六合間慶親率衆劫之得牛數百悉賤其估分畀民之力田者民懷其惠亦賴其捍禦以自固敵假道於承以攻楚慶不聽至是被害慶起潢池其衆多驍雋敢鬬慶臨敵勇亦能以少擊衆故慶死承州遂陷楚勢孤卒無以抗敵人皆惜之訃聞贈保寧軍承宣使辛巳侍御史沈與求尚書户部侍郎季陵並罷先是與求嘗言宰相范宗尹年少驟進不更世務恐誤國事上意方鄉宗尹不以為然會與求再上疏劾季陵言其承望宰執風指有變朱成黑指鹿為馬之語宗尹乃求去上遣中使押入御批陵降三官奉祠與求與合入差遣參知政事張守謝克家留御批不下後二日宗尹入對極論大臣事君不當懷祿耽寵使人主疑之而防其為姦事功決不可立上宣諭再三宗尹却立不進守力請宗尹同奏事宗尹不得已而前進呈己卯御批請陵以本官奉祠而與求除職出守上許之乃詔陵身為侍從貽誤朝廷欲收姦黨之恩遂陳迷國之計可罷户部侍郎提舉亳州明道宮與求乞顯黜獻言者其論為當至云指鹿為馬使大臣不敢安位可除直龍圖閣知台州宗尹乃復視事詔户部續進黃金百兩白金四千兩錢萬緡充長公主下降粧奩使用壬午顯謨閣待制權吏部侍郎孟庾試尚書户部侍郎癸未資政殿學士權知三省樞密院事盧益改提舉醴泉觀兼侍讀時端明殿學士權同知三省樞密院事李回扈六宮在道未至也既而諫官吳表臣論益所至擾民上曰益起間廢中今逺歸遽出將來何以使人范宗尹言益方辭新命遂以益提舉臨安府洞霄宮既而卒貶二秩益改外祠在丙戌貶秩在乙未今遂書之詔權罷講筵俟過防秋取旨是日宣撫處置使張浚復取永興軍初浚之西行也上命浚三年而後用師進取及是金左監軍昌與完顔宗弼皆在淮東約秋髙入犯浚聞宗弼躊躇淮上度必再犯東南議出師分撓其勢士大夫多以為不可朝散郎通判敘州眉山王賞獻養威持重二䇿浚弗用召諸將議出師都統制威武大將軍宣州觀察使曲端曰平原廣野敵便於衝突而我軍未嘗習戰且金人新造之勢難與爭鋒宜訓兵秣馬保疆而已俟十年乃可議戰秦鳯路馬步軍副總管右武大夫忠州刺使吳玠曰髙山峻谷我師便於駐隊敵雖驍果甲馬厚重終不能馳突吾據嵯峨之險守關輔之地敵即大至決不容爭此土浚皆不聽參議軍事徽猷閣待制劉子羽爭之曰相公不記臨行天語乎浚曰事有不可拘者假如萬一有前日海道之行變生不測吾儕雖欲復歸陕西號令諸將其可得乎浚雖重用端然以人言浸潤不能無疑乃遣本司主管機宜文字張彬往渭州以招填禁軍為名實欲伺察端意彬至渭見端問曰公嘗患諸路兵不得盡合及財物不足以供軍今張公之來兵已合用已足羅索孤軍深入吾境我合諸路攻之不難失今不擊若尼瑪哈併兵而來何以待之端曰不然兵法先較彼已必先計吾不可勝與敵之可勝今敵可勝只羅索孤軍一事然彼兵伎之習戰士之鋭分合之熟無異前日我不可勝亦止合五路之兵一事然將帥移易士不素練兵將未嘗相識所以待敵者亦未見有大異於前日萬一輕舉脫不如意雖有智者無以善其後又自敵入犯因糧於我彼去來自如而我自救不暇是以我常為客彼常為主今當反之精練士卒按兵據險使我常有不可勝之勢然後徐出偏師俾出必有所獲彼所謂關中陸海者春不得耕秋不得穫則必取糧於河東是我為主彼為客不一二年必自困斃因而乘之可一舉滅矣彬以端言復命先是玠以彭原之敗望端不濟師而端謂玠前軍已敗惟長武有險可捍衝突二人爭不已浚積前疑卒用彭原事罷端兵柄與宮觀再責海州團練副使萬州安置統制官張中孚李彥琪諸州羈管陕西人倚端為重及貶軍情頗不悅趙甡之遺史金人敗吳玠于彭原店復歸河東張浚欲大舉問曲端有何計䇿端謂承平之久人不經戰金人新造難與爭鋒宜訓兵秣馬保疆而已俟十年方可議戰浚不喜乃曰將軍持不戰之説豈可以當大將端曰唯遂納威武大將軍印猶用為參謀時王庶亦為參謀議論不協固辭遂以為都轉運使隨軍而已浚發秦亭見兵馬俱集大喜謂當自此便可以徑入幽燕問端如何端曰必敗浚曰若不敗如何端曰若宣撫之兵不敗端伏劍而死浚曰可責狀否端即索紙筆責軍令狀曰如不敗當伏軍法浚曰浚若不勝當復以頭與將軍遂大不協初王庶以失延安自劾罷節制也聞浚入蜀即前途迎見之浚以為參謀官偕行浚已失全陕復欲用端庶固以為不可乃送端萬州編管熊克小歷曰先是端驟得志而驕自彭原店之敗少沮參謀官王庶乘此言於浚曰端有反心久矣盍早圖之浚乃罷端兵柄遷之恭州按二書所記端貶責及王庶為參謀皆誤端實以四年秋貶萬紹興元年夏貶恭而甡之以萬州之貶繫於富平之後克以恭州之貶書於富平之前皆參差不合日歷王庶附傳張浚宣撫川陕庶丁母憂浚力起之時富平之師已潰浚議退保川口庶力陳撫秦保蜀之䇿浚不納乃版授參議官費士戣蜀口用兵録張公既敗於富平思曲端前言欲復用之乃召端及王庶於貶所庶地近先至以為參謀官據此則端罷兵柄時王庶尚未為參謀非因庶所譛也王之望西事記曰端屢與金人角更勝迭負西人以為能然心常少浚浚乃奪其兵而廢之按浚黜端止謂其沮出師之議非以其少浚也今不取浚遂決䇿治兵移檄河東左副元帥宗維問罪宣撫司幹辦公事萬年郭奕力言其不可浚不從乃以玠權永興軍路經略司公事遂取永興軍玠以功升忠州防禦使甲申詔沿海諸州置水斥堠承議郎黃敦彥追一官勒停坐前通判袁州日與守臣王仲薿俱降敵也時仲薿已竄謫於是朝請郎李積中坐投拜除名編管中奉大夫楊淵朝議大夫王子獻坐洪吉州失守並追二官勒停日歷並無此今以紹興二年二月壬午敦彥乞復官狀修入淵子獻行遣亦據撿舉狀書之不得其年月且附敦彥追官之後積中行遣撿舉並不見紹興元年三月六日後省繳朱琳敘官狀云去嵗守臣投拜者如李積中等則除名勒停編管故因敦彥事遂書之以詳當時行遣次第乙酉皇叔持服前撿校少保光山軍節度使知大宗正事士㒟特起復宣議郎御營使司參議官王擇仁為通直郎直徽猷閣權發遣河東路制置使司公事節制本路應干軍馬時京西與河東北接境而忠義之人猶有聚兵保守山寨者河南鎮撫使翟興遣親信持蠟書取間道以結約之如向密王簡王英等數十寨皆願聽節制興言於朝上大喜遂命興與擇仁同領其事先是擇仁以宣撫處置使張浚之命節制京西軍馬在均襄間事見今年三月己酉故就命之及是擇仁言山寨首領韋忠佺宋用臣馮賽皆乞兵渡河尅期相應賽遼州人自軍興即與其徒保聚山谷數與金人戰乃以忠佺為中衛大夫昭德軍承宣使制置使司都統制兼知太原府用臣賽並拱衛大夫忠州團練使制置使司同都統制用臣知平陽府賽知隆德府加興節制應援河東北軍馬使仍許擇仁帶見兵萬人以行俟過大河許以便宜從事命下擇仁兵已潰矣趙甡之遺史載此事於紹興元年八月己卯今從日歷詔兩浙轉運司以米萬斛輸楚州丙戌寧逺軍節度使醴泉觀使孟忠厚乞蠲太母所過秋稅范宗尹曰頃已免夏稅若復蠲放慮州郡經費有缺必致橫斂上愀然曰常賦外科斂及贓吏害民最宜留意祖宗雖崇好生之德而贓吏死徒未嘗末減自今官吏犯贓雖未欲誅戮若杖脊流配不可貸也中興聖政臣留正等曰設官吏以牧民志不在民而貪黷是為民之賊也藝祖皇帝懲五季之弊凡贓吏一切棄市藝祖豈好刑人者哉誠以不如是不足以行仁政於天下者也而况艱難以來生民之困極矣撫摩涵飬民猶或病而貪黷之吏乃敢剝刻以肆其無厭之求如之何民不窮且盜乎故太上皇帝惻然念常賦之不可免而欲不貸贓吏之罪聖上斷然舉而行之懲一而百勸其真得藝祖太上皇之心歟樞密院言往嵗金人自蘄黃渡江今防秋是時乞令舒蘄鎮撫使李成光黃鎮撫使吳翊捍禦上流毋令敵騎深入時光州統制官武功大夫劉紹先引所部去翊以光州不可守率軍民棄其城東下道梗無所向往依成死於軍中朝廷遂以成為舒蘄光黃四州鎮撫使吳翊棄光州不知在何月日成兼四州不見於史但紹興元年五月三日有旨罷成舒蘄光黃四州鎮撫使故於此併書之紹先至九江守臣姚舜明留之奏以為本州兵馬副鈐轄就統其軍丁亥右武大夫忠州刺史楚泗等州鎮撫使趙立領徐州觀察使初有詔閭勍便宜加借官職之人皆罷而立奏諸軍血戰解圍至今猶未推賞若復追奪何以示信朝廷以立忠義素著故申命之先是議者以金人尚留淮東恐其侵軼欲復為海道之行范宗尹獨以為危事不可再蹈若頻年海道則逺近離心大事去矣乃詔浙西安撫大使劉光世遣兵防江仍會合淮南諸鎮併力邀擊立私謂寮屬曰今敵自山東濟師不已城中糧且盡則無以善其後將先事取京東已陷沒諸郡窒敵路及求糧旁邑則吾事濟矣且京東諸州本吾民也聞我之來必解甲相迎是時張榮在鹽城縣乘亂鴟張立親擊破之併足糧食將經營京東行次寶應縣承州報敵復聚兵揚州立遂歸而昌已傅城下立慨然曰敵終不去惟有竭節守死此州而已屢出兵破敵敵圍之戊子以魔賊平德音釋饒信二州徒以下囚河東忠義統制盧師迪韓進皆渡河見翟興計事詔並以為武翼大夫閣門宣贊舍人師迪知澤州進知懷州朝請大夫提舉亳州眀道宮滕康朝散大夫提舉江州太平觀劉珏並責授祕書少監分司康永州珏衡州居住坐失豫章為言者所劾也於是其屬官汪若海何大圭並除名嶺南編管己丑詔通泰鎮撫使嶽飛以所部救楚州時揚承二鎮已陷楚勢亦危趙立遣人告急簽書樞密院事趙鼎欲遣神武右軍都統制張俊往救之俊曰敵方濟師達蘭善兵其鋒不可當立孤壘危在旦夕若以兵委之譬徒手搏虎併亡無益鼎曰楚當敵衝所以蔽兩淮若委而不救則失諸鎮之心俊曰救之誠是但南渡以來根夲未固而宿衛寡弱人心易搖此行失利何以善後鼎見上曰江東新造全藉兩淮若失楚則大事去矣是舉也不惟救垂亡之城且使諸將殫力不為養冦自討之計若俊憚行臣願與之偕往俊復力辭乃命飛立腹背掩擊仍令劉光世遣兵往援毋失事機庚寅詔景靈宮神御自海道迎至溫州奉安自分𣙜貨務場於臨安而商人不復至行在是日詔廢越州場務量留監官一員打套出賣乳香而已辛卯給事中富直柔為御史中丞廣西轉運司請罷催稅户長而依熙寧法村疃三十户每料輪差甲頭一名從之仍推行於諸路日歷無此今以紹興五年十一月二十八日户部狀修入熊克小歷載此事於今年四月壬辰當考中大夫馮澥復端明殿學士提舉成都府玉局觀以澥自言邦昌僭偽已在城外不與始謀又不汚其偽命也帶御器械潘永思罷永思護六宮東歸盧益頗與之交結為諫官吳表臣所論上惡之范宗尹請出永思上曰未可罷祿以困苦之庶知悔過朕於戚里未嘗私以恩澤如邢后之父不復收召張媫妤兄弟皆小官卿等所知盧益觀望隂結永思非端人也壬辰故朝散郎毛注追復左諌議大夫注江山人大觀間為御史屢劾蔡京後以不言張商英廢斥至是復之盜楊隆與其徒百餘人入梅州焚州治執守臣通直郎沈同之至城北殺之掠城中而去此以紹興三年正月二十三日梅州為都頭李乙乞酬賞狀增入他書並無之癸巳詔户部計會內東門司日下進絹五千匹言者論仁宗皇帝於太平冨盛之時猶節損冗費罷去無名况今日艱危空乏之際乎願陛下取憲仁祖用度好賜更加節約凡不得已而錫豫者但降賜目付之有司則疑謗自銷而户部經費亦可少紓矣詔候內藏庫有絹日撥還此恐即胡交修所言當考建州民范汝為粗知書其諸父以盜販為事而號黑龍黑虎者尤善格鬬羣不逞附焉每數百人負鹽橫行州境官不能捕有儒林郎江鈿建陽人老矣郡守謂鈿有謀使攝令甌寧以圖二范未幾果擒之皆死于獄其徒無所歸往依汝為一日汝為因刃傷人至死遂作亂事在七月建陽令王昌甌寧令黃邦光不能討時方艱食飢民從之者甚衆守臣朝奉大夫韓珉遣州兵出戰為所敗賊勢滋盛言者乞委官節制乃命本路安撫使程邁會兵討之熊克小歷稱詔帥臣徽猷閣待制程邁遣兵討之按邁除待制指揮今年五月壬寅已不施行克所云恐誤甲午中散大夫提舉亳州明道宮韓澡為其父故觀文殿大學士忠彥請諡上曰呂頥浩嘗奏崇寧黨碑視其姓名皆賢士大夫真可惜也上篆其神道曰世濟厚德之碑諡文定忠彥琦長子建中初左僕射黨籍執政第十人濟州安置定諡在紹興元年四月癸丑賜碑在建炎四年九月辛未今併書之起居郎洪擬試中書舍人詔起復左武大夫忠州防禦使神武副軍統制陳思恭將所部屯眀州以防海道兩浙安撫劉光世畏金人之鋒不能援揚楚但遣統制官王德酈瓊將輕兵以出是日按宋史繫乙未日渡江與敵遊兵遇擊之丙申以直徽猷閣方孟卿知建州丁酉詔起左藏庫紬絹並赴溫明州寄樁以將避敵也此以紹興四年十月二日户部劄子修入戊戌武義大夫忠州刺史閣門宣贊舍人桑仲為襄陽府鄧隨郢州鎮撫使兼知襄陽府初仲既逐程千秋事見去年十一月丁未即據襄鄧隨郢數州有衆十餘萬久之其軍食絶乃以人為糧至是宰相范宗尹念其鄉國被禍之酷請赦仲罪遂命之時朝廷未知仲階官乃權給敕仍令仲自陳所領官職而後賜告焉熊克小歷載仲除鄧隨郢三州鎮撫使於紹興元年二月末注云朱勝非間居録云范宗尹以其兄宗禮在桑仲軍中故授仲襄陽鄧隨郢均房等郡鎮撫使地大人衆稍為患又王銖亦言仲授襄陽鎮撫使今據汪藻外制乃鄧隨郢三州而襄陽不在其數合依汪藻制詞按日歷仲除命在今年八月戊戌仍云兼知襄陽府克所云悮也均房乃王彥所領仲不兼此二州勝非亦悮其後仲死朝廷乃以襄郢鄧隨四州分為三鎮以授李橫李道既而本鎮參謀官趙去疾等奏四郡不可分乃復合為一鎮日歷載其事甚詳不知克何以鹵莽如此趙甡之遺史載仲為鎮撫使在明年二月蓋記其受命之時克於此始書之又誤矣初上召宣教郎致仕周虎臣道梗不即赴及是至行在會舒蘄鎮撫使李成且叛大臣議擇可使成者虎臣請行上召對以為太常博士是日遣虎臣持撫諭敕書及戰袍金束帶往賜成受之時冦盜縱橫成欲據一方以觀天下之變遂徑犯江西初朝奉大夫提舉廣西左右兩江洞丁公事李棫與帥臣許中不和因互訟其過會有旨減罷提舉官以帥臣屬官一員兼領是月棫始受命既而中論棫不已詔停棫官即欽州劾治提舉司減罷未見月日紹興元年六月二十九日廣西轉運司申經略司幹辦任彥輝兼提舉洞丁乞支公使錢亦不云何日降旨二年閏四月二十四日貢士李漢狀叔棫於建炎四年八月內已遵依聖旨減罷訖則是命受在此月也棫停官在今年十一月丁卯而日歷不書今以紹興二年閏四月御史臺看詳狀修入鼎澧鎮撫使程昌宇既受命傳檄二州新除辰沅靖州鎮撫使孔彥舟聞之自鼎州渡江入益陽縣守臣向子諲在衡永間未至宣撫處置司參議官王以寧率所部拒之為所敗以寧遁去彥舟遂入潭州宣撫處置司主管機宜文字傅雱在其軍中即以便宜檄彥舟權湖南馬步軍副總管彥舟之入潭也潭之官吏移治攸縣彥舟遂立賞以搜捉郡官時儒林郎張掞者在潭州乃以掞權本州通判兼權州事昌宇披荆棘立軍府屢與賊接戰其御下甚嚴有不用命者必誅之賊不敢犯孔彥舟去鼎入潭史無月日熊克小歷係之四月末按紹興元年正月韓璜奏狀云去年秋冬間王以寧提兵在州孔彥舟全軍入境則必非四月也趙甡之遺史載於八月末庶幾近之日歷彥舟十一月己酉除湖南副總管己酉初十日去此兩月餘當是朝廷方聞此事今從遺史彥舟之在鼎也移檄本路提舉官曽幾求鹽以給軍食夲司官屬懼請豫之以紓禍幾拒之不與既而昌宇復欲得鹽幾曰使吾畏死則輸彥舟矣亦不與幾楙弟也金人侵犯陵寢河南鎮撫使翟興遣其子琮及統領官趙林率兵自河陽南城至鞏縣永安軍邀擊之屢戰皆勝追奔至澠池而還盜張琪聚衆屯舒城縣李成在頭子山遣人督其芻粟琪懼移屯廬江縣至是又移屯襄安鎮金左監軍昌招撫遷水寨趙瓊降之建炎以來繫年要録卷三十六建炎以來繫年要録卷三十六金人地名考證羅索原書作婁宿誤改見卷一尼瑪哈原書作黏罕誤改見卷一逹蘭原書撻懶誤改見卷一
