body:
  text: 建炎以來繫年要録卷一百八十四宋李心傳撰紹興三十年嵗次庚辰隆金海陵煬王亮正五年春正月庚辰朔不受朝金國賀正旦使施宜生等詣西上閣門進名奉慰命兵部尚書楊椿假資政殿大學士兼侍讀就驛燕之户部郎中總領湖廣財賦彭合言荆南府新招效用六千兵又馬軍司遣戍兵千二百人嵗當用錢六十五萬緡米七萬三千餘石乞科撥户部言所招效用見止有三千人難以全行科降乞將江西茶引錢二十萬緡廣東合起赴行在鈔鹽錢十萬緡湖南北京經制錢十萬緡湖南上供米五萬石應副本所支遣從之壬午中書門下省言贍軍諸酒庫舊委左右司官專一點檢近年趂辦不敷拖欠額錢緣户部事務繁冗獨員點檢不前詔今後從三省擬差官一員或兩員專一點檢措置其户部每年息錢依舊應副尋以命左司員外郎邵大受甲申賜北使宴於都亭驛命宰相陳康伯押伴乙酉北使入辭中書舍人洪遵兼權尚書禮部侍郎丙戍北使施宜生等出國門故事北使以八日出門九日宴赤岸至是宜生等不肯用例是晚抵赤岸宴罷即行戊子太尉知荆南府節制屯駐御前軍馬劉錡言所招效用六千人乞以荆南駐劄御前效用中軍左軍為名分四將仍以右武大夫周贇充左軍統制閣門宣贊舍人荆湖北路兵馬都監劉汜充中軍統領皆從之先是賜錡回易錢四十萬緡及是錡請益三十萬緡詔出御前激賞庫錢𣙜貨務通鈔與之如其數增支回易錢在是月庚寅吏部員外郎虞允文面對論金決敗盟時時為南牧之計必為五道出蜀口出荆襄止以兵相持淮東沮洳非用騎之地他日正兵必出淮西竒兵必出海道宜為之備上頗納其言是日北使至秀州遣人告伴使金安節以欲蹉程前去副使耶律翼即遣人持挺擊逐挽舟之人俾用力牽挽夜漏下二十刻抵平江府己丑賜宴北使才至府治右都管不赴即俾其徒逐所乘舟出城宜生等宴罷馳出閶門七里乃及之庚寅權尚書户部侍郎董蘋充集英殿修撰知湖州右承議郎周淙知滁州淙歸安人也右朝奉郎知通化軍方扔知蘄州辛卯北使施宜生等至鎮江府賜宴不受遂即時渡江壬辰提舉兩浙西路常平茶鹽公事楊倓乞常平米斛許糴稻穀别厫安頓庶幾可以停久從之癸巳詔諸州守臣間有闕官可令六曹尚書侍郎翰林學士臺諫官正言已上各舉曾任通判資序公勤亷明治狀顯著可充郡守者二人仍保任終身犯贓及不職與同罪其嘗任郡守雖有公纍而實材可用者亦聽舉尚書左司員外郎邵大受權户部侍郎仍兼點檢贍軍激賞酒庫此又與今年正月壬午中書奏畫指揮不同詳此恐止是不令董蘋干預故蘋以此求去耳當求他書參考左宣教郎尚書司封員外郎鮑彪引年告老吏部郎官楊朴虞允文葉謙亨胡沂洪邁司勳郎官陳俊卿考功郎官陳棠等言彪篤學守道安於靜退甲科及第處選調二十年了無遺佚厄窮之歎其博物洽聞可以備議論清介端慤可以表搢紳春秋雖多不見老人衰憊之態而勇退戒得陳義甚髙望表而出之以勵士大夫之節制曰壯而仕老而歸君子出處之大致也故朕於知止之士愛之重之思所以致其厚者爾以經明行修早擢上第擁閼不試幾二十年龎眉郎潛垂上清近今才七十耳幡然上歸老之章爾之志決矣朕何忍閔勞以官職之事乎褒進文階華以命服且詔有司上其子若孫一人大夫其修身守道以昌髙年優遊里閭以須三老五更之召可特授左奉議郎守尚書司封員外郎賜緋魚袋致仕省御厨兵二百人翰林司兵百人付步軍司填闕額是日北使至楚州其下奪巡檢王松所乘馬松不與乃誣松從者云以杖擊我副使耶律翼怒命捕松覆面以馬捶捶之二百餘幾死甲辰至洪閘編閘官郝定以潮來應不即啓閘翼怒執而鞭之晚至盱眙軍宴罷風雨作不可渡淮乃止甲午詔修內司并潛火兵共千五百人可減五百人付步軍司填闕額是日雷作非時乙未金國賀正旦使施宜生等渡淮故事北使既登舟即舟中與伴使置酒三行而别去是日天欲明送伴使金安節等至淮岸國信副使耶律翼已先渡淮北去宜生已下皆不及知安節遂於中流瞻送而已丙申尚書吏部侍郎同修國史兼侍讀葉義問同知樞密院事廢御書院詔御輦院下都輦官減一百人付步軍司願放停者聽丁酉宰執奏三衙強刺平民充軍乞約束上曰已先戒三司不得強刺大抵既非情願不惟長短強弱不應程式其心亦不肯為用緩急如何使令王綸等曰誠如聖訓上又曰聞場務復於米斛巧作名以收稅致商販不行綸曰此由監官不得人致專攔作弊上曰昨見河朔有步擔米專攔猶於十里外收稅况舟船之多其擾可知當嚴禁止之罷軍容班本殿前司樂工也九年以二百人為額及是罷之先是御前置甲庫凡乘輿所所須圖畫什物有司不能供者悉取於甲庫故百工技藝精巧者皆聚於其間日費亡慮數百千禁中既有內酒庫而甲庫所釀尤勝以其餘酤賣頗侵户部贍軍諸庫課額以此軍儲常不足前一日吏部尚書張燾因對論甲庫萃工巧以蕩上心酤良醖以奪官課教坊樂工員數日增俸給賜賚耗費不資皆可罷上曰卿可謂責難於君明日罷甲庫諸局以酒庫歸有司減樂工數百人燾之從容補益皆此類也此以燾行述修入日厯正月十七日丙申張燾已見進對十八日丁酉有旨軍容班可罷故知行述所云即此事也權吏部侍郎沈介等言奉旨接伴大金弔祭人使伏見去年以來使命往來頻併竊慮州郡財用不足橫取於民兩淮流民未復尤為費力望令逐州具今次實支錢數轉運司勘驗保明申朝廷給降從之詔今後奉使大金使副不以兩府侍從過界後並依常例坐車馬不得妄於例外索覔轎子前去盱眙軍不得應副戊戌為榮州刺史愭納婦錢氏錢氏秦魯國大長公主曾孫也禮官言愭於顯仁皇后無服紀故成婚太常寺言諸路州軍縣鎮有與顯仁皇后諡號同稱者欲改為顯正宫觀為顯真寺院為顯慈廟額封號為顯烈從之庚子命輔臣朝獻景靈宫以上未純吉服故也先是禮官引熙寧故事乞分命宰執行禮既從之矣權吏部侍郎兼權禮部侍郎沈介復言今祔廟禮畢天地宗廟百神之祀並皆如儀將來大享明堂亦合朝享景靈宫朝獻太廟若於四孟獨否恐無以副主上之誠孝乞依典禮躬詣上終以為疑會介出迓使人後五日有詔郊祀行事稽之禮經蓋無可疑若四孟朝獻景靈宫元豐以來自有典故可令給舍臺諫禮官詳悉討論參以古誼議定聞奏於是上不出而命輔臣分詣自是遂為永制禮部乞躬詣在正月甲申得旨詳議在癸巳今併書之壬寅淮南轉運判官兼淮南西路提點刑獄公事提領營田張祁言本路係官荒田共四十八萬餘緣並江墟垾近山陂塘兵火後民間無力修築乞從本司支官錢修築開浚募人開耕仍許百姓承佃其見今為業之人亦聽借請牛糧盡數開墾從之是日金主亮殺其翰林副使祁宣先是宣上封事略曰民為邦本本固邦寧今北有造軍器之煩勞南有修大內之重役百姓久苦轉戍不勝疲弊願陛下權罷其一俟一成而再計之兼來嵗害氣在進不利興師望陛下以天下為念社稷為心曲從臣請亮怒令執而戮之宣神色自如曰臣年七十死固足矣但恐陛下將來不及臣耳語未竟左右以刃刺其頰遂誅之此據張棣正隆事迹修入棣以為庚辰年正月二十三日事故附於此壬寅二十五日也煬王江上録云正隆二年八月在京值中秋設宴百官玩月忽黑雲遮月亮索筆作鵲橋仙小詞翰林學士祁宣奏曰陛下敗盟興師無故舉事興工動土勞役生靈望陛下察天地之不祥收兵罷役通和南宋復還故都天下幸甚亮大怒斬之滅其族按正隆二年乃紹興二十六年比時亮舉兵之謀未露於外不應云背盟興師恐録誤也棣以祁宣為翰林醫官使而江上録以為翰林學士亦復不同按大定金詔有云頓遺信誓動衆興兵醫人祁翰副陳諫不可便行誅戮與棣所記正同今從之癸卯户部奏科撥諸路上供米斛鄂州大軍嵗用米四十五萬餘石係於全永郴邵道衡潭鄂鼎州科撥荆南府大軍嵗用約米九萬六千石係於德安荆南府澧純復潭州荆門漢陽軍科撥池州大軍嵗用米十四萬四千石係於吉信州南安軍科撥建康府大軍嵗用米五十五萬餘石係於吉撫饒州建昌軍科撥鎮江府大軍嵗用米六十萬石係於洪江池宣太平州臨江興國南康廣德軍科撥行在合用米一百十二萬石就用兩浙米外係於建康府太平宣州科撥其宣州見屯殿前司牧馬一嵗約用米并折納馬料共三萬石係於本州科撥並令逐路轉運司收樁起發時內外諸軍嵗費米三百萬斛而四川不與焉先是魏安行為户部員外郎請度地里逺近而均撥之故有是命內有州府地里逺近不同處仰轉運司開具申省左朝奉大夫守宗正少卿金安節武翼郎帶御器械韓俁各特降二官坐送伴失職也尋詔敦武郎楚州馬邏巡檢王松特轉一官與升擢差遣仍賜錢五百緡敷文閣待制楊揆卒甲辰詔御輦院三營共以九百人為額今後不許增置招填權户部侍郎邵大受乞增置贍軍激賞新中酒庫從之此未知有無與前日罷甲庫事相關當考乙巳詔今後侍從臺諫右正言以上在外帥臣前兩府及侍從以上所舉統制統領官各遷一官防禦使已上取旨將官以下令赴三省樞密院審察不願赴闕者令本軍遇闕先次升差三省樞密院籍記以備擢用餘人所薦並籍記三省樞密院審訪材能以聞先是有旨令中外薦武臣而被薦者衆朝廷無以處之故有是命右武大夫侍衛馬軍司中軍統制趙撙特轉行一官以右諫議大夫何溥左司諫都民望奉詔共薦撙䇿慮深沉可備邉帥故也詔潼川府銅山縣出産銅依舊中賣入官月以五百斤為額先是祕書省正字馮方乞更不立額令窟匠自採打盡赴官中賣依條抽三分入官而户工部言恐窟匠不肯盡數打採損失官課方議遂格丙午直敷文閣知臨安府趙子潚祕閣修撰兩浙轉運副使錢端禮直祕閣提舉兩浙西路常平茶鹽公事楊倓並進職一等顯謨閣直學士知紹興府王師心落直字兩浙轉運副使湯沂兩浙東路提點刑獄公事徐度並直祕閣以應副攢宫有勞也左朝散大夫提舉兩浙東路常平茶鹽公事都潔為尚書户部郎中總領淮西江東軍馬錢糧丁未右內率府副率愷為右監門衛大將軍中書舍人兼權樞密都承旨洪遵試尚書吏部侍郎權工部侍郎王晞亮試給事中太常少卿宋棐權禮部侍郎敷文閣待制提舉佑神觀楊偰奉詔舉閣門祗候殿前司凖備將嶽建壽令都堂審察既而以為閣門宣贊舍人升正將建壽除命在三月甲戍履正大夫安德軍承宣使興元府駐劄御前前軍統制傅忠信知洋州用都統制姚仲奏也先是命金州前軍統制吳琦守洋州而仲言琦所統軍馬𨽻屬金州節制與仲所部事不相干乞移琦他郡故有是旨左朝請郎王墨卿卒尚書吏部員外郎葉謙亨兼權中書舍人奉國軍承宣使提舉台州崇道觀韓世良卒二月庚戌朔屯田員外郎韓彥直言度牒之為國蠧久矣陛下確守禁止十數年來户口增闢民庶蕃衍蓋由此耳伏見諸州縣寺觀僧道事故多隱而不申輒復求人代名州縣無由知覺望令禮部嵗具諸州軍見在僧道人數并繳納到度牒數目開項具申臺省比類考據摘其弊之尤者取旨施行庶幾有官守者知所懲畏從之辛亥左武大夫洪州觀察使淮南西路馬步軍副都總管兼權知廬州劉綱領武康軍承宣使知廬州以攝帥踰年職事修舉也甲寅罷夔州路茶引先是右朝請大夫董時敏知忠州嘗請罷𣙜夔茶都大主管四川茶馬公事許尹不可既而尹復言商旅不通委於民夷不便而都茶場以其前後異説持之不行及是成都府路轉運副使權提舉茶馬王之望復以為言遂弛其禁董時敏申請在紹興二十七年今併書之乙卯大金弔祭使金吾衛上將軍左宣徽使大懷忠副使太中大夫尚書禮部侍郎諾延溫都謹行禮於慈寧殿朝散大夫充翰林修撰同知制誥石琚讀祭文琚中山人已見先是朝廷聞懷忠等之來命吏部侍郎沈介帶御器械劉炎接伴既而邉吏奏有讀祭文官乃詔直祕閣淮南轉運副使魏安行假太常卿凖備引接懷忠等行禮畢見上於殿之東楹故事弔使當服素羅衫黑鞓帶有司既製以待之禮官又疑當罷天竺觀濤之遊恐北人不聽乃請館伴使副洪遵曹勛審度説諭從宜施行於是遵言元祐八年例北使詣寺觀燒香又至凝祥池觀看今來弔祭使副自入界後常服金帶欲依故事排定觀潮燒香衣服聽從其便正月壬寅得旨説諭二月庚戍申明有旨依初禮部御史臺閣門太常寺議上縞服焚香畢與大臣皆立於几筵前褥位北使祭奠已御東楹之素幄北使升殿上舉哭受書詔侍從臺諫參考典禮同議議者吏部尚書張燾等皆以為當正月壬寅所定既而閣門續擬定上宮中先行燒香之禮畢赴御幄簾降人使入門幄中舉哭人使升殿吏部員外郎葉謙亨胡沂攝中書舍人捧祭文人使行禮畢退赴殿門外簾捲人使捧書升幄北面立稍前跪進上起立舉哭接書以授內侍人使還立位復前跪傳金主語問聖體退立客省官承旨宣問金主聖體人使跪聼訖上復座人使下殿入內內侍省都知啓書以授宰執同進呈人使起居六拜出殿門已上續定節次係二月癸丑畫旨內葉謙亨等攝舍人係正月癸卯先降旨今併書之館伴傳旨别賜使副器幣各二百匹兩讀祭文官百四十匹兩正月丙午畫旨既退命輔臣就驛燕之不用樂是日慈寧殿幄帟皆用素御幄以黃館設以青正月己亥畫旨琚嘗為接伴副使禮官初欲以使介禮待之正月辛卯申明既而北引接言止係屬官於是見辭賜物皆以副使例裁定正月甲辰國信所狀讀祭文見辭謝射例物總為銀七百九十三兩錦羅綾絹共二百九十七匹衣三襲各五事金二十兩荔枝腰帶一條十二兩束帶二條錦被褥靴笏幞頭弓箭依使副例是日雪丙辰北使觀潮上遣中使就驛特賜使副及讀祭文官襲衣金帶器幣如初見之數初國信所援故事請正月丙午畫旨而館伴使以為重疊乃罷之二月庚戌申明尋有旨祭奠弔慰兩事作一事可並支賜二月癸丑奏審於是都管已下皆特賜銀帛有差二月甲寅有旨都管各特賜銀絹五十匹兩上節三十匹兩中下節遞減十匹兩自使副已下共賜金六十四兩衣二十事銀一千四百九十兩雜色絹一千四百九十匹丁巳四川安撫制置使王剛中言本司引試四路特奏名進士乞降敇差官詔左朝請郎利州路轉運判官蘇欽監試左朝請大夫知簡州房與之充考試官自是以為例與之成都人也剛中奏下在去年十一月二十四日今併附差官之日監察御史任文薦罷先是文薦為别試所監試有告舉人劉侯度吳漸傳義者文薦不依條扶出而移之簾前且以狀申都省詔給事中王晞亮密究其事二人皆避知舉官御史中丞朱倬親而文薦里人也於是詔與文薦外任是日北使遊天竺寺戊午命同知樞密院事葉義問和州防禦使知閣門事劉允升假崇信軍節度使充大金報謝使副謝其來弔祭也上亦恐金有南侵意因使義問覘之貢院言應博學宏詞科西安尉唐仲友合格詔與堂除仲友堯封子也庚申左文林郎蔣芾為太學博士芾瑎孫也瑎之子竒仕至徽猷閣待制左修職郎周必大為太學録翰林學士周麟之使金國還入見辛酉北使辭於几筵殿次辭上於垂拱殿癸亥上諭王綸等曰近聞馬步軍司從雜賣場市川布甚多恐其搭息刻剝軍人不可不察卿等可同三省詳議禁止自今毋得售與軍中以革抑配之弊於是令追還户部既而主管步軍司公事趙密言本司前軍先買川布共四萬匹其實低於市直並係諸隊情願前來取買乞只依所立價錢赴官送納特免拘收詔今後不得收買後旨在二月癸酉直徽猷閣知臨安府趙子潚權尚書户部侍郎祕閣修撰知揚州劉岑移知溫州辭不赴改提舉江州太平興國宫修武郎利州西路駐劄御前中軍第三正將曲之績升充中軍統領之績端子吳璘所薦也甲子百官純吉服是日宰相湯思退陳康伯奏事畢樞密院官將退上留王綸葉義問同諭之曰朕有一事所當施行似不可緩普安郡王甚賢欲與差别卿等可議除少保使相仍封真王衆皆前賀綸義問退上曰朕久有此意深惟載籍之傳並后匹嫡兩政耦國亂之本也朕豈不知此第恐顯仁皇后意所未欲故遲遲至今思退曰陛下春秋鼎盛上天鑒臨必生聖子為此以係人心不可無也上復曰此事出於朕意非因臣下建明且顧康伯曰去年卿留身朕亦嘗及此事甚無難者卿等宜檢點故事進呈宰執退思退留身言適奉聖訓非古帝王所及上曰朕覽唐宣宗事羣臣有議及儲嗣者輒怒斥去可謂不逹理矣於是普安郡王自育宫中至是已三十年而王天資英明豁逹大度左右未嘗見有喜愠之色趨朝就列進止皆有常度騎乘未嘗妄視平居服御儉約每以經史自適嘗與府僚曰聲色之事未嘗略以經意至於珠寶瑰異之物心所不好亦未嘗蓄之騎射翰墨皆絶人上嘗謂近臣曰卿亦見普安乎近來骨相一變非常人比也右文殿修撰兩浙路轉運副使錢端禮知臨安府直祕閣知秀州黃仁榮為兩浙路轉運副使直祕閣淮南路轉運副使魏安行知揚州左朝請大夫提舉淮南東路常平茶鹽公事董將為淮南轉運副使兼淮南東路提點刑獄公事大理國遣使遺卭部川蠻衣甲金器鞍馬且言大雲南皇帝欲遣左右使臣持貨物入宋買賣虛恨鬼主蒙備言於黎州四川安撫制置使王剛中不答遂已此據知州馮時行繳申蒙備狀修入狀稱二月十五日凖大理國大雲南皇帝賜到恩澤云云故附本日乙丑大理評事元徽之言髙祖母安人鞏氏卒乞解官承重許之時徽之亦年幾五十矣丁卯吏部尚書兼侍讀張燾充資政殿學士致仕時上欲用燾而燾以衰疾力辭且言禮義亷恥國之四維四維不張何以為國臣年齒已暮氣力已衰是用抗章乞賜骸骨今言愈切而寵彌厚懇愈力而位益崇儻恃鴻私不知退避髙爵厚祿處之自如則是前後告老之辭悉皆僥幸進取之計要君罔上欺世盜名公議沸騰臣節掃地雖強顔於此陛下欲安用之疏入上察其誠乃有是命未幾復命遷一官為左中大夫仍給真俸戊辰三省樞密院進呈普安郡王加官移鎮進封國名及宣制吉日湯思退曰少保開府自元豐以來不並入銜更取聖裁上曰封真王須帶開府儀同三司可且除使相思退曰臣等按典禮非至親不封真王今進封則當冠以屬籍如環衛官稱皇姪之類不知聖意如何上曰可便以為皇子此事朕志素定已九年矣顧外庭未知爾若如此即瑗諸子亦合加恩數卿等可擬定進呈陳康伯曰聖慮髙逺豈前代帝王所可跂及臣敢為天下賀上曰更有一事如恩平郡王璩亦與少恩禮令判大宗正事置司紹興府如此則皆定矣思退言立皇子當降詔及遣官告郊廟上可之兵部尚書兼權翰林學士楊椿兼侍讀御史中丞朱倬給事中王晞亮並兼侍講權尚書吏部侍郎沈介試中書舍人起居郎黃中權工部侍郎起居舍人楊邦弼守起居郎吏部員外郎兼國史院編修官葉謙亨守起居舍人辛未詔近羣臣三上表請依典故以吉服御殿朕雖勉從深惟人子之孝未能割情且服淡黃袍紅鞓帶俟期年易之癸酉上始服淡黃袍黑犀帶御垂拱殿宰臣湯思退等奏立皇子恐合依故事改賜名并具名乞留中奏事退御筆付三省瑗可立為皇子改名瑋令學士院降詔遂召翰林學士周麟之赴中書諭旨草詔進入軍器少監劉堯仁守兵部員外郎權户部侍郎邵大受言淮浙鹽場諸弊乞於通貨錢內每袋留三百文就場送納帶還積欠亭户本錢又言紹興府一嵗賣鹽止及十六萬斤而衢州乃及三百萬斤婺州五百萬斤灼見人户盡食私鹽乞嚴為禁止皆從之先是提舉官取鹽本錢為羡緡以獻而本錢遂乏因令亭户先輸鹽而後給本又以所輸出額之鹽理為正額於是犯法者衆土軍反與私販為市諸場積鹽不售者至五百萬石有竒故大受以為請詔右迪功郎沈直清送大理寺究治先是直清求為葉義問奉使禮物官而義問已辟寶應縣主簿趙磻老偕行因拒其請直清怒揚言詆義問義問劾之故有是命既而法寺奏直清比附私罪徒勒停特送袁州編管直清西安人也甲戍內出手詔曰朕荷天祐序承列聖之丕基思所以垂裕於後夙夜不敢康永維本支之重強固王室親親尚賢厥有古義普安郡王瑗藝祖皇帝七世孫也自幼鞠於宫闈嶷然不羣聰哲端重亢於宗藩歷年滋多厥德用茂聞望之懿中外所稱朕將考禮正名昭示天下夫立愛之道始於家邦自古帝王以此明人倫而厚風俗者也稽若前憲非朕敢私其以瑗為皇子仍改賜名瑋詔翰林學士周麟之所草也是日以麟之兼權吏部尚書丙子制以皇子為寧國軍節度使開府儀同三司進封建王制既出朝士動色中外大恱熊克小厯手詔在丙子會要亦同今從孝宗玉牒蓋甲戍降詔乙亥鎖院丙子宣麻耳熊克小厯乙亥召學士楊椿諭以旨意鎖院甚嚴丙子詔略曰云云此蓋據陳良祐撰椿墓志所言而不細考之椿所草乃進封麻制爾玉堂草制亦具著二人姓名克直院纍年不知胡為差誤如此詔許民間作樂丁丑宰執入賀上曰昨日宣詔想見人心喜恱湯思退曰豈惟士大夫雖閭巷細民無不鼓舞仰見睿謀英斷合天人之心如此上又與王綸等論淮上盜賊因曰自古銷盜賊之術無如輕徭薄賦綸曰陛下一語盡之矣夫姦凶喜亂世固有之然千萬人中無一二也其餘悉是善良徭役誠輕賦斂誠薄則民安居樂業雖驅之為盜賊不從也昨罷𣙜場南北之商棄物而逃困於道路無所得食漸至抄掠是時皆勸陛下嚴責州縣捕之陛下非惟不殺且給之褁糧使各歸業不久遂定上曰知此道者惟唐太宗綸曰貞觀之治庶幾三代者豈虛乎哉是日葉義問等發行在左朝奉郎主管台州崇道觀沈長卿與義問善至是辟為書狀官長卿至燕而病比還卒於保州戊寅殿中侍御史汪徹言祖宗故事凡政刑紀綱禮文法度可以備討論者莫具於會要一書捨是則漫散無統矣章得象王圭所編次止於熙寧十年自元豐以迄於今八十年間未有編次恐嵗月浸逺不無漏逸臣竊見祕書省官常不下十餘人苦無職事望令起自元豐以後討論纂述以成一代之縟典傳於無窮詔禮部祕書省條具取旨提舉江南東路常平茶鹽公事王義朝罷以殿中侍御史汪徹論其抑勒民户請買官田也己卯左承議郎薛良朋為國子監主簿詔滁州上供錢依濠州盱眙軍例更展免一年上優假淮民自休兵至今未嘗起稅也三月庚辰朔户部郎中總領淮西財賦都潔入辭言江東屯軍嵗費緡錢七百萬米以石計者近七十萬科撥雖有名限期雖有日尚慮監司守二恬不加意望將弛慢尤甚者許臣按劾黜責從之太府少卿方師尹守尚書左司員外郎吏部員外郎兼國史院編修官胡沂守右司員外郎兼職如舊辛巳祕書省校書郎史浩魏志權兼建王府教授兼恩平郡王府教授詔自今除授館職並先召試學官依格選除議者言儒林册府之官祖宗以來必試可而後授比年召用人材故事浸廢使州縣小吏皆有僥幸超躐之心望特命大臣舉行召試之典事下吏禮部而權吏部尚書周麟之等言景德二年命學士邢昺等與堪充國子監直講者十人得太子洗馬張頴等試經義於學士院而命之自後考試學官即不該載止有差注學官格法故有是旨敷文閣待制知平江府陳正同提舉江州太平興國宫祕閣修撰知宣州朱翌知平江府集英殿修撰知臨安府錢端禮言本府自紹興二十八年以後未償鋪户國信等買物錢二萬九千餘緡屢經進狀或省部投牒照應本府緣去年揀汰將兵今按月將糧料等錢四千五百餘緡赴左藏庫送納望自三月以後截撥上供窠名盡數當官支還所捐不多而所惠甚衆從之兵部尚書楊椿奉詔舉利州西路駐劄御前左部統制楊從儀右部統制李師顔可備將帥而左朝散郎利州路提點刑獄公事富元衡薦師顔忠節尤力詔進從儀一階令樞密院籍記召師顔赴行在自嶽飛得罪而湖北轉運司拘收前宣撫司庫務金幣物料計直六百九十餘萬緡有未輸者八十九萬緡至是踰二十年拘催不已轉運判官王躍言此皆出軍支使及回易逃亡之數即非欺盜無所追償望悉除放從之癸未吏部言職制令諸王開府儀同三司立班敘位在左右僕射同平章事之下宰相湯思退奏太宗朝宋琪乞班楚王元佐等下臣等欲依故事上表上曰祖宗典故親王在宰相下舊矣卿等不必請建王立班敘位並依吏部所定初淮東轉運副使魏安行既上募民力田法而淮西轉運判官張祁亦徙民於近江和州無為軍補葺楊栁嘉成二墟堤岸官給牛種使之就耕至是詔賜安行錢十萬緡後四日又賜祁本路鹽司錢三萬緡為牛種等費然卒無成資政殿學士新知廣州樓照薨後諡襄靖乙酉保康軍節度使開府儀同三司萬壽觀使吳益遷少保太尉崇信軍節度使主管侍衛步軍司公事趙密開府儀同三司二人皆以攢宫之勞故有是命尚書吏部員外郎陳俊卿為樞密院檢詳諸房文字丙戌尚書吏部員外郎洪邁移禮部丁亥左奉議郎通判平江府任盡言為京西南路轉運判官直祕閣知撫州王秬提舉淮南東路常平茶鹽公事先是陳正同在平江弛縱不治盡言能助之朝廷録其勞故有是命既而盡言乞至都堂白事自陳母老不願居邉尋命秬與盡言兩易二人易任在四月丙寅軍器監丞朱商卿通判平江府商卿去年八月十二日有旨差措置江西米綱不知後來如何結局日厯未見詔臨安府在城自紹興二十一年以後官司續置到房廊賃錢並減三分之一戊子上䇿試禮部舉人劉朔等於集英殿既而得右迪功郎許克昌為首用故事降為第二遂賜晉江梁克家等四百十二人及第出身同出身朔莆田人克昌襄邑人也直徽猷閣知盱眙軍楊抗落職放罷御史中丞朱倬論抗私遣監渡官郭貫之等夜渡淮為商所得金錢動以萬計故黜之辛卯參知政事賀允中等使金國還入見允中言敵勢必敗盟宜為之備壬辰池州奏龍神衛四廂都指揮使昭慶軍承宣使本州駐劄御前諸軍都統制嶽超卒寧國軍節度使殿前司選鋒軍都統制李顯忠充池州駐劄御前諸軍都統制顯忠言本軍有諸州配到罪人不少乞揀選堪披帶之人充軍將怯弱人發遣附近州軍牢城收管從之二月戊戍行下右朝奉郎知常州莫伯虛右朝散大夫通判常州梁興祖並降一官放罷以户部言去嵗諸路違欠上供諸色窠名本州最多故也癸巳上謂大臣曰監司郡守所寄非輕須平日選擇有人望者以待有闕便可除用右正言沈濬言權户部侍郎邵大受病不任事詔與外任大受乞宫觀後三日以大受充祕閣修撰提舉江州太平興國宫乙未樞密院進呈有劉頴者上書陳廣中利便五事上曰所言有益於公私者皆即行之惟結好南蠻其意不過欲誘説蕃商利其寶貨朕於此等物舉無所好何苦自擾假令設十玊觥飲酒酒味則一一觥足矣餘安用哉王綸曰不貴異物賤用物民乃足陛下了然與六經合故能託物指諭以曉臣下上亦誦不寶逺物則逺人格所寶惟賢則邇人安至再三而止太府卿李澗權尚書吏部侍郎左朝議大夫主管台州崇道觀王普提舉江南東路常平茶鹽公事左宣教郎通判荆南府張震提舉荆湖北路常平茶鹽公事右武大夫忠州刺史荆湖北路馬步軍副總管馬羽移京西路兼權知郢州丙申左武大夫榮州刺史江南東路馬步軍副總管劉光輔移淮南東路副總管楚州駐劄先是山東之民怨金暴虐會嵗飢東海縣民因起為盜有次首領李秀者密詣淮東副總管宋肇納欵願得歸附朝廷却之且疑其或致衝突諜者因謂其與金結約將大興師南來乃命光輔駐楚州以為之備光輔未至秀又遣其徒至楚州見右朝奉郎通判權州事徐宗偃求濟師宗偃諭遣之因貽書大臣大略謂東海飢民困其科斂苛擾嘯聚海島一唱百和犯死求生初無能為金主蒙蔽下情不通猶未之聞若知則偏師一至即便撲滅縱使猖獗得志必自沂密橫行山東失利則乘舟入海誠不足為吾患今添置兵官招集叛亡適足以生邉釁宗偃江山人也此據徐宗偃紀實右朝奉大夫新知楚州陸亷與右朝請郎新知滁州周淙兩易楚州易守恐亦與東海縣事相關丁酉以立皇太子命兵部尚書楊椿告昊天上帝權禮部侍郎宋棐告皇地祇嗣濮王士輵告太廟安定郡王令詪告諸陵宗正寺主簿吳曾試太常丞保寧軍承宣使知金州兼金房開逹州安撫使節制屯駐御前軍馬王彥為龍神衛四廂都指揮使充金房開逹州駐劄御前諸軍都統制兼知金州金房都統制正名自此始庚子敦武郎趙益為紹興府兵馬鈐轄益普逺孫也辛丑祕閣修撰知池州周執羔移知饒州詔今後臣僚重疊奏舉令吏部具名劾奏壬寅直祕閣知夔州程敦臨左朝散郎通判夔州郭箎與本州兵將官四人貶秩各一等坐不救州城火為提刑司所劾也火事見去年十二月丙子癸卯詔興州都統制吳璘每嵗進羊道逺勞費可自今罷甲辰賜特奏名進士黃鵬舉等五百十三人同進士出身至助教是日取應宗子彥髣等三十一人武舉進士樊仁逺等十九人特奏名一人並授官有差鵬舉信州人仁逺福州人也丙午檢校少保武康軍節度使恩平郡王璩開府儀同三司判大宗正事置司紹興府始稱皇姪丁未上謂知樞密院事王綸曰璩昨日之除何如綸曰陛下春秋鼎盛已為宗社無窮之計今日談笑裁決略無難色上曰朕決此計已九年建王所佩玉魚乃置𣙜場之初令買此玉以備今日之用舉此即可知矣二王朕育之宫中三十年瑋始育之張媫妤璩育之皇后自張之沒后收而併視之雖一食必均略無等差今二王之除后意與朕合詔建王府置直講贊讀各一員以郎官兼小學教授一員以館職兼詔每嵗遣中使賜諸將帥暑臘藥所至皆迎不無勞費自今令進奏院遞賜四川總領所乞增印錢引一百七十萬緡以備軍費至是許之通前後兩界為四千萬緡有竒視天聖所書數凡三十倍明年十二月庚子所書可參考加封梁昭明太子統為英濟忠顯王建炎以來繫年要録卷一百八十四建炎以來繫年要録卷一百八十四金人地名考證努延原書作耨碗誤改見卷一百六十三
