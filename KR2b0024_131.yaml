body:
  text: 建炎以來繫年要録卷一百三十一宋李心傳撰紹興九年八月按是月戊申朔己酉復淮南諸州學官員是日簽書樞密院事樓照自鳳翔東歸趙甡之遺史云照倚秦檜之勢妄自尊大輕忽士流尤鄙武臣陜西州郡多武臣為守照悉令庭參而退反請通判幕職官接席議事軍民皆駭之初劉豫之時民有訴事者執狀告官無所阻礙照所到州訴事者每一狀非五千不能達故不能盡得民心照貪財賄所至厭苦之由是失軍民之心矣還朝無所建眀奉秦檜之意而已庚戍樓照言陜西諸軍冬衣已下成都府等路取撥十六萬匹上曰蜀士頻言調發凋弊已甚今吳玠一軍既分屯關陜饋運十省八九若更能鐫減冗官四川民力庶幾其少紓乎詔川陜宣撫司便宜補官限一年陳乞換給時言者論名器浸輕之弊以為三嵗大禮蔭補三年科舉所得之士共止數百人而便宜補官一嵗之間乃倍此數今罷便宜聖旨已五年其所換給約萬計乞限一年庶息姦弊故有是旨八年三月李誼為右正言嘗奏此事誼此時為中書舍人或即其所上當考壬子起居舍人程克俊為起居郎尚書左司員外郎王鉌為起居舍人直寶文閣兩浙東路提點刑獄公事范同為中書門下省檢正諸房公事甲寅左朝奉郎張宦為尚書司勳員外郎右朝奉大夫新夔州路提點刑獄公事喻汝礪行駕部員外郎汝礪始以勾龍如淵薦故得召及對首論願革近時文章骫骳之習以還西京爾雅鴻奧之風起中興博大混一之氣又論議者欲駐蹕渚宫臣愚以為未可願俟之加以數年地益增治糧益得嵗然後振斾以臨三楚清蹕而朝諸侯可也更復俟之歷嵗滋久河潼囂庶許洛昌大然後復皇輿於舊京旋故鼎於天邑可也又論蜀中之力何以屈非兵屈之官之冗者屈之也非官冗屈之士大夫之濫賞者屈之也今天塗未夷國步方梗加之以師旅因之以飢饉即其所深異者觀之冗賞之濫濫與冗偕焉取人之父兄子弟所以相養活之具從而潰敗磔犂之吾國幾何而不屈乎吾國屈矣於何而可以伐人之國乎上甚嘉納且面諭曰不見卿久矣英論如昔遂下所奏三疏付中書秦檜使人諭以上將用君君宜與時髙下毋妄言汝礪不答翼日遂有是命談篆撰汝礪年譜云有旨欲用公為中書舍人公至中書見宰相宰相曰上即欲用公公宜與時髙下切無妄言先是公方至都秦丞相使人謂公曰鄊在圍城中公首論不棄地末論不拜偽楚皆足以起發某某之有今日公與有力焉且公自是前輩東南士大夫皆知公之文章矣此行但少鯁正略相附和則美官厚祿何所不為公慨然嘆曰是欲鉗吾之口刺吾之舌矣吾豈要曩日之功於丞相哉某既謁天子儻有所見安得而不言於是丞相聞之遂大忌公翼日除駕部郎中命下縉紳大失望公無所怨居久之蜀人蘇仲虎給事馬濟川侍郎勾龍行父中丞指訪公曰比見除目與先日上旨不同士論未厭廟堂意謂公必有異論願善處之按汝礪自尚書郎勒停復起為郡今才召對便除中書舍人恐無此理又勾龍如淵今年二月先已罷中丞提舉太平觀此時實不在朝安得見除目也况汝礪三劄皆殊不犯時諱秦檜何為大忌之今不取乙卯樓照奏以武臣楊順知保安軍冦成知環州上曰陜西沿邉控制夏國最為要害當擇久在軍中諳練邉事或本土武人方能保固障塞民得安業可劄付照令諭諸帥翼日秦檜奏已行下諸帥如上旨上曰堡塞最沿邉急事因神宗戒陜西諸帥悉出手批然於器械則稍變古法新法弓稍短不能及逺又放箭拘以法不能中的朕自幼年即習騎射如拽硬射親各是一法斗力至石以上箭落不過三五十步如此何以禦敵耶熊克小厯云上之英武出於天資其論射法雖唐太宗未能過也丙辰右朝請大夫淮南西路轉運判官李仲孺知廬州時武信軍承宣使知廬州張宗顔卒故以仲孺代之淮西宣撫使張俊遂命統制官田師中將宗顔之衆八千人歸建康後贈宗顔保靜軍節度使諡壯敏戊午鎮潼軍節度使開府儀同三司信安郡王孟忠厚判鎮江府從所請也故事戚里官至使相者未嘗典州忠厚與秦檜為友壻上亦以昭慈故厚眷之故有是旨徽猷閣待制知鎮江府程邁升徽猷閣直學士知饒州是日金都元帥越國王宗弼殺魯國王昌於祁州函其首以獻昌臨刑謂宗弼曰我死之後禍必及爾宜早圖之宗弼俯首無言遂囚昌之子大伊瑪久之遇赦得釋己未上諭大臣曰吳玠軍馬既移屯熙秦等路便當以五百人為一指揮令諸帥招填稍足舊額與弓箭手參用緩急之際有足倚仗庶幾漸復祖宗之舊金人和議雖堅安能保其終久無釁况夏人乍臣乍叛尤難保恃今日邉防尤不可忽庚申中書舍人王次翁試尚書工部侍郎起居郎程克俊試中書舍人殿中侍御史周葵試起居郎先是權户部尚書梁汝嘉為秦檜所厚葵將按之汝嘉聞之謂中書舍人林待聘曰副端論君矣葵入對待聘乘檜未趣朝亟告之檜即奏徙葵為起居郎葵方待引檜下殿諭閣門曰周葵巳得旨除起居郎隔下葵入後省出其疏以示待聘曰梁仲謨何其幸也此據熊克小厯參王明清揮麈録略同但云葵既徙左史翌日直前訴其事上以問檜檜曰葵位長言路碌碌無所建眀且進退百官臣之職也儻以臣黜陟不公願先去位上曰不須如此未幾葵罷去按副端遷左史非為降出葵不應自陳又其去乃因李光眀清所聞不審今不盡取待聘乃知為汝嘉所賣汝嘉不自安復引疾求去焉汝嘉是月癸亥奉祠辛酉給事中蘇符言已分屯吳玠軍馬乞罷免四川對糴米腳錢等上曰四川自兵興以來橫斂既多民不堪命可令胡世將張深相度蠲減以蘇民力吏部員外郎徐度言新復州縣遺民久罹暴虐如州之僚屬縣之令佐其所職業最為近民尤當慎擇其應格法人更令長二銓擇上曰度所論極當新疆百姓久被虐政若州縣官非其人朕之德意何以自達秦檜等曰守令皆親民官欲今後縣令並依守臣到堂上曰卿等若親加銓量察其人物觀其議論亦可見人才大略也壬戌詔東京留守同搜訪郊廟禮器來上時當行大禮上以渡江後所作禮器多不合古故命訪之舊都焉禮官初議郊與明堂當間行秦檜欲集議上曰且依近例行明堂禮可也癸亥司勳員外郎李公懋言昔東晉之在江左也控扼上流皆用名臣重望一時偉人如陶侃庾亮輩中間數更危難卒賴其力近者朝廷選用羣臣既享厚祿即擇善地如江浙福建安間之處從官典領比比相望危逺險難即以無聞之人當之在陛下寵遇實為優恩而羣臣報稱不無慚色今者陛下聖德所及拓大封疆恢復故宇大江南北俱為內地上自江陵下至九江欲乞朝廷選擇一二從臣參處其間輔臣進呈上曰朕用人才初無內外之間士大夫既為近列多擇善地至兩淮新疆輒復固辭今後差除擇其避事辭難之人重行黜責權户部尚書兼江淮荆浙閩廣等路經制使梁汝嘉充寶文閣直學士提舉江州太平觀免謝辭從所請也事祖見是月庚申尚書右司員外郎朝謙之權户部侍郎甲子言者請申嚴冠帶之制俾公卿長吏毋得以戎服臨民詔禮寺討論申省自軍興士大夫始衣紫窄衫上下如一故論者及之然迄不能改二十五年十二月辛卯二十六年二月復申嚴之丙寅京東淮東宣撫制置使韓世忠言金人誅戮大臣其國內擾淮揚戍卒及屯田兵盡勾回世忠意欲乘虛掩襲上曰世忠武人不識大體金人方通盟好若乘亂幸災異時何以使敵國守信義遂不從翊衛大夫貴州團練使范綜知金州日歷不載綜前銜按綜紹興六年七月癸巳以此官再任知綿州協忠大夫華州觀察使王俊知洋州日歷亦無俊階銜此以興元知府題名修入俊仍兼四川宣撫司中軍同統制戊辰故武功大夫知環州安塞寨田敢特贈正任刺史官一子以經略使趙彬上其忠節也事見紹興元年二月末己巳詔陜西諸路自祖宗以來行使鐵錢昨緣廢齊毁棄不用遂致公私交易不便可依舊仍與見今錢引相兼行使庚午給事中蘇符充賀大金正旦使知閣門事王公亮充副使尋命各官其家一人九月甲午降旨監察御史何鑄為殿中侍御史是日四川制置權主管宣撫司職事胡世將至河池時簽書樞密院事樓照既離鳳翔陜西三偽帥懷不自安掠取官私財物為入覲之計右護軍都統制吳璘等言於世將曰金人大兵屯駐河中府只隔黃河大慶橋敵馬日日放牧河南騎兵疾馳三五日可到川口吾軍就糧散在陜西緩急不能追集關隘經年不葺川路糧運斷絶此存亡危急之秋也今朝旨不得輒遣間探敵中動息不知璘等家族所不敢顧國事竟當如何世將具奏曰臣伏見國家自景德以來與契丹通好而河北之備益謹治平中敵人微有爭端稍嚴外備而重於改作臣之曾祖先臣宿為樞密副使建議以謂今日之計莫若外固和親之形內修守禦之備當時不失備禦卒以無事今朝廷方與金國講和梓宫將卜於陵寢兩宫復還於行闕南北之民各獲休息實天下大慶至於備禦之事臣願以祖宗為法固不害為百數十年盟好也大軍屯蜀十有餘年四路供餉民力困竭今恢復陜右所産榖麥至廣出兵就食鎮守重地誠得其宜兵雖分而備不可弛於計實為兩得秦地形勝精卒良馬之所自出實軍國之根本然即今諸軍衣食仰給四川則蜀又為陜右之根本况蜀地居吳楚上流號為富貴敵人欲取久矣特以重兵保險終不能得志今日分兵宜使其勢與蜀相接不惟保蜀所以重上遊之勢川蜀非昔日之比昔時河東為邉境與蜀風馬牛不相及今河中府浮橋之北便是敵境陜西收復之初朝廷固宜昭示大信至於我之為備豈可不講和好須自治得䇿然後可固若守禦不嚴敵得輕我動為爭端非所以固和好也今既不遣間探恐妨和議敵之動靜一切不知若又分兵太逺守禦不密萬一有虞敵以精騎馳突自河中不數日至川口比至追集軍馬決不及事徇諸將之説則欲坐食四川之糧免遷戍之勞人人一辭固無足信而士大夫與凡有識者之論則謂兵不可不出出不可太逺此折衷之説臣近據秦鳳路兵馬都監賀仔稱在敵中有薩里罕郎君與近上心腹人黃職方三年前為仔言金國王子議論要得入川不難將陜西棄下不覷三五年南兵決來作主道路已知子細一發上去決取川蜀并據宣撫司幹辦官成希靖繳到紹興五年上都督張浚劄子稱希靖料敵人之謀以國家阻江據險彼之騎兵非所長之地近年屢戰屢北終不得志彼必示弱以致吾之驕佯北以誘吾之進遺我以殘破之地使吾取之以分其兵勢約我以和好之言俾吾信之以出其不意以此詭道圖我川蜀一落計中為害不細臣以謂賀仔之言雖未足深信希靖之䇿或出於偶然要之守禦之備自不可忽萬一或如其言則我之為備正可以伐謀朝廷今以楊政帥熙河吳璘帥秦鳳政璘皆吳玠大將立功既多威名素著考之衆論皆謂得人臣謂楊政於鞏州及白石吳璘於鳳翔及寶雞多屯軍馬遇有緩急可以應接川陜仍乞令政依舊帶川陜宣撫司都統制璘依舊帶行營右護軍都統制吳玠所保仙人關昨金人以本國徑兵及五路全力攻犯大敗而去地利如此規模具在臣以謂未宜遂廢欲乞量屯軍馬將一帶關隘常加整治魚關倉見在米斛不多水運艱苦卒不能致欲乞常樁留一二十萬石以備緩急世將此疏係川陜大利害故全載之熊克小歷稱世將八月戊申朔奏除楊政吳璘事而費士戣蜀口用兵録乃云世將八月二十三日至河池蓋差二十餘日今從士戣所記附此克又稱世將為宣撫副使亦誤世將除宣副在九月六日癸未璘時新除秦鳳經略使於是止以牙校三隊赴秦州且飭階文等山寨備之辛未兵部尚書兼權翰林學士胡交修兼侍讀工部侍郎王次翁兼侍講武功大夫開州團練使杜平知原州關陜之陷也平自知原州沒於偽地金人以平知鳳翔府纍遷秦鳳等路提點刑獄公事至是樓照以便宜命平守故郡許之平言世受國恩既喪忠義無顔復臨吏民乃以平提舉台州崇道觀平得祠在九月辛巳癸酉户部員外郎孫邦言私酤條已免拆屋茶鹽尚有籍沒法亦乞蠲除上曰法若果弊固不可不亟改若行之已久無甚大害且循祖宗之舊可也乙亥雄武軍承宣使關師古為龍神衛四廂都指揮使行營中護軍前軍統制師古自延安入朝既對遂有是命詔知晉寧軍折可求兼主管本軍沿邉安撫司公事措置興復麟府州用樓照請也初金人欲得王威趙榮事見正月丙申已遣還之韓世忠遺秦檜書曰榮威不忘本朝以身歸順父母妻子悉遭屠滅相公尚忍遣之無復中原望耶檜慚且慮世忠沮遏乃令榮威自六合趨淮西而去至是檜奏外間頗有異論於是詔以榮威屢抗官軍及驅掠兩州之罪榜諭中外金國越王宗弼得之復以榮為將丙子直徽猷閣江浙等路經制判官霍蠡罷初右諫議大夫曾統言經制使本户部之職更置一司無益乞罷之上曰經制一司須經久方見利害今才半嵗難責以近效統三上疏論上未許至是統又言經制司所創官吏種種多費校其所入未必能補如創供給酒庫亦是隂奪省司之利夫經制所總之事户部本職臣已嘗具陳不復重言若以謂監司州縣違法廢令别建此司欲以按察即又不然夫朝廷置監司所以轄州郡立省部所以轄監司祖宗之制也稅賦失實當問轉運常平錢榖失陷當問提舉司若使經制司能事事檢察則雖户部版曹之職亦可廢矣又自置此司以來所謂漕司之移用憲司之贓罰監司之妄支固未嘗少革其弊蠡又擅將官錢三十萬貫借軍中不顧朝廷大訃欲望其按察諸路監司州縣革積年之弊臣竊料其必不能也若巧作名目以取於民徒為國家斂怨基禍以此為術其誰不能望先次罷黜遴選能臣以司邦計詔户部措置蠡與外任既而蠡乞奉祠乃以蠡主管台州崇道觀蠡得祠在十月乙亥祕閣修撰提舉江州太平觀柳約知單州詔成州同谷縣稅户趙清臣旌表門閭本州言清臣孝友姻睦著於鄉里政和末其母張氏病清臣割股肉以進母疾遂安諸姪請析居清臣訓諭不從因閉户不出號哭者纍日産業皆取其棄餘者妻邵氏病其子鄉貢進士廷彥復割胸肉為羮以進紹興初清臣少子惟禮有疾廷彥使禱於天乞損已夀以增惟禮既而廷彥危病惟禮被髮以禱亦如之數人皆尋愈清臣中子忠訓郎和亦孝謹邵氏疾再作和刲股肉啖之父子兄弟孝友相尚萃於一門宜褒奬故有是旨命常州津遣通微處士陳得一赴史館補修奉元歷以史館修撰張燾等言重修神宗正史歷志備檢閲也建炎以來繫年要録卷一百三十一建炎以來繫年要録卷一百三十一金人地名考證伊瑪原書作拽馬卷一百四十八又作泄馬並誤今改正薩里罕原書作撒離喝誤改見卷十一
