body:
  text: 建炎以來繫年要録巻一百九十七宋李心傳撰紹興三十有二年二月戊戌朔中書舎人權直學士院兼侍講虞允文試兵部尚書充川陜宣諭使措置招軍買馬且與呉璘相見議事罷借江淮兩浙坊場浄利錢尋命已借者理充經界之數用江東提舉常平茶鹽公事洪适請也後㫖在四月乙亥詔故武功大夫建康府駐劄御前㳺奕軍凖備將韓立特贈拱衞大夫郢州防禦使以楊林渡戰沒故有是命右朝請大夫知和州劉子昂辭行己亥秉義郎權池州駐劄御前軍統領邵世雄為閤門宣賛舎人世雄宏淵子也庚子張浚虞允文入對時浚乞偕執政奏事上不許於是與允文同對詔浚仍舊兼行宫留守又詔浚罷相後有合得特進恩數皆還之浚乞偕執政奏事他書皆不載洪遵行状云除知建康府且許入覲時虞丞相允文有意北征先移屯侍衛馬軍驟増萬竈勅公同二府議于内殿公奏吕恵卿請與弼臣同對神宗赫怒近太上在金陵張浚司留鑰亦不許偕執政奏事願别班引上批所委體大共議勿辭盖近此所無也言者論料理江淮三事其一請于兩淮荆襄之間創為四大鎮如維揚合肥蘄陽襄陽各為家計増城浚隍以立守備農戰交脩以待天時每鎮招集沿邉弓箭手二萬人人授良田百畆給與牛種雖無租賦實免供饋悉遵陜西㳂邉故事仍以湖北州縣之在江北者𨽻蘄陽二曰大江之南控制呉蜀夙有屯兵㨿其險阻之地今盍建為五帥由鎮江而上至于建康九江江夏公安各以二萬人為屯附以属城供其芻糗列置烽燧増益樓船三曰選擇兵官教習諸路將兵禁軍土兵弓手此皆長久之計詔楊存中成閔李顯忠向子固方滋楊抗向汋王彦融强友諒相度聞奏御營宿衛使楊存中淮西制置使李顯忠主管淮西安撫司公事方滋淮南轉運判官兼淮西提刑强友諒向汋言廬州地勢難守四經殘破舒州地勢襟帶居諸郡之中乞移淮西帥司就舒州知州兼領廬州管下合肥慎縣舒城盡歸舒州將見今廬州作為合肥縣陞為軍使兼知縣令建康府駐劄諸軍差統領官一員充沿淮都巡檢使将官兵千人馬二百扵合肥屯戌毎嵗或半年一易聼本路帥司節制和州屢經殘破民不安業東西闗險阻古來控扼之所今若移和州扵西關移含山縣扵東關相去三四里和州欲改作歴陽軍使兼知縣差将副各一員將本部官兵扵城内屯駐光州濠州安豐軍今欲移倂附山為險濠州入横澗山安豐軍入暗澗光州欲改為光山縣移入太蘇山𨽻安豐軍所移州軍候今秋農隙及諸軍休息稍蘇修築所有居民使之遷徙仍附山裏外撥田永為己業官給錢買牛具種糧沿淮中渡霍邱花靨夀春及見今光濠並改作堡毎堡差將官一員充知寨將帶兵二百馬三十令江池建康駐劄諸軍均差並聼合肥屯駐統領官同節制淮西所管縣並差武臣充尉令帥憲司將諸軍今來减損將佐員數先次差填營屯田見今採訪候見的實别具聞奏弓箭手縁人方復業若便行召募切恐民間憚扵従軍不肯歸業今來新移州郡分撥民户田土權免租税不三年間開耕就緖合行輸税其間少壮之人願免税充弓箭手者聼自陳老弱之人充税户公私兩便尚慮修城築堡及與民户收買牛具所費浩瀚兼所移易州縣其間官吏不無憚扵改更土著之家亦必重扵遷徙更乞朝廷付有司詳定給事中金安節等言奉聖旨楊存中等探訪到淮南西路利害幷李顯忠已見令侍從臺諫㸔詳竊詳朝廷初意大要有三一曰㨿形勢要害以禦㓂二曰酌道里逺近以便民三曰减官吏浮費以足用今存中等所申三者舉無一得今所甚急莫若以戌兵為首屯田次之脩城堡以控要害又次之盖州郡無兵則不可為守百姓無兵則不敢安業只如廬州之合肥和州之濡須皆昔人控扼孔道魏眀帝云先帝東置合肥南守襄陽西固祁山賊來輙破扵三城之下葢地有所必争也而孫權築濡須塢魏軍累攻不克守将如甘寧等常能以寡制衆盖形勢之地攻守百倍豈有昔人得之可以成功而今日有之反棄不問欲望朝廷扵沿江量遣将校及兵一二萬人早為經畫分戌二州使壁壘相望足為沿淮一帶聲勢以絶窺伺然後廣開屯田使兵民得以雜耕脩築東西闗之險以備固守自餘就募弓箭手之属然後以次施行無不可者况聞濡須巢湖之水上接店歩係廬州界下抵江口可通漕運則一州之戌其與就食沿江初無少異而舒巻之間成效相逺欲乞朝廷參酌施行於是存中議遂格日歴止載手詔指揮今以金安節奏議附入楊存中等所上利害亦不得其月日皆牽連而書之詔以浙西江東常平米二萬石賜兩淮常平司凡人户之歸業者悉賑給之仍具數申省興州前軍同統領惠逄復河州先是四川宣撫使呉璘命逄襲取熙河逄間道出臨洮蕃兵統領權知洮州李進同知洮州趙阿令結鈐轄榮某皆㑹至㑹通關掩擊之獲其關使成俊諸將議進兵咸曰我擣河州而賊兵單弱以强制弱何憂不克一將曰不可吾聞金軍盡在熙官軍若直擣河勢必來援吾表裏受敵此危道也不若引兵而西伺其險路敵将忿兵伺其不意可一戰擒也熙兵若破則河軍自下衆曰善即伏兵閭家峡其日正月丙戌也而金将温特赫者提正軍千五百從軍亦如之徑至峽口以邀官軍惠逄令羸卒數十騎誘之約曰旗動乃發金兵薄羸騎傍徨旗動伏兵大奮㑹大風起人馬不辨李進引兵駐傍山上若聞空中聲云蕃兵亂蕃兵亂進令左右下山用平射弩旁射敵大亂鈐轄榮某乗駿馬揮鐵鞭殺敵所向風靡衆從之敵遂大敗潰去追騎至托子橋橋以截木為之久故将敗有一将自殿後立橋右瞪目直視追者曰㑹来此决死追騎乃不敢逼敵餘衆渡已乃乗馬徐去後獲金兵問之即温特赫也是役也俘金二百有五人騎二百此以貟興宗西陲筆畧費士戣蜀口用兵録参修但筆畧稱擒活兵三百五十人乃與士戣所録不同盖士戣據案牘故也逄進薄河州蕃落指揮劉全李寳魏進紏集州民執其同知中靖大夫郭琪以降州民皆以香花踵道迎官軍有流涕者獨寕河寨官為金堅守民排户裂其尸攜其首以獻諸将既得城方編籍府庫人人炫功不相能或言當暫賞軍逄命人支錢十餘時食物貴踴炊餅一直數十錢諸兵得賜擲地大詬曰我等捐軀下河州今姓命之賤乃不直一炊餠也俄傳金兵大至衆欲控城固守逄曰彼衆我寡河又初附未易守也有如城中翻覆外援不至将奈何即擕衆欲出州民父老咸障馬曰鈐轄第坐府中我曹出力血戰必有當也何患兵少逄諭衆曰我今去此求援兵扵外非直此去也汝曹一心努力守城耳即令儒林郎吕某權州事與博軍願留者數十百人因出屯㑹通關李進乗馬過市呼曰河州父老有識李進者乎初不挾一縷以入今不挾一錢以出即馳去軍士怨恵逄賞薄有道亡者辛丑張浚入見詔諸路州軍欲助軍興者毋得輙科於民若上户自欲獻助者具以名聞即議推賞司農少卿都絜罷以殿中侍御史呉芾劾其盗用糴米錢及與市易官夏惇囊橐為姦故也川陜宣諭使虞允文言諸軍進發除給降錢外如闕支遣欲乞預期約度申取朝廷指揮就近扵四川總領司那撥錢物應副却将四川合起綱運内撥還又言新復州縣闕官去處乞許與諸軍大将公共選差又乞置司興元及借奉使印皆從之壬寅虞允文入辭淮西制置使李顯忠及其子建康府駐劄御前前軍副將師雄左軍副將師㢘閤門祗候師閔前軍凖備將師文同見于内殿詔並賜金帶是日金人犯汝州先以精騎渡汝河守将王宣率親兵迎戰自己至酉天大雨金大敗遁去癸卯上發建康府宿東陽鎮是日興州前軍同統領惠逄遣兵復積石軍執同知軍宣武将軍髙偉又攻来羗城亦克之時金人復取寜河寨盡屠其民寨之戌兵皆潰金合兵萬餘圍河州城中百姓計曰前日之民南歸者金盡屠膾我脱效之即一寕河也豈有全理不如告諭城中父老相與死守猶有千一得活即籍定户口男子升城女子供饋郡有木浮圗髙數百尺衆因撤木為碾械敵悉力來攻木縋少選壓賊有糜潰者居三日賊退屯白塔寺甲辰上次下蜀鎮乙巳上次丹陽館御營宿衞使楊存中權鎮江府都統制劉銳辭還夜雷丙午上登舟宿丹陽縣丁未次吕城鎮太尉威武軍節度使提舉萬夀觀劉錡薨于臨安府錡既奉祠寓居都亭驛上聞其疾劇勅國醫診視時金之聘使将至留守湯思退除館以待之遣黄衣卒諭錡移居别試院錡疑汜掃已且有後命比下車糞壤堆積遂發怒嘔血數升夜三皷薨詔贈開府儀同三司例外賜其家銀帛三百匹兩後諡武穆戊申上次常州荆溪館敷文閣待制致仕孫覿入見直秘閣添差兩浙轉運副使龔濤自江隂来朝己酉上次無錫縣左朝奉郎提舉江州太平興國宫巫伋入見是日王宣與金人再戰于汝州至暮各分散殺傷大當翼旦金騎全師来攻我軍敗衂士卒死者百餘亡将官三人庚戌御舟至平江府泊盤門外守臣徽猷閣直學士洪遵右通直郎知呉縣徐樞右宣敎郎知長洲縣陳忠厚以次入見詔長洲去嵗被水民田欠租六千餘石皆蠲之辛亥上次平望起復閤門祗候權江州駐劄御前中軍統領王徳政為閤門宣賛舎人先是徳政部王友直等至行在上召對故有是命德政引對在正月癸巳壬子上次秀州左武大夫吉州刺史侍衛馬軍司中軍統制趙撙為永州防禦使賞蔡州之㨗也是日鄂州統制官王宣自汝州班師時金人圍急属有詔班師宣遂棄其城而去癸丑上次崇德縣甲寅次臨平鎮乙夘上次臨安府留守湯思退率文臣京官武臣保義郎已上常服黑帶奉迎于餘杭門外御舟泊北郭税亭上陞御幄領殿前都指揮使職事趙密入見上乗馬還大内川陜宣諭使虞允文言舊法買馬分川秦兩司今已復秦州乞令四川總領官特暫兼權提舉秦司買馬監牧公事従之是日興元都統制姚仲圍德順軍先是仲以歩軍六千四百為四陣趨鞏州其下欲急攻仲不聽且退治攻具既至城下梯砲與城不相等圍之三日夜不能克乃舎之時鞏之父老各輦米麵以餉軍軍門山積及引去父老狼狽相顧謂金今覺我餉南軍我無類矣不如作計求活也即殺官軍後兵輦重者數級幷焚饋物而去仲退守甘谷城留統制官米剛等駐鞏州以觀敵勢遂引兵之德順太府少卿總領四川財賦王之望言契勘蜀中用兵一百六十餘日賊守散關益堅吴璘使姚仲攻之不能破正月初姚仲領兵三萬餘人出秦亭取鞏州不下二月初退守甘谷城王彦之衆分屯商虢陜華三州虢華為賊所取賊去復得之陜州見亦與賊相持事未可保近吴璘遣兵復河州聞見謀德順熙州未知如何惟本所供饋日廣不容少闕其為勞費不言可知目下且爾枝梧若更不增科敷蜀人易動難安不敢輕擾且保固根本以為永圖之望於去年十二月申尚書省乞依向來體例截撥諸司錢物未獲回降諸將前䝉朝廷劄下務與本所協和湏索必經由宣司各皆遵禀本所得以自立逺方䝉被惠澤至深至厚吴宣撫自十二月中下旬後所苦漸平繼聞金主被弑人情安定陜西新復州軍行用錢引甚為通快價直不損諸軍率皆願請不復多求銀絹極為公私之利所有劄下措置事並未増添田契稅錢更一季可見數目自此人户推割稅賦各有歸著尤為催科之利時論者頗以括白契為不便故之望及之之望此劄不得其月日但以所稱用兵一百六十餘日考之當在二月以後又稱見謀德順故因圍徳順附書之圍德順在十八日乙夘亦相近也丙辰金人犯蔡州侍衞馬軍司中軍統制趙撙擊却之初金既敗歸撙益修守備京湖制置使吴拱進屯南陽遣後軍統制成臯華旺㨗勝軍統制張成各以所部兵来援合撙及踏白軍統制焦元所部纔六千人而已金將裴滿以數萬冦城下距城西北一里依汝河為營其日庚戍也翌日分兵半攻城半掠糧草凡三遣人以書至城下撙命射之持書者曰此奉書來與趙提舉商量軍事撙終不納諸將曰敵人以書來未知其意姑接之何害撙曰不可若觀之非徒無益必致士卒之疑適中其計前一日金乗昏黒填壕扵南門外十三處寂然不聞其聲質眀方覺之焦元中流矢遂下城金人乗勢登城啟南門而入撙在城西方聞南壁失利即下城集諸軍占地勢以待華旺成臯焦元欲奪東門出奔守門統領官劉安不聽將官李進聞南門被攻急乃率弩手二十餘人赴之持刀登城中三矢而死撙率士卒巷戰日轉午勝負未分効用王建募死士十一人截其甲裳登城殺敵至申刻相持不動馬軍司第十八將王世顯請募敢死士得四十人登城接戰殺其二将金人囂潰皆自擲而下官軍奮擊死者不可計㑹金帥登南門望官軍旌旗不亂曰今日城又不可得復下城而去撙大呼曰番人走矣軍士皆歡呼金人遂敗爭門而出不得出者聚毬場中有千餘人諸軍圍之勦殺皆盡撙命積金人之屍為京觀撙苦戰僅十旬軍不過六千人大戰之後軍吏言戰歿者已四百餘人負創者三千七百人可戰者僅二千人而已金人既敗猶能整頓行伍扵西原分八頭每一頭以兩旗引去以示有餘官軍望之皆不言而咨嘆戊午金再攻城以大車截薪欲火西門趙撙伏壮士甕城俟其至開關突擊之金人棄車而遁己未上始御後殿行宫留守湯思退敷文閣待制知臨安府趙子潚敷文閣待制楊偰樞密都承旨徐嚞權吏部侍郎汪應辰權禮部侍郎黄中權兵部侍郎陳俊卿權工部侍郎許尹起居郎唐文若等相繼入見以上視師嚞等皆留行宫供職故也觀文殿大學士醴泉觀使兼侍讀湯思退知紹興府集英殿修撰知紹興府宋棐充敷文閣待制提舉江州太平興國宫從所請也庚申中侍大夫榮州刺史淮西制置使司參議官劉光輔添差福建路馬歩軍副總管殿中侍御史吳芾論光輔擅權妄作恐致生事故罷是夜有星墜於蔡州金人之營未明金人退兵一舎辛酉監察御史黄瑀爲江南東路提㸃刑獄公事右正言劉度入對言今者視師囬鑾願止取親臨行陣折馘執俘有軍功者方得推恩外一切常典所宜謹惜以革僥倖之門翌日進呈上曰朕嘗諭度朕此行不濫與一人官爵及濫减一年磨勘卿等所共見也壬戍詔已降指揮軍士戰死者祿其家一年即傷重而死扵柵中者給其家减半濠州言倉庫並無見在詔賜激賞庫錢二萬緡為官兵之費晁公遡撰鮮于壙墓誌云紹興三十一年張忠獻公起守建康君適在長沙率與偕行女真方大入君請佐濠将守道逄濠人謂之曰金已入吾疆若何往往能免乎我為爾守爾盍従我歸皆従之入見濠将曰濠有横澗山可守濠有糧二十餘萬石可付壮者七斗弱者五老者三負以行扵是夀春之屯花靨者亦賴以濟君率濠之民正什伍立賞格以守忠獻公曰君信可用也按此時濠州積糧米未必有許數公遡所云或非其實姑附此當考詔楊存中多出文榜於兩淮諸處不以是何軍分逃亡之人並與免罪别作一項招收專充御前使喚既而言者以為恐隳軍政且聚逋逃之卒為御前之軍殆非佳名望止令扵元舊軍分自陳仍限兩月其主兵官不加撫循致使士卒逃亡亦乞重寘典憲如此則諸軍被國家寛大之恩不違祖宗立法之意小人知懼紀律可行矣從之四月己夘臣僚奏駁鄂州左軍副統制王宣自汝州以二百騎還至唐州時蔡州圍急京西制置使吴拱遣歩騎萬三千人往援之統領官游臯等至確山留不進拱乃以宣權中軍統制節制沿邉軍馬趣救蔡州是日雪甲子武功大夫榮州刺史帶御噐械李綽為入内内侍省押班乙丑武功大夫吉州刺史劉光時知鼎州以川陜宣諭使虞允文言其出自將門深曉邉機故也尋詔光時復忠州團練使光時復遥團日歴不書但扵三月庚子以是官見當考是日鄂州駐劄御前中軍權統制王宣敗金人于蔡州確山縣前一日宣以所部距確山三十五里而營質眀候騎報敵至確山衆欲不戰宣不可乃捨其歩士引騎兵三千先行分為三陣敵冲陣心宣令諸軍以背刀冲奪三陣俱進秉義郎右軍副將汲靖有勇力宣召之靖請百騎宣與騎二百靖上馬據鞍髙呼曰今日汲靖為陛下破此賊賊若不破誓不生還左右聞之人百其勇宣曰汲靖事濟矣靖馳入敵陣奮擊賊衆披靡靖出入者三惟亡二騎諸軍亦勇進金人遂遁宣整衆不追方金之未敗也招討使吴拱以趙撙孤軍不可留屢以蠟書趣回軍撙以敵圍方急若棄城而去賊兵追擊勢必敗亡况蔡州軍食有餘拱怒以蠟書付諸将令一面班師㑹敵兵敗還撙乃與諸將夜出蔡之居人皆從之天氣昏黒堕坑谷而死者甚衆扵是撙自信陽歸徳安而宣亦還屯襄陽府趙甡之遺史確山之㨗在二月二十六日甲子趙撙去蔡州在二十七日乙丑而趙成京西戰功録云二十六日到鄒溝下寨去確山三十五里二十七日早戰于確山今從之丙寅瘞欽宗重扵招賢寺立虞主上親遣奠執政議上宜服袍履權禮部侍郎黄中言曰三年天下之通喪堯舜之所共也後世以日易月已有愧于古矣然猶扵二十七日釋服之後因事則服之庶幾反正本朝典故大𦵏啓攅必服其初服是也若曰今十月而𦵏不可復服則真宗九月而𦵏何為亦服其初服乎以故事考之衰服為當前二日左僕射陳康伯等進呈上覧奏曰朕為人子豈可使事兄之禮過於事父中至都堂右僕射朱倬謂中曰徽考大行有故事矣中曰此前日之誤今所當改奈何復因之倬因謂上意實然臣子務為恭順可也中曰責難於君乃為恭耳此以㑹要日歴及中行状参修是日金人復取蔡州是月為姚興立祠于和州名旌忠興元都統制姚仲遣副將趙詮王寜引兵往攻鎮戎軍金聞官軍至闔其城收其吊橋擐甲引滿堅壁固守詮等引兵斷其貫繩諸軍畢登盡發平射神臂弓射其敵樓更遣重兵分擊敵勢不支主簿趙士持自言本皇族與同知任誘先開門出降獲其知軍振戈將軍韓珏偽定逺大將軍同知渭州秦弼聞王師下鎮戎遂托疾不受金命與其子進義校尉嵩及其孥来歸宣撫司以弼知鎮戎軍建炎以來繫年要録巻一百九十七建炎以來繫年要録巻一百九十七金人地名考證温特赫原書作温廸㾗誤今改正
