body:
  text: 建炎以來繫年要録卷一百一宋李心傳撰紹興六年五月戊辰朔輔臣進呈殿中侍御史石公揆論六部不任責法可遵稟者乃申之朝廷事當勘當者又推之於司上曰六部長二侍從髙選自當一面裁處豈有不能決斷一部事而一旦為執政便能決斷天下事耶趙鼎奏近時卿監以上補外職名髙下不一故事如侍郎在職未及二年止得帶制今一例除雜學士太優欲令兩省討論上曰卿等便可商量立為定制亦免有好惡厚薄之嫌乃命兩省官同吏部長二討論申尚書省是月庚辰降旨徽猷閣直學士胡世將試尚書兵部侍郎世將自江西召還乃有是命左中大夫富直柔充資政殿學士提舉臨安府洞霄宫湖南制置大使呂頥浩乞本路州縣已注未上官盡八月不至者許奏辟一次又請催廣西運所糴賑濟米皆許之先是去嵗旱傷湖南尤甚頥浩既入境即奏截撥上供米三萬石及令廣西帥漕兩司備五萬石水運至本路以充賑濟又乞降助教敕度僧牒誘上户糴米民不能耕則借之糧種夏稅亦俟秋成並輸全活甚衆廣西米事先見正月丁亥己巳保靜軍承宣使提舉萬夀觀髙世則為感德軍節度使充觀使亦用宣仁遺恩也庚午武功大夫忠州刺史行營中護軍右軍統領劉紹先知隨州武功大夫忠州刺史閣門宣贊舍人江南東路宣撫使司統領軍馬楊伯孫知郢州按此又是以張俊偏禆屬嶽飛未知有無將帶所部之任當考詔行在諸倉監官任滿受納不擾及無欠折與減三年磨勘此與梁辨元奏相關辛未祕書少監吳表臣言親民之官莫重縣令除授之際理宜措置臣竊思之將悉由堂除乎則天下之大縣令之衆必欲人人自廟堂選授勢有所不可行欲望下諸路監司相度取邑大而事劇如平江之常熟秀之華亭婺之東陽溫之平陽之類素號難治者每路指定三五處並從朝廷擇有風力自來作邑有聲者三年為任其赴官之初優其禮數依通判例借與服色或特許陛對任滿日委有異政或除貼職或賜章服或遷官或再任或不次拔擢隨其治狀髙下而寵褒之其不任職者罰亦稱是如此則能吏得盡其才而事必舉民必安庶幾仰副陛下惻怛之意事下吏部其後遂以常熟山隂等為四十大邑四十大邑具十二月辛酉吏部侍郎兼侍講劉大中言祖宗用人內外一體或自州縣入居臺閣或由侍從出典藩方因其所長厯試以事故於緩急之際多有可用之才近世以來廉耻道喪既得患失無復難進易退之規為人擇官寖成內重外輕之弊與監司郡守者謂之外小人挂白簡丹書者方補外任非惟待士也賤蓋亦視民為輕臣近求對經筵亦嘗進説及此伏蒙聖諭深以為然臣因奏曰陛下若革此風請自臣始儻不以臣為不肖試以一郡俾之自效庶幾稍全臣子進退之節少革內外輕重之弊不許癸酉上謂大臣曰宫中有金酒器五百餘兩俟他時有功將帥至當舉以賜之日近却令造得少許漆器大抵物要適用何必觀美趙鼎曰仁宗皇帝用紅漆唾盂黃紬衾兩府入對內殿宫人嫌臥衾舊敝遽取新易之亦黃紬也上曰今則紬亦自難得朕所服用皆黃素羅衾褥自祖宗以來如此折彥質曰此正陛下之家法也給事中兼侍講資善堂翊善朱震兼權直學士院左通議大夫新知鄂州荆湖北路安撫使王庶復顯謨閣待制賜銀帛二百匹兩庶既老愈通習天下事前二日入對首言今日之患莫大於士氣之委靡願振拔名節士起其氣又論安危在修已治亂在立政成敗在用人上韙其言庶因請曰臣肝膽未盡吐也願賜臣間得時縷數于前上乃燕見之庶言益深嘗跪而問曰陛下欲保江南無所復事如曰紹復大業都荆為可荆州左吳右蜀利盡南海前臨江漢可出三川涉大河以圖中原曹操所以畏關侯者也上大異之此以庶附傳及朝公遡所作庶傳參修公遡稱庶請間天子數燕見之日歷今年五月四日辛未王庶引見上殿十五日壬午王庶朝辭上殿是前後止再對也或是又嘗內引而不書于記注亦未可知今且云燕見之去數宇更俟詳考詔自今臣僚未經上殿者令三省審察訖關閣門引對復舊典也隴右郡王趙懷恩為恩州觀察使懷恩建炎初自橫行封王不帶職至是因其請而命之和靖處士尹焞辭崇政殿説書新命詔不許令涪州加禮敦遣疾速赴行在户部侍郎王俁請災傷路分拖欠及侵用紹興四年已前上供米並折斛錢物並權行倚閣俟豐熟日帶發上以旱故蠲諸路錢帛租稅今年三月辛未辛次膺時為倉部郎官建言諸路積年拖欠上供米斛難于催理無從出辦而俁謂無除放米斛眀文故申眀焉次膺今年四月己未遷吏部甲戍户部言右武郎同知閣門事潘永思增給飱錢不應格法上曰若于法不可亦無如何趙鼎曰知閣門官唯永思與韓恕二人恕已係橫行遙防故所得差厚永思官小每月止得俸錢四十餘千所以用度不足上曰永思輩端坐得此亦足矣今日戚里官皆不過小使臣方此國家艱難之時且留爵祿以賞戰士鼎等皆稱道聖德再三武議大夫帶御器械韓世良自楚州以淮陽之俘入獻詔遷一官乙亥詔除見任知州已上及嘗任侍從官依舊堂除宫觀外餘並令吏部按格擬差時言者論艱難以來士或不調陛下憫其失職授以祠觀有六等宫觀之格五項嶽廟之法但其間有昔已叨竊名祿之人論其家則豐羡而乃更與失職寒士均享家食徒使州郡之間用度不支欲乞今後陳乞宫觀之人除貧之廉潔朝廷所知者其餘一切按格與之或察其人富而貪敢於格法之外輒有干求者懲戒一二故有是命詔廣西經略使胡舜陟與雍州守臣同提舉買馬劉逺措置市戰馬時都督行府言去嵗所市馬弱不堪用於是提舉官李預再貶秩而更以其事付帥臣先是右朝請郎李棫為提舉官遣效用談昂入大理國招馬至是八年去秋大理國王假和譽遣清平官以馬五百及馴象隨昂入獻至儂內州預欲却之言于朝乃命舜陟更切相度如無它意即措置收買仍密為隄備毋致引惹生事會預代去舜陟亦以聞且請還馬直却馴象賜敕書即雍州勞遣其使皆從之李預以是月庚寅申到舜陟以六月庚子申到今牽聮書之命沿海制置副使馬擴閲習水軍戰艦時右司諌王縉言舟師實吳越之長技將帥之選既慎矣而舟船數百多閣海岸士卒逾萬未聞訓習欲乞眀詔將帥相視舟船損漏者修之士卒疲弱者汰之船不必多取可乘以戰鬭人不必衆取可資以勝敵分部教習周而復始出入風濤如履平地則長技可施威聲逺震折衝千里之外矣疏奏從之詔侍讀學士班翰林學士之下恩數依學士例丙子工部尚書李彌大復為徽猷閣待制提舉江州太平觀彌大自廣西召歸奏辭新命且言五蒙除召旋致煩言乞改授在外宫觀故有是命詔劉摰特贈太師以摰曾孫登仕郎芮言係籍元祐宰相六人蒙追賁之寵各己位登公師惟摰獨未盡被恩典故也右朝請大夫胡紡知楚州仍令奏事訖之任戊寅詔四川監司應有違戾事件並令四川制置大使席益按劾聞奏其監司見兼宣司職事者並罷右承議郎趙戩為廣南西路轉運判官戩瞻孫已見今年四月殿中侍御史石公揆言州縣勸誘鬻爵不問貧富一例科配勸誘不行亦不申稟與元詔一切相反乞申戒詔都督行府嚴切約束乙卯寶文閣學士新知襄陽府劉洪道兼京西南路經略安撫使寶文閣直學士提舉江州太平觀連南夫升寶文閣學士知廣州時廣東寇未平帥臣曾開引疾乞奉祠故有是命中書門下省檢正諸房公事張宗元兼都督行府咨議軍事徽猷閣待制兩浙轉運使李逮升徽猷閣直學士尚書户部貟外郎主管都督行府財用提領市易務張澄直顯謨閣為兩浙轉運副使兼管淮南漕運兼權行府主管機宜文字他職如故皆用張浚奏也時淮南不置漕臣西路宣撫司錢糧以江東轉運使向子諲應副而東路宣撫司軍儲多自浙西樁辦故就用澄焉熊克小歷云時駐蹕之所計司已劇而淮南漕職亦令澄兼領蓋不考江浙餽運夲末也又詔兩浙江東監司州縣悉心體國應行府措置調發事務毋得少有住滯仍令户部侍郎劉寧止常切催督劾其違者以聞又詔在庚寅今並書之起復祕閣修撰京東淮東宣撫處置使司參謀官陳桷充右文殿修撰又旬日升兼都督行府隨軍轉運副使桷升運副在是月庚寅武翼郎添差溫州兵馬鈐轄趙子彥特遷武翼大夫以璩授官故也太常諡故將作監丞耿傳曰忠憲傳康定間通判慶州死西事贈諌議大夫至是其曽孫左司郎中自求有請乃命定諡焉庚辰直祕閣主管台州崇道觀孫佑升直徽猷閣知虔州見任人韓昭與宫觀理作自陳時虔冦久未平故起佑為守量移人滕膺許自便膺坐李允文纍除名編置至是始釋之辛巳初令吏部初官選人用四年闕以在部積壓者多故也壬午資政殿大學士知平江府張守提舉臨安府洞霄宫守引疾乞奉祠故有是命賜川陜宣撫副使吳玠四川户部錢十萬緡為隨軍激賞之費中書門下省言刑寺凡有疑案第行問難遂致淹延乞依元豐舊制應所議不同限次日稟白刑部若所斷未定則刑部長二限兩日率法寺官赴堂稟決施行從之右朝散大夫知興國軍應繪添差荆湖北路轉運判官繪未上而卒右承事郎知夔州巫山縣王之才通判黔州之才庶仲子也在巫山時户部符貧乏者上其名得不賦即日盡疏其名上之貧乏者因不亡去王彥軍多羣盜及鎮荆州束于法不快有潰去掠峽歸二州而南者府中皇惑未知計所出之才已集保伍得五百人會天大雨徑以舟趨夷平先奪其險待之掠者至不得出險且見晝揚兵夜篝火於傍而鼓之若大軍至衆恟恟怖而降既測兵少悔欲為變則盡執以歸府戮百餘人投尸於江荆州軍見之懼不敢復叛彥歎服癸未殿中侍御史周祕言昨見淮南州軍相繼乞展放稅限朝廷皆從其請聞淮南州縣皆有收撮課子之例夏則撮麥謂之義麥冬則撮穀又有所謂助軍米者又有所謂借牛租者名色不一于百姓所收之物往往取至四五分重斂如此而乃以愛惜民力為言公然欺罔朝廷使百姓虛被放免之惠如此則淮南之民何時而盡歸蓋稅賦則所取者少收撮則所取者多稅賦則所取者有限收撮則所取者無時今誠欲信朝廷寬恤之令發州縣官吏之姦寬百姓輸納之力則收撮課子所當嚴禁昨雖已有旨收撮牛租不得過兩石然既已許之收撮則安能限以石數欲乞將淮南田除請佃依己立定課子輸納屯田合官私中外分其餘並不得依前輸納課子如舊例牛租之類亦令一切禁止或敢違戾並許百姓越訴官吏重置於法如州郡財計不足令監司守臣別行措置詔提舉司體究改正訖申尚書省甲申權户部侍郎王俁言車駕駐蹕浙右東南商賈繁盛兼物價倍貴比之昔日不同乞今後諸路酒稅務監官任滿未立到新額去處並且以紹興三年數為則比較推賞如當年數少于舊租額即自舊租額此較不惟稍革僥冒又使用心催趂課利從之乙酉資政殿大學士提舉臨安府洞霄宫秦檜充觀文殿學士知溫州龍圗閣學士知溫州章誼知平江府詔糴本交子並依逐年所降關子已得指揮其官吏並罷初用張澄議置交子務於行在今年二月甲辰而未有所樁見錢於是言者極論其害以為四川交子行之幾二百年公私兩利不聞有異議者豈非官有樁垜之錢執交子而來者欲錢得錢無可疑者歟今行在建務之初印造三十萬令𣙜貨務樁發見錢矣續降指揮印造和糴本錢交子兩浙江東西一百五十萬而未聞樁撥此錢何以示信于人乎竊見前年和糴用見錢關子已而赴𣙜貨務請錢者以分數支民間行使亦以分數論去年和糴關子一百三十萬先令𣙜貨務樁足見緡日具數申省部民間行使亦依見緡用然則可信者固在此不在彼也欲乞應印造交子先令庫務樁垜見錢行使之日齎至請錢者不以多少即時給付則民無疑心而行之可久矣其或樁錢而不足已樁而别用或行于民間而不許之納官庫或行於諸路而不許之充上供或官司出納並令行使至于月給官兵將以百十一二用有不便焉是為一節有礙則商旅貿遷井邑交易之際必有不行者矣重立法禁恐不能勝暗增物價其弊不一有如官告度牒且猶有偽數寸之紙其無姦偽乎貨財不通獄訟繁興當自兹始矣立法創制貴于謀始伏望詳酌利害更詔大臣熟議之詔户部勘當三月癸巳又言昨見朝廷令𣙜貨務樁見錢二十萬貫措置見錢關子許淮南江東路行使其後有司措置寖失夲意因改為交子欲廣行用除初造見錢關子一十五萬貫已係都督行府借撥户帖錢樁充本錢外後來所造廣南福建等六路交子三十萬兩浙路交子一十萬臨安府界小交子一十萬並見造江南兩浙預充糴本交子一百五十萬其合用錢本並未見樁管由是逺近士民議論紛然皆以為不便臣聞天下事有利必有害茍所利者大則雖有小害在所不恤也若祇利害相半而事或出於不得已則亦不暇恤也至於所害者大而所利者小則其事有不得不恤者今之論交子者其利有二其害有四一則饋糧實邉減般輦之費二則循環出入錢少而用多此交子之利也一則市有二價百物增貴二則詐偽多有獄訟益繁三則人得交子不可零細而用或變轉則又慮無人為售四則錢與物漸重民間必多收藏交子盡歸官中則又慮難于支遣此交子之害也所謂害者固已在于目前而所謂循環之利者亦恐未可必得何以知之交子出數既多則人必知官中之無本商賈縱或收買豈肯停留私家必須即時請換見錢雖有樁垜數目必不能給既不能給則交子之法大壞今有司措置皆用四川法臣亦嘗詢究四川始末頃因陜西借為糴本或官不收引其法幾至大壞後雖朝廷遣官措置猶用新引一道收換民間舊引四道自是之後不出泛料幾三十年而錢引之法乃始復行比年以來又緣應副軍須出數復多目下雖粗通行而議者亦頗憂其法壞也况今東南利害與四川全異欲不樁本錢而多出交子則其不可行也必矣自古軍興之際未有不以財用之絀為患者茍出數寸之紙可足一時之用則古之人亦何惜不特出數百萬以濟其闕而乃區區講求理財之術也今若行交子而使百物倍貴萬一如軍兵所請或言養贍不足則又將何以給之欲望聖慈博採衆言付大臣熟議或以其置造已成必欲行之即乞止用數十萬道聼客人於沿邉入中斛斗或納錢兊便令持關子赴行在請換見錢或茶鹽引及香藥雜物之類庶幾便商賈省漕運不失朝廷置關子之本意又言錢引之法若必行之兩浙等路有不便者五今錢引之出于行商尚可而無益于軍民之用於道路之齎尚可而無資于旦暮之需今行商與軍民孰多朝夕之需與道路之齎孰急此不便一也雖曰交子與錢並用今一交子不過千錢軍民之須日用飯食持一交子以適市止有數百之用用之不盡將棄之乎將為數百之用乎此不便二也物重財輕其日久矣今又益之以此乘時射利者必髙其物價此不便三也富室豐家典賣之際故輕其引必欲見緡既得見緡深藏不出交子空行于市井而物不得售此不便四也異時盜鑄銷鎔皆出東南之民今數寸之紙能保其姦詐不為乎此不便五也四月辛丑降出工部侍即趙霈時為諌官亦言其弊有五法行之初人必疑慮蓋不行使則起爭端若有減落則違法禁鋪户緣此必致停閉一也市井交易必立私約用見錢則價直必平用交子則價直必倍二也今以片紙用為千錢細民得之反以為纍片紙不可以分裂千錢不可以散用三也積日纍月物重財輕緡錢藏于私家官庫愈見匱乏四也官私既許通行民間豈無詐偽雖嚴為偽造之禁孰能懲冒法之人五也四月丙午刑部尚書胡交修時為翰林學士亦上疏力陳其害以為崇寧大錢覆轍可鑒方大臣建議舉朝無敢非者法行未幾錢分兩等市有二價姦民盜鑄死徒相屬終莫能勝今之交子較之大錢無銅炭之費無鼓鑄之勞一夫日造數十百紙鬼神莫能窺焉真偽莫辨轉手相付旋以偽劵抵罪禍及無辜久之見錢盡歸藏鏹之家商賈不行細民艱食必無束手待盡之理比及悔悟恐無及矣江西制置大使李綱亦遺執政書言其不可行繇是遂復為關子焉六月乙卯再降旨左朝奉大夫直龍圖閣趙去疾通判辰州右宣教即閻大鈞通判靖州二人皆李橫京西參佐故録之丙戌張浚奏建康府畫到行宫寢殿制度簡省可以副陛下崇儉之意乞降下本府依此修蓋從之時浚乞上幸建康故有是請六月甲寅不行詔以平江府陳滿塘地賜韓世忠以世忠歸所賜南園而請佃塘地也右司諫王縉請令浙西漕司拘收應干裏外官司舟船以備漕運從之先是以官舟少而漕運多乃令沿流州縣均之民户期限迫促催舟之費既倍而裝發交卸倉斗邀乞折欠監錮尚多有之朝廷聞之因出度牒即上户市舟又刷百司舟船應副而蘇常諸郡科差如故故縉有是請焉浙路漕臣亦請于華亭置場嵗造百二十舟以浙西諸州分認錢數及憲司二分頭子錢與抽解木植供其費至是就緒浙漕建請日歷不載此以今年五月二十四日浙西提刑朱締所奏增入所謂前任漕臣乃王俁李謨吳革而縉亦其一也丁亥樞密院檢詳諸房文字范直方自行府入見上召對於內殿右承事郎王之道知開州之道初見建炎元年十一月庚寅少保寧武寧國節度使淮南西路兼太平州宣撫使劉光世為保靜寧武寧國軍節度使賞劉龍城之捷也時光世遣參謀官直祕閣新知袁州汪召嗣來獻捷乃詔本司副統制王師晟進橫行遙郡二秩召嗣進秩一等偽統制官華知剛等皆釋罪付光世軍中使喚其餘第賞有差師晟轉官在是月壬辰召嗣進職知剛放罪在癸巳後旬日擢召嗣江南西路提點刑獄公事言者論其過乃止後光世言知剛等三人未有使喚乃命送福建諸州廩給之毋令失所八月甲辰降旨直徽猷閣知鼎州張觷以捕斬山賊雷進之勞進職一等而荆湖北路提點刑獄公事趙伯牛亦進一官辛卯輔臣進呈時事上方以愆雨為念謂趙鼎曰昨夜甚有雲氣朕焚香密禱過二更雲氣散方敢退鼎曰陛下憂勤如此天必垂祐給事中兼侍講兼資善堂翊善兼權直學士院朱震為翰林學士兼侍讀仍兼翊善蔡州進士謝克念特補右迪功郎用朱震請也震言臣切謂孔子之道傳曾子曾子傳子思子思傳孟子孟子之後無傳焉至于本朝西洛程皓程頥傳其道於千有餘嵗之後學者負笈摳衣親承其教散之四方或隱或見莫能盡紀其髙弟曰謝良佐曰楊時曰遊酢時晚遇靖康建炎之間致位通顯諸子世祿酢仕至監察御史出典州郡亦有二子仕宦獨良佐終于監竹木務名在黨籍著于石刻終身不遇雖以朝奉郎致仕奏補一子克己入官後克己逄巨賊于德安府舉家被害一子度嶺入閩死于瘴癘一子克念今存流落台州貧窶一身朝夕不給竊見黨籍諸人及上書得罪身後無人食祿者陛下皆寵之以官良佐之賢親傳道學舉世莫及又遭禁錮而死諸子衰替最為不幸伏望許依黨人及上書人例特官其子克念使奉良佐之祀以昭陛下尊德樂道之實故有是命成忠郎李沇上皇宋大典三卷詔進沇一官其書付祕書省沇髙祖文易嘗為國子博士故有是書既而沇乞換文資言者以為不可乃止是夜金星犯畢翌日上諭大臣曰占法邉有敗兵當諭張浚令諸將戒飭守邉者天既有象要須修人事以應之已而趙鼎言遍問日官皆言自有所臨分野上曰畢主趙地然既言邉有敗兵則我亦不得不戒也鼎奏語在癸巳壬辰祕書郎蕭振為監察御史時趙鼎薦人為察官上批除振定江昭慶軍節度使開府儀同三司江南東路宣撫使張俊加崇信奉寧軍節度使進屯盱眙右僕射張浚命依山築城左僕射趙鼎歎曰德逺誤矣是雖不為資敵之具然當念勞人也是役也興於盛夏自下運土而上者皆有日課望青採斫數十里間竹木皆盡斸掘新舊冢莫知其數人甚苦之城成無水可守亦無樵採築城之際偽齊遣三百騎於泗州境上臨淮佇觀久之而去癸巳司農少卿周葵直祕閣知信州葵既去御史以親年髙不得迎養為言乞補外上命趙鼎召至都堂諭旨留之葵力求去乃有是命左朝請大夫主管台州崇道觀髙儼行祕書郎儼召對勸上聽言納諌直寶文閣知婺州周綱進職二等右奉議郎知撫州劉子翼除直祕閣並俟終更日令再任以中書言綱等治郡有方賑濟宣力故也紹興八年四月五日臣寮上言劉子翼守撫州專意聚斂以奉所知竭倉庫所儲獻之督府欲圖召用不為後人之計既而遷職再任軍糧不繼幾至生變又復詭計求脫遂得持節一路此事當考故集英殿修撰知拱州錢歸善賜諡恭愍歸善靖康末守拱州死於難刑部奏大理寺丞評斷議刑名每嵗於次年正月取會差失刑名比較死罪二人或流徒六人具名上都省取旨責罰失出者二名當一名丞比評事增三分之一謂死罪三人流徒八人已上執議不同建白者罪著為令敕令所奏諸州以公使酒饋送出夲州界者以違制論以公使見錢金帛珍寶遺人凖盜論知而受之坐贓論以言者請立法也甲午殿中侍御史周祕言今虔賊未能殄滅而閩賊遁於廣南出沒海上窺伺間隙此尤可憂望嚴飭閩廣二帥早為銷弭討治之策勿使滋蔓時海冦鄭慶冦廣州扶胥鎮為東南第十一將官兵所掩遂絶洋趨南恩州詔江西制置大使李綱廣東經略使連南夫福建安撫使張致逺疾速措置綱謂虔寇巢穴多在江西福建廣南三路界首置立寨柵為三窟之計一處有兵則散往他處官軍既退則又復團聚中間遣發軍馬不能窮討止以節制不一之故若節制歸一使不能散逸且捕且招威令既行則窮冦别無他策必須自歸然後結以恩信使之改過自新將為賊首徒黨桀黠之人盡赴軍前使喚以除後患此最䇿之上者乞於江西路置都統制一貟節制三路軍馬以招捕虔賊至于盜賊衰息之後又須縣令得人勞心撫字使作過桀黠之人既去良民得以復業安于田畝乃可以化盜區復為樂土然虔之諸縣多是煙瘴之地盜賊出沒不常朝廷初無賞格士大夫之有材者多不肯就又難強之使行欲望優立賞格將來辟置知縣到任半年盜賊消除良民復業選人特與改官京朝官與轉行一官候任滿日各再轉一官其賊平定之後量與蠲免租稅已前欠負並免催科庶幾官吏盡心民庶安業復有承平之象疏奏皆從之此並據綱行狀日歷未見詔自今鉟鎔錢寶及私以䃋銅製造器物及買賣興販之人一兩以上並徒二年本罪重者自從重償錢三百千許人告鄰保失察鑄造者償錢二百千州縣官奉行滅裂仰監司體訪按劾以聞令尚書省榜諭始用王俁奏也俁奏在去年十二月江東轉運使向子諲言本路上供嵗入不敷綱運留滯乞于嵗終比較一路州軍勤惰優劣各一兩處保舉按劾以聞庶幾期月之間事可見功民不告病從之乙未殿中侍御史周祕試侍御史仍賜五品服先是祕言臣聞太祖皇帝嘗欲以絹二百萬匹盡市敵人之首偉哉聖謨是所以威制外國而創立萬世之基也仰惟陛下神武睿略同乎祖宗比將肆伐于北方而糧餉之資有所未備故于常賦之外薄取于民會其所得蓋不啻二百萬縑矣然臣以為恢復之圗不能一日而必成糧餉之資不可一日而不備今經常之費既已不足則官司借兊之類恐不能免目前之用粗已有餘則非泛賞賜之類恐不能無官司借兊數雖未失也然他日撥還恐難指擬非泛支用數雖不多也然積日纍月恐至侵耗若不于此稍加靳惜臣恐師未及舉而二百萬縑之直無幾矣夫聚人者必以財理財者必以義所謂義者知取豫之宜而已知取之難則其豫之也必慎謂取之易則其豫之也必輕今當百姓凋瘵之餘諸路旱歉之後半嵗之間屢有科斂朝廷之取于民者必曰將使百姓暫勞而永寧也百姓之輸於官者亦必曰繼此無復橫斂也今若以難得之財而費之於無事之時則他日遣發大兵激賞戰士一或有闕復從何出欲望聖慈密詔大臣將近所取户帖官告等錢盡令都督府樁管無令有司輒有侵耗庶幾糧餉預備不悮恢復之大計詔密付都督行府祕奏以丙申行下監察御史梁辨守尚書工部貟外郎將作監丞趙渙守監察御史尚書祠部貟外郎都督府主管機宜文字楊晨移禮部尚書工部員外郎都督府主管機宜文字熊彥詩移祠部左從政郎黃鍰特改左宣教郎以范沖薦對也尋除諸王宫大小學教授除日在七月辛巳降授左朝奉大夫淮西宣撫司參議官郗漸兼都督行府隨軍轉運判官丙申詔諸州縣禁囚監司每季親慮不能遍及者聼差官即檢察不盡致誤嵗終賞罰者徒一年著為令以言者請立法也是月太常博士李弼直卒少卿何慤言其嘗主張元祐學術坐廢十餘年詔賜其家銀百兩建炎以來繫年要録卷一百一
