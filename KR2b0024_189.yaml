body:
  text: 建炎以來繫年要録卷一百八十九宋李心傳撰紹興三十有一年三月甲戌朔詔起復左武大夫興州刺史殿前司破敵軍統制陳敏以所部千六百人往太平州駐劄尋改𨽻馬軍司此據四月二十四日都省所奏附見未見降㫖改撥之日當考權吏部侍郎凌景夏言故相以愛憎進退天下之士或挾私立致通顯名器溷亂豈非害治之大者仁宗朝范仲淹常為百官圖以獻指其遷進遲速次序曰如是而可以為公可以為私亦不可不察近紹興初常命宋棐編修差除格目自宰執達於寺監丞簿其書斷自元豐以後願倣此意申敕攸司重加編輯命二三大臣遵守格目凡遷進淹速必稽其次序使纍朝典故舉行於今日事下吏部後下行己卯右諫議大夫何溥為翰林學士兼權吏部尚書仍兼侍講先是溥常言君子小人和同比周之弊有曰同近於和而和實非同比近於周而周終不比世人之假同以為和託比以為周求濟其一己之私而卒貽天下之患臣願辨之於其早制之於其微使同與比之迹不形而和與周之實常著則朝廷正而百官正矣又言軍政之弊曰為將帥者不治兵而治財刻剝之政行而拊摩之恩絶市井之習成而訓練之法壞二十年間被堅執鋭之士化為行商坐賈者不知其幾嵗課月計利歸私門壟斷自如百姓失業甚者死亡不補虛數日增沿流尋源所宜痛革又言為備於無事之時擇才於自代之舉置總帥以護諸將則勢同臂指募民兵以捍兩淮則可固藩籬皆當今急務上察其忠乃有是命監察御史陳之茂為尚書吏部貟外郎祕書丞兼權吏部郎官杜莘老守監察御史詔太傅同安郡王楊存中朝朔望大理寺丞姚邵為京西路轉運判官徽猷閣直學士提舉江州太平興國宮洪遵知平江府先是命浙西馬步軍副總管李寶屯平江以防海道而守臣朱翌議多矛盾朝廷以寶嘗為遵所薦故改用之詔録勳臣魏仁浦馬知節余靖寇瑊張述諸孫各一人用郊赦也仁浦故相知莭執政靖瑊從官述職方貟外郎以嘗請立皇嗣故庚辰尚書禮部貟外郎兼國史院編修官洪邁為樞密院檢詳諸房文字左中奉大夫王普行尚書禮部郎中潭州觀察使利州西路駐劄御前中軍都統制兼知成州吳珙移知襄陽府依舊中軍都統制拱遙領利西統制蓋以携西兵之鎮故也召武功大夫榮州刺史知襄陽府劉澤赴行在左朝請郎提舉兩浙西路常平茶鹽公事洪適移江南東路避親嫌也辛巳左朝奉郎知嚴州樊光逺為兩浙東路提㸃刑獄公事右朝散大夫知真州徐康提舉兩浙西路常平茶鹽公事壬午兵部尚書兼權翰林學士兼侍讀楊椿參知政事詔秦檜妻冲真先生王氏改贈希妙先生起居舍人兼權中書舍人虞允文言王氏以先生祔于檜之廟而為之配不合禮經乞歸先生之告于有司仍舊秦魏國夫人舊號於禮為稱從之王氏復封在此月丁亥今併附此左宣教郎趙公廙知平江府長洲縣用洪邁為尚書郎時應詔所舉也詔故直祕閣林季仲故祠部貟外郎李巖老並特與恩澤一資季仲復職未盡巖老居母喪而卒權吏部尚書何溥為之請特録之敷文閣待制提舉江州太平興國宫李琳卒癸未宜州觀察使提舉建昌軍仙都觀王升卒丁亥給事中黃祖舜言身後恤典朝廷所以褒贈功臣使之沒有餘榮也契勘故相秦檜當政擅作威福不知有上殘陷忠良為國斂怨其子熺實與謀議及其亡也陛下保全其家俾熺休致而歸不置之罪恩亦至矣今乃贈以帝傅之秩又與之遺表恩寵命橫加殊駭物聽詔前降指揮更不施行敷文閣待制提舉江州太平興國宫陳正同知太平州右武大夫忠州刺史知郢州馬羽罷以京西諸司言其不法也戊子右迪功郎莫沇為紹興府嵊縣令沇歸安人大理少卿孫敏修應詔所舉也庚寅尚書右僕射同中書門下平章事陳康伯遷左僕射參知政事朱倬守右僕射並同中書門下平章事侍御史汪徹言近有㫖政事並用祖宗舊制然循襲既久有司失於講求往往有未厭人心者姑以遷授恩數六事明之六等檢校官舊制也今則皆無有而自節度徑除太尉歷開府儀同三司以至少保矣節度以移鎮為恩寵舊制也今則一定而不易矣承宣分大中小鎮觀察分小大州舊制也今則皆徑作一官矣橫行自右武大夫以至通侍為十三等以待年勞及泛恩者非有功效顯著不帶遙郡舊制也今則自右武大夫遷官者率於遙郡改轉才五遷即至遙郡承宣使一落階官遂為正任承宣使矣武功大夫實歷七年用七舉主始轉橫行舊制也今或自小使臣為閣門宣贊舍人才轉一官徑至右武郎矣總管鈐轄都監分六等差遣非正任觀察使及管軍不以為總管舊制也今降此而得之者紛紛皆是至有法當入第六等如武翼郎或宣贊舍人而除者矣臣謂賞爵所以厲世磨鈍使人欲之不可必企之不可及是以祖宗規模宏逺董正有序名器之重不可假人昨自權臣用事動出己意幸門一開錯雜並進浸淫于今可為太息望詔三省樞密院將此六事參酌典章務存大體立定綱目貴于遵守不必曲徇人情以趨捷徑庶可以鑒成憲行故事仰副陛下規恢之意詔中書門下後省看詳申尚書省翰林學士兼權吏部尚書兼侍講何溥進兼侍讀權尚書禮部侍郎金安莭兼侍講辛卯武義大夫金鼐為閣門宣贊舍人鼐湖州人初見紹興十七年十一月起居舍人兼權中書舍人虞允文言閣門貼職祖宗所以奬勵邊功未嘗妄豫按鼐以財雄東南因納粟授官交結故相秦檜以看閣子為名使専任南畝出納之責纍官正使人所不齒今一旦授以上閣之秩人言籍籍臣以為決非陛下本意上覽奏謂輔臣曰朕初不知曲折當如所請以戒後來僥幸之門或曰鼐嘗造海舟以獻王繼先其直萬緡舟中百物皆具是除繼先所薦也此為王繼先得罪事實故左朝奉大夫致仕李光追復左中大夫官其子二人先是其妻縉雲郡夫人管氏言光遷謫嶺海首尾十八年二子喪亡二子流竄田園屋宇盡皆籍沒骨肉流散身後二子三孫俱白丁祖宗以來執政官得罪未有如光被禍之酷者宰相陳康伯進呈故有是命詔鋪兵擅開竊看傳録文字並依建炎指揮從軍法建炎二年十一月其闕額以廂軍填補月給錢米皆增之壬辰左朝請郎主管台州崇道觀陳夔知徽州左從事郎監行在省倉上界史正志充樞密院編修官正志江都人也甲午户部奏左藏西庫見錢不多所有月支券食等錢欲以銀㑹品搭諸司百官以十分為率六分折銀四分㑹子軍五分折銀三分見緡二分㑹子從之武功大夫忠州刺史淮南東路馬步軍副總管宋肇主管建昌軍仙都觀初户部奏以官田授揀汰使臣事下兩省臺諫事祖見正月戊寅既而給事中黃祖舜中書舍人虞允文臺諫杜莘老梁仲敏等言臨安一府揀汰使臣軍員凡一千六百八十有八人嵗用料錢等九萬一千餘緡紬絹布綿二萬五千八百餘匹米二萬八千餘石而本府屬邑除昌化鹽官富陽無係官田外其餘六邑止有田一千一百七十四畝有竒是一兵之田未及一畝若如議者所陳紐其衣糧請給計其價而給其田則所贍養者不過數十人其坐而仰衣糧者尚千餘人也不特事體不一又勞逸不均矣謂宜下有司將賣不盡係官田及户絶寺觀無主田并僧道無主田盡行拘收又將日後沒官田嵗行抄籍以待兵田之數相當而後施行庶無不足不均之患丁酉詔吏兵部長二參酌措置後不行日歷就載臺諫給舍議狀于此日而臺諫止有殿中杜莘老司諫梁仲敏二人按此時汪徹為侍御陳俊卿為殿中仲敏為監察王淮為正言今年四月淮丁憂六月一日俊卿出臺六月六日莘老遷殿院七月一日徹自中司出使意當在七月以後是時西掖乃楊邦弼虞允文二人九月邦弼致仕允文獨員今邦弼不繫銜或又是九月已後所上也己亥言者乞令大臣省親細務詔左右司措置申尚書省庚子故朝散郎充徽猷閣待制張宇發特贈左朝請大夫宇發靖康初從陳過庭使北死雲中之佛寺至是其家有請故也初左朝請郎提舉江南東路常平茶鹽公事洪適入對論役法事曰臣竊見元祐指揮合役坐間人户不及三畨處令雇募蘇軾謂聖恩欲使百姓空間六年是以紹興二十六年之㫖歇役六年者與白腳同行之數年下户得以寬佚間者宣州守臣有請欲不候六年再差上户有司誤以歇役六年之文衝改下户畏避多致流徙蓋上户稅錢有與下户相去十百倍者必俟差遍下户則富家經隔數十年方再執役臣守徽州以婺源一縣言之有差及一貫稅錢者民間哀訴誠為可念乞仍行二十六年指揮庶使細民鼓舞德澤又如一都之內上等五户稅錢各五十千中等五户稅錢各三十千各曽應役若以歇役六年再差恐中等五户僥幸終免乞自第一户差至第十户然後再差所貴役法均平上下稱便詔户部看詳至是户部言在法差募保正長通選物力最髙人充應二年替無可選者於得替人內輪差乞申明行下從之夏四月按是月發卯朔甲辰詔潭州觀察使利州西路駐劄御前中軍都統制新知襄陽府吳拱以西兵三千人戍襄陽朝廷聞金人決欲敗盟乃令兩淮諸將各畫界分使自為守措置民社增壁積糧是時御前諸軍都統制吳璘戍武興姚仲戍興元王彥戍漢隂李道戍荆南田師中戍鄂渚戚方戍九江李顯忠戍池陽王權戍建康劉錡戍鎮江壁壘相望而襄陽獨未有備故命拱以所部戍之其闕額令吳璘招填限一季吳拱移屯日歷全不載王之望申省劄子云四月二日指揮甲辰初二日也先是總領四川財賦王之望聞有邊隙乃自益昌運糧十萬石至武興及拱移軍遂以歸舟二百七十餘艘載其軍兼家而下軍過合州守臣右朝散大夫宇文師申以私錢餉之軍士皆喜師申粹中子也按此則拱之軍蓋自嘉陵順流入大江自峽州或荆南之襄陽也拱衛大夫忠州團練使劉貴提舉雍州左右江兵馬賊盜公事兼提舉訓練峒丁右朝奉郎何休知化州還言廣西轉運司自𣙜鹽之後利入頓虧遂令諸郡變稅折錢如化州額管稅米八千石嵗用萬五千石漕司嵗於本州科六千五百石赴容州送納每石折錢二千六百而令本州和糴萬石支價錢四百仍就稅户均糴民間甚以為患乞於廣州𣙜鹽數內撥一半赴漕司充嵗計令逐州之稅各隨本州送納户部奏乞坐法約束行下從之既而左朝奉郎知廉州程逖召還亦言廉州丁米偏重每丁有輸八㪷六升者而漕司又以丁口嵗敷二分食鹽十餘萬斤民力益困願減丁米三千石而以賣鹽錢糴米償之事下户部尋以逖為大理寺丞休上奏在甲辰逖留中在己酉今併書之乙巳言者論州郡之學其間無進取之路故士之去就甚輕所養無素乞權罷太學補試而於諸州養士每百人中選其行藝之精者嵗貢兩三人入太學庶幾所得皆素養之士且非一日之長而士之在郡學者皆以實能為尚學校不期而自重矣事下國子監已而國子監言自罷舍法復以科舉取士奉行日久難議施行事遂止中侍大夫武當軍承宣使知夔州李師顔言歸州去䕫州最近去荆南最逺乞以歸州仍𨽻本路所有本州嵗起湖北路錢物依舊赴湖北漕司從之建炎四年宣撫處置司割歸州𨽻本路紹興五年還𨽻湖北丙午右朝奉郎郭淑通判蔣州右奉議郎知袁州萍鄉縣咼輔通判濠州並填復置闕丁未右朝奉郎通判楚州徐宗偃獻書于宰執曰竊聞使命往來覘邏窺度之言莫不以敵國遷都决定於春二月今四月矣其言未驗乃曰先至洛中看花或又謂星臺陳獻拘忌乞以今秋為期蓋詭詐叵測初無一定之論在彼者雖無一定之論而在我者當有一定之䇿以應之則事至而不擾今日之勢惟荆襄兩淮最為要害守之則長江可守棄之則江不能保利害灼然雖三尺童子皆能知之經理固不宜少緩誠使在我之䇿既定則彼之已遷未遷皆不足深慮矣庚戍集英殿修撰曽幾周綰並升敷文閣待制幾提舉洪州玉隆觀綰提舉江州太平興國宫初殿前司左翼軍駐漳州郡鬻官鹽以供其費其後此軍移泉而鬻之如故凡於村郭分十八場悉以民户編排為甲赴場市鹽定其等第限以斤兩深山窮谷之民無一免者人甚苦之至是侍御史汪徹乞委提刑司相度利害如所收錢非起發贍軍即與住罷從之左奉議郎知遂寧府何驥為潼川府路提㸃刑獄公事辛亥敷文閣待制知臨安府趙子潚奏府城摧倒者千八百餘丈乞支降錢二十七萬緡米七千石調三衙卒九百人分頭修築從之壬子忠訓郎韋圭為閣門祇候圭淵孫已見癸丑詔太傅醴泉觀使和義郡王楊存中許存留殿前司部曲五百人諸子子壻各進官二等以其奉祠故也右正言王淮以父憂免丁巳御批比來久雨有傷蠶麥及盜賊間發雖已措置未至詳盡可令侍從臺諫條具消弭災異之術防守盜賊之䇿各以己見實封聞奏時久雨故殿中侍御史陳俊卿上疏請之上謂宰執曰應天以實不以文可令侍從臺諫各具時政之闕有不便者即與改正宰臣陳康伯朱倬皆待罪上曰罪在朕躬豈可移過大臣翰林學士何溥言安邊之圖雖在擇將帥而立國之本要在得人心推原天人相與之際莫如自治之急俊卿又言詔下之日隂雲開霽至誠動天應如影響然當主憂之時敢不畢其愚慮今敵居汴京已逼吾境而武昌襄陽南各相去數百里宜擇威望重臣以兼制之使首尾相應又宜密遣人假以他職往來軍中以問諸將或令逐軍各使腹心將官赴朝廷令大臣與知兵者講說地形及先後緩急之宜又鄉兵亦宜給以衣糧器甲俾之樂從雖朝廷方守和議淮上未可屯兵而歷陽儀徵維揚城壁稍堅當隂為之備他日諸軍可以投足昔唐憲宗中興裴度曰此豈朝廷之力可制其命特處置得宜能服其心今日茍處置得宜彼知我有人焉或可以寢其謀矣權禮部侍郎金安莭言淫雨之咎竊意卿士之列郡邑之間有未能上體德意而感傷和氣致召災沴者如刑罰之失中賦役之不平貪夫侵蟊以傷民財暴吏肆虐以賊民命有一于此皆致災之由也在內令風憲之臣彈劾在外令廉察之官按發俾官曹肅清民有愜志則和氣可召而災害不生矣若乃安內攘外則古無上䇿時異事異其可施於今者蓋鮮焉何者敵國相持非和則戰其形已定則吾之籌畫亦専出一塗而無所牽制今名為修和而實相窺伺則為今之謀要使規模不失和好之形而實有備豫之䇿而後國勢可立也故臣之愚慮其䇿有三一曰厲將帥二曰擇地形三曰明覘候自一二年來沿江上下列屯作鎮其意以備江北也人情狃于無事必不能夙戒素辦如與敵對壘者萬一出吾不意疾驅渡淮而我軍方整部伍理器仗備屝屨非一月不能首塗則敵人已奄至江上矣臣謂今日諸將必使之選兵夙戒常若寇至然後緩急可用也軍之所處得地者勝乘險以守則衝犯者不得利據要以守則侵越者不敢過今頓兵江北雖有地利不得預據也而可以預加相視且如盱眙之距京口其路當衝要者凡幾所地稱扼塞者凡幾處除當險要之外旁岐支徑可以分攻越鈔以達江之南岸者凡幾道此雖聖智如黃帝湯武者不能意度而數揣也必須躬歷身到詢人訪古而後可知今不預備也必將有警而後推鋒越江倉皇之間何嚮而險要可據何屯而攻鈔可禦浪進泛行與客軍之逺涉者無異則吾何名夙戒預備也臣愚欲乞令沿江列屯各以對江地步令主帥自擇將校量選壕寨使沿屯過江逐一詢訪土人相視地勢其有所得隨行具圖著録歸視其軍則不惟躬親按行者可知他時軍行其視圖籍者亦得以知之矣今江北之無兵無城者以為和也而方儲兵江南以為有事之備若敵有變動覺知能早則猶可以半淮漢以相角若覘者不精逮其侵軼入境而方出師與爭則淮漢之地危不可保矣古者募客刺讎受募往刺者有必刺之道焉而世未嘗以前人嘗死而不敢往者賞重于死故也今使之覘敵雖有冒死之理而未必至於死也而率難其人者賞之厚不足酬其死故雖金人之存亡汴都之來否尚不得其真則吾何以逆探未然而預為備禦之計也臣謂覘者不得其人則雖儲兵聚糧朝謀夕算而他時必有遲不及事之悔故臣願沿邊諸州沿邊諸軍皆稍厚假之財寬其出入或稍優設官賞誘使歆慕候得事實為期而不屑屑以規矩繩之不曰覘無不的要之十得六七則將視病施藥亦必不繆矣此三者皆防守之大計也而以將帥為先者蓋將帥得人則擇地覘敵當自能之有不煩帷幄之慮者矣竊聞朝廷已命諸將擁衆分屯事不遙制馭將之術固已得之然推轂授任人得自専權均勢侔莫相統一聲援不接或失事機臣願精選重臣有威望者俾往視師盡護諸將庶幾深謀逺算亟得參决戰勝守固克成厥勳實外攘之策不可不務者也若夫備禦不虞內固根本則願密詔諸路帥憲及諸郡守二各嚴保甲之制聨比其民使察非常庶幾姦民不得伺隙窺發州郡禁卒自守二而下將舊格合給人從痛行減損追還營屯敢有違法差使者重置之法仍汰去老弱専委兵官中有材武習軍旅者訓練之課其尤者而加賞勸焉根本既安而朝廷無內顧之虞得以専意外攘疆場之事何患不濟詔天申莭宰執使相所進金酒器並特免户部奏乞糴本詔以天申節進奉銀十萬兩凑與之監察御史梁仲敏行右司諫保義郎梁舜弼漢弼並為閣門祗候二人邦彥養孫也用遺表恩澤特與之給事中黃祖舜權中書舍人虞允文言閣門之職祖宗以來不以恩澤遷補今授之無名遂寢其命戊午太常寺言明堂大禮當用牛羊豕乞下浙路漕司收買前九十日入滌從之明堂正配及太廟十一室皆用一太牢明堂從祀十五位共八少牢别廟一少牢配享功臣七祀共一少牢皆有副己未命尚書右僕射朱倬提舉三朝國史倬以祖諱辭詔去修字太府少卿總領四川財賦王之望乞嵗終以諸路州軍額起折估糴本錢虧盈為知通殿最仍以一年實起到庫錢數為準各具其尤者十州來上俟終更乞差遣日斟酌施行詔諸路依此行之是嵗四川所入增錢三百八十五萬緡現租額增二百六十萬緡之望乃言嵗額無虧上其最增者十州于朝乞籍記而已宋史全文上曰朕思州縣逋缺若民果貧困自合蠲放若已輸納而官吏侵用則亦不可不與核實明示罪責治道貴信賞必罰漫不經理則是姑息姑息雖堯舜不能治是日遂進呈四川總領王之望催驅殿最事目上曰依所乞并令諸路亦如此施行辛酉復升揚州髙郵縣為軍以淮南轉運副使楊抗言其户口最盛且接連湖濼猥通豪右非增重事權無以彈壓故也因命右通直郎知縣事呂令問就知髙郵軍仍賜經制錢二萬緡常平米三千石為復軍之費入內東頭供奉官徐甲為武義大夫帶御器械甲子權户部侍郎錢端禮言淮浙諸場積鹽不售乞立限一月許客鋪入納每五袋加饒一袋不納鈔引及通貨等錢從之丁卯殿前司言破敵軍改𨽻馬軍司本軍有闕額竊見南劒吉筠建州邵武建昌軍多有遊手之人乞差將官各一員前去同守臣均定招收共一千六百人赴本司招填從之辛未同知樞密院事周麟之為大金奉表起居稱賀使賀金主遷都也初朝廷聞金主欲移居于汴且屯兵宿亳間議遣大臣奉使宰執共議遣參知政事楊椿行其所議者如大金皇帝祗欲到洛陽觀花則不須屯兵于邊若果欲遷都于汴屯兵于宿亳則本國亦不免屯兵于淮上非敢故渝盟約蓋為國之道不得不然或欲巡幸汴即還燕京則本國亦無一人一騎渡淮麟之聞其議乃見上慷慨請行上大喜此並據趙甡之遺史本文麟之請自擇副且薦洪州觀察使知閣門事蘇曄可用許之曄尋卒乃命武翼大夫貴州刺史知閣門事張棆假保信軍節度使代行命掄在五月丙戍左承議郎魏把行太府寺主簿用錢端禮薦也壬申直顯謨閣知荆南府續觱乞量行招填禁軍詔本府今嵗上供銀錢絹絲米並權減半以為招軍之費是月金主亮率文武羣臣如汝洛至北邙山因改其山曰太平建炎以來繫年要録卷一百八十九
