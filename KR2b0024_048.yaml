body:
  text: 建炎以來繫年要録巻四十八宋李心傳撰紹興元年冬十月甲子朔龍圖閣待制知臨安府孫覿提舉江州太平觀以集英殿修撰新知温州席益代之覿不為吕頥浩秦檜所喜故引疾而有是命責授單州團練副使宋㬇復朝請大夫㬇庠曽孫庠安陸人呈祐中宰相蔡攸妻弟也靖康初以徽猷閣待制為江淮發運副使坐累責永州至是復官奉祠而言者以為罪戾昭著乃罷予祠之命乙丑詔曰黨錮之論自古病之本朝自章惇蔡京首建元祐之黨至崇寧宣和間委任一相則天下人材不歸蔡京則歸王黼之門矣恭聞太上内禪之日已自悔為姦臣䝉蔽乃屬其大臣令輔淵聖盡用司馬光政事逮朕嗣位以來遵用太上玉音追復元祐臣僚官職又録用其子孫亦欲破朋黨之論也方今國削而廹殊乏賢能幹蠱之士與共圖治而於推擇除授之際尚以蔡京王黼門人為嫌似未通變自今應京黼門人寔有材能者公舉而器使之庶幾人人自竭以濟艱難之運時吕頥浩為政喜用材吏以其多出京黼之門恐為言者所指乃白上下此詔焉参知政事李回不為吕頥浩所喜力丐免罷為資政殿學士江西安撫大使兼知洪州囬罷政日歴不載㑹要罷免門亦無之皆不可曉熊克載於九月甲寅按日歴十月二日乙丑回與執政同加恩尚帶参知政事銜四日丁夘方書回辭免江西新命克甚誤也况朱勝非尚在江西未罷回何由便除洪州樓鑰拜罷録繫於乙丑日盖得其的今從之給事中洪擬試吏部尚書尚書右司員外郎趙子畫試太常少卿降授朝奉大夫權江東安撫大使司参議官姚舜明考功員外郎仇悆為左右司貟外郎朝散郎主管江州太平觀潘良貴為考功員外郎朝奉郎主管臨安府洞霄宮樓炤為兵部貟外郎昭永康人秦檜所薦也太常少卿蘇遲樞宻院檢詳諸房文字歐陽懋請補外皆命為徽猷閣待制出守懋初見建炎元年言者以其非舊典爭之乃並改集英殿修撰遲知處州懋知婺州二人改命在是月丁丑右武大夫榮州團練使江南東路馬歩軍副總管巨師古為神武後軍統制丙寅降觀文殿學士宣奉大夫江西安撫大使新知洪州兼淮南宣撫使朱勝非為中大夫分司南京江州居住時侍御史沈與求論勝非避事辭難且言馬進䧟九江由勝非赴鎮太緩故貶勝非以寄禄官分務不帶卿監官中書失之也勝非家傳云勝非嘗論鎮撫使處置乖方之狀又謂安撫大使名甚重而寔不及一小邑上皆是之而當軸者不樂諷言者指其逗遛之罪責官居住按呂頥浩初秉政與勝非無嫌又勝非所論乃范宗尹時事頥浩胡為不樂之今不取詔自今諸郡守臣改移及罪罷者並不俟新官先次罷任令轉運司選以次亷幹官權行主管其帥臣則令監司權攝以言者奏罪罷之人無所顧藉肆為不法故也直顯謨閣江東轉運副使王琮直秘閣福建轉運使朱宗並罷張邦昌之僭位也二人自庶官擢為侍從至是用言者奏而斥之初命福建制置使辛企宗移屯福州八月壬午而企宗留南劔州不進吕頥浩聞之是日下堂劄詰責企宗仍令斟量賊勢如不能措置即具以聞當别遣將㑹范汝為請屯福州就糧企宗懼得罪乃言初受命招捉盗賊已招捉過二十三萬餘人汝為元係謝嚮等統轄之人已令葉棠說諭赴軍前公参矣詔企宗係制置使毋得分彼此速往福州措置丁夘詔直秘閣李允文就大理寺賜死坐擁兵䟦扈擅權專殺也集英殿修撰知嚴州栁約權尚書户部侍郎詔朝請郎耿延禧復龍圖閣學士中書舍人程俱言京城之䧟咎由延禧父子專以和議阻天下勤王之兵二聖未還艱危未濟而乃起自廢放盡還舊職何以慰天下之公議詔延禧復徽猷閣待制提舉江州太平觀寳文閣直學士趙子櫟提舉萬夀觀責授汝州團練副使陳宥復昭宣使貴州防禦使提舉江州太平觀以赦叙也初方臘之亂令中奉大夫張宛提㸃兩浙刑獄挺身遁去詔貸死長流昌化軍至是已叙舊官復以明堂恩還直秘閣言者奏其罪命乃寢宛武進人也吏部言元祐黨籍及元符上書三等邪人渡江籍記各已散失欲令逐家子孫各録告𠡠干照自陳從之既而直秘閣黄䇿以蔡京所書黨碑及國子監所刋印黨籍上書人名來上詔付吏部戊辰詔寳文閣待制新知廣州林遹當苗劉之亂首請納禄可除龍圖閣直學士以寵其節日歴扵戊辰丁丑兩書之㑹要在十四日丁丑盖出誥之日今從初㫖己巳登州防禦使權主管殿前司公事郭仲荀復䕶國軍承宣使侍親軍歩軍都指揮使主管殿前司公事中奉大夫盧襄復為太中大夫襄始坐事偽庭貶至是盡復之詔陳嗇之補廸功郎嗇之未見是日浙西安撫大使司統制官王徳以黄榜招安水軍統制邵青既而降之初青自鎮江引舟師駐于崇明鎮朝廷遣徳徃招捕徳駐軍青龍鎮自率親兵徃崇明而為泥港所隔青先遣人鋪板布釘籖官軍不知争渡而過多死于泥中青遥語德曰太尉後隔潮水我若以數百人棹舟扼守津要則太尉糧食不通而自斃矣然豈可扼人於險太尉其速歸徳曰邵統制汝壯士盍歸朝廷乎青曰諾然軍中不能不犯朝廷之法太尉可乞降一黄榜應以前罪犯一切不問則與太尉同歸徳許之折箭為誓言於朝詔以青改過自新可依所乞日前罪犯特與赦免徳遣使持榜示青榜中有云官軍晝夜攻打青等城上乞降青見之大怒其妻謂青曰汝不記作賊繫獄我剪髪饋汝今既如此乃欲負朝廷耶時副統制從義郎單徳忠等皆欲受招惟統轄官閻在不欲後數日諸將晨謁青徳忠即擊殺在於坐謂衆曰敢有不歸朝廷者依此衆黙然青聞之揮涕而出曰單統制若欲得印當好相付胡為乃爾徳忠食塊自明然後勸青納兵以贖罪青從之徳忠即命倒旗鎗通欵狀遂受招安此據趙甡之遺史修入但甡之記持榜事于十月乙亥而日歴劉光世所奏狀乃云據邵青公文今月六日承樞宻院黄榜則其日乃己巳也或是初六日黄榜到而十二日閻在為單徳忠所殺遂定降計耳日歴九月丙辰降黄榜去己巳十四日甡之又云黄榜大槩言王德掩殺水賊邵青其勢困厄不欲廣殺乞降榜招降與史所載差不同今從日歴本語庚午户部尚書孟庾參知政事王明清揮麈後錄云孟富文為户部侍郎紹興辛亥之嵗邉遽少寧廟堂議乗隙削平諸路盗賊其方張者莫如范汝為乃以命韓世忠然病其難制或為州縣之害當選從官中有風力者一人置宣撫使世忠副之衆謂孟人物龎厚且嘗為韓所薦首遷本部尚書遣之又以為韓官已髙亦非尚書所能令乃欲以為同簽樞上意已定時洪成季為禮部尚書吕丞相以孟除與成季參預之命同進上留擬狀值連日假告而已傳播初沈必先為侍御史嘗擊去成季至是沈召還舊列成季亦復為宗伯以吕亟相初拜未欲論也至是聞將大用亟奏成季罷去上意謂二相初拜薦二執政其一已先擊去其一萬一又有議之者二相俱不安矣遂亟批出富文除参知政事盖誤當成季所擬官二相亦恐紛紛不復申前說然亦議定俟閩中使遷即罷之而㑹逄多事居位獨乆凡三年然後去國此尤謬誤按孟庾以今年九月自户部除江湖宣諭使未嘗兼閩中亦不除韓世忠是時辛企宗已在建寧朝廷又遣胡世將督捕十月二日洪擬始自瑣闥遷吏書後五日庾即除参政又兩日擬以沈與求論罷此時擬方丐外安得云上已留参政擬状數日也十一月五日庾除福建宣撫世忠副之其執政已彌月盖方滋誤記而明清又因之今不取禮部員外郎王居正乞補外不許先是侍御史沈與求之論范宗尹也其言頗及居正故居正請外上謂輔臣曰宗尹既去朕常諭止責萬格王俣二人餘不可因宗尹進退卿等在廟堂且為朕力破黨與上因謂吕頥浩曰劉光世與卿有故怨諸事略與應副頥浩具奏致怨本末因言臣䝉聖恩再使備位宰相軀命不足惜但觀近日事尤費力秦檜曰頥浩所謂費力者盖恐小人不恱事多掣肘耳上曰但問搢紳公論小人何足䘏熊克小歴以居正為太常少卿按居正明年二月方遷此時少常乃趙子畫也始與求再居言路或疑其論范宗尹所引用者悉出之與求曰近世人才以宰相出處為進退盖習以成風今當别人之邪正能否而公言之豈可謂一時所用皆不賢而使視宰相為進退哉建武軍節度使新知江州楊惟忠復為江西馬歩軍副都總管屯洪州武經大夫江西安撫大使司統制官劉紹先知江州兼沿江安撫使時朱勝非在江州紹先不之禮由是勝非恨之詔進納授官人毋得注令録後又詔毋得注親民及理法官初四川制置使張深利䕫路制置使王庶各以宣撫處置司之命檄所部監司並受節制知䕫州韓廸以其不便密聞於朝詔張浚相度仍命施黔義兵毋得調徃他路徽猷閣直學士湯東野為江淮等路發運使代權邦彦赴行在直龍圖閣知婺州傅崧卿試秘書少監起復宣義郎知溧水縣髙堯明叙宣教郎堯明俅子嘗為户部員外郎靖康初停廢至是遂為邑非舊制也保義郎漣水軍兵馬監押劉靖為閤門衹候江東安撫大使司言李捧華旺已就招詔㨂其兵𨽻諸將初張琪既遁捧等乃以所部就劉洪道招安尋以捧為武經大夫夀春府兵馬鈐轄旺為池州兵馬都監既而洪道言捧所部精銳可得萬人捧狀貌偉健且勇扵戰鬭雖語言鄙俚每合兵機又不矜能採用衆謀以得下情觀捧所長殆非庸將所及乃命神武前軍統制王􅊛以捧衆赴行在十一月戊申壬申吏部尚書洪擬罷為龍圖閣直學士知温州擬初除尚書而侍御史沈與求言其未嘗歴州縣乃命出守内侍楊公恕嘗為康邸都監又從上在河朔至是以舊㤙乞差遣三省欲與州都監上曰其人難使近民富直柔曰近一任鈞者至密院干差遣陛下知其為人否上曰鈞尤狠愎此曹稍不循理者不欲使之在左右遂已熊克小歴載此事於八月壬申盖誤詔行在置宗正一司以武翼大夫越州兵馬鈐轄趙仲蒸權行主管時内外宗司分寓廣潮泉三郡上以行在宗子無統屬之人故有是命敦武郎韓世良為閤門宣賛舍人世良世忠兄也中奉大夫新知梅州魏彦純為中書門下省都㸃檢文字彦純彦明兄初自省吏出職至是呂頥浩復用之甲戍尚書吏部員外郎廖剛守起居舍人剛在吏部時嘗言臣前所獻幸閩之説姑備一時之急爾國家艱難亦已云極今乃圖新之時故經營建康殆不可緩嵗晚固所未暇俟有機㑹可乗當親擁六師徃為固守之計彼敵雖黠詎能妄意吾之虛寔而輙窺也哉且東南建國無異金陵臣聞劉豫在齊魏間省徭薄賦招徠人士誘以偽官安知不圖吾根本地乎宜出其不意而徙居焉亦先事制人之道也及為舍人又言陛下㳺意翰墨博覧羣書亦可謂之好學然帝王之學與文士異因援孟子所言天下之本在身與大學之道治國平天下其端在正心誠意願去末學之無益坐進此道則可以復羣生矣秘閣修撰孫近為尚書户部郎中近武進人也直秘閣秦梓知台州乙亥起復明州觀察使陜西諸路都統制秦鳯路經略使吴玠及金人戰于和尚原大敗之初金陜西都統羅索死完顔宗弼遂㑹諸道及女真兵合數萬人謀入界宣撫處置使張浚命玠先據鳯翔之和尚原以待之宗弼造浮梁於寳雞縣渡渭攻原玠及其弟秦鳯兵馬都鈐轄璘率統制官雷仲等選勁弓強弩與戰分畨迭射號駐隊矢接發不絶且繁密如雨敵稍却則以竒兵邀擊㫁其糧道凡三日是夜大破之俘馘首領及甲兵以萬計宗弼中流矢二僅以身免得其麾盖自入中原其敗衂未嘗如此也於是浚承制以玠為鎮西軍節度使璘康州團練使涇原路馬歩軍副總管是役也玠所部全軍轉五萬官資而朝請郎通判鳯翔府兼經略司主管機宜文字陳逺猷亦遷左朝散大夫直秘閣秉義郎閤門宣賛舍人王喜遷左武大夫威州刺史宣撫司統領軍馬喜蒲城人靖康初金人破京師陜右大震喜聚壯士十八人不旬日附者甚衆喜為立保伍法於常樂鎮營建寨柵號王萬年王庶為節制使奉授成忠郎已乃率所部歸玠玠用為秦州兵馬鈐轄改知同州至是以竒功遂驟進始宗弼既趨江浙乃自淮南入陜西是行也及韓世忠戰於大江劉錫戰于富平吳玠戰于和尚原凡三戰而兩勝盖世忠與錫失利至是宗弼為玠所敗始自河東還燕山左副元帥宗維留宗弼在軍中更以陜西副統薩里罕為陜西經略使將兵屯鳯翔府與玠相持王之望西事記曰吴玠以一軍見據和尚原金人屢攻之不克大破金人殺其大帥人多疑其不實夫吴玠之勝四太子之敗固未可知然金若不敗則今無四川矣按和尚原之㨗蜀頼以全張匯所進莭要亦備言之非無實也張浚行状云尼瑪哈在陜西病篤召諸大帥謂曰吾自入中國來未嘗有敢嬰吾鋒者獨張樞宻與我抗我在猶不能取爾曹宜悉此意務自保而已烏珠出而怒曰是謂我不能耶尼瑪哈死即合兵來攻按諸書此時尼瑪哈在雲中寔羅索死行狀誤也方玠之起師也檄河南鎮撫司統制官董先董震自商虢出師為牽制之策先引兵而出道遇金人數百徇洛上敗之遣使詣宣撫司伐其功欲得河東陜西經制使印且求餉其軍浚以問利䕫路制置使王庶庶請使之攻敵以示信茍不聽吾絶之有詞先與敵戰則俱弊其來歸我易與也使人告先曰餽餉逺不可致輦金帛徃矣誠能破女真宣撫司無所愛先信服庶身出秦川殺傷敵相當其兵耗失多無何天大雪先等乏絶歸取償於金州守將王彦訴其状庶遣二禆將行金州揚言興元兵至先遁去此以晁公遡所作王庶傳及日歴中董震奏狀参修庶傳以為庶使人言先攻敵而震奏以為准吴玠公文今兩存之庶不失實降授朝議大夫宋伯友復集英殿修撰伯友靖康末知鄭州坐失守得罪至是始復之權吏部員外郎李元裕自湖南督上供綱泛海還行在是日至福州大金灣為盗所殺此據紹興三年三月二十二日元裕母吕氏自訴狀増入状云十月十二日在大金灣乙亥十二日也故附於此戊寅定江昭慶軍節度使神武右軍都統制江淮招討使張俊以凱還除太尉移屯婺州武徳大夫閤門宣賛舍人江東安撫大使司統制官王進知池州代神武後軍統制王􅊛赴行在時進統所部在池陽故就用之詔樞密院先因童貫陳請過指揮更不施行如有可行事件令本院参酌取㫖初命兩浙安撫大使劉光世宣撫淮南七州至是光世請鑄淮東宣撫使印置官屬給錢糧増將吏時已賜揚楚等諸郡錢各二萬緡乃命鑄真揚通泰承楚州漣水軍宣撫使印餘皆許之光世復請用便宜指揮不許直秘閣河南鎮撫司營田官任直清言河南殘破民歸業者尚罕所剏營田全藉軍兵恐力㣲難以號令乞鎮撫使翟興兼營田使從之己夘翊衛大夫福州觀察使浙東馬歩軍副總管兼温台明州防遏事辛道宗罷兼職初道宗既出㑹浙東副總管楊可輔上書言時政辭㫖切直罷之此據趙甡之遺史富直柔因薦用道宗且剏防遏司使領其事論者以為言故省秘閣修撰徳安鎮撫使陳規以守禦功陞徽猷閣待制而奉議郎觀察使權通判府事李忖亦加直秘閣庚辰資政殿學士提舉臨安府洞霄宫謝克家知泉州江淮招討使張俊奏本軍幹辦官郗漸從軍有勞乞除直秘閣既而言者以為職名非所以賞軍功乃進一官為朝請郎漸改命在二年一月庚午奉直大夫淮東營田副使王實為淮南東路提㸃刑獄公事填復置闕武顯大夫閤門宣賛舍人知滁州冦宏知濠州武翼大夫知濠州李玠為樞宻院准備將領日歴九月四日丁酉武功大夫知濠州李玠奏乞委宣撫司捕王才十四日丁未武翼郎特差濠州兵馬都監李玠奏乞下宣撫司嚴責近限勦殺王才奉聖㫖李玠除知濠州令專一措置所書前後牴牾皆不可曉又紹興二年正月癸丑江西安撫大使李回奏東南第六將闕乞差武翼大夫閤門宣替舍人李玠此所云階官又與前兩奏不同今且用第三奏俟考初王才據横澗山寨遣將丁順圍濠州兩月不退權州事張徳患之宏時在鳯凰洲與徳皆遣人詣宣撫使劉光世告急光世遣統制官酈瓊率本部攻横澗山才急乃招順歸寨順夜伏兵叢莽之中焚其營而去州人喜啓門爭出順乗亂叩城城中出勁弓射之相持一餉間賊乃退時官軍與賊皆乏矢悉破冡斵柩以為箭簳由是破伐無遺徳自以守城之功在宏之下乃以州印授宏宏不辭徳甚悔恨朝廷聞宏已在濠州故有是命日歴宏玠除命于九月丙辰十月庚辰两書之而庚辰所書頗詳又趙甡之遺史亦載此事於十月故附此但甡之以為朝廷授宏敦武郎與日歴不同盖誤辛巳直秘閣提舉臨安府洞霄宮王㬇提㸃江淮等路坑冶鑄錢後半月復寢其命以言者論列也壬午尚書省言近分撥神武右軍徃婺州屯駐合用錢理須樁辦縁行在至婺州不通水路難以津搬契勘便錢之法自祖宗以來行於諸路公私為便比年有司奉行不務經乆致失信于民今來軍興調度與㝷常事體不同理當别行措置詔戸部印押見錢闗子降付婺州召人入中執闗子赴杭越𣙜貨務請錢每千搭十錢為優潤有偽造者依川錢引抵罪東南㑹子法盖張本于此詔建州順陽村張毅特補保義郎用樞宻院請也毅受李芘招安屢與范汝為戰故官之是日福建民兵統領范汝為入建州汝為據建安衆十餘萬至造黄紅傘等制置使卒企宗用兵連年卒不能制及是汝為引兵入城守臣直秘閣王浚明以下皆遁賊遂舉其城時承議郎葉斐權知甌寧縣為所拘即以斐權知州事熊克小歴十二月建冦范汝為聞大軍將至亟入據州城監司守宰以下皆遁去按日歴十一月十七日庚戍知鉛山縣姚舜恭申范汝為以十月十九日據建州城逐處守倅十九日壬午也十一月十九日戊戌始命孟庾韓世忠克所云聞大軍將至亟入據州城者恐誤今併附此更湏詳之也甲申起復龍圖閣待制知興元府利䕫路制置使王庶陞徽猷閣直學士初庶以本路軍籍單寡乃籍興元府興洋州諸邑及三泉縣强壯每兩丁取一三丁取二與免戸下物力錢二百千號曰義士每五十人為一隊知縣為軍正尉為軍副日閱武於縣月閲武于州不半年有兵數萬每遇州教則厚犒賞之教閱有方可以岀戰則令尉皆改京秩張浚言於朝故有是命其後合興洋三泉四郡義士至七萬餘人至今不廢此以庶附傳呂大麟見聞錄及晁公遡所作庶傳参修王之望西事記曰張浚以王庶帥興元制置利䕫兩路付之軍士然官軍甚少所將以為用者皆招安之盗又團結民兵號為義士興元興洋旋得七萬人資妝旗皷有類兒戯去年八月聞傳金將以陜西之衆數路大入南人震恐但營築山寨搬糧清野為避伏計耳按興洋義士可用西人類能言之之望所云盖休兵之後教閲廢弛所致非庶時比也大麟所錄云庶於興元府興洋金蓬閬逹諸處令州縣選強壯不半年有兵二十萬而公遡所作傳但云按興元武康順政輿籍得丁之伉健者七萬餘人號義士二書復不同按金州此時乃王彦所統庶無由可制其民大麟亦誤也張浚奏狀稱庶勸誘興元府興洋州并三泉縣良家子弟籍為義士今從之直秘閣都大主管成都熈河五路茶馬宣撫使司隨軍轉運使總領西川財賦趙開陞直顯謨閣以張浚言其出賣茶引措置酒課増羡也時浚已用便宜特授開直龍圖閣而朝廷不知故有是命日歴二年四月八日張浚奏趙開自建炎元年至今年秋措置酒課増羡已陞直龍圖閣盖在朝廷降㫖之前今附見此金之圍慶陽也帥臣楊可昇固守不下張浚承㫖授可昇靜難軍承宣使言于朝朝廷疑可昇未落階官不許據宣和詔㫖楊可昇宣和末已為檀州團練使不知朝廷何以猶未知其落階官也然可昇後已降敵或謂其詐降將有以報事泄遇害宣議郎劉子翼知建州子翼子羽弟也朝廷聞李芘病亟故改命之子翼請降招安黄榜權住招軍蠲明年夏税諸縣尉權差武臣罷本州添差官審察縣令凡六事吏戸部看詳除蠲稅不行及添差官許終任外餘從之子翼所請以十一月丁酉行下今併書之朝散大夫直秘閣滕膺特除名興化軍編管坐附㑹李允文也紹興六年五月十三日量移人滕膺状紹興元年六月二十一日䝉特㫖除名勒停送興化軍編管念膺昨任京西路轉運副使知州程昌㝢於建炎四年正月内詐作被召離任臨行擁兵恃強廹脅膺從軍及至漢陽宻告撫諭馮康國及節制軍馬李允文申述昌㝢棄城擁脅之狀李允文差幹官富誼前來體究其富誼却恣受昌㝢金銀等物轉與為地其允文用便宜指揮差昌㝢權知荆南府膺方獲脫身還本路偶因分鎮罷司見允文說及昌㝢詐稱被召棄城不當復差知荆南允文恐膺陳訴上件因依遂勾抽送還兵級分刺諸軍及拘擁膺入城其允文妄作等事悉不干預䝉刑部告示稱膺未勒停前係充鄂岳辰沅州鎮撫使李允文下参謀官念膺不曽充允文参謀官况允文下参謀從辟官許大年等已䝉録用獨膺謫在逺方乞照赦除落過犯有㫖特放逐便乙酉同知樞宻院事富直柔言祖宗時三衙用邉功戚里班行各一人盖有指意上曰參用戚里固祖宗法然窒礙處多恐不可用丙戌武節大夫榮州團練使劉超知光州時超在公安宣撫處置使司幹辦官劉光輔以詔書撫諭超聽命遂以超守光州王明清揮麈第三録張黙荆州遺事云乃公在荆州說孔彦舟平鍾相遂入蜀謁魏公行至䕫州又遇劇賊劉超者擁數萬衆欲徃湖南刼掠張又以告彦舟之言告之且言太尉或肯從我當併往宣撫司言之超亦聽命駐軍于䕫州不為擄掠之計後遇劉季髙自蜀被召趨朝持降書入奏朝廷大喜季髙之進用由此而得之按日歴紹興四年閏四月二十二日超自叙狀乃云劉光輔招安與黙所記不合當考繫按宋史甲申日超行至黄州團風口為蘄黄鎮撫使孔彦舟所襲其衆皆潰超與餘兵數百至蘄陽鎮彦舟復邀入城奪其姬妾輜重然後遣超與光輔偕行小校趙進聚衆走江州之瑞昌其徒漸盛是晚行在越州火燔民居甚衆戊子斬有䕃人崔紹祖于越州市其弟光祖配瓊州牢城以偽造上皇手詔自稱大元帥故也事祖見二月丙戌詔邵青以舟師赴行在宣撫處置使張浚始聞熈河馬歩軍副總管劉惟輔死狀承制贈惟輔昭化軍節度使賻銀帛布各二百匹兩官子孫十二人立廟於成州號忠烈此據宣撫司案牘己丑升越州為紹興府以守臣陳汝錫有請也斬修職郎李雱于都市雱為李成軍正成敗為太湖令所獲以獻至是誅之録唐宰相張九齡十二世孫昭為中州文學張琪自宣州遁去欲北降偽齊是日知承州王林所遣總轄官閤門祇候張賽生擒之于楚州檻赴行在辛夘朝請郎知南康軍陳敏識為江南東路轉運判官令與葉夣得計置錢糧時敏識猶未赴南康也壬辰録程頥孫將仕郎易為分寧令後五日又官其家一人癸巳范汝為遣兵犯邵武軍守臣朝散郎吴必明統制官閤門宣賛舍人江西兵馬副都監李山率兵與戰衆潰退保光澤縣山遂走信州此據鉛山縣所申修入是月曹成引兵及馬友戰于潭州成敗去復還攸縣偽齊劉豫遣其將王世冲以蕃漢兵冦廬州守臣王亨以計誘世冲斬之大破其衆豫置招受司于宿州又以其弟北京留守益為汴京留守知單州李儔知青州建炎以來繫年要録巻四十八建炎以來繫年要録巻四十八金人地名考證羅索原書作婁宿誤改見巻一薩里罕原書作撒離曷誤改見巻十一烏珠原書作兀术誤改見巻一尼瑪哈原書作黏罕誤改見巻一
