body:
  text: 建炎以來繫年要録卷十五宋李心傳撰建炎二年夏四月甲寅朔磁州統制官趙世隆以所部詣宗澤降世隆本磁州書佐澤在磁以為中軍將澤既去磁以州事付兵馬鈐轄李侃金人圍磁州急州有禁兵有民兵民兵甚衆禁兵恐其勢盛將校郭進乃作亂世隆與進謀遂殺侃以通判趙子節權州事耿延禧建炎中興記云宗澤起兵盡取磁之府庫金銀以行磁倅趙上書訟之乞元帥王旨追取數萬緡金銀赴本州以為守禦之具上命劄付澤澤不從至南京亦不聞澤以軍實輸官按澤去郡既以李侃權州則子節所云恐未必信今不取至是世隆與其弟世興將三千人歸澤將士頗疑之澤曰世隆吾一校耳必無他有所訴也乙卯世隆入拜澤面詰之世隆辭服澤笑曰河北陷沒而吾宋法令上下之分亦陷沒耶命引出斬之時衆兵露刃於庭世興佩刀侍側左右皆悚澤徐語世興曰汝兄犯法當誅汝能奮志立功足以雪恥世興感泣會滑州報敵騎留屯城下澤謂世興曰試為我取滑州世興欣然受命丙辰詔文臣從官至牧守武臣管軍至遙郡各薦所知二人置為二籍一留禁中一付三省樞密院遇監司帥守將官鈐轄有闕於所舉人內擢用之犯贓連坐即罪廢及法不當得之人皆毋得舉用議者請也此未知即周武仲所請否當考武仲建請已附今年二月辛酉戊午趙世興至滑州掩敵不備急攻之斬首數百得州以歸宗澤復厚賜之時有降寇趙海者屯板橋輒塹路以阻行者管軍閭勍芻者八人過其壘海怒而臠之覘事者以告澤召之海以甲士五百自衛而入澤方對客海具伏即械之繫獄客曰彼甲士甚衆姑徐之澤笑謂其次將曰領衆還營明日誅海於市聞者股栗統制官楊進屯城南王善者有衆二千餘皆山東遊手之人先進來降屯城北二人氣不相下一日各率所部千餘相拒於天津橋都人頗恐澤以片紙諭之曰為國之心固如是耶當戰陳立功時勝負自見二人相視慙沮而退己未詔除京畿東西河東北陜西路許置巡社外餘路依先降指揮並罷時言者以為巡社之設利於西北而不利於東南蓋西北俗尚強悍今遭敵兵侵掠人思用命皆有鬬志今春濱州以八萬餘人力拒金人殺獲頗衆因此稍長國威則河北之效已可見矣如東南創置人多不願州郡強使入社亦非樂從逼於官司驅率勢莫能免今日駐蹕淮甸恃東南以安民心未宜騷動欲望將先降存留指揮更不施行及於武臣提刑銜內除去所帶四字故有是命先是杭溫二州言已就緒詔許存留至是亦罷熊克小歷己未詔陜西河北巡社依舊餘路並罷而不言京畿東西誤也克又云時杭溫二州已就緒請存留亦不聽按日歷稱杭溫二州願存留指揮更不施行則前此蓋許之今又令罷非此時始請也又按罷諸路巡社乃是去冬指揮今但不許陳乞存留耳克失於詳考故所書差誤是日宗澤復上表請上還京表曰臣某言易謂省方書言輯瑞是天子或時巡於下土邦人可瞻仰於至尊然古今之事勢有殊宜觀會通而制治况上下之人情至切思聞詔命以回鑾故老臣再瀝於血誠願聖主早形於睿斷意狂罪大語出涕零中謝臣伏聞先有格言事必師古藝祖應天而受成命太宗繼志以集大勳列聖所以繼繼承承諸福所以穰穰簡簡皆在京師本根之地以為寰宇朝覲之天端拱而坐九重穆清而朝萬國陛下纂承寶緒紹述丕圖當奄九有而有為體三無而無外奈有姦臣之臆説與憑敵國之誕辭忘周宣之中興循晉惠之往轍天下之勤王者使去義夫之救駕者弗知兩河保山寨之忠民四方作草竊之賊子皆緣陛下久駐蹕於淮甸咸思慕於翠華懷抑鬱而籲天罔聞致猖狂而遷善無路果還法駕大肆洪恩人當澡雪以歸農敵亦遁逃而屏迹遹追一統之大丕昭萬世之休兹甚易知而易行勿謂難測而難識但去阿諛柔佞之語而宏剛健中正之風必天日之照臨應祖宗之保祐一人有慶庶績其凝臣無任時契丹九州人日有歸中國者間有捕獲金衆澤選契丹漢兒引近坐側推誠與語諭以期奮忠義共擊敵人以刷君父之恥即給資糧遣之且賜以公憑俟官軍渡河以為信驗人令持數百本去又為榜文散示陷沒州縣及為公據付中國被掠在北之人因驛疏以聞宗忠簡公文集給契丹漢兒并被掠人公據疏臣契勘金人一族本大遼之臣曩緣羣臣姦謀茍以目前之利相結壞亂耶律天祚使金人假大遼之衆侵掠中國竊緣契丹漢兒自與我宋盟約幾百年實唇齒之邦兄弟之國偶被金人殺掠忿怨不已止緣一時之勢末由報寃今若復盟會但得回戈共力破敵一舉便可滅亡臣已措置雕印文榜公據令生獲漢兒齎往傳報自相激發設契丹漢兒未知所措金人知之必相疑二即契丹漢兒互相併力自分敵勢所有本朝被掠良民臣亦依此措置曉諭外今繳連榜文公據共三本在前者澤遂結連諸路義兵燕趙豪傑嘗謂人曰事可舉矣必俟回鑾當以身先之故請上歸京尤力詔御前軍器所見織戰袍工匠發還綾錦院依限織進初命監織錦院薑煥擇良工就御前軍器所專織戰袍欲以賜有功將士中書侍郎張慤等言於上曰前日中人因事輒置局紊亂紀綱不可不深鑒今若以織文責綾錦院而使少府監督其程限則事歸有司於體為正上曰甚善故有是命中興聖政臣留正等曰臣聞明主之察治亂也審而守法度也堅寧逆意咈心弗便於事而常戒懼於細微蘖芽之間不可忽也夫取工於綾錦院而織袍於軍器所又以賞功由常人觀之誠若無甚害然太上皇帝矍然改令不俟終日何哉官失其官而事奪於貴臣司廢其舊而利出於一切則亂由之而作有不難矣嗚呼治亂之機如此其微也非明主其孰察之庚申上諭大臣曰故事端午罷講筵至中秋開朕以寡昧遇茲艱難知學先王之道為有益方孜孜講求若經筵暫輟則有疑無質徒費日力朕欲勿罷可乎大臣皆稱善乃詔勿罷時上在宫中內侍有言講讀官某人敷陳甚善陛下亦必謂然臣今擬奬諭詔書以進上曰此當出自朕意若降詔書自有學士爾等小臣豈宜不安分如此是後不許妄言乃退按是時周武仲朱勝非王賔楊時在經筵皆名臣而武仲久已在告未知所指何人甲子詔三省樞密院人吏該覃恩遷官而礙止法者並令回授有服親初上登極覃恩自朝請大夫已上皆轉行至是省吏當遷而吏部尚書周武仲言未敢擬轉執政進呈上曰吏雖該恩豈宜與士大夫等乃有是命乙丑上諭輔臣曰朕每退朝押班以下奏事亦正衣冠再坐而聽未嘗與之欵昵又性不喜與婦人久處多坐殿旁小閣筆硯外不設長物靜思軍國大事或閲章疏宫人有來奏事者亦出閣子外處分畢而後入每日如是上恭已勤政如此中興聖政臣留正等曰閹寺之禍著矣佞柔側媚以狗馬聲色惑其君禍之小者也剽略書傳誦説古今以才藝自售則其為禍豈易測哉建炎之初天子勵精求治而宦者投隙肆言猶敢如此亦可謂姦人之雄矣非聖武英斷絶其萌芽則基亂貽禍將何所不至嗚呼方其伺顔色售方藝能赫然拒絶之固已難矣又暴其情狀盡告大臣豈不甚難哉至於清心寡欲屏逺聲色皆中興之本臣是以論著之特詳焉丙寅京西北路制置使翟進襲金人於河南敗績時御營左翼軍統制官韓世忠至西京會進及大名府路都總管司統領官孟世寧京城都巡檢使丁進與金戰進夜襲右軍監完顔希尹營金兵先知反為所敗進又導世忠與金戰於文家寺會丁進失期而統領官閣門宣贊舍人陳思恭以後軍先退王師敗金乘勝追擊至永安後澗世忠被矢如棘其將張遇以所部救之乃力戰得免思恭世儒孫也世儒南昌人故相執中子世忠還東京詰先退者一軍皆斬左右趾以徇於是世忠與丁進不和軍士相擊無虛日世忠慮有變遂收餘兵數千人南歸希尹復入西京宗澤奏以保寧軍承宣使主管侍衛步軍司公事閭勍為保護陵寢使時隴右都護張嚴追羅索及鳯翔境上嚴鋭意擊賊而熙河兵馬都監劉維輔不欲聽嚴節制乃自别道由吳山出寶雞獵敵遊騎嚴擁大兵及敵於五里坡羅索知之伏兵坡下嚴與涇原統制官曲端期而不至徑前遇伏戰不利嚴死之惟輔自石鼻寨遁歸先是端治兵涇原招流民潰卒所過人供糧秸道不拾遺至是端屯軍麻務鎮聞嚴死敵逰騎侵涇原遣第十二副將秉義郎吳玠據清溪嶺逆拒之將戰其牙兵三百餘人皆潰玠率餘兵奮擊大破之金兵乃去端鎮戎人知書善屬文且長於兵略玠隴干人初以良家子從征西夏方臘戰屢有功左副元帥宗維聞嚴死自平陸渡河歸雲中左監軍完顔希尹右都監耶律伊都聞宗維渡河亦棄西京去留萬户察罕瑪勒戍河陽言者論近日帥守之棄城者習以成風如鄧雍之於荆南何志同之於頴昌趙子嵩之於鎮江皆擁兵先遁今則安居薄責而未正其罪如康允之之於壽春陳彥文之於九江以數千之疲旅捍十萬之強寇而允之止遷一職彥文才復舊官議者惑焉願詔有司嚴立期限使條具靖康以來凡棄城逃遁者某人保城力守者某人書其功罪著其賞罰庶幾守土之臣有以懲勸詔諸路監司限半月條具以聞丁卯詔諸州刺配罪人斷遣訖權送本處重役營分收管俟道路通快日遣行日歷無此今以紹興四年正月五日吉州申審狀修入集英殿修撰知杭州侍其傳移知宣州顯謨閣直學士知宣州魏憲試尚書吏部侍郎憲吳江人宣和間嘗為是職至是復用之憲之除日歷不載吏部題名在今年四月按憲靖康元年二月除知宣州侍其傳之除當是代憲故併繫此日是日金人侵洺州初皇叔洺州防禦使士珸既引兵入城金圍之甚密栽鹿角治濠塹欲以持久困之軍民終不投拜至是金侵京西陜右河朔內虛守者稍怠衆以糧盡不可守乃擁士珸出城自白家灘往大名府金人遂入城自二帝北狩兩河州郡外無應援內絶糧儲悉為金所取惟中山慶源保莫祈洺冀磁相絳久而陷之士珸洺州事迹日歷全不載獨附傳有之而無月日趙甡之遺史洺州之陷在三月庚戌按士珸以去年七月六日甲午入洺州而附傳云凡二百七十四日大小五十七戰以日計之當是四月十四日丁卯故附於此日紹興六年四月癸丑韓璜奏叔奉直大夫璆通判洺州代王麟權州死事得旨贈一官與一子恩澤未知璆之死的在何時今附注此或可移附去年七月甲午士珸入城時戊辰尚書工部侍郎兼侍講楊時以老疾求去章四上既而除龍圖閣直學士提舉杭州洞霄宫時之罷日歷不書工部題名二年八月除知台州按時文集乞出第四劄子注云四月十五日上故且附此俟考河北招撫司都統制王彥與金人戰於太行山敗之己巳詔郡縣天申節錫宴以二聖未還勿用樂是日東京留守宗澤復抗疏請上還京且言臣竊見漢光武用寇恂為潁川太守因從車駕擊隗囂潁川盜賊羣起帝顧謂恂曰潁川迫近京師當以時定獨卿能平之恂對曰潁川惡少輕剽奚能為哉但聞陛下有事隴蜀故乘間竊發耳若乘輿南向賊必惶怖歸死臣願執鋭前驅帝即日命駕南征盜賊悉降遂建東漢中興之業臣竊見近日有招安到丁進者數十萬衆願為陛下守護京城又李成願扈從還闕即渡河勦絶強敵又沒角牛楊進等領衆百萬亦願率衆渡河迎取二聖茲三頭項人馬非頴川比也今皆披瀝肝膽同寅協恭共濟國事臣聞得道者多助多助之至天下順之果陛下千乘萬騎來歸九重遹追我太祖太宗奕世聖人二百年大一統基業則天下必心悅而誠服庶績其凝萬國咸寧矣尚何盜賊之足慮乎臣敢瀝悃誠再冒天聽伏望裁赦澤以他日迎奉二聖還京先修龍德宫以備道君皇帝臨御以淵聖皇帝未有宫室奏修寶籙宫為之不報澤奏寶籙宫事在此月丁丑今併書之壬申寶應潰兵孫琦等焚隨州甲戌徽猷閣待制知濠州連南夫請令諸路州縣於近城十里內開鑿陂湖以備灌溉使春夏秋三時嘗有水澤則良民有豐年之望敵騎有還濘之苦方冬水涸即令耕犁磽確則敵騎又有歷塊之患其自來不係種稻地分即乞令依倣雄州開鑿塘濼亦有菱芡蓮藕魚蝦之利可以及民仍免一年租賦以為人工之費詔諸州相度後不行初鴻臚寺丞趙子砥從軍至燕山久之欲遁歸乃結歸朝官忠翊郎朱寶國承信郎王孝安至中京得上皇宸翰是日子砥發燕山八月庚申至揚州辛巳有羣盜號九朵花焚漢陽縣癸未孫琦拔唐州是月祕書省正字富直柔為校書郎此據本省題名皇弟檢校太傅慶陽昭化軍節度使信王榛為河外兵馬都元帥初馬擴自五馬山以麾下五百人渡河至東京見宗澤至是始赴行在從者不滿百人擴既見出榛奏事黃潛善等皆疑非真天子識其字即有是命制詞略曰覽封章之近奏知行役之獨留慨然壯懷副朕本旨宜就顓於節制俾盡總於營屯以迎二聖之還以慰兩河之望於是擴自武功大夫和州防禦使特遷拱衛大夫利州觀察使樞密副都承旨元帥府馬步軍都總管擴將行上奏略曰臣踈逺小人陛下斷以不疑付以閫外之事願鑒前世之成敗明當世之嫌疑俾臣得效愚忠畢意攻取今王師大舉機會神速軍期文字不可少緩若依常制下都堂等處然後以逹天聽則事涉疑似或欲規避者定逡巡藏匿不以進呈望令專置一司不限夤夜晝時通進又言自唐以來用中貴人監軍奪權掣肘每致敗事伏望聖斷罷差中貴監軍及選給器械凡四事上皆從之又許擴過河得便宜從事時潛善與汪伯彥終以為疑乃以烏合之兵付擴且密授朝旨使譏察之擴行復令聽諸路帥臣節制擴知事變遂以其軍屯於大名熊克小歷載信王除河外元帥在八月按紹興元年五月馬擴屬官万俟簴家乞恩澤狀云建炎二年七月河北節制應援軍馬馬擴申奏起復從軍前去至當年八月到大名府館陶縣駐劄詳此則信王除帥當在七月矣而紹興五年七月五日臣僚上言吏部取會到馬擴公文稱建炎二年四月內恭稟聖訓渡河討賊責任成功許便宜從事至大名府館陶縣方準朝旨不得渡河據此則信王之除蓋在四月也今移附此更當求他書參考五月甲申朔宗澤再上表乞還京且言臣聞孟子曰雖有鎡基不如待時故君子不先時而起不後時而縮當其可而已易曰幾者動之微吉之先見者也故君子見幾而作不俟終日亦適當其可而已恭惟我國家曩緣金人侵掠郊畿殘破州縣恣為誕妄百端邀求今天意悔禍人心助順考時與幾實陛下中興之會也古聖人敕天之命惟時惟幾者蓋以時哉不可失而知幾若神故也臣觀京師城壁已增固矣樓櫓已修飾矣池濠已開濬矣器械已足備矣寨柵已羅列矣戰陳已閲習矣人氣已勇鋭矣汴河蔡河五丈河皆已通流泛應綱運陜西京東滑臺京洛敵兵皆已掩殺潰遁矣天下萬邦與畿甸生靈夙夕祈天而請者嚮南懇禱而願者但望陛下千乘萬騎號令風伯雨師清塵灑道翠華回輦歸御九重為四海九州作主耳且一人有慶兆民賴之兹其時也兹其幾也臣願陛下無聽姦邪之言而忽其時忘其幾天下幸甚果怠兩河山寨之心與沮萬民敵愾之氣則天下危矣願陛下毋循東晉既覆之轍臣老矣不勝至誠惻怛懇切之至願陛下哀憐之奏來至會尚書右丞許景衡建請渡江宰相黃潛善持不可朝廷既得信王榛奏或言榛有渡河入京城之謀乙酉下詔還京略曰朕即位之初踟蹰近服會李綱上江左之章繼執南陽之義鳩工蕆事寖矢時幾旋為淮甸之行就弭寇攘之患守中原而弗逺見朕意之所存昨稽時措之宜默辦言旋之計設施有序播告未先或者不知尚乃有請可無委積以謹備虞宜令發運司盡起淮浙入京物料及軍須輜重等物以次發遣赴京師朕將還闕恭謁宗廟仍令三省樞密院御營使司條具合行事件應臣寮將士自應天府扈從至揚州者並進官一等遂罷景衡為資政殿學士提舉杭州洞霄宫景衡之執政也凡有大政事必請間極論榻前黃潛善汪伯彥惡其異己每排抑之至是因下詔還京而有此命盜孫琦破宿山縣丙戌詔後舉科場講元祐詩賦經術兼收之制中書省請習詩賦舉人不兼經義習經義人止習一經解試省試並計數各取通定高下禮部侍郎王綯請前降舉人兼習律義孫子義等指揮勿行從之自紹聖後舉人不習詞賦者近四十年綯在後省嘗為上言經義當用古注不專取王氏説上以為然至是申明行下詔人户養馬官司毋得拘籍差雇俟其漸盛以優直市之祕書省正字馮楫獻書於黃潛善曰伏覩昨晚出黃榜降詔欲擇日還闕東來從衛官吏士無不欣喜西兵尤以近鄉倍極踴躍以楫計之闕未可還萬一駕到東京而金人秋後再來不知吾兵何以當之吾兵或不可當而復為避地計今蔡汴兩河已漸湮塞其或被其斷絶水道雖避地亦不能此不得不慮也假如今日駐蹕維揚亦未為得䇿儻主上堅欲以馬上治之不許遷徙但當留兵將及宰執中諳練邊事軍籌帷幄之人從駕居此專務講武以為戰守之備其餘宗廟百官盡令過江於建康置司至於財用百物除留贍軍費用外亦盡藏之建康府庫庶幾緩急遇敵可戰則戰可守則守度不可戰守而欲動則動亦易行而無牽制之纍楫遂寧人也戊子翰林學士朱勝非守尚書右丞始上欲擢吏部尚書周武仲為執政及是武仲以病在告上諭知閣門事韓恕曰武仲若出可先期以聞而武仲不能朝矣詔東南諸路贍學錢且令發運司拘收充糴本一年祕閣修撰知揚州呂源添差江淮等路制置發運副使中大夫黃願直龍圖閣知揚州願漳州人靖康中嘗為司農少卿罷去至是黃潛善薦用之願之除日歷不載今因吕源改命遂書之蓋願實代源此時維揚不容一日闕守也願事迹不見於史詔旨宣和四年四月乙酉願以福建運判奏乞回避産業自云貫漳州後為户部倉部郎官大府司農少卿靖康元年八月罷未知此時為何官今所書官職用紹興元年十月癸未刑部檢舉復官狀參考修入熊克小歷源除發副在甲午今從日歷己丑詔自今應給驛馬遞卒者並權住此以紹興三年七月丁卯湖南安撫司奏狀修入是日宗澤再奏乞掃灑龍德而改建寶籙宫使天下知陛下孝於父而悌於兄乞自御前處分不報澤又上疏言臣聞孟子言術不可不愼也矢人惟恐不傷人函人惟恐傷人巫匠亦然臣因斯語始知人心所存之邪正與所作之是非若以道槩之了然區分如辨黑白夫忠義之人動容周旋無非忠義而不忠義之事無自入焉故其於上下愛戴保護不啻函人惟恐其傷之也彼不忠不義之人動容周旋亦無非不忠不義而忠義之道無自入焉故其於上下毁裂擯棄不啻矢人惟恐其不傷之也恭惟我國家曩緣強敵稱兵殘破州縣圍閉京城劫掠邀求靡有紀極以至強迎二聖后妃親王與諸天眷蒙塵北去凡忠義之士莫不痛心疾首泣血奮厲佐佑陛下張皇六師震耀神武總領貔貅之士願靖沙漠迎奉二聖來歸京師俾中原生靈還定安集罔或流散愛戴其上保護其下夙夜念念如函人焉惟恐其或傷之也其不忠不義者但知持祿保寵動為身謀謂我祖宗二百年大一統基業不足惜謂我京城宗廟朝廷府藏不足戀謂二聖后妃親王天眷不足救謂諸帝諸后山陵園寢不足護謂周室中興不足紹謂晉惠覆轍不足羞謂巡狩之名為可效謂偏地之伯為可述儲金幣以為敵資樁器械以為敵用禁守禦之招募慮勇敢之挫敵也掊保甲以助軍慮流移之安業也欺罔天聽凌蔑下民凡誤國之事無不為之猶矢人焉惟恐其或不傷之也臣願陛下驗已試之迹以道槩之則人心所存之邪正與所作之是非自然區分無足疑矣臣衰老孱儒誤蒙陛下識擢俾留守京城兼開封尹臣砥礪瀝竭知無不為惟恐失措有誤國家大計然臣每所申奏若非陛下察臣斷斷孤忠憐臣悄悄見愠體天地之大德護覆廓日月之大明照臨臣與血屬當膏砧斧虀粉萬狀矣尚安能為陛下保釐尹正使京城市井里巷安居樂業熙熙皥皥如我祖宗太平之時臣之至此豈止謗書盈篋而已耶臣願陛下六龍萬乘早歸大內下慰四海生靈瀝血懇切之望臣之言此實出悃誠痛切憤悶以不避姦邪詆誣不避冒犯誅戮臣願陛下降臣此言榜之朝堂俾應在朝臣僚實封章疏指摘臣言如臣言稍涉狂妄乞正典刑明臣罪惡如臣言果符忠義乞降詔敕明告回鑾之期庶安天下之聽此事甚大恭俟睿慈洞察勿二勿疑取進止又疏曰臣犬馬之年已七十矣陛下不以臣衰老無用付之東京留鑰臣自去年七月到任夙夜究心營繕樓櫓城壁掃除宫禁闕廷分布柵寨訓練士卒教習車陳比及終冬諸事稍稍就緒都城帖然風物如舊人人延頸跂踵日徯望聖駕還闕臣以故自今年正月三日兩次遣屬吏及臣之子捧表逺詣行在投進祈請車駕西上歸肆大赦於宣德門使天下曉然皆知陛下言旋舊都再造王室命令用是通逹盜賊用是消弭無復有方命阻兵之患然後容臣為陛下條畫措置造膝陳請遣一使泛海道入高麗諭以元豐搆好之舊令出兵攻金人之西又復遣官從間道趨河東諭折氏修其舊職以固吾圉使三面交攻金人令彼應敵不暇吾方大舉六月之師一道由滑濬一道出懷衛涉河並進北首燕路訪大遼子孫興滅繼絶約為與國則燕薊之感恩荷德不患不為吾用如此則金人勢必孤弱自可撫而臣之二聖天眷自此決有歸期兩河故地自此決可收復而况兩河之人感祖宗二百年涵養之澤雖陷敵踰年而戴宋之心初無携二使吾大兵渡河而戰則東北人民必有背敵歸我前徒倒戈攻於後以北誰不願為吾死孟子曰雖有知慧不如乘勢雖有鎡基不如待時今時則易然也臣嘗以今日時勢觀之天意悔禍人心固結雖三尺童子爭欲奮臂鼓勇又况當六月宣王北伐之時機會間不容髮陛下何憚而不亟還京師使臣獲奉咫尺之威請借筯以籌黃帝書曰日中必熭操刀必割此言時不可失也諺曰當斷不斷反受其亂言決之貴早也今日之事臣願陛下以時果斷而行之毋惑讒邪之言毋沮忠鯁之論儻陛下以臣言為是願大駕即日還都使臣為陛下得盡愚計若陛下以臣言為非願陛下即日放罷老臣或重竄責臣所不辭惟明主可與忠言臣故昧死以聞上優詔答之辛卯陜西京東諸路及東京北京留守並奏金人分道渡河詔遣御營左軍統制韓世忠主管侍衛步軍司公事閭勍率所部迎敵命宗澤遣本司統制官楊進等援之先是澤聞河北都統制王彥聚兵太行山即以彥為武功大夫忠州防禦使制置兩河軍事彥所部勇士萬數以其面刺八字故號八字軍彥方繕甲治兵約日大舉欲趨太原澤亦與諸將議六月起師且結諸路山水寨民兵約日進發上奏曰臣聞詩於小雅載六月宣王北伐之事蓋玁狁以弓矢馬騎為先而當六月歊蒸之時皆難於致用故宣王乘時行師終於薄伐玁狁以建中興之功臣自留守京師夙夜匪懈經畫軍旅近據諸路探報敵勢窮促可以進兵臣欲乘此暑月遣王彥等自滑州渡河取懷衛濬相等處遣王再興等自鄭州直護西京陵寢遣馬橫等自大名取洺趙真定楊進王善丁進李貴等諸頭項各以所領兵分路並進既過河則山寨忠義之民相應者不啻百萬契丹漢兒亦必同心抵禦金人事才有緒臣乞朝廷遣使聲言立契丹天祚之後講尋舊好且興滅繼絶是王政所先以歸天下心也况使金人駭聞自相携二邪仍乞遣知幾辨博之士西使夏東使高麗喻以禍福兩國素蒙我宋厚恩必出助兵同加掃蕩若然則二聖有回鑾之期兩河可以安貼陛下中興之功逺過周宣之世矣臣犬馬之齒今年七十矣勉竭疲駑區區愚忠所見如此臣願陛下早降回鑾之詔以繫天下之心臣當躬冒矢石為諸將先若陛下聽從臣言容臣措畫則臣謂我宋中興之業必可立致若陛下不以臣言為可用則願賜骸骨放歸田里謳歌擊壤以盡殘年頻煩上瀆天聽臣無任取進止疏入黃潛善等忌澤成功從中沮之澤歎曰吾志不得伸矣因憂鬱成疾澤尹京二歲修城池治樓櫓不擾而辦屢出師以挫敵鋒其抗疏請上還京凡二十餘上言極切至潛善與汪伯彥等雖嫉之深竟不能易其任靖康小雅云建炎二年有旨遣韓世忠之師屯伊洛又令滄帥劉錫密結河陽之人自青州絶河進兵命澤總大衆自滑州而北期集於中山府澤聞命欣躍賫金銀兵械纎悉畢具行有日矣而黃潛善汪伯彥恐澤成功又以姦計從中止之澤大憤悶欎欎久之疽發背而薨此事史及澤遺事皆無之姑附此更須參考甲午以金人來侵曲赦河北陜西京東諸路初陜西制置使錢蓋聞金人陷長安檄集英殿修撰鄜延經略使王庶兼節制環慶涇原兵進攻既而義兵大起金人東還庶以金人重載可尾襲取勝移文兩路各大舉協力更戰而環慶經略使王似涇原經略使席貢自以先進望高不欲受其節度遂具文以報而實不出兵金遊騎上清溪既為涇原裨將吳玠所扼至咸陽望渭河南義兵滿野不得渡遂循渭而東其右軍入鄜延攻康定圍龍坊庶急遣將斷河橋又令將官劉延亮屯神水峽斷其歸路金人遂去於是羅索盤礴於馮翊河中扼新河橋以通往來人情大恐涇原統制官曲端乘敵退復下秦州而鳯翔長安皆為義兵收復會經制司統領官劉希亮自鳯翔歸端端斬之端雅不欲屬庶及聞孟迪李彥仙等受事鄜延皆不樂遂揭榜稱金人已過河歸國農務不可失時乃盡散渭河以南義兵庶亦斂兵保險猶以書約似貢欲逼金人渡河至於再三似不應貢許出兵四萬亦遷延不行時鄜延人以秋深必被兵多避地者道出環慶吏民皆惡其驚徙所在掠其財而殺之閭里蕭條矣乙未詔蘇軾立朝履歷最為顯著追復端明殿學士盡還合得恩數時軾孫司農寺丞符以軾政和中復職未盡訴於朝乃有是命軾眉山人元祐禮部尚書黨籍待制以上第一名昌化軍安置元祐中追復龍圖閣待制王明清揮麈後録云靖康中東坡追復元職時汪彥章在掖垣偶不當制舍人不學而思澀彥章戲曰公無草草渠家焚黃二字藻慙而怨之按藻今年二月已罷舍人按注有脫誤江淮發運副使吕源請下虔吉衡潭四郡及沿流諸州造綱船二千艘從之以源言本司舊有運舟六千今所存不逮半也福建路轉運判官謝如意執建州叛卒張員等六人誅之初員等雖受招而桀驁如故會如意自職方員外郎出領漕事乃議除之如意至建陽隂遣勇士離其黨與遂與本路兵馬都監黃濤本州兵馬監押魏勝密謀紿員等至濤官居俾受宣劄因禽戮之後數日如意入城人情稍定既而餘黨懷疑如意幾為所執時新知州事通直郎方承賫敕榜諭叛卒至建陽聞之留不進如意邵武人也按宋史繫甲午日丙申大中大夫宇文虛中復資政殿大學士提舉萬壽觀充大金通問使武臣楊可輔副之尋改虛中為祈請使京東西路提點刑獄公事程昌弼言州郡間軍器乏少請各以堅韌之木廣置棍棒蓋鐵騎箭鑿不能犯惟棍棒可以禦且不日可辦從之賊靳賽破光山縣戊戌河北制置使王彥以八字軍屯河南時宗澤以彥孤軍無援不可獨進乃以書延彥計事彥遂合諸寨兵萬餘人以是日濟河後五日彥至京師澤大喜諭以京師國家根本宜宿兵近甸遂命其軍屯滑州之沙店壬寅中書侍郎兼御營副使提舉措置户部財用張慤薨慤立朝諤諤有大臣節不可干以私惟善許景衡與許翰論事頗合自為執政諫諍愈切無所顧避時黃潛善當國專務壅蔽自汪伯彥而下皆奴事之不敢少忤其意惟慤以直道自持事必力爭雖言不行而不少屈秉政未踰歲遽薨於位士民皆痛惜之此以慤附傳及靖康小雅參修上以慤河朔人無家可歸常賻外賜田十頃第一區後諡忠穆按宋史繫癸卯日癸卯朝奉郎大金通問使王倫始渡河按倫紹興三年正月乞券錢狀云建炎二年五月二十日過河遂與其副閣門宣贊舍人朱辨至雲中見左副元帥宗維計事金留不遣時進武校尉朱績從辨行宗維賜以所掠內人績陽受之逃去宗維怒追而殺之朱績事不得其年據紹興十三年朱辨奏狀附見甲辰羅索陷絳州權知州事趙某率軍民巷戰凡六日乙巳詔諸路走馬承受使臣自今於帥府用申狀其入謁如屬官禮時入內寄資東頭供奉官蘇淵為熙河路走馬承受公事用元豐舊制移牒帥司就廳下馬經略使張深奏淵尚習故態陵轢帥臣故有是旨資政殿學士提舉杭州洞霄宫許景衡薨景衡罷政而歸至瓜洲得暍疾及京口疾甚端坐自語曰陛下宜近端人正士以二聖蒼生為念陸宣公奏議盡之矣遂薨景衡性孝友兄死事其嫂如母博通經史百家書而其要歸於孔孟嘗曰孔門自掃灑應對而上皆入中道以故修身行已雖細必矜平居無事與朋友言怡怡辭氣惟恐傷之及公言廷爭正色直前視權幸若無有者薨年五十七後諡忠簡丙午徽猷閣待制劉阜民落職初阜民與其兄大中大夫皂民皆以覃恩乞進秩言者論其進由恩幸法當討論乞罷阜民職而降皂民為中大夫詔罷阜民而皂民遷官如故丁未復置兩浙福建路提舉市舶司賜度牒直三十萬緡為博易本以尚書省言市舶公私兼利非取於民自併歸漕司虧失數多市井蕭索土人以併廢為不便故有是旨其後遂併廣司復之戊申兵部尚書盧益直學士院初益自間廢中請至揚州治其私事黃潛善許之至則除尚書至是復有此命此據黃潛善劾疏增修益除兵書不得其日熊克小歷二月丙申兵部尚書董耘罷遂召徽猷閣待制知東平府盧益為兵部尚書按史益元年五月乙巳自顯謨閣直學士知東平府落職奉祠當二月間權邦彥已知東平府克蓋誤起居郎康執權試給事中起居舍人黃哲試中書舍人太常少卿周望守起居郎司農卿林安上守起居舍人望初受命出使會金帥宗傑死遂輟行執權除命後省題名有之今因望除左史併著於此日己酉秀州軍亂初直龍圖閣知秀州趙叔近既免直龍圖閣朱芾代之芾頗肆殘虐軍民怨憤是日茶酒卒徐明率衆囚芾迎叔近復領州事叔近撫定明等且請擇守臣於朝奏未至詔御營中軍統制張俊以所部討之庚戌增天下役錢以為新法弓手之費初汪伯彥既建請乃以免役寬剩廂禁軍闕額裁減曹掾等錢供其庸直元年七月癸卯至是所增遍於東南諸路遂詔不受庸者人給田三十畝馬軍增三之一議者恐費不給乃請官户役錢勿復減半而民役錢槩增三分從之故有是詔新法弓手三年六月丙寅役錢三年七月己丑可考詔自今見任官有涉疑異志者止許經不礙官陳告如徑行殺戮事雖有實亦坐擅殺官吏之罪即妄殺平人以為姦細者從軍法自軍興所在姦民殺官吏害良善者甚衆朝廷恐其生事至是下詔條約之癸丑罷借諸路職田自軍興始有拘借之命靖康元年建炎元年而逋負甚衆至是江淮發運副使吕源奏留其半庶可養亷且令用心催理詔圭田士大夫貧者仰以養亷國用雖乏豈可取此自今毋得借熊克小歷略載此事於七月壬子而日歷繫之此日按今年九月丙子臣僚上言亦云五月三十日聖旨圭田更不拘借克所書實誤詔持服人蔡莊罷徽猷閣待制其告令所屬收掌候服闋日給付其餘前宰執子弟見帶職人令吏部限十日條具申省莊確子也言者論確之子懋既以欺罔誕謾交結權幸致身執政而又擢其弟為待制士論憤欎莊比守頴昌奴事李彥無所不至尤當竄斥以為人臣不忠之戒故有是命建炎以來繫年要録卷十五
