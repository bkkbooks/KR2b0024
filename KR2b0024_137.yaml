body:
  text: 建炎以來繫年要録巻一百三十七宋李心𫝊撰紹興十年秋七月按是月壬寅朔癸卯武義大夫閤門宣贊舍人馬秦為右武大夫忠州防禦使張俊之得宿州也從政郎權蘄縣于躍殺敵之在邑中者率其民來歸詔躍改右宣教郎知縣事于躍事以林待聘外制集所書附入是日湖北京西宣撫使司將官張應韓清入西京初河南府兵馬鈐轄李興旣聚兵先復伊陽等八縣又復汝州為河南尹李成棄城遁走河南宣撫使岳飛遣應清與之㑹遂復永興軍甲辰故降授文州團練使王􅊅追復房州觀察使日厯及林待聘外制集並無􅊅所降州名今追考書之丙午御史中丞王次翁為參知政事武節大夫閤門宣贊舍人河南府兵馬鈐轄李興為右武大夫忠州團練使知河南府右承奉即知汝州劉全咨為右承事郎興旣得西京言於朝乞命帥守遂就除之仍給真俸許便宜行事全咨亦以驛報屢通故特遷之二人皆林待聘行詞今日厯獨無李興除命蓋秦熺所不取也丁未司農少卿李若虛自岳飛軍前計議還入見戊申上曰朕常與諸將論兵諸將皆謂敵人鐵騎馳突若在平原勢不可當須據險以扼之朕謂不然孟子曰天時不如地利地利不如人和兵之勝負顧人心如何耳茍人心協和則彼雖在平原亦可取勝諸將皆不以為然今諸將奏㨗皆在平原以歩兵勝鐵騎乃信朕前日之語秦檜曰陛下天資神武以人心論勝負非諸將之所能及也尚書都官員外郎歐陽興世為江南西路轉運判官旣而言者論興世儒雅自將而更任未久乃改知太平州己酉勑令所刪定官施鉅為尚書都官員外郎用從官應詔所舉也是日湖北京西宣撫使岳飛自與越國王宗弼戰於郾城縣敗之殺其裨將是役也綂判官楊再興單騎入敵陣欲擒宗弼不獲身被數十創猶殺數百人而退庚戌曲赦海州是日永興軍路經畧副使王俊遣綂領官辛鎮與金人戰于長安城下敗之初命川陜宣撫副使胡世將遣兵千人具舟百艘載柴草膏油自丹州順流而下至河中府焚毁金人所繫浮橋及選萬人由斜谷出潼闗皆以絶敵歸路世將奏已差綂領官閻興以五百人往㑹知丹州傅師禹知陜州呉琦知華州潘道及忠義綂制官傅起同措置斷毁河橋又臣前遣永興副帥王俊領選鋒四千人已復興平醴泉二縣永興之屬邑也今正與大敵相拒且當盛暑中傷者多未容更遣兵兼俊在彼可以乘間斷其歸路其後閻興至永興之外邑與俊㑹雖同師禹結到河東忠義秦海等千餘人皆補以官然亦不能成功王俊復二縣據日厯與辛鎮之㨗同以八月一日申刻未得本日辛亥左朝散郎河南府路轉運判官李利用主管台州崇道觀利用自西京遁歸至鄧州詔釋其罪利用乞奉祠許之壬子進士張本特補右迪功郎以其獻佑政編可採也本娶葛立方女不知誰所薦當攷癸丑太尉保成軍節度使殿前副都指揮使楊沂中為淮北宣撫副使武泰軍節度使沿淮制置使兼權知順昌府劉錡為淮北宣撫判官沂中自行在引兵出泗上御史臺言朝議奉直大夫見闕五十五員乞從上與放行磨勘詔吏部先次放行三十員乙卯左宣議郎王之道降一官送吏部與逺小監當差遣先是之道見河南用兵投匭上書言敵有五敗陛下有五勝雖敵且衆固無能為矣而我有未必勝者勝三又不可不知也且敵專事攘竊而陛下一本仁義此道勝也敵專務姦詐而陛下一本忠信此徳勝也敵起兵三十年用人如牛羊殺人如草菅而陛下視民如傷不憚屈已增幣俯約講和之請冀與天下休息此仁勝也敵自烏珠用事上則欺幼主以擅權下則殺親族以播虐而陛下夙興夜寐不忘父兄播遷之難此義勝也敵前後專以和親欺罔國家陛下頃縁王倫為地復與之和當是時下而樵夫牧子皆以敵為得計而陛下失計然和必至於變無可疑者但變速則禍小變遲則禍大今敵曾不二年無故敗盟引兵入犯臣然後知敵人今為失計而陛下今為得計此計勝也陛下有此五勝固可以勝矣然以臣觀之未見其必勝之理何則今諸軍大㑹境上而不置綂師一也國家用兵十有六年矣士卒之𨽻諸將者不為不親附而罰終不行二也今日之兵𨽻張俊者則曰張家軍𨽻岳飛者則曰岳家軍𨽻韓世忠者則曰韓家軍相視如仇讎相防如盜賊自不能奉公惴惴然惟恐它人之奉公而名譽賢於已也自不能立功惴惴然惟恐它人之立功而官爵軋於已也且其平日猶或矛盾若此使其臨大利害安能保其不能為敵國邪此其三也臣願陛下自謀諸心選擇耆徳素負天下之望者謀及龜筮謀及士庶授以斧鉞俾綂六師自閫以外咸得專之臣見一戎衣而天下定不得專為有周美矣願陛下斷自宸衷而必行之疏入詔之道降官依衝替人例言者論之道恣睢妄行全無忌憚旣薦舉大臣復擬制詞併上小人狂率一至於此乞盡奪見所有官編置逺方以懲不恪故有是命右武大夫忠州刺史兼閤門宣贊舍人應天府路兵馬鈐轄淮西宣撫司雄勝軍綂制宋超為親衛大夫忠州防禦使知亳州用張俊奏也湖北京西宣撫司都綂制王貴綂制官姚政及金人戰於頴昌府敗之初岳飛以重兵駐頴昌欲為久駐之計㑹張俊自亳州南歸金人謀知飛孤軍無援於是併兵以禦飛飛不能支告急於淮北宣撫判官劉錡錡遣綂制雷仲出兵牽制抵至太康縣是役也飛將官楊再興王蘭髙林皆戰死獲再興之屍焚之得箭鏃二升㑹天大雨溪澗皆溢敵騎不得前官軍乃退此以趙牲之遺史岳侯傳淮西從軍記參修丙辰詔内侍陳腆送大理寺治罪腆勞劉錡于順昌錡以例書送銀五百兩例外又以六百五十兩遺之腆不以聞故抵罪庚申尚書左司員外郎薛弼充秘閤修撰知䖍州向子忞旣罷弼不自安引嫌求去向子忞事己見六月乙丑乃命出守壬午右武大夫忠州防禦使兼閤門宣贊舍人馬秦為泉州觀察使兩浙西路馬歩軍副總管仍賜錢萬緡田十頃第一區秦至行在上召對遂有是命直秘閤淮南西路轉運副使李仲孺陞直敷文閣充淮北宣撫判官隨軍轉副使是日湖北京西宣撫使岳飛自郾城班師飛旣得京西諸郡㑹詔書不許深入其下請還飛亦以為不可留然恐金人邀其後乃宣言進兵深入逮敵已逺始傳令回軍軍士應時皆南鄉旗靡轍亂飛望之口呿而不能合良乆曰豈非天乎金人聞飛棄頴昌去遣騎追之時飛之將梁興渡河趨絳州綂制官趙秉淵知淮寜府飛還至蔡命綂制官李山史貴以兵授之遂遣諸將還武昌飛以親兵二千自順昌渡淮赴行在於是頴昌淮寜蔡鄭諸州皆復為金人所取議者惜之岳侯傳云侯在郾城聞烏珠竝韓將軍等人馬退去汴京侯欲乗勢追擊奏曰臣聞漢有韓信項羽投首蜀有諸葛二主復興臣雖不才所望比此乞與陛下深入敵境復取舊疆報前日之恥伏望陛下察臣肝膽表臣精忠表到秦檜大怒忌侯功髙常用間謀於上又與張俊楊沂中謀乃遣臺官羅振奏兵微將少民困國乏岳某若深入豈不危也願陛下降旨且令班師將來兵強將衆糧食得濟興師北征一舉可定雪恥未晚此萬全之計時侯屯軍於穎昌府陳蔡汝州西京永安前不能進後不能退忽一日詔書十三道令班師赴闕奏事按羅汝檝此時為殿中侍御史傳所為臺官乃汝檝也甲子復釋奠文宣王為大祀用太常博士王普請也於是祀前受誓戒加籩豆十有二其禮如社稷乙丑户部請州縣出納官物毎千增收頭子錢十文赴左藏為激賞之用許之通舊為四十三文乾道元年十月戊子又添十三文至今為例今年九月辛酉臨安府火注朱勝非閑居録所云秦檜科激賞錢事恐與此相闗右丞務郎京東淮東宣撫使司書冩機宜文字曹霑為右宣義郎賜六品服武功大夫武春領威州刺史時韓世忠遣霑等獻山王之俘於行在故以命之仍詔押山回世忠軍隨宜區處山隨金人至順昌城下者也秦檜請今後獲敵不必解來上曰不然須令押數人來問之庶得其實是日金人遣翟將軍圍趙秉淵於淮寜府李山史貴及劉錡軍綂制官韓直共擊追之秉淵聞岳飛已去遂棄城南歸日歴八月六日丁丑申刻趙牲之遺史亦以為丁丑日事恐誤丙寅太常寺奏大禮祭服事上曰朕嘗攷三代禮器皆有義後世非特制作不精且失其義朕雖艱難亦欲改作漸令復古上又曰艱難以來秘書省舊書散亡今所藏甚少不稱設官之意朕近日多訪得古書當令館職校正别録本付省中藏之時大樂亦乆廢詔太常肄習於是太常丞周執羔輯舊聞閲工器而樂始備執羔弋陽人也詔契丹千户耶律温特補武翼大夫忠州刺史賜金帶温降於淮西宣撫使張俊故以命之俄賜姓趙用為殿前司將官温賜姓在是月己巳尚書省奏禫服人胡寅狀寅於先父諡文定為世適長子服母李氏繼母王氏喪各齊衰服祖父母喪各期今來服先父喪禫服昨紹興六年正月先父得微疾初委寅以承家主祭之事於四月内收建州鄉人劉勉之書責寅不歸見世母升堂而拜以盡融融洩洩之意世母者先父同堂三兄之嫂也先父震怒所患遂増作辯論一篇以授寅二弟及三兄之子見任建州教授憲又授大指令寅荅書以曉勉之寅請曰升堂而拜融融洩洩母子事也勉之安得此言先父曰此欲離間吾父子也汝祖母於汝始生收而存之即以付吾吾時年二十有五婚娶之初孰云無子而洎爾母氏劬勞顧復以逮長立遂承宗祀亦惟不違汝祖母愛憐付託之重於汝之大義本末如此汝他日於世母當厚有以將意而己寅自是請問情義曲折至於再三先父所告曽不越此且曰汝於吾言未能一聞而信則以勉之離間之言為是乎今來寅禫制將畢遂還建州省覲世母以遵先訓又聞諸道途得鄉曲議論謂寅於此時當為三伯父追服此寅所不禀於先父者也若據而行之則士大夫謂寅伸其私意干貳正綂非為人後之實若斷而不用則士大夫謂寅忘其世父故匿服紀將加以不孝之名雖仰奉義方不敢違背而參稽衆說必有折衷伏望敷奏取㫖下禮部太常寺定奪明降指揮詔禮部定奪申尚書省或曰寅之始生也其母拯而字之故寅有收存之語云勉之已見八年四月丁卯右諌議大夫何鑄為御史中丞戊辰顯謨閣直學士提舉江州太平觀魏憲卒庚午右承議郎通判順昌府汪若海特遷一官以陳規言圍城之初若海毅然請援于朝也若海移書輔臣耳言劉錡之勝且謂錡所綂不過二萬人其中又止用五千人出戰今諸大將所綂甚衆使乘錡戰勝之後士氣百倍之際諸路並進烏珠可一舉而破甚無難者今諸大帥惟淮西最務持重不肯輕舉宜以淮西之兵塞其南窺之路俾京西之兵道河陽渡孟津淮東之兵巻淮陽渡彭城俾陜西之兵下長安淮蒲坂則河朔之民必響應冠帶而共降烏珠可不戰禽也聞淮西之帥得亳便還義士莫不嘆息甚為朝廷惜之武功大夫忠州團練使兼閤門宣贊舍人新知辰州柴斌移知唐州東京留守司効士夏頴達等六人脫身來歸詔免文解一次差充諸州効士辛未金將呼紐引兵攻盩厔縣永興軍路經畧副使王俊逆戰於東洛谷却之時上以親札賜川陜宣撫副使胡世將言今日事勢以力保闗隘為先又陜西將士與右䕶軍不同正當兼容有仗義自奮者優奬之以勵其餘於是世將奏川口諸隘及梁洋一帶先已修畢見分遣呉璘在白石至秦州以來遏熈秦之衝楊政在寳雞遏永興鳯翔之衝及永興副將王俊亦在盩厔作寨牽制敵勢兼自金人再犯陜西諸曾受偽命並許收使如能立功就上超轉縁從偽旣久率望風拜降臣亦開其自新之路多方慰諭已招到一萬一千五百餘人總管傅忠信安撫朱勇將官梁柄及綂制綂領官各給袍帶其老幼居於近裏又有總管魏价管十四員帶城寨丘一千五百亦加勸奬官各授差遣卒各支請給與右䕶軍相參為用矣時朕在寳雞薩里罕隂遣客刺政詐為降卒政覺而誅之初知商州邵隆奏本州密近陜西乞增戍朝廷下其議是月川陜宣撫副使胡世將命環慶經畧使知金州兼節度制商州范綜濟師綜言金川闗隘四十餘處皆係要衝比之商州去金人尤近止合量度事宜𦂳慢如敵果來侵犯當併力捍禦於是止遣左部第九將官兵八百四十餘人分錢糧與之而已八月壬申朔左通直郎何若為秘書省正字若江寜人也詔秘閣修撰提舉江州太平觀張九成與知州軍差遣左奉議郎喻樗左奉議郎陳剛中令吏部與合入差遣尚書刑部員外郎凌景夏秘書省正字樊光逺與外任差遣臨安府司户參軍毛叔度與對移一般差遣先是九成等皆言和議非計及是秦檜將罷兵而九成家臨安之外邑故斥逺之尋以九成知邵州剛中知安逺縣景夏知辰州光逺為閬州州學教授叔度為嘉州司戸參軍剛中尋卒于貶所陳剛中送胡銓啟已見紹興八年十一月毛叔度奏劄已見九年十二月更不别出剛中知安逺縣據胡銓跋和議詔書叔度對移嘉州據紹興正論日歴盖無有也同日降㫖又有元益對移一般差遣未知益為何官所言事謂何當攷左中奉大夫直徽猷閣淮西宣撫司參議官史愿進一官陞直龍圖閣昌州刺史江南東路馬步軍副總管張子蓋為登州防禦使以其來獻㨗也癸酉右朝議大夫直秘閣范直方試司農卿兼淮北宣撫司謀議軍事右朝奉郎監尚書六部門吕希常為刑部員外郎甲戌監察御史万俟卨行右正言故左武大夫吉州刺史綂制涇原路軍馬張逵加増開府儀同三司逵中孚父也靖康間救太原死於陣至是中孚請而命之乙亥詔兩浙轉運副使權添嵗舉改官各五員俟將來車駕還都日如舊用副使黄敦書請也是日韓世忠圍淮陽軍命諸將齊攻之帳前親隨武翼郎成閔從綂制官許世安奪門而入大戰於門之内閔身被三十餘創世安亦脛中四矢力戰奪門復出閔氣絶而復蘇者屢矣世忠大賞之别將解元掩擊金人於沂州譚城縣按此句與北盟㑹編同宋史韓世忠傳作譚城無沂州字地理志皆不載敵溺死者甚衆及班師世安以箭瘡不能騎遂肩輿而歸世忠怒命世安馬前步行世忠奏閔之功授武徳大夫遥郡刺史閔衛州人世為農建炎初避亂抵京口曰者趙常見而竒之黃天蕩之役閔投世忠軍中至是有功投韓世忠乞重賞以勸將士遂除涿州團練使丙子左朝散郎劉昉為荆湖南路轉運副使昉為秦檜所喜故薦用之戊寅詔左迪功郎李彭年旌表門閭彭年廣徳人父母皆死於盜彭年蔬食飲水終身不御酒肉郡上其事於朝故有是命南平軍言隆化縣射士呉沂廬墓詔賜束帛是日知陜州呉錡遣綂制官侯信渡河刼金人中條山寨敗之獲馬二十匹翌日又戰於解州境上敗之殺其將茂海己卯宰執奏徽宗隨龍人乞恩例上曰若舊人尤當優恤凡事干徽廟非唯朕奉先之孝所當自致亦欲風勵四方使人知有君親之恩也庚辰金人自滕陽來救淮陽軍韓世忠逆擊於泇口鎮敗之是日世忠所遣綂制官劉寳郭宗儀許世安以舟師至千秋湖陵逼金人所遣酈瓊叛卒數千人寳等與戰大㨗獲戰船二百壬午李成自河陽以五千騎犯西京知河南府李興命開城門以待之成疑不進興遣銳士自它門出擊之成敗走癸未上與宰執論戰守之計上曰戰守本是一事可進則戰可退則守非謂戰則為強守則為弱但當臨機應變而已中書舍人王鉌起居舍人兼實録院檢討官張嵲並兼侍講甲申川陜宣撫副使胡世將言臣被㫖因軍事合行黜陟陞轉張浚所得指揮施行臣自承指揮其餘諸般差注陞轉等事即不敢干預所有節次縁軍事便宜差過官乞下有司給降付身從之乙酉直徽猷閣主管台州崇道觀張滉知撫州右朝奉郎主管台州崇道觀鮑貽遜知楚州言者奏其貪酷不可用罷之丙戍左奉議郎充秘閣修撰新知邵州張九成落職御史中丞何鑄言九成矯偽之行頗能欺俗前此趙鼎當國傾心附之驟從閑曹躐登華近比其罷退九成悒然不樂率先求去誓與之同出處伏望嚴行竄責故有是命九成以家艱不赴奉國軍節度使知永興軍兼樞密院都綂制節度陜西諸路軍馬郭浩知䕫州此除似因胡世將奏浩難以責成之故當求它書參考丁亥淮北宣撫副使楊沂中潰軍於宿州初沂中至宿州而以步軍退屯於泗金人詭令來告以有敵騎數百屯柳子鎮沂中以為信欲擊之或諫以為不可輕出沂中不聽畱統領官王滋蕭保以騎兵千人守宿州夜沂中自將騎兵五千襲柳子鎮至明不見騎而還金人以重兵伏其歸路沂中知之遂横奔而潰沂中至壽春府渡淮而歸與保滋相隔參議官曹勛不知沂中所在表聞於朝朝廷大恐令淮南州縣權宜退保金人刼沂中不得志遂犯宿州滋保與戰不利金人入城怒州人之降也乃縱屠戮自是潰兵由淮河上下數百里間三三兩兩而歸其死亡者甚衆旣而沂中自淮西復還泗州人心始定保襄樂人也王滋紹興十二年五月庚申以武功大夫貴州刺史殿前司前軍統制陞帯淮東馬歩軍副總管蕭保同日以右武大夫英州刺史殿前司右軍統制陞帯京西南路兵馬鈐轄不知此時為何官職也淮南退保事今年九月甲寅所書㤗州奏請及九月丙子所書祝永之除官事可以參照或可移附甲寅王曮撰存中神道碑云烏珠再入犯詔王以淮西宣撫使禦之卽渡江取虹縣復靈壁下符離撫定而還其言簡畧如此蓋諱之也又按上書今年閏六月丙戌王徳下符離七月癸丑沂中方除淮北宣副在其後二十七日曮所云恐誤戊子監登聞檢鼓院虞澹面對言國家置檢鼓院所以廣言路通下情顧逺方士人往往肆意鼓言上凂宸聽至如登用大臣謀任元帥茲實人主之職豈一介當輕議望令檢鼓兩司將甲令所載名件分明揭示使之曉然皆知朝廷延納之意在此而不在彼自今凡有獻陳必與保人偕來遂院監官躬親審之如依得祖宗事目亟為進呈庶前日狂妄之習自息從之己丑權尚書吏部侍郎兼實錄院修撰范同試給事中起居舎人兼實録院檢討官兼侍講張嵲試中書舎人秘書少監張宦守起居郎直秘閣李易守起居舎人祠部員外郎兼實録院檢討官朱翌試秘書少監名福州處士周朴廟曰剛顯用帥臣張浚請也黄巢入福州市得朴將用之朴曰我為處士尚不仕天子安能從賊巢怒斬朴邦人至今祠之辛卯右承事郎蘇籍為太常寺主簿填復置闕籍軾孫也壬辰直龍圖閣知臨安府蔣璨與直秘閣兩浙轉運副使張滙兩易直徽猷㤗㤗鳯等路提㸃刑獄公事宋萬年陞直顯謨閣知慶陽府金人之犯慶陽也帥臣范綜未赴而萬年攝守事率厲軍民為固守計宣撫副使胡世將言於朝故有是命時直秘閣潼川府路轉運副使喻汝礪以書遺世將言金人貪戾猜禍之國屬者竊聞敵積粟於鞏又積粟於岐其所以為此者蓋欲以謀蜀也今敵已窺慶臺之疆兼雍州之地則蜀之於敵壤近而患急矣望急遣一介之使請於朝廷詔岳少保與蜀相首尾萬一敵騎陵忽則使荆鄂走精鋭出襄漢薄金洋以壓敵後彼敵雖悍又安敢睨蜀世將以為然是日永興軍路經畧副使王浚擊金人於盩厔縣東敗之甲午詔曽任職事官合得封贈而去官在大禮前者不問久近如非降責竝與封父母一次用言者請也川陜宣撫司同統制軍馬邵俊統領王喜遇金人於隴州汧陽縣牧羊嶺敗之喜以功復為恊忠大夫榮州防禦使右遊奕軍統制丙申武功大夫忠州刺史兼閤門宣贊舎入殿前司勇勝軍統制新知宿州王進兼京東路兵馬鈐轄丁酉右奉議即孫汝翼為國子監主簿右奉議即李澗為宗正寺主簿竝塡復置闕戊戌詔皇太后母益國太夫人宗氏特追封兩國夫人右朝請大夫新京東路提㸃刑獄公事陳吉老直秘閣知揚州旣而吉老不赴乃命右武大夫忠州團練使知眞州劉光逺代之光逺之除日厯不見當求本州題名考其月日庚子親衛大夫忠州防禦使知毫州宋超除名勒停張俊軍前自效先是金人犯毫州超棄城走提轄官魏經率軍民拒守城陷經不屈死之故有是命後贈經閤門宣贊舎人官其家二人魏經十一月戊午推恩九月壬寅朔遣起居舎人李易赴韓世忠軍前議事宰相秦檜主罷兵召湖北京西宣撫使岳飛赴行在遂命易見世忠諭㫖時淮西宣撫副使楊沂中還師鎭江府三京招撫處置使劉光世還池州淮北宣撫判官劉錡還太平州自是不復出師矣乙丑右朝奉大夫知卭州何掄為成都府路提㸃刑獄公事丙午左宣教郎鄭昌齡為太府寺主薄丁未常任秩為司農寺主薄蔣及祖為將作監主簿竝塡復置闕及祖之竒孫也任秩及祖未知以何官除本監題名及祖十二年十一月除知江隂軍本寺題名不見任秩遷罷當攷是日楊政軍同統制楊從義刼金人鳯翔府城南寨敗之獲戰馬數百戊申金人復入西京先是李成數為知河南府李興所敗乞師於都元帥宗弼得蕃漢軍數萬興聞之度衆寡不敵棄城去寓治於永寕之白馬山己酉上諭大臣曰朕昨面諭岳飛凡為大將者當以天下安危自任不當較功賞彼以功賞存心者乃士卒所為至於朝廷待大將亦自有禮如前日邉報之初除諸將便加師保豈少待有功乎若必待有功而後進官所以待士卒輩也時飛已至行在故上訓及之庚戌合祀天地於明堂太祖太宗竝配赦天下右正言万俟卨言今邉隅未靖宜復勇爵以厲爪牙之士蹶張超拒之流而專補文質非是時將帥皆以文人禄其子故卨有是言不從癸丑親衛大夫華州刺史統制忠義軍馬李同為忠州防禦使永興軍路馬歩軍副總管知同州兼沿邉安撫使同故守蒲城不肯䧏敵故胡世將奏用之楊政軍統制官楊從義邵俊統領王喜敗金人於汧陽甲寅㤗州奏乞移治㤗興縣沙上許之楊沂中軍潰許淮南州縣退保或可移附此曰乙卯尚書工部員外郎高頴試司農少卿兼胡北京西宣撫司參議官岳飛請之也日歴不書兼參議此據本寺題名直徽猷閣陜西轉運副使霍蠡坐擅離職守及収受饋送落職監筠州新昌縣酒税其饋送仰歸還丙辰右朝請即京東淮東宣撫處置使參議官劉阜民直秘閣阜民自軍中來奏事以例除也同日有旨陳桷除落過名按桷自右文殿修撰京東淮東宣撫處置司參謀官落職監澧州酒務丁憂不赴明年二月庚辰以舊官職朝見或卽是此時復職也丁巳詔川陜改官人許就宣撫司放散舉主申吏部驗實給告用成都府路安撫使張燾請也張浚之為宣撫使也令於所在州保明放散胡世將為副使乞收還省部吏部侍郎周綱言川陜道逺乃令赴遂路漕司公參理為到部至是因燾有請遂以其事付宣撫司焉秘書省校書即范如圭主管台州崇道觀從所請也辛酉臨安火延燒省部倉庫翌日輔臣奏事上曰累令撤蓆屋作瓦屋皆不奉行朕已戒内侍如敢不行比衆罪當加重卿等更戒諸房吏亦依此若内侍堂吏奉行則又不敢違矣朱勝非秀水閑居錄云趙鼎淮上用兵以三百萬緡入三省激賞庫秦檜繼相用術尤精九年金人還河南故地檜託言計備使禮凡常賦之入多歸此帑此時所獻日月増厚而賜賚便蕃權勢熏灼綫履每兩二十餘緡月至數兩至是庫金出入輕於州郡公庫矣用度旣廣賦入不繼十年下令云舉兵擊敵須備犒賞計畆率錢徧天下五等貧民無得免者所斂號激賞而兵未嘗舉百姓尤以為怨十一月火作首焚三省庫中所積一夕而盡不復根治悉行除破蓋侵取旣多見物無幾幸火以滅迹無復稽考者也臨安之火日厯不書而時政記於九月壬戊書稿設救火諸兵則非十月事也日厯十月六日丁丑臣僚上言每當宗祀之秋必有警戒之象今又大火示變益知當在九月不疑今併附此更須參攷於是參知政事孫近律言拆去草屋寛畱地歩詔限五日後亦不果行焉紹興十一年七月八日甲辰臣中上言去年臨安遺火延燒府庫參知政事孫近首建言拆去草屋寛留地歩致朝旨限五日毁拆及知府俞俟取稟近復云未得毁拆待近再取旨蓋朝天門一帯多堂吏所居故也姑附此當考壬戌言者奏頃年獻議之臣有以審量之説而凂我徽宗者書之史册又足以虧陛下孝治之風比者特罷審量士大夫莫不歡呼鼓舞以手加額欲望特降睿旨小使臣因泛濫補官人如已經關陛許注親民仍令收使分數思例從之自是靖康一來討論審量之法盡廢矣兩日乃何鑄万俟卨上殿此請未知出於何人當考直秘閣知臨安府張匯復為兩浙轉運副使直秘閣知揚州俞俟知臨安府直徽猷閣兩浙轉運副使蔣璨為江南西路轉運副使癸亥上曰朕觀自昔守令能抑强振弱者始號循良今豪家稍不快意必中傷之自今縣吏有能稱而或誣以非辜者須朝廷主張庶使吏得自効而民被其惠矣乙丑詔獄官縣令不親定牢者徒二年著為令丙寅右通直郎知無為軍祝永之特貶秩三等先是永之乞移治江南詔不得越境已而永之以書抵朝士言兩淮之民方且歸業若䧏移治指揮民間惶惶莫知所向樞密院言其鼓惑衆聽故責之此亦與今年八月丁亥所書楊沂中軍潰事相闕戊辰奉國軍節度使新知䕫州郭浩移知金州仍舊帯行永興軍路經畧安撫使兼樞密院都統制節制陜西河東軍馬兼措置河東路忠義軍馬親衛大夫貴州團練使知金州范綜移知綿州仍舊帯行環慶路經畧安撫使兼錦威茂州石泉軍沿邉安撫使後宫劉氏為紅霞帔十三年六月甲午轉司記十六年五月戊寅遷才人十七年二月己酉遷媫妤二十三年五月壬子遷婉容二十四年正月丁丑封貴妃左中大夫劉大中以憂免至是卒詔復資政殿學士致仕右正言万俟卨奏大中罷歸益懐怨憤幽囚其父壹鬰而殞遂請之旣而遺表上増左正奉大夫官子孫如故事言者又駮之乃止大中復職在十月壬辰贈官在十一月戊戌駮奏在己酉今併書之以見秦檜用意曲折辛未尚書右僕射秦檜以明堂恩封華國公皇兄嚴州觀察使權主奉益王祭祀安時特遷寜逺軍承宣使於是親賢宅宗子十人並進官是月金主亶殺尚書右丞相陳王希尹右宰相蕭慶先是客星守陳太史以告宇文虛中虛中以告希尹不以為怪及是坐誅初希尹與慶在兵間皆晉國王宗維腹心而都元帥越國王宗弼素出其下至是宗弼得權凡希尹所以致罪則宗弼之罪也苗耀神麓記古新母姙三十箇月而生名曰古新乃三十也身長七尺餘言如巨鐘創造女眞文字軍旅之事暗合孫呉初烏珠往祁州帥府已朝辭衆官餞於燕都烏珠甲第夜䦨散歸惟古新獨留嗜酒嚙烏珠首曰爾䑕輩豈容我嚙哉肅之軍馬能有幾何天下之兵皆我有也烏珠佯醉如厠急走騎告秦國王宗幹云兄援我宗幹與古新素厚遂言語遮䕶之古新實有酒豈可信哉烏珠出次早以辭皇后為名泣告皇后如前后曰叔且行容欵奏帝爾烏珠遂行后具此語告東昏使烏珠親弟燕京留守紀王阿嚕追烏珠至良鄉及之烏珠至宻奏帝曰朕欲誅此老賊久矣奈秦國王方便援之至此自山後沿路險阻處今朕居止善好處自作巴納凡我骨肉不附己者必誣而去之自任其腹心於要務姦狀己萌惟叔自裁之是夜詐稱密詔入固新所居執而數之賜死四子並蕭慶父子皆被誅希尹旣死徒黨連坐者數百人奉使徽猷閣待制洪皓嘗與希仲持論㡬被刑宗弼知之故不死金主亶遂進宗弼爲太𫝊尚書左丞相兼侍中監修國史領行臺尚書省事都元帥如故以洪皓記文張滙節要熊克小歴參修官弼所除官據紹興講和録明年九月烏珠第一書繪銜如此建炎以來繫年要録巻一百三十七
