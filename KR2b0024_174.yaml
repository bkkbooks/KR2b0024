body:
  text: 建炎以來繫年要録卷一百七十四宋李心傳撰紹興二十有六年八月庚午朔樞密院檢詳諸房文字陳正同為中書門下省檢正諸房公事尚書吏部郎中葛立方守左司郎中尚書吏部郎中汪應辰守右司郎中右朝奉郎齊旦特追兩官勒停旦嘗提舉淮東常平茶鹽公事既罷去代者朱冠卿奏其在任一年半失陷錢課共為錢二百八十六萬餘緡又不法十五事朝廷委官究實乃黜之辛未尚書司封員外郎劉章為樞密院檢詳諸房文字左朝奉郎知太平州章厦提舉江州太平興國宫從所請也右朝奉大夫新知秀州向伯奮言臣嘗觀一州一路之間無不以財用為先催科之急民大受弊望特委近臣取諸路州軍每年用度出入之數稽其失陷革其妄用有餘者取之不足者稍蠲以子之以入制出皆使粗給尚有敢非理擾民者重置於法則斯民受無窮之賜詔戶部看詳申省其後本部言欲委諸路轉運司行下所部州軍遵依見行條法常切鈐束不得非法科擾及取見行州軍財賦每年支收出入實數稽考有無侵欺失陷輕費妄用開具供申省部審實參酌施行從之壬申宰執進呈大理寺主簿郭淑轉對論差役事上曰自有成法不須更改今祖宗法令無不具備但當遵守比來輪對及之官得替上殿官多是無可奏陳致有率意欲輕變成法有司看詳尤宜詳審朕觀漢史曹參遵蕭何畫一之法而漢大治蓋何所定律令既已大備若徒為紛更豈所謂治道貴清淨耶吏部狀紹興令諸奉制書權攝職任者許舉官他郡官在所部權攝而非制書所差者不得薦舉紹興二十五年續降指揮諸路應兼權監司並許依正官例薦舉內權職司之人許作職司收使今來諸路監司往往差足其前件指揮難以遵用欲依舊法施行從之癸酉右承議郎程昌時知桂陽軍代還論州縣科配被於細民而不及豪右上謂大臣曰科敷不均最為民害出榜之說朝廷纍有指揮唯是官吏為姦恐民間盡知數目不得而欺隱所以不肯出榜耳上又曰臨安民有納本戶絹一匹被退因詢之云官中以不經攬戶不肯交朕令人用錢五千五百買之乃好衣絹已令韓仲通根治近在輦轂尚爾外方想不勝其弊也祕書省著作佐郎趙逵周麟之並為著作郎戊寅右正言凌哲論改官之法行之既久不能無弊憸巧之徒不顧廉恥多行賄賂凡可以得利者無所不為薦章一紙隂求先容有費及五六百千者欲革而正之以增考第减舉員為救弊之術上謂大臣曰祖宗舊法未易輕改在祖宗朝凡事悉本仁恕未嘗真決一士大夫惟於贓罪則不貸蓋以贓罪害及衆不可不治故在法所舉之人犯贓舉主當與同罪然自來不曽舉行故人不知所畏但嚴舉官之令有犯者必與施行則人自知畏前弊自可革恐未須便改法沈該等曰陛下察見弊原如此臣等謹當遵禀詔敷文閣直學士秦塤左承事郎鄭時中秦焴左承務郎秦焞左迪功郎沈興傑所帶階官並易右字左宣義郎曹冠左從事郎周寅左迪功郎鄭縝並駁放先是左承議郎提舉淮南東路常平茶鹽公事朱冠卿應詔上書論故相當權不遵祖宗故事科舉雖存公道廢絶施於子孫皆置優異之選又私於族裔親戚又私於門下憸人穢夫前舉一榜如曹冠秦塤周寅鄭時中秦焞鄭縝沈興傑秦焴凡有八人其間乳臭小兒至於素不知書全未識字者濫竊儒科復占省額欲乞於曹冠等階官以右易左俾正流品却將向來侵取人數復還今舉省額詔侍從臺諌同共看詳申省取㫖於是戶部尚書韓仲通等言冠卿所奏物議甚當委可施行右正言凌哲言稽之師言誠為允當御史中丞湯鵬舉言冠卿所請於祖宗條制别無更改委得允當但以有官人赴試者合帶右字如無官人赴試者合行駁放中興聖政云其後又駁放曹緯一名然後以前榜侵取之數於後榜收使庶協公論故有是㫖曹冠乾道五年第二甲第七人再及第庚辰詔諸路常平官參照吏額立定申尚書省御史中丞湯鵬舉論州縣增置吏額紛張生事吏日益富民日益貧乞委常平官躬親出巡視州縣繁簡分為上中下三等立定合置吏額內有嘗經編配放停之人並不許收敘故有是命時浙東一路吏額踰四千人左朝奉郎提舉本路常平茶鹽公事趙公稱首奏損其半上嘉之十二月己酉公稱言本路吏額四千二百六十一人减二千一百九十三人今併書之國子録周操為太學博士兼武學博士右朝議大夫知楚州陳機為淮南路轉運判官兼淮南西路提㸃刑獄公事左朝散大夫主管台州崇道觀孟處義知楚州左宣教郎劉珙主管台州崇道觀珙始以忤秦檜被斥至是得祠龍神衛四廂都指揮使建武軍承宣使鄂州駐劄御前選鋒軍統制董先以病乞離軍罷為江南西路馬步軍副總管永慶軍承宣使提舉佑神觀朱孝莊卒辛巳詔滁州合起上供錢權以六分為額先是淮南轉運副使蔣璨奉詔保明楚州盱眙軍並免起稅十年報可今年五月丙辰得㫖至是璨又言滁州見今已起上供八分委實無所從出乞與蠲免十年而戶部言本州每年合發錢並已起足顯見財賦可以應辦今來所乞難行及進呈乃有是命孫覿撰蔣璨墓志云公在淮南奏言二淮洊經兵火公私掃地滁小州尤為窮陋獨有上供錢尚著版籍中戶部移文督責無虛月積二十年終不得一錢徒費紙劄且有詔蠲之按此所云與日歷全不同按戶部狀則滁州自紹興二十三年方起上供至此才四年乃云積二十一年不得一錢又其誤矣直徽猷閣兩浙轉運副司張匯直祕閣兩浙轉運副使陳璹並進職二等與在外宫觀以引疾有請也右朝請大夫新荆湖南路轉運判官李邦獻直祕閣新知秀州張稱並為兩浙路轉運判官壬午上諭大臣曰新除二漕臣卿等可召至堂中面諭與近屢降寬恤事件令遍詣所部賦稅之足否財用之多寡民情之休戚官吏之勤惰悉加訪問如有奉行不䖍職事不舉者並按劾以聞庶幾可以警動諸路使皆知所視效癸未宰執進呈淮南漕司具到米價最賤處每斗一百二三十文上曰昨聞淮南米賤朕恐傷農故欲乘時收糴以惠民今米價如是則米須急候價减每石亦不下一千至時若戶部無錢朕當自支一百萬緡令收糴也祕書省正字張震通判荆南府甲申言者乞令侍從官考察縣令政績上曰此不須行侍從何緣遍知縣令能否兼已委逐路監司考察聞奏矣上又曰大率賞罰須當並行政治顯著者即與升擢無狀者即與降黜則善惡知所勸沮尚書省勘㑹右朝請郎提舉廣南市舶邵及之係曹泳所薦今來輒敢沮抑蕃國入貢與帥臣不和詔放罷時三佛齊國請入貢廣東帥臣折彥質為請而及之多沮抑之故罷是日鎮江府發解舉人而閩人有冒貫者舉人周晉等持梃欲擊之守臣直祕閣林大聲率府寮往視為飛石中其幘吏士有被傷者大聲即捕舉人十八人屬吏事聞詔停舉令金部郎中總領淮東財賦董蘋審問晉遁去其徒顧作猷等皆坐編管殿舉有差其後右正言凌哲奏舉人喧競蓋大聲遣卒護送閩人冒貫激使之然於是大聲亦罷舉人行遣在九月丁卯大聲罷在十月庚戍今併書之乙酉沈該等奏今歲科舉極整肅有傳義挾書者皆扶出上曰朕於此事極留意異日宰執侍從皆於此途出豈容冒濫所謂拔本塞源也戶部郎中總領湖廣江西京西財賦軍馬錢糧逢汝霖入辭論常賦缺少留滯遂致總領所借用封樁失緩急枝梧之䇿望特降處分今後諸路監司州縣合應付大軍錢物如樁辦有缺少起發有稽違委總領所於逐歲比較將最稽違最缺少一兩處按劾奏聞乞賜施行庶為慢吏之戒從之汝霖又言州縣受納稅米取耗唯恐不多乃將在倉米斛出糴收其價直以資妄用望特降處分應係省米斛不得擅糴如委因闕乏事須出糴即具因依申轉運司待報施行仍令核實申戶部照㑹詔本部申嚴行下敷文閣待制知洪州閭邱昕卒丙戍左朝請郎知郢州李長民為江南西路提㸃刑獄公事左朝請郎通判臨安府王傳為廣南路提舉市舶丁亥詔刑部將見責降未敘復武臣檢舉申尚書省取㫖延福宫使寧逺軍承宣使入內內侍省押班李珂令再任戊子戶部言苗稅和買絹經總制錢等皆是常賦州縣為見朝廷纍降寬恤指揮免放積年缺負因此拘摧起發弛慢意復指擬免放竊慮有誤支遣欲令諸路監司催督依條限拘催起發仍從本部將去年驅磨違慢多處按劾取㫖重賜施行從之詔左迪功郎曹緯依曹冠等例駮放御史中丞湯鵬舉言緯係泳之姪於持祖母服中就試并與故相秦檜至親試官觀望濫中科第故也緯乾道八年再試第五甲第一百四人同進士出身己丑詔蠲建康府紹興二年以後至二十年終積缺內庫折帛錢二百三十三萬餘緡絹二十萬七千餘匹以守臣寶文閣學士張燾建言纍放以來積年拖缺歲久無所從出上特恩也按纍降指揮放缺至紹興二十二年而今燾所請乃紹興二年至二十年所缺不知何以獨不减也庚寅南平王李天祚遣太平州刺史李國以右武大夫李義武翼郎郭應五來賀升平獻黃金器千一百三十六兩明珠百沈香千斤翠羽五百隻雜色綾絹五十匹馬十象九詔尚書左司郎中汪應辰燕國以于玉津園遷國以太平州團練使義左武大夫應五武經郎加賜襲衣金帶器幣有差國以之來也資政殿學士施巨守靜江自詣驛與之為禮論者不以為是辛卯參知政事陳克俊罷為資政殿學士提舉臨安府洞霄宫以疾自請也克俊再執政才七十五日左朝散大夫景篪言四川絹直一匹不及五千而官估取十千他物之估率皆稱是去歲裕民所蠲减絹直不過作九千而已臣嘗計㑹四川總領司物帛估錢之數無慮六百萬緡今若蠲其虛估之數亦不過為緡錢三百許萬耳况昨降聖㫖已禁止餘財奇貨其數可以補之若有司尚以歲計為解如前所蠲瑣碎條目復其一二亦無甚害或但上等仍舊盡蠲二等以下戶亦實惠也詔戶部看詳來上後二日宰執進呈次上曰景篪所論須量與减損若第令看詳雖行下數十次何益莫若便令總領所契勘合蠲减數目具申朝廷庶幾民受實惠朕自即位以來如土木玩好邉事錫豫未嘗一有妄用凡以為民而已既而戶部言難以遙度乞令總領所量行裁减於昨來所取歲剩錢內通融應付從之明年三月己丑减放壬辰端明殿學士知廣州折彥質移知洪州癸巳詔入內內侍省使臣李唐卿王裕為禁中作過特降充祇候內品雖大赦不許收敘仍不得收充入內省此以紹興三十二年金安節繳奏唐卿等敘官狀修入未見事因甲午尚書吏部侍郎兼侍講兼權吏部尚書張綱參知政事右朝奉大夫王躍知純州乙未靜海軍節度使檢校太尉南平王李天祚為檢校太師功號加歸仁二字賜襲衣金帶鞍馬器幣以其來貢也中書舍人吳秉信試尚書吏部侍郎起居舍人兼權給事中凌景夏試中書舍人祕書少監楊椿權兵部侍郎兼國子祭酒祕書省著作郎趙逵試起居郎祕書省著作郎周麟之試起居舍人明州觀察使安定郡王令襟以病不能朝乞與在外宫觀迎奉燕王影貌任便居住從之丙申祕書省校書郎黃中為著作佐郎左從事郎沅州州學教授汪徹為祕書省正字徹浮梁人嘗為衡州州學教授不為秦檜所知及代還復置之沅州時万俟卨謫沅徹從之遊至是薦用丁酉宰執進呈右正言凌哲論上饒知縣李維秬不法上令放罷取勘上又曰近監司殊不舉職州縣官有犯臺諌論列得實監司亦不加罪自今有犯監司若不按發並當行遣或降官或放罷使之知畏諸路行遣三兩人則事無不舉矣御史中丞湯鵬舉言新除尚書吏部侍郎吳秉信欲援赦文而放還親黨私自好佛而唱賣祠部詔秉信充右文殿修撰知常州鵬舉又言新除中書舍人凌景夏自為右史每有面從退必後言詔景夏直龍圖閣知撫州祕書省校書郎王剛中為著作佐郎九月庚子朔奉國軍節度使開封儀同三司御前諸軍都統制知興州吳璘領御前諸軍都統制職事判興州自建炎以來未嘗有使相為都統制者故改命之璘嘗自著書號兵要大略謂金人有四長我有四短當反我之短以制彼之長蓋彼之所長曰騎兵曰堅忍曰甲重曰弓矢吾當集蕃漢所長而用之故以分隊制其騎兵以番休迭戰制其堅忍制其甲重則徑弓强弩制其弓矢則曰以逺剋近以强制弱其說甚備至於陳法有圖而無書焉詔自今州縣官贓私不法監司失按察者令刑部具名取㫖辛丑沈該等奏安南人欲買撚金線縀此服華侈非所以示四方上曰華侈之服如銷金之類不可不禁近時金絶少由小人貪利銷而為泥甚可惜天下産金處極難得計其所出不足以供銷毁之費雖屢降指揮而奢侈之風終未能絶須申嚴行之詔增置太學正録各一員左宣教郎劉天民為太府寺丞天民哲夫子也哲夫正夫弟故都水使者為湯鵬舉所愛自平江職官入朝得掌故而又有是命此為葉義問奏湯鵬舉交結事始癸卯權尚書禮部侍郎賀允中兼實録院修撰乙巳翰林學士陳誠之兼侍讀同知樞密院事左朝散郎新知惠州朱倬行國子監丞倬入辭乃有是命國子監主簿張監主管台州崇道觀以其父參知政事綱引嫌有請詔內外文武大小臣僚告身自今並依大觀格分十六等製造既而將作監請自內命婦遷轉封贈及外命婦郡夫人以上並不用綱袋及銷金從之丁未右朝請大夫新江南西路轉運副使榮薿直祕閣知臨安府左從政郎溫州州學教授史浩為太學正左迪功郎新興國軍司戶參軍陳良祐為太學録浩才從子良祐金華人皆以近臣薦其才而有是命戊申左迪功郎新平江府司理參軍陳㮤左從事郎新泉州州學教授陳豐並改差充敕令所刪定官亦用近臣薦也己酉祕書省正字汪徹兼實録院檢討官初潼川府路轉運判官王之望以制置司檄充類試所考試官至成都府境被朝命措置銅山縣銅事之望以朝廷専委辭考試遂徑至銅山行視得新舊銅窟二百餘其可採者十七所而已自政和中歲以三百八十六斤為額至是之望欲增為萬斤鄉民哀訴久之乃籍匠戶置場烹煉官為主之所得僅五百斤之望乃請歲以六千斤為額計綱赴行在遇閏增五百斤從之此以之望申省劄子修入劄子稱九月初十日徑到銅山縣己酉初十日也其申乞立額當在明年二三月間今聨書之庚戌戶部尚書韓仲通充敷文閣直學士知廣州太學博士何俌言今監司郡守遞相送遺公行博易月至千緡而間慢小官合得供給俸錢有纍月倚閣者望嚴行禁止如尚違戾重置典憲從之然迄今不能革也壬子內降詔曰四川軍儲供億民力不易深軫朕懷昨遣鍾世明措置裕民事雖已蠲放積缺减免折估等錢不住據州郡監司繼有申請及士民陳獻利害而去朝廷逺難以計度已専委許尹王之望同制置總領茶馬司公同相度措置其各體至意悉心條具以聞庶實惠得以及民調度可以經久尹之望時為潼川成都府路漕臣先二日有㫖令同三司條具限一季申省至是降詔詔諸路監司守臣條具到裕民事令給舍看詳以聞癸丑御史中丞湯鵬舉兼侍讀權尚書兵部侍郎兼國子祭酒楊椿兼侍講右朝奉郎鄒栩追毁出身以來告敕文字除名勒停送吉州編管栩知處州犯入已贓為右正言凌哲所按法寺當流三千里宰執以獄上上曰是入已贓否沈該曰據按是入已栩乃浩子上曰浩元祐間有聲稱其子乃爾遂蹙頞久之曰既犯贓法不當赦可特免真決仍永不收敘上又曰朕觀祖宗時贓吏多真決邇來殊不知畏卿等可令有司檢坐祖宗朝行遣贓吏條法下諸路先行戒諭使之曉然皆知祖宗立法之嚴自後有犯當依此施行必無少貸甲寅尚書省檢㑹天聖紹興真決贓吏指揮詔刑部鏤板行下自今有犯斷在必行決無容貸太學博士兼武學博士周操言前此武舉登科者除第一人朝廷與巡檢差遣外其餘例處以管庫窠闕使一旦舍其平日所習似非選練本意自今乞下樞密院措置髙者籍記姓名任滿有績即加擢用其次亦乞免充財榖之任使各以才武自效從之左奉議郎何麒充四川安撫制置司參議官左朝奉郎程敦厚充䕫州路安撫司參議官丙辰左宣教郎新無為軍軍學教授任質言充諸王宫大小學教授紹興府供職質言伯雨孫也先有詔召試館職而質言以疾辭乃有是命戊午詔自今用舉主改官關升人令吏部置籍被舉人犯贓其舉官具名取㫖施行如已被人論訟及它司按發臺諌論列即不許旋行首舉上以吏徇私受賕妄舉者衆故條約之己未右正言凌哲言諸路州縣將人戶畸零稅租依舊過數科催如納絹一寸便令納一尺榖米一勺便令納一升民輸十九之賦而官無一毫之增利専私室怨歸公上此何理也望申嚴州縣止據實數折納價錢及聽合鈔送納本色不得凖前過有科取以就整數仍委監司覺察按劾御史臺體訪論列人戶越訴施行從之然沿襲已久終不能革也庚申直祕閣知臨安府榮薿請對上謂大臣曰朕當諭以束吏姦即還商賈物貨及木植價錢勿留民訟如見得曲直即當面裁決其他如御膳之屬近來未嘗取辦雖用片紙亦不責其供應沈該曰今日天府之弊莫大於此三者陛下洞照曲折又不以供應責之愛民如此天下幸甚左迪功郎林之竒為祕書省正字辛酉國子監丞王晞亮請初出官人不得用綱賞免詮試從之晞亮莆田人也御史中丞湯鵬舉論大理少卿章燾猥陋無恥交結魏良臣近治臨安府再置猪羊圈恣為出入詔放罷壬戍尚書刑部郎中楊葵為大理少卿武翼郎張掄特遷武翼大夫貴州刺史以昨差奉使未曽推恩故也甲子知樞密院事湯思退言祖宗舊制樞密院有聖語則副使録之比歲不舉行欲依舊制聞語恭即書記同時政記上進降付史館從之御史中丞湯鵬舉言西清次對超躐禁從所以褒有德而顯有功也謹按敷文閣直學士秦塤敷文閣待制秦堪敷文閣待制吳益皆以庸瑣之才恃親昵之勢可謂無功無德者也其可直西清而充次對乎伏乞鐫褫職名示天下以至公之道詔鵬舉所論甚協公議然朕以秦檜輔佐之久又臨奠之日面諭檜妻許以保全其家今若遽奪諸孫與壻職名不惟使朕食言而於功臣傷恩甚矣可令中外知朕此意今後不得更有論列後二日鵬舉復言臣暗於大體不能仰體陛下始終禮遇大臣之意豈堪尚居言責之地乞除一在外宫觀差遣上復優諭之乙丑右文殿修撰新知常州吳秉信卒於蕭山縣特贈六官為左中奉大夫丙寅上謂沈該曰大理寺人命所繫近聞吏多受賕深為不便不知請給比京師如何若祿薄須量增然後可以責其守法該奏今吏祿比京師已添上曰不然此間物貴雖已增未必足用已而戶部言欲據見請十分為率量增二分上可之丁卯國子正陳天麟言比年以來歲多豐稔然間有水旱細民就食他郡其逃去之常賦乃責之催科保長臣親見宣城廣德建平三邑之患如此宣城自經界時樁閣逃戶凡物帛九百餘匹米三千餘石廣德以近年水旱逃戶所逋物帛一千八百餘匹米亦三千餘石建平逃戶物帛一千四百餘匹米二千二百餘石皆額在而民去取辦保長以塞上司之責至於監繫笞箠破産敗家臣所見三縣如此其他亦可概見矣欲望令戶部行下監司州郡檢視逃戶委實保明聞奏乞與倚閣三年或五年則人自歸業却行起理庶幾愛惜根本詔戶部看詳申省戊辰御史中丞湯鵬舉言法者天下之所通用例之所傳乃老姦宿贓祕而藏之以舞文弄法貪叨賄賂而已不用法而用例古未之聞也若刑部之所以斷罪吏部之所以馭吏最為劇曹此正猾吏可以上下其手而輕重其心者伏望明詔吏刑部條具合用之例修入見行之法以為中興之成憲從之後四年乃成鵬舉又乞選差獄官必依祖宗格法試中二等以上者次第注擬時沈該當國多引里黨諸少年為大理評事故鵬舉及之是月故責授江州團練副使黃潛善特贈左中大夫明年七月追復潼川府路轉運判官王之望應詔言臣前在東南日聞蜀中經界大為民害豪富為姦例獲輕减貧弱受弊多致逃移上戶利之而下戶皆不願自入本路境百姓多遮道投牒乞行經界與峽外所聞不同詰其所以願行之意則曰人戶詭名寄隱産業有田者無戶有戶者無田差某等充戶長催驅稅賦率皆代納以此破家者甚衆若用經界則戶名有歸此弊可絶及入遂寧府境係見行經界地分百姓陳訴者益多或以為便而欲行或以為害而欲罷因數十為朋自辨於庭下各執偏說互有得失乃知蜀中經界不論貧富大扺稅增者願罷稅减者願行皆出一己之私而形勢戶之不願者為多蓋詭名挾戶非下戶所為蜀人之至東南者皆士大夫不然則公吏與富民爾其貧乏之徒固不能逺適雖至峽外亦無緣與士大夫接故不願者之說獨聞其願行者東南不得而知也六年之間士夫上書百姓投狀言其不便者不知其幾人上至朝廷省部下至諸司郡邑皆投狀煩紊陛下憂憫黎元至誠無已始也以稅賦之不均而行之終也以論訴之不息而疑之纍詔監司看詳改正然姦民觀望詞訟滋繁諸路監司纍年講究終無為别白而言之者誠以事體至重衆口不同利害可疑不敢以偏辭斷也臣初到官適有詔㫖坐知復州蜀人王駿乞罷經界劄子委制置司與所屬監司相度臣於部內詢訪甚詳而守令所陳所主相半臣以謂此田里間事見民情然後可決雖有牒訴皆一偏之論不可憑用遂令州縣取諸鄉稅名為鼠尾帳家至戶到問其願否各使書其名下鄉分編類願用舊稅戶若干願用經界戶若干於是究其兩黨之多少本路管十五州瀘敘州長寧軍以邉郡不行經界渠果州廣安軍既行而復罷行經界者九州為稅戶三十三萬三千七百有竒願行經界者十七萬七千五百餘戶此其大略也别州計之則昌榮資州懷安軍四州之民願者為多潼川遂寧府普州富順監之民願者為少而合州適得其中縣别計之則願行之多者十有六願行之少者二十有一蓋由當時奉行之人有能否之不同故也臣聞治道去泰甚雖堯舜之法不能人人皆利要當以多者為正今之經界在視民願否之多寡而損益之若州縣之願行者多自不須復議願行者少為之量行措置人戶之增减者輕自不須復議增重者為之少加裁正如此則公私事省不至甚擾正使小有不均亦可置而不問何則經界以釐正舊稅固當有所增减减者既以為是增者必以為非若欲每人而悅之是朝行夕改而無定也且蜀人之言其不便者曰法行之始驗土色之髙下量頃畝之多少姦弊百出賄賂公行故稅之輕重不當造帳畫圖為費甚廣追呼須索不勝其擾是則然矣事在既往雖改無及至於稅之輕重則新舊各有其弊就二者而較之經界之弊在於業多者稅或輕業少者稅或重而舊稅之弊則在於有田者或無稅有稅者或無田要之以輕為重以重為輕尤庶幾於以有為無以無為有也而蜀人言其不便者或過其實若初行之擾則有之而今日之弊不如是之甚也臣置司遂寧且以倚郭小溪一縣論之官戶凡五百八十有四而願用經界者一百六十有七公吏為戶二百二十有二而願用者十有八以此而觀則或者謂豪富之家皆獲輕减而利之豈不過哉至於下戶逃移亦絶無僅有或以時經旱潦或以家自貧窮未必皆經界所致傳曰利不百不變法使經界元初不行或行之未久而罷固善今立為成法已經十二三料舊說圖籍悉皆散落中間買賣分析戶眼改新矧核見隱寄之後虛戶盡去創戶盡多承認供輸已有定分一旦舉而變之則升降紛然僥幸復啓實戶之創出者悉皆走失虛戶之詭立者不可推尋吏肆其姦又將有前日之擾且終亦不得其平而催科愈艱爭訴益甚軍須督責何以應期為官吏者不亦難乎臣恐雕瘵之民無復寧歲矣惟陛下少安聖慮靜以鎮之姑去其泰甚者則紛紛自息天下幸甚據本路見行經界昌資榮州懷安軍民願者多乞且令仍舊普合州富順監遂寧潼川府民願者少乞量行减正臣願委監司一員與所屬守令委曲計議各以逐處事宜從長措置應經界縣分有新稅溢於舊額者乞令逐縣收舊稅額外之數將大假增重人戶通融均减人戶經界新稅比舊增减五七分以下者更不在裁正之限令所委監司選差見任官五員分詣諸縣逐鄉受狀令佐內選可委官一員通簽所差官若事畢日别無違戾民訟稀少乞許保明申奏朝廷量行推賞仍候農隙月分措置左僕射沈該進呈於是畫㫖行下之望所上議不得其月日而狀首稱奉今年七月九日求言詔書故附九月末之望又有二十八年三月申省劄子云䝉取㫖依申亦不知以何日降指揮以其言經界利害甚悉故詳載之按日歷今年七月二十七日有令漕臣措置經界指揮而之望二十八年申省劄子亦及此事則知為九月間所上無疑也餘具二十八年三月建炎以來繫年要録卷一百七十四
