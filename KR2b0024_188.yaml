body:
  text: 建炎以来繫年要録巻一百八十八宋李心傳撰紹興三十有一年嵗次辛巳隆金海陵煬王亮正六年春正月甲戍朔日有食之上不受朝命權吏部侍郎李澗用牲于太社百司守職既而太史局言當交不虧詔勿賀丁丑雷發非時戊寅命輔臣燕北使于館不用樂初議者以揀汰使臣為州縣蠧請以官田授之許子孫為世業户部侍郎錢端禮等乞計一年衣糧之數紐價授田俟其一年罷其廩給仍令常平司貸牛種三嵗取償詔兩省臺諫官集議聞奏三月丁酉議上癸未左廸功郎守祕書省正字胡憲特改左宣教郎主管台州崇道觀憲以老乞奉祠吏部言在法館職到任一年通四考改官按憲以賀允中薦累召方起今到任半年却有實歴過十餘考故有是命憲時年七十有五矣初兩浙民户嵗輸身丁錢而湖州為紬絹八萬匹有竒毎三丁輸一匹其始丁少遂均科之建炎三年十一月休兵日久丁口滋多而科猶如故由是諸邑増收丁錢以資他用民甚苦之左司郎中呂廣問之為兩浙轉運副使也上命廣問改正至是廣問乞自今増丁不得増絹丁亥從之是夜風雷雨雪交作人疑其異既而侍御史汪澈言春秋魯隠公時大雷震電繼以雨雪孔子以八日之間再有大變謹而書之今一夕之間二異交至願陛下飭大臣常謹於備邊也殿中侍御史陳俊卿言周之三月今正月也魯隠公八日之間再有大異今一日而兩異見比春秋抑有甚焉可不懼乎今邊防之䇿聖謨深遠講之熟矣然而将未得人兵未核實器械未精儲蓄未備臣願陛下與二三大臣因災而懼謹其藩籬常若寇至不可一日而弛也至于臣下則有官居保傅手握兵符而廣殖貨財専事交結奪民財壞軍政人不敢言道途側目養之不已其患将有不可勝言此臣憂國惓惓納忠之至意也庚寅權尚書吏部侍郎李澗充集英殿修撰提舉江州太平興國宫澗引年求去故有是命左朝奉郎黄抗知秦州初劍建汀邵四郡例般鹽自鬻以辦嵗費鬻而不售則科于民時汀之長汀縣鬻鹽峻急民走轉運司訴之漕臣王時升庇其事舉人劉亮詣户部訴之事下汀州㑹州遣廵檢官張士先於鄉下督鹽錢其黨賴福髙等懼亮不能自直因苛留士先乞州釋亮兩易之且擊其從兵有死者知縣事陳夢遠乃誣以嘯聚守臣孫祖善亟遣正将謝宣措置宣遂戮福髙等千餘人焚毁數百家學諭葉椿率邑人訴于祖善夢遠言椿與賊交結繫之州獄欲致之重辟録事㕘軍劉師尹爭不能得致仕而去州上其事于朝且令宣乘勢掃蕩亮持牛酒犒軍宣執誅之至是言者奏祖善等賊殺不辜又言通判向士俊必欲傅致葉椿諸人之罪時夢遠已屬吏詔并罷祖善等三人仍令帥司究實申尚書省其後安撫司王師心言如章乃詔夢遠降三官士俊宣各降二官而師尹還任民被戮者其租稅皆捐之夢遠瓘族孫師尹閩縣人也謝宣出兵在去年八月陳夢遠等降官在今年五月己夘今因孫祖善等放罷併書之上問宰執三朝國史何日可進陳康伯曰帝紀已成列傳未就上曰史官才難劉知幾謂必具才學識卿宜謹擇之上又曰頃有乞撰㑹要者湯思退不曽行㑹要乃祖宗故事之總轄不可闕也但自元豐後續為之葢舊書分門極有法似不湏改康伯曰謹遵聖訓既而乞令館編元豐以後詔從之詔館編在是月壬寅今聨書之辛卯左奉議郎沈厦充諸王宫大小學教授初用李琳薦也琳薦厦事已見紹興二十七年四月甲寅壬辰權尚書户部侍郎趙子潚充敷文閣待制知臨安府侍御史汪澈殿中侍御史陳俊卿言臣等常再論劉寳罪惡乞奪其節鉞投之荒裔未䝉施行今復有訪聞事迹擇其灼然者更歴為陛下言之寳之軍籍不為少總司幇勘月有常數而入隊者不及其半自餘雖曰輜重曰防托曰放牧不應如是之多率皆虚偽支破請給又如死馬至六七百匹而不開落芻粟之費果何歸機織至八九百人而不教閱錦綺之成果何用捃摭羣下類多逃竄有効用陳孝恭者為之首今在廬夀之間其徒頗衆軍士為暴略不禁戢如刼招隠寺及大港民家間有捕獲恐人議已即自坑而埋之率以為常凡此皆寳之肆欺罔壞紀律葢其罪之大者也逯逵者一選鋒軍使臣専任為囘易庫監官開激賞等庫於市心置塌坊柴場於江口分布錢物差人於荆湖福建收買南貨絡繹不絶毎将諸軍請受銀并折色公據盡行拘收明取暗尅嵗月深逺不知紀極簿歴詭秘無從稽考今據逵供所管内外回易錢僅五十三萬餘貫其欺隠不可勝計此寳之剥下賈怨又其罪之大者也土木之工興作無時强占鎮江府倉基以為大第令劉聚郭剛等管創蓋房廊以至起亭榭造塼瓦運花木廣種植幹辦淮甸及平江諸處財産與淮南伐山燒炭諸役紛然略無休息此寳之虐衆營私又其罪之大者也酒庫元許置一所俾助軍用寳乃擅置兩大庫又添置脚店百餘䖏列布闤闠究其用心専以漁奪總司及鎮江酒庫之利寳之赴行在隨行所帶金五千餘兩銀三千萬兩今拘收止得銀四萬一千餘兩金錙銖無有矣其在軍中捜買珠玉珍竒之物以為苞苴動輒用銀至三五百錠前後所用不知其數此寳之貨財自殖又其罪之大者也至如庇一庸僧恵山者住金山寺令蓄二妾于軍中李琦家朝夕出入縱其淫汚岳超母死則役軍士置墳墓而寳親為之行服是豈管軍之所為哉且寳無尺寸功致身莭鉞之貴陛下姑務優容責其来效而乖戾乃如此雖已罷兵柄置散地而責罰不加焉與以禮求去者無異臣等備員耳目之司不敢循默竊謂寳之罪彰彰如此大則誅戮小則竄殛今乃擁莭如故偃蹇大邦非所以示勸懲伏望奮發英斷重賜施行以慰天下之公議詔劉寳落安慶軍節度使罷福建路馬歩軍副都總管降授武泰軍承宣使提舉台州崇道觀福建路任便居住癸巳名通化軍漢相國蕭何廟曰懷徳故太師秦檜妻沖真先生王氏薨甲午上與宰執論給舍繳駮事因曰祖宗所以置給舍正欲其拾遺補闕若緘默不言豈設官之意然或探人主意及阿附大臣甚者至扵不論臧否沽激取名此正仁廟裕陵之所戒也陳康伯曰如此之人亦公議所不容也集英殿修撰知鼎州凌景夏權尚書吏部侍郎乙未資政殿學士知潭州魏良臣移知洪州丙申秘書少監汪應辰權尚書吏部侍郎是日大雨雪詔出内府錢賜三衙衛士凡九萬五千緡且予貧民之不能自存者三萬九千餘人又以内蔵錢帛市薪炭賜之輔郡細民命常平官賑給諸路委監司決獄事宋史全文史臣曰天人之應甚不逺也天大雨雪而上以仁民愛物為心不旋踵間其應如響是年冬敵嘗窺江欲禁出闗濳遁者上惻然不許曰朕思維揚之擾至今追恨大哉帝王愛民之言天實臨之矣未幾亮以自斃聞噫誠於民而不違於天惟聖人能之祕書省著作佐郎王十朋遺右僕射陳康伯書曰乃者大雨雪而雷聲繼作識者憂之是陽不勝隂之明騐也主上仰畏天變俯恤民隠放房錢以寛細民遣郎官以決滯獄固宜徳之動天不俟終日然而積雪不消止而復作今且十日矣豈應天當以實而小恵不足以弭災耶夫天心仁愛吾君出災異以警戒之相公居燮調之任當任賢退不肖之責願以春秋災異之說為上力言之進君子退小人内修闕政外備强敵開闢言路以通下情閉隂縦陽以弭天變勿以天道為遠聖人之言為悠悠而不之畏也比因輪對狂妄日虞罪戾固宜鉗口結舌不言時事而猶敢及此者區區憂國之心不能自已以無路而告吾君不可以不告吾相由此獲罪固所不辭丁酉以大雪放朝參三日修武郎御前忠銳正将李師民為閤門宣贊舍人忠訓郎劉舜謨為閤門祇候師民顯忠子舜謨光逺子知樞密院事葉義問言其㢘謹可用故擢之戊戍直祕閣淮南路轉運判官張祁落職放罷言者論祁宿負罪惡又言祁媚事湯思退起廢持節其在淮西盗用庫錢又團結山水寨動以二三十萬人為名百端科擾人不聊生逃亡浮浪作過之人自行招集名曰放用以為緩急自衛之計故有是命又詔効用令帥司收管其係官錢物令總領官都絜驅磨之己亥大晴詔特進提舉江州太平興國宫和國公張浚令湖南路任便居住時浚尚責居永州殿中侍御史陳俊卿間為上言浚忠義且兼資文武可付以閫外臣素不識浚雖聞其嘗失陜服散淮師而許國之心白首不渝今杜門念咎老而練事非前日浚也願陛下勿惑讒謗雖未付以大柄且與以近郡以係人心庶緩急可以相及上納其言詔衡州編管人胡銓與放逐便又詔昨縁事一時編管覊管居住命官令刑部開具職位姓名并元犯因依申尚書省直祕閣知江州王矩為淮南轉運判官兼淮南西路提㸃刑獄公事左朝散郎林仲純知江州庚子殿中侍御史陳俊卿言敷文閣直學士知建康府韓仲通起扵法家専務刻薄頃嵗周旋刑寺十餘年阿附故相以三尺濟其喜怒起大獄殺無辜不可勝計故相之亡偶以憂去因得漏網湯思退秉政以其同出秦氏之門特引援之其在建康以公庫饋遺旁午秦門殆無虛日丁禩秦氏奴也曩與仲通刎頸交今延為上客日與宴飲詔仲通落職放罷初命郎官以上舉縣令既而朝議以選人不可授大縣第令籍記姓名右諫議大夫何溥言朝廷用人不可拘以資格且如今日為選人明日改京秩其人則猶昔也而差注之格乃有等差葢銓曹之限仕進者不得不爾若朝廷用人乃拘其法又何以薦舉為哉故臣寮所舉者才也非官也望詔三省於已舉之數毋拘劇易早與差除行之十年則天下縣令舉無濫授之患矣詔權令通融差注詔浚運河以淮東大軍庫趲剩錢六萬九千緡鎮江府常平米萬三千斛為工役費命總領淮東錢糧朱夏卿兩浙漕臣林安宅董視之武功大夫英州刺史知濠州劉光時言兩淮所出馬低小名為淮馬自成一種比之江南尚可蕃息而州縣拘籍户馬以應使令不特責其馬而又欲人與芻稻隨之賠費滋多大為民患是致民間不敢畜馬望嚴為禁約從之辛丑資政殿大學士提舉臨安府洞霄宮王綸知建康府權户部侍郎錢端禮奏贍軍新中酒庫以二十萬緡為嵗額從之壬寅詔館職續編元豐以来㑹要詔諸路總管鈐轄人從並減半添差官與三分之一其添給驛料並減半用右諫議大夫何溥請也建王府内知客龍奫曽覿乞月給御㕑折食錢如在京王府例許之此細事不當書以日厯不見龍奫除内知客月日故因事附見武徳郎新知復州董誡為兩浙東路兵馬鈐轄以其妻父劉錡言誡在復州薄有産業也右宣教郎新知鬰林州周沖翼移知復州既而侍御史汪澈言錡蔽扵子壻之愛欲其相近乃指定差遣為之陳請非有事故詔以誡為江南東路兵馬鈐轄澈上奏在此月丙午誡改命在三月庚寅今併書之左正言王淮言朝廷嘗立賞格給賣官産以勸赴功之人而吉州所申與提舉官所言髙下遼絶朝廷為之罷提舉官逮今踰年而所減三十萬緡猶未可盡準近者永豐之民詣御史臺訴科賣官田之弊至有已輸錢未嘗請射田土者葢其始作俑倡為欺㒺者魏安行其人也安行初守滁州嘗以墾田數千頃邀賞于朝矣就加覈實輒復不然其為户部郎嘗獻營田之策矣試之維揚蔑聞成效徒以口舌僥倖得官今又持莭江東傲誕自如恬不為怪望錄其前後欺㒺之罪特賜罷黜仍戒諸路守臣給賣官田並聽民户實封投状請買毋得抑勒累榜不售申明裁減其吉州先科敷人户輸錢在官不願請射田土者特行給還詔安行罷江南東路轉運副使餘從之安行在江東急於受賞督廹州縣鬻田甚峻所屬一切望風左朝請郎知徽州洪适甫至官民競赴愬适曰賞可慕民獨不可愛耶乃戒屬邑有虐吾民者必劾已而安行罷去民卒得寛是月金主亮令諸處統軍擇其精於射者得五千人分作五軍皆用茸絲聯甲紫茸為上黄茸青茸次之號硬軍亦曰細軍亮毎自詫曰取江南此五千人足矣二月按是月甲辰朔丙午宰執進呈昨得㫖問儀鸞司換舊陳設有無收支上曰陳設不過享廟及人使至時用之何至一嵗五易朕已令以新易舊仍據數收支矣上又曰朕宫中未嘗用此惟以儉為尚乃詔自今非破損勿易仍先申尚書省乃下有司以新易舊右朝散大夫江南西路轉運判官李若川移東路軍器監主簿楊民望言監司三弊一曰按吏徇其好惡以示威福二曰廵按以察州縣而一縣所費或至千緡三曰公使互送過於供給蜀去朝廷逺吏尤自肆乞命監司帥臣互察從之民望成都人也丁未左朝散郎新知江州林仲純為江南西路轉運判官降授右通直郎新知黄州林珦移知江州尚書户部郎中總領湖廣江西財賦湖北京西軍馬錢糧彭合主管台州崇道觀以病自請也合尋卒戊申詔卭州復置恵民監嵗鑄鐵錢三萬緡利州六萬緡為額内大小錢各半初議者請復嘉卭二州鼓鑄四川安撫制置使王剛中言嘉州無鐵可用乞令卭州以所造日額衣甲鐵炭改鑄夾錫錢而令利州以鑄錢所餘鐵炭對數打造衣甲委逐州守臣提舉措置仍𨽻屬總領所從之利州六萬緡計用本錢十一萬四千餘緡卭州三萬緡計用本錢三萬九千七百餘緡淳熙六年十月並改鑄一折三錢直秘閣荆湖南路提㸃刑獄公事向伯奮行太府少卿總領湖廣江西財賦湖北京西軍馬錢糧己酉右朝散大夫知贛州陳輝直秘閣再任以右正言王淮言其治行也宣正大夫崇信軍承宣使利州西路駐劄御前後軍統制王喜卒喜驍勇善戰西人畏之庚戌直敷文閣兩浙轉運副使王時升入對論福建上四州鹽直太重時議者亦言福建路科賣官鹽其弊已甚昨者汀州又以科鹽遂媒賴福髙之禍臣聞閩地瘠薄舟車少通明道以前鹽法固未立也景祐之後始置海倉買納收秣鈔錢十萬緡以三分之二許客人於𣙜貨務入納興販一分與轉運司般賣充上四郡買發百餘年間公私便之宣和末偶因兵火客販阻絶故海倉之鹽盡歸州縣般運建炎間雖量増價直猶是官司置塲出賣民未以為病也續因邵武軍簽判趙不已獻言本路毎嵗遂抱納鈔鹽錢一十萬緡節次増至三十萬緡為額鈔錢毎増鹽價遂長頃年毎斤不過三五十文今甚者至百有餘錢矣官價既髙私販難戢州縣貨賣不行始議抑配議者以為今欲上給經常之費下寛齊民之力無如取嵗計之實用去無補之虚耗且如本路嵗賣鹽一千一百三十萬斤以錢百二十為率計收錢百三十五萬六千緡嵗計所用不過六十萬緡據實而取民亦何辭自餘七十五萬六千緡悉非公上之入多與運綱人充優補縻費兼供官吏百種侵欺此所謂無補虚耗重困於民力為可去也今漳泉興化福州下四郡見行科納鹽息計產而出謂之産鹽錢印契而出謂之浮鹽錢毎嵗不下四十餘萬緡行之既久民亦安之上四郡所用嵗計六十萬緡以數内三十萬緡視下四郡令人户計産印契作産鹽錢入納然後罷海倉之買納免官司之運賣弛一路之禁𣙜所至場務别行季官拘收稅鹽錢嵗約三十萬緡湊成六十萬緡則嵗計無不足之患矣或者又欲倣茶引之法從漕司造長短鈔引合同號簿據逐州縣合運嵗計并鈔鹽綱數分抛令自招客人入納見錢算請仍以合同號簿付懷安等處鹽倉支鹽請如本州賣鹽一斤為錢一百文内二十八文係漕司鹽本増鹽等錢二文助學錢一文吏録錢三文醋息錢六文豐國監錢二十五文市用錢毎斤共計錢六十五文入納見錢六十五緡即給一千斤鹽鈔之類仍便指躬往賣去處與百姓和合買賣而六十五文之外利歸商賈則人亦必樂於入納况所在鹽價不等少者獲什伍多者獲倍稱之息乎所有拖脚耗鹽之數並依舊優潤客旅州縣却将所賣鹽鈔錢並據諸色科名分𨽻發納不用鹽本坐辦嵗計而宿弊可以盡革二者之策俱可施行若由前所言科産浮鹽錢及收税鹽錢滿六十萬緡以充嵗計而使民自便亦云善矣竊恐曠日持久言利之臣又欲官自煮海重困居民誠為措置刻石以示永久則不足慮矣由後所言行長短鈔引竊恐漕司州縣之吏利於科擾及監司州郡欲以綱運周旋人情巧為不可之說欲望下臣此章令福建路諸司公共詢究風俗博求利害擇宜於永久可以便民者嚴立程限以實来上陛下斷而行之則八郡之民均受其賜且免州縣分差使臣下鄉科擾之弊詔福建諸司同具措置限兩月申尚書省太常寺主簿兼權光禄寺丞李浩主管台州崇道觀自請之也先是胡憲乞歸查籥被論浩亦不安於朝與王十朋相繼求去云此以浩墓志參修癸丑崇信軍節度使開府儀同三司主管侍衞歩軍司公事趙宻領殿前都指揮使職事甲寅少師寧逺軍莭度使領殿前都指揮使職事恭國公楊存中為太傅充醴泉觀使進封同安郡王賜玉帶奉朝請存中領殿嚴幾三十年至是王十朋陳俊卿李浩相繼誦言存中之過上感其言存中聞北事有萌乃上疏言金人年来規畫有異雖信好未渝而虵豕荐食之心已露宜及未然於沿邊衝要之地置堡列戍峙糧聚財濱海沿江預具戰艦至于選将帥繕甲兵謹闗梁固疆塞明斥堠訓郡縣之卒募鄉閭之勇申戒吏士指授方畧條為十事以獻㑹趙密謀奪其權因指為喜功生事存中聞其議乃累章丐免此以王曮所撰存中神道碑修入碑詞不無縁飾然以事考之北敵寒盟存中再起而趙宻遄罷則似以此故也今但去其潤色之語而以王十朋等所言載於其前則事之的實自見矣前一日上召學士楊椿草制且諭大臣曰可令密於未宣麻以前便交職事昔唐神策軍使王駕鶴久典兵衞權震中外議欲易之崔祐甫召駕鶴語移時而代者已入軍中矣朕讀唐史深嘉祐甫善處事可以為法隨州觀察使殿前司神勇馬歩軍同統制李捧權主管侍衞歩軍司公事仍以神勇軍𨽻歩軍司親衞大夫武泰軍承宣使張守忠落階官為利州觀察使殿前司策選鋒軍統制詔殿前司日前諸将下有除尅掊斂私放債負之類並日下改正住罷兵校差出回易及私幹借事限一月拘收回軍務在優恤士卒以稱朕意仍於軍門榜諭乙夘閤門祗候御前忠鋭第五副将劉舜謨為東南第二副将廬州駐劄敷文閣待制提舉江州太平興國宫林覺卒丙辰置行在㑹子務後𨽻都茶場悉視川錢法行之東南諸路凡上供軍需並同見錢仍分一千二千三千凡三等葢權户部侍郎錢端禮主行之仍賜左帑錢十萬緡為本初命徽州造㑹子紙其後造於成都丁巳右朝請大夫楊抗為淮南轉運副使兼淮南西路提㸃刑獄公事右朝請大夫主管台州崇道觀方滋為京西路轉運副使尋不行左朝散郎京西路轉運判官蒋汝功為夔州路提㸃刑獄公事庚申領殿前都指揮使職事趙密以本軍酒坊六十六歸之户部後二日同安郡王楊存中復以私家撲買酒坊九及酒本釀具為錢七十二萬緡上之於是嵗通收息錢八十萬緡有奇以其半為行在諸軍馬草之費時諸軍日費芻萬束率為錢千緡上嘗謂近臣自楊存中之罷朕不安寝者三夕葢上思慮深遠如此辛酉詔侍從臺諫薦士各二人帥臣監司各一人直顯謨閣提舉兩浙西路常平茶鹽公事楊倓主管台州崇道觀倓以父存中解兵柄故有請也癸亥封建府夏氏為齊安郡夫人翟氏為咸安郡夫人給内中俸夏氏江西人曾祖令吉為吉水簿而卒因家焉翟氏本姓謝其父寧早死養於翟氏因入内武節郎蒋世忠入宫皇后以賜王至是得封二人為中宫所賜㑹要不書按周必大草翟貴妃為皇后改姓謝氏制云早從藩邸之游葢稟庭闈之命即指此時王在藩邸左右嬪御不過數十人僅足以備使令一日出十餘人厚其資而遣之有一年少而俊麗者王雖竒之而亦竟不留嘗語宮僚曰聲色之事未嘗略以經意至於寶貝珠玉侈靡竒異之物平生心所不好亦未嘗蓄之甲子皇叔崇慶軍節度使知西外宗正事士街建寧軍莭度使知南外宗正事士􅱰並罷士街等置司泉福二州㑹士街强市海舟為人所訴右諫議大夫何溥奏其事因請申嚴兩宗司興販蕃舶之禁不惟官課増而民業廣庶幾銅錢出界之令可以必行仍乞擇宗英往代其任詔大宗正司更選宗室二人既而言者以為南班至少請擇内外宗室文武之㢘正者更主之乃命左朝散大夫士礽知西外宗正事直敷文閣主管台州崇道觀子游知南外宗正事自是兩宗官率多用文臣矣言者乞擇文臣在三月乙夘士礽等並命在庚寅今聨書之詔偽造㑹子及扇揺之人並依見錢闗子法按用見錢闗子法指揮已見元年十月壬午六年十月戊申是日上與宰執論薦舉人材因曰人材當用實可濟事者若髙談闊論雖可觀然徒欲近名譬猶畫餅終不可食何益於事卿等冝審度之乙丑詔經義詩賦依舊分為兩科以取士先是右諫議大夫何溥上疏論經義詞賦合為一科之弊以為兩場俱優者百無一二而韋布之士皓首窮經扼於聲病之文卒無以自見於世望将經義得免解舉人及應舉進士年五十以上許兼一大經於詩賦場引試其不願兼經者亦聽庶幾宿學有以自展溥建議在今年正月壬寅議者多以為經義詞賦不能並精又減策二道而併於論場故策問太寡無以盡人且一論一䇿窮日之力不足以致其精雖有實學無以自見願復經義詩賦分科之舊詔禮部國子監太學官看詳經久可行申尚書省至是權禮部侍郎金安莭等奏依舊為兩科詩賦不得侵取經義分數若經義文理優長合格人有餘許将詩賦人才不足之數聽通融優取仍以十分為率毋得過三分自今年太學補試為始於是行之至今中書言昨以僧徒冗濫令禮部權行住給度牒已經二十餘年望量行製造度牒立定價數分降諸路州軍詔户禮部措置户部乞毎料給降二千道毎道價錢五百千綾紙錢十千皆省陌兩浙州軍輸左蔵庫江淮荆湖京西輸三總領所江西湖南閩廣委逐路提刑司仍輸左蔵願以金銀計直者聽從之左朝請郎知徽州洪适提舉兩浙西路常平茶鹽公事武翼郎新知叙州武鉅移知均州以殿中侍御史陳俊卿言其才可用也丙寅詔通進司承受内降文字並封送三省樞密院先是内降詔㫖未經朝廷奉行多漏泄者議者以為言詔給事中黄祖舜措置祖舜乞選内侍省官二員監通進司毎日降出御封文字並用黄絹夾囊盛貯監官親書姓名封彂仍令門下後省印歴抄轉旬終赴省結押日具承受奏牘及御封名數申省至是行下丁卯武功大夫英州刺史劉光時陞忠州團練使再任以州民吴洪等言其治行也庚午侍御史汪澈言敷文閣待制知平江府朱翌本秦檜腹心之交自選人拔擢二年而至侍從復叛檜而附范同故檜怨之刻骨自公道之行朝廷愍其久竄嶺表在抆拭之列寖叨郡寄所至不治近差李寳往平江措置防扼海寇翌漠然不顧泛以武臣待之使寳徒手無所施功及其哀懇亦略不介意至煩朝廷又遣林安宅國事安賴焉望賜罷斥以為不治者之戒從之林安宅時為浙漕其遣行月日未見當考是日左司郎中徐慶賀金主生辰還過楚州見右朝奉郎通判州事徐宗偃為言金主初無恙因諭以去冬省劄詢問對境疾病事恐或至失墜則有悔吝於是宗偃因慶歸以省劄上之辛未左中奉大夫提舉台州崇道觀張修卒是月少師觀文殿大學士致仕嘉國公秦熺薨于建康府詔贈太傅三月丁亥不行熺家居凡六年建炎以來繫年要録巻一百八十八
