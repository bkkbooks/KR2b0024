body:
  text: 建炎以來繫年要録卷三十宋李心傳撰建炎三年十有二月按是月乙亥朔戊寅徽猷閣待制知鎮江府兼浙西安撫使胡唐老為軍賊戚方所殺方勇悍善射初為教駿卒軍興盜起在九朵花行伍中未知名方殺其為首人遂率衆歸建康投杜充充以為準備將建康失利諸軍皆散方率潰卒數千走金壇縣時鎮江無兵獨倚浙西制置使韓世忠軍為重世忠既去唐老力不能拒因撫定之方欲引兵犯臨安妄言赴行在請唐老部衆以行唐老不從為所害主管安撫司機宜文字迪功郎鄭凝之亦以兵死後贈唐老徽猷閣直學士諡定愍官凝之家一人凝之戬孫也己卯上次明州提領海船張公裕奏已得千舟上甚喜王綯曰豈非天邪先是監察御史林之平自春初遣詣泉福召募閩廣海舟為防托之計事見二月辛酉故大舟自閩中至者二百餘艘遂獲善濟時閩廣大舶皆委之諸司而右文殿修撰廣東轉運使趙億所募舟先至上手詔嘉賞億抃曽孫也抃西安人熙寧參知政事駕至明州日歷在初二日丙子而李正民乘桴記在初五日己卯王庭秀閲世録在初七日辛巳正民時為從官所記必不誤今從之徽猷閣直學士王序知鳯翔府寶文閣待制程唐為陜西路都轉運使不許辭免如違重行竄責序榮德人欽聖憲肅皇后姊子也二人在宣和間皆事近幸以進蜀人鄙之序已見元年六月辛巳金人陷廣德軍時完顔宗弼既得建康區處已定乃率衆自溧水路徑趨臨安道路之人但知潰卒為亂不虞金人之至也金遊騎至廣德軍知軍事周烈遣人迎之且許其犒軍約以毋擾宗弼偽許之俄頃傳箭至招其投拜烈大驚索馬而奔遂陷其城烈為金人所殺江東宣撫使劉光世自信州引兵之南康軍此據光世四年二月狀修是日戚方侵常州入其郛守臣周把守子城拒敵遣赤心隊統領朝請郎劉晏與戰翌日破之方乃去壬午起復直龍圖閣御營使司參議官李逮試尚書户部侍郎金人侵安吉縣知縣事曽綽聚鄉兵往石郭守隘或視其矢曰金人也鄉兵皆棄紙甲竹槍而遁金人入縣遂焚之綽肇子也肇布弟元符末翰林學士江淮宣撫司潰卒李選號鐡爪鷹與其徒數千人攻陷鎮江府此據日歷壬午日書但日歷又云就杜充招安此時充已離真州恐誤趙雄撰韓世忠碑又云烏珠北還王提兵邀之先降其將鐵爪鷹李選此蓋誤或是選先降烏珠其後又為世忠招降然實非金將也是日定議航海避敵執政請每舟載六十衛士人不得過兩口衛士皆曰我有父母有妻子不知兩者如何去留訴於主管禁衛入內內侍省都知陳宥宥不能決宰相吕頥浩入朝衛士張寶等百餘人遮道問以欲乘海舟何往因出語不遜頥浩詰之曰班直平日教閲何嘗有兩箭上貼今日之事誰為國家死戰者衆欲殺頥浩參知政事范宗尹曰此豈可以口舌爭引其裾入殿門門閉衆不得入上謂輔臣曰聞人情紛紛不欲入海緩急之際豈可如二聖不避敵坐貽大禍今以御筆諭之頥浩與參知政事王綯捧御案近御座前上御翰墨撫諭中軍人情稍定遂山呼於殿門外上密諭宰執曰此輩欲沮大事朕今夕伏中軍甲士五百人於後苑卿等翌旦率中軍入朝捕為首者誅之頥浩退密諭中軍統制辛企宗及親軍將姚端令隂為之備癸未執政早朝命御營使司參議官劉洪道部兵在宫門防變而中軍及姚端已整齪於行宫門外二府引中軍入遇直宿兵衛皆擒之其徒驚潰或升屋或踰墻遁走上自便殿御介胄引伏兵出彎弓手發二矢中二人墜于屋下其衆駭懼悉就擒上命召頥浩至都堂詰為首者以奏其餘皆囚之趙甡之遺史云車駕欲幸明州有班直數十人出語不遜吕頥浩冒雨著泥靴彈壓之班直理屈往往跳水而死與史不同今不取是日完顔宗弼自安吉進兵過獨松嶺歎曰南朝可謂無人若以羸兵數百守此吾豈能遽度哉知餘杭縣曽􅘔知是金人乃與丞徐聿成率父老具香花迎拜􅘔鞏孫也鞏布兄元豐中書舍人時尉楊汝為在徑山寺請監寺僧為統領官率強壯以拒敵主僧梵仁從之甲申誅衛士張寶等十七人於明州市景福殿使昭德軍承宣使入內內侍省都知主管禁衛陳宥責汝州團練副使潭州安置除行門外其衆降𨽻諸軍宥官職日歷不書今以紹興元年十月四日刑部敘官狀增入乙酉完顔宗弼至臨安府錢塘令朱蹕蹕已見二年九月壬辰率民兵逆戰傷甚猶叱左右負己擊敵守臣浙西同安撫使康允之未知為金人遣將迎敵于湖州市得二級允之視之曰金人也遂棄城遁保赭山時直顯謨閣劉誨自楚州赴召王明清揮麈第三録云誨棄城走行在今從趙甡之遺史在城中軍民推之以守戊子朝奉郎知明州張汝舟為中書門下省檢正諸房公事冝州觀察使張思正為浙東馬步軍副總管屯明州日歷張思正除浙東宣撫使明州駐劄按此時郭仲荀以殿帥為宣副恐思正不應在其上紹興元年七月二十三日刑部檢舉敘官狀云前任浙東副總管為失守明州降官居住今從之尚書户部員外郎宋輝直徽猷閣充江淮等路發運副使日歷書除直龍圖閣誤也輝明年正月乃除直龍圖直祕閣陳汝錫添差兩浙轉運副使應副防遏使司錢糧時防遏使傅嵩卿在浙東宣教郎江惇禔以客從潰兵踵降州縣無見儲或請賦諸民以給惇禔持不可悉發封樁錢粟賦之汝錫縉雲人惇禔蘭溪人也朝請郎劉晏直祕閣依舊常州防托右武大夫和州防禦使樞密院提領海船張公裕落階官徽猷閣待制御營使司參議官劉洪道知明州留尚書户部侍郎李逮於越州俾調軍食己丑上幸定海縣御樓船參知政事張守收後前一日臺諌請對上諭以不得已之意夜諜報敵逼臨安知越州李鄴奏至是日天雨羣臣入朝至殿門有旨放朝惟執政入對上於御袍中出鄴奏示之既退上自州治乘馬出東渡門登樓船宰執皆從之上登舟幸海日歷在是月十一日乙酉李正民乘桴記在十五日己丑王庭秀閲世録在十六日庚寅日歷又云甲申上出李鄴奏金國人馬已渡浙江按初十日烏珠未至臨安日歷恐誤今從乘桴記詔止親兵三千人自隨百官有司隨便寓浙東諸郡時上既廢諸班直獨神武中軍辛永宗有衆數千而御營使吕頥浩之親兵將姚端衆最盛上皆優遇之晚朝二府登舟奏事參知政事范宗尹曰敵騎雖百萬必不能追襲可以免禍矣上曰惟斷乃成此事是也詔行在諸軍支雪寒錢自是遂為故事是日金人陷臨安府初完顔宗弼既圍城遣前知和州李儔入城招諭儔與權府事劉誨善至是受其指揮來見二人執手而言儔欷歔不能止有唱言誨欲以城降金者軍民因殺誨是晚城陷錢塘令朱蹕在天竺山亦遇害後贈誨直龍圖閣張滙進論曰靖康之初金人初至京城時在內則城髙池深兵食兼足在外則諸路勤王之師霧合雲集四方忠臣義士雖素不預軍籍亦皆橫身扼腕自備器甲效命登先圖報國家二百年德澤朝廷以天下之勢當一烏合深入之敵亦未足為慮也復茍攄目前之急不顧後日之患許割地以議和敵既去官軍從之北行若用种師道夾河三戰之策敵衆無噍類矣時以親王宰臣在敵中使命絡繹道路約束諸軍不得少有犯敵敵至內邱有數騎輒犯官軍已斃數人官軍束手不敢擅動內有一卒不勝其憤輒擊殺一人適會使命在軍目覩其事統制馬忠恐使命回告朝廷遂斬其卒以徇且傳首於敵自後敵時以數騎張弓注矢戲犯官軍官軍避之敵以為笑以至與敵馬尾相繼隨之出塞無敢誰何由此勤王之師莫不解體故不踰半年復敢侵掠至百雉戒嚴而天下勤王之師無向戰之心者此失於和一也至京城之陷若御駕親征率軍將整陳而出亦足以當敵突圍而出亦足以脫敵矣何則軍民雖非願戰然陷之死地而後生置之亡地而後存故韓信背水以破趙田單鑿城以擊燕是也設若不能出城但收兵退保舊城次遣使卑辭厚幣許割地以退兵且曰捨此則有死戰而無生降之理兼外城初失我軍必有縋城得脫者但有一二人得脫則四方勤王之師定相傳播不無知京城已陷御駕已出或御駕退保舊城則勤王諸師孰不奮身赴難爭先救主耶彼雖有破城之勢然內有決死之敵外有必救之兵內外受敵茍不釋去則我與和此自然之理也或曰城既破矣豈能整陳而戰突圍而出及退守舊城邪臣曰不然蓋京師與邊城異邊城郡邑其內守城之軍不若攻城之敵之盛也所恃城而已城池既失衆寡不敵不為敵降則為敵害矣而京城侍衛之兵守埤之士不下十萬尼瑪哈斡里雅布兩路之兵共無六萬至如城破其勢亦足以拒敵也何必淵聖速出見敵邪譬若御駕親征遇敵於路亦無城池矣焉有謂我方行而以無城池可依更當棄六軍以單騎入敵陳願議和邪而城陷三日之間淵聖已幸敵營不惟城為敵陷又自無其朝廷也由是在內軍民在外勤王之師已成失國之人矣孰有禦敵之心哉此失於和二也至建炎二年春尼瑪哈攻揚州時御營之師必有十萬而尼瑪哈止有五六千騎自建炎二年秋九月離雲中下太行渡黎陽攻澶濮山東諸州郡以至于揚州可見疲勞之甚矣此強弩飄風之末無足畏也兼是時兩河州郡尚有未陷者山東州郡十陷二三人心未安糧道未集盜賊蜂起而不顧後患投身深入我境又可見其無知之甚也時若我師乘其逺來新至行列未定而擊之可也或則深池堅城拒而勿戰以銼其鋭以沮其意且多方出兵邀其出掠者彼萬里孤軍後無委積忌於相持利於速戰求戰不能糧道不繼又且野不能掠以此制之其遁必矣俟其既遁襲而擊之捨而縱之皆可也而乃望風之際車駕渡江六師自潰為敵乘之席卷而去此失於退一也至是烏珠之侵江南也朝廷豈不知敵所利者騎也我所利者舟師與步兵也江浙之地騎得以為利乎此皆騎之危地也舟師步兵之利地也烏珠有知豈肯致身於此邪若御駕親征諸路進討烏珠之敗必矣而復望風之際車駕泛海朝廷自散為敵乘之得志而去此失於退二也凡此四者非敵之善乃我靖康之兩和建炎之兩退所自致也大抵朝廷自來每自視如火視敵如水謂火必不可以敵水既以此處之焉有不為敵勝邪此當時失於料敵不知彼我之過也不然則真廟之時值契丹蕭后用兵澶淵若真廟不戰而和不戰而退則景德之元已有今日之事矣張匯本末見紹興十年正月丙戌進論在十三年八月己按張滙此論其略已分見於本年二月壬子十一月巳各注此處疑為後人攙入今姑依原本存之庚寅從官以次行吏部侍郎鄭望之以疾辭不至給事中兼權直學士院汪藻以不便海舶請陸行以從許之於是扈從泛海者宰執外惟御史中丞趙鼎右諌議大夫冨直柔權户部侍郎葉份中書舍人李正民綦崈禮太常少卿陳戬六人而昕夕密衛于舟中者御營都統制辛企宗兄弟而已時留者有兵火之虞去者有風濤之患皆面無人色辛卯上次定海縣有傳金使至者上不欲令朝行在即遣參知政事范宗尹還明州俟之留御史中丞趙鼎給事中兼直學士院汪藻參議軍事日歷載上語云鼎為御史嘗建議與金畫江為界按此日歷乃秦檜領史院秦熺為祕書少監時所修張孝祥嘗乞剛改疑未可盡信姑附著此更俟考詳云且令宗尹盡護諸將壬辰宗尹等至明州乃盧伸等自和州來所擕國書語極不遜宗尹遂不奏癸已上至昌國縣杜充所遣屬官直徽猷閣陳起宗至言充敗欲引衆趨行在而路不通是日范宗尹聞臨安陷復還見上于舟中甲午皇叔右監門衛大將軍眉州防禦使知南外宗正事士樽言自鎮江募海舟載宗子及其婦女三百四十餘人至泉州避兵乞下泉州應副請給許之於是祕閣修撰知西外宗正事令懬亦自泰州髙郵軍遷宗子等百八十人至福州避兵已而又移潮州士樽郇康孝王仲御子也乙未潰兵杜彥自袁州入瀏陽遂犯善化長沙二縣朝散大夫通判潭州孟彥卿率軍民拒之手殺數人賊勢挫欲遁而民兵有自潰者賊遂乘之擒彥卿持其首以告所掠民兵曰此會厮殺孟通判首也因遂殊其支體賊亦逃去直祕閣添差通判州事趙民彥領兵追之與之大戰殺傷甚衆初民彥依山為陳而鏖戰山下偶為間人折其陳中認旗衆謂民彥已敗遂潰民彥為賊所擒斬之陳前賊乃去事聞並贈直龍圖閣彥卿民彥已見九月壬申龔頥正中興忠義録云二人以拒金人死節蓋承會要之誤其後朱熹乞為二人立廟狀從而因之今不取是日金人屠洪州先是金帥烏瑪喇太師烏瑪喇太師陷洪州他書不見惟葉夏卿劾疏有之留洪州月餘取索金銀寶物百工伎藝之屬皆盡金使至分寧縣知縣事朝奉郎陳敏識斬其首謂邑人曰欲降先殺令因與民死守時尚書郎侯懋李幾等三人避地不及聞敵屠城潛伏于城南隅民園之梁上僅得免翌日敵引兵去卒不入分寧境而還丙申浙西制置使韓世忠以前軍駐通惠鎮日歷作青龍鎮鎮此時已改名通惠紹興元年九月甲戌方復舊名史誤也中軍駐江灣後軍駐海口世忠知金人不能久大治戰艦俟其歸而擊之浙東制置使張俊自越州引兵至明州時已無舟可載俊上奏乞海舟朝廷欲其且留拒敵報以方聚集遣行上賜俊手書許以捍敵成功當封王爵俊納俠士劉相如之策遂留以抗敵相如者初以募人入衛王室樞密院借補承事郎及是揭榜通衢勸諭迎敵士皆思奮熊克小歷稱俊納隱士劉相如之策遂留以抗敵此據林泉野記所書也考相如本末不可謂之隱士今不取俊軍士在明頗肆虜掠時城中居民少遂出城以清野為名環城三十里皆遭其焚劫資政殿學士新知鼎州范致虛薨于嶽州賊成臯寇婺州州學教授孫邦請率兵擊賊守臣集英殿修撰沈晦從之邦率民兵數百出城大敗而還晦將斬邦以徇既而釋之浙東防遏使傅嵩卿在城中乃單騎造臯説以忠義臯遂降丁酉上謂輔臣曰昨者從官同詣都堂鄭望之獨謂自古興王未有乘舟楫者所論未為通方吕頥浩曰望之以謁告後至不知衆人所論王綯曰自崇寧以來大臣專權不容立異比者會議都堂更相詰難各盡所見無所顧避臣不意十數年後復見此氣象皆陛下優容忠讜所致望之自守所見乃朝廷之福也於是望之奉祠而去望之奉祠無職名必以論此事不合也日歷全不載吏部題名在十二月故因上語遂書之或即此日事也世中興聖政臣留正等曰杜衍韓琦范仲淹富弼皆當名臣慶歷間同立於朝協恭和𠂻佐佑王室至於議論之際則各相可否不為茍同衍欲罪滕宗諒仲淹則爭之仲淹請備邊弼則以謂契丹必不至尹洙號仲淹之黨及爭水落城事琦則是洙而非劉滬仲淹則是劉滬而非洙非固相違也各極所見歸於憂國愛民之心而已仁宗皆倚之為治不以其異同而有去留焉蓋天下之事安危成敗藏於幾微之間豈一人之智所能盡惟議論往來可否相濟而後歸于至當故事無遺策自熙豐間大臣惡人異己有立議論者必力排而去之厥後士大夫皆為身謀無敢持異議於其間直臣賢士雖有忠謀讜論弗克上聞此風一行歷數十年不能變馴至靖康之禍皆人臣尚同之罪也豈朝廷之福哉鄭望之之異論是宜太上皇帝包容而不之罪也聖訓嘗云朕仰惟仁宗皇帝當時立政用人之事當置之左右朝夕以為法於斯見之戊戌金人陷越州初兩浙宣撫副使郭仲荀在越州聞敵陷臨安遂乘海舟潛遁知越州充兩浙東路安撫使李鄴遣兵邀擊於浙江三捷既而寡衆不敵鄴乃用主管機宜文字宣教郎袁潭計遣人賫書投拜敵引兵入城以巴哩巴為守親事官唐琦袖石擊巴哩巴不中詰之答曰欲碎爾首死為趙氏鬼耳巴哩巴曰汝殺我奚益胡不率衆救汝主琦曰在是惟汝為尊故欲殺汝耳巴哩巴歎曰使人人如此趙氏豈至是哉琦顧鄴曰汝享國厚恩今若此非人也聲色俱厲不少屈巴哩巴殺之後為立祠名旌忠熊克小歷云親事官唐寶袖石擊烏珠不中死之蓋因日歷所書而誤為烏珠也按會要及常置封事皆作唐琦又琦所擊乃巴哩巴太師置封事所言甚詳當以為信趙甡之遺史云烏珠在越州乘馬往來市中班直唐琦憤怒以石擊之被執罵不絶口亦罵李鄴降敵不忠被殺以王庭秀所記焚明州事考之疑烏珠未嘗過江又兩浙轉運司體究王翿死事狀亦云金將巴哩巴令翿權州趙甡之恐誤初鄴之降也提點刑獄公事王翿遁居城外寮吏皆迎拜朝散郎新通判溫州曽怘監三江寨獨拒敵不屈敵驅翿至城內執怘併其家殺之惟稚子崈得免怘􅘔兄也事平特命怘弟怤及崈以官王明清揮麈第三録越州李鄴既降通判曽怘不屈而死全家被害獨乳婢抱一嬰兒獲免事平詔特贈怘直祕閣命其弟怤子崈以官日歷紹興四年二月壬午承議郎曽思狀云兄朝散郎新通判福州怘於建炎二年十二月二十四日經越州申乞致仕乞將致仕恩澤奏補兄男崈吏部勘會本官未赴任間因浙東提刑司差監越州三江寨與敵抗拒不屈被害身亡承敇時與一資恩澤了當奉聖旨特與致仕恩澤一名據此則怘非本州通判明清小誤又所云贈直祕閣亦不見於史當考初上在越州遣選鋒將梁斌張進以所部屯諸暨縣及是金使人招之二人皆欲投拜其下不從乃與腹心數十人入城降敵既而張俊招其衆至溫州遂留麾下比敵去斌進復歸朝廷亦善待之於是屬邑不降者惟嵊縣宋宗年而已宗年事以紹興元年九月乙巳御史臺狀修入是日遣權户部郎官李承造往台州刷錢帛熊克小歷載承造之行在癸巳今從李正民乘桴記己亥徽猷閣直學士知平江府湯東野奏杜充自真州至天長軍與劉位趙立會合先是立以右武大夫忠州刺史知徐州朝廷聞金人南侵詔諸路兵援行在立以徐州城孤且乏糧不可守乃率將兵禁兵民兵約三萬人南歸會知楚州劉誨已赴召宣撫使杜充以楚州闕守命立率所部赴之立至臨淮被充之命兼程至龜山時金左監軍昌圍楚州急王銍撰立傳云托落郎君圍楚州即逹蘭而音誤也今正之立斬刈道路乃能行至淮隂與敵遇其下以山陽不可往勸立歸彭城立奮怒嚼其齒曰正欲與金人相殺何謂不可乃令諸軍曰回顧者斬於是率衆先登自旦至暮且戰且行出沒敵中凡七破敵無有當其鋒者遂得以數千人入城而後軍孟成張慶皆以所部渡淮北去方其入城也立口中流矢貫其兩頰口不能言以手指揮軍士皆憩而後拔其矢立之未至也通判州事直祕閣賈敦詩欲以城降至是乃止立入楚州趙甡之遺史繫之十一月王銍撰立傳云四年正月權知楚州未知孰的也熊克小歷載之五月末實甚誤前已辨之日歷湯東野奏十二月初九日徐州趙立差使臣來杜充府投下文字稱劉位兵馬未肯放令過淮杜充指揮令放渡過據此則立入楚州當在十二月末間今因東野奏杜充事附見李鄴之未降也上奏言金分兵自諸暨趨嵊縣徑入明州是日奏至乃議移舟之溫台以避之庚子上發昌國縣先是金分兵侵餘姚知縣事李頴士募鄉兵數千列旗幟以捍敵把隘官陳彥助之敵既不知其地勢又不測兵之多寡為之倣徨不敢進者一書夜繇是上得以登舟航海進頴士兩官擢通判越州頴士閩縣人也此以李正民乘桴記王明清揮麈第三録參修明清以為大駕由是得以自定海登舟恐誤蓋上以此月己丑登舟次定海縣是時敵未渡浙無由遣兵餘姚蓋上在昌國縣而金兵至餘姚頴士能擊却之耳今略修潤附入辛丑上艤舟白峯寺自是連日南風舟行雖穩而日行僅數十里云癸卯浙東制置使張俊與金人戰于明州敗之先是金遣兵追襲乘輿至城下俊遣統制官劉寶與戰兵少却其將黨用邱橫死之統制官楊沂中田師中統領官趙密皆殊死戰沂中師中初見元年正月辛卯密初見元年正月戊午主管殿前司公事李質率所部以舟師來助知州事劉洪道率州兵射其傍遂大破敗之殺數千人敵自城下呼請遣人至寨中計事俊令小校徐姓者往敵釋甲與語欲如越官吏投拜俊拒之趙甡之遺史云烏珠親追乘輿至明州而還按王庭秀閲世録金陷明州請於臨安之大帥注云大帥乃四太子據此則烏珠未嘗渡江也庭秀鄞縣人所聞必審今從之中興聖政龜鑑曰明州之戰金自髙橋攻西門併兵並進勢亦亟矣張俊忠義實奮發於下令軍中之時始則清野閉關以拒其來終則開門迎敵以挫其鋭中興戰功自明州一捷始敵自入中國以來未有一人敢嬰其鋒至此而軍勢稍張矣是月隆祐皇太后命統制官楊琪軍臨江軍張忠彥屯吉州以為行宫聲援忠彥河東人初以效用出身太原之破遁入五臺山後𨽻楊惟忠權中軍統領至是以所部屯廬陵就領州事金陜西諸路都統羅索將數萬衆圍陜府守將李彥仙悉力拒之初彥仙在陜增陴浚隍利器械積糧食鼓士氣且戰且守人心益堅固可用又嘗渡河與敵戰蒲解間民皆陽從敵而隂歸彥仙敵必欲下陜州然後併力西向彥仙亦自料金人必併兵來攻即遣人詣宣撫處置使張浚求三千騎俟金人攻陜即空城渡河北趨晉絳并汾搗其心腹金人必自救乃由嵐石西渡河道鄜延以歸浚不從浚貽書勸彥仙空城清野據嶮保聚俾敵無所掠我亦無傷俟隙而動庶乎功可成彥仙亦不從守城之意益堅至是羅索貝勒尼楚赫及知府州折可求合兵來侵彥仙以死拒之且告急於浚李成知金人已南渡自滁州率衆往淮西時成之黨周虎據蕪湖水軍統制邵青與戰一日七敗參議魏曦以小舟觀戰於中流既而告青曰吾知所以勝矣彼以紅巾軟纒與我之號一同故與戰則不能分彼我所以必敗宜易其號則勝矣青然之乃令其徒更作鑽風角子一戰勝虎青遂據蕪湖初杜充之衆既潰其統制官嶽飛劉經自芳山引衆入廣德軍後軍扈成駐于金澶縣為戚方所殺是嵗臨髙澄邁縣人陳韜鄧文等聚衆作亂官軍討平之此以紹興六年十二月十六日明槖申省狀修入諸路斷大辟三百二十四人户部言兩浙路户二百一十二萬二千七十二口三百五十六萬七千八百成都府路户一百一十三萬一千四百八十九口三百二十六萬九千三十六建炎以來繫年要録卷三十
