body:
  text: 建炎以来繋年要録巻一百七宋李心傳撰紹興六年十有二月甲午朔徳音降廬光濠州夀春府雜犯死罪已下囚釋流已下制曰朕以眇質獲承至尊念國家積累之基遭外侮侵陵之患誠不足以感移天意徳不足以綏靖亂源致彼叛臣乘予厄運頻挾敵勢来犯邊隅直渡淮濱将窺江滸所賴諸将協力六師爭先雖逆雛暫逭於天誅而匹馬莫還于賊境載循不道深惻于心俾執干戈皆朕中原之赤子重為驅役亦有本朝之舊臣廹彼暴虐之威陷兹鋒鏑之苦繇予不徳使至于斯申戒官司務優存没知朕興懷扵兼愛本非得已而用兵宜錫茂恩以蘇罷俗赦文學士朱震所草也詔行宫留守秦檜令赴行在所奏事張浚以檜在靖康中建議立趙氏不畏死有力量可與共天下事一時仁賢薦檜尤力遂推引之林泉野記云檜知溫州碌碌無治聲張浚為相上幸平江撫軍浚以檜柔佞易制薦入使備員乃除行宫留守今不取趙鼎既與浚不咸左司諫陳公輔因奏劾鼎至是徳音既下鼎復求去上愀然不樂曰卿只在紹興朕他日有用卿處是日臨安火所燔幾萬家詔以米一千斛賜被火之家貧乏者乙未詔左修職郎陳最已降溫州軍事判官指揮勿行初最既為端明殿學士知溫州李光所辟而侍御史周秘言令太中大夫知州帶一路鈐轄許辟本州官一員格軍事判官差從事郎已上為一陳最而廢二法豈今日之所宜若謂光為侍從可以創乞則今待制以上典藩者尚多為衆起例尤為不可乃罷之右宣義郎通判鄧州党尚友充湖北京西宣撫司幹辦公事用岳飛奏也丁酉詔權户部侍郎劉寧止赴行在本部供職仍舊總領措置應副四大軍錢糧戊戌右司諫王縉入對論簽書樞密院事折彥質之罪大略謂彥質於敵馬南向之時倡為抽軍退保之計上則幾誤國事下則離間宰臣乞賜罷黜先是張浚自江上還平江隨班入見上曰郤敵之功盡出右相之力於是趙鼎惶懼復乞去浚入見之次日具奏曰獲聞聖訓惟是車駕進止一事利害至大天下之事不倡則不起不為則不成今四海之心孰不想戀王室金豫相結脅之以威雖有智勇無由展竭三嵗之間賴陛下一再進撫士氣從之而稍振民心因之而稍回正當示之以形勢庶幾乎激忠起懦而三四大帥者亦不敢懷偷安茍且之心夫天下者陛下之天下也陛下不自致力以為之先則被堅執銳履危犯險者皆有解體之意今日之事存亡安危所自以分六飛儻還則有識解體内外離心日復一日終以削弱異日復欲下廵幸詔書誰為深信而不疑者何則彼知朝廷姑以此為避地之計寔無意扵圖回天下故也論者不過曰萬一有警難扵逺避夫将士用命扼淮而戰破敵有餘茍人有離心則何地容足又不過曰當秋而戰及春而還此但可以紓一時之急年年為之人皆習熟難立國矣又不過曰敵占上流順舟可下今襄漢我有舟何自来使敵有餘力水陸偕進陛下深處臨安亦能安乎上翻然從其計浚因獨對乞乘勝取河南地擒劉豫父子又言劉光世驕惰不戰不可為大将請罷之上問嘗與趙鼎議否浚曰未也浚見鼎具道其故鼎曰不可豫机上肉耳然豫倚金人為重不知擒滅劉豫得河南地可遂使金不内侵乎光世将家子将率士卒多出其門下若無故罷之恐人心不可浚不悅鼎復言强弱不敵宜且自守未可以進繇是與彦質俱罷云是日京東淮東宣撫處置使韓世忠引兵攻淮陽軍敗之此據趙甡之遺史國史及世忠碑誌皆無之日厯紹興七年正月十六日戊寅京東淮東宣撫處置使司差右武大夫劉寛齎㨗報前来行在所投進有㫖劉寅特與轉一官回授即此事也餘見七年正月辛巳己亥賜劉光世岳飛詔曰國家以叛逆不道狂狡亂常遂至行師本非得已並用威懐之略不専誅伐之圖葢念中原之民皆吾赤子廹於暴虐之故来犯王師自非交鋒何忍輕戮庶幾廣列聖好生之徳開皇天悔禍之衷卿其明體朕懷深戒将士務恢逺馭不専尚威凡有俘擒悉加存撫将使戴商之舊益堅思漢之心蚤致中興是為偉績毋或貪殺負朕訓言樞密院奏光世之将馬欽飛之将寇成等捕掠各五百人並行處斬已詰問欽成故有是詔翰林侍讀學士范沖入見因引疾求去不許庚子進士耿鎡詹叔霆等八人伏闕上書鎡等所上書未見或是留趙鼎當考叔霆已見十一月乙丑尚書省勘㑹朝廷設檢鼔院以来天下之言前後禁止伏闕指揮非不丁寧今月七日進士耿鎡等不遵禁約率衆伏闕顯是故有違戾切慮軍事之際因致揺動人情理宜懲誡詔耿鎡令平江府差人伴押赴紹興府府學聽讀叔霆差人押歸本貫信州並具已收管文状申省仍令尚書省榜諭龍圖閣學士知紹興府孫近兼沿海制置使徽猷閣待制知明州仇悆改兼管内安撫使直秘閣主管台州崇道觀陳兗充淮西宣撫司參議官用劉光世奏也辛丑以時雪賜沿江諸軍柴炭錢四宣撫司各萬五千緡殿前行司八十緡詔築南夀春城貴州助教唐斌陞循州文學斌連州人元符末為太學生坐上書詆誣送本貫自訟齋聽讀至是特奏名入五等從例乞推恩特録之壬寅尚書左僕射同中書門下平章事兼知樞密院事都督諸路軍馬兼監修國史趙鼎充觀文殿大學士兩浙東路安撫制置大使兼知紹興府制曰粤惟入輔之初密贊親征之議力與同列共濟多虞協股肱心膂之為張貔虎熊羆之氣㨗方奏而祈去章屢却而復来其詞學士朱震所草也詔鼎辭日令上殿出入如二府儀朱勝非秀水閑居録云趙鼎張浚争權浚自謂有却敵之功興復之䇿當獨任國事諷侍從臺諫及其黨與攻鼎出之按紹興九年四月殿中侍御史謝祖信論鼎初罷相詞命之臣欺主以保交乞不為貶責之詞葢指此事然是時陳公輔章疏既不降出則恐不應為責詞姑附此更湏參考召資政殿學士提舉臨安府洞霄宫張守赴行在将代折彦質也翰林侍讀學士兼史館修撰資善堂翊善范沖充龍圖閣直學士提舉江州太平觀沖再疏求去乃有是命龍圖閣學士知紹興府孫近試吏部尚書熊克小厯載近此除在甲午葢誤命右司貟外郎范直方宣諭川陜諸州及撫問吴玠一行将士三省言頃遣宣諭五使川陜獨不及故命直方往勞軍且察官吏能否上召見賜御寶手歴而遣之如有違戾詔條者許先次改正江東宣撫使張俊遣參議官直徽猷閣史愿降授左朝奉大夫郗漸来奏事且獻所獲偽統領官杜斌等上貸斌罪進愿一職漸一官遣還癸卯詔岳飛行軍襄漢正當雪寒令學士院降詔撫諭一行将士甲辰尚書司封貟外郎蘇符兼資善堂贊讀赴行在代范沖也資政殿學士成都等路安撫制置大使兼知成都府席益陞資政殿大學士命吏部侍郎都督行府參議軍事呂祉往建康措置移蹕事務乙巳上與宰執語唐開元之治曰姚崇為相甞選除郎吏明皇仰視屋椽崇驚愕久之後因力士請問知帝所以専任之意人主任相當如此張浚曰明皇以此得之亦以此失之楊李持柄事無巨細一切倚仗馴致大亂吁可戒焉上曰不然卿知所以失否在於相非其人非専委之過也浚曰明皇方其憂勤賢者獲進逮其逸樂小人遂用此治亂之所以分陛下灼見本末天下幸甚尚書左司郎中耿自求引疾求去罷為直顯謨閣知嚴州直寳文閣知臨安府李謨與本府二通判火作地分兵官皆貶秩坐不即救火也厯是日趙鼎入辭熊克小厯載鼎罷相在此日盖誤鼎既行上趣令之鎮鼎力辭新命且言臣才疎智短昧於周防無補毫分徒招怨咎是宜引分屛迹山林詔不許鼎在越惟以束吏恤民為務每言不束吏雖善政不能行葢除害然後可以興利易之豫利建侯行師乃所以致豫解公用射隼于髙墉之上謂射隼而去小人乃所以致解鼎之學得於易者如此至是姦猾屏息又塲務利入之源不令侵耗財賦遂足丙午秦檜入見端明殿學士簽書樞密院事兼權參知政事折彦質以舊職提舉臨安府洞霄宫趙鼎既去位彦質引疾求退章累上乃有是命崇信奉寧軍節度使開府儀同三司江南東路宣撫使張俊加少保鎮洮崇信奉寧軍節度使仍舊宣撫使龍神衛四廂都指揮使宻州觀察使權主管殿前司公事楊沂中為保城軍節度使殿前都虞候主管殿前司公事先是右司諫陳公輔言前日賊犯淮西諸将用命㨗音屢上邊土稍寧葢廟社之靈而陛下威徳所至然行賞當不踰時廟堂必有定議臣聞濠梁之急浚遣楊沂中来援遂破賊兵此功固不可掩劉光世不守廬州而濠梁戍兵輒便抽回如渦口要地更無人防守若非沂中兵至淮西焉可保哉光世豈得無罪此昭然無可疑者又沂中之勝以吴錫先登光世追賊王徳尤為有力是二人當有崇奨以為諸軍之勸若韓世忠屯淮東賊不敢犯岳飛進破商虢擾賊腹脅二人雖無淮西之功宜特優寵使有功見知則終能為陛下建中興之業朝廷以俊沂中功尤著遂優賞之沂中時年三十五也丁未手詔曰朝廷設官分職本以為民比年以来重内輕外殊失治道之本朕甚不取可自今監司郡守秩滿考其善状量與遷擢治效著聞即除行在差遣其郎官未歷民事者効職通及二年復加銓擇使之承流于外仍令中書御史臺籍記姓名俟到闕日檢舉引對參考善否取㫖陞黜庶幾天下百姓䝉被實恵以稱朕意時張浚専任國政首言親民之官治道所急而比年以来内重外輕祖宗之法盡廢流落于外者終身不獲用經營于内者積嵗得美官又官于朝者不歴民事利害不明詔令之行職事之舉豈能中理民多被其害遂條具以聞故有是詔明年三月癸未所書可參考尚書省言湖南制置大使呂頤浩江西制置大使李綱撫存飢饉招集流亡甚稱朝廷委寄之意並賜詔書奨諭仍令江東西湖南帥臣監司於旱傷州縣将奉行優劣各比較三兩處申省取㫖賞罰福建市舶司言蕃舶綱首蔡景芳招誘舶貨自建炎元年至紹興四年共收息錢九十八萬緡詔補景芳承信郎戊申手詔曰朕惟養兵之費皆取於民吾民甚苦而吏莫之恤夤縁軍需掊歛無藝朕甚悼之監司郡守朕所委寄以恵養元元者也今漫不加省復何賴焉其各勤乃職察吏之侵漁納賄者劾按以聞已戒敕三省官間遣信使周行諸路茍庇覆弗治流毒百姓朕不汝貸自今軍事所湏並令州縣揭榜曉諭餘依紹興元年五月二十四日詔㫖施行無或違戾觀文殿學士醴泉觀使兼侍讀秦檜令行在所講筵供職觀文殿學士行宫同留守孟庾充行宫留守詔川陜進士将来省試令四川制置大使司依舊例施行其合預殿試人並赴行在仍給五人衙門驛券自是為例都官貟外郎馮康國言四川州縣稅色輕重不同祖宗以来正稅重者折科稍輕正稅輕者折科稍重折科權衡與稅平準所以無偏重偏輕之患四川地狹民貧行之百有餘年常産之民甚以為安近年川陜宣司隨軍漕臣與總司官屬貪應辦之賞矜措置之能悉将祖宗兩稅舊法折科輙肆改易反覆紐折取數務多折科一改遂為永例棄業逃移由兹而致天聽髙逺聲何由聞此蜀民之大患朝廷之所未知也伏望並行住罷一遵舊例詔如康國請行下仍令憲臣察其不如法者己酉詔自今前宰相到闕並許張蓋為秦檜故也左從事郎江西制置大使司幹辦公事許忻特改合入官堂除見闕知縣令中書籍記姓名俟滿日考其治状與内外陞擢差遣忻翰弟上召對而命之庚戌詔官職如在職二年已上知縣資序人與除大郡通判通判資序人除知州軍任滿到闕令閤門引見上殿當參考治状善否取㫖陞黜仍令中書省御史臺籍記姓名辛亥資政殿大學士提舉臨安府洞霄宫張守自常州入見即日除參知政事詔監司守貳委寄非輕除授非人百姓受弊比年員多闕少致有除代數政尚慮選擇失當其間不無望實未副之人可令中書省開具已除監司守貳姓名送中書後省御史臺今後遇闕到前半年並加銓量如有不可任用之人具詣實聞奏與改作自陳宫觀三省言知通等闕近来往往取作堂除致吏部員多缺少差注不行詔知通除依舊格堂除並量留外餘闕并寺監正丞博士登聞檢鼓進奏官告文思諸司諸軍糧審院倉塲庫務局所法寺官外路學官並令吏部按法差注呂頤浩秦檜之共政也嘗以寺監丞以下闕歸吏部紹興二年四月旋又復之趙鼎為政稍取諸郡倅闕堂除五年閏二月至是復以内外百闕𨽻銓曹然不能久也詔樞密院都督府効士並令附来年春選人類試所就試時務䇿一道分優平兩等優等人再令學士院召試訪以時務文理優異者取㫖推恩壬子詔張守兼權樞密院事江州進士孫復禮投匭訟徳安令黄覿不法御筆令監司究寔上諭大臣曰復禮亦湏知管如體究所訟不寔即痛與懲誡檢鼓院止許士庶陳獻利害儻挾私怨有所中傷不惟長告訐之風亦非求言本意司農少卿提領江淮營田樊賓等言淮南自兵火之後肥饒之地今多荒蕪葢因民户稀少艱於廣行召募深恐所闕田土不至大叚增廣今諸大帥屯戍淮上而瀕淮之地曠土千里賊馬逺遁邊境肅清欲望特降睿㫖令諸大帥摽撥係官空閑無主荒田倣古屯田之制斟酌多寡於所部軍兵内以十分為率摘那下等一分或二分置立屯堡使就田作仍差諳曉農事将領主管使臣監轄依已降指揮官給牛具借貸之類其所收斛㪷除樁出次年種子官與力耕之人中停均分請給衣糧並不裁減其官中所得分數内支四釐充主管官六釐充監轄使臣職田如遇軍事警急則權住作田併充軍用候至嵗終比較以所收斛㪷從本司保明申奏優異推賞如䝉俞允乞以田五十頃為一屯作十莊差主管将領一員監轄使臣五員軍兵二百五十人如次年地熟人力有餘願添田聽從其便詔三大帥相度可否行之偽通直郎劉駜自耀州脫身来歸以為右修職郎乙卯右司諫王縉言風俗頽弊起於士大夫貪冐無耻不可不革今有不用舉主不問考第因近臣薦對即改官陞擢者用此以待才能之髙而㢘退自守固善也如亦與人不相逺或事請謁而得之聞者歆羨安得不馳騖乎初改官畧資序差通判者用此以待治状著聞奨擢示勸固善也如亦碌碌夤縁干托而得之人皆有求進之心而憚於作縣安得不馳騖乎故欲息奔競必在朝廷有以息之不澄其源雖降約束無益也欲乞明詔大臣自今除賢能之人宜擢用者待以不次外其餘並依吏部格法則各安分守職業交修頽風復振賢才輩出矣詔三省遵守丙辰鎮南軍節度使開府儀同三司荆湖南路安撫制置大使兼知潭州呂頤浩為兩浙西路安撫制置大使兼知臨安府仍赴行在奏事訖之任寳文閣學士新知襄陽府劉洪道知潭州充荆湖南路安撫使仍兼都督府參謀軍事新荆湖北路兵馬鈐轄張旦仍舊知襄陽府尚書禮部貟外郎都督府主管機宜文字楊晨為夔州路轉運判官用丙午詔也初命詞給告仍詔自今視此侍御史周秘請内責之户部外責之漕司搜括失陷裁損冗費以每嵗所入者専充經常之費以向所泛取者留為不時之用詔赴户部詔淮北之民皆朝廷赤子廹於暴虐使犯兵威憐其無辜死於鋒鏑可更遣官於藕塘鎮設黄籙醮三晝夜追薦之故武節郎劉廣特贈武翼大夫閤門宣贊舍人與三資恩澤廣張俊部曲淮西之役死焉丁巳少保武寧保靜寧國軍節度使淮南西路兼太平州宣撫使劉光世為䕶國鎮安保靜軍節度使光世以王徳追賊之勞乃有是命翰林學士朱震乞以自古循吏𫝊編成一書遇守令有治行者賜之上曰不若有治行者或進官或擢用無治行者隨輕重責罰賞罰既行自有懲勸賜循吏𫝊恐無補於治詔諸路監司今後分上下半年開具所部知縣有無善政顯著繆懦不職之人申尚書省時廵幸隨軍都轉運使梁汝嘉言國家方重縣令之任然近在輦轂之側耳目所接無慮數十邑尚有不能戢吏愛民以副軫念元元之意望督責監司俾之按察故有是㫖右朝奉大夫主管台州崇道觀家彦投匭獻川陜邊防利害且言宣撫司自王似盧法原後便宜轉行朝議大夫至四十五貟皆非殊功異績特以請求賄賂而得之詔制置大使席益取索雜功改轉之人速行改正彥眉山人也戊午詔自今吏部注擬知通守令並選擇非老病及不曽犯賍與不縁民事被罪之人仍申中書門下省審察旬具注擬人脚色關御史臺如非其人許本臺彈奏用中書請也既而行宫吏部請曰民事犯徒已上罪人如今詔吏部奏在七年六月己酉自祖宗以来以公私賍三等定天下之罪至是始増民事律焉己未兵部尚書兼權吏禮部尚書劉大中充龍圖閣直學士知處州免朝辭趙鼎既罷政大中引疾求去位疏再上乃命出守大中又言臣以戇愚積多仇怨優職便郡豈臣可堪至於直降指揮免辭天陛進退之際臣竊有疑重念臣父左宣教郎湜見任處州州學教授有此妨嫌不敢隠黙乞一在外宫觀詔不許中書勘㑹湜合該避親乃命湜易婺州州學教授左司諫陳公輔言朝廷所尚士大夫因之士大夫所尚風俗因之此不可不慎也國家嘉祐以前朝廷尚大公之道不營私意不植私黨故士大夫以氣節相髙以議論相可否未嘗互為朋比遂至於雷同茍合也當是時是非明毁譽公善惡自分賢否自彰天下風俗豈有黨同之弊哉自熙豐以後王安石之學著為定論自成一家使人同己蔡京因之挾紹述之說於是士大夫靡靡黨同而風俗壞矣仰惟陛下天資聰明聖學髙妙将以痛革積弊變天下黨同之俗甚盛舉也然在朝廷之臣不能上體聖明又復輒以私意取程頤之說謂之伊川學相率而從之是以趨時競進飾詐沽名之徒翕然胥効倡為大言謂堯舜文武之道𫝊之仲尼仲尼𫝊之孟軻軻𫝊頤頤死無𫝊焉狂言恠語淫說鄙喻曰此伊川之文也幅巾大袖髙視濶歩曰此伊川之行也能師伊川之文行伊川之行則為賢士大夫捨此皆非也臣謂使頤尚在能了國家事乎取頤之學令學者師焉非獨營私植黨復有黨同之弊如蔡京之紹述且将見淺俗僻陋之習終至惑亂天下後世矣且聖人之道凡所以垂訓萬世無非中庸非有甚髙難行之說非有離世異俗之行在學者允蹈之而已伏望聖慈特加睿斷察羣臣中有為此學相師成風鼔扇士類者皆屏絶之然後明詔天下以聖人之道著在方冊炳如日星學者但能參考衆說研窮至理各以己之所長而折中焉惟不背聖人之意則道術自明性理自得故以此修身以此事君以此治天下國家無乎不可矣毋執一說遂成雷同使天下知朝廷所尚如此士大夫所尚亦如此風俗自此皆知復祖宗之時此今日之務若緩而急者輔臣進呈張浚批㫖曰士大夫之學宜以孔孟為師庶幾言行相稱可濟時用覽臣寮所奏深用憮然可布告中外使知朕意先是范沖既去位公輔以沖所薦不自安㑹耿鎡等伏闕上書或者因指公輔靖康鼓唱之謗公輔懼見上求去因上此疏詔公輔朕所親擢非由薦引可令安職毋得再請時朱震在經筵不能諍論者非之熊克小歴畧載此事于明年正月旦云上因語學者當以孔孟為師按日厯此日無聖語但于公輔奏後書有㫖云云則是大臣批㫖也今從日厯湖北經畧安撫使王庶乞令澧長沅靖四州以閑田共招刀弩手三千五百人沅州千五百辰州千人澧靖州各五百餘田召人承佃從之四郡刀弩手舊額萬人靖康末調赴河東少還者至是朝廷命庶相度招填故有是請也詔宗室添差不釐務者皆作宫觀嶽廟尚書駕部貟外郎張宇知撫州宇守兄避親嫌也權户部侍郎王俣請申嚴截留兊借上供及右曹錢物執奏不行之法詔自今非有軍期急速不得輒有陳乞支借餘從之辛酉詔張浚監修國史御筆徽猷閣直學士知鎮江府胡世将為給事中上謂參知政事張守曰本不須親批恐卿以鄉人為嫌守曰臣䝉恩備位政地纔旬日未有一毫以慰中外首召世将必謂臣私於鄉黨寔以常州多士時有進用者臣頃在廟堂屢遭此謗凡惡臣者皆以藉口上曰擢用人才豈可以嫌自疑世将之賢朕固知之守曰如世将人才誠不易得臣頃固嘗論薦亦不敢以臣之私妨嫌賢者但世将雖陛下親擢恐逺近不能户曉上曰無慮也詔以山隂至長沙四十縣並作堂除浙西之邑十四浙東九江東八江西福建各四湖南一先是上既詔銓擇郎官補外而左司諫陳公輔言縣令之職尤為近民望将寺監丞簿編刪六院官已改秩未歴民事之人各與銓擇取繁難大邑近見闕作堂除一次還日陞黜如詔㫖詔見是月丙午事下左右司至是都司請以編刪已下嘗歴州縣未滿三考之人堂除大邑俟去替半年未有堂除之人即於本路注擬從之直徽猷閣知廬州趙康直進職二等敵之寇淮西也康直乘城不動民賴以安故有是命賜故安化郡王王稟家建康田十頃銀帛五百匹兩稟守太原死節事見靖康元年九月丙寅其子忠訓郎荘等流寓貴州前是樞密院言其忠召荘至行在以為樞密院準備差遣至是又優䘏焉偽齊劉豫密知金人有廢已之謀是冬遣皇子府參謀馮長寧請於金欲立淮西王麟為太子以嘗其意金主亶謂之曰先帝所以立爾者以爾有徳於河南之民也爾子還有徳耶我未之聞也徐當遣人咨訪河南百姓以定之夏國主乾順遣兵渡河自天徳軍至塔坦取所亡馬而歸不假道於金時左監軍薩里罕在雲中不敢詰偽齊録有劉豫謝封曹王表云俄知廢罷之議愈堅措畫之心是金人廢之之意豫葢先知也今畧採取附見是嵗樞密院始空名給據許諸軍代名之人赴軍書填一切不問紹興九年九月辛卯所書可參考兩浙轉運司始取婺秀平江嵗計寛剩錢二十二萬緡自是以為例右奉議郎河北軍前通問使魏行可為金所拘至是九年或謂行可嘗上金帥書警以不戢自焚之禍以謂大國舉中原與劉豫劉氏何徳趙氏何罪哉若亟以還趙氏賢於奉劉氏萬萬也是嵗行可卒未幾其副右武大夫果州團練使郭元邁亦卒于金中行可十四年正月丁酉贈官建炎以來繫年要録巻一百七建炎以來繫年要録巻一百七金人地名考證塔坦原書作韃靼誤改見巻五十八薩里罕原書作撒離喝誤改見巻十一
