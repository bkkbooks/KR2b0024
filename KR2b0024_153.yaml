body:
  text: 建炎以來繫年要録卷一百五十三宋李心傳撰紹興十有五年嵗次乙丑五金熙宗亶皇統年春正月丁未朔初行大朝會禮于大慶殿用黃麾仗三千三百五十人視東都舊儀損三之一輦出房不鳴鞭以殿狹也自建炎以來正至不受朝但宰臣率百官拜表稱賀而已及太母還宫言者以為國家大慶四方來賀亶維其時乞舉行大禮禮官以日迫不可行次年復以大禮後權罷至是乃講焉戊申瀘南安撫使馮楫獻嘉禾九穗上曰近日州郡所奏嘉禾甚多大有年之慶庶幾可望也壬子宰執奏事秦檜因論士大夫之弊曰軍興以來無肯為國出力者所以不能勝敵臣嘗謂敵之所以勝我者以其用心朴實故爾上曰朕觀太祖太宗以來多用朴實之人所以風俗厚而根本固中興聖政臣留正等曰士大夫之弊以風俗之移人也風俗之無弊其惟祖宗之時乎漢周勃張相如此皆髙帝之臣也逮事文帝其言不能出口一時在廷之臣誰獨無有長者哉及帝善嗇夫之對而張釋之稱譽二人者至于反覆問辨蓋眀其為髙帝之臣也漢嘗以是繼秦而爭天下矣秦政弊則徒文具而無實天下為之風靡漢誰與敵哉故釋之亦因為文帝言之士大夫而趨浮偽之俗宜為國者之所深戒也癸丑故武功大夫文州刺史趙成特贈左武大夫忠州團練使官其家三人先是漳州長泰縣民華齊作亂安撫司遣成率兵往討之官軍敗成與其將校死者十四人軍校不與焉右迪功郎長泰縣尉陳休烈將射士捕齊死于陳詔贈左承務郎録其子為文學乙卯祕書省著作佐郎兼普安郡王府教授趙衛錢周材並為著作郎校書郎陳誠之為祕書郎左宣教郎黃公度為祕書省正字戊午保信軍承宣使知閣門兼權樞密副都承旨曹勛提舉洪州玊隆觀從所請也己未分經義詩賦為二科以取士辛酉初藉千畝用司封郎中李澗請也資政殿大學士知建康府張守薨諡文靖丁卯四川宣撫副使鄭剛中乞減成都府路對糴米三分之一本司激賞錢二十萬緡時剛中于階成二州營田抵秦州界凡三千餘頃嵗收十八萬斛而軍撫司激賞錢已減為一百萬緡至此復有此請上謂秦檜曰纍年民力少寬此休兵之效也其從之戊辰上始聞端眀殿學士左朝奉大夫同簽書樞密院事王倫死狀謂秦檜曰倫雖不矜細行乃能守節死敵人誰無死擇死為難耳于是贈左通議大夫輟一日朝詔報其家且賜銀帛三百匹兩未幾其子述從北人得其骨以歸官給葬事後諡愍節輟朝在二月戊子今併書之日厯不載贈官此據會要未得其日命權户部侍郎王鈇措置兩浙經界李椿年既以憂去秦檜請用鈇上因言經界之法細民多以為便檜曰不如此則差役不行賦稅不均積弊之久今已盡革去年陛下放免積欠天下便覺少蘇鈇言本部員外郎李朝正嘗知溧水縣均稅不擾請與共事又言今當革詭名挾户侵耕冒佃使差有常籍田有定稅則差役無爭訴之煩催科免代納之弊然須不擾而速辦則實利及民欲更不畫圖又造砧基簿止令逐保排定十户為一甲令遞相糾合從實供帳二本積年所隱一切不問如有不實致人陳告即將隱田給以充賞從之朝正同措置在此月辛未己巳御筆尚書禮部侍郎兼直學士院提舉祕書省秦熺除翰林學士左諫議大夫何若知貢舉權吏部侍郎陳康伯祕書少監遊操同知貢舉若操常為發解所試官及是再命之非故事也敷文閣直學士新知紹興府張叔獻卒庚午工部尚書兼侍讀詹大方罷為龍圖閣學士知紹興府敷文閣待制知撫州朝諫之充敷文閣直學士知建康府諫之嘗言崇仁縣民婦産三男足驗生齒蕃息之盛十四年八月丁卯又言臨川縣禾登九穗足為瑞應其年九月癸未皆乞宣付史館秦檜喜故擢用之林泉野記云檜頻使臣僚及州縣奏祥瑞以為檜秉政所致云康吕中大事記日屢食則檜皆以隂雲不見賀彗星見與之以為不足畏檜則與之改秩而日使臣僚及州縣奏祥瑞以為檜秉政所致而已辛未初命諸路僧道士納免丁錢時言者論今官尹皆納役錢而僧道坐享安間顯為僥幸乃詔律僧嵗輸五千禪僧道士各二千其住持長老法師紫衣知事皆遞增之至十五千凡九等日歷無此今以會要修入趙甡之遺史在紹興五年六月蓋誤是日上因論和買預買之弊秦檜言户工部不可不兼𨽻在祖宗時皆𨽻三司今户部以給財為務工部以辦事為功誠非一體上甚以為然檜又奏宗子成忠郎不皎娶倡女為妻為大宗正司所劾上曰宗子不肖至於如此然其間不無清貧有守之人前日有貧而不能娶者朕賜之千緡所以勉之也其後有司具獄不皎坐除名令宗司庭訓拘管九月壬子行遣甲戍斬閬州人龎師道于都市師道亡之北境自稱從義郎妄言朝廷機事金械之還故戮之乙亥權尚書户部侍郎王鈇進秩一等以頃在兩浙轉運司修都亭驛成推恩也右朝奉大夫主管台州崇道觀向子忞特降三官子忞寓居衡山帥臣劉昉希秦檜意劾其強橫虐民故有是命二月丁丑朔故迪功郎莫正贈承務郎正嘗權東海縣偽守王山招之不從為所殺故録之戊寅上謂大臣曰朕觀史册見古之養士有至二三千人亦朝廷一盛事於是增國學弟子員百人通舊以七百人為額尋命置上舍三十人內舍百人用監丞文浩請也浩建請在癸卯己卯命簽書樞密院事楊願兼修玉牒庚辰上曰聞軍士亦有喫菜者此曹多食素則俸給有餘恐驕怠之心易生可諭諸統兵官嚴行禁戢癸未故除名人溫濟追復拱衛大夫威州防禦使濟自海外量移潭州死於道至是用其家請而復之丁亥兵部郎中葉庭圭轉對言陛下比者専尚文德天下廓廓無事然藝省書籍未富切見閩中不經殘破之郡士大夫藏書之家宛如平時如興化之方臨彰之吳所藏尤富悉是善本望下逐州搜訪抄録從之己丑右承直郎郭諴特改右宣教郎諴普安郡王夫人之父也庚寅翰林學士秦熺兼侍讀給事中李若谷兼侍講直祕閣褔建路轉運判官徐琛為兩浙西路提點刑獄公事琛南昌人也王眀清揮麈録云徐獻之琛王氏甥與秦檜之妻為中表而師川之族弟也會之知髙宗眷念師川不替一日奏事啓上云徐俯身後伶俜可憐有弟琛能承兄之業願陛下録用之上從其請其後獻之為二卿會之並緣上率皆類此按此句上下文疑有脫誤壬辰和州防禦使錢愷知閣門事癸巳左武大夫保順軍承宣使知閣門事何彥良落階官為閬州觀察使二人皆以當出疆之勞特遷之乙未權户部侍郎王鈇乞諸路州縣民户科折之數自第一至第四等一例均敷從之先是講和赦書以上户規避物力析為下户自今令一等科敷已而諸路多言貧民由此不能自存有失朝廷憂恤之意故鈇以為請己亥保大軍節度使崇國公璩加檢校少保進封恩平郡王以將出閣故也其官屬禮儀並依普安郡王體例三月丁未降旨顯謨閣直學士提舉江州太平觀程邁卒辛丑故承奉郎王眀特與一子官以前任德清軍使與金人戰死故也三月按是月丙午朔丁未寧國軍承宣使幹辦皇城司吳益為保康軍節度使提舉萬夀觀甲寅監察御史黃應南提舉廣南東路刑獄公事辛酉武信軍承宣使添差江南西路兵馬鈴轄兼安撫司統制程師回升本路馬步軍副都總管洪州駐劄時師回統兵戍贛上會詔歸北境人而師回有親兵數百憚不欲行守臣祕閣修撰薛弼諭之曰公從卒多不可庇公能遣此屬朝廷必多公若庇不遣原闕四字責矣師回承命既而省符趣師回就道遂去師回舟行過大孤山舟人告毋作樂恐龍怒師回故命其怒奏蕃樂少頃黑雲四合有物湧波間目如金盤師回射中其目即還入水風亦息安流而濟人皆服其勇此以洪邁夷堅乙志及熊克小歷參修但邁以為紹興十二年事而克繫之十三年則皆誤也按薛弼以紹興十三年八月除知虔州今年五月移廣州當此時弼固在任意者師回統戍日久故用改除使之離去耳五月戊午白常指揮略同更須參考癸亥左朝奉郎提舉江州太平觀筠州居住李文會降授左奉議郎武翼郎四川宣撫幹辦公事范寧之降授從議郎借補迪功郎陳洵武杖脊刺面配泉州牢城收管初王師心之北使也文會以洵武屬師心為官屬寧之保之楊願在中司以此擊文會罷政至是鞫實而有是命甲子上謂大臣曰交鄰之道當以守信為主秦檜曰臣觀真宗皇帝時雖諸蕃小國如溪洞之類亦必委曲調護不欲起兵端可謂至仁矣時金人來索北客之在南者檜因遣敷文閣待制周襟馬觀國史願北還襟等還北史皆不書惟孫覿撰李謨墓志云金檄還北客之落南者馬觀國在遣中過公别涕泣而出趙甡之遺史繫之今年三月故因檜奏語附書之但甡之以襟為金蓋字誤林泉野記云檜命盡發前後所得大金契丹及歸眀人五萬還于大金內弱軍勢絶後來歸降之心不知北人何以至有五萬當考按誓書云淮北人願歸者更不禁約去年四月上嘗以此諭檜令回檄泗州檜奏如此甚便與野記遺史諸書全不同今併附此中亮大夫武勝軍承宣使荆湖北路馬步軍總管巨師古提舉建昌軍仙都觀從所請也丙寅步軍司奏軍器事上曰朕頃在京帥見內庫所藏弓矢皆太宗真宗朝所製經歷百年記識如新蓋製造精善故也丁卯直祕閣劉堯佐堯仁並升直敷文閣主管台州崇道觀戊辰進呈廷試䇿題上曰䇿題蓋欲入仕者皆知趨向之正秦檜曰士人趨嚮不正久矣亦風俗使然在陛下力與變革上曰朕觀五十年前人材皆是仁宗時涵養所致以此知人材正在作成也己巳上䇿試南省舉頭林機等于射殿制略曰朕託士民之上所賴以濟者惟正賢碩能然乃或同於鄉原専於身謀不修亷隅不本忠信平居肆貪得之心臨事乏首公之節使風俗曠然大變必有術處此舉人劉章答䇿言陛下既以先修其身而又任用真儒始終如一又曰陛下法守古先得一賢者必思先王所以任之之誠得一能者必思先王所以使之之方彼賢者能者孰敢不盡忠竭節於下哉王剛中䇿言帝王之應世非治天下之難必得真賢碩能之用為難許必勝䇿言今日廟堂之上其所以董正百官者竭誠盡忠以謀國事縉紳知之將見觀感視效自然而化又曰國家廟堂之上秉握鈞衡總攬庶職者其於節義之事在人耳目輝映今古天下縉紳方且相與取正而激勵今陛下乃以士大夫偷墮為患其亦陛下之過計有司擬章第三及進呈上親擢為首剛中次之必勝又次之機侯官人章龍逰人剛中浮梁人也壬申徽猷閣直學士提舉亳州眀道宫洪擬卒諡文憲夏四月丙子朔賜太師秦檜甲第一區戊寅檜遷居賜第命內侍東頭供奉官王晉錫押教坊樂導之賜檜銀絹緡錢各一萬綵千匹金銀器皿錦綺帳􅀈六百八事花千四百枝是夜彗出東方庚辰左宣教郎新廣東提點刑獄公事黃應南乞詔湖廣諸州勿縱省民私交溪洞及令監司帥臣覺察所部勿造事端以起兵釁秦檜言近邊徭人與吾民互市恐難抑絶上曰朕見往年西夏亦有互市中間禁止遂致用兵可令帥司相度後不行癸未賜正奏名進士劉章等三百人及第出身同出身正奏名張鎡新科眀法及第甲申特奏名林洵美等二百四十七人武舉正奏名應褒然等二人特奏名三人授官有差乙酉詔臨安府捕武經郎方直治罪直前宰相趙鼎給使以事至行在侍御史汪勃言今國是既定內外寧謐豈容姦人輒肆窺伺而趙鼎使臣尚不知革心從化復敢如此民聼謂何其後本府言直罪如章乃送漳州羈管丁亥赦天下前四日上謂秦檜彗星見朕甚懼焉卿等可圖所以消弭之道檜奏太宗真宗朝嘗緣彗星疏決獄囚等事上曰且降詔以四事為主避殿減膳寬民力出滯獄於是手詔監司郡守條具便民事目憲臣巡行親決獄事是月癸未至是肆赦勘會數十年來邊臣邀功生事今當兼愛內外期于並生勘會數十年來學者黨同伐異今當崇雅黜浮抑其専門勘會纍年以來兵革不息近者講和罷戰正以保全生靈愛惜民力已降手詔委諸路監司郡守措置裕民事目務要必行以施實德尚慮徒為文具令三省考核取旨賞罰戊子右朝請郎知大寧監龎昌孫及兵職官三人並罷坐民居遺火不即撲滅致延燒官物文書甚衆為宣撫司所劾故也庚寅四川宣撫司募禁衛三百人至行在上曰此輩逺來宜厚犒勞沿途探請悉與蠲之居止亦須令便利庶皆得所成州團練使知敘州邵隆卒隆在金州數以兵出敵境秦檜恨之至是因飲酒暴卒年五十一或謂檜密使人鴆殺之敘人皆悲哭為之罷市壬辰樞密院編修官王墨卿魏元若並為祕書省著作佐郎兼恩平郡王府教授秦熺嘗從墨卿學故薦用之甲午上諭大臣曰比遣將捕盜閩中第令殱其渠魁脅從者皆釋若措置得宜優與推恩不然罰亦隨之時福建劇盜號管天下者攻剽郡邑為姦詔殿前司後軍統制張淵往捕之故有是諭丁酉太學博士楊邦弼罷侍御史汪勃論邦弼操心不正每探朝廷事傳播于外與罷黜者交通曽不以教導為職乃以邦弼通判信州庚子省四川都轉運司以其事歸宣撫司時宣撫副使鄭剛中言四川軍屯已移內郡自有逐路漕司應副都漕司虛有冗費故省之十五年十月庚子置總領官皇叔廣州觀察使知西外宗正事士慷卒特賜其家銀帛百匹兩後贈開府儀同三司追封和國公辛丑祕書郎陳誠之守尚書祠部員外郎左從政郎新和政縣令湯思退左朝奉郎行大府寺主簿王曮並為祕書省正字左承務郎洪邁為敕令所刪定官思退麗水人曮㬇從弟邁皓子也三人皆以博學宏詞合格賜第故有是除既而言官汪勃論邁知其父不靖之謀同惡相濟乃以為福州州學教授洪邁罷在閏十一月戊午賀州刺史御前摧鋒軍統制吳錫為江南西路兵馬鈐轄兼安撫司統制虔州駐劄五月丙午朔龍神衛四廂都指揮使宣州觀察使主管侍衛步軍司公事趙密為定江軍承宣使先是海冦朱眀作亂朝廷遣步軍司統領左武大夫武泰軍承宣使張守忠捕降之詔進守忠一階而密有是命己酉侍衛步軍副都指揮使武勝軍承宣使王貴為福建路馬步軍副都總管上覽除目曰此輩處之優穩如此則見在軍者有所激勸矣秦檜曰聖慮及此可謂深逺熊克小厯云初步軍副都指揮使王貴因告張憲嶽飛之事擢為管軍至是除福建副總管按飛以紹興十一年誅死眀年三月貴罷為褔建副總管以田師中代之未嘗除管軍又按是時步帥乃韓世良後改用趙密蓋貴止是帶軍職克誤以為步帥也癸丑祕閣修撰知虔州薛弼移知廣州丙辰詔減東南和預買絹匹一千以寬民力秦檜曰陛下天資仁厚每欲實德及民大類仁祖上曰朕安敢望仁祖百分之一十七年九月折帛錢再減戊午詔貧民産子者豫義倉米一斛以大理寺丞周懋轉對有請也始命給錢四千至是懋言免役寬剩所收至微豈能賙給今所在義倉未嘗移用若嵗令一路發千斛以活千人以諸路計之不知所活幾何皇天親饗本支有衍於百世矣乃命户部措置行之懋東陽人也事已見紹興八年五月庚子十一年三月乙巳正侍大夫忠州防禦使添差荆湖南路馬步軍副都總管白常移潭州駐劄時金人來索在南將士常亦在遣中同行者悉為敵效力常獨不肯往曰丈夫死則死耳不能為反覆士每自書頭銜曰前熙河經略使白某右副元帥薩里罕見之不恱也後欲強官之竟託疾以免常有産在德順熙河守將惡之大詈曰白常既臣我家而尚宋官乎械繫久之常不屈而止秦檜遣還北人史無由見如馬觀國則見於孫覿集程師回則見於洪邁夷堅志然皆因他事及之故無始末獨白常事原興宗西陲筆略記之稍詳常嘗為洷原總管興宗載此事在紹興十五年又云與王四小巢俱遣王嘗位荆南總管巢亦位將鎮二人本末未詳當考己未右武大夫貴州刺史張延夀升和州防禦使録措置監牧之勞也庚申大理寺丞周懋言紹興敕罪人情輕法重者並奏裁立法之意謂法一定而不易情萬變而不同設法防姦原情定罪必欲當其實而已比年以來內外官司類皆情重法輕聞奏必欲從重而以情輕奏者百無一二豈人人犯罪無有非意誤冒可輕比者邪陛下聖德寬仁惟刑之恤而有司未能推原美意其於情法疑讞輕重不倫伏望申戒法官應罪人情輕法重者並仰遵守敕條聞奏以從輕典仍委所屬時加檢察如有違戾並以故入之罪罪之庶使無知小民免致非辜悉罹重憲以副陛下好生之德從之壬戌復置六部架閣官六員亦以周懋轉對有請也尋遂以右迪功郎彭照掌吏部右從政郎艾若訥掌户部右迪功郎周紫芝掌禮兵部右迪功郎蘇鑒掌刑工部按題名照等填闕在今年七月今併附此癸亥詔自今新除學士正謝前一日待詔即私第宣召入院如故事用翰林學士秦熺請也渡江後此禮久廢至是熺奏復之惟敕設以院隘不容鋪設而止按此句疑有脫誤司農寺丞王會守尚書比部員外郎會㬇弟也甲子金國賀生辰使龍虎衛上將軍殿前左副都點檢完顔宗永副使通議大夫充翰林待制程寀見于紫宸殿初燕垂拱殿辭亦如之丙寅天申節百官用樂上夀于紫宸殿丁卯賜宗永等燕射于教場自是遂為故事初宗永等將至秦檜言於上曰使人及期而來蓋由待之以禮示之以信故也上曰大抵為國之道既不能強又不能弱則兵連禍結無有已時朕何惜為天下生靈少屈耶於是遣吏部侍郎陳康伯接伴而和州防禦使知閣門事錢愷副之宗永甫入疆上以端午遣中使賜扇帕于洪澤宗永言上國是日例賀當北靣再拜且接伴使副同之乃敢受康伯以舊制却之或謂康伯此細故朝廷必不惜康伯曰今曲從之後為例不復可改且辱命自我始况所求或無厭寧能盡從之乎宗永卒受賜因自辨數曰接伴慢我朝廷聞之懼生事引見之前日侍御史汪勃即劾康伯酬對辱國望罷之以副惇信睦鄰之意乃出康伯知泉州而愷亦降為舒州團練使上語在四月戊寅宗永入界在此月戊申勃奏康伯在癸亥愷貶秩在甲子今聫書之入內東頭供奉官幹辦御藥院主簿原本闕名還所寄資為武功大夫貴州防禦使令吏部差監鄂州酒務日下出門坐於職事全不用心也此未知與接伴有無相關當考庚午命權禮部侍郎宋之才宣州觀察使知閣門事康益充送伴使副舊例接伴使副就充送伴至是以金使有詞故易之辛未之才等入對六月乙亥朔日有食之丁丑上幸秦檜新第後八日降制加恩封檜妻魏國夫人王氏為韓魏國夫人熺妻淑人曹氏為和義郡夫人孫右承事郎塤堪坦並直祕閣賜三品服時塤年九嵗士午端眀殿學士四川宣撫副使鄭剛中遷資政殿學士剛中引疾乞奉祠故有是命直祕閣通判眀州錢端禮提舉淮南東路茶鹽公事甲申右奉議郎喻樗通判衡州丙戍龍圖閣學士知臨安府張澄奏修蓋太師秦檜第宅官吏名銜詔第一等轉兩官餘以次第賞尋拜澄端眀殿學士澄進職在是月丙申林泉野記云檜築賜第窮土木之麗戊子翰林學士左朝散大夫知制誥兼侍讀提舉祕書省秦熺特遷左中奉大夫充翰林學士承旨故迪功郎張木漸特官一子以任敘浦縣主簿歿於王事也庚寅左朝請大夫曽班主管台州崇道觀班始坐降金削籍編置不知何時牽復也癸巳右朝散郎張昌知楚州昌守真州代還入見言兩國通好使命往來則運河隄岸不可不治望令淮浙沿流令尉兼帶入銜從之王眀清揮麈録稱秦檜喜昌就官簿中減去十嵗擢知楚州事已附見紹興十二年五月戊申昌除知真州注或可修潤附此乙未命給事中李若谷權户部侍郎王鈇看詳監司守臣所上應詔條其裕民事件左承事郎充皇太后宅教授張本面對乞令逐路憲司每季條具一路刑獄禁繫多寡核實以聞嚴加黜陟詔刑部申嚴行下本尋遷一官本進官在己亥敕令所册定官錢龎面對乞申戒州縣或遇水旱從實檢放從之丙申刑部侍郎周三畏進權本部尚書祕閣修撰新知廣州薛弼充集英殿修撰與敷文閣學士知福州莫將兩易時虔梅及福建劇盜有號管天下伍黑龍滿山紅之屬其徒稍衆攻劫縣鎮鄉民作山寨自保將言漳泉汀建四州接江西廣東之境緣遊手輩從賊熟識小路引其徒直衝縣鎮如入無人之境官軍不習山險多染瘴疫難於掩捕乞委四州守臣募強壯遊手每州一千人為效用時殿前司後軍統制官張淵措置本路盜賊有旨委將同措置淵請逐州先招五百人許之未及招而將易鎮丁酉秦檜奏以左朝散大夫新福建路提點刑獄公事王元鼎措置本路盜賊公事上曰可諭殿前司自今招捕郡冦分填諸軍闕額則盜賊銷矣元鼎候官人也戊戍秦檜為上言士大夫多橫議無益國事上曰靖康之事是也朕見當時士大夫奏狀多是李綱耿南仲等紛紛爭議無肯以國事為慮者檜曰靖康之初金主自令斡里雅布就便酌中施行誠有人肯任國事則大計久已定矣上曰後來生靈塗炭之甚皆由於此所以國家大事須在得人肯任檜曰非人主聖志先定豈臣下所能決已亥翰林學士承旨秦熺入見引李淑故事乞避親且言前此以和議文字多所關預國事至重不敢有請今則大計巳定望許臣罷職庶幾不紊彛制不許辛丑江東轉運判官趙不棄乞令監司察部內縣令老病不職者與嶽祠上曰朕嘗謂縣令最為親民又非郡守之比贓固不可而庸繆之人尤害百姓蓋因其庸繆則吏計得行若十吏用事是有十縣令矣建炎以來繫年要録卷一百五十三建炎以來繫年要録卷一百五十三金人地名考證薩里罕原書作撒離喝誤改見卷十一斡里雅布原書作斡離不誤改見卷一
