body:
  text: 建炎以來繫年要録卷一百九十一宋李心傳撰紹興三十有一年秋七月按是月壬申朔癸酉御史中丞充湖北京西宣諭使汪徹入辭上命凡吏之能否民之利病悉以上聞徹受詔而去詔左迪功郎新德安府府學教授王質已降召試館職指揮更不施行質宣城人入太學為諸生始登第即召試而言者論其學術膚淺日遊權門乃罷之溫州進士王憲特補承節郎充溫州總轄海船先是降空名告身六十道下溫福諸郡造海舟憲獻策乞用平陽莆門寨所造巡船為式每舟闊二丈有八尺其上轉板坦平可以戰鬬詔用其言遂有是命憲獻策在六月戊辰敷文閣直學士提舉江州太平興國宫劉觀卒年八十六乙亥百姓郭云內殿奏事郭云未見當考忠翊郎孫顯忠為閣門祇候知安豐軍以顯忠在廬州措置民兵有緒故也丙子詔曰乃者放嬪御罷教坊省間局減冗員惟是約己裕民而浮言胥動幾惑衆聼監司郡守其各體朝廷之意明致之民務在實德毋為虛文以稱朕意言者論南班宗室生日支賜等並行全給蠧耗國用户部請損其半上曰所賜無幾若減其半恐宗室無以自贍姑仍舊可也戊寅言者論寶元康定間西鄙用師富弼上備冦之議乃以東南諸路兵力單弱及州郡長吏不職為憂請加澄汰選置實材以應時用前輩逺慮蓋有深旨中興以來休養生息煙火萬里斯民有白首不識兵革者其間惡少易以孽芽擲伏發姦正須良牧然今之所謂郡太守者平時援資格而來簿書期會僅取趣辦若一旦有征行調發之煩供億饋餉之擾比閭紏集之政在朝廷意慮之外及約束之所未至者求其機權足以應變威信足以服衆強力足以集事愷悌足以宜民而能弭患於未形者蓋十無三四望內委臺諫督察外責監司刺舉其罷軟昏繆以至蓄縮非材者並令以祠録自請仍戒大臣詳加考核侍從臺諫廣共咨詢各據所知盡公保舉俾分憂顧以課殊效朝廷更加詳審明立品式稍廣其科條寬其資格或棄小瑕而録用或不待次而升遷其被舉者與舉之者是否功罪皆當同之賞罰必行使之競勸庶有以濟當今之急務從之左朝奉郎知化州廖顒言軍賊凌鐵等見在雷化州境內嘯聚未能討蕩望將雷州改除武守仍許節制髙容亷化四州軍馬遇有盜賊會合兵丁掩捕合用錢糧令轉運司應副從之時東南第十二將髙居辨會五州巡尉官兵與戰鐵敗死右朝奉郎知光化軍莫濛言京西數州法官獄吏罕有正員不習法令每公事可疑懼憲司駮正輒以己見施行乞自今徒流公事不以有無疑慮並申提刑司詳覆從之己卯殿中侍御史杜莘老言謹按帶御器械劉炎一介小人持心狡險汚穢之迹臣不欲猥形白簡前月十七日忽來訪臣云元居實措置兩淮乃炎所薦而炎今日亦受劄子同共措置使炎當時不受改換今已優間來日當往力辭夫炎以文資易武級乃其願欲初非朝廷強之今已多歷年所其所受官祿亦不薄矣豈今日尚興怨望而辭避職事也陛下邇者約己裕民減放宫嬪乃盛德第一事炎乃與臣言主上不消放出宫女豈不漏泄禁中事夫陛下燕間之際清心寡欲耽玩經史縱宫嬪之出於禁中事有何漏泄而炎敢輕議臣伏讀今月五日詔書有云乃者放嬪御朕誠意所加而令下之始胥動浮言幾惑衆聼臣謂炎居近習尚敢輕議而騰口於外則在外浮言未必非炎倡之也炎之罪大誠不容誅望重加竄逐以為人臣怨望朝廷輕議君上者之戒詔炎可送吏部與在外合入差遣令臨安府押出門乃以炎監嘉州商稅趙甡之遺史云劉炎初為右通直郎換閣門宣贊舍人主管內帑錢往來𣙜場買遲玉書畫依托內侍以進後帶御器械值王全髙景山上殿無禮羣臣不能措一辭而炎乃逡巡投機全國大體俾狂黠使人折服退去可謂失之平生收功須臾矣而羣臣不思己之不敏乃疾炎之見機於是杜莘老論之壬午敷文閣待制樞密都承旨徐嚞等辭行癸未宰相陳康伯率百官為孝慈淵聖皇帝請諡于南郊諡曰恭文順德仁孝廟號欽宗敕令所刪定官陸遊為大理司直甲申宰相陳康伯上恭文順德仁孝皇帝諡議詔恭依乙酉右司諫梁仲敏請初官有出身人滿三考無出身人滿四考方許監司帥守薦以京職庶抑趨競而惠孤寒詔吏部看詳尋從之修武郎東南第十二將髙居辨知雷州兼節制髙容亷化四州軍馬賞功也丙戌右朝奉郎通判楚州徐宗偃獻書宰執言山陽俯臨淮海清河口去郡五十里實南北必爭之地我得之則可以控制山東一或失守彼即長驅先據要害深溝髙壘運山東纍年積聚調發重兵使兩淮動搖我將何以捍禦自北使奏請意欲敗盟人情洶懼莫知死所及朝廷除劉錡為五路制置分遣軍馬渡江邊陲肅靜民賴以安山東之人日有歸附之意如沿淮一帶自北而來者晝夜不絶不容止約若朝廷速遣大兵且命劉錡或委本州守二選差有心力人明示德音誘以官爵謂得一州或一縣與補是何官資使之就守其地其餘招誘自百人千人至萬人受賞有差將見一呼響應山東悉為我有若大軍未至彼懷疑二心未肯受招招之亦未必能守適足以貽邊患至於合肥荆襄命大將分占形勢覘邏其實隨機應變以為進討之計恢復中原可立而待先是漣水縣弓手節級董臻者私渡淮見宗偃言山東之人久困暴斂日欲歸正若士馬一動悉皆南來宗偃出已俸厚贈之是月初臻果率老幼數百人來歸宗偃言於朝未至會知樞密院事葉義問遣武翼郎焦宣來諭意俾招收之守臣王彥融怒不自已出乃言臻不願推恩宗偃因遺義問書言旬日以來渡淮之人晝夜不止漣水為之一空臨淮縣民亦源源而來不絶泗州兩遣人諭盱眙令關報本州約回然有死不肯復去計其家屬之數幾萬人矣理宜優恤多方存拊濟其乏絶然非有大軍彈壓得之亦不為用兼慮對境别生事端却貽邊患且小人喜亂利於一時剽掠或先事輕舉有害大計乃補臻承節郎仍令淮東副總管李橫以鎮江都統司兩將之兵往楚州屯駐此並據宗偃紀實修入宗偃申董臻歸正在此月十一日壬午焦宣至楚州在十三日甲申今聨書之丁亥殿中侍御史杜莘老言今行營重兵逺在邊境而策應之精鋭又須觀時而動諸州所謂強弓弩手者亦已盡遣萬一郡縣間有一夫竊發豈不上貽宵旰之慮今東南廂禁土軍元額毋慮十數萬人皆為監司守臣兵將官穴占而諸路將副或以給使吏職富勢居之咸不適於用望收兵選將責之教閲以備他盜假以嵗月亦可助大軍之勢從之詔使相以下宣借人各減三分之一明年九月又減主管侍衛馬軍司公事成閔以所部至鄂州屯於古將壇之左閔既發臨安邊事未動鄂州軍中罔測其情或勸都統制田師中善為備者由是人情皆不安市井驚惶至有妄言來取師中者或請師中以素隊迎之於道周人情乃定閔至鄂未幾移屯應城縣在鄂郢之間焉右司諫梁仲敏言臣竊謂人臣之罪莫大於懷姦而避事夫小官之避事固已當嚴治而况為大臣者爵位既崇祿賜既厚乃敢於艱難之際專為身謀朝廷何賴焉臣謹按同知樞密院事周麟之姦險為最貪婪無恥素乏才術因片言隻語遂謂能文自登從班益務躁進傾心交結自謂得計以至於趣利害義若併貪産業於鄉邦收接賄賂於私室倚小人為腹心而中傷善良罪惡甚衆朝廷用過其才擢居樞府為麟之者正當自揣不稱捐軀報國而乃懷姦避事是其罪之尤大者此而不治朝廷何以使人臣竊見麟之受使事之命已多日治行已備因見使人之來便有懼意巧為推避之計其説以謂執政不當行尤為無理前此固嘗屢遣執政為使矣就使麟之自有所見何不言之於受命之初而使人既來之後方創為此説其為姦回罔上罪不容誅致勞聖慮别擇人出使今已行矣麟之偃蹇髙位於心安乎天下忠義之士豈不解體哉望將麟之誅竄逺方以禦魑魅以昭示人臣慢命不忠之戒殿中侍御史杜莘老言臣聞挾姦罔上人臣之不忠避事辭難人臣之不義謹按同知樞密院事周麟之背公營私寡亷鮮恥十手所指殆非一端臣試以奉使一事言之嵗在己卯顯仁皇后升遐告哀鄰國麟之實充使命方其未行也朝廷措置金繒其數已定麟之堅欲增添數目朝廷務從大體姑從其請夫太母攢祔用度浩繁麟之乃求厚賂何不惜國家之費乎及其將行也太史卜良日三節遣行李既已陛辭晨出國門行至日莫麟之思家遂顧小車潛歸妻孥飲燕次日方始出城士論沸騰逹於天聼宰相湯思退容隱不加詰問及其既行而歸也出好語欲為己功以邀髙爵此何理哉其挾姦罔上止為身謀不忠有如此者逮今春金人來居於汴朝廷議遣麟之出使麟之奏請自擇副使遂舉蘇曄與之交結各賣三節人員皆有定價估金入已喜見顔間其後使人之來語言紛紜麟之乃緣飾辭理謂執政不當行遂牢辭固避私憂掩泣衆聞而鄙之有哭殺富鄭公之誚臣竊觀唐太宗以盧祖尚都督交州既奉詔而託疾帝遣杜如晦諭之曰匹夫不負然諾卿既許朕矣豈得悔祖尚固辭帝怒曰我使人不從何以為天下命斬之朝堂今麟之既不欽承休命至煩聖慮别擇奉使縱陛下寬仁免其朝堂之戮則貶竄其可後乎伏望睿斷重賜施行戊子左中大夫同知樞密院事周麟之與在外宫觀放謝辭宰執進呈臺諫章疏上曰為大臣臨事辭難何以率百僚乃有是命日歷載麟之罷政在七月十七日戊子樓鑰拜罷録亦同而熊克小歷於六月十九日庚申書之趙甡之遺史繫之七月二十四日乙丑皆誤也會要稱麟之七月十九日罷政後責筠州亦恐差誤當是十七日戊子罷政十九日庚寅乃責筠州也甡之又云上以麟之初請行復自請止今具析麟之伏罪遂罷按他書乃不云分析事今具附此俟考宰執言淮南諸郡近日懷來流民甚衆上曰可諭劉綺選其壯者為效用餘皆授田貸種且以常平錢米濟之司農少卿許尹言浙路應起行在和糴本錢嵗為一百七十二萬緡舊例分四季今所發才三十二萬緡乞令户部逐時比較當職官按劾從之己丑權户部侍郎兼權樞密都承旨錢端禮乞以前後奉使所得金主之語付三省樞密院編録成册遇遣使命則令通知庶幾可以専對從之武功大夫忠州團練使知濠州劉光時降授武顯大夫吉州刺史令在任以責後效坐前棄城為言者所劾也事祖已見五月右司諫梁仲敏言臣竊見同知樞密院事周麟之濫居樞府衆論已洶洶而又懷姦避事天下益為之不平臣遂冒昧僭越論列麟之上瀆聖聼臣訪聞麟之罪惡不一未可殫舉且取其罪之顯著人所切齒者言之麟之父嘗為常州富人邵伸門客死之日邵家借以吉地安葬麟之既貴不思存恤其家乃強占墳旁地二十餘里邵家兄弟不從即以勢力致以獄勒使供退罪一也貸錢與強知文者乘其急而索其數倍之息得田四百畝又貸錢於妻母前夫之子亦乘其急而奪其屋見訟於有司畏其勢力未敢決罪二也昨周方崇為臺官麟之諂交認為宗親其間多有朋比以害善良麟之為給事中其所論校及掌內外制所行誥詞率皆挾私意之輕重而為之人皆知其意之所在罪三也顯仁皇后上仙遣麟之告哀於鄰國乃邀求禮物加厚不恤國家事體是時已陛辭出城而乃戀戀私家以小車復歸踰宿乃去罪四也及為同知樞密有合破使臣指使豪户潘忭元係下班祇應以錢三百緡而得之餘皆有所賂而後補外人相傳以為非錢不行罪五也麟之既蒙厚恩擢在政府是宜忠義自力而蓋前愆以不負聖君眷待之意今乃於受命出使之際輒敢懷姦避事舉措如此人咸嫉憤伏聞聖斷罷麟之樞密院職事以慰公論然若小人已僥幸髙位當艱難時又獲叨冒真祠燕居鄉閭則不忠不義者反為得計其害不細伏乞聖明更賜詳酌重與竄斥逺方施行殿中侍御史杜莘老言臣日者不避誅罰上章論列樞密周麟之挾姦罔上避事辭難之罪乞正典刑雖蒙睿慈特賜罷免然不加貶竄而尚畀祠祿物論洶洶未平臣固知陛下聖德寬仁曲全體貌以尋常大臣之罷例得奉祠故於麟之亦復推此恩數奈何麟之罪大其逆君命便私計非尋常之比今若例與真祠俾得捆載而歸優遊鄉社是使小人得志而遂其便私之計也麟之剽竊小才殊無器識迹其舉措市井不如世家泰州因用建康户籍取解中第乃認故相秦檜父子為鄉人専事阿諛務其結託遂從正字遽擢西掖其進用不正己見於此至若主封駁則因書黃而潛受金瓶在翰苑則因草制而多求潤筆違法而酤私醖則取辱於平江之郡將恃勢而占民田則結怨於常州之富人後省張安仁為書吏麟之委以營私則指使補之軍卒葉世寧有義女麟之取以居室則幹辦呼之士人有浚井而得古硯麟之欲償以百金得其硯而弗償也鄉官因赴調而帶古畫麟之欲報以差遣得其畫而弗報也胡蒙乃其妻父因舊憾而久立之客次張守乃其師資因物故而不還其遺書舉措如是天下久已切齒况違陛下之命避免出疆不恤國事若投諸荒裔始快人心臣竊觀藝祖皇帝親征澤潞中書舍人趙逄扈從懼登太行山以墜馬辭行止留懷州及還京當草制又稱疾不入帝怒曰此人得非不肯上山者乎人臣乃敢如此即日付御史按鞫貶房州司户夫宥密之官尊於中舍之職辭免使命重於懷州之留藝祖尚竄趙逄陛下豈容貸麟之乎伏望宸斷將麟之宫觀寢罷特加逺竄仍將臣所上章疏昭示中外以慰公議庚寅左中大夫周麟之責授左朝奉大夫祕書少監分司南京筠州居住中興聖政臣留正等曰人君設髙爵厚祿加體貌以待二三大臣非私之也以其能為人之所難為而任人之所不能任者也當無事時居髙食厚被顧遇而不辭遇事之難輒辭焉彼固未嘗以身許國與所期者甚異此而不懲何以厲臣節太上皇帝罷麟之本兵之柄為避事者之戒善乎其有以勸百哉右朝議大夫淮南轉運副使楊抗復直徽猷閣左朝請郎章服知鄂州初上命池州諸軍都統制李顯忠擇淮西地利為固守之計至是顯忠言江北平夷别無險阻惟樅楊鎮北二十五里中坊淨嚴寺依峽山口一帶地里衝要可以屯駐乞於八月初分遣半軍過江屯駐顯忠躬親往來伺其動息即全軍渡江觀敵所向隨機決戰從之辛卯淮南轉運副使楊抗奉詔遣右朝奉郎通判楚州徐宗偃往淮隂縣措置歸正人父老謂宗偃曰兩淮本一家雖投來之心甚切本意宿留王師進發日願為鄉導戮力破敵今以諸處招納或作文字勸誘或驅逼過淮否則公肆劫掠不容存住齎糧至微今已狼狽紹興十一年間我曹蓋嘗歸順矣北界取索悉蒙押發以去今誓死不願再回幸公全活宗偃布宣國家存恤之意且命邑官使之有親戚者則往依投願向以南州軍者各從其便或欲請佃公私間田者給之仍令保聚近裏城邑量修廬舍勿使暴露抗言於朝乃賜錢萬緡米三千石令本州賑濟此以徐宗偃紀實修入紀實又稱御前金字牌至令本州與漕臣同共措置淮北歸正之人以時考之恐即此月十七日戊子宰執所得上語此降指揮也壬辰敷文閣待制樞密都承旨充大金起居稱賀使徐嚞等至盱眙軍金主已遣翰林侍講學士韓汝嘉至泗州待之是日平旦泗州守臣富察特默遣人至盱眙言韓侍講帶金牌到來欲見國信使副宣諭已刻嚞遣通事古乞中流相見俄而汝嘉已登舟渡淮嚞欲就岸口亭子相見汝嘉即與徒八人馳馬徑入宴館嚞與副使文州刺史知閣門事張掄皆大驚朝服以待汝嘉入館闔其扉守臣周淙即館外穴壁以窺汝嘉令嚞掄跪於庭下抗聲稱有敕遂言曰自來北邊有蒙古塔坦等從東昏時數犯邊境自朕即位已久寧息近凖邊將屢申此輩又復作過比之以前保聚尤甚衆至數十萬或説仍與西夏通好鎮戍突厥奚契丹人等力亦不能加曾至失利若不即行誅戮恐致滋蔓重念祖宗山陵盡在中都密邇彼界是以朕心不安以承平嵗久全無得力宿將可委専征須朕親往以平冦亂故雖宫室始建方此巡幸而勢不可留已擬定十一月間親臨北邊用行討伐然一二年間却當還此今日諸司奏聞有使稱賀本欲差人逺迓如期入見緣近者國信使副髙景山王全等傳旨召一二近上官位有所宣諭今卿等雖來即非所召若卿等到闕而歸徐遣所召官等定見遲滯有妨北討之期故令卿等便回即令元指官位人等前來亦可一就稱賀仍須九月初定當到闕實慮未詳上件事意或致疑訝故兹宣示想宜知悉言畢升堂分賔主而坐嚞戰灼無語掄乃稍進而問曰萌子小邦何煩皇帝親行汝嘉不能對掄曰侍講逺來口言有敕本國君相何以為憑乞書於紙以俟聞奏汝嘉即索紙筆書畢而去嚞等遺以纈帛香茶皆不受此以趙甡之遺史徐夢莘北盟會編并今年七月二十七日尚書省劄下沿邊帥守監司劄子參修熊克小歷稱汝嘉與嚞等相見於淮岸口實甚誤也徽猷閣待制提舉江州太平興國宫宋映卒癸巳賜江淮制置使劉錡度僧牒五百為犒軍之用左朝請郎知信陽軍王之道提舉荆湖圵路常平茶鹽公事敷文閣直學士四川安撫制置使兼知成都府王剛中言被旨令臣斟量緊慢移司就近與吳璘同共措置軍前事務乞照胡世將已行事宜行下遵守詔四川財賦自合總領所専一應辦外如遇警急調發申奏朝廷不及其軍中賞罰令宣撫制置司先次隨宜措置施行訖奏剛中又言三都統下統制將佐升差及應干報應文字並係制置司行遣今乞令吳璘同共簽書從之剛中又奏升差事在是月乙未甲午上謂宰執曰夜來小雨應候可嘉陳康伯曰禾稻向熟雨澤時降則豐年可望上曰屬有邊事今乃得雨天相國家使不闕食康伯曰誠如聖諭右朝奉郎知通化軍莫濛言江淮荆楚之間年榖屢豐粒米狼戾望令屯營去處兊撥合解官錢令州縣從便和糴從之乙未詔新造會子許於淮浙湖北京西路州軍行使除亭户鹽本錢並支見錢外其不通水路州軍上供等錢許盡用會子解發沿流諸州軍錢會各半其諸軍起發等錢並以會子品搭支給用户部請也丙申命參知政事楊椿兼篆聖文仁德顯孝皇帝諡寶司勳員外郎余時言面對論臣僚因公罪落職未復之人乞許以致仕恩任子若因言章或按劾雖贓私罪而無實狀者與降等推恩文武臣僚曾經推勘按劾雖有贓私罪犯而未結正及言章泛言貪汙而無實迹雖未得宫觀差遣而致仕者特與降等蔭補韶中書後省參照舊法看詳聞奏九月丁丑議上丁酉右從政郎新兩浙西路提點刑獄司幹辦公事趙伯圭為右宣義郎通判明州伯圭子稱長子故有是命戊戍敷文閣待制樞密都承旨充大金起居稱賀使徐嚞等言臣等至盱眙軍有金牌韓汝嘉前來傳到北界宣諭言語詔嚞等還行在仍令沿邊帥守監司諸軍都統制諸路總領所照應今年五月甲午指揮及今來事體慮有姦詐更切固守持重廣行間探嚴作隄備毋致輕易落其姦便仍先具知稟以聞此據總領所按牘修入日歷無之權吏部侍郎凌景夏言國朝慶歷三年編定勳臣姓名凡二百四家既録用其子孫矣逮至建中靖國元年再編一百一十六家許子孫乞恩澤陛下即位以來每遇郊祀大赦未嘗不念其家或至淪沒每加録用然臣竊謂崇觀以來至陛下即位跋涉艱難所以衛社稷捍牧圉者不可謂無其人略而未編亦一闕也望俾有司檢會自崇觀以來勳業著於國史者續行編定以勵忠烈事下吏部後不行己亥徽猷閣直學士致仕鄭望之卒是月金主亮南徙汴京其臣自左丞相張浩以下具九節儀從迎亮於南薰門亮及門而雨暴至儀從皆不克舉亮入內至承天門迅雷大風作天變如此亮不知懼也一日亮坐正隆殿召其大臣問曰許多宰執孰有能為統軍者尚書右丞劉萼白臣請為之亮喜即拜萼為淮南道行營統軍將二萬衆歷唐鄧以瞰荆襄又以金紫光祿大夫平陽府總管張中彥為西蜀道統軍孟州防禦使王彥章副之將五萬衆據秦鳯以窺巴蜀工部尚書蘇保衡統水軍驃騎上將軍完顔鄭嘉努副之由海道將趨二浙餘兵亮自將焉張棣正隆事迹載亮問大臣統軍事在九月而楊抗奏李申言張中彥劉某差除在七月十六日今且附七月末建炎以來繫年要録卷一百九十一建炎以來繫年要録卷一百九十一金人地名考證富察特默原書作蒲察徒穆誤今改正塔坦原書作逹答誤改見卷五十八鄭嘉努原書作鄭家奴與金史同並誤今改正蒙古原書作蒙兀誤改見卷九十六
