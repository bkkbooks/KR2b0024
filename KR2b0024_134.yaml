body:
  text: 建炎以來繫年要録卷一百三十四宋李心傳撰紹興十年嵗次庚申金熙宗亶天卷三年春正月按是月丁丑朔辛巳右僕射秦檜言前日外間有匿名書非毁朝廷當繳進上曰已見之無足恤先是金人遣奉使官宣州觀察使知閣門事藍公佐南歸議嵗貢誓表正朔册命等事此以紹興講和録及洪皓行述陳淵奏議等參修且索河東北士民之在南者是日右正言陳淵入對言自公佐之歸聞金人盡誅往日主議之人且悔前約以此重有要索臣謂和戰二策不可偏執上語淵曰今日之和不惟不可偏執自當以戰為主既而吏部員外郎許欣出為荆湖南路轉運判官將行亦上疏言臣竊見金人為本朝患十六年於兹矣昨者張通古輩來議和如陛下以梓宫母后淵聖之故俯從其欲復命王倫等報聘今王倫既巴拘留且重有邀索外議籍籍謂敵情反復如此咸以為憂望陛下採中外之公言定國家之大計深察敵人變詐之狀亟安天下憂虞之心繼自今時嚴為守備激將士捐軀效死之氣雪陛下不共戴天之讎上以慰祖宗在天之靈下以解黎元倒垂之命庶幾中興之效足以垂光於萬世欣出湖南漕日厯不載吏部題名亦起於紹興末年皆不可考林待聘外制集欣除湖南與賀允中閩漕同制按允中除命在是月甲午或當同日且附此更須參考左武大夫和州防禦使權知閣門事韓恕特差充兩浙西路馬步軍副總管見管閣門職事如舊尋詔恕落階官為濟州防禦使乙酉尚書工部侍郎兼直學士院兼侍講李誼為工部尚書假資政殿學士充迎護梓宫奉迎兩宫使集英殿修撰京畿都轉運使莫將為徽猷閣待制副之誼不受命力辭其親舊曰不可誼曰我不過奪職罷去爾安可行乎丙戌誼免官以將試工部侍郎充迎護使濟州防禦使知閣門事韓恕為宣州觀察使副之初兖人張匯從父行正守官保州陷敵不能歸至是聞元帥府主管漢兒文字蔡松年言敵有渝盟意遂與燕人王暉開封劉炎謀夜自新鄉渡河赴行在上疏言敵情利害大略以為敵主懦將驕兵寡而怯又且離心民怨而困咸有異意鄰國延頸以窺隙臣下側目以觀變親戚內亂寇盜外起加之昔之名王良將如尼瑪哈達蘭之徒非被誅則病死故子胥戮則吳滅孔明沒則蜀亡爭戰之際古今不易之理今敵內有羽毛零落之憂外失劉豫藩籬之援譬之有人自截其手足而復剖其腹心欲求生也不亦難乎此乃皇天悔禍眷我聖宋復假敵手以去羣凶特以良時付之陛下周宣漢光中興之業也曩者蓋敵未當殄滅之時臣雖早歸朝廷亦無補於聖德故臣隱身敵中甘處貧賤十五年者伺今日之隙也又况當時河北人心未安然河南廢齊之後人心亦且搖動王師先渡河則弊歸河北而不在中原設若烏珠先侵河南則弊歸中原而不在河北但能先渡河者則得天下之勢誠當日勝負之機在於渡河之先後爾而烏珠已有先侵之意臣恐朝廷或失此時反被敵乘而先之松年靖子已見紹興四年十一月疏奏滙等皆授初品文資滙等補官日厯不載林待聘外制集有制詞既而淮西宣撫使張俊因奏滙充本司準備差遣戊子僉書樞密院事樓照請泛印錢引者徒二年不以赦免從之尋以乏贍軍泛印復如故庚寅奉直大夫李景模知唐州景模已見去年四月辛卯使臣秦宗道杖脊刺配瓊州牢城坐於皇城內撰造妖言惑衆也仍令皇城司榜諭此未知與秦檜所云匿名事有無相關觀文殿大學士提舉臨安府洞霄宫李綱薨於福州綱之弟校書郎經早卒綱悼恨不已會上元節綱臨其喪哭之慟暴得疾即日薨年五十八上方遣中使徐珣撫問訃聞贈少師徙其弟兩浙東路提點刑獄公事維於閩部以治其喪令所居州量給葬事李維徙閩部綱行狀云爾日厯不書按日厯二月丙午李綱除特進致仕丁未福建提刑趙令襟改除浙東提刑王申方庭實除福建提刑替李維通理成資關今併附此綱後諡忠定壬辰左迪功郎新潼川府府學教授唐文若特改左奉議郎差遣如舊文若庚之子也庚眉山人大觀間京畿提舉以薦對故有是命秦檜奏近制初改官人須任親民不許堂除此可以養成人材上曰豈惟養成人材足以抑奔競之風矣癸巳上諭秦檜曰新疆各宜屯兵以守得之雖易不可以易失之秦檜曰聖慮深逺蓋將保民以圖恢復上又曰陜西弓箭手最為良法神宗開邊當時甚盛今聞其法寖弛官司擅行役使宜嚴行禁止又鞍馬器甲亦當葺之甲午太尉慶逺軍節度使東京同留守兼節度軍馬京畿營田大使郭仲荀充醴泉觀使從所請也尚書吏部員外郎賀允中為福建路轉運副使詔作忠烈廟於仙人關以祠吳玠先是左宣教郎新川陜茶馬司幹辦公事權監都進奏院楊朴上書論玠保全四川之功不可忘願特詔有司與玠立廟榮以封爵使蜀人嵗時祀之故有是命朴資陽人也丁酉左通直郎充徽猷閣待制提舉江州太平觀尹焞遷一官致仕以焞引年告老故也焞遂居紹興詔奉使官莫將韓恕各官其家二人己亥右正言陳淵言伏見近者所命之使有所升黜且趣其行今急於遣使而不及其他而知敵不能無求然我有不可許者如取河北之民則失人心用彼之正朔則亂國政此誠不可至於嵗幣之數多未必喜寡則必怒與其多不若寡之為愈蓋和戰兩途彼之意常欲戰不得已而後和我之意常欲和不得已而後戰或者必欲多與之弊以信其久而不變則無是理願訓所遣之使俾無輕許以誤大計以和為息戰之權以戰為守和之備此至計也惟陛下擇之癸卯上謂大臣曰莫將奉使金國凡所議事可一一録付恐將妄有許可他日必不能守時金人所請朝廷多不從故有是諭程敦厚撰孫綖墓志云朝廷方遣莫將使北有姦人章之奇自謂國信所官屬乘傳至蜀川有所微伺綖延之坐語使人探具囊得詐所為印章文書等遂倅而械繫之迄正其罪綖眉山人時已左朝請大夫知蜀州溫州僧清了者與其徒自言上嘗賜之以詩上謂宰執曰朕不識清了豈有賜詩之理可令溫州體究恐四方傳播謂朕好佛朕於釋老之書未嘗留意蓋無益於治道秦檜曰陛下垂思六經而不惑於異端直帝王之學也甲辰顯謨閣直學士提舉醴泉觀鄭億年復資政殿學士仍舊宫觀奉朝請時有詔趣億年赴闕上召見於內殿後二日遂以命之制詞略曰還祕殿之隆名賦殊庭之後祿非為爾寵蓋所以昭大信於四方其時中書舍人林待聘所行也御史中丞廖剛言億年身未從官委質叛臣今而歸國赦其戮幸矣乃寵以祕殿雄職授以在京觀使臣恐此命一行節夫義士莫不解體非所以訓陳淵亦言億年故相居中之子雖嘗為從官而有從敵之醜况資政隆名乃賊豫所竊以與億年固不可以言復矣必以復為言以著其從賊之罪彼粗有知必不敢受強而授之則如凌唐佐李亘之徒以義而獲褒李顯忠趙彬之輩以才而得用必皆曰彼從賊而猶見褒吾屬何榮是自壞常罰之紀綱而更為今日中興之纍也不報亘守南京嘗謀歸國為劉豫所戮至是贈徽猷閣待制故淵言及之李亘贈待制據林待聘外制集增入日厯會要並無之乙巳布衣歐陽安永獻祖宗龜鑑詔户部賜束帛是月川陜宣撫副使胡世將言近探聞河中府積糧草六十萬添支軍人每名絹二匹糧七斗草三束耀州捉到姦細王萬稱却要厮殺之説又報河東北中條山一帶不放人入山恐藏紅巾并發河東簽軍招收李成及添置沿河提舉官以臣愚見彼方內自誅殺又有盜賊之患未必便動然亦合先事措置今鳳翔見屯軍馬據南山之險萬一有警吳璘可以當之若與璘相據分兵涇原直犯秦隴則我軍斷絶涇原雖有舊軍馬陷偽以來多失訓練甲器不足偽將皆無相敵之意萬一有警只是投拜今永興涇原環慶三帥皆已入覲必須自請宜以此時更選帥臣機不可失至於逐路兵將官多是從偽之人固不可盡易其近上統兵官望從朝廷更加選擇臣近論奏向去萬一不測或有警急其調發軍馬措置錢糧應干軍事申請待報不及乞從本司一靣隨宜措置仍乞密降旨揮付臣遵守二月丙午朔左朝請大夫知南外都水丞郭敏修改知北外都水丞公事左奉議郎知興仁府李上達知南外都水丞公事戊申命樞密院統制官雷仲節制鎮江府屯駐忠鋭三將軍馬按此事去年十月戊午已得旨不知何以許時方出命也庚戌尚書刑部員外郎羅汝楫為監察御史汝楫歙縣人輪當轉對既退遂有是命當求汝楫轉對劄子增入辛亥濟州防禦使主管侍衛軍馬司公事劉錡為東京副留守仍兼節制焉軍錡兼節制在此月壬戌癸丑詔曰永惟三嵗興賢之制肇自治平爰暨纍朝遵用彛典頃緣多事遊展試期致取士之年屬當宗祀宜從革正用復故常可除科場於紹興十年仰諸州依條發解外將省殿試更展一年於紹興十二年正月鎖院省試三月擇日殿試其向後科場仍自紹興十二年省試為準於紹興十四年令諸州依條發解內將來紹興十二年特奏名合出官人有年六十一嵗者許出官一次用御史中丞廖剛之言也剛陳請已見去年十二月右正言陳淵試祕書少監兼崇政殿説書中書舍人程克俊林待聘並兼侍講故集賢殿修撰周常追復寶文閣待制常浦城人元符末嘗為禮部侍郎坐元祐黨落職婺州居住至是用其家請而命之乙卯殿中侍御史何鑄試右諌議大夫丁巳尚書駕部郎中喻汝礪直祕閣知遂寧府汝礪本勾龍如淵所薦又與李光相知光罷汝礪不自安因求去比對復論人君所以和外國詘海內未有不誠而能格之者今陛下致曲用晦結二國之好此正可為之時願陛下裕民力以豐天下之財訓武勇以飭天下之備外睦而鄰好比內強而吾民保足以大振宗祧矣於是改除潼川府路轉運副使汝礪至官以表謝上略曰顧臣何如立節有素方延和廷議既不能割地以賂戎暨偽楚滔天又不忍聯名而賣國時人稱之汝礪除漕在三月庚子今併書之談篆撰汝礪年譜云知遂寧府陛辭玉音親出卿見聞殫洽詞采英奇之語尋改除潼川路轉運副使詞臣即採陛辭日皇帝所出八字以寵之按林待聘外制集此八字乃汝礪知遂寧府告詞篆之誕妄如此史堪作汝礪墓志又因而書之由是觀之私家行狀墓志所書天語要未盡可慿須細考之乃可左宣義郎楊願守祕書丞右儒林郎張鼎特改合入官鼎為太湖令以薦者得召見上諭大臣令改秩堂除劇縣且曰此因能以任之也若一縣得良令則百姓皆受其賜矣秦檜曰陛下勤於恤民故親民之官尤謹擇之也熊克小厯繫此事於正月丙辰按今年正月無丙辰蓋二月十一日也戊午詔右迪功郎新永安軍使兼陵臺令雙虎特循一資令之任亦以薦對也庚申御史中丞廖剛試工部尚書剛每因奏事論君子小人朋黨之辨反復切至又論人君之患莫大於好人從已夫大臣惟一人之從羣臣惟大臣之從則天下事可憂剛本秦檜所薦至是滋不悅他日因對又請起舊相有人望者處之近藩重鎮檜聞之曰是欲置我何地邪既積忤檜遂出臺而剛之名聞天下尚書工部侍郎王次翁試御史中丞端明殿學士提舉西京嵩山崇福宫王孝迪薨於紹興府壬戌尚書户部侍郎周聿充顯謨閣待制樞密都承旨丁卯罷史館以日厯事歸祕書省國史案令著作官修纂仍命宰相提舉以監修國史繫銜遇修國史寶録即各置院始用元豐制也既而著作佐郎王楊英言國史案文移諸司多不報乃命以國史日厯所為名觀文殿學士左通奉大夫西京留守孟庾為左宣奉大夫東京留守兼權知開封府責授左朝奉郎少府少監全州居住仇悆依前官知河南府兼西京留守司公事資政殿大學士左通奉大夫江西安撫制置大使兼知洪州張守資政殿學士左中大夫知應天府兼南京留守路允迪資政殿學士左中大夫江東安撫制置大使兼知建康府兼行宫留守葉夢得並進一官己巳權尚書吏部侍郎閭邱昕充集英殿修撰知建州徽猷閣待制知靜江府沈晦升徽猷閣直學士左從事郎陳之淵為祕書省正字用從官所薦也直祕閣應天府路提點刑獄公事兼轉運副使吳偉明主管台州崇道觀從所請也左奉議郎知南外都水丞公事李伯達為京畿轉運副使左朝奉郎淮南東路提舉茶鹽公事曽䋖為應天府路轉運判官兼提點刑獄䋖未行而敵至庚午上與秦檜論川陜財賦上曰將帥漕臣皆當體國為一家士卒固欲拊循民力亦須愛惜豈可妄費乎中興聖政史臣曰兵民不可相無久矣豐其衣食以責其死力多其犒賞以酬其勞苦此在三軍固不當惜然反而思之一絲一粒孰非百姓之膏血愛百姓之力是乃所以厚三軍之資非深於體國者不可以語此壬申宗正少卿方庭實為直徽猷閣福建路提點刑獄公事陳淵之除祕書少監也以家諱引避遂改宗正少卿是月丙辰而庭實别與差遣至是乃補外焉左朝奉郎知道州丁則為夔州路轉運判官癸酉言者請復置勳官以寵文臣之有武功者事下吏部後不行御史中丞王次翁言吏部審量濫賞皆顯然暴揚前日之過舉最害陛下之孝治士大夫到部留滯愁歎何以召和氣望悉罷建炎紹興前後纍降指揮從之先是直祕閣新知太平州秦梓直祕閣知秦州王㬇皆以恩幸得官秦檜初罷政二人擯斥纍年及是次翁希檜旨以為之地繇是二人驟進此以王明清揮麈録增修但明清又云次翁言方事之殷從軍之人多有受前日之濫賞者願罷審量之命以安反側而次翁奏疏中無之或是上殿口奏之語不則三省節貼行出亦未可知今附見此尚書右司員外郎陶愷罷直龍圖閣主管州陜茶馬公事秦州置司左朝請郎湯鵬舉直祕閣知鄭州甲戌監察御史羅汝楫為殿中侍御史右承事郎王循友為太府寺丞循友以選人從韓肖胄出使改京秩至是用從官薦而命之是月封少師京東淮東宣撫處置使韓世忠之妾茅氏為國夫人周氏陳氏並封淑人林待聘外制集有制詞周氏初見建炎二年六月川陜宣撫副使胡世將言臣昨纍具論敵情難測乞外固歡和之形內修守禦之備前後所論不一臣所見淺狹到蜀二年到軍中半年博詢衆論粗得事情竊見今之議者為迎合之論則謂和議以成便可無事為欲速之計則謂六路徑兵皆為我有而不知未可得其實用此説一行實誤國計近報元帥薩里罕見在解州羅索之子呼紐見在龍門珠赫貝勒見在平陸縣並係久在陜西窺圖川蜀之人去而復來其意安在河中府積糧六十萬軍人添支錢絹聞之邊境皆謂敵人每有動作先是如此臣恐鄜延熙河等處分兵太逺墮其計中大慶橋不數日可到鳳翔鄜延已是隔絶熙河到此十五程豈不誤事臣已一靣隨宜措置趲那軍馬就近捍禦四川久困之民日欲望休息臣昨具奏乞措置就糴將枉費水腳錢却充糴本於興洋等處糴賣可減白著對糴之半計司暗謬務在欲速頓減糴五十四萬七千六百餘石其初妄謂川中一縑可就陜西糴米十石今熙秦一縑不得兩石皆坐昨來會稽乖謬臣已一靣措置於近便沿流處糴買分兵就糧所有陜西諸路收復雖已幾嵗人心茍簡軍政廢壞則是雖得陜西與未得同涇原據隴西之險遏敵人之衝可以為本根屏蔽之助本根既固自近及逺經理餘路數年之後合新舊簡練之軍無慮可得二十萬兵力既壯並河為塞以守以戰無所不可今不圖此但謂已得陜西徑兵良馬便當悉為我用實為誤國向去或有警急軍事待報不及乞從臣一面隨宜措置密降指揮付臣遵守未蒙指揮北軍狡獪若不測奔衝臨時申請不及定誤國家大計權禮部侍郎鄭剛中言臣聞陜西二三大帥被旨入覲旦夕且至陛下有顯秩以寵其身慶澤以蕩其意彼方戴德而感激震悼之不暇陛下引見之日所以推誠而收其心者雖不可後亦當折其氣以責其後效不然恐不知有朝廷之尊昔英布歸漢高祖踞牀見之布悔來欲自殺出就舍又大喜過望赤眉之降世祖陳兵臨洛問盆子曰汝知當死否其衆請命則又曰得無詐降乎吾不強汝既屈服之後陳其三善而釋之人賜田宅使居洛陽今日朝廷所以待之聖心自有恩威之度臣蓋不能自已者也惟陛下擇之初碭山民朱從往南京負販從劉氏嫗得小兒曰遇僧歸而育之有金人之戍碭山者見之曰此兒似趙家少帝少長京師販豕人張四者見之曰是人全似少帝遇僧竊喜會三京路通有詔訪宗室赴行在遇僧乃自稱少帝第二子縣令請監酒石某問之某者駙馬都尉端禮之弟也遇僧略言宫禁間事且曰少帝使老衛士張全負之以出因流落民間且引少領官劉某為證遇僧私語劉曰公言與我異當以公纍年作過事聞於朝劉懼遂合其説知單州直祕閣葉夏卿遣赴行在至泗州司法參軍孫守信見而疑之白守臣王伯路請於朝閣門言淵聖皇帝無第二子詔淮東漕臣胡紡委守信劾治市人喧言獄中夜有光氣爭饋以酒食守信建劉氏媪質之遇僧乃伏詔杖脊黥𨽻瓊州按亂華編有靖康陷敵皇族數其似是顯仁皇太后歸日從行內侍所留云小大王訓見居五國城而此云無第二子疑訓乃北地所生也此可見遇僧之妄故附著此三月丁丑詔臣僚論事自今只陳事之當否無或蹈襲前日崇觀宣政為口實可告戒中外務盡致恭之禮秦檜奏曰外議恐因此致當時人復來上曰豈有是理只為言者多明指前事朕為人子有不可聞檜曰此陛下之聖孝也己卯檢校少傳寧國軍節度使知永興軍張中孚入見命坐甚渥其弟清逺軍承宣使知渭州中彥俱來始中孚自陜入朝或為之詩曰張中孚張中彥江南塞北都行遍教我如何做列傳市人行坐皆道之權尚書吏部侍郎陳橐請河南一郡以自效除徽猷閣待制知頴昌府此條日厯漏載今以槖辭職名奏狀參考附入中書門下省檢正諸房公事范同權尚書吏部侍郎祕閣修撰提舉江州太平觀張宗元復徽猷閣待制都大提舉川陜茶馬公事主管秦司直龍圖閣知荆南府薛弼充祕閣修撰陜西轉運使直龍圖閣新除主管川陜茶馬公事陶愷知荆南府癸未武功大夫文州刺史閣門宣贊舍人提舉台州崇道觀劉綱為應天府路馬步軍副總管仍以忠鋭第四將𨽻之甲申封閼伯為商邱宣明王丙戍成都府路安撫使張燾始至成都初燾自京洛入潼關已聞金人有敗盟意逮至長安所聞益急燾遽行見川陜宣撫副使胡世將為言和尚原最為要衝自原以南則入川路散失此原是無蜀也世將曰蜀口舊戍皆精鋭最號嚴整自朝旨撤戍之後關隘撤備世將雖屢申請未見行下公其為我籌之燾遂為世將草奏具言事勢危急乞速徙右護軍之戍陜右者還屯蜀口又請賜料外錢五百萬緡以備緩急丁亥武翼郎閣門宣贊舍人鄜延路兵馬鈐轄趙澄知原州戊子詔成都府錢引務增印錢引五百萬道付宣撫司以四川轉運副使陳逺猷言贍軍錢闕四百二十萬緡故也己丑罷諸路增置稅場辛卯尚書吏部員外郎朱松知饒州徐度知台川以右諌議大夫何鑄奏其心懷異圖傲物自賢故有是命是日賜京東淮東宣撫處置使韓世忠淮西宣撫使張俊燕於臨安府以其來朝故也初諸大將入覲陳兵閲於禁中謂之內教至是統制官呼延通因內教出不遜語中丞王次翁乞斬通以肅軍列因言祖宗著令寸鐵入皇城者皆有常刑今使武夫悍卒被堅執鋭於殿庭之下非所以嚴天陛也內教遂罷次翁所上疏當在此時而熊克乃附之六月末按今年六月二將出師未嘗入覲也壬辰尚書禮部員外郎兼實録院檢討官劉昉試太常少卿前一日昉面對論河南之地自賊豫僣竊親民之官取其辦事或以使臣及吏人為之斯民被害甚於塗炭恢復之初自應首革兹弊而當時赦令有不易官吏之語以故重於失信願委自帥守及憲漕之臣公共商量其見任知縣縣令有以使臣吏人充者即於幕職曹官及丞簿中選擇對移務在得人庶幾民安其生漸有息肩之望從之丙申禮部侍郎充大金賀正旦使蘇符自東京還行在初徽猷閣待制洪皓既拘冷山頗為陳王希尹所厚希尹問以所議十事皓折之曰封册虛名年號南朝自有金三千兩景德所無東北宜絲蠶上國有其地矣絹恐難增也至於取淮北人搖民害計恐必不可希尹曰吾欲取降附人誅之以懲後何為不可皓引梁武帝易侯景事言之希尹意稍解曰汝性直不誑我吾與汝如燕遣汝歸議遂行會工部侍郎莫將繼來議不合囚之涿州事復變皓過塔坦帳其帥聞洪尚書名爭邀入穹廬出妻女飲食符至東京敵人拒不納符乃還洪皓事據行述增入敵人所要索十事他書皆無之今因此略見其槩以補史闕修武郎閣門祇候知拱州賈垓别與差遣垓祥符人久陷偽地劉豫之廢也經金國行臺自陳得河南郡故遣官代之丁酉詔川陜宣撫司自令或有警急其調發軍馬措置錢糧應干軍事待報不及並許胡世將隨宜措置用世將請也時諜報河東北簽軍備糧來戍河中收復河南州郡都元帥宗弼又傳令宋國係和議之國存留橋路往來已調絳浦解州三萬夫過河修疊堤岸仍差馬軍編欄令同州照驗世將慮其出沒不測即具以奏且遣兵備之左朝議大夫江東制置大使司參謀官張杲為江南東路轉運判官用從官薦也戊戌監察御史陳確提點江南東路刑獄公事己亥彰武軍丞宣使樞密院都統制知延安府同節制陜西諸路軍馬郭浩移知永興軍兼節制陜西諸路軍馬武康軍承宣使川陜宣撫使司都統制知熙州楊政移知興元府翊衛大夫貴州團練使環慶路馬步軍副總管知金川兼節制屯駐行營右護軍軍馬范綜移知慶陽府護國軍承宣使知興元府兼利路安撫使田晟移知渭州淮康軍承宣使知閬州孫渥移知熙州右護軍統制軍馬王彥權主管鄜延經略安撫司公事權主管延安府自郭浩以下並趣令之任庚子御史臺檢法官朱彪太府寺丞祝師龍並為監察御史祕書省著作佐郎凌景夏守尚書刑部員外郎太常博士王楊英祕書省著作佐郎壬寅奉安徽宗皇帝顯恭皇后顯肅皇后神御于天章閣西之神御殿癸邜故朝散郎鄧忠臣特贈直祕閣忠臣元符考功員外郎以定范純仁諡入黨籍餘官第一百人是月川陜宣撫副使胡世將奉詔委和保安軍楊順與夏人議入貢事初夏國招撫使王樞自行在歸送伴官王晞韓護之至境上夏國三司郎君者為晞韓言本國荷朝廷送還樞等乞敘舊日恩信兩國通和約三月望日修公牒來保安軍入貢晞韓不疑其紿已聞於朝且待之境上及期樞託病不至三司者為順言吳玠七請和於我我不之許今誠結好汝家國勢非前日約我兄弟可也順怒報曰王樞在都堂搖尾乞憐請歸求盟為臣妾朝廷厚賜以遣我豈須我盟耶三司曰樞茍生語耳是事在國主在宰相豈預樞事晞韓言不已三司出一紙書曰王樞至備陳秦僕射召至都堂有欲與夏國講和之言息兵睦鄰雖屬美事然須遣使臨邉計議赴朝獻納藏之祕府此為定式與晞韓所申不同順以書還三司不復出録其語以示帥臣郭浩世將備奏其事後竟無耗晞韓還朝乃以為大理寺丞晞韓今年七月癸卯以新大理寺丞論罷未知何時所除也建炎以來繫年要録卷一百三十四
