body:
  text: 建炎以來繫年要録卷七十七宋李心傳撰紹興四年六月己卯朔武成感德軍節度使開府儀同三司充鎮江建康府淮南東路宣撫使韓世忠援舊例乞行移所部帥臣監司用劄子許之左諫議大夫唐輝言自來行移惟三省樞密院用劄子它司皆不敢用所以尊朝廷也軍興以來領宣撫使者皆見任二府故用劄子向因主兵官輒用此例已得旨總兵官行移輒用劄子者徒二年伏見昨來孟庾為福建路宣撫使世忠為副使是時以庾𠫭知政事故行移皆用劄子今世忠非帶三省樞密院職事恐難用庾例乞付有司𠫭照條例改正從之未幾復詔世忠於所部州縣聼用劄子唐輝乞改正在此月乙未許世忠行移州縣用劄子在七月丁丑今聫書之癸未詔集英殿修撰新知泉州趙令懬轉左大中大夫指揮勿行上既遷令懬而中書舍人張綱言大中大夫非侍從不得轉行今令懬以庶官超轉侍從於法有礙且自崇觀以來士風不競叨竊官寵往往不循資任遂致紀綱大壞陛下慨然念治將欲大變其俗故前日冒濫之人大者追奪小者審量中外有識之士方竊欣幸以為自是復守祖宗之法今乃緣令懬之故復違舊章超遷官秩臣所未喻兼令懬在宗室中亷聲不聞望賜寢罷疏入詔以次官命詞行下起居舍人兼權中書舍人王居正言庶官之不可轉行大中大夫乃祖宗之法萬世不可改易豈俟臣等反復論説而後知其不可若以一大中大夫為不足惜則宗室之為承宣使者不旋踵求為節度使陛下是時何以却之上以為然乃寢其命拱衛大夫同知觀察使胡悈大閹楊戬妻姪也靖康中已致仕至是大將有薦其筋力未衰者詔起舊官左諫議大夫唐輝言悈用戬恩澤補授數年之間共轉一十九官任後苑作製造御前生活所及主管御前事務盜取恩賞人所切齒今一繫名軍中便為掌兵官月俸不下數百千悈可再任即童貫梁師成談稹之徒其親屬亦皆當任用矣豈所宜哉命遂格日歷無悈落致仕之日止因輝奏疏書之疏言夤緣請托以為筋力未衰或是韓世忠所薦亦未可知當考甲申饒州進士金覺言賫到祕要天文太一遁甲兵書等未敢投進望付三省呼召容臣賫所有圖書謀䇿次第條陳詔赴都堂審察乙酉詔洪州鄉貢進士黃雲翼令引對雲翼豐城人初名時起嘗舉進士不第後以入資授官至是更名上書故得召未幾殿中侍御史魏矼言其本富家子嘗殺人亡命乃罷之雲翼猶上書不已矼力論其素行凶惡愚弄朝廷詔押歸本貫雲翼上殿指揮更不施行在六月甲辰押歸本貫在八月辛卯丙戌詔今後樞密院邉防兵機等事令三省官通書檢時議者以為侍從之臣以論思獻納為職固亦無所不可言矧廟堂二三大臣為人主股肱耳目賴以圖維天下之治豈容於事有不預聞者乎今日國家之急莫過於邉事大臣任責亦莫先於邉事正須衆智協謀今宰臣既已兼知右府矣欲望檢會康定故事應密院邉事之大者詔參知政事同議仍令書檢庶幾商確僉允動無遺策舊制三省奏事畢樞密院别班再上自渡江後三省密院皆同班進呈文字其密院邉防兵機等事並機速房掌行如事體稍大三省密院官同議進呈退同批旨奉行密院官押草檢并劄子至是宰相朱勝非參知政事孟庾並兼樞密院言者嘗謂當國者不知兵又乞密院令參知政事通知蓋以屬趙鼎也由是勝非忌鼎益甚言者論當國者不知兵據趙鼎事實云爾詳見九月鼎除川陜都督注按日歷此月乙酉唐輝對丙戌魏矼對此事疑矼建請亦未可知當考熊克小歷載此事於五年六月庚戌蓋差一年是時孟庾沈興求二參並已權樞克實甚誤今從日歷丁亥左朝散大夫夔州路轉運判官楊仲先為成都府路提點刑獄公事用宣撫司奏也己丑詔大理寺捕雄州人王友直治罪友直𣙜場大儈也嘗上劉豫書乞招李成歸附有云陛下若得李成如漢得關侯唐得尉遲敬德又云劉光世非中興之將吕頥浩非中興之相又乞令李成作江淮兩路制置使只在淮南駐劄陛下津置糧道就兵取江浙其言多所指斥莫州商人王孝謹嘗見其書至是友直在平江為孝謹所告捕得刑之日歷今年八月十三日庚寅大理寺劄子根勘得王友直招於劉豫上策及有指斥言語乞據所招結案奉旨依不知如何行遣也壬辰詔川陜合赴省試舉人令宣撫司於置司州置試院選差有出身清強見任轉運使副或提點刑獄官充監試於逐路見任京朝官內選有出身曽任館學或有文學官充考試官務在依公精加考校杜絶請托不公之弊先是詔省試並就行在至是禮部侍郎兼侍講陳與義奏川陜道逺恐舉人不能如期故復令類試焉日歷十二日庚寅陳與義已見進對十四日壬辰禮部狀勘會云云以此知為與義請也入內東頭供奉官鄭弼西頭供奉官盧祖道各追二官東頭供奉官徐奕髙品徐伸各追一官先是弼等與入內黃門李廙並赴淮東宣撫使韓世忠私第會飲廙即座上刃傷弓兵事聞詔以廙屬吏弼等坐違制與主兵官交通抵罪而奕伸與世忠連姻故末減之俄又轉弼為敦武郎出監宣州商稅弼差監稅在八月癸卯李廙七月戊午行遣詔自今特添差官並作不釐務其俸給傔從並減半慶元隨勑申明甲午詔明堂大禮所用逍遙子權住製造其祭器什物令禮官講究其可減者先是御輦院乞造逍遙子工部言約用金九十餘兩詔以銀塗金代之修內司又請雅飾朝殿及周回宫墻至便門左諫議大夫唐輝言禮有隆殺在於因時陛下自南渡以來服用之物未嘗增飾况親祠不出行宫門而內外皆丹雘此於欽祀何所補哉今強敵蓄謀未已叛逆竊據中原日夜窺我邉陲而朝廷百司緣明堂大禮講求儀物大興土木之役廣求雕鏤文繡此皆有司之過邇來霪雨不止艱食可慮若縱為無益耗蠧金帛他時但貽陛下之憂望令有司照紹興元年體例可罷者罷之可減者減之務存其實庶為盡善時已罷雅飾朝殿宫墻故有是命乙未給事中胡交修試尚書刑部侍郎中書舍人張綱試給事中殿中侍御史魏矼言竊惟陛下以霪雨未解夙夜憂思凡可以消弭災沴者無所不用其至而百姓愁嘆或傷和氣臣訪聞諸州縣催督夏稅并和買紬絹急於星火至有限五月數足百姓間關輸送乃倍所賦矧方遭此水患妻子號泣散布田野忍以追科迫之哉二月內户部申明諸路上供令七月終以前起發數足繼因臣僚論列已奉聖旨展一月今漕司州縣望風故促期限政苛刑酷遂使元元重罹其毒臣竊詳户部元申明之意本為大禮賞給然今府庫中豈無見存紬絹儻一切留為冬衣大禮之費俟過二事方得别支似無違礙昨來戶部初不曽分今年冬衣大禮及明年春衣所支各若干又不曽量度諸路道里逺近一槩限七月終起發盡足而監司守令各非其人吏緣為姦寖成大弊夫農天下之本也軍旅資糧官吏俸入悉出於此奈何坐視不恤使就困苦哉欲望特委大臣會計冬衣大禮所用𠫭酌諸路逺近量寬其限事責憲臣覺察州縣騷擾并受納官吏之弊按劾以聞擇其尤者重坐之敢有隱庇致臣僚論列並連坐庶使斯民仰懷陛下撫存之意變愁歎為謳歌實弭災之道也詔専委諸路提刑司檢察按劾以聞當議重置典憲時户部尚書黃叔敖理財峻急故矼以為言諫官唐輝亦論政事失於下則天變動於上望陛下勿以堯湯水旱為運數之不能免勿以緇黃祈禳為足以消弭更詔大臣講求政事之實無見於空言斯為盡善又前日之雨浙右民田所損己多軍食所須正宜預講此殆非細事也詔劄與三省樞密院詔楊華特補修武郎閣門祇候添差臨安府兵馬都監樞密院奏華已受知鼎州程昌宇招安故有是命五年六月十三日咼輔乞改正狀稱程昌宇用本州添差統制彭筠權本路兵馬鈐轄進兵攻討黃誠等是致楊華畏懼出降當考右朝奉郎直祕閣新通判長寧軍李邦獻職名令川陜宣撫司審量追改胡交修之在後省援建炎討論指揮有請故奪之是日金星晝見經天丙申新除宗正少卿兼直史館范沖辭免恩命朱勝非奏曰沖謂史館専修神宗哲宗史録而其父祖禹當元祐中任諫官後坐章疏議論責死嶺表而神宗實録又經祖禹之手今既重修則凡出京卞之意及其增添者不無刪改儻使沖預其事恐其黨未能厭服上曰以私意增添不知當否勝非曰皆非公論上曰然則刪之何害紛紛浮議不足恤也勝非曰沖不得不以此為辭今聖斷不移沖亦安敢有請上復愀然謂勝非等曰此事豈朕敢私頃嵗昭慈聖獻皇后誕辰因置酒宫中從容語及前朝事昭慈謂宣仁聖烈皇后誣謗雖嘗下詔辨明而史録所載未經刪改朕每念及此惕然於懷朝夕欲降一詔書明載昭慈遺旨庶使中外知朕修史之本意也勝非進曰聖諭及此天下幸甚昭慈遺旨詳具建炎四年十二月己卯起居郎常同兼權中書舍人中書門下省檢正諸房公事虞􅀈兼權給事中詔增置祕書郎著作郎各一員校書郎正字各二員宣和間有詔祕書省自監少外以十八員為額建炎間罷去近嵗才復六員禮部侍郎陳與義言陛下留神治道急於人才收召未已而逺方之士方且麕至誠恐未足以待之今郡縣添差之官莫知其數一通判鈐轄之俸不啻飬三四館職一監當掾尉之俸足以養一館職而有餘也若更以一州添差之費待天下之英才誠未為過乞詔執事議益增館職之員故有是旨丁酉左中大夫提舉江州太平觀席益復端明殿學士知潭州龍圖閣直學士知潭州折彥質知靜江府徽猷閣待制新知靜江府程昌宇復知鼎州右武大夫忠州防禦使知鼎州楊可輔充湖南兵馬鈐轄潭州駐劄初荆南制置使王􅊛自鄂回鼎奏己招到賊衆萬餘然賊纍殺􅊛所遣持黃榜使臣裴彥朝遇等且乞割州縣如溪洞故事而行在未知也王􅊛奏招安萬餘人狀以七月朔降出今併附此彥質與􅊛舊不叶請易鎮不許趙鼎嘗為彥質辟客至是改命之左從政郎充敕令所刪定官謝祖信左從事郎湖南安撫司主管機宜文字王鉌並改合入官時二人以薦得召對而祖信奏疏論名實之辨以為今國家之不競在於士大夫無激昻奮勵之志而以循謹自持為賢無捐軀致命之節而以全身逺害為智知無不為則見謂生事服勤州縣則取譏俗吏以至避言利之名而常賦經用寖以不理要解事之目而舊章故實多所廢格若此之類其名甚美其實無補伏望官人賞罰之際取其能濟時用有益於國者進之察其虛名無實欺衆要譽者退之則好惡彰風俗變而真賢實能出矣鉌元城人也祖信已見紹興元年左承議郎主管江州太平觀林季仲行祕書郎季仲為趙鼎所薦召對而有是命戊戌詔神武軍神武副軍統制統領官並𨽻樞密院熊克小歷于此日始書改軍名蓋誤己亥左承事郎李公懋守祕書省正字用劉大中薦也詔今後除授館職寺監丞博士御史臺檢法官主簿在外監司帥司並命詞給告承務郎已上差遣給勑命惟選人止用劄子先是建炎初有旨非侍從除拜並出敕元年十月丙午降旨其後稍及貼職遙郡二年六月辛巳又及文武官六品四年四月辛丑至是職事官自監察御史已上出告餘止出劄子議者以為卑陋削弱殊失國體至如館職天下之清選也而用幅紙除授反不若黃冠祝髮之流以綾紙為度牒恐非所以奬士類尊朝廷事下吏部如所請而計議編修官如舊法止出敕焉進士石公孺特補右迪功郎公孺以薦對而有是命已而言者論祖宗朝白衣授官如蘇洵輩數十年間未有一人屬者以進士召對錫官殆無虛月使果學識才行悉如蘇洵則可萬一有如胡蒙薦李杞補官之命方下而所屬捕獲私醖乃不敢治豈不傳笑四方哉衆口籍籍咸謂僥幸之門一啓寖與異時八行之舉無異矣欲望特降指揮若進士隱逸實有文武經世之才方許論薦其已收召則願朝廷更加審察取其上焉者官使之次則錫以處士之名下焉者量賜束帛庶使人安義命而入仕之門不至僥幸實今日治道所當先也從之日歷臣僚上言在此月辛丑今併書之公孺初見紹興三年七月故承信郎田承寬妻王氏特封宜人承寬本歸明寓居廣右王氏常遣家丁自備糧餉助官軍討賊破之提刑司上其事於朝故得封庚子吏部員外郎吕聰問上故相吕大防所撰其祖公著神道碑且言臣猶記憶少時親見大防取索當時詔本日歷時政記以為案據撰成此文由是觀之先皇與子之志蓋已定於一年之前豈容中間更有異議其所以召臣祖輔嗣君欲更革之意亦皆出於神宗皇帝之本心後來臣祖與司馬光乃是推原美意尊奉初詔即非輒詆先帝輕變舊章當時若使更俟年嵗神宗皇帝當自更之豈待元祐臣竊聞聖詔欲改修二史所繫之大者無出於此或恐有補遺闕謹以投進乞俟御覽畢宣付三省史館録白以為案底從之辛丑詔祖宗正史實録寶訓會要令史館各抄録二本一進入一付祕書省以起居郎常同言渡江以來搜訪僅足今三館祕閣尚寄佛廬一旦守護不謹則纍朝盛典又復散落故也責授黃州團練副使孟揆再責白州别駕本州安置揆坐販私鹽議罪至是始貶事祖在去年八月戊申起復尚書右僕射同中書門下平章事兼知樞密院事監修國史朱勝非言奉制書起復竊見明堂大禮宰執例差五使臣身有衣制深慮不合陪侍親祠望令有司討論典禮付臣遵守詔禮部太常寺同共討論聞奏壬寅作明堂行禮殿於教場調紹興府湖州卒二百為增築之役詔秉義郎王評前差秀州澉浦巡檢指揮勿行先是評以內降得差遣左諫議大夫唐輝上疏引康定元年詔及嘉祐中鎮海軍留後李璋內降指揮轉官為諫官陳升之劾奏罰銅以為祖宗之制如是今一巡檢不足道恐此風滋長自此攀援不已當不止於求乞巡檢矣望賜追寢仍詔三省密院繼自今應干請內降指揮許執奏不行庶為後來之戒上乃罷之初置史館校勘員以右迪功郎鄧名世為勑令所刪定官充校勘惠州牢城人吕頥許自便頥為南劔州同巡檢坐殺苖傅之徒張政抵罪至是始釋之事祖見建炎四年三月武功大夫貴州防禦使入內內侍省押班李叔與在外宫觀以疾自請也甲辰戶部尚書提舉𣙜貨務都茶場黃叔敖充徽猷閣學士提舉臨安府洞霄宫以殿中侍御史魏矼論其闒茸老繆職業不修也矼言數易鹽鈔蔡京之亂政也自叔敖在戶部財用略不經意一有不足又變鈔法朝令夕改失信尤甚遂使富商大賈隂伺國用將乏則不復入納惟幸變法以規厚利朝廷舉措反為所制而資本無餘之人至有待次纍年者怨嗟盈路所不忍聞此其罪一也鬻爵為官户童貫之弊法叔敖去年倡為博糴自承信迪功郎低價以售遽理官戶蔭及二代應兼并之家遂與公卿無異悉免科徭而貧民下戶乃苦差役破家敗産在在有之罪二也叔敖性與小人合四司事務取決於胥魁毛漸吏緣為姦莫敢誰何凡出歷交綱之屬非厚賂不行罪三也夏稅物帛非皆給大禮之用也叔敖今春申明行下諸路令七月終悉至行在計江西道里兩月程方至若此者是五月當納足耳州縣望風急於星火民間買絹一匹至錢八千多至十千此在朝廷無毫髮之益而於百姓有邱山之害罪四也𣙜貨務利源所在頃者監官張純納賂狼籍叔敖公然容庇又縱其姪擇佳物而市之純既敗露朝廷委辟士大夫有才者使為監官叔敖不之恤也豈士大夫中悉無幹才以充是選哉罪五也廷尉者朝廷之獄天下之平也頃叔敖姻黨張覿以贓汚不法送寺根治俄干政府出之三尺安在哉罪六也伏望早賜黜責以警失職之吏後二日降叔敖為徽猷閣待制奉祠右宣義郎直祕閣張元亨乞知欎林州元亨初見建炎三年二月制曰爾僣偽之族久冒寵榮乃敢請於朝為郡嶺外吾忍以逺方赤子餌汝哉中祕清塗非爾所居其歸銓曹尚畀爾祿往圖自效毋重悔尤可落職送吏部元亨免喪近三年至此方乞差遣當是因與朱勝非有連故敢陳乞也詔神武右軍都統制張俊中軍統制楊沂中將逐軍近日強刺人數並給據令自便自今違犯統制已下重行停降使臣行軍法立賞錢三百千許人告先是行在諸軍多強刺平人為兵人有斬手指以自免者左諫議大夫唐輝言輦轂之下人心必搖乃命軍效權住招收仍令樞密院給黃榜曉諭乙巳武功大夫忠州團練使新江西兵馬鈐轄杜湛改荆湖北路兵馬鈐轄依舊統制軍馬鼎州駐劄聼守臣程昌宇節制太常奏諡故資政殿學士王存曰莊定丙午執政奏事上謂曰嶽飛已復襄郢尼瑪哈聞之必怒况今正是六月下旬便可講究防秋儻敵人尚敢南來朕當親率諸軍迎敵使之無遺類即中原可復也若復逺避為泛海計何以立國耶權尚書吏部侍郎劉岑改戶部侍郎岑乞依舊帶權字許之左儒林郎建州觀察判官黃彧乞守本官致仕以所得升朝恩贈其父意一官吏部言事干風教望特依所乞從之右儒林郎新紹興府觀察判官楊真卿除名潮州編管真卿建安人政和間以蜜煎遺梁師成得官纍為本路漕屬至是該討論乃妄稱因進伯祖億言靈州事宜補官都省以為不合審量遂得調言者論之下大理鞫實而有是命是月江西制置使嶽飛復隨州初飛令前軍統制張憲引兵攻之月餘不能下神武後軍中部統領兼制置司中軍統制牛臯請行乃裹三日糧往衆皆笑之糧未盡而城拔生執偽知州王嵩送襄陽府磔於市飛之復襄郢也選鋒軍統制董先頗有功先臯皆久在京西故飛以為將初直龍圖閣知建康府吕祉入辭上召對於內殿祉奏今日之事當先定規模使沿江上下表裏之勢相接祉至官遂與左承奉郎通判府事吳若右迪功郎安撫司凖備差遣陳克共議作東南防守利便三卷至是上之其説以為欲守東南則淮甸荆州皆不可失朝廷宜亟圖之不可以遣使待報之故因循廢日以墮其計今士氣未振難以議戰但當謹守封疆如沿江一帶自襄陽江陵武昌九江而下淮甸諸郡如合肥夀春盱眙廣陵等處各屯軍馬西與四川形勢聫接使上下有備表裏如一庶幾可以抗禦雖未剪去凶逆南北之勢成矣今駐蹕臨安僻在海隅諸將重兵皆屯江左相去逺矣以臣觀之必於沿江一帶措置而移蹕向前然後可以繫南北離散之心慰四海來蘇之望鼓作士氣以待天命其為説甚備克晉陵人有能詩聲祉尤信用之吕祉所上疏不得其日按建康知府題名祉以去年十二月到官而疏中有屯軍襄陽及遣使待報之語當是襄陽已復之後章誼未歸之前故𠫭酌且附此月末是月熒惑犯南斗此據趙甡之遺史是夏偽齊劉豫以偽成忠郎許清臣主管殿前司公事使清臣毁景靈東西宫等偽豫傳五年夏毁拆景靈東西宫云云偽阜昌五年即今年也金左副元帥宗維右監軍希尹自雲中之白水泊右副元帥宗輔自燕山之望國崖左監軍昌自祁州之麻田大嶺避暑宗維希尹尋入見金主右都監宗弼自鳯翔還燕山府率宗輔往會之遷西京樞密院於歸化州建炎以來繫年要録卷七十七金人地名考證尼瑪哈原書作黏罕誤改見卷一
