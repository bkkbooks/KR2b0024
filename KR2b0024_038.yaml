body:
  text: 建炎以來繫年要録卷三十八宋李心傳撰建炎四年冬十月庚午朔張浚斬同州觀察使環慶路經略安撫使趙哲于邠州哲之誅史及諸書不載日歷紹興四年八月二十一日承節郎趙甡進狀父哲建炎三年落階官除同州觀察使於當年十月一日宣撫張浚挾私輒從軍法身死故繫於此日遂責本司都統制明州觀察使熙河路經略安撫使劉錫為海州團練副使合州安置錫之貶不見本月日按明年二月五日上諭大臣誥已云浚重譴錫則其得罪必在此時故并附此俟考初諸軍既敗還浚召錫等計事浚立堂上諸將帥立堂下浚問誤國大事誰當任其咎者衆言環慶兵先走浚命擁哲斬之哲不肯伏且自言有復辟功浚親校以撾擊其口斬于堠下軍士為之喪氣浚遂以黃榜放諸軍罪哲已死諸將帥聽令浚命各歸本路歇泊令方脫口諸路之兵已行俄頃皆盡浚率帳下退保秦州於是陕西人情大震朱勝非秀水間居録云張浚出使陕蜀便宜除官至節度使雜學士權出人主之右竭蜀人之膏血悉陕服之用兵凡三十萬衆與敵角一戰盡覆用其屬劉子羽計歸罪將帥趙哲曲端並誅之將士由是怨怒俱發浚僅以身免奔還䦘州關陕之陷自此始至今言敗績之大者必曰富平之役也龜鑑曰富平一戰偶為趙哲離部以取敗夫勝負兵家之常鄧禹有關中之敗子儀有相州之敗孔明有街亭之敗而富平之以速戰敗者公非不知陕西兵將上下之情未通也又非不知臨行天語三年而後出師也痛念向者海道之幸已出襄漢今也敵駐淮甸有再入吳越之謀萬一犯屬車之清塵縱欲提兵問罪亦何及矣此公所以不顧利害不計勝負而決於一戰也臣僚上言建州軍賊作過將官曺維方到任繼而趙哲招撫不以軍賊叛逆在壓奏劾除名有㫖體究詣實改正依無過人例又言范琪為衢州開化縣令其邑僻逺叛賊苗劉所不到乃結胡唐老奏守禦有功改京秩有㫖體究詣實改正臣留正等曰曺維未嘗有罪而被罪范琪未嘗有功而奏功太上皇帝既得其實亟加改正曽不旋踵若使維之罪不雪而琪終冒其功在二人固未足道而於賞罰大柄無乃終纍乎臣於此二事有以見太上皇帝之於賞罰必務核實以求中也朝請郎王宰朝奉郎通判邠州孫恂並直祕閣為陕府西路轉運判官張浚先已用二人至是除職尚書兵部貟外郎宣撫處置使司主管機宜文字馮康國貶秩二等康國之撫諭荆湖也上方在道塗不暇降詔康國既去自以意為之言者劾其擅造制書故黜日歷建炎四年三月辛亥詔曰朕以彊敵侵犯越在海邦自惟艱虞寡昧所致禍及黎庶痛在朕躬尚賴逺方官吏軍民共恤國難勿替忠義保我家邦無或乘時自貽厥罪賞罰具在朕不汝忘今遣兵部貟外郎馮康國往敷朕意咨爾衆庶宜體至懷按此詔書其詞簡率不類汪藻文字疑即康國所作也辛未宣撫處置使司參議官王以寧言乞下詔幸蜀俾敵人罔測乘輿所在上曰詔令所以取信於民自非必行之事不可降詔使民何所適從張守曰昨已降㫖令㳂江儲偫趙鼎曰有司之事如此無害亦足以張虛聲矣詔朝請郎知分寧縣陳敏識與沿江知州差遣時李成方擾江西諸郡遂以敏識知南康軍敏識不赴是日秦檜自楚州孫村歸於漣水軍丁祀水寨初金人以檜請存趙氏執還燕山既而從二帝之上京上皇之遺金書請和也檜與聞之事見二年六月逮二帝東徙韓州金主晟髙其節以賜左監軍昌為任用任用者猶執事也昌之提兵南犯也命檜以任用偕行檜欲因是南歸而其妻王氏在燕懼不得去乃陽與檜爭昌妻問之以告由是得與王氏俱行昌至淮隂以檜為參謀軍事又以為隨軍轉運使及楚城垂破檜慮為敵所用乃薦陳邦光李儔可以任使檜嘗以舟人孫靜可任遂與密謀城破之三日以催海州淮陽軍錢糧為名與王氏及臧獲硯童興兒御史臺街司翁順及親信髙益恭等數人入小舟令靜掛席而去至漣水軍界為祀邏者所得將執縛而殺之檜知水寨尚為國家守乃告之曰我御史中丞秦檜也寨兵皆鄉民不曉其說且謂所獲姦細稍陵辱之檜曰此中有士人否當知我姓名時王安道者為酒壚衆呼示之安道佯為識檜長揖之曰中丞良苦衆信之乃不殺翌旦謁祀於軍中其下諸將招與飲有副將劉靖者欲殺檜而取其資檜知而責之靖不得發檜遂泛海赴行在此以趙甡之遺史及檜北征紀實參修甡之遺史云秦檜初以不願立張邦昌遭尼瑪哈拘執北去并妻王氏同行隨行者有小奴硯童小婢興兒御史臺街司翁順而已至金國見金主文烈帝髙其不附立異姓之節以賜其弟逹蘭為任用任用者執事也逹蘭亦髙其節甚相親信金人許隨南官遷徙之人各逐便硯童興兒翁順皆不欲捨檜去乃共約同死生遂不相離金人欲用逹蘭提兵而南也命檜以任用偕行檜密與妻王氏為計至燕山府留王氏而已獨行故為喧爭曰我家翁父使我嫁汝時有資財二十萬貫欲使我與汝同甘苦盡此平生今大金國以汝為任用而乃棄我于途中耶喧爭不息達蘭之居與檜之居鄰比聲相聞達蘭之妻一車婆聞之詣王氏問其故王氏具以告一車婆曰不須慮也大金國法令許以家屬同行今皇帝為監軍亦帶家屬在軍中秦任用何故留家屬在此而不同行也白之達蘭達蘭遂令王氏同行檜為隨軍轉運在孫村浦寨中楚城陷孫村寨金人爭趨入楚州檜密約孫靜于淮岸乘紛紛不定作催淮陽軍海州錢糧為名同王氏硯童興兒翁順及親信髙益恭等數人令靜掛席而去秦檜北征記實云寨中日夜經營無以為計欲宿留以俟後便恐或逼招楚城又恐城破被用乃薦陳邦光李儔蔡敦禮輩以為可以任使又為言楚州褊小不足深討之意皆所以求自免也城既破夜欲因衆競利之時奔馬西還而金人己先潜伏以備城中逋人明日見諸刻木以謂旦夕挈入城中乃定計登舟遣介再訪操舟輩兩日不可得前後見前所共議者引至幕中結約相定遂欲椎牛相勞而談復再變矣度非此時他日未有方便急約雲中所還往者張炳郎中其人醫多效往在軍中相識遂託以尋覔水手求取篙楫為刺舟之計適㑹張亦欲往遂定計於食頃之間躬謁舟人責以負約仍許重賄可否決在今夕以死斷之議遂堅決無疑矣是夜登舟行六十里來日宿丁家寨南次日至下寨具狀謁統制公彼猶未信再宿引至中寨㑹統制丁祀抱疾其次諸將見約同飲有副將劉靖者宿議相圖以取囊槖偶先聞之乃於席半指劉斥其隂計劉自知計已發露不復有言曉乃親詣丁祀帳中乘醉欲卧以示無疑而丁不果納遂還舟中㑹天寧節近乃約諸將至僧舍祝延示以禮法朱勝非秀水間居録云秦檜隨敵北去為大帥逹蘭任用至是與其家俱得歸檜王氏壻也王仲山有别業在濟南金為取千緡贐其行然全家來歸婢僕亦皆故人知其非逃歸也林泉野記云檜在金為徽宗作書上尼瑪哈以結和議尼瑪哈喜之賜錢萬貫絹萬匹建炎四年金攻椘州乃使乘船艦全家厚載而還俾結和議為內助檜至漣水軍賊丁祀寨諸將多曰兩軍相拒豈全家厚載造朝者必大金使來隂壞朝廷宜速誅之以絶後患賊軍參議王安道機宜馮由義力保護之曰此淵聖朝中丞萬一事平朝廷尋之我軍誅矣宜送之朝祀乃命安道由義送至鎮江府檜見劉光世首言講和為便光世送之朝士民聞檜來皆驚疑惟范宗尹李回薦其忠王明清揮麈録餘話云檜泛海至楚州守臣楊揆疑其僞即欲斬之其館客管當可者曰萬一果然朝廷知之非便不若津遣赴行在則真僞自辨矣揆於是遣人隂加防間送至行在檜既貴揆屏居台州不敢出者二十年訪尋當可官其二子洪適撰其父皓行述曰金圍椘州不下時秦留尼瑪哈所使之草􅊾諭降有錫納者在軍知狀先君與秦語及金事因曰憶錫納否别時託寄聲秦色變而罷按秦檜得歸此事體不小而諸書所記參差不齊王明清餘話所云尤為謬誤按史楊揆以紹興三年二月除知楚州去此已久又檜未嘗至山陽日厯中亦不見管當可事不知明清何所據也適以為檜留尼瑪哈所草􅊾諭降時尼瑪哈在雲中何由使草􅊾或即逹蘭使之檜以為丁祀拒已不見若爾檜專國時祀必廢死矣而擅朝之初即薦知漣水軍後用為府幹辦積官遙郡觀察使權震一時不知但感其不殺之恩或又有曲折而收之以滅口也故此事尤可疑茍如張邵所奏謂檜自中京間行南歸則無是理檜與何㮚孫傅司馬朴同被拘三人不得歸而檜獨得歸此可疑一也自中京至燕千里自燕至楚州二千五百里豈無防禁之人而踰河越海並無譏察此可疑二也檜自謂隨軍至楚定計於食頃之間向使金人初無歸檜之意第令隨軍則質其家屬必矣胡為使王氏偕行此可疑三也張邵所奏謂檜衣褐憔悴蓋被執而訓童讀而檜自叙乃云劉靖欲殺已以圖其囊槖既有囊槖豈是奔舟此可疑四也夫以檜初歸見上之兩言始相建明之二䇿與得政所為前後相符牢不可破豈非檜在金庭嘗倡和議而達蘭縱之使歸邪今亦未敢臆決故悉附見下方餘見十一月丙午壬申降授文州團練使神武前軍統制王􅊛復溫州觀察使癸酉命尚書祠部貟外郎兼權太常少卿鄭士彥奉太廟神主如溫州月朔五饗權用酒脯行禮執政進呈諫官論疏上覽之甚悅謂范宗尹曰近來臺諫官無一日無章疏亦未嘗放過一事趙鼎曰陛下開廣言路奬拔言官是以人人得以盡言無隱此朝廷美事也責授汝州團練副使鄭大年復武功大夫永州團練使大年自言非苗劉薦引無辜被罪詔御史臺鞫實而有是命丙子中大夫余深乞以郊恩奏薦著令應責降而官品當奏者取裁范宗尹曰深蔡京死黨助京為惡遂至宰相中雖責降因渡江赦宥復還鄉里已為幸免今乞奏薦誠為僥冒上曰可勿令䕃補上因謂宗尹曰比閲王球家所收上皇書畫有御製鶺鴒賦京卞皆作賦題其後卞賦盛言繼述哲宗之志屏斥元祐之人而致斯瑞豈非姦邪宗尹曰紹聖以來賊害忠良皆卞之力也利州觀察使新除辰沅靖州鎮撫使孔彥舟為鼎澧辰沅靖州鎮撫使兼知鼎州召澧鼎鎮撫使程昌㝢赴行在朝廷聞彥舟引兵至益陽縣故改命之時彥舟已據長沙而行在未知也十一月己酉改命初命諸路走馬承受使臣入奏止許以一卒自隨丁丑入內東頭供奉官秦鳳經略司走馬承受公事胡師回奏道路梗澀乞增為六十人詔許四十人其後五路陷沒遂不復置光堯㑹要云諸路走馬承受廢罷年月闕按建炎末五路既陷遂不復置若內批則紹興初猶有之非專有㫖廢罷史臣未深考也戊寅遣監察御史韓璜往湖南劾鍾相時程昌㝢奏相事與傅雱不同朝廷以真僞未明故命璜往劾治㑹相已為湖南安撫使向子諲所戮璜乃還趙甡之遺史孔彥舟得鍾相乃造法物儀仗欲張大其功乃解赴朝廷至攸縣遇曽龍圖殺相所造法物亦散失以史考之此時攸縣無曽龍圖日歷十二月丁酉都省契勘湖南安撫司己將鍾相等勘見本情依法處斷訖其韓璜不須前去奉聖㫖令韓璜回行在此時向子諲以直龍圖閣帥湖南㝢治攸縣殺相者即向子諲也己卯以久雨放行在越州公私僦錢十日自是雨雪亦如之是日馬進犯江州守臣直祕閣姚舜明兵馬鈐轄劉紹先率衆拒之進初過瑞昌知縣事張德林權主簿王隲不能拒斂民間金帛羊酒率吏民迎進入縣且供其錢糧進乃去遂圍江州以其徒吳駢知瑞昌縣庚辰使臣王鈐男用其父隨龍恩例乞差遣上曰與一差遣即可鈐已死恩例不可得也崇寧以來隨龍恩例太厚朕即位之初惟潜藩舊人量豫推恩元帥府官吏亦未嘗霑及黃潜善耿延禧髙世則輩屢以為言朕嘗謂潜善曰此例一開他時人人援引卿亦不能裁制矣其事遂已初滁濠鎮撫使劉綱屯建康府而其下張憲等三百人為變焚府東門之弔橋是日掠句容縣通直郎知縣事董蘋率射士民兵擊去之久之進蘋一官此以紹興三年十一月甲寅江東提刑司為蘋乞遷官功狀修入辛巳金紫光祿大夫充龍圖閣待制王革以覃恩乞進秩吏部言非宰相不除特進今王革即不曽任宰相詔令依條回授詔楊勍一行令往江州屯駐勍在汀州乞降故有是命仍令所過濟其糧食其徒皆官之徽猷閣直學士提舉西京嵩山崇福宫郭思致仕思河陽人父熙為翰林院待詔以畫山水名思登進士第宣和中歷帥三路至是渡江而卒王明清揮麈前録云思仕至龍圖閣直學士蓋誤壬午遣內侍李肖往桂陽監尋訪新除江西安撫大使朱勝非之任賜本路上供經制等錢三十萬緡米十五萬斛銀帛五千匹兩甲五百副度牒五百道為軍中之費仍命建武軍節度使楊惟忠以所統軍𨽻之然自度牒外錢米銀帛衣甲之類皆取於本路諸司諸州徒得其名而已癸未上謂輔臣曰聞城中百物貴踴將士經此寒苦可念太母日饋朕盤飱問內侍云一兔至直五六千鵪鶉亦三四百朕知之飭尚食勿進鵪兔久矣范宗尹曰陛下恭儉如此天下幸甚建康府路安撫大使兼知池州呂頥浩將之鎮而為馬進所壅未得前是日頥浩始領使事於饒州境上甲申言者論防海利害有可慮者三不足畏者三大略謂海道風帆瞬息千里舟師猝至勢難支梧又出沒示疑牽制我師揚旗伐鼓中夜而至我若驚潰彼計得行此可慮者三也冒涉洪濤敵衆萬病乘其未定易以進擊又或為風阻咫尺不前港道回曲加以泥濘其隙易乘此不足畏者三也由是言之無備則可慮有備則弗畏今莫若委沿海巡尉及民社分地防扼大抵海舟不能齊一及其未集而擊之必可成功從之右正言吳表臣乞趣劉光世解圍楚州表臣言楚州實淮南控扼之地趙立乃陛下封疆之臣萬一不利可為寒心望詔光世等以山陽不利則淮浙之憂未艾冝速進援上覽奏謂輔臣曰立堅守孤城雖古名將無以過之可趣光世躬親渡江庶幾鼓率諸鎮時上以金書疾置趣光世㑹兵者五而光世不行於是城陷且再旬而朝廷猶未知也乙酉言者論三年天下之通喪後世有從權奪服之舉者所以移孝為忠徇國家之急也而比來所起之士多非金革之故幾習宣政之風如權邦彥為發運使姜仲謙為湖北轉運使以至幕職之官亦行起復又有夤緣請託於權三省樞密院而圖起復者此何理邪欲望一切罷去于以明人倫而厚風俗詔邦彥專委催發諸路錢糧應副行在大軍支遣其餘皆罷之丙戌樞密院言探報金人已破楚州未知所向又建康府申有人侵犯六合縣界未知姓名詔臨安府湖州措置隄備仍遣信實人往廣德軍建康府體探金人動息并人馬實數以聞丁亥尚書吏部侍郎兼權直學士院綦崈禮充徽猷閣直學士知漳州戊子簽書樞密院事趙鼎奏詰劉光世等違命不救楚州之罪有云逐官但為身謀不恤國事且令追襲金人過淮以功贖過翌日上批語言太峻令改定進入及進呈上曰光世當此一面委任非輕若責之太峻恐其心不安難以立事鼎曰陛下待諸將可謂無負矣不知何以為報己丑端明殿學士權同知三省樞密院事李回改同知樞密院事按宋史繫丁亥日回以時方用兵請所賜衣帶等並減半許之時金人留淮上未退一日宰執奏邊事范宗尹曰敵未必能再渡趙鼎曰勿恃其不來恃吾有以待之也乃乞詔州縣各為移治自保之計毋得拘留百姓及敵至即脫身而遁使民肝腦塗地又曰三省常為敵不來而為陛下拔人才修政事密院常為敵見侵而為陛下申軍律治兵甲即兩得之上曰卿等如此朕復何憂忽有諜報謂敵衆引舟自漕渠而南行在震攘鼎謂宗尹曰不速動恐後有維揚之變宗尹曰今日之事在維揚則不可在㑹稽則可鼎曰相公之言是回曰丞相之言差强人意此以趙鼎范宗尹事實參修熊克小歷繫之九月乙丑按此論當在聞山陽既失之後恐不在九月間兼李回是時亦未再入密院無緣與此議論今移附此庶不抵牾庚寅右正言吳表臣言臣向嘗論奏乞諭張浚令提關陕鋭旅疾速入援伏計朝廷必屢己督促然至今寂然未有來耗中外人情不勝顒望臣伏念朝廷待浚之意亦至矣浚之奏請無有不行浚之官屬推賞甚厚蓋望其竭力為報緩急有助也今冬候已深敵情叵測在浚臣子之心亦豈遑居若恬然不恤君父之急於義如何欲望更遣使臣由間道相繼督促張浚曲端等令統帥精騎星夜前來應援無使後時若强敵深入亦有後顧之虞此事迫切不宜緩者時朝廷猶未知浚敗於富平乃詔樞密院遣使臣二人趣浚入援初浚既斬趙哲以陕西轉運判官孫恂權環慶經略使浚退保秦州或謂環慶諸將曰汝等戰勇而帥獨被誅天下寧有是事參議軍事劉子羽聞之令恂隂圖諸將恂遂以敗軍斬統領官張忠喬澤統制官慕容洧與諸將列告于庭恂叱之曰爾等頭亦未牢洧環州屬户其族甚大聞此語懼誅遂首以兵叛進攻環州浚命統制官李彥琪以涇原兵救環州洧附于夏國浚又遣涇原經略使劉錡追之錡留統制官張中彥幹辦公事承務郎趙彬守渭州二人皆曲端心腹素輕錡又知浚已還秦恐金人至不能守乃相與謀逐錡而據涇原錡至環州與洧相拒金以輕兵破涇州次潘原縣錡留彥琪捍洧親率精鋭赴渭州錡至瓦亭而敵已迫錡進不敢追洧退不敢入渭遂走德順軍彥琪以孤軍無援亦懼遁歸古原州中彥彬聞之遂遣人詣金軍通欵彬原州人也五路之陷史紀不書今以諸家雜記參考修入楊氏聖政編年慕容洧以環州叛張浚遣涇原統制官李彥琪救環州金自鳯翔犯涇原劉錡遁去統制官張中孚中彥降李彥琪懼遁歸古原州中彥等引金人劫降之劉錡至花石峽趙彬劫其軍與金帛降敵熊克小歷孫恂斬喬澤張忠時慕容洧守慶陽懼將及已遂首以城叛進攻環州張浚檄劉錡以兵解圍錡至環州與金相拒金以輕兵破涇州次潘陽縣錡留統制官張中孚李彥琪捍洧親率精鋭還而渭城已陷錡退屯瓦亭中孚與其弟統領官中彥送欵降敵彥琪以餘兵遁歸古原中孚等又引金人劫降之錡至花石峽統制官趙彬又劫其軍與金帛降敵二書所載略同然以趙甡之遺史考之當洧及中彥繼叛時金人猶未大入也甡之以為張中彥趙彬同謀逐錡此為得之二書所云差略又按常同劾劉子羽疏孫恂斬二將洧實告于庭而克謂洧守慶陽當考趙彬者本文士據紹興九年彬待罪狀自云富平失律時係涇原幕官克以為統制亦誤遣朝散郎謝嚮措置福建兵民寨柵時范汝為盜熾官軍多失利故命嚮持金字牌往招之詔故特進李邦彥贈觀文殿大學士令桂州量給葬事范宗尹之庭對也考官陸德先等言其立異邦彥為詳定官取㫖置乙科故宗尹德之後諡和文日歷勘㑹李邦彥已復特進按今年七月乙丑邦彥復銀青光祿大夫不知何時再復也辛卯故責授單州别駕耿南仲追復宣奉大夫觀文殿學士令梧州量給葬事范宗尹為南仲所知因盡復其官職論者咎之日歷今年七月乙丑有㫖耿南仲復元官不知此時何以又云追復或是前此嘗有論列追寢諸書不見當考䖍州進士李敦仁少無賴其父嘗言先世冡地風水殊勝四十年後當有出侯王者敦仁喜由是遂以襲逐楊勍為名欲聚兵數萬人據江南福建三路此據紹興元年九月戊戌大理寺所劾李敦仁欵狀其後就招為承節郎𨽻江西兵馬副都監李山軍中使喚既而山遣敦仁往䖍化捕盜敦仁因與其弟世雄聚衆於羅源有兵萬餘是日破䖍化縣又入石城縣詔山與吉州統制官張忠彥㑹兵討之事聞在十二月癸未癸巳進士髙世轟特授右監門衛將軍駙馬都尉賜名世榮時僞福國長公主當下降選於戚里而得之世榮士瞳從孫也父公繪以敦武郎監湖州都酒務翌日上召對而命之仍賜襲衣金帶鞍馬如故事按公繪宣仁從姪不可以與世則之父同名故朝請郎黃宰贈直祕閣宰崇寧末應詔上書流徙海島故録之甲午檢校少保建武軍節度使楊惟忠為江州路副都總管以所部屯江州是日僞齊劉豫遣尚書右丞相張孝純冊其母令人為皇太后立其妾錢氏為皇后錢氏本宣政間宫人出為民婢入豫家有寵託言吳越王後而立之乙未朝奉大夫知漳州向子諲復直龍圖閣令樞密院遣使臣往湖南廣西以來尋訪催促之任仍令宣撫處置使司參議官王以寧以所部兵付子諲訖赴行在時以寧已為孔彥舟所逐矣丙申馬進急攻江州奪門併入兵馬副鈐轄劉紹先統兵迎敵雖捷而攻城愈急守臣姚舜明乃募迪功郎黃武免解進士張定之間道賫䗶書赴行在浙西安撫大使劉光世言臣准御筆令督諸鎮速解山陽之圍若使嶽飛等即時恭聽朝廷指揮尅期前來則承州之賊可破楚州之圍可解乘機投隙間不容髮飛等遷延五十餘日遂失機㑹臣實不勝憤悶今臣已將沿江應係來路嚴為把守必不使南渡詔光世節制諸鎮戮力保守通泰仍伺便襲敵過淮毋失機㑹是日范宗尹等進呈江東探報孔彥威李成人馬宗尹曰臣等商量將來萬一移蹕欲令韓世忠屯饒州張俊留越州相為聲援上曰朕日夕念此未嘗忘懷世忠兵少與李成相拒萬一決戰少有敗衄國威愈挫朕欲留世忠浙東此人忠勇不畏金人敢與之戰使張俊以五千精騎䇿應之恐能成功來春事定朕親督諸軍巡幸江東雖過淮南亦所不憚平此二冦不難也趙鼎曰臣恐成輩乘間深入愈難支梧上曰卿所慮極當顧力未能及耳然朕之所說未必皆是卿等之言亦未必皆非更呼諸將議之丁酉詔為趙立輟二日朝贈立奉國軍節度使開府儀同三司諡忠烈官子孫十人且令訪其遺骸官給葬事後為立祠名顯忠知承州王林自興化率餘兵奔通州戊戌太常少卿解習為起居郎新除直龍圖閣知泉州蘇遲為太常少卿尚書吏部貟外郎王俁為左司貟外郎新除右司貟外郎侯延慶為禮部貟外郎俁華陽人也先是御史中丞冨直柔論延慶而援遲故二人卒改命禮部題名延慶自直祕閣除當考己亥詔連州編管人林杞許自便初把以擅殺張政故坐貶至是言者論其功乞酌情減免故有是命紹興二年七月甲申復官直祕閣淮寧順昌府蔡州鎮撫使馮長寧以王命阻絶棄城去是月以淮寧附於劉豫此據趙甡之遺史附見僞豫傳亦云建炎四年十一月馮長寧自陳州歸附與遺史蓋同日歷紹興元年二月癸未蔡州狀契勘馮長寧於去年四月中驅擁老少擅棄府城逃遁南來所經過蔡州民户盡劫奪與此不同蔡州所申當不誤或者長寧以今夏逃去至冬復北奔亦未可知若長寧四月已降則朝廷無緣明年二月尚令赴行在今且從遺史附此更候詳考通泰鎮撫使嶽飛在泰州持法嚴衆不敢犯前軍統制官傅慶衛州窰户也有勇力善戰飛愛之慶恃其才視飛為平交飛亦無忤色及飛為鎮撫使待之頗異慶覺之不恱㑹劉光世遣王德來承州飛命慶以兵㑹慶與德交馬而語云願事劉公德許之統領官王憲聞其語以告飛憾之戒憲勿泄至是飛令諸將射逺慶獨至百七十步既而飛取上所賜戰袍金帶遺統制官王貴慶醉謂飛曰當賞有功者飛問有功者誰慶曰慶在清水亭有功飛大怒焚袍毁帶曰不斬傅慶何以示衆遂斬之河南鎮撫司兵馬鈐轄翟琮率禆將李興渡河敗金人於陽城縣遂進至絳州之曲垣橫山義士史凖等以其衆來附興歸以所部屯商州初王善既降於金人餘黨皆散金人屯於六合縣其餘黨稍集至是推祝友為首寨於滁州之龔家城專殺人以為糧食日歷紹興元年二月丙辰廬夀鎮撫司統制髙彥狀彥等元是鎮撫李仲下人馮先䝉差在六合縣後有先鋒將官祝友恃凶聽讒上下怨怒彥等遂分軍來廣德軍界下寨不知仲即是王善餘黨否且附此當考盜劉忠據嶽州平江縣之白面山山在平江分寧瀏陽三縣之間趙雄揆韓世忠墓碑云劉忠據祁陽白綿山據日歷紹興二年二月己丑黃叔敖所奏乃此面字又不在祁陽碑恐誤也僞齊劉豫令民間房緡以十分為率五釐入官杜充自南京至雲中金左副元帥宗維薄其節不之禮久而命知相州建炎以來繫年要録卷三十八建炎以來繫年要録卷三十八金人地名考證尼瑪哈原書作黏罕誤改見卷一逹蘭原書作撻懶誤改見卷一錫納原書作室撚誤今改正
