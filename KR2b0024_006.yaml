body:
  text: 建炎以來繫年要録卷六宋李心傳撰建炎元年六月己未朔新除尚書右僕射李綱至行在先是右諫議大夫范宗尹力主議和乃言綱名浮於實而有震主之威不可以相章三上不報綱行至寶應乃聞拜相之命次泗上會有詔四方勤王之師還本道綱遂留升潭兵於泗而獨與數百人詣南都詔中使王嗣昌趣綱入覲綱至榖熟御史中丞顔岐遣人持劾副遺綱封以御史臺印上聞綱且至命徽猷閣學士提舉萬夀觀兼侍讀董耘往勞又命執政燕綱於金果園綱力辭上趣召入見於內殿綱涕泣上亦感動綱辭新命且言臣愚蠢但知有趙氏不知有金人固宜為其所惡然岐之論臣謂材不足以任宰相則可謂為金人所惡不當為相則不可且為趙氏之臣而金人喜之而反可以為相則自古賣國以與人者皆為忠臣矣外廷之論如此臣豈敢當此任願乞身以歸田里至於陛下命相於金人所喜所惡之間更望曲留聖慮上曰朕知卿忠義智略甚久在靖康時嘗欲言於淵聖使逺人畏服四方安寧非相卿不可今朕此志已定卿其勿辭綱頓首謝詔幹辦御藥院邵成章宣押赴都堂視事中興姓氏録云淵聖即位內侍用事者多貶罷超擢成章知入內內侍省事按李綱自記成章乃御藥幹辦今從之時日已夕上命黃潛善等留省中以俟之綱復固辭猶未受命也侍御史王賔言責授祕書少監王襄趙野罪大謫輕移襄永州野邵州並安置徽猷閣直學士提舉江州太平觀徐秉哲假資政殿學士領開封尹充大金通問使王時雍既貶上釋秉哲之罪使諭敵求和秉哲不受奉國軍節度使王宗濋責授定國軍節度副使邵州安置坐首引衛兵逃遁致都城失守也言者請減州縣及五司官以省費而中書侍郎黃潛善乞差官討論乃以起居郎滕康舍人汪藻並兼檢討官詔太傅張邦昌特給節度使俸龍圖閣學士新知襄陽府宗澤自衛南分兵屯河上以數百騎赴南都是日入對澤首上三事其一論人主不可以喜怒為賞罰其二論人主職在任相願於稠人廣衆中不以親踈不以逺近虛心謹擇參以國人左右之言爰立作相而毋使小人參之其三論諌官人主耳目臣下有懷姦藏慝嫉賢蔽善者當使耳目之官瀝心彈紏毋有所隱以絶後艱上納其言將留澤而黃潛善汪伯彥惡之乃令之襄陽澤除襄陽日厯在五月庚戌汪伯彥中興日厯在五月壬辰澤遺事在六月癸亥三書俱不同意者澤先已外除至南都始受命耳今從日厯乃略刪潤令不抵牾庚申詔李綱立新班奏事執政退綱留身上十議且言陛下度其可施行者願賜施行臣乃敢受命其一曰議國是大略謂今日之事欲戰則不足欲和則不可竊恐國論猶以和議為然蓋以二聖播遷非和則所以速二聖之禍臣竊以為不然漢髙祖與項羽戰于滎陽太公為羽所得置之機上者屢矣髙祖不顧其戰彌厲羽卒不敢害而還太公然則不顧其親而戰者乃所以還太公之術也昔金人與契丹二十餘戰戰必割地厚賂以講和既和則又求釁以戰卒滅契丹今又以和惑中國至於破都城隳宗社易姓改號而朝廷猶以和議為然是將以天下畀之敵而後已為今之計莫若一切罷和議専務自守之䇿建藩鎮於要害之地置帥府於大河及江淮之南修城壁治器械教水軍習車戰使其進無抄掠之得退有邀擊之患則雖有出沒必不敢深入三數年間軍政益修甲車咸備然後大舉以討之報不共戴天之仇雪振古所無之耻彼知中國自強如此豈徒不敢肆橫而二聖有可安之理矣且金人之於國家雖奉藩稱臣竭天下以豫之亦未為德也必至於混一區宇而後已故今日法勾踐嘗膽之志則可法其卑詞厚賂則不可臣謂正當嵗時遣使奉問二聖至於金國我不加兵専以守為䇿俟吾政事修士氣振然後可以大舉六月丁卯下詔守兩河己卯置帥府要郡及水軍丙戍教車戰招軍買馬乙亥遣傅雱奉表兩宫二曰議巡幸大略謂天下形勢關中為上襄鄧次之建康又次之今四方多故除四京外宜以長安為西都襄陽為南都建康為東都各命守臣葺城池治宫室積糗糧以備巡幸三都成而天下之勢安矣陛下用臣此䇿其利有三一則藉巡幸之名使國勢不失於太弱二則不置定都使敵國無所窺伺三則四方望幸使姦雄無所覬覦議者或欲留應天或欲幸建康臣以為皆非計夫汴梁宗廟社稷之所在天下之根本也陛下即位之始豈可不一見宗廟以安都人之心願先降勑榜以修謁陵寢為名擇日巡幸計無出於此者六月壬戍施行三曰議赦令大略謂惡逆不當赦選人不當盡循資罪廢之人不當盡復今登寶位赦書一切比附張邦昌偽赦非是宜改正以法祖宗六月壬戌施行四曰議僭逆大略謂張邦昌久與機政擢冠宰司國破而資之以為利君辱而攘之以為榮易姓建邦四十餘日逮金人之既退方降赦以收恩考其四日之手書猶用周朝之故事今方冒處王爵極其褒崇秋髙馬肥敵騎縱橫挾借其勢陛下將何以制之願肆諸市朝以為亂臣賊子之戒六月癸亥施行五曰議偽命大略謂國家更大變士大夫屈膝于偽庭者不可勝數冝依唐肅宗六等定罪以勵士風六月癸亥七月辛丑施行六曰議戰大略謂軍政久廢宜一新紀綱信賞必罰六月乙亥施行七曰議守大略謂於沿河及江淮措置抗禦以扼敵衝六月己卯施行八曰議本政大略謂朝廷天下之本也政事法度於是乎出故中書進擬門下審駁尚書奉行皆所以宣布天子之命令使四方稟承焉政出於一則朝廷尊而天下安政出於二三則朝廷卑而天下危天下之安危係於朝廷之尊卑而朝廷之尊卑係於宰相之賢否與夫人主聽任之重輕其可忽乎唐至文宗之朝可謂衰弱矣武宗既立得一李德裕相之而威令遂振何哉由德裕知所本故也其初為相即上言曰宰相非其人當亟廢罷至天下之政則不可不歸中書武宗聽之號令紀綱咸自此出故能削平僭偽號為中興然則於艱難多事之秋所以出政者尤不可以不一也自崇觀以來政出多門閹官恩幸女寵皆得以干預朝政所謂宰相者保身固寵不敢以為言遂失其職法度廢弛馴致靖康之禍非一朝一夕之積也願陛下深思天下安危之本察德裕之言而法武宗之任人監崇觀之失以刷靖康之大耻宗社生靈不勝幸甚九曰議責成大略謂靖康間進退大臣太速功效蔑著宜擇人而久任之以要成功十曰議修德大略謂初膺天命宜益修孝悌恭儉之德以副天下之望上與黃潛善等謀之翌日出其章付中書惟僭逆偽命二章不下按綱建炎進退志載上語有云執政中有與卿論不同者俟欵曲商量蓋指潛善等也皇叔祖靖康軍節度使知西外宗正事仲湜為開府儀同三司封嗣濮王仲湜楚滎王宗輔子也安懿王孫百二十有六人至此紹封者五人是日金左副元帥宗維還屯雲中辛酉名潛邸為升暘宫詔新除郎官未經上殿者並引對資政殿學士領開封府尹徐秉哲責授昭信軍節度副使梅州安置坐使金辭行也壬戍李綱同執政進呈議國是劄子上曰今日之事正當如此可付中書省遵守次進呈議巡幸劄子上命促留守司修治京城秪備車駕還闕欵謁宗廟詔永興軍襄陽江寧府增葺城池量修宫室官府以備巡幸次進呈議赦令劄子僉謂藝祖登極之初嘗赦惡逆今已行難追改乃命選人惟在職者循資左降官等第敘復執政退綱留身奏張邦昌僭逆及受偽命臣僚二事皆今日政刑之大者乞早賜施行上曰執政中有與卿論不同者少遲議之綱曰邦昌僭逆明白若都人則謂因邦昌立而得生且免再括金帛而德之若元帥府則謂邦昌不待征討遣使奉迎而恕之若天下則謂邦昌建號易姓其奉迎特出於不得已而憤疾之德之恕之者私也憤疾之者公也執政中有論不同者臣請與之廷辨上乃遣小黃門召黃潛善吕好問汪伯彥再對上語之故潛善猶力主之綱詰難再三乃言在逺不若在近好問亦曰唐德宗幸奉天不挾朱泚行後以為悔綱曰邦昌當正典刑何逺近之有借使在近當幽縶而反尊崇之如此何也况其已僭逆豈可留之在朝廷使道路指目曰此亦一天子哉因泣拜曰臣不可與邦昌同列正當以笏擊之陛下必欲用邦昌第罷臣勿以為相無不可者伯彥曰李綱氣直臣等不及上曰卿欲如何措置綱曰邦昌之罪理當誅夷陛下以其嘗自歸貸其死而逺竄之受偽命者等第謫降可也上乃出綱奏詔置檢鼓院於行宫便門之外差官權攝李綱言今日急務在通下情乃置院以逹四方章奏綱又請置看詳官二員臣民封事簽擬可行者將上取旨從之詔察官職守自今依官制施行延康殿學士大名尹張慤試户部尚書御史中丞顔岐充徽猷閣待制提舉亳州明道宫岐以嘗論李綱上疏待罪執政欲令依舊供職上不許乃有是命熊克小厯岐除待制奉祠在八月壬戌蓋實甚誤於是右諌議大夫范宗尹亦求去詔以宗尹為徽猷閣待制知舒州日歷宗尹六月庚午落職未知何日罷諌官今因顔岐除目附見俟考徽猷閣待制提舉亳州眀道宫錢伯言為開封尹徽猷閣待制提舉西京嵩山崇福宫吕頥浩為徽猷閣直學士知揚州伯言協子協吳越王倧曽孫元祐翰林學士頥浩樂陵人宣和末為燕山府路都轉運使金人內侵郭藥師執之以降已而得歸至是復用熊克小厯云頥浩厯城人而董萃撰行狀乃云樂陵人今從行狀祕閣修撰知鼎州唐慤知荆南府初應天尹闕大臣薦通議大夫提舉亳州眀道宫李偃才可用詔召入偃徽之孫徽之迪子仕至正議大夫以媚事蔡京纍遷龍圖閣直學士靖康中斥去偃慙懼復請奉祠會知廣州孫俟還朝甫至行在乃以為應天尹偃除尹日厯不見此以附傳附入按應天初除何志同後用孫俟其命偃必李綱未至闕時則在俟受命之前也當考詔宗室銜位不書姓官司毋得受自熙寧以來宗室外官單銜奏事並不著姓其後更革不常至是延康殿學士趙子嵩知鎮江府以表謝上中書侍郎黃潛善援近旨劾之乃申眀行下趙子嵩中外遺事云宣和三年子嵩賜對上疑宗子出仕者皆著姓子嵩對以熙寧法如此與異姓共事須著姓以别之若辭見謝及獨銜奏事自不著姓上曰終是粗踈卿可討論奏來五年余從兄正之召對上又及此遂批出宗室內外並不著姓朝廷不復考故事詔出識者大駭而有司不以官職髙下皆名别之七年夏子嵩出守淮寧辭日為上極言之云此雖小事所繫甚大周曰姬氏漢曰劉氏唐曰李氏今無故去國姓不祥上寤敕中書討論遂復用熙寧法建炎元年今上皇帝中興子嵩除延康殿學士知鎮江府上謝表黃潛善在中書乃令進奏官退回為不合不著姓因欲見沮而不考著令也至今雖大宗正司宗室亦稱皇叔皇兄具官仍著姓矯枉過正誤矣按元符詔旨宣和五年六月乙未御筆內外宗室並不稱姓七年八月戊午御筆宗室外官除見辭榜子外餘依熙寧法著姓此即子嵩所請也今乃云潛善見沮而不考著令誤矣癸亥中書侍郎黃潛善為門下侍郎兼權中書侍郎太傅同安郡王張邦昌責授昭化軍節度副使潭州安置李綱同執政進呈議僭逆劄子黃潛善猶左右之退奉御筆邦昌僭逆理合誅夷原其初心出於迫脅可特與免貸於是潭州安置所過巡尉伴送仍令監司守臣常切覺察月具存在申尚書省次議偽命臣僚綱言責授安化軍節度副使王時雍等四人與金人傳導指意議廢趙氏迫道君已下出郊又受偽命為執政此四人宜為罪首上顧吕好問好問曰誠有之時徐秉哲已先竄於是移時雍髙州責龍圖閣學士吳幵永州述古殿直學士莫儔于全州並安置時在圍城中者綱皆欲深罪之好問曰王業艱難正納汙含垢之時遽繩以峻法懼者衆矣綱不納熊克小厯云時在圍城中者綱欲槩以叛逆罪之吕好問曰責以不能死則可若直謂之叛逆彼豈無辭乎綱意不厭乃遣其客晉陵胡珵要説好問區别圍城人為三等以差行戮且曰必如是方可表公之忠莭好問謂珵曰某與君俱處城中衆以為可罪者才十許人耳餘人本末吾輩所未悉寧可以叛逆加之耶綱由是不樂吕本中雜説曰金人再犯京師謝克家耿南仲黨人往往在圍城中皆前日力攻李綱者綱既相復以圍城中事中傷之以邦昌僣號叛逆凡在圍城中皆次第定罪吕好問謂綱曰圍城中固可罪若但責以不能死節彼無所逃罪矣然其間尚有曲折若専以叛逆罪之則彼必有辭矣却恐反為害綱由是不悅即使言者中好問上深以為非然好問亦不敢留綱亦旋罷去由是觀之耿南仲李綱之黨茍以罪更相加誣於國事所害甚大皆不能無罪也按綱斥逐偽黨乃國法之所當然本中以綱與其父異論而排之今不取章何俌龜鑑曰公之十議一施而議僣叛議受偽命二獨留中而不下綱曰此刑政之大者蓋為臣之罪莫甚於僣叛莫甚於從偽此而不誅何以正朝廷何以示百官何以曉天下何以懲戒萬世之事君者上之所以未遽行以祖宗不忍輕用刑誅不忍於殺大臣故也夫祖宗之所以不忍者豈不忍於此輩哉君不忍於其臣臣反忍於其君邦昌忍於易姓忍於負宗社王時雍之徒忍於覆國忍於事異姓茍可以謀身者皆無所不忍傳曰人將忍君嗚呼此輩非忍君者乎管蔡至親周公忍而誅辟之不以議親之法而減也若使覆宗社而無誅宗社何罪焉棄主事偽而無刑彼盡忠守節者何辜焉吕中中興大事記曰朱文公謂李綱入來方成朝廷者正謂此也然綱之議雖行而綱之謗愈多矣綱去之後朱勝非以敵犯維揚而欲立邦昌後蓋勝非邦昌友壻也未一二年間偽命之臣有驟然擢用而為宰相臺諌者矣可勝嘆哉綱又以給事中李擢徽猷閣待制知秀州孫覿為邦昌權直學士院軍器監王紹草勸進表祕書省著作郎顔博文草赦文資政殿學士新知潼川府馮澥在偽庭守左丞舊職延康殿學士新知洪州李回權右丞於是遂責擢郴州覿歸州博文澧州並安置紹除名容州編管澥落職回落職奉祠日厯邦昌以下行遣並在六月四日壬戌按李綱行狀六月一日進對內殿翌日上下議翌日降出國是等五劄子次日與黃潛善等廷辨上曰來日將上取旨翌日進呈邦昌安置潭州次進呈議偽命劄子得旨皆散官安置以次第考之則其行遣在初五日癸亥也日厯併繫壬戍熊克小厯載偽命臣僚貶謫在壬戍邦昌安置在癸亥皆誤新除翰林學士謝克家既以祖諱辭上命權不繫三字克家以非舊典不拜李綱亦惡之乃以為述古殿直學士提舉杭州洞霄宫尋又坐圍城中避事降龍圖閣待制勒停人俞向復朝請郎充祕閣修撰知河南府兼西道都總管代姚古也向於宣和末纍更事任靖康初斥去至是復用之江東轉運判官李彌遜為直祕閣淮南轉運副使以彌遜自言與經制使翁彥國連姻引嫌也故徽猷閣待制知懷州霍安國以死節顯著贈延康殿學士李綱言自崇觀以來朝廷不復崇尚名節故士大夫寡亷鮮耻不知君臣之義靖康之禍視兩宫播遷如路人然罕有能仗節死義者在內惟李若水在外惟霍安國死莭顯著餘未有聞願詔諸路詢訪優加贈恤始上知若水之忠首賜詔書褒贈至是綱有請遂自安國及劉韐已下次第褒録之初賊祝靖冦荆南安撫使鄧雍遁去賊乘勢欲渡江知公安縣宣教郎程千秋率邑人及廣西湖南勤王兵之在邑者禦之遣人夜渡江焚舟毁筏殺賊甚衆遂不敢犯李孝忠繼至千秋沿江設備唐慤自鼎州調本路刀弩手助之賊乃去時通判鄂州趙令裨部官兵戍武昌縣賊閻瑾犯黃州其徒縱掠既去令裨即渡江存撫黃人德之自金再圍城京西湖北諸州悉為賊冦侵犯隨州陸德先復州趙縱之郢州舒舜舉與荆南德安皆失守獨知汝州徽猷閣待制趙子櫟知襄陽府直徽猷閣黃叔敖知蔡州直祕閣閻孝忠知漢陽軍朝議大夫李彥卿能守境捍賊至是李綱言於上奪雍龍圗閣直學士罷德先等三人仍奪其職遷子櫟寶文閣直學士叔敖祕閣修撰孝忠進一官彥卿直祕閣千秋進二官通判荆南府而擢令裨直龍圖閣知黃州更名令􅍲亦征切雍洵武子令􅍲燕懿王元孫嘉孝穆公世􅀈子子櫟燕懿王後馮翊侯令甲子燕王生臨汝侯惟和惟和生束陽侯從誨從誨生汧陽侯世逺世逺生令甲孝忠開封人汪藻作閻氏信效方序云頴昌閻孝忠而孝忠自作錢氏方序云大梁閻某今從之時叔敖已失守而綱蓋未知也熊克小厯云叔敖升祕閣修撰既而襄陽復不守叔敖落職降充監當按襄陽不守在五月丙辰日厯乃書于六月戊辰與趙甡之遺史不合當考執政退綱留身奏事上曰卿昨日內殿爭邦昌事內侍皆涕泣卿今可受命矣綱因論自古創業中興之主如漢髙光唐太宗皆有英眀之資寬誠之德仁厚而有容果斷而不惑故能戡定禍難身致太平因請以所編三君行事紀要録以進上可之甲子手詔犒設行在將士撫循百姓蠲賦役改弊法招羣盜按贓吏又詔靖康間敢言之士或致竄逐宜悉召還凡七事始李綱為上言靖康間雖號開言路然議論鯁峭者皆逺貶其實塞之也上以為然正議大夫守尚書右僕射兼中書侍郎李綱以覃恩遷正奉大夫日歷綱覃恩轉官在五日癸亥而綱行狀云六月六日告廷是日內殿奏料理兩河事行狀所云必得其的今從之仍兼御營使時河東北所失才十餘郡餘皆為朝廷固守綱奏議云河東惟失太原欣代澤潞汾晉七郡河北失真定懷衛濬四郡按去冬尼瑪哈破威勝軍及絳州今春石州繼陷不但十一州也或者此時綱猶未盡知今第云十餘郡當考綱言今日中興規模有先後之序當修軍政變士風裕邦財寬民力改弊法省冗費誠號令信賞罰擇帥臣選監司使吾政事已修然後可議興師而所急者當先理河北河東蓋兩路國之屏蔽今河北惟失真定等四郡河東惟失太原等六郡其餘皆在且推其土豪為首多者數萬少者數千不早遣使慰撫之臣恐久之食盡援兵不至即為金人用矣謂宜於河北置招撫司河東置經制司擇有才者為使以宣陛下德意有能保一郡者寵以使名如唐之方鎮俾自為守則無北顧之憂矣上曰誰可任此者綱請詢訪得其人以奏上許之吕中大事記曰嗚呼建炎之初肩背初失之時也河北惟失真定等四郡河東惟失太原等六郡其他固在也天下之勢不進則退進則當主李綱經理兩河之議宗澤留守之計則不惟故疆可全而讎耻亦可復也退則不惟河北河東不可保而河南亦不可保不惟淮甸不可保退而渡江退而航海矣復帝姬為公主於是賢德懿行大長帝姬封秦魯國淑慎長帝姬封吳國二主皆用上登極改命熊克小厯復帝姬為公主在八月壬寅按八月乃石端禮為靖懿帝姬請復封非事始也通奉大夫知舒州傅墨卿守禮部尚書龍圖閣學士知潭州郭三益試刑部尚書墨卿山隂人先是其家過江寧遭周德之亂闔門俱死由是辭不就職朝奉大夫周武仲試尚書吏部侍郎徽猷閣直學士提舉西京嵩山崇福宫曽楙試禮部侍郎徽猷閣學士提舉萬夀觀兼侍讀董耘試兵部侍郎武仲浦城人宣和末為御史中丞坐論童貫事責黃州安置至是復用時右正言鄧肅新進不知前朝事上疏論武仲為中司觀望王黼曽無一言且嘗建伐燕之謀乞誅殛以謝天下上察其非實不聽右文殿修撰知通州胡安國朝奉郎提舉杭州洞霄宫許景衡並試給事中朝散大夫提舉亳州明道宫劉珏試中書舍人景衡瑞安人珏長興人也靖康末三人俱在後省坐黨附李綱斥去至是並用之他日諌官潘良貴入對上諭曰朕今不用文華之士已令召許景衡于海濱矣景衡珏聞命冒暑赴朝安國辭不至景衡附傳云上即位之八日以給事中召而日厯附此後省題名亦在六月不知附傳何以不同當考尚書右司員外郎吳巖夫守光祿卿集英殿修撰新知亳州翁彥深守太常少卿朝奉郎李光守祕書少監巖夫執中子執中嵩溪人大觀御史中丞彥深彥國弟光上虞人靖康中為侍御史以論事去朝奉大夫辛炳守尚書左司郎中炳侯官人也太中大夫提舉南京鴻慶宫許翰復延康殿學士赴行在日厯作復端明殿學士蓋誤翰襄邑人靖康中同知樞密院事朝奉大夫提舉杭州洞霄宫曽開復顯謨閣待制知潭州開楙弟也始張邦昌既廢京城都巡檢使范瓊不自安朝廷以其握兵是日為降詔言節義所以責士大夫至於武臣卒伍理當闊略惟王宗濋首引衛兵逃遁致都城失守不可不責自宗濋外一切不問以責後效此據李綱建炎進退志𠫭修乙丑龍神衛四廂都指揮使馬忠為河北經制使措置節制民兵召責授鳳州團練使張所直祕閣通判河陽府傅亮赴行在初李綱既建經撫兩河之議欲薦用所然以其嘗言黃潛善之故頗難之一日過潛善從容言曰今河北未有人獨一張所可用又以狂妄抵罪不得已抆拭用之如以為臺諌處要地則不可若使之借官為招撫冒死立功以贖過公能先國事後私怨為古人之所難不亦美乎潛善許諾上悅乃召用焉熊克小厯云所靖康末嘗至河北募兵誤也所但奏遣吕剛中募兵而遙為提領詳見七月丙辰注保大軍承宣使御營使司都統制王淵為龍神衛四廂都指揮使責朝議大夫李回為祕書少監分司南京袁州居住以言者論防河逃棄且受偽命也詔自今以絹定罪並以二千為準舊制以絹計贓者千三百為一匹至是大理正權尚書刑部郎中朱端有言所在絹直髙乃有是命詔道州編管人張思正令赴王淵下使喚候立功日取旨以擒捕郭京之勞也丙寅新除太常少卿季質主管亳州眀道宫承議郎陳公輔為尚書吏部員外郎朝奉大夫程瑀行司勳員外郎朝散郎余應求為考功員外郎公輔臨海人瑀鄱陽人應求德興人靖康中三人為言事官坐黨附李綱責監川陕諸司商稅至是並召丁卯手詔河東北郡縣諭令堅守詔略曰河東河北國之屏蔽也朝廷豈忍輕棄靖康間特以金人憑陵不得已割地賂之將以保全宗社而金人日橫攻破都城易姓改號劫鑾輿以北則兩河之地又何割哉方命帥遣師以為聲援應州縣守臣能竭力保有一方及能力戰破敵者當授以節鉞應移用賦稅辟置將吏並從便宜其守臣皆遷官進職餘次第録之命諸路詢訪死節者以聞詔朝請大夫提舉西京嵩山崇福宫朝説之赴行在説之宗慤元孫宗慤清豐人康定中𠫭知政事元符末坐上書入黨籍靖康初起於既老用為中書舍人又斥去至是召還尋除徽猷閣待制兼侍讀用李綱薦也説之除職未見月日今召命附見黃犖新編經筵所題名説之兼侍讀在今年七月尚書祠部員外郎喻汝礪為四川撫諭官初汝礪自京師入見上復命為郎汝礪因對論遷都利害以為敵可避都不可遷汴都者天下之根本也若舍汴都而都金陵是一舉而擲中州之地以資於敵矣夫以諸葛之竒才而不能軋曹操李克用之驍勇而不能抗朱溫何哉曹魏朱梁先定中原庸蜀晉陽特朅朅然一方之伯者耳安足以當中原之強大乎臣謂中原決不可舍以為興王之資汴都決不可遷以陷金人之計既對上命赴都堂與李綱語綱大竒之汝礪尋以母老乞歸省遂除撫諭官且令督輸四川漕計羡緡及常平錢物汝礪入辭復奏言金人決渡河陛下宜急為之防毋以宴安之故而成此鴆毒上嘉納之日厯于此日併書汝礪江端友黃次山冦防為諸路撫諭而八月乙酉又書之按端友七月辛卯方除兵部員外郎趣赴行在日厯誤也蓋此時但遣汝礪其後繼遣三人耳談篆作汝礪年譜云被旨以禮部郎中為四川宣諭使此亦不然建炎四年十一月八日宣撫處置使張浚劄子臣據前祠部員外郎喻汝礪狀云云可見初未嘗遷禮中也實録附傳亦云為宣諭使蓋史堪撰墓志因年譜所云而史臣又不詳考耳今並不取年譜又云上聞公名亟欲大用之而耿氏父子居柄用之地且素忌公者乃為所沮按建炎之初耿氏父子已間廢其説謬妄戊辰龍圖閣學士新知襄陽府宗澤知青州澤聞黃潛善等復唱和議上疏言河之東北按北盟會編作河之東西陕之蒲解此三路者祖宗基命之地奈何輕聽姦邪張皇之言遂自分裂今日之事正宜與敵弗共戴天弗與俱生今四十日矣未聞有所號令但見刑部指揮不得謄播赦文於河東河北陕之蒲解兹非新人耳目也是欲蹈東晉既遷之覆轍裂王者一統之緒為偏霸耳為是説者不忠不孝之甚臣雖駑怯當躬冒矢石為諸將先上壯之以澤知青州召延康殿學士知青州曾孝序赴行在初澤至南都見李綱與之語國事澤慷慨流涕時開封尹缺綱為上言綏集舊都非澤不可上曰澤在磁每下令一聽於崔府君綱曰古人亦有用權術假於神以行其令者如田單火牛之類是也京師根本之地新經擾攘人心未固不得人以撫之非獨外憂且有內變上乃許之徙澤知開封府日厯澤除京尹在七月庚子而澤遺事云六月乙亥公至開封日厯恐誤也况澤除留守日厯亦係之六月乙酉則京尹之除無由反在其後今從澤遺事既而青州民詣南都借留孝序上許之孝序召及再留日厯全不書今據本傳附見何俌龜鑑曰自綱之入為右僕射也以英哲全德勉人主以內修外攘為己任抗忠數疏中時膏肓和守之議決而國是明僭逆之罪正而士氣作幸都之謀定而人心安他如修軍政變士風定經制改弊法置檢鼓院以通下情置賞功司以伸國法減上供之幣以寬州縣修茶鹽之法以通商賈剗東南官田而募民給佃倣保甲弓箭手而官為教閲招兵買馬分布要害遣張所招撫河北王􅊛經制河東宗澤留守京城西顧關陜南葺樊鄧且將益據形便以為必守中原之計此朱文公謂李綱入來方成朝廷者正謂此也宗澤乞回鑾疏曰臣聞三代之得天下也得其民也得其民有道得其心也得其心有道所欲與之聚之所惡勿施爾也是則得民之道在察其心之所欲與其心之所惡而已此古所以有天時不如地利地利不如人和之語求民之和豈必家至户到一一而求之哉應順天人承天下之大順則民不期和而自和矣臣蒙恩差知開封府臣雖衰老無能然久識開封染習諸統制下皆是招集惡少亡命無檢者臣既領府事更不敢徇身自顧但以正道瀝誠感之不浹旬間彼惡少輩咸知格心爍謀斂迹遁去其閭巷間亦自然悛改上下帖然無敢肆橫以是人人鼓舞仰陛下之威懷陛下之惠拳拳慕戀不啻嬰孺之愛父母咸思發憤敵其所愾臣每聞王畿內外日久嘉靖熙熙皥皥將如我祖宗慶祐熙豐時臣觀人心念念徯望者惟願陛下六龍之御警蹕之聲千乘萬騎來歸九重以副萬邦切切繫戀之誠取進止己巳祕閣修撰新知河南府俞向改知陜州以祕閣修撰西道副總管孫昭逺代之初朝廷聞昭逺在陜西就除知陜州既而令將所募西兵赴行在內鄉賊尚虎有衆萬餘昭逺與遇破之至南都入見泣謝奉使亡狀即以為河南尹西京留守西道都總管悉以昭逺所募西兵三千人付御營前軍統制官張俊按原本作張浚宋史建炎元年置御營司張俊為前軍統制今從之昭逺獨與蜀兵數百之河南昭逺五月丙午除知陜州六月癸亥依舊西道副總管今牽聮書之其除西京日厯不載因俞向改除附此金紫光祿大夫王革復龍圗閣直學士通奉大夫程唐復寶文閣直學士朝散大夫李倫復顯謨閣待制中奉大夫王鼎復集英殿修撰唐之邵子也之邵眉山人故寶文閣待制奴事童貫以進𠫭其謀議鼎革子用宦者薦父子迭為京尹殺戮無辜不可勝計倫迪孫迪郵城人天禧中宰相舊出朱勔之門纍典方面靖康初皆坐斥去至是用赦復職而權中書舍人汪藻不書録黃乃復革龍圖閣待制唐寶文閣待制倫祕閣修撰鼎直龍圖閣責授成州團練副使郴州安置李擢改軍器少監分司西京筠州居住以擢靖康末已經降謫故也此似因論宋齊愈故為李綱所抆拭當考庚午降充龍圖閣待制知台州謝克家徽猷閣待制知舒州范宗尹坐嘗事偽庭並落職提舉杭州洞霄宫尚書右司員外郎蘇遲直祕閣知髙郵軍既而遲至髙郵守臣趙士瑗以發運司舉留遮境不受代詔貶士瑗二秩令依舊在任徙遲知婺州權中書舍人汪藻言今以士瑗為非則方命不從者堯四凶之罪也不可使之在任以士瑗為是則借留在任者漢循吏之恩也不可使之降官一士瑗之身而一日之間可賞可罰臣竊惑之願斥去士瑗以為後來鄙夫之戒不從日厯書蘇遲與東南郡檢正左右司題名元年六月蘇遲知婺州並不見士瑗再任事今以汪藻奏議增入蓋題名多踈略耳監察御史吳給守尚書左司員外郎以論事忤黃潛善也修職郎李雱迪功郎胡珵並為祕書省正字珵已見正月癸卯朝奉大夫郭永提點河北東路刑獄公事永元城人也詔親征行營副使司河東宣撫使司官屬見責降人朝奉郎方元若奉議郎裴廪直祕閣沈琯朝奉大夫韓瓘劉正彥奉議郎張燾承務郎鄒柄宣教郎何麒從事郎何大圭劉默張牧等十七人並與差遣元若桐廬人嘗為祕書少監廪嘗為鴻臚少卿正彥法子法政和間為熙河經略使死事燾根子根德興人仕至直龍圖閣大圭無錫人與燾皆嘗為祕書省正字柄浩子浩晉陵人建中中吏部侍郎嘗為樞密院編修官麒青城人也李綱之謫寧江也元若等皆坐纍貶降至是悉復之辛未以賢妃潘氏生皇子赦天下籍諸路神霄宫財榖付轉運司充省計拘天下職田錢𨽻提刑司士民封事可採者令看詳官由尚書省取旨旌擢黨籍及上書人盡還合得恩數命諸郡各舉才謀勇略可仗者三人赴御營司量才録用始李綱為上言陛下登寶位赦已曠蕩獨遺河東北而不及勤王之師天下尚觖望夫兩路為朝廷堅守而赦令不及人皆謂已棄之何以慰忠臣義士之心至於勤王之師雖未嘗用然在道半年擐甲荷戈冒犯霜雪亦已勞矣况疾病死亡者不可勝數恩恤不及後復有急何以使人願因今赦併示德意上嘉納故皇子赦於二者特詳天章閣待制知同州唐重充天章閣直學士知京兆府時長安謀帥初命張深范致虛皆不果遣會直祕閣劉岑自河東使還行在上問可守關東者岑薦重可用又薦朝請大夫提舉陜西常平公事鄭驤除直祕閣知同州兼沿河安撫使通判京兆府曽謂為陜西轉運判官驤玉山人謂公亮從孫也公亮晉江人嘉祐中宰相謂除陜漕日厯不見汪藻集有制詞今以岑所撰唐重墓志增入時軍興之後軍府壁立重乃告乏於成都府路轉運判官趙開藉其資修城池備供張且率長安父老子弟請上駐蹕漢中治兵關中驤亦疏言長安四塞天府之國項羽棄之髙祖李密棄之太宗成敗灼然願早為駐蹕之計壬申李綱請降見錢鈔三百萬緡賜兩河市軍需因遣臣齎夏藥遍賜兩河守臣將佐且命起京東夏稅絹於北京川綱河東衣絹於永興軍以待支俵於是人情翕然蠟書日至應募者甚衆是日頒軍制二十一條凡師行虜掠若違節制者死臨陳先奔者族敗軍者誅全隊一軍危急而他軍不救者刑主將餘如將法從事癸酉中大夫新知潼川府馮澥提舉成都府玉局觀乙亥同知樞密院事汪伯彥請兩河京東西增置射士縣五百人悉募士人有産籍者置武尉以掌之縣令領其事凡四縣置二將射士挽弓至二石五斗以上及教頭滿七年無過者皆補官江浙淮南諸路大縣增三百人小縣二百從之尋用知光州任詩言每半嵗令通判詣縣按閲十一月戊戌未幾復增於閩廣荆湖等路十一月辛亥增福建十二月乙酉增二廣二年五月庚戌增湖南北且令提刑按察二年八月癸亥應募者免其身丁二年十一月乙卯時諸路盜賊多故伯彥有此請二年五月庚戌可考初宗室敦武郎叔向在京城置救駕義兵所以募士至是其軍中統制官于渙詣南京告叔向謀為變命御營使司提舉一行事務劉光世捕誅之是日宗澤至東京自金兵退歸樓櫓盡廢諸道之師雜居寺觀盜賊縱橫人情恟懼金人留屯河上距京師無二百里金鼓之聲日夕相聞澤至京下令曰為盜者贓無輕重並從軍法由是盜賊屏息人情粗安一日有金使牛大監等八人以使偽楚為名直至京師澤曰此覘我也即白留守范訥械繫之且以聞於朝廷丁丑奉議郎張誾守監察御史戊寅同樞密院事汪伯彥進知院事時新除户部尚書張慤甫至行在首論人主當判忠邪忠邪判則治亂分上嘉納於是上批伯彥進知院事慤同知院事李綱言慤以曉財利勤幹稱為版曹乃其任也今除用太峻未副人望兼户部財利賴其措置乞稍緩之俟措置有緒用之未晚陛下用宰相臣不得而知至於執政臣當與聞敢以為請上乃寢慤除命伯彥知樞日厯於此日及七月壬寅兩書之拜罷録在六月蓋日厯多誤宣議郎傅雱特遷宣教郎充大金通問使初黃潛善等既奏遣太常少卿周望往河北軍前通問而河東獨未有人李綱為上言今日之事內修外攘使國勢日強則二聖不俟迎請而自歸不然雖冠蓋相望卑辭厚禮終恐無益今所遣使但當奉表兩宫致思慕之意可也時雱猶在行在綱召至都堂與語即奏用之雱稟使指潛善曰今通問之初敵情未可測軍前事冝難以預料朝廷任人不任事姑往可也上乃命綱草二帝表付雱以行因獻二帝衣各一襲且致書左副元帥宗維諭意仍遺宗維錦十匹玳瑁器三事雱遂與其副閣門宣贊舍人馬識逺偕行己卯詔三省樞密院置賞功司三省委左右司郎官密院委都承旨檢察以受功狀三日不行者必罰行賂乞取者依軍法許人告仍以御史一員領其事用右正言鄧肅請也三年六月甲寅罷宰臣李綱請以河北之地建為藩鎮朝廷量以兵力授之而於沿河沿淮沿江置帥府要郡次要郡以備控扼沿河帥府十一京東東路治青徐西路治鄆宋京西北路治許洛南路治襄鄧永興軍路治京兆河北東路治魏滄沿淮帥府二治揚廬日厯云淮西帥治夀春今從綱奏議沿江帥府六治荆南江寧府潭洪杭越州大率自川陜廣南外總分為十九路日厯載綱此疏沿河置京畿大名開德府橫海軍京東東西京西南北陜西凡九路與建炎進退志不同當考每路文臣為安撫使馬步軍都總管總一路兵政許便宜行事武臣副之要郡以文臣知州領兵馬鈐轄次要郡以文臣知州領兵馬都監許參軍事皆以武臣為之副如朝廷調發軍馬則安撫使措置辦集以授副總管若帥臣自行則漕臣一員隨軍一員留攝帥事憲臣文武各一員彈壓本路盜賊沿河帥府八軍要郡六軍次要郡三軍非要郡二軍沿淮帥府五軍要郡三軍次要郡二軍非要郡一軍沿江帥府五軍要郡三軍次要郡一軍非要郡半軍軍二千五百人自帥府外要郡三十九河北開德府棣博州京東襲慶府登萊密州西路濟南興仁府濮州京西河陽頴昌淮寧府蔡汝州南路唐鄧州永興軍路陜府虢華州淮東宿楚州淮西夀春府亳州江東宣江州江西虔袁州湖北德安府鼎鄂州湖南衡州浙西鎮江平江府湖常州浙東婺眀州次要郡三十八濱沂淄濰濟金均房同耀泗真海和舒蘄濠黃光饒信太平吉撫筠永道澧嶽復秀溫處台衢州永靜軍按注止三十六處恐有脫誤總為兵九十六萬七千五百人非要郡不預又别置水軍帥府兩將要郡一將中興聖政臣留正等曰昔太祖皇帝監唐末五代方鎮強王室弱之弊故削鎮兵以尊京師既太上皇帝親見靖康以來群盜充斥郡邑無備故屯兵諸郡且責提點刑獄以警備盜賊扶偏補弊各適其宜邇者主上復詔樞密院及郡國銓選官兵訓練禁衛武備既飭姦宄自消誠得太上皇之深意矣綱又請出度牒鹽鈔及募民出財使帥府常有三年之積要郡二年次要郡一年疏奏悉從之先遣御營司幹辦公事楊觀復往江淮造舟餘路委憲臣措置檢校少傅寧武軍節度使京城留守范訥落節鉞淄州居住右正言鄧肅論訥去年出師兩河望風先遁遂奔南京擁衆自護今在東京揭榜曰今日汴京邑為邉面且兩河之地陛下未嘗棄之民效死者幾於百萬日有捷報訥乃自呼邉面且率百姓而去訥家有房緡盡鬻之以市兼金而為去計遂使居民皇皇不能安席况訥嘗謂過客曰留守之説有四戰守降走而已今戰則無卒守則無糧不降則走矣此語大播群臣皆知不止於風傳而已漢得人傑乃守關中豈奔軍之將可與此乎疏入遂有是命熊克小厯云李綱素與訥不協故肅論之按訥為大將擁重兵不勤王髙宗嘗謂之庸人且言其不知兵非因其與綱不協而被論也克載訥罷在庚辰今從日厯從事郎秦梓充樞密院編修官梓檜兄也政和中傅墨卿使髙麗梓以傔從及還用梁師成薦徑赴御試遂除學官已而廢斥至是以檜故用之徽猷閣學士知淮寧府李彌大降二官時軍卒杜用叛於淮寧彌大視事未久城垂破上薄其罪乃削秩焉彌大彌遜兄也是日金右副元帥許王宗傑卒於燕山之涼澱先是左副元帥宗維自河東還雲中而宗傑自河北還燕山聞上即位睢陽張邦昌入覲遂會山後草地避暑議事會宗傑擊毬冒暑以水沃胸背得寒疾死後諡曰神武於是金主晟遣使諭宗維止南下之兵宗維不聽蓋宗維専權晟不能令至於命相亦取決焉晟守虛位而已此以張滙節要洪皓松漠記聞等書𠫭修趙子砥燕雲録云丁未七月二日太子往御寨離燕山七百里到涼澱病傷寒亡沒其尸載來燕山八月初歸本國與此不同未有他書可考證姑依滙所記附此幹里雅布諡號滙所記及他書皆無之按紹興講和録有金人割河南地詔云太宗皇帝順天心而申薄伐命神武之師直抵汴水請命哀鳴願割三府再伸前好以事考之太宗烏竒邁也神武斡里雅布也又二楊上逹蘭烏珠書有云徽宗圍汴都國相攻河東又云元帥在天會初已輔翼太宗徽宗滅遼宋奄有天下以事考之徽宗斡里雅布國相尼瑪哈也蓋斡里雅布旻嫡子故追諡云初上皇之至燕也淵聖尚留雲中宗傑聞上中興議歸上皇以講好宗維未之許此以張滙莭要修入傅雱通問録云雱懇館伴李侗祈請二帝事云二太子在時却曽有此商議候貴朝有懇請時欲發太上回歸今二太子不在亦無此假説話雱又問不知曽聞有今聖在外無侗曰緣知之所以商議欲發太上皇帝回鑾也二書所記蓋合今從之會其死事遂中輟庚辰詔以二聖未還郡縣官毋得用樂辛已詔沿大河置巡察六使自白馬濬滑抵滄州分地分以為斥堠宰臣李綱言國家禦戎皆在邉郡今金人乃擾吾心腹請命諸路州軍以漸修葺城池繕治器械朝廷量行應副乃命城池應修者降度牒與之又令淮浙荆湖六路以常平錢造衲衣二十萬及市竹槍箭簳弩樁輸行在綱嘗因從容及靖康間事上問靖康初能守京城金人再來遂不克守何也綱曰金人初來未知中國虛實雖渡河而尼瑪哈兵失期不至及再來則兩路並進初時勤王之師數日皆集再來圍城始召天下兵遂不及事初時金人寨于西北隅而行營司兵屯城外要地四方音問不絶再來朝廷自決水浸西北隅而東南無兵敵反據之故外兵不得進又淵聖初即位將士用命其後賞刑失當人稍解體又金人初來城中措置有序其後無任責者敵至造橋渡濠恬不加恤敵遂登城此前後所以異也壬午户部尚書張慤同知樞密院事時黃潛善力薦慤故上卒用之李綱言臣前願少緩慤除命非沮之正欲藉其力措置版曹事今陛下已用慤乞且以版曹事委之乃命慤兼提舉措置户部財用時新除給事中許景衡且至上欲用景衡為中丞而以侍御史王賔為諌議大夫綱奏曰陛下用景衡為中丞誠得人然故事中丞無外除者王賓遷則臺中無長官請俟景衡至而並命上許之徽猷閣待制提舉西京嵩山崇福宫王綯試給事中綯河南人嘗為上宫僚朝奉大夫袐閣修撰提舉亳州眀道宫邢煥再遷徽猷閣待制觀文殿大學士大名尹徐處仁薨癸未樞密院編修官張浚守尚書虞部員外郎將作監丞翁珽守考功員外郎珽彥國兄子也甲申詔尚書户部右曹所掌坊場免役等法及所轄庫務並併歸左曹以尚書總領太學生李廷彥特補迪功郎以在濟州言利害故也此據紹興四年八月三日廷彥乞差遣狀修入狀云六月二十六日補官故繫於此日於是太學録楊願以元帥府結局恩補修職郎太學進士陳汴補迪功郎此亦以楊願陳抃自陳狀修入抃狀云六月空日以兵馬大元帥府準備差使補官願狀無月日今因廷彥附見當並在此時也乙酉詔監司州縣職田並罷令提刑司具數申尚書省户部侍郎黃潛厚言南京左藏庫見在錢物不多乞應東南上供綱運令行在户部相度隨宜分撥南京或東京下卸從之日厯户部尚書黃潛厚奏云按潛厚今年八月方除尚書或者非此時所奏史必有一誤今姑附此俟考龍圖閣學士知開封府宗澤為延康殿學士開封尹東京留守澤遺事云八月壬戌兼副留守會范訥罷乃除留守按訥以六月己卯罷不應後四十餘日始為置副遺事恐誤但日厯既於此日書澤除留守而八月乙丑又書之疑是此日降旨八月乃出告耳日厯如此者甚衆今不盡辨也顯謨閣待制知滄州杜充為寶文閣直學士大名尹北京留守澤首抗疏請上還京繼聞有金陵之議復上疏曰今將士商旅與士大夫懷忠義者皆願陛下歸京師臣前在臨濮寨中實憂羣臣無逺識見恐贊陛下去金陵維揚又見京城有賊臣張邦昌僭竊與范瓊輩擅行威福所以乞暫駐蹕南都以察人心而觀天意臣料今臣僚中唱為異議不欲陛下歸京者不過如張邦昌等姦邪輩隂與敵人為地願陛下早降敕命歸謁宗廟垂拱九重毋一向聽邦昌輩與敵為地之語幸甚熊克小厯云宗澤為京城留守時郭仲荀統禁旅在京城黃潛善汪伯彥頗疑澤因就命仲荀副之此承林泉野記所書而不考其實也仲荀除副留守在眀年七月乙未蓋聞澤卒而後除之詳見本日并注閣門宣贊舍人劉錫知滄州錫武仲子也武仲成紀人故瀘川軍節度使降授朝奉郎提舉亳州眀道宫錢蓋復龍圗閣待制充陜西總制使右武大夫恩州觀察使主管西蕃部族趙懷恩特封隴右郡王初蓋在陜西嘗建議青唐無毫髮之得而所費不資求嘉勒氏後而立之必得其力至是用其䇿俾持告賜懷恩因召五路兵赴行在懷恩者吐蕃董戩從孫安化郡王懷德弟尼瑪丹津也議者以其為蕃部所推伏故封之日厯錢蓋復舊職為陜西經制使持告賜尼瑪丹津措置湟鄯事而不言益麻黨征所除何官熊克小厯因之但云仍賜姓名曰趙懷恩按紹興日厯五年四月二十九日趙懷恩繳到録白付身元係右武大夫恩州觀察使特封隴右郡王今掇取附入蓋懷恩崇寧初已賜姓名克實誤也克又云復蓋元官除總制使與日厯所書不同按蓋先降五官後用登極赦特旨敘復今所謂復舊職者蓋指待制也邵伯溫聞見録云靖康中錢蓋請棄湟鄯朝廷下其事于熙河帥臣而皆懲符祐棄地之禍無敢任其責者乃已及金人陷陜西六路兵入熙河即求湟鄯舊族以其地與之按蓋以靖康元年三月除陜西制置使其到官當在夏初而是年十一月蓋即將兵入援則其建此議必在夏秋之間特朝廷多事未暇行之耳此云無敢任其責者未知所據更俟考詳初京西北路提點刑獄公事許髙河北西路提點刑獄公事許亢總師防洛口望風奔潰坐奪官流瓊州吉陽軍髙亢自頴昌以五百騎趨江南至南康謀為變知軍事李定通判韓璹以便宜斬之及是以聞衆謂擅殺非是李綱言髙亢之棄其師朝廷不能正軍法而一軍壘守倅取誅之必健吏也使後日受命捍賊者知退走而郡縣之吏有敢誅之者其亦少知所戒乎是當賞乃各進一官髙亢祥符人璹億曽孫也億靈夀人景祐中參知政事日厯髙亢謫海外在此日中興會要亦同而欽宗實録靖康元年十一月丙子已書許髙許亢除名勒停送瓊州吉陽軍編管此必有一誤丙戍李綱留身上三議一曰募兵大略謂熙豐時內外禁旅合五十九萬人崇觀以來闕而不補者幾半今所存無幾何以捍敵為今之計莫若取財於東南募兵於西北河北之人為金人所擾未有所歸而關陜京東西流而為盜者不知其幾請乘其不能還業遣使招之合十萬人於要害州軍别營屯戍使之更畨入衛行在二曰買馬大略謂金人専以鐡騎取勝而吾以步軍敵之宜其潰散今行在之馬不滿五千可披帶者無幾權時之宜非括買不可請先下令非品官將校不許乘馬然後令州縣籍有馬者以三等價取之嚴隱寄之法重騷擾之禁則數萬之馬尚可得也又請命川陜茶馬司益市馬募商人結攬廣南之馬以給諸軍三曰募民出財償以官告度牒詔三省以次施行其募兵陜西河北各三萬人委經制招撫司京東西各二萬人委本路提刑司潰卒廂軍皆許改刺詔京東西河北東路永興軍江淮荆湖等路皆置帥府要郡初李綱欲因帥府以寓方鎮之法黃潛善等言帥府要郡雖可行但未可如方鎮割𨽻州郡仍命帥府要郡屯兵有差遇朝廷出師則要郡副鈐轄副都監皆以其軍從帥即措置兵馬就緒者當優賞之綱又言步不足以勝騎而騎不足以勝車請以車制頒於京東西路使製造而教習之因繪圖進呈其法用靖康間統制官張行中所創兩竿雙輪上載弓弩又設皮籬以捍矢石下設鐡裙以衛人足長兵禦人短兵禦馬傍施鐡索行則布以為陳止則聫以為營每車用卒二十有五人四人推竿以運車一人登車以發矢餘執軍器夾車之兩傍每軍二千五百人以五之一為輜重及衛兵餘當車八十乘即布方陳則四面各二十乘而輜重處其中諸將皆以為可用按此車制每四軍萬人為車三百二十乘止有射士三百二十人恐太少當考乃命兩路憲臣總領中大夫淮南轉運副使李傳正言近時潰卒聚為羣盜驚劫縣鎮望諸路無武臣提刑處權添一員専管捉殺從之傳正夀朋子也壽朋彭城人祖若容𠫭知政事父淑翰林學士丁亥責授鳳州團練副使張所借通直郎直龍圗閣充河北西路招撫使初上皇既北遷龍德宫器玩皆為都監帶御器械王球所竊球燕國長公主子也主英宗女適王師約至是內侍陳烈以其餘寶器來上皆遐方異物李綱諌上亟命碎之時綱每留身奏事多所規益內侍石如岡素凶悍吳敏內禪記云上皇厚蓄如岡以自衛當考淵聖斥之上嘗召如岡綱諌而止又論開封府封臂買童女及待遇諸將恩數冝均一上皆嘉納之此據李綱建炎進退志修入此必非一日事因陳烈附見日厯所載不如是之詳也石如岡諸書不見所領官職詔文臣許養馬一匹餘官吏士民之有馬者並赴官委守令籍為三等以常平封樁錢償其直馬髙四尺六寸為上等率直百千餘以是為差有田之家則折其稅僧道則以度牒取償限半月籍定有隱寄者以違制論每買及百匹則守倅令佐遷一官不及者等第推賞應諸軍團結以五人為伍伍有長五伍為甲甲有正四甲為隊五隊為部皆有二將五部為軍有正副統率據此以一千二百五十人為軍凡招軍量增例物其白身充募者全給潰兵降盜及他軍改刺者半之陜西六路仍聽支諸司錢及截川綱金銀如有良家子願備弓馬從軍者依敢勇法月給錢米應天下官吏寺觀民户願以私財助國者聽於所在送納等第推恩仍令當職官勸誘而憲臣總之然後計綱赴行在皆用李綱請也右諌議大夫宋齊愈入對論招軍買馬勸民出財助國非是時庶事草創就置三省於行宫門內尚書虞部員外郎張浚夜過齊愈於省中見其方執籌布算問之齊愈笑曰李丞相今上三議李公素有名譽其建眀乃爾浚問之故則曰胡可為也今西北之馬不可得獨江淮之南而馬不可用括民之財豈可藝極至於兵數若郡增二千則嵗責十萬緡以養今豈堪此齊愈將極論之浚曰不可齊愈愕然曰何也浚曰宰相不勝任論去之諌官職也豈有身為相未幾上三事而公盡力駮之彼獨不恚且怨齊愈不樂曰吾固為其有虛名第欲論此三事聊扶持之是日執政奏事退齊愈入對出過省門執浚手曰適上向者之章上甚喜浚挼手曰公受禍自此始矣此據張拭私記日厯六月癸未齊愈罷諫議大夫送御史臺根勘乃在李綱上三議之前恐誤戊子承務郎張緯上給田募兵法緯以為將來防秋之後應給田土並畫圖置籍每出戰步人一名給田百畝有馬人增其半鞍馬器甲自備量地肥瘠紐計第一等折土為準凡係官或天荒户絶逃田聽民從便自占其稅役科配等皆蠲之即逃田雖已給而田主自歸者聽佃人别占出戰人疾病事故許餘丁承佃緩急點集並將帶武勇家人投狀效用官為置籍一等支糧每五十人立一名為長五百人又立一名皆以有材武可部轄衆所推者為之各等第借補官資若所部技精及無逃亡者依格遷轉否則停廢别選州委通判為幹辦官選監司提舉出戰人赴點集後時或輒逃避並依軍法從之後不克行是月以迪功郎富直柔為祕書省正字直柔弼孫也此據祕書省題名顯謨閣學士知越州翟汝文奏陛下即位赦書祖宗上供悉有常數後為獻利之臣所增者當議裁損如浙東和預買絹嵗九十七萬六千匹而越乃二十萬五百匹以一路計之當十之三如杭嵗起之額蓋與越等杭去年已減一十二萬匹獨越尚如舊數矧經方冦焚劫户口凋耗蕭山一縣家業才一百七十緡則民力之困可知今乞將户三等已上減半四等以下權罷及身丁錢鹽舊皆有定制其後折米而已今悉為帛臣已只令納見直從之汝文丹陽人嘗為翰林學士金人命元帥府選南人文武八員與皇孫伴讀得前燕山府司録事張岩等並除尚書虞部郎中令赴御寨此據趙子砥燕雲録貢士周紫芝應詔上書言今金人盛強憑侮中國雖驅天下之兵以脅之不足以當其強竭天下之財以餌之不足以厭其欲盡天下甘言以恱之不足以回其意臣深思之不過一言曰上䇿莫如自治而已自治之䇿無他在力救前日之弊耳陛下意嘗思所以致今日之禍者乎用人不専黜陟不明剛斷不足此三者所以召禍亂之本也李綱危言讜論天下聳聞朝廷知其為賢既委以輔相豈當責以將帥之事遂致覆師以貽竄逐綱之用舍係一時之輕重願陛下盡以國計傾心付之勿惑於詆訾不根之言毋責以勝負不常之勢臣所望陛下専於用人以救前日之弊者此也六賊之惡暴著逺邇當時猶且遷延嵗月處以善地元惡有如蔡京猶得保其腰領而死其同惡之臣非特不能盡去方且倚以為用或付以兵柄或委以重鎮凡今日奔軍之將亡國之大夫皆前日姦佞闒䢇可誅而不誅可去而不去者如此人尚在要路則幾何而不至於喪師割地誤國欺君者哉臣願陛下大眀黜陟以正忠邪屏除畏懦軟弱之徒旌擢骨鯁難犯之士使天下曉然皆知忠義者必賞姦邪者必誅則忠臣爭效死節壯士勇於敢為庶幾可以雪耻臣所望陛下大眀黜陟以救前日之弊者此也淵聖皇帝虛以受諌常若不及惜其羣言交至一切聽納受之泛然無所甄别而人主之權遂歸臺諌敵圍初解議者欲追搗之既而惑於羣言不能斷以必往而割地之盟棄不復用明年敵騎果入而惑於衆議守城不遷至有今日之禍臣所望陛下勇於聽斷以救前日之弊者此也夫任用之専最為人主難事今既得賢而用之不能去姦邪則其勢必不兩立此三者在陛下勉之而已紫芝江東人也此書見於徐夢莘北盟會編今採其要語附入但夢莘係之建炎三年春末實甚誤矣書中乞専任李綱綱以今年五月初拜相故附此書於六月末或可移附今年八月並命二相時紫芝書中又云去年復春秋去年行詩賦去年削舒王配享之文今年復元豐釋奠之制皆元年事若係之三年春末則綱貶海外未許放還決非其時附上眀矣建炎以來繫年要録卷六
