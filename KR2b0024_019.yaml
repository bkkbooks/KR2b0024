body:
  text: 建炎以来繫年要録巻十九宋李心傳撰建炎三年嵗次己酉七金太宗晟天㑹年春正月庚辰朔上在揚州是日賊貴仲正引兵犯岳州京西北路兵馬鈐轄翟興訴翟進死事于朝乞遣重臣鎮守詔以興為河南尹京西北路安撫制置使兼京西北路招討使時叛将楊進據鳴臯山之北深溝髙壘儲蓄糧餉置乗輿法物儀仗頗有僣竊之意詐言遣兵入雲中府復奪淵聖皇帝及濟王南歸欲以揺動衆心然後舉事東京留守杜充遣使臣王漢詣伊陽縣見興使圖之且檄報進悖逆顯著責興破賊扵是興與其子琮率鄊社擾刼之戰無虛日矣甲申資政殿學士提舉杭州洞霄宫路允廸簽書樞宻院事太府卿程邁為起居郎邁歙縣人也乙酉宣教郎大金通問使劉誨䓁自河東還行在先是誨與其副朝奉郎王貺通問至金金人遣之併遣祈請使副宇文虛中楊可輔虛中辭曰虚中受命迎請二帝二帝未還虛中不可歸扵是留虛中而獨遣可輔紹興講和録烏珠第六書云宇文虛中祈請係是先朝特㫖更不遣還與此不同誨貺與可輔偕至行在上嘉其勞以誨為朝奉郎王眀清揮麈第三録云使還除知楚州亦誤誨知椘州在三年七月丁亥金人陷青州焚掠殆盡權知州魏某為所殺又陷濰州焚其城而去牛頭河土軍閻臯與小教頭張成率衆據濰州臯自為知州以成知昌樂縣紹興六年二月二日吏部状京東轉運副使兼知青州柴天因沒王事特與㤙澤二官未知天因以何時死事日厯去年十二月劉洪道奏状已繫權制置銜則其死盖在去年當考初山東盗劉忠號白氊笠引衆據懐仁縣御營平冦前將軍范瓊在京東遣其統制張仙等擊之忠偽乞降是日仙與將佐入忠壁撫諭忠留與飲伏兵撃殺之遂併其衆瓊怒屢與忠戰皆敗績忠自黥其額時號花面獸己丑奉安西京㑹聖宫祖宗御容于夀寜寺懐逺軍節度使檢校太保按宋史作檢校司空占城國王楊上麻疊按史作楊卜麻疊加檢校太傅大同軍節度使檢校司空真臘國王金裒賔深懐逺軍節度使檢校司空闍婆國王悉里地茶蘭固野並加檢校司徒皆用南郊恩也時占城以方物来獻因有是命初朝廷聞劉誨等得歸議更遣人使金乃召責授果州團練副使李鄴復其官與中書舍人周望分往河東北而以兵部員外郎宋彦通左武大夫貴州防禦使同管客省四方館閤門公事吴徳休副之是日上諭宰相黄潜善草二帥書且趣令進彂潜善曰國相元帥書自来只平文不用四六上曰卿早来所撰與大金皇帝通問書其詞語甚精確䏻冩朕欲言之意如此足矣不必須四六也既而金兵奄至遂輟行辛夘陕州都統制軍馬邵興及金人戰于潼關敗之乗勢攻虢州又下之陕州安撫使李彦仙即以興知虢州興起兵事見元年五月末甲午上元節有南僧被掠至涞流河者夜以長竿引燈毬表出之以為戯金主晟見之大駭曰得非星耶左右以實對時有南人謀變事泄而誅事見去年正月末故晟疑之曰是人欲嘯聚為亂尅日時以此為信耳命殺之自金人興兵後雖漸染華風然其國中之俗如故已而往来中國汴洛之士多至其都四時節序皆與中國侔矣此以洪皓松漠記聞參修皓云女真舊不知此月如燈夕皆外不曉按靖康二年上元節尼瑪哈斡里雅布已即京城張燈不應此時猶不曉但其國中猶未有是事故晟以為疑耳今畧刪潤令不失實乙未京城留守杜充襲其統制官張用于城南不克用湯隂人初見元年九月丁未用與曹成李宏馬友為義兄弟有衆數萬分為六軍成外黄人因殺人投拱聖指揮為兵有膂力善戰軍中服其勇友大名農家始以廵社結甲夾河守禦此據紹興元年五月辛亥友自陳功状用與王善皆受宗澤招安澤薨乃去及充為留守又受招安用屯于京城之南南御園善屯于京城之東劉家寺又有别將岳飛桑仲李寳皆屯于京城之西充以用軍最盛忌之乃有圖之之意前一日衆入城負糧詰旦充掩不備出兵攻用令城西諸軍皆發用覺之勒兵拒戰㑹善引兵来援官軍大敗李寳為所執金人既棄青州去軍校趙晟趙甡之遺史作趙勝今従曾孝序傳據其城㑹直顯謨閣新知青州劉洪道自濰州之官至千乗晟出不意遂出迎洪道謂晟但交割本州民事而已軍馬則公自統之晟喜迓之而入洪道入城掲榜百姓在軍中願歸者給據放還扵是晟之黨十去六七有崔邦弼者子弟所出身仕青州勤王不至而還懼不敢出洪道尋致之用為將官丙申殿中侍御史張守試起居郎兼權直學士院守撫諭京師還面奏金人必来願陛下早為之圖毋使宗廟生靈重遭塗炭上惻然遂有是命學士院題名守以起居舍人權直院今従日歴起居郎程邁充集英殿脩撰福建路轉運副使命江淮發運副使吕源往南京以来照管沿汴綱運源至泗上聞金人且至遂輟行此據紹興三年二月源乞改正状戊戍徽猷閣待制提舉杭州洞霄宫晁説之告老上曰是嘗著論非孟子者孟子發眀正道説之何人乃敢非之可進一官致仕説之尋卒御史中丞張澂以邉事未寜請詢于衆為禦敵之䇿吏部尚書吕頥浩言今敵騎漸逼京東若人心一揺則淮南望風而下望下哀痛之詔存拊兩路令官吏與民入山避兵庶免全郡俱為魚肉今百辟皆言强弱不敵臣願廟算先定隂為過江之備而大為拒敵之資申飭諸將訓習强弩以俟夾淮一戰此不易之䇿夫彼之所長者騎而我以步兵抗之故不宜扵平原曠野惟扼險用竒乃可掩擊又水戰之具在今宜講然防淮難防江易近雖扵鎮江之岸擺泊海船而上流諸郡自荆南抵儀真可渡䖏甚多豈可不豫為計望置使兩員一自鎮江至池陽一自池陽至荆南専提舉造船且詢水戰利害又駐蹕維揚當以一軍屯盱眙一軍屯夀春以備衝突户部尚書葉夢得言兵機事也不度時則每為難今視去冬又為難矣去冬金遊騎出入陜西河北未知總衆者何人今主兵乃尼瑪哈且親至濮及開徳矣向者開徳大名東平三大鎮鼎足而立今惟東平巋然獨存以當宋魏之衝而滄州孤絶在後又南京最重而敵騎已至椘邱且靖康之失在固守京城而不知避也事有緩急必當従權伏望陛下通下情逺斥堠如必至扵過江則亟降詔以諭中外則人心安矣臣又願飭諸要郡東則鄆徐南京西則廬夀和州南則唐襄荆渚各立軍數使之召募仍命大將與帥参治復選近臣為總帥以節制之又乗輿或至兩浙則鎮江金陵尤當先治陛下毋以宇文虛中奉使未回意和議為可恃也靖康正縁恃和議而堕敵計今安可待萬里之報哉起居郎兼權直學士院張守言金人自去冬已破澶濮徳魏而逰騎及于濟鄆雖遣范瓊韓世忠㑹戰而二將未可恃臣謂今日莫先扵逺斥堠昔三國時烽火一夕五千里而前日北京失守再浃始知今之為䇿有二一防淮二渡江若屯重兵扵椘泗及淮隂三䖏敵亦未䏻遽入然恐我師怯戰望風先潰及舟楫拘扵岸而敵亦䏻斬木繫栰以濟或以精騎間道先絶吾渡江之路此可患者一也我若渡江而宿重兵扵昇潤敵亦未䏻遽侵然去中原益逺而民心易揺動又行在兵多西人不樂南去或生意外之事維揚亦須留兵則扈衛勢弱此可患者二也惟其利害相形遂不䏻决若為中原計而幸敵不至則用防淮之䇿若為宗社計而出扵萬全則用過江之䇿然權其輕重勢當南渡而别擇重帥以鎮維揚則中原不患扵揺動眀諭諸軍以禍福則西人不患扵不樂昇潤亦擇重帥使當一面則兵分勢弱亦非所患眀詔大臣預區䖏以俟探報探報速聞則在我之計可得而用也時羣臣奉詔論邉事者黄潜善等請皆送御史臺抄節申尚書省庚子詔有警而見任官輙搬家者徒二年因而揺動人心者流二千里由是士大夫皆不敢輕動此據張澂劾黄潜善䓁䟽修入䟽云正月二十一日降㫖􅏤子二十一日也朱勝非閑居録云嵗前聞金人破鄆州黄相約諸政曰六宫先渡江侍従百官家屬亦聼従便惟吾曺骨肉不可動動即軍情不安勝非所記與澂劾䟽全不同日歴二月􅏤戌朔詔士庶従便往来官司不得妄有邀阻此時金已渡淮疑勝非所記非實今不取京東東路安撫使劉洪道以趙晟首亂青州賊心難制欲殺之乃好謂晟曰莱州不遭兵火户口富饒煩公為守如何晟曰諾洪道宻遣人告權知濰州閻臯權知昌樂縣張成使伏兵中途邀擊晟晟以其衆行至秬米寨不虞臯成之圖已也遂懈而不整遇伏發大敗晟死洪道以成知莱州洪道既殺晟遺民復還軍府浸盛統制濵州軍馬葛進以洪道得青州因己所致欲奪之乃與知濵州向大猷引兵至城下洪道見其𠂻甲遂闔扉不納而縋酒肉以犒師進怒攻北城據之洪道與軍民居南城以守進遣大猷入南城計事洪道囚之京城統制官張用王善既為杜充所疑乃引兵去犯淮寜府充遣統制馬臯追擊之用善併兵擊臯官軍大敗尸填蔡河人馬皆踐尸而渡追至鐵爐歩而還官軍存者無㡬用以一騾送李寳歸京師扵是善整兵欲攻淮寜用不可曰吾徒所以来為乏糧耳安可攻國家之郡縣善曰天下大亂乃貴賤貧富更變之時豈止扵求糧而已况京城已出兵来擊我事豈無名乎用曰汝攻陳州我當往蔡州然兄弟之義文字勿絶乃命諸軍束􅏻翌旦善鳴鼓進雲梯天橋逼城下守臣馮長寜命溶金汁灌之焚其天槗用勸善勿攻善曰安有小不利而遂止當竢鴉頭變白乃捨此城耳用引其軍去善圍淮寜乆之東京留守杜充遣都統制陳淬来援善乃退時知潁昌府直寳文閣郭允廸已降金有舉人陳味道者與知蔡州程昌㝢善金遣味道以旗榜招之昌㝢既見味道使人探其橐中得金檄文昌㝢大驚聚官屬執味道釘之磔于市丙午詔保義郎田宗義追所授官宗義者宣和間以後苑作應奉得官至是差監法酒庫門吏部審量當追奪上曰討論人甚多若宗義免追則何以行法宗義善造頭巾朕當以賤役使之豈可與官輔臣皆曰善是日金左副元帥宗維陷徐州守臣龍圖閣待制王復死之據復家乞恩澤状云正月二十七日初宗維自襲慶引兵欲趨行在遂圍徐州復率軍民力戰外援不至城陷復堅坐㕔事不去謂宗維曰死守者我也監郡而次無預焉願殺我而捨僚吏與百姓宗維猶欲降之復大罵求死由是闔門百口皆遇害城始破武衛都虞候趙立巷戰奪門以出為金兵所擊以為已死夜半得㣲雨漸活乃殺守者潜入城求復尸埋之遂隂結鄉兵為興復計宗維既去軍民請舉人鄭某權知州事立張益村人也事聞贈復資政殿學士謚荘節御營平冦左將軍韓世忠軍潰于沭陽初世忠在淮陽將㑹山東諸冦以拒金㑹左副元帥宗維兵至滕縣聞世忠扼淮陽恐稽師期乃分東南道都統領兵萬人趨揚州以議事為名使上不得出而宗維以大軍迎世忠世忠不䏻當夜引歸軍無紀律未曉至宿遷縣不虞金人之踵其後也質眀覺之奔于沭陽世忠在沭陽夜不安寢與其帳下謀夜棄軍乗潮走鹽城縣翌日諸軍方覺遂潰去其將閤門宣賛舍人張遇死扵漣水軍之張渠村熊克小歴二年五月金人渡河辛夘詔韓世忠領兵迎敵世忠至京西為金所敗其將張遇死焉按去年五月世忠與遇偕至京西今春遇至京東乃死克誤也後軍管隊官李彦先率本隊四十七人得二舟入海聚衆自此輔逵聚衆扵漣水李在據髙郵皆世忠之兵也其餘收散卒自為徒黨者不可勝計宗維入淮陽軍執守臣奉直大夫李寛而去此據趙甡之遺史但甡之所書無郡守姓名今以紹興二年九月二十八日李寛家自陳状修入状云陷陣身亡與遺史不同以無他書可考姑従遺史京東轉運副使朝請大夫李祓案祓字宋史作跋従軍在淮陽為所殺後贈中散大夫官其家二人寛遵朂孫祓清臣子也吕中大事記曰金之至兩淮也不惟楚州之朱琳秦州之曽班泗州之吕元閻瑾天長軍之成喜髙郵軍之齊志行滄州之劉錫孔徳基或降或走而韓世忠之軍亦潰矣豈獨兩淮素無兵備㢤亦習見兩河官吏被禍而無益故寜畏金而不畏義也己酉金人侵泗州先是禮部尚書王綯聞敵騎且南侵率従官數人同對上命至都堂議黄潜善汪伯彦笑曰諸公所言三尺童子皆䏻及之時金人自滕縣以五千騎趨臨淮皆金装鐵騎白氊笠子把隘官永州防禦使閻瑾屯泗州遣人伺其實或曰劉忠犯臨淮或曰李成餘黨也瑾以兵迎之獲逰騎數人乃知為金人至江淮發運副使吕源聞之遣人收淮北舟船數百泊南岸命使臣張謹焚浮橋且貽輔臣書乞為宗社大計速圖所以上安聖躬者吕源事並以源紹興三年二月乞改正状修入兵至泗州近境瑾引軍南走昭信尉孫榮將射士百餘人拒敵是日也塵氛蔽日敵初不測其多寡遂相拒踰半日榮鬭死金人乃扵泗州之上數十里間計置渡淮是夕泗州奏金人且至上大驚軍中倉皇以内帑所有通夕搬挈建炎以來繫年要録巻十九
