body:
  text: 建炎以來繫年要録卷八十四宋李心傳撰紹興五年嵗次乙卯齊金熙宗亶天會十三年偽劉豫阜昌六年春正月乙巳朔日有食之上在平江是日金人去濠州初金右都監宗弼與偽齊之兵既退乃遣人報偽知濠州趙榮榮率北軍及投拜官兵馬都監魏進偕去出北門市人尚未知少頃提轄官丁懷等四人盜庫兵欲作亂榮聞之而悔曰吾棄城而來無守臣以主州事安得不亂乃以衙兵復入城懷遁去執其餘三人誅之以録事參軍楊夀亨權知州事既而州人不便夀亨之政奪其印請兵馬都監孫奕代之榮既歸自是金人在江北者盡去矣丙午詔户部出錢四十萬緡付江西漕臣增市軍儲丁未知樞密院事張浚奏金人潛師遁去今已絶淮而北見行措置招集淮南官吏還任撫存歸業人户等事上曰劉豫父子強誘金人擁衆南侵窺伺江浙其志不淺今乃一夕遁去其所亡失多矣然敵馬方卻而浚已能為朕措置如此可謂孜孜奉國知無不為也大臣和於內將相和於外故舉措得宜而敵人知畏此其所以遁去也沈與求曰臣聞諜者言劉豫誘金人以我諸大將有不和者故擁衆南來直欲渡江今陛下下詔親征而中外協心共濟國事則敵之初謀盡伐矣宜其遁去也師克在和誠見如此侍御史張致逺言敵騎已退緣淮南之人多為敵所拘兼於山間水面結集保守又有中原被簽軍民意欲投歸尚留敵寨及時暫逃避在村野者不速行措置深慮官軍以襲畨偽民社以收復州縣為名肆行剽掠妄有殺戮或執俘級僥幸賞典使吾民被害重于冦盜乞預降德音并戒飭黃榜以付張浚詔以章示浚如所請詔諸路州縣係官田舍委守令取見元數比倣鄰近田畝所收租課及屋宇價直量度適中錢數出榜召人實封投狀承買拘催價錢起發日歷無此今以四月二日總制司狀修入戊申中書舍人兼史館修撰王居正兼權直學士院資政殿學士知福州張守充資政殿大學士顯謨閣直學士知泉州連南夫進職一等守奉詔變易度牒得錢百餘萬緡會有旨調海舟百艘守因請以其舟載錢三四十萬應副朝廷使用南夫亦盡起本郡經制常平錢物赴平江中書門下省奏二人供億調度曽不愆期詔以憂國愛君宜加褒寵故有是命右朝請大夫知泰州趙康直直祕閣樞密院言敵犯淮甸廬州禦敵有功泰州措置得宜淮西帥仇悆已除待制乃命廬州守禦官屬各進一官己酉宰相趙鼎奏敵騎遁歸皆自陛下聖畫素定然善後之計當出羣䇿願詔前宰執各條具所見來上斷自聖意擇而用之上曰朝廷能採衆論則慮無不盡雖芻蕘之言儻有可采猶當用之況前宰執嘗在朕左右必知朝廷事沈與求曰國有大議就問老臣乃祖宗故事於是賜吕頥浩朱勝非李綱范宗尹汪伯彥秦檜張守王綯葉夢得李邴盧益王孝迪宇文粹中韓肖胄張澄徐俯路允迪富直柔翟汝文等詔書訪以攻戰之利備禦之宜措置之方綏懷之略令悉條上焉詔淮南州縣官吏擅離職任之人特與放罪令依舊還任其拋棄官物並與除破左朝散郎何洋通判池州時滁州初經殘破民未復業乃以洋知滁州洋撫循居民興建學校民賴以安張浚赴行在奏事命江東安撫使吕祉留行府收接江北文字是日承州馳潭水寨首領仲諒引兵入楚州庚戌侍御史張致逺乞省并淮南官吏沈與求曰官省則吏省吏省則事省事既省百姓自然安矣今州縣胥吏未嘗賦祿皆蠶食百姓而已淮南凋殘之後遺民無幾豈堪其擾也趙鼎曰祖宗差役本是良法所差既是等第人户必自愛惜豈肯擾民王安石但見差衙一事州縣奉行失當變祖宗舊法民始不勝其擾上曰安石行法大抵學商鞅耳自安石變法天下紛然但差役之法行之既久不可驟變耳詔百司從便官吏限三日赴臨安府供職是日淮西宣撫司統領官王進薄金人於淮降其將程師回張延夀而還初金人自六合北歸命師回延夀殿後二人皆驍將也淮西宣撫使張俊謂進曰敵既無留心必徑渡淮而去可速進兵及其未濟擊之進與統領官楊忠憫偕往敵且渡遂薄諸河敵衆悉潰墮淮而死師回延夀勢窘而降初師回以俊為浚既降乃悟曰吾以為張樞密乃關西也熊克小歷載此事以為張宗顔追及之趙甡之遺史止稱王進一人今從光世捷奏增入日歷正月十二日丙辰劉光世等申敵馬于正月一日渡淮盡絶與此捷奏不同當考辛亥上謂輔臣曰恢復之圖所宜愛日講究要須先求人才則天下之事無患不舉然用人才在於進君子去小人趙鼎曰臣待罪宰相為陛下分别君子小人而用舍之乃其職也敢不奉詔沈與求曰雖堯舜之世不能使天下無小人要在處之得宜而已書曰君子在位小人在野此所謂得宜也遣內侍趣張浚還行在中書門下省檢正諸房公事晏敦復言逮事曽祖母張氏乞以眀堂封妻恩回授曽祖母加封從之詔省試展用今年六月鎖院以行在百司不備故也淮東宣撫司統制官崔德眀敗敵于盱眙壬子詔募僧人收瘞淮南客死者每百人以度牒一道給之集英殿修撰新知太平州劉岑改充右文殿修撰尋奉祠以侍御史張致逺論其得罪名教也中衛大夫揚州觀察使淮西宣撫司摧鋒軍統制趙秉淵貶秩五等統領官武功郎楊貴除名勒停以宣撫使劉光世劾其縱掠和州水寨也言者復奏二人之罪且謂陛下親總六師凡渡江擊敵無問擒斬之多寡皆旌賚有加惟恐踰時二人之罪無所逃死尚稽誅棄是謂有賞無刑不惟朝廷負姑息之名光世自此亦何以令其下望令光世押送二人付之廷尉速正典刑乃詔貴處州編管秉淵更降二官此月庚申再行遣癸丑左迪功郎樞密行府書寫機密文字張松兊為左承奉郎松兊浚從子上召對而命之拱衛大夫利州觀察使兼閣門宣贊舍人淮東宣撫司遊奕軍同統制張榮丁母憂詔起復甲寅詔諸路提刑司驅磨所屬州縣去年收支茶鹽錢數如有違法支使責官吏陪還拘收赴𣙜貨務仍命户部以驅磨最多處申朝廷推賞稍有隱庇滅裂亦許按劾用言者請也乙卯張浚自江上還入見詔沿江諸路監司帥臣李謨等十人各進官一等以樞密院言應辦大軍宣力故也其諸司屬官諸州通判州縣當職官實有勞效者令逐司保奏等第推恩日歷無此今以二月二日江東安撫司奏狀所云修入丙辰上謂趙鼎曰大臣朕之股肱臺諌朕之耳目職任不同而事體均一或有官非其人所當罷黜者卿等宜亟以告朕不必専待臺諌中興聖政臣留正等曰昔王魏善諌而房杜成其直宰相與臺諫固同一體無二致也譬之一家其保家之子既為之區處衆事訓飭長幼而其呵護非常攘郤外禦者則責之強勇子弟期至于家之寧輯而已初豈較其功之厚薄多寡哉今夫進賢退不肖者宰相之職謹之于進退之初則敗事隳功者必少雖臺諫無所論列可也惟其孔跖雜售梟鸞不分是以臺臣不無排擊之紛紛而是非交攻至于上動睿聼也其弊蓋在宰相任恩而不任怨耳太上皇帝先責于宰相宜矣臣愚以為聖祖書成非獨可為子孫方來之法凡為宰相者亦當敬書諸紳奉行周旋丁巳詔江北敵馬已退應行在及從便職事官各條具利害聞奏武功大夫閣門宣贊舍人冦宏依舊知濠州宏棄城至平江府匿民巷不敢出邏者以聞上召見問以淮南事宏戰灼不能對乃命帶舊職𨽻劉光世軍事定别聼旨至是光世請遣之尋又詔濠州官吏軍民自宏出城之後權時從偽非其本心今既復歸其日前罪犯一切不問後詔在是月壬申趙甡之遺史云朝廷以孫奕不當代楊夀亨黜監徽州酒務日歷正月壬申勘會楊夀亨孫奕保全城壁忠義可嘉與此不同當考詔𣙜貨務每日入納錢以其半支給見錢關子用權户部尚書章誼請也事祖見去年十二月丙申時州縣以關子抑配民間充糴本𣙜貨務又止以日納錢三分之一償之阻滯者多人皆嗟怨故誼以為請此以張絢所奏增入戊午輔臣進呈曲赦淮南事目上曰敵雖退遁然南北之民皆吾赤子當示兼愛并容之意中原未復二聖未還赦文不可夸大第使實惠加於兩淮百姓乃朕指也上又曰敵已退遁須當漸圖恢復若止循故轍為退避之計何以立國祖宗德澤在天下二百年民心不忘當乘此時大作規模措置朕亦安能鬱鬱久居此乎趙鼎曰時不可失誠如聖諭事所可為者謹當以次條畫奏稟何俌龜鑑聖眀天子立志英明每念復讐未嘗不有比死一洗之意考之國史聖心可見初年與輔臣論恢復之由首論周宣復古之詩次論漢光武尋邑昆陽之勝又其次論唐肅宗興復王室之盛可謂志于恢復矣又嘗語宰執曰今當漸圖恢復乘時大作規模朕安能鬱鬱久居此又謂宰執曰今已六月下旬便可講防秋事朕當親率諸軍分頭迎敵若依前逺避何以立國不曰修車馬􅊀器械內修外攘之事更須講求則曰訓卒繕甲極力措置今冬敵來似有可勝之理書車攻詩羊祜傳造盾琴樣以示武備作金銀碗以旌射士教習舟師修復馬政措置屯田精擇間諜其志蓋未嘗不在巨鹿也詔户部支金一千兩付樞密院激賞庫充激犒使用朱勝非秀水間居録紹興四年趙鼎以元樞為川陜荆襄都督須錢七百萬緡有旨半與之兩浙運司臨安府又取二十萬緡行有日矣會鼎拜相使事即罷不復差官鼎為姦利效尤京黼因淮上用兵遂以三百萬緡入三省激賞庫自是得事進獻因以侵漁內結諸宦外交諸將養交持祿首尾五年御史謝祖信論鼎過惡數章內一事云盜官錢八十七萬緡蓋此錢也按日歷今年二月二十一日乙未左僕射趙鼎等奏蒙恩除都督諸路軍馬有合奏請事一川陜荆襄都督府事務在府官吏兵將官物等合併歸本府有旨依奏據此與勝非所云差不同當是浚罷都督鼎再相而始併督府錢物入激賞庫耳今附此更須參考命江東帥漕司繕治建康行宫修築城壁須管日近了畢其省部百司倉庫等具圖來上務從簡省毋得取給於民時上將還臨安故有是旨詔行宫留守司放行常程事務既而都省請就用留守司印應合行事並依本省自來體例諸路申奏并合受理詞狀應得條法即一面行遣如法所不載合取得旨事即申奏行在應給降黃牒敕榜內宰執幫銜孟庾書押從之都省奏在是月乙丑是日右從事郎知嘉州龍遊縣李孜將家往興化寺觀燈觀者填壅寺門石梯髙峻孜命從者抶之士女墜磴陷胸裂腸而死者百餘人修職郎劉庠將仕郎邵降年皆死孜坐送獄抵罪五月二十三日丙申宣撫司奏其事得旨令趣具案不知後來如何行遣己未德音降淮南諸州雜犯死罪囚釋流以下應投降女真漢兒除已等第補官外仰諸軍並行存恤應招捉到京東西陜西河東等路簽軍許令從便應見任官退避在山水寨保聚百姓之人令宣撫司開具推恩應山水寨團結人民並放兌稅役十年其不係團結而嘗經敵馬蹂踐去處與放五年應因陷敵操行不屈忠義顯著衆所共知之人令逐州長二保實聞奏庚申行宫留守孟庾言别無職事乞先次結局詔留守司依舊其官屬並罷詔諸州禁卒日教射藝守臣旬按仍令憲臣躬親按賞以備朝廷抽取拍試土兵射士亦令教習嵗終比較粗精以聞用樞密院奏也辛酉敕令所刪定官謝祖信試監察御史詔故殿中侍御史馬伸頃因言事死於貶所忠直之操念之䀌然可特贈左諌議大夫依所賜官與合得致仕遺表恩澤令諸路州軍尋訪家屬以聞伸既以斥死會趙鼎入相上記其忠乃有是命制曰朕觀自古姦臣惡人議已必罪言者以肆志而作威至於身不免而國家受其禍此古今之大患也伸操守剛正論議凛然方朕纂服之初置相不善爾任御史力疏其姦乃見貶於強敵方張必不可守之地爾之沒也可謂重不幸亦豈獨彼姦之罪也哉念之盡然悔不可追諌議大夫之秩時所貴重姑假此名旌爾忠直庶幾少慰乎泉下尚其不昧體兹至意壬戍張浚奏臣頃者出使川陜橫遭誣謗蒙陛下特降宸翰辨眀之使臣一旦昭雪死無所畏上曰朕方屬卿中原之事不可輒以曩日誣謗過自畏縮况毁譽之來當考其實齊桓公所以封即墨大夫烹阿大夫毁譽不公自古所患孔子曰如有所譽者其有所試矣况于毁乎浚曰陛下于毁譽之際曲留聖意如此羣臣之幸上曰使其人誠非才則言者不可謂之毁也在於考其實而已武成感德軍節度使開府儀同三司充鎮江建康府淮南東路宣撫使韓世忠為少保充淮南東路宣撫使鎮江府置司時世忠與劉光世張俊相繼入覲世忠奏敵騎遁去陛下必喜上曰此不足喜若復中原還二聖乃可喜耳然有一事以卿等將士賈勇爭先非復昔時懼敵之比所喜蓋在此也後數日上以諭輔臣趙鼎等贊上誠得馭將之道上曰楚用子玉晉文公為之側席而坐今敵騎雖退然尼瑪哈等猶在朕敢忘此憂乎上語在是月丙寅氣中興聖政臣留正等曰漢髙祖收天下豪傑頥指使如驅羣羊權略固髙逺矣韓信假王不因躡足以止其怒幾敗乃事大抵以數術馭者其技有時而窮也太上皇帝駕馭諸將出于誠信雖辭色聞暇無不披靡震驚不敢桀黠者專以君臣折服其心故也劉光世不欲受杜充節制上怒曰豈容跋扈如此遣使諭旨即奉詔過江復以銀合茶藥賜之張俊入對論及劉光世解罷軍政有登仙之歎上曰卿初見朕時何官曰修武郎上曰是時家資何如曰貧甚嘗從陛下求袍以禦寒上曰今貴極富溢何所自耶曰皆陛下所賜上曰卿既如此宜思自效而有羡于劉光世何耶俊惶恐流涕誓以死報恩嗚呼神機妙略動與事會與夫遊雲夢以縳信踞床洗以召布孰為得體乎權尚書工部侍郎蘇遲充徽猷閣待制提舉江州太平觀遲引年告老故有是命左宣教郎喻樗為祕書省正字熊克小歷趙鼎深喜程頥之學朝士翕然嚮之時有言今託伊川門人者却皆進用如喻樗真其人也乃不見知是月鼎始薦樗改官除正字按樗改官在去年九月壬申又先已從辟為江西大制司及都督府屬官不應云乃不見知今不取詔諸路常平司拘收耆户長雇錢計綱赴行在有擅用者依上供錢法初議者請并典吏雇錢不復支給户部言恐無以責其亷謹乃不行癸亥參知政事行宫留守孟庾上表請車駕還臨安府駐蹕許之起復檢校太傅寧武寧國軍節度使開府儀同三司充江南東路淮南西路宣撫使劉光世為少保充淮南西路宣撫使置司太平州太尉定江昭慶軍節度使兩浙西路江南東路宣撫使神武右軍都統制張俊開府儀同三司江南東路宣撫使置司建康府俊仍落都統制詔韓世忠劉光世張俊各賜銀帛三千匹兩異姓親補承信郎者二人一子五品服有服親封孺人者三人冠帔五道右奉議郎張九成為太常博士趙鼎薦之也命尚書倉部員外郎章傑檢察福建廣南東西路經費財用公事尚書省因奏委傑起發兩路茶鹽錢赴行在其擅用者皆責償之此月甲子降旨賜故保義郎楚州鹽城縣海道水軍將領朱欒妹銀五十兩欒追擊敵軍傷重挾一敵人赴淮死欒無妻子知縣事劉舜士言於朝故賜之甲子淮西宣撫司統制官酈瓊拔光州執偽知州武翼郎許約金人之犯淮也光世遣瓊自廬州統兵聲言過淮至芍陂乃摘輕兵由間道徑趨光州城下約乘城固守劉麟亦遣其統領官李知柔以衆援之瓊説約降不從即進兵急攻城欲破約勢窮乃降遂復光州後六日奏至既而光世以約赴行在上謂大臣曰約為劉豫結連楊么及劫張昻山寨凶逆宜誅今來歸朕不欲失信當貸之乃遷約一官監南劒州鹽稅熊克小歷載此事以甲子為奏至之日誤也日歷正月二十六日庚午劉光世奏正月二十日晚收復光州甲子二十日蓋克誤以收復之日為奏至之日爾克又云瓊統兵過淮由間道徑趨光州亦誤據光世所云乃是聲言過淮若已渡淮而北乃復還攻光州則太迂逺矣約二月辛酉轉官乙丑罷淮南茶鹽提刑司置提點兩路公事官一員兼領刑獄茶鹽漕運市易等事應合行事如發運使例以直祕閣江南西路轉運副使張澄提點淮南東西兩路公事填創置闕仍命赴都堂稟議訖之任尋以澄應副嶽飛軍儲之勞進職一等澄除職在二月丙子詔户部進銀萬五千兩赴內東門司為教閲三宣撫司官兵之費直顯謨閣曽紆升職一等尚書户部員外郎沈昭逺再進一官嶽飛之復襄鄧也二人以餽餉愆期貶秩上手詔二人若應辦足備飛成功當不次除擢如依前違慢有誤軍期邦有常刑朕不汝赦二人惶恐受命暨飛奏功乃復其秩又例進一官中書門下省言賞未酬勞故有是命太府少卿馬承家尚書吏部員外郎魏良臣罷時言者論警奏初聞承家隂懷茍免而良臣自知應對失詞乃張大敵勢恐動朝聼謂敵有長平四十萬之衆勸朝廷有擇禍莫若輕之説奮臂宣言無復忌憚非陛下眀斷不懼不疑則墮賊計中為害不細由是二人並罷既而侍御史張致逺又論良臣與其副王繪所得恩數忝冒太甚乃詔各豫二資恩澤其非實過軍前人皆裁削之是月丙寅己巳兩次降旨裁削今聫書之顯謨閣待制提舉臨安府洞霄宫曽開知廣州開坐纍久廢至是起用之詔江浙諸郡守臣銓量沿海沿江巡尉老病疲懦之人擇見任官材武者兩易仍令吏部今後審量差注丙寅詔淮南諸州荒間田段並令宣撫司經畫耕種相兼應副軍中支用仍置圖册立界分將來人户歸業驗實給還左宣教郎閭邱昕充御史臺主簿用侍御史張致逺薦也昕已見三年四月詔通太平江池州守二各減磨勘三年以樞密院言通州措置料角及存恤亭户太平等州應辦大軍理冝量行推恩故也既而侍御史張致逺言通州自聞警報守臣蔣璨未嘗輕動又應副王進李貴二軍宣力居多今例減磨勘一年恐無以示勸乃進璨一官為右朝奉大夫璨正月癸酉轉官丁卯金國安州團練使知遼州程師回特補武功大夫忠州團練使金國解州刺史張延夀特補武翼大夫貴州刺史仍並充神武中軍正將二人除將官在是月己巳戊辰上謂大臣曰劉光世韓世忠張俊相繼入覲朕嘉其却敵之功錫賚甚厚朕服御物有可豫者亦以豫之皆拜賜涕泣願身先士卒圖復中原以報趙鼎曰此社稷之幸也詔承州權廢兩縣和廬濠黃滁楚州各廢一縣逐縣各置監鎮官一員以民事簡少省其繇費也樞密院奏陜西官吏軍民昨緣金人逼脅遂陷偽邦蓋非得已詔川陜宣撫司務以恩信招來仍出榜曉諭此奏當是張浚再入樞府恐諸叛將反側不敢歸故有是請也詔沿江諸軍疾病者令所在州賜錢人一千扈衛及殿前司神武中軍令户部支給右朝散郎知滁州何洋言本州纍經殘破乞將上供及應合進貢之物並蠲免二年從之詔權立諸路水陸綱運綱官酬賞格凡金綱八萬緡或銀五萬緡他物直二萬緡以上計程三千里無違欠者遷一官以下九分至一分其酬賞每分皆為九等此據慶元隨勑申眀後詔自行在部軍需至外路者其酬賞皆比附而差損焉後詔在三月戊子己巳罷試教官法其諸州學官並從朝廷選差自元豐間始立是法及是言者以謂欲為人師而先納所業求有司以幸中程度又校計格法以爭得之甚非建學校立學官之本意故罷庚午都督府前軍統制王進為福建路兵馬都監時賊周十隆為神武右軍將官趙祥所破遂犯汀循梅潮等州朝廷恐其滋蔓閩廣故命進帥所部會江西廣東諸將合擊之仍權聼福建帥臣節制海賊朱聰以舟師自潮州入廣東焚掠諸縣壬申劉光世韓世忠張俊入辭尚書右僕射趙鼎知樞密院事張浚參知政事沈與求簽書樞密院事胡松年侍上命光世等升殿諭曰敵人南侵諸名將皆在其中蓋有侵噬江浙之意賴卿等戮力捍敵卒伐姦謀使其失利而去朕甚嘉之然中原未復二聖未還朕心慊然卿等其勉之光世曰臣等蒙國厚恩敢不效死鼎曰臣聞降人程師回言逆臣劉豫紿金人云光世世忠比失歡及至淮甸異所聞其氣已沮矣上曰有告朕光世世忠坐少嫌意不釋然者烈士當以義氣相許先國家之急而後私讐小嫌何足校昔冦恂戮賈復部將復以為恥深銜之光武曰天下未定兩虎安得私鬬今日朕分之於是並坐極歡共車同出結友而去光世世忠縱有睚眥今日朕為分之宜釋前憾結歡如初光世世忠感泣再拜曰臣等頃過聼嘗有違言至於國事不敢分彼此今已相好無他矣乃煩君父訓飭丁寧臣等皇懼無所容敢不奉詔鼎等頓首賀上曰將帥和社稷之福也上命近侍出內金盤尊斚賜光世世忠俊酒一行光世等飲之釂并所飲器賜之陛辭而退與求曰將帥國之爪牙推轂授師則聞之矣天子御正衙賜之巵酒而親勸之未之前聞其禮甚重臣聞英宗皇帝待遇司馬光嘗有是賜其後淵聖皇帝用李綱實踵行之光世等乃蒙恩寵如此必有以圖報詔光世妻漢國夫人向氏俊妻華原郡夫人魏氏並特給內中俸如世忠妻例自建帥府以來俊常以其軍從上行至是始軍於外在上左右者獨楊沂中而已中興聖政太祖皇帝命曹彬平江南潘美輔之奏事殿中以劍賜彬曰副將以下有犯卿當斬之美悚栗而退創業之初命令嚴肅不少假借而太上皇帝乃以光武故事解兩虎私鬬使耳餘渾濬之徒忿忮自息不失為亷藺郭李之賢與太祖威令事異而意同馭將之法當如此何俌龜鑑曰以結友之事諭世忠而世忠即負荆以謝光世以滅怨之説勉光世而光世先致意以約張韓此得協和之道也癸酉尚書户部員外郎沈昭逺試太府少卿右朝請郎川陜荆襄都督府詳議官王純為吏部員外郎左朝請郎董弅為度支員外郎左朝奉大夫直徽猷閣郭執中行兵部員外郎執中元符末以上書故入邪黨籍張浚在川陜以執中知嘉州至是召用之是日偽齊知亳州馬秦引兵犯光州承信郎權主管州事王莘率衆拒敵淮西宣撫使劉光世遣統制官酈瓊靳賽以所部援之時劉麟既北歸西北大恐麟乃率其偽官屬上言中原制江表其為形勢與強弱逆順之理何啻得百二之利也故自古王者興起必以河朔山東之地然後為帝王之真若乃崛起及遁居吳越之會計其強者能自保一隅遇有不振則中原之兵已進而墟其國者一舉也故史册所載如吳為晉所滅陳為隋所滅蕭銑為唐所滅周世宗翦伐淮南諸州至宋之初以次就平是也乞下合屬去處曉示豫以其言榜於偽境中書門下省檢正諸房公事兼權給事中晏敦復言比者陛下親總六師遂訖却敵之功則天意固助順矣乃今嵗正月朔日有食之漢䇿宣帝有言曰今日蝕於三始誠可畏懼小民正月朔日尚恐毁濫器物何况于日虧乎是則正旦之食災異尤甚然以今日之事言之臣知天之仁愛人君欲扶持而安全之也天意若曰敵兵逺遁行朝粗安正宜警戒之時陛下遇災而懼側身修行固無所不至矣臣願益加聖心日慎一日雖休勿休凡可以仰答天戒俯慰民情者必力行之違于天咈於民者必力去之期於保固洪圖紹隆丕緒以為萬世無疆之福時淮西宣撫使劉光世乞以所置淮東田于淮西對換上許之敦復言淮西纍經兵火正要安集存撫稍有騷擾則百姓不得奠居依前不得成藩籬矣光世為一路大帥未聞為朝廷措置毫髮利便事先乞換易私土似為未便且淮西州縣皆光世所部摽撥田土光世必遣人揀擇州縣必惟命是從豈復更問是空間不是空間也光世先在淮東置田之時其所遣幹當使臣等惟擇利便膏腴者取之致民間多失舊業此衆所共知不審光世知與不知也今又欲易淮西田則其所遣幹當之人及州縣之吏夤緣為姦豈止取民三百頃而已耶使兩路瘡痍之民皆重罹殘害豈不失人心乎今光世以為私田即不復招誘人民歸業也且敵兵方退遽有此請豈非謂朝廷不敢不從邪恐非光世自為之必其屬官有誤光世者比嶽飛以其屬官輒以私事干請於朝旋請加罪中外翕然稱美謂有古賢將之風光世平日自處必不在嶽飛下望以臣所言示光世且令為朝廷經理淮南收撫百姓以為定都建康之計中興有期何患富貴之不足私計之未便邪今所降指揮於朝廷之紀綱大將之舉措皆為未得恐非所以愛光世也劉光世乞換田事日歷不見嶽飛劾劉康年在此月八日故附月末是月金主晟卒於眀德宫年六十一左副元帥宗維以晟命立安班貝勒都元帥亶為嗣諡晟曰文烈皇帝廟號太宗命諸郡邑皆立晟之靈拋盞燒飯吏民成服及禁音樂一月而罷葬豫陵張滙節要紹興四年冬烏竒邁以病死時大兵相拒江上不敢發喪至軍回于次年方普告諸路苗耀神麓記曰烏竒邁先患中風病手足無力半身不遂約及一年至天會十三年乙卯嵗正旦近侍扶掖而行見佛自東方隨日而出現從者皆觀而瞻禮烏竒邁問汝等見甚皆云見佛像在日傍雲間言未訖烏竒邁昏困再病中風僵仆殂于明德宫二書不同而耀所言頗悉今從之别書又云丙辰年烏竒邁死蓋誤今不取初太祖旻有約兄終弟及復歸其子及晟病其長子宗磐自以人主之元子欲為儲嗣旻之子宗幹言己乃武元長子當立宗維言己於兄弟年長功髙當繼其位晟不能決者纍日宗室完顔朂者受師於本朝主客員外郎范正圖粗通文藝奏曰臣請籌之初太祖約稱元謀弟兄輪足却令太祖子孫為君盟言猶在耳所有太祖正室慈惠皇后親生男勝果早卒有孫稱安班貝勒以為儲嗣今年十有五矣宗維乃止監軍希尹利其幼弱易制宗幹亶伯父且妻其母如己子也遂共贊成其事此據苗耀神麓記修入但耀以安班為按節蓋誤今正之亶已見建炎元年九月洪皓松漠記聞長子宗磐與固倫尼瑪哈爭立尼瑪哈以今主為嫡遂立之今主勝果之子勝果早卒其妻為庫堪所收及忌合即宗幹小名與耀所云皆亶既立追諡其父宗浚曰景宣皇帝宗浚即勝果朂昌弟也初金太宗晟嘗下詔改正官名而未畢至是置三省六部略倣中國之制以太師太傅太保為三師太尉司徒司空為三公尚書省置令次左右丞相皆平章事左右丞皆參知政事侍中中書令皆居丞相下仍為兼職元帥府置都元帥左右副元帥左右監軍左右都監樞密院置使副簽書院事大宗正府置判同判同簽書事宣徽院置左右使同知簽書事六部初止吏户禮三侍郎後置三尚書仍兼兵刑工既而六曹皆置尚書郎官左右司及諸曹皆備國史院置監修以宰相兼領次修史同修史御史臺置大夫中丞侍御史以下而大夫不除中丞惟掌訟牒及斷獄會法諫院置左右諫議大夫補闕拾遺並以他官兼之與臺官皆充員而已翰林學士院置承旨學士侍讀侍講學士待制修撰而承旨不除殿前司置都點檢左右副點檢左右衛軍勸農司置使副記注院置修注太常寺置少卿祕書省置監少以下皆偹國子監官不設外道置轉運使而不刺舉故官吏無所憚都事令史用登進士第者預其選人以為榮官無磨勘之法每一任則轉一官此其大略也熊克小歷初奉使宇文虛中留其國至是受官為之參定官制洪適撰其父皓行述云虛中為詳定禮儀使云云亶又升所居故契丹西樓為上京號會寧府自上京至燕二千七百五十里自燕至汴千三百十五里自汴至泗千三百四里封左副元帥宗維為晉國王皇伯宗幹為秦國王宗磐為宋國王皆領二省事封右監軍希尹為陳王除尚書右丞相知燕京樞密院事韓企先為尚書右丞相山南西路兵馬都部署髙慶裔為尚書左丞河南東路兵馬都部署蕭慶為尚書右丞宗維希尹既罷兵亶以慶裔與慶本二人腹心故解其外任苗耀神麓記稱宗磐除尚書令宗幹録尚書事宗維除丞相完顔朂除右丞與諸書不同又封右副元帥宗輔為冀王遷左副元帥左監軍昌為魯王遷右副元帥右監軍宗弼為瀋王遷左監軍陜西經略使薩里罕為右監軍熊克小歷稱烏舍前自右副元帥除左丞相蓋誤希尹自丙午至甲寅止為監軍未嘗除元帥也雜書又稱尼瑪哈為都元帥及與秦宋二王爭權恐誤詳見紹興七年七月建炎以來繫年要録卷八十四金人地名考證尼瑪哈原書作黏罕誤改見卷一烏竒邁原書作吳乞買誤改見卷一勝果原書作聖果本卷後又作繩果並誤改見卷九安班貝勒原書作諳板勃極烈誤改見卷二固倫尼瑪哈原書作固倫黏罕誤今改正庫堪原書作固剛誤今改正薩里罕原書作撒離喝誤改見卷十一烏舍原書作悟室誤改見卷一
